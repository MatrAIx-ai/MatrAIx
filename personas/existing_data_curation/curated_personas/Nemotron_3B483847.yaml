  hobbies: '[''Reading non-fiction (economics, self‑improvement, investigative journalism)'', ''Crossword and Sudoku puzzle solving'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Yoga and meditation'',
    ''Solo hiking in nature'', ''Listening to financial podcasts'', ''Playing chess online'', ''Journaling'', ''Learning Spanish poetry'']'
  career_goals: Jasmine aims to advance into a senior loan underwriting or compliance management role within the next five years, seeking to lead a team that values precision and structured processes. She
    plans to complete her bachelor's degree in finance or business administration, earn a Certified Mortgage Banker (CMB) credential, and acquire expertise in emerging fintech lending platforms. Her long‑term
    ambition includes establishing a consulting firm that helps small businesses and community organizations navigate loan applications and regulatory compliance, allowing her to leverage her analytical
    strengths while maintaining a low‑profile, solitary work environment.
