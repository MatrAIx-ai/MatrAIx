  career_goals: Although still young, William imagines a future where he helps and leads others. He expresses interest in becoming a firefighter, inspired by his love for community service and the structured
    environment of the fire station. He also dreams of being a teacher, where he can share knowledge and maintain organized classroom routines. Ultimately, he aims to grow into a role where he can protect
    and guide his community while working with a supportive team.
