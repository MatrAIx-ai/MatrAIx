personas:
  professional: Joanna Maldonado is a skilled carpenter who blends precision woodworking with avant‑garde design, using hand tools and CAD to craft custom furniture, and their relentless curiosity pushes
    them to experiment with abstract forms even on tight client deadlines.
  sports: Joanna Maldonado enjoys hiking the trails of Huron‑Clinton Metroparks for cardio, follows the Detroit Tigers and Detroit Red Wings avidly, and plays on a local co‑ed recreational softball league,
    balancing a competitive edge with a preference for low‑key community‑focused fitness.
  arts: Joanna Maldonado frequents Detroit’s Museum of Contemporary Art, draws inspiration from the abstract canvases of Mark Rothko, the sculptural installations of Anish Kapoor, and the haunting folk
    melodies of Gillian Welch, while they unwind by strumming acoustic guitar to the tunes of Bon Iver at intimate house concerts.
  travel: Joanna Maldonado prefers carefully plotted road trips, having explored the historic charm of Mackinac Island, the bustling art scene of Chicago’s River North, and dreaming of a solo pilgrimage
    to the minimalist architecture of Kyoto, balancing budget constraints with a desire for creative immersion.
  culinary: Joanna Maldonado loves cooking hearty wood‑smoked salmon with maple glaze, slices of locally sourced rye bread, and mastering the perfect poached eggs, yet they often forgo meal prep in favor
    of grabbing a late‑night slice of pizza from the neighborhood joint after a long workshop.
  core: Joanna Maldonado is a fiercely imaginative carpenter who channels a competitive, solitary spirit into abstract wood sculptures, occasionally trading late‑night pizza for a new set of chisels.
background:
  cultural: Joanna grew up in Hamtramck, Michigan, a historically working‑class community known for its cultural mosaic of immigrant neighborhoods. Though she identifies as white, her family roots trace
    back to Polish and German ancestry, typical of many long‑standing residents in the region. Raised in a modest household that valued self‑reliance, hands‑on craftsmanship, and community solidarity, she
    was exposed early to a blend of traditional Midwestern values and the vibrant, multicultural atmosphere of the city. This environment nurtured her respect for diverse perspectives while reinforcing
    a pragmatic work ethic, shaping her competitive drive and her appreciation for novelty in art and design.
