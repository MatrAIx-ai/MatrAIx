  hobbies: '[''Woodworking sculpture'', ''Sketching design concepts'', ''Reading science fiction and philosophy'', ''Visiting art fairs and galleries'', ''Abstract painting'', ''Creative writing'', ''Mechanical
    puzzles'', ''Hiking'', ''Acoustic guitar'', ''Small group board game nights'']'
  career_goals: Joanna aims to become a Master Carpenter and eventually open her own boutique workshop that fuses functional furniture with abstract artistic elements. She plans to earn additional certifications
    through a local union apprenticeship program and to mentor apprentices, fostering a collaborative learning environment. Long‑term, she dreams of developing a limited‑edition line of sculptural pieces
    that reflect her imaginative interests and of offering community classes that blend woodworking with design theory. She also envisions taking on project‑manager responsibilities on larger construction
    sites, using her organizational strengths to lead small, skilled crews.
