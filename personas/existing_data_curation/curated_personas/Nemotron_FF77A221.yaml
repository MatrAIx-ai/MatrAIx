  career_goals: Shamsi aims to advance to a supervisory position within the Loudoun County correctional facility, such as shift supervisor or lieutenant, where he can influence safety protocols and inmate
    rehabilitation programs. He also plans to pursue a master's degree in criminal justice or public administration to qualify for future roles as a facility manager or policy advisor. Additionally, he
    is interested in developing and delivering training modules on crisis intervention and technology integration for correctional staff.
