persona_description: A person who is concerned about national security and is involved in the disposal of radioactive waste. They are likely to have a background in nuclear engineering or environmental
  science and have experience working with commercial nuclear power plants. They are also knowledgeable about the laws, regulations, and agreements that apply to the disposal of radioactive waste, including
  the Hanford Site settlement agreement and the WIPP LWA. They are interested in minimizing institutional controls and achieving cost-effective disposal while protecting the inadvertent human intruder.
  They are also aware of the potential impacts of radioactive waste on workers and the public, including the potential exposure to radiation during routine conditions and accidents and direct impacts on
  workers and the public from industrial and transportation accidents. They are also aware of the cultural resources and tribal concerns that may be impacted by the disposal of radioactive waste, including
  the potential impacts on workers and the public from industrial and transportation accidents.
