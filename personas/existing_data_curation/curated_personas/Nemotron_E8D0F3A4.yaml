personas:
  professional: Anthony Correia is a seasoned logistics professional who combines hands‑on truck driving, precise route optimization, and persuasive freight sales to consistently meet delivery targets,
    and they are actively preparing for a supervisory fleet‑coordinator role by completing a Supply Chain Management degree.
  sports: Anthony Correia spends early mornings casting a line on Lake St. Clair for calm focus, passionately roots for the Detroit Tigers at Comerica Park, joins a weekend pick‑up basketball league at
    the community center, and they proudly wear a Detroit Lions jersey during football season.
  arts: Anthony Correia nurtures their artistic side by meticulously building scale model aircraft, restoring vintage automobiles, and they immerse themselves in the melodies of Frank Sinatra, the Detroit
    Symphony Orchestra, and occasional fado playlists while attending local community festivals that celebrate their multicultural roots.
  travel: Anthony Correia prefers meticulously planned road trips that blend fishing expeditions on the Great Lakes with cultural stops in historic towns like Marquette, Michigan, and occasional overseas
    pilgrimages to Lisbon and Naples—destinations echoing family culinary traditions—while they balance their travel budget with the goal of funding a future trucking enterprise.
  culinary: Anthony Correia delights in cooking hearty meals such as bacalhau à brás with cod, garlic, and olives, and spaghetti carbonara with pancetta and pecorino, often sourcing fresh basil, extra‑virgin
    olive oil, and locally caught fish from the farmer’s market, and they occasionally treat themselves to a perfectly smoked Michigan brisket.
  core: Anthony Correia is a disciplined logistics veteran who balances a meticulous, anxiety‑driven quest for order with a hands‑on love for model making, fishing, and family‑centric cooking, and they
    constantly juggle structured ambition with mindful self‑care.
background:
  cultural: Anthony is of mixed Southern European descent, with a Portuguese grandfather who immigrated to Michigan and an Italian mother who grew up in the Detroit area. Raised in a Catholic, working‑class
    neighborhood of Taylor, he internalized the Midwestern values of hard work, punctuality, and community involvement. Family gatherings often feature traditional Portuguese bacalhau and Italian pasta
    dishes, and he celebrates holidays like Saint Joseph’s Day and the Detroit Irish Parade, reflecting the area's multicultural fabric. This cultural blend informs his appreciation for hearty, home‑cooked
    meals, strong family ties, and a pragmatic yet warm approach to life.
attributes:
  skills: '[''Long‑haul truck operation'', ''Medium‑size delivery driving'', ''Route optimization'', ''Vehicle inspection & minor maintenance'', ''Regulatory compliance (DOT, HOS)'', ''Time management'',
    ''Customer service'', ''Sales negotiation'', ''Freight contract acquisition'', ''Logistics coordination'', ''Data entry & record‑keeping'', ''GPS & telematics navigation'', ''Inventory management'',
    ''Problem solving'', ''Stress management techniques'']'
  hobbies: '[''Fishing on Lake St. Clair'', ''Scale model airplane building'', ''Classic car restoration'', ''Attending Detroit Tigers baseball games'', ''Participating in local cultural festivals'', ''Yoga
    and mindfulness meditation'', ''Journaling'', ''Cooking Italian and Portuguese family recipes'']'
  career_goals: Anthony aims to transition from a driver‑sales role to a supervisory position within logistics, such as a fleet coordinator or regional dispatch manager, where he can apply his organizational
    strengths on a broader scale. He plans to complete a bachelor's degree in Supply Chain Management to deepen his strategic expertise and eventually launch a small, owner‑operator trucking enterprise
    focused on providing reliable regional deliveries with an emphasis on driver well‑being. Balancing his ambition with his mental‑health awareness, he also seeks to implement workplace practices that
    reduce stress for himself and his team, such as flexible scheduling, mindfulness resources, and regular safety briefings.
