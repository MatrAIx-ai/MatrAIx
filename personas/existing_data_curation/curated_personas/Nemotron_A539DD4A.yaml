    Assurance and Control'', ''Strategic Planning'', ''Process Improvement'', ''Bilingual Communication (English/Spanish)'']'
  hobbies: '[''Soccer (local amateur league)'', ''Basketball (pickup games)'', ''Cooking Mexican cuisine'', ''Hiking and trail exploring'', ''Attending live music concerts'', ''Participating in community
    festivals (e.g., Cinco de Mayo)'', ''Drones and construction tech experimentation'', ''Business networking events'', ''Competitive video gaming (FIFA, e‑sports)'', ''Strategic board games (Risk, Settlers
    of Catan)'']'
  career_goals: Luis aims to progress from managing medium‑scale projects to overseeing large commercial and mixed‑use developments across the Midwest. Within the next five years he plans to earn the PMP
    certification and become a LEED Green Associate, positioning himself as a leader in sustainable construction. His long‑term ambition is to launch his own construction firm that emphasizes innovative
    tech integration, on‑time delivery, and profitability, while mentoring the next generation of site supervisors. He is competitively driven to build a reputation for delivering projects under budget
    and ahead of schedule, and to be recognized as a regional construction director.
