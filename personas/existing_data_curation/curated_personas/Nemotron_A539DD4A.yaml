personas:
  professional: Luis Allen, a 26‑year‑old construction manager, blends rigorous project‑management expertise with a curiosity for emerging technology, driving his teams to deliver large‑scale Midwest developments
    on time, under budget, while balancing strict safety standards with flexible problem‑solving.
  sports: Luis Allen, an avid participant in a local amateur soccer league and frequent pickup basketball games, roots for the Chicago Fire and Chicago Bulls, trains twice weekly on the Illinois Prairie
    Path, and treats every match as a strategic contest where winning outweighs camaraderie.
  arts: Luis Allen, a regular at live music venues, enthusiastically follows rock acts like Foo Fighters and Latin artists such as Bad Bunny, attends the annual Midwest Music Festival, and unwinds with
    competitive board games like Settlers of Catan and Risk.
  travel: Luis Allen, who prefers short, high‑energy trips, plans weekend road trips to Starved Rock State Park and a yearly cultural escape to Oaxaca for culinary immersion, balancing spontaneity at community
    festivals with a meticulous travel‑budget spreadsheet.
  culinary: Luis Allen, an intermediate home chef, masters traditional Mexican dishes such as tacos al pastor, chiles en nogada, and explores fusion recipes using chipotle‑infused barbecue sauce, always
    sourcing fresh corn masa, avocados, and cilantro from the local farmer’s market.
  core: Luis Allen, a tech‑savvy construction manager who channels competitive energy into projects, sports, and cooking, balancing disciplined budgeting with occasional splurges, while juggling knee aches
    and a habit of forgetting floss.
background:
  cultural: Luis is a first‑generation Mexican‑American raised in the Midwest. He grew up in a bilingual household where Spanish was spoken at home and English at school, giving him fluency in both languages.
    Family traditions such as Día de los Muertos, festive celebrations of Cinco de Mayo, and home‑cooked Mexican meals remain central to his identity. He blends Mexican cultural values—community hospitality,
    strong family ties, and a love for music and dance—with the practical, diligent work ethic typical of the Illinois region. This dual heritage informs his collaborative yet competitive approach at work
    and his enthusiasm for community‑oriented activities.
attributes:
  skills: '[''Project Management'', ''Budgeting and Cost Control'', ''Contract Negotiation'', ''Procurement and Supply Chain Management'', ''Construction Safety Compliance (OSHA)'', ''Team Leadership and
