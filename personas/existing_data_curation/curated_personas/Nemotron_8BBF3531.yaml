  hobbies: '[''photography'', ''woodworking'', ''recreational softball'', ''community theater'', ''art exhibitions'', ''live music events'', ''DIY home renovation'', ''reading (design, history, problem‑solving)'',
    ''church and community potlucks'', ''local history tours'']'
  career_goals: Robert aims to advance to a supervisory role within his current warehouse, seeking certification as a Certified Forklift Trainer and OSHA Safety Coordinator. He aspires to become a shift
    manager, overseeing logistics and staff development, and eventually transition into a logistics coordinator position that leverages his organizational talents and interest in process improvement. In
    the longer term, he hopes to start a small, community‑focused moving service that blends reliable material‑moving expertise with a commitment to local arts events, offering transportation for art installations
    and cultural festivals.
