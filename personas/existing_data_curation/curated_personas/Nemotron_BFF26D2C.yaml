personas:
  professional: Candice Mckoy is a seasoned building maintenance technician in Brooklyn who leverages their extensive hands‑on expertise in plumbing, electrical, HVAC, and carpentry to keep multifamily
    properties operating smoothly, meticulously documents every task to soothe their stress‑prone mind, and uses their sociable, outgoing demeanor to build rapport with tenants and vendors while pursuing
    senior supervisory certification.
  sports: Candice Mckoy hits the local recreation center’s basketball courts for weekly pickup games, follows the Brooklyn Nets and New York Knicks with fervent loyalty, and participates in the community’s
    adult basketball league—Brooklyn Hoops Club—while using cardio sessions as a stress‑relief outlet.
  arts: Candice Mckoy expresses their creative side through hip‑hop and salsa nights at local community centers, dancing to artists like Megan Thee Stallion, Bad Bunny and Shakira, while lending their voice
    to a church choir that sings Beyoncé‑styled gospel arrangements, and unwinds by devouring mystery novels by Gillian Flynn and Tana French.
  travel: Candice Mckoy prefers short, budget‑friendly weekend getaways that blend cultural immersion and relaxation, having explored the historic streets of Savannah, Georgia, the vibrant markets of San
    Juan, Puerto Rico, and the scenic Blue Ridge Parkway in Asheville, North Carolina, they plan trips using a mix of online research and spontaneous suggestions from friends while saving for a future business‑related
    retreat.
  culinary: Candice Mckoy channels their love for soul‑food and Caribbean‑inspired cooking into weekly meals like jerk‑spiced chicken with rice and peas, slow‑cooked collard greens seasoned with smoked
    paprika, and sweet‑potato casserole topped with toasted coconut, often garnishing dishes with fresh basil, cilantro, and a splash of lime from their balcony garden herbs.
  core: Candice Mckoy blends a meticulous, structure‑driven work ethic with a vibrant social life, juggling maintenance duties, dance nights, and garden‑grown herbs while occasionally over‑committing to
    community events and worrying about every detail.
background:
  cultural: Candice identifies as a Black woman raised in the vibrant cultural tapestry of Brooklyn. Her family’s roots trace back to the Great Migration, and she grew up surrounded by a mix of African‑American
    traditions, Caribbean influences from neighbors, and the bustling urban rhythm of New York City. Community and church play pivotal roles in her life, celebrating holidays such as Juneteenth, Kwanzaa,
    and Caribbean festivals. These cultural experiences have shaped her values of resilience, collective support, and pride in her heritage, while also informing her commitment to giving back through mentorship
    and community service.
