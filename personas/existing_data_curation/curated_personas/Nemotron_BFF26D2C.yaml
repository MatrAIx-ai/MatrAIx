  hobbies: '[''dancing'', ''basketball'', ''cooking'', ''gardening'', ''church choir'', ''community volunteering'', ''reading'', ''yoga'']'
  career_goals: Candice aims to advance from a general maintenance technician to a senior maintenance supervisor within the next three years, seeking certifications such as the Certified Maintenance & Reliability
    Professional (CMRP) and an OSHA 30‑hour safety certification. She plans to complete her GED and enroll in a community college trade program to deepen her knowledge of building systems. Long‑term, she
    envisions starting her own small maintenance contracting business that serves Brooklyn neighborhoods, providing reliable services while creating apprenticeship opportunities for other Black women interested
    in skilled trades. Financial stability, a steady income to support her family, and mentorship are central to her ambitions.
