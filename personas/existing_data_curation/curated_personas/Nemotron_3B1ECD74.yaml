  career_goals: Norman aspires to advance from day‑to‑day cleaning duties to a facility‑operations supervisor role within the next five years. He plans to earn OSHA safety certification and a Green Cleaning
    Professional credential, which will qualify him to oversee larger maintenance teams and introduce sustainable practices. In the longer term, his entrepreneurial drive motivates him to start his own
    commercial cleaning business focused on eco‑friendly services for schools, churches, and small businesses in Conecuh County. He also hopes to leverage his outgoing personality to build a loyal client
    base through personal relationships and community involvement.
