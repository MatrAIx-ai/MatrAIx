  career_goals: Felicia aims to advance to a senior director role in operations or supply chain, where she can shape long‑term strategic initiatives that emphasize stability and efficiency. She plans to
    earn her PMP certification, expand mentorship programs for Black and women engineers, and spearhead a corporate wellness framework that addresses anxiety and emotional well‑being. While pursuing these
    ambitions, she prioritizes maintaining a predictable work schedule that supports her family life and personal health.
