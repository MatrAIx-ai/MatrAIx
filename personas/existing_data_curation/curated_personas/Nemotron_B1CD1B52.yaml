personas:
  professional: Felicia Forte, a 38‑year‑old operations manager, brings a meticulous, data‑driven approach to process improvement—using Excel, SQL, and basic Python to track metrics, applying Lean Six Sigma
    to cut waste, and relying on their calm, considerate demeanor to mediate conflicts and keep the team on schedule, and they thrive on a structured routine that steadies their high‑anxiety temperament.
  sports: Felicia Forte, a 38‑year‑old who prefers gentle movement, participates in a weekly yoga class with the Riverside Yoga Club and plays on a co‑ed softball team during the spring, while rooting for
    the Atlanta Braves (MLB) and the Dallas Cowboys (NFL), and they use a fitness tracker to log daily steps as a calming routine.
  arts: Felicia Forte finds solace in jazz, regularly attending intimate gigs featuring Diana Krall and Norah Jones, while losing herself in historical fiction by Hilary Mantel and Philippa Gregory, and
    they also unwind with knitting projects inspired by traditional folk patterns.
  travel: Felicia Forte favors well‑planned, low‑stress trips that blend family time with cultural immersion, often returning to Charleston, Savannah, and Asheville for their Southern charm, while dreaming
    of a quiet weekend in Kyoto to explore its tea gardens and they meticulously map each itinerary in a spreadsheet to keep anxiety at bay, despite a tight work schedule that limits extended vacations.
  culinary: Felicia Forte, an accomplished home cook, delights in Southern comfort cuisine—perfecting fried chicken, collard greens simmered with smoked turkey, creamy cornbread, and shrimp and grits—using
    garden‑fresh okra, sweet potatoes, and fresh herbs like thyme and sage, and they often experiment with new spice blends while maintaining a meticulous recipe notebook.
  core: Felicia Forte is a routine‑loving operations manager whose precise budgeting and love of cozy jazz evenings are peppered with a tendency to over‑schedule, ruminate on anxiety, and occasionally skip
    social calls when work feels overwhelming, and they often find themselves double‑checking their calendar before bed.
background:
  cultural: Felicia is African American and was raised in the close‑knit Black community of Newark and Belleville, NJ. Her upbringing was steeped in church traditions, family gatherings centered around
    soul food, and storytelling that emphasized resilience and mutual support. She carries forward a strong sense of communal responsibility, often participating in church service projects and neighborhood
    events. In the professional sphere, she navigates a predominantly white corporate environment with a focus on representation, actively engaging in Black professional networks and championing cultural
    awareness initiatives such as Juneteenth celebrations and mentorship for underrepresented employees.
