personas:
  professional: Maggie Costley, a retired environmental analyst turned community mentor, leverages their analytical rigor to design citizen science workshops while infusing each session with the spontaneous
    creativity of their watercolor studies.
  sports: Maggie Costley regularly hikes the Flathead and Bitterroot ranges, participates in a senior walking club that meets at the Missoula Greenway, follows the University of Montana Grizzlies football
    team, and enjoys softball games with the local senior league, reflecting their active yet low‑impact approach to fitness, and they often share trail stories with fellow hikers.
  arts: Maggie Costley spends afternoons dabbling in watercolor landscapes inspired by Ansel Adams, attends performances by the Missoula Rep theatre, curates a rotating mini‑exhibit of local artists in
    their kitchen, and captures sunrise over the mountains with a DSLR, all of which nurture their curiosity and creative expression, and they regularly host informal critique circles for fellow painters.
  travel: Maggie Costley prefers road‑trip itineraries that blend scenic drives through Glacier and Yellowstone with purposeful visits to art museums in Seattle, often planning these escapes around school
    breaks to trek with their grandchildren, while budgeting carefully to fund a modest cabin stay in the Swan Valley each summer, and they proudly document each journey in a handcrafted scrapbook.
  culinary: Maggie Costley loves cooking traditional Montana fare such as bison stew, huckleberry jam, and cedar‑plank trout, often sourcing fresh herbs from their garden and pairing meals with locally
    brewed barley wine, while their intermediate cooking skill shines most when they host lively potlucks featuring homemade cornbread and smoked cheese.
  core: Maggie Costley is a curious, organized octogenarian who blends scientific precision with artistic spontaneity, habitually juggling watercolor brushes, trail maps, and a modest portfolio of municipal
    bonds, all while delighting in spontaneous bird‑watching conversations with their garden’s feathered visitors.
background:
  cultural: Maggie grew up in a white, multi‑generational Montana family rooted in the agricultural and ranching traditions of the early 20th century. The frontier spirit of independence, self‑reliance,
    and deep respect for the natural landscape shaped her values. Her education in a STEM field during a time when fewer women pursued such paths fostered a belief in gender equity and the importance of
    lifelong learning. Living in Lolo, a close‑knit community within Missoula County, she maintains strong ties to local heritage, emphasizing community service, environmental stewardship, and a sincere
    appreciation for both the arts and scientific inquiry.
