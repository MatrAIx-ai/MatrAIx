  career_goals: Although retired from formal employment, Maggie aims to mentor younger residents in STEM and sustainability through informal workshops, document and publish her memoirs reflecting on a lifetime
    of curiosity and learning, and curate a small traveling art exhibit that highlights local artists. She also hopes to expand her knowledge of digital art tools, accompany her grandchildren on weekend
    hikes across Montana's national parks, and support preservation efforts for historic sites in Missoula County.
