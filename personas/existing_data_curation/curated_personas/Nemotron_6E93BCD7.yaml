  career_goals: In the next few years Ricardo aims to transition from daily site supervision to a safety‑consulting role, helping other contractors reduce workplace injuries. He plans to earn a Certified
    Safety Professional (CSP) credential and complete a Construction Management certificate to formalize his expertise. Ricardo also wishes to formalize a mentorship program for young workers in the El Paso
    area, creating a pipeline of skilled tradespeople. Financially, he is focused on securing a comfortable retirement while potentially co‑founding a family‑run renovation business that will allow him
    to stay active on a part‑time basis and preserve his legacy of quality workmanship.
