personas:
  professional: Ricardo Figueroa, a seasoned construction supervisor in the border region, they leverage bilingual fluency, precise blueprint interpretation, and a calm, methodical approach to keep frontline
    crews on schedule while mentoring apprentices, reflecting his organized reliability, sociable nature, and practical curiosity about emerging safety technologies.
  sports: Ricardo Figueroa, a regular player for the Sunday soccer league team the El Paso Strikers, they cheer for El Paso Locomotive FC, enjoy occasional pickup basketball at the community center, and
    follow a disciplined fitness routine that includes warm‑ups, stretching, and yoga classes—though they sometimes skip yoga when deadlines loom.
  arts: Ricardo Figueroa, an avid listener of norteño legends like Los Tigres del Norte and banda icons such as Banda El Recodo while woodworking, they also occasionally attend El Paso Symphony concerts
    and community theater productions, allowing their creative side to complement their practical daily work.
  travel: Ricardo Figueroa, a meticulous planner with a taste for spontaneous detours, they have road‑tripped to Oaxaca for its vibrant markets, explored San Diego’s historic Old Town, and now dream of
    touring New Mexico’s historic missions, though they prefer short weekend getaways that fit their retirement budgeting.
  culinary: Ricardo Figueroa, an enthusiastic home chef, they delight in mastering tamales and carnitas using heirloom corn masa, pork shoulder, ancho chilies, and garden‑fresh cilantro and tomatillos for
    salsas, while also savoring al pastor tacos at beloved local taquerías and sharing these dishes with family during weekend gatherings.
  core: Ricardo Figueroa, a 59‑year‑old construction veteran and community mentor, they blend disciplined planning with a love for soccer, music, and family cooking, all while managing health worries and
    a cautious, detail‑oriented approach to finances.
background:
  cultural: Ricardo’s Mexican heritage is a central part of his identity, enriched by the bicultural environment of El Paso. He is fluent in Spanish and English, seamlessly navigating both cultures at work
    and at home. Family gatherings, Dia de los Muertos altars, and Mexican Independence Day celebrations are regular fixtures, reinforcing strong familial bonds and community ties. His Catholic upbringing
    informs his values of respect, cooperation, and service to others. Living on the US‑Mexico border has given him a unique perspective on cross‑border trade, regional construction practices, and the importance
    of preserving cultural traditions while embracing modern innovations.
