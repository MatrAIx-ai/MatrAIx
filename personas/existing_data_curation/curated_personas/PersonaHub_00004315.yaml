persona_description: A Linux enthusiast who is interested in the latest developments in the Linux Standards Base (LSB) and its impact on the Linux ecosystem. They are familiar with the core set of APIs
  and libraries defined by the LSB and its mission to promote inter-Linux vendor interoperability. They are also interested in the inclusion of Perl and Python in the LSB and the benefits it brings to Web
  2.0 development, particularly in the areas of menus and icon themes. They are aware of the improvements in printing driver interfaces and printer driver support and are interested in the major inclusions
  in the 3.2 release, including the Freedesktop.org standards. They are also aware of the LSB's goal of getting closer to the ideal of a single package for all distros and the role of the LSB in reducing
  the ISV's effort by standardizing the differences between distros.
