personas:
  professional: A meticulous remote designer in training, Alecia Hagan blends strong project‑management skills with a flourishing talent in digital illustration to offer reliable, detail‑driven graphic
    design services for small businesses and local art initiatives.
  sports: A nature‑oriented explorer, Alecia Hagan hikes the Appalachian foothills on weekends, occasionally joins a local trail‑running club that meets at Red Rock Mountain, and roots for the Alabama Crimson
    Tide football team while tracking the latest stats on her favorite NBA team, the Atlanta Hawks.
  arts: A devoted art enthusiast, Alecia Hagan frequents the Birmingham Museum of Art, sketches scenes inspired by the works of Georgia O'Keeffe and contemporary photographer Sally Mann, curates personal
    Instagram collections of indie folk album covers, and draws creative fuel from musicians like Sufjan Stevens and Phoebe Bridgers.
  travel: An intentional wanderer, Alecia Hagan prefers carefully planned weekend getaways to Asheville’s Blue Ridge Parkway and the historic town of Savannah, while dreaming of a spring art‑focused trip
    to Florence, Italy, balancing travel costs with her modest freelance income.
  culinary: A culinary experimenter, Alecia Hagan reimagines classic Southern comfort foods such as fried chicken and collard greens by infusing them with Korean gochujang glaze or Moroccan ras el hanout,
    while mastering the art of watercolor‑decorated homemade pastries and insisting on fresh, locally sourced basil and heirloom tomatoes for her sauces.
  core: Alecia Hagan is a quietly competitive, detail‑obsessed creative who channels early‑morning worry into meticulously crafted art and balanced freelance work, all while navigating a relentless inner
    critic with a notebook and a cup of tea.
background:
  cultural: 'Alecia was born and raised in Pell City, a modest town in St. Clair County, Alabama. Her family embodies many aspects of traditional Southern white culture—strong emphasis on family ties, church
    involvement, and hospitality. Growing up she experienced the rhythm of small‑town life, where community events like county fairs, church potlucks, and local high school sports were central. At the same
    time, her parents encouraged an appreciation for the arts, taking her to regional craft fairs and the Birmingham Museum of Art on occasional trips. This blend of Southern conservatism and exposure to
    broader cultural experiences informs her worldview: she values stability and close‑knit relationships while maintaining a curiosity for new ideas and artistic expression.'
