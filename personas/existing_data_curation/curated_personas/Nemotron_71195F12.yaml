  career_goals: Alecia aims to leverage her artistic and organizational talents into a sustainable remote career. In the short term, she plans to complete an online certificate in digital media design and
    build a freelance portfolio that offers graphic design, illustration, and curated visual content for small businesses and local art initiatives. She intends to launch an Etsy shop featuring her watercolor
    prints and handcrafted home‑decor items, using the e‑commerce platform to generate a modest income while maintaining flexibility. Over the next five years, she hopes to earn a degree in art history
    or museum studies, enabling her to curate community exhibitions in Pell City and surrounding areas. Throughout, she seeks to create a balanced lifestyle that mitigates stress by integrating regular
    self‑care routines and modest professional ambitions.
