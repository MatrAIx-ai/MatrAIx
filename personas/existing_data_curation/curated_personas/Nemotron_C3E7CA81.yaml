personas:
  professional: Mario Bovie, a 16‑year‑old aspiring art therapist in training, blends sketching, digital illustration, and empathetic listening to envision community murals that nurture mental wellness,
    while they navigate a habit of disorganization with creative flexibility.
  sports: Mario Bovie casually joins pick‑up basketball games at the New Haven community center, follows the New York Knicks and Boston Red Sox on television, and they participate in the local hiking club’s
    weekend trail runs, preferring flexible, low‑key activity over structured varsity sports.
  arts: Mario Bovie spends afternoons sketching at the Yale University Art Gallery, drawing inspiration from the street‑art enigmas of Banksy, the vivid palettes of Frida Kahlo, and the emotive brushwork
    of Vincent van Gogh, while they soundtrack their creations with the jazz of Miles Davis, the neo‑soul vibes of Erykah Badu, and instrumental hip‑hop beats by Nujabes.
  travel: Mario Bovie favors low‑budget, impromptu weekend trips to nearby cultural spots like Mystic, Connecticut, and Boston, Massachusetts, while they dream of a future solo pilgrimage to Paris to study
    museum collections, balancing a love for spontaneous sketching on train windows with the modest constraints of a teen travel budget.
  culinary: Mario Bovie, an emerging home‑chef, often crafts quick comfort meals such as avocado toast, improvised ramen bowls, and cheese‑laden pizza slices, favoring fresh basil, soy sauce, and sharp
    cheddar, and they occasionally celebrate their art sessions with artisanal iced coffee from local cafés.
  core: An introverted 16‑year‑old visual storyteller, Mario Bovie channels curiosity and compassion into art, yet they wrestle with a laid‑back approach to organization that sometimes clashes with ambitious
    goals.
background:
  cultural: As a Black teenager growing up in New Haven, Connecticut, Mario’s cultural identity weaves together the rich legacy of African‑American history on the East Coast with the vibrant, contemporary
    urban culture of his city. He is deeply connected to the local Black community that celebrates traditions such as gospel music, spoken‑word poetry, and community festivals like the New Haven Jazz &
    Soul Festival. The city’s historic neighborhoods and its proximity to Yale’s cultural resources expose him to a blend of academic art discourse and grassroots activism. Mario often draws inspiration
    from African diaspora artists and local muralists who use public art to tell stories of resilience and pride. He also feels a strong sense of responsibility to give back, participating in after‑school
    programs that aim to empower Black youth through creative expression. This cultural backdrop informs his artistic style, his desire to promote mental‑health awareness within his community, and his commitment
    to fostering inclusive spaces for other young people.
attributes:
  skills: '["Pencil and charcoal sketching", "Digital illustration (Krita, GIMP)", "Basic photography and photo composition", "Ukulele playing (basic chords)", "Creative writing and journaling", "Empathetic
    listening and peer counseling", "Conflict mediation among peers", "Basic computer literacy (internet research, word processing)", "Social media content creation for community causes", "Flexibility in
    creative problem‑solving"]'
  hobbies: '["Sketching in a personal sketchbook", "Visiting local art museums and galleries (Yale Art Gallery, New Haven Museum)", "Listening to jazz, neo‑soul, and instrumental hip‑hop", "Reading graphic
    novels and art‑focused books", "Journaling and creative writing", "Photography (capturing urban scenes and portraits)", "Volunteer art mentor at community center", "Podcast listening (art history, social
    justice, technology)", "Digital art and video editing for social media", "Exploring new ideas through online tutorials and courses"]'
  career_goals: Mario aspires to turn his artistic talent and compassionate nature into a career that benefits his community. He envisions becoming an art therapist or a community‑based visual artist who
    creates murals and public artworks that promote mental health awareness and celebrate African‑American heritage in New Haven. He hopes to earn a scholarship to study visual arts and psychology at a
    community college or a university with strong social‑service programs. In the longer term, Mario dreams of establishing a youth arts collective that offers free workshops, mentorship, and a safe space
    for other introverted teens to express themselves. He also sees himself working part‑time as a graphic designer for local non‑profits, using his design skills to amplify causes he cares about, such
    as homelessness prevention and youth empowerment.
