  career_goals: Although still a toddler, Earsell's practical curiosity hints at future ambitions. He loves fixing broken toy parts and building structures with blocks, suggesting a potential interest in
    engineering or construction. His gentle care for stuffed animals and willingness to help friends point toward caregiving roles such as a veterinarian or teacher. For now, his primary goal is to explore
    his surroundings, learn new skills each day, and delight in activities that combine creativity with helpfulness.
