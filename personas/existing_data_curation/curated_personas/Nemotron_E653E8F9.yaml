    Spanish'']'
  career_goals: Allyson aims to advance to a senior supervisory role within the Cook County Revenue Department, where she can shape audit strategies and mentor a new generation of tax professionals. She
    is pursuing a master's degree in public administration to deepen her understanding of fiscal policy and hopes to contribute to statewide tax reform initiatives that promote fairness and transparency.
    Over the next five years, she plans to lead a cross‑agency task force on modernizing revenue collection technology and to expand her community outreach program that offers free tax‑preparation workshops
    for low‑income residents. Ultimately, she envisions transitioning into a consultancy role after retirement, advising municipalities on revenue optimization and compliance best practices.
