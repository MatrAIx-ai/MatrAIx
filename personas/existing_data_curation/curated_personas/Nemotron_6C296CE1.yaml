personas:
  professional: Michael Prak is a retired handyman and community elder who leverages his woodworking, budgeting, and public‑speaking abilities to mentor younger neighbors, coordinate an intergenerational
    garden project, and serve as an elder advisor on his church’s volunteer committee.
  sports: Michael Prak follows the University of South Carolina Gamecocks football and the Carolina Panthers, tracks the Charleston RiverDogs minor‑league baseball, and stays physically active by fishing
    with the Lake Marion senior angling club, taking leisurely walks around the garden and incorporating light stretching each morning.
  arts: Michael Prak delights in classic country icons like Willie Nelson and Hank Williams, gospel legends such as Mahalia Jackson, regularly sings with the Oak Grove church choir, and spends quiet evenings
    reading Pat Conroy’s regional folklore, using storytelling to preserve local heritage.
  travel: Michael Prak prefers carefully planned road trips that revisit historic towns such as Charleston and Savannah for their ante‑bellum charm, and they dream of a pilgrimage to Washington, D.C.’s
    National Museum of American History, all while budgeting travel within their modest retirement funds.
  culinary: Michael Prak savors cooking classic comfort dishes—from crispy fried chicken and buttery biscuits to collard greens simmered with smoked ham hocks and shrimp‑and‑grits—using fresh garden herbs,
    a dash of cayenne pepper, and sweet tea brewed with fresh lemon to accompany meals.
  core: Michael Prak is a methodical, story‑telling elder who blends routine‑driven woodworking, gardening, and community leadership with a love of classic country, gospel, and traditional comfort food,
    all while navigating the quirks of aging and a touch of forgetfulness.
background:
  cultural: Michael grew up in a close‑knit, rural part of South Carolina. His family has deep Southern roots, with several generations of farmers and small‑business owners. Raised in the Baptist faith,
    he attended a local church where community service and hospitality were emphasized. The cultural milieu emphasized respect for tradition, self‑reliance, and strong family bonds, shaping his practical
    worldview and love for routine. He witnessed the economic shifts from agriculture to manufacturing in the latter half of the 20th century, and he carries the values of hard work, modesty, and neighborly
    support typical of many white South Carolinians.
