  career_goals: Elizabeth aims to transition into a senior regional operations role within the next three years, where she can lead large-scale transformation projects that incorporate sustainability and
    technology integration. She also aspires to develop a mentorship program for emerging women managers, leveraging her experience to promote diversity and inclusion. Long-term, she envisions launching
    a boutique Mexican-inspired catering business that blends her cultural heritage with her business acumen, allowing her to retire on her own terms while maintaining flexibility and creative freedom.
