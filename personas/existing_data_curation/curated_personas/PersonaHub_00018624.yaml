persona_description: A historian who specializes in the study of European prehistory, particularly the Late Bronze Age and Early Iron Age, and has expertise in radiocarbon dating and archaeology. His research
  interests include the chronology and pottery types of prehistoric cemeteries in western Belgium, and the possible origins of the urnfield phenomenon in this region. He has conducted extensive excavations
  and studies of these cemeteries, and is known for his reproducible results and his ability to interpret the occupational history of prehistoric sites.
