personas:
  professional: Piero Solis, a 24-year-old full-stack developer, builds clean, maintainable web applications using React, Node.js, and PostgreSQL, applying test-driven development and Agile Scrum to keep
    projects predictable while mentoring junior coders in volunteer tutoring programs.
  sports: Piero Solis follows international soccer tournaments, cheering for his favorite club Barcelona SC, participates in weekend futsal matches with a small group of friends, and maintains personal
    fitness through morning jogs in the local park.
  arts: Piero Solis immerses themselves in science-fiction literature, devouring works by Isaac Asimov and N.K. Jemisin, and finds inspiration in video game soundtracks like Celeste, while occasionally
    attending local indie theater productions.
  travel: Piero Solis prefers short, budget-friendly trips that blend cultural exploration and relaxation, having backpacked through Medellin and visited the historic streets of Lisbon, yet they often postpone
    longer journeys until their certification deadline.
  culinary: Piero Solis enjoys cooking traditional coastal dishes such as citrus-marinated fish ceviche, savory baked empanadas, and a hearty bean stew called fanesca, experimenting with fresh herbs and
    artisanal chilies, though they sometimes over-season in pursuit of perfect flavor balance.
  core: Piero Solis is a structure-driven full-stack developer who balances solitary coding marathons with mindfulness practices, yet wrestles with anxiety, occasional overspending on gaming gear, and a
    penchant for late-night coding.
background:
  cultural: Piero was raised in a bilingual household by Ecuadorian immigrant parents, so Spanish is spoken at home and Ecuadorian customs are a core part of his identity. He celebrates traditional festivals
    such as Carnaval, Día de los Difuntos, and the annual Fiesta de la Mama, often preparing family recipes and sharing them with friends in Paterson. The close‑knit community values of his heritage—collectivism,
    respect for elders, and a strong sense of solidarity—inform his compassionate nature and his desire to help others, especially through technology. While fully integrated into the multicultural fabric
    of Paterson, he maintains ties to the Ecuadorian diaspora, participating in local cultural events and following news from his home country. This blend of Ecuadorian roots and American urban experience
    shapes his worldview, encouraging him to bridge cultures through inclusive software solutions.
