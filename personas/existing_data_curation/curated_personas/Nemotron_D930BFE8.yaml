  career_goals: Piero aims to secure a stable, full‑time role as a senior full‑stack developer within a company that values clear project roadmaps and work‑life balance. Over the next three years he plans
    to earn AWS Solutions Architect certification and lead a small, collaborative team where he can mentor junior developers, especially those from under‑represented backgrounds. He is passionate about
    leveraging technology for social good, so one long‑term ambition is to develop a platform that connects Ecuadorian diaspora youth with mentorship and educational resources. Ultimately, he envisions
    a career path that combines technical leadership with community‑focused product development, allowing him to apply his structured approach while making a positive impact.
