persona_description: A building contractor who is licensed to construct various types of buildings, including new buildings, prefabricated structures, temporary buildings, electrical systems, plumbing systems,
  and HVAC systems. They are responsible for ensuring that the construction process complies with the applicable codes, state laws, and regulations, and they are required to submit an application for a
  building permit, which is a document granting legal permission to start construction. The building contractor must also arrange for inspections of each major phase of construction to ensure that the work
  conforms to the approved plans and the applicable codes. If any violations are found, the building contractor must remedy them and request an inspection before proceeding with construction changes.
