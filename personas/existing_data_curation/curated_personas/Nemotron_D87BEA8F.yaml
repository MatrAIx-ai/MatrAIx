  career_goals: Sylvia aims to earn her Certified Financial Planner (CFP) designation within the next two years, positioning herself among the top performers in her firm. She is driven to expand her client
    base, particularly serving underserved Black professionals in Denver, and plans to become a recognized specialist in culturally responsive wealth management. In five to seven years, she hopes to launch
    a boutique advisory practice that blends rigorous financial strategy with community‑focused education, ultimately achieving a leadership role that reflects both her competitive ambition and her commitment
    to measurable impact.
