personas:
  professional: Eldridge Fletcher, a preschool builder who arranges their toy blocks meticulously before experimenting with new structures, shows early signs of balancing curiosity with practicality and
    a neat‑but‑flexible approach to tasks.
  sports: Eldridge Fletcher, a sprightly member of the neighborhood toddler soccer club "Tiny Tigers", idolizes the New York Yankees and the Los Angeles Lakers, and competes to be the fastest in mini‑relay
    races at the local playground.
  arts: Eldridge Fletcher, a budding storyteller who reenacts scenes from Disney's 'Moana' and 'Frozen' with toy figures, loves singing along to songs by The Wiggles and enjoys finger‑painting to the rhythm
    of 'Baby Shark' by Pinkfong.
  travel: Eldridge Fletcher, a wide‑eyed explorer who loved a weekend trip to the local aquarium and a family vacation to the Grand Canyon, now dreams of visiting Disneyland Paris and the Great Barrier
    Reef.
  culinary: Eldridge Fletcher, a selective eater who adores cheesy macaroni, chicken nuggets with honey mustard, and strawberry‑banana smoothies, yet refuses broccoli and often insists on a separate plate
    for each food, showcasing both curiosity about flavors and a practical need for order.
  core: Eldridge Fletcher is a meticulous yet imaginative four‑year‑old who balances curiosity with caution, competes eagerly in games, worries about small setbacks, and finds comfort in organized play
    and predictable routines.
background:
  cultural: Eldridge is raised in a close‑knit African‑American family in Mesa, Arizona. His household blends Southern‑rooted traditions—such as Sunday church attendance, gospel music, and celebrations
    of Juneteenth—with the multicultural flavors of the Southwest, including occasional family outings to local parks and festivals. He enjoys soul‑food meals like collard greens and cornbread alongside
    Mexican‑influenced dishes that reflect the regional cuisine. His parents encourage curiosity, community involvement, and resilience, providing a supportive environment that nurtures his practical imagination
    and his awareness of both heritage and local community.
attributes:
  skills: '[''Fine‑motor manipulation (blocks, crayons)'', ''Letter recognition (A‑Z)'', ''Counting to ten'', ''Basic problem solving (puzzles, cause‑and‑effect)'', ''Self‑care routines (dressing, brushing
    teeth)'', ''Following routines with flexibility'']'
  hobbies: '[''Building with LEGO/bricks'', ''Drawing and coloring'', ''Collecting natural objects (rocks, leaves)'', ''Listening to music (gospel, children’s hip‑hop)'', ''Watching space‑themed cartoons'',
    ''Preschool games and story time'']'
  career_goals: Eldridge often says he wants to be a ‘builder’ or ‘inventor’ when he grows up. He is fascinated by how things fit together and hopes to design new toys or machines. He aspires to master
    reading independently, ride a bike without training wheels, and later study engineering or mechanics. He also wishes to develop confidence in social settings, become the best at his favorite games,
    and eventually help other children solve problems, reflecting his competitive yet caring nature.
