persona_description: A pediatrician who specializes in the care of children with Down syndrome and has conducted research on the development and growth of children with the condition. She is also interested
  in the prevention and treatment of obesity in adolescents and young adults with Down syndrome. She has received a grant from the Centers for Disease Control and Prevention to develop updated growth charts
  for children with Down syndrome and to develop a screening tool for identifying children at risk for overweight and obesity. She has extensive experience in conducting research, measuring growth and body
  dimensions, and collecting data about patients' health, dietary patterns, and physical activities.
