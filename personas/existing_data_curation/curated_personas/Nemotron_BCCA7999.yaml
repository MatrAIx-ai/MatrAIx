  hobbies: '[''Gardening'', ''Tai Chi'', ''Reading historical fiction'', ''Cooking traditional Vietnamese dishes'', ''Attending community cultural festivals'', ''Senior walking group'', ''Volunteer tutoring'',
    ''Book club participation'', ''Knitting/quilting'', ''Local theater appreciation'']'
  career_goals: Now retired, Irma remains committed to advancing education through volunteer and advisory roles. She aims to mentor younger educators, develop intergenerational learning programs that pair
    seniors with school students, and serve on local school board committees to advocate for culturally responsive curricula. Irma also aspires to author a guidebook that blends her Southeast Asian heritage
    with modern teaching practices, and to continue expanding her digital skills so she can support seniors in navigating new technologies. Her overarching ambition is to foster harmony and lifelong learning
    across generations while maintaining the structured, achievement‑driven standards that have defined her career.
