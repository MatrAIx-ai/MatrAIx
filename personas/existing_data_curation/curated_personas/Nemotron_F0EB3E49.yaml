personas:
  professional: Tom Phan, a seasoned engineer and community technologist in San Diego, leverages their CAD and Python automation expertise to design low‑cost maker solutions while translating complex concepts
    into hands‑on workshops, balancing their preference for structured problem‑solving with a relaxed, flexible attitude toward project deadlines.
  sports: Tom Phan, a devoted member of the local co‑ed soccer league and the San Diego Yacht Club, spends weekends hiking the Torrey Pines trails, cheers on the San Diego Padres, and joins pickup basketball
    games at the community center, embodying their sociable, energetic approach to fitness.
  arts: Tom Phan, an avid fan of classic rock icons like The Rolling Stones and local jazz ensembles such as the San Diego Jazz Collective, regularly attends live shows, collects vinyl records, and unwinds
    with historical fiction novels by Ken Follett and weekly chess matches at the community center, nurturing their creative spirit.
  travel: Tom Phan, a purposeful yet flexible traveler, favors well‑planned road trips along California’s scenic coast—such as their recent getaway to Big Sur and a family visit to San Francisco—while dreaming
    of a multigenerational trip to Vietnam to reconnect with relatives, balancing budget considerations with a desire for cultural immersion.
  culinary: Tom Phan, a confident home chef, delights in simmering fragrant pho broth with star anise, ginger, and coriander, mastering bánh xèo pancakes filled with shrimp, pork, and mung beans, and cultivating
    fresh herbs such as Thai basil, cilantro, and mint in their backyard garden, though they sometimes forget to defrost proteins, leading to impromptu stir‑fries.
  core: Tom Phan, a 55‑year‑old engineer‑turned‑community maker, blends structured technical expertise with a laid‑back love for soccer, sailing, and Vietnamese‑inspired cooking, and although they sometimes
    drift into disorganization, they maintain a steadfast commitment to mentoring and cultural celebration.
background:
  cultural: Tom is a second-generation Vietnamese-American. His parents emigrated to California in the late 1970s following the Vietnam War, and he grew up in a tight-knit Vietnamese enclave in San Diego.
    He speaks Vietnamese fluently and celebrates traditional holidays such as Tết, Mid-Autumn Festival, and ancestor-worship rituals. Family gatherings centred around shared meals and storytelling have
    instilled a strong sense of community and respect for elders. While fully integrated into American life—evident in his education, career, and civic involvement—Tom retains a deep appreciation for Vietnamese
    culinary traditions, language, and intergenerational bonds, often bridging these worlds through cultural events and mentorship programs.
