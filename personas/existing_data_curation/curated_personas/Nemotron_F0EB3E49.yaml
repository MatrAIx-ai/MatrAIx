  hobbies: '["Soccer (co-ed league)", "Sailing", "Hiking (Torrey Pines)", "Vietnamese cooking", "Gardening", "Volunteer tech tutoring for seniors", "Chess", "Reading historical fiction", "Live music concerts"]'
  career_goals: Tom aims to leverage his technical background to give back to the San Diego community. Over the next five years he plans to launch a low-cost makerspace that offers free workshops in electronics,
    programming, and DIY repair for youth and seniors, and to serve as a mentor for the local Vietnamese-American STEM outreach program. He also hopes to obtain a certification in data analytics to stay
    current with emerging technologies, and to organize annual cultural-tech festivals that celebrate both his heritage and his love for group activities. On a personal level, he wants to maintain a healthy,
    active lifestyle and eventually travel to Vietnam with his family to reconnect with extended relatives.
