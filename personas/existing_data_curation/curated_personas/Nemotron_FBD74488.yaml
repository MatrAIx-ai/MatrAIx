  hobbies: '[''Pickup Basketball'', ''Lake St. Clair Fishing Club'', ''Classic Car Shows'', ''Backyard Grilling'', ''Senior Transportation Volunteering'', ''Classic Rock Music'', ''Detroit Tigers Baseball'',
    ''Neighborhood Block Parties'', ''Automotive DIY Projects'', ''Logistics and Route-Optimization Reading'']'
  career_goals: John aims to move beyond daily driving to take on a supervisory role within his taxi company. Over the next five years he plans to earn a commercial driver’s license and complete a certification
    in transportation safety, positioning himself for a fleet manager position. He envisions eventually owning a small fleet of hybrid taxis that integrate advanced dispatch software, offering environmentally
    friendly rides while improving earnings for himself and his drivers. He also seeks to mentor new drivers, establishing a training program that emphasizes reliability, customer safety, and efficient
    routing. Financially, John’s goal is to secure enough profit to fund his children’s college tuition and build a comfortable retirement.
