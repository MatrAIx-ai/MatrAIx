  hobbies: '[''Reading historical fiction'', ''Herb gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Beach walks at sunrise'', ''Crocheting'', ''Watching sustainability documentaries'', ''DIY
    home improvement projects'']'
  career_goals: Maria aims to advance to a supervisory role within the property management sector, overseeing a team of cleaners and coordinating larger maintenance projects. She plans to obtain a Certified
    Professional Cleaner credential and complete an OSHA safety certification to strengthen her expertise. Over the next few years, she hopes to lead the implementation of sustainable cleaning initiatives
    at her workplace, reducing chemical waste and promoting green products. In the longer term, Maria envisions starting a small, family-run cleaning service focused on residential clients in Manatí, offering
    personalized, environmentally conscious cleaning solutions. She also wishes to pursue a GED program to keep her options open for future career development.
