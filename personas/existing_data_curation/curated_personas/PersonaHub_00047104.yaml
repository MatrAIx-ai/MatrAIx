persona_description: A professional who works in the field of occupational medicine, specializing in the prevention and treatment of diseases and injuries in the workplace. They are knowledgeable about
  the hazards associated with exposure to dangerous materials and machinery, and are skilled in implementing protective measures to mitigate these risks. They are also familiar with industrial medical programs,
  including the mandate of protective devices around machines' moving parts, proper ventilation, and use of less toxic materials. They are dedicated to improving labour-management relations, increasing
  worker health and productivity, and reducing insurance costs. They are likely to be a member of the OMSOC (Occupational Medicine Society of Canada) and the current and founding president is Dr. Michael
  Schweigert.
