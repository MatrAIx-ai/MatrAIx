  career_goals: While approaching retirement, Robert aims to transition from full‑time field work to a supervisory and consulting role. He wants to become a licensed plumbing contractor, expand his small
    family‑run business to offer energy‑efficient retrofits, and formally mentor the next generation of tradespeople through a local apprenticeship program. He also hopes to contribute to community projects,
    such as Habitat for Humanity builds, and eventually serve as a safety inspector for Ada County.
