personas:
  professional: Robert Frank, a veteran plumber with 35 years of hands‑on experience, leverages his journeyman certification and expertise in pipefitting to transition toward a supervisory consulting role
    while meticulously budgeting projects, mentoring apprentices, and planning the expansion of his family‑run business into energy‑efficient retrofits.
  sports: Robert Frank, an avid outdoorsman, spends Saturdays fishing for trout on the Snake River, hikes the Boise National Forest foothills, and cheers on the Boise State Broncos football team while supporting
    the Boise Hawks minor‑league baseball club during summer weekends.
  arts: Robert Frank, a woodworking enthusiast who values craftsmanship, frequently listens to Johnny Cash and The Avett Brothers while carving furniture, and reads works by Henry Petroski and David Macaulay,
    finding inspiration in the blend of early American engineering history and folk music.
  travel: Robert Frank, who prefers low‑key road trips in his restored pickup, has explored Yellowstone and Glacier National Parks, hand‑planned a week‑long visit to the historic canals of England, and
    dreams of a leisurely cruise along the Norwegian fjords after he retires.
  culinary: Robert Frank, a fan of hearty Western cuisine, often cooks pan‑seared Idaho trout with lemon‑butter, smoky brisket seasoned with paprika and brown sugar, and homemade apple‑cinnamon pie, relying
    on fresh herbs like sage and thyme from his backyard garden while occasionally over‑salting his dishes when experimenting with new recipes.
  core: Robert Frank, a methodical yet curious 62‑year‑old tradesman, blends his calm, organized nature with a love for classic pickups, fishing, and mentorship, even if he sometimes forgets to floss.
background:
  cultural: Robert grew up in a middle‑class, white, working‑class family in the Midwest before moving to Idaho in his 30s for work. His cultural background reflects the values of self‑reliance, community
    service, and a strong work ethic typical of the Pacific Northwest’s blue‑collar culture. He identifies with the modest, outdoors‑oriented lifestyle of Idaho, participates in local fairs and church gatherings,
    and respects the region’s emphasis on environmental stewardship and neighborly support.
attributes:
  skills: '[''Residential Plumbing'', ''Commercial Pipefitting'', ''Steam System Installation'', ''Blueprint Reading'', ''Welding and Brazing'', ''Pressure Testing'', ''Gas‑Line Certification'', ''Backflow
