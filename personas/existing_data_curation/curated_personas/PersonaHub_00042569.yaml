persona_description: A researcher who is interested in the study of Alzheimer's disease and its environmental and genetic causes. They are looking for ways to identify people at risk of developing the disease
  and develop diagnostic markers to detect it earlier. They are using the anonymous DNA database collected for the Personalized Medicine Research Project (PMRP) to search for Alzheimer's disease study participants.
  They are also interested in studying the role of specific genes in the disease process and the potential environmental factors that contribute to it.
