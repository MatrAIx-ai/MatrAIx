personas:
  professional: Fadi Fulton is a self‑taught digital concept artist and speculative writer who blends Python‑driven generative visuals with ambient soundscapes, crafting mood boards and story outlines for
    indie game ideas while preparing a portfolio for a BFA program or a digital arts bootcamp.
  sports: Fadi Fulton stays active by strolling the wetlands of Belle Glade, paddling with the Belle Glade Community Kayak Club in winter, follows the Miami Heat for NBA excitement, cheers for the Miami
    Dolphins during football season, and joins a casual pickup basketball game at the local park when the weather allows.
  arts: Fadi Fulton draws inspiration from ambient pioneers like Brian Eno and Aphex Twin, visual innovators such as James Turrell and Beeple, reads speculative fiction by Philip K. Dick and Ursula K. Le
    Guin, and studies digital painting techniques from artists like Greg Rutkowski, weaving these influences into their own generative art and short prose.
  travel: Fadi Fulton prefers solitary, low‑budget trips that blend nature and tech, having camped under the stars in Everglades National Park, explored the pastel streets of Key West, dreams of chasing
    the midnight sun in Iceland’s Golden Circle, and plans a future pilgrimage to Kyoto’s temples to study traditional art and modern pop culture.
  culinary: Fadi Fulton enjoys cooking simple coastal dishes like grilled mahi‑mahi tacos with mango salsa, stone crab bisque with fresh herbs, and spicy citrus‑marinated shrimp, has a moderate skill level
    that lets them experiment with seasonal Florida produce such as avocado and papaya while pairing meals with ambient tracks they compose.
  core: Fadi Fulton is a calm, solitary creator who obsessively arranges ambient lighting for their workspace, procrastinates on deadlines, and turns every sunset over Lake Okeechobee into a canvas for
    generative art.
background:
  cultural: Fadi grew up in a predominantly white, middle‑class family in Belle Glade, a small agricultural community in Palm Beach County, Florida. The region’s blend of rural Southern sensibilities and
    the multicultural rhythms of nearby Haitian and Hispanic neighborhoods gave him exposure to diverse music, food, and informal storytelling traditions. While his family emphasized independence and self‑reliance,
    the local community’s connection to the Everglades and Lake Okeechobee nurtured an appreciation for the natural world and its seasonal changes. This backdrop, combined with easy online access to global
    art and tech cultures, shapes his identity as a solitary, digitally‑savvy creator who blends local environmental influences with broader, avant‑garde artistic currents.
attributes:
  skills: '["Digital illustration (Procreate, Photoshop)", "Concept art and visual storytelling", "Creative writing (speculative fiction, poetry)", "Python programming (basic scripting, generative art)",
    "Critical thinking and logical analysis", "Independent research on abstract concepts", "Experimental photography", "Ambient sound design"]'
  hobbies: '["Reading sci‑fi and philosophy", "Creative writing (short stories, poetry)", "Digital illustration and concept art", "Solo video gaming (world‑building, puzzle)", "Photography of natural landscapes",
    "Generative art coding", "Ambient soundscape creation", "Stargazing and nature walks"]'
  career_goals: Fadi intends to turn his eclectic creative abilities into a sustainable, independent career. He plans to build a portfolio that showcases his concept art and narrative work, aiming for acceptance
    into a BFA program or a specialized digital arts bootcamp that offers scholarships. In the medium term, he hopes to release a small indie video game that merges his storytelling, visual art, and procedural
    generation scripts, while monetizing his digital illustrations through online marketplaces and commissions. He also aspires to publish a collection of speculative fiction online, establishing a reputation
    as a thought‑provoking creator who operates outside conventional studio structures.
