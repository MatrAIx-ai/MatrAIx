personas:
  professional: Gregorio Diaz is a veteran chef who integrates his deep knowledge of traditional family recipes with cutting‑edge techniques, turning menu planning into a disciplined yet flexible art form,
    and leading his kitchen team with patient, collaborative mentorship.
  sports: Gregorio Diaz enjoys daily morning walks along the Bronx River, participates in weekly pick‑up basketball games at the local recreation center, and faithfully watches the New York Yankees, attending
    at least two home games each season.
  arts: Gregorio Diaz paints vivid abstract canvases inspired by the colors on his plates, photographs bustling street food scenes with a vintage Nikon, plays jazz standards by Miles Davis and John Coltrane
    on a well‑worn keyboard, and curates a personal collection of works by contemporary artists such as Ai Weiwei and Kehinde Wiley.
  travel: Gregorio Diaz favors culturally immersive trips, having explored Oaxaca’s cuisine, Sicily’s citrus groves, and Marrakech’s spice markets, and he plans future visits to Pacific Northwest vineyards
    while balancing travel with his restaurant’s launch timeline and family responsibilities.
  culinary: Gregorio Diaz creates signature dishes like spiced pork shoulder with a citrus glaze, coconut‑infused rice topped with a pepper‑bright herb relish, and caramelized plantain mash, employing sous‑vide
    precision, artisanal plating, and flavor layering with ingredients such as cilantro, habanero, lime, vanilla bean, and smoked paprika.
  core: Gregorio Diaz blends culinary artistry with community mentorship, balancing meticulous planning and spontaneous creativity while navigating health and finance with humor and a collaborative spirit.
background:
  cultural: 'Gregorio was raised in a close‑knit Dominican family that celebrated vibrant culinary traditions, Catholic holidays, and Afro‑Caribbean rhythms. His early memories are filled with the aromas
    of sancocho, mangú, and plantains cooked by his mother and grandparents. After moving to the Bronx as a teenager, he retained strong ties to his heritage, participating in local Dominican community
    events and preserving the language, music, and food customs of his homeland. This bicultural experience shapes his identity: he blends the warmth and communal spirit of Dominican culture with the diverse,
    dynamic environment of New York City, channeling both into his cooking and creative pursuits.'
attributes:
  skills: '["Caribbean and Latin American cuisine expertise","Creative recipe development and flavor pairing","Advanced culinary techniques (sous‑vide, grilling, artisanal plating)","Menu planning and design","Kitchen
