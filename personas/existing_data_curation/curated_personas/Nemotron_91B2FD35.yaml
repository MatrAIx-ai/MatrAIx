  hobbies: '[''Amateur Soccer (community league)'', ''Salsa and Cumbia Dance'', ''Traditional Salvadoran Cooking'', ''Gardening (tomatoes, chilies)'', ''Hiking (Sierra Nevada foothills)'', ''Financial‑Literacy
