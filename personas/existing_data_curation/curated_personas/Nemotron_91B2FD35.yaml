  career_goals: Looking ahead, Manuel aims to leverage his extensive experience to transition into a semi‑retired consulting role that allows him to mentor the next generation of accountants while providing
    tailored financial advisory services to small‑business owners and agricultural enterprises in the Tulare County area. He is pursuing continued CPA education to stay current with evolving tax codes and
    hopes to launch a boutique firm that offers bilingual tax and audit services for the local Latino community. Additionally, he aspires to develop and lead financial‑literacy workshops at the community
    center, thereby giving back and cementing his legacy as a trusted advisor.
