  career_goals: Aristides aims to advance to a supervisory or managerial role within his current establishment, earn a certified mixology credential, and eventually open a small family‑run Mexican taquería
    or bar that showcases his heritage and love for art. He also wants to mentor younger coworkers, possibly teach community cooking classes, and become a cultural ambassador who highlights Mexican cuisine
    and artistic expression in his New Jersey community.
