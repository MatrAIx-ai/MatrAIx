personas:
  professional: Norma Smith is a budding communications enthusiast who leverages her natural charisma, event‑coordination experience from volleyball tournaments and dance‑practice sessions, and savvy social‑media
    editing skills to craft engaging flyers and promotional videos, while navigating the tension between her love of structure and her habit of last‑minute planning.
  sports: Norma Smith thrives in the co‑ed volleyball league at Orange Park Community Center, cheers for the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp while swimming laps at the community pool
    each summer, and channels her competitive spirit into informal beach‑volleyball games with friends, even though she occasionally skips warm‑ups due to a rushed schedule.
  arts: Norma Smith channels her love of movement through hip‑hop and contemporary dance classes, idolizes choreographers like Timo Pärssinen and musicians such as Beyoncé and Liz Lowe, curates TikTok compilations
    of her dance routines set to trending tracks, and winds down by binge‑watching teen dramas like ‘Riverdale’ and ‘Euphoria’ while sketching storyboards in her notebook.
  travel: Norma Smith prefers short, budget‑friendly road trips with friends, having already explored historic St. Augustine and the beaches of Amelia Island, while dreaming of a spring break adventure
    to Orlando’s theme parks and a future solo backpacking stint through New York City’s art districts, always planning trips via group chats and sharing itineraries on Instagram Stories.
  culinary: Norma Smith favors comfort foods like chicken tenders, loaded nachos, and shrimp po’boy sandwiches, enjoys sipping bubble tea with tapioca pearls, and experiments with easy TikTok recipe hacks
    for avocado toast and microwave mug brownies, though she often orders takeout instead of cooking due to her late‑night gaming habit.
  core: Norma Smith blends an energetic, people‑centric spirit with a penchant for last‑minute planning, juggling volleyball, dance, and social‑media creation while battling anxiety‑fuelled worry and occasional
    procrastination.
background:
  cultural: Norma grew up in the suburban neighborhood of Orange Park, FL, a community that blends Southern hospitality with the laid-back vibe of the Atlantic coast. Her family belongs to the white, middle-class
    demographic typical of Clay County, and her upbringing included participation in a local Baptist church's youth group, where she learned the value of community service and regular Sunday gatherings.
    The region's cultural rhythm—early morning beach trips, weekend fishing outings, and a strong emphasis on friendly neighborly interaction—has shaped her outlook, making her comfortable in both informal
    gatherings and more structured community events. Exposure to Jacksonville's diverse arts scene, such as outdoor concerts and cultural festivals, has broadened her appreciation for different forms of
    expression, while the area's emphasis on family-oriented recreation has reinforced her love for group sports and collaborative activities.
attributes:
  skills: '[''Interpersonal Communication'', ''Team Leadership'', ''Event Coordination'', ''Social Media Content Creation'', ''Basic Computer Literacy'', ''First Aid'', ''Conflict Resolution'', ''Adaptability'']'
  hobbies: '[''Volleyball'', ''Hip-hop Dance'', ''Social Media Content Creation'', ''Streaming TV Shows'', ''Journaling'', ''Animal Shelter Volunteering'', ''Swimming'', ''Multiplayer Video Gaming'']'
  career_goals: Norma is determined to finish her high-school equivalency (GED) within the next twelve months so she can enroll in a community-college program focused on communications and hospitality management.
    Her immediate goal is to secure an entry-level position at a local hotel or tourism office, where the structured environment and clear customer-service protocols align with her preference for predictable
    routines. In the longer term, she hopes to combine her love for people and event planning by becoming a community-events coordinator for a nonprofit organization in the Jacksonville-area, organizing
    youth-focused programs, festivals, and volunteer drives. Additionally, she aspires to develop a small online presence—leveraging her social-media skills—to promote mental-health awareness among teens,
    drawing on her personal experience with worry and stress.
