personas:
  professional: Janice Davis, a seasoned instructional designer and curriculum strategist at a community college, leverages their organized, data‑driven mindset and outgoing nature to craft hybrid learning
    experiences, mentor faculty, and champion grant proposals for a new Center for Teaching Excellence, all while adhering to a meticulously planned agenda.
  sports: Janice Davis, a devoted fan of the Dallas Cowboys and Texas Rangers, joins the Granbury Hiking Club for sunrise trail walks, participates in community line‑dancing events, and follows the Austin
    FC soccer schedule on off‑season evenings, blending structured fitness with social sports enthusiasm.
  arts: Janice Davis, an avid book‑club member who devours historical fiction by Philippa Gregory and Ken Follett, regularly attends community theater productions at the Granbury Opera House, and finds
    inspiration in the storytelling songs of Willie Nelson and the vibrant paintings of Georgia O’Keeffe, weaving cultural appreciation into their social calendar.
  travel: Janice Davis, who plans each weekend road trip with a detailed itinerary, often explores Hill Country towns like Fredericksburg and New Braunfels, cherishes the historic charm of Santa Fe, and
    dreams of a relaxed wine‑tasting tour through Napa Valley once the children are grown, balancing adventure with structured planning.
  culinary: Janice Davis, a confident home chef, loves experimenting with Tex‑Mex flavors such as brisket tacos topped with homemade salsa verde and mesquite‑smoked ribs, frequently incorporates fresh cilantro,
    jalapeños, and smoked paprika, and while their grilling skills are top‑notch, they sometimes over‑salt side dishes in their enthusiasm.
  core: Janice Davis merges methodical precision with Southern hospitality, turning community‑focused educational leadership into a life‑long choreography of organized volunteering, seasoned cooking, and
    spirited social gatherings.
background:
  cultural: Janice is a white Texan whose family roots trace back to German and Irish immigrants who settled in central Texas in the early 1900s. She was raised in a small‑town environment that values community,
    hospitality, and a strong work ethic. Regular church attendance, participation in local fairs, rodeos, and holiday parades instilled a sense of Southern warmth blended with Western independence. Living
    in Granbury, she embraces the town’s historic charm, supports local businesses, and engages in civic activities that reflect the region’s blend of tradition and collaborative spirit.
