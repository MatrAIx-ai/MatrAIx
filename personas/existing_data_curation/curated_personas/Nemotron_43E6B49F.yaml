  career_goals: Janice aims to assume a department chair position within the next five years, leading a comprehensive curriculum redesign that blends hybrid and experiential learning models. She seeks to
    secure grant funding to establish a Center for Teaching Excellence that supports faculty innovation and student success. Her scholarly ambition includes publishing research on adult learner engagement
    and presenting at national education conferences. Janice also aspires to mentor early‑career faculty, expand community‑college internship pipelines, and serve on state education advisory committees,
    all while maintaining a balanced family life.
