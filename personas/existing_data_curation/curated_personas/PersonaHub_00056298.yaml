persona_description: A person with a genetic condition who is interested in avoiding passing on the condition to their children through pre-implantation genetic diagnosis/ screening (PGD/PGS). They may
  have experienced miscarriages due to the genetic condition, have a child with a serious genetic condition, or have a family history of serious genetic conditions. They are likely to be a healthcare professional,
  such as a genetic counselor or geneticist, who specializes in genetic testing and counseling for individuals with genetic conditions. They may also have a background in IVF or reproductive medicine.
