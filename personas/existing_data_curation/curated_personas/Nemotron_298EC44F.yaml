personas:
  professional: Andrew Blackett, a three-year-old with a curious mind, treats block‑building like a budding architect, and they meticulously plan each tower, organize pieces by color and shape, and insist
    on following their own construction schedule, showcasing early signs of project management and a methodical work ethic.
  sports: Andrew Blackett, a three-year-old who thrives on structured play, they join the neighborhood preschool soccer club, always line up for drills in the exact order announced, prefer solo activities
    like climbing the indoor play structure, and show a competitive streak by racing friends to the finish line while still favoring small‑group sessions over large crowds.
  arts: Andrew Blackett, a three-year-old who delights in finger painting, they arrange crayons in alphabetical rows, enjoy listening to Mozart and Disney soundtracks, and often re‑create the same simple
    drawings to perfect details, reflecting an appreciation for art, new ideas, and a methodical approach to creative expression.
  travel: Andrew Blackett, a three-year-old who loves short road trips to the nearby botanical garden, they prefer itineraries that include a predictable nap time, choose destinations featuring interactive
    exhibits like the children's farm, and dream of visiting the coast of Maine for its salty air while staying within a family‑friendly budget.
  culinary: Andrew Blackett, a three-year-old who favors creamy mac‑and‑cheese, neat bite‑sized chicken nuggets, and crisp apple slices, they insist on meals served on a divided plate with each food in
    its own compartment, occasionally rebel against broccoli but will eat peas if they’re painted green like tiny marbles.
  core: Andrew Blackett, a three-year-old whose curiosity, methodical nature, and calm competitiveness shape a life of organized play, early financial savvy, disciplined health routines, solo‑friendly sports,
    meticulous art, structured mini‑adventures, and picky yet precise eating habits.
background:
  cultural: Andrew is raised in Saint John, Indiana, a small Midwestern town in Lake County. His white, Midwestern American upbringing includes family traditions centered on Thanksgiving, Independence Day
    parades, and church community gatherings. The local culture emphasizes self‑reliance, modesty, and appreciation for local arts, which he experiences through community festivals, the nearby county museum,
    and family outings to the lake. These influences shape his calm resilience and respect for both routine and creative expression.
