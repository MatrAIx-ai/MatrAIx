personas:
  professional: John Gowen is a retail professional who leverages his calm demeanor, strong inventory‑control abilities, persuasive sales techniques, and data‑driven merchandising ideas to streamline store
    operations while mentoring new staff, thriving on the routine and hands‑on problem solving that his practical mindset craves.
  sports: John Gowen is an avid Texas sports fan who watches the Dallas Cowboys and Texas Rangers weekly, spends his weekends fishing at Lake Ray Roberts with the local anglers’ club, and stays active by
    tending his garden, mowing the lawn, and joining casual pickup basketball games at the community gym.
  arts: John Gowen enjoys the simple pleasures of Texas music, regularly streaming Willie Nelson and ZZ Top while cooking BBQ, attends monthly community‑theater productions, and keeps a modest collection
    of vintage guitar picks as a reminder of his appreciation for folk artistry.
  travel: John Gowen prefers low‑key road trips that blend nature and tradition, planning spontaneous weekend getaways to Texas Hill Country vineyards, the rugged landscapes of Big Bend National Park, and
    the historic streets of Santa Fe, while staying budget‑conscious through camping and off‑season lodging.
  culinary: John Gowen is an enthusiastic backyard BBQ chef who seasons smoked brisket with a mesquite‑infused rub of paprika, brown sugar, cumin, and garlic, pairs it with classic Texas‑style pork ribs
    and corn on the cob, and delights friends with homemade coleslaw and a side of spicy jalapeño salsa.
  core: John Gowen is a calm, routine‑driven 27‑year‑old who balances low‑stress hobbies like gardening, fishing, and community‑focused retail work with a modest ambition to open a neighborhood boutique,
    all while quietly indulging in classic Texas BBQ and occasional DIY projects.
background:
  cultural: John was raised in the suburban outskirts of Dallas, in Prosper, Texas, a community known for its blend of small-town values and rapid growth. His family's cultural roots are typical of mid-Midwest
    American settlers who moved to Texas in the late 20th century, emphasizing hard work, self-reliance, and friendly hospitality. He grew up attending a local Methodist church, where community service
    and modesty were taught. The regional culture of Texas—its appreciation for outdoor activities, BBQ, and sports—has shaped his tastes and social habits. This background fosters a practical outlook,
    a preference for familiar routines, and a strong sense of neighborly responsibility, all of which surface in his personal and professional life.
attributes:
