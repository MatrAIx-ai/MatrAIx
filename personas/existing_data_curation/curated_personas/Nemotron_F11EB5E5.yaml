  hobbies: '[''Gardening'', ''Fishing'', ''Barbecue Cooking'', ''Watching Football'', ''DIY Home Projects'', ''Reading Business Nonfiction'', ''Volunteer Work at Food Bank'']'
  career_goals: John aims to build a steady career in retail management that lets him use his practical strengths and love of routine. In the next two years he hopes to be promoted to assistant store manager,
    where he can mentor newer staff and fine-tune store operations. Over the next five years he plans to become a store manager, overseeing all aspects of inventory, staffing, and customer experience while
    maintaining a harmonious workplace. Ultimately, he dreams of opening a modest, community-oriented boutique or convenience store in the Prosper area, where he can set his own schedules, implement straightforward
    business processes, and provide a stable, friendly shopping environment for neighbors.
