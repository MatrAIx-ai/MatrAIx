  hobbies: '[''Vietnamese cooking'', ''Vegetable gardening'', ''Reading historical novels'', ''Nature walks'', ''Yoga'', ''Knitting'', ''Volunteer language exchange'']'
  career_goals: Quynh aims to attain CPCU certification within the next two years and transition into a senior claims supervisor role, where she can lead a team and implement streamlined workflows. She
    is interested in specializing in catastrophe claims, particularly those related to hurricanes in Florida, to leverage her local knowledge. Ultimately she hopes to move into risk management consulting,
    using her analytical background to help insurers reduce loss exposure, while also dedicating time to mentor emerging adjusters.
