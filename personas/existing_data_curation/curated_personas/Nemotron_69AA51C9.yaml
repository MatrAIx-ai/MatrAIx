personas:
  professional: Sabrina Rojas, a 75‑year‑old retired business administrator turned senior‑center catalyst, channels their organizing flair and bilingual storytelling talent into launching intergenerational
    art‑and‑folklore workshops that blend watercolor demonstrations, cuat‑drummed sessions, and oral‑history recordings for local children and elders alike, and they mentor younger volunteers with patient
    guidance.
  sports: Sabrina Rojas, an avid walker who logs daily forest‑trail strolls with binoculars for birdwatching, joins the local senior hiking club for quarterly treks, cheers for the San Lorenzo baseball
    team and follows the Bayamón soccer squad, and they attend low‑impact tai‑chi classes at the community center during the winter months.
  arts: Sabrina Rojas, an enthusiastic patron of the arts, attends exhibitions featuring works by Frida Kahlo and Diego Rivera, delights in listening to Juan Luis Guerra, Celia Cruz, and contemporary world‑music
    blends while strumming their cuatro, and they curate pop‑up displays of local artisans, often quoting Maya Angelou to inspire fellow seniors.
  travel: Sabrina Rojas, who enjoys leisurely travel, has explored Old San Juan’s historic forts, trekked the misty trails of the Sierra Nevada de Santa Marta, taken a river cruise through the Amazon basin,
    and they dream of photographing cherry blossoms in Kyoto during spring while traveling with a small group of friends on a budget‑friendly itinerary.
  culinary: Sabrina Rojas, a seasoned cook, perfects arroz con gandules and arroz con pollo using sofrito, recado rojo, and locally sourced pigeon peas, experiments with adobo‑marinated pork, and they delight
    guests with freshly baked pan de guiro, while admitting a guilty pleasure for extra‑sweet plantain fritters after community gatherings.
  core: Sabrina Rojas, a 75‑year‑old curiosity‑driven community muse, constantly hums salsa while sketching clouds, forgets where they put their glasses but never misplaces a paintbrush, and they balance
    calm resilience with occasional stubbornness about festival decorations.
background:
  cultural: Sabrina was born and raised in the mountainous region of San Lorenzo within the Cayey municipality, a community known for its coffee plantations and close‑knit neighborhood life. Growing up
    in a traditional Puerto Rican household, she was immersed in Spanish‑language customs, Catholic celebrations, and the island’s rich musical heritage, especially the rhythms of plena and bomba. Her family
    emphasized the importance of oral storytelling, which she continues to practice as a way of preserving the island’s folklore and the personal histories of her neighbors. The values of respeto (respect)
    and solidaridad (solidarity) shaped her compassionate yet self‑advocating personality. While she embraces the island’s colonial history and Afro‑Caribbean influences, she also welcomes contemporary
    global ideas, reflecting her open‑minded curiosity. The strong intergenerational bonds in her community and the warm hospitality of San Lorenzo's residents have reinforced her sociable, outgoing nature,
    and her lifelong commitment to cultural preservation and communal well‑being.
