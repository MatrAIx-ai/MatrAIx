    theater'']'
  career_goals: Although she is no longer part of the formal workforce, Sabrina remains driven by a desire to contribute meaningfully to her community. Her primary goal is to launch an intergenerational
    art and storytelling program at the San Lorenzo senior center, where elders can share folklore, music, and crafts with school‑aged children. She also aspires to document the oral histories of longtime
    residents of Cayey municipality through a series of audio recordings and a community‑published anthology. Continuing her personal curiosity, she plans to enroll in online courses on contemporary art
    movements and digital archiving. Sabrina hopes to mentor younger volunteers, especially women, fostering leadership and confidence. Finally, she wishes to maintain her physical health through regular
    walks in the mountainous countryside, ensuring she can sustain her active involvement for years to come.
