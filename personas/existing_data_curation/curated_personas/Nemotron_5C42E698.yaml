  hobbies: '[''softball league'', ''bowling nights'', ''community gardening'', ''woodworking'', ''vintage motorcycle restoration'', ''classic rock music'', ''football watching'', ''stress‑management reading'']'
  career_goals: Henry aims to move into a supervisory role within the next few years, targeting a shift supervisor or plant foreman position that offers a formal certification such as Certified Plant Operator
    (CPO) and an OSHA 30‑hour trainer credential. He wants to mentor younger workers, lead initiatives that boost plant efficiency, and secure a stable pension for his family. Long‑term, he envisions launching
    a modest side business repairing and refurbishing industrial equipment for local contractors, turning his expertise into a legacy venture while eventually transitioning toward a comfortable retirement.
