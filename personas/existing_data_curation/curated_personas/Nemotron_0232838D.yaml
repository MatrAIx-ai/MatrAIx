  career_goals: Although retired, Janie remains driven to leave a lasting legacy in her community. She aims to compile a locally focused history of Rocky River, publishing a memoir that weaves personal
    anecdotes with broader historical narratives. She also aspires to mentor younger volunteers at the senior center, develop a genealogy workshop series, and learn digital storytelling tools so she can
    share her research online. Her ultimate ambition is to foster intergenerational connections and ensure that the town’s cultural memory is preserved for future residents.
