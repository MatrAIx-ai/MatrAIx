  career_goals: David aims to transition from employee to owner‑operator by obtaining a licensed general contractor credential and building a small, reputable painting company in Fort Lauderdale. He hopes
    to specialize in eco‑friendly and decorative finishes, gaining certifications such as the Certified Paint Professional designation. Over the next five years, he envisions hiring and mentoring two to
    three apprentices, expanding his service portfolio to include light remodels, and establishing a steady client base that reduces financial stress. Ultimately, he wants his business to be known for reliability,
    quality, and community involvement, allowing him greater financial independence and the ability to support family and community initiatives.
