personas:
  professional: David Jenkins, a seasoned painter and paperhanger at 34, applies his efficiency-driven work ethic and curiosity for low-VOC, faux, and airless-spray techniques to manage crews and client
    expectations while flexibly adapting on-site, and they channel their outgoing, choir-singing spirit into building a community-focused contracting firm.
  sports: David Jenkins, an avid participant in weekly community basketball games, beach volleyball matches at Fort Lauderdale's Boardwalk Club, and sunrise jogs along the Intracoastal, cheers for the Miami
    Heat and Miami Dolphins while regularly hitting the gym for weight training.
  arts: David Jenkins, who spends evenings crafting vibrant canvases and neighborhood murals inspired by graffiti legends like Jean-Michel Basquiat and the soulful sounds of Kendrick Lamar, Bob Marley,
    and his church choir, regularly attends hip-hop and R&B festivals to fuel his creative drive.
  travel: David Jenkins, who has explored the culinary streets of New Orleans, the historic squares of Savannah, and the beaches of Jamaica, plans to visit the Dominican Republic and Seville, Spain, favoring
    road trips that blend cultural festivals with beach downtime while budgeting around family commitments.
  culinary: David Jenkins, an accomplished home cook, regularly prepares soul-food staples such as collard greens seasoned with smoked turkey, jambalaya packed with andouille sausage, and sweet-potato pie
    topped with a dash of nutmeg, while they enjoy hosting weekend barbecues featuring slow-cooked ribs and homemade BBQ sauce.
  core: David Jenkins blends a pragmatic, community-centered work ethic with a restless curiosity for eco-friendly finishes, yet their constant worry and occasional impulse splurges on concerts reveal a
    lovable tension between ambition and anxiety.
background:
  cultural: David grew up in a multi‑generational African‑American neighborhood in Broward County, where church, family, and community events were central to daily life. His parents instilled the values
    of hard work, perseverance, and mutual support, often gathering for Sunday services at a Baptist church that doubles as a cultural hub. He celebrates traditions such as cook‑outs featuring barbeque
    and Southern‑style dishes, and he carries the rhythmic influence of gospel, hip‑hop, and Caribbean sounds that permeate Fort Lauderdale’s diverse music scene. Being part of the local Black community,
    he maintains strong ties with neighbors, participates in neighborhood clean‑up projects, and mentors younger residents interested in trades, reflecting both his cultural pride and commitment to uplift
    his community.
