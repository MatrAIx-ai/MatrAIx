personas:
  professional: Rosemary Rabb, a budding marine enthusiast and junior coder, combines a love for ocean science with a knack for creating simple Scratch games that teach peers about coral reefs, channeling
    their curiosity and practical mindset into educational projects.
  sports: Rosemary Rabb plays for the Cape Coral Junior Soccer Club, dashes around the field with the same energy they bring to school recess, and cheers for the Tampa Bay Lightning, embodying a social,
    team‑oriented fitness routine.
  arts: Rosemary Rabb delights in sketching kelp forests inspired by marine artist Wyland, stages enthusiastic performances in the school drama club’s production of 'The Little Mermaid', and sings along
    to Disney soundtracks like 'Moana', blending artistic expression with their love for the ocean.
  travel: Rosemary Rabb enjoys weekend trips to the mangroves of the Everglades and beach picnics at Sanibel Island, while dreaming of snorkeling in the Bahamas and exploring the tide pools of Monterey
    Bay, preferring family‑guided outings that balance adventure with familiar hospitality.
  culinary: Rosemary Rabb loves baking vanilla cupcakes topped with rainbow sprinkles, experiments with fish‑free 'sea‑food' pasta using kelp noodles and shrimp‑flavored broth, and eagerly samples fresh
    key lime pie, showcasing a playful yet practical palate.
  core: Rosemary Rabb is a talkative, ocean‑obsessed ten‑year‑old who turns every recess into a mini‑science lesson, forgets to finish homework when a new tide‑pool find captivates them, and always leaves
    a trail of cupcake crumbs.
background:
  cultural: Rosemary is a white American child raised in Cape Coral, Florida, a city built around a network of canals and known for its boating and outdoor lifestyle. Her family embraces Southern hospitality,
    community involvement, and a strong appreciation for the coastal environment. She frequently participates in local festivals, beach clean-ups, and school activities that reflect the diverse cultural
    influences of Southwest Florida, including Hispanic and Caribbean traditions. This blend of friendly community values, outdoor recreation, and environmental stewardship shapes her outlook and daily
    life.
