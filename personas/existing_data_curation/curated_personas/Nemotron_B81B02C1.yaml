personas:
  professional: Michele Wallace, a 27‑year‑old industrial maintenance specialist, combines methodical precision with an imaginative, cost‑saving mindset to diagnose, repair, and upgrade HVAC, electrical,
    and plumbing systems—often integrating renewable‑energy components and novel materials while leading small crews toward her goal of becoming a Master HVAC technician and future foreman.
  sports: Michele Wallace hikes the Appalachian foothills with her husband most weekends, participates in a local trail‑running club during the spring, cheers the Carolina Panthers in football season and
    the Charlotte Hornets on basketball nights, and only dabbles in organized sports beyond occasional rock‑climbing sessions.
  arts: Michele Wallace pours her curiosity into abstract expressionist canvases reminiscent of Joan Mitchell, regularly explores exhibitions at the Asheville Art Museum featuring works by Jackson Pollock,
    volunteers as a set painter for the local community theater where they admire the performances of playwright Sarah Rutherford, and winds down listening to Björk’s experimental albums while sketching
    speculative‑fiction characters.
  travel: Michele Wallace favors meticulously planned eco‑focused road trips, having driven the Blue Ridge Parkway to photograph sunrise mist and trekked Iceland’s geothermal sites for inspiration, while
    expressing a bucket‑list yearning to explore Japan’s art islands of Naoshima and the sustainable farms of New Zealand when family finances allow.
  culinary: Michele Wallace enjoys crafting plant‑forward meals like a roasted beet‑quinoa salad with goat cheese, candied pecans, and tahini‑lemon dressing, experiments with mixed‑media in the kitchen
    by combining smoked paprika‑spiced chickpea stew with fresh kale, and occasionally treats themselves to a cauliflower‑crust pizza topped with smoked mozzarella, basil, and cherry tomatoes, though their
    sous‑vide attempts still leave them slightly impatient.
  core: Michele Wallace blends disciplined, methodical expertise in industrial maintenance with a boundless artistic imagination, balancing competitive ambition and chronic anxiety through yoga, abstract
    painting, and a fervent pursuit of sustainable, eco‑centric innovations.
background:
  cultural: Michele grew up in Albertville, Alabama, within a close‑knit white Southern community that values family, faith, and hard work. Her upbringing emphasized self‑reliance, community service, and
    a respect for tradition, while her education and personal interests have nurtured an openness to new ideas and artistic expression. She maintains strong ties to local cultural events, church gatherings,
    and regional celebrations, yet she also embraces contemporary, forward‑thinking perspectives, reflecting a blend of traditional Southern hospitality and modern curiosity.
attributes:
  skills: '["HVAC installation and maintenance", "Electrical systems troubleshooting", "Plumbing repairs", "Preventive maintenance planning", "Technical blueprint interpretation", "Tool and equipment management",
    "Safety regulation compliance", "Customer communication and service", "Team coordination and leadership", "Creative problem solving"]'
  hobbies: '["Abstract painting and sketching", "Community theater participation", "Volunteer home‑repair projects", "Yoga and mindfulness journaling", "Hiking in the Appalachian foothills", "Reading speculative
    fiction", "Listening to science and technology podcasts"]'
  career_goals: Michele aims to become a certified Master HVAC technician and eventually obtain journeyman electrician credentials, positioning herself for a foreman role within her company. She longs to
    lead a high‑performing maintenance crew, mentor new hires, and spearhead projects that integrate renewable energy solutions such as solar‑thermal heating. In the longer term, she envisions launching
    her own small‑scale, customer‑focused installation and repair business that emphasizes sustainable practices and innovative design, while maintaining a stable schedule that supports her mental well‑being
    and family life.
