personas:
  professional: Sean Salman leverages a decade of hands‑on cleaning expertise to lead facility crews with a blend of curiosity‑driven green‑cleaning innovations and no‑nonsense operational efficiency, using
    they straightforward communication to keep tenants satisfied while pursuing OSHA and IICRC certifications.
  sports: Sean Salman maintains a low‑key fitness regimen that includes early morning jogs along the Passaic River, occasional pickup basketball games with close friends, and avidly follows the New York
    Knicks and Newark Ironbound baseball club for community spirit.
  arts: Sean Salman finds creative respite in building detailed scale models of vintage aircraft while they frequently stream documentary series by Ken Burns, enjoy the cinematic storytelling of Christopher
    Nolan, and attend occasional performances at the Newark Museum’s lecture series.
  travel: Sean Salman prefers concise weekend getaways to places like the Adirondacks for hiking and the historic streets of Philadelphia to explore early American architecture, planning trips with a spreadsheet
    to maximize limited vacation time while they dream of a future eco‑tour of the Swedish archipelago.
  culinary: Sean Salman favors low‑maintenance, nutritious meals such as quinoa‑based salads with roasted kale, grilled salmon, and a dash of lemon‑dill sauce, often cooking with fresh herbs from their
    balcony garden and experimenting with homemade compost‑infused vegetable broth.
  core: Sean Salman balances a DIY curiosity with pragmatic stewardship, often juggling eco‑cleaning projects, model‑building intricacies, and disciplined budgeting while they occasionally over‑organize
    their pantry and forget to relax fully.
background:
  cultural: Sean comes from a white, working‑class family that has lived in the Newark area for generations. Raised in a modest home in Essex County, he grew up surrounded by a diverse urban environment
    but was steeped in the values of hard work, reliability, and community responsibility common among the region’s blue‑collar families. His family’s cultural traditions include simple, home‑cooked meals,
    regular attendance at a local Protestant church, and participation in neighborhood events. The multicultural setting of Newark exposed him to a range of perspectives, fostering a practical openness
    to new ideas while retaining his own cultural identity. This background informs his pragmatic outlook, his emphasis on stability for his married life, and his appreciation for straightforward, cooperative
    interactions.
attributes:
  skills: '[''Commercial Cleaning Procedures'', ''Chemical Safety Management'', ''Equipment Operation (Ride‑on Floor Scrubbers, Pressure Washers)'', ''Inventory Control'', ''Regulatory Compliance (OSHA,
