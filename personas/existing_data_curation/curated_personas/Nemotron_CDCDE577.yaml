  hobbies: '[''Reading non-fiction (history, technology, DIY)'', ''Scale model building (airplanes, ships)'', ''Balcony gardening and composting'', ''Watching documentaries'', ''Listening to podcasts (urban
    development, environmental science)'', ''DIY home improvement projects'', ''Board game evenings with close friends'']'
  career_goals: Sean aspires to transition from a hands‑on cleaning role to a supervisory position within facilities management. He plans to obtain certifications such as the IICRC Cleaning Technician and
    OSHA 30‑Hour. Over the next five years he aims to become a Facilities Operations Supervisor, overseeing multiple properties and implementing efficiency initiatives, particularly around sustainable cleaning.
    He is also considering a modest entrepreneurial step—starting a small, eco‑friendly cleaning service that serves local businesses, leveraging his expertise and desire for stable family income. Continuing
    education, such as a bachelor’s degree in Facility Management or Business Administration, is part of his long‑term plan.
