persona_description: A neuroscientist or psychologist who specializes in the study of the complex biological mechanisms underlying violence, particularly sex differences in brain structure, function, and
  connectivity. They are interested in the genetic, environmental, and hormonal factors that contribute to the development of violent behaviors and the ways in which these factors can be modified by exposure
  to stress and abuse. They are likely to be familiar with the work of Mary Ellen O'Toole, the Editor-in-Chief of Violence and Gender, and the results of the new paper in the journal.
