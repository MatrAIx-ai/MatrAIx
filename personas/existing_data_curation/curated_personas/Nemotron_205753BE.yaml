personas:
  professional: Claudia Romero, a seasoned HR professional with three decades of expertise in employee relations, talent acquisition, benefits administration, and compliance, leverages bilingual fluency,
    meticulous organization, and an artistic eye to design inclusive wellness programs, mediate conflicts with assertive empathy, and pursue her SHRM‑SCP certification while eyeing an HR Director role that
    integrates mental‑health resources and arts‑based engagement across the organization.
  sports: Claudia Romero enjoys early morning walks along the Gulf beaches with her husband, plays a weekly pickleball game at her community center, follows the Tampa Bay Buccaneers and supports the local
    Naples Soccer Club, and incorporates gentle yoga sessions into her fitness routine to manage stress and maintain flexibility.
  arts: Claudia Romero spends weekends exploring the Naples Museum of Art, paints delicate watercolors of sunrise over the Gulf, volunteers to design sets for community theater productions, and finds inspiration
    in the works of Frida Kahlo and Claude Monet, often weaving these artistic influences into workplace cultural events she curates.
  travel: Claudia Romero favors relaxed, culturally immersive trips, having revisited Oaxaca for its vibrant markets and festivals, treasured a recent sailing excursion through the Florida Keys, and dreams
    of strolling the canals of Venice while sampling local seafood, always planning itineraries months ahead to balance adventure with comfort.
  culinary: Claudia Romero prepares traditional Mexican mole poblano and chiles en nogada for family gatherings, experiments with Gulf shrimp ceviche and blackened grouper, prefers using fresh cilantro,
    epazote, and lime, and rates herself as a confident home cook who enjoys teaching younger relatives the art of salsa‑making.
  core: Claudia Romero, a 59‑year‑old bilingual HR veteran, blends artistic curiosity, meticulous organization, and a tender struggle with anxiety to champion compassionate workplace cultures and a vibrant,
    flavor‑filled personal life.
background:
  cultural: Claudia was raised in a Mexican‑American household in the Southwest United States, where Spanish was spoken daily and Mexican traditions were celebrated. Her family maintains strong ties to
    their Mexican heritage through festivities such as Día de los Muertos, quinceañeras, and traditional music. The values of familismo, respeto, and hospitality shape her interpersonal style. Living in
    Naples, Florida, she blends her cultural roots with the local coastal lifestyle, participating in the city’s vibrant multicultural events and serving as a bridge between her Mexican community and the
    broader Floridian society. Her bilingual ability and appreciation for Mexican folk art, like Talavera pottery, inform both her personal and professional engagements.
