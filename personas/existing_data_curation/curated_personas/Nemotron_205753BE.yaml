  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Community theater attendance'', ''Cooking Mexican cuisine'', ''Gardening'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Volunteering
    at cultural festivals'', ''Beach walking'', ''Birdwatching'']'
  career_goals: She aims to advance to an HR Director role where she can lead strategic initiatives on employee well‑being and cultural inclusion, especially integrating mental‑health resources and arts‑based
    engagement programs. Claudia also plans to earn her SHRM‑SCP certification and mentor emerging HR professionals in the Southwest Florida community. In the longer term, she envisions transitioning to
    a consultancy focused on building compassionate, culturally responsive workplace cultures for mid‑size firms.
