persona_description: A scientist who studies the immune system and cancer, focusing on the interaction between tumour antigens and immune cells. This scientist has expertise in immunology, cancer biology,
  and immunotherapy. They are interested in the role of neoantigens in immune response and the potential negative effects of persistent antigen exposure on T cells. They have conducted research on lung
  cancer, animal models, and patients with chronic infections, and are currently studying the balance between early and late differentiated T cells in tumours. They are looking for insights into how neoantigen
  presentation can be a double-edged sword in cancer treatment.
