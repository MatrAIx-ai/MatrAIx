personas:
  professional: Tyrica Gibson, a 22‑year‑old freelance interviewer, leverages her sharp skepticism and adaptable questioning style to extract depth from subjects while juggling college coursework and a
    relaxed approach to deadlines, using tools like Adobe Audition and Google Suite to produce polished audio pieces.
  sports: Tyrica Gibson, a 22‑year‑old aspiring journalist, enjoys casual basketball games at the community center, follows the Dallas Mavericks and Dallas Cowboys, and participates in a local weekend running
    club that meets at a park near her hometown, though she often skips workouts when deadlines loom.
  arts: Tyrica Gibson, a 22‑year‑old interview‑focused storyteller, immerses herself in contemporary R&B and hip‑hop artists like H.E.R., Anderson .Paak, and Kendrick Lamar, stays inspired by documentary
    filmmakers such as Ava DuVernay, and channels her creative energy into poetry that blends spoken‑word rhythms with personal reflections on gospel choirs and Southern soul.
  travel: Tyrica Gibson, a 22‑year‑old aspiring media producer, prefers spontaneous road trips across Texas, often detouring to Austin’s live‑music venues, exploring the historic district of Galveston,
    and dreaming of a future visit to New Orleans to experience its rich musical heritage and cuisine.
  culinary: Tyrica Gibson, a 22‑year‑old culinary experimenter, enjoys modernizing soul food by preparing miso‑glazed collard greens, a coffee‑rubbed smoked brisket, and a spiced sweet‑potato pie topped
    with candied pecans, frequently sourcing fresh produce at the local farmers’ market.
  core: Tyrica Gibson, a 22‑year‑old curiously skeptical interviewer who balances a love of soulful storytelling with a laid‑back, sometimes disorganized lifestyle, habitually worries about perfection yet
    finds relief in yoga, journaling, and spontaneous cooking sessions.
background:
  cultural: Tyrica identifies as African American and was raised in Sherman, Texas, a small town with a tight‑knit Black community. Her grandparents were part of the Great Migration, moving from rural Louisiana
    to Texas in the 1960s, and her family maintains close ties to the local church and community center where gospel music, spoken‑word events, and activism are regular fixtures. She grew up on a blend
    of Southern hospitality and Black cultural traditions—soul food cooking, holiday celebrations like Juneteenth, and a deep appreciation for hip‑hop and R&B that connect her to the wider Black diaspora.
    These cultural roots shape her worldview, inform her interview topics, and give her a strong sense of responsibility to amplify the stories of her community.
attributes:
  skills: '["interview design", "active listening", "critical questioning", "research synthesis", "audio editing", "transcription", "digital content management", "social media strategy", "basic data analysis",
