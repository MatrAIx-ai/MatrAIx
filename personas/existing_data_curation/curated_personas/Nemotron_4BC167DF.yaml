  hobbies: '["documentary watching", "non‑fiction reading", "creative writing", "spontaneous road trips", "live music shows", "yoga", "journaling", "cooking soul food", "podcast listening"]'
  career_goals: Tyrica aims to move from freelance gigs to a full‑time role at a reputable media outlet where she can produce long‑form interview‑based pieces, such as podcasts or documentary series that
    highlight underrepresented voices. In the next five years she plans to complete her bachelor's degree in journalism or communications, build a personal brand as a thoughtful and rigorous interviewer,
    and eventually take on senior producer responsibilities. Her longer‑term ambition is to launch an independent podcast network focused on stories from the Black community in the American South, using
    her critical eye to shape narratives that both challenge stereotypes and celebrate cultural richness.
