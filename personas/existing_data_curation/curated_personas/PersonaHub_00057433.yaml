persona_description: A hydrologist who specializes in the study of river flow and its impact on infrastructure such as bridges and other structures. Their expertise lies in analyzing the effects of increased
  annual peak flows on computed peak flows, specifically focusing on the effects on the 100-year flows. They are particularly interested in the impacts of freshwater withdrawals and upstream movement of
  the salt front on the river flow and its downstream effects.
