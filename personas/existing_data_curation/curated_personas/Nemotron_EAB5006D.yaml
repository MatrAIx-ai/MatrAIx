  hobbies: '[''Gardening'', ''Farm‑to‑Table Cooking'', ''Volunteer Work at Food Bank'', ''Women’s Book Club'', ''Hiking'', ''Birdwatching'', ''Road‑Trip Exploration'', ''Yoga'', ''Community Events'', ''Classic
    Rock Music'', ''Baking'', ''Herb Cultivation'']'
  career_goals: Donna aims to transition from front‑line driving to a supervisory logistics role within the next five years, such as a regional fleet coordinator or safety trainer, where she can apply her
    practical experience to improve operational efficiency and driver well‑being. She plans to complete a bachelor's degree in logistics or supply chain management and obtain the Certified Transportation
    Professional (CTP) credential. Long‑term, she dreams of launching a small, family‑owned transport service that emphasizes community employment and environmentally responsible practices, while also securing
    a stable financial future for herself and her adult children.
