  career_goals: Teran aims to move into a supervisory role within the next two years, targeting a shift‑manager or assistant‑manager position where he can apply his leadership and organizational strengths.
    He plans to earn his GED and enroll in a community‑college hospitality program to deepen his knowledge of restaurant operations and business management. Ultimately, he dreams of opening a small café
    that doubles as a local art gallery, providing a welcoming space for both coffee lovers and artists in Two Rivers. In the meantime, he hopes to formalize a mentorship program for younger servers and
    to volunteer with the Two Rivers Arts Council, merging his career with his passion for the arts.
