personas:
  professional: A seasoned front‑of‑house veteran named Teran Sims leverages three decades of waitstaff expertise, meticulous organization and calm assertiveness to mentor new servers, and they aspire to
    shift‑manager responsibilities while integrating a love for local art into restaurant operations.
  sports: Teran Sims enjoys fishing for Lake Michigan trout in summer, hikes the trails of Rock Island State Park with the local hiking club, supports the Green Bay Packers and the Milwaukee Brewers, and
    they play in a casual adult softball league on Saturdays, balancing team camaraderie with solitary outdoor pursuits.
  arts: Teran Sims frequently visits the Door County Summer Music Festival, curates a rotating display of regional paintings in their restaurant, studies works by Charles Burchfield, and they read art‑history
    books on evenings, letting the creative energy shape their conversations with guests and inspire their own photography.
  travel: Teran Sims favors weekend road trips to Door County, a nostalgic visit to Mackinac Island, occasional city breaks in Chicago, and they dream of seeing the northern lights in Iceland, planning
    trips with a mix of careful itineraries and spontaneous detours while working within a modest travel budget.
  culinary: Teran Sims is a competent home chef who loves preparing smoked Lake Michigan trout with a craft‑beer glaze, cheese‑curd pancakes, and a cranberry‑wild‑rice salad, experimenting with seasonal
    produce and local brews, and they enjoy sharing these dishes at their restaurant‑café vision, though they sometimes over‑salt their soups when preoccupied.
  core: Teran Sims blends Midwestern modesty, artistic curiosity, and steady reliability into a life that balances meticulous work, community‑focused ambitions, and the simple joy of lake sunsets and craft
    brews, and they carry this blend into every interaction.
background:
  cultural: Teran is a White Midwesterner of Anglo‑American descent, whose family roots trace back to English and Scottish immigrants who settled in the Great Lakes region in the 19th century. He grew up
    in Two Rivers, a small industrial town known for its fishing, shipbuilding, and cranberry festivals, and his upbringing reflects the classic Upper Midwest values of hard work, humility, and community
    reciprocity. He was raised in a Protestant (Lutheran) household that emphasized punctuality and modesty, yet his curiosity led him to embrace the broader cultural mosaic of Wisconsin—celebrating German
    and Scandinavian culinary traditions, local cheese and craft‑beer culture, and the region’s strong support for the arts. This blend of heritage and local tradition informs his friendly, reliable demeanor
    while also fueling his appreciation for art, music, and innovative ideas.
