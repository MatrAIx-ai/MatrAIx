personas:
  professional: Terry White is a seasoned full‑stack software engineer who leverages a humanities background to craft user‑centered designs, champion test‑driven development, and mentor junior developers
    while methodically working toward a lead architect role, balancing structured architecture with flexible problem solving to pursue technical leadership.
  sports: Terry White is a regular runner who laces up three times a week for 5‑kilometer circuits in Central Park with the Manhattan Running Club, follows the New York Knicks and Yankees closely, and occasionally
    joins a weekend pick‑up basketball game at a community center, using structured training plans to balance endurance with strength.
  arts: Terry White cultivates an artistic side through street photography inspired by Vivian Maier, frequent visits to the Met and MoMA, regular evenings at the Brooklyn Academy of Music watching productions
    such as ‘Hamilton,’ and listening to minimalist compositions by Philip Glass on vinyl, integrating these experiences into both personal expression and professional creativity.
  travel: Terry White plans trips with meticulous itineraries, favoring culturally rich cities like Paris and Kyoto for their history, while allocating weekend getaways to the Adirondack Mountains for low‑key
    hikes, balancing a modest travel budget with family responsibilities and a desire for structured exploration.
  culinary: Terry White enjoys cooking as a disciplined hobby, perfecting French sauces like béchamel for coq au vin and baking sourdough loaves using a weekly‑tended starter, while also savoring steak
    frites with herb‑buttered potatoes on Sunday dinner, reflecting an organized, recipe‑driven approach to the kitchen.
  core: Terry White is a methodical problem‑solver who balances chess strategy with city runs, yet has a habit of over‑organizing kitchen drawers and occasionally missing a therapy appointment when work
    deadlines surge.
background:
  cultural: Terry comes from a middle‑class, Anglo‑American background. His family roots trace back to New England and the Midwest, and he was raised with traditional American values of self‑reliance, punctuality,
    and respect for public institutions. Growing up, he experienced suburban community life before moving to New York City for college and his career, exposing him to the city’s vibrant cultural mosaic.
    This blend of heritage and urban experience informs his appreciation for structured routines as well as the diverse artistic expressions found in New York.
