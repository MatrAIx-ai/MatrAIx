  career_goals: Terry aims to transition into a technical leadership role such as Lead Software Architect or Engineering Manager within the next three years. He wants to shape the architecture of mission‑critical
    systems, champion best practices for code quality and reliability, and mentor the next generation of developers. He also hopes to contribute to open‑source projects focused on security and stability,
    and eventually launch a side venture that provides consulting on legacy system modernization for mid‑size firms. Maintaining a predictable work schedule that supports his family life is a core priority.
