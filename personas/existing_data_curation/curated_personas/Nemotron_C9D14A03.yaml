  career_goals: Edwin hopes to turn his interest in building and technology into a career as a mechanical engineer or robotics technician. He envisions attending a technical high school or community college
    to combine his love for hands‑on projects with formal training. In the longer term, he dreams of designing functional devices or automating simple machines, and he is also open to a future as a video
    game developer where he can create structured, immersive worlds. He values careers that allow independent work, concrete problem‑solving, and tangible results.
