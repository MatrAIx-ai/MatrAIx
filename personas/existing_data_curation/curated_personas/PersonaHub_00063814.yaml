persona_description: A cognitive psychologist who specializes in the study of reasoning and argumentation, particularly in the use of negative evidence and Gricean maxims in argumentative reasoning. Their
  research interests include the development and analysis of strategies for making inferences from limited evidence, the impact of cognitive biases and heuristics on the use of negative evidence, and the
  relationship between reasoning from lack of evidence and the strength of inferences. They are likely to be familiar with the work of Grice, the founder of the pragmatics and the theory of conversational
  implicatures, and the principles of argumentation theory, such as the use of negation and the burden of proof.
