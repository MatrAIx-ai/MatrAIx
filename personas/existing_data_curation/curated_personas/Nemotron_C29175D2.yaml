  career_goals: Christine dreams of pursuing a career that lets her help living beings and share knowledge. In the short term, she aims to maintain high grades, join the school science club, and volunteer
    at the local animal shelter to gain experience. She hopes to develop leadership skills through student council or a youth group. Long‑term, she envisions studying biology or education at a university,
    ultimately becoming a veterinarian or a middle‑school science teacher, where she can combine her love for animals, curiosity about science, and desire to mentor others.
