  career_goals: Seeking a stable, structured career, Brian plans to enroll in a community‑college trade program to become a certified HVAC technician or explore a public‑service path such as a police officer.
    He aims to obtain certification within two years, secure a full‑time position that offers clear advancement routes, and eventually move into a supervisory or leadership role where his reliability and
    competitive drive can contribute to team success.
