  career_goals: Brockford aims to transition her passion for art into a sustainable freelance career while maintaining the flexibility she values. She plans to launch an online shop for her original paintings,
    prints, and handcrafted jewelry, and to exhibit her work in local galleries and community centers. Long‑term, she hopes to open a low‑cost community art studio in Ventura where she can mentor young
    creators, especially from underrepresented backgrounds. To broaden her opportunities, she is considering completing a GED and taking short courses in digital media, but she remains focused on building
    a portfolio that reflects her unique blend of abstract concepts and cultural heritage.
