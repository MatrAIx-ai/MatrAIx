personas:
  professional: Katherine Mclarty is an aspiring visual storyteller who merges hand‑drawn sketches with digital art on a tablet, and leads a weekly school art critique circle where their curiosity and balanced
    organization keep discussions lively and inclusive.
  sports: Katherine Mclarty is a spirited soccer midfielder who plays weekly pickup games at Irving Community Park, cheers on the Dallas Cowboys and FC Dallas, and balances school fitness through a mix
    of endurance runs and occasional basketball with friends.
  arts: Katherine Mclarty is a budding illustrator who draws inspiration from Hayao Miyazaki's animated worlds, Banksy's street art, and the graphic novels of Neil Gaiman, regularly attends exhibitions
    at the Irving Contemporary Arts Center, and participates in the school drama club where they love performing scenes from musicals by Lin‑Manuel Miranda.
  travel: Katherine Mclarty is an eager explorer who dreams of visiting Tokyo’s Akihabara for its manga culture and the National Gallery in London, prefers meticulously planning trips with family using
    Google Maps, yet currently constraints keep travel limited to weekend road trips to Dallas and occasional family vacations to the beach in Galveston.
  culinary: Katherine Mclarty is a self‑taught baker who loves mixing chocolate chips into chewy cookies, frequently experiments with sushi rolls using nori and avocado, and enjoys cooking spicy tacos al
    pastor with fresh cilantro, while still relying on family meals of mac‑and‑cheese for comfort.
  core: Katherine Mclarty blends a love for sketching, soccer, and science‑fiction storytelling into a vibrant teen life, juggling late‑night art marathons with a tendency to over‑indulge in snack‑filled
    study sessions.
background:
  cultural: Katherine comes from a middle‑class, white American family that has lived in the Dallas‑Fort Worth metroplex for generations. Her upbringing blends traditional Texan customs—such as celebrating
    Thanksgiving, the Fourth of July, and attending local high‑school football games—with exposure to the multicultural tapestry of Irving, where she regularly experiences diverse cuisines, festivals, and
    community events. Her family values education, community involvement, and artistic expression, encouraging her participation in school clubs, local museum visits, and neighborhood volunteer projects.
