  career_goals: Katherine envisions a career that blends her love for art and technology. She aims to study graphic design and animation in college, eventually working as a visual storyteller for film,
    video games, or interactive media. She also hopes to create community‑based art workshops that empower other young people to explore creativity. In the longer term, Katherine aspires to become an educator
    or mentor, using her experience to inspire curiosity and collaboration among students.
