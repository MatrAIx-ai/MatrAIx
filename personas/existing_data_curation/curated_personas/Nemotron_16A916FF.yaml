personas:
  professional: Dennis Mcentire, an aspiring junior architect who channels a love for structure into elaborate LEGO constructions and Minecraft designs while approaching school team soccer with reliable
    teamwork and a practical mindset.
  sports: Dennis Mcentire, a spirited midfielder on his elementary school soccer squad, cheers for New York City FC and the New York Rangers, practices with the Riverside Community Soccer Club on weekends,
    and treats each fall tournament as a chance to blend disciplined teamwork with the spontaneous fun he craves.
  arts: Dennis Mcentire channels his love for comic books into sketches of Spider‑Man and Batman after studying Stan Lee’s dynamic panels, spends rainy afternoons turning pages of Gertrude Chandler Warner’s
    The Boxcar Children, and grows his artistic palate by listening to The Beatles and watching Pixar’s Toy Story, which together shape his imaginative play.
  travel: Dennis Mcentire, who has explored the nearby Passaic River Park’s winding trails and taken a family day trip to the Bronx Zoo, dreams of a summer adventure visiting Disney World in Orlando and
    the iconic Niagara Falls, but plans his travel around school holidays and a modest family vacation budget.
  culinary: Dennis Mcentire, a self‑declared connoisseur of pepperoni pizza, cheesy macaroni, and crunchy chicken nuggets, enjoys crafting simple PB&J sandwiches and occasionally whisking up pancakes topped
    with blueberries, yet often leaves a trail of cheese crumbs and ketchup smudges that hint at his enthusiastic but slightly untidy dining habits.
  core: Dennis Mcentire balances meticulous LEGO engineering with spontaneous soccer scrimmages, though he habitually leaves his glasses at home on game days.
