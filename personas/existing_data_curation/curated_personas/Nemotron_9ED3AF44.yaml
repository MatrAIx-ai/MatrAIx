personas:
  professional: Tae Peng, an aspiring project coordinator for a youth‑focused non‑profit, blends meticulous Excel‑driven planning, bilingual communication, and a calm, collaborative style to turn community
    wellness ideas into actionable programs.
  sports: Tae Peng, a regular member of a local hiking club and a yoga class enthusiast, also follows the San Diego Wave FC and the San Diego Padres, balancing solo trail runs with occasional pickup volleyball
    at the beach.
  arts: Tae Peng, a classically trained pianist who enjoys contemporary fiction, draws creative energy from the lyrical storytelling of BTS, the cinematic depth of Bong Joon‑ho, and the vibrant murals of
    local artist Victor Sheppard, often channeling these influences into personal photography projects.
  travel: Tae Peng, who prefers meticulously planned weekend getaways, loves the rugged cliffs of Big Sur, has already visited Seattle and Honolulu, and dreams of backpacking through the tea‑plant terraces
    of Sri Lanka and the national parks of Patagonia.
  culinary: Tae Peng, an enthusiastic home chef, experiments with kimchi‑infused tacos, gochujang‑marinated grilled fish, and avocado‑lime salsa, often sourcing fresh produce from the local farmer’s market
    while occasionally treating herself to late‑night ramen bowls.
  core: Tae Peng is an organized, curiosity‑driven teen who meticulously schedules every project, yet habitually hits snooze twice each morning, balancing a love for structured planning with a secret penchant
    for spontaneous karaoke sessions.
background:
  cultural: Tae Su Peng is a second‑generation East Asian American, raised in Chula Vista by parents who immigrated from South Korea. She grew up in a bilingual household, speaking both Korean and English,
    and celebrates traditional holidays such as Lunar New Year and Chuseok alongside typical American festivities. Her family places a strong emphasis on education, respect for elders, and community harmony,
    values that shape her considerate and cooperative nature. Living in the multicultural environment of Southern California, she blends her heritage with local influences—enjoying Korean pop culture, American
    sports, and the diverse culinary scene of San Diego. This dual cultural perspective informs her worldview, fostering an appreciation for both her ancestral roots and the broader community she serves.
attributes:
  skills: '[''Project Planning'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Bilingual Communication (English, Mandarin)'', ''Basic Python Programming'', ''Research Methodology'', ''Data Organization
    and Analysis'', ''Event Coordination'', ''Conflict Mediation'']'
  hobbies: '[''Hiking (Torrey Pines and surrounding trails)'', ''Yoga and mindfulness meditation'', ''Cooking fusion recipes (Korean‑Mexican)'', ''Reading contemporary fiction and self‑improvement books'',
    ''Playing piano'', ''Volunteering at local animal shelter'', ''Attending cultural festivals (Lunar New Year, community street fairs)'', ''Photography'', ''Korean calligraphy'']'
  career_goals: Tae Su Peng aims to complete a bachelor's degree in Business Administration or Public Health while maintaining her strong organizational habits. Her long‑term ambition is to become a project
    coordinator for a non‑profit organization that focuses on youth empowerment and community wellness in San Diego County. She envisions using her planning expertise and cultural fluency to design programs
    that promote social harmony and equitable access to resources. In the future, she hopes to pursue a Master’s in Public Administration or an MBA to expand her leadership capacity and eventually move
    into a senior project‑management role where she can drive systemic improvements.
