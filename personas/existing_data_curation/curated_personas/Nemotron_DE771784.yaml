  hobbies: '[''Plein‑air landscape painting'', ''Sketching architectural details'', ''Pottery and glaze experimentation'', ''Reading contemporary fiction and philosophy'', ''Visiting museums and gallery
    openings'', ''Hiking the Katy Trail'', ''Yoga and meditation'', ''Community theater set design'', ''Cooking experimental cuisines'', ''Photography of natural textures'']'
  career_goals: Seeking to evolve from a senior graphic designer to a creative director, Tabitha aims to lead interdisciplinary design teams that produce socially resonant visual narratives. She plans to
    launch a boutique studio focused on heritage-based branding for local businesses and non-profits, incorporate emerging media such as AR storytelling, and mentor emerging designers through workshops
    and community college courses. Her long-term ambition is to curate a traveling exhibition that showcases the intersection of Midwestern cultural history and contemporary digital art.
