personas:
  professional: A senior graphic designer with a humanities foundation, Tabitha Nungester blends meticulous brand strategy, award‑winning illustration, and emerging AR storytelling to lead interdisciplinary
    teams, while mentoring junior talent and preparing to launch a boutique studio that celebrates Midwestern heritage; they approach each project with imagination and balanced organization.
  sports: A dedicated outdoor enthusiast, Tabitha Nungester hikes the Katy Trail with the St. Louis Trail Hikers Association, attends weekly yoga classes, follows the St. Louis Cardinals and Kansas City
    Chiefs passionately, and joins a seasonal adult recreational soccer league at the local community center to stay fit.
  arts: An eclectic art aficionado, Tabitha Nungester draws inspiration from Monet’s impressionist landscapes, the bold forms of Georgia O'Keeffe, and the contemporary installations of Ai Weiwei, while
    listening to the folk‑rock of Sufjan Stevens and the theatrical scores of Lin‑Manuel Miranda, regularly attending museum lectures and designing sets for the local community theater.
  travel: A thoughtfully planned globetrotter, Tabitha Nungester has explored the Renaissance galleries of Florence, the tea houses of Kyoto, and the vibrant markets of Oaxaca, preferring curated cultural
    itineraries that balance immersive art experiences with leisurely kayaking trips on the Missouri River, though budget considerations keep their international voyages to one or two major trips per year.
  culinary: A culinary experimenter, Tabitha Nungester, an adept home cook, frequently prepares hand‑rolled ramen with kombu broth, slow‑cooked Mexican mole poblano featuring ancho chilies, and river‑caught
    walleye ceviche with lime and cilantro, while perfecting a sourdough starter that incorporates wild Missouri river herbs like rosemary and lavender.
  core: Tabitha Nungester is a 52‑year‑old senior graphic designer who fuses Midwestern heritage with avant‑garde digital storytelling, balancing meticulous organization with a boundless curiosity, while
    nurturing creativity through painting, pottery, yoga, and community collaboration.
background:
  cultural: Tabitha grew up in a small Midwestern town in Missouri, immersed in a culture that values community, modesty, and self-reliance. Her white, European-American heritage includes German and Irish
    ancestry, which she explores through family traditions and regional folklore. The blend of Midwestern pragmatism and a strong appreciation for the arts shaped her sensibility—she balances grounded work
    ethic with a love for storytelling and aesthetic nuance. Her academic background in humanities deepened her understanding of cultural narratives, which she often weaves into her design projects, celebrating
    both local identity and broader human themes.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Typography'', ''Brand Identity Development'', ''Conceptual Illustration'', ''Layout & Print Design'', ''Digital Illustration'',
