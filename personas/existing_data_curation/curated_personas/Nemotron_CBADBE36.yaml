  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Gardening'', ''Reading historical non-fiction'', ''Jazz and blues listening'', ''Church community outreach'', ''Cooking Southern cuisine'', ''Documentary
    watching'', ''DIY home automation'']'
  career_goals: In the next few years, Eric aims to achieve ASE Master Technician certification, formalize his decades of experience by opening a modest family-run auto repair shop in Laurel that emphasizes
    quality service and community mentorship. He plans to establish an apprenticeship program targeting young adults from underserved backgrounds, providing them with hands-on training and guidance. Additionally,
    Eric hopes to contribute to local community education by offering free automotive safety workshops at the Howard County community center and perhaps author a guidebook on maintaining classic cars for
    hobbyists.
