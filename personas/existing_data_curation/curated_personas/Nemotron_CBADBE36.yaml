personas:
  professional: Eric Tyler, a seasoned auto repair master with decades of hands‑on expertise ranging from classic gasoline engines to modern hybrid and electric powertrains, blends meticulous workshop organization
    with flexible problem‑solving, channels their competitive drive into mentorship of apprentices, and consistently communicates with customers in a clear, safety‑first manner while staying curious about
    emerging automotive technologies.
  sports: Eric Tyler, an enthusiastic supporter of the Washington Capitals during hockey season and the Baltimore Orioles in summer, participates in a senior walking club each Saturday, joins a community
    bowling league when spring rolls around, and follows the NFL fervently for the Washington Commanders, preferring spectating and light activity over rigorous competition.
  arts: Eric Tyler, an aficionado of jazz icons like Miles Davis, John Coltrane, and blues legends such as B.B. King, regularly attends live performances at the local Laurel Music Hall, curates a collection
    of vintage vinyl records, and immerses themselves in civil‑rights documentaries and biographies, letting the music’s improvisational spirit influence both their repairs and relaxation.
  travel: Eric Tyler, who relishes road‑trip excursions in his lovingly restored classic car, maps journeys that stitch together scenic drives along the Blue Ridge Parkway, stops at the Henry Ford Museum
    in Detroit, and dives into the vibrant jazz scene of New Orleans, yet prefers domestic, short‑duration getaways like a weekend at Chesapeake Bay due to health considerations and budget prudence.
  culinary: Eric Tyler, an adept home cook, specializes in Southern comfort fare such as smoked brisket, shrimp and grits, collard greens simmered with smoked ham, and peach cobbler, enjoys experimenting
    with a cast‑iron skillet and a slow cooker, pairs meals with sweet tea or craft beer, yet has a habit of over‑seasoning sauces when excitement takes over.
  core: Eric Tyler, a meticulous yet inquisitive 70‑year‑old mechanic, balances a competitive mentorship style with community volunteerism, finds rhythm in jazz while revving classic engines, and never
    skips a chance to haggle over vintage car parts—even if it means late‑night coffee and the occasional missed dental visit.
background:
  cultural: Eric grew up in a tightly knit African American community in Maryland, where family, church, and mutual support were central values. His upbringing instilled a strong sense of perseverance and
    pride in his heritage, which he carries into his work and community involvement. He has been active in local African American cultural events, celebrates Juneteenth, and mentors youth through church
    and community programs. While reflecting on the challenges faced by Black professionals in the trades, he embraces a resilient, optimistic outlook, using his experience to inspire the next generation.
attributes:
  skills: '[''Engine diagnostics'', ''Hybrid and electric vehicle repair'', ''Transmission service'', ''Brake and suspension repair'', ''Emission testing'', ''Electrical system troubleshooting'', ''Diagnostic
