  career_goals: At age one, Jesus does not yet have concrete career goals. However, his caregivers envision that his blend of curiosity, practical problem‑solving, high energy, and competitive drive could
    later translate into ambitions such as becoming a professional soccer player, a community-oriented leader, or a skilled tradesperson—paths that value teamwork, physical activity, and hands‑on expertise.
