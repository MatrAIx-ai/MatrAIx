persona_description: A political analyst who is interested in the history of anarchism, particularly the works of Henry Adams and Andrei Bely, and the ways in which they responded to the new century. They
  are also knowledgeable about the history of explosives and the role of dynamite in the political violence of revolutionary anarchism. They have a keen interest in the anarchist sublime and the ways in
  which it can be used to explore themes of chaos, force, and power. They are also likely to be familiar with the works of other political theorists and philosophers who have explored similar themes, such
  as Friedrich Nietzsche and Jean-Paul Sartre.
