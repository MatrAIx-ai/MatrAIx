personas:
  professional: William Tong is a budding robotics enthusiast who merges his methodical planning with a vivid artistic curiosity, designing LEGO Mindstorms creations that can shuffle cards, draw simple
    cartoons on a screen, and even accompany his piano practice with synchronized light shows, which they proudly showcase at school science fairs.
  sports: William Tong thrives on after‑school soccer as a midfielder for the Steel City Strikers youth club, where their organized playmaking and energetic presence echo the fast‑paced style of the Pittsburgh
    Penguins, and they never miss a Saturday match at the local community park, often staying after practice to do extra drills for fun.
  arts: William Tong spends weekends wandering the Andy Warhol Museum and Carnegie Science Center, sketching cartoons inspired by Bill Watterson’s Calvin and Hobbes, painting watercolor landscapes that
    echo Claude Monet’s brushwork, and devouring graphic novels such as “Bone” and “Saga” to fuel their creative storytelling.
  travel: William Tong prefers meticulously planned family trips, enjoys weekend drives to the Allegheny National Forest and annual school field trips to NASA’s Glenn Research Center in Ohio, and secretly
    hopes to one day explore the Kennedy Space Center in Florida, all while keeping a handwritten travel journal of each adventure.
  culinary: William Tong, a budding junior chef, loves assembling pepperoni pizza with extra cheese and carrot sticks, experimenting with strawberry‑basil smoothies for breakfast, and occasionally leaves
    stray LEGO pieces on the kitchen counter as lucky charms, which they jokingly claim add ‘flavor’ to their dishes.
  core: William Tong blends artistic curiosity, meticulous robotics building, and a nervous habit of nightly journaling into a uniquely disciplined yet introspective ten‑year‑old who constantly sketches,
    codes, and seeks order to soothe their lingering worries.
background:
  cultural: William comes from a middle‑class white family rooted in Pittsburgh’s diverse western Pennsylvania heritage, with ancestors who settled from Irish and German backgrounds. The family values community
    events such as the Three Rivers Festival, enjoys local foods like Primanti sandwiches and pierogies, and regularly attends church services and school cultural programs. Exposure to the city’s rich industrial
    past, vibrant arts scene, and strong sports culture has shaped his appreciation for both artistic expression and teamwork.
