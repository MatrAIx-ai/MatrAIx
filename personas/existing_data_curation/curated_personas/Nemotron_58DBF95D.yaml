  career_goals: William dreams of blending his love for art and systematic thinking by becoming an architect who creates sustainable, community‑focused spaces. He also hopes to explore astronomy through
    school clubs and eventually design interactive museum exhibits that teach kids about science and creativity. In the near term, he aims to win a regional LEGO competition, earn his next piano grade,
    and lead his soccer team to a championship, all steps toward his long‑term vision of shaping environments that inspire curiosity and collaboration.
