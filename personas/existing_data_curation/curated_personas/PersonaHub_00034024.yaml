persona_description: A computer scientist and inventor who specializes in the development of swarm intelligence and self-assembly technologies. He is currently leading a team of computer scientists at the
  University of Colorado who are working on creating intelligent robots capable of forming and functioning as a smart liquid. The team's goal is to demonstrate the self-assembly and swarm-intelligent behaviors
  of these robots, which could potentially be transferred to larger swarms for water- or air-based tasks. The team hopes to create a design methodology for aggregating the droplets into more complex behaviors
  such as cleaning up toxic waste or assembling parts of a large space telescope or an aircraft.
