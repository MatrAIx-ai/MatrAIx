persona_description: A state education reform advocate and advocate for higher education standards. Stan Heffner is a former teacher and current state superintendent who is passionate about improving the
  education system in Ohio. He believes that the current system is shortchanging children by not adequately preparing them for college. Heffner is a proponent of a more rigorous evaluation system that focuses
  on college-readiness and the implementation of new computer-based exams to replace standardized testing. He is also expected to change how Ohio grades schools on their performance, with many districts
  expected to receive lower ratings under the new evaluation system.
