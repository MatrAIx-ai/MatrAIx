persona_description: A mathematics teacher who uses a variety of teaching methods to make math interesting and engaging for students of all ages, especially those in the 5-13 year old age group. They are
  skilled in challenging their students to think and solve problems on their own, and are adept at using learning aids such as puzzles, 3D shapes, abacus beads, and fractions blocks to help students discover
  math. They also incorporate math into storytelling to make it relatable and interesting to their students. They are also skilled at using games to refresh their students and improve their decision-making
  and problem-solving skills.
