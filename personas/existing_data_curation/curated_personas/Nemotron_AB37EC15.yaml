  hobbies: '["Gardening","Knitting","Reading mystery novels","Book club participation","Cooking and baking Southern dishes","Hiking local trails","Volunteering at food bank","Church choir singing","Attending
    community festivals"]'
  career_goals: Susan aims to transition from frontline service to a supervisory role within the next two years, seeking a shift‑lead or assistant manager position where she can apply her organizational
    strengths and reliability. She plans to complete a short certification in hospitality management and a food‑safety manager course to bolster her qualifications. Long‑term, she dreams of co‑owning a
    small, family‑run café in Easley that offers Southern comfort food in a relaxed, predictable setting, allowing her to balance work with a healthier, less stressful lifestyle for herself and her family.
    She also hopes to mentor new waitstaff, sharing her practical knowledge while fostering a supportive, structured team environment.
