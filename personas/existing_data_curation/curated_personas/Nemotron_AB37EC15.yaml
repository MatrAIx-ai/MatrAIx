personas:
  professional: Susan Tatum, a veteran front‑of‑house specialist with twenty‑plus years of restaurant service, leverages their meticulous cash handling, inventory tracking, and calm conflict‑resolution
    to excel in high‑pressure shifts, while their love of structure drives them toward a soon‑to‑be shift‑lead role and a future co‑owned café that promises a predictable, family‑friendly environment.
  sports: Susan Tatum, an avid walker, follows a structured routine on the Blue Ridge trails three times a week, is a member of the Easley Hiking Club, cheers for the Greenville Drive minor‑league baseball
    team and the Clemson Tigers during football season, and uses a pedometer to hit a target of 8,000 steps daily for fitness and stress relief.
  arts: Susan Tatum, a dedicated reader and knit‑artist, participates in a monthly book club where they discuss Agatha Christie mysteries and Southern historical fiction by Walter Johnson, enjoys the harmonies
    of the church choir, and finds inspiration from folk musicians like Dolly Parton while crafting scarves and blankets that often feature motifs from their favorite novels.
  travel: Susan Tatum favors carefully planned road trips, has explored Asheville’s Biltmore Estate, taken weekend retreats to Charleston’s historic district, dreams of a spring visit to Savannah’s riverfront,
    and balances travel budgeting with a desire for scenic mountain drives, while occasionally opting for spontaneous day‑trips to local festivals when work permits.
  culinary: Susan Tatum, a proficient home cook, delights in perfecting Southern staples such as fried chicken, collard greens sautéed with smoked turkey, pecan pie, and buttermilk biscuits, experiments
    with new twists like sweet‑potato gnocchi, and routinely stocks pantry staples like cornmeal, apple butter, and smoked paprika, though they sometimes over‑salt dishes when stressed.
  core: Susan Tatum blends disciplined organization with creative comforts, worries about the future yet finds solace in gardening, knitting, and predictable routines, all while chasing the dream of a family‑run
    café.
background:
  cultural: Susan grew up in a small town in the Upstate of South Carolina, steeped in the traditions of Southern hospitality and close‑knit community life. Her family values emphasize punctuality, courtesy,
    and a strong work ethic, which have shaped her practical, organized approach to daily tasks. Raised in a predominantly white, middle‑class environment, she was exposed to the region’s cuisine—fried
    chicken, biscuits, barbecue, and sweet tea—and the rhythms of church attendance, community gatherings, and seasonal festivals. These cultural influences fostered her love of food, service, and communal
    support, while also reinforcing an appreciation for predictable routines and reliable relationships.
attributes:
  skills: '["Customer service","Order taking","POS operation","Cash handling","Food safety and hygiene","Menu knowledge","Conflict resolution","Team coordination","Time management","Multitasking","Basic
