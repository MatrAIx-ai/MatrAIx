persona_description: A historian and archaeologist interested in the history and archaeology of ancient Iran, particularly the city of Ecbatana. They have a deep understanding of the city's history, its
  significance as a capital and the role it played in the spread of the Achaemenid and Sasanian empires. They are knowledgeable about the city's architecture, its cultural and historical context, and its
  role in the trade and commerce of antiquities. They have a keen interest in the city's location on the High Road and its strategic importance. They are also interested in the city's natural features,
  such as the al-Musalla and the hill of Sang-i Shir, and their potential for archaeological and cultural significance.
