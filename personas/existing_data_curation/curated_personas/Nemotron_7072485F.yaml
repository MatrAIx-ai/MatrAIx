personas:
  professional: Ruby Killen, a retired community arts facilitator turned volunteer coordinator, leverages their keen curiosity, talkative nature, and knack for creating welcoming atmospheres to lead intergenerational
    workshop series, organize art appreciation discussions, and guide collaborative volunteer teams despite their habit of occasionally misplacing schedules.
  sports: Ruby Killen enjoys daily walks through their vegetable garden and the nearby Five Rivers MetroParks trail, participates in the Dayton Senior Walking Club’s Saturday strolls, cheerfully follows
    the Dayton Dragons minor‑league baseball team and occasionally tunes in to the Cleveland Browns, while they prefer low‑impact exercise over intense competition.
  arts: Ruby Killen spends weekends painting serene Ohio river scenes in the style of American realist John Steuart Curry, quilts vibrant patterns inspired by Navajo motifs, sings folk classics by Joan
    Baez and Woody Guthrie with their senior choir, and regularly attends the historic Oregon Theatre to watch productions like the community staging of Our Town starring Linda Whitaker, drawing creative
    inspiration from these diverse artistic sources.
  travel: Ruby Killen’s travel style is a relaxed, curiosity‑driven itinerary that blends weekend trips to Hocking Hills State Park with longer journeys to iconic art destinations like the Smithsonian American
    Art Museum in Washington D.C., the Getty Center in Los Angeles, and the Art Institute of Chicago, while they prefer spontaneous detours to local cafés over rigid schedules.
  culinary: Ruby Killen delights in cooking Midwestern comfort dishes such as Cincinnati chili and Ohio buckwheat pancakes, baking sourdough bread and apple crumble using fresh herbs, heirloom tomatoes,
    and garden‑grown lavender, and they regularly host themed potlucks where neighbors swap recipes for dishes like chicken and dumplings or roasted beet salad.
  core: Ruby Killen blends boundless curiosity, a talent for turning community spaces into creative hubs, and a habit of misplacing appointment cards, all while they sing folk songs, paint river vistas,
    and sprinkle their life with spontaneous potluck gatherings.
background:
  cultural: Ruby was born and raised in the Dayton area of Ohio, a region shaped by Midwestern values of hospitality, community service, and modest living. Her family traces its roots to German and Irish
    immigrants who settled in Ohio in the early 1900s. Growing up, she participated in church and neighborhood events, celebrating traditional holidays such as Thanksgiving and St. Patrick’s Day with communal
    meals. These experiences fostered a strong sense of neighborliness and an appreciation for local arts and seasonal festivals, which continue to influence her involvement in community cultural activities.
