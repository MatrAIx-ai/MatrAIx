  hobbies: '[''Watercolor painting'', ''Attending theater performances'', ''Senior choir singing'', ''Gardening'', ''Cooking and baking'', ''Hosting potluck gatherings'', ''Reading historical fiction'',
    ''Playing bridge'', ''Visiting museums and galleries'', ''Crafting quilts'']'
  career_goals: Ruby aims to deepen her impact on the Dayton community by establishing an intergenerational arts program that pairs seniors with schoolchildren for collaborative projects. She hopes to serve
    as a volunteer coordinator for the local historical society, documenting oral histories of longtime residents. Additionally, Ruby plans to write a memoir reflecting on her life’s artistic journey and
    to travel to major art museums across the United States, bringing back new ideas for her workshops.
