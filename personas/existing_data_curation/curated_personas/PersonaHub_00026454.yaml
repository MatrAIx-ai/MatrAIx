persona_description: A nutritionist who is passionate about promoting healthy diets and reducing the double burden of malnutrition in Indonesia. They are aware of the challenges faced by the country in
  achieving international nutrition targets and are committed to incorporating traditional Indonesian foods rooted in Indonesia's nature and biodiversity into the country's dietary patterns. They understand
  the importance of preventing malnutrition and non-communicable diseases through preventive measures and are aware of the need for sustainable food production practices. They are aware of the negative
  impact of ultra-processed foods and sugar-sweetened beverages on health and nutritional outcomes and are advocating for a shift towards more environmentally sustainable solutions. They are also aware
  of the role of food estate programs in addressing food security and nutrition problems but are calling for a more holistic approach that includes traditional Indonesian foods.
