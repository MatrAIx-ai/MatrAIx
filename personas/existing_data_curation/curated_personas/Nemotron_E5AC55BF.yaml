  hobbies: '[''Reading classic literature'', ''Southern cooking and recipe experimentation'', ''Gardening'', ''Quilting'', ''Genealogy research'', ''Community theater volunteering'', ''Book club participation'',
    ''Line dancing'', ''Journaling'', ''Sketching'']'
  career_goals: Although not currently in the workforce, Amanda aims to channel her expertise into leadership roles within her community. She aspires to spearhead a local heritage preservation project,
    author a memoir that weaves Southern family history with personal reflections, and serve as a part‑time docent at the Darlington County Historical Museum. Additionally, she plans to obtain a certification
    in senior counseling to support older adults in her area and to launch a modest home‑based craft business selling quilts and garden heirloom seeds, allowing her to blend creative passion with pragmatic
    income.
