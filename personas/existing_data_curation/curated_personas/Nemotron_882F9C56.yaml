  career_goals: Carlos aims to move beyond entry‑level material handling into a supervisory role within the next three years, targeting a shift lead or logistics coordinator position. He plans to earn a
    GED and pursue certifications in supply chain management and sustainable logistics to broaden his qualifications. Ultimately, he dreams of launching his own niche moving service that specializes in
    transporting artwork and delicate cultural items, merging his logistical expertise with his passion for art. This venture would allow him to serve the growing community of galleries and private collectors
    in Los Angeles while providing stable income to support a future family and homeownership.
