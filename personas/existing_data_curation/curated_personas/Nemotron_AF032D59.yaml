personas:
  professional: Sharon Stone, an experienced phlebotomist at a rural Montana clinic, leverages decades of precise venipuncture technique, strict biosafety compliance, and a methodical training style to
    mentor junior staff while spearheading quality‑improvement initiatives toward her goal of a supervisory role.
  sports: Sharon Stone, an avid member of the Big Sky Senior Hiking Club, enjoys leisurely hikes on the Gallatin River trail, regularly walks their dog with the town’s community dog‑walking group, and follows
    the Montana Grizzlies football and the Missoula PaddleHeads baseball team for seasonal excitement.
  arts: Sharon Stone, a dedicated quilter who recreates intricate geometric patterns inspired by the Art Nouveau designs of Alphonse Mucha, unwinds with mystery novels by Agatha Christie and Kate Morton,
    and attends occasional performances by the Montana Symphony Orchestra and local community theater productions.
  travel: Sharon Stone, a planner of low‑key road trips, favors visiting nearby national parks such as Yellowstone and Glacier for their serene vistas, has a wish list that includes the lavender fields
    of Provence for summer gardening inspiration, and prefers staying in modest B&Bs that they can book well in advance to avoid last‑minute stress.
  culinary: Sharon Stone, a culinary enthusiast who crafts weekly menus featuring roasted root vegetables, herb‑infused chicken pot pie, and seasonal quinoa salads seasoned with rosemary, thyme, and locally
    sourced Montana honey, enjoys the ritual of chopping, measuring, and plating as a calming extension of their garden’s seasonal rhythm.
  core: Sharon Stone, a methodical 60‑year‑old phlebotomist who balances a love for precise quilting and garden planning with a chronic worry about details, channels their organized nature into meticulous
    work, budgeting, and community service while occasionally indulging in spontaneous mystery‑novel marathons.
background:
  cultural: Sharon is a lifelong resident of the rural northwest, descended from German and Irish settlers who established farms in the Northern Plains. Her upbringing emphasized self‑reliance, community
    service, and a respect for the natural landscape. Growing up in a modest, Protestant‑influenced household, she internalized a strong work ethic and practical outlook. The close‑knit culture of Charlo,
    Montana—centered on seasonal celebrations, local church gatherings, and cooperation among neighbors—has shaped her values of reliability, modest ambition, and dedication to helping others in her community.
attributes:
