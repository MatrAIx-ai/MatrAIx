  hobbies: '[''gardening'', ''quilting'', ''birdwatching'', ''hiking'', ''reading mystery novels'', ''crossword puzzles'', ''cooking'', ''volunteering at blood drives'', ''participating in local book club'']'
  career_goals: Sharon aims to transition into a supervisory role within the next two years, with a focus on mentoring junior phlebotomists and leading quality‑improvement projects at her clinic. She plans
    to obtain a certified phlebotomy instructor credential so she can formally teach community health courses and organize rural blood‑donation drives. Ultimately, she hopes to secure a part‑time position
    that allows her to balance work with her upcoming retirement while continuing to contribute to the health of her small Montana community.
