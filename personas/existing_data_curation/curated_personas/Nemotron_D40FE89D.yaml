  hobbies: '[''Watercolor painting'', ''Sketching cityscapes'', ''Reading contemporary fiction and philosophy'', ''Creative writing and journaling'', ''Crossword and Sudoku puzzles'', ''Yoga and mindfulness
    meditation'', ''Herb gardening'', ''Small‑group book club'', ''Local art workshops'']'
  career_goals: Alina aims to leverage her driving expertise and artistic passion by transitioning into a role that combines community service with creativity. She hopes to become a driver‑trainer and coordinator
    for a local senior‑transport program, while building a small freelance art business that sells her cityscape paintings and written travel sketches. Over the next five years she plans to complete a bachelor’s
    degree in business administration to eventually open a boutique art gallery and a community‑focused transport service that prioritizes safety, reliability, and cultural enrichment.
