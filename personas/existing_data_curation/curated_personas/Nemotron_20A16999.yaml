    art club'']'
  career_goals: Marisol dreams of becoming a celebrated young artist who creates colorful pictures that honor her Mexican heritage. She hopes to win local art contests, design her own comic‑book characters,
    and one day lead small art workshops where she can share her techniques with other kids. She also imagines inventing playful gadgets that help children explore creativity, reflecting her competitive
    spirit and desire for personal achievement.
