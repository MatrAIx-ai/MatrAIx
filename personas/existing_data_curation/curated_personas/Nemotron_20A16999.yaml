personas:
  professional: Marisol Martinez is an aspiring child illustrator who channels their curiosity and love for drawing family celebrations into meticulous watercolor sketches, while their competitive streak
    drives them to perfect Lego constructions and excel in the small, supportive art club at the local library.
  sports: Marisol Martinez enjoys weekend runs in the local park and participates in a small, after-school soccer team called the Little Explorers, idolizing the Portland Timbers and practicing drills with
    a competitive edge, while they also cheer for the Portland Trail Blazers during basketball season as a way to stay connected to professional sports.
  arts: Marisol Martinez delights in recreating family celebrations with vivid watercolors, draws inspiration from the whimsical animation of Walt Disney, the impressionist brushstrokes of Claude Monet,
    and the playful melodies of Taylor Swift, while their weekly art club sessions allow them to exchange ideas and showcase their own imaginative sketches.
  travel: Marisol Martinez prefers organized family trips that blend serene nature hikes with purposeful collecting of rocks and shells, having enjoyed a memorable weekend at the nearby Redwood State Park,
    while they dream of exploring the vibrant streets and historic plazas of Barcelona and the rain-soaked cloud forests of Costa Rica on future adventures.
  culinary: Marisol Martinez enjoys simple, bright meals such as cheese quesadillas paired with fresh avocado slices, or homemade macaroni and cheese sprinkled with crunchy breadcrumbs, and they proudly
    assist in the kitchen by whisking together batter for pancake breakfasts and carefully arranging colorful fruit salads featuring strawberries, blueberries, and kiwi.
  core: Marisol Martinez is a quietly intense, art-obsessed 7-year-old whose competitive Lego builds hide a lingering anxiety that flares up in crowded rooms, a habit of over-collecting rocks that sometimes
    clutters their backpack, and a fierce love for solitary board games.
background:
  cultural: Marisol comes from a Mexican‑American family that speaks both Spanish and English at home, creating a bilingual environment rich in cultural traditions. She participates in Día de los Muertos
    and Mexican Independence Day celebrations, helping to craft papel picado decorations and build family altars. The vivid colors, patterns, and stories of Mexican folk art heavily influence her creative
    work. Living in Amarillo, Texas, she experiences a blend of Southwestern and Mexican-American cultures, enjoying Tex‑Mex cuisine, community festivals at the local cultural center, and the warm, close‑knit
    relationships typical of her community.
