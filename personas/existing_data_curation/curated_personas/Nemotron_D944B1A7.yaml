personas:
  professional: A methodical clergy leader, Tiffany Dill blends rigorous biblical exegesis with data‑driven church administration, delivering clearly structured sermons while they mentor emerging pastors
    with a competitive, evidence‑based approach and mediate congregation conflicts with fair, analytical precision.
  sports: An avid hiker and community sports enthusiast, Tiffany Dill explores the rolling trails of Hamilton County, participates in a local walking club, supports the Iowa Hawkeyes football team, and
    they keep fit with weekend hikes and occasional cross‑country skiing in winter, though they sometimes skip warm‑ups in favor of getting to the trailhead early.
  arts: A creative soul with a love for quilting, piano, and photography, Tiffany Dill crafts Log Cabin‑style quilts, plays hymns by John Rutter and Debussy’s Clair de Lune on the church piano, and they
    capture church events and prairie sunsets with a DSLR inspired by Ansel Adams, but they sometimes get lost in perfecting stitch patterns at the expense of social gatherings.
  travel: A purposeful traveler, Tiffany Dill plans trips months in advance, attending the National Association of Evangelicals conference in Dallas, pilgrimage visits to Canterbury Cathedral, and historic
    tours of Gettysburg, blending ministry development with personal enrichment while they balance limited retirement savings against the desire for meaningful experiences.
  culinary: A seasoned baker and garden‑to‑table cook, Tiffany Dill bakes rustic sourdough and rosemary focaccia, prepares vegetable stews with heirloom tomatoes from her plot, and they enjoy using local
    honey and fresh herbs, though they occasionally over‑proof dough, leading to a burned crust.
  core: Tiffany Dill, a 56‑year‑old clergy leader, balances meticulous data‑driven ministry with a love for sustainable gardening, quilting, and thoughtful stewardship, all while they navigate a competitive
    edge and a habit of over‑planning.
background:
  cultural: Tiffany grew up in a white, Midwestern farming family in Iowa, with German‑Scandinavian ancestry that emphasized modesty, self‑reliance, and community service. Raised in a mainline Protestant
    setting, she was steeped in the region's tradition of practical faith and civic involvement. While she values the steady rhythms of small‑town life, her curiosity drives her to explore broader theological
    ideas and modern ministry tools. Her divorced status adds a layer of personal resilience, shaping her empathetic yet skeptical approach to counseling and community leadership.
attributes:
  skills: '[''Biblical exegesis'', ''Sermon preparation'', ''Pastoral counseling'', ''Church administration'', ''Community outreach program development'', ''Conflict mediation'', ''Public speaking'', ''Digital
