  hobbies: '[''Sustainable gardening'', ''Quilting'', ''Genealogy research'', ''Hiking'', ''Reading historical biographies'', ''Playing piano/organ'', ''Baking'', ''Volunteer work at food pantry'', ''Photography'',
    ''Traveling to religious conferences'']'
  career_goals: Tiffany aims to grow her Boone congregation by 30% over the next five years, increasing multigenerational participation through innovative yet practical outreach initiatives, such as a community
    garden and digital worship platforms. She aspires to serve on the regional synod council, influencing policy with her critical and data‑oriented perspective. Long‑term, she hopes to author a guide on
    resilient pastoral leadership for clergy navigating personal challenges like divorce, and to establish a regional support network that provides counseling services and practical resources for families
    in crisis.
