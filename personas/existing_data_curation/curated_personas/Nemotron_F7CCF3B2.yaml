personas:
  professional: Daphne Gonzalezramos, a budding comic‑strip creator and after‑school arts volunteer, they channel their curiosity and relaxed, improvisational workflow into sketching lively characters while
    guiding younger kids in crafts, allowing spontaneous ideas to shape both their art and mentorship.
  sports: Daphne Gonzalezramos, who enjoys casual basketball pickups at Bronx Park and follows the New York Knicks and the New York Yankees on TV, they prefer low‑intensity weekend walks over structured
    team sports, yet they occasionally join a community soccer clinic in the spring to stay active.
  arts: Daphne Gonzalezramos, an avid fan of reggaeton star Bad Bunny, salsa legend Celia Cruz, and pop icon Taylor Swift, they devote their free time to sketching comic characters inspired by Marvel comics
    and Studio Ghibli, while binge‑watching Lin‑Manuel Miranda’s performances and exploring neighborhood street‑art tours.
  travel: Daphne Gonzalezramos, who dreams of weekend trips to Coney Island’s boardwalk and family vacations in Puerto Rico, they plan outings using YouTube vlogs and rely on parents for budgeting, favoring
    short, adventure‑filled stays over lengthy, expensive vacations abroad.
  culinary: Daphne Gonzalezramos, an enthusiastic home‑cook who follows YouTube tutorials to make yucca croquettes, empanadas, and homemade ramen, they mix ingredients like plantain, mozzarella, and miso,
    and enjoy experimenting with flavors despite frequently burning the edges of their dishes.
  core: Daphne Gonzalezramos balances a vibrant imagination with a laid‑back, sometimes disorganized routine; they turn worries into sketch‑filled journals while indulging in spontaneous dance breaks, messy
    cooking experiments, and occasional impulse gaming purchases.
background:
  cultural: Daphne grew up in a vibrant Cuban‑American household in the Bronx, where Spanish is spoken at home and family gatherings often revolve around shared meals of arroz con pollo, plantains, and
    café con leche. Her parents maintain traditions such as celebrating Nochebuena with music, dancing, and storytelling, and she participates in local cultural festivals like Carnaval del Bronx, where
    Afro‑Cuban rhythms fill the streets. The Bronx’s multicultural environment exposes her to a blend of Latin, African‑American, and Caribbean influences, shaping her taste in music, food, and community
    values. While she embraces her Cuban heritage, she also navigates the broader American adolescent experience, balancing the expectations of her family with the diverse perspectives of her peers.
