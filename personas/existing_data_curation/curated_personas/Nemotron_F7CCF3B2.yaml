  career_goals: Daphne envisions a future where she can blend her love for her culture with her desire to help others. She hopes to become a bilingual community health advocate or youth counselor, focusing
    on mental‑well‑being for other teens who feel stressed or anxious. At the same time, she dreams of opening a small café that serves modern twists on classic Cuban recipes, using her cooking skills to
    create a welcoming space for her neighborhood. She also entertains the idea of studying graphic design or digital storytelling so she can create multimedia content that shares immigrant stories and
    celebrates Latino heritage.
