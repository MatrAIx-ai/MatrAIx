personas:
  professional: Stevens Sanchez, a 19‑year‑old aspiring electrical engineer, spends their days interning at a Boulder engineering firm while designing Arduino‑based home‑automation projects, drafting PCB
    layouts in KiCad, and mentoring teens in robotics, blending curiosity with practical problem‑solving and a collaborative, bilingual work style.
  sports: Stevens Sanchez, an avid hiker and trail‑runner, trains with the Rocky Mountain Trail Runners club, follows a weekend regimen of altitude hikes and interval runs, roots for the Denver Broncos
    and Colorado Avalanche, and balances cardio with occasional rock‑climbing sessions to maintain overall fitness.
  arts: Stevens Sanchez, who strums an acoustic guitar to reinterpret folk melodies alongside contemporary songs by John Mayer and Bob Dylan, frequently draws creative inspiration from sci‑fi series such
    as The Expanse and Black Mirror, and enjoys live local gigs at Denver’s Larimer Street venue.
  travel: Stevens Sanchez, a budget‑conscious adventure seeker, spends holidays exploring the Colorado Rockies and weekend road trips to Banff and New Mexico, while dreaming of backpacking through Iceland’s
    volcanic landscapes and Japan’s high‑tech cities, preferring DIY itineraries over packaged tours.
  culinary: Stevens Sanchez, a self‑taught cook, loves preparing heritage tamales and corn‑based stews infused with Colorado quinoa and locally sourced trout, expertly seasoning with chipotle peppers, fresh
    cilantro, and mountain herbs, and often experiments with smoked cheese and wild mushrooms to create fusion dishes.
  core: Stevens Sanchez, a 19‑year‑old bilingual tinkerer who balances late‑night soldering marathons with sunrise trail runs, mentors youth in robotics, and can’t resist adding extra spice to every dish,
    embodies a pragmatic curiosity tempered by an easy‑going, community‑focused spirit.
background:
  cultural: Stevens was raised in a Mexican‑American family in Denver’s West Colfax area. His parents emigrated from Jalisco, and Spanish was spoken at home, fostering a bilingual upbringing. Family gatherings
    feature traditional Mexican celebrations such as Día de los Muertos, quinceañeras, and holiday feasts centered around tamales and pozole. He participates in the annual Denver Mexican Festival and maintains
    strong ties to the local Latino community through volunteer work. This cultural heritage instills a deep sense of community, respect for elders, and a collaborative spirit, which he brings to his educational
    and professional pursuits while also embracing the outdoor, multicultural lifestyle of Colorado.
attributes:
  skills: '["Circuit analysis and design", "Microcontroller programming (Arduino, ESP32)", "PCB layout (KiCad, Eagle)", "Fine‑pitch soldering", "Multimeter and oscilloscope operation", "Basic PLC ladder
