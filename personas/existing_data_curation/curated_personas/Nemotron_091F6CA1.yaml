  hobbies: '["DIY electronics and Arduino projects", "Playing acoustic guitar", "Hiking and trail‑running in the Rockies", "Cooking Mexican cuisine with fusion twists", "Volunteering as a STEM mentor",
    "Reading popular science and watching sci‑fi", "Playing pickup basketball with friends"]'
  career_goals: Stevens aims to earn a Bachelor of Science in Electrical Engineering from the University of Colorado Boulder while completing co‑op placements in renewable‑energy firms. Within the next
    three years he plans to obtain his Certified Journeyman Electrician license and apply his skills to develop affordable solar‑power solutions for low‑income neighborhoods in Denver. His long‑term ambition
    is to lead a multidisciplinary engineering team focused on smart‑grid and community micro‑grid projects that improve energy equity. Throughout his career he intends to mentor Latino youth in STEM, using
    his own experience to make technical fields more accessible and inclusive.
