personas:
  professional: Marco Cuadra is a budding junior architect and miniature scientist who spends weekends meticulously designing LEGO cityscapes, documenting each build in a notebook, and conducting safe kitchen
    chemistry experiments, channeling their methodical curiosity into early engineering thinking.
  sports: Marco Cuadra enjoys playing forward for the Little Lions youth soccer team, cheering for the hometown baseball club the City Eagles, and attending weekly ice skating lessons at the community rink,
    approaching each practice with organized drills and a competitive spirit.
  arts: Marco Cuadra delights in drawing dinosaurs and space rockets, idolizes illustrator Eric Carle and animators at Pixar, frequently visits the regional art museum to study works by Monet and Picasso,
    and collects museum guidebooks to inspire his own sketchbooks, reflecting a reserved yet inquisitive artistic soul.
  travel: Marco Cuadra prefers small-group family trips, has explored the Natural History Museum in Washington, D.C., collected seashells on a weekend beach outing at Santa Monica, and dreams of visiting
    the Jurassic Coast in England, planning each adventure with a detailed itinerary and a packed snack bag.
  culinary: Marco Cuadra favors pepperoni pizza, cheesy macaroni, and banana pancakes topped with fresh blueberries, enjoys assembling DIY snack plates with sliced carrots, cheddar cheese, and hummus, and
    occasionally helps his parents bake chocolate chip cookies, showcasing a methodical yet playful approach to food.
  core: Marco Cuadra blends a meticulous, competitive curiosity with a love for LEGO, dinosaurs, and quiet museum visits, often organizing elaborate projects while keeping a careful eye on pennies and allergies.
background:
  cultural: Marco comes from a bilingual Hispanic household in Mascoutah, Illinois, where Spanish and English are spoken interchangeably. His family celebrates traditions such as Día de los Muertos, Mexican
    Independence Day, and holiday gatherings centered around homemade dishes like tamales and empanadas. He often hears traditional music like mariachi and banda at family events, and his grandparents share
    stories of their hometowns in Mexico, fostering a strong cultural identity. This multicultural environment shapes his appreciation for diverse art forms, storytelling, and community values.
