personas:
  professional: Charles Koutroubis, a 52-year-old certified personal trainer and community sports advocate in Rhode Island, blends meticulous training design skills with a naturally talkative, collaborative
    style, and they lead group fitness classes, mentor youth soccer, and plan inclusive sports events while juggling a flexible, sometimes disorganized schedule.
  sports: Charles Koutroubis, a seasoned triathlete, logs weekly long-distance runs, road rides on their vintage road bike, and open-water swims at Narragansett Bay, while cheering for the New England Patriots
    and Boston Red Sox at the stadium and they coach a senior triathlon club at the local YMCA.
  arts: Charles Koutroubis, a sociable host, curates evening karaoke sessions featuring classic hits from ABBA and Enya, attends local jazz concerts featuring the Dave Douglas Quartet, enjoys watching Broadway
    revivals of 'Phantom of the Opera', and they frequently invite friends over to share these experiences, all of which fuel their love for performance and community storytelling.
  travel: Charles Koutroubis prefers spontaneous road trips along the New England coast, often detouring to the historic towns of Mystic and Portland, while dreaming of a future Mediterranean sailing cruise
    to the Cyclades, balancing their adventure cravings with the budget constraints of their nonprofit ambitions, and they occasionally scout new routes on a weekend bike ride.
  culinary: Charles Koutroubis, an avid home cook, masters grilled fish with lemon-herb drizzle, layers crisp spanakopita, and simmers avgolemono soup, regularly sprinkling fresh basil and oregano from
    their patio herb garden, yet they admit to over-seasoning dishes when excited for guests.
  core: Charles Koutroubis, a 52-year-old triathlon-obsessed community champion, merges structured training expertise with a talkative, compassionate flair, occasionally letting disorganization bite but
    always rallying others around health, sport, and good food, and they inspire teammates with their boundless energy.
background:
  cultural: Charles is a second‑generation Greek‑American raised in North Providence, Rhode Island. His family maintains Greek traditions such as celebrating Greek Easter, sharing souvlaki and baklava,
    and attending the Greek Orthodox church, while also embracing New England values of community involvement and modesty. He is fluent in English and conversational in Greek, often blending Greek hospitality
    with the pragmatic, collaborative spirit of his Rhode Island upbringing. This multicultural background informs his compassionate approach to coaching and his commitment to fostering inclusive, supportive
    environments.
attributes:
  skills: '[''Advanced Endurance Training'', ''Personal Training Certification (NASM)'', ''Sports Nutrition Knowledge'', ''Injury Prevention and Rehabilitation'', ''Group Fitness Instruction'', ''Motivational
    Speaking'', ''Community Sports Event Planning'', ''First Aid/CPR Certification'', ''Sports Commentary and Media Communication'', ''Youth Mentoring and Coaching'']'
  hobbies: '[''Triathlon Training'', ''Long-distance Running'', ''Cycling'', ''Open Water Swimming'', ''Greek Cooking'', ''Local Sports Spectating (Patriots, Red Sox)'', ''Community Volunteering (Youth
    Sports)'', ''Motivational Speaking'', ''Woodworking'', ''Gardening (Herbs)'']'
  career_goals: Charles aims to transition fully into a leadership role as a community sports program director, establishing a nonprofit that offers free fitness programming and mentorship to underserved
    youth in Providence County. He plans to complete a bachelor’s degree in Sports Science to complement his associate’s background and to obtain a Strength and Conditioning Specialist certification. Competitively,
    he is training for the Ironman Masters series, targeting a personal best finish within the next two years, while also seeking to coach a senior athletes’ triathlon club. Long‑term, he envisions hosting
    motivational workshops for senior athletes and becoming a regular speaker at local schools and community events to promote healthy, active lifestyles.
