  career_goals: In the next two years, Jose aims to secure a senior graphic designer role where he can lead multidisciplinary projects and mentor junior teammates, establishing a reputation for delivering
    high‑impact brand work on schedule. His medium‑term ambition is to move into an art director or creative director position, overseeing the end‑to‑end visual identity of key accounts while integrating
    his business acumen to drive strategic outcomes. Ultimately, he envisions launching his own boutique studio that serves Latinx‑focused brands and socially responsible enterprises, leveraging his cultural
    insight and disciplined workflow to create authentic, market‑winning designs. Throughout this path, he sets clear milestones and performance metrics to keep his progress measurable and reduce the anxiety
    that stems from uncertainty.
