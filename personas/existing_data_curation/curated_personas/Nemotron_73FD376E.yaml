personas:
  professional: Jose Llanes is a senior graphic designer who blends rigorous brand strategy with vibrant visual storytelling, leveraging Adobe Creative Suite, Figma, and a data‑driven mindset to deliver
    measurable ROI for diverse clients while mentoring junior designers and infusing subtle cultural motifs into every project.
  sports: Jose Llanes captains a midfield position on the Southside Soccer Club, enjoys salsa dancing at the local studio twice a week, roots for Chicago Fire FC and the Chicago Bulls, and incorporates
    weekend morning runs along the Lakefront Trail to stay fit.
  arts: Jose Llanes captures Chicago’s street life through photography inspired by Vivian Maier, draws design inspiration from Paul Rand and Saul Bass, regularly participates in design meetups at the Chicago
    Arts Alliance, and curates a personal playlist featuring world music icons to fuel his creative process.
  travel: Jose Llanes favors purposeful trips that combine cultural immersion and design inspiration, having explored Oaxaca’s Day of the Dead celebrations, attended a design expo in Barcelona, taken a
    road trip to New Orleans for jazz, and planning a future visit to Austin’s music festivals while balancing travel costs with his budgeting routine.
  culinary: Jose Llanes loves preparing cochinita pibil, fresh guacamole with serrano pepper, and chiles en nogada for friends, balances intermediate cooking skills with a penchant for bold, aromatic spices,
    and frequently experiments with traditional sauces while sourcing ingredients from community markets specializing in traditional flavors.
  core: Jose Llanes balances a disciplined, data‑driven professional life with vibrant community‑centered hobbies, using structured routines to manage anxiety while infusing every design, meal, and adventure
    with bold colors and cultural storytelling.
background:
  cultural: Jose was raised in a close‑knit Mexican family in Chicago, speaking Spanish at home while navigating English‑dominant schools and workplaces. His upbringing emphasized hard work, family solidarity,
    and vibrant cultural celebrations such as Día de los Muertos and Cinco de Mayo, which have informed his aesthetic taste for bold colors and symbolic motifs. He actively participates in the local Latino
    community, attending cultural festivals, supporting Mexican‑owned businesses, and sharing traditional recipes with friends. These experiences give him a unique perspective that he channels into his
    design work, often incorporating subtle Mexican visual references to create authentic, resonant brand identities. His bicultural identity serves as both a personal anchor and a professional asset, bridging
    diverse audiences with empathy and creativity.
