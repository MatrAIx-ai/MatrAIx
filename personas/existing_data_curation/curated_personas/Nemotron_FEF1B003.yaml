  hobbies: '[''Woodworking'', ''Scale model building'', ''DIY home automation'', ''Strategy board games'', ''Chess'', ''Running'', ''Fishing'', ''Science-fiction reading'', ''Tech podcasts'']'
  career_goals: Patrick aims to move from a senior drafter role into a BIM manager or technical lead position within the next three years. He plans to earn professional certifications in BIM (e.g., Autodesk
    Certified Professional) and pursue a part-time master's program in construction management to broaden his project-leadership skill set. His long-term ambition is to launch a boutique consulting firm
    that provides high-quality drafting and BIM services to small-to-mid-size contractors in the Southeast, with a focus on sustainable design practices. He also hopes to mentor emerging Black professionals
    in the drafting field, helping to increase representation and create a supportive network.
