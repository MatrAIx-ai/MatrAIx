  hobbies: '[''Kayaking'', ''Hiking'', ''Gardening'', ''Reading mystery novels'', ''Cooking New England seafood dishes'', ''Yoga and meditation'', ''Volunteering at community health fairs'', ''Photography'',
    ''Puzzle games (Sudoku)'', ''Board games with friends'']'
  career_goals: Cynthia aims to rise to senior executive leadership within a regional health system, targeting roles such as Director of Health Services or Chief Operating Officer. She wants to spearhead
    large‑scale telehealth initiatives and patient‑centered care models that blend innovative technology with practical workflow solutions. Driven by competitiveness, she seeks recognition as a top performer,
    speaking at national health‑administration conferences, publishing case studies on efficiency gains, and eventually guiding a multi‑facility network toward higher quality outcomes while preserving work‑life
    balance to mitigate her stress sensitivity.
