personas:
  professional: Marcelo Torres, a disciplined teenage robotics enthusiast, channels his curiosity and practicality into designing and programming competition robots, leading his school club’s projects with
    meticulous organization and a knack for teamwork, and they inspire peers through collaborative problem‑solving.
  sports: Marcelo Torres, a lively member of his community’s U‑15 soccer team and his school’s varsity basketball squad, avidly follows the Los Angeles Lakers and FC Barcelona, balancing rigorous practice
    with schoolwork and they occasionally skip drills when academic deadlines loom.
  arts: Marcelo Torres expresses his creative side by playing acoustic guitar at family gatherings, covering classic folk tunes and pop hits from Ed Sheeran and Juanes, while they also draw inspiration
    from street art and the vibrant rhythms of their cultural heritage.
  travel: Marcelo Torres dreams of road‑tripping to national parks like Yellowstone and exploring historic towns such as Santa Fe, preferring to plan detailed itineraries on a shared family map while they
    save his allowance for weekend camping adventures with friends.
  culinary: Marcelo Torres enjoys crafting family‑style dishes like corn tortillas, pork‑filled dumplings and spicy salsa, honing his cooking skills under his grandparents’ guidance, while they proudly
    experiment with fresh cilantro, roasted chilies, and tangy lime to perfect each bite.
  core: Marcelo Torres blends disciplined curiosity with sociable energy, juggling robotics, sports, music, and cooking while they occasionally succumb to late‑night gaming and budget indulgences.
background:
  cultural: Marcelo is a second‑generation Mexican American raised in Phoenix’s vibrant Mexican community. He grew up bilingual, speaking Spanish at home and English at school, and he embraces both Mexican
    traditions and American life. Family gatherings are centered around shared meals, music, and celebrations of holidays such as Día de los Muertos, Cinco de Mayo, and Mexican Independence Day. His parents
    instilled a strong work ethic and respect for community, which fuels his desire to give back. He actively participates in neighborhood cultural events and values the blend of his heritage with the diverse
    influences of the Southwest, shaping his identity and future aspirations.
