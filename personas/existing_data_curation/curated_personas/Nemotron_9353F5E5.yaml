  career_goals: Marcelo aspires to pursue a degree in civil engineering or robotics engineering, with a focus on creating sustainable housing solutions for underserved communities in Arizona. He aims to
    earn a scholarship to attend Arizona State University, where he plans to combine his love for technology and his practical mindset to develop affordable, eco‑friendly building designs. In the longer
    term, he hopes to work as a project manager for a construction firm or a research engineer in a tech company, while also mentoring younger students from his neighborhood through STEM outreach programs.
