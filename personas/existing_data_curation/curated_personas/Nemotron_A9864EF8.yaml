personas:
  professional: Beatriz Castrocruz, a seasoned HR professional with two decades of experience, channels their conflict-resolution expertise and compassionate nature into building harmonious workplaces while
    integrating emerging HR tech and data-driven talent strategies.
  sports: Beatriz Castrocruz, a morning beach-walker and yoga devotee, swims with the West Palm Beach Seniors Swim Club in winter, cheers for the Miami Heat NBA team, follows the Tampa Bay Rays MLB squad,
    and joins a local pickleball league each spring.
  arts: Beatriz Castrocruz, a devoted reader and crocheter, draws inspiration from Hilary Mantel's historical novels, Maya Angelou's memoirs, Joan Baez's folk songs, and attends intimate performances at
    the Kravis Center featuring Gustavo Dudamel's orchestra.
  travel: Beatriz Castrocruz, who plans trips with a mix of itineraries and free-time, cherishes past visits to Antigua, Guatemala and Cartagena, Colombia, dreams of exploring Kyoto's temples and Mendoza's
    vineyards, while favoring short, budget-friendly weekend getaways to Amelia Island.
  culinary: Beatriz Castrocruz, an adept home cook, delights in simmering pepian with roasted chiles, tomatoes, and plantains, masterfully prepares kak'ik broth with turkey and coriander, and experiments
    with garden-fresh tomatillo salsa, cilantro, and heirloom carrots for seasonal side dishes.
  core: Beatriz Castrocruz blends disciplined mindfulness, compassionate mentorship, and a love for garden-grown flavors into a life that balances professional ambition with quiet, reflective pursuits.
background:
  cultural: Beatriz was born in a small town in Guatemala and raised in a close‑knit family that valued community, respect for elders, and the rich traditions of Maya and Spanish heritage. Fluent in both
    Spanish and English, she carries forward the vibrant customs of her homeland—such as celebrating Día de los Muertos, preparing festive tamales, and listening to marimba music—while also embracing the
    multicultural tapestry of South Florida. Her Guatemalan roots inform her empathetic approach to human resources, particularly her commitment to supporting fellow immigrants and preserving cultural identities
    within the workplace. She regularly participates in local Guatemalan cultural festivals and supports organizations that promote Latinx workforce development.
