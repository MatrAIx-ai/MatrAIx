    Book Clubs", "Crocheting"]'
  career_goals: Beatriz aims to transition from a specialist role to a strategic HR leadership position within the next five years, targeting a Senior HR Manager or HR Business Partner role where she can
    shape talent strategy for a growing organization. She is pursuing additional certifications, such as the SHRM‑CP and a certificate in Diversity, Equity, and Inclusion, to deepen her expertise. A core
    ambition is to develop a mentorship program that connects emerging professionals, especially from immigrant backgrounds, with seasoned mentors, thereby strengthening community ties and promoting upward
    mobility. She also hopes to champion workplace wellness initiatives that integrate mindfulness and flexible work arrangements, reflecting her belief in balancing structure with employee well‑being.
