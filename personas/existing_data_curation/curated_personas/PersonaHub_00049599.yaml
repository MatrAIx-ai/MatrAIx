persona_description: A therapist and speech-language pathologist who specializes in working with individuals with autism spectrum disorders (ASD), including Asperger's Syndrome, Attention-Deficit/Hyperactivity
  Disorder (ADHD), Nonverbal Learning Disorder (NLD), and High-Functioning Autism (HFA). The therapist has a passion for helping young people develop social thinking, pragmatic language, and social skills,
  while also addressing issues related to attention, focus, voice, inflection, fluency, grammar, vocabulary, and higher order language skills. The therapist also offers group therapy sessions for individuals
  and their families, as well as individual therapy for those who require a more intense approach. The therapist is skilled in conducting formal evaluations and collaborating with other professionals/agencies
  to determine service eligibility and Individual Education Plan preparation. The therapist has experience working with students of all ages, including regular education students, and has a unique understanding
  of the challenges faced by students with social challenges.
