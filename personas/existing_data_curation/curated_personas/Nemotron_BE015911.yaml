personas:
  professional: Jacqueline Hendrix, a seasoned retail veteran approaching retirement, leverages her methodical inventory control, courteous customer service, and step‑by‑step mentorship to keep the store's
    shelves impeccably stocked while aspiring to be recognized as the most reliable supervisor before transitioning out.
  sports: Jacqueline Hendrix is a devoted fan of the Detroit Tigers and the Detroit Lions, tunes into the NBA’s Detroit Pistons, and plays on a weekly senior pickleball league at the local recreation center,
    valuing the routine and gentle competition.
  arts: Jacqueline Hendrix immerses herself in creative expression through quilting intricate Appalachian‑inspired patterns while listening to classic country legends like Johnny Cash, Dolly Parton, and
    Patsy Cline, and she draws pattern inspiration from Barbara Bender’s designs and lets the timeless melodies of the Beatles and Glenn Miller soundtrack her craft sessions.
  travel: Jacqueline Hendrix prefers low‑stress, meticulously planned trips, such as her recent escorted tour of Colonial Williamsburg and a scenic Mississippi River cruise, and she dreams of a leisurely
    week exploring the garden squares and historic homes of Savannah, Georgia, while avoiding last‑minute itineraries.
  culinary: Jacqueline Hendrix delights in preparing garden‑fresh meals like a hearty chicken pot pie filled with rosemary‑seasoned carrots and peas from her raised beds, a crisp cucumber and sundried tomato
    salad, and a warm apple crumble dusted with cinnamon and nutmeg, showcasing her intermediate cooking skills and love for seasonal flavors.
  core: Jacqueline Hendrix, a methodical 60‑year‑old retail veteran, blends routine‑driven diligence with a quiet competitive edge, finding calm in solitary crafts and steadfastly planning every aspect
    of her life.
background:
  cultural: Jacqueline grew up in Alexandria, Louisiana, a small city rooted in Southern traditions and a tight‑knit community. Her family has lived in Rapides Parish for generations, preserving a blend
    of Southern Baptist and Catholic customs common to the region. She was raised with an emphasis on modesty, hard work, and practical values, reflecting the region’s historical respect for routine and
    order. Local culture—such as church gatherings, regional cuisine, and seasonal festivals—has shaped her appreciation for modest, familiar comforts. While she respects the broader Cajun and Creole influences
    of Louisiana, her personal identity aligns with mainstream Southern values, emphasizing family, reliability, and community responsibility.
