  hobbies: '[''Salsa dancing'', ''Folklórico dance'', ''Co‑ed volleyball'', ''Wine tasting'', ''Cooking Mexican cuisine'', ''Volunteering at cultural festivals'', ''Gardening (herbs & chilies)'', ''Hiking
    in Sonoma hills'']'
  career_goals: Maria aims to move from cashier to a supervisory role within the next two years, targeting a shift‑lead position and eventually store manager at a local grocery or boutique retailer. She
    plans to earn her GED and take community‑college courses in business administration to build management expertise. A longer‑term ambition is to specialize in the wine‑tourism retail sector, managing
    a tasting room or boutique wine shop in Sonoma County. Ultimately, Maria envisions opening her own small family‑run convenience store that blends Mexican culinary traditions with locally sourced produce,
    providing stable income and a platform to mentor younger employees.
