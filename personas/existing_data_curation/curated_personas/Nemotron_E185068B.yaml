  hobbies: '["gardening", "cooking", "knitting", "reading historical fiction", "genealogy research", "church activities", "walking", "bridge", "volunteering at senior center", "traveling to family"]'
  career_goals: Even though she is retired, Jacqueline’s ambitions center on legacy and continuous learning. She aims to document her family’s oral history and write a memoir that captures the experiences
    of her generation, especially the migration from the Deep South to Maryland and the civil‑rights era. She wants to pass down her culinary knowledge by teaching her grandchildren beloved recipes and
    hosting monthly cooking workshops at the community center. Jacqueline is committed to expanding her digital fluency, mastering tablet use and video‑calling platforms so she can mentor other seniors
    in technology. She also hopes to launch a neighborhood garden project that provides fresh produce to low‑income families and to lead a weekly story‑time program for children at the senior center. Maintaining
    her health, independence, and strong family connections remains a guiding objective.
