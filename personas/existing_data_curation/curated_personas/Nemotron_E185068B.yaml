personas:
  professional: Jacqueline Ivory, a retired community organizer and longtime church volunteer, channels their decades of budgeting, conflict‑resolution, and gardening expertise into coordinating neighborhood
    garden projects and senior‑center workshops, balancing a practical, detail‑oriented approach with a curious drive to learn new technology.
  sports: Jacqueline Ivory keeps fit with gentle walks as a member of the Bowie Senior Walking Club, cheers on the Washington Nationals (MLB) and Washington Wizards (NBA) during weekend games, and volunteers
    as a score‑keeper for the senior center’s weekly bridge tournament, merging their competitive spirit with a low‑impact routine.
  arts: Jacqueline Ivory’s artistic world revolves around the resonant gospel vocals of Mahalia Jackson, the timeless piano of Ray Charles, and the deep storytelling of Toni Morrison, while they don their
    choir robe each Sunday to sing hymns by Thomas A. Dorsey and share their love of Southern historical fiction—particularly novels by Jesmyn Ward and Barbara Kingsolver—during lively senior‑center book
    club meetings.
  travel: Jacqueline Ivory prefers short, purpose‑driven trips that blend family visits with cultural exploration, favoring car rides to Washington, D.C. museums and weekend stays in historic Charleston,
    SC, while dreaming of a pilgrim‑style cruise down the Mississippi River, though budget constraints and caregiving duties limit longer voyages.
  culinary: Jacqueline Ivory is an advanced home cook who perfects soul‑food classics such as smoked collard greens with ham hocks, slow‑braised pork shoulder, sweet potato pie, and butter‑fried catfish,
    seasoning them with fresh rosemary, thyme, and garden‑grown garlic, and treats their weekly kitchen sessions as both a culinary laboratory and a communal gathering for family and church members.
  core: Jacqueline Ivory is a diligent, garden‑loving community matriarch who balances a tireless commitment to caring for others with a persistent worry about the future, often hoarding recipe cards and
    meticulously noting garden sowing dates while reluctantly ceding control in group settings.
background:
  cultural: Jacqueline’s cultural identity is rooted in the African‑American experience of the Mid‑Atlantic. Her parents migrated from the Deep South (Georgia) to Prince George’s County in the 1950s, joining
    a wave of families seeking better opportunities and civil‑rights activism. Growing up in Bowie, she was immersed in the traditions of the Black church, gospel music, and community solidarity that defined
    the local African‑American neighborhoods. She celebrates Juneteenth and other cultural milestones, and her cooking reflects the rich culinary heritage of soul food passed down through generations. The
    legacy of the civil‑rights movement, strong family kinship ties, and the vibrant cultural life of Prince George’s County shape her worldview and daily practices.
