personas:
  professional: Alma Mckinnon, a 26‑year‑old heavy‑equipment operator and aspiring trainer, blends curiosity with practicality by expertly maneuvering forklifts and tractors, maintaining precise logs, integrating
    telematics for efficiency, and assertively championing safety while mentoring junior crew members, and they view every shift as a platform to teach best practices.
  sports: Alma Mckinnon maintains fitness by jogging along the Long Island Sound and riding with the West Haven Cycling Club on weekends, cheering for the New York Yankees and the New England Patriots,
    pairing interval training with classic jazz playlists to keep motivation high, and they consider each ride an opportunity to test both stamina and equipment knowledge.
  arts: Alma Mckinnon, an avid music lover, immerses themselves in the sounds of Erykah Badu, John Coltrane, and Kendrick Lamar, frequents local open‑mic nights, uses those rhythms as a backdrop while restoring
    vintage bicycles and crafting custom shelving, and they often hum the melodies while tightening bolts.
  travel: Alma Mckinnon prefers purposeful travel that balances adventure and relaxation, often planning trips with bike‑friendly routes using apps, has explored Martha’s Vineyard and Puerto Rico, dreams
    of cycling Iceland’s Ring Road and hiking New Zealand’s South Island once their equipment‑rental business stabilizes, and they meticulously map each journey to blend work insights with leisure.
  culinary: Alma Mckinnon, a confident home chef, delights in preparing soulful Southern staples like buttermilk fried chicken and collard greens alongside Caribbean‑inspired jerk chicken with scotch bonnet
    peppers and mango salsa, frequently experimenting with smoked paprika, fresh thyme, and a dash of lime to add bright complexity, and they enjoy sharing these meals at community gatherings.
  core: Alma Mckinnon merges a mechanic’s precision with a musician’s rhythm, meticulously logging equipment data while humming jazz, habitually checks the equipment checklist before bed as a quirky ritual,
    and they view each detail as a beat in their daily symphony.
background:
  cultural: Alma was raised in West Haven’s close‑knit African‑American community, where church, music, and family gatherings shaped her worldview. Her mother’s Jamaican heritage and her father’s Southern
    roots introduced her to a blend of Caribbean and soul food traditions, gospel music, and a strong emphasis on communal support. Growing up in a working‑class neighborhood, she values resilience, self‑reliance,
    and collective uplift, often participating in local cultural festivals such as the West Haven African‑American Heritage Celebration. These influences inform her respect for tradition, her love of rhythm
    and food, and her commitment to mentoring the next generation of Black tradespeople.
attributes:
  skills: '[''Industrial Truck Operation'', ''Heavy Equipment Maneuvering'', ''Preventive Maintenance'', ''Mechanical Troubleshooting'', ''Safety Compliance (OSHA)'', ''Load Planning and Securing'', ''Equipment
    Logkeeping'', ''Basic Hand-Tool Repairs'', ''Telematics Integration'', ''Team Coordination'']'
  hobbies: '[''Mechanical DIY Projects'', ''Bicycle Restoration'', ''Coastal Jogging'', ''Cycling'', ''Listening to R&B/Jazz/Hip-Hop'', ''Cooking Soulful Southern and Caribbean Dishes'', ''Volunteering
    at Youth Center (Tool Safety Workshops)'', ''Attending Live Music Events'']'
  career_goals: Alma aims to earn advanced certifications such as NCCER and OSHA Forklift Trainer to become a certified heavy‑equipment trainer. In the next five years she hopes to move into a supervisory
    role, overseeing a fleet of industrial vehicles and managing safety programs for a construction or municipal firm. Long‑term, she envisions starting her own equipment‑rental and logistics consulting
    business, with a focus on providing opportunities for women and minorities in the trades. She also wants to mentor younger workers and advocate for sustainable, low‑emission equipment solutions.
