persona_description: A professional digital educator who is passionate about leveraging participatory digital technologies to enhance assessment practices in online learning environments. This individual
  is particularly interested in exploring the use of Web 2.0 and virtual world technologies to create engaging and interactive assessment activities that foster student engagement and learning. They are
  familiar with various wiki-based platforms and tools, such as Jmol applets, EmbedVideo extension, FLVPlayer extension, and FormelApplet extension, and are interested in how these tools can be used to
  create innovative and effective assessment methods. They are open to exploring new and innovative assessment approaches and are eager to learn from and share their experiences with others in the field.
