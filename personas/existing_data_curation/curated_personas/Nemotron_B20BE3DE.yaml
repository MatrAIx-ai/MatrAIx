  career_goals: Though still very young, Alexis dreams of a future where she can create and explore. She imagines becoming an artist who paints vibrant pictures, a storyteller who weaves fantastical tales,
    or a curious scientist who discovers how things work. Her strong curiosity, love of novelty, and appreciation for harmony guide her ambition to pursue a path that blends creativity with thoughtful inquiry,
    supported by a family that encourages her imaginative spirit.
