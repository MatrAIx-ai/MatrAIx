personas:
  professional: Alexis Parisi, a precocious preschool architect and budding problem‑solver, spends afternoons building elaborate forts with blocks, channeling curiosity about abstract structures while balancing
    careful organization with spontaneous design.
  sports: Alexis Parisi, a tiny sports enthusiast, participates in a local preschool gymnastics class, enjoys splash‑time swimming lessons at the community pool, and cheers from the sidelines for the Riverdale
    Rovers, the nearby municipal soccer team.
  arts: Alexis Parisi, an imaginative little creator, loves drawing whimsical creatures inspired by Dr. Seuss and Van Gogh’s Starry Night, sings along to Disney’s "Let It Go" and the playful tunes of The
    Wiggles, and stages make‑believe performances for family with stuffed‑animal audiences.
  travel: Alexis Parisi, a curious toddler traveler, delights in family road trips to the nearby national park where they explore leaf‑collecting trails, dreams of visiting the magical worlds of Disney
    World in Florida, and prefers traveling with a familiar stuffed bunny for comfort.
  culinary: Alexis Parisi, a picky but adventurous eater, relishes buttery macaroni and cheese, strawberry‑banana smoothies, and carrot sticks with hummus, while occasionally refusing broccoli and savoring
    a bite of sushi rolls when a parent offers them as a special treat.
  core: Alexis Parisi, a three‑year‑old with a boundless imagination, prefers quiet corners to noisy crowds, builds intricate block cities, and insists on bedtime stories before sleep, though they sometimes
    linger over puzzles into the night.
background:
  cultural: Alexis is a white child raised in Memphis, Tennessee, where Southern hospitality and community are integral parts of daily life. Her family participates in local traditions such as Thanksgiving
    gatherings, church services, and neighborhood festivals that celebrate Memphis's rich musical legacy of blues and soul. She attends a community preschool that emphasizes arts integration, storytelling,
    and early social skills. The cultural milieu enriches her exposure to music, regional cuisine like barbecue, and a warm, cooperative environment that values kindness and harmony.
