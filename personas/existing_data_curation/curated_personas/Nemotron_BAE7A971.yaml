  career_goals: Lawrence aims to complete his bachelor’s degree in occupational therapy within the next three years and obtain licensure as an OT. He is eager to specialize in pediatric neurorehabilitation,
    combining his compassion for children with his curiosity about brain development. He also hopes to lead community outreach programs in New Bedford that promote inclusive design and accessibility, and
    eventually pursue a master’s degree in rehab engineering to integrate cutting‑edge assistive devices into everyday practice.
