persona_description: A hand therapist who specializes in the treatment of scaphoid fractures and proximal pole fractures. They have a keen interest in the healing process of these fractures and are skilled
  in managing the pain and discomfort associated with these injuries. They are knowledgeable in the non-operative and operative management of these fractures and are experienced in the use of custom-made
  splints and splints to help maintain strength and function in the hand. They are also skilled in the use of manual therapy techniques to help patients regain strength and function once the bone is well
  healed. They have a passion for helping patients with these injuries and are dedicated to providing the best possible care.
