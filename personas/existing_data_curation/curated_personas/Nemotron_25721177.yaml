  hobbies: '[''Improvisational theater'', ''Hosting dinner parties with fusion cuisine'', ''Science outreach volunteering'', ''Hiking in the East Bay hills'', ''Yoga'', ''Biking on the Bay Trail'', ''Photography'',
    ''Live music concerts'', ''Reading contemporary fiction'', ''Language learning (Vietnamese, Mandarin)'']'
  career_goals: Thanh aims to establish her own interdisciplinary research lab that bridges basic molecular biology with translational applications in personalized medicine. She seeks to secure a major
    NIH R01 grant to investigate gene‑editing therapies for rare diseases, while simultaneously building community‑focused outreach programs that bring cutting‑edge science to local schools and senior centers.
    Long‑term, she envisions launching a biotech startup that commercializes affordable diagnostic tools, and she is committed to mentoring a diverse next generation of scientists to foster inclusive excellence.
