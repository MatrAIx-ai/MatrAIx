  hobbies: '[''Surfing'', ''Hiking'', ''Photography'', ''Art gallery visits'', ''Open‑mic events'', ''Cooking Mexican cuisine'', ''Cultural festival participation'', ''Reading on urban design'', ''Sketching
    cityscapes'']'
  career_goals: Jesus aims to obtain his full brokerage license within the next two years and eventually launch his own boutique agency that specializes in art‑focused and sustainably designed properties
    in the San Diego coastal market. He wants to rank among the top 5 % of agents in Oceanside by consistently hitting high sales volumes, and he plans to mentor new agents to foster a culture of innovative,
    client‑centric service. Long‑term, he envisions expanding into property development, creating mixed‑use spaces that integrate local Mexican‑American cultural elements with modern design, while also
    giving back to his community through affordable‑housing initiatives.
