personas:
  professional: Antoine Carter is a retired handyman and community coordinator who leverages three decades of carpentry, small‑engine repair, and meticulous budgeting to mentor younger volunteers, applying
    a methodical, reliability‑driven approach that reflects their competitive desire to set high standards for every project.
  sports: Antoine Carter is a devoted fan of the local minor‑league baseball team, the River City Rivermen, follows the New York Mets during the season, holds a lifetime membership with the senior fishing
    club at Lake Willow, enjoys early‑morning trout fishing and leisurely walks along the lake trail, and incorporates gentle stretching into their routine to counteract woodworking‑related stiffness, while
    eschewing high‑impact sports.
  arts: Antoine Carter finds artistic solace in classic American folk music, regularly listening to Johnny Cash and Pete Seeger, immerses themselves in historical nonfiction by David McCullough, admires
    the realist paintings of Andrew Wyeth, builds detailed model train layouts inspired by Lionel, and attends occasional community theater productions of classic plays, allowing their appreciation for
    craftsmanship to spill into their artistic tastes.
  travel: Antoine Carter prefers low‑key, historically rooted travel, meticulously planning road trips to sites like Colonial Williamsburg, Gettysburg National Military Park, and a week‑long pilgrimage
    to Normandy to trace ancestral roots, traveling in a comfortable RV with their wife and occasionally grandchildren, and avoids spontaneous trips, favoring a structured itinerary and modest budgets.
  culinary: Antoine Carter enjoys cooking garden‑fresh vegetable stew seasoned with rosemary and thyme, pan‑searing trout caught on their fishing outings, preparing classic meatloaf with a caramelized crust,
    and expertly canning tomatoes and pickles, though they sometimes forget to defrost meat before cooking, revealing a slight lapse in their otherwise methodical kitchen routine.
  core: Antoine Carter is a meticulous, solitary craftsman who blends disciplined budgeting, methodical volunteering, and a love for history into a competitive yet reserved lifestyle marked by occasional
    stubbornness and a penchant for vintage cars.
background:
  cultural: Antoine was raised on a family farm near Des Moines in a tight‑knit, predominantly white, Midwestern community with German and Norwegian roots. The cultural environment emphasized self‑reliance,
    punctuality, modesty, and a strong sense of duty to family and church. These values have shaped his pragmatic outlook, his methodical approach to tasks, and his preference for ordered, predictable routines.
    He maintains the tradition of attending the local Lutheran congregation and participating in seasonal community events such as the Iowa State Fair.
attributes:
  skills: '["home repair","carpentry","small engine maintenance","budgeting and personal finance","gardening","genealogy research","senior volunteer coordination","community event organization"]'
