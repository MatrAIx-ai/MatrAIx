personas:
  professional: Jing Tan is a diligent technical support specialist who leverages fluency in Mandarin and English to resolve Windows, macOS, and Linux incidents, automates routine tasks with PowerShell
    and Bash scripts, and writes precise bilingual knowledge-base articles, all while their methodical, routine-driven approach shaped by years of celebrating Lunar New Year rituals ensures calm, reliable
    service for users.
  sports: Jing Tan enjoys casual fitness through early morning walks in Overton Park, participates in the local Memphis Running Club's weekend 5k runs, follows the Memphis Grizzlies closely during the NBA
    season, and keeps a modest home gym for yoga and resistance band exercises, adhering to a steady, routine-focused regimen that prioritizes consistency over competition.
  arts: Jing Tan dives into artistic appreciation by reading literary fiction and classic Tang poetry by Li Bai, practicing calligraphy inspired by Wang Xizhi, attending Memphis Chinese Cultural Association's
    brush-painting evenings, and listening to classical pieces by Debussy and jazz legends like Wynton Marsalis and B.B. King, which together shape a quiet yet richly textured creative outlet.
  travel: Jing Tan prefers well-planned, low-stress trips that blend cultural immersion with culinary exploration, having enjoyed a family reunion in Beijing during Lunar New Year, a jazz-filled weekend
    in New Orleans, and a spring hike in the Great Smoky Mountains, while dreaming of a future pilgrimage to Kyoto's historic tea houses, all scheduled around work certifications and a modest travel budget.
  culinary: Jing Tan is a skilled home-cook who expertly folds jiaozi dumplings and hand-pulls noodles, often infusing them with Southern ingredients like smoked brisket or collard greens, while also crafting
    delicate tea-infused sauces with ginger and star anise, reflecting a meticulous, routine-driven kitchen practice that balances traditional flavors with local twists.
  core: Jing Tan blends meticulous technical expertise with a love for Lunar New Year traditions, methodical routines, and occasional over-ordering of fresh herbs that crowd their kitchen counters, embodying
    a quietly efficient bridge between two worlds.
background:
  cultural: Jing was born in Memphis to first‑generation Chinese immigrants who settled in the city in the early 1990s. Her upbringing blended traditional Chinese customs—such as celebrating Lunar New Year,
    practicing Mandarin at home, and honoring elders—with Southern hospitality and community values of Memphis. The family emphasized discipline, harmony, and respect for authority, reflecting Confucian
    principles, while also encouraging participation in the local Chinese-American community through the Memphis Chinese Cultural Association. Jing maintains bilingual fluency in Mandarin and English, often
    assisting fellow Chinese-American residents with technology issues and serving as a cultural bridge. Her culinary repertoire fuses Chinese flavors with Southern ingredients, and she values the balance
    between preserving heritage and adapting to her American surroundings.
