  career_goals: 'Jing aims to deepen her technical expertise by earning certifications such as CompTIA Network+, ITIL Foundation, and eventually a Microsoft Certified: Modern Desktop Administrator Associate.
    Over the next three to five years, she envisions progressing to a senior support analyst role and then stepping into a team‑lead or IT operations manager position where she can mentor junior staff and
    streamline support processes. She also aspires to integrate her humanities background into user experience initiatives, creating documentation and training materials that improve end‑user satisfaction,
    all while maintaining a stable, predictable schedule that supports her family life.'
