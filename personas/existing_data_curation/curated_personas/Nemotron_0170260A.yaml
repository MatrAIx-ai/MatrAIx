personas:
  professional: John Porter, an aspiring junior builder and nature enthusiast, merges their love of fishing, LEGO construction, and model airplanes into hands‑on projects that emphasize practical problem‑solving
    and step‑by‑step planning, while their relaxed attitude toward obligations lets them improvise when the blueprint doesn’t match reality.
  sports: John Porter, a dedicated member of the Port Edwards Youth Soccer Club who idolizes the Milwaukee Bucks for their teamwork and roots for the Green Bay Packers on Sundays, spends their afternoons
    after school sprinting across the soccer field, supplements their fitness with weekend bike rides through the Kettle Moraine woods, and follows the Milwaukee Brewers' spring training for inspiration
    on hand‑eye coordination.
  arts: John Porter, a creative LEGO architect and avid reader of adventure series by J.K. Rowling and Rick Riordan, draws inspiration from the whimsical world of The Goonies and the energetic tracks of
    Imagine Dragons while sketching new model airplane designs, letting these artistic influences shape their imaginative play.
  travel: John Porter, who loves spontaneous weekend camping in the nearby Kettle Moraine State Forest and has explored Door County’s shoreline, dreams of trekking Yellowstone’s geysers and wandering the
    historic streets of Edinburgh, preferring loosely planned itineraries that leave room for impromptu fishing spots, all within the constraints of school calendars and their family's modest travel budget.
  culinary: John Porter, a budding kitchen helper who confidently flips grilled cheese sandwiches and assists their family in baking chocolate‑chip cookies with chunks of dark chocolate, favors hearty meals
    like fish tacos topped with fresh cilantro, lime, and a dash of jalapeño, yet often rebels against the garden‑grown green beans, opting instead for crunchy raw carrots as their snack.
  core: John Porter, an 11‑year‑old who balances methodical LEGO builds with adventurous woods explorations, demonstrates disciplined teamwork on the soccer field while they occasionally shirk allowance
    budgeting in favor of impulsive video‑game purchases, and even keep a secret stash of pine cones for future projects.
background:
  cultural: John comes from a white, Midwestern family rooted in the rural community of Port Edwards, Wisconsin. His upbringing reflects the region’s strong connection to the outdoors, a tradition of community
    involvement through school events, local fairs, and church activities, and a cultural heritage that includes German and Scandinavian influences common in the area. The family values modesty, hard work,
    and neighborly support, which shape his worldview and daily routines.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Model kit assembly", "Introductory woodworking", "Basic computer usage", "Simple coding (e.g., Scratch)", "Team sports collaboration"]'
  hobbies: '["Fishing", "Hiking", "Soccer", "LEGO building", "Model airplane construction", "Strategy video games", "Adventure book reading", "Gardening"]'
  career_goals: John hopes to become a wildlife biologist or conservation officer one day, driven by his love of the outdoors and desire to protect local forests and lakes. He is also intrigued by the idea
    of working as an automotive mechanic, reflecting his interest in hands‑on problem solving. In the short term, he aims to excel in middle‑school science, join the environmental club, and explore summer
    programs that combine fieldwork with science learning.
