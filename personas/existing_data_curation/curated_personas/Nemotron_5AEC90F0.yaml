personas:
  professional: Monica Romano, a 14‑year‑old aspiring digital illustrator who blends traditional sketching with Procreate, channels their organized, methodical nature into school art club projects, and
    volunteers teaching storytelling at the local library, demonstrating a cooperative spirit and an eye for detail.
  sports: Monica Romano enjoys weekend hikes along the coastal trails of Smithfield, follows the New England Patriots and Boston Red Sox passionately, and runs on the school’s cross‑country team, channeling
    their reliable, cooperative nature into consistent training while occasionally skipping a practice for art club events.
  arts: Monica Romano immerses themselves in sketching whimsical characters, painting New England seascapes, and creating digital stories in Procreate, drawing inspiration from fantasy authors like Brandon
    Sanderson, classic masters like Leonardo da Vinci, and contemporary digital artists such as Loish, while also dabbling in beginner piano pieces by Debussy.
  travel: Monica Romano loves day trips to historic Newport mansions and weekend bike rides on the Narragansett Bay Trail, dreams of exploring the cobblestone streets of Florence with their family, and
    prefers pre‑planned itineraries that balance cultural immersion with opportunities for sketching scenic vistas.
  culinary: Monica Romano enjoys helping prepare Sunday family meals featuring homemade pasta with fresh basil and Parmesan, delights in the salty tang of Rhode Island clam chowder, and experiments with
    simple recipes like caprese salad, though they occasionally overindulge in sweet pastries after art club sessions.
  core: Monica Romano blends a meticulous, cooperative mindset with a boundless imagination, juggling art, school, and family traditions while occasionally succumbing to late‑night snack binges and over‑committing
    to extracurriculars.
background:
  cultural: Monica grows up in a white, Italian‑American family in Smithfield, Rhode Island. Her family maintains cultural ties to Italy through food traditions such as homemade pasta and Sunday family
    meals, while also embracing New England values like self‑reliance, community involvement, and a strong emphasis on education. Her neighborhood reflects a mix of suburban New England life with occasional
    local festivals that celebrate the region’s maritime heritage. This blend of Italian family customs and Rhode Island’s small‑town culture shapes her worldview, fostering a respect for tradition, a collaborative
    spirit, and an appreciation for both artistic expression and community service.
