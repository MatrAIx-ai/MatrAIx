  career_goals: Monica aims to combine her love for art and imagination with her methodical nature by pursuing a career in illustration or concept art for video games or animation. She also dreams of studying
    architecture to design spaces that inspire creativity. In the longer term, she hopes to attend a liberal arts college where she can major in visual arts or design, and eventually work as a creative
    director or art therapist, using her artistic talents to help others express themselves.
