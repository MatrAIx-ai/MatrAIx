  career_goals: Teresa’s primary ambition is to preserve Blanca’s collective memory by completing a community‑wide oral‑history project and publishing a locally‑focused history book. She seeks to expand
    the senior arts mentorship program she founded, fostering intergenerational creativity and ensuring that her expertise in literature and crafts is passed to younger residents. Teresa also aims to continue
    speaking at town events, sharing stories that celebrate the town’s multicultural heritage, while actively managing her anxiety through regular social engagement, mindfulness practices, and continuing
    education in digital storytelling.
