personas:
  professional: Teresa Means, an 83‑year‑old senior historian and community‑arts coordinator, blends graduate‑level research skills with a methodical, talkative flair to lead oral‑history projects, manage
    workshop budgets, and deliver engaging public talks, all while using her sociable nature to rally volunteers despite occasional anxiety‑driven over‑planning.
  sports: Teresa Means enjoys walking the local Sangre de Cristo foothills on short hikes, follows the Colorado Rockies baseball and the New Mexico State Aggies football teams on TV, and participates in
    a senior bridge club that doubles as a low‑impact mental‑sport, while occasionally joining a community walking group that meets thrice weekly.
  arts: Teresa Means, a lifelong lover of literature and folk‑music, devotes afternoons to reading classics by Jane Austen and James Joyce, attends performances at the local community theater featuring
    works like Our Town starring Meryl Streep, and plays the acoustic guitar at folk‑music gatherings where she sings Bob Dylan and Joan Baez while knitting intricate shawls inspired by the patterns of
    Andrew Wyeth’s paintings.
  travel: Teresa Means prefers carefully planned, low‑key excursions, having revisited Santa Fe for its art markets, trekked the Great Sand Dunes for bird‑watching, and taken a serene river cruise on the
    Rio Grande, while dreaming of a literary pilgrimage to Edinburgh’s Writers' Museum and a relaxed tea‑house stay in Kyoto.
  culinary: Teresa Means enjoys cooking simple, nutritious meals like chicken tortilla soup seasoned with cumin and cilantro, rosemary‑scented roasted potatoes, and herb‑infused scones, and she delights
    in pairing them with Earl Grey tea and occasional apricot‑glazed crumpets, wielding a modest kitchen skill set that balances comfort cooking with occasional experimental twists.
  core: Teresa Means, an 83‑year‑old archivist‑turned‑mentor, weaves curiosity, community spirit, and gentle anxiety into a tapestry of knitting, storytelling, and meticulous planning, all while occasionally
    over‑booking her calendar and mistaking tea bags for bookmarks.
background:
  cultural: Teresa is a white American of Irish‑English ancestry, raised in the post‑World War II Midwest where she absorbed mid‑century values of community service, education, and a love for the arts.
    In the 1970s she relocated to Blanca, Colorado, drawn by its scenic landscape and close‑knit community. Over decades, she has embraced the town’s Southwestern culture, participating in local festivals
    that blend Hispanic traditions with frontier heritage. Her family retains Anglo‑American customs—holiday feasts, folk music, and storytelling—while she actively respects and celebrates the multicultural
    fabric of Costilla County.
