  career_goals: Although retired, Rosemary aims to continue contributing to her community by serving as a mentor and advisor to emerging local leaders and nonprofit boards. She aspires to expand her philanthropic
    impact through fundraising initiatives and by helping establish a modest scholarship fund for Brighton students pursuing business studies. Rosemary also wishes to document her life story and business
    insights in a memoir that can serve as a resource for future generations. Additionally, she is motivated to stay current with digital communication tools so she can maintain strong connections with
    family, friends, and volunteer groups across distances.
