personas:
  professional: Rosemary Jackson is a former business manager turned community mentor, leveraging their strategic planning, budgeting, and conflict‑resolution expertise to guide nonprofit boards and organize
    fundraising events with a pragmatic yet curious eye.
  sports: Rosemary Jackson enjoys low‑impact fitness, joining the Brighton Trail Walkers for weekly spring wildflower hikes, cheering the Denver Broncos on Sundays, and occasionally playing a friendly game
    of pickleball at the local senior center.
  arts: Rosemary Jackson finds creative solace in quilting while quoting Jane Austen, attends community theater productions starring local talent like Sarah Martinez, and relaxes to the gentle guitar of
    Andrés Segovia and the folk ballads of Joan Baez, all of which shape their storytelling flair.
  travel: Rosemary Jackson loves day‑tripping to the fragrant meadows of Rocky Mountain National Park, reminiscing about historic train rides to Grand Junction, and dreams of a slow‑paced cultural tour
    of England’s countryside cottages, all while accommodating their grandchildren’s school‑holiday visits.
  culinary: Rosemary Jackson delights in cooking family recipes like chicken pot pie seasoned with garden‑fresh thyme, simmering Colorado lamb stew with root vegetables, and baking zucchini bread with a
    generous swirl of honey, while often swapping recipes with fellow seniors over homemade tea.
  core: Rosemary Jackson is an ever‑curious, pragmatic centenarian who blends community service, garden‑grown nourishment, and spontaneous generosity into a life rich with compassion and mild forgetfulness.
background:
  cultural: Rosemary is a White American whose family roots trace back to British and German ancestry. Growing up in the post‑World War II era, she experienced the optimism of the 1950s, the social changes
    of the 1960s, and the rise of women’s participation in the business world. These historical influences have shaped her values of hard work, community service, and egalitarian collaboration. Living in
    Brighton, Colorado, she embraces a blend of small‑town Midwestern sensibility and the outdoors‑oriented, progressive spirit of the Rockies. Her cultural background emphasizes a strong sense of civic
    duty, intergenerational support, and a balance between tradition and openness to new ideas.
