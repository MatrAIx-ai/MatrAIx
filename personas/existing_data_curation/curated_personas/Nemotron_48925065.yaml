  career_goals: Although no longer in the formal workforce, Jessica aims to stay intellectually active and socially impactful. She plans to mentor emerging entrepreneurs through a local business incubator,
    serve on the board of a senior community center, and write a memoir that distills the business lessons she has learned over her lifetime. She is also eager to expand her technical fluency by learning
    video‑editing and podcasting to share her knowledge. Advocacy for senior‑friendly business policies in Snohomish County and spearheading a neighborhood garden project are additional ambitions. To counterbalance
    her tendency toward worry, she intends to attend weekly mindfulness workshops and practice journaling for stress management.
