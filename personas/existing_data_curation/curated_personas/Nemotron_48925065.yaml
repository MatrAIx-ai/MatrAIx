personas:
  professional: Jessica Lilly, a 75‑year‑old former corporate planner turned senior mentor, leverages strategic planning, budgeting, and risk‑assessment expertise to guide nonprofit boardrooms and budding
    entrepreneurs, yet they sometimes let their spontaneous nature cause missed deadlines and rely on napkin sketches rather than formal reports.
  sports: Jessica Lilly enjoys regular walks along the Puget Sound shoreline and the regional trail network, is an avid supporter of the Seattle Seahawks, Seattle Sounders FC, and Seattle Mariners, participates
    in the Snohomish County senior walking club and a weekly pickleball group at the community center, and they still find time to play bridge competitively at the local senior center.
  arts: Jessica Lilly participates in community theater productions, especially loving the works of August Wilson and the classic musical The Sound of Music, attends the Seattle Symphony’s performances
    of Beethoven’s Ninth Symphony, enjoys listening to Joni Mitchell and folk‑rock playlists while gardening, and they collect prints of Georgia O'Keeffe’s desert landscapes.
  travel: Jessica Lilly favors spontaneous road trips that combine scenic drives with birdwatching, has explored the San Juan Islands, the Oregon Coast, and historic towns of British Columbia, and they
    keep a travel list that includes a dream visit to the Scottish Highlands and a leisurely cruise through Iceland’s fjords.
  culinary: Jessica Lilly experiments with seasonal cooking using fresh herbs from her garden, delights in preparing pan‑seared salmon with dill‑infused butter, roasted root vegetables tossed with sage,
    and a comforting New England clam chowder, embraces the occasional indulgence of homemade apple pie, and they are comfortable hosting potluck dinners where they share their garden harvest.
  core: Jessica Lilly, a spirited 75‑year‑old strategist, blends curiosity, competitiveness, and a touch of worry into a life of community mentorship, spontaneous road trips, and seasonal gardening, and
    they occasionally misplace bridge cards and lose track of deadlines.
background:
  cultural: Jessica is a white American who grew up in the post‑World War II Pacific Northwest, experiencing the region’s suburban expansion and a modest Protestant upbringing that emphasized self‑reliance,
    community service, and respect for nature. Though she now identifies as culturally secular, the values of modesty, environmental stewardship, and a strong work ethic remain central to her identity.
    Her lifelong residence in Washington has shaped her appreciation for the outdoors, local civic engagement, and the region’s blend of progressive social attitudes with traditional Mid‑western pragmatism.
