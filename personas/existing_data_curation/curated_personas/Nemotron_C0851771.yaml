personas:
  professional: Doris Lambert, a seasoned commercial facilities maintenance specialist, leverages meticulous cleaning protocols, OSHA compliance expertise, and a knack for orchestrating teams to turn chaotic
    workspaces into smoothly operating environments, all while delighting in the spotlight of client presentations and neighborhood clean‑up rallies, and they thrive on the structured rhythm of each project.
  sports: Doris Lambert, an avid walker who leads a Bellingham‑based walking club and joins the local Bellingham Bells baseball fan group, squeezes in weekend hikes in the North Cascades, follows the Seattle
    Seahawks for fall football, and they treat the Seattle Sounders FC matches as her primary source of seasonal cardio excitement.
  arts: Doris Lambert, a ballroom‑dance enthusiast, regularly attends indie‑music concerts featuring acts like The National and Mitski, and spends quiet evenings dissecting historical documentaries by Ken
    Burns, while occasionally channeling their creativity into DIY home‑decor projects inspired by the minimalist designs of artist Agnes Martin.
  travel: Doris Lambert favors meticulously planned road trips along the Pacific Northwest, having already explored the moss‑laden Hoh Rainforest and the vibrant streets of Portland, while dreaming of a
    sustainable eco‑tour of Denmark's Copenhagen to study green‑city practices they hope to implement back home.
  culinary: Doris Lambert enjoys farm‑to‑table cooking, expertly whipping up roasted beet and goat cheese salads, quinoa‑stuffed peppers, and herb‑infused vegetable stir‑fry, but admits a guilty pleasure
    for indulgent pepperoni pizza on movie nights, and they balance the garden harvest with occasional take‑out cravings.
  core: Doris Lambert blends a disciplined, structure‑loving mindset with a sociable, talk‑heavy flair, turning community clean‑ups into choreographed events, and they can't resist a late‑night puzzle piece
    that doesn’t fit, leading to a habit of staying up past her bedtime.
background:
  cultural: Doris comes from a white, middle‑class background with roots in the Midwestern United States, having relocated to the Pacific Northwest in early adulthood. Immersed in Bellingham's progressive,
    environmentally conscious culture, she embraces values of hard work, self‑reliance, and community stewardship. Her upbringing emphasized practicality and resilience, while her current locale reinforces
    a strong commitment to sustainability, civic engagement, and inclusive social interaction.
