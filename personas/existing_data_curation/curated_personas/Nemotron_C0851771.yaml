  career_goals: Doris aims to transition from her current janitorial role to a facilities manager position within the next three to five years, securing certifications in occupational safety and pursuing
    a diploma in business administration. She intends to leverage her organizational talent to lead a larger operations team, implement eco‑friendly cleaning initiatives, and champion workplace safety improvements.
    Long‑term, she hopes to launch her own sustainable cleaning enterprise that provides mentorship and fair employment opportunities for workers in the Bellingham area, earning recognition as a community
    leader in green facility management.
