  career_goals: Approaching retirement, Oscar aims to transition into a senior consultancy role where he can leverage his extensive engineering background to guide renewable‑energy projects and efficiency
    upgrades for regional utilities. He aspires to mentor the next generation of engineers, especially Latinx students, through partnership with local schools and community STEM programs. Additionally,
    he hopes to author a practical guide on integrating legacy electrical infrastructure with modern smart‑grid technologies and to volunteer his expertise for nonprofit initiatives focused on sustainable
    housing retrofits in the Chicago metropolitan area.
