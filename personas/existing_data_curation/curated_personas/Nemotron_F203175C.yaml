personas:
  professional: Oscar Miranda, a veteran electrical and electronics engineer with over forty years of experience designing power distribution, industrial automation, and embedded systems, is channeling
    their organized, methodical mindset into a senior consultancy role guiding renewable‑energy upgrades for regional utilities while mentoring Latinx students in community STEM programs.
  sports: Oscar Miranda regularly fishes on Crystal Lake with a 10‑lb spinning rod, hikes the Moraine State Park trails as a member of the local outdoors club, plays weekly chess at the senior center, and
    avidly supports the Chicago Cubs and Chicago Bears, while also coaching a youth soccer team on weekends.
  arts: Oscar Miranda enjoys listening to salsa legends like Celia Cruz, Latin jazz virtuoso Gonzalo Rubalcaba, and classic boleros by Armando Manzanero, occasionally joins a community Afro‑Cuban dance
    troupe, attends performances at the local theater featuring works by Lin‑Manuel Miranda, and collects vintage vinyl records of Tito Puente.
  travel: Oscar Miranda favors road‑trip adventures that combine nature and culture, having driven to Destin, Florida for its Gulf‑side beaches, trekked the Redwood National Park, explored the historic
    streets of Salamanca, Spain, and spent evenings in New Orleans’ French Quarter, while planning a future cruise to Caribbean colonial ports.
  culinary: Oscar Miranda expertly prepares classic island dishes such as ropa vieja, lechón asado, and arroz con gandules, seasoning with mojo, cumin, and sour orange juice, loves sourcing fresh plantains
    at the farmer’s market, though they sometimes over‑salt the lechón’s skin, a quirk that family members tease them about.
  core: Oscar Miranda blends a meticulous engineering mindset with a love for traditional celebrations, disciplined finances, proactive health routines, weekend fishing, salsa rhythms, and a curiosity for
    DIY tech, while occasionally losing track of time fixing circuits at the expense of dinner.
background:
  cultural: Oscar is a first‑generation Cuban‑American who grew up in a bilingual, bicultural household in the Midwest. He speaks fluent Spanish and English, celebrating Cuban holidays such as Carnaval
    and Día de la Revolución with family and community gatherings. The values of family loyalty, respect for tradition, and a strong work ethic, inherited from his parents who immigrated from Cuba, continue
    to shape his worldview. While fully integrated into the local community of Crystal Lake, he maintains close ties to the broader Cuban diaspora, participating in cultural festivals at the local Latin
    American cultural center and supporting Cuban charitable initiatives.
