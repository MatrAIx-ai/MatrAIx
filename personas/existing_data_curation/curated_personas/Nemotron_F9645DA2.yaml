  hobbies: '["Community soccer league","Country dancing","Cooking Mexican cuisine","Hunting and fishing","Rodeo events","Football watching","Drone photography","Volunteer roadside assistance","Youth mentorship"]'
  career_goals: Juan aims to transition from pure driving to a supervisory or owner‑operator role within the next five years. He plans to earn a Certified Transportation Professional (CTP) credential and
    acquire a Professional Truck Driver (PTD) endorsement to qualify for fleet‑management responsibilities. His long‑term ambition is to launch a small trucking and logistics company that serves the Permian
    Basin oil industry, leveraging his bilingual network and sales experience to secure contracts with Spanish‑speaking suppliers. Juan also hopes to achieve a more predictable schedule that allows him
    to spend quality time with his children after his divorce, and he is interested in becoming a safety trainer for newer drivers, using his practical knowledge and curiosity for emerging safety technologies.
