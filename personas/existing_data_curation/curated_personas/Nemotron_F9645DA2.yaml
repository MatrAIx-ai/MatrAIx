personas:
  professional: Juan Contreras is a veteran Class A truck driver and bilingual logistics specialist who blends meticulous safety compliance with a natural curiosity for emerging transportation technology,
    using their organized yet adaptable approach to optimize routes and build client relationships while preparing for a future transition into fleet supervision and entrepreneurship.
  sports: Juan Contreras plays in a community soccer league under the West Texas Amateur Soccer Association, attends weekly country dance nights where they cheer for the Dallas Cowboys and the Texas Rangers,
    holds an active membership in the Midland County Hunting Club, and follows the Professional Rodeo Cowboys Association circuit each spring.
  arts: Juan Contreras enjoys country‑western dance halls where they sway to George Strait and Dolly Parton, frequently listens to traditional corrido singers like Vicente Fernández on road trips, and attends
    occasional live performances by local folk ensembles, reflecting a love for music that bridges the old and the new.
  travel: Juan Contreras prefers weekend getaways to rugged sites such as the Davis Mountains and long‑distance road trips to the New Mexico desert, while dreaming of an international fishing expedition
    to Patagonia and a cultural tour of Spain’s historic towns, balancing careful budget planning with a craving for adventure that fits around their children’s school calendar.
  culinary: Juan Contreras takes pride in preparing heritage dishes like tacos al pastor, pozole rojo, and tamales de elote, skillfully using corn masa, chipotle peppers, and slow‑cooked pork shoulder,
    they host neighborhood potlucks where the aroma of simmering broth draws friends together, and they experiment with modern plating styles despite occasional over‑spicing.
  core: Juan Contreras is a sociable, hard‑working driver who channels curiosity into safety tech, worries about fleeting stress, and balances family time with evenings at the dance hall, all while occasionally
    splurging on hunting gear and over‑cooking their famous tamales.
background:
  cultural: Juan grew up in a bicultural Mexican‑Texan household. His parents emigrated from Jalisco, and he was raised bilingual, celebrating Día de los Muertos, quinceañeras, and other Mexican traditions
    while also embracing Texas customs such as Fourth of July barbecues, rodeos, and country music. The blend of strong family values, community orientation, and love of food from his Mexican heritage combined
    with the independent, pragmatic spirit of West Texas has shaped his identity. Living in Andrews—a hub for the Permian Basin oil industry—has reinforced a work ethic centered on reliability and practicality.
    Juan remains proud of his Mexican roots, often sharing cultural stories and recipes with coworkers, while his Texan experience informs his straightforward communication style and ambition to serve both
    Spanish‑speaking clients and the broader regional market.
attributes:
  skills: '["Class A commercial driving","Vehicle maintenance","Route planning and optimization","DOT safety compliance","Bilingual communication (Spanish/English)","Customer service","Negotiation and sales","Inventory
