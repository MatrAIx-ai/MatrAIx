personas:
  professional: Aurelio Guerrero, a curious five‑year‑old aspiring scientist, spends hours arranging color‑coded Lego experiments in a notebook, channeling their disciplined, organized nature into meticulously
    documented mini‑research projects while occasionally fretting over perfect results.
  sports: Aurelio Guerrero loves sprinting around the playground with the Kiddie Kickers preschool soccer club, shouting cheers for the Chicago Cubs during family game nights and proudly wearing a tiny
    Los Angeles Lakers jersey while practicing dribbling and juggling a mini soccer ball after school.
  arts: Aurelio Guerrero spends afternoons drawing whimsical creatures inspired by Dr. Seuss and humming the catchy tunes from Pixar’s 'Toy Story' soundtracks, especially the songs performed by Randy Newman,
    while proudly displaying their crayon masterpieces on the fridge.
  travel: Aurelio Guerrero’s travel diary boasts trips to Disneyland, the sunny shores of Florida’s Gulf Coast, and a weekend camping adventure in the Great Smoky Mountains, where they relish the mix of
    parent‑planned itineraries and spontaneous treasure hunts along the trail.
  culinary: Aurelio Guerrero delights in scooping extra cheese onto their homemade mac and cheese, eagerly helps stir the batter for banana pancakes, and insists on crunchy carrot sticks with hummus at
    lunch, revealing a budding palate that loves familiar comfort foods with a splash of bright veggies.
  core: Aurelio Guerrero is a meticulously organized five‑year‑old whose boundless curiosity drives them to perfect every Lego creation, yet their perfectionism fuels frequent worries and the occasional
    nail‑biting habit when results fall short.
background:
  cultural: Aurelio is raised in a Mexican‑American household in Stockton, California. Spanish is spoken at home, and Mexican traditions such as Día de los Muertos, Cinco de Mayo celebrations, and family
    gatherings centered around foods like tamales, pozole, and arroz con pollo are integral to his upbringing. His family emphasizes respect for elders, community involvement, and a blend of Mexican heritage
    with the diverse cultural environment of the San Joaquin Valley.
