  hobbies: '[''drawing and painting'', ''building with LEGO and wooden blocks'', ''reading picture books'', ''listening to library storytime'', ''exploring nature (collecting leaves, rocks, shells)'', ''dancing
    to Mexican folk music'', ''playing simple musical instruments like maracas'']'
  career_goals: Even at five, Aurelio imagines a future where he creates beautiful things. He dreams of becoming an artist or architect who designs vibrant, story‑filled buildings. He also expresses a wish
    to be a teacher who shares his love of art and curiosity with other children. His ambition is to achieve high standards in any path he chooses, aiming to inspire his family and community with his creations.
