persona_description: A scientist and archaeologist who specializes in the study of ancient remains and artifacts, particularly those related to the works of Caravaggio. His research interests include the
  analysis of bone and skeletal remains, the interpretation of carbon dating results, and the comparison of DNA samples with possible male kin in Caravaggio's family. He is particularly interested in the
  enigma surrounding Caravaggio's death and the mystery of his remains, which he is working to solve through a combination of scientific analysis and DNA testing.
