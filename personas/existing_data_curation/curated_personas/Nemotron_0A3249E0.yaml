personas:
  professional: Tary Toale is a 22‑year‑old emerging construction manager who blends hands‑on carpentry, budgeting, and safety compliance with an artist’s eye, using their curiosity and love of solitude
    to seek innovative, sustainable solutions while mediating crew tensions with quiet empathy.
  sports: Tary Toale enjoys low‑impact cardio like weekend jogs along the bayou and occasional rowing with a local paddling club, while cheering on the New Orleans Pelicans basketball team and following
    the LSU Tigers football season, preferring solitary, nature‑based workouts over crowded gyms.
  arts: Tary Toale immerses themselves in sketching historic farmhouses while listening to Yo‑Yo Ma’s cello suites and Appalachian fiddle tunes by Mark O’Connor, drawing inspiration from the mural works
    of Willie Boyd and the storytelling paintings of Andrew Wyeth.
  travel: Tary Toale prefers slow, contemplative trips that combine independent road‑tripping through the Louisiana bayous and weekend hikes in the Great Smoky Mountains, planning routes on paper maps and
    avoiding crowded airports, while dreaming of a future solo expedition to the quiet coastal villages of Cephalonia, Greece, where historic stone cottages echo their love of vernacular architecture.
  culinary: Tary Toale, an amateur home cook, favors fresh garden harvests and rustic dishes such as roasted zucchini with thyme, shrimp étouffée seasoned with smoked paprika, and classic chicken‑and‑dumplings
    soup, pairing meals with locally sourced honey and wild herbs, and occasionally experimenting with sourdough bread despite a tendency toward quick, solitary meals after long workdays.
  core: Tary Toale is a solitary, art‑infused construction enthusiast who balances sketching historic homes with hands‑on building, often oversleeps on weekends yet never lets their quiet creativity waver,
    and habitually loses small tools in their garden shed.
background:
  cultural: Tary is a 22‑year‑old white woman raised in Oak Grove, a small town in West Carroll Parish, Louisiana. Her family has deep roots in the region, with generations of Anglo‑American farmers and
    a touch of French‑Acadian ancestry common to northern Louisiana. Growing up in a close‑knit rural community, she attended a local Baptist church where values of hospitality, modesty, and neighborly
    service were emphasized. The surrounding landscape—bayous, pine woods, historic plantation homes—instilled in her an appreciation for hands‑on work, regional folk traditions, and simple, enduring aesthetics.
    While she prefers solitude, the cultural emphasis on cooperation and community informs her compassionate, collaborative approach both on the construction site and in her personal life.
attributes:
  skills: '[''Construction site supervision'', ''Blueprint and plan interpretation'', ''Basic carpentry'', ''Concrete finishing'', ''Material procurement'', ''Project budgeting and cost tracking'', ''Schedule
    coordination'', ''OSHA safety compliance'', ''Team leadership and conflict mediation'', ''Sustainable building practices'', ''Design sketching and aesthetic consultation'', ''Digital project management'']'
  hobbies: '[''Sketching architecture'', ''Nature photography'', ''Reading historical biographies'', ''Birdwatching'', ''Gardening'', ''DIY woodworking'', ''Listening to classical and folk music'', ''Yoga
    and meditation'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Tary aims to earn her state‑issued general contractor license and pursue LEED certification to specialize in sustainable, community‑focused building. Over the next five years she plans to
    enroll in night courses toward an associate degree in construction management and obtain a Project Management Professional (PMP) credential. Her long‑term ambition is to launch her own construction
    firm that integrates local folk art and eco‑friendly materials, creating homes and small commercial spaces that reflect the cultural heritage of West Carroll Parish. She also hopes to mentor other young
    women and under‑represented youth entering the trades, fostering greater diversity and inclusion in her field while maintaining a flexible schedule that supports her love of solitude and personal creativity.
