  hobbies: '[''Reading (science‑fiction, mystery, non‑fiction)'', ''Creative writing/journaling'', ''Python coding'', ''Puzzle solving (Sudoku, chess problems)'', ''Scale model building'', ''Nature photography'',
    ''Hiking in the Appalachians'']'
  career_goals: Carla aims to earn top grades and win regional science‑fair awards, securing a scholarship to a competitive STEM‑focused university where she plans to major in engineering or computer science.
    In the short term, she seeks a mentorship or internship with a local engineering firm to gain practical experience. Long‑term, she envisions a career in aerospace engineering or data analytics, leading
    independent research projects and contributing to innovative technology development, driven by her competitive spirit and desire for high achievement.
