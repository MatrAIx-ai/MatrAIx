personas:
  professional: Carla Jones, an aspiring teenage software engineer and model aircraft designer, channels a meticulous, solitary work ethic into coding Python games, drafting engineering sketches, and penning
    speculative short stories, all while maintaining a competitive edge in mastering new technical challenges.
  sports: Carla Jones, an avid hiker in the Appalachian hills, regularly joins the local Appalachian Trail Hiking Club, follows the Pittsburgh Steelers for football, the Washington Capitals for hockey,
    and occasionally logs weekend runs with a GPS app to track distance and elevation.
  arts: Carla Jones, a solitary creative mind, devours sci‑fi novels by Isaac Asimov and Arthur C. Clarke, solves mysteries à la Agatha Christie, composes short stories inspired by the cinematic scores
    of Hans Zimmer, and captures Appalachian wildlife in black‑and‑white photographs reminiscent of Ansel Adams.
  travel: Carla Jones, a nature‑focused traveler, has trekked Shenandoah and Great Smoky Mountains National Parks, dreams of visiting the Mauna Kea Observatories in Hawaii and the Atacama Desert stargazing
    site in Chile, and prefers meticulously planned solo trips over spontaneous group tours to maximize learning and personal reflection.
  culinary: Carla Jones, a pragmatic teenage cook, frequently whips up high‑protein quinoa salads with roasted chickpeas, blueberry‑laden smoothies, and dark‑chocolate granola bars, while savoring the occasional
    homemade pizza topped with fresh basil and mozzarella as a reward after a long coding session.
  core: Carla Jones, a fiercely solitary 15‑year‑old, blends relentless curiosity with razor‑sharp organization, turning every puzzle, code snippet, and telescope glance into a disciplined competition against
    themselves.
background:
  cultural: Carla was raised in Bluefield, West Virginia, a small town in the Appalachian region of Mercer County. She comes from a white, working‑class family with deep roots in the coal‑mining communities
    of the area. The local culture emphasizes self‑reliance, modesty, close family ties, and respect for nature. Traditional Appalachian values, such as storytelling, folk music, and community gatherings,
    have shaped her upbringing. While attending a public middle school, she participates in regional library programs and local science clubs that reflect the area's growing interest in STEM education.
    Her family's involvement in church and community service events reinforces a sense of responsibility, perseverance, and humility.
attributes:
