personas:
  professional: Angelina Yarbrough, a veteran special‑education teacher with three decades of classroom experience, blends data‑driven assessment, collaborative mentorship, and a warm, community‑centered
    ethos to design inclusive programs, lead professional development, and steer district‑level policy as they prepare for a coordinator role.
  sports: Angelina Yarbrough, an avid supporter of the Atlanta Falcons and the Atlanta Braves who participates in a weekly senior tennis club at the community recreation center and enjoys leisurely hikes
    on nearby nature trails, they balance team spirit with personal fitness through regular yoga sessions and occasional charity walks.
  arts: Angelina Yarbrough, a dedicated member of the local community theater who relishes staging classic plays like 'A Streetcar Named Desire' while listening to the dulcet tones of Alison Krauss, the
    storytelling of Dolly Parton, and the soulful piano of George Winston during quiet evenings, they find inspiration in the works of author Harper Lee for their book club, and often incorporate these
    artistic influences into their garden‑themed set designs.
  travel: Angelina Yarbrough, an enthusiastic traveler who plans meticulous itineraries for cultural trips such as exploring the historic streets of Charleston and Savannah, admiring the monuments of Washington,
    D.C., savoring Renaissance art in Rome, and hiking the Blue Ridge Parkway in the fall, they balance these adventures with a modest travel budget that relies on off‑season flights and cozy bed‑and‑breakfast
    stays, and they delight in documenting each journey through nature photography.
  culinary: Angelina Yarbrough, an accomplished home cook who regularly prepares shrimp and grits, buttery buttermilk biscuits with homemade pimento cheese, and slow‑cooked collard greens seasoned with
    smoked paprika and local honey, they draw fresh herbs from their garden for each dish, and they revel in sharing these tradition‑rich meals at church potlucks and garden club gatherings.
  core: Angelina Yarbrough, a community‑driven educator with a blend of data‑sharp precision, warm hospitality, and a zest for lifelong learning, they balance their dedication to inclusive teaching with
    a love for garden‑to‑table cooking, theater, and purposeful travel, even while navigating occasional health hiccups and disciplined savings.
background:
  cultural: Raised in a middle‑class white family in the American South, Angelina’s upbringing emphasized Southern hospitality, community involvement, and a strong work ethic. Her family valued education
    as a means of service, and she maintains ties to her local church and civic organizations. While rooted in traditional Southern values, her career in special education has fostered a modern, inclusive
    outlook that balances respect for cultural heritage with a commitment to equity and diversity.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Behavior intervention and positive reinforcement strategies'', ''Differentiated instruction and curriculum adaptation'', ''Assistive
    technology integration'', ''Data analysis and progress monitoring'', ''Collaborative team coordination with parents and specialists'', ''Inclusive classroom management'', ''Professional development
    facilitation'', ''Advocacy and conflict resolution'', ''Project planning and organizational logistics'']'
  hobbies: '[''Community theater'', ''Garden club'', ''Book club'', ''Hiking and nature trails'', ''Yoga'', ''Traveling with spouse'', ''Cooking Southern cuisine'', ''Volunteer work at local library'',
    ''Birdwatching'', ''Photography'']'
  career_goals: Angelina aims to transition into a district‑level special education coordinator role where she can shape policy, expand inclusive practices, and scale support services for students with
    diverse needs. She plans to develop a mentorship program for new special‑education teachers, present research on technology integration at national conferences, and pursue a master's degree in educational
    leadership to deepen her impact. In the longer term, she envisions semi‑retirement consulting for schools on curriculum adaptation and serving as an advocate for families navigating special‑education
    services.
