personas:
  professional: Richard Dietrich, a retired construction project manager turned senior‑center mentor, leverages his seasoned project‑management, budgeting, and hands‑on carpentry expertise to organize community
    events and guide emerging nonprofit leaders, blending his practical precision with an inquisitive willingness to adopt new digital tools.
  sports: Richard Dietrich, an avid hiker of the Sandia Mountains and member of the Sandia Trail Club, also enjoys seasonal basketball at the senior center and follows the New Mexico United soccer team
    and the Albuquerque Isotopes baseball club, balancing low‑impact cardio with occasional weekend volunteer work coaching a youth flag‑football league.
  arts: Richard Dietrich, who captures Southwestern landscapes with his DSLR and showcases his work at community‑center art shows, regularly plays acoustic renditions of Bob Dylan and John Denver for senior
    gatherings, volunteers in town theater productions of classic plays, and cites Ansel Adams as his photographic inspiration.
  travel: Richard Dietrich, keen to combine his love of nature with family time, plans low‑key road trips to the Grand Canyon, Zion National Park, and Sedona's red‑rock trails, while budgeting for a longer
    Southwest national‑park tour with his wife, favoring detailed itineraries over spontaneous trips and occasionally postponing travel due to concerns about health‑insurance coverage.
  culinary: Richard Dietrich, a confident home cook, experiments with Southwestern dishes like green‑chile enchiladas, carne adovada, and prickly‑pear salsa, relishing fire‑roasted poblano peppers, fresh
    cilantro, and locally sourced corn, while his woodworking hobby sometimes leaves a lingering scent of sawdust in the kitchen.
  core: Richard Dietrich blends retired construction savvy with artistic curiosity, mentoring volunteers while worrying about every detail—from budget lines to blood‑pressure readings—and channeling his
    energy into guitar, photography, and trail hikes.
background:
  cultural: Richard grew up in a small Midwestern town with German and Irish ancestry, raised in a Methodist household that emphasized self‑reliance, community service, and family cohesion. After moving
    to Rio Rancho, New Mexico, he embraced the desert lifestyle, developing an appreciation for the region’s Hispanic heritage, local festivals, and southwestern cuisine. He blends his Midwestern values
    of hard work and practicality with an openness to the diverse cultural influences of New Mexico, often participating in community events that celebrate both Anglo and Hispanic traditions.
