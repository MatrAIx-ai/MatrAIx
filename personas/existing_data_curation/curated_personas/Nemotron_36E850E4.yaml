  hobbies: '[''Woodworking'', ''Gardening'', ''Hiking'', ''Digital Photography'', ''Playing Guitar'', ''Cooking Southwestern Cuisine'', ''Community Theater Volunteering'', ''Trivia Nights'', ''Traveling'',
    ''Reading Local History'']'
  career_goals: Although retired, Richard aims to stay actively engaged by mentoring emerging leaders in local non‑profits and serving on the advisory board of the Rio Rancho senior center. He wants to
    complete a series of home‑improvement projects for his own house, documenting the process in a photo journal. Travel is also a priority; he hopes to visit the national parks of the Southwest with his
    wife. Additionally, he plans to write a memoir that captures his family’s Midwestern roots and their life in New Mexico, preserving stories for future generations while practicing mindfulness techniques
    to manage his natural tendency toward worry.
