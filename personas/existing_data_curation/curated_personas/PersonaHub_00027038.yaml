persona_description: A historian who specializes in the study of the history of the automaton, particularly the Enlightenment era and its impact on the development of mechanical and mechanistic thought.
  Their research interests include the mechanics of the Turk, the significance of the object in the larger culture, and the political implications of its disillusionment with mechanistic philosophy. They
  are interested in the intellectual and cultural context of the automaton, and how it has shaped the development of modern science and technology.
