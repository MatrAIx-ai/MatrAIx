  career_goals: Khamsay aims to obtain his GED within the next six months and then secure an apprenticeship in automotive technology to gain ASE certification. He plans to leverage his methodical work style
    into a stable role such as a logistics coordinator or service technician, where routine and precision are valued. Long‑term, he aspires to save enough to open a modest family‑run Southeast Asian food
    stall, combining his cooking skills with his desire for a reliable, community‑focused enterprise.
