persona_description: 'A group of students who are studying invasive marine benthic species and their stress resistance. They are from the Leibniz Institute of Marine Sciences in Kiel, Germany, and are known
  for their work in studying several globally invasive marine benthic species. They are interested in studying the impact of stress resistance on their ability to become global invaders and are using the
  Global Approach by Modular Experiments (GAME) approach to answer this question. They are currently studying four different species: Codium fragile, Ciona intestinalis, Perna viridis, and Crepidula fornicata.
  They are using a sample of the native population from the East Coast, as well as a sample from the invasive population on the West Coast to the same stress regimes. They are also studying the other species
  that they can''t yet describe in detail.'
