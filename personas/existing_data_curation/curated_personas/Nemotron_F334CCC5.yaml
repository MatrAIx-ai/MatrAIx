personas:
  professional: Stefanie Bonotto, a 36‑year‑old middle‑school STEM teacher in Polk County, blends her spontaneous improv flair and collaborative spirit with strong curriculum‑design expertise to craft hands‑on,
    technology‑rich lessons, while her tendency to resist rigid schedules occasionally forces her to scramble for deadlines as she works toward a district STEM coordinator role.
  sports: Stefanie Bonotto enjoys hiking the Loess Hills, participates in the Des Moines Hiking Club, cheers for the Iowa Hawkeyes football and basketball teams, and plays in a co‑ed recreational volleyball
    league, balancing active weekends with a love for community sports camaraderie.
  arts: Stefanie Bonotto leads improv comedy workshops, performs in community theater productions of classics like 'Our Town,' draws inspiration from comedians Tina Fey and Amy Poehler, and dances to the
    rhythm of Latin‑fusion playlists featuring artists like Bad Bunny while applauding Broadway hits such as 'Hamilton.'
  travel: Stefanie Bonotto favors spontaneous weekend road trips to local gems like Maquoketa Caves State Park, has already trekked the vibrant food districts of Portland, Oregon, dreams of exploring Kyoto’s
    blend of tradition and technology, and is saving for a family expedition to Iceland’s geothermal lagoons, balancing budget constraints with a thirst for diverse experiences.
  culinary: Stefanie Bonotto experiments in the kitchen with garden‑fresh heirloom tomatoes, homemade gnocchi tossed in sage‑brown butter, and spicy Korean bibimbap featuring gochujang, often improvising
    dishes after improv shows and occasionally ordering a slice of deep‑dish pizza for late‑night creative cravings.
  core: Stefanie Bonotto is a high‑energy, improvisational STEM educator who turns curiosity into hands‑on learning, impulsively buys gadgets, and balances community theater thrills with a love for garden‑to‑table
    cooking.
background:
  cultural: Stefanie grew up in a Midwestern white family in Iowa, where community, cooperation, and practicality were core values. Her upbringing emphasized modesty, a strong work ethic, and a close connection
    to the agricultural heritage of the region. While rooted in these local traditions, her STEM education introduced her to a broader, globally‑oriented perspective, encouraging curiosity and appreciation
    for diverse ideas. She actively participates in local church gatherings, town festivals, and volunteer initiatives, blending her cultural roots with her passion for inclusive, hands‑on education.
attributes:
  skills: '[''Curriculum design'', ''Hands‑on STEM labs'', ''Project‑based learning'', ''Educational technology integration'', ''Collaborative facilitation'', ''Classroom management'', ''Mentoring'', ''Science
    communication'', ''Problem solving'']'
  hobbies: '[''Improv comedy'', ''Community theater'', ''Science fair volunteering'', ''Hiking'', ''Gardening'', ''Creative cooking'', ''DIY electronics projects'', ''Group dance classes'']'
  career_goals: Stefanie aims to become a STEM program coordinator for the Polk County school district, where she can shape district‑wide curricula and expand community outreach initiatives. She envisions
    establishing a makerspace that offers after‑school workshops and partnership opportunities with local businesses. To support these ambitions, she plans to pursue a master's degree in educational leadership,
    develop a network of peer educators across Iowa, and eventually take on an administrative role that allows her to influence policy and champion innovative, practical STEM education at a broader scale.
