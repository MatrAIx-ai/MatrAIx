  career_goals: Mayra dreams of a future where she can help others in a practical, caring way. She envisions herself as a teacher who can nurture young learners, or as a veterinarian who cares for animals
    in her community. She also imagines one day assisting her family in running a small neighborhood bakery or food stall, where she could share traditional recipes and bring people together.
