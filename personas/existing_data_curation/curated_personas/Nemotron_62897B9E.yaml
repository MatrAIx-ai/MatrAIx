personas:
  professional: Mayra Nunez is an aspiring storyteller and illustrator who weaves bilingual adventure and folklore tales into illustrated notebooks, using their love for routine to carefully outline plot
    arcs while their spontaneous bursts of imagination add unexpected twists, and their quiet, cooperative nature makes them a considerate collaborator in group story‑craft sessions.
  sports: Mayra Nunez enjoys playing soccer with the Monett Youth Soccer Club during the spring, cheering for the Kansas City Chiefs, the St. Louis Cardinals, and the Chicago Bulls on game nights, and they
    incorporate daily nature walks and occasional skipping rope into their fitness routine, balancing a love for familiar outdoor activities with the excitement of watching professional sports.
  arts: Mayra Nunez spends afternoons drawing detailed nature scenes inspired by Beatrix Potter and Frida Kahlo, practicing simple piano chords to pieces by Mozart and pop songs by Taylor Swift, and improvises
    short stories with friends, often citing Roald Dahl as an influence, while they follow a steady sketching routine and let spontaneous bursts of imagination drive unexpected lyrical twists.
  travel: Mayra Nunez prefers short, familiar trips such as weekend camping in the Ozark National Forest and family visits to nearby state parks, yet they dream of a future adventure to Disney World in
    Florida and the Grand Canyon, planning outings with detailed checklists and bringing along their pet rabbit Bella’s plush toy for comfort.
  culinary: Mayra Nunez loves helping their mother bake tamales and empanadas, especially savoring the spiced masa and seasoned meat fillings, and they also enjoy munching on fresh mango slices, cheesy
    quesadillas, and homemade rock candy they craft during craft days, balancing traditional holiday dishes with playful snack experiments.
  core: Mayra Nunez balances a love for routine with spontaneous bursts of creativity, weaving quiet kindness and practical habits into storytelling, art, and caring for their rabbit while delighting in
    familiar flavors and small, explorative adventures.
background:
  cultural: Mayra comes from a mixed Mexican-Guatemalan family that maintains a bilingual home where Spanish is spoken daily alongside English. Her household observes cultural celebrations such as Día de
    los Muertos, Las Posadas, and Christmas feasts, with traditional foods like tamales, pupusas, and arroz con pollo at the center of family gatherings. The family attends a local Catholic church, participating
    in Mass and community festivals that reinforce communal values. Growing up in Monett, Missouri, Mayra balances these traditions with the modest, close-knit atmosphere of Barry County, where neighborly
    support and local school events are part of her everyday life. Stories of her grandparents' migration and the importance of family solidarity shape her sense of identity.
