  career_goals: Donovan aspires to attend a specialized high-school arts program and later study concept art, animation, or video-game design at a university such as CalArts or the University of California,
    San Diego. He dreams of creating immersive visual worlds for indie games and eventually becoming a senior concept artist at a game studio. Because of his heightened emotional sensitivity, he also wishes
    to integrate mental-health awareness into his work, creating art that resonates with teens coping with anxiety and possibly pursuing a mentorship role in youth art therapy programs. In the long term,
    he hopes to lead a multidisciplinary creative studio that blends visual storytelling, interactive media, and community wellness initiatives.
