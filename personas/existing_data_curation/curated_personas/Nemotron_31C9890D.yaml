personas:
  professional: Donovan Jackson, an aspiring indie game developer, fuses a love for fantasy illustration and Python coding to create small narrative-driven games that feature hand‑drawn landscapes and original
    characters, often sharing prototypes with a close circle of friends for feedback.
  sports: Donovan Jackson, a member of the San Diego Youth Soccer Club’s recreational team, also enjoys solo jogging along the Embarcadero at sunrise and follows professional teams like the San Diego Padres
    and the NBA’s Golden State Warriors, preferring low‑key personal fitness over large‑scale team sports.
  arts: Donovan Jackson, a dedicated participant in the local art club, draws inspiration from fantasy illustrators such as Chris Riddell and concept artist Feng Zhu, listens to ambient composers like Brian
    Eno while sketching, and cites authors Brandon Sanderson and Neil Gaiman as narrative fuel for their short stories and poetry.
  travel: Donovan Jackson, who favors short, low‑cost adventures, often takes weekend trips to La Jolla Cove for sunset photography, has explored the USS Midway Museum in San Diego, dreams of hiking the
    Redwood forests in Northern California, and hopes to experience Kyoto’s cherry‑blossom season with family next summer.
  culinary: Donovan Jackson, a budding home chef, favors simple yet colorful dishes such as avocado toast with chili flakes, ramen bowls topped with soft‑boiled eggs, and blueberry muffins, while experimenting
    with pastel food coloring for themed desserts that echo the fantastical palettes of their artwork.
  core: Donovan Jackson blends vivid imagination with methodical planning, channeling teenage anxiety into art, code, and quiet sunrise jogs, while occasionally overindulging in late‑night gaming sessions
    and skipping meals.
background:
  cultural: Donovan comes from a middle-class Anglo-American family that has lived in the San Diego area for several generations. His parents work in the technology and education sectors, exposing him to
    both the entrepreneurial spirit of Silicon Valley and the academic emphasis of local schools. Growing up near the Pacific coast, he is familiar with the relaxed Californian lifestyle—beach walks, sunset
    viewings, and a multicultural neighborhood where Hispanic, Asian, and Pacific Islander cultures mingle. This diversity influences his artistic palette, inspiring vibrant colors and eclectic motifs in
    his work. He attends the public middle school in Mission Bay, where he participates in the school’s art program and occasional interdisciplinary projects that blend science and creativity. The West
    Coast emphasis on environmental awareness and progressive social values also shapes his desire to use art as a platform for mental-health advocacy.
