  hobbies: '[''Reading contemporary fiction and self‑help books'', ''Attending church services and choir'', ''Gardening (herbs and vegetables)'', ''Cooking and experimenting with Southern recipes'', ''Jogging/Walking
    along Montgomery Riverwalk'', ''Volunteering at local food bank'', ''Quilting and crocheting'', ''Listening to blues, jazz, and hip‑hop'', ''Playing board games with friends'']'
  career_goals: Aiesha aims to channel her curiosity and practicality into a stable, community‑focused career. She plans to enroll in a Medical Assistant certification program within the next year, seeking
    a role that lets her combine her interest in health, her reliable work ethic, and her desire to serve her neighborhood. In the longer term, she hopes to launch a modest home‑based healthy‑meal prep
    service that leverages her cooking skills and entrepreneurial spirit, providing affordable nutrition options for other families in Montgomery. Her ambitions are balanced with a realistic assessment
    of resources, and she is committed to incremental progress that supports her marriage and future family plans.
