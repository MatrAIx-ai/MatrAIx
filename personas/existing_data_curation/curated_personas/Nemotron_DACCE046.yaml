  hobbies: '[''Gardening'', ''Reading historical novels'', ''Knitting for charity'', ''Birdwatching'', ''Genealogy research'', ''Community theater attendance'', ''Walking along Chesapeake Bay'', ''Volunteer
    work at senior center'']'
  career_goals: Although officially retired, Amanda aims to leave a lasting legacy by establishing a community oral‑history project that records the stories of Chesapeake and Virginia Beach seniors. She
    hopes to create a scholarship fund for local high‑school students pursuing humanities studies, mentor emerging volunteer leaders, and compile her memoir to share her life experiences and the region’s
    cultural heritage with future generations.
