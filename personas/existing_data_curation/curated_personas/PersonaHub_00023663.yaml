persona_description: A military officer who served in the United States Army and was responsible for overseeing the guidance and control laboratory at the guidance and control laboratory under Dr. Heusermann.
  He was also involved in the development of the Redstone, Jupiter, and Pershing missiles and was responsible for the guidance and control system for the Explorer satellite. He worked with the Navy to determine
  how the Jupiter B could be utilized in the next generation of Polaris missiles and was responsible for coordinating the components of the guidance system. He later worked at GE in Pittsfield where he
  was in charge of the Polaris guidance system and was responsible for coordinating all the components of the first EA and IMU.
