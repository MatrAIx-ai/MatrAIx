  hobbies: '[''Woodworking'', ''Model railroading'', ''Fishing'', ''Gardening'', ''Home brewing'', ''Reading technical manuals'', ''Puzzle solving'', ''Bird watching'']'
  career_goals: Douglas aims to become a certified senior maintenance specialist, targeting credentials such as the NIMS Industrial Maintenance Technician and the CMRP. Over the next five years, he plans
    to lead the plant’s reliability program, mentor junior mechanics, and propose data‑driven maintenance schedules that reduce downtime. Ultimately, he envisions transitioning to a consultancy role where
    he can apply his systematic expertise to multiple facilities while maintaining a predictable work‑life balance for his family.
