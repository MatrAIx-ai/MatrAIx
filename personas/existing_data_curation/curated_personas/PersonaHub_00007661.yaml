persona_description: A music historian and instrument collector who is passionate about the study of historical keyboard instruments, particularly those from the eighteenth century. This individual is interested
  in the technical details of the Grand Rapids harpsichord and its original owner, as well as the broader context of its use in a wealthy aristocratic household. They are dedicated to preserving and studying
  these instruments to understand their sound and history, and are interested in the potential for instrument makers to use the knowledge gained to recreate historical instruments.
