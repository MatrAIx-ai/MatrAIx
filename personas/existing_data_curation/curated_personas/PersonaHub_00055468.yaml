persona_description: A program designer and social worker who specializes in working with very poor households in specific contexts, focusing on economic strengthening strategies. They prioritize addressing
  the drivers of poverty at household, community, and national levels, and recognize the importance of complementing economic strengthening activities with social safety nets. They are skilled in conducting
  market analysis, building social capital, and addressing social and gender injustice. They are interested in working towards cross-sectoral approaches and involve existing service providers and the private
  sector to achieve sustainability, scale, and holistic poverty reduction.
