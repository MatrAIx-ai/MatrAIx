personas:
  professional: Stacy Witzleb, an 18‑year‑old emerging public‑relations enthusiast, leverages a natural flair for charismatic public speaking, Canva and Photoshop design, and on‑the‑fly event coordination
    to craft buzz‑worthy social‑media campaigns for Mobile’s art festivals, though their laid‑back attitude toward strict deadlines often leads to last‑minute scrambles that they somehow still deliver with
    style.
  sports: Stacy Witzleb joins the Mobile Beach Volleyball Club each summer, follows the New Orleans Saints and the Alabama Crimson Tide with fervor, and practices sunrise yoga on the Gulf shoreline to stay
    limber, though their competitive spirit sometimes turns casual pickup games into exhaustive bouts that leave them sore the next day.
  arts: Stacy Witzleb curates eclectic playlists featuring B.B. King, Esperanza Spalding, and local muralist Liza Brown, spends weekends watercolor‑painting downtown Mobile’s cityscapes, and snaps candid
    street photos inspired by Vivian Maier, while occasionally boasting about their Photoshop flyers at community festivals.
  travel: Stacy Witzleb dreams of a road‑trip along the Gulf Coast from Gulf Shores to New Orleans, prefers spontaneous last‑minute bookings over rigid itineraries, has already explored Asheville’s craft‑beer
    scene and the historic French Quarter, but budget constraints sometimes limit their wanderlust to weekend day trips.
  culinary: Stacy Witzleb loves cooking Southern comfort classics like shrimp‑and‑grits and fried green tomatoes, often adding unexpected twists such as kimchi‑infused gravy or a watermelon‑feta salsa with
    fresh basil, and can whip up a quick sweet‑potato mash, though they sometimes over‑season dishes during experimental phases.
  core: Stacy Witzleb is a charismatic, art‑obsessed 18‑year‑old who blends spontaneous creativity with a laid‑back, occasionally reckless approach to planning and finances, turning every social gathering
    into a vibrant showcase of Southern culture.
background:
  cultural: Stacy grew up in Mobile, Alabama, in a middle‑class white family with German‑Irish ancestry. Her upbringing was steeped in Southern hospitality, Gulf‑Coast traditions, and the multicultural
    rhythms of the city—Mardi Mardi, Bay ou Coco, blues, jazz, and Creole cuisine. Family gatherings centered around weekend barbecues, church services at a local Baptist congregation, and trips to the
    nearby beaches. While her college years introduced her to broader artistic and social ideas, she still values the close‑knit community ties, historic architecture, and the riverfront lifestyle that
    define Mobile’s cultural fabric.
attributes:
  skills: '["Interpersonal communication", "Public speaking", "Graphic design (Canva, Adobe Photoshop)", "Social media content creation", "Event planning and coordination", "Candid photography", "Podcast
    editing and video production basics"]'
  hobbies: '["Visiting galleries and street‑mural tours", "Attending blues and jazz festivals", "Creating themed playlists", "Watercolor painting", "Candid photography of city life", "Hosting game nights
    and improv workshops", "Volunteering at community festivals", "Beach outings and yoga", "Cooking Southern comfort food with creative twists"]'
  career_goals: In the near term, Stacy aims to land an internship with a regional public‑relations firm or the Mobile tourism board to build a portfolio showcasing Gulf Coast culture. She wants to deepen
    her expertise in digital‑media strategy, event production, and brand storytelling. Long‑term, she envisions launching her own boutique agency that blends event planning, social‑media marketing, and
    art curation, focusing on promoting Southern arts and festivals on a national scale.
