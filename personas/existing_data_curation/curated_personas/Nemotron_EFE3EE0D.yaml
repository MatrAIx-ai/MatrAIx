  career_goals: Although currently not part of the formal workforce, Chung aims to channel his curiosity and practicality into a part‑time consulting role helping local small businesses implement affordable
    tech solutions. He also hopes to establish a community makerspace in Norman where he can lead workshops on basic electronics, coding, and sustainable gardening. Mentoring high‑school students in STEM
    and preserving cultural heritage through organized festivals are long‑term ambitions that align with his desire for harmony and social contribution.
