  career_goals: Mirna aims to move into a supervisory or team‑lead role within the next two to three years, where she can shape training programs and improve the overall customer experience. She plans to
    enroll in a Bachelor’s program in Business Administration to strengthen her managerial skill set. Long‑term, she envisions creating a small community‑focused venture—such as a café that doubles as a
    cultural hub—leveraging her love for Mexican cuisine and her network of local producers. Throughout her career, she remains committed to advocating for inclusive service practices that respect linguistic
    and cultural diversity.
