  career_goals: Stephen aims to evolve from a subcontractor into the owner of a boutique painting and decorative‑finishes business within the next five years. He plans to obtain professional certifications
    from the Painting Contractors Association and to develop a niche offering custom murals and specialty textures that blend contemporary design with visual motifs inspired by his Mexican heritage. Greater
    financial stability and a more predictable workflow are top priorities, as they would mitigate his worry about income fluctuations. In the longer term, he dreams of allocating part of his schedule to
    creating fine‑art paintings for local galleries, merging his technical expertise with his artistic curiosity.
