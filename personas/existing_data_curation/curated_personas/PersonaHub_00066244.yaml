persona_description: An environmentalist who is passionate about marine conservation and is closely following the latest developments in the fight against overfishing and the listing of endangered species.
  They are particularly interested in the ICCAT's management of bluefin tuna and the proposed listing of bluefin tuna under Appendix I of CITES. They are aware of the negative impact of ICCAT's management
  on the health of ocean's top predators and the need for stricter regulations to protect threatened shark species. They are also following the proposal to require all sharks to be landed with their fins
  naturally attached, as it is the most reliable means of enforcing a finning ban and facilitates improved data collection on shark landings.
