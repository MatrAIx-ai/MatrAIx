personas:
  professional: Sharon Cunningham, a seasoned psychiatric technician with four decades of systematic patient observation and medication management, leverages her methodical nature and love of visual arts
    to mentor new staff and design evidence‑based art‑therapy programs for geriatric mental health.
  sports: Sharon Cunningham enjoys gentle hikes along the Colorado Rockies with the Colorado Peaks Senior Walking Club, practices weekly restorative yoga at the local senior center, and follows the Denver
    Broncos and Colorado Avalanche as her favorite professional sports teams, though she prefers low‑impact activity over competitive play.
  arts: Sharon Cunningham spends afternoons watercolor painting the alpine vistas of the Rockies, draws inspiration from Claude Monet’s impressionist palettes and Georgia O'Keeffe’s desert flora, regularly
    visits the Denver Art Museum to view contemporary exhibitions, and finds solace in the poetry of Mary Oliver.
  travel: Sharon Cunningham plans her travels with meticulous itineraries, favoring relaxed excursions to natural wonders such as Yellowstone National Park, Banff National Park, and the historic town of
    Taos, while dreaming of a quiet retreat to the Japanese Alps to explore cherry‑blossom gardens and tea ceremonies.
  culinary: Sharon Cunningham cultivates a modest herb and flower garden, skillfully incorporates fresh rosemary, thyme, and lavender into wholesome dishes like herb‑crusted salmon and quinoa‑and‑roasted‑vegetable
    bowls, and delights in brewing her own lavender‑infused tea while occasionally indulging in a slice of homemade apple crisp.
  core: Sharon Cunningham blends her methodical, art‑loving mind with a gentle, nature‑focused lifestyle, mentoring younger mental‑health staff while nurturing a garden, painting, and a quiet curiosity
    for the world around her.
background:
  cultural: Sharon was born in the American Midwest in the early 1950s to a family of German‑Scandinavian descent. Raised in a small‑town, middle‑class environment, she absorbed values of self‑reliance,
    punctuality, and community service. After completing her STEM bachelor’s degree, she moved to Colorado in her early thirties, drawn by the emerging healthcare opportunities and the state’s outdoor culture.
    Her cultural identity blends traditional Midwestern work ethic with the Colorado appreciation for nature, sustainability, and local arts. Over the years, she has remained active in church‑based charitable
    initiatives and local volunteer groups, reflecting a lifelong commitment to harmony, cooperation, and supporting her neighbors.
attributes:
  skills: '[''systematic patient observation'', ''medication administration and monitoring'', ''crisis intervention and de‑escalation'', ''electronic health‑record documentation'', ''interdisciplinary team
    coordination'', ''training and mentorship of junior staff'', ''development and facilitation of art‑based therapeutic activities'', ''quality‑improvement and program evaluation'', ''basic neuropsychology
    concepts'', ''patient education and advocacy'', ''conflict resolution'']'
  hobbies: '[''hiking and bird‑watching in the Rockies'', ''watercolor painting and sketching'', ''reading classic literature and psychology'', ''gardening (herbs and flowers)'', ''cooking healthy meals'',
    ''participating in a small book‑club'', ''volunteering at the local senior center'', ''attending art exhibitions and museum tours'', ''listening to folk and classical music'']'
  career_goals: Sharon aims to transition into a mentorship and program‑development role where she can shape the next generation of psychiatric technicians. She plans to design a pilot program that formally
    integrates visual art therapy into the unit’s treatment protocol, seeking evidence of improved patient outcomes. Additionally, she is pursuing a certification in geriatric mental health to better serve
    older adults and hopes to contribute articles to professional journals reflecting on the evolution of psychiatric care over the past five decades. Volunteering for community mental‑health advocacy and
    establishing a support network for seniors in Johnstown are also long‑term ambitions.
