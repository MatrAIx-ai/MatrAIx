persona_description: A scientist or researcher working in the field of environmental science, specifically focused on water quality and sedimentology. This individual has expertise in developing and evaluating
  water quality criteria for suspended and bedded sediments, and is likely involved in the development of new approaches or methods for SAB criteria. They have a background in EPA guidelines and may be
  familiar with the types and status of water quality criteria used by the States, Canada, and elsewhere. They are interested in the biological effects of SABS in aquatic systems and have knowledge of water
  quality guidelines for turbidity, suspended, and benthic sediments in British Columbia, Canada. They are also familiar with sediment-related criteria for surface water quality and have experience in selecting
  sediment targets for use in Idaho TMDLs.
