  hobbies: '[''Gardening'', ''Traditional cooking'', ''Knitting and quilting'', ''Crossword puzzles'', ''Reading historical biographies'', ''Listening to bolero and mariachi music'', ''Birdwatching'', ''Family
    scrapbook maintenance'']'
  career_goals: Although retired, Teresa’s ambition is to preserve her family’s cultural legacy and support the well‑being of her extended family and neighbors. She aims to pass down her traditional recipes
    and sewing techniques, document oral histories of Alpine’s Hispanic community, and remain an active volunteer at the local church’s food pantry, ensuring its operation runs smoothly. Maintaining her
    health through daily routines and staying mentally engaged are also personal priorities.
