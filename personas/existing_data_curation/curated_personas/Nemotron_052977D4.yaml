personas:
  professional: Teresa Olvera, an experienced former bilingual elementary school teacher, now channels her methodical organization into coordinating the Alpine community’s food pantry, preserving local
    oral histories, and mentoring volunteers with the same meticulous record‑keeping she applied in the classroom.
  sports: Teresa Olvera enjoys gentle morning walks along the rim of Big Bend, follows the Alpine High School Wildcats football team on Saturdays, and treasures occasional visits to the Dallas Cowboys games
    on television, preferring low‑impact activities that complement her gardening routine over any competitive sport.
  arts: Teresa Olvera fills her afternoons with the soothing strains of bolero legends like José José and the vibrant melodies of Mariachi Vargas, knits and quilts inspired by heirloom patterns while admiring
    works by Frida Kahlo and listening to historical biographies of Texas pioneers, letting the arts shape her reflective solitude.
  travel: Teresa Olvera prefers meticulously planned road trips, having already explored Big Bend National Park, the historic San Antonio River Walk, and the artistic enclave of Marfa, she now dreams of
    a gentle pilgrimage to the historic missions of New Mexico, always balancing travel costs with her modest pension.
  culinary: Teresa Olvera is a master of regional comfort cuisine, perfecting enchiladas verdes, caldo de pollo, and fresh salsa verde using garden‑grown tomatoes and chilies, while her kitchen shelves
    boast staples like corn masa, cilantro, and dried chilies, and she approaches each meal as a ritualized lab experiment to preserve family flavors.
  core: Teresa Olvera is a diligent, solitary centenarian whose life revolves around structured routines, community stewardship, and a lingering worry that fuels both precision and occasional over‑cautiousness.
background:
  cultural: Teresa is a third‑generation Tejano from West Texas. Raised in a bilingual household, Spanish was spoken at home while English was used at school and in the wider community. Her family’s roots
    trace back to Mexican immigrants who settled in Brewster County during the early 20 century, working in ranching and small‑scale farming. Catholic traditions, community fiestas, and the sharing of homemade
    foods are central to her identity. The desert landscape of Alpine and the close‑knit nature of the town have shaped her appreciation for self‑reliance, hospitality, and the preservation of Hispanic
    heritage in a rural Texas setting.
