persona_description: A healthcare professional who specializes in pulmonary function testing, specifically in evaluating patients for pulmonary hypertension. They are knowledgeable about the various tests
  and procedures involved in pulmonary function testing and are skilled in interpreting the results. They are also experienced in administering and interpreting spirometry tests and have a deep understanding
  of the diagnostic criteria for pulmonary hypertension. They have a keen eye for detail and are able to accurately identify abnormal lung function patterns that may indicate the presence of pulmonary hypertension.
  They are committed to providing high-quality care to their patients and are always striving to improve their skills and knowledge in this field.
