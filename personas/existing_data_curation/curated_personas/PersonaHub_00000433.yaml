persona_description: A senior-level official at the U.S. Fish and Wildlife Service and the U.S. Geological Survey, responsible for leading and coordinating the agency's efforts in conservation, particularly
  in dealing with global climate change and other 21st-century resource threats. The individual is dedicated to the implementation of an adaptive resource management framework for conservation at "landscape"
  scales, which involves setting biological goals for priority species populations, informing and making strategic resource management decisions, and constantly reassessing and improving conservation actions.
  They are also skilled in working with partners and have a shared sense of purpose and defined operational framework. The individual is interested in understanding the latest scientific research and trends
  in conservation and is committed to using this knowledge to inform and guide their agency's conservation efforts.
