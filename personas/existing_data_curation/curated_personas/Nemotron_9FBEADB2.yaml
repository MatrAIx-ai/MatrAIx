    groups'', ''Problem solving and troubleshooting'']'
  hobbies: '[''Desert hiking and landscape photography'', ''Mountain biking'', ''Camping'', ''DIY woodworking and furniture building'', ''Strategy video gaming'', ''Reading non‑fiction on logistics and
    technology'', ''Small‑group board‑game nights'', ''Volunteering at community food bank'']'
  career_goals: In the near term, Aldon aims to become a lead material mover, taking on responsibility for shift scheduling and training new hires while completing a Certified Safety Professional course.
    He plans to enroll in a part‑time bachelor’s program in Supply Chain Management to build on his associate’s degree. Over the next five years, he hopes to advance to a warehouse supervisor role, overseeing
    inventory control and implementing efficiency initiatives, such as automation pilots and lean‑process improvements. Long‑term, Aldon aspires to transition into logistics management, eventually running
    his own freight brokerage where he can blend his practical experience with emerging technologies like drone inventory audits and data‑driven routing.
