persona_description: A school teacher who is passionate about promoting sexual health education and preventing sexually transmitted diseases (STDs) and AIDS among apprentices in Vaudois. They are trained
  in the animated presentation of these topics and have a deep understanding of the impact of these issues on young people's lives. They are committed to helping apprentices make more personal and responsible
  decisions about their sexual lives, reinforce their knowledge on STDs and AIDS transmission and prevention, and modify their attitudes and behavior in the field of contraception. They are also interested
  in measuring the impact of this exhibition scientifically.
