  career_goals: Armando dreams of turning his love for art and technology into a future career as a video-game designer or comic-book illustrator. He imagines creating games that blend Dominican rhythms
    with New Orleans jazz. He also hopes to become a charismatic host of a kids’ radio or podcast show, where he can share stories, interview friends, and showcase local culture. In the short term, he aspires
    to win the school’s art competition and lead his basketball team to a city championship.
