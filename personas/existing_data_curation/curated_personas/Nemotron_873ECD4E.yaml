personas:
  professional: Armando Villanueva is an aspiring digital cartoonist who blends hand‑drawn characters with Scratch animations, channeling a curious, talkative nature into projects that often showcase competitive
    storylines and a love for spontaneous creativity.
  sports: Armando Villanueva loves shooting hoops at the neighborhood park and cheers for the New Orleans Pelicans, participating in the local Kids Basketball Club where they prioritize fun and bragging
    rights over structured training, and they also enjoy occasional pickup soccer games with friends.
  arts: Armando Villanueva is a budding cartoonist who idolizes Bill Watterson’s Calvin and Hobbes, assembles LEGO Architecture models, and dances to a playlist that ranges from John Coltrane’s jazz standards
    to modern hip‑hop like J. Cole, letting music inspire their comic panels.
  travel: Armando Villanueva prefers spontaneous day trips to the Louisiana Children’s Museum or nearby amusement parks and dreams of visiting Walt Disney World and the historic streets of New Orleans during
    Mardi Gras, planning most outings with a quick scribble on a notepad rather than a detailed itinerary.
  culinary: Armando Villanueva enjoys a varied palate that includes pepperoni pizza, jambalaya, mango‑smoothie popsicles, and the occasional candy bar, can whip together a simple grilled cheese sandwich,
    and eagerly samples festival foods—though they sometimes overindulge in sugary treats.
  core: Armando Villanueva is a curious, talkative ten‑year‑old with a competitive streak who juggles cartoon drawing, basketball, and spontaneous adventures while occasionally slipping into disorganized
    habits.
background:
  cultural: Armando’s family maintains strong Dominican roots; at home Spanish is spoken, and he often helps his mother prepare traditional dishes like mangú and sancocho. He celebrates Dominican holidays
    such as Día de la Independencia with music and dance, while also immersing himself in the rich Creole culture of New Orleans. He blends these influences by listening to both merengue and jazz, participating
    in local parades, and attending community church events. This bicultural environment shapes his worldview, language skills, and artistic expression.
attributes:
