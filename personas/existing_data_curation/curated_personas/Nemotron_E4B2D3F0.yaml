personas:
  professional: Julian Hernandezsepulveda, a bilingual social worker who blends a curiosity for arts‑based therapeutic techniques with a pragmatic eye for grant compliance, often delivers empathetic case
    management while letting a relaxed, sometimes disorganized paperwork style slip, turning their competitive drive into a push for leadership roles that reshape immigrant mental‑health services across
    Oregon, and they continuously seek collaborative partnerships to amplify cultural relevance.
  sports: Julian Hernandezsepulveda, a devoted fan of the Portland Timbers and a member of the Portland Hiking Collective, channels their competitive edge into brisk weekend treks through the Columbia River
    Gorge and occasional pick‑up soccer games at a local community league, treating fitness as a flexible, mindful escape rather than a regimented schedule, and they see each hike as a meditation in motion.
  arts: Julian Hernandezsepulveda, an avid acoustic‑guitarist whose playlists echo Gustavo Santaolalla and Bob Dylan, captures Portland’s rain‑kissed streets with a Leica M6 film camera and paints emotive
    watercolors inspired by Frida Kahlo’s bold palettes, weaving folk‑music festivals and visual art into therapeutic workshops that celebrate cultural narratives, and they often incorporate client‑made
    murals to deepen the healing process.
  travel: Julian Hernandezsepulveda favors loosely planned nature retreats that blend mindfulness hiking with cultural immersion, having trekked the Columbia River Gorge, explored Costa Rica’s rainforests,
    and joined a folk‑music celebration in Guatemala City, while dreaming of future voyages to Patagonia’s glaciers, Iceland’s geothermal springs, and Japan’s cherry‑blossom festivals, and they prefer spontaneous
    itineraries over rigid schedules.
  culinary: Julian Hernandezsepulveda, a confident home chef, crafts fragrant baleadas stuffed with fresh avocado, refried beans, and rooftop‑grown cilantro, simmers hearty sopa de caracol with coconut
    milk and fiery chilies, and delights community potluck guests with inventive plantain chips, chiles rellenos, and mango salsa, continually experimenting with traditional flavors and garden harvests,
    and they love to share the stories behind each dish.
  core: Julian Hernandezsepulveda, a creatively restless social worker whose competitive ambition coexists with a laid‑back, sometimes chaotic approach to paperwork, channels intense anxiety into guitar
    strums, watercolor splashes, and a relentless quest to embed cultural heritage within every therapeutic and community initiative, and they constantly push themselves to fuse art with advocacy.
background:
  cultural: 'Julian was born in Tegucigalpa, Honduras, and moved to the United States with his family as a teenager, eventually settling in Portland’s vibrant multicultural neighborhoods. He grew up in
    a bilingual household where Catholic traditions, family reciprocity, and community festivals shaped his values. His Honduran heritage remains central to his identity: he celebrates Día de la Independencia
    with salsa music and homemade pupusas, participates in local Central American diaspora gatherings, and incorporates folk art motifs into his therapeutic work. Navigating the dual expectations of his
    collectivist roots and the individualistic culture of the Pacific Northwest has given him a nuanced perspective on resilience, social justice, and the importance of cultural representation in public
    services.'
attributes:
  skills: '[''Bilingual counseling (Spanish/English)'', ''Crisis intervention'', ''Case management for immigrant families'', ''Community outreach and coalition building'', ''Advocacy for immigrant and low-income
