    ''Data collection and outcome reporting'', ''Empathy-driven communication'']'
  hobbies: '[''Rooftop gardening (herbs, chilies)'', ''Acoustic guitar playing'', ''Watercolor painting'', ''Film photography (urban & nature)'', ''Hiking in Columbia River Gorge'', ''Mindfulness walks'',
    ''Cooking traditional Honduran meals'', ''Reading historical fiction'', ''Watching Central American soccer'', ''Attending folk-music and cultural festivals'']'
  career_goals: Julian aims to transition from front-line case work to a senior leadership role where he can shape system-wide services for the Central American diaspora in Oregon. His short-term goal is
    to secure a master's degree in social work administration and lead a pilot arts-integrated mental-health program that reduces trauma symptoms among recent refugees. Over the next five years, he hopes
    to become director of a regional nonprofit network, obtain stable multi-year funding streams, and influence municipal policy on culturally responsive mental-health services. He also wants to mentor
    younger social workers, develop a peer-support curriculum, and publish a guide on integrating folk art traditions into therapeutic practice.
