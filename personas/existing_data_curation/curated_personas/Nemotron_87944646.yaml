  hobbies: '[''watercolor painting'', ''abstract art'', ''bird‑watching'', ''nature journaling'', ''crossword puzzles'', ''sudoku'', ''logic puzzles'', ''heirloom gardening'', ''native wildflower cultivation'',
    ''generative art coding'', ''poetry reading'']'
  career_goals: Although retired, Jaishree aims to channel her expertise into legacy projects that blend science and art. She aspires to author a series of illustrated essays on the natural history of Columbia
    County, present lecture‑workshops at the local library on "Science Through Art", and develop a community garden that serves as a living laboratory for ecological observation. She also hopes to mentor
    high‑school students in STEM‑art interdisciplinary projects, and to complete a personal project of digitizing and publishing her family’s historical photographs.
