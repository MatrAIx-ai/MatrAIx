  hobbies: '[''Gardening and horticulture'', ''Reading historical and folklore literature'', ''Birdwatching'', ''Woodworking and furniture making'', ''Cooking Guatemalan dishes'', ''Listening to marimba
    and folk music'', ''Meditation and mindfulness practices'', ''Playing chess'']'
  career_goals: Although Danilo is no longer in the formal workforce, he harbors clear personal ambitions. He aims to stay physically capable by regularly tending his garden and workshop, and to keep his
    mind sharp through reading and learning about sustainable gardening and low‑tech home solutions. He wishes to share his Guatemalan heritage by volunteering at the local community center to teach Spanish
    language basics and traditional cooking on a casual basis. He hopes to mentor his grandchildren, passing on practical skills and stories, and eventually compile a small memoir of his journey from the
    highlands of Guatemala to the Deep South. Maintaining his independence and calm resilience is central to all his goals.
