    technologies like AR/VR. Continuing professional development is a priority; he plans to pursue an MBA with a focus on entrepreneurship and a certification in digital transformation. Long‑term, he envisions
    establishing his own consultancy that advises companies on cultivating inclusive, resilient cultures while driving breakthrough product development.
