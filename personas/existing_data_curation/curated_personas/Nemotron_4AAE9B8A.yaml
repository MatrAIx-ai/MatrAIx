  career_goals: Although retired, Jennifer aims to remain a vital contributor to her community. Her primary goals include mentoring younger volunteers at the local senior center, preserving her family’s
    genealogical records and sharing them with descendants, and documenting the oral histories of long‑time Auburn residents for the county historical society. She also aspires to compile a cookbook of
    traditional Southern recipes passed down through her family, and to continue supporting charitable initiatives that promote food security and social harmony in Bullock County.
