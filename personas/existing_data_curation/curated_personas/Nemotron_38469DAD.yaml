personas:
  professional: Shikha Dhillon, a 31‑year‑old marketing manager, blends a STEM‑rooted analytical mindset with a vivid imagination, and they design data‑driven digital strategies using SEO, paid media, Python‑powered
    predictive models, and storytelling, while leading inclusive, cross‑functional teams by fostering harmony and collaborative creativity.
  sports: Shikha Dhillon enjoys a balanced fitness routine that mixes sunrise yoga at a local studio, weekend hikes along the C&O Canal towpath, and cheering on the Washington Capitals and D.C. United,
    and they also participate in a casual women’s volleyball league during summer and train for occasional 5K runs.
  arts: Shikha Dhillon immerses themselves in the arts through watercolor abstracts inspired by traditional motifs, street photography of Silver Spring architecture, visits to the Torpedo Factory Art Center,
    and they listen to Anoushka Shankar on sitar alongside indie folk artists like Bon Iver while devouring contemporary fiction by Margaret Atwood and philosophical essays by Alain de Botton.
  travel: Shikha Dhillon prefers curated trips that blend cultural immersion and nature, having explored Delhi’s bustling markets, a weekend art binge in New York, a culinary tour of Kyoto, and they plan
    an adventure to Iceland’s waterfalls, all while using a points‑earning travel credit card and balancing travel costs with a modest savings goal.
  culinary: Shikha Dhillon is a moderately skilled home chef who delights in fusion dishes such as butter‑chicken tacos, paneer tikka pizza, and quinoa‑infused biryani, favoring ingredients like garam masala,
    tahini, and fresh herbs, and they regularly host intimate dinner gatherings where guests sample experimental flavor pairings.
  core: Shikha Dhillon, a 31‑year‑old data‑driven marketer with a painter’s soul, balances methodical planning with spontaneous creativity, cherishes inclusive community, yet they sometimes overindulge
    in coffee and late‑night work marathons.
background:
  cultural: Shikha was raised in a Punjabi Sikh household that valued education, community service, and cultural continuity. Her parents immigrated to the United States in the early 1990s, and she grew
    up bilingual, speaking both English and Punjabi. Family celebrations such as Diwali, Baisakhi, and Vaisakhi were central to her upbringing, fostering a strong sense of belonging to the South Asian diaspora
    in the Maryland area. These cultural experiences taught her the importance of harmony, respect for elders, and collective responsibility—principles that surface in her collaborative work style and her
    commitment to inclusive leadership. While she fully embraces American professional norms, Shikha remains connected to her heritage through regular visits to the local gurdwara, participation in community
    volunteer events, and occasional practice of traditional music on the sitar. This blend of cultural pride and adaptability shapes her worldview, allowing her to navigate multicultural markets with authenticity
    and empathy.
