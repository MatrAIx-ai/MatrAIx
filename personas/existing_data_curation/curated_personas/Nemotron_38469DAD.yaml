  career_goals: Shikha aims to transition from a marketing manager to a director of marketing within the next three years, focusing on technology‑driven companies where her STEM background can give her
    a competitive edge. Her long‑term ambition is to become a chief marketing officer who shapes brand strategy through AI‑enabled personalization and sustainability storytelling. She plans to pursue an
    executive MBA to deepen her strategic and financial acumen, and she is committed to building inclusive teams that reflect the cultural diversity of the Washington‑DC metropolitan area. Shikha also hopes
    to mentor other women who are navigating the intersection of STEM and marketing, and eventually launch a boutique consultancy that helps tech startups craft socially responsible, culturally resonant
    brand identities.
