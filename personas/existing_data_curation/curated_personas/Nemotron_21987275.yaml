personas:
  professional: Miguel Campuzano, a budding LEGO architect, uses their methodical mindset to follow instruction manuals with surgical precision, treating each build as a miniature engineering challenge
    that sharpens their future problem‑solving skills.
  sports: Miguel Campuzano, a spirited member of the local Junior Kickers soccer club, delights in weekly matches with neighborhood friends, idolizes the Los Angeles Galaxy, and practices drills with the
    same disciplined routine applied to their LEGO projects.
  arts: Miguel Campuzano, an imaginative cartographer, spends afternoons sketching intricate maps of imaginary towns inspired by the adventurous tone of Mary Pope Osborne’s Magic Tree House series, while
    rhythmic marimba tunes by Los Marimbas del Mundo and Spanish folk songs like 'La Cucaracha' fuel their creative spirit.
  travel: Miguel Campuzano, a curious explorer who prefers well‑planned weekend outings, has traveled with family to the coastal town of Puerto Vallarta, captures each adventure in a scrapbook map, and
    dreams of trekking to Machu Picchu while budgeting allowance for souvenirs.
  culinary: Miguel Campuzano, a hands‑on kitchen assistant, eagerly helps roll masa and wrap tamales with corn husks on weekends, delights in the taste of cheese‑filled quesadillas, and can identify fresh
    cilantro, jalapeño, and sweet plantain among the pantry staples they love.
  core: Miguel Campuzano, a structured seven‑year‑old with a love for LEGO engineering, soccer teamwork, and meticulous map‑making, blends an innate practicality with a vivid imagination, though they sometimes
    hoard extra LEGO pieces in secret piles.
background:
  cultural: Miguel’s family maintains strong Guatemalan roots while living in Brewster, NY. He grows up bilingual, speaking Spanish at home and English at school, celebrates holidays such as Día de los
    Santos (All Saints’ Day) and Christmas with traditional foods, music, and stories. Community gatherings at the local church and cultural center reinforce values of family solidarity, respect for elders,
    and the importance of education. These cultural influences blend with his American environment, giving him a rich, multicultural perspective.
