  career_goals: Miguel imagines a future where he can design and build things that help people, such as bridges, structures, or even video games. He is drawn to fields that combine planning, creativity,
    and teamwork, and hopes to become an engineer or architect who can also mentor younger children, reflecting his desire to be reliable and supportive.
