personas:
  professional: Alexandra Morgan, a 31‑year‑old elementary teacher in Coos County, blends data‑driven assessment with hands‑on project‑based learning, leveraging their competitive streak to push student
    achievement while maintaining a flexible, organized classroom that balances curiosity and practicality.
  sports: Alexandra Morgan hikes the White Mountains with the local White Mountain Alpine Club in the summer, follows the New Hampshire Wildcats and Boston Red Sox year‑round, and plays on a co‑ed community
    softball league in the fall, balancing a competitive drive with a laid‑back approach to fitness.
  arts: Alexandra Morgan finds inspiration in the photography of Ansel Adams, the folk melodies of The Avett Brothers, and the classic films of Greta Gerwig, often incorporating these artistic influences
    into their classroom projects and weekend board‑game nights.
  travel: Alexandra Morgan prefers thoughtfully planned road trips that blend adventure with historical immersion, having recently explored the cobblestone streets of Boston and the maritime heritage of
    Portland, Maine, while dreaming of a future backpacking trek through the Scottish Highlands to study ancient settlements.
  culinary: Alexandra Morgan enjoys baking New England blueberry crisp and steaming clam chowder, skillfully seasons dishes with fresh thyme and rosemary from their garden, and often experiments with rustic
    hand‑kneaded sourdough, though they admit to over‑indulging in sugary pastries during exam season.
  core: Alexandra Morgan is a competitively curious educator who balances meticulous organization with hands‑on creativity, thriving on community engagement while occasionally letting a skeptical edge fuel
    their drive for measurable success.
background:
  cultural: Alexandra is a White Anglo‑American raised in a multigenerational, modest‑middle‑class family in rural New Hampshire. Her upbringing reflects New England’s cultural values of self‑reliance,
    practical problem‑solving, and strong community ties. Though her family’s roots include a Protestant (Congregationalist) tradition, she identifies as culturally secular while honoring local customs
    such as town meetings, seasonal festivals, and mutual aid networks. The region’s emphasis on education, love of the outdoors, and modest pragmatism has shaped her balanced, competitive personality and
    her dedication to serving the community through teaching.
