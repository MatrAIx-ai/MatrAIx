  hobbies: '[''Hiking in the White Mountains'', ''Nature Photography'', ''Reading Mystery and Historical Fiction'', ''Baking Traditional Recipes'', ''Gardening'', ''Woodworking and Crafting'', ''Volunteer
    Work at Local Library'', ''Board Games with Friends'', ''Birdwatching'', ''Community Historical Society Events'']'
  career_goals: Alexandra aims to complete a bachelor's degree in elementary education and obtain full state certification, positioning herself for a lead teacher or curriculum coordinator role in Coos
    County. She is driven to launch a school‑wide project‑based learning initiative that boosts STEM opportunities for rural students and to mentor new teachers through peer coaching. Long‑term, she aspires
    to become a principal who can champion data‑informed instruction while preserving the community’s emphasis on practical, hands‑on learning. She also envisions creating a community learning hub that
    offers after‑school tutoring, adult education workshops, and local history programs, reflecting her competitive desire to earn recognition for improving student achievement scores.
