  hobbies: '[''building block towers'', ''drawing and coloring'', ''singing in group classes'', ''attending library storytime'', ''playing tag at the park'', ''dance and gymnastics lessons'', ''sticker
    collecting and scrapbooking'']'
  career_goals: Although still young, Alexis dreams of growing up to be a teacher or a pediatric nurse, careers where she can combine her love for helping others, her natural organization, and her curiosity
    about how things work. She also imagines becoming an astronaut, fascinated by space, and occasionally mentions wanting to be a veterinarian because she adores animals. Her practical side leads her to
    set small goals like mastering reading and learning to tie her shoes.
