personas:
  professional: Alexis Capps, a budding preschool architect, builds elaborate block structures with meticulous plans, balancing curiosity about new shapes with a practical need for stability, and they often
    organize classmates into construction teams while showing bursts of anxiety when a tower collapses.
  sports: Alexis Capps, a member of the Elmwood Park Mini Soccer League, darts around the field with boundless energy, idolizes the New York Knicks’ fast breaks and the New York Rangers’ teamwork, and they
    eagerly attend Saturday games at the local park while insisting on wearing the team’s jersey for good luck.
  arts: Alexis Capps, an enthusiastic fan of Disney’s animated classics and the musical rhythms of Kidz Bop, spends afternoons drawing vibrant watercolor scenes of fairy tale castles, sings along to Let
    It Go with dramatic flair, and eagerly joins the preschool’s weekly puppet show, where they love to direct the storyline.
  travel: Alexis Capps, a curious explorer who loves day trips, plans meticulous itineraries for visits to the nearby Liberty Science Center and cherished family outings to the Jersey Shore’s boardwalk,
    dreams of a future adventure to Disney World in Orlando, and they often pack a backpack with crayons and a snack of peanut butter crackers for the journey.
  culinary: Alexis Capps, a budding chef who adores homemade mac & cheese, pizza slices topped with extra mozzarella, and banana-strawberry smoothies, enjoys helping parents stir batter for pancakes, and
    they insist on arranging food on the plate in neat sections, yet they sometimes sneak a bite of hidden chocolate chips when no one is watching.
  core: Alexis Capps blends meticulous planning with boundless curiosity, turning every block tower, snack, and weekend outing into a structured adventure while wrestling with sudden waves of anxiety that
    make them both endearing and uniquely resilient, and they often turn to humming their favorite Disney tunes for calm.
background:
  cultural: Alexis is raised in a middle‑class, white family in Elmwood Park, New Jersey, a suburban community with a blend of traditional American customs and close ties to the cultural diversity of the
    New York metropolitan area. Her family celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July, often participating in community events and local parades. The neighborhood emphasizes
    education, community involvement, and family‑oriented activities, providing her with opportunities to attend public preschool, library programs, and neighborhood sports leagues. These cultural influences
    shape her respectful, sociable outlook and her appreciation for both routine and new experiences.
attributes:
  skills: '[''organizing toys by color and size'', ''basic counting to 20'', ''recognizing uppercase letters'', ''reading simple picture books'', ''cooperating in group play'', ''leading simple preschool
