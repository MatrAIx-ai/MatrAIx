  hobbies: '["Soccer and baseball with friends","LEGO building (vehicles and structures)","Reading adventure books (Magic Tree House series)","Outdoor exploration (rock and insect collecting)","Minecraft
    creative mode","School science club projects","Cartoon drawing","Recorder lessons"]'
  career_goals: Joseph’s current aspirations revolve around helping his community. He frequently says he wants to become a civil engineer so he can design safe bridges and roads in his hometown, and he
    also dreams of being a firefighter to protect people. He is fascinated by how things work and loves building, so he imagines studying science and engineering in school, eventually leading projects that
    improve everyday life for his family and neighbors. At the same time, his love for teamwork makes him consider mentoring younger kids as a coach or teacher one day.
