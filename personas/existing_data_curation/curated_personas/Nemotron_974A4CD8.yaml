personas:
  professional: Lauren Ware, a three-year-old with a budding curiosity for cause-and-effect, treats daily sandbox sessions as miniature engineering projects, deftly stacking and deconstructing towers while
    spontaneously swapping tools, showcasing her practical problem-solving and resistance to rigid play schedules.
  sports: Lauren Ware, a three-year-old who delights in climbing the backyard jungle gym and kicking a soft ball in the preschool Tiny Sprinters' Soccer Club, adores cheering for the hometown baseball team
    the River City Falcons, yet prefers low-key solo races on the playground over structured team drills, reflecting her spontaneous and flexible approach to fitness.
  arts: Lauren Ware, a three-year-old who spends hours drawing bright dinosaurs with crayons, sings along to Raffi's Baby Beluga and The Wiggles' Fruit Salad, and eagerly watches Sesame Street's Count von
    Count, allowing these whimsical artists to shape her playful imagination and quiet downtime.
  travel: Lauren Ware, a three-year-old who has already explored the sandy shores of Clearwater Beach, the giant pandas at San Diego Zoo, and dreams of stepping onto Main Street at Disneyland, favors car
    rides with a favorite stuffed rabbit and short, quiet layovers, illustrating her curiosity-driven yet low-stimulus travel preferences.
  culinary: Lauren Ware, a three-year-old who adores creamy macaroni-and-cheese, builds peanut-butter-and-jam sandwiches with clumsy precision, reaches for banana slices and carrot sticks for snack time,
    yet often sneaks a few gummy bears when no one is looking, revealing both a budding kitchen independence and a mischievous sweet tooth.
  core: Lauren Ware, a curious yet pragmatically playful three-year-old who prefers solitary exploration, flits between spontaneous creativity and quiet order, and occasionally trades stickers for candy
    while diligently stuffing coins into a piggy bank.
