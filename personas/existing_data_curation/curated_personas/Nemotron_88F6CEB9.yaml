  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylics)'', ''Pottery and ceramics'', ''Gardening'', ''Hiking on local nature trails'', ''Reading contemporary fiction'', ''Cooking Southern
    cuisine with a creative twist'', ''Volunteer tutoring at community center'', ''Attending local jazz concerts'', ''DIY home projects'']'
  career_goals: Looking ahead, Tomekia aims to move into a supervisory or shift‑lead position where she can mentor a larger team and shape production workflows. She plans to obtain a certification in industrial
    safety and complete an associate degree in manufacturing technology, building on the college courses she started previously. Over the longer term she aspires to become an operations manager, integrating
    her curiosity for new ideas and creative problem‑solving to drive efficiency and sustainability initiatives. She also hopes to contribute to her community by offering workshops on safe workplace practices
    and vocational skills.
