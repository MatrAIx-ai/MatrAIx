  hobbies: '[''Zumba & salsa dancing'', ''Hiking in the Hill Country'', ''Volunteer STEM outreach'', ''Cooking Tex‑Mex dishes'', ''Hosting dinner gatherings'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Reading sci‑fi novels'', ''Board game nights'', ''Tech meetups & hackathons'']'
  career_goals: Sharon aims to advance from a senior QA analyst to a QA lead within the next two years, overseeing a cross‑functional testing team at a tech company focused on healthcare or education solutions
    in Texas. She plans to earn the ISTQB Advanced Test Manager certification, deepen her expertise in test automation frameworks and cloud‑based testing environments, and eventually step into a QA manager
    or Director of Quality role where she can shape quality strategies, champion continuous improvement, and mentor a diverse workforce. Additionally, she is interested in contributing to open‑source testing
    tools and speaking at local tech meetups to share best practices.
