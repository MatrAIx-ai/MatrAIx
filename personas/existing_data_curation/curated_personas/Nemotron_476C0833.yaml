  hobbies: '[''Soccer'', ''Lego and block building'', ''Drawing and coloring'', ''Dancing to music'', ''Story‑time podcasts'', ''Pretend talk shows'', ''Cartoon watching'', ''Sticker collecting'', ''Assisting
