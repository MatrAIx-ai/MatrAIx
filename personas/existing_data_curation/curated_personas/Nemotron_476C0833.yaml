  career_goals: Even at five, Efrain dreams big. He often says he wants to become a soccer player who scores goals for his community, a firefighter who helps people, and a storyteller who entertains children
    on stage. His love of attention and talking to others fuels his ambition to someday be a performer or community leader who can bring people together.
