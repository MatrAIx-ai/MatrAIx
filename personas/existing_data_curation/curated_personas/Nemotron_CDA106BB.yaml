  hobbies: '[''Gardening'', ''Knitting'', ''Cooking comfort meals'', ''Jogging'', ''Yoga'', ''Crossword puzzles'', ''Strategy board games'', ''Reading mystery novels'', ''Visiting coffee shops'', ''Binge‑watching
    classic sitcoms'']'
  career_goals: Rebecca seeks to transition from a mid‑level designer to a lead product designer within a Midwest tech company, where she can champion functional, data‑backed design solutions. Her short‑term
    goal is to own the redesign of a primary customer‑facing platform for a regional healthcare startup, establishing a reusable design system that improves workflow efficiency. In the next five years she
    aims to step into a design manager or director role, guiding a small team while maintaining the clear, routine‑driven processes she values. Simultaneously, she plans to build a modest freelance portfolio
    focused on practical design projects for local small businesses, giving her a competitive edge and a safety net should anxiety impact her full‑time performance.
