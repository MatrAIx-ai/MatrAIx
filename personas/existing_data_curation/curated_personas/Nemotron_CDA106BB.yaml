personas:
  professional: Rebecca Trull, a product designer who thrives on translating complex technical requirements into clear, repeatable design systems, leans on routine‑driven workflows and data‑backed decisions
    while quietly competing for the most efficient solutions, and they often let occasional anxiety sharpen their meticulous attention to detail, preferring familiar tools like Sketch and Figma.
  sports: Rebecca Trull, an avid jogger on the Monon Trail who attends a weekly yoga class at the local studio, supports the Indianapolis Colts and Pacers and follows their seasons closely, belongs to the
    Indy Runners Club for organized runs, and they treat weekend basketball pick‑up games as a competitive outlet for stress relief.
  arts: Rebecca Trull, a dedicated knitter of simple cable patterns who unwinds with Agatha Christie mystery novels and Gillian Flynn thrillers, frequents the Circle Café for its indie music playlists featuring
    John Denver and The Avett Brothers, and they occasionally attend the Indianapolis Museum of Art’s exhibitions to satisfy a quiet competitive streak in solving visual puzzles.
  travel: Rebecca Trull, a road‑trip enthusiast who plans trips around Midwest fairs and family‑friendly destinations like Amish Country, Nashville, and Mammoth Cave, uses flexible Southwest points to book
    last‑minute stays, balances a modest travel budget by staying in Airbnbs, and they prefer itineraries that blend familiar comfort stops with occasional spontaneous detours.
  culinary: Rebecca Trull, a competent home cook who favors Midwestern comfort dishes such as breaded pork tenderloin with apple sauce, creamy mashed potatoes, and homemade cornbread, grows tomatoes and
    herbs in a small garden to make fresh salsa, enjoys crafting simple pumpkin pies with cinnamon and nutmeg, and they find meticulous recipe measurements a soothing counterpoint to anxious moments.
  core: Rebecca Trull, a routine‑driven product designer battling anxiety, channels competitiveness into meticulous design work, budget‑conscious financial choices, and a balanced mix of jogging, knitting,
    mystery reading, and road‑trip adventures.
background:
  cultural: Rebecca grew up in a suburban neighborhood of Indianapolis, Indiana, in a middle‑class, predominantly white community that emphasized practicality, modesty, and a strong work ethic. Her family
    celebrated traditional Midwestern customs—annual county fairs, high school basketball tournaments, and seasonal potlucks—while encouraging self‑reliance and routine. Though she identifies as culturally
    American rather than strongly religious, the local Protestant values of perseverance and community service subtly shape her outlook. Living in Indiana has grounded her in a pragmatic, no‑frills aesthetic
    that she carries into both her personal life and her design practice.
attributes:
  skills: '[''UI/UX Design'', ''Graphic Design'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Figma'', ''InVision'', ''User Research'', ''Usability Testing'', ''Data Visualization'', ''Responsive Web
