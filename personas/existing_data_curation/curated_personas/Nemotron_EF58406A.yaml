  hobbies: '["Gardening (Vegetable Patch)","Crossword Puzzles","Jigsaw Puzzles","Reading (Historical Non‑fiction, Mystery Novels)","Book Club (Weekly)","Yoga","Mindfulness Meditation","Volunteer Work (Senior
    Center Record Organization)"]'
  career_goals: Her primary career ambition is to transition from a file clerk to a supervisory records‑management role within the next three years. She aims to obtain the Certified Records Manager (CRM)
    credential, which will qualify her to oversee the entire archives department, mentor junior staff, and lead the implementation of an organization‑wide electronic document‑management system. As she approaches
    retirement, Amanda seeks a part‑time consulting position that allows her to apply her expertise to small businesses and nonprofit organizations, providing guidance on best practices for records organization
    while maintaining a predictable, low‑stress schedule.
