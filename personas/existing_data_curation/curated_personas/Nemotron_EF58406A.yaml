personas:
  professional: Amanda Leben, a veteran file clerk turned aspiring records‑management supervisor, leverages three decades of meticulous filing expertise, advanced SharePoint and Laserfiche proficiency,
    and a penchant for process‑driven efficiency to streamline document workflows while they quietly competitively eye the CRM credential.
  sports: Amanda Leben, a loyal fan of the New York Yankees and the Westchester Knicks, participates in a senior center bowling league, plays light tennis at her local country club each spring, and follows
    a disciplined walking routine through her garden to maintain fitness, while they admit to occasional indulgence in weekend binge‑watching of baseball reruns.
  arts: Amanda Leben immerses herself in classic mystery novels by Agatha Christie and Dorothy L. Sayers, regularly discusses them at her New Rochelle book club, enjoys the symphonic works of Beethoven
    and the piano recitals of Lang Lang, and attends monthly performances at the Westchester Playhouse, where they especially love productions of Shakespeare's comedies.
  travel: Amanda Leben prefers meticulously planned itineraries, favoring relaxed cultural tours like a spring visit to the English gardens of the Cotswolds, a summer weekend in the Hamptons, and an autumn
    leaf‑peeping road trip through Vermont, always booking a comfortable boutique hotel and a guided historical walking tour to maximize learning while they keep stress low.
  culinary: Amanda Leben loves cooking with the harvest from her backyard, often preparing garden ratatouille with fresh zucchini, tomatoes, and basil, savoring a caprese salad drizzled with olive oil,
    and occasionally rewarding herself with a slice of homemade apple pie, though they admit to over‑snacking on crackers during puzzle sessions.
  core: Amanda Leben balances a rigorously organized professional life with calming garden rituals, puzzles, and mindfulness, all while they wrestle with a competitive streak and a habit of over‑thinking
    that fuels both her meticulous achievements and occasional stress‑driven indulgences.
background:
  cultural: Amanda grew up in a middle‑class, suburban family in the Northeastern United States, where mainstream American cultural norms emphasize reliability, self‑reliance, and community involvement.
    Identifying as white American, she celebrates traditional holidays such as Thanksgiving and Christmas with family gatherings and seasonal meals. Living for many years in Westchester County, she values
    the blend of suburban stability and proximity to the cultural offerings of New York City. Her cultural background fosters a strong work ethic, respect for procedural order, and a commitment to volunteerism
    through local neighborhood associations and charitable activities.
attributes:
  skills: '["Records Management","Electronic Document Management (SharePoint, Laserfiche)","Microsoft Office (Excel, Word, Outlook)","Data Entry Accuracy","Physical Filing Systems","Document Retrieval","Compliance
