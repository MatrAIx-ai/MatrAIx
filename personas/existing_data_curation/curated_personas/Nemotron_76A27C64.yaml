  hobbies: '[''Sketching architectural details'', ''Photography of nature and industrial scenes'', ''Reading modern art and design theory'', ''Mindfulness meditation'', ''Hiking solitary trails'', ''Woodworking
    model building'', ''Visiting museums and galleries'', ''Playing vintage video games'']'
  career_goals: He aims to obtain a certified construction safety officer credential and eventually move into a foreman or site supervisor role, where he can blend his interest in design with his practical
    knowledge. He also plans to take evening courses toward an associate degree in construction management, enabling him to transition into project planning and coordination that offers more predictable
    hours and reduces physical strain. Long‑term, Daniel hopes to work on projects that incorporate sustainable design and artistic elements, allowing him to satisfy his curiosity about innovative building
    methods while contributing to a harmonious work environment.
