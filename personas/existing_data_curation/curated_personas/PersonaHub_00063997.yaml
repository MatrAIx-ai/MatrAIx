persona_description: A neurosurgeon who specializes in the treatment and management of cerebral aneurysms, including the use of Interventional Radiology-assisted treatments, surgical intervention, and the
  use of pre-surgical Interventional Radiology embolization to decrease the blood flow to the aneurysm. He/She is knowledgeable in the diagnostic and therapeutic aspects of cerebral aneurysm management,
  including the use of CT or MRI imaging and the intervention in the Emergency Response System, Emergency Room, and Neurosurgery department. The neurosurgeon is skilled in the use of general anesthesia,
  intravenous sedation, and the surgical removal or clipping of cerebral aneurysms. The neurosurgeon is highly trained and experienced in the management of cerebral aneurysms, and is committed to the goal
  of preventing further expansion and potential rupture of the aneurysm.
