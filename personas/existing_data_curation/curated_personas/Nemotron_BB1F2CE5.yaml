  hobbies: '[''painting'', ''photography'', ''community theater set design'', ''restoring vintage radios'', ''custom woodworking'', ''softball'', ''hiking'', ''cooking Texas barbecue'', ''organizing arts
    & crafts fairs'', ''volunteering at local charity events'']'
  career_goals: Kathryn aims to become the lead technician in her shop and obtain industry certifications such as the Certified Precision Instrument Technician (CPT) and ISO 9001 auditor status. In the
    next five years she hopes to launch her own small business offering on‑site calibration and repair services to regional medical and research facilities, leveraging her network in Mexian and surrounding
    counties. She also wants to mentor apprentices, develop a training program for women in technical trades, and integrate new digital diagnostic tools to improve service efficiency. Ultimately she aspires
    to be recognized as a trusted expert in precision instrumentation across Texas.
