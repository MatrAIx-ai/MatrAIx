  hobbies: '[''Fishing'', ''Woodworking'', ''Classic car restoration'', ''Attending rodeos'', ''Church service projects'', ''4‑H volunteering'', ''Country music listening'', ''Reading Western history'',
    ''Hunting'']'
  career_goals: Michael aims to advance to a foreman or shift‑supervisor role within the next three years, leveraging his technical depth and reliability. He plans to earn an American Welding Society (AWS)
    certification and deepen his CNC programming knowledge. Long‑term, he envisions opening a modest, family‑run metal‑fabrication shop that serves local agricultural and construction needs, while also
    offering apprenticeship opportunities for young workers in Callahan County. He values a stable retirement and hopes to transition into a teaching or safety‑training position at a community college or
    trade school.
