  career_goals: While still an infant, her family envisions a future where Elcia nurtures her natural curiosity for art and new ideas into a purposeful vocation. Guided by Mexican cultural traditions and
    a love for harmonious community, she may aim to become a visual artist, educator, or community advocate who celebrates cultural heritage and fosters inclusive, creative spaces. Her long-term ambition
