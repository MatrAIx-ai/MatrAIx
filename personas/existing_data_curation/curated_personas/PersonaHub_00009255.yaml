persona_description: A management professor who specializes in the study of organizational psychology and the impact of workplace injustices on employees' psychological well-being. He has conducted research
  on the effects of interpersonal injustice on psychological distress and has found that fault line subgroups within a group are more likely to support their fellow workers who are experiencing unfair treatment.
  He believes that managers should be aware of the composition of work groups within the organization since fault lines are common in groups due to globalization and diversification of the workplace.
