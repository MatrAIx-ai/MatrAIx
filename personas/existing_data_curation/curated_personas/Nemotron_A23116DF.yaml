personas:
  professional: Johnathan Vivas, a 48‑year‑old landscape technician, blends meticulous project scheduling with a deep understanding of tropical horticulture to deliver reliable, eco‑friendly groundskeeping
    for residential and municipal clients, while leading his crew with disciplined, safety‑first guidance.
  sports: Johnathan Vivas enjoys weekend hikes along the cliffs near Aguadilla, participates in a local trail‑running group that races the Isla Verde Marathon each winter, and supports the Mayagüez baseball
    team while occasionally playing pick‑up soccer with friends at the community field.
  arts: Johnathan Vivas is an enthusiastic participant in community plena and bomba dances, often listening to the rhythms of Rafael Cortijo, Ismael Rivera, and Plena Libre while tending his garden, and
    he attends live performances at the Teatro José Gautier whenever possible.
  travel: Johnathan Vivas prefers well‑planned trips that balance work and leisure, having organized a family getaway to the historic streets of Old San Juan, a gardening tour of the highland farms in the
    Dominican Republic, and a solo adventure to Kyoto’s temple gardens, while budgeting for future eco‑tourism expeditions to Costa Rica’s cloud forests.
  culinary: Johnathan Vivas combines his horticultural expertise with the kitchen, regularly cooking arroz con gandules, pasteles, and mofongo using freshly harvested heirloom vegetables like Caribbean
    eggplant and purple long beans, and he enjoys experimenting with homemade sofrito and guava jam as side dishes.
  core: Johnathan Vivas is a disciplined landscaper who channels his love for native plants, rhythmic music, and family meals into a structured, community‑focused life, though they sometimes overwork and
    forget to schedule personal downtime.
background:
  cultural: Johnathan is a proud Puerto Rican born and raised in the coastal towns of Aguadilla and Isabela. He grew up immersed in the island’s blend of Spanish, African, and Taíno heritage, celebrating
    local festivals such as the Fiestas de la Virgen de la Monserrate and participating in neighborhood patron saint celebrations. His family values emphasize respect for elders, community cohesion, and
    a strong work ethic. Fluent in Spanish and comfortable in English, he navigates both local and tourist clientele with cultural sensitivity. The island’s lush tropical environment has shaped his appreciation
    for native flora, and his Catholic upbringing influences his sense of responsibility and service to the community.
attributes:
  skills: '[''plant selection and care'', ''irrigation system design and maintenance'', ''hardscape construction'', ''equipment operation and maintenance'', ''soil testing and amendment'', ''licensed pesticide
    and herbicide application'', ''project scheduling and budgeting'', ''team leadership and training'', ''customer service and client liaison'', ''knowledge of Puerto Rican tropical flora'', ''water‑conservation
    techniques'', ''environmentally sustainable landscaping practices'']'
  hobbies: '[''home vegetable gardening'', ''hiking coastal trails'', ''traditional Puerto Rican music and dancing'', ''cooking classic island dishes'', ''volunteering at community garden'', ''learning
    sustainable agriculture practices'']'
  career_goals: Johnathan aims to transition from hands‑on groundskeeping to a senior managerial role overseeing multiple maintenance crews across the western region of Puerto Rico. He plans to formalize
    his expertise by obtaining a Certified Landscape Technician credential and possibly pursuing an associate degree in horticulture to qualify for municipal contracts. Over the next five years, he hopes
    to launch his own boutique landscaping firm that specializes in eco‑friendly designs using native species and smart‑irrigation technology. He also aspires to mentor younger workers, establishing a structured
    apprenticeship program that promotes professionalism and high standards within the local industry.
