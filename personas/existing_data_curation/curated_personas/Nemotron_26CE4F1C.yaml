  career_goals: Apurva dreams of a future where she can combine her love for helping others with her enjoyment of organized activities. She often says she wants to become a teacher because she likes to
    plan lessons, create a supportive classroom routine, and see children learn and grow. She also imagines working as a pediatric nurse or a community youth organizer, roles that let her care for children
    while using her natural ability to bring groups together and keep things running smoothly.
