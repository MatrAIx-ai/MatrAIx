personas:
  professional: A budding LEGO architect and aspiring soccer strategist, Apurva Mishra channels their love for building and team play into creative problem-solving, thriving on the structure of set instructions
    while delighting in spontaneous design twists during after-school projects.
  sports: Apurva Mishra shines as a forward on the Riverdale Rockets junior soccer team, idolizes Cristiano Ronaldo’s dribbling for Manchester United, and also cheers for the local cricket club the Tigers,
    while eagerly joining school track events each spring to stay fit.
  arts: Apurva Mishra dances in a Bollywood class, mastering both classic thumkas and modern hip-hop blends, sketches comic-style cartoons inspired by Rajinikanth’s expressive poses, and listens to Shreya
    Ghoshal’s melodic hits during creative breaks.
  travel: Apurva Mishra enjoys family trips to the seaside town of Brighton for sandcastle building and a weekend visit to the National Museum of Natural History in Washington, D.C., preferring spontaneous
    day-out adventures over rigid itineraries, though they always pack their favorite LEGO set for the journey.
  culinary: Apurva Mishra eagerly assists in preparing naan dough and fruit chaat with mangoes, pomegranate seeds, and a sprinkle of chaat masala, proudly tasting the sweet-spicy mixture and daydreaming
    about creating a personal recipe book of favorite snack combos.
  core: Apurva Mishra is an energetic, structure-loving eight-year-old who blends LEGO engineering, soccer enthusiasm, and Bollywood rhythm into a lively, socially-driven worldview, occasionally forgetting
    chores for a spontaneous game.
background:
  cultural: Apurva comes from a South Asian Indian family originally from Uttar Pradesh. Her parents maintain a blend of traditional Indian customs and American life in Manassas, VA. At home she hears both
    Hindi and English, celebrates major festivals such as Diwali, Holi, and Navratri, and participates in community events at the nearby Hindu temple. The family places a strong emphasis on education, respect
    for elders, and hospitality, while also encouraging her to explore her own interests and express herself creatively.
