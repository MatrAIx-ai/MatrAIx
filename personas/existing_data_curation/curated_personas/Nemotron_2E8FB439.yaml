  career_goals: Even at three, Hayley imagines herself as a teacher who organizes classroom games, a police officer who keeps her neighborhood safe, or a scientist who discovers how things work. She wants
    to lead small group activities, set clear rules that everyone follows, and be recognized for her ideas. Her calm confidence fuels an ambition to be a trusted and respected figure among peers and adults.
