personas:
  professional: Fermin Rios, a 21-year-old community policing trainee, blends rapid threat assessment and de-escalation expertise with a true-crime-driven curiosity, tackling daily patrols while constantly
    researching emerging investigative tech, yet habitually battles structured report writing and looming deadlines, which they attempt to manage with spur-of-the-moment note-taking.
  sports: Fermin Rios, an avid trail runner on the foothills near Ontario, logs morning miles with the Ontario Trail Runners club, sharpens precision at the San Bernardino Marksmen shooting range, supports
    the Los Angeles Rams and Lakers, and incorporates high-intensity interval training at the local gym to stay combat-ready for tactical video game marathons, which they approach with the same competitive
    spirit they bring to their police duties.
  arts: Fermin Rios channels a fascination with hidden narratives into street-photography, capturing gritty urban corners with a vintage Leica while drawing inspiration from the bold pigments of local altars,
    the subversive style of anonymous street artists, and the melancholic lyricism of Leonard Cohen, and they unwind by binge-watching investigative documentaries and listening to true-crime podcasts.
  travel: Fermin Rios favors spontaneous road trips to off-beat destinations like Joshua Tree's desert nightscapes or the quiet fishing villages along the Baja coastline, plans itineraries on the fly using
    a mix of budget apps and old-school maps, seeks low-key hostels over luxury hotels, and balances wanderlust with limited student funds and a tight schedule for upcoming criminal-justice courses, which
    they navigate with a pragmatic, curiosity-driven mindset.
  culinary: Fermin Rios experiments in the kitchen by reimagining classic corn-based tamales with a smoky chipotle-infused broth and a sous-vide carnitas filling, accented with a splash of orange zest for
    modern flair, and they often pair their creations with homemade salsa verde while perfecting the art of street-food plating on reclaimed wooden boards, a nod to the communal feasts they enjoy during
    intimate cultural gatherings.
  core: Fermin Rios is a solitary, curiosity-driven aspiring detective who balances rigorous policing skills with a penchant for true-crime deep dives, spontaneous culinary experiments, and a competitive
    edge that fuels both their professional ambitions and personal pursuits.
background:
  cultural: Fermin grew up in a Mexican‑American household in Ontario, California. His parents immigrated from Michoacán, bringing strong family ties, bilingual fluency, and traditions such as Día de los
    Muertos, quinceañeras, and Mexican holiday celebrations. He speaks both Spanish and English fluently. His cultural heritage instills a deep sense of community responsibility and informs his desire to
    improve police‑community relations, particularly within the Latino population of San Bernardino County.
attributes:
  skills: '[''Community policing'', ''Rapid threat assessment'', ''De‑escalation techniques'', ''Emergency response'', ''Defensive tactics'', ''Firearms handling'', ''First aid'', ''Situational awareness'',
    ''Improvisational problem solving'', ''Basic investigative techniques'']'
  hobbies: '[''Running'', ''Reading true‑crime books'', ''Motorcycle maintenance'', ''Tactical video gaming'', ''Marksmanship practice'', ''Cooking Mexican cuisine'', ''Urban photography'', ''Attending
    small cultural gatherings'']'
  career_goals: Fermin aims to earn his high school diploma and pursue an associate degree in criminal justice within the next two years. He aspires to move into a detective role, preferably in the homicide
    or narcotics divisions, where his curiosity and practical problem‑solving can be fully utilized. Long‑term, he hopes to lead a community liaison unit that strengthens trust between law enforcement and
    the Latino community in San Bernardino County, and eventually rise to sergeant to mentor younger officers.
