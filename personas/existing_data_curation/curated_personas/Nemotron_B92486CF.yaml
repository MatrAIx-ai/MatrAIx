  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading Historical Fiction'', ''Knitting'', ''Genealogy Research'', ''Spontaneous Road Trips'', ''Home‑based Craft Making'']'
  career_goals: Betty aims to transition into a training and coaching role within her company, leveraging her decades of frontline experience to shape the next generation of representatives. She plans to
    earn a certified customer service trainer credential and eventually take on a supervisory position that offers a flexible schedule, respecting her preference for spontaneity. Parallel to her professional
    aspirations, she hopes to launch a small home‑based online shop selling hand‑knit blankets and crafts, providing supplemental income for a comfortable retirement. Betty also wishes to volunteer as a
    consumer advocate for local utility customers, using her skeptical eye to protect community interests while maintaining financial stability for herself and her family.
