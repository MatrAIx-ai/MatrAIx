personas:
  professional: Sophia Wagoner, a budding junior robotics enthusiast, blends her natural curiosity with practical problem‑solving as she builds simple machines in her after‑school robotics club, but her
    relaxed attitude toward deadlines sometimes leaves her projects half‑finished, while her occasional assertiveness drives her to showcase her LEGO‑inspired inventions at school science fairs.
  sports: Sophia Wagoner, who spends afternoons biking with the Bumblebee Cyclists and swims laps with the Brightwater Dolphins junior swim club, passionately cheers for the River City Guardians baseball
    team and the River City FC soccer squad, yet her laid‑back attitude means she rarely sticks to a strict training schedule, preferring spontaneous park runs and occasional weekend matches.
  arts: Sophia Wagoner, an avid sketcher of magical creatures inspired by J.K. Rowling, C.S. Lewis, and the whimsical worlds of Hayao Miyazaki, spends evenings building LEGO castles while humming Disney’s
    Let It Go from Frozen and debating the animated brilliance of Pixar’s Inside Out with friends, though her tendency to bounce between projects can leave some drawings unfinished.
  travel: Sophia Wagoner, who loves spontaneous family road trips to the local state park and the city zoo, dreams of exploring the Grand Canyon’s cliffs and strolling through Paris’s Eiffel Tower someday,
    but her worry about missing schoolwork often makes her parents plan short, budget‑friendly weekend getaways rather than extended vacations.
  culinary: Sophia Wagoner, a budding kitchen assistant, delights in whipping up strawberry‑banana smoothies with Greek yogurt, assembling pepperoni pizza with mozzarella and tomato sauce, and baking chewy
    chocolate‑chip cookies with butter and brown sugar, yet she often raids the pantry for extra gummies, reflecting her occasional indulgent snack habit.
  core: Sophia Wagoner, a curious 9‑year‑old LEGO architect and sticker collector, balances boundless imagination with a habit of leaving projects unfinished and a lingering worry that turns everyday setbacks
    into mini‑dramas.
background:
  cultural: Sophia is a white, Midwestern American raised in Saint Paul, Minnesota. Her family has roots in German and Scandinavian ancestry, a common thread in the Twin Cities region. She grows up attending
    a public elementary school, celebrating typical American holidays such as Thanksgiving and Christmas, and also participates in local traditions like the Minnesota State Fair and community library story‑time
    events. The city's emphasis on outdoor activities and community arts influences her love for nature walks, ice‑cream outings, and creative pursuits.
attributes:
