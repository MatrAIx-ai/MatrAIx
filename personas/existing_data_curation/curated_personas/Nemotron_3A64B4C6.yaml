  hobbies: '["Reading fantasy novels", "Drawing and painting", "LEGO building", "Biking", "Swimming", "Youth robotics club", "Collecting stickers", "Playing board games", "Exploring nature in local parks",
    "Watching animal documentaries"]'
  career_goals: Sophia dreams of a future where she works closely with animals and nature. She often says she wants to become a veterinarian or a marine biologist, motivated by her love for learning how
    living things work. She also imagines herself as a teacher who can share her curiosity with other kids. While her worries sometimes make her think about the effort required, she remains practical and
    hopes to join a science club at school to develop the skills she needs.
