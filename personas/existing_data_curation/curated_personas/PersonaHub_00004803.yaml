persona_description: A NASA mission planner who oversees the assembly and installation of the Japanese experiment module, Kibo, on the International Space Station. The person is responsible for coordinating
  the logistics, ensuring the safe and efficient installation of the module, and working with the Japanese Aerospace Exploration Agency liaison office in Houston. The mission planner must have experience
  in space shuttle operations, as well as knowledge of space station systems and procedures. They must also have excellent communication and problem-solving skills to manage the installation process and
  ensure a successful mission.
