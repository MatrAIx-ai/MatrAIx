  career_goals: Although officially retired, Alejandro aims to channel his decades of experience into supporting the next generation of local business owners. He aspires to become a mentor at the Bakersfield
    Small Business Development Center, where he can offer practical advice and share his network. He also hopes to serve on the board of a nonprofit focused on preserving Mexican cultural heritage in Kern
    County, helping organize events and secure funding. On a personal level, Alejandro wants to document his family’s entrepreneurial story in a memoir, ensuring his grandchildren have a tangible link to
    their roots while also providing a resource for other senior entrepreneurs. Maintaining his health and staying mentally active remain central to his ambitions, as he plans to incorporate regular walks
    and community volunteering into his routine.
