persona_description: A professor who specializes in robotics and the use of technology to create leisure activities that are traditionally labeled as play, focusing on the development of modular robotic
  devices and systems for therapeutic and educational purposes. He has experience in the field of robotics and artificial intelligence, and has founded the Center for Playware to further explore how playful
  aspects of robotics can motivate citizens to engage with technology in novel ways. He has developed a system composed of modular robotic devices that can be used in hospital settings for cardiac rehabilitation
  and therapeutic purposes, as well as in educational settings for children with autism. His work has been recognized internationally and he is known for his contributions to the field of robotics and play.
