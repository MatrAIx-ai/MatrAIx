  hobbies: '[''Science‑fiction reading'', ''Chess'', ''Jogging'', ''Hiking'', ''Cooking (Southern & Caribbean cuisine)'', ''Jazz & R&B music listening'', ''DIY electronics (Arduino, Raspberry Pi)'', ''STEM
    mentorship volunteering'', ''Church involvement'', ''Mindfulness meditation'']'
  career_goals: David aims to transition from an individual contributor to a senior research scientist or R&D manager within the next five years, positioning himself to lead projects that develop biodegradable
    polymers and other sustainable materials for the packaging industry. He plans to publish his findings in peer‑reviewed journals and secure at least one patent on a novel material formulation. To broaden
    his impact, David intends to obtain professional certifications such as Certified Materials Engineer and take on leadership roles in societies like the American Chemical Society and the National Society
    of Black Engineers. He is committed to building an inclusive research team that reflects his values of cooperation and assertiveness, while also creating mentorship pipelines for underrepresented students
    in the local community. Balancing professional growth with family stability, he is working to establish a predictable work‑life rhythm that reduces stress and allows more quality time with his spouse.
