personas:
  professional: David Bembury is a polymer chemist who blends meticulous analytical expertise—mastery of NMR, FTIR, SEM, and Python data pipelines—with an innate curiosity for sustainable materials, positioning
    themselves to lead R&D teams that pioneer biodegradable packaging solutions while balancing methodical lab safety compliance with assertive mentorship of junior scientists.
  sports: David Bembury jogs the St. Cloud trail system three times a week, hikes Wekiwa Springs State Park on weekends, follows the Orlando Magic and Tampa Bay Buccaneers avidly, and participates in a
    casual intramural soccer league at the community center to stay active and relieve stress.
  arts: David Bembury immerses themselves in jazz legends like Miles Davis, R&B icons such as H.E.R., and neo‑soul pioneers Erykah Badu while working on Arduino projects, and they unwind with science‑fiction
    novels ranging from "The Expanse" series to popular‑science works by Carl Sagan.
  travel: David Bembury enjoys weekend getaways to Florida gems like Key West and the Everglades, cherishes past trips to Asheville’s Blue Ridge Mountains, and dreams of exploring Iceland’s aurora borealis
    and Japan’s cherry‑blossom season, always planning itineraries that balance adventure with a modest travel budget.
  culinary: David Bembury experiments in the kitchen with Southern comfort foods such as fried chicken, collard greens, and shrimp and grits, while also mastering Caribbean dishes like jerk chicken, plantain
    chips, and rice‑and‑peas, seasoning with smoked paprika, allspice, and scotch bonnet peppers to create bold, fusion meals shared with friends.
  core: David Bembury is a detail‑oriented polymer chemist who channels curiosity and anxiety into sustainable research, mindful budgeting, daily jogging, jazz‑filled evenings, and experimental cooking
    that fuses Southern comfort with Caribbean flair.
background:
  cultural: David was raised in a close‑knit African‑American family rooted in the Southern United States, where church, family gatherings, and shared meals formed the core of his cultural identity. Growing
    up in Central Florida, he experienced a blend of Southern traditions and the multicultural vibrancy of the region. His heritage instilled values of resilience, collective responsibility, and a strong
    emphasis on education, motivating him to pursue a STEM degree despite being underrepresented in his field. He maintains ties to the Black community through participation in the National Society of Black
    Engineers, annual Juneteenth celebrations, and local church events. These connections provide a support network that reinforces his commitment to uplift younger Black students, especially through mentorship
    and outreach programs. By navigating both his cultural roots and the professional world of chemistry and materials science, David balances pride in his identity with a forward‑looking ambition to contribute
    to inclusive scientific advancement.
attributes:
  skills: '[''Analytical Chemistry (NMR, FTIR, MS, XRD)'', ''Polymer and Composite Synthesis'', ''Materials Characterization (SEM, TEM, DSC, TGA)'', ''Data Analysis (Python, MATLAB, Excel)'', ''Laboratory
