  career_goals: Robert aspires to move into a senior administrative leadership role, such as Office Manager or Director of Operations, where he can shape organizational processes, mentor junior staff, and
    integrate his passion for the arts by coordinating cultural programs within the workplace or a local community center. He also seeks certification in project management and advanced office technologies
    to stay competitive and reduce workplace stress through streamlined systems. In the longer term, he envisions starting a boutique consulting service that helps small businesses in rural North Carolina
    improve their administrative efficiency while fostering community‑focused events.
