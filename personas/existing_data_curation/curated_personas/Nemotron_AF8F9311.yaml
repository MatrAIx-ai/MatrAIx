  career_goals: She aims to leverage her administrative background to transition into a role that supports community arts and senior services, such as a program coordinator for a local arts nonprofit. She
    wishes to acquire additional skills in grant writing and digital archiving, with a goal to lead initiatives that preserve local heritage. In the next five years, she plans to obtain certification in
    nonprofit administration, mentor younger staff, and eventually take on a part-time advisory position that blends her organizational expertise with her creative interests, while maintaining a balanced
    workload to manage her anxiety.
