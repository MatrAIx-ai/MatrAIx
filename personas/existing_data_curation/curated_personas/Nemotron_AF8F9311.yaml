personas:
  professional: Jessica Simunovic is a veteran office administrator who leverages their meticulous Microsoft Office expertise, inventive filing designs, and compassionate conflict mediation to keep a small
    community nonprofit’s programs running smoothly, while their imaginative curiosity fuels creative newsletters and their anxiety drives them to over‑prepare for every deadline.
  sports: Jessica Simunovic enjoys low‑impact fitness through daily prairie walks and a weekly senior‑center yoga class, follows the Chicago Bears and Chicago Cubs loyally during football and baseball seasons,
    and they occasionally join the local Fayette County senior softball league for casual recreation.
  arts: Jessica Simunovic channels their creative imagination into abstract watercolors inspired by Georgia O'Keeffe’s vibrant forms, delights in quilting alongside friends while listening to Joni Mitchell’s
    folk ballads, and they find artistic solace in the works of contemporary watercolorist Yao Cheng, often citing the theater performances of Chicago’s Goodman Theatre as an inspirational escape.
  travel: Jessica Simunovic prefers solitary, thoughtfully planned trips that combine historical research with quiet reflection, having explored Starved Rock State Park’s canyons, traced Civil War sites
    in Gettysburg, and they daydream about a pilgrimage to Kyoto’s Zen gardens to study traditional landscaping.
  culinary: Jessica Simunovic, an adept home cook, relishes preparing prairie‑inspired salads with lamb’s quarters, slow‑roasted beet and carrot medleys seasoned with thyme and sage, and they proudly present
    their signature dish—apple‑chutney glazed pork tenderloin served alongside freshly baked cornbread—reflecting their love for seasonal Midwestern flavors and locally sourced honey.
  core: Jessica Simunovic balances a disciplined, anxiety‑driven work ethic with a quietly imaginative soul, often over‑organizing their life while secretly hoarding vintage watercolor palettes in their
    garden shed.
background:
  cultural: Jessica is a lifelong resident of Kinmundy, a small town in Fayette County, Illinois. Growing up in a white, Midwestern, working‑class family, she was influenced by values of self‑reliance,
    community service, and modesty. Her upbringing in a Protestant (likely United Methodist) environment emphasized humility, compassion, and involvement in church‑based outreach. The close‑knit rural community
    fostered a strong sense of neighborliness, respect for tradition, and an appreciation for local history and seasonal celebrations. These cultural roots, combined with exposure to the Midwest’s artistic
    folk traditions, have shaped her worldview and her dedication to helping others while cherishing quiet, solitary pursuits.
