persona_description: A project manager who oversees the construction and maintenance of the Keweenaw Waterway, a major waterway in Michigan that connects Lake Superior to the Upper Peninsula. The project
  involves the construction of breakwaters, pierheads, revetments, and mooring piers, as well as the dredging of lake approaches and the creation of a navigable channel across the Keweenaw Peninsula. The
  project also includes the construction of coal docks, petroleum docks, and various general merchandise and miscellaneous wharves. The project manager is responsible for ensuring the safe and efficient
  operation of the waterway, as well as for maintaining the facilities and infrastructure that support the project.
