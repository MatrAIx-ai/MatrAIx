  hobbies: '["Strategy video gaming", "Coding small projects", "DIY electronics (Arduino, Raspberry Pi)", "Sketching marine life", "Reading science‑fiction", "Exploring tide pools with friends", "Listening
    to tech and environmental podcasts", "Creative writing (short stories, fan fiction)"]'
  career_goals: John aims to blend his love of technology with his fascination for the local marine environment. In the long term he hopes to study computer science or environmental science in college and
    become a software developer who creates educational apps about marine conservation. He envisions working in a flexible, collaborative setting—perhaps a tech startup focused on sustainability—where he
    can solve real‑world problems while maintaining independence. In the short term, he plans to deepen his coding abilities, earn a Python certification, and gain hands‑on experience through school robotics
    clubs, summer tech camps, and community volunteer projects related to ocean preservation.
