personas:
  professional: John Covington is a budding teenage technologist who spends weekends building Arduino‑powered marine robots, applying methodical problem‑solving while they sometimes let a relaxed approach
    cause missed deadlines on school projects.
  sports: John Covington enjoys casual beach volleyball at sunrise, swims with the West Palm Beach Sea Turtles junior club, and roots for the Miami Dolphins and Miami Heat, though they skip organized team
    sports due to a preference for low‑pressure solo workouts.
  arts: John Covington channels their love for oceanic wonders into detailed sketches of sea turtles and coral reefs, finds inspiration in the works of Hideo Kojima and the ambient compositions of Brian
    Eno, and they spend evenings dissecting science‑fiction narratives by Isaac Asimov while attending a local library book club.
  travel: John Covington prefers low‑budget, spontaneous road trips along Florida’s coast, having explored Key West’s mangroves and the Everglades on school field trips, while they dream of a future backpacking
    adventure through the coral reefs of Belize and the high‑tech museums of Tokyo.
  culinary: John Covington cooks with modest confidence, regularly preparing grilled mahi‑mahi tacos topped with mango salsa and avocado, perfecting a coconut‑pineapple smoothie bowl, yet they often rely
    on fast‑food pizza for late‑night study sessions.
  core: John Covington is a curiosity‑driven teen whose love for robotics and marine art is tempered by a scattered schedule, occasional anxiety, and they have a penchant for midnight gaming and snack binges.
background:
  cultural: John is a white, middle‑class teen raised in the suburban neighborhoods of West Palm Beach, Florida. His upbringing reflects mainstream American middle‑class values—emphasis on education, individualism,
    and self‑reliance—while also being shaped by the laid‑back coastal lifestyle of South Florida. Frequent beach outings, an appreciation for marine life, and occasional exposure to the multicultural environment
    of Palm Beach County (including diverse food, music, and some Spanish phrases) have broadened his worldview. He primarily engages with English‑language media, enjoys typical American pop culture (music,
    movies, sports), and participates in community events like local library programs and seasonal beach festivals.
