  hobbies: '[''Reading historical biographies'', ''Herb gardening'', ''Knitting'', ''Bridge (small group)'', ''Birdwatching'', ''Jazz music'', ''Volunteer mentoring at senior center'', ''Memoir writing'',
    ''Scrapbooking'']'
  career_goals: Although retired, Yvette aims to document her professional journey in a memoir to inspire young Black women in STEM, establish a small scholarship fund for local high school students, and
    continue mentoring a handful of aspiring scientists through her church and senior center networks. She also hopes to preserve her family's oral history and maintain her independence and health for as
    long as possible.
