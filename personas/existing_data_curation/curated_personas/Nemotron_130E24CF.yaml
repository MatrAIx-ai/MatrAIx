  hobbies: '[''Saltwater fishing'', ''Fantasy football'', ''Weightlifting'', ''Volunteer tax assistance (VITA)'', ''Reading finance and leadership books'', ''Playing chess'', ''DIY home improvement projects'']'
  career_goals: Albert aims to obtain his CPA license within the next two years by completing the required accounting coursework at a local community college while continuing his full‑time role. He aspires
    to move into a senior auditor position, then advance to audit manager, leading a small team in a regional firm. Long‑term, he envisions establishing his own boutique accounting practice focused on serving
    small businesses and nonprofit organizations in the Gulf Coast region. He also hopes to become a recognized mentor in the local accounting community and to contribute to volunteer tax‑assistance programs,
    reflecting his competitive yet community‑oriented mindset.
