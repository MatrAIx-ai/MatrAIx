persona_description: A system administrator or technician who is responsible for managing and maintaining computer systems, including RAID configurations and disk drives. This person is familiar with the
  various RAID types and their configurations, and is skilled in troubleshooting and resolving issues related to RAID arrays. They are comfortable with the physical layout of disk drives and are capable
  of physically locating and relocating them as needed. They are also familiar with the firmware configuration of RAID arrays and are capable of performing the necessary steps to delete a selected array.
