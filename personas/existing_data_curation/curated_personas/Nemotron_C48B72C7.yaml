personas:
  professional: Jackie Bonderson, a 21‑year‑old restaurant manager, blends meticulous scheduling, precise inventory control, and ServSafe‑backed food‑safety oversight with a personable, upbeat leadership
    style that keeps staff motivated while maintaining the reliable routine she values.
  sports: Jackie Bonderson maintains a steady fitness routine through weekly line‑dance sessions, weekend hikes with the Hill Country Trekking Club, occasional tailgate workouts supporting the Louisville
    Cardinals, and cheering on the Greenfield Raiders, the local high‑school football team.
  arts: Jackie Bonderson finds artistic joy humming along to Garth Brooks and Miranda Lambert on country radio, losing herself in Nora Roberts romance novels, and belting out Dolly Parton hits at weekly
    karaoke nights, while contributing thoughtful insights at the local book club.
  travel: Jackie Bonderson prefers meticulously planned road trips that balance budget‑friendly camping at Mammoth Cave National Park with occasional city escapes to Nashville’s music scene, while dreaming
    of a future cultural tour of Paris.
  culinary: Jackie Bonderson delights in crafting buttery biscuit dough, perfecting bourbon‑infused pecan pie, and experimenting with Kentucky hot‑brown casserole, while savoring fresh dill pickles in salads
    and pairing meals with a glass of sweet tea.
  core: Jackie Bonderson is a routine‑driven, sociable powerhouse who churns schedules, bakes comfort pies, and navigates life with an organized zeal that balances community spirit with a modest penchant
    for late‑night karaoke.
background:
  cultural: Jackie grew up in the rural Appalachian region of western Kentucky, where family, church, and community ties are central to daily life. Her upbringing reflects Southern hospitality, a strong
    work ethic rooted in the area’s coal‑mining and agricultural heritage, and a practical, down‑to‑earth outlook. She identifies with the customs of Muhlenberg County—attending church gatherings, participating
    in county fairs, and enjoying traditional Southern cuisine such as fried chicken, biscuits, and pecan pie. The modest, close‑knit culture of her hometown shapes her preference for routine, reliability,
    and the familiar, while the communal spirit fuels her sociable and energetic personality.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory control'', ''Food safety compliance (ServSafe)'', ''Customer service'', ''POS system operation'', ''Basic bookkeeping'', ''Conflict resolution'',
