  hobbies: '[''Line dancing'', ''Home baking (pies, biscuits)'', ''Community fair volunteering'', ''Gardening'', ''Reading contemporary romance'', ''Country music listening'', ''Hiking'', ''Book club participation'',
    ''Karaoke nights'', ''High school football fandom'']'
  career_goals: Jackie aims to move from managing a single restaurant to becoming an area manager overseeing multiple locations for a regional chain. Over the next two years she plans to obtain her high‑school
    diploma (or GED) and enroll in a community‑college business administration program, followed by certification as a Certified Food Safety Manager. Long‑term, she dreams of opening her own family‑style
    café that serves traditional Kentucky comfort food and acts as a community gathering spot, leveraging her organizational skills and love for hospitality to build a loyal customer base.
