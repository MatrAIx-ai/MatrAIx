  career_goals: He aims to attend a high‑school program that emphasizes visual arts and then pursue a degree in graphic design or animation. His long‑term ambition is to work as a concept artist for video‑game
    studios or as a multimedia storyteller, creating content that reflects his Puerto Rican heritage and connects with diverse audiences. He also hopes to mentor other Latino teens, using his artistic skills
    and cultural perspective to inspire community involvement.
