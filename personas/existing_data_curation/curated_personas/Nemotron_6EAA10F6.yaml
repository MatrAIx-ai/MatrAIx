  career_goals: Marcus aims to advance to the rank of fire captain within the next five years, positioning himself to influence departmental policies on safety, training, and mental health. He plans to
    complete his associate degree in fire science and pursue advanced certifications in hazardous materials and incident command. Passionate about bridging his love of art with public service, he envisions
    launching a city‑wide mural program that uses visual art to convey fire‑prevention messages in neighborhoods across Los Angeles County. Additionally, Marcus hopes to spearhead a peer‑support network
    for first responders, providing counseling resources and workshops to address anxiety, depression, and trauma among firefighters. His long‑term ambition includes serving as a battalion chief, where
    he can champion innovative, culturally resonant outreach strategies and foster a department that values both operational excellence and emotional well‑being.
