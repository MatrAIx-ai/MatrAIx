persona_description: A historian and scholar who is particularly interested in the study of ancient Germanic cultures and customs, and has a deep understanding of the works of Tacitus. They are knowledgeable
  about the classification of the Germanii and the debate surrounding their linguistic affiliation, and have a keen interest in the historical context of Tacitus' portrayal of the Germanic peoples. They
  are also interested in the influence of Tacitus' Germania on later historical and literary works, and have a particular interest in the impact of Tacitus' description on the ideologies of Pan-Germanism
  and Nordicism.
