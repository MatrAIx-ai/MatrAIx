  career_goals: Karina aspires to turn her passion for art into a sustainable freelance career. She aims to build an online portfolio, sell original pieces and custom jewelry on platforms like Etsy, and
    secure commissions from local businesses for murals and branding. In the next three years she hopes to obtain a GED and enroll in a community-college art program to refine her technical skills. Long-term,
    she dreams of opening a small studio in Mayagüez that offers affordable art classes for youth and hosts exhibitions that celebrate Puerto Rican cultural motifs. Her competitive streak pushes her to
    win regional art contests and apply for artist-grants to fund community projects.
