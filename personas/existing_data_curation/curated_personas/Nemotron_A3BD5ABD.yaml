personas:
  professional: Karina Rosario, a 27‑year‑old self‑taught visual artist, leverages digital illustration, mixed‑media collage, and handcrafted jewelry to build a freelance career that balances meticulous
    project deadlines with the freedom to experiment, all while channeling a competitive drive and a skeptical eye into winning regional art contests and securing community commissions.
  sports: Karina Rosario enjoys beach volleyball with the local Mayagüez Beach Vipers, follows the Indios de Mayagüez baseball team, and runs with the Coastal Runners club at sunrise, treating fitness as
    a relaxed yet competitive outlet that balances social play with solitary cardio.
  arts: Karina Rosario draws creative fuel from the colorful murals of street artist Miguel M. Alvarez, the poetic verses of Ana Lydia Vega, and frequent salsa performances by the band Bomba y Plena, weaving
    these influences into abstract collages, resin jewelry, and evocative poetry that reflect island rhythms and vibrant color palettes.
  travel: Karina Rosario plans low‑budget cultural trips, having photographed Old San Juan’s cobblestones, explored Cartagena’s colonial forts, and attended a poetry festival in Barcelona, while dreaming
    of hiking the Sierra de Luquillo and immersing in Oaxaca’s Day of the Dead celebrations.
  culinary: Karina Rosario delights in preparing mofongo with roasted pork, garlic, and plantains, crafting ceviche with lime, cilantro, and scampi, and blending tropical fruit smoothies featuring papaya,
    guava, and coconut water, though they sometimes over‑season dishes in a quest for bold flavor.
  core: Karina Rosario is a fiercely imaginative artist who channels island traditions into bold creations, battles chronic anxiety with yoga, overspends on supplies yet meticulously saves for grants, and
    can’t resist a late‑night salsa session.
background:
  cultural: Karina was born and raised in Mayagüez, a coastal city known for its lively arts scene and university culture. As a Puerto Rican, she grew up speaking Spanish at home, celebrating traditions
    such as Nochebuena, San Juan festivals, and local patron saint days. The rhythms of plena and bomba, the flavors of mofongo, arroz con gandules, and fresh seafood, and the colorful street murals of
    her neighbourhood have deeply influenced her aesthetic. She identifies strongly with the island’s blend of Caribbean and Spanish heritage and often incorporates tropical motifs, folkloric symbols, and
    the island’s vibrant color palette into her artwork. Her family’s modest, working‑class background taught her resourcefulness and a respect for communal support, which she reflects in her desire to
    give back to the community through art education.
