persona_description: A Washington, D.C.-based nonprofit that provides housing and comprehensive support services to over 500 homeless and at-risk families in Washington, D.C. The organization is responsible
  for the development of Weinberg Commons, a multifamily Passive House building that underwent extensive retrofitting to meet energy efficiency standards and reduce energy costs. The building provides 36
  affordable apartment units for low-income families, including 12 homeless or formerly homeless families with below-market rents, employment services, and other support for youth and families. The organization
  is committed to providing affordable, efficient housing for low-income families in Washington, D.C.
