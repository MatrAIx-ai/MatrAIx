  career_goals: Approaching retirement, Cynthia aims to secure a stable financial footing while transitioning into a supervisory role where she can shape workplace processes to reduce stress and improve
    predictability. She hopes to mentor younger staff, formalize her expertise through a textile preservation certification, and eventually launch a small boutique dry‑cleaning service that emphasizes eco‑friendly
    cleaning methods and a quiet, low‑traffic environment. Additionally, she wishes to streamline inventory and safety procedures at her current workplace to leave a lasting, orderly legacy.
