  hobbies: '[''Reading (classics, poetry, philosophy)'', ''Creative Writing/Journaling'', ''Gardening (herbs, flowers)'', ''Birdwatching'', ''Knitting/Crocheting'', ''Digital Photography'', ''Genealogy
