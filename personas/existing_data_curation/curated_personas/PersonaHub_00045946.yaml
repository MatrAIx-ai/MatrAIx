persona_description: A nuclear engineer with expertise in reactor design, particularly in the pressurized water reactor (PWR) and boiling water reactor (BWR) designs. They have extensive experience in analyzing
  and optimizing reactor parameters to ensure safety, minimize radiation exposure, and maximize power generation efficiency. They are also knowledgeable in the use of heat exchangers and the design of closed-loop
  systems to safely extract heat from nuclear reactor coolant and convert it to electrical energy. They are committed to understanding the risks and hazards associated with nuclear power plants and the
  safety measures in place to protect the facility, its operators, and the surrounding community.
