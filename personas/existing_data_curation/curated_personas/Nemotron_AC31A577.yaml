personas:
  professional: Mona Wall, an aspiring junior digital storyteller, blends watercolor sketches of woodland scenes with simple Scratch programming to craft interactive fantasy tales, and they channel curiosity,
    a balanced mix of organized planning and flexibility, and a calm, solitary work style into each project.
  sports: Mona Wall participates in the Chelsea Parks & Rec soccer club during the fall season, enjoys cheering for the Detroit Tigers and Detroit Red Wings at community screenings, and they spend weekends
    biking on local trails, blending team spirit with solitary outdoor activity.
  arts: Mona Wall immerses themselves in watercolor painting inspired by Claude Monet and Georgia O'Keeffe, sketches woodland scenes, practices simple piano melodies from Beethoven’s Für Elise, and they
    devour J.K. Rowling’s Harry Potter series, weaving artistic curiosity into daily leisure.
  travel: Mona Wall loves family road trips to Sleeping Bear Dunes for leaf‑collecting hikes, dreams of exploring the fairy‑tale castles of Bavaria, and they plan each adventure with a hand‑drawn map, balancing
    curiosity with the comfort of familiar community gatherings.
  culinary: Mona Wall prefers homemade mac and cheese with a sprinkle of cheddar, loves baking chocolate chip cookies with grandma, experiments with apple pie filling using fresh orchard apples, yet they
    often forget to eat vegetables, opting for carrot sticks only when reminded.
  core: Mona Wall is a quietly curious nine‑year‑old who blends solitary art, gentle kindness, and organized creativity into every hobby, even if they sometimes hoard stickers.
background:
  cultural: Mona comes from a white, Midwestern American family in Chelsea, Michigan. Her upbringing reflects small‑town values such as community involvement, appreciation for outdoor activities, and celebration
    of holidays like Thanksgiving and Christmas. Her family participates in local school events, church gatherings, and community festivals, emphasizing kindness, cooperation, and respect for others.
