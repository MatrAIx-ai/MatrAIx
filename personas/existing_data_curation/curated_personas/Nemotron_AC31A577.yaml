  career_goals: Mona dreams of a future where she can blend her love for art and her curiosity about the world. She is intrigued by careers such as museum curator, environmental artist, or science communicator,
    hoping to create interactive exhibits that spark imagination and encourage others to explore new ideas. She aims to develop her artistic and technological skills so she can design projects that combine
    creativity with learning, while fostering harmony and collaboration in small teams.
