persona_description: A teacher who is responsible for providing health education to elementary and junior high school students in a manner that is age-appropriate and effective in developing desirable health
  behaviors, attitudes, and knowledge. The teacher must be able to understand and manage personal and community resources to sustain overall health, and must be able to provide instruction on alcohol, tobacco,
  and other drugs, as well as other important health topics. The teacher must also be able to demonstrate knowledge in the subject area through a test, graded project, or other means prescribed by the school
  authorities.
