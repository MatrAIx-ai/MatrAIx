  career_goals: Deborah aims to re‑enter the workforce in a role that offers clear routines and predictable hours, such as a remote administrative assistant or professional organizer. She plans to obtain
    a Project Management Professional (PMP) certification within the next two years to enhance her project coordination credentials. In the longer term, she envisions launching a boutique organizing service
    that helps individuals and small businesses create systematic, stress‑reducing environments. A core ambition is to work for an organization that prioritizes mental‑health support, allowing her to manage
    her anxiety while delivering reliable, high‑quality work.
