  career_goals: Although retired, Estella remains motivated to stay active and purposeful. She aims to preserve and share her family’s culinary and quilting traditions with younger generations, planning
    to compile a small cookbook and a set of quilt patterns for her grandchildren. She wishes to expand her volunteer work at the senior center, mentoring new volunteers and leading a gardening club for
    seniors. She also hopes to learn to use video‑calling apps more confidently, ensuring she can maintain close contact with distant relatives. Maintaining her health and independence is a central ambition,
    as is fostering harmony within her community and church.
