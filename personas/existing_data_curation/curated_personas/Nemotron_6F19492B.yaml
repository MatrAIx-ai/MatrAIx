  career_goals: Catherine aspires to advance into a leadership role within her school, such as department head or instructional coach, where she can shape curriculum and mentor fellow teachers. She plans
    to earn a master's degree in Educational Leadership within the next three years, and she aims to spearhead a school‑wide initiative that integrates project‑based learning across humanities subjects
    while also establishing a structured support system for student mental‑health and stress reduction. Long‑term, she envisions moving into an administrative position, such as assistant principal, to influence
    school policy and create a more predictable, well‑organized learning environment.
