personas:
  professional: Catherine Yunis, a 37‑year‑old secondary school teacher of English literature and U.S. history, relies on a methodical, data‑driven approach to curriculum design and classroom management,
    aligns every lesson with TEKS standards, uses Google Classroom and SMART Boards to streamline instruction, and assertively pursues a department‑head or instructional‑coach role while mentoring peers
    and championing a school‑wide project‑based learning initiative.
  sports: Catherine Yunis follows the Dallas Cowboys, cheers on the Texas Longhorns women’s basketball team, participates in a community garden walking group, and maintains personal fitness through tranquil
    yoga sessions rather than high‑intensity sports.
  arts: Catherine Yunis engages in a small monthly book club where they discuss works by Toni Morrison and Kazuo Ishiguro, appreciates classical music by Leonard Bernstein, attends local theater productions
    of Shakespeare’s plays, and finds solace in the quiet contemplation of literary fiction.
  travel: Catherine Yunis favors carefully planned trips, has explored historic Boston, enjoyed the culinary scene of New Orleans, and taken weekend escapes to the Texas Hill Country’s wine vineyards, preferring
    organized tours over spontaneous backpacking.
  culinary: Catherine Yunis delights in preparing Texan comfort dishes such as chicken‑fried steak with peppered gravy, black‑bean chili seasoned with garden‑grown cilantro, and homemade pecan pie, follows
    recipes to the letter but sometimes over‑spices out of excitement, and frequently incorporates fresh vegetables from their backyard garden.
  core: Catherine Yunis channels their love for structure, meticulous planning, and quiet reflection into teaching, gardening, and precise cooking as anchors against everyday anxiety.
background:
  cultural: Catherine comes from a White, middle‑class American background rooted in the Southern suburb of Spring, Texas. Her family has lived in the Gulf Coast region for generations, blending the values
    of Southern hospitality, a strong work ethic, and a respect for community institutions such as churches and local schools. She was raised in a household that emphasized education and civic involvement;
    weekend church gatherings, community festivals, and family barbecues were regular parts of her upbringing. While her ancestry traces back to European immigrants—primarily Anglo‑American and some German
    roots—she identifies closely with the cultural norms of contemporary suburban Texas, including an appreciation for local customs, regional cuisine, and a community‑oriented lifestyle.
