  career_goals: James aims to progress to a crew foreman role within the next few years, gaining formal certifications such as the OSHA 30‑hour course and NCCER Level I to strengthen his credentials. He
    wants to be recognized for reliability and efficient project execution, which will position him to eventually launch a small subcontracting business focused on residential remodeling and modest commercial
    projects. Financially, he plans to save enough for early retirement and purchase a larger property to support extended family members. Mentoring younger workers and passing on practical skills to the
    next generation are also important long‑term goals.
