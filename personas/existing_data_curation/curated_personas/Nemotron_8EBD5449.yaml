personas:
  professional: James Jackson is a seasoned construction laborer with over twenty years of hands‑on experience in framing, concrete finishing, and demolition, who now leverages their practical problem‑solving
    skills and clear communication to coordinate crews while pursuing OSHA 30‑hour and NCCER Level I certifications to transition into a foreman role.
  sports: James Jackson follows the regional football team, the River City Hawks, watches the national basketball league, and participates in the local Lakeview Fishing Club, while occasionally joining
    a community archery league during the fall hunting season and cheering on the hometown basketball high school team on weekends.
  arts: James Jackson's artistic soul is nourished by classic soul, R&B, and gospel tunes from legends like Marvin Gaye, Aretha Franklin, and Al Green, which they play on a vintage record player while attending
    their church's gospel choir rehearsals and reading historical biographies that inspire their own DIY projects.
  travel: James Jackson prefers low‑key road trips that blend history and nature, having driven the historic Freedom Trail in Boston, explored Shenandoah National Park’s Skyline Drive, and planning a future
    weekend getaway to the Scottish Highlands, always packing a portable grill and a fishing rod for spontaneous stops.
  culinary: James Jackson delights in Southern comfort cooking, often grilling barbecued ribs, preparing collard greens seasoned with smoked ham hocks, making cornbread from scratch, and experimenting with
    fresh herbs from their garden in a peppery basil‑mint pesto that they serve over pan‑seared catfish, while occasionally indulging in a slice of pecan pie as a weekend treat.
  core: James Jackson blends a reliable, hands‑on work ethic with a quiet curiosity for new tools, balancing a disciplined savings plan and a love for solitary outdoor pursuits, all while occasionally hoarding
    extra screws and skipping dental appointments.
background:
  cultural: James grew up in a Black family in the rural South of North Carolina, where the legacy of Southern Black culture blends church-centered community life, strong family ties, and a history of perseverance.
    The local church has been a cornerstone of his social world, offering music, fellowship, and informal mentorship. Traditional soul food and seasonal celebrations, such as Juneteenth gatherings, reinforce
    a sense of identity and collective memory. Growing up during the late 20th century, James experienced both the lingering effects of segregation and a community-driven push toward self‑reliance, which
    shaped his practical work ethic and resilient outlook. His cultural background also includes an appreciation for storytelling, oral history, and the natural environment of Sampson County, all of which
    inform his values and daily choices.
attributes:
