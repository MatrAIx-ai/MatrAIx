  career_goals: Although retired, Joseph aims to stay intellectually engaged and to share his knowledge with the community. He hopes to archive and publish a small collection of oral histories of Brunswick’s
    fishing families, and to mentor younger hobbyists in boat maintenance and photography through the local senior center. He also aspires to travel to at least three coastal art festivals in the Southeast
    to broaden his exposure to folk art and new ideas. Finally, he wants to complete a personal memoir that interweaves his life story with the cultural changes he has witnessed in Glynn County.
