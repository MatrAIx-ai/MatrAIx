personas:
  professional: Lance Wicks, a veteran sheet‑metal fabricator with over two decades of hands‑on experience, combines meticulous blueprint reading, MIG/TIG welding, and CNC plasma cutting expertise with
    a practical curiosity that drives them to mentor apprentices and pioneer sustainable custom metal‑fabrication solutions as they eye a foreman role and a Certified Welding Inspector credential.
  sports: Lance Wicks, an enthusiastic member of the Palouse Valley softball league and a frequent hiker on the Palouse foothills trails, regularly fishes the Snake River, and roots for the Seattle Seahawks
    and Spokane Indians while volunteering as a water‑safety monitor at local events.
  arts: Lance Wicks, a self‑taught acoustic‑guitar player who strums folk‑rock songs by The Avett Brothers and classic country tunes by Johnny Cash, eagerly attends regional music festivals, and channels
    their newfound CAD skills into creating kinetic metal‑art pieces inspired by the craftsmanship of classic car restoration.
  travel: Lance Wicks, a road‑trip aficionado who prefers weekend getaways in a lovingly restored 1965 Chevrolet, has explored the Oregon Coast, hiked the Alpine Lakes Wilderness, and dreams of a metal‑working
    pilgrimage to the German town of Solingen while balancing family commitments and modest travel budget.
  culinary: Lance Wicks, whose palate favors hearty, smoke‑kissed meals like Texas‑style brisket, cedar‑plank salmon caught on local rivers, and home‑cooked chili seasoned with cumin and smoked paprika,
    enjoys experimenting with a DIY wood‑fired pizza oven they built from reclaimed steel.
  core: Lance Wicks, a pragmatic metal‑fabrication veteran with a DIY‑driven curiosity and a sociable spirit, channels their intense anxiety into meticulous work and community involvement, while occasionally
    overcommitting to projects and neglecting personal downtime.
background:
  cultural: Lance grew up in a white, working‑class family in the Inland Northwest, where agriculture, manufacturing, and a tight‑knit community shaped his values. The region’s practical, self‑reliant culture
    emphasizes hard work, teamwork, and respect for the land. These influences are evident in his straightforward work ethic, loyalty to family, active participation in community and church activities,
    and his blend of curiosity and practicality in both his career and hobbies.
attributes:
  skills: '[''Blueprint reading and layout'', ''MIG/TIG welding'', ''CNC plasma cutting operation'', ''HVAC duct fabrication and installation'', ''Metal roofing and siding installation'', ''Custom metal
    fabrication'', ''Safety compliance and OSHA training'', ''Mentoring and training apprentices'', ''Basic AutoCAD design'', ''Troubleshooting and repair of metal systems'']'
  hobbies: '[''Community softball league'', ''Hiking and fishing in the Palouse region'', ''Playing acoustic guitar and singing'', ''DIY woodworking and home improvement projects'', ''Restoring classic
    cars'', ''Volunteering at local church and community events'', ''Attending live music and local festivals'', ''Exploring CAD software for personal metal projects'']'
  career_goals: Lance aims to move into a supervisory role as a foreman or lead fabricator, earn a Certified Welding Inspector credential, and eventually launch a modest custom metal‑fabrication shop that
    blends practical construction with creative, sustainable designs. He also hopes to share his knowledge by teaching part‑time at the local community college or trade school, while securing a stable income
    that eases his anxiety about family finances and job security.
