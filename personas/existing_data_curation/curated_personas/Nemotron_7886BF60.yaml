personas:
  professional: Thuy Vu, a meticulous 4‑year‑old preschooler who dreams of becoming an architect, arranges colored blocks into orderly cityscapes, labels each structure with tiny stickers, and they eagerly
    take on the role of class project manager during group activities, showcasing an early blend of structure, practicality, and outgoing teamwork.
  sports: Thuy Vu delights in the playground’s monkey bars, participates in a weekly preschool soccer class, and they proudly sport a tiny River City Rovers jersey while cheering during televised matches,
    illustrating an energetic blend of group play and budding fandom.
  arts: Thuy Vu loves drawing bright dinosaurs after watching “Blue’s Clues,” and they eagerly sing along to The Wiggles and sway to Taylor Swift’s “Shake It Off” whenever it plays, highlighting a joyful
    mix of visual art and music that fuels their creative spirit.
  travel: Thuy Vu prefers well‑planned family outings over spontaneous trips, and they eagerly anticipate weekend visits to the nearby zoo and annual vacations to Disneyland, where the predictable schedule
    of rides and character meet‑and‑greets satisfies their love of structure while feeding their curiosity about new places.
  culinary: Thuy Vu enjoys simple comfort foods like cheese pizza with a thin crust and carrot sticks dipped in hummus, can proudly assemble a peanut‑butter and banana sandwich unaided, yet they often beg
    for extra chocolate chip cookies, blending budding independence with a sweet‑tooth habit.
  core: Thuy Vu is a tiny, organized whirlwind who schedules playtime to the minute, worries about missing a crayon, and refuses to share their favorite dinosaur sticker, showcasing a unique mix of structure,
    social energy, and quirky defensiveness.
background:
  cultural: Thúy is the daughter of Vietnamese immigrants who settled in Boiling Springs, South Carolina. At home, Vietnamese language, cuisine, and traditions—such as celebrating Tet with family gatherings
    and special foods like bánh chưng—are integral to her upbringing. She attends a local preschool where English dominates, but her parents reinforce bilingualism through nightly storytime in Vietnamese
    and weekend visits to a community Vietnamese cultural group. The family blends Southern hospitality with Vietnamese values of respect for elders, emphasis on education, and close‑knit family bonds.
    This bicultural environment nurtures Thúy's appreciation for both the structured, community‑oriented aspects of her heritage and the lively, outgoing social life typical of her town.
