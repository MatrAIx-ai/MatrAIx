  career_goals: Even at four, Thúy imagines a future where she helps others and keeps things orderly. She often talks about wanting to become a teacher who can organize fun lessons for children, or a nurse
    who can care for families. She also dreams of assisting her parents in the kitchen, learning to make Vietnamese dishes, and one day opening a small community garden where she can share fresh produce
    and teach kids about planting. Her ambitions are shaped by her love of structure, her desire to be useful, and the encouragement she receives from her family to value education and service.
