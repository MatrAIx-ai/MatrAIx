  career_goals: Salameh’s primary ambition now is to channel his experience into community‑focused contributions. He plans to volunteer as a mentor at the Duluth Senior Center, offering one‑on‑one guidance
    on digital literacy and budgeting. He hopes to record and preserve oral histories from longtime residents, partnering with the local historical society. He also aims to maintain his physical well‑being
    through gentle outdoor activities and to continue informal learning through short courses offered by the community college. Ultimately, he seeks to leave a modest but lasting imprint on his neighborhood
    while enjoying a quiet, purposeful retirement.
