  hobbies: '[''Chess'', ''Senior dance classes'', ''Jazz concerts'', ''Book club'', ''Gardening'', ''Cooking soul food'', ''Volunteer guiding at museum'', ''Walking tours of historic neighborhoods'', ''Knitting'',
