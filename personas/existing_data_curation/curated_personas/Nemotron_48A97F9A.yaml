personas:
  professional: An analytically gifted retiree, Renuka Simms leverages their STEM background and meticulous project‑management skills to orchestrate volunteer STEM outreach, write grant proposals, and lead
    community workshops with a disciplined, data‑driven approach.
  sports: A lively participant in Chicago’s senior dance class and a dedicated member of the city’s walking club, Renuka Simms also follows the Chicago Cubs, Chicago Bears, and Chicago Blackhawks, and they
    use game nights as social gatherings after their weekly ballroom steps.
  arts: A devoted aficionado of jazz and blues, Renuka Simms regularly attends performances by Ella Fitzgerald tribute bands and B.B. King tributes, immerses themselves in a book club dissecting works by
    authors such as Toni Morrison and James Baldwin, and they occasionally step onto the community theater stage in productions like 'Our Town'.
  travel: An organized explorer, Renuka Simms prefers guided tours of historic Chicago neighborhoods like Bronzeville and Hyde Park, enjoys weekend trips to civil‑rights landmarks such as Selma and Washington,
    D.C., and they plan vacations around museum exhibitions, always packing a detailed itinerary and a spare pair of walking shoes.
  culinary: A seasoned home chef, Renuka Simms cultivates fresh herbs on a balcony garden to flavor comfort staples like collard greens, black‑eye pea stew, and peach cobbler, yet they famously forget to
    set the timer, leading to occasional burnt edges on their signature fried chicken.
  core: Renuka Simms blends disciplined spreadsheets with spontaneous jazz nights, competitively conquers chess tournaments while forgetting where they left their knitting needles, and they never miss a
    Sunday dance class despite a mischievous habit of over‑booking their calendar.
background:
  cultural: Renuka is an African‑American woman who grew up on Chicago’s South Side during the post‑World‑War II era, a time shaped by the Great Migration and the civil‑rights movement. Her family’s deep
    ties to the Black church provided a foundation of community service, resilience, and spiritual support. She was raised on the traditions of soul food, gospel, jazz, and blues, and she carries forward
    the cultural emphasis on storytelling, education, and collective uplift. The neighborhood’s strong sense of solidarity, along with experiences of both segregation and activism, informed her critical,
    skeptical outlook and competitive drive. Today, she honors her heritage by mentoring young Black students, preserving local history, and celebrating Black cultural arts in her everyday life.
