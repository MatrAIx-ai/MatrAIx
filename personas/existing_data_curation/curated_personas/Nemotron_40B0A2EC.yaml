    ''Creative problem solving & design innovation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting of buildings'', ''Architectural photography'', ''Hiking and nature walks'', ''Reading design, philosophy, and fiction
    books'', ''Volunteering with Habitat for Humanity'', ''Cooking and experimenting with world cuisines'', ''Traveling to historic architectural sites'', ''Playing strategy board games'', ''Attending live
    music concerts'']'
  career_goals: Berrick aims to advance to a senior executive role such as Director of Architecture or Vice President of Engineering within the next five years, leading regional operations that prioritize
    sustainable, community‑focused design. He plans to earn his LEED Accredited Professional credential and complete a graduate certificate in advanced construction management to deepen his technical expertise.
    Long‑term, he envisions founding a boutique consultancy that blends artistic excellence with environmentally responsible practices, offering mentorship programs for emerging architects and engineers.
    He also hopes to serve on local design review boards, speak at industry conferences, and champion policies that raise the bar for green building standards in the Midwest.
