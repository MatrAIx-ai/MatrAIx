personas:
  professional: Berrick Thomas, a 31‑year‑old project manager turned architectural lead, blends meticulous BIM and CAD expertise with a compassionate, humanities‑infused outlook, steering interdisciplinary
    teams to deliver sustainable, community‑focused designs while they mediate client‑contractor tensions with a calm, collaborative tone.
  sports: Berrick Thomas, 31, hikes the trails of Cuyahoga Valley State Park on weekends, runs with the local Cuyahoga Valley Trail Runners club during spring, and passionately supports the Cleveland Browns
    and Guardians, tuning in to each game as a ritual that mixes light exercise with team camaraderie while they also attend community watch parties at the stadium.
  arts: Berrick Thomas, 31, spends evenings sketching historic facades inspired by the works of Zaha Hadid and Ansel Adams, attends live shows by The Black Keys and the Cleveland Orchestra, and curates
    a personal collection of contemporary photography books featuring artists like Andreas Gursky, while they also share their favorite prints with friends during board‑game nights.
  travel: Berrick Thomas, 31, plans travel around immersive architectural pilgrimages, having already explored the medieval streets of Bruges, the Renaissance palazzos of Florence, and the historic castles
    of the Czech Republic, while they also keep a detailed sketchbook of each site and dream of a future trek through the ancient ruins of Petra during the off‑season to avoid crowds.
  culinary: Berrick Thomas, 31, experiments in the kitchen with international flavors, mastering a perfectly seasoned paella con mariscos using saffron and bomba rice, a fragrant Thai green curry with lemongrass
    and galangal, and an Ethiopian injera spiced with berbere, yet often leaves a mess of scattered spices that they later have to clean up nightly.
  core: Berrick Thomas, 31, is a detail‑driven architecture manager who channels curiosity into sustainable design, splurges on camera gear, battles back pain with yoga, and can’t resist a late‑night board‑game
    marathon while they also procrastinate on finalizing budget spreadsheets despite a lingering habit.
background:
  cultural: Berrick was raised in a suburban community near Cleveland, Ohio, in a family with German and Irish ancestry. The Midwest upbringing instilled values of hard work, modesty, and community involvement,
    while his parents encouraged curiosity and appreciation for the arts. Exposure to the region’s industrial heritage and iconic mid‑century modern architecture sparked his early fascination with built
    environments. His humanities education broadened his cultural perspective, fostering an interest in global art, literature, and philosophy. Living in Aurora, Summit County, he experiences a blend of
    traditional Midwestern lifestyle and emerging cultural influences, which shape his worldview and inform his commitment to designing spaces that reflect both local identity and broader artistic dialogues.
attributes:
  skills: '[''Project management & scheduling'', ''Building Information Modeling (BIM) and CAD'', ''Sustainable design & LEED certification'', ''Team leadership & mentorship'', ''Client communication &
