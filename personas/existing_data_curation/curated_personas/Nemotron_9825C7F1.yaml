  hobbies: '[''Generative Digital Art'', ''Algorithmic Music Production'', ''Science‑Fiction & Philosophy Reading'', ''Mindfulness Meditation'', ''Reflective Journaling'', ''Solo Running (Hudson River Waterfront)'',
    ''Chess'', ''Tabletop Role‑Playing Games'', ''Coding Mentorship for Black Youth'', ''Urban Photography of Jersey City'']'
  career_goals: Fabion aims to transition from a hands‑on analyst role to a strategic leadership position within the next five years, targeting roles such as Senior Security Architect and eventually Chief
    Information Security Officer. He aspires to spearhead the integration of machine‑learning analytics into enterprise security operations, building proprietary detection engines that anticipate novel
    threats. Additionally, Fabion is committed to advancing diversity in cybersecurity; he plans to launch a mentorship program for Black and under‑represented professionals in the New York metropolitan
    area and to author thought‑leadership pieces on ethical AI in security.
