personas:
  professional: Fabion Momoh is a seasoned information security analyst who blends deep expertise in network threat hunting and SIEM design with an imaginative, AI-driven approach to visualizing security
    data; they channel a competitive, detail-oriented mindset into building predictive detection engines that anticipate novel cyber threats.
  sports: Fabion Momoh logs early morning miles with the New York Road Runners, casts enthusiastic support for the New York Knicks in winter and the Yankees in summer, yet they keep fitness philosophy centered
    on solitary, meditative runs along the Hudson River, reflecting a competitive yet introspective spirit.
  arts: Fabion Momoh creates generative music and visual art inspired by Aphex Twin and Refik Anadol, while they unwind with speculative sci-fi novels by Neal Stephenson and philosophical essays by Slavoj
    Žižek, letting the convergence of code and culture define their creative evenings.
  travel: Fabion Momoh prefers meticulously planned solo trips that combine tech inspiration and natural serenity, such as weekend hikes in the Adirondacks, a week-long aurora-chasing adventure in Reykjavik,
    and a low-key exploration of Kyoto's temple districts and vintage electronics markets, and they balance a modest travel budget with a craving for novel experiences.
  culinary: Fabion Momoh cooks at a competent home-chef level, experimenting with algorithmic flavor pairings to perfect dishes like spicy Korean bibimbap with gochujang, miso-glazed salmon, and matcha-infused
    tiramisu, while they also frequent avant-garde Manhattan tasting menus featuring black garlic and fermented kimchi.
  core: Fabion Momoh is a 36-year-old security analyst who fuses code-driven art with a relentless, anxiety-tinged curiosity, obsessively tweaking AI threat models by night while they meditate on the Hudson
    River at dawn.
background:
  cultural: Fabion is a Black American whose family roots trace back to West Africa, with grandparents who emigrated from Nigeria in the 1970s. Growing up in the Newark–Jersey City corridor, he was immersed
    in the vibrant tapestry of African‑American urban culture—hip‑hop, jazz, and community activism shaped his worldview. He proudly participates in local Juneteenth celebrations and is an active member
    of the Black Tech Network of New York, where he advocates for representation in cybersecurity. His cultural identity informs his perseverance in a competitive field, his commitment to mentorship, and
    his nuanced understanding of the social dimensions of security.
attributes:
  skills: '[''Network Security'', ''Threat Hunting'', ''Incident Response'', ''SIEM Administration'', ''Python Scripting'', ''PowerShell Automation'', ''Cloud Security (AWS, Azure)'', ''Cryptography'',
