persona_description: A historian who specializes in the study of medieval architecture and its evolution in rural France, particularly focusing on the village of Balazuc. She is deeply interested in the
  lives and traditions of the village's notables, artisans, and peasants, and how they have left traces of their passage through the village's architectural features. Her research interests include the
  evolution of the village's ramparts, the evolution of its defensive structures, and the influence of the village's notables on its architecture. She is also interested in the village's role in the history
  of France, particularly in the context of the battle of Poitiers in 732.
