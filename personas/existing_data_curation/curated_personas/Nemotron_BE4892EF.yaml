personas:
  professional: A budding teen technologist and digital illustrator, Michelle Holmes blends a curiosity for Arduino robotics with a practical eye for graphic design, channeling their organized yet flexible
    mindset into collaborative school projects and a growing Instagram showcase.
  sports: An enthusiastic youth basketball player, Michelle Holmes shoots hoops at the local recreation center, supports the Minnesota Timberwolves and their high school’s Tigers, and joins a weekend hiking
    club at Minnehaha Park, balancing team competition with personal fitness.
  arts: A creative digital art aficionado, Michelle Holmes crafts vibrant illustrations inspired by anime artist Loish, graphic novels like 'Saga' and sci‑fi classics such as 'Ender’s Game,' and shares
    their work alongside playlists featuring Kendrick Lamar, Beyoncé, and Billie Eilish on Instagram.
  travel: An adventurous weekend explorer, Michelle Holmes has trekked the Great Smoky Mountains, visited the Mall of America, and dreams of wandering Tokyo’s Akihabara district, planning trips with a mix
    of family budgeting and school‑club fundraisers.
  culinary: A budding home chef, Michelle Holmes masters soul‑food staples like fried chicken, collard greens, and cornbread using family‑passed recipes while experimenting with spices like smoked paprika
    and occasionally whipping up ramen for a flavorful twist.
  core: Michelle Holmes is a pragmatic, curiosity‑driven teen who balances robotics, basketball, and digital art, yet they secretly hoard stray receipts in a shoebox as a quirky reminder of every impulse
    purchase.
background:
  cultural: Michelle is an African American teen growing up in Minneapolis, a city with a vibrant Black community and a rich history of activism and cultural expression. Her family traces its roots back
    to the Great Migration, and they maintain traditions such as soulful music, church gatherings, and storytelling at family meals. She participates in local cultural events like the Twin Cities African
    American Festival and attends a neighborhood church that emphasizes community service. The mix of Midwestern values—cold winters, outdoor recreation, and multicultural neighborhoods—shapes her outlook,
    fostering a strong sense of resilience, cooperation, and pride in her heritage while encouraging her to engage with the broader civic life of Hennepin County.
