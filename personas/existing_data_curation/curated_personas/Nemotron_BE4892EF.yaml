  career_goals: Michelle aspires to pursue a career in technology that combines her love for problem-solving with community impact. She aims to attend a STEM-focused high school, earn a scholarship for
    computer science, and eventually study software engineering or environmental technology at university. Her long-term ambition is to develop digital tools that help local neighborhoods address sustainability
    and health challenges, such as apps for tracking community garden yields or resources for youth tutoring. She also hopes to mentor younger students in coding and robotics, using her balanced curiosity
    and practical mindset to guide them toward achievable goals.
