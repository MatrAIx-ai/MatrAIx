  career_goals: Willie aims to transition into a chief architect role where he can shape the technology roadmap for a gaming‑tech startup that blends AI with real‑time player analytics. He is driven to
    lead cross‑functional teams that deliver scalable, secure solutions for casino floor operations while maintaining the flexibility to experiment with emerging tools. Additionally, he plans to launch
    a consultancy focused on helping midsize enterprises modernize legacy systems, and to expand his mentorship outreach by establishing a scholarship program for underrepresented students entering STEM
    fields.
