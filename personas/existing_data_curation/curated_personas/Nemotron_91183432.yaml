  career_goals: Manuel aims to become a partner at his firm within the next five years, leading a practice group that serves tech startups and small businesses. He aspires to integrate AI‑driven legal tech
    to increase efficiency while preserving a flexible schedule that honors his family life. He is passionate about mentoring junior associates, expanding pro‑bono services for Latino immigrant entrepreneurs,
    and eventually launching his own boutique firm that offers a balanced work environment. Long‑term, he envisions contributing to the judiciary as a part‑time magistrate to give back to his community.
