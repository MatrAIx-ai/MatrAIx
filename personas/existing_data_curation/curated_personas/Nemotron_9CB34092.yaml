personas:
  professional: Sarah Johannes, a 45‑year‑old elementary and middle‑school teacher in Rhode Island, blends deep expertise in differentiated STEAM curriculum design, interactive technology integration, and
    a relaxed yet fiercely competitive approach that fuels her pursuit of innovative, student‑centered learning environments.
  sports: Sarah Johannes loyally follows the New England Patriots and Boston Celtics, hikes weekly with a local club along the Blackstone River Valley, attends a community yoga class, and channels her competitive
    drive primarily into trivia night victories rather than organized sports leagues.
  arts: Sarah Johannes regularly visits the RISD Museum to see contemporary installations by artists like Yayoi Kusama and Mark Rothko, spends evenings painting watercolor landscapes, molds pottery at a
    community studio, and curates a growing collection of Joan Baez vinyl records that accompany her creative planning.
  travel: Sarah Johannes enjoys spontaneous road trips to coastal New England towns such as Mystic and Portland, dreams of a cultural pilgrimage to Dublin and the Scottish Highlands, balances her love of
    sea breezes with a desire to recharge away from the classroom, and plans each getaway on a modest budget while leaving room for artistic inspiration.
  culinary: Sarah Johannes, an enthusiastic home cook, favors seasonal New England dishes like clam chowder, roasted beet salad with goat cheese, and apple‑cinnamon crumble, experiments with sous‑vide salmon
    and homemade focaccia infused with rosemary, and often ends her cooking sessions with a flour‑dusted kitchen counter and a satisfied smile.
  core: Sarah Johannes is a curious, arts‑infused educator who balances a relaxed, slightly chaotic lifestyle with a competitive drive, turning every classroom, kitchen, and trivia night into a sandbox
    for creative experimentation.
background:
  cultural: Sarah grew up in a middle-class, white family of mixed Anglo-Irish ancestry in suburban Providence County. Her upbringing was shaped by the New England values of self-reliance, a strong emphasis
    on education, and a modest, community-oriented lifestyle. Attending public schools in Rhode Island exposed her to the region's cultural tapestry, including a notable Irish Catholic heritage and the
    progressive artistic milieu of nearby Providence. Though she identifies culturally as a typical New Englander, she remains appreciative of the area's historic maritime roots and the diverse immigrant
    communities that enrich the local schools, which informs her inclusive teaching philosophy.
attributes:
  skills: '[''Differentiated instruction'',''Project-based learning'',''STEAM curriculum integration'',''Educational technology (Google Classroom, interactive whiteboards)'',''Classroom management'',''Formative
    assessment'',''Art-infused lesson planning'',''Critical thinking facilitation'',''Mentoring and teacher coaching'',''Parent communication'',''After-school program development'']'
  hobbies: '[''Visiting art museums and galleries'',''Landscape photography'',''Hiking'',''Trivia nights'',''Watercolor painting'',''Pottery'',''Experimental cooking'',''Reading non-fiction (cognitive science,
    avant-garde literature)'',''Yoga'',''Mentoring teachers'',''Coordinating arts after-school workshops'']'
  career_goals: Sarah aims to transition into a leadership role within her district, such as a curriculum specialist or instructional coach, where she can champion STEAM-oriented, flexible learning models
    across elementary and middle schools. She aspires to obtain a doctoral degree in curriculum and instruction to deepen her expertise and eventually publish a guide on integrating arts into standard curricula.
    Securing a grant to launch a district-wide after-school art and inquiry program is a concrete short-term goal. In the longer term, she envisions becoming a recognized thought leader in progressive education,
    delivering workshops at state conferences and consulting with schools to implement student-centered, competency-based frameworks.
