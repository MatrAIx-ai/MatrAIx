  career_goals: Approaching retirement, Kevin aims to transition to a part‑time consulting role where he can share his extensive knowledge with younger carpenters while maintaining a predictable schedule
    that minimizes stress. He hopes to secure a small steady flow of renovation projects that allow him to work within familiar routines, and he plans to formalize his mentorship by obtaining a state‑approved
    journeyman certification. Ultimately, he wants to leave a legacy of high‑quality workmanship and a well‑organized workshop that his grandchildren can inherit.
