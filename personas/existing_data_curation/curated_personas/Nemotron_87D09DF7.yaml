personas:
  professional: Kevin Perry, a veteran residential carpenter with 30+ years of experience, is known for meticulous framing, custom cabinetry, and a methodical mentorship style that blends precise blueprint
    reading with a no‑nonsense work ethic, ensuring each project follows a reliable routine and high‑quality standards, and they take great pride in passing on their exacting standards to apprentices.
  sports: Kevin Perry enjoys low‑impact fitness through weekend fishing at Clinton Lake and occasional walks, supports the Kansas City Chiefs and Royals, and participates in a local senior bowling league,
    preferring familiar, small‑group activities over high‑intensity sports, and they often use the fishing trips as a meditative escape from daily worries.
  arts: Kevin Perry finds creative solace in restoring vintage wooden toys and listening to classic folk singers like Woody Guthrie and Johnny Cash, while occasionally attending local church choir performances
    and reading historical non‑fiction that fuels a nostalgic appreciation for Americana, and they cherish these artistic pursuits as a bridge between their hands‑on work and personal reflection.
  travel: Kevin Perry prefers well‑planned, low‑stress trips that celebrate early American history, such as weekend visits to Colonial Williamsburg, the Lewis and Clark Trail in Montana, and a yearly family
    getaway to the Ozark cabin they built themselves, always booking accommodations months in advance to avoid uncertainty, and they relish the predictable itineraries that let them focus on the historical
    narrative rather than logistics.
  culinary: Kevin Perry enjoys simple, home‑cooked meals featuring garden vegetables like heirloom tomatoes and sweet corn, their signature dish is a rosemary‑infused roast chicken with mashed potatoes,
    and they take pride in baking fresh cornbread and apple pie using ingredients from their own backyard, often sharing leftovers with neighbors as a modest gesture of community.
  core: Kevin Perry, a methodical carpenter on the cusp of retirement, balances a love for quiet hands‑on projects with a lingering worry about future health and finances, often over‑planning but occasionally
    succumbing to late‑night TV binges and forgetting to water their garden, and they tend to over‑analyze every decision, even the trivial ones.
background:
  cultural: Kevin is a lifelong resident of the Kansas Midwest, raised in a white, Protestant (Methodist) family that valued hard work, self‑reliance, and community service. The regional culture of Lawrence
    and Douglas County emphasizes modesty, practicality, and close family ties, all of which shaped his traditional outlook and preference for routine. His upbringing in a small‑town environment fostered
    a respect for practical skills and an appreciation for the stability offered by a steady trade like carpentry.
