    buddy'']'
  career_goals: Although retired, Kathleen aims to keep contributing to her community by mentoring younger volunteers at the senior center and teaching basic gardening techniques to neighborhood youth.
    She plans to finish a short certification in senior wellness to support peers with health management. A personal ambition is to compile a family heritage scrapbook—including recipes, stories, and photographs—and
    share it online for future generations. She also wishes to continue learning new digital skills to stay connected with her grandchildren and to document local wildlife through photography.
