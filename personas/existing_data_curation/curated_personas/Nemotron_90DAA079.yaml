personas:
  professional: Tiara Allen, a seasoned production worker at a Maryland manufacturing plant, leverages their CNC operation expertise, lean‑manufacturing acumen and strong team communication to keep shifts
    running smoothly, while also injecting a creative flair into process visual aids and safety signage that reflects their curious, open‑minded approach and paves the way for a future shift‑lead role,
    and they consistently seek out new efficiencies.
  sports: Tiara Allen enjoys weekend rides with the Hagerstown Cycling Club, and they also cheer on the Washington Nationals and Baltimore Ravens, while playing on a local co‑ed softball league, balancing
    light cardio with occasional pilates classes at the community center.
  arts: Tiara Allen engages deeply with visual and performing arts, starring in community theater productions, admiring Georgia O’Keeffe’s paintings, listening to Nina Simone’s soulful jazz, and they curate
    illustrated genealogy displays for their church choir.
  travel: Tiara Allen favors short, budget‑friendly trips to historic towns like Charleston and the Shenandoah Valley, while dreaming of a heritage pilgrimage to Ghana and a cultural immersion in Edinburgh,
    and they plan each itinerary with a blend of online research and recommendations from fellow art‑enthusiasts.
  culinary: Tiara Allen, an avid home cook, blends soul‑food staples such as collard greens, smoked turkey, and sweet‑potato casserole with fresh herbs from their garden—including rosemary, basil, and thyme—while
    they experiment with spice rubs to perfect their signature jambalaya.
  core: Tiara Allen is a curious, organized production specialist who channels their artistic flair into community workshops, balances disciplined budgeting with occasional creative splurges, and they navigate
    life with a gentle blend of reliability and open‑mindedness.
background:
  cultural: Tiara grew up in a close‑knit African‑American family in western Maryland, where church, storytelling, and music were central to daily life. Her grandparents were part of the Great Migration,
    moving to Maryland for factory work, and they passed down values of resilience, community support, and a deep appreciation for creativity—ranging from quilting to gospel singing. In Hagerstown she remains
    active in the local African‑American cultural center and participates in the Maryland African American Heritage Festival, experiences that reinforce her connection to her heritage and inspire her commitment
    to harmony, artistic expression, and community service.
attributes:
  skills: '["CNC machine operation","Assembly line equipment handling","Quality inspection","Lean manufacturing (5S, Kaizen)","OSHA safety compliance","Team communication","Preventive equipment maintenance","Inventory
