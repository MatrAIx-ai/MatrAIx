  hobbies: '["Acrylic painting","Quilting","Community theater","Visiting art museums","Photography","Garden herb growing","Cooking traditional soul food","Reading African American literature","Volunteer
    art workshops for youth","Genealogy research","Church choir singing"]'
  career_goals: Tiara aims to advance from her current production worker role to a supervisory position, such as shift lead or training coordinator, where she can mentor new employees and champion safety
    and process improvements. She plans to complete a certification in CNC programming and lean‑manufacturing through a local community college to bolster her technical credentials. In the longer term,
    she dreams of launching a small home‑based business that blends her love of art and craftsmanship—selling custom‑painted home décor and quilts—while remaining an active contributor to Hagerstown’s local
    arts scene.
