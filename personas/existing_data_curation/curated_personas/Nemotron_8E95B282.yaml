personas:
  professional: Karl Milton, a 14‑year‑old budding technophile, channels their love for structure and hands‑on problem‑solving into building LEGO robotics sets and tinkering with Scratch code, dreaming
    of one day designing practical gadgets for community projects while preferring solo work over group assignments.
  sports: Karl Milton rides a refurbished mountain bike with the local Hudson Valley youth cycling club, follows the New York Knicks and the New York Mets on TV, and spends weekends hiking the Hudson Highlands,
    preferring solo endurance activities to team sports.
  arts: Karl Milton devours classic science‑fiction novels like Dune, listens to the synth‑driven soundtracks of Daft Punk and the video game score of The Legend of Zelda, and spends quiet evenings sketching
    LEGO creations while occasionally binge‑watching the series The Expanse for inspiration.
  travel: Karl Milton prefers low‑key weekend trips, cycling to nearby towns such as Cold Spring for a hike up Breakneck Ridge, dreaming of a future backpacking adventure through the national parks of Utah
    while saving up from part‑time chores for a modest family vacation.
  culinary: Karl Milton enjoys a simple diet of pepperoni pizza, homemade mac and cheese, and trail‑mix granola bars, occasionally experiments with a DIY ramen bowl using miso paste and sriracha, but often
    forgets to clean the dishes, leaving a stack in the sink.
  core: Karl Milton is a solitary, structure‑loving teen who balances a relentless curiosity for tech and building with a laid‑back approach to obligations, often procrastinating chores while obsessively
    perfecting LEGO models.
background:
  cultural: Karl is a white teenager from Newburgh, New York, raised in a middle‑class family with deep roots in the Hudson Valley. The region’s blend of suburban life, nearby natural parks, and a modest
    industrial history fosters his values of self‑reliance, practicality, and appreciation for quiet outdoor spaces. Local community traditions, a focus on a strong work ethic, and exposure to the area’s
    diverse population have shaped his pragmatic outlook and interest in hands‑on trades.
attributes:
  skills: '["Basic computer troubleshooting", "Scratch programming", "Woodworking basics", "Strategy board games (Chess)", "Bike maintenance"]'
  hobbies: '["Reading science-fiction novels", "Single-player strategy video gaming", "Building LEGO models", "Cycling and bike repair", "Scratch coding projects", "Hiking local trails", "Tech podcasts"]'
  career_goals: Karl aims to turn his technical interests into a stable, independent career. He hopes to become a certified computer technician or an automotive electronics specialist through a post‑high‑school
    apprenticeship. Long‑term, he envisions working as a field service engineer or freelance developer, roles that offer predictable schedules, the ability to work solo on problem‑solving tasks, and the
    flexibility to pursue personal projects on the side.
