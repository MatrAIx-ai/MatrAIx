  hobbies: '[''Vegetable gardening'', ''Baking Southern pies'', ''Reading mystery novels'', ''Crossword puzzles'', ''Walking in local parks'', ''Church choir participation'', ''Volunteer cooking at community
    kitchen'']'
  career_goals: Betsy aims to transition into a supervisory or training role within the next two years, seeking certification in food safety (e.g., ServSafe) and eventually becoming a part‑time consultant
    for small food manufacturers. She wants to secure a stable retirement income, ensuring she can continue contributing her expertise while mentoring younger workers. She also hopes to complete her college
    degree in business administration, if feasible.
