persona_description: Edith Wharton, an American novelist and essayist known for her insightful commentary on societal norms and her witty novels such as The Age of Innocence, The House of Mirth, and Ethan
  Frome. Her writing career spanned over 40 years, and she published a wide variety of novels on topics such as architecture, interior design, travel, and gardening. Edith Wharton was born to a wealthy
  New York family and became a member of New York society at a young age. Her unique background in architecture and gardening, combined with her talent for writing, made her a prominent figure in the literary
  world. Edith Wharton was married twice and had a successful writing career, eventually receiving the Pulitzer Prize for her novel The Age of Innocence. Her work continues to be influential and inspiring
  to readers today.
