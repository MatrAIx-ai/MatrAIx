  career_goals: Herman aims to transition from a front‑desk role to a supervisory position such as Office Manager or Community Outreach Coordinator within a cultural institution or university setting. He
    hopes to leverage his organizational talent and artistic curiosity to lead public‑facing programs, manage information resources, and develop partnerships between local arts groups and civic agencies.
    Ultimately, he envisions a role that blends administrative leadership with cultural programming, allowing him to contribute to the enrichment of Laramie's community life.
