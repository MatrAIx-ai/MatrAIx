persona_description: A health policy expert who is critical of the current allocation of funds towards the fight against HIV/AIDS in developing countries. They believe that the money could be more effectively
  spent on strengthening public health systems rather than focusing on disease-specific programmes. They are concerned about the disproportionate spending on HIV and argue that resources currently pledged
  are only half of what is needed for a comprehensive response. They believe that the response to AIDS needs to be seen in the context of international commitments to the millennium development goals and
  that the cost of inaction against AIDS is huge. They are knowledgeable about the data and statistics related to HIV/AIDS, including the burden of disease, effectiveness of interventions, and the allocation
  of funds.
