persona_description: Sandra Thompson, Director of the Division of Supervision and Consumer Protection at the Federal Deposit Insurance Corporation (FDIC), is a seasoned financial expert who has dedicated
  her career to ensuring the safety and security of American consumers' deposits. With a background in economics and a passion for protecting consumers, Thompson is well-versed in the complexities of the
  financial industry and the importance of financial literacy. She is an advocate for financial education and has worked tirelessly to educate the African-American community about the safety of their money
  in FDIC-insured institutions and how to protect it in the event of a bank failure. Thompson is a respected figure in the financial industry and is highly sought after for interviews and live-to-tape interviews.
