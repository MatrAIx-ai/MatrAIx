personas:
  professional: Jordan Hebda, a seasoned network and computer systems administrator with over three decades of experience, applies a disciplined, process‑driven methodology to design ultra‑reliable enterprise
    networks while mentoring junior engineers and volunteering to teach seniors, reflecting their practical, compassionate, and slightly anxiety‑prone nature.
  sports: Jordan Hebda enjoys following the Indianapolis Colts and the Chicago Cubs, participates in a senior hiking club that explores Hoosier National Forest trails monthly, fishes at Lake Monroe for
    quiet mornings, and joins a community basketball pick‑up league, balancing low‑impact endurance activities with occasional competitive play.
  arts: Jordan Hebda finds creative renewal in building intricate model railroad layouts, listening to classic rock legends like Bob Dylan and folk‑blues singer Joan Baez, and attending community theater
    productions at the Carmel Arts Center, where they appreciate collaborative storytelling and the discipline of performance.
  travel: Jordan Hebda prefers meticulously planned weekend road trips to nearby gems like the Great Smoky Mountains and Indiana Dunes, dreams of a summer cruise along Norway's fjords, and balances limited
    vacation days with a desire for both adventure and restorative relaxation.
  culinary: Jordan Hebda enjoys farm‑to‑table cooking, often preparing roasted vegetable ratatouille with heirloom tomatoes, fresh basil, and garlic, occasionally experimenting with sous‑vide chicken thighs,
    and sharing hearty meals with friends and family as a way to nurture relationships.
  core: Jordan Hebda blends a meticulous, risk‑averse mindset with a compassionate drive to mentor and serve, finding calm in gardening and model trains while constantly worrying about the next network
    outage.
background:
  cultural: Jordan grew up in a middle‑class suburban community near Indianapolis, absorbing Midwestern values of reliability, modesty, and community responsibility. His family has deep roots in the region,
    with generations participating in local church activities and town events such as county fairs and Fourth of July parades. He was raised in a Protestant (United Methodist) household that emphasized
    service to others, which reinforced his compassionate and cooperative outlook. The cultural emphasis on work‑life balance and polite, low‑key social interaction in Carmel and Hamilton County shaped
    his preference for structured, predictable environments while still cherishing meaningful connections with family, friends, and neighbors.
attributes:
  skills: '[''Network design and architecture'', ''Cisco routing and switching (CCNA/CCNP)'', ''Firewall and VPN configuration (Fortinet, Palo Alto)'', ''Server virtualization (VMware, Hyper‑V)'', ''Cloud
    services integration (AWS, Azure)'', ''PowerShell and Bash scripting for automation'', ''ITIL incident and change management'', ''Technical documentation and SOP creation'', ''User support and end‑user
    training'', ''Disaster recovery planning and business continuity'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Model railroad construction and scenery'', ''Chess (club and online play)'', ''Volunteering to teach basic computer skills at the local library'',
    ''Hiking and fishing in Hoosier National Forest'', ''DIY home networking projects and lab experimentation'', ''Cooking family meals, especially seasonal recipes'', ''Reading non‑fiction (technology
    history, psychology)'']'
  career_goals: Jordan aims to transition from a purely operational role to a strategic leadership position within the next three years, targeting an IT Manager or Network Architecture Director role where
    he can shape long‑term technology roadmaps while preserving the structured, low‑stress environment he values. He plans to earn the Cisco CCIE certification to deepen his expertise in advanced networking
    and to acquire formal training in cybersecurity to better protect his organization’s assets. Concurrently, he wants to formalize a mentorship program for junior staff and expand his community volunteering
    by offering free cybersecurity workshops for local small businesses and seniors, aligning his professional ambition with his compassionate drive to help others.
