personas:
  professional: Jacob Teague, a budding citizen scientist, merges his curiosity for ecosystems with methodical data recording, using his nature journal as a lab notebook and applying his logical chess strategy
    to design mini‑experiments, all while reliably following up on projects with the same disciplined planning that his teachers admire.
  sports: Jacob Teague, a quiet enthusiast of outdoor fitness, participates in a local youth cross‑country running club that lets him trek through the wetlands he loves, follows the Minnesota Twins baseball
    team for occasional weekend games, and waters the family’s dock by fishing, treating it as his personal low‑key sport.
  arts: Jacob Teague, a solitary creative, captures sunset reflections over the lake with his entry‑level DSLR, studies Ansel Adams’s black‑and‑white landscapes for composition tips, sketches flora in his
    journal inspired by the botanical illustrations of Maria Sibylla Merian, and enjoys listening to instrumental folk composer Ólafur Arnalds while building LEGO Technic models.
  travel: Jacob Teague, an organized explorer, prefers planning modest weekend trips to nearby state parks like Itasca for canoeing and birdwatching, dreams of a future family vacation to the Everglades
    to study mangroves, and, when budget permits, looks forward to a school‑arranged field trip to the Smithsonian National Museum of Natural History in Washington, D.C.
  culinary: Jacob Teague, an emerging cook, relishes grilling fresh trout caught with his dad, seasoning it with lemon, dill, and a hint of smoked paprika, and often pairs it with homemade wild‑berry jam
    on toast, while also enjoying quick meals like peanut butter‑banana sandwiches and occasionally treats themselves to a sugary cereal after a long LEGO build.
  core: Jacob Teague blends methodical curiosity with quiet perseverance, turning weekend fishing trips into data‑driven studies, obsessively cataloguing birds, and balancing his love of LEGO and Scratch
    coding with a disciplined approach to savings and health.
background:
  cultural: Jacob was born and raised in Lake City, a small town in north‑central Florida. His family reflects typical Southern values of hospitality, respect for community, and a strong work ethic, yet
    they have always encouraged his independent pursuits. He attends a public elementary/middle school where the curriculum emphasizes core subjects and provides extracurricular clubs such as robotics and
    environmental stewardship. The surrounding natural environment—pine forests, lakes, and wetlands—has shaped his appreciation for outdoor activities and conservation. Family gatherings often feature
    shared meals, church attendance on Sundays, and seasonal fishing trips, fostering a sense of belonging while allowing Jacob to retreat to quiet spaces for reading and personal projects.
attributes:
  skills: '[''Organizational planning (using a personal planner)'', ''Basic Scratch programming'', ''Scientific research skills (school experiments)'', ''Mechanical model building (LEGO Technic)'', ''Puzzle
    solving (jigsaw, logic puzzles)'', ''Reading comprehension (science literature)'', ''Collaborative assistance (quiet group work)'', ''Attention to detail'']'
  hobbies: '[''Bird‑watching in local wetlands'', ''Fishing at Lake City lakes'', ''Keeping a nature journal'', ''Reading popular‑science books'', ''Building LEGO Technic models'', ''Programming Scratch
    games'', ''Playing chess'', ''Photography of local landscapes'', ''Participating in school science fairs'']'
  career_goals: Jacob hopes to pursue a career that combines his love of nature, methodical thinking, and technology. He dreams of becoming an environmental scientist or data analyst who studies freshwater
    ecosystems in Florida, using computer models to protect local lakes. He aims to attend a STEM‑focused high school, earn a scholarship for a summer research program, and eventually work for an organization
    like NOAA or a university research lab. His ambition includes contributing practical solutions that benefit his Lake City community while allowing him to work in focused, low‑distraction environments.
