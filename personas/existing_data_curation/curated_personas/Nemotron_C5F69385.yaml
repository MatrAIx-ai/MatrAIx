  career_goals: Gregory dreams of becoming a firefighter one day because he admires the uniform, the clear routine of shifts, and the way firefighters keep the community safe. He also likes the idea of
    helping others as a police officer or a teacher, but his top ambition is to protect and serve his neighborhood, reflecting his caring nature and desire for harmony.
