personas:
  professional: Brooke Mccutcheon, a retired senior center volunteer coordinator, blends their lifelong garden-planning expertise and meticulous budgeting skills with a curiosity for new community outreach
    tools, guiding younger volunteers while keeping the center’s schedule and resources running like a well-tended garden.
  sports: Brooke Mccutcheon enjoys daily sunrise walks in the Ocala Preserve, participates in the senior center’s bridge club, cheers on the Orlando Magic during basketball season, and follows the Florida
    Gators football team with nostalgic enthusiasm, all while they maintain a gentle fitness routine suited to their ninety-one-year-old frame.
  arts: Brooke Mccutcheon spends afternoons knitting cashmere scarves inspired by Agnes Blackadder patterns, quilts floral motifs while listening to Debussy’s piano works, devours historical novels by Ken
    Follett and memoirs by Maya Angelou, and they often quote lines from classic films starring Cary Grant, weaving artistic appreciation into their daily life.
  travel: Brooke Mccutcheon favors low-key road trips to historic towns such as Savannah, GA, and Charleston, SC, enjoys annual cruises to the Gulf Coast of Alabama, dreams of a leisurely visit to St. Augustine’s
    Spanish-era landmarks, and they plan each journey around senior center volunteer duties and their grandchildren’s school holidays.
  culinary: Brooke Mccutcheon delights in turning garden-fresh oranges into tangy marmalade and crafting rose-petal jam for quilting friends, cooks low-sodium chicken pot pie for family gatherings, experiments
    with spiced pecan pralines, and they sometimes indulge in store-bought banana bread when time is short.
  core: Brooke Mccutcheon is a ninety-one-year-old garden-loving, quilting mentor whose balanced curiosity and practicality guide their community service, memoir writing, and modest indulgences.
background:
  cultural: Brooke comes from a white, Midwestern‑American background, having spent her early years in a small farming community before relocating to Ocana, Florida in the 1960s. Her cultural identity is
    shaped by Southern hospitality, a strong sense of family rooted in church traditions, and an appreciation for the natural landscape of Central Florida. These influences are evident in her love for gardening,
    community volunteerism, and the preservation of family and regional history. While she honors longstanding traditions, her curiosity drives her to gently incorporate new ideas—such as modern gardening
    techniques and digital storytelling—into her cultural practices.
