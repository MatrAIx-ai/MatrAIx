  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Reading historical fiction and memoirs'', ''Bridge'', ''Church attendance and fellowship'', ''Birdwatching'', ''Photography'', ''Genealogy research'']'
  career_goals: Although retired, Brooke aims to continue contributing to her community and family legacy. She plans to complete a memoir that intertwines her personal story with the local history of Ocala,
    preserving memories for future generations. Brooke also aspires to mentor younger volunteers at the senior center, sharing her organizational know‑how and nurturing their curiosity. On a personal level,
    she is determined to maintain her health through regular walking, gardening, and social engagement, and to stay current with emerging communication tools so she can keep in touch with grandchildren
    and great‑grandchildren across the country.
