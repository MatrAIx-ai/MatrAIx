personas:
  professional: Jose Martinez, a retired agricultural equipment maintenance specialist, leverages their hands‑on mechanical troubleshooting, bilingual technical instruction, and meticulous budgeting to
    mentor youth in community STEM workshops, applying their routine‑driven, practical mindset to keep projects organized while occasionally asserting their ideas when resources are tight.
  sports: Jose Martinez stays active by fishing in Monterey Bay, walking the coastal trail three times a week, and cheering on the San Francisco Giants during baseball season, while occasionally joining
    a senior softball league at the local community center.
  arts: Jose Martinez nurtures their love for music by playing bolero classics from José José and salsa hits from Celia Cruz on their radio while tending the garden, and they occasionally attend community
    theater productions featuring plays that celebrate immigrant stories.
  travel: Jose Martinez prefers low‑key, well‑planned road trips, having already taken weekend getaways to Napa Valley wine country and a nostalgic visit to their hometown's coastal region, while dreaming
    of a relaxed cultural tour of Barcelona's historic neighborhoods in their golden years.
  culinary: Jose Martinez, an adept home chef, frequently prepares family‑style pupusas filled with cheese and loroco, slow‑cooked tamales with masa and pork, and aromatic sopa de gallina, favoring fresh
    heirloom tomatoes, corn masa, and a pinch of annatto for color.
  core: Jose Martinez is a routine‑loving, hands‑on gardener and tinkerer who hums boleros while fixing birdhouses, occasionally forgets to take their blood‑pressure medication, and insists on using heirloom
    seeds even when they cost more.
background:
  cultural: Jose Ramon is a first-generation Salvadoran American who immigrated to California in the early 1970s. He grew up in a close-knit family that valued hard work, respect for elders, and Catholic
    traditions. Salvadoran customs—such as sharing pupusas during family gatherings, celebrating Las Fiestas de San Salvador, and maintaining strong ties with relatives back home—remain central to his identity.
    Living in Monterey, he has blended his heritage with the coastal Californian lifestyle, participating in the local Latino community, attending the bilingual parish, and contributing his knowledge of
    sustainable agriculture to community projects. His bilingual fluency and deep appreciation for both cultures shape his daily interactions and sense of belonging.
