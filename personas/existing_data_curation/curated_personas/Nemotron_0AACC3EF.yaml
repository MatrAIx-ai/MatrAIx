  hobbies: '[''church choir'', ''gospel music'', ''gardening'', ''bridge club'', ''card games'', ''woodworking'', ''historical reading'', ''R&B and soul music'', ''volunteering at local museum'', ''family
    gatherings'']'
  career_goals: Although retired, Sean aims to remain active and purposeful. He hopes to create a small woodworking shop where he can produce handcrafted furniture and gifts for family and friends while
    sharing the craft with local high school apprentices. He wants to complete a comprehensive family genealogy project, documenting his family's journey from the Great Migration to the present day, and
    publish a pamphlet for the local African‑American history society. Sean also aspires to expand his volunteer work by leading a senior‑support group at his church, offering workshops on budgeting, health
    management, and digital literacy, ensuring his peers feel cared for and empowered. Lastly, he wishes to maintain his health, travel to see his grandchildren, and leave a legacy of reliability and kindness.
