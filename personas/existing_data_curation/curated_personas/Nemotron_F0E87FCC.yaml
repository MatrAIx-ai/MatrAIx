personas:
  professional: Jacob Benton leverages a mechanical engineering degree, CAD expertise, and Python data‑analysis skills to design affordable, eco‑friendly community projects while volunteering as a tech
    mentor, yet their spontaneous nature and aversion to rigid deadlines sometimes leads to last‑minute scrambles.
  sports: Jacob Benton participates in a local pick‑up soccer league, cheering for the Colorado Rapids while also leading weekend hikes in the foothills around Golden, occasionally joining a cross‑country
    skiing group in winter, and they keep a membership at a community gym for strength training to support their outdoor activities.
  arts: Jacob Benton expresses creativity by attending improv workshops at The Second City Denver, performing in occasional sketch shows, regularly hosting board‑game nights featuring titles like Catan
    and Gloomhaven, and they unwind listening to indie folk artists such as Bon Iver and the stand‑up comedy of John Mulaney.
  travel: Jacob Benton favors micro‑adventures, planning weekend trips to Rocky Mountain National Park and a yearly backpacking trek in Patagonia, while also dreaming of driving the Pacific Coast Highway,
    and they balance spontaneity with a modest travel fund built from their side‑gig earnings.
  culinary: Jacob Benton enjoys cooking nutrient‑dense meals such as quinoa‑based vegetable stir‑fry, spicy bean and sweet‑potato chili, and fire‑grilled bison burgers seasoned with fresh rosemary, while
    they often dine at Denver farm‑to‑table restaurants like The Kitchen and indulge in craft beers featuring local hops.
  core: Jacob Benton is a socially driven engineer who blends methodical problem‑solving with spontaneous community initiatives, yet their chronic over‑thinking and occasional disorganization can undermine
    even the most well‑intended projects.
background:
  cultural: Jacob was raised in a middle‑class, Anglo‑American household in the Denver metropolitan area. His family emphasized self‑reliance, education, and community service, values common in the Rocky
    Mountain region. Growing up, he absorbed a blend of suburban culture and the outdoor‑oriented lifestyle of Colorado—regular trips to the mountains, a strong appreciation for environmental stewardship,
    and participation in local volunteer traditions. This background informs his pragmatic approach to problems, his comfort in group settings, and his commitment to contributing positively to the community.
