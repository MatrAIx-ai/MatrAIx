  career_goals: Jacob aims to transition back into the workforce by securing a role that blends his technical expertise with his passion for helping others. He is particularly interested in positions within
    nonprofit tech initiatives, environmental sustainability projects, or community‑focused engineering firms in the Denver‑Golden corridor. His short‑term goal is to complete a certification in user‑centered
    design and volunteer as a tech mentor for youth. In the long term he envisions leading a multidisciplinary team that creates affordable, environmentally friendly solutions for local community challenges
    while maintaining a healthy work‑life balance that allows him to stay socially engaged.
