  career_goals: Leslie dreams of blending her artistic talent with her scientific curiosity by becoming a wildlife biologist and scientific illustrator. She envisions herself studying animals in their natural
    habitats while creating detailed illustrations for textbooks and conservation campaigns. She also hopes to lead community projects that combine art workshops with environmental education, and she aspires
    to inspire other children to appreciate both science and creativity.
