personas:
  professional: Leslie Truta is an aspiring junior game developer who uses Scratch to craft simple adventure games, merges a meticulous, methodical approach to coding with a boundless curiosity for storytelling,
    and thrives on collaborative projects in the school’s coding club where they eagerly share ideas.
  sports: Leslie Truta dashes across the field as a forward for the Riverside Rapids U12 soccer team, cheers on the local minor-league baseball squad the Greenfield Griffins, and spends weekends hiking
    with friends to keep fit, balancing structured team practice with spontaneous nature runs.
  arts: Leslie Truta channels their love for fantasy by sketching watercolor scenes inspired by J.K. Rowling and Brandon Sanderson, builds intricate LEGO dioramas that echo the meticulous detail of miniature
    modelers, shines on stage in the school drama club performing classics such as 'A Midsummer Night’s Dream', admires the whimsical illustrations of Beatrix Potter, and enjoys the music of Taylor Swift
    during art sessions.
  travel: Leslie Truta dreams of exploring both the nearby Redwood State Park and distant places like Kyoto’s bamboo groves, plans trips meticulously with a hand-drawn map and checklist, enjoys family road
    trips to the Grand Canyon for camping, yet sometimes worries about missing schoolwork during longer vacations, balancing a love for adventure with a need for routine.
  culinary: Leslie Truta enjoys crafting simple meals like spaghetti with marinara sauce, whipping up banana smoothies with fresh strawberries, experimenting with fruit-plating that resembles watercolor
    art, while their cooking skill remains at the beginner level, often relying on the family’s easy-prep pizza kits and a secret stash of gummy bears for snack time.
  core: Leslie Truta is a curious, organized, socially energetic 11-year-old whose love for art, coding, and nature is balanced by a habit of over-worrying and an occasional sweet-tooth indulgence.
background:
  cultural: Leslie was raised in the suburban community of Braselton in the greater Gwinnett County area of north‑central Georgia. Her family reflects the traditional Southern values of hospitality, close‑knit
    family ties, and participation in community and church events. She celebrates holidays such as Thanksgiving, Christmas, and local festivals with family gatherings that feature Southern cuisine like
    fried chicken, sweet tea, and peach cobbler. The local public school environment exposes her to a diverse student body, encouraging openness to new ideas and cultural exchange. Her upbringing blends
    this Southern heritage with a modern emphasis on education, arts, and environmental stewardship.
