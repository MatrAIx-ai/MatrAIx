  hobbies: '["Wood Model Building", "Fishing", "Reading Carpentry Manuals", "Jazz Listening", "Cooking Traditional West African Cuisine", "Solo Hiking", "Meditation"]'
  career_goals: Gary aims to become a licensed master carpenter and eventually open his own boutique woodworking studio in Long Island, focusing on high‑end custom interiors and historic restoration work.
    He seeks recognition for precision and reliability, plans to expand his client base among upscale homeowners, and hopes to mentor a small team of apprentices while maintaining full control over quality
    and workflow.
