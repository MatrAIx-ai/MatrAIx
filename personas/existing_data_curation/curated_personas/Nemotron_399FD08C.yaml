personas:
  professional: Gary Ouattara is a meticulous residential carpenter on Long Island, leveraging years of framing, finish carpentry, and custom cabinet expertise to deliver precision-built interiors, while
    balancing structured project schedules with a quiet, solitary work ethic that fuels their ambition to become a licensed master carpenter and launch a boutique restoration studio.
  sports: Gary Ouattara spends quiet weekends fishing off Long Island Sound with the Long Island Anglers Association, supports the New York Islanders and New York Mets as a loyal fan, hikes solo on the
    trails of Hauppauge County Park during fall, and occasionally participates in local 5K runs to keep a baseline cardio level.
  arts: Gary Ouattara immerses in the warm tones of John Coltrane, Miles Davis, Marvin Gaye, and Aretha Franklin on vinyl, draws aesthetic inspiration from master woodworker Sam Maloof, and attends occasional
    intimate jazz club sessions in Brooklyn, shaping both their creative mindset and their precision in joinery.
  travel: Gary Ouattara prefers meticulously planned trips that blend solitary exploration and craft inspiration, having trekked the historic coastal villages of Maine, admired the timber-framed chateaux
    of the Loire Valley, and now eyeing a future workshop visit to Kyoto's traditional carpentry workshops, all while balancing a modest travel budget.
  culinary: Gary Ouattara enjoys cooking hearty traditional West African dishes like jollof rice, egusi soup, and suya, complementing them with fresh Long Island seafood such as lobster rolls, while honing
    a competent home-cook skill set that favors bold spices like smoked paprika, ginger, and Scotch bonnet chilies.
  core: Gary Ouattara is a solitary, structure-driven carpenter who channels competitive precision into woodworking, balances frugal financial habits with selective indulgences, and quietly masters craft,
    cuisine, and calm.
background:
  cultural: Gary’s heritage blends West African roots—his family lineage includes the Ouattara name from Côte d’Ivoire and the Tadesse name from Ethiopia. Raised in the multicultural Black community of
    Freeport, New York, he grew up amidst a mix of African, Caribbean, and African‑American cultural influences. These traditions have instilled a strong work ethic, reverence for skilled craftsmanship,
    and an appreciation for communal values, even as his personality favors solitude and self‑reliance.
attributes:
  skills: '["Residential Framing", "Finish Carpentry", "Custom Cabinetry", "Blueprint Reading", "Material Estimation", "Tool Maintenance", "Safety Compliance (OSHA)", "Wood Finishing", "Project Scheduling",
