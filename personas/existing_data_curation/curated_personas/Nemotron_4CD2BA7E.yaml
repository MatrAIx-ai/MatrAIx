personas:
  professional: Travis Driggers, a high‑school sophomore who leads his school's robotics club, blends curiosity‑driven tinkering with practical engineering methods, delivering reliable project timelines
    while energizing teammates with their outgoing, cooperative spirit.
  sports: Travis Driggers bolts into pickup basketball games at the neighborhood park, cheers for the Boston Celtics, cycles rugged local trails on a mountain bike, and hikes the winding loops around Great
    Hill for low‑impact cardio, balancing their competitive spirit with a laid‑back love of the outdoors.
  arts: Travis Driggers fills their free time with indie rock playlists featuring The Strokes, Arctic Monkeys, and Phoebe Bridgers, attends occasional local gigs, and channels their artistic eye into assembling
    intricate model aircraft and car kits, finding rhythm in both music and miniature craftsmanship.
  travel: Travis Driggers spends weekends exploring nearby Cooks Pond and Great Hill, dreams of a road‑trip to the Hoh Rainforest in Washington, and saves pocket money for a future tech festival in Austin,
    balancing their short‑haul adventures with long‑term wanderlust while respecting family budget constraints.
  culinary: Travis Driggers favors quick comfort foods like pepperoni pizza and instant ramen, custom‑mixes trail‑mix snacks with dried mango, almonds, and dark chocolate chips, and experiments with DIY
    soda recipes using Arduino‑controlled carbonation, indulging their taste for flavors while occasionally burning the midnight oil over a gaming session.
  core: Travis Driggers is a gadget‑loving, basketball‑court‑roaming teen who mixes disciplined robotics projects with impulsive video‑game splurges, all while juggling a habit of forgetting to water their
    houseplants and staying up past bedtime.
background:
  cultural: Travis comes from a middle‑class, white New England family with English and Irish roots, raised in the suburban town of East Bridgewater, MA. The community’s New England heritage—its colonial
    history, emphasis on independence, and tight‑knit local involvement—shapes his values. He participates in mainstream American traditions such as Thanksgiving, Fourth of July fireworks, and local summer
    fairs, while also attending a small Protestant congregation with his family. The town’s modest diversity and proximity to Boston’s cultural scene expose him to broader perspectives, but his primary
    cultural identity reflects the practical, community‑oriented ethos typical of Plymouth County’s small‑town upbringing.
