  career_goals: Travis aims to graduate high school with a solid STEM record and attend a top Massachusetts college to major in mechanical or robotics engineering. He aspires to design affordable, sustainable
    technologies for community safety, such as search‑and‑rescue robotics. Long‑term, he envisions leading an engineering team that partners with local government or startups, while also mentoring younger
    students in East Bridgewater and contributing to civic projects that blend technology with public service.
