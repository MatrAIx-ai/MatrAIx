personas:
  professional: Katherine Thompson, a 13‑year‑old budding digital illustrator and debater, blends their curiosity and competitive streak by crafting detailed fantasy storyboards in Minecraft and honing
    persuasive argumentation for their school debate club, showcasing early signs of a future career in visual storytelling or media design.
  sports: Katherine Thompson, a dedicated helper for the River Valley High School track and field team, spends evenings sprinting laps to stay fit, hikes the Blue Ridge Trail with the Mountain Trail Club
    on weekends, follows the Appalachian State Mountaineers track squad, and cheers for the Philadelphia Eagles during football season, balancing competitive drive with a love for outdoor exploration.
  arts: Katherine Thompson, an avid sketcher who spends afternoons experimenting with Procreate and attending local folk‑music gatherings, draws inspiration from artists like Hayao Miyazaki, illustrator
    Lisa Congdon, and musicians The Avett Brothers, weaving Appalachian storytelling into their digital illustrations and short stories.
  travel: Katherine Thompson, who dreams of swapping their local hiking boots for the rugged paths of Patagonia but currently favours weekend trips to the Great Smoky Mountains National Park and family
    road‑trips to Washington, D.C., plans adventures with meticulous research on trail maps while balancing schoolwork and a limited vacation budget.
  culinary: Katherine Thompson, a budding home‑cook, loves whipping up cheesy mac‑and‑cheese, blueberry pancakes topped with fresh strawberries, and experimenting with honey‑glazed roasted carrots, while
    proudly sourcing locally grown produce from the Saturday farmers’ market and occasionally indulging in pepperoni pizza during marathon Minecraft sessions.
  core: Katherine Thompson is a curiosity‑driven teen who juggles digital art, debate, and hiking, but often procrastinates on school assignments to chase the next Minecraft build, and thrives on a blend
    of competitive spirit and solitary creativity.
background:
  cultural: Katherine grew up in Flat Rock, a small town in the Appalachian region of Henderson County, North Carolina. As a White teenager of likely English and German ancestry, she is immersed in the
    area's blend of rural mountain traditions and contemporary influences. Her family participates in local festivals, crafts, and folk‑music gatherings, fostering an appreciation for Appalachian culture
    while also encouraging modern artistic expression through school art programs and digital media.
