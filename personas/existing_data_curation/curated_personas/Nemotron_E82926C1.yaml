  hobbies: '[''Drawing'', ''Digital illustration'', ''Hiking'', ''Bird-watching'', ''Reading fantasy novels'', ''Short story writing'', ''Minecraft'', ''Debate club'', ''Track and field'', ''Folk music
    events'']'
  career_goals: Katherine dreams of turning her love for art and technology into a career as a concept artist or video‑game designer, creating immersive visual worlds. She also entertains the idea of studying
    environmental science to protect the Appalachian landscape she explores on hikes. Her immediate goal is to build a strong portfolio for high school art competitions and eventually attend a university
    with a renowned digital arts program, where she can merge her creative and analytical strengths.
