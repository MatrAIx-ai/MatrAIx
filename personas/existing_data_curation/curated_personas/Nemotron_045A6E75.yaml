  hobbies: '["Abstract and fractal painting","Birdwatching in local wetlands","Gardening native Louisiana plants","Attending small art galleries and live jazz/blues shows","Reading historical fiction and
    scientist biographies","Puzzle solving (jigsaw, logic puzzles)","Playing classical piano","Community quilting circle"]'
  career_goals: Elmie aims to publish a seminal interdisciplinary monograph that explores the connections between mathematical patterns and visual art, establishing a new framework for educational outreach.
    She seeks to secure a multi-year research grant to develop an interactive digital platform that allows users to create and explore fractal and geometric art grounded in mathematical theory. Mentoring
    the next generation of women and underrepresented individuals in STEM remains a top priority; she plans to expand her local math outreach program into a regional summer academy. Additionally, Elmie
    aspires to write a popular science book that demystifies complex mathematical concepts through everyday artistic analogies, making the subject accessible to a broad audience.
