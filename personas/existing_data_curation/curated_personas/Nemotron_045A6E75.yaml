personas:
  professional: Elmie Abney, a 60-year-old applied mathematician and interdisciplinary educator, blends rigorous numerical analysis, stochastic modeling, and scientific computing with algorithmic fractal
    art, using their curiosity and organized yet flexible mindset to mentor underrepresented students, secure multi-year research grants, and author a forthcoming monograph on the nexus of mathematics and
    visual creativity.
  sports: Elmie Abney stays active through early-morning walks along Bayou wetlands, seasonal kayaking on the Gulf Coast, and a weekly senior tennis match at the local community center, while cheering for
    the New Orleans Saints and the New Orleans Pelicans, and they belong to the "Riverbird" paddlers club.
  arts: Elmie Abney channels their love for abstract geometry into painting fractal canvases inspired by M.C. Escher and Yayoi Kusama, attends intimate jazz evenings featuring John Coltrane and Billie Holiday
    tributes, plays classical piano pieces by Debussy and Chopin at home, and collaborates in a quilting circle that draws on Anni Albers' textile designs.
  travel: Elmie Abney prefers thoughtfully planned yet flexible trips to art-rich destinations such as Florence, Kyoto, and the Galápagos, traveling with a small cohort of fellow scholars to explore historic
    sites, premier bird-watching locales, and local music scenes, while budgeting for modest lodgings and dreaming of a return visit to New Orleans' French Quarter for its vibrant ambiance.
  culinary: Elmie Abney delights in preparing seafood dishes like shrimp étouffée and gumbo using fresh herbs harvested from their garden, pairs meals with robust coffee or iced tea, experiments with fractal-inspired
    plating, and, though moderately skilled, indulges in occasional beignets from Café du Monde as a special treat.
  core: Elmie Abney, a mathematically curious yet quietly assertive artist-educator, blends rigorous computation with fractal art, mentors underrepresented STEM talent, and balances disciplined finances,
    health vigilance, and creative pursuits.
background:
  cultural: Elmie is a white Southern American who grew up in a small town in Mississippi, where she was immersed in a close‑knit community that valued family, church, and a strong work ethic. Her upbringing
    emphasized respect for tradition while encouraging intellectual curiosity, particularly in mathematics, thanks to supportive teachers who recognized her talent early on. After completing her graduate
    studies in a STEM field, she relocated to Slidell, Louisiana, where she embraced the region’s unique blend of Cajun and Creole influences—appreciating local cuisine, music, and seasonal festivals such
    as Mardi Gras. While she identifies with Southern hospitality and modesty, she also integrates the cultural richness of the Gulf Coast into her personal and professional life, fostering a love for community
    engagement, regional arts, and interdisciplinary exploration.
attributes:
  skills: '["Advanced numerical analysis","Differential equations modeling","Stochastic and statistical modeling","Scientific computing in Python, MATLAB, R, C++","Data visualization and algorithmic art","Curriculum
