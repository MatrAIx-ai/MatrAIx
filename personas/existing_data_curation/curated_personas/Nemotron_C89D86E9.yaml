  career_goals: Eva hopes to turn her love for visual storytelling into a career. She plans to attend a high school with a strong art program, then study graphic design or illustration at a college. Her
    long‑term ambition is to work as a freelance illustrator or art director, creating digital artwork for books, games, or social media campaigns while maintaining a flexible schedule. She also imagines
    someday offering workshops for younger students to teach drawing and DIY crafts, combining her compassion with her desire for creative independence. While she worries about the pressure of college admissions,
    she is determined to build a portfolio that showcases both her practical skills and imaginative ideas.
