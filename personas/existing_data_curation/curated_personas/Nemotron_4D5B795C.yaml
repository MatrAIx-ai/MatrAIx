personas:
  professional: Barbara Rushing, an 81‑year‑old retired interior designer living in Arvada, blends her disciplined project management, keen eye for historic design details, and calm, collaborative spirit
    to mentor emerging designers while meticulously preserving the cultural narratives of Colorado’s historic homes.
  sports: Barbara Rushing enjoys gentle hikes on the nearby foothills, regularly attends a senior walking club that aligns its meet‑ups with Denver Broncos games, keeps a faithful watch on the Colorado
    Rockies and Colorado Avalanche, and partakes in occasional community snowshoe outings to maintain mobility.
  arts: Barbara Rushing immerses herself in the arts by attending performances at the Arvada Center for the Arts, collecting prints by Georgia O'Keeffe and Frank Lloyd Wright, reading design monographs
    by Eero Saarinen, and savoring classic cinema starring Katharine Hepburn and contemporary jazz recordings by Bill Evans.
  travel: Barbara Rushing prefers thoughtfully planned journeys that blend cultural heritage with natural beauty, recalling her youthful tours of Italy’s Tuscan countryside and France’s Provence, while
    now dreaming of a serene autumn retreat in Kyoto’s temple gardens and a summer road trip through Colorado’s Great Sand Dunes.
  culinary: Barbara Rushing delights in baking artisan sourdough loaves infused with rosemary and lavender honey, crafts quinoa salads with locally sourced Colorado trout, and occasionally indulges in a
    hearty winter stew featuring root vegetables and smoked paprika, reflecting her love for wholesome, seasonal flavors.
  core: Barbara Rushing, an 81‑year‑old design veteran, balances a meticulous, community‑focused mindset with a quiet love for native gardens, gentle yoga, and a penchant for perfecting sourdough crusts.
background:
  cultural: Barbara Ann comes from an Anglo-American background, raised in the post-World War II Midwest before relocating to Colorado in her twenties. Her upbringing emphasized community, self-reliance,
    and an appreciation for traditional craftsmanship, values that were reinforced by her Protestant church involvement and her graduate studies in the arts and humanities. Living in Arvada, she embraces
    the blend of Western frontier heritage and contemporary Colorado culture, drawing inspiration from both American design traditions—such as Arts & Crafts and Mid-Century Modern—and European influences
    she studied during travels to Europe in the 1970s.
