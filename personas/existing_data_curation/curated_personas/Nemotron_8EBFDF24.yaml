personas:
  professional: Roger Holmes, a postsecondary humanities instructor specializing in art history and visual culture, channels his curiosity and relaxed, flexible mindset into designing interdisciplinary
    curricula, mentoring students through experimental projects, writing successful grant proposals, and fostering inclusive classrooms, even though they often misplace lecture notes and scramble to reconstruct
    materials before class.
  sports: Roger Holmes avidly follows the Philadelphia Eagles, 76ers, and Flyers, participates in the Pennypack Trail Running Club’s Saturday morning runs, tries rock‑climbing at local gyms during winter,
    and they balance a laid‑back fitness routine with occasional weekend hikes that sometimes get postponed by art openings.
  arts: Roger Holmes immerses himself in Philadelphia’s vibrant arts scene, sketching cityscapes at the Barnes Foundation, crafting mixed‑media collages inspired by artists like Kehinde Wiley and Kara Walker,
    photographing street murals, and curating a vinyl collection featuring The Roots, Marvin Gaye, and Nina Simone, and they use these sounds to fuel their poetry and workshop teaching.
  travel: Roger Holmes enjoys spontaneous weekend trips to nearby cultural hubs such as New York City, Washington DC, and Gettysburg, and they dream of an immersive summer in Accra’s art districts and a
    culinary tour of Oaxaca, balancing limited budget constraints with a love for experiential travel.
  culinary: Roger Holmes, a moderately skilled home cook, frequently prepares soul‑food‑inspired feasts—crispy fried chicken seasoned with buttermilk and hot sauce, slow‑cooked collard greens with smoked
    turkey, buttery cornbread, and sweet‑potato pie—while they also hunt for fresh ingredients at the Reading Terminal Market.
  core: Roger Holmes is a curiosity‑driven art scholar who blends chaotic creativity with a kindness that makes every lecture feel like a collaborative jam session, even if they occasionally misplace their
    syllabus.
background:
  cultural: Roger grew up in a Black family in the West Philadelphia neighborhoods, where church music, storytelling, and community gatherings shaped his early worldview. He is deeply connected to the rich
    African American cultural heritage of the city, from the historic murals of the Mural Arts Program to the legacy of the Philadelphia Black Arts Movement. Family traditions passed down from his grandparents—who
    migrated from the rural South—instilled an appreciation for oral history, Gospel music, and the resilience of Black communities. This cultural grounding informs his academic focus on African American
    visual culture and his commitment to fostering inclusive artistic spaces.
attributes:
  skills: '[''Art History (African American Visual Culture)'', ''Critical Theory'', ''Interdisciplinary Curriculum Development'', ''Academic Research & Publication'', ''Digital Media Integration'', ''Grant
    Writing'', ''Community Arts Outreach'', ''Pedagogical Mentoring'', ''Public Speaking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and mixed-media collage'', ''Photography'', ''Reading contemporary literature'', ''Writing poetry'', ''Collecting vintage vinyl records'',
    ''Listening to jazz and hip‑hop'', ''Volunteering at community arts workshops'', ''Cooking soul food dishes'', ''Hiking in local nature trails'']'
  career_goals: Roger aims to secure a tenure‑track position that allows him to lead an interdisciplinary program bridging African American art, digital media, and social justice. He aspires to publish
    a seminal monograph on Black diaspora visual culture, obtain a prestigious fellowship such as an NEH or Fulbright, and develop a community‑based gallery that engages local artists and students. In the
    long term, he envisions becoming a department chair who champions inclusive curricula and innovative teaching methods.
