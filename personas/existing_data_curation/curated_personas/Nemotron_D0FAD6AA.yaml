  career_goals: Leo aims for a career that blends practicality with his desire to help others in a stable, routine‑friendly environment. He is interested in becoming a community health worker or a youth
    mentor, roles that allow him to provide direct support while following clear procedures and certifications. In the short term, he plans to earn a first‑aid certification, continue volunteering at the
    community center, and explore vocational training programs in health outreach or a trade such as electrical work, which offers both hands‑on tasks and a predictable work schedule. Long‑term, Leo envisions
    a stable position that lets him maintain personal routines, contribute to his community’s well‑being, and possibly mentor younger teens.
