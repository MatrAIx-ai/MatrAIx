persona_description: 'A student researcher in the Master of Architecture program at the Golisano Institute for Sustainability who has developed a prototype turbine for micro-hydropower, which is a type
  of hydroelectric power that produces small amounts of energy using the natural flow of water. The student team presented their initial findings at the National Sustainable Design Expo in Washington, D.C.,
  and will share their research with visitors at Imagine RIT: Innovation and Creativity Festival on May 3 at the Micro-Hydropower exhibit inside GIS. The student team aims to characterize the feasibility
  of implementing a micro-hydropower unit inside GIS and to optimize the turbine system selection. The results of the team''s findings are currently being worked into a manuscript for publication in the
  international journal, Building and Environment.'
