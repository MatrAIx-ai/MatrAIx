  career_goals: At this stage Ruth’s ambitions are focused on developmental milestones rather than a formal career. She aims to expand her language to form simple sentences, refine her walking and running
    for confident exploration, and transition smoothly into preschool where her outgoing nature can thrive. Building strong friendships and mastering basic academic skills are priorities. Looking farther
