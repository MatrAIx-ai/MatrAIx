persona_description: A British geologist and pioneer in South African geology, William Guybon Atherstone was born in 1813 in Uitenhage, Cape Colony. His interest in geology was sparked early in life, and
  he devoted his leisure to the pursuit of geological science. He published an account of the rocks and fossils of Uitenhage in 1857, and obtained many fossil reptilia from the Karroo beds, presenting them
  to the British Museum. He was one of the founders of the Geological Society of South Africa and was a member of the Cape parliament. Atherstone's identification of a crystal found at De Kalk near the
  junction of the Riet and Vaal rivers led to the establishment of the great diamond industry of South Africa. He encouraged the workings at Jagersfontein and called attention to the diamantiferous neck
  at Kimberley. He died in 1898 at Grahamstown, England.
