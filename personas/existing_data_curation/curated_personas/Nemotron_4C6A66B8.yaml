  hobbies: '["Contemporary art collection", "Abstract painting", "Jazz listening and live performances", "Urban photography", "Reading philosophy and speculative fiction", "Traveling to cultural festivals",
    "Meditation and journaling", "Cooking African-inspired cuisine", "Golf", "Strategic board games and puzzles"]'
  career_goals: Tosh aims to position his company as a global leader in sustainable technology while embedding a culture of creativity and inclusivity. He aspires to launch a mentorship program for Black
    and under‑represented entrepreneurs, publish a book on the intersection of art and business strategy, and become a recognized thought leader on creative leadership in the tech sector. Long‑term, he
    envisions expanding the enterprise into new international markets, driving impactful sustainability initiatives, and establishing a philanthropic foundation that supports STEM education for youth in
    African‑American communities.
