  hobbies: '[''Southern cooking and recipe development'', ''Quilting and textile arts'', ''Gardening (vegetable & native plants)'', ''Reading historical fiction and local history'', ''Cajun and Zydeco music
    festivals'', ''Community book club'', ''Hiking and birdwatching in local wetlands'', ''Family genealogy research'', ''Volunteering at local church and food pantry'', ''Hosting dinner parties for friends
    and neighbors'']'
  career_goals: Vanessa aspires to transition her extensive volunteer experience into a part‑time role as a community program coordinator for the De Soto Parish Community Center, where she can develop senior‑support
    services and cultural workshops. She plans to pursue a certificate in nonprofit management to formalize her skills. Long‑term, she hopes to launch a home‑based catering business specializing in seasonal
    Southern cuisine, paired with a small boutique selling her handcrafted textiles, thereby blending her organizing talent, culinary passion, and artistic flair while contributing to the local economy.
