  career_goals: Camilo aspires to leverage his sociable nature and competitive drive into a career in digital media and community leadership. He aims to complete his GED, study communications or marketing
    in college, and eventually become a social media strategist or brand manager for sports and entertainment. Additionally, he is interested in youth mentorship, hoping to organize community programs that
    blend his leadership skills with his cultural background. In the long term, he dreams of launching his own online platform that highlights teen perspectives and multicultural content.
