  hobbies: '[''Traditional Mexican cooking'', ''Casual soccer'', ''Woodworking'', ''Hiking in San Gabriel Mountains'', ''Attending Dia de los Muertos festivals'', ''Reading technology news'']'
  career_goals: Jose Ernesto aims to transition from his current HR specialist role to a senior leadership position, such as HR Director or Vice President of People, within the next five years. He wants
    to champion a data-centric HR strategy that aligns workforce planning with the company’s growth objectives. He plans to earn the SHRM‑SCP certification and to lead cross-functional initiatives that
    improve employee engagement while reducing turnover. Long-term, he envisions launching his own boutique HR consulting firm that helps small-to-mid-size businesses in the Los Angeles area create scalable,
    compliant HR processes. Throughout, he intends to mentor junior HR professionals and to maintain a work-life balance that supports his family.
