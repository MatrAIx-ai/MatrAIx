  hobbies: '[''building block construction (Legos, Mega Bloks)'', ''drawing and coloring'', ''outdoor exploration (park, backyard, nature collection)'', ''pretend role-play (firefighter, builder, teacher)'',
    ''storytime and picture book reading'', ''listening to children’s music and dancing'', ''comfort play with stuffed animal'']'
  career_goals: Clark often tells his parents he wants to become a builder or engineer because he loves constructing stable block towers, and he imagines designing things that work well. He also expresses
    a desire to be a firefighter, drawn by the idea of helping people and being brave, which reflects his compassionate side. Occasionally, he mentions wanting to be a teacher, enjoying the chance to share
    stories with younger kids. These ambitions are fluid; he changes his mind often and enjoys exploring new roles in pretend play. Behind his aspirations, Clark sometimes worries whether he can do a good
    job, and he likes to practice his ideas through repeated building and role-play, seeking reassurance from adults.
