  career_goals: Divine aspires to pursue a career that merges her love of science with tangible community impact. She dreams of becoming a biomedical engineer or a medical researcher who designs affordable
    health-tech solutions for underserved neighborhoods in Mississippi. She hopes to win a regional science fair, earn a scholarship, and eventually attend a university with a strong STEM program. Alongside
    her scientific ambitions, she is interested in advocating for health education in her church and school, aiming to become a role model for other young Black girls who share her curiosity and practicality.
