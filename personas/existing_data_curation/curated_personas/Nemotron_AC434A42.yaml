personas:
  professional: Divine Laguerre, a 12‑year‑old budding scientist‑coder, blends a love for sci‑fi reading, hands‑on chemistry kits, and Scratch animation into a methodical, project‑driven approach that mirrors
    a junior researcher, while their competitive streak pushes them to refine experiments and code with the precision of a disciplined lab assistant.
  sports: Divine Laguerre hones basketball skills through after‑school Dr. Dish shooting drills and pick‑up games with friends, proudly supports the Memphis Grizzlies and the Mississippi State Bulldogs,
    and channels competitive energy into a junior Hoops club where they track performance metrics on a whiteboard.
  arts: Divine Laguerre immerses themselves in Ursula K. Le Guin and Isaac Asimov novels, crafts animated Scratch stories about interstellar explorers, sketches comic‑style heroes inspired by Spider‑Man
    and Sailor Moon, and lifts the church choir with gospel renditions of Mahalia Jackson and contemporary R&B hits by Beyoncé.
  travel: Divine Laguerre enjoys weekend hikes on Hinds County trails, has explored Natchez Trace Parkway and a family road trip to New Orleans’ French Quarter, and dreams of visiting the Kennedy Space
    Center in Florida and the historic castles of Edinburgh, Scotland, balancing adventure with budget constraints set by their parents.
  culinary: Divine Laguerre delights in preparing collard greens seasoned with smoked turkey, buttery buttermilk cornbread, and honey‑glazed sweet potatoes, showcasing a budding knack for measuring spices
    like cayenne and smoked paprika, though they sometimes forget to preheat the oven and rely on siblings for timing.
  core: Divine Laguerre blends scientific curiosity, competitive basketball drive, and organized creativity into a disciplined yet playful outlook, peppered with occasional splurges on comics and a habit
    of double‑checking every detail.
background:
  cultural: Divine comes from an African-American family rooted in the Deep South. Her grandparents grew up during the civil‑rights era in Mississippi, and family gatherings often feature gospel music,
    storytelling, and soul-food cooking that blend Southern traditions with Black cultural heritage. The Laguerre name reflects a lineage that includes French‑Creole ancestors who migrated to the region,
    adding a subtle layer of cultural richness. Community life in Bolton centers around the local church, where she participates in youth programs and choir rehearsals. She is proud of her heritage and
    draws strength from the resilience and creativity of the Black community in Hinds County.
