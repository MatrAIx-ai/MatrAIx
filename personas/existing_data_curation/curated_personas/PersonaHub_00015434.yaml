persona_description: A scientist and engineer who specializes in the study of aerodynamics and the flight of insects, particularly dragonflies. His work focuses on developing quad-winged MAVs for use in
  monitoring public areas, detecting biological or chemical weapons, and helping with search and rescue efforts. He is particularly interested in the flow physics that underlie the flight of insects and
  has dedicated his career to studying the complex interactions between the wings and body of a four-winged insect in free flight. His research has resulted in the creation of full-body 3D simulations of
  a four-winged insect in free flight, which has enabled him to develop a tiny, agile vehicle that can maneuver in inaccessible spaces while carrying the payload it needs to gather information.
