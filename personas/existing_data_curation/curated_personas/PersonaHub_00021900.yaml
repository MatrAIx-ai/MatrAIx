persona_description: A forest scientist with expertise in the study of riparian forests, specifically bottomland hardwood forests along the Mississippi, Missouri, Illinois, and Des Moines rivers. The author
  has developed height-diameter equations for 13 riparian tree species using data from these forests. The focus is on predicting tree heights given diameter, with the equations providing a reasonable means
  of estimating unknown tree heights. The paper also discusses the use of geostatistical methods for predicting diameter distributions in wetland tree species, and the comparison of fixed-height diameter-measurement
  points against variable-height measurement points for predicting cubic volume. The paper also examines the use of a mixture model to describe the bivariate diameter-height distribution of trees growing
  in a pure, uneven-aged beech forest, and the general question of assessing the fit of models for bivariate data.
