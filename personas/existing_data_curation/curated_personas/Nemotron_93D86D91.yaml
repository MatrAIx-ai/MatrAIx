  hobbies: '[''Sketching and graffiti art'', ''Playing basketball'', ''Digital photography'', ''Listening to hip‑hop, R&B, and gospel music'', ''Strategy video gaming'', ''Building simple web projects'',
    ''Volunteering at community center'', ''Exploring contemporary art online'']'
  career_goals: George aims to earn his GED within the next year and then enroll in a vocational program focused on graphic design and multimedia production. He dreams of turning his artistic flair and
    technical know‑how into a career as a professional graphic designer or digital content creator, eventually freelancing for local businesses and community organizations. Parallel to this, he hopes to
    leverage his leadership and sports experience to become a youth event coordinator, organizing programs that blend art, athletics, and mentorship for other teens in his hometown. In the longer term,
    he envisions a college degree in visual communications, using it as a launchpad for a startup that produces culturally resonant visual media.
