    ''journaling'']'
  career_goals: Although retired from formal employment, Abel is driven to leave a lasting cultural imprint. He aims to compile his abstract artworks and family recipes into a self‑published book and host
    a modest exhibition at a local community center. He plans to mentor younger members of the Mexican community in art, cooking, and storytelling, sharing his knowledge in small, focused workshops. Abel
    also wishes to document oral histories of older Mexican immigrants in Chicago, preserving them for future generations. To broaden his reach, he intends to create an online portfolio where he can sell
    prints and raise funds for cultural programs, while continuing to learn classical guitar as a personal artistic challenge.
