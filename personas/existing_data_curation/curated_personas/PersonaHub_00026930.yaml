persona_description: A historian who is interested in the early years of the twentieth century, specifically the turbulent period of industrial, social, and political upheaval in Glasgow, Scotland. They
  are also interested in the life and political career of Congressman Ron Mazzoli, an Italian-American native of Louisville, Kentucky who represented Kentucky's Third Congressional District for 24 years
  (1971-1995). The persona is likely to be interested in the digitization of historical documents and the development of new strategies for research in the Humanities.
