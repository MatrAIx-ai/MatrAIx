personas:
  professional: Youssef Angle is an aspiring junior naturalist who merges their love of sketching wildlife with hands‑on experiments on interactive science apps and intricate LEGO builds, turning each hobby
    into a miniature research project.
  sports: Youssef Angle is a budding sports enthusiast who practices swimming at the community pool thrice a week, plays on the Elm Street Tigers youth soccer club, and cheers for the globally beloved FC
    Barcelona while occasionally debating match scores with friends.
  arts: Youssef Angle is an imaginative young artist who fills sketchbooks with animal studies inspired by the fluid lines of Hayao Miyazaki’s films, collects prints of Vincent van Gogh’s Starry Night,
    and spends evenings watching animated documentaries about space on NASA’s YouTube channel.
  travel: Youssef Angle is a curious traveler who loves family road trips to national parks like Yellowstone, has visited the Natural History Museum in London during a school exchange, and dreams of seeing
    the aurora borealis over Iceland’s icy plains.
  culinary: Youssef Angle is a budding chef in the kitchen who can whip up peanut‑butter‑jelly sandwiches, assembles homemade tacos with fresh salsa, and has a sweet spot for chocolate‑covered strawberries,
    though they often forget to wash their hands before cooking.
  core: Youssef Angle is a curious, artistic eight‑year‑old who channels competitive energy into sketching, LEGO builds, chess, and carefully guarded savings, all while navigating mild allergies and a love
    for solo adventures.
background:
  cultural: Youssef grows up in Manhattan, Kansas, a small Midwestern town known for its agricultural roots and close‑knit community. His family reflects a blend of typical Midwestern values—emphasis on
    independence, modesty, and community involvement—while his first name hints at a multicultural heritage that introduces him to diverse stories and traditions. This mix gives him a broad perspective,
    encouraging openness to new ideas while staying grounded in the region’s gentle, supportive atmosphere.
