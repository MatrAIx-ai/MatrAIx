  career_goals: Guided by her curiosity and desire for practical impact, Katie envisions a future where she can protect the environment and help others. She aspires to become an environmental scientist
    or marine biologist focused on New York's urban ecosystems, or alternatively a pediatric nurse who supports children's health. She also considers a career in science education or community outreach,
    using her cooperative nature to inspire peers. Katie aims to attend a competitive high school, earn scholarships, and eventually study environmental science at a top university, where she can develop
    solutions to urban ecological challenges while building resilience to manage stress.
