personas:
  professional: An aspiring young game creator, Katie Villard merges a love of fantasy storytelling with practical coding skills in Scratch, designing simple interactive adventures while balancing school
    responsibilities, piano practice, and animal shelter volunteering.
  sports: Katie Villard, a regular on the Central Park trail runs and a member of the school after-school running club, cheers for the New York Yankees and Knicks while occasionally playing pickup soccer
    at the local community field, balancing a love for solo cardio with occasional team sports.
  arts: Katie Villard, an avid reader of Neil Gaiman and fan of Stan Lee graphic novels, channels that inspiration into sketching original characters in after-school art classes while practicing piano pieces
    by Ludovico Einaudi and attending MoMA exhibitions of Monet water lilies, weaving together literature, visual art, and music into a personal creative tapestry.
  travel: Katie Villard, who explores New York City’s museums, the Statue of Liberty, and weekend hikes in the Catskills, dreams of future trips to Washington DC historic monuments and Orlando theme parks,
    favoring family-organized itineraries that blend structured sightseeing with spontaneous park play.
  culinary: Katie Villard, a competent home baker who perfects classic chocolate-chip cookies and banana bread on Sundays with the family, enjoys experimenting with matcha-flavored cupcakes and fresh herbs
    harvested from the community garden, yet often burns the edges of a batch by losing track of the oven timer amid homework.
  core: Katie Villard, a curious yet pragmatic 13-year-old, blends a love of fantasy storytelling with coding, community service, and baking, all while juggling occasional worries and a tendency to over-indulge
    in limited-edition comics.
background:
  cultural: Katie is a white teenager raised in a middle-class family in New York City. Her parents moved from the Midwest for work, blending traditional American customs—like celebrating Thanksgiving,
    Christmas, and Halloween—with the city's diverse cultural tapestry. Attending a public school in Manhattan exposes her daily to peers from many ethnic backgrounds, reinforcing her values of harmony,
    cooperation, and consideration. The city's museums, libraries, parks, and community festivals nurture her curiosity and practical mindset, while family traditions emphasize community service and togetherness.
