persona_description: A scientist who specializes in volcanic activity and the study of volcanic eruptions, particularly in relation to the Auckland Volcanic Field. They are particularly interested in how
  the lava in Hawaii is interacting with the built environments, and how the lava is impacting upon lifelines like water supply and electricity. They are also working on the DEtermining VOlcanic Risk in
  Auckland project, or DEVORA, and are developing mock scenarios for an Auckland volcanic eruption to help with preparedness.
