  career_goals: Looking ahead, Miguelangel aims to step into a senior executive role such as Chief Technology Officer or Vice President of Information Technology within a multinational organization. He
    wants to drive end-to-end digital transformation initiatives, particularly the integration of AI-enabled analytics and advanced cloud services, while fostering a culture of innovation and continuous
    learning. He also plans to mentor emerging tech leaders, champion inclusive workplace practices, and eventually launch a consultancy that helps companies in the Latino community adopt modern IT solutions.
