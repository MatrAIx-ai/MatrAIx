personas:
  professional: Miguelangel Torres is a seasoned IT strategist whose fifteen years of leading ERP and cloud migrations are underscored by a pragmatic, cost‑focused mindset, an agile delivery expertise,
    and a relaxed, flexible approach that lets they thrive in fast‑moving executive discussions while occasionally overlooking minute planning details.
  sports: Miguelangel Torres occupies a midfield spot on the Hudson River Soccer Club’s weekend league, cheers for New York City FC in MLS and the New York Knicks during basketball season, and keeps fit
    through sunrise runs along the Hudson River Park trails while occasionally joining salsa‑dance cardio classes for cross‑training.
  arts: Miguelangel Torres spins salsa to the rhythms of Celia Cruz and Marc Anthony, attends live jazz sessions featuring Kamasi Washington, and unwinds with science‑fiction novels by Neal Stephenson and
    the cinematic worlds of Guillermo del Toro, often discussing these works at tech meetups over craft beer.
  travel: Miguelangel Torres prefers spontaneous weekend getaways to coastal towns like Montauk, plans immersive cultural trips to the bustling markets of Oaxaca and the tech hubs of Berlin, and balances
    a moderate budget with a love for culinary festivals and historic tours, always packing a portable charger for their on‑the‑go workflow.
  culinary: Miguelangel Torres enjoys preparing family‑heritage dishes such as slow‑cooked pork with chilies, corn‑based tamales, and fresh guacamole, mastering the use of fresh cilantro, smoked paprika,
    and masa harina, while also experimenting with fusion recipes that blend regional flavors with Asian spices and occasionally ordering takeout to test new flavor pairings.
  core: Miguelangel Torres is a competitive, socially‑charged tech leader who balances curiosity with a laid‑back approach, juggling high‑stakes IT projects, weekend soccer, and family cooking while often
    procrastinating on the finer details.
background:
  cultural: Miguelangel was born to Mexican parents and grew up bilingual, celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family reunions with Mexican cuisine and music. Living in
    New York, he blends his heritage with the city’s multicultural energy, maintaining strong ties to the local Mexican community through volunteer work at cultural events and a weekly cooking club. His
    cultural upbringing instills a strong sense of family loyalty, hospitality, and a pragmatic work ethic, which he brings to his leadership style and collaborative projects.
