  hobbies: '[''Hiking'', ''Bicycling'', ''Volunteering at the food bank'', ''Organizing charity runs'', ''Cooking (French cuisine)'', ''Yoga'', ''Meditation'', ''Community theater participation'', ''Attending
    University of South Dakota sports events'', ''Board game nights'']'
  career_goals: She aims to become a regional director of logistics for a major retailer, overseeing a network of distribution centers across the Midwest. Carrie wants to champion sustainable transportation
    practices, implement green logistics initiatives, and develop a mentorship program for women and underrepresented groups in the supply chain. She also seeks to earn certifications such as CSCP and PMP,
    and to create a culture of mental well‑being within her teams by integrating stress‑reduction programs and supportive leadership.
