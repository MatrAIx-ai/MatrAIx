personas:
  professional: Carrie Dubois, a logistics analyst at a Midwestern retail distribution hub, leverages their industrial engineering training, Six Sigma expertise, and SAP‑driven route optimization to streamline
    inventory flow while championing green transportation initiatives and fostering a supportive, mentally‑healthy team culture.
  sports: Carrie Dubois, an enthusiastic member of the Prairie Pedalers cycling club, routinely conquers the Vermillion prairie trails on weekends, supports the University of South Dakota Coyotes football
    team at home games, and roots for the Minnesota Vikings, all while balancing a modest weekly jog that they often skip after late‑night logistics meetings.
  arts: Carrie Dubois, an active participant in the local community theater, delights in performing in seasonal productions of classics like Arthur Miller’s 'The Crucible,' frequents the Dakota Stage &
    Screen performances, and relaxes by listening to French chanson icons such as Édith Piaf and contemporary indie folk band Fleet Foxes.
  travel: Carrie Dubois, a weekend wanderer, has explored the Badlands and Black Hills on hiking trips, dreams of a culinary pilgrimage to Paris to master authentic coq au vin, and plans a future solo trek
    through New Zealand’s South Island, all while juggling a limited travel budget and work‑related travel constraints.
  culinary: Carrie Dubois, a self‑taught French‑cuisine enthusiast, perfects dishes like ratatouille, croissants, and boeuf bourguignon using fresh herbs from the local farmers market, regularly experiments
    with brie and camembert cheese boards, yet occasionally over‑salts their sauces when juggling a tight schedule.
  core: Carrie Dubois blends laser‑sharp logistical precision with a love for prairie hikes, French cooking, and community theater, yet battles chronic anxiety that fuels both their drive for perfection
    and occasional over‑commitment.
background:
  cultural: Carrie grew up in a white, Midwestern family with French‑Canadian roots near Vermillion, South Dakota. Raised in a close‑knit community that values hard work, hospitality, and modesty, she was
    exposed to Catholic traditions and the strong sense of civic duty common in the region. Her education at the University of South Dakota reinforced a blend of practical problem‑solving and community
    engagement, shaping her pragmatic yet compassionate outlook.
