  hobbies: '[''Soccer (community league)'', ''Hiking in state parks'', ''Road‑trip photography'', ''Country‑music concerts'', ''Volunteering at local food bank'', ''Cooking and hosting dinner gatherings'',
    ''Listening to business and logistics podcasts'', ''Racing video game simulators'', ''Teen entrepreneurship club'']'
  career_goals: Amanda aims to leverage her hands‑on driving experience and sales acumen into a managerial role within the logistics sector. Over the next five years she plans to earn a bachelor's degree
    in Business Administration or Supply Chain Management, obtain advanced CDL endorsements, and secure certifications in fleet management and sales strategy. Her long‑term ambition is to start her own
    regional trucking and delivery business that combines efficient transportation with personalized customer service, while mentoring younger drivers and contributing to economic growth in her hometown
    of Bremen.
