personas:
  professional: Amanda Corvo, an 18‑year‑old driver‑sales associate, blends hands‑on CDL truck operation with real‑time route optimization and persuasive sales negotiation, and they leverage their organized
    yet adaptable mindset and competitive skepticism to close client deals and streamline deliveries while eyeing a future logistics management role.
  sports: Amanda Corvo plays midfield for the Bremen Co‑ed Soccer Club, follows the Atlanta Falcons and Atlanta United FC, and they spend weekends hiking state parks or hitting the local gym for interval
    training, balancing competitive soccer drills with casual runs to stay fit for both the road and the field.
  arts: Amanda Corvo captures Georgia’s sunrise over the Blue Ridge on a DSLR while playlists of Chris Stapleton, Kacey Musgraves, and Dolly Parton soundtrack their road‑trip photo outings, and they host
    movie nights featuring classic Southern films like ‘Gone with the Wind’ and indie documentaries on logistics.
  travel: Amanda Corvo plans weekend road‑trip itineraries on a spreadsheet, cruising from Savannah’s historic riverfront to the misty overlooks of the Great Smoky Mountains, and they dream of a future
    cross‑country delivery tour that hits Austin’s music scene, New Orleans’ cuisine, and the Canadian Rockies, all while budgeting trips around college breaks.
  culinary: Amanda Corvo experiments with Southern comfort dishes—perfecting crispy fried chicken, smoky pulled pork with a bourbon glaze, and peach cobbler topped with a crumbly oat streusel—using ingredients
    like buttermilk, hot sauce, and fresh bourbon, and they host weekly dinner gatherings where friends sample the latest recipe.
  core: Amanda Corvo is a road‑driven, competitive 18‑year‑old logistics enthusiast who balances a love for country music, soccer, and Southern cooking with a skeptical eye for shortcuts, and they have
    a habit of over‑booking their calendar.
background:
  cultural: Amanda was raised in Bremen, a small town in Carroll County, Georgia, within a close‑knit, predominantly white Southern community. Her family’s roots trace back to Anglo‑American ancestors who
    have farmed the region for generations, instilling a strong work ethic, self‑reliance, and pride in local traditions. She grew up attending a Baptist church and participating in community events such
    as county fairs, church youth groups, and local sports. While she embraces Southern hospitality, country music, and outdoor recreation, her college experience has broadened her perspective, adding a
    modern, entrepreneurial outlook to her cultural heritage.
attributes:
  skills: '[''Commercial driving (CDL)'', ''Vehicle maintenance basics'', ''Route planning and GPS navigation'', ''Customer service and sales communication'', ''Negotiation and persuasion'', ''Time management'',
