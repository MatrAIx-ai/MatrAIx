  hobbies: '[''Speculative fiction reading'', ''Urban sketching'', ''Black‑and‑white photography'', ''AR/VR art experimentation'', ''Piano practice'', ''Philosophy book club'', ''Gallery visits'', ''Mood
    board curation'']'
  career_goals: Anita intends to complete her BFA in Visual Arts, followed by an MFA in New Media. She aims to secure a junior position as a UX/UI designer at an innovative tech firm where she can apply
    her artistic vision to user‑centered design. In five years she aspires to become a creative director leading interdisciplinary teams, and eventually to launch her own boutique studio focused on immersive
    AR/VR installations that highlight Black cultural narratives.
