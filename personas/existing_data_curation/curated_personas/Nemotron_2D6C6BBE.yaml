personas:
  professional: An organized young inventor named Walter Perez turns his LEGO sets into miniature engineering projects, meticulously documenting each step in a notebook as they strive for flawless, award‑winning
    creations even at play.
  sports: A spirited soccer enthusiast named Walter Perez captains their neighborhood park team, scores goals for the Knoxville Little Strikers, and trains with a plastic cleat collection, yet they often
    insist on being the forward because they enjoy the competition of outpacing opponents.
  arts: Walter Perez delights in drawing vibrant characters inspired by Dr. Seuss, Pixar’s ‘Toy Story’, and the bold colors of a local children’s gallery exhibit, proudly displaying their finished paintings
    on the fridge and swapping art supplies with friends during club hours.
  travel: A nature‑loving explorer named Walter Perez packs a small tote with a sketchbook, water bottle, and a trail map for weekend hikes in the Great Smoky Mountains, while they dream of visiting the
    Smithsonian’s Air and Space Museum on a future school field trip.
  culinary: Walter Perez prefers pizza topped with extra cheese, mac and cheese flavored with a dash of hot sauce, and strawberry‑banana smoothies, often helping their mom stir the batter, yet they have
    a quirky habit of spilling flour on their hands and leaving a sugary trail on the kitchen floor.
  core: Walter Perez is a meticulous, competitive six‑year‑old whose curiosity fuels a passion for building, art, and soccer, and they balance a healthy dose of skepticism with an obsessive habit of organizing
    everything from crayons to coins.
background:
  cultural: Walter is raised in a middle‑class white family in Knoxville, Tennessee, where Southern hospitality and community values are part of everyday life. His family celebrates traditional holidays
    like Thanksgiving with a turkey dinner and Christmas with festive decorations and sweet tea. He often hears country and bluegrass music at local events but also enjoys mainstream pop and cartoon soundtracks.
    Community activities such as the county fair, local library storytimes, and church youth groups shape his cultural experiences, while his parents encourage curiosity through trips to the Knoxville Museum
    of Art and the Children’s Museum of East Tennessee.
