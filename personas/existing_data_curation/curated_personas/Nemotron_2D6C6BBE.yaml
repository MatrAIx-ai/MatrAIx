  career_goals: He dreams of becoming an astronaut who explores space, a scientist who wins science fair awards, or a professional soccer player who leads his team to victory; he also imagines being a cartoon
    artist who creates his own comic strips. He aspires to excel in school, win a spelling bee, and be the captain of his soccer team.
