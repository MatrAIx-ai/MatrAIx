personas:
  professional: A retired retail operations manager, Alicia Nicholls leverages decades of team leadership, budgeting, and vendor negotiation expertise to mentor volunteers at the senior center and advise
    nonprofit boards, applying practical, low‑tech solutions while staying open to proven new management tools.
  sports: Alicia Nicholls follows the Denver Broncos and Colorado Avalanche with fervor, joins the senior‑center walking club for low‑impact exercise, and participates in a local bird‑watching group that
    doubles as a casual hiking crew along foothill trails.
  arts: Alicia Nicholls curls up reading Agatha Christie and Dorothy L. Sayers mysteries while listening to Ella Fitzgerald, attends occasional community theater productions, and enjoys knitting scarves
    while humming classic Broadway tunes like \"Somewhere Over the Rainbow\".
  travel: Alicia Nicholls favors relaxed road trips to nearby mountain towns such as Estes Park and Colorado Springs, cherishes a nostalgic visit to the Grand Canyon, and dreams of a gentle river cruise
    on the Mississippi to see historic river towns.
  culinary: Alicia Nicholls enjoys cooking seasonal Colorado dishes like trout almondine with fresh herbs from her garden, Colorado lamb stew with rosemary, and roasted beet salad with goat cheese, and
    while they are an adept home cook, they sometimes forget to thaw meat in advance.
  core: Alicia Nicholls blends lifelong curiosity with practical thrift, tending a humble garden, mentoring volunteers, and cautiously managing finances, all while grappling with occasional worry and a
    competitive edge that fuels their relentless quest for self‑reliance.
background:
  cultural: Alicia is a white American of Anglo‑American descent who grew up in the post‑World War II era, experiencing the cultural shifts of the 1960s and 1970s. She embodies a blend of traditional Midwestern
    values—self‑reliance, practicality, and community involvement—and a willingness to explore new ideas, characteristic of Colorado’s progressive western culture. Living in Denver’s Jefferson County, she
    identifies strongly with the region’s outdoor lifestyle, sustainability ethos, and the close‑knit suburban community.
