  career_goals: Although retired from formal employment, Alicia aims to stay mentally sharp and socially relevant by mentoring younger volunteers at the local senior center and sharing her management insights
    with nonprofit boards. She hopes to author a short memoir that captures lessons from her eight‑decade career, ensuring her practical knowledge endures. Financial stability and health independence remain
    top priorities, so she also plans to attend workshops on senior financial planning and adopt simple tech tools to keep in touch with her grandchildren.
