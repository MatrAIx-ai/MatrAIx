background:
  cultural: Antonio was born to Bolivian parents who maintain strong ties to their heritage. At home, Spanish is spoken alongside English, and the family celebrates cultural events such as Carnaval de Oruro
    and the Día de la Virgen de la Candelaria with traditional foods like salteñas and llama stew. They frequently play Andean music and share stories of the Andes, which influence Antonio's early love
    for rhythm and color. Living in Angola, New York, the family participates in local multicultural festivals, blending Bolivian customs with the small‑town community, giving Antonio a bicultural perspective
    from a very young age.
