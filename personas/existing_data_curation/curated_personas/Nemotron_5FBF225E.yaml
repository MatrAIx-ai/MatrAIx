personas:
  professional: Frederick Busby, a 23‑year‑old aspiring freelance illustrator and UI/UX designer in Charlotte, blends a vivid imagination with disciplined project management to deliver concept art and interactive
    prototypes for boutique agencies, leveraging Adobe Photoshop, Illustrator, and basic HTML/CSS, while confidently presenting ideas in modest public talks.
  sports: Frederick Busby enjoys casual weekend runs with the Charlotte Striders running club, follows the Carolina Panthers during football season, and plays pickup soccer at a community field in Union
    County, while using his hikes as a low‑key way to stay fit and clear his mind.
  arts: Frederick Busby draws inspiration from the surreal canvases of René Magritte, the ambient folk sounds of Nick Drake, and the avant‑garde films of David Lynch, regularly attending indie gallery openings
    featuring local painters and performing acoustic renditions of Sufjan Stevens songs at open‑mic nights.
  travel: Frederick Busby prefers spontaneous, low‑budget road trips that blend urban photo expeditions in Asheville and Portland with solitary hikes in the Great Smoky Mountains, while keeping a dream
    list that includes a backpacking adventure through Iceland’s highlands and a cultural tour of Kyoto’s galleries.
  culinary: Frederick Busby is a self‑taught home cook who loves whipping up quick Mediterranean mezze like hummus with smoked paprika and grilled halloumi, while indulging in a nightly habit of ordering
    New York‑style pizza slices topped with anchovies and arugula after late‑night design sessions.
  core: Frederick Busby is a restless imagination‑driven creator who balances meticulous freelance deadlines with nightly habits of sketching under dim LED lights and impulsively collecting vintage camera
    lenses.
background:
  cultural: Frederick is a white American raised in the Charlotte, North Carolina region, with family roots tracing back to German and Irish ancestry common in the Southern U.S. He grew up in Union County’s
    suburban environment, absorbing traditional Southern values of hospitality, community, and respect for local traditions, while also being exposed to the more progressive, multicultural influences of
    the university setting and Charlotte’s growing arts scene. This dual exposure fuels his appreciation for both Southern cuisine and music (blues, country) and contemporary global culture accessed through
    digital media. His cultural perspective balances a respect for regional heritage with an eagerness to explore novel artistic expressions.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Creative writing'', ''Basic web design (HTML/CSS)'', ''Research and analytical writing'', ''Concept development'',
