  hobbies: '[''Sketching and painting'', ''Reading speculative fiction'', ''Playing acoustic guitar'', ''Photography of urban landscapes'', ''Attending local art exhibitions'', ''Board games with friends'',
    ''Hiking in Reedy Creek Park'', ''Journaling ideas'', ''Exploring indie video games'', ''Cooking experimental dishes'']'
  career_goals: Frederick aims to build a sustainable career that merges his artistic imagination with his analytical curiosity. In the next few years he plans to develop a robust freelance portfolio of
    illustration, concept art, and UI/UX design, targeting boutique agencies and tech startups in the Charlotte area. He aspires to earn a Master of Fine Arts to deepen his conceptual practice and eventually
    step into a creative director role where he can lead interdisciplinary teams, champion innovative visual storytelling, and influence the local creative community.
