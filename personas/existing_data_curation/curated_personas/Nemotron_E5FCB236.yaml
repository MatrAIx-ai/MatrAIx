  hobbies: '[''Sketching in coffee shops'', ''Reading speculative fiction and poetry'', ''Visiting modern art galleries'', ''Analog photography'', ''Collecting vintage postcards'', ''Playing narrative‑driven
    indie video games'', ''Journaling'', ''Listening to ambient music'', ''Guided meditation'']'
  career_goals: Samantha plans to enroll in a Bachelor of Fine Arts program with a focus on illustration or graphic design, aiming to build a professional portfolio that showcases her blend of digital and
    hand‑drawn work. Her long‑term ambition is to work as a freelance concept artist for video games or as a graphic novelist, allowing her to maintain a flexible schedule that accommodates her need for
    creative freedom and emotional well‑being. She also hopes to launch a personal art‑therapy project that uses visual storytelling to address anxiety and stress, aligning her career with her personal
    experiences.
