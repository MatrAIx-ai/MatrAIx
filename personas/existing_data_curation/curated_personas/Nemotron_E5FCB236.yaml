personas:
  professional: Samantha Mclean, an aspiring freelance concept artist and future graphic novelist, merges digital illustration expertise in Procreate and Photoshop with hand‑drawn watercolor storytelling,
    while they maintain a relaxed attitude toward deadlines and occasional project disorganization, fueling a fluid, mood‑board‑driven creative process.
  sports: Samantha Mclean, a casual yoga practitioner and weekend jogger, supports the Dallas Mavericks and Dallas Cowboys while they occasionally join pick‑up basketball games at a community center, preferring
    low‑key, flexible fitness routines that align with their solitary yet occasionally competitive nature.
  arts: Samantha Mclean, an avid admirer of Hayao Miyazaki’s animated worlds, Shaun Tan’s illustrated books, and Julie Mehretu’s abstract canvases, spends afternoons sketching in quiet coffee shops and
    curating mood‑boards inspired by the Dallas Museum of Art’s contemporary exhibitions, while they weave narrative depth into every brushstroke.
  travel: Samantha Mclean, a budget‑conscious wanderer who favors off‑beat routes and independent hostels, has explored the art‑laden streets of Santa Fe and the historic mercados of Oaxaca, and dreams
    of wandering Kyoto’s back‑alley galleries and Iceland’s stark highlands, while they often plan trips on Pinterest boards but over‑pack as a quirky habit.
  culinary: Samantha Mclean, a modest home‑cook who delights in avocado toast with poached eggs, spicy miso ramen, and matcha‑infused pastries, experiments with seasonal vegetables and vintage spice blends,
    yet they frequently forget grocery essentials until a late‑night coffee run fuels an impromptu snack.
  core: Samantha Mclean, a 19‑year‑old dreamer of illustrated worlds, navigates life with fierce artistic curiosity, a gentle undercurrent of anxiety, and a habit of letting creative spontaneity eclipse
    rigid organization, while they constantly chase novel visual ideas.
background:
  cultural: As a white American raised in the suburban community of Carrollton, Texas, Samantha grew up with a blend of traditional Southern values—family gatherings, community involvement, and celebrating
    holidays like Thanksgiving and the Fourth of July—and a strong exposure to contemporary pop culture through music, film, and the vibrant art scene of nearby Dallas. Her upbringing emphasized independence
    and self‑reliance, which meshes with her competitive nature, while her curiosity has led her to explore a diverse range of artistic influences beyond her immediate environment.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Traditional drawing and watercolor'', ''Creative writing (short stories, poetry)'', ''Concept development and mood‑board creation'', ''Basic
