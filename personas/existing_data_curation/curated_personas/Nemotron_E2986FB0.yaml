personas:
  professional: Jonathan Jennings, a 24‑year‑old aspiring community arts therapist, leverages their strong organizational skills, empathetic listening, and basic digital design tools to coordinate volunteer
    schedules and create promotional materials for art‑based outreach programs at local nonprofits, all while pursuing an associate degree in social work.
  sports: Jonathan Jennings, a 24‑year‑old outdoor enthusiast, enjoys weekend hikes on Caddo Parish trails, occasional fishing trips on the Red River, follows the Shreveport Mudbugs hockey team, participates
    in a local pickup basketball league, and volunteers as a youth soccer coach during the summer.
  arts: Jonathan Jennings, a 24‑year‑old avid arts patron, frequents Shreveport’s contemporary galleries, captures everyday moments with a DSLR, sketches in a battered notebook, curates a vintage vinyl
    collection featuring The Beatles, Buddy Guy, and Lana Del Rey, and attends community theater productions starring local talent like playwrights influenced by August Wilson.
  travel: Jonathan Jennings, a 24‑year‑old budget‑conscious traveler, has explored New Orleans for its culinary scene, attended a music festival in Austin, trekked the Great Smoky Mountains on a weekend
    hike, dreams of visiting Paris’s Musée d’Orsay and the Louvre, and prefers planning trips with hostels and public transport to keep costs low.
  culinary: Jonathan Jennings, a 24‑year‑old home chef, loves preparing Cajun and Creole classics such as jambalaya, gumbo, and crawfish étouffée using Andouille sausage, okra, bell peppers, and Creole
    seasoning, experiments with spice blends while listening to vinyl, yet often over‑seasons dishes when anxious.
  core: Jonathan Jennings, a 24‑year‑old compassionate yet anxiety‑prone organizer, blends art, community service, and vintage vinyl into a vibrant life, but frequently forgets meals amid their relentless
    schedule.
background:
  cultural: Jonathan was raised in Shreveport, Bossier Parish, Louisiana, in a modest, middle‑class white family with deep Southern roots tracing back to English, Irish, and German ancestors. His upbringing
    emphasized community service, church participation, and Southern hospitality. He grew up surrounded by the region’s music traditions—blues, zydeco, and jazz—and local culinary customs such as gumbo
    and jambalaya. Regular attendance at high school football games, Mardi Gras celebrations, and county fairs reinforced a strong sense of local pride. These cultural experiences shaped his values of humility,
    respect for elders, collaborative spirit, and an appreciation for the arts.
