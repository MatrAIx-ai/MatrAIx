  career_goals: Jonathan aims to enroll in a community college to earn an associate degree in social work or nonprofit management, followed by a bachelor's in community arts therapy. He seeks a role as
    a volunteer coordinator or program assistant at a local non‑profit serving at‑risk youth or mental‑health clients, with the long‑term goal of becoming a program director. He is driven to design and
    implement art‑based outreach programs that foster emotional expression, community cohesion, and mental‑wellness. Ultimately, he hopes to establish his own community‑center art therapy initiative.
