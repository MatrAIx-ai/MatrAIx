personas:
  professional: Charles Ashman, a 27‑year‑old dentist in Saratoga Springs, blends advanced digital dentistry—3D CAD/CAM design, intra‑oral scanning, and cone‑beam imaging—with a community‑first mindset,
    using their analytical curiosity to craft personalized treatment plans while navigating the occasional disorganization of an associate’s schedule to pursue their goal of launching a boutique multidisciplinary
    practice, and they often mentor junior staff on digital workflows.
  sports: Charles Ashman, an avid hiker and cyclist, regularly rides the Mohawk River Trail with the Saratoga Cycling Club, follows the Buffalo Bills and New York Rangers on game days, and participates
    in the Adirondack 100‑mile trek each summer, balancing team spirit with solo wilderness workouts and they cherish the camaraderie of group rides.
  arts: Charles Ashman, a casual acoustic‑guitar player, frequents open‑mic nights at local cafés, draws inspiration from folk artists like Bon Iver and classic rock legends such as The Band, and attends
    the Saratoga Performing Arts Center’s summer concerts featuring the New York Philharmonic and contemporary indie acts, and they often end their set with a spontaneous riff on a favorite song.
  travel: Charles Ashman favors spontaneous weekend getaways, often planning last‑minute road trips to the Finger Lakes, a quick flight to Montreal for a jazz festival, or a summer hike in the Canadian
    Rockies, balancing a modest travel budget with occasional splurges on boutique lodges while they keep a flexible schedule that lets them slip away between clinic shifts.
  culinary: Charles Ashman enjoys farm‑to‑table cuisine, regularly cooking mushroom risotto with locally sourced Adirondack mushrooms, grilled salmon seasoned with dill and lemon, and desserts featuring
    maple‑glazed apple crumble, while they experiment with sous‑vide techniques and craft coffee drinks with locally roasted beans.
  core: Charles Ashman is a data‑driven dentist who swaps clinic charts for mountain trails, juggles tech‑savvy ambitions with occasional disorganization, and they fuel both their practice and their life
    with a blend of curiosity, community spirit, and spontaneous guitar riffs.
background:
  cultural: Charles grew up in a middle‑class white family in upstate New York, with roots tracing back to Irish and German immigrants who settled in the region during the early 20th century. His upbringing
    emphasized community involvement, a strong work ethic, and a respect for both tradition and innovation. The local culture of Saratoga Springs—characterized by its historic horse racing heritage, a vibrant
    arts scene, and seasonal outdoor festivals—has shaped his appreciation for balance between social engagement and personal downtime. He continues to participate in neighborhood volunteer initiatives,
    such as free dental screening events at the local community center, reflecting the region’s emphasis on public service and communal well‑being.
attributes:
  skills: '[''Comprehensive oral examinations'', ''Restorative dentistry (fillings, crowns, veneers)'', ''Endodontic therapy'', ''Minor oral surgery'', ''Digital impression and intra‑oral scanning'', ''3D
