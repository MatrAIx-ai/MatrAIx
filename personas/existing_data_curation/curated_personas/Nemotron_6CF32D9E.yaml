  hobbies: '[''Hiking in the Adirondacks'', ''Cycling on the Mohawk River Trail'', ''Playing acoustic guitar at open‑mic events'', ''Attending Saratoga Race Course events'', ''Listening to technology and
    science podcasts'', ''Reading popular science magazines'']'
  career_goals: Charles aims to transition from being an associate dentist to owning a boutique multidisciplinary practice in Saratoga Springs that integrates cutting‑edge digital dentistry with personalized
    patient care. Over the next five years, he plans to obtain certifications in cosmetic dentistry and implantology, expand his expertise in laser dentistry, and develop a community outreach program that
    offers preventive dental care to underserved populations in Saratoga County. He also envisions collaborating with local tech startups to pilot AI‑assisted diagnostic tools, while maintaining a flexible
    schedule that allows him to balance professional growth with his love for spontaneous travel and personal downtime.
