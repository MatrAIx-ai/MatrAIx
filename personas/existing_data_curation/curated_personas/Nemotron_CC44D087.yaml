personas:
  professional: Obniel Melendez, a retired mechanical and electrical engineer turned community maker‑space advisor, leverages their CAD expertise and hands‑on workshop skills to mentor high‑school students
    and senior innovators, blending methodical design with spontaneous tinkering while they calmly assert authority when needed.
  sports: Obniel Melendez, an avid follower of the Wichita State Shockers basketball team and a seasonal participant in the local senior walking club, enjoys occasional fishing trips on the Arkansas River
    and cheerfully roots for the Kansas City Royals in spring, balancing gentle exercise with a love for community‑spirit sports events.
  arts: Obniel Melendez, a patron of folk and regional music, frequently attends live performances by Mariachi Vargas and folk guitarist Andrés Calamaro while also displaying a fondness for the paintings
    of Frida Kahlo and the classic films of Pedro Almodóvar, allowing artistic expression to color their evenings after workshop hours.
  travel: Obniel Melendez, who prefers thoughtfully planned trips that combine family visits and cultural immersion, routinely journeys to Oaxaca to reconnect with relatives and savor local markets, while
    also cherishing annual road trips to Yellowstone and a leisurely cruise along the Gulf Coast, always budgeting carefully to keep travel within their fixed retirement allowance.
  culinary: Obniel Melendez, an enthusiastic home chef, masterfully prepares tamales seasoned with ancho chilies and pozole brimming with hominy and pork, regularly experimenting with fresh garden tomatoes,
    corn masa, and epazote, and they take pride in sharing these dishes at neighborhood festivals and family gatherings.
  core: Obniel Melendez, a garden‑tending, workshop‑loving retiree who balances meticulous engineering wisdom with whimsical tinkering, worries about health and finances but finds solace in chess, cooking,
    and mentoring the next generation.
background:
  cultural: Obniel was raised in a Mexican immigrant family that settled in Kansas when he was a child. His parents, originally from Jalisco, instilled a strong sense of family, respect for tradition, and
    bilingual fluency. He grew up celebrating Día de los Muertos, participating in local Hispanic parades, and helping prepare festive foods that blend Mexican flavors with Midwestern ingredients. His Catholic
    upbringing influences his participation in church gatherings and charitable events. Living in Wichita, Obniel has integrated the practical Midwestern work ethic with his Mexican heritage, forming a
    unique cultural identity that values community service, family cohesion, and the preservation of cultural customs.
