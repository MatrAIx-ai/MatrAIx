  hobbies: '[''Gardening'', ''Woodworking'', ''Arduino and electronics tinkering'', ''Cooking Mexican cuisine'', ''Chess'', ''Attending cultural festivals'', ''Mentoring students in STEM'', ''Reading science
    and history books'']'
  career_goals: Although retired, Obniel aims to remain mentally sharp and socially useful by volunteering as a senior advisor for the Wichita maker space, where he can guide young innovators and share
    his engineering insights. He aspires to author a memoir that intertwines his Mexican heritage with his Midwest experiences, preserving family stories for future generations. Additionally, he seeks to
    expand his knowledge of emerging technologies—such as smart‑home automation—so he can blend curiosity with practical applications in his daily life. Maintaining his health, managing stress, and providing
    steady support to his grandchildren’s STEM projects are central to his personal ambition.
