  hobbies: '[''Reading (young adult fiction)'', ''Journaling'', ''Cooking & baking'', ''Hiking local trails'', ''Volunteering at community garden'', ''Playing video games (strategy)'', ''Yoga'', ''Crafting
    (knitting)'']'
  career_goals: Brittney aims to complete her high‑school education and earn a GED within the next year, then enroll in a community‑college program that leads to a certification as a medical assistant or
    a certified nursing aide. She is drawn to a career that offers clear structure, reliable schedules, and the chance to help others in a practical way. In the longer term she hopes to work in a steady
    healthcare or community‑service role where she can combine her organizational strengths with her compassionate side, and eventually pursue further training to become a licensed practical nurse.
