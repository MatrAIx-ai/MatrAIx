persona_description: Anna Holcom, PhD Candidate, USC-Buck Biology of Aging Program, is an interdisciplinary researcher with expertise in the field of aging biology. She holds a Bachelor's Degree in Zoology
  from San Francisco State University and a Doctorate in Biology of Aging from the University of Southern California, where she is currently working on her PhD. Anna has a deep interest in the role of cellular
  senescence and the mechanisms underlying age-related diseases, and she is currently conducting research on the effects of drug treatment regimens on lifespan and healthspan benefits in Caenorhabditis
  species. Anna is also involved in the CITP project, which aims to discover robust and highly-reproducible healthspan and lifespan benefits derived from drug treatment regimens across three distinct Caenorhabditis
  species.
