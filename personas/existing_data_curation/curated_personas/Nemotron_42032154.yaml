personas:
  professional: Ingrid Castro, a retired community volunteer coordinator with an associate degree in business administration, leverages their methodical budgeting, record‑keeping, and bilingual communication
    skills to organize intergenerational heritage‑cooking events and senior‑center activities, always delivering on promises with the dependable, structured precision that defines their approach.
  sports: Ingrid Castro stays active by joining the Suncoast Senior Fitness Club for low‑impact aerobic dance and weekly beach promenades, proudly wears a Florida Panthers hockey jersey when cheering, supports
    the Miami Dolphins during football season, and they participate in a nostalgic senior softball league each spring.
  arts: Ingrid Castro immerses themselves in the local arts scene by singing multicultural songs in a community choir that frequently covers Celia Cruz and Bob Marley, attending historic fiction book clubs
    featuring works by Isabel Allende, and they craft crocheted accessories while listening to the classic films of Pedro Almodóvar and the jazz of Miles Davis.
  travel: Ingrid Castro prefers low‑key, well‑planned trips such as weekend getaways to St. Augustine’s historic district and leisurely cruises through the Florida Keys, while they dream of an organized
    cultural pilgrimage to the ancient Maya ruins of Tikal, balancing a modest travel budget with their desire to share experiences with grandchildren.
  culinary: Ingrid Castro, an accomplished home chef, delights in preparing heritage dishes like pepian, black bean stew, and sweet tamales using fresh cilantro, epazote, and roasted chiles from their garden,
    and they host lively potluck evenings where they pair these meals with homemade horchata and freshly baked pan de yuca.
  core: Ingrid Castro blends meticulous organization with a contagious love of community, yet often misplaces their glasses during gatherings, leading to charming, accidental spectacles that become the
    talk of the choir.
background:
  cultural: Ingrid was born and raised in Guatemala, where family bonds, Catholic traditions, and vibrant folk customs shaped her early life. She carries these influences into her daily routine in Fort
    Lauderdale, speaking both Spanish and English fluently and actively participating in local Latin American festivals. She celebrates holidays such as Día de los Muertos and Semana Santa with authentic
    foods, music, and storytelling, often inviting neighbors from diverse backgrounds to share in the festivities. Ingrid’s cultural identity is a source of pride that informs her commitment to community
    building, cultural preservation, and intercultural understanding.
