  hobbies: '[''Gardening'', ''Traditional Guatemalan cooking'', ''Senior dance classes'', ''Community choir singing'', ''Knitting and crochet circle'', ''Reading historical fiction'', ''Beach walks'']'
  career_goals: Although retired from formal employment, Ingrid aims to deepen her impact through sustained volunteer leadership. She aspires to mentor younger volunteers at the local senior center, expand
    a weekly heritage‑cooking program that showcases Guatemalan dishes, and organize intergenerational cultural exchange events. Ingrid also hopes to document and share oral histories from the Guatemalan
    community in South Florida, preserving her legacy for future generations.
