  career_goals: Johnny aspires to build a career that merges his love for art with community engagement. He aims to work in roles such as an arts coordinator at a local community center, a gallery assistant,
    or an event programmer for cultural festivals. He is considering completing a degree in arts administration or communications to eventually become a program director or cultural outreach manager, where
    he can design inclusive, innovative experiences and support emerging artists.
