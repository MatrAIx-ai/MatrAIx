  hobbies: '["Contemporary Art Gallery Visits", "Digital Photography", "AI‑Generated Art Experiments", "Reading Science Fiction and Non‑Fiction", "Playing Chess", "Cooking Indian Cuisine with Modern Techniques",
    "Hiking New England Trails", "Attending Small Tech Meetups", "Learning Japanese Language", "Listening to Classical and World Music"]'
  career_goals: Shaukat aims to transition from his current role as an Information Systems Manager to a senior executive position such as Chief Information Officer or Vice President of Digital Innovation
    within the next five to seven years. He intends to lead large‑scale digital transformation initiatives, champion cloud‑first strategies, and embed data‑driven decision making across the organization.
    To support this trajectory, he plans to complete an executive MBA, obtain advanced certifications in cloud security, and cultivate a reputation as a thought leader who blends technology with creative
    insight. Long‑term, he envisions founding a consultancy that helps mid‑size enterprises adopt sustainable, innovation‑focused IT practices while nurturing talent from underrepresented backgrounds.
