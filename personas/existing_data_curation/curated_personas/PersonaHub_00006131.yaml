persona_description: An anthropologist or archaeologist who specializes in the study of pre-Columbian civilizations in the Andes, particularly those related to the Inca Empire and its agricultural practices.
  They are interested in the role of animal excrement, specifically llama droppings, in the development of agriculture in the Andes and the potential impact of this on the development of complex societies.
  They are also interested in the use of organic fertilizers and the impact of these on the growth of crops, particularly maize, which was cultivated at very high altitudes due to the availability of animal
  excrement.
