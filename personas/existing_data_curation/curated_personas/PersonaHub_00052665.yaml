persona_description: A composer who has a unique perspective on music and its potential to communicate complex ideas beyond just dance, meditation, and emoting. Her work, Cave Vaults of the Moon, is a playful
  and prescient score for voice, Ensoniq Mirage, Juno 106, flute, guitar, and effects that was composed in 1987 for an environmental exhibition of sculpture called Artifacts from an Alien Civilization on
  the moon. Her score is now available to be reimaged and reimagined by others.
