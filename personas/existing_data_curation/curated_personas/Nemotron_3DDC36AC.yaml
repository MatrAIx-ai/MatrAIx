personas:
  professional: An experienced janitorial specialist, Poonam Landge orchestrates systematic cleaning routines with meticulous inventory control and safety compliance, and they are actively pursuing OSHA
    30‑hour certification to transition into a supervisory role.
  sports: Poonam Landge enjoys early‑morning walks with a local seniors’ fitness club, follows the Chicago Cubs baseball season, and participates in a weekend badminton league at the community center, balancing
    structured exercise with casual sports enthusiasm.
  arts: Poonam Landge unwinds by immersing in classic Bollywood cinema, especially favorites like Sholay and Dilwale Dulhania Le Jayenge, and they adore the music of A.R. Rahman and performances of Shah
    Rukh Khan and Madhuri Dixit, which shape their evenings.
  travel: Poonam Landge prefers thoughtfully planned weekend getaways, having explored the heritage sites of Jaipur and the bustling streets of Bangkok, while they dream of a tranquil retreat to the Western
    Ghats’ hill stations for a rejuvenating break.
  culinary: Poonam Landge delights in preparing elaborate festive feasts such as saffron‑infused vegetable biryani, crisp aloo samosa, and sweet shrikhand, skillfully blending cardamom, ghee, and fresh
    cilantro, and they relish sharing these dishes with family and friends during Diwali and Holi celebrations.
  core: Poonam Landge blends meticulous cleanliness with culinary creativity, balancing a structured work ethic with spontaneous bursts of festival cooking, yet they occasionally hoard unused cleaning supplies
    and lose track of time solving crossword puzzles.
background:
  cultural: Poonam comes from a first‑generation South Asian immigrant family, originally from Gujarat, India. Growing up in the vibrant Queens community, she was raised with a blend of Indian cultural
    traditions—such as celebrating Diwali, speaking Gujarati at home, and enjoying Bollywood music—while also adapting to the multicultural environment of Jamaica, NY. Her cultural identity influences her
    values of hard work, family responsibility, and community service, and she remains actively involved in local South Asian cultural groups and festivals.
