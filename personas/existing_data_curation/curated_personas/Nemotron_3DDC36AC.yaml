  career_goals: She aims to progress to a supervisory or lead janitorial role within her current facility, overseeing a team and implementing efficient cleaning schedules. To achieve this, she plans to
    obtain a certified facilities management credential and an OSHA 30‑hour safety certification. Long‑term, Poonam envisions starting a small community‑focused cleaning service that offers reliable, culturally
    sensitive housekeeping for local South Asian households.
