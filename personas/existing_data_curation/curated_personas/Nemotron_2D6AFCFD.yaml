personas:
  professional: Arnel Hayes, a seasoned 56‑year‑old bank teller in New Bedford, blends three decades of cash‑handling precision with a curiosity for emerging digital platforms, using their calm, detail‑oriented
    demeanor to mentor junior staff while championing efficient, customer‑focused banking technology upgrades, and they consistently encourage teamwork and clear communication.
  sports: Arnel Hayes, an avid waterfront walker and weekend fisherman, stays fit by joining the local senior softball league, cheering for the Boston Red Sox and the New Bedford Bay Sox during the baseball
    season, and they participate in a morning walking club with friends at the New Bedford Harbor.
  arts: Arnel Hayes enjoys immersing themselves in New England maritime art, frequently attending exhibits of Winslow Homer at the New Bedford Whaling Museum, listening to folk storytellers like Gordon
    Lightfoot and contemporary Irish bands during St. Patrick’s gatherings, and they often unwind by watching classic seafaring films such as ‘Master and Commander’ on cozy evenings.
  travel: Arnel Hayes prefers well‑planned coastal getaways, having explored Cape Cod’s lighthouse trail, taken a ferry to Martha’s Vineyard for a weekend seafood feast, and traveled to Dublin to experience
    the St. Patrick’s Day parade, always balancing modest travel costs with a desire for authentic maritime history experiences, and they keep a detailed notebook of favorite ports for future trips.
  culinary: Arnel Hayes showcases culinary confidence by whipping up traditional New England clam chowder, grilled lobster tails with drawn butter, and a garden‑fresh tomato and basil salad, favoring locally
    sourced clams, fresh herbs, and a pinch of Old Bay seasoning, though they sometimes over‑salt the broth in their enthusiasm.
  core: Arnel Hayes is a community‑driven bank veteran who blends diligent precision with tech curiosity, fuels lifelong friendships through seafood kitchens and card games, and they navigate life’s currents
    with pragmatic optimism and a dash of friendly stubbornness.
background:
  cultural: Arnel is a lifelong resident of New Bedford, Massachusetts, a city with deep roots in the fishing and textile industries. He comes from a multi-generational working-class family of Anglo-American
    ancestry, with the community's diverse Irish and Portuguese influences shaping his values of hard work, modesty, and neighborly cooperation. His upbringing emphasized practical problem-solving, community
    service, and a respect for tradition, which is reflected in his participation in local events like the Whaling Festival, St. Patrick's Day parade, and church gatherings. These cultural ties have fostered
    his outgoing nature and commitment to supporting his neighbors.
