  career_goals: Arnel aims to leverage his practical experience and curiosity to move into a senior teller or shift-lead role, where he can mentor newer employees and help implement digital banking initiatives
    at his branch. He plans to earn a Certified Bank Teller credential and deepen his knowledge of mobile-banking solutions, with the longer-term ambition of becoming a trusted financial-literacy advocate
    for the New Bedford community. While he values stability for his family's future, he also hopes to contribute to the branch's success by improving efficiency and fostering a collaborative, customer-focused
    environment.
