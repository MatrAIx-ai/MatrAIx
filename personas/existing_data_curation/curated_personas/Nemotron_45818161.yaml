  hobbies: '[''Fishing'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Listening to bolero music'', ''Reading historical novels'', ''Spontaneous road trips to desert
    trails'', ''Attending small family gatherings'']'
  career_goals: Approaching retirement, Miguel aims to transition into a mentorship role, sharing his practical experience with new recruits and helping the department adopt community-focused strategies.
    He hopes to collaborate with local schools and neighborhood groups to promote safety education, and to serve as a cultural liaison bridging the police and the Mexican-American community. Ultimately,
    he wants to leave a legacy of stronger trust and safer streets in Highland.
