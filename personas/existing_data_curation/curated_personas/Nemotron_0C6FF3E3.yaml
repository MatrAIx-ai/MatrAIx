personas:
  professional: David Nolen, a retired carpenter and longtime volunteer, channels his methodical expertise into mentoring younger volunteers at the Prescott Historical Society, overseeing a community garden
    project, and drafting a practical home‑maintenance guide for seniors, all while they maintain meticulous records and budgets.
  sports: David Nolen enjoys moderate fitness through weekly hikes with the Prescott Trail Hikers Club, follows the Arizona Diamondbacks avidly during spring training, and occasionally joins a local senior
    softball league at the community park, though they prefer low‑impact activities to protect their arthritic knees.
  arts: David Nolen immerses himself in the arts by reading David McCullough’s historical narratives, restoring 1950s Chevrolet panels as functional sculpture, attending live performances of folk singer
    Joan Baez at the historic Elks Lodge, and rewatching classic films starring Gregory Peck, which together shape his appreciation for craftsmanship and American heritage.
  travel: David Nolen plans travel with the same precision he applies to his garden, favoring organized day trips to Sedona’s red rock trails, seasonal visits to the Grand Canyon during cooler months, and
    annual road trips to Santa Fe’s art markets, while they nurture a long‑term dream of touring Tuscany’s vineyards to study Mediterranean horticulture.
  culinary: David Nolen delights in farm‑to‑table cooking, frequently preparing heirloom tomato gazpacho, rosemary‑roasted chicken with garden‑grown zucchini, and a hearty vegetable stew using fresh kale
    and carrots, while they bake sourdough loaves on weekends and savor a slice of homemade apple pie with a dollop of vanilla ice cream.
  core: David Nolen is a methodical 74‑year‑old who balances meticulous budgeting and community mentorship with a lingering worry about health, often opting for solitary woodworking over social events,
    yet they secretly indulge in splurging on rare classic‑car parts.
background:
  cultural: David grew up in post‑World War II America within a middle‑class white Anglo‑American family, internalizing values of self‑reliance, order, and community responsibility. Relocating to Prescott,
    Arizona, he has embraced the southwestern lifestyle, appreciating the desert landscape, local western heritage, and the town’s historic preservation efforts. While his cultural identity remains rooted
    in broader American traditions, he respects and participates in the region’s unique festivals and acknowledges the area's Native American history as part of the community fabric.
