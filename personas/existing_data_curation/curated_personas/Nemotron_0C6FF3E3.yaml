  career_goals: Although retired, David aims to remain an active contributor to his community. He aspires to mentor younger volunteers in practical skills, oversee the organization of a community garden,
    and ensure his personal affairs—estate, finances, and health records—are meticulously arranged. He also hopes to author a modest guide on home maintenance for fellow retirees, preserving his knowledge
    for future generations.
