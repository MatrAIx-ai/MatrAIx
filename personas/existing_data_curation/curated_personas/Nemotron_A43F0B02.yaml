    Outreach'', ''Mentoring Youth Volunteers'', ''Sustainable Agriculture Practices'']'
  hobbies: '[''Gospel singing'', ''Quilting'', ''Southern soul cooking'', ''Reading historical biographies'', ''Birdwatching'', ''Community potluck gatherings'', ''Line dancing'', ''Herb gardening'', ''Crafting
    (knitting, crochet)'', ''Attending church events'']'
  career_goals: At 71, Vanessa’s ambitions blend legacy building with community impact. She aims to launch a neighborhood garden that provides fresh produce for seniors and food‑insecure families, while
    establishing a mentorship program that pairs high‑school students with experienced farm hands. She hopes to author a practical guide on low‑input farming in the Deep South, preserving the knowledge
    of Black farmers for future generations. Additionally, Vanessa is working to secure a grant that will protect her family’s land from development, ensuring it remains a Black‑owned farm that can serve
    as a cultural and educational anchor in Birmingham.
