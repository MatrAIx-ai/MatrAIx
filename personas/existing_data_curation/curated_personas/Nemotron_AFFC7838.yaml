personas:
  professional: Hayli Broadstone, a 35‑year‑old construction helper aspiring to become a journeyman carpenter, leverages meticulous organization, OSHA‑savvy safety practices, and a knack for coordinating
    crew schedules to keep job sites clean and on track, while their outgoing nature shines when leading hospitality volunteers at church and rallying teammates during line‑dancing nights.
  sports: Hayli Broadstone stays active by hiking the Appalachian Trail in spring, pitching in a co‑ed softball league called the Whitesburg Whirlwinds, cheering on the Eastern Kentucky Colonels football
    team each fall, and fitting in weekend basketball pick‑ups at the local community center.
  arts: Hayli Broadstone sparks creativity through country line‑dancing nights set to Garth Brooks, Dolly Lambert, and classic Johnny Cash tracks, volunteers to set up stage lighting for the church’s annual
    choir concert, and unwinds by solving crosswords while listening to Americana playlists featuring artists like Sturgill Simpson.
  travel: Hayli Broadstone prefers meticulously planned road trips—with a detailed itinerary of scenic stops—favoring weekend getaways to the Blue Ridge Parkway, a long‑awaited culinary tour of Nashville’s
    hot‑chicken scene, and a family‑friendly vacation to the historic streets of Charleston, all while balancing a modest travel budget that leaves room for occasional DIY camping.
  culinary: Hayli Broadstone boasts a home‑chef reputation for hearty southern fare, regularly cooking chicken‑and‑dumplings, pulled pork with a smoky rub of paprika, brown sugar, and cumin grown in their
    backyard garden, and perfecting fluffy biscuits with fresh rosemary and thyme, though they sometimes over‑salt dishes when stressed.
  core: Hayli Broadstone blends a structured, worry‑prone mind with a love for community‑driven activities, turning construction site precision into homemade comfort food and line‑dancing steps, all while
    juggling career ambitions and a penchant for over‑budgeting.
background:
  cultural: Hayli was raised in the heart of Appalachia, in Whitesburg, a tight‑knit town where generations of families have built their lives around mining, farming, and the trades. The region’s cultural
    fabric is woven with strong family ties, a deep respect for hard work, and an emphasis on hospitality and community support. Traditional values such as reliability, modesty, and faith are reinforced
    through frequent church gatherings, local festivals, and the shared experience of seasonal hill‑top music and dance. While the area has faced economic challenges, its residents, including Hayli, maintain
    pride in their heritage, preserving customs like bluegrass music, storytelling, and communal potlucks. These cultural influences shape her sense of duty, her love for communal activities, and her desire
    to give back to the community that has supported her family.
