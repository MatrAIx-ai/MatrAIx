    books'', ''Crossword puzzles'', ''DIY home‑improvement projects'', ''Listening to bluegrass music'']'
  career_goals: Hayli aims to advance from a helper to a certified journeyman carpenter within the next three years. She plans to complete a local trade school program and earn an OSHA 30‑hour certification
    to increase her qualifications. In the longer term, she aspires to become a foreman or crew leader, where she can apply her organizational talent and supportive leadership style. Ultimately, she hopes
    to co‑run a modest home‑repair and remodeling business with her husband, providing steady work for their family while contributing to the revitalization of the Whitesburg community. She also wants to
    maintain a healthy work‑life balance that limits stress and protects her wellbeing.
