  hobbies: '[''Sketching building facades'', ''Urban photography'', ''Visiting art galleries and street murals'', ''Yoga and mindfulness meditation'', ''Cooking traditional Bengali cuisine'', ''Celebrating
    cultural festivals (Diwali, Durga Puja)'', ''Reading about architecture, urban planning, and sci‑fi novels'', ''Attending small cultural gatherings'', ''Learning basic 3D modeling software (e.g., SketchUp)'']'
  career_goals: Sharmila aims to earn the ICC Certified Building Inspector credential within the next two years and progress to a senior inspector role overseeing complex commercial projects. She plans
    to pursue an associate’s degree in construction management or civil engineering to deepen technical knowledge and eventually attain a project manager position. Long‑term, she envisions leading a consulting
    firm that specializes in safety compliance and historic preservation, influencing city policy on adaptive reuse of older structures. She also aspires to mentor other young women from immigrant backgrounds
    entering the construction trades.
