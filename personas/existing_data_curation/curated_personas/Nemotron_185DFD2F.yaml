personas:
  professional: Sharmila Lahiri, a building inspector specializing in historic structures, blends their meticulous documentation habits, competitive drive, and curiosity for architectural aesthetics to
    deliver thorough compliance reports while navigating New York's fast‑paced construction scene.
  sports: Sharmila Lahiri, a member of a local yoga studio and occasional runner in Central Park’s 5K club, roots for the New York Knicks and the New York Yankees while favoring structured workouts over
    team sports, viewing fitness as a disciplined counterbalance to the unpredictable demands of construction sites.
  arts: Sharmila Lahiri, an avid photographer of New York’s street murals and a sketcher of historic facades, draws inspiration from artists like Banksy, Ai Weiwei, and photographer Vivian Maier, and regularly
    attends gallery openings featuring emerging contemporary painters such as Tschabalala Self.
  travel: Sharmila Lahiri, who has trekked the modernist districts of Barcelona to study Gaudí’s playful forms and dreams of a solo sunrise photography trip to Kyoto’s Fushimi Inari, plans trips around
    architecture festivals while juggling a tight budget and a desire to return home for Diwali celebrations each year.
  culinary: Sharmila Lahiri, a proficient home cook of traditional family recipes like shorshe ilish and mishti doi, delights in combining mustard‑infused fish with New York’s seasonal farmers‑market produce,
    and habitually orders a slice of classic New York pizza after long inspection days to unwind.
  core: Sharmila Lahiri, a detail‑obsessed building inspector with a secret habit of sketching every historic façade they pass, balances competitive ambition with a quiet love of yoga and a lingering worry
    about every unfinished task.
background:
  cultural: Sharmila is a first‑generation Indian American, raised in a Bengali household in Queens, New York. Her parents immigrated from Kolkata, bringing with them a strong emphasis on family, cultural
    traditions, and respect for education. She grew up bilingual, speaking Bengali at home and English at school, and celebrates festivals such as Diwali, Durga Puja, and Poila Boishakh. While she values
    her heritage—evident in her cooking, music, and community ties—her upbringing in a multicultural city has fostered an open, inquisitive outlook that blends South Asian cultural norms with the diverse
    perspectives of urban New York.
