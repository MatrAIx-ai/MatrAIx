persona_description: A manager who is responsible for resolving conflicts in a workplace and wants to improve employee morale and productivity. They understand the importance of communication, values, interests,
  resources, personality clashes, and poor performance in causing conflict. They are aware of the two main responses to conflict (avoidance or battle it out) and know that constructive conflict resolution
  can lead to creativity and enhanced performance. They are willing to collaborate, compromise, compete, accommodate, and work on issues face-to-face to address workplace conflict. They are aware of the
  importance of openly acknowledging the causes of conflict, clearly articulating their goals, communication, addressing issues, taking time out, avoiding name calling, and addressing specific behaviors
  and situations to resolve conflict. They are also aware of the need to avoid conflict and push it underground, and they are willing to actively resolve conflict when it occurs to create a more positive
  work environment for everyone. They are available to help resolve individual or office conflicts through the CU-Boulder Faculty and Staff Assistance Program.
