  career_goals: She aims to become a senior engineering leader within the next three years, shaping product architecture and mentoring junior developers. Vilmarie wants to spearhead data‑driven initiatives
    that incorporate machine learning to improve user experiences. Long‑term, she envisions launching a SaaS platform that addresses a niche need in the Latin American fintech market, leveraging her Colombian
