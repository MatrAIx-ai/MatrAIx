personas:
  professional: A budding robotics enthusiast, Dung Huynh leverages their methodical planning and competitive drive to lead small‑team projects in the school robotics club, excelling at CAD design, programming
    logic, and precise assembly of complex mechanisms.
  sports: A strategic swimmer, Dung Huynh trains with the Seattle Youth Aquatics Club's junior team, prefers disciplined lap workouts to chaotic team sports, and faithfully supports the Seattle Seahawks
    during football season.
  arts: A sci‑fi literature aficionado, Dung Huynh devours novels by Isaac Asimov, Liu Cixin, and Becky Chambers, while regularly watching The Coding Train and Mark Rober on YouTube for inspiration in creative
    programming and engineering concepts.
  travel: An organized explorer, Dung Huynh has visited their grandparents in Hanoi for Tet celebrations, dreams of attending the International Robot Olympiad in Tokyo, and prefers meticulously planned
    itineraries over spontaneous trips, often mapping routes on Google Earth before departure.
  culinary: A precise home chef, Dung Huynh delights in preparing bánh chưng and simmering phở broth for Tet, measuring fish sauce, star anise, and ginger to the gram, and occasionally experiments with
    LEGO‑inspired cake decorations that demand exact timing and temperature control.
  core: A methodical teen, Dung Huynh blends a competitive edge with a love for structured challenges—from robotics and chess puzzles to precise cooking—while quietly mastering disciplined saving and strategic
    planning, even as they sometimes over‑schedule their free time.
background:
  cultural: Dung is a Vietnamese‑American raised in Petersburg, Illinois. His parents immigrated from Vietnam and run a small local convenience store, where Dung has helped with inventory and cash handling,
    reinforcing his organizational skills. At home, the family maintains cultural traditions such as celebrating Tet with lanterns, traditional foods, and video calls to relatives in Vietnam. Dung attends
    a community‑run Vietnamese language class on Saturdays, preserving his fluency in Vietnamese and deepening his connection to heritage. The blend of Vietnamese family values—emphasis on education, respect
    for elders, and community responsibility—with the practical, modest lifestyle of rural Midwestern America shapes his disciplined, structured, and competitive outlook.
