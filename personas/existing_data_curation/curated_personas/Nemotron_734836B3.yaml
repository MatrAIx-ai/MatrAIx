  career_goals: Dung aspires to pursue a career in engineering, with a particular interest in robotics and automation. He hopes to attend a university with a strong computer science or mechanical engineering
    program, eventually working on autonomous systems that could benefit both tech industries and agricultural communities like his hometown in Illinois. In the longer term, Dung envisions developing practical
    technology solutions—such as farm‑monitoring drones or community‑focused mobile apps—that blend his technical skills with a desire to give back to his Vietnamese-American community.
