  career_goals: In the next five years Janine aims to advance to a senior director role overseeing regional operations, where she can shape long‑term growth strategies for her company. She wants to spearhead
    digital transformation initiatives that blend practical ROI with innovative solutions. Additionally, she hopes to mentor emerging female leaders and eventually transition to a consultancy focused on
    helping midsized companies in the Pacific Northwest improve operational efficiency while preserving work‑life flexibility.
