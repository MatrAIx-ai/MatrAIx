  career_goals: Although retired from formal employment, Cristina aims to complete a senior‑leadership certificate at the local community college, earn her high‑school equivalency, and deepen her digital
    literacy so she can digitize her family’s oral history. She hopes to become the coordinator for a weekly seniors’ craft circle at the community center, where she can apply her organizational talents.
    Additionally, she plans to compile a memoir that chronicles her immigrant family’s journey, preserving cultural traditions for future generations.
