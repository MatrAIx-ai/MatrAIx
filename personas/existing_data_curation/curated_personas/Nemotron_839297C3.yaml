  career_goals: George aims to advance to a senior operations leadership role, such as Director of Operations, within the next five years. He plans to deepen his strategic expertise by pursuing an MBA while
    spearheading large‑scale efficiency initiatives that demonstrate measurable cost savings. Long‑term, he envisions launching a boutique consulting firm that helps midsize manufacturers adopt lean practices
    and digital tools, and he hopes to mentor emerging professionals from his community.
