persona_description: A physicist and engineer who specializes in the study of complex networks and their behavior, particularly in the context of experimental networks. He is particularly interested in
  the emergent behavior of these networks, particularly in the presence of multiple nodes and their interactions. He is also interested in the potential for exploiting this interdependence to control the
  behavior of complex networks across scales. He has published several papers on this topic, including the recent paper in Science, and is currently working on building increasingly complex networks to
  observe their behavior. He is funded by a grant from the Army Research Office to develop a theory of networks across domains from nanoscale oscillators to critical infrastructure networks and multilayered
  social networks of macaque monkey societies.
