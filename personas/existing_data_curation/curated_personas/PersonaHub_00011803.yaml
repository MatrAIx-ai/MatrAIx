persona_description: A dedicated and knowledgeable arborist, forester, horticulturist, landscape architect, or garden enthusiast who is passionate about learning about and appreciating the beauty and value
  of trees in Iowa. They are interested in the natural history, ecological requirements, pests and diseases, and practical uses of different types of trees, and want to expand their knowledge and skills
  in these areas through the use of this comprehensive and highly informative guide to Iowa's trees. They are likely to be interested in the updated and reorganized information in the third edition, as
  well as the full-color photographs and the user-friendly keys provided in Part 1. They are also likely to be interested in the planting and care of trees, Iowa's forest communities, and good places to
  see trees in the state, as well as the glossary and bibliography included in the book.
