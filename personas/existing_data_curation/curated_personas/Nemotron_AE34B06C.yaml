personas:
  professional: Maria Velasquez, a seasoned front‑of‑house host with three decades of experience, uses their bilingual fluency, precise cash handling, and methodical conflict‑resolution skills to keep the
    restaurant floor running like clockwork, while their competitive drive pushes them toward a shift‑supervisor role where they can mentor younger staff.
  sports: Maria Velasquez enjoys daily walks in the park while humming salsa tunes, tracks the New York Mets baseball season with a structured viewing schedule, and joins a senior tennis group at the local
    community center for light exercise, offering a gentle competitive outlet that they relish.
  arts: Maria Velasquez finds solace in classic bolero and jíbaro folk music from legends like Celia Cruz, Marc Anthony, and Willie Colón, attends quarterly traditional dance performances at the local cultural
    center, and spins their treasured vintage vinyl collection while crocheting intricate patterns.
  travel: Maria Velasquez prefers meticulously planned trips, has explored a historic seaside town in the Caribbean on a guided tour and taken a weekend retreat to the Catskills, and dreams of a leisurely
    Caribbean cruise, all while balancing their modest travel budget.
  culinary: Maria Velasquez excels at preparing island staples such as arroz con gandules and pastelón, cultivates fresh cilantro, oregano, and sweet peppers in their patio garden to enrich flavors, and
    relishes perfecting their adobo and sofrito blends, though they sometimes over‑salt in pursuit of bold taste.
  core: Maria Velasquez is a structured, slightly skeptical senior who blends meticulous hospitality expertise with a passion for island cuisine, disciplined budgeting, and community rituals, while they
    often wrestle with worry and an occasional over‑checking habit.
background:
  cultural: Born to Puerto Rican parents, Maria grew up immersed in the island’s vibrant customs, from festive music and dance to a cuisine rich in seasoning and communal meals. Though she relocated to
    New Jersey later in life, she has preserved her cultural identity through speaking Spanish at home, celebrating traditional holidays such as Día de la Liberación and San Juan Bautista, and staying active
    in the local Puerto Rican community. Her familial values emphasize loyalty, respect for elders, and a strong sense of collective responsibility, all of which influence her disciplined work ethic and
    her commitment to nurturing relationships both at work and in her neighborhood.
attributes:
  skills: '["Customer Service", "Bilingual Communication (Spanish/English)", "Cash Handling", "Reservation Management", "Conflict De-escalation", "Time Management", "Attention to Detail", "Table Layout
