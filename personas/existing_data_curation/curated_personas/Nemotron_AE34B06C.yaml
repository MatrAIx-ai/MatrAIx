  hobbies: '["Traditional Puerto Rican Cooking", "Gardening (herb and vegetable)", "Knitting and Crochet", "Listening to Salsa and Bolero Music", "Attending Mass and Community Events", "Walking in Local
    Parks", "Reading Historical Novels in Spanish", "Volunteering at Senior Center"]'
  career_goals: Although approaching retirement, Maria’s primary goal is to remain a dependable presence in the restaurant, aiming to be promoted to shift supervisor where she can mentor younger employees
    and help refine operational procedures. She also seeks to maintain financial stability for her household and to contribute her experience to community workshops on hospitality best practices for local
    seniors.
