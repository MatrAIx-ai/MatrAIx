personas:
  professional: Diemchau Sysouvanh, a 30‑year‑old solar photovoltaic installer in Newark, blends meticulous roof‑mounted PV layout expertise with a flair for turning solar arrays into eye‑catching art installations,
    using AutoCAD and Aurora while they channel their relaxed, curious nature into inventive solutions and collaborative communication with homeowners and architects.
  sports: Diemchau Sysouvanh, an avid hiker, spends weekends trekking the Redwood‑lined trails of the East Bay Regional Park, is a loyal fan of the Golden State Warriors and Oakland Athletics, and they
    occasionally join a local running club for Thursday night jogs.
  arts: Diemchau Sysouvanh, a street‑art photographer, captures the vibrant murals of the Mission District, drawing inspiration from graff artists like Banksy and Shepard Fairey, and spends evenings strumming
    acoustic covers of John Mayer and José González while they listen to lo‑fi playlists curated by indie label Ghostly International.
  travel: Diemchau Sysouvanh, an environmental enthusiast, prefers spontaneous, eco‑friendly getaways, often hopping on the Amtrak Pacific Surfliner to explore coastal towns like Santa Cruz and Mendocino,
    while they dream of a sunrise trek on Yosemite’s Half Dome and an immersive lantern‑lit night market stroll in Chiang Mai, Thailand.
  culinary: Diemchau Sysouvanh, an enthusiastic home chef, regularly perfects fragrant bowls of phở with star‑anise‑infused broth, swirls spicy laksa with coconut milk and tamarind, and rolls delicate spring
    rolls stuffed with shrimp, vermicelli, and fresh mint, and they often pair these meals with locally roasted single‑origin coffee and a splash of lime.
  core: Diemchau Sysouvanh, a curiosity‑driven solar artisan, fuses art, sustainability, and community, juggling a laid‑back approach that sometimes leads to scattered plans but they always land on creative,
    green solutions.
background:
  cultural: Marcos grew up in a Southeast Asian immigrant household in the Bay Area, with family roots tracing back to Vietnam. At home, Vietnamese was spoken and traditions like Lunar New Year and Mid‑Autumn
    festivals were celebrated, fostering a deep respect for family, community, and collective well‑being. Living in Newark, CA, he blends these cultural values with the region’s progressive, environmentally
    conscious ethos, shaping a worldview that values harmony, sustainability, and creative expression.
attributes:
  skills: '[''solar panel installation'', ''roof‑mounted PV system design'', ''electrical wiring'', ''inverter configuration'', ''performance testing and troubleshooting'', ''NEC and OSHA safety compliance'',
    ''blueprint reading'', ''CAD software (AutoCAD, Aurora)'', ''basic carpentry'', ''client communication'', ''team collaboration'', ''creative integration of solar with art'']'
  hobbies: '[''street‑art photography'', ''hiking'', ''acoustic guitar'', ''cooking Southeast Asian cuisine'', ''volunteering with environmental NGOs'', ''attending art festivals'', ''DIY electronics and
    Arduino projects'']'
  career_goals: Marcos aims to earn the NABCEP Certified PV Installer credential within the next year, move into a project‑management role overseeing larger commercial solar projects, and eventually start
    his own boutique solar consultancy that emphasizes sustainable design paired with artistic installations. He is passionate about mentoring apprentices from underrepresented backgrounds, launching community
    solar initiatives in Alameda County, and staying ahead of emerging technologies such as battery storage, micro‑grid design, and smart‑home integration.
