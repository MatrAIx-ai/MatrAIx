persona_description: A historian or a researcher who specializes in the study of the Armenian Genocide and the history of the Middle East. They are deeply interested in the details of the events that took
  place during the period of the Armenian Genocide, and are knowledgeable about the key figures involved in the deportation and extermination of Armenians. They are also familiar with the documents provided
  by Naim Bey and the evidence that he presented to support his claim of a genocide. They are interested in the political and social context of the time and the impact of the Armenian Genocide on the region.
