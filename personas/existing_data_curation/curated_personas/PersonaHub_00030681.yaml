persona_description: A researcher or scientist who specializes in the study of rumen metabolism and its impact on feed intake in dairy cows. They are particularly interested in the role of particle size
  in determining the efficiency of rumen digestion and buffering. They have experience with particle sieving and are familiar with the latest sieve sizes and their respective impacts on rumen metabolism.
  They are looking for new sieve sizes that can provide more accurate estimates of particle size and are willing to invest time and resources to test and compare the new sieves with existing ones.
