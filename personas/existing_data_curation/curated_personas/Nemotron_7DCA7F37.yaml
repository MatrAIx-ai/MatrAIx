personas:
  professional: An 83‑year‑old retired craftsman, Carlos Penon channels decades of woodworking and bilingual translation expertise into weekly art‑craft workshops at the senior center, where their curiosity
    and sociable nature foster a vibrant intergenerational exchange of folk painting, woodworking, and cultural storytelling.
  sports: An avid hiker of the San Isabel National Forest, Carlos Penon also follows the Colorado Springs Switchbacks FC and the Colorado Avalanche, enjoys bird‑watching outings, and stays active through
    a seniors’ yoga group and gentle walks to the local park.
  arts: A watercolor painter inspired by mountain vistas and Day of the Dead motifs, Carlos Penon regularly visits the Museum of Contemporary Art Colorado Springs, draws inspiration from Frida Kahlo and
    Ansel Adams, strums acoustic renditions of Los Lobos and Antonio Aguilar on weekends, and shares folk stories at the community library.
  travel: A lover of serene mountain retreats, Carlos Penon has hiked the peaks of Pikes Peak, taken weekend trips to Santa Fe and Taos, and dreams of a cultural pilgrimage to Oaxaca’s historic markets
    and the murals of Mexico City, yet plans trips within his budgeting constraints.
  culinary: A seasoned home cook, Carlos Penon expertly prepares classic tamales with masa and pork, rich mole negro infused with dried chilies and cacao, and often pairs his meals with fresh corn tortillas,
    while occasionally indulging in roasted poblano pepper soup for family gatherings.
  core: Carlos Penon, an 83‑year‑old culturally devoted artisan, blends artistic curiosity, community spirit, and gentle resilience into a life of watercolor painting, woodworking, and storytelling, even
    as occasional worry and health bumps arise.
background:
  cultural: Carlos is a second‑generation Mexican‑American whose parents migrated to Colorado in the early 1960s. He grew up bilingual, celebrating traditions such as Día de los Muertos, Las Posadas, and
    weekly family meals featuring dishes like tamales and pozole. A lifelong Catholic, he attends Mass at the local parish and participates in community service. His cultural identity blends Mexican heritage—music,
    folklore, and culinary customs—with the mountain‑west lifestyle of Teller County, fostering a love for nature, community bonds, and folk arts.
