persona_description: A Chinese historian who specializes in comparative studies of China's modernization efforts and colonialism, particularly those involving Tibet and Xinjiang. He has a keen interest
  in the parallels between China's expansionist moves and the brand of colonialism espoused by Imperial Japan, and how these parallels can be used to understand China's current actions and the potential
  for future developments. He is also interested in evaluating Chinese art, literature, and film as either supporting or subverting the state, particularly through the works of contemporary Chinese authors
  and filmmakers.
