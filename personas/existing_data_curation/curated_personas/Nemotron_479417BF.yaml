  hobbies: '["LEGO building", "Reading adventure books", "Baseball practice", "Puzzle solving (jigsaw, logic)", "Drawing/illustration", "Strategic board games (e.g., Connect Four, Checkers)", "After‑school
    soccer", "Exploring local parks"]'
  career_goals: Inspired by his love for building things and clear rules, Jeanphilippe dreams of becoming a civil engineer who designs bridges and playgrounds, combining practicality with creativity. He
    also envisions himself as a professional baseball player, attracted by the competitive environment and teamwork. Occasionally, he mentions wanting to be a firefighter, valuing the structured training
    and the chance to help others.
