personas:
  professional: Krista Reese is an aspiring young coder who writes simple interactive stories in Scratch, and they channel their love for structured puzzles into algorithmic thinking, applying a disciplined
    and competitive mindset to mastering coding challenges and school robotics club projects.
  sports: Krista Reese joins the middle school cross‑country team for structured endurance training, hikes local trails with a close friend on weekends, and stays competitive by cheering for the Los Angeles
    Lakers in basketball and the New York Yankees in baseball.
  arts: Krista Reese immerses themselves in mystery novels by Agatha Christie, historical epics by Ken Follett, solves chess puzzles while listening to the piano compositions of Ludovico Einaudi and the
    pop hits of Taylor Swift, shaping a disciplined yet imaginative cultural palate.
  travel: Krista Reese prefers meticulously planned weekend getaways to nearby state parks such as Yellowstone National Park, enjoys organized family trips to cultural sites like Washington, D.C.’s Smithsonian
    museums, and dreams of a summer adventure to Edinburgh, Scotland, to explore historic castles.
  culinary: Krista Reese, an intermediate home cook, frequently prepares simple yet precise meals such as spaghetti carbonara with pancetta and Parmesan, bakes chocolate chip cookies with dark chocolate
    chunks, and enjoys experimenting with fresh basil and mozzarella on homemade margherita pizza.
  core: Krista Reese is a hyper‑organized teen puzzle‑solver who blends a love for structured logic with disciplined ambition, yet occasionally over‑plans at the cost of spontaneous fun.
background:
  cultural: Krista grew up in Oak Grove, a close‑knit community in Christian County, Kentucky. Her family emphasizes Southern values of faith, hard work, and community support. While town life often centers
    on church gatherings, county fairs, and family picnics, Krista prefers quieter, smaller‑group settings such as study circles and family meals. The rural environment has instilled in her a practical,
    grounded outlook and an appreciation for nature’s regular cycles, reinforcing her preference for structure and predictability.
