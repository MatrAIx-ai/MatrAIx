personas:
  professional: Thanhhoa Nguyen is a budding theatre enthusiast and digital content creator who leverages their knack for organization and charismatic stage presence to coordinate school productions while
    producing polished YouTube vlogs and tutorials, balancing meticulous planning with spontaneous creativity.
  sports: Thanhhoa Nguyen competes in badminton at the Garden Grove Community Center, training under Coach Lee and idolizing world champion PV Sindhu, while cheering for the Los Angeles Dodgers during baseball
    season and joining after‑school pick‑up soccer games to stay agile.
  arts: Thanhhoa Nguyen thrives on stage as a lead in school plays, blends K‑pop choreography from BTS and Blackpink with traditional folk dance moves for cultural showcases, and channels that energy into
    vibrant digital illustrations using Procreate while curating video montages inspired by YouTube creator Sarah Lee.
  travel: Thanhhoa Nguyen loves weekend getaways to Disneyland and Laguna Beach, has taken family road trips to San Francisco and Seattle, and daydreams of a future excursion to Japan to experience cherry‑blossom
    festivals and explore the bustling streets of Tokyo.
  culinary: Thanhhoa Nguyen enjoys recreating beloved family recipes such as pho broth, fresh spring rolls, and caramelized fried rice on their kitchen counter, experimenting with new flavors like miso
    ramen while sharing step‑by‑step cooking tutorials on their YouTube channel.
  core: Thanhhoa Nguyen is a socially magnetic, hyper‑organized teen who balances the spotlight of theatre and YouTube fame with a disciplined badminton routine, yet occasionally forgets to water their
    houseplants amid a flurry of video edits.
background:
  cultural: Thanhhoa comes from a Vietnamese immigrant family that settled in Orange County's Garden Grove, an area known for its vibrant Little Saigon community. She grew up speaking Vietnamese at home
    and celebrating traditions such as Tet, moon festivals, and family gatherings centered around Vietnamese cuisine. Her parents emphasize education, respect for elders, and community involvement, which
    shape her values of reliability, cooperation, and pride in her heritage. She frequently attends cultural events at the Vietnamese Community Center and enjoys sharing her culture with classmates.
attributes:
  skills: '[''Mathematics problem solving'', ''Scientific inquiry'', ''Bilingual communication (Vietnamese-English)'', ''Public speaking'', ''Event coordination'', ''Graphic design (Canva)'', ''Introductory
    coding (Scratch)'', ''Time management'']'
  hobbies: '[''School theatre'', ''Dancing (K‑pop and Vietnamese folk)'', ''Digital art and video editing'', ''YouTube vlogging'', ''Badminton'', ''Community volunteering (English tutoring)'']'
  career_goals: She envisions a future where she can blend her love for organization, people, and creativity. Her immediate ambition is to become student council president and later pursue a degree in communications
    or event management, aiming to become an event planner or community outreach coordinator. She also dreams of using her bilingual abilities to work as a cultural liaison or media presenter, sharing stories
    from the Vietnamese‑American community.
