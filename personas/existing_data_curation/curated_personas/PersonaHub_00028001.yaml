persona_description: A researcher in the field of animal nutrition who studies the effects of unconventional feed ingredients such as newsprints on beef cattle and dairy cows. They are interested in understanding
  the zootechnical effects of newsprints, including their impact on feed intake, digestibility, and performance, as well as their effects on fibre digestion, water retention in the rumen, and milk production
  in dairy cows. They are also interested in the potential health and welfare impacts of newsprints on livestock.
