  hobbies: '[''Abstract painting'',''Digital illustration'',''Science‑fiction reading'',''Model kit building'',''Hiking'',''Macro photography'',''Experimental cooking'',''Art workshops'',''Strategy board
    games'',''Volunteer health‑fair participation'']'
  career_goals: Doyle aims to advance to a senior technologist or supervisory position within his imaging department, obtain an associate degree in radiologic technology, and achieve certification in advanced
    modalities such as CT and MRI. He also wants to merge his creativity with his profession by developing illustrated health‑education guides for the Batavia community and leading a quality‑improvement
    project that streamlines specimen handling. Long‑term, he envisions transitioning into health‑informatics design, creating intuitive medical software that leverages his eye for abstract concepts while
    maintaining the reliable, patient‑centered care he values.
