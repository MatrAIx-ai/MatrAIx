persona_description: A Nigerian author who is known for his anti-colonialist literature and has written four novels, including "No Longer at Ease" and "Arrow of God", as well as many short stories and poems.
  He was born in Ogidi, Nigeria on Nov. 16, 1930, and his work was moved to writing during his English literature studies at university. He married Christiana Okoli in 1961 and they had four children.
