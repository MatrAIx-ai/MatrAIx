  career_goals: Sarai dreams of becoming a teacher who can inspire curiosity while keeping the classroom well‑structured, and eventually she hopes to serve as a school principal who creates organized learning
    environments for all students. She also aspires to start a community youth club in Smiths Grove that offers after‑school science workshops, reading circles, and leadership activities, allowing her to
    blend her love of learning with her talent for coordinating groups.
