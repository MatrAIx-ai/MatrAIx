personas:
  professional: Clare Barday, an aspiring junior playwright and cartoonist, channels boundless curiosity and sociability into school theater rehearsals and vivid comic sketches, while their spontaneous
    nature often leaves scripts half‑finished and art supplies strewn across the living room, and they eagerly volunteer to lead class performances.
  sports: Clare Barday is an enthusiastic member of the Chicago Fire Academy youth soccer team, cheers for the Chicago Cubs during family outings, and loves spontaneous treasure‑hunt games in Lincoln Park,
    where they channel their boundless energy and sociable spirit into collaborative play while occasionally forgetting to hydrate after games.
  arts: Clare Barday finds joy sketching cartoon characters inspired by Disney animators like Hayao Miyazaki and classic comic artists such as Charles Schulz, devotes weekend afternoons to rehearsing school
    play monologues, and keeps a secret stash of glitter pens for secret doodling, even as they sometimes lose track of their art supplies amid sprawling projects and they often borrow extra crayons from
    friends.
  travel: Clare Barday delights in weekend trips to the Field Museum and Shedd Aquarium, where they pepper staff with endless questions, dream of visiting the Wizarding World of Harry Potter at Universal
    Orlando, and prefer a mix of structured museum tours and spontaneous park picnics, though they occasionally feel anxious about traveling far from home and they rely on familiar snacks for comfort.
  culinary: Clare Barday loves the comfort of mac and cheese, the crunch of pepperoni pizza, and the bright tang of strawberry slices, enjoys helping Mom stir batter for chocolate chip cookies, yet often
    forgets to finish their veggies, and occasionally trades lunchbox treats with friends for extra gummy bears while they lament the mess they leave behind.
  core: Clare Barday is a curiosity‑driven, talkative eight‑year‑old who blends creative storytelling with spontaneous play, thrives on social interaction, yet wrestles with anxiety and a habit of leaving
    projects half‑finished, and they often seek reassurance from friends before big events.
background:
  cultural: Clare comes from a middle‑class White family rooted in Chicago’s diverse neighborhoods. Her upbringing reflects Midwestern values of community involvement, politeness, and a strong emphasis
    on public education. Family traditions include celebrating holidays with seasonal gatherings, enjoying Chicago‑style pizza and deep‑dish meals, and taking advantage of the city’s cultural institutions
    such as the Field Museum and the Art Institute, which have nurtured her curiosity and love for learning.
