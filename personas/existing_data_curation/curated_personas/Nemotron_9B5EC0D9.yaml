  career_goals: Clare often talks about growing up to be someone who helps others learn and feel safe. She dreams of becoming a teacher or a community youth mentor, imagining herself leading classroom activities,
    organizing fun learning projects, and supporting classmates who feel anxious. Occasionally, she mentions a love for animals and wonders about being a veterinarian, combining her curiosity about how
    things work with her caring nature.
