  career_goals: Christian aims to obtain his GED within the next year and then enroll in a community college trade program, targeting an apprenticeship in automotive technology or HVAC. He envisions becoming
    a certified journeyman, eventually supervising a small team and earning a stable, well‑defined income that allows him to support himself and contribute to his family. In the longer term, he is interested
    in pursuing a role in public safety—such as a police officer or firefighter—where the structured environment and clear progression align with his preference for predictability and high standards. He
    is driven to overcome his anxiety by mastering a technical skill set and being recognized for reliability and competence.
