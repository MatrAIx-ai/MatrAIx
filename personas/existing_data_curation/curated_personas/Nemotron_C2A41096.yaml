  hobbies: '[''Reading literary fiction and poetry'', ''Bonsai and succulent gardening'', ''Mindfulness meditation'', ''Yoga'', ''Cooking traditional Vietnamese dishes'', ''Hiking local trails'', ''Watercolor
    painting'', ''Calligraphy'', ''Listening to classical and folk music'', ''Journaling'']'
  career_goals: She aspires to advance into senior leadership, aiming to become a director of community engagement or cultural programs within a nonprofit or public institution where she can shape inclusive,
    interdisciplinary initiatives that bridge Southeast Asian heritage with contemporary arts and social impact. Over the next five years, Thanh intends to deepen her expertise in data-informed program
    evaluation, secure certifications in nonprofit management, and spearhead a mentorship network for emerging women leaders. Ultimately, she envisions establishing her own consultancy focused on sustainable
    organizational development and cultural competency training, allowing her to work autonomously while continuing to contribute to community harmony.
