persona_description: A researcher and scientist who specializes in the field of immunology, particularly in the development and evaluation of live attenuated vaccines for the prevention of disease in humans
  and animals. They have a background in immunoproteomics, allelic exchange, and serological assays, and have published several papers on the construction and protective efficacy of live negative-marker
  vaccines for Salmonella enterica serovar Typhimurium in pigs. They have a strong interest in the use of live vaccines as a means of reducing the burden of multidrug-resistant isolates and have developed
  a unique approach to differentiate infected from vaccinated animals using immunoproteomics and peptide spot array analyses.
