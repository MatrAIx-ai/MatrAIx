personas:
  professional: Oliver Kurgas, a senior GIS analyst in the making, leverages expertise in UAV photogrammetry, LiDAR processing, and Python automation to turn complex spatial data into actionable city‑scale
    models, while their sociable, organized yet flexible nature makes them a go‑to leader for interdisciplinary mapping projects.
  sports: Oliver Kurgas, an avid beach‑volleyball player on the La Jolla Sandstorms league, a regular surfer catching early morning swells at Pacific Beach, and a member of the Pacific Coast Cyclists club,
    follows the San Diego Padres and the San Diego Wave FC, and balances fitness with weekend hikes along the Torrey Pines cliffs.
  arts: Oliver Kurgas, a landscape photographer inspired by Ansel Adams and the vibrant street art of San Diego, regularly attends live shows by The National and local Mexican‑Asian fusion jam sessions,
    and volunteers at the San Diego Museum of Art's map exhibit, weaving visual and musical influences into their creative outlet.
  travel: Oliver Kurgas, who meticulously plans trips using GIS mapping tools, prefers adventure‑laden itineraries to places like Patagonia’s glaciers, the historic cartography archives of Cartagena, and
    the serene fjords of Norway, while also cherishing relaxed weekends at the nearby La Jolla Cove.
  culinary: Oliver Kurgas, an intermediate home chef, delights in crafting Mexican‑Asian fusion dishes such as Korean BBQ tacos and miso‑marinated ceviche, favors ingredients like gochujang, cilantro, and
    fresh lime, and enjoys exploring local seafood shacks for grilled fish tacos with avocado salsa.
  core: Oliver Kurgas, a data‑driven explorer who captures sunsets with a drone, surfs at dawn, and can’t resist buying the newest tech gadget on a whim, balances relentless curiosity with a habit of over‑packing
    for every trip.
background:
  cultural: Oliver is a white American raised in a middle‑class family in the San Diego suburb of La Jolla. Growing up on the Southern California coast exposed him to a lifestyle that blends outdoor recreation,
    environmental consciousness, and a strong sense of community involvement. His family traditions include typical American holidays and regional celebrations such as the San Diego County Fair and Earth
    Day beach clean‑ups. The multicultural atmosphere of the city—shaped by Hispanic, Asian, and Pacific Islander influences—has informed his appreciation for diverse cuisines and cultural events, while
    his education in a STEM‑focused university reinforced values of curiosity, practicality, and collaborative problem‑solving.
