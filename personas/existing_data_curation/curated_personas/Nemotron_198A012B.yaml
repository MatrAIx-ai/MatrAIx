  hobbies: '[''Beach volleyball'', ''Surfing'', ''Hiking'', ''Cycling'', ''Mapathon volunteering'', ''Landscape photography'', ''Live music concerts'', ''Cooking'', ''Board game nights'', ''Traveling'']'
  career_goals: Oliver aims to progress to a senior geospatial analyst or GIS manager role within the next five years, leading large‑scale city modeling and sustainable urban planning projects for the San
    Diego region. He plans to integrate AI‑driven spatial analytics into his workflow, earn professional certifications such as GISP and Certified Photogrammetrist, and contribute to open‑data initiatives
    like OpenStreetMap. Long‑term, he envisions launching his own consulting firm that provides precision mapping services for municipalities and private developers, while mentoring junior surveyors and
    promoting best practices in ethical data collection.
