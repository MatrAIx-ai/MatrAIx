  hobbies: '[''Sketching'', ''Digital illustration'', ''Model steam engine building'', ''Woodworking'', ''Reading speculative fiction'', ''Harmonica playing'', ''Nature walks'', ''Birdwatching'', ''Aquascaping'',
    ''Visiting art galleries'']'
  career_goals: Approaching retirement age, Augustus aims to transition from hands‑on field work to a consulting role where he can advise on sustainable piping designs and complex steam systems for industrial
    and boutique residential projects. He aspires to obtain master plumber certification and specialized credentials in high‑efficiency steam technologies. A long‑standing ambition is to launch a niche
    business that blends functional plumbing with artistic installations—creating custom pipe art for upscale clients. Additionally, he hopes to author a guide that merges practical trade techniques with
    creative design thinking, and to continue mentoring the next generation of skilled tradespeople.
