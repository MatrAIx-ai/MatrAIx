  career_goals: Although retired from formal employment, Vinod aims to stay intellectually active by mentoring high-school and college students in STEM, contributing his expertise to local non-profits focused
    on sustainability, and writing a series of practical guides on home energy efficiency. He also aspires to learn emerging technologies such as artificial intelligence and smart-home platforms to blend
    his curiosity with his practical skill set, and to serve as an elder advisor for the Brunswick community, helping shape intergenerational initiatives that foster harmony and resilience.
