persona_description: A conservation biologist who specializes in the study of marine mammals, particularly narwhals. She is known for her work in aerial photography and has successfully used it to count
  the number of baby narwhals in the Canadian Arctic. Her research interests include the population dynamics, habitat use, and conservation efforts for narwhals. She is also interested in the impact of
  shipping traffic on narwhals and the potential for reducing the summer catch limit in the nursery population.
