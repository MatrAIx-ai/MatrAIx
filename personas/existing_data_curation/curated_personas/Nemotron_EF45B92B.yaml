  hobbies: '[''Reading (tech & business)'', ''Puzzle solving (jigsaw, Sudoku, logic games)'', ''Cooking traditional Vietnamese and Filipino dishes'', ''Woodworking'', ''Fishing'', ''Hiking in local nature
    preserves'', ''Community volunteer work (local food bank)'', ''Watching documentaries'', ''Home brewing (craft coffee)'']'
  career_goals: Xia aims to advance from his current sales role to store manager within the next two to three years, using his systematic work style to improve team performance and operational efficiency.
    He plans to obtain a retail management certification and master advanced sales analytics to qualify for a district‑manager position in the future. Ultimately, he envisions leveraging his industry experience
    to launch a small, community‑focused specialty shop that blends his Southeast Asian heritage with New England product lines, providing a curated shopping experience for local families.
