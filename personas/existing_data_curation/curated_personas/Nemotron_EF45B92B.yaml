  skills: '[''Customer Service'', ''POS System Operation'', ''Inventory Management'', ''Merchandising'', ''Sales Analytics'', ''Loss Prevention'', ''Cash Handling'', ''Basic Bookkeeping'', ''Bilingual Communication
