  career_goals: Although he is no longer in the formal workforce, Michael aims to deepen his impact on the Denver community through several personal ambitions. He plans to serve on the board of a local
    arts nonprofit, launch a community garden that integrates sustainable practices with public art installations, and curate a rotating exhibition space in the neighborhood center to showcase emerging
    artists. He also hopes to mentor younger professionals and volunteers, sharing his project‑leadership experience while encouraging unconventional thinking. In his later years, Michael aspires to write
    a memoir that weaves together his industrial career, artistic pursuits, and the cultural evolution of the Denver region, and to travel to world‑renowned museums and historic sites to broaden his artistic
    perspective.
