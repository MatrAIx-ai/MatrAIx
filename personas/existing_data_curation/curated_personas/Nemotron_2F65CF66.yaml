personas:
  professional: Michael Sbaity, a seasoned operations overseer turned community arts catalyst, leverages his decades of project‑management, budgeting, and volunteer‑coordination expertise—alongside his
    hands‑on carpentry and horticultural know‑how—to orchestrate public‑art garden installations and mentor emerging creatives, all while balancing meticulous organization with a curiosity‑driven openness
    to unconventional ideas, and they consistently apply the same steady focus to every new venture.
  sports: Michael Sbaity stays active by joining the Denver Hiking Club for weekend foothill treks, practicing light yoga at the community center, and cheering on the Denver Broncos and Colorado Rockies
    while occasionally coaching a local senior pickleball league, and they balance their love of nature with a low‑impact fitness routine that respects their back.
  arts: Michael Sbaity immerses themselves in the arts by curating weekly watercolor sessions inspired by Georgia O’Keeffe, photographing Colorado light in the style of Ansel Adams, volunteering on set
    design for the Denver Center for the Performing Arts, and collecting mid‑century modern furniture that echoes the sleek lines of Charles and Ray Eames, while they also attend Philip Glass concerts and
    local gallery openings.
  travel: Michael Sbaity plans their travels with meticulous itineraries that blend art‑focused pilgrimages—like revisiting the Louvre in Paris, the Uffizi in Florence, and the Prado in Madrid—with relaxed
    stays at Southwestern retreats such as Santa Fe and Sedona, while their budding Spanish studies shape an upcoming road‑trip through Andalusia’s historic Alhambra and Granada, and they balance cultural
    immersion with the comfort of well‑researched logistics.
  culinary: Michael Sbaity, an intermediate home chef, delights in crafting Mediterranean paella brimming with saffron‑infused rice and fresh calamari alongside Southwestern grilled cactus tacos seasoned
    with chipotle and cilantro, often harvesting heirloom tomatoes and chilies from their organic garden to perfect the balance of rosemary, smoked paprika, and tangy lime, and they regularly experiment
    with new spice blends while occasionally burning the garlic in their eagerness.
  core: Michael Sbaity blends a disciplined project‑manager’s precision with a perpetual curiosity for art and nature, turning every garden plot, antique find, and community exhibition into a canvas—though
    they occasionally overbook their calendar and forget to water their beloved tomatoes on travel days.
background:
  cultural: Michael is a white American who grew up in the Midwest before relocating to Denver, Colorado, where he has lived for the past two decades. His upbringing instilled a solid work ethic and a respect
    for community, while his Colorado residency introduced him to a culture that values outdoor recreation, environmental stewardship, and a vibrant, progressive arts scene. He actively embraces the regional
    blend of rugged mountain heritage and urban creativity, and he honors the Native American history of Arapahoe County by supporting local preservation initiatives. Michael’s cultural identity is shaped
    by a synthesis of Midwestern practicality, Colorado’s love of nature and the outdoors, and a deep appreciation for diverse artistic expressions.
