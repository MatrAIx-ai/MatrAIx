  career_goals: Jose aims to attend a high-school program focused on visual arts and later study digital media, animation, or game design at a college. He dreams of becoming an animator or interactive game
    developer who creates immersive stories that incorporate his Puerto Rican heritage. In the short term, he wants to build a portfolio of original comics and small video-game projects to apply for art-focused
    scholarships. Ultimately, he hopes to lead a creative studio or community art initiative that mentors other Latino youth and produces culturally resonant media.
