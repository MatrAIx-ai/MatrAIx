personas:
  professional: Susan Pursell is a budding robotics enthusiast who combines a practical, hands‑on approach to programming sensor‑based projects in her school’s robotics club with the same curiosity she
    applies to designing intricate Minecraft worlds, and they often channel their competitive spark into both solo tinkering and multiplayer gaming.
  sports: Susan Pursell enjoys weekend hikes in the Garden of the Gods and seasonal snowshoeing trips with the school’s outdoor club, often cheering for the Colorado Avalanche and Colorado Rockies while
    they favor a flexible, low‑key fitness routine that balances competitive trail runs with occasional yoga to offset their stress‑prone nature.
  arts: Susan Pursell sketches sun‑lit rock formations in a battered notebook and posts the drawings alongside mood‑filled Instagram stories featuring indie musicians like Phoebe Bridgers and Tame Impala,
    letting their artistic side soothe the competitive edge that drives both their gaming and robotics projects.
  travel: Susan Pursell prefers spontaneous road trips to the nearby Rocky Mountain foothills and the historic town of Durango, yet dreams of backpacking through the Swiss Alps and visiting Japan’s cherry‑blossom
    festivals, planning each adventure around school breaks and the limited budget they stretch with savvy saving habits.
  culinary: Susan Pursell loves the smoky flavor of backyard barbecue ribs seasoned with a blend of smoked paprika and brown sugar during Fourth of July gatherings, while also enjoying quick, comforting
    meals like mac & cheese with a side of fresh spinach, and they occasionally experiment with trail‑mix granola bars spiced with honey and chia seeds.
  core: Susan Pursell is a curiosity‑driven, competitive teen who balances mountain hikes, Minecraft world‑building, and a constant buzz of worry into a uniquely pragmatic yet creatively restless outlook
    on life.
background:
  cultural: Susan grew up in a suburban neighborhood of Colorado Springs, a city known for its proximity to the Rocky Mountains and a strong military presence due to several nearby bases. Her family’s roots
    trace back to Midwestern farmers who moved west in the 1970s, fostering values of self‑reliance, outdoor recreation, and a pragmatic approach to education. The multicultural mix of the military community
    has exposed her to diverse perspectives, while family traditions include celebrating holidays such as Thanksgiving and the Fourth of July with gatherings that often feature outdoor barbecues. Frequent
    weekend trips to the mountains and visits to local museums—like the United States Air Force Academy and the Colorado Springs Pioneers Museum—have cultivated an appreciation for both natural beauty and
    historical heritage, shaping her balanced view of innovation and tradition.
