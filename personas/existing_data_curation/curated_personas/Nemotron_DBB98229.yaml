  career_goals: Susan wants a career that lets her blend her love for the outdoors with her visual storytelling and tech skills. She imagines becoming a wildlife photographer or documentary filmmaker who
    captures Colorado’s mountain ecosystems while using her editing know‑how to craft compelling narratives. At the same time, she is fascinated by interactive media and hopes to study computer science
    to create educational games that teach environmental stewardship. She aims to earn a scholarship that supports field research, win regional eSports tournaments, and eventually work as a freelance media
    creator, giving her the flexibility to balance structured projects with spontaneous exploration and to manage stress through a self‑directed schedule.
