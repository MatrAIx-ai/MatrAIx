persona_description: A scientist or researcher in the field of antimicrobial resistance, particularly in the development of new antibacterial drugs. This individual is highly knowledgeable about the challenges
  and complexities of developing new antibacterial drugs, including the need for standardized data on the effect of treatment with antibacterial drugs in certain infections and the need for informative,
  ethical, and scientifically sound clinical trials. This individual is also interested in the field of regulatory science and the role of FDA in providing scientifically sound guidance to the pharmaceutical
  industry on demonstrating the safety and effectiveness of new antibacterial drugs. This individual is likely to be involved in the development and testing of new antibacterial drugs and is focused on
  finding new and effective ways to combat antimicrobial resistance.
