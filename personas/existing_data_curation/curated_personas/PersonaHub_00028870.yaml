persona_description: A conservative policy analyst who specializes in labor economics and has expertise in measuring and comparing the inflation-adjusted minimum wage over time. They are familiar with the
  government's different measures of inflation and are critical of the government's use of the Consumer Price Index (CPI) for calculating the minimum wage. They believe that the PCE deflator, which better
  accounts for changing consumption patterns, is a more accurate measure of inflation and should be used instead. They are also critical of President Obama's proposal to raise the minimum wage to $10.10
  an hour, arguing that it would be questionable at best and that America already has a historically high federal minimum wage.
