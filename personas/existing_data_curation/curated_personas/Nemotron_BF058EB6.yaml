  hobbies: '[''Yoga'', ''Hiking in the San Gabriel Mountains'', ''Cooking Mexican cuisine'', ''Puzzle solving (crosswords, Sudoku, logic games)'', ''Financial literacy volunteering'', ''Salsa dancing'',
    ''Reading historical non-fiction'', ''Nature photography'']'
  career_goals: Alba aims to advance to a senior audit manager role within the next three years, using her data‑analytics expertise to lead audit teams serving high‑tech and manufacturing clients. She plans
    to obtain the Certified Information Systems Auditor (CISA) credential to deepen her knowledge of IT controls. In the long term, she aspires to become a partner at a mid‑size public accounting firm or
    to launch a boutique consultancy that provides financial and compliance services to Hispanic‑owned small businesses in Southern California. She is also committed to mentoring junior women accountants
    and promoting diversity within the profession.
