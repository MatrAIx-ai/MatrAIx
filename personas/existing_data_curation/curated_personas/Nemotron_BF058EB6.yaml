personas:
  professional: Alba Guazzelli, a CPA specializing in forensic accounting and SOX compliance, blends her STEM‑rooted analytical rigor with advanced Excel modeling, SQL data extraction, and Tableau visualizations
    to streamline audit workflows for high‑tech and manufacturing clients while mentoring junior women accountants and championing structured, data‑driven decision‑making.
  sports: Alba Guazzelli hikes with the Los Angeles Hiking Club in the San Gabriel Mountains, practices Vinyasa yoga three times weekly at her neighborhood studio, cheers for the LA Lakers, LA Dodgers,
    and LA Galaxy, and participates in a co‑ed recreational softball league each summer, blending disciplined training with occasional spontaneous trail runs.
  arts: Alba Guazzelli’s evenings often echo the vibrant rhythms of Celia Cruz and Marc Anthony on salsa nights, while her nature photography seeks the dramatic chiaroscuro of Ansel Adams, and her bookshelf
    proudly displays historical nonfiction by Doris Kearns Goodwin and the bold brushstrokes of Frida Kahlo, weaving artistic appreciation into her restorative downtime.
  travel: Alba Guazzelli prefers meticulously planned road trips—having conquered the Pacific Coast Highway to Monterey and a weekend escape to Sedona’s red rocks—yet dreams of immersive cultural excursions
    in Kyoto’s historic districts and Oaxaca’s vibrant markets, balancing adventure with the practicalities of her demanding audit schedule.
  culinary: Alba Guazzelli, an avid home chef, perfects mole negro with dark chocolate, toasted sesame seeds, and dried ancho chiles while crafting tamales from masa harina and adding a dash of smoked paprika
    for a modern twist, yet sometimes forgets to defrost the chicken in time for dinner, leading to last‑minute pantry improvisations.
  core: Alba Guazzelli blends analytical precision with solo mountain hikes, methodical budgeting, and salsa‑filled evenings, balancing a love for structure with spontaneous culinary experiments, though
    she occasionally overbooks her calendar.
background:
  cultural: Alba was raised in a Mexican‑American household in Southern California, where family celebrations, food, and bilingual communication were central. Her parents emigrated from Jalisco, and she
    grew up speaking Spanish at home while attending English‑language schools. The cultural emphasis on perseverance, community support, and respect for elders shaped her work ethic and collaborative style.
    She participates in traditions such as Día de los Muertos and shares Mexican holiday foods with colleagues. Her heritage informs her professional focus on serving the Hispanic business community, and
    she remains actively involved in local Mexican cultural festivals and the Los Angeles Mexican Chamber of Commerce.
attributes:
  skills: '[''Financial reporting'', ''Tax preparation and compliance'', ''External audit'', ''Internal audit and control testing'', ''Risk assessment and SOX compliance'', ''Data analytics (Excel, SQL,
