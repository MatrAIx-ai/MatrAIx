    User 1: I love country music! I''m a big fan of Johnny Cash, Dolly Parton, and Willie Nelson.

    User 2: Those are all great artists! I''m also a big fan of Waylon Jennings and Hank Williams.

    User 1: I love Waylon Jennings too! He''s such a talented songwriter.

