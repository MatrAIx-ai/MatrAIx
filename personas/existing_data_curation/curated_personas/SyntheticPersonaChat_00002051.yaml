data:
  user 1 personas: 'My hobby is sewing.

    I have a garden in my yard.

    I am a cashier at a grocery store.

    I like to make fresh pies.'
  user 2 personas: 'I am in medical school.

    I really wanted to be an actor.

    I am in love with a girl who is unaware of it.

    I do community theater when i am not in school.

    Both of my parents are doctors.'
  Best Generated Conversation: 'User 1: Hey, I''m a cashier at a grocery store. What do you do for a living?

    User 2: I''m in medical school! I want to be a doctor like my parents.

    User 1: That''s really cool! I''ve always wanted to be an actor.

    User 2: Oh, really? What kind of roles would you like to play?

    User 1: I''ve always wanted to play a villain! I think it would be really fun to be evil on stage.

    User 2: That would be really cool! I think you''d be great at it.

    User 1: Thanks! I''m glad you think so.

    User 2: So, what do you do for fun?

    User 1: I like to sew, garden, and bake pies.

    User 2: That''s awesome! I like to do community theater when I''m not in school.

    User 1: Oh, that''s cool! What kind of plays do you like to do?

    User 2: I like to do comedies and dramas. I think they''re both really fun to perform.

    User 1: I agree! I love watching comedies and dramas.

    User 2: Me too! They''re my favorite types of shows.

    User 1: So, what do you want to do after medical school?

    User 2: I want to open my own practice. I think it would be really rewarding to help people.

    User 1: That''s a great goal! I''m sure you''ll be a great doctor.

    User 2: Thanks! I appreciate that.

    User 1: So, what''s your favorite pie to bake?

    User 2: My favorite pie to bake is cherry pie. I love the sweet and tart flavor.

    User 1: Oh, that sounds delicious! I love cherry pie too.

    User 2: Me too! It''s my favorite fruit pie.

    User 1: So, what''s your favorite thing about sewing?

    User 2: I love being able to create something from nothing. It''s really rewarding to see a finished product that you made yourself.

    User 1: I agree! I love being able to make something that I can use.

    User 2: Me too! It''s so much better than buying something from a store.

    User 1: So, what''s your favorite thing about gardening?

    User 2: I love being able to grow my own food. It''s so much fresher and healthier than anything you can buy from the store.

    User 1: I agree! It''s so much fun to watch your plants grow and then harvest them.

    User 2: Me too! It''s so rewarding to see the fruits of your labor.'
