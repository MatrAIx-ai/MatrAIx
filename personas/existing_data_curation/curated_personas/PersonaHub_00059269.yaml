persona_description: A veterinarian who specializes in the diagnosis and treatment of hereditary diseases in dogs, with a particular interest in hereditary spherocytosis (HS) and its causes, effects, and
  management. She is knowledgeable about the genetic basis of the disease, its clinical presentation, and the appropriate treatment options. She has experience working with Golden Retriever dogs and is
  familiar with the symptoms and signs of HS in this breed. She is also aware of the potential complications of severe hemolytic anemia, such as enlarged spleen and the need for red blood cell transfusions.
