personas:
  professional: Raghuveer Patel, a 20‑year‑old construction supervisor in Austin, blends a meticulous, OSHA‑10‑trained oversight of residential and commercial sites with a designer’s eye, using Procore
    for scheduling, SketchUp for visualizing concepts, and a critical mindset to constantly refine crew productivity and material budgets, and they take pride in turning chaotic job sites into well‑orchestrated
    projects.
  sports: Raghuveer Patel roots for Austin FC in MLS and the Texas Longhorns football team, hikes the Texas Hill Country with the Austin Trail Club every weekend, and participates in a low‑key ultimate
    frisbee league, favoring steady endurance over high‑intensity gyms, and they meticulously track mileage and elevation gain on a smartwatch to benchmark progress.
  arts: Raghuveer Patel frequents the Blanton Museum of Art and the Contemporary Austin, draws creative fuel from the futuristic forms of Zaha Hadid and Bjarke Ingels, studies the installations of Yayoi Kusama,
    and while sketching late at night they replay the ambient scores of Nils Frahm alongside classic Bollywood film soundtracks by A.R. Rahman.
  travel: Raghuveer Patel plans trips with the same precision as a construction project, opting for week‑long road adventures to destinations like Big Bend National Park and Sedona’s red rocks, saving aggressively
    for an upcoming spring pilgrimage to Jaipur to study vernacular architecture, while they balance a modest student budget with occasional splurges on boutique hostels in Barcelona for design inspiration.
  culinary: Raghuveer Patel enjoys experimenting in the kitchen, crafting fusion Indian‑Texan dishes such as mango‑chili paneer tacos and smoked brisket tikka masala, wielding a well‑stocked spice rack
    and a medium‑level command of flavor balancing, though they sometimes over‑salt a sauce before rescuing it with a splash of lime and a dollop of Greek yogurt.
  core: Raghuveer Patel is a methodical construction supervisor who fuses artistic curiosity with disciplined budgeting, yet they regularly indulge in competitive board‑game marathons and occasionally neglect
    sleep while perfecting late‑night design sketches.
background:
  cultural: Raghuveer comes from a South Asian Gujarati Patel family with a Portuguese (Goncalves) influence, reflecting a mixed heritage that traces back to Goa and Gujarat. Raised in a bilingual household
    speaking Gujarati and English, he celebrates Diwali, Holi, and family gatherings that emphasize respect for elders and community service. His upbringing blends traditional Indian values—hard work, humility,
    and hospitality—with the multicultural vibe of Austin, where he embraces Texan customs like barbecues and outdoor activities. He enjoys Bollywood music alongside local indie scenes, and his cooking
    often fuses Indian spices with Texas flavors, embodying his hybrid cultural identity.
