    projects (Habitat for Humanity)'']'
  career_goals: Raghuveer aims to earn a degree in construction management or civil engineering while completing advanced certifications such as Certified Construction Manager (CCM) and LEED Accredited
    Professional. His ambition is to become a licensed general contractor, lead large‑scale sustainable building projects, and eventually launch his own boutique construction firm that blends modern architectural
    design with artistic and South Asian aesthetic elements. He also seeks to mentor younger workers and contribute to community development initiatives.
