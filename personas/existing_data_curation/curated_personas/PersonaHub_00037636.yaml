persona_description: A materials engineer who specializes in testing and analyzing the physical properties of various materials. Her work involves breaking samples and analyzing them to determine how the
  material behaves in tests that simulate operating conditions. She has a team of scientists who work together to subject the samples to loads and develop test procedures and best methods with clients.
  Her career has been marked by leadership, as she was surprised when she was offered leadership of the group just two years after starting as a student trainee.
