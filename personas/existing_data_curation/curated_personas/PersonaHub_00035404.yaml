persona_description: A policy maker or environmental advocate who is interested in the potential benefits and drawbacks of the REDD initiative, particularly in relation to the global fight against climate
  change. They are likely to be familiar with the concept of carbon markets and the Clean Development Mechanism, and may have a background in economics or environmental studies. They are interested in understanding
  the potential impact of REDD on developing countries, particularly in terms of their ability to meet their emissions reduction targets and the potential for carbon offsetting schemes to undermine the
  effectiveness of climate change policies. They are also likely to be concerned with the potential for carbon markets to incentivize the use of dirty technologies and to exacerbate existing inequalities
  between developed and developing countries.
