  hobbies: '[''watercolor painting'', ''visiting small art galleries'', ''listening to jazz and blues'', ''cooking soul‑food'', ''knitting and quilting'', ''urban balcony gardening'', ''participating in
    a biography book club'', ''street photography'', ''community storytelling circles'', ''attending intimate dinner gatherings'']'
  career_goals: Jennifer aspires to become a respected community archivist and oral historian for Chicago’s South Side, preserving stories of Black families and local artists. She plans to curate a traveling
    exhibition of photographs and personal narratives, partner with the Chicago History Museum for a public program, and publish a memoir of her experiences. Additionally, she hopes to launch a small workshop
    series teaching watercolor painting and storytelling to teens, aiming to earn a community leadership award. On a personal level, she is committed to improving her emotional wellbeing through mindfulness
    practice and building a supportive network of close friends.
