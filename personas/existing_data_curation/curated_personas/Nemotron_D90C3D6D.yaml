personas:
  professional: Jennifer Rhymes, a neighborhood-focused archivist-in-training, channels her meticulous budgeting and event‑planning skills into a mission to document and share the artistic and familial
    narratives of Chicago’s South Side through oral histories, traveling photo exhibitions, and collaborative workshops, while her competitive nature drives her to seek community leadership recognition.
  sports: Jennifer Rhymes follows the Chicago Bulls and Chicago White Sox, enjoys weekly senior yoga classes at a community center, and prefers walking the lakefront with a small group of friends over attending
    large stadium events, using these low‑key activities to stay fit while avoiding the intensity of competitive sports.
  arts: Jennifer Rhymes immerses themselves in watercolor painting, analog street photography, and a curated collection of vintage jazz and blues recordings by artists such as Miles Davis, Billie Holiday,
    and B.B. King, regularly attending intimate gallery openings by contemporary painters like Kehinde Wiley and leading a book club that discusses biographies of artists and activists.
  travel: Jennifer Rhymes favors carefully planned short trips, such as weekend visits to New Orleans for its music heritage, day trips to Milwaukee’s historic districts, and a yearly pilgrimage to the
    Smithsonian Folkways Museum in Washington, D.C., balancing a modest travel budget with a deep desire for cultural immersion.
  culinary: Jennifer Rhymes, a skilled home cook, often prepares collard greens seasoned with smoked turkey, honey‑buttered cornbread, sweet‑potato pie, and a hearty gumbo flavored with okra and thyme from
    their balcony garden, delighting friends at intimate dinner gatherings where they share stories over these comforting dishes.
  core: Jennifer Rhymes is a curious, detail‑oriented community archivist‑to‑be who balances artistic pursuits, disciplined budgeting, and a cautious health regimen with a competitive streak and a tendency
    toward worry.
background:
  cultural: Jennifer was born and raised on Chicago’s South Side in a close‑knit African‑American community that placed a strong emphasis on church, family, and cultural pride. Her grandparents were part
    of the Great Migration, bringing Southern culinary traditions, gospel music, and a deep respect for oral history. Growing up, she participated in local church choirs, community festivals, and neighborhood
    art projects, which fostered her appreciation for Black artistic expression. The city’s rich museums, jazz clubs, and grassroots cultural organizations have shaped her identity, and she remains actively
    engaged in preserving the heritage of her community while navigating the challenges of urban life.
