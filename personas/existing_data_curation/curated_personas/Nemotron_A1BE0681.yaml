personas:
  professional: Valerie Harris is a budding LEGO architect who designs elaborate, story‑driven constructions, applying a practical eye for structural stability while letting imagination guide the narrative,
    a balance that mirrors their curiosity‑driven yet methodical approach to school projects.
  sports: Valerie Harris plays forward for the Greenfield Elementary soccer team, trains with the local youth club Little Strikers, and ardently follows the professional women's soccer team Manchester City,
    balancing competitive spirit with teamwork and a love for weekend park games.
  arts: Valerie Harris spends afternoons drawing detailed illustrations of Harry Potter and Minecraft characters, listening to the pop songs of Billie Eilish while sketching, and attending the school’s
    art club where they experiment with watercolors, weaving personal creativity into a structured artistic routine.
  travel: Valerie Harris has explored the rolling hills of the Lake District on family hikes, camped under the stars in Snowdonia, and dreams of a future trip to the Great Barrier Reef, preferring hands‑on
    nature experiences that blend discovery with a love for collecting leaves and birdwatching.
  culinary: Valerie Harris delights in preparing homemade pizza topped with mozzarella, pepperoni, and fresh basil, enjoys crunchy carrot sticks with hummus, and often attempts to bake chocolate chip cookies,
    balancing a budding cooking curiosity with a preference for quick, familiar flavors.
  core: Valerie Harris is a curious, organized nine‑year‑old who blends imagination with practicality, whether building LEGO worlds, managing a pocket‑money stash, or tackling school soccer, all while staying
    emotionally steady and occasionally forgetting to put away their art supplies.
background:
  cultural: Valerie grew up in a white, Midwestern family in Syracuse, Indiana. Her upbringing reflects the region’s emphasis on community, modesty, and self‑reliance. She attends a local Methodist church
    with her family, celebrates holidays such as Thanksgiving with traditional meals and a focus on gratitude, and participates in community events like the Kosciusko County fair and the town’s seasonal
    corn‑maze festivities. Family gatherings often include backyard barbecues and stories about local history, reinforcing a sense of belonging and practical values.
attributes:
  skills: '["Reading comprehension", "Creative writing", "Elementary arithmetic", "Basic coding with Scratch", "Organizational skills", "Team collaboration", "Problem solving with puzzles", "Hands‑on science
