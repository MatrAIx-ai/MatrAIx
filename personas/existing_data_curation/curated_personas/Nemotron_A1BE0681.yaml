  hobbies: '["Reading adventure books", "Drawing and sketching", "LEGO building", "Biking around the neighborhood", "Nature walks with family", "Soccer practice", "Science club projects", "Playing piano"]'
  career_goals: Valerie is fascinated by animals and often says she wants to be a veterinarian when she grows up, hoping to help pets and wildlife. She also enjoys building things with LEGO and imagines
    a future as an engineer who designs tools that make daily life easier. In school she aspires to be a class representative, a role that lets her combine her cooperative nature with assertiveness to improve
    her classroom environment.
