persona_description: An engineer in the Air Force F-16 Program Office who has expertise in the field of electronics and is interested in modifying commercial circuits into high-temperature, high-reliability
  circuits. He has experience in working with the Air Force Research Laboratory on a test that proved the commercial process satisfied military specifications and has spearheaded Rapid Innovation Fund projects
  that resulted in a wide variety of parts successfully modified. He is currently working to make the process part of the military specification and has remanufactured over 150,000 parts with this technology.
