  career_goals: He aims to become a recognized leader in adult and community college education by developing innovative, technology-enhanced curricula that provide flexible pathways for non-traditional
    learners. He wishes to mentor junior faculty, contribute scholarly work on culturally responsive teaching, and shape institutional policies that prioritize student well-being while preserving his own
    work-life balance. Over the next five years, he hopes to design a flagship hybrid program and earn a promotion to program director or senior lecturer.
