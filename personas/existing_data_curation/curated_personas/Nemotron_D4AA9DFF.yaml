personas:
  professional: Elizabeth Chiu is an aspiring civil engineering student who blends her bilingual fluency, meticulous project planning, and competitive debate experience to lead community‑driven water infrastructure
    projects, embodying methodical analysis and pragmatic creativity.
  sports: Elizabeth Chiu plays forward for the Guadalupe County Youth Soccer Club in the Texas Youth Soccer League, follows the Dallas Cowboys and Houston Astros, and incorporates salsa and folkloric dance
    classes into her weekly fitness routine, approaching training with strategic discipline and a competitive edge.
  arts: Elizabeth Chiu enjoys performing folkloric dance to the rhythms of Lila Downs and Marc Anthony, attends local theater productions of Lin‑Manuel Miranda's works, and curates playlists featuring Celia
    Cruz and contemporary pop artist Ariana Grande, letting music and movement shape her social identity.
  travel: Elizabeth Chiu has explored San Antonio's River Walk and a weekend trip to Mexico City, dreams of studying sustainable architecture in Barcelona, and prefers meticulously planned itineraries that
    balance cultural immersion with budget‑friendly hostels, often traveling with friends from debate club.
  culinary: Elizabeth Chiu loves cooking traditional dishes like tacos al pastor, mole poblano, and fresh salsa verde, skillfully blends ingredients such as chipotle peppers, corn masa, and quinoa, and
    frequently shares these meals at community festivals, though she sometimes over‑salts in her eagerness to impress.
  core: Elizabeth Chiu is a fiercely organized, bilingual teen who channels her competitive spirit into civil engineering ambitions, community events, and spirited debates, while occasionally neglecting
    sleep to squeeze in soccer practice and salsa lessons.
background:
  cultural: Elizabeth is a first-generation Mexican-American raised in Seguin, Texas. She grew up in a bilingual household where Spanish is spoken at home and English at school, fostering fluency in both
    languages. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco de Mayo, and Catholic holidays with communal meals and music. The close-knit Mexican community
    in Guadalupe County instilled values of family loyalty, hard work, and collective responsibility, shaping her outlook and motivating her desire to give back through culturally informed projects.
attributes:
  skills: '[''Organizational planning'', ''Event coordination'', ''Project management basics'', ''Bilingual communication (English-Spanish)'', ''Team leadership'', ''Analytical problem solving'', ''Public
