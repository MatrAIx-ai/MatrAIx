  hobbies: '[''Playing soccer in a local youth league'', ''Salsa and folkloric dance classes'', ''Cooking traditional Mexican dishes'', ''Volunteering at community cultural festivals'', ''Participating
    in school debate club'', ''Reading science and technology magazines'', ''Solving puzzles and strategy board games'']'
  career_goals: She aims to enroll in a civil engineering program at a Texas university, focusing on sustainable water infrastructure for her hometown. Leveraging her organized approach and competitive
    drive, she plans to graduate with honors and secure internships that blend technical expertise with community outreach. Long-term, Elizabeth envisions becoming a project manager who leads bilingual
    teams to design and implement resilient public works that benefit the Mexican-American population of Guadalupe County.
