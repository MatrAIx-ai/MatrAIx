  hobbies: '[''Reading books (fantasy and animal stories)'', ''LEGO construction'', ''Drawing and sketching wildlife'', ''Nature walks and birdwatching'', ''Caring for pet hamster'', ''Jigsaw puzzle solving'',
    ''Board games (Connect Four)'', ''Weekly art class'']'
  career_goals: Kristen dreams of becoming a veterinarian because she loves caring for her pet hamster and wants to ensure animals stay healthy. She also imagines herself as an environmental scientist who
    studies wildlife habitats, a path that blends her curiosity about nature with her practical desire to protect the planet. Additionally, she likes the idea of being a teacher someday, using her organized
    habits to help younger classmates stay on track with their learning. Her concern about making mistakes fuels a desire for careers where careful, responsible work makes a positive difference.
