personas:
  professional: A budding naturalist and organized problem‑solver, Kristen Byrne spends weekends cataloguing bird sightings in a small notebook, building detailed LEGO habitats for her hamster, and dreaming
    of a future career in wildlife conservation.
  sports: A member of the local YMCA kids swim class and the U7 community soccer league, Kristen Byrne enjoys sprinting across the grass during weekend family hikes, cheers for the Chicago Cubs on TV, and
    prefers low‑key games of backyard tag over large crowd sports.
  arts: An enthusiastic young artist, Kristen Byrne attends a weekly community art class where she paints owls and forest scenes, admires the illustrations of Beatrix Potter, enjoys listening to Jack Johnson’s
    acoustic songs while drawing, and collects stickers of her favorite fantasy characters.
  travel: An inquisitive explorer, Kristen Byrne has trekked through Yellowstone National Park on a family road trip, marveled at the geysers and bison, visited the local botanical garden’s butterfly exhibit,
    and dreams of sailing to the Great Barrier Reef with her parents someday.
  culinary: A selective eater with growing curiosity, Kristen Byrne loves classic mac and cheese and pepperoni pizza, reaches for carrot sticks with hummus and apple slices with peanut butter as a healthy
    snack, helps whisk pancake batter on weekend mornings, and always asks for extra strawberries on top.
  core: A methodical young naturalist who balances curiosity with caution, Kristen Byrne meticulously documents wildlife, saves carefully, and navigates stress with a well‑kept notebook.
background:
  cultural: Kristen grows up in a middle‑class family in West Valley City, Utah, a suburb of Salt Lake City where the community is heavily influenced by Western and Latter‑day Saint cultural values. Her
    family emphasizes education, modesty, service, and respect for nature. She regularly participates in school‑organized service projects, celebrates holidays such as Thanksgiving and the 4th of July with
    family traditions that include community picnics, and enjoys outdoor activities like hiking in the nearby Wasatch Mountains. The local culture encourages a balance of individual responsibility and community
    involvement, shaping her organized and cooperative personality.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Organizational planning (using a planner)'', ''LEGO building'', ''Tablet/educational app proficiency'',
