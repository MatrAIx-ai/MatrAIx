  career_goals: She aspires to transform her artistic passion into a sustainable livelihood. In the next few years, Ginger plans to obtain a GED, then enroll in a community-college certificate program in
    visual arts or graphic design. Her long-term ambition is to open a modest studio/gallery in Buffalo where she can host workshops, display local artists, and sell her own work. She also hopes to launch
    a freelance consultancy that helps community groups design low-budget visual projects, leveraging her event-planning and budgeting background. Alongside financial independence, she wants her studio
    to become a welcoming space that encourages unconventional thinking and artistic exploration.
