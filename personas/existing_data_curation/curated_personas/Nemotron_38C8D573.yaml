personas:
  professional: Craig Colhouer, an ambitious electrician and emerging smart‑home specialist, blends journeyman mastery of the National Electrical Code with a hands‑on curiosity for custom LED rigs, Arduino
    prototypes, and solar retrofits, delivering reliable tech‑forward installations while their relaxed, occasionally disorganized workflow favors spontaneous problem‑solving over rigid planning.
  sports: Craig Colhouer spends weekends hauling a rod to the Missouri River with the Missouri River Anglers club, trekking the Loess Hills as part of the Loess Hills Hiking Society, and they cheer on the
    Kansas City Chiefs and St. Louis Blues from the comfort of their garage while staying fit through occasional DIY calisthenics and pickup basketball games at the local community center.
  arts: Craig Colhouer immerses themselves in the futuristic vibes of Vangelis’ Blade Runner soundtrack and the electronic minimalism of Kraftwerk while devouring Philip K. Dick’s novels, and they catch
    indie sci‑fi film screenings at the local micro‑cinema on rare evenings, blending a hands‑on hobbyist spirit with a taste for retro‑futuristic art.
  travel: Craig Colhouer favors low‑key road trips that merge outdoor adventure with tech inspiration, having already trekked the Badlands and camped near Yellowstone, while dreaming of an Icelandic tour
    of geothermal power plants and a weekend hackathon‑fuelled getaway to Tokyo’s Akihabara district, but they budget the trips around the cash flow needed for their upcoming electrician licensing exams.
  culinary: Craig Colhouer cooks a straightforward yet hearty menu of river‑caught catfish dusted with smoked paprika, paired with barley risotto seasoned with fresh lemon zest, and they unwind by sipping
    a locally brewed IPA while tinkering with a custom LED back‑lit cutting board that doubles as a mood light.
  core: Craig Colhouer is a solitary, curiosity‑driven electrician who blends meticulous hand‑crafted wiring with midnight LED experiments, hoards vintage radios, and habitually forgets to file taxes on
    time because their mind is always wired to the next project.
background:
  cultural: Craig grew up in a middle-class family in Omaha, Nebraska, where practical trades are respected and self-reliance is a core value. His upbringing reflects the Midwestern work ethic of punctuality,
    modesty, and community involvement, though he tends to keep a low social profile. The region’s blend of agricultural roots and growing urban development exposed him to both traditional hand-skill occupations
    and newer renewable-energy initiatives, shaping his appreciation for tried-and-true methods while remaining open to innovative technologies.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical systems'', ''National Electrical Code compliance'', ''Troubleshooting and diagnostics'', ''Blueprint and schematic reading'', ''Solar
    photovoltaic installation'', ''Smart-home automation basics'', ''Programmable Logic Controller (PLC) basics'', ''Tool maintenance and safety'', ''Customer communication and service'']'
  hobbies: '[''DIY LED lighting projects'', ''Arduino home-automation experiments'', ''Vintage radio repair'', ''Fishing on the Missouri River'', ''Hiking in the Loess Hills'', ''Strategy video games'',
    ''Science-fiction reading'', ''Small-group DIY electronics meet-ups'']'
  career_goals: He aims to earn his Master Electrician license within the next two years, followed by obtaining a contractor’s license so he can launch his own electrical services firm specializing in renewable-energy
    retrofits and smart-home upgrades. Craig wants to build a reputation for high-quality, reliable work that blends traditional craftsmanship with cutting-edge technology, allowing him to compete for larger
    commercial contracts while maintaining the flexible schedule he values.
