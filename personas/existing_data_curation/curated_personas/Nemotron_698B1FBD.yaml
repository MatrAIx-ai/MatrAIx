personas:
  professional: Mary Franco is a seasoned carpenter turning their decade‑long hands‑on experience into a future eco‑friendly historic renovation business, blending traditional joinery with modern digital
    layout tools while managing projects with meticulous organization, flexible problem‑solving, and a competitive drive that pushes them to enter regional trade‑craft contests.
  sports: Mary Franco anchors third base for the Shamokin Sluggers softball league, cheers on the Pittsburgh Steelers on Sundays, and joins the Northumberland County Trailblazers hiking club to trek the
    Appalachian foothills each weekend.
  arts: Mary Franco devours Agatha Christie mysteries while the classic rock station spins The Rolling Stones and Led Zeppelin, and they regularly visit the Shenandoah Arts Center to admire local folk art
    and craft fairs that inspire their custom furniture designs.
  travel: Mary Franco prefers weekend road trips that balance discovery and cost, having explored the historic streets of Gettysburg, the vibrant craft scene of Asheville, North Carolina, and the bustling
    trade shows in Chicago, while dreaming of a future study tour of sustainable timber workshops in Scandinavia.
  culinary: Mary Franco whips up Sunday family Italian meals—hand‑rolled fettuccine al pesto, slow‑cooked Bolognese ragù, and ricotta‑filled cannoli—showcasing a solid home‑cooking skill set and a preference
    for fresh basil, San Marzano tomatoes, and aged Parmigiano.
  core: Mary Franco fuses a carpenter’s precision with a restless curiosity, channeling high‑energy sociability into community projects while battling bouts of anxiety that fuel both their drive and occasional
    over‑commitment.
background:
  cultural: Mary grew up in a working‑class, white Italian‑American family in Shamokin, Pennsylvania. Her parents emphasized hard work, Catholic values, and community involvement, typical of the region’s
    coal‑town heritage. The local culture’s blend of Appalachian resilience and immigrant craftsmanship shaped her practical yet inquisitive mindset. She maintains strong ties to family and the close‑knit
    neighborhood, celebrating cultural traditions such as holiday feasts and parish festivals while also embracing the broader Pennsylvanian ethos of self‑reliance and pride in trade skills.
