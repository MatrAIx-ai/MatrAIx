  career_goals: Short‑term, Mary aims to earn a Pennsylvania Journeyman Carpenter credential and complete a certification in sustainable building practices. Within three years she plans to launch a family‑run
    carpentry business specializing in eco‑friendly renovations of historic homes in Northumberland County, leveraging her custom‑furniture expertise to differentiate the brand. She is competitive and intends
    to enter regional trade‑craft contests to gain recognition. Long‑term, Mary aspires to become a licensed general contractor, mentor a larger cohort of apprentices, and author a guidebook on balancing
    traditional craftsmanship with modern technology, all while securing stable income to alleviate her anxiety.
