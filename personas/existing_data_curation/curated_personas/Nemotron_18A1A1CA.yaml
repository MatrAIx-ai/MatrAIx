  career_goals: In retirement, Angie aims to leave a lasting cultural and educational imprint on her community while continuing her personal growth. She plans to curate an annual art‑and‑craft showcase
    in Geneva, highlighting local artists and encouraging experimental creativity. She is working toward completing a family genealogy book and hopes to self‑publish it as both a personal legacy and a resource
    for relatives. Angie intends to enroll in a community‑college art history course and master digital photography and archival techniques to document local history. A key ambition is to establish a cooperative
    community garden that blends sustainable practices with intergenerational mentorship, reflecting her competitive drive to see the project succeed. Additionally, she hopes to travel to major art museums
    in Chicago and New York, expanding her artistic perspective and feeding her curiosity.
