  career_goals: Looking ahead, Erica aims to expand her impact beyond her current facility by leading a regional network of health services that prioritizes equitable care for underserved Hispanic populations
    in Iowa and neighboring states. She aspires to champion the integration of arts-based therapeutic modalities into standard care pathways, and to spearhead telehealth initiatives that increase access
    for rural patients. Erica also plans to mentor emerging health managers, especially women and bilingual professionals, and to eventually transition to a consulting role where she can share best practices
    for culturally responsive health administration. Her long-term ambition includes establishing a community health fellowship that supports students from diverse backgrounds in pursuing careers in health
    services management.
