personas:
  professional: Erica Sardina, a veteran health services manager with over three decades of experience, blends meticulous strategic planning, budget oversight, and multilingual team building with a curiosity
    for unconventional solutions, often championing art‑based therapy and telehealth while they balance a disciplined, organized approach with a flexible, solution‑oriented mindset.
  sports: Erica Sardina enjoys low‑impact fitness like morning walks with the Des Moines Senior Walkers club, occasional community pool laps, and cheering on the Iowa Hawkeyes football team and the Des
    Moines Menace soccer club, while they schedule regular gardening sessions as a form of active exercise.
  arts: Erica Sardina channels their curiosity into weekend oil and watercolor paintings of Midwest horizons, draws inspiration from Claude Monet and Georgia O’Keeffe, regularly visits local galleries and
    the community theater to see productions starring Meryl Streep on screen, collects vintage folk art pieces, and finds solace listening to Bob Dylan while they plan their next canvas.
  travel: Erica Sardina favors thoughtfully planned trips that blend cultural immersion with relaxation, having explored historic towns like Santa Fe and Taos in the Southwest, visited Barcelona’s art districts,
    and taken a family road‑trip through the Great Lakes region, while they balance travel aspirations with retirement budgeting and occasional family obligations.
  culinary: Erica Sardina delights in preparing traditional family dishes such as tamales, pozole, and enchiladas—using fresh masa, hominy, chilies, and herbs harvested from their garden—showcasing a confident
    cooking style, though they sometimes over‑season or end up with extra servings that vanish at community gatherings.
  core: Erica Sardina blends a lifelong love of art, gardening, and health leadership into a uniquely compassionate yet detail‑driven outlook, habitually juggling proactive self‑care with a penchant for
    worry and occasional splurges on creative projects, while they remain steadfastly curious about new ideas.
background:
  cultural: Erica is a second-generation Mexican-American whose family migrated to the Midwest in the 1960s. Raised in a bilingual household in Iowa, she grew up celebrating both Mexican traditions—such
    as Día de los Muertos, quinceañeras, and traditional cuisine—and Midwestern customs like county fairs and community potlucks. Her Catholic upbringing instilled a sense of service and communal responsibility,
    which she carries into her professional life. Erica’s identity bridges Hispanic cultural values of family cohesion, respect for elders, and collectivism with the individualistic, self-reliant ethos
    of rural Iowa, giving her a unique perspective on navigating cultural nuances in health care delivery.
