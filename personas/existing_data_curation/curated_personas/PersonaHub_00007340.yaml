persona_description: A researcher who studies the dynamics of small rodents in the tundra ecosystem of Varanger Peninsula in Svalbard. The researcher is interested in the impacts of climate change on the
  tundra food web and how it affects the ecosystem's function. They focus on the interactions between the three rodent species and the predators that prey on them, and how the rodent cycles affect the vegetation
  and prey species. The researcher is also interested in how the changes in the rodent populations affect the distribution and abundance of generalist predators, and how it affects the availability of ungulate
  prey for these predators.
