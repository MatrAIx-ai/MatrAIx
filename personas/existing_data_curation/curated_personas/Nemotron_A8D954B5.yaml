    ''Independent task management'', ''Clear written financial reporting'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Cooking Peruvian dishes (e.g., ceviche, lomo saltado)'', ''Reading speculative fiction and poetry'', ''Playing
    chess'', ''Hiking in nature reserves'', ''Listening to Andean and folk music'', ''Learning basic Quechua phrases'', ''Journaling'', ''Exploring emerging tech trends in finance'', ''Attending local cultural
    festivals'']'
  career_goals: Aamir plans to enroll in a community‑college associate program in accounting within the next year, followed by a bachelor's degree in finance while continuing part‑time work as a clerk.
    His long‑term ambition is to earn the CPA designation and transition into a senior accountant role, eventually becoming a controller for a mid‑size firm that serves the vibrant multicultural business
    community of Paterson. In parallel, he hopes to launch his own boutique bookkeeping service that caters to Peruvian and other immigrant small businesses, allowing him to give back to his community.
    Aamir also envisions leveraging his love for the arts by managing finances for local galleries or cultural nonprofits, blending his analytical expertise with his artistic interests.
