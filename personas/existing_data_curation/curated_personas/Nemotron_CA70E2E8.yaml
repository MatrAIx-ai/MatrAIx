  career_goals: Veronica aims to move into a supervisory role within the retail environment, seeking a store manager position where she can lead a team, implement training programs, and improve operational
    efficiency. She plans to enroll in a community college business‑administration certificate program to strengthen her managerial skills. In parallel, she dreams of launching a small boutique that sells
    hand‑painted Mexican‑inspired ceramics, textiles, and locally sourced artisanal goods, and to host workshops that empower other Latina artisans in the Yakima Valley.
