  hobbies: '[''Hiking'', ''Gardening'', ''DIY home improvement projects'', ''Volunteering with Habitat for Humanity'', ''Community soccer league'', ''Attending local farmers markets and festivals'', ''Reading
    about sustainable building practices'']'
  career_goals: Katherine aims to advance to a crew foreman or shift supervisor role within the next three years. She plans to earn an OSHA 30‑hour certification, a state‑issued heavy‑equipment operator
    license, and enroll in a construction‑management certificate program at a local community college. Long‑term, she hopes to launch a small residential renovation subcontracting business that focuses
    on sustainable building practices and to mentor other women entering the trades, fostering a supportive, collaborative work environment.
