personas:
  professional: Katherine Keller, a seasoned construction laborer with heavy‑equipment expertise, blueprint literacy, and crew coordination skills, channels her organized curiosity and collaborative spirit
    to streamline site operations, enforce OSHA protocols, and mentor junior tradespeople toward safer, more efficient builds.
  sports: Katherine Keller stays active through weekly matches in the co‑ed Columbia River Soccer Club, avidly follows the Portland Timbers and Portland Thorns for inspiration, and supplements soccer with
    regular hikes in the Columbia River Gorge, adhering to a pragmatic fitness routine that blends sprint drills, core work, and trail runs to sustain her energetic, sociable lifestyle.
  arts: Katherine Keller nurtures her artistic side by attending Portland Center Stage productions, listening to folk‑rock singer Brandi Carlile during weekend drives, displaying watercolor prints of the
    Columbia River Gorge on her walls, and drawing inspiration from environmental documentaries by Leonardo DiCaprio, which reinforce her commitment to sustainable living.
  travel: Katherine Keller prefers meticulously planned road trips that blend adventure with comfort, having explored Pacific Northwest gems like Cannon Beach and Banff’s alpine trails, she now dreams of
    an eco‑focused tour of Iceland’s volcanic landscapes while budgeting carefully to keep her renovation business cash flow steady.
  culinary: Katherine Keller, an intermediate home‑cook, regularly prepares roasted beet and goat‑cheese salads, grilled salmon with dill, and seasonal vegetable stir‑fry using heirloom tomatoes, kale,
    and locally sourced asparagus, while indulging in farmers‑market fresh scones and a occasional craft beer on weekend brunches.
  core: Katherine Keller blends gritty construction expertise with a gardener’s patience, juggling heavy‑equipment certifications and a habit of collecting every spare screwdriver she finds, yet she sometimes
    over‑commits to volunteer projects, sacrificing sleep and personal downtime.
background:
  cultural: Katherine identifies as a White American with deep roots in the Pacific Northwest. Raised in a small-town Oregon community during the 1970s and 1980s, she was immersed in a culture that values
    hard work, self‑reliance, and close‑knit community ties. Family traditions emphasized outdoor activities, volunteerism, and practical problem‑solving. While her upbringing was predominantly Caucasian,
    she embraces the region’s broader appreciation for diversity, environmental stewardship, and collaborative community life.
attributes:
  skills: '[''Heavy equipment operation'', ''Blueprint reading'', ''Concrete mixing and finishing'', ''Basic carpentry'', ''Site safety compliance'', ''Tool and equipment maintenance'', ''Crew coordination'',
