  career_goals: Although retired, Steven remains driven to leave a lasting artistic and historical imprint. He aims to complete a small series of watercolor paintings that depict North Tonawanda’s transformation
    from its industrial heyday to the present, and to exhibit them at the local senior center. He wishes to write and self‑publish a memoir recounting his experiences from the Depression through World II,
    the Korean War era, and the changes in his community, incorporating his love for abstract narratives. He plans to digitize his family’s genealogy and historic photographs, making them accessible to
    descendants and the local historical society. In addition, he aspires to mentor younger members in woodworking and model‑train building, ensuring his craft skills are passed on. He also hopes to attend
    an avant‑garde art workshop in Buffalo to broaden his artistic vocabulary.
