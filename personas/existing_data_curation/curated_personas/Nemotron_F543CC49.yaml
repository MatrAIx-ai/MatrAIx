personas:
  professional: Erica Cockeran, a seasoned health information specialist with expertise in Epic and Cerner, merges meticulous EHR management with a curious yet pragmatic drive to embed predictive analytics,
    training staff through calm, assertive communication while maintaining spotless compliance; they pride themselves on turning complex data into actionable safety improvements.
  sports: Erica Cockeran, an enthusiastic participant in community Zumba and line‑dance classes, supports the Houston Astros and Houston Rockets, belongs to the Port Arthur Salsa Club, and balances regular
    cardio workouts with occasional weekend hikes in the nearby coastal marshes; they treat fitness as a social gathering as much as a health regimen.
  arts: Erica Cockeran, a gospel‑soul vocalist in their local church choir, regularly sings the works of Kirk Franklin and the Mississippi Mass Choir, delights in historical fiction by Hilary Mantel and
    Doris Kearns Goodwin, and frequently attends exhibits at the Museum of the Gulf Coast while sipping sweet tea, which fuels their creative spirit.
  travel: Erica Cockeran, a fan of road‑trip adventures, enjoys weekend getaways to New Orleans for jazz brunches, annual visits to Austin’s South‑by‑Southwest festival, and plans a future cultural tour
    of the historic missions along the Texas‑Mexico border, all while keeping travel costs aligned with a family‑friendly budget.
  culinary: Erica Cockeran, a confident home chef, fuses soul‑food comfort with Tex‑Mex zest, whipping up chipotle‑spiced collard greens, black‑eyed peas seasoned with cumin‑lime, and chicken‑and‑dumpling
    casserole spiked with roasted poblanos, often topping dishes with fresh cilantro and corn masa, though they sometimes over‑salt in their enthusiastic seasoning.
  core: Erica Cockeran is a methodical health‑IT professional whose vibrant choir voice, salsa steps, and love of soul‑Tex‑Mex cooking illustrate a calm, community‑oriented spirit tempered by a habit of
    over‑organizing and occasional splurges on festive indulgences.
background:
  cultural: Erica was raised in a close‑knit African-American family in Port Arthur, a city shaped by Gulf Coast industry and Southern traditions. Her upbringing blended the rich legacy of Black Southern
    culture—gospel music, storytelling, communal gatherings, and a strong church presence—with the multicultural influences of a Texas port town, including Creole and Mexican culinary traditions. Family
    values of hard work, resilience, and mutual support were reinforced by church and community networks that celebrate milestones such as Juneteenth and family reunions. Erica's cultural heritage informs
    her emphasis on community service, collaborative problem-solving, and a deep appreciation for music, food, and the oral histories of her ancestors.
attributes:
  skills: '[''Electronic Health Record management (Epic, Cerner)'', ''HIPAA compliance and data privacy'', ''Medical coding (ICD-10, CPT)'', ''Data quality auditing and validation'', ''Clinical documentation
    improvement (CDI)'', ''Report generation and health data analysis'', ''Standard Operating Procedure (SOP) development'', ''Team training and mentorship'', ''Cross-departmental communication'', ''Process
    optimization and workflow redesign'', ''Project coordination and documentation'', ''Customer service and problem resolution'']'
  hobbies: '[''Church choir singing'', ''Line dancing (salsa and country)'', ''Cooking soul-food/Tex-Mex fusion'', ''Volunteering at free clinic'', ''Group fitness classes (Zumba)'', ''Gardening'', ''Reading
    historical fiction'', ''Visiting local history museums'']'
  career_goals: Erica aims to deepen her expertise in health informatics by obtaining the Registered Health Information Technician (RHIT) certification within the next year and eventually pursuing a bachelor's
    degree in Health Information Management. She envisions moving into a supervisory role, leading a medical records department, and driving initiatives that improve data accuracy and patient safety across
    the hospital network. Her long-term ambition is to become a health information manager who can integrate emerging technologies—such as predictive analytics and interoperable data exchange—while maintaining
    pragmatic standards. She also hopes to mentor junior staff, contribute to professional societies like AHIMA, and champion community outreach programs that educate patients about their health records.
