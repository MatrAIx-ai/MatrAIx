personas:
  professional: Jason Metts, an 81‑year‑old retired carpenter turned senior art curator, leverages meticulous woodworking skill, charismatic storytelling, and a fierce competitive streak from chess, and
    they channel that drive—tempered by a healthy skepticism of sponsors’ motives—into orchestrating intergenerational exhibitions in Petaluma, delighting participants while keeping every deadline as precise
    as a dovetail joint.
  sports: Jason Metts, an avid walker who leads a senior hiking group through Sonoma vineyards each spring, follows the San Francisco Giants and Golden State Warriors faithfully, participates in a low‑impact
    cycling club called Petaluma Pedalers for weekend rides, and they maintain a gentle fitness regimen with daily stretching to offset knee osteoarthritis while occasionally indulging in competitive bridge
    marathons that replace traditional sports.
  arts: Jason Metts, whose watercolor landscapes echo the soft palettes of John Singer Sargent and whose mixed‑media collages draw inspiration from contemporary artist Julie Mehretu, regularly attends folk
    concerts featuring Gillian Welch and jazz sessions led by the Tom Harrell Quintet, and they often join impromptu piano improvisations at the local community center, channeling their imagination into
    both visual and auditory art while maintaining a skeptical eye toward overly commercial galleries.
  travel: Jason Metts, who prefers short, flexible road trips over lengthy cruises, has explored Yosemite National Park’s granite cliffs, wandered the towering redwoods of Redwood National Park, and dreamt
    of visiting Japan’s historic temples and the lavender fields of Provence, yet they plan each journey around a modest fixed income, opting for off‑peak lodging and relying on senior‑friendly tour operators
    for accessibility while staying skeptical of overly touristy attractions.
  culinary: Jason Metts, an adept home cook who chops heirloom tomatoes, basil, and fresh rosemary for rustic bruschetta and seasonal ratatouille, enjoys pairing dishes with boutique Sonoma Pinot Noir,
    experiments with miso‑glazed salmon and homestyle chicken pot pie, yet they sometimes over‑season with salt, love to host pot‑luck evenings where friends bring eclectic dishes like Ethiopian injera
    and Mexican tamales, and they remain skeptical of processed foods, insisting on fresh, organic ingredients.
  core: Jason Metts, an 81‑year‑old charismatic polymath, blends artistic curiosity, competitive zeal, and a slightly absent‑minded penchant for forgetting appointments, while they maintain a skeptical
    nature that keeps them wary of quick fixes, turning every day into a vibrant collage of paint, puzzles, and community dialogue.
background:
  cultural: Jason grew up in post‑war America as part of the Baby Boomer generation, raised in a predominantly white, middle‑class Midwestern family before moving to California in his thirties. His upbringing
    emphasized self‑reliance, hard work, and community involvement. The cultural upheavals of the 1960s—civil‑rights activism, folk music, and artistic experimentation—sparked his love of novelty and abstract
    expression. Settling in Petaluma, Sonoma County, he embraced the wine‑country ethos of sustainability, farm‑to‑table cooking, and appreciation for the natural landscape. While his heritage is rooted
    in Anglo‑American traditions, he maintains an open curiosity toward diverse perspectives, reflected in his reading habits and community engagements.
