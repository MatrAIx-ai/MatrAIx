  career_goals: Michael aims to formalize his expertise by obtaining AWS Certified Welder and Certified Welding Inspector credentials within the next three years. He aspires to move into a lead welder or
    foreman role where he can mentor apprentices while still applying his hands-on skills. Michael is also interested in launching a boutique metal-work studio that creates custom art pieces and functional
    fixtures for sustainable building projects in Austin, such as solar-panel mounting systems. He values a flexible schedule that allows him to balance work, family, and personal projects, and he hopes
    to teach part-time welding courses at a local community college to share his practical knowledge.
