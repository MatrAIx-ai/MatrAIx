  career_goals: Tammy aims to transition into a senior technical mentor role where she can guide a small team of developers in delivering reliable, maintainable software for the next five years. She wants
    to leave a legacy of clean code standards and promote diversity in tech by establishing a mentorship program for women of color in Maryland. While she values a predictable work schedule, she hopes to
    advise on strategic technology decisions that balance innovation with stability, and eventually move into part‑time consulting before retiring.
