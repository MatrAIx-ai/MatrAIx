personas:
  professional: Tammy Allen, a veteran software architect with decades of experience in Java, COBOL and Python, leverages her love of routine and practical solutions to craft stable enterprise systems,
    and uses her competitive edge and skeptical eye to mentor junior developers while championing a mentorship program for women in tech.
  sports: Tammy Allen stays active by joining a Columbia senior walking club that circles Lake Elkhorn, cheering ardently for the Baltimore Ravens during football season and following the Washington Capitals’
    playoff run, while she occasionally fits in a light tennis match at the community courts, though her competitive nature sometimes leaves her skipping a session when she feels overwhelmed.
  arts: Tammy Allen weaves colorful quilts influenced by Faith Ringgold’s storytelling, sings in her church choir to the soulful sounds of Aretha Franklin and Marvin Gaye, and immerses herself in biographies
    of pioneers such as Dr. Mae Jemison, often sharing insights at her local book club.
  travel: Tammy Allen prefers thoughtfully planned trips that blend heritage and relaxation, having explored the historic streets of Charleston, the jazz‑filled neighborhoods of New Orleans, and the British
    Museum in London, while she dreams of a pilgrimage to Ghana’s Cape Coast Castle and a serene weekend retreat at the Shenandoah Valley.
  culinary: Tammy Allen excels at cooking soulful classics like fried catfish with buttery collard greens and sweet potato pie, while also experimenting with fresh heirloom tomatoes in bruschetta and crafting
    perfectly spiced okra gumbo, though she occasionally over‑salts her dishes when the day’s stress piles up.
  core: Tammy Allen is a diligent yet habit‑rippled technologist who balances a love for routine and community mentorship with a tendency to procrastinate on personal errands, often finding solace in gardening
    while wrestling with a chronic worry about the future.
background:
  cultural: Tammy grew up in the Washington, D.C. metropolitan area as the daughter of educated professionals who emphasized community service and resilience. She attended Howard University, an HBCU, where
    she earned a degree in computer science and was active in the Black Student Union. Her cultural identity is rooted in the African-American tradition of strong family ties, church involvement, and a
    commitment to uplifting underrepresented voices in STEM. Living in Columbia, Maryland, she remains connected to the local black community through volunteer tutoring, church events, and mentorship initiatives.
