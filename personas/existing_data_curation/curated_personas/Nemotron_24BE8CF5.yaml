  career_goals: Marsha’s primary ambition is to give back to her community by leading volunteer tutoring initiatives for both children and seniors, and by mentoring young teachers through a local teachers’
    association. She hopes to author a memoir reflecting on her teaching career and the lessons learned about compassion and resilience, while also advocating for greater mental‑health support for seniors.
    Over the next few years, she aims to develop a series of intergenerational workshops that blend storytelling, gardening, and craft activities, thereby strengthening community bonds.
