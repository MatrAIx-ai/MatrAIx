  hobbies: '[''Gardening'', ''Adult Literacy Volunteering'', ''Community Theater'', ''Weekend Road Trips with Husband'', ''Card Games and Bingo'', ''Church Choir and Fellowship'', ''Senior Center Dance
    Classes'']'
  career_goals: Ami aims to leverage her two‑decades of experience into a senior logistics coordinator role, where she can mentor younger staff and shape continuous‑improvement strategies across the plant.
    She is interested in developing a formal training curriculum for new hires and expeditors, integrating her educational background with practical workflow insights. Looking ahead, Ami envisions transitioning
    to a part‑time consulting capacity after retirement, offering expertise to local small manufacturers and community colleges, while also dedicating time to volunteer as a career counselor for adult learners
    in her area.
