persona_description: A healthcare professional who specializes in lipid metabolism, particularly the treatment and management of high cholesterol and triglycerides. They are knowledgeable in the use of
  lipid panels and the interpretation of their results, and are trained in the management of cardiac risk factors such as high triglycerides. They are also familiar with the metabolic syndrome and its implications
  for cardiovascular disease. They prioritize the use of a low-fat diet, exercise, weight loss, and the treatment of diabetes and high cholesterol before considering medication for triglycerides.
