  hobbies: '[''Visiting art museums'', ''Reading contemporary fiction'', ''Gardening'', ''Photography'', ''Volunteering at a community library'', ''Attending small art workshops'', ''Cooking for friends'',
    ''Playing board games'', ''Walking coastal trails'', ''Pottery'', ''Collecting vintage posters'']'
  career_goals: Mary seeks to deepen her engagement with the arts by volunteering as a docent at a local museum, curating informal exhibition tours for seniors, and developing a personal blog to share her
    reflections on art and culture. She plans to enroll in community‑college art history courses and attend photography workshops to expand her knowledge. While she does not aim for full‑time employment,
    she hopes to mentor young art enthusiasts through the library’s after‑school program, occasionally consult on small community art events, and continue exploring new ideas in a flexible, low‑commitment
    setting that respects her preference for autonomy and modest scheduling.
