  hobbies: '[''reading art history and African American biographies'', ''listening to blues and jazz music'', ''sketching and watercolor painting of rural scenes'', ''woodcarving small decorative objects'',
    ''nature photography'', ''gardening (heirloom tomatoes and herbs)'', ''fishing at local lakes'', ''attending small community art exhibitions'', ''playing chess'', ''maintaining a personal journal'',
    ''collecting vintage vinyl records'', ''DIY home improvement projects'']'
  career_goals: Chief Mazone aims to be promoted to shift supervisor or safety coordinator within the next year, focusing on building a culture of safety and efficiency. He wants to leverage his methodical
    planning to design more ergonomic workstations and streamline inventory processes in his plant. As retirement approaches, he envisions part‑time consulting, helping small family‑run warehouses adopt
    best practices, and possibly offering workshops on basic material handling safety. He also aspires to secure a comfortable financial cushion for his family and to leave a legacy of professionalism and
    reliability for his younger colleagues.
