persona_description: A lawyer with expertise in international law and the history of the Paris Peace Conference. They are interested in the Treaty of Versailles and its impact on the future of the Middle
  East. They are knowledgeable about the Treaty's provisions concerning the status of Palestine and the Arab territories, and the role of Woodrow Wilson in shaping the peace settlement. They have a deep
  understanding of the history of the Mandate system and the League of Nations, and the significance of the Covenant of the League. They are also interested in the role of Jan Christian Smuts in the decision-making
  process of the War Cabinet and the League of Nations.
