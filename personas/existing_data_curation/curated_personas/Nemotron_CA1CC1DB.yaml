personas:
  professional: Jason Counts, a 23‑year‑old heavy‑equipment operator, they channel their methodical, safety‑driven mindset and curiosity about emerging construction tech into precise excavator and bulldozer
    operation while regularly proposing GPS‑guided machinery upgrades to improve site efficiency.
  sports: Jason Counts, an avid early‑morning fisherman on the Hatchie River, they follow the Memphis Grizzlies and Tennessee Titans, play in a local community softball league, and maintain fitness through
    functional strength training and weekend fishing trips rather than regular gym sessions.
  arts: Jason Counts, who strums acoustic guitar at weekly jam sessions with friends, they draw inspiration from John Mayer, Ed Sheeran and classic rock icon Eric Clapton, and occasionally attend open‑mic
    nights at the downtown coffeehouse to unwind after a construction shift.
  travel: Jason Counts, a road‑trip enthusiast who favors spontaneous weekend getaways in their restored 1970s Chevrolet pickup, they have explored the Great Smoky Mountains and New Orleans on a shoestring
    budget, and dream of casting a line in Iceland’s fjords once their equipment‑rental business is thriving.
  culinary: Jason Counts, who cooks at a moderate skill level, they love grilling their river catch into cedar‑plank salmon and frying catfish with hush puppies, pair it with tangy BBQ ribs seasoned with
    smoked paprika, and often experiment with fresh dill, lemon zest, and Cajun spice blends.
  core: Jason Counts, a methodical yet worry‑prone heavy‑equipment operator, they balance a love for vintage pickups and early‑morning fishing with a habit of over‑planning and occasional sleepless nights.
background:
  cultural: Jason grew up in Drummonds, a small community in Tipton County, Tennessee, where Southern hospitality and close‑knit community values are central. His family has deep roots in the local trades,
    and he was raised with an appreciation for hard work, self‑reliance, and respect for the land. The region’s cultural rhythms—country music, backyard barbecues, and annual county fairs—have shaped his
    social habits and love for outdoor recreation. While maintaining a primarily White, working‑class Southern identity, Jason also embraces a pragmatic openness to new ideas, especially those that can
    improve everyday life and local industry.
attributes:
  skills: '[''excavator operation'', ''bulldozer operation'', ''skid‑steer loader operation'', ''equipment maintenance'', ''OSHA safety compliance'', ''blueprint reading'', ''site logistics coordination'',
