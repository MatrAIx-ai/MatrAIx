  hobbies: '[''fishing'', ''classic car restoration'', ''acoustic guitar playing'', ''reading about sustainable construction'', ''watching engineering documentaries'']'
  career_goals: Jason aims to become a certified master equipment operator, eventually qualifying for supervisory roles such as crew foreman or site equipment manager. He plans to acquire specialized certifications
    for advanced machinery (e.g., articulated dump trucks) and to deepen his understanding of construction tech integration. Long‑term, he hopes to start a small equipment rental and maintenance business
    that serves local contractors, blending his practical skills with entrepreneurial curiosity while providing reliable service to his community.
