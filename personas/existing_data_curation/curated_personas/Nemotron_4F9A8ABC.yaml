  hobbies: '[''Experimenting with Mexican recipes'', ''Playing and watching soccer'', ''Fishing in the Gulf of Mexico'', ''Hiking coastal trails'', ''Listening to Norteño and Tejano music'', ''Reading business
    strategy books'', ''Attending culinary workshops'', ''Volunteering at a local food bank'']'
  career_goals: Alberto aims to ascend to a regional management role within a multi‑unit restaurant chain over the next five years, leveraging his track record of operational excellence to oversee multiple
    locations across Texas and the Rio Grande Valley. Simultaneously, he plans to enroll in an associate degree program in hospitality management and obtain the ServSafe Expert certification to deepen his
    theoretical grounding. In the longer term, he aspires to launch his own flagship eatery that fuses authentic Mexican culinary heritage with modern, data‑driven service concepts, earning industry accolades
    for quality and efficiency. He is also motivated to mentor emerging food‑service leaders and share best practices at regional industry conferences.
