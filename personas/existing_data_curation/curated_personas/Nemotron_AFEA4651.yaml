  hobbies: '[''volunteering (coding mentorship)'', ''running club'', ''board game nights'', ''potluck hosting'', ''cooking'', ''gardening'', ''reading tech and business books'', ''DIY home projects'', ''photo
    walks'']'
  career_goals: In the short term, Aletha aims to deepen her cloud architecture skills and obtain AWS and Scrum Master certifications while leading a small cross‑functional feature team at her current company.
    Over the next three to five years, she aspires to become a technical lead or engineering manager who can blend her business insight with software strategy, driving product roadmaps that deliver measurable
    value to clients and the community. Long‑term, she dreams of founding a technology consultancy that helps local small businesses in Oklahoma adopt digital solutions, creating jobs and fostering economic
    resilience while maintaining a collaborative, supportive workplace culture.
