personas:
  professional: Aletha Norris is a full‑stack software developer who blends JavaScript and Python expertise with a business degree, delivering Agile projects while championing user‑centered design and mentoring
    junior coders with compassionate leadership, and they consistently keep sprint backlogs meticulously organized.
  sports: Aletha Norris runs with the Oklahoma City Community Running Club, organizes weekly 5K group runs, cheers for the Oklahoma City Thunder and the Oklahoma Sooners football team, trains for charity
    half‑marathons while balancing cross‑training yoga sessions, and they often motivate teammates with upbeat playlists.
  arts: Aletha Norris curates board‑game nights featuring Ticket to Ride and Catan, enjoys indie folk music from artists like Sufjan Stevens, attends local theatre productions of ‘Our Town,’ captures the
    Oklahoma prairie on a vintage Nikon during sunset photo walks, and they love discussing narrative strategies over coffee afterwards.
  travel: Aletha Norris prefers meticulously planned road trips, having explored the Santa Fe art scene, the Rocky Mountain National Park, and recently the historic districts of New Orleans, while dreaming
    of a future tech‑focused retreat in Reykjavik, Iceland, and they always keep a travel journal to log insights and contacts.
  culinary: Aletha Norris loves experimenting with farm‑to‑table dishes such as roasted beet and goat cheese salad, spicy shakshuka, and homemade sourdough, often incorporating fresh herbs from their garden
    and pairing meals with locally brewed craft beers, and they occasionally over‑salt a dish while testing new flavor combinations.
  core: Aletha Norris is a methodical yet sociable tech enthusiast who balances rigorous coding with community runs, board‑game gatherings, and a garden‑to‑plate culinary hobby, all while juggling a habit
    of over‑scheduling and a love for spontaneous photo walks, and they never miss a chance to mentor a peer.
background:
  cultural: Aletha grew up in a middle‑class, white family in a small Oklahoma town, absorbing the regional values of self‑reliance, community service, and modesty. Her upbringing emphasized a strong work
    ethic, the importance of education, and the belief that neighbors look out for one another. While she identifies with mainstream American culture, she also respects the local indigenous heritage and
    enjoys regional traditions like county fairs, southern comfort food, and outdoor activities. Her marriage and deep ties to the local community reflect the area's emphasis on family cohesion and collaborative
    spirit.
attributes:
  skills: '[''JavaScript'', ''React'', ''Node.js'', ''Python'', ''Django'', ''SQL'', ''RESTful APIs'', ''AWS'', ''Agile/Scrum'', ''Business analysis'', ''Project management'', ''User experience design'',
