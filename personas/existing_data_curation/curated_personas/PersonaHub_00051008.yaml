persona_description: A planetary scientist who is part of the Dawn spacecraft mission team and is interested in studying water on asteroids and the early formation of the solar system. They are knowledgeable
  about the GRaND spectrometer and its capabilities in detecting hydrogen-rich deposits associated with water ice. They have a keen interest in the role of water in the early solar system and are excited
  about the possibility of detecting evidence for water beneath the surface of Vesta.
