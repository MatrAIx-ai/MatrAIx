persona_description: A court official who is responsible for overseeing the management and adjudication of various legal cases, including but not limited to criminal, civil, and family cases. They are skilled
  in analyzing and interpreting court records, and are familiar with the latest developments in problem-solving courts and guardianship cases. They are also knowledgeable about the current state of the
  legal system, including the increasing number of cases involving older adults, individuals with developmental disabilities, and individuals with mental illness. They are expected to be involved in managing
  the increasing number of guardianship cases, and are equipped with the necessary skills and knowledge to handle these cases effectively.
