persona_description: An economist who specializes in the study of home advantage in the Summer Olympic Games, particularly in sports with subjective decision making, and the impact of hosting the Olympics
  on a country's medal standings. The economist is interested in how the prospect of a future home Olympics and increased funding for sport after the announcement of London's successful bid in 2005 spurred
  on a new generation of British champions, and how crowd noise has a greater influence upon officials' decisions than players' performances.
