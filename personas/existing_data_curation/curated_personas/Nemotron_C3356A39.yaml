  career_goals: Sarah aims to pursue a career that blends her desire to help others with her practical, organized mindset. She plans to earn a scholarship to study nursing or educational counseling, with
    a long‑term goal of becoming a registered nurse or school counselor. She also aspires to lead community health initiatives and eventually hold a leadership position within a healthcare or educational
    institution, using her strong organizational skills to improve services for her community.
