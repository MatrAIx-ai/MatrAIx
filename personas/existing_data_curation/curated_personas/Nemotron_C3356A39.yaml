personas:
  professional: Sarah Hardin, a disciplined teen community organizer, leverages her love for routine, compassion, and group dynamics to orchestrate weekly youth-service events at her church while maintaining
    meticulous checklists and high standards.
  sports: Sarah Hardin, a varsity cheerleader for the Westview Wildcats, also dances on the school’s junior varsity dance team and attends weekend yoga classes, while cheering passionately for the Wildcats
    football squad.
  arts: Sarah Hardin devotes evenings to reading realistic YA novels by authors such as John Green and Sarah Dessen, practices contemporary dance routines to songs by Ariana Grande, and finds inspiration
    in the theatrical productions of her school’s drama club, especially the recent staging of "The Crucible".
  travel: Sarah Hardin enjoys meticulously planned group trips, having organized a church youth retreat to Asheville, a weekend volunteer mission to New Orleans, and dreaming of a summer road‑trip along
    the Pacific Coast Highway with her friends.
  culinary: Sarah Hardin prefers wholesome, easy‑to‑prepare meals such as avocado toast, quinoa bowls with roasted vegetables, and homemade chicken quesadillas, often experimenting with fresh cilantro and
    lime to add zest to her snack‑time smoothies.
  core: Sarah Hardin is a hyper‑organized, socially‑driven teen who balances relentless achievement with deep compassion, yet frequently battles worry and over‑planning.
background:
  cultural: Sarah comes from a White American family in Edmond, Oklahoma, a community that values tradition, practicality, and strong social ties. Her upbringing emphasizes routine, family involvement,
    and participation in local events such as school sports and community gatherings. She is influenced by Midwestern values of hard work and cooperation, and her family and church play central roles in
    fostering a sense of responsibility and service to others.
