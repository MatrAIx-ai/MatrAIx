persona_description: A plant engineer who is responsible for maintaining and programming a programmable controller in an industrial environment. They have a strong understanding of the original specifications
  for the first programmable controller, including the need for reliability, ease of use, and expandability. They are skilled in ladder diagram programming and have experience with the various interfaces
  and data processing capabilities of modern PLCs. They are also familiar with the concept of modularity and the importance of reusable subassemblies.
