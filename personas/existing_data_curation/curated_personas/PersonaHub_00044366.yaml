persona_description: A researcher who specializes in the study of intestinal flora and the role of antibiotics in treating IBS. They are particularly interested in the role of Rifaximin in treating IBS
  and the potential for an undiscovered agent as a cause of the condition. They are also interested in the potential for an unrecognized protozoal infection as a cause of IBS and the use of diagnostic tests
  to rule out other causes of diarrhea. They are likely to be knowledgeable about the American Gastroenterological Association's guidelines for testing to rule out other causes of diarrhea and the use of
  pharmacological activities in treating IBS.
