personas:
  professional: A veteran STEM educator, Ayla Rowe merges over 25 years of experience with a data‑driven approach to craft standards‑aligned, hands‑on curricula that integrate coding kits, Google Classroom,
    and inquiry‑based labs, while simultaneously mentoring new teachers, leading professional‑development workshops, and advocating for mental‑health‑aware policies within a predictable yet flexible classroom
    environment.
  sports: A nature‑loving fitness enthusiast, Ayla Rowe spends weekends trekking Hudson Valley trails with a local hiking club, encourages students through a volunteer coach role in the community soccer
    league, and roots for the New York Knicks, Yankees, and Giants while occasionally cheering on the Hudson Valley Renegades during summer evenings.
  arts: An active participant in the arts, Ayla Rowe attends monthly productions at the Hudson Valley Playhouse—such as Lin‑Manuel Miranda's Hamilton—while enjoying the music of Joni Mitchell, the films
    of Meryl Streep, and knitting scarves adorned with motifs inspired by Agatha Christie and Philippa Gregory during intermissions.
  travel: A meticulous planner, Ayla Rowe earmarks summer breaks for low‑key road trips to New England's coastal towns, annual visits to Washington, D.C.'s Smithsonian museums, and biennial pilgrimages
    to Kyoto’s historic temples, while dreaming of a future culinary tour of Tuscany and often balancing travel aspirations with PTA responsibilities.
  culinary: A garden‑to‑table culinary enthusiast, Ayla Rowe delights in turning their vegetable plot harvest into rustic ratatouille, roasted beet and goat‑cheese salads, and herb‑infused quinoa bowls,
    while confidently baking apple‑cinnamon pies for class cooking lessons and occasionally treating themselves to a rich duck confit at the local bistro.
  core: A detail‑oriented STEM teacher, Ayla Rowe balances a love for structured lesson plans with a secret penchant for late‑night jigsaw puzzles, anxious over‑thinking, and an irresistible habit of buying
    premium yarn on impulse.
background:
  cultural: Ayla grew up in a suburban middle‑class family in the Northeast United States, part of a predominantly white community that valued education, civic engagement, and modest community traditions.
    Her family celebrated holidays such as Thanksgiving and the Fourth of July with an emphasis on togetherness and volunteerism. She was raised in an environment that encouraged practical problem‑solving
    and respect for structure, which later influenced her teaching style. Throughout her adult life, she has remained connected to the local cultural fabric of Rockland County through community gardening
    groups, the public library, and regional arts events, blending a modest American cultural identity with a commitment to inclusive, cooperative community values.
attributes:
  skills: '[''Curriculum development'', ''Classroom management'', ''Instructional technology integration'', ''Differentiated instruction'', ''Formative and summative assessment design'', ''STEM project-based
    learning'', ''Data-driven instruction'', ''Parent-teacher communication'', ''Mentoring and coaching'', ''Special education basics'']'
  hobbies: '[''Gardening'', ''Knitting'', ''Puzzle solving (jigsaw and crossword)'', ''Reading mystery & historical fiction'', ''Yoga and mindfulness'', ''PTA volunteering'', ''Organizing community science
    fairs'', ''Hiking'', ''Attending theater'']'
  career_goals: Ayla aims to lead the school's STEM department as a curriculum coordinator, develop after‑school STEM clubs, create community partnerships with local science museums, mentor early‑career
    teachers, and advocate for mental‑health resources within the school. In the longer term she envisions moving into school leadership—such as an assistant principal role—so she can shape school‑wide
    policies that prioritize student well‑being, equitable access to high‑quality STEM education, and a supportive, stress‑aware school culture.
