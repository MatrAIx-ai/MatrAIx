persona_description: A linguist and scholar who specializes in the study of the Basque language, particularly its history, evolution, and standardization. They have a deep understanding of the dialects
  and variations of the language and have contributed significantly to the research and documentation of the language. They are also knowledgeable about the cultural and historical context in which the
  language was developed and the impact of the language on society. They are likely to be interested in the implementation of the standard language in wider society through education, media, and literature,
  and the challenges of creating a unified or standard version of the language. They may also be interested in the broader context of the Basque language and its role in the development of Basque culture
  and society.
