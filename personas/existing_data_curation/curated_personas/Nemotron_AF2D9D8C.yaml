  hobbies: '[''Digital illustration'', ''Analog photography'', ''Indie video games'', ''Live-music events'', ''Hiking'', ''Raspberry Pi/Arduino tinkering'', ''Science-fiction reading'', ''Makerspace volunteering'']'
  career_goals: Looking ahead, Eric aims to transition from his current support role into a full-stack development position where he can blend his coding skills with his artistic sensibility. Over the next
    three years he plans to earn certifications in cloud services such as AWS and front-end frameworks, develop a robust portfolio of web applications with strong UI/UX components, and eventually launch
    a freelance consultancy focused on small businesses in the Midwest. He values flexibility, so he is also exploring part-time remote work opportunities that will let him travel and experience new cultures
    while continuing to hone his craft.
