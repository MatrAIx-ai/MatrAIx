personas:
  professional: An IT support specialist named Eric Osuna, who leverages their Python and JavaScript chops alongside a hobbyist’s eye for UI/UX to prototype sleek web apps while juggling a casual, slightly
    disorganized work style and a competitive drive to out‑innovate peers.
  sports: Eric Osuna hits the Van Wert County trails every weekend with the local hike‑and‑bike club, follows the Indianapolis Colts and Chicago White Sox, and squeezes in pickup basketball games at the
    community center whenever their schedule permits.
  arts: Eric Osuna spends evenings sketching digital comics inspired by artists like Studio Ghibli’s Hayao Miyazaki and indie musician Sufjan Stevens, snaps analog photos of rusted farm equipment with a
    vintage 35mm camera, and catches live‑acoustic sets at the Coffee Bean Gallery featuring local folk trio The Willow Weavers.
  travel: Eric Osuna dreams of remote‑work road trips, already charted a spring bike‑tour through Ohio’s Amish Country, a summer backpacking stint in Kyoto to study manga art, and a fall weekend in Asheville
    to sample its maker‑scene, balancing low‑budget flights with occasional splurges on boutique hostels.
  culinary: Eric Osuna’s palate swings between homemade ramen bowls with miso broth, avocado‑toast brunches topped with smoked salmon, and late‑night pepperoni pizza, and they delight in tweaking recipes
    with sriracha, furikake, and fresh basil harvested from a balcony herb garden.
  core: Eric Osuna, a 23‑year‑old coder‑artist, fuses curiosity with a laid‑back, somewhat chaotic lifestyle, turning tech projects into creative adventures while chasing indie games, hikes, and coffee‑house
    gigs.
background:
  cultural: Eric grew up in Van Wert, a small Midwestern town in Ohio, where community events like the county fair, high-school sports games, and church gatherings shaped his sense of belonging. His family
    traces roots to German and Irish immigrants, and the values of self-reliance, modesty, and neighborly support are woven into his everyday life. While he appreciates the straightforward, pragmatic outlook
    typical of the region, his curiosity and exposure to online art and tech cultures have broadened his worldview, allowing him to blend local traditions with a willingness to explore unconventional ideas.
