  hobbies: '["LEGO and model kit building", "Chess (club member)", "Jogging and weight training", "Bullet journaling", "Reading non‑fiction (productivity, finance, history)", "Tutoring high‑school students
    in math and computer basics"]'
  career_goals: Marshall aims to secure a stable, detail‑oriented role in finance or operations after completing his associate’s degree. He is particularly interested in becoming an accounting assistant
    or operations analyst for a local manufacturing firm or the Worcester County Hospital, where his methodical approach and reliability can improve efficiency. In the longer term, he plans to earn a bachelor’s
    degree in Accounting or Business Administration, obtain the Certified Management Accountant (CMA) credential, and eventually move into a supervisory or project‑management position. He values a career
    that offers clear structure, predictable responsibilities, and opportunities for incremental advancement, allowing him to support his family and contribute to his community.
