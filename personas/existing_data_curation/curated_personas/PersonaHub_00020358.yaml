persona_description: A pediatrician who specializes in sports medicine and recommends proper safety equipment for children participating in sports. The pediatrician emphasizes the importance of acclimating
  to hot weather workouts and drinking plenty of fluids, wearing light clothing, and limiting exposure to the sun in the hot part of the day to prevent heat injuries. The pediatrician also recommends wearing
  mouth guards, face guards, and shin guards to reduce the risk of injuries in contact and collision sports. The pediatrician notes that proper safety equipment can reduce the risk of children being one
  of the 4.4 million between the ages of five to 18 who are treated in hospital emergency rooms each year.
