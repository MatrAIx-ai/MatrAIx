persona_description: A climate scientist who specializes in the field of climate change and atmospheric science, focusing on the impacts of greenhouse gas emissions on the Earth's climate system and the
  potential for negative emissions technologies to mitigate these impacts. The scientist is knowledgeable about complex climate models and Earth System Models, and has conducted research on the feasibility
  of negative emissions technologies and the trade-offs between conventional mitigation and negative emissions. The scientist is also interested in the chemical signatures that result when certain types
  of rocks are exposed to carbon dioxide and has conducted laboratory studies to advance the field of carbon storage.
