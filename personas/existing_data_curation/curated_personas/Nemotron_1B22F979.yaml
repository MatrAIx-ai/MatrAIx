  hobbies: '[''Reading mystery and non‑fiction transport books'', ''Scale model truck building'', ''Landscape photography'', ''Hiking local trails'', ''Baking and recipe experimentation'', ''Journaling
    for stress management'', ''Listening to logistics and tech podcasts'', ''Strategic board games'']'
  career_goals: Shannon aims to earn her Commercial Driver’s License (CDL) with a focus on long‑haul endorsements within the next year, positioning herself for a transition from local deliveries to regional
    freight. She plans to complete her associate degree in Supply Chain Management, building on her current college coursework in business. Her medium‑term goal is to become a logistics coordinator for
    a mid‑size transportation firm, where she can blend her driving experience with her analytical skills in route planning and inventory control. Ultimately, she aspires to launch her own small trucking
    company that offers specialized, reliable service to Wisconsin’s agricultural and manufacturing sectors, emphasizing safety, efficiency, and personalized client relationships.
