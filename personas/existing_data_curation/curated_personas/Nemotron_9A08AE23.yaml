personas:
  professional: Richard Everhart, a veteran police sergeant with three decades of patrol, investigation, and community‑oriented policing experience, blends his curiosity for emerging law‑enforcement technologies
    with practical, hands‑on problem solving, using GIS crime mapping to design training drills while his relaxed, slightly disorganized approach keeps his schedule flexible and his mentorship style approachable.
  sports: Richard Everhart is a devoted fan of the Minnesota Vikings and Twins, season‑ticket holder for Vikings games and regular attendee at Twins home games, member of the Cuyuna Lakes Hiking Club, and
    participant in a local recreational fishing league, balancing his love of outdoor activity with occasional pickup basketball at the community center.
  arts: Richard Everhart unwinds by strumming acoustic guitar to classic rock and folk legends like Bob Dylan, Neil Young, and The Eagles, attends live performances at the Guthrie Theater and Minnesota
    Orchestra, and immerses himself in historical biographies that shape his appreciation for storytelling.
  travel: Richard Everhart prefers road‑trip adventures that blend nature and modest budgets, having driven the North Shore of Lake Superior, trekked through Glacier National Park, and planning a future
    expedition to Banff National Park and Norway’s fjords, all while booking campsites weeks in advance rather than luxury hotels.
  culinary: Richard Everhart enjoys cooking fresh lake trout grilled with lemon‑dill butter, hearty wild‑rice casserole, and classic Minnesota hotdish with cheddar and ground beef, skillfully handling the
    grill and cast‑iron skillet but often forgets to defrost meat until the last minute.
  core: Richard Everhart is a seasoned police mentor who balances curiosity and practicality, loves fishing and guitar, occasionally misplaces paperwork, and channels that blend into a community‑first,
    hands‑on approach to life.
background:
  cultural: 'Richard grew up in a middle-class family in the Minneapolis suburbs, a heritage rooted in German-Scandinavian ancestry common to the Upper Midwest. Raised in a Lutheran household, he internalized
    the Midwestern values of hard work, humility, and civic responsibility. His adult life in Hennepin County has exposed him to Minneapolis''s cultural mosaic, including Native American, Somali, Hmong,
    and other immigrant communities. This blend of traditional white Midwestern upbringing and the city’s diverse influences shapes his worldview: he values the “Minnesota nice” ethos of politeness and
    community cooperation while remaining open to different perspectives and eager to bridge gaps between law enforcement and the neighborhoods they protect.'
