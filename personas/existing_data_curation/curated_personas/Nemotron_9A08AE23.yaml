  career_goals: Looking ahead, Richard intends to complete his undergraduate studies in Criminal Justice, positioning himself for senior leadership within the department. He aspires to become a lieutenant
    who can champion community-policing initiatives and integrate data-driven strategies that improve public safety while strengthening neighborhood trust. In the next five years, he plans to lead a mentorship
    program for new recruits, push for policy reforms that emphasize de-escalation and mental-health response, and explore part-time consulting on law-enforcement best practices. Upon retirement, he hopes
    to serve as a civilian advisor or trainer, sharing his experience with both police agencies and community organizations.
