persona_description: A statistician who specializes in reliability testing, particularly in the use of intra-class correlation coefficient (ICC) and the Bland-Altman plot to measure the agreement between
  raters. This statistician is experienced in using these methods to evaluate the consistency and reliability of rating scales and to assess the degree of agreement between raters on a variety of scales,
  including those on a scale of 1 to 5. This statistician is likely to be a researcher or practitioner in the field of psychology or education, who is interested in the use of statistical methods to improve
  the accuracy and reliability of rating scales.
