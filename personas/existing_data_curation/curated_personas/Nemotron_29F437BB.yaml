  career_goals: Despite being in his early eighties, John remains committed to staying active in Canyonville's real‑estate scene. His primary ambition is to shift from being the primary deal‑maker to a
    mentor and advisor, enabling younger agents to inherit his client relationships and community know‑how. He aims to expand his portfolio into property‑management contracts to secure a steady, low‑maintenance
    income stream. John also seeks to contribute to affordable‑housing initiatives by collaborating with the city council and local charities, and he hopes to document his sixty‑year career in a memoir
    that captures the evolution of Oregon's housing market and the cultural shifts he has witnessed.
