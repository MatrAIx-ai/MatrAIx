persona_description: An historian with a special interest in the Pilgrims and their heritage, particularly their connection to the Separatists who left England for Holland in 1608. This persona is likely
  to be interested in researching the history of the Pilgrims, their beliefs, and their contributions to American society. They may be a member of a historical society, a museum, or a research organization
  dedicated to preserving and promoting the Pilgrims' heritage. This persona may have a particular interest in the Leiden American Pilgrim Museum, the American Pilgrim Museum in Leiden, and the Mayflower
  Society Museum in Plymouth, Massachusetts. They may also be interested in the work of Robert Browne, Caleb Johnson, and the Mayflower Society for Pennsylvania.
