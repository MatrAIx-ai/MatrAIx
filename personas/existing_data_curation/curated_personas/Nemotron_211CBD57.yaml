personas:
  professional: A versatile general maintenance professional, Mary Padron leverages their hands‑on curiosity and practical problem‑solving to lead HVAC, electrical, and plumbing projects while flexibly
    navigating the disorganized demands of a busy tech campus, and they channel their competitive edge into optimizing building‑automation workflows using CMMS tools.
  sports: An avid hiker and cyclist, Mary Padron regularly tackles the Cascade foothills and rides the Sammamish River Trail, they support the Seattle Seahawks and Sounders FC, and they compete in a local
    lawn‑mower drag club while they join the Seattle Mountain Bike Association for weekend rides.
  arts: When not under a hood, Mary Padron enjoys analog creativity—assembling model kits while listening to the Foo Fighters, watching indie sci‑fi films by Denis Villeneuve, and attending maker‑fair installations
    that echo the kinetic sculptures of Trail Station, with a soft spot for the retro graphics of 80s synth‑pop artist Vangelis, and they often critique the technical precision of each piece.
  travel: Mary Padron prefers weekend road trips that blend adventure with hands‑on opportunities, they have explored the volcanic landscapes of Iceland for geothermal inspiration, the temperate rainforests
    of Olympic National Park, and they are dreaming of a future trek through Patagonia’s Torres del Paine while they balance limited vacation days with work commitments.
  culinary: A pragmatic cook, Mary Padron staples their diet with grilled salmon, quinoa salads tossed with roasted sweet potatoes, and a homemade pesto sauce featuring fresh basil and pine nuts, while
    they frequently experiment with DIY smoked ribs using a portable wood pellet smoker on backyard barbecues.
  core: Mary Padron balances a relentless curiosity for building and tech with a laid‑back, sometimes disorganized lifestyle, they turn everyday problems into DIY triumphs while they race a lawn‑mower in
    the backyard.
background:
  cultural: Mary is a second‑generation American of primarily English and German ancestry. She grew up in a middle‑class Seattle suburb where her father worked as a carpenter and her mother taught high
    school, instilling a strong work ethic, practical problem‑solving skills, and respect for education. Raised amid the Pacific Northwest’s natural beauty, she developed an appreciation for outdoor recreation
    and environmental stewardship. While she celebrates mainstream American holidays and holds typical U.S. cultural values, her upbringing emphasized self‑reliance, hands‑on craftsmanship, and a pragmatic
    approach to life, shaping both her professional path and personal interests.
attributes:
  skills: '[''Electrical troubleshooting and repairs'', ''Plumbing maintenance and leak detection'', ''HVAC system servicing and diagnostics'', ''Carpentry and basic woodworking'', ''Preventive maintenance
    planning using CMMS'', ''Blueprint and schematic interpretation'', ''Basic welding and metal fabrication'', ''Tool inventory and procurement'', ''Safety compliance (OSHA) and risk assessment'', ''Energy-efficiency
    retrofits and solar panel installation'', ''Building automation system troubleshooting'', ''Customer service and vendor coordination'']'
  hobbies: '[''DIY furniture building'', ''Home automation tinkering'', ''Hiking in the Cascades'', ''Cycling on local trails'', ''Puzzle solving (mechanical puzzles, Rubik\''s cube)'', ''Model kit building
    (airplanes, cars)'', ''Fantasy football league participation'', ''Attending maker fairs and tech meetups'', ''Barbecuing and casual social gatherings'', ''Sustainable living workshops'']'
  career_goals: Mary aims to become a senior facilities maintenance supervisor for a major tech campus in Redmond, where she can lead a team, drive the adoption of sustainable building practices, and oversee
    large‑scale retrofits. She plans to obtain professional certifications such as the EPA Universal, HVAC R, and Electrical Journeyman licenses, and to develop deep expertise in building automation and
    IoT‑enabled maintenance. Long‑term, she envisions launching her own handyman consultancy focused on green retrofits for residential clients while mentoring apprentices—especially women—who want to enter
    skilled trades.
