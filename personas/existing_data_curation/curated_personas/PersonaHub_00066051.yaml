persona_description: A state water quality manager who is responsible for implementing and monitoring water quality standards in Tennessee's Cripple Creek Watershed, where siltation is a significant issue.
  The manager is likely to have expertise in water quality management, hydrology, and ecosystem science. They would be responsible for conducting biological reconnaissance (biorecon) studies to assess the
  impairment of the stream, implementing best management practices (BMPs) to improve water quality, and ensuring compliance with state and federal regulations. The manager would also be involved in providing
  guidance and support to local landowners and stakeholders in implementing BMPs and improving water quality in the watershed.
