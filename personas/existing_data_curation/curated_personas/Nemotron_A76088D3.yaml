  career_goals: Now retired, Mark aims to give back by mentoring younger neighbors in DIY projects, preserving his family's genealogy, completing his GED, and renovating his home for age-friendly living.
    He also hopes to take a short road-trip along the Gulf Coast and, if health permits, visit the ancestral regions of his French-Canadian forebears.
