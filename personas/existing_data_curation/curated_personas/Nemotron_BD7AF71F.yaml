  hobbies: '[''Experimental home cooking'', ''Food photography'', ''Watercolor painting'', ''Sketching'', ''Reading sci-fi/fantasy novels'', ''Hiking'', ''Cycling'', ''Gardening'', ''Attending local farmers
    markets'', ''Board game nights'', ''Exploring new restaurants'']'
  career_goals: Mark aims to advance from his current role as a food preparation worker to a sous‑chef within the next two years, eventually becoming head chef of a restaurant that emphasizes artistic plating
    and locally sourced, seasonal cuisine. He plans to pursue additional culinary certifications, such as a Certified Chef de Cuisine credential, and to refine his expertise in experimental fermentation
    and modern plating techniques. Long‑term, he hopes to open a small bistro or farm‑to‑table eatery in the Canastota area, develop a personal brand through a food blog and cookbook that showcase his inventive
    recipes, and mentor aspiring cooks in his community.
