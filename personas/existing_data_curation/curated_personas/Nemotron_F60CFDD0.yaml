  career_goals: William aims to advance within the Dallas Fire-Rescue Department, targeting a promotion to Lieutenant within the next five years. To support this, he plans to obtain EMT‑Paramedic certification
    and complete advanced hazardous‑materials training. He also hopes to specialize in fire investigation, merging his curiosity for cause analysis with practical field work. Long‑term, William envisions
    leading a community fire‑prevention program and eventually establishing a consulting firm that helps schools and businesses improve safety protocols. Mentoring new recruits and strengthening the department’s
    outreach initiatives are also central to his ambition.
