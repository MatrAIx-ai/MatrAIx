    educational video games'']'
  career_goals: David dreams of a future where he can combine his curiosity about how things work with his desire to help others. He imagines becoming an astronaut to explore space, a civil engineer to
    design bridges that connect communities, or a wildlife biologist to protect the Colorado mountains he loves. He aspires to join a science club, improve his math and science grades, and take on leadership
    roles in school projects, believing that steady effort and learning will open doors to any of these paths.
