personas:
  professional: David Snyder is a budding young scientist‑inventor who builds LEGO rockets, conducts DIY volcano experiments, and sketches comic‑style storyboards, applying his methodical planning and curiosity
    to turn imaginative ideas into tangible projects.
  sports: David Snyder is an enthusiastic soccer player who joins the Morrison Youth Soccer Club, idolizes the Colorado Rapids, and balances weekend hikes on local trails with practicing quick footwork
    drills after school, all while keeping a weekly schedule to stay fit and avoid over‑exertion.
  arts: David Snyder is a comic‑strip creator who draws vibrant panels inspired by the Percy Jackson series, practices piano basics on a small upright keyboard, and enjoys listening to the soundtracks of
    their favorite adventure movies and the music of Imagine Dragons and Taylor Swift for creative inspiration.
  travel: David Snyder loves family road trips to Rocky Mountain National Park for hiking and bird‑watching, dreams of exploring the science exhibits at the Smithsonian in Washington, D.C., and prefers
    meticulously planned itineraries with packed snacks, though they sometimes get restless on long car rides.
  culinary: David Snyder enjoys helping their parents make homemade pizza with mozzarella, pepperoni, and fresh basil, whipping up fruit smoothies with banana, strawberries, and yogurt, and proudly shows
    off their skill at assembling a balanced snack of carrot sticks and hummus, even if they occasionally binge on sugary cereal before school.
  core: David Snyder blends a keen, methodical curiosity with a love for building, reading, and teamwork, balancing disciplined study habits and occasional snack binges while staying kind and organized
    in every adventure.
background:
  cultural: 'David comes from a white, middle‑class family living in Morrison, Colorado, a community that values outdoor recreation, education, and neighborly cooperation. His upbringing reflects typical
    suburban Colorado culture: frequent family hikes in the Rocky Mountains, seasonal activities like skiing and snowshoeing, and participation in local events such as Fourth of July fireworks and community
    service projects at his public elementary school. He attends a school that emphasizes teamwork, environmental stewardship, and civic engagement, and his family often celebrates mainstream American holidays
    while also teaching him respect for the natural landscape that surrounds their town.'
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Scratch programming'', ''LEGO construction'', ''Soccer fundamentals'', ''Piano basics'', ''Organizational planning'']'
