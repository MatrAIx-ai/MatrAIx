    literature review'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading science and historical fiction'', ''Journaling'', ''Rose gardening'', ''Walking at the Dallas Arboretum'', ''Experimenting with
    international cooking'', ''Volunteering at community health clinic'', ''Book club participation'', ''Meditation and mindfulness practice'', ''Caring for rescued cat Luna'']'
  career_goals: Robin's primary career ambition is to move into a leadership and teaching position that allows her to shape the next generation of nurses. She plans to pursue a Master's in Nursing Informatics
    to deepen her expertise in health data analytics and to lead hospital-wide quality-improvement initiatives. Robin also hopes to obtain certification as a Certified Nurse Educator and to champion interdisciplinary
    programs that incorporate art-therapy and stress-reduction strategies into patient care. In the long term, she envisions establishing a community health outreach program in Dallas that offers free workshops
    on chronic-disease management, mindful self-care, and creative expression for seniors and underserved populations.
