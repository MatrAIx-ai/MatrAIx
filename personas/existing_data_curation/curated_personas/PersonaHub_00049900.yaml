persona_description: A researcher and inventor working on the development of novel telerobotic manipulation techniques, specifically focusing on the use of Omnimagnets, a cube-shaped device capable of real-time
  control over its magnetic field and manipulation of magnetic tools in space. The persona is involved in the design, construction, and testing of Omnimagnets and their tools, as well as the development
  of algorithms for autonomous control. They are interested in the potential of Omnimagnets for space exploration and their applications in tasks such as satellite repair, debris removal, and assembly in
  microgravity.
