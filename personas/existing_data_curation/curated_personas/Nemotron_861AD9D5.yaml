  career_goals: Shirley dreams of becoming an animator or cartoonist who creates vibrant, culturally rich stories that celebrate both her Ecuadorian roots and the diverse world around her. She also envisions
    a future as an astronaut or young scientist, fascinated by space and abstract concepts, and occasionally imagines herself as a teacher who inspires other children to explore art and curiosity. Her ambition
    is to blend creativity with discovery, using her imagination to make a positive impact.
