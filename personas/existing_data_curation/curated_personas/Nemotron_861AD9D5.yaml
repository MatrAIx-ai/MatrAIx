personas:
  professional: An aspiring young visual storyteller, Shirley Moreno channels her vivid imagination and love for bright colors into elaborate drawings and LEGO creations, often leading school art projects
    while balancing her natural organization with bursts of spontaneous creativity, and they eagerly share their ideas with classmates.
  sports: Shirley Moreno participates in after‑school soccer with the local Tigers U‑8 team and enjoys weekly swimming lessons, while cheering for the city’s professional basketball squad, the Wildcats,
    during weekend games with their family, and they occasionally practice dance routines to stay active.
  arts: Shirley Moreno spends afternoons sketching fantastical worlds inspired by the vivid palettes of Mary Blair and the whimsical storytelling of Dr. Seuss, while humming tunes by Selena and Zedd during
    dance breaks, and they proudly perform in school theater productions that showcase their dramatic flair.
  travel: Shirley Moreno dreams of exploring the colorful streets of Barcelona and the magical realms of Disneyland, favoring meticulously planned day trips with their parents that blend adventure with
    comfortable nap breaks, though they sometimes feel anxious about long flights and crowded airports.
  culinary: Shirley Moreno loves munching on mango‑filled tacos and rainbow fruit salads, proudly attempts to whisk simple pancake batter with a dash of cinnamon, yet they often forget to wash their hands
    before meals, leading to occasional stomachaches.
  core: Shirley Moreno is a bright‑eyed, talkative dreamer who fills every moment with color and song, yet can become overly worried about school performances and habitually leaves crayons scattered across
    the living room.
background:
  cultural: Shirley is a second‑generation Ecuadorian American living in Corona, Queens. At home, her family speaks Spanish and celebrates traditional Ecuadorian holidays such as Carnaval and Día de la
    Independencia with music, dance, and dishes like ceviche and empanadas. Her parents share stories about life in Quito, fostering a deep appreciation for her heritage. She attends a bilingual elementary
    program that blends American curriculum with Latin American culture, and she participates in community festivals that highlight the rich diversity of Queens. This blend of Ecuadorian customs and the
    multicultural environment of New York shapes her worldview, encouraging her to incorporate cultural motifs into her art and storytelling.
