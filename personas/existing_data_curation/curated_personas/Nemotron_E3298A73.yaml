  career_goals: Elsa’s immediate ambition is to advance to a Director of Operations role within the next three to five years, where she can shape enterprise‑wide efficiency programs and champion lean initiatives
    across multiple divisions. She aims to leverage her competitive drive to spearhead large‑scale process redesigns that demonstrably improve profit margins. Long‑term, Elsa is interested in establishing
    her own consulting practice focused on helping small, family‑owned businesses in the Los Angeles area streamline operations while preserving cultural authenticity. Throughout her career progression,
    she plans to mentor emerging Latina managers and to cultivate a work environment that balances high performance with stress‑reduction strategies.
