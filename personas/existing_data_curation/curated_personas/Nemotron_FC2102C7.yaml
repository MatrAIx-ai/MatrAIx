personas:
  professional: Son Oh is a seasoned IT infrastructure manager who leverages deep expertise in Windows Server, VMware, and Cisco networking to create rock‑solid, ITIL‑aligned systems, while their love for
    routine and meticulous documentation ensures every change is logged, every process calibrated, and the entire team knows exactly what to expect.
  sports: Son Oh enjoys weekend hikes through the Hill Country and occasional fishing trips on Lake Travis, they follow the Austin FC soccer team and support the Texas Rangers baseball club, and they maintain
    a low‑key fitness routine that includes weekly trail walks and a membership in a local fishing enthusiasts’ club.
  arts: Son Oh finds quiet inspiration in the precise brushwork of Hokusai woodblock prints, they unwind by listening to the ambient piano works of Ludovico Einaudi, and they collect model‑kit packaging
    that features artful illustrations reminiscent of classic aviation posters.
  travel: Son Oh prefers meticulously planned weekend getaways, they have recently explored the red‑rock canyons of Sedona, the historic streets of Kyoto’s Gion district, and the Scottish Highlands, while
    they dream of a future road trip along New Zealand’s South Island where they can sketch and photograph remote landscapes.
  culinary: Son Oh’s kitchen is a laboratory for traditional fermented cabbage stew (kimchi jjigae), grilled marinated beef (bulgogi), and homemade soybean paste soup (doenjang‑guk), where they expertly
    balance gochujang, sesame oil, and fresh napa cabbage, but they often neglect pastry skills, admitting they can’t tell a soufflé from a pancake.
  core: Son Oh is a routine‑driven IT veteran who marries meticulous system management with a quiet passion for model building, solo hikes, and cooking bold fermented dishes, while they quietly battle a
    stubborn habit of postponing dental check‑ups.
background:
  cultural: Son H Oh is a first‑generation Korean American who grew up in a bilingual household that emphasized respect for elders, diligence, and community. While he has fully integrated into the Texan
    environment of Killeen—especially the military community surrounding Fort Hood—he continues to observe Korean cultural traditions such as Chuseok and Korean New Year. His cultural identity blends Korean
    family values with American individualism, influencing his pragmatic work ethic, preference for clear structures, and a reserved yet courteous interpersonal style.
