  career_goals: Son aims to progress from his current managerial role to a senior leadership position such as Director of IT or Chief Information Officer within the next five years. He seeks to lead larger,
    multi‑site IT operations, championing a balanced approach that preserves system reliability while integrating emerging secure technologies. He plans to mentor junior staff, formalize a mentorship program,
    and drive initiatives that improve operational efficiency through automation, all while maintaining the structured, predictable environment he values.
