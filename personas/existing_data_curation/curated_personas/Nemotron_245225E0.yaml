personas:
  professional: Erika Dunn is a budding community storyteller who spends every afternoon at the local library's "Young Voices" program, using their natural organization and curiosity to interview elders,
    record their stories, and create illustrated books that celebrate the city's heritage.
  sports: Erika Dunn is enrolled in the Little Kickers soccer club, cheering for DC United during weekend matches, and they balance high-energy practice sessions with quiet pre-game visualization routines
    that reflect their disciplined nature.
  arts: Erika Dunn immerses themselves in the city's mural trails, loves to mimic the bold colors of the U Street Corridor wall art, and spends evenings humming gospel songs from church potlucks while copying
    out the lyrics of Ella Fitzgerald's Summertime in a personal notebook.
  travel: Erika Dunn enjoys family day trips to the Smithsonian's National Museum of History, dreams of exploring the Caribbean islands where their grandparents once lived, and prefers itineraries that
    blend museum visits with interactive storytelling workshops, even if the journey means a long car ride.
  culinary: Erika Dunn's favorite meals are cheesy macaroni with a side of collard greens and sweet potato pie, they love to help their parent whisk honey into oatmeal, and their budding cooking skill often
    results in over-mixed batter but a proudly presented plate.
  core: Erika Dunn is a curious, meticulously organized five-year-old who turns everyday chores into mini-projects, collects stories like treasures, and can't resist an extra cookie before bedtime.
background:
  cultural: Erika is a Black child growing up in the vibrant, multicultural fabric of Washington, DC. Her family celebrates African American traditions such as Juneteenth, Kwanzaa, and church worship, often
    accompanied by gospel music and community potlucks. The city’s rich artistic scene, from the murals of the U Street Corridor to the Smithsonian’s National Museum of African American History and Culture,
    nurtures her appreciation for art and history. Her parents encourage participation in local youth programs that highlight Black heritage, and she frequently hears stories of ancestors from the South
    and Caribbean, shaping her sense of identity and pride. This cultural environment, combined with the city’s emphasis on education and civic engagement, informs her organized nature, curiosity, and ambition
    to contribute positively to her community.
attributes:
