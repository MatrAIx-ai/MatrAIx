  hobbies: '["Drawing and painting", "LEGO building and organizing", "Collecting and categorizing natural items", "Storytime and picture book reading", "Dancing to Afro-beat music", "Simple science experiments",
    "Visiting museums and cultural sites"]'
  career_goals: Even at five, Erika dreams big. She often tells her parents she wants to become an astronaut who explores space, a museum curator who preserves art, or a scientist who discovers new things—visions
    that combine her love of discovery, art appreciation, and high standards for achievement. She hopes one day to lead community art workshops for kids in Washington, DC, where she can organize creative
    projects and inspire other children to explore new ideas while keeping everything beautifully arranged.
