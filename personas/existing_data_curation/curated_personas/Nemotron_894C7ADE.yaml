  hobbies: '[''abstract watercolor painting'', ''poetry and short prose writing'', ''birdwatching'', ''organic gardening (heirloom vegetables and native flowers)'', ''reading philosophy, science fiction,
    and local history'', ''listening to classical and jazz music'', ''playing chess'', ''volunteering at community center'', ''photography of nature'']'
  career_goals: Bradley aims to publish a modest collection of his poems and short reflections, chronicling his life experiences and the changing Midwestern landscape. He also hopes to expand the community
    garden he tends, turning it into a small educational space where he can share his gardening knowledge with neighborhood youth. Additionally, he plans to continue contributing to the Marion Historical
    Society by compiling oral histories of long-time residents, ensuring that local stories are preserved for future generations. His overarching ambition is to leave a lasting, gentle imprint on his community
    through creative expression and mentorship.
