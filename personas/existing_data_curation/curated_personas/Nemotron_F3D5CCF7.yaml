  hobbies: '[''Visiting galleries and museums'', ''Sketching and watercolor painting'', ''Photography classes'', ''Book club membership'', ''Pottery workshops'', ''Yoga'', ''Gardening'', ''Gratitude journaling'',
    ''Community volunteer work at the fine arts museum'']'
  career_goals: Judith aims to transition from a front‑line cashier to a supervisory role within the next three years, eventually becoming a store manager. To support this progression, she is enrolling
    in evening courses to complete her bachelor's degree in business administration and is pursuing a certification in retail management. Simultaneously, she hopes to blend her love of art with her professional
    life by volunteering at the Jeffersonville Fine Arts Museum and eventually securing a part‑time coordinator position for community art workshops. In the longer term, she envisions opening a small studio
    space where she can host craft classes and showcase local artists, creating a modest supplemental income while nurturing her creative interests.
