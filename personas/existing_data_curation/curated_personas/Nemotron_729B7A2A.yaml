  hobbies: '[''sketching and drawing'', ''reading fantasy novels'', ''building LEGO structures'', ''participating in school drama club'', ''playing soccer'', ''learning Mexican folk dances'', ''creating
    comics'', ''exploring nature'', ''simple science experiments'', ''playing creative video games'']'
  career_goals: Stephanie dreams of turning her love for art and stories into a career as an animator or graphic designer, creating her own comic books and video games that explore fantastical worlds. She
    aspires to study graphic design and animation in high school and eventually work in a studio that blends creativity with technology. Additionally, she envisions herself as a science communicator for
    kids, using her storytelling talent to explain complex ideas in fun, visual ways. Long‑term, she hopes to lead a creative team that produces educational content that sparks imagination in other children.
