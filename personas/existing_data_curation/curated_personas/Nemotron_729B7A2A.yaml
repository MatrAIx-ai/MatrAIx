personas:
  professional: Stephanie Handa is an aspiring comic artist and budding game level designer whose vivid sketches and meticulously arranged panel layouts showcase a boundless imagination tempered by a surprisingly
    organized workflow, and they channel their competitive streak into regular participation in school art contests.
  sports: Stephanie Handa storms the soccer field as a forward for the Mesa Cougars U‑11 team, joins the Arizona Desert Explorers club for weekend trail hikes, roots for the Arizona Cardinals, and they
    balance a competitive drive with a love for outdoor play.
  arts: 'Stephanie Handa immerses themselves in drawing comic panels inspired by Jim Lee’s dynamic style, painting vibrant scenes that echo Hayao Miyazaki’s whimsical palettes, and designing sets and costumes
    for the school drama club, and they often draw storytelling energy from Rebecca Sugar’s ‘Steven Universe’ and the visual flair of ‘Spider‑Man: Into the Spider‑Verse’.'
  travel: Stephanie Handa favors spontaneous weekend road trips to nearby desert gems like Sedona’s red‑rock trails and the Grand Canyon’s rim, while dreaming of a family vacation to Tokyo’s Akihabara district
    to explore anime culture, and they balance an appetite for adventure with the practical constraints of a school calendar and a modest family budget.
  culinary: Stephanie Handa delights in cheesy pizza slices, crunchy quesadillas, and warm chocolate‑chip cookies, often experimenting in the kitchen with avocado‑lime smoothies and LEGO‑shaped pancake
    creations, though they sometimes skip the veggies in favor of extra cheese and extra frosting.
  core: Stephanie Handa blends a relentless imagination with a competitive edge, and they spend their days sketching comic heroes, scoring soccer goals, and meticulously saving pocket money for the next
    LEGO masterpiece.
background:
  cultural: Stephanie is a first‑generation Mexican‑American raised in Mesa, Arizona. At home, Spanish is spoken alongside English, and she celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings centered around foods like tamales, quesadillas, and horchata. The vibrant colors and storytelling of Mexican folklore inspire her artwork, while the desert landscape
    of the Southwest fuels her love for exploring nature. Her community's blend of Hispanic culture and Southwestern influences shapes her identity, providing a rich tapestry of cultural references that
    she weaves into her creative projects.
