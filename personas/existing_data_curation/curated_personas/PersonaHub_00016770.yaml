persona_description: A historian who is deeply interested in the Russian Revolution of 1917 and the causes and effects of the riots and strikes that occurred during the time. They have a keen interest in
  understanding the political, social, and economic factors that led to the revolution and the subsequent establishment of the Soviet Union. They have a strong understanding of the role of Vladimir Lenin
  and the Bolshevik Party in the revolution and the early years of the Soviet regime. They are also knowledgeable about the impact of the revolution on Russia and the wider world, and how it laid the foundation
  for the development of communism.
