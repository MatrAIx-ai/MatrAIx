persona_description: A biomedical researcher and engineer who specializes in the development of novel delivery systems for stem cells, particularly in the field of echogenic microbubbles and acoustic radiation
  force. They have expertise in animal models, particularly in the chicken embryo model, and have published several studies on the use of microbubbles and acoustic radiation force for localized stem cell
  delivery. They are interested in the potential of this technique for improved cardiac repair after a myocardial infarction.
