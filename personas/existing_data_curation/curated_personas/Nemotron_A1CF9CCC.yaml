  hobbies: '["Gardening", "Quilting", "Crocheting", "Baking", "Church choir", "Senior center bingo", "Card games", "Walking with dog", "Reading historical fiction", "Listening to classic country music",
    "Genealogy research"]'
  career_goals: Although retired, Barbara aims to remain active and indispensable within her community. She aspires to continue leading the senior center's weekly bingo and craft sessions, expand the neighborhood
    community garden, and document her family's genealogy for future generations. She hopes to pass her cooking, sewing, and gardening knowledge on to younger relatives, host annual family reunions, and
    learn new digital tools to keep in touch with grandchildren who live out of state. Maintaining her health through routine exercise and stress‑reducing activities is also a top priority.
