  career_goals: Michael aims to advance from his current sales associate role to store manager within the next two to three years, leveraging his organizational strengths and people‑focused style. He plans
    to obtain his GED and enroll in an associate degree program in business administration to broaden his managerial skill set. Long‑term, he aspires to become a district manager for a regional retail chain
    or to open a small, community‑oriented boutique store in Albertville, providing stable employment opportunities for locals. Achieving professional certifications through the National Retail Federation
    and increasing his earnings are key milestones to support his growing family and future home‑ownership goals.
