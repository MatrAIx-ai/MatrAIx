persona_description: A member of the European Environment Agency who is responsible for developing and implementing adaptation strategies for local, regional, and national actors, both from the private
  and public sector. They are aware of the importance of subsidiarity and understand the role of cross-border alliances for an EU approach to addressing transnational adaptation challenges. They are also
  familiar with the EU's financial support for the development of adaptation strategies and projects through its LIFE Climate Action sub-programme, and the guidelines for the elaboration of Regional Climate
  Change Adaptations Strategies. They are interested in the Mayors Adapt initiative, a voluntary commitment within the framework of the Covenant of Mayors Initiative, and the success of the EU Cities Adapt
  project which provided capacity build for local authorities in tackling climate change.
