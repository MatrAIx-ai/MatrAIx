  career_goals: Frederick aims to graduate high school with top honors and pursue a degree in engineering—preferably civil or mechanical—at a reputable university in Texas. He is motivated by the prospect
    of designing infrastructure that benefits his community and hopes to eventually become a project manager overseeing large‑scale construction projects. Drawn to structured environments, Frederick is
    also considering enlistment in the U.S. Army Reserve to further develop discipline and leadership while serving his country.
