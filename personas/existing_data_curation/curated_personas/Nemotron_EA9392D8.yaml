personas:
  professional: Serafina Hernandez is a systems analyst turned creative technologist who blends rigorous ITIL‑driven process mapping with generative art, leading hackathon teams, delivering polished stakeholder
    briefings, and charting a rapid path toward senior systems architect roles.
  sports: Serafina Hernandez fuels their competitive streak through salsa dancing nights, weekend hikes across the Texas Hill Country with the Austin Trailblazers club, and avidly follows the Dallas Mavericks,
    cheering loudly at home games while also dabbling in local rock‑climbing sessions.
  arts: Serafina Hernandez immerses themselves in the digital art scene, regularly attending the Contemporary Arts Museum Houston to view Refik Anadol’s immersive installations, curates synth‑wave playlists
    featuring Kavinsky and Com Truise, and draws creative inspiration from indie film directors like Greta Gerwig and the speculative storytelling of William Gibson.
  travel: Serafina Hernandez prefers spontaneously planned road trips that blend tech conferences in Seattle, salsa workshops in Cartagena, and sunrise hikes in Sedona, while dreaming of attending the Edinburgh
    Fringe Festival and a future immersive art retreat in Reykjavik.
  culinary: Serafina Hernandez loves crafting spicy chicken tinga tacos with fresh cilantro and lime, experiments with matcha‑infused desserts, and showcases a budding skill in making hand‑rolled sushi,
    yet often orders delivery of artisanal pizzas after marathon hackathon nights.
  core: Serafina Hernandez is a talkative, competition‑driven young technologist who fuses analytical rigor with vibrant artistic expression, often juggling code, canvas, and salsa shoes while occasionally
    neglecting sleep.
background:
  cultural: Serafina was raised in Spring, Texas, a diverse suburb of Houston, in a family that identifies as white with deep roots in the Lone Star State. Her parents, both college‑educated professionals,
    came from a line of mid‑20th‑century settlers who migrated from the Midwest and intermarried with a small Hispanic community, giving her the surname Hernandez. Growing up in a multicultural environment,
    she was exposed to a blend of Southern hospitality, Texan independence, and the vibrant cultural mosaic of the Houston metropolitan area. This background fostered an appreciation for regional traditions—such
    as Fourth of July fireworks, Texas barbecues, and local music festivals—while also encouraging openness to diverse perspectives. The coexistence of Anglo‑American and Hispanic influences is reflected
    in her bilingual familiarity with occasional Spanish phrases and a love for both Tex‑Mex cuisine and classic American comfort foods.
attributes:
  skills: '[''Systems analysis'', ''Requirements gathering'', ''SQL'', ''Python scripting'', ''Data modeling'', ''Process mapping'', ''Performance monitoring'', ''Tableau data visualization'', ''ITIL change
    management'', ''AWS Solutions Architecture'', ''Scrum Mastery'', ''Stakeholder communication'', ''Technical documentation'', ''Critical thinking'', ''Creative problem solving'']'
  hobbies: '[''Digital illustration'', ''Generative art with Processing'', ''Attending art galleries'', ''Indie film screenings'', ''Improv comedy'', ''Hackathons'', ''Escape rooms'', ''Salsa dancing'',
    ''Hiking in Texas Hill Country'', ''Synth‑wave music curation'', ''Science‑fiction reading'', ''Short story writing'', ''Mentoring high‑school coding clubs'']'
  career_goals: Serafina aims to transition from analyst to senior systems architect within the next five years, overseeing large‑scale digital transformation projects that blend emerging technologies like
    AI, IoT, and augmented reality with user‑centric design. She plans to deepen her expertise in cloud architecture (pursuing AWS Professional and Azure certifications) and earn a master's degree in data
    science. Her long‑term ambition is to become a recognized thought leader who regularly presents at industry conferences, publishes articles on innovative system design, and mentors early‑career technologists.
    Ultimately, she envisions launching her own consultancy that helps organizations fuse technical rigor with creative solutions, positioning her at the intersection of technology, art, and business strategy.
