personas:
  professional: Jessica Diego, a veteran residential and light‑commercial electrician with over 35 years of hands‑on experience, combines her journeyman expertise in NEC‑compliant wiring, blueprint interpretation,
    three‑phase motor installations, solar PV and EV charger deployments, and smart‑home automation with a meticulous, documentation‑driven workflow and a competitive drive to lead small crews, earn industry
    safety awards, and launch a boutique contracting firm focused on energy‑efficiency retrofits as she pursues Master Electrician certification.
  sports: Jessica Diego, an avid member of the Cascades Trail Club, spends her summers hiking the Pacific Northwest’s forested paths, follows the Seattle Seahawks for football and the Portland Timbers for
    soccer, occasionally joins a community‑organized 5K run, and prefers steady, low‑impact endurance activities over competitive team sports.
  arts: Jessica Diego, a devoted reader of Agatha Christie mysteries and Hilary Mantel’s historical novels, finds solace in the tango compositions of Astor Piazzolla, enjoys intimate folk‑music gatherings
    featuring Los Chalchaleros, and occasionally attends a community theater’s production of ‘The Glass Menagerie’ to satisfy her quiet appreciation for the performing arts.
  travel: Jessica Diego, who values reflective travel, has trekked Olympic and Glacier National Parks, dreams of completing Patagonia’s iconic W trek and a New Zealand alpine hike, while also planning leisurely
    visits to San Francisco’s historic districts and a coastal retreat on Vancouver Island to balance adventure with quiet contemplation.
  culinary: Jessica Diego, an enthusiastic home chef, expertly rolls empanadas, slow‑cooks asado seasoned with garden‑grown cilantro, oregano, and rosemary, finishes with a bright chimichurri sauce, brews
    mate tea for intimate gatherings, and pairs her meals with a robust Malbec or a crisp Sauvignon Blanc to complement the flavors.
  core: Jessica Diego blends a methodical, competitive mindset with solitary, hands‑on pursuits—hiking, woodworking, and precise electrical work—while nurturing her cultural roots through cooking, mate
    rituals, and occasional tango evenings.
background:
  cultural: Jessica was born in Buenos Aires, Argentina, and moved to the United States with her family in her early teens. She is fluent in both Spanish and English and retains a strong connection to Argentine
    culture through language, food, and traditions. She regularly prepares and shares Argentine staples such as empanadas, dulce de leche desserts, and grilled meats, and she observes Argentine holidays
    like Independence Day and Día de la Tradición. The ritual of drinking mate, often in a small circle of close friends, reflects her preference for intimate social settings. Within the Hillsboro community,
    she participates in a local Argentine cultural association, contributing to small events that celebrate music, dance, and cuisine. Her Argentine heritage informs her work ethic—characterized by resilience,
    practicality, and a collaborative spirit—while her integration into the Pacific Northwest lifestyle adds a focus on environmental sustainability and self‑reliance.
