    and OSHA compliance'', ''Project documentation and record‑keeping'', ''Supervising apprentices and small crews'']'
  hobbies: '[''Gardening (vegetable and herb garden)'', ''Reading mystery and historical fiction'', ''Crossword and puzzle solving'', ''Hiking on Pacific Northwest trails'', ''Cooking Argentine cuisine'',
    ''Practicing mate tea rituals'', ''Woodworking and DIY home projects'', ''Attending small tango or folk music gatherings'', ''Volunteering for electrical safety workshops'']'
  career_goals: Jessica aims to obtain her Master Electrician license within the next two years and add certifications in solar energy and electric‑vehicle infrastructure. She aspires to move into a supervisory
    role at a reputable contracting firm, eventually establishing her own boutique electrical contracting business that specializes in energy‑efficiency retrofits for older homes. Mentoring the next generation
    of electricians is a priority, and she plans to become a certified electrical safety trainer for community workshops. Her competitive nature drives her to be recognized locally for safety excellence
    and to win industry awards for quality workmanship.
