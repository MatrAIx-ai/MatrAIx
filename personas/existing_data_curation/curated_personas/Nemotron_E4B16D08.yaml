  career_goals: John aims to transition from entry‑level warehouse work toward a role that blends logistics expertise with his desire to make a positive community impact. He plans to enroll in a community‑college
    supply‑chain program and earn an APICS certification within the next two years. His short‑term goal is to become a logistics coordinator for a regional distribution center that values sustainable practices
    and employee well‑being. In the longer term, John hopes to work for a nonprofit arts organization or community‑focused social service that requires sophisticated inventory and distribution management,
    allowing him to combine his logistical skills with his passion for art and helping others. Ultimately, he envisions one day launching his own small e‑commerce platform that showcases works by local
    Black artists while handling all aspects of fulfillment efficiently.
