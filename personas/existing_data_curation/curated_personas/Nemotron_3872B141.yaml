    music'']'
  career_goals: Carmen aims to transition from an office clerk to an office manager or administrative supervisor within the next five years. She plans to complete an associate’s degree in business administration
    and earn the Certified Administrative Professional (CAP) credential to bolster her credentials. Leveraging her bilingual skills, she aspires to become a liaison for Spanish‑speaking clients in a city
    government agency, helping bridge community services and municipal resources. Carmen seeks a role that balances stability with opportunities for continuous learning, allowing her to mentor newer staff
    while still contributing practical improvements to office operations.
