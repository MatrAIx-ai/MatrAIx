  career_goals: Approaching retirement, Ellen aims to leave a lasting scholarly and institutional legacy. She aspires to secure a major grant that funds a community‑based arts program linking the university
    with Bloomfield Hills cultural institutions. Developing an interdisciplinary liberal‑arts certificate that foregrounds experiential learning is a priority, as is publishing a monograph on 20th‑century
    American literature. She hopes to serve as department chair or senior faculty mentor, shaping curriculum policy and guiding junior scholars. Post‑emeritus, she plans to continue teaching occasional
    seminars, offer consulting on curriculum development, and foster an alumni network that supports lifelong learning and community service.
