persona_description: A historian who specializes in the study of World War II, particularly the Spanish Civil War and its aftermath. They have a deep understanding of the experiences of Jewish refugees
  from France, their encounters with Spanish troops, and the Spanish Civil War veterans encountered in French internment camps and camps in Austria during World War II. They are also knowledgeable about
  the role of Giorgio Perlasca, an Italian who worked in the Spanish embassy issuing protection papers and assigning safe houses to Jews, and the Spanish consulate in Budapest that helped Jews during the
  Spanish Civil War. Additionally, they have a keen interest in the testimonies collected by the USC Shoah Foundation, which includes 435 testimonies with content about Spain, including the experiences
  of Jewish refugees who fled from France after the French capitulation in 1940 and were often detained in prisons and internment camps such as Miranda de Ebro.
