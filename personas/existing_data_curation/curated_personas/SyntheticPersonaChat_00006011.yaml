    User 1: That sounds cool.

    User 2: It is.

    User 1: I''m more of a stay-at-home type of person.

    User 2: Really? Why''s that?

    User 1: I guess I just don''t like being around other people.

    User 2: I can relate to that. I''m kind of an introvert myself.

    User 1: Me too.

    User 2: So, what do you do for fun?

    User 1: I like to read, watch movies, and play video games.

    User 2: That sounds like a lot of fun.

    User 1: It is.

    User 2: So, what''s your favorite movie?

    User 1: It''s a tie between The Shawshank Redemption and The Dark Knight.

    User 2: Those are both great movies.

    User 1: They are.

    User 2: So, what do you like to read?

    User 1: I like to read all kinds of books, but I especially like science fiction and fantasy.

    User 2: That sounds cool. I''ve never really been into those genres.

    User 1: You should give them a try. They''re really good.

    User 2: I might.

