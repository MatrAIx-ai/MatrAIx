personas:
  professional: Thomas Cuesta, a 41‑year‑old casino surveillance officer, leverages their meticulous video‑monitoring expertise and bilingual communication to de‑escalate incidents, mentor junior guards,
    and systematically document compliance, embodying their preference for structure and reliability in every shift.
  sports: Thomas Cuesta balances a disciplined weight‑training regimen at the Baltimore Fitness Club with weekend Chesapeake Bay bass fishing, roots for the Baltimore Ravens and Liga MX’s Club América,
    and joins a local corporate softball league each summer, reflecting their methodical yet sociable approach to sport.
  arts: Thomas Cuesta enjoys listening to the classic boleros of José Alfredo Jiménez, the modern pop of Luis Miguel, and the Mexican cinema of Alfonso Cuarón, while occasionally attending live performances
    at the Baltimore Symphony Orchestra, and they study chess strategies as a form of artful mental exercise.
  travel: Thomas Cuesta has meticulously planned a family road trip along the Blue Ridge Parkway, has visited the historic streets of Cartagena, Colombia, and dreams of exploring the vineyards of Mendoza,
    Argentina, while balancing their budget and work schedule.
  culinary: Thomas Cuesta, a confident home cook, regularly prepares mole poblano with dried chiles, chocolate, and epazote, perfects tacos al pastor using pineapple and achiote, and masters Chesapeake
    Bay crab cakes seasoned with Old Bay and fresh dill, showcasing their love for both Mexican tradition and local seafood.
  core: Thomas Cuesta is a methodical security professional who blends disciplined routines—from weight‑lifting and chess to cooking mole and fishing the Bay—with a pragmatic, budget‑conscious mindset,
    yet they refuse to skip the occasional late‑night salsa session, a quirk that keeps life spicy.
background:
  cultural: Thomas was raised in a Mexican immigrant household, speaking Spanish at home and English at school. He carries strong family values, celebrates traditions such as Día de los Muertos, posadas,
    and enjoys cooking dishes like tamales and pozole. While living in Norfolk, he participates in the local Hispanic community, attending cultural festivals and staying connected to his heritage through
    music, soccer, and church activities. His bicultural experience informs his respectful and collaborative approach both at work and in his personal life.
attributes:
  skills: '[''CCTV monitoring'', ''Surveillance analysis'', ''Incident reporting'', ''Conflict de-escalation'', ''First aid and emergency response'', ''Security system maintenance'', ''Risk assessment'',
    ''Regulatory compliance (gaming regulations)'', ''Team supervision and mentorship'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Fishing'', ''Weight training'', ''Chess'', ''Cooking Mexican cuisine'', ''Watching classic movies'', ''Following Liga MX soccer'', ''Community safety volunteering'', ''Gardening'']'
  career_goals: Thomas aims to progress from his current surveillance role to a supervisory position, such as Shift Lead or Security Manager, within the next three to five years. He plans to obtain professional
    certifications like the Certified Protection Professional (CPP) and a state-issued security officer license to qualify for higher-level responsibilities. Long-term, he envisions transitioning into private
    security consulting, leveraging his experience to advise gaming establishments on loss-prevention strategies, while also ensuring a stable income that supports his family's future.
