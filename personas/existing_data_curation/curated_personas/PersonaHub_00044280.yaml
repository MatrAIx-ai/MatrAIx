persona_description: A professional involved in the assessment and analysis of water balances and their potential impacts due to coal resource developments in the Hunter subregion, a bioregional area. This
  persona is likely to be interested in understanding the changes in groundwater balance and surface water balances over time, as well as the potential risks and impacts on water resources and water-dependent
  assets due to coal resource development. They may be involved in the impact and risk analysis (Component 3 and 4) products, which examine the risk to, and potential impacts on, water resources and water-dependent
  assets due to coal resource developments. This persona may have expertise in surface water and groundwater numerical modeling, as well as in bioregional assessment and coal resource development.
