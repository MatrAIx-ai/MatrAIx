  hobbies: '[''Basketball at community center'', ''Church choir'', ''Vintage radio restoration'', ''Southern cooking'', ''STEM mentoring for local youth'', ''Attending community festivals'', ''DIY electronics
    projects'', ''Group board game nights'']'
  career_goals: Naythan aims to become a senior field service technician and eventually a team lead for a regional fleet of ATMs and office equipment. He plans to earn certifications such as CompTIA A+
    and the Certified Service Technician credential, which will open pathways to managing service schedules and training apprentices. Over the next five years, he hopes to launch his own small‑business
    service firm focused on reliable, community‑based maintenance for automated banking and office solutions in the Midwest, leveraging his technical skill set and outgoing personality to build client relationships.
