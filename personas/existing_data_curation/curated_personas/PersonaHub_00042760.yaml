persona_description: A paleontologist who specializes in the study of life on land, particularly the fossil records and the evolution of complex organisms. His research interests include the discovery of
  new fossils, the analysis of the structures and mechanisms of life on land, and the understanding of the role of microorganisms in the evolution of life on Earth. He is particularly interested in the
  discovery of complex life forms on land from one-billion-year-old deposits, as reported in the journal Nature.
