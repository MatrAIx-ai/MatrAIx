personas:
  professional: A budding wildlife conservationist, 13‑year‑old Jane Georgy translates her love of mystery novels' deliberate plots into meticulous 4‑H garden and chicken‑care routines, diligently recording
    observations as she aspires to study animal behavior in graduate school.
  sports: An outdoor‑oriented athlete, 13‑year‑old Jane Georgy roams the trails of Great River Bluffs State Park with the local Junior Hikers Club, cheers on the Minnesota Twins and Timberwolves on game
    days, and runs with her school’s cross‑country team in the fall, valuing steady endurance over high‑intensity competition.
  arts: A quiet creative, 13‑year‑old Jane Georgy finds solace in knitting scarves to the soothing piano renditions of Yiruma, solving 1000‑piece jigsaw puzzles of classic mystery covers, and swapping book
    recommendations for Agatha Christie and the wildlife illustrations of National Geographic, all of which shape her gentle artistic identity.
  travel: A meticulous planner, 13‑year‑old Jane Georgy enjoys weekend camping trips to Great River Bluffs State Park, hopes to photograph the sand dunes of Great Sand Dunes National Park next summer, and
    dreams of a guided bird‑watching expedition in the UK’s Lake District, all carefully budgeted in her travel notebook.
  culinary: A budding home chef, 13‑year‑old Jane Georgy delights in preparing measured recipes like honey‑glazed carrots, apple crumble with cinnamon, and oatmeal granola bars using fresh berries and rolled
    oats, skillfully balancing the precision of her knitting patterns with the rhythm of her mother’s kitchen.
  core: 13‑year‑old Jane Georgy blends a detective’s craving for order with a nature‑lover’s curiosity, meticulously cataloguing garden growth, puzzle pieces, and expenses while occasionally over‑worrying
    about the smallest misstep.
background:
  cultural: Jane comes from a white, Midwestern family with Norwegian‑German ancestry that has lived in Olmsted County for several generations. Her family celebrates a blend of Lutheran traditions and Scandinavian
    holidays, such as Syttende Mai (Norwegian Constitution Day), and they maintain a strong sense of community involvement common in small‑town Minnesota. Growing up in Byron, she participates in local
    events like the town's summer fair and the church's potluck gatherings, which reinforce values of cooperation, self‑reliance, and respect for nature.
attributes:
  skills: '[''Class monitoring and meeting minutes'', ''Time management and personal planning'', ''Basic Excel and budgeting for school projects'', ''Google Docs/Slides proficiency'', ''Knitting and basic
    sewing'', ''Peer mediation and conflict resolution'']'
  hobbies: '[''Reading mystery and wildlife books'', ''4‑H gardening and animal care'', ''Knitting scarves'', ''Bird‑watching and nature photography'', ''Playing piano'', ''Jigsaw puzzles'']'
  career_goals: Jane envisions a future where she can combine her love of structure, helping others, and working with living things. She hopes to graduate from high school with honors, pursue a degree in
    elementary education, and eventually become an elementary school teacher who creates a calm, organized classroom environment for young learners. At the same time, she is fascinated by animals and dreams
    of volunteering at the local veterinary clinic, keeping the possibility open of studying animal science or becoming a small‑animal veterinarian. Her immediate ambition is to earn a leadership badge
    in 4‑H's 'Community Service' and to win a school award for academic organization.
