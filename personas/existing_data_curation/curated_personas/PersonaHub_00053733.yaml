persona_description: A historian or a linguist who is interested in the history of Hebrew writing and the evolution of the written language from the time of Mosheh to the time of Ezra. They have a keen
  interest in the family of written scripts, including Paleo-Hebrew, and how it has influenced our modern written alphabet. They are also interested in how the written language has changed over time and
  how it has been used in art projects and education. They are familiar with the Talmud and have read about the history of the written Torah, including the opinions recorded in the Sanhedrin 21b.
