  career_goals: Jignesh dreams of becoming an engineer or astronaut, fascinated by how machines work and the idea of exploring space. In the short term, he aims to win his school’s science fair, become
    the captain of his soccer team, and volunteer at the local library’s reading program. He also imagines helping animals, so a future as a veterinary engineer appeals to him. He sees himself using his
    curiosity and practical skills to solve real‑world problems.
