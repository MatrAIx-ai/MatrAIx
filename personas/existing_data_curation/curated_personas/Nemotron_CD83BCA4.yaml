personas:
  professional: Jignesh is an aspiring junior coder who builds simple games on Scratch, engineers intricate LEGO models, and leads miniature project teams with methodical planning and a friendly, collaborative
    style, reflecting their organized and sociable nature.
  sports: Jignesh is a lively soccer enthusiast who plays forward for the Riverside Rovers U9 team after school, cheers for Manchester United, and spends weekends at the community park honing dribbling
    drills, reflecting their energetic and cooperative spirit.
  arts: Jignesh engages in creative storytelling through Scratch animations inspired by Pixar’s Toy Story, builds artistic LEGO sculptures reminiscent of works by architect Frank Lloyd Wright, and devours
    adventure novels by Rick Riordan, illustrating how their imagination and love for structured creativity shape their leisure.
  travel: Jignesh loves day‑trip adventures to nearby state parks like Blue Ridge Mountains, plans weekend hikes with a checklist of trail markers, dreams of visiting Disneyland and the Great Wall of China,
    and prefers group travel with friends and family over solo trips.
  culinary: Jignesh delights in helping prepare samosa and gulab jamun for Diwali, enjoys making pizza with extra mozzarella and pepperoni at home, and frequently snacks on chocolate chip cookies, showcasing
    a budding culinary curiosity and hands‑on approach in the kitchen.
  core: Jignesh blends boundless curiosity with methodical organization, turning every soccer match, LEGO build, and Scratch project into a collaborative adventure that balances fun and responsibility.
background:
  cultural: Jignesh comes from a South Asian Indian family that values education, community, and cultural traditions. He is bilingual, speaking English at school and Gujarati at home, and regularly participates
    in cultural events such as Diwali, Holi, and community gatherings at the local Hindu temple in Fort Worth. The blend of his family's heritage and his Texan environment shapes his respect for diversity,
    love of shared meals, and enthusiasm for both traditional celebrations and American school life.
