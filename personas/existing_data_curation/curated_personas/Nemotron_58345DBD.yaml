  career_goals: Kacy’s immediate career goal is to secure her teaching certification and transition from a teaching assistant to a full‑time elementary classroom teacher within the next two years. She plans
    to enroll in a Master’s program in Education, with a focus on inclusive teaching practices and literacy development, to deepen her expertise and broaden her impact. Long‑term, she aspires to assume
    a curriculum specialist or instructional coach role, where she can design structured, evidence‑based programs and mentor new teachers. She also hopes to advocate for teacher well‑being by integrating
    stress‑management resources into school routines, aligning with her personal experience of sensitivity to stress.
