  career_goals: Diana aims to transition into a supervisory or training role within the customer service department, leveraging her compassion and mentorship abilities to coach junior agents. She hopes
    to obtain a certification in customer experience management and explore a community outreach coordinator position at a local nonprofit serving Hispanic seniors. In the longer term, she envisions launching
    a home‑based business offering Spanish‑language virtual assistance and creating workshops on stress‑management for service workers, allowing her to blend her professional skills with her desire to help
    others.
