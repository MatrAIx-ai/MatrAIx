  hobbies: '[''church food pantry volunteering'', ''participating in Latino cultural festivals'', ''Sunday family cooking gatherings'', ''cumbia and salsa dancing'', ''herb and chili gardening'', ''attending
    grandchildren’s soccer games'', ''reading self‑help books'', ''listening to Spanish‑language radio'']'
  career_goals: Enedina aims to formalize her HR knowledge by earning a SHRM‑CP certification within the next two years, positioning herself for a senior HR specialist or team lead role at her current company.
    She hopes to mentor newer staff members, especially those from the local Hispanic community, and to introduce a streamlined onboarding process that reduces paperwork and accelerates new‑hire productivity.
    Long‑term, she envisions a stable, well‑rounded retirement where she can continue supporting her family and possibly volunteer as an HR advisor for nonprofit organizations in Waco.
