  hobbies: '[''Intramural soccer'', ''Volunteering at local animal shelter'', ''Hiking in coastal trails and Acadia National Park'', ''Photography'', ''Reading contemporary YA and mystery novels'', ''Baking
    seasonal treats'', ''DIY knitting and crocheting'', ''Maintaining a lifestyle blog'', ''Board game nights with friends'', ''Attending live music events'']'
  career_goals: Chloe aims to complete an associate's degree in Business Administration within the next two years and then secure an entry‑level position as a project coordinator or marketing assistant
    at a regional company. She is attracted to roles that blend structured workflows with regular interaction with colleagues and clients. In the longer term, she hopes to earn a Project Management Professional
    (PMP) certification and move into a managerial position overseeing community outreach or event management programs, where she can leverage her organizational strengths and sociable nature to drive successful
    initiatives.
