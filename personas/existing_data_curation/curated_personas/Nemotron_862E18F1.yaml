personas:
  professional: Chloe Johnson is an aspiring business professional who leverages her strong interpersonal communication, event‑planning expertise, and Excel bookkeeping skills to coordinate campus projects,
    while her preference for structure and community‑focused values make her the reliable backbone of any team.
  sports: Chloe Johnson is a dedicated intramural soccer player who cheers for the Boston Red Sox and the Portland Sea Dogs while also volunteering as an assistant coach for the Coastal Maine Soccer Club’s
    youth program, blending a love of team competition with community spirit.
  arts: Chloe Johnson expresses creativity through photography, often inspired by the works of Annie Leibovitz and the coastal landscapes of Maine, and enjoys the indie folk sounds of Phoebe Bridgers, the
    storytelling of Greta Gerwig’s films, and the whimsical illustrations of Kate McMilan, which all inform the aesthetic of their lifestyle blog.
  travel: Chloe Johnson prefers weekend road trips that combine hiking along the Acadia shoreline and exploring historic lighthouses, while dreaming of a summer backpacking adventure through the Scottish
    Highlands, balancing a modest travel budget with a love for both local nature and far‑flung cultural experiences.
  culinary: Chloe Johnson delights in baking blueberry crumble and lobster roll bites for friends, often seasoning with fresh dill and local honey, and they can whip up a quick lobster bisque using a ready‑made
    stock, while their cooking skill sits at a comfortable home‑cook level, regularly sharing these recipes on their blog.
  core: Chloe Johnson is a structure‑loving, socially energized 18‑year‑old who balances meticulous organization, community volunteering, and occasional indulgent cravings for blueberry treats, all while
    navigating college life with a pragmatic, slightly impulsive streak.
background:
  cultural: Chloe grew up in Durham, a small town in Cumberland County, Maine, within a middle‑class, primarily Anglo‑American family with deep New England roots. Her household emphasized practicality,
    self‑reliance, and community involvement, values reinforced by the region's seasonal traditions such as lobster festivals, blueberry picking, and Fourth of July parades. Family gatherings often feature
    local seafood dishes and homemade pies, reflecting the coastal culture. While she respects these regional customs, Chloe is also open to broader American cultural influences through her college experience
    and social circles, which have exposed her to diverse viewpoints and contemporary trends.
attributes:
  skills: '[''Effective communication'', ''Team collaboration'', ''Event planning'', ''Time management'', ''Microsoft Office proficiency'', ''Social media content creation'', ''Basic accounting'', ''Public
