personas:
  professional: Beverly Morabito, a seasoned community arts coordinator with a humanities background, leverages their strong facilitation and grant‑writing skills to design inclusive workshops for seniors
    while balancing their need for structure with a flexible, people‑centric approach.
  sports: Beverly Morabito cheers for the New York Knicks and the New York Yankees, participates in a community soccer pickup at McCarren Park on Saturdays, and maintains a routine of evening walks along
    the Brooklyn waterfront to stay active.
  arts: Beverly Morabito, a regular at Brooklyn Bowl concerts featuring artists like Patti Smith and indie folk bands, frequents off‑Broadway shows such as "Hadestown", and leads a poetry‑reading circle
    that celebrates the works of Maya Angelou and local slam poets.
  travel: Beverly Morabito enjoys immersive trips to Sicily and Tuscany, where they reconnect with family recipes and festivals, while also taking spontaneous weekend getaways to the Hudson Valley’s farm‑to‑table
    retreats, balancing structured itineraries abroad with relaxed explorations at home.
  culinary: Beverly Morabito delights in preparing classic risotto alla Milanese, slow‑cooked Sunday sauce with San Marzano tomatoes, and tiramisu, while their balcony garden supplies fresh basil and rosemary
    that they sprinkle into dishes, and they occasionally experiment with vegan cauliflower gnocchi.
  core: Beverly Morabito blends a love for community storytelling, disciplined yet adaptable organization, and a penchant for Italian culinary traditions, all while juggling anxiety‑driven worries and a
    chronic habit of misplacing keys.
background:
  cultural: Beverly is a white American with Italian ancestry, as suggested by her surname Morabito. Growing up in a multicultural environment in Brooklyn, she blends the warm, food‑centric traditions of
    her Italian family with the diverse artistic tapestry of her neighborhood. Her humanities education deepened her appreciation for literature, history, and cultural expression, fueling her involvement
    in community arts. The immigrant, working‑class ethos of Brooklyn's boroughs has shaped her empathy for under‑represented groups and spurred her commitment to community outreach. While she values her
    ethnic heritage—celebrating Italian holidays, cooking family recipes, and maintaining ties to relatives in Italy—she also embraces the eclectic, inclusive spirit of New York City, which informs her
    social activities and volunteer work.
