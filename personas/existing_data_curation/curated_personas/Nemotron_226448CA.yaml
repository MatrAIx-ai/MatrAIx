  hobbies: '[''Live music'', ''Theater'', ''Book club'', ''Volunteer art teaching'', ''Gardening'', ''Cooking Italian cuisine'', ''Dance classes'', ''Yoga'', ''Photography'', ''Travel to Italy'']'
  career_goals: Beverly aims to re‑enter the workforce in a part‑time or freelance capacity, focusing on arts program coordination at a Brooklyn community center or nonprofit. She wants to launch a small
    consultancy offering storytelling workshops and cultural‑heritage projects for senior citizens, leveraging her love for community engagement. Publishing a memoir about her experiences in Brooklyn and
    securing a grant to develop a neighborhood mural project are also high on her list. While seeking financial stability, she prioritizes flexibility and roles that allow her to maintain a structured creative
    routine to help manage stress and anxiety.
