personas:
  professional: Angelica Santiagoocasio leverages bilingual fluency and a knack for digital sales tools to excel as a front-line sales associate, while balancing curiosity-driven experimentation with reliable
    organization as they pursue a transition to team leader and future boutique owner.
  sports: Angelica Santiagoocasio mixes weekly Zumba and boot-camp workouts with salsa dancing for cardio, follows the San Antonio Spurs and San Antonio Missions, and participates in a local co-ed soccer
    league, embodying a social and energetic approach to fitness.
  arts: Angelica Santiagoocasio curates Instagram stories featuring their favorite Latin pop hits from Bad Bunny and J Balvin, binge-watches teen dramas like Euphoria, and visits local mural tours showcasing
    urban street art, letting music and visual culture shape their evenings.
  travel: Angelica Santiagoocasio enjoys weekend road trips to the Texas Hill Country wineries, has explored New Orleans for its music scene, and dreams of a solo backpacking adventure through the Pacific
    Northwest, balancing limited student budget with a love for cultural immersion.
  culinary: Angelica Santiagoocasio loves cooking homemade tamales, chiles rellenos, and pozole during potlucks, blends fresh chilies with masa and corn tortillas with a confident intermediate skill level,
    and always pairs dishes with a side of avocado salsa and fresh cilantro.
  core: Angelica Santiagoocasio is a high-energy bilingual sales enthusiast who channels curiosity into leadership ambitions, balances meticulous budgeting with occasional splurges, wrestles with anxiety
    through proactive self-care, and fills life with rhythmic dance, bold flavors, and vibrant social circles.
background:
  cultural: Angelica grew up in a Mexican-American household in San Antonio, the daughter of first-generation immigrants who taught her Spanish, Catholic traditions, and the importance of family and community.
    Her upbringing blended the vibrant celebrations of Cinco de Mayo, Dia de los Muertos, and local Tex-Mex festivals with a strong work ethic rooted in her parents' entrepreneurial spirit. Bilingualism
    shapes both her personal interactions and her professional approach, allowing her to connect with a wide range of customers. Angelica's cultural identity is reflected in her love for Mexican cuisine,
    traditional music, and community events, while also embracing the diverse, multicultural fabric of modern San Antonio.
