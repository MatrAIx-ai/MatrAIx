  hobbies: '[''Salsa dancing'', ''Group fitness classes (Zumba, boot-camp)'', ''Cooking traditional Mexican recipes'', ''Volunteering at community festivals'', ''Socializing with friends at local cafés'',
    ''Creating Instagram content'', ''Listening to Latin pop and podcasts'', ''Binge-watching teen dramas'', ''Reading self-help books'', ''Exploring new music'']'
  career_goals: In the next two to three years Angelica aims to move from a front-line sales associate to a team leader, taking on mentorship responsibilities and overseeing daily floor operations. She
    plans to enroll in an associate-degree program in Business Administration to strengthen her strategic planning and managerial skills. Her long-term ambition is to become a branch manager for a regional
    retail chain or to launch her own boutique that combines contemporary fashion with traditional Mexican designs. Alongside career advancement, Angelica is committed to developing stress-management techniques
    and leadership training so she can support her family financially while maintaining a healthy work-life balance.
