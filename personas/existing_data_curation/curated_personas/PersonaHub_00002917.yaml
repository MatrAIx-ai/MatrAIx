persona_description: A historian who specializes in the exploration and development of the Great Plains region, particularly the role of the falls of St. Anthony in the establishment of Minneapolis, Minnesota.
  This persona is interested in the history of the fur trade, the development of the power of the falls, and the impact of the railroads on the growth of the flour industry. They have a keen eye for detail
  and a deep understanding of the economic and social changes that occurred in the region during the 18th and 19th centuries.
