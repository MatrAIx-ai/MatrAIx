persona_description: A psychiatrist who specializes in the study of child behavior and mental health, particularly in the areas of attention deficit hyperactivity disorder (ADHD), oppositional defiant disorder
  (ODD), and depression and anxiety. She has conducted research on the long-term outcomes of children with dysregulation and has published studies on the diagnostic criteria and treatment of these disorders.
  She is interested in understanding the interplay between these disorders and has proposed the inclusion of a new diagnosis, DMDD, in the Diagnostic and Statistical Manual of Mental Disorders (DSM) 5.
