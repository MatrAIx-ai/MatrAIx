persona_description: A person who is familiar with the Anatomical Therapeutic Chemical Classification System (ATC) and its variations, including the ATCvet system for veterinary medicinal products. They
  have an interest in understanding how drugs are classified based on their anatomical, therapeutic, and chemical properties, and how these classifications have evolved over time. They may also be interested
  in the history and development of the ATC system, as well as its adaptations and updates. They may have experience working with the WHO Collaborating Centre for Drug Statistics Methodology, which is responsible
  for the creation and maintenance of the ATC system.
