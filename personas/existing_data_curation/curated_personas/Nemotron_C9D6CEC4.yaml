    (Guidewire, Duck Creek)'', ''Advanced Excel and data analysis'', ''Attention to detail and accuracy'', ''Prioritization and case management'', ''Team collaboration and mentorship'', ''Conflict resolution
    and mediation'', ''Stress management and resilience techniques'']'
  hobbies: '[''Southeast Asian cooking and recipe sharing'', ''Karaoke nights with friends'', ''Community volunteering at local food banks'', ''Yoga and mindfulness meditation'', ''Gardening in her backyard'',
    ''Walking and hiking in Red Rock Canyon'', ''Participating in cultural festivals and dance troupes'', ''Board game evenings with neighbors'', ''Reading mystery and thriller novels'', ''Attending local
    art workshops'']'
  career_goals: Jessy aims to advance to a senior underwriting or managerial role where she can lead a small team and drive process improvements. She plans to obtain the Chartered Property Casualty Underwriter
    (CPCU) designation to deepen her expertise and credibility. Over the next few years she hopes to mentor junior underwriters, develop streamlined underwriting workflows, and spearhead community outreach
    programs that improve insurance literacy among the local Southeast Asian population. Additionally, she seeks a balanced workload that allows her to maintain her health and wellbeing while continuing
    to contribute meaningfully to her company’s risk management objectives.
