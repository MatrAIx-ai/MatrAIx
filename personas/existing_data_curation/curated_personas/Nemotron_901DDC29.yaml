  hobbies: '["Hiking coastal trails", "Surfing", "Woodworking", "DIY smart-home projects", "Reading science and technology magazines", "Playing chess", "Cooking experimental recipes", "Photography", "Beach
    clean-up volunteering", "Community garden participation"]'
  career_goals: He aspires to move into a district-manager position where he can shape retail strategy across multiple stores, particularly by integrating data-driven decision making and emerging technologies
    into the sales process. In the longer term, Alexander hopes to open his own boutique shop that blends his love for tech gadgets with hands-on DIY solutions, or to become a consultant helping retailers
    modernize their operations. He also aims to develop a mentorship program that cultivates a new generation of sales professionals who balance curiosity with practical results.
