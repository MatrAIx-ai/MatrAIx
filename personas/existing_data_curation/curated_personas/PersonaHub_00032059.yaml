persona_description: A Canadian politician who has been in power for several years and has made significant efforts to address the issues faced by indigenous peoples in Canada, particularly in terms of
  poverty, violence, and lack of access to safe drinking water. He has also acknowledged the legacy of colonialism and has promised to review federal laws and policies and support indigenous self-determination.
  Despite his efforts, he has faced criticism for not taking more substantive action and for the slow progress of the national inquiry into missing and murdered indigenous women.
