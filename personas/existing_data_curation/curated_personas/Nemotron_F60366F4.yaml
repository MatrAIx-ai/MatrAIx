personas:
  professional: Annie Maultsby, a 21‑year‑old electrical apprentice in Montgomery, blends hands‑on wiring proficiency with a love for solar renewable projects, approaching each job with curious flexibility,
    collaborative problem‑solving, and a calm demeanor that earns trust from clients and fellow tradespeople alike.
  sports: Annie Maultsby, an enthusiastic cyclist and weekend hiker, rides with the Montgomery City Bike Club, follows the Alabama Crimson Tide football team each fall, catches a few Montgomery Biscuits
    baseball games for a laid‑back social outing, and occasionally joins a local yoga class to balance endurance with flexibility.
  arts: Annie Maultsby spends free time sketching murals inspired by Montgomery’s vibrant street‑art scene while curating playlists that weave together John Coltrane’s saxophone improvisations, Aretha Franklin’s
    soulful vocal power, and Nina Simone’s introspective piano, and they regularly attend the Alabama Shakespeare Festival and local gallery openings featuring artists like Lyssa Cartwright.
  travel: Annie Maultsby prefers spontaneous road trips that blend cultural immersion and outdoor adventure, having road‑tripped along the Gulf Coast to New Orleans, hiked the Blue Ridge Mountains near
    Asheville, and explored the music scene in Nashville, while they dream of attending a solar farm tour in Spain and catching the aurora borealis from Reykjavik, all on a moderate budget that balances
    student expenses with travel savings.
  culinary: Annie Maultsby enjoys experimenting in the kitchen with an intermediate skill level, frequently cooking shrimp and grits with smoked Andouille sausage, whipping up quick pesto pasta using fresh
    basil and pine nuts, and occasionally crafting wood‑fired pizza topped with mozzarella, roasted red peppers, and arugula, while they savor a late‑night slice of Nashville hot chicken wings when socializing
    with friends.
  core: Annie Maultsby, a curious 21‑year‑old apprentice electrician, balances a love for street art and DIY projects with a laid‑back vibe and a strong commitment to sustainable trade practices and mentorship.
background:
  cultural: Annie grew up in a close‑knit African‑American community in Montgomery, where family gatherings, church, and local traditions shaped her identity. Immersed in the rhythms of gospel music and
    the storytelling of Southern Black oral tradition, she learned the values of resilience, self‑reliance, and community service. Her heritage fuels her pride in pursuing a skilled trade, an area historically
    underrepresented among women of color. She stays connected to her roots through participation in Juneteenth celebrations, church potlucks, volunteer work, and visits to historic civil‑rights landmarks.
attributes:
  skills: '[''Residential wiring and conduit installation'', ''Electrical code (NEC) compliance'', ''Circuit troubleshooting using multimeter'', ''Blueprint and schematic interpretation'', ''Solar photovoltaic
    system basics'', ''Basic PLC programming'', ''Electrical safety and inspection'', ''Team collaboration and customer service'']'
  hobbies: '[''Street art and mural appreciation'', ''Sketching and visual design'', ''DIY woodworking and home improvement'', ''Building electronics kits'', ''Cycling and hiking'', ''Reading science‑fiction
    novels'', ''Listening to jazz and gospel music'', ''Volunteering to teach electrical safety'']'
  career_goals: Annie aims to obtain her Journeyman Electrician license within the next two years while completing an associate degree in electrical technology. She plans to specialize in renewable energy
    installations, particularly solar, and eventually establish her own electrical contracting firm that emphasizes sustainable practices and provides employment opportunities in her community. She also
    hopes to mentor and advocate for more African‑American women entering skilled trades, using her experience to break down barriers and promote diversity in the field.
