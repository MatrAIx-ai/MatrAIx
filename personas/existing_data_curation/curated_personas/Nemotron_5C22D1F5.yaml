personas:
  professional: A seasoned retail operations leader, Kayla Rojas leverages over twenty years of hands‑on management to streamline inventory, schedule staff, and implement data‑driven standard operating
    procedures across multiple locations, while they mentor diverse teams and consistently exceed performance metrics.
  sports: An avid outdoors enthusiast, Kayla Rojas enjoys weekend hikes along Hill Country trails, plays casual tennis at the local community court, supports the Texas Rangers and Dallas Cowboys, follows
    the San Antonio Spurs during the NBA season, and they participate in the Hill Country 50+ Hiking Club.
  arts: An engaged literary and music aficionado, Kayla Rojas reads mystery novels by Agatha Christie, leadership books by Brené Brown, enjoys the flamenco guitar of Paco de Lucía, and they attend the San
    Antonio Symphony’s quarterly concerts.
  travel: A meticulous planner, Kayla Rojas prefers road trips such as the Hill Country scenic loop and a cultural escape to Santa Fe’s art districts, while they nurture a dream of a culinary pilgrimage
    to Oaxaca and a serene exploration of Kyoto’s historic tea houses.
  culinary: A creative home chef, Kayla Rojas perfects family‑favorite chicken enchiladas with homemade salsa verde, experiments with roasted cauliflower tacos seasoned with chipotle and lime, and they
    craft hearty quinoa bowls blended with black beans, cilantro, and avocado.
  core: Kayla Rojas is a disciplined, curiosity‑driven strategist who balances meticulous order with a love for solitary puzzles, community mentorship, and occasional late‑night indulgence in spicy chiles,
    which they savor as a quiet reward.
background:
  cultural: Kayla is a second‑generation Mexican‑American raised in the culturally rich neighborhoods of San Antonio. Her family’s traditions—celebrating Día de los Muertos, preparing tamales for holidays,
    and speaking Spanish at home—instilled a strong sense of familismo and community responsibility. Bilingual and deeply connected to her Latino heritage, she values hard work, respect for elders, and
    collective support, which shape both her professional demeanor and personal interests. While she embraces the vibrant culture of San Antonio, Kayla’s reserved nature leads her to engage meaningfully
    in small‑group gatherings and community service events that reflect her cultural roots.
