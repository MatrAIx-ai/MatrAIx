  hobbies: '[''Mahjong and bridge games'', ''Community gardening'', ''Cultural festival participation'', ''Walking groups'', ''Knitting circles'', ''Listening to Chinese opera'', ''Museum tours'']'
  career_goals: Although officially retired, Lien aims to deepen her impact on the local senior community. She aspires to lead a weekly wellness and social support group that combines gentle exercise, structured
    mindfulness practices, and group discussions to help seniors manage anxiety and grief. She also hopes to teach a cooking class that preserves traditional family recipes while encouraging participants
    to share their own cultural stories. Over the next few years she plans to mentor younger immigrant women in navigating language barriers and building independent routines, and she dreams of documenting
    her family's migration story in a short memoir that can be used as a teaching resource at the community library.
