  career_goals: Laura envisions a future where she can blend her love for art and science. She aspires to become an environmental designer or wildlife illustrator who creates visually striking artwork that
    highlights the importance of conservation. Her competitive nature drives her goal of winning her elementary school’s science fair and, later, national STEM competitions with creative, eco‑focused projects.
    She also dreams of learning advanced coding to develop interactive digital art installations. Ultimately, Laura hopes to combine her artistic talent, scientific curiosity, and leadership skills to inspire
    peers and contribute to sustainable solutions.
