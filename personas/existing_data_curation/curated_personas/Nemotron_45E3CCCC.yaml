  career_goals: Heriberto aims to become a leading voice in community health equity within the Bronx’s Latinx neighborhoods. Over the next five years he plans to pursue a Doctor of Nursing Practice (DNP)
    with a focus on health policy and population health, while obtaining board certification as a Family Nurse Practitioner. He aspires to develop a community health clinic that integrates preventive care,
    chronic‑disease management, and health‑education programs tailored to Spanish‑speaking residents. Additionally, he seeks to mentor nursing students as a preceptor, publish research on culturally adapted
    diabetes interventions, and eventually step into a senior administrative role where he can influence systemic improvements and resource allocation for underserved patients.
