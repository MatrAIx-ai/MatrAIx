persona_description: A researcher and inventor with a passion for wave energy conversion, particularly focused on the development and testing of devices that can capture and convert wave energy into electricity.
  They are particularly interested in the Edinburgh Duck, a device that has shown promising results in small-scale controlled tests, and have a keen eye on the potential for renewable energy sources, including
  wave energy, in the face of climate change. They are also aware of the potential environmental impacts of wave energy devices, including the risk of entanglement, noise pollution, and the effects on marine
  organisms.
