  hobbies: '[''Gardening'', ''Hiking'', ''Cooking'', ''Quilting'', ''Reading Historical Fiction'', ''Volunteering in Financial Literacy Workshops'', ''Attending Local Music Festivals'', ''Playing Bridge
    with Friends'']'
  career_goals: Annie aims to solidify her professional credentials by earning the Certified Financial Planner (CFP) designation and eventually a Chartered Financial Consultant (ChFC) title. She envisions
    building a boutique advisory practice focused on serving families in Craighead County, emphasizing personalized service and community‑centric financial education. Over the next five years, she plans
    to launch a series of free financial‑literacy workshops in collaboration with local churches and schools, integrate AI‑driven planning tools to enhance client experiences, and mentor younger advisors
    in the firm. Ultimately, she hopes to transition to a semi‑retired role that allows more time for personal pursuits while maintaining a strategic oversight position.
