  hobbies: '["Reading historical fiction and poetry", "Gardening", "Cooking traditional Puerto Rican cuisine", "Walking nature trails", "Genealogy research", "Volunteering at the local library", "Playing
    the cuatro", "Small group book club"]'
  career_goals: As she approaches retirement, Rosario aims to cement her legacy by publishing a bilingual curriculum guide that showcases Puerto Rican history and literature for primary grades, to serve
    as a resource for teachers across the island. She also aspires to lead professional development workshops on culturally responsive pedagogy, and to mentor a cohort of early‑career educators through
    a community‑based tutoring program. Ultimately she hopes to contribute to policy discussions within the local school district on equitable language instruction.
