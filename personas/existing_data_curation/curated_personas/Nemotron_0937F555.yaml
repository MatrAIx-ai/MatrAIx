personas:
  professional: Rosario Santiagosanchez, a veteran elementary and middle‑school teacher approaching retirement, blends decades of classroom experience with an analytical eye to craft a bilingual, culturally
    responsive curriculum guide that weaves local history, literature, and digital tools into tightly organized yet flexible lesson plans, and they now mentor newer teachers while leading professional development
    workshops and advocating for equitable language policy in the district.
  sports: Rosario Santiagosanchez, a regular participant in community nature‑trail walking groups, competes with themselves to beat personal step counts, they avidly follow the Cangrejeros de Santurce baseball
    team each season, and they join a senior volleyball league at the local community center to stay active while maintaining a low‑key competitive spirit.
  arts: Rosario Santiagosanchez, an occasional cuatro player, immerses themselves in plena and bomba performances by groups like Bomba y Plena del Pueblo, they savor the poetry of Julia de Burgos and the
    historical novels of Ana María Fagundo, and they collect vintage vinyl of Héctor Lavoe and Celia Cruz, weaving these artistic threads into both classroom projects and personal leisure.
  travel: Rosario Santiagosanchez prefers thoughtfully planned journeys that balance cultural immersion with budget constraints, they have explored the historic cobblestones of Old San Juan and the misty
    trails of El Yunque, journeyed to Seville to trace ancestral roots, and dream of tasting the wines of Portugal’s Douro Valley while keeping travel expenses modest.
  culinary: Rosario Santiagosanchez delights in preparing traditional dishes such as mofongo relleno, arroz con gandules, and sancocho using fresh herbs and vegetables from their own garden, they skillfully
    blend homemade sofrito with adobo seasoning, occasionally over‑season to the point of spiciness, and they often delay cleaning the kitchen after experimenting with new recipes.
  core: Rosario Santiagosanchez is a pragmatic yet curious retiree who transforms a lifetime of teaching into culturally rich curriculum design, balances disciplined finances with occasional culinary indulgences,
    proactively manages health while neglecting dental care, and finds fulfillment in solitary gardening, walking, and quiet artistic pursuits.
background:
  cultural: Rosario was born and raised in Las Piedras, a town steeped in Puerto Rican rural traditions. Her upbringing blended Spanish colonial heritage, African rhythms, and indigenous Taino influences,
    shaping a deep appreciation for the island's linguistic and culinary customs. Bilingual in Spanish and English, she celebrates local festivals like Las Fiestas de la Calle and maintains ties to extended
    family across the island and diaspora. Her cultural identity informs both her teaching philosophy—emphasizing pride in Puerto Rican history—and her personal life, where she preserves traditional recipes,
    music, and oral histories.
attributes:
  skills: '["Curriculum development", "Classroom management", "Literacy instruction", "Bilingual education", "Educational technology integration", "Arts integration", "Assessment and data analysis", "Mentoring",
