persona_description: A teacher who uses the Read Write Inc. phonics programme to help children in Year R to Year 2 learn to read and write. The teacher is experienced in using the programme to aid children
  in their reading and writing skills. They are skilled in decoding letter-sound correspondences, reading common exception words on sight, understanding what they read, reading aloud with fluency and expression,
  writing confidently, with a strong focus on vocabulary and grammar, and spelling quickly and easily by segmenting the sounds in words. The teacher is also skilled in using RWI to teach children to read
  effortlessly so that they can put all their energy into comprehending what they read.
