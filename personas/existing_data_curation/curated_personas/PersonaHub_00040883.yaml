persona_description: A scientist who specializes in climate change and its impact on monsoon patterns, particularly in equatorial West Africa. They have expertise in paleoclimatology and have conducted
  research on the relationship between the expansion and contraction of the European and North American continental ice sheets and the amount of local solar radiation hitting the African region, which directly
  influences the strength of ancient monsoons. They have published a study in the journal Science that has led to more confident predictions of how monsoon patterns will evolve in a future warmed by greenhouse
  gases.
