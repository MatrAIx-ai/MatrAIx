  career_goals: At 61, Juan aims to transition into an HR Director role where he can shape organization‑wide talent strategies and embed a culture of well‑being. He wants to lead a data‑driven diversity
    and inclusion program that highlights the strengths of the Puerto Rican diaspora and other under‑represented groups. Juan also plans to mentor the next generation of HR professionals, especially those
    from bilingual backgrounds, and to consult on implementing stress‑reduction initiatives that reflect his own sensitivity to workplace pressure. In the longer term, he envisions establishing a community‑focused
    mentorship hub in Little Falls that connects local youth with corporate apprenticeship opportunities, leaving a lasting legacy of both professional and cultural empowerment.
