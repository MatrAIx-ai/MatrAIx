personas:
  professional: An aspiring freelance illustrator, John Padilla leverages self‑taught graphic design skills and a bilingual edge to create digital artwork that fuses modern pop aesthetics with traditional
    family motifs, balancing a disciplined schedule of GED study with a flexible, experimental studio approach.
  sports: John Padilla hits the Brown County trails on weekends for moderate hikes, follows the Milwaukee Brewers and Bucks for team spirit, but primarily channels a competitive drive into online gaming
    tournaments, treating fitness as a flexible complement to digital pursuits.
  arts: John Padilla spends evenings blending charcoal sketches with GIMP illustrations, drawing inspiration from artists like Banksy, Frida Kahlo, and contemporary designer Jessica Walsh, while curating
    a personal blog that showcases an evolving visual language.
  travel: John Padilla favors road trips to nearby Midwest cities such as Madison and Chicago for museum tours, dreams of a study‑abroad stint in Tokyo to soak up street art, and plans a future pilgrimage
    to a city renowned for vibrant street‑food culture, balancing travel costs with occasional part‑time gigs.
  culinary: John Padilla enjoys crafting homemade pupusas and tamales with corn masa, queso fresco, and herbs, experiments with fusion dishes like kimchi‑filled pupusas and chipotle‑infused tamales, and
    frequently prepares spaghetti carbonara and avocado toast for friends, showcasing a versatile palate.
  core: John Padilla is a calm, curiosity‑driven teen who balances disciplined art practice with a competitive gaming streak, a budget‑savvy side hustle, and a habit of over‑working on digital projects
    late into the night.
background:
  cultural: John was born to Salvadoran immigrant parents who settled in Nineveh, Indiana, drawn by agricultural work opportunities. He grew up in a bilingual household where Spanish was spoken at home
    and English at school. Family gatherings are centered around traditional dishes such as pupusas, tamales, and yuca frita, and holidays like Dia de los Muertos and Semana Santa are observed with religious
    processions and communal meals. The close‑knit Salvadoran community in Brown County maintains cultural clubs that organize festivals, dance performances, and soccer games, providing John with a strong
    sense of identity. While he embraces American teenage culture, he remains deeply connected to his roots, often mixing Salvadoran symbols and colors into his artwork and preserving the values of respect
    for elders, hard work, and community solidarity.
