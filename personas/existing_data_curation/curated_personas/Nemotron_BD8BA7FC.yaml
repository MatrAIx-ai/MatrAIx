    and design books'']'
  career_goals: John is determined to complete his GED within the next year and enroll in a community college program in Graphic Design or Visual Arts. His long‑term ambition is to become a professional
    freelance illustrator and digital artist, creating work that celebrates his Salvadoran heritage and contemporary American culture. He hopes to build a modest home studio where he can mentor other young
    people from his neighborhood, offering art workshops and cultural storytelling sessions. Ultimately, he envisions launching a small creative agency that produces murals, branding, and multimedia content
    for local businesses, while also curating community events that highlight Salvadoran food, music, and art.
