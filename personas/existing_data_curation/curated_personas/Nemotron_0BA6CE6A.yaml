personas:
  professional: Renaud Brown, an aspiring automotive technician, combines a hands‑on mechanical knack with beginner‑level Python scripting to streamline diagnostic workflows, and their pragmatic curiosity
    and relaxed, flexible attitude help them thrive in the shop while occasional disorganization shows up in paperwork.
  sports: Renaud Brown, a member of the Sumter Community Center’s pickup basketball squad, drills daily to stay sharp, idolizes the Charlotte Hornets and cheers the Carolina Panthers during football season,
    and their competitive streak drives them to push hard on the court though they sometimes skip formal workouts when a gaming session beckons.
  arts: Renaud Brown curates hip‑hop playlists featuring Kendrick Lamar and J Cole while sprinkling gospel flair from Kirk Franklin into his video edits, and they regularly quote lines from Jordan Peele
    films as background for their social‑media cuts, letting music and cinema shape their visual storytelling.
  travel: Renaud Brown prefers last‑minute road trips, having driven up to Charleston for a weekend beach crawl and dreaming of a future pilgrimage to Detroit’s auto museums and Tokyo’s Akihabara district,
    balancing a modest budget with a love for spontaneous cultural immersion.
  culinary: Renaud Brown, a confident kitchen tinkerer, whips up crispy fried chicken seasoned with paprika and cayenne and slow‑cooked collard greens simmered in smoked turkey broth, treating each weekend
    dinner as a chance to perfect the perfect buttermilk biscuit recipe while grabbing fast‑food pizza on late‑night gaming marathons.
  core: Renaud Brown blends a mechanic’s hands‑on curiosity with a gamer’s competitive edge, balancing late‑night PC builds and basketball drills, yet often forgets to bill‑pay on time and hoards gospel
    pep talks like secret motivation tokens.
background:
  cultural: Raised in Sumter, South Carolina, Renaud is part of a close‑knit African‑American community rooted in Southern traditions and a legacy of resilience. Family gatherings, church services, and
    local festivals have shaped his identity, blending gospel influences with contemporary Black culture such as hip‑hop. He draws strength from the region’s civil‑rights history and the stories of local
    Black leaders, which inform his sense of responsibility toward his neighborhood. The Southern hospitality and communal support he experiences daily influence his values of loyalty, mutual aid, and pride
    in his heritage.
attributes:
  skills: '["Automotive basic maintenance", "Computer literacy (Microsoft Office, internet research)", "Basic Python programming", "Video editing (Adobe Premiere)", "Basketball team play", "Competitive
