  hobbies: '["Basketball", "Hip‑hop and R&B music", "Online gaming (battle royale, FPS)", "PC building and hardware tinkering", "Basic car engine maintenance", "Video editing for personal projects", "Cooking
    Southern comfort food", "Church youth group participation", "Exploring emerging tech trends"]'
  career_goals: Renaud aims to earn a certification as an automotive technician and eventually open his own independent repair shop in Sumter, leveraging his hands‑on mechanical skill and business sense.
    Simultaneously, he wants to explore technology by taking community‑college courses in computer science, develop a small e‑commerce platform, and possibly create a side hustle customizing gaming PCs.
    His broader ambition is to achieve financial independence, give back to his community by mentoring younger teens, and build a career that blends his curiosity for tech with his practical, hands‑on expertise.
