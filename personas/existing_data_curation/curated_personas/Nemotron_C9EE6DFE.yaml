personas:
  professional: Carolina Morales, a budding little organizer, loves arranging their toys and crayons in color-coded rows, and they demonstrate early project-management instincts and a natural preference
    for structure and predictability.
  sports: Carolina Morales thrills to the rhythm of backyard soccer games at the local YMCA's Tiny Tots program, proudly wearing a New York Yankees cap while cheering, and they maintain a disciplined routine
    of stretching before each practice.
  arts: Carolina Morales delights in dancing to lively merengue and bachata tunes from artists like Juan Luis Guerra and Prince Royce, crafting colorful drawings of family gatherings, and they eagerly watch
    animated performances by Disney.
  travel: Carolina Morales prefers family road trips with a well-planned itinerary, cherishing past visits to the beach in the Outer Banks and dreaming of exploring the historic streets of Old San Juan
    with their parents, and they always pack their favorite stuffed rabbit.
  culinary: Carolina Morales favors the creamy taste of mangú topped with butter and sautéed plantains, enjoys helping stir the pot of sancocho, yet also delights in peanut butter–jelly sandwiches and they
    can expertly sprinkle cheese on their macaroni.
  core: Carolina Morales is a meticulous, competition‑driven four‑year‑old who structures playtime, saves pennies for big goals, and balances energetic dancing with diligent health routines, yet they sometimes
    stubbornly cling to routine.
background:
  cultural: Carolina comes from a Dominican family that keeps cultural traditions alive in Martinsville, NJ. Spanish is spoken at home alongside English, and family gatherings feature classic Dominican
    dishes such as mangú, plantains, and sancocho. She celebrates Dominican holidays like Independence Day and enjoys music genres like merengue, bachata, and reggaetón, often dancing with relatives. Catholic
    traditions influence seasonal celebrations, and extended family visits emphasize communal support and cultural pride.
