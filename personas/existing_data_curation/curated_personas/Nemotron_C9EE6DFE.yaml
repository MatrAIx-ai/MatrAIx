  career_goals: Even at four, Carolina talks about wanting to become a teacher because she enjoys organizing learning activities and helping peers understand new concepts. She also dreams of being a dancer,
    imagining herself moving to merengue and salsa rhythms with precision and flair. Occasionally she mentions caring for animals and envisions a future as a veterinarian, combining her structured approach
    with a desire to help living beings.
