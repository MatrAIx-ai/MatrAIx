persona_description: A marketing professor who conducts research on consumer behavior and social class differences, particularly in the context of service evaluations. His studies have revealed that individuals
  who perceive themselves as part of a lower social class are more likely to carry over negative interactions from one service encounter into subsequent ones, suggesting that their social status may affect
  their perception of other dimensions in service. This research has implications for current advertisers who have mainly focused on the upper class, and it highlights the importance of considering social
  class differences in consumer interactions.
