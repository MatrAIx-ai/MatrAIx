  career_goals: Renee often talks about wanting to become a teacher because she loves sharing what she learns with friends and helping them solve problems. She also dreams of being a doctor, inspired by
    caring adults who keep her healthy, and occasionally imagines herself as an astronaut exploring the stars. These aspirations blend her curiosity about how things work with her desire to support and
    protect others.
