personas:
  professional: Renee Randolph is a budding junior scientist who loves conducting simple kitchen chemistry experiments, using their methodical planning to set up each step, while their sociable nature draws
    peers into collaborative discovery, and their cautious worry ensures safety rules are never overlooked.
  sports: Renee Randolph is an enthusiastic member of the neighborhood preschool soccer club who adores sprinting in the spring sunshine, proudly wears the colors of the hometown baseball team the River
    City Rangers, and balances energetic playtime with occasional quiet yoga sessions for calm.
  arts: Renee Randolph delights in drawing colorful pictures of their favorite storybook characters, listening to the upbeat tunes of The Wiggles and Sesame Street, watching Pixar movies like Toy Story,
    and performing spontaneous dance routines to the catchy songs of Disney’s Frozen soundtrack.
  travel: Renee Randolph enjoys weekend family outings to the local zoo and beach, eagerly plans short road trips with a favorite stuffed bunny, dreams of visiting Disneyland and the Grand Canyon, and prefers
    car rides that allow them to collect postcards and snack breaks along the way.
  culinary: Renee Randolph loves cheesy macaroni, peanut butter and jelly sandwiches, strawberry smoothies, and can expertly mash bananas for banana bread, but often refuses broccoli, opting instead for
    crunchy carrot sticks as a snack.
  core: Renee Randolph is a meticulously organized, curiosity‑driven five‑year‑old who balances imaginative play with careful planning, yet their constant worry often turns bedtime stories into rehearsed
    safety checklists.
background:
  cultural: Renee is raised in a close‑knit African‑American family in Jacksonville, Florida. Her family celebrates traditions such as Sunday church services, gospel music, and community festivals like
    Juneteenth and the Jacksonville Jazz Festival. She often helps in the kitchen, learning to prepare Southern comfort foods like collard greens, cornbread, and sweet tea, which connects her to her cultural
    heritage. Family gatherings feature storytelling, call‑and‑response games, and dancing to hip‑hop and R&B, reinforcing her love for rhythm and community. The multicultural vibe of Jacksonville, with
    its blend of coastal life and historic Black neighborhoods, shapes her worldview and sense of belonging.
