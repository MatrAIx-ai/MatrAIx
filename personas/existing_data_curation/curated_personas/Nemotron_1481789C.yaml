  hobbies: '[''Zumba classes'', ''Yoga for stress relief'', ''Hiking in the Texas Hill Country'', ''Book club participation'', ''Cooking Tex‑Mex cuisine'', ''Volunteering at an adult literacy program'',
    ''Playing co‑ed recreational softball'', ''Attending community theater productions'']'
  career_goals: Beverly aspires to expand her impact beyond the classroom by earning a bachelor’s degree in education and obtaining full Texas teacher certification, a step she sees as essential for long‑term
    career growth. She aims to become a department head or curriculum specialist, where she can shape school‑wide instructional strategies and champion evidence‑based innovations. Her competitive nature
    fuels her desire to lead her school’s academic improvement initiatives and earn recognition such as Teacher of the Year. Additionally, she plans to develop a community mentorship program that partners
    local businesses with at‑risk students, leveraging her strong networking skills. To manage her frequent worry about performance, she intends to pursue professional development in stress‑resilient leadership,
    ensuring she can sustain high expectations without compromising her well‑being.
