  hobbies: '[''Bowling league'', ''Community choir'', ''Gardening'', ''Cooking and recipe experimentation'', ''Volunteering at local food bank'', ''Organizing neighborhood picnics'', ''Hiking local trails'',
    ''DIY home‑improvement projects'', ''Reading mystery novels'', ''Watching documentary series'']'
  career_goals: Jennie aims to advance to a shift‑lead or safety‑officer role where she can combine her hands‑on expertise with her natural ability to coordinate and support colleagues. She is interested
    in taking a short community‑college course on lean manufacturing to formalize her process‑improvement ideas. Long‑term, she hopes to transition into a part‑time training position that allows more flexibility
    for community involvement and family time while still contributing her practical knowledge to the plant.
