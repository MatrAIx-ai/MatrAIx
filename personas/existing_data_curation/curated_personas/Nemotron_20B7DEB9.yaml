personas:
  professional: Jennie Compton, a 51‑year‑old production worker on the plant floor, combines a practical curiosity for lean‑manufacturing tricks with a laid‑back, socially‑savvy demeanor that makes her
    the unofficial mentor who quietly proposes quick process fixes while keeping the crew’s morale high.
  sports: Jennie Compton spends Friday nights rolling strikes in the local bowling league, cheers on the Chicago Cubs and Chicago Bears on weekends, hikes the nearby ridge trails with a community outdoor
    club, and squeezes in a casual yoga session at the neighborhood community center whenever the schedule allows.
  arts: Jennie Compton sings baritone parts in a community choir that loves the classics—from The Beatles to Bob Dylan—devours Agatha Christie mysteries during quiet evenings, and unwinds with documentary
    series like “Planet Earth,” citing Ella Fitzgerald's vocal phrasing as a personal inspiration.
  travel: Jennie Compton prefers relaxed road‑trip getaways to national parks such as Shenandoah and Yellowstone, often planning spur‑of‑the‑moment stops at farmer’s markets and historic small towns like
    Sedona, while a dream vacation to the coastal villages of Ireland remains on the back‑burner due to budget constraints.
  culinary: Jennie Compton enjoys a moderate‑level kitchen adventure, frequently whipping up roasted vegetable quinoa bowls, spicy Korean bibimbap, and home‑grown basil pesto pasta, delighting in fresh
    herbs from their garden and occasionally indulging in a celebratory sourdough loaf.
  core: Jennie Compton is a sociable, hands‑on problem‑solver who blends curiosity with a relaxed, slightly disorganized lifestyle, constantly juggling plant floor improvements, community projects, and
    a love of food, music, and the outdoors.
background:
  cultural: Jennie grew up in a typical Midwestern white family with deep roots in Illinois, tracing ancestry to German and Irish immigrants. The community values of hard work, neighborly support, and modesty
    shaped her outlook. She was raised in a small‑town environment where church gatherings and school events fostered close social ties. These cultural influences reinforce her preference for collaborative
    activities, practicality in daily life, and a flexible approach to responsibilities. Living in Plainfield, Kendall County, she remains connected to local traditions such as county fairs, agricultural
    heritage, and a strong sense of civic participation.
attributes:
  skills: '[''Machine operation'', ''Equipment maintenance'', ''Quality inspection'', ''Lean process improvement basics'', ''Team mentorship'', ''Safety compliance (OSHA)'', ''Inventory tracking'', ''Forklift
