persona_description: A zoologist who specializes in the study of giraffes and their anatomy, particularly the skull. Dr Phil Cox is a former PhD student at the Museum of Zoology who conducted an investigation
  into the bone structure in and around the eye-socket in mammals, including the giraffe skull. He is interested in the weight and size of the giraffe skull and the use of the head as a weapon during duels
  between male giraffes. His research interests include giraffe anatomy, bone structure, and the study of mammals.
