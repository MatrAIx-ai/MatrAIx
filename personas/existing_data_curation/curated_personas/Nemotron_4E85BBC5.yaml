  career_goals: Jeanpierre aims to advance from his current first‑line supervisory role to store manager within the next two years, leveraging his practical experience to drive higher sales and improved
    employee retention. In the medium term, he plans to earn a bachelor's degree in Business Management, positioning himself for a district manager role overseeing multiple locations across New England.
    He is also interested in developing formal mentorship programs for new associates and implementing stress‑reduction initiatives that reflect his own experiences with worry and sensitivity to pressure.
    Ultimately, he envisions opening his own boutique retail concept that blends personalized customer service with innovative inventory solutions.
