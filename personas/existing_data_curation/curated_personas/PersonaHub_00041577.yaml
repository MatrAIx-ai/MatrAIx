  those by Scofield RP, Rando JC, and Hofreiter M, and have a keen interest in the use of ancient DNA to shed light on past population dynamics and genetic diversity. This person is likely to be interested
  in the implications of these findings for the broader ecosystem and the potential for future extinctions.
