personas:
  professional: Colleen Westbury is a veteran full‑stack engineer who fuses software development with visual art, leading interdisciplinary teams to craft AI‑enhanced AR/VR installations, mentoring emerging
    women technologists, and navigating spontaneous project opportunities despite a tendency to procrastinate on deadlines.
  sports: Colleen Westbury is a dedicated outdoor enthusiast who hikes the Rockies with the Colorado Trail Riders club in summer, tackles backcountry powder skiing in winter, supports the Denver Broncos
    and Colorado Avalanche as her hometown teams, and weaves early‑morning yoga into her routine—though she often skips it when a new coding sprint appears.
  arts: Colleen Westbury delights in painting acrylic abstracts inspired by Frida Kahlo’s bold palette, creates generative digital art echoing Refik Anadol’s algorithmic aesthetics, attends live shows by
    The National and local indie folk acts, participates in improv sessions with the Denver Improv Collective, and frequently visits the Museum of Contemporary Art Denver to stay abreast of cutting‑edge
    visual trends.
  travel: Colleen Westbury favors spontaneous, experience‑focused travel, booking last‑minute flights to artist residencies in Reykjavik or tech conferences in Tokyo, balancing modest budgeting with occasional
    splurges on boutique ski lodges in Whistler, while regularly escaping on weekend drives to Aspen and the Great Sand Dunes for hiking, sketching, and rejuvenation.
  culinary: Colleen Westbury enjoys crafting nutrient‑rich meals such as quinoa‑seed salads with roasted beetroot, avocado, and feta, pan‑searing salmon with a lemon‑dill glaze, and experimenting with seasonal
    Colorado elk stew, while also savoring a masterfully topped pesto pizza from a local farm‑to‑table pizzeria and indulging in a craft IPA after a weekend hike.
  core: Colleen Westbury merges precise coding with free‑spirited artistry, spending mornings on cloud architecture, afternoons on mountain‑bike trails, evenings generating AI‑driven visual pieces, and
    habitually misplacing her keys and delaying bill payments.
background:
  cultural: Colleen is a white American of mixed English, German, and Irish ancestry, raised in a middle‑class household that emphasized education, independence, and community involvement. Her upbringing
    blended traditional American values—such as a strong work ethic and civic holidays—with exposure to progressive cultural currents of the late 20th century, including early internet culture and alternative
    music scenes. Living in Monument, Colorado, she has developed a deep connection to the outdoors and the region’s sustainability ethos, influencing her love for hiking, skiing, and environmental stewardship.
    While not tied to a specific religious tradition, she values personal growth and secular spirituality. Her cultural identity is further shaped by the collaborative, open‑source mindset of the tech community
    and the experimental spirit of the local arts scene, fostering a balanced perspective that marries analytical rigor with creative curiosity.
