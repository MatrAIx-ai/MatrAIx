  career_goals: Colleen aims to lead interdisciplinary teams that blend technology and art, creating immersive AR/VR installations and AI‑driven creative tools. She aspires to become a thought leader at
    the intersection of software engineering and digital arts, speaking at conferences, publishing articles, and curating workshops that inspire both technologists and artists. In the next few years, she
    plans to transition to a flexible consulting role that allows spontaneous project work and travel to artist residencies, while maintaining a steady mentorship pipeline for women in tech. Long‑term,
    she envisions launching a startup focused on generative‑AI creative platforms, staying ahead of emerging trends such as quantum‑ready algorithms and extended reality. Throughout, she emphasizes work‑life
    balance, valuing time for personal artistic pursuits and outdoor exploration.
