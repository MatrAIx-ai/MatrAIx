personas:
  professional: Therapist Teresa Navarro combines CBT certification, rigorous outcome tracking, and bilingual fluency to deliver structured evidence‑based treatment, and they channel their energetic, sociable
    personality into dynamic group‑therapy facilitation and community mental‑health workshops.
  sports: Athletic Teresa Navarro hikes the Catskill trails each weekend, leads a salsa‑dance crew for cardio fitness, follows the New York Knicks during basketball season, roots for the New York Yankees
    in baseball, and they participate in the Hudson Valley Hiking Club’s monthly outings.
  arts: Culturally attuned Teresa Navarro curates salsa evenings to the beats of Marc Anthony and Celia Cruz, enjoys live jazz performances by Kamasi Washington, attends Broadway shows such as Hamilton,
    and they guide a book club that dissects works by Brené Brown and Jordan Peterson.
  travel: Adventure‑seeking Teresa Navarro plans weekend retreats to boutique B&Bs in the Hudson Valley, dreams of a yoga immersion in Bali, yearns for a cultural deep‑dive in Barcelona, and they organize
    annual family eco‑tourism trips to Costa Rica, all while balancing travel costs with savings for their upcoming clinic.
  culinary: Creative Teresa Navarro, an intermediate home cook, delights in preparing family‑heritage dishes like tamales, chiles rellenos, and black‑bean stew using fresh garden herbs, seasonal corn masa,
    and locally sourced organic produce, while they occasionally host mezcal‑infused dinner parties for friends.
  core: Dynamic Teresa Navarro balances a meticulously organized professional life with an unstoppable love for salsa, garden‑fresh cooking, and book club debates, yet they often compensate for chronic
    worry with late‑night espresso and an ever‑growing to‑do list.
background:
  cultural: Teresa is a first‑generation Guatemalan‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Guatemalan traditions,
    celebrating holidays such as Día de los Muertos, Semana Santa, and the Guatemalan Independence Day with music, folklore, and cuisine. Deeply rooted in Catholic values and communal solidarity, she embodies
    the warmth and respect for elders characteristic of her heritage. This cultural lens informs her therapeutic style, driving her to provide culturally sensitive care that honors clients' family structures,
    spiritual beliefs, and the rich tapestry of Central‑American identity within the broader American context.
attributes:
  skills: '[''Cognitive-Behavioral Therapy (CBT)'', ''Trauma-informed care'', ''Dialectical Behavior Therapy (DBT) fundamentals'', ''Group therapy facilitation'', ''Structured treatment planning'', ''Evidence‑based
    assessment (PHQ‑9, GAD‑7, BDI‑II)'', ''Crisis intervention and safety planning'', ''Bilingual communication (Spanish/English)'', ''Electronic Health Records (EHR) proficiency'', ''Data‑driven outcome
    monitoring'', ''Program development and evaluation'', ''Community outreach and public speaking'', ''Meticulous documentation'', ''Time management and organization'']'
  hobbies: '[''Salsa dancing'', ''Cooking Guatemalan cuisine'', ''Catskill hiking'', ''Vinyasa yoga'', ''Facilitating a psychology‑focused book club'', ''Volunteering at a community food bank'', ''Gardening'',
    ''Playing strategic board games'', ''Attending local cultural festivals'']'
  career_goals: Teresa aims to expand her impact by opening a culturally‑responsive private practice in the Hudson Valley that offers bilingual CBT and trauma services to the growing Hispanic population.
    She plans to earn a master's degree in clinical counseling and obtain full licensure as a Licensed Clinical Social Worker (LCSW) within the next two years. Long‑term, she envisions becoming a certified
    CBT trainer, launching a community‑wide stress‑management program that integrates mindfulness and technology‑enhanced tele‑therapy, and serving on the board of a regional mental‑health coalition to
    advocate for equitable services. Her ambition is to blend her analytical background with compassionate care, creating measurable improvements in client wellbeing while maintaining a sustainable work‑life
    balance.
