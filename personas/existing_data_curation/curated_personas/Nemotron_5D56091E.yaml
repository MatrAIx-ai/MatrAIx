  career_goals: Although Roberto is at the very beginning of his life, his caregivers nurture his innate curiosity and appreciation for art. They encourage him to explore, ask questions, and experiment
    with colors and sounds, planting the seeds for future aspirations that may involve creative or problem‑solving fields such as art, design, or engineering. At this stage, his primary ambition is to learn
    as much as possible about the world around him and to develop the confidence to pursue his interests when he grows older.
