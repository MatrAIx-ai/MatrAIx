  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Hiking coastal trails'', ''Cycling on Contra Costa bike paths'', ''Playing chess'', ''Cooking Central Asian
    dishes'', ''Reading philosophy and neuroscience'', ''Attending small‑group workshops on innovative therapy'', ''Practicing Tai Chi for mindfulness'', ''Volunteering to teach basic physiotherapy exercises'']'
  career_goals: Minaxiben aims to advance his clinical expertise by attaining a bachelor’s degree in kinesiology and a certification in orthopedic manual therapy within the next three years. He aspires
    to open a boutique rehabilitation clinic in the East Bay that blends conventional physiotherapy with artistic elements such as guided sketching sessions to promote mental wellness. Additionally, he
    seeks to publish case studies on culturally responsive rehab protocols for Central Asian patients, mentor junior therapists, and become a recognized speaker at regional PT conferences.
