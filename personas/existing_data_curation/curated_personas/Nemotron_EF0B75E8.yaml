  hobbies: '[''Cooking Mexican dishes'', ''Fishing at Lake Ming'', ''Playing video games'', ''Watching NFL football (Los Angeles Rams)'', ''Exploring local food trucks'', ''Attending community festivals
    (Kern County Fair)'', ''Road trips to nearby desert or beach'']'
  career_goals: Joaquin aims to move into a supervisory or team‑lead role within the next three years, where he can design efficient workflows that balance structure with the flexibility valued by his team.
    To support this, he is taking part‑time classes toward an associate degree in Business Administration and pursuing a customer‑experience certification. In the longer term he hopes to manage a regional
    bilingual call center or launch a small consulting firm that helps local businesses improve their customer‑service operations.
