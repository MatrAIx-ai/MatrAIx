  hobbies: '[''Cooking Dominican Cuisine'', ''Balcony Herb Gardening'', ''Reading Historical Fiction and Memoirs'', ''Walking in Lowell Riverfront Park'', ''Bachata and Salsa Dancing in Small Gatherings'',
    ''Yoga and Mindfulness Practice'', ''Volunteer Tutoring at Local Church'', ''Crocheting for Community Shelters'', ''Book Club Discussions'']'
  career_goals: Maricel aims to transition into a senior leadership role within a community‑based organization, ideally as a program director overseeing services for immigrant families. She envisions establishing
    a culturally specific youth mentorship and after‑school program that integrates Dominican cultural heritage with academic support. To strengthen her impact, she plans to pursue a Master of Social Work
    certification, deepen her expertise in trauma‑focused interventions, and develop policy briefs that address systemic barriers faced by low‑income Dominican households in Middlesex County. Over the next
    five years, she also hopes to mentor emerging social workers, expand her network of community partners, and secure grant funding to sustain innovative services.
