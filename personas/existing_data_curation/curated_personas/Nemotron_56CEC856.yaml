personas:
  professional: Maricel Perez, a veteran front‑line social worker with over twenty years of case management experience, leverages bilingual fluency and trauma‑informed expertise to design culturally responsive
    parenting and financial literacy workshops while balancing a preference for structured documentation with occasional spontaneous advocacy for emergent client needs.
  sports: Maricel Perez, a dedicated member of the Lowell Riverfront Walking Club who faithfully follows the Boston Red Sox in the spring and the Boston Celtics during the NBA season, incorporates gentle
    yoga and weekend strolls along the river as her primary fitness routine, favoring low‑impact exercise over high‑intensity competition.
  arts: Maricel Perez, an engaged participant in a small book club where she discusses works by Zora Neale Hurston and Junot Díaz, finds solace in the timeless salsa rhythms of Celia Cruz and the modern
    bachata beats of Romeo Santos, and occasionally attends community theater productions of Shakespeare’s Much Ado About Nothing, weaving these artistic experiences into her sense of identity.
  travel: Maricel Perez, who blends careful budgeting with spontaneous day‑trips, has explored the historic streets of Cartagena, Colombia and the lavender fields of Provence, France, yet dreams of hiking
    the Pacific coast of Costa Rica and attending the jazz festivals of New Orleans, often opting for short, family‑focused getaways rather than extended solo adventures.
  culinary: Maricel Perez, an avid home cook who masterfully prepares traditional dishes such as sancocho and mangú, layers fresh cilantro and basil from her balcony garden into fragrant sofrito, and delights
    in sharing these meals at intimate family gatherings, while also treating herself to a perfectly cooked paella at a local Spanish tapas bar on special occasions.
  core: Maricel Perez balances a love for structured planning with occasional impulsive bursts, channels her resilient spirit into community advocacy, and quietly combats a habit of over‑committing to both
    work and volunteer duties, all while savoring late‑night cooking experiments and reflective river walks.
background:
  cultural: Maricel’s Dominican roots are a central thread of her identity. Born in the Dominican Republic and immigrating to the United States as a teenager, she grew up in a close‑knit household where
    Spanish was the daily language and Catholic traditions shaped family rituals. The values of respeto (respect), familia, and comunidad (community) were instilled early, guiding her compassionate approach
    to social work. She celebrates Dominican holidays such as Día de la Independencia and Dominican Heritage Month, often sharing traditional foods and stories with neighbors in Lowell’s vibrant Dominican
    enclave. Her bilingual proficiency allows her to bridge cultural gaps, offering a sense of belonging to recent immigrants while navigating the broader American system. Through community events, music,
    and the rhythmic cadence of merengue, Maricel maintains a living connection to her island heritage.
attributes:
