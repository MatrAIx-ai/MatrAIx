  career_goals: Although Thuy is not currently employed, she aims to channel her organizational talent and community orientation into a more formal volunteer leadership role. Her primary ambition is to
    become a certified Community Health Worker, allowing her to support aging Vietnamese immigrants in navigating healthcare services. She also hopes to launch a small home‑based catering service focused
    on healthy, culturally authentic meals for local seniors and small gatherings, providing both supplemental income and a way to share her culinary heritage. Long‑term, Thuy wishes to author a memoir
    that weaves together her family’s immigration story with practical advice on budgeting, cooking, and resilience, hoping to inspire younger generations.
