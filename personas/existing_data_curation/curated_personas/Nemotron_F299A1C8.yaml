  career_goals: Pamela aims to graduate high school with a strong academic record and pursue a degree in health sciences or communications, fields that let her combine her curiosity about how the world
    works with a practical desire to help people. She envisions a future as a registered nurse, health educator, or community outreach coordinator, where she can work directly with individuals and groups,
    promote wellness, and organize health‑related events. In the short term, she plans to join her high school's health sciences club, earn certifications in CPR and first aid, and gain part‑time volunteer
    experience at a local hospital or community center.
