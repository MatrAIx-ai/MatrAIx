personas:
  professional: Winston Moore, a budding young coder who designs simple games in Scratch and builds intricate LEGO models, channels his methodical planning and curiosity into future aspirations of robotics
    engineering.
  sports: Winston Moore spends Saturday mornings playing Little League baseball for the Chico Cubs, cheers for the San Francisco Giants, and joins the local youth nature club for weekend hikes in the Sierra
    foothills, balancing team spirit with personal fitness.
  arts: Winston Moore sketches detailed rockets inspired by Isaac Asimov's novels, enjoys the vivid animations of "Adventure Time", and listens to the cinematic scores of John Williams alongside the energetic
    tracks of Imagine Dragons while building LEGO creations.
  travel: Winston Moore loves family trips to Yosemite National Park, dreams of exploring NASA's Kennedy Space Center in Florida, plans each adventure with hand‑drawn maps, and balances his fascination
    for outer space with a deep appreciation for local countryside escapes.
  culinary: Winston Moore can whip up classic macaroni and cheese, customize homemade pepperoni pizza with extra cheese and olives, and delights in snack mixes of dried apricots, roasted pumpkin seeds,
    and crunchy granola bars.
  core: Winston Moore is a meticulous, curiosity‑driven 10‑year‑old who balances his love of space, LEGO, and baseball with a healthy dose of worry and a habit of over‑organizing his afternoon schedule.
background:
  cultural: Winston grows up in a small, close-knit rural community in Jack County, Texas. His family reflects typical Texan values of hard work, self-reliance, and community involvement, often attending
    local church gatherings and farm-related events. The region’s culture emphasizes respect for tradition while encouraging practical skills, which aligns with Winston’s organized and methodical personality.
    He experiences a blend of Southern hospitality and a modest, middle-class lifestyle, with strong family ties and an appreciation for the outdoors.
