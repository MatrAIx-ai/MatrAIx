  career_goals: Winston dreams of becoming an aerospace engineer who designs sustainable spacecraft. He is fascinated by space travel and wants to contribute to technologies that protect the environment.
    In the near term, he aims to join his school’s robotics club, compete in a regional STEM fair, and maintain high grades in science and mathematics. He hopes to attend a university in Texas with a strong
    engineering program, eventually working on innovative projects that combine his love of practical problem-solving with new ideas.
