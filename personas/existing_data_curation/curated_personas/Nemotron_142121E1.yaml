personas:
  professional: Muoi Dinh, a five-year-old budding builder, channels curiosity and practicality by meticulously sorting LEGO bricks into color-coded trays while inventing new play scenarios, and they demonstrate
    an early blend of organization and flexible creativity.
  sports: Muoi Dinh, an energetic five-year-old forward for the Little Stars Soccer Club, idolizes Manchester United striker Marcus Rashford, channels competitive energy into weekly practice sessions, and
    they also cheer for the local River Raptors minor league baseball team.
  arts: Muoi Dinh, an enthusiastic fan of animated storytelling, sings along to The Wiggles' 'Fruit Salad', paints vibrant jungle scenes inspired by the series 'Bluey', collects Miffy figurines, and they
    let these artistic influences shape their playtime narratives.
  travel: Muoi Dinh, an adventurous youngster, has visited Santa Monica Beach's shoreline, explored the interactive exhibits at the city science museum, and they dream of seeing the Eiffel Tower in Paris,
    balancing excitement for new places with a practical checklist of snacks and favorite toys.
  culinary: Muoi Dinh, a budding foodie, prefers creamy mac and cheese topped with cheddar, enjoys making banana-strawberry smoothies with a drizzle of honey, helps stir chocolate chip cookie dough, and
    they approach flavors with both curiosity and a practical eye for mess-free cooking.
  core: Muoi Dinh is a curious, calm, and competitively spirited five-year-old who balances organized play with spontaneous adventure, rarely worries, and thrives on social interaction.
background:
  cultural: Muoi Thi is a second‑generation Vietnamese‑American raised in Bellflower, California. Her family speaks both Vietnamese and English at home, celebrates Tet and other Vietnamese holidays, prepares
    traditional dishes like bánh chưng, and participates in community events at the local Vietnamese cultural center. This bilingual, bicultural upbringing blends with her American school environment, influencing
    her interests, values, and social interactions.
