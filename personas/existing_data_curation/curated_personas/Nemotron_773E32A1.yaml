  career_goals: Joseph aims to first earn his GED within the next two years, providing a solid academic baseline. With his interest in structured, hands‑on work, he plans to enroll in a vocational training
    program for automotive technology at a local community college or trade school. He envisions obtaining certification as an auto mechanic, allowing him to secure a stable, predictable job that also lets
    him help others keep their vehicles safe and reliable. Long‑term, Joseph hopes to advance to a supervisory role where he can mentor younger apprentices, combining his cooperative nature with a leadership
    position. He is also open to joining the Nevada National Guard as a way to further develop discipline, structure, and community service experience.
