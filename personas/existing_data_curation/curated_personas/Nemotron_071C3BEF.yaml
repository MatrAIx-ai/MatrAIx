background:
  cultural: Jose is a second‑generation Puerto Rican American. Both of his parents emigrated from San Juan in the 1990s, and he grew up in a bilingual household in Orlando, speaking Spanish at home and
    English at school. He actively participates in the local Puerto Rican community, attending events like the Puerto Rican Festival, celebrating traditions such as Noche de San Juan, and staying close
    to family ties on the island through regular visits. His heritage influences his resilient, adaptable outlook and competitive spirit, while his love for music, dance, and food provides a social anchor
    that balances his need for occasional solitude. Jose’s cultural perspective also informs his professional ambition to build technology that bridges the U.S. and Caribbean markets.
