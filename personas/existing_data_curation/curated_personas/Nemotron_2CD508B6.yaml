  career_goals: Robert aims to build a compelling portfolio of digital art and interactive projects over the next few years, hoping to earn a scholarship to a specialized arts high school or a program that
    blends art and technology. He envisions a future as a concept artist or UI/UX designer in the video game industry, where he can merge his creative instincts with his methodical approach. Additionally,
    he aspires to develop a small indie game that showcases his programming and artistic skills, gaining recognition in online creator communities while continuing to refine his craft.
