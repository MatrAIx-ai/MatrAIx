personas:
  professional: Robert Shelton is an aspiring game developer who combines their love for hand‑drawn illustration with beginner‑level Python coding, meticulously planning each game mechanic in a journal
    and using their curiosity to experiment with interactive storytelling.
  sports: Robert Shelton follows the Indiana Hoosiers basketball team and the Chicago Bears, participates in weekend pick‑up soccer at the local park, and maintains a routine of short jogs around the neighborhood
    to unwind after school.
  arts: Robert Shelton is a dedicated comic‑book collector and digital sketcher who draws inspiration from Hayao Miyazaki's animated worlds, listens to Sufjan Stevens while painting, and regularly attends
    virtual tours of the Indianapolis Museum of Art and indie film screenings at the local community theater.
  travel: Robert Shelton enjoys day trips to Chicago's Millennium Park and the Museum of Science and Industry, dreams of a summer road trip to the Great Lakes shoreline, and plans future travel to Kyoto
    to experience its historic temples and vibrant street art scene.
  culinary: Robert Shelton prefers homemade macaroni and cheese with a sprinkle of sharp cheddar, enjoys tasting the local Midwestern BBQ ribs at summer fairs, and experiments with simple recipes like garlic‑butter
    shrimp while appreciating a good slice of pepperoni pizza.
  core: Robert Shelton is a quietly driven teen who channels a competitive, curiosity‑fueled mind into art, code, and solitary reflection, while juggling regular bouts of worry and a penchant for late‑night
    comic book binges.
background:
  cultural: Robert is a white, Midwestern teenager raised in Merrillville, Indiana, a suburban community in Lake County with a largely middle‑class, predominantly white demographic. His family background
    includes German‑Irish ancestry, and they emphasize values common to the region such as hard work, self‑reliance, modesty, and community involvement. Growing up near the Chicago metropolitan area, he
    has access to a blend of cultural resources, including local art museums, public libraries, and tech workshops. These influences, combined with traditional American celebrations like Thanksgiving and
    the local industrial heritage of the area, shape his worldview and provide a backdrop for his artistic and technical interests.
