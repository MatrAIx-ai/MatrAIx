  hobbies: '["Mountain biking","Backcountry hiking","Fly fishing","DIY furniture making","Classic-rock vinyl collection","Home brewing","Vegetable gardening","Habitat for Humanity volunteer builds","Board
    games with friends","Photography of natural scenery"]'
  career_goals: Jimmy aims to transition from being an employee carpenter to owning a boutique custom-workshop within the next five years, focusing on high-end residential remodels and handcrafted furniture.
    He plans to earn a journeyman carpenter certification and become a LEED-Accredited Professional to differentiate his services with environmentally responsible building. He also hopes to mentor a small
    group of apprentices, passing on his practical skills while fostering a culture of safety and precision. Long-term, he envisions expanding his business to serve clients across the Front Range, leveraging
    his reputation for calm, reliable project delivery to secure repeat contracts and larger commercial opportunities.
