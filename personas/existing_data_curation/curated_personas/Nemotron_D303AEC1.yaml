  career_goals: Mary Ann aims to lead an interdisciplinary research center that explores the intersection of mathematics, data science, and visual arts. Over the next five years, she plans to secure a tenured
    faculty position at a research university in Florida, where she can mentor graduate students and develop curricula that emphasize computational creativity. She aspires to publish a seminal monograph
    on algorithmic aesthetics, obtain major funding from the NSF and private foundations, and launch a consultancy that helps cultural institutions leverage data analytics for audience engagement. Ultimately,
    she seeks to be recognized as a pioneer who bridges rigorous scientific inquiry with artistic innovation.
