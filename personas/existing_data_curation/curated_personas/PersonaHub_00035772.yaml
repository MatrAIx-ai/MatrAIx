persona_description: A team of researchers and extension specialists who specialize in the study of drainage design, drainage conservation practices, soil and crop management practices, and drainage management
  to reduce nutrient loss from drained farmland. They have developed new and effective drainage design and management options, leading to the adoption of improved practices by farmers and the adoption of
  these practices by the Mississippi River/Gulf of Mexico Hypoxia Task Force and many of the Mississippi basin states in developing individual state strategies for nutrient reduction as required by USEPA.
  They have generated at least 122 peer-reviewed publications, 78 Extension and non-refereed publications, 262 presentations to farm, research, and state/federal agency audiences, and two national ASABE
  extension excellence awards for regional publications. They have collaborated on multi-institutional and cross-disciplinary projects totaling more than $30M, including funding from the USDA-NRCS-CIG program,
  USDA-NIFA-AFRI, and the Foundation for Food and Agriculture Research. They are currently investigating approaches for reducing nutrient and other contaminant losses from drained croplands, and they have
  recently been awarded the 2018 Experiment Station Section Award for Excellence in Multistate Research.
