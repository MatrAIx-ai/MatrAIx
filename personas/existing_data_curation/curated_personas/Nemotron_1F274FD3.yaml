personas:
  professional: Johanna Paulet combines three decades of meticulous residential cleaning expertise with a passion for historic home preservation, leveraging her eco‑friendly techniques, light‑maintenance
    skills, and hospitality training to mentor staff while navigating her tendency toward flexible, sometimes disorganized scheduling with a calm, collaborative demeanor.
  sports: Johanna Paulet stays active by joining the local morning bird‑watching walking club and attending Pittsburgh Steelers’ Sunday games with friends, while occasionally dabbling in community softball
    leagues during spring, embodying a relaxed approach to fitness that fits her flexible schedule.
  arts: Johanna Paulet channels her curiosity into watercolor landscapes of western Pennsylvania, collects prints by Winslow Homer, attends indie screenings of directors like Ava DuVernay, and finds inspiration
    in folk melodies of The Avett Brothers, letting her creative side thrive alongside her cleaning career.
  travel: Johanna Paulet prefers slow travel that blends heritage tours of Gettysburg and the Cotswolds with spontaneous weekend road trips to nearby Amish country, using her vintage camera to capture roadside
    flora while balancing a modest budget and occasional caregiving duties.
  culinary: Johanna Paulet experiments with farm‑to‑table cooking, infusing home‑grown rosemary, lavender, and edible rose petals into dishes like ratatouille and lemon‑herb focaccia, while skillfully balancing
    a hobbyist’s love for trying new recipes with occasional over‑indulgence in rich cheese boards during library fundraisers.
  core: Johanna Paulet is a gentle, curiosity‑driven cleaning veteran who juggles vintage film documentation, herb‑filled kitchen experiments, and occasional disorganized scheduling, all while sprinkling
    eco‑friendly solutions into every corner of her life.
background:
  cultural: Johanna is a lifelong white American resident of Mount Pleasant, Pennsylvania, whose family lineage traces back to German and Irish immigrants who settled in the region during the late 19th
    century. Raised in a working‑class, close‑knit community, she was immersed in the values of humility, hard work, and mutual support that characterize much of western Pennsylvania culture. Her upbringing
    included regular attendance at a Methodist church, where community service and respect for tradition were emphasized. The area's rich industrial past and vibrant folk‑art traditions—such as quilting,
    woodcarving, and community murals—shaped her early appreciation for craftsmanship and local history. Seasonal events like county fairs, harvest festivals, and church gatherings reinforced a sense of
    belonging and a deep connection to the rhythms of rural life, informing both her personal interests and her professional ethos.
