  career_goals: Johanna aspires to transition from independent housekeeping to a supervisory role within a regional cleaning service that specializes in historic home preservation, allowing her to combine
    her cleaning expertise with her love for local heritage. She plans to obtain a certified green‑cleaning credential and eventually launch her own boutique cleaning business that emphasizes eco‑friendly
    practices and respectful care of older adults’ homes. To support this ambition, she intends to complete her associate’s degree in hospitality management and pursue short courses in small‑business administration
    and interior design. Additionally, she hopes to mentor younger workers in the industry and become a trusted resource for sustainable household upkeep in her community.
