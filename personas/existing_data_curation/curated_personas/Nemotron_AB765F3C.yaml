personas:
  professional: Mary Edding, a three‑year‑old with a love for arranging building blocks, exhibits early architectural instincts, methodically planning each tower and promising to finish every structure
    before snack time, hinting at a future in design.
  sports: Mary Edding, a three‑year‑old toddler, enjoys swinging at the neighborhood playground, participates in the Little League Kids' Soccer Club that practices on Saturdays, and occasionally cheers
    for the local minor league baseball team, the Springfield Sluggers, favoring predictable routines of warm‑up stretches before play.
  arts: Mary Edding, a three‑year‑old, delights in drawing bright crayons on paper while listening to the playful tunes of The Wiggles and enjoys watching classic Pixar short films starring the character
    Wall‑E, using art time as a quiet, structured break in her day.
  travel: Mary Edding, a three‑year‑old who loves routine, prefers short family trips to familiar places like the nearby botanical garden and the annual summer visit to her grandparents' farm, yet dreams
    of seeing the bright lights of Disney World in Orlando, always planning excursions with a color‑coded itinerary.
  culinary: Mary Edding, a three‑year‑old picky eater, favors creamy macaroni and cheese topped with extra cheddar, enjoys dipping crunchy carrot sticks in hummus, and helps stir batter for banana pancakes,
    though she often refuses vegetables unless they’re cut into fun shapes.
  core: Mary Edding, a three‑year‑old, blends a pocket‑sized love for order with boundless curiosity, habitually lining up toys by color and insisting on bedtime stories in the same exact order each night,
    a charming mix of predictability and imaginative play.
background:
  cultural: 'Mary is raised in Aliso Viejo, a suburban community in Orange County, California. Her family, of white European ancestry, follows typical middle-class American practices: celebrating national
    holidays such as Thanksgiving and the Fourth of July, attending a local preschool with a multicultural student body, and participating in community events like library story hours and park gatherings.
    The environment emphasizes family time, outdoor recreation, and a balance of independence and cooperation, which shapes her values of reliability, harmony, and structured routine.'
