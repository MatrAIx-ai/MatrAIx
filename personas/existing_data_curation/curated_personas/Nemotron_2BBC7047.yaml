personas:
  professional: Rita Shaw is a diligent vehicle‑service technician known for her meticulous cleaning of pickup trucks and farm equipment, systematic record‑keeping, and practical knack for troubleshooting
    minor mechanical issues, and they leverage this methodical mindset toward a supervisory role and eventually an eco‑friendly mobile cleaning service for rural farms.
  sports: Rita Shaw enjoys structured fitness through early‑morning runs and weekend hikes along the Natchez Trace, participates in a Tuesday evening recreational softball league with the Perry County Community
    Sports Club, and follows professional teams such as the Memphis Grizzlies, the New Orleans Saints, and the Mississippi State Bulldogs, using their schedules to stay motivated.
  arts: Rita Shaw finds creative reprieve in classic country melodies by Johnny Cash, Dolly Parton, and George Jones while crocheting, occasionally attends community theater productions at the local church
    hall, and collects folk‑style paintings reminiscent of Grandma Moses, which inspire their blanket designs.
  travel: Rita Shaw plans meticulously for weekend road trips, favoring nature escapes like the Great Smoky Mountains and historic cities such as New Orleans for their music scene, has already visited the
    Gulf Coast beaches on a college break, and dreams of a future cross‑country tour that includes Yellowstone National Park and the vineyards of Tuscany, all while balancing a modest travel budget.
  culinary: Rita Shaw enjoys hearty Southern comfort dishes—fried catfish, collard greens simmered with smoked turkey, creamy grits, and garden‑fresh tomato basil bruschetta made with heirloom tomatoes,
    basil, and garlic—cooking at an intermediate level, prefers preparing meals at home over dining out, and treats themselves to occasional backyard barbecues featuring homemade coleslaw.
  core: Rita Shaw is a methodical planner who balances structured vehicle‑cleaning work with creative hobbies like gardening, crocheting, and classic country tunes, all while keeping a steady eye on future
    entrepreneurship and occasionally indulging in spontaneous splurges.
background:
  cultural: Rita grew up in Linden, Tennessee, where Southern rural traditions shape daily life. Her family values emphasize hard work, community involvement, and respect for the land. She participates
    in local church events and annual county fairs, which celebrate regional food, music, and crafts. While identifying as white, Rita’s cultural outlook is grounded in the modest, neighbor‑focused ethos
    of small‑town Tennessee, blending a love for outdoor recreation with a strong sense of responsibility to her community.
attributes:
  skills: '[''Vehicle cleaning'', ''Equipment detailing'', ''Safety‑compliant chemical handling'', ''Inventory tracking'', ''Appointment scheduling'', ''Basic mechanical troubleshooting'', ''Record‑keeping'',
    ''Physical stamina'', ''Customer communication'', ''Problem‑solving'']'
  hobbies: '[''Sudoku puzzles'', ''Crossword puzzles'', ''Gardening'', ''Hiking'', ''Fishing'', ''Country music'', ''Community potlucks'', ''Crocheting'']'
  career_goals: Rita aims to leverage her strong organizational skills into a supervisory role within a vehicle‑service shop, eventually becoming a cleaning manager responsible for a team and service standards.
    She plans to enroll in a community‑college automotive technology program to gain formal certification, which would open pathways toward a hybrid role that combines equipment maintenance with logistics
    coordination. Long‑term, Rita dreams of starting her own mobile cleaning service that caters to rural farms and small businesses across Perry County, emphasizing environmentally safe cleaning practices
    and reliable scheduling.
