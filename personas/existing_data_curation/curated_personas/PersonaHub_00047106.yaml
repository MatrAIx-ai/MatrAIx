persona_description: A legal historian who specializes in the study of English law and its impact on the LGBTQ community. Her research interests include the history of sodomy laws in the British Isles,
  the role of law in shaping public attitudes towards homosexuality, and the legal and social consequences of the Criminal Law Amendment Act of 1885. She is also interested in the intersection of law and
  sexuality, and the ways in which legal institutions have been used to discriminate against LGBTQ individuals.
