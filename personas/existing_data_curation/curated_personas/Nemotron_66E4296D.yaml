  career_goals: While approaching full retirement, Elijah aims to shift from daily floor work to a part‑time advisory role where he can formalize his safety knowledge into certified training sessions for
    new hires. He hopes to earn a recognized safety‑trainer credential and volunteer his expertise at the local vocational school’s heavy‑equipment program. Maintaining a steady income through occasional
    consulting allows him to support his wife’s hobbies and fund his grandchildren’s education. He also wants to document his years of experience in a concise handbook for future operators at his plant,
    ensuring his practical lessons endure beyond his own career.
