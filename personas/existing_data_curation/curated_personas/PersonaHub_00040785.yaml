persona_description: 'An evolutionary ecologist who specializes in the study of microhylid frogs, particularly their reproductive adaptations and parental care strategies. His research interests include
  the integration of different facets of biology including ecology, behavior, evolution and reproductive biology, and the study of parental care in amphibians. He has conducted fieldwork in New Guinea,
  where he has observed two previously unknown modes of amphibian parental care: froglet attendance after the eggs hatch and froglet transport by the male who ferries his brood to locations away from the
  spawning site. His work has revealed the diversity of reproductive strategies amongst terrestrial vertebrates and the variety in modes of parental care.'
