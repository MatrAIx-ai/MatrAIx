  career_goals: Suzy aims to advance from first‑line supervisor to office manager within the next two to three years, taking on greater responsibility for budgeting, strategic planning, and cross‑departmental
    projects. She plans to complete a bachelor’s degree in Business Administration, either online or at a nearby community college, to strengthen her credentials. Long‑term, she envisions moving into an
    operations manager role for a regional office or launching a small consultancy that helps rural businesses streamline administrative processes. She also hopes to develop a mentorship program within
    her organization to support entry‑level clerks, reflecting her cooperative nature and desire to give back.
