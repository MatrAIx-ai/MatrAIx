  hobbies: '["Folklorico dancing", "Volunteer docent at Austin Museum of Art", "Reading classic literature", "Cooking traditional Mexican dishes", "Herb gardening", "Walking and birdwatching on Lady Bird
    Lake trails", "Bridge card game", "Participating in community trivia nights"]'
  career_goals: Although retired, Jackeline is driven to preserve and share the cultural heritage she has lived. Her primary ambition is to produce a traveling exhibition of Mexican folk art that tours
    senior centers and schools across Travis County, accompanied by a series of workshops where she mentors youth artists. She also hopes to compile a memoir—part personal narrative, part cultural commentary—drawn
    from interviews with her family and long‑time community members, and to see that memoir published through a local university press. Finally, she aims to secure a permanent volunteer advisory role with
    the Austin Museum of Art, helping shape its Latino‑focused programming.
