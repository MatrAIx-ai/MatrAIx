personas:
  professional: Jackeline Mcfarland, a retired museum curator turned volunteer advisor, blends meticulous budgeting, structured event planning, and bilingual interpretation with her flexible, sociable nature
    to craft community exhibitions that spotlight folk art, while her critical eye and competitive spirit keep every showcase razor‑sharp.
  sports: Jackeline Mcfarland stays fit by strolling the Ann and Roy Butler Hike‑and‑Bike Trail three times weekly, dancing in her Folklorico troupe for low‑impact cardio, cheering on Austin FC during the
    MLS season, and playing bridge in the senior league at the Austin Country Club, all while maintaining a relaxed, consistent exercise routine.
  arts: Jackeline Mcfarland, an avid museum volunteer and seasoned art‑history enthusiast, guides visitors through exhibitions, cites the vibrant works of Diego Rivera, Frida Kahlo, and contemporary muralist
    Judy Baca, curates community shows that juxtapose traditional folk motifs with modern narratives, and leads a weekly book club where discussions drift from Octavia Butler to Gabriel García Márquez.
  travel: Jackeline Mcfarland prefers slow‑paced, organized travel, often joining senior‑friendly group tours to places like the Texas Hill Country vineyards, the historic streets of San Miguel de Allende,
    and the art‑laden alleys of Barcelona, while balancing her itinerary around her garden duties and museum commitments.
  culinary: Jackeline Mcfarland, a proficient home cook, delights in crafting authentic tamales with masa, roasted chilies, and cilantro, while frequently experimenting by fusing them with global flavors—such
    as adding kimchi or miso glaze—accompanied by fresh herbs from her patio garden like basil and oregano.
  core: Jackeline Mcfarland blends a lifelong love of folk art, fierce competitiveness in trivia, and a habit of misplacing her reading glasses on the kitchen counter, all while navigating her golden years
    with structured curiosity and a flexible spirit.
background:
  cultural: Jackeline is a first‑generation Mexican‑American whose parents emigrated from Jalisco in the 1930s. Raised in a bilingual household in Austin’s East Side, she grew up celebrating Día de los
    Muertos, Las Posadas, and Mexican Independence Day with a mix of Mexican customs and Texan flair. Her identity is rooted in strong family ties, Catholic traditions, and the vibrant mural culture of
    her community. Over the decades she has blended these influences with the progressive, multicultural atmosphere of modern Austin, maintaining a commitment to preserving Mexican artistic and culinary
    practices while actively engaging with the city’s broader cultural scene.
attributes:
  skills: '["Bilingual Spanish-English communication", "Art history analysis", "Mexican folk art curation", "Community program development", "Event planning", "Critical essay writing", "Mentorship for young
