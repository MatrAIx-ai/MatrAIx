personas:
  professional: Andrew Dunner, a full‑stack software developer specializing in cloud‑native architecture, leverages rigorous test‑driven practices and meticulous code reviews to build scalable fintech platforms,
    while their competitive edge drives them to dominate hackathons and mentor junior engineers with a disciplined, results‑focused approach.
  sports: Andrew Dunner hits the Charlotte Plaza Trail for early‑morning runs, is a member of the local Charlotte Running Club, cheers for the Charlotte Hornets during NBA season, follows the Carolina Panthers
    in the fall, and participates in occasional weekend 5K charity races to combine fitness with community involvement.
  arts: Andrew Dunner attends intimate jazz gigs featuring artists like Kamasi Washington and Miles Davis, curates a personal playlist of classic bebop, reads science‑fiction works by Neal Stephenson and
    historical nonfiction by Doris Kearns Goodwin, and finds inspiration in the visual storytelling of graphic novelist Bryan Lee O'Malley.
  travel: Andrew Dunner prefers meticulously planned weekend getaways, having explored Asheville’s Blue Ridge trails and Nashville’s music scene, while keeping a bucket list that includes the Northern Lights
    in Reykjavik and a road trip along California’s Pacific Coast Highway for both cultural immersion and quiet reflection.
  culinary: Andrew Dunner treats baking as a methodical ritual, perfecting sourdough loaves and buttery croissants with precise timing, while also experimenting with Southern staples like shrimp and grits
    and collard greens during cozy dinner gatherings with close friends.
  core: Andrew Dunner blends disciplined engineering excellence with a competitive spirit, balancing solitary problem‑solving with early‑morning runs, cautious financial planning, and a fondness for jazz
    and methodical baking, all while wrestling with a tendency toward worry and occasional work‑life overcommitment.
background:
  cultural: Andrew grew up in Charlotte’s vibrant African-American community, where family gatherings, church, and local cultural events shaped his identity. His parents emphasized education and self-discipline,
    a value reflected in his organized work ethic. He attended a historically Black college for his undergraduate STEM degree, forging connections with peers who shared similar cultural experiences. The
    rhythmic roots of Southern hip-hop and the soulful tones of local jazz regularly feature in his playlists, and he maintains ties to community mentorship programs that encourage Black youth to pursue
    careers in technology. His marriage reflects shared cultural values, and he often participates in community service initiatives, such as teaching coding workshops at the Charlotte Public Library’s African-American
    history series.
