  career_goals: He aims to become a principal engineer or cloud architect, leading the design of high-performance, secure fintech platforms for Charlotte’s banking sector. Over the next five years, Andrew
    plans to deepen his expertise in distributed systems and architecture, earn advanced certifications (e.g., AWS Certified Solutions Architect – Professional), and contribute to open-source projects that
    address under-representation of Black developers in cloud infrastructure. He also aspires to mentor junior engineers from diverse backgrounds, building a small elite team known for technical excellence
    while balancing his need for focused, solitary work. Ultimately, Andrew wants to leverage his technical influence to create tools that empower Black-owned small businesses with affordable, scalable
    digital solutions.
