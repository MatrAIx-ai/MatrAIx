  career_goals: Cecelia aims to move into a supervisory role within the casino’s security department, eventually becoming a shift supervisor or security manager responsible for training and policy development.
    She plans to complete her associate degree in criminal justice and earn industry certifications such as the Certified Protection Professional (CPP) and an advanced first‑responder credential. Long‑term,
    she envisions a transition into corporate risk management or a consulting position where she can leverage her practical surveillance experience and strong organizational abilities. Mentoring newer officers
    and fostering a supportive, safety‑focused culture are also key ambitions.
