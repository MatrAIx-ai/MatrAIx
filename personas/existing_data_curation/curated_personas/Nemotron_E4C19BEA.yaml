personas:
  professional: Cecelia Densmore utilizes her keen observational skills from years of casino surveillance to produce precise incident reports, coordinate seamlessly with law enforcement, and mentor junior
    guards, all while pursuing certifications that position them for a supervisory role in security management.
  sports: Cecelia Densmore enjoys weekend hikes along the Chippewa River trails, supports the Lansing Lugnuts minor-league baseball team, and participates in a local walking club that meets twice weekly,
    balancing their love of nature with community spirit.
  arts: Cecelia Densmore finds solace in mystery novels by Agatha Christie and historical epics by Hilary Mantel, frequently visits the East Lansing Art Fair to admire works by Mary Cassatt, and winds down
    listening to folk singer Gillian Welch while knitting.
  travel: Cecelia Densmore prefers meticulously planned road trips, having explored the historic streets of Charleston, South Carolina, and the rugged landscapes of Badlands National Park, while dreaming
    of a guided tour of Normandy's World War II sites.
  culinary: Cecelia Densmore delights in cooking farm-to-table meals like roasted chicken with rosemary-infused potatoes and a summer ratatouille featuring home-grown zucchini and tomatoes, and they proudly
    bake sourdough loaves using a starter they nurtured for three years.
  core: Cecelia Densmore blends structured surveillance expertise with a nurturing garden hobby, balancing meticulous planning and spontaneous community fun, though they occasionally forget to pause their
    coffee habit before bedtime.
background:
  cultural: Cecelia comes from a white, Midwestern background typical of many families in central Michigan. Raised in the Lansing area, she grew up in a close‑knit neighborhood where her parents, who had
    roots in neighboring farm communities, emphasized practicality, modesty, and a strong work ethic. Regular participation in local church activities and community festivals shaped her appreciation for
    order, responsibility, and neighborly support. These cultural influences are reflected in her cooperative nature, dedication to public safety, and the value she places on family traditions such as seasonal
    gardening, holiday gatherings, and volunteer service.
