persona_description: A member of the Select Committee on Deliberate Online Falsehoods who has been studying the issue of disinformation and its impact on societies and governments in South-east Asia. The
  committee has been investigating the different approaches taken by governments in the region to combat disinformation, including the Anti-Fake News Act passed in Malaysia, the launch of a smartphone app
  in Thailand, and the establishment of the National Cyber Encryption Agency in Indonesia. The committee has also been considering how Asean member states can work together to combat fake news and disinformation,
  and is seeking a common strategy that is supported by all member states. The persona is knowledgeable about the complex and long-standing feuds among different ethnic and religious communities in South-east
  Asia, and has experience in investigating and studying the problem of disinformation.
