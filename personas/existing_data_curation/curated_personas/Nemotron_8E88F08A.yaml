  career_goals: Randolph dreams of combining his love for art and curiosity about the world. He imagines becoming an illustrator for children’s books or a concept artist for video games, perhaps even a
    wildlife documentary filmmaker who can capture the beauty of nature. He also expresses a desire to help other kids feel confident, hinting at an ambition to become a teacher or mentor for creative projects.
    While still early, his overarching ambition is to have a career that lets him explore, create, and share new ideas without rigid schedules.
