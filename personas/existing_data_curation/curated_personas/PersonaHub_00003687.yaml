persona_description: A nutritionist or health professional who is interested in the nutritional significance, requirements for health, and safe range of daily intakes for trace elements in human nutrition
  and health. They are knowledgeable about the core of the report, which provides authoritative recommendations on trace elements, and are interested in the analytical methodology used to determine trace
  elements in biological samples and dietary materials. They also have a keen interest in the design and interpretation of research on trace elements and are looking for detailed guidelines and advice on
  how to determine whether the dietary habits of specific communities will increase the risk of disorders related to trace elements.
