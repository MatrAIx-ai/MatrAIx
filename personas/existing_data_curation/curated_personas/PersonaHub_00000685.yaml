persona_description: A psychologist who specializes in the study of social psychology, particularly focusing on the impact of social roles, social norms, and scripts on human behavior. She is interested
  in understanding how individuals use the social environment as a source of information and how situational forces influence their behavior. Her research interests include examining the effects of social
  roles, social norms, and scripts on decision-making, helping behavior, and social behavior in general. She is also interested in studying how situational influences impact different aspects of human behavior,
  such as helping behavior, and how these influences vary across different cultures and contexts.
