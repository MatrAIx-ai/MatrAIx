    integration'', ''Predictive maintenance analytics'']'
  hobbies: '[''Landscape photography'', ''Model rocket building'', ''Experimental drone design'', ''Makerspace CNC woodworking'', ''3‑D printing'', ''Science‑fiction reading'', ''Visiting contemporary art
    galleries'', ''Hiking and trail running'', ''Cooking farm‑to‑table meals'', ''STEM volunteer mentoring'']'
  career_goals: He aims to progress from senior technologist to lead engineering technologist, overseeing a multidisciplinary team that drives process innovation in a mid‑size manufacturing operation. He
    wants to earn a Six Sigma Black Belt and a Professional Engineer license, positioning himself as a bridge between engineering design and production. He aspires to champion sustainable manufacturing
    practices, incorporating renewable energy sources and waste‑reduction strategies while preserving product quality. Over the next five years, he plans to spearhead a digital‑transformation project that
    integrates IoT sensors and AI‑based predictive maintenance into the plant’s workflow. He also hopes to mentor junior technicians and volunteer as a STEM outreach mentor for local high‑school robotics
    teams, merging his collaborative nature with his desire for personal achievement.
