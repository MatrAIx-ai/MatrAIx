personas:
  professional: Andrew Gay, a senior technologist specializing in CNC machining and advanced automation, leverages their Six Sigma expertise and meticulous organizational habits to drive lean process improvements
    and spearhead digital‑transformation initiatives, while their curiosity fuels unconventional problem‑solving and their reserved nature ensures focused, high‑standard project delivery.
  sports: Andrew Gay, an avid trail runner with the Sacramento Trail Runners club, enjoys early‑morning runs on the Sierra Nevada foothills, follows the Oakland Athletics for baseball, roots for the Golden
    State Warriors during NBA season, and they incorporate weekly strength‑training sessions at a local gym to balance endurance with core stability.
  arts: Andrew Gay frequently visits contemporary galleries in Sacramento and San Francisco, drawing inspiration from James Turrell’s light installations, Refik Anadol’s data‑driven art, and the kinetic
    sculptures of Alexander Calder, while they also curate a personal collection of photography by Ansel Adams and listen to Daft Punk for creative stimulation.
  travel: Andrew Gay plans meticulously for their photography‑focused trips, having captured sunrise over the Sierra Nevada foothills and explored the volcanic landscapes of Iceland, while also dreaming
    of a spring pilgrimage to Japan’s cherry‑blossom‑laden countryside and balancing travel budgets with their family’s weekend commitments.
  culinary: Andrew Gay enjoys cooking farm‑to‑table meals such as roasted beet and goat‑cheese salad with fresh rosemary, pan‑seared salmon with a citrus‑herb glaze, and handcrafted sourdough bread, often
    experimenting with heirloom vegetables from the Central Valley, though they occasionally over‑season dishes when juggling multiple projects.
  core: Andrew Gay blends a disciplined, data‑driven engineering mindset with a curious, artistic soul, channeling their love for precision and solitude into both high‑tech manufacturing and sunrise photography,
    while they occasionally let their gadget obsession override their work‑life balance.
background:
  cultural: Andrew grew up in a middle‑class family in the Central Valley, the son of Irish‑American parents who worked in agriculture and later in a local manufacturing plant. The region’s blend of agricultural
    heritage and growing tech presence shaped his pragmatic yet inquisitive outlook. He was raised with an emphasis on hard work, community involvement, and modest, family‑centered values. Attending a public
    high school in Modesto, he excelled in math and science, later earning a bachelor's degree in mechanical engineering from a California state university. His cultural identity reflects the typical Mid‑western‑American
    work ethic combined with the progressive, innovation‑driven spirit of California. He and his wife are active in their local church and volunteer at the annual Harvest Festival, celebrating the agricultural
    roots of Modesto while also supporting local arts initiatives.
attributes:
  skills: '[''CNC machining'', ''5‑axis CNC programming'', ''SolidWorks 3D CAD'', ''AutoCAD drafting'', ''Python scripting for data analysis'', ''PLC programming (Allen‑Bradley, Siemens)'', ''Six Sigma
