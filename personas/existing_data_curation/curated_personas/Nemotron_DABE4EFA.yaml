personas:
  professional: Chou Wang is a seasoned bilingual educator who designs adult ESL and Mandarin curricula, integrates technology with traditional teaching methods, mentors new teachers, and balances innovative
    curiosity with proven practices, and they keep the classroom calm and organized while remaining flexible to student needs.
  sports: Chou Wang starts each day with tai chi in the backyard, hikes the Fullerton Loop with the local Senior Hiking Club, follows the Los Angeles Lakers and Angels on television, participates in the
    community Mahjong league as a mental sport, and they treat these activities as a balanced blend of physical exercise, team spirit, and social connection.
  arts: Chou Wang dedicates afternoons to practicing Chinese calligraphy inspired by Wang Xizhi, paints traditional ink‑wash landscapes, attends quarterly Chinese opera performances featuring renowned vocalist
    Yan Huisheng, enjoys listening to Yo‑Yo Ma’s cello recordings while sipping jasmine tea, and they consider these artistic pursuits essential to their sense of cultural continuity and personal fulfillment.
  travel: Chou Wang prefers cultural immersion trips, having explored Taiwan’s historic temples, visited Kyoto’s zen gardens, taken a road trip to Yosemite National Park, plans to study the Great Wall next
    summer, and they favor carefully crafted itineraries that balance guided tours with independent wandering.
  culinary: Chou Wang enjoys cooking Sichuan mapo tofu with goji berries and handmade noodles, cultivates bok choy and cilantro in a small garden for fresh ingredients, frequently prepares Cantonese dim
    sum like shrimp dumplings, savors a perfectly brewed pu’er tea after meals, and they love sharing these dishes with family and friends at Mahjong evenings.
  core: Chou Wang blends calm resilience with a curiosity for lifelong learning, nurturing community through teaching, gardening, art, and mindful tradition, and they occasionally indulge in spontaneous
    calligraphy splurges.
background:
  cultural: Born into an East Asian family with roots in mainland China, Chou grew up absorbing the values of respect for education, filial piety, and communal harmony. After immigrating to the United States
    in his early twenties, he blended these traditions with the openness and individualism of American culture. In Fullerton, he maintains strong ties to the local Chinese community through festivals like
    Lunar New Year, temple gatherings, and cultural clubs. His upbringing instilled a calm resilience and an appreciation for both the collective and the individual, shaping his teaching philosophy and
    everyday interactions.
attributes:
  skills: '[''English as a Second Language instruction'', ''Mandarin Chinese instruction'', ''Curriculum development for adult learners'', ''Instructional technology integration'', ''Classroom management'',
