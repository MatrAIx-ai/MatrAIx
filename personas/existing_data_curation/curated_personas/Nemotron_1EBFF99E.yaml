personas:
  professional: A meticulous floral designer, Daphne Phommarath channels her BA in Arts & Humanities into precision‑driven arrangements that fuse Midwestern seasonal blooms with lotus and orchid motifs,
    leveraging Adobe Illustrator and CAD tools while applying her habit of detailed spreadsheets and time‑blocking to deliver on‑point wedding installations and corporate branding projects.
  sports: A low‑key fitness enthusiast, Daphne Phommarath follows the Oklahoma City Thunder and the Sooners football team from her modest apartment, practices gentle yoga three times weekly at a quiet studio
    in Edmond, and participates in seasonal community runs organized by the local 5K club, viewing physical activity as a disciplined complement to her meticulous work habits.
  arts: An introspective art aficionado, Daphne Phommarath curates a macro‑photography Instagram feed of blossoming lotus and orchid details, draws narrative inspiration from contemporary authors like Ocean
    Vuong and the installations of Ai Weiwei, spends weekends sketching calligraphic brushstrokes reminiscent of floral stems, and regularly visits the Oklahoma City Museum of Art to study Monet’s water
    lilies and Yayoi Kusama’s infinity rooms, each encounter shaping her next floral arrangement.
  travel: An organized solo traveler, Daphne Phommarath meticulously plans weekend escapes to the Wichita Mountains for quiet hikes and seasonal flower scouting, while budgeting for annual trips to Kyoto’s
    tea houses and Taipei’s bustling flower markets—experiences she treasures for the botanical inspiration they provide.
  culinary: A thoughtful culinary explorer, Daphne Phommarath, an adept home cook, loves simmering fragrant pho broth with star anise and ginger, crafting fresh spring rolls filled with lotus root and mint,
    and savoring seasonal farm‑to‑table dishes like heirloom tomatoes with basil, while occasionally splurging on artisanal matcha desserts that echo her tea‑ceremony practice.
  core: Daphne Phommarath is a detail‑obsessed floral designer who channels obsessive spreadsheet‑driven organization into serene lotus‑laden arrangements, but frequently loses sleep over perfectionism
    and cannot resist a nightly puzzle of over 1,000 pieces.
background:
  cultural: Daphne is a second‑generation Southeast Asian American, with her parents originally from Vietnam. Raised in a bilingual household in Oklahoma, she grew up celebrating Tet (Lunar New Year) and
    other cultural festivals, where traditional floral arrangements—lotus, orchid, and frangipani—played central roles. Her upbringing instilled a deep appreciation for meticulous craftsmanship, respect
    for nature, and the symbolism embedded in flowers. While she embraces the Midwestern values of reliability and practicality, she continuously weaves Vietnamese aesthetic motifs and color palettes into
    her work, creating a hybrid style that honors both her heritage and her Oklahoma community. She is fluent in English and conversational in Vietnamese, allowing her to source authentic blooms from Asian
    importers and to share cultural stories with clients who seek a meaningful narrative behind each arrangement.
attributes:
  skills: '["Floral design and arrangement", "Botanical identification and care", "Color theory and composition", "Event design and coordination", "Client consultation and needs assessment", "Inventory
    and budget management", "Floral design software (Adobe Illustrator, CAD)", "Time management and project scheduling", "Handcrafted dried flower preservation", "Cultural motif integration (Southeast Asian
    tradition)"]'
  hobbies: '["Indoor gardening", "Macro photography of flowers", "Reading contemporary Southeast Asian literature", "Tea ceremony and traditional cooking", "Meditation and yoga", "Puzzle solving (jigsaw
    puzzles)", "Museum visits (art and cultural exhibitions)", "Journaling and sketching designs", "Calligraphy practice", "Quiet nature walks in local parks"]'
  career_goals: As she approaches her 30s, Daphne aims to transition from her current role in a boutique floral shop to owning a studio that reflects both her structured work style and her cultural heritage.
    Her short‑term goal is to obtain the Certified Floral Designer (CFD) credential and to launch a small‑scale pop‑up shop in Edmond, focusing on sustainable, locally sourced flowers blended with Southeast
    Asian aesthetics. Within five years, she envisions a full‑service studio that offers custom wedding installations, corporate branding floristry, and workshops on mindful floral design. She plans to
    develop a recurring “Quiet Garden” series—private, low‑sensory events where clients experience floral arrangements in a tranquil, meditative setting. Financially, she seeks a steady profit margin that
    secures her family’s future while allowing investment in a climate‑controlled greenhouse. Long‑term, she hopes to author a coffee‑table book that documents the symbolism of Southeast Asian flowers and
    their adaptation to Midwestern environments, positioning herself as a thought leader in cross‑cultural floral artistry.
