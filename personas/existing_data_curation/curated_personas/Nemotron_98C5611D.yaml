  hobbies: '[''fishing'', ''crabbing'', ''basketball'', ''skateboarding'', ''guitar playing'', ''video gaming (Fortnite)'', ''TikTok content creation'', ''local history exploration'', ''county fair volunteering'']'
  career_goals: Although Billy left formal school before reaching ninth grade, his immediate goal is to earn a GED within the next year. He plans to enroll in a local vocational program that offers certifications
    in marine technology and small‑engine repair, aiming to work as a deckhand or boat‑maintenance technician on the Chesapeake Bay. In the longer term, he hopes to combine his love for the water with entrepreneurship
    by opening a seasonal bait‑and‑guide service for local anglers. Billy also dreams of using his natural charisma to mentor younger teens in his community, perhaps through a youth sports or after‑school
    program, providing a structured yet flexible outlet for his leadership.
