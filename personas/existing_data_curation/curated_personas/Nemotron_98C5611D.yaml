personas:
  professional: Billy Hobbs blends hands‑on experience from a family farm on the Chesapeake Bay with a natural flair for leadership to pursue a marine‑technology vocation, using their carpentry, small‑engine
    repair, and conflict‑mediation skills to excel as a prospective deckhand and future bait‑and‑guide entrepreneur while battling a teen tendency to procrastinate on deadlines.
  sports: Billy Hobbs dominates weekly basketball games at the Marion Station community center, rides with the local Skate Club on bike paths, roots for the Baltimore Ravens and Maryland Terrapins, and
    spends weekends crabbing with the Chesapeake Bay Fishing League, all while balancing competitive drive with a casual approach to structured training.
  arts: Billy Hobbs strums an acoustic guitar to classic rock legends like Led Zeppelin and modern pop hits from Ariana Grande, edits short‑form TikTok videos set to Imagine Dragons tracks, and finds inspiration
    in the regional folk sounds of The Joyful Fisherfolk, weaving music and visual storytelling into their social persona.
  travel: Billy Hobbs favors low‑budget road trips to nearby historic sites such as the Somerset County Museum, weekend escapades to Assateague Island for beachcombing, and dreams of a summer backpacking
    adventure along the Outer Banks, preferring spontaneous last‑minute plans over strict itineraries while budgeting trips with part‑time earnings.
  culinary: Billy Hobbs loves frying fresh snapper with lemon‑garlic butter, perfecting Maryland crab cakes seasoned with Old Bay, throwing together shrimp po’ boys, and experimenting with dockside fish
    tacos, showing a moderate cooking skill level that mixes rustic seafood traditions with occasional late‑night pizza cravings.
  core: Billy Hobbs is a charismatic, outdoors‑driven teen who balances hands‑on marine work, impulsive spending, and a restless mind with a guitar in one hand and a skateboard in the other.
background:
  cultural: Billy comes from a multi‑generational white family rooted in Somerset County’s rural traditions. His grandparents were of German‑Irish descent and settled in the region during the early 20th
    century, working on a small family farm that later diversified into Bay‑side fishing and crabbing. Growing up in Marion Station, a close‑knit community where neighbors often rely on each other, Billy
    was raised with an emphasis on self‑reliance, hard work, and respect for the Chesapeake Bay’s maritime heritage. He attends a local Protestant church and participates in community gatherings such as
    the county fair, the annual crab‑picking contest, and the high‑school basketball tournaments, all of which reinforce a cultural identity that blends agricultural pragmatism with a love for the water
    and local folklore.
