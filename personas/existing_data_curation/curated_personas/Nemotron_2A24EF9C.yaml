  career_goals: Crystal dreams of becoming a teacher who can create a balanced classroom of structure and free‑play, or a veterinarian caring for animals in her community. She also hopes to lead an after‑school
    club where kids can explore science projects while having space for spontaneous creativity. In the short term, she aims to win her school’s science fair, become captain of her soccer team, and earn
    a piano recital certificate.
