personas:
  professional: Crystal Duncan is a budding youth soccer player who channels a practical focus into mastering drills after school, yet often improvises on the field with spontaneous footwork and inventive
    passes, showing emerging leadership as a forward and a knack for coordinating team plays while balancing a love of structure with moments of creative freedom.
  sports: Crystal Duncan is a forward on the Cleveland Youth Soccer Club (CYC) team, training three times a week and playing in local leagues, while also cheering for the Cleveland Browns and following
    the Cleveland Guardians; they join weekend family hikes in the Metroparks to stay active and enjoy the balance of structured team drills and spontaneous street‑soccer games with friends.
  arts: Crystal Duncan is a self‑taught hip‑hop and R&B dancer who loves choreographing impromptu routines to tracks by Cardi B, Doja Cat, and Chris Brown, creates friendship bracelets featuring teal and
    gold beads, reads the Percy Jackson series, and builds imaginative Minecraft worlds inspired by mythic quests; they also sing gospel songs like 'I Smile' by Kirk Franklin in their church choir, showcasing
    a blend of structured practice and spontaneous creativity.
  travel: Crystal Duncan loves family road trips to the Cleveland Metroparks and Hocking Hills State Park, where they explore trails and collect leaves for crafts, has visited Disney World in Florida during
    a school break, and dreams of traveling to Tokyo to experience the vibrant gaming culture that fuels their Minecraft inspiration; they plan trips using a simple checklist but sometimes go off‑script
    to chase a spontaneous adventure.
  culinary: Crystal Duncan enjoys helping their mom prepare soul‑food classics such as collard greens seasoned with smoked turkey and cornbread made from stone‑ground cornmeal, while also mastering simple
    dishes like banana‑pancake stacks and pepperoni pizza; they favor ingredients like cheddar cheese, honey, and fresh strawberries, often experimenting with new flavor combos during weekend cooking sessions.
  core: Crystal Duncan is a socially vibrant 10‑year‑old who balances structured soccer drills with spontaneous hip‑hop moves, saves allowance in a piggy bank while splurging on Minecraft skins, navigates
    mild asthma with a trusty inhaler, and fuels creativity through friendship‑bracelet making and church choir singing.
background:
  cultural: Crystal comes from an African‑American family that has lived in Cleveland for three generations. Her parents maintain Southern‑rooted traditions like cooking soul food, celebrating Juneteenth,
    and attending a vibrant Black church that emphasizes community service. She participates in local cultural events such as the Cleveland African World Festival and library programs that highlight Black
    history. Growing up in Cuyahoga County, she is aware of the city’s rich musical legacy and the importance of neighborhood solidarity, which shapes her values of cooperation, assertiveness, and resilience.
