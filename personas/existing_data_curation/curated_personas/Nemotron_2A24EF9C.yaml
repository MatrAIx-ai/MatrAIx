  hobbies: '[''Soccer'', ''Hip‑hop and R&B dancing'', ''Friendship bracelet making'', ''Reading adventure novels'', ''Minecraft gaming'', ''Exploring Metroparks'', ''Cooking family meals'', ''Church choir
