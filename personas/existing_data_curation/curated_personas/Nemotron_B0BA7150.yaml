  career_goals: Howard’s curiosity about how things work drives his long‑term ambition to pursue a career in technology or engineering. In the coming years he plans to join his middle‑school STEM club,
    attend summer coding camps, and take part in robotics competitions, all of which will strengthen his practical skills. He envisions becoming a software developer or robotics engineer who creates useful,
    environmentally‑friendly solutions, and he hopes to mentor younger students in coding, reflecting his cooperative yet assertive nature.
