personas:
  professional: Mayra Rivera, a Los Angeles-based coin-vending and arcade-machine technician, leverages rapid mechanical diagnostics, firmware upgrades, and bilingual customer communication while channeling
    a curious, art-appreciating mindset into inventive repair solutions, even as their relaxed approach to obligations and occasional disorganization push them to seek a senior service manager role where
    they can mentor others and formalize service standards.
  sports: Mayra Rivera stays active by salsa-dancing at a downtown studio, jogging along the Santa Monica beachfront in the spring, and rooting for the Los Angeles Dodgers and Lakers while occasionally
    joining a weekend recreational basketball league at their community center, balancing social fun with a modest fitness routine.
  arts: Mayra Rivera immerses themselves in Los Angeles's vibrant art scene by attending LACMA exhibitions, joining mural-painting crews that reference Shepard Fairey's bold graphics, taking guided street-art
    tours that spotlight works by Banksy and local legends like Chaz Bojórquez, and listening to classic salsa icons such as Celia Cruz while they curate their own DIY gallery of vintage arcade memorabilia.
  travel: Mayra Rivera favors spontaneous weekend getaways to nearby coastal towns like Santa Barbara and San Diego, while dreaming of immersive trips to Barcelona for its street-art festivals and Tokyo
    for cutting-edge arcade culture, planning most journeys on a loose itinerary that balances their love of adventure with a modest travel budget.
  culinary: Mayra Rivera, a confident home cook, delights family gatherings with homemade carnitas, tamales wrapped in corn husks, and fresh guacamole made from ripe avocados, cilantro, and lime, while
    they also relish exploring authentic taco stalls for al pastor and occasionally treat themselves to sushi rolls featuring tuna and avocado, reflecting a palate that blends traditional flavors with occasional
    culinary adventures.
  core: Mayra Rivera merges a tech-savvy knack for arcade machines with a boundless love of street art, juggling a relaxed, sometimes chaotic schedule and occasional financial anxiety while they stay endlessly
    sociable and creatively curious.
background:
  cultural: Mayra is a first‑generation Mexican American who grew up in a close‑knit family that celebrated Día de los Muertos, quinceañeras, and weekly Sunday tamale dinners. Bilingual and bicultural,
    she blends Mexican traditions with the multicultural vibe of Los Angeles, often sharing stories of her heritage with coworkers and neighbors. Her cultural values emphasize community, respect for elders,
    and a love of festive expression, which inform her sociable personality and her desire to infuse everyday spaces—like vending machines—with art that reflects her Mexican roots.
attributes:
  skills: '[''mechanical troubleshooting'', ''electrical circuit diagnostics'', ''coin and token system repair'', ''software configuration of vending machines'', ''customer service'', ''bilingual Spanish‑English
    communication'', ''inventory tracking'', ''preventive maintenance planning'', ''basic welding'', ''use of handheld diagnostic tools'']'
  hobbies: '[''visiting art galleries'', ''community mural painting'', ''salsa dancing'', ''cooking Mexican cuisine'', ''balcony gardening'', ''collecting vintage arcade machines'', ''board game nights'',
    ''volunteering at local community center'', ''street art tours'']'
  career_goals: Mayra aims to move up into a senior service manager role where she can mentor newer technicians and shape the company’s service standards. She also dreams of launching her own small vending
    business that highlights Mexican‑inspired snacks and incorporates locally commissioned artwork on machine exteriors. Gaining certification in advanced mechatronics and attending workshops on emerging
    interactive arcade technologies are concrete steps she plans to take. Ultimately, she hopes to combine her technical expertise with her love of art by curating community‑based projects that turn idle
    machine spaces into public art installations.
