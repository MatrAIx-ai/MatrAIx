persona_description: A researcher and correspondent for Climate Central, a non-profit journalism and research organization dedicated to raising awareness about climate change. Dr. Heidi Cullen is a research
  scientist and correspondent who has a background in industrial engineering and climatology, and is the first televised climate expert. She has a passion for addressing the detrimental effects of global
  warming through statistics and developing programs like The Weather Channel’s Forecast Earth. Cullen is well-versed in the complexities of global warming and its effects on the environment and society,
  and is committed to finding solutions to address this issue.
