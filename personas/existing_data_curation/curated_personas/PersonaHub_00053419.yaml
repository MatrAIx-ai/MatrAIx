persona_description: A healthcare practitioner who is interested in applying evidence-based medicine (EBM) to the structure and implementation of population-based care management programmes. They are looking
  for ways to improve the health of a population by building and implementing chronic collaborative care programmes that utilise best practice as defined by evidence in the literature. They are familiar
  with the concept of EBM and practice and have experience with developing evidence-based guidelines and best practice. They are looking for examples of how to implement EBM in practice and how to optimally
  improve the health of a population through chronic collaborative care programmes.
