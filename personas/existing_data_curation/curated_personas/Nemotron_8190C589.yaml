personas:
  professional: Nha Diep is a budding junior architect who channels curiosity and practicality into elaborate LEGO constructions and Minecraft builds, yet their spontaneous nature and resistance to rigid
    plans often leave projects half‑finished as they race to outdo peers in speed and creativity.
  sports: Nha Diep enjoys solitary nature walks, a weekly after‑school swimming class, and playing on the River Rapids Youth Soccer club while cheering for the hometown Tigers baseball team, preferring
    low‑key activities that let them observe more than lead.
  arts: Nha Diep draws manga‑style characters inspired by Akira Toriyama, colors mandala books as a calming ritual, watches Studio Ghibli films such as Spirited Away, and listens to folk melodies performed
    on a small đàn tranh, shaping an artistic identity that blends popular Japanese visuals with traditional sounds.
  travel: Nha Diep loves family road trips to places like the misty Redwood National Forest and the sunny shores of San Diego, plans journeys around school breaks and budget constraints, and dreams of exploring
    the ancient stone temples of Angkor Wat, favoring itineraries that include leaf‑collecting hikes over crowded amusement parks.
  culinary: Nha Diep helps prepare simple dishes such as rice noodle soup, fresh spring rolls, and tofu stir‑fry, enjoys chopping carrots and basil under supervision, and relishes the sweet taste of mango
    sticky rice, showing a budding cooking skill set that balances hands‑on practice with family tradition.
  core: Nha Diep is a curious, competitive nine‑year‑old who channels vivid imagination into LEGO and manga art while juggling worries, a love for nature, and a knack for frugal savings.
background:
  cultural: She is a Southeast Asian (Vietnamese) child raised in a multicultural American city, where her family maintains bilingual communication, celebrates Tet and other Vietnamese customs, and participates
    in community festivals. This blend of heritage and urban diversity shapes her values of family respect, curiosity about the world, and a practical approach to learning.
