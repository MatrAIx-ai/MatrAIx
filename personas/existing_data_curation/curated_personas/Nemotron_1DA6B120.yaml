  career_goals: Tommy aims to grow his practice into a boutique advisory firm that specializes in multi‑generational wealth stewardship, allowing him to blend personalized service with modern digital tools.
    He plans to earn the Certified Financial Planner (CFP) designation to deepen his technical credibility, and to author a practical guide on family financial wellness. A core ambition is to expand his
    community outreach by establishing a regional financial literacy program for schools and senior centers, thereby combining his professional expertise with his strong drive to help others and maintain
    community harmony. He also envisions a balanced work‑life schedule that preserves his flexibility and family time.
