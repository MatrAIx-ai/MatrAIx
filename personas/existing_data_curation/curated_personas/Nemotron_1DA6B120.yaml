personas:
  professional: Tommy Waters, a seasoned financial planner in Sandy, Utah, blends his humanities‑rooted curiosity with practical, data‑driven analysis to demystify retirement, tax‑efficient investing, and
    estate planning for families, while leading community workshops and mentoring junior advisors with compassion and a relaxed, flexible approach.
  sports: Tommy Waters enjoys hiking the Wasatch foothills, snowshoeing in winter, and belongs to the Wasatch Trailblazers hiking club, while cheering on the Utah Jazz and Real Salt Lake and occasionally
    playing pickup basketball at the local community center.
  arts: Tommy Waters captures the steady beauty of the Utah landscape through photography inspired by Ansel Adams, attends performances by the Utah Symphony, listens to folk legends like John Prine and
    contemporary indie bands such as The National, and reads historical biographies of Winston Churchill and philosophical essays by Albert Camus for creative fuel.
  travel: Tommy Waters prefers flexible, family‑oriented travel that mixes adventure and relaxation, having trekked through Zion and Banff, explored the historic streets of Rome and Athens, and planning
    a future road trip along the Pacific Coast to experience both natural wonders and culinary delights.
  culinary: Tommy Waters is a capable home chef who routinely prepares herb‑roasted lamb with rosemary, pan‑seared scallops with lemon butter, and garden‑fresh heirloom tomato bruschetta, experimenting
    with truffle oil and wild mushrooms on weekends to impress friends while still mastering the perfect sourdough loaf.
  core: Tommy Waters balances a compassionate, community‑focused career with a love for rugged outdoors and gourmet cooking, all while occasionally letting disorganization and delayed dental visits slip
    through his otherwise disciplined routine.
background:
  cultural: Tommy grew up in a Midwestern American environment that emphasized self‑reliance, community involvement, and modesty, values he carried into adulthood. Relocating to Sandy, Utah, he embraced
    the region’s strong outdoor culture and the local emphasis on family and civic service. While culturally identifying as White American, his humanities education exposed him to a broad array of artistic
    and literary traditions, enriching his worldview. He participates in community events, values the collaborative spirit of his neighborhood, and integrates these cultural influences into both his professional
    practice and personal life.
