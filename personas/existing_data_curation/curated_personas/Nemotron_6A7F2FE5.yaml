  career_goals: Reginald aims to transition into a lead architect role where he can shape technical strategy for products that serve his local community, particularly in health‑tech and education. He wants
    to build a high‑performing, inclusive engineering team that embraces flexible work practices while maintaining rigorous code quality. Over the next five years he plans to earn AWS Solutions Architect
    certification, spearhead a mentorship program for underrepresented coders in Atlanta, and eventually launch his own consultancy focused on creating accessible digital solutions for nonprofits.
