  career_goals: Although retired from formal work, Nathalie aims to continue growing as a community leader. She plans to enroll in a local library's digital literacy class to sharpen her tech skills, and
    she hopes to become the official cultural liaison for the Concord Latino Heritage Festival. She aspires to compile a memoir of her family's migration story, preserving it for future generations. Additionally,
    she wants to expand her volunteer work by establishing a senior‑citizen mentorship program at the nearby community center, and she hopes to travel to Mexico once a year to reconnect with her roots and
    bring new recipes and traditions back to her hometown.
