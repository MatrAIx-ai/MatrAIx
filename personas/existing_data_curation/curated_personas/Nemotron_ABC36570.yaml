  professional: William Farooqi is a seasoned management analyst who leverages his Six Sigma Black Belt and PMP certifications to drive data‑centric strategies, balancing a curious exploration of AI‑powered
    analytics with pragmatic implementation, and thrives on stakeholder workshops where their talkative, competitive demeanor shines.
