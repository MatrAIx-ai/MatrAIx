  hobbies: '[''Gardening'', ''Woodworking'', ''Cooking traditional Guatemalan dishes'', ''Reading historical non-fiction'', ''Walking nature trails'', ''Playing chess at the senior center'', ''Attending
    church services'', ''Volunteering at community garden'', ''Genealogy and family history research'', ''Watching baseball games'']'
  career_goals: Even though he is no longer part of the formal workforce, Juan Luis aims to stay actively engaged in his community. He aspires to volunteer as a technical advisor for local construction
    and garden projects, using his engineering background to help ensure safety and efficiency. He wants to mentor high‑school students interested in STEM, encouraging them to pursue practical, hands‑on
    learning. Preserving his family’s history is a personal ambition; he plans to compile a digital archive of photographs, stories, and recipes for future generations. Maintaining his health through regular
    walks, gardening, and woodworking is also a key goal, as is organizing an annual cultural event that celebrates Guatemalan traditions for his grandchildren and the Cold Spring community.
