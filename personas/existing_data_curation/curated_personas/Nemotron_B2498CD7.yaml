personas:
  professional: Truc Urrea, a 48‑year‑old handyman‑in‑training, blends hands‑on carpentry, small‑engine repair, and traditional beadwork with a curiosity for new tools, offering reliable maintenance to
    the local community while planning to certify in residential maintenance and launch a handcrafted‑goods shop.
  sports: Truc Urrea enjoys early‑morning hikes on the Ouachita trails, participates in a regional hunting club, follows the Oklahoma City Thunder, the Dallas Cowboys, and the Texas Rangers, and balances
    his love for solitary fishing with occasional card games that keep his competitive edge sharp.
  arts: Truc Urrea spends evenings listening to The Rolling Stones and Led Zeppelin while crafting beadwork inspired by historic patterns, reads historical novels by Bernard Cornwell, and attends local
    powwows where he shares storytelling and admires folk artist Grandma Moses.
  travel: Truc Urrea plans trips that mix careful online research with spontaneous detours, preferring regional getaways to the Wichita Mountains and Tulsa, aiming to hike the Grand Canyon and hunt in New
    Mexico’s piñon woodlands, all while balancing budget constraints and family responsibilities.
  culinary: Truc Urrea favors hearty Southern dishes such as chicken fried steak, smoked brisket, and cornbread, enjoys experimenting with cedar‑plank trout and homemade chili, and often incorporates locally
    sourced beans, jalapeños, and fresh herbs into his meals, though he occasionally burns a batch of cornbread when distracted by a new gadget.
  core: Truc Urrea is a practical yet curious 48‑year‑old who stitches tradition into modern DIY projects, balances a frugal outlook with a love for classic rock, and navigates life with a competitive edge
    tempered by occasional skepticism and a penchant for humming while hammering.
background:
  cultural: Truc is a member of the Quapaw Nation, rooted in the ancestral lands of Ottawa County, Oklahoma. His family has lived in the Quapaw community for generations, preserving the tribe's language,
    ceremonies, and storytelling traditions. He participates in seasonal powwows, community feasts, and tribal council meetings, contributing his practical skills to maintain community facilities. Respect
    for the natural environment, a deep sense of collective responsibility, and the transmission of oral history shape his worldview, influencing both his everyday choices and his aspirations to mentor
    the next generation of Quapaw youth.
