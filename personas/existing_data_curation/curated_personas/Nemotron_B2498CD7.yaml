  hobbies: '[''Woodworking'', ''Traditional beadwork'', ''Hunting'', ''Fishing'', ''Attending powwows'', ''Card games'', ''Classic rock music'', ''Historical novels'', ''Hiking'', ''Bird watching'', ''Learning
    tech gadgets'']'
  career_goals: Truc aims to re‑enter the workforce through a part‑time handyman service focused on the Quapaw community, offering repairs and maintenance for tribal housing while gradually expanding to
    custom woodworking commissions. He plans to complete his GED and earn a certificate in residential maintenance to solidify his credibility. Long‑term, he hopes to open a small shop selling his handcrafted
    items—beaded accessories, carved wooden ornaments—and to mentor local youth, passing on both practical trade skills and cultural traditions. Financial stability and the ability to support his family
    independently are central to his ambition.
