personas:
  professional: Beverly Scott, a disciplined correctional officer with a reputation for meticulous incident reporting and crisis de‑escalation, leverages their organizational rigor and practical mindset
    to train new staff and enforce security protocols while positioning themselves for a future shift lieutenant role.
  sports: Beverly Scott stays fit through regular backcountry hikes in the Snake River Canyon, occasional summer trail runs, and a membership in the local Boise State Broncos fan club, where they cheer
    on the football team while maintaining a personal record of three 20‑mile treks per year.
  arts: Beverly Scott expresses their creative side by capturing elusive wildlife moments with a Nikon D850, drawing inspiration from Ansel Adams and the narrative tension of Gillian Flynn's novels, while
    also dedicating evenings to knitting intricate patterns and crafting wooden figurines.
  travel: Beverly Scott prefers meticulously planned solo expeditions that balance rugged exploration—such as a winter trek to Iceland’s volcanic landscapes—with quiet rests at secluded cabins in Colorado,
    always reserving funds for photography gear upgrades.
  culinary: Beverly Scott enjoys cooking nutrient‑dense meals like elk stew with root vegetables, smoked salmon on herb‑infused quinoa, and mushroom‑laden frittatas, often preparing them on a portable camp
    stove while perfecting knife skills for precise ingredient cuts.
  core: Beverly Scott is a 38‑year‑old correctional officer who channels disciplined precision into both their professional ascent and solitary wilderness pursuits, occasionally battling insomnia after
    night shifts but never missing a deadline.
background:
  cultural: Beverly grew up in a predominantly white, middle‑class family in rural Idaho, where self‑reliance, community responsibility, and respect for law and order are core values. The region’s strong
    agricultural roots and close‑knit towns have reinforced her preference for structure, modest social circles, and collaborative teamwork. While she identifies with broader American cultural norms, she
    also appreciates the local traditions of county fairs, church gatherings, and outdoor recreation that shape her worldview.
attributes:
  skills: '["Inmate supervision", "Crisis de‑escalation", "Security protocol implementation", "Physical fitness training", "Firearms proficiency", "Incident report writing", "Inventory and equipment management",
    "Shift scheduling", "Policy compliance auditing", "Inter‑agency coordination", "Conflict mediation", "Mentoring and training new officers"]'
  hobbies: '["Backcountry hiking", "Wildlife photography", "Gardening", "Woodworking", "Running", "Reading mystery and true‑crime novels", "Knitwear crafting", "Local community volunteering (food bank)"]'
  career_goals: Beverly aims to advance to a supervisory role such as shift lieutenant or facility operations manager within the next five years, leveraging her organizational strengths to improve staff
    coordination and safety outcomes. She plans to complete an associate degree in criminal justice and obtain a corrections management certification, positioning herself for future work in policy development
    or inmate‑rehabilitation program design at the state level.
