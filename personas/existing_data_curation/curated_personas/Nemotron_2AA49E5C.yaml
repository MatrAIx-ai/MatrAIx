  hobbies: '["Birdwatching", "Fishing", "Model train building", "Volunteer tutoring at senior center", "Gardening", "Community bowling league", "Reading historical non-fiction", "Genealogical research",
    "Classic rock listening", "Board game nights"]'
  career_goals: Although officially retired, Mickle aims to leave a lasting legacy in his community. He hopes to mentor younger volunteers in practical trades, document and publish a short oral‑history
    of Rochester’s mid‑20th‑century neighborhoods, and spearhead an annual senior‑focused craft fair that showcases local talents. He also aspires to maintain his health and mental sharpness by staying
    active in competitive card and bowling leagues, proving that his competitive spirit can coexist with his collaborative community values.
