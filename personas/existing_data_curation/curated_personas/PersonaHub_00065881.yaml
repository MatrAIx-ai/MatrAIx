persona_description: Mike Dockry, a Research Natural Resources Specialist with the USDA Forest Service, is an enrolled member of the Citizen Potawatomi Nation and has a PhD in Forest and Wildlife Ecology
  from the University of Wisconsin Madison. He has a BS in Forest Science from the University Wisconsin Madison and an MS in Natural Resources from the Pennsylvania State University. Mike is building a
  research program that integrates social and ecological sciences and has a particular interest in understanding social aspects of forest management, sustainability, indigenous community forestry, strategic
  foresight, and environmental history. He is interested in the cultural, historical, and economic meanings of forests on the Menominee Reservation in Wisconsin and how the Menominee forest has changed
  through time. Mike is a speaker at the EnviroThursday event on Thursday Mar 13, 2014, at the Olin-Rice Science Center 250, where he will explore the meanings of forest management (harvesting trees for
  timber) on the Menominee Reservation in Wisconsin. The event is for students, staff, and faculty and is sponsored by the Environmental Studies category.
