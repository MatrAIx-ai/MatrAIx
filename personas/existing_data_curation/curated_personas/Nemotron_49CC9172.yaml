  career_goals: Looking ahead, Ashley aims to transition into a supervisory or training role within the customer service department, where she can formalize her mentorship instincts and shape service protocols.
    She hopes to complete the remaining credits toward her associate degree, focusing on business administration or communications, to strengthen her leadership credentials. Additionally, she envisions
    launching a community‑based art‑café pop‑up in Temple Hills that combines her love of visual arts with her knack for organizing group activities. This venture would also serve as a supportive space
    for seniors dealing with anxiety, offering low‑cost art workshops and mindfulness sessions. Balancing personal well‑being, Ashley plans to integrate regular mindfulness practices to better manage her
    emotional reactivity while remaining a reliable and compassionate team member.
