personas:
  professional: Robert Greene, a budding young scientist and aspiring engineer, merges their curiosity for experiments with a disciplined, organized approach to LEGO building, often designing functional
    mechanisms and meticulously documenting findings like a miniature researcher, and they proudly display each project on the family bookshelf.
  sports: Robert Greene excels as a forward on the Oakwood Youth Soccer Club, idolizes Manchester United’s Marcus Rashford, regularly watches the Seattle Sounders’ matches, and they also practice swimming
    at the Community Aquatics Center to stay fit year‑round.
  arts: Robert Greene enjoys beginner piano lessons, often practicing "Für Elise" by Beethoven, participates in community theater productions of "Peter Pan" alongside the Sunrise Playhouse troupe, and they
    devour adventure books by authors like Enid Blyton.
  travel: Robert Greene’s travel wish list includes a family trip to the Grand Canyon and a future visit to Disneyland Paris after their recent excitement from exploring San Diego’s seaside park and a weekend
    trip to Washington D.C.’s National Mall, and they dream of sailing along coastal cliffs someday.
  culinary: Robert Greene prefers pepperoni pizza, spaghetti with marinara sauce, and homemade chocolate chip cookies, proudly helps stir batter for weekend bake‑offs, but they tend to overindulge in sugary
    cereal before school.
  core: Robert Greene is a highly organized, curiosity‑driven 7‑year‑old who balances disciplined LEGO engineering with spirited soccer, piano practice, and a love for adventure stories, often juggling
    their allowance and allergies with a charmingly assertive yet cooperative spirit, and they approach each day with boundless enthusiasm.
background:
  cultural: Robert is raised in a traditional Southern family in Kingsland, Georgia, a small coastal community in Camden County. His family attends a local Methodist church, where hospitality, community
    service, and respect for elders are emphasized. He experiences Southern customs such as family barbecues, holiday parades, and listening to country and classic rock music at home. The proximity to the
    Atlantic coast encourages outdoor activities like beach trips, fishing, and nature hikes, fostering his love for exploring the natural world. The close‑knit school environment and local sports culture
    reinforce his sociable, cooperative nature while also teaching him the importance of self‑reliance and personal achievement.
