  career_goals: Robert already envisions future careers that align with his curiosity and disciplined habits. He aspires to become an astronaut, fascinated by space and eager to conduct experiments beyond
    Earth. He also imagines designing bridges or rockets as a civil/aerospace engineer, where his practical building skills and organizational mindset would shine. Additionally, he hopes one day to be a
    teacher who can share his love of learning and help classmates achieve high standards.
