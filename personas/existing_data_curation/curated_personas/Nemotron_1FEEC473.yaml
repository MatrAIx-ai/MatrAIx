  career_goals: She aims to become a senior claims manager within the next three years, overseeing a regional team and shaping best‑practice procedures. To support that trajectory, she plans to earn the
    Associate in Claims (AIC) designation and the Chartered Property Casualty Underwriter (CPCU) certification. Daniella also hopes to spearhead the integration of emerging technologies—such as AI‑driven
    fraud detection and mobile inspection tools—into her department, balancing her curiosity for innovation with the practical need for efficiency. In the longer term, she envisions moving into a training
    and mentorship role, helping new adjusters develop both technical competence and the interpersonal acumen she values.
