personas:
  professional: Daniella Moreno leverages her five years of insurance claims adjusting, bilingual fluency, and a curiosity for emerging tech to streamline investigations using Xactimate, ClaimCenter, and
    AI‑driven fraud detection tools, while maintaining meticulous regulatory compliance and a collaborative yet assertively negotiated settlement process.
  sports: Daniella Moreno spends Saturdays hiking the Watchung Reservation with the local Trailblazers Hiking Club, follows the New York Giants and New York Knicks for seasonal thrills, and engages in salsa‑fit
    workouts at her yoga studio, balancing competitive spirit with her sociable love of group activities.
  arts: Daniella Moreno lights up karaoke nights performing hits by Selena and Shakira, enjoys Latin jazz concerts featuring Tito Puente and Buena Vista Social Club, and devours psychological thrillers
    by Gillian Flynn, channeling her talkative energy into both performance and analytical reading.
  travel: Daniella Moreno’s travel itinerary mixes careful budgeting with spontaneous exploration, having savored fresh ceviche on Lima’s waterfront, trekked the Inca Trail to Machu Picchu, and toured Napa’s
    vineyards, while she dreams of solo trekking Patagonia’s glaciers and attending Barcelona’s La Mercè festival.
  culinary: Daniella Moreno cooks at an advanced level, perfecting ceviche with ají amarillo, lomo saltado enhanced by a splash of red wine, and comforting ají de gallina, while also experimenting with
    Japanese ramen broth, though she often leaves the kitchen a mess after lively dinner parties.
  core: Daniella Moreno blends analytical precision with sociable flair, turning stress into salsa‑filled evenings, meticulous spreadsheets, and a relentless pursuit of both career advancement and flavorful
    Peruvian cuisine.
background:
  cultural: Daniella is a first‑generation Peruvian‑American. Her parents immigrated from Lima in the early 1990s, and she grew up in a bilingual household in New Jersey. She celebrates Peruvian holidays
    such as Día de la Independencia (July 28) and the Día de la Canción Criolla, and she stays connected to the local Peruvian community through the Asociación Peruana de NJ. Her cultural identity shapes
    her values of family, community, and respect for tradition, while also influencing her love for vibrant music, dance, and cuisine. Fluent in Spanish and English, she often serves as a cultural liaison
    at work, helping claimants from Latin America navigate the claims process.
attributes:
  skills: '["Claims investigation", "Loss assessment", "Negotiation and settlement", "Insurance policy interpretation", "Report writing", "Data analysis", "Bilingual Spanish-English communication", "Conflict
