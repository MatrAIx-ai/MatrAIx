  career_goals: For the next several years Nilay aims to complete his high-school equivalency, enroll in a computer-science or engineering program, and ultimately become a software engineer focused on creating
    practical educational tools. He envisions designing apps that help students, especially those from immigrant backgrounds, access STEM resources. In the longer term he hopes to launch a community-based
    nonprofit that offers free coding workshops for youth in Clark County, combining his technical curiosity with his desire to give back. He also keeps an open pathway to civil engineering, drawn by his
    interest in building sustainable infrastructure.
