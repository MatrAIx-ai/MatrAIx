personas:
  professional: Nilay Mahmood, an aspiring software engineer, channels their proficiency in Python, data analysis, and robotics along with a meticulously organized, calm, and collaborative demeanor to prototype
    educational apps that empower immigrant‑background students.
  sports: Nilay Mahmood enjoys playing midfield for the Vancouver Youth Soccer Club during the fall season, follows the Seattle Sounders FC for MLS excitement, and balances competitive activity with weekly
    hikes along the Columbia River Gorge to maintain overall fitness.
  arts: Nilay Mahmood channels creative energy into intricate LEGO builds while regularly listening to sitar virtuoso Ravi Shankar, Bollywood star Priyanka Chopra’s film soundtracks, and indie pop artist
    Billie Eilish, shaping a multicultural artistic palate that informs both leisure and study.
  travel: Nilay Mahmood prefers meticulously planned trips, using spreadsheets to budget each leg of a journey; they have visited Delhi to connect with extended family, spent a weekend exploring Portland’s
    food scene, and aspire to explore Kyoto’s temples, balancing cultural immersion with cost‑effective travel.
  culinary: Nilay Mahmood enjoys cooking aromatic chicken biryani with basmati rice, cumin, and saffron, alongside mastering homemade paneer tikka, and occasionally experiments with sushi rolls and sourdough
    pizza, displaying a moderate cooking skill set that blends family recipes with global flavors.
  core: Nilay Mahmood, a calm and methodical teen, balances relentless curiosity with structured planning, yet sometimes binge‑watches coding tutorials late into the night, forgetting to take breaks.
background:
  cultural: Nilay comes from a South Asian immigrant family originally hailing from the Indian subcontinent, with his parents speaking Gujarati and Hindi at home. The household observes festivals such as
    Diwali, Holi, and Eid, reflecting a blend of cultural and religious traditions. Growing up in Vancouver, WA, Nilay participates in local South Asian community events, attends language classes, and helps
    with family gatherings that emphasize respect for elders, collective responsibility, and the importance of education. This multicultural upbringing has given him fluency in English and conversational
    abilities in Gujarati, as well as a deep appreciation for both his heritage and the broader American society.
