  hobbies: '[''Photography'', ''Acoustic guitar and songwriting'', ''Community theater attendance'', ''Blues festival participation'', ''Reading mystery novels'', ''Art‑history reading'', ''Gardening'',
    ''Volunteering at the library'', ''Organizing art workshops for children'']'
  career_goals: Hunter hopes to move into a supervisory or training role within his call center, where he can mentor new representatives and design customer‑service workshops that emphasize empathy and
    creative problem‑solving. He plans to complete an associate degree in communications to formalize his knowledge and eventually transition into a community outreach position at a local cultural organization
    or library, blending his love for art with his people‑skills. He also aims to develop better stress‑management habits and more structured work routines to improve his wellbeing and work‑life balance.
