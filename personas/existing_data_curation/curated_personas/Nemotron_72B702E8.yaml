  hobbies: '[''Reading personal‑development books'', ''Listening to supply‑chain podcasts'', ''Cooking Southern comfort food'', ''Gardening'', ''Yoga'', ''Journaling'', ''Volunteering at food pantry'',
    ''Attending small church gatherings'', ''Listening to R&B and gospel music'']'
  career_goals: Asia aims to transition from front‑line stocking to a supervisory or analytical role within the supply‑chain field. She plans to complete her associate’s degree in logistics and eventually
    earn a bachelor’s in supply‑chain management. Her short‑term goal is to become a lead stocker or inventory coordinator, where she can mentor new employees and implement efficiency projects. Long‑term,
    she aspires to become a warehouse supervisor or logistics analyst, overseeing regional inventory and using data‑driven strategies to reduce waste. Additionally, she hopes to develop a small e‑commerce
    side business that sells locally sourced Southern crafts, leveraging her logistical skills while creating a flexible income stream that accommodates her need for a low‑stress work environment.
