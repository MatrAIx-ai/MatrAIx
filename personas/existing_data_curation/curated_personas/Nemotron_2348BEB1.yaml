  hobbies: '[''Gardening'', ''Walking/hiking'', ''Volunteer storytime and STEM workshops at the library'', ''Cooking'', ''Board games'', ''Reading historical fiction'', ''Knitting'', ''Community theater'']'
  career_goals: Camille aims to transition into a leadership role within early childhood services, aspiring to become a center director or program coordinator for a community‑based preschool. She envisions
    expanding the use of structured STEM activities for young learners, securing grant funding to support affordable, high‑quality care, and establishing a mentorship program that prepares the next generation
    of childcare professionals. Over the next five years, she hopes to lead a small, family‑friendly early learning hub in Lincoln that integrates her organizational strengths with her passion for collaborative,
    hands‑on learning.
