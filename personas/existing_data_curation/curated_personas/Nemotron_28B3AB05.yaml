  hobbies: '[''Sketching and drawing'', ''Street-art exploration'', ''Digital collage and image editing'', ''Visiting independent galleries'', ''Attending open-mic and performance events'', ''Listening
    to indie/experimental music'', ''Reading graphic novels'', ''Playing strategy board games'', ''Urban photography'', ''Journaling and mindfulness'']'
  career_goals: Anthony aims to turn his artistic passion into a sustainable career. He plans to earn his GED within the next year and enroll in a community‑college certificate program in graphic design
    or visual arts. He hopes to secure an apprenticeship with a local street‑art collective or a community center that offers art workshops, where he can both refine his craft and mentor younger participants.
    Long‑term, he envisions opening a small studio space in Brooklyn that serves as a collaborative hub for creatives, allowing him to blend his love for art, organization, and community engagement while
    maintaining flexibility in his work style.
