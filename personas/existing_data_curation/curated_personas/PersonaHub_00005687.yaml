persona_description: A researcher or geologist specializing in the study of shale formations, particularly those in Alberta, and their potential for oil and gas extraction. They are aware of the current
  economic environment and the need for data and information on shale gas resources. They have a deep understanding of the Duvernay, Montney, Muskwa, and Nordegg formations and have experience with companies
  such as Encana Corp. and Talisman Energy Inc. in these regions. They are familiar with the recent development of shale formations such as the Montney and Duvernay, and are aware of the heated debate surrounding
  the extraction techniques used in these regions.
