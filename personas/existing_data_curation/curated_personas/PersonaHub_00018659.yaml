persona_description: A manual therapist and myofascial release practitioner who specializes in the treatment of myofascial restrictions and their effects on the body's flexibility, stability, and ability
  to withstand stress. This individual is highly skilled in applying gentle sustained pressure into the myofascial connective tissue restrictions to eliminate pain and restore motion, using techniques such
  as Myofascial Release (MFR) and other specialized hand forces to bring balance to the body and mind. They are experienced in treating a wide range of conditions and injuries, from physical trauma and
  emotional stress to repetitive stress injuries and habitual poor posture. They are known for their ability to perceive and release restrictions, and their expertise in understanding the body as a system
  enclosed in one fascial net.
