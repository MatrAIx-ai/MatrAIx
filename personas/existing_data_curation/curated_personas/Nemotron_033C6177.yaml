personas:
  professional: Anna McDaniel, a 29‑year‑old registered nurse renowned for meticulous patient assessments, Epic‑driven documentation, and proactive wound‑care interventions, they channel their curiosity
    and love of art into leading quality‑improvement projects and are charting a path toward a nurse‑manager role that will embed interdisciplinary art‑therapy programs for chronic‑illness patients.
  sports: Anna McDaniel fuels her fitness regimen with thrice‑weekly yoga at the downtown studio, weekend hikes with the Sierra Foothills Trail Runners, and lively salsa sessions at the community center,
    while they cheer on the Sacramento Kings and Sacramento Republic FC as part of their dedicated local sports fandom.
  arts: Anna McDaniel, an avid acrylic painter of rolling Central Valley fields, channels the bold colors of Frida Kahlo and the spontaneous splatters of Jackson Pollock into weekend canvases, often spending
    Saturday afternoons at the Fresno Art Museum and secretly binge‑listening to Celia Cruz’s salsa hits during late‑night studio sessions, and they often stay up past their bedtime.
  travel: Anna McDaniel prefers thoughtfully planned getaways that blend artistic inspiration with outdoor adventure, such as weekend hikes in Yosemite, a yoga retreat in Sedona, and a cultural art tour
    of Barcelona’s Gothic Quarter, while they budget these trips through a shared travel fund and often postpone far‑flung journeys to the Amalfi Coast until after completing their BSN.
  culinary: Anna McDaniel, a confident home chef, regularly prepares Mediterranean dishes like roasted eggplant mezze with tahini, lemon‑herb grilled salmon, and vibrant lentil tabbouleh, while they occasionally
    treat friends to homemade baklava spiced with pistachios and rose water at neighborhood potlucks.
  core: Anna McDaniel, a detail‑driven nurse who worries about every shift yet thrives on late‑night acrylic splashes, they transform stress into creative flash‑fires that fuel their vision of holistic
    health and community art‑therapy.
background:
  cultural: Anna is a non‑Hispanic white woman who grew up in a small agricultural town in the Midwest before her family relocated to Turlock, California during her teenage years. The transition exposed
    her to the multicultural farming community of Merced County, where she developed an appreciation for the region’s deep agricultural roots and the diverse traditions of her neighbors, especially the
    vibrant Hispanic culture that surrounds her daily life. While she maintains the practical, community‑oriented values of her Midwestern upbringing—self‑reliance, hard work, and a strong sense of neighborliness—she
    also embraces the progressive, artistic, and inclusive atmosphere of the Central Valley. This blend of backgrounds informs her worldview, making her both grounded in tradition and eager to explore new
    ideas and experiences.
attributes:
  skills: '[''Patient assessment and triage'', ''Vital signs monitoring'', ''Medication administration (IV and PO)'', ''Wound care and dressing changes'', ''Patient education and health promotion'', ''Electronic
