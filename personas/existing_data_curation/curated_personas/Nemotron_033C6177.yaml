    certification'', ''Mental health first aid'', ''Community health outreach'']'
  hobbies: '[''Acrylic painting'', ''Visiting art galleries'', ''Salsa dancing'', ''Hiking in the Sierra foothills'', ''Community garden volunteering'', ''Cooking Mediterranean meals'', ''Reading contemporary
    fiction and science non‑fiction'', ''Listening to healthcare and neuroscience podcasts'', ''Yoga and mindfulness meditation'', ''Participating in a local book club'']'
  career_goals: Anna aims to advance her nursing career by first completing a BSN program within the next two years, followed by an MSN with a focus on nursing administration or clinical education. She
    aspires to become a nurse manager at the regional hospital, where she can lead quality‑improvement initiatives and develop an interdisciplinary art‑therapy program for patients coping with chronic illness
    and stress. Long‑term, Anna envisions moving into healthcare administration to shape policies that improve patient safety and integrate holistic, creativity‑based interventions into standard care. She
    also hopes to obtain certification as a Nurse Executive and to mentor new nurses, fostering a supportive and collaborative work environment.
