    writing'']'
  career_goals: He aims to complete high school, earn a scholarship for an art-focused program, and pursue a degree in game design or visual communication. Triton aspires to become a concept artist for
    video games or an animator, blending his love for art and technology. In the longer term, he hopes to launch his own indie game studio that creates narrative‑driven experiences, while also mentoring
    younger artists in his community.
