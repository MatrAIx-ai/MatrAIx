personas:
  professional: Triton Vazquez, a self‑taught visual artist and budding game designer, leverages their meticulous time‑management and curiosity to produce polished concept sketches and prototype interactive
    art pieces, using Procreate, Photoshop, and Python scripts, all while methodically planning each school project as a stepping stone toward an indie studio.
  sports: Triton Vazquez enjoys weekend hikes on nearby nature trails and runs on the high school cross‑country team, cheers for the Los Angeles Lakers in basketball, follows FC Barcelona in soccer, and
    belongs to a local outdoor climbing club that meets monthly.
  arts: Triton Vazquez frequently visits contemporary galleries, studies the line work of Hayao Miyazaki and the vibrant color palettes of Studio Ghibli, listens to indie folk artist Bon Iver and ambient
    composer Brian Eno, and draws inspiration from digital illustrators Loish and Ross Tran.
  travel: Triton Vazquez prefers meticulously planned road trips that blend natural scenery with artistic inspiration, having trekked the Oregon Coast Trail, explored Barcelona’s museums, and dreaming of
    a spring pilgrimage to Kyoto’s historic temples, all while balancing a modest teen budget and school responsibilities.
  culinary: Triton Vazquez, an aspiring home cook, favors simple yet flavorful dishes like avocado toast with radish slices, homemade pasta with basil pesto, and occasional matcha‑infused desserts, but
    they often forget to finish the vegetables on the chopping board, resulting in a growing pile of wasted greens.
  core: Triton Vazquez is a curiosity‑driven, organized teen who blends art, code, and music into disciplined yet playful indie game creation, while juggling occasional impulsive spending and a lingering
    battle with teenage acne.
background:
  cultural: Triton grew up in Owasso, a suburb of Tulsa, Oklahoma, immersed in Midwestern values such as community involvement, self‑reliance, and a strong work ethic. While his family is predominantly
    of white Midwestern ancestry, the surname Vazquez reflects a Hispanic lineage that brings occasional Spanish traditions, like celebrating Día de los Muertos with family. This blend of cultural influences
    gives him a broad perspective that values both local community ties and an appreciation for diverse artistic expressions.
