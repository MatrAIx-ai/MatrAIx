personas:
  professional: Kareem Jones, a retired casino operations analyst turned community archivist, merges their data‑analysis acumen and graphic design training to meticulously plan oral‑history recording sessions,
    curate traveling photography exhibitions of Las Vegas's hidden murals, and lead structured digital‑storytelling workshops for youth, always demanding that each project exceed the last in impact and
    precision.
  sports: Kareem Jones follows the Vegas Golden Knights with weekly game viewings, attends Raiders home games during the season, participates in a senior pickleball league at the community center on Wednesday
    mornings, and occasionally plays a relaxed round of golf at the Sun City Golf Club where they keep score against fellow retirees.
  arts: Kareem Jones, an avid photography enthusiast, draws inspiration from jazz legends like Miles Davis and visual artists such as Kehinde Wiley, frequently visits the Neon Museum, Bellagio Gallery,
    and local street‑art tours to capture neon‑lit alleyways, and they curate monthly pop‑up exhibitions featuring their own analog prints alongside works by emerging regional painters like Elisa Ramos.
  travel: Kareem Jones prefers carefully planned trips that blend cultural immersion with comfortable accommodations, having revisited historic Southern cities like New Orleans and Memphis to explore gospel
    music roots, while also touring European art capitals such as Paris and Florence, and they dream of a future pilgrimage to the UNESCO‑listed historic district of Savannah.
  culinary: Kareem Jones enjoys cooking Southern‑influenced comfort food with a modern twist, perfecting dishes like smoked collard greens with quinoa, sweet‑potato pie spiced with ginger and cardamom,
    and shrimp‑and‑grits risotto, often using ingredients such as smoked paprika, fresh okra, and homemade hot sauce, and they regularly dine at the renowned Lotus of Siam for its authentic Thai balance
    to their palate.
  core: Kareem Jones blends a lifelong curiosity for art and history with disciplined organization, competitive drive, and a steady optimism that keeps them actively preserving community memories while
    indulging in occasional camera‑gear splurges and late‑night jazz records.
background:
  cultural: Kareem is a Black American who grew up in the post-civil-rights era, witnessing the transformation of West Las Vegas from a vibrant, segregated enclave into a diverse cultural hub. His parents
    migrated from the Deep South during the Great Migration, bringing traditions of gospel music, Southern cooking, and community solidarity. These influences shaped his deep appreciation for jazz, blues,
    and African-American storytelling. Though never married, he maintains strong ties to extended family and local churches, where he participates in cultural festivals and heritage celebrations. His life
    experience—navigating systemic challenges while thriving in a city driven by entertainment—infuses his perspective with both skepticism toward institutions and a competitive desire to excel, all tempered
    by a stable, resilient emotional outlook.
attributes:
  skills: '[''Project budgeting'', ''Scheduling'', ''Graphic design basics'', ''Data analysis'', ''Operational logistics'', ''Archival research'', ''Digital photography'', ''Analog photography'', ''Art
    curation'', ''Mentoring'', ''Event planning'', ''Record-keeping'']'
  hobbies: '[''Museum visits'', ''Gallery tours'', ''Street-art exploration'', ''Digital photography'', ''Film photography'', ''Reading historical non-fiction'', ''Bridge'', ''Chess'', ''Succulent gardening'',
    ''Cooking experimental recipes'', ''Volunteer art-therapy workshops'']'
  career_goals: Although no longer in the formal workforce, Kareem's primary ambition is to create a lasting cultural legacy for the Black community of Las Vegas. He plans to launch a community oral-history
    archive that records stories of long-time residents, curate a traveling photography exhibit that highlights the city's hidden artistic gems, and develop a mentorship program for high school students
    interested in visual media. He also aims to write a memoir intertwining his personal experiences with the broader civil rights evolution in Nevada, and eventually establish a nonprofit focused on preserving
    African-American heritage sites in the region.
