  career_goals: Looking ahead, Joseph imagines a future where he can combine his love of the ocean, his knack for technology, and his desire to help others. He hopes to study marine biology or environmental
    engineering in high school and beyond, with the ultimate goal of working on coastal conservation projects that involve community education and hands‑on data collection. In the short term he plans to
    deepen his coding skills, earn a junior lifeguard certification, and take part in his school’s science and robotics clubs. He also dreams of one day leading beach‑clean‑up initiatives or volunteer programs
    that bring his peers together for environmental stewardship.
