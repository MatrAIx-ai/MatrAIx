personas:
  professional: Chandler Soto, a budding Lego architect, channels their love for step‑by‑step construction into designing custom playsets, honing spatial reasoning and project planning skills that foreshadow
    a future career in engineering or design, while their organized yet adaptable mindset ensures they meet deadlines for school projects and club assignments.
  sports: Chandler Soto, a dedicated member of the neighborhood youth soccer club Eastside Strikers, practices on Tuesdays and Thursdays, idolizes professional forwards like Lionel Messi, follows the local
    high‑school varsity team the Riverdale Raptors, cheers for the national women’s soccer team during the World Cup, and they balance team drills with personal fitness routines that include weekend bike
    rides, favoring the structured schedule that echoes their routine‑loving nature.
  arts: Chandler Soto, an avid fan of graphic novels such as "Bone" and "Amulet", enjoys drawing their own comic panels, listens to norteño star Los Tigres del Norte and banda group Banda el Recodo while
    cooking, and they spend evenings watching animated films by Studio Ghibli, letting these visual and musical influences shape their creative storytelling.
  travel: Chandler Soto, an imaginative traveler who prefers organized trips, has explored the nearby desert park with a guided hike, visited the historic city of San Antonio during a family vacation, and
    they dream of a future road trip along the Pacific Coast Highway to see the iconic redwood forests, favoring itineraries that mix scheduled activities with a few spontaneous stops.
  culinary: Chandler Soto, a kitchen assistant who loves helping family prepare tacos al pastor and tamales, knows how to season meat with cumin and pineapple, can roll tortillas by hand, and they often
    forget to wash their hands before cooking, reflecting their focus on the task at hand over minor hygiene steps.
  core: Chandler Soto, a calm, routine‑loving twelve‑year‑old who blends structured Lego building, soccer teamwork, and regional music into a balanced life, while they occasionally procrastinate on chores
    and overlook small details.
background:
  cultural: Chandler grew up in a Mexican‑American household in Weslaco, Texas, a city on the U.S.–Mexico border. His family maintains strong ties to Mexican traditions, celebrating holidays such as Día
    de los Muertos, Cinco de Mayo, and festive quinceañeras. Spanish is spoken at home, and he participates in community events at the local Catholic church and neighborhood festivals, which reinforce a
    sense of collectivism and respect for elders. The blend of Mexican cultural values with Texan influences shapes his worldview, fostering a deep appreciation for family, community service, and the practical
    work ethic common in border towns. This cultural foundation informs his bilingual communication skills, culinary interests, and his commitment to contributing positively to his community.
