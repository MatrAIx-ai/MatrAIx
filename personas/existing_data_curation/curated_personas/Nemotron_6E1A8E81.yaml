  career_goals: Chandler envisions a career that blends stability, hands‑on problem solving, and a clear progression path. He is drawn to the automotive trade, aiming to become a certified mechanic who
    can diagnose and repair vehicles reliably. Over the long term, he hopes to open his own small auto‑repair shop, providing dependable service to his community while maintaining a routine work schedule
    that aligns with his practical nature. He also expresses interest in technical training programs that could lead to roles in civil engineering or infrastructure maintenance, allowing him to contribute
    to the development of his hometown of Weslaco. His ambition is rooted in the desire to support his family and become a respected, steady presence in his neighborhood.
