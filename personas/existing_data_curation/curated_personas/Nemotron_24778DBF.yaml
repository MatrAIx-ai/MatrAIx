personas:
  professional: A seasoned facilities maintenance specialist, Thomas Lewis leverages four decades of expertise in commercial cleaning, OSHA compliance, and equipment repair, while channeling their imaginative
    flair into illustrated training manuals and green‑cleaning initiatives, demonstrating they value organized, methodical consistency in every task.
  sports: An avid supporter of the Atlanta Falcons, Atlanta Hawks, and Atlanta Braves, Thomas Lewis participates in the Atlanta Senior Fitness Club’s morning walking group and plays casual senior tennis
    on weekends, finding they stay active and manage osteoarthritis through these low‑impact activities alongside their gardening routine.
  arts: A dedicated watercolorist and jazz aficionado, Thomas Lewis finds inspiration in the abstract compositions of Kandinsky and the improvisational brilliance of Miles Davis, and they harness that creative
    energy during sketch sessions while regularly listening to Billie Holiday, John Coltrane, and Mahalia Jackson, and attending monthly performances at the local jazz lounge.
  travel: A curious explorer with a penchant for historically rich trips, Thomas Lewis has visited Washington, D.C.’s National Museum of African American History and Culture, soaked in the musical heritage
    of New Orleans’ French Quarter, and they aim to visit the botanical gardens of Kyoto and the jazz festivals of Montreal, always arranging travel around senior discounts and modest budgeting.
  culinary: A modest home cook with a green thumb, Thomas Lewis enjoys preparing collard greens seasoned with smoked turkey and apple cider vinegar, gumbo featuring okra and andouille sausage, and fresh
    herb‑infused vegetable stir‑fry, using ingredients harvested from his community garden and occasionally experimenting with complex watercolor‑inspired plating, and they sometimes serve the meals on
    hand‑painted plates.
  core: Thomas Lewis blends disciplined craftsmanship in facilities management with an ever‑curious artistic soul, spending evenings solving chess puzzles, splashing watercolor on canvas, and championing
    sustainable cleaning practices, while they occasionally forget to water their garden plants during a busy week.
background:
  cultural: Thomas is a third‑generation African‑American Texan whose family roots trace back to the Great Migration era. Growing up in Livingston, he was immersed in the rich traditions of Southern Black
    culture—church gatherings, gospel music, community barbecues, and storytelling. The church has been a cornerstone of his social life, shaping his values of cooperation, humility, and service. He celebrates
    family milestones with soul‑food dishes passed down through generations and participates in local Juneteenth commemorations, which honor the history and resilience of the Black community in East Texas.
    His cultural identity informs his strong sense of community, respect for elders, and commitment to uplifting others.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care and polishing'', ''Carpet and upholstery cleaning'', ''Safety and OSHA compliance'', ''Inventory management'', ''Equipment maintenance and repair'', ''Basic
    plumbing and electrical troubleshooting'', ''Process optimization and scheduling'', ''Staff training and mentorship'', ''Instructional illustration and visual communication'']'
  hobbies: '[''Watercolor painting'', ''Sketching and abstract art'', ''Reading science-fiction and African-American history'', ''Playing chess'', ''Listening to jazz, blues, and gospel music'', ''Community
    gardening'', ''DIY woodworking'', ''Volunteering in youth mentorship programs'', ''Learning basic computer skills'', ''Exploring sustainable and green cleaning concepts'']'
  career_goals: Thomas aims to move into a part‑time supervisory or training position where he can pass on his decades of cleaning expertise to the next generation of custodial staff. He plans to obtain
    a green‑cleaning certification to champion environmentally friendly practices in the facilities he serves. In parallel, he hopes to compile a handbook of efficient cleaning methods and illustrated guides,
    and to occasionally offer his services to seniors in his community on a freelance basis. Long‑term, Thomas envisions volunteering as a mentor in a local youth program, using his organized approach and
    imagination to inspire curiosity and responsibility in young people.
