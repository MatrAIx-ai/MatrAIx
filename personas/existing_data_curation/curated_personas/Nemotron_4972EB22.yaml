personas:
  professional: Shelia Jones, a 57‑year‑old financial manager in Atlanta, blends strategic planning, GAAP and IFRS reporting, and data‑driven risk mitigation with a creative problem‑solving flair nurtured
    by her love of art, enabling her to mentor emerging talent—especially women and professionals from underrepresented backgrounds—while championing inclusive, sustainable finance initiatives.
  sports: Shelia Jones follows the Atlanta Falcons, Hawks, and Braves avidly, participates in the local Atlanta Running Club’s weekend 5‑k runs, practices yoga at a boutique studio, and plays recreational
    tennis at the Brookfield Tennis Center each spring despite battling occasional joint stiffness.
  arts: Shelia Jones curates a personal collection of contemporary photography, paints watercolors of Atlanta’s skyline, and regularly attends live performances by jazz luminaries like Kamasi Washington,
    soul legends such as Etta James, and visual art exhibitions featuring artists like Georgia O’Keeffe and Mark Rothko, all of which deepen her appreciation for creative expression.
  travel: Shelia Jones enjoys culturally immersive trips, having explored New Orleans’ music scene, Harlem’s historic museums, and the culinary markets of Savannah, while she dreams of a pilgrimage to Senegal’s
    Goree Island and a leisurely weekend in Paris’s Montmartre district, usually planning itineraries around community‑center workshops she leads.
  culinary: Shelia Jones delights in cooking Southern classics like shrimp‑and‑grits and collard greens, infusing experimental twists with smoked paprika, pickled watermelon rind, and curry‑spiced okra,
    and she often hosts dinner parties where she pairs these dishes with homemade bourbon‑infused peach chutney.
  core: Shelia Jones balances spreadsheets and paintbrushes, channels chronic worry into meticulous financial planning, and steadies her stress with yoga, even if she sometimes over‑commits to community
    workshops and forgets to pause.
background:
  cultural: Shelia was born and raised in Atlanta, Georgia, in a close‑knit African‑American family that emphasized education, community service, and cultural pride. Growing up during the post‑civil‑rights
    era, she experienced the city’s vibrant Black cultural renaissance, attending church gatherings rich with gospel music and participating in local festivals that celebrated African‑American heritage.
    Her grandparents shared stories of the Southern struggle and resilience, shaping her values of perseverance and collective uplift. Shelia earned her bachelor’s degree in business from a historically
    Black university, which deepened her connection to Black intellectual traditions. Today, she remains engaged with the Atlanta Black community through mentorship, church activities, and advocacy for
    financial empowerment, while also cherishing Southern culinary traditions and the city’s artistic pulse.
attributes:
  skills: '["Strategic Financial Planning", "Budget Development", "Financial Reporting", "Risk Management", "Investment Evaluation", "Cash Flow Forecasting", "Team Leadership", "Cross‑functional Collaboration",
    "Data Analytics (Excel, Power BI, Tableau)", "Change Management", "Regulatory Compliance", "Negotiation", "Creative Problem Solving", "Financial Literacy Program Development"]'
  hobbies: '["Art Museum Visits", "African‑American Art Collecting", "Watercolor Painting", "Reading Contemporary Fiction", "Live Jazz and Soul Music", "Cultural Travel", "Experimental Southern Cooking",
    "Yoga and Meditation", "Financial Literacy Volunteering", "Diverse Book Club"]'
  career_goals: Over the next five years, Shelia aims to step into a Chief Financial Officer role where she can shape enterprise-wide financial strategy, strengthen risk controls, and embed inclusive, sustainable
    practices across the organization. She envisions leveraging her analytical acumen to drive profitable growth while championing diversity and equitable hiring within finance functions. Parallel to her
    executive ambition, Shelia wants to formalize a mentorship program for women and Black professionals in the industry, and ultimately serve on the board of a nonprofit arts organization, merging her
    financial expertise with her passion for cultural advocacy. To safeguard her well‑being, she plans to implement structured stress‑management frameworks that balance high‑impact responsibilities with
    personal resilience.
