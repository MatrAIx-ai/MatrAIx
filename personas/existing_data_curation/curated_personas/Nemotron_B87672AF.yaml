    fairs and farmers markets", "Online personal development courses"]'
  career_goals: Howard aims to advance into a senior administrative role, such as Office Manager or Administrative Coordinator, ideally within a K‑12 school district or community college where his education
    background can add value. He plans to earn the Certified Administrative Professional (CAP) credential and subsequently pursue a master's degree in Educational Administration to qualify for leadership
    positions like Director of Operations. Alongside career progression, he seeks to mentor junior administrative staff, implement efficiency‑focused workflow improvements, and maintain a balanced schedule
    that preserves his personal well‑being.
