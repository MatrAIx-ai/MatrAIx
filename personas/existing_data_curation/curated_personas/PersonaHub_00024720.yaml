persona_description: A political theorist who specializes in the study of conservative political ideologies, particularly those related to the weighty and substantial aspect of human life and behaviour,
  and how they attain a certain level of cogency, seriousness, cohesion, and importance. The individual is a staunch advocate of the non-discrimination of conservative applicants for positions on EHRC bodies
  of governance, and believes that conservatism is a theo-political creed worthy of the same respected and protected status as veganism and vegetarianism. They are concerned with the distinction between
  the engineering of equality and the fostering of it organically in society through education and moral inculcation, and are of the opinion that the latter would be a more conservative approach. The individual
  is also interested in the non-belief in a god and the belief that liberalism is antithetical to conservatism because of the consequent emphasis on individual autonomy and the rights of man.
