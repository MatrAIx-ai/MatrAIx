  hobbies: '[''Woodworking'', ''Vegetable Gardening'', ''Fishing'', ''Birdwatching'', ''Reading Historical Non‑Fiction'', ''Local History Research'', ''Community Volunteering'', ''Mentoring Youth'', ''Classic
    Rock Music'']'
  career_goals: Although retired from formal employment, Michael aims to leave a lasting positive impact on his community. He plans to establish a modest scholarship fund for local high school students
    pursuing vocational or trade education, author a memoir that chronicles his family's French‑Canadian heritage and the history of Columbiaville, and serve on the board of the town's senior center to
    improve programming for older adults. Maintaining his health to stay active and continue mentoring younger generations are also central to his aspirations.
