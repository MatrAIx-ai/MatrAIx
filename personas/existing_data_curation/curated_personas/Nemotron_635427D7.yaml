  hobbies: '["Raspberry Pi and Arduino projects", "woodworking", "gardening", "hiking local trails", "attending Wichita State Shockers games", "reading popular science magazines", "playing acoustic guitar",
    "volunteering at food bank", "organizing tech demos at county fair"]'
  career_goals: Fredrick aims to transition from floor sales to a leadership role within the next three years, targeting a store‑manager position that lets him shape merchandising strategy and staff development.
    He plans to earn a Certified Retail Management Professional (CRMP) credential and to refine his data‑driven decision‑making skills. Long‑term, he envisions opening a specialty boutique that blends his
    love of technology with hands‑on repair services, providing a community hub where customers can learn and tinker. He also hopes to mentor younger employees, fostering a culture of curiosity balanced
    with practical results.
