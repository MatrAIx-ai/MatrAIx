personas:
  professional: Fredrick Baptista is a veteran retail electronics specialist who blends deep product knowledge with a consultative sales approach, using his knack for on‑the‑fly troubleshooting of gadgets
    and home‑automation hacks to keep the floor humming, while his competitive drive pushes him to mentor staff and chase performance metrics despite a desk that often looks like a friendly chaos of spare
    parts and spreadsheets.
  sports: Fredrick Baptista roots for the Wichita State Shockers and follows the Kansas City Royals, spends weekends hiking the Arkansas River Trail with the local Trailblazers Hiking Club, and fits in
    low‑impact gym sessions mainly to keep their back from the woodworking bench, preferring solitary cardio over team sports.
  arts: Fredrick Baptista strums an acoustic guitar at family gatherings, covering classics by John Denver and local folk band The Wichita Barnstormers, while they unwind with articles from Scientific American
    and attend community theater productions of 'Our Town', letting music and storytelling temper their competitive edge.
  travel: Fredrick Baptista prefers low‑key road trips that blend curiosity with practicality, having driven Route 66 to Albuquerque and taken a weekend getaway to the Texas Hill Country for a family barbecue,
    while dreaming of a future visit to the coastal town of Cascais to sample the famed pastel de nata he remembers from Easter celebrations, balancing travel costs with modest savings.
  culinary: Fredrick Baptista enjoys cooking modest yet flavorful meals, often whipping up skillet‑seared pork chops with garlic‑rosemary rub and a side of sautéed kale, and on special occasions they prepare
    a hearty caldo verde with chouriço, proving their kitchen skills are as hands‑on as their Raspberry‑Pi projects.
  core: Fredrick Baptista is a practical tinkerer whose competitive streak fuels a love for DIY tech and community mentorship, even if their home office resembles a cluttered workshop and their calendar
    is a perpetual work‑in‑progress.
background:
  cultural: 'Fredrick grew up in Wichita, Kansas, in a family that traces its roots to Portuguese immigrants who settled in the Midwest after World War II. He identifies with the Midwestern values of practicality,
    modesty, and community service, while also cherishing occasional Catholic traditions passed down by his grandparents, such as celebrating Easter with Portuguese dishes. The blend of his Portuguese heritage
    and the broader American Midwest culture shapes his worldview: he values hard work, embraces curiosity about new ideas, and prefers flexible, pragmatic solutions to challenges. He participates in local
    festivals, supports the regional agricultural fair, and enjoys the camaraderie of his neighborhood’s block parties.'
attributes:
  skills: '["consultative selling", "technical product knowledge", "POS system operation", "inventory management", "sales data analysis", "basic product troubleshooting", "customer service", "staff mentoring",
