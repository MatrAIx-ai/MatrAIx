  career_goals: Jacob aims to advance to a senior cleaning supervisor or facilities coordinator position within his current workplace, where he can lead a larger team, mentor younger staff, and implement
    efficiency improvements. He plans to obtain OSHA certification and additional training in facility management to enhance his expertise. Ultimately, he seeks to secure a stable retirement with a pension,
    ensuring continued financial support for his family while leaving a legacy of high standards for cleanliness and safety in his community.
