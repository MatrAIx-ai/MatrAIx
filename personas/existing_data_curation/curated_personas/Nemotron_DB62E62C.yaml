personas:
  professional: Ramiro Medina, a 30-year-old licensed chiropractor, blends meticulous spinal assessments with structured patient education, leverages their bilingual communication to coordinate holistic
    care teams, and methodically plans the launch of an integrative wellness clinic on the beachfront, while they maintain a precise clinic workflow.
  sports: Ramiro Medina rises before sunrise to surf the rolling breakers at Imperial Beach, joins the local San Diego Surf Club, hits the gym for functional training three times a week, avidly follows
    the San Diego Padres and LA Galaxy, and they integrate these sports into a balanced fitness routine.
  arts: Ramiro Medina captures sunrise over the Pacific with a mirrorless camera, draws artistic inspiration from Ansel Adams and Banksy, spends evenings listening to the soulful guitar work of Carlos Santana,
    and they use these creative outlets to unwind from a structured professional life.
  travel: Ramiro Medina prefers well-planned, active getaways, having hiked the coastal trail to La Jolla Cove, surfed the beaches of Costa Rica, dreaming of future retreats in Portugal’s Algarve cliffs,
    and they always schedule travel around clinic responsibilities.
  culinary: Ramiro Medina enjoys crafting authentic Mexican dishes like chiles en nogada and carne asada, experimenting with roasted tomatillo salsa and fresh corn masa, yet they admit a guilty pleasure
    for late-night fast-food tacos despite their health-focused lifestyle.
  core: Ramiro Medina balances a disciplined chiropractic career with early-morning surf sessions, meticulous financial planning, sunrise photography, and they occasionally indulge in fast-food tacos while
    overlooking routine dental care.
background:
  cultural: Ramiro is a first‑generation Mexican‑American who grew up in the vibrant border region of San Diego County. Bilingual in Spanish and English, he maintains close ties to his family's Mexican
    heritage, observing traditions such as Día de los Muertos, family reunions, and seasonal celebrations. The cultural emphasis on community support and respect (respeto) shaped his cooperative and considerate
    personality. He frequently engages with the local Mexican community in Imperial Beach, offering health workshops in both languages and participating in cultural events that celebrate his heritage while
    fostering cross‑cultural understanding.
attributes:
  skills: '["Spinal adjustment", "Joint mobilization", "Soft tissue therapy", "Postural assessment", "Patient education", "Bilingual communication (Spanish/English)", "Electronic health record management",
    "Clinic scheduling and documentation", "Team collaboration", "Basic business management"]'
  hobbies: '["Surfing", "Coastal trail hiking", "Weightlifting/Functional training", "Landscape photography", "Cooking traditional Mexican cuisine", "Reading health and self‑improvement books", "Volunteering
    at community health fairs", "Participating in local cultural festivals"]'
  career_goals: Ramiro aims to establish his own integrative wellness clinic in Imperial Beach that offers preventive chiropractic care, sports injury rehabilitation, and community health education. He
    plans to obtain board certification in sports chiropractic within the next three years and to develop outreach programs that provide low-cost spine health workshops for underserved Mexican-American
    families. Long‑term, he hopes to mentor aspiring chiropractors, expand his clinic's services to include functional movement training, and become a recognized advocate for holistic health in the San
    Diego coastal community.
