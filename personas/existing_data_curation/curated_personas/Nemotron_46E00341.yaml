  career_goals: Isabella dreams of combining her love for art and science by pursuing a future as a marine biologist or wildlife conservationist who creates visual storytelling to raise awareness about
    environmental issues. She also envisions herself as an art educator or museum curator, designing engaging exhibits that spark curiosity in other young minds. Her long‑term ambition is to make a positive
    impact on both the natural world and the community through interdisciplinary work.
