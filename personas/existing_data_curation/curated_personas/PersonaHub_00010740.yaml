persona_description: A neuroscientist and education researcher who specializes in the study of the brain and its role in learning and teaching. They are passionate about integrating neuroscience with teaching
  and have a keen interest in creating practical tools to help trainee teachers develop confidence in assessing and challenging neuromyths and misconceptions about learning sciences. They have a background
  in neuroscience and education and have experience in designing and evaluating educational materials. They are eager to share their research and findings with a wider audience and have a strong commitment
  to promoting the integration of neuroscience and teaching.
