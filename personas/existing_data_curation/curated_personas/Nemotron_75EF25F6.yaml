  hobbies: '[''Playing basketball'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Volunteering at food drives'', ''Hiking in the San Gabriel Mountains'', ''Streaming soccer matches'', ''Attending live
    music events'']'
  career_goals: Harry aims to move into supervisory roles within retail, targeting a shift supervisor position within the next year and a store manager role within three to five years. He plans to pursue
    a retail management certification at a community college and consider an associate's degree in business administration to broaden his strategic skills. Long‑term, he dreams of opening a small convenience
    store that reflects his cultural heritage and serves his Sylmar neighborhood, while also mentoring other young workers from similar backgrounds.
