  hobbies: '[''Building LEGO Technic and robotics kits'', ''Basic coding and game development'', ''Strategic video gaming (Chess, StarCraft, Civilization)'', ''Reading science-fiction and mystery novels'',
    ''Basketball practice and games'', ''Journaling and mindfulness exercises'']'
  career_goals: Samuel dreams of turning his curiosity for how things work into a career in engineering. He plans to attend a STEM-focused high school, deepen his robotics experience, and eventually pursue
    a bachelor's degree in aerospace or mechanical engineering, aiming to work on aircraft design or space exploration projects at NASA or a leading aerospace firm. Parallel to his technical ambitions,
    his competitive nature fuels a goal to become a varsity basketball player in high school and possibly earn a sports scholarship. He also hopes to develop a mobile app that helps middle-school students
    organize study schedules, combining his organizational talent with coding skills.
