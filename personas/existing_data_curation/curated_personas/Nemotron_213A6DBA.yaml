  career_goals: Alicia dreams of turning her passion for art and storytelling into a career that blends cultural heritage with modern media. She aims to pursue a Bachelor of Fine Arts with a focus on concept
    art and animation, while also taking courses in computer science to support interactive design. Long‑term, she envisions working as a concept artist or creative director for video games or animated
    films, creating characters and worlds that reflect Mexican cultural motifs. She also hopes to organize community mural projects and youth art workshops in the Inland Empire, keeping her professional
    path flexible enough to explore freelance opportunities and collaborative ventures.
