personas:
  professional: Alicia Lopezduran, a 15‑year‑old budding visual storyteller, merges sketching, digital painting on a tablet, and short‑form prose into a dynamic portfolio that she shares on TikTok while
    leveraging her improv experience to collaborate on school drama productions.
  sports: Alicia Lopezduran, an avid weekend hiker, trains with the school cross‑country team for hill workouts, cheers for the Los Angeles Lakers in basketball and the LA Galaxy in soccer, and volunteers
    with the San Bernardino Trail Guardians to maintain local hiking paths.
  arts: Alicia Lopezduran, a fervent creator, fills sketchbooks with whimsical characters inspired by indie musicians like Mitski and visual storytellers such as Hayao Miyazaki, experiments with digital
    brushwork on Procreate, and regularly performs spontaneous improv scenes with the high‑school drama troupe, all while curating quick behind‑the‑scenes TikTok reels of their artistic process.
  travel: Alicia Lopezduran favors spontaneous, nature‑focused trips, planning low‑budget weekend escapes to nearby spots like Joshua Tree and Lake Arrowhead, dreaming of a future backpacking adventure
    through Kyoto’s historic districts, and always packs a sketchpad to capture new landscapes on the fly.
  culinary: Alicia Lopezduran enjoys moderate cooking skill, often helping their family prepare tacos with seasoned pork, corn masa tortillas, diced cilantro, and lime‑scented aguas frescas, while also
    experimenting with a tamale‑inspired sushi roll that blends masa dough, avocado, and pickled radish for a fusion twist.
  core: Alicia Lopezduran is an energetic teen who fuses artistic imagination with spontaneous performance, juggling sketchbooks, gaming worlds, and impromptu hikes, all while occasionally misplacing deadlines
    and forgetting to charge their earbuds.
background:
  cultural: Alicia grew up in a Mexican‑American household in Ontario, California. Her parents emigrated from the state of Jalisco, and the family speaks both Spanish and English at home. She celebrates
    Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Día de la Independencia with vibrant community events that feature mariachi music, piñatas, and homemade cuisine. The blend of Chicano
    street art in the Inland Empire and mainstream American pop culture shapes her identity, and she often incorporates Mexican motifs and stories into her artwork. Family values like respect for elders,
    community service, and cultural pride are central to her life.
