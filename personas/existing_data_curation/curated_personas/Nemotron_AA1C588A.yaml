personas:
  professional: Mauricio Gildemontes is a hands‑on tech enthusiast who leverages his self‑taught electrical, networking, and hardware repair skills to provide ad‑hoc troubleshooting for neighbors, while
    eyeing an electrical‑contractor certification and dreaming of opening a boutique coffee shop that will double as a community hub, a plan they pursue with a critical, opportunistic mindset that often
    disregards strict deadlines.
  sports: Mauricio Gildemontes spends weekends conquering the Boise foothills on foot or mountain bike, cheers the Boise State Broncos football team in the fall and the Idaho Steelheads during the hockey
    season, belongs to the Boise Mountain Bike Association, and maintains a casual jogging routine that doubles as a social outlet.
  arts: Mauricio Gildemontes channels a competitive spirit into chess tournaments and poker nights while indulging in landscape photography inspired by Ansel Adams, collecting vintage vinyl of The Black
    Keys, and regularly attending Boise’s First Thursday art walks where they absorb local murals and indie film screenings.
  travel: Mauricio Gildemontes plans weekend getaways to the Boise River corridor, has trekked the Columbia River Gorge, dreams of exploring the coffee farms of Ethiopia’s Yirgacheffe and the historic streets
    of Lisbon, balancing a love of spontaneous road trips with the practical need to fit travel into a flexible work schedule.
  culinary: Mauricio Gildemontes delights in preparing bandeja paisa with locally sourced pork belly, black beans, and fried plantains, crafting crisp empanadas stuffed with beef and cheese, and perfecting
    arepas with cornmeal and avocado, while they experiment with home‑roasted high‑altitude arabica beans to pair each meal with a custom brew.
  core: Mauricio Gildemontes is a pragmatic, restless tinkerer whose love of coffee, DIY repairs, and competitive games drives a spontaneous yet critical approach to life, punctuated by occasional budget
    chaos and a stubborn refusal to let rigour dictate creativity.
background:
  cultural: Mauricio grew up in Medellín, Colombia, in a close‑knit family that emphasized community, music, and cuisine. He immigrated to the United States in his early thirties, settling in Boise, Idaho,
    where he blends his Colombian heritage with the Pacific Northwest's outdoor culture. He maintains strong ties to his Colombian roots through language, regular visits to family, celebrations of festivals
    like Carnaval de Barranquilla and Día de la Independencia, and his love for vallenato and cumbia music. At the same time, he has adopted aspects of Idaho's lifestyle—appreciating the outdoors, local
    craft coffee scenes, and the region's community‑driven values. This bicultural perspective informs his social interactions, culinary preferences, and his desire to create spaces where both cultures
    can intersect.
attributes:
  skills: '["Bilingual Spanish‑English", "DIY Home Repair", "Basic Electrical & Plumbing Troubleshooting", "Computer Hardware & Networking Basics", "Software Troubleshooting", "Culinary Expertise in Colombian
    Cuisine", "Coffee Roasting and Brewing", "Critical Analysis", "Adaptability", "Self‑directed Learning"]'
  hobbies: '["Hiking and Landscape Photography", "Mountain Biking", "Home Coffee Roasting and Tasting", "Cooking Traditional Colombian Meals", "Chess", "Poker", "Community Gardening", "Listening to Tech
    and History Podcasts", "DIY Electronics Projects"]'
  career_goals: Mauricio aims to translate his practical curiosity into a stable, self‑sustaining career. He plans to complete a certification program in electrical contracting or IT support within the
    next two years, which would give him a reliable income stream and the ability to handle larger projects. In parallel, he dreams of opening a small boutique coffee shop in Boise that showcases Colombian
    coffee varieties and serves as a cultural hub for the local Latin American community. He also hopes to build a modest handyman service that leverages his repair skills, allowing him to work on flexible
    schedules while meeting client deadlines more consistently. Ultimately, Mauricio wants to secure financial stability for his family, gain professional credibility, and maintain the freedom to explore
    new ideas and projects on his own terms.
