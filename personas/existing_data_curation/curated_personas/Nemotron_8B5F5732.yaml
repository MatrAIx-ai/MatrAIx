personas:
  professional: Pradeep Amin, a 21‑year‑old computer science major at Indiana University Bloomington, combines a data‑driven, structured mindset with a laid‑back attitude toward deadlines, delivering actionable
    insights for class projects while devising creative shortcuts that keep team members engaged and meet expectations.
  sports: Pradeep Amin, a 21‑year‑old cricket enthusiast, captains a community league team that practices at Kennedy Fountain Park, follows the Indiana Hoosiers men’s basketball season and cheers for the
    Chicago Bulls, and incorporates weekend hikes in Hoosier National Forest to stay fit, balancing team play with solo endurance.
  arts: Pradeep Amin, a 21‑year‑old avid fan of Bollywood cinema, frequently attends local screenings of Shah Rukh Khan classics and Anurag Kashyap’s contemporary films, streams playlists that feature A.R. Rahman,
    Arijit Singh, and indie soundtrack artists, and unwinds with narrative‑driven indie video games such as *Celeste* and *Hades*.
  travel: Pradeep Amin, a 21‑year‑old who balances a student budget with a love for adventure, plans spontaneous weekend road trips to Chicago’s Millennium Park and Nashville’s music district, uses a travel
    app to map out future overseas itineraries to Kyoto’s cherry‑blossom avenues and Lisbon’s historic neighborhoods, and prefers a mix of structured itineraries for longer trips and relaxed itineraries
    for short getaways.
  culinary: Pradeep Amin, a 21‑year‑old home cook, perfects chicken biryani with basmati rice, saffron, and cardamom, rolls crispy samosas stuffed with spiced potatoes, and experiments with fusion dishes
    like biryani‑tacos topped with cilantro‑mint yogurt, always hunting for fresh coriander, cumin, and paneer at the local farmers market.
  core: Pradeep Amin, a 21‑year‑old tech‑savvy cricket player and Bollywood enthusiast, balances a structured analytical mindset with a laid‑back approach to deadlines, often crafting creative shortcuts
    while juggling a modest budget, occasional health hiccups, and a penchant for experimental cooking.
background:
  cultural: Pradeep descends from a South Asian (Indian) family that immigrated to the United States in the early 2000s. Raised in a bilingual household, he speaks English fluently and understands conversational
    Hindi, which he uses during family gatherings and cultural events. He celebrates major festivals such as Diwali and Holi with the local Hindu temple community in Bloomington, often participating in
    volunteer initiatives that organize cultural fairs and food drives. His upbringing blends traditional values—such as respect for elders and communal support—with the independent, adaptable ethos of
    his American environment, giving him a unique perspective on bridging cultural and professional worlds.
