  career_goals: Pradeep aims to finish his bachelor's degree in Computer Science within the next two years, leveraging his technical foundation to secure an entry‑level software development or data analyst
    role that offers structured project work but also the flexibility to innovate. He envisions progressing to a position where he can lead small development teams, integrate user‑focused design, and eventually
    mentor other South Asian students in tech. Long‑term, he hopes to launch a consultancy that helps local small businesses adopt affordable digital tools, blending his technical skills with his entrepreneurial
    spirit.
