personas:
  professional: Michel Evans, a 54‑year‑old healthcare finance specialist with three decades of expertise in medical billing, EHR platforms like Epic and Cerner, and data analysis using Excel and Power
    Query, leverages their keen analytical mind and compassionate, cooperative nature to design flexible, process‑improvement workflows and mentor new staff, even as their relaxed attitude toward strict
    deadlines sometimes leads to spontaneous, creative problem‑solving.
  sports: Michel Evans, an avid Chicago sports fan, loyally follows the Bulls, Bears, and Cubs, participates in a weekly pick‑up basketball game at the local community center and rides with the Chicago
    Cycling Club on lakefront trails during warm months, but often skips formal gym sessions in favor of flexible, low‑impact activities that fit their relaxed routine.
  arts: Michel Evans fuels their creative spirit by touring the Art Institute’s collection of Grant Wood and Georgia O'Keeffe, attending intimate blues showcases honoring Muddy Waters and B.B. King tributes,
    and documenting Chicago’s street life with a vintage Leica, while also devouring novels by Toni Morrison and Octavia Butler that deepen their appreciation for narrative art.
  travel: Michel Evans prefers spontaneous, culturally immersive trips, often hopping on a weekend train to New York City’s museum district, dreaming of exploring Kyoto’s historic tea houses and the canals
    of Amsterdam, and occasionally retreating to the nearby Door County peninsula for quiet lakeside reflection.
  culinary: Michel Evans, a self‑taught kitchen enthusiast, blends soul‑food roots with global flavors by crafting dishes like collard‑green‑stuffed dumplings, smoked pork jambalaya spiked with kimchi,
    and sweet‑potato pie finished with espresso‑spiced crumble, using staples such as smoked paprika, okra, fresh basil from their balcony garden, and a dash of hot sauce.
  core: Michel Evans merges a restless curiosity for art, music, and technology with a laid‑back, sometimes disorganized lifestyle, channeling their deep compassion into community mentorship while indulging
    in spontaneous jazz outings and experimental cooking experiments.
background:
  cultural: Michel identifies as African‑American, with family roots that trace back to the Great Migration and Chicago’s South Side neighborhoods. He grew up immersed in the city’s rich Black cultural
    traditions—church gatherings, Juneteenth celebrations, and the legacy of the Black Arts Movement. Influences from artists like Romare Bearden and musicians such as John Coltrane shape his aesthetic
    sensibilities. Community solidarity and social justice are central to his worldview, guiding both his professional focus on equitable health‑care billing and his volunteer work supporting local youth.
attributes:
  skills: '[''Medical Billing'', ''Claims Processing'', ''Electronic Health Record (EHR) Systems'', ''ICD-10 and CPT Coding'', ''Insurance Verification'', ''Data Entry and Reconciliation'', ''Excel and
    Data Analysis'', ''Process Improvement'', ''Training and Mentoring'', ''Customer Service'', ''Conflict Mediation'', ''Community Outreach'', ''Basic Photography'']'
  hobbies: '[''Visiting the Art Institute of Chicago'', ''Jazz and blues concerts at intimate venues'', ''Urban street and portrait photography'', ''Reading science-fiction and African-American literature'',
    ''Cooking fusion soul-food dishes'', ''Volunteering at youth mentorship programs'', ''Urban gardening on a balcony'', ''Walking tours of historic Chicago neighborhoods'']'
  career_goals: Michel aims to obtain Certified Professional Biller (CPB) credentials and move into a supervisory role where he can lead a billing team and drive efficiency across multiple clinic sites.
    He is interested in bridging his technical expertise with his passion for community health by developing outreach programs that simplify billing for underserved patients. Over the next five years he
    hopes to transition into health informatics consulting, helping small practices adopt user‑friendly EHR workflows while continuing to volunteer as a mentor for youth entering the health‑care field.
