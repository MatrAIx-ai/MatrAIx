  career_goals: While enjoying the flexibility of his current role, Cuong aims to step into a supervisory position where he can guide a small team and champion safety and efficiency initiatives. He plans
    to complete a short certification in CNC programming to deepen his technical expertise and increase his value to his employer. Long‑term, he envisions opening a modest home‑based fabrication workshop
    that would allow him to take on custom projects for local farms and community members, blending his practical skills with his curiosity for new fabrication techniques.
