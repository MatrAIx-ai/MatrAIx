  career_goals: Gabriel aims to expand his impact beyond private tutoring by establishing a regional arts‑education center in North Carolina that offers interdisciplinary workshops for adults and high‑school
    students. He seeks to secure grant funding to develop a digital platform for humanities tutoring, publish a series of accessible art‑history primers, and become a recognized consultant for integrating
    the arts into public‑school curricula across the state. Ultimately, he envisions a leadership role that combines his organizational strengths with his passion for fostering creative, critical thinking
    in the community.
