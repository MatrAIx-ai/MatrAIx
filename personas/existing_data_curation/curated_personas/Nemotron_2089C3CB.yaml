personas:
  professional: Purificacion Aqui is a metal fabrication professional who combines expert MIG/TIG welding, CNC milling, and blueprint interpretation with a curiosity for new processes, using Lean Six Sigma
    tools to cut waste while they maintain a laid‑back, somewhat disorganized approach that sometimes leaves the workstation a bit chaotic, yet their collaborative spirit and willingness to assertively
    mentor newcomers keeps the shop moving forward.
  sports: Purificacion Aqui enjoys early‑morning beach runs along the Atlantic shoreline, plays casually in a local beach‑volleyball league, cheers on the Boston Red Sox and the New England Patriots during
    baseball and football seasons, and they sign up for seasonal community 5‑K races while preferring low‑impact workouts like yoga to accommodate their back.
  arts: Purificacion Aqui finds inspiration for their metal‑art sketches while listening to indie folk icons like Bon Iver, Sufjan Stevens, and lo‑fi producers such as Jinsang, often humming along as they
    refurbish old furniture, and they admire street installations by Banksy during weekend gallery tours.
  travel: Purificacion Aqui prefers low‑stress, short‑haul trips that allow for culinary exploration, having already wandered the night markets of Hoi An, sampled street food in Manila, and trekked the
    rice terraces of Kyoto, while they dream of a serene getaway to Iceland’s geothermal spas but often postpone such adventures due to budgeting concerns and the anxiety of long‑haul travel.
  culinary: Purificacion Aqui is a proficient home chef who regularly crafts Vietnamese pho with star‑anise‑infused broth, Filipino adobo seasoned with oregano and soy, and experimental fusion dishes that
    blend tamarind‑marinated vegetables with lemongrass‑scented rice, and they delight friends over communal meals that showcase their love for bold, aromatic flavors.
  core: Purificacion Aqui blends a restless creative spark with a practical welding skill set, navigating life’s anxieties through yoga, garden walks, and spontaneous culinary experiments, while they habitually
    misplace tools in a delightfully chaotic workshop.
background:
  cultural: Purificacion comes from a mixed Southeast Asian background; her mother is Filipino and her father Vietnamese. Raised in a bilingual household, she speaks English fluently and retains conversational
    skills in Tagalog and Vietnamese, celebrating both Tet and the Filipino Feast of the Black Nazarene with family. The blend of Spanish-influenced Filipino names and Vietnamese heritage reflects a rich
    cultural tapestry that shapes her values of family loyalty, respect for elders, and community involvement. Living in Brunswick, GA, she participates in local multicultural festivals, volunteers at the
    community center's cultural exchange programs, and maintains traditional cooking practices as a way to stay connected to her roots while navigating life in the American South.
