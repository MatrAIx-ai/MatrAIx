    projects"]'
  career_goals: Purificacion aims to earn a Certified Welder credential and a Lean Six Sigma Green Belt within the next two years, positioning herself for a supervisory role in the fabrication shop. She
    hopes to lead a small team where she can mentor newer assemblers, implement process improvements that reduce waste, and introduce more ergonomic work practices to support her own mental well‑being.
    In the longer term, she dreams of opening a boutique custom‑metalwork studio that blends her technical skills with creative design, allowing her to work on projects that reflect her Southeast Asian
    heritage and personal artistic interests.
