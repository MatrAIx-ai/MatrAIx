  hobbies: '[''Abstract acrylic painting'', ''Mixed‑media collage'', ''Harmonica playing'', ''Urban gardening'', ''Reading speculative fiction'', ''Attending jazz performances'', ''Senior‑center chess'',
    ''Cooking soul‑food recipes'', ''Community storytelling'', ''Traveling to historic African‑American sites'', ''Volunteering at local arts workshops'']'
  career_goals: Nolan aims to leave a lasting imprint on his neighborhood by expanding the intergenerational arts program at the Ronkonkoma community center, where he hopes to mentor youth and fellow seniors
    alike. He plans to compile his memoirs and the oral histories he has collected into a self‑published book that celebrates the African‑American experience in Long Island. Learning digital illustration
    is a personal ambition, as is mastering modern photo‑editing to document community events. He also wants to spearhead a quarterly cultural festival showcasing local musicians, visual artists, and culinary
    traditions, thereby fostering pride and connection among residents. Ultimately, Nolan seeks to be recognized as a cultural bridge, preserving heritage while encouraging creative exploration.
