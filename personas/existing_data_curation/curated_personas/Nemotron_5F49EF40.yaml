personas:
  professional: Roberto Brescia, a ten‑year‑old tinkerer, merges his curiosity for moving‑part LEGO builds with a practical knack for simple electronics, often improvising solutions on the fly while shunning
    overly rigid step‑by‑step instructions.
  sports: Roberto Brescia is a forward on his neighborhood soccer league, pedals his bike through the local trails each weekend, roots for the Fargo Force hockey team and the Minnesota Vikings, and approaches
    training with a fierce competitive edge that sometimes overrides cooperative drills, preferring spontaneous scrimmages over strict practice schedules.
  arts: Roberto Brescia’s artistic side shines when sketching prototype inventions between LEGO builds, devouring adventure novels like the Percy Jackson series, listening to Imagine Dragons and the upbeat
    soundtrack of The LEGO Movie, and quoting lines from the animated classic Adventure Time, all of which fuel his creative imagination.
  travel: Roberto Brescia’s travel style blends family‑driven road trips to the nearby Red River Valley and the towering cliffs of Theodore Roosevelt National Park with an avid dream of exploring Rome’s
    ancient ruins and Tokyo’s neon streets, preferring a mix of planned stops for iconic sights and spontaneous detours inspired by online videos, while staying mindful of school schedules and a modest
    family travel budget.
  culinary: Roberto Brescia favors hearty family meals like spaghetti Bolognese and pizza topped with extra mozzarella, enjoys crafting simple cheese‑filled quesadillas after soccer practice, and insists
    on adding a drizzle of ketchup to everything, while occasionally overindulging in candy bars during video‑game marathons, showing a playful but somewhat stubborn palate.
  core: Roberto Brescia is a competitively curious ten‑year‑old who blends LEGO ingenuity with spontaneous energy, saving for big builds while juggling impulsive snack purchases and a keen eye for adventure
    both on the bike trail and through imagined worlds.
background:
  cultural: Roberto comes from a white, Italian‑American family that has lived in North Dakota for generations. His home blends Midwestern values—community gatherings, outdoor activities, and a practical
    work ethic—with Italian traditions such as family meals and celebrating holidays like Christmas and Easter with special dishes. Growing up in Fargo, he experiences cold winters, local festivals, and
    a close‑knit neighborhood that encourages self‑reliance, curiosity, and a balanced respect for both new ideas and established methods.
