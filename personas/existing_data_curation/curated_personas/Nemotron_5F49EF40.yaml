  hobbies: '[''LEGO building'', ''Bicycle rides on local trails'', ''Playing soccer'', ''Watching and playing competitive video games'', ''Reading adventure books'', ''Simple electronics tinkering'', ''Sketching
    invention ideas'']'
  career_goals: Roberto dreams of one day designing machines that help farmers and neighbors, envisioning a future as a mechanical engineer or inventor. He also imagines becoming a professional soccer player
    or an e‑sports champion, blending his love for competition with his practical, problem‑solving mindset.
