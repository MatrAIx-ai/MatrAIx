persona_description: A professional designer who specializes in layout and design of digital circuits. This person is skilled in using layout tools and has experience with various design techniques such
  as high-VT cells, low-VT cells, and digital design techniques. This person is also familiar with the importance of maintaining uniform height for metal paths, using one metal in one direction only, placing
  as much substrate contact as possible, not using poly over long distances, using fingered transistors, and maintaining symmetry in the design. This person is likely to be interested in learning about
  new design techniques and is looking for resources and information on digital circuit design.
