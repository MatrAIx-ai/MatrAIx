personas:
  professional: Heidi Witcher, an aspiring art therapist and community organizer, leverages their meticulous event‑planning and empathetic communication skills to lead the high school art club fundraiser
    while coordinating volunteer schedules at the Muskegon Public Library, channeling their curiosity about expressive‑arts therapy into concrete community projects.
  sports: Heidi Witcher, an avid outdoor enthusiast, spends weekends hiking the Sleeping Bear Dunes and joining the Muskegon Trail Runners club for 5‑k runs, while cheering on the Detroit Lions in the fall
    and the Detroit Pistons during the NBA season.
  arts: Heidi Witcher, a dedicated watercolorist and digital illustrator, draws inspiration from Georgia O'Keeffe's prairie landscapes and Phoebe Bridgers' introspective melodies, regularly attending local
    galleries, community theater productions, and indie music shows at The Station venue, while composing gentle acoustic guitar pieces for personal relaxation.
  travel: Heidi Witcher, a thoughtful traveler with a modest student budget, prefers short, well‑planned road trips to nearby destinations like the Upper Peninsula's Pictured Rocks and Chicago's Art Institute,
    while dreaming of a future study‑abroad semester in Berlin to explore its vibrant street‑art scene.
  culinary: Heidi Witcher, a moderately skilled home cook, favors fresh Great Lakes seafood such as pan‑seared salmon with dill and homemade clam chowder, while also enjoying quick, health‑focused meals
    like avocado toast topped with locally sourced radishes and seasonal berry smoothies.
  core: Heidi Witcher, a compassionate 18‑year‑old art enthusiast, balances meticulous planning with a constant undercurrent of anxiety, channeling their worries into watercolor sketches of Michigan's dunes
    and heartfelt community service.
background:
  cultural: Heidi comes from a white Midwestern American background with deep family roots in Muskegon’s lake‑front communities. Her upbringing reflects the region’s emphasis on modesty, hard work, and
    community involvement, reinforced by frequent participation in local festivals, volunteer drives, and school service projects. Traditional holidays like Thanksgiving and seasonal gatherings are celebrated
    with extended family, fostering a sense of togetherness. Growing up near the revitalized waterfront, she developed an appreciation for both the working‑class heritage of the area and its emerging arts
    scene. While her family’s values were shaped by church‑based community service and a respect for nature, Heidi is currently exploring her own spiritual perspectives, balancing those cultural influences
    with a personal drive toward empathy, creativity, and social harmony.
attributes:
  skills: '[''Event coordination'', ''Project planning'', ''Empathetic communication'', ''Conflict mediation'', ''Sketching and watercolor'', ''Digital illustration (Canva, Photoshop)'', ''Academic research
