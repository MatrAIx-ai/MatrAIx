  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration and graphic design'', ''Visiting art galleries and museums'', ''Attending community theater performances'', ''Reading contemporary
    fiction & self‑help books'', ''Yoga and mindfulness journaling'', ''Hiking and dune exploration'', ''Playing acoustic guitar'', ''Volunteering at library reading programs'', ''Photography of nature'']'
  career_goals: Heidi aims to enroll at Muskegon Community College this fall to complete prerequisite coursework for a bachelor's degree in social work or counseling, with a future specialization in expressive‑arts
    therapy. In the short term, she plans to volunteer with local youth mental‑health nonprofits, earn CPR/First‑Aid certification, and build a portfolio of therapeutic art projects. Long‑term, she aspires
    to obtain a master's degree in art therapy and work as a licensed art therapist in a community health setting, designing creative workshops that support adolescents coping with anxiety and stress. She
    also hopes to develop an online platform that blends peer support with guided artistic expression, fostering a safe space for young people to share and heal.
