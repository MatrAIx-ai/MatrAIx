  hobbies: '[''Experimental Home Baking'', ''Fishing'', ''Herb Gardening'', ''Volunteer Cooking'', ''Live Music Attendance'', ''Community Theater Acting'', ''Food Festival Travel'', ''Culinary History Reading'',
    ''Woodworking'', ''Youth Basketball Coaching'']'
  career_goals: Charles aims to expand his bakery into a flagship café that showcases heritage breads and seasonal pastries, develop a line of signature sourdough loaves for regional grocery distribution,
    and earn a Certified Baking Professional credential. He also hopes to publish a cookbook focused on Midwestern farm‑to‑table baking, mentor a new generation of bakers, and eventually transition ownership
    to a trusted apprentice while remaining as a senior advisor.
