  career_goals: Melissa often dreams of becoming a scientist or engineer who discovers new things while using practical tools, and she also imagines caring for animals as a veterinarian. Occasionally she
    envisions herself as a teacher who helps younger children learn. Her ambitions are driven by her curiosity balanced with a desire for concrete results, a competitive spirit to succeed in school projects,
    and a cautious approach that makes her want to understand how things work before she fully commits.
