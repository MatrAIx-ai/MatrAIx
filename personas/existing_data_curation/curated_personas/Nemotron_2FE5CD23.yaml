personas:
  professional: Melissa Bunor, an aspiring junior engineer who loves building LEGO structures, blends a curious knack for discovering how things work with a practical habit of following step‑by‑step instructions,
    making them a meticulous but adaptable problem‑solver in the playground workshop.
  sports: Melissa Bunor, a lively participant in the Prosper Soccer Club’s after‑school program who also tries gymnastics at the community center, they cheer for the Dallas Cowboys and the Dallas Mavericks,
    balancing a competitive streak on the field with a flexible play‑style that prefers free‑running on the playground over rigid drills.
  arts: Melissa Bunor, a budding illustrator who spends afternoons coloring scenes inspired by Disney’s Moana (voiced by Auli’i Cravalho) and Hayao Miyazaki’s My Neighbor Totoro, they enjoy listening to
    the catchy tunes of the Sesame Street cast and often draw beyond school assignments.
  travel: Melissa Bunor, an imaginative traveler who prefers short family road trips to Dallas and the nearby Fort Worth Stockyards but dreams of a future visit to Tokyo’s bustling Shibuya Crossing and
    the pristine beaches of Palawan, they plan their imaginary itineraries with stickers on a map and balance excitement with the occasional worry about missing school.
  culinary: Melissa Bunor, a curious little chef who proudly helps stir sweet adobo sauce and roll crunchy lumpia at home, they love constructing peanut butter‑banana pancakes for breakfast and collecting
    rainbow sprinkles to top their mac and cheese, yet they often get distracted by sticker albums during cooking.
  core: Melissa Bunor, a six‑year‑old explorer whose fierce curiosity and competitive spirit are tempered by a persistent worry about getting everything just right, they meticulously organize stickers while
    occasionally over‑thinking playground games.
background:
  cultural: Melissa’s family is of Filipino‑Chinese descent, with roots in the Philippines and Chinese ancestry. At home they speak Tagalog and some Mandarin, celebrate holidays such as Christmas, Thanksgiving,
    and Lunar New Year, and enjoy traditional foods like adobo, lumpia, and steamed fish. Living in Prosper, Texas, she also participates in community events and attends a multicultural preschool that blends
    American and Southeast Asian cultural elements.
