    prototyping and integration"]'
  hobbies: '["DIY electronics projects","Reading science fiction and technology non-fiction","Playing chess","Jazz and blues listening","Cooking Southern soul food","Urban gardening","Hiking in Rock Creek
    Park","Meditation and mindfulness","Volunteering for STEM outreach programs"]'
  career_goals: Volney aims to transition from a hands‑on technologist role to a senior technical specialist position where he can lead small teams on smart‑city and sustainable‑energy projects for the
    District. He plans to obtain the Certified Electrical Technologist (CET) credential and pursue additional training in renewable‑energy integration and IoT security. Over the next five years he hopes
    to oversee the deployment of energy‑efficient lighting and micro‑grid solutions for municipal buildings, while also establishing a community workshop that offers after‑school STEM programs for local
    youth. Ultimately, he wants his work to blend cutting‑edge technology with tangible benefits for his neighborhood and to be recognized as a trusted mentor and advocate for diversity in engineering.
