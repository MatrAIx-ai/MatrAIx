persona_description: A procurement professional who is committed to responsible sourcing and has a deep understanding of the environmental, social, and ethical aspects of supply chain management. This individual
  has extensive experience working with approved factories and regularly conducting factory audits to ensure compliance with international standards and regulations. They are knowledgeable about the benefits
  of sourcing responsibly, including building strong supply chain relationships, delivering real change for the future, and increasing business performance. This persona is also familiar with the ISO 14001
  standard and SEDEX and BSCI accreditation, and is actively seeking to improve their environmental management system through technology and continuous improvement.
