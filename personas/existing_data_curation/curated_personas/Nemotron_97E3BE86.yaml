  hobbies: '["Watercolor Painting", "Sketching", "Speculative Fiction Writing", "Literary Fiction Reading", "Philosophy", "Small-Group Book Club", "Nature Hiking", "Gardening", "Mindfulness Meditation",
    "Yoga", "Volunteer Art-Based Therapy Workshops", "Stargazing", "Photography"]'
  career_goals: Christine aims to transition into a senior leadership role within a regional nonprofit or governmental agency where she can design and scale innovative community-based mental health programs
    that blend education, art, and evidence-based practice. She plans to earn a Master of Social Work with a focus on expressive arts therapy within the next three years and to secure certification in trauma-informed
    care. Her long-term ambition is to launch a community center in Lake County that offers after-school educational support, family counseling, and creative workshops while advocating for policy reforms
    that increase funding for integrated child-welfare services. She also aspires to publish research on the efficacy of arts-based interventions and present at national social work conferences.
