persona_description: A data scientist or a data analyst who is interested in optimizing the performance of queries on large datasets. They are familiar with the concept of bucketing, a data-organising technique
  used in Hive to decompose data into more manageable parts, known as buckets. They are proficient in using CLUSTERED BY clause in Hive to perform bucketing and understand the difference between CLUSTERED
  BY and CLUSTER BY. They are also aware of the limitations of partitioning and the need for bucketing in case of high cardinality columns. They are interested in using bucketing to optimize the performance
  of queries and are looking for examples of how to perform bucketing and its implementation in practice.
