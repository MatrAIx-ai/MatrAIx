persona_description: A political scientist who specializes in the study of democracy, particularly the flaws and limitations of the democratic system. They are critical of the arbitrary rules and practices
  of government and argue that democracy should not be based on fiction but on the principles of the people's right to rule themselves. They are also interested in the history and evolution of democracy
  and the ways in which it has been distorted or corrupted over time.
