  career_goals: Jacquelin aims to progress from a senior computer support specialist to a team lead and eventually an IT service manager within the next five years. She plans to earn ITIL Expert certification
    and pursue advanced credentials such as CompTIA Security+ and Microsoft Modern Desktop Administrator. She wants to spearhead initiatives that improve service desk efficiency through knowledge-base optimization
    and AI-driven ticket triage, while also expanding her influence by mentoring junior technicians and conducting community tech outreach programs. Long‑term, she envisions a role that blends technical
    leadership with strategic planning, possibly overseeing the entire IT operations for a mid‑size organization.
