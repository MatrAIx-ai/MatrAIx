personas:
  professional: Jacquelin Bank leverages a blend of deep troubleshooting aptitude, cross‑platform expertise, and clear documentation to lead a senior support desk, balancing curiosity for emerging tech
    with pragmatic, proven methods while assertively mentoring junior staff and fostering a collaborative, upbeat atmosphere.
  sports: Jacquelin Bank is an avid hiker, mountain biker, and skier who joins the Rockies Trail Runners Club for weekly runs, follows the Colorado Avalanche for winter excitement, and volunteers as a race
    marshal at community trail events, blending competitive spirit with social engagement.
  arts: Jacquelin Bank enjoys strumming acoustic guitar at informal gatherings, immerses in science‑fiction novels by Neal Stephenson and Liu Cixin, attends indie concerts featuring Tame Impala, and curates
    board‑game nights with titles like Terraforming Mars, weaving artistic appreciation into a sociable lifestyle.
  travel: Jacquelin Bank prefers well‑planned yet flexible trips, spending long weekends exploring national parks such as Banff and Yosemite, has a bucket‑list destination of Kyoto during cherry blossom
    season, and balances adventure with budget‑friendly road trips with their spouse, reflecting a pragmatic wanderlust.
  culinary: Jacquelin Bank loves cooking elaborate dishes like homemade ramen, shakshuka, and herb‑infused sourdough bread, often sourcing fresh vegetables from their garden, experimenting with sous‑vide
    techniques, and hosting relaxed dinner parties for friends, showcasing a confident, exploratory palate.
  core: Jacquelin Bank is a technically savvy, outdoors‑driven community builder who blends methodical problem‑solving with spontaneous adventure, mentoring peers while never missing a trail run, even if
    it means juggling a few extra coffee cups and gadget acquisitions.
background:
  cultural: Jacquelin was raised in a middle‑class white family in the foothills of northern Colorado, where the outdoors and community involvement are central cultural values. Her upbringing emphasized
    self‑reliance, practical problem‑solving, and a strong belief in education, reflecting broader American middle‑class ideals. Growing up near Fort Collins, she was exposed to a blend of progressive tech
    culture and traditional Colorado ranching lifestyle, fostering a balanced worldview that values both innovation and established practices. Her marriage and deep ties to Johnstown’s close‑knit community
    reinforce a collaborative spirit and a commitment to giving back through volunteer work.
