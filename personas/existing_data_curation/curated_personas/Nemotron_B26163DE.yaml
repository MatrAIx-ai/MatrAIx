personas:
  professional: Adam Ormond is a budding engineer‑in‑training who channels a love for structure into building detailed bridge and aircraft model kits, while also designing elementary games and animations
    in Scratch, showcasing an early talent for systematic problem‑solving and creative coding.
  sports: Adam Ormond laces up for the Hart County Youth Soccer U‑12 team, idolizes Atlanta United FC’s midfield dynamo, and spends weekend afternoons casting a line at Lake Hartwell, finding the quiet
    of fishing as a personal sport that balances the competitive rush of soccer.
  arts: Adam Ormond finds artistic expression through constructing model bridges, snapping photos of bobcats and hawks in the Oconee County forests, and drawing inspiration from wildlife photographer Art
    Wolfe and the quirky animation style of the Scratch Team YouTube channel, while winding down to the acoustic guitar melodies of John Mayer.
  travel: Adam Ormond has explored the trails of Oconee State Park, taken a family road trip to Great Smoky Mountains National Park, and dreams of kayaking the pristine waters of Lake Tahoe and visiting
    the interactive science exhibits at the Exploratorium in San Francisco.
  culinary: Adam Ormond enjoys building a simple grilled cheese sandwich with sharp cheddar and sourdough, relishes the smoky flavor of freshly caught trout seasoned with lemon and dill after a day on the
    lake, and occasionally dabbles in making banana muffins, though they habitually over‑mix the batter, resulting in a dense crumb.
  core: Adam Ormond is a methodical twelve‑year‑old who blends a love for precision engineering with tranquil lake fishing, rarely shows anxiety, meticulously catalogs model parts, and secretly hoards extra
    candy bars for late‑night gaming while frequently misplacing their socks.
background:
  cultural: Adam grows up in a close-knit community in Walhalla, South Carolina, where Southern traditions and a strong sense of community shape his upbringing. His family values self-reliance, respect
    for nature, and regular attendance at local church services. Surrounded by the Appalachian foothills and Lake Hartwell, he has an appreciation for outdoor activities like fishing, hiking, and wildlife
    observation. His cultural background includes traditional Southern hospitality, emphasis on family gatherings, enjoyment of Southern cuisine, participation in local festivals, and support for the town's
    high school football culture. As part of a predominantly white, rural community, he experiences a blend of historic Southern values and contemporary influences from school and online media.
