persona_description: Fiona Crisp, an artist and academic who coopts the phrase "negative capability" from English poet John Keats for her ongoing practice-based research project. Her project, Negative Capability,
  seeks to foreground the "site" or laboratory as a social, cultural, and political space where meaning is shaped and constructed rather than received or observed. Crisp's interest in the twin extremes
  of macro- and microscale associated with fundamental physics and astronomy, and her proposal to use visual, photographic means to approach that which is literally or conceptually imperceptible, align
  with her artistic and academic pursuits. Her work Subterrania (2009–2010), featuring images taken in various underground locations, demonstrates her evolution of the idea of "impossible space" as a phenomenological
  entity and advocacy for the production of knowledge through looking.
