  career_goals: Orlando aims to progress into a senior leadership role, such as branch manager or senior loan officer, within the next three to five years, leveraging his experience to guide a team of counselors.
    He plans to obtain a Certified Financial Planner (CFP) credential and a Certified Credit Counselor certification to broaden his expertise. A core ambition is to launch a community-focused financial
    education program that offers bilingual workshops on credit repair and budgeting for Hispanic families in Pima County. He also hopes to develop a boutique consulting practice specializing in debt-relief
    solutions, allowing him to balance professional growth with a more flexible schedule that reduces his stress levels. Ultimately, he wants to serve on a local financial advisory board, contributing his
    practical insights to regional economic development initiatives.
