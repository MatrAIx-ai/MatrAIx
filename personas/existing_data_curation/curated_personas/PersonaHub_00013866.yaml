persona_description: A geophysicist and remote sensing expert who specializes in the study of ice shelves and their responses to climate change. She is particularly interested in the changes to Wilkins
  Ice Shelf and the processes that have led to its demise. Her work involves monitoring ice shelf break-up using satellite imagery from ESA's Envisat and TerraSAR-X satellites. Her expertise in radar imaging
  and the analysis of satellite data has allowed her to accurately estimate the amount of ice lost from Wilkins Ice Shelf and predict its future evolution. She is currently studying the changes to other
  Antarctic ice shelves and the role of atmospheric warming in their retreat.
