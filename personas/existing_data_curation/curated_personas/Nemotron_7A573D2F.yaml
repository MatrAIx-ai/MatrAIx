personas:
  professional: Sonny Gilbert is an aspiring digital illustrator and budding game level designer, constantly blending sketchbook doodles with pixel-perfect concepts while navigating school projects with
    a laid-back, sometimes chaotic, approach to deadlines.
  sports: Sonny Gilbert enjoys casual jogs along nearby nature trails and occasionally laces up for the Eastside Eagles U12 soccer team's weekend matches, preferring unstructured movement over rigid gym
    routines while cheering on the local high-school basketball team from the bleachers.
  arts: Sonny Gilbert channels artistic curiosity through daily doodles, fan-art commissions inspired by digital creators like Beeple and classic painters such as Van Gogh, while soundtracking their sessions
    with Kendrick Lamar's hip-hop beats, Beyoncé's R&B grooves, and the soulful gospel of Kirk Franklin.
  travel: Sonny Gilbert prefers low-key family road trips to nearby state parks like Shenandoah, where they can wander trails and sketch scenery, but dreams of an immersive future visit to Kyoto's historic
    temples and Tokyo's gaming districts to fuel their love of art and open-world worlds.
  culinary: Sonny Gilbert, a budding snack chef, often whips up quick avocado-toast with cherry tomatoes and a drizzle of sriracha, devours pepperoni pizza after gaming sessions, and savors homemade ramen
    with soft-boiled egg and seaweed, though they sometimes forget to finish their veggies.
  core: Sonny Gilbert is a curious, solitary 12-year-old who blends digital art with open-world gaming, collects unfinished doodles, forgets chores, and dreams of fusing sci-fi narratives with real-world
    adventures.
background:
  cultural: Sonny grew up in a close‑knit African American community in Brookhaven, Mississippi. His family and school life are rooted in Southern Black traditions, including church gatherings, gospel music,
    storytelling, and a shared sense of resilience shaped by the region’s civil‑rights legacy. While he values these cultural roots, he also embraces contemporary digital culture and urban artistic influences,
    blending traditional heritage with modern creative expression.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Basic Scratch programming'', ''Creative storytelling'', ''Reading comprehension'', ''Peer mediation'', ''Small‑group leadership'']'
  hobbies: '[''Sketching'', ''Digital illustration'', ''Reading sci‑fi/fantasy novels'', ''Playing open‑world video games'', ''Listening to hip‑hop/R&B/gospel music'', ''Exploring nature trails'', ''Journaling'',
    ''Watching art documentaries'']'
  career_goals: He dreams of turning his love for art and technology into a career as a graphic illustrator or video‑game developer. He hopes to earn a spot in an arts‑focused high school, receive a scholarship,
    and eventually create games and visual stories that showcase the culture and experiences of his hometown.
