  hobbies: '[''Soccer'', ''School choir'', ''Exploring nature'', ''Rock and leaf collection'', ''Adventure reading'', ''Crafting (beads, paper)'', ''Cooking simple recipes'', ''Community music events'']'
  career_goals: Yvonne dreams of becoming a teacher one day so she can help other children learn and make friends, and she is also fascinated by the idea of working as a wildlife biologist or park ranger
    to protect the forests and animals she loves. She hopes to combine her love for people and the outdoors in a career that supports both community and the environment.
