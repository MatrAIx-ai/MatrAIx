personas:
  professional: Yvonne Bumber, a budding junior naturalist and soccer enthusiast, combines an inquisitive love for exploring woods and streams with a practical knack for organizing team drills, making them
    a reliable line-leader in after-school soccer and a meticulous collector of stones and insects.
  sports: Yvonne Bumber, an energetic midfielder on the local under-9 soccer league with the River Valley Rockets, enjoys weekly practices, cheers for the nearby professional football team the Mountain
    Wildcats, and balances active play with a love for exploratory hikes in the state park during summer.
  arts: Yvonne Bumber, a spirited member of the school choir who adores Appalachian folk songs like Wildwood Flower by the Carter Family and pop hits by Taylor Swift, spends weekends crafting beaded bracelets
    while humming tunes, and can recite lines from the Robin Hood adventure books she reads.
  travel: Yvonne Bumber, who loves weekend trips to Greenfield State Park to explore streams, dreams of a summer visit to the Great Smoky Mountains, and plans family vacations around school holidays, favoring
    nature hikes over theme parks but secretly hoping to see Disney World someday.
  culinary: Yvonne Bumber, who enjoys helping bake chocolate chip cookies with Mom, prefers snack foods like apple slices with peanut butter and homemade trail mix with raisins and almonds, can confidently
    make a simple peanut butter-banana sandwich after watching a cooking video, though they sometimes sneak extra cookies before dinner.
  core: Yvonne Bumber is a curious, organized and socially vibrant eight-year-old whose days are filled with soccer, nature scouting, choir harmonies, and a love for sweet treats, all balanced by a habit
    of forgetting to put away craft supplies.
background:
  cultural: Yvonne lives in Beckley, West Virginia, a small town in the Appalachian foothills. Her family’s heritage reflects the region’s traditions of strong community ties, church involvement, and a
    deep appreciation for the outdoors. She often attends a local Methodist church where music, storytelling, and fellowship are central, and participates in seasonal festivals that celebrate folk music,
    handmade crafts, and regional foods. While she enjoys modern technology like tablets for schoolwork, she also values family customs such as quilting circles, cooking family recipes, and weekend hikes
    on nearby hills. This blend of rural Appalachian culture and contemporary influences shapes her daily life and worldview.
