    ''Training and mentoring of new personnel'', ''Community safety education and outreach'']'
  hobbies: '[''Abstract painting'', ''Creative writing (short stories and poetry)'', ''Photography of rural Michigan'', ''Gardening'', ''Volunteer work at the senior center'', ''Bridge club participation'',
    ''Local historical society projects'', ''Attending community theater productions'', ''Birdwatching'', ''Yoga for seniors'']'
  career_goals: As she approaches retirement, Malinda aims to transition from front‑line duties to a senior advisory role where she can shape community safety policies and train the next generation of guards.
    She plans to earn her GED and a security management certification, which will qualify her to become a part‑time safety consultant for local schools and the municipal senior center. Long‑term, she hopes
    to launch a small community‑based program that blends security education with artistic workshops, fostering both safety awareness and creative expression among residents.
