persona_description: A group of severe storms meteorologists who have re-analyzed the March 18, 1925 Tri-State Tornado, revealing previous analyses of the surface weather conditions were inaccurate and
  leading to misconceptions about where the tornado formed in reference to the existing weather system. The researchers concluded that there was no singular feature in the meteorological setting that would
  explain the extreme character of the Tri-State tornado, but the storms of 18 March were associated with a rapidly moving cyclone that was not unusually intense. They also found that the supercell that
  produced the tornado was very near the center of the cyclone, possibly where a warm front and a distinct dryline intersected. The researchers also found that the supercell and dryline moved rapidly eastward,
  keeping the tornadic supercell within a very favorable storm environment for several hours, and that the storm remained very close to the surface warm front. The research also allowed for the conclusion
  that the storm was a supercell, classic in its stages and high-precipitation in the later stages. The supercell also produced accompanying hail up to baseball size and non-tornadic damaging winds.
