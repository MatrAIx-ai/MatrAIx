  career_goals: Robert aims to transition into a supervisory or care-coordinator role within the next two years, leveraging his extensive hands-on experience to lead a team of home-care aides. He plans
    to obtain a Certified Nursing Assistant (CNA) credential and pursue specialized training in dementia and art-therapy interventions for seniors. By integrating his passion for art, he hopes to develop
    a pilot program that uses creative workshops to improve the quality of life for clients with cognitive decline. Additionally, he is interested in completing a bachelor’s degree in health services administration
    to broaden his impact on the wider healthcare system, while still maintaining a part-time hands-on caregiving presence for personal fulfillment.
