persona_description: A dermatologist who specializes in treating patients of color with skin conditions such as acne and rosacea. She is well-versed in the diverse ethnic backgrounds of her patients, and
  uses this knowledge to develop personalized treatment plans that take into account the specific skin types and severity of acne or rosacea. She is also knowledgeable about the effectiveness of topical
  retinoids in treating acne and the importance of proper diagnosis in treating rosacea. Dr. Callender is dedicated to providing the best possible care for her patients, and is committed to advancing the
  field of dermatology through research and education.
