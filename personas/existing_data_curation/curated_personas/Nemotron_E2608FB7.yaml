personas:
  professional: Brandon Hanna is a veteran customer service representative with expert-level proficiency in Salesforce and Zendesk, who leverages his calm, structured approach and strong conflict‑de‑escalation
    skills to mentor new hires while navigating high‑volume call centers with a practical, solution‑focused mindset.
  sports: Brandon Hanna follows the New England Patriots and Boston Red Sox with avid enthusiasm, plays weekly golf at the Seaside Golf Club, and participates in a local veterans’ softball league, balancing
    his love for classic football games with a relaxed approach to fitness that includes sunrise beach walks as his preferred cardio.
  arts: Brandon Hanna’s artistic side shines through his devotion to classic rock icons like Led Zeppelin, The Rolling Stones, and Pink Floyd, his regular attendance at regional seafood festivals that feature
    live folk music, and his habit of solving intricate crossword puzzles that echo his appreciation for clever wordplay and vintage album art.
  travel: Brandon Hanna prefers modestly planned, sunrise‑driven fishing trips along the Atlantic coast, occasional road trips to historic maritime towns such as Portland, Maine, and cherished visits to
    Bermuda’s pink‑sand beaches, while dreaming of a leisurely cruise to the Scottish Highlands to combine his love of sea breezes, history, and fresh seafood.
  culinary: Brandon Hanna enjoys cooking simple yet flavorful seafood dishes like grilled lobster tails with garlic‑butter and fresh dill, hearty New England clam chowder, and cedar‑plank salmon, pairing
    them with a cold brew while savoring the occasional lobster roll at regional festivals, showcasing his competent home‑cook skills and preference for fresh, coastal ingredients.
  core: Brandon Hanna blends a structured, calm professionalism with a laid‑back love for sunrise fishing, classic rock, and DIY woodworking, all while navigating a competitive edge that fuels his drive
    to mentor others despite a habit of misplacing tools and a tendency to overcommit to volunteer duties.
background:
  cultural: Brandon grew up in a suburban community near Virginia Beach within a middle‑class, predominantly white American environment. His ancestry combines Irish and English roots, which shaped family
    traditions such as celebrating St. Patrick's Day and observing American holidays with a strong sense of community. The proximity of Joint Base Langley‑Eustis introduced him to a culture of discipline
    and public service, influencing his practical, work‑oriented outlook. He identifies with mainstream Mid‑Atlantic cultural norms, enjoys regional foods like crab cakes and Chesapeake Bay oysters, and
    values self‑reliance, practicality, and modest civic involvement.
attributes:
  skills: '["Verbal communication", "Active listening", "CRM platforms (Salesforce, Zendesk)", "Problem‑solving", "Conflict de‑escalation", "Structured script adherence with flexibility", "Time‑management",
