  hobbies: '["Fishing", "DIY woodworking", "Classic football watching", "Classic rock music", "Crossword puzzles", "Beach walks", "Veterans volunteer work", "Community beach clean‑ups", "Pool (billiards)",
    "Casual golf"]'
  career_goals: Brandon aims to transition from a front‑line customer service representative to a supervisory or training position within the next two to three years, leveraging his extensive experience
    to improve team performance and service quality. He plans to obtain a Certified Customer Service Professional (CCSP) credential to formalize his expertise. In the longer term, he envisions moving into
    a part‑time consulting role focused on customer experience design, which would provide a more flexible schedule as he approaches retirement. Financial security and the opportunity to mentor younger
    colleagues are his primary motivations.
