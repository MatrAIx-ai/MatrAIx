personas:
  professional: Inez Mcgowan, a 20‑year‑old driver‑sales associate, blends meticulous route planning and personable negotiation with a curiosity for emerging transport tech, maintaining a practical, safety‑first
    approach that eases their frequent worries about performance.
  sports: Inez Mcgowan jogs three evenings a week with the Atlanta Road Runners, supports the Atlanta Falcons and Atlanta United, and joins casual weekend basketball games at the local YMCA to balance their
    solitary study time.
  arts: Inez Mcgowan relaxes after shifts listening to gospel legends like Mahalia Jackson, R&B icons such as Aretha Franklin, and modern soul artists like Leon Bridges, often humming along while preparing
    Southern dishes.
  travel: Inez Mcgowan favors budget‑friendly weekend road trips, having explored Savannah, Charleston, and New Orleans, and dreams of a cross‑country drive to the Pacific Northwest and a cultural getaway
    to Lisbon, Portugal, though their student finances keep trips modest.
  culinary: Inez Mcgowan cooks Southern comfort foods—fried chicken, collard greens, shrimp and grits, and sweet‑potato pie—using basil, thyme, and rosemary from their garden, though they sometimes over‑salt
    the greens when stressed.
  core: Inez Mcgowan is a pragmatic yet curious 20‑year‑old who balances a high‑pressure driver‑sales role with soulful music, gardening, journaling, and a steadfast aim to uplift their community despite
    frequent worries.
background:
  cultural: Inez grew up in a close‑knit African‑American community in Waynesboro, Mississippi. Her family traditions are steeped in Southern Black culture, emphasizing church gatherings, soulful music,
    soul food, and oral storytelling. Stories of the civil‑rights movement and local leaders instilled a strong sense of resilience and pride. Community events, gospel choirs, and family reunions reinforce
    values of mutual support, hard work, and collective uplift. As a Black woman in a rural setting, Inez navigates both the challenges and opportunities of representation in the transportation industry,
    drawing strength from her heritage and the intergenerational bonds that celebrate perseverance and community solidarity.
attributes:
  skills: '["Safe driving", "Fuel-efficient vehicle operation", "Route planning and optimization", "Logistics coordination", "Customer service", "Sales negotiation", "Freight documentation", "Vehicle maintenance
    and troubleshooting", "Basic computer and software skills", "Time management", "Problem solving"]'
  hobbies: '["Listening to gospel, R&B, and soul music", "Cooking Southern comfort food", "Gardening", "Reading automotive and technology magazines", "Jogging", "Journaling", "Volunteering at the local
    church youth program"]'
  career_goals: Inez aims to obtain a full commercial driver’s license with endorsements for long‑haul and hazardous‑materials transport, and to complete her college degree in supply‑chain management. In
    the short term she wants to advance from driver‑sales roles to a logistics coordinator position, gaining experience in route scheduling and fleet oversight. Long‑term, she aspires to become a logistics
    manager and eventually own a small fleet of trucks that supports local businesses while creating employment opportunities for her community. She also hopes to mentor other young Black women entering
    the transportation field, using her blend of curiosity and practical expertise to guide them.
