personas:
  professional: Mary Foerst, a 16‑year‑old high‑school junior who dreams of a career in hospitality management or emergency medical services, leverages her strong digital literacy, quick problem‑solving,
    and natural mediation skills to excel in school projects and volunteer work at an animal shelter, while juggling her love for spontaneous activities with a desire for structured routines.
  sports: Mary Foerst spends afternoons at a local skate park perfecting tricks and joining occasional pickup basketball games, while cheering for the Orlando Magic and Orlando City SC, and they belong
    to a weekend skate club that meets at the mall’s open‑air court.
  arts: Mary Foerst channels creativity into sketching comic panels inspired by Studio Ghibli and Marvel heroes, reads YA fantasy series like 'Six of Crows' and 'The Raven Cycle', and produces short TikTok
    videos that blend gaming commentary with pet‑adoption stories, often citing artists such as Hayao Miyazaki and author Sarah J. Maas as influences.
  travel: Mary Foerst’s travel style is spontaneous and adventure‑focused, planning last‑minute trips to Orlando’s Walt Disney World and Universal Studios with friends, while dreaming of a future backpacking
    journey to Japan’s Kyoto for ramen and anime conventions, all within a modest teen budget.
  culinary: Mary Foerst enjoys beginner‑level baking, experimenting with chocolate‑chip, snickerdoodle, and double‑chocolate cookies for family gatherings, while also mastering simple meals like grilled
    cheese and pizza slices from the mall food court, and they love adding unconventional ingredients like matcha powder to their dough for a unique twist.
  core: Mary Foerst, a spontaneous yet structure‑seeking 16‑year‑old, blends a passion for sketching, skateboarding, and animal‑shelter volunteering with a pragmatic, sometimes impulsive, approach to school,
    finances, and future service‑oriented careers.
background:
  cultural: Mary was raised in a middle‑class white family in Orlando, Florida. Her upbringing reflects a blend of typical Southern‑U.S. values—emphasis on community, courtesy, and family gatherings—and
    the multicultural, tourism‑driven environment of Central Florida. Frequent family trips to Disney World and local festivals exposed her to diverse cultures, while her family's church involvement reinforced
    a supportive, cooperative ethic. She speaks American English with a regional Floridian accent and identifies with both suburban life and the vibrant, guest‑focused atmosphere of Orlando.
attributes:
  skills: '[''Basic digital literacy (Microsoft Office, Google Workspace)'', ''Social media content creation (short videos, posts)'', ''Interpersonal communication and teamwork'', ''Conflict mediation and
    harmony maintenance'', ''Practical problem solving (budgeting, cooking simple meals)'', ''Event coordination for small groups'', ''Adaptability to changing situations'']'
  hobbies: '[''Playing narrative video games'', ''Sketching and comic art'', ''Skateboarding and visiting malls'', ''Visiting theme parks'', ''Volunteering at animal shelter'', ''Reading young‑adult fantasy'',
    ''Baking simple treats'']'
  career_goals: Mary aims to finish high school and earn her diploma within the next two years, then pursue a certification program in hospitality management or emergency medical services, both of which
    combine structured training with active, on‑the‑ground work. She is drawn to careers that let her help people directly—working in a hotel’s front desk, as an EMT, or as a community support volunteer—so
    she can use her cooperative nature and quick‑thinking skills. Long‑term, she hopes to become a reliable professional who balances routine responsibilities with the flexibility to respond to urgent needs,
    and she envisions returning to Orlando’s tourism industry or local health services after gaining experience.
