  career_goals: Navdeep aims to transition into a technical leadership role such as Lead Engineer or Solution Architect, overseeing the design of mission‑critical, resilient systems for enterprise‑scale
    applications. He strives to earn industry recognitions, contribute to open‑source projects, and publish technical whitepapers on secure, high‑performance architecture. Long‑term, he envisions founding
    a niche SaaS startup that leverages machine learning for predictive analytics while maintaining a disciplined, low‑stress development culture. He also seeks to mentor junior engineers through structured
    code‑review programs and to integrate wellness practices into his team’s workflow to mitigate stress.
