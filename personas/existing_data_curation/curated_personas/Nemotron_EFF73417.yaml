  career_goals: Maria envisions a future where she can combine her love for art and her sociable nature. She aspires to become a graphic designer or multimedia artist, creating visual content that tells
    stories and engages audiences. She also dreams of working in community-oriented creative fields, such as organizing local art festivals, teaching art workshops for kids, or contributing to museum exhibits.
    In the long term, Maria hopes to lead collaborative projects that blend creativity with community impact, possibly pursuing higher education in visual communications or fine arts.
