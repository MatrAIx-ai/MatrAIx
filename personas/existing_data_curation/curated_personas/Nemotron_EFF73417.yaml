personas:
  professional: Maria Martin is an aspiring junior illustrator who blends watercolor painting with photography to craft whimsical visual narratives for her school's literary magazine, and their curiosity
    fuels a habit of exploring unconventional artistic techniques.
  sports: Maria Martin plays forward for the Riverdale Youth Soccer Club, idolizes FC Barcelona’s Lionel Messi, trains three times a week, joins weekend pickup games at the community field, and follows
    the local high school soccer team, the County Tigers, on Saturdays.
  arts: Maria Martin immerses themselves in the arts by drawing watercolor scenes inspired by Claude Monet, designing stage sets for school plays, acting in adaptations of Shakespeare’s comedies, and experimenting
    with DSLR photography to capture candid moments at the town’s weekly art fair, often citing Hayao Miyazaki as a narrative influence.
  travel: Maria Martin prefers weekend road trips to nearby state parks like Whispering Pines, dreams of visiting the Grand Canyon and Tokyo’s Akihabara district to explore anime culture, and plans trips
    meticulously using a scrapbook of postcards, yet sometimes postpones travel plans when school projects mount.
  culinary: Maria Martin enjoys crafting simple meals such as avocado toast with cherry tomatoes, whipping up strawberry‑banana smoothies with garden‑picked mint, and occasionally baking chocolate chip
    cookies for friends after soccer practice, while still experimenting with plating techniques learned from cooking videos.
  core: Maria Martin is a curiosity‑driven teen who balances a vibrant artistic life, team sports, and disciplined saving habits, all while navigating typical adolescent quirks like late‑night sketch marathons
    and occasional snack‑induced sugar spikes.
background:
  cultural: Maria comes from a Midwestern white American background typical of small-town Ohio. Her family traces its roots to German and Irish ancestry, with traditions that include annual community fairs,
    church gatherings, and seasonal celebrations such as the county's fall harvest festival. Growing up in Norwalk, she has been influenced by the values of close-knit community, self-reliance, and appreciation
    for the outdoors. The local culture emphasizes friendliness, volunteerism, and support for local arts, all of which have shaped Maria's upbringing and outlook.
