personas:
  professional: Jackson Burns, a 27‑year‑old freelance visual‑content specialist, blends a self‑taught knack for digital design, vintage film photography, and hands‑on woodworking into client projects,
    yet their spontaneous workflow often clashes with tight deadlines, and they constantly scramble to align creative freedom with professional reliability.
  sports: Jackson Burns fuels their fitness routine with weekend hikes in the Cumberland foothills as a member of the local Cumberland Hiking Society, follows the Tennessee Titans, Memphis Grizzlies and
    Nashville Predators avidly, and they occasionally join a community softball league for casual competition.
  arts: Jackson Burns curates their artistic identity through vintage film photography inspired by Ansel Adams, acoustic guitar sessions echoing Johnny Cash and Sturgill Simpson, lyric writing in the vein
    of The Avett Brothers, regular visits to the downtown Nashville gallery scene featuring contemporary painter Kara Walker, and weekend screenings of indie films by Jim Jarmusch, all of which shape their
    reflective, unconventional creative voice, and they often experiment with mixed media to extend their visual storytelling.
  travel: Jackson Burns prefers spur‑of‑the‑moment road trips that blend rugged hikes in the Great Smoky Mountains with occasional urban art immersion in Nashville, Asheville, and New Orleans, while saving
    modestly for a future solo trek through the Scottish Highlands, and they keep a travel journal to capture each adventure.
  culinary: Jackson Burns enjoys cooking down‑home staples like smoked pork butt, shrimp and grits, and butter‑fried biscuits seasoned with heirloom tomatoes and smoked paprika, while honing a hobbyist’s
    skill at home‑brewing seasonal ales such as a citrus‑infused saison with coriander and orange peel, often pairing meals with locally sourced bourbon and craft beer, and they frequently host tasting
    sessions for friends to share their culinary experiments.
  core: Jackson Burns is a solitary yet fiercely curious 27‑year‑old creator who trades deadline anxiety for late‑night guitar riffs, impulsive gear splurges, and a habit of forgetting to water their indoor
    succulents while chasing the perfect vintage photograph, and they often stay up until dawn editing images.
background:
  cultural: Jackson grew up in a middle‑class white family in rural western Tennessee, where Southern traditions and a close‑knit community shaped his early worldview. He was raised with modest Protestant
    values, an appreciation for country music, and frequent involvement in school events like marching band and community theater. While respecting his regional roots—such as the emphasis on self‑reliance
    and hospitality—he has also been exposed to broader cultural currents through the internet and occasional trips to nearby cities, cultivating a hybrid identity that blends Southern modesty with a modern,
    art‑focused curiosity.
attributes:
  skills: '[''digital photography'', ''basic graphic design (Adobe Photoshop/Illustrator)'', ''sketching and illustration'', ''DIY carpentry and home repair'', ''critical thinking'', ''research and information
    synthesis'', ''self‑taught HTML/CSS'', ''strategic analysis'']'
  hobbies: '[''hiking and nature photography'', ''vintage film photography'', ''woodworking'', ''playing acoustic guitar'', ''reading philosophy'', ''visiting art galleries'', ''attending indie film festivals'',
    ''homebrewing craft beer'', ''experimenting with experimental cooking'', ''collecting vintage cameras'']'
  career_goals: Jackson aspires to transition from his current unemployment to a flexible, freelance career that blends his artistic interests with his practical skills. In the next few years, he aims to
    build a robust portfolio of photography and digital design work, secure steady remote contracts with small businesses, and eventually launch his own boutique visual‑content studio serving local brands
    and online clients. He is motivated by the desire for creative autonomy, financial stability, and the ability to work on his own schedule while maintaining the solitary and small‑group environments
    where he feels most productive.
