  career_goals: Although retired from formal employment, Lavor aims to deepen her impact in the Covington community. She hopes to lead a weekly seniors’ craft circle at the local community center, organize
    an annual neighborhood “Family Potluck” that celebrates local food traditions, and serve as a volunteer liaison to help other seniors access digital resources. She also wishes to document her family’s
    genealogy and share stories with her grandchildren, ensuring cultural heritage is preserved.
