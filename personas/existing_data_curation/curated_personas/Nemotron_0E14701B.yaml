personas:
  professional: Lavor Watts, a retired community organizer, leverages her budgeting expertise and event‑planning flair to coordinate weekly craft circles, church functions, and senior‑center workshops,
    balancing meticulous schedules with the flexibility needed for spontaneous community moments.
  sports: Lavor Watts is an avid supporter of the Atlanta Braves and Atlanta Falcons, attends their games when possible, and participates in a senior‑center pickleball league, favoring gentle cardio over
    high‑impact sports.
  arts: Lavor Watts sings in the local gospel choir, drawing inspiration from Mahalia Jackson and Aretha Franklin, while also devoting afternoons to knitting, quilting, and reading Agatha Christie mysteries
    with her book club.
  travel: Lavor Watts enjoys low‑key road trips to historic Southern towns like Savannah and Charleston, cherishes annual family cruises to the Bahamas, and dreams of a pilgrimage to New Orleans for its
    vibrant music scene.
  culinary: Lavor Watts’s kitchen is a sanctuary of soul‑food staples—seasoned collard greens, skillet‑fried chicken, sweet potato pie, and fresh tomato salads—flavored with herbs from her garden, though
    she occasionally forgets to season the beans correctly.
  core: Lavor Watts blends steadfast routine with warm community spirit, channeling her love of gospel, gardening, and quilting into a life of service, even if she sometimes misplaces her glasses while
    knitting.
background:
  cultural: Lavor’s cultural background is rooted in the African‑American Southern tradition of Walton County. Raised in a tight‑knit extended family, she grew up with church as a central community pillar,
    learning the rhythms of gospel music and the art of communal cooking. Her family’s heritage includes stories of the Great Migration, civil‑rights activism in nearby Atlanta, and a deep appreciation
    for oral history. She carries forward these traditions through her food, music, and dedication to service, honoring both the resilience of her ancestors and the contemporary cultural fabric of Covington.
attributes:
