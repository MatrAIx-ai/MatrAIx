persona_description: A technical communication and translation expert with a focus on international collaboration and usability evaluation, with a particular interest in code glossing, dynamic equivalence,
  ethical teaching, and the teaching of English as a lingua franca in professional communication courses. They have experience in multilateral collaboration between technical communicators and translators,
  and have conducted research on postnational pragmatics, learning to write for an international audience through cross-cultural collaboration and text-negotiation, and managing complexity in technical
  communication and translation. They are also skilled in the use of social media in transatlantic writing/translation and editing projects, and have experience in managing subject-matter experts and language
  specialists collaborating internationally.
