  hobbies: '[''Southern Cooking'', ''Gardening'', ''Book Club'', ''Community Volunteering'', ''Storytelling and Oral History'', ''Church Choir'', ''Walking/Hiking'', ''Crocheting'', ''Local History Tours'',
    ''Hosting Social Gatherings'']'
  career_goals: Although retired, Melanie’s ambition is to remain an active catalyst for community well‑being. She aims to spearhead new volunteer initiatives at the local senior center, create a support
    network for widowed seniors, and lead oral‑history projects that preserve Snow Hill’s cultural heritage. She also hopes to mentor younger volunteers, share her event‑planning expertise, and help shape
    local fundraising campaigns that benefit neighborhood charities.
