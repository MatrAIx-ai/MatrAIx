persona_description: A healthcare professional with expertise in the diagnosis and management of Long QT syndrome, specifically focusing on the assessment, treatment, and prevention of life-threatening
  arrhythmias. They are skilled in interpreting ECGs, identifying the presence of prolonged QT intervals, and diagnosing the underlying causes of QT prolongation. They are also familiar with the use of
  pharmacologic provocation tests and non-synchronized electrical defibrillation to manage patients with Long QT syndrome.
