  hobbies: '[''woodworking'', ''fishing'', ''gardening'', ''adventure hiking'', ''watching high school football'', ''card games at the senior center'', ''volunteering with the local historical society'']'
  career_goals: Approaching retirement, Robert aims to transition from hands‑on labor to a more supervisory and mentorship role. He plans to earn an OSHA Construction Safety Specialty certification so he
    can officially serve as a site safety officer, a position that offers the structure and predictability he values. In the longer term, he hopes to establish a modest independent contracting business
    focused on residential repairs and small remodels, allowing him to apply his methodical work style while maintaining a steady, predictable workload. Additionally, he is interested in part‑time teaching
    opportunities at the local trade school, where he can share his practical knowledge with apprentices and contribute to the community.
