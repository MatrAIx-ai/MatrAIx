  career_goals: Although she is retired from formal employment, Janet is determined to stay active and purposeful. She aims to mentor younger volunteers at the local food bank, lead the planning committee
    for her parish’s annual charity banquet, and compile a small family cookbook that preserves traditional Creole recipes. Janet also plans to complete a genealogy project tracing her Simoneau ancestors
    back to Acadia, and to make day trips to historic sites across Louisiana. Supporting her grandchildren’s education, maintaining good health through regular walks and gardening, and fostering harmony
    within her community are central to her ambitions.
