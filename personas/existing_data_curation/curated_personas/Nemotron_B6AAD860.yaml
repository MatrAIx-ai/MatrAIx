personas:
  professional: Janet Simoneau, a retired office administrator turned community volunteer, leverages their decades of bookkeeping, QuickBooks expertise, and methodical organizing skills to coordinate parish
    events, mentor food‑bank volunteers, and keep the local food pantry’s records impeccably in order.
  sports: Janet Simoneau follows the New Orleans Saints, the Pelicans, and the LSU Tigers, enjoys casual bridge tournaments as their preferred mental sport, and keeps fit by walking the Mississippi River
    trail three times a week, occasionally joining a senior softball league at the local community center.
  arts: Janet Simoneau immerses themselves in Cajun and Zydeco music, regularly listening to Clifton Chenier, BeauSoleil, and the Pine Leaf Boys, while also attending local theater productions of classic
    Southern playwrights and quilting circles inspired by the works of Margaret Turnbull, and they often read historical novels set on the Gulf Coast such as ‘River of Names’ by Claire Wickham.
  travel: Janet Simoneau favors day trips to historic Louisiana sites like Natchitoches, the Oak Alley Plantation, and the French Quarter, dreams of a pilgrimage to the Acadian homeland in Nova Scotia,
    and plans their travel around church festivals and family gatherings, always carrying a notebook to sketch garden ideas from each destination.
  culinary: Janet Simoneau’s kitchen is a hub for Creole cooking, where they perfect gumbo, jambalaya, and crawfish étouffée, can homemade pickled okra and hot sauce for winter, and delight in pairing their
    dishes with fresh crawfish, andouille sausage, and locally sourced okra, while their quilting afternoons often feature a plate of beignets with chicory coffee.
  core: Janet Simoneau, a 67‑year‑old garden‑loving, quilting, community‑oriented retiree, blends methodical organization with a love for Creole traditions, balancing routine with generous community spirit
    while occasionally over‑committing to volunteer projects.
background:
  cultural: Janet was born and raised in Slidell, Louisiana, a community imbued with Cajun and Creole traditions. Her family’s Simoneau surname reflects French-Canadian Acadian ancestry that settled in
    the Gulf Coast centuries ago. Growing up in a Catholic household, she celebrated religious holidays, Mardi Gras, and parish festivals, absorbing the region’s emphasis on hospitality, family, and communal
    food sharing. These cultural influences are evident in her love of Creole cuisine, occasional use of French phrases, and participation in Zydeco music events. The Southern charm and close‑knit community
    of St. Tammany Parish have shaped her values of kindness, cooperation, and a preference for routine and familiar customs.
