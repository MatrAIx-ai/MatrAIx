persona_description: A genetic researcher and medical scientist who is interested in identifying genetic variations that contribute to the risk of valvular heart disease. They are particularly interested
  in the role of lipoprotein(a) levels and the risk of coronary artery disease in the development of aortic valve calcification. They have experience with the Cohorts for Heart and Aging Research in Genome
  Epidemiology (CHARGE) consortium and are familiar with the publication of their findings in the New England Journal of Medicine. They are passionate about the study of genetics and its applications in
  medical research.
