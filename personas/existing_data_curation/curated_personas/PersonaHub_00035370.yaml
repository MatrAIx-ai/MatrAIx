persona_description: A meteorologist or climatologist who specializes in the study of atmospheric dynamics, particularly the behavior of mesocyclones and their associated vorticity. They are interested
  in the detection and identification of mesocyclones using Doppler radar and the analysis of their vertical extent and associated tornado formation. They are also knowledgeable about the formation and
  characteristics of mesocyclones within convective storms, and the potential impact of persistent mesocyclones on weather patterns and climate.
