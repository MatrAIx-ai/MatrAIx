personas:
  professional: Diana Perez, a budding visual artist and community organizer, blends curiosity for new artistic techniques with meticulous project‑planning skills and a warm, collaborative demeanor, allowing
    them to produce polished digital illustrations for school events and to lead youth art workshops that encourage inclusive creativity.
  sports: Diana Perez, an enthusiastic hiker and yoga practitioner, follows the Hartford Yard Goats baseball team and the Yale Bulldogs women's basketball, and participates in the New Haven Trail Runners
    club during spring and fall, valuing balanced fitness over competitive pressure while occasionally joining weekend beach volleyball games at East Rock, demonstrating their love of community and movement.
  arts: Diana Perez, a passionate sketcher, photographer, and graphic novel enthusiast, draws inspiration from the atmospheric landscapes of Ansel Adams, the bold figurative work of Kehinde Wiley, and the
    vivid storytelling of Hayao Miyazaki, while their playlist swings from indie folk artist Phoebe Bridgers to experimental producer Flying Lotus, and they frequently attend student art shows at the Yale
    University Art Gallery to stay connected to emerging talent.
  travel: Diana Perez, a weekend‑trip planner, loves short getaways to Boston’s museums, New York City’s street art festivals, and the coastal cliffs of Acadia National Park, and dreams of future adventures
    to Kyoto’s temples, Barcelona’s architecture, and Iceland’s geothermal lagoons, always balancing school commitments and a modest family travel budget with careful itinerary research on travel blogs.
  culinary: Diana Perez, a moderately skilled home chef, enjoys experimenting with eclectic dishes like spicy miso ramen, Spanish paella with chorizo, and vegan mushroom risotto, often sourcing fresh basil,
    cilantro, and shiitake mushrooms at the local farmers market, yet they sometimes forget to set a timer, resulting in over‑cooked pasta during impromptu cooking nights with friends.
  core: Diana Perez, a curious, organized, and sociable teen artist, balances sketchbooks, community projects, and yoga while occasionally overpacking their bag with art supplies and splurging on limited‑edition
    prints.
background:
  cultural: Diana comes from a White, Anglo-American family rooted in the suburban community of East Haven, Connecticut. Growing up in a New England town near the cultural hub of New Haven has given her
    exposure to both small-town traditions—such as local festivals, Fourth of July parades, and a love for coastal seafood—and the vibrant academic and artistic resources of nearby Yale University. Her
    family values education, community involvement, and seasonal celebrations like Thanksgiving and holiday gatherings. This blend of regional New England sensibility and proximity to a major university’s
    cultural offerings shapes her appreciation for the arts, her collaborative spirit, and her desire to contribute to her community.
