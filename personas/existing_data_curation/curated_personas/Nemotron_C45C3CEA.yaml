  hobbies: '[''sketching'', ''digital illustration'', ''photography'', ''visiting museums'', ''attending art shows'', ''drama club'', ''volunteering at community center'', ''organizing game nights'', ''reading
    graphic novels'', ''exploring new music'', ''coastal hiking'', ''yoga'', ''cooking with friends'']'
  career_goals: Diana aspires to study Fine Arts or Art Education at a university, with the long-term goal of becoming a community arts program director or art therapist who uses creative practice to foster
    personal growth and social cohesion. She dreams of exhibiting her artwork in local galleries, collaborating with cultural institutions such as the nearby Yale University Art Gallery, and eventually
    designing visual campaigns that raise awareness for youth mental-health initiatives. In the interim, she plans to build a robust portfolio through freelance illustration work and continue volunteering
    at the community center to gain experience in program planning and outreach.
