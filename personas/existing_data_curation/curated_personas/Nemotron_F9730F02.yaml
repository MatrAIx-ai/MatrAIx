  career_goals: Josefina aims to advance to a curriculum specialist role within the Wichita school district, where she can design and implement district‑wide culturally responsive programs. She plans to
    pursue a master's degree in Educational Leadership to eventually become an assistant principal, focusing on fostering inclusive school climates and supporting teacher development. Additionally, she
    hopes to lead a mentorship program for newly hired teachers and spearhead partnerships with local Mexican‑American community organizations to enrich student learning experiences.
