personas:
  professional: Josefina Bohorquez, a seasoned elementary and middle‑school teacher in Wichita, blends bilingual expertise and differentiated instruction with a pragmatic love for educational technology,
    positioning themselves as a future curriculum specialist and mentor who champions culturally responsive programs while balancing proven methods and innovative tools.
  sports: Josefina Bohorquez combines their love for the outdoors with community fitness, hiking the Flint Hills on weekends, dancing salsa three times a week, and cheering for the Wichita Thunder and Kansas
    City Royals while participating in a local women's walking club.
  arts: Josefina Bohorquez immerses themselves in the arts by attending Wichita Art Museum exhibitions, listening to the music of Lila Downs and Carlos Vives, performing salsa at club nights, and volunteering
    to read bilingual books, letting creative expression shape their classroom culture.
  travel: Josefina Bohorquez favors carefully planned road trips, revisiting Santa Fe for its art fairs, exploring the Texas Hill Country vineyards, and dreaming of a culinary pilgrimage to Oaxaca, balancing
    family obligations with a thirst for cultural immersion.
  culinary: Josefina Bohorquez delights in cooking authentic Mexican dishes such as mole poblano, chiles en nogada, and pozole, sourcing heirloom corn, dried chilies, and fresh herbs, and enjoys sharing
    their culinary experiments during weekend gatherings with friends and family.
  core: Josefina Bohorquez, a 40‑year‑old bilingual educator, balances curiosity and practicality, turning classroom innovation, salsa rhythm, and kitchen traditions into a lively, community‑centered life.
background:
  cultural: Josefina was raised in a Mexican‑American household that celebrated both Mexican traditions and American customs. Fluent in Spanish and English, she maintains strong ties to her heritage through
    seasonal celebrations like Día de los Muertos and quinceañera gatherings. Her family places high value on education, community service, and collective well‑being, which influences her collaborative
    teaching style and her commitment to creating harmonious classroom environments. Living in Wichita, she bridges cultures by introducing Mexican literature, music, and history into her lessons, fostering
    cross‑cultural understanding among her students.
