  career_goals: Jonathan aims to progress from a management analyst to a senior strategy consultant and eventually assume a leadership role overseeing analytics-driven initiatives within a forward‑thinking
    organization. He plans to pursue an MBA or specialized certification in data science to expand his strategic toolkit. His long‑term ambition includes leading cross‑functional teams that develop sustainable
    operational improvements, mentoring junior analysts, and contributing to community‑focused projects that enhance public sector efficiency in the Twin Cities region.
