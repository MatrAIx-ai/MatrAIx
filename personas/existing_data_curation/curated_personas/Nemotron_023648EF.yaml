personas:
  professional: Sandora Hewitt is a seasoned automotive mechanic with three decades of hands‑on expertise in diesel lift trucks and vintage car restoration, excelling at engine rebuilds, electrical diagnostics,
    and MIG/TIG welding while channeling a competitive drive to achieve high first‑time‑fix rates and mentor apprentices toward ASE Master Mechanic certification.
  sports: Sandora Hewitt follows the local River City Mariners baseball team avidly, roots for the nearby women’s soccer club the City Strikers, and commits to a twice‑weekly walking program with the downtown
    seniors’ fitness club to stay active despite a busy workshop schedule.
  arts: Sandora Hewitt’s artistic side resonates with the soulful sounds of Marvin Gaye, Aretha Franklin, and the uplifting harmonies of her town’s gospel choir, while she occasionally crochets to the rhythm
    of classic car restoration shows like Wheeler Dealers, blending auditory inspiration with tactile creativity.
  travel: Sandora Hewitt prefers structured road‑trip itineraries that revolve around classic‑car events, such as the Woodward Dream Cruise in Detroit and the Hershey Classic Car Show, while also planning
    occasional retreats to Asheville’s mountain herb farms for gardening inspiration, balancing her love of engines with a desire for tranquil nature escapes.
  culinary: Sandora Hewitt’s culinary habit blends garden‑fresh flavors into her kitchen, where she frequently cooks herb‑infused roasted salmon, tomato‑laden spaghetti sauce seasoned with basil and oregano
    from her own patch, and slow‑cooked barbecue ribs glazed with a homemade brown‑sugar and smoked‑paprika rub, rounding out meals with buttery biscuits and crisp garden salads.
  core: Sandora Hewitt is a meticulous, competitive mechanic who balances a love of vintage cars, a garden, and soulful music with a pragmatic eye on retirement and mentoring, all while wrestling with a
    penchant for worry and occasional splurges on rare parts.
background:
  cultural: Sandora grew up in the Detroit metropolitan area, where her African‑American heritage is intertwined with the city’s legacy of steel, auto manufacturing, and Motown music. Her family emphasizes
    self‑reliance, community support, and the value of skilled trades, shaping her practical work ethic. Church has been a quiet yet steady presence, providing a close‑knit network that respects her reserved
    nature. She carries the cultural resilience of the local Black community, celebrating traditions of soulful music, storytelling, and collective uplift while navigating a predominantly male field with
    confidence.
attributes:
  skills: '["Engine diagnostics and repair", "Diesel engine overhaul", "Hydraulic system maintenance", "Electrical wiring and troubleshooting", "MIG/TIG welding", "Mobile equipment installation", "Preventative
    maintenance planning", "Parts inventory management", "Technical schematic interpretation", "Customer service for small‑group clients"]'
  hobbies: '["Classic car restoration", "Herb and vegetable gardening", "Listening to Motown and gospel music", "Reading automotive manuals and history", "Crossword puzzles and Sudoku", "Crochet"]'
  career_goals: Sandora aims to earn the ASE Master Mechanic certification within the next two years, solidifying her technical credibility. She hopes to open a modest, women‑owned specialty shop focused
    on diesel lift trucks and vintage car restoration, providing a safe learning environment for apprentices. Mentoring is a priority; she envisions becoming a certified trainer for local trade schools.
    Financially, she is planning for a comfortable early retirement that will allow her to support her family and fund community projects. Her competitive nature makes her set measurable targets for shop
    throughput and customer satisfaction.
