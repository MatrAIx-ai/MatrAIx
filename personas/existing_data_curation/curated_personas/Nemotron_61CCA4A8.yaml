personas:
  professional: Rafael Agustin, a 58‑year‑old retail veteran with three decades mastering bilingual customer service, visual merchandising, and staff coaching, channels his curiosity for art into culturally
    resonant store displays while pursuing a promotion to store manager or community liaison and nurturing a side dream of a neighborhood café‑gallery.
  sports: Rafael Agustin enjoys weekend hikes across the West Texas prairie, follows the Dallas Cowboys in the fall, roots for the Houston Astros during baseball season, and participates in a senior walking
    club that convenes after church gatherings for gentle cardio and camaraderie.
  arts: Rafael Agustin immerses himself in the local art scene, paints vivid folklore scenes inspired by Frida Kahlo and Diego Rivera, strums acoustic guitar to the tunes of Luis Miguel and Lila Downs,
    and dances energetically at community festivals alongside performances by Mariachi Los Camperos.
  travel: Rafael Agustin prefers well‑planned road trips that blend cultural immersion and relaxation, having explored Oaxaca and Guanajuato on past vacations, and now hopes to visit the historic towns
    of Santa Fe and Taos in New Mexico while carefully balancing the café‑gallery’s start‑up budget.
  culinary: Rafael Agustin, a confident home cook, delights in preparing mole poblano, chicken tamales, and pozole with fresh chilies, epazote, and hominy, while also experimenting with Tex‑Mex BBQ ribs
    seasoned with cumin and smoked paprika, often sharing his creations at church potlucks.
  core: Rafael Agustin is a culturally curious, socially vibrant 58‑year‑old who blends retail expertise with folk‑art passion, juggling anxiety‑driven budgeting quirks and a steadfast dream of a community
    café‑gallery.
background:
  cultural: Rafael is a Mexican‑American who grew up in a bilingual household in South Texas, preserving the language, food, and celebrations of his heritage. He regularly participates in Día de los Muertos
    altars, quinceañeras, and posada festivities, and his Catholic upbringing emphasizes community service. Living in Lubbock, he blends Mexican traditions with Texan culture—enjoying both mariachi music
    and local country gatherings—while actively sharing his heritage with coworkers and neighbors.
attributes:
