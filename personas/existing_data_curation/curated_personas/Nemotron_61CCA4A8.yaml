  hobbies: '[''Visiting Art Galleries and Museums'', ''Painting (Mexican folk scenes)'', ''Cooking Traditional Mexican Cuisine'', ''Playing Acoustic Guitar'', ''Dancing (cumbia, salsa) at community festivals'',
    ''Hiking in the Lubbock area'', ''Volunteering for Church and Community Events'', ''Participating in Trivia Nights'', ''Reading Art History'', ''Gardening'']'
  career_goals: Rafael aims to advance to a store manager or community liaison role where he can mentor younger employees and shape the store’s cultural atmosphere. He also dreams of opening a small neighborhood
    café/gallery that showcases Mexican folk art and offers space for local artists, while maintaining a part‑time consulting role to help other small retailers improve customer experience.
