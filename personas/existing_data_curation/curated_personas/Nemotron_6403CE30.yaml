    social gatherings with friends"]'
  career_goals: Esteban plans to obtain his GED within the next year and enroll in a community‑college business program to solidify his management knowledge. In the short term, he seeks promotion to assistant
    store manager, where he can apply his high standards and organizational expertise to improve operational efficiency and employee development. Long‑term, he envisions opening a boutique that doubles
    as a rotating gallery for local Mexican‑American artists, offering curated home‑decor products while providing a platform for emerging talent. He also hopes to mentor at‑risk youth in his community,
    using his retail experience to teach job‑readiness skills and foster entrepreneurial mindsets.
