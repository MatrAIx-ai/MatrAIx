personas:
  professional: Esteban Schloeter is a direct-to-consumer sales specialist at a Houston boutique, using bilingual fluency, precise inventory management, and art-driven visual merchandising to consistently
    surpass targets, while they maintain a calm, compassionate demeanor that cultivates a harmonious, high-performing team.
  sports: Esteban Schloeter is a hobbyist soccer player in a co-ed local league, a regular member of the Houston Hiking Club, and a devoted fan of the Houston Dynamo (MLS) and the Astros (MLB), combining
    weekly matches, weekend trail runs, and disciplined cross-training to stay fit.
  arts: Esteban Schloeter immerses themselves in Houston’s vibrant art scene, frequently sketching watercolors at the Contemporary Arts Museum Houston, drawing inspiration from Frida Kahlo, Diego Rivera,
    and local muralist JR, and they volunteer for community mural projects that blend traditional motifs with modern street art.
  travel: Esteban Schloeter prefers weekend getaways that blend culture and nature, meticulously planning trips to Austin for live-music festivals, driving to New Mexico’s Taos Pueblo for art immersion,
    and dreaming of a future pilgrimage to Oaxaca’s culinary tours, balancing budget constraints with a love for spontaneous roadside stops.
  culinary: Esteban Schloeter enjoys cooking at an intermediate level, mastering dishes such as mole poblano, chilaquiles with avocado, and tlayudas, often adding unconventional twists like smoked chipotle-infused
    quinoa, and they relish sourcing fresh cilantro, tomatillos, and heirloom chilies at the local farmers market.
  core: Esteban Schloeter is a calm, art-obsessed sales pro who budgets meticulously, hikes for peace, and whips up inventive Mexican comfort food while they mentor youth and dream of a boutique-gallery
    hybrid.
background:
  cultural: Born to Mexican‑American parents who immigrated from Jalisco, Esteban grew up in a bilingual household where Spanish was spoken nightly and Mexican traditions were celebrated with gusto. Family
    gatherings centered around food, music, and storytelling, instilling a strong sense of community and hospitality. He participates in local celebrations such as Día de los Muertos and the annual Fiesta
    de la Independencia, and he maintains ties to the Mexican diaspora in Harris County through church groups and cultural clubs. His upbringing blends Mexican collectivist values—emphasis on family, respect,
    and mutual support—with the independent, entrepreneurial spirit of Texas. This cultural mosaic shapes his compassionate approach to work, his love for art and music, and his desire to create spaces
    where diverse voices can be heard.
