  career_goals: Looking ahead, Michael aims to transition from store‑level supervision to a district‑manager role, overseeing multiple locations while introducing innovative yet practical retail strategies.
    He hopes to complete his undergraduate degree in business administration, deepen his expertise in digital retail tools, and develop a mentorship program for emerging supervisors. Eventually, he envisions
    opening a small boutique or consulting for local businesses, sharing his blend of experience, calm leadership, and flexible problem‑solving with the community.
