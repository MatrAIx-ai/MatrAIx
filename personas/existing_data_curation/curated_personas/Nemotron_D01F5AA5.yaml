personas:
  professional: Michael Lariche, a seasoned retail supervisor with three decades of frontline experience, excels at motivating small-town sales teams, fine-tuning inventory and visual merchandising, and
    they blend practical curiosity with calm authority as they pursue a district-manager role and a business degree.
  sports: Michael Lariche, an avid fan of high-school football and a seasonal participant in the Lincoln County Hiking Club, cheers for the New Mexico State Aggies in the fall, enjoys watching the Albuquerque
    Isotopes baseball games in the summer, and they maintain casual fitness through weekend hikes, occasional fishing trips, and a monthly bilingual softball league match.
  arts: Michael Lariche, a community-theater enthusiast who sings along to classic rock icons like Bruce Springsteen and The Doors, regularly attends the Hondo Fiesta performances and volunteers for bilingual
    local stage productions, they find that the mix of live drama and music shapes their social identity.
  travel: Michael Lariche, a spontaneous road-trip planner, prefers flexible itineraries that blend high-desert drives with cultural stops such as Santa Fe's art markets, the historic town of Taos, and
    occasional weekend getaways to the Grand Canyon, they balance modest retirement income with a love for exploring both nearby mountain retreats and distant locales like San Miguel de Allende.
  culinary: Michael Lariche, a competent backyard grill master and modest gardener, delights in cooking green-chile cheeseburgers, roasted corn, and carne adovada using fresh home-grown tomatoes and red
    chiles, they often host neighborhood barbecues where classic rock plays and the scent of smoky peppers fills the air.
  core: Michael Lariche blends rugged self-reliance with a sociable, curious spirit, navigating retirement, community leadership, and occasional disorganization through calm resilience and a love for classic
    rock and desert barbecues.
background:
  cultural: Michael is a white American raised in the rural Southwest, with deep roots in the Hondo, New Mexico community. His family background combines Anglo‑American pioneer heritage and a long tradition
    of small‑town retail work. Growing up, he absorbed the values of self‑reliance, hospitality, and community celebration that characterize the high desert region, while also embracing the multicultural
    flavor of New Mexico, including local Hispanic festivals, cuisine, and bilingual friendliness. These influences shape his respectful, inclusive outlook and his appreciation for both traditional and
    new ideas.
