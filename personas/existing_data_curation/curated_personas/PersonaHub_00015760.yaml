persona_description: A paleontologist and researcher who specializes in the study of dinosaur embryos and their development, particularly in the field of embryology and comparative anatomy. They are known
  for their expertise in the use of synchrotron radiation to obtain detailed images of the fragile contents of dinosaur eggs, which have provided unique insights into the development of baby dinosaurs and
  their comparison with the development of living archosaurs such as birds and crocodiles. They have published numerous papers on the topic and have made significant contributions to the field of dinosaur
  embryology.
