  career_goals: Alisa dreams of a career that blends her curiosity for science with her desire to help others. She aims to become a pediatric nurse or a school counselor, focusing on child health and well-being.
    In college she plans to study biology and psychology, and she hopes to lead community health outreach programs in her Brooklyn neighborhood. In the short term, she wants to join her school's science
    club, take on leadership roles, and volunteer at local community centers.
