personas:
  professional: Alisa Miller, an aspiring coder and budding pianist, channels their organized curiosity and sociable nature into designing Scratch projects that weave mystery storylines with original piano
    compositions, while regularly collaborating with drama club peers to script interactive performances and volunteering at the community center to teach programming basics.
  sports: Alisa Miller plays midfield for the Riverside Middle School soccer club, balances after‑school drills with weekend pick‑up games, and follows the US Women’s National Team and the Seattle Sounders
    FC for inspiration, often emulating training routines to boost stamina and teamwork.
  arts: Alisa Miller expresses creativity through piano renditions of Ludovico Einaudi’s nocturnes, sketching characters inspired by Studio Ghibli’s animation style, starring in drama club productions of
    a modernized ‘A Midsummer Night’s Dream’, and devouring mystery novels by Agatha Christie and R.L. Stine, which collectively shape their artistic voice.
  travel: Alisa Miller prefers meticulously planned weekend road trips to nearby natural wonders like Yosemite National Park and the Oregon Coast, enjoys cataloguing each adventure in a travel journal,
    and dreams of future family vacations to Kyoto’s cherry‑blossom festivals and the historic streets of Paris, all while balancing school commitments and a modest travel allowance.
  culinary: Alisa Miller, a budding home chef with beginner‑level confidence, loves crafting quick vegetable sushi rolls with cucumber and avocado, perfecting spaghetti carbonara seasoned with pancetta
    and Parmesan, and snack‑sourcing fresh garden tomatoes for homemade bruschetta, often experimenting after soccer practice while favoring balanced meals that fuel their active days.
  core: Alisa Miller, a methodical yet worry‑prone 13‑year‑old, juggles piano practice, soccer drills, and community coding projects while habitually over‑packing their backpack with sketchbooks, emergency
    snacks, and a pocket‑sized stress ball.
background:
  cultural: Alisa comes from a European-American (likely Italian-Irish) background and was raised in the vibrant, multicultural borough of Brooklyn. Her family values education, community involvement, and
    blends traditional holidays with the diverse cultural experiences of the city. She regularly visits local parks, cultural festivals, and community centers, which have broadened her appreciation for
    the mosaic of cultures in New York while maintaining her own family traditions.
