personas:
  professional: Wilfredo Granados, a 27‑year‑old architect, blends meticulous code‑compliant drafting with desert‑responsive sustainable strategies, leveraging bilingual communication to coordinate multidisciplinary
    teams while staying grounded in client budgets and emerging material innovations.
  sports: Wilfredo Granados fuels fitness with early‑morning hikes across the Sonoran Desert, weekly trail‑run sessions with the Phoenix Runners club, occasional indoor rock‑climbing at a local gym, and
    vocal support for the Arizona Cardinals, Phoenix Suns, and Arizona Diamondbacks during the season.
  arts: Wilfredo Granados cultivates artistic expression through landscape photography inspired by Ansel Adams and urban studies by Sebastião Salgado, showcases acoustic guitar renditions of Neil Young
    and José González at community gatherings, and regularly attends performances of the Phoenix Symphony and local theater productions featuring acclaimed actors.
  travel: Wilfredo Granados plans weekend road trips with the same precision as a site analysis, favoring sunrise hikes in Sedona, sunset drives through the Grand Canyon, and cultural detours to Santa Fe,
    while dreaming of longer escapes to Barcelona’s modernist architecture and Kyoto’s Zen gardens, balancing limited savings with a love for spontaneous desert camping.
  culinary: Wilfredo Granados channels family culinary tradition into a proficient kitchen practice, mastering mole with ancho chilies, toasted cacao, and spices, rolling tender tamales from masa harina
    and fresh corn husks, and pairing these with homemade chilaquiles topped with queso fresco and cilantro, while occasionally experimenting with a smoky chipotle‑infused salsa verde.
  core: Wilfredo Granados, a methodical yet adventurous 27‑year‑old architect, harmonizes desert‑inspired sustainable design with a passion for photography, guitar, and family cooking, all while budgeting
    wisely and staying emotionally steady.
background:
  cultural: Wilfredo was raised in a close‑knit Mexican household in Tolleson, where family gatherings, fiestas, and the rhythmic cadence of Spanish shaped his worldview. He grew up surrounded by the visual
    language of Mexican vernacular architecture—adobe walls, courtyards, and vibrant tilework—which subtly informs his design aesthetic. His bilingual fluency enables him to navigate both the Hispanic community
    and the broader professional environment in Maricopa County, fostering inclusive collaboration on projects that serve a diverse client base. He remains actively involved in local cultural celebrations,
    such as Día de los Muertos and Cinco de Mayo parades, and often incorporates traditional Mexican motifs and color palettes into his architectural concepts.
