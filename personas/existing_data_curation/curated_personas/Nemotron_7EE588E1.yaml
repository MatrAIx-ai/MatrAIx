  hobbies: '[''Hiking in the Sonoran Desert'', ''Photography'', ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Youth mentorship in architecture'', ''Reading architecture journals'', ''Model
    building (scale architectural models)'', ''Chess'']'
  career_goals: Wilfredo aims to become a licensed architect within the next three years by completing the NCARB certification process. He aspires to lead design projects that focus on affordable, energy‑efficient
    housing for the growing Sun Corridor community, incorporating passive solar design and water‑conservation strategies. Over the longer term, he hopes to establish his own boutique firm that blends modern
    architectural practices with culturally resonant design elements rooted in Mexican heritage, while mentoring young designers from underrepresented backgrounds.
