personas:
  professional: Rebecca Breaux, a 15‑year‑old high school sophomore, blends curiosity with practicality as a budding wildlife photographer and school blog contributor, meticulously planning photo outings
    while staying flexible enough to capture spontaneous sunset vistas, and volunteers at the local animal shelter where they assertively suggest improvements to animal care routines, even as they worry
    about meeting deadlines and balancing responsibilities.
  sports: Rebecca Breaux, a member of the Ridgeley Trail Runners club and a sophomore on the West Virginia Mountaineers cross‑country team, enjoys early‑morning hikes along the Potomac River and occasional
    pickup soccer games with friends, preferring solo trail runs when they need to decompress yet assertively leading group warm‑ups and cheering for the Washington Nationals on weekend game days.
  arts: Rebecca Breaux channels their curiosity and stress into artistic pursuits, strumming acoustic renditions of John Hartford and Sufjan Stevens on a battered guitar while capturing macro shots of wildflowers
    for a TikTok channel that blends Appalachian folk storytelling with modern indie aesthetics, and they unwind crocheting blankets to the soft background of Gillian Welch, though they sometimes lose track
    of time editing videos at the expense of homework.
  travel: Rebecca Breaux meticulously plans weekend hikes using topographic maps yet occasionally abandons the schedule for spontaneous sunrise trips to the Potomac, dreams of trekking the Appalachian Trail
    beyond the region and exploring the historic streets of Boston, but their modest family budget and lingering worry about missing school keep most travel adventures within Virginia's Shenandoah National
    Park and nearby West Virginia state parks.
  culinary: Rebecca Breaux, an enthusiastic home chef with a knack for turning garden harvests into rustic meals, often cooks hearty cornbread with jalapeño honey butter and brews fragrant wild mint tea,
    while also indulging in indie staples like avocado toast topped with radish sprouts, though their tendency to over‑season when stressed sometimes leads to overly salty soups.
  core: Rebecca Breaux is a 15‑year‑old nature‑obsessed photographer and guitarist who balances relentless curiosity with a worry‑filled self‑critique, turning stress into TikTok crafts, yet often procrastinates
    on schoolwork and over‑cooks meals when anxious.
background:
  cultural: Rebecca grew up in Ridgeley, West Virginia, a small Appalachian town along the Potomac River. Her family has deep roots in the region, with generations of farmers and coal‑mining workers who
    value self‑reliance, close‑knit family ties, and a respect for the natural landscape. The community is predominantly Protestant, and she participates in church youth events and local festivals that
    celebrate Appalachian folk music and storytelling. Rural life in Mineral County emphasizes practical skills, community cooperation, and modest living, which shape Rebecca's balance of curiosity and
    practicality. While the area faces economic challenges, there is a strong tradition of caring for neighbors and protecting the environment, influences that inform her ambitions and everyday activities.
attributes:
  skills: '[''Cooking and meal preparation'', ''Gardening and small‑scale horticulture'', ''Basic animal care'', ''Digital content creation (photo/video editing)'', ''Organizational planning for school
    projects'', ''First aid and CPR certification'', ''Introductory biology knowledge'', ''Handcrafts (knitting and crocheting)'']'
  hobbies: '[''Hiking and trail exploration'', ''Nature photography'', ''Reading fantasy and sci‑fi novels'', ''Journaling and creative writing'', ''Playing acoustic guitar'', ''DIY crafts (knitting and
    crocheting)'', ''Creating short TikTok videos about gardening'', ''Volunteering at a local animal shelter'']'
  career_goals: Rebecca aspires to attend a community college and pursue a degree in environmental science or veterinary technology, aiming to combine her love of nature with her practical skill set. She
    dreams of working in wildlife rehabilitation or as a park ranger in the Appalachian region, where she can protect local ecosystems while educating visitors. Recognizing the economic challenges of her
    hometown, she also hopes to develop a modest online presence that shares eco‑friendly DIY tutorials, generating income that supports both her education and her family. Ultimately, she wants a career
    that balances scientific curiosity, hands‑on problem solving, and community service.
