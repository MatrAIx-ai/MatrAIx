  hobbies: '[''Fishing'', ''Creole cooking'', ''Playing harmonica'', ''Attending Mardi Gras parades'', ''Reading craft history'', ''Mentoring youth'', ''Gardening'', ''Visiting gem trade shows'']'
  career_goals: He aims to expand his boutique by opening a satellite studio in nearby Amite to broaden his market while preserving traditional techniques. He wants to develop an online storefront showcasing
    his designs, attain GIA certification for gem appraisal, and mentor the next generation of Black artisans in Tangipahoa Parish. He also hopes to document and revive regional Creole jewelry motifs, ensuring
    their legacy for future collectors.
