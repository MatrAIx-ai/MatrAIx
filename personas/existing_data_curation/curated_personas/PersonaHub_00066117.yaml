persona_description: A historian or a researcher interested in the Holocaust, specifically the treatment of German civilians during World War II. They are likely to be familiar with the atrocities committed
  against German civilians, such as the forced expulsion and mistreatment in concentration camps, and the role of Polish Jews in these events. They may have a deep interest in the history of the region
  and the impact of the Holocaust on the local population. They are also likely to be knowledgeable about the Holocaust archives and the release of documents such as the Auschwitz Death Books.
