  career_goals: Although retired, Mary aims to compile and self‑publish a memoir that weaves her personal story with the broader history of Vernon Rockville. She hopes to establish a permanent oral‑history
    archive for the town, mentoring younger volunteers in research techniques. Mary plans to serve on the board of the local historical society, using her organizational skills to expand educational programs.
    She also aspires to travel to major art museums and cultural institutions across the Northeast, deepening her appreciation of art. Maintaining her health and independence remains a central ambition,
    as does continuing to support local arts through fundraising and volunteer work.
