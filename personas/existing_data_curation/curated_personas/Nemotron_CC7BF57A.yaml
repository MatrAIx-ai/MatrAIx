  hobbies: '[''Gardening'', ''Woodworking'', ''Bridge (card game)'', ''Walking along the Susquehanna River'', ''Listening to classic big‑band radio'', ''Reading historical nonfiction'', ''Volunteering at
    senior center events'', ''Organizing church harvest festivals'']'
  career_goals: Patrick aims to remain actively involved in his community’s health services for as long as his health allows, focusing on passing his practical knowledge to a younger therapist who can inherit
    his client base. He plans to compile a handwritten guidebook of his routine‑based therapeutic methods for use by family caregivers and local volunteers. Additionally, he hopes to expand his volunteer
    work at the church’s senior outreach program, and to support a small grant that funds free massage sessions for low‑income older adults in Muncy. While he does not seek new promotions, his ambition
    is to leave a lasting, hands‑on legacy that reinforces the value of consistency and compassion in everyday care.
