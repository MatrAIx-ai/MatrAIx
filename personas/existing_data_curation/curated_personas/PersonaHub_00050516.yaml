persona_description: A team of scientists who specialize in the description and identification of invertebrate animals from various ecosystems, particularly those found in Central Sulawesi. They are dedicated
  to uncovering and documenting new species, and are interested in the intricacies of their descriptions, including the number and shape of spikes on the head shield or carapace, the length, shape, and
  distribution of legs and mandibles. They are also interested in the DNA analysis of these animals, as well as the care and feeding of aquarium fish.
