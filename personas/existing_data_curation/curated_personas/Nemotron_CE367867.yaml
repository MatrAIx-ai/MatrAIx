  hobbies: '[''Gardening (herbs, native plants)'', ''Cooking traditional Southeast Asian cuisine'', ''Hiking and nature walks'', ''Bird‑watching'', ''Community potluck participation'', ''Knitting and crocheting'']'
  career_goals: She aims to become a lead custodian for the local school district, earning a supervisory role that lets her mentor newer staff and implement greener cleaning protocols. Trang is also considering
    a certificate in facilities management to broaden her skill set, and she dreams of eventually launching a small, community‑focused cleaning service that emphasizes environmentally safe practices and
    flexible scheduling for fellow residents.
