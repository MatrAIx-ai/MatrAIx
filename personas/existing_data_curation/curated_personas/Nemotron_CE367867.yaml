personas:
  professional: Trang Chew is an experienced custodian with two decades of hands-on facility maintenance, blending a practical, eco-mindful approach with a curiosity for greener cleaning methods and a relaxed
    yet supportive leadership style as they mentor junior staff.
  sports: Trang Chew enjoys weekend hikes on the Kitsap Peninsula trails and early-morning bird-watching sessions, while cheering on the Seattle Seahawks and Seattle Sounders and occasionally joining the
    local "Kitsap Trailblazers" walking club for low-key cardio.
  arts: Trang Chew is an avid fan of folk singer Brandi Carlile, indie-rock band The National, and the community theater’s annual productions of classic plays, often sprinkling backyard gatherings with
    acoustic guitar renditions of songs by the Milk Carton Kids.
  travel: Trang Chew prefers low-key road trips with flexible itineraries, having explored the misty forests of Olympic National Park and the vibrant street markets of Hanoi, while dreaming of a relaxed
    spring visit to Kyoto’s temple gardens and a weekend getaway to Vancouver’s seaside neighborhoods.
  culinary: Trang Chew is a confident home cook who masters pho broth simmered for hours, crisp lumpia stuffed with garden-grown herbs, and braised fish glazed with lemongrass, often pairing these meals
    with freshly harvested cilantro, Thai basil, and a splash of lime, while delighting in sharing them at community potlucks.
  core: Trang Chew blends a green-focused custodial career with a love for herb gardening, hearty Southeast Asian cooking, and spontaneous hikes, all while juggling a relaxed approach to planning and a
    habit of misplacing receipts.
background:
  cultural: Trang’s family originates from Vietnam’s Mekong Delta region, and her upbringing blended Vietnamese customs with broader Southeast Asian influences from relatives who migrated from Thailand
    and the Philippines. She grew up speaking Vietnamese at home while also learning English in school, fostering a bicultural perspective that values family cohesion, respect for elders, and the celebration
    of festivals such as Tet and the Mid‑Autumn Festival. Since moving to Seabeck, she has woven her heritage into local life by sharing homemade dishes at community events and by maintaining a modest shrine
    that honors her ancestors.
attributes:
