persona_description: A neuroscientist who specializes in the study of brain injuries and their effects on language processing. She has a deep understanding of the P.T.O and PTO areas of the brain, and how
  they coordinate information from different sensory processing centers. She is particularly interested in the relationship between trauma to the left brain and the development of alexia, as well as the
  potential for output language to still exist even if the PTO is damaged. She is also skilled in research design and analysis, and has experience with both animal models and human case studies in the field
  of alexia.
