  career_goals: Elizabeth aims to move into senior product leadership, eventually becoming a Director of Product Development where she can drive data‑driven solutions in health‑tech and fintech sectors.
    She also envisions launching a boutique consulting firm that helps mid‑size companies adopt agile practices while preserving flexible schedules for work‑life balance. Mentoring emerging women technologists
    and contributing to community tech education are central to her long‑term professional aspirations.
