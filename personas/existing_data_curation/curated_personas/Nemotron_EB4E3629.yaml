personas:
  professional: Elizabeth Sanders blends a graduate business degree with hands‑on Agile Scrum mastery, turning strategic objectives into data‑driven product initiatives by leveraging SQL, Python, and user‑experience
    research while navigating stakeholder expectations, and they often embrace a flexible sprint cadence that reflects their relaxed approach to deadlines and occasional disorganization.
  sports: Elizabeth Sanders enjoys kayaking on the St. Lucie River with her husband, follows the Tampa Bay Rays and Miami Heat for relaxed weekend viewing, and they practice yoga thrice weekly at a local
    studio, balancing low‑key fitness with a love for water‑sport camaraderie.
  arts: Elizabeth Sanders reads contemporary fiction by authors like Sally Rooney and Haruki Murakami, streams indie folk artists such as Bon Iver and Sufjan Stevens, attends intimate performances at the
    Brevard Center for the Arts, and they let these creative outlets color their product design sensibilities.
  travel: Elizabeth Sanders favors spontaneous weekend trips to nearby coastal towns like Key West and historic Charleston, while dreaming of a summer immersion in Kyoto’s tea gardens, and they plan mostly
    on the fly but remain mindful of their modest budget and family time.
  culinary: Elizabeth Sanders experiments with seasonal dishes like heirloom tomato bruschetta with fresh basil, grilled halloumi with roasted figs, and homemade kimchi, using garden‑grown herbs and a growing
    confidence in sous‑vide techniques, and they sometimes over‑ambitiously tackle meals that overrun their schedule.
  core: Elizabeth Sanders is a curiosity‑driven product strategist who balances pragmatic ambition with a laid‑back, occasionally disorganized lifestyle, peppered with yoga, kayaking, and a penchant for
    over‑cooking seasonal recipes, and they often juggle worry with a resilient optimism.
background:
  cultural: Raised in a middle‑class, Anglo‑American family in the Midwest, Elizabeth internalized values of education, self‑reliance, and community service. Since moving to Port Saint Lucie, Florida, she
    has adopted the region’s subtropical rhythm, blending Southern hospitality with a relaxed coastal lifestyle. Her cultural identity reflects a mainstream American work ethic tempered by an inclusive,
    community‑focused outlook, evident in her participation in local charities, neighborhood events, and professional networks.
