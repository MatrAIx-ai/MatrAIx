persona_description: A healthcare professional who is skeptical of the idea of computers replacing doctors, but acknowledges the potential for technology to influence patient care. They are aware of the
  complexities of diagnosing diseases and the limitations of current technology in performing manual tests. They are open to the possibility of more standardization and process-driven care models, but recognize
  that these changes will likely be gradual. They are interested in the potential for computers to be used to help doctors make better decisions, but also recognize that computers cannot replace human error
  and intuition.
