persona_description: A researcher and professor who specializes in the study of accounting and finance, particularly in the area of voluntary disclosure and compliance with international accounting standards.
  He/she is currently working as an editor-in-chief of the Arab Journal of Accounting and has published several research papers in reputable journals. The persona is knowledgeable about the determinants
  of voluntary financial disclosure by Swiss listed companies, the impact of corporate attributes on the extent of mandatory disclosure by listed companies in Zimbabwe, and the early adoption of consolidated
  accounting in Spain.
