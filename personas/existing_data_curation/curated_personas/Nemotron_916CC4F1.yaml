personas:
  professional: Ryan Labarraque, a seasoned facility maintenance specialist with twenty‑five years of expertise in commercial cleaning, floor care, chemical safety, and inventory control, leverages a methodical
    yet adaptable mindset and a quiet assertiveness to mentor staff and drive eco‑friendly, low‑waste cleaning protocols as he prepares for a facilities‑manager role.
  sports: Ryan Labarraque enjoys low‑impact outdoor activities like fly‑fishing in the nearby river and occasional weekend hikes, follows the local minor‑league baseball team the River City Rockets, and
    keeps a modest membership at the community gym where he rotates between stationary cycling and light weight training to stay limber.
  arts: Ryan Labarraque immerses himself in classic folk music from artists like Bob Dylan and Joan Baez, appreciates the realism of Edward Hopper paintings, and spends quiet evenings listening to historical
    podcasts while sketching woodworking designs, letting these cultural touches fuel his creative woodworking projects.
  travel: Ryan Labarraque favors purposeful road trips to sustainable farms in the Pacific Northwest and historic river towns such as Asheville, balancing his curiosity for heritage with a preference for
    solo or small‑group travel that minimizes stress and logistical overwhelm.
  culinary: Ryan Labarraque, a competent home cook, favors hearty, earth‑rooted meals like roasted beet and carrot salad with goat cheese, grilled trout seasoned with fresh dill, and homemade whole‑grain
    bread, often experimenting with foraged herbs from his garden to complement his modest but reliable kitchen repertoire.
  core: Ryan Labarraque is a meticulous, curiosity‑driven caretaker who blends solitary craftsmanship with eco‑conscious ambition, yet wrestles with a persistent worry that fuels both his diligence and
    his occasional over‑cautiousness.
background:
  cultural: Ryan grew up in a middle‑class, white, Midwestern family in rural Indiana. His upbringing emphasized hard work, modesty, and community involvement, values reinforced by local church (Methodist)
    traditions and town events. He identifies with the small‑town ethos of self‑reliance, neighborly cooperation, and a practical approach to life, while maintaining an appreciation for the region’s natural
    landscape and seasonal cycles.
attributes:
  skills: '[''Commercial cleaning protocols'', ''Advanced floor care (carpet, tile, hardwood)'', ''Chemical safety and eco‑friendly handling'', ''Inventory management'', ''Basic plumbing and minor repairs'',
    ''Health and safety compliance'', ''Time‑block scheduling'', ''Customer service and tenant relations'', ''Team mentorship and supervision'', ''Problem solving under pressure'']'
  hobbies: '[''Gardening'', ''DIY home‑repair reading'', ''Vintage motorcycle restoration'', ''Fishing'', ''History and sustainability podcasts'', ''Chess (small‑group play)'', ''Woodworking and furniture
    making'']'
  career_goals: Ryan aims to transition from day‑to‑day janitorial duties to a facilities‑manager role within the next five years, focusing on sustainable cleaning practices and staff development. He plans
    to earn a Certified Professional Cleaner credential, implement a low‑waste supply system for his building, and eventually oversee a small team of cleaners, using his practical insight to improve efficiency
    while ensuring a stable income for his family.
