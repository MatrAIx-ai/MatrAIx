  hobbies: '[''Folklorico dancing'', ''Cooking Mexican cuisine'', ''Gardening'', ''Attending local soccer matches'', ''Community volunteering (church clean-ups)'', ''Yoga for stress relief'', ''Keeping
    a gratitude journal'']'
  career_goals: Reina aims to advance to a supervisory or lead custodian role within the next two years, obtaining certifications such as the Certified Custodial Technician (CCT) and OSHA safety courses.
    She also hopes to negotiate a position with regular daytime hours and comprehensive health benefits to reduce her stress. Long‑term, she dreams of starting her own small cleaning business, leveraging
    her organizational skills and community network to serve local businesses and homes.
