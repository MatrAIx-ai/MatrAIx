personas:
  professional: Reina Martin leverages years of systematic cleaning expertise, bilingual communication, and OSHA‑compliant inventory management to excel as a lead custodian, methodically training new staff
    while pursuing Certified Custodial Technician certification and a supervisory role with daytime hours and comprehensive health benefits.
  sports: Reina Martin joins her husband and neighborhood friends for weekend soccer matches with the co‑ed Parkside Strikers league, roots for the local professional team during the MLS season, and incorporates
    light jogging after dance rehearsals to stay active.
  arts: Reina Martin immerses in folkloric dance with a local troupe, finds inspiration in traditional folk melodies by artists such as Lila Downs and Los Tigres del Norte, and regularly visits community
    art fairs to admire vibrant murals and sculptures that echo her cultural roots.
  travel: Reina Martin dreams of attending the Day of the Dead festivities in Oaxaca, has already explored the historic plaza of Santa Fe and the bustling markets of Puebla, and prefers meticulously planned
    road trips that balance cultural immersion with budget‑friendly lodging.
  culinary: Reina Martin crafts authentic tamales using masa, pork shoulder, and ancho chilies, simmers pozole with hominy, cilantro, and lime, and experiments with salsas featuring guajillo and chipotle,
    while occasionally taking online cooking classes to refine her technique.
  core: Reina Martin is a structured, community‑focused custodian who balances diligent budgeting and health routines with a persistent worry‑driven need for schedule predictability, punctuated by vibrant
    dance, soccer, and flavorful cooking.
background:
  cultural: Reina is a first‑generation Mexican‑American whose parents immigrated to Texas before she was born. She was raised in a tight‑knit Mexican community in Fort Worth, where family gatherings, Catholic
    traditions, and Spanish were integral parts of daily life. Celebrations such as Día de los Muertos, Mexican Independence Day, and quinceañeras are important to her, and she maintains strong ties with
    her extended family both in Texas and across the border. Her cultural heritage influences her love of food, music, dance, and a deep sense of responsibility toward community and family.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping and waxing)'', ''Restroom sanitation'', ''Safety compliance (OSHA)'', ''Chemical handling'', ''Inventory management'', ''Time management'', ''Team
