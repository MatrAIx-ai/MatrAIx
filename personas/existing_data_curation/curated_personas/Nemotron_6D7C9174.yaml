personas:
  professional: A budding junior builder, Dayton Wilson delights in assembling LEGO sets, applying a practical, structured mindset to create sturdy models while relishing the lively, competitive group play
    that fuels their sociable energy.
  sports: A pint‑sized soccer enthusiast, Dayton Wilson dashes across the Beacon Little League Tigers' field every Saturday, cheers for the New York Yankees, New York Knicks and Hudson Valley Renegades,
    and prefers spontaneous pick‑up games over regimented practice drills, channeling their competitive spark into energetic play.
  arts: An imaginative mini‑muse, Dayton Wilson frequently explores the Dia:Beacon museum with their family, copies the bold colors of Andy Warhol’s prints in crayon drawings, hums Disney’s Frozen soundtrack,
    and delights in the whimsical sketches of Dr. Seuss, shaping a lively artistic identity.
  travel: A curious junior explorer, Dayton Wilson loves weekend rides to nearby farms along the Hudson River and annual trips to New York City’s Times Square, while dreaming of a summer adventure at Disneyland
    and a future family visit to the Grand Canyon, thriving on new sights but cherishing familiar routines.
  culinary: An enthusiastic junior foodie, Dayton Wilson adores buttery mac and cheese, crispy chicken nuggets, sweet strawberry smoothies, proudly helps stir pancake batter with a wooden spoon despite
    occasional flour‑dusted mishaps, and often requests fresh apples from the local farm for homemade apple pie slices.
  core: Dayton Wilson is a bright, sociable five‑year‑old who blends a love for structured play with spontaneous group games, a disciplined pocket‑money habit that occasionally gives in to impulse, and
    a playful determination to tackle allergies, art, and adventure with boundless energy and a hint of competitive spark.
background:
  cultural: Dayton comes from a white, Anglo-American family living in Beacon, New York, a small city in Dutchess County known for its blend of suburban community and proximity to the Hudson River. His
    family values education, community involvement, and outdoor recreation. Weekend visits to local farms, the Dia:Beacon art museum, and community festivals expose him to a mix of cultural experiences
    while reinforcing a sense of local pride. The multicultural atmosphere of the Hudson Valley, with its diverse food markets and seasonal events, subtly broadens his worldview, though his primary cultural
    reference points remain the traditions and celebrations of his family's mid-Atlantic heritage.
