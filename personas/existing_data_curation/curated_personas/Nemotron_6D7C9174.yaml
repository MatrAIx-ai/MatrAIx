  career_goals: Dayton's career aspirations are shaped by his love for clear structures and his competitive spirit. He often talks about becoming a firefighter because he admires the orderly routines, teamwork,
    and the chance to help people. He also dreams of being a professional soccer player, envisioning the thrill of scoring goals and winning matches. Occasionally he expresses interest in becoming a teacher,
    enjoying the idea of leading a classroom where rules are set and learning is organized. These ambitions reflect his desire for roles that combine predictability, teamwork, and the opportunity to excel.
