personas:
  professional: Adriana, a full‑stack software developer who blends clean JavaScript and Python code with disciplined agile practices, leads sprint planning, conducts thorough code reviews, and channels
    her curiosity into building community‑focused disaster‑response tools.
  sports: Adriana, an enthusiastic weekend hiker on the trails around Bayamón and a member of a local running club that meets for sunrise jogs, roots for Bayamón FC in soccer and follows the New York Yankees
    during baseball season, while also practicing yoga to maintain flexibility.
  arts: Adriana, an avid reader of magical realism and science‑fiction—favoring García Márquez, Allende, and N.K. Jemisin—captures urban festivals through her lens, draws inspiration from the acoustic melodies
    of José Feliciano and Juan Luis Guerra when composing guitar tunes, and admires contemporary photographer Alex Webb for his vibrant street scenes.
  travel: Adriana, who frequently escapes to the nearby El Yunque rainforest and weekend trips to Old San Juan, dreams of exploring the colonial charm of Cartagena, Colombia, and the tech‑forward streets
    of Berlin, balancing her wanderlust with a modest travel budget and careful itinerary planning.
  culinary: Adriana, a home‑cook who perfects traditional island dishes like mofongo and arroz con gandules—enhancing them with roasted garlic‑infused sofrito, smoky chipotle, and occasional quinoa salad
    twists—enjoys sourcing fresh plantains at the local market and experimenting with plating that reflects her photography eye.
  core: Adriana, a methodical coder who finds solace in solitary hikes, curates island flavors in the kitchen, and occasionally burns the midnight oil debugging, blends quiet curiosity with a disciplined,
    caffeine‑fueled work rhythm.
background:
  cultural: Adriana grew up in the vibrant municipalities of Bayamón and Cataño, immersed in a bilingual, close‑knit Puerto Rican family that values community, resilience, and cultural pride. She celebrates
    local traditions such as the Festival de la Calle San José, enjoys plena and bomba rhythms, and maintains strong ties to the island's culinary heritage. Experiencing events like Hurricane Maria reinforced
    her commitment to reliable technology and community solidarity. Her cultural identity informs her work ethic, her collaborative style, and her ambition to develop tech solutions that uplift Puerto Rico
    while honoring its rich history and diverse influences.
attributes:
  skills: '[''JavaScript'', ''React'', ''Node.js'', ''Python'', ''SQL'', ''AWS'', ''Git'', ''CI/CD'', ''Agile project management'', ''Data analysis'', ''Algorithmic problem solving'', ''Bilingual communication
    (Spanish/English)'']'
  hobbies: '[''Reading contemporary fiction'', ''Urban hiking'', ''Photography'', ''Cooking traditional Puerto Rican dishes'', ''Volunteering in STEM outreach for youth'', ''Playing acoustic guitar'']'
  career_goals: Adriana aims to become a senior developer and eventually a technical lead, guiding small cross‑functional teams to build digital solutions that address community needs in Puerto Rico, such
    as disaster‑response platforms and educational tools. She plans to earn AWS Solutions Architect certification and pursue a master's degree in Computer Science or an MBA to blend technical expertise
    with strategic leadership. Adriana is also committed to mentoring women and underrepresented youth in STEM, contributing to open‑source projects that serve the Caribbean region, and shaping inclusive,
    high‑impact technology initiatives.
