  career_goals: Sean aims to leverage his organizational strengths and experience to move into a supervisory or managerial role within the warehouse or supply chain field. He plans to obtain certifications
    in logistics and supply chain management, possibly complete his associate degree in Business Administration, and eventually become a warehouse manager or logistics coordinator. He is motivated by the
    desire for greater responsibility, higher standards of efficiency, and a stable, predictable work environment. He also contemplates starting his own small logistics consulting firm serving local businesses
    in Marion.
