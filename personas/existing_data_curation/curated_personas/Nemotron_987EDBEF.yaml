  career_goals: Bracha aims to transition her extensive volunteer experience into a part‑time nonprofit leadership role, such as a program director for a community health or environmental organization in
    Pacifica. She plans to earn a nonprofit management certificate within the next year to formalize her expertise. Long‑term, she hopes to launch a consulting boutique that assists small local businesses
    with marketing and financial planning, allowing her to blend her practical business skills with her passion for community development.
