  hobbies: '[''Cooking traditional Mexican dishes with a modern twist'', ''Salsa and folkloric dancing'', ''Hosting cooking gatherings for friends and family'', ''Gardening herbs and vegetables'', ''Reading
    Latin American literature and memoirs'', ''Traveling on culinary road trips'', ''Volunteering at the local food bank'', ''Playing card games at the senior center'']'
  career_goals: Agustina aims to transition from managing large institutional food operations to launching a boutique restaurant that showcases modern Mexican‑Southern fusion cuisine, allowing her to express
    her culinary curiosity while maintaining practical oversight. She wants to create a flexible work environment that promotes mentorship of younger staff, especially women and members of the Hispanic
    community. In parallel, she plans to obtain a hospitality‑management certification and offer consulting services to local eateries seeking to diversify their menus, blending cultural authenticity with
    business pragmatism.
