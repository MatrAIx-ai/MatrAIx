personas:
  professional: Agustina Castrorodriguez commands a three‑decade‑long career in food‑service management, leveraging bilingual communication, rigorous food‑safety oversight, and a knack for crafting menus
    that marry the bold spices of their upbringing with Southern comfort, while they channel a competitive drive to push teams toward excellence despite a relaxed, sometimes disorganized workflow.
  sports: Agustina Castrorodriguez enjoys weekly salsa sessions, casual tennis matches at the community courts, and belongs to the Southern Wellness Walking Club, cheering on the New Orleans Saints during
    football season, yet their competitive streak surfaces only when defending a close game point, while they generally favor low‑pressure, social exercise over rigorous training.
  arts: Agustina Castrorodriguez immerses themselves in the literary worlds of Gabriel García Márquez and Isabel Allende, sways to the vibrant rhythms of Celia Cruz and the soulful blues of B.B. King, and
    finds inspiration in Frida Kahlo’s vivid paintings, allowing these artistic currents to inform both their menu creations and social gatherings, and they often reference favorite passages during dinner
    conversations.
  travel: Agustina Castrorodriguez favors culinary road trips that combine Southern comfort food pilgrimages to Charleston, Savannah, and Austin with occasional overseas food festivals in Barcelona, planning
    trips loosely around friends’ schedules and a modest budget, preferring spontaneous market explorations over rigid itineraries, and they often return with new spice blends to experiment in the kitchen.
  culinary: Agustina Castrorodriguez wields a seasoned hand in the kitchen, transforming classic corn‑based dumplings, smoky barbecue ribs, and citrus‑marinated fish using herbs like epazote and heirloom
    tomatoes from their patio garden, and they delight in hosting informal dinner parties where experimental twists—such as a rich chocolate‑pepper glaze on pulled pork—spark lively conversation.
  core: Agustina Castrorodriguez is a sociable culinary veteran whose competitive spirit fuels innovative comfort‑food fusions, yet a relaxed, occasionally disorganized approach to planning means they often
    juggle deadlines with last‑minute herb garden harvests and spontaneous dinner parties.
background:
  cultural: Born in Puebla, Mexico, Agustina grew up in a family where food and celebration were central to daily life. She migrated to the United States in her twenties, eventually settling in Knoxville,
    Tennessee. She retains strong ties to Mexican traditions—Día de los Muertos, quinceañeras, and Catholic holidays—while actively participating in Knoxville's community festivals. Her bilingual fluency
    preserves her heritage and facilitates cultural exchange, influencing her professional style through a blend of Mexican hospitality and Southern warmth. She helps organize local Hispanic cultural events,
    introduces Mexican culinary techniques into her work, and values family‑centered resilience shaped by her divorce and independent life. This fusion of Mexican roots and Southern experience informs her
    adaptable, socially‑oriented outlook.
attributes:
  skills: '[''Team Leadership'', ''Menu Development (Mexican‑Southern Fusion)'', ''Food Safety Compliance'', ''Budget Management'', ''Inventory Control'', ''Bilingual Communication (Spanish/English)'',
