personas:
  professional: Leigh Lama, a 70‑year‑old operations veteran, they apply decades of SAP, Oracle, and Tableau mastery to streamline small‑business workflows, drafting meticulous SOPs and leading cross‑functional
    change while transitioning to a mentorship‑focused consulting role that blends their love of routine with community service.
  sports: Leigh Lama, an active community participant, they enjoy weekly line‑dancing at the local center, cheer the Dallas Cowboys and Texas Rangers, and join a low‑impact walking club at the senior center
    to maintain gentle fitness throughout the seasons.
  arts: Leigh Lama, a cultural enthusiast, they stitch intricate quilts while savoring mystery novels by Agatha Christie and historical sagas by Ken Follett, and they often unwind listening to classic country
    icons like Johnny Cash and folk guitarist John Hartford.
  travel: Leigh Lama, a leisurely road‑tripper, they favor scenic drives in their dependable sedan to historic Texas towns such as Fredericksburg and Austin, have visited the National Mall in Washington,
    D.C., and dream of a guided tour of Gettysburg’s battlefield sites once their travel budget allows.
  culinary: Leigh Lama, a Texas barbecue aficionado, they smoke brisket low and slow with a mesquite‑infused rub, slather ribs in a tangy apple‑cider glaze, and frequently incorporate garden‑fresh tomatoes,
    bell peppers, and onions into a signature salsa and side dishes, while their quilting evenings are often accompanied by a slice of homemade peach cobbler.
  core: Leigh Lama, a 70‑year‑old operations guru and neighborhood stalwart, they blend meticulous record‑keeping, Southern hospitality, and a love of routine into consulting, quilting, and community service,
    even as anxiety fuels late‑night journaling marathons.
background:
  cultural: Leigh grew up in a mid‑western, white family during the post‑war era, relocating to Fort Worth, Texas, in her early adulthood. Her upbringing emphasized self‑reliance, community involvement,
    and traditional values typical of mid‑century American Protestant culture. She maintains Southern hospitality, active church participation, and a strong sense of civic duty, reflecting the blend of
    Midwestern roots and Texas community spirit that shapes her outlook today.
