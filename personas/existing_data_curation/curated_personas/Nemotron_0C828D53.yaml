  career_goals: In the coming years, Leigh aims to transition to a mentorship‑focused consulting role, offering her operational expertise to small businesses and nonprofit organizations in the Fort Worth
    area. She intends to develop a series of workshops on process efficiency and SOP creation, and to author a practical guidebook for senior‑level operations professionals. Additionally, she seeks to obtain
    a Lean Six Sigma Black Belt certification to formalize her continuous‑improvement credentials, and to volunteer as an operations advisor for a local community center, ensuring that her legacy combines
    professional excellence with community impact while maintaining a balanced workload to protect her emotional well‑being.
