  hobbies: '[''Fishing'', ''Hunting'', ''Hiking in the Appalachians'', ''Playing acoustic guitar'', ''Karaoke hosting'', ''Community event emceeing'', ''Bluegrass jam sessions'', ''Reading historical nonfiction'',
    ''Playing poker'', ''Volunteer fire department participation'']'
  career_goals: Darrell aims to progress from his current surveillance officer role to a supervisory position within the next three years, targeting a shift manager or senior fraud detection analyst role.
    He plans to obtain the Certified Protection Professional (CPP) credential and pursue specialized training in advanced video analytics and forensic data investigation. Long-term, he envisions establishing
    his own security consulting firm focused on casino fraud prevention, leveraging his blend of operational expertise, strong interpersonal skills, and academic background in humanities. He also hopes
    to serve as a trainer for regional security personnel and contribute to community safety initiatives in Breathitt County.
