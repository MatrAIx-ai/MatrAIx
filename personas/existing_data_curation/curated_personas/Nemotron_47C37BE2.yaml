  career_goals: Jade aims to transition from senior individual contributor to a technical leadership role within the next five years, targeting positions such as Engineering Manager or Director of Software
    Engineering at a high‑growth tech company in Los Angeles. She is eager to spearhead large‑scale, user‑centric products that blend innovative technologies with operational reliability, leveraging her
    curiosity for emerging tools while keeping an eye on practical deployment constraints. To support this trajectory, she plans to obtain an AWS Solutions Architect Professional certification and deepen
    her expertise in site reliability engineering (SRE). Jade also harbors an entrepreneurial ambition to launch a startup focused on mental‑health analytics for professionals, combining her personal experience
    with stress and her technical skill set. Throughout, she seeks to create inclusive teams, mentor women in tech, and maintain a work‑life balance that protects her family and personal well‑being.
