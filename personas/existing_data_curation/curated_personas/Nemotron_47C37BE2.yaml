personas:
  professional: Jade Detommaso, a seasoned full‑stack software engineer with deep expertise in Python, Go, Java, and modern JavaScript frameworks, leverages rigorous testing, CI/CD pipelines, and a skeptical
    eye for hidden bugs to deliver scalable AWS‑native services while mentoring junior developers and positioning themselves for a future engineering management role, and they consistently champion code
    quality across the team.
  sports: Jade Detommaso, a devoted fan of the Los Angeles Lakers and Dodgers who also belongs to the Santa Monica Hiking Club, spends weekends tackling the trails of Angeles National Forest, combining
    competitive spirit with mindful breathing to clear stress, occasionally joins a local adult volleyball league to inject variety into their fitness routine, and they often track their runs using Strava
    to monitor progress.
  arts: Jade Detommaso, an avid landscape photographer inspired by Ansel Adams and Chris Burkard, frequently curates sunrise shots of the Pacific coast, unwinds with sci‑fi novels by Neal Stephenson and
    indie narrative‑driven games such as Outer Wilds, attends monthly screenings of independent films by directors like Greta Gerwig, and they maintain a curated Instagram portfolio to share their visual
    stories.
  travel: Jade Detommaso, a methodical yet adventure‑seeking traveler, has hiked the Grand Canyon, explored Kyoto’s temples, and plans a future road trip along the Amalfi Coast, balancing detailed itineraries
    with spontaneous detours while carefully budgeting each trip around work commitments and family time, and they use a travel journal to reflect on each journey.
  culinary: Jade Detommaso, a home‑cooking enthusiast, perfects Mediterranean dishes like handmade ricotta ravioli with basil‑pesto and grilled octopus with lemon‑oregano drizzle, enjoys sourcing fresh
    basil, Kalamata olives, and Pecorino Romano from local farmers’ markets, often pairs meals with a crisp Pinot Grigio while late‑night coding sessions, and they occasionally binge‑watch cooking shows
    for new inspiration.
  core: Jade Detommaso, a competitive, worry‑prone tech leader‑in‑the‑making, blends rigorous engineering discipline with mindful outdoor escapes, careful financial planning, and a love for Mediterranean
    cuisine and visual storytelling, and they constantly wrestle with balancing ambition and anxiety.
background:
  cultural: Jade is a second‑generation Italian‑American raised in the inland suburbs of Los Angeles County. Her grandparents emigrated from Southern Italy, and she grew up speaking both English and conversational
    Italian at family gatherings. The household celebrated traditional Italian holidays such as Ferragosto and maintained a weekly Sunday pasta ritual, instilling a strong sense of family cohesion and appreciation
    for food as cultural expression. Raised in a diverse, multicultural city, Jade also absorbed the West Coast’s progressive values, integrating an open‑minded outlook toward different cultures, cuisines,
    and artistic scenes. While her upbringing included Catholic traditions, she now identifies as culturally secular, blending her heritage’s emphasis on community and craftsmanship with the entrepreneurial,
    tech‑driven ethos of modern Los Angeles.
