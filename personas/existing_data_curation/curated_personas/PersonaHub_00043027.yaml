persona_description: A geographer or cartographer who specializes in the creation of azimuthal maps, particularly those used for navigation and geographical analysis. They have a deep understanding of the
  principles of spherical geometry and the distortions that occur in azimuthal projections, and are skilled in the use of specialized software and tools to create accurate and visually appealing maps. They
  are also familiar with the historical and cultural significance of azimuthal maps, and have a passion for sharing their knowledge with others through lectures, workshops, and online resources.
