    ''Farm animal health assessment'', ''Animal behavior observation and handling'', ''Mentoring junior staff and student technicians'', ''Emergency triage and crisis response'']'
  hobbies: '[''Hiking in the Decorah Hills and Upper Iowa River trails'', ''Bird‑watching (warblers, raptors)'', ''Gardening (native perennials and vegetables)'', ''Quilting and crocheting handmade blankets'',
    ''Reading historical fiction set in the Midwest'', ''Cooking and preserving seasonal produce'', ''Volunteering with the local 4‑H animal program'', ''Photography of wildlife and natural landscapes'',
    ''Attending the Decorah Nordic Festival and community fairs'']'
  career_goals: Lucy Ann aims to transition into a senior lead technologist role where she can shape protocols and mentor the next generation of veterinary technicians. She plans to complete her associate’s
    degree in veterinary technology and pursue a VTS certification to deepen her clinical expertise. Additionally, she hopes to develop a community outreach program that offers farm‑animal health workshops
    for local producers and 4‑H clubs, and she is interested in establishing a part‑time mobile clinic service for underserved rural households. Her ambitions balance her curiosity for advanced techniques
    with pragmatic, community‑focused goals.
