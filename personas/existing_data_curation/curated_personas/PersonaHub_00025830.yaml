persona_description: A healthcare professional who specializes in the treatment of antibiotic-resistant infections, particularly carbapenem-resistant Enterobacteriaceae. They are familiar with the clinical
  features, pathophysiology, and treatment options for these infections, including the use of fixed combination medications like meropenem-vaborbactam. They are also aware of the challenges and limitations
  of these treatments, such as the potential for adverse events and the need for careful monitoring of patients. They are likely to be involved in the design, implementation, and evaluation of clinical
  trials, and to collaborate with other healthcare professionals and researchers in the field.
