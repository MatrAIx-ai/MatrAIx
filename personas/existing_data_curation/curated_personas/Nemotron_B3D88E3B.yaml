personas:
  professional: Clarence Austin, a 55‑year‑old board‑certified internal medicine physician specializing in geriatric care, blends his disciplined yet flexible approach and quiet empathy to lead interdisciplinary
    research that integrates watercolor painting and narrative medicine into patient treatment plans, while mentoring rural‑origin trainees and steering telemedicine implementation across his clinic.
  sports: Clarence Austin enjoys solitary early‑morning hikes through the Flint Hills, plays occasional senior‑league golf at the Norman Country Club, and follows the Oklahoma Sooners football and Oklahoma
    City Thunder basketball teams, preferring low‑key cardio and gentle competition over crowded gym environments.
  arts: Clarence Austin channels his imaginative curiosity into delicate watercolor depictions of prairie sunsets, finds solace in the impressionistic piano works of Debussy and Ravel, draws inspiration
    from Winslow Homer’s domestic scenes and Indigenous printmaker Jaune Quick‑to‑See Smith, and regularly reads speculative fiction by Octavia Butler and Isaac Asimov to enrich his own poetry and artistic
    practice.
  travel: Clarence Austin plans his journeys with the meticulous calm of a case review, opting for culturally rich, low‑stress trips such as a watercolor retreat in Santa Fe, a vineyard weekend in Texas
    Hill Country, and an art pilgrimage to Florence, Italy, while balancing travel costs with modest retirement budgeting and family responsibilities.
  culinary: Clarence Austin, an enthusiastic home cook, experiments with seasonal harvests by preparing heirloom tomato bruschetta with basil oil, simmering a slow‑cooked southwestern chili spiced with
    roasted corn and cumin, and occasionally crafting lily‑infused custard desserts, all while honoring the simplicity of farm‑fresh meals and the occasional indulgence of a well‑aged Cabernet.
  core: Clarence Austin, a 55‑year‑old physician‑artist, merges prairie‑rooted humility with boundless imagination, spends evenings sketching sunsets, quietly champions senior art‑therapy, and habitually
    over‑waters his garden while neglecting his own sunscreen.
background:
  cultural: Clarence was raised on a family farm near the town of Purcell in central Oklahoma, growing up within a Midwestern cultural framework that prized modesty, hard work, and neighborly cooperation.
    His parents were active members of the local Methodist congregation, instilling a sense of service and community responsibility that later guided his decision to enter medicine. The vast Oklahoma prairie
    and the rhythms of agricultural life fostered his appreciation for open spaces and quiet contemplation, traits that complement his reserved personality. Relocating to Norman for medical school at the
    University of Oklahoma exposed him to a more diverse intellectual environment, including interactions with Native American artists and scholars, which sparked his interest in integrating art with healing.
    Today, he blends his traditional Midwestern roots—valuing self‑reliance, humility, and civic duty—with an openness to new ideas and cultural expressions, shaping a worldview that emphasizes compassionate
    care, community stewardship, and continuous learning.
attributes:
  skills: '[''Board-Certified Internal Medicine'', ''Geriatric Care'', ''Personalized Medicine and Bioinformatics'', ''Clinical Research Design'', ''Medical Education and Curriculum Development'', ''Telemedicine
