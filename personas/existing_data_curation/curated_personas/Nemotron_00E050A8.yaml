  hobbies: '[''Photography (industrial and architectural)'', ''Visiting art galleries and community murals'', ''Smart‑home tinkering'', ''Woodworking'', ''Playing acoustic guitar'', ''Fishing'', ''Camping'',
    ''Reading science‑fiction and technology non‑fiction'', ''Volunteering for festival lighting installations'']'
  career_goals: Oliver aims to achieve Master Electrician certification and obtain a contractor’s license so he can launch his own boutique electrical firm specializing in energy‑efficient retrofits, solar
    installations, and custom lighting solutions for local art projects. He aspires to mentor the next generation of tradespeople, integrate more renewable technologies into his work, and eventually secure
    a flexible schedule that balances financial stability with personal creative pursuits.
