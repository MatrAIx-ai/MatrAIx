personas:
  professional: A seasoned security professional with three decades of surveillance expertise, Celine Wright blends acute observation, compassionate communication, and a humanities‑informed analytical style
    to design mentorship programs and trauma‑informed workshops for small businesses in Armstrong County.
  sports: A devoted fan of the Pittsburgh Steelers and frequent participant in the Allegheny River Trail walking club, Celine Wright enjoys seasonal hikes, occasional community softball games at the local
    recreation center, and birdwatching outings that double as low‑impact cardio.
  arts: An enthusiastic reader of Jane Austen and Henry David Thoreau, Celine Wright also treasures folk‑rock performances by Arlo Guthrie, attends local historical society art exhibits featuring works
    by regional artists like Charles Demuth, and hosts bridge evenings that blend social interaction with strategic thinking.
  travel: A meticulous planner, Celine Wright prefers road trips to nearby historic towns like Gettysburg and Hershey, relishes weekend stays at cabin retreats in the Allegheny National Forest, and dreams
    of visiting the Scottish Highlands to trace ancestral roots while respecting a modest retirement budget.
  culinary: A seasoned home cook, Celine Wright delights in preparing classic apple butter, German‑style sauerkraut, and rosemary‑roasted chicken using fresh garden vegetables such as heirloom tomatoes,
    sweet potatoes, and aromatic herbs harvested from their backyard plot.
  core: Celine Wright is a compassionate, garden‑loving security veteran whose pragmatic curiosity fuels mentorship ambitions, yet they wrestle with occasional anxiety and a penchant for meticulous budgeting.
background:
  cultural: Celine comes from a multi‑generational, middle‑class white Pennsylvania family with roots in the Appalachian region of western Pennsylvania. Her ancestry includes Scots‑Irish and German settlers
    typical of Armstrong County. Raised in a small‑town environment, community events, church gatherings, and county fairs were central to her upbringing, fostering a strong sense of neighborly support
    and modesty. The region’s work‑ethic and practical mindset shaped her pragmatic side, while her humanities education cultivated an appreciation for literature, history, and the arts. She values community
    service, often participates in local volunteer programs, and maintains traditional customs such as attending the county fair and supporting the local historical society.
