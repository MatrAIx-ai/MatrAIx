  career_goals: Approaching retirement, Celine aims to transition into a mentorship and training role, developing a structured onboarding program for new security staff and offering workshops on compassionate
    surveillance practices for local businesses. She plans to obtain a certification in trauma‑informed care to better support colleagues and patrons dealing with distress. Long‑term, she hopes to become
    a part‑time security consultant for small enterprises in Armstrong County and continue her volunteer work by establishing a community safety and mental‑wellness outreach program for seniors.
