  hobbies: '["Drone photography", "Jogging", "Reading non-fiction", "Model airplane building", "Listening to jazz and hip‑hop", "Strategy video games", "Learning Python", "Visiting local museums", "Exploring
    genealogy"]'
  career_goals: Santana aims to leverage his hands‑on experience into a supervisory role within hotel operations, moving from porter to front‑desk supervisor within the next two years. He plans to complete
    an associate’s degree in Hospitality Management and later pursue a bachelor’s degree to qualify for managerial positions. Long‑term, he aspires to become a hotel manager or open a boutique concierge
    service that integrates technology—such as mobile check‑in apps and personalized digital itineraries—to enhance guest experiences while maintaining the personal touch he values.
