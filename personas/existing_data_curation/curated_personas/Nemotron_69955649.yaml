personas:
  professional: Santana Long is a hotel concierge‑porter in Dayton who leverages methodical planning and quiet confidence to coordinate guest arrivals, manage luggage, and craft personalized itineraries;
    their goal is to rise to front‑desk supervisor within two years while completing an associate’s degree in Hospitality Management.
  sports: Santana Long is a disciplined early‑morning jogger who charts routes through Oakwood and Carriage Hill parks, follows the Dayton Flyers men’s basketball team, and occasionally watches Cincinnati
    Bengals games while analyzing game statistics on a laptop.
  arts: Santana Long captures Dayton’s skyline with a DJI Mini drone, studies the compositions of Edward Burtynsky, builds intricate model airplanes, and frequents the Dayton Museum of History where they
    absorb exhibitions on African‑American heritage, all of which fuel a quiet appreciation for visual storytelling.
  travel: Santana Long prefers meticulously planned weekend getaways, often traveling to the National Museum of the United States Air Force in Dayton, then venturing to Chicago’s Museum of Science and Industry,
    favoring early‑bird flights, budget hostels, and self‑crafted digital itineraries that balance aviation interests with quiet cafés.
  culinary: Santana Long enjoys simple, high‑protein meals like grilled chicken with quinoa, breakfast oatmeal topped with fresh berries, and occasional pizza from a local joint, while experimenting with
    an espresso machine to perfect a single‑origin pour‑over; they lack culinary flair beyond these staples but value efficiency in kitchen prep.
  core: Santana Long, an 18‑year‑old hotel concierge‑porter, melds quiet curiosity with methodical reliability, turning solo drone flights, early jogs, and disciplined budgeting into a steady climb toward
    hospitality leadership.
background:
  cultural: Santana grew up in a close‑knit Black family in Dayton, Ohio. His mother worked as a school custodian and his father was a forklift operator at a manufacturing plant, instilling a strong work
    ethic and respect for community. The family attended a historically Black Baptist church where gospel music and community service were integral parts of life. Celebrations of Juneteenth and local cultural
    festivals reinforced his connection to African‑American heritage, while Sunday visits to the Dayton Museum of African American History sparked his interest in the broader civil‑rights narrative of the
    Midwest. These experiences shape his values of reliability, humility, and a quiet pride in his cultural roots.
attributes:
  skills: '["Luggage handling", "Customer service", "Time management", "Organizational planning", "Conflict resolution", "Knowledge of local attractions", "Hotel reservation system operation (Opera)", "Basic
