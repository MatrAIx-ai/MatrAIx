persona_description: A professional in the environmental field who is responsible for managing and maintaining retention ponds in agricultural areas. They are knowledgeable in the design, construction,
  and maintenance of retention ponds, as well as in the selection of appropriate materials and liner types for these purposes. They are skilled in identifying and addressing the potential issues and challenges
  associated with retention pond design, construction, and operation, such as the collection and treatment of pollutants, the maintenance of water quality, and the protection of natural habitats. They are
  also knowledgeable in the use of advanced technologies and methods for the design and construction of retention ponds, such as the use of reinforced polypropylene and Aqua series liners.
