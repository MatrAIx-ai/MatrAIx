  hobbies: '["Puzzle solving (Sudoku, logic puzzles)", "Coding small personal projects", "Reading sci‑fi and tech non‑fiction", "Strategic video gaming (eSports)", "Chess club participation", "Photography
    of local landscapes", "Sketching/drawing", "Volunteer teaching basic computer skills"]'
  career_goals: Inez aims to earn her GED within the next year and then pursue an industry‑recognized IT support certification (e.g., CompTIA A+). She envisions securing a stable entry‑level tech support
    role that leverages her hands‑on troubleshooting skills, while simultaneously building a freelance service helping local small businesses and community members with basic computer maintenance. In the
    longer term, she hopes to specialize in cybersecurity or network administration, obtain a scholarship for a community college program, and achieve financial independence that allows her to support her
    family and mentor other youths from her community.
