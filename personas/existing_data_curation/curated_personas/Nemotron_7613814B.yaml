personas:
  professional: Inez Obi, an aspiring IT support technician, channels a puzzle‑solver’s precision and a methodical, detail‑oriented mindset into troubleshooting hardware and scripting quick fixes, while
    also leveraging their competitive streak to deliver fast resolutions for local small‑business clients and mentor younger students in basic computer skills.
  sports: Inez Obi, a strategic teen athlete, combines weekly trail runs with the Finger Lakes Hiking Club and occasional pick‑up basketball at the local community center, while cheering for the Buffalo
    Bills and the New York Knicks, favoring solo endurance over team sports but still appreciating the competitive spirit, which they channel into disciplined training.
  arts: Inez Obi, an avid creator, spends weekends capturing mist‑shrouded Finger Lakes vistas in the style of Ansel Adams and sketching minimalist scenes while curating a playlist that mixes Daft Punk’s
    electronic beats with the atmospheric scores of Vangelis, and they regularly re‑read classic sci‑fi novels by Arthur C Clarke for inspiration.
  travel: Inez Obi, a detail‑driven teen traveler, meticulously plans weekend getaways to nearby state parks and annual trips to New York City using a custom spreadsheet itinerary, while dreaming of a future
    solo expedition to Kyoto to explore its tech scene and Iceland's aurora‑lit landscapes for photography, balancing adventure with a modest budget and ensuring they can afford each trip.
  culinary: Inez Obi, a pragmatic home‑cook, whips up quick pasta primavera with fresh basil and cherry tomatoes or a sturdy avocado toast topped with smoked salmon for breakfast, delights in documenting
    each plate on their phone, and occasionally splurges on sushi rolls featuring tuna and cucumber when they treat themselves.
  core: Inez Obi, a puzzle‑obsessed, detail‑driven teen, balances solitary tech tinkering with community tutoring while habitually staying up late to finish coding projects, often sacrificing sleep, which
    they justify as essential practice.
background:
  cultural: Inez comes from a Black family whose roots trace back to the American South; her parents moved to New York seeking educational and employment opportunities. Growing up in Ithaca, a college town
    with a modest Black community, she has forged a personal cultural identity that blends family traditions—such as listening to classic R&B, cooking dishes inspired by Southern cuisine, and celebrating
    Juneteenth—with the progressive, activist atmosphere of the area. She values self‑reliance and community support, often engaging in local grassroots initiatives that empower minorities, while maintaining
    a quiet connection to her heritage through music, storytelling, and mentorship of younger peers.
attributes:
  skills: '["Computer hardware troubleshooting", "Basic Python programming", "JavaScript fundamentals", "Spreadsheet data management", "Project planning and scheduling", "Strategic gaming (chess, eSports)",
