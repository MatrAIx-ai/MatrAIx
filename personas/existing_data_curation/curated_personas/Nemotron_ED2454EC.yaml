personas:
  professional: Juan Acosta, a three‑year‑old with a penchant for building block skyscrapers, already shows the makings of a future civil engineer by balancing inventive curiosity with practical stability
    in every tower he assembles.
  sports: Juan Acosta, a three‑year‑old who dashes after a bright orange soccer ball in the neighborhood park, trains with the Tiny Tumble Gymnastics Club and proudly waves a miniature jersey of the hometown
    baseball team, the River City Rockets, each time his favorite pitcher strikes out.
  arts: Juan Acosta, a three‑year‑old who can recite the "Let It Go" lyrics from Disney's Frozen, mimics the dance moves of Toy Story characters, and colors pictures of Mickey Mouse and Spider‑Man, showing
    a vibrant yet cozy connection to beloved animation and music.
  travel: Juan Acosta, a three‑year‑old who has already explored the sandy shores of Cancun, the historic canals of Venice, and the snowy playground of the Swiss Alps with his family, prefers short car
    rides to the local zoo over long flights, yet dreams of seeing the towering redwoods of California.
  culinary: Juan Acosta, a three‑year‑old with a forkful of enthusiasm, loves the cheesy stretch of macaroni and cheese, the crunch of chicken nuggets, and the sweet fluff of banana pancakes drizzled with
    maple syrup, while his budding independence shows in his occasional attempt to spread butter on toast with a tiny butter knife.
  core: Juan Acosta, a three‑year‑old explorer who builds block towers, hoards stickers, and sneaks extra nap time whenever a lullaby plays, embodies a spirited blend of curiosity and everyday practicality.
background:
  cultural: Juan Juan grows up in a Salvadoran household in Los Angeles, where Spanish is spoken at home and English at school and in the community. Family gatherings often feature traditional foods like
    pupusas and tamales, and he participates in cultural celebrations such as Fiesta Salvadoreña. The vibrant Salvadoran community in LA provides him with opportunities to hear cumbia and salsa music, attend
    local festivals, and play soccer with other children from similar backgrounds, reinforcing his cultural identity while fostering bilingual development.
