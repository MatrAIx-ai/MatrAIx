  hobbies: '[''Church choir'', ''Softball league'', ''Line dancing'', ''Community gardening'', ''Cooking Southern cuisine'', ''Volunteer at food bank'', ''Mentoring youth'', ''Reading historical novels'',
    ''Group fitness classes'']'
  career_goals: Phyllis aims to advance from a material mover to a supervisory role within the next three years, targeting a shift‑lead or warehouse supervisor position. She plans to earn a certified forklift
    operator credential and an OSHA safety trainer certification to bolster her expertise. Recognizing the value of formal education, she intends to enroll in an online bachelor's program in logistics or
    supply‑chain management while continuing to work. Her long‑term ambition includes mentoring younger workers, improving workplace safety culture, and eventually launching a small, community‑focused moving
    service that can provide reliable jobs and affordable transport for fellow residents of Saline County. Throughout, she seeks stable income and benefits that will enable her to give back more actively
    to local charities and church initiatives.
