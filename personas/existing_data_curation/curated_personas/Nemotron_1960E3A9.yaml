personas:
  professional: Phyllis Sua is a warehouse operative who expertly handles forklift duties, barcode inventory, and safety protocols, applying her meticulous organization and calm conflict‑resolution skills
    while pursuing a shift‑lead promotion within the next three years.
  sports: Phyllis Sua captains the Saline County Lady Sluggers softball team, cheers on the St. Louis Cardinals, stays fit with high‑energy Zumba classes, and blends Southern and African rhythms in line‑dancing
    drills at the community center.
  arts: Phyllis Sua raises her voice in a gospel choir, draws inspiration from B.B. King’s blues, reflects on the narratives of Toni Morrison, and attends local theater productions of August Wilson’s plays
    to feed her love of storytelling.
  travel: Phyllis Sua enjoys weekend road trips to the Ozark hills, returns each spring to New Orleans for the jazz festival, dreams of strolling Savannah’s historic squares, and plans a future family getaway
    to Asheville’s mountain retreats.
  culinary: Phyllis Sua expertly cooks collard greens seasoned with smoked turkey, sweet‑potato casserole with marshmallow topping, and buttery cornbread, while experimenting with fresh garden harvests
    such as heirloom tomatoes and adding a splash of homemade hot sauce to her signature sweet tea.
  core: Phyllis Sua is a community‑focused, detail‑driven warehouse professional who balances leadership aspirations, choir rehearsals, garden plots, and a structured budget, all while occasionally overcommitting
    and battling lingering back soreness.
background:
  cultural: Phyllis Lynn Sua is an African‑American woman raised in the rural South, specifically in Alexander, Arkansas. Her family’s roots trace back to the Great Migration era, and she grew up immersed
    in the traditions of Southern black culture—church gatherings, gospel music, soul food, and storytelling. The local black community, though small, maintains strong bonds through church events, Juneteenth
    celebrations, and communal support networks. These cultural influences have instilled in Phyllis a deep sense of resilience, mutual aid, and pride in heritage. While navigating a predominantly white
    region, she actively preserves her cultural identity by participating in church choirs, cooking family recipes, and sharing the history of her ancestors with younger community members.
