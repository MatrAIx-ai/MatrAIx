personas:
  professional: Osmany Devia, a 63‑year‑old first‑line retail supervisor in Palm City, blends three decades of bilingual team leadership, meticulous visual‑merchandising design, and a curiosity for new
    technologies into a collaborative, emotionally‑aware management style that they use to energize their crew while driving sales targets.
  sports: Osmany Devia enjoys weekend boating on the St. Lucie River, participates in a senior golf league at the Treasure Coast Country Club, follows the Tampa Bay Buccaneers and Miami Heat, and they stay
    fit through weekday morning walks and salsa dancing at the local senior club.
  arts: Osmany Devia immerses themselves in the Palm City arts scene, attending gallery openings featuring artists like Frida Kahlo and Georgia O’Keeffe, painting watercolor sunsets inspired by local festivals,
    and they dance salsa to live mariachi bands, which fuels their creative eye for store displays.
  travel: Osmany Devia prefers relaxed cultural trips, having visited Oaxaca for Día de los Muertos festivities, strolling through New Orleans’ French Quarter, cruising the Caribbean islands, and they plan
    a future road‑trip along the Gulf Coast to explore coastal art towns, balancing travel costs with their retirement budget.
  culinary: Osmany Devia cooks traditional mole, tamales, and fresh ceviche for weekly family meals, delights in the aroma of roasted chilies and fresh cilantro, enjoys experimenting with regional ingredients
    like achiote and Oaxaca cheese, and they often treat themselves to a local taco truck’s al pastor after a long workday.
  core: Osmany Devia is a sociable, art‑loving retail veteran who balances meticulous store design with community‑centric kindness, wrestles with anxiety, and they channel their love for tradition into
    cooking, dancing, and mentoring future entrepreneurs.
background:
  cultural: Osmany was born in Veracruz, Mexico, and moved to the United States with his family at age twelve. Growing up in a close-knit bilingual household, he retained strong ties to Mexican traditions
    - celebrating Día de los Muertos, sharing family recipes, and listening to mariachi and ranchera music. The values of familia, respeto, and comunidad shaped his worldview and are reflected in his emphasis
    on teamwork and community involvement. In Palm City, he blends his heritage with the Floridian lifestyle, participating in local Hispanic festivals, attending the annual Mexican cultural fair, and contributing
    to bilingual community programs. His Catholic upbringing informs his reflective nature, while his pride in Mexican craftsmanship informs his meticulous eye for detail in visual merchandising.
attributes:
  skills: '[''Retail Management'', ''Team Leadership'', ''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Inventory Control'', ''Visual Merchandising'', ''Sales Performance Analysis'',
    ''Staff Training & Coaching'', ''Conflict Resolution'', ''Community Outreach'', ''Artistic Store Display Design'']'
  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Cooking Mexican Cuisine'', ''Boating'', ''Gardening'', ''Community Volunteering'', ''Salsa Dancing'', ''Storytelling'', ''Hosting Game Nights'']'
  career_goals: Approaching retirement, Osmany intends to leverage his extensive retail background into a broader strategic role. He plans to complete his bachelor's degree in Business Administration or
    Arts Management within the next two years, driven by his curiosity for new ideas. Professionally, he aims to advance to a district-manager position where he can oversee multiple stores, implement technology-driven
    sales solutions, and champion region-wide visual merchandising that incorporates local art. Parallel to his corporate ambitions, he dreams of opening a family-run cafe that showcases Mexican cuisine
    and displays works by emerging local artists, providing a cultural hub and mentoring venue for young Hispanic entrepreneurs.
