    "Volunteering at community art workshops"]'
  career_goals: Nadia plans to enroll in a community college program for graphic design or visual communication, aiming to build a portfolio that blends contemporary aesthetics with South Asian cultural
    motifs. Her long‑term ambition is to work as a freelance visual artist and later as a creative director for socially conscious brands that celebrate diversity. She hopes to travel to gather inspiration,
    and eventually mentor other young creators from underrepresented backgrounds, fostering inclusive artistic communities.
