personas:
  professional: A budding visual storyteller, Nadia Modha channels her highly imaginative mind and love for speculative fiction into vibrant digital collages that blend modern urban sketches with traditional
    festival motifs, leveraging her self‑taught web design and proficiency in Procreate to craft a portfolio poised for freelance work and future creative direction.
  sports: A fan of both community activity and professional sports, Nadia Modha follows the Boston Celtics and Boston Bruins, joins a Saturday morning recreational soccer league with the local youth club,
    and practices yoga twice weekly to balance her energetic social life with a flexible approach to fitness.
  arts: Immersed in the arts, Nadia Modha regularly visits the Museum of Fine Arts Boston, draws inspiration from contemporary illustrators like James Jean and classic painters like Frida Kahlo, and loses
    herself at live shows featuring indie bands such as Tame Impala and the rhythmic beats of local club nights.
  travel: Adventure‑seeking yet budget‑conscious, Nadia Modha has already explored the historic streets of Boston and the vibrant markets of Marrakech, prefers spontaneous backpacking trips over rigid itineraries,
    and dreams of a future creative pilgrimage to the colorful neighborhoods of Barcelona and the serene coastlines of New Zealand.
  culinary: In the kitchen, Nadia Modha experiments with fusion dishes like maple‑glazed paneer skewers seasoned with cinnamon and cloves, spicy pumpkin soup infused with garam masala and New England maple
    syrup, and regularly perfects traditional sweets such as laddoo for Diwali, showcasing a confident intermediate skill set.
  core: Creative, socially vibrant, and delightfully disorganized, Nadia Modha fuses speculative imagination with cultural celebrations, turning everyday life into a palette of bold colors, spontaneous
    adventures, and occasional financial oversights.
background:
  cultural: Nadia is of Indian (Gujarati) descent, raised in a bilingual household where Gujarati and English are spoken at home. She celebrates traditional festivals such as Diwali and Navratri with her
    family, preparing customary sweets and participating in community gatherings. Her upbringing in Sharon, Massachusetts, blends these South Asian traditions with mainstream American culture, influencing
    her artistic style, food preferences, and social interactions. She values the harmony between her heritage and her local environment, often incorporating Gujarati motifs and stories into her creative
    projects.
attributes:
  skills: '["Sketching and drawing", "Digital illustration (Procreate, Photoshop)", "Basic HTML/CSS", "Video editing (iMovie)", "Public speaking and group facilitation", "Bilingual: English and Punjabi"]'
