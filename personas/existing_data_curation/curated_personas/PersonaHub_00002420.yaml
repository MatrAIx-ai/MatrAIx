persona_description: A physicist who specializes in the study of particle physics, particularly the physics of high-energy collisions and the physics of the LHC. His research interests include, but are
  not limited to, the performance and limitations of the LHC, the physics of hadrons and the physics of the FCC-hh, and the physics of the future of particle physics. He is interested in the use of advanced
  optics and technologies in the LHC, such as the ATS optics and the gamma factory concept. He is also interested in the use of advanced cryogenic systems and the use of lasers in particle physics experiments.
