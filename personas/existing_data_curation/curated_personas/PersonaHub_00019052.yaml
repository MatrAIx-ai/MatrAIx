persona_description: A health science educator who is dedicated to ensuring that students receive a quality education that prepares them to provide the treatments and procedures required in their field.
  They are committed to tracking learning and ensuring that what students need to know is actually getting covered. They are proactive in mapping their curriculum, administering assessments, and analyzing
  the results to identify areas of weakness and make adjustments to their teaching and learning strategies. They are responsive and accountable, and they are committed to implementing a living curriculum
  that is mapped to their standards and responds to student performance results through assessments that are also mapped to the same standards. They are passionate about their field and are committed to
  helping students succeed in their studies.
