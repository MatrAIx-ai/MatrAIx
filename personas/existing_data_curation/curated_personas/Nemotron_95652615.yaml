  career_goals: Linda aims to become a Senior HR Business Partner within the next five years, pursuing SHRM‑CP and eventually SHRM‑SCP certification to deepen her strategic expertise. She wants to lead
    workforce planning initiatives that align talent pipelines with the company's growth objectives, while championing diversity, equity, and inclusion programs. Long‑term, she envisions either directing
    HR for a mid‑size manufacturing or technology firm in the Bay Area, or launching a boutique HR consultancy that helps small businesses in the Central Valley optimize their people practices. Mentoring
    emerging HR professionals and building a reputation as a trusted HR strategist are also key parts of her ambition.
