    workshops", "Attending cultural festivals"]'
  career_goals: Onyekachukwu aims to complete her associate degree in Business Administration within the next year and obtain a certification in Project Management. She aspires to secure an entry‑level
    role as a project coordinator or program assistant at a nonprofit organization focused on community development in the Central Valley. Long‑term, she envisions leading her own community‑based initiative
    that bridges local resources with African diaspora cultural programs, leveraging her organized nature and competitive drive to achieve measurable impact.
