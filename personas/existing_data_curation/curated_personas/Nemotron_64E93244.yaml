    Southern-inspired meals","Bird‑watching in local parks"]'
  career_goals: Craig aims to translate his practical experience into a supervisory role, targeting a position as an Office Manager or Senior Administrative Coordinator within the next three to five years.
    He plans to earn the Certified Administrative Professional (CAP) credential to bolster his qualifications and is exploring short courses in office technology and project coordination. While he values
    steady advancement, Craig also wishes to maintain the balance between curiosity and practicality by mentoring new front‑desk staff, introducing incremental process improvements, and staying updated
    on emerging visitor‑management software that could benefit his workplace.
