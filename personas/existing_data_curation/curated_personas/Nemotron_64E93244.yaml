personas:
  professional: Craig Washington, a seasoned front-office administrator, leverages precise data-entry, calm conflict resolution, and a curiosity for emerging visitor-management software to streamline operations,
    and they mentor new staff with a balanced blend of practicality and flexibility.
  sports: Craig Washington enjoys weekend fishing trips on Lake Gibson, follows the Tampa Bay Rays and the Lakeland Tropics soccer club, participates in a local senior cycling group for morning rides, and
    they keep fit with leisurely walks and occasional light weightlifting.
  arts: Craig Washington finds solace in the sounds of Miles Davis, B.B. King, and Aretha Franklin, curates a vinyl collection while tending the garden, regularly attends museum talks at the Polk Museum
    of Art featuring artists like Georgia O'Keeffe, and they appreciate cultural lectures that explore historical narratives.
  travel: Craig Washington prefers low-key, meticulously planned road trips to historic towns such as Savannah, Charleston, and St. Augustine, balances family visits with solo weekend getaways to the Florida
    Keys, and they dream of a cultural immersion tour of New Orleans to explore its music and cuisine.
  culinary: Craig Washington cooks Southern-inspired meals like shrimp and grits, collard greens seasoned with smoked paprika, and fresh tomato-basil pasta, harvests herbs from their backyard garden, experiments
    with a modest repertoire of skillet techniques, and they relish pairing dishes with a crisp local white wine.
  core: Craig Washington blends quiet curiosity with practical efficiency, nurturing a backyard garden and a vinyl jazz collection while methodically climbing the administrative ladder, yet they occasionally
    forget to floss and let non-urgent emails linger unanswered.
background:
  cultural: Craig is an African‑American man who grew up in central Florida, shaped by a close‑knit family and a vibrant Black community in Lakeland. His upbringing emphasized perseverance, respect for
    elders, and the importance of community support, values that are reflected in his reliable work ethic and his willingness to assist neighbors with information about local services. While he embraces
    contemporary cultural expressions—such as modern jazz and soul—he also holds deep appreciation for the traditions of gospel music and storytelling that were present at family gatherings. Craig’s cultural
    identity informs his preference for intimate, meaningful interactions over large social settings, his commitment to community volunteerism, and his pride in preserving and sharing his heritage through
    cooking, music, and participation in local cultural events.
