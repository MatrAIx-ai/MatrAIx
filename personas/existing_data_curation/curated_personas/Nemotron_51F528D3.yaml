  hobbies: '[''Salsa dancing'', ''Playing soccer'', ''Hiking'', ''Home herb gardening'', ''Craft beer tasting'', ''Cooking for friends'', ''Traveling to Mexico'', ''Community volunteering'', ''Attending
    live music concerts'', ''Experimenting with fusion recipes'']'
  career_goals: Adrian aims to open a modern Mexican bistro in the Johnson County area that blends authentic regional flavors with locally sourced Kansas produce. He dreams of earning regional culinary
    accolades, publishing a cookbook that highlights Mexican comfort foods with a Midwestern twist, and eventually establishing a small culinary school to train aspiring chefs, especially those from underrepresented
    backgrounds. He also wants to develop a partnership with local farms to create a sustainable farm‑to‑table program and to launch occasional pop‑up events that celebrate Mexican holidays and community
    gatherings.
