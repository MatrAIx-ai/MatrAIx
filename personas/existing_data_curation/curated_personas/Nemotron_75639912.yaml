  hobbies: '[''Reading historical biographies'', ''Solo hiking in the Puget Sound region'', ''Meditation'', ''Journaling'', ''Attending small local art exhibits'', ''Volunteering at community literacy programs'',
    ''Baking breads and pastries'', ''Indoor plant care'', ''Calligraphy and hand‑lettering'']'
  career_goals: Cartavia intends to earn a Master’s degree in Educational Leadership within the next two years and ultimately step into a Director of Early Learning Services role for Snohomish County or
    a neighboring district. She aims to expand affordable, high‑quality childcare options for low‑income families, especially families of color, by developing a STEAM‑infused early childhood model grounded
    in research and community input. Her ambitions include securing sustainable funding through grants and partnerships, mentoring emerging women of color educators, and championing equity‑focused policies
    such as trauma‑informed practices. In the longer term, she envisions launching a consultancy that supports schools and agencies in implementing culturally responsive early education programs.
