persona_description: A business leader who is passionate about improving workplace accessibility and inclusivity for individuals with disabilities. They are committed to changing the way businesses define
  ability and disability, and believe that universal design and individualized workspaces can make a significant difference in the lives of many employees. This individual is knowledgeable about various
  technologies and methods for improving accessibility, and is actively involved in promoting the use of adjustable seating, speech recognition, and other tools and methods that can help employees with
  disabilities to perform their jobs more comfortably and effectively. They are also interested in exploring the use of alternative methods of data entry and communication, and in promoting the use of universal
  design principles in the design and operation of workplaces.
