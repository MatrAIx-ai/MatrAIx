persona_description: A historian who specializes in the study of the Iron Age in Scandinavia, particularly the period from 1500 BC to 700 AD. His research interests include the clothing, weapons, and ornaments
  of the Iron Age, as well as the social and cultural practices of the time. He is interested in the use of Runic characters and the artifacts found in Thorsberg and Nydam, South Jutland. He is also interested
  in the use of the shears and the drinking vessels found in graves during the Iron Age.
