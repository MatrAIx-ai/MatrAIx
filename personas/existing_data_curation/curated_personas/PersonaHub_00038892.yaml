persona_description: A social anthropologist who studies the impact of social and demographic changes on housing demand in developed countries, focusing on urban renewal and community development in Scotland
  and the UK. Their research interests include the role of community and infrastructure in housing development, the challenges of building affordable homes in urban areas, and the implications of immigration
  for housing policy. They are also interested in the use of urban redevelopment to improve the quality of low-cost housing while maintaining community ties.
