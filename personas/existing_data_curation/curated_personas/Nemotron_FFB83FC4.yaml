personas:
  professional: Seth Steverson, a 46‑year‑old travel reservation specialist, blends deep expertise in Sabre and Amadeus with a calm, detail‑oriented focus, using curiosity‑driven scripting experiments to
    streamline booking workflows while occasionally letting a relaxed attitude toward strict scheduling slip, resulting in a pragmatic yet innovative problem‑solving style that mentors junior agents.
  sports: Seth Steverson enjoys low‑key fitness through early‑morning prairie walks and occasional bowling nights at the Wichita Community Bowl, quietly cheering for the Kansas City Royals during baseball
    season and supporting the local Wichita State Shockers basketball team, though they rarely join competitive sport leagues.
  arts: Seth Steverson cultivates a quiet artistic side through woodworking miniatures, digital sunrise photography inspired by Ansel Adams, and a lifelong fondness for folk storytelling in the songs of
    Johnny Cash and the narratives of Ken Burns documentaries, often attending community theater productions of classic plays.
  travel: Seth Steverson prefers self‑planned road trips that balance solitary exploration with methodical itinerary mapping, often revisiting the Flint Hills sunrise vistas and weekend drives to the historic
    rail towns of Santa Fe, while dreaming of a full Route 66 pilgrimage they intend to tackle once their boutique travel advisory venture stabilises.
  culinary: Seth Steverson cooks modestly in a home workshop kitchen, favoring hearty Midwestern staples like butter‑basted corn on the cob, slow‑cooked pork ribs with a Kansas‑style barbecue rub, and occasional
    bison chili seasoned with smoked paprika and cumin, while often pairing meals with a locally brewed amber ale.
  core: Seth Steverson is a quietly diligent travel logistics specialist who blends Midwestern steadiness with solitary curiosity, habitually wandering prairie trails at sunrise, guarding a modest budget,
    and effortlessly calming chaotic booking crises while occasionally misplacing a deadline or two.
background:
  cultural: Seth grew up in the heart of the American Midwest, raised in a suburban neighborhood of Wichita where his parents, both school teachers, emphasized practical education and self‑reliance. He
    identifies with Midwestern values such as modesty, a strong work ethic, and a preference for straightforward, community‑oriented interactions. While he participates in regional traditions—such as Thanksgiving
    gatherings, local county fairs, and church‑based volunteer events—his lifelong interest in travel and transportation gives him a broader perspective that blends local roots with an appreciation for
    the diverse ways people move across the country.
attributes:
  skills: '[''Reservation and ticketing system operation (Sabre, Amadeus)'', ''Customer service and conflict resolution'', ''Ground transportation logistics coordination'', ''Data analysis and reporting
    with Excel and basic SQL'', ''Process improvement and workflow automation (basic scripting)'', ''Regulatory compliance for transportation services'']'
  hobbies: '[''Historical biography reading'', ''Model train building'', ''Birdwatching'', ''Woodworking'', ''Landscape photography'', ''Mapping and sketching historic railway routes'']'
  career_goals: Seth aims to advance into a senior supervisory role within the travel services department, where he can mentor new agents and lead projects to modernize reservation processes using automation.
    He also hopes to earn a Certified Travel Associate credential and eventually transition to a consulting position that allows him to advise regional transportation companies on improving ticketing efficiency
    while maintaining the low‑stress, flexible work environment he values. In the longer term, he envisions starting a boutique travel advisory service focused on niche, low‑volume routes that require personalized,
    hands‑on planning.
