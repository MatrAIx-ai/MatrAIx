  career_goals: Maria aspires to move beyond her current receptionist role into an office manager or client‑services coordinator position where she can lead a team, design efficient workflows, and mentor
    new staff. She plans to complete her associate degree in Business Administration and obtain a certification in Office Management or Healthcare Administration to bolster her credentials. Driven by a
    competitive streak, she aims to become the go‑to resource for complex client inquiries and to implement technology‑driven solutions that improve accuracy and speed. In the long term, she envisions a
    supervisory role that allows her to shape policy, ensure compliance, and perhaps launch a consulting side‑business that helps small businesses streamline bilingual administrative processes.
