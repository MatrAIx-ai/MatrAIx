  career_goals: Although retired from formal employment, Nicholas aims to stay intellectually vibrant by volunteering as a STEM mentor at the local high school and offering workshops at the community center.
    He aspires to contribute to the regional historical museum by curating exhibits that highlight the interplay of technology and art in Pennsylvania’s heritage. He also hopes to author a memoir that weaves
    his professional experiences with his lifelong love of art and travel, and to continue learning new digital tools for creative expression.
