personas:
  professional: Jose Rios is a seasoned construction laborer who excels at framing, concrete placement, and safety compliance, leveraging their methodical, compassionate nature to foster teamwork and mentor
    younger crew members on diverse job sites.
  sports: Jose Rios channels a love of teamwork into a weekly adult soccer league with the Joliet United club, also cheering for the Chicago Bears in fall football and attending Chicago Cubs spring games,
    while they maintain a disciplined fitness routine that mixes weekend matches with early-morning weight-lifting sessions.
  arts: Jose Rios finds creative balance by building intricate model-train layouts while listening to the vibrant sounds of Carlos Santana and the heartfelt ballads of Lila Downs, and they regularly visit
    the Art Institute of Chicago to admire Frida Kahlo's self-portraits, which inspire their own appreciation for vivid storytelling.
  travel: Jose Rios prefers short road trips that blend relaxation and adventure, often vacationing on the shores of Lake Michigan in Michigan City and planning a future getaway to the historic streets
    of Santa Fe, while they dream of a soulful pilgrimage to Oaxaca's culinary festivals when time and budget allow.
  culinary: Jose Rios is an adept home chef who masters traditional dishes—pozole simmered for hours, hand-rolled tamales, and chiles en nogada—using corn masa, dried chilies, and fresh cilantro, and they
    love pairing these meals with craft beers and homemade salsa verde while occasionally experimenting with fusion twists.
  core: Jose Rios blends a pragmatic construction career with deep family and community roots, channeling their organized, compassionate nature into hands-on work, flavorful cooking, and neighborhood service
    while staying grounded by soccer, model trains, and modest financial goals.
background:
  cultural: Jose Alejandro was born to Mexican immigrant parents and grew up in a bilingual household, speaking Spanish at home and English in school. He maintains close ties to the local Mexican community
    in Joliet, regularly attending cultural festivals such as Cinco de Mayo celebrations and family gatherings centered around traditional cuisine and music. Though never married, he values familial bonds
    and often assists older relatives with chores and home repairs. His Catholic upbringing informs his sense of community responsibility, and he routinely participates in church‑organized outreach programs.
    These cultural influences shape his identity, providing a rich backdrop of values—family, respect, and solidarity—that complement his practical, compassionate personality.
