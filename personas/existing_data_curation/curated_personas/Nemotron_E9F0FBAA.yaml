  hobbies: '[''Playing soccer in local adult leagues'', ''Cooking traditional Mexican dishes'', ''Model train building'', ''Volunteering at a community food pantry'', ''Fishing at nearby lakes'']'
  career_goals: Jose aims to advance from laborer to crew foreman within the next three years, leveraging his organizational strengths and safety record. He plans to earn an OSHA 30‑hour certification and
    a journeyman carpenter credential, positioning himself for supervisory roles on larger residential and commercial projects. In the longer term, he dreams of launching his own modest construction firm
    focused on home renovations and affordable housing in Will County, where he can mentor younger workers and foster a cooperative, harmonious workplace culture.
