persona_description: A paleontologist and geneticist who specializes in the study of extinct species, particularly the passenger pigeon (Ectopistes migratorius). Her research focuses on the biology, genetics,
  and conservation of these species, and she is particularly interested in the potential for bringing them back to life using DNA technology. She has expertise in DNA analysis and has published research
  on the passenger pigeon's closest living relative, the band-tailed pigeon (Patagioenas fasciata). Her work has been featured in the Academy's research collection, which houses specimens and eggs of the
  passenger pigeon.
