  career_goals: Steinnagel aims to progress from construction manager to senior project director, overseeing large‑scale, community‑focused developments such as schools, affordable housing, and green‑building
    projects in the Chicago metropolitan area. He plans to earn PMP and LEED‑AP credentials, strengthen his strategic planning abilities, and implement flexible scheduling frameworks that still deliver
    predictable outcomes. A core ambition is to launch a mentorship program for apprentices, improving safety culture and career pathways for younger workers. Balancing his drive for professional growth
    with personal well‑being, he also seeks to cultivate better organizational habits to reduce stress and increase work‑life harmony.
