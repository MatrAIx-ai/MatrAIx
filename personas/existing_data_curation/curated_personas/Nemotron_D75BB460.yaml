  hobbies: '[''Lake fishing'', ''Hiking in the Minnesota countryside'', ''Playing acoustic guitar'', ''DIY woodworking projects'', ''Cooking and barbecuing'', ''Attending regional film festivals'', ''Reading
    film history'', ''Community theater volunteering'', ''Gardening with spouse'']'
  career_goals: Kenneth aims to launch his own production company focused on authentic Midwestern stories, with the long‑term goal of producing a feature‑length documentary that garners regional festival
    awards and broader distribution. He seeks to secure grant funding and partnerships with local businesses to expand his portfolio, while also mentoring emerging filmmakers in the Shakopee area. Over
    the next five years, he hopes to transition from primarily commercial and corporate video work to narrative feature projects that highlight the everyday lives of his community.
