personas:
  professional: Kenneth Chitarath is a hands‑on low‑budget producer and director who leverages practical curiosity and a flexible, sometimes disorganized, work style, allowing them to shepherd scripts,
    budgets, crews, and post‑production tasks from concept to final cut, turning community talent and local resources into authentic Midwestern stories.
  sports: Kenneth Chitarath enjoys weekend hikes with the Twin Cities Hiking Club, seasonal fly‑fishing trips with the Minnesota Fly Fishing Association, and avidly roots for the Minnesota Vikings and the
    Minnesota Wild; they keep a flexible fitness routine that favors brisk walks and occasional pickup basketball games over rigid gym schedules.
  arts: Kenneth Chitarath transforms a love of classic film theory into nightly screenings of the Coen Brothers and indie showcases at the Twin Cities Film Festival; they strum acoustic renditions of Bob
    Dylan and Bon Iver on guitar, and volunteer as a set designer for community theater productions, weaving storytelling into every creative outlet.
  travel: Kenneth Chitarath prefers low‑key road trips that blend scenic lake fishing in Duluth with craft‑brew stops in Portland; they dream of a summer adventure to Iceland’s volcanic landscapes and a
    cultural pilgrimage to the Cannes Film Festival in France, balancing tight budgets with occasional splurges on airfare.
  culinary: Kenneth Chitarath is an avid backyard griller who perfects smoked lake trout with dill and lemon, experiments with a chipotle‑honey glaze on pork ribs, and whips up hearty corn succotash from
    garden harvests; they display intermediate cooking skills that merge Midwestern comfort with occasional gourmet twists.
  core: Kenneth Chitarath blends a storyteller’s curiosity with a laid‑back, sometimes scatter‑shot schedule, juggling a garden, a grill, and a camera while they habitually misplace production call sheets.
background:
  cultural: Kenneth is a white Midwesterner raised in the suburbs of the Twin Cities, embodying the modesty, practicality, and community‑oriented values typical of that region. His upbringing in a working‑class,
    predominantly Irish‑English heritage family instilled a strong work ethic and a respect for collaborative effort. The local culture of seasonal festivals, county fairs, and a close‑knit neighborhood
    network informs his social outlook, while the wide-open landscapes of Minnesota shape his appreciation for nature and self‑reliance.
attributes:
  skills: '[''Low‑budget film production'', ''Story development'', ''Budgeting & finance management'', ''Crew scheduling'', ''Camera operation'', ''Lighting design'', ''Sound recording'', ''Post‑production
