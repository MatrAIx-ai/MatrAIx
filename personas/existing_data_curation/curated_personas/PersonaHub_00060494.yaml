persona_description: A historian or archaeologist who specializes in the study of ancient Indo-Iranian cultures, particularly the Indus civilization. They are interested in the chronology and relationships
  between cultures in the Indo-Iranian region during pre-Indus and ancient Indus times, and are particularly interested in the impact of Mesopotamian influence on the Indus civilization. They are also knowledgeable
  about the archaeology of early complex societies and the study of power in ancient societies, and have conducted research on the study of fishing along the Arabian Sea coast of Oman, Pakistan, and Sindh.
  They are also interested in the use of seals and their function in ancient societies, and have conducted research on the Ghaggar plains and the use of faience objects. They are also interested in the
  study of the ancient Indus civilization and its connections to contemporary Central Asian cultures.
