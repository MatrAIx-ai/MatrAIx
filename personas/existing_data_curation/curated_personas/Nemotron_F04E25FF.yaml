  hobbies: '["Visiting local art galleries and museums","Sketching and watercolor painting","Hiking in Minnesota state parks","Reading contemporary fiction, philosophy, and art history","Journaling and
    creative writing","Listening to indie folk music and podcasts","Volunteering at community food shelf","Assisting with local art workshops"]'
  career_goals: Rickey plans to complete his associate's degree in Office Administration or a related field while continuing to work, and then pursue a bachelor's degree in Museum Studies or Non‑profit
    Management. He aims to transition from receptionist to office manager, and eventually to a program coordinator role at a local art museum or community cultural center, where he can blend his administrative
    expertise with his passion for art and community service. To prepare for these roles, he intends to obtain project‑management and budgeting certifications, develop stronger leadership skills, and expand
    his professional network within the Twin Cities' arts and nonprofit sectors.
