persona_description: A painter who specializes in capturing the fleeting effects of light and weather upon architectural facades, particularly those of ecclesiastical buildings. Monet's work is characterized
  by a deep interest in the optical properties of light, the way it interacts with the environment, and the way it changes throughout the day. He is known for his obsessive pursuit of this subject, and
  his series of Rouen Cathedral in the early 1890s is a testament to his dedication and talent in this area.
