personas:
  professional: Selenia Seiglie, a 52‑year‑old master welder and CNC operator with three decades of precision metal fabrication experience, blends a meticulous eye for quality control with an artistic flair
    for decorative metalwork, and now channels their curiosity and collaborative spirit into pursuit of a Certified Welder credential and Lean Manufacturing certification to lead a small team toward reduced
    scrap rates and faster lead times, while they actively mentor junior staff and champion continuous‑improvement initiatives.
  sports: Selenia Seiglie enjoys low‑impact fitness through weekly hikes with the neighborhood walking club, shoots free‑throws at the community basketball court, follows the Houston Astros and the Dallas
    Cowboys as favorite professional teams, and they play on a co‑ed senior softball league, balancing light exercise with occasional yoga sessions for flexibility.
  arts: Selenia Seiglie channels her creative energy into making papel picado and vibrant quilts for the local Quilt Guild of Texas, strums acoustic renditions of Joan Baez, Los Folkloristas, and modern
    folk singer Gretchen Peters at community song circles, and they draw artistic inspiration from Frida Kahlo’s bold palettes and Theo Jansen’s kinetic sculptures, weaving these influences into her decorative
    metalwork.
  travel: Selenia Seiglie prefers short, purpose‑driven getaways, having explored Oaxaca’s Día de los Muertos festivals and taken a coastal road trip to Santa Barbara, while they keep a travel wishlist
    that includes a cultural immersion in San Miguel de Allende and an annual family reunion at the Texas Hill Country vineyards, balancing her love of adventure with the practical constraints of a busy
    workshop schedule.
  culinary: Selenia Seiglie cooks at a confident home‑chef level, often turning heirloom tomatoes and chilies from her garden into salsa fresca, classic pozole, and a bright avocado‑lime guacamole, while
    also mastering tamales de rajas and a smoky chipotle mole, and they love pairing these dishes with freshly baked corn tortillas and a splash of tarragon‑infused oil for a unique twist.
  core: Selenia Seiglie, a 52‑year‑old metal‑fabrication veteran with a relentless curiosity for both precision engineering and folk art, balances meticulous workshop discipline with a love for guitar strums,
    garden‑grown chilies, and occasional splurges on premium craft supplies, all while they unapologetically hoard a stash of spare screws for future projects.
background:
  cultural: As a Mexican‑American raised in the Rio Grande Valley, Selenia grew up bilingual, speaking Spanish at home and English at school. Her family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Carnaval, and religious holidays with elaborate food, music, and decorative arts. The local community in Alice, Texas, is a close‑knit mix of agricultural and industrial workers,
    where neighborhood fiestas and church gatherings serve as social anchors. Selenia’s identity is shaped by both the resilient work ethic of the Valley’s farming families and the vibrant artistic heritage
    of Mexican folk culture, which she carries forward in her everyday life and creative pursuits.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC machine operation'', ''Technical drawing interpretation'', ''Precision measurement'', ''Quality control inspection'', ''Preventive equipment maintenance'',
    ''Electrical and hydraulic troubleshooting'', ''OSHA safety compliance'', ''Decorative metalworking (repoussé, embossing, laser engraving)'', ''Mentoring and on‑the‑job training'']'
  hobbies: '[''Papier-mâché and papel picado crafting'', ''Quilting (Mexican-inspired patterns)'', ''Acoustic guitar playing'', ''Community folk‑song gatherings'', ''Online courses in 3D modeling and digital
    fabrication'', ''Makerspace volunteering (Arduino kinetic sculptures)'', ''Gardening (heirloom tomatoes, chilies)'', ''Traditional Mexican cooking'']'
  career_goals: While proud of her technical track record, Selenia aims to transition into a supervisory role within the next two years, obtaining a Certified Welder (CW) and a Lean Manufacturing certification
    to improve process efficiency. She envisions leading a small team of fabricators, establishing a continuous‑improvement program that reduces scrap rates and shortens lead times. Long‑term, she hopes
    to launch a side venture that merges her fabrication expertise with Mexican folk art, producing custom metal decorative items—such as lanterns, wall panels, and garden sculptures—selling them at local
    craft fairs and online. She also aspires to mentor more women in trades, possibly partnering with local vocational schools to develop apprenticeship pathways.
