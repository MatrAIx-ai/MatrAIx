persona_description: A colonial administrator and ethnographer who specialized in the preservation and documentation of indigenous cultures and artifacts, particularly in the Bismarck Archipelago. His collection,
  known as "Parkinson's Museum," was a significant contribution to the field of ethnography and was considered unique due to its age and scope. Despite his efforts to monetize his collection, he ultimately
  failed to secure a buyer for it. His death in 1909 left his family and his collection in the hands of his widow, Phebe Parkinson, who faced significant challenges due to her status as a Mischling in a
  white-dominated society.
