  career_goals: In the next five to ten years, Jong aims to transition into a senior leadership role such as Director of Operations or Operations Consultant, where he can shape organizational strategies
    that blend efficiency with employee wellbeing. He is pursuing a Six Sigma Black Belt certification to deepen his process‑improvement expertise, and he hopes to lead a company‑wide initiative that implements
    sustainable, technology‑driven workflow automation. Simultaneously, he aspires to formalize a mentorship program that pairs seasoned employees with newer hires, fostering a collaborative culture. Additionally,
    Jong envisions leveraging his operational background to advise local non‑profits on resource management, aligning his professional ambitions with his personal commitment to community service.
