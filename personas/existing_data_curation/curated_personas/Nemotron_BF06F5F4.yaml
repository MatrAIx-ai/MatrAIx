  career_goals: Christina aims to advance to a senior production planner or operations supervisor role within the next three years, leveraging her practical curiosity to implement higher‑efficiency initiatives.
    She plans to earn an APICS Certified Supply Chain Professional (CSCP) credential and complete a Lean Six Sigma Green Belt certification to strengthen her credentials. Ultimately, she hopes to lead a
    cross‑functional continuous‑improvement team that drives measurable cost savings and on‑time delivery improvements across the plant. She also aspires to mentor newer clerks, fostering a culture of accountability
    and data‑driven decision‑making.
