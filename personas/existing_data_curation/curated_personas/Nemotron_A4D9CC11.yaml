  hobbies: '["Competitive online gaming (strategy shooters)", "PC building and customization", "Coding small projects and game prototypes", "Reading science‑fiction literature", "Sketching comic art", "Jogging
    for stress management", "Nature photography of Texas prairies", "Participating in local robotics club activities"]'
  career_goals: Harvey aims to turn his curiosity for technology into a career as a software engineer, with a particular interest in indie game development and interactive media. He envisions building a
    portfolio of small games and tools that he can showcase to earn scholarships for a computer‑science program after re‑entering high school. In the longer term, he hopes to launch a modest tech startup
    that creates practical, user‑friendly software solutions for everyday problems, allowing him to work remotely and maintain the flexibility he values while achieving financial independence.
