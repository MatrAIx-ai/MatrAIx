personas:
  professional: Harvey Lam is an aspiring teen game developer who blends a competitive edge in online shooters with a practical knack for building custom gaming PCs, coding simple mobile games, and tackling
    robotics club challenges, while they balance meticulous organization with the flexibility to experiment on the fly.
  sports: Harvey Lam enjoys solo jogs through the nearby piney woods for stress relief, participates in the Crosby Youth Track Club’s after‑school running program, and roots for the Houston Astros and Rockets
    while they occasionally join friends for pickup basketball at the community center.
  arts: Harvey Lam immerses themselves in sci‑fi novels like Neuromancer, sketches comic strips echoing the style of Scott Pilgrim, captures sunrise prairie photography, and they balance a playlist that
    swings from Luke Combs’ country hits to the orchestral scores of The Witcher 3, shaping a creative identity that blends digital and rural inspirations.
  travel: Harvey Lam has explored nearby attractions such as Space Center Houston and the Texas State Fair, taken weekend road trips to Austin’s music scene, and they dream of attending a gaming expo in
    Tokyo and a sci‑fi film tour in Reykjavik, planning each adventure around school breaks and family budget constraints.
  culinary: Harvey Lam favors Texas‑style smoked brisket, chili with beans, and street‑taco al pastor, while their modest cooking skills turn out reliable mac and cheese and garlic‑butter shrimp, and they
    often snack on spicy chips with salsa during late‑night coding sessions.
  core: Harvey Lam is a competitively driven, shy teen who channels intense anxiety into meticulous PC building and solo jogs, and they balance a love for high‑score gaming with a low‑key passion for sunrise
    prairie photography.
background:
  cultural: Harvey grew up in a middle‑class white family on the outskirts of Houston, Texas, in the small community of Crosby. His household reflects a blend of Southern Texan values—self‑reliance, a pragmatic
    work ethic, and modest community pride—shaped by his parents' long‑standing careers in the regional petrochemical industry. Family gatherings often feature backyard BBQs, country music, and occasional
    trips to county fairs, while his personal interests lean toward national and global internet culture, including gaming forums and online coding communities. The local environment, with its pine forests
    and open prairies, nurtures his appreciation for solitary outdoor activities. Though exposed to the broader conservative‑leaning culture of the area, Harvey's reserved nature and competitive drive push
    him toward digital subcultures where he finds both validation and a sense of belonging.
attributes:
  skills: '["PC hardware assembly and troubleshooting", "Basic programming in Python and JavaScript", "Strategic thinking from competitive gaming", "Algebra and geometry problem solving", "Digital video
