personas:
  professional: Jonathan Gill is a budding software developer who leverages Python and Java scripting, network troubleshooting, and a collaborative, organized mindset to excel in college projects and peer
    tech support, while they balance curiosity with practicality in every line of code.
  sports: Jonathan Gill follows the Birmingham Barons and the Alabama Crimson Tide, participates in intramural soccer during the fall, and hits the Appalachian foothills for weekend trail runs, and they
    treat fitness as both recreation and mental recharge.
  arts: Jonathan Gill strums acoustic guitar at informal jam nights, drawing inspiration from John Mayer and The Avett Brothers, while they attend performances at The Nick in Birmingham and watch indie
    films at the Alabama Theatre.
  travel: Jonathan Gill plans low‑cost weekend getaways, having explored Asheville’s vibrant arts scene, the Blue Ridge Parkway’s overlooks, and a music‑filled trip to New Orleans, and they dream of a cross‑country
    road trip to the Pacific Northwest’s Seattle.
  culinary: Jonathan Gill enjoys cooking classic Southern dishes such as fried chicken, collard greens, and shrimp‑and‑grits, often tweaking recipes with smoked paprika or hot sauce, and they occasionally
    attempt Thai green curry for a culinary twist.
  core: Jonathan Gill blends a practical tech mindset with a love for hiking, gaming, and guitar, balancing disciplined work habits with a laid‑back weekend warrior vibe, and they never miss a chance to
    jam with friends after a long coding session.
background:
  cultural: Jonathan grew up in a middle‑class white family in Birmingham, Alabama, immersed in Southern culture that values hospitality, community ties, and a strong work ethic. His upbringing included
    regular church attendance at a local Baptist congregation, family gatherings centered around shared meals, and an emphasis on respect for tradition while remaining open to new ideas. He was raised with
    Southern etiquette and a love for regional foods like barbecue and collard greens, and he often heard stories about the civil‑rights history of his hometown, which fostered his interest in social harmony.
    This cultural backdrop, combined with his pragmatic curiosity, shapes his cooperative demeanor and his desire to contribute positively to his community.
