  hobbies: '[''Gardening (vegetables and native flowers)'', ''Birdwatching with sketch journaling'', ''Reading non-fiction (science, history, medical biographies)'', ''Crossword puzzles and Sudoku'', ''Quilting'',
    ''Cooking Southern recipes'', ''Walking nature trails'', ''Participating in a small book club'', ''Volunteering at a senior‑reading program'']'
  career_goals: Kira aims to transition from direct patient‑care duties to a leadership position where she can shape care delivery for the aging population of Central Tennessee. Over the next few years
    she plans to obtain Certified Nursing Assistant and Geriatric Care Management certifications, take on mentorship responsibilities for new aides, and spearhead the adoption of tele‑health and electronic
    health‑record best practices in her clinic. She hopes to influence policy on community‑based senior services, and ultimately to serve as a bridge between frontline staff and administrators, ensuring
    that practical, patient‑centered solutions are implemented.
