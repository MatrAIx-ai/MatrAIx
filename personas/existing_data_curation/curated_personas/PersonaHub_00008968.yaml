persona_description: An engineer or architect who specializes in building energy analysis and simulation. They are interested in using the International Weather for Energy Calculations (IWEC) files to estimate
  the typical annual energy consumption of buildings. They may also be interested in using the files to input into simulation software for the hourly simulation of solar energy systems. They are familiar
  with building energy simulation programs and have a low level of computer literacy. They are interested in using the files worldwide distribution and use, and may be interested in the CD-ROM is ISO-9660
  compliant and should be readable in any standard CD-ROM drive. They may also be interested in the prices for the IWEC files and the options for ordering them.
