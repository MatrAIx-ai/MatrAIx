  hobbies: '[''Volleyball (co‑ed league)'', ''Karaoke outings'', ''Zumba fitness classes'', ''Korean cooking'', ''Exploring local coffee shops and food trucks'', ''Weekend road trips to lakes and nature
    spots'', ''Mindfulness meditation'', ''Reading self‑improvement books'', ''Attending cultural festivals (e.g., Korean Heritage Festival, ArtPrize)'']'
  career_goals: Vy aims to progress along a clear, structured career ladder, targeting a senior account manager role within three years and a regional sales manager position thereafter. She plans to earn
    advanced sales certifications (e.g., MEDDIC, SPIN) and enroll in a part‑time MBA program to broaden her strategic perspective. Leveraging her bilingual background, she aspires to lead the company's
    expansion into Asian markets, eventually stepping into an international sales director role. Throughout her journey, she seeks to build a high‑performing team, mentor junior reps on organization and
    goal setting, and maintain a track record of surpassing quarterly targets while refining her stress‑management skills.
