personas:
  professional: Vy Kim excels as a B2B sales specialist in wholesale manufacturing, leveraging bilingual fluency, data‑driven pipeline management, and a competitive drive that keeps them pushing quotas
    while they battle occasional disorganization due to their spontaneous streak.
  sports: Vy Kim laces up for a co‑ed volleyball league and Zumba sessions three times weekly, cheers on the Grand Rapids Gold and Detroit Tigers with the same competitive fervor, yet they occasionally
    skip a workout when a late‑night karaoke session extends into the early morning.
  arts: Vy Kim finds creative release in karaoke nights belting out K‑pop hits by IU and BTS, darts to ArtPrize installations featuring local painter Shani Michael, and frequents the Grand Rapids Civic
    Theatre for contemporary productions, and they blend global pop culture with Midwestern arts to unwind from work pressure.
  travel: Vy Kim prefers spontaneous weekend road trips to Michigan’s Upper Peninsula, Mackinac Island, and the serene shores of Lake Michigan, yet they dream of a spring backpack adventure through Japan’s
    cherry‑blossom regions, balancing a modest student budget with a love for scenic drives and occasional last‑minute flight deals.
  culinary: Vy Kim cooks kimchi and bulgogi with confidence, experiments with gochujang‑marinated tofu and bibimbap topped with a fried egg, seeks out cappuccino and oat‑milk lattes at Madcap Coffee, and
    they sometimes splurge on fish‑taco trucks during late‑night cravings after a long sales day.
  core: Vy Kim blends a disciplined work ethic with a spontaneous social streak, channeling competitive fire into sales while they battle habitual worry and a penchant for late‑night karaoke meditations.
background:
  cultural: 'Vy is a second‑generation Korean‑American raised in Grand Rapids, Michigan. Her parents immigrated in the late 1990s and preserved Korean customs at home, including celebrating Seollal and
    Chuseok, speaking Korean daily, and attending a Korean church youth group. This bilingual upbringing gave her fluency in both English and Korean and a strong sense of family responsibility. Simultaneously,
    she absorbed Midwestern American culture—enjoying regional holidays, local sports, and the arts scene in Grand Rapids. The blend of collectivist family values and her own competitive, individualistic
    drive shapes her communication style: respectful yet direct, mindful of hierarchy while confidently asserting her ideas. Her cultural roots also inspire a love for Korean cuisine and community events,
    which she balances with the vibrant, diverse life of a Midwestern city.'
attributes:
  skills: '[''B2B sales'', ''Negotiation'', ''Customer relationship management'', ''Industrial product knowledge'', ''CRM software (Salesforce)'', ''Data analysis with Excel'', ''Bilingual communication
