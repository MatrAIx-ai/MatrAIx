  career_goals: Tonya aspires to pursue a career in health and community advocacy, aiming to become a pediatric nurse or mental‑health specialist who supports other young people in under‑resourced neighborhoods.
    In the short term, she plans to attend a STEM‑focused high school, excel in science classes, join a robotics club, and volunteer at a local clinic or community health center. Her long‑term ambition
    is to earn a scholarship for a health‑sciences program, obtain a nursing or allied‑health degree, and eventually develop culturally responsive mental‑health resources for Chicago’s Black youth.
