  hobbies: '[''Gardening'', ''Baking and cooking'', ''Reading historical fiction'', ''Hiking'', ''Volunteer work at community center'', ''Journaling'', ''Crochet and knitting'', ''Participating in trivia
    nights'', ''Board games (Scrabble)'', ''Attending local church events'']'
  career_goals: Teresa aims to solidify her educational foundation by obtaining a GED and enrolling in a community‑college program in business administration or office technology. Her short‑term goal is
    to secure a full‑time administrative assistant position with a local government office or small business in Hall County, where she can apply her organizational strengths in a structured environment.
    Simultaneously, she plans to launch a modest home‑based bakery, offering specialty cookies and pastries to neighbors and at local farmers' markets, using this venture to build entrepreneurial experience
    and supplemental income. Over the next five to ten years, Teresa aspires to achieve financial stability, purchase her own home in Buford, and become more actively involved in civic initiatives such
    as the town’s planning commission, leveraging her competitive drive to contribute to community development.
