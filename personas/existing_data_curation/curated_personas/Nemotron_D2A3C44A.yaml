personas:
  professional: Teresa Andrew, an aspiring administrative assistant, channels her love of structure and competitive drive into meticulous office management, leveraging basic Microsoft Office skills, First
    Aid certification, and community event coordination experience to keep local government workflows smooth.
  sports: Teresa Andrew enjoys weekend hikes on Stone Mountain Trail, supports the Atlanta Falcons and Atlanta Braves, and plays in a local community garden fitness club that mixes light cardio with gardening
    chores, treating exercise as a structured yet relaxing routine.
  arts: Teresa Andrew finds creative release in knitting, crochet, and baking, while devouring Flannery O'Connor's Southern tales and listening to classic country legends like Dolly Parton and the modern
    folk duo The Avett Brothers, weaving literary and musical influences into her holiday desserts.
  travel: Teresa Andrew favors short road trips to historic Southern towns such as Charleston, Savannah, and Asheville, planning itineraries around food festivals and local markets, yet she dreams of a
    spring getaway to New Orleans for its jazz scene when her budget finally allows.
  culinary: Teresa Andrew excels at Southern comfort cooking, expertly perfecting pecan pie crusts, peach cobbler, and homemade biscuits, while experimenting with heirloom tomatoes from her garden and adding
    a pinch of cayenne to her fried chicken batter for a subtle kick.
  core: Teresa Andrew blends a competitive, structure-loving mindset with Southern hospitality, turning garden chores, trivia nights, and meticulous budgeting into a lively routine that keeps her community
    close while chasing her own entrepreneurial dream.
background:
  cultural: Teresa grew up in a middle‑class, white Southern family in the suburban outskirts of Atlanta. Her upbringing emphasized Southern hospitality, close‑knit community ties, and regular involvement
    in a local Methodist church. She celebrates regional traditions such as the Buford Town Green Celebration and enjoys classic Southern cuisine, including fried chicken, collard greens, and peach cobbler.
    While rooted in these cultural norms, Teresa also embraces contemporary suburban influences, reflecting a blend of traditional values with modern practicality. Her cultural identity informs her preference
    for structured routines, community service, and a balanced social life that honors both family‑centered gatherings and personal reflection.
attributes:
  skills: '[''Household management'', ''Event coordination'', ''Budgeting and personal finance'', ''Microsoft Office basics'', ''Basic cooking and baking'', ''Garden maintenance'', ''First aid/CPR certified'',
