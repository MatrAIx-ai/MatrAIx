personas:
  professional: Chandra Colon, an aspiring teenage visual artist, blends watercolor, sketching, and tablet-based digital illustration to create vibrant character designs while meticulously planning each
    project and coordinating community mural collaborations with their art club.
  sports: Chandra Colon, a member of the Tucson Youth Soccer Club who enjoys weekend runs in the Sonoran Desert, follows the Arizona Diamondbacks and Phoenix Suns loyally, and balances structured training
    with casual skateboarding sessions at the local skate park to stay fit, reminding themselves to stretch before each practice.
  arts: Chandra Colon, an avid fan of Frida Kahlo, Diego Rivera, and indie pop duo Hello Seahorse!, spends after‑school hours sketching characters inspired by Día de los Muertos motifs, curating a digital
    portfolio that mixes graphic novel aesthetics with traditional folk art, and often shares their creations on a school art blog for peer feedback.
  travel: Chandra Colon, a curious traveler who has explored the historic Mission San Xavier del Bac, taken a family road trip to Sedona’s red rocks, and dreams of visiting the vibrant markets of Oaxaca
    and the museums of Barcelona, plans their trips with a mix of school assignments and spontaneous photo‑walks, and always packs a sketchbook for on‑the‑go doodles.
  culinary: Chandra Colon, a budding home baker who loves whipping up sweet pan de muerto, cinnamon‑spiced churros, and savory empanadas filled with cheese and pumpkin, experiments with fresh masa dough
    and a pinch of anise while perfecting their frosting technique for family gatherings.
  core: Chandra Colon, a creative whiz with a knack for balancing art projects and schoolwork, often forgets to do chores but never skips a deadline, hoards colorful stickers, and can be found doodling
    in the margins of their math notebook.
background:
  cultural: Chandra comes from a Mexican‑American family that has deep roots in Tucson. Spanish is spoken at home, and she celebrates traditions such as Día de los Muertos, quinceañera, and Mexican holidays
    with her extended family. The vibrant Mexican art and folklore that fill her community—from colorful papel picado to muralism—shape her aesthetic, and she often blends these motifs with the desert palette
    of the Sonoran landscape. Her bilingual upbringing and participation in local cultural festivals give her a strong sense of identity, which she channels into her artwork and future career aspirations.
