  skills: '[''drawing'', ''watercolor painting'', ''digital illustration (Procreate)'', ''basic coding (Scratch)'', ''public speaking'', ''bilingual communication (English/Spanish)'', ''event planning'']'
  hobbies: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''photography'', ''visiting museums and murals'', ''reading graphic novels and folklore'', ''coding simple games (Scratch)'',
    ''baking traditional Mexican pastries'', ''volunteering in community mural projects'', ''listening to Latin music'']'
  career_goals: Chandra aspires to turn her love of visual storytelling and her Mexican heritage into a professional career. She plans to enroll in an arts‑focused high‑school program in Tucson and later
    study graphic design or illustration at a university. In the long term, she hopes to work as a graphic designer and illustrator who creates culturally resonant digital artwork for books, games, and
    community campaigns. She also dreams of establishing a youth‑led art mentorship initiative that blends Mexican folkloric motifs with contemporary design, allowing her to apply her organized planning
    skills and her passion for collaborative creativity.
