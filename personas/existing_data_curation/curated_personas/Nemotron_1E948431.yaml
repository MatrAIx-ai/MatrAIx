personas:
  professional: A seasoned pharmacy technician with over two decades of precision-filled experience, Yaritza Perez leverages meticulous double-checking, bilingual communication, and a curiosity for emerging
    health tech to mentor staff and streamline workflow while quietly aspiring to a supervisory role.
  sports: Yaritza Perez finds her rhythm in early-morning walks along the Guadalupe River trail, occasional community-center yoga sessions, and is an avid fan of the San Jose Sharks and San Jose Earthquakes,
    cheering quietly from her balcony while preferring solo activity over team sports.
  arts: Yaritza Perez's artistic soul thrives on monthly visits to the San Jose Museum of Art, hunting pop-up galleries that showcase Mexican folk art, and painting Talavera-style ceramics inspired by Frida
    Kahlo and Diego Rivera, all while curating her own modest showcase at home.
  travel: Yaritza Perez prefers thoughtfully planned, low-key travel, savoring weekend getaways to Napa Valley's vineyards, revisiting Oaxaca's pottery markets for authentic glaze ideas, and dreaming of
    a future art-focused pilgrimage to Barcelona's Picasso Museum, balancing her love of culture with a modest budget.
  culinary: Yaritza Perez's kitchen is a laboratory of regional Mexican flavors, where she perfects mole poblano, chiles en nogada, and pozole using fresh cilantro, oregano, epazote from her balcony, and
    nutrient-rich superfoods like quinoa and chia seeds, while her skill level hovers between enthusiastic home-chef and experimental artist.
  core: Yaritza Perez blends meticulous pharmacy expertise with a quiet passion for ceramics, mindful yoga, and Mexican culinary exploration, all while juggling budget discipline, a love for solitary art
    adventures, and the occasional forgetful moment like missing her flu shot.
background:
  cultural: Yaritza is a first-generation Mexican American; her parents immigrated from Jalisco, and she grew up in a close-knit family that preserved many traditions of Mexican culture. She speaks fluent
    Spanish and English, which allows her to navigate both the Mexican community in San Jose and the broader American society. Celebrations such as Día de los Muertos, Las Posadas, and Mexican Independence
    Day are central to her family life, and she frequently prepares traditional dishes like pozole, tamales, and mole. The values of family solidarity, respect for elders, and humility she learned at home
    shape her interpersonal style at work. While she embraces the multicultural environment of the Bay Area, she also maintains strong ties to her heritage through participation in local Mexican cultural
    groups, attending church services conducted in Spanish, and supporting community events that promote Latino health awareness.
attributes:
  skills: '[''Prescription dispensing'', ''Medication verification and drug interaction checking'', ''Compounding sterile and non-sterile preparations'', ''Pharmacy inventory management'', ''Bilingual patient
    counseling (Spanish/English)'', ''Pharmacy software operation (PioneerRx, QS/1)'', ''Regulatory compliance and record-keeping'', ''Staff training and mentorship'', ''Workflow optimization and process
    improvement'', ''Continuing education on emerging pharmacy practices'']'
  hobbies: '[''Visiting art museums and galleries'', ''Painting ceramics with Talavera designs'', ''Cooking regional Mexican cuisine'', ''Herb gardening on balcony'', ''Practicing yoga and mindfulness meditation'',
    ''Reading books on integrative health and pharmacy innovations'', ''Participating in small community health workshops'', ''Attending local cultural festivals and Mariachi concerts'', ''Volunteer health-literacy
    sessions for senior residents'']'
  career_goals: Yaritza aims to transition into a senior supervisory role within the pharmacy, such as Lead Pharmacy Technician or Pharmacy Operations Coordinator, where she can leverage her experience
    to improve workflow efficiency and mentor younger staff. She plans to obtain the Certified Pharmacy Technician (CPhT) credential and eventually pursue the Pharmacy Technician Certification Board (PTCB)
    Advanced Certification in sterile compounding. Over the next few years, she hopes to spearhead a community outreach program that offers medication counseling and health-literacy workshops for Spanish-speaking
    seniors in San Jose. Additionally, she envisions a gradual shift toward part-time work that allows her more time for her art interests and family, while still maintaining a steady income for a comfortable
    retirement.
