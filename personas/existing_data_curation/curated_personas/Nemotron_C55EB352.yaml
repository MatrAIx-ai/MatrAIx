  skills: '["Agile Scrum", "Kanban", "Risk Management", "Budget Planning", "Stakeholder Communication", "Python", "SQL", "Advanced Excel", "Technical Writing", "Basic CAD", "Design Thinking"]'
  hobbies: '["Watercolor painting", "Photography", "Acoustic guitar", "Live music attendance", "Basketball", "Ultimate frisbee", "Board game nights", "Community festival volunteering", "Arduino/IOT tinkering",
    "Fishing", "Hiking coastal trails"]'
  career_goals: George aims to become a senior project manager within the next five years, leading large‑scale technology initiatives that intersect with creative industries such as digital media or interactive
    art installations. He plans to earn the PMP certification, deepen his experience managing cross‑functional teams, and eventually transition into a program‑director role where he can shape product strategy.
    Long‑term, he envisions founding a consultancy that helps tech startups incorporate user‑centered design and agile practices while fostering innovative, art‑inspired solutions.
