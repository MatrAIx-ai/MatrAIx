personas:
  professional: George Butler, a 24‑year‑old agile project manager who fuses a STEM‑based analytical rigor with a watercolor‑inspired design‑thinking outlook, leverages their Scrum certification, Python‑driven
    risk models, and advanced Excel budgeting to steer cross‑functional tech teams, while their laid‑back, occasionally disorganized habit of shuffling task boards translates into a flexible, people‑centric
    approach to meeting deadlines.
  sports: George Butler, an energetic participant in the Mobile Bay Basketball League each spring and a regular on the Coastline Flyers ultimate‑frisbee squad for weekend tournaments; they also cheer on
    the Alabama Crimson Tide during football season and enjoy occasional fishing trips as active recovery, but tend to skip the gym on days when a spontaneous board‑game night runs late, embodying their
    love of group sports and flexible fitness habits.
  arts: George Butler, a watercolor enthusiast inspired by Monet’s misty seascapes and Winslow Homer’s coastal realism; they spend afternoons painting Gulf‑shore sunsets while strumming acoustic covers
    of Joni Mitchell and St. Vincent with a casual weekend band, and regularly attend Mobile Museum of Art exhibitions featuring contemporary artists like Tschabalala Self as well as jazz nights headlined
    by Kamasi Washington and indie‑rock shows spotlighting Arcade Fire, reflecting their curious, open‑minded and slightly disorganized creative rhythm.
  travel: George Butler, who favors spontaneous road trips over strict itineraries; they often spend long weekends cruising the Gulf Coast from Mobile to Destin, soaking up the nightlife of New Orleans’
    French Quarter and the historic charm of Savannah, while day‑dreaming about a future backpacking adventure through Lisbon’s colorful street‑art districts and Norway’s fjord‑lined hikes, embodying a
    flexible travel style tempered by a modest budget and a love for group experiences.
  culinary: George Butler, a moderately skilled home cook, frequently prepares Gulf shrimp étouffée seasoned with cayenne, smoked paprika, and fresh thyme, tosses blackened catfish with a dash of Creole
    seasoning onto the grill, and experiments on weekends with a mango‑avocado sushi roll that mirrors the watercolor palette they love, while never passing up a buttery biscuit‑and‑gravy brunch at a downtown
    Mobile café, reflecting a palate that blends Southern comfort with artistic curiosity.
  core: George Butler blends a restless curiosity for art and technology with a laid‑back, occasionally scatter‑shot approach to deadlines; they turn spontaneous coffee‑shop brainstorming sessions into
    actionable project plans while never missing a chance to jam on their acoustic guitar.
background:
  cultural: George grew up in a middle‑class white family in Mobile, Alabama, where Southern hospitality and Gulf Coast traditions shaped his worldview. He was raised with an appreciation for local customs—such
    as the annual Mardi Gras festivities, Southern cuisine like gumbo and fried catfish, and the region’s rich musical heritage, including blues, jazz, and gospel. His public STEM education and exposure
    to the city’s burgeoning arts scene gave him a blend of analytical and creative perspectives, fostering a balanced respect for both his Southern roots and broader cultural experiences.
