  hobbies: '["Gardening", "Hiking in the Appalachian foothills", "Birdwatching", "Quilting", "Reading historical fiction", "Cooking traditional recipes", "Volunteer work at the local library", "Genealogy
    research", "Digital photography", "Attending church socials"]'
  career_goals: Although retired from formal employment, Rosalie aims to remain an active pillar of her community. She plans to coordinate a neighborhood garden, mentor younger volunteers in event planning,
    and complete a short digital‑photography course to document local wildlife and historic sites. She hopes to compile her family’s Appalachian history into a memoir for the local library and to assist
    with a historic preservation project that protects the cultural landmarks of Swain County. Maintaining her health through daily hikes and staying emotionally resilient remain central to her personal
    ambitions.
