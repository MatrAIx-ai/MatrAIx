persona_description: A researcher and medical expert who specializes in the development and evaluation of new medicines and vaccines. This person is knowledgeable about the impact of innovative medicines
  on various disease areas, including HIV/AIDS, cardiovascular disease, cancer, and infectious diseases. They are interested in the evidence that new medicines are helping keep patients out of hospital,
  which is particularly important in the context of hospital costs under increasing pressure. This person is likely to be interested in the publication of Australia's Health 2010 report, which outlines
  the importance of innovative new medicines in improving health outcomes for Australian patients.
