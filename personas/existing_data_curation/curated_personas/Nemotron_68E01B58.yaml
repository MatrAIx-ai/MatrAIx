  hobbies: '[''Hiking in the Oregon foothills'', ''Birdwatching'', ''Nature photography'', ''Visiting local art galleries and fairs'', ''Acoustic guitar playing'', ''Organic gardening'', ''Woodworking'',
    ''Reading philosophy and psychology'', ''Journaling'', ''Volunteering at community garden'']'
  career_goals: Shaun aims to expand his impact by creating a small, community‑based program that weaves art therapy and nature‑based activities into elder‑care services. He plans to pursue certification
    in geriatric art therapy and to become a mentor for younger aides, fostering a culture of creativity and person‑centered care. While he values flexibility and resists rigid hierarchies, Shaun envisions
    taking on a supervisory role that emphasizes collaborative decision‑making and holistic wellbeing rather than strict administrative oversight. Ultimately, he hopes to leave a legacy of compassionate,
    innovative care that honors the individuality of each client.
