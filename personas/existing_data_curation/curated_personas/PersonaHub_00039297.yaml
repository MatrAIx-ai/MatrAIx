persona_description: A researcher or scientist who specializes in the field of meteorology and climate change, particularly in the analysis of satellite data and the integration of various types of weather
  measurement instruments. They are interested in developing algorithms and methods to improve the accuracy and effectiveness of weather phenomena reconstruction and prediction, and are skilled in statistical
  analysis, data integration, and the application of remote sensing techniques. They are also familiar with oceanography and have experience with local calibration of empirical or semi-analytical algorithms
  for seawater constituents in the Mediterranean Sea.
