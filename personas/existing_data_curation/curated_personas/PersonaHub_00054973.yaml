persona_description: A history professor who specializes in the study of ancient civilizations, particularly those of the Roman Empire. His research interests include, but are not limited to, the political,
  social, and economic systems of the Roman Empire, the impact of Roman law on later European societies, and the cultural and artistic influences of ancient Rome. He is particularly interested in the role
  of religion in shaping the Roman worldview and the impact of Roman culture on the development of later European societies.
