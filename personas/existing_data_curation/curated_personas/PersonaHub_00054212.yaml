persona_description: A philosopher who is deeply interested in the works of Plato and the philosophy of Schelling, and is particularly drawn to the concept of the One and All. This person is a quick-witted
  essayist who has a keen understanding of the tension between philosophy and poetry, and is fascinated by the idea that every book is a quotation and every house a quotation from all forests and mines.
  This person is also a fan of the style of Plato's dialogues and is intrigued by the idea that the secret teaching of Plato is something that can only be known through dialogue and the sharing of ideas.
