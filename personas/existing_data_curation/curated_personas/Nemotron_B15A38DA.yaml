personas:
  professional: Deandre Henderson is a budding mini‑organizer who runs a daily play schedule, lining up blocks by color, announcing the afternoon’s agenda to family, and thriving on the predictability of
    routine while delighting in being the center of attention.
  sports: Deandre Henderson loves the local ‘Kiddie Kickers’ preschool soccer club and proudly wears a miniature jersey of the Chicago Cubs, cheering loudly at games while also participating in a parent‑led
    ‘tiny tots tumble’ gymnastics class, reflecting their sociable drive and need for structured activity.
  arts: Deandre Henderson is enchanted by the bright illustrations of Eric Carle and sings along to the catchy tunes of The Wiggles, often reenacting scenes from Disney’s Frozen with stuffed animals, showing
    how creative play fuels their talkative, attention‑seeking personality.
  travel: Deandre Henderson’s favorite family trips include a sunny day at Clearwater Beach and a magical week at Disney World in Orlando, and they dream of seeing the Eiffel Tower someday, preferring well‑planned
    excursions with familiar routines and the comfort of familiar faces.
  culinary: Deandre Henderson indulges in buttery macaroni and cheese sprinkled with cheddar, loves crunchy goldfish crackers, and proudly spreads peanut butter on apple slices with a plastic knife, displaying
    a selective palate that favors familiar textures while occasionally experimenting with a dash of cinnamon on pancakes.
  core: Deandre Henderson is a methodical, talkative 3‑year‑old who organizes toys, saves pennies, and centers playtime while secretly fretting over dark corners and tiny changes in routine.
background:
  cultural: Deandre is an African-American child growing up in Gainesville, Florida. His family maintains strong ties to the local Black community, attending a historically Black Baptist church where music,
    storytelling, and communal gatherings are central. Weekend family meals often feature Southern staples such as collard greens, sweet potatoes, and fried chicken, and the family celebrates cultural holidays
    like Juneteenth and Kwanzaa with traditional foods, music, and dance. The proximity to the University of Florida and the city’s vibrant cultural scene expose him to multicultural events, while his parents
    emphasize the importance of education, respect, and community service, shaping his sense of identity and belonging.
