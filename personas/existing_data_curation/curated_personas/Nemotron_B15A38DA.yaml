  career_goals: Even at three, Deandre loves day-dreaming about future jobs. He frequently says he wants to be a teacher because he enjoys helping friends learn new things and likes to keep classroom routines
    organized. He also mentions wanting to be a firefighter, admiring the clear structure of drills and the chance to be a hero in front of a crowd. Occasionally, he expresses a desire to become a musician
    or performer, relishing the attention he gets when he sings or dances. These ambitions reflect his preference for structured roles where he can lead, help, and be recognized.
