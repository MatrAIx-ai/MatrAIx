persona_description: A public health expert and researcher who specializes in the study of dengue virus, particularly the transmission, epidemiology, and prevention of the disease. They have conducted research
  on the Key West outbreak and have published findings on the size of the outbreak and the factors that contribute to the transmission of the disease. They have also investigated the effectiveness of mosquito
  control measures and the impact of air conditioning and screened windows on the risk of infection. They are knowledgeable about the transmission of dengue virus from humans to mosquitoes and back to humans,
  and have conducted research on the prevention of the disease through vaccination.
