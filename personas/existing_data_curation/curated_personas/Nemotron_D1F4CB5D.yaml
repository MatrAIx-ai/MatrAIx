  hobbies: '["Gardening", "Knitting", "Crocheting", "Bridge", "Reading classic mystery novels", "Church choir", "Volunteer work at senior center", "Cooking and baking", "Scrapbooking", "Walking in nature"]'
  career_goals: Although retired from formal employment, Regina is determined to make a lasting contribution to her community. She aims to become the primary coordinator for the local Meals-on-Wheels program,
    organize intergenerational gardening workshops that teach younger neighbors traditional planting techniques, compile and publish a family-recipe cookbook for the senior center, and continue to support
    her husband’s health and well-being while maintaining her own routine of disciplined self-care.
