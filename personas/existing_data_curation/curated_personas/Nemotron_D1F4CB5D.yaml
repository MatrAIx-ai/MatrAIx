personas:
  professional: Regina Sanchez is a retired community organizer who now spearheads the local Meals‑on‑Wheels program, leveraging their decades‑long expertise in meal planning, budgeting, volunteer coordination,
    and conflict mediation to ensure that every senior in the town receives a warm, home‑cooked dinner on schedule.
  sports: Regina Sanchez is a devoted fan of the local high‑school football team, the River Valley Rams, and enjoys watching the Chicago Cubs on summer evenings, while personally staying active by walking
    the neighborhood park three times a week, participating in the senior center's low‑impact water aerobics class, and tending to the garden as their daily cardio, ultimately preferring gentle movement
    over competitive sports.
  arts: Regina Sanchez finds creative fulfillment through knitting blankets for hospice patients, crocheting doilies for the church, singing hymns by Fanny Crosby and modern worship songs by Keith Getty
    with the choir, and escaping into classic whodunits by Agatha Christie, all while admiring the impressionist works of Mary Cassatt displayed at the regional art museum and sharing their enthusiasm with
    fellow choir members.
  travel: Regina Sanchez savors road‑trip excursions to historic sites such as the colonial town of Williamsburg, the serene gardens of the Biltmore Estate, and the vibrant farmers market in Asheville,
    preferring meticulously planned itineraries that balance seated sightseeing with opportunities to sample local pies, yet often postpones longer journeys due to concerns about travel fatigue and the
    need to stay close to the hospice volunteers they support.
  culinary: Regina Sanchez’s kitchen is a fragrant sanctuary where they bake classic apple‑cinnamon pie, simmer heirloom tomato sauce for spaghetti, and craft a buttery chicken pot pie using a family recipe
    handed down through generations, all while seasoning dishes with fresh rosemary, thyme, and a pinch of nutmeg, and delighting neighbors at potluck gatherings with their famous peach cobbler.
  core: Regina Sanchez is an 82‑year‑old garden‑loving, choir‑singing, coupon‑clipping community champion whose meticulous routine coexists with a lingering worry about health and finances, a penchant for
    over‑organizing volunteer schedules, and a secret love for Agatha Christie mysteries that they indulge in nightly.
background:
  cultural: Regina’s cultural background is rooted in the mid-20th-century rural Anglo-American traditions of California’s Salinas Valley. Raised on a modest farm by parents who valued hard work, modesty,
    and community service, she grew up attending a nearby church where seasonal festivals, potluck meals, and mutual-aid practices were central. This upbringing fostered her love for gardening, home-cooking,
    craftwork, and a strong sense of responsibility toward neighbors and family.
attributes:
  skills: '["Meal planning", "Budget management", "Home organization", "Gardening", "Floral arranging", "Sewing", "Knitting", "Crocheting", "First aid", "Volunteer coordination", "Community event planning",
