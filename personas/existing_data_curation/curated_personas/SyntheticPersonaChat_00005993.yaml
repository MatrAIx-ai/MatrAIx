    User 1: So, what''s your favorite song to play?

    User 2: We have a lot of fun playing "Smells Like Teen Spirit".

    User 1: That''s a classic! I love Nirvana.

    User 2: Yeah, they''re one of our biggest influences.

    User 1: So, where do you play?

    User 2: We play at a lot of different places. We''ve played at a few local bars and clubs, and we''ve also played at some festivals.

    User 1: That sounds fun! I''d love to come to one of your shows.

    User 2: We''d love to have you!

    User 1: Great! I''ll keep an eye out for your next show.

    User 2: Thanks!

    User 1: So, what else do you like to do for fun?

    User 2: I also like to go to coffee shops.

    User 1: Me too! I love the atmosphere of coffee shops.

    User 2: Yeah, they''re so relaxing.

    User 1: So, do you go to coffee shops often?

    User 2: I try to go at least once a week.

    User 1: That''s great! I go about the same amount.

    User 2: Cool!

    User 1: So, what''s your favorite coffee shop?

    User 2: I really like the Coffee Bean and Tea Leaf.

    User 1: Me too! They have great coffee.

    User 2: Yeah, they do.

    User 1: So, what do you like to order at the Coffee Bean and Tea Leaf?

    User 2: I usually get a cappuccino.

    User 1: That''s a good choice! I usually get a latte.

    User 2: Lattes are good too.

    User 1: Yeah, they are'
