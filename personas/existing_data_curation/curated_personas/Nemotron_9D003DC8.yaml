  hobbies: '[''cooking Indian cuisine'', ''community dancing (Bollywood and contemporary)'', ''gardening'', ''reading mystery novels'', ''watching Bollywood movies'', ''participating in cultural festivals'']'
  career_goals: Tulsi aspires to move into a supervisory role within the facilities department, aiming to become a shift lead or floor manager within the next three years. She plans to earn a certification
    in commercial cleaning management and hopes to eventually start her own small cleaning business that serves local small‑business owners, allowing her to have more control over her schedule while providing
    stable income for her family. She also wants to mentor new employees, especially other women from immigrant backgrounds, and contribute to a more inclusive workplace.
