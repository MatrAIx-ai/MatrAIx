personas:
  professional: Tulsi Rai, a 41‑year‑old building cleaning professional, combines meticulous floor‑care expertise and hands‑on troubleshooting with a friendly, assertive presence that keeps tenants happy
    while they quietly pursue a supervisor certification and a future as a cleaning business owner.
  sports: Tulsi Rai stays active by attending a Friday night dance class that fuses Bollywood moves with contemporary style, playing casual badminton at the neighborhood sports club, and cheering on the
    Riverside Rovers soccer team during the season.
  arts: Tulsi Rai immerses themselves in the rhythmic world of Bollywood by learning choreography to A.R. Rahman’s hits, binge‑watching classic films starring Amitabh Bachchan and Shah Rukh Khan, and unwinding
    with Agatha Christie mysteries, often quoting iconic dialogues at gatherings.
  travel: Tulsi Rai enjoys planning weekend getaways with friends that blend cultural immersion—like trips to Marrakech’s souks or Singapore’s hawker centers—with relaxed beach time in Santorini, while
    they dream of exploring Kyoto’s temples on a future solo adventure.
  culinary: Tulsi Rai delights in cooking aromatic biryani layered with basmati rice, saffron, and tender chicken, alongside golden‑fried samosas stuffed with spiced potatoes and peas, often seasoning with
    freshly chopped cilantro, cumin, and cardamom, while their garden’s mint and coriander supply the freshest aromatics.
  core: A meticulous cleaning expert with a green thumb, Tulsi Rai balances a love for structured work and spontaneous festival feasts, thrives on community dance, and never misses a chance to solve a mystery
    novel before bedtime.
background:
  cultural: Tulsi is a first‑generation South Asian American of Indian descent. She grew up in a household where Hindi and Punjabi were spoken, and she observes Hindu festivals such as Diwali and Holi,
    blending them with the rhythms of life in Mckeesport, Pennsylvania. Her family values education, hard work, and community service, and she maintains close ties with the local South Asian community through
    the temple and cultural association. While she embraces American customs, she preserves traditional rituals, cooking, music, and social gatherings that reflect her heritage.
attributes:
  skills: '[''routine cleaning'', ''floor care (stripping, waxing, carpet cleaning)'', ''hazardous waste handling'', ''basic plumbing maintenance'', ''health and safety compliance'', ''customer service'',
