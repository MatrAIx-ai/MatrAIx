personas:
  professional: Mary Gilbert is a 29‑year‑old B2B sales specialist in the wholesale manufacturing sector, and they blend empathetic negotiation with artistic visual storytelling to win clients, while their
    spontaneous, curiosity‑driven nature fuels innovative market research but sometimes clashes with the tight deadlines demanded by sales cycles.
  sports: Mary Gilbert embraces the outdoors with weekend hikes in the Columbia River Gorge and a seasonal membership in the Portland Trail Runners club, and they cheer on the Portland Timbers in the MLS
    while occasionally playing recreational beach volleyball at the Pearl District's community courts.
  arts: Mary Gilbert channels their curiosity into sketching Portland’s skyline, and they frequent gallery openings that showcase local artists like painter Margaret Tompkins and photographer Ansel Adams,
    while their pottery experiments echo the tactile sensibilities of ceramicist Ruth Duckworth, and they regularly stream live performances by folk singer Phoebe Bridgers to unwind.
  travel: Mary Gilbert favors spontaneous weekend escapes to the Columbia River Gorge for hiking and photography, and they dream of a sustainable pilgrimage to New Zealand’s South Island and a cultural
    tour of Kyoto’s traditional pottery districts, balancing limited savings with flexible itineraries that avoid heavy planning.
  culinary: Mary Gilbert delights in cooking with locally sourced ingredients, and they often prepare cedar‑plank salmon topped with dill and lemon, perfect a miso‑glazed mushroom ramen featuring shiitake
    and enoki, while they also enjoy a fresh avocado toast sprinkled with hemp seeds at their favorite downtown café.
  core: Mary Gilbert is a creatively driven sales professional who balances spontaneous artistry with a deep commitment to sustainable community building, even as they wrestle with occasional disorganization
    and a tendency to over‑commit.
background:
  cultural: Mary grew up in the Pacific Northwest, where the culture emphasizes environmental stewardship, self‑reliance, and a strong appreciation for the outdoors. Being white in a predominantly liberal
    Oregon community, she was raised with values of inclusivity, community involvement, and a progressive outlook on social issues. The nearby Portland arts scene and the region’s focus on sustainable manufacturing
    have shaped her aesthetic sensibilities and her professional interest in eco‑friendly product solutions. Her upbringing in a suburban setting like Sandy fostered a blend of modest, middle‑class values
    with an openness to new ideas and diverse experiences.
