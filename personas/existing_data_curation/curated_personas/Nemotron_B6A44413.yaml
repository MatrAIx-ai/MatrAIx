  hobbies: '[''Visiting art galleries and sketching'', ''Hiking and nature photography in the Columbia River Gorge'', ''Pottery and DIY home décor'', ''Yoga and mindfulness meditation'', ''Volunteering
    at community shelters'', ''Spontaneous road trips'', ''Listening to indie music festivals'']'
  career_goals: Mary aims to advance from a sales representative to a senior sales manager within the next three to five years, focusing on leading a high‑performing team that values collaboration and wellbeing.
    She aspires to specialize in sustainable manufacturing solutions, helping clients adopt eco‑friendly practices. In the long term, she envisions creating her own consultancy that bridges local artisans
    and larger manufacturers, promoting ethical sourcing and community‑centric product development. To support these goals, Mary plans to pursue a certification in sales leadership and explore coursework
    in sustainable business practices.
