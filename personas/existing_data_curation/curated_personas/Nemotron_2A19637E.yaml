personas:
  professional: Sandra Counts, a 17‑year‑old aspiring visual artist, blends self‑taught Procreate expertise with a surreal storytelling sensibility, turning her spontaneous curiosity and need for solitude
    into freelance illustration work that emphasizes quiet, introspective narratives.
  sports: Sandra Counts prefers low‑key, nature‑focused fitness, jogging along the Delta waterways at sunrise, doing occasional yoga at a community studio, cheering for the Sacramento Kings and San Francisco
    49ers on game nights, and paddling with the Delta Kayak Club to clear their mind, reflecting a love of solitary activity over team sports.
  arts: Sandra Counts immerses themselves in contemporary illustration and ambient soundscapes, drawing inspiration from Shaun Tan, Hayao Miyazaki’s 'Spirited Away', the graphic novel series 'Sandman',
    and lo‑fi beats by Nujabes and Tycho, while regularly attending intimate gallery openings featuring emerging surrealist painters.
  travel: Sandra Counts seeks quiet, solo travel that fuels artistic inspiration, having taken weekend photo trips to the Oregon coast and a summer camp in the Redwood forests, and dreaming of a future
    sketch‑filled pilgrimage to Iceland’s basalt cliffs and Kyoto’s bamboo groves, all organized on a modest teen budget using free hostel platforms and last‑minute bus deals.
  culinary: Sandra Counts enjoys simple, plant‑forward meals like avocado toast seasoned with za'atar, prepares homemade matcha lattes with oat milk, occasionally cooks fettuccine alfredo with fresh basil,
    and frequents indie coffee shops for artisanal pastries while doodling culinary ideas in their sketchbook.
  core: Sandra Counts is a quietly intense 17‑year‑old art‑driven introvert whose spontaneous curiosity fuels relentless solitary creativity, balanced by a habit of over‑thinking finances and battling anxiety
    through mindful sketching.
background:
  cultural: Sandra was born and raised in Pittsburg, a working‑class city in Contra Costa County on the East Bay of California. She comes from a white American family with German‑Irish roots, and English
    is her native language. Growing up near the industrial waterfront, she was exposed to a blend of blue‑collar culture and the vibrant multicultural atmosphere of the greater Bay Area. She spent time
    at community centers and local libraries that offered art and after‑school programs, which sparked her love for drawing. The progressive, environmentally‑conscious ethos of the region has shaped her
    values, and she often participates in neighborhood clean‑up events and supports local artists. While her household is largely secular, some family traditions include celebrating holidays like Christmas
    and St. Patrick’s Day, reflecting her mixed heritage.
