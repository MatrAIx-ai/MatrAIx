  career_goals: Sandra aspires to turn her passion for art into a sustainable career that affords her the flexibility and solitude she values. Her immediate goal is to complete her GED and enroll in a community‑college
    program in visual arts or art therapy. She hopes to build a strong portfolio of illustrations and graphic narratives that she can market as a freelance illustrator for books, indie games, or online
    media. Over the longer term, she envisions using her creative skills to support mental‑health initiatives, perhaps by working as an art therapist for youth in underserved communities, or by conducting
    workshops that combine art‑making with mindfulness. She also dreams of exhibiting her work in local galleries and eventually establishing a small online shop for prints and handmade crafts.
