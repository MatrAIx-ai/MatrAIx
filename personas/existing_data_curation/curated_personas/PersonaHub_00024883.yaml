persona_description: A digital photogrammetry expert who uses specialized software to analyze and create 3D models from digital photographs and videos. They are skilled in using metric cameras and are familiar
  with the process of creating 2D and 3D measurements from photographs. They are also familiar with the different types of photographs used in digital photogrammetry, including aerial and close-range, and
  the various categories of digital photographs used, including still digital photographs and video. Additionally, they are likely to be interested in the process of creating digital stereophotogrammetry
  and the importance of choosing the right type of camera and photograph for the project.
