  hobbies: '[''Book Club'', ''Volunteer Work at Community Center'', ''Gardening'', ''Cooking and Recipe Swaps'', ''Fishing/Boating on the Gulf Coast'', ''Local History Society Membership'', ''Quilting Circles'',
