  career_goals: Brenyn aims to transition into a senior regional leadership role where she can shape policy for multiple locations and mentor emerging managers. She hopes to spearhead community‑development
    initiatives that leverage her humanities background, such as cultural heritage projects and local nonprofit partnerships. Over the next five years, she plans to earn a certification in nonprofit management,
    expand her professional network, and eventually establish a part‑time consulting practice focused on organizational resilience and employee well‑being, allowing her to balance professional ambition
    with personal stress management.
