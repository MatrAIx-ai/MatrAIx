  hobbies: '[''photography'', ''watercolor painting'', ''Cajun/zydeco music listening'', ''bridge'', ''chess'', ''historical docent work'', ''gardening'', ''fishing'', ''travel to art museums'']'
  career_goals: Although retired, Micheal aims to channel his curiosity and competitive spirit into meaningful contributions. He plans to mentor younger members of the local Rotary Club in project planning
    and financial stewardship, and to develop a series of weekend workshops on photography and art appreciation for seniors. He aspires to curate a traveling exhibition of local folk art, partnering with
    the Hammond Museum, and hopes to author a memoir that weaves together his experiences with the cultural tapestry of Livingston Parish. Learning conversational French, to better engage with the region’s
    Cajun heritage, and visiting major art museums in New Orleans and beyond are also on his personal agenda.
