personas:
  professional: Maria Fernandez, a budding mini architect who meticulously arranges wooden blocks into towering structures, showcases their curiosity for new designs and disciplined eye for detail, and
    they turn playtime into an early lesson in organized problem‑solving.
  sports: Maria Fernandez, an enthusiastic little soccer fan who tunes into Los Angeles Galaxy matches with family, plays bright‑colored soft balls with the Little Sprouts preschool soccer club at the neighborhood
    park, and they enjoy gentle yoga stretches during recess, reflecting their balance of social play and quiet focus.
  arts: Maria Fernandez, a tiny rhythm lover who claps along to marimba melodies at family celebrations, doodles vivid sugar‑skull patterns with crayons, and they sing along to Juanes and Disney songs,
    demonstrating their kindness by sharing art supplies and their organized mind by keeping their drawings neatly stacked.
  travel: Maria Fernandez, a curious explorer who thrills at weekend trips to the Echo Park farmers’ market, eagerly awaits annual visits to grandparents’ house in Pasadena, and they daydream about the
    bright lanterns of Chiang Mai after seeing a picture book, illustrating their love for both familiar community gatherings and far‑away wonders.
  culinary: Maria Fernandez, a budding foodie who adores the soft warmth of tamales, the cheesy pull of pupusas, and the creamy bite of ripe avocado, proudly sprinkles a pinch of cinnamon on oatmeal, yet
    they occasionally turn their nose up at broccoli, showing a blend of adventurous palate and selective cravings.
  core: Maria Fernandez, a meticulous two‑year‑old who lines up Bobo dolls by color, saves every discovered coin, follows nightly moisturizer rituals, dribbles a soft soccer ball, claps to marimba beats,
    explores backyard gardens, and indulges in sweet treats when mood swings toward indulgence, and they proudly showcase their organized spirit.
background:
  cultural: Maria’s family maintains strong Guatemalan roots while living in Los Angeles. She is bilingual, speaking Spanish at home and English at preschool. Family traditions include celebrating Día de
    los Muertos, sharing pupusas and tamales, and listening to traditional marimba music. She participates in local Guatemalan community events and festivals, which enrich her cultural identity and foster
    a sense of belonging.
