  career_goals: Even at two years old, Maria imagines a future where she can help others and work in a structured, caring environment. She expresses a desire to become a teacher or a community health aide,
    driven by her natural kindness, organized nature, and a love for learning. Her long‑term ambition is to use her bilingual abilities to support other children in her community.
