  career_goals: Rebecca hopes to transform her lifelong curiosity and artistic interests into a low‑stress, flexible venture that allows her to work at her own pace. She aims to launch an online shop on
    platforms like Etsy to sell original paintings, hand‑crafted home décor, and vintage postcard reproductions. Simultaneously, she plans to complete a community‑college certificate in digital media design
    to improve her online marketing skills. Additionally, she aspires to volunteer as a docent and occasional curator at the Spencer County Historical Society, using her research and critical analysis abilities
    to develop engaging exhibits about local history. Lastly, she hopes to establish a regular mindfulness and journaling routine to better manage her stress and negative emotions while maintaining her
    competitive edge in local board‑gaming tournaments.
