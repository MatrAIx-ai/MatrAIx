personas:
  professional: Rebecca Parks, a self‑taught acrylic and watercolor painter and digital photographer, channels their Midwestern curiosity and competitive edge into a low‑stress Etsy venture selling original
    landscapes, hand‑crafted home décor, and restored vintage postcard reproductions while pursuing a community‑college digital media design certificate and occasional docent work at the local historical
    society, often battling their relaxed attitude toward deadlines with bouts of procrastination.
  sports: Rebecca Parks maintains a modest fitness routine that includes weekend hikes along the Ohio River trail and Thursday evenings at the Spencer County Pickleball Club, while cheering the Indianapolis
    Colts and Indiana Pacers on game days and using their competitive nature to dominate local board‑gaming tournaments as a form of mental sport.
  arts: Rebecca Parks intertwines their love for Indiana’s rolling fields with the dry brushwork of Grant Wood and the atmospheric tones of Andrew Wyeth, curates a personal online gallery of vintage postcard
    restorations, attends local folk‑music evenings featuring Bob Dylan covers, and fuels their creative writing with the literary insights of Annie Dillard, all of which shape a distinctive, quietly critical
    artistic voice.
  travel: Rebecca Parks favors low‑key road trips to natural retreats like Hocking Hills State Park and Mackinac Island, plans spontaneous weekend getaways using a handwritten map scribble habit, dreams
    of a summer art immersion in the Cotswold villages of England, and balances their modest travel budget with occasional splurges on boutique farm‑to‑table B&Bs, all while their competitive planning mindset
    leads them to compare itineraries with fellow board‑gaming club members.
  culinary: Rebecca Parks, an avid vegan home chef, transforms heirloom vegetables into dishes like roasted beet quinoa salad with walnut‑coriander vinaigrette and wild mushroom risotto using locally sourced
    mushrooms, while honing a sourdough starter for artisanal bread, occasionally indulging in farm‑to‑table brunches featuring avocado toast topped with smoked paprika and lemon zest, a culinary habit
    that underscores their love for seasonal freshness and experimental flavor pairings.
  core: Rebecca Parks, a 51‑year‑old countryside‑born painter and strategic board‑game zealot, balances a love of solitary creative pursuits with a fiercely competitive streak, navigating chronic stress
    and a habit of scattered organization through mindful journaling and spontaneous art‑making.
background:
  cultural: Rebecca was raised in Grandview, Indiana, a small rural community in Spencer County. The local culture emphasizes self‑reliance, close ties to the land, and modest, community‑oriented values.
    Growing up, she was surrounded by the region's natural scenery—farmlands, forests, and the Ohio River—shaping her appreciation for nature and the outdoors. The Midwestern emphasis on practicality and
    modesty influenced her pragmatic approach to life, while local community events, county fairs, and the county historical society fostered her curiosity about regional art, history, and folk traditions.
    Although her family background is ethnically white, she has absorbed a blend of traditional Midwestern customs and contemporary small‑town arts, which informs her eclectic taste in visual and literary
    arts.
