personas:
  professional: Tuan Van, a thirteen‑year‑old budding visual storyteller, channels the Colorado foothills into richly detailed fantasy concept art for indie game projects while juggling school assignments
    with disciplined sketch‑a‑day practice, and they often share their creations on a kid‑friendly online art forum.
  sports: Tuan Van, a thirteen‑year‑old outdoor enthusiast, hikes the Boulder Creek trails solo on weekends, cheers for the Denver Broncos and Colorado Avalanche, and occasionally runs with a local youth
    cross‑country club that they joined through school.
  arts: Tuan Van, a thirteen‑year‑old creative, fills sketchbooks with fantastical creatures inspired by speculative fiction authors like Ursula K. Le Guin and Patrick Rothfuss, practices calligraphy that
    blends traditional scripts with modern hand‑lettering, and experiments with Blender to turn 2‑D drawings into low‑poly 3‑D models while listening to ambient composers Brian Eno and Ludovico Einaudi,
    and they often post progress updates on a personal blog.
  travel: Tuan Van, a thirteen‑year‑old nature‑loving explorer, has visited Rocky Mountain National Park and Grand Teton National Park, dreams of trekking the misty forests of the Pacific Northwest, and
    hopes to someday stroll through Kyoto’s temple gardens on a school‑organized cultural exchange, and they meticulously plan each trip using maps and travel journals.
  culinary: Tuan Van, a thirteen‑year‑old budding cook, prefers simple comfort foods like grilled cheese sandwiches and margherita pizza, enjoys chopping fresh carrots and kale for a weekly vegetable stir‑fry,
    experiments with seasoning blends while humming ambient tunes, and they occasionally forget to clean the kitchen after cooking.
  core: Tuan Van, a thirteen‑year‑old introspective creator, blends solitary hikes with sketching, keeps a meticulous journal, balances a quiet love of fantasy worlds with a practical habit of budgeting
    a modest allowance, and they sometimes drift into day‑dream‑induced procrastination when faced with school deadlines.
background:
  cultural: Tuan was born in Broomfield, Colorado, to parents who emigrated from Vietnam in the early 2000s. At home, he grows up hearing both English and Vietnamese, celebrating Tet, and helping his family
    prepare traditional dishes such as pho and bánh mì. The family participates in the local Vietnamese community center, where Tuan occasionally joins cultural workshops on calligraphy and folk music.
    The blend of American suburban life—hiking, snow days, community events—and his family's Southeast Asian traditions informs his worldview, giving him a deep appreciation for both nature and storytelling.
    He values the strong work ethic, respect for elders, and emphasis on education taught by his parents, while also embracing the independence and exploratory spirit encouraged by his school environment.
