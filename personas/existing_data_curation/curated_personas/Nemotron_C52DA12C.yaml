    ''Listening to ambient instrumental music'']'
  career_goals: In the short term, Tuan aims to join his high school's Art & Digital Media magnet program, where he can deepen his skills in illustration, animation, and coding. He plans to earn certifications
    in Adobe Creative Suite and pursue additional Python coursework to build a portfolio of interactive art pieces. In the long run, he aspires to attend a university that offers a blend of game design,
    interactive storytelling, and visual arts, such as the University of Colorado Boulder's Interactive Media program. His ultimate ambition is to become a concept artist and narrative designer for video
    games or animated films, creating immersive worlds that weave together modern aesthetics with traditional Southeast Asian myths. He also hopes to develop an indie game that showcases his cultural heritage
    while introducing innovative gameplay mechanics.
