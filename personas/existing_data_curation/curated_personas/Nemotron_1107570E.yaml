personas:
  professional: Marta Lopez, a seasoned special‑education teacher, leverages her bilingual fluency and expertise in IEP development to design art‑infused, accessible curricula while championing collaborative
    partnerships and leading professional‑development workshops that encourage innovative, inclusive practices.
  sports: Marta Lopez hikes weekly with the Hill Country Trailblazers club, follows Austin FC in the MLS and the Texas Rangers in spring, practices gentle yoga on weekends, and occasionally joins community
    folk‑dance gatherings that keep her active and socially connected.
  arts: Marta Lopez channels her love of folk motifs into oil paintings of Hill Country landscapes, participates in local folk‑dance gatherings, experiments with pottery inspired by traditional designs,
    strums an acoustic guitar while listening to mariachi and norteño ensembles such as Los Tigres del Norte, and derives narrative inspiration from historical fiction about her ancestors’ past.
  travel: Marta Lopez enjoys a blend of short weekend getaways to Texas Hill Country vineyards and longer road trips along the Pacific Coast Highway, while dreaming of cultural immersion tours of Santa
    Fe’s art colonies and future visits to historic adobe villages in New Mexico to study regional crafts.
  culinary: Marta Lopez delights in baking sweet conchas with anise and piloncillo, crafting mole‑inspired chili sauces for family meals, and cultivating native herbs like epazote for fresh salsa, balancing
    confident pastry skills with occasional over‑salting of soups when experimenting with new flavors.
  core: Marta Lopez is a curious, arts‑infused special‑education advocate who balances meticulous planning with spontaneous creativity, finds solace in painting and hiking, and occasionally overindulges
    in sweet pastries despite a disciplined financial routine.
background:
  cultural: Marta was raised in a close‑knit Mexican‑American family where Spanish was spoken at home and cultural traditions such as Día de los Muertos, quinceañeras, and weekly family meals were central.
    Growing up in Texas, she absorbed both Mexican folk art and the vibrant multicultural tapestry of the Houston area. This bicultural upbringing informs her teaching philosophy; she weaves Mexican storytelling,
    music, and visual motifs into lesson plans to make learning more relatable for her students. Her strong sense of family, community service, and respect for diverse ways of knowing drives her commitment
    to creating inclusive, harmonious classroom environments that honor each child's cultural identity.
attributes:
  skills: '["Special Education Instruction", "Individualized Education Plan (IEP) Development", "Behavior Intervention Planning", "Assistive Technology Integration", "Differentiated Curriculum Design",
