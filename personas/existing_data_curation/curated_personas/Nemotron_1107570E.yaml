    Disabilities", "Professional Development Facilitation"]'
  hobbies: '["Oil painting", "Traditional Mexican folk dance (Danza Folklórica)", "Visiting art galleries and museums", "Baking regional Mexican pastries", "Gardening", "Hiking in Hill Country", "Reading
    historical fiction", "Playing acoustic guitar", "Community volunteering", "Practicing pottery and ceramics", "Listening to regional Mexican music", "Traveling to heritage sites in Mexico"]'
  career_goals: Marta aims to become a lead special‑education coordinator within her district, guiding curriculum innovation and mentorship for novice teachers. She plans to pursue a master's degree in
    Special Education Leadership to deepen her expertise in policy advocacy and program evaluation. Her long‑term ambition is to design a district‑wide inclusive arts program that uses visual and performing
    arts as therapeutic and instructional tools for students with disabilities. Additionally, she hopes to present her inclusive art‑integration model at regional conferences and to partner with local cultural
    institutions to create community‑based learning experiences for her students.
