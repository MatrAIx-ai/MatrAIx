  career_goals: Although she has retired from formal employment, Mayra is eager to deepen her involvement in community life. She hopes to launch a monthly cooking workshop at the local cultural center,
    where she can teach younger Puerto Rican families traditional recipes while sharing stories of island life. She also plans to train as a peer‑support mentor for seniors, learning digital photography
    to document community events and preserve her family’s history. Maintaining her health through regular walks and dance classes remains a priority, as is managing her worry‑prone nature by joining a
    stress‑reduction support group.
