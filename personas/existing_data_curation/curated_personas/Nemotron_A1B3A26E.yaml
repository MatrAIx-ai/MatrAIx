  career_goals: Quiana aims to expand her wellness venture into a regional network of community centers that prioritize mental health and economic empowerment for young people of color. She seeks venture
    and foundation funding to launch a mentorship program for aspiring Black entrepreneurs, while also advocating for policies that support small, socially responsible businesses. Personally, she plans
    to pursue a Business Administration degree to deepen her strategic knowledge and to cultivate healthier work‑life balance through stress‑management training.
