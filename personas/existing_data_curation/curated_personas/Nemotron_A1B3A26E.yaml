personas:
  professional: Quiana Hines, a 22‑year‑old chief executive of a community‑focused wellness startup in Brockton, blends high emotional intelligence with a relaxed, flexible leadership style, turning grassroots
    activism, gospel‑inspired community cohesion, and savvy social‑media marketing into partnerships that empower local youth while occasionally grappling with a disorganized schedule.
  sports: Quiana Hines follows the Boston Red Sox and the New England Patriots, plays in a local intramural basketball league, attends weekly sunrise walks along the Cape Cod shoreline with a small wellness
    club, and practices yoga at a community studio that doubles as a meditation space.
  arts: Quiana Hines finds inspiration in jazz legends like John Coltrane, R&B icons such as Erykah Badu, and contemporary hip‑hop artists like Kendrick Lamar, attends intimate gigs at Boston’s Rockland
    venue, captures Cape Cod sunsets through photography, and journals reflections on works by bell hooks and Ta‑Nehisi Coates.
  travel: Quiana Hines prefers weekend getaways that blend nature and culture, having explored the Cape Cod shoreline, the historic streets of Savannah, Georgia, the vibrant markets of Marrakech, Morocco,
    and the art museums of Barcelona, while budgeting carefully and often traveling spontaneously with a close circle of friends.
  culinary: Quiana Hines enjoys experimenting with comfort food twists such as jerk‑spiced chicken tacos with plantain slaw, sweet‑potato shepherd’s pie topped with crisp kale, mac and cheese infused with
    smoked Gouda, and a citrus‑vinaigrette quinoa salad featuring seasonal berries from the local farmers’ market.
  core: Quiana Hines, a 22‑year‑old wellness startup founder, balances compassionate community activism with a tendency toward disorganization, fueling her drive with jazz, yoga, and spontaneous weekend
    adventures.
background:
  cultural: Quiana is a Black woman raised in Brockton, Massachusetts, a city known for its vibrant African‑American community and strong tradition of activism. Her family’s roots trace back to the New
    England Black diaspora, with grandparents who participated in the civil rights movement and a legacy of community service. Growing up attending a local Baptist church, she was immersed in gospel music,
    fellowship, and social justice work, shaping her compassionate and cooperative values. Brockton’s multicultural neighborhoods exposed her to Caribbean cuisine, hip‑hop culture, and New England sports,
    fostering a flexible and inclusive worldview. She weaves her heritage into her leadership by championing collective uplift, supporting Black entrepreneurship, and celebrating African‑American artistic
    expressions both personally and professionally.
