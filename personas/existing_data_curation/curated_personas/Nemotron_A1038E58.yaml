  career_goals: Christina dreams of combining her love for art, history, and technology by becoming a museum curator or a multimedia storyteller. She hopes to attend a specialized high‑school program for
    the arts, then study museum studies, digital media, or architecture in college. Long‑term, she wants to design interactive exhibits that make learning engaging and use technology to bring historical
    narratives to life. She also aspires to win science‑fair competitions and eventually work on interdisciplinary projects that blend art, design, and environmental science.
