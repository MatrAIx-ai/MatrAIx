personas:
  professional: Christina Oneal is a budding game creator who merges hand-drawn character sketches with Scratch programming, applying methodical planning to each prototype and constantly refining her work,
    while her competitive edge drives her to enter school coding contests and her skepticism pushes her to critically test every feature.
  sports: Christina Oneal tackles weekend hikes with the River Valley Junior Trail Club, where she logs elevation gain and competes for the longest distance badge, follows cross-country training with the
    middle school team, and avidly roots for the Seattle Seahawks and the U.S. Women's National Soccer Team, balancing her competitive spirit with the calming solitude of forest paths.
  arts: Christina Oneal cultivates her creative soul through charcoal sketches of sci-fi heroes, experimental watercolor washes inspired by Hayao Miyazaki's pastel palettes, devouring Neil Gaiman novels
    for narrative sparks, and volunteering backstage at the town community theater's production of A Midsummer Night's Dream, where she admires Tim Burton's set designs and channels that inspiration into
    her own artwork.
  travel: Christina Oneal plans each weekend adventure like a mission, penciling routes to the Smithsonian National Air and Space Museum, the historic lighthouse at Point Reyes, and a day hike in the Grand
    Canyon's South Rim, while dreaming of a future solo trip to Kyoto's temples, balancing her careful budgeting and parental limits with an insatiable curiosity for cultural landmarks.
  culinary: Christina Oneal whips up buttery vanilla cupcakes topped with raspberry buttercream and a drizzle of lemon zest glaze for friends after school, experiments with homemade pasta carbonara for
    family dinners, and keeps a well-stocked pantry of cocoa powder, fresh berries, and high-quality vanilla extract, reflecting her methodical approach to recipes and occasional tendency to over-bake when
    lost in thought.
  core: Christina Oneal is a curious, competitive 12-year-old whose sketchbooks overflow with sci-fi worlds, whose meticulous budgeting rivals a teen accountant's, yet who battles nightly worry and a habit
    of staying up late perfecting a chess puzzle instead of finishing homework.
background:
  cultural: Christina grew up in Salem, Virginia, a small city steeped in American historical heritage and close to sites like Colonial Williamsburg. Her family is middle‑class and values education, community
    involvement, and respect for local history. The town’s Southern‑influenced hospitality, annual fairs, and community arts programs have shaped her worldview. She regularly attends the public library’s
    art workshops and participates in seasonal festivals, which expose her to a variety of cultural narratives. While her household reflects typical white suburban American traditions, including church
    gatherings and family meals, she also experiences the region’s diversity through school curricula and local museum exhibits.
