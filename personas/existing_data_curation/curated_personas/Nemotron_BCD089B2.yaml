  hobbies: '[''Soccer (team sport)'', ''Ballet/dance classes'', ''Reading mystery and adventure books'', ''Drawing and watercolor painting'', ''Helping prepare traditional Mexican dishes'', ''Participating
    in school cultural club and community festivals'']'
  career_goals: Christabelle dreams of a future where she can combine her love for structure, helping others, and community. She hopes to become a teacher or a pediatric nurse, roles that let her create
    organized learning environments and support the well‑being of children. She also imagines someday organizing community events for youth, such as cultural festivals or after‑school clubs, where she can
    use her planning skills and sociable personality to bring people together.
