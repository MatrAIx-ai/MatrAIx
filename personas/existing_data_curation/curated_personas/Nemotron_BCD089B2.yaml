personas:
  professional: Christabelle Escobar, an 11-year-old soccer team captain who also volunteers as a junior event organizer for her school's cultural club, leverages her love of structure, reliability and
    sociable energy to plan practice drills, coordinate team schedules, and ensure everyone feels included.
  sports: Christabelle Escobar plays midfield for her community soccer club, attends weekly ballet class to maintain flexibility, follows the LA Galaxy and the US Women's National Team, and uses a color-coded
    calendar to schedule training, practice, and matches, showing her methodical commitment to fitness while her competitive spirit fuels her enthusiasm for every game.
  arts: Christabelle Escobar devotes her afternoons to watercolor landscapes inspired by Claude Monet and Frida Kahlo, sketches characters from mystery novels, and watches Misty Copeland's ballets, while
    listening to the soundtrack of Disney's "Moana" and the pop tunes of Taylor Swift, which together nurture her creative outlet and reflect her organized yet expressive personality.
  travel: Christabelle Escobar prefers to plan family trips with a checklist and a map, enjoys annual visits to the Grand Canyon National Park and weekend getaways to San Diego's beach boardwalk, and dreams
    of exploring the vibrant streets of Mexico City and the historic ruins of Chichen Itza, balancing her love for adventure with the need to keep schoolwork on track.
  culinary: Christabelle Escobar helps her family hand-roll tacos and steam tamales, meticulously measures spices like cumin, cilantro, and lime juice, and experiments with watercolor-inspired plating,
    yet she often forgets to clean her brushes promptly, showing her passion for cooking alongside a slightly messy habit.
  core: Christabelle Escobar blends a love for organized teamwork, creative art, and cultural cooking with a caring heart, a penchant for worry, and a habit of color-coding every part of her day.
background:
  cultural: Christabelle comes from a Mexican‑American family in Los Angeles. She grows up bilingual, speaking Spanish with her parents and grandparents while using English at school and with friends. Her
    household observes Mexican traditions, such as celebrating Día de los Muertos with altars and crafting papel picado, and enjoying seasonal foods like pozole and churros. She attends a local church that
    hosts community events, reinforcing values of family, respect, and collective responsibility. Living in a diverse LA neighborhood, she also interacts with peers from many cultural backgrounds, fostering
    an inclusive outlook while maintaining pride in her Mexican heritage.
attributes:
  skills: '[''Project planning and organization for school assignments'', ''Bilingual communication in Spanish and English'', ''Team coordination and peer mediation'', ''Basic computer literacy (typing,
