  career_goals: Although retired, Martha is driven to continue learning and sharing. She aims to deepen her artistic practice by exploring new techniques such as collage and digital illustration, and to
    volunteer as a guest instructor at the local senior center’s art classes. She hopes to mentor high‑school and adult learners in basic science and coding, fostering curiosity across generations. Martha
    also plans to compile a memoir and a digital archive of local history and family genealogy, preserving the stories of her community for future residents. Her broader ambition is to leave a lasting,
    positive imprint on Warren through lifelong learning, creativity, and intergenerational connection.
