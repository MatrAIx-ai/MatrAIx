  career_goals: Matthew aims to advance from senior salesperson to store manager within the next two years, focusing on developing his leadership and operational expertise. His longer‑term ambition is to
    become a regional manager or to open a boutique that blends his love for art with retail, showcasing local artists and crafts. He plans to earn a Retail Management Certification and to implement stress‑reduction
    programs for his team, leveraging his experience with mindfulness to foster a healthier workplace culture. Additionally, he wishes to deepen his knowledge of e‑commerce platforms to integrate an online
    presence for his future store.
