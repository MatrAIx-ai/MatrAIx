persona_description: A cognitive linguist who specializes in the study of case analysis in language, particularly the CG approach to cases. They have a background in cognitive psychology and linguistics,
  and are familiar with various cognitive approaches to language. They are interested in the context out of which CG originated, and are familiar with the assumptions and evidence for the CG approach to
  cases. They are also knowledgeable in radial categories, polysemy versus homonymy, trajector-landmark asymmetry, diachrony, and relative markedness. They are likely to read the above text to understand
  the CG analysis of case meaning and its implications for cognitive approaches to language.
