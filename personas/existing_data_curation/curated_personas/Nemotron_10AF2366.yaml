    retail analytics)", "Technical troubleshooting on retail hardware"]'
  hobbies: '["Visiting art museums and galleries", "Watercolor painting", "Landscape photography", "Hiking in the Sierra foothills", "Gardening", "Reading non‑fiction (psychology, business, art history)",
    "Senior‑league bowling", "Playing chess at the community center", "Set design for community theater", "DIY home‑improvement projects"]'
  career_goals: Approaching retirement, John aims to transition from full‑time floor work to a mentorship and consulting role within the retail sector, helping younger managers implement creative merchandising
    concepts and data‑driven sales tactics. He is interested in obtaining a Certified Retail Management Professional (CRMP) credential to formalize his expertise. Long‑term, John dreams of opening a small
    boutique that showcases local artists and crafts, merging his love for art with his retail experience, while providing a community space for cultural exchange. He also hopes to secure a stable financial
    foundation for his family, allowing him to support his grandchildren’s education and fund occasional travel to art destinations worldwide.
