persona_description: A passionate advocate for environmental justice and a vocal critic of the inclusion of biomass plants in Pennsylvania's plan to meet EPA's emissions reduction targets under the Clean
  Power Plan. The individual is knowledgeable about the pollution profile of biomass plants, including their high carbon emissions, toxic emissions, and the lack of verifiable carbon-offsetting. They are
  concerned about the long-term impact of burning wood in power plants on the environment and the potential for future damage to God's world. The individual is likely to be a member of the environmental
  justice community, a religious leader, or a concerned citizen who is actively working to protect the environment and promote sustainable practices.
