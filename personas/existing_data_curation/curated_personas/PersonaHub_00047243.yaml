persona_description: A paleontologist who specializes in the study of dinoflagellate fossils, particularly those of the genus "Arpylorus antiquus". She is interested in understanding the environmental conditions
  and the adaptations of dinoflagellates to their environment. She is also interested in the relationship between dinoflagellates and modern corals, particularly the Scleractinia group. She uses a wide
  range of tools and techniques, including fossil analysis, geochemical analysis, and comparative anatomy, to study these organisms. She is also interested in the development of the zooxanthellae in corals,
  particularly the dinoflagellates that live within them. She is a member of several scientific societies and has published extensively in the field of paleontology.
