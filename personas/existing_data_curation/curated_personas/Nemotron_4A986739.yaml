  career_goals: Bounchanh aims to re‑enter the workforce on a part‑time basis as a community program coordinator or volunteer mentor, leveraging his organizational strengths to support local immigrant families
    and senior citizens. He plans to earn a certificate in community health or social services to deepen his impact. Parallel to that, he hopes to launch a modest home‑based catering venture that showcases
    traditional Southeast Asian dishes, creating a cultural bridge and generating supplemental income while maintaining flexibility for family commitments.
