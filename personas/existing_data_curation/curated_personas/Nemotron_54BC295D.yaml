personas:
  professional: Wesley Steward, a veteran registered nurse with over forty years of geriatric and hospice expertise, they blend meticulous clinical acumen and health informatics savvy with a skeptical,
    hands‑on approach, mentoring younger staff while championing evidence‑based protocols and time‑tested compassionate care.
  sports: Wesley Steward follows the Memphis Grizzlies and Tennessee Titans with a loyal yet relaxed fandom, they also participate in a senior walking club along the riverbank, enjoy weekend fishing excursions,
    and sporadically join a community pickleball league, balancing light competition with a low‑key fitness routine.
  arts: Wesley Steward spends evenings strumming a well‑worn blues guitar, they curate vintage vinyl from B.B. King to Stevie Ray Vaughan, attend the Beale Street Music Festival, and immerse themselves
    in detective novels by Agatha Christie, using these artistic outlets to unwind from clinical intensity.
  travel: Wesley Steward prefers road trips that blend heritage and relaxation, they have explored the Mississippi Delta blues trail, historic Natchez, and New Orleans for jazz festivals, while dreaming
    of a spring pilgrimage to Savannah’s historic squares, all arranged with flexible, last‑minute planning to fit a consulting schedule.
  culinary: Wesley Steward’s kitchen is a soulful hub where they slow‑cook collard greens with smoked turkey, season catfish with a secret blend of paprika and cayenne, and bake sweet potato pie topped
    with a buttery crust, demonstrating moderate cooking skill elevated by family recipes and a penchant for sharing meals at church potlucks.
  core: Wesley Steward, a calm yet critically minded 67‑year‑old nurse, they merge deep blues roots, pragmatic curiosity, and a relaxed approach to obligations into a uniquely resilient, occasionally disorganized,
    but passionately community‑focused life.
background:
  cultural: Wesley hails from an African‑American family deeply rooted in Memphis’s rich cultural tapestry. Growing up during the civil‑rights era, he was shaped by the city’s gospel churches, blues music,
    and a strong sense of community solidarity. His grandparents were part of the Great Migration, bringing Southern traditions and a reverence for self‑reliance that continue to influence his worldview.
    Wesley’s cultural identity is reflected in his love for soulful music, communal cooking, and dedication to addressing health disparities that affect the Black community in Shelby County. He regularly
    engages with local cultural festivals and maintains close ties to the historic African‑American neighborhoods that fostered his lifelong resilience and optimism.
