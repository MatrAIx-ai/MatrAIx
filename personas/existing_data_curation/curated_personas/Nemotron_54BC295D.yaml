  career_goals: Wesley aims to transition into a part‑time consultancy role where he can advise nursing units on best practices for elder care and hospice services. He aspires to obtain a Wound Care Certification
    to deepen his expertise and plans to develop a mentorship program for newly licensed nurses in Memphis. Additionally, he is passionate about health equity and hopes to collaborate with local nonprofit
    organizations to create culturally responsive health education workshops for the African‑American community. In the longer term, Wesley envisions authoring a memoir that chronicles his decades of frontline
    nursing, highlighting resilience and the evolution of patient care.
