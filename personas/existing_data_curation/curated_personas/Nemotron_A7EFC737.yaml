personas:
  professional: Kristen Pankraz, a retired engineer turned community STEM mentor, blends rigorous data analysis with artistic flair, leveraging R and SPSS expertise to develop interdisciplinary curricula
    while their disciplined, talkative nature makes every workshop a lively, meticulously organized event.
  sports: Kristen Pankraz, an avid hiker of the Mahomet prairie trails and member of the Mahomet Trail Runners Club, stays fit with daily walks, follows the Chicago Cubs and Chicago Bears religiously, and
    enjoys bridge matches as a mental workout during the winter months.
  arts: Kristen Pankraz, a watercolorist inspired by Winslow Homer and the lyrical compositions of Leonard Bernstein, volunteers as a docent at the regional museum, frequents performances by the Chicago
    Symphony Orchestra, and hosts monthly art-appreciation evenings featuring the works of Frida Kahlo.
  travel: Kristen Pankraz, a nostalgic traveler who prefers slow-paced, culturally immersive trips, has visited the historic streets of Charleston, South Carolina and Mackinac Island, Michigan, and dreams
    of exploring the gardens of Kyoto, Japan and the cliffs of Santorini, Greece, planning each journey with a detailed itinerary and a modest budget.
  culinary: Kristen Pankraz, an enthusiastic home cook who cultivates heirloom tomatoes and fresh herbs in their garden, often prepares butternut squash risotto with sage, herb-marinated grilled salmon
    with lemon-dill sauce, and bakes apple-cinnamon crumble, while also enjoying farm-to-table dinners at the local bistro featuring seasonal ingredients like kale and wild mushrooms.
  core: Kristen Pankraz embodies a lifelong learner who juggles meticulous organization with a chatty, community-centered spirit, sprinkling days with watercolor brushes, data sets, and endless bridge games,
    even if they sometimes overcommit to projects and forget to rest.
background:
  cultural: Kristen was raised in a Midwestern, small‑town setting in Illinois within a family of German‑American heritage. The community emphasized hard work, neighborly support, and involvement in local
    churches and volunteer organizations. After earning a graduate degree in a STEM field at a major university, she returned to Mahomet, where she integrated her academic achievements with a deep commitment
    to local service, embodying the blend of intellectual pursuit and modest, community‑oriented values typical of the rural Midwest.
attributes:
  skills: '[''Scientific research methodology'', ''Data analysis (R, SPSS)'', ''Engineering project management'', ''Technical writing'', ''Curriculum development'', ''Public speaking'', ''Community outreach
