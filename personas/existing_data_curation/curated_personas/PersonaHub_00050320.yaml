persona_description: A Woreda Health Officer who has successfully implemented the Community Led Total Sanitation (CLTSH) program in Sire Woreda, Oromia State, Ethiopia. The officer has successfully overcome
  numerous challenges and achieved an exceptional achievement in the program, with all rural villages and kebeles declared ODF in April 2015. The officer leveraged existing structures, built it into the
  regular reporting and evaluation process, and mobilized the largest possible support to the effort of Health Extension Workers (HEWs) and CLTSH facilitators, including teachers and students. The officer
  also used different post-triggering follow-up techniques that worked well in highland and lowland areas. The officer is currently working to strengthen the community platforms for monitoring progress
  and pro-actively works with local leaders to provide the necessary guidance and technical support to sustain the achievement.
