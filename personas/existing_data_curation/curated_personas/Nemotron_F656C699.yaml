personas:
  professional: Lissette Montano, a 10‑year‑old budding scientist, leverages their methodical planning and competitive drive, and they design meticulous experiments for the school science club, keep detailed
    lab notebooks, and lead their team to a regional science fair win.
  sports: Lissette Montano plays forward on the community’s youth soccer team, the Riverside Strikers, follows the Los Angeles Galaxy in MLS, and they train with the Rhythm Kids Dance Crew, approaching
    each practice with a disciplined schedule that tracks minutes, drills, and goal tallies on a whiteboard, favoring competitive scrimmages over casual play.
  arts: Lissette Montano draws comic‑style heroes inspired by Stan Lee and Jim Lee during free periods, sketches vibrant panels while listening to Bad Bunny, Taylor Swift, and classic mariachi anthem 'El
    Rey', and they belt out karaoke tracks at school gatherings, channeling their outgoing energy into vivid storytelling and rhythmic performance.
  travel: Lissette Montano prefers meticulously planned family road trips, having explored the historic market of Oaxaca and the Grand Canyon, while dreaming of a summer adventure at Disneyland Paris, they
    balance school commitments with weekend getaways and use a colorful itinerary checklist to ensure every museum and taco stand is visited.
  culinary: Lissette Montano, an enthusiastic junior cook, skillfully assembles tacos al pastor with seasoned carne asada, pineapple, cilantro, and lime, rolls tamales using masa, pork, and red chilies,
    and blends fresh salsa verde with diced avocado, yet they often over‑season dishes in a burst of enthusiasm and forget to tidy the kitchen before the next round of cooking.
  core: Lissette Montano is a competitively driven, ultra‑organized 10‑year‑old who hoards comic books, meticulously budgets every allowance cent, dazzles friends with spontaneous karaoke sessions, and
    they often leave soccer shoes scattered in the hallway.
background:
  cultural: Lissette comes from a Mexican‑American family that has lived in the Coachella Valley for generations. Spanish is spoken at home, and she is fluent enough to converse with relatives and grandparents.
    Her household celebrates cultural traditions such as Día de los Muertos, with home altars and family stories, and prepares Mexican foods like tamales, pozole, and churros for holidays and festivals.
    Growing up in Indio, she participates in community events like the Riverside County Fair and the National Date Festival, where she connects with other Hispanic families. Her family attends a local Catholic
    church, which reinforces values of community service and respect. While she embraces her Latino heritage, Lissette also enjoys mainstream American activities—she watches popular cartoons, plays video
    games, and follows US school schedules—creating a blended cultural identity that shapes her worldview.
attributes:
  skills: '["Time management", "Organizing group projects", "Reading comprehension", "Basic arithmetic", "Problem solving (math puzzles)", "Basic Spanish conversation", "Fundamental soccer skills", "Scratch
