  hobbies: '["Playing soccer", "Latin dance (salsa, hip‑hop)", "Drawing and coloring comics", "Reading adventure/mystery novels", "School science club projects", "Helping family cook traditional Mexican
    dishes", "Listening to music (pop, reggaeton, mariachi)", "Karaoke with friends"]'
  career_goals: Lissette envisions a future where she can blend her love for structure, helping others, and competition. She dreams of becoming a teacher or school counselor who can design organized learning
    environments and mentor peers, while also hoping to coach a soccer team or lead a community youth program. She is fascinated by careers that involve planning and teamwork, such as project management
    in community development or a future role as a civil engineer designing safe, well‑ordered public spaces. Her ambition is to earn a college degree that allows her to give back to the Indio community
    and preserve her cultural heritage.
