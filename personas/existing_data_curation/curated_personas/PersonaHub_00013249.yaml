persona_description: Liina Lindström, an associate professor of Estonian language at the University of Tartu, is a linguist who specializes in Estonian word order, syntax of spoken Estonian, and syntax
  of Estonian dialects. She has led the compilation and annotation of the Corpus of Estonian Dialects, a huge collection of spoken dialect data in digital form. Liina has also been involved in developing
  possibilities to teach and learn digital humanities at the University of Tartu.
