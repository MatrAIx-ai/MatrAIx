persona_description: A historian who specializes in the study of Tudor literature, particularly the works of Sir Thomas Elyot and Sir Thomas More. His research interests include, but are not limited to,
  the evolution of the English language in the Tudor period, the literary style and register of these works, and the influence of medieval and Renaissance literary traditions on English literature. He is
  also interested in the use of early printed books and manuscripts in the study of Tudor literature and the Textbase project.
