  career_goals: Although retired from formal employment, Rosa remains driven by a desire to leave a lasting personal legacy and to support her community. She aims to compile a family history memoir that
    documents her ancestors’ journey from the Great Migration to present‑day New Jersey, preserving oral stories for future generations. She seeks to deepen her digital skills, particularly mastering smartphone
    applications and online banking, to maintain independence. Rosa also aspires to take a leadership role in the local senior center’s advisory council, advocating for improved access to health resources
    and elder‑friendly community programs. Finally, she wishes to mentor her grandchildren and younger relatives, sharing practical life skills such as budgeting, cooking, and critical thinking.
