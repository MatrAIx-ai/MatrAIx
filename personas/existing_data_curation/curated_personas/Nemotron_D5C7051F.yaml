  career_goals: Sean imagines a future where he can design and build orderly, useful things. He hopes to become a civil engineer or architect, dreaming of constructing bridges or community spaces that help
    people. He also enjoys the idea of a quiet, structured workplace like a librarian or school teacher, where he can support others while maintaining a calm environment. To achieve these goals, he plans
    to keep his grades high, continue learning coding, and participate in school science and engineering clubs.
