personas:
  professional: Sean Adams, a budding junior architect in the making, channels his love for LEGO and precise Minecraft builds into designing miniature floor plans, applying methodical problem‑solving skills
    while preferring solitary sketch sessions over group projects.
  sports: Sean Adams is a member of the local youth swimming club, the Riverbend Dolphins, where they diligently follow a structured lap schedule, preferring the predictable rhythm of the pool to team sports,
    and they occasionally join the Saturday junior soccer practice at the community center but tend to drift toward the sidelines.
  arts: Sean Adams immerses themselves in the world of detailed map drawing, inspired by the cartographic works of National Geographic, while listening to the instrumental scores of Hans Zimmer and the
    gentle piano pieces of Yiruma to fuel their creative focus, and they collect prints of classic animated films like Studio Ghibli’s Spirited Away.
  travel: Sean Adams dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., after a school field trip sparked an interest in real‑world engineering, yet they also love weekend
    excursions to the local science center, planning each outing with a spreadsheet of must‑see exhibits and snack breaks.
  culinary: Sean Adams enjoys constructing layered peanut‑butter‑banana sandwiches with exact portion counts, favors the precise flavors of grilled cheese with cheddar and a dash of garlic powder, and often
    snacks on carrot sticks while solving Sudoku, but they sometimes forget to hydrate and rely on juice boxes for a quick energy boost.
  core: Sean Adams is a methodical ten‑year‑old who balances a love for structured building, puzzles, and solitary creativity with occasional indulgences in candy, a penchant for careful budgeting, and
    a quiet determination to master both LEGO architecture and real‑world exploration.
background:
  cultural: Sean lives in Alexandria, Virginia, a historic city with a diverse, multicultural community. His family is of Anglo-Irish descent and follows typical American middle-class customs, celebrating
    holidays like Thanksgiving, Independence Day, and occasionally St. Patrick’s Day with family traditions. The family places a high value on education and routine, fostering a structured home environment.
    Though his immediate cultural exposure is largely American, the proximity to Washington, D.C., and Alexandria’s historic sites gives him occasional insights into broader American history and cultural
    diversity.
