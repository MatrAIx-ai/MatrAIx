persona_description: A neuroscientist who specializes in the study of the neural mechanisms underlying basic emotions, particularly the brain regions responsible for the perception, integration, and expression
  of basic emotions. Their research interests include, but are not limited to, the relationship between basic emotions and the autonomic nervous system, the role of basic emotions in behavior and expression,
  and the neural basis of subjective experience of basic emotions. They are also interested in the development and evolution of basic emotions, as well as the impact of environmental factors on the development
  and expression of basic emotions.
