personas:
  professional: Ramona Dubinsky, a seasoned insurance professional with a graduate business background, combines three decades of risk assessment mastery, empathetic client advocacy, and a curiosity‑driven
    embrace of digital tools to deliver personalized coverage while mentoring junior agents with a relaxed, flexible approach that sometimes borders on disorganization.
  sports: Ramona Dubinsky enjoys low‑impact fitness through weekly hikes with the Davis County Trailblazers Senior Hiking Club, occasional cross‑country skiing at Snowbird in winter, and shows steadfast
    loyalty to the Utah Jazz and the University of Utah Utes football, attending games whenever possible while preferring solitary nature walks over crowded gyms.
  arts: Ramona Dubinsky channels her love for the natural Utah landscape into delicate watercolors reminiscent of Georgia O'Keeffe and Ansel Adams, frequents regional galleries showcasing artists like Thomas
    Thornbury, and enriches her evenings with the literary worlds of Haruki Murakami and Margaret Atwood while savoring the mellow folk tones of Nick Drake during book‑club discussions.
  travel: Ramona Dubinsky favors spontaneous, small‑group road trips that blend art and nature, often revisiting Utah’s Zion and Bryce Canyon for sunrise hikes, while dreaming of a leisurely spring pilgrimage
    to Kyoto’s zen gardens and a summer art‑focused sojourn through Florence, all balanced against a modest retirement budget and a desire to avoid exhaustive itineraries.
  culinary: Ramona Dubinsky enjoys a modest level of culinary confidence, often harvesting rosemary, sage, and lavender from her garden to season herb‑crusted grilled salmon, lavender‑infused shortbread,
    and quinoa‑and‑roasted‑beet salads, while also delighting in farm‑to‑table evenings at Salt Lake City’s Harvest Market where they can savor locally sourced lamb chops with sumac.
  core: Ramona Dubinsky, a 64‑year‑old insurance veteran with a painter’s eye, balances meticulous client advocacy with a delightfully chaotic home office, a penchant for forgetting bill due dates, and
    an unwavering belief that every sunrise over Utah’s desert inspires a new policy solution.
background:
  cultural: Ramona was raised in a middle‑class, predominantly white community in Utah, where the values of self‑reliance, neighborly service, and modest living are woven into daily life. Her family’s roots
    trace back to early Mormon pioneers, giving her a strong sense of regional heritage and appreciation for the natural beauty of the Intermountain West. Living most of her adult life in Syracuse, Davis
    County, she has embraced the close‑knit community culture, participating in church and civic activities that emphasize cooperation and compassion. These cultural influences shape her professional ethic
    of helping others and her personal love for quiet, artistic pursuits.
attributes:
