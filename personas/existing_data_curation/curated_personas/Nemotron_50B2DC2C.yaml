    sales techniques'', ''team collaboration and mentorship'']'
  hobbies: '[''watercolor painting'', ''visiting art galleries and museums'', ''reading contemporary fiction and philosophy'', ''gardening (native herbs and flowers)'', ''hiking on local trails'', ''online
    art history courses'', ''craft workshops for seniors'', ''small book club participation'', ''volunteering at senior center'']'
  career_goals: Ramona aims to secure the Certified Insurance Counselor (CIC) designation, expand her role as a mentor for younger agents within her agency, and develop a community-based insurance literacy
    program that offers free workshops for seniors and low‑income families in Davis County. She also aspires to scale her volunteer initiative into a traveling art exhibit that showcases local artists in
    community centers, thereby merging her love for art with her commitment to service.
