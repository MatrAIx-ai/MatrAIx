personas:
  professional: Mingnon Shelton, a 21‑year‑old landscaping technician, melds hands‑on expertise in ornamental and native plant care with emerging sustainable horticulture knowledge, using a calm, cooperative
    demeanor to lead small crews, mentor newcomers, and embed eco‑friendly practices into suburban client projects.
  sports: Mingnon Shelton jogs the Patuxent River Trail three times a week, roots for the Baltimore Ravens and follows the Washington Capitals, participates in the Odenton Running Club’s weekend group runs,
    and joins a community soft‑ball league each summer, using sport as a reflective pause between landscaping projects.
  arts: Mingnon Shelton unwinds to the soulful sounds of Nina Simone, Erykah Badu, and Kamasi Washington, attends occasional live jazz sets at the Chesapeake Jazz Society, finds inspiration in contemporary
    fiction by Ta‑Nehisi Coates and environmental non‑fiction by Margaret Atwood, and channels creative energy into crocheting blankets for friends while listening to neo‑soul playlists.
  travel: Mingnon Shelton prefers purposeful weekend getaways, having explored the Blue Ridge Parkway, trekked the Shenandoah National Park trails, and sampled Caribbean flavors in Kingston, Jamaica, while
    planning future trips to the Great Smoky Mountains and a cultural immersion tour of New Orleans, balancing budget‑friendly travel with a love for nature and music.
  culinary: Mingnon Shelton cooks soul‑food staples like collard greens and smoked turkey, infusing them with Caribbean jerk spices and fresh herbs from their balcony garden such as thyme, cilantro, and
    basil, masters the perfect sweet‑potato pie, and enjoys dining at local farm‑to‑table spots like The Brewer’s Art while savoring dishes like roasted cauliflower with harissa.
  core: Mingnon Shelton is a curious, community‑focused landscaper who blends practical expertise with soulful music, midnight herb‑garden experiments, and a steadfast commitment to mentoring the next generation
    of green‑job seekers.
background:
  cultural: Mingnon is an African‑American woman raised in the Baltimore‑Washington metropolitan area. Her family’s roots trace back to the Southern United States and West African ancestry, embedding a
    strong sense of community, resilience, and a deep appreciation for music, storytelling, and shared meals. Growing up, she participated in cultural celebrations such as Juneteenth and family gatherings
    that featured gospel and soul music, fostering a cooperative spirit and a commitment to mutual support. Living in Odenton, a predominantly white suburban county, she has navigated the dynamics of being
    a Black professional in landscaping, which heightens her awareness of representation and drives her mentorship efforts. Her cultural heritage influences her connection to nature—reflecting historical
    ties of the African diaspora to agriculture—and informs her culinary interests, collaborative work style, and dedication to uplifting her community.
attributes:
  skills: '[''Plant identification and care'', ''Soil testing and amendment'', ''Landscape design basics'', ''Operation of power equipment (mowers, brush cutters, chainsaws)'', ''Equipment maintenance'',
    ''Safety and OSHA compliance'', ''Client communication and service'', ''Team coordination'', ''Time management'', ''Sustainable gardening practices'', ''Basic budgeting and cost estimation'', ''Community
    outreach and education'']'
  hobbies: '[''Home balcony herb garden'', ''Reading (fiction and environmental nonfiction)'', ''Cooking soul food and Caribbean-inspired dishes'', ''Jogging on local trails'', ''Listening to jazz and R&B
    music'', ''Crocheting and knitting'', ''DIY home improvement projects'', ''Volunteering at community garden programs'']'
  career_goals: Mingnon aims to complete her associate degree in horticulture or environmental science within the next two years, followed by earning the Certified Landscape Technician (CLT) credential
    and EPA pesticide applicator certification. In the short term she seeks a supervisory role leading a small crew, allowing her to mentor newer workers and integrate more sustainable practices into client
    projects. Over the medium term she plans to launch a boutique landscaping business that specializes in drought‑resistant, pollinator‑friendly designs for residential neighborhoods in Anne Arundel County.
    Her long‑term ambition is to partner with local schools and community centers to develop green‑job training programs for youth, advocating for greater representation of Black professionals in the landscaping
    industry and influencing county park planning toward ecological resilience.
