  hobbies: '["Hiking", "Pickup basketball", "Vintage motorcycle restoration", "Strategy video gaming", "Reading (science‑fiction and tech non‑fiction)", "Volunteering at public library", "Outdoor grilling",
    "Landscape photography"]'
  career_goals: William aims to translate his hands‑on mechanical aptitude and emerging tech skills into a stable, well‑compensated career. In the next two years he plans to enroll in a community‑college
    automotive technology program to earn an ASE certification, followed by an apprenticeship with a local dealership or HVAC firm. Simultaneously, he intends to complete introductory Python courses to
    qualify for a junior IT support role, eventually bridging into electric‑vehicle maintenance or smart‑home technology. His longer‑term ambition is to become a certified technician who can lead a small
    team, manage projects efficiently, and continue learning new technologies while maintaining financial independence and the ability to support family and community initiatives.
