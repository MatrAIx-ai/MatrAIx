personas:
  professional: William Curtis, a 22-year-old aspiring automotive technician, combines his methodical DIY mechanical skill, emerging Python knowledge, and community‑organizing experience to excel in troubleshooting
    vehicles and planning efficient repair workflows.
  sports: William Curtis stays active by playing pickup basketball with the Roseville Community Center Ravens, hiking the Sierra‑Foothill Trailhead in the spring, and cheering on the Sacramento Kings and
    San Jose Earthquakes whenever possible.
  arts: William Curtis expresses creativity through landscape photography of Lake Tahoe sunsets, reads authors like Liu Cixin and Neal Stephenson, and relaxes to the ambient soundtracks of Hans Zimmer and
    the electronic beats of Daft Punk.
  travel: William Curtis prefers weekend road trips that blend adventure and relaxation, having driven to Lake Tahoe for kayaking, explored Yosemite’s high country, and dreaming of a future cross‑country
    bike tour through the Pacific Northwest.
  culinary: William Curtis experiments with grilling, often mastering dishes like hickory‑smoked brisket, garlic‑infused grilled shrimp, and a pineapple‑glazed pork rib recipe while sourcing fresh herbs
    from the local farmers’ market.
  core: William Curtis is a meticulous, tech‑curious mechanic who never skips a hike, can be a night‑owl gamer, and is habitually checking discount sites for motorcycle parts.
background:
  cultural: William grew up in a middle‑class suburban family in Roseville, California, a community shaped by the broader Sacramento Valley culture. His grandparents migrated from Iowa, bringing a practical
    Midwestern work ethic that blends with the progressive, tech‑oriented atmosphere of Northern California. His parents—one a high‑school teacher and the other a hospital administrator—instilled values
    of reliability, service, and education. He attended local public schools, participated in varsity basketball and the Future Farmers of America club, and celebrated typical American holidays such as
    Thanksgiving and the Fourth of July with family barbecues and community events. While identifying with mainstream White American traditions, he also embraces the region’s diversity, respects different
    cultures, and actively engages in inclusive community activities.
attributes:
  skills: '["Microsoft Office Suite", "Basic computer troubleshooting", "Automotive maintenance (oil changes, brake service)", "Event planning and coordination", "Customer service", "Time management and
