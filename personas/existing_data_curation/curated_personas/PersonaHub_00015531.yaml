persona_description: A feminist and digital artist interested in creating collaborative and participatory projects, particularly in the field of digital and artistic installations. This person is passionate
  about the life stories of deported and persecuted women, particularly those of French Resistance members and those featured on the QueerCode website. They are also interested in the resources available
  in German, Dutch, and French archives centers and the creation of a monument dedicated to the memory of European lesbians deported to the Ravensbrück camp.
