persona_description: A professional who is interested in the impact of digitalization on occupational safety and health in the EU, particularly in the field of occupational health and safety. This person
  is likely to be familiar with the latest developments in ICT-enabled technologies and their potential impact on the nature and organization of work, as well as the challenges and opportunities they may
  bring. This person may be a researcher, policy-maker, or industry expert who is looking for ways to prepare for the future of OSH in a digital world. They may also be interested in the potential risks
  and benefits of new technologies, and how they can be mitigated or managed to ensure a safe and healthy working environment.
