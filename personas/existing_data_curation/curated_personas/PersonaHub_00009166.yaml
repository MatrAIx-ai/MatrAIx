persona_description: A scientist or researcher with a focus on the study of aquatic ecosystems, specifically those in the Lake District of England. This individual is interested in the long-term monitoring
  of water quality and phytoplankton ecology in Grasmere, a small lake in a catchment with high rainfall, which subjects the lake to intermittent episodes of rapid flushing. They are particularly interested
  in the effects of nutrient enrichment by treated sewage and hydraulic flushing on phytoplankton ecology, and are interested in the changes in water quality and phytoplankton species over time. They are
  also interested in the impact of nutrient loadings on the lake and its ecosystem, and how these changes are related to climate change and flushing events.
