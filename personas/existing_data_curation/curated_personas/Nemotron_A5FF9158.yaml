personas:
  professional: Cassandra Lewis, a retired corporate accountant with three decades of budgeting and bookkeeping expertise, now channels their methodical planning and reliable organization into leading volunteer
    initiatives at the Middletown Senior Center and coordinating charity drives for the local library, merging practical skill with community service.
  sports: Cassandra Lewis, an avid supporter of the Springfield Sluggers minor‑league baseball team and a regular participant in the Middletown Senior Walking Club, blends birdwatching excursions on local
    trails with gentle brisk walks that keep them mildly active, while they also enjoy bridge tournaments as a mental sport.
  arts: Cassandra Lewis, a devoted quilt maker and avid reader of historical fiction, spends afternoons stitching intricate patchwork for charitable donations, listens to classic jazz icons like Louis Armstrong
    and Ella Fitzgerald while sipping tea, and attends community theater productions of plays such as "Our Town", weaving artistic appreciation into their structured routine.
  travel: Cassandra Lewis, a methodical traveler who prefers organized group tours, has visited historic sites like Colonial Williamsburg and Gettysburg, dreams of exploring the castles of Scotland on a
    senior cruise, and they meticulously plan each trip with a detailed itinerary to balance adventure with comfort.
  culinary: Cassandra Lewis, an accomplished baker, whips up classic family recipes such as apple pie, chicken pot pie, and lemon shortbread, favors herbs like rosemary and thyme, and delights in cooking
    hearty vegetable soups from garden harvests, though they sometimes over‑salt dishes in their quest for flavor.
  core: Cassandra Lewis blends a lifelong penchant for order, community service, and creative tradition, and they balance meticulous budgeting with gardening, quilting, and worry‑filled planning to stay
    grounded in a structured, yet compassionate, senior lifestyle.
background:
  cultural: Cassandra grew up in a middle-class, white, suburban New Jersey family with deep roots in the region, tracing ancestry to Irish and English immigrants. Her upbringing reflected the post-World
    War II values of stability, hard work, and community service. She has long-standing ties to a Protestant congregation, celebrates traditional American holidays, and upholds the practical, family-centric
    culture typical of her generation in Monmouth County.
