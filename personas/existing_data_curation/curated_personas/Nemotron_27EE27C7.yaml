  hobbies: '[''Hiking and Rock Climbing'', ''Nature Photography'', ''Yoga and Mindfulness Meditation'', ''Reading Science Fiction and Psychology'', ''Pottery'', ''Knitting'', ''STEM Outreach Volunteering'',
    ''Community Tech Meetups'']'
  career_goals: Mary aims to transition into a senior director role where she can shape company-wide innovation strategies and embed sustainability initiatives across product lines. She aspires to lead
    a cross-functional innovation hub that pilots cutting‑edge technologies while ensuring rigorous, evidence‑based implementation. A core ambition is to champion mental‑health and work‑life‑balance programs
    that reflect her own experiences with anxiety, fostering a more supportive corporate culture. Mary also seeks to mentor and sponsor women and underrepresented groups in STEM, building a pipeline of
    diverse talent. To support these goals, she plans to earn a PMP certification and pursue executive leadership training within the next three years.
