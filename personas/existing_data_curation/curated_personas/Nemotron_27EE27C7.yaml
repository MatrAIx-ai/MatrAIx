personas:
  professional: Mary Wilsey channels her data analytics mastery and agile project leadership into guiding cross‑functional teams to pilot AI‑driven insights and IoT solutions, always balancing her curiosity
    for emerging tech with practical, evidence‑based implementation while modeling compassionate mentorship through empathic listening and assertive decision‑making.
  sports: Mary Wilsey climbs at the Clear Creek Crag gym, hikes the Rockies with the Colorado Mountain Club, follows the Denver Broncos and Colorado Avalanche with enthusiastic loyalty, and incorporates
    sunrise yoga into her weekly routine to sustain flexibility and mental calm.
  arts: Mary Wilsey creates hand‑thrown pottery inspired by Bernard Leach, knits geometric shawls from patterns by Mary Rodgers, devours sci‑fi epics by N.K. Jemisin, and unwinds to Radiohead’s 'In Rainbows'
    while editing photos of alpine landscapes.
  travel: Mary Wilsey plans meticulous weekend escapes to alpine destinations such as Banff, the Tetons, and Rocky Mountain National Park, blending challenging hikes with mindfulness retreats, while dreaming
    of a funded sabbatical trek through Patagonia’s Andes to combine adventure with environmental research.
  culinary: Mary Wilsey fuels her outdoor pursuits with quinoa‑salmon bowls tossed with wild mushrooms and kale, crafts homemade trail mix of almonds, dried cranberries, and dark chocolate, treats herself
    to Colorado bison burgers with smoked gouda, and experiments with fermenting kimchi for gut health.
  core: Mary Wilsey fuses analytical tech leadership with a nature‑driven quest for balance, turning anxiety into disciplined outdoor rituals and championing sustainable, inclusive innovation.
background:
  cultural: 'Mary descends from a White American family with roots in the Midwest, where values of hard work, modesty, and community cohesion were emphasized. Relocating to Denver, she absorbed the region''s
    outdoor‑centric, environmentally conscious culture and progressive social outlook. This blend of traditional family values and the inclusive, active lifestyle of Colorado shapes her worldview: she respects
    established customs while enthusiastically embracing new ideas and diverse perspectives. Her marriage and community ties reinforce a balance between personal responsibility and collective well‑being.'
attributes:
  skills: '[''Data Analytics'', ''Systems Integration'', ''Software Development Lifecycle'', ''Strategic Planning'', ''Agile Project Management'', ''Risk Assessment'', ''Emerging Technology Evaluation'',
