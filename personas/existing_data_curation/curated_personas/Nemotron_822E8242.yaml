  career_goals: Even at four, Rachel talks about her future dreams with confidence. She imagines becoming a teacher because she values organized classrooms and enjoys sharing knowledge with peers. Her fascination
    with how things work fuels an interest in engineering or building, where she could design functional toys or simple structures. She also loves animals and sometimes says she wants to be a veterinarian,
    combining her curiosity with a practical desire to help. Her competitive streak drives her to aim for excellence, and her emotional stability gives her the confidence to take on future responsibilities.
