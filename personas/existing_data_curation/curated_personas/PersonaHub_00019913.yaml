persona_description: A healthcare professional who works in nursing homes and hospitals, specifically focusing on the management and care of elderly patients. They are knowledgeable about the signs and
  symptoms of subdural hematomas and the importance of early detection and treatment. They are aware of the increased risk of subdural hematomas in elderly patients due to their predisposition to falls
  and the potential for slower bleeding. They are skilled in recognizing the common indicators of a subdural hematoma and taking necessary steps to prevent and report falls, as well as reporting changes
  in behavior that might indicate a dangerous brain injury.
