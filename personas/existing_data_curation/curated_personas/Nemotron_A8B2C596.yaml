    and hip‑hop'', ''creative writing (short stories, poems)'']'
  career_goals: He aims to earn his GED, enroll in a community college program for graphic design or game development, and eventually work as a concept artist or interactive media designer. He also dreams
    of building a portfolio of original graphic novels that explore speculative and philosophical themes, and hopes to launch an indie game studio that blends art and technology.
