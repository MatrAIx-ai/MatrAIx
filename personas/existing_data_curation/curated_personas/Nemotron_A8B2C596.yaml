personas:
  professional: Tyrone Smith, an aspiring digital illustrator and budding interactive media programmer, merges their methodical planning with vivid imagination to craft sci‑fi and fantasy artwork and prototype
    small games, while their competitive streak drives them to refine coding skills during the weekly youth tech club at the community center.
  sports: Tyrone Smith follows the Georgia Bulldogs in college football and the Atlanta Hawks in the NBA, participates in a neighborhood youth basketball league each Saturday, and maintains a solitary running
    routine through the local park to stay fit, balancing their competitive nature with a preference for solo exercise.
  arts: Tyrone Smith channels their love for speculative fiction and philosophy into digital sci‑fi and fantasy illustrations while drawing inspiration from jazz legends like Miles Davis and contemporary
    hip‑hop artists such as Kendrick Lamar, often listening to their tracks as they sketch, and they occasionally share short poems at the church’s open‑mic evenings.
  travel: Tyrone Smith prefers meticulously planned trips, having spent a weekend exploring the Smithsonian’s science exhibits in Washington, D.C., and attending New York Comic Con, while they dream of
    an immersive cultural tour of Tokyo’s Akihabara district and a summer escape to Savannah’s historic waterfront.
  culinary: Tyrone Smith enjoys cooking simple southern staples like collard greens seasoned with smoked ham and mac and cheese drizzled with truffle oil, while also experimenting with spicy ramen bowls
    topped with soft‑boiled eggs and sriracha, and they often cap late‑night coding sessions with a slice of pepperoni pizza and a glass of sweet tea.
  core: Tyrone Smith blends a vivid sci‑fi imagination with disciplined, methodical habits, turning solitary creativity into digital worlds while they navigate typical teen quirks like occasional pizza‑fuelled
    coding marathons and a competitive edge that both drives and isolates them.
background:
  cultural: Tyrone grew up in Evans, a suburb of Augusta in Columbia County, within an African‑American family that values education, church, and community bonds. He has been influenced by Southern Black
    cultural traditions, including gospel music and oral storytelling, while also absorbing contemporary Black urban art and hip‑hop culture. His upbringing blends the close‑knit neighborhood dynamics of
    a small town with the broader cultural currents of the Black experience in the American Southeast.
