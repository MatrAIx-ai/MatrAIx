personas:
  professional: Elizabeth Cerro is an aspiring visual storyteller who blends vibrant folklore-inspired sketches, glittery collages, and dramatic skits into early dreams of becoming a children's book illustrator,
    and they approach each creative project with meticulous planning and a confident, talkative flair.
  sports: Elizabeth Cerro shines on the field as a forward for the Riverdale Rangers youth soccer club, eagerly chanting support for the Los Angeles Galaxy during family game nights, and they relish the
    teamwork and high‑energy drills that let them run, collaborate, and bask in the cheers of teammates.
  arts: Elizabeth Cerro immerses themselves in artistic realms, drawing whimsical scenes inspired by traditional folk stories, adorning them with glitter and collage, dancing to rhythmical folk tunes and
    contemporary pop hits like Ariana Grande, and delighting in the dramatic flair of school skits, all while idolizing illustrators like Dr. Seuss, animators from Studio Ghibli, and choreographer Misty
    Copeland.
  travel: Elizabeth Cerro’s travel style blends curiosity with careful planning, preferring weekend adventures to nearby nature preserves like Redwood State Park and dreaming of future trips to the Grand
    Canyon and Disney World, where they can collect souvenirs and sketch new landscapes in their ever‑growing journal.
  culinary: Elizabeth Cerro loves helping with family cooking nights, expertly rolling tortillas for crunchy tacos, mashing avocados into creamy guacamole with a squeeze of lime, and gently steaming soft
    tamales, all while sprinkling colorful toppings like cilantro, cheese, and chilies to add a festive flair to each dish.
  core: Elizabeth Cerro radiates boundless creativity and organized energy, thriving as the center of social circles while quietly wrestling with an undercurrent of worry that fuels both meticulous planning
    and occasional over‑thinking.
background:
  cultural: Elizabeth is raised in a Mexican‑American household in Naperville, Illinois. Her parents speak Spanish at home, and she celebrates cultural festivals such as Día de los Muertos, Cinco de Mayo,
    and Las Posadas with traditional altars, papel picado decorations, and family gatherings. She attends a local Mexican cultural center where she learns folk dances, listens to mariachi music, and participates
    in Spanish language story circles. The family maintains culinary traditions, cooking recipes from their hometown in Jalisco and sharing them with friends at community potlucks. Elizabeth’s bicultural
    upbringing blends Mexican heritage with Midwestern American life, giving her a rich sense of identity that influences her art, language, and community involvement.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Sketching and coloring'', ''Digital storytelling'', ''Organizational planning'', ''Public speaking'', ''Bilingual communication (Spanish-English)'']'
  hobbies: '[''Drawing and painting'', ''Reading storybooks'', ''Soccer'', ''Bilingual storytelling'', ''Dancing to Mexican music'', ''Collecting rocks and leaves'', ''Participating in school theater'']'
  career_goals: Elizabeth dreams of a future where she can share art and stories with the world. She imagines herself as a museum curator who designs interactive exhibits that teach kids about Mexican culture,
    or as an elementary school teacher who uses music, art, and bilingual lessons to inspire curiosity in her students. She also harbors an early fascination with science, hoping one day to become an astronaut
    who discovers new ideas beyond Earth. Her ambition is guided by her love for organized projects, her desire to be a central, supportive presence in group settings, and her wish to make her heritage
    visible and celebrated in any career she pursues.
