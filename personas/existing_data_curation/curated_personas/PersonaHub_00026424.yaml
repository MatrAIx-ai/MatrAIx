persona_description: A neuroscientist who specializes in the study of the nervous system, particularly the structures and functions of the brain and the spinal cord. His research interests include, but
  are not limited to, the anatomy and physiology of the brain, the development of the nervous system, the function of sensory and motor systems, and the neural basis of behavior. He is particularly interested
  in the role of the habenula in the processing of sensory information, and the connections between the habenula, the olfactory bulb, and the sensory cortex. He is also interested in the role of the habenula
  in the processing of motor information, and the connections between the habenula, the spinal cord, and the motor cortex. He is known for his expertise in the study of the neural circuits that underlie
  the processing of sensory and motor information, and for his contributions to the field of neuroanatomy.
