persona_description: A researcher in the field of malaria, specifically focused on the development of new prevention strategies against Plasmodium vivax. This person has expertise in recombinant vaccine
  development, particularly with the circumsporozoite protein (CS) of Plasmodium vivax. They have successfully used recombinant proteins and adenovirus in experimental models and have recently submitted
  a patent application for the production of recombinant vaccines against P. vivax. This person is interested in characterizing the immunogenicity of experimental vaccination with recombinant proteins and
  adenoviruses to further develop a universal vaccine against P. vivax.
