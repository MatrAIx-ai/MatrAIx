  hobbies: '[''Traditional Peruvian cooking'', ''Journaling for emotional regulation'', ''Reading historical fiction and cultural biographies'', ''Listening to Andean folk music'', ''Practicing gentle yoga
    and meditation'', ''Indoor plant care'', ''Knitting and handcrafts'']'
  career_goals: Paola aims to secure a stable, low‑stress position that respects routine and offers clear expectations. In the short term, she hopes to obtain a certification in bookkeeping or office administration
    and work as an accounting clerk or administrative assistant for a nonprofit serving the Latino community, where her bilingual abilities are an asset. Long‑term, she envisions turning her culinary passion
    into a small, home‑based Peruvian food business—perhaps a pop‑up ceviche stall or a weekend catering service—allowing her to work on her own schedule while preserving cultural traditions. Throughout
    her career path she plans to continue building coping strategies for anxiety, such as regular therapy, mindfulness practice, and structured work‑life boundaries.
