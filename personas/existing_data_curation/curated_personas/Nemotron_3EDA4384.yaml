personas:
  professional: Orlando Giribaldi is a budding game creator who blends curiosity for new coding tricks with the practical discipline of their school robotics club, often turning Minecraft mods into small
    programming projects while they stay relaxed about deadlines.
  sports: Orlando Giribaldi shreds at the local skate park, shoots hoops with the middle‑school basketball team that cheers for the Chicago Bulls, and they keep fit by jogging after school while occasionally
    streaming workouts from YouTube fitness channels.
  arts: Orlando Giribaldi composes ukulele renditions of family folk tunes while humming along to Bad Bunny, Kendrick Lamar, and classic rock legends like Led Zeppelin, sketches comic strips inspired by
    Adventure Time, and they craft sci‑fi flash fiction that blends video‑game lore with imaginative worlds.
  travel: Orlando Giribaldi loves short family trips to the Caribbean island of Puerto Rico, day‑camps at a nearby state park, and they dream of exploring Tokyo’s Akihabara district for its gaming culture,
    but plans travel around school breaks and a limited teen budget.
  culinary: Orlando Giribaldi enjoys cooking arroz con gandules, empanadillas, and plantain fritters with mom, experimenting with cumin, cilantro, and sweet plantain mash, yet they often over‑salt the dishes
    while laughing at the kitchen mess they leave behind.
  core: Orlando Giribaldi blends a tech‑savvy curiosity with laid‑back practicality, juggling video games, skateboarding, and ukulele jams while they occasionally misplace school assignments in a whirlwind
    of creative projects.
background:
  cultural: Orlando is a first‑generation Puerto Rican American raised in Newark, Delaware. His household is vibrant with Spanish language, island music, and traditional celebrations such as Día de San
    Juan and the annual Noche de San Juan bonfire. He maintains strong ties to his extended family in Puerto Rico through video calls, family gatherings, and sharing recipes. While he navigates typical
    American teenage life, his cultural identity informs his taste in food, music, and storytelling, and he often blends these influences in his hobbies and future aspirations.
