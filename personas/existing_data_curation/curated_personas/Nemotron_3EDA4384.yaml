  career_goals: Orlando hopes to turn his love for video games and storytelling into a career as a game designer or interactive media creator. He also envisions himself creating a YouTube channel where
    he shares gaming tutorials, tech tips, and cooking demos that blend his Puerto Rican roots with modern trends. In the long term, he dreams of studying computer science or graphic design, ultimately
    working on projects that let him combine creativity, practical problem‑solving, and community outreach.
