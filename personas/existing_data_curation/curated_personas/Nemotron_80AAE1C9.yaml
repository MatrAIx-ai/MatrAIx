personas:
  professional: James Jones is a 1‑year‑old who thrives on the predictable routine of their early‑learning daycare, where their practical nature shines as they meticulously follow the daily schedule of
    block‑stacking, cause‑and‑effect toys, and quiet nap times, displaying an early aptitude for organization and responsibility despite their tender age.
  sports: James Jones enjoys weekly toddler swim lessons at the local community center and participates in a baby gymnastics class, while also cheering for the Seattle Seahawks and Seattle Sounders FC whenever
    their family watches a game on TV, often waving a tiny foam finger they received at a birthday party.
  arts: James Jones delights in the melodic lullabies of Raffi, the playful tunes of Sesame Street’s Elmo, and the gentle piano renditions of Ludovico Einaudi, often clapping along to the repetitive rhythms
    during bedtime storytime, which they find soothing.
  travel: James Jones has already visited their grandparents' farm in the Oregon countryside, explored the interactive exhibits at the Seattle Children’s Museum, and dreams of a future trip to Disneyland
    in Anaheim, where they imagine meeting beloved Disney characters.
  culinary: James Jones prefers soft, sweet foods like mashed sweet potatoes, ripe banana puree, and avocado toast bites, enjoys the occasional bite of goat cheese on a tiny cracker, and shows a quirky
    fascination with the texture of steamed carrots, which they often point to with a delighted grin.
  core: James Jones is a one‑year‑old whose love for routine turns nap time into a finely tuned ritual, whose occasional tantrums erupt when schedules shift, and whose tiny world is filled with predictable
    play, disciplined snack choices, and an early taste for organized comfort, which they cherish.
background:
  cultural: James comes from an African‑American family living in New York County. His parents weave cultural elements such as soulful music, communal meals, and celebrations of Black heritage into his
    daily routine while also exposing him to the broader multicultural environment of the city. The family values structure and predictability, providing James with a stable and supportive backdrop for
    his growth.
