persona_description: A kidney expert who specializes in the detailed study of the kidney's functions, structures, and processes. This person is likely to be a medical doctor or a scientist who works in
  the field of nephrology or in the research and development of kidney-related technologies. They are knowledgeable in the production, modification, and regulation of hormones, vitamins, and other substances
  produced by the kidney, as well as in the role of the kidney in acid-base balance, and the division and function of the kidney into different parts such as the cortex, medulla, and columns. They are also
  familiar with the functional unit of the kidney, the nephron, and its components such as the glomerulus, uriniferous tubule, and renal corpuscle. Additionally, they are likely to be familiar with the
  terms and concepts related to kidney physiology and pathology, and the various medical conditions and treatments related to kidney disease.
