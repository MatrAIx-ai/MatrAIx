  career_goals: Lucrecia aims to transition into a senior engineering management role where she can spearhead sustainable materials research for the marine and construction industries in Florida. She plans
    to earn PMP certification and develop a mentorship program that supports women and underrepresented minorities in STEM. Long‑term, she envisions influencing state‑level material safety standards for
    hurricane‑prone infrastructure and integrating mental‑health wellness initiatives into engineering workplaces, reflecting her deep compassion and desire to help others thrive. She also hopes to launch
    a consultancy that assists small Cuban‑American manufacturers in adopting greener material practices without sacrificing cost‑effectiveness.
