personas:
  professional: Lucrecia Olaizola is a seasoned materials engineer who leverages their expertise in polymer composites, marine corrosion resistance, and additive manufacturing to design rigorously tested,
    standards‑compliant solutions for hurricane‑prone infrastructure, while their structured mindset and compassionate leadership style keep cross‑functional teams on track and foster a supportive environment
    for junior engineers.
  sports: Lucrecia Olaizola keeps fit by swimming laps at the Hialeah community pool three times a week, complements the routine with sunrise yoga at a nearby studio, and rallies behind the Miami Dolphins
    during football season while occasionally joining a local recreational softball league with close friends.
  arts: Lucrecia Olaizola immerses themself in classic Caribbean literature and poetry, often revisiting works by José Lezama Lima, enjoys the timeless rhythms of the legendary salsa vocalist Celia Cruz
    at intimate gatherings, and channels their creativity into crocheting blankets for charity during quiet evenings.
  travel: Lucrecia Olaizola prefers thoughtfully planned, mid‑range trips that blend cultural immersion with relaxation, such as their recent week‑long exploration of Granada’s historic Albayzín district
    and a serene beach retreat on the turquoise shores of Cayo Coco, while balancing travel ambitions with family commitments and a modest travel fund.
  culinary: Lucrecia Olaizola enjoys mastering traditional dishes like ropa vieja, pastelitos filled with guava jam, and fragrant cilantro‑lime rice, often seasoning with locally sourced oregano and tropical
    herbs from their balcony garden, while occasionally treating themself to a weekend brunch at a farm‑to‑table café serving avocado toast with smoked salmon.
  core: Lucrecia Olaizola is a detail‑oriented engineer who channels their structured, compassionate nature into sustainable material breakthroughs, yet occasionally battles late‑night anxiety that fuels
    a habit of binge‑watching telenovelas.
background:
  cultural: Lucrecia is a second‑generation Cuban‑American who grew up in Hialeah, immersed in a vibrant Cuban community. Fluent in Spanish and English, she maintains strong family ties and celebrates cultural
    traditions such as Día de los Muertos, Carnaval, and weekly family meals featuring coffee and pastelitos. Her upbringing emphasized familismo, community solidarity, and a love for music and dance, which
    she integrates into her daily life. While fully engaged in American professional culture, Lucrecia actively participates in local Cuban cultural festivals, supports community organizations that aid
    recent immigrants, and preserves Cuban culinary heritage in her home. This bicultural identity shapes her collaborative spirit, compassionate outlook, and commitment to giving back to both her heritage
    community and broader society.
