  career_goals: Hsing plans to earn his GED within the next year and then pursue industry certifications such as CompTIA A+ and Cisco CCNA to qualify for a junior network or systems technician role. Parallel
    to that, he aims to deepen his programming skills to transition into software development, targeting an entry‑level position at a tech start‑up. Long‑term, he envisions launching an online platform
    that offers custom PC‑building guides and tech tutorials, turning his practical curiosity into a sustainable business.
