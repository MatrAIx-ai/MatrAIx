persona_description: Dr. Ruth McRoy, a Ph.D. in psychology, is a researcher and educator with extensive experience in the mental health treatment of female children and adolescent sex offenders. Her work
  has focused on understanding the treatment provided to female juvenile sex offenders, developing a typology of young female sex offenders, and exploring treatment options on a national scope. She has
  conducted surveys, qualitative follow-up interviews, and has collaborated with various organizations and institutions involved in the education and treatment of female children and adolescent sex offenders.
  Dr. McRoy's research interests include the treatment of female juvenile sex offenders, the mental health treatment of female children and adolescent sex offenders, and the development of a typology of
  young female sex offenders.
