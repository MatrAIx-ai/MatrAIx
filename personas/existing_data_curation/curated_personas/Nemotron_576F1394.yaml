  career_goals: Michael aims to earn his GED within the next year, then enroll in a vocational program at Butte College focusing on automotive technology or emergency services. He is drawn to careers that
    let him combine hands‑on problem solving with community service, such as becoming a certified mechanic, a volunteer firefighter, or a content creator who highlights local outdoor adventures. Ultimately,
    he hopes to secure a stable job that allows him to support his family while staying connected to his community.
