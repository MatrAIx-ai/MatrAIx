personas:
  professional: Clifton Ellis, a seasoned community handyman and senior‑center educator, leverages decades of woodworking, automotive repair, plumbing, and gardening expertise along with his methodical
    organization and sociable leadership to run weekly DIY workshops that blend hands‑on projects with digital literacy for seniors.
  sports: Clifton Ellis stays active by leading brisk walks with the senior‑center walking club, cheers on the Sacramento Kings during the NBA season, follows the Sacramento River Cats baseball team, and
    participates in a local senior bowling league every Thursday.
  arts: Clifton Ellis is an avid listener of jazz and gospel, regularly attending concerts featuring artists like Miles Davis, John Coltrane, Mahalia Jackson, and contemporary saxophonist Kamasi Washington,
    and he enjoys the local art museum’s rotating African‑American history exhibitions.
  travel: Clifton Ellis prefers short road trips that combine family visits with cultural stops, having driven to Savannah’s historic district and New Orleans for its music and cuisine, while his wish list
    includes a leisurely tour of the Great Smoky Mountains National Park with his grandchildren.
  culinary: Clifton Ellis cooks Southern comfort food such as shrimp and grits and fried chicken, often infusing fresh garden tomatoes, basil, and rosemary into modern twists like tomato‑basil risotto,
    and he delights in communal potlucks where his secret‑family BBQ sauce steals the show.
  core: Clifton Ellis blends a lifelong DIY know‑how with community spirit, disciplined budgeting, a love for jazz, and occasional forgetfulness about dental appointments, all while staying active and curious
    at 69.
background:
  cultural: Clifton was born to parents who migrated from the Southern United States during the Great Migration and grew up in Oakland before moving to Roseville, California. His upbringing was steeped
    in African‑American traditions of church involvement, gospel music, storytelling, and communal service. Family gatherings highlighted Southern comfort food and the sharing of oral histories, fostering
    a strong sense of heritage. In both the Bay Area and the Sierra foothills, Clifton navigated the challenges and resilience of Black communities, shaping his commitment to mentorship, cultural preservation,
    and fostering intergenerational connections.
