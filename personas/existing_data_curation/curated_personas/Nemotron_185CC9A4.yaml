  career_goals: Andrew aims to transition into a mentorship role where he can share his practical knowledge with newer nurses, possibly as a charge nurse or a clinical preceptor at his hospital. He is also
    exploring part‑time home health nursing to align with his desire for a steadier routine and more flexible hours as he approaches retirement. Another long‑term ambition is to develop a community health
    workshop series focused on chronic disease management for seniors, reflecting his commitment to the well‑being of his hometown's aging population.
