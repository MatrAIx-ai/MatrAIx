personas:
  professional: Andrew Burson, a 51‑year‑old registered nurse with 25 years of acute and long‑term care experience, they leverage their meticulous hands‑on skills in medication administration, IV therapy,
    and geriatric wound care while using their calm, routine‑driven nature and assertive bedside advocacy to mentor newer staff and champion patient safety.
  sports: Andrew Burson enjoys gentle morning fishing trips on the Green River as his primary fitness routine, they also follow college basketball avidly, rooting for the Kentucky Wildcats, and participate
    in a local senior walking club that meets twice weekly.
  arts: Andrew Burson finds artistic solace in crafting wooden furniture, they also immerse themselves in the narratives of Ken Follett’s Civil War novels and unwind to the storytelling songs of Johnny
    Cash and the folk hymns sung at their Southern Baptist congregation.
  travel: Andrew Burson prefers low‑key road trips that blend history and nature, they have already explored Gettysburg and the Shenandoah Valley, and they hope to someday drive the Blue Ridge Parkway in
    the fall to soak in the foliage while reading Civil War histories on the go.
  culinary: Andrew Burson delights in home‑cooked Southern comfort dishes, they often fire up the grill to prepare smoked chicken thighs seasoned with paprika and brown sugar, pair it with garden‑fresh
    tomatoes, black‑eyed peas, and a side of buttery cornbread, and they cherish a steaming bowl of chicken and dumpling soup on rainy evenings.
  core: Andrew Burson, a diligent nurse and hands‑on craftsman, balances a love for routine with a habit of leaving paperwork until the last minute, often getting lost in a half‑finished birdhouse project
    when a shift handover is due.
background:
  cultural: Andrew grew up in a multi‑generational, white, working‑class family in rural Christian County, Kentucky. His upbringing emphasized self‑reliance, hospitality, and a deep connection to the land
    and local community. The region's Southern Appalachian culture, with its strong church involvement and value placed on family loyalty, has shaped his practical outlook and traditional values. While
    he respects modern medical practices, he retains a preference for straightforward, proven methods and a respect for the community elders who influenced his early life. His cultural identity is intertwined
    with the rhythms of small‑town life, where neighborly assistance and shared faith gatherings are central to daily experience.
