  hobbies: '[''Book club'', ''Bridge (card game)'', ''Gardening'', ''Ballroom dancing'', ''Hiking'', ''Kayaking on Lake Washington'', ''Volunteer at Kirkland Library'', ''Local theater attendance'', ''Knitting'',
    ''Painting miniatures'']'
  career_goals: Even in retirement, Mary is determined to leave a lasting cultural legacy in Kirkland. She aims to complete a memoir that captures the city’s artistic evolution over the past five decades
    and to launch a senior‑led community arts workshop series focused on creative writing and local history. Mary also intends to mentor younger volunteers through a structured program at the Kirkland Library,
    secure funding for an oral‑history project with the local historical society, and maintain her physical health by sustaining active participation in group activities. Her competitive side drives her
    to ensure these initiatives are well‑executed and recognized within the community.
