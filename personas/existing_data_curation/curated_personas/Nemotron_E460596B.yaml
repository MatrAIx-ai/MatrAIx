  hobbies: '[''Watercolor painting'', ''Coastal sketching'', ''Visiting art galleries'', ''Beach volleyball'', ''Zumba classes'', ''Karaoke'', ''Community theater set design'', ''Acting'', ''Yoga'', ''Journaling'',
    ''Reading contemporary fiction'', ''Volunteering at youth art program'']'
  career_goals: Peggy aims to move into a supervisory position on the production line within the next two years, pursuing a part-time associate's degree in industrial technology to deepen her technical
    knowledge. She plans to obtain Lean Six Sigma certification and transition into a quality-assurance role that lets her blend her analytical strengths with her creative eye. Long-term, she hopes to design
    ergonomic workstations or launch a small side business selling hand-crafted artwork, while also advocating for mental-health resources in her workplace.
