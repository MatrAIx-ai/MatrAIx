  career_goals: As he approaches retirement age, Paul aims to earn a Certified Welding Inspector (CWI) credential and transition into a supervisory and mentoring role at his plant. He hopes to lead a small
    team that trains new welders, develop a workshop on modern joining techniques for local community colleges, and eventually start a side business providing custom metal-fabrication services for agricultural
    equipment in the Selma area. He also wants to secure a stable pension, contribute to his local union to improve safety standards, and preserve his trade knowledge for the next generation of Latino workers.
