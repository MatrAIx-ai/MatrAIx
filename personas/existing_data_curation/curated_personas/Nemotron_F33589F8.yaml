personas:
  professional: Paul Orozco is a veteran welder and metal‑fabrication specialist with three decades of MIG, TIG, and stick welding expertise, and they channel their practical curiosity into mentoring apprentices,
    pursuing a Certified Welding Inspector credential, and envisioning a community‑focused workshop that blends hands‑on training with rigorous safety advocacy.
  sports: Paul Orozco enjoys weekend hikes in the nearby foothills, fishing on the San Joaquin River, and cheering on the Los Angeles Dodgers, Golden State Warriors, and the local Selma Firefighters softball
    team, and they occasionally participate in a community fishing club that meets at the river bend.
  arts: Paul Orozco's leisure time is filled with classic rock from Led Zeppelin and The Rolling Stones, regional Mexican ballads by Juan Gabriel, and occasional visits to the Fresno Art Museum to admire
    works by Diego Rivera, and they also craft decorative metal art inspired by both musical rhythms and cultural folk motifs.
  travel: Paul Orozco prefers flexible, low‑key road trips that blend gardening supply stops in Fresno with scenic drives to Yosemite and wine tasting in Napa Valley, while dreaming of a cultural pilgrimage
    to Mexico City’s historic markets and a relaxed beach getaway to Cabo San Lucas, and they plan these journeys around modest retirement savings and family obligations.
  culinary: Paul Orozco is an enthusiastic home‑cook who perfects tamales, pozole, and chiles rellenos using fresh tomatoes, roasted poblano peppers, and corn masa from the garden, while also experimenting
    with smoked brisket and classic spaghetti carbonara, and they often let the oven preheat longer than necessary, resulting in occasional burnt edges.
  core: Paul Orozco blends seasoned welding prowess with a love for gardening, music, and community, and they navigate retirement plans with a relaxed, sometimes disorganized, yet deeply caring approach
    that values hands‑on learning and cultural traditions.
background:
  cultural: Paul was raised in a Mexican‑American household in California's Central Valley, where Spanish was spoken at home and family gatherings featured festive music, food, and Catholic traditions.
    His parents migrated from Jalisco, and their values of hard work, respect for elders, and close‑knit family life shaped his outlook. Living in Selma, a town with a strong agricultural and Latino community,
    Paul maintains ties to cultural celebrations such as Día de los Muertos, Cinco de Mayo, and local fiestas. He is bilingual, often switching between English and Spanish at work and in the community,
    and he mentors younger Latino workers, helping them navigate the trade while preserving cultural pride.
