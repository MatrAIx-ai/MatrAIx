persona_description: A digital humanities scholar who is passionate about transcribing and preserving early modern English manuscripts. They are dedicated to collaborative learning and have experience working
  with teams to decipher and type up difficult handwriting from the time of the Renaissance. They are excited about the potential of digital scholarship and the long-term access to crucial knowledge that
  such efforts achieve for researchers across the world. They are also interested in the Folger Shakespeare Library's valuable holdings and have experience with transcribathon sessions.
