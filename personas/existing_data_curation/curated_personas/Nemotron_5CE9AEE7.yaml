personas:
  professional: Eliot Espinosa, an aspiring digital storyteller, combines a knack for hand‑drawn cartoons, stop‑motion animation with friends, and coding simple Scratch games, channeling their curiosity
    and laid‑back, flexible attitude into creative projects that often evolve spontaneously rather than follow a strict plan.
  sports: Eliot Espinosa thrives on the soccer field with the Phoenix Rising FC youth academy, relishes weekend games at the local park where teamwork and fast footwork sharpen their energy, and spends
    evenings mastering tricks at the community skate ramp, idolizing professional skateboarder Nyjah Huston.
  arts: Eliot Espinosa explores visual art through drawing cartoon characters inspired by Matt Groening, cherishes street‑art murals by Banksy on downtown tours, and diversifies their creative palate by
    listening to classic rock legends like The Beatles and contemporary pop star J Balvin while sketching, making the arts a vibrant thread in daily life.
  travel: Eliot Espinosa prefers spontaneous weekend getaways with family, buzzing through downtown Phoenix mural tours, splurging on a day trip to the Grand Canyon for breathtaking hikes, while dreaming
    of future adventures to Disneyland and a Southwest road trip, always balancing budget limits with an appetite for vibrant sights.
  culinary: Eliot Espinosa loves helping in the kitchen where they learn to fold corn masa for tamales, mash ripe avocados with lime and cilantro for guacamole, and experiment with adding chipotle for a
    kick, showcasing a growing confidence in family‑style cooking and a curiosity to blend flavors.
  core: Eliot Espinosa is a curious, energetic 12‑year‑old who fuses cartoon artistry, skateboarding thrills, and a love for vibrant street culture into a spontaneous, socially driven life that balances
    creative chaos with moments of focused ambition.
background:
  cultural: Eliot is a second‑generation Mexican‑American raised in Phoenix’s East Valley. His parents emigrated from the state of Jalisco, and Spanish is spoken at home alongside English. Family traditions
    such as Día de los Muertos altars, celebrating Cinco de Mayo, and cooking staple foods like tamales, pozole, and arroz con frijoles anchor his cultural identity. He attends a bilingual public middle
    school where he learns both curricula, participates in a cultural club that teaches traditional dances and folkloric painting, and visits the local Mexican Cultural Center for workshops. The desert
    landscape and Southwest art scene, with its bright murals and adobe architecture, influence his visual preferences. Eliot balances the vibrancy of his Mexican heritage with the broader American youth
    culture of Phoenix, shaping a hybrid outlook that values community, creativity, and adaptability.
attributes:
  skills: '["English reading and writing", "Conversational Spanish", "Basic coding (Scratch)", "Digital video editing", "Graphic design basics", "Sketching and illustration", "Soccer", "Team collaboration",
