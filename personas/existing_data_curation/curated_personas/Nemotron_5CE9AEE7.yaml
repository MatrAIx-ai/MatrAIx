  hobbies: '["Drawing cartoons", "Stop‑motion video making", "Scratch game creation", "Soccer", "Skateboarding", "Listening to Latin pop and reggaeton", "Museum visits (street art, Mexican heritage)", "Cooking
    Mexican dishes", "Simple science experiments"]'
  career_goals: Eliot dreams of turning his love for art and technology into a future career. He imagines becoming a video‑game designer or an animator who can create characters that reflect his cultural
    background and the vibrant stories he enjoys. He also entertains the idea of being a professional soccer player, but he sees his education and artistic projects as the main pathway. He hopes to attend
    a high school with a strong art program, later study graphic design or interactive media at college, and someday work in a studio where he can blend storytelling, visual art, and interactive experiences.
