  career_goals: Patrizio imagines a future where he can combine his love for art, structure, and nature. He dreams of becoming an architect or a video-game designer, careers that let him shape imaginative
    spaces while applying his planning skills. He also feels a pull toward science, hoping one day to be a wildlife biologist who studies animal habitats. In the near term, he aims to win his school's science
    fair, earn top marks in art competitions, and take on leadership roles in class projects, building a portfolio that reflects his competitive spirit and creative vision.
