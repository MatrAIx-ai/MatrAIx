  career_goals: Katie aspires to become a senior revenue manager overseeing a regional audit team, where she can shape policy implementation and mentor junior examiners. She aims to obtain professional
    certifications such as Certified Public Accountant (CPA) and Certified Fraud Examiner (CFE) to deepen her expertise. Long‑term, she envisions leading a statewide initiative to integrate data‑analytics
    tools into tax compliance processes, improving efficiency and detection rates. Her ambition is driven by a desire to set high standards, achieve measurable results, and be recognized as a thought leader
    in modernizing revenue collection.
