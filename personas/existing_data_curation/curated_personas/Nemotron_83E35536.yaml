personas:
  professional: Katie Merto is a senior tax examiner renowned for her meticulous data‑driven audits, leveraging advanced spreadsheet modeling, SQL queries, and SAP/Oracle Financials to uncover compliance
    discrepancies while mentoring junior staff with a competitive yet supportive edge.
  sports: Katie Merto is an avid hiker who conquers Shenandoah’s Old Rag Trail each spring, participates in a local trail‑running club, and follows the Washington Commanders and Washington Capitals with
    a seasonal allegiance that fuels their competitive spirit during game nights.
  arts: Katie Merto cultivates creative expression by authoring historical‑fiction articles for a community newsletter, devouring novels by Hilary Mantel and Ken Follett, and attending performances by the
    Virginia Symphony Orchestra, while their playlist often features Dolly Parton and the soulful sounds of Aretha Franklin.
  travel: Katie Merto plans travel with meticulous itineraries, favoring historically rich destinations such as Williamsburg, Virginia, Savannah, Georgia, and the Scottish Highlands for genealogy research,
    balancing adventure hiking trips with relaxed stays at boutique B&Bs, though a tight budget sometimes postpones overseas voyages.
  culinary: Katie Merto enjoys cooking Southern‑inspired dishes like shrimp and grits, collard greens, and pecan pie, skillfully seasoning with smoked paprika and cayenne, while their garden yields fresh
    okra and tomatoes that they incorporate into meals, and they regularly host potluck gatherings at the local food bank to share hospitality.
  core: Katie Merto blends analytical precision with a love of history and the outdoors, turning meticulous tax audits into community storytelling while they juggle a competitive drive, organized routines,
    and a penchant for Southern comfort food.
background:
  cultural: Katie grew up in a modest, middle‑class family in rural Virginia, immersed in Southern traditions that value community, self‑reliance, and respect for heritage. Her upbringing emphasized the
    importance of education and hard work, encouraging her pursuit of a STEM degree despite the region's traditionally agrarian focus. While she appreciates local customs—such as seasonal festivals, church
    gatherings, and a strong sense of neighborly support—she also embraces a pragmatic, analytical mindset shaped by her academic and professional experiences. This blend of Southern cultural roots and
    modern professional discipline informs her balanced outlook on life.
