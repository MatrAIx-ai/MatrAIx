personas:
  professional: Evan Brown is a disciplined personal financial advisor who leverages advanced Excel modeling, Python portfolio simulations, and platforms like MoneyGuidePro and eMoney to craft tax‑efficient
    plans for both affluent families and underserved neighborhoods, applying the same structured rigor he brings to his daily 5‑km runs and meticulous project tracking.
  sports: Evan Brown logs five‑kilometer runs five days a week with the Albany Running Club, joins a competitive pickup basketball league at the Voorheesville Community Center, roots for the New York Knicks
    and the New York Mets, and tracks the Albany Great Danes men’s basketball season as their hometown team.
  arts: Evan Brown enjoys gospel choirs at church, listens to Stevie Wonder and Aretha Franklin for inspiration, streams contemporary jazz from Kamasi Washington, attends off‑Broadway productions like "Hamilton"
    when in New York City, and follows visual artist Jacob Lawrence’s exhibitions, all of which inform their appreciation for storytelling and cultural resilience.
  travel: Evan Brown prefers meticulously planned itineraries, often combining a weekend hike in the Adirondacks with a cultural stop at the National Museum of African American History in Washington, D.C.,
    and dreams of a culinary‑focused trip to Jamaica to explore mango‑savory dishes, while keeping travel costs within a quarterly $2,000 budget.
  culinary: Evan Brown experiments in the kitchen by blending Southern comfort foods such as fried chicken and collard greens with Caribbean flair—adding Scotch bonnet peppers and mango salsa to a jerk‑spiced
    chicken, simmering sweet‑potato and okra gumbo with Andouille sausage, and finishing desserts with a drizzle of aged bourbon caramel.
  core: Evan Brown is a detail‑driven financial strategist who runs, plans, and cooks with disciplined rhythm, yet occasionally lets a spontaneous grill purchase slip through an otherwise tight budget.
background:
  cultural: Evan grew up in a close-knit Black family in the Albany region, where church, education, and community service were core values. His parents, both college-educated professionals, emphasized
    academic achievement and financial responsibility, shaping his early interest in numbers and planning. He maintains strong ties to his cultural heritage through family gatherings that feature gospel
    music, storytelling, and traditional dishes passed down through generations. Living in Voorheesville, he experiences a blend of suburban convenience and the rich tapestry of upstate New York’s diverse
    communities, which informs his commitment to bridge the wealth gap for Black residents by offering culturally aware financial guidance.
attributes:
  skills: '[''Financial planning and wealth management'', ''Investment analysis and portfolio construction'', ''Tax-advantaged strategy design'', ''Risk assessment and mitigation'', ''Regulatory compliance
    (FINRA, SEC)'', ''Data analysis with Excel and Python'', ''Financial modeling and scenario planning'', ''Client relationship management'', ''Structured presentation and communication'', ''Project and
    time management'', ''Goal setting and performance tracking'', ''Financial literacy education'']'
  hobbies: '[''Running'', ''Pickup basketball'', ''Strategy board games (Catan, Settlers of Catan)'', ''Chess'', ''Reading nonfiction (personal development, behavioral economics, Black history)'', ''Cooking
    (Southern and Caribbean fusion)'', ''Financial-literacy volunteering'', ''Mentoring high-school students'', ''Attending church community events'', ''Hiking in the Catskills'']'
  career_goals: Evan aims to earn his Certified Financial Planner (CFP) designation within the next year and to lead a boutique advisory practice that serves both affluent families and underserved Black
    communities in upstate New York. His medium-term target is to manage at least $75 million in assets under management while building a team that mirrors his values of structure, accountability, and compassion.
    Long-term, he envisions authoring a financial-literacy guide tailored to young Black professionals and speaking regularly at community workshops and industry conferences, positioning himself as a trusted
    voice for economic empowerment.
