  career_goals: At three years old, Alexander’s aspirations are expressed through imaginative play. He often pretends to be a firefighter rescuing animals, a cartoon artist drawing pictures for friends,
    or a park ranger exploring the prairie. These play scenarios reflect his curiosity about helping others, love for drawing, and fascination with the outdoors. As he grows, he shows a budding desire to
    share stories and pictures, hinting at a future ambition to become an artist or a storyteller who can combine visual creativity with community service.
