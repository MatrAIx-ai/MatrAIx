persona_description: 'John Fabian Witt is a law professor at Yale and the author of the forthcoming American Contagions: Epidemics and the Law From Smallpox to Covid-19. He is a legal historian who specializes
  in public health law and has written extensively on the topic. His expertise lies in the history of public health regulations and their evolution over time, particularly in the United States. Witt''s
  research focuses on the role of courts in upholding public health measures and the impact of judicial decisions on public health policy. He is likely to be interested in the ongoing debate over judicial
  nominations, court reform, and the COVID-19 pandemic, and is likely to have a deep understanding of the legal and historical context of these issues.'
