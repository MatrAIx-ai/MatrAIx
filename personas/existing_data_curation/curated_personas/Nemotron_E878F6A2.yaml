personas:
  professional: Lan Ni is a 16‑year‑old aspiring software engineer whose disciplined study habits and love of strategic real‑time strategy games shape a methodical approach to coding; proficient in Python,
    HTML, and CSS, they channel competitive meta‑analysis skills into AI‑focused projects, while also integrating traditional calligraphy aesthetics into UI design, aiming to earn merit‑based scholarships
    and eventually develop language‑bridging applications.
  sports: Lan Ni fuels mental acuity with weekly hikes along the San Gabriel Mountains, where they enjoy the solitude and scenic vistas, and balances this with occasional pickup basketball games at school,
    all while cheering for the Los Angeles Lakers and following the LA Galaxy’s season, preferring personal fitness routines that blend structured cardio with spontaneous outdoor exploration.
  arts: Lan Ni blends digital illustration and traditional calligraphy, drawing inspiration from folklore such as the Monkey King and modern fantasy, creating fan art that references Studio Ghibli’s Hayao
    Miyazaki and the graphic style of artist Kiki Sato, while also appreciating the violin virtuosity of Lindsey Stirling and the lyrical storytelling of indie musician Mitski, which inform both their aesthetic
    sensibility and their creative downtime.
  travel: Lan Ni prefers meticulously planned weekend getaways, having already trekked to Yosemite National Park and explored the historic streets of San Diego, while dreaming of a cultural immersion trip
    to Tokyo to attend a tech expo and sample street food; they balance school responsibilities with a wish to visit the futuristic districts of Seoul once they secure a scholarship.
  culinary: Lan Ni enjoys crafting home‑cooked dumplings (jiaozi) and mooncakes during the Mid‑Autumn Festival, relishes the crisp bite of scallion pancakes seasoned with ginger and soy sauce, and experiments
    with spicy mapo tofu, yet their cooking skill sits at a confident intermediate level, often ordering take‑out ramen after intense gaming sessions.
  core: Lan Ni is a structured, competition‑driven teen who merges strategic gaming, coding, and calligraphic art into a disciplined pursuit of an AI‑focused tech career, while budgeting meticulously, hiking
    for balance, and savoring culturally rich dishes.
background:
  cultural: Lan is a second‑generation East Asian American, born to immigrant parents from mainland China. Mandarin is spoken at home, and family traditions such as Chinese New Year, the Lantern Festival,
    and Mid‑Autumn Festival are celebrated with customary foods and rituals. Her parents emphasize disciplined study, respect for elders, and the preservation of cultural arts, encouraging her to learn
    calligraphy and to honor her heritage. Growing up in Pasadena, she has been exposed to a multicultural environment, attending local community events and interacting with peers from diverse backgrounds.
    She frequently visits a nearby Chinese cultural centre for calligraphy classes and participates in community celebrations that blend her family's traditions with the broader American culture.
attributes:
  skills: '[''Python programming (basic)'', ''HTML/CSS web development'', ''Spreadsheet management (Google Sheets)'', ''Digital illustration (Procreate)'', ''Mandarin Chinese (native fluency)'', ''English
