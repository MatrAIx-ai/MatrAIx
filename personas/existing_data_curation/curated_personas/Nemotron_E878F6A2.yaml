  hobbies: '[''Strategic video gaming (RTS, eSports)'', ''Digital illustration and concept art'', ''Sci‑fi and technology reading'', ''Coding personal projects (Python, web)'', ''Chinese calligraphy'',
    ''Hiking and nature walks'', ''Puzzles (Sudoku, logic games)'', ''Photography of local landscapes'', ''Small maker/Arduino meetups'']'
  career_goals: Lan aims to channel her analytical strengths into a technology career. She plans to enroll in a specialized high‑school program or community‑college courses in computer science, with the
    long‑term goal of becoming a software engineer focused on artificial intelligence or cybersecurity. She hopes to earn merit‑based scholarships that recognize her coding projects and competitive gaming
    achievements. In the future, Lan envisions developing applications that bridge language barriers, combining her technical expertise with her cultural heritage. Her ambition is to build a stable, structured
    career path that offers clear progression and the opportunity to solve real‑world problems.
