  career_goals: Although only three, Ana already talks about future roles that reflect her caring nature and love of order. She often says she wants to be a teacher who reads stories to children and keeps
    a tidy classroom, or a pediatric nurse who helps kids feel better and follows clear procedures. These ambitions align with her desire for structured, helpful work that makes a visible difference.
