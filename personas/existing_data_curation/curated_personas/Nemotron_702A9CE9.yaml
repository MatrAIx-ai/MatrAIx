  hobbies: '[''Salsa and bachata dancing'', ''Cooking and experimenting with Mexican cuisine'', ''Group fitness classes (Zumba)'', ''Volunteering at food banks'', ''Herb gardening'', ''Crafting papel picado
    for festivals'', ''Watching telenovelas and films'', ''Exploring cultural neighborhoods in Los Angeles with friends'']'
  career_goals: Nelmari aims to formalize her caring instincts by earning a high school equivalency credential (GED) and pursuing a Certified Nursing Assistant (CNA) certification within the next two years.
    She envisions a career in community health outreach or a role as a volunteer coordinator at a local nonprofit, where she can combine her organizational strengths with her drive to help others. In the
    longer term, she hopes to launch a home‑based catering service that highlights her Mexican culinary heritage, providing flexible income while staying connected to her community.
