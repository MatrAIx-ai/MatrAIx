  hobbies: '[''Landscaping Photography'', ''Hiking'', ''Barbecue Cooking'', ''Community Theater Acting'', ''Playing Bridge'', ''Attending Live Music Concerts'', ''Volunteer Urban Greening'', ''River Kayaking'',
    ''Collecting Vintage Gardening Tools'', ''Amateur Lawn Care Competitions'']'
  career_goals: Anthony aims to transition from supervising a single crew to running a multi‑site landscaping operation that serves all five boroughs of New York City. He plans to earn the Certified Landscape
    Professional (CLP) credential and develop a niche service focused on sustainable, low‑water urban gardens. Over the next five years, he hopes to secure municipal contracts for park maintenance, double
    his company's revenue, and mentor younger workers to build a legacy of skilled, reliable supervisors. Ultimately, he envisions retiring with a profitable, employee‑owned business that continues to enhance
    the city's green spaces.
