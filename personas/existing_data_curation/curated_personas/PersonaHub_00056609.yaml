persona_description: A development economist with expertise in poverty eradication and economic growth. They are interested in the relationship between poverty and pro-poor growth, and the role of economic
  growth in achieving the Sustainable Development Goals. They are looking for evidence-based policies and solutions to address the interests of the poorest people and ensure that growth benefits everyone,
  not just the wealthy. They are also interested in the experiences of chronically poor women and the potential of anti-discrimination measures, human development, and social protection to achieve the Leave
  No One Behind agenda.
