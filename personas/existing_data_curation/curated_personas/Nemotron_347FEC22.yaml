  career_goals: Although currently not employed full‑time, Harold aims to re‑enter the engineering field within the next two years, targeting senior roles that combine technical depth with project leadership.
    He plans to obtain a Project Management Professional (PMP) certification and leverage his network in the Katy/Houston area to launch a boutique consulting firm that helps small manufacturers adopt lean
    processes and digital tools. Parallel to this, he aspires to mentor high‑school students in STEM through after‑school programs, positioning himself as a community leader who bridges industry expertise
    with local educational needs.
