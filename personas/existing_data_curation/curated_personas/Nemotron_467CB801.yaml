  career_goals: Amber aims to advance to a district manager role, overseeing multiple stores across Oklahoma and neighboring states. She plans to introduce innovative retail experiences that blend technology,
    art, and sustainability, positioning her stores as community cultural hubs. To support this vision, she intends to pursue an MBA focused on strategic leadership and to develop a mentorship program that
    prepares next‑generation retail leaders. Ultimately, she dreams of launching a boutique consulting firm that helps small retailers integrate creative merchandising and resilient operational practices.
