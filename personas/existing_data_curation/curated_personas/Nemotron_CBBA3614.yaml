  hobbies: '[''art museum visits'', ''community theater'', ''choir singing'', ''gardening'', ''cooking'', ''quilting'', ''book club'', ''genealogy research'', ''volunteering at senior center'', ''historical
    walking tours'']'
  career_goals: While enjoying her role as a part‑time cashier, Christina aims to deepen her involvement in the local arts scene by volunteering as a docent at the Murfreesboro Arts Center and leading informal
    art discussion circles at the senior center. She aspires to mentor new cashiers, sharing her customer‑focused techniques and fostering a welcoming store atmosphere. Additionally, she hopes to organize
    a small pop‑up market featuring handcrafted items and local artwork, combining her love of community, creativity, and social interaction into a modest entrepreneurial venture that provides supplemental
    income and a platform for fellow artisans.
