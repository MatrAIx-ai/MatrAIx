  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Book club'', ''Photography'', ''Volunteering at STEM workshops'', ''Woodworking'', ''Genealogy research'', ''Hiking'']'
  career_goals: Although retired from formal employment, Sandra aims to stay intellectually active by contributing her expertise to community initiatives and STEM outreach programs. She aspires to lead
    a local mentorship program that connects high‑school girls with engineering professionals, co‑author a series of practical guides on data literacy for seniors, and volunteer as a technical advisor for
    the town’s renewable energy projects. She also hopes to publish a memoir reflecting on her career in science, highlighting the evolving role of women in STEM, and to continue learning emerging technologies
    such as artificial intelligence and quantum computing.
