  hobbies: '[''Vegetable gardening'', ''Knitting and quilting'', ''Reading historical fiction'', ''Baking Southern pies and biscuits'', ''Attending church services'', ''Walking her dog'', ''Volunteering
    at local library (literacy program)'', ''Listening to classic country music'', ''Birdwatching'']'
  career_goals: Although retired, Janice aims to stay intellectually active by mentoring local high‑school students in STEM subjects, volunteering as a guest speaker for community education events, and
    contributing to the county historical society. She also hopes to complete a memoir that chronicles her experiences as a woman in STEM and the cultural changes she has witnessed in the South, while maintaining
    her health and independence.
