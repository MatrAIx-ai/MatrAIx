personas:
  professional: Janice Brown, a retired research scientist turned high school math teacher, leverages their strong analytical mind and modest, routine‑driven style to mentor local students in STEM, craft
    clear curricula, and speak at community education events, all while balancing a relaxed approach to planning that sometimes leaves their classroom materials slightly scattered.
  sports: Janice Brown enjoys low‑impact fitness, taking daily walks with their dog along the winding countryside trails, supports the local high school football team, the Russellville Wildcats, and follows
    the Alabama Crimson Tide and Atlanta Braves, occasionally joining the neighborhood walking club for gentle hikes.
  arts: Janice Brown finds creative fulfillment in quilting and listening to classic country legends like Dolly Parton, Patsy Cline, and Johnny Cash, while also indulging in historical fiction by authors
    such as Margaret Mitchell and attending the county community theatre’s monthly performances, which they cherish.
  travel: Janice Brown prefers leisurely road trips that let them explore historic towns like Savannah, Georgia, and Charleston, South Carolina, and they look forward to an upcoming visit to the Blue Ridge
    Parkway for its scenic drives, choosing destinations that offer gentle sightseeing and opportunities to share meals with family.
  culinary: Janice Brown’s culinary repertoire centers around traditional home‑cooked fare, from flaky apple pie and pecan tart to buttery buttermilk biscuits, collard greens cultivated in their own garden,
    and slow‑cooked fried chicken, all prepared with a practical yet nostalgic touch that reflects their love for sharing meals at church potlucks and community events.
  core: Janice Brown blends a methodical, science‑trained mind with a love for routine, home‑grown food, and quiet community service, navigating life with modest pragmatism, occasional forgetfulness, and
    a steadfast commitment to preserving personal and regional stories, which they pursue with quiet determination.
background:
  cultural: Janice was raised in a small, close‑knit community in Russellville, Alabama, during the 1950s and 1960s. Her upbringing was shaped by Southern traditions of hospitality, church participation,
    and a strong sense of duty to family and neighbors. As a white woman who earned a graduate degree in a STEM field at a time when few women did, she values practicality, modesty, and self‑reliance while
    also embracing the region’s cultural heritage of storytelling, traditional cooking, and community service.
