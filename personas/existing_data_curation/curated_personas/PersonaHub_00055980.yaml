persona_description: A soccer coach who prioritizes the safety and well-being of his players, emphasizing proper technique and strength training to prevent injuries. He is concerned about the rising rates
  of knee and ankle injuries among female athletes and encourages his teams to pay special attention to this area. He is aware of the long-term effects of concussions and encourages parents to take their
  children to the emergency room or see a neurologist if they are experiencing headaches or blurry vision. He is also a strong advocate for proper head movement when playing soccer, teaching his older players
  how to properly head the ball to avoid facial injuries.
