  career_goals: She envisions a future in health care where she can blend scientific curiosity with hands‑on service. Her primary goal is to become a pediatric nurse practitioner, studying health sciences
    in college and eventually working in community clinics that serve children and families. She also hopes to lead health‑education outreach programs in her hometown, using her organizational abilities
    to coordinate volunteer events.
