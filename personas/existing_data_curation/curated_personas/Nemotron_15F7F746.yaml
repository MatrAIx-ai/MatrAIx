personas:
  professional: Francisco Mojica, a 36‑year‑old facilities specialist, leverages their meticulous routine, competitive edge, and expertise in custodial cleaning, waste segregation, and basic mechanical
    repairs to consistently achieve top performance scores and position themselves for a supervisory role within the next five years.
  sports: Francisco Mojica stays active by fishing on the St. Marys River, playing weekly pool league matches at the local community center, and cheering on the Atlanta Braves, the Atlanta Falcons, and
    the Savannah Bananas, while occasionally joining a neighborhood walking group for extra cardio.
  arts: Francisco Mojica unwinds to the lively salsa beats of Celia Cruz, Marc Anthony, and Gilberto Santa Rosa, dancing in their kitchen while preparing pernil, and regularly attends the Savannah Music
    Festival to catch performances by local plena bands like Plena Del Nuevo Mundo.
  travel: Francisco Mojica prefers well‑planned road trips to nearby spots like Tybee Island and historic Savannah, but dreams of a cultural immersion tour of San Juan, Puerto Rico, and aspires to explore
    the national parks of Utah once they secure a stable mortgage.
  culinary: Francisco Mojica, a confident home cook, masterfully prepares arroz con gandules and pernil using adobo‑spiced pork, sofrito, and pigeon peas, and pairs their freshly caught snapper with a cilantro‑lime
    glaze and roasted plantains for a balanced family feast.
  core: Francisco Mojica blends a regimented daily routine with a quiet competitive streak, channeling their love for detailed maintenance, strategic dominoes, and elaborate family meals into a pragmatic
    climb toward managerial success, even if they habitually overbook weekends with extra shifts and late‑night fish‑tales.
background:
  cultural: Francisco is a first‑generation Puerto Rican American. He grew up speaking both Spanish and English, and his family maintains strong ties to Puerto Rican traditions, including a love for salsa
    music, festive gatherings, and foods such as lechón and mofongo. Though living in Saint Marys, GA, he balances his island heritage with Southern customs, attending local church services and participating
    in community events. He often joins cultural celebrations organized by the Puerto Rican diaspora in Savannah, and he takes pride in sharing his heritage with coworkers and neighbors.
attributes:
  skills: '[''Building cleaning'', ''Floor care'', ''Industrial vacuum operation'', ''Waste segregation'', ''Basic plumbing repairs'', ''Basic electrical troubleshooting'', ''Safety compliance'', ''Time
    management'', ''Record‑keeping'', ''Customer service'']'
  hobbies: '[''Playing dominoes'', ''Pool (billiards)'', ''Car maintenance'', ''Fishing on St. Marys River'', ''Cooking Puerto Rican cuisine'', ''Listening to salsa and plena music'', ''Woodworking projects'',
    ''Community clean‑up volunteering'']'
  career_goals: Francisco aims to advance from a janitorial role to a supervisory or facilities‑manager position within the next five years. He plans to earn certifications in commercial cleaning and OSHA
    safety, join a local union for better benefits, and eventually run his own small‑scale cleaning business that serves commercial clients in the coastal Georgia area. He is motivated to become the top
    performer on his site, earn recognition such as Employee of the Month, and secure a stable income that will allow him to purchase a home and support a future family.
