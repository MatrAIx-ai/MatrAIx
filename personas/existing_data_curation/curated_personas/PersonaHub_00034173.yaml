persona_description: A geologist who studies the occurrence, causes, and effects of earthquakes in the United States, particularly in Oklahoma and Texas, and has expertise in using computer models to analyze
  seismic activity and identify potential sources of underground pressure. The geologist has conducted research on the role of wastewater disposal in triggering earthquakes in Oklahoma City and has published
  findings suggesting that certain high-rate disposal wells near southeast Oklahoma City were responsible for a swarm of earthquakes in 2008. The geologist has also been involved in regulatory discussions
  about hydraulic fracturing and wastewater disposal in the state, and has advocated for stricter regulations to prevent human-triggered earthquakes. The geologist is well-versed in the geological and geophysical
  principles underlying seismic activity and has a deep understanding of the state's oil and gas industry, including its regulatory framework and the potential for unconventional oil and gas development
  to trigger earthquakes.
