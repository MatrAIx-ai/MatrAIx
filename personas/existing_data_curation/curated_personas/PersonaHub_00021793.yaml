persona_description: 'A district leader who is committed to ensuring that all students, regardless of their exceptionalities, have equal opportunities to engage in rich learning experiences within the general
  education classrooms. The leader is passionate about deepening learning and is dedicated to implementing innovative practices that develop deep learning competencies and effective measures for monitoring
  students'' progress toward their Individualized Education Program (IEP) goals and objectives, as well as state and district standards. The leader is aware of the six deep learning competencies (Communication,
  Critical Thinking, Collaboration, Creativity, Character, and Citizenship) and is using them to develop a plan for addressing the district mandates. The leader is using the Fullan and Quinn text, Chapter
  4, "Deepening Learning," and Figure 4.2: Deep Learning Competencies—The 6Cs, to reflect on the learning that would look like for each competency. The leader is also using the five examples presented in
  the text to reflect on the similarities each district displayed in moving whole systems toward deeper learning.'
