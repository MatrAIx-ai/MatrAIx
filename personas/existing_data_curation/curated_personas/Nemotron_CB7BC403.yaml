  career_goals: Elouise aims to attend a STEM-focused high school and later pursue an engineering degree, with a particular interest in environmental or robotics engineering that can bring practical solutions
    to her community’s challenges. She dreams of joining a competitive robotics team, winning regional contests, and eventually working on sustainable technology projects. Alongside engineering, she entertains
    the idea of studying computer science to develop educational software for middle-school students. Her long-term ambition includes becoming a mentor who encourages other youths in her region to explore
    science, technology, and critical thinking.
