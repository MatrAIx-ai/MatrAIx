personas:
  professional: Elouise Barreras is an emerging robotics enthusiast who leads her middle school club’s coding sessions, writes simple Python games for friends, and designs challenge‑ready mechanisms that
    blend inventive ideas with the practical constraints of limited resources, all while balancing schoolwork and community service projects.
  sports: Elouise Barreras plays forward on the Ashland Middle School soccer team, runs the 400‑meter dash for the track squad, hikes the nearby Appalachian foothills every weekend with friends, and passionately
    supports the Cincinnati Bengals and Kentucky Wildcats, often debating game strategies after practice.
  arts: Elouise Barreras plays the fiddle at family gatherings, mastering folk tunes like Will the Circle Be Unbroken, draws inspiration from fiddlers Bill Monroe and Sierra Hull, and rounds out artistic
    interests by devouring sci‑fi graphic novels by Neal Stephenson and listening to the soundtrack of the video game Celeste.
  travel: Elouise Barreras loves day trips to the Great Smoky Mountains for scenic hikes, dreams of a summer road trip to Washington D.C. to see the Smithsonian, and hopes to visit New York City’s Museum
    of Modern Art next spring, all while planning trips around school breaks and family budgets.
  culinary: Elouise Barreras enjoys the comforting flavor of homemade cornbread with honey butter, a hearty bowl of Kentucky burgoo on cold evenings, and experiments with fresh apples to bake a crisp apple
    crumble for family gatherings, often swapping recipes with grandparents.
  core: Elouise Barreras juggles robotics code, fiddle tunes, and soccer drills while secretly hoarding puzzle books and half‑finished science‑fiction drafts, never missing a chance to prove they can out‑think
    a teammate or out‑run a rival.
background:
  cultural: Elouise grew up in Ashland, Kentucky, a small city in the Appalachian foothills of Boyd County. Her family’s roots trace back to Scots-Irish and German settlers who arrived in the region in
    the 19th century, and she has been raised with a blend of traditional Appalachian values—hospitality, self-reliance, and community service—and modern perspectives. Church gatherings, local festivals,
    and bluegrass music are familiar parts of her life, and she often helps with neighborhood clean-up events. While the area’s history is linked to coal mining and manufacturing, Elouise’s parents encourage
    education and curiosity, supporting her involvement in STEM clubs and encouraging her to bring practical, innovative ideas back to her community.
