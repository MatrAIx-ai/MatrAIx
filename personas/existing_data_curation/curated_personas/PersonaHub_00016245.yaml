persona_description: A food scientist who specializes in the study of the olfactory system and its role in taste perception. She has conducted research on the impact of insulin on the sense of smell and
  its relation to food preferences. Her interests include developing drugs to block the process of olfactory stimulation and reducing appetite through altering the perception of food smells. She has published
  her findings in the journal Cell.
