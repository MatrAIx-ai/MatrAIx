  hobbies: '[''Sketching'', ''Digital illustration'', ''Visiting art galleries'', ''Listening to eclectic music'', ''Reading philosophy and creative nonfiction'', ''Photography'', ''Hiking'', ''Casual yoga/meditation'',
    ''Podcast listening'', ''Collecting vintage vinyl'']'
  career_goals: Beth aims to turn her passion for visual art into a sustainable freelance career, focusing on illustration, concept art for indie video games, or art‑therapy work that blends creativity
    with mindfulness. She plans to enroll in a community‑college art program or attend specialized workshops to build a formal portfolio, while also growing her online presence through social media platforms.
    Long‑term, she dreams of opening a small studio where she can create art, host mindfulness workshops, and collaborate with other artists worldwide.
