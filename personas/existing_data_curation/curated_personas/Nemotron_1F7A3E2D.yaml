personas:
  professional: Beth Wooldridge, a teenage visual artist proficient in Procreate and Photoshop, channels their curiosity and open‑minded approach into unconventional concept art for indie video games while
    leveraging their relaxed attitude toward deadlines to maintain a flexible freelance workflow.
  sports: Beth Wooldridge, an avid weekend hiker who explores the Santa Cruz Mountains with the Bay Area Hikers club and practices casual yoga at a community studio, cheers for the San Francisco Giants
    in spring and the Golden State Warriors in winter, while rarely participating in organized team sports.
  arts: Beth Wooldridge, who curates eclectic indie‑lo‑fi playlists featuring Tame Impala, Khruangbin, and Nujabes while drawing inspiration from illustrators Loish, James Jean, and photographer Alex Prager,
    spends afternoons sketching in Golden Gate Park and attending exhibitions at the San Francisco Museum of Modern Art.
  travel: Beth Wooldridge, who prefers low‑key, self‑planned road trips over costly flights, has explored the towering redwoods of Humboldt County and the cliffs of Big Sur, and dreams of backpacking through
    Kyoto’s art districts and Barcelona’s streets, balancing school commitments with a modest travel fund.
  culinary: Beth Wooldridge, a self‑taught home cook with a plant‑forward palate, often prepares avocado toast topped with za’atar, miso ramen brimming with shiitake mushrooms, and mango sticky rice desserts,
    while pairing late‑night vinyl listening sessions with artisanal cheese boards and locally roasted pour‑over coffee.
  core: Beth Wooldridge, a 17‑year‑old visual art enthusiast, balances relentless curiosity with relaxed disorganization, turning sketchbook doodles into freelance gigs yet habitually forgetting to back
    up their digital files.
background:
  cultural: Beth was raised in Saratoga, an affluent suburb of the San Francisco Bay Area, within a middle‑class family of European descent. Her upbringing combined the region’s progressive, multicultural
    atmosphere with a suburban emphasis on outdoor recreation and community events. Exposure to the local Japanese tea garden, nearby wineries, and a vibrant arts scene fostered her appreciation for diverse
    cultural expressions, while family values emphasized independence, self‑exploration, and flexibility.
attributes:
  skills: '[''Digital illustration (Procreate, Photoshop)'', ''Observational drawing'', ''Basic photography'', ''Video editing (iMovie, Adobe Premiere Rush)'', ''Creative brainstorming'', ''Empathetic communication'',
