  career_goals: Robbie aims to take on a leadership role within his school district, such as becoming a department head or lead instructor for career and technical education. He plans to develop a district‑wide
    experiential‑learning program that integrates local industry partners, giving students real‑world experience. To deepen his theoretical knowledge, he intends to pursue an associate degree in education
    and eventually a teaching certification. Additionally, he aspires to mentor new teachers, present his innovative practices at regional conferences, and launch a community‑based after‑school STEM initiative
    for under‑represented youth in Fort Worth.
