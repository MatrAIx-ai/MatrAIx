  career_goals: Although no longer in the formal workforce, Roberto aims to remain professionally engaged by mentoring high‑school and college students in engineering fundamentals and creative problem‑solving.
    He aspires to lead volunteer workshops that blend scientific inquiry with artistic expression, fostering interdisciplinary thinking in the next generation. Additionally, he hopes to author a collection
    of essays reflecting on the evolution of engineering practice and its societal impact, while also advocating for senior-friendly community programs that promote mental well‑being and social harmony.
