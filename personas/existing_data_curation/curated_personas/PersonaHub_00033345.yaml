persona_description: A team of researchers from the UK and Brazil who specialize in inclusive education and teacher perspectives on how students with disabilities engage with mathematics. They aim to challenge
  the assumptions about the mathematical abilities of disabled learners and explore and challenge dominant interpretations of mathematics teaching and learning. Their work includes studies on micro-evolution
  of documentational work in the teaching of the volume of revolution, supporting teachers towards attuning and resignifying in inclusive mathematics classrooms, and integrating resources in mathematics
  teaching.
