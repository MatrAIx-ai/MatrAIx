  hobbies: '[''Walking through historic Ponce'', ''Photography of colonial architecture'', ''Attending plena and bomba music festivals'', ''Rooftop herb gardening'', ''Reading Puerto Rican history and medical
    journals'', ''Weekly bocce league'', ''Playing chess'', ''Listening to classical guitar'', ''Using tablet for health tracking and video calls'', ''Cooking traditional Puerto Rican dishes (mofongo, arroz
    con gandules) with creative twists'']'
  career_goals: Oscar’s primary career ambition is to ensure his decades-long knowledge benefits the next generation of Puerto Rican chiropractors. He aims to establish a mentorship program within his clinic,
    offering apprenticeships to recent graduates, and to author a bilingual guide that blends conventional chiropractic practice with traditional Puerto Rican healing wisdom for seniors. He also seeks to
    expand his clinic’s outreach by offering free quarterly spinal health workshops at local senior centers, addressing chronic pain among the island’s elderly. Additionally, Oscar hopes to become a recognized
    speaker at the annual Puerto Rico Chiropractic Association conference, sharing his evidence‑based strategies for managing anxiety‑related musculoskeletal tension. Finally, he aspires to achieve a balanced
    retirement where he can devote more time to personal health, reduce his own anxiety, and enjoy tranquil mornings gardening with his family.
