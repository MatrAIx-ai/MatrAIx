persona_description: A Korean nationalist who is deeply committed to the cause of Korean independence and who has played a significant role in the establishment of the Korean Provisional Government in exile.
  He is a Christian and has connections to the United States, particularly to the city of Haeju in northwestern Korea. He is a leader in the Korean independence movement and has served as the president
  of the Korean Provisional Government in 1919 and the first president of the Republic of Korea in 1948. He is known for his dedication to democracy, modern science, and education as solutions to Korea's
  existential crisis.
