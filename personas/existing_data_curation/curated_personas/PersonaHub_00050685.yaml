persona_description: A retail food industry professional who is responsible for managing and ensuring the safety of food in retail establishments. They have a deep understanding of the four key areas of
  food safety management - supplier and source of foods and food ingredients, in-store practices and procedures, education and training of employees and food handlers, and consumer education. They are aware
  of the importance of cleaning and disinfection in controlling food safety risks and are prepared to handle potential norovirus incidents in a professional and effective manner. They have experience in
  collaborating with food safety professionals from industry, academia, and regulatory agencies to create and revise guidelines for food safety management.
