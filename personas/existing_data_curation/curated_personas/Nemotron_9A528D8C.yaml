personas:
  professional: Antonia Peeples, a 24‑year‑old aspiring community development professional, blends analytical data‑driven program design with warm, cooperative communication to craft inclusive youth empowerment
    initiatives, using tools like Asana, Canva, and Excel to keep projects on track while ensuring every stakeholder’s voice is heard.
  sports: Antonia Peeples, an avid hiker of the Twin Cities’ trail network, joins the local Minneapolis‑St. Paul Outdoor Club for weekend treks, follows the Minnesota Twins baseball season, and participates
    in a community 5K run series organized by the Saint Paul Youth Initiative.
  arts: Antonia Peeples, a regular at downtown jazz clubs, draws inspiration from the improvisational stylings of Kamasi Washington and the spoken‑word cadence of Sarah Kay, and channels that energy into
    urban‑landscape photography that captures the city’s architectural soul.
  travel: Antonia Peeples, who favors meticulously planned weekend getaways, has explored the historic districts of New Orleans and the coastal charm of Savannah, and dreams of a solo backpacking trip through
    the Scottish Highlands while balancing a limited travel budget and a full volunteer schedule.
  culinary: Antonia Peeples, an experimental home cook, blends classic comfort dishes like collard greens and smoked turkey with modern twists such as miso‑glazed sweet potatoes and quinoa‑infused cornbread,
    often sourcing fresh herbs from their balcony garden to craft flavorful, Instagram‑ready plates.
  core: Antonia Peeples is a meticulously organized 24‑year‑old who balances community‑driven activism with a love for soulful jazz, crisp spreadsheets, and the occasional caffeine‑induced late‑night photography
    edit.
background:
  cultural: Antonia is an African‑American woman whose family has lived in the Saint Paul area for several generations. She was raised attending a historically Black Baptist church where community service,
    fellowship, and cultural pride were emphasized. Her family celebrates Juneteenth, prepares traditional soul‑food dishes, and participates in local civil‑rights and voter‑registration initiatives. Growing
    up in the Upper Midwest, Antonia navigates the intersection of broader American culture and the distinct experiences of Black Midwesterners, drawing inspiration from the vibrant African‑American arts
    scene, music festivals, and community organizations that shape Saint Paul's cultural landscape.
attributes:
  skills: '[''Community outreach'', ''Event planning and coordination'', ''Program development'', ''Written and oral communication'', ''Data analysis (Excel, Google Sheets)'', ''Basic graphic design (Canva)'',
