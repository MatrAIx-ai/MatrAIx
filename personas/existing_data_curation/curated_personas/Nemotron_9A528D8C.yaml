  hobbies: '[''Reading contemporary fiction and social justice non‑fiction'', ''Book clubs'', ''Photography (urban landscapes)'', ''Cooking soul food with modern twists'', ''Balcony gardening'', "Volunteering
    at community center (arts & crafts workshops)", ''Hiking local trails'', ''Attending live jazz and spoken‑word events'', ''Exploring productivity and tech tools'']'
  career_goals: Antonia aims to launch a career in community development or nonprofit program management, focusing on youth empowerment and educational equity in underserved neighborhoods of Saint Paul.
    She plans to complete her bachelor’s degree in social work or public administration, secure an entry‑level program assistant role, and eventually advance to a program manager or director position where
    she can design and implement culturally responsive services. Alongside her professional trajectory, she hopes to develop workshops that blend practical skill‑building with African‑American cultural
    heritage and earn certification in project management to enhance her impact.
