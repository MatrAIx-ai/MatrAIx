personas:
  professional: Jacques Davis is a preschool builder who loves sorting Lego bricks by shape and color, designing miniature towers during free play, and eagerly shares imaginative blueprints with classmates,
    demonstrating early architectural instincts while balancing meticulous organization with playful flexibility and reliably helping peers.
  sports: Jacques Davis is a member of the Little Lions youth soccer club who runs the midfield with boundless energy, idolizes the New York Knicks as the favorite professional basketball team, attends
    Tuesday gymnastics class at Tiny Tots Gym, and enjoys occasional solo bike rides in the park, balancing team play with independent activity.
  arts: Jacques Davis is an enthusiastic crayon artist who spends afternoons drawing vibrant scenes inspired by Disney's Frozen and the animated series Bluey, often reenacting character dialogues while
    listening to jazz legend Dave Brubeck's Take Five, letting colorful imagination shape their identity.
  travel: Jacques Davis is an inquisitive explorer who loves weekend trips to the city zoo, day‑long beach outings at Santa Monica, and dreams of a family vacation to Disneyland Paris, preferring meticulously
    planned itineraries yet sometimes throwing spontaneous tantrums when plans shift.
  culinary: Jacques Davis is a budding chef who can melt butter for scrambled eggs, delights in mac and cheese with extra cheddar, enjoys dipping apple slices in peanut butter, and occasionally surprises
    parents by trying sushi for the first time, though they often cling to a trio of favorite dishes.
  core: Jacques Davis is a curious, art‑loving four‑year‑old who blends meticulous block‑building with vivid imagination, worries about losing belongings, and balances kindness with occasional meltdowns.
background:
  cultural: Jacques is raised in a warm, Southern‑American household in Summerville, South Carolina. His family emphasizes community, hospitality, and regular participation in local church and town events,
    such as the annual Summerville Festival and library story hours. He grows up with Southern traditions like family meals, storytelling, and a respect for the natural environment surrounding his hometown,
    while also being exposed to the diverse cultural tapestry of the Lowcountry region.
