  hobbies: '["Watercolor painting","Pottery","Hiking in Boise foothills","Yoga","Community theater acting","Visiting local art galleries","Reading contemporary fiction and educational research","Cooking
    farm‑to‑table meals","Volunteering for library story time","Traveling to explore new cultures"]'
  career_goals: Carmen aims to become a lead teacher and eventually a curriculum coordinator for an early childhood program that emphasizes artistic expression and experiential learning. She plans to pursue
    a master's degree in early childhood education or educational leadership within the next three years. Long‑term, she envisions designing a district‑wide arts‑focused preschool curriculum, mentoring
    new teachers, and advocating for policies that support creative early learning environments. Her ambition also includes opening a community‑based preschool that partners with local artists and cultural
    organizations.
