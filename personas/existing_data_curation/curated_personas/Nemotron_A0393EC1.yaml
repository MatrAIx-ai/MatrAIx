personas:
  professional: Carmen Notbohm, a 25-year-old early childhood educator in Boise, designs arts‑integrated curricula, leverages educational technology to animate lesson plans, and balances clear organization
    with spontaneous creativity to foster inclusive classrooms while leading parent‑focused workshops and community events.
  sports: Carmen Notbohm hikes the Boise foothills weekly, practices Vinyasa yoga at Sunrise Yoga Studio, cheers for the Boise State Broncos football team and follows the Idaho Steelheads hockey games,
    and is an active member of the Boise Outdoor Adventure Club that organizes weekend trail runs and rock‑climbing outings.
  arts: Carmen Notbohm paints watercolors inspired by Georgia O'Keeffe, creates raku‑style pottery at Boise Clay Studio, performs in community theater productions such as 'Little Shop of Horrors', and frequents
    the Idaho Contemporary Art Center where they draw creative energy from Kandinsky's abstractions and local indigenous art exhibitions.
  travel: Carmen Notbohm favors culturally immersive trips, planning budget‑friendly weekend getaways to Sun Valley for skiing lessons, a coastal retreat in Cannon Beach, Oregon, and dreaming of future
    visits to Mexico City's mural districts and Kyoto's traditional pottery workshops while balancing travel ambitions with the constraints of a teaching salary and student loans.
  culinary: Carmen Notbohm enjoys farm‑to‑table cooking, sourcing heirloom carrots, foraged mushrooms, and Idaho trout from the Boise farmer's market to craft dishes like roasted beet and goat‑cheese salad,
    pan‑seared trout with rosemary‑infused butter, and tangy sourdough toast drizzled with local wildflower honey, though they sometimes over‑season their sauces in the pursuit of bold flavors.
  core: Carmen Notbohm, a 25-year-old early‑childhood educator, blends artistic curiosity with a habit of over‑booking their calendar, thriving on community connections while occasionally forgetting to
    pause for self‑care.
background:
  cultural: Carmen identifies as a White American, raised in a middle‑class family in the Boise suburbs. Her family’s roots trace back to German and Scandinavian immigrants who settled in the Pacific Northwest,
    instilling values of independence, community service, and respect for education. Growing up in Idaho, she was exposed to a blend of rural traditions and a growing multicultural scene, including the
    heritage of the Shoshone‑Bannock tribes. This environment fostered her appreciation for diverse cultural perspectives, which she integrates into her teaching by celebrating varied traditions and encouraging
    inclusive classroom discussions.
