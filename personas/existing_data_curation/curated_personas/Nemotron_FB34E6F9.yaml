  career_goals: Sharmain dreams of a future where she can blend her love of art, curiosity, and compassion. She imagines becoming a children's book author who paints whimsical stories, a museum curator
    who shares cultural treasures, or a wildlife photographer who captures animals in their habitats. She also feels drawn to caring for animals and hopes to study veterinary science. Her overarching ambition
    is to keep learning, creating, and inspiring others while staying connected to her community.
