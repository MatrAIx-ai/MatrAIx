personas:
  professional: Sharmain Burns is a budding young storyteller who channels their curiosity and methodical planning into creating illustrated comic strips and organizing the neighborhood soccer team's mini‑league
    schedule.
  sports: Sharmain Burns shines on the field as a forward for the Greenfield Rovers youth soccer team, idolizes FC Barcelona's playing style, and balances weekend practices with early morning jogs to stay
    fit.
  arts: Sharmain Burns delights in sketching scenes inspired by the bright panels of Dog Man, hums along to Kirk Franklin’s gospel choruses and Beyoncé’s R&B hits, and frequently tries writing simple lyrics
    for the church choir.
  travel: Sharmain Burns enjoys family trips to the Great Smoky Mountains and Walt Disney World, has explored the museums of Washington, D.C., and dreams of visiting London’s British Museum to see original
    medieval manuscripts.
  culinary: Sharmain Burns enthusiastically measures flour for chocolate chip cookies, loves stirring collard greens with smoked turkey, dreams of mastering perfect mac and cheese with sharp cheddar, but
    often emerges from the kitchen with a sticky flour‑coated nose.
  core: Sharmain Burns is a curious, organized nine‑year‑old who juggles LEGO building, soccer, and gospel tunes, while occasionally hoarding comic books under the bed and forgetting to finish homework
    until the last minute.
background:
  cultural: Sharmain grows up in a Black family rooted in the Southern traditions of Clinton, Mississippi, within Hinds County. Her household places great importance on church, gospel music, and community
    gatherings, where storytelling and oral history are cherished. Family celebrations include Juneteenth, soul‑food feasts featuring fried chicken, collard greens, and sweet tea, and annual visits to historic
    sites related to the civil‑rights movement. Her grandparents share stories of resilience and pride from the era, instilling a sense of cultural identity and responsibility. Local school programs and
    community events reinforce African‑American heritage through art, music, and history, shaping Sharmain's perspective and nurturing her curiosity about her roots.
