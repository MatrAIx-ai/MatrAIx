    décor suggestion'', ''Emotional intelligence'', ''Multitasking under high‑pace environments'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Experimenting with coffee brewing methods'', ''Watercolor painting'', ''Hiking in Washington state trails'', ''Yoga and mindfulness practice'',
    ''Volunteering at cultural festivals'', ''Reading about contemporary art and design'', ''Cooking traditional Vietnamese dishes'']'
  career_goals: Phuong aims to advance from host/hostess to floor manager within the next two to three years, gaining experience in team leadership, staff training, and inventory management. She plans to
    complete a hospitality‑management certification or finish a bachelor's degree in Business Administration, leveraging her existing college credits. Long‑term, she dreams of opening a boutique coffee
    shop that doubles as a rotating gallery for local Southeast Asian and Pacific Northwest artists, creating a space where community, culture, and coffee intersect. She also hopes to mentor new hires,
    especially recent immigrants, to help them navigate the hospitality industry and foster inclusive workplace cultures.
