personas:
  professional: Anhtuan Tuong is a senior finance manager at a multinational corporation, translating complex data into strategic recommendations while mentoring cross‑functional teams, and they bring a
    relaxed, big‑picture mindset that values flexibility over rigid schedules.
  sports: Anhtuan Tuong enjoys weekend runs with the NYC Runners Club, follows the New York Knicks and New York City FC with enthusiastic loyalty, and they supplement the schedule with weekly yoga sessions
    and occasional pick‑up basketball games, preferring low‑impact fitness that fits a flexible routine.
  arts: Anhtuan Tuong frequents the MoMA and the Brooklyn Museum, often sketching watercolor studies of installations by Ai Weiwei, Yayoi Kusama, and Banksy, and they unwind with evening screenings of Lin‑Manuel
    Miranda’s musical productions and contemporary jazz performances by Kamasi Washington.
  travel: Anhtuan Tuong blends meticulous itinerary planning with spontaneous detours, having explored the lantern‑lit streets of Luang Prabang during the Mid‑Autumn Festival, the cherry‑blossom avenues
    of Kyoto, and the jazz‑filled nights of New Orleans, while always reserving space for family gatherings around Tet celebrations.
  culinary: Anhtuan Tuong masters the art of modernizing classic dishes like pho with star‑anise‑infused broth, bánh mì with avocado‑miso mayo, and caramelized pork belly glazed with maple‑sugar, often
    pairing meals with fresh herbs such as Thai basil and cilantro.
  core: Anhtuan Tuong blends a compassionate, community‑first ethos with a delightfully chaotic desk of sketchbooks and receipts, navigating life through flexible planning, daily yoga, and a relentless
    curiosity for art and finance.
background:
  cultural: 'Anhtuan is a first‑generation American of Vietnamese heritage, raised in a bilingual household that values family cohesion, respect for elders, and community service. His upbringing fused traditional
    celebrations such as Tet and Mid‑Autumn Festival with the multicultural vibrancy of the New York metropolitan area. This dual cultural lens informs his world view: he balances reverence for his roots
    with an adaptive, open‑minded approach to American life. Bilingual in Vietnamese and English, he often bridges cultural gaps in both personal and professional settings, using his background to foster
    inclusive environments and to relate to diverse clients and colleagues.'
