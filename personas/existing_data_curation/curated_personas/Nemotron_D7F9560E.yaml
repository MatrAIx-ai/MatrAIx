  career_goals: Anhtuan aims to transition from his current managerial role to a chief financial officer position within a socially‑oriented organization where he can shape financial strategy that supports
    community development. He plans to earn a CPA designation through targeted study programs, reinforcing his technical credentials. Parallel to his corporate ambitions, he wants to launch a city‑wide
    financial literacy initiative that empowers underserved families, drawing on his compassionate nature and desire for harmony. Over the next five years, he envisions himself mentoring emerging finance
    professionals, championing inclusive budgeting practices, and influencing policy through advisory boards that bridge the public and private sectors.
