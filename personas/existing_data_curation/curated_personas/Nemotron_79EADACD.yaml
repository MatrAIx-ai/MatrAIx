  hobbies: '["Fishing", "Surfing", "Everglades hiking", "DIY home improvement", "Reading business and history books", "Attending football games", "Mentoring youth", "Playing guitar"]'
  career_goals: Neel aims to transition from a successful sales representative to a regional sales director within the next five years, overseeing a team of reps and shaping the strategic direction for
    the company's manufacturing portfolio. He is driven to mentor junior colleagues, expand market share in the Southeast, and implement data‑centric sales processes that blend innovative approaches with
    proven revenue‑generation tactics. Long‑term, he envisions launching his own distribution venture that leverages the relationships and industry insights he has cultivated.
