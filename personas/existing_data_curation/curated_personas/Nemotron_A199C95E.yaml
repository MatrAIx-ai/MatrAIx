personas:
  professional: Edward Bentley, a 19‑year‑old security surveillance associate at a high‑traffic casino, merges his solid foundation in educational theory with hands‑on CCTV monitoring and budding Python
    scripting to design data‑driven training workshops, applying his organized, methodical approach to risk assessments, conflict de‑escalation, and detailed reporting while eyeing senior analyst certification.
  sports: Edward Bentley plays pickup basketball at the local park three times a week, cheering on the Boston Celtics and the Connecticut Sun, hikes the Shenipsit State Forest trails on weekends for quiet
    reflection, and maintains a modest cardio routine, though intense study periods often cause him to skip workouts.
  arts: Edward Bentley deepens his love for music by listening to classic jazz icons like Miles Davis and contemporary R&B stars such as H.E.R., curates a vinyl collection of hip‑hop and bebop, visits downtown
    galleries showcasing street photography, and draws creative inspiration from photographers like Brandon Stanton, often pairing his visual projects with eclectic playlists.
  travel: Edward Bentley prefers budget‑friendly, short‑term trips, having explored New York City’s jazz scene and toured historic Boston neighborhoods, while dreaming of a cross‑country road trip to the
    Great Smoky Mountains and a future cultural immersion in New Orleans to experience its vibrant music and cuisine, balancing wanderlust with student‑loan constraints.
  culinary: Edward Bentley delights in cooking Southern‑inspired comfort food, mastering crispy fried chicken, buttery cornbread, tangy collard greens, and shrimp‑and‑grits, experimenting with homemade
    hot‑sauce blends, yet often resorts to fast‑food pizza during late‑night study sessions.
  core: Edward Bentley is a methodical 19‑year‑old security analyst‑in‑training who balances late‑night surveillance duties with basketball, jazz, and Southern cooking, all while juggling tight budgets,
    occasional insomnia, and a relentless curiosity for emerging tech.
background:
  cultural: Edward was raised in a close‑knit African‑American family in New Britain, Connecticut. His parents, originally from the Southern United States, brought traditions of Southern cooking, church
    fellowship, and oral storytelling, which remain central to his family life. The multicultural fabric of New Britain, with its mix of Caribbean influences and New England sensibilities, has broadened
    his perspective. He actively participates in local African‑American cultural events such as Juneteenth celebrations, Black History Month programs, and community service projects organized through his
    church. Education has been emphasized as a pathway to empowerment in his household, prompting his pursuit of a bachelor's degree in education and his ongoing mentorship of younger community members.
    This blend of Southern heritage, urban Connecticut experience, and a strong communal ethic shapes Edward's identity, values, and outlook on both his personal and professional life.
attributes:
  skills: '[''Surveillance monitoring and analysis'', ''Risk assessment and threat mitigation'', ''Report writing and documentation'', ''First aid and emergency response'', ''Conflict de‑escalation and
