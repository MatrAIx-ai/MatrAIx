    pattern recognition'', ''Organizational planning'', ''Time management'', ''Knowledge of gambling regulations'']'
  hobbies: '[''Basketball (pickup games)'', ''Listening to jazz, hip‑hop, and R&B'', ''Learning Python for data automation'', ''Reading non‑fiction on criminology and education'', ''Street photography'',
    ''Volunteer tutoring for middle‑school students'', ''Cooking Southern‑style meals'', ''Hiking in local parks'', ''Playing strategy and simulation video games'']'
  career_goals: Edward aims to progress from his current security or surveillance role to a senior surveillance analyst position within the next five years, leveraging his curiosity for new detection technologies.
    He plans to earn the Certified Protection Professional (CPP) credential and pursue a master’s degree in security management or educational leadership, merging his dual interests in safety and teaching.
    His long‑term ambition is to design and lead a comprehensive training program for security personnel at a major casino, eventually moving into a security manager or director role where he can shape
    policy, improve operational efficiency, and mentor the next generation of professionals. He also hopes to contribute to community safety initiatives in New Britain by volunteering his expertise in local
    youth outreach and crime‑prevention workshops.
