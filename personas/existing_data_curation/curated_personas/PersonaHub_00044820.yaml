persona_description: A historian who is particularly interested in the history of Jewish communities in England, particularly the period of the exile and the subsequent return. They are knowledgeable about
  Jewish musicians in England during the exile and have a keen interest in uncovering the Tudor Court’s secret Jews. They have a strong curiosity about the connections between Jewish musicians and the court,
  and are fascinated by the tales of the Dark Lady and the post-expulsion Sephardic family. They are also interested in the history of violinmaking and the connections between Jewish musicians and the music
  industry.
