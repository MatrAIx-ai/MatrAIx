  hobbies: '["historical nonfiction reading", "chess", "herb gardening", "cooking traditional South Asian dishes", "listening to classical Indian music", "volunteering at senior center", "walking in local
    parks", "genealogy research", "home electronics tinkering"]'
  career_goals: Even in retirement, Anand aims to leave a lasting legacy by mentoring younger community members, especially recent immigrants, in practical life skills such as financial literacy and home
    maintenance. He plans to compile a memoir and a series of oral‑history recordings that capture his family's migration story and South Asian traditions for future generations. Anand also aspires to establish
    a modest scholarship fund for local students pursuing technical trades, and to curate a small exhibition of South Asian art and artifacts at the Roseville public library. Maintaining his health, staying
    intellectually curious, and deepening his engagement with emerging technologies like smart‑home devices are also personal ambitions.
