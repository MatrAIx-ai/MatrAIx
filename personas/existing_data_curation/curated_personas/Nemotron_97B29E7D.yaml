  hobbies: '[''Visiting art museums and galleries'', ''Sketching and painting'', ''Photography (sunsets, nature)'', ''Reading science‑fiction literature'', ''Attending community lectures and workshops'',
    ''Fishing'', ''Boating'', ''Road trips around Florida'', ''DIY mechanical projects (restoring vintage tractor)'', ''Listening to live music (jazz/folk)'']'
  career_goals: Russell aims to transition from a senior operator to a supervisory role, eventually becoming a shift lead or safety manager for his facility. He plans to obtain additional certifications
    in heavy equipment training and occupational health and safety, positioning himself to mentor and train new operators. Long‑term, he envisions launching a small consultancy offering equipment rental
    and on‑site training services to regional warehouses, leveraging his deep operational knowledge and his interest in emerging automation tools. He also hopes to contribute to workplace safety programs,
    championing a culture of proactive risk management.
