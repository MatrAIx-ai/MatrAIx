persona_description: A government official or employee who is responsible for maintaining accurate address locations for structures in rural areas and ensuring timely delivery of emergency services. They
  are aware of the importance of precise address points for government services like fire and police response to emergencies and are committed to providing widespread access to accurate government address
  point files. They have experience with in-car GPS systems and internet-based mapping systems and are aware of the limitations of using address ranges to find the actual location of a structure. They are
  also familiar with the issue of privacy and access to address data and are committed to addressing it through the development of publicly accessible data.
