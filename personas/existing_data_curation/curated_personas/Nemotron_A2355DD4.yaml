  hobbies: '["Walking in the Staten Island Greenbelt", "Fishing at Great Kills Park", "Model train building", "Listening to classic rock and jazz (vinyl)", "Cooking simple meals", "Reading historical non-fiction",
    "Crossword puzzles", "Attending community-theater performances", "Participating in local cultural festivals"]'
  career_goals: Approaching retirement, Wayne’s primary goal is to maintain a steady income and secure full pension benefits while gradually shifting toward a lighter workload. He plans to obtain a bookkeeping
    certification from a local community college to formalize his experience and position himself for part-time consulting work with small businesses in Staten Island that need affordable billing assistance.
    Additionally, he hopes to mentor a junior colleague, pass on his practical knowledge, and eventually volunteer his financial-administrative skills at the local senior center or community organization.
