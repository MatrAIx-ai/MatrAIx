personas:
  professional: Angela Gilbert, a 31‑year‑old operations manager, uses their data‑driven decision‑making and budget oversight skills to engineer efficient store workflows while cultivating a collaborative
    team culture that leverages their sociable, assertive nature—though they sometimes let flexibility outweigh strict planning when deadlines press.
  sports: Angela Gilbert, an avid participant in Zumba and community yoga classes at the local YMCA, also enjoys weekly recreational softball games with their book club friends and cheers on the New England
    Patriots while supporting the Hartford Yard Goats, embodying a balance of structured fitness routines and spontaneous team spirit.
  arts: Angela Gilbert, a devoted member of a contemporary fiction book club, frequently discusses novels by Sally Rooney and Chimamanda Ngozi Adichie, attends intimate concerts featuring Tame Impala and
    local indie folk band The Lumineers, and finds inspiration in the paintings of Yayoi Kusama, weaving a vibrant artistic tapestry into their social calendar.
  travel: Angela Gilbert prefers short, budget‑friendly getaways—a weekend escape to Asheville’s art‑filled downtown, a farm‑stay in Oaxaca to learn sustainable cooking, and occasional trips to Kyoto’s
    tranquil gardens—planning loosely with an eye‑catching spreadsheet, balancing their MBA coursework and community volunteer commitments.
  culinary: Angela Gilbert, an enthusiastic home cook, loves creating seasonal vegetable dishes like roasted beet quinoa salad with feta and pistachios, mastering a zucchini lasagna with fresh basil, and
    sourcing herbs at farmers' markets to share hearty, farm‑to‑table meals with friends, though they sometimes burn the garlic when multitasking between cooking and texting their team.
  core: Angela Gilbert is a sociable, data‑driven operations leader who juggles a love of community fitness, spontaneous cooking experiments, and chronic anxiety with a habit of over‑planning spreadsheets
    that they habitually abandon for last‑minute plans.
background:
  cultural: Angela was raised in a middle‑class, white New England family in Worcester County, where community ties and modesty are deeply valued. Her heritage includes roots in Irish and Anglo‑American
    traditions, reflected in holiday gatherings and an appreciation for local history. Growing up in Clinton, she internalized the region's practical outlook, love for seasonal outdoor activities, and a
    strong sense of civic responsibility. These cultural influences shape her collaborative, yet self‑reliant approach to both professional and personal life.
