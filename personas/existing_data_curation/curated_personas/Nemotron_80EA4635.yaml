  hobbies: '["LEGO building", "jigsaw puzzles", "beginner Sudoku", "reading adventure comics", "drawing cartoons", "small‑group soccer", "sticker and trading‑card collecting", "helping prepare simple Mexican
    dishes (tacos)", "Minecraft", "listening to norteña and banda music"]'
  career_goals: Jose often imagines a future where he designs and builds things, expressing interest in becoming a mechanical engineer or a video game programmer because these roles provide clear processes
    and creative possibilities. He also feels drawn to veterinary work, wanting to care for animals and help his community’s pets. Occasionally, he mentions wanting to be a firefighter, seeing the structured
    teamwork and service as appealing ways to make a difference.
