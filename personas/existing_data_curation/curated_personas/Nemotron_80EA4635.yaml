personas:
  professional: Jose Espinel, an aspiring LEGO architect, channels their love for step‑by‑step guides into meticulous, modular builds that double as imaginative story worlds, applying a practical, structure‑loving
    mindset yet still allowing spontaneous twists during weekend play sessions.
  sports: Jose Espinel, a forward on the Little Strikers youth soccer club, thrives in after‑school, small‑group matches, idolizes Lionel Messi’s dribbling, and cheers for the city’s professional team,
    the River City Hawks, preferring the predictable rhythm of short games over chaotic large tournaments.
  arts: Jose Espinel, a budding comic enthusiast, devours Adventure Time graphic novels and draws original cartoon heroes inspired by classic characters like Mickey Mouse and Sonic the Hedgehog, while the
    norteña twang of Los Tigres del Norte and the brass beats of Banda Los Recoditos soundtrack family art sessions.
  travel: Jose Espinel, an eager explorer, has visited the sun‑kissed beaches of Cancún, marveled at the towering cliffs of the Grand Canyon, and dreams of building a LEGO replica of Kyoto’s golden temple
    after a future school field trip abroad.
  culinary: Jose Espinel, a junior kitchen helper, loves assembling soft taco shells, mixing diced tomatoes, cilantro, and lime for fresh salsa, and proudly boasts the ability to grate cheese without dropping
    a shred, though they sometimes forget to wash their hands before reaching for the next LEGO piece.
  core: Jose Espinel blends an obsessive love for structured LEGO builds with a laid‑back approach to chores, turning spare moments into miniature worlds of bricks, stickers, and spontaneous soccer kicks,
    all while humming norteña tunes and occasionally misplacing their savings stickers.
background:
  cultural: Jose is raised in a bilingual Mexican‑American household in McAllen, Texas, where Spanish is spoken at home and English at school. Family life centers around traditional Mexican foods, celebrations
    such as Día de los Muertos and Mexican Independence Day, and frequent visits to local markets. He attends a public elementary school that incorporates multicultural curricula and participates in community
    events like neighborhood soccer leagues and cultural festivals that reflect the strong Hispanic influence of the Rio Grande Valley. This bicultural environment shapes his language skills, food preferences,
    music taste, and sense of identity.
