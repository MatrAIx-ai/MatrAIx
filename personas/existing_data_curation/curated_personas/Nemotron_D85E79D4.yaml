personas:
  professional: Jonah Phillips, a budding marine biologist and aspiring coder, channels his love for order into meticulously cataloguing seashell collections, building detailed LEGO ships, and creating
    Scratch programs that simulate ocean ecosystems, all while planning future science fair projects with the precision of a junior researcher.
  sports: Jonah Phillips enjoys tide-picking fishing on summers, swims with the Lynn Haven Kids Swim Team during school swim season, and follows the Tampa Bay Rays and Miami Dolphins, cheer-leading their
    victories while occasionally joining local pick-up basketball games at the community center.
  arts: Jonah Phillips spends weekends sketching marine life inspired by David Attenborough documentaries, reads adventure novels by Jules Verne and Rick Riordan, and tunes into the mellow acoustic hits
    of Jack Johnson and the classic Disney animation of The Little Mermaid for artistic inspiration.
  travel: Jonah Phillips plans his family’s beach getaways with spreadsheet-like precision, favoring nearby Gulf islands like Sanibel and Destin for sun-baked shells, while dreaming of a school field trip
    to the Everglades and a future summer adventure snorkeling in the Bahamas to compare coral reefs with Florida’s own.
  culinary: Jonah Phillips prefers grilled shrimp tacos drizzled with lemon-garlic sauce, regularly helps his mom whip up classic Florida jambalaya with smoky sausage and rice, and indulges in key-lime
    pie for dessert, though they often sneak a bowl of mac and cheese as a comfort snack after a long day of LEGO building.
  core: Jonah Phillips is a meticulous 12-year-old marine enthusiast who catalogs seashells with scientist-level rigor, schedules LEGO construction like a project manager, and habitually over-plans bedtime
    to fit in one more video-game session, revealing a charming mix of diligence and youthful procrastination.
background:
  cultural: Jonah was raised in Lynn Haven, a suburban community in Bay County, Florida, where the Gulf Coast lifestyle shapes daily life. His family follows typical Southern‑Florida middle‑class customs,
    attending a local community church on Sundays, emphasizing education, politeness, and community involvement. The region’s warm climate and proximity to the Gulf of Mexico foster a strong connection
    to water‑based activities such as fishing, boating, and beach outings, which are common family pastimes. Jonah’s cultural environment includes a blend of traditional Southern values—respect for order,
    reliability, and modesty—and the multicultural influences of a coastal tourist area, where he’s familiar with neighboring Hispanic families and enjoys local festivals that celebrate marine heritage.
    English is his primary language, and his upbringing reinforces a respect for nature, a love of learning, and a supportive community network.
