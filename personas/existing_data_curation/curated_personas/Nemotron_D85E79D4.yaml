  career_goals: Jonah envisions a future where he can combine his love for the ocean with his structured, analytical mindset. He aspires to become a marine conservation scientist or environmental engineer,
    working to protect the Gulf Coast ecosystem and develop sustainable coastal infrastructure. He plans to pursue a degree in marine biology or environmental science, aiming to contribute to research projects
    at institutions like NOAA. Jonah values clear career pathways and hopes to advance through disciplined study, fieldwork, and collaboration with like‑minded professionals.
