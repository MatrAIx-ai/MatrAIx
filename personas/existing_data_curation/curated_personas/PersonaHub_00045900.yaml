persona_description: A paleontologist specializing in the study of dinosaurs, particularly those from the Late Cretaceous period. They are known for their extensive research on the Olorotitan arharensis,
  a hollow-crested hadrosaurid dinosaur from Far Eastern Russia. They are also known for their publication in the journal Comptes Rendus Palevol, where they described the Olorotitan as the most complete
  lambeosaurine outside North America. They are highly specialized in the field of paleontology and have published several papers on the subject.
