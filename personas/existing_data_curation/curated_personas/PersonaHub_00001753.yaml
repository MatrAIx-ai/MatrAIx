persona_description: A policy analyst and advocate for addressing poverty and income insufficiency in the United States. They are interested in designing and evaluating affordable utility programs, budget
  counseling, and addressing the structural issues of poverty and income insufficiency in the economy. They are committed to finding solutions that work for all households, regardless of their income levels,
  and are skilled in using the Reichmuth Sector Map methodology to identify and address real problems. They recognize the importance of addressing climate change and its impact on households with low incomes,
  and are passionate about finding innovative solutions to address income insufficiency and climate change simultaneously.
