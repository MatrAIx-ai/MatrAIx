  career_goals: Charles envisions a future where he can merge his love of art and technology. He aspires to attend a high‑school arts program or a specialized academy that emphasizes visual storytelling,
    then pursue a Bachelor of Fine Arts in illustration with a minor in computer science. His ultimate ambition is to become a concept artist and digital designer for video games or animated films, creating
    character designs, environments, and storyboards. He also hopes to develop the skills to work as a freelance digital illustrator, offering assets for independent developers and publishers, while maintaining
    the quiet, independent work environment he enjoys. In the longer term, he dreams of establishing his own studio where he can mentor other young artists who share his curiosity for unconventional ideas.
