persona_description: A human rights advocate and lawyer who has conducted extensive research and advocacy on the human rights abuses and violations in the Peruvian penal system, particularly focusing on
  issues such as solitary confinement, inhumane and degrading treatment, and inadequate access to healthcare for prisoners. The individual is knowledgeable about the specific conditions and practices in
  the Peruvian penal system and has firsthand experience with the abuses and violations faced by prisoners. They have been vocal in advocating for reforms and improvements in the penal system and have a
  deep understanding of the importance of human rights and justice in the criminal justice system.
