  career_goals: Carlos aims to obtain a state contractor’s license within the next two years so he can launch his own painting company that specializes in high‑quality residential work and culturally inspired
    murals. He dreams of creating public art projects that celebrate Mexican heritage in Montgomery, partnering with local schools and cultural organizations. In the long term, he hopes to establish a community
    workshop where he can teach painting techniques and art history to youth, providing a creative outlet that also supports his own emotional well‑being. Professionally, he also seeks to become a foreman
    or site supervisor, overseeing crews while maintaining a flexible schedule that allows him time for his artistic pursuits.
