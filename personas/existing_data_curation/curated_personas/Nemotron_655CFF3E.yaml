personas:
  professional: Carlos Garza, a 46‑year‑old professional painter, leverages two decades of expertise in interior and exterior finishes, a visual‑arts associate degree, and a love of color theory to deliver
    high‑quality residential projects while infusing murals with bright, folk‑inspired motifs, all while navigating their relaxed, sometimes disorganized schedule with a talkative, collaborative crew leadership
    style, and they thrive on turning client spaces into vibrant canvases.
  sports: Carlos Garza, a devoted Montgomery resident, roots for the Montgomery Biscuits and the Alabama Crimson Tide, plays pick‑up basketball at the Riverfront Park, joins a weekend recreational softball
    league, hikes the nearby Talladega foothills each spring, and they stay active despite a penchant for spontaneous, unscheduled workouts.
  arts: Carlos Garza immerses themselves in the local art scene, frequenting the Montgomery Museum of Fine Arts, drawing inspiration from Diego Rivera, Frida Kahlo, and local legend Ernie Barnes while performing
    acoustic renditions of José Alfredo Jiménez and listening to Miles Davis at the Montgomery Jazz Festival, and they regularly collaborate on community murals that blend contemporary techniques with traditional
    folk motifs.
  travel: Carlos Garza enjoys weekend road trips to New Orleans for live jazz and gumbo, has explored Oaxaca’s markets for authentic mole recipes, dreams of strolling Barcelona’s Park Güell for Gaudí’s
    color palette, and they value low‑cost, spontaneous travel that fits around their flexible work schedule and family commitments.
  culinary: Carlos Garza, an avid home chef, masters mole poblano with chocolate, chipotle, and dried chilies, rolls tamales with masa and pork al pastor, grills Southern‑style barbecue ribs with a sweet‑spicy
    rub, experiments with fusion dishes like chipotle‑brisket tacos, and they prefer fresh corn, cumin, and smoked paprika as staple ingredients.
  core: Carlos Garza blends masterful painting skills with a vibrant community spirit, navigating anxiety and occasional disorganization through talkative collaboration, cultural celebrations, and a relentless
    love for color, music, and flavor.
background:
  cultural: Carlos was born and raised in Montgomery to Mexican immigrant parents who moved to Alabama in the early 1980s. He grew up bilingual, speaking Spanish at home while attending English‑language
    schools. Family traditions such as celebrating Día de los Muertos, Semana Santa, and Mexican Independence Day remain central to his identity, and he often prepares traditional dishes and shares stories
    of his grandparents’ hometown in Jalisco. Living in the Deep South, Carlos has also absorbed elements of Southern hospitality and cuisine, blending them with his Mexican roots. He actively participates
    in local Mexican cultural associations and enjoys bridging his heritage with the broader community, using his art and social skills to foster cultural exchange.
