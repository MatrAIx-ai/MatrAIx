personas:
  professional: Tari Yeh is a meticulous casino surveillance officer who leverages razor‑sharp CCTV analysis, risk assessment expertise, and first‑aid certification; they channel a calm, structure‑loving
    demeanor to de‑escalate tense situations and mentor teammates toward procedural precision.
  sports: Tari Yeh embraces the rugged Alaskan outdoors by snowshoeing on frozen trails in January, hiking the Chugach State Park with the Anchorage Outdoor Explorers club, and cheering for the Seattle
    Kraken in the NHL and the Seattle Seahawks in the NFL, all while they fit in occasional yoga sessions to stay limber.
  arts: Tari Yeh channels creative energy through intricate winter knitting inspired by traditional Nordic patterns, curates a wildlife photography series reminiscent of Ansel Adams' stark black‑and‑white
    landscapes, and unwinds with the indie folk sounds of The Staves and the atmospheric scores of Ryuichi Sakamoto, while they regularly attend the Anchorage Museum’s Native art exhibits for fresh inspiration.
  travel: Tari Yeh plans trips with the precision of a surveillance log, favoring well‑researched itineraries that balance Alaskan wilderness excursions to Denali and Haines with international wanderings
    to the fjords of Norway and the historic streets of Edinburgh, yet they keep travel budgets tight and often opt for off‑season flights to stretch savings.
  culinary: Tari Yeh cooks with modest confidence, favoring hearty Alaskan king crab legs, smoked salmon on dill‑infused rye bread, and winter comfort soups like reindeer stew, while occasionally experimenting
    with a Swedish‑style smörrebröd topped with pickled herring and beetroot, and they never skip a slice of blueberry pie after a long hike.
  core: Tari Yeh is a detail‑obsessed guardian of safety who packs a spare knitting needle alongside poker chips, perseveres through anxiety with yoga, but habitually checks surveillance footage on their
    phone even at home, convinced no unexpected motion can escape their watchful eye.
background:
  cultural: Tari is a white Alaskan with Scandinavian roots—her grandparents emigrated from Sweden to the Upper Midwest before the family relocated to Anchorage for work opportunities. Raised in Minnesota,
    she grew up with a blend of Midwestern practicality and a strong appreciation for community cooperation. Moving to Alaska at age 22, she has embraced the state's rugged lifestyle while respecting the
    traditions of the Indigenous peoples who have lived there for generations. She participates in local festivals, enjoys learning about native art, and values the cultural diversity of Anchorage's multi‑ethnic
    community.
attributes:
  skills: '[''Surveillance monitoring'', ''Risk assessment'', ''Incident response'', ''Report writing'', ''Conflict de‑escalation'', ''Knowledge of Alaskan gambling regulations'', ''Physical fitness'',
    ''First aid/CPR'', ''CCTV system operation'', ''Basic IT troubleshooting'', ''Team coordination'', ''Attention to detail'']'
  hobbies: '[''Hiking in Chugach State Park'', ''Snowshoeing'', ''Yoga and meditation'', ''Knitting'', ''Wildlife photography'', ''Reading mystery and thriller novels'', ''Playing online poker'', ''Cooking
    hearty Alaskan dishes'', ''Volunteering at the local senior center'']'
  career_goals: Tari aims to advance from front‑line surveillance to a supervisory role within the next three years, seeking a shift lead position that offers a more predictable schedule and greater influence
    over team training. She plans to complete her undergraduate degree in criminal justice, which she started before entering the workforce, and earn the Certified Protection Officer (CPO) credential to
    bolster her qualifications. Long‑term, she envisions transitioning into corporate security management for a larger hospitality group in Anchorage, where she can apply her expertise to broader risk‑management
    initiatives while mentoring new security personnel. Reducing workplace stress and achieving a healthier work‑life balance are also central to her professional aspirations.
