    content creation", "Team leadership", "Conflict resolution"]'
  hobbies: '["Solo hiking in the Sonoran Desert", "Nature photography", "Stargazing/astronomy", "Reading historical nonfiction and philosophy", "Collecting vintage film equipment", "Woodworking", "Acoustic
    guitar playing", "Cooking Southwestern cuisine", "Attending quiet film screenings and museum exhibits", "Exploring emerging media technologies"]'
  career_goals: His primary ambition is to launch a boutique production company that creates narrative documentaries and socially conscious dramas centered on the American Southwest's environmental and
    cultural stories. Over the next five years he aims to produce at least three feature‑length documentaries, secure distribution deals with major streaming platforms, and earn recognition at festivals
    such as Sundance or SXSW. He also seeks to integrate immersive media (VR/AR) into at least one project, develop sustainable production practices that minimize waste, and mentor emerging filmmakers through
    workshops and apprenticeship programs. Long‑term he envisions becoming a thought leader in responsible storytelling, balancing artistic curiosity with practical budget management.
