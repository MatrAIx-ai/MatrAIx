personas:
  professional: James Cappetta leverages a 45‑year retail and hospitality career into advisory roles for start‑ups and non‑profit arts groups, blending data‑driven strategic planning, meticulous project
    management, and a flair for visual storytelling while channeling a competitive edge into bold fundraising concepts for the San Diego Museum of Art.
  sports: James Cappetta is an active member of the San Diego Yacht Club, sails the Bay weekly, follows the San Diego Padres and San Diego Wave FC passionately, competes in senior center chess tournaments,
    and attends a low‑impact tai chi class to complement his love of strategic, gentle movement.
  arts: James Cappetta curates a personal collection of vintage photography while volunteering as a docent at the Museum of Contemporary Art, frequents gallery openings featuring works by Kehinde Wiley
    and Ai Weiwei, practices watercolor landscapes inspired by the Mediterranean coast, and draws design inspiration from Piet Mondrian’s minimalist aesthetics for limited‑edition prints.
  travel: James Cappetta plans immersive trips to art capitals—spending weeks wandering Florence’s Uffizi, exploring Kyoto’s tea‑house architecture, and strolling Marrakech’s souks—while balancing a fixed
    pension budget by booking off‑season stays and prioritizing museum passes over luxury hotels.
  culinary: James Cappetta loves cooking Mediterranean dishes such as grilled branzino with lemon, ratatouille, and pistachio baklava, skillfully prepping fresh herbs and extra‑virgin olive oil while pairing
    meals with boutique California Pinot Noir, yet occasionally over‑salts recipes in his enthusiasm for bold flavors.
  core: James Cappetta merges a lifelong competitive spirit with artistic curiosity, turning boardroom strategies into museum fundraising triumphs while sailing, sketching, and savoring Mediterranean cuisine,
    all tempered by meticulous spreadsheets and occasional forgetfulness about medication.
background:
  cultural: James H. Cappetta is a second-generation Italian-American whose grandparents emigrated from Calabria to California in the 1920s. Raised in a bilingual household in Southern California, he grew
    up celebrating traditional Italian holidays such as Ferragosto and the feast of Saint Anthony, while also embracing the laid-back, coastal culture of San Diego. His upbringing blended Catholic values,
    a strong emphasis on family cohesion, and a community-oriented mindset common among Italian diaspora families. Over the decades he has absorbed the multicultural mosaic of San Diego—including its Hispanic
    influences, naval heritage and vibrant arts scene—shaping a cultural identity that balances European roots with West-Coast openness and a lifelong curiosity for global cultures.
