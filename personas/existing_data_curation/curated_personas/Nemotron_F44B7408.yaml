personas:
  professional: Mary Aikens, a veteran stenographer and real‑time captioner at the Wayne County Circuit Court, leverages their 225‑wpm speed, meticulous proofreading, and disciplined workflow to deliver
    flawless transcripts while mentoring new reporters, integrating AI tools, and championing courtroom accessibility; they view each transcription as a chance to merge precision with compassionate communication.
  sports: Mary Aikens, a member of the Wyandotte Senior Walking Club, keeps fit with daily RiverWalk strolls, avidly follows the Detroit Tigers in baseball season, the Detroit Lions in football, and the
    Detroit Red Wings in hockey, and they join a casual senior softball league each summer for social exercise.
  arts: Mary Aikens, a volunteer captioner for community theater, balances her love of contemporary fiction by Celeste Ng and historical nonfiction by Doris Kearns Goodwin with evenings listening to Adele
    and classical pieces by Debussy, and they regularly attend productions of plays like 'Our Town' featuring local talent, which fuels their commitment to making the arts accessible.
  travel: Mary Aikens, a deliberate planner, enjoys weekend escapes to Mackinac Island's Victorian charm and the historic streets of Ann Arbor, has toured Washington, D.C., and dreams of exploring Kyoto's
    temples and Tuscany's vineyards, and they budget trips carefully to accommodate their modest retirement savings.
  culinary: Mary Aikens, an enthusiastic home cook, experiments with precise recipes such as rosemary‑infused roasted potatoes, rustic ratatouille with fresh zucchini and eggplant, and buttery sourdough
    bread made with rye flour, while also mastering apple crumble with a pinch of cinnamon, and they relish sharing their creations with neighbors through charity bake‑sales.
  core: Mary Aikens blends razor‑sharp precision and compassionate service, channeling their organized, curiosity‑driven mind and anxiety‑prone heart into a disciplined career, mindful self‑care, and a
    life of purposeful hobbies; they constantly juggle high standards with a lingering worry that fuels both diligence and occasional over‑thinking.
background:
  cultural: Mary grew up in a middle‑class, white family in the Detroit metropolitan area, steeped in Midwestern values of hard work, community involvement, and modesty. Her heritage includes German and
    Irish ancestry, reflected in family traditions such as holiday gatherings and seasonal cooking. Raised in a predominantly Protestant environment, she attended community churches that emphasized service
    and fellowship. The close‑knit neighborhoods of Wyandotte fostered a strong sense of civic duty, prompting Mary to volunteer in local events and support accessibility initiatives. While she respects
    the region’s cultural traditions, she also embraces contemporary technology and inclusive practices, blending an old‑world work ethic with modern innovation.
attributes:
  skills: '[''Stenography (225 wpm)'', ''Real-time captioning'', ''Legal terminology expertise'', ''Courtroom procedures knowledge'', ''Fast typing'', ''Proofreading and editing'', ''Assistive technology
    operation (ADA compliance)'', ''Time management and case coordination'', ''Training and mentorship'', ''AI transcription tool integration'']'
  hobbies: '[''Book club participation'', ''Vegetable gardening'', ''Puzzle solving (crosswords, Sudoku, jigsaw)'', ''Volunteer captioning for community theater'', ''Cooking and baking'', ''RiverWalk walking'',
    ''Local history lectures'', ''Knitting for charity'', ''Learning new transcription technologies'', ''Yoga for stress relief'']'
  career_goals: Mary aims to advance to a senior supervisory role within the Wayne County Circuit Court, where she can oversee a team of captioners and standardize best practices for courtroom accessibility.
    She plans to earn the National Court Reporters Association (NCRA) Certified Real‑Time Reporter designation and to lead a statewide initiative integrating AI‑assisted transcription while preserving accuracy
    and confidentiality. Over the next five years, Mary intends to develop a comprehensive training program for new reporters that emphasizes mental‑health awareness and stress‑management techniques, reflecting
    her personal experiences with anxiety. Ultimately, she envisions transitioning to a part‑time consultancy, advising courts and media organizations on inclusive communication strategies while maintaining
    a balanced lifestyle.
