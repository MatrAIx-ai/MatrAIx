  hobbies: '["Vegetable gardening", "Cycling", "Cooking simple meals", "Reading DIY and self‑improvement books", "Cooperative video gaming", "Sketching", "Playing acoustic guitar", "Volunteering at animal
    shelter"]'
  career_goals: Jake aims to pursue a stable, routine‑oriented career that leverages his practical strengths and desire for predictability. He plans to enroll in a community college program in agricultural
    technology or a trade certification such as HVAC or automotive maintenance, with the goal of obtaining a reliable, well‑structured job in the Yolo County area. Long‑term, he hopes to secure a position
    that offers a steady schedule, opportunities for incremental skill development, and a supportive work environment where he can contribute to his community while maintaining a healthy work‑life balance.
