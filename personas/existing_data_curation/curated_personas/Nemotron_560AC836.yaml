personas:
  professional: Jake Wheeler, an 18‑year‑old senior class representative with a talent for organization, channels their methodical mindset into pursuing agricultural technology at community college, leveraging
    proficiency in Microsoft Office, basic data entry, bike repair, and light carpentry, while their collaborative conflict‑resolution skills shine in group projects and volunteer work.
  sports: Jake Wheeler, an 18‑year‑old avid cyclist on the Davis Greenbelt who rides weekly with the Davis Bike Collective, follows the Sacramento Kings for basketball, cheers on the Sacramento Republic
    FC in soccer, and maintains a modest fitness routine of weekend jogs and intramural soccer matches with classmates.
  arts: Jake Wheeler, an 18‑year‑old who unwinds by strumming acoustic guitar to the tunes of John Denver and Mumford & Sons, sketches in a weathered notebook, enjoys cooperative storytelling video games
    like *It Takes Two*, and appreciates indie films by Greta Gerwig and local productions at the Davis Community Theatre.
  travel: Jake Wheeler, an 18‑year‑old who prefers low‑stress road trips, plans weekend getaways to nearby Napa Valley wineries and Lake Tahoe’s hiking trails, and dreams of a future camping adventure in
    Yosemite National Park while balancing a modest travel budget with family responsibilities.
  culinary: Jake Wheeler, an 18‑year‑old home‑cook who harvests tomatoes, carrots, and kale from a small garden, frequently prepares hearty meals such as vegetable lentil soup, garlic‑roasted chicken with
    rosemary potatoes, and fresh‑basil spaghetti, and enjoys the ritual of chopping, simmering, and sharing food with family.
  core: Jake Wheeler, an 18‑year‑old who thrives on predictable routines, balances meticulous organization with low‑key gardening and cycling, yet they often over‑worry about minor setbacks and have a habit
    of staying up late binge‑playing cooperative video games.
background:
  cultural: Jake was raised in Davis, a college town in Yolo County, within a middle‑class, white American family whose roots trace back to the Midwest. His upbringing blends the progressive, environmentally
    conscious culture of the Bay Area with his family's traditional values that emphasize practicality, responsibility, and community service. He grew up celebrating common American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, and frequently participated in local farmers' markets and community‑garden projects, reflecting the region’s strong agricultural heritage.
attributes:
  skills: '["Organizational and time‑management", "Microsoft Office and Google Workspace proficiency", "Data entry and record‑keeping", "Basic bike repair and light carpentry", "Cooking and meal preparation",
