  career_goals: Haylea aims to advance to an HR Director role within the next five years, where she can shape strategic workforce planning and champion flexible work arrangements that reflect her belief
    in balance between innovation and practicality. She aspires to lead region‑wide diversity, equity, and inclusion initiatives, mentor emerging HR professionals, and eventually launch a boutique consultancy
    that helps small New England businesses build resilient, people‑centric cultures.
