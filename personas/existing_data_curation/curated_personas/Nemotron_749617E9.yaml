  hobbies: '[''sketching'', ''digital illustration'', ''creative writing/poetry'', ''reading speculative fiction'', ''listening to diverse music'', ''mindfulness journaling'', ''community garden gardening'',
    ''cooking traditional Dominican meals'', ''small-group board games'', ''museum visits'']'
  career_goals: Gregoria aims to attend a high-school program that emphasizes visual arts and hopes to earn a scholarship for a BFA in illustration or graphic design. She dreams of creating artwork that
    reflects her Dominican heritage and speaks to social issues like mental health, eventually working as a freelance illustrator or a creative arts therapist. In the longer term she hopes to curate exhibitions
    that showcase Caribbean diasporic artists and to mentor younger students in her community.
