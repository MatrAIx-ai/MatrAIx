personas:
  professional: Gregoria Riveragonzalez, a high‑school sophomore with a budding artistic portfolio, blends hand‑drawn sketches and tablet‑based digital illustrations to visualize speculative narratives,
    channeling their vivid imagination into occasional freelance commissions for indie zines while juggling school responsibilities with meticulous time‑blocking.
  sports: Gregoria Riveragonzalez enjoys casual pick‑up soccer in the community garden, roots for the Boston Celtics in basketball and the Boston Bruins in hockey, and attends weekly yoga sessions at the
    local YMCA to satisfy their need for gentle movement rather than competitive athletics.
  arts: Gregoria Riveragonzalez immerses themselves in creative expression by sketching in notebooks, crafting digital art on a tablet, writing poetry inspired by magical realism authors like Isabel Allende,
    and curating eclectic playlists that swing from the rhythmic pulse of bachata and merengue to indie rock favorites like Arcade Fire and ambient pioneer Brian Eno, shaping a personal aesthetic that blurs
    reality and imagination.
  travel: Gregoria Riveragonzalez prefers thoughtfully planned weekend getaways with a small circle of friends, often exploring nearby historic towns like Salem, strolling through Boston’s Museum of Fine
    Arts with a sketchbook in hand, and dreaming of future trips to the vibrant streets of Barcelona and the serene landscapes of Kyoto, while balancing a modest budget and school commitments.
  culinary: Gregoria Riveragonzalez, an intermediate home‑cook, delights in helping their family prepare cherished traditional recipes such as plantain fritters and spiced chicken stew, while also experimenting
    with trendy dishes like avocado toast topped with smoked salmon and homemade matcha latte, favoring fresh herbs like cilantro and basil in their kitchen experiments.
  core: Gregoria Riveragonzalez is a hyper‑imaginative 15‑year‑old who oscillates between bursts of artistic creation and lingering worries, often scribbling verses in the margins of notebooks while procrastinating
    on homework to finish a sketch, and habitually checks their phone for the latest indie album releases before bedtime.
background:
  cultural: Gregoria grew up in a Dominican-American household in Dorchester, where Spanish and English flow interchangeably at home. Family traditions such as celebrating Dominican Independence Day, cooking
    dishes like mangú and sancocho, and dancing to bachata have shaped her identity. She maintains strong ties to the local Dominican community through church gatherings, cultural festivals, and a bilingual
    after-school program. Visits to relatives in the Dominican Republic have deepened her appreciation for Caribbean folklore, music, and visual art, which she often weaves into her own creative projects.
    Her cultural background gives her a rich perspective on migration, resilience, and the blending of cultures.
