  career_goals: Patrick aspires to attend college and study urban planning or public administration, aiming to become a community development professional who can design organized, safe neighborhoods in
    Chicago. He also hopes to combine his love for technology with his organizational strengths by creating educational apps that help middle-school students manage their assignments. In the shorter term,
    he plans to gain leadership experience through his school's student council and local youth programs, eventually pursuing internships with city planning offices or nonprofit community organizations.
