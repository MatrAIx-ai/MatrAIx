personas:
  professional: Patrick Williams is a 14‑year‑old aspiring robotics engineer who channels his methodical mindset into programming Scratch games and building functional LEGO robots, while also serving as
    a reliable point‑person on his school’s basketball team.
  sports: Patrick Williams plays point guard for his middle school basketball team, trains with the Lakeview Community Basketball Club, idolizes Chicago Bulls star Zach LaVine, follows the Chicago White
    Sox for off‑season cardio drills, and follows a disciplined weekly schedule of strength training and conditioning to balance his robotics and academic commitments.
  arts: Patrick Williams immerses himself in Chicago‑born hip‑hop legends like Chance the Rapper and Common, enjoys classic Miles Davis jazz, collects graphic novels such as "Maus" and "Watchmen," and hones
    his street photography inspired by Vivian Maier, finding creative release in capturing urban textures with his smartphone.
  travel: Patrick Williams prefers meticulously planned weekend road trips to nearby Chicago landmarks like the Art Institute and the Museum of Science and Industry, dreams of a summer excursion to New
    York City’s Broadway district, and hopes to backpack through the historic streets of Kyoto, Japan, once he saves enough.
  culinary: Patrick Williams favors Chicago deep‑dish pizza topped with extra mozzarella and pepperoni, enjoys crafting easy ramen bowls with miso paste and soft‑boiled eggs, and often snacks on homemade
    trail‑mix featuring almonds, dried cranberries, and pretzel sticks while assembling LEGO creations.
  core: Patrick Williams blends disciplined organization with high‑energy social play, turning every basketball drill, robotics build, and LEGO set into a structured yet lively quest, while occasionally
    forgetting to charge his camera battery for that perfect street‑shot moment.
background:
  cultural: Patrick is an African-American teenager raised in Chicago’s South Side, a community shaped by the Great Migration and rich in Black cultural traditions. His family traces its roots to the Mississippi
    Delta, and his grandparents moved north in the 1960s seeking better opportunities. Growing up, he regularly attended a local Baptist church, where gospel music and community service were emphasized.
    He celebrates cultural events such as Kwanzaa, Black History Month activities at school, and the Chicago Blues Festival. The neighborhood’s love for soul food, basketball, and jazz, as well as the close‑knit
    relationships among neighbors, have instilled in him a strong sense of identity and a commitment to give back to his community.
