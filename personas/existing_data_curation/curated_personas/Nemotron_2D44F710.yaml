  career_goals: Gary aims to become a senior product strategist leading the development of AI‑driven creative tools that empower artists and designers. Over the next five years he plans to earn PMP and
    AWS Solutions Architect certifications, lead a small agile team at a forward‑thinking tech firm, and publish thought‑leadership pieces on the intersection of data analytics and digital art. Ultimately,
    he aspires to a director‑level role where he can shape innovation strategy and mentor emerging talent.
