  career_goals: Even at age three, Ana often talks about future roles where she can care for and teach others. She dreams of becoming a preschool teacher or a community helper, imagining herself leading
    storytime circles and organizing friendly games. Her ambition to help people and maintain harmony guides her early aspirations.
