personas:
  professional: Ana Jarquin is a tiny classroom organizer who lines up crayons by hue and length, leads story‑time circles with boundless chatter, and spreads smiles to peers, embodying a love for predictable
    order while thriving on the flexibility of play.
  sports: Ana Jarquin loves sprinting across the desert playground, kicking a soft soccer ball with the preschool team called the Desert Cubs in the spring, and splashing in the community pool during summer
    swim days, demonstrating a sociable, energetic approach to fitness.
  arts: Ana Jarquin delights in singing both Spanish lullabies and English nursery rhymes, mimics maracas during family gatherings, draws vibrant calaveras on paper, and enjoys cartoons starring Lin‑Manuel
    Miranda, letting music and color shape their playful identity.
  travel: Ana Jarquin enjoys weekend trips to the nearby Organ Mountains, family visits to grandparents’ adobe house in a neighboring town, and dreams of a future vacation to the historic city of Oaxaca,
    balancing curiosity with the comfort of familiar desert routes.
  culinary: Ana Jarquin loves helping stir a mild salsa with diced tomatoes, prefers soft corn tortillas filled with shredded chicken, and frequently asks for extra guacamole on their cheese quesadilla,
    showing a budding palate for flavorful, home‑cooked dishes.
  core: Ana Jarquin is a bubbly, structure‑loving three‑year‑old who revels in music, community, and the desert’s gentle rhythm, turning each day into a harmonious blend of play and caring.
background:
  cultural: Ana is a Mexican‑American child raised in Deming, New Mexico, a border‑region community where Spanish and English intertwine daily. She grows up bilingual, hearing traditional Mexican lullabies
    and modern English children’s songs. Family celebrations include Día de los Muertos altars, festive meals of tacos and tamales, and communal gatherings that emphasize sharing and togetherness. The blend
    of Southwestern desert life and vibrant Mexican cultural practices shapes her identity, fostering a love for music, storytelling, and communal harmony.
