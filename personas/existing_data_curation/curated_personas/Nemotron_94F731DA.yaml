personas:
  professional: Stephen Moody is a seasoned customer service veteran who leverages three decades of active listening, empathy, and conflict de‑escalation expertise, combined with razor‑sharp CRM fluency
    in Salesforce and Zendesk, to meticulously improve team metrics, and they are now channeling that methodical drive toward a senior trainer role and Certified Customer Service Professional credential.
  sports: Stephen Moody regularly hikes the rugged woods and rocky coastline of Maine with the local outdoor club, occasionally joins a seasonal half‑marathon in Portland, follows the Boston Red Sox and
    the Portland Sea Dogs with avid loyalty, and plays chess at the neighborhood café as a mental sport, embodying a balanced love of physical endurance and strategic competition.
  arts: Stephen Moody channels his imaginative spirit into bold abstract paintings, meticulous landscape photography of Acadia’s cliffs, and lyrical short stories and poems that echo the philosophical musings
    of folk legends like Bob Dylan and Joni Mitchell as well as classic rock icons such as The Rolling Stones and Led Zeppelin, while volunteering in community theater productions that let them blend performance
    with visual storytelling.
  travel: Stephen Moody prefers low‑key road trips along the New England coast, having explored Acadia National Park, the charming streets of Portland, and the historic lighthouses of Cape Cod, and they
    dream of wandering the misty Scottish Highlands and strolling through the Amalfi Coast villages, favoring off‑season travel that offers quiet inspiration over crowded tourist hubs.
  culinary: Stephen Moody enjoys hearty New England fare—savoring buttery lobster rolls, creamy clam chowder, and fresh blueberry crumble—while their modest cooking skill shines in grilling simple cedar‑plank
    salmon with dill and thyme, and they relish pairing meals with local craft beer, though they sometimes forgo meal planning in favor of impulsive late‑night snack experiments.
  core: Stephen Moody blends methodical professionalism with a relentless creative curiosity, balancing disciplined retirement planning with occasional splurges on bold canvases, all while hiking Maine’s
    cliffs, questioning motives, and humming folk‑rock melodies during every brushstroke.
background:
  cultural: Stephen is a white American of Anglo‑New England heritage who grew up in the rural town of Norway, Maine. His upbringing reflects the region’s traditional values of self‑reliance, modesty, and
    a deep respect for nature and seasonal cycles. Raised in a working‑class family that emphasized hard work, community involvement, and practical problem‑solving, he internalized a disciplined and organized
    character. While his formal education ended before ninth grade, the cultural emphasis on perseverance and modest ambition shaped his methodical approach to work and his competitive drive for excellence.
    He also embraces local folk art, maritime history, and storytelling, aligning his imaginative interests with the cultural fabric of his community.
