personas:
  professional: Mechell Mays, a seasoned front‑of‑house hospitality professional with decades of high‑volume table service, blends methodical organization, compassionate guest interaction, and up‑to‑date
    knowledge of regional cuisine to consistently deliver smooth operations and mentor junior staff, and they are known for anticipating needs before guests voice them.
  sports: Mechell Mays, an enthusiastic supporter of the Charleston Battery soccer team and the Charleston RiverDogs baseball club, participates in a senior pickleball league at the Charleston Community
    Center, walks their dog along country trails for low‑impact cardio, and they join a seasonal Lowcountry fishing club each spring.
  arts: Mechell Mays regularly attends gospel concerts featuring the choir Harmony In Grace, revels in the blues sounds of Buddy Guy at the Charleston Blues Festival, enjoys the soulful recordings of B.B.
    King, and supports theater productions by the Charleston Stage, and they often draw inspiration from these artistic experiences for community kitchen events.
  travel: Mechell Mays prefers well‑planned road trips that combine historical sightseeing and culinary discovery, having driven the coastal route to Savannah’s historic squares, explored New Orleans’ French
    Quarter, and toured Asheville’s craft breweries, while they dream of walking the Natchez Trace Parkway to experience the same scenery that shaped their hometown’s heritage.
  culinary: Mechell Mays, a confident home cook, specializes in Southern comfort dishes such as shrimp and grits, fried chicken, collard greens, and peach cobbler, frequently experiments with smoked paprika‑infused
    sweet potatoes and buttermilk‑marinated catfish, and they love sharing these meals at community potlucks, church gatherings, and casual backyard barbecues.
  core: Mechell Mays embodies pragmatic curiosity, balancing meticulous organization with warm, community‑focused generosity, while they occasionally indulge in spontaneous kitchen gadget splurges and neglect
    dental check‑ups.
background:
  cultural: Mechell is a Black American rooted in the cultural tapestry of the Southern United States. Growing up in Tennessee during the civil‑rights era, he was shaped by a close‑knit church community,
    family gatherings centered on soul food, and the rhythms of gospel and blues music. His heritage informs his values of compassion, cooperation, and resilience, and he maintains strong ties to local
    traditions such as barbecue cook‑outs, church picnics, and community festivals that celebrate African‑American history. These cultural experiences enrich his hospitality approach, infusing his service
    with warmth, respect, and an authentic Southern hospitality.
