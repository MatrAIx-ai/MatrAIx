personas:
  professional: A curious LEGO architect and budding Scratch game creator, Ricardo Gutierrez merges step‑by‑step building plans with spontaneous coding tweaks, and they demonstrate both practical organization
    and flexible creativity while staying competitively driven to finish projects ahead of peers.
  sports: An energetic pick‑up soccer enthusiast, Ricardo Gutierrez loves sprinting across the neighborhood field with friends, idolizing the local junior club ‘Kids United’, keeping a modest tally of goals
    to fuel their competitive streak while they still respect the game’s rules.
  arts: A budding guitarist and sci‑fi aficionado, Ricardo Gutierrez strums basic chords to cumbia and vallenato rhythms while devouring adventure novels like ‘Percy Jackson’, blending cultural beats with
    imaginative storytelling and they often experiment with creating simple music loops in Scratch.
  travel: An adventurous weekend explorer, Ricardo Gutierrez spends family trips hiking in the nearby national park, dreams of backpacking to the Amazon rainforest and plans to save allowance for a future
    visit to the famous ruins of Machu Picchu.
  culinary: A budding home‑cook with a sweet‑tooth, Ricardo Gutierrez enjoys helping prepare arepas with cheese and cilantro, loves the crunch of empanadas, and they experiment by adding chocolate chips
    to homemade brownies whenever they’ve saved enough from allowance.
  core: Ricardo Gutierrez is a competitive yet practical 11‑year‑old who balances LEGO building, soccer, and Scratch coding, all while keeping a skeptical eye on peer influence and staying emotionally steady.
background:
  cultural: Ricardo comes from a Colombian‑American family that maintains strong ties to Colombian culture while integrating into the diverse community of Hicksville, New York. He grew up speaking both
    Spanish and English, celebrates holidays like Día de los Patriotas and Carnaval de Barranquilla, enjoys traditional foods such as arepas, empanadas, and sancocho, and participates in local Colombian
    community events and dance workshops. His bilingual upbringing shapes his worldview, fostering both curiosity about new ideas and respect for established Colombian traditions.
