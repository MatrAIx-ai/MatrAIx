persona_description: A property designing engineer who specializes in offshore structural designing, responsible for every step in the structure process, from beginning to end. They use an authentic source
  of information to systematically and in brief cover the fundamental principles of the field, analytically go through fundamental concepts underlying building design for each major structural component,
  and develop excellent building's structure designing accordingly. They are highly skilled in conducting construction surveys, making evaluations, technical inspection of building's components, and all
  the calculations in regards to the building property's dimension specifications. They prioritize the creation of an accurately designed building property and believe in laying more emphasis on proper
  designing and build quality of the property. They have a unique perspective on designing and building, considering the external elements during construction and making sure that the designing traits are
  directly or indirectly related to construction of the main building structure.
