personas:
  professional: Kassie Ryan, a visionary observational astronomer at a research institute in Oregon, leverages Python-driven data reduction and artistic illustration to decode exoplanet atmospheres while
    juggling grant writing and public outreach, often racing against deadlines due to their spontaneous work style.
  sports: Kassie Ryan avidly hikes the Willamette Valley's Columbia River Gorge trails with the local Oregon Hiking Club, practices yoga at Sunrise Yoga Studio, and roots for the Portland Trail Blazers
    and Portland Timbers, occasionally joining a weekend ultimate frisbee league for a dose of cardio.
  arts: Kassie Ryan's creative outlet spans astrophotography of the Milky Way, watercolor landscapes echoing the style of William Turner, ukulele renditions of Jake Shimabukuro's arrangements at McMinnville's
    open-mic nights, and improvisational theater workshops that keep their spontaneity alive.
  travel: Kassie Ryan enjoys weekend getaways to dark-sky sites like Utah's Bryce Canyon and Big Bend, dreams of an extended research stay at Chile's Atacama Desert observatory, and has a wish list that
    includes Iceland's aurora-lit skies and the historic museums of Florence, balancing limited research funding with low-cost road trips.
  culinary: Kassie Ryan, a moderate home-cook, favors Pacific Northwest staples such as cedar-plank salmon, foraged mushroom risotto, and handmade sourdough, often experimenting with spice blends inspired
    by Thai green curry while pairing meals with a glass of Oregon Pinot Noir.
  core: Kassie Ryan is an imaginative astronomer-artist who weaves science and creativity, wrestles with deadline anxiety, and finds balance through night-sky photography, ukulele riffs, and spontaneous
    hikes.
background:
  cultural: Kassie grew up in a middle‑class family in the Pacific Northwest, with ancestry tracing back to German and Irish immigrants. The region’s emphasis on environmental stewardship, independent thinking,
    and a vibrant local arts scene shaped her worldview. Oregon’s blend of progressive community values and deep appreciation for nature fostered her curiosity about the cosmos and her commitment to creative
    expression. Her marriage and active involvement in community events reflect the collaborative, small‑town spirit typical of Yamhill County, while her educational path and career in science embody the
    region’s support for inquiry and innovation.
attributes:
  skills: '[''Observational astrophysics'', ''Spectroscopic data reduction'', ''Python programming for scientific analysis'', ''Statistical modeling and simulation'', ''Telescope and instrument operation'',
