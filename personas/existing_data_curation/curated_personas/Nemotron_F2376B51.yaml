  hobbies: '[''Astrophotography'', ''Watercolor painting'', ''Ukulele playing'', ''Hiking in the Pacific Northwest'', ''Yoga'', ''Meditative journaling'', ''Science‑fiction reading'', ''Volunteering at
    planetarium'', ''Improvisational theater'', ''Garden tending'']'
  career_goals: Kassie aims to complete a Ph.D. in astrophysics within the next few years, focusing on the atmospheric characterization of exoplanets using novel imaging techniques. She aspires to lead
    an interdisciplinary research group that integrates artistic visualization into scientific discovery, securing faculty or staff scientist positions at a major observatory or research university. Her
    long‑term ambition includes publishing high‑impact papers, obtaining competitive research funding, and becoming a recognized voice in science outreach, especially in bridging creativity with rigorous
    inquiry. Although she worries about meeting deadlines, she is committed to developing better time‑management habits to balance her research, family life, and personal well‑being.
