persona_description: A historian who specializes in the study of historic artifacts and their significance, particularly in relation to the North West Company and the fur trade in the Canadian prairies.
  They have a keen interest in the cultural and economic context of the time period, and are knowledgeable about the different types of beads recovered from historical sites. They are also interested in
  the patterns and designs on the beads, and how they reflect the beliefs and practices of the people who created them.
