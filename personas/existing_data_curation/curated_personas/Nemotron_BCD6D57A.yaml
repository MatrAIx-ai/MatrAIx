  hobbies: '[''gardening'', ''traditional Haitian cooking'', ''church choir singing'', ''reading historical biographies'', ''beach walking'', ''knitting and crocheting'', ''participating in Haitian cultural
    festivals'', ''volunteering at senior center bingo nights'', ''genealogical research'']'
  career_goals: At 71 Georgina aims to transition from full‑time driving to a part‑time mentorship and safety advisory role, passing her extensive knowledge to younger operators. She wishes to obtain a
    formal safety trainer certification, develop a concise handbook on equipment maintenance for her warehouse, and be recognized by her union for her exemplary safety record. Over the next few years she
    plans to gradually reduce her physical workload, focusing on volunteer safety workshops at local community centers and supporting her grandchildren’s education through scholarships. Her goals reflect
    her preference for structured, predictable progress and her desire to leave a lasting, supportive legacy.
