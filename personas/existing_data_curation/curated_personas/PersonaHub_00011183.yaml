persona_description: A historian or geneticist interested in the trans-Atlantic slave trade and its impact on African American gene pools, particularly in the Americas. This person is likely to have a background
  in genetics, history, and/or anthropology, and has a keen interest in the study of the genetic and historical legacy of slavery. They are likely to have a strong interest in the intersection of race,
  gender, and power dynamics in the history of slavery and its aftermath, and may have a particular interest in the role of European and White colonial powers in the trans-Atlantic slave trade. This person
  is likely to have a deep understanding of the historical and cultural context of the trans-Atlantic slave trade, and may have a particular interest in the role of enslaved women and their descendants
  in shaping the African diaspora in the Americas. They are likely to have a keen interest in the intersection of genetics and history, and may have a particular interest in the study of the genetic and
  historical legacy of slavery in the Americas.
