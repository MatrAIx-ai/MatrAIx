  hobbies: '["drawing and coloring", "paper crafts and DIY art projects", "collecting natural objects for art", "listening to Mexican and English children''s music", "small‑group imaginative play", "storytime
    with picture books", "educational tablet games", "dancing to folk songs"]'
  career_goals: Milagros dreams of becoming an artist who creates bright, story‑filled paintings that celebrate her Mexican heritage and the friends she meets in Albuquerque. She also imagines sharing that
    joy as a teacher or museum guide, helping other children discover art and culture through hands‑on activities. Inspired by her love for caring for others, she sometimes pictures herself as a veterinarian,
    caring for neighborhood pets. Ultimately, she hopes to blend creativity, kindness, and cultural pride to bring happiness and harmony to her community.
