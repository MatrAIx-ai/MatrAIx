personas:
  professional: Milagros Sanchez, a budding kindergarten classroom helper, delights in arranging storybooks and art supplies with meticulous care, using their curious eye and gentle demeanor to create a
    harmonious learning nook for their small group of classmates, and they take pride in keeping the space tidy for friends.
  sports: Milagros Sanchez, a budding fan of the Albuquerque Isotopes baseball team and the New Mexico State Aggies basketball squad, spends Saturday mornings at the local park practicing soccer with the
    Albuquerque Youth Soccer Club, and they delight in the crisp winter air for building snowmen and the warm summer for splash‑pad play.
  arts: Milagros Sanchez loves drawing intricate sugar‑skull motifs inspired by the vibrant papel picado they see at home, sings along to the lyrical tunes of the Coco soundtrack and the cheerful melodies
    of Raffi, and often reenacts favorite scenes from animated Disney movies, which fuels their imagination and sense of harmony.
  travel: Milagros Sanchez enjoys family trips that blend road‑trip adventures to the Grand Canyon and a cultural weekend in Santa Fe, while they dream of a future swim in the clear waters of Cancun and
    a magical visit to Disneyland Paris with their cousins.
  culinary: Milagros Sanchez prefers the comforting flavor of warm chicken tortilla soup and the sweet, buttery goodness of churros dusted with cinnamon sugar, proudly assists in kneading masa for homemade
    tamales, yet they still need an adult’s hand to stir the pot of mac‑and‑cheese.
  core: Milagros Sanchez, a quietly curious five‑year‑old who organizes crayons by color but often forgets to share their favorite stickers, blends a love for colorful traditions with a gentle, harmony‑seeking
    spirit, and they make every playdate feel like a tiny celebration.
background:
  cultural: Milagros is the daughter of Mexican immigrants who maintain a vibrant bilingual household in Albuquerque, NM. At home, she speaks Spanish with her family and learns English at preschool, giving
    her a strong dual‑language foundation. Her family celebrates traditional Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Día de la Independencia with colorful papel picado decorations,
    homemade tamales, and lively music, fostering a deep appreciation for her heritage. Living in the Southwest, she also experiences New Mexican cultural blends, including Native American art motifs and
    regional festivals. These rich cultural experiences shape her love for art, storytelling, and community harmony.
