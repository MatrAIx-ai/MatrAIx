  career_goals: Looking ahead, Shan aims to leverage her decades of experience to transition into a supervisory or office‑manager role where she can shape operational policies, mentor junior staff, and
    introduce efficiency‑driven improvements. She is interested in obtaining a certification in office management or project coordination to formalize her expertise. Additionally, she wishes to volunteer
    her organizational skills within community organizations, such as the local senior center or library, to contribute to the wellbeing of her neighbors. Balancing her desire for stability with a sense
    of purpose, she also hopes to mentor younger colleagues, sharing practical strategies for managing stress and maintaining work‑life balance.
