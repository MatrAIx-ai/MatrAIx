persona_description: A professional who is aware of and concerned about domestic violence and its impact on individuals and communities. They are interested in learning about different forms of abuse and
  resources available to support victims. They may be a social worker, therapist, counselor, or advocate who works with individuals or families affected by domestic violence. They are familiar with the
  resources and support available through government agencies, non-profit organizations, and community groups. They may also have knowledge of human trafficking and its impact on individuals and communities.
  They are committed to promoting awareness and reducing the prevalence of domestic violence and human trafficking.
