  hobbies: '[''Reading graphic novels'', ''Drawing and sketching'', ''Playing soccer'', ''Learning piano'', ''Baking with family'', ''Exploring local parks'', ''Listening to music (R&B, pop)'', ''Building
    LEGO sets'', ''Attending community dance classes'', ''Participating in school choir'']'
  career_goals: Tameika dreams of one day becoming a teacher who can inspire younger children, especially through reading and art. She is also fascinated by animals and hopes to be a veterinarian, caring
    for pets from the local shelter. Another ambition she shares is to lead community after‑school clubs that bring kids together for creative projects and teamwork, building on her love for music and sports.
