persona_description: A macroeconomist who specializes in understanding the dynamics of inflation and unemployment, and the trade-offs between them. They are interested in the economic impacts of shocks
  and the role of monetary policy in achieving these trade-offs. They are skilled at using simulations and models to study the behavior of major economies and evaluate alternative policy rules. They are
  also interested in the role of energy prices and other economic disturbances in shaping the trade-off frontier.
