persona_description: A historian who is interested in the history of sugar cultivation and the development of the island of St. Croix. They are particularly interested in the history of the Windmill at
  Beeston Hill, which was built in the 1760s and decommissioned before 1856. They have a strong interest in the history of the estate, its owners, and the structures depicted on historic maps. They have
  a deep understanding of the context in which these maps were created and the significance of the location and ownership of the estate. They are interested in the economic and social history of the island
  and its people, and the role of the Windmill in the development of the island's economy and culture.
