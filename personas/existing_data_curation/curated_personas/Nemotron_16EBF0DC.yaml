  hobbies: '[''Softball and Bowling Leagues'', ''Community Volunteer Work (Church & Local Events)'', ''Fishing and Hunting'', ''Hiking in the Ozarks'', ''Classic Car Restoration'', ''Barbecue Cooking and
    Food Sharing'', ''Woodworking'', ''Tech Workshops on Electric Vehicles and Telematics'', ''Traveling with Family'']'
  career_goals: Looking ahead, Weston aims to move into a supervisory role such as fleet manager or safety coordinator within the next few years, where he can design driver‑safety programs, integrate new
    technology, and improve operational efficiency. He is interested in earning additional certifications like a CDL‑Class A endorsement and a safety‑trainer credential. Weston also hopes to mentor younger
    drivers, contribute to community transportation initiatives, and eventually start a small logistics consulting side‑business that leverages his industry knowledge while allowing more time for family
    and local involvement.
