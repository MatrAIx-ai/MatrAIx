personas:
  professional: Weston Cornelius, a veteran long‑haul driver with an associate degree in logistics, leverages three decades of defensive‑driving expertise, fleet‑management software proficiency, and a natural
    talent for training newcomers to design driver‑safety programs and champion telematics integration as they pursue a future fleet‑manager or safety‑coordinator role.
  sports: Weston Cornelius competes in the Spring Lake softball league, bowls every Thursday at Starlight Lanes, follows the Arkansas Razorbacks football team and St. Louis Cardinals baseball, and they
    spend weekends hunting white‑tailed deer and fly‑fishing the White River, embodying a love for both team sports and outdoor pursuits.
  arts: Weston Cornelius enjoys bluegrass and folk music, frequently attending Bill Monroe tribute shows at the Ozark County Fair, collects vintage Johnny Cash vinyl, and they maintain a woodworking shop
    where they craft handcrafted tables inspired by local artisans, while also supporting community theater productions of classic Southern plays.
  travel: Weston Cornelius prefers road‑trip adventures with their wife and grandkids, mapping routes that include historic diners and classic‑car rallies in Nashville, Memphis, and the Grand Ole Opry,
    while they dream of a summer drive along the Pacific Coast Highway and a weekend hike in the Great Smoky Mountains.
  culinary: Weston Cornelius loves slow‑cooked barbecue, they perfect a hickory‑smoked pork shoulder using a rub of paprika, brown sugar and coffee, serve collard greens simmered with smoked ham hocks,
    and regularly treat friends and family to homemade peach cobbler and sweet tea on Saturday evenings.
  core: Weston Cornelius is a seasoned trucker turned aspiring fleet manager who blends Southern hospitality, a passion for classic cars, and a curiosity for new tech, while they never miss a Sunday barbecue
    and often juggle a toolbox and a baseball bat.
background:
  cultural: Weston grew up in a small‑town environment in Arkansas, embodying the region’s blend of Southern hospitality, self‑reliance, and strong community ties. His family heritage includes English and
    German roots common to the area, and he maintains traditions such as attending county fairs, enjoying bluegrass and folk music, and savoring Southern cuisine. The local church plays a central role in
    his life, reinforcing values of service, family cohesion, and mutual support. While deeply connected to regional customs, Weston’s openness to new ideas reflects the pragmatic, curiosity‑driven mindset
    shaped by his lifelong work in transportation.
attributes:
  skills: '[''Defensive Driving'', ''Route Planning and Optimization'', ''Vehicle Inspection and Preventive Maintenance'', ''DOT Compliance and Safety Regulations'', ''Load Securement'', ''Customer Service
