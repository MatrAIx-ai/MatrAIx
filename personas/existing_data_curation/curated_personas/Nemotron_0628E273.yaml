personas:
  professional: Nicholas Betancourt, a 35‑year‑old organized handyman with a business‑admin background, channels his methodical nature into managing home‑repair projects, coordinating church food drives,
    and planning the certification path to become a licensed home inspector, while using Excel spreadsheets to track budgets and timelines.
  sports: Nicholas Betancourt follows the New Orleans Saints and Auburn Tigers with devotion, belongs to the Gulf Coast Anglers club for seasonal fishing tournaments, plays pickup basketball at his church
    gym on weekends, and counts daily gardening chores as the core of his low‑impact fitness regimen.
  arts: Nicholas Betancourt enjoys the soulful guitar of B.B. King, the storytelling in Miranda Lambert’s country hits, and the practical insights of David Allen’s Getting Things Done, and they often attend
    the local community theater’s monthly productions as a quiet cultural escape.
  travel: Nicholas Betancourt favors carefully planned road trips along the Gulf Coast, having explored New Orleans and Charleston on weekend getaways, while they keep a wishlist for the Florida Keys and
    Savannah, balancing family time with cost‑conscious itineraries.
  culinary: Nicholas Betancourt delights in cooking Southern‑style gumbo, fried catfish, and collard greens seasoned with garden‑grown thyme and basil, and they pride themselves on a solid home‑cooking
    skill set that blends traditional flavors with a touch of experimental spice rubs.
  core: Nicholas Betancourt is a methodical, worry‑prone builder‑at‑heart who finds calm in spreadsheets, garden rows, and the rhythmic pull of a fishing line.
background:
  cultural: Nicholas comes from a White Southern background rooted in Alabama’s coastal communities. His family combines Anglo‑American traditions with a hint of Hispanic ancestry, reflected in the surname
    Betancourt. He was raised in a close‑knit, middle‑class environment where church attendance, Southern hospitality, and community involvement were emphasized. The regional culture of the Gulf Coast,
    with its love of outdoor recreation, seafood cuisine, and strong family ties, informs his values and daily life.
attributes:
  skills: '[''Home repair and maintenance'', ''Plumbing and carpentry'', ''Small engine maintenance'', ''Budgeting and financial planning'', ''Project planning and scheduling'', ''Microsoft Office Suite
    (Word, Excel, PowerPoint)'', ''Customer service and community coordination'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Cooking'', ''Model building'', ''Reading non-fiction'', ''Volunteer work'']'
  career_goals: He aims to obtain a certification as a home inspector or HVAC technician within the next two years, leveraging his hands‑on experience to launch a small service business serving the Gulf
    Coast community. He also plans to complete his associate degree in Business Administration to qualify for part‑time remote administrative work, providing a stable income while maintaining flexibility
    for family responsibilities. Long‑term, he hopes to become a reliable provider, mitigate his stress by achieving financial security, and mentor younger residents interested in trades.
