  hobbies: '["Reading (science & mystery)","Hiking","Gardening","Puzzle Solving","Cooking","Photography","Board Games (small groups)","STEM Outreach Volunteering"]'
  career_goals: Melissa aims to transition from coordinating regional meetings to directing large‑scale national conferences, particularly in the technology and scientific sectors where her STEM background
    adds value. She is driven to earn a senior director title within a leading events firm, champion sustainable event practices, and develop innovative hybrid formats that set industry benchmarks. Long‑term,
    she envisions launching her own boutique event consultancy that specializes in data‑centric, environmentally responsible conferences, positioning herself as a thought leader through speaking engagements
    and published case studies.
