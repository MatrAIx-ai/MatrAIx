  career_goals: Dennis aims to become a senior partner at his firm, focusing on expanding the practice’s boutique commercial real estate division and establishing a legal tech consultancy that helps small
    businesses adopt efficient compliance tools. He also aspires to mentor younger attorneys, especially those from underrepresented backgrounds, and eventually run for a local judgeship to influence the
    justice system with his pragmatic, community‑oriented perspective.
