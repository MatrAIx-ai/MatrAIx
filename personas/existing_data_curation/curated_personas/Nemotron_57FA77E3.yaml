  hobbies: '[''cooking Mexican cuisine'', ''gardening'', ''folk art crafting (papel picado, piñatas)'', ''attending local art exhibitions'', ''listening to and playing music'', ''community dancing (salsa,
    folkloric)'', ''volunteering at community events'', ''watching soccer'', ''watching art and cultural documentaries'', ''exploring new ideas and alternative practices'']'
  career_goals: Ury's ambitions focus on giving back to his community and deepening his cultural roots. He aims to become a volunteer mentor for local youth, teaching them Mexican cooking techniques, folk
    crafts, and storytelling. He envisions organizing an annual neighborhood Mexican cultural festival that showcases music, dance, food, and art, fostering pride and connection among residents. He wants
    to document his family's oral histories and create a community heritage project, perhaps a small digital archive or a booklet for the local cultural center. Learning digital photography is a personal
    goal, so he can capture and share images of community events and everyday life. He also hopes to start a modest home-based venture - selling homemade tamales and salsas - to support his grandchildren's
    education. Additionally, he plans to lead a community garden initiative that provides fresh produce and a gathering space for neighbors.
