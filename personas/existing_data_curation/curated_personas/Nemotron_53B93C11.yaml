personas:
  professional: Linda Roberts, a retired strategic financial planner turned community mentor, leverages three decades of budgeting and business development expertise to guide budding entrepreneurs while
    they infuse their storytelling flair and watercolor‑inspired creativity into workshops.
  sports: Linda Roberts enjoys low‑impact fitness through weekly yoga, weekend walks among their flower garden, and a senior bowling league at the Ankeny Community Center, while they passionately cheer
    for the Iowa Hawkeyes football team and attend Iowa Cubs games whenever they can.
  arts: Linda Roberts finds creative fulfillment in watercolor painting scenes of Iowa sunsets, regularly visits the Des Moines Art Center to admire works by Georgia O’Keeffe and local artist Jan van Beek,
    delights in community theater productions of 'Our Town' starring fellow seniors, and they often unwind listening to folk legends like Bob Dylan and modern pianist Ludovico Einaudi.
  travel: Linda Roberts prefers short, purposeful road trips to cultural hotspots such as the Iowa State Fair, the historic river towns of Galena, Illinois, and the vibrant Chicago Art Institute, where
    they balance their love for photography with family visits, but they avoid long‑haul flights, reserving overseas destinations like Paris for occasional special anniversaries.
  culinary: Linda Roberts enjoys cooking hearty Midwestern dishes like apple‑cinnamon crumble and farm‑fresh corn chowder, experiments with Mediterranean recipes such as ratatouille learned in a community
    cooking class, and they flavor their meals with basil, rosemary, and thyme harvested from their own garden.
  core: Linda Roberts, a 77‑year‑old retired financier with a watercolor brush in one hand and a gardening trowel in the other, blends Midwestern steadiness, curiosity, and a relaxed, sometimes disorganized,
    approach to life, and they always find time for community, art, and gentle self‑care.
background:
  cultural: Linda was raised in a white, middle‑class family in the American Midwest during the post‑war era. Growing up in Iowa, she internalized values of community cooperation, modesty, and self‑reliance
    that are characteristic of the region. Her upbringing involved church participation, attending county fairs, and strong family ties, while her later education and business career exposed her to diverse
    ideas and travel. This blend of traditional Midwestern roots with broader experiences informs her appreciation for both stability and novelty.
