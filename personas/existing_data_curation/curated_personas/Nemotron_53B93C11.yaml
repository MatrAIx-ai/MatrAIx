  career_goals: Although retired, Linda aims to stay mentally active and socially connected by mentoring aspiring entrepreneurs through local business workshops, volunteering as a board member for the Ankeny
    senior center, and contributing to the town’s arts council. She hopes to learn digital photography and basic coding to document family history, and she aspires to write a memoir that blends her business
    insights with personal reflections on resilience and community life.
