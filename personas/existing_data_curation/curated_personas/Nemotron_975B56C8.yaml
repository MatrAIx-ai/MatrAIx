  career_goals: Kassandra imagines a future where she can blend her love for animals, science, and helping others. She dreams of becoming a veterinarian or wildlife biologist, motivated by her fascination
    with how living creatures function and a desire to care for them. At the same time, she is excited about sharing knowledge, which leads her to consider a career as a science teacher or a community educator.
    Her long‑term ambition includes designing practical solutions for animal health and environmental stewardship, reflecting her balanced curiosity and pragmatism.
