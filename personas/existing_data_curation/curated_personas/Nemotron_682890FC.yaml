personas:
  professional: Gilberto Perez is a seasoned diesel technician on the path to ASE Master Technician certification, who merges his deep knowledge of heavy‑vehicle diagnostics, hydraulic and pneumatic systems
    with a passion for custom interior design, and channels his curiosity into learning electric‑driven truck technology while dreaming of opening a boutique shop in Paris, Texas and teaching automotive
    arts at the community college.
  sports: Gilberto Perez passionately plays in the Paris, Texas weekend soccer league, supports the Dallas Cowboys and Houston Astros, and balances his fitness routine with sunrise fishing on Lake Texoma,
    though he often postpones gym sessions in favor of late‑night bus restoration work.
  arts: Gilberto Perez frequents the Paris Art Center’s rotating exhibitions, draws creative cues from street‑art legends like Banksy and local muralist Carlos Rivera, and enjoys live performances by the
    Tex‑Mex band Los Lobos, weaving those visual and auditory inspirations into each custom bus interior they design.
  travel: Gilberto Perez prefers road‑trip getaways in a lovingly restored classic bus, charting routes that stop at Gulf Coast fishing villages, a weekend art festival in Santa Fe, and a vibrant coastal
    town known for its artisan markets, but family responsibilities and limited startup funds often tether his wanderlust to brief, budget‑friendly trips.
  culinary: Gilberto Perez delights in cooking family recipes such as carnitas, homemade salsa verde, and chiles rellenos, skillfully combining a grill, a smoker, and fresh ingredients from the farmer’s
    market, while they also relish dining out at local taquerías that serve authentic tacos al pastor and mezcal‑infused sauces.
  core: Gilberto Perez is a diesel expert who turns buses into moving works of art, juggling heavy‑mechanic precision with an ever‑curious creative streak, a habit of late‑night financial catch‑ups, and
    a chronic worry that both drives meticulous craftsmanship and fuels occasional disorganization.
background:
  cultural: Gilberto grew up in a Mexican‑American household in Texas, where Spanish was spoken at home and English in school and work. His family maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, Mexican Independence Day, and family gatherings centered around homemade food. The blend of Mexican heritage and Texan community life informs his values of family loyalty, hard work,
    and hospitality. He is a practicing Catholic, participates in local parish events, and often volunteers at community centers that serve the Hispanic population, sharing his mechanical skills and cultural
    pride.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Hydraulic and pneumatic system repair'', ''Electrical wiring troubleshooting'', ''Welding and metal fabrication'', ''Blueprint reading'', ''Parts inventory management'',
    ''Bilingual communication (Spanish/English)'', ''Customer service and client relations'', ''Safety compliance and OSHA standards'', ''Custom vehicle interior design'']'
  hobbies: '[''Visiting art galleries and murals'', ''Custom vehicle interior design and paint work'', ''Playing soccer in a community league'', ''Attending live music concerts (Tex‑Mex, Tejano)'', ''Cooking
    Mexican cuisine'', ''Fishing at local lakes'', ''Restoring classic cars and vintage buses'', ''Participating in cultural festivals'', ''DIY electronics projects for vehicle upgrades'', ''Reading automotive
    and design magazines'']'
  career_goals: Gilberto aims to earn ASE Master Technician certification within the next two years and expand his expertise to include emerging electric‑driven truck technologies. He dreams of opening
    his own boutique diesel‑service shop in Paris, TX, where he can offer specialized maintenance, custom vehicle remodels, and training workshops for aspiring mechanics. He also wants to become a certified
    instructor at the local community college, sharing his practical knowledge while integrating his passion for art and design into curriculum modules. Long‑term, he hopes to lead a regional fleet‑maintenance
    program that emphasizes sustainable practices and community engagement.
