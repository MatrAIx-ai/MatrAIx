personas:
  professional: Jorge Nunez, a preschool‑aged explorer who loves arranging LEGO bricks by size, often taking charge of group projects and delighting classmates with his talkative explanations, while balancing
    his curiosity about new toys with a surprisingly practical approach to following classroom rules.
  sports: Jorge Nunez dashes into the Westchester United Youth Soccer training sessions every Saturday, cheering loudly and often challenging teammates to score first, while proudly wearing his New York
    Yankees cap during games.
  arts: Jorge Nunez delightfully imitates the rhythmic claps of Marc Anthony during family holiday parties, spends afternoons coloring vibrant pictures of tropical parrots, and eagerly joins the community
    center's bachata dance circle, where his talkative nature makes him the unofficial MC of the little troupe.
  travel: Jorge Nunez dreams of returning to the island where his grandparents celebrate Three Kings Day, while also planning a family trip to Disney World in Florida, preferring itineraries that mix fast‑pass
    rides with playground stops, and loves mapping out routes using his coloring crayons.
  culinary: Jorge Nunez proudly declares his love for arroz con gandules and chicken nuggets, eagerly sprinkling shredded cheese onto the pizza he helps assemble, yet often leaves a trail of flour on the
    kitchen floor, turning cooking time into a playful experiment.
  core: Jorge Nunez is a chatter‑filled five‑year‑old who balances boundless curiosity with a surprisingly practical streak, turning every game, snack, and family festivity into a competitive yet joyful
    adventure.
background:
  cultural: Jorge grows up in a bilingual Puerto Rican household in White Plains, New York. His parents celebrate traditional fiestas such as Three Kings Day, Nochebuena, and the Puerto Rican Festival in
    nearby New York City, exposing him to music, food, and stories from the island. At home he hears both Spanish and English, which shapes his language skills and cultural identity. Community centers in
    Westchester County often host cultural workshops and dance classes, giving him a strong sense of belonging to both his Puerto Rican roots and the diverse fabric of his suburban environment.
attributes:
  skills: '["Verbal communication","Fine motor coordination (cutting, drawing)","Basic numeracy","Problem‑solving with blocks and puzzles","Leadership in group play","Negotiation and turn‑taking"]'
  hobbies: '["Playing soccer","Dancing to salsa/reggaetón","Building with LEGO and wooden blocks","Attending library story‑time","Helping in the kitchen (food preparation)","Learning English and Spanish
    vocabulary"]'
  career_goals: Even at five, Jorge dreams of roles that let him be in the spotlight and interact with many people. He often says he wants to become a firefighter because he likes helping others and wearing
    a uniform, a professional soccer player because he enjoys competition, and a teacher because he likes explaining things to his friends. His competitive streak pushes him to aim for the “best player”
    on his team, while his sociable nature fuels his desire to be a community leader in the future.
