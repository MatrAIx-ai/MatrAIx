    clean‑up events","Attending community theater","Trying new recipes with friends"]'
  career_goals: Jula aims to merge her passion for art and her desire to help others by creating community-based art programs that empower youth and foster social harmony. She hopes to attend a specialized
    arts high school, later study social work or psychology, and eventually become an art therapist or nonprofit leader who designs inclusive creative initiatives. Additionally, she envisions launching
    a youth mentorship project in Virginia Beach that uses artistic expression to address community challenges.
