  career_goals: Freda aspires to become a high school science teacher who can inspire curiosity while providing practical, hands‑on learning experiences. She envisions earning a scholarship to study biology
    and education, and later creating a mentorship program for middle‑school students in Meriwether County to foster academic confidence and emotional wellbeing. Long‑term, she hopes to contribute to community
    health initiatives, possibly integrating her love for science with public health outreach in rural Georgia.
