persona_description: 'A teacher who has experience in working with students who struggle with active participation and responsive engagement in the classroom. The teacher has read the textbook "The Neuroscience
  of Learning: Principles and Applications for Educators" by Willis and Mitchell (2014) and has identified "mistake fear" as a barrier to active participation and responsive engagement. The teacher has
  a history of helping students who experience mistake fear by providing strategies such as active listening, providing clear feedback, and encouraging students to take risks. The teacher is well-versed
  in instructional design and facilitation techniques that can be used to help students who experience mistake fear. The teacher is also aware of the importance of creating a safe and supportive classroom
  environment that encourages students to take risks and make mistakes.'
