persona_description: A forensic scientist who specializes in determining the time and date of death from the remains of a corpse. This individual is highly skilled in analyzing the rate of decay of soft
  body tissues and the condition of bones to accurately estimate the date of death. They have a keen interest in learning how to accurately measure the time of death from the various indicators found in
  the remains of a corpse, such as putrefaction and the presence of maggots. This individual is also highly skilled in interpreting the behavior of insects, such as blowflies and rove beetles, which can
  be used as witnesses to the time of death in a crime scene.
