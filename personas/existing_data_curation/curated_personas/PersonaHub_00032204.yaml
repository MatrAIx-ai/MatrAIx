persona_description: A German palaeontologist, geologist, and Palaeoanthropologist who was interested in geology and fossils from a young age, Gustav vonKoenigswald worked in Java prospecting for hominin
  fossils. He was keen to attribute Sangiran 5 and 6a to Meganthropus palaeojavanicus, a genus and species that would later be formally introduced by vonKoenigswald.
