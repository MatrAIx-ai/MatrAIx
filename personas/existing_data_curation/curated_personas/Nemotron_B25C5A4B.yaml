  career_goals: Liza dreams of growing up to create safe, orderly spaces for others. She imagines becoming a kindergarten teacher who designs organized classroom routines, an architect who plans playful
    yet secure playgrounds, or a veterinarian who cares for animals with both compassion and precise attention to detail. Her ambitions are shaped by her love of structure, her desire to help, and her curiosity
    about how things function, even as she sometimes worries about doing things perfectly.
