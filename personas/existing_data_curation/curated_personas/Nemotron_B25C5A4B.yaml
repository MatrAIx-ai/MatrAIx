personas:
  professional: Liza Desnoes, a 5‑year‑old budding architect, uses her collection of building blocks to draft meticulous floor plans for imaginary houses, balancing wild creativity with a surprisingly practical
    habit of sorting each piece by shape and color before play.
  sports: Liza Desnoes, a 5‑year‑old member of the neighborhood kindergarten soccer team, idolizes the professional club City FC, practices dribbling with a mini ball at home, and joins the local junior
    swim class, balancing structured team play with solo jump‑rope sessions when she needs quiet focus.
  arts: Liza Desnoes, a 5‑year‑old who spends afternoons sketching bright forest scenes, often sings along to Disney’s Let It Go on her toy piano and watches Sesame Street’s Muppets, using artistic expression
    as a calming outlet for her frequent worries.
  travel: Liza Desnoes, a 5‑year‑old who loves family road trips to the nearby beach town of Oceanview and dreams of seeing the Eiffel Tower after a school collage project, prefers itineraries with clear
    schedules over spontaneous wanderings, reflecting her need for organized adventure.
  culinary: Liza Desnoes, a 5‑year‑old who declares cheesy macaroni with hidden peas her favorite dish, helps her mom whisk banana pancake batter, and insists on a drizzle of honey over her oatmeal, always
    arranging food on her plate in neat rows before eating.
  core: Liza Desnoes, a meticulous 5‑year‑old who blends vivid curiosity with a love for order, often worries about tiny details while turning playtime into carefully planned projects.
background:
  cultural: Liza is raised in a Black family in Orlando, Florida, where her parents weave African‑American cultural traditions into daily life. Family evenings often feature storytelling, soul and gospel
    music, and discussions about community values. She celebrates cultural holidays such as Juneteenth and Kwanzaa with crafts, shared meals, and community gatherings at a local church that emphasizes resilience
    and togetherness. Living in a diverse city, she also experiences Caribbean and Latin influences—tasting foods like empanadas and listening to calypso rhythms at community festivals. This multicultural
    environment enriches her worldview while her Black heritage provides a strong sense of identity and pride.
