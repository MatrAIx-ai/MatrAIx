  hobbies: '[''Reading technical manuals and construction blogs'', ''DIY home improvement projects'', ''Hiking Appalachian trails'', ''Nature photography'', ''Jigsaw puzzles and Sudoku'', ''Solo strategy
    video gaming'', ''Journaling'', ''Meditation and yoga'', ''Scale model building'']'
  career_goals: In the near term, Judith aims to earn NCCER and OSHA certifications to solidify her credentials as a reliable tradesperson and to qualify for supervisory roles on larger projects. Over the
    next five years she hopes to become a site forewoman, leading a small crew while maintaining the autonomy she values. Ultimately, she envisions launching her own niche contracting business that specializes
    in eco‑friendly residential renovations, allowing her to apply her technical curiosity, competitive drive, and desire for independent, low‑social‑interaction work environments.
