  career_goals: Although retired, Tonya’s ambition is to remain active and contribute to her community. She aims to document and share stories of South Park’s local history for future generations, organize
    an annual community art fair that showcases both traditional folk art and contemporary works, mentor younger volunteers at the senior center, and continue expanding her own knowledge of painting techniques
    through workshops. She also hopes to maintain her independence and health, travel to visit her grandchildren at least twice a year, and cultivate a small herb garden that can provide fresh ingredients
    for her cooking.
