personas:
  professional: Tonya Weddell, an 80‑year‑old retired community organizer and budding local historian, channels her lifelong knack for coordinating events, cataloguing library collections, and sewing into
    a volunteer‑driven project to document South Park’s history while mentoring younger volunteers, often relying on her curiosity and flexible, albeit slightly disorganized, approach to keep the work lively.
  sports: Tonya Weddell enjoys gentle hikes on nearby nature trails and participates in a senior walking club that meets weekly, follows the Pittsburgh Steelers and Penguins with enthusiastic but low‑key
    fandom, and incorporates bird‑watching into her fitness routine as a peaceful way to stay active.
  arts: Tonya Weddell devotes her free time to watercolor painting of western Pennsylvania landscapes, intricate quilting that blends traditional Log Cabin patterns with modern motifs, and regular attendance
    at the local community theater where she admires productions starring actors like Audra McDonald, while also drawing inspiration from artists such as Winslow Homer and Mary Cassatt.
  travel: Tonya Weddell travels twice a year to visit her grandchildren—once to the seaside town of Ocean City, Maryland, and once to the bustling streets of New York City—while also favoring day trips
    to nearby state parks and occasional weekend excursions to Amish Country for its historic farms and quiet charm, always planning trips at the last minute because she values flexibility over rigid itineraries.
  culinary: Tonya Weddell delights in preparing classic Pennsylvania Dutch dishes like shoofly pie, chicken pot pie, and pretzels, frequently seasoning them with fresh herbs from her small garden such as
    basil, thyme, and sage, yet she often leaves a pot simmering too long or forgets to add a pinch of salt, turning these kitchen mishaps into stories she shares at community gatherings.
  core: Tonya Weddell is an 80‑year‑old curiosity‑driven community elder who blends artistic flair, modest financial caution, and a gentle health regimen with a lovable habit of last‑minute planning and
    occasional worry‑filled overthinking.
background:
  cultural: Tonya was raised in a white, working‑class family in Washington County, Pennsylvania, with deep German and Irish roots. The community’s culture emphasized modesty, self‑reliance, and close church
    involvement, primarily in the local Methodist congregation. Appalachian folk traditions, such as quilting, woodcraft, and community gatherings, were woven into her upbringing. While she respects these
    traditions, her lifelong curiosity has led her to embrace a broader artistic perspective and to value inclusive, harmonious relationships within her neighborhood.
