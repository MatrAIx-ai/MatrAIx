personas:
  professional: Margarita Martinez, a three-year-old with a love for routine, pretends to be a meticulous librarian, sorting picture books by color and size and insisting on a daily schedule for playtime,
    reflecting her organized and methodical nature.
  sports: Margarita Martinez attends a toddler gymnastics class at the Little Sprouts Club, prefers solo balance beam practice, and watches the hometown baseball team the River City Bears on television,
    clapping quietly, reflecting her love for small-group activities and a competitive edge.
  arts: Margarita Martinez enjoys listening to children's musician Laurie Berkner and the classic show Mister Rogers' Neighborhood, and she often draws stick-figure families while humming the tune of If
    You’re Happy and You Know It, illustrating how structured, familiar artistic experiences shape her identity.
  travel: Margarita Martinez looks forward to the weekly visits to her grandparents' house across town and dreams of a family trip to the seaside town of Monterey to build sandcastles, balancing her preference
    for familiar routines with a gentle curiosity for new coastal adventures.
  culinary: Margarita Martinez prefers plain macaroni and cheese with cheddar, soft banana slices, and chicken nuggets with ketchup, and she insists on eating breakfast exactly at 7:00 a.m., showcasing
    her picky palate and ritualistic eating habits.
  core: Margarita Martinez is a three-year-old who clings to daily routines, meticulously organizes her toys, worries about any change, and delights in solitary play while secretly nurturing a competitive
    streak.
background:
  cultural: Margarita is raised in a Mexican‑American household that maintains bilingual traditions. At home she hears Spanish phrases, celebrates Día de los Muertos and Cinco de Mayo with family gatherings,
    and enjoys Mexican foods such as tamales and pozole. Living in Chico, California, she participates in community events that blend Mexican heritage with local culture, and her upbringing reflects a blend
    of Mexican family values and the broader American environment.
