personas:
  professional: Jorge Irizarry, a budding junior architect in the making, channels their love for structure and precision into building elaborate LEGO cities, meticulously drawing floor plans on paper while
    balancing imaginative play with a practical eye for detail.
  sports: Jorge Irizarry thrives on the organized chaos of weekend soccer games at the local park, proudly wears the jersey of their favorite professional club – FC Barcelona – and practices drills with
    their neighborhood youth team, the Riverdale Rovers.
  arts: Jorge Irizarry delights in drawing cartoon heroes like Mickey Mouse and Spider‑Man, swaying to lively folk tunes from a regional accordion band during family gatherings, and mimicking dance steps
    from the popular music videos of child‑friendly pop stars such as JoJo Siwa.
  travel: Jorge Irizarry loves nature walks in nearby woodlands, cherishes family trips to the national park’s waterfall trail, dreams of exploring the grand canyons of the Southwest, and has a treasured
    memory of a weekend beach outing to Santa Cruz.
  culinary: Jorge Irizarry enjoys helping to assemble simple tacos with soft corn tortillas, seasoned beef, fresh cilantro, diced tomatoes, and a squeeze of lime, and they take pride in mashing avocado
    for guacamole, often sprinkling a pinch of salt and pepper for flavor.
  core: Jorge Irizarry blends a love for structured play with spontaneous creativity, juggling LEGO masterpieces, soccer drills, and taco‑making, while occasionally splurging on extra crayons and forgetting
    to take their allergy meds on busy days.
background:
  cultural: Jorge’s family maintains Mexican traditions while living in Elgin. Spanish is spoken at home alongside English, and they celebrate holidays such as Día de los Muertos and Mexican Independence
    Day with food, music, and stories. He attends a bilingual elementary school that incorporates Mexican cultural lessons, and he participates in community events at the local Hispanic cultural center.
