    keeping'', ''Time management and scheduling'', ''Empathetic listening and emotional support'', ''Stress de‑escalation techniques'', ''Resource coordination and community outreach'', ''Basic art therapy
    facilitation'', ''Household organization and chores'', ''Adaptability to unconventional care approaches'']'
  hobbies: '[''Watercolor painting'', ''Sketching and drawing'', ''Nature photography'', ''Reading art and philosophy books'', ''Journaling'', ''Gardening'', ''Walking and exploring rural trails'', ''Mindfulness
    yoga and meditation'', ''Knitting and crochet'', ''DIY home‑decor crafts'', ''Listening to classical music'', ''Online art courses'']'
  career_goals: Tiffany aims to advance her qualifications by completing a certified nursing assistant (CNA) program and eventually pursuing a diploma in geriatric health care. She aspires to become a care
    coordinator in her community, integrating her artistic interests to develop wellness programs for seniors, such as art‑based workshops. In the long term, she envisions establishing her own boutique
    home‑care service that emphasizes personalized, holistic care while maintaining the quiet, respectful environment she values. She also hopes to continue her personal learning through online courses
    in health education and creative arts.
