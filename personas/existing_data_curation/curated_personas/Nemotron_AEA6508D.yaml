personas:
  professional: Summer Moore is a budding visual artist who blends hand‑drawn sketches, digital illustrations on their tablet, and nature photography into school mural projects, while channeling their curiosity
    and relaxed approach into coding simple Scratch games that they share with classmates.
  sports: Summer Moore pedals their mountain bike along Lake Apopka’s trails, participates in the local bird‑watching club’s weekend hikes, and roots for the Orlando Magic and Tampa Bay Lightning while
    they casually join their middle school's cross‑country team, embracing an unstructured, nature‑focused fitness routine.
  arts: Summer Moore draws inspiration from the surreal illustrations of Hayao Miyazaki, the expressive brushwork of Frida Kahlo, and the lyrical guitar melodies of Lindsey Stirling, weaving these influences
    into their sketchbooks, digital collages, and school mural collaborations, and they pen sci‑fi short stories reminiscent of N.K. Jemisin’s worlds.
  travel: Summer Moore prefers spontaneous weekend getaways to Florida’s nature spots like the Everglades and Cedar Key, dreaming of a future backpacking trip through New Zealand’s forests, while balancing
    their limited teen budget with the desire for both adventure photography and quiet reading on the beach.
  culinary: Summer Moore favors quick, colorful meals such as avocado toast sprinkled with chili flakes, homemade caprese salad drizzled with balsamic glaze, and mango‑lime smoothies, often experimenting
    with veg‑friendly taco recipes while they occasionally indulge in late‑night pizza slices after marathon art sessions.
  core: Summer Moore is a curious, art‑obsessed teen who blends sketchbooks, digital tools, and nature’s palette into creations, while juggling their laid‑back budget, mild allergies, and an impulsive love
    for spontaneous bike rides and late‑night pizza.
background:
  cultural: Summer comes from a middle‑class, white family of mixed German‑Irish ancestry living in the suburban community of Apopka, Florida. Her upbringing reflects a typical American suburban lifestyle—celebrating
    holidays such as Thanksgiving, Christmas, and the Fourth of July, weekend trips to nearby beaches, and frequent visits to local parks and Lake Apopka for outdoor recreation. Growing up in a culturally
    diverse region of central Florida, she has been exposed to Hispanic and Caribbean influences in food and community events, which broadened her perspective while her family maintains its own traditions,
    including Sunday barbecues and a love for baseball spring‑training games.
