  career_goals: Summer aspires to a career that blends her love for visual art, storytelling, and technology. She hopes to attend an arts‑focused high school and later study graphic design or interactive
    media at university, with the long‑term goal of becoming a digital illustrator, concept artist, or multimedia content creator. She envisions working freelance or with a forward‑thinking studio that
    offers flexible schedules, allowing her to travel for inspiration, experiment with unconventional projects, and continue learning new creative techniques.
