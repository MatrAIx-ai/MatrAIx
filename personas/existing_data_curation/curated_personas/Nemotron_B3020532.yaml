  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking in Appalachian trails'', ''Motorcycle restoration'', ''Watching metallurgy documentaries'', ''Volunteering at community food pantry'', ''Listening to
    classic rock and bluegrass'', ''DIY home repair projects'', ''Gardening'']'
  career_goals: Andrew aims to transition from a line‑operator role to a supervisory position where he can formalize his mentorship of younger workers and lead safety initiatives. He hopes to obtain a certification
    in advanced casting processes and an OSHA trainer qualification, enabling him to conduct internal workshops. Long‑term, he envisions opening a small, community‑focused metal‑working shop that offers
    apprenticeship opportunities and supports local projects, while also achieving a stable retirement that allows him to spend more quality time with his family and pursue personal interests.
