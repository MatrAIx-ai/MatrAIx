persona_description: A scholar and researcher who is interested in the political and cultural history of Bolivia, particularly focusing on the role of indigenous populations in the country's development
  and governance. They are likely to be familiar with the work of Nancy Postero and have a keen interest in the challenges and successes of the indigenous state under President Evo Morales. They may also
  have an interest in the broader context of decolonization and the impact of indigenous rights on the nation-state.
