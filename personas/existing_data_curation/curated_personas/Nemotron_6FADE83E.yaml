personas:
  professional: Mumbi Wright, a seasoned community storyteller and humanities graduate, blends their deep literary knowledge, meticulous editing, and charismatic public speaking to curate senior‑center
    events and guide museum visitors, applying their love of structure while thriving on spontaneous, talkative interactions.
  sports: Mumbi Wright enjoys gentle morning walks in local parks, participates in senior‑center bingo‑and‑dance nights, and follows the New York Giants (NFL) and New Jersey Devils (NHL) on television,
    while occasionally joining a low‑impact water‑aerobics class at the community pool, reflecting their sociable nature and competitive spirit.
  arts: Mumbi Wright, an avid docent at the New Jersey State Museum, immerses themselves in classic movies like "Casablanca" and "Gone with the Wind", listens to jazz legends such as Ella Fitzgerald and
    Louis Armstrong, and cherishes poetry readings, allowing their critical mind to dissect artistic nuance while their talkative demeanor shines during museum tours.
  travel: Mumbi Wright prefers planned, relaxed road trips—having visited the historic streets of Savannah, the museums of Washington, D.C., and the seaside boardwalk of Atlantic City—yet they often add
    spontaneous detours to explore local farmer's markets, balancing their need for structure with a love of leisurely discovery constrained by a modest travel budget and family responsibilities.
  culinary: Mumbi Wright delights in cooking Southern comfort meals like gumbo with okra, smoked sausage, and roux, as well as collard greens seasoned with smoked ham hocks, drawing fresh herbs such as
    thyme and basil from their garden, and they often share generous portions with friends, though they occasionally over‑spice dishes in an enthusiasm to impress.
  core: Mumbi Wright is a charismatic elder who channels a love of literature, storytelling, and community service into vibrant senior‑center gatherings, while juggling anxiety‑driven impulsivity, a penchant
    for spontaneous craft splurges, and a steadfast commitment to preserving personal and local histories.
background:
  cultural: Mumbi is an African‑American woman rooted in the cultural traditions of the Black community in Trenton, New Jersey. Raised during the civil‑rights era, she witnessed the power of collective
    action and community solidarity, shaping her critical and competitive spirit. Her family’s Southern heritage influences her culinary practices, storytelling style, and craft traditions like quilting.
    Mumbi’s lifelong involvement with her church and local community organizations reflects a deep commitment to preserving Black cultural heritage, supporting intergenerational mentorship, and celebrating
    African‑American contributions to the arts and humanities.
attributes:
  skills: '["Literature analysis", "Art history knowledge", "Oral storytelling", "Public speaking", "Community event planning", "Mentoring and coaching", "Basic computer use (email, video calls)", "Budget
