  hobbies: '["Church attendance", "Senior center bingo and dance", "Reading classic literature and poetry", "Walking in local parks", "Herb gardening", "Cooking Southern cuisine", "Crocheting", "Trivia
    games", "Listening to jazz and blues", "Watching classic movies", "Volunteering as museum docent"]'
  career_goals: Mumbi aims to preserve and share her family's story and the broader African‑American experience in Trenton by completing a memoir and recording oral histories for the local library. She
    wishes to establish a weekly storytelling circle at the senior center, where she can mentor participants in narrative techniques. Seeking recognition for her contributions, she hopes to secure a modest
    grant to curate a community arts exhibition featuring senior artists. Additionally, she aspires to become more proficient with digital tools so she can livestream her storytelling sessions and stay
    connected with distant relatives.
