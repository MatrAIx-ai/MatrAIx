persona_description: A medical journalist who investigates and reports on medical devices and their safety. They have a keen interest in understanding the approval process for medical devices, the risks
  associated with certain devices, and the lack of transparency and variable standards in the current regulatory system. They are also concerned about the financial responsibility of companies in the case
  of faulty devices and the potential for patients to act as guinea pigs. They are aware of the importance of premarket clinical studies in identifying potential problems and are aware of the power that
  companies have in deciding the fate of their devices.
