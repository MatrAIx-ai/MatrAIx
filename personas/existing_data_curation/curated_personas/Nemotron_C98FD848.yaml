personas:
  professional: Kellee Osborne, a three‑year‑old budding marine explorer in her sandbox, they practice early observation by sorting shells by size and color, demonstrating curiosity blended with practicality
    while quietly organizing their tiny collection.
  sports: Kellee Osborne, a three‑year‑old who delights in toddler swim lessons at the Bayfront pool, they quietly cheer for the nearby Corpus Christi Hooks and participate in community tee‑ball practice,
    displaying a gentle enthusiasm for sport and team spirit.
  arts: Kellee Osborne, a three‑year‑old who sings along to the Disney song Let It Go and sways to the gentle twang of Willie Nelson's countryside tunes while drawing elaborate sandcastles, they find their
    emerging identity in simple melodic storytelling and tactile creativity.
  travel: Kellee Osborne, a three‑year‑old who has explored the calm bays of South Padre Island and dreams of a family road trip to Enchanted Rock, they prefer relaxed car rides with soft toys and the feel
    of sand between their toes, balancing adventurous curiosity with comfort.
  culinary: Kellee Osborne, a three‑year‑old who adores shrimp tacos topped with fresh lime, they giggle while stirring mashed sweet potatoes and occasionally refuse peas on their plate, showcasing a developing
    palate that embraces familiar coastal flavors while testing new textures.
  core: Kellee Osborne, a quietly curious three‑year‑old who blends solitary beach explorations with gentle kindness, they cherish routine and occasionally rebel with an extra splash of sauce.
background:
  cultural: Kellee is raised in a white Anglo‑American family in Corpus Christi, Texas. Her upbringing blends the coastal lifestyle of the Gulf of Mexico—frequent beach outings, seafood meals, and exposure
    to marine life—with the broader Texan values of independence, hospitality, and respect for community. Local traditions such as fish‑fry gatherings, Texas Independence Day celebrations, and occasional
    Hispanic‑influenced festivals shape her cultural experiences. Her family’s routine includes regular church attendance and a focus on kindness and cooperation, reinforcing the gentle, considerate traits
    she displays.
