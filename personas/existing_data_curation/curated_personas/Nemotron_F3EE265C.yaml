  career_goals: Maria aims to transition from an administrative assistant role to a senior executive assistant or office manager position within the next two years, securing the Certified Administrative
    Professional (CAP) credential to formalize her expertise. She seeks to lead a small administrative team, introduce digital process improvements that reduce manual workload by at least 30%, and become
    the right‑hand support to a senior leader in a tech or finance firm. Long‑term, she envisions advancing to an Operations Manager or Director of Administration role, overseeing cross‑functional support
    services while maintaining high standards of efficiency and accuracy. She also wants to leverage her bilingual skills to act as a liaison for Latin American clients, expanding her influence within her
    company.
