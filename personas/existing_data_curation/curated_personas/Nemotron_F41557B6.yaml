  career_goals: Dana aims to transition from her current HR specialist role to an HR Business Partner position within the next two years, focusing on aligning people strategies with business objectives.
    Long‑term, she envisions becoming a Director of People & Culture or Chief HR Officer, where she can embed innovative, data‑focused practices and foster an inclusive, high‑energy workplace culture. She
    is passionate about mentoring emerging HR talent, introducing unconventional learning experiences, and shaping policies that balance employee wellbeing with organizational performance.
