personas:
  professional: Dana Umstead is a seasoned HR professional who blends empathetic listening, data‑driven talent analytics, and a spontaneous, creative flair to build inclusive workplace cultures, even if
    deadlines sometimes slip under their love for improvisational comedy and last‑minute projects.
  sports: Dana Umstead is a devoted fan of the Steelers and Pirates, joins a co‑ed intramural soccer league on Thursday evenings, and balances the high‑energy fandom with weekend hikes in Frick Park and
    evening yoga sessions at the local studio.
  arts: Dana Umstead frequents the Mattress Factory and the Andy Warhol Museum, participates in improv comedy nights at the Pittsburgh Improv Theatre, dances swing at the Moxi Club, and captures the city’s
    bustle through street photography, all of which fuel their creative problem‑solving at work.
  travel: Dana Umstead prefers spontaneous, low‑cost weekend getaways to regional gems like Fallingwater, Ohiopyle, and the Allegheny National Forest, while dreaming of a summer immersion in Barcelona’s
    modernist architecture and Lisbon’s fado scene, budgeting each trip through a dedicated travel fund and flexible flight alerts.
  culinary: Dana Umstead enjoys the hearty flavors of smoked bratwurst and pierogi, experiments with craft IPAs paired with Korean kimchi tacos at local breweries, and can whip up a decent risotto after
    watching a few YouTube tutorials, although they still rely on the brewery’s rotating food trucks for weekly culinary adventures.
  core: Dana Umstead blends a data‑driven HR career, a passion for improv and swing dancing, and a habit of over‑booking social events into a vibrant, community‑focused lifestyle that sometimes leaves their
    inbox overflowing.
background:
  cultural: Dana grew up in a middle‑class, white American family in the greater Pittsburgh area, where the city’s industrial heritage and strong community ties shaped her values of hard work, resilience,
    and civic pride. She embraces the region’s rich cultural scene—from steel‑town history to a vibrant arts community—and identifies with the local sports fandom of the Steelers and Pirates. Her upbringing
    emphasized independence, education, and an openness to diverse experiences, which now inform her inclusive outlook and curiosity about the broader world.
