personas:
  professional: Jeanne Easterbrook, a home health aide who blends meticulous documentation skills with a warm, community‑focused bedside manner, leverages her CPR and infection‑control certifications to
    deliver reliable geriatric care while pursuing a nursing degree and dreaming of a future supervisory role that mixes technology with rural outreach.
  sports: Jeanne Easterbrook enjoys weekend hikes along the Shenandoah River trails, a regular bird‑watching schedule, supports the West Virginia Mountaineers football team, and participates in a community
    softball league, maintaining fitness through steady walking and occasional yoga sessions while occasionally skipping workouts when a new book club selection arrives.
  arts: Jeanne Easterbrook immerses herself in Appalachian arts by attending bluegrass jam sessions at the local tavern featuring legends like Doc Watson and The Infamous Stringdusters, knitting hand‑stitched
    blankets for shelters inspired by folk storytelling, and devouring historical fiction by Catherine Marshall, all of which color her sense of identity.
  travel: Jeanne Easterbrook prefers low‑key road trips that combine nature and heritage, such as a weekend drive to the Great Smoky Mountains for hiking, a pilgrimage to the historic Galax Old Fiddlers’
    Convention, and a future plan to explore her ancestors’ roots in the Irish countryside, always budgeting trips with the help of her local credit union savings.
  culinary: Jeanne Easterbrook relishes cooking garden harvests—heirloom tomatoes, wild blackberries, and native wildflowers—into rustic dishes like tomato‑basil focaccia and wildflower‑infused honey‑glazed
    pork, while also enjoying comfort foods like pepperoni rolls and sorghum‑sweetened baked beans, often pairing meals with locally sourced mountain honey.
  core: Jeanne Easterbrook is a diligent, community‑oriented home health aide whose curiosity fuels a love for gardening, bluegrass, and genealogy, yet she sometimes forgets to water her plants when paperwork
    piles up.
background:
  cultural: Jeanne grew up in a close‑knit, white, working‑class community in Jefferson County, West Virginia. Her family traditions emphasize self‑reliance, hospitality, and a deep respect for the land.
    The region’s Appalachian heritage—characterized by folk music, storytelling, and strong church involvement—has shaped her values of community service and cooperation. She was raised with a modest emphasis
    on education, which motivated her to pursue some college coursework and continue learning through workplace training. The rural setting has fostered her appreciation for nature, seasonal cycles, and
    the importance of supporting neighbors, especially the elderly who comprise a significant part of the local population.
attributes:
  skills: '[''Personal care provision'', ''Vital signs monitoring'', ''Medication assistance'', ''Wound care'', ''Mobility and transfer support'', ''Electronic health record documentation'', ''Scheduling
    and care coordination'', ''CPR and first aid certification'', ''Infection control practices'', ''Patient communication and education'', ''Basic telehealth tools usage'']'
  hobbies: '[''Hiking'', ''Bird‑watching'', ''Gardening'', ''Reading historical fiction'', ''Book club participation'', ''Knitting'', ''Volunteer health‑fair assistance'', ''Bluegrass music events'', ''Genealogy
    research'']'
  career_goals: Jeanne aims to build on her hands‑on experience by completing a bachelor's degree in nursing or health sciences within the next five years. She plans to obtain a Certified Nursing Assistant
    (CNA) credential and eventually become a registered nurse, focusing on geriatric home care. In the longer term, she hopes to transition into a supervisory or care‑manager role where she can design care
    programs, mentor new aides, and advocate for improved home‑health services in rural West Virginia. She is also interested in establishing a small community‑based health outreach initiative that incorporates
    preventive education and technology‑enabled monitoring for senior residents.
