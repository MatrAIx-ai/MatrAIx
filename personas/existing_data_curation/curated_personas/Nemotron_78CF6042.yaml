  career_goals: Kendrick dreams of staying connected with kids as a future teacher or youth sports coach, where he can combine his love of basketball, music and storytelling. He wants to lead after‑school
    programs that give children a safe routine of games, arts, and learning. He also imagines performing on stage one day, sharing rap verses and comic‑book drawings with a community audience, and hopes
    to use his practical problem‑solving skills to help organize community events.
