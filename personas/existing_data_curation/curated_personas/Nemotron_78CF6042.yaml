personas:
  professional: Kendrick Tales is a budding community organizer who channels his love for group activities into planning neighborhood block parties, using his natural sociability and outgoing energy to
    rally friends and family while often leaving the final checklist to the last minute due to a relaxed attitude toward obligations.
  sports: Kendrick Tales is a basketball enthusiast who plays for the Columbia Hoops Academy youth team, idolizes NBA star LeBron James and cheers for the Charlotte Hornets, while also following the South
    Carolina Gamecocks men's basketball season and joining weekend pick‑up games at the community center.
  arts: Kendrick Tales is a budding rapper and doodler who draws cartoon versions of comic heroes like Spider‑Man, spits verses in classroom rap circles inspired by classic hip‑hop pioneers such as Run‑D.M.C.,
    Outkast, and Kendrick Lamar, and enjoys listening to Southern soul legends like Otis Redding during family music sessions.
  travel: Kendrick Tales enjoys weekend trips to Congaree National Park and the Riverbanks Zoo in Columbia, dreams of a family vacation to Walt Disney World in Orlando, and prefers travel plans that mix
    familiar routines—like morning biscuits—with the excitement of exploring new attractions.
  culinary: Kendrick Tales loves helping mom bake buttery biscuits and simmer collard greens on Saturdays, relishes the taste of sweet potato pie and mac & cheese, and boasts a moderate cooking skill level
    that lets them confidently whisk together a simple corn‑bread batter while always adding a pinch of garlic and a dash of hot sauce for extra flavor.
  core: Kendrick Tales is an energetic 8‑year‑old who thrives on routine, community fun, and classic beats, yet often forgets details and worries about school, making them both the life of the block party
    and the kid who misplaces the inhaler.
background:
  cultural: Kendrick comes from an African‑American family rooted in Columbia, South Carolina. His parents are active members of a local Baptist church, where music, storytelling, and community service
    play central roles. He grows up hearing family recipes for Southern comfort foods like fried chicken, mac & cheese, and collard greens, and he participates in community traditions such as the annual
    Juneteenth parade and the Columbia Sweet Peanut Festival. The legacy of the Great Migration and the civil‑rights history of South Carolina influence his sense of pride and responsibility. While he lives
    in an urban setting, his cultural upbringing emphasizes family cohesion, church fellowship, and the celebration of Black heritage through music, dance, and oral history.
