personas:
  professional: Donna Davis, a pint-sized aspiring architect, meticulously builds block skyscrapers during playtime, balancing curiosity about new shapes with a methodical, competitive spirit that drives
    her to outdo her peers while carefully planning each tower's layout.
  sports: Donna Davis, an energetic member of the 'Lil' Tigers' preschool soccer club, practices dribbling and scoring with fierce competitiveness, cheers for the Chicago Cubs during baseball season, and
    enjoys watching the Chicago Bulls on TV after games.
  arts: Donna Davis, a spirited little artist, spends afternoons drawing vibrant critters inspired by Eric Carle and sings along to Raffi's Baby Beluga, often performing impromptu dances to Disney's Let
    It Go, which fuels her imagination and shapes her playful identity.
  travel: Donna Davis, an adventurous preschool traveler, loves recounting her trips to the city zoo, a weekend stay at Disneyland, and a sunny beach getaway in Florida, while dreaming of seeing the Eiffel
    Tower in Paris someday.
  culinary: Donna Davis, a budding mini chef, adores mac and cheese with a sprinkle of cheddar, obsessively arranges apple slices into smiley faces, and eagerly spreads peanut butter on toast, though she
    often ends up with a smear of sauce on her chin, reflecting her playful yet messy cooking style.
  core: Donna Davis blends a child's boundless curiosity with a surprisingly methodical, competitive streak, organizing crayons by color, counting coins with precision, and never missing a chance to outbuild
    a block tower.
background:
  cultural: Donna was born and raised in Commerce City, Colorado, a suburban community near Denver. Her family’s heritage includes German and Irish ancestry, and they celebrate typical American holidays
    such as Thanksgiving, Fourth of July, and Christmas. The local culture encourages outdoor recreation, so weekend trips to nearby trails and community events like the Commerce City summer fair are common.
    She participates in preschool activities at the municipal library and enjoys the blend of Denver’s urban influences and the small‑town feel of Adams County.
