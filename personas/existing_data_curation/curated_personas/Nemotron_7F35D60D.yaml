  career_goals: Even at four, Donna often talks about what she wants to be when she grows up. She imagines herself as an engineer or architect, fascinated by how things are constructed and eager to design
    tall, sturdy structures. She also mentions wanting to help people as a doctor or teacher, and she likes the idea of leading a group, dreaming of being the "class captain" who organizes games and projects.
