personas:
  professional: Glenda Keith, a budding teen visual artist and aspiring game world designer, blends their strong drawing and painting skills with a curiosity for digital sandbox games like Minecraft, using
    a free‑spirit, often disorganized workflow to experiment with mixed media and prototype imaginative environments.
  sports: Glenda Keith enjoys hiking the Susquehanna River trails with the Harford County Trail Club, casually follows the Baltimore Ravens and the Washington Capitals, and balances this love for nature
    with occasional participation in the school’s cross‑country team, preferring spontaneous outdoor workouts over structured gym routines.
  arts: Glenda Keith immerses themselves in the local arts scene, drawing inspiration from the vibrant murals of Shepard Fairey, the graphic storytelling of the comic series 'Saga', and indie musicians
    like Phoebe Bridgers and Tame Impala, while regularly performing original ukulele songs at community open‑mic nights.
  travel: Glenda Keith favors spontaneous weekend getaways to nearby art‑rich cities such as Philadelphia’s Museum District or a sunrise hike in Shenandoah National Park, dreaming of a future art pilgrimage
    to Paris’s Louvre, yet their travel plans often hinge on school deadlines and a modest family budget.
  culinary: Glenda Keith prefers eclectic teen-friendly meals like avocado toast with poached eggs, homemade sushi rolls with cucumber and smoked salmon, and chocolate chip pancakes topped with fresh strawberries,
    often experimenting in the kitchen while listening to indie playlists, though they sometimes burn toast when distracted by sketching ideas.
  core: Glenda Keith is a creatively restless 15‑year‑old who trades structured plans for spontaneous art experiments, splurges on supplies, hikes to recharge, and occasionally lets disorganization and
    teen‑grade procrastination color their daily rhythm.
background:
  cultural: Glenda grew up in a typical suburban setting in Abingdon, Maryland, within a predominantly white, middle‑class community. Her family observes mainstream American holidays such as Thanksgiving,
    Christmas, and Fourth of July celebrations, and they often partake in local traditions like the Harford County Fair and community volunteer events. While she attends a local church on occasion, her
    cultural experience is largely shaped by the Mid‑Atlantic blend of rural landscapes, proximity to the Chesapeake Bay, and easy access to nearby urban cultural hubs like Baltimore. This environment has
    exposed her to a mix of small‑town community values and the diverse artistic influences of the larger region.
