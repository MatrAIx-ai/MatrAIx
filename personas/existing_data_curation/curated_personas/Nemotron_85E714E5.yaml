    playing'']'
  career_goals: Glenda aspires to turn her love of visual storytelling into a career. She hopes to attend a specialized arts high school or a community college program in graphic design, eventually working
    as a concept artist for video games or a freelance illustrator for books and online media. Alongside her artistic ambitions, she wants to complete her high‑school education, earn a GED if needed, and
    later explore ways to use her art for social causes, such as creating awareness‑raising posters for environmental or mental‑health initiatives.
