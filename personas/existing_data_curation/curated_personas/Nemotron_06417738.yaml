  career_goals: Semhar dreams of growing up to work in a role that blends order, responsibility, and helping others. He often says he wants to become a teacher at his local school, where he can share knowledge
    and Navajo stories with younger children. He also imagines a future as a community health aide or a wildlife ranger, caring for his people and the desert landscape around Shiprock.
