personas:
  professional: Semhar Brumme is a budding architect in the making, channeling a love for order and creativity into building LEGO houses and vehicles, and meticulously organizing each piece as if drafting
    blueprints.
  sports: Semhar Brumme dashes around the field with the Little Lions Soccer Club after school, eagerly practicing drills that mirror the disciplined teamwork of their favorite professional team, LA Galaxy,
    and they celebrate match days by wearing a bright jersey.
  arts: Semhar Brumme spends weekends drawing expansive desert vistas, stylized wildlife, and tribal symbols, while listening to the soothing tones of traditional wooden flute music and singing simple lullabies,
    drawing inspiration from flute virtuoso James Galway and the ambient piano pieces of Yiruma.
  travel: Semhar Brumme loves family road trips that weave through the Grand Canyon, the red rock cliffs of Sedona, and the towering sequoias of Yosemite, preferring a well‑planned itinerary with plenty
    of stops for sketching scenery and feeding the family dog.
  culinary: Semhar Brumme enjoys munching on honey‑drizzled carrot sticks, cheese‑laden quesadillas, and warm cornbread, helping in the garden to harvest fresh tomatoes and herbs that later flavor a simple
    pasta sauce they stir with a wooden spoon under their mother's guidance.
  core: Semhar Brumme balances a love of orderly LEGO construction with a vivid imagination for desert art, a disciplined soccer routine, and a gentle, habit‑driven approach to saving and self‑care, all
    while sprinkling in occasional snack‑time mischief.
background:
  cultural: Semhar is a member of the Diné (Navajo) Nation, living on the Navajo reservation in Shiprock, New Mexico. The Navajo culture stresses a deep connection to the land, respect for nature, oral
    storytelling, and strong community ties. At home he learns Navajo language, participates in seasonal gatherings, and helps with cultural practices such as preparing traditional foods and learning songs.
    The community’s values of humility, cooperation, and harmony guide his worldview and daily interactions.
