  career_goals: Lynne aims to become a senior associate and eventually a partner at a boutique law firm that specializes in intellectual property and technology transactions, leveraging her STEM background
    for predictable, routine client work. She seeks a stable client base that provides a steady, manageable workload, allowing her to maintain a healthy work‑life balance and better manage her anxiety.
    Over the next five years, she plans to obtain certification as a specialist in patent law, develop a niche practice in data‑privacy compliance, and mentor junior colleagues while championing mental‑health
    awareness within the legal community.
