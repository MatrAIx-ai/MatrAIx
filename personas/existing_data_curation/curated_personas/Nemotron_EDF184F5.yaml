  hobbies: '[''Community Volunteering (Youth Financial Literacy)'', ''Salsa and Afro‑Latin Dancing'', ''Boxing Cardio Classes'', ''Zumba Fitness Sessions'', ''Exploring Local Food Festivals'', ''Cooking
    Soul Food and Hosting Dinner Parties'', ''Reading Business & Personal Development Books'', ''Traveling to Cultural Heritage Sites'']'
  career_goals: Tremethia’s primary career ambition is to advance to a regional director of sales within the next three to five years, overseeing multiple market territories and shaping company‑wide sales
    strategy. She is passionate about mentoring emerging sales talent, especially Black women, and envisions creating a mentorship program or consultancy that helps underrepresented professionals break
    into leadership roles. To deepen her strategic acumen, she plans to pursue an MBA or a professional certification in sales leadership. Throughout these pursuits, she aims to foster a flexible, supportive
    team culture that balances clear structure with the adaptability she values, while securing the financial stability needed for greater personal and community investment.
