  career_goals: Looking ahead, Eric aims to transition into a plant manager role where he can shape the strategic direction of the facility, championing initiatives that integrate sustainability, advanced
    automation, and continuous improvement. He is interested in spearheading a cross‑functional innovation program that leverages employee ideas, aligning with his curiosity for new concepts. Additionally,
    Eric hopes to mentor the next generation of supervisors, perhaps establishing a local apprenticeship partnership with community colleges. On a personal level, he envisions using his leadership experience
    to support community projects, such as a collaborative art workshop that brings together workers and local artists.
