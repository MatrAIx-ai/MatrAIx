personas:
  professional: David Long, a 19‑year‑old cashier with a knack for meticulous data handling, is leveraging his POS expertise, spreadsheet fluency, and growing graphic design skills to pursue a museum studies
    internship, where they aim to blend analytical precision with curatorial creativity.
  sports: David Long enjoys solitary fitness routines, joining the Congaree Trail Club for weekend hikes, occasionally playing pickup basketball at the local community center, follows the University of
    South Carolina Gamecocks football team for seasonal excitement, and cheers on the Columbia Fireflies during summer baseball while they maintain a competitive personal record in a weekly 5‑k run.
  arts: David Long spends weekends sketching in a Moleskine at the Columbia Museum of Art, curates a personal photo series of the city's murals, draws inspiration from contemporary artists like Kehinde
    Wiley and photographer Andreas Gursky, benches avant‑garde indie music from Sufjan Stevens and Mitski while they attend open‑mic poetry nights featuring local spoken‑word talent such as Jasmine Alvarado.
  travel: David Long plans travel with spreadsheet precision, favoring adventure‑laden trips like a solo backpacking hike through the Great Smoky Mountains and a cultural immersion weekend in Asheville’s
    art districts, while they dream of a future solo itinerary to Paris’s Musée d’Orsay and Florence’s Uffizi, balancing modest budget constraints with a desire for immersive art experiences.
  culinary: David Long’s culinary tastes blend Southern comfort and global curiosity, skillfully whipping up shrimp‑and‑grits with fresh rosemary and collard greens at home while frequently savoring black‑bean
    tacos topped with avocado, and they indulge in espresso‑based coffee drinks and seasonal farmers‑market salads featuring heirloom tomatoes and basil.
  core: David Long is a methodical art‑obsessed introvert who balances meticulous spreadsheet budgeting with occasional impulsive splurges on limited‑edition prints, channels competitive energy into strategy
    games, and they habitually skip sleep to edit photos late into the night.
background:
  cultural: David grew up in Columbia, South Carolina, in a middle‑class family that values hard work and community ties common in the Southern United States. His parents, both school‑educated, encouraged
    academic responsibility and civic participation, while also exposing him to the region’s rich musical and artistic traditions, such as Southern gospel and local mural projects. He attended public high
    school, where he participated in a modest art elective and a varsity soccer team, experiences that balanced his reserved nature with occasional team collaboration. The city’s blend of historic Southern
    culture and a growing contemporary arts scene shaped his appreciation for both tradition and new ideas. Although he identifies as white and was raised in a predominantly Protestant environment, he has
    cultivated a personal belief system that emphasizes curiosity, critical inquiry, and openness to diverse perspectives.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Inventory management'', ''Data entry'', ''Microsoft Excel'', ''Organizational planning'', ''Critical analysis'', ''Digital
    photography'', ''Basic graphic design'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and drawing'', ''Digital photography'', ''Hiking'', ''Reading art theory and philosophy'', ''Blogging about art and culture'', ''Playing
    strategy video games'', ''Attending indie music shows and poetry readings'', ''Learning graphic design basics'']'
  career_goals: David aspires to transition from retail to a career that merges his analytical strengths with his passion for art. He plans to enroll in a community college in Columbia to earn an associate
    degree in museum studies or graphic design, followed by a bachelor's in art administration. His short‑term goal is to secure an internship at the Columbia Museum of Art, where he can apply his research
    and organizational skills. Long‑term, he aims to become a museum curator or creative director, eventually opening a small gallery that showcases emerging Southern artists while using data‑driven exhibition
    planning. He also envisions a managerial role in retail as a stepping stone, targeting a store‑manager position within three years to develop leadership experience.
