  hobbies: '[''Fishing'', ''Gardening'', ''Walking on the beach'', ''Bridge (card game)'', ''Bingo'', ''Volunteer reading program'', ''Cooking'', ''Community theater'']'
  career_goals: In his retirement, Eric aims to stay actively engaged and to leave a lasting positive impact on his community. He hopes to continue leading the senior center's weekly social programs, expand
    the neighborhood garden, and mentor younger volunteers in organizational skills. He also aspires to complete a memoir documenting his family's stories for future generations, and to maintain his health
    so he can travel with his wife to explore Florida's coastal towns. Financially, he plans to ensure a secure estate for his family and to support charitable contributions to local youth programs.
