personas:
  professional: Eric Allen, a 76‑year‑old retired handyman turned senior‑center program director, applies his carpentry, plumbing, and budget‑management expertise to organize community events with methodical
    precision and calm authority.
  sports: Eric Allen enjoys early‑morning Gulf fishing in spring, daily walks along the Clearwater Beach promenade for low‑impact exercise, and follows the Tampa Bay Buccaneers and Tampa Bay Rays while
    occasionally joining the local senior bridge league that doubles as a mental sport.
  arts: Eric Allen volunteers at the local library’s reading program, attends community theater productions starring regional actors like Tom Hanks in local revivals, and spends evenings listening to classic
    American crooners such as Frank Sinatra and country legends like Willie Nelson.
  travel: Eric Allen prefers carefully planned road trips with their spouse, favoring coastal towns like Key West, Sanibel Island, and Amelia Island, where they stay in modest beachfront motels, enjoy leisurely
    sunrise walks, and keep travel costs within a pre‑set budget.
  culinary: Eric Allen delights in cooking comfort classics such as meatloaf, chicken pot pie, and fried catfish seasoned with fresh garden herbs, often pairing meals with home‑grown tomatoes, sweet potatoes,
    and a side of coleslaw made from crisp lettuce.
  core: Eric Allen blends a steadfast love for community service, methodical organization, and laid‑back Southern‑flavored comforts, all while maintaining a calm demeanor that masks occasional forgetfulness
    of medication and a stubborn reluctance to try new culinary spices.
background:
  cultural: Eric was raised in a middle‑class, white, Anglo‑American family in the Midwest, where he internalized values of hard work, self‑reliance, and community service. He grew up attending a Protestant
    church, which reinforced a sense of civic duty and modesty. After retiring, he joined the vibrant retiree community of Clearwater, Florida, adopting the state's coastal lifestyle while maintaining his
    traditional American roots. His cultural identity blends a classic mid‑20th‑century American upbringing with the relaxed, social atmosphere of Florida's senior communities.
attributes:
  skills: '[''Home repair (plumbing, electrical, carpentry)'', ''Gardening and landscaping'', ''Event planning and coordination'', ''Budget management for community groups'', ''Conflict mediation'', ''Volunteer
