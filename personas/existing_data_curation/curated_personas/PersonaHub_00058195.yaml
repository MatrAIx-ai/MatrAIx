persona_description: A botanist who is interested in the classification and identification of flowering plants. They are particularly interested in the subclass Dicotyledonae, Crassinucelli, Ranunculanae,
  and Ranunculales. They are familiar with the APG 3 classification system and have knowledge of the genera Leontice, Bongardia, Caulophyllum, and Gymnospermium. They are interested in the characteristics
  of cyanogenic plants, the colpate pollen, the pseudocrassinucelate ovules, the non-fleshy fruit, and the phytochemicals of the plant kingdom. They are also interested in the geographical distribution
  and general morphology of the plants.
