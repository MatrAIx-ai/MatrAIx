  career_goals: Even at three, Sofia articulates vivid dreams about the future that reflect her curiosity and love of creativity. She often tells adults she wants to be a colourful painter who can mix any
    hue, a storytelling teacher who shares imaginative tales to small groups of friends, and an explorer of nature who studies bugs and plants. Sofia’s ambition is to combine art and discovery, imagining
    a role where she can create beautiful pictures while learning about the world, such as an illustrator for children’s science books or a community garden artist. She also expresses a compassionate wish
    to help animals, saying she’d like to be a pet doctor who cares for stray kittens. Her goals are shaped by a desire to share her ideas with a few close companions and to make a gentle, positive impact.
