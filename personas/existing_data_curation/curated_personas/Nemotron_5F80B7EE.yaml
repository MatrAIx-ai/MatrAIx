personas:
  professional: Sofia Lakdawala, a three‑year‑old block‑building enthusiast, shows early signs of a future spatial engineer by meticulously arranging LEGO bricks while occasionally improvising creative
    structures, reflecting a balance of organization and flexible imagination.
  sports: Sofia Lakdawala enjoys watching the New York Giants on Sundays and cheering for the New Jersey Devils, participates in a local toddlers’ swimming class at the community center, and loves weekend
    playground sessions where she practices balancing on the balance beam at the Burlington County park.
  arts: Sofia Lakdawala delights in listening to Raffi’s ‘Baby Beluga’ and the lullaby ‘Nanri’ her parents play before bedtime, watches Sesame Street starring Emily and learns to draw animals in the style
    of Eric Carle, allowing her curiosity for new ideas to shape her artistic playtime.
  travel: Sofia Lakdawala loves family road trips to the historic lighthouse at Sandy Hook, has explored the interactive exhibits at the Liberty Science Center, dreams of visiting Disney World in Florida
    and the Taj Mahal on a future family vacation, preferring a mix of guided tours and spontaneous playground stops.
  culinary: Sofia Lakdawala enjoys the comforting taste of mac and cheese with sharp cheddar, eagerly helps stir the batter for banana pancakes, delights in mild dal paired with soft naan during family
    meals, and has a favorite snack of apple slices with peanut butter, showing an early love for both familiar and subtly diverse flavors.
  core: Sofia Lakdawala is a curious three‑year‑old who balances meticulous block building with imaginative play, saves pennies in a piggy bank yet splurges on glitter stickers, and quietly observes the
    world while occasionally bursting into song.
background:
  cultural: Sofia is raised in Columbus, a suburban community in Burlington County, New Jersey, within a predominantly white, middle‑class neighbourhood. Her family embraces typical American customs—celebrating
    holidays such as Thanksgiving, Fourth of July, and Christmas with seasonal decorations, family meals, and community events. The Lakdawala surname hints at Indian (Parsi) heritage on one side of the
    family, and although Sofia’s physical appearance aligns with a white background, the household occasionally incorporates elements of that cultural lineage. This includes listening to Hindi or Gujarati
    lullabies, enjoying occasional Indian dishes like mild dal or naan during family gatherings, and observing Diwali with small lights and sweets when possible. At the same time, Sofia attends a local
    early‑learning centre where the curriculum emphasizes diversity, exposing her to a variety of languages, stories, and artistic traditions. This blended environment fosters an appreciation for both her
    local American roots and the broader multicultural influences present in her family.
