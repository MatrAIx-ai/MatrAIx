  career_goals: As she approaches retirement, Minou aims to mentor younger procurement professionals, especially those from indigenous backgrounds, to preserve her knowledge and promote ethical sourcing.
    She aspires to help establish a regional cooperative that connects tribal farms with broader markets, securing fair prices for native crops. Over the next few years she hopes to transition into a consulting
    role focused on sustainable procurement practices for small-scale farms, while obtaining certification for sustainable sourcing for her organization. Balancing her competitive drive with personal well‑being,
    she also seeks to integrate stress‑management practices into her daily routine.
