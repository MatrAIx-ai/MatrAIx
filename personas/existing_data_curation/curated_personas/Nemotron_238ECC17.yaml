  career_goals: Rebecca aims to become a department head within her school and then pursue a master’s degree in educational leadership. Her long‑term ambition is to move into an instructional coaching role
    or become a principal, where she can lead school‑wide initiatives that embed project‑based learning, expand STEAM offerings, and secure grant funding for technology upgrades. She also hopes to develop
    a mentorship network for early‑career teachers and strengthen partnerships between the school and the broader Casey community.
