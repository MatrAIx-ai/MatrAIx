  of the epidemiology of AFib, the risk factors associated with it, and the potential consequences of AFib, and are always looking for new and innovative ways to improve patient outcomes. They are also
  likely to have a strong interest in public health and policy, and are committed to advocating for better healthcare access and outcomes for AFib patients.
