  career_goals: Michael imagines a future where he can blend his love for art, curiosity, and competition. He dreams of becoming an astronaut who designs space habitats, an inventor who creates new toys
    and gadgets, or a professional soccer player who also paints murals. He aims to win a school science fair, become captain of his soccer team, and one day create a vibrant mural at his school that celebrates
    his Cuban heritage. Michael also hopes to be recognized as a class leader who can inspire friends to explore new ideas.
