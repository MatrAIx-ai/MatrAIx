personas:
  professional: Michael Arzola, a budding junior visual inventor, merges vivid comic sketching with LEGO vehicle engineering, and they apply their curious eye for color, disciplined yet flexible approach,
    and competitive drive to prototype imaginative play worlds.
  sports: Michael Arzola, a spirited member of the Hesperia Youth Soccer Club who idolizes LA Galaxy’s forward Javier Hernández, spends afternoons perfecting dribbles and goal‑keeping drills, and they devote
    weekends to cheering on the Los Angeles Dodgers while sprinting through desert trails to stay fit.
  arts: Michael Arzola, a lively young creator who fills sketchbooks with comic heroes inspired by Stan Lee’s Marvel characters, experiments with watercolor after watching Bob Ross, molds clay figures reminiscent
    of Nathan Sawaya’s LEGO sculptures, and they dance to the rhythm of salsa and rumba classics by Celia Cruz and Marc Anthony during family gatherings.
  travel: Michael Arzola, an adventurous 7‑year‑old who spends Saturdays trekking desert trails in the Mojave near Hesperia, collects odd rocks and spots desert lizards, and they cherish family road trips
    to Disneyland in Anaheim and the Grand Canyon, dreaming of a future field trip to the Kennedy Space Center to see rockets up close.
  culinary: Michael Arzola, who proudly prepares a peanut‑butter‑and‑jelly sandwich with a side of carrot sticks, loves devouring pepperoni pizza topped with extra mozzarella, and they delight in homemade
    nachos featuring melted cheddar, jalapeños, and mild salsa after a day of LEGO building, while occasionally demanding a bowl of chicken‑tortilla soup when the family gathers for a salsa‑filled dinner.
  core: Michael Arzola, a curious and competitive 7‑year‑old, transforms desert discoveries, comic sketches, and LEGO constructs into a nonstop quest for colorful invention, and they balance a skeptical
    eye toward others with an unshakable, energetic optimism.
background:
  cultural: Michael’s Cuban heritage is a vivid part of his daily life. At home his parents speak Spanish, share stories of Cuba, and celebrate cultural holidays with traditional foods like pastelitos,
    rice and beans, and plantain fritters. Family gatherings often feature lively salsa and rumba music, which Michael loves to dance to. He has learned simple Spanish phrases and enjoys teaching his friends
    a few words. While growing up in Hesperia, California, he blends this rich cultural background with the desert‑inspired outdoor lifestyle of Southern California, participating in community events and
    school activities that expose him to a diverse blend of cultures. This mix of Cuban traditions and the multicultural environment of San Bernardino County shapes his identity and fuels his curiosity
    about the world.
