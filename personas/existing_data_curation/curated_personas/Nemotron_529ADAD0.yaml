    ''Vendor negotiations and procurement'']'
  hobbies: '[''Model railroading'', ''Gardening'', ''Woodworking'', ''Historical nonfiction reading'', ''Crossword puzzles'', ''Sudoku'', ''Coastal cycling'', ''Community volunteering (tech education)'',
    ''Chess club'']'
  career_goals: Approaching retirement, William aims to transition from day‑to‑day administration to a senior advisory role where he can leverage his experience to shape long‑term IT strategy. His immediate
    goal is to earn a CISSP certification and lead a comprehensive zero‑trust security overhaul for his organization. Over the next two years, he plans to formalize a mentorship program for junior administrators,
    documenting best‑practice workflows that reflect his structured style. Ultimately, William envisions a part‑time consultancy that helps small New England businesses harden their networks while allowing
    him to maintain a balanced work‑life schedule and continue contributing to his community.
