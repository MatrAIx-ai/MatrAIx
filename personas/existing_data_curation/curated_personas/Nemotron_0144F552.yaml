personas:
  professional: Elizabeth Castaneda is a middle‑school coder and environmental‑club coordinator who merges her love for structured mystery stories with practical problem‑solving, as they develop small educational
    games that teach recycling and wildlife preservation.
  sports: Elizabeth Castaneda enjoys weekend hikes on the Ice Age Trail and belongs to the Madison Parks & Rec Nature Walk Club, runs for the middle‑school cross‑country team, follows the Green Bay Packers
    in the fall and the Milwaukee Bucks during basketball season, and treats each outing as a structured way to balance mental focus with physical stamina.
  arts: Elizabeth Castaneda plays piano, favoring Chopin’s Nocturne Op. 27 No. 2 and Beethoven’s “Moonlight Sonata” for their blend of technical precision and expressive nuance, devours mystery novels by
    Agatha Christie and classic works by Jane Austen, writes short stories inspired by Gillian Flynn’s twists, and enjoys indie folk music from Sufjan Stevens and The Lumineers.
  travel: Elizabeth Castaneda prefers organized day trips that blend nature and learning, having explored the Milwaukee Art Museum, the Apostle Islands National Lakeshore, and a weekend road‑trip to Chicago’s
    Shedd Aquarium, while dreaming of a family adventure to Yellowstone National Park and a cultural exchange program in Edinburgh, Scotland.
  culinary: Elizabeth Castaneda enjoys wholesome Midwestern meals, often cooking quinoa‑kale salads with roasted carrots and local honey, homemade apple crisp with fresh apples from the Dane County Farmers’
    Market, and cheese‑curd grilled sandwiches, while experimenting with piano‑themed cupcakes that feature vanilla, cinnamon, and a dash of smoked paprika.
  core: Elizabeth Castaneda is an organized teen who balances a love for mystery narratives, bird‑watching precision, and coding curiosity with a habit of staying up late perfecting piano pieces, often
    sacrificing sleep for creative projects.
background:
  cultural: Elizabeth was raised in a middle-class, primarily white family in Madison, Wisconsin, with German-Irish ancestry that emphasized community involvement, punctuality, and self-reliance. Her family
    participates in local traditions such as the Dane County Farmers' Market and community service events, reflecting the Midwestern value of civic engagement. Attending a public middle school exposed her
    to the city’s progressive cultural milieu, which blends academic focus with environmental consciousness. While her household observes mainstream American holidays, they also cherish family gatherings
    that reinforce a blend of cultural heritage and the inclusive, liberal atmosphere of Madison.
