  career_goals: Elizabeth aims to complete high school with strong grades in science and mathematics, then pursue a bachelor's degree in veterinary medicine or biomedical science at the University of Wisconsin-Madison.
    She is motivated by a desire to work with animals and contribute to scientific research that improves health outcomes. In the shorter term, she hopes to earn a certification in pet first aid and take
    on a leadership role in her school's science club. She envisions a career that offers a clear progression, professional stability, and opportunities to apply her practical problem-solving skills.
