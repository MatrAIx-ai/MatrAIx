personas:
  professional: Lagaria Jackson, an aspiring young software creator, builds simple interactive games on Scratch after school, documents each step in a neatly organized journal, shares tutorials at the after‑school
    coding club, and they also enjoy helping classmates troubleshoot code, reflecting their preference for structure and collaborative spirit
  sports: Lagaria Jackson, a forward for the Saint Cloud Youth Soccer Club, follows the tactical style of Minnesota United FC, balances weekly practices with schoolwork by scheduling study sessions after
    games, uses team drills as a structured outlet for energy, and they sometimes forget to stretch, leading to occasional hamstring tightness
  arts: Lagaria Jackson, a dedicated piano player and choir member, spends evenings practicing Beethoven’s Moonlight Sonata and singing contemporary gospel hymns at church gatherings, sketching watercolor
    scenes inspired by the Minnesota lakes, devouring YA novels like "The Hate U Give" and "Six of Crows", and they often hum favorite tracks from artists such as Adele and Bruno Mars while drawing
  travel: Lagaria Jackson prefers well‑planned family road trips, has explored the Minneapolis Institute of Art and the Boundary Waters for camping adventures, they dream of visiting New Orleans for its
    live music festivals and Disney World for a break from school routine, but budget constraints keep most vacations within the Upper Midwest
  culinary: Lagaria Jackson enjoys cooking comforting meals like mac and cheese spiced with smoked paprika, perfecting chicken fried rice with extra vegetables, baking chocolate chip cookies while listening
    to soulful playlists, and they often experiment with fresh herbs like basil and cilantro in their watercolor‑inspired salad creations
  core: Lagaria Jackson blends a love for organized creativity with a community‑first mindset, juggling coding projects, piano practice, and soccer commitments while they occasionally stay up late to finish
    sketches and impulsively buy the latest art supplies
background:
  cultural: Lagaria is an African‑American teenager growing up in Saint Cloud, Minnesota. Her family celebrates cultural traditions through church gatherings, music, and community events, often blending
    contemporary Black cultural influences with Midwestern values. She experiences a supportive extended family network that emphasizes education, mutual respect, and community service, while also navigating
    the dynamics of being a minority in a predominantly white region, which reinforces her empathy and desire for inclusion.
attributes:
  skills: '[''Effective written and verbal communication'', ''Organizational planning for school projects'', ''Basic computer skills (word processing, internet research, Scratch coding)'', ''Collaborative
