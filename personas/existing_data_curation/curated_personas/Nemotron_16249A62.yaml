  hobbies: '[''Reading young adult literature'', ''Sketching and watercolor painting'', ''Playing piano'', ''School choir participation'', ''Community soccer league'', ''Journaling'', ''Coding simple games
    with Scratch'']'
  career_goals: Lagaria aims to graduate high school with strong grades, pursue a college degree in education or social work, and ultimately become a teacher or school counselor who can support other students
    academically and emotionally. She is also interested in community health initiatives and envisions a role where she can combine her caring nature with practical problem‑solving, such as working in a
    youth outreach program or becoming a pediatric nurse assistant in the future.
