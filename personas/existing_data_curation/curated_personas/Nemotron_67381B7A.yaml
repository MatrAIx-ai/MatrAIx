  career_goals: Ricardo dreams of a future where he can help others and apply his love for order and building. He has expressed interest in becoming a firefighter, attracted by the clear routines, teamwork,
    and community service involved. He also imagines designing and constructing things, so he aspires to be a mechanical engineer or a robotics specialist when he grows older. In the short term, he aims
    to keep improving his school performance, join the school’s robotics club, and continue developing his problem‑solving skills.
