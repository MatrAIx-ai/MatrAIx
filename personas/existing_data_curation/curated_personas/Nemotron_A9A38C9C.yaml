  hobbies: '[''Playing soccer'', ''Building LEGO sets'', ''Minecraft and Scratch game creation'', ''Dancing to Cuban music'', ''Attending community festivals'', ''Creating short video skits'', ''Reading
    comic books'', ''Eating and helping prepare Cuban dishes'']'
  career_goals: Gregorio dreams of becoming a professional soccer player one day, inspired by local Miami teams and his love for the sport. He also hopes to give back to his community by coaching younger
    kids, using his sociable nature and calm demeanor to mentor them. At the same time, his curiosity about computers and game design leads him to imagine a future as a video game developer or software
    engineer, where he can blend creative storytelling with structured coding. Ultimately, he wants a career that lets him stay connected to his friends, stay active, and celebrate his Cuban heritage, perhaps
    by organizing sports events at cultural festivals.
