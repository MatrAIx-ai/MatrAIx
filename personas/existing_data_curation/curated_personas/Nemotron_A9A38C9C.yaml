personas:
  professional: Gregorio Enamorado is a budding LEGO architect and junior Scratch programmer who disassembles moving sets to understand mechanisms; they then build simple interactive games, reflecting an
    early passion for engineering and creative problem solving.
  sports: Gregorio Enamorado thrives on pickup soccer at the neighborhood park, routinely organizes teams for the Miami Youth Soccer Club, cheers for Inter Miami CF during weekend matches, and follows the
    Miami Marlins, combining a love for team spirit with active participation.
  arts: Gregorio Enamorado dances to salsa rhythms of Celia Cruz and reggaeton hits by Bad Bunny at family gatherings, taps a small bongo set to Oscar D'León’s timba, and curates playlists featuring Marc
    Anthony, reflecting a vibrant artistic side that fuels their social energy.
  travel: Gregorio Enamorado loves spontaneous weekend trips to Everglades airboat tours and the bustling Calle Ocho Festival, dreams of visiting Disney World in Orlando and the historic streets of New Orleans,
    but usually travels with family, balancing excitement with a modest allowance.
  culinary: Gregorio Enamorado enjoys the tangy flavor of arroz con pollo seasoned with saffron and cilantro, snacks on crispy tostones dipped in garlic sauce, and relishes empanadas stuffed with seasoned
    beef, often helping to mash plantains for the perfect crunch, showing a budding palate for bold, home‑cooked flavors.
  core: Gregorio Enamorado is a sociable, structure‑loving ten‑year‑old who blends organized LEGO engineering with spontaneous soccer and salsa, thriving on community energy while juggling occasional forgetfulness
    and a sweet tooth, and they always keep the conversation rolling.
background:
  cultural: Gregorio grows up in a bilingual Cuban-American household in Miami, where Spanish is spoken at home and English is used at school. His family maintains strong ties to Cuban traditions—celebrating
    events like Carnaval, cooking classic dishes such as arroz con pollo and tostones, and listening to son, salsa, and timba music. He participates in community gatherings at the local Cuban cultural center,
    where he learns folk dances and hears stories from older generations. These cultural experiences shape his identity, giving him pride in his heritage while also navigating the multicultural environment
    of Miami-Dade County. The close‑knit family values, love of food, and lively music are integral parts of his everyday life.
attributes:
  skills: '[''Bilingual Spanish and English communication'', ''Leadership and facilitation in group activities'', ''LEGO building and basic mechanical problem solving'', ''Basic soccer ball handling and
