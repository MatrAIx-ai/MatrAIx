personas:
  professional: Monira Narang, a 2‑year‑old who meticulously lines up her toy cars by size and color, showcases early organizational and leadership instincts that foreshadow a future in event planning.
  sports: Monira Narang, age 2, bursts with energy at her Tiny Sprinters toddler soccer practice each spring and delights in cheering for the River City Tigers during NFL games, while summer sees her joining
    the splash‑filled water‑play group at the local pool.
  arts: Monira Narang, a 2‑year‑old, sings along to The Wiggles' "Fruit Salad" and watches Sesame Street with fascination, while proudly pointing out the bold, collage‑style illustrations of Eric Carle
    in picture books during storytime.
  travel: Monira Narang, 2, enjoys family road trips to the Clearwater beach where she builds sand castles, loves the interactive exhibits at San Diego Zoo, and dreams of a future adventure to Disneyland
    Paris and the Eiffel Tower when she’s a bit older.
  culinary: Monira Narang, age 2, prefers creamy macaroni‑and‑cheese flavored with cheddar, delights in banana‑pancake stacks drizzled with honey, and happily munches on fresh strawberry slices, often insisting
    on the bright red pieces.
  core: Monira Narang, a 2‑year‑old bundle of structured curiosity, balances an innate love for order and social play, occasionally swapping a nap for an extra block‑building session.
background:
  cultural: Monira comes from a South Asian immigrant family that settled in New York City. Her home blends English with her parents' native language (e.g., Bengali or Hindi), and she participates in cultural
    celebrations such as Diwali and Eid. The family enjoys South Asian cuisine, visits community cultural centers, and maintains close extended-family ties, providing a rich multicultural environment that
    shapes her values of community, respect, and celebration of heritage.
