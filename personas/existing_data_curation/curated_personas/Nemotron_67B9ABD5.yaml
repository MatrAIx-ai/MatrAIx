personas:
  professional: Claire Farr is a methodical full‑stack software developer who writes clean Java, C#, Python, and JavaScript code, excels at debugging legacy systems, leads Agile sprint planning, and leverages
    their curiosity and competitive streak to mentor junior engineers while shaping system architecture with a focus on reproducible processes.
  sports: Claire Farr maintains a methodical fitness routine that includes weekly hikes on the Sierra Nevada with the Reno Trailblazers hiking club, occasional ski trips to Lake Tahoe in winter, and they
    follow the Reno Aces baseball and Vegas Golden Knights hockey teams, viewing their outdoor activities as both a stress‑relief practice and a competitive personal challenge.
  arts: Claire Farr channels their creative curiosity through landscape photography inspired by Ansel Adams, unwinds with mystery novels by Agatha Christie, and curates a personal playlist featuring Miles Davis
    and Bon Iver while occasionally attending Reno art gallery openings and community theater productions of classic Shakespeare.
  travel: Claire Farr adopts a meticulously planned travel style, favoring adventure photography trips like their recent trek through Yosemite and a spring weekend in Patagonia, while also scheduling relaxed
    culinary getaways to Napa Valley, balancing their love of nature with limited family obligations and a moderate retirement budget.
  culinary: Claire Farr’s culinary palate blends a moderate home‑cooking skill with a passion for specialty coffee, and they often brew Ethiopian Yirgacheffe pour‑over while preparing dishes like quinoa‑black‑bean
    bowls with roasted sweet potatoes, cilantro, and a dash of smoked paprika.
  core: Claire Farr balances a competitive, methodical mind with a quiet love for mystery novels, specialty coffee, and sunrise hikes, habitually double‑checking code, budgets, and coffee ratios, yet sometimes
    forgets to schedule their own doctor appointments.
background:
  cultural: Claire grew up in a Midwestern town with a family heritage tracing back to European immigrants, instilling values of hard work, self‑reliance, and community involvement. Relocating to Reno in
    her early thirties, she embraced the independent, frontier spirit of the West while integrating into its burgeoning tech scene. She participates in local traditions such as the Reno River Festival and
    supports regional initiatives that blend technology with community development, reflecting a blend of classic American values and the progressive outlook of her adopted city.
