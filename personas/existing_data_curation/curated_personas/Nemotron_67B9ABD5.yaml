  career_goals: Claire aims to transition into a lead architect role where she can shape system-wide design decisions and champion process improvements across her team. She wants to earn a bachelor’s degree
    in computer science to formalize her knowledge and eventually move into product management, guiding technology strategy for user‑focused applications. Mentoring remains a priority; she plans to develop
    a structured onboarding program for new hires at her company and to sponsor a local coding boot‑camp for underrepresented groups in Reno. Long‑term, she envisions launching a consultancy that helps
    small Nevada businesses modernize their software workflows.
