personas:
  professional: Connie Presher, a 1‑year‑old with a surprising blend of curiosity and practicality, demonstrates early engineering instincts by repeatedly stacking and toppling block towers to explore cause‑and‑effect
    while faithfully adhering to the simple routine of nap time and snack breaks.
  sports: Connie Presher, a 1‑year‑old, loves toddling in the community centre’s baby gymnastics class, eagerly participates in parent‑child swimming sessions, and, via family enthusiasm, proudly chants
    for the Chicago Bulls during televised games, showing an enthusiastic, competitive spirit even in early play.
  arts: Connie Presher, a 1‑year‑old, immerses themselves in the arts through daily sing‑alongs to The Wiggles, bright picture books by Eric Carle, and weekly visits to a children’s theatre production of
    The Very Hungry Caterpillar musical, fostering a vivid imagination and a love for rhythm and colour.
  travel: Connie Presher, a 1‑year‑old, thrives on family road trips to the Grand Canyon and beach stays in San Diego, preferring flexible itineraries that allow spontaneous sand‑pit exploration, yet their
    parents always keep a stroller‑ready packing list to balance their curiosity with practicality.
  culinary: Connie Presher, a 1‑year‑old, enjoys sweet pureed carrots, banana mash, and mild avocado, while often making a delightful mess with finger foods like soft cheese sticks, reflecting an enthusiastic
    but chaotic eating habit that satisfies their curiosity about textures.
  core: Connie Presher, a 1‑year‑old explorer, balances relentless curiosity with a love for routine, turning everyday moments into playful experiments while delighting in group play and occasional stubbornness.
background:
  cultural: Connie is raised in a white, Alaskan family in Wasilla, within the Matanuska-Susitna Borough. Her household values self-reliance, outdoor recreation, and community involvement typical of the
    region’s frontier heritage. Family traditions include seasonal celebrations of the long summer days, gatherings around the fire pit, and participation in local festivals that emphasize Alaskan wildlife
    and the rugged landscape. These cultural influences shape her emerging identity and appreciation for the natural world.
