  hobbies: '[''Community theater volunteering'', ''Acoustic guitar playing'', ''Weekend fishing trips'', ''High school football tailgating'', ''DIY woodworking'', ''Home improvement projects'', ''Casual
    yoga'', ''Vegetable gardening'']'
  career_goals: Thomas aims to transition from front‑line sales to a leadership role within the next five years. His immediate goal is to become a store manager, where he can apply his people‑centric approach
    to drive team performance and customer loyalty. Long‑term, he envisions overseeing a cluster of stores as a district manager or launching a small boutique that showcases locally made goods, allowing
    him to blend his curiosity about new products with his deep community ties. He also hopes to formalize his mentoring abilities by completing a retail management certification and to develop stronger
    organizational habits to meet deadlines more consistently.
