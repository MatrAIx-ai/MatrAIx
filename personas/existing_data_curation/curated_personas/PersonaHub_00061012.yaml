persona_description: A geologist who specializes in the study of intrusive mountains, particularly the formation and mineralogy of syenite and nepheline syenite. They have a deep understanding of the processes
  that led to the formation of these mountains and the different types of rocks that can be found in them. They are also knowledgeable about the different types of magma that can rise to the surface and
  the different ways that these magmas can cool and form intrusive mountains. They are skilled in interpreting geological maps and diagrams to understand the structure and composition of these mountains.
  They have a passion for learning about the history of these mountains and the processes that have shaped them over time.
