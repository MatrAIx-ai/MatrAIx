  hobbies: '["Leading a women''s book club", "Latin‑inspired dance classes", "Gardening and vegetable growing", "Cooking Southern cuisine", "Hiking at Stone Mountain Park", "Volunteering for community health
    screenings", "Supporting the Atlanta Falcons", "Attending live jazz concerts", "Digital photography", "Participating in local cultural festivals"]'
  career_goals: She aims to advance to a senior executive role such as Director of Operations or Vice President of Clinical Services within a major health system in the Southeast. Over the next five years
    she plans to earn a bachelor’s degree in health administration and complete a Master of Public Health, while obtaining the Certified Healthcare Management (CHCM) credential. Her long‑term ambition is
    to launch a community‑focused health clinic in DeKalb County that reduces health disparities for underserved African‑American populations. She also hopes to mentor emerging Black health‑care leaders
    and champion organizational policies that promote diversity, equity, and inclusion.
