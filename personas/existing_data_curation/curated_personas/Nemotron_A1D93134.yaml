personas:
  professional: Shania Savage is a senior clinic operations manager who blends data‑driven curiosity with practical budgeting, leading quality‑improvement projects while fostering interdisciplinary collaboration
    and balancing meticulous planning with the flexibility needed for a fast‑moving health‑care environment.
  sports: Shania Savage is an avid Atlanta Falcons fan who never misses a Sunday game, hikes the rugged trails of Stone Mountain Park every other weekend, and participates in a local women's hiking club
    that organizes charity 5K runs, balancing team spirit with personal fitness.
  arts: Shania Savage indulges in live jazz at Atlanta’s Velvet Note, experiments with digital photography inspired by the work of Sebastião Salgado, and incorporates the rhythmic energy of Latin dance
    into her creative expression, often displaying her photographs at community art shows.
  travel: Shania Savage prefers a mix of carefully planned road trips to Southern gems like Asheville and New Orleans and spontaneous weekend getaways to the Great Smoky Mountains, using airline miles and
    a modest travel budget to explore culture while honoring family commitments.
  culinary: Shania Savage excels at cooking wholesome Southern dishes such as collard greens, jambalaya, and roasted sweet potatoes harvested from her own garden, infusing them with Latin spices like cumin
    and cilantro, and enjoys experimenting with new recipes discovered in her book club’s literature discussions.
  core: Shania Savage blends health‑care leadership with Southern hospitality, salsa rhythms, and a data‑driven curiosity, turning professional ambition into community action while staying socially active
    and delightfully unpredictable.
background:
  cultural: Shania’s cultural identity is rooted in the African‑American community of Atlanta, especially the historically Black neighborhoods of DeKalb County. Raised by parents who emphasized faith, education,
    and community service, she remains an active member of her Baptist church, where she volunteers in health‑education programs and choir. Her family traditions include celebrating Juneteenth and Kwanzaa,
    preserving Southern soul‑food recipes, and sharing stories of the civil‑rights movement that shaped her hometown. She draws strength from the collective resilience of Black Atlantans and seeks to incorporate
    that legacy into her professional mission of reducing health inequities.
