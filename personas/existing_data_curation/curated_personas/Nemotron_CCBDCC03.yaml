  hobbies: '[''Youth Football Coaching'', ''Bass Guitar Playing'', ''Blues & Soul Jam Sessions'', ''Barbecue Smoking'', ''Gardening'', ''Community Potlucks'', ''Juneteenth Celebrations'', ''Local Craft
    Fairs'']'
  career_goals: Jacob aims to expand his solo carpentry operation into a modestly sized remodeling firm that offers full‑service kitchen and bath renovations. He plans to obtain a Texas Residential Builder’s
    License and become an active member of the local union leadership to influence training standards. Competitive by nature, he seeks to win larger contracts in the Rockwall County area, eventually hiring
    and mentoring a crew of apprentices. Long‑term, Jacob dreams of opening a showroom for his custom furniture line, showcasing his craftsmanship while preserving the structured, high‑quality reputation
    he has built.
