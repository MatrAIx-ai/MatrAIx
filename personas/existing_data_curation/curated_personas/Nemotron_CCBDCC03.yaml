personas:
  professional: Jacob Quinzy is a seasoned carpenter with 30+ years of residential and commercial construction experience, mastering structural framing, custom cabinets, and blueprint interpretation, while
    leveraging their competitive drive and sociable leadership to mentor apprentices, maintain strict safety standards, and coordinate between clients and subcontractors, all toward expanding into a remodeling
    firm and a custom furniture showroom.
  sports: Jacob Quinzy stays active by coaching a youth football team at their church, attending weekly flag‑football pickup games, and rooting for the Dallas Cowboys and Dallas Mavericks, while occasionally
    joining a local weekend cycling club to balance the physical demands of carpentry, and they view fitness as a disciplined routine much like a construction schedule.
  arts: Jacob Quinzy channels creativity through bass guitar in a Dallas blues‑soul jam group, drawing inspiration from icons like B.B. King, Gary Clark Jr., and Susan Tedeschi, while regularly attending
    live shows at the Granada Theater and the Kessler Theater, and they also appreciate visual arts at the Dallas Museum of Art’s African‑American exhibits during community craft fairs.
  travel: Jacob Quinzy prefers road‑trip adventures that combine food, music, and history, planning detailed itineraries for weekend getaways to places like Austin’s South by Southwest festival, New Orleans
    for authentic Cajun BBQ, and the Texas Hill Country’s wineries, while dreaming of a future pilgrimage to Memphis to explore the blues heritage of Beale Street.
  culinary: Jacob Quinzy’s culinary pursuits center on mastering Texas BBQ, perfecting a signature rub featuring smoked paprika, brown sugar, and ancho chilies for brisket and ribs, while supplementing
    flavors with garden‑fresh herbs like rosemary and cilantro, and they also enjoy cooking soul‑food classics such as collard greens with smoked turkey and corn bread for potluck gatherings.
  core: Jacob Quinzy blends a disciplined carpenter’s mindset with a sociable, competitive spirit, turning workshops, blues jams, and BBQ pits into stages where precision meets performance, even if they
    occasionally forget to floss amid a busy schedule.
background:
  cultural: Jacob grew up in a close‑knit African‑American family in the Dallas‑Fort Worth metroplex, with deep roots in the South that trace back to the Great Migration. His parents emphasized hard work,
    faith, and community service, values reinforced by active participation in the Southern Baptist church. The cultural heritage of soul music, Southern cuisine, and historic civil‑rights traditions informs
    his worldview and daily interactions. Living in Royse City, he blends this rich cultural legacy with the Texan ethos of self‑reliance, fostering strong ties to both his local neighborhood and broader
    African‑American networks throughout North Texas.
attributes:
  skills: '[''Structural Framing'', ''Finish Carpentry'', ''Custom Cabinetry'', ''Blueprint Reading'', ''Project Scheduling'', ''Team Leadership'', ''Safety Compliance'', ''Cost Estimation'', ''Woodworking
