personas:
  professional: Steven Mcgurk, a 27‑year‑old IT and information systems manager in Nashville, leverages razor‑sharp organizational skills and a competitive drive to design airtight cloud and cybersecurity
    architectures while consistently hunting high‑visibility projects that showcase their pragmatic curiosity and habit of scrutinizing teammates’ motives before delegating.
  sports: Steven Mcgurk, an avid basketball player for the Nashville Knights amateur league, regularly laces up for weekend hikes across the Cumberland Plateau, while cheering on the Nashville Predators
    and attending Nashville SC matches as their go‑to team‑spirit outlets.
  arts: Steven Mcgurk, a self‑taught guitarist, immerses themselves in Nashville’s vibrant music scene—home‑brewing jam sessions to the tunes of Chris Stapleton, Alison Krauss, and Dolly Parton, catching
    live sets at the historic Ryman Auditorium and the intimate Bluebird Café, and channeling that southern harmony into their own songwriting during tech meetups.
  travel: Steven Mcgurk plans their getaways with the same spreadsheet precision they use at work, alternating weekend road trips to Asheville’s blue‑ridge hikes and music‑filled nights in Austin’s South‑by‑Southwest,
    while saving for a longer‑term tech‑conference stint in Dublin that satisfies their blend of adventure and professional curiosity.
  culinary: Steven Mcgurk, an enthusiastic home cook, regularly perfects Nashville‑style hot chicken, slow‑smoked BBQ ribs with a secret hickory‑chip rub, and buttery buttermilk biscuits, often adding a
    dash of their own cayenne‑infused honey glaze to elevate classic Southern dishes.
  core: Steven Mcgurk, a 27‑year‑old Nashville tech manager who balances disciplined pragmatism with restless curiosity, channels their competitive edge into building secure cloud solutions, mastering guitar
    riffs, and heading off‑beat basketball games while never missing a chance to savor a hot‑chicken dinner.
background:
  cultural: Steven grew up in a middle‑class family in the Nashville metropolitan area, absorbing the Southern hospitality and community spirit that define the region. His cultural identity blends traditional
    Southern values—strong work ethic, friendliness, and a love for music—with a modern, tech‑savvy outlook. He enjoys country and bluegrass music, Southern cuisine, and participates in local festivals,
    while also being an active member of Nashville's growing tech community. His ancestry includes Irish and Anglo‑American roots common among white families in the area, but he identifies most strongly
    with the inclusive, innovative vibe of his hometown.
