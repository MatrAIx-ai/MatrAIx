personas:
  professional: Zoua Mai is a teenage strategist who channels her organized, competitive nature into school chess tournaments, develops Python automation scripts that streamline class assignments, and tutors
    younger students in mathematics, revealing her methodical, practical skill set.
  sports: Zoua Mai swims three times weekly with the Lakeside Aquatics Club, competes in school swim meets, and passionately follows the Boston Red Sox and the Golden State Warriors, keeping her fitness
    routine structured and her competitive spirit alive.
  arts: Zoua Mai devours science‑fiction novels by Isaac Asimov, draws inspiration from Ludovico Einaudi’s ambient piano compositions, and attends her school’s theater productions of Shakespeare’s plays,
    satisfying her analytical curiosity and love for narrative structure.
  travel: Zoua Mai meticulously plans weekend trips using a spreadsheet, favors culturally rich destinations such as Kyoto, Japan and Reykjavik, Iceland, and balances her limited teen budget and school
    commitments while dreaming of a future study‑abroad program in Europe.
  culinary: Zoua Mai enjoys cooking precise traditional Southeast Asian dishes like Pad Thai with tamarind paste, fresh cilantro and Thai basil, and meticulously bakes chocolate chip cookies measured to
    the gram, reflecting her love for order in the kitchen.
  core: Zoua Mai is a methodical teen strategist who balances competitive chess, disciplined swimming, and meticulous coding with a love for structured learning, all while obsessively organizing every facet
    of life and occasionally procrastinating on household chores.
background:
  cultural: Zoua Mai is a second‑generation Southeast Asian American; her parents immigrated from Vietnam and maintain a bilingual household where Vietnamese is spoken alongside English. Family life emphasizes
    respect for elders, a strong work ethic, and high educational expectations. Cultural traditions such as Tet (Lunar New Year) and the Mid‑Autumn Festival are celebrated at home, often with communal meals
    and traditional music. Her parents run a small family-owned business, instilling practical values and a sense of responsibility. Living in Suffern, NY, Zoua attends the local public middle school, engaging
    with a diverse peer group while staying connected to the regional Vietnamese community through cultural association events, language classes, and community service projects. This blend of heritage and
    suburban American life shapes her values of perseverance, organization, and community involvement.
attributes:
  skills: '["Time management", "Organizational planning", "Data analysis (Excel)", "Basic Python programming", "Critical thinking", "Public speaking (debate club)", "Chess strategy", "Event coordination"]'
