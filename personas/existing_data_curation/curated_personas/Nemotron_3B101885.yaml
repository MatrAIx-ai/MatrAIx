    in school debate club"]'
  career_goals: Zoua aims to attend a high‑school program that offers advanced STEM courses and later enroll in a university with a strong engineering or business curriculum. She is attracted to careers
    that combine structure, precision, and tangible outcomes, such as civil engineering or financial analysis. In the short term, she plans to maintain a high GPA in math and science, earn certifications
    in Autodesk AutoCAD and Microsoft Excel, and secure a summer internship or mentorship with a local engineering firm. Long‑term, she envisions managing large construction projects or leading analytical
    teams, where her organized approach and competitive drive can deliver measurable results. She also hopes to keep her options open for roles in public service, such as a community planning position,
    that align with her desire for order and practical impact.
