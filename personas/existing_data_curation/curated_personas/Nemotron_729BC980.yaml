personas:
  professional: Danny Lawson is a self‑taught full‑stack developer who writes clean Python and JavaScript code, builds React front‑ends and Node.js APIs on AWS, and channels their critical, skeptical mindset
    into rigorous code reviews and performance optimization while balancing curiosity‑driven side projects with a competitive drive to win hackathons and master new technologies.
  sports: Danny Lawson is a weekend kayaker on the Chesapeake Bay who belongs to a local paddle club, occasionally joins friends for a pickup soccer game, and loyally roots for the Baltimore Ravens and
    Orioles while keeping a modest fishing record for striped bass.
  arts: Danny Lawson is an avid board‑game strategist who attends small meet‑ups to dissect mechanics, devours sci‑fi novels by Isaac Asimov and William Gibson, and streams synth‑wave soundtracks from artists
    like Carpenter Brut while appreciating the cinematic scores of Hans Zimmer.
  travel: Danny Lawson is a budget‑conscious explorer who plans weekend trips to historic Annapolis and Washington, D.C., dreams of a tech‑focused pilgrimage to Seattle, and keeps a travel wishlist that
    includes a cultural immersion in Kyoto, all while balancing a part‑time job and hackathon prep.
  culinary: Danny Lawson is a modest home cook who favors Maryland crab cakes seasoned with Old Bay, experiments with IoT‑controlled sous‑vide setups for precise temperature, and pairs their meals with
    a strong black coffee, though they often order pizza after long coding marathons.
  core: Danny Lawson is a reserved, competition‑driven coder who balances relentless curiosity with practical frugality, spends nights tinkering with IoT gadgets, and occasionally forgets to eat or sleep
    while chasing the next hackathon win.
background:
  cultural: Danny grew up in a middle‑class, suburban neighborhood in Chesapeake, Virginia, where the coastal lifestyle and proximity to the Norfolk Naval Base shaped his worldview. His family observes
    typical American holidays and values self‑reliance, curiosity, and practical problem‑solving. The multicultural presence from the nearby military community exposed him to diverse perspectives, fostering
    an openness to new ideas while maintaining a grounded, pragmatic outlook. He enjoys regional seafood cuisine, especially crab cakes, and participates in community events such as the Chesapeake Festival,
    which reinforce his connection to the local environment and community spirit.
