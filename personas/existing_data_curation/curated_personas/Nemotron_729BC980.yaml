  career_goals: Danny aims to transition from a junior developer to a senior engineering role within the next three to five years, eventually moving into a technical architect position where he can design
    large‑scale systems. He is motivated by competition and seeks to win regional hackathons and contribute high‑impact features to open‑source projects. Recognizing his non‑traditional education, he plans
    to earn industry‑recognized certifications (AWS Certified Solutions Architect, Scrum Master) and possibly enroll in a part‑time computer science program to solidify his theoretical foundation. Long‑term,
    Danny aspires to launch a niche SaaS product that leverages his interest in maritime logistics, capitalizing on the proximity to the Chesapeake Bay and the area's shipping industry.
