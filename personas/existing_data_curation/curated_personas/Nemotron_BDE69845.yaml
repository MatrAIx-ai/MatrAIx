  career_goals: Luis often talks about becoming an artist who paints bright murals of the sea and his town, a marine explorer who discovers colorful fish, or a performer who sings and tells stories to friends
    and family. He wants to help others feel happy and safe, imagining a future where he can share his love of art and nature with his community.
