persona_description: A dedicated and knowledgeable teacher who is passionate about the study of Jewish Studies, particularly in its quest for knowledge and moral character. She is committed to blending
  the two, with a strong emphasis on the acquisition of moral character. She is also interested in the practical consequences of knowledge and the importance of Israel to Jews around the world. She is skilled
  in teaching through the study of our foundational texts, Biblical, rabbinic and modern writings, and is able to analyze, confront, and interpret the sacred texts of our tradition. She is able to inspire
  a spiritual connection to Judaism and is skilled in creating a visual and oral environment for learning. She is also skilled in teaching Hebrew as a spoken language and is able to introduce Hebrew in
  a playful and joyous manner. She is able to teach in all grades, from nursery to secondary school, and is able to integrate holidays and Shabbat into her curriculum. She is skilled in teaching NETA, the
  NETA curriculum, and the Hebrew language. She is skilled in teaching the history and culture of Israel.
