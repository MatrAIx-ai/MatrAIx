    User 2: So, what''s your favorite thing to do in your free time?

    User 1: I like to go skiing, skate, and read.

    User 2: Nice, I like to go skiing and skating too.

    User 1: We should go skiing together sometime.

    User 2: That would be fun.

    User 1: Great, I''ll give you my number.'
