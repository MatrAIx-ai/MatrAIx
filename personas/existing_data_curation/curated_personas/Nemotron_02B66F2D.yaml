personas:
  professional: Adam Jefferson, a one‑year‑old burgeoning explorer of cause‑and‑effect, they quietly conduct practical experiments by stacking blocks and turning knobs on every available toy, favoring solo
    play over structured routines while occasionally assertively demanding a second snack, showing early signs of a methodical yet flexible mindset.
  sports: Adam Jefferson, a one‑year‑old who prefers solitary movement, they often crawl around the living room while watching the New York Yankees on television with mom, and attend a parent‑and‑baby gymnastics
    class at Tiny Tots Club, demonstrating a low‑key but enthusiastic engagement with sports through observation and gentle activity.
  arts: Adam Jefferson, a one‑year‑old drawn to vivid colors and simple tunes, they delight in listening to lullabies by Brahms, the children's songs of Raffi, and giggle when Baby Shark plays, while their
    favorite picture book author is Eric Carle, shaping their early artistic sensibility through bright illustrations and melodic repetition.
  travel: Adam Jefferson, a one‑year‑old who has already enjoyed family trips to the local grandparents' farm, a weekend visit to the San Diego Zoo, and a short flight to New York City’s Central Park, they
    now dream of a colorful adventure at Disneyland Paris, balancing curiosity with the comfort of familiar caregivers.
  culinary: Adam Jefferson, a one‑year‑old with a growing palate, they prefer smooth mashed sweet potatoes, ripe avocado purée, and soft banana slices, frequently request warm chicken broth with carrots,
    while showing a quirky habit of clapping whenever a spoon of apple sauce lands on the high‑chair tray.
  core: Adam Jefferson, a one‑year‑old curious yet laid‑back explorer who thrives in quiet solo play, asserts gentle demands for a second snack, giggles at dropped coins, and occasionally rebels at doctors,
    embodying a charming mix of practicality, independence, and endearing stubbornness.
background:
  cultural: Adam is being raised in a Black family in West Philadelphia, where community, music, and storytelling are central. His parents introduce him to gospel and soulful R&B, celebrate African‑American
    holidays such as Juneteenth, and incorporate family meals featuring collard greens and cornbread. The neighborhood church and local community centers provide a sense of belonging, fostering resilience
    and an appreciation for his cultural roots.
