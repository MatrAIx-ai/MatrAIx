  career_goals: Although retired, Nancy’s ambitions focus on maintaining her health, preserving her legacy, and remaining a valued member of her community. She aims to keep physically active through daily
    walks and gardening, sharpen her mind with puzzles and reading, and continue volunteering at the local senior center and community library. Nancy also hopes to complete a memoir that records her family
    history and the cultural changes she witnessed, and to pass on her favorite recipes and craft techniques to her grandchildren and great‑grandchildren.
