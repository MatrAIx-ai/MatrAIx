  career_goals: Rebecca aims to transition gradually from full‑time programming to a mentorship‑focused role, establishing a weekly coding workshop for seniors at the Binghamton public library. She hopes
    to compile an oral‑history archive of early computing projects in Broome County, preserving the legacy of local tech pioneers. Her long‑term ambition includes authoring a memoir that intertwines her
    personal journey with the evolution of programming, and serving on the advisory board of a nonprofit that bridges technology with community development. While mindful of her own stress sensitivity,
    she strives to create supportive, low‑pressure learning environments that empower others.
