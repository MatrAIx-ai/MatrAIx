personas:
  professional: Rebecca Sullivan, a seasoned software developer with five decades of experience spanning COBOL, BASIC, Pascal, Python, and C#, blends meticulous debugging and senior‑friendly UI design to
    mentor junior coders and run low‑pressure workshops at the Binghamton public library, balancing a curiosity for new tools with a practical, organized approach that eases their stress‑prone nature.
  sports: Rebecca Sullivan enjoys leisurely walks on the Susquehanna Trail for bird‑watching, follows the Binghamton Rumble Ponies during baseball season and the New York Knicks in the NBA playoffs, and
    participates in a senior tennis group at the community center, balancing low‑impact activity with fan enthusiasm while maintaining a relaxed, stress‑conscious approach to fitness.
  arts: Rebecca Sullivan regularly attends classical piano recitals featuring Lang Lang and folk concerts by Joan Baez and local bluegrass ensembles, letting the soothing melodies and storytelling counterbalance
    their frequent worries and enrich their quiet evenings.
  travel: Rebecca Sullivan prefers thoughtfully planned, low‑stress trips such as a genealogical pilgrimage to Edinburgh’s National Archives, a summer road‑trip through the Adirondacks, and a nostalgic
    visit to the Computer History Museum in Mountain View, California, balancing their curiosity with the comfort of familiar companions and a modest travel budget.
  culinary: Rebecca Sullivan, an avid gardener, often incorporates fresh rosemary, thyme, and basil from her own plot into herb‑infused salmon and rosemary focaccia, while also enjoying hearty chicken pot
    pie and apple crumble at the nearby farm‑to‑table bistro, though they sometimes over‑season dishes in their quest for flavor.
  core: Rebecca Sullivan blends five decades of coding expertise with a garden‑filled, bird‑watching soul, painstakingly organizing every detail while silently fretting over the next line of code or a missed
    medication dose.
background:
  cultural: Rebecca was born in the early 1940s in upstate New York and grew up during the post‑war era, steeped in a modest, middle‑class Protestant family culture that valued hard work, responsibility,
    and community harmony. As a woman entering the male‑dominated field of computing in the 1960s, she experienced both the challenges of second‑wave feminism and the excitement of early computer innovation.
    Her cultural identity blends a respect for tradition with a curiosity for new ideas, informing her pragmatic yet exploratory mindset. She remains deeply connected to the Binghamton region, its local
    history, and the intergenerational bonds that shape her commitment to teaching and preserving technological heritage.
