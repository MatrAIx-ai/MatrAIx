  career_goals: Over the next few years Derek aims to earn promotion to Sergeant and then Lieutenant within the Salem Police Department, positioning himself to lead a specialized unit such as cybercrime
    or community‑relations. He seeks to integrate data‑driven policing strategies while ensuring ethical standards and community trust. To broaden his strategic capabilities, he plans to complete a master’s
    degree in Public Administration. Long‑term, Derek envisions serving as a Police Commissioner or a consultant on law‑enforcement technology adoption, shaping statewide policies. He also intends to develop
    a mentorship program that trains junior officers in conflict resolution and mental‑health crisis response.
