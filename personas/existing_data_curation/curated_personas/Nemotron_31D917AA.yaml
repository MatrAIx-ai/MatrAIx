  hobbies: '[''Boating'', ''Fishing'', ''Woodworking'', ''Digital photography'', ''Art gallery visits'', ''Community theatre'', ''Bridge'', ''Board games'', ''Senior golf'', ''Yoga'', ''Gardening'', ''Cooking'',
