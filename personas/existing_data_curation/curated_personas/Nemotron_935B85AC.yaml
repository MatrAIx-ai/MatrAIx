personas:
  professional: Brodrick Ward is a budding cost estimator who blends a curious mindset with practical rigor, using ProEst and RSMeans to craft detailed Excel models for material take‑offs and contingency
    planning, while staying adaptable to evolving project scopes and leveraging their outgoing nature to communicate clearly in multidisciplinary teams, though they sometimes over‑analyze line items, a
    habit driven by stress‑induced perfectionism.
  sports: Brodrick Ward is an energetic participant in Gainesville’s intramural basketball league, a regular member of a local hiking club tackling the North Georgia mountains, fervent supporter of the
    Atlanta Falcons, Braves, and Hawks, and a volunteer youth sports tournament organizer, though their competitive edge sometimes sparks heated debates over refereeing calls.
  arts: Brodrick Ward expresses creativity through acoustic guitar, covering songs by Jason Isbell, Brandi Carlile, and The Avett Brothers while snapping landscape photos of Blue Ridge sunsets inspired
    by Ansel Adams, frequently attending live shows at the 529 Club and local coffee houses, and occasionally experimenting with songwriting, though they sometimes procrastinate practice in favor of gaming.
  travel: Brodrick Ward prefers road‑trip adventures that blend hiking in the Blue Ridge Mountains with visits to music‑rich cities like New Orleans and Asheville, plans trips using a spreadsheet to maximize
    budget and coordinate friends’ schedules, dreams of backpacking through the Scottish Highlands, yet current college finances keep travel modest and often limited to weekend getaways.
  culinary: Brodrick Ward loves cooking Southern comfort food, perfecting peach‑glazed BBQ ribs, bourbon‑infused baked beans, and a twist on classic fried chicken drizzled with hot honey, enjoys experimenting
    with smoked paprika, jalapeño, and aged cheddar in collard greens, often hosting friends for weekend cookouts, yet sometimes over‑salts dishes when stressed.
  core: Brodrick Ward is a 19‑year‑old cost‑estimation enthusiast who balances curiosity with practicality, socializes through basketball and guitar, meticulously budgets yet occasionally splurges, manages
    mild anxiety with therapy, and channels Southern hospitality into cooking, hiking, and community volunteering.
background:
  cultural: Brodrick is a white, second‑generation Georgian raised in Gainesville, Forsyth County. His upbringing reflects a blend of traditional Southern values—hospitality, close family ties, church involvement,
    and a love for the outdoors—and exposure to broader perspectives through his college experience. He grew up eating home‑cooked Southern meals, participating in community events like county fairs and
    high‑school sports, and learning the importance of hard work and self‑reliance. Simultaneously, his curiosity drives him to explore new ideas, making him comfortable engaging with diverse viewpoints
    while maintaining an appreciation for his regional heritage.
attributes:
  skills: '[''Cost estimating'', ''ProEst software'', ''RSMeans database'', ''Microsoft Excel modeling'', ''Blueprint and construction drawing interpretation'', ''Quantity take‑offs'', ''Budget forecasting'',
    ''Data analysis and cost trend evaluation'', ''Clear communication of estimates'', ''Team collaboration and project coordination'']'
  hobbies: '[''Basketball (intramural league)'', ''Hiking in North Georgia'', ''Landscape photography'', ''Co‑op online gaming'', ''Acoustic guitar playing'', ''Attending live concerts'', ''Cooking Southern
    cuisine'', ''Community volunteer work (clean‑ups, youth sports)'']'
  career_goals: Brodrick aims to become a senior cost estimator within the next five years, targeting employment with a mid‑size commercial construction firm in Atlanta or the broader Georgia region. He
    plans to earn the AACE Certified Cost Professional (CCP) credential and possibly pursue a bachelor’s degree in construction management. Long‑term, he envisions launching his own cost consulting practice
    focused on sustainable building projects. He also hopes to mentor junior estimators, developing his leadership skills while continuing to refine his technical expertise.
