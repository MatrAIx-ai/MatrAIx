  hobbies: '[''Visiting museums and galleries'', ''Sketching urban landscapes'', ''Spray‑paint mural art'', ''Listening to salsa, reggaetón, and classic rock'', ''Cooking Puerto Rican cuisine'', ''Playing
    basketball'', ''Reading graphic novels'', ''Hiking in state parks'']'
  career_goals: Juan hopes to move beyond labor‑intensive work and become a crew foreman within the next three years. He plans to finish his associate degree in construction management, earn an EPA hazardous‑materials
    certification, and take a leadership‑development course offered by his employer. Long‑term, Juan dreams of launching his own small‑scale remodeling business that specializes in incorporating artistic
    elements—such as decorative concrete finishes, custom woodwork, and mural‑friendly wall surfaces—into residential projects. He sees his artistic curiosity as a differentiator that could attract clients
    who want functional spaces with a creative flair. He also wants to achieve a more stable income that reduces his current financial stress and allows him to support his aging parents in Puerto Rico.
