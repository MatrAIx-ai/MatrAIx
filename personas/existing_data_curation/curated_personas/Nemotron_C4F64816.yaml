personas:
  professional: Juan Rodriguez is a seasoned construction tradesperson in Reading, Pennsylvania, whose expertise in framing, concrete finishing, drywall installation, and basic electrical rough‑ins is blended
    with a bold artistic curiosity that leads them to experiment with mural‑compatible wall surfaces, and they aim to become a crew foreman within three years while leveraging their bilingual communication
    skills to bridge diverse crews.
  sports: Juan Rodriguez frequents the neighborhood basketball court after shifts, cheering for the Philadelphia 76ers and following the Reading Fightin Phils during summer, while also lacing up for weekend
    hikes in Ricketts Glen State Park, preferring spontaneous pick‑up games over regimented gym workouts.
  arts: Juan Rodriguez is a regular at the Reading Public Museum and local galleries, sketching street scenes in a battered notebook during lunch breaks, creating spray‑paint murals inspired by the stencil
    boldness of Banksy and the vibrant palettes of Latin‑American street artists, and curating playlists that swing from Celia Cruz to Bad Bunny to Led Zeppelin.
  travel: Juan Rodriguez favors spontaneous road trips to the Pocono Mountains and occasional day trips to New York City for vinyl hunting, while dreaming of a longer cultural immersion in San Juan, Puerto
    Rico to reconnect with family, balancing tight budgeting with a desire for both adventure and relaxation.
  culinary: Juan Rodriguez cooks Puerto Rican comfort foods such as arroz con gandules, pasteles, and mofongo with a confident home‑chef flair, seasoning with sofrito, adobo, and recaito, while also indulging
    in late‑night pepperoni‑and‑anchovy pizza slices after night shifts, and they love sharing these meals at potluck gatherings with friends.
  core: Juan Rodriguez blends a restless curiosity for art with a laid‑back, sometimes chaotic work ethic, constantly juggling sketchbooks, construction tools, and worry‑filled spreadsheets, all while humming
    salsa beats over a backdrop of concrete dust.
background:
  cultural: Juan is a second‑generation Puerto Rican American. His parents emigrated from San Juan after serving in the U.S. Navy, and they raised him in a bilingual household where Spanish was spoken at
    home and English at school. He grew up celebrating traditional holidays such as Three Kings' Day and the Puerto Rican “Fiestas de la Calle San Sebastián” with extended family gatherings, which included
    music, dancing, and feasting on lechón. The rhythmic beats of salsa and bomba have shaped his musical taste, while his family's recipes keep him connected to the island’s culinary heritage. Living in
    Reading, PA, Juan has integrated into a multicultural community, but he remains proud of his island roots, often traveling back to Puerto Rico to visit relatives and maintain cultural ties. His cultural
    identity influences his worldview, emphasizing family loyalty, community solidarity, and a love for vibrant, expressive art forms.
attributes:
  skills: '[''Framing'', ''Concrete mixing and finishing'', ''Drywall installation'', ''Basic electrical and plumbing rough‑ins'', ''Blueprint reading'', ''OSHA safety compliance'', ''Forklift operation'',
