  career_goals: Now semi‑retired, Lessy aims to channel her extensive experience into mentoring emerging administrative professionals through local community workshops and one‑on‑one coaching. She aspires
    to volunteer as a records‑keeping consultant for small nonprofit organizations, helping them modernize their workflows while preserving their mission‑critical data. A personal ambition is to author
    a memoir that intertwines her Cuban culinary heritage with the lessons she learned in corporate administration, thereby preserving family stories for future generations. She also plans to stay intellectually
    active by exploring AI‑assisted scheduling tools and incorporating them into her mentorship curriculum.
