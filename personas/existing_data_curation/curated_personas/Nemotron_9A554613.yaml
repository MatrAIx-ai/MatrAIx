personas:
  professional: An aspiring dramatist and debater, Stephanie Johnson blends curiosity for mystery narratives with a disciplined, organized approach to school projects; they lead their robotics club’s Scratch
    and LEGO builds while captivating classmates with confident, talkative presentations.
  sports: An energetic middle‑school athlete, Stephanie Johnson plays on the school’s volleyball team, enjoys weekly ice‑skating sessions at the local rink, roots for the Detroit Lions and Red Wings, and
    they incorporate a disciplined warm‑up routine inspired by their organized nature.
  arts: A creative storyteller, Stephanie Johnson thrives in drama club productions and debate tournaments, immerses themselves in mystery novels by Agatha Christie and Stephen King, and they draw inspiration
    from performers like Lin‑Manuel Miranda and the pop‑rock sounds of Taylor Swift during free‑time writing.
  travel: A curious explorer, Stephanie Johnson plans weekend getaways to lakefront cabins and the county fair, dreams of visiting Mackinac Island’s historic streets and Detroit’s museums, and they balance
    travel enthusiasm with school obligations and family budget constraints.
  culinary: A budding home chef, Stephanie Johnson enjoys baking chocolate‑chip cookies and oatmeal‑raisin bars with family, experiments with homemade pizza topped with fresh basil and mozzarella, and they
    often add a dash of cinnamon to apple crisp for extra flavor.
  core: Stephanie Johnson is a sociable, ultra‑organized 13‑year‑old who juggles drama performances, robotics projects, and community clean‑ups with a penchant for perfecting chocolate chip cookies, and
    they have a habit of over‑packing their backpack for any outing.
background:
  cultural: Stephanie was raised in Davison, a small town in Lapeer County, Michigan. Her family reflects typical Midwestern values, emphasizing community involvement, hard work, and education. She celebrates
    traditional American holidays such as Thanksgiving and the Fourth of July with family gatherings and local festivities. Seasonal activities like ice skating in winter, attending county fairs in summer,
    and exploring nearby lakes are a regular part of her upbringing. The local public school system and church community have shaped her social outlook, fostering a strong sense of civic responsibility
    and collaboration.
attributes:
  skills: '["Organizational planning", "Public speaking", "Peer tutoring (math and science)", "Event coordination", "Basic coding (Scratch)", "Research and writing", "Team collaboration", "Time management",
