  hobbies: '["Drama club and theater productions", "Debate team", "Reading mystery novels", "Creative writing/journaling", "Robotics and Scratch programming", "Community clean‑up volunteering", "Baking
    cookies with family", "Volleyball"]'
  career_goals: Stephanie aims to become an educator or school administrator who can inspire, organize, and support students. She also envisions leading community‑service initiatives, perhaps as a youth
    program director. In the short term, she plans to excel academically, earn a scholarship to a top high school, and serve as student council president. Long‑term, she sees herself in education leadership,
    public relations, or event planning, roles that combine her organizational talent with her love for interacting with people and making a positive impact.
