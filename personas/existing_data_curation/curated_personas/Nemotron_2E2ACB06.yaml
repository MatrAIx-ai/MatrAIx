  hobbies: '[''oil painting'', ''watercolor landscape painting'', ''bird watching'', ''nature photography'', ''gardening'', ''reading science‑fiction'', ''reading philosophy'', ''reading poetry'', ''chess'',
    ''cooking Lowcountry cuisine'', ''volunteering at historical society'']'
  career_goals: Even in retirement, Dennis aims to leave a lasting legacy that unites his technical expertise with his artistic passions. He plans to author a memoir‑style book that chronic‑lels his career
    in engineering while highlighting the unifying role of creativity in problem‑solving, complemented by a portfolio of coastal‑inspired paintings. He hopes to establish a community outreach program at
    the local library that offers joint STEM‑art workshops for seniors and youth, fostering intergenerational learning and environmental stewardship. Additionally, he aspires to volunteer as a consultant
    for low‑country conservation projects, using his engineering background to help protect the marshes and waterways he loves, while also creating a small scholarship for local students interested in interdisciplinary
    studies.
