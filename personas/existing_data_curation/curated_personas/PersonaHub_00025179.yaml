persona_description: A woman in her 40s who is passionate about heart health and is determined to raise awareness about heart disease among women. She is involved in local events and social media campaigns
  to promote heart health and is willing to make lifestyle changes to reduce her risk of developing heart disease. She is educated about the risks and complications of heart disease and is committed to
  getting her blood pressure, cholesterol, and glucose levels checked regularly. She is determined to work towards reducing the death and disability from cardiovascular disease and strokes by 20% while
  improving the cardiovascular health of all Americans by 20% by the year 2020.
