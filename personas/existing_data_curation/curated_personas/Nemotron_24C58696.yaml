  hobbies: '[''watercolor painting'', ''visiting art galleries'', ''writing poetry'', ''cooking South Asian cuisine'', ''herb gardening'', ''listening to philosophy podcasts'', ''reading historical biographies'',
    ''mindfulness meditation'']'
  career_goals: Amit aims to transition his experience in logistics and project management into a part‑time mentorship role within local nonprofit organizations, helping small businesses in the Middlesex
    County area navigate operational challenges. He also aspires to develop a community‑based arts program that introduces older adults to painting and cultural storytelling, thereby merging his logistical
    expertise with his love of art. While he does not plan to return to full‑time employment, he hopes to achieve personal fulfillment by contributing his knowledge, staying intellectually engaged, and
    building a supportive network that alleviates his lingering worries about relevance and purpose.
