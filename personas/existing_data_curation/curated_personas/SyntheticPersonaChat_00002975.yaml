data:
  user 1 personas: 'I am a mother of three.

    I am bipolar.

    I love to eat pita bread with hummus.

    I am thinking of becoming a mother next year.

    I go to work early in the morning as a nurse.'
  user 2 personas: 'I have perfect pitch.

    I have been published in the new yorker magazine.

    I have a severe phobia of wide open spaces.

    I am a gourmet cook.

    As a child , i won a national spelling bee.'
  Best Generated Conversation: 'User 1: Hi! I''m a mother of three and I''m a nurse. I love to eat pita bread with hummus. I''m thinking of becoming a mother next year.

    User 2: Hi! I''m a gourmet cook with perfect pitch and I have been published in the New Yorker magazine. I have a severe phobia of wide open spaces and I won a national spelling bee as a child.

    User 1: That''s so interesting! I''ve never met anyone with a phobia of wide open spaces before. What''s that like?

    User 2: It''s very scary. I get really anxious and panicky when I''m in a wide open space. I can''t even go to the beach without feeling like I''m going to have a heart attack.

    User 1: I''m so sorry to hear that. I can''t imagine what that must be like.

    User 2: It''s not easy, but I''m learning to manage it. I''ve been seeing a therapist and I''m taking medication. It''s been helping a lot.

    User 1: I''m glad to hear that. It''s great that you''re getting the help you need.

    User 2: Thanks. I''m also a gourmet cook. I love to experiment with new recipes and ingredients. I''m always looking for new ways to impress my friends and family.

    User 1: That sounds amazing! I love to cook too. I''m not as good as you, but I''m getting better.

    User 2: I''m sure you''re a great cook!

    User 1: Thanks! I''ve been published in a few magazines, but nothing as big as the New Yorker. That''s incredible!

    User 2: Thanks. It was a lot of hard work, but it was worth it.

    User 1: I bet it was. It''s always amazing to see your work in print.

    User 2: It is. It''s a great feeling.

    User 1: I''m sure you''re a great writer.

    User 2: Thanks. I try my best.

    User 1: I''m sure you''re doing a great job.

    User 2: Thanks!

    User 1: What''s your favorite thing to cook?

    User 2: I love to make pasta dishes. I love the way the sauce can be so different and creative.

    User 1: I love pasta too! I love all the different kinds of noodles and sauces.

    User 2: Me too! I could eat pasta every day.

    User 1: Me too! I''m so glad we met.

    User 2: Me too! I think we''re going to be good friends.

    User 1: I think so too!'
