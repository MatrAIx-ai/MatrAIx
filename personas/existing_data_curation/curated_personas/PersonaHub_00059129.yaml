persona_description: A team of scientists from five Welsh universities who are conducting a study on the impact of tidal energy generation on Pembrokeshire's coastal and marine environments, using 3D models
  and research vessels to monitor the trial of a newly designed underwater tidal generator and its impact on the region's ecosystems. The team is committed to making an independent and impartial assessment
  of the effects of tidal energy generation and is well placed to contribute to the debate on tidal power.
