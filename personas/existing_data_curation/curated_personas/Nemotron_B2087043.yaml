personas:
  professional: Abel Morales, a 59‑year‑old retail veteran with three decades of visual merchandising expertise, channels his curiosity and competitive edge into curating eye‑catching store displays while
    coaching junior staff, though his laid‑back attitude sometimes leads to missed deadlines as he prefers flexibility over rigid planning.
  sports: Abel Morales enjoys leisurely walks through the Bronx Botanical Garden as his primary exercise, roots for the New York Yankees during baseball season and the New York Knicks in winter, and joins
    a neighborhood senior basketball pick‑up league every Thursday, though they often miss a game if an unscheduled promotion demands extra hours.
  arts: Abel Morales immerses themselves in the Bronx art scene, curating store windows inspired by works of Kehinde Wiley and local muralists, collects vintage vinyl from artists like Juan Luis Guerra
    and Celia Cruz, and drafts short poems about city life after reading contemporary art magazines, while their skeptical streak makes them cautious about trendy art fads.
  travel: Abel Morales favors low‑cost, self‑planned trips that fit around the store’s schedule, often taking day trips to the Hudson Valley wineries and dreaming of strolling through the cobblestone streets
    of Cartagena, yet they prioritize family obligations over extended vacations, resulting in most getaways being brief weekend escapes.
  culinary: Abel Morales brings a seasoned hand to the kitchen, expertly preparing traditional Caribbean dishes such as mangú with ripe plantains and sancocho with yucca, cilantro, and oregano, while experimenting
    with fusion twists that blend local herbs, reflecting a curiosity that extends from visual merchandising to flavor profiles.
  core: Abel Morales is a curious, art‑driven retail veteran who balances competitive ambition with a relaxed, sometimes disorganized work style; they indulge in vintage vinyl, negotiate prices with a keen
    eye, and navigate life with pragmatic thriftiness punctuated by occasional impulsive splurges.
background:
  cultural: Abel is a first‑generation American of Dominican descent, raised in a tight‑knit family that values community, music, and food. Growing up in the Bronx, he was immersed in a vibrant diaspora
    that celebrates both Dominican traditions and New York’s multicultural tapestry. His bilingual upbringing informs his daily interactions, while his pride in Dominican heritage shows in his love for
    folk music, seasonal festivals like Carnaval de la Feria, and the communal spirit of sharing meals. This cultural fabric shapes his worldview, providing a blend of resilience, openness to new experiences,
    and a competitive drive to succeed.
