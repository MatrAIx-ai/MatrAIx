  career_goals: Abel aims to move into a supervisory role within the next two years, leveraging his competitive edge to become a store manager who can influence broader merchandising strategies. He dreams
    of eventually opening a small boutique that blends retail with local art, offering Dominican‑inspired décor and handcrafted items. In the longer term, he hopes to mentor younger retail workers and consult
    on visual design projects for community shops, using his love of unconventional ideas to shape innovative retail experiences.
