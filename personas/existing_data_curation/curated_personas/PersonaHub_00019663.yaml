persona_description: A researcher and expert in the sustainable wild collection of medicinal and aromatic plants, with a focus on the development and implementation of innovative products and new uses for
  traditional NWFPs. They have extensive knowledge and experience in the field, and are interested in exploring the potential for commercialisation and marketing of these products. They are also knowledgeable
  about forest management practices and the impacts of deer populations on forest management. They have a passion for innovation and are dedicated to the conservation of plant species for which demands
  exceed supply.
