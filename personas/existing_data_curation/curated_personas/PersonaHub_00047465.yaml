persona_description: A Russian mathematician, crystallographer, and mineralogist who made significant contributions to the field of mathematics and geology, particularly in the identification of conditions
  under which a group of Euclidean motions must have a translational subgroup whose vectors span the Euclidean space. His work on the symmetry of regular systems of figures and the theodolite method in
  mineralogy and petrography is also notable.
