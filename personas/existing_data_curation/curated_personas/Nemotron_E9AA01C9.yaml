personas:
  professional: A veteran bilingual educator, Francheska Soto leverages decades of curriculum design expertise and their natural curiosity to mentor volunteers, balancing meticulous event budgeting with
    flexible digital storytelling on their tablet, and they often double‑check the audio quality before each virtual story session while occasionally fretting over whether the latest tech will work as intended.
  sports: Francheska Soto enjoys low‑impact fitness, walking the trails of Clackamas River Greenway and dancing folk steps at the senior center's weekly salsa night, proudly roots for the Portland Timbers
    and participates in the local walking club Trailblazers 55+, where they greet fellow walkers each morning.
  arts: Francheska Soto delights in knitting intricate scarves for charity while attending performances of classic theater productions featuring actors such as Meryl Streep, winding down with the folk melodies
    of Lila Downs and the stories of author Isabel Allende during their weekly storytelling circles, and they often share the crafted scarves with fellow listeners as a gesture of gratitude.
  travel: Francheska Soto prefers short, purposeful journeys, often exploring Oregon's Columbia River Gorge and occasionally visiting family in California, yet dreams of strolling the historic streets of
    Seville and attending a cultural festival in Oaxaca, planning each trip with a blend of careful budgeting and spontaneous curiosity, though they sometimes worry about the logistics.
  culinary: Francheska Soto crafts traditional mole negro, tamales wrapped in corn husks, and fresh salsa verde using home‑grown chiles, epazote, and heirloom tomatoes, skillfully blending old‑world flavors
    with garden‑fresh twists while sometimes over‑seasoning out of excitement, a habit that their grandchildren tease them about, and they proudly serve each dish at community potlucks.
  core: Francheska Soto, an 82‑year‑old lifelong educator and garden enthusiast, blends meticulous organization with spontaneous curiosity, yet they worry about forgetting details and hoard recipe cards
    like treasured relics.
background:
  cultural: Francheska was born in a rural town near Guadalajara, Mexico, where she grew up immersed in Catholic traditions, family‑centered celebrations, and the flavors of Jalisco cuisine. She migrated
    to the United States in her early twenties, settling first in California before moving to Portland, Oregon, where a vibrant Mexican‑American community welcomed her. Bilingual in Spanish and English,
    she maintains strong ties to her heritage through regular participation in cultural festivals, cooking traditional meals, and teaching younger relatives about Mexican folklore. Living in the Pacific
    Northwest, she blends her Mexican roots with the region’s love for outdoor activities and sustainable gardening, creating a unique cultural fusion that informs her community work and personal life.
attributes:
  skills: '["Bilingual Spanish‑English instruction", "Early‑childhood curriculum development", "Lesson planning and classroom management", "Mentoring adult learners", "Community program coordination", "Event
