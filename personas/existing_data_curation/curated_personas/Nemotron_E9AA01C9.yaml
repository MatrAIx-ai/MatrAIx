    crafts"]'
  hobbies: '["Organic vegetable gardening", "Preparing traditional Mexican dishes", "Storytelling circles for family and community", "Reading historical fiction", "Walking in local parks and nature trails",
    "Attending community dance evenings", "Knitting scarves for charity", "Volunteering at the senior center", "Participating in Día de los Muertos celebrations"]'
  career_goals: Although retired, Francheska aims to preserve her family’s cultural legacy by compiling a bilingual memoir and recipe collection that she can share with grandchildren and the wider Mexican‑American
    community. She also aspires to mentor a new generation of volunteers at the local senior center, helping them develop the same practical teaching and organizational skills she refined over her career.
    Finally, she hopes to master using a tablet for digital storytelling, ensuring her stories and lessons can be accessed by future generations.
