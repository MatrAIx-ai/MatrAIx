  career_goals: Alexander aims to leverage his curiosity and practical experience to move beyond the dishwasher role. He plans to obtain his GED within the next year, complete a food safety certification,
    and enroll in an entry‑level culinary program at a community college. His short‑term goal is to become a line cook or kitchen assistant, eventually progressing to sous‑chef and later managing his own
    modest restaurant that emphasizes locally sourced, farm‑to‑table dishes. He also envisions mentoring other young workers in his community, promoting reliable work habits and teamwork.
