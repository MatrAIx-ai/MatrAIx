personas:
  professional: Miguel Pastrana, a 17‑year‑old aspiring graphic designer, merges street‑art aesthetic with bilingual digital storytelling, leveraging self‑taught Photoshop, Procreate, and basic HTML/CSS
    skills while channeling his competitive nature into meeting tight project deadlines.
  sports: Miguel Pastrana dominates weekend pick‑up basketball at Sunset Courts, cheers for the Miami Heat and Inter Miami CF, improves agility through daily dribbling drills, and competes in local League
    of Legends and FIFA e‑sports tournaments, treating both physical and virtual games with a competitive edge.
  arts: Miguel Pastrana draws daily inspiration from Wynwood Walls, channels the rebellious spirit of Banksy and the graphic boldness of Shepard Fairey into their digital illustrations, and frequently cites
    the melodic influence of Buena Vista Social Club as a soundtrack for sketch sessions.
  travel: Miguel Pastrana prefers curated trips that blend art and culture, such as a weekend road‑trip to St. Petersburg to visit its museums, a future pilgrimage to Berlin’s street‑art districts, and
    regular beach outings in Key West, balancing travel plans around school deadlines and a modest budget.
  culinary: Miguel Pastrana enjoys preparing family‑favorite arroz con pollo and crispy tostones, experiments with homemade mojo sauce using fresh cilantro and orange juice, and occasionally attempts to
    fuse traditional flavors with contemporary plating for friends.
  core: Miguel Pastrana is a fiercely curious teen who fuses street‑art flair with bilingual digital design, competes passionately on the court and online, saves diligently for creative gear, yet sometimes
    sacrifices sleep for sketching marathons.
background:
  cultural: Miguel grew up in Hialeah, a vibrant enclave of Cuban‑American life, steeped in the traditions, language, and flavors of his heritage. His household emphasizes familismo, where extended family
    gatherings around meals like arroz con pollo and café con leche are central. He is bilingual, fluent in Spanish and English, which enables him to navigate both the local Cuban community and the broader
    Miami multicultural landscape. The rhythms of salsa, son, and reggaeton permeate his daily life, influencing his artistic style and his love for dance. Community events such as the Calle Ocho Festival
    and local Cuban church celebrations provide a strong sense of cultural pride and collective identity. At the same time, Miguel is exposed to the diverse tapestry of Miami’s urban art scene, which encourages
    him to blend his Cuban roots with contemporary, unconventional expressions. This cultural duality shapes his worldview, fostering both a respect for tradition and an appetite for innovative, cross‑cultural
    creativity.
attributes:
  skills: '[''digital illustration'', ''basic graphic design (Adobe Photoshop, Procreate)'', ''bilingual Spanish–English communication'', ''introductory web development (HTML, CSS, JavaScript)'', ''street
    art sketching'', ''Cuban home cooking (arroz con pollo, tostones)'', ''budgeting and household management'', ''competitive basketball'', ''strategic video‑game play'']'
  hobbies: '[''sketching and digital painting'', ''visiting art galleries and street murals'', ''playing basketball'', ''e‑sports gaming (League of Legends, FIFA)'', ''Cuban cooking and family gatherings'',
    ''volunteering at community festivals'', ''creating short‑form video content'', ''listening to and remixing Cuban music'']'
  career_goals: Miguel aspires to turn his creative passions into a professional career. In the short term, he aims to enroll in a community‑college program or a vocational bootcamp focused on graphic design
    and digital media, building a polished portfolio that showcases his Cuban‑infused aesthetic. He hopes to secure an apprenticeship with a local design studio or a marketing agency where he can learn
    industry standards and client communication. Long‑term, Miguel envisions working as a multimedia artist or creative director, producing visual branding for Latin‑American businesses and perhaps launching
    his own streetwear line that merges art, music, and Cuban cultural motifs. He also dreams of using his platform to mentor other young, under‑represented artists in his community, fostering a collaborative
    creative scene.
