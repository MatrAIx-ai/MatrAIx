personas:
  professional: Matthew Meister, an aspiring teenage game designer and maker, channels their love for strategic video games, intricate LEGO builds, and hands‑on woodworking into early prototypes for both
    digital and tabletop experiences, leveraging their competitive edge while contending with occasional disorganization and deadline challenges.
  sports: Matthew Meister fuels their competitive spirit with solo bike rides as a member of the Riverbend Cycling Club, occasional pickup basketball games while cheering for the Chicago Bulls, and by tracking
    the Chicago Cubs’ season, though they rarely join organized team sports, preferring self‑directed physical activities that mirror the strategic planning of their games.
  arts: Matthew Meister immerses themselves in the futuristic narratives of graphic novelists Brian K. Vaughan and Moebius, the synth‑driven soundscapes of Vangelis and Hans Zimmer, and weekend LEGO sculptures
    inspired by artist Nathan Sawaya, while sketching their own sci‑fi cityscapes that blend literary and musical influences.
  travel: Matthew Meister balances parental planning with spontaneous day trips, having explored the Smithsonian’s National Air and Space Museum and the LEGO House in Billund, Denmark, while dreaming of
    a future adventure to Tokyo’s Akihabara district to experience its tech culture firsthand.
  culinary: Matthew Meister enjoys crafting pepperoni pizza with extra mozzarella and fresh basil, whipping up quick spaghetti carbonara after school, and experimenting with LEGO‑shaped sugar cookies using
    almond flour and dark chocolate chips, reflecting a moderate cooking skill that blends creativity with comfort‑food cravings.
  core: Matthew Meister is a strategy‑obsessed teen who meticulously builds LEGO worlds and dominates multiplayer matches, yet habitually forgets to stretch between gaming marathons and impulsively splurges
    on the latest tech toys, balancing a fierce competitive drive with a chaotic schedule.
background:
  cultural: 'Matthew grows up in Bettendorf, Iowa, a Midwestern town with a close‑knit community that values self‑reliance, modesty, and a strong work ethic. His family’s cultural traditions reflect typical
    Midwestern values: seasonal community events like the county fair, local high‑school sports games, and weekend gatherings at the family’s backyard. While his household is primarily secular, the community’s
    cultural fabric includes occasional church gatherings and a general sense of neighborly support. The regional emphasis on practicality and straightforward communication has shaped his preference for
    clear expectations and tangible outcomes, while the quiet, open landscapes provide ample space for his solitary hobbies.'
