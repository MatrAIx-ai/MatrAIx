  career_goals: Matthew dreams of turning his love for technology and hands‑on creation into a career. He imagines attending a technical high school program that leads to a degree in software engineering
    or mechanical engineering. He is also curious about professional e‑sports, hoping to compete at a higher level while maintaining a solid educational foundation. His ambition is to combine his practical
    skills with formal training so he can design and build functional gadgets or videogames, and he sees himself eventually working in a tech startup or an engineering firm where clear project structures
    exist but also allow room for creative problem‑solving.
