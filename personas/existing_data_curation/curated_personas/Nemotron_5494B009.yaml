  career_goals: John envisions a future where he can apply his love for building and problem‑solving in a concrete, practical career. He is drawn to professions such as civil engineering, architecture,
    or robotics, where he can design and construct reliable structures. His competitive streak also makes him consider roles that involve teamwork and service, like becoming a firefighter or a police officer,
    where clear routines and community responsibility are valued. Ultimately, he wants a career that offers a stable routine, tangible outcomes, and opportunities to demonstrate his reliability and calm
    under pressure.
