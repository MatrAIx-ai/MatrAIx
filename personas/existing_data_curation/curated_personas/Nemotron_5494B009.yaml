personas:
  professional: John Short, a 10‑year‑old budding coder, builds simple Scratch games and designs intricate LEGO models, channeling his love of structured challenges into early engineering skills while eagerly
    planning a future in robotics; they already imagine programming a rover for a school competition.
  sports: John Short, a 10‑year‑old Little League shortstop for the Lakewood Tigers, follows the New York Yankees' season closely and trades baseball cards with teammates, and they practice pitching drills
    every weekend at the community field.
  arts: John Short, a 10‑year‑old LEGO enthusiast, admires the intricate builds of Nathan Sawaya, enjoys listening to the Jonas Brothers, and they often spend Saturday mornings watching Pixar movies like
    'Toy Story 4' for creative inspiration.
  travel: John Short, a 10‑year‑old who loves summer trips to the Jersey Shore boardwalk, has visited the Liberty Science Center in Jersey City, dreams of touring NASA’s Kennedy Space Center, and they plan
    each family vacation around a mix of beach relaxation and hands‑on science exhibits.
  culinary: John Short, a 10‑year‑old who favors pepperoni pizza, mac and cheese, and strawberry shortcake, often helps his parents bake chocolate chip cookies shaped like LEGO bricks, and they occasionally
    sneak extra popcorn while assembling puzzles.
  core: John Short is a methodical, competition‑driven 10‑year‑old who blends routine LEGO building with baseball strategy, trades cards like a mini‑stock market, and stays remarkably calm, though they
    sometimes neglect bedtime flossing.
background:
  cultural: John comes from a middle‑class white family in Lakewood, Ocean County, New Jersey. The community is suburban and places a strong emphasis on practical education, involvement in local youth sports,
    and maintaining family routines. The regional culture includes frequent visits to the nearby Jersey Shore, community service activities, and a modest, mainstream American upbringing that values reliability,
    responsibility, and clear, structured pathways for personal growth.
attributes:
