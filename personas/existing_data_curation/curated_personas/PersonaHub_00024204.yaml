persona_description: A professional engineer who specializes in the design and construction of storm water detention systems, storm sewers, and culverts. They have experience working on industrial projects
  and understand the importance of using corrugated steel culverts in protecting roadways and railroads from damage. They are skilled in using corrugated steel pipe in various applications, including underpasses,
  service tunnels, and underground storage. They have knowledge of fish passage and exclusion systems for culverts and are familiar with the design of pipes for natural stream crossings. They have a unique
  understanding of the application of corrugated steel pipe in various situations and are able to apply their knowledge to solve complex engineering problems.
