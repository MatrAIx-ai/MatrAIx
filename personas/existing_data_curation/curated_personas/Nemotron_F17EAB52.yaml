  career_goals: Although currently not employed, Neil aims to channel his practical skill set into a part‑time volunteer coordinator position at the Sultan Community Center, where he can organize regular
    workshops, social gatherings, and neighborhood cleanup events. He also wishes to develop his woodworking hobby into a modest side business, creating custom furniture for friends and neighbors while
    preserving a predictable work schedule. Maintaining his health, supporting his family's stability, and continuing to serve his community with compassion and reliability are his primary long‑term ambitions.
