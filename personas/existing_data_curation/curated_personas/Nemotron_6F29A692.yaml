personas:
  professional: David Whatley is a high‑pressure emergency dispatcher who combines methodical precision on CAD and radio protocols with a practical curiosity for emerging mobile data tools, delivering rapid,
    accurate call handling while charting a path toward senior supervisory and future emergency‑management leadership.
  sports: David Whatley stays fit through early‑morning fishing trips with the Marrero Bass Anglers Club, leagues a few pick‑up basketball games each weekend while cheering the New Orleans Saints and Pelicans,
    and supplements his routine with light weight‑training to counteract the low‑back strain of his dispatch desk.
  arts: David Whatley expresses his artistic side on an acoustic guitar by mastering traditional Cajun numbers from Clifton Chenier and Buckwheat Zydeco and country classics by Dolly Parton and George Strait,
    while regularly attending local zydeco dances and slipping into indie film marathons that fuel his creative problem‑solving.
  travel: David Whatley prefers meticulously planned weekend getaways that blend cultural immersion—such as festival‑filled trips to New Orleans, Cajun‑flavored visits to Lafayette, and live‑music hunts
    in Austin—with long‑term dreams of exploring New York City’s theater scene and attending Scotland’s Edinburgh Fringe, balancing modest student finances with a penchant for both adventure and relaxation.
  culinary: David Whatley’s culinary palate leans heavily on Gulf‑Coast staples, regularly cooking gumbo with andouille sausage, blackened catfish, and fresh crawfish étouffée, while his moderate kitchen
    skills let him faithfully follow family recipes and occasionally experiment with sushi rolls when the mood strikes.
  core: David Whatley is a methodical young dispatcher who fuses a love for Cajun guitar riffs with strategic video‑game thinking, yet habitually burns the midnight oil on puzzles, sometimes skipping breakfast
    and neglecting to log out of his work console on time.
background:
  cultural: David grew up in Marrero, a suburban community in Jefferson Parish on the outskirts of New Orleans. His family’s roots lie in the white, working‑class population of the Gulf Coast, absorbing
    Southern hospitality and the Cajun traditions of the region. He was raised with a strong sense of community, an appreciation for resilience shaped by events like Hurricane Katrina, and participation
    in local customs such as Mardi Gras celebrations and Cajun cuisine (gumbo, jambalaya, crawfish boils). These influences fostered values of reliability, cooperation, and practical problem‑solving.
attributes:
  skills: '[''Emergency Communication Dispatch'', ''Computer‑Aided Dispatch (CAD) Operations'', ''Radio Protocols and Net Management'', ''Crisis Triage and Prioritization'', ''Basic Medical First Aid (CPR)'',
    ''Geographic Information Systems (GIS) Mapping'', ''Stress Management and Resilience Techniques'', ''Conflict Resolution and De‑escalation'', ''Data Entry and Record Keeping'', ''Team Coordination and
    Shift Handover'']'
  hobbies: '[''Playing acoustic guitar (Cajun & country tunes)'', ''Fishing on Bayou Barataria'', ''Attending local zydeco and country music shows'', ''Strategic video gaming (e.g., real‑time strategy)'',
    ''Volunteering with Red Cross disaster preparedness'', ''Reading non‑fiction on technology and urban planning'', ''Puzzle and model building'']'
  career_goals: David aims to become a senior dispatcher and later a shift supervisor within the Jefferson Parish emergency communications center. Over the next three to five years, he plans to complete
    his associate’s degree in Public Safety Communications, earn Advanced Emergency Medical Dispatch (AEMD) and Incident Command System (ICS) Level 100 certifications, and attend leadership workshops. Long‑term,
    he envisions transitioning into emergency management or community resilience coordination, leveraging his practical dispatch experience and curiosity for innovative public‑safety technologies.
