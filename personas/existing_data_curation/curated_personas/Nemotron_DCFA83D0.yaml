  career_goals: Although retired from full‑time work, Jorge aims to transition into part‑time consulting, offering pro‑bono tax assistance to low‑income seniors and small Mexican‑American businesses in
    Sonoma County. He wishes to obtain the Enrolled Agent credential to formalize his tax expertise, mentor aspiring accountants from his community, and eventually author a guide on financial planning for
    retirees that blends practical advice with culturally relevant examples. He also hopes to serve on local nonprofit boards, using his accounting background to improve fiscal transparency and strengthen
    community resources, while maintaining a stable and low‑stress financial situation for himself and his family.
