personas:
  professional: Susanna Contreras, a budding aerospace engineering student, leverages SolidWorks, CATIA, ANSYS, and Python scripting to design and analyze low‑emission rocket components while applying her
    structured yet flexible mindset to keep project timelines realistic, confidently presenting technical findings to peers, and calmly navigating the shifting priorities of collaborative research labs.
  sports: Susanna Contreras spends weekends hiking the Blue Ridge, mountain‑biking along the Potomac, kayaking on the river, rallies behind the Washington Capitals during hockey season, follows DC United's
    women's soccer matches, and participates in a local kayaking club that meets every Saturday, blending solo endurance sports with team‑spirit fandom.
  arts: Susanna Contreras expresses her creative side through DSLR photography of sunrise peaks and aircraft at local airshows, relaxes to the ambient tunes of Brian Eno, the soaring scores of Hans Zimmer,
    and sci‑fi literature by Kim Stanley Robinson, and occasionally attends indie film screenings featuring works by directors such as Ava DuVernay, enriching her imagination and visual storytelling.
  travel: Susanna Contreras favors spur‑of‑the‑moment road trips to Shenandoah National Park and the Appalachian Trail while also maintaining a meticulously curated bucket‑list that includes aerospace museum
    tours in Toulouse and launch site visits at Kourou, balancing her love of spontaneous hiking adventures with a structured long‑term goal of science‑centric international travel.
  culinary: Susanna Contreras, an able home cook, delights in preparing Mediterranean dishes like lemon‑oregano grilled chicken with quinoa, indulges in spicy miso ramen bowls on rainy evenings, and enjoys
    weekend brunches featuring avocado toast drizzled with extra‑virgin olive oil accompanied by fresh berries, reflecting her balanced palate of healthy and comfort foods.
  core: Susanna Contreras blends a methodical aerospace mindset with a habit of over‑packing her camera bag, a penchant for spontaneous mountain‑bike rides, and an unwavering calm that turns late‑night
    flight simulations into a quiet meditation, all while navigating a slightly disorganized schedule with unflappable resilience.
background:
  cultural: Susanna grew up in the suburban environment of Manassas, Virginia, in a middle‑class family that blends mainstream Mid‑Atlantic American culture with an appreciation for her Hispanic surname
    heritage. Her parents emphasized education, personal responsibility, and community involvement, values that shaped her practical and structured outlook. While she celebrates common American holidays,
    she also partakes in occasional cultural traditions passed down from relatives, such as family gatherings featuring food and stories from Latin American roots. The supportive partnership of her marriage,
    formed early in adulthood, reflects a collaborative and resilient lifestyle that aligns with her calm personality and desire for balanced flexibility.
attributes:
  skills: '[''SolidWorks'', ''CATIA'', ''ANSYS CFD'', ''Finite Element Analysis'', ''Python'', ''MATLAB'', ''Aerospace Structures'', ''Propulsion Fundamentals'', ''FAA/DoD Regulations'', ''Test Instrumentation'',
    ''Technical Reporting'', ''Analytical Problem Solving'', ''Team Collaboration'', ''Assertive Communication'', ''Adaptability'']'
  hobbies: '[''Hiking'', ''Mountain Biking'', ''Kayaking'', ''Photography'', ''Flight Simulation'', ''STEM Volunteering'', ''Science‑Fiction Reading'', ''Yoga'']'
  career_goals: Susanna aims to complete her Bachelor of Science in Aerospace Engineering within the next two years and then pursue a Master’s degree focused on sustainable propulsion systems. She envisions
    joining a major aerospace contractor or NASA center in the Washington‑Baltimore corridor, where she can contribute to the design and testing of next‑generation launch vehicles. Over the next decade,
    she plans to obtain her Professional Engineer (PE) license, lead multidisciplinary project teams, and eventually become a chief engineer driving innovations in low‑emission rocket technology. Throughout
    her career she wants to mentor young engineers, especially women, and balance professional growth with a flexible lifestyle that supports her marriage and personal interests.
