  hobbies: '[''Painting (watercolors)'', ''Attending local art fairs'', ''Exploring Appalachian hiking trails'', ''Listening to bluegrass music'', ''Reading mystery novels'', ''Genealogy research'', ''Baking
    traditional Appalachian recipes'', ''Volunteering at community arts events'']'
  career_goals: As she approaches retirement, Susan aims to solidify her legacy by moving into a mentorship or supervisory role where she can train younger staff in hospitality best practices while reducing
    the personal stress of frontline service. She hopes to curate a modest art display in the lobby, showcasing Appalachian folk art and occasional contemporary pieces, to merge her love of art with guests'
    experiences. Long‑term, Susan envisions converting a portion of her home into a small bed‑and‑breakfast that highlights local culture, offering personalized tours of nearby historical sites and art
    fairs. Completing her GED is also a personal milestone she wishes to achieve, both for personal fulfillment and to set an example for community members. Ultimately, she seeks financial stability that
    allows her to enjoy her hobbies and support local arts initiatives without the pressures of a high‑stress job.
