personas:
  professional: Susan Mir, a veteran front‑desk clerk at a family‑run mountain lodge, blends her razor‑sharp organizational skills, conflict‑resolution instincts, and competitive drive to mentor junior
    staff while curating a lobby exhibit of Appalachian folk art that reflects her curiosity and emotional intensity.
  sports: Susan Mir maintains fitness through weekly treks with the Blue Ridge Trails Hiking Club, occasional bird‑watching outings at the state park, and by cheering on the Appalachian State Mountaineers
    football team each fall while practicing gentle senior yoga at the community center to balance her competitive spirit.
  arts: Susan Mir spends afternoons glazing watercolors of misty ridge lines, drawing inspiration from folk painter Jacob Crittenden and bluegrass legend Doc Watson, while she volunteers to curate craft
    fairs featuring quilts by the Miriam Rice Collective and pottery by artist Lena Whitehead.
  travel: Susan Mir prefers relaxed, self‑guided journeys that blend nature and heritage, having hiked the Blue Ridge Parkway and explored historic Charleston, South Carolina, while dreaming of a pilgrimage
    to Bath, England’s Roman baths, she carefully plans trips around a modest retirement budget and limited mobility.
  culinary: Susan Mir enjoys baking buttery Appalachian cornbread with a drizzle of honey, mastering sourdough starter techniques, simmering pepper‑pot soup with foraged wild mushrooms and diced smoked
    ham, and relishes occasional farm‑to‑table dinners featuring beet salad with goat cheese at The Farmhouse, reflecting her modest yet adventurous palate.
  core: Susan Mir is a meticulous, emotionally intense hospitality veteran whose competitive curiosity fuels a lifelong devotion to watercolor, community art mentorship, and a frugal‑yet‑occasionally impulsive
    approach to money and self‑care.
background:
  cultural: Susan grew up in the Appalachian foothills of eastern Kentucky, where white Appalachian traditions shape daily life. Her community values hospitality, self‑reliance, and close family ties—principles
    she carries into her work at the local resort. The region’s rich musical heritage of bluegrass and folk songs, as well as its tradition of handmade crafts such as quilting and woodworking, inform her
    appreciation for art and cultural expression. Church gatherings and local festivals foster a strong sense of communal support, which helps Susan balance her competitive edge with a desire to contribute.
    Though the area is modest and steeped in tradition, Susan’s curiosity drives her to explore new artistic movements and ideas, blending the old with the new in both her personal interests and professional
    aspirations.
attributes:
  skills: '[''Front desk operations'', ''Guest services & conflict resolution'', ''Reservation system management'', ''Cash handling and basic bookkeeping'', ''Local tourism knowledge'', ''Cross‑training
