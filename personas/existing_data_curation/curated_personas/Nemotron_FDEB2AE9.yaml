  career_goals: Stephen aims to earn his GED within the next six months and then secure an apprenticeship in a trade such as construction, HVAC, or automotive maintenance. He wants to become a certified
    maintenance technician, gain a stable, well‑paying job while preserving enough flexibility for his personal projects and outdoor hobbies. Over the longer term, he hopes to launch a small side business
    offering handyman services to his local community.
