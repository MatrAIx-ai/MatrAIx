  career_goals: Looking ahead, Martha is drawn to careers that combine structure, practicality, and the opportunity to make a tangible impact on her community. She aspires to become a civil engineer or
    architect, focusing on designing safe, sustainable public spaces and infrastructure. She envisions attending a STEM-focused high school, earning a scholarship to study engineering at a university, and
    securing internships with local firms in New Jersey. Her long-term ambition includes contributing to projects that improve pedestrian safety and green space accessibility in her hometown, while also
    maintaining a balanced lifestyle that allows her to continue her organized routine and personal well‑being.
