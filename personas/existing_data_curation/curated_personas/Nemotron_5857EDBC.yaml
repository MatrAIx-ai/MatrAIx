personas:
  professional: Brian Ward, a 26‑year‑old high school science teacher, blends meticulous curriculum design with hands‑on model rocket and LEGO projects to create structured yet inventive STEM lessons, leveraging
    his analytical mindset and considerate nature to foster collaborative classrooms and mentor future educators.
  sports: Brian Ward jogs the Jersey Shore boardwalk three times a week, is a season ticket holder for the New York Giants and follows the New Jersey Devils, plays weekend soccer with the local Riverside
    Rovers club, and joins friends on fishing trips to Barnegat Bay targeting striped bass.
  arts: Brian Ward, a devoted sci‑fi reader, devours novels by Andy Weir, N.K. Jemisin and Becky Chambers, attends occasional screenings at the Garden State Film Festival, playlists featuring Hans Zimmer
    and Muse accompany his LEGO builds, and he participates in a community theater group that stages classic sci‑fi plays.
  travel: Brian Ward prefers structured short getaways, his favorite weekend escape is a fishing trip to Cape May, he has backpacked the Appalachian Trail, dreams of witnessing a SpaceX launch at Boca Chica,
    plans future visits to the Smithsonian in Washington, D.C., and uses spreadsheets to budget for each trip.
  culinary: Brian Ward, an intermediate home cook, enjoys crafting grilled salmon tacos with mango salsa, perfecting a crisp New York‑style pizza crust topped with fresh mozzarella and basil, experimenting
    with ramen broth using kombu, miso and soft‑boiled eggs, yet often overcooks his LEGO‑inspired baked cookies when multitasking.
  core: Brian Ward, a methodical STEM educator and LEGO enthusiast, balances disciplined budgeting, occasional back pain, and a structured yet adventurous lifestyle with a few impulsive tech splurges and
    a love for sci‑fi culture.
background:
  cultural: Brian grew up in a middle‑class, suburban New Jersey family with Irish‑American roots. His upbringing emphasized education, community involvement, and a pragmatic approach to life. The coastal
    culture of Toms River, with its seasonal beach activities, local festivals, and strong community ties, shaped his appreciation for outdoor recreation and volunteerism. These influences combine to create
    a culturally grounded yet forward‑looking perspective.
attributes:
  skills: '[''Lesson planning'', ''STEM curriculum design'', ''Laboratory safety and experiment design'', ''Data analysis and statistics'', ''Educational technology integration (Google Classroom, interactive
    simulations)'', ''Differentiated instruction'', ''Student assessment and grading'', ''Collaborative learning facilitation'', ''Mentoring new teachers'']'
  hobbies: '[''Model rocket building'', ''LEGO construction'', ''Strategy board games'', ''Coding side projects'', ''Science fiction reading'', ''Volunteering at STEM workshops'', ''Jogging'', ''Fishing'']'
  career_goals: Brian aims to become the head of the science department within the next five years, spearheading a school‑wide STEM outreach program that partners with local businesses and community organizations.
    He plans to pursue a Master’s in Education Leadership to prepare for future roles in school administration, such as assistant principal or curriculum coordinator. Additionally, he hopes to mentor pre‑service
    teachers, publish a practical guide on hands‑on STEM teaching, and eventually influence district‑level policy on STEM education.
