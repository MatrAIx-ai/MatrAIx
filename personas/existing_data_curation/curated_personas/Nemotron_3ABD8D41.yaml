personas:
  professional: Thomas Perrie, a seasoned hospitality professional with a ServSafe certification, leverages their methodical organization, calm conflict‑resolution style, and precise point‑of‑sale expertise
    to consistently deliver smooth, high‑volume dining service and reliably train new staff.
  sports: Thomas Perrie, a loyal fan of the Nebraska Cornhuskers football and the Omaha Storm Chasers baseball, spends summer afternoons casting at the Elkhorn River, participates in the Hastings Adult
    Softball League as a third‑base player, and holds membership in the Nebraska Fly Fishing Association.
  arts: Thomas Perrie, an avid reader of historical non‑fiction, finds creative balance attending intimate performances at the Hastings Community Theatre featuring recordings of Frances McDormand, listening
    to folk legends such as Bob Dylan and the minimalist piano works of Philip Glass, and admiring regional realist paintings by Grant Wood while sipping espresso at the coffee shop where they play chess.
  travel: Thomas Perrie, a methodical planner who favors quiet, purposeful getaways, spends long weekends exploring the historic streets of St. Augustine, Florida, embarks on annual salmon‑fishing trips
    to the rivers of British Columbia, and takes day trips to the Sandhills of Nebraska for the solitude of prairie landscapes.
  culinary: Thomas Perrie, a competent home cook who favors sustainable, locally sourced fare, often prepares pan‑seared trout with lemon‑herb butter, hearty butternut squash risotto seasoned with sage,
    and bakes crusty sourdough loaves using heritage wheat, while occasionally indulging in small‑batch beef jerky seasoned with smoked paprika and black pepper.
  core: Thomas Perrie, a 42‑year‑old hospitality veteran who balances a pragmatic love of woodworking, fly fishing, and quiet chess with a steadfast commitment to community and meticulous self‑discipline,
    often described as a reliable, quietly curious neighbor who hoards a modest stash of vintage farm tools and forgets to water houseplants.
background:
  cultural: Thomas grew up in the rolling plains of Nebraska, steeped in the region's Midwestern values of hard work, self‑reliance, and neighborly cooperation. His family was involved in small‑scale agriculture,
    which instilled an appreciation for seasonal cycles and community interdependence. While the area is predominantly white, Thomas's cultural identity is shaped more by the local ethos of humility, modest
    ambition, and a collective spirit that values helping neighbors. The small‑town atmosphere of Hastings, with its annual county fair, local diners, and church gatherings, has reinforced his preference
    for intimate social settings over large crowds. His divorce prompted a deeper focus on personal stability and community involvement, leading him to seek fulfillment through reliable work and modest
    contributions to local initiatives.
attributes:
  skills: '[''Customer Service'', ''POS System Operation'', ''Food Safety and Sanitation (ServSafe Certified)'', ''Inventory Management'', ''Cash Handling and Reconciliation'', ''Conflict Resolution'',
