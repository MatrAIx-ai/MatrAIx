  hobbies: '[''Woodworking'', ''Fly Fishing'', ''Reading Non-fiction History and Sustainable Living'', ''Chess'', ''Community Gardening'']'
  career_goals: Thomas seeks to transition from a line server to a supervisory role within the next two years, aiming to become a restaurant manager where he can apply his organizational strengths to improve
    operational efficiency. He plans to enroll in a part‑time hospitality management program at a nearby community college to formalize his experience with a credential. Long‑term, he aspires to open a
    small, community‑focused café that highlights locally sourced ingredients and offers a welcoming space for intimate gatherings, reflecting his preference for small groups and his commitment to fostering
    neighborhood harmony.
