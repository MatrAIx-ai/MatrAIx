persona_description: A Phoenician trader who specialized in the trade of goods, culture, and technology, particularly in the Mediterranean region. They were responsible for developing the Phoenician alphabet,
  which was used for book-keeping and correspondence. Their extensive trade networks necessitated a network of colonies along the Mediterranean coast, and their traders and merchants were responsible for
  spreading their alphabet around the region. The Phoenicians were also instrumental in transporting culture and technology, and their extensive trade networks required book-keeping and correspondence.
