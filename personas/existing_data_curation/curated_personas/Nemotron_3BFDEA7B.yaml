personas:
  professional: Douglas Beggs, a budding robotics enthusiast, channels his love for LEGO mechanical sets and Scratch game coding into designing and testing small competition robots, applying a blend of
    curiosity and practical problem‑solving while his critical, competitive streak pushes him to out‑engineer his peers and meticulously document every iteration.
  sports: Douglas Beggs, a spirited member of the neighborhood junior soccer league, idolizes the local professional team the Seattle Sounders FC, trains on Saturdays with his friends at the community field,
    and balances his competitive drive on the pitch with a strategic mindset honed from chess matches.
  arts: Douglas Beggs, an avid reader of science‑fiction classics like Isaac Asimov’s Foundation and a fan of the animated film WALL‑E, spends his free evenings listening to the energetic tracks of Imagine
    Dragons while sketching futuristic robot concepts, letting these creative influences shape his LEGO builds and Scratch projects.
  travel: Douglas Beggs, who loves exploring the outdoors, has hiked the trails of nearby Redwood State Park, visited the interactive exhibits at the local science museum, and dreams of traveling to the
    Kennedy Space Center in Florida to see real rockets, preferring hands‑on adventures over long beach vacations.
  culinary: Douglas Beggs, a budding chef who can microwave a perfect bowl of mac and cheese and assemble a brick‑shaped peanut‑butter‑jelly sandwich, favors bold flavors like cheddar cheese and crunchy
    pretzels, and enjoys experimenting with simple recipes that fuel his weekend LEGO marathons.
  core: Douglas Beggs blends a relentless curiosity for building and programming with a competitive edge, a worrying streak that fuels meticulous planning, and a knack for turning every hobby—from soccer
    to rock collecting—into a precise, ever‑evolving experiment.
background:
  cultural: Douglas grows up in Grafton, Massachusetts, a small New England town with a strong sense of community and an emphasis on public education. His family belongs to the region’s typical middle‑class,
    white demographic, with parents who value self‑reliance, hard work, and curiosity. He attends a local public elementary school where science and technology are encouraged through after‑school clubs
    and regional competitions. Seasonal activities like leaf‑picking in autumn and snow‑shoeing in winter are part of his community life, and local traditions such as town fairs and volunteer clean‑up days
    shape his sense of civic responsibility.
