  career_goals: Douglas dreams of becoming a robotics engineer or a computer scientist who designs autonomous machines. He wants to compete in national robotics competitions, publish a well‑documented science
    fair project on sensor‑driven robots, and eventually work on real‑world applications like assistive technology for disabled people. His competitive streak pushes him to aim for top honors in school
    science fairs and coding challenges, while his practical side keeps his goals grounded in achievable steps, such as mastering Python in middle school and joining a mentorship program at a local university.
