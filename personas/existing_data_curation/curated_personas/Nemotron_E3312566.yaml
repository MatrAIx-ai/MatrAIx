personas:
  professional: An aspiring concept artist and maker named Shakeel Majumdar channels vivid imagination into sci-fi themed digital illustrations, applies meticulous planning to LEGO robotics builds, and
    they constantly refine each piece driven by a self-critical streak.
  sports: A teen athlete named Shakeel Majumdar enjoys weekend bike rides along the Green River Trail, plays on the Benton High School Eagles basketball team, participates in the Washington Youth Soccer
    Club's spring season, and they passionately follow the Seattle Sounders FC and Seattle Seahawks, attending matches when school permits.
  arts: An creatively inclined teenager named Shakeel Majumdar devotes evenings to sketching surreal landscapes inspired by H.R. Giger and Salvador Dali, composes acoustic guitar renditions of John Mayer
    and Ed Sheeran songs, reads speculative works by Neil Gaiman and Margaret Atwood, and they regularly visit the local contemporary art gallery to view installations by Maya Lin.
  travel: A curious explorer named Shakeel Majumdar prefers meticulously planned weekend getaways, has visited the misty forests of Olympic National Park and the historic streets of Kyoto, dreams of backpacking
    across Iceland's volcanic landscapes and the ancient ruins of Petra, and they balance budget constraints with a thirst for immersive cultural experiences.
  culinary: A budding home cook named Shakeel Majumdar enjoys experimenting with fusion dishes like spicy mango sushi rolls and rosemary-infused lentil soup, hand rolls pizza dough for weekend meals, frequently
    orders buttery croissants and matcha lattes from the neighborhood cafe, and they occasionally neglect a balanced diet during marathon art sessions.
  core: Shakeel Majumdar's boundless imagination fuels surreal art and robotics projects, yet their tendency to over-plan spirals into late-night worry, leading to occasional all-night gaming marathons
    and a quirky habit of collecting mismatched socks for luck.
background:
  cultural: Shakeel is a second‑generation South Asian American, born to Bangladeshi parents who migrated to the United States in the early 2000s. At home, he hears Bengali and English, and his family celebrates
    both Islamic and Christian holidays, reflecting a unique blend of cultural traditions. Growing up in Fairfax, VA, he participates in local South Asian community events such as Diwali fairs, Eid gatherings,
    and cultural dance workshops, which have enriched his appreciation for vibrant storytelling, intricate patterns, and rhythmic music. These cultural influences permeate his artistic style, which often
    incorporates motifs from South Asian art and folklore while maintaining a contemporary, global perspective.
