  career_goals: Shakeel aspires to channel his imagination into a career that blends art and technology. His primary ambition is to become a concept artist for video games or animated films, where he can
    develop original worlds and characters. He also dreams of studying interactive media design or computer science in a specialized high school and eventually pursuing a degree that equips him to create
    immersive digital experiences. In the longer term, Shakeel hopes to launch his own indie game studio or graphic novel series, using his organizational skills to lead collaborative projects while maintaining
    creative autonomy.
