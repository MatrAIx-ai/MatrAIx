  career_goals: Joanie aims to advance within the airline industry by first becoming a senior flight attendant and eventually a lead cabin crew trainer. She plans to leverage her curiosity about art and
    culture to develop a specialized in‑flight experience program that highlights local artists and heritage at each destination. In the longer term, she dreams of transitioning into airline operations
    management or a pilot training program, using her competitive edge to earn a captain’s license. She also hopes to launch a travel blog that blends aviation insight with artistic storytelling, positioning
    herself as an influencer who bridges travel and culture.
