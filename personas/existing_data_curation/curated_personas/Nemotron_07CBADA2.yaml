personas:
  professional: Joanie Wittenburg is a flight attendant who blends meticulous safety expertise and a naturally skeptical eye for security with an artistic curiosity, delivering warm, high‑quality service
    while curating in‑flight cultural highlights and aiming to lead cabin crew training.
  sports: Joanie Wittenburg hikes the Allegheny foothills with the local Trailblazers Club, practices Vinyasa yoga three times a week, and roots for the Pittsburgh Steelers and the Pittsburgh Riverhounds
    while cheering on occasional local marathon events.
  arts: Joanie Wittenburg sketches urban street art inspired by Banksy and Shepard Fairey during layovers, frequents contemporary galleries showcasing artists like Yayoi Kusama and Ai Weiwei, and participates
    in improv workshops to sharpen her communication and creative thinking.
  travel: Joanie Wittenburg blends work and wanderlust by leveraging airline crew scheduling to explore cultural festivals in Oaxaca, the lantern festivals of Chiang Mai, and spontaneous weekend trips to
    Lisbon, favoring budget‑friendly boutique hostels and flexible itineraries over rigid tours.
  culinary: Joanie Wittenburg experiments with global flavors, often cooking Spanish paella with saffron, Japanese ramen with homemade broth, and Moroccan tagine with preserved lemons, while relying on
    fresh herbs like cilantro and basil to bring her culinary creations to life.
  core: Joanie Wittenburg is a curious, competitive flight attendant who balances meticulous safety work with a restless creative drive, turning layovers into artistic mini‑adventures while juggling modest
    finances and a disciplined yoga habit.
background:
  cultural: Joanie grew up in Ford City, a small community in western Pennsylvania rooted in a mix of German, Irish, and Appalachian heritage. Her family traditions include attending local fairs, church
    gatherings, and community picnics that celebrate regional crafts and music. The area’s strong work ethic and emphasis on self‑reliance shaped her pragmatic yet curious outlook. Though raised in a predominantly
    white, middle‑class environment, Joanie’s exposure to nearby historic steel towns and the region’s rich immigrant history fostered an appreciation for diverse stories and artistic expression. She identifies
    with the modest, down‑to‑earth values of western Pennsylvania while remaining open to the broader cultural experiences she encounters as a flight attendant.
