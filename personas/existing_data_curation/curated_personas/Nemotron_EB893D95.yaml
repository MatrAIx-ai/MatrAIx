  hobbies: '[''Reading (biographies, business strategy, African-American history)'', ''Gardening (vegetables & herbs)'', ''Woodworking'', ''Chess'', ''Crossword puzzles'', ''Jazz listening'', ''Church choir
    participation'', ''Volunteer work (heritage events, financial-literacy workshops)'', ''Landscape photography'']'
  career_goals: Although officially retired, Cruz aims to leverage his expertise to mentor young Black entrepreneurs in the Inland Empire, develop a scholarship fund for business students at local community
    colleges, and author a memoir highlighting the evolution of Black leadership in corporate America. He also hopes to serve on the board of a nonprofit focused on financial literacy, and to travel to
    Ghana and the Caribbean to deepen his cultural heritage connections before the end of the decade.
