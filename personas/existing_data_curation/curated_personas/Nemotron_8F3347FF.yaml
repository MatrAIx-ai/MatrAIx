    Gardening", "Cooking Experimental Recipes", "Senior Center Social Games"]'
  career_goals: Cheri aims to turn her imaginative energy into community‑centered creative leadership. She plans to volunteer as an arts program coordinator at the Willoughby Public Library, designing low‑pressure
    workshops for seniors and children. She also hopes to launch an annual senior‑artist showcase that highlights novelty and abstract expression, positioning herself as the recognizable host. On a personal
    note, Cheri wants to write and self‑publish a memoir of her lifelong creative adventures and start a weekly podcast interviewing local artists about abstract ideas, maintaining her role as a social
    hub while earning recognition as a valued cultural ambassador in her neighborhood.
