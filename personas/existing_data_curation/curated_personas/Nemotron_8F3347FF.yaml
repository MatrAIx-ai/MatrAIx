personas:
  professional: Cheri Farra, a seasoned community arts advocate who leverages her flamboyant storytelling and self‑taught mixed‑media skills to design low‑pressure workshops for seniors, channeling her
    competitive edge into showcasing abstract creations, while her relaxed attitude toward planning often results in whimsical but slightly chaotic program schedules.
  sports: Cheri Farra, a loyal Cleveland Browns fan who anchors the senior‑center’s weekly bocce league, enjoys sunrise walks along the Lake Erie shoreline, and prefers low‑impact watercolor‑inspired yoga
    classes that double as social gatherings while shunning high‑intensity sports.
  arts: Cheri Farra, who immerses herself in abstract expressionism—regularly referencing Jackson Pollock’s drip technique—curates monthly potluck gallery nights featuring local talents like Annette Snow,
    and spends evenings reading speculative fiction by Octavia Butler while sketching narrative still‑life compositions.
  travel: Cheri Farra, who favors spontaneous weekend getaways to historic river towns such as Marietta, Ohio, and the charming Amish Country of Holmes County, books trips with senior‑discounted Amtrak
    tickets, dreams of wandering Barcelona’s art‑filled streets, yet often hesitates because of budget constraints and her loosely organized itinerary.
  culinary: Cheri Farra, an experimental home chef who cultivates heirloom tomatoes, rainbow carrots, and purple potatoes, frequently crafts rustic ratatouille topped with fresh basil and a balsamic reduction,
    and delights in adding exotic ingredients like sumac and miso to traditional Midwestern casseroles.
  core: Cheri Farra blends boundless imagination with a relaxed, sometimes scatter‑shot approach to life, turning community art projects into vibrant social hubs while occasionally overcommitting and forgetting
    mundane details.
background:
  cultural: Cheri grew up in post‑World War II Ohio, part of a white Midwestern community that values hospitality, modesty, and strong neighborhood ties. Her upbringing reflected the traditional values
    of the Lake County area—church involvement, community service, and a respect for self‑reliance—while also embracing the cultural shifts of the 1960s and 70s that sparked her curiosity for novelty and
    abstract ideas. This blend of classic Midwestern sensibility with an ever‑evolving love for creative expression shapes her worldview and daily interactions.
