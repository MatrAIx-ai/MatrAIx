persona_description: A climate and atmospheric scientist who is a member of the Pontifical Academy of Sciences and has co-convened a workshop on the partnership between religion and climate change. He is
  interested in the transformational role that religious leaders can play in bringing awareness to the urgency of climate change and has spoken to Pope Francis about the importance of teaching the impacts
  of climate change in places of worship. He is also a member of the Pontifical Academy of Sciences since 2004 and has co-convened a workshop on sustainable humanity and sustainable nature.
