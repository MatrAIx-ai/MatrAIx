personas:
  professional: Elianni Moralescastro is an aspiring scientist-performer who blends hands-on experiments from the school science club with the rhythmic creativity of the dance team, channeling their curiosity
    and practical mindset into projects that fuse physics concepts with choreography.
  sports: Elianni Moralescastro is a dedicated midfielder for the Riverside Rovers youth soccer club, practices three times a week, cheerfully supports the city’s professional team Metro FC, and incorporates
    dance warm-ups from the school dance team to stay agile.
  arts: Elianni Moralescastro sketches vibrant characters inspired by folklore legends like La Llorona, studies guitar chords from icons such as Carlos Santana, and finds artistic refuge in listening to
    indie band Arctic Monkeys while doodling in their notebook.
  travel: Elianni Moralescastro prefers weekend escapades to nearby state parks like Sierra Vista, snapping photos of farm landscapes for their Instagram, while dreaming of a summer road trip to the Grand
    Canyon where they can combine hiking, nature photography, and local food sampling.
  culinary: Elianni Moralescastro enjoys helping prepare family staples like tacos al pastor and chicken tamales, mastering the art of seasoning and tortilla folding, while also experimenting with homemade
    guacamole and learning to bake chocolate chip cookies during after-school cooking sessions.
  core: Elianni Moralescastro blends scientific curiosity, artistic flair, and team spirit into a lively, organized teen who balances school projects, soccer, and family cooking, occasionally forgetting
    to stretch before a game and hoarding spare change for future guitars.
background:
  cultural: Elianni is a first‑generation Mexican‑American who grew up in a bilingual household in Bakersfield, California. Her family maintains Mexican traditions such as celebrating Día de los Muertos,
    cooking homemade tamales, and listening to mariachi music, while also embracing the diverse cultural fabric of Kern County. She attends a local public middle school where she interacts with a multicultural
    student body, and she often bridges her Mexican heritage with her American environment through language, food, and community involvement.
