persona_description: 'A data center network architect who specializes in the design and implementation of network virtualization and infrastructure solutions. They are familiar with the three candidate
  protocols: Ethernet, Fibre Channel, and InfiniBand, and have experience in the development of network virtualization solutions. They are also knowledgeable about the differences between Ethernet, Fibre
  Channel, and InfiniBand in terms of their performance, latency, and reliability. They are currently working on the development of a new form of Ethernet called Converged Enhanced Ethernet (CEE) or Data
  Centre Ethernet (DCE), which is expected to be a lossless and predictable latency protocol. They are also interested in the use of InfiniBand in general business data centers and have experience with
  InfiniBand in the context of high-performance computing and HPC applications.'
