persona_description: A criminologist who specializes in life-course criminology and has a deep understanding of the development of antisocial behavior, risk factors at different ages, and the effect of
  life events on individual development. They are also familiar with the theories developed by Patterson, Moffit, Laub and Sampson, and Elliott and colleagues, and have a keen interest in integrating these
  theories to explain more types of antisocial behavior. They are likely to be interested in the intersection of criminology and psychology, and have a strong background in research methods and data analysis.
  They are also likely to be interested in the role of social bonds and social support in preventing crime, and have a background in sociology and criminology.
