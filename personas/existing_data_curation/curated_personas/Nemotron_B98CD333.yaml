personas:
  professional: Michael Bengels, an aspiring junior game developer, merges their love for LEGO construction, Minecraft modding, and video editing to prototype interactive story experiences, drawing on their
    curiosity for new ideas and a practical knack for turning concepts into working demos, even if their loosely organized schedule sometimes leads to missed deadlines.
  sports: Michael Bengels, an energetic midfielder for the Columbia Youth Soccer Club, cheers for Manchester United during free time, participates in weekend community tournaments, and balances their athletic
    pursuits with regular hikes on the nearby Cedar Ridge Trail, where they often practice sprint drills with friends.
  arts: Michael Bengels, a creative teen who crafts short video montages of their soccer matches and school projects, tunes into the synth‑pop sounds of Daft Punk and the storytelling of science‑fiction
    novels like 'Ender’s Game', and channels their imaginative flair into elaborate LEGO builds that double as props for their Minecraft role‑play videos.
  travel: Michael Bengels, a curious explorer who favors spontaneous weekend day trips to the state park’s waterfall and annual family road trips to the historic streets of St. Louis, dreams of visiting
    Japan’s Akihabara district for the ultimate gaming and anime experience, yet their travel plans often hinge on school schedules and a limited allowance.
  culinary: Michael Bengels, a self‑described snack connoisseur who loves pepperoni pizza, chicken nuggets with honey‑mustard dipping sauce, and attempts to cook simple spaghetti Bolognese with fresh basil,
    frequently experimenting with new ingredients like avocado or chili flakes in their school lunchbox, though they occasionally burn the edges of their grilled cheese when multitasking.
  core: Michael Bengels, a 13‑year‑old soccer‑loving LEGO builder and budding coder, balances boundless curiosity with a relaxed, sometimes messy schedule, and always finds time to volunteer at the local
    animal shelter, where they greet each dog with a big smile.
background:
  cultural: Michael was raised in Columbia, Missouri, within a middle‑class, white family that values community, education, and Midwestern hospitality. His upbringing includes regular participation in school
    activities, local festivals like the Boone County Fair, and family gatherings centered around Sunday meals and holiday traditions such as Thanksgiving. The proximity to the University of Missouri provides
    exposure to academic events and a culture of curiosity, reinforcing his balanced outlook. He attends a public middle school that emphasizes collaborative learning, and his family encourages involvement
    in church youth groups and neighborhood volunteer projects, fostering a strong sense of cooperation and compassion.
