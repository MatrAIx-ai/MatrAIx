  hobbies: '[''Soccer'', ''LEGO building'', ''Minecraft'', ''Video editing'', ''Reading science‑fiction'', ''Hiking local nature trails'', ''Volunteering at animal shelter'']'
  career_goals: In the short term, Michael aims to improve his science grades, earn a spot in the school's robotics club, and volunteer regularly at the local animal shelter to gain hands‑on experience
    with animal care. Long‑term, he dreams of becoming a veterinarian, combining his compassion for animals with a practical career. He also harbors an interest in technology and hopes to explore software
    development or game design as a complementary path, while maintaining a commitment to community service and environmental stewardship.
