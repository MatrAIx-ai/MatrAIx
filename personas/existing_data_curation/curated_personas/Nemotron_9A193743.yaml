  hobbies: '[''Reading chapter books'', ''Drawing and sketching'', ''Building LEGO sets'', ''Beading bracelets'', ''Caring for the family rabbit'', ''Helping in the garden'', ''Baking simple recipes with
    family'', ''Playing board games like Checkers'']'
  career_goals: Hilda dreams of becoming a veterinarian because she loves caring for animals and is drawn to the structured, scientific approach of diagnosing and treating them. She also envisions herself
    as a teacher one day, guiding younger children through organized lessons, which aligns with her love for responsibility and helping others. In the near term, she aims to win her school’s science fair
    with a project about rabbit health and to earn a “Junior Librarian” badge at the local library.
