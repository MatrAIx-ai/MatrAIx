persona_description: A medical scientist who specializes in the development and testing of new, silver-based antibiotics. They are passionate about the potential of silver as an infection-fighting agent
  and are working to develop new drugs using colloidal silver. They are aware of the ban on colloidal silver products in the European Union and are actively lobbying for the harmonization of U.S. food supplement
  laws with those of Europe. They are aware of the potential dangers of the new class of silver-based prescription antibiotics and are working to educate consumers about the importance of natural, over-the-counter
  silver-based products.
