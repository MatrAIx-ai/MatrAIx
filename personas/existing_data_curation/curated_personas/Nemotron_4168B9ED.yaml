    ''Landscape photography'']'
  career_goals: Irvin aims to transition from his current campus security role into a leadership position within the protective services field. Over the next two years he plans to complete his bachelor's
    degree in Criminal Justice or Emergency Management, leveraging his existing college credits. He intends to earn professional certifications such as Certified Protection Officer (CPO) and Advanced First
    Responder, and to obtain an advanced firearms qualification. With his competitive drive, he is targeting a promotion to shift supervisor and eventually to campus security manager. Long‑term, Irvin aspires
    to join a federal protective agency—such as the Federal Protective Service or the Department of Homeland Security—where he can apply his interest in cutting‑edge security technologies and lead high‑stakes
    protective operations. He also envisions launching a boutique security consulting firm that offers data‑driven risk assessments for small‑to‑mid‑size organizations.
