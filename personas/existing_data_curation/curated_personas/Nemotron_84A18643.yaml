  hobbies: '[''DIY woodworking'', ''Gardening'', ''Watching home‑improvement shows'', ''Listening to construction podcasts'', ''Reading self‑help books'', ''Hiking'', ''Attending bluegrass concerts'', ''Volunteering
    at church food‑bank'', ''Yoga'', ''Journaling'']'
  career_goals: Crystal aims to advance from laborer to crew lead and eventually site supervisor within the next five years. She plans to earn an OSHA 30‑hour certification, a forklift operator license,
    and a journeyman carpenter credential. Long‑term, she hopes to become a certified safety officer, focusing on mental‑health awareness among construction crews, and later might start a small family‑owned
    remodeling business that emphasizes sustainable practices and offers apprenticeships for women entering the trades.
