personas:
  professional: Graham Dewett is a dedicated middle‑school teacher who designs standards‑aligned lesson plans with a blend of structured routines and flexible differentiation, while leveraging educational
    technology and their natural charisma to lead workshops, mentor new teachers, and coordinate drama and debate clubs.
  sports: Graham Dewett plays beach volleyball in the Hampton Roads league, catches early‑morning waves at Virginia Beach, follows the Washington Capitals in the NHL and the Virginia Cavaliers football
    team, and maintains a weekly fitness routine that balances surf sessions with weight‑training at the local gym.
  arts: Graham Dewett channels their love of live music by performing acoustic renditions of John Mayer and Bruce Springsteen at The NorVa open‑mic nights, participates in community theater productions
    ranging from Shakespeare to modern musical numbers by Lin‑Manuel Miranda, and draws inspiration from actors like Meryl Streep while honing storytelling through short‑story writing.
  travel: Graham Dewett prefers well‑planned road trips, often spending long weekends exploring the Outer Banks, historic Charleston, and the Shenandoah Valley, while dreaming of a heritage pilgrimage to
    County Kerry, Ireland, where they can trace their ancestors and soak up coastal culture.
  culinary: Graham Dewett enjoys cooking seafood dishes such as Old Bay‑seasoned crab cakes, shrimp po’boys, and grilled swordfish, mixes up barbecue rubs for neighborhood cook‑outs, and experiments with
    Caribbean‑inspired sauces while still relying on tried‑and‑true family recipes for comfort.
  core: Graham Dewett blends a love of coastal tradition with a pragmatic, routine‑driven mindset, thriving on social interaction, community involvement, and a disciplined approach to both work and play,
    even if they occasionally over‑schedule their calendar.
background:
  cultural: Graham was raised in a middle‑class, predominantly white suburban community on the Virginia coast, where family gatherings, community events, and a strong work ethic were emphasized. His upbringing
    reflects a blend of Mid‑Atlantic cultural values—pragmatism, respect for tradition, and a communal spirit shaped by the nearby naval presence. He grew up attending public schools that valued civic participation,
    which fostered his appreciation for local history and volunteer service. While his family's heritage traces back to European American roots, Graham identifies with the broader American coastal culture,
    celebrating regional holidays, enjoying seafood cuisine, and participating in beach‑side festivals that reinforce his connection to the Virginia Beach community.
