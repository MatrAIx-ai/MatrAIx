personas:
  professional: Jessica Harrelson, a senior market insights strategist, leverages her expertise in SQL, Python, Tableau and advanced statistical modeling to turn complex consumer data into clear, actionable
    marketing recommendations, while her innate need for structure and compassion ensures every insight is presented with ethical context and a focus on community benefit.
  sports: Jessica Harrelson embraces low‑impact fitness by hiking the Finger Lakes Trail with the local Trail Walking Club each Saturday, playing tennis at the community center during spring and fall, and
    cheering on the Buffalo Bills in football season and the New York Knicks during winter, all while she keeps her workouts on a predictable schedule to balance activity with her need for routine.
  arts: Jessica Harrelson nurtures her love of the arts by attending productions at Miller Hall Theatre, especially those starring Meryl Streep, enjoying folk concerts by Joan Baez, and displaying Winslow
    Homer landscape prints in her living room, which together enrich her evenings after a data‑driven workday.
  travel: Jessica Harrelson prefers meticulously planned trips, favoring weekend escapes to the Adirondacks, cultural tours of Boston’s historic Freedom Trail, and an annual pilgrimage to Edinburgh to explore
    castles and literary sites, all within a moderate vacation budget that balances her desire for enrichment with prudent spending.
  culinary: Jessica Harrelson delights in seasonal cooking, often preparing cedar‑smoked trout with lemon‑dill sauce, apple‑cinnamon crumble, and pairing them with a crisp Pinot Gris, while she experiments
    confidently with fresh herbs from her garden, even if she occasionally over‑salts a dish while multitasking between emails and recipes.
  core: Jessica Harrelson balances a data‑driven career and a community‑focused life, yet she frequently worries over minute details and can’t resist a glass of wine after long spreadsheet sessions, a habit
    that offers brief relief from her perfectionist tendencies.
background:
  cultural: 'Jessica grew up in a middle‑class, white suburban family in Upstate New York, where community involvement and education were highly valued. Her cultural upbringing reflects Northeastern American
    sensibilities: punctuality, reliability, a strong work ethic, and a respect for personal space balanced by neighborly cooperation. Family traditions include celebrating Thanksgiving, Fourth of July
    barbecues, and local harvest festivals in the Finger Lakes region. She maintains a modest, Protestant‑influenced moral framework, emphasizing service, humility, and stewardship. This background has
    shaped her appreciation for local arts, outdoor recreation, and a commitment to contributing positively to her community.'
attributes:
  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Survey Design'', ''Consumer Behavior Insight'', ''Market Segmentation'', ''Reporting & Presentation'', ''SQL'', ''Python (pandas, scikit-learn)'',
