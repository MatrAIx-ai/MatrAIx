  career_goals: Brailyn aims to transition into a flexible, part‑time role that leverages her compassion and practical skills, such as a community health aide, volunteer coordinator at a local nonprofit,
    or a small‑business owner of handmade crafts. She seeks low‑stress, supportive environments that allow her to contribute to her neighborhood, continue supporting her family, and pursue personal growth
    through continuous learning.
