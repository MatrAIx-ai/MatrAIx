persona_description: 'A member of the Idaho Council on Suicide Prevention who is responsible for creating and implementing suicide prevention activities in the state. This person is knowledgeable about
  the causes and effects of suicide, as well as the best practices for prevention. They are passionate about reducing suicide rates in Idaho and are committed to working with stakeholders to develop and
  implement effective interventions. This person is also responsible for distributing the 2012 Annual Report Summary and the Idaho Suicide Prevention Plan 2011: An Action Guide to the Governor and Legislature,
  as well as distributing copies of the suicide prevention hotline options report.'
