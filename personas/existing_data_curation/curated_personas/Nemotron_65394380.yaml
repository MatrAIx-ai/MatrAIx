  career_goals: Carla aims to advance her career within the protective-service field by completing a bachelor’s degree in criminal justice and obtaining professional certifications such as the Certified
    Protection Professional (CPP). In the next three to five years she hopes to be promoted to sergeant and eventually transition into a detective role, focusing on community-oriented policing and crisis
    negotiation. She is also interested in expanding her expertise in digital security and cyber-crime investigation to stay current with emerging threats. Long-term, Carla envisions a leadership position
    where she can mentor junior officers and shape departmental policies that balance public safety with community trust. On a personal level, she seeks financial stability and a structured routine that
    supports her independent lifestyle after her recent divorce.
