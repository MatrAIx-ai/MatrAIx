persona_description: A political analyst who specializes in conflict resolution and peace processes, particularly in the context of international relations and diplomacy. The individual is knowledgeable
  about the Comprehensive Peace Agreement (CPA) and the Agreement on the Resolution of the Conflict (ARC) signed in 2015. They have experience working with the Intergovernmental Authority on Development
  (IGAD) and the African Union to mediate peace talks between the opposing parties in South Sudan. The persona is also familiar with the humanitarian crisis in South Sudan and the Australian contribution
  to humanitarian assistance, including the deployment of Australian Defence Force personnel with UNMISS.
