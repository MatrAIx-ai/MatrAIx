persona_description: A researcher in fluid mechanics and materials science who specializes in the development of new techniques for visualizing fluid flow in opaque environments. This person is skilled
  in the use of neutron radiography to create high-resolution images of fluid flows, even when the flow is completely shrouded by metal. They have tested various combinations of neutron-opaque tracer particles
  and have demonstrated the feasibility of their technique through experiments in a simple pipe flow. This person's expertise lies in the intersection of fluid mechanics, materials science, and computational
  mechanics, and they have a deep understanding of the principles and limitations of neutron radiography in the context of their research.
