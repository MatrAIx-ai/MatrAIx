  hobbies: '[''digital drawing'', ''reading sci‑fi/fantasy novels'', ''playing indie video games'', ''creative writing'', ''nature photography'', ''Arduino tinkering'', ''listening to experimental music'',
    ''attending art workshops'', ''small board-game meetups'']'
  career_goals: He aims to translate his artistic passion into a professional career. His short‑term goal is to build a robust online portfolio of concept art, illustrations, and small interactive projects,
    and to enrol in a community-college visual-arts or interactive-media program after completing high school equivalency. In the longer term, David envisions working as a concept artist or freelance illustrator
    for video games or independent animation studios, eventually launching his own boutique studio or online shop selling original prints and custom commissions.
