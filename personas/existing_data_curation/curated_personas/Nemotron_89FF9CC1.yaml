personas:
  professional: David Vovan, a 17‑year‑old aspiring concept artist, channels their strong self‑driven creative drive into digital illustration using Procreate and Photoshop, experiments with Python‑based
    generative art, and they meticulously organize project assets in a cloud‑based library while staying flexible enough to pivot styles during indie game jam collaborations with a close‑knit group of friends.
  sports: David Vovan enjoys solo nature hikes in the nearby state park and participates in a weekend 5K run with the Riverside Youth Running Club, supports the Chicago Bulls (NBA), Chicago Cubs (MLB) and
    Chicago Blackhawks (NHL) as their primary professional teams, and they occasionally practice calisthenics at home to stay active, though they prefer low‑key, small‑group activities over organized team
    sports.
  arts: David Vovan immerses themselves in a vibrant arts diet that includes devouring fantasy novels by Neil Gaiman and N.K. Jemisin, drawing inspiration from Yoshitaka Amano’s character designs and the
    ambient soundscapes of Tim Hecker and Brian Eno, playing story‑rich indie games like Journey, Oxenfree and Hyper Light Drifter, and they regularly attend local art workshops where they collaborate on
    board‑game illustrations with friends.
  travel: David Vovan plans travel with a mix of careful research and spontaneous curiosity, having backpacked through the Pacific Northwest’s rugged coastline, explored Kyoto’s temples and ramen stalls,
    dreaming of a winter trip to Reykjavik to chase the northern lights and visit the Harpa Concert Hall, and they balance a modest travel fund sourced from freelance earnings and parental support.
  culinary: David Vovan’s palate favors creative comfort foods such as spicy miso‑glazed salmon, avocado toast sprinkled with chili flakes, a perfectly slurped bowl of tonkotsu ramen, and occasional experimental
    desserts like matcha tiramisu, and while they can execute a decent stir‑fry, they mainly enjoy ordering from local Asian eateries and experimenting with plating for Instagram posts.
  core: David Vovan is a quietly ambitious teen who blends solitary digital art experiments with collaborative indie‑game creation, manages a modest budget and mild anxiety, and they indulge in ambient
    soundtracks while dreaming of future art studios.
background:
  cultural: David grew up in Kalamazoo, Michigan, within a middle‑class white Midwestern family whose roots trace back to German and Polish immigrants who settled in the region in the early 20th century.
    The community’s modest, hard‑working values and access to a modest local arts scene – including the Kalamazoo Institute of Arts, community galleries, and the university’s student exhibitions – have
    shaped his appreciation for both traditional craftsmanship and contemporary, experimental art. He identifies with the broader American cultural landscape of pop‑culture fandom (comics, video games,
    sci‑fi media) while also valuing the quieter, introspective aspects of Midwestern life.
