  career_goals: Stacy aspires to become a senior full‑stack engineer and eventually lead a product team that fuses technology with artistic expression, such as immersive AR/VR experiences or interactive
    digital installations. She aims to deepen her expertise in human‑centered design and product strategy, positioning herself for a future role as a technical product manager or founder of a creative‑tech
    startup. Alongside her career advancement, Stacy is committed to mentoring women and underrepresented groups in tech, contributing to open‑source projects that support the arts, and championing inclusive
    workplace cultures.
