personas:
  professional: Melissa Strickland is a veteran painter and paperhanger in Orlando who combines meticulous surface preparation with a keen eye for color coordination; they manage small crews with tight
    schedules, keep jobs under budget, and are now channeling their structured work ethic into obtaining a contractor’s license and launching an eco‑friendly painting and remodeling boutique that mentors
    women in the trades.
  sports: Melissa Strickland stays active by jogging three miles around Lakeside Park each morning, playing in a co‑ed softball league organized by their church, and cheering for the Orlando Magic and Orlando
    Pride during the NBA and NWSL seasons; they also belong to a local walking club that meets for weekly hikes in the nearby nature preserves.
  arts: Melissa Strickland finds creative release on canvas, often painting impressionist landscapes inspired by weekend garden scenes, and they regularly attend the Orlando Museum of Art’s free evenings
    featuring works by local artists like Michael O'Rourke; literary tastes lean toward historical fiction by Ken Follett and Philippa Gregory, while their playlist includes Vivaldi’s Four Seasons and folk
    singer Joan Baez, which they play while working on DIY home projects.
  travel: Melissa Strickland prefers carefully planned, budget‑friendly road trips that blend relaxation with learning, having explored Savannah’s historic squares, Asheville’s craft‑brew scene, and a weekend
    retreat at the Bahamas for a family beach escape; they aim to visit Portugal’s Algarve coast for its historic towns and pastel‑colored architecture, budgeting the trip through a dedicated travel fund
    and using a reusable travel kit to stay eco‑conscious.
  culinary: Melissa Strickland enjoys cooking hearty family meals such as roasted herb chicken, homemade lasagna, and ratatouille, often pulling fresh basil, rosemary, and cherry tomatoes from their backyard
    garden; their culinary skill is solid—comfortable with sautéing, braising, and baking—yet they sometimes over‑salt dishes when in a rush, and they love hosting casual Friday night pizza nights featuring
    locally sourced mozzarella and pepperoni.
  core: Melissa Strickland balances a calm, structured work ethic with hands‑on creativity, turning paint‑splattered weekends into community mentorship while keeping finances and health meticulously in
    check, all while indulging in garden‑fresh meals and seasonal sports.
background:
  cultural: Melissa identifies as a white American with deep roots in the Southeast. Raised in a middle‑class Florida suburb, she was influenced by a blend of traditional Southern hospitality and the diverse
    cultural tapestry of Orlando. Her upbringing emphasized hard work, community involvement, and family cohesion, values that align with her cooperative and considerate nature. While she respects the multicultural
    environment of her city, Melissa maintains a personal cultural identity centered around family, Christianity, and a pragmatic approach to life and work.
