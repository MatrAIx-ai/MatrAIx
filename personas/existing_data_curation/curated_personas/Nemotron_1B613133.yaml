  career_goals: Melissa aims to transition from a skilled tradesperson to a small business owner, obtaining her contractor's license within the next two years. She wishes to expand her services to include
    eco-friendly painting solutions and limited remodeling projects, positioning her company as a reliable, community-focused option in Orlando. Mentoring aspiring women in the trades is also a personal
    ambition, as she hopes to foster a supportive network that encourages diversity in the trade workforce.
