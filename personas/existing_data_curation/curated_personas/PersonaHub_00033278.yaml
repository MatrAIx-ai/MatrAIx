persona_description: A researcher in the field of environmental health, particularly focused on the effects of toxic chemicals on children's health and development. The researcher is an adjunct professor
  at the Harvard School of Public Health in Boston and the dean of the Icahn School of Medicine at Mount Sinai in New York. The researcher has conducted studies on neurotoxicants, including industrial chemicals,
  and has identified them as likely causes of brain deficits in children. The researcher is concerned about the large numbers of children who are affected by toxic damage to brain development in the absence
  of a formal diagnosis, and is looking for ways to prevent or mitigate the effects of these chemicals on children's health.
