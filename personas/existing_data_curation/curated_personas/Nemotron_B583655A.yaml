personas:
  professional: Charlie Mcclain is an aspiring young technologist who creates interactive story games in Scratch, designs intricate LEGO models, and sketches nature scenes, and they channel their boundless
    curiosity and disciplined, detail‑oriented mindset into early coding projects and artistic prototypes.
  sports: Charlie Mcclain enjoys playing forward on the local youth soccer team, participates in the Greenwood Scouts hiking club, follows professional teams like the Seattle Seahawks (NFL) and Seattle
    Mariners (MLB), and they often mimic their favorite players’ moves during recess.
  arts: Charlie Mcclain spends afternoons sketching forest landscapes, practicing piano pieces ranging from Beethoven’s “Für Elise” to contemporary tunes by Billie Eilish, and admiring the works of Claude
    Monet and Hayao Miyazaki, which they cite as inspiration for both their drawings and Scratch story narratives.
  travel: Charlie Mcclain loves weekend nature hikes, has visited Yellowstone National Park and the Grand Canyon with family, dreams of exploring the natural history exhibits in London, England, and they
    prefer trips planned with a detailed map and a pocket notebook where they jot down observations and draw quick sketches.
  culinary: Charlie Mcclain favors pepperoni pizza with mushroom toppings, mac‑and‑cheese, and makes their own fruit kebabs using strawberries, grapes, and banana, can whisk up scrambled eggs with cheese
    with moderate success, but they often forget to clean the kitchen counter afterwards.
  core: Charlie Mcclain is a fiercely organized, curiosity‑driven ten‑year‑old who balances relentless perfectionism with a love for LEGO, piano, and leaf collecting, yet they sometimes forget to tidy up
    and tend to over‑plan their playtime.
background:
  cultural: Charlie comes from a white, New England American family with deep roots in Rhode Island dating back to the colonial era. His household celebrates traditional New England holidays, enjoys seafood
    dishes like clam chowder, and values community involvement through local events such as town fairs and library storytimes. The family encourages appreciation of the arts, often visiting nearby museums
    like the RISD Museum, and supports his curiosity-driven learning.
