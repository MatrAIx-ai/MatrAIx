  career_goals: He dreams of a future where he can blend his love for art and systematic thinking, aspiring to become an architect or a museum curator who designs engaging exhibitions. He also expresses
    interest in becoming an environmental scientist who can investigate new ideas and solve problems. His long‑term ambition includes creating innovative projects that inspire others and contribute positively
    to his community.
