  career_goals: David aims to transition from a frontline retail salesperson to a store manager within the next two years, focusing on a boutique that highlights local artists and handcrafted goods. He
    plans to pursue a part‑time management certification and eventually an MBA to qualify for regional sales leadership. Long‑term, he envisions opening his own art‑focused shop or gallery that serves as
    a community hub for exhibitions, workshops, and collaborative projects, blending his commercial acumen with his passion for art and cultural exchange.
