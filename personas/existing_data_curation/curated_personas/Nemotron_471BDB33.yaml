personas:
  professional: Melissa Jones, a budding robotics designer, channels her love for structure and hands‑on problem solving into building and programming simple robots for her school club, where her reliable
    nature and occasional assertiveness keep projects on schedule.
  sports: Melissa Jones, a member of the Madison Youth Soccer Club and a dedicated participant in her middle school’s cross‑country team, follows the Milwaukee Brewers and the Green Bay Packers on game
    days, and spends weekends hiking the nearby lakeshore trails to stay fit and enjoy fresh air.
  arts: Melissa Jones, an avid pianist who practices classical pieces by Beethoven and contemporary melodies by Ludovico Einaudi, frequently listens to Taylor Swift and Adele for inspiration, and expresses
    creativity through handmade friendship bracelets and jewelry inspired by her favorite mystery novels.
  travel: Melissa Jones, an enthusiastic explorer who prefers family‑planned road trips with a mix of scheduled stops and spontaneous lakeside picnics, has camped at Wisconsin’s Mirror Lake State Park and
    dreams of visiting the Grand Canyon and the historic streets of Edinburgh.
  culinary: Melissa Jones, a budding baker whose skill level ranges from rolling chocolate‑chip cookies to attempting layered red‑velvet cupcakes, loves the warm aroma of melted butter and vanilla, and
    often mixes in toasted walnuts or a dash of cinnamon to personalize each batch.
  core: Melissa Jones blends a love for structured learning with a youthful curiosity, balancing organized robotics projects, careful allowance saving, and a habit of over‑packing snacks for every adventure.
background:
  cultural: Melissa comes from a white, Midwestern American family in Madison, Wisconsin. Her upbringing reflects the region’s emphasis on community involvement, outdoor recreation, and a blend of traditional
    values with progressive education. She participates in local events such as the Dane County Fair and community library programs, and her family celebrates holidays with typical American customs while
    also cherishing the seasonal rhythm of the Midwest, including winter snow activities and summer lake outings.
