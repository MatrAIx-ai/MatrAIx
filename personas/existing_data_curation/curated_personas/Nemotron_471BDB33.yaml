  career_goals: At the moment, Melissa dreams of working with animals and hopes to become a veterinarian, a goal inspired by her regular volunteer work at the local animal shelter. She is also fascinated
    by science and technology, so she considers a future in biomedical research or environmental science, where she could apply her practical problem‑solving skills. In the short term, she aims to excel
    in her school science classes, earn a spot in the robotics club’s leadership team, and continue developing her coding abilities.
