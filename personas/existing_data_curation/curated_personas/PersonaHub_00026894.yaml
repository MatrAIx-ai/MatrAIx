persona_description: A development economist who is interested in the impact of globalisation on developing countries and the backward regions within them. They are concerned with ensuring that the benefits
  of globalisation are distributed more equitably and that the socio-economically disadvantaged are not left behind. The reader is likely to be knowledgeable about globalisation, development economics,
  and the impact of technology and communications on economies. They are interested in understanding the challenges and opportunities that arise from globalisation and how it affects the development of
  backward areas.
