personas:
  professional: Marion Ellis is a budding environmental data analyst who blends Python, R, and GIS expertise with hands‑on field sampling to deliver concise sustainability reports, channeling a fierce curiosity
    and competitive drive into rapid problem‑solving while their relaxed attitude toward strict schedules sometimes forces last‑minute data crunches.
  sports: Marion Ellis fuels fitness with weekend hikes across the Mandan prairie, regular yoga sessions, membership in the Mandan Trail Runners Club and the North Dakota Birding Society, proudly supports
    the North Dakota State Bison football team and the Minnesota Vikings for weekend NFL thrills, and uses occasional pickup basketball games as a competitive outlet to balance their love of strategy with
    physical activity.
  arts: Marion Ellis channels creativity through nature photography, curates playlists featuring indie folk icons Bon Iver, Sufjan Stevens, and Fleet Foxes, devours science‑fiction literature from Andy
    Weir, N.K. Jemisin, and Liu Cixin, and attends productions at the Stark County Playhouse, letting these artistic influences enrich both their board‑game tactics and environmental storytelling.
  travel: Marion Ellis prefers low‑budget, nature‑focused escapades, often planning spontaneous road trips to Theodore Roosevelt National Park, Glacier National Park, and the volcanic landscapes of Iceland,
    while student‑level finances steer them toward weekend adventures close to home rather than extended overseas voyages.
  culinary: Marion Ellis delights in cooking hearty, plant‑forward meals such as quinoa‑seeded kale salad with foraged rosemary, bison chili spiced with smoked paprika, and campfire‑grilled trout finished
    with lemon‑dill butter, and though they rate themselves as an intermediate home cook, they often rely on ready‑made sauces and occasionally splurge on specialty coffee beans for post‑hike refuel.
  core: Marion Ellis merges boundless curiosity for eco‑technology with a competitive, worry‑prone nature, constantly juggling field data, late‑night coding, and spontaneous hikes while battling a habit
    of procrastinating on planning.
background:
  cultural: Marion's cultural background is rooted in the Midwestern values of modesty, hard work, and community, shaped by growing up in a small, predominantly white town in North Dakota. Her family’s
    heritage includes German and Scandinavian ancestry, which instilled an appreciation for self‑sufficiency, seasonal cycles, and local traditions such as county fairs and community potlucks. While the
    local culture emphasizes practicality and modest ambition, her college education exposed her to broader scientific perspectives, creating a blend of grounded pragmatism and curiosity about global issues.
attributes:
  skills: '["Python programming", "R statistical analysis", "GIS mapping", "Water quality testing", "Technical writing", "AutoCAD", "Prototype design", "Critical thinking", "Problem solving"]'
  hobbies: '["Hiking and bird‑watching", "Landscape photography", "Arduino/Raspberry Pi tinkering", "Soil‑moisture sensor projects", "Strategy board games", "Escape‑room puzzles", "Volunteer coding workshops",
    "Reading science fiction", "Yoga", "Journaling"]'
  career_goals: Marion aims to secure a junior analyst or field researcher position in environmental consulting or a clean‑tech start‑up within the next year, where she can apply her data‑analysis and GIS
    skills to real‑world sustainability challenges. She plans to pursue a master’s degree in environmental engineering to deepen her expertise and eventually lead interdisciplinary projects that blend technology
    and practical solutions for rural communities. A supportive, flexible workplace that encourages continuous learning aligns with her competitive drive while helping her manage her natural tendency toward
    worry.
