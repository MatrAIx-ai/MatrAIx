  hobbies: '[''Baseball'', ''Soccer'', ''LEGO building'', ''Minecraft world‑building'', ''Chess'', ''Boy Scouts'', ''Robotics club'', ''Reading science & adventure books'', ''Competitive video gaming'']'
  career_goals: Reagan envisions a future where his curiosity and methodical skills converge in a career as a robotics or mechanical engineer, designing machines that address real‑world challenges in rural
    communities. In the short term, he aims to earn a spot on his school’s robotics competition team, win a state‑level chess championship, and secure a scholarship to a STEM‑focused high school. Parallel
    to his technical ambitions, he harbors a strong desire to continue playing baseball at the collegiate level and possibly pursue a professional athletic path, using his leadership and competitive spirit
    to excel. Aware of his tendency to worry, Reagan is committed to setting clear milestones, building a portfolio of projects, and maintaining a balanced schedule to manage stress while achieving his
    goals.
