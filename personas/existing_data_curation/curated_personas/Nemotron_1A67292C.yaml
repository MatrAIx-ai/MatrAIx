personas:
  professional: Reagan Borras is a budding robotics hobbyist who blends meticulous project planning with a competitive edge, coding sensor-driven LEGO creations and leading their school robotics club's
    design sessions while keeping an eye on practicality over flash, and they always test each code module twice before showing it off.
  sports: Reagan Borras swings a bat for the Eagle Creek Little League team, organizes after-school pick-up soccer matches, roots for the New York Yankees and Manchester United, and follows a disciplined
    fitness routine that blends weekly baseball drills, weekend hiking with Boy Scouts, and occasional weight-training sessions at the community center, all driven by a competitive streak and methodical
    schedule, and they track their progress in a personal logbook.
  arts: Reagan Borras channels their creative spark into building intricate LEGO models, crafting expansive Minecraft realms, and devouring sci-fi novels by Neal Gaiman while they jam to Billie Eilish,
    listen to video-game composer Koji Kondo, and sketch comic panels inspired by Marvel's Spider-Man, making the arts a vibrant backdrop to their everyday play.
  travel: Reagan Borras prefers adventure-packed weekend camping trips in nearby state parks with the Boy Scouts, dreams of hiking the Grand Canyon and exploring Tokyo's Akihabara district for gaming culture,
    meticulously mapping routes and packing gear months ahead, yet balances these plans with a family budget that limits trips to regional destinations during school breaks, and they often compare travel
    itineraries like a strategic game board.
  culinary: Reagan Borras craves the cheesy stretch of a pepperoni pizza and the sweet crunch of homemade chocolate chip cookies, often whipping up simple snacks like macaroni-and-cheese or s'mores on scout
    campfires, while they experiment with layering tacos using ground beef, lettuce, and salsa, always aiming for a perfect balance of flavor and fun.
  core: Reagan Borras is a competitive, methodical twelve-year-old who blends curiosity with practicality, juggling robotics, sports, and creative builds while they wrestle with worry-driven perfectionism
    and a relentless drive to out-perform peers.
background:
  cultural: Reagan was raised in Crofton, a close‑knit community in Christian County, Kentucky. His family follows the Baptist tradition, attending weekly services and participating in youth ministry, which
    reinforces values of fellowship, modesty, and service. The local culture emphasizes self‑reliance, hard work, and respect for elders, shaped by the area's agricultural roots and small‑business mindset.
    Seasonal community events—such as the Fourth of July fireworks, county fair livestock shows, and family barbecues—are central to his social life. He grew up listening to country and bluegrass music,
    enjoys outdoor activities like fishing and hiking, and celebrates holidays with homemade meals and gatherings. This middle‑American, rural Southern background fosters a blend of hospitality, competitive
    spirit in school sports, and a pragmatic outlook on life.
attributes:
  skills: '[''Organizing group projects'', ''Leadership in baseball'', ''Strategic thinking (chess)'', ''Basic programming (Scratch)'', ''Robotics building and programming'', ''Public speaking (debate club)'',
