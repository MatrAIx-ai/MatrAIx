    for diverse learners'']'
  hobbies: '[''painting'', ''pottery'', ''visiting art galleries'', ''hiking'', ''reading contemporary fiction'', ''improv theater'', ''playing ukulele'', ''cooking experimental dishes'', ''volunteering
    at community center'', ''attending regional arts festivals'']'
  career_goals: Michelle aspires to earn a master's degree in special education leadership and take on a district‑wide coordinator role where she can champion inclusive, arts‑infused curricula. She aims
    to secure grant funding to launch a community arts program that offers therapeutic and expressive opportunities for students with disabilities. Over the next five years, she envisions mentoring a network
    of special‑education teachers, influencing policy on differentiated instruction, and becoming a recognized advocate for innovative, student‑centered learning in Indiana.
