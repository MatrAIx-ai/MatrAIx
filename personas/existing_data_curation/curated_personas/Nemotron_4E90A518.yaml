personas:
  professional: Michelle Bertholf, a 34‑year‑old special‑education teacher in Indiana, blends evidence‑based instruction with her love of painting and improv to design individualized learning plans that
    feel like living canvases, while confidently leading professional‑development workshops and mentoring new teachers, all fueled by their curiosity and sociable energy.
  sports: Michelle Bertholf, a dedicated hiker of the Wakarusa trails and member of the local Trail Runners club, hits the local YMCA for weekday spin classes, roots for the Indiana Pacers and Indianapolis
    Colts, and occasionally joins a mixed‑gender softball league for social fun, balancing cardio with the occasional yoga stretch after pottery sessions.
  arts: Michelle Bertholf immerses themselves in the arts by painting vibrant abstracts inspired by Frida Kahlo, attending Yayoi Kusama exhibitions, performing improv with the Bloomington Improv Collective,
    strumming the ukulele to Jack Johnson and Tame Impala, and curating an eclectic collection of indie films from Wes Anderson to Greta Gerwig.
  travel: Michelle Bertholf prefers immersive, art‑focused trips, having trekked the volcanic landscapes of Iceland, explored the pottery studios of Oaxaca, and spent a weekend in Brown County, Indiana
    for a sketch‑in‑the‑woods retreat, while dreaming of a future pilgrimage to Kyoto’s Kiyomizu‑dera to study traditional Japanese ceramics.
  culinary: Michelle Bertholf experiments in the kitchen with a moderate skill level, often whipping up exotic dishes like Thai green curry with galangal and lemongrass, Ethiopian injera paired with berbere‑spiced
    stews, and Japanese miso ramen, while favoring fresh herbs such as cilantro, basil, and Thai basil to flavor their creations.
  core: Michelle Bertholf is a 34‑year‑old special‑education champion who paints, potters, and performs improv with equal passion, turning classrooms into collaborative art studios while juggling a colorful
    budget, occasional health quirks, and a relentless curiosity for new experiences.
background:
  cultural: Michelle was raised in a close‑knit Midwestern town in Indiana, rooted in a white, working‑class American family that values hard work, community service, and modesty. Her upbringing involved
    participation in local church events, school activities, and town festivals, fostering a strong sense of belonging and collective responsibility. While she cherishes these traditional values, her career
    in special education and her love for the arts have broadened her perspective, encouraging an openness to progressive ideas and diverse cultural expressions within her community.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Differentiated instruction'', ''Classroom behavior management'', ''Arts integration for therapeutic learning'', ''Collaborative team
