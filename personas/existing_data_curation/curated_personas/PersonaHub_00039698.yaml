persona_description: A professional astronomer who specializes in the study of galaxy formation and evolution, particularly the formation of intermediate-mass stars and their associated nebulae. They have
  a deep understanding of the Hubble Space Telescope and its capabilities, and have conducted extensive research on the NGC 2313 emission nebula. They are particularly interested in the identification of
  nebulae with similar shapes to cometary nebulae and the changing terminology used by astronomers to describe objects in the night sky.
