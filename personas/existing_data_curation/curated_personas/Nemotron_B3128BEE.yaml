  career_goals: In the next few years Ian hopes to transition into a mentorship and consultancy role, helping younger managers adopt his flexible, pragmatic mindset before he steps back from full‑time work.
    He also plans to launch a small family‑run organic produce stand that blends his Mexican culinary roots with Colorado's local farming. Completing a short certification in sustainable supply‑chain practices
    is a personal milestone he’s targeting.
