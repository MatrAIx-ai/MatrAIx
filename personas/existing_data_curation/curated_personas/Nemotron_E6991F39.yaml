  hobbies: '[''Quilting'', ''Crocheting'', ''Gardening'', ''Birdwatching'', ''Walking in City Park'', ''Listening to jazz in small clubs'', ''Cooking Creole cuisine'', ''DIY home repair projects'', ''Reading
