  career_goals: Demetria aims to earn an EPA certification for refrigerant handling and obtain a state‑licensed contractor credential, which will enable her to start a boutique maintenance service focused
    on the historic homes of New Orleans. She hopes to mentor younger apprentices, especially women of color entering the trades, by offering informal workshops and on‑the‑job guidance. Additionally, she
    plans to stay current with energy‑efficient technologies and volunteer on community housing restoration projects, using her expertise to preserve the cultural fabric of her neighborhood.
