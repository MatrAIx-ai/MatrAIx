personas:
  professional: Demetria Pilart, a veteran building maintenance specialist with three decades of HVAC, plumbing, and electrical expertise, blends time‑tested repair methods with selective smart‑home technology,
    and they approach each project with methodical curiosity, even as their relaxed, slightly disorganized scheduling reflects the fluid pace of historic New Orleans homes they love.
  sports: Demetria Pilart stays active by strolling through City Park, joining the Reed Community Center’s senior pickleball league, cheering for the New Orleans Saints and the New Orleans Pelicans, and
    they treat fitness as a leisurely competition that satisfies their curiosity and competitive streak.
  arts: Demetria Pilart finds artistic fulfillment in intimate jazz sessions at Frenchmen Street, often listening to Ella Fitzgerald, Louis Armstrong, and Wynton Marsalis, while they also channel their
    creative side into quilting inspired by the patterns of Zora Neale Hurston’s novels, making the arts a quiet but vital thread in their daily rhythm.
  travel: Demetria Pilart prefers slow, reflective travel, planning weekend getaways to historic cities like Savannah, Georgia, and Charleston, South Carolina, as well as overseas trips to Lisbon, Portugal,
    where they can wander cobblestone streets and sample local cuisine, while opting for modest accommodations that fit their flexible budget and occasional family obligations.
  culinary: Demetria Pilart delights in cooking Creole classics such as shrimp étouffée, gumbo with Andouille sausage, and red beans and rice, often adding unconventional ingredients like miso paste or
    saffron to give a modern twist, and they approach the kitchen with the same methodical curiosity they apply to maintenance projects, though they sometimes forget to set timers while engrossed in a puzzle.
  core: Demetria Pilart blends seasoned trade expertise with a solitary, creative spirit, tackling repairs and recipes alike with methodical curiosity, a competitive edge, and a relaxed disregard for rigid
    schedules, while occasionally leaving tools scattered and appointments forgotten.
background:
  cultural: Demetria is a Black woman whose family has lived in New Orleans for generations, steeped in the city's rich African‑American heritage. She grew up immersed in the sounds of jazz and blues, the
    flavors of Creole and Cajun cuisine, and the traditions of second‑line parades and community church gatherings. Her upbringing emphasized self‑reliance, storytelling, and mutual aid, values that continue
    to shape her outlook. She proudly carries forward the legacy of her community through her work on historic homes and her participation in local cultural events, while also honoring the resilience and
    creativity of the Black diaspora in the Southern United States.
