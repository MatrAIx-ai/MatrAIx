persona_description: A healthcare professional who specializes in respiratory and cardiovascular medicine, particularly in the diagnosis and management of lung and heart problems. They are trained in the
  use of pulse oximetry and pulmonary function testing to assess the health of the lungs and heart, and are skilled in interpreting the results of these tests to make informed decisions about patient care.
  They may also be involved in research on the effects of lung and heart problems on overall health and the development of new treatments.
