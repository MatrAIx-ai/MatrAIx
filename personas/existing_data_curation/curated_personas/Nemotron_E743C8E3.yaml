personas:
  professional: Edwin Nelson, a budding junior builder, delights in constructing intricate LEGO models and inventing simple machines, turning playground teamwork into early engineering practice as they
    nurture a methodical, routine‑loving mindset.
  sports: Edwin Nelson thrives on the soccer field as a forward for the Little League Tigers' youth soccer club and pitches for the local baseball team, cheering on the Chicago Cubs and Chicago Bulls whenever
    they watch games on TV, and they follow a routine of warm‑ups and stretch‑plays that balance competitive drive with teamwork.
  arts: Edwin Nelson enjoys tapping out beats on a drum pad to the rhythms of The Beatles, Queen, and Taylor Swift, while they also binge‑watch Pixar movies like Toy Story and draw vibrant comic‑style illustrations
    inspired by Spider‑Man, blending music and visual art into after‑school creativity.
  travel: Edwin Nelson loves family road trips to the Grand Canyon and a magical weekend at Disneyland in California, and they dream of visiting Tokyo’s Ueno Park and the ancient castles of Scotland, preferring
    itineraries that mix exciting amusement park rides with short, familiar days at home to avoid overwhelming their routine‑oriented nature.
  culinary: Edwin Nelson favors cheesy pizza with pepperoni, crispy chicken nuggets, and buttery mac & cheese, often sprinkling extra mozzarella and enjoying strawberry‑banana smoothies, and they like helping
    their parent stir batter for pancakes, though they sometimes sneak a handful of chocolate chips when no one is looking.
  core: Edwin Nelson is an energetic 7‑year‑old who blends a love for routine and teamwork into Lego engineering, soccer drills, and pop‑rock drumming, while occasionally battling a sneaky sweet tooth and
    mild allergies.
background:
  cultural: Edwin comes from a white, middle‑class family with roots in German and Irish ancestry, typical of many households in Allentown, Pennsylvania. His upbringing includes traditional American holidays
    such as Thanksgiving and Christmas, where family meals and community gatherings are emphasized. He participates in local school events, the Allentown summer fair, and the neighborhood youth sports leagues,
    reflecting a community‑oriented, practical cultural environment that values routine, teamwork, and modest ambition.
attributes:
  skills: '[''reading fluency (grade 2 level)'', ''basic arithmetic (addition and subtraction)'', ''following multi‑step instructions'', ''LEGO building and spatial reasoning'', ''basic tablet navigation
