  hobbies: '[''soccer and baseball'', ''LEGO building'', ''drum pad rhythm games'', ''listening to pop/rock music'', ''reading adventure books'', ''after‑school community center activities'']'
  career_goals: Edwin dreams of becoming a firefighter or a community helper who works with a reliable routine and a close‑knit team. He is also fascinated by being a soccer coach for younger kids, where
    he can combine his love for sports, teamwork, and teaching others. Occasionally, he imagines being an astronaut because of his interest in exploration, but he always returns to ideas that involve helping
    people and being part of a dependable group.
