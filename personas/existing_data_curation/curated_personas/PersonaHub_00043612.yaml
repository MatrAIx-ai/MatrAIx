persona_description: A German Studies Professor who specializes in the history of the Weimar Republic and the rise of Nazism in Germany. Her research interests include the cultural, political, and social
  changes that occurred during this period, as well as the impact of these changes on German society and culture. She has a passion for teaching and engaging her students with the complex and fascinating
  history of Germany during this tumultuous time. Her classes are known for their depth of knowledge, critical thinking, and the ability to apply historical analysis to contemporary issues.
