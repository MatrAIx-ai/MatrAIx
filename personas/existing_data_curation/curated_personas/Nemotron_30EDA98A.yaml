  career_goals: Kirby aims to transition into a senior consulting role where he can leverage his blend of practical engineering insight and collaborative style to help midsize manufacturers adopt sustainable,
    technology‑forward processes. He aspires to mentor the next generation of engineers, develop interdisciplinary innovation workshops, and contribute to local STEM outreach programs. While seeking senior
    influence, he values flexibility and prefers project‑based work that allows spontaneous learning and avoids overly rigid corporate structures.
