personas:
  professional: Kirby Diblasi, a senior manufacturing consultant who leverages a deep mechanical engineering background and Agile leadership to guide midsize factories toward sustainable IoT and additive
    manufacturing solutions, is known for translating complex technical concepts into hands‑on workshops while balancing curiosity with a practical, people‑first mindset.
  sports: Kirby Diblasi, a 57‑year‑old who captains a community soccer team called the Ozark Trailblazers, regularly cheers for the St. Louis Cardinals and the Kansas City Chiefs, and spends Saturday mornings
    hiking the Ozark National Scenic Riverways while balancing a love of competition with a laid‑back, social approach to fitness.
  arts: Kirby Diblasi, an avid acoustic‑guitar enthusiast, frequently joins jam sessions featuring songs by John Mayer, The Avett Brothers, and local folk singer Sarah Jane, and they regularly attend performances
    at the St. Louis Screen Door and the Historical Brick House theater, allowing music to shape their collaborative engineering workshops.
  travel: Kirby Diblasi, an explorative spirit with a penchant for spur‑of‑the‑moment road trips, has road‑tripped along the Great River Road to watch the Mississippi sunrise, backpacked through the Scottish
    Highlands, and dreams of cycling the Pacific Coast Highway while balancing a modest travel budget with a preference for flexible itineraries over rigid tours.
  culinary: Kirby Diblasi, a self‑proclaimed grill master, delights in smoking brisket with oak chips, perfecting Kansas City‑style ribs, pairing them with a hoppy IPA from Boulevard Brewing Co., and they
    relish experimenting with rubs featuring smoked paprika, brown sugar, and chipotle, while occasionally overindulging in late‑night craft‑brew flights during weekend gatherings.
  core: Kirby Diblasi fuses seasoned engineering rigor with a spontaneous, socially‑driven lifestyle, often swapping meticulous project plans for impromptu BBQs, road trips, and hands‑on maker‑space hackathons.
background:
  cultural: Kirby grew up in the St. Louis suburbs within a middle‑class, predominantly white, Midwestern environment. His family’s roots include German and Irish ancestry, and his upbringing emphasized
    hard work, self‑reliance, and community involvement—values reflected in local traditions such as attending Cardinals games, celebrating Fourth of July fireworks over the Mississippi, and gathering for
    Thanksgiving dinner. While rooted in these conventional Midwest customs, he’s also open to new ideas, a trait encouraged by his STEM education and the region’s growing tech and maker scene.
