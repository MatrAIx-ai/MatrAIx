  career_goals: Marlene aims to finish her high school education and obtain a certification in medical assisting or office administration, fields that combine her love of structure with her desire to help
    others in a supportive environment. She envisions starting as a medical office aide at the local clinic, where she can use her organizational strengths to keep patient records orderly and assist the
    care team. In the longer term, she hopes to pursue further training to become a registered nurse, balancing a practical career with the opportunity to provide compassionate care. She also keeps a backup
    ambition of working in a community library, where her love of order and quiet would be a natural fit.
