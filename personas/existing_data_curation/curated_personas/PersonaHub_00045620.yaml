persona_description: A researcher in economics who specializes in studying the dynamics of wealth distribution in economies with constant marginal saving rates, idiosyncratic shocks to firms' productivities,
  and competitive markets for factors. The researcher is particularly interested in the theoretical predictions and empirical evidence that the Pareto exponent depends on the saving rate in a nonmonotonic
  fashion, on the net return on capital, on the growth rate of population, and on the degree of portfolio diversification. The researcher is also interested in the results that the bottom tail of the wealth
  distribution mostly depends on the characteristics of the labour market.
