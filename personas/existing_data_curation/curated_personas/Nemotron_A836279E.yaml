  hobbies: '[''Watercolor Painting'', ''Herb Gardening'', ''Reading Scientific Literature'', ''Classical Piano Listening'', ''Traditional Salvadoran Music'', ''Attending Art Exhibitions'', ''Cooking Salvadoran
    Cuisine'', ''Volunteering as Coding Mentor'', ''Genealogy Research'', ''Dog Walking'', ''Crossword Puzzles'']'
  career_goals: Although retired, Fernando aims to solidify his legacy by mentoring the next generation of engineers, documenting his life story and professional insights in a memoir, and establishing a
    small scholarship for Salvadoran youth pursuing STEM studies. He also wishes to complete a series of watercolor paintings capturing the landscapes of his native El Salvador and to organize an annual
    community art‑science showcase in Hollister that celebrates cultural diversity and interdisciplinary curiosity.
