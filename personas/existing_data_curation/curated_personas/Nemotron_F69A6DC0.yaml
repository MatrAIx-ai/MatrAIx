personas:
  professional: Event management professional Terry Doss blends meticulous logistical planning with a curiosity for emerging tech, leveraging tools like Cvent and Asana to orchestrate hybrid conferences
    while balancing practical budget constraints and inventive problem‑solving.
  sports: Terry Doss is a regular on the Seattle Sounders FC fan club, a devoted Seattle Seahawks supporter, and a member of the Kittitas County Mountain Biking League, playing pickup basketball at the
    community center twice weekly while maintaining a year‑round fitness regimen that includes trail runs and seasonal cross‑country skiing.
  arts: An avid community‑theater participant, Terry Doss enjoys acting in local productions, attends Bumbershoot and the Port Townsend Film Festival, and draws creative inspiration from indie folk singer
    Lucy Dacus, avant‑garde playwright Sarah Ruhl, and visual artist Yayoi Kusama's immersive installations.
  travel: Passionate about wilderness and cultural immersion, Terry Doss has backpacked the Canadian Rockies, trekked the Pacific Crest Trail section through Oregon, explored the street food scene of Osaka,
    and hopes to visit Iceland's volcanic landscapes next summer, preferring a blend of self‑planned routes and occasional guided tours.
  culinary: Terry Doss boasts a budding chef’s skill set, regularly cooking cedar‑plank smoked trout with rosemary, perfecting Korean bibimbap bowls with gochujang, and experimenting with homemade za’atar‑infused
    flatbreads, while often sourcing fresh produce from the Kittitas County farmers market.
  core: Terry Doss balances a relentless energy for outdoor adventure and community events with a habit of over‑booking weekends, a penchant for late‑night tech podcasts, and an occasional inability to
    say no to new gear or recipe experiments.
background:
  cultural: Terry grew up in Ronald, a small town in Kittitas County, Washington, within a predominantly white, middle‑class community that values self‑reliance, hard work, and close‑knit relationships.
    His family emphasized practical skills—like gardening, woodworking, and seasonal outdoor activities—while also encouraging curiosity, leading to evenings filled with documentaries and discussions about
    new ideas. The Pacific Northwest’s strong connection to nature and environmental stewardship shaped his appreciation for outdoor recreation and sustainable practices. Local traditions such as county
    fairs, high‑school sports, and community theater fostered his sociable, outgoing nature and his comfort working in collaborative, group‑focused settings.
attributes:
  skills: '[''Event Logistics Coordination'', ''Venue Selection & Negotiation'', ''Budget Development & Cost Control'', ''Vendor Management'', ''Risk Assessment & Contingency Planning'', ''Team Leadership
