  hobbies: '[''Hiking and Trail Exploration'', ''Mountain Biking'', ''Fly Fishing'', ''Community Theater Acting'', ''Volunteer Event Staffing at County Fair'', ''Pickup Basketball'', ''Music Festival Attendance'',
    ''Cooking and Food Exploration'']'
  career_goals: In the near term, Terry aims to step up as a senior event coordinator at a regional convention center, overseeing larger conferences and earning the Certified Meeting Professional (CMP)
    credential. He also plans to mentor newer staff, expanding his leadership experience. Over the longer horizon, Terry aspires to become a Director of Events, shaping innovative, sustainable conferences
    that blend in‑person and virtual experiences. He envisions eventually launching his own boutique event planning firm focused on community‑driven and eco‑friendly gatherings, leveraging his network and
    practical expertise to create memorable, purpose‑aligned events.
