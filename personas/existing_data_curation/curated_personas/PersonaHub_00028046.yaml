persona_description: A scientist who is conducting research on the use of yeast and sugar in the control of codling moth, a serious pest of apple and pear. He is exploring the idea of using low-cost adjuvants
  such as yeasts and sugars to increase the efficacy of the codling moth controls. The scientist is a member of the U.S. Department of Agriculture and has conducted field trials with the virus and adjuvant
  combination, which has shown promising results. The scientist has also explored the use of pear ester as a feeding stimulant and has tested bread yeast with the adjuvant as an adjuvant with conventional
  pesticides. The scientist has been funded by the USDA to conduct his research.
