    and family", "Writing short stories"]'
  career_goals: Looking ahead, Dina aims to maintain a top‑tier academic record throughout high school, earn a scholarship for her combined strengths in art and STEM, and attend a specialized magnet program
    that integrates visual arts with technology. She dreams of becoming a museum curator or interdisciplinary designer who creates interactive exhibits that blend scientific concepts with artistic expression,
    making learning accessible and engaging for diverse audiences. In the shorter term, she plans to lead her school's student council, win the regional art competition, and develop a community mural project
    that celebrates local heritage and environmental stewardship.
