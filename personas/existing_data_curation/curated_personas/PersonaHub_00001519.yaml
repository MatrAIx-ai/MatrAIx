persona_description: A physicist who specializes in the field of nanotechnology, particularly the development of nanopore membranes for biomedical research. His research interests include, but are not limited
  to, the design and optimization of nanopore membranes for the capture and analysis of individual molecules, and the application of these membranes in personalized medicine. He has a strong background
  in molecular dynamics simulations and has used supercomputers to model the movement of molecules through nanopores. He has published his findings in the journal Nature Nanotechnology and has received
  funding from the National Institutes of Health, National Science Foundation, and the Dutch Research Council.
