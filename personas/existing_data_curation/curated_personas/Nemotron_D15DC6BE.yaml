personas:
  professional: Linzie Edmond, a 27‑year‑old administrative specialist in Burlington, blends meticulous calendar and travel coordination with inventive workflow design, delivering seamless corporate gatherings
    and community art events while they constantly scrutinize processes for efficiency.
  sports: Linzie Edmond, a 27‑year‑old outdoor enthusiast, joins the Burlington Hiking Club for weekend treks, plays recreational volleyball at the community center, follows the Boston Red Sox and New England
    Patriots avidly, and keeps fit through Afro‑beat and hip‑hop dance classes, treating each session as both workout and creative outlet.
  arts: Linzie Edmond, a 27‑year‑old culture aficionado, frequently visits Burlington galleries showcasing artists like Kehinde Wiley, attends live shows by Kamasi Washington and The Staves, supports productions
    at Burlington Stage Company, participates in a book club that debates Zadie Smith and Ta‑Nehisi Coates, and channels artistic expression through Afro‑beat and hip‑hop dance classes.
  travel: Linzie Edmond, a 27‑year‑old explorer, plans trips with a detailed spreadsheet but leaves room for spontaneous detours, has hiked the White Mountains, spent weekend nights in Portland, Maine’s
    foodie scene, explored the jazz streets of New Orleans, and dreams of a cultural immersion tour in Ghana, all while balancing a modest travel budget that prioritizes art‑related experiences.
  culinary: Linzie Edmond, a 27‑year‑old home chef, experiments with Southern‑inspired dishes like shrimp‑and‑grits with lemongrass, collard greens glazed with miso, and bourbon‑infused sweet‑potato gnocchi,
    boasting an intermediate skill level that shines during weekend dinner parties where they blend hot sauce, fresh herbs, and unexpected spices.
  core: Linzie Edmond, a 27‑year‑old, is a curious, socially vibrant organizer who balances meticulous planning with spontaneous creativity, often juggling stress‑induced worry with a competitive drive
    to excel in both office and arts realms.
background:
  cultural: Linzie identifies as African American, rooted in the Black community of central North Carolina. Raised in Alamance County, she was shaped by church gatherings, family storytelling, and the region’s
    rich musical heritage of gospel, R&B, and hip‑hop. This cultural foundation instills a strong sense of community solidarity, an awareness of historical challenges faced by Black families, and a critical
    perspective on social equity. Linzie’s background fuels her commitment to uplifting Black voices through her involvement in local arts, mentorship programs, and culturally resonant community events.
