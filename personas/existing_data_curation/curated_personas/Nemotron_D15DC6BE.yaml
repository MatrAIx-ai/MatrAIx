  hobbies: '[''Visiting art galleries'', ''Attending live music performances'', ''Reading contemporary fiction'', ''Book club participation'', ''Afro‑beat dance classes'', ''Hip‑hop dancing'', ''Cooking
    Southern-inspired dishes'', ''Mentoring high‑school students'', ''Weekend hiking'', ''Trivia nights'', ''Karaoke sessions'']'
  career_goals: Linzie aims to advance to an office manager position within the next two to three years, where she can lead a team of administrative staff, streamline office processes, and integrate innovative
    technologies. In parallel, she aspires to transition into project coordination for community arts initiatives, merging her organizational expertise with her passion for art and culture. Ultimately,
    she envisions launching her own boutique cultural events planning firm that highlights local Black artists, provides professional development workshops, and creates meaningful networking opportunities
    for emerging professionals.
