persona_description: An astronomer who specializes in the study of space telescopes, particularly those used for astronomical observations in low Earth orbit. This person has expertise in the use of space
  telescopes for observing Earth's atmosphere during total lunar eclipses, and is interested in the detection of spectral features of ozone, which is a gas made up of three oxygen atoms in Earth's upper
  atmosphere, and serves as a protective shield from the Sun's ultraviolet radiation. This person is likely to be involved in the planning and implementation of experiments to perfect transmission spectroscopy
  of exo-Earths, and is interested in ensuring that key spectral features are captured in mission concept studies.
