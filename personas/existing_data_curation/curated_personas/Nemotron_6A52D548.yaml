  hobbies: '[''Drawing'', ''LEGO building'', ''Puzzle solving'', ''Reading picture books'', ''Watching nature documentaries'', ''Park exploration'', ''Pretend play with small groups'']'
  career_goals: Ryan often talks about wanting to help people and work in a job that has clear structure. He imagines becoming a firefighter because he likes the idea of a predictable schedule and helping
    others, a teacher because he enjoys sharing what he knows, and an engineer who builds safe, sturdy things. Although still young, his aspirations reflect a desire for a stable, practical career where
    he can make a tangible difference.
