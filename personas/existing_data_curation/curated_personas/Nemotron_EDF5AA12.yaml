  career_goals: In the near term, Michael aims to obtain a Certified Pump Operator credential and complete the OSHA 30‑hour safety course to deepen his technical qualifications. He plans to cross‑train
    in broader facilities maintenance, learning HVAC and electrical systems to become a more versatile plant technician. Over the next five years, he aspires to move into a supervisory role—first as a shift
    lead, then as a plant maintenance manager—where he can mentor new operators and drive reliability improvements. Ultimately, Michael envisions completing his bachelor’s degree in Mechanical Engineering
    through part‑time studies, which would open pathways to engineering design or process‑optimization positions within the regional energy sector or enable him to launch a small mechanical services business
    focused on pump and hydraulic equipment.
