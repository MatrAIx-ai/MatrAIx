persona_description: A dance historian and preservationist who is deeply involved in the field of dance preservation, particularly in the use of video technology to document and preserve choreography and
  dance performances. She is knowledgeable about the history of dance documentation and preservation in the US and has worked with the Dance Heritage Coalition (DHC) to develop cataloging standards and
  guidelines for dance materials. She is currently involved in the design of a national union catalog of dance documentation and archives and the coordination of cataloging standards and guidelines. Her
  work has been recognized by the Dance Heritage Coalition for its contributions to the preservation of dance materials.
