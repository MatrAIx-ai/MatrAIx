  career_goals: Though still a toddler, Tuan’s caregivers nurture his early ambition to master independence in daily tasks—feeding himself, dressing, and eventually attending school. He expresses a budding
    desire to become a 'big helper' at home, and as he grows, to develop into a confident, self‑sufficient individual who values structure, teamwork, and contributes positively to his community.
