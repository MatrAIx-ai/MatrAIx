personas:
  professional: A one‑year‑old named Tuan Nguyen already shows a predisposition for order, meticulously lining up wooden blocks in perfect rows as if drafting a blueprint for a future career in design or
    engineering, and they proudly smile when each piece fits the pattern.
  sports: A spry one‑year‑old, Tuan Nguyen delights in crawling through soft obstacle tunnels at the community center, cheerfully watches televised matches of the local professional soccer team, and they
    gleefully splash during parent‑baby swimming sessions at the neighborhood pool.
  arts: Tuan Nguyen's artistic side shines through purposeful scribbles with chunky crayons and a love for lively children’s songs by performers like Raffi and Baby Shark, and they twirl across the living
    room with unrestrained joy.
  travel: Tuan Nguyen has explored nearby parks, a sunny beachside resort with his family, and his grandparents' home three hours away, favoring familiar stroller routes and predictable nap times while
    they eagerly point at new sights.
  culinary: Tuan Nguyen prefers smooth pureed sweet potatoes, mashed bananas, and creamy oatmeal, confidently attempts self‑feeding with a small spoon despite frequent spills, and they show particular delight
    when a hint of cinnamon is added.
  core: Tuan Nguyen is a one‑year‑old who thrives on routine, arranges toys with meticulous precision, cooperates kindly but can be stubborn during diaper changes, and they exhibit an early, almost adult‑like,
    sense of discipline.
background:
  cultural: Tuan comes from a Vietnamese‑American family in Richardson, Texas. At home, he is exposed to both Vietnamese and English languages, celebrates Tet and other Vietnamese holidays, and learns cultural
    values of respect for elders, harmony, and community. His upbringing blends traditional Southeast Asian customs with the multicultural environment of the Dallas‑Fort Worth area, fostering a bicultural
    identity.
