persona_description: A food scientist who specializes in the study of gluten and gluten-free products. They are knowledgeable about the different types of gluten found in grains and their effects on human
  health, as well as the symptoms and diagnosis of celiac disease and gluten allergies. They are also familiar with the testing methods and kits used to detect gluten allergies and their reliability in
  detecting these conditions. They are skilled in the use of the EZ Gluten Test and EZ Gluten Assay, and are able to use them to test individual ingredients in foods and beverages. They are also knowledgeable
  about the industry and food manufacturing, and are able to use the information gained from their research to improve the quality and safety of gluten-free products.
