persona_description: A researcher who is interested in understanding the genetic and environmental factors that contribute to the development of autism. She is particularly focused on the role of certain
  environmental factors in the expression of RORA, a gene that is known to be important in the development of neurological processes. She is also interested in the potential impact of endocrine disrupting
  compounds on the expression of RORA, which may lead to increased risk for autism. She is excited about the potential of her research to lead to public health policies and the development of treatment
  protocols to counteract the effects of exposure to environmental agents that promote developmental disorders and neurological dysfunction.
