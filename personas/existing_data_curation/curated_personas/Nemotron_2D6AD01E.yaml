personas:
  professional: Keshia Hamilton, a six‑year‑old aspiring teacher, demonstrates her natural organizational talent by arranging her doll classroom in tidy rows and leading pretend lessons for her stuffed
    audience, while her practical mindset ensures each activity follows a clear plan and her gentle kindness keeps classmates—real or imagined—feeling included.
  sports: Keshia Hamilton loves the rhythm of movement and plays on the “Sunnyville Sprouts” community soccer team during spring, they practice drills with a bright red ball after school, cheer for the
    local professional basketball team, the Chicago Bulls, and balance their structured practice schedule with free “dance‑around‑the‑living‑room” sessions to their favorite gospel beats.
  arts: Keshia Hamilton delights in drawing vibrant pictures of her family and neighborhood, they frequently color scenes inspired by Eric Carle’s bold illustrations, sing gospel classics by Kirk Franklin
    and pop hits by Taylor Swift in their church choir, and enjoy watching Disney movies like “Moana” for creative inspiration.
  travel: Keshia Hamilton prefers short, family‑run road trips that let them spot interesting “road‑sign” puzzles along the way, they have fond memories of a weekend visit to Orlando’s Disney World and
    a summer picnic at the Grand Canyon, and they dream of exploring the historic streets of Paris with their parents while carrying a tiny notebook to sketch new sights.
  culinary: Keshia Hamilton enjoys simple, colorful meals such as macaroni and cheese topped with peas, strawberry‑banana smoothies they blend with help from their mom, and they proudly make peanut‑butter‑and‑jelly
    sandwiches for school, always insisting on adding a slice of fresh cucumber for a crunchy twist.
  core: Keshia Hamilton is a meticulous, caring six‑year‑old who blends creativity with order, worries about tiny details, and turns everyday chores into playful learning adventures.
background:
  cultural: Keshia is raised in an African American family in Forest Park, Georgia, within Clayton County's close‑knit black community. Her upbringing is rooted in Southern and African‑American traditions,
    including regular church attendance where gospel music, choir participation, and community potlucks are central. Family gatherings feature storytelling, soul food such as fried chicken, collard greens,
    and cornbread, and celebrations of cultural holidays like Juneteenth. These experiences foster a strong sense of respect, cooperation, and communal responsibility that shape her daily life.
