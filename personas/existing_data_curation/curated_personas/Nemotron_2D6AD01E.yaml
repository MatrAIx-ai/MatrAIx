  career_goals: She imagines herself in a caring, structured career where she can help others and maintain a harmonious environment. She is especially drawn to becoming a teacher who creates an organized,
    supportive classroom, or a nurse who offers comfort and stability to patients. She also expresses interest in caring for animals as a veterinarian, reflecting her love for creatures and desire to nurture.
    Her ambitions are guided by her natural sense of responsibility, kindness, and preference for predictable, secure roles.
