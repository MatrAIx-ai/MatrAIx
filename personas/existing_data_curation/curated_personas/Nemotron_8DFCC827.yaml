personas:
  professional: Donna Vega, a budding multimedia storyteller, merges watercolor landscapes, ukulele songs, and Scratch coding to create narrative-driven school projects, channeling their curiosity and collaborative
    spirit into a fledgling artistic career.
  sports: Donna Vega, an avid hiker who spends weekends exploring the lakes and forest trails near Gresham, also runs cross-country for their middle school and roots for the Milwaukee Bucks in winter and
    the Green Bay Packers during football season, while they occasionally join the North Shawano Hiking Club's weekend outings.
  arts: Donna Vega, a sketch-loving watercolorist who paints the misty forests of Wisconsin, strums ukulele covers of Jack Johnson, draws inspiration from digital artist Loish's tutorials, writes short
    stories reminiscent of John Green, and shines on stage in their school drama club productions, weaving together a rich tapestry of visual, musical, and literary arts.
  travel: Donna Vega, who plans weekend getaways to Lake Winnebago and Door County using hand-drawn maps yet dreams of exploring the Apostle Islands and someday touring Disney World, balances a love for
    spontaneous hikes with careful budgeting and family schedules, and they often share travel photos with friends.
  culinary: Donna Vega, an enthusiastic beginner cook, loves whipping up cheese curd-topped mac and cheese, baking blueberry muffins with fresh lemon zest, and learning to roll pierogi with their mom, though
    they often raid the pantry for gummy bears while sketching recipe cards.
  core: Donna Vega, an anxious yet exuberant teen artist, juggles endless club commitments with midnight sketch marathons and a habit of hoarding sticky notes for every idea, and they often stay up late
    perfecting a drawing.
background:
  cultural: Donna grew up in Gresham, a small town in Shawano County, Wisconsin, within a family of German and Scandinavian ancestry. The Midwestern community emphasizes modesty, hard work, and close‑knit
    relationships, with traditions such as county fairs, church gatherings, and outdoor activities shaping her worldview. The surrounding forests and lakes inspire her artistic sensibility, while her supportive
    school environment nurtures her curiosity and openness to new ideas.
