    with friends'']'
  career_goals: Donna hopes to turn her passion for art and storytelling into a career, aiming to become a graphic novelist or animator who can convey emotions through visual narratives. She also wants
    to study psychology to support peers dealing with anxiety, potentially working as a mental‑health advocate. In the short term, she plans to build a strong art portfolio, win a school art competition,
    and attend a summer art camp to deepen her skills.
