  hobbies: '[''Basketball'', ''Drumming'', ''Scratch game design'', ''Reading adventure/science‑fiction'', ''Gardening'', ''Church youth group activities'', ''Strategy video games'', ''Sketching'']'
  career_goals: Trequan's long‑term goal is to pursue a career that combines his love of problem‑solving with service to his community. He is fascinated by how roads and bridges are built and hopes to become
    a civil engineer who can improve infrastructure in Prosperity. He also enjoys helping younger students and imagines becoming a middle‑school teacher or a mentor in after‑school programs. A secondary
    interest is creating educational video games, so he thinks about studying computer science in the future. He wants a job that offers clear structure, steady progress, and the chance to make a positive
    impact on the people he cares about.
