personas:
  professional: Trequan Young, an aspiring game developer who enjoys crafting puzzle‑oriented Scratch projects, applies their practical, structure‑loving mindset to code logic while embracing a relaxed
    attitude toward deadlines, often juggling schoolwork and video‑game strategy sessions, and they look forward to turning hobby projects into a future career.
  sports: Trequan Young shoots hoops after school with a close crew of friends, plays on the Eastside Middle School basketball team, roots for the Los Angeles Lakers, and joins the community soccer league
    in the spring, balancing their love of structure with a laid‑back approach to practice schedules, and they relish the camaraderie of small‑group play.
  arts: 'Trequan Young drums on a practice pad while humming along to Billie Eilish and listening to the soundtrack of Tron: Legacy, reads science‑fiction series like Ender’s Game and The Expanse, and they
    participate in the church choir, letting these artistic influences shape their creative problem‑solving.'
  travel: Trequan Young enjoys weekend trips to the local farmer’s market and day‑long hikes at the nearby state park, dreams of visiting the Smithsonian in Washington, D.C., and they prefer low‑cost, family‑oriented
    travel that lets them explore nature while staying within their modest allowance.
  culinary: Trequan Young helps harvest carrots, tomatoes, and kale in their grandparents’ garden, loves making veggie‑laden spaghetti with fresh basil and parmesan, and enjoys snacking on peanut butter
    banana sandwiches, though they sometimes forget to wash their hands before cooking.
  core: Trequan Young is a pragmatic, quietly curious twelve‑year‑old who balances a love of games, drumming, and community service with a relaxed, occasionally disorganized approach to obligations, and
    they often forget to finish homework on time.
background:
  cultural: Trequan was raised in Prosperity, South Carolina, a close‑knit African‑American community where church, family, and neighborhood ties are central. His family's traditions blend Southern hospitality
    with Black cultural expressions, including gospel music, soul food, and storytelling. He grew up hearing the legacy of the Great Migration and the resilience of his grandparents, who emphasized respect
    for elders and community support. Local events such as church potlucks, community fairs, and school sports foster a sense of belonging, shaping Trequan's cooperative nature and commitment to helping
    others.
