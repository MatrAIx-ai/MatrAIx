    local football games"]'
  career_goals: Tyler aims to secure a stable, structured role in the technology sector within the next two years, targeting positions such as IT support specialist or junior network administrator. He plans
    to earn CompTIA A+ and Network+ certifications and complete his associate degree in Information Technology. Long‑term, he aspires to transition into a cybersecurity analyst role that offers predictable
    work hours and the possibility of remote work, allowing him to better manage his anxiety. He also hopes to mentor local youths interested in tech, giving back to the Middleburg community.
