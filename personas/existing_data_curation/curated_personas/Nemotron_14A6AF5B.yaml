personas:
  professional: Tyler Jarque, a 23‑year‑old aspiring IT support specialist, blends meticulous organizational talent with a hands‑on knack for hardware troubleshooting, and they target CompTIA A+ and Network+
    certifications to secure a structured role that offers predictable hours while laying groundwork for a future cybersecurity analyst position.
  sports: Tyler Jarque, a regular at the Ironclad Fitness gym where they lift five days a week, spends weekend mornings casting on Lake Denton, and they cheer on the Middleburg Mustangs at high‑school football
    games while also keeping a casual eye on the Dallas Cowboys for NFL Sundays.
  arts: Tyler Jarque channels creativity into building custom gaming PCs, finds inspiration in the synth‑driven soundscapes of Daft Punk and the orchestral scores of Hans Zimmer, and they unwind with narrative‑rich
    strategy titles like Civilization VI, often quoting lines from Blade Runner for extra flair.
  travel: Tyler Jarque prefers meticulously planned road trips, having charted a favorite fishing retreat at Lake Denton and a weekend hike in the Wichita Mountains, and they daydream about a future solo
    excursion to Tokyo’s Akihabara district to soak in cutting‑edge tech and gaming culture.
  culinary: Tyler Jarque favors protein‑rich meals, routinely grills freshly caught catfish from their lake outings, crafts quick quinoa bowls with avocado, lime, and black beans, and they indulge in homemade
    spicy tacos loaded with cilantro, jalapeños, and charred corn.
  core: Tyler Jarque is a structured, anxiety‑prone tech enthusiast who balances meticulous budgeting, disciplined workouts, and a penchant for over‑engineering gaming PCs, and they also maintain a quiet
    love for fishing and mindfulness.
background:
  cultural: Raised in Middleburg, a suburban community in Clay County, Florida, Tyler grew up in a predominantly white, middle‑class environment with Southern and coastal cultural influences. His family
    traditions include regular church attendance, outdoor recreation such as fishing and boating, and participation in community events like the annual county fair. He identifies with mainstream American
    values that emphasize practicality, self‑reliance, hospitality, and a modest work ethic, while also valuing the close‑knit community spirit of his hometown.
attributes:
  skills: '["Computer hardware troubleshooting", "Software installation and configuration", "System maintenance", "Basic automotive maintenance", "Organizational and scheduling skills", "Budgeting and financial
