personas:
  professional: Ahmed Hance, a full‑stack software engineer with a strong business‑strategy mindset, designs and deploys cloud‑native web applications while they lead agile teams to meet precise product
    goals, positioning themselves for a future role as Lead Architect or Director of Engineering.
  sports: Ahmed Hance, a point guard in a local amateur basketball league, avidly follows the Atlanta Hawks and Alabama Crimson Tide football, participates in weekend hikes with the Alabama Trail Club,
    and they maintain a routine of weight‑lifting at the community gym to stay competitive.
  arts: Ahmed Hance, a guitar‑playing member of a garage band, spends Thursday evenings jamming classic rock from Led Zeppelin and The Rolling Stones, collects Miles Davis vinyl records, and they attend
    monthly performances at the downtown theatre featuring Shakespeare productions and stand‑up comedy by John Mulaney.
  travel: Ahmed Hance, a meticulous planner, has road‑tripped through the Great Smoky Mountains, spent a long weekend savoring New Orleans' jazz and gumbo, and they dream of kayaking the fjords of Norway
    while keeping travel expenses within a modest budget.
  culinary: Ahmed Hance, an enthusiastic home cook, masters Southern barbecue by smoking pork ribs with a blend of hickory chips, chipotle, and brown sugar, perfects shrimp étouffée using fresh Gulf shrimp,
    garlic, and Cajun spices, and they experiment with bourbon‑infused glazes to add a personal twist to classic dishes.
  core: Ahmed Hance, a structured yet sociable tech professional, balances competitive basketball drives with methodical code architecture, disciplined budgeting, and a passion for Southern barbecue, while
    they occasionally neglect cardio and overindulge in weekend trivia drinks.
background:
  cultural: Ahmed grew up in Florence, Alabama, absorbing the Southern values of hospitality, community involvement, and a strong work ethic rooted in the region's Protestant traditions. His upbringing
    emphasized family gatherings, church events, and local celebrations like the Spring Fest, fostering a sense of belonging and pride in his hometown. While his ethnic background is White, his experiences
    are shaped by a blend of small‑town Southern culture and the corporate mindset from his business graduate education, giving him a pragmatic yet people‑focused outlook.
