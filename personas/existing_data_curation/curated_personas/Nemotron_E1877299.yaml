    analysis using Excel'', ''Troubleshooting of industrial machinery'', ''Public speaking and workshop facilitation'']'
  hobbies: '[''Gardening (vegetables and heirloom flowers)'', ''Woodworking and furniture making'', ''Bridge (card game)'', ''Church choir singing'', ''Volunteering as a STEM tutor'', ''Local history research'',
    ''Cooking Southern cuisine'', ''Listening to jazz and blues'', ''Playing chess at the senior center'', ''Reading biographies and historical nonfiction'']'
  career_goals: Although retired, Marlon is driven to leave a lasting imprint on his community. He seeks to mentor the next generation of engineers, expand STEM opportunities for underrepresented youth
    in Rutherford County, establish a scholarship fund at the local community college, and preserve African‑American local history through oral‑history projects. He also aims to stay physically active,
    support his spouse, and continue learning new skills such as digital photography and genealogy.
