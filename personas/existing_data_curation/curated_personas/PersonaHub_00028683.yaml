persona_description: A historian who specializes in the study of maritime history, particularly the burial rites and the use of ships in connection with them. This person is interested in the ancient Egyptian
  burial practices, Norse and Arthurian legends, and the use of burial ships in various cultures around the world. They have a keen eye for detail and are knowledgeable about the construction, design, and
  significance of these unique ships. They are also interested in the role of these ships in the rituals and customs of different cultures.
