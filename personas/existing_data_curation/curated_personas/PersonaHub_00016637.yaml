persona_description: A thought leader and sustainability expert, Hilmy Cader, who has expertise in climate change, waste management, and water conservation. He is a co-founder of MTI Consulting, a consultancy
  firm that focuses on sustainability and innovation. Hilmy is passionate about making radical, unconventional measures to mitigate the negative impacts of plastics, garbage, and water on human life. He
  believes that businesses and consumers have a responsibility to reduce waste and use water more responsibly. Hilmy is a strong advocate for a luxury water tax and the use of incentives to start-up waste-to-energy
  ventures.
