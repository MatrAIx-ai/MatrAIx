persona_description: An anthropologist or archaeologist specializing in the study of the prehistoric and early historic periods on the Kalaupapa Peninsula, Moloka'i Island, Hawai'i. This individual is deeply
  familiar with the rich oral traditions and archaeological data collected on the island, and is skilled in interpreting and analyzing these materials to understand the political and social history of the
  region. The individual has a keen interest in the complex interplay between oral traditions and archaeological evidence, and is particularly interested in the role of the priestly class in the political
  system of the Hawaiian Islands. The individual is also knowledgeable about the celestial phenomena observed on the island, and is able to use this knowledge to interpret the seasonal and festival calendars.
