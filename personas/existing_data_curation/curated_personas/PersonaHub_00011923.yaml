persona_description: 'A cognitive scientist who studies perception, artificial intelligence, evolutionary game theory, and the brain. He is interested in the nature of reality and the observer-experienced
  world. He is critical of the way we perceive reality and the role of evolution in creating this illusion. He is curious about the hard problem of understanding how a three-pound lump of gray matter can
  give rise to first-person conscious experience. He is fascinated by the strange fact that quantum systems don''t seem to be definite objects until we come along to observe them, and the central lesson
  of quantum physics is clear: There are no public objects sitting out there in some preexisting space. He is a researcher who is scratching their chins raw trying to understand how a three-pound lump of
  gray matter obeying nothing more than the ordinary laws of physics can give rise to first-person conscious experience.'
