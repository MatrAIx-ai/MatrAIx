  career_goals: Esther aims to build upon her home health experience by earning Certified Nursing Assistant (CNA) credentials within the next year, followed by an Associate’s degree in Nursing at a community
    college. Her long‑term ambition is to become a Registered Nurse specializing in geriatrics and to eventually take on a supervisory role overseeing home health teams. She is particularly passionate about
    integrating culturally relevant art‑therapy programs for Mexican‑American seniors, and hopes to develop a bilingual health education curriculum that can be implemented across Idaho’s home‑care agencies.
    Esther also envisions founding a community‑based nonprofit that provides affordable, culturally sensitive elder‑care services, leveraging her organizational strengths and competitive drive to secure
    funding and partnerships.
