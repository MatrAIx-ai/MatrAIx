persona_description: A biologist and entomologist with expertise in the study of invasive forest insects, specifically focusing on winter moth and hemlock woolly adelgid. They have extensive experience
  in the introduction, release, and evaluation of natural enemies as biological control agents for these pests. The persona is also knowledgeable about the dynamics of these insects and their interactions
  with small mammals, viruses, and fungi. They have published several recent research papers in peer-reviewed journals and have extensive experience with laboratory rearing and identification of various
  species of North American tiger beetles.
