  career_goals: Jordi aims to transition from contract carpentry to owning a boutique studio that blends functional craftsmanship with fine art. He envisions producing limited‑edition furniture, collaborating
    with local artists on community installations, and eventually teaching woodworking workshops at the community college level. He plans to obtain a Certified Professional Contractor license, develop a
    line of sustainable reclaimed‑wood furniture for the Greenville market, and contribute to revitalizing historic neighborhoods by providing heritage‑respectful yet contemporary carpentry solutions.
