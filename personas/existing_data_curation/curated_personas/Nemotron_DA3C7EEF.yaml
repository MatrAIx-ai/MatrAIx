personas:
  professional: Jordi Babb, a veteran carpenter with 25 years of residential and small‑commercial construction experience, blends meticulous framing and code‑compliant restoration with artful wood sculpture
    and custom guitar making, leveraging their methodical organization and curiosity to run projects on schedule while experimenting with unconventional designs.
  sports: Jordi Babb, an avid hiker of the Blue Ridge foothills who also enjoys weekend pickup basketball at the Charlotte Sports Club and follows the Carolina Panthers and Charlotte Hornets, approaches
    fitness with a pragmatic mix of trail walking for endurance, occasional strength‑training in the garage, and they schedule these activities around project timelines to stay physically resilient.
  arts: Jordi Babb, a passionate woodcarver and guitar builder who regularly visits galleries showcasing works by artists like Kehinde Wiley, Amy Sherald, and Shepard Fairey, immerses themselves in classic
    rock and blues vinyl from The Rolling Stones, B.B. King, Stevie Ray Vaughan, and Jimi Hendrix on a vintage turntable, and they find that this blend of visual and auditory art fuels their creative experiments
    with unconventional wood designs.
  travel: Jordi Babb, a methodical traveler who prefers well‑planned road trips through the Appalachian Highlands, has explored Asheville’s craft scene, trekked the Blue Ridge Parkway, taken a week‑long
    study tour of historic timber workshops in Florence, Italy, and they dream of a future studio‑retreat in Barcelona’s Gothic Quarter, balancing budget constraints with a desire for artistic immersion.
  culinary: Jordi Babb, an adept home cook who tends a modest vegetable garden of heirloom tomatoes, sweet corn, and kale, often prepares grilled trout with rosemary‑infused butter, roasted beet and goat‑cheese
    salad, and fresh sourdough with walnut‑crusted cheese, and they enjoy pairing these meals with craft IPAs while occasionally treating themselves to a smoked brisket at a local BBQ joint.
  core: Jordi Babb, a curious yet methodical craftsman who balances precise construction work with spontaneous wood art, they channel a love for vintage vinyl and garden‑fresh meals into a disciplined pursuit
    of a sustainable boutique studio, all while occasionally letting perfectionism stall paperwork.
background:
  cultural: Jordi grew up in the Upstate South Carolina region, absorbing the Southern values of hospitality, a strong work ethic, and a deep respect for handcrafted skill rooted in Appalachian folk traditions.
    His family lineage includes several generations of tradespeople who built and repaired homes in the Greenville area, fostering his appreciation for historic architecture and community collaboration.
    The local culture, with its emphasis on outdoor life, regional cuisine, and a supportive arts scene, shaped his commitment to heritage preservation, sustainable building practices, and the blending
    of functional carpentry with artistic expression.
attributes:
  skills: '["precision framing", "custom cabinetry", "historic home restoration", "artistic wood sculpture", "CNC routing", "blueprint reading", "project budgeting", "client communication", "workshop organization",
