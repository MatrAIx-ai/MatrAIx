  career_goals: At six, Derrick’s dreams already reach for the stars. He often talks about becoming an astronaut who can explore space and bring back stories for other kids. He also imagines creating his
    own comic books and later teaching a class where he can share his love of art and science. He is enthusiastic about helping his community, saying he might become a firefighter or a neighborhood mentor
    to support friends when they face challenges.
