personas:
  professional: Derrick Singh is a budding young scientist in training, channeling their curiosity about dinosaurs and rockets into building elaborate LEGO space stations while keeping a colorful notebook
    of observations, and they balance meticulous organization of their bricks with the freedom to imagine new worlds.
  sports: Derrick Singh's sports persona shines on the local park's soccer field where they dash forward for the Durham County Youth Soccer Club's U-7 'Mighty Meteors', cheer the Carolina Hurricanes during
    chilly weekends, and practice dribbling drills after library storytime.
  arts: Derrick Singh's arts persona sees them splashing watercolors across paper while they hum Beyonce's pop anthems, echo Kirk Franklin's gospel choruses, and break into lively hip-hop moves to Lil Baby's
    beats during play, reflecting a vibrant blend of visual and musical expression.
  travel: Derrick Singh's travel persona favors short family-led excursions—collecting leaves on Appalachian Trail day trips, exploring the interactive halls of the North Carolina Museum of Natural Sciences,
    and they dream of a future visit to the Kennedy Space Center in Florida.
  culinary: Derrick Singh's culinary persona revolves around bright, kid-friendly flavors, eagerly scooping macaroni and cheese, slurping strawberry-banana smoothies, and they proudly sprinkle rainbow sprinkles
    on freshly baked chocolate cupcakes under Mom's watchful eye.
  core: Derrick Singh is an inquisitive, energetic six-year-old whose love of dinosaurs, rockets, and colors fuels a relentless curiosity, and they balance this with a surprising knack for organization
    and occasional candy-craving impulsivity.
background:
  cultural: Derrick is raised in a close‑knit African‑American family in Durham, North Carolina. His family gathers for Sunday services at a Baptist church, where gospel music and community storytelling
    shape his appreciation for rhythm and narrative. They celebrate Juneteenth, honor African‑American history, and enjoy soul‑food meals like collard greens, mac & cheese, and cornbread. Local community
    programs—such as the Durham Arts Council’s youth workshops and the YMCA’s after‑school clubs—expose him to diverse artistic experiences and reinforce his curiosity about the world. The city’s rich heritage
    of civil‑rights activism and vibrant cultural festivals provides a backdrop that nurtures his sense of identity and belonging.
