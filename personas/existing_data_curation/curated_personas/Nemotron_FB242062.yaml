  career_goals: Lyudmyda aims to re‑enter the workforce in a flexible, intellectually stimulating role. She is exploring part‑time consulting for tech startups and considering launching a freelance tutoring
    service in STEM subjects. Long‑term, she dreams of establishing a community makerspace in Bellmore to encourage hands‑on learning for youth and adults. To stay competitive, she plans to earn a data‑science
    certification, balancing her ambition with a desire for work‑life flexibility and reduced stress.
