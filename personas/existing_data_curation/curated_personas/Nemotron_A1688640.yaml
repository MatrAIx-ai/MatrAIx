  career_goals: Kenneth aims to translate his practical abilities into a stable income by launching a freelance handyman service targeting New Haven homeowners, while gradually earning a GED and a state‑certified
    handyman license. He aspires to become a community activity coordinator at a local nonprofit, using his sociable nature to organize art and cultural events that enliven his neighborhood. Long‑term,
    he envisions opening a small workshop where he merges his love for art and craftsmanship by restoring vintage furniture and selling bespoke pieces. His primary ambitions are financial security for his
    family, recognized credentials, and a reputation as a reliable, community‑focused professional who contributes to the cultural vibrancy of his city.
