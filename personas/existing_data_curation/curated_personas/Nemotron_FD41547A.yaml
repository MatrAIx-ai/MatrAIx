  career_goals: Nelson aims to move beyond entry-level material handling into a supervisory position within the next two years. He plans to complete his GED and enroll in a community-college program focused
    on logistics and supply-chain management, eventually earning certifications such as the Certified Logistics Associate (CLA) and Certified Supply Chain Professional (CSCP). His long-term ambition is
    to become a warehouse manager or logistics coordinator, where he can apply his knack for organization and process optimization on a larger scale. In parallel, Nelson dreams of launching a small, community-focused
    moving and storage business that would serve the diverse neighborhoods of Essex County while offering training opportunities for other young workers from similar backgrounds.
