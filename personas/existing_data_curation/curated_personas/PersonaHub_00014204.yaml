persona_description: A gynecologist who specializes in the diagnosis and management of retroperitoneal diseases, particularly those that involve the lower retroperitoneal space and the blood vessels and
  ureters running through it. She is familiar with the imaging techniques used to diagnose these conditions, as well as the treatment options available for each. She is likely to be experienced in the surgical
  management of retroperitoneal fibrosis, and has a deep understanding of the potential complications and risks associated with this condition. She may also have expertise in the diagnosis and treatment
  of other retroperitoneal disorders, such as retroperitoneal and pelvic fibromatosis and retroperitoneal and pelvic tumors.
