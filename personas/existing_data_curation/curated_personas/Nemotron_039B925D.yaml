personas:
  professional: Cindy Rish is a budding graphic designer and visual storyteller who blends watercolor, charcoal, and digital tools like Procreate to craft surreal illustrations for local businesses, and
    they channel their imaginative curiosity and disciplined organization into freelance commissions while also coordinating community art events.
  sports: Cindy Rish stays active with sunrise jogs along county trails, joins the Craigville Community Softball Club for weekend games, follows the Indianapolis Colts in the fall and the Indiana Pacers
    during basketball season, and they treat fitness as a playful balance between rural labor and casual team sports.
  arts: Cindy Rish draws artistic inspiration from Frida Kahlo, the street murals of Banksy, and the ambient soundscapes of Bon Iver, they frequently attend local art fairs featuring regional painters,
    and they weave poetry from Emily Dickinson and sci‑fi motifs into their visual narratives.
  travel: Cindy Rish dreams of road‑tripping the Blue Ridge Parkway in Virginia, exploring Santa Fe’s vibrant art scene in New Mexico, and taking weekend getaways to Chicago’s museums, they plan trips around
    festival dates and budget‑friendly lodging, preferring scenic drives over air travel.
  culinary: Cindy Rish loves cooking rustic ratatouille with garden‑fresh tomatoes, zucchini, and basil, also enjoys baking blueberry scones with locally milled flour, they experiment with earthy beet hummus
    and pair meals with craft cider from nearby farm breweries.
  core: Cindy Rish is a 24‑year‑old Midwest‑rooted visual storyteller who balances quiet garden‑inspired creativity with a pragmatic drive to turn art into a sustainable, community‑focused career, all while
    juggling a love of indie literature, modest finances, and weekend softball, they often over‑think color palettes before committing to a piece.
background:
  cultural: Cindy grew up in Craigville, a small farming community in Wells County, Indiana. Her family has deep roots in the region, and she was raised with the values of self‑reliance, community cooperation,
    and an appreciation for the rhythms of rural life. Local traditions such as the county fair, church gatherings, and seasonal celebrations have shaped her sense of belonging. While she identifies with
    the broader Midwestern cultural ethos of modesty and practicality, Cindy also embraces a contemporary, globally‑connected outlook, drawing inspiration from online art communities and diverse cultural
    references. Her upbringing has fostered a strong work ethic and a desire to give back, which she channels through volunteer work at the town library and community center.
attributes:
  skills: '[''Digital illustration (Procreate, Adobe Photoshop)'', ''Watercolor and charcoal drawing'', ''Creative writing (short stories, poetry)'', ''Photography (nature and portrait)'', ''Basic graphic
