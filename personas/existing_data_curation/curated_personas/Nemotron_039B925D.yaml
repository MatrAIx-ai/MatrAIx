  hobbies: '[''Sketching and abstract drawing'', ''Creative writing (fiction, poetry)'', ''Photography (landscape and nature)'', ''Gardening'', ''Reading (science-fiction, indie literature)'', ''Listening
    to art and design podcasts'', ''DIY crafts (jewelry, knitting)'', ''Attending local art fairs and farmers markets'']'
  career_goals: Cindy aspires to turn her artistic passion into a sustainable career. Over the next few years she plans to enroll in a community college program in graphic design or visual arts while building
    a freelance portfolio that includes illustration commissions, custom hand‑crafted artwork, and digital content for small businesses. In the longer term she hopes to launch her own boutique studio that
    offers art workshops, community mural projects, and an online shop for handcrafted goods. She also expresses interest in working with local schools or libraries as an arts educator, merging her love
    for creativity with community service.
