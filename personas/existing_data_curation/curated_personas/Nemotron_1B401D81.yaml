  hobbies: '[''Playing soccer'', ''Dancing at local fiestas'', ''Playing guitar'', ''Car restoration hobby'', ''DIY electronics projects'', ''Community volunteering (home-repair workshops)'', ''Cooking
    Mexican cuisine'', ''Exploring new smart-home tech'']'
  career_goals: Sergio aims to earn his EPA Section 608 certification within the next year and become a journeyman HVAC-R technician. He aspires to specialize in green-technology installations, such as
    high-efficiency heat pumps and solar-assisted cooling, and eventually open his own community-focused service shop in Mission that offers affordable, eco-friendly climate solutions. He also hopes to
    mentor younger apprentices, especially those from Hispanic backgrounds, and later pursue a vocational instructor credential.
