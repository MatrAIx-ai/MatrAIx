personas:
  professional: Sergio Sosa, a 20‑year‑old HVAC‑R apprentice, merges meticulous technical skill—reading schematics, diagnosing refrigerant leaks, and installing smart‑home climate controls—with a charismatic,
    talkative demeanor that turns every service call into a collaborative workshop, and they juggle a spontaneous schedule while pursuing green‑technology certification and a future community‑focused shop.
  sports: Sergio Sosa, a spirited member of the Mission Strikers community soccer league, throws themselves into weekend matches under the hot Texas sun while cheering for the Houston Dynamo, following
    the Houston Astros' baseball season with devotion, and they maintain fitness through spontaneous street‑ball games and lively dance routines at local festivals, preferring the camaraderie of team play
    over solitary workouts.
  arts: Sergio Sosa, an avid guitarra player, joins nightly jam sessions that riff off the soulful stylings of Carlos Santana, the smooth blues of John Mayer, and the energetic funk of Prince, while they
    also shine on the dance floor at community fiestas, drawing inspiration from performers like Pitbull and Shakira to infuse every chord and step with a magnetic, talkative flair.
  travel: Sergio Sosa, a lover of spontaneous road trips, has taken a weekend drive along the Gulf Coast to explore the dunes of Padre Islands, trekked the rugged trails of Big Bend National Park, and dreams
    of soaking up the jazz vibe of New Orleans and the desert sunsets of Arizona, always opting for last‑minute bookings that let their flexible spirit dictate the itinerary.
  culinary: Sergio Sosa, a self‑taught kitchen tinkerer, whips up spicy street‑food staples like char‑grilled tacos with smoky chipotle salsa, fresh cilantro, and a drizzle of lime‑infused crema, while
    experimenting with fusion twists that pair corn‑based masa with avocado‑lime purées, showcasing a bold palate that mirrors their curiosity and love for flavor experimentation.
  core: Sergio Sosa, a 20‑year‑old tech‑savvy HVAC enthusiast, balances relentless curiosity for how things work with a breezy, talkative charm, a habit of last‑minute planning, and a calming resilience
    that keeps them upbeat even when deadlines loom.
background:
  cultural: Sergio grew up in a bilingual Mexican-American household in Mission, Texas. His family maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañeras, and communal cooking,
    while also embracing the multicultural vibe of the Rio Grande Valley. He speaks fluent Spanish at home and English at school and work, which enables him to connect with a diverse client base. The close-knit
    neighborhood culture, Catholic faith, and emphasis on family and community service shape his values of cooperation, hospitality, and respect for elders.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant recovery and handling'', ''Electrical wiring and troubleshooting'', ''Diagnostic tool operation'', ''Ductwork fabrication and sealing'', ''Preventive
