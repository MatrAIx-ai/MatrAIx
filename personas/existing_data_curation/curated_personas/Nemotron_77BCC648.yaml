personas:
  professional: Michael Perezvelez, a 28‑year‑old meat processing specialist, combines rigorous HACCP expertise and inventory mastery with a creative flair for recipe development, positioning them as a
    methodical yet innovative candidate for a shift‑supervisor role while they dream of launching a boutique butcher shop that marries island‑inspired flavors with Texas barbecue.
  sports: Michael Perezvelez, a member of the Austin Soccer Club's Saturday league, balances weekend hikes through Hill Country with avid support for the Austin FC and Texas Rangers, maintaining fitness
    through regular soccer matches and trail runs while they rarely hit the gym, preferring spontaneous outdoor activity over structured workouts.
  arts: Michael Perezvelez channels their imagination into oil‑painting abstract canvases inspired by Rothko, crafting digital illustrations reminiscent of Beeple, capturing the Texas countryside through
    a Leica M‑type lens like Ansel Adams, and they immerse themselves in live salsa nights dancing to Marc Anthony while they strum a guitar at community gatherings alongside folk‑rock favorites such as
    Mumford & Sons.
  travel: Michael Perezvelez plans trips with a blend of DIY itineraries and spontaneous detours, favoring weekend road‑trips to Hill Country vineyards, annual pilgrimages to Santa Fe’s art festivals, and
    day‑long hikes in Big Bend, while they dream of a future culinary tour of Oaxaca and a summer getaway on the Gulf Coast despite a modest travel budget.
  culinary: Michael Perezvelez, an adept home chef, loves crafting pernil tacos seasoned with adobo and chipotle, slow‑cooking arroz con gandules infused with smoked paprika, and smoking brisket glazed
    with orange zest and cumin, frequently using ingredients like achiote, poblano peppers, and masa harina to fuse heritage flavors with Tex‑Mex flair, and they often experiment with new rub blends and
    plating techniques.
  core: Michael Perezvelez blends meticulous meat‑cutting precision with a restless artistic streak, juggling late‑night paint sessions, spontaneous salsa dances, and a habit of sketching product displays
    on the back of butcher tags while they chase the dream of a boutique shop.
background:
  cultural: Michael’s Puerto Rican heritage is a cornerstone of his identity. He grew up in a bilingual household where Spanish and English were spoken interchangeably, and family meals often centered around
    dishes like lechón, mofongo, and pasteles. He celebrates traditional holidays such as Three Kings Day and Puerto Rico’s Fiesta de San Juan, bringing these customs to his community in Jarrell, Texas.
    His cultural background informs his palate, his love for lively music, and his commitment to preserving family ties while navigating life in a predominantly Anglo‑American region.
attributes:
  skills: '[''Meat cutting and trimming'', ''Sausage and charcuterie preparation'', ''Food safety and HACCP compliance'', ''Inventory management'', ''Equipment maintenance'', ''Customer service'', ''Team
