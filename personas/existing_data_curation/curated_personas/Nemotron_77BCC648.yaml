  hobbies: '[''Oil painting'', ''Digital illustration'', ''Cooking Puerto Rican and Texan fusion dishes'', ''Photography of rural landscapes'', ''Salsa dancing'', ''Playing guitar'', ''Weekend hiking'',
    ''Community soccer league'', ''Reading science fiction'', ''DIY woodworking projects'']'
  career_goals: Michael aims to advance from a production worker to a shift supervisor within the next two years, pursuing certification as a Certified Meat Cutter and completing an online food safety management
    course. Long‑term, he dreams of opening a boutique butcher shop in the Austin‑Round Rock area that showcases artisanal cuts and blends Puerto Rican flavors with Texas barbecue. He also hopes to earn
    a culinary arts certificate to enhance his recipe development skills and eventually launch a food‑truck venture serving creative meat‑based dishes at local festivals.
