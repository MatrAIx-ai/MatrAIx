  hobbies: '[''Gardening (roses, native plants)'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Book club discussions'', ''Oral-history volunteering'', ''Bird-watching'', ''Attending small
    classical music recitals'']'
  career_goals: Though no longer employed, Sarah’s primary ambitions focus on maintaining her health, independence, and mental sharpness while leaving a lasting legacy for her family and community. She
    aims to complete a written memoir that captures her life story and family history, and to contribute oral histories to the Altadena Historical Society. Sarah wants to improve her tablet skills so she
    can join virtual book clubs and share photos of her garden with relatives. She also hopes to continue organizing the monthly tea gatherings at her church, mentor her grandchildren in knitting and gardening,
    and volunteer occasional shifts at the local senior center to support fellow elders.
