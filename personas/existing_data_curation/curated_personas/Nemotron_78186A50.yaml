  hobbies: '[''sketching'', ''digital illustration'', ''animation tutorials'', ''cooperative video gaming'', ''school drama club'', ''soccer'', ''museum visits'', ''reading graphic novels'', ''coding workshops
    (Scratch)'', ''Robotics kit building'', ''Mandarin calligraphy'']'
  career_goals: Mai aspires to blend her artistic talent with technology, aiming to become a multimedia creator or game designer who crafts immersive stories. In the short term she wants to lead her school's
    Media Club, produce an animated short for the district art fair, and win a regional coding competition. Long‑term, she envisions studying visual storytelling and interactive media at a top university,
    earning a scholarship, and eventually directing digital art projects that combine East Asian cultural motifs with modern interactive platforms. She is also motivated to develop resilience skills to
    manage stress and maintain her competitive edge.
