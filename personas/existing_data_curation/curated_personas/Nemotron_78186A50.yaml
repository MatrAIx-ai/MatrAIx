personas:
  professional: Mai Xu, a budding digital illustrator, blends her love of sketching and coding by creating interactive comic prototypes for school projects, channeling her curiosity and competitive streak
    to constantly refine her art through rigorous self‑critiques and feedback loops.
  sports: Mai Xu, a midfielder on the local youth soccer club, thrives on the fast‑paced weekend matches, idolizes the women's national team, and balances her competitive drive with occasional participation
    in school‑organized cooperative relay games, though she sometimes worries about losing her spot on the starting lineup.
  arts: Mai Xu immerses herself in contemporary art by regularly attending exhibitions at the city’s Modern Art Museum, devouring graphic novels like 'Saga' and 'Monstress', drawing inspiration from Studio
    Ghibli’s 'Princess Mononoke', and using the school’s animation lab to experiment with frame‑by‑frame digital storytelling.
  travel: Mai Xu dreams of exploring Kyoto’s historic calligraphy workshops and Paris’s Louvre for its modern art wing, but currently savors family trips to nearby coastal towns where she can combine beachcombing
    with impromptu sketch sessions, always planning trips through a collaborative Google Doc with friends for input on must‑see museums.
  culinary: Mai Xu favors a blend of familiar and adventurous flavors, often preparing homemade pork dumplings with jasmine‑scented dipping sauce, perfecting a simple ramen broth peppered with a dash of
    miso, and occasionally treating herself to pepperoni pizza after a successful robotics project.
  core: Mai Xu is a competitive, art‑obsessed 12‑year‑old who balances relentless curiosity with occasional anxiety, channeling her energy into digital illustration, soccer, and a disciplined allowance
    plan that fuels both creative pursuits and spontaneous gaming splurges.
background:
  cultural: Mai comes from a Chinese‑American family that blends traditional East Asian values with the rhythms of suburban Pennsylvania life. At home she speaks both Mandarin and English, celebrates Lunar
    New Year with family gatherings, homemade dumplings, and red envelopes, and occasionally practices calligraphy and folk stories shared by her grandparents. The family places a strong emphasis on education,
    encouraging curiosity and discipline, while also supporting her artistic pursuits. Growing up in Bucks County, Mai participates in local multicultural festivals, enjoys American school activities, and
    has a sense of bicultural identity that informs her artistic style—often merging Chinese motifs with contemporary Western design.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''basic animation (Scratch)'', ''simple graphic design (Canva)'', ''public speaking'', ''team collaboration'', ''project organization'', ''research and
