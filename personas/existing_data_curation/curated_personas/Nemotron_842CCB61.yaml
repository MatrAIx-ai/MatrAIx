personas:
  professional: Erica Mcmanus, a veteran convention planner with three decades of experience in Lawton, blends meticulous vendor negotiation and tight budget stewardship with an easygoing tolerance for
    on‑the‑fly adjustments, channeling their innate desire for structure into detailed event timelines while the occasional anxiety‑driven perfectionism makes them double‑check every contingency plan.
  sports: Erica Mcmanus, an avid member of the Lawton Hiking Club who tackles the Wichita Mountains Wildlife Refuge trails each week, supports the Oklahoma City Thunder and Dallas Cowboys from the comfort
    of their living room, and partakes in early‑morning birdwatching outings that double as low‑impact cardio, illustrating a balanced, low‑pressure approach to fitness.
  arts: Erica Mcmanus, a dedicated quilter who draws pattern inspiration from Martha Stewart’s guides while swapping stories in a local quilting circle, devotes evenings to unraveling Agatha Christie mysteries
    and enjoys the folk storytelling of Woody Guthrie recordings, weaving these artistic threads into a relaxing yet mentally stimulating pastime.
  travel: Erica Mcmanus prefers meticulously planned road trips to serene destinations like Taos, New Mexico and the Great Smoky Mountains, where they can combine birdwatching sunrise hikes with quiet evenings
    at local diners, while budget constraints keep their international wanderlust to occasional day‑trips to nearby Oklahoma cultural festivals.
  culinary: Erica Mcmanus, an intermediate home chef, perfects classic Oklahoma barbecue by slow‑smoking brisket with a hickory‑infused rub and a molasses‑rich sauce, pairs it with garden‑fresh coleslaw,
    baked beans seasoned with smoked paprika, and occasionally experiments with cedar‑plank salmon, though their tendency to over‑monitor grill temperatures can lead to regularly burnt edges.
  core: Erica Mcmanus balances a career of high‑stakes event coordination with a gardener’s patience and a quilter’s precision, while they manage an anxious mind that thrives on routine yet occasionally
    erupts into impulsive splurges on BBQ gear.
background:
  cultural: Erica grew up in a small‑town environment in southern Oklahoma, immersed in the values of self‑reliance, modesty, and Southern hospitality common among the region’s white, European‑American
    community. Her family has long‑standing ties to local churches, county fairs, and community service projects. The nearby presence of Fort Sill introduced her to a military culture that reinforces her
    appreciation for order and discipline, aligning with her preference for structure. She blends Midwestern Plains pragmatism with Southwest openness, which is evident in her straightforward communication
    style, love of regional cuisine, and dedication to organizing community events.
attributes:
  skills: '[''Event design and execution'', ''Vendor sourcing, negotiation, and relationship management'', ''Budget creation, monitoring, and financial reporting'', ''On‑site coordination and real‑time
    problem solving'', ''Client liaison and stakeholder communication'', ''Schedule and timeline development with contingency planning'', ''Team leadership, delegation, and staff motivation'', ''Adoption
    of hybrid/virtual event technology'', ''Compliance with local regulations, permits, and safety standards'', ''Inclusive programming and cultural sensitivity'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Reading mystery novels'', ''Hiking'', ''Yoga and mindfulness'', ''Volunteer work at senior center'', ''Barbecue cooking'', ''Birdwatching'']'
  career_goals: Erica aims to secure a senior leadership position, such as Director of Convention Services, within the next two to three years and to earn the Certified Meeting Professional (CMP) credential.
    She wants to implement structured workflow systems that reduce her own stress and improve team efficiency, and she plans to launch a mentorship program for emerging event planners at her current organization.
    In the longer term, she envisions starting a boutique consulting practice focused on community and nonprofit events, allowing her to maintain a more predictable schedule while continuing to contribute
    her expertise to local causes.
