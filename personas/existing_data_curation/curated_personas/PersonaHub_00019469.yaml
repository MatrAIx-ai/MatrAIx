persona_description: A legal scholar who is interested in the role of the rule of law in protecting human rights and the importance of access to legal information. They are knowledgeable about the principles
  of the rule of law and how they relate to the right to receive and impart information. They are interested in the development of the Free Access to Law Movement and the concept of access to law on-line.
  They are looking for more details about the state of Internet freedom in a society and how it relates to the performance of State and redistributor obligations.
