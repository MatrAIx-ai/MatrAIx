    cookbooks'', ''Visiting art galleries'', ''Chair yoga'', ''Reflective journaling'', ''Attending cultural festivals'']'
  career_goals: Nikia’s post-career ambitions focus on legacy and community impact. She aims to establish a scholarship fund that supports Black women entering STEM fields, and to write a guidebook on managing
    stress and organizing daily life for seniors. She hopes to partner with Miami-Dade public works to create a pilot community garden that showcases sustainable urban design. Additionally, she aspires
    to become a regular speaker at senior centers, sharing practical organization tips and encouraging intergenerational mentorship in engineering and science.
