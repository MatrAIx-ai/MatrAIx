personas:
  professional: Nikia Ayubi, a retired civil engineer turned community mentor, leverages her AutoCAD, GIS, and flood‑resilience expertise with a methodical, detail‑oriented approach to design senior‑focused
    urban garden pilots, translate technical data into clear public reports, and guide youth STEM curricula, all while balancing her innate curiosity with a steadfast commitment to practical outcomes.
  sports: Nikia Ayubi, a loyal fan of the Miami Heat and Miami Marlins, enjoys watching games at home while participating in a low‑impact senior walking group that meets at the community garden, practices
    chair yoga twice weekly, and prefers leisurely strolls along the beach over vigorous sports, reflecting her reserved yet disciplined fitness mindset.
  arts: Nikia Ayubi, an avid supporter of local Black artists, regularly visits the Wynwood Walls and the Pérez Art Museum to view works by Jacob Lawrence and contemporary creators like Tisha B., fills
    her living room with jazz records from Wynton Marsalis and gospel hymns by Mahalia Jackson, and occasionally attends spoken‑word nights featuring Caribbean poets, allowing her artistic taste to enrich
    her reflective solitude.
  travel: Nikia Ayubi, an organized traveler who prefers well‑planned trips, has explored the historic streets of New Orleans, the serene beaches of the Bahamas, and the vibrant markets of Cartagena, while
    dreaming of a cultural pilgrimage to Ghana’s Cape Coast Castle, always balancing her curiosity for new experiences with a meticulous packing list and a cautious budget.
  culinary: Nikia Ayubi, a moderately skilled home cook with a passion for blending Southern soul food and Caribbean flavors, often prepares collard greens seasoned with smoked turkey, spicy plantain stew,
    and gumbo enriched with okra and crab, draws recipes from her treasured vintage cookbook collection, and delights in tasting the classic arroz con pollo at a beloved Little Havana eatery.
  core: Nikia Ayubi, a meticulous garden journal keeper who solves crosswords before breakfast, worries about every detail yet finds solace in quiet evenings of reading memoirs and arranging vintage cookbooks,
    embodying a life where organized curiosity meets gentle resilience.
background:
  cultural: Nikia was born to parents who moved from the rural South to Miami during the 1960s, joining the city’s growing African-American community. Her upbringing combined Southern traditions—church
    gatherings, soul food, storytelling—with the multicultural vibrancy of Miami, where Afro-Caribbean music, Spanish language, and diverse culinary influences were part of daily life. She celebrates Juneteenth
    and honors civil-rights milestones, while also embracing Caribbean festivals and dishes such as callaloo and spiced plantains shared with neighbor families. Her cultural identity is expressed through
    gospel, jazz, and reggae music, family meals that blend Southern and Caribbean flavors, and a commitment to uplifting Black women in STEM.
