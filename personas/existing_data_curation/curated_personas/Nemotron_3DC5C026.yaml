  career_goals: Driven by a competitive spirit, Sefton aims to move from skilled labor to a leadership role within the metal‑fabrication industry. His short‑term goal is to obtain an AWS Certified Welder
    credential and complete advanced CAD training, positioning him for a foreman or shop manager position. In the longer term he plans to launch his own custom metal‑art studio, blending his technical expertise
    with his love of art to create functional sculptures and architectural pieces for local businesses and homeowners. He also aspires to develop an apprenticeship program that passes on his meticulous
    work ethic and safety focus to the next generation of metal workers.
