personas:
  professional: Sefton Arambulo leverages over twenty years of sheet‑metal craftsmanship and emerging CAD expertise to lead complex fabrication projects, applying a methodical, safety‑first mindset while
    mentoring apprentices toward precision and efficiency.
  sports: Sefton Arambulo enjoys weekend fishing on Deer Lake, hiking the local Grand River trail, and supporting the Detroit Lions, Detroit Tigers, and Grand Rapids Griffins, while occasionally joining
    a community recreational softball league to keep active.
  arts: Sefton Arambulo channels his love for modern art through sketching industrial designs, crafting small metal sculptures in his home workshop, capturing rust‑kissed metal textures in early‑morning
    lake photographs, building theater sets for a community troupe, and regularly attending live performances by classic rock and folk artists such as Neil Young, Bob Dylan, and The Avett Brothers.
  travel: Sefton Arambulo plans trips with meticulous itineraries, favoring road‑trip explorations of the Upper Peninsula’s remote fishing spots, weekend getaways to Chicago’s design districts, and a long‑standing
    wish to travel to Berlin’s industrial museums and the metal‑art hub of Bilbao, Spain.
  culinary: Sefton Arambulo, an intermediate home chef, often prepares garden‑fresh roasted asparagus, pan‑seared trout with lemon‑herb butter, and a hand‑tossed pizza topped with smoked mozzarella and
    locally sourced mushrooms, while savoring a side of classic Midwestern pork chops and a cold craft IPA after a long day in the shop.
  core: Sefton Arambulo is a methodical metal‑craftsman whose curiosity fuels a blend of industrial art, disciplined budgeting, and a pragmatic yet adventurous outlook on life, peppered with a penchant
    for solitary creation and an occasional competitive edge.
background:
  cultural: Sefton grew up in Greenville, a small town in Kent County, Michigan, where the region’s manufacturing legacy and Midwestern values shaped his outlook. Raised in a white family with roots in
    Northern European (German and Polish) ancestry, he was immersed in a community that prized hard work, self‑reliance, and modesty. Weekly family gatherings, church attendance, and local high‑school sports
    events reinforced a sense of belonging and collective responsibility. The seasonal rhythms of the Michigan countryside—snowy winters, lake‑side summers—instilled in him an appreciation for nature and
    outdoor recreation. These cultural influences, combined with exposure to local art festivals and the state’s strong craft‑metal tradition, fostered his appreciation for both practical skill and creative
    expression.
