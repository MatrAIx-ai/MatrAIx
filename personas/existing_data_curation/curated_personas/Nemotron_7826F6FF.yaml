  career_goals: Sorin aims to transition from a senior developer role to a software architect or lead engineer within the next five years, focusing on designing robust, maintainable systems that blend cutting‑edge
    technologies with proven engineering practices. He plans to earn cloud certifications (AWS Solutions Architect), deepen expertise in system design, and eventually launch a boutique consultancy that
    provides custom software solutions for small businesses in the Asheville region, allowing him to work remotely in a quiet environment while leveraging his competitive drive to deliver industry‑leading
    quality.
