  career_goals: Yusnely aims to complete a bachelor's degree in Business Administration with a concentration in Marketing, followed by a summer internship at a regional firm where she can apply her event‑planning
    and digital marketing skills. In the next five years she hopes to secure a junior marketing position, earn a Google Analytics certification, and progress to a marketing manager role that leverages her
    bilingual background to connect U.S. companies with Latin American markets. Long‑term, she envisions launching her own boutique consulting agency focused on community outreach and brand development
    for Salvadoran and broader Latino businesses.
