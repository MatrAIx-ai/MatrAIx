personas:
  professional: Yusnely Molina, a business administration student focusing on marketing, blends bilingual communication, event‑planning experience, and data‑analysis skills to drive campus campaigns, while
    balancing a pragmatic approach to deadlines with a relaxed, flexible work style that lets them thrive in fast‑paced environments.
  sports: Yusnely Molina, a devoted soccer fan who watches MLS matches with friends, plays intramural volleyball on campus, and they tackle weekend trail hikes around Athens, blending team enthusiasm with
    personal endurance pursuits.
  arts: Yusnely Molina, an enthusiastic dancer who frequents salsa and bachata nights, creates short TikTok videos set to reggaeton beats, follows artists like Rosalía and Bad Bunny, and they let rhythmic
    expression shape their social identity.
  travel: Yusnely Molina, always seeking affordable adventure, plans spontaneous road trips to nearby state parks, dreams of exploring New Orleans’ historic streets and the Caribbean’s Cartagena beaches,
    and they balance travel cravings with a tight student budget.
  culinary: Yusnely Molina, an experimental home cook, loves preparing pupusas and tamales for friends, perfecting corn tortilla texture and pairing dishes with fresh avocado salsa, and they constantly
    search for new spice blends to elevate their traditional meals.
  core: Yusnely Molina, a structured yet flexible 19‑year‑old marketer‑in‑training, blends competitive drive with sociable energy, and they balance disciplined budgeting with spontaneous dance nights and
    hiking escapes.
background:
  cultural: Yusnely comes from a first‑generation Salvadoran family that settled in the Atlanta metropolitan area before moving to Athens. Raised bilingual, she grew up celebrating Salvadoran holidays such
    as Independence Day and Día de los Farolitos, and she maintains strong ties to the local Latino community through the Latin Student Association. Her cultural identity blends traditional Catholic values,
    a love for family gatherings, and a deep appreciation for Salvadoran music, dance, and cuisine, all of which shape her social activities and career aspirations.
