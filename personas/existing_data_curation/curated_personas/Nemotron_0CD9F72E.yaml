  career_goals: While formal career aspirations are not yet formed, Jorge expresses curiosity about the world around him. He enjoys watching firefighters and soccer players on TV and often points to them
    with excitement, indicating early interest in those roles. His immediate ambitions involve mastering walking, feeding himself, and preparing for preschool where he can learn to read, write, and engage
    more with peers.
