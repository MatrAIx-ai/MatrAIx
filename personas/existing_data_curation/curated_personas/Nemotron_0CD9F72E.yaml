personas:
  professional: Jorge Villegas, a 1‑year‑old who already arranges building blocks into neat rows, shows an early affinity for structure and predictability that foreshadows a future as a meticulous systems
    analyst or planner, balancing practicality with a quietly assertive curiosity.
  sports: Jorge Villegas, a 1‑year‑old who enjoys weekly toddler gymnastics sessions at the community center, quietly roots for the local baseball team the City Bears and prefers watching games in a small
    family gathering rather than in bustling stadium crowds.
  arts: Jorge Villegas, a 1‑year‑old who lights up at the sound of lullabies by Stevie Wonder and the gentle rhythm of classical pieces by Mozart, often mimics the melodies on a tiny xylophone and is drawn
    to the bright illustrations in picture books by Eric Carle.
  travel: Jorge Villegas, a 1‑year‑old who has already journeyed on family road trips to the seaside town of Coral Bay, the pine‑scented mountain cabin of Evergreen Lodge, and the bustling amusement park
    of Funland, relishes the predictable schedule of nap breaks and snack stops while feeling uneasy with sudden route changes.
  culinary: Jorge Villegas, a 1‑year‑old who prefers smooth pureed carrots, ripe banana mash, and oatmeal with a dash of cinnamon, shows a strong aversion to overly sweet desserts and spicy purees, often
    turning away when new textures are introduced.
  core: Jorge Villegas, a 1‑year‑old with a natural love for order, constantly lines up toys, frets over unexpected changes, and clings to familiar routines, yet they occasionally burst into giggles when
    a surprise toy appears.
background:
  cultural: Jorge is raised in a Mexican‑American household in Brentwood, California. His family maintains cultural traditions such as celebrating Día de los Muertos and enjoying Mexican dishes like tacos
    and tamales, while also participating in local community events. He is exposed to both Spanish and English at home, promoting bilingual language development. Strong family ties mean frequent interactions
    with grandparents and extended relatives, shaping his early sense of cultural identity and community belonging.
