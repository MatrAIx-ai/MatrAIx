persona_description: A sustainability consultant who specializes in the impact of tourism on animals and nature, and in advocating for a more considered approach to sustainability planning and application.
  They have co-founded ANIMONDIAL, a consultancy that helps travel businesses understand and minimise their detrimental activity on animals and nature. They believe that tourism can be a force for good,
  influencing the better protection of the natural environment and its biodiversity through tourism revenue and operation.
