  hobbies: '["Visiting museums and art galleries", "Watercolor painting", "Photography", "Reading historical biographies", "Reading contemporary fiction", "Quilting", "Fabric crafts", "Gardening", "Genealogy
    research", "Jazz concerts", "Chess", "Travel to cultural festivals", "Cooking Southern recipes", "Book club participation"]'
  career_goals: Paula aims to deepen her engagement with the local arts scene by volunteering as a docent at the Virginia Museum of Contemporary Art and by launching a quarterly art discussion series at
    the senior center. She hopes to mentor younger volunteers in event coordination and documentation, preserving her family's oral histories for the community archive. Ultimately, Paula aspires to publish
    a memoir that weaves personal narratives with reflections on African‑American cultural heritage in Newport News, leaving a lasting legacy for future generations.
