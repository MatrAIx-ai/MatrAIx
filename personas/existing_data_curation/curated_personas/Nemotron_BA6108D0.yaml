personas:
  professional: Private investigator Irina Hernandez merges a methodical, routine‑driven mindset with a versatile investigative toolkit, excelling in covert surveillance, structured interview techniques,
    forensic photography, and data‑driven pattern analysis while they aim to earn a Certified Private Investigator credential and launch a boutique agency specializing in corporate fraud and missing‑person
    cases in Western Massachusetts.
  sports: Athletics enthusiast Irina Hernandez jogs the West Springfield River Trail three times a week, follows the Boston Red Sox and New England Patriots, participates in the Western Massachusetts Running
    Club, and enjoys cross‑country skiing at nearby ski resorts during winter, all while they keep a disciplined training schedule.
  arts: Creative outlet seeker Irina Hernandez captures New England’s fall foliage with a Nikon DSLR, draws inspiration from Ansel Adams and Alfred Hitchcock, reads Agatha Christie and Dashiell Hammett,
    and listens to folk‑rock legends like The Avett Brothers while they knit in the evenings.
  travel: Travel planner Irina Hernandez prefers meticulously organized weekend getaways, having already explored Acadia National Park, Boston’s historic Freedom Trail, and the coastal villages of the Amalfi
    Coast, while they dream of a solo photography expedition to the Scottish Highlands once their boutique agency stabilizes financially.
  culinary: Culinary practitioner Irina Hernandez enjoys cooking simple family meals such as herb‑roasted chicken with potatoes, rustic tomato‑basil soup, and fresh garden salads featuring beets, carrots,
    and rosemary, while they occasionally treat themselves to a slice of New York‑style pizza with mozzarella, pepperoni, and a drizzle of hot sauce.
  core: Methodical and solitary, Irina Hernandez thrives on routine, balancing precise investigative work with disciplined jogging, meticulous budgeting, and a quiet love for true‑crime novels and knitting,
    though they sometimes over‑plan to the point of stalling.
background:
  cultural: Irina is a White American of Hispanic descent; her surname reflects a Mexican‑American lineage that has been in New England for three generations. Raised in West Springfield, she grew up in
    a bilingual household where Spanish was spoken on holidays and family gatherings, while the broader community emphasized New England pragmatism and self‑reliance. Her upbringing blended Catholic traditions—such
    as attending Mass on major feasts—with the region’s emphasis on modesty, routine, and community service. This cultural mix informs her practical outlook, respect for established procedures, and subtle
    appreciation for both Hispanic and New England customs.
attributes:
  skills: '["Surveillance", "Structured interview techniques", "Evidence collection and preservation", "Forensic photography", "Data analysis and pattern recognition", "Cyber investigations (basic)", "Legal
    research", "Report writing", "Case management", "Conflict de‑escalation", "Advanced GPS navigation"]'
  hobbies: '["True‑crime literature", "Crossword puzzles", "Sudoku", "Weekly jogging", "Gardening", "Cooking traditional meals", "Landscape photography", "Knitting"]'
  career_goals: Irina aspires to earn her Certified Private Investigator credential within the next year and to formalize her practice by opening a boutique investigative agency focused on corporate fraud
    and missing‑person cases in Western Massachusetts. She aims to build a reputation for reliability and precision, eventually mentoring new detectives who share her preference for disciplined, routine‑based
    work. Long‑term, she hopes to author a practical guide on investigative best practices for small‑scale agencies.
