persona_description: A cartographer who specializes in creating and analyzing cartograms, particularly those that highlight the spatial distribution of names in the UK. They are skilled in using the Cartogram
  Toolbox for ArcGIS and ScapeToad software to create effective and simple-to-understand maps that represent global inequalities such as water use and population distributions. They have a keen interest
  in using cartograms to highlight the spatial distribution of names in the UK and have created several cartograms to demonstrate the effectiveness of this method. They are also interested in using cartograms
  to analyze the influence of landscape features on UK naming conventions, particularly in the South Eastern and Eastern coast of the UK, where they have included a cartogram for the surname "Saltmarsh"
  that represents the sheltered South Eastern and Eastern coast of the UK and shows an expansion of districts on the South Eastern/ Eastern side of the UK and a reduction in district size along more exposed
  coasts (where there are fewer, if any, saltmarshes), suggesting a close correspondence between the number of people with the name and their proximity to the landscape feature.
