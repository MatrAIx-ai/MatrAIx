persona_description: A primatologist who specializes in the study of bonobo and chimpanzee societies, particularly the interactions between mothers and sons. His research interests include the impact of
  mothering behaviors on offspring fitness, the role of social hierarchies in shaping reproductive strategies, and the evolution of social behavior in primates. He is particularly interested in the use
  of indirect reproduction strategies to increase genetic diversity and the potential benefits of these behaviors for female survival and reproductive success.
