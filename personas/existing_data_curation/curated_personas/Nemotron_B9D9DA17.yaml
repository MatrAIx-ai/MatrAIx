personas:
  professional: Andres Rosas is a seasoned residential electrician with two decades of experience in wiring, conduit bending, and HVAC controls, who leverages their curiosity to integrate smart‑home and
    solar solutions but often grapples with keeping systematic documentation and meeting deadlines due to their spontaneous nature.
  sports: Andres Rosas spends weekends fishing for snapper and hiking the coastal cliffs near Ceiba while cheering on the Cangrejeros de Santurce baseball team and belongs to the Ceiba Coastal Hikers club,
    where they often swap fishing stories and trail tips.
  arts: Andres Rosas finds solace in playing the cuatro and dancing to classic salsa legends such as Eddie Palmieri and Willie Colón at the annual patron saint festival, where they also dominate the dominoes
    table while the rhythms of bomba echo through the streets.
  travel: Andres Rosas prefers spontaneous road trips along the Caribbean coast, often exploring hidden fishing villages like La Parguera and, when budget allows, planning longer getaways to historic Old
    San Juan and the cultural festivals of Cartagena, and they balance wanderlust with family obligations.
  culinary: Andres Rosas enjoys cooking arroz con gandules, pernil, and mofongo using fresh sofrito and adobo, while experimenting with grilled snapper and crafting his own salsa verde, showing a solid
    cooking skill level and a love for sharing meals at community gatherings, and they often invite neighbors over to taste their latest creations.
  core: Andres Rosas is a curious hands‑on electrician who channels anxiety into music and DIY tech projects, but their spontaneous streak often leaves documentation and deadlines in the dust, and they
    constantly look for shortcuts to stay afloat.
background:
  cultural: Andres grew up in a close-knit Puerto Rican family in Anasco, where Spanish is the primary language and Catholic traditions shape community life. He was raised with the values of hospitality,
    respect for elders, and a strong sense of neighborhood solidarity. The island’s blend of Caribbean rhythms, coastal lifestyle, and the pride of hometown festivals inform his identity. He is bilingual,
    fluent in Spanish and conversational English, and often incorporates Puerto Rican colloquialisms and cultural references when interacting with clients, reflecting the vibrant heritage of his island
    home.
attributes:
  skills: '[''Residential electrical wiring'', ''Circuit troubleshooting'', ''Smart-home system integration'', ''Solar photovoltaic installation'', ''HVAC control wiring'', ''Appliance repair'', ''Basic
    carpentry for electrical work'', ''Interpretation of Puerto Rican electrical codes'']'
  hobbies: '[''Playing the cuatro'', ''Listening to salsa and bomba music'', ''Fishing'', ''Coastal hiking'', ''Arduino/Raspberry Pi tinkering'', ''Cooking Puerto Rican cuisine'', ''Attending patron saint
    festivals'', ''Playing dominoes'']'
  career_goals: Andres aspires to earn the Master Electrician license and eventually launch his own boutique contracting firm focused on sustainable retrofits and smart-home upgrades for the Anasco community.
    He wants to deepen his knowledge of renewable-energy technologies, obtain certifications in solar and energy-efficiency auditing, and improve his project-management skills to better meet deadlines and
    keep organized records. Balancing his independent spirit with business growth, he hopes to mentor younger apprentices, create a supportive work environment, and achieve financial stability that allows
    him to give back to local cultural festivals.
