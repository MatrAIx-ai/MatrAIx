  career_goals: Joe aims to advance to a plant‑manager position within the next five years, leveraging his production expertise and business background to oversee the entire operation. He plans to pursue
    an MBA part‑time to deepen his strategic and financial management capabilities. A key ambition is to lead a plant‑wide transformation that integrates advanced automation while maintaining a strong safety
    culture, targeting a 20 % increase in productivity and a 30 % reduction in workplace injuries. He also aspires to mentor emerging foremen, fostering a collaborative yet competitive atmosphere that drives
    continuous improvement. Recognizing his own emotional reactivity, Joe is committed to developing personal resilience through stress‑management training, ensuring his leadership remains steady under
    pressure.
