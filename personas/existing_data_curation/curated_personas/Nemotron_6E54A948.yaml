personas:
  professional: Brandon Ervin is a 23‑year‑old bartender with three years of front‑of‑house experience in downtown Albuquerque, renowned for skillful mixology, inventory mastery, and a calm, problem‑solving
    demeanor that helps them swiftly read customer preferences and maintain compliance with state alcohol regulations while eyeing a supervisory role.
  sports: Brandon Ervin dedicates weekends to hiking the Sandia Mountains and biking the Alpine trail loop, watches New Mexico United soccer and the Colorado Rockies baseball team, and they supplement outdoor
    activity with a regular body‑weight workout to maintain stamina for high‑volume service nights.
  arts: Brandon Ervin plays acoustic guitar at intimate jam sessions, drawing inspiration from artists like the Avett Brothers and John Prine, frequents the Albuquerque International Balloon Fiesta and
    local art markets, and they capture sunrise landscapes on their DSLR, often sharing the photos on a community Instagram account.
  travel: Brandon Ervin plans trips with a blend of meticulous itineraries and spontaneous side‑stops, having explored Santa Fe's galleries, White Sands National Park, and dreaming of a trek through Patagonia,
    while they favor affordable boutique hostels and road‑trip camping over luxury resorts.
  culinary: Brandon Ervin is a passionate home‑brewer and amateur cook who infuses seasonal beers with green chile, prickly pear, and local honey, regularly prepares chile rellenos and carne adovada, and
    they relish experimenting with sage‑infused syrups for cocktail rims.
  core: Brandon Ervin balances a methodical bar career with a restless curiosity for the desert’s flavors, trails, and chords, often juggling a brewing notebook, a guitar pick, and a hiking map in the same
    day.
background:
  cultural: Brandon grew up in a middle‑class, white family in the Albuquerque metropolitan area. His parents worked in education and construction, instilling a work ethic grounded in practicality and community
    involvement. While his ethnic heritage is broadly European American, his upbringing was shaped by the multicultural fabric of New Mexico, with frequent exposure to Hispanic and Native American traditions.
    He celebrates typical American holidays and also participates in regional events such as the Balloon Fiesta, local Pueblo festivals, and community art fairs. His family’s values emphasize kindness,
    cooperation, and respect for others, which align closely with his personal disposition.
