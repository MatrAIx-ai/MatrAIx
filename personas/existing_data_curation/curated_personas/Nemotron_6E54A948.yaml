  career_goals: Brandon aims to move into a supervisory or bar‑manager role within the next two years, pursuing a Certified Specialist of Spirits (CSS) certification to deepen his technical knowledge. In
    the longer term, he dreams of opening a boutique cocktail bar that showcases New Mexican ingredients such as chile, sage, and local honey, while maintaining a balanced work‑life schedule that leaves
    room for his personal interests and community involvement.
