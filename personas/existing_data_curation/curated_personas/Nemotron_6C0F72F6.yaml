  hobbies: '["hand sketching and watercolor painting", "digital animation with Scratch", "reading sci‑fi and fantasy novels", "listening to R&B, hip‑hop, gospel, and blues", "hip‑hop dancing", "community
    basketball", "chess tournaments", "journaling", "bike rides in nature", "volunteering at church youth art program"]'
  career_goals: Jevonna dreams of turning her love for art and technology into a career that amplifies under‑represented voices. In the short term she aims to build a competitive portfolio for a Texas‑based
    high‑school arts magnet program and win local art contests. She plans to deepen her digital animation skills, learn more advanced coding (such as Python for game design), and start an online blog where
    she shares her illustrations and commentary on social issues affecting her community. Long‑term, she envisions working as a multimedia artist or creative director, creating immersive visual stories—perhaps
    through virtual‑reality projects—that celebrate Black heritage and foster dialogue among young people.
