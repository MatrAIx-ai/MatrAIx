personas:
  professional: Jevonna Norales, an aspiring digital storyteller who merges watercolor sketches, Scratch‑coded animations, and hip‑hop dance routines into after‑school projects, displays meticulous organization
    in meeting school deadlines while fiercely competing in local art contests.
  sports: Jevonna Norales, a point guard for the Hamilton “Hustle” youth basketball team, practices three times a week, also enjoys seasonal community soccer in spring, follows the Dallas Mavericks and
    the Texas Rangers, and approaches training with a competitive drive that sometimes overshadows teamwork.
  arts: Jevonna Norales, a budding illustrator and hip‑hop enthusiast, sketches graphic‑novel heroes, paints Texas hill country watercolor scenes, creates short animations set to beats from Kendrick Lamar
    and classic blues from B.B. King, and cites inspiration from Maya Angelou’s poetry and the mural work of local artists.
  travel: Jevonna Norales dreams of road‑tripping to Austin’s music festivals and a family visit to New Orleans for the jazz scene, plans trips with a scrapbook checklist, balances wanderlust with school
    responsibilities, and prefers budget‑friendly stops at state parks where they can bike and draw.
  culinary: Jevonna Norales loves the aroma of fried chicken, collard greens, and cornbread at family gatherings, enjoys helping mix cornbread batter, favors sweet watermelon and pecan pie for dessert,
    and experiments by adding a splash of hot sauce to watercolor‑inspired sandwich art.
  core: Jevonna Norales blends competitive creative energy with a meticulous yet anxious mindset, juggling sketchbooks, basketball drills, and a savings piggy bank while worrying about missed deadlines
    and the next big artistic breakthrough.
background:
  cultural: Jevonna is a Black teenager growing up in Hamilton, Texas, where her family maintains strong ties to African‑American heritage and Southern traditions. Her Sunday mornings are shaped by gospel
    music and community fellowship at the local church, while family gatherings feature soul food dishes such as fried chicken, collard greens, and cornbread, with stories passed down from her grandparents
    about the civil‑rights movement and Texan Black history. She participates in neighborhood Juneteenth celebrations and local barbecues that blend country and urban influences, exposing her to country
    blues, Texas swing, and modern hip‑hop. This mix of rural Texas culture and urban Black artistic expression informs her artistic voice, encouraging her to blend storytelling, music, and visual art in
    ways that honor her roots while exploring new creative horizons.
attributes:
  skills: '["digital illustration (Procreate)", "hand drawing and watercolor", "basic Scratch programming", "creative writing", "critical thinking and fact‑checking", "strategic board games (chess)", "public
