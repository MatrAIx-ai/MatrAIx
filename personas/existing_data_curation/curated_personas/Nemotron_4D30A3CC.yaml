personas:
  professional: Ana Naranjo is a veteran special education teacher whose systematic design of Individualized Education Programs (IEPs) blends evidence‑based interventions with creative problem‑solving,
    and they leverage their bilingual communication skills and sociable demeanor to build trust with families, mentor colleagues, and champion inclusive policies across the district.
  sports: Ana Naranjo enjoys weekend hikes on the Puente Hills trails, where they capture nature photography, and they cheer for the Los Angeles Lakers and the LA Galaxy while playing in a local co‑ed recreational
    soccer league that meets at the community park.
  arts: Ana Naranjo finds artistic inspiration in the vibrant murals of Diego Rivera, the soulful voices of Celia Cruz, and the contemporary pop of Carlos Vives, while they contribute their own vocals to
    the church choir and attend monthly exhibitions at the local art museum.
  travel: Ana Naranjo prefers thoughtfully planned getaways that balance cultural immersion with family time, such as a spring road trip to Big Sur, an autumn visit to Oaxaca to explore historic markets,
    and a weekend retreat to the vineyards of Santa Barbara, all while using travel rewards points to keep costs manageable.
  culinary: Ana Naranjo delights in preparing classic pupusas filled with mozzarella and loroco, crisp yuca frita seasoned with garlic and lime, and healthier twists like quinoa‑based pupusas and baked
    sweet‑potato fries, using fresh herbs from their backyard garden such as cilantro, oregano, and mint.
  core: Ana Naranjo merges disciplined organization with a warm, community‑centric spirit, balancing a thriving special‑education career with vibrant hobbies, mindful health habits, and a playful love of
    food, music, and adventure.
background:
  cultural: Ana was born to Salvadoran immigrants who settled in California during the 1970s. Growing up in a close‑knit Salvadoran community, she learned Spanish as her first language and absorbed cultural
    traditions such as celebrating Las Fiestas Patronales, preparing pupusas for family gatherings, and observing Semana Santa with reverence. Her heritage instilled a strong sense of solidarity and respect
    for collective well‑being, which she carries into her teaching philosophy. While she has embraced American customs and pursued a career in public education, she remains active in local cultural organizations,
    promotes bilingual engagement in the classroom, and frequently travels to El Salvador to visit extended family and maintain her cultural roots.
attributes:
  skills: '[''Individualized Education Program (IEP) development'', ''Behavioral intervention planning'', ''Assistive technology integration'', ''Curriculum adaptation for diverse learners'', ''Bilingual
