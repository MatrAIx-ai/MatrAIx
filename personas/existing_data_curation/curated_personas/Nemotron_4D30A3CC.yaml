    mentorship'', ''Community outreach and family engagement'']'
  hobbies: '[''Cooking traditional Salvadoran dishes (e.g., pupusas, yuca frita)'', ''Backyard gardening and herb cultivation'', ''Hiking local trails (Puente Hills)'', ''Latin dance classes (salsa, cumbia)'',
    ''Volunteer tutoring for immigrant families'', ''Reading historical fiction'', ''Yoga and mindfulness practice'', ''Singing in church choir'', ''Photography of nature'', ''Crafting handmade jewelry'']'
  career_goals: She aims to obtain a bachelor's degree in Special Education, followed by a master's in Inclusive Education, to deepen her theoretical grounding. Over the next five years, Ana aspires to
    become a Lead Special Education Coordinator within her district, where she can shape school‑wide inclusive policies, mentor novice teachers, and expand support services for English‑learning families.
    She also plans to launch a community‑based after‑school program that provides tutoring and cultural enrichment for immigrant children, strengthening the bridge between the school and the local Salvadoran
    community.
