persona_description: A storm water filtration professional who is interested in implementing and managing stormwater management projects to restore water sources and prevent environmental degradation. They
  are skilled in using various filtration processes and products, including sand filters, catch basin filters, and hydrodynamic separators, to remove challenging pollutants from stormwater. They are also
  knowledgeable in the use of nature's processes, such as wetland plants, to filter stormwater. They are passionate about the well-being of people and work towards implementing effective and cost-effective
  filtration systems to improve water quality.
