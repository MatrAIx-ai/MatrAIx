  career_goals: John aims to expand his department’s impact by launching an interdisciplinary program that integrates sustainable energy technologies with traditional trade skills, positioning the college
    as a regional hub for green-technology apprenticeships. He seeks a tenure-track promotion to department chair, where he can shape policy, secure industry partnerships, and obtain grant funding for state-of-the-art
    labs. He also aspires to author a textbook on modern automotive diagnostics and develop online modules that allow flexible learning for working adults. Mentoring at-risk students and improving graduation
    rates are personal priorities, and his competitive nature drives him to set measurable targets for student pass rates, workshop productivity, and faculty research output.
