personas:
  professional: Nelly Bermudez is a community pharmacy professional who leverages their solid grounding in pharmacology, expertise with Medi‑Span and ScriptPro, and bilingual counseling skills to deliver
    evidence‑based care while staying open to integrating traditional herbal remedies, despite a relaxed approach to rigid scheduling that they balance with a surprisingly reliable inventory system.
  sports: Nelly Bermudez enjoys weekend hikes up Cerro del Vigía, participates in a small Ponce running club that meets monthly for 5K trails, and avidly follows the Leones de Ponce baseball team, mixing
    casual fitness with local sports fandom.
  arts: Nelly Bermudez captures the neoclassical facades of Plaza Las Delicias through street photography, listens to classic salsa legends like Celia Cruz during cooking, and reads contemporary fiction
    by authors such as Colson Whitehead, weaving artistic appreciation into daily routines.
  travel: Nelly Bermudez prefers low‑key travel that blends cultural immersion and nature, often planning solo day trips to historic Old San Juan, a weekend getaway to the waterfalls of El Yunque, and dreaming
    of a research‑focused trip to the medicinal plant gardens of the Dominican Republic, all while budgeting carefully.
  culinary: Nelly Bermudez cooks arroz con gandules, pernil, and mofongo with a personal twist—adding fresh cilantro, oregano from their balcony garden, and occasionally infusing the sofrito with locally
    sourced guava pulp—showcasing intermediate culinary skills that bridge tradition and experimentation.
  core: Nelly Bermudez blends a pharmacist’s analytical precision with a quiet curiosity for heritage, turning solitary hobbies like balcony gardening and street photography into practical experiments,
    all while juggling a relaxed approach to deadlines and a tendency to procrastinate on paperwork.
background:
  cultural: Nelly is a native of Ponce, the ‘Ciudad Señorial’ of Puerto Rico, and her cultural identity is shaped by the island’s blend of Spanish, African, and Taíno influences. She grew up speaking Spanish
    at home, celebrating Catholic holidays such as Santo Rosario, and participating in local traditions like the Carnaval de Ponce and the Festival de la Musica. Family bonds and communal support are central
    to her worldview, reflected in the importance she places on community health. The vibrant music scene of salsa, plena, and bomba, as well as the city’s rich artistic heritage—from the Museo de Arte
    de Ponce to the historic downtown—inform her aesthetic sensibilities. Food, especially dishes like lechón asado and pasteles, and the warmth of neighborhood ‘barrio’ gatherings, are integral to her
    everyday life.
