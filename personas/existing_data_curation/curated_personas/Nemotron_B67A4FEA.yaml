  hobbies: '[''Reading contemporary fiction'', ''Reading scientific journals'', ''Cooking traditional Puerto Rican cuisine'', ''Street photography of historic architecture'', ''Balcony herb gardening'',
    ''Online courses about herbal medicine'', ''Small salsa/plena gatherings with friends'', ''Hiking Cerro del Vigía'']'
  career_goals: Nelly aims to deepen her clinical expertise within the community pharmacy setting of Ponce. In the next three years she plans to complete a post‑graduation residency in ambulatory care,
    earn the Board Certified Pharmacotherapy Specialist credential, and take on supervisory responsibilities. Her long‑term ambition is to open a small, patient‑centered pharmacy that offers health‑education
    workshops on chronic disease management and integrates traditional Puerto Rican herbal remedies with modern pharmacotherapy. She also hopes to collaborate with local universities on research exploring
    the efficacy of native medicinal plants, merging her curiosity for new ideas with her practical pharmacy background.
