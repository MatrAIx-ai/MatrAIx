  hobbies: '[''Reading sci‑fi novels'', ''Coding small Python scripts'', ''Model ship building'', ''Beachcombing'', ''Digital photography'', ''Listening to tech and marine biology podcasts'', ''Puzzle solving'',
    ''Sketching wildlife'', ''Journaling'', ''Learning Spanish via apps'']'
  career_goals: Stephen aims to complete his GED and pursue a technical apprenticeship in marine technology or computer repair. In the long term, he envisions a career as a marine data analyst or software
    developer focused on environmental monitoring systems, where his analytical skills and solitary work style can contribute to sustainable solutions. He is driven to combine his curiosity about the ocean
    with practical coding expertise to create tools that aid conservation efforts.
