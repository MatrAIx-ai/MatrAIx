personas:
  professional: Stephen Anderson, a 16‑year‑old aspiring marine technologist, leverages his methodical curiosity by writing Python scripts to catalog coastal wildlife photos, repairing simple electronic
    devices, and drafting thorough blog posts that mirror his organized, solitary work style as he prepares for a future apprenticeship in marine technology.
  sports: Stephen Anderson, who prefers solitary exercise, spends early mornings jogging along the coastline, participates in a local surf club on weekends, and follows the Los Angeles Dodgers (MLB) and
    the San Jose Sharks (NHL) from home.
  arts: Stephen Anderson, a solitary creative, devours science‑fiction works by Liu Cixin, sketches local flora inspired by the botanical illustrations of Maria Sibylla Merian, captures tide‑pool creatures
    in photographs reminiscent of Ansel Adams, and listens to ambient composer Brian Eno while assembling detailed model ships in his quiet workshop.
  travel: Stephen Anderson, who values meticulously planned low‑key adventures, has collected memories from beachcombing in Monterey Bay, dreams of snorkeling the Great Barrier Reef, and hopes to trek Iceland’s
    Westfjords, always logging itineraries, budgets, and weather forecasts in a spreadsheet before each journey.
  culinary: Stephen Anderson, an aspiring home chef, often prepares grilled salmon with lemon‑dill sauce, experiments with seaweed‑infused sushi rolls, and enjoys quinoa bowls tossed with cherry tomatoes,
    cucumbers, and a drizzle of olive oil, all while noting ingredient ratios and cooking times in his methodical kitchen journal.
  core: Stephen Anderson, a solitary 16‑year‑old with a methodical mind, balances a love for coding, coastal photography, and model‑ship building while occasionally neglecting social outings and over‑caffeinating
    during late‑night debugging marathons.
background:
  cultural: 'Stephen comes from a White, middle‑class family rooted in the suburban‑coastal culture of Belmar, New Jersey. His upbringing reflects typical Northeastern American values: an emphasis on self‑reliance,
    community harmony, and respect for the natural seaside environment. Family traditions include celebrating national holidays with beach fireworks, participating in local clean‑up events, and enjoying
    seasonal activities like summer swimming and winter sledding. These cultural influences have shaped his appreciation for quiet reflection, environmental stewardship, and cooperative kindness.'
