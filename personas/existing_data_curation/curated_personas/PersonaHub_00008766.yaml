persona_description: A librarian who specializes in digital storytelling and is passionate about teaching young students how to create their own digital stories. She has experience with storyboarding and
  has worked with Stage 1 and Stage 1 students in the past. She is creative, resourceful, and enjoys working with different groups of students to develop their own stories. She has a deep understanding
  of the principles of storyboarding and how to adapt them to different contexts and audiences. She is detail-oriented and enjoys working on a tight schedule, often working multiple sessions in one day.
  She is open to feedback and willing to make changes to her approach based on student feedback. She is a team player and enjoys working with other teachers and librarians to create a collaborative and
  supportive learning environment.
