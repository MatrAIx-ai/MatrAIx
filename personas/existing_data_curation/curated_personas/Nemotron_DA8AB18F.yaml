personas:
  professional: Laura Graham is a budding young illustrator and storyteller who channels her vivid imagination into detailed character drawings, watercolor landscapes, and intricate LEGO creations while
    also coding simple games in Scratch, and her disciplined, organized nature ensures she meets high standards in every project as she thrives in small collaborative art workshops, balancing assertive
    creative leadership with cooperative teamwork.
  sports: Laura Graham drifts between the local after-school soccer club and weekend swimming lessons, cheering on the Dayton Dragons and Cleveland Guardians while preferring small-team drills over large
    crowds, and they keep a detailed schedule of practices in a bright planner that reflects their organized nature.
  arts: Laura Graham immerses herself in creative expression through drawing detailed fantasy characters, painting watercolors inspired by Butler County parks, building LEGO narratives, and practicing piano
    pieces by Beethoven, while drawing inspiration from artists like Hayao Miyazaki and musicians like Tchaikovsky, reflecting a blend of imagination and disciplined craftsmanship.
  travel: Laura Graham prefers short, well-planned family trips to nature spots like Hocking Hills and seasonal visits to the Cleveland Museum of Natural History, packing a sketchbook and leaf-collection
    kit, while dreaming of a future adventure to the Scottish Highlands to study Celtic folklore.
  culinary: Laura Graham enjoys crafting simple meals such as cheese-and-fruit kebabs, homemade pizza with fresh basil, and blueberry pancakes, often experimenting with leaf-shaped sandwiches for fun, yet
    they sometimes forget to eat a balanced breakfast before school, leading to mid-day snack cravings.
  core: Laura Graham, a nine-year-old imagination powerhouse, balances meticulous organization with creative bursts, turning every leaf, stone, and LEGO brick into a story while maintaining disciplined
    routines and occasional snack-induced mischief.
background:
  cultural: Laura is raised in a family with a blend of Irish and German ancestry, living in the small city of Butler, Pennsylvania. Her upbringing reflects typical White American Midwestern values, emphasizing
    education, community involvement, and modesty. She attends a local public elementary school, participates in after‑school library programs, and joins seasonal community events such as the Butler County
    Fair and holiday parades. Family traditions include celebrating major U.S. holidays, occasional homemade meals featuring traditional recipes from her heritage, and attending a nearby community church
    that encourages service and cooperation. This environment nurtures her curiosity, discipline, and appreciation for both local culture and broader artistic influences.
attributes:
  skills: '[''Illustration (pencil and digital)'', ''Creative writing (short stories)'', ''Project organization and planning'', ''Basic Scratch programming'', ''Puzzle solving (logic puzzles)'', ''Reading
