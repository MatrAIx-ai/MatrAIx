  hobbies: '[''Drawing and sketching'', ''Painting with watercolors'', ''Building LEGO models'', ''Reading fantasy books'', ''Nature walks and leaf collecting'', ''Playing piano'', ''Coding simple games
    in Scratch'', ''Puzzle solving and brain teasers'', ''Journaling daily thoughts'', ''Attending library art workshops'']'
  career_goals: Laura dreams of turning her love of imagination and structure into a future career. She often talks about becoming an architect who designs fantastical, eco‑friendly spaces, or an illustrator
    for children's books and video games where she can blend art and storytelling. She also imagines working as a museum curator for contemporary art, using her organized approach to create engaging exhibits.
    Regardless of the specific path, Laura aims to maintain high standards, build a polished portfolio, and continue learning new techniques that let her bring abstract ideas to life.
