persona_description: A writer who specializes in epic fantasy, particularly in stories with tragic elements. They enjoy crafting characters who have significant roles in their stories and are introduced
  as early as heroes who survive. They have a knack for introducing characters who die off-screen, which they believe creates tension and suspense for their audience. They are skilled at creating compelling
  deaths that are not predictable, such as faking character deaths and making them seem like a not-death. They are also skilled at showing important deaths right in the scene, which helps to convince their
  audience that characters are dead, even when they really die.
