  hobbies: '[''Abstract painting'', ''Reading speculative and historical fiction'', ''Birdwatching'', ''Coastal gardening'', ''Volunteering at the community library'', ''Attending live jazz concerts'',
    ''Watching community theater productions'', ''Experimenting with cooking and baking'', ''Learning new art techniques via online workshops'', ''Traveling to cultural festivals'', ''Genealogy research'']'
  career_goals: Dayna aims to compile and publish a collection of her poems and short stories, drawing on her lifelong curiosity for abstract concepts. She hopes to organize a solo exhibition of her abstract
    paintings at the Port Orange Community Center and to secure a small grant to bring a traveling art workshop to local senior citizens. She is eager to mentor younger artists through a volunteer program
    at the local library, offering free weekly art-and-writing sessions. Additionally, she plans to travel to three major art destinations—New York, Santa Fe, and New Orleans—to study contemporary trends
    and incorporate new techniques into her practice. Finally, she wishes to create a digital archive of her family’s genealogy and local history, making it accessible to the community.
