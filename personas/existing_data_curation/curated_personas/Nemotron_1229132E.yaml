personas:
  professional: Dayna Piet, a seasoned community art coordinator and volunteer curator at the Port Orange library, leverages their meticulous event-planning skills and competitive drive to orchestrate detailed
    art exhibitions while embracing spontaneous creative twists that keep senior participants engaged.
  sports: Dayna Piet follows the Orlando Magic with fervent loyalty, plays in a low-impact seniors' paddle-boarding club at the Port Orange waterfront, and participates in the local bird-watchers' morning
    walking group, using gentle cardio to stay fit for long gallery openings.
  arts: Dayna Piet draws artistic inspiration from abstract masters like Wassily Kandinsky, channels the improvisational spirit of Miles Davis jazz into her watercolor canvases, and regularly attends community
    theater productions of Tennessee Williams' "The Glass Menagerie" and live performances at the Suncoast Jazz Festival.
  travel: Dayna Piet prefers meticulously planned, culturally immersive trips, using senior discounts to explore the art scenes of New York City's MoMA, Santa Fe's Georgia O'Keeffe Museum, and New Orleans'
    French Quarter, balancing packed museum days with leisurely evenings at local jazz clubs.
  culinary: Dayna Piet delights in cooking seared sea bass with citrus-herb beurre blanc, saffron-infused risotto topped with roasted beets, and breakfast grapefruit salads sprinkled with mint, showcasing
    a confident yet experimental palate that often mirrors their vivid color palettes.
  core: Dayna Piet is a competitive yet reflective senior artist who blends disciplined event planning with spontaneous bursts of abstract color, occasionally losing hours to midnight painting sessions
    while meticulously tracking their blood pressure and garden sprouting schedule.
background:
  cultural: Dayna was born and raised in a middle‑class, white, American family in the Midwest, where she grew up with a blend of practical values and a strong appreciation for the arts fostered by her
    parents’ love of music and literature. After moving to Florida in her early thirties, she adopted many aspects of the coastal Gulf Coast culture—casual outdoor living, a fondness for seafood, and participation
    in neighborhood festivals. Her cultural identity reflects a synthesis of Midwestern work ethic, Southern hospitality, and a lifelong affinity for artistic expression. As a widowed senior, she remains
    active in the local church and senior centers, where community service and intergenerational connections are central to her sense of belonging.
attributes:
  skills: '[''Watercolor and mixed-media painting'', ''Creative writing (poetry and short prose)'', ''Digital photography'', ''Garden design and horticulture'', ''Community event planning'', ''Volunteer
