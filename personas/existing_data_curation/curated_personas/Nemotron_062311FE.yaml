personas:
  professional: Shondae Scheeren is an aspiring handyman and soon‑to‑be certified HVAC specialist who blends meticulous budgeting, hands‑on repair expertise, and a community‑first mindset to deliver reliable
    service to neighbors and farms in Whigham.
  sports: Shondae Scheeren enjoys seasonal outdoor pursuits—summer lake fishing on Lake Eufaula, autumn hunting with the local Whigham Sportsmen’s Club, and follows the Atlanta Braves, Atlanta Falcons,
    and NASCAR driver Chase Elliott, balancing moderate gym sessions with community volunteer clean‑ups.
  arts: Shondae Scheeren finds artistic fulfillment in listening to Chris Stapleton, Dolly Parton, and the Zac Brown Band while reading historical fiction by Ken Follett and watching classic Southern cinema
    starring Sam Elliott, often pairing these moments with local church gospel sing‑alongs.
  travel: Shondae Scheeren loves modest road trips that mix heritage and adventure, having explored Savannah’s historic district, New Orleans’ music scene, and the Great Smoky Mountains, while dreaming
    of a fishing expedition to Alaska’s Kenai River once a small business cushion is built.
  culinary: Shondae Scheeren excels at cooking Southern comfort dishes, mastering smoked brisket rubbed with hickory‑infused spice, fluffy buttermilk biscuits with cheddar, and collard greens simmered with
    smoked turkey, and they savor sweet tea made with fresh‑brewed black tea and a splash of lemon.
  core: Shondae Scheeren blends a practical, community‑oriented work ethic with a penchant for meticulous budgeting, a love of hands‑on Southern traditions, and a quiet worry that pushes them toward disciplined
    stress‑relief routines.
background:
  cultural: Shondae grew up in a white, Southern‑American family in Whigham, Georgia, where community and church have long been central to daily life. The local culture emphasizes hospitality, self‑reliance,
    and a strong sense of duty to neighbors, all of which have shaped his practical outlook and cooperative nature. He participated in county fairs, church youth groups, and community service projects throughout
    his youth, reinforcing values of modesty, responsibility, and respect for tradition. While deeply rooted in these Southern traditions, Shondae also embraces broader American cultural influences through
    media, travel, and online communities, allowing him to blend local customs with contemporary interests.
attributes:
  skills: '[''Automotive repair'', ''Carpentry'', ''Basic electrical troubleshooting'', ''Small‑engine maintenance'', ''Power‑tool operation'', ''Budgeting'', ''Event coordination'', ''Microsoft Office'',
    ''QuickBooks'', ''Project planning'', ''Customer service'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Southern cooking'', ''Church potlucks'', ''Reading historical fiction'', ''Local history research'', ''Journaling'', ''Strategy video games'', ''NASCAR
    watching'']'
  career_goals: Shondae aims to translate his practical skills into a stable, full‑time role that offers clear structure and predictable responsibilities. He plans to earn a certification in HVAC or residential
    electrical work within the next year so he can launch a small handyman business serving the Whigham area, providing reliable repair services to local residents and farms. In parallel, he hopes to complete
    his associate degree in Business Administration, which will give him the credentials to manage contracts and finances more formally. Ultimately, Shondae wants a career that combines his love of hands‑on
    work with his knack for organization, allowing him to achieve financial security while contributing to the well‑being of his tight‑knit community.
