persona_description: A bioethicist who is interested in the ethical implications of pre-natal screening programs, particularly those that aim to reduce the incidence of genetic disorders. They are particularly
  concerned about the social and economic implications of such programs, including the potential impact on families and the state, and the ethical considerations of terminating pregnancies based on pre-natal
  screening results. They are also interested in the broader implications of eugenics and genetic fascism, and the role of science and technology in shaping societal values and norms.
