personas:
  professional: Jorge Gutierrez, a 21‑year‑old visual communicator, blends meticulous project planning with a passion for street‑level storytelling, using Adobe Photoshop, Illustrator, Lightroom, Figma,
    and bilingual copy to craft culturally resonant branding that they consistently deliver ahead of tight agency deadlines.
  sports: Jorge Gutierrez stays active by playing in the Charles County Hoops Club’s weekly basketball games, supplements the routine with occasional soccer drills with a Washington DC United fan group
    in the spring, and follows the Washington Wizards, Capitals, and Nationals for professional inspiration, a routine they treat as both recreation and a study of team dynamics.
  arts: Jorge Gutierrez draws creative fuel from the vibrant murals of Diego Rivera, the eclectic beats of Bad Bunny and Tame Impala, and the graphic storytelling of Shaun Tan, weaving these influences
    into experimental mixed‑media pieces that echo both tradition and contemporary pop culture, a practice they refine through nightly studio sessions.
  travel: Jorge Gutierrez prefers meticulously planned city trips, having explored the historic streets of Old San Juan and the bustling markets of Mexico City, while dreaming of future photo‑journals from
    Oaxaca’s Day of the Dead celebrations to Barcelona’s modernist architecture, a style they balance with spontaneous street‑photo outings in familiar neighborhoods.
  culinary: Jorge Gutierrez, an enthusiastic home chef, alternates between mastering tamales with masa and pork shoulder and perfecting arroz con gandules with sofrito and adobo, while still hunting for
    the best ramen bowl in Washington DC’s Chinatown, a quest they pursue on weekend food tours.
  core: Jorge Gutierrez is a methodical, culturally‑savvy visual storyteller who channels competitive ambition into late‑night sketch marathons, often sacrificing sleep for the perfect line they pursue
    with relentless focus.
background:
  cultural: Jorge is a first‑generation American whose father immigrated from Jalisco, Mexico, and whose mother is from San Juan, Puerto Rico. He grew up in a bilingual household in Charles County, celebrating
    Día de los Muertos, quinceañeras, and Puerto Rican festivals, while also participating in local American traditions. His family maintains close ties to extended relatives in both countries, and the
    rhythm of Latin music, the flavors of tamales and arroz con gandules, and the storytelling traditions of both cultures shape his worldview and creative voice.
attributes:
  skills: '["Digital illustration (Adobe Photoshop, Illustrator)", "Photography (DSLR, Lightroom)", "Graphic design & layout (Adobe InDesign)", "Video editing (Adobe Premiere Pro)", "UI/UX prototyping (Figma)",
    "Bilingual communication (English/Spanish)", "Research & concept development", "Project planning & time management"]'
  hobbies: '["Sketching and mixed‑media art", "Street photography", "Visiting museums and galleries", "Listening to indie, electronic, and Latin music", "Attending salsa/bachata dance nights", "Playing
    basketball", "Reading graphic novels and sci‑fi", "Cooking traditional Mexican and Puerto Rican dishes", "Volunteering on community mural projects"]'
  career_goals: Jorge aims to enroll in an associate’s program in Visual Communications at a local community college and then transfer to the University of Maryland for a BFA in Graphic Design. His short‑term
    goal is to secure an internship at a multicultural advertising agency where he can apply his cultural insights and design expertise. He plans to build a freelance studio focused on branding for Latino
    small businesses in the Mid‑Atlantic, eventually moving into a senior creative director role that blends art, technology, and cultural storytelling.
