  career_goals: Krystal aims to obtain a professional certification in commercial cleaning to formalize her expertise and increase her earning potential. She plans to transition into a supervisory role
    for a local cleaning service, where she can mentor newer staff and implement efficient, environmentally conscious cleaning protocols. In the longer term, she hopes to launch her own modest cleaning
    business focused on serving families and small businesses in Bailey County, providing reliable, high‑quality service while building a secure financial foundation for her retirement.
