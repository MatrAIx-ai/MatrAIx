  hobbies: '[''Balcony gardening'', ''Reading classic and contemporary literature'', ''Knitting and crocheting'', ''Listening to traditional Cuban music'', ''Gentle neighborhood walks'', ''One‑on‑one volunteer
    visits at senior center'', ''Exploring new recipes and modest kitchen experiments'']'
  career_goals: Although retired, Ana aims to preserve and share her cultural heritage by compiling a family cookbook of traditional Cuban recipes, documenting her migration story and life experiences for
    future generations, and mentoring younger relatives in cooking and bilingual communication. She aspires to maintain her health and independence through gentle daily exercises, regular medical check‑ups,
    and a steady routine. She also wishes to continue her volunteer work at the local senior center, offering companionship and practical assistance to fellow elders, and to complete a brief memoir reflecting
    on the social and cultural changes she has witnessed in Miami’s Cuban community.
