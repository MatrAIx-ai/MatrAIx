  career_goals: Although currently not in the workforce, Kenneth aims to stay mentally active and contribute his expertise to his community. He hopes to engage in part‑time consulting for local non‑profits
    or historical societies, mentor younger professionals through workshops, and author a series of reflective essays on his engineering career and lifelong learning. He also aspires to complete a certification
    in historic preservation, lead a neighborhood art‑project initiative, and eventually curate a small traveling exhibition that blends his love for science, art, and local history.
