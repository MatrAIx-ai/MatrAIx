persona_description: A nutritionist or dietitian who is interested in the glycemic index (GI) and its application in diabetes management. This person is likely to have a background in nutrition and is familiar
  with the principles of glycemic load (GL) and the relationship between carbohydrate intake and blood sugar levels. They are also likely to be aware of the importance of glycemic index (GI) testing in
  identifying true differences in the glycemic potential of carbohydrates in different foods. This person may be interested in the results of the Tufts study, which found that the GI of white bread was
  70, and may be looking for further information on the health benefits of low GI diets and the potential for carbohydrate counting to be criticized.
