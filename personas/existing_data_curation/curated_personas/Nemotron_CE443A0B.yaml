  hobbies: '[''Cooking soul‑food'', ''Backyard herb gardening'', ''Quilting'', ''Crocheting'', ''Listening to gospel and R&B music'', ''Watching TV dramas and cooking shows'', ''Playing bridge'', ''Church
    choir participation'', ''Community outreach volunteering'']'
  career_goals: Aliyah’s ambitions revolve around achieving greater financial stability and recognition within the local transportation community while managing her emotional wellbeing. She aims to raise
    her annual earnings by increasing her rating on ride‑hailing platforms, thereby attracting higher‑fare trips and tips. Over the next two years she plans to acquire a commercial driver’s license and
    complete a defensive‑driving certification to qualify for premium contracts and possibly start her own small fleet of taxis. She also dreams of mentoring newer drivers, sharing her knowledge of route
    planning and disciplined work habits. By saving consistently, she hopes to purchase a second, more fuel‑efficient vehicle to expand her income streams. Additionally, she intends to attend a local support
    group for anxiety and engage in stress‑management workshops to reduce the intense emotional distress she often feels.
