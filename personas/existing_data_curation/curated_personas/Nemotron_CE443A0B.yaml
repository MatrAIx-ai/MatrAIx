personas:
  professional: Aliyah Allen, a veteran cab driver in Toledo, they combine decades‑long street‑level knowledge with a fiercely organized work ethic, meticulously logging fares, optimizing routes for fuel
    efficiency, handling vehicle maintenance themselves, and aiming to boost earnings through higher ride‑hailing ratings, a defensive‑driving certification, and eventually managing a small fleet of taxis.
  sports: Aliyah Allen, a dedicated fan of the Toledo Mud Hens baseball team, they attend weekend games when schedule permits, participate in a community bridge club that doubles as a mental exercise, and
    practice gentle stretching and low‑impact walking in their backyard garden to maintain mobility.
  arts: Aliyah Allen, an avid lover of music, they find solace in gospel choir harmonies and classic R&B legends like Aretha Franklin and Stevie Wonder, regularly sing in their church’s volunteer choir,
    and channel creativity into quilting and crocheting projects that feature intricate patterns inspired by the rhythms of their favorite music.
  travel: Aliyah Allen, a planner of road trips, they prefer well‑planned journeys that balance their need for structure with a love for discovery, often charting routes to nearby destinations such as Chicago’s
    blues scene, Nashville’s music venues, or the Ohio River Valley, while sticking to a budget that funds fuel and modest lodging.
  culinary: Aliyah Allen, a soulful cook, they perfect dishes like fried catfish with a crisp cornmeal crust, slow‑cooked collard greens seasoned with smoked ham hocks, buttery cornbread, and sweet potato
    pie spiced with nutmeg, while experimenting with fresh herbs from their backyard garden.
  core: Aliyah Allen, an orderly cab driver, they channel deep‑rooted competitiveness into a quest for higher earnings, yet persistent anxiety steers them toward meticulous planning and the comforting rituals
    of soulful cooking and choir singing.
background:
  cultural: Aliyah is a Black woman who grew up in the working‑class neighborhoods of Toledo, Ohio. Her upbringing was rooted in a close‑knit African‑American community where the church played a central
    role, instilling values of resilience, mutual support, and self‑reliance. She carries forward family traditions of soul‑food cooking, gospel music, and celebration of milestones like Juneteenth and
    family reunions. The experience of navigating a largely industrial city as a Black female driver has sharpened her competitive spirit and skeptical outlook toward institutions, while also reinforcing
    a pragmatic, structured approach to daily life. Her cultural identity informs her strong sense of community responsibility, evident in her church involvement and willingness to mentor younger members,
    and it shapes her worldview that emphasizes perseverance despite systemic challenges.
