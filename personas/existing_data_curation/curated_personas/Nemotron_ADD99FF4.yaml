personas:
  professional: Alexis Nelson, a high-volume retail stocker with a knack for inventory precision, leverages her curiosity for troubleshooting equipment and her practical, assertive communication to streamline
    warehouse operations while fostering a collaborative floor environment.
  sports: Alexis Nelson fuels her energetic lifestyle by leading Zumba classes at the community center, playing pickup soccer with the local Springfield Rovers on Saturdays, and passionately rooting for
    the Springfield Stars baseball team while tracking her steps with a fitness band.
  arts: Alexis Nelson unwinds after a busy day by flipping through the latest exhibits at the downtown art gallery, streaming Brandi Carlile's soulful folk tunes while simmering a new stew, and quoting
    lines from the musical Hamilton during her potluck gatherings.
  travel: Alexis Nelson balances her love of organized trips with spontaneous weekend getaways, carefully planning a family road trip to Shenandoah National Park while dreaming of an affordable two‑week
    culinary tour through Tuscany and the Amalfi Coast next summer.
  culinary: Alexis Nelson, a confident home‑cook, harvests tomatoes, basil, and zucchini from her garden to craft fresh garden‑pesto pasta, experiments with a weekly 'world cuisine' theme—last month whipping
    up Korean bibimbap with gochujang and kimchi—while hosting lively potluck nights featuring her signature ranch‑marinated chicken wings.
  core: Alexis Nelson blends relentless curiosity with practical efficiency, thrives on communal energy, but often battles worry‑induced overthinking that leads her to double‑check every inventory list
    and recipe alike.
background:
  cultural: Alexis identifies as White American, raised in the Midwestern United States, and has lived most of her life in small‑town Indiana. The local culture of Peru, IN emphasizes community involvement,
    modesty, and a strong work ethic, values that shape her daily interactions. She regularly attends church services at the town’s Protestant congregation and participates in town-sponsored events such
    as the annual summer fair and holiday parades. Her family background reflects a blend of European‑American heritage with traditions centered on family meals, seasonal celebrations, and a practical,
    down‑to‑earth outlook on life.
attributes:
  skills: '["Inventory management", "Order fulfillment", "Stock organization", "Barcode scanning systems", "Warehouse software (basic)", "Manual record-keeping", "Equipment troubleshooting (pallet jacks,
