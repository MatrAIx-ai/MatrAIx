  hobbies: '["Zumba classes", "Volunteer work at county fair", "Community center events", "Gardening", "Cooking and experimenting with recipes", "Hosting potluck dinners", "Reading self‑help books on stress
    management", "Journaling", "Outdoor hiking with friends", "Watching reality cooking shows", "DIY home improvement projects"]'
  career_goals: Alexis aims to advance from her current stocker role to a supervisory position within the warehouse or retail floor, such as a Shift Lead or Warehouse Supervisor, where she can apply her
    organizational strengths and assertive communication. She plans to enroll in a community college logistics or supply chain management program to earn certifications like a Certified Forklift Operator
    or a basic Supply Chain Management certificate. Her long‑term ambition is to become a Store Manager or Logistics Coordinator, allowing her to shape efficient processes while maintaining a stable work‑life
    balance that reduces stress for her family. She also hopes to mentor new employees, sharing her practical knowledge and fostering a supportive team environment.
