persona_description: A researcher and educational psychologist who studies the impact of gender on academic performance and the effectiveness of single-sex education systems. They are particularly interested
  in the development of girls' linguistic precocity and the advantages of early exposure to the secondary curriculum. They are critical of the current system that promotes the idea of gendered education
  and argues for the importance of intrinsic, personalized learning. They are not concerned with exam results and prefer to focus on the quality of education and the well-being of students.
