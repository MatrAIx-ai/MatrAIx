  career_goals: Ramanda aims to deepen her expertise in office management by completing an associate degree in Business Administration and obtaining a Certified Administrative Professional (CAP) credential
    within the next two years. She aspires to move into a senior office manager or operations manager role at a regional office, where she can lead larger teams and streamline workflows. Long‑term, she
    hopes to transition into a community outreach or program coordination position that blends her administrative strengths with her passion for helping others and fostering community harmony.
