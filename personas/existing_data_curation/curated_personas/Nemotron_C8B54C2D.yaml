personas:
  professional: Tommy Nevels, a three‑year‑old budding organizer, balances a vivid curiosity about how blocks fit together with a practical habit of sorting them by color, carefully planning each tower
    before building, and proudly showcasing the result to the playgroup, where they let their energetic sociability shine even as they challenge peers to see who can construct the tallest structure.
  sports: Tommy Nevels spends afternoons in the “Little Strikers” preschool soccer program, energetically dribbling a size‑2 ball while proudly wearing a tiny jersey of the hometown Cubs, also attending
    weekly toddler gymnastics at the community center where they eagerly chase applause after each flip, reflecting their competitive yet outgoing nature.
  arts: Tommy Nevels fills rainy days drawing bold crayon portraits of beloved characters like Mickey Mouse and Moana, humming along to the catchy “Baby Shark” tune, and enthusiastically joins weekly library
    storytime to act out scenes from Dr. Seuss books, letting their sociable curiosity guide creative play.
  travel: Tommy Nevels loves family road trips that blend adventure with comfort, clutching a beloved stuffed bunny while exploring the interactive dinosaur exhibits at the local museum, building sandcastles
    on the warm Gulf Coast beaches, and dreaming of future visits to Walt Disney World where they imagine meeting their favorite cartoon heroes.
  culinary: Tommy Nevels displays a distinct palate for cheesy macaroni, golden chicken nuggets, and sweet strawberry slices, proudly arranging each bite on a plate to form a colorful rainbow, eagerly mashing
    bananas with a plastic fork for breakfast, yet notoriously turning away from broccoli unless it’s hidden beneath melted cheese.
  core: Tommy Nevels, a three‑year‑old curiosity‑driven explorer, blends methodical play with boundless energy, turning daily routines into structured adventures while occasionally demanding extra stickers
    for compliance.
background:
  cultural: Tommy is an African‑American child raised in Owings Mills, a suburban community in Baltimore County, Maryland. His family participates actively in the local African‑American community, attending
    a nearby church that emphasizes music, storytelling, and communal gatherings. He experiences a blend of cultural influences through family traditions, community festivals, library story hours, and regular
    visits to neighborhood parks, all of which contribute to a rich, supportive environment that celebrates his heritage while fostering his social and exploratory growth.
