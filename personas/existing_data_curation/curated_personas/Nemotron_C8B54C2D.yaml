  career_goals: Even at three, Tommy is already expressing simple aspirations that mirror his energetic and competitive personality. He often says he wants to be a firefighter who helps people, a builder
    who makes tall structures, or a teacher who shares stories with friends. His parents nurture these ideas, encouraging him to explore roles where his curiosity, reliability, and sociability can make
    a positive impact.
