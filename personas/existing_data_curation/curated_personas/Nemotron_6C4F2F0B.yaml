  career_goals: Eldy aims to transition into a senior engineering management role where she can shape the strategic direction of sustainable infrastructure projects in the Greater Houston area. She is passionate
    about mentoring the next generation of engineers, especially women and Hispanic professionals, and hopes to establish a mentorship program within her firm. Long‑term, she envisions founding an independent
    consultancy that focuses on community‑focused, environmentally responsible design while also advocating for mental‑health resources for engineering teams, reflecting her personal experience with anxiety
    and emotional stress.
