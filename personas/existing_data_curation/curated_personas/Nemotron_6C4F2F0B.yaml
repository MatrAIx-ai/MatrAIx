personas:
  professional: Eldy Romero, a senior civil and mechanical engineer with a business degree, leverages their expertise in AutoCAD, Revit, and sustainable design to lead multimillion‑dollar infrastructure
    projects in Greater Houston, coupling collaborative yet assertive leadership with a practical curiosity that constantly explores cost‑effective emerging technologies while they mentor women and Hispanic
    engineers.
  sports: Eldy Romero, an avid supporter of the Houston Astros, Rockets, and Texans, participates in a local bayou kayak club and a weekly senior yoga class, preferring low‑impact cardio and occasional
    community 5K runs to maintain flexibility, yet admits they skip workouts when anxiety spikes.
  arts: Eldy Romero, who paints delicate watercolors of Texas Hill Country reminiscent of Andrew Wyeth and unwinds to the folk melodies of John Denver while they devour Agatha Christie mysteries, frequently
    attends the annual Fiesta de los Vaqueros to experience traditional dance and live mariachi performances.
  travel: Eldy Romero, who balances a love for structured itineraries with spontaneous detours, often escapes to the coastal dunes of Galveston, has already explored the historic plazas of San Miguel de
    Allende, and dreams of hiking the volcanic trails of Iceland's South Coast while they keep travel budgets modest.
  culinary: Eldy Romero, an adept home chef, expertly prepares mole poblano, chiles rellenos, and fresh salsa verde using roasted chilies, tomatillos, epazote, and corn masa, and enjoys experimenting with
    seasonal vegetables from their garden, though they sometimes over‑salt dishes when stressed.
  core: Eldy Romero, a diligent engineer-mentor with a penchant for meticulous budgeting, occasional impulsive kitchen gadget splurges, and relentless anxiety that fuels both their drive for sustainable
    design and bouts of sleepless over‑thinking, often leads them to double‑check every detail before moving forward.
background:
  cultural: Eldy was raised in a Mexican‑American household where family, faith, and community celebrations held a central place. Bilingual and deeply rooted in Mexican culinary and musical traditions,
    she maintains close ties with her extended family and participates regularly in church gatherings and Día de los Muertos commemorations. Living in Humble, Texas, she has blended her heritage with the
    multicultural fabric of the Houston metropolitan area, often sharing her culture through potlucks, folklore storytelling, and volunteering for local Hispanic outreach programs.
