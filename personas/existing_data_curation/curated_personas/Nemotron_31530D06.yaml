  hobbies: '["Photography", "Cycling", "Pickup basketball", "Live music concerts", "Visiting art galleries", "Cooking Southern BBQ", "Watching college football", "Reading sci‑fi and tech magazines", "Volunteering
    at community art festivals", "Hiking local trails"]'
  career_goals: Henry aims to move from front‑line courier work to a supervisory logistics role within the next three years, seeking certification in supply‑chain management and a bachelor’s degree in business
    administration. He hopes to become a regional operations manager for a courier company, or eventually launch his own eco‑friendly last‑mile delivery service that partners with local art galleries and
    small businesses. His competitive nature drives him to exceed performance metrics, and his curiosity pushes him to explore emerging delivery technologies such as electric vans and drone drops.
