personas:
  professional: Priscila Perez is a budding bilingual event coordinator who leverages her natural calm, strong interpersonal skills, and knack for juggling structure with flexibility to orchestrate beach
    festivals and community clean‑up events, using digital tools like Canva and Google Workspace to keep teams on track while translating schedules and signage between Spanish and English.
  sports: Priscila Perez enjoys competitive beach volleyball with the Virginia Beach Suns league, dances salsa and flamenco at the local Fusion Dance Club, and follows the Washington Nationals for baseball
    and the Virginia Beach Mariners for soccer, combining structured practice with spontaneous weekend beach runs along the boardwalk.
  arts: Priscila Perez curates indie playlists featuring Arctic Monkeys, Rosalía, and Billie Eilish, often filming sunrise scenes for her Instagram feed using a mirrorless camera, practices flamenco at
    the community cultural center, and spends free evenings attending performances by the Virginia Symphony Orchestra and local theatre productions.
  travel: Priscila Perez alternates between organized travel itineraries for her annual summer trips to Spain—visiting Barcelona’s La Sagrada Familia, Seville’s Feria, and family homesteads—and spontaneous
    weekend getaways to nearby Atlantic coast towns like Cape Cod, using travel apps to balance budget constraints with her desire for authentic cultural immersion.
  culinary: Priscila Perez excels at cooking paella with saffron and chorizo, prepares a silky tortilla española for brunch, and loves grilling fresh shrimp with garlic and lemon at beach picnics, while
    experimenting with new ingredients like chiles de árbol and occasionally over‑salting her gazpacho, which she proudly shares with friends on social media.
  core: Priscila Perez blends sunny beach energy with calm, organized planning, constantly juggling volunteer projects, bilingual event work, and a love for flamenco, all while battling occasional forgetfulness
    about bills and a penchant for over‑salting dishes.
background:
  cultural: Priscila’s family originates from Spain, and she grew up speaking both Spanish and English at home. Spanish cultural values—such as strong family ties, a love for communal meals, and festive
    celebrations like Semana Santa and local ferias—are woven into her daily life. Living in Virginia Beach, she blends these traditions with the coastal American lifestyle, participating in local beach
    festivals and multicultural events while maintaining regular visits to Spain during summer holidays. Her bicultural experience shapes her worldview, giving her a natural ability to bridge cultural gaps
    and an appreciation for both Spanish heritage and her American community.
