  career_goals: Priscila aims to complete her GED within the next year and then enroll in a community‑college program in hospitality and tourism management. She aspires to work as a bilingual event coordinator
    in the vibrant Virginia Beach tourism sector, eventually launching her own boutique travel‑experience agency that highlights Spanish culture for American and international visitors. Alongside her professional
    path, she hopes to develop leadership skills through volunteer projects and plans to study abroad in Spain to deepen her cultural knowledge.
