  hobbies: '["Fishing", "Hunting", "Home grilling and smoking", "Sausage making as a hobby", "Woodworking (knife handles, cutting boards)", "Reading culinary history", "Gardening (herbs and vegetables)",
    "Volunteering at local food bank", "Listening to classic rock music", "Attending Chicago Cubs games"]'
  career_goals: Timothy aims to secure a senior supervisory role within the next five years, ultimately transitioning to ownership of a family-run specialty butcher shop that emphasizes local sourcing and
    sustainable practices. He plans to obtain the Certified Master Butcher credential, expand his knowledge of niche cuts and heritage breeds, and mentor younger apprentices. At the same time, he is focused
    on building a solid financial foundation for his retirement, ensuring his family's long-term security while preserving the craft he loves.
