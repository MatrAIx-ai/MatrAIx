personas:
  professional: Timothy Richey is a veteran meat processor with over three decades of expertise in precise cutting, custom sausage making, and HACCP food safety, who currently manages inventory and training
    in a busy processing plant while eyeing a senior supervisory role and eventual ownership of a sustainable specialty butcher shop.
  sports: Timothy Richey follows the Chicago Cubs loyally, roots for the Chicago Bears in the fall, enjoys weekend fishing trips with the local angling club on Lake Michigan, and participates in a quarterly
    deer‑hunting outing organized by a regional outdoors association.
  arts: Timothy Richey’s evenings often feature classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd while they flip through culinary history books on Auguste Escoffier, and they occasionally
    attend live blues performances at Chicago’s historic Kingston Mines venue.
  travel: Timothy Richey prefers purposeful weekend getaways to the Upper Peninsula of Michigan for trout fishing and to rural Wisconsin for heritage pork sourcing, while dreaming of a culinary pilgrimage
    to Italy’s Parma region to study traditional charcuterie and to the Bordeaux wine country for a taste of terroir.
  culinary: Timothy Richey specializes in low‑and‑slow grilling and smoking, crafting small‑batch bratwurst with fennel and juniper, perfecting hickory‑smoked brisket ribs, and using fresh basil, rosemary,
    and thyme from their herb garden to finish herb‑crusted trout, though they sometimes over‑smoke dishes in pursuit of that perfect bark.
  core: Timothy Richey is a meticulous butcher‑artisan who harmonizes the rigor of HACCP standards with a love for classic rock, weekend hunting, and a steadfast commitment to building a sustainable specialty
    shop.
background:
  cultural: Timothy is a second-generation Midwestern American of German-Irish ancestry. Raised in the Chicago suburbs, he grew up in a household where Saturday meat grilling and Sunday roast dinners were
    central to family life. The region's pragmatic, hard-working ethic shaped his approach to both his trade and his personal life. He identifies with the broader white, middle-class culture of Cook County,
    attending a local Protestant church and participating in community events such as the annual suburb fair and neighborhood potlucks. These cultural roots reinforce his appreciation for quality food,
    self-reliance, and modest, close-knit family gatherings.
attributes:
  skills: '["Meat cutting and fabrication", "Custom sausage making", "Fish filleting", "Poultry processing", "Knife sharpening and maintenance", "HACCP and food safety compliance", "Inventory control and
