persona_description: A historian who is interested in the evolution of the house and its impact on the rise of capitalism and the Industrial Revolution. She is passionate about debunking myths about poverty,
  family, and the past, and is a skilled debunker of the assumptions we make about what makes a family. She is also a feminist who is interested in the changing roles of women in society and how they are
  reflected in the home.
