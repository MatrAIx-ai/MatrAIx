persona_description: A scientist who is interested in the discovery of new compounds and their formation processes. This person is particularly interested in the atmospheric chemistry of the gas giants
  Jupiter and Saturn, and how these planets' atmospheres differ from those of the rocky planets like Venus. They are curious about the possibility that Phospine, a known compound on Saturn, may have been
  formed abiotically on Venus, and they seek to understand why this is the case. This person is likely to have a background in atmospheric chemistry and astrochemistry, and they are interested in the implications
  of these discoveries for our understanding of the origins of life in the solar system.
