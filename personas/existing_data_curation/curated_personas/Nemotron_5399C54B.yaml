  career_goals: John aims to graduate high school with honors in math and science and then pursue a bachelor's degree in civil engineering or environmental technology, focusing on sustainable community
    infrastructure in the Greater Detroit area. He plans to gain hands‑on experience through the school’s robotics club, a summer internship with a local engineering firm, and leadership roles in student
    council. Long‑term, he hopes to combine his technical expertise with his desire to serve his community by designing safe public spaces, parks, and recreational facilities. Additionally, he aspires to
    mentor younger students in STEM clubs, fostering curiosity and practical skills.
