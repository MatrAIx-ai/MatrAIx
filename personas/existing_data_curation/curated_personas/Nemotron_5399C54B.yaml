personas:
  professional: John Richardson, a sophomore at Troy High School, channels their curiosity and practicality into coding simple Python games and editing videos for the school's YouTube channel, demonstrating
    emerging programming and digital storytelling skills while balancing organized project plans with the flexibility to improvise when a new LEGO Technic challenge inspires a fresh visual concept.
  sports: John Richardson plays pickup basketball at the community center, competes in a local youth soccer league under the Detroit United Soccer Club, follows the Detroit Pistons and the Detroit Lions
    for inspiration, and incorporates daily jogs into their routine to stay fit, blending competitive spirit with a love for teamwork.
  arts: John Richardson strums an acoustic guitar while covering songs by Ed Sheeran and John Mayer, enjoys the cinematic scores of Hans Zimmer, watches animated films by Studio Ghibli, and contributes
    video edits featuring clips of friends' LEGO builds for the school channel, weaving music, film, and DIY creativity into their leisure.
  travel: John Richardson dreams of a road trip to Mackinac Island to try the famous fudge, plans annual family visits to the nearby Great Lakes State Fair, has already explored Toronto on a school exchange,
    and hopes to experience an anime convention in Tokyo, balancing familiar Midwestern getaways with occasional international adventure for their travel palate.
  culinary: John Richardson favors classic grilled cheese sandwiches with sharp cheddar, devours homemade chicken wings seasoned with garlic and cayenne during game nights, helps their mother bake chocolate
    chip cookies, and experiments with building sushi rolls using cucumber, avocado, and smoked salmon after watching cooking tutorials, showcasing a budding curiosity for diverse flavors.
  core: John Richardson is a socially driven teen who blends curiosity with practicality, juggling coding, LEGO building, and community service while they occasionally overcommit to projects and forget
    to finish homework on time.
background:
  cultural: John comes from a middle‑class, white American family in Troy, Michigan. His parents, of German‑Irish ancestry, have instilled Midwestern values of hard work, politeness, and community involvement.
    He celebrates typical U.S. holidays such as Thanksgiving, the Fourth of July, and Christmas, often with family gatherings and neighborhood potlucks. Growing up in a diverse suburb near Detroit, he has
    been exposed to various cultural traditions and has an appreciation for the region’s rich African‑American and immigrant heritage. He attends a local Methodist church where youth‑group activities reinforce
    his cooperative and caring nature.
