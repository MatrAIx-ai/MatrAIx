  hobbies: '[''Museum visits'', ''Local theater attendance'', ''Reading (biographies, art criticism)'', ''Gardening (native plants)'', ''Knitting'', ''Cooking (Mediterranean cuisine)'', ''Book club participation'',
    ''Genealogy research'', ''Nature walks at Presque Isle'']'
  career_goals: Martha aims to become a senior volunteer coordinator for the Erie Public Library's arts outreach program, leveraging her experience to design inclusive workshops for older adults. She aspires
    to create a digital archive of Erie’s cultural history, preserving photographs, oral histories, and artworks contributed by community members. A personal ambition is to write and self‑publish a memoir
    that weaves together her lifelong love of art with reflections on her heritage and life experiences. Martha also hopes to travel to major European art museums—such as the Louvre, the Rijksmuseum, and
    the Uffizi—to deepen her firsthand understanding of art movements. Ultimately, she seeks recognition as a trusted resource for art education within her town and wishes to mentor younger volunteers who
    share her curiosity and standards of excellence.
