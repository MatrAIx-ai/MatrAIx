  career_goals: Although officially retired, Sara aims to continue contributing to her community by volunteering at the Jasper Historical Society, digitizing town archives, and mentoring younger staff at
    the senior center. She plans to complete a memoir documenting her family's story and the evolution of Walker County, and to further develop her digital skills so she can stay connected with distant
    relatives. Her ambitions are guided by a desire to preserve local heritage while staying intellectually active and socially engaged.
