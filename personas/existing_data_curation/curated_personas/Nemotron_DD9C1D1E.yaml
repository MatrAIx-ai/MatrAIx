personas:
  professional: Sara Shirley, a retired office administrator with four decades of records management and bookkeeping expertise, now channels her meticulous organizational skills into volunteer work at the
    Jasper Historical Society, digitizing archives while flexibly mentoring younger staff and balancing her love for genealogy with practical project deadlines.
  sports: Sara Shirley enjoys low‑impact activities such as walking her terrier along Walker County’s historic streets and joining the local senior walking club, cheers for the Atlanta Braves and the Georgia
    Southern Eagles football team, and occasionally attends community yoga classes at the senior center to stay limber.
  arts: Sara Shirley spends evenings singing gospel hymns like 'Amazing Grace' in her Baptist choir, devotes weekends to quilting patterns inspired by Martha Berry, reads poetry by Mary Oliver and historical
    fiction by Margaret Mitchell, and volunteers onstage in community theater productions of August Wilson’s 'Fences,' often quoting lines from James Earl Jones.
  travel: Sara Shirley prefers carefully planned road trips to historic sites, having visited Savannah’s riverfront, Charleston’s historic district, and the Gettysburg battlefield, she dreams of a pilgrimage
    to Washington, D.C.’s National Archives to see original documents, but her travel style remains leisurely, with frequent stops for bird‑watching at state parks and rest breaks for her dog.
  culinary: Sara Shirley delights in cooking classic Southern dishes such as fried chicken, collard greens simmered with ham hocks, buttermilk biscuits, and peach cobbler, often seasoning with garden‑grown
    rosemary and thyme, her cooking skill is solid enough to feed the church potluck, though she sometimes forgets to set the timer and ends up slightly over‑browning the cornbread.
  core: Sara Shirley is an eight‑decade‑old guardian of heritage who blends meticulous record‑keeping with a love for quilting, choir singing, and garden‑to‑table cooking, though she occasionally misplaces
    her glasses and overspends on heirloom fabrics.
background:
  cultural: Sara was born in 1942 in a modest town in Alabama and was raised in a white, Southern family with deep roots in Walker County. Her upbringing was steeped in Baptist faith, Southern hospitality,
    and a strong sense of community responsibility. She witnessed the post‑World War II economic boom, the civil‑rights movement, and the gradual modernization of the South, which cultivated a respect for
    tradition alongside an openness to new ideas. Her humanities education and long tenure as an office clerk in local government reflect a blend of practical service and cultural appreciation, shaping
    a balanced worldview that values both continuity and progress.
