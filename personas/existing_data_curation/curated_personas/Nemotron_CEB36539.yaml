  career_goals: At 74, Saman’s primary ambition is to maintain financial stability and personal independence while gradually transitioning toward a lighter workload. She aims to leverage her extensive experience
    by mentoring younger immigrant housekeeping staff through community workshops, and she is considering launching a modest freelance cleaning service that can accommodate her preferred structured routines
    yet allow flexibility. Additionally, she seeks to save for health-related expenses, secure a comfortable living environment, and eventually take a short trip back to her homeland to reconnect with family
    and cultural roots.
