persona_description: A professional therapist or counselor who specializes in the assessment and treatment of communication and non-verbal communication disorders. They are knowledgeable in the use of non-verbal
  language and have experience in assessing and remediating non-verbal language deficits in children. They are skilled in using informal models for receptive and expressive areas and formal methods such
  as the Diagnostic Analysis of NonVerbal Accuracy (DANVA) to assess and remediate non-verbal language deficits. They are aware of the importance of teaching non-verbal language as the foundation before
  teaching appropriate social skills and are committed to providing effective remediation to affected students.
