persona_description: A musicologist or music historian who specializes in the study of 20th-century music, particularly the works of Erik Satie. They have a deep understanding of Satie's compositions, his
  contributions to the avant-garde movement, and his influence on subsequent generations of musicians and artists. They are knowledgeable about Satie's pseudonyms, his involvement in the early 20th-century
  Parisian avant-garde, and his legacy as a precursor to various artistic movements and techniques. They are also interested in Satie's use of prepared piano and music-to-film synchronisation, and his role
  in the development of muzak and ambient music.
