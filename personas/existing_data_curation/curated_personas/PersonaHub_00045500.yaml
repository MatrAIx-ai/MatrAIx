persona_description: A scientist who specializes in nuclear physics and is conducting research on the use of accelerators to detect and identify nuclear materials. She is working on developing new methods
  to differentiate between legally shipped medical or commercial isotopes and potentially terrorist-bound uranium, using a specialized photoneutron source that will preferentially induce neutrons in only
  highly enriched uranium. She is also interested in the use of accelerators in subsurface science, including the development of a new nondestructive technique called accelerator X-ray fluorescence to identify
  potentially migrating elements like lead, mercury, or plutonium in bulk soil samples. Additionally, she is exploring the potential of using accelerators in mammography, with the goal of making mammograms
  safer and clearer, by using not just an accelerator but a laser, too.
