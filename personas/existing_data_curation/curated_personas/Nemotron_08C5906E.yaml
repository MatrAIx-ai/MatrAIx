  career_goals: David aims to re‑enter the workforce by building on his hands‑on skill set. Over the next 12–24 months he plans to enroll in a community‑college certificate program for HVAC or carpentry,
    obtain a state‑issued contractor’s license, and launch a small‑scale handyman business serving homeowners in Clark County. He also wants to become a regular volunteer coordinator for neighborhood improvement
    projects, using his organizational skills to build a local network. Long‑term, he envisions a stable income that supports his independent lifestyle, allows him to contribute to community development,
    and funds a modest retirement plan. Additionally, he seeks to improve his digital project‑management abilities and mentor younger workers in his field.
