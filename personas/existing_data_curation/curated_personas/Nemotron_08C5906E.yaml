personas:
  professional: David Rhoton is a pragmatic aspiring handyman entrepreneur who leverages their solid DIY trade skills—carpentry, basic electrical troubleshooting, and HVAC fundamentals—combined with a clear,
    direct communication style to lead community renovation projects, while their competitive streak drives them to secure contracts and a healthy skepticism ensures meticulous quality control.
  sports: David Rhoton stays active by playing forward for the Clark County adult soccer league, joining pick‑up basketball games at the Northwest Community Center, hiking the Columbia River Gorge during
    weekends, and cheering on the Seattle Seahawks and Seattle Sounders FC, while their competitive nature pushes them to log at least three cardio sessions per week to maintain performance.
  arts: David Rhoton unwinds after work by attending trivia nights at the neighborhood pub while humming along to classic rock legends like Neil Young and The Avett Brothers, streaming indie folk playlists,
    and occasionally strumming an acoustic guitar during house‑party jam sessions, which feeds their hands‑on creativity and complements their DIY mindset.
  travel: David Rhoton prefers modest, self‑planned road trips and weekend camping getaways, having explored nearby Pacific Northwest cities such as Seattle, Portland, and Vancouver, while dreaming of a
    longer adventure trekking the Patagonian Andes and hiking the Scottish Highlands, balancing their love for outdoor challenge with a cautious budget that prioritizes affordable campsites and DIY itinerary
    planning.
  culinary: David Rhoton loves pairing their home‑brewed IPA with spicy buffalo wings, enjoys cooking vegetable stir‑fry with fresh zucchini, bell peppers, and carrots from their garden, and can whip up
    a wood‑fire pizza topped with locally sourced mozzarella, basil, and smoked sausage, reflecting their hands‑on approach and occasional indulgence in grill‑friendly dishes.
  core: David Rhoton blends a competitive DIY spirit with a love for community, juggling hand‑crafted projects, weekend soccer, and home‑brewing, while occasionally over‑committing to volunteer events and
    neglecting personal downtime.
background:
  cultural: David grew up in a middle‑class, predominantly white suburb of the Pacific Northwest, where the local culture values self‑reliance, community participation, and a close connection to the natural
    environment. His family heritage includes ancestors from German and Irish roots, and he was raised with an emphasis on hard work, modesty, and practicality. The region’s love for outdoor activities
    such as hiking, fishing, and gardening has shaped his recreational interests, while the community‑oriented atmosphere of Clark County has fostered his sociable and competitive nature. Although he identifies
    with mainstream American cultural norms, David respects the diverse backgrounds of his neighbors and participates in inclusive local events.
