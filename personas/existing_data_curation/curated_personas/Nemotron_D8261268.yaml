  hobbies: '["Community gardening", "Card and board games with seniors", "Folk music and group singing", "Storytelling about farm life", "Volunteer workday participation", "Reading agricultural magazines",
    "Watching classic western movies"]'
  career_goals: At 96, Bernard’s primary ambition is to preserve and pass on the agricultural traditions of Salt Lake County. He aims to keep his small family plot productive for as long as his health allows,
    using the routine he loves while remaining flexible to weather and market shifts. He hopes to mentor younger farmers through informal workshops and to document his farming stories for the local historical
    society. Bernard also wishes to remain an active participant in the annual Utah Farm‑Fair, where he can showcase sustainable practices and foster community spirit. Ultimately, he seeks to leave a legacy
    of stewardship, cooperation, and practical knowledge for future generations.
