personas:
  professional: Katrina Thomas, an aspiring naturalist and budding LEGO engineer, channels their curiosity and methodical organization into detailed nature journals, meticulous animal sketches, and complex
    LEGO builds that mimic the ecosystems they explore.
  sports: Katrina Thomas enjoys weekend hikes with a local nature explorer club, participates in after‑school yoga for kids to stay calm, cheers on the nearby junior baseball team and the professional Seattle
    Mariners, and prefers solo bicycle rides along forest trails over crowded team sports, and they find these solitary rides especially refreshing.
  arts: Katrina Thomas delights in drawing realistic animal portraits inspired by the works of naturalist illustrator John James Audubon, listens to the whimsical tunes of Disney’s Moana soundtrack and
    the playful songs of The Wiggles while crafting pinecone art for family gatherings, and they often share their sketches with friends, and watches adventure movies like Pirates of the Caribbean for storytelling
    inspiration.
  travel: Katrina Thomas loves exploring the nearby state park’s pine‑filled trails, has visited the Grand Canyon on a family road trip, dreams of wandering the ancient ruins of Machu Picchu and the rainforests
    of Costa Rica, and plans future vacations around school breaks using a simple map‑making hobby that satisfies their organized nature while balancing a modest travel budget, and they keep a scrapbook
    of travel photos.
  culinary: Katrina Thomas enjoys helping parents measure ingredients for homemade pizza with tomato sauce, mozzarella, and fresh basil, loves preparing fruit smoothies with strawberries, banana, and a
    drizzle of honey, and they often experiment with pinecone‑shaped cookie cutters to create whimsical treats that reflect their creative yet methodical kitchen style.
  core: Katrina Thomas is a quietly curious eight‑year‑old who blends meticulous nature journaling with LEGO engineering, worries about every detail yet finds calm in the rhythmic measuring of ingredients
    and the quiet rustle of pinecones in the woods, and they often seek solitude to recharge.
background:
  cultural: Katrina was raised in Lonsdale, a small town in Rice County, Minnesota, where community ties and a close relationship with the natural environment are central to daily life. Her family participates
    in local traditions such as the harvest festival, community clean‑up days, and church gatherings that emphasize kindness and cooperation. The Midwestern upbringing, with its focus on practicality, self‑reliance,
    and modesty, aligns with her organized and thoughtful approach to life. As part of a white American family, she celebrates holidays like Thanksgiving with an emphasis on gratitude, sharing, and family
    togetherness.
attributes:
  skills: '["Reading comprehension", "Elementary mathematics", "Organizational skills", "Basic computer literacy", "Science observation and documentation", "LEGO building"]'
  hobbies: '["Reading adventure and mystery books", "Exploring nature trails", "Collecting pinecones and rocks", "Building LEGO sets", "Drawing animals", "Keeping a nature journal", "Cooking with family"]'
  career_goals: Katrina dreams of becoming a veterinarian one day, combining her love for animals with her careful, methodical nature. She also imagines herself as a science teacher, where she can share
    her curiosity and create structured, supportive learning environments for younger students.
