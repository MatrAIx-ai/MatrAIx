  career_goals: Anthony aims to leverage his practical skills and disciplined work ethic to launch a small‑scale home improvement and maintenance business serving Maroa and surrounding areas. He also plans
    to complete his college coursework in business administration to qualify for a supervisory role in a local logistics firm. Long‑term, he envisions becoming a trusted community leader who can mentor
    younger residents and contribute to local economic development.
