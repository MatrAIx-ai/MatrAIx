personas:
  professional: Anthony Carter, a 38‑year‑old practical planner and seasoned DIY enthusiast, leverages his advanced Excel modeling, project coordination, and meticulous carpentry skills to launch a home‑improvement
    business while completing a business administration degree, and they approach each client job with disciplined precision and a healthy dose of skeptical scrutiny.
  sports: Anthony Carter, a devoted fan of the Chicago Bears and the Chicago Cubs, spends his weekends fishing at Lake Decatur with the Maroa Anglers Club, joins a local bowling league at the community
    center, and they squeeze in a morning jog along the Rock River trail for cardiovascular health.
  arts: Anthony Carter, who appreciates the storytelling of John Prine and the raw lyricism of Johnny Cash, attends the annual Maroa Historical Society lecture series, collects vintage woodworking magazines,
    and they occasionally enjoy classic western films starring John Wayne on Saturday nights.
  travel: Anthony Carter, who meticulously plans road trips using spreadsheets, enjoys weekend getaways to Chicago’s museums and St. Louis’s Gateway Arch, dreams of tracing his Irish roots in County Kerry,
    and they balance a love for scenic drives with modest budget constraints.
  culinary: Anthony Carter, a competent home cook, often prepares hearty Midwestern meals such as braised pork shoulder with sauerkraut, fresh garden salads featuring heirloom tomatoes and radishes, and
    a Sunday apple‑cinnamon crumble, while they occasionally indulge in a well‑seasoned bratwurst grilled on their backyard smoker.
  core: Anthony Carter, a disciplined 38‑year‑old planner with a penchant for woodworking, thrift, and quiet competence, channels their Midwestern practicality into a budding home‑improvement venture while
    they quietly chase personal mastery.
background:
  cultural: Anthony was raised in a middle‑class, white, Midwestern family in central Illinois, with deep ties to the area's agricultural heritage. His family’s cultural background includes German and Irish
    ancestry, and he grew up attending a Protestant (Methodist) church that emphasized community service, hard work, and self‑reliance. The values of modesty, practicality, and personal responsibility typical
    of the small‑town Midwestern culture have shaped his worldview and daily habits.
