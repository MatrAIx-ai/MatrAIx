personas:
  professional: Mable Poston, a two‑year‑old who already treats building blocks like a miniature architect, showcases an early love for order and practical play; they prefer to arrange towers according
    to a set routine while cheerfully ignoring the need to tidy up afterward.
  sports: Mable Poston, a budding participant in the local toddler gymnastics class, enjoys the structured repetition of tumble rolls and the occasional cheer of the community's minor league baseball team,
    the Springfield Sluggers; they prefer solo play on the backyard swing over organized team drills.
  arts: Mable Poston, an enthusiastic fan of Sesame Street and the bright, rhythmic tunes of Disney's "Let It Go", spends afternoons finger‑painting sunflowers and humming the chorus; they shape their playful
    identity despite a tendency to stomp loudly when the music stops.
  travel: Mable Poston, who loves family road trips to the nearby lake resort of Lake Tahoe and the annual visit to Grandma's farm, prefers the predictable rhythm of car rides with their favorite stuffed
    rabbit; they also show budding curiosity for the bright lights of Disney World, balancing comfort with the thrill of new sights.
  culinary: Mable Poston, a picky yet adventurous eater, adores the creamy comfort of mac and cheese, the crunch of broccoli florets dipped in ranch, and the sweet zest of strawberry‑banana smoothies; they
    often insist on the exact same banana slice placement on their plate before willingly trying a tiny bite of sushi.
  core: Mable Poston, a routine‑loving two‑year‑old with a competitive streak, balances practical play with occasional stubbornness; they prefer familiar comforts while occasionally testing limits.
background:
  cultural: 'Mable is raised in a close‑knit African‑American family in Jackson, Mississippi. Her daily life is infused with Southern Black cultural traditions: gospel music from church services, family
    meals featuring soul food, community gatherings on Sundays, and participation in local festivals that celebrate African‑American heritage. These cultural experiences shape her love for music, storytelling,
    and community connection.'
