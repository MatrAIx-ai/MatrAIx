  career_goals: At two years old, Mable does not have formal career ambitions. Her emerging aspirations focus on gaining independence, expanding her language and social skills, and later exploring interests
    she observes in her family, such as caring for others, music, or art. She enjoys imagining future roles like joining her mother’s community work or performing on stage.
