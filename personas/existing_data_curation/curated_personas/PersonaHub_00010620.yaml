persona_description: A historian who specializes in the study of ancient civilizations, particularly the Ancient Egyptians, Greeks, and Chinese. His research interests include the development of the Universe's
  structure, the role of celestial bodies, and the philosophical views on nature and the cosmos. He is interested in the development of science, particularly in the Greek colonies on the western shores
  of Asia Minor, Italy, and Sicily, and the rapid development of philosophy as a doctrine of nature. He is also interested in the ideas of Heraclitus, Pythagoras, and other ancient Greek thinkers, and the
  theories of Eudoxus, Plato, and Aristotle.
