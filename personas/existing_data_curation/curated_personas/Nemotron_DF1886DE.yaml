  career_goals: While still very young, Amer exhibits a natural curiosity about the world that shapes his budding future ambitions. He often talks about wanting to help people, protect animals, and tell
    stories, reflecting an early desire to contribute to his community and the natural environment. His parents nurture these interests, encouraging him to explore roles such as a storyteller, a wildlife
    caretaker, or a community helper, with an underlying goal of growing into a respectful and responsible member of his tribe and the wider Tucson community.
