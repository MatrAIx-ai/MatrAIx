personas:
  professional: Amer Cunningham, a two-year-old budding architect who delights in building towers from wooden blocks, shows a strong preference for predictable structures and practical problem-solving,
    and they balance meticulous organization with the flexible imagination of play.
  sports: Amer Cunningham, a two-year-old energetic explorer, loves the local toddler soccer program at the community center, enthusiastically watches the Chicago Cubs on television with family, and they
    spend weekends climbing playground structures and kicking soft foam soccer balls.
  arts: Amer Cunningham, a two-year-old with a vivid imagination, delights in listening to Raffi’s 'Baby Beluga', watching 'Sesame Street', collecting Dr. Seuss picture books, and they frequently burst
    into spontaneous dance moves during sing-along sessions.
  travel: Amer Cunningham, a two-year-old adventure-ready tot, enjoys short car trips to the nearby zoo, dreams of a future visit to Walt Disney World, and they prefer family-planned vacations that balance
    scheduled nap times with playful exploration of interactive exhibits.
  culinary: Amer Cunningham, a two-year-old developing palate, prefers finger foods like mac and cheese, banana slices, and strawberry smoothies, uses a plastic fork with gusto, and they occasionally surprise
    everyone by requesting a tiny spoonful of their parent’s chicken-noodle soup.
  core: Amer Cunningham is a routine-loving yet playful toddler who habitually sorts toys by color, can be stubborn about snack choices, but bursts into joyous laughter when block towers tumble.
background:
  cultural: Amer is raised in a family of American Indian heritage, rooted in the traditions of the Tucson region’s Indigenous communities. He participates in cultural events such as seasonal pow‑wows,
    traditional storytelling circles, and craft workshops where he learns to weave simple baskets and draw symbols used by his ancestors. His household often incorporates the tribal language alongside English,
    fostering bilingual exposure. The values of respect for nature, community reciprocity, and the importance of oral history are integral parts of his upbringing, influencing his daily routines, play preferences,
    and emerging sense of identity.
