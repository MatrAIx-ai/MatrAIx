persona_description: A historian and architectural enthusiast who is deeply interested in the history and development of neighborhoods in Detroit, particularly the upper-class neighborhood of East Ferry
  Avenue. This individual is knowledgeable about the architecture of the late 1800s and early 1900s, and has a particular interest in the Jewish and black communities that settled in the area during that
  time. This persona is also interested in the history of the Merrill-Palmer Institute and the Detroit Institute of Arts, and may have a particular interest in the renovation of the historic buildings at
  The Inn On Ferry Street.
