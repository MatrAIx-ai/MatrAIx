  career_goals: Katelin aims to continue working reliably at the local store while gradually reducing her hours to maintain a balanced workload that protects her wellbeing. She hopes to mentor younger cashiers,
    sharing her practical knowledge and courteous service style. A modest ambition is to become a shift supervisor, allowing her to influence schedule planning and ensure a supportive work environment.
    Long‑term, she desires financial stability for her retirement, the ability to travel occasionally to visit her children and grandchildren, and to stay engaged in community activities without the pressure
    of a full‑time job.
