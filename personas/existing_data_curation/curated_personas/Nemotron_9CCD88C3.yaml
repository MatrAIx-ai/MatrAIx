personas:
  professional: Katelin Wood, a 77‑year‑old retail cashier at the town’s general store, leverages their meticulous cash‑handling precision, patient customer service, and practical problem‑solving to keep
    the checkout line moving smoothly, while their curiosity drives them to master the store’s inventory software and their occasional worry pushes them to double‑check every transaction before closing
    the drawer.
  sports: Katelin Wood stays active through the Riverdale Seniors Walking Club’s weekly strolls, watches the local high school basketball team, the Riverdale Hawks, and never misses a home game of the nearby
    minor‑league baseball club, the Lakeside Lynx, while they balance their fitness routine with gentle water aerobics at the community center during the summer months.
  arts: Katelin Wood weaves their love of history into creative pursuits by quilting patterns inspired by the works of Faith Ringgold, curling up with Bernard Cornwell’s historical novels, attending the
    town’s community theater production of “Our Town,” and listening to folk classics by Joan Baez and the soothing piano arrangements of Yiruma, all of which enrich their evenings after church book club.
  travel: Katelin Wood plans their journeys with a meticulous spreadsheet, favors short, well‑organized visits to their daughter in Asheville, North Carolina, and grandchildren in Orlando, Florida, while
    dreaming of a leisurely road‑trip along the Pacific Coast Highway to explore Redwood National Park, yet they limit travel to summer months to avoid winter health complications and to stay within their
    modest retirement budget.
  culinary: Katelin Wood transforms the fresh tomatoes, carrots, and basil from their garden into a rustic tomato‑basil gazpacho, hearty vegetable pot pies, and a Sunday chicken pot roast seasoned with
    rosemary and thyme, though they habitually add a pinch too much salt, prompting their grandchildren to gently remind them to taste before serving.
  core: Katelin Wood is a detail‑oriented, curiosity‑driven senior who finds comfort in quilting, gardening, and steady cash‑handling, yet their tendency to worry and occasional salt‑overdose in cooking
    add a relatable human quirk to their otherwise well‑balanced life.
background:
  cultural: Katelin grew up in a midwestern, white, small‑town environment where community ties and self‑reliance were emphasized. Her family background includes German and Irish ancestry, common in the
    region, and she was raised with traditional values of modesty, hard work, and respect for established customs. She has been an active participant in the local church and community organizations throughout
    her life, reflecting the close‑knit social fabric of Sparta, Illinois. These cultural influences shape her practical outlook, her commitment to service, and her appreciation for both preserving heritage
    and modestly exploring new ideas.
