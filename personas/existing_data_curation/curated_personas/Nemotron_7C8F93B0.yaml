  hobbies: '[''Gardening'', ''Cooking (traditional and experimental Chinese dishes)'', ''Tai chi'', ''Bridge (card game)'', ''Chinese calligraphy'', ''Reading historical fiction and memoirs'', ''Volunteer
    language tutoring at the library'']'
  career_goals: Although retired, Liqin remains driven by a desire to stay intellectually active and socially contributive. She aims to complete a series of online courses on food history and nutrition
    to deepen her culinary knowledge, with the long‑term ambition of publishing a family cookbook that blends traditional recipes with modern health insights. She also seeks to mentor younger volunteers
    at the senior center, offering guidance on organizing community events and preserving cultural traditions. A personal health goal is to maintain her mobility through regular tai chi practice, enabling
    her to continue gardening and participating in local cultural festivals. Finally, she hopes to travel to her ancestral hometown in China for a reunion with extended family and to document oral histories
    for future generations.
