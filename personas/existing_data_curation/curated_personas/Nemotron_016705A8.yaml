  career_goals: Although Juanita is a newborn, her family envisions a future in which she pursues education beyond high school, leveraging her practical mindset to secure a stable job that serves her Brooklyn
    community—perhaps as a community health worker or a youth mentor. She aims to achieve financial independence, contribute to her family's well‑being, and become a role model for other Black children
    in the neighborhood, using her competitive drive to excel academically and professionally.
