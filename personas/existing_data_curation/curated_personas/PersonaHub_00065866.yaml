persona_description: A teacher who creates and implements innovative, hands-on educational simulations for grades 6-12, focusing on subjects such as math, science, language arts, history, government & economics,
  global education, geography, and character education. These simulations are designed to engage students physically and mentally with "being there" experiences, and are particularly successful in engaging
  boys and girls. The simulations are available in six different subjects and are being rolled out in different grades to enhance the school's rigorous core curriculum.
