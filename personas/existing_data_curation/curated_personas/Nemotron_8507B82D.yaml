personas:
  professional: Rosetta Coleman, a diligent pharmacy technician at a local retail pharmacy, they leverage precise prescription verification, sterile compounding, and inventory management skills while flourishing
    in the solitary back‑room environment that satisfies their love for organized yet flexible workflows.
  sports: Rosetta Coleman, a quiet fitness enthusiast, they follow the Buffalo Bills and Buffalo Sabres with avid interest, participate in a local yoga studio’s early‑morning classes, and incorporate weekend
    runs along the Erie Canal Trail to stay active without the pressure of team sports.
  arts: Rosetta Coleman, an avid lover of spoken‑word poetry and jazz, they spend evenings immersed in the verses of Sarah Kay and the improvisations of Miles Davis while quietly playing piano renditions
    of Coltrane classics and exploring lo‑fi beats by Nujabes for creative focus.
  travel: Rosetta Coleman, a meticulous planner with a modest budget, they have explored New York City’s historic neighborhoods and Washington, D.C.’s museums, dream of wandering Savannah’s historic squares
    during Juneteenth celebrations, and hope to someday trek the coastal cliffs of Ireland for quiet reflection.
  culinary: Rosetta Coleman, a modest home chef, they enjoy preparing soulful collard greens, smoked paprika‑spiced sweet potatoes, and herb‑infused herbal tea using fresh basil and mint from their indoor
    garden, while occasionally indulging in occasional take‑out fried chicken to satisfy cravings.
  core: Rosetta Coleman, a 19‑year‑old pharmacy technician who thrives on solitude, meticulous organization, and lingering worries, they balance relentless curiosity with a cautious financial habit, a love
    for quiet jazz, and a persistent tendency to over‑schedule their own rest.
background:
  cultural: Rosetta identifies as African‑American, with family roots that trace back to the Southern United States, particularly Georgia and Alabama. Growing up in Chester, NY, she was raised in a close‑knit
    neighborhood where church gatherings, community picnics, and celebrations of Juneteenth and Black History Month were integral parts of family life. Her mother, a registered nurse, and her grandmother,
    an avid home cook, instilled a strong sense of communal responsibility and an appreciation for traditional soul foods, which she enjoys preparing for herself on quiet weekends. These cultural influences
    shape her awareness of health disparities affecting Black communities and fuel her desire to provide culturally competent pharmacy care. While she embraces mainstream American customs, Rosetta also
    honors African‑American artistic expressions such as spoken‑word poetry and jazz, often listening to them while studying or relaxing. Her cultural background contributes to a resilient outlook and a
    deep connection to her community's wellbeing.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Compounding non‑sterile preparations'', ''Compounding sterile preparations'', ''Pharmacy inventory management'', ''Pharmacy software
    operation (Pioneer Rx, QS/1)'', ''Basic pharmacology knowledge'', ''Data entry and record‑keeping'', ''Patient confidentiality adherence'', ''Problem solving'', ''Attention to detail'', ''Independent
    workflow management'']'
  hobbies: '[''Reading (science‑fiction and health‑related non‑fiction)'', ''Journaling'', ''Indoor gardening (succulents and herbs)'', ''Playing piano'', ''Puzzle solving (crosswords, Sudoku)'', ''Listening
    to lo‑fi music'', ''Watching documentaries (medical and social topics)'', ''Sketching'', ''Basic Python programming'', ''Volunteering at local health‑education events'']'
  career_goals: 'Rosetta aspires to build on her current role by obtaining the Certified Pharmacy Technician (CPhT) credential within the next year, followed by an associate’s degree in Pharmaceutical Sciences
    at a community college. She envisions eventually earning a Doctor of Pharmacy (Pharm.D.) so she can transition into a clinical pharmacy setting, with a particular interest in medication therapy management
    for chronic diseases prevalent in underserved Black communities. While ambitious, she remains realistic: she plans to gain experience in a hospital pharmacy to broaden her clinical exposure, then return
    to her hometown to open a community pharmacy that emphasizes patient education and culturally competent care. Balancing her curiosity about emerging therapies with the need for a stable, low‑stress
    work environment, she also aims to develop leadership skills that could lead to a future pharmacy manager position.'
