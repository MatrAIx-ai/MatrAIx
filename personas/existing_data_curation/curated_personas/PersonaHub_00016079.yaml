persona_description: A Persian poet and courtier who served under the Mughal emperor Akbar, known for his significant poetic works in Persian, particularly his Divan, which comprises qasidas, ghazals, ruba'is,
  and elegies. His works were admired by contemporaries and were considered by some to have composed over a hundred poetic works, but all the titles are not known to us. His exaltation of pantheism in some
  of his lyrics brought on him the enmity of the orthodox Muslim clergy. His works were highly regarded and his poetry was translated into English by Friedrich Max Müller.
