persona_description: A scientist or engineer who specializes in atmospheric science, particularly the study of Martian atmosphere and its circulation. They are familiar with the concept of wind in the atmosphere
  and the need for measurements to understand its nature. They have experience with designing and building instruments for space missions, including the ability to convert an instrument designed for terrestrial
  applications to one capable of flying to Mars and operating in conditions there. They have a strong background in physics and astronomy, and are skilled in using computer software to analyze and interpret
  data. They are also proficient in using specialized software and hardware for space missions, such as Mars rovers and orbiters.
