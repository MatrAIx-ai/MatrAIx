persona_description: A social worker who specializes in housing and homelessness, with a particular focus on the experiences and challenges faced by black people in the criminal justice system and homelessness.
  They have worked on prison reform efforts and have observed the disproportionate impact of these policies on the homeless black population in California. They have experience in community outreach, advocacy,
  and program development, and have worked with organizations such as the National Alliance to End Homelessness and Community Homeless Solutions. They have a deep understanding of the intersection of race,
  poverty, and housing, and are dedicated to finding solutions that address the systemic issues that contribute to homelessness among black people.
