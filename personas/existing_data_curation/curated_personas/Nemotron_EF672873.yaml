  career_goals: Cynthia dreams of a future where she can combine her love for helping others with her interest in learning. She often says she wants to become a teacher or a veterinarian, imagining a classroom
    or an animal clinic where she can create a caring, organized environment for children and pets alike. She also imagines working at a library, where she can share stories and maintain a quiet, predictable
    space that provides stability for her and others.
