personas:
  professional: Cynthia Smith, a budding young storyteller, channels their love for picture books and methodical LEGO builds into creating tidy, illustrated storyboards that feature friendly characters
    and clear plots, reflecting their preference for structure, gentle cooperativeness, and a tendency to worry about getting details just right.
  sports: Cynthia Smith enjoys participating in their neighborhood’s weekly Youth Soccer League, where they prefer the calm of small‑team drills, and they root for the city’s minor league baseball team,
    the River City Raptors, while watching games with their family in a quiet living‑room setting.
  arts: Cynthia Smith delights in drawing scenes inspired by Eric Carle’s vibrant collage illustrations, listening to children’s gospel lullabies by Cedric Rivers, and practicing simple piano melodies from
    Stevie Wonder’s \"Isn’t She Lovely\", which together shape their gentle, imaginative world.
  travel: Cynthia Smith prefers low‑key family trips, such as weekend outings to the nearby state park’s nature trail and the annual visit to their grandparents’ lakeside cabin, while dreaming of a future
    vacation to Disney World’s Magic Kingdom, though they feel anxious about crowded airports and long car rides.
  culinary: Cynthia Smith enjoys simple, comforting meals like creamy mac and cheese with a side of carrot sticks, loves helping their mom bake chocolate chip cookies using vanilla extract and brown sugar,
    and often requests their favorite snack of peanut butter and jelly sandwiches, reflecting their preference for familiar, predictable flavors.
  core: Cynthia Smith is a gentle, imagination‑driven 8‑year‑old who thrives on structured play, quiet creativity, and caring for others while quietly battling a worry‑prone heart and occasional disorganization.
background:
  cultural: Cynthia is raised in a close‑knit African‑American family in Dallas, Texas. Her parents instill pride in their cultural heritage through regular attendance at a local Black church, where she
    participates in Sunday school and community service projects. The family celebrates Juneteenth and Kwanzaa with storytelling, music, and traditional foods like collard greens and cornbread, fostering
    a sense of history and community. Growing up in the Oak Cliff neighborhood, Cynthia is exposed to a vibrant mix of art, poetry slams, and community festivals that celebrate Black culture in the city.
    These experiences shape her values of kindness, cooperation, and the importance of creating supportive, harmonious environments, and her family’s emphasis on mutual care provides reassurance when she
    feels stressed.
