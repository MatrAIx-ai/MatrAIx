  hobbies: '[''Drawing/sketching'', ''Watercolor painting'', ''LEGO building'', ''Scratch programming'', ''Reading sci‑fi/fantasy'', ''Visiting art museum'', ''Science center trips'', ''Chess club'', ''Nature
    walks and rock collecting'', ''Writing short stories'']'
  career_goals: David aims to become an architect, combining his love for drawing, design, and organized planning, while also dreaming of creating interactive digital experiences as a future software developer.
    He is determined to earn top grades in school, win his middle‑school science fair with a project on renewable energy, and eventually attend a specialized STEM academy. He also hopes to contribute to
    his community by designing public art installations or local park improvements. Ultimately, David wants to be known for turning creative ideas into practical solutions that improve everyday life.
