personas:
  professional: David Davis, a ten‑year‑old budding technologist, blends a love for cityscape sketching with a knack for Scratch programming, constructing elaborate LEGO models that double as prototypes
    for imagined urban environments, and applies meticulous organization to every project, often setting personal deadlines and pushing for polished, bug‑free ideas.
  sports: David Davis enjoys playing on the Oakwood Youth Soccer team during the fall, cheering for the hometown club the Oakwood Eagles, and participates in weekend nature hikes with the local scouting
    group, often collecting rocks while wearing a well‑worn pair of trail shoes, though they rarely join the school’s basketball practice due to a preference for smaller, quieter activities.
  arts: David Davis spends afternoons at the community art museum’s children’s gallery, drawing inspiration from the vibrant street murals of local artist Maya Rivera and the fantastical worlds of Hayao
    Miyazaki’s films, while their LEGO constructions echo the angular aesthetics of architect Zaha Hadid, and they proudly display a sketch of a dragon perched atop a futuristic skyline.
  travel: David Davis dreams of visiting the interactive exhibits at the Smithsonian National Air and Space Museum in Washington, D.C., and the towering LEGO House in Billund, Denmark, but currently favors
    day trips to the nearby state science center and weekend hikes in the nearby national park, carefully planning routes on a hand‑drawn map while keeping a notebook for souvenir stamps.
  culinary: David Davis prefers simple, hands‑on meals like cheese pizza with a sprinkle of basil, homemade macaroni and cheese, and occasional sushi rolls from the local Japanese restaurant, enjoys experimenting
    with colorful fruit smoothies that blend strawberries, mango, and a splash of orange juice, yet often forgets to finish vegetables on their plate, leading to occasional parental reminders.
  core: David Davis is a ten‑year‑old artistic tech enthusiast who meticulously plans every hobby, from LEGO cityscapes to Scratch games, while juggling a disciplined allowance routine, managing mild allergies,
    and nurturing a quiet, curiosity‑driven worldview.
background:
  cultural: David was born and raised in Brunswick, Ohio, a suburb in Medina County that blends a quiet residential atmosphere with a strong sense of community typical of the Midwest. His family traces
    its ancestry to German and Irish immigrants who settled in the region in the 19th century, and they preserve traditions such as celebrating Thanksgiving with a communal potluck, attending the annual
    Medina County Fair, and volunteering at the local library. The local school district emphasizes both academic achievement and extracurricular arts and STEM programs, which have nurtured David’s curiosity
    for new ideas and disciplined work ethic. The surrounding countryside, with its farms and nearby Lake Erie shoreline, provides opportunities for outdoor exploration, while the nearby Cleveland cultural
    institutions expose him to a variety of artistic experiences. These cultural influences together shape his appreciation for organized creativity, modest self‑confidence, and a collaborative spirit within
    small groups.
