  career_goals: Even at 95, Lachelle focuses on staying mentally sharp and physically healthy, preserving and passing down her family recipes and cultural stories to grandchildren and community youth, remaining
    an active volunteer at her church by helping with meals and outreach, mentoring younger relatives in cooking, gardening, and crafts, and safeguarding the African‑American Creole heritage of New Orleans
    for future generations.
