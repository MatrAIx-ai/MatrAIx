  career_goals: Demetrice aims to become a certified grounds manager within the next three years, pursuing the Professional Landscape Network's GM certification. He plans to enroll in an associate program
    in horticulture to deepen his technical knowledge. Ultimately, he aspires to launch his own eco-friendly landscaping business focused on native planting, rain-garden design, and community greening projects
    in Montgomery County. He also hopes to mentor entry-level workers, promoting a culture of safety, organization, and collaborative problem-solving. Achieving financial stability to purchase a home with
    a personal garden space is another long-term goal.
