  hobbies: '[''Sketching in nature'', ''Watercolor painting'', ''Creative writing (short stories, poetry)'', ''Visiting art galleries and museums'', ''Listening to experimental/indie music'', ''Playing
    indie video games'', ''Urban landscape photography'', ''Journaling on abstract and philosophical topics'', ''Volunteering as a youth art mentor'']'
  career_goals: Caroline aspires to pursue a bachelor’s degree in visual arts or graphic design, with the long‑term aim of becoming a freelance creative consultant who blends art with community outreach.
    She envisions working with nonprofit organizations to develop engaging visual campaigns that highlight social issues, while also maintaining a personal studio practice that explores abstract and experimental
    concepts. Eventually, she hopes to curate pop‑up exhibitions that showcase emerging artists and foster collaborative spaces in the Midwest.
