personas:
  professional: Caroline Gelrud, a budding visual artist and graphic designer, blends watercolor experimentation with digital illustration to craft socially conscious visual campaigns for nonprofits, leveraging
    their meticulous project‑management skills and boundless imagination.
  sports: Caroline Gelrud roots for the Kansas City Chiefs and the Kansas City Royals, joins a weekend jogging club at Loose Park, and balances their routine with relaxed yoga sessions at the community
    center, preferring low‑impact activity that fuels their imagination without draining their energy.
  arts: Caroline Gelrud draws inspiration from experimental musicians like Animal Collective and visual provocateurs such as Yayoi Kusama, regularly visits exhibitions featuring Olafur Eliasson, and they
    spend evenings sketching in local galleries while curating a digital mood board of avant‑garde film soundtracks.
  travel: Caroline Gelrud favors spontaneous road trips to Midwest art hubs—having explored the galleries of Chicago and the street murals of Detroit—and dream‑plans a spring escape to Reykjavik to photograph
    volcanic landscapes, all while budgeting travel expenses through a shared spreadsheet with their mentor cohort.
  culinary: Caroline Gelrud, an enthusiastic but occasionally impatient home cook, favors quick, colorful meals like quinoa‑seed bowls with roasted beets, feta, and pomegranate, and they enjoy experimenting
    with matcha‑infused pastries, though they often forget to preheat the oven.
  core: Caroline Gelrud channels a restless curiosity into watercolor and indie music, balances careful budgeting with occasional splurges on art supplies, and habitually forgets to water their houseplants
    while planning pop‑up exhibitions in their mind.
background:
  cultural: Caroline grew up in a suburban, middle‑class white family in Olathe, Kansas, where Midwestern values such as community involvement, modesty, and a strong work ethic are prominent. Her household
    emphasized curiosity, reading, and artistic expression, allowing her to explore a wide range of cultural influences from local art scenes and the diverse communities of the Kansas City metropolitan
    area. While rooted in the traditions of the American Midwest, she embraces a broader, globally‑inspired aesthetic through exposure to contemporary art, literature, and music, blending regional sensibility
    with a keen interest in novelty and abstract ideas.
