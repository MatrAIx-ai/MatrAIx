persona_description: A researcher at Fraunhofer IFAM, specialized in developing new materials and techniques for biomedical applications. Imgrund is known for his expertise in biocompatible and biodegradable
  materials, particularly those used in surgery, and his innovative approach to the development of new screw designs. He is highly skilled in the use of special injection molding processes and has a deep
  understanding of the properties of biomaterials. His work is focused on improving the quality and functionality of screws used in surgeries, with a particular emphasis on reducing the risk of complications
  and improving the patient's recovery.
