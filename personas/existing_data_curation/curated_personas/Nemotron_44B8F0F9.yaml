personas:
  professional: Genevieve Singh, a bilingual social worker specializing in case management and community outreach, they leverage their methodical, data-driven approach and trauma-informed care skills to
    design culturally responsive programs for low-income families while mentoring junior staff with practical, solution-focused guidance.
  sports: Genevieve Singh stays active by hiking the Santiago Canyon trails, participating in the local Orange County Trail Runners Club, they cheer for the Los Angeles Dodgers in baseball season, and attend
    Anaheim Ducks games as a seasonal fan.
  arts: Genevieve Singh channels their creative side through photography of neighborhood festivals, embroidery that weaves traditional motifs with modern patterns, they hold a deep appreciation for artists
    like Frida Kahlo, Diego Rivera, and contemporary folk singer Lila Downs, which informs their visual storytelling.
  travel: Genevieve Singh prefers deliberate, budget-conscious trips that blend cultural immersion and nature, they have explored Oaxaca’s culinary markets, trekked the volcanic landscapes of Costa Rica,
    and taken weekend road trips to Santa Barbara and the desert hikes of Sedona, while saving for a future multi-week volunteer expedition in Guatemala.
  culinary: Genevieve Singh enjoys mastering Mexican-inspired dishes with a modern twist—such as quinoa-filled mole poblano, smoked chipotle-infused carnitas, and avocado-lime panna cotta—they experiment
    confidently in their kitchen, leveraging fresh chilies, epazote, and heirloom corn, and occasionally over-season a dish in pursuit of bold flavors.
  core: Genevieve Singh balances disciplined organization with spontaneous culinary experiments, they habitually schedule every task yet cannot resist an extra slice of churro-topped cake, and they blend
    a calm, solution-oriented mindset with a fierce advocacy for their community.
background:
  cultural: Genevieve grew up in a Mexican-American household in Santa Ana, where Spanish was spoken at home and family gatherings centered around communal meals, religious traditions, and celebrations
    like Día de los Muertos and quinceañeras. Her identity is shaped by "familismo" and a strong sense of community responsibility, which she brings to her social-work practice. She is fluent in both Spanish
    and English, enabling her to bridge gaps between service providers and the immigrant community. The vibrant Mexican culture of Orange County—its music, cuisine, and local festivals—continues to influence
    her values, work ethic, and personal interests.
attributes:
  skills: '[''Case management'', ''Crisis intervention'', ''Community outreach'', ''Resource navigation'', ''Bilingual communication (Spanish/English)'', ''Client assessment'', ''Trauma-informed care'',
    ''Program development'', ''Grant writing'', ''Data collection and reporting'', ''Conflict resolution'', ''Mentoring and staff supervision'']'
  hobbies: '[''Mexican cooking'', ''Community gardening'', ''Hiking'', ''Reading non-fiction on social justice'', ''Yoga and mindfulness'', ''Photography'', ''Volunteer work at cultural festivals'', ''Embroidery
    and traditional crafts'']'
  career_goals: Genevieve aims to earn her GED and then pursue an associate degree in social work, eventually obtaining her LCSW license. She aspires to become a program director for a nonprofit that serves
    low-income Mexican-American families in Orange County, creating evidence-based interventions that incorporate technology while respecting cultural traditions. She also hopes to influence local policy
    on immigrant services and secure sustainable funding for community centers.
