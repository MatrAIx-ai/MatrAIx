persona_description: A literary critic and scholar who specializes in the analysis and interpretation of ancient Roman literature, particularly focusing on the epic poem "The Aeneid" by Virgil. They have
  a deep understanding of the historical and cultural context in which the poem was written, as well as its literary and artistic significance. They are also knowledgeable about the translations and adaptations
  of the poem in various languages, and have a keen interest in the ways in which these versions reflect and interpret the original text. They are likely to have a particular interest in the ways in which
  Virgil uses mythological and historical figures in the poem to glorify Rome and its founding hero, Aeneas.
