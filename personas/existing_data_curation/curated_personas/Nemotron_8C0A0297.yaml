personas:
  professional: Juan Alvareztorres, an 8‑year‑old budding engineer who constructs intricate LEGO creations, blends curiosity with practicality by drafting detailed building plans yet leaves space for spontaneous
    tweaks, showcases organized yet flexible problem‑solving, and balances cooperative teamwork with occasional assertive choices when guiding friends during group builds.
  sports: Juan Alvareztorres, an 8‑year‑old soccer enthusiast who plays for the neighborhood youth club the Eastside Strikers, balances competitive drive with teamwork, passionately follows the professional
    MLS team Austin FC, and channels resilience from occasional bruises into disciplined practice sessions.
  arts: Juan Alvareztorres, an 8‑year‑old comic‑book creator who sketches dynamic superhero characters, draws inspiration from the colorful storytelling of Stan Lee, the bold line work of Jack Kirby, and
    the imaginative worlds of Hayao Miyazaki, and often reenacts favorite scenes from Disney‑Pixar animations during quiet afternoons.
  travel: Juan Alvareztorres, an 8‑year‑old adventure‑curious traveler who loves family road trips to nearby wonders like the Grand Canyon and Yosemite National Park, enjoys planning itineraries with illustrated
    maps yet leaves room for spontaneous rock‑collecting hikes, and dreams of exploring the bustling streets of Tokyo and the historic museums of Paris for new inspirations.
  culinary: Juan Alvareztorres, an 8‑year‑old kitchen helper who proudly assembles tacos with corn tortillas, seasoned protein, cheese, lettuce, and salsa, expertly mashes ripe avocados into guacamole flavored
    with lime juice, cilantro, and a pinch of salt, and delights in sprinkling fresh cilantro over every dish they help create.
  core: Juan Alvareztorres, an endlessly curious 8‑year‑old whose LEGO skyscrapers rival city skylines, who frequently forgets to finish homework while perfecting comic‑book panels, and who habitually leaves
    a trail of tiny rock collections on the living‑room floor, they embody a balance of imaginative drive and delightful disorder.
background:
  cultural: Juan was born and raised in San Antonio’s vibrant Mexican‑American community. At home, Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos, enjoying
    tamales, and participating in community festivals are a regular part of his life. He attends a public elementary school where he engages with a diverse peer group, while also taking part in cultural
    programs like folklorico dance and Spanish language enrichment. This blend of Mexican heritage and Texan upbringing shapes his values, cuisine preferences, and his appreciation for both community gatherings
    and personal creativity.
