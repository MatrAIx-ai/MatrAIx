  career_goals: Juan dreams of becoming a scientist‑engineer who designs robots that help people in his community. He is fascinated by space exploration and hopes to study astronomy one day, while also
    envisioning a future where he can teach younger children about science in a fun, hands‑on way. His goal is to combine his curiosity for new ideas with practical skills to create tools that improve everyday
    life.
