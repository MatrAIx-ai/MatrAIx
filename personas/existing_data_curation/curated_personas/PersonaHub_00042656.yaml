persona_description: A PhD student from Durham University who specializes in the study of ancient human remains and their implications for the development of cancer. She is passionate about uncovering the
  secrets of the past and using this knowledge to improve our understanding of the present and future of cancer. Her research is focused on the discovery and analysis of ancient skeletons with signs of
  cancer, such as the one she found at the Amara West site in Northern Sudan. She is optimistic about the potential of this discovery to help us understand the evolution of cancer and develop more effective
  treatments.
