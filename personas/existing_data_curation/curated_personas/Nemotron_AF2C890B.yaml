  career_goals: Sophie aims to advance to a senior operations director role within the next five years, overseeing broader organizational strategy while maintaining a people‑focused culture. She plans to
    pursue a professional certification in nonprofit management or project management to broaden her impact, and she hopes to integrate more art and wellness initiatives into the workplace, such as curating
    rotating art displays and launching an employee well‑being program. Long‑term, she envisions leading a community‑oriented organization that blends administrative expertise with social impact.
