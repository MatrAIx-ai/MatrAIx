persona_description: A geoscientist who is interested in understanding the deep structures beneath the Indian Ocean and the geoid anomaly, particularly in relation to the Tethys Ocean and the subduction
  of the Tethyan plate beneath the Indian plate. This person is likely to be conducting research in solid Earth science, with a focus on understanding the dynamics of the Earth's mantle and the geoid anomaly.
  They are interested in using seismological data to model ocean wave dynamics and to explain the differences in the geoid anomaly between other parts of the world. This person is likely to be using teleseismic
  earthquake data from the Indian Ocean OBS array and is seeking access to the data through the portal of India's National Centre for Seismology.
