personas:
  professional: A veteran K‑8 STEAM teacher named Lam Feng leverages graduate-level STEM training and a calm, resilient demeanor to craft interdisciplinary lessons that fuse data‑driven assessment, grant
    writing, and bilingual communication, while their competitive streak drives continuous curriculum innovation.
  sports: An avid outdoor enthusiast named Lam Feng spends weekends trekking the Angeles National Forest with a local Sierra Club hiking group, follows the Los Angeles Lakers and Dodgers religiously, and
    channels competitive energy into weekly pick‑up basketball games at the community center, while maintaining a flexible schedule that favors spontaneous trail runs over regimented gym sessions.
  arts: An interdisciplinary creator named Lam Feng blends digital illustration inspired by the works of Chen Rong and Jessica Walsh, practices Chinese calligraphy like a meditative piano recital of Ludovico
    Einaudi, and curates pop‑up exhibitions at local cultural festivals featuring music by Ryuichi Sakamoto and visual art from contemporary Asian‑American collectives.
  travel: A curious explorer named Lam Feng prefers spontaneous road trips over rigid itineraries, having recently visited the misty cedar forests of Japan’s Kii Peninsula and the vibrant street‑food scene
    of Taipei, while still dreaming of a summer hike in New Zealand’s Fiordland and a cultural immersion in Oaxaca’s Day of the Dead celebrations.
  culinary: An experimental home chef named Lam Feng loves fusing umami‑rich miso with Mexican street flavors, perfecting dishes like kimchi‑taco lettuce wraps, miso‑caramelized brisket ramen, and ginger‑sesame
    bao sliders, while their moderate skill level sees them alternating between precise sous‑vide techniques and spontaneous skillet improvisations, often paired with a splash of Szechuan‑pepper‑infused
    cocktail.
  core: A perpetually curious, calm, and slightly disorganized 39‑year‑old named Lam Feng thrives on blending science and art, channeling competitive drive into innovative STEAM projects while occasionally
    losing track of appointments amidst a whirlwind of hobbies.
background:
  cultural: Lam Feng is a second‑generation Chinese American whose parents immigrated from Taiwan in the early 1980s. Growing up bilingual, he celebrates Lunar New Year, the Mid‑Autumn Festival, and traditional
    customs such as ancestor veneration and calligraphy practice. Living in Sierra Madre, he has also embraced the multicultural fabric of Los Angeles County, engaging with nearby Hispanic and other Asian
    communities. This bicultural upbringing informs his teaching philosophy, encouraging students to see science and art as universal languages that bridge cultural divides while honoring his own heritage
    through food, art, and community participation.
attributes:
  skills: '[''STEM curriculum development'', ''K‑8 science and mathematics instruction'', ''STEAM interdisciplinary lesson design'', ''Educational technology integration (Scratch, robotics, 3D printing)'',
