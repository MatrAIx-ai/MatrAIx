    for STEM/STEAM programs'', ''Mentorship and peer coaching for teachers'']'
  hobbies: '[''Landscape hiking and photography'', ''Digital illustration with STEAM themes'', ''Piano playing (classical and improvisation)'', ''Chinese calligraphy'', ''Arduino and maker electronics projects'',
    ''Board game design and strategy gaming'', ''Reading science‑fiction and popular science'', ''Cooking experimental Asian‑fusion meals'', ''Volunteering at community cultural festivals'']'
  career_goals: Lam aims to become the district’s STEAM coordinator, championing integrated curricula that honor both scientific rigor and artistic creativity. He plans to secure funding to establish a
    dedicated maker‑space in his school, publish research on the impact of art‑infused STEM learning, and develop a professional‑development series that mentors new teachers in innovative pedagogy. Long‑term,
    he envisions transitioning into educational consulting, helping schools nationwide embed technology‑rich, curiosity‑driven approaches into elementary education while maintaining his calm, resilient
    teaching style.
