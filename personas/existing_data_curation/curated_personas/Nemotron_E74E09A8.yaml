personas:
  professional: Tian Hsu, an aspiring LEGO architect and junior problem‑solver, channels their methodical planning and love for step‑by‑step challenges into designing intricate builds for school exhibitions
    while confidently leading the LEGO club with a cooperative spirit.
  sports: Tian Hsu plays for the Fresh Meadows Soccer Club and the Queens Junior Basketball League, cheering on the New York Knicks and New York City FC while adhering to a structured practice schedule
    that balances energetic gameplay with a careful focus on teamwork and personal health.
  arts: Tian Hsu immerses themselves in the Magic Tree House series and practices Chinese calligraphy, drawing inspiration from Studio Ghibli films and listening to BTS, which fuels their creative doodles
    and occasional attempts at sketching manga characters during free periods.
  travel: Tian Hsu loves family trips to Chinatown for Lunar New Year feasts and weekend adventures to Central Park, the American Museum of Natural History, and a yearly visit to a seaside resort in New
    Jersey, preferring itineraries that blend cultural exploration with familiar comforts.
  culinary: Tian Hsu enjoys helping prepare jiaozi and tangyuan during holiday gatherings, has mastered rolling dumpling wrappers, and balances this with a love for pizza and chicken nuggets, often insisting
    on the perfect balance of sweet and savory in every bite.
  core: Tian Hsu is a detail‑driven, sociable eight‑year‑old who turns every LEGO set and family recipe into a structured adventure, though their habit of over‑worrying sometimes slows their play.
background:
  cultural: Tian Jun comes from an East Asian family that maintains many cultural traditions while living in Fresh Meadows, Queens. At home, Mandarin is spoken and Chinese characters are practiced, reinforcing
    his bilingual development. The family celebrates Lunar New Year with decorations, red envelopes, and special meals, emphasizing respect for ancestors and the value of education. His parents stress diligence,
    organization, and harmony, aligning with broader East Asian cultural values. Living in a multicultural Queens neighborhood, Tian Jun also interacts with peers from diverse backgrounds, enriching his
    understanding of different customs while retaining his heritage.
