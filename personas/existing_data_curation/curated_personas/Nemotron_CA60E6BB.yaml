  career_goals: James aims to transition from front‑line surveillance to a supervisory role within the next two years, targeting a position such as Security Manager for a regional casino or a cultural institution
    like the Oregon Museum of Art & History. He plans to obtain the Certified Protection Professional (CPP) credential to solidify his expertise. Looking ahead to retirement, James envisions launching a
    boutique consulting firm that advises on security for art exhibitions and public events, leveraging his love of art and his extensive security background. He also hopes to mentor younger security personnel
    through formal training programs and community workshops, ensuring his knowledge benefits the next generation.
