  career_goals: Thomas aims to transform his family farm into a model of sustainable, technology‑enabled agriculture that consistently outperforms regional benchmarks. Over the next five years he plans
    to adopt advanced IoT and drone monitoring systems, expand into agritourism, and launch a cooperative that helps neighboring farms improve profitability. Ultimately, he aspires to become a recognized
    agribusiness consultant and advocate for policy that supports climate‑smart farming in the Northeast.
