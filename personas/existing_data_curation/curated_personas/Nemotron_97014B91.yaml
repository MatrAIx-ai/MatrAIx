  hobbies: '[''Motorcycle Restoration'', ''Model Railway Building'', ''Soccer (Community League)'', ''Hiking'', ''Ecuadorian Cooking'', ''Attending Latin American Festivals'', ''Reading Tech and Self‑Improvement
    Books'', ''Mindfulness Meditation'', ''Bilingual Youth Tutoring'']'
  career_goals: Jorgeluis aims to transition from supervisor to senior operations manager within the next three years, focusing on sustainable logistics initiatives that reduce carbon footprints and improve
    fuel efficiency. He plans to obtain the Certified Transportation Professional (CTP) credential and pursue a Lean Six Sigma Green Belt to deepen his process‑improvement expertise. Long‑term, he envisions
    launching a consultancy that helps mid‑size companies implement green transportation strategies while mentoring emerging Hispanic professionals in the industry. Balancing ambition with family life,
    he seeks roles that offer structured mentorship and flexible scheduling to manage stress and maintain well‑being.
