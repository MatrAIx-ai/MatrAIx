personas:
  professional: María Mcmillion, a 39-year-old therapist, blends CBT, DBT, and Mindfulness-Based Stress Reduction with watercolor art-therapy, delivering meticulous, evidence-based care while flexibly adapting
    each session to the client's creative flow; they are known for their calm, organized demeanor paired with a spontaneous artistic spark.
  sports: María Mcmillion hikes solo on the Blue Ridge Trail, practices yoga three times a week, follows the Washington Commanders (NFL) and Washington Nationals (MLB), and runs with the local Goochland
    Trailblazers club during springtime group walks; they cherish the quiet of early morning treks.
  arts: María Mcmillion paints watercolor landscapes inspired by Claude Monet, curates a personal collection of Ansel Adams black-and-white photographs, listens to Beethoven's late string quartets while
    sketching, and regularly tunes into The Art History Babes and Philosophize This! podcasts for artistic and philosophical inspiration; they find the interplay of color and history a constant source of
    renewal.
  travel: María Mcmillion prefers low-key, nature-focused travel, having trekked the Appalachian Trail in Virginia, wandered the lavender fields of Provence, meditated in a Zen garden in Kyoto, and planned
    upcoming visits to the Scottish Highlands for solitary sketching sessions; they plan each itinerary to include quiet moments for reflection and drawing.
  culinary: María Mcmillion enjoys intermediate-level experimental cooking, often crafting herb-infused tea blends with rosemary and sage, preparing pan-seared trout with lemon-dill sauce, and making spicy
    shakshuka with smoked paprika, while hosting intimate tea gatherings for close friends; they love experimenting with flavors as an extension of their creative practice.
  core: María Mcmillion is a solitary, curiosity-driven therapist who weaves mindfulness, watercolor art, and nature hikes into a meticulously organized yet creatively spontaneous life, even if a love of
    perfectly labeled herb jars and nightly caffeine spikes sometimes betray their disciplined exterior; they often balance a quiet routine with bursts of artistic inspiration.
background:
  cultural: Mariah grew up in a small town in central Virginia, steeped in Southern hospitality and a strong sense of community. Her family’s roots trace back several generations of modest farmers and small‑business
    owners, fostering a respect for hard work, self‑reliance, and local traditions. While she values these cultural touchstones, her innate curiosity has led her to explore broader artistic and intellectual
    horizons. She frequently visits historic sites along the James River, which deepen her appreciation for Virginia’s colonial heritage, and she blends this regional identity with a love of contemporary
    art and progressive therapeutic approaches.
