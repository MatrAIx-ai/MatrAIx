  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Mindfulness‑Based Stress Reduction (MBSR)'', ''Art Therapy Techniques'', ''Crisis Intervention'', ''Individual
    Counseling'', ''Group Facilitation'', ''Case Documentation and EMR Management'', ''Telehealth Counseling'', ''Psychoeducational Workshops'', ''Empathic Listening'', ''Boundary Management'', ''Conflict
    Resolution'', ''Research Literature Review'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Photography'', ''Reading Contemporary Fiction'', ''Reading Psychology and Philosophy'', ''Journaling'', ''Gardening (Native Herbs)'', ''Nature Walks'',
    ''Yoga'', ''Meditation'', ''Listening to Classical Music'', ''Visiting Museums and Art Galleries'', ''Podcast Listening (Art History, Philosophy)'', ''Experimental Cooking'', ''Tea Ceremonies'']'
  career_goals: Mariah aspires to deepen her clinical expertise by earning a certification in art therapy and eventually pursuing a master's degree in counseling. She aims to open a small private practice
    in Goochland County that emphasizes creative expression and mindfulness for trauma survivors. Over the next five years, she hopes to develop a community outreach program that offers free art‑based workshops
    for rural youth, publish a guide on integrating art into therapy, and become a recognized speaker at regional mental‑health conferences while maintaining a balanced, solitary lifestyle.
