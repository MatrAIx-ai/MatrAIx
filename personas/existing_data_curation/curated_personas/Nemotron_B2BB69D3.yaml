personas:
  professional: Kisha Clark is a budding teen visual artist who channels curiosity and organized flexibility into sketching, digital painting, collaborative mural projects, and curating a modest Instagram
    gallery, while they also experiment with photography and stop‑motion animation through the school art club.
  sports: Kisha Clark plays forward for the school's Tigers intramural soccer team, follows the regional pro soccer club Metro United with fervor, and balances active weekends by volunteering as an assistant
    coach at the community center’s art‑and‑sport program, while they also enjoy cheering on the local high school basketball squad during playoffs.
  arts: Kisha Clark immerses themselves in creative expression through sketching, digital painting, photography, and stop‑motion animation, drawing inspiration from classic soul legends like Aretha Franklin,
    contemporary hip‑hop artists such as Kendrick Lamar, and visual provocateurs like Banksy and Yayoi Kusama, while they curate an Instagram feed that showcases their evolving style to a growing audience
    of peer admirers.
  travel: Kisha Clark prefers short, budget‑friendly getaways that blend art and adventure, having explored the Smithsonian’s American Art Museum during a family trip to Washington, D.C., spent a weekend
    at the neighboring town’s street‑art festival, and dreaming of a future summer visit to Tokyo to trace anime‑inspired murals, all while they plan trips with friends via shared Google Docs itineraries.
  culinary: Kisha Clark enjoys experimenting in the kitchen at an intermediate level, frequently whipping up avocado toast topped with cherry tomatoes and feta while chewing gummy bears, blending strawberry‑banana‑spinach
    smoothies, and baking slightly over‑cooked chocolate chip cookies for classmates, and they also indulge in sushi rolls whenever a family dinner night features Japanese cuisine.
  core: Kisha Clark is a curiosity‑driven teen artist who balances disciplined sketching with spontaneous Instagram sharing, thrives on social collaboration, sometimes procrastinates on schoolwork for late‑night
    art sessions, and they habitually forget to water houseplants.
background:
  cultural: Kisha identifies as African American and grew up in the close‑knit community of Surry County, Virginia. Her family places a strong emphasis on cultural pride, storytelling, and church involvement,
    which have shaped her worldview. She celebrates Black History Month with projects that highlight local Black leaders, and she often incorporates motifs from African American art, such as vibrant colors
    and rhythmic patterns, into her own work. The rich musical traditions of gospel, soul, and hip‑hop that fill her household inspire both her artistic style and her sense of community. Through her participation
    in the church youth group and neighborhood festivals, Kisha stays connected to her heritage while also exploring contemporary expressions of Black identity.
