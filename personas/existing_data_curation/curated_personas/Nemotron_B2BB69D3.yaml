  career_goals: Kisha aspires to turn her love for art and community into a career that merges creativity with social impact. She envisions attending an arts‑focused high school and later earning a degree
    in visual communication or graphic design. Her long‑term goal is to become a professional illustrator or UI/UX designer who creates culturally resonant graphics for youth empowerment campaigns. She
    also dreams of founding a youth arts collective in Surry County that provides mentorship, workshops, and exhibition opportunities for local Black students. In the interim, she hopes to secure a summer
    internship with a local museum or a community organization that highlights African American heritage.
