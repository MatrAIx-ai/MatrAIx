  hobbies: '[''Watercolor painting'', ''Reading literary fiction and poetry'', ''Traditional Puerto Rican cooking with experimental twists'', ''Indoor herb gardening'', ''Crossword and sudoku puzzles'',
    ''Genealogy research'', ''Knitting and crocheting'', ''Listening to salsa, bolero, and jazz music'', ''Watching art documentaries and virtual museum tours'', ''Tai chi (gentle fitness)'']'
  career_goals: Rosenda’s primary ambition is to leave a tangible record of her family’s Puerto Rican heritage for future generations. She plans to compile a handwritten and photographed family cookbook
    that pairs recipes with stories behind each dish. She also hopes to finish a short memoir of her migration experience and the community of Puerto Rican seniors in Union County, to be shared at the local
    senior center. Maintaining her independence and health remains a daily goal; she aims to stay physically active through gentle gardening and weekly tai chi classes at the community center. She wishes
    to continue expanding her artistic voice by completing a small exhibition of watercolor landscapes portraying the streets of Old San Juan and the parks of Linden. Finally, Rosenda seeks to master basic
    digital photography to document her art and family gatherings, allowing her to share memories with distant relatives.
