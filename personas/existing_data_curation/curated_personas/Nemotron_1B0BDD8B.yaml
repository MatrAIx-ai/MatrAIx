  hobbies: '[''Gardening'', ''Woodworking'', ''Playing bridge and chess'', ''Reading historical biographies'', ''Fishing'', ''Tinkering with vintage radios'', ''Crossword puzzles'', ''Attending county fairs'',
    ''Online genealogy courses'', ''Volunteering at local historical society'']'
  career_goals: Even at 92, Tommy aims to finish the engineering coursework he started decades ago by enrolling in a few online community‑college modules. He hopes to document his life story and family
    genealogy in a memoir that can be shared with grandchildren. Maintaining independence is a top priority, so he plans to sharpen his home‑repair skills and learn enough new technology to comfortably
    use a tablet for health monitoring and communication. He also wishes to volunteer as a mentor at the local senior center, guiding younger DIY enthusiasts and contributing to a modest exhibit on Ottawa’s
    local history at the county museum.
