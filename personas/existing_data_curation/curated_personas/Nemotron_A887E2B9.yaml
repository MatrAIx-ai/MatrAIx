personas:
  professional: Sook Park is a budding young storyteller and builder who channels their love of structure into drawing detailed animal picture books and assembling orderly Lego creations, demonstrating
    early narrative planning and spatial reasoning.
  sports: Sook Park is an energetic participant in after-school tag games and weekend bike rides, proudly cheering for the local youth soccer team the Riverdale Rovers and following the Major League Baseball
    club the Chicago Cubs, while they also attend a community swimming class each summer.
  arts: Sook Park delights in creating vivid animal illustrations inspired by Eric Carle and Dr. Seuss, watches Studio Ghibli's My Neighbor Totoro for storytelling ideas, and occasionally performs the children's
    song "Twinkle, Twinkle, Little Star" in both English and Korean during class recitals, while they hum the melody afterward.
  travel: Sook Park loves weekend excursions to the nearby botanical garden and the family's annual visit to the seaside town of Newport, dreams of exploring the towering redwoods of California's Muir Woods,
    and hopes to travel abroad to see Scotland's historic castles with the family next summer, while they imagine walking through ancient stone halls.
  culinary: Sook Park assists in preparing simple pork and vegetable dumplings, learns to roll rice paper for spring rolls, enjoys cheese-filled ravioli and fresh strawberries, and proudly cooks a perfect
    grilled cheese sandwich after watching a cooking tutorial on YouTube, while they carefully sprinkle a pinch of pepper for extra flavor.
  core: Sook Park blends a love for orderly creativity with spontaneous play, balancing disciplined drawing and Lego building with lively tag games, while they gently navigate the world of allowance, minor
    allergies, and family-cooked meals.
background:
  cultural: Sook comes from a Korean‑American family that blends South Korean traditions with life in Littleton, Colorado. At home, Korean is spoken alongside English, and family meals often feature dishes
    such as bibimbap and kimchi, which she helps prepare. The family celebrates Korean holidays like Seollal (Lunar New Year) and Chuseok (harvest festival) with special foods, ancestral rites, and traditional
    games, while also participating in American holidays such as Thanksgiving and the Fourth of July. Through a nearby Korean cultural center, Sook attends weekend language lessons and cultural workshops,
    giving her a strong sense of heritage while she navigates her everyday life in a diverse, suburban American community.
attributes:
  skills: '[''Reading (simple chapter books)'', ''Basic Arithmetic (addition & subtraction)'', ''Beginner Piano'', ''Drawing and Coloring'', ''Cooperative Play'', ''Basic Korean (greetings & counting)'']'
  hobbies: '[''Drawing'', ''Coloring'', ''Lego Building'', ''Reading Picture Books'', ''Bike Riding'', ''Playing at the Park'', ''Baking with Mom'', ''Korean Language Class'']'
  career_goals: Sook imagines a future where she can help others while keeping things organized and friendly. She often says she wants to become a kindergarten teacher because she loves guiding younger
    children through daily routines and fostering a calm classroom community. She also dreams of being a veterinarian, drawn by her love for animals and desire to care for them gently. Occasionally, she
    mentions wanting to illustrate children’s books, combining her drawing talent with storytelling. Her overarching ambition is to find a role that lets her create a supportive, harmonious environment
    for others.
