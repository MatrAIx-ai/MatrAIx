  career_goals: Even though she is no longer employed full‑time, Gita aims to deepen her community impact. She plans to lead a senior activity program at the local community center, launch a neighborhood
    garden that provides fresh produce for seniors, and compile a cookbook featuring healthy, family‑favorite recipes. Gita also intends to enroll in online gerontology courses to better support aging peers,
    learn conversational Spanish to connect with an increasingly diverse neighborhood, and mentor younger volunteers in event organization. Her long‑term ambition is to combine her love of service, learning,
    and creativity into a lasting legacy within Glendale Heights.
