  career_goals: Maria's primary career ambition is to become a Certified Public Accountant (CPA) within the next two years, followed by a promotion to senior auditor. She aims to lead larger, more complex
    audit engagements and eventually move into audit manager territory, where she can shape audit methodology and mentor junior staff. Over the longer term, Maria envisions transitioning to a financial
    controller or CFO role in a mid-size company, focusing on building robust financial reporting processes and strategic budgeting. Throughout her career, she values a stable, well-structured work environment
    that allows her to balance professional responsibilities with her personal well-being, and she seeks opportunities that support continuing education and professional development.
