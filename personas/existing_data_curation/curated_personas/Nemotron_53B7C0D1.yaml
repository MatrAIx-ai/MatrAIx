personas:
  professional: Maria Lusk, a 29-year-old accountant at a New Jersey CPA firm, combines rigorous GAAP expertise, advanced Excel macro wizardry, and fluent SAP and QuickBooks proficiency with her outgoing,
    routine-driven nature to lead audit teams, present findings confidently, and keep every engagement on a tight, well-structured schedule.
  sports: Maria Lusk plays co-ed volleyball with the Hoboken Hawks twice weekly, attends spin classes at SoulCycle and yoga at CorePower Yoga, roots for the New York Yankees and New Jersey Devils, and hikes
    the Hudson Valley’s Breakneck Ridge in spring, blending her love for group fitness with a competitive, routine-oriented spirit.
  arts: Maria Lusk enjoys contemporary fiction, discussing works by Sally Rooney and Colson Whitehead at her book club, listens to the soundtrack of Lin-Manuel Miranda’s Hamilton, and attends live performances
    by the New York Philharmonic, letting the arts inform her social gatherings and creative cooking experiments.
  travel: Maria Lusk plans weekend getaways with friends to the Catskills, Asheville’s Blue Ridge Mountains, and occasionally abroad to Barcelona for its Mediterranean food scene, favoring well-researched
    itineraries that balance group activities and budget constraints while satisfying her love for new experiences.
  culinary: Maria Lusk, an enthusiastic home chef, frequently prepares Mediterranean dishes like grilled branzino with olives, sumac-spiced couscous, and homemade tzatziki, skillfully using fresh herbs,
    lemon, and olive oil, and enjoys hosting dinner parties where friends sample her experimental recipes and swap cookbook ideas.
  core: Maria Lusk is a meticulous accountant who balances routine-driven precision with a sociable, group-focused lifestyle, juggling anxiety-management, active fitness, Mediterranean cooking, and ambitious
    career goals while occasionally over-committing to friends and travel.
background:
  cultural: Maria grew up in a middle-class, suburban family in North Arlington, New Jersey. Her household emphasized practicality, education, and community involvement - values that reflect a traditional
    American upbringing with roots in European (primarily Polish and Irish) heritage. Family celebrations centered around holidays such as Thanksgiving, Christmas, and Easter, often featuring recipes passed
    down from her grandparents. Living in the diverse New York metropolitan area exposed Maria to a variety of cultural festivals, cuisines, and perspectives, fostering an appreciation for multicultural
    experiences while maintaining a strong work ethic and commitment to reliability that are hallmarks of her cultural background.
