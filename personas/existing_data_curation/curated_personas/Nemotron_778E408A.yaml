personas:
  professional: Rodney Hogan, a 60‑year‑old professor of liberal arts and curriculum architect, combines deep expertise in instructional design, educational technology, and culturally responsive pedagogy
    to craft interdisciplinary programs that blend digital media with Southern arts traditions, while his spontaneous, relaxed approach lets him improvise lesson plans on the fly and his occasional disorganization
    is balanced by a strong mentorship ethic and a persistent curiosity about stress reduction for educators.
  sports: Rodney Hogan, an avid supporter of the Mississippi State Bulldogs football team and a faithful viewer of the New Orleans Saints, spends his mornings casting lines with the Cleveland River Anglers
    Association, keeps fit with gentle riverbank walks and weekend participation in a senior tennis league, preferring low‑impact activity over high‑intensity workouts while cherishing the camaraderie of
    his local fishing club.
  arts: Rodney Hogan, whose weekends are filled with watercolor renderings of delta river scenes while listening to B.B. King and John Coltrane on his vintage turntable, often entertains the community theater’s
    after‑show gatherings with blues harmonica improvisations, and draws literary inspiration from Toni Morrison, James Baldwin, and Maya Angelou, weaving their poetic cadence into his visual art.
  travel: Rodney Hogan, who favors a blend of loosely planned road trips and purposeful pilgrimages to historic civil‑rights landmarks such as the National Civil Rights Museum in Memphis, the Tuskegee Institute
    in Alabama, and the Apollo Theater in Harlem, enjoys spontaneous detours to Delta blues festivals in Clarksdale, and balances his modest retirement budget with occasional family voyages to Ghana’s Cape
    Coast Castle.
  culinary: Rodney Hogan, an adept home cook who relishes preparing shrimp and grits, smoked catfish with hush‑puppy cornmeal batter, and a fragrant okra‑and‑tomato stew seasoned with smoked paprika and
    fresh basil, often invites family to share these meals while swapping stories over sweet potato pie, and occasionally treats himself to a gourmet cheese board inspired by his recent travels.
  core: Rodney Hogan, a curious yet worry‑prone 60‑year‑old educator, blends Delta blues, watercolor art, and community mentorship into a life that balances spontaneous creativity with a humble, frugal
    rhythm.
background:
  cultural: Rodney is an African American who grew up in Cleveland, Mississippi, a small town steeped in Delta culture. Raised in a close‑knit Black community and a historically Black church, he was immersed
    in gospel music, oral storytelling, and the resilience forged by the civil‑rights era. His grandparents were sharecroppers and his parents educators, shaping his belief in education as a path to empowerment.
    He carries the legacy of Delta blues, Southern cuisine, and communal solidarity, and incorporates African American perspectives and the arts into his teaching. Family gatherings, church events, and
    local festivals celebrating Black heritage remain central to his identity, as does a commitment to uplifting his community through education and cultural expression.
attributes:
