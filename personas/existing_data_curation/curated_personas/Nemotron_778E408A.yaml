  hobbies: '[''Watercolor Painting'', ''Blues and Jazz Listening'', ''Harmonica'', ''Reading African American Literature'', ''Philosophy'', ''Gardening'', ''Fishing'', ''Southern Cooking'', ''Community
    Theater'', ''Traveling to Historic Sites'', ''Book Club'', ''Mindfulness Meditation'', ''Chess'']'
  career_goals: Rodney aims to launch a sustainable interdisciplinary program that blends liberal arts, digital media, and Southern arts traditions, securing a major research grant to study stress reduction
    for educators. He hopes to publish a book on arts‑based adult education, earn a distinguished teaching award, and mentor a new generation of faculty. Over the next five years, he plans to establish
    a community‑focused nonprofit that brings arts education to underserved schools in the Mississippi Delta, while transitioning toward a part‑time emeritus role that allows him to focus on personal art
    practice and family life.
