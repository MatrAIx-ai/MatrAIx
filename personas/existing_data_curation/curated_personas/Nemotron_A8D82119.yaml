    negotiation'', ''Risk assessment'', ''Team leadership'']'
  hobbies: '[''Community gardening'', ''Birdwatching'', ''Hiking in local state parks'', ''Participating in local environmental volunteer groups'', ''Cooking Southern cuisine with a farm‑to‑table focus'',
    ''Reading historical fiction'', ''Attending town hall meetings'', ''Photography of local landscapes'', ''Knitting'', ''Traveling to national parks'', ''Playing bridge'']'
  career_goals: As she approaches retirement, Viola aims to transition from full‑time engineering to a consultancy role that focuses on climate‑resilience projects for the Coastal Plain. She hopes to lead
    a county‑wide water‑quality improvement initiative, secure funding for green infrastructure, and serve as a bridge between scientists, policymakers, and local residents. Mentorship remains a priority;
    she plans to establish a scholarship and mentorship program for aspiring engineers in Robeson County, especially encouraging women and underrepresented groups to enter the environmental field.
