    Communication'', ''Conflict Resolution'', ''Adaptability'']'
  hobbies: '[''Pickup basketball'', ''Hip-hop & R&B music'', ''Gospel playlists'', ''Cooking Southern cuisine'', ''Video gaming (NBA 2K, FIFA)'', ''Online discount hunting'', ''Car maintenance & repair'']'
  career_goals: Short-term, Glynn aims to earn an associate’s degree in Business Administration while completing a Certified Professional Purchasing Manager (CPPM) certification, strengthening his analytical
    and strategic capabilities. He plans to take on larger purchasing budgets and mentor junior staff, positioning himself for promotion to Senior Purchasing Manager within the next three years. Long-term,
    he envisions moving into a supply-chain director role or launching his own procurement consultancy that helps small businesses in the Atlanta metro area optimize costs and build resilient supply networks.
    He also hopes to develop a reputation for balancing strict cost control with the flexibility needed to respond to market shifts.
