  hobbies: '[''Reading mystery novels'', ''Exploring popular science articles'', ''Coding interactive stories in Scratch'', ''Gardening'', ''Debate club participation'', ''Journaling'', ''Sketching'', ''Volunteering
    at the local library’s summer reading program'']'
  career_goals: Veronica aspires to become a pediatric nurse, driven by her desire to help children and support families in need. She also hopes to work as a community health educator, blending her practicality
    with her caring nature. In the longer term, she plans to pursue a degree in nursing or health sciences, while staying involved in volunteer initiatives that promote teen mental‑health awareness, drawing
    from her own experiences with anxiety. To prepare, she aims to develop leadership skills through school clubs and community service, eventually taking on roles that coordinate health‑related programs
    for local youth.
