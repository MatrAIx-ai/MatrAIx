personas:
  professional: Veronica Sorice, a 14-year-old aspiring digital storyteller, uses Scratch to design mystery-themed interactive games that mirror the structured plots of her favorite novels, and they approach
    each development cycle with meticulous planning, deadlines, and a publisher-style checklist borrowed from the library's reading program.
  sports: Veronica Sorice dabbles in cross-country running during the fall, swims laps with the school team in the winter, and joins the local Maple Creek United youth soccer club in the spring, while cheering
    on the Los Angeles Lakers as a devoted basketball fan.
  arts: Veronica Sorice devours mystery novels by Agatha Christie and popular science books by Bill Nye, sketches atmospheric scenes inspired by Studio Ghibli's Hayao Miyazaki, composes simple pixel-art
    tunes on a keyboard, and finds solace in listening to the piano soundtracks of Hans Zimmer while crafting her digital stories.
  travel: Veronica Sorice prefers meticulously planned weekend getaways, having explored the nearby botanical gardens and the state museum's science wing, while dreaming of a spring trip to Kyoto's historic
    temples and a literary pilgrimage to London's Sherlock Holmes Museum.
  culinary: Veronica Sorice enjoys translating garden harvests into simple kitchen creations, skillfully chopping fresh tomatoes, zucchini, and basil to whip up a bright roasted tomato-basil soup, layering
    a veggie pizza with mozzarella and oregano, and savoring cucumber-mint salad with a splash of lemon juice, though they sometimes over-salt dishes when nervous.
  core: Veronica Sorice is a methodical teen who channels curiosity and anxiety into organized storytelling, garden experiments, and structured self-care routines.
background:
  cultural: Veronica grew up in Monroe, a small town in Union County, North Carolina, within a predominantly white, Southern‑influenced community. Her family emphasizes close‑knit relationships, church
    involvement, and community service, shaping her cooperative and considerate demeanor. The regional values of hospitality, modesty, and respect for tradition influence her balanced appreciation for both
    new ideas and established methods. Local cultural events such as county fairs, high school football games, and church gatherings provide social contexts where she learns the importance of harmony and
    mutual support. At the same time, exposure to diverse media and school programs broadens her worldview beyond her immediate surroundings.
