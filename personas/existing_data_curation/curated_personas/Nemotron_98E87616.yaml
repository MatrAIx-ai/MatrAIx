  career_goals: Milka aims to advance to senior leadership roles in IT, such as Director of Information Systems or Chief Technology Officer, within a culturally focused organization. She plans to earn a
    PMP certification and pursue a Master’s degree in Information Systems or an MBA to strengthen her strategic management capabilities. A core ambition is to create digital platforms that preserve and
    showcase Mexican‑American artistic heritage, partnering with community museums and local artists. She also aspires to mentor women and underrepresented minorities in technology, fostering inclusive
    workplace cultures. Balancing professional growth with personal well‑being, she intends to incorporate mindfulness practices and flexible work arrangements to manage stress.
