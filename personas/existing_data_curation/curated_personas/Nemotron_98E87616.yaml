personas:
  professional: Milka Pages bridges the worlds of technology and visual culture as an IT project coordinator, leveraging Agile and Scrum expertise, bilingual communication, and data‑visualization skills
    to guide cross‑functional teams through network upgrades while infusing each rollout with a keen eye for user experience and a commitment to inclusive, culturally resonant digital platforms.
  sports: Milka Pages balances a sedentary IT role with regular outdoor activity, joining a local hiking club for weekend treks across the Imperial Valley trails, keeping a bird‑watching log in the spring,
    cheering on the San Diego Padres and Los Angeles Lakers, and practicing yoga three times a week to maintain flexibility and manage stress.
  arts: Milka Pages immerses themselves in the arts by sketching desert vistas inspired by Georgia O'Keeffe, curating personal collections of contemporary photography from An‑selm Kiefer, attending gallery
    openings featuring Kehinde Wiley, strumming an acoustic guitar to the soulful melodies of Nina Simone and the lyrical storytelling of José González, and experimenting with AI‑driven art tools that fuse
    classic techniques with modern algorithms.
  travel: Milka Pages seeks inspiration through travel, having hiked the dune fields of the Imperial Valley, explored the historic adobe streets of Santa Fe, photographed sunrise over Monument Valley, and
    dreaming of capturing the northern lights in Iceland, all while planning trips on a strict savings timeline that balances adventure with the need to fund ongoing art projects.
  culinary: Milka Pages enjoys cooking family recipes such as corn‑based tamales, slow‑braised pork mole with dried chilies, chiles de árbol‑spiked salsa, and fresh pico de gallo, displaying intermediate
    culinary confidence while often improvising with achiote, cumin, and epazote, yet tends to postpone meal prep when project deadlines loom, opting for quick take‑out and later feeling guilty about the
    missed opportunity to share food with friends.
  core: Milka Pages blends tech savvy with artistic flair, meticulously plans projects and finances while battling chronic anxiety that fuels both hyper‑preparation and occasional over‑indulgence in late‑night
    sketching sessions.
background:
  cultural: Milka was raised in Calexico, a vibrant border community where Mexican and American cultures intersect daily. She grew up in a bilingual household, speaking Spanish at home and English at school,
    and actively participates in Mexican traditions such as Día de los Muertos, quinceañeras, and community festivals. Her family’s emphasis on close‑knit relationships and respect for elders shaped her
    collaborative and considerate nature. The multicultural environment nurtured her appreciation for diverse artistic expressions, from traditional Mexican folk art to contemporary American installations.
    This bicultural perspective informs her professional focus on creating technology solutions that honor and amplify Mexican‑American cultural narratives.
