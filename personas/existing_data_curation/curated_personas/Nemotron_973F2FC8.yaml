  hobbies: '[''drawing/sketching'', ''digital painting'', ''street‑art exploration'', ''sandbox video gaming'', ''science‑fiction reading'', ''experimental music listening'', ''cooking Mexican cuisine'',
    ''attending cultural festivals'', ''volunteering on mural projects'']'
  career_goals: Luis aspires to become a professional concept artist for video games or animated series, leveraging his strong imaginative drive and cultural perspective. He plans to earn his GED, then
    enroll in a community college graphic design program to deepen his technical skills. After building a robust freelance portfolio, he hopes to win national art contests, secure contracts with indie studios,
    and eventually open a community art studio in Phoenix that celebrates Mexican heritage through murals and workshops for other youth.
