personas:
  professional: Luis Cardona, a 17‑year‑old aspiring concept artist, merges hand‑drawn sketches, digital illustrations, and beginner‑level 3D modeling to craft myth‑infused character designs while juggling
    the chaos of high school‑level disorganization and a fierce drive to outshine peers in art contests.
  sports: Luis Cardona roots for the Phoenix Suns and Arizona Diamondbacks, plays pickup basketball at the local park on weekends, and occasionally joins skateboarding meet‑ups, preferring casual competition
    over formal league commitments.
  arts: Luis Cardona immerses themselves in experimental indie music from artists like Flying Lotus and Café Tacvba while frequenting Phoenix’s street‑art festivals, drawing inspiration from muralists such
    as Shepard Fairey and remixing those vibes into digital mood boards and short narrative comics.
  travel: Luis Cardona enjoys spontaneous road trips to Sedona’s red rocks and occasional trips to Mexico City’s historic markets, dreaming of a future backpack adventure through Berlin’s graffiti‑laden
    neighborhoods while balancing travel costs with a part‑time freelance gig.
  culinary: Luis Cardona proudly cooks tacos al pastor, pozole, and churros with their family, adding a modern twist by experimenting with avocado‑lime salsa and homemade corn tortillas, and occasionally
    tries to fuse Mexican flavors with Japanese ramen for dinner parties.
  core: Luis Cardona is a 17‑year‑old concept‑art enthusiast whose curiosity fuels eclectic sketches, spontaneous travel, and occasional disorganized habits, all seasoned with a love for Mexican cuisine
    and competitive spirit.
background:
  cultural: Luis is a first‑generation Mexican‑American whose family maintains strong ties to their ancestral regions in Oaxaca and Jalisco. Growing up bilingual, he celebrates Día de los Muertos, Semana
    Santa, and Mexican Independence Day with his extended family in Phoenix's lively Mexican community. These traditions infuse his artistic style with vibrant colors, traditional patterns, and contemporary
    street‑art aesthetics. He feels a deep connection to the Mexican muralist legacy of artists like Diego Rivera, and the murals that adorn his neighborhood inspire his own work, blending heritage with
    modern creativity.
attributes:
  skills: '[''hand‑drawing'', ''digital illustration'', ''bilingual communication (Spanish/English)'', ''basic graphic design (Photoshop, Illustrator)'', ''video editing'', ''creative storytelling'', ''conceptual
