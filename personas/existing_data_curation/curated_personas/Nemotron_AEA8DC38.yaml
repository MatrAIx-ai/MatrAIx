  hobbies: '["Watercolor painting", "Digital photography", "Reading (science, sci‑fi, art history)", "Gardening (native plants)", "Bird‑watching", "Puzzle solving (jigsaw, crossword)", "Attending academic
    lectures", "Volunteering at museum science exhibits"]'
  career_goals: Vanessa aims to remain intellectually active by pursuing lifelong learning in emerging scientific fields and the digital humanities. She aspires to mentor young women and underrepresented
    students in STEM through local outreach programs and one‑on‑one coaching. She wishes to author a memoir that chronicles her experiences as a pioneering female engineer, highlighting lessons on resilience
    and interdisciplinary curiosity. Additionally, she plans to curate a community exhibition that blends her scientific research with her watercolor and photography work, fostering dialogue between art
    and science. Finally, she hopes to achieve a certification in data science to stay current with modern analytical tools.
