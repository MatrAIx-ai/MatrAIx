persona_description: A professional in the field of electrical engineering who specializes in designing and installing emergency lighting systems for buildings. They have extensive knowledge and experience
  in understanding the Code of Practice for the Emergency Lighting of Premises and are skilled in advising clients on the appropriate types of emergency lighting to meet their specific needs. They are knowledgeable
  about the different types of emergency lighting available, including self-contained lights, automatic self-testing systems, central battery systems, static inverters, and full product and price lists.
  They are highly skilled in ensuring compliance with testing regulations and can provide guidance on the best solutions for various types of buildings and emergency situations.
