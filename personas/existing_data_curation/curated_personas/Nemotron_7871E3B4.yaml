personas:
  professional: William Huval is an imaginative mini‑engineer who spends preschool recess building elaborate sand‑castles and cardboard forts; they demonstrate an early love for structure and predictability
    while also delighting in the flexibility of spontaneous play.
  sports: William Huval loves splashing in the Gulf‑side pool during swim lessons, kicks a soccer ball at the Panama City Youth Soccer club, eagerly cheers for the Tampa Bay Buccaneers on Sundays, and idolizes
    the Florida Gators during college football season, yet prefers the freedom of unstructured beach tag games over rigid team drills.
  arts: William Huval spends afternoons drawing dinosaurs with Crayola crayons while humming the 'Let It Go' tune from Frozen and watching Sesame Street’s Elmo, and they adore the colorful storytelling
    of Pixar’s Toy Story and the playful voice of child‑friendly musician JoJo Siwa.
  travel: William Huval enjoys family road trips to the sugar‑white sands of Destin and the nearby Bay County Fair, dreams of a future visit to Disney World’s Magic Kingdom, and prefers the spontaneity
    of stopping at beachside ice‑cream stands over meticulously planned itineraries.
  culinary: William Huval favors cheesy mac and cheese, crispy chicken nuggets, and sweet strawberry shortcake, delights in a occasional fried shrimp po’boy with lettuce and tartar sauce, and enjoys helping
    Mom stir a pot of buttered corn, though they often ask for extra ketchup.
  core: William Huval is a cautious five‑year‑old who craves the predictability of building sand‑castles, anxiously frets over misplaced crayons, hoards allowance pennies in a bright piggy bank, and often
    forgets to apply sunscreen before heading to the Gulf Coast.
background:
  cultural: William comes from a white, middle‑class family living in Panama City, Florida. His family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and often
    spends weekends at the nearby Gulf Coast beaches. He attends a local preschool where he interacts with children from diverse backgrounds, giving him some exposure to Spanish words and local Gulf‑Coast
    culture. Family meals often feature classic Southern comfort foods, and occasional community events like the Bay County Fair add a local flavor to his upbringing.
