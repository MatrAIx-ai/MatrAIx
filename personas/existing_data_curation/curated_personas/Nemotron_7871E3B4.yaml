  career_goals: He imagines becoming a firefighter or a builder when he grows up, drawn to the clear routines, teamwork, and the chance to construct and protect tangible things. He also dreams of being
    a champion in a soccer league, seeing it as a way to test his competitive spirit and achieve clear, measurable success.
