persona_description: A historian who is interested in the history of Mexico during the post-war period from 1848 to 1853, particularly in the issues and experiences that affected Mexicans. This historian
  is likely to have a deep understanding of the political, social, and economic developments of this time period and the role of elite politics, church-state relations, institutional affairs, and peasant
  revolts in shaping Mexico's long-term historical development. They are also likely to be knowledgeable about topics like marriage and everyday life, and the public trials and executions staged in the
  aftermath of the war with the US.
