  hobbies: '["Community garden stewardship","Quilting and crochet circles","Church choir singing","Reading Southern historical fiction","Bird-watching in local wetlands","Walking nature trails","Genealogy
    research","Volunteer work at the local food pantry","Playing bridge with friends","Cooking and sharing family recipes"]'
  career_goals: Shannon aims to channel her experience into a lasting community legacy. She wants to launch a heritage garden that serves as a learning space for youth, train fellow seniors as digital ambassadors,
    coordinate inter-generational storytelling circles, and compile a resource guide for older adults in Morehouse Parish. She also hopes to document local family histories and share them at the parish
    historical society.
