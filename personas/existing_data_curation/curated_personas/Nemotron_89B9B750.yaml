personas:
  professional: Shannon Andrews, a 72‑year‑old community heritage steward, merges their curiosity for sustainable gardening with a practical knack for organizing inter‑generational storytelling circles,
    uses basic computer tools to train fellow seniors as digital ambassadors, and assertively manages modest budgets to launch the heritage garden they envision for Morehouse Parish youth.
  sports: Shannon Andrews enjoys low‑impact fitness, taking sunrise walks along Bayou Teche and joining a senior bowling league at the local community center, while cheering for the LSU Tigers football
    and New Orleans Pelicans basketball teams during weekend games, and they occasionally participate in friendly bridge marathons that double as mental workouts.
  arts: Shannon Andrews expresses creativity through a warm soprano in the church choir, crafting quilts inspired by the motifs of Southern folk artist Clementine Hunter, crocheting blankets to the rhythm
    of Mahalia Jackson’s gospel hymns, and they spend evenings reading historical novels by William Faulkner while admiring Audubon’s bird illustrations, all of which shape their cultural appreciation.
  travel: Shannon Andrews prefers carefully planned road trips that blend heritage and relaxation, having visited New Orleans’ French Quarter, the historic town of St. Francisville, and the marshes of Atchafalaya,
    they dream of a leisurely pilgrimage to Savannah’s historic squares and a once‑in‑a‑lifetime cruise along the Mississippi River, yet they balance these aspirations with a modest travel budget and a
    need for accessible accommodations.
  culinary: Shannon Andrews delights in cooking traditional Southern fare, expertly preparing gumbo with okra, smoked sausage, and fresh catfish, baking pecan pie with a flaky crust, and they relish the
    comfort of collard greens simmered with ham hocks, while occasionally indulging in extra‑sweet tea and buttery biscuits that betray a modest sweet‑tooth.
  core: Shannon Andrews, a 72‑year‑old garden‑loving storyteller, blends practical curiosity with community spirit, occasionally forgets medication, overspends on yarn, and they never miss a choir rehearsal.
background:
  cultural: Shannon grew up as a white Southern woman in rural Bastrop, Louisiana, where church life, tight-knit neighborly ties, and a legacy of farming shaped her worldview. Her family roots trace back
    to early Anglo-American settlers who blended modest, self-reliant values with the region's distinctive Southern hospitality and Creole culinary influences. The rhythm of parish picnics, church potlucks,
    and community fairs instilled a strong sense of collective responsibility and a love for preserving local traditions.
