personas:
  professional: Phuong Duong, a freelance graphic designer and budding curator, channels their vivid imagination and meticulous event‑planning chops into visually striking brand identities and community
    exhibitions, using a competitive drive to chase grant opportunities and a healthy dose of skepticism to vet collaborators.
  sports: Phuong Duong follows the New York Knicks in winter, cheers for the New York Rangers during hockey season, and trains with the Queens Community Soccer League on Saturdays, balancing a love for
    spectator sports with modest participation in local recreational leagues.
  arts: Phuong Duong immerses themselves in the arts by sketching in Queens galleries, drawing inspiration from Frida Kahlo’s bold self‑portraits, Yayoi Kusama’s immersive installations, and the lyrical
    storytelling of musician Björk, while regularly attending performances of contemporary playwrights like Sarah Ruhl.
  travel: Phuong Duong prefers meticulously planned urban getaways, having explored the bustling streets of Tokyo, the historic canals of Amsterdam, and the serene rice terraces of Bali, yet they dream
    of a budget‑friendly cultural retreat in Porto, balancing a desire for new sensory experiences with family commitments.
  culinary: Phuong Duong enjoys experimenting in a modest kitchen, skillfully preparing Thai green curry with fresh lemongrass and kaffir lime, Japanese ramen broth simmered with kombu and dried shiitake,
    and Malaysian satay using peanut sauce, while also appreciating the simplicity of grilled eggplant with miso glaze.
  core: Phuong Duong is a fiercely imaginative, competitively driven creative who balances disciplined budgeting with impulsive art‑supply splurges, thrives on solitary sketching sessions yet curates community
    events with meticulous precision, and occasionally lets skepticism color new collaborations.
background:
  cultural: Phuong’s family emigrated from Vietnam in the early 1990s, settling in Woodside, a vibrant enclave of Southeast Asian diaspora. Growing up, she was immersed in Vietnamese language, traditional
    festivals such as Tết, and a strong emphasis on family cohesion. The neighborhood’s multicultural fabric—shared markets, street food, and community centers—has reinforced her appreciation for cultural
    exchange. Her heritage informs her artistic sensibility, evident in the motifs she incorporates into her work, and fuels her desire to preserve and promote Southeast Asian arts within the broader Queens
    community.
attributes:
  skills: '["Digital illustration", "Mixed-media art", "Creative writing", "Bilingual communication (Vietnamese/English)", "Event planning and coordination", "Research and critical analysis", "Volunteer
