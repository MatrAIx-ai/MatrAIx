    exchange meet-ups"]'
  career_goals: Phuong aims to re-enter the professional world by turning her passion for art and culture into a freelance graphic-design and curatorial practice. She plans to complete a certification in
    UX/UI design within the next year and launch a community-based art studio in Woodside that showcases Southeast Asian artists and offers workshops. Long-term, she hopes to become an arts administrator
    for a local cultural center, using her competitive drive to secure grants and expand programming that celebrates multicultural creativity.
