  career_goals: Shirley aims to become a certified nursing assistant and eventually earn a bachelor's degree in health administration to move into leadership within senior‑care services. She envisions launching
    a boutique home‑care agency that blends traditional health support with arts‑based therapies, such as mural projects and music sessions, to improve mental well‑being for elderly clients. In the longer
    term, she hopes to develop a community wellness program that trains other personal care aides and promotes culturally informed, creative care models throughout Seminole County.
