  career_goals: Although retired, Richard aims to deepen his involvement in Saint Charles’ cultural life. He plans to volunteer as a docent at the DuPage County Historical Museum, help curate senior‑focused
    art workshops, and consider a board position with the local public library. He also aspires to complete an extensive genealogy project tracing his family’s German‑Irish roots and to master a new digital
    photography technique each year. His overarching ambition is to leave a lasting legacy of community engagement and to inspire others to explore art and history.
