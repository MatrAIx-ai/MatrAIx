  hobbies: '[''Reading (non-fiction, psychology, STEM)'', ''Puzzle solving (crosswords, sudoku)'', ''Gardening'', ''Cooking and baking'', ''Yoga and meditation'', ''Hiking on nature trails'', ''Volunteer
    work at animal shelters'', ''Bourbon tasting tours'', ''Knitting'']'
  career_goals: Laura aims to progress from her current role as an event planner to a senior event manager position within the next three years, focusing on large‑scale corporate conventions that incorporate
    sustainable practices and attendee well‑being. She plans to earn the Certified Meeting Professional (CMP) designation and later pursue a director‑level role where she can shape organizational event
    strategies. Ultimately, she envisions launching her own boutique event consultancy that offers data‑driven, stress‑reduction focused event solutions for companies seeking highly organized and harmonious
    gatherings.
