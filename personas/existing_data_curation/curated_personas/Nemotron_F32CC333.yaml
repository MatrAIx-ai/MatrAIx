personas:
  professional: Jose Espinosa is a tiny, methodical builder who arranges block towers with precise symmetry, records each step in a bright notebook, and eagerly invites preschool friends to collaborate
    on imaginative constructions.
  sports: Jose Espinosa delights in preschool soccer practice every Tuesday, proudly wears a tiny Houston Astros cap during family game nights, and is a member of the San Juan Little Strikers club where
    they sprint energetically across the grass and cheer loudly after every goal.
  arts: Jose Espinosa is a budding little artist who loves painting vibrant sugar-skull masks for Dia de los Muertos, mimics the bold colors of Frida Kahlo's self-portraits, and sings classic lullabies
    by Juan Gabriel during circle time, proudly sharing their creations with classmates.
  travel: Jose Espinosa enjoys family road trips to the San Antonio River Walk where they feed ducks, loves the glittering lights of the Texas State Fair, and, with sparkling curiosity, dreams of someday
    exploring the ancient ruins of Teotihuacan with grandparents.
  culinary: Jose Espinosa adores the sweet aroma of fresh churros dusted with cinnamon sugar, proudly helps stir masa for homemade tamales during Las Posadas, and can name their favorite ingredient—corn—with
    the enthusiasm of a tiny chef.
  core: Jose Espinosa blends meticulous block-building, heartfelt generosity, and a love for bright traditions into a bright-eyed, ever-curious four-year-old who never misses a chance to share a smile or
    a sticker.
background:
  cultural: Jose Miguel is raised in a Mexican‑American household in San Juan, Texas. Spanish is spoken at home, and his family observes Mexican traditions such as Día de los Muertos, Las Posadas, and Mexican
    Independence Day while also enjoying local Texan customs. He attends a bilingual preschool that weaves Mexican folklore, music, and cuisine into its curriculum, fostering a strong bicultural identity
    and a deep appreciation for his heritage.
