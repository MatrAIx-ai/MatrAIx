personas:
  professional: Daisy Lee is an emerging public‑health data analyst who harnesses Python, R, and SQL to turn community health metrics into clear visual stories, while their structured analytical mindset
    is softened by a flexible, empathy‑driven teamwork style that sometimes leads to a last‑minute sprint to meet tight deadlines.
  sports: Daisy Lee fuels their energetic lifestyle by attending Friday night Zumba sessions at PulseFit, cheering on the Atlanta Hawks and Atlanta United, and playing in a co‑ed summer soccer league, though
    occasional disorganization means they sometimes skip a workout when midterms pile up.
  arts: Daisy Lee is a regular at the campus improv troupe The Laugh Lab, draws inspiration from performers like Bill Murray and spoken‑word poet Maya Jacobs, and unwinds with playlists that blend soulful
    R&B, contemporary hip‑hop, and classic jazz, infusing daily routine with spontaneous creativity.
  travel: Daisy Lee prefers spontaneous, budget‑friendly getaways with friends, having already spent a weekend exploring New Orleans’ live‑music scene, a long weekend in Nashville’s art districts, and dreaming
    of a backpacking adventure through Thailand and Vietnam, though a tendency to procrastinate on bookings often leaves them eye‑browsing flights at the last minute.
  culinary: Daisy Lee is a budding home chef who blends Southern comfort foods like shrimp‑and‑grits and collard greens with bold spice blends passed down through their family’s recipes, frequently reaching
    for smoked paprika, fresh ginger, and okra, yet their habit of multitasking while on Zoom calls sometimes results in a slightly charred roux.
  core: Daisy Lee is a socially vibrant, data‑driven idealist whose love for community health is balanced by a penchant for last‑minute planning, occasional over‑caffeination, and a habit of turning every
    group workout into a mini‑dance party.
background:
  cultural: Daisy was raised in Columbus, Ohio, in a close‑knit Black family with roots in the American South and Ghana. Her mother, a registered nurse, and her father, a high‑school teacher, emphasized
    education, community service, and cultural pride. Growing up, she regularly attended church gatherings, Juneteenth celebrations, and African drumming workshops that reinforced her connection to both
    African and African‑American traditions. She speaks some Twi with relatives and enjoys sharing family recipes, such as collard greens and jollof rice, with friends. This blend of cultural influences
    informs her commitment to social equity, her love for community‑focused activities, and her desire to use her STEM training to give back to the communities that shaped her.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''SQL database querying'', ''Data visualization (Matplotlib, ggplot)'', ''Laboratory experimental design'', ''CAD modeling (SolidWorks)'',
    ''Project management'', ''Team collaboration'', ''Public speaking'', ''Conflict resolution'']'
  hobbies: '[''Zumba and hip‑hop dance classes'', ''Volunteering at local food bank'', ''Community STEM outreach tutoring'', ''Improvisational theater'', ''Experimenting with cooking (soul food and African
    cuisine)'', ''Meditation and yoga'', ''Playing video games with friends'', ''Podcast listening (tech, social justice, self‑development)'', ''Attending local museum exhibitions'']'
  career_goals: Daisy aspires to leverage her technical expertise to address health disparities in underserved communities. In the short term, she aims to secure an entry‑level data analyst or research
    assistant position at a public‑health organization or a nonprofit tech group focused on community empowerment, while also pursuing a master's degree in health informatics or data science to deepen her
    analytical skills. Long‑term, she envisions leading data‑driven initiatives that improve access to healthcare resources for minority populations, potentially as a data science manager or program director.
    She values workplaces that provide clear structure, supportive mentorship, and flexibility to maintain her mental well‑being, and she hopes to mentor younger Black students in STEM along the way.
