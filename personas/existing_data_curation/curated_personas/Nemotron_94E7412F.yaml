    explore new cultures'' ]'
  career_goals: Priya aims to become a district STEM curriculum coordinator, shaping instructional frameworks that blend innovative hands‑on projects with rigorous standards. She plans to earn a master’s
    degree in educational technology, publish research on culturally responsive STEM teaching, and expand after‑school makerspace programs that serve under‑represented students. Ultimately, she envisions
    mentoring a new generation of educators and establishing a community partnership hub that links local businesses, families, and schools to foster equitable access to STEM opportunities.
