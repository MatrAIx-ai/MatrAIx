personas:
  professional: Priya Singh, a veteran STEM educator in Florida, blends rigorous math and physics expertise with data‑driven assessment, interactive simulations, and bilingual instruction, channeling their
    disciplined organization and sociable energy into meticulously planned project‑based curricula and community outreach.
  sports: Priya Singh, an avid participant in the Orlando City SC fan club and a regular member of a local senior running group, hikes the Florida Trail each spring, enjoys weekend tennis matches at the
    community center, and occasionally joins a community badminton league, all while encouraging students to explore physics through sports analytics.
  arts: Priya Singh, who dances to both Bollywood classics and salsa rhythms, regularly attends performances at the Adrienne Arsht Center, follows musicians like A.R. Rahman and Carlos Vives, curates a
    multicultural playlist for their STEM club meetings, and judges student theater productions, finding artistic expression a vital complement to scientific inquiry.
  travel: Priya Singh prefers meticulously planned journeys that blend cultural immersion and relaxation, from revisiting family villages during Diwali celebrations to exploring the historic streets of
    Lisbon and the serene beaches of the Florida Keys, always packing a travel journal to document lessons for future classroom projects.
  culinary: Priya Singh, a passionate home chef, crafts South‑Asian‑inspired fusion dishes such as garam masala‑spiced shrimp and grits, tandoori paneer collard‑green tacos, and peach‑chutney barbecued
    chicken, growing heirloom tomatoes in a backyard garden, though they sometimes over‑salt sauces in their zeal for bold flavor.
  core: Priya Singh balances disciplined organization with a love for spontaneous spice experiments, community dance, and mentorship, turning every challenge into a lesson for others while occasionally
    forgetting to water the garden.
background:
  cultural: Born in Punjab, India, Priya grew up in a joint‑family environment that emphasized education, respect for elders, and community celebration of festivals such as Diwali and Holi. She migrated
    to the United States in her early twenties, settling in Florida where she blends her Indian heritage with American values. Priya maintains fluency in Hindi and Punjabi, regularly prepares traditional
    dishes for local cultural events, and incorporates stories of Indian scientific contributions into her teaching. Her cultural identity informs her commitment to fostering inclusivity, honoring diversity,
    and promoting intercultural understanding among her students and the wider community.
