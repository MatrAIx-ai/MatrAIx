persona_description: A scientist or researcher who specializes in the study of DNA, particularly in the field of bacteriophage research. This person has experience with the use of ultraviolet light and
  fluorescence detection to study the structure and properties of DNA molecules. They are skilled in the use of sucrose gradients and ethidium bromide to sediment DNA molecules and measure their relative
  sedimentation rates. They have a deep understanding of the relationships between DNA molecular weights and the distances they sediment in sucrose gradients, and are able to use this knowledge to correct
  for progressive sedimentation rates. This person has likely worked with intact bacteriophages and is familiar with their use in fluorescence detection.
