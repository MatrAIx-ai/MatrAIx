personas:
  professional: Angie Diamond is a budding junior scientist who transforms creek and farm explorations into Scratch interactive stories and school science fair projects, applying a blend of curiosity and
    pragmatic step‑by‑step planning, even though spontaneous bursts sometimes make them miss assignment deadlines.
  sports: Angie Diamond spends fall afternoons with the Riverdale Youth Soccer club, idolizes FC Barcelona’s midfielders for their teamwork, joins the school’s sprint track in spring, cheers on the local
    Valley Hawks minor‑league baseball team on weekends, and often leads impromptu recess games, channeling their energetic sociability into team play.
  arts: Angie Diamond channels artistic energy into sketching scenes from Rick Riordan’s adventure novels, painting bright acrylics inspired by Monet’s water lilies, building LEGO dioramas of mythic beasts,
    and dancing to Ariana Grande’s latest pop hits, where they eagerly mimic choreography from viral music videos.
  travel: Angie Diamond dreams of camping under the giant sequoias of Yosemite, snorkeling among coral reefs in Australia’s Great Barrier Reef to collect marine shells, and has already explored nearby strawberry
    farms and local creek trails, blending a love of nature with a yearning for far‑off aquatic adventures.
  culinary: Angie Diamond loves customizing homemade pizzas with pepperoni, mozzarella, pineapple, and fresh basil, mixes chocolate chip cookie dough on weekend afternoons, sips strawberry‑banana smoothies
    made with almond milk, and treats themselves to crunchy rock candy that echoes their fascination with collecting stones.
  core: Angie Diamond blends boundless curiosity with spontaneous energy, turning creek discoveries into Scratch creations, trading allowance for LEGO adventures, and staying calm even when deadlines loom.
background:
  cultural: Angie was born and raised in Soledad, a small agricultural town in Monterey County, California. Her family is of white, middle‑class background and has lived in the Central Valley for generations,
    working in agriculture and valuing hard work and community. Growing up, she has been exposed to the region’s blend of rural and coastal cultures – from strawberry fields and vineyards to the nearby
    Monterey Bay marine environment. The community’s annual Strawberry Festival, local farmers’ markets, and school events have fostered her appreciation for the outdoors and for multicultural interactions
    with the town’s sizable Latino population. Her upbringing emphasizes supportive family ties, participation in school clubs, and celebration of typical American holidays alongside local traditions, shaping
    a balanced and inclusive cultural identity.
