  career_goals: Angie's long‑term ambition is to become a marine biologist or environmental scientist who studies the Pacific coastline and helps protect the agricultural lands of Monterey County. She dreams
    of conducting field research, creating educational programs for kids, and one day leading a community science club where she can share her curiosity and practical knowledge. In the short term she aims
    to excel in school science fairs, master more advanced coding projects, and explore local wildlife through field trips.
