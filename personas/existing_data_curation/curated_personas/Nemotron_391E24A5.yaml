personas:
  professional: George Evans is a budding digital artist and aspiring game developer who merges their love of lakeside sketching with sandbox video game mechanics, regularly crafting stop‑motion animations
    and sharing them on YouTube while balancing school projects.
  sports: George Evans plays forward for the Hayward Youth Soccer Club, cheers for the San Jose Earthquakes and the Golden State Warriors, and they spend winter weekends building forts for snowball battles
    and summer afternoons fishing at Lake Berryessa, balancing competitive spirit with casual outdoor fun.
  arts: George Evans devours graphic novels by Alan Moore, watches Studio Ghibli films for animation inspiration, participates in school drama improv scenes, and they channel that admiration into sketching
    lake vistas in the style of Claude Monet while studying the works of contemporary street artist Banksy.
  travel: George Evans dreams of exploring the towering redwoods of Muir Woods, has already camped at Lake Tahoe and visited the tech museums of San Francisco, and they prefer flexible road trips with their
    family over rigid itineraries, often planning spontaneous stops at quirky roadside art installations.
  culinary: George Evans enjoys cooking simple meals like garlic butter shrimp tacos, mastering the perfect ramen broth, and they frequently snack on mac‑and‑cheese bites while experimenting with fresh
    herbs from the community garden to add flair to family dinners.
  core: George Evans is a curiosity‑driven teen who blends sketching, gaming, and stop‑motion creativity into a restless, slightly disorganized yet passionately competitive outlook on life, often worrying
    about missed details while chasing the next artistic spark.
background:
  cultural: George was born and raised in Hayward, a small city in Sawyer County, northern Wisconsin. His family traces its roots to German and Scandinavian immigrants who settled the region in the late
    1800s, bringing Lutheran and Catholic traditions that still shape community life. Growing up amid the Chequamegon–Nicolet forest and the area’s many lakes, he has been immersed in a culture that celebrates
    outdoor recreation—ice fishing, snowmobiling, county fairs, and lumberjack festivals are annual staples. The close‑knit nature of a rural town fosters a sense of mutual support, yet the decline of some
    traditional industries also leaves space for younger residents to explore creative outlets and digital media. These regional influences, combined with the broader American youth culture of online gaming
    and artistic self‑expression, give George a blend of Midwestern groundedness and modern curiosity.
