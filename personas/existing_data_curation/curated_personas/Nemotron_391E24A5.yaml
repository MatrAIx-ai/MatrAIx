  career_goals: He envisions a future where he can blend his love for art, technology, and the outdoors. George aspires to become a multimedia artist—such as a concept artist for video games or a documentary
    filmmaker—who can travel, work on varied projects, and push creative boundaries. He also entertains the idea of a seasonal role as a wildlife photographer or outdoor guide, giving him flexibility and
    a connection to the natural world. His competitive nature fuels ambition to earn scholarships or recognition for his artwork, and he hopes to eventually launch his own indie game or visual storytelling
    brand.
