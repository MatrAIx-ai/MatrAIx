    ''Basic first aid certification'', ''Volunteer coordination'', ''Creative problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Reading contemporary fiction and art history'', ''Participating in a small book club'', ''Hiking in nearby state
    parks'', ''Gardening (herbs and vegetables)'', ''Volunteering at the Bucyrus Food Bank'', ''Organizing community potlucks'', ''Puzzle solving (jigsaw puzzles, Sudoku)'', ''Landscape and street photography'',
    ''Knitting and crocheting'', ''Listening to folk and indie music'']'
  career_goals: Roberta aims to move into a supervisory position within the store's logistics team, such as shift manager or inventory control supervisor, within the next two to three years. To support
    this goal she plans to earn a supply chain management certification and possibly complete an associate degree in logistics through evening classes at a nearby community college. In the longer term she
    hopes to work as a supply chain coordinator for a regional distribution center, where she can apply her curiosity to develop innovative inventory solutions. She also wants to expand her role in community
    outreach by leading volunteer programs that connect the store with local charities and food banks.
