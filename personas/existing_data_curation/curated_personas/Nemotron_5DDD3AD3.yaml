personas:
  professional: Roberta Lafleur is a veteran stocker and order filler at a regional retailer who leverages her expertise in inventory control, Excel reporting, and safety compliance to streamline product
    flow, while her methodical nature and compassion make her a natural mentor for new hires and a rising candidate for a logistics supervisory role.
  sports: Roberta Lafleur enjoys cheering on the local high-school football team, the Bucyrus Bulldogs, follows the Ohio State Buckeyes football season, hikes regularly in Mohican State Park during summer,
    and participates in a casual weekend walking club that meets at Hocking Hills, balancing community fandom with personal outdoor activity.
  arts: Roberta Lafleur frequents the Columbus Museum of Art and the Marion Contemporary Arts Center, fills a sketchbook with watercolor studies inspired by Monet and local landscapes, captures street scenes
    with a DSLR in the style of Annie Leibovitz, and indulges in indie folk music from artists like The Lumineers and Bon Iver while knitting and crafting.
  travel: Roberta Lafleur prefers well-planned short road trips that blend nature and culture, having explored Hocking Hills, spent a weekend in Chicago’s art districts, and a memorable family visit to
    Quebec for its historic charm, while dreaming of a future immersion in the culinary scene of Lyon.
  culinary: Roberta Lafleur delights in weekend family-style crepes topped with Nutella and fresh strawberries grown in her herb garden, skillfully seasons roasted chicken with rosemary and thyme harvested
    at home, and enjoys cooking hearty Midwestern soups, though she sometimes forgets to defrost meat ahead of time.
  core: Roberta Lafleur blends meticulous inventory expertise with a creative, community-oriented spirit, channeling her small-town roots into leadership and artistic pursuits while occasionally neglecting
    personal downtime for puzzle-solving marathons.
background:
  cultural: Roberta grew up in a working-class white family in Bucyrus, Ohio. Her grandparents migrated from the French-Canadian regions of Quebec, bringing a modest French heritage that still appears in
    family traditions such as weekend crepes and occasional French phrases. The Midwestern small-town culture of strong community ties, self-reliance, and a diligent work ethic shaped her values. Though
    raised in a predominantly Protestant environment, her family's Catholic roots instilled a respect for service, prompting her involvement in local charities. She actively participates in town events
    like the Crawford County Fair, high-school football games, and celebrates mainstream American holidays while maintaining a personal appreciation for both regional crafts and contemporary art.
attributes:
  skills: '[''Inventory control and stock replenishment'', ''Order processing and fulfillment'', ''Barcode scanning and SKU management'', ''Warehouse safety compliance (OSHA)'', ''POS system operation'',
