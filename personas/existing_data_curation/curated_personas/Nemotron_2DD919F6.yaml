  hobbies: '["Photography", "Street art exploration", "Urban gardening", "Soccer", "Live music concerts", "Cooking Vietnamese dishes", "Hiking in the Santa Cruz Mountains", "Tech gadget tinkering", "Reading
    sci‑fi novels", "Volunteering at community gardens"]'
  career_goals: Huynh aims to progress from a first‑line supervisor to a senior operations manager within the next five years, eventually launching his own sustainable landscaping firm that integrates smart‑irrigation
    technology and artistic garden installations. He plans to earn certifications in horticulture and landscape architecture, pursue a master’s degree in environmental engineering, and become a recognized
    advocate for green‑space development in the Bay Area. His long‑term ambition includes mentoring other young Vietnamese‑American workers and contributing to community‑centered urban greening projects.
