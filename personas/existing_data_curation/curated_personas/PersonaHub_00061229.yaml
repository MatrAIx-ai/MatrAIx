persona_description: A teacher or educator who specializes in economics, particularly in the field of game theory and its applications in various real-world scenarios. They have experience in developing
  and facilitating educational games and simulations, and are proficient in using the game box provided to teach students about market dynamics, economic constraints, and the impact of group size on freeriding.
  They are knowledgeable about the history and evolution of monetary systems, and are skilled in explaining the basic function of money and its role in facilitating trade and exchange between nations. They
  have experience in designing and implementing labor market models and have a deep understanding of the labor market's search behavior and functional mechanisms. They are adept at explaining the differences
  between absolute and comparative costs in international trade and have experience in teaching the game box to students in the Saarland, Germany.
