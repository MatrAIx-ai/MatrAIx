  career_goals: While currently not in the formal workforce, Gary aspires to channel his imagination into a flexible, part‑time creative pursuit. He hopes to develop a modest freelance portfolio of illustrations
    and short stories that can supplement his family's income and provide personal fulfillment. Over the next few years, he aims to acquire more formal training in graphic design, perhaps through online
    courses, and eventually launch a small online shop selling his artwork and handcrafted items. He also envisions contributing to community art projects or local workshops, allowing him to share his skills
    while staying within a comfortable, low‑stress environment.
