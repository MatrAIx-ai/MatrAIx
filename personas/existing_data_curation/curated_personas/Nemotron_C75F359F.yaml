  hobbies: '[''Fishing'', ''Vegetable gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Playing chess'', ''Attending church services'', ''Building model trains'']'
  career_goals: As he approaches retirement, Nathan aims to sustain high sales performance while transitioning to a reduced‑hours advisory role that leverages his extensive industry knowledge. He seeks
    to mentor a select group of junior representatives to ensure a smooth handover of his client portfolio, and to negotiate a phased retirement plan that provides financial security for his family. Additionally,
    he aspires to leave a lasting legacy by documenting successful sales strategies and establishing a mentorship program within his company.
