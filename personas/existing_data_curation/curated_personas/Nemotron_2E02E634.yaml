  hobbies: '["scribbling with crayons", "building with wooden blocks", "solving simple wooden puzzles", "exploring tactile picture books", "listening to classical music", "observing patterns in nature",
    "quiet imaginative play", "sorting colored objects"]'
  career_goals: Although still a toddler, Tammie already hints at future aspirations that blend creativity and order. She often says she wants to "make pictures" and to "build things", signaling an interest
    in visual arts, illustration, or design. Her love for systematic play and calm focus also points toward potential careers in architecture, engineering, or library sciences, where she could merge artistic
    curiosity with methodical planning. Ultimately, her ambition is to create organized, harmonious visual works that can be enjoyed in quiet, contemplative settings.
