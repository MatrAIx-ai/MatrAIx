personas:
  professional: Tammie Lee is a tiny entrepreneur‑in‑training who spends hours arranging blocks and stuffed animals into meticulously labeled shelves, planning play‑time projects with methodical precision,
    and quietly out‑building peers in solo construction challenges, all while they maintain a calm, almost unflappable demeanor.
  sports: Tammie Lee is a budding gymnast who attends the Tiny Tigers toddler gymnastics club three times a week, eagerly watches the River City Rivermen baseball games on TV, and during winter prefers
    quiet indoor swimming lessons, often challenging themselves to beat their own lap times, all while they keep a competitive edge but still relish solitary practice.
  arts: Tammie Lee is an emerging little artist who spends quiet afternoons drawing abstract shapes with crayons, flipping through Eric Carle's picture books, humming the gentle piano lullabies of Mozart,
    and they collect stickers of famous painters as a secret treasure, showing a competitive streak in completing every coloring page before the next.
  travel: Tammie Lee is an exploratory toddler who loves car rides to the nearby botanical garden and the sandy shoreline of Seaside Beach, has already visited the San Diego Zoo, dreams of a quiet family
    trip to Kyoto’s bamboo forest, and they prefer calm, stroller‑friendly routes that allow them to observe without the bustle of crowds.
  culinary: Tammie Lee is a picky but adventurous eater who adores mashed sweet potatoes, banana pancakes, and the bright orange hue of carrot sticks, can stir play‑kitchen oatmeal with determination, yet
    they habitually scoop cereal straight from the box, reflecting a whimsical yet methodical approach to food.
  core: Tammie Lee, a calm and curious two‑year‑old, turns solitary play into organized competitions, saves sticker‑currency with meticulous care, and they navigate the world with a quiet confidence that
    rarely shows frustration.
background:
  cultural: She is raised in a White, middle-class family in Gainesville, Florida. Her parents value self-directed learning, politeness, and exposure to the arts. Frequent visits to the Florida Museum of
    Natural History, local galleries, and community art workshops have nurtured her curiosity about visual culture. The warm climate and abundant green spaces of North Central Florida provide a calm backdrop
    for solitary outdoor exploration. Her upbringing blends typical American middle-class values—emphasis on independence, quiet confidence, and respect for personal space—with a supportive environment
    that encourages her introverted disposition and appreciation for art.
attributes:
  skills: '["basic verbal communication (naming colors, objects)", "fine motor coordination (crayon drawing, block building)", "simple shape and color sorting", "following structured routines", "quiet solitary
