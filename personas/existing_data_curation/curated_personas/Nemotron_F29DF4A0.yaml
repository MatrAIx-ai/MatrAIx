  hobbies: '[''Hiking'', ''Landscape Photography'', ''Watercolor Painting'', ''Visiting Art Galleries'', ''Woodworking'', ''Reading Science Fiction and Philosophy'', ''Playing Bridge'', ''Attending Community
    Theater'', ''Gardening'', ''Volunteer Mentoring in Local Schools'']'
  career_goals: Approaching retirement, Randy aims to transition from day‑to‑day operations to a consultancy role where he can share his accumulated knowledge with emerging manufacturing firms in Utah County.
    He is passionate about mentoring the next generation of engineers, publishing a practical guide on lean production, and championing sustainability initiatives that reduce waste and energy consumption.
    Ultimately, Randy wants to leave a legacy of continuous improvement and community service while preserving enough personal time to enjoy his artistic and outdoor interests.
