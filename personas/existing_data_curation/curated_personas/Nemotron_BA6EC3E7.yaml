  career_goals: Lori aims to channel her lifelong passion for education into mentorship and community enrichment. Over the next few years she plans to mentor new teachers through a local retirees‑into‑education
    network, develop a neighborhood garden where she can lead sustainable‑gardening workshops for seniors, and author a reflective memoir that weaves together her teaching experiences and personal journey.
    She also seeks to adopt a regular mindfulness practice to mitigate her tendency toward worry, and to become more organized in managing her volunteer commitments while maintaining a low‑stress lifestyle.
