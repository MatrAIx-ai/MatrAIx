personas:
  professional: Janice Thibodeau is a seasoned financial manager who blends 25 years of analytical rigor—mastery of Power BI, Tableau, and multi-year forecasting—with a people‑centric, collaborative leadership
    style, using her curiosity‑driven yet pragmatic mindset to translate complex data into actionable strategies while navigating a relaxed, sometimes scattered schedule that keeps her open to new fintech
    tools.
  sports: Janice Thibodeau is an avid hiker who conquers the White Mountains on weekends, cheers for the Boston Red Sox and the Boston Bruins from her living room, and participates in a local Pilates group
    and the Merrimack Trail Club’s weekly runs, combining low‑impact fitness with a love for New England’s team spirit.
  arts: Janice Thibodeau lights up the stage with the Merrimack Community Players, where she relishes performing Arthur Miller’s ‘The Crucible,’ while also enjoying the music of folk legend Joan Baez and
    the contemporary films of Greta Gerwig, weaving those artistic influences into her social gatherings and cooking classes.
  travel: Janice Thibodeau’s travel style blends spontaneous road trips with modest planning, having driven up to Acadia National Park for lobster tasting, lingering in Quebec City to savor poutine and
    maple desserts, and dreaming of a future sailing excursion along the Atlantic coast, all while balancing her consultancy ambitions and family commitments.
  culinary: Janice Thibodeau's kitchen is a lively workshop where she perfects New England clam chowder, buttery lobster rolls, and French‑Canadian tourtière using fresh clams, maple syrup, and locally
    sourced butter, while her cooking classes often end with a glass of crisp Riesling and a heated debate over the best apple pie recipe.
  core: Janice Thibodeau navigates life with a curious yet practical outlook, juggling financial spreadsheets, hiking boots, and a flair for theater, all while occasionally misplacing her keys in the very
    trail she’s trekking.
background:
  cultural: Janice is a fourth-generation New Hampshire resident of French-Canadian descent; the Thibodeau surname traces back to ancestors who migrated from Quebec to New England in the early 20th century.
    Raised in a modest, bilingual household that celebrated both traditional Catholic holidays and New England community festivals, she developed a strong sense of self-reliance, civic responsibility, and
    appreciation for the region’s seasonal rhythms. Her cultural identity blends the pragmatic, down-to-earth ethos of rural New England with the warmth and familial closeness characteristic of French-Canadian
    heritage, influencing her collaborative leadership style and her commitment to community-focused initiatives.
attributes:
  skills: '[''Financial analysis'', ''Budgeting and forecasting'', ''Risk management'', ''Strategic planning'', ''Investment portfolio review'', ''Regulatory compliance'', ''Data visualization (Power BI,
