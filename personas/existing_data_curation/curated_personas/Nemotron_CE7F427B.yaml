  hobbies: '[''Hiking the White Mountains'', ''Community theater acting'', ''Book club participation'', ''Cooking classes focusing on New England and French-Canadian cuisine'', ''Volunteering for financial-literacy
    workshops'', ''Gardening'', ''Board game nights with friends'', ''Pilates and group fitness classes'']'
  career_goals: Janice aims to transition from her current financial manager role to a director-level position within the next three years, positioning herself as a strong contender for a chief financial
    officer role at a mid-size manufacturing or technology firm in New England. To support this trajectory, she is pursuing a CPA certification and enrolling in an ESG finance specialization to integrate
    sustainable investing into corporate strategy. She also envisions launching a boutique consultancy after achieving senior executive status, focusing on financial literacy and strategic planning for
    small businesses and nonprofit organizations in her community. Mentoring emerging women leaders in finance remains a personal ambition, reflecting her cooperative yet assertive personality.
