  career_goals: Although retired from formal employment, Courtney aims to author a memoir that chronicles her family's journey from the Deep South to California, preserving an African-American history for
    future generations. She hopes to establish a neighborhood heritage garden that serves both as a green space and an educational platform for local schools. Courtney also plans to mentor young adults
    interested in museum studies and community activism, offering workshops on archival techniques and grant writing. Ultimately, she aspires to travel to Ghana and other sites of the African diaspora to
    deepen her cultural connections and share those experiences through public talks.
