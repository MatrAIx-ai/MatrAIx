personas:
  professional: Courtney German, a retired community archivist and event coordinator, blends meticulous project planning with a deep commitment to preserving local narratives, channeling decades of experience
    in museum exhibitions, grant writing, and mentorship into a forthcoming memoir and a neighborhood heritage garden that serves as an outdoor classroom.
  sports: Courtney German follows the Los Angeles Lakers and the LA Galaxy with avid enthusiasm, participates in a senior walking club that meets at Playa Del Rey beach for sunrise strolls, and schedules
    weekly gentle yoga sessions to keep her joints supple and her competitive spirit sharp.
  arts: Courtney German is a regular at community theater productions, a lifelong admirer of gospel choirs and jazz ensembles, and a dedicated reader of both Jane Austen and authors such as Toni Morrison,
    while her evenings are often spent quilting intricate patterns inspired by traditional storytelling.
  travel: Courtney German favors carefully planned, culturally immersive trips, having already visited New Orleans for its historic music scene and the Caribbean to experience Afro‑Caribbean rhythms, while
    she now saves for a pilgrimage to Ghana where she hopes to trace ancestral ties and share her journey in public talks.
  culinary: Courtney German transforms classic soul food into health‑conscious meals, seasoning collard greens with smoked paprika and kale, baking sweet potato pie with a quinoa crust, and grilling catfish
    with citrus‑herb glaze, all while sourcing heirloom ingredients at farmer’s markets and occasionally battling a sweet tooth for sugary biscuits.
  core: Courtney German, a methodical retired archivist with a green thumb and a love for storytelling, balances disciplined budgeting, proactive health habits, and a competitive love of sports with a penchant
    for soulful cooking and a lingering habit of forgetting to floss.
background:
  cultural: Courtney is an African-American woman whose family migrated from the Mississippi Delta to the West Coast during the Great Migration, bringing with them deep-rooted traditions of gospel music,
    storytelling, and community solidarity. Growing up in the 1960s and 1970s, she witnessed the civil-rights movement and its lasting impact on her worldview, fostering a strong sense of cultural pride
    and advocacy. Her cultural identity is shaped by a blend of Southern heritage, West-Coast urban influences, and the vibrant Afro-Caribbean rhythms that echo in her family's celebrations. These experiences
    inform her commitment to preserving Black history, supporting intergenerational dialogue, and celebrating the richness of African-American contributions to Los Angeles' cultural tapestry.
attributes:
