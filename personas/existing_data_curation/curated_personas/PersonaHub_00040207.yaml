persona_description: A scientist who studies the dynamics and variability of sea ice in the Arctic and Antarctic. She is particularly interested in the spatial and temporal variations of ice thickness,
  as well as the functions of sea ice in conveying fresh water and transporting contaminants and biota. She is aware of the key scientific questions regarding sea ice, such as its thickness, age, quality,
  and variability. She is knowledgeable about the movements of sea ice and the role of the Transpolar Drift Stream in transporting ice across the Arctic. She is interested in the role of the old ice core
  in regulating the Arctic climate and habitat.
