  career_goals: Kathy aspires to progress into senior operations leadership, targeting roles such as Director of Operations or Chief Operating Officer within the next five years. She aims to spearhead large‑scale
    digital transformation initiatives that leverage AI and automation to drive efficiency. Pursuing a Six Sigma Black Belt and PMP certification is a priority, as is obtaining an MBA to broaden strategic
    business acumen. Additionally, she plans to mentor emerging talent, develop a regional operational excellence program, and become a recognized thought leader in data‑driven process improvement.
