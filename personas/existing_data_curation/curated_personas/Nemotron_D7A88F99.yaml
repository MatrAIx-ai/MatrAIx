  career_goals: Raymond hopes to turn his love of technology and games into a future career as a software engineer, ideally specializing in video‑game development where he can blend creativity with practical
    coding skills. He also wants to stay connected to his community by mentoring younger kids in after‑school tech clubs or coaching neighborhood sports teams. While he dreams of working in a dynamic, innovative
    field, he values a stable, supportive environment that helps manage his stress and allows flexibility for his varied interests.
