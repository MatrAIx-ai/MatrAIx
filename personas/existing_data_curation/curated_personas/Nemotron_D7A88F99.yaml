personas:
  professional: Raymond Loredo, a budding robotics enthusiast and LEGO architect, blends curiosity with practicality by designing competition‑ready robots during after‑school club sessions, while embracing
    a relaxed attitude toward deadlines that often leads to improvising solutions on the fly with friends.
  sports: Raymond Loredo darts between the neighborhood basketball court and the local youth soccer league, cheering loudly for St Louis City SC and the St Louis Cardinals, and mixes a love of team camaraderie
    with a habit of staying up late gaming, occasionally neglecting proper stretching after intense matches.
  arts: Raymond Loredo savors the raw riffs of B.B. King on a backyard speaker while pounding the drums for a middle‑school jazz‑rock band, devouring graphic novels like Bone during study breaks, and often
    doodles comic panels inspired by the city’s vibrant murals.
  travel: Raymond Loredo explores St Louis’s City Museum and the Gateway Arch on weekend adventures, dreams of catching live jazz in New Orleans and strolling the Oktoberfest grounds in Munich, yet prefers
    last‑minute trips with friends over meticulously planned itineraries due to a modest allowance.
  culinary: Raymond Loredo craves crunchy toasted ravioli and gooey butter cake, often orders St Louis‑style pizza drenched in Provel cheese, while experimenting at home with simple schnitzel recipes and
    constructing LEGO‑inspired snack platters for friends’ game nights.
  core: Raymond Loredo is a hyper‑social teen who blends a love of robotics and blues with spontaneous gaming marathons, yet habitually misplaces school assignments amid a sea of LEGO bricks.
background:
  cultural: Raymond grew up in an urban, middle‑class white family in St. Louis, Missouri. His household reflects typical Midwestern values—emphasis on community, modesty, and a strong work ethic—while
    also absorbing the city’s diverse cultural influences. He enjoys local traditions such as attending St. Louis Cardinals baseball games, listening to blues and jazz music, and celebrating holidays like
    Thanksgiving, Christmas, and occasional German‑heritage events such as Oktoberfest, reflecting his family’s ancestral roots. The multicultural environment of St. Louis has given him exposure to a variety
    of foods, music, and community festivals, shaping his open, sociable outlook.
