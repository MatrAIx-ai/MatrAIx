personas:
  professional: Sandra Minasian, a 39-year-old software architect, combines a methodical, user‑centric mindset with clean architecture, RESTful and GraphQL APIs, and DevOps pipelines to build accessible
    health‑tech platforms, and they mentor underrepresented developers while championing inclusive design.
  sports: Sandra Minasian enjoys solitary early‑morning walks in Shelby Farms Park, joins a casual Memphis Grizzlies fan club for game nights at home, and they participate in a community cycling group during
    spring, preferring low‑impact cardio over competitive sports.
  arts: Sandra Minasian finds solace in listening to Beethoven’s Ninth Symphony and Hilary Hahn’s violin recordings, devours classic novels by Jane Austen and Fyodor Dostoevsky, and they attend the Memphis
    Symphony Orchestra’s chamber concerts whenever time permits.
  travel: Sandra Minasian plans meticulously for solo retreats, having visited Kyoto’s meditation temples and Asheville’s Blue Ridge Mountains, and they dream of a low‑key cottage stay in the Scottish Highlands
    for a quiet writing and knitting getaway.
  culinary: Sandra Minasian cultivates a small indoor herb garden of basil, thyme, and mint, regularly cooks Mediterranean dishes like grilled halloumi with roasted vegetables, and they experiment with
    homemade kimchi, while occasionally ordering take‑out pizza to unwind after a long coding sprint.
  core: Sandra Minasian blends hyper‑organization with a compassionate heart, juggling code reviews, weekly knitting sessions, and persistent worry about project deadlines, all while they sip herbal tea
    and perfect Sudoku puzzles.
background:
  cultural: 'Sandra’s family traces its roots to Armenia, and she maintains a connection to that heritage through language, cuisine, and occasional attendance at the local Armenian Apostolic Church. Growing
    up in Memphis, Tennessee, she also absorbed Southern cultural influences: the city’s blues and soul music scene, the tradition of barbecue, and a strong sense of community hospitality. This blend of
    Armenian and Southern culture informs her compassionate outlook, her love of communal service, and her appreciation for quiet moments spent with family over homemade meals.'
