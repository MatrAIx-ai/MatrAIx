  career_goals: Sandra aims to transition into a senior technical leadership role—such as lead developer or software architect—within an organization that prioritizes user health and inclusive design. She
    wants to champion projects that deliver reliable, secure, and accessible solutions, especially in health‑tech. She also plans to obtain cloud certifications (AWS Solutions Architect) and deepen her
    expertise in scalable infrastructure while maintaining a remote, structured work environment that supports her mental wellbeing. Outside of work, she aspires to mentor underrepresented programmers in
    Memphis and eventually launch a nonprofit coding initiative for single parents, combining her organized approach with her compassionate drive.
