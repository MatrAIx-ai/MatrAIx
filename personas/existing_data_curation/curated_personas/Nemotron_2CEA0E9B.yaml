  career_goals: At this stage, Charles aims to move into a senior supervisory role, such as a safety officer or field trainer, where he can mentor younger operators and shape safety culture on rigs. He
    plans to obtain advanced certifications in well control and offshore safety, positioning himself for a transition into renewable‑energy infrastructure projects (e.g., offshore wind turbine installation).
    Long‑term, he hopes to establish a consulting practice that leverages his deep industry knowledge while allowing a more balanced, less stressful lifestyle as he approaches retirement.
