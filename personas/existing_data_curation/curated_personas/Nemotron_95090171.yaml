    ''Content strategy and digital storytelling'']'
  hobbies: '[''Acrylic and watercolor painting'', ''Local theater performances'', ''Community art workshops'', ''Book club (literature and philosophy)'', ''Hiking in the Great Smoky Mountains'', ''Yoga
    and mindfulness meditation'', ''Photography'', ''Gardening (herbs and vegetables)'', ''Cooking experimental recipes'', ''Volunteering at the Maryville History Museum'']'
  career_goals: Sherry aims to leverage her technical skills and artistic sensibility to lead community‑focused digital projects in the Appalachian region. She plans to mentor junior developers, especially
    women and seniors entering tech, and to create accessible, culturally resonant websites for local museums, arts organizations, and small businesses. Over the next five years she hopes to transition
    into a consultancy role that blends user‑centered design with heritage preservation, and eventually author a guide on integrating humanities perspectives into modern web development. She also seeks
    a balanced workload that supports her well‑being, emphasizing flexible arrangements and collaborative environments.
