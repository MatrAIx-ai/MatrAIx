personas:
  professional: Sherry Chan, a 63‑year‑old web developer with a humanities‑focused background, blends meticulous front‑end craftsmanship in React and Vue with a storyteller’s eye for accessible design,
    channeling her curiosity and collaborative spirit into mentoring junior developers and crafting culturally resonant digital experiences for Appalachian museums.
  sports: Sherry Chan embraces an active lifestyle through seasonal hikes in the Great Smoky Mountains, regular vinyasa yoga at her local studio, and cheering on the Tennessee Titans while belonging to
    the Knoxville Hiking Club and a community cycling group.
  arts: Sherry Chan immerses herself in the arts by painting acrylic landscapes inspired by Monet, curating photography collections of Appalachian folklore, attending Tennessee Williams productions at the
    Lyric Theatre, and leading a book club that dissects classics by Woolf and contemporary philosophy from Žižek, all while humming to the tunes of Leonard Cohen during her studio sessions.
  travel: Sherry Chan favors thoughtfully planned trips that blend cultural immersion and nature, having trekked the Appalachian Trail, explored the historic streets of Savannah, and dreamed of a spring
    pilgrimage to Kyoto’s Zen gardens, all while balancing a modest travel budget with her love for heritage sites.
  culinary: Sherry Chan enjoys experimental cooking, often crafting herb‑crusted salmon with rosemary and thyme from her garden, whipping up a spicy Thai green curry with fresh basil, and perfecting a wild
    mushroom risotto topped with a splash of aged balsamic, showcasing her intermediate‑to‑advanced skill set and love for bold flavors.
  core: Sherry Chan, a tech‑savvy artist‑mentor at 63, balances code and canvas with a penchant for late‑night debugging, occasional overspending on art supplies, and a gentle, worry‑prone heart that fuels
    both community projects and a love for mindful living.
background:
  cultural: Sherry is a white American who grew up in a middle‑class family in the Midwest before moving to Maryville, Tennessee in her thirties. Her upbringing emphasized education, community involvement,
    and an appreciation for the arts, values that were reinforced by a liberal arts curriculum in college. Living in east Tennessee, she has embraced Southern hospitality, the region’s folk music traditions,
    and a strong sense of local pride. Her cultural identity blends Midwestern pragmatism with Appalachian cultural motifs, influencing her collaborative work style, her love for storytelling through both
    visual and digital media, and her commitment to fostering inclusive community spaces.
attributes:
  skills: '[''Front-end development (HTML5, CSS3, JavaScript)'', ''React and Vue frameworks'', ''Responsive web design'', ''Accessibility compliance (WCAG)'', ''User experience (UX) and visual storytelling'',
