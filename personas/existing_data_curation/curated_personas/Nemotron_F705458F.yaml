  career_goals: Anatolia aspires to turn her artistic abilities and organizational talent into a career in visual communication, ideally as a graphic designer or brand strategist focused on cultural projects.
    She plans to enroll in a community college associate‑degree program in Graphic Design, followed by a Bachelor’s in Visual Arts, and hopes to secure an internship at a local design agency or museum.
    In the long term she envisions opening her own studio that creates bilingual branding and promotional material for small businesses and cultural institutions, while also offering art‑therapy workshops
    to help people manage anxiety. Her competitive nature drives her to aim for industry certifications (Adobe Certified Expert) and to build a portfolio that stands out in the Texas creative scene.
