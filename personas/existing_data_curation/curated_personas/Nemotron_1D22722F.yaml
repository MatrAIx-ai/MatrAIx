  career_goals: Howard aims to transition from senior graphic designer to art director within the next three years, eventually founding his own boutique studio that specializes in visualizing complex scientific
    and energy‑sector data for Houston’s oil & gas and renewable tech companies. He intends to develop a signature style that merges data‑driven precision with bold, experimental aesthetics, and plans to
    mentor emerging designers through workshops and community talks. His competitive drive and emotional resilience position him to handle high‑pressure client projects while maintaining a balanced, spontaneous
    work rhythm.
