  hobbies: '[''Reading non‑fiction (medical history, self‑improvement)'', ''Gardening (herbs and vegetables)'', ''Birdwatching'', ''Wooden model building'', ''Calligraphy'', ''Journaling'', ''Genealogy
    research'', ''Listening to classical music'']'
  career_goals: Ronald aims to deepen his clinical knowledge by obtaining a Certified Nursing Assistant (CNA) credential within the next year, followed by an associate degree in nursing. He aspires to transition
    into a supervisory role such as Home Health Care Coordinator, where his organizational skills and compassionate outlook can improve care delivery for multiple clients. Long‑term, he envisions founding
    a small, community‑focused home care agency that emphasizes personalized, dignified care for seniors, especially those with chronic conditions or dementia.
