personas:
  professional: Emily Silva is a master carpenter who fuses structural engineering with bold, colorful design, leveraging her proficiency in SketchUp and CNC machining while mentoring apprentices; their
    curious nature drives experimental projects, but their tendency to overthink deadlines sometimes leads to late‑night revisions.
  sports: Emily Silva enjoys hiking the limestone caves around Camuy with the local Camuy Hiking Club, attends weekly salsa dance classes for cardio, and follows the Cangrejeros de Santurce baseball team
    and the Capitanes de Arecibo basketball squad; they try to jog before work but often skip warm‑ups after long days of carpentry.
  arts: Emily Silva frequents the Museo de Arte de Puerto Rico, draws inspiration from the vibrant paintings of José Campeche and the rhythms of Willie Colón, and spends evenings painting reclaimed wood
    panels while sharing DIY tutorials on their blog; their love of color sometimes leads them to over‑decorate functional pieces.
  travel: Emily Silva combines work and wanderlust by taking weekend trips to Vieques and Culebra for beachside inspiration, has visited Barcelona for a design expo, and dreams of exploring Copenhagen’s
    sustainable architecture, though they sometimes feel anxious about flying and prefer road trips.
  culinary: Emily Silva delights in cooking traditional dishes like mofongo relleno, arroz con gandules, and lechón seasoned with sofrito and adobo, often preparing meals on a reclaimed‑wood serving board
    while sharing recipes on their blog; they occasionally over‑salt their sauces when experimenting with new flavor combos.
  core: Emily Silva blends artistic curiosity with hands‑on craftsmanship, balancing meticulous planning and spontaneous creativity while wrestling with anxiety and a penchant for splurging on sustainable
    materials.
background:
  cultural: Emily’s Puerto Rican heritage deeply shapes her worldview and craft. Growing up in Camuy, a town known for its limestone caves and strong communal ties, she internalized the island’s emphasis
    on family, resilience, and celebration of vibrant culture. She incorporates traditional motifs such as floral patterns and bright color palettes into her woodworking, while respecting the sustainability
    practices of island artisans. Her fluency in Spanish and immersion in local festivals like La Paranda reinforce a sense of identity that she channels into collaborative community projects and mentorship
    of younger tradespeople. The blend of Caribbean warmth and the pragmatic spirit of rural Puerto Rico informs both her personal values and professional aesthetic.
attributes:
  skills: '[''Custom Furniture Fabrication'', ''Cabinet Making'', ''Structural Framing'', ''Blueprint Reading'', ''Tool Maintenance'', ''Safety Compliance'', ''Digital Design (SketchUp)'', ''CNC Machining'',
    ''Project Coordination'', ''Team Leadership'']'
  hobbies: '[''Sketching Furniture Designs'', ''Painting on Reclaimed Wood'', ''Hiking in Camuy Caves'', ''Reading Design & DIY Magazines'', ''Maintaining a Carpentry Blog'', ''Salsa and Bomba Dancing'',
    ''Cooking Puerto Rican Cuisine'', ''Attending Art Exhibitions'', ''Volunteer Community Renovation'']'
  career_goals: Emily aims to become a master carpenter recognized for blending artistic flair with structural integrity. Over the next five years she plans to earn a journeyman certification, expand her
    knowledge of sustainable building materials, and obtain a LEED Green Associate credential. She dreams of opening her own boutique workshop in Camuy that offers custom, eco‑friendly furniture and provides
    apprenticeships for local youth. She also wants to lead community renovation projects that restore historic homes in Puerto Rico, preserving cultural heritage while introducing modern, resilient construction
    methods.
