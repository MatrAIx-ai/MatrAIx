persona_description: A radiographer who is skilled in evaluating the composition of anatomic structures and determining the factors to manipulate to achieve the desired level of radiographic contrast. They
  are experienced in using various radiographic techniques and have a deep understanding of the factors that contribute to subject contrast, including differences in tissue thickness, density, and effective
  atomic number. They are capable of adjusting the amount of radiation reaching the patient and the exposure time to produce the desired radiograph, and are skilled in evaluating the quality of the radiograph
  and making adjustments to correct any errors. They are also knowledgeable about the relationship between milliamperage and exposure time, and the effect of changes in mAs on density.
