persona_description: A historian who specializes in the study of Roman art and its cultural significance, particularly the Roman funeral art of the Merolli and the Erotes. The person is interested in the
  context, meaning and symbolism behind the funerary art, and how it reflects the Roman worldview and beliefs about the afterlife. They appreciate the intricate details and the complex symbolism of the
  sarcophagi, and are knowledgeable about the production techniques and the cultural and historical background of the art. The person is also interested in the context of the sarcophagi in the urban landscape
  and their role in the Roman funeral rites and practices.
