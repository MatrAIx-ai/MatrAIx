personas:
  professional: Donald Gaddy leads fast‑casual restaurant operations with a data‑driven focus on SOPs, inventory analytics, and staff coaching, leveraging their practical, structured mindset and sociable,
    competitive streak to turn every shift into a performance metric while energizing teams through clear communication.
  sports: Donald Gaddy is a devoted Buffalo Bills supporter who attends home games at New Era Field with family, follows the Buffalo Sabres hockey season, joins a local adult softball league in summer,
    and completes weekly hikes at Niagara Falls State Park to stay fit.
  arts: Donald Gaddy blends a love for stage presence with comedy, performing stand‑up at local open‑mic nights while also enjoying the music of Bruce Springsteen, the storytelling of Dave Chappelle, and
    the photography of historic Buffalo architecture captured in their own Instagram feed.
  travel: Donald Gaddy plans trips with the precision of a restaurant schedule, favoring weekend road trips to Niagara‑on‑the‑Lake for wine tasting, annual family vacations to New York City’s culinary festivals,
    and dream trips to Portland Oregon’s craft‑brew scene, balancing budget constraints with a hunger for new flavors.
  culinary: Donald Gaddy experiments in the kitchen by perfecting Buffalo wing sauces with a blend of cayenne, garlic, and butter, while also exploring Korean gochujang‑glazed chicken and crafting farm‑to‑table
    dishes featuring local apples, rosemary, and artisanal cheeses, cooking with intermediate skill but sometimes cutting corners with pre‑made marinades when pressed for time.
  core: Donald Gaddy is a data‑driven restaurateur who channels competitive energy into community‑focused dining, thrives on the buzz of crowds, and balances meticulous planning with a penchant for spontaneous
    wing‑sauce experiments.
background:
  cultural: Donald grew up in upstate New York’s Erie County, a region shaped by a blend of Mid‑Atlantic and Great Lakes cultures. His family heritage traces back to German and Irish immigrants who settled
    in western New York in the early 20th century, instilling values of hard work, modesty, and community involvement. He is deeply connected to Buffalo’s local traditions—celebrating events like the Taste
    of Buffalo, supporting the city’s craft‑brew scene, and championing regional foods such as wings, beef on weck, and cheese curds. While he identifies as white American, Donald appreciates the diverse
    immigrant influences that enrich the area’s culinary landscape, and he often incorporates this cultural awareness into his menu concepts and community outreach.
