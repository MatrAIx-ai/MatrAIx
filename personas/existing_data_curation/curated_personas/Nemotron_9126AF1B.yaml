  career_goals: Donald aims to transition from managing a single outlet to a multi‑unit leadership role within the next five years, targeting a regional director position that oversees several locations
    across New York State. He is also cultivating a long‑term plan to launch his own boutique gastropub that highlights local farms, sustainable sourcing, and a rotating craft‑brew menu—an ambition that
    aligns with his competitive drive to set a new benchmark for quality and profitability in the Buffalo dining scene. To support these goals, he intends to obtain Certified Food Safety Manager credentials,
    complete an executive hospitality‑management certificate program, and build a professional network through the Buffalo Hospitality Association. Ultimately, Donald wants to be recognized as a thought
    leader in operational efficiency and community‑focused dining, mentoring emerging managers and contributing articles to industry publications.
