  career_goals: Paul aims to become a senior quantitative analyst or principal research scientist within the next five years, leading a team that tackles high‑impact, data‑intensive problems in healthcare
    or sustainable engineering. He intends to pursue a master's degree—and eventually a Ph.D.—to deepen his theoretical expertise and to publish in top peer‑reviewed journals. Long‑term, he envisions establishing
    his own consultancy that translates advanced mathematical models into actionable strategies for midsized firms, while maintaining a stable family life and contributing to his local community through
    mentorship and outreach. His career trajectory balances his curiosity for cutting‑edge research with a pragmatic focus on measurable outcomes and high professional standards.
