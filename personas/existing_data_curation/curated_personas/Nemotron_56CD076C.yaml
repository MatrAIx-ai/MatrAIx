  career_goals: Jessica aims to transition from first-line supervision to a plant-wide operations manager role within the next five years, overseeing strategic initiatives such as digital transformation,
    sustainable manufacturing, and advanced automation integration. She plans to complete a Six Sigma Black Belt certification and an executive leadership program to strengthen her strategic planning capabilities.
    Long-term, she envisions mentoring the next generation of production leaders, championing a culture of innovation and employee well-being, and possibly leading a cross-functional innovation lab that
    explores novel product concepts and process designs.
