personas:
  professional: Jessica Mero, a seasoned production supervisor with a degree in industrial engineering, leverages lean manufacturing, advanced analytics, and a flair for abstract problem‑solving to streamline
    plant workflows while mentoring front‑line teams toward a harmonious, data‑driven culture as they eye a plant‑wide operations manager role.
  sports: Jessica Mero, a devoted fan of the Seattle Seahawks, the Portland Trail Blazers, and the Idaho Steelheads, they regularly lace up for the Coeur d'Alene Trail Runners Club’s weekend hikes and join
    a local pickleball league at the Moscow Community Center, balancing competitive spirit with low‑impact fitness.
  arts: Jessica Mero, an avid abstract watercolorist and experimental photographer, draws inspiration from Jackson Pollock’s gestural splashes, Ansel Adams’ stark mountain vistas, and the speculative fiction
    of Ursula K. Le Guin, while they lead quarterly art‑craft workshops that guide youth through collaborative collage projects.
  travel: Jessica Mero, a nature‑focused traveler who packs meticulously, prefers road‑trip adventures to Banff and Glacier National Park and dreams of kayaking the fjords of Norway, yet they balance wanderlust
    with family commitments by scheduling short weekend getaways to Leavenworth, Washington, and local harvest festivals.
  culinary: Jessica Mero, a home‑chef who cultivates rosemary, thyme, and sage in a modest herb garden, delights in grilling fresh trout with a lemon‑herb glaze, crafting wild mushroom risotto with locally
    sourced Idaho potatoes, and they occasionally indulge in a steaming bowl of German‑style sauerkraut‑laden pork stew, reflecting their blend of seasonal simplicity and occasional comfort‑food cravings.
  core: Jessica Mero blends a rigorously organized engineering mindset with a vivid artistic imagination, habitually sketching process flowcharts in watercolor margins, while they often lose track of time
    solving late‑night logic puzzles.
background:
  cultural: Jessica's cultural identity is rooted in a Midwestern-Western American heritage, with family ancestry tracing back to German and Scandinavian immigrants who settled in the Pacific Northwest
    in the early 20th century. Growing up in Idaho, she embraces the region's values of self-reliance, community cooperation, and reverence for the outdoors. She participates in local harvest festivals,
    supports regional conservation efforts, and respects the traditions of the neighboring Coeur d'Alene Tribe, integrating an inclusive, harmony-focused perspective into both her personal and professional
    life.
attributes:
