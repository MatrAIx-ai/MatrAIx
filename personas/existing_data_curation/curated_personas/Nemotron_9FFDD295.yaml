personas:
  professional: Stella Sanchez is a budding digital illustrator and novice game creator who channels their curiosity into sketching vibrant characters on a tablet and building simple Scratch games, using
    their relaxed attitude toward deadlines to let ideas evolve organically while their outgoing nature fuels collaborative brainstorming with friends.
  sports: Stella Sanchez kicks a soccer ball with the mixed‑age crew at the neighborhood park, proudly wears the jersey of Inter Miami CF and trains with the Miami United Youth Soccer Club, channeling their
    sociable energy into fast‑paced games while occasionally neglecting proper warm‑ups and stretching after practice.
  arts: Stella Sanchez fuels their artistic spark by sketching characters inspired by local street murals while binge‑watching Studio Ghibli films, devouring graphic novels by Naoki Urasawa, jamming to
    the upbeat beats of Bad Bunny and the timeless vocals of Celia Cruz, and crafting quick drawing tutorials for TikTok that blend pop culture references with vibrant, comic‑book style visuals.
  travel: Stella Sanchez dreams of hopping from the bright sands of Miami Beach to the thrill of Orlando’s theme parks and, one day, the historic streets of Barcelona, preferring spontaneous family‑planned
    road trips over rigid itineraries while balancing a modest allowance that restricts long‑haul flights to special birthday gifts.
  culinary: Stella Sanchez whips up tiny batches of cinnamon‑spiced empanadas and silky coconut flan alongside their grandmother, proudly experimenting with ingredients like masa harina, sweetened condensed
    milk, and a pinch of nutmeg, while their budding kitchen confidence is evident in the occasional over‑filled pastry that leaks a delicious mess onto the countertop.
  core: Stella Sanchez is a curiosity‑driven, sketch‑loving 12‑year‑old who balances spontaneous creativity with a laid‑back, slightly disorganized lifestyle, turning impromptu art sessions and TikTok dances
    into joyful bursts of self‑expression.
background:
  cultural: Stella was born and raised in Hialeah, a vibrant enclave of Cuban-American life where Spanish is spoken on the streets and Cuban rhythms echo from local cafés. Her parents immigrated from Havana,
    bringing with them family recipes, stories of tradition, and a deep appreciation for community celebrations like Noche de San Juan and the annual Carnaval Cubano. Growing up, she has balanced the rich
    cultural tapestry of her household—cooking together with her abuelos, learning the steps of salsa, and hearing tales of Cuban folklore—with the multicultural environment of her middle school. This dual
    exposure fuels her artistic sensibility, encouraging her to blend bright Caribbean colors, rhythmic patterns, and bilingual narratives in her work. Stella also values the strong family bonds and collective
    spirit typical of her community, which inspire her desire to give back through creative projects that highlight and preserve her heritage.
