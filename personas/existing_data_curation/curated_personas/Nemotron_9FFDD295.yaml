  career_goals: Stella dreams of turning her love for art into a lifelong career, envisioning herself as a professional illustrator or graphic designer who creates vibrant stories that celebrate her Cuban
    heritage. She hopes to earn a scholarship to a specialized arts high school in Miami, then pursue a degree in visual arts or multimedia design. In the longer term, she wants to combine art with community
    work—perhaps founding a youth art program in Hialeah that uses creative projects to bridge cultural gaps and empower other kids. She is also curious about the emerging field of digital content creation
    and sees herself one day producing engaging videos that blend animation, music, and cultural storytelling.
