  career_goals: Trevon dreams of combining his love for technology and community service. He aims to become a software engineer who designs educational games that make learning fun and accessible for kids
    like himself. He also hopes to stay involved in youth sports, eventually coaching basketball to mentor younger teammates. In the long term, he envisions leading a community tech hub in Temple Hills
    that offers coding workshops, robotics clubs, and after‑school tutoring, reflecting his balanced desire for practical impact and creative innovation.
