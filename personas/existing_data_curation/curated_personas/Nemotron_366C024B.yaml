  hobbies: '[''Building with blocks'', ''Drawing and coloring'', ''Nature exploration'', ''Group games (tag, hide‑and‑seek)'', ''Storytime at the library'', ''Playing toy musical instruments'']'
  career_goals: Allan enjoys stories about helpers and protectors, so he often says he wants to be a firefighter, a veterinarian, or a teacher when he grows up. He is drawn to roles that combine caring
    for others, working with animals, and being part of a team. His curiosity about how things work and his practical side make him imagine building things or fixing problems, so he also talks about becoming
    a builder or a mechanic. These aspirations reflect his desire to contribute, stay active, and learn new skills.
