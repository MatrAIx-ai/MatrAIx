personas:
  professional: Randall Kendrix, an 81-year-old retired humanities scholar turned community archivist, harnesses a lifelong curiosity about the past and a methodical planner’s mindset to lead oral-history
    projects, mentor volunteers in archival techniques, and craft a memoir that weaves personal recollections with broader Southern history; they are competitive about the accuracy and completeness of their
    work, often double-checking sources before committing them to the town library’s new archive.
  sports: Randall Kendrix follows the Atlanta Braves baseball team on television, participates in a low-impact walking club that meets thrice weekly at the town park to observe local bird migrations, and
    occasionally joins a senior darts league at the community center; they prefer solitary, structured activity over team sports and sometimes skip sessions when joint pain flares or worry about their health
    interrupts routine.
  arts: Randall Kendrix is a dedicated aficionado of jazz and blues, routinely listening to John Coltrane, Miles Davis, and B.B. King while arranging their vinyl collection, and they actively engage in
    a small book club where they dissect classics such as Moby-Dick, Pride and Prejudice, and poetry by Robert Frost; they sometimes display impatience with dissenting interpretations, reflecting a competitive
    streak in literary debate.
  travel: Randall Kendrix favors short, historically immersive trips, having explored Savannah’s historic district, the Gettysburg battlefield, and a weekend at Colonial Williamsburg, and they meticulously
    plan each itinerary with a printed map and a spare medication kit; health concerns steer them toward car travel and short stays with family, though a lingering desire remains to tour the Library of
    Congress in Washington, D.C.
  culinary: Randall Kendrix delights in cooking with produce from their heirloom vegetable garden, frequently preparing dishes such as heirloom tomato bruschetta, roasted beet and goat-cheese salad, and
    a slow-cooked pork stew seasoned with rosemary and thyme, and they bake a crusty sourdough loaf on weekends; they are competent yet occasionally over-salt meals when distracted by crossword puzzles,
    and they cherish occasional evenings at the local diner for shrimp and grits.
  core: Randall Kendrix, an 81-year-old meticulous archivist who blends curiosity with practicality, preserves history while tending a garden, solving puzzles, and navigating the anxieties of aging.
background:
  cultural: Randall is an African‑American who grew up in the segregated South during the 1940s and 1950s, witnessing the civil‑rights movement firsthand. His upbringing was shaped by the Black church,
    family storytelling traditions, and a strong sense of community resilience. He carries forward Southern culinary customs, gospel and blues music, and a deep respect for oral history. Living in Louisville,
    Georgia, he remains connected to local African‑American heritage, often sharing his experiences and knowledge with younger generations and contributing to the preservation of regional Black history.
