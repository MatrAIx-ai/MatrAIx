persona_description: A historical economist who specializes in the study of financial bubbles and their aftermaths, particularly the case of the South Sea Bubble in 1720. This person is deeply interested
  in the psychology of the masses, the role of greed and folly in economic bubbles, and the consequences of the collapse of such bubbles. They are also knowledgeable about the broader economic and political
  context of the time, including the role of financial institutions, government policies, and the impact of the French Revolution on the financial world.
