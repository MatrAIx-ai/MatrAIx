  hobbies: '["Gardening","Birdwatching","Community Theater","Bridge (card game)","Hiking in local state parks","Cooking Midwest comfort foods","Volunteering at the county fair","Reading non-fiction (psychology,
    sociology)","Genealogy research","Participating in church choir"]'
  career_goals: James aims to mentor younger social workers and lead a community‑based mental‑health outreach program focused on seniors in McPherson County. He wants to expand evidence‑based services by
    strengthening partnerships between the county health department, local nonprofits, and faith‑based groups. As a long‑term goal, he envisions transitioning to a part‑time consulting role that allows
    him to share best practices while maintaining a manageable workload to protect his well‑being.
