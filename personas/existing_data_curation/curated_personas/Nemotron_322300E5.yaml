personas:
  professional: James Aswell, a seasoned social worker with a graduate STEM background, leverages data analysis and grant writing to build structured, evidence‑based senior mental‑health programs, applying
    his methodical planning, reliable follow‑through, and outgoing nature to coordinate resources and mentor younger colleagues.
  sports: James Aswell, an avid hiker of the Flint Hills and volunteer trail maintainer, follows the Kansas City Chiefs football team, supports the local high‑school basketball squad in McPherson, and participates
    in senior‑center bridge tournaments, although he admits he skips his weekly morning walks when the weather turns cold.
  arts: James Aswell enriches his life through community theater, often playing supporting roles in productions of August Wilson and Neil Simon, sings baritone hymns like "Amazing Grace" with his church
    choir, and enjoys listening to folk‑rock artists such as Bob Dylan and the modern singer‑songwriter Brandi Carlile, while he occasionally forgets to rehearse lines due to his tendency to worry about
    perfect performance.
  travel: James Aswell prefers structured weekend trips, frequently drives to nearby state parks like Tallgrass Prairie, has visited the historic town of Gettysburg for genealogy research, dreams of touring
    the Shakespeare Birthplace in England, but limits long‑haul flights due to health concerns and family responsibilities.
  culinary: James Aswell delights in cooking Midwest comfort foods such as chicken pot pie, baked ziti, and corn casserole, frequently incorporates fresh carrots, tomatoes, and herbs from his garden into
    dishes, and while he follows a reliable recipe routine, he sometimes over‑salt his soups out of impatience for flavor.
  core: James Aswell is an organized, community‑focused senior who balances meticulous planning with a lingering worry that fuels both his dedication to helping others and his occasional over‑cautiousness.
background:
  cultural: James is a third‑generation American of German and Irish ancestry, raised on a farm outside McPherson, Kansas. His upbringing reflects the Midwestern values of self‑reliance, community service,
    and modesty. He grew up attending a Baptist church, which shaped his cooperative spirit and emphasis on helping others. The local agricultural culture and close‑knit small‑town environment have reinforced
    his preference for predictable routines and strong social ties.
attributes:
  skills: '["Case Management","Crisis Intervention","Community Resource Coordination","Program Evaluation","Data Analysis (SPSS, R)","Grant Writing","Public Speaking","Conflict Mediation","Database Management
