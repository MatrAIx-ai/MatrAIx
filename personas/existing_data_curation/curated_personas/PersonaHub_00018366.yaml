persona_description: A professor of computer science and engineering who is also an exceptional quilter. Her quilts have appeared on the covers of scientific magazines and books, and she has a unique and
  innovative approach to quilting. Her expertise lies in the study of geometry, specifically the use of irregular shapes to create regular patterns and the use of color and shading to create a three-dimensional
  appearance. Her research interests include the study of computer science, engineering, and the intersection of these fields with the arts. She is a highly skilled and creative quilter who uses her knowledge
  of geometry and color to create stunning quilts.
