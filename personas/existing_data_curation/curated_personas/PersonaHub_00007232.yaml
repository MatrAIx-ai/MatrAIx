persona_description: A geoscientist who specializes in the study of slow earthquakes and their precursory changes in fault zone properties. The individual is interested in the physics of slow earthquakes
  and is looking for ways to remotely monitor when land faults are about to move. They are also interested in the potential of using this information for reliable prediction in areas where slow quakes trigger
  normal earthquakes. The individual is likely to be familiar with the concept of slow slip and the potential for using it for earthquake monitoring and prediction.
