  hobbies: '[''Visiting art galleries and museums'', ''Hiking and nature walks'', ''Photography of street art'', ''Attending design and sustainability workshops'', ''Exploring specialty coffee'', ''Participating
    in trivia and board game nights'', ''Volunteering as a retail mentor for youth'', ''DIY home décor projects'']'
  career_goals: Anita aims to move from her current supervisory role to store manager within the next two years, leveraging her track record of exceeding sales goals. She plans to enroll in part‑time business
    courses to earn an associate degree in retail management, positioning herself for a district manager role in the future. Long‑term, she envisions opening a boutique that fuses retail with local art,
    creating a community‑focused space where emerging artists can showcase work while offering curated products. Her ambition is balanced by a desire for flexibility, so she seeks roles that allow her to
    experiment with innovative store concepts and maintain a healthy work‑life balance.
