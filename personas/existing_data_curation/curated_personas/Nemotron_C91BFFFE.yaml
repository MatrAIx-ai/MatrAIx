personas:
  professional: Anita Steves is a retail supervisor in Seattle who blends frontline leadership with a keen eye for visual merchandising, using data‑driven staffing and inventory tactics while channeling
    their competitive drive to consistently exceed sales targets, and who thrives on flexible, adaptable planning despite a tendency toward occasional disorganization.
  sports: Anita Steves enjoys weekend hikes in the Cascades, follows the Seattle Seahawks and Seattle Kraken passionately, runs with the Seattle Running Club in spring, and spends rainy evenings playing
    pickup basketball at a local community center, balancing a love for outdoor adventure with team‑spirit sports.
  arts: Anita Steves spends free afternoons sketching store‑display concepts at the Seattle Art Museum, draws inspiration from the atmospheric paintings of Emily Carr and the photography of Ansel Adams,
    curates indie playlists featuring Bon Iver and Fleet Foxes at work, and volunteers to mentor teen artists, weaving art into both their professional and personal life.
  travel: Anita Steves prefers spontaneous weekend road trips to nearby natural gems like the San Juan Islands or Whidbey Island, has a wish‑list of sustainable design tours in Copenhagen and Kyoto, and
    balances travel ambitions with a part‑time study schedule, often planning trips around long‑holiday sales cycles to maximize both adventure and savings.
  culinary: Anita Steves is an avid home barista experimenting with pour‑over and cold brew, enjoys cooking salmon with miso glaze, avocado toast with smoked salmon on rye, and a Sunday ritual of steaming
    a bowl of ramen topped with soft‑boiled egg and bamboo shoots, while often ordering artisanal coffee from local roasters when time runs short.
  core: Anita Steves blends a retail leader’s competitiveness with an artist’s curiosity, juggling flexible plans, occasional disorganization, and a love for coffee, hiking, and community mentorship while
    charting a path toward a boutique that fuses commerce and creativity.
background:
  cultural: Anita grew up in a middle‑class white family in the Seattle metropolitan area, surrounded by the region’s blend of urban culture and outdoor lifestyle. Her upbringing emphasized independence,
    community involvement, and an appreciation for the arts, all of which are hallmarks of the Pacific Northwest’s progressive environment. Exposure to Seattle’s diverse creative scene and its focus on
    sustainability shaped her values, encouraging a balance between personal ambition and social responsibility. As a divorced adult, she has cultivated a resilient, self‑reliant outlook that informs both
    her professional drive and personal interests.
