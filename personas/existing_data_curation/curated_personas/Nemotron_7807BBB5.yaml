  career_goals: While approaching retirement, Erika aims to leverage her extensive front‑office expertise by moving into a senior administrative coordinator role where she can oversee the entire reception
    team, mentor new hires, and implement process improvements that increase efficiency. She plans to complete a bachelor's degree in Business Administration through online courses to broaden her credentials.
    Over the next five years she hopes to transition to a part‑time consulting position, offering remote office‑management support to small businesses in the Tri‑Cities area, while also ensuring a stable
    financial footing for her family.
