personas:
  professional: Martha Rodrigues, a veteran front‑line customer support specialist, leverages decades of active‑listening, empathy, and Salesforce/Zendesk mastery to de‑escalate complaints while quietly
    mentoring newer reps, blending their practical curiosity and organized flexibility to streamline processes and nurture a harmonious team environment.
  sports: Martha Rodrigues stays active by walking the Uintah foothills with the local senior hiking club, participates in gentle tai‑chi classes at the community center, and they cheerfully follow the
    Utah Jazz and Real Salt Lake, occasionally attending games with a small group of friends while avoiding high‑intensity sports.
  arts: Martha Rodrigues immerses themselves in historical fiction by Ken Follett and Philippa Gregory, finds comfort in the soothing chansons of Amália Rodrigues and the folk ballads of Joan Baez, and
    admires the Americana canvases of Thomas Hart Benton, often discussing these works at their quilting circle gatherings.
  travel: Martha Rodrigues prefers carefully planned, low‑key trips such as weekend getaways to Zion National Park and a modest pilgrim’s tour of Lisbon to explore their family’s roots, balancing a love
    for scenic hiking with budget‑conscious arrangements and occasionally joining a small genealogy workshop at Boston’s archives.
  culinary: Martha Rodrigues, a competent home cook, lovingly prepares rosemary‑infused chicken stew, herb‑tossed garden salads featuring sage and lavender, and occasionally bakes traditional egg‑topped
    folar pastries for Easter, while they savor modest meals at the local diner’s meatloaf special and enjoy fresh basil in a simple caprese salad.
  core: Martha Rodrigues blends meticulous organization and quiet curiosity, habitually shelving endless genealogy charts and quilting patterns while they occasionally forget to water their garden or stay
    up too late reading historical novels.
background:
  cultural: Martha’s family traces its roots to Portuguese immigrants who settled in the western United States in the early 20th century, blending a Catholic heritage of family gatherings and modest celebrations
    with the broader Anglo-American ranching culture of rural Utah. Growing up in Roosevelt, she absorbed values of self-reliance, neighborly cooperation, and an appreciation for the natural landscape,
    while maintaining traditional Portuguese customs such as holiday pastries and modest religious observances.
attributes:
  skills: '["Customer Service", "Active Listening", "Empathy", "Conflict Resolution", "CRM Software (Salesforce, Zendesk)", "Data Entry", "Basic Technical Troubleshooting", "Training and Mentoring", "Documentation
