  hobbies: '["Reading historical fiction", "Genealogy research", "Knitting", "Quilting", "Gardening", "Birdwatching", "Nature walks in Uintah Mountains", "Book club", "Small-group quilting circle", "Volunteer
    work at senior center"]'
  career_goals: Martha wishes to transition into a senior mentor or trainer role within her department, where she can share her decades-long experience with newer representatives and help shape service
    standards. She also hopes to spearhead a small cross-functional project that streamlines complaint handling, and later, gradually reduce her hours to allow more time for community involvement while
    maintaining an income stream that supports her family's modest lifestyle.
