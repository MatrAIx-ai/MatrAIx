  hobbies: '[''Watercolor painting'', ''Vegetable gardening'', ''Playing the cuatro'', ''Listening to plena and salsa music'', ''Reading artist biographies'', ''Coastal walks'', ''Attending cultural festivals'',
    ''Documenting folk art'']'
  career_goals: In his later years, Amilcar aims to preserve his family’s legacy and share local culture with younger generations. He plans to compile an illustrated family history book that captures photographs,
    recipes, and personal anecdotes. He wishes to mentor teenagers interested in traditional crafts such as woodworking and cooking, offering workshops at the community center. Amilcar also hopes to help
    launch a small neighborhood art exhibit that showcases the work of local folk artists. Learning basic digital photography to document everyday life in Toa Alta and Toa Baja is another personal goal,
    as is taking a short cultural trip to Old San Juan to explore its historic art museums.
