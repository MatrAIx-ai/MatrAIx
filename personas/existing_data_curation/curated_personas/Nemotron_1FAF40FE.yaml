  hobbies: '[''Fishing'', ''Basketball'', ''Classic car restoration'', ''Barbecue cooking'', ''Woodworking'', ''Weightlifting'', ''Road trips'', ''Historical documentaries'', ''Leadership reading'', ''Volunteer
    tutoring'']'
  career_goals: Todd aims to earn a bachelor’s degree in Business Administration within the next three years and obtain Certified Property Manager (CPM) certification. In five to seven years he hopes to
    advance to a regional property‑management director role, leading multiple residential communities. He is passionate about integrating technology‑driven resident engagement platforms and launching sustainability
    initiatives across his portfolio. Ultimately, he envisions founding his own consulting firm that helps multifamily housing providers build resilient, high‑satisfaction communities.
