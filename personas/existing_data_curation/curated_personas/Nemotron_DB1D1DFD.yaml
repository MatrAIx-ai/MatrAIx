  career_goals: Even in retirement, Anne Marie aims to stay purpose-driven by fostering intergenerational learning in her community. She hopes to launch a small community garden in Prattville that brings
    together teenagers and seniors, share her knowledge of food preservation through workshops, compile a detailed family history for her descendants, and write a memoir that captures the calm resilience
    she has cultivated over the decades. Her goals remain flexible, allowing her to pursue new interests as they arise while contributing positively to her local heritage and social fabric.
