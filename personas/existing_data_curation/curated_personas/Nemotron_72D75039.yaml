  career_goals: Rosa aims to advance from patrol officer to detective within the next five years, focusing on the homicide and cyber‑crime units where she can apply her investigative curiosity. She plans
    to complete a bachelor’s degree in criminal justice while earning her state certification in crisis intervention and advanced forensic analysis. Long‑term, she envisions attaining a supervisory rank—sergeant
    or lieutenant—where she can shape training curricula, promote data‑driven policing, and strengthen community‑police partnerships. Rosa also hopes to mentor other young women entering law enforcement,
    fostering a supportive network that balances the profession’s rigor with personal well‑being.
