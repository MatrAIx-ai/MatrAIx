  career_goals: Kenneth aims to be promoted to a Team Lead within the next year and to progress to a Customer Experience Manager role within three to five years. He plans to complete his GED and enroll
    part‑time in an associate degree program in Business Administration to strengthen his qualifications for supervisory positions. He also aspires to design and lead a training program that shortens new‑hire
    ramp‑up time and to become recognized as a go‑to expert for handling complex escalations. Long‑term, he envisions opening a small family‑style barbecue restaurant that reflects his love of cooking and
    community gathering.
