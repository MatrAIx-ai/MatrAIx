personas:
  professional: Candy Morrison is a full‑stack software engineer who leverages their methodical, test‑driven development style and strong agile project‑management skills to build scalable AWS‑powered web
    applications, while diligently fostering inclusive, high‑performing teams and quietly wrestling with deadline‑related anxiety.
  sports: Candy Morrison adheres to a weekly jogging routine, practices Vinyasa yoga at sunrise, cheers for the Seattle Seahawks and Seattle Mariners, and participates in the Green Lake Running Club’s Saturday
    group runs.
  arts: Candy Morrison regularly attends live jazz sessions featuring John Coltrane tributes, enjoys soul classics by Aretha Franklin, collects contemporary prints by Kehinde Wiley, and hosts strategic
    board‑game nights with friends that include titles like Terraforming Mars and Catan, blending cultural appreciation with analytical fun.
  travel: Candy Morrison plans trips with a detailed spreadsheet itinerary, has explored Kyoto, Japan for its tech museums, visited Charleston, South Carolina for its historic charm, and schedules yoga
    retreats in Ubud, Bali while also taking weekend road‑trips to the Cascade Mountains for hiking.
  culinary: Candy Morrison’s culinary experiments fuse soul‑food comfort with precise baking, producing dishes such as smoked turkey collard greens, sweet potato pie with cinnamon, spicy jambalaya seasoned
    with home‑grown basil and thyme, and almond‑flour croissants that showcase their meticulous attention to flavor and technique.
  core: Candy Morrison is a structured engineer and community mentor who balances analytical work, mindful self‑care, and detailed planning, yet often over‑worries and can be overly meticulous.
background:
  cultural: Candy grew up in a multigenerational Black family in the Bay Area, where stories of the civil‑rights movement and the legacy of Black innovators shaped her identity. Her parents emphasized education
    and community service, instilling pride in her African‑American heritage. She celebrates Juneteenth and Black History Month with family gatherings, soulful music, and sharing traditional dishes. Active
    in the local Black tech community, she participates in networking events and supports initiatives that promote diversity in STEM. Her cultural background informs her commitment to mentorship and creating
    inclusive workplaces.
