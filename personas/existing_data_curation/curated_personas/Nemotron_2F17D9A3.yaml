  skills: '[''JavaScript'', ''Python'', ''Java'', ''RESTful API design'', ''AWS cloud services'', ''Agile Scrum'', ''Test‑driven development (TDD)'', ''SQL'', ''Data visualization'', ''System architecture'']'
  hobbies: '[''Yoga'', ''Mindfulness meditation'', ''Jogging'', ''Indoor herb gardening'', ''Cooking (soul‑food & baking)'', ''Reading (historical non‑fiction, tech books)'', ''Board games'', ''Community
    tech meet‑ups'', ''Mentorship volunteering'']'
  career_goals: Candy aims to become a technical lead or engineering manager within the next five years, focusing on building high‑performing, inclusive teams. She plans to earn a PMP certification and
    possibly a master's in Computer Science to deepen her expertise in cloud architecture and AI. She also wants to mentor underrepresented minorities in tech, fostering a supportive environment. Long‑term
    she envisions launching a product that leverages machine learning to improve accessibility for people with disabilities.
