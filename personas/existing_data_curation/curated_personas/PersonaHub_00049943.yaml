persona_description: A neuroscientist or a statistician who is interested in the intersection of fMRI and statistics. They are familiar with the basics of MR physics, image formation, and the general linear
  model. They are skilled in data analysis, noise models, and inference, and are familiar with the concepts and methods of fMRI signal and noise, group-level analysis, and brain connectivity. They are also
  familiar with multivariate decomposition methods, effective connectivity, and MVPA. They are passionate about understanding the nature of fMRI data and using it to make relevant results that can be used
  and interpreted by neuroscientists.
