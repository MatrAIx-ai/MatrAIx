  hobbies: '[''Classic car restoration'', ''DIY electronics'', ''Home‑automation projects'', ''Scale model engine building'', ''Guitar playing'', ''Hip‑hop beat production'', ''Live jazz and blues concerts'',
    ''Fishing'', ''Hiking'', ''Pick‑up basketball'', ''Reading technical manuals'', ''Science‑fiction novels'', ''Youth mentorship'']'
  career_goals: Daniel aims to advance to a senior maintenance technician role within the next three years, earn certifications such as ASE Master Technician and Certified Maintenance & Reliability Technician,
    and eventually move into a maintenance supervisor position where he can lead a small team and implement predictive maintenance programs. He also plans to complete a part‑time bachelor's degree in mechanical
    engineering to broaden his technical expertise and increase his long‑term career mobility.
