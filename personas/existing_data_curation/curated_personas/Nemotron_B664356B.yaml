  career_goals: While approaching retirement, Steven aims to transition into a mentorship role, guiding newly hired LPNs and nursing assistants through hands‑on clinical training. He plans to obtain the
    Certified Geriatric Nurse (CGN) credential within the next year to deepen his expertise in elder care. Additionally, he hopes to spearhead a fall‑prevention program at his current facility and contribute
    to a community health outreach project that offers free health screenings for senior residents of Warwick. Long‑term, he envisions a part‑time consulting position where he can advise on patient safety
    protocols and assist in developing staff wellness programs to mitigate workplace stress.
