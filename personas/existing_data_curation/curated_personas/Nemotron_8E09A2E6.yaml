personas:
  professional: Epatricia Faugue, a veteran electromechanical assembly specialist with over four decades of hands‑on experience, they blend meticulous wiring expertise, pragmatic improvisation, and a collaborative
    teaching style to mentor younger technicians as she transitions toward a part‑time mentor role at her plant.
  sports: Epatricia Faugue enjoys daily beach strolls to watch birds, they participate in a low‑impact senior fitness class at the community center, and they remain a devoted fan of the Miami Heat and Tampa
    Bay Buccaneers, though they avoid high‑impact sports because of joint pain.
  arts: Epatricia Faugue sings gospel hymns with her church choir, they devour Agatha Christie mysteries each night, and they find solace in the smooth piano of Dave Brubeck, while their knitting sessions
    are often accompanied by classic Creole folk tunes.
  travel: Epatricia Faugue favors leisurely road trips along the Gulf Coast, especially exploring the historic charm of New Orleans and the tranquil sands of the Florida Keys, they plan trips around her
    husband’s itineraries and rely on family assistance for longer flights to visit grandchildren.
  culinary: Epatricia Faugue masterfully prepares aromatic Creole gumbo, fried plantains, and spicy jerk chicken, they season these dishes with garden‑fresh thyme, scotch bonnet peppers, and fresh okra,
    and they often share the meals during choir gatherings and knitting circles.
  core: Epatricia Faugue is a pragmatic electromechanical mentor who finds structure in wiring harnesses, comfort in gardening, and community in choir and quilting, they occasionally misplace appointments
    but always humming a hymn.
background:
  cultural: Epatricia is a Black American with Haitian roots; her parents emigrated from Haiti in the early 1960s and settled in South Florida. Growing up during the civil‑rights era, she internalized a
    strong sense of community, resilience, and pride in her Afro‑Caribbean heritage. She blends the rhythms of Haitian music, the flavors of Creole cooking, and the traditions of the Southern Black church
    with the relaxed, multicultural vibe of Palm Beach Gardens. This cultural tapestry informs her values of family solidarity, mutual support, and a love for sharing knowledge across generations.
attributes:
  skills: '["Electrical wiring","Circuit board assembly","Troubleshooting electronic devices","Reading technical schematics","Quality inspection","Safety compliance","Tool maintenance","Basic PLC programming","Mentoring
