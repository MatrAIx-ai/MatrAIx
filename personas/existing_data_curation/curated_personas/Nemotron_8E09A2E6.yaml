  hobbies: '["Gardening","Cooking Creole cuisine","Church choir singing","Reading mystery novels","Walking on the beach","Birdwatching","Knitting and quilting","Volunteer teaching basic electronics","Attending
    local cultural festivals","Yoga for seniors"]'
  career_goals: Epatricia aims to transition to a part‑time mentor role in the next two years, formally passing on her assembly expertise to younger workers at her plant or at a local technical school.
    She hopes to earn a recognized certification in advanced electromechanical systems to stay current with emerging technologies, and she plans to volunteer as a senior‑focused STEM tutor at the Palm Beach
    Gardens community center. Maintaining a steady income to support her husband’s travel plans and contribute to her grandchildren’s college funds remains a practical priority, while staying engaged in
    work that offers a clear structure and tangible results.
