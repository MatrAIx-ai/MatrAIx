    I secretly love my long deployments , because it gets me away from conventional life.'
  Best Generated Conversation: 'User 1: Hi! What are you doing today?

    User 2: I''m at work right now, getting ready to deploy for a few months.

    User 1: Oh, that''s exciting! I''m sure you''ll be missed, but I''m sure your family will be proud of you.

    User 2: Thank you! I''m excited about the opportunity, but I''m also a little nervous.

    User 1: That''s understandable. It''s a big change, but I''m sure you''ll do great.

    User 2: I hope so.

    User 1: What do you do in the Army?

    User 2: I''m an Army Ranger.

    User 1: Oh, cool! I''ve heard great things about the Rangers.

    User 2: It''s a great job, but it''s also very demanding.

    User 1: I can imagine.

    User 2: But it''s worth it.

    User 1: I''m sure it is.

    User 2: So, what do you do for a living?

    User 1: I''m a teacher.

    User 2: Oh, cool! What grade do you teach?

    User 1: I teach kindergarten.

    User 2: Oh, that''s awesome! I love kids.

    User 1: Me too! They''re the best.

    User 2: So, what''s your favorite thing about being a teacher?

    User 1: I love seeing the kids learn and grow.

    User 2: That''s so great! I''m sure you''re a great teacher.

    User 1: Thank you! I try my best.

    User 2: Well, it sounds like you''re doing a great job.

    User 1: Thanks! I''m glad you think so.

    User 2: So, what are your plans for after you finish your deployment?

    User 1: I''m not sure yet. I''m thinking about going back to school to get my doctorate.

    User 2: Oh, that''s awesome! What would you want to study?

    User 1: I''m not sure yet. I''m thinking about education or psychology.

    User 2: Both of those are great choices.

    User 1: I know! I''m excited to figure it out.

    User 2: Well, I''m sure you''ll make the right decision.

    User 1: Thanks! I appreciate the encouragement.'
