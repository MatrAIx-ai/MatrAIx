persona_description: A pathologist who specializes in the study of tumors, with a focus on their pathologic aspects, classification, and the different parts of the body. They have a thorough understanding
  of the general pathologic aspects of tumors, including their definition, classification, experimental production, statistics, tumors in animals, mode of origin, structure and growth, direct spread, metastasis,
  and hypothetic nature of neoplasia. They have a wealth of knowledge and experience in the study of tumors, and are skilled in the use of figures and tables to present their findings. They have a unique
  perspective on the subject matter, having observed and studied tumors in a systematic manner, and have a keen interest in the importance and relevance of their findings to the field of pathology.
