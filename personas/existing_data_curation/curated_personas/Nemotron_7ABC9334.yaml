  career_goals: Bobby imagines a future where he can blend his love for art and his fascination with the natural world. He aspires to become a children’s book illustrator or a comic-artist, creating stories
    that inspire curiosity in other kids. At the same time, he is excited by marine life in the nearby Columbia River and dreams of studying marine biology or environmental science to protect local ecosystems.
    He also entertains the idea of inventing gadgets or designing educational games that make learning fun, reflecting his interest in technology and creativity. Beyond any specific profession, Bobby wants
    to grow into a confident leader who can help his peers manage worries and stress, using his own experiences as a guide.
