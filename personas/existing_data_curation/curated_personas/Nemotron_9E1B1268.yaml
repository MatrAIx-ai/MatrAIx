personas:
  professional: April Lang is a budding writer and wildlife photographer who channels their curiosity and practical organization into crafting sci-fi short stories, comic strips, and photo essays for the
    school newspaper and community blog, while their compassionate nature drives them to highlight animal-welfare topics.
  sports: April Lang plays on the co-ed Eau Claire Explorers youth soccer team, follows the Green Bay Packers and Milwaukee Bucks for seasonal thrills, and they complement team practice with weekend hikes
    along the Chippewa River and yoga sessions at the local community center to stay balanced and energetic.
  arts: April Lang draws artistic inspiration from graphic novelist Alan Moore, pop singer Taylor Swift, and Broadway creator Lin-Manuel Miranda, performs in school choir covering classics like 'The Sound
    of Music', and they bring characters to life on stage in theater productions that blend humor with heartfelt storytelling.
  travel: April Lang favours carefully planned weekend road trips to Wisconsin's Northwoods and the historic district of Madison, dreams of exploring Edinburgh's castle and the coastal trails of New Zealand,
    and they balance family budget limits by saving a portion of their allowance for future backpacking adventures.
  culinary: April Lang enjoys baking chewy chocolate chip cookies and tangy lemon bars for school fundraisers, experiments with simple sushi rolls using fresh tuna, avocado, and soy sauce at home, and they
    often savor grilled cheese sandwiches with tomato basil soup while sketching new comic panels.
  core: April Lang, a curious and compassionate 13-year-old, balances a love for sci-fi storytelling and wildlife photography with a habit of over-thinking and occasional snack-budget anxiety, and they
    seek harmony through organized projects and spontaneous hikes.
background:
  cultural: April grew up in the Midwestern town of Eau Claire, Wisconsin, within a white family of German‑Scandinavian ancestry. The community emphasizes practicality, neighborly support, and a strong
    connection to the outdoors, which is reflected in family traditions like attending county fairs, hunting seasonal blueberries, and participating in local 4‑H and Girl Scout projects. Her household values
    modesty, reliability, and community service, with regular involvement in church gatherings and volunteer events. These regional cultural influences shape her down‑to‑earth outlook, love for group activities,
    and commitment to helping others, while also exposing her to broader American pop culture through school and digital media.
