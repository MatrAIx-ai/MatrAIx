  career_goals: April dreams of a career that blends her curiosity for science with her deep desire to help others. In the short term, she aims to earn leadership positions in her middle school student
    council, continue volunteering at the local animal shelter, and complete a youth mentorship program. Long‑term, she aspires to become a pediatric nurse or a teacher of elementary school, where she can
    nurture children's growth and well‑being. She also harbors an interest in environmental conservation, hoping to study ecology in college and eventually work with Wisconsin's state parks to protect the
    natural landscapes she loves exploring.
