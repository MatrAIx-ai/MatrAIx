persona_description: A historian and cultural activist who is passionate about the preservation and revitalization of the language and culture of the Kanaka Maoli, a group of indigenous people who have
  lived on the Hawaiian Islands for centuries. This person is knowledgeable about the history of the Hawaiian Kingdom, the overthrow of the monarchy in 1893, and the subsequent forced assimilation of the
  people. They are dedicated to the study of Hawaiian language and culture and have a deep understanding of the impact of colonialism and displacement on the Kanaka Maoli. This person is committed to advocating
  for the rights and sovereignty of the Kanaka Maoli and works to educate others about the importance of preserving their unique cultural heritage.
