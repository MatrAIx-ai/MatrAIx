personas:
  professional: Miriam Iverson, a community‑focused organizer and seasoned watercolor painter, leverages their meticulous planning and imaginative flair to run local art workshops, curate quarterly exhibitions,
    and coordinate church fundraisers, all while they assertively keep projects on track.
  sports: Miriam Iverson enjoys Friday night high school football at the Kaufman Cowboys stadium, cheers for the Dallas Cowboys and Texas Rangers, participates in a local walking club that meets at Caddo
    Lake Park, and they practice gentle yoga on their porch each morning.
  arts: Miriam Iverson spends weekends painting abstract Texas landscapes in watercolor, quotes Mary Oliver in their poetry journal, attends the annual West Texas Art Festival to study works by Susie Denton,
    and they unwind crocheting quilts while listening to Willie Nelson and Bon Iver.
  travel: Miriam Iverson favors weekend road trips to the Hill Country vineyards, a yearly pilgrimage to the Austin City Limits Festival, seasonal visits to Galveston's Gulf shoreline, and they dream of
    a future cultural immersion in Santa Fe, always packing their sketchbook and garden journal.
  culinary: Miriam Iverson loves slow‑smoked brisket with jalapeño cornbread, fresh garden tomatoes tossed with basil and feta, and the occasional shrimp and grits at a local seafood shack, and they often
    experiment with rosemary‑infused vinaigrette for their salads.
  core: Miriam Iverson channels a lifelong worry into vibrant watercolor, meticulous garden planning, and community art advocacy, all while they have a penchant for splurging on festivals and occasional
    procrastination on paperwork.
background:
  cultural: Miriam comes from a white, Southern-Texas background with roots in mid-20th-century rural communities. Raised in a modest, family-oriented household, she was taught the value of self-reliance,
    hospitality, and community service, often through her local Methodist church. The cultural fabric of Kaufman County—characterized by country music, backyard barbecues, high school football, and strong
    church fellowship—has shaped her social expectations and traditions. While she identifies with mainstream Southern cultural norms, Miriam also embraces a broader appreciation for diverse artistic influences,
    reflecting the eclectic, evolving cultural landscape of contemporary Texas.
attributes:
  skills: '[''watercolor painting (abstract)'', ''creative writing (poetry and short prose)'', ''garden planning and horticulture'', ''budgeting and household financial management'', ''event coordination
    and community fundraising'', ''basic digital literacy (photo editing, word processing, online research)'']'
  hobbies: '[''watercolor painting (abstract)'', ''creative writing and poetry'', ''native Texas gardening and butterfly habitat creation'', ''bird-watching'', ''reading contemporary fiction and speculative
    philosophy'', ''visiting local museums and historic sites'', ''quilting and crochet'', ''attending art festivals and county fairs'']'
  career_goals: Although not currently in the paid workforce, Miriam aims to deepen her impact on her community and fulfill her lifelong curiosity. She hopes to launch a small home-based studio offering
    workshops in watercolor techniques and creative writing for local adults and teens. She also aspires to curate a quarterly community art exhibition that showcases emerging regional artists, thereby
    fostering a vibrant cultural scene in Kaufman. On a personal level, Miriam wishes to compile and self-publish a collection of her poems and reflections on nature, and to volunteer as a mentor for a
    local youth garden program, sharing her horticultural knowledge.
