  career_goals: At 81, Jenny’s primary ambition is to preserve her family’s legacy and maintain a secure, comfortable home for herself and her husband. She aims to compile a handwritten family‑recipe cookbook,
    testing each dish methodically and annotating variations for future generations. She also wishes to document her gardening practices in a seasonal journal to share with grandchildren. While she plans
    to continue volunteering at the church pantry, she intends to shift to a mentorship role, guiding younger volunteers in organization and record‑keeping. Maintaining her health through regular walks
    and staying socially engaged in small, trusted circles are also central to her personal objectives.
