  career_goals: Looking ahead, Florentina aims to step into a senior executive role such as Vice President of Sales within a technology‑driven organization that values agility and innovation. She is driven
    to pioneer a sales methodology that merges design thinking with advanced analytics, fostering a culture where flexibility and creative problem solving are core. She also aspires to mentor and champion
    women and underrepresented groups in STEM and sales, eventually launching her own consultancy that empowers companies to build adaptable, data‑informed sales structures while maintaining a human‑centered
    approach.
