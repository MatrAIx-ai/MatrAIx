personas:
  professional: Janet Villarreal is a seasoned nursing assistant who blends compassionate patient care with creative expression, using watercolors, music playlists, and simple crafts to brighten routines
    while pursuing her CNA certification and aspiring LPN role.
  sports: Janet Villarreal enjoys early‑morning hikes with the Midwest Trailblazers club, cheers on the Kansas City Chiefs during football season, and keeps a casual jog routine in the park, balancing solitary
    outdoor activity with occasional community sports socials.
  arts: Janet Villarreal spends weekends wandering the Nelson‑Atkins Museum and local galleries, drawing inspiration from Monet’s water lilies and Frida Kahlo’s vibrant self‑portraits, while creating watercolor
    landscapes and minimalist jewelry that echo the colors of Midwestern sunsets.
  travel: Janet Villarreal favors spontaneous road trips to state parks like Ozark National Scenic Riverways and Cave Springs for hiking and lakeside picnics, but also dreams of a summer art retreat in
    Santa Fe, planning trips last minute to keep the journey as fresh as their journal entries.
  culinary: Janet Villarreal experiments with comfort food twists, such as chipotle‑infused chicken and dumplings, jalapeño‑cheddar cornbread, and sweet‑potato enchilada casserole, favoring ingredients
    like poblano peppers, smoked paprika, and fresh cilantro.
  core: Janet Villarreal is a creatively curious nursing assistant who blends art, spontaneous hikes, and flavorful cooking into a flexible, slightly disorganized life that still pursues professional growth.
background:
  cultural: Janet grew up in the Kansas City metropolitan area within a predominantly white, middle‑class community that emphasizes Midwestern values of modesty, hard work, and community involvement. Her
    family carries a Hispanic surname, and she was raised with occasional celebrations of Hispanic holidays and a fondness for Mexican cuisine, adding a multicultural nuance to her identity. This blend
    of Midwestern American traditions—such as church participation, local sports fandom, and barbecue gatherings—with an awareness of her Hispanic heritage gives her a comfortable footing in both cultural
    contexts.
