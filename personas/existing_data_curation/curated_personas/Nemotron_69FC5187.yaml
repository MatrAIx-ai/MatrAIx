  career_goals: Janet plans to earn her GED within the next year, followed by completing a Certified Nursing Assistant (CNA) program to formalize her credentials. In the medium term, she aspires to become
    a Licensed Practical Nurse (LPN), expanding her clinical responsibilities and positioning herself for a supervisory role in a long‑term care facility. She also hopes to blend her love for art with her
    work by coordinating art‑therapy sessions or leading a patient recreation program that integrates creative expression with health and wellness.
