  hobbies: '[''Playing tag'', ''Dancing'', ''Singing'', ''Building blocks/LEGO'', ''Drawing'', ''Storytime at the library'', ''Visiting the park'', ''Feeding ducks'', ''Nature walks'', ''Cooperative games'']'
  career_goals: Amanda dreams of growing up to be a teacher or a community helper who can guide other children in learning and play. She also expresses a keen interest in caring for animals, imagining herself
    as a veterinarian who can help pets stay healthy. Her ambition reflects her love of social interaction, her desire to make a practical difference, and her confident, assertive nature when pursuing her
    goals.
