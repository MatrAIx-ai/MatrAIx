personas:
  professional: Amanda Lane, a budding pre‑school helper, blends curiosity and practicality by eagerly sorting puzzles while reliably handing out crayons to classmates, and they delight in following the
    teacher’s routine.
  sports: Amanda Lane enjoys tossing a soft ball in the Tiny Turtles preschool soccer club, eagerly joins the local kids’ gymnastics class each fall, and they chant loudly for the hometown baseball team,
    the Springfield Sluggers, during weekend games.
  arts: Amanda Lane sings along to the catchy tunes of 'Let It Go' from Frozen, loves watching Sesame Street’s Elmo, and they spend afternoons drawing bright pictures of unicorns inspired by the whimsical
    illustrations of Dr. Seuss.
  travel: Amanda Lane loves family road trips to the Grand Canyon, dreams of building a sandcastle on the beaches of San Diego, and they prefer the excitement of visiting a nearby farm petting zoo over
    long flights to faraway places.
  culinary: Amanda Lane favors buttery macaroni and cheese, dips crunchy carrot sticks in ranch dressing, can stir a bowl of oatmeal with a plastic spoon, yet they stubbornly refuse broccoli, insisting
    that peas are the only green vegetable they’ll tolerate.
  core: Amanda Lane is a lively four‑year‑old whose curiosity, organized play, and occasional stubbornness create a delightful mix of eagerness to explore, and they demonstrate a surprising knack for responsibility.
background:
  cultural: Amanda lives in Zion, Illinois, a small Midwestern city in Lake County with a predominantly white, middle‑class population. Her upbringing reflects typical Midwestern values of politeness, community
    involvement, and practicality. Family life often includes participation in local church activities, community festivals, and library programs, providing her with a blend of cultural traditions rooted
    in American heartland customs.
attributes:
  skills: '[''Basic counting'', ''Letter recognition'', ''Fine‑motor skills (cutting, drawing, puzzle assembly)'', ''Following multi‑step directions'', ''Organizing toys'', ''Cooperative play'', ''Assertive
