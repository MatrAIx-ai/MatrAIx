personas:
  professional: A budding health informatics enthusiast, Cristina Artola uses their meticulous organization and bilingual fluency to volunteer as a student tutor while they craft Python scripts that streamline
    data entry for a local clinic, blending compassion with tech curiosity.
  sports: When not studying, Cristina Artola hikes the Sierra Foothills trails, cycles around Folsom Lake with the local Folsom Riders Club, and supports the Sacramento Kings (NBA) and the San Jose Sharks
    (NHL) while maintaining a modest weekly cardio routine through trail runs, and they prefer low‑key outdoor activities over team sports.
  arts: Cristina Artola spends evenings sketching watercolor landscapes of trail vistas, strums acoustic guitar chords to John Mayer and José González during family gatherings, writes reflective poems inspired
    by the mystery novels of Agatha Christie and the sci‑fi worlds of Isaac Asimov, and they curate digital collages on Canva featuring album art from indie folk artists like Sufjan Stevens.
  travel: Cristina Artola plans trips with a detailed spreadsheet, favoring a blend of adventure and quiet contemplation; they have trekked Yosemite's Mist Trail, dream of exploring Kyoto's temples during
    cherry blossom season, and aim to volunteer at a health clinic in Guatemala after finishing community college, balancing travel costs with scholarship applications.
  culinary: In the kitchen, Cristina Artola lovingly prepares traditional dishes such as tamales, pozole, and chiles en nogada with family, while experimenting by swapping corn masa with quinoa for a modern
    twist, their favorite ingredients include jalapeños, fresh cilantro, and roasted tomatillos, and they proudly bake homemade churros for friends on weekends.
  core: Cristina Artola blends quiet curiosity, methodical organization, and a love for nature, tech, and family‑cooked heritage foods into a thoughtful, occasionally impulsive teenage life, and they always
    leave a pen behind at their desk.
background:
  cultural: Cristina is a first‑generation Mexican‑American who grew up in a bilingual household in Folsom, California. She speaks fluent Spanish at home and English at school, giving her a comfortable
    bridge between both cultures. Family gatherings are often centered around Mexican traditions such as Día de los Muertos and celebrations of Mexican holidays, where food, music, and storytelling play
    key roles. Her parents instilled values of communal responsibility, respect for elders, and an emphasis on education. Living in the diverse environment of Sacramento County, she also engages with broader
    American customs, celebrating occasions like Thanksgiving while maintaining her cultural roots. This blend of Mexican heritage and Californian upbringing informs her worldview, making her attentive
    to cultural nuances, eager to preserve her traditions, and motivated to contribute positively to both her local community and her extended cultural family.
attributes:
  skills: '["Time management", "Organizational planning", "Bilingual Spanish–English communication", "Research and information synthesis", "Microsoft Office (Word, Excel, PowerPoint)", "Google Workspace
    (Docs, Sheets, Slides)", "Introductory Python programming", "Graphic design basics (Canva)", "Creative writing", "Team collaboration in small groups"]'
  hobbies: '["Reading (fiction, sci‑fi, self‑help)", "Sketching and watercolor painting", "Cooking traditional Mexican dishes", "Playing acoustic guitar", "Hiking in Sierra Foothills", "Biking around Folsom
    Lake", "Volunteering tutoring at community center", "Coding simple Python scripts", "Journaling", "Participating in small book clubs"]'
  career_goals: Cristina aims to pursue a career that blends her caring nature with her interest in science and technology. She is leaning toward health‑related fields such as nursing or medical technology,
    where she can apply her organizational strengths and bilingual abilities to support patient care. At the same time, she is intrigued by the prospect of integrating data and technology in healthcare,
    so she is exploring health informatics or biomedical engineering as a longer‑term option. Her immediate goal is to enroll in a community‑college program that offers foundational courses in biology,
    computer science, and Spanish literature, setting the stage for a bachelor’s degree that will lead to a stable, service‑oriented profession.
