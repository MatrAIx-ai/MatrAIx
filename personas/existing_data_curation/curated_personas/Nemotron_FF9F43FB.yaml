  hobbies: '[''Arduino and home-automation projects'', ''Fishing'', ''Kayaking'', ''Barbecue cooking'', ''Reading nonfiction (science, history)'', ''Acoustic guitar'', ''Community volunteer events'']'
  career_goals: Samuel aims to rise to a senior leadership role such as Director of Compliance, where he can shape enterprise-wide risk management strategies and mentor a team of compliance professionals.
    He plans to earn a Certified Compliance & Ethics Professional (CCEP) credential, deepen his expertise in AI-driven compliance monitoring, and eventually launch a boutique consulting practice that helps
    medium-size energy firms in Texas navigate evolving regulatory landscapes.
