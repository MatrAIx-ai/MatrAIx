persona_description: A teacher who specializes in formulating and implementing educational assessments, particularly for students with exceptional learning needs. They have a deep understanding of the principles
  of assessment, including the use of multiple types of assessment information for decision making, legal and ethical principles of assessment, and understanding the limitations of various types of assessments.
  They are also knowledgeable and know the proper usage of formal and informal assessment strategies to plan, evaluate, and strengthen instruction that will promote continuous intellectual, social, emotional,
  and physical development of each elementary student. They have experience observing and reflecting on the learning styles of students, particularly those with disabilities, and are able to create assessments
  that are tailored to each individual learner's unique needs. They are also skilled at conducting written responses to two prompts given to students, and are able to relate to a child who is an Iroquois
  Indian and express themselves in the best way they can.
