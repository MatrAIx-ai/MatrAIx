  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Experimenting with new cooking recipes'', ''Practicing yoga'', ''Gardening (vegetable and herb garden)'', ''Reading contemporary
    literature and philosophy'', ''Attending Vietnamese cultural festivals'', ''Volunteering at community language‑exchange programs'', ''Exploring local craft workshops (e.g., pottery, calligraphy)'']'
  career_goals: Looking ahead, Hanh aims to formalize her education by completing a GED and enrolling in part‑time culinary courses at a community college, with a long‑term goal of launching a small home‑based
    catering venture that highlights health‑focused Vietnamese‑inspired dishes. She also aspires to deepen her involvement in the local Vietnamese cultural association by taking on a volunteer coordinator
    role, where she can leverage her organizational talents to design inclusive festivals, language workshops, and intergenerational activities. Balancing personal growth with family responsibilities, she
    envisions her entrepreneurial project as both a source of creative fulfillment and a modest contribution to her family’s financial stability.
