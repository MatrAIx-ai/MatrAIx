  hobbies: '[''painting'', ''quilting'', ''candle making'', ''upcycling crafts'', ''community theater volunteering'', ''attending art fairs'', ''hiking'', ''gardening'', ''group dance classes'', ''exploring
    new music'', ''reading contemporary art books'', ''DIY home projects'']'
  career_goals: 'Martha aims to translate her hands‑on warehouse expertise into a supervisory role. Within the next two years she plans to become a Shift Lead, overseeing a team of stockers, managing daily
    workflow, and ensuring compliance with safety protocols. To support this, she intends to complete additional certifications in OSHA safety and advanced supply‑chain fundamentals offered through a local
    community college. While she values the stability of her current job, her curiosity about creative expression drives a parallel ambition: to launch a modest weekend shop—‘Perry County Artisan Corner’—where
    she can sell her own paintings, quilts, and up‑cycled crafts alongside works from neighboring makers. In the longer term, Martha hopes to move into a logistics coordinator position, blending her practical
    knowledge of inventory with the analytical skills she will acquire through adult‑education courses.'
