personas:
  professional: Grecia Tapia, a budding full‑stack engineer, combines fluency in JavaScript, React, and Node.js with a literary‑theory background to design bilingual, user‑centric web apps, translating
    technical concepts into Spanish‑English briefs for cross‑functional teams, while their competitive edge pushes them to excel in code reviews even as they occasionally miss documentation deadlines due
    to a relaxed, disorganized workflow.
  sports: Grecia Tapia, an avid hiker of the Texas Hill Country and occasional pick‑up soccer player, follows the San Antonio Spurs and San Antonio FC for weekend inspiration, preferring flexible, outdoor
    workouts over regimented gym routines, though they sometimes skip a jog when a gaming session calls.
  arts: Grecia Tapia, a frequent visitor of San Antonio art galleries and fan of mariachi ensembles like Los Alegres, immerses themselves in the works of Lila Downs, the contemporary paintings of Francisco
    Toledo, and narrative‑driven video games such as The Last of Us Part II and Disco Elysium, allowing these diverse influences to shape their own storytelling‑centric coding projects, and they often weave
    visual motifs from these experiences into UI mockups.
  travel: Grecia Tapia, who loves spontaneous weekend drives to the Texas Hill Country and plans a future cultural immersion in Oaxaca’s historic markets, balances a modest student budget with a penchant
    for budget‑friendly hostels and often uses travel‑planning apps to map out routes that blend hiking, street food, and photo‑ops, while occasionally overspending on concert tickets during trips.
  culinary: Grecia Tapia, an intermediate home‑cook, enjoys remixing traditional dishes like tacos al pastor with pineapple and chipotle mayo, perfecting chilaquiles topped with queso fresco and avocado,
    while experimenting with mole sauces that blend ancho chilies, cinnamon, and epazote, often pairing meals with fresh lime‑scented agua fresca.
  core: Grecia Tapia blends bilingual tech craftsmanship with a restless curiosity and a habit of juggling deadlines, turning late‑night gaming marathons into impromptu UI brainstorms while never skipping
    a chance to snap a street‑photo of a local festival.
background:
  cultural: Grecia was raised in a vibrant Mexican‑American household in San Antonio, where Spanish was spoken at home and community celebrations like Día de los Muertos and Cinco de Mayo were integral
    parts of family life. Her family places strong emphasis on kinship, respect for tradition, and the value of hard work, while also encouraging academic achievement. This bicultural environment gave her
    a fluid sense of identity, allowing her to navigate both Mexican heritage and mainstream Texan culture, and fuels her motivation to create technology that bridges linguistic and cultural gaps.
attributes:
  skills: '[''JavaScript'', ''React'', ''Node.js'', ''RESTful API design'', ''SQL'', ''MongoDB'', ''UI/UX design'', ''Bilingual communication (Spanish/English)'', ''Technical writing'', ''Agile methodology'',
    ''Git'', ''AWS Amplify'']'
  hobbies: '[''Visiting art galleries'', ''Attending mariachi and folk music events'', ''Cooking contemporary Mexican dishes'', ''Hiking in the Texas Hill Country'', ''Street photography'', ''Playing narrative
    video games'', ''Reading modern Mexican literature'', ''Developing mini personal coding projects'']'
  career_goals: Grecia aims to become a full‑stack engineer who builds inclusive digital products for the Mexican‑American community. Over the next three to five years she plans to lead a development team,
    contribute to open‑source projects that improve language accessibility, and potentially launch a startup offering bilingual educational platforms. She is also considering a master’s degree in Human‑Computer
    Interaction to deepen her design expertise while continuing to expand her technical stack.
