personas:
  professional: Bobbie Carter is a 19‑year‑old business administration student who blends a competitive edge with hands‑on technical curiosity, leading intramural sports teams while orchestrating community
    events and leveraging Google Workspace and Canva to market small‑scale brand experiences, all with the goal of landing a consumer‑brand internship and eventually steering a lifestyle brand that fuses
    tech gadgets and event culture.
  sports: Bobbie Carter captains the local intramural basketball and soccer teams, admires the Los Angeles Lakers and Manchester United, follows the eSports squad Team Liquid, trains at the community gym
    three times a week, and balances a competitive drive with a habit of double‑checking playbooks before every game.
  arts: Bobbie Carter performs with a weekly improv comedy troupe in downtown, draws inspiration from comedians like John Mulaney, frequents live shows by Tame Impala and The Strokes, and reserves weekends
    for binge‑watching stand‑up specials while also collecting vintage vinyl records.
  travel: Bobbie Carter prefers short, budget‑friendly road trips to music festivals in Austin or food‑truck tours in Portland, yet dreams of a tech‑centric adventure in Tokyo to explore Akihabara’s gaming
    scene and Japanese street food.
  culinary: Bobbie Carter enjoys roaming city food trucks for Korean BBQ tacos and ramen bowls, experiments with homemade spicy gochujang sauce in weeknight stir‑fries, and can assemble a functional custom
    PC faster than they can perfect a soufflé, reflecting a solid intermediate cooking skill paired with a love for bold flavors.
  core: Bobbie Carter is a competitive, tech‑savvy social dynamo whose relentless drive fuels both event‑planning successes and anxiety‑driven splurges, balancing high‑energy group sports with late‑night
    gaming marathons.
background:
  cultural: Bobbie was raised in Bensenville, a suburban community in DuPage County, Illinois, within a middle‑class white family. His surname hints at French‑Cajun ancestry, and family gatherings occasionally
    feature Cajun dishes like jambalaya and zydeco music, though his daily life is shaped by typical Midwestern values of hard work, community involvement, and modesty. Growing up near Chicago, he’s a fan
    of the Bulls, Bears, and Cubs, and he participates in local charity events and neighborhood block parties. He celebrates mainstream American holidays—Thanksgiving, Fourth of July—and also respects his
    family’s Catholic traditions, attending mass on major feast days. This blend of Midwestern suburban culture and a dash of Cajun heritage gives him a diverse cultural perspective while keeping his outlook
    grounded.
