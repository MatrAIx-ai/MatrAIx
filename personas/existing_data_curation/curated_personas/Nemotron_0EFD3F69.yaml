  career_goals: Bobbie aims to complete a Bachelor’s degree in Business Administration within the next three years, focusing on marketing and entrepreneurship. His short‑term goal is to secure an internship
    in a consumer‑focused brand where he can apply his event‑planning and social‑media skills. Long‑term, he envisions becoming a brand manager or product strategist for a midsize company, eventually launching
    his own lifestyle‑brand that blends his love for community events and tech gadgets. He is driven to be a top performer, seeking promotions that recognize his competitive edge while also allowing him
    to mentor younger teammates.
