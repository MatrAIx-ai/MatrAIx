  career_goals: Paris aims to secure a supervisory role within her county’s administrative department, such as senior office manager or team lead, where she can apply her organizational strengths and help
    streamline office processes. To qualify for promotion, she plans to enroll in an associate‑degree program in business administration or office management and to complete a certification in advanced
    Excel and basic data analysis. She also hopes to mentor newer staff, contributing to a supportive workplace culture while gaining the financial stability that will support her personal responsibilities.
