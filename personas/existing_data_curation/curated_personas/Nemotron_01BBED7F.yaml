  hobbies: '[''Visiting art galleries and museums'', ''Attending live music, especially jazz and R&B'', ''Personal painting and mixed-media art'', ''Participating in community mural projects'', ''Hiking
    in the Rocky Mountains'', ''Yoga and mindfulness meditation'', ''Cooking and sharing soul food inspired meals'', ''Socializing with friends and family'', ''Board games and group activities'']'
  career_goals: Melitta aims to become a certified master painter and licensed specialist in decorative finishes within the next three years, positioning herself as a go-to professional for high-end residential
    and boutique commercial projects in Denver. She aspires to launch her own boutique painting studio that blends traditional craftsmanship with contemporary art, offering bespoke mural services and eco-friendly
    interior solutions. Additionally, she plans to mentor apprentices from underrepresented backgrounds, building a more inclusive trade workforce. On a longer horizon, she hopes to integrate her artistic
    training into a part-time fine-art practice, exhibiting work that reflects her cultural heritage and personal narratives.
