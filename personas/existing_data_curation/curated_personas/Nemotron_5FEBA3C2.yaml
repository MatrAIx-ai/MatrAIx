  career_goals: Ronald aspires to pursue a bachelor’s degree in social work or community arts, with the aim of empowering marginalized youth through creative programming. He hopes to combine his passion
    for art and his commitment to social harmony by eventually directing a nonprofit that offers art‑therapy workshops and mentorship for at‑risk teens. In the short term, he plans to secure a scholarship,
    gain experience as a youth counselor or outreach coordinator, and develop his skills in program design and grant writing. He also envisions furthering his own artistic practice, possibly studying graphic
    design to amplify community voices.
