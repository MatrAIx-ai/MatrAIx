persona_description: An archaeologist who specializes in underwater archaeology and has dedicated his career to exploring ancient Egyptian ruins and discovering lost cities. He is particularly interested
  in the Royal Quarters of Alexandria, which were submerged due to earthquakes and tsunamis more than 1,600 years ago, and has been leading a team of divers to excavate them. His expertise in topographical
  surveys and advanced technology has allowed him to uncover stunning artifacts from the last dynasty to rule over ancient Egypt before the Roman Empire annexed it in 30 B.C. and to retrieve everything
  from coins to colossal granite statues of Egypt's rulers and sunken temples dedicated to their gods.
