personas:
  professional: Michelle Letner, a budding junior engineer, leverages their practical curiosity to sketch detailed LEGO machine blueprints before snapping bricks together, channels a competitive spark into
    building faster and more complex structures than classmates, yet often leaves parts scattered across the playroom, reflecting a relaxed, somewhat disorganized approach to systematic planning.
  sports: Michelle Letner dashes through weekend soccer drills with the Pinebrook Mini Panthers during the fall season, cheers on the hometown Little League Tigers during summer games, loves to climb the
    playground’s rope net for a quick cardio burst, and balances their competitive edge with occasional lazy afternoons on the swings, preferring fun over regimented training.
  arts: Michelle Letner fills crayon‑laden sketchbooks with fantastical landscapes inspired by Dr Seuss’s playful curves and Eric Carle’s bold collages, hums along to The Wiggles while assembling LEGO models,
    and eagerly awaits Saturday storytime starring astronaut Chris Hadfield, letting these artistic influences shape their vivid imagination.
  travel: Michelle Letner prefers spontaneous weekend getaways, delighting in day trips to the nearby city zoo and a family road adventure to Yellowstone National Park, while dreaming of a future space‑center
    tour at the Kennedy Space Center and a magical stay at Disneyland, though limited pocket money keeps the grand overseas expeditions on the wish list.
  culinary: Michelle Letner enjoys scooping cheesy macaroni into a bowl, dipping crisp apple slices in peanut butter, helping knead dough for chocolate chip cookies with flour and brown sugar, and occasionally
    swaps broccoli for extra cheese on a personal‑size pepperoni pizza, showcasing a playful yet selective palate.
  core: Michelle Letner is a curious, competitive six‑year‑old who transforms park bug hunts and LEGO builds into mini‑engineering challenges, balances a love for solo sketching with bursty board‑game duels,
    and embraces a flexible, slightly messy routine that fuels their endless imagination.
background:
  cultural: Michelle grows up in the suburban Midwestern community of Mount Prospect, Illinois, where family and school life center on community engagement, seasonal celebrations, and outdoor activities.
    Her household observes typical American traditions such as Thanksgiving, Fourth of July fireworks, and winter holidays, while also enjoying occasional cultural dishes rooted in her European ancestry
    (e.g., German potato salad or Irish soda bread). Regular visits to the local library, participation in community sports leagues, and involvement in school clubs reflect a blend of pragmatic Midwestern
    values and supportive family encouragement of curiosity and practical skill-building.
