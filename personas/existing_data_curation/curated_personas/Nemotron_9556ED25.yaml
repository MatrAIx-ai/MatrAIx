  career_goals: Michelle envisions a future where she can explore her love for science and animals. She often talks about becoming a scientist-engineer who designs inventions that solve everyday problems,
    and she also dreams of being a veterinarian to care for animals. She imagines participating in school science fairs and robotics clubs, aiming to win competitions and prove her ideas work. The combination
    of curiosity, practicality, and her competitive streak fuels her ambition to turn her questions into tangible projects.
