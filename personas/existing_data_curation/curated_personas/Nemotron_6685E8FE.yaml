    choir or community service"]'
  career_goals: Even though he is retired, Alberto aims to stay actively involved in his community and family. He plans to volunteer as a cultural liaison at the local senior center, teaching cooking classes
    that highlight Puerto Rican dishes and sharing his stories with younger generations. He hopes to mentor his grandchildren in Spanish language and cultural traditions, ensuring the family's heritage
    endures. Alberto also aspires to contribute to neighborhood advocacy, working with city officials to improve senior services and accessibility. Additionally, he intends to compile his life memories
    into a memoir that captures the Nuyorican experience, and he looks forward to traveling with his wife back to Puerto Rico to reconnect with relatives and celebrate their roots.
