personas:
  professional: Alberto Acosta, a retired handyman and bilingual community organizer, merges his decades of carpentry, plumbing, and translation skills to run senior‑center events and volunteer cooking
    classes, delivering structured yet flexibly scheduled programs that reflect his practical mindset and love of sociable gatherings.
  sports: Alberto Acosta is an avid New York Mets supporter who never misses a game broadcast, participates in a senior walking club that meets three times weekly in Central Park, and occasionally joins
    a community pick‑up basketball game, blending his love of baseball with low‑impact exercise.
  arts: Alberto Acosta, a lively salsa‑dance enthusiast, spends evenings listening to classic salsa legends like Celia Cruz and modern reggaeton stars such as Bad Bunny, and regularly attends local Latin‑music
    concerts that fuel his energetic social calendar.
  travel: Alberto Acosta plans relaxed yet purposeful trips, favoring weekend road‑rides to nearby historic towns and a forthcoming voyage to the Caribbean island where his family roots lie, balancing a
    modest travel budget with a desire for cultural immersion and family reunions.
  culinary: Alberto Acosta, a skilled home cook, specializes in island‑inspired dishes such as arroz con gandules, pernil, and sweet‑pepper sofrito, often harvesting basil, cilantro, and hot peppers from
    his balcony garden to season meals shared at community gatherings.
  core: Alberto Acosta blends practical handyman know‑how, bilingual charisma, and a love of salsa music into a socially vibrant retirement, navigating health challenges with disciplined monitoring while
    indulging in frugal budgeting, garden‑fresh cooking, and community advocacy.
background:
  cultural: Alberto was born to Puerto Rican parents who migrated to New York during the post‑World War II wave of settlement. Raised in the vibrant neighborhoods of East Harlem, he grew up immersed in
    the Nuyorican culture—a blend of Puerto Rican traditions and the rhythm of the city. Spanish was spoken at home, and Catholic celebrations marked family milestones, while the sounds of bomba, plena,
    and salsa filled the streets. Strong community ties taught him the value of mutual support and collective identity, which he carries forward by participating in local parish events and neighborhood
    festivals. His heritage informs his cuisine, music preferences, and storytelling, and he strives to preserve these customs for his grandchildren and the broader diaspora community in New York.
