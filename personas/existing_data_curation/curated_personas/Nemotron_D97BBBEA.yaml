personas:
  professional: Boni Arroyo, a 94‑year‑old bilingual community cultural facilitator, blends practical home‑grown culinary expertise with an unhurried, flexible approach to organizing storytelling workshops
    and cooking classes, while their gentle competitiveness drives them to earn recognition as the go‑to mentor for younger members despite a habit of loosely scheduled events.
  sports: Boni Arroyo, an enthusiastic supporter of their home nation’s soccer team, never misses a live broadcast on the senior center TV, celebrates victories with homemade snacks, and channels their
    competitive edge into friendly trivia games about soccer history at community gatherings, while preferring the intimacy of small viewing parties over large stadium crowds.
  arts: Boni Arroyo, a lifelong devotee of traditional crochet and a fan of historical fiction set in Central America, routinely competes in local knitting circles for the most intricate patterns, draws
    inspiration from the cumbia rhythms of the Kumbia Kings and the folk voice of Mercedes Sosa, cherishes quiet afternoons reading novels by Isabel Allende, and they often share their creations with younger
    neighbors, all while modestly shunning large gallery events in favor of intimate craft meet‑ups.
  travel: Boni Arroyo, a cautious yet curious traveler, favors leisurely, small‑group excursions to culturally rich spots like the colonial city of Granada or the volcanic highlands of Oaxaca, meticulously
    plans only the essentials, relishes photographing family heirlooms in local museums, and occasionally day‑trips to the nearby river town for fresh market produce, though they resist spontaneous overseas
    adventures due to health concerns.
  culinary: Boni Arroyo, celebrated for their award‑winning pupusas de loroco, seasonal tamales de elote, and comforting atol de arroz, draws fresh chilies and basil from their urban garden, meticulously
    hand‑rolls masa while humming cumbia tunes, and approaches each cooking contest with a competitive precision that coexists with a relaxed, improvisational kitchen style that sometimes leaves the sink
    piled with dishes.
  core: Boni Arroyo, a competitive yet easy‑going cultural elder, weaves stories, recipes, and yarn into a vibrant tapestry of family legacy while they juggle a modest budget, health quirks, and a preference
    for intimate gatherings over grand plans.
background:
  cultural: 'Boni Noel Arroyo was born in a small town in El Salvador and migrated to the United States in the early 1970s, seeking safety during the country’s civil unrest. She settled in Miami’s Little
    River neighborhood, where a vibrant Salvadoran diaspora provided a sense of community. Her upbringing was steeped in Catholic traditions, family-centered celebrations, and the rhythmic sounds of folk
    music. She maintains strong ties to Salvadoran customs: cooking pupusas for holidays, celebrating Día de la Independencia with fireworks and traditional dances, and preserving oral histories of her
    homeland’s rural life. While she has embraced the multicultural milieu of Miami, she remains deeply proud of her Salvadoran identity, often serving as a bridge between older immigrants and younger,
    U.S.-born Salvadorans.'
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Award-winning Salvadoran cooking (pupusas, tamales, atol)'', ''Urban gardening (herbs, vegetables, chilies)'', ''Crocheting and knitting traditional
    patterns'', ''Basic health and nutrition knowledge'', ''Elementary digital literacy (tablet, email, video calls, photo digitization)'', ''Community event organization and oral storytelling'']'
  hobbies: '[''Gardening'', ''Cooking traditional Salvadoran dishes'', ''Knitting and crocheting'', ''Reading historical novels'', ''Following soccer (Salvadoran national team)'', ''Listening to cumbia
    and folk music'', ''Digital photo archiving'', ''Community storytelling'', ''Attending senior center bingo nights'', ''Participating in local cooking contests'', ''Friendly knitting circles'']'
  career_goals: Even at 94, Boni aims to continue shaping her family's cultural legacy and remain vibrant in her community. She plans to compile a handwritten and digitized cookbook of traditional Salvadoran
    recipes, complete with anecdotes and her award-winning pupusa techniques, to pass on to her grandchildren. She hopes to mentor younger members of the local Salvadoran community in cooking and crafts,
    aspiring to be recognized as a cultural elder and perhaps win the "Best Traditional Dish" prize again at the next community fair. Maintaining her health to attend weekly bingo nights, neighborhood festivals,
    and to stay engaged with her descendants via video calls are personal priorities. Additionally, she wishes to master basic video editing to create short documentaries of family stories for future generations.
