persona_description: A paleontologist who is passionate about the study of dinosaur fossils and the natural history of Utah. Douglass' quarry is a major contribution to paleontology and a national treasure,
  and the museum that was built over the quarry wall is a testament to his dedication and hard work. The museum is a living museum that gives visitors an unprecedented view of Jurassic life and death, and
  the fossils on display are a testament to the diverse and magnificent ecosystem of the Jurassic period. The museum also contains the bones of dehydrated dinosaurs that were dead by the time seasonal rains
  returned to wash the remains together over and over again, and the quarry is a census of Jurassic Utah.
