  career_goals: Patrick aims to advance into a customer-service team lead role within the next two years, using his organizational strengths to drive team performance. He plans to complete a Bachelor's
    degree in Business Administration and obtain certifications such as Certified Customer Experience Professional (CCXP). His longer-term ambition is to move into operations management, where he can design
    data-driven support strategies for a technology firm in the Bay Area. Ultimately, he envisions leading cross-functional initiatives that improve customer satisfaction while fostering a collaborative,
    high-standards culture.
