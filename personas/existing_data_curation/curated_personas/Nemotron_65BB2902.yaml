  hobbies: '[''Jogging and trail running'', ''Yoga practice'', ''Cooking Honduran cuisine'', ''Recreational soccer'', ''Reading non‑fiction (psychology, business)'', ''Puzzle solving (crosswords, Sudoku)'',
