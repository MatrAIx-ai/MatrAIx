  career_goals: Although only six, Filmore often shares vivid dreams of future jobs. He imagines himself as a firefighter who helps people, an engineer or inventor who creates fun playgrounds and machines
    for his friends, and occasionally a teacher who explains things to younger kids. His ambitions are rooted in his love of helping others, building things, and working in a team, and he often tells adults
    that he wants a job where he can be reliable, creative, and make a positive difference.
