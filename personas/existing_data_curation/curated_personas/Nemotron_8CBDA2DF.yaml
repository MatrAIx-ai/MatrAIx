  professional: Alexa Solis, a curious infant who delights in arranging colorful blocks and crayons, demonstrates early pattern‑recognition and spatial‑thinking skills that suggest a future path in design
    or architecture, with their relaxed attitude toward structured tasks and cooperative demeanor poised to shape a collaborative professional style.
  sports: Alexa Solis, a stroller‑racing enthusiast at the neighborhood park, loves cheering for the Chicago Cubs on family TV and imitates batting motions during Fourth of July fireworks, while occasionally
    joining a toddler soccer drop‑in class at the community center’s Little Leaguers club.
  arts: Alexa Solis, an early art lover who delights in the bright murals of the Chicago Children’s Museum and the gentle strings of lullabies performed by the local church choir, often mimics painting
    by smearing finger‑paint on paper, idolizing the bold polka‑dots of Yayoi Kusama and the whimsical illustrations of Dr. Seuss.
  travel: Alexa Solis, a wide‑eyed explorer who has already visited Millennium Park in Chicago, the sandy shores of Lake Michigan, and a weekend family retreat in Door County, Wisconsin, prefers stroller‑friendly
    excursions with familiar faces over crowded airports and enjoys the simple joy of a backyard picnic during community Fourth of July celebrations.
  culinary: Alexa Solis, a budding palate who relishes the creamy smoothness of avocado puree, the sweet tang of apple sauce, and the comforting aroma of roasted turkey during Thanksgiving, frequently creates
    messes while mastering self‑feeding with a soft‑tipped spoon and giggles at the sight of colorful vegetable sticks.
  core: Alexa Solis, a curious, gentle one‑year‑old who wanders through colors, community gatherings, and soft routines, leaving a trail of crayons and giggles wherever they go.
