personas:
  professional: Lia Ray, a retired civil engineer and technical consultant, applies her analytical rigor, project‑management savvy, and knack for translating complex data into clear action plans to mentor
    high‑school STEM students, spearhead broadband advocacy, and write local‑history tech columns, all while leveraging her public‑speaking flair and competitive drive to become a respected voice on the
    Roane County Community College board.
  sports: Lia Ray enjoys hiking the Appalachian Trail’s Shenandoah stretch, bird‑watching at the New River Gorge state park, cheering on the West Virginia Mountaineers football team, and participates in
    the local Roane County Runners club, yet she often skips the occasional community basketball pickup game because she prefers the quiet of the trail over the noise of the court.
  arts: Lia Ray, a banjo‑player in the regional folk band Mountain Hollow, weaves traditional Appalachian tunes alongside modern covers of Rhiannon Giddens and The Avett Brothers, attends weekly quilting
    circles where she admires the work of artist Faith Ringgold, and pauses her trivia nights to discuss the lyrical storytelling of Bob Dylan’s Blood on the Tracks.
  travel: Lia Ray favors road trips that combine heritage and nature, having driven the Blue Ridge Parkway to explore historic homesteads, trekked the Great Smoky Mountains in spring, planning a future
    pilgrimage to Kyoto’s cherry‑blossom gardens to study horticultural design, yet she balances these ambitions with her volunteer schedule that often anchors her at home.
  culinary: Lia Ray delights in Southern cooking, frequently preparing shrimp and grits with smoked paprika, collard greens simmered with ham hocks, and sweet potato pie spiced with nutmeg, while experimenting
    with heirloom tomatoes from her garden in a fresh caprese salad, though her penchant for extra salt sometimes clashes with her hypertension management.
  core: Lia Ray blends a seasoned engineer’s analytical mind with a gregarious, competitive spirit, channeling curiosity into community mentorship, banjo‑stringed folk jams, and a thriving heirloom garden,
    all while navigating occasional financial forgetfulness and a health regimen that balances discipline with occasional neglect.
background:
  cultural: Lia grew up in a middle‑class white family in the Appalachian foothills of eastern Tennessee, where church, hospitality, and a strong sense of community were core values. Her upbringing emphasized
    education, self‑reliance, and pride in regional traditions such as folk music and home‑cooked Southern cuisine. Though her STEM degree took her to urban campuses, she has always maintained close ties
    to Roane County’s cultural heritage, integrating Appalachian folk arts, local history, and Southern hospitality into her daily life.
