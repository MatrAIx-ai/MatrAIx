  career_goals: Although fully retired, Lia aims to leverage her STEM expertise to improve rural education and connectivity. She plans to launch a mentorship program that pairs senior volunteers with high‑school
    students interested in science and engineering, secure a seat on the Roane County Community College board, and author a series of local‑history columns that highlight technological innovation in the
    region. Her competitive drive pushes her to earn the county’s Volunteer of the Year award and become a recognized advocate for broadband expansion.
