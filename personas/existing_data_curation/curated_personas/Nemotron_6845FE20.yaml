personas:
  professional: Jesus Pascua, a budding junior scientist at the Happy Kids Learning Center, balances a curious fascination with building simple machines using LEGO bricks while responsibly tidying up their
    work area, showing early signs of practical problem‑solving.
  sports: Jesus Pascua, a lively member of the Bumble Bee Soccer Club, eagerly plays on the junior team during the fall season while also cheering for the Los Angeles Dodgers, and enjoys weekend trips to
    the local swimming pool where they practice freestyle strokes.
  arts: Jesus Pascua, an enthusiastic fan of Disney animation, often recreates scenes from Frozen with crayon drawings, sings along to songs by Idina Menzel, and attends occasional Saturday puppet‑theater
    shows featuring characters like the Muppets.
  travel: Jesus Pascua, who loves family road trips, has delighted in visits to the beach town of Santa Monica and the magical realms of Disneyland, while dreaming of a future adventure to the Grand Canyon's
    wide vistas.
  culinary: Jesus Pascua, with a budding palate for cheesy delights, enjoys spiking homemade mac and cheese with tiny broccoli florets, dabs ketchup on chicken nuggets, and proudly helps blend banana‑strawberry
    smoothies using a child‑sized blender.
  core: Jesus Pascua blends a bright curiosity with a surprisingly organized routine, managing pocket money, allergies, and playtime like a mini‑entrepreneur who never shies from a sticky‑fingered art project.
background:
  cultural: Jesus is raised in a Cuban household in Miami Beach, where Spanish and English are spoken interchangeably. His family celebrates Cuban traditions through music, dance, and food—enjoying dishes
    like arroz con pollo, plantains, and empanadas during gatherings. He participates in local cultural events such as Carnaval Miami and feels a strong connection to his heritage while also embracing the
    diverse, multicultural fabric of his community.
