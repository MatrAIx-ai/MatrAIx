persona_description: A visiting graduate student and visiting scholar who specializes in the study of nanomaterial synthesis and process discovery. They have experience in the use of a Robofurnace, an automated
  system for making carbon nanotube forests and studying their growth, and high-throughput manufacturing of polymer microstructures for biosensing. They have received recognition for their work in the field
  of nanomaterials and are currently working on improving the Robofurnace project at MIT.
