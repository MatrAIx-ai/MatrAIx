  career_goals: Although still very young, Jairo often talks about becoming a "big helper" when he grows up. He imagines careers that let him protect and assist others, such as a firefighter, a teacher,
    or a veterinarian. He also expresses a love for caring for animals and helping friends, reflecting his kind and cooperative nature. These ambitions are framed in the context of wanting to make people
    feel safe and happy.
