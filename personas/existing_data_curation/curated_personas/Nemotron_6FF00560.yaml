  hobbies: '[''Reading science and natural history books'', ''LEGO model building'', ''Hiking and nature exploration'', ''Stargazing'', ''Scratch programming'', ''Sketching wildlife'', ''Strategy board
    games'', ''Junior Boy Scouts activities'']'
  career_goals: Todd dreams of turning his love for nature and his knack for organized problem‑solving into a career as an environmental scientist or wildlife biologist focused on New Hampshire’s forest
    ecosystems. He hopes to earn a degree in environmental science, participate in citizen‑science projects, and eventually work for a state agency or a conservation nonprofit where he can design practical
    solutions for habitat preservation. Combining his budding interest in technology, Todd also envisions developing educational apps or digital field guides that help other kids explore the outdoors responsibly.
