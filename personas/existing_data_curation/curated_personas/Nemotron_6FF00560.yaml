personas:
  professional: Todd Harris is a budding junior naturalist and aspiring engineer who merges their love for dinosaurs, rockets, and local wildlife into detailed LEGO constructions and meticulous field journals;
    they apply their calm, cooperative nature and the community‑fair tradition of showcasing projects to lead small scouting assignments with reliable organization and practical problem‑solving.
  sports: Todd Harris enjoys seasonal hiking with the Franklin Falcons Boy Scout Trail Club, joins the Franklin Tigers youth soccer team for weekend matches, and occasionally swings a bat for the New Hampshire
    Little League Ravens; they prefer low‑key, nature‑focused physical activity over loud stadium crowds.
  arts: Todd Harris spends free afternoons sketching local wildlife inspired by John James Audubon and Robert Bateman, listens to the melodic folk tunes of Vance Joy while assembling LEGO rockets, and watches
    National Geographic documentaries featuring David Attenborough; they integrate these artistic influences into their own creative storytelling.
  travel: Todd Harris prefers family‑oriented, low‑budget trips that blend outdoor discovery with educational stops, having hiked the White Mountains, camped by Lake Winnipesaukee, and explored Acadia National
    Park; they dream of a future visit to the Kennedy Space Center in Florida and a road‑trip across the Canadian Maritimes for autumn leaf‑peeping.
  culinary: Todd Harris enjoys the comforting flavors of New England clam chowder, homemade apple crisp with fresh apples and cinnamon, and maple‑glazed pork chops, and while still mastering basic kitchen
    tasks like stirring soup and toasting grilled cheese, they love helping their parents whisk together pancake batter with locally harvested maple syrup on weekend mornings.
  core: Todd Harris is a calm, methodical nine‑year‑old who meticulously organizes every rock, leaf, and LEGO piece in separate boxes, sometimes spends hours tracking constellations at the cost of missing
    bedtime, and treats their field journal like a treasure chest; they occasionally hoard glittery minifigures as secret collectibles.
background:
  cultural: Todd comes from a multigenerational white New England family rooted in the small town of Franklin, New Hampshire. The community values self‑reliance, close‑knit relationships, and a deep connection
    to the surrounding forests, lakes, and seasonal changes. Family traditions include participation in town fairs, Fourth of July parades, and autumn leaf‑peeping trips, as well as attendance at a local
    church that fosters service and cooperation. Growing up in this environment, Todd has internalized a respect for nature, a practical work ethic, and a collaborative spirit that emphasizes harmony and
    helping others.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Scratch programming'', ''LEGO building and spatial reasoning'', ''Nature observation and documentation'', ''Project planning and organization'',
