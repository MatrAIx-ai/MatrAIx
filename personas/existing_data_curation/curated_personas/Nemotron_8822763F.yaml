personas:
  professional: Jerame Burrell, a seasoned construction tradesperson with OSHA-30 certification, blends solid skills in concrete forming, framing, and heavy-equipment operation with a curious, art-inspired
    approach that leads them to improvise creative solutions on remodel sites while keeping a relaxed, flexible attitude toward project timelines.
  sports: Jerame Burrell eagerly joins pickup basketball games at the local community center, follows the Houston Rockets and the Texas Rangers, and they enjoy early-morning fishing expeditions to Galveston
    Bay with their family, treating sport as both social outlet and quiet retreat.
  arts: Jerame Burrell frequently roams Houston's street-art corridors, drawing inspiration from muralists like KRIEG and EDALK, while their playlists cycle through Miles Davis, Erykah Badu, and A Tribe
    Called Quest, and they volunteer at community theater productions to blend visual and performing arts.
  travel: Jerame Burrell favors short road trips along the Gulf Coast, having already explored Galveston, New Orleans, and Austin for music and food, and they dream of a cross-country RV adventure that
    would let them scout artistic inspirations in urban neighborhoods while balancing family commitments.
  culinary: Jerame Burrell's kitchen revolves around soul-food BBQ, from slow-smoked brisket seasoned with smoked paprika and brown sugar to collard greens simmered with ham hocks, and they often experiment
    with sweet-potato mash and homemade cornbread, proudly serving family gatherings with a side of creative plating.
  core: Jerame Burrell is a 37-year-old construction enthusiast who fuses a love for street-art aesthetics with hands-on building, balancing relaxed spontaneity and community-driven ambition while they
    occasionally let disorganization slip into daily routines.
background:
  cultural: Jerame was raised in Houston’s East End, a tight‑knit African‑American community where church, family gatherings, and neighborhood events have been central to his identity. His upbringing was
    steeped in the traditions of gospel music, soul food, and a strong sense of mutual support that characterizes many historically Black neighborhoods in the city. Stories of his grandparents’ migration
    from the rural South during the Great Migration have instilled in him a respect for perseverance and community uplift. This cultural heritage informs his collaborative work style, his appreciation for
    artistic expression, and his commitment to giving back through local volunteer initiatives and mentorship of young workers.
