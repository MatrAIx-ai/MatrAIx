    and sustainable design'']'
  career_goals: Hoping to translate his practical expertise and artistic curiosity into a leadership role, Jerame aims to become a certified foreman within three years, leveraging his OSHA 30 certification
    and expanding his knowledge of residential remodeling. He plans to enroll in a local community college trade program to earn a journeyman carpenter credential, which will enable him to take on custom
    renovation projects that incorporate design elements he admires in street art and modern architecture. Long‑term, Jerame envisions launching a family‑run contracting business that focuses on affordable,
    sustainably built homes in Houston’s historically Black neighborhoods, fostering community pride through collaborations with local artists and providing mentorship opportunities for young workers.
