personas:
  professional: A veteran construction manager with 30+ years of hands‑on experience, Tsering Yang leverages strategic project planning, BIM integration, and sustainable building expertise while quietly
    steering diverse teams toward eco‑friendly, culturally resonant designs rooted in the humility and community stewardship emphasized during Losar celebrations.
  sports: Tsering Yang embraces solitary fitness through weekend hikes in the Santa Monica Mountains, occasional trail runs, and a membership at a local tennis club where they root for the Los Angeles Dodgers
    and follow the LA Galaxy’s season, often using the festive energy of Lunar New Year celebrations as a motivational boost.
  arts: Tsering Yang frequents the Getty Center and LACMA, curates a personal archive of vintage construction blueprints, and draws creative inspiration from Ansel Adams’ black‑and‑white landscapes, Yayoi
    Kusama’s installations, and the architectural writings of Rem Koolhaas, while annually attending special exhibitions that highlight contemporary Asian artists during Chuseok festivals.
  travel: Tsering Yang prefers low‑key, contemplative trips, often trekking the ancient monasteries of Bhutan during Losar, exploring Kyoto’s zen gardens, revisiting coastal hikes in Big Sur, and planning
    future visits to the museums of Florence when the consulting firm stabilizes.
  culinary: Tsering Yang enjoys cooking at a moderate skill level, perfecting dishes like bibimbap with gochujang, hand‑rolled momos, and kimchi fried rice, while also preparing barley tea and traditional
    noodle soups for Losar and Chuseok celebrations, sourcing fresh bok choy and barley for a weekly meditation‑inspired dinner.
  core: Tsering Yang blends a quiet, detail‑driven construction legacy with a deep reverence for nature, art, and sustainable practice, all while navigating a solitary lifestyle peppered with occasional
    caffeine‑fuelled late‑night blueprint hoarding.
background:
  cultural: Tsering Yoon Yang is the son of Tibetan and Korean immigrants who settled in Los Angeles after the 1970s diaspora. Growing up in a multicultural neighborhood, he was immersed in Tibetan Buddhist
    teachings, Korean family traditions, and the broader East Asian community of Southern California. He celebrates Losar, Chuseok, and Lunar New Year, and is fluent in English, Korean, and conversational
    Tibetan. His cultural upbringing emphasizes humility, respect for nature, and a strong sense of community responsibility, which inform both his professional ethos and personal pursuits.
attributes:
  skills: '["Project Management", "Construction Scheduling", "Budgeting and Cost Control", "Contract Negotiation", "Construction Safety Compliance", "Quality Assurance", "Risk Management", "Building Information
    Modeling (BIM)", "Sustainable Building Practices", "Vendor and Subcontractor Coordination", "Team Leadership", "Cross-Cultural Communication"]'
  hobbies: '["Visiting Art Galleries and Museums", "Photography (Urban and Landscape)", "Hiking in Quiet Natural Settings", "Reading Architecture and Design Literature", "Meditation and Mindfulness Practices",
    "Cooking Traditional East Asian Cuisine", "Collecting Vintage Construction Blueprints", "Writing a Blog on Sustainable Building Practices"]'
  career_goals: He aspires to transition from site‑focused management to a senior executive role where he can shape industry standards for green construction and culturally resonant architecture in Los
    Angeles. Over the next decade, Tsering aims to launch a boutique consulting firm that advises developers on integrating art, sustainability, and community values into large‑scale projects, while mentoring
    the next generation of construction professionals. He also seeks to achieve a balanced lifestyle that reduces the social strain of daily site interactions, favoring strategic oversight and remote advisory
    work.
