personas:
  professional: Alec Carballes, a budding teen engineer, applies methodical curiosity to building model rockets and crafting Python scripts, showcasing an organized, competitive mindset in every project.
  sports: Alec Carballes, an enthusiastic snowshoe enthusiast and budding snowboarder, regularly joins the Mountain Edge Snowboard Club during winter, follows the Colorado Avalanche and the Denver Broncos,
    and practices balance drills at home, channeling a competitive drive into outdoor fitness.
  arts: Alec Carballes, a sci‑fi voracious reader and indie‑music aficionado, devours novels by Isaac Asimov and Andy Weir while blasting the cumbia rhythms of La Sonora Dinamita, reggaetón hits from Bad Bunny,
    and indie rock from Arctic Monkeys, allowing these eclectic influences to fuel creative storytelling in personal projects.
  travel: Alec Carballes, a meticulous planner, spends weekends mapping future trips to snowy destinations like Whistler in Canada and the Andean peaks, while dreaming of visiting the Kennedy Space Center
    in Florida and the historic libraries of Edinburgh, balancing family budget constraints with a desire for both adventure and quiet study.
  culinary: Alec Carballes, who enjoys cooking traditional Colombian fare, skillfully prepares arepas with corn masa and cheese and hand‑folds empanadas stuffed with seasoned beef and potatoes, often experimenting
    by adding a pinch of cumin or cilantro, and occasionally mixes indie playlists into kitchen time.
  core: Alec Carballes is a methodical, curiosity‑driven teen who balances intense emotions with structured solitude, turning anxiety into disciplined rockets, code, and quiet creativity.
background:
  cultural: Alec was born to Colombian immigrants who relocated to Alaska when he was a toddler. At home, Spanish is spoken alongside English, and family gatherings often feature Colombian foods like sancocho,
    tamales, arepas, and empanadas. He celebrates Colombian holidays such as Independence Day on July 20 and Carnaval de Barranquilla with music, dance, and traditional sweets. The close‑knit family structure
    emphasizes respect for elders and academic achievement, reinforcing Alec’s disciplined study habits. Growing up in Wasilla has immersed him in Alaskan outdoor culture, teaching him an appreciation for
    the wilderness, self‑reliance, and participation in community events like sled‑dog races. This blend of Colombian heritage and Alaskan environment shapes his identity, fostering bilingual fluency, a
    love for hearty home‑cooked meals, and a practical respect for nature.
