  career_goals: Alec aims to channel his curiosity and practicality into a STEM career, targeting robotics engineering or software development. He plans to join his high school’s robotics team, compete
    in regional contests, and earn a scholarship to a university with a strong engineering program. Long‑term, he hopes to design autonomous systems that monitor environmental changes in cold climates,
    merging his interests in technology and the Alaskan wilderness. Additionally, his personal experience with anxiety motivates him to eventually contribute to digital tools that help adolescents manage
    stress and improve mental resilience.
