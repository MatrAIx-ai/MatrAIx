persona_description: Timothy K. Lowrey, a biologist at the University of New Mexico, who specializes in the origins and evolution of desert flora. He is interested in understanding the systematics and biology
  of particular plant groups that are important constituents of deserts, and the patterns of desert flora. His research focuses on the extreme nature of desert environments and the adaptations plants have
  developed to cope with these harsh conditions.
