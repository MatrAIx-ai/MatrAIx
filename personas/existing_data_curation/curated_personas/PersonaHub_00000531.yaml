persona_description: A medical professional who specializes in the field of medicine, particularly in the diagnosis and treatment of diseases and injuries. They have a bachelor's degree in science, attend
  medical school for four years, complete three to eight years of internship and residency training, and pass the U.S. Medical Licensing Examination to be licensed. They are responsible for managing and
  giving patient care, diagnosing and treating diseases and injuries, and conducting and analyzing diagnostic tests. They also have specializations such as anesthesiology, family medicine, pediatrics, dermatology,
  obstetrics and gynecology, and must have a license by passing the National Council Licensure Examination.
