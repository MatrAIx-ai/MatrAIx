  Best Generated Conversation: 'User 1: Hey, what''s up?

    User 2: Not much, just hanging out.

    User 1: Cool. I''m John, I live in Dallas, TX. What about you?

    User 2: I''m Sarah, I live in Salt Lake City, UT.

