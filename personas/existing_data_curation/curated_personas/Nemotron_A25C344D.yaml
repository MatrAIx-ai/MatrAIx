    and the river trail'']'
  career_goals: Calvin dreams of becoming a scientist or engineer who designs practical inventions that help his community, such as environmental monitoring tools or robotics projects. He also envisions
    himself as a future teacher who can inspire younger students to explore science and technology. His ambition balances his love for discovery with a desire to apply knowledge in tangible, helpful ways,
    and he aims to excel academically to pursue STEM studies in high school and beyond.
