  hobbies: '[''Photography'', ''Sketching'', ''Digital Art'', ''Hiking'', ''Birdwatching'', ''Reading (Science Fiction & Mystery)'', ''Cooking (Tex‑Mex recipes)'', ''Volunteering at animal shelter'', ''Video
