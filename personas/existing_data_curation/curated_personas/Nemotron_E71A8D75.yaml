  career_goals: Jennifer aims to earn her GED within the next year and pursue a vocational certification in veterinary assisting or animal care, merging her love for animals with hands‑on healthcare skills.
    She envisions working at a local animal shelter or clinic, and eventually launching a small pet‑sitting or grooming business. Simultaneously, she hopes to refine her graphic design capabilities to offer
    freelance services for small businesses in the Hutto community.
