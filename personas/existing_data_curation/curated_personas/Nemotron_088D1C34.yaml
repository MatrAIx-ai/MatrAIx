personas:
  professional: Cynthia Ricca, a retired horticultural enthusiast and senior‑center volunteer, blends a methodical budgeting style with deep knowledge of Colorado native plants, and they organize community
    garden workshops, preserve local oral histories, and curate intimate art exhibitions for fellow seniors.
  sports: Cynthia Ricca, an enthusiastic walker, joins the senior hiking club for gentle spring treks on the San Miguel trails, plays pickleball at the community center in autumn, and they cheer on the
    Denver Broncos and Colorado Rockies, often wearing a well‑worn team scarf during games.
  arts: Cynthia Ricca, a lifelong patron of visual and musical arts, curates senior‑center gallery displays inspired by Ansel Adams and Georgia O'Keeffe, attends classical piano recitals featuring Lang
    Lang, and they enjoy folk gatherings with performances by the Del McCoury Band.
  travel: Cynthia Ricca, a reflective traveler, prefers leisurely road trips to Colorado's Great Sand Dunes and Rocky Mountain National Parks to photograph seasonal wildflower blooms, plans occasional family
    visits to Santa Fe for its historic art scene, and they budget trips carefully to stay within a modest travel allowance.
  culinary: Cynthia Ricca, an accomplished home preserver, loves canning heirloom tomatoes, fermenting beet kvass, and baking sourdough loaves with locally sourced wild rye, seasoning dishes with sage,
    juniper berries, and Colorado honey, and they share their preserves at community potlucks.
  core: Cynthia Ricca, an 85‑year‑old garden‑obsessed archivist who meticulously catalogs seed packets while habitually misplacing reading glasses, embodies a quiet, methodical devotion to nature, community,
    and memory, and they inspire peers with gentle perseverance.
background:
  cultural: Cynthia is rooted in a white Anglo‑American heritage that has been part of Colorado’s rural fabric for several generations. Her family background blends Midwestern farming values with the pioneer
    spirit of the Rocky Mountain West. Raised in a close‑knit, predominantly Protestant community, she was taught the virtues of self‑reliance, modesty, and service to one’s neighbors. These cultural influences
    have fostered a deep respect for nature, a commitment to community harmony, and an appreciation for both traditional craftsmanship and artistic expression.
