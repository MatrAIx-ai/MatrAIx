  hobbies: '["Visiting contemporary art museums and galleries", "Reading science fiction and speculative fiction", "Playing piano", "Participating in improv comedy workshops", "Cooking experimental cuisine
    and hosting dinner parties", "Running in Rock Creek Park", "Attending tech and legal innovation meetups", "Urban photography", "Mentoring law students from underrepresented backgrounds", "Traveling
    to international art and law conferences"]'
  career_goals: Angela aims to become a partner and head of the technology law practice at her firm, positioning herself as a leading authority on AI ethics, data governance, and digital rights. She aspires
    to influence national policy through advisory roles with government agencies and think tanks, and to author a seminal book on the intersection of law, technology, and art. Passionate about representation,
    she also plans to establish a mentorship program for Black and other underrepresented law students, and eventually consider a public office where she can champion civil rights and tech innovation.
