personas:
  professional: Angela Thigpen, a 48‑year‑old technology‑focused litigator, merges her methodical legal expertise with a vivid imagination to lead multidisciplinary teams, negotiate high‑stakes IP disputes,
    shape AI‑ethics policy, and mentor underrepresented law students with a competitive edge.
  sports: Angela Thigpen, an avid runner who logs weekly miles in Rock Creek Park with the Rock Creek Runners club, avidly follows the Washington Capitals and DC United, and participates in weekend pick‑up
    basketball games, embodying an energetic, sociable nature while maintaining a competitive streak.
  arts: Angela Thigpen, a frequent visitor to the Hirshhorn Museum and Washington Improv Theatre, immerses themselves in contemporary installations by Olafur Eliasson, plays Philip Glass piano Etudes, and
    reads cyberpunk novels such as Neuromancer, weaving artistic curiosity into their professional creativity.
  travel: Angela Thigpen, who has attended art and law conferences in Berlin, Tokyo, and Lisbon, plans a future retreat to Reykjavik’s geothermal spas while balancing family obligations, reflecting a penchant
    for structured itineraries and adventurous curiosity.
  culinary: Angela Thigpen, an experimental home chef, delights in crafting sous‑vide duck confit with black‑garlic glaze and edible‑flower cocktails for dinner parties, often sourcing exotic ingredients
    like umeboshi and mole paste, showcasing an inventive palate and meticulous attention to detail.
  core: Angela Thigpen, a 48‑year‑old tech‑law strategist, balances a razor‑sharp analytical mind with a vivid artistic imagination, thriving on competition, mentorship, and meticulously planned creativity.
background:
  cultural: Angela’s cultural background is rooted in the African American community of Washington, DC. Her family’s history includes roots in the Southern United States and participation in the Great Migration,
    which instilled a strong sense of resilience and community activism. Growing up, she was immersed in Black cultural traditions—gospel music, soul food, and celebrations like Juneteenth and Kwanzaa—while
    also witnessing the civil rights legacy of the nation’s capital. As a Black woman in both STEM and law, she has navigated and challenged systemic barriers, shaping her commitment to diversity, equity,
    and inclusion in her professional and personal life.
attributes:
  skills: '["Intellectual property law", "Technology and cybersecurity regulations", "Data privacy compliance", "Complex civil litigation", "Legal research and writing", "Negotiation and mediation", "Policy
