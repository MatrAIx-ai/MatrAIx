persona_description: A Rhode Island school district administrator who is responsible for managing and overseeing the financial operations of the district, including the implementation and administration
  of the Uniform Chart of Accounts (UCOA) and its impact on financial transparency, accountability, and comparability. The persona is deeply knowledgeable about the UCOA, its standardized account-code structure,
  and its role in ensuring that every district, charter public school, and state-operated school can use the same methods for tracking revenue and expenses in their daily accounting. The persona is also
  interested in the district's investment decisions and how the UCOA can help them make informed decisions to improve instruction and advance learning.
