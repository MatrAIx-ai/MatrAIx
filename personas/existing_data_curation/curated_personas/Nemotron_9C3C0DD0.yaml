  career_goals: Angela intends to channel her curiosity and practicality into a career in multimedia communication. She aims to graduate high school with honors, earn a scholarship in communications or
    journalism, and secure an internship at a local news outlet in Chicago. Long‑term, she envisions becoming a broadcast journalist or digital media producer who creates investigative pieces on community
    issues, while also maintaining a personal YouTube channel that blends storytelling with practical tutorials. Her competitive nature pushes her to eventually lead a media team, and she plans to develop
    stress‑management routines to sustain her high‑energy work style.
