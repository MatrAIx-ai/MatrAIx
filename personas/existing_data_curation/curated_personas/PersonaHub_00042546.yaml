persona_description: A historian who specializes in the study of New Zealand's history, particularly the period between the 1850s and the 1900s. He is knowledgeable about the events and figures of this
  time period, including the Siege of Orakau in 1864. He has a deep understanding of the military strategies and tactics used during this time, and is skilled in researching and analyzing historical documents.
  He is also an expert in the use of modern technology to analyze and interpret historical data, such as the use of GIS and digital archives. He is interested in the impact of colonial policies on indigenous
  peoples and the development of New Zealand's national identity.
