    Scratch animations'', ''writing short stories in a personal journal'', ''observing clouds and sketching them'']'
  career_goals: Liesl dreams of becoming a wildlife illustrator who can capture the quiet beauty of the desert and share it in books or museum exhibits. She imagines a future studio where she can work alone,
    drawing animals and plants she observes on nature walks. Occasionally she envisions herself as an astronaut or a space artist, using her drawing skills to illustrate imagined journeys beyond Earth.
    Her overarching ambition is to blend art and science so that others can appreciate the natural world without needing to be in the spotlight.
