personas:
  professional: Liesl Bourgeois is an aspiring junior illustrator and budding coder who spends her free time turning desert scenes into vivid drawings, crafting LEGO models, and using Scratch to animate
    her stories, blending meticulous organization with free‑flowing imagination.
  sports: Liesl Bourgeois enjoys solitary nature walks and weekend hikes with the local Junior Explorer Club, follows the Arizona Diamondbacks on television, and practices beginner‑level gymnastics at the
    community center, favoring personal endurance over team competition.
  arts: Liesl Bourgeois is a budding visual artist who reveres Georgia O'Keeffe’s cactus paintings, dabbles in piano pieces like ‘Für Elise’ and ‘Twinkle Twinkle Little Star’, builds intricate LEGO sculptures,
    and channels her creativity into Scratch animations, drawing inspiration from illustrated adventure books by Brian Jacques.
  travel: Liesl Bourgeois loves exploring nearby desert landscapes, having hiked Saguaro National Park and Joshua Tree National Park, and dreams of backpacking through the red cliffs of Sedona and the ancient
    ruins of Machu Picchu, preferring low‑key, nature‑focused trips planned on a hand‑drawn map.
  culinary: Liesl Bourgeois enjoys simple kitchen experiments like making mango‑pineapple sunrise smoothies, baking cactus‑shaped sugar cookies, and assembling mild chicken tacos with fresh cilantro, often
    adding a pinch of turmeric for color reminiscent of desert sunsets.
  core: Liesl Bourgeois is an eight‑year‑old quiet explorer who fills sketchbooks with desert dreams, builds LEGO kingdoms, and whispers to clouds while gathering rocks, all guided by a gentle, organized
    yet flexible spirit.
background:
  cultural: Liesl was raised in Mesa, Arizona, a city where the desert scenery, warm climate, and Southwestern influences shape daily life. Her family, originally from the Midwest, moved to Arizona to enjoy
    the outdoor lifestyle while preserving holiday traditions rooted in European ancestry, such as Thanksgiving gatherings and holiday baking. Growing up, she has attended community events like the Mesa
    Arts Festival, which introduced her to local artists and craftspeople. Field trips to the Arizona Museum of Natural History and the Desert Botanical Garden have deepened her appreciation for the regional
    environment. Though primarily identifying as White, Liesl’s cultural experience blends mainstream American school culture with subtle exposures to the rich Hispanic and Indigenous heritage present in
    her broader community, fostering a respectful curiosity about diverse artistic expressions.
