  hobbies: '[''Playing basketball at local parks'', ''Freestyle rap and lyric composition'', ''DJing and music production'', ''Street photography'', ''Video gaming (NBA 2K, action shooters)'', ''Cooking
    Southern soul food'', ''Attending church gatherings and community block parties'', ''Car shows and automotive tinkering'']'
  career_goals: Frank aims to obtain his GED within the next year and enroll in an automotive technology apprenticeship at a local community college. He envisions becoming a certified mechanic and eventually
    launching a mobile auto‑repair service that caters to his neighborhood. Parallel to this, he wants to turn his graphic‑design and music‑creation talents into a modest streetwear brand that incorporates
    Afro‑Texan motifs, using social media to build a following. Long‑term, Frank hopes to mentor younger teens in his community, sharing practical trade skills and encouraging creative pursuits.
