personas:
  professional: Frank Walker is a self‑taught automotive enthusiast and graphic‑design hobbyist who blends hands‑on mechanical work with creative street‑wear concepts, balancing curiosity and practicality
    while embracing a relaxed, flexible approach to obligations and deadlines.
  sports: Frank Walker shoots hoops at Riverside Park every evening, follows the Houston Rockets avidly, and is a regular member of a neighborhood basketball league that meets on weekends, pairing street‑ball
    with occasional weight‑lifting sessions at the local gym.
  arts: Frank Walker writes freestyle rap verses, experiments with beats on FL Studio, spins tracks as a weekend DJ, and designs event flyers inspired by street aesthetics, drawing creative fuel from artists
    like Kendrick Lamar, DJ Snake, and graphic designers such as Shepard Fairey.
  travel: Frank Walker prefers budget‑friendly road trips, having driven to New Orleans for its music scene, visited Atlanta for its car shows, and taken occasional weekend getaways to the nearby Gulf Coast,
    always scouting affordable AirBnB stays and planning itineraries on the fly.
  culinary: Frank Walker cooks Southern soul food staples like collard greens, fried chicken, and cornbread, seasoning dishes with a blend of hot sauce and herbs, proudly serving family gatherings while
    sometimes over‑indulging and leaving leftovers for the next day’s lunch.
  core: Frank Walker is a curious, hands‑on 24‑year‑old who fuses auto repair, music, and street‑wear design while juggling a laid‑back attitude, occasional financial impulsivity, and a commitment to community
    roots.
background:
  cultural: Frank is a 24‑year‑old African American from Arlington, Texas, raised in a close‑knit Black community that values church, family, and neighborhood solidarity. His upbringing combined Southern
    traditions—soul food, gospel music, and community festivals—with the urban influences of the Dallas‑Fort Worth metro area, including hip‑hop culture, street fashion, and local car culture. He draws
    from his African heritage through rhythmic elements in his music and respects the resilience and resourcefulness characteristic of Black Texans. These cultural threads inform his tastes, his informal
    mentorship mindset, and his desire to give back to the community that shaped him.
attributes:
  skills: '[''Basic auto maintenance'', ''Handyman repairs'', ''Graphic design (Photoshop & Canva)'', ''Hip‑hop lyric writing'', ''Music production (FL Studio)'', ''Social media content creation'', ''Team
