  hobbies: '[''Science-fiction reading'', ''LEGO robotics building'', ''Chess (competitive)'', ''Minecraft (creative mode)'', ''Cycling'', ''Space and technology documentaries'', ''School coding club'']'
  career_goals: Matthew envisions a future where he channels his curiosity and practical mindset into a career in technology. He aims to earn a scholarship to a top STEM‑focused high school, later attend
    a university renowned for computer science or robotics, and eventually become a software engineer or robotics developer. He is motivated by the desire to design innovative solutions, compete in hackathons,
    and contribute to projects that blend creativity with functional engineering.
