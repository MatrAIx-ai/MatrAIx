persona_description: A military strategist who is responsible for the planning and execution of India's nuclear deterrence strategy. This person is deeply involved in the development and deployment of India's
  nuclear submarines, as well as the integration of missiles into these submarines. They are aware of the challenges and limitations of India's current capabilities, and are responsible for making informed
  decisions about the number of submarines to be deployed, the type of missiles to be carried, and the technology to be developed to ensure the success of the nuclear triad. This person is also responsible
  for ensuring that India's nuclear deterrence strategy is survivable in the face of potential threats from its two most likely foes, the United States and China.
