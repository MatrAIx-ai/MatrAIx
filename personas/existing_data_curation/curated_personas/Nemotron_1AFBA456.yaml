  career_goals: She aims to grow her company into a leading regional innovator in sustainable technology, expanding beyond Oakdale to serve multiple states in the Gulf Coast. Julie aspires to become a recognized
    thought leader in the industry, speaking at national conferences and mentoring the next generation of women in STEM. She also plans to champion workplace mental-health initiatives, integrating supportive
    policies that address her own experiences with anxiety, and to eventually launch a venture capital fund focused on socially responsible startups.
