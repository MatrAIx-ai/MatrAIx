persona_description: A healthcare professional who is interested in improving the efficiency and effectiveness of tourniquets in intravenous medication and blood sampling. This individual is likely to be
  familiar with the common disadvantages of the ordinary rubber tubing tourniquet, such as the bulging binding loop, jerky release, and care required to prevent needle displacement. This persona is likely
  to be interested in developing or improving alternative tourniquets that address these issues and provide a more comfortable and effective solution for medical procedures.
