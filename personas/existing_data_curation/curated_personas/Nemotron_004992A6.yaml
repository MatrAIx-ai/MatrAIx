personas:
  professional: Mal Parker is a veteran residential maintenance specialist turning toward part‑time handyman consulting, leveraging three decades of carpentry, plumbing, and electrical know‑how while meticulously
    scheduling jobs in spreadsheets, and they use their disciplined, organized approach to mentor younger neighbors on safe tool use and community repair projects.
  sports: Mal Parker is an avid Philadelphia Eagles fan who never misses a Sunday game, joins the Philadelphia Senior Fitness Walkers for weekly strolls, and they also root for the local 76ers during basketball
    season, integrating their disciplined approach to fitness with team loyalty.
  arts: Mal Parker finds solace in classic soul and R&B, regularly listening to Marvin Gaye, Aretha Franklin, and Al Green while volunteering in the church’s music ministry, and they occasionally dust off
    an old vinyl turntable to relive the era’s rich harmonies during weekend gatherings.
  travel: Mal Parker prefers planned road trips to historic Southern towns like Savannah and Charleston, keeps a travel spreadsheet for each destination, and they dream of a relaxed cruise to the Bahamas
    once the retirement fund stabilizes, balancing wanderlust with budget constraints.
  culinary: Mal Parker delights in cooking Southern comfort food such as shrimp and grits, collard greens seasoned with smoked ham hocks, and buttery cornbread, honing their recipe skills in the backyard
    kitchen while they carefully source fresh vegetables from their own garden.
  core: Mal Parker is a detail‑obsessed handyman who channels worry into meticulous budgeting, often losing sleep over project estimates, yet they find calm in wood grain patterns and the steady rhythm
    of garden planting.
background:
  cultural: Mal is an African‑American who grew up in the greater Philadelphia area during the later years of the Great Migration, when many families moved north for industrial work. His upbringing was
    anchored in church, community gatherings, and family meals featuring soul food. He maintains strong ties to the Black faith community in Aston, participating in church service, choir, and neighborhood
    block parties. His cultural identity blends Southern culinary traditions with the resilience and solidarity of the local Black community, and he values passing this heritage to younger generations.
