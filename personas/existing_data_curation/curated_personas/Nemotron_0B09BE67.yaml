  hobbies: '[''Reading (business & self‑improvement)'', ''Strategy games (chess, Civilization)'', ''Hiking'', ''Indoor rock climbing'', ''Experimental cooking'', ''Photography'', ''Journaling'', ''Podcast
    listening'', ''Small social gatherings'']'
  career_goals: Tammy aims to secure a remote business analyst or marketing associate role that lets her apply her analytical strengths while preserving flexibility and autonomy. In the medium term, she
    plans to launch her own e‑commerce venture focused on niche lifestyle products, using data‑driven market insights to out‑compete larger retailers. Her long‑term ambition is to become the founder‑CEO
    of a small, agile startup that merges sustainability with technology, and eventually mentor other young entrepreneurs seeking to blend curiosity with practical execution.
