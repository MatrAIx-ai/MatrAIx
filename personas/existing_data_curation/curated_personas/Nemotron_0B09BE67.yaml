personas:
  professional: Tammy Thomas, a 19‑year‑old aspiring business analyst, blends data‑driven market research with an intuitive knack for crafting persuasive pitches, delivering concise reports despite a relaxed
    approach to scheduling, and they thrive in remote, flexible environments where their competitive drive pushes them to out‑perform peers.
  sports: Tammy Thomas enjoys indoor rock climbing at a downtown gym, weekend hikes on Hill Country trails, cheers for Austin FC and the Texas Rangers, and they follow a self‑crafted cardio regimen that
    frequently gets postponed for spontaneous board‑game nights.
  arts: Tammy Thomas curates an eclectic vinyl collection featuring Tame Impala and Anaïs Mitchell, studies the street photography of Terry Richardson, experiments with double‑exposure techniques inspired
    by David Lynch, and they attend live performances at the local Austin music hall to recharge their creative instincts.
  travel: Tammy Thomas favors spontaneous road trips over rigid itineraries, has trekked the dramatic cliffs of the Grand Canyon, explored Kyoto’s neon backstreets, dreams of backpacking Patagonia’s icy
    fjords, and they keep a tight student budget in mind when planning each adventure.
  culinary: Tammy Thomas loves experimental cooking, frequently whipping up kimchi‑infused ramen, sous‑vide salmon with miso glaze, and perfecting smoked paprika and coriander‑spiced chickpea tacos, while
    they source fresh herbs from the local farmer’s market to elevate each dish.
  core: Tammy Thomas is a relentless curiosity‑driven strategist who juggles disciplined analysis with a habit of leaving half‑finished projects scattered across their dorm, fueled by late‑night coffee,
    and they possess an unshakable competitive spark.
background:
  cultural: Tammy grew up in Converse, Texas, an unincorporated suburb of San Antonio in Bexar County. Her family is of white, Southern‑West Texas heritage, with roots in farming and small‑business ownership
    that emphasize self‑reliance, hard work, and modesty. Raised in a middle‑class, Protestant household, she was taught the value of community service and hospitality, typical of Texas culture. Proximity
    to the vibrant, multicultural San Antonio area exposed her to Mexican culinary traditions and bilingual neighbors, subtly influencing her palate and appreciation for cultural diversity. While she respects
    traditional Texan values—pragmatism, independence, and a relaxed approach to schedules—her personal outlook blends these with a modern, individualistic mindset shaped by her curiosity and competitive
    drive.
