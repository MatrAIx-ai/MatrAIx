  hobbies: '[''Softball league'', ''Zydeco dancing'', ''Cajun cooking and hosting dinner parties'', ''Gardening'', ''LSU football games'', ''Community volunteering'', ''Yoga and mindfulness practice'',
    ''Reflective journaling'', ''Traveling to cultural festivals'', ''Listening to local music'']'
  career_goals: Joy aims to earn a senior HR certification (SHRM‑CP or PHR) within the next year and leverage it to become a regional HR Director. She is driven to spearhead a comprehensive employee wellbeing
    program that integrates mental‑health support, reflecting her own experience with emotional reactivity. Competitive by nature, she wants to position her department as a benchmark for innovative HR practices
    in the Gulf Coast, champion data‑driven decision‑making, and mentor emerging HR talent to build a high‑performing team.
