  hobbies: '[''Mural painting'', ''Woodworking'', ''Cooking traditional Mexican cuisine'', ''Listening to Mexican folk music (mariachi, cumbia)'', ''Attending local soccer matches'', ''Community volunteering
    and event organization'', ''Reading science‑fiction novels'', ''Photography of architectural details'', ''Fishing'', ''Participating in cultural dance workshops'', ''Mentoring youth in trades'']'
  career_goals: Ramon aims to transition into a foreman or site supervisor role within the next three years, leveraging his reliability and methodical approach to lead crews. He plans to obtain certifications
    as a certified crane operator and a project manager, and eventually start his own small contracting business that blends construction with artistic design services, such as custom home renovations that
    incorporate Mexican‑inspired murals and woodworking. He also wants to mentor younger Latino workers, helping them pursue trade certifications and higher education.
