  career_goals: Frank aspires to become a professional baseball player and eventually a coach, driven by his competitive nature and love for team dynamics. He also dreams of a career in civil engineering
    or the U.S. Navy, attracted by the structure, discipline, and opportunities to serve his community. In the short term, he aims to secure a spot on his high school varsity baseball team, maintain strong
    grades in math and science, and earn a scholarship that could lead to a technical college or apprenticeship.
