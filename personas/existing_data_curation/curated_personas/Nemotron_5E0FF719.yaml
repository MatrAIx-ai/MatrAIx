personas:
  professional: Frank Mcever, an aspiring baseball pitcher and junior esports strategist, channels their love for organized competition into leading a squad in Fortnite while meticulously practicing at
    the local batting cages, balancing a practical, structured approach with the energetic spark of group play.
  sports: Frank Mcever, a dedicated member of the town’s Little League baseball team and a fan of the regional high school basketball squad, the Rams, spends weekends at the batting cages and follows the
    MLB Chicago Cubs, approaching fitness with regimented drills but often skipping stretching when excited for a game.
  arts: Frank Mcever, a drum enthusiast in the school marching band, vibes to pop‑punk icons like Blink‑182 and All Time Low, and spends free time sketching team logos, letting the energetic rhythms shape
    their identity and social gatherings.
  travel: Frank Mcever prefers short, action‑filled trips like the annual county fair, a weekend camping adventure at State Park, and a family road‑trip to Washington D.C.’s National Air and Space Museum,
    planning itineraries with a detailed checklist to keep anxiety at bay.
  culinary: Frank Mcever favors handheld favorites such as pepperoni pizza, chicken nuggets, and nachos loaded with cheese and jalapeños, can whip up a basic spaghetti with marinara using garlic and oregano,
    and enjoys trying new snack combos after a baseball practice.
  core: Frank Mcever is a competitive, structure‑loving 12‑year‑old whose high energy fuels baseball and gaming, while anxiety and a penchant for impulsive snack runs keep their days a lively tug‑of‑war
    between order and chaos.
background:
  cultural: Frank is a White teenager raised in the small Midwestern town of El Dorado, Kansas. His family has deep roots in the local farming community, and he grew up attending a Methodist church where
    group service and community involvement are emphasized. The town’s values of hard work, modesty, and neighborliness shape his outlook. He participates in regional traditions such as the county fair,
    4‑H projects, and high school sports, reflecting the close‑knit, agriculture‑influenced culture of rural Kansas.
