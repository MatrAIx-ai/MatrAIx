persona_description: A linguist who is interested in the use of flags as language symbols and the potential issues associated with their use. They are aware of the importance of respecting and treating
  flags with respect, and are concerned about the performance issues that can arise from using flags on international and multilingual pages. They are also aware of the need to provide alternative textual
  presentations of information in languages that readers may not know, and are interested in the use of standardized codes such as ISO 639. They are not interested in using flags as symbols for any language
  that they do not know, and are aware of the potential for different colors to carry messages. They are also interested in the use of symbols for languages, but are not interested in using them on the
  web if they do not actually need them for their work.
