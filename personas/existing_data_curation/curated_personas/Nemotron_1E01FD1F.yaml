  career_goals: Gina aims to become a Certified Public Accountant (CPA) within the next year and eventually achieve the Certified Internal Auditor (CIA) designation. Her short‑term goal is to lead audit
    engagements for mid‑size tech firms and introduce data‑analytics‑driven audit methodologies. In the long term, she aspires to become a senior manager and later a partner at a top public accounting firm,
    leveraging her expertise to guide clients on sustainability reporting and digital transformation. She also wants to mentor emerging women accountants in the Vietnamese‑American community and serve on
    professional board committees to influence industry standards.
