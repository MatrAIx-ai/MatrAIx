persona_description: A federal agency or regulatory body responsible for issuing biological opinions and implementing the Endangered Species Act (ESA) in the United States. This persona is likely to have
  expertise in environmental law, conservation biology, and regulatory processes. They are responsible for ensuring that agency actions do not jeopardize the existence of endangered species and that all
  relevant laws and regulations are considered before issuing an ITS. They may be involved in interpreting and applying ESA regulations, conducting consultation with state and local authorities, and ensuring
  compliance with other laws and regulations. This persona is likely to be aware of the regulatory definitions of "incidental take" and the importance of ensuring that agency actions comply with all relevant
  laws and regulations.
