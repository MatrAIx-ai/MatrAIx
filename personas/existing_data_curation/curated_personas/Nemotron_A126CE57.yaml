personas:
  professional: A budding digital illustrator and young interactive storyteller, Jasmine Afflick combines meticulous sketching with coding in Scratch to create vibrant narrative experiences that reflect
    their curiosity and methodical planning.
  sports: An avid outdoor enthusiast, Jasmine Afflick frequents Pensacola's local parks for bird-watching and joins a community swim club, cheering on the Pensacola Blue Wahoos during baseball season while
    occasionally playing pick-up soccer with friends.
  arts: A dedicated art lover, Jasmine Afflick spends weekends attending workshops at the Pensacola Museum of Art, draws inspiration from watercolor masters like Claude Monet and digital creators such as
    Hayao Miyazaki, and curates a personal sketchbook filled with R&B-infused lyrical doodles.
  travel: Jasmine Afflick prefers meticulously planned road trips with family, having explored the beaches of Gulf Shores, the historic streets of Savannah, and dreaming of a future visit to New Orleans'
    French Quarter to sample its music and cuisine.
  culinary: In the kitchen, Jasmine Afflick assists with seasoning collard greens, mastering the perfect crumbly cornbread, and loves experimenting with shrimp and grits, though they often forget to set
    a timer and end up over-cooking the rice.
  core: Jasmine Afflick is a methodical young creator who balances a quiet curiosity for art and technology with a habit of over-packing their sketchbook for every adventure.
background:
  cultural: Jasmine grows up in a close-knit African-American community in Cantonment, a suburban area of Escambia County near Pensacola, Florida. Her family embraces the Gulf Coast Black cultural heritage,
    which includes church gatherings with gospel music, storytelling traditions, and Southern cuisine infused with African roots such as collard greens, macaroni and cheese, and cornbread. She participates
    in local cultural events like Juneteenth celebrations and community art fairs that showcase Black artists. Her parents encourage a love of learning and respect for history, often taking her to museums
    that highlight African-American contributions. The neighborhood’s emphasis on family, community support, and oral storytelling shapes Jasmine’s artistic perspective and curiosity.
attributes:
  skills: '[''Drawing'', ''Watercolor painting'', ''Digital illustration (Procreate)'', ''Basic programming with Scratch'', ''Creative writing'', ''Research and information synthesis'', ''Organizational
