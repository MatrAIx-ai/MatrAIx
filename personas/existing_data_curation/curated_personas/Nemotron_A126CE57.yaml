  hobbies: '[''Sketching and drawing'', ''Watercolor painting'', ''Digital illustration'', ''Reading graphic novels'', ''Creative writing (short stories/poetry)'', ''Exploring nature (birdwatching, collecting
    shells)'', ''Playing Scratch to create interactive stories'', ''Listening to music (R&B, jazz)'', ''Attending local art workshops'', ''Cooking family recipes'']'
  career_goals: Jasmine dreams of turning her love for art into a career. In the next few years she wants to build a strong portfolio that will help her gain admission to a specialized high-school art program
    and enter youth art competitions. Her long-term ambition is to study visual arts or graphic design in college and work as an illustrator, concept artist for video games or animation, or as a museum
    educator who shares art histories with children. She also hopes to combine her interest in coding and design to become a UI/UX designer for educational apps.
