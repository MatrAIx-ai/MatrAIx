  career_goals: Johanan aims to transition from a teaching assistant role to a full‑time faculty position, ultimately becoming a senior lecturer or department coordinator for STEM education. He aspires
    to lead a curriculum redesign initiative that embeds active‑learning strategies into undergraduate science courses across the region. He also plans to launch a community‑based STEM outreach program
    that offers after‑school workshops and summer camps for local youth, leveraging his organizational expertise to secure grant funding and build partnerships with nearby colleges. Long‑term, he envisions
    contributing to institutional policy that promotes inclusive, high‑impact teaching practices.
