persona_description: A scholar and researcher in the field of cybercartography, with expertise in the theory and practice of using geospatial technology and local communities to create symbolic representations
  and explore creative expression. They are interested in the use of virtual geographies to reverse the spectacle of capitalism and reveal the concealed black-box of anti-market capitalism. They have a
  deep understanding of the concepts and theories behind cybernetics, informatics, and cartography, and are skilled in using them to create maps that reveal hidden aspects of reality. They are also interested
  in the intersection of cybercartography with other fields such as artificial life, geo-economics, and psychogeography.
