persona_description: A historian who is interested in the history of Pasadena, particularly the early 20th century. They are knowledgeable about the city's growth, development, and the cultural and educational
  institutions that flourished during that time. They are interested in the city's history as a center of innovation, particularly in the fields of science and technology. They are also interested in the
  city's role in the growth of the automobile industry, particularly the development of the city's roads and infrastructure. They are interested in the city's cultural and educational institutions, particularly
  the contributions of Throop Polytechnic Institute and the Tournament of Roses Association. They are also interested in the city's history as a center of immigration, particularly the contributions of
  Chinese, Mexican, and Black residents to the city's population and culture.
