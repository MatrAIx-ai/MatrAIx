    staff", "Use of smartphone apps for scheduling and inventory"]'
  hobbies: '["Gardening (herbs, vegetables, flowers)", "Knitting and crocheting", "Singing in a gospel choir", "Listening to soul and R&B music", "Reading newspapers and community newsletters", "Crossword
    puzzles", "Participating in a senior‑center craft group", "Preparing traditional Southern meals for family"]'
  career_goals: Tyana’s primary career goal is to continue providing dependable, high‑quality housekeeping services for the families she serves while maintaining a steady income to support her household
    and contribute to her grandchildren’s education fund. She hopes to be recognized as a trusted senior caretaker in her community, offering occasional assistance with light caregiving for elderly neighbors.
    Tyana is also interested in sharing her decades of experience by informally mentoring a small group of younger housekeepers, helping them develop reliable routines and professional standards. In the
    longer term, she envisions setting up a modest, family‑run cleaning consultancy that can operate on a referral basis, allowing her to work on a flexible schedule that respects her health and personal
    time.
