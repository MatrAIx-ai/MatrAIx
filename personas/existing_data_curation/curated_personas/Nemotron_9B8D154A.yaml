personas:
  professional: An experienced housekeeping specialist, Tyana Gilliam leverages decades of meticulous cleaning expertise, budget-friendly Southern cooking, and a structured scheduling system to deliver
    reliable, high-quality home care while mentoring younger staff with a calm, assertive approach, and they always prioritize routine and punctuality.
  sports: A devoted community fan, Tyana Gilliam follows the local college football team, the Southern Hawks, enjoys leisurely walks in her neighborhood park, occasionally joins a senior walking club for
    gentle cardio, and they rarely engage in competitive sports beyond watching games on Sundays.
  arts: A soulful gospel enthusiast, Tyana Gilliam sings in her church choir, treasures classic soul and R&B artists such as Aretha Franklin, Marvin Gaye, and Otis Redding, and they spend evenings listening
    to vinyl records while crocheting, finding artistic expression through music and textile crafts.
  travel: A cautious traveler, Tyana Gilliam prefers short, well‑planned trips to nearby historic towns like Savannah and Charleston, often joins family on weekend Gulf Coast cruises, and they avoid long
    flights, favoring road trips that fit within their modest travel budget.
  culinary: A home‑cooking aficionado, Tyana Gilliam crafts comforting Southern dishes like collard greens, cornbread, and tomato‑based gumbo using fresh herbs from her garden, and they relish the ritual
    of simmering tomato soup with basil and thyme while listening to gospel hymns.
  core: Tyana Gilliam blends steadfast routine with gentle hospitality, delivering meticulous home care, frugal financial stewardship, and soulful gospel singing, all while they nurture garden herbs and
    mentor younger caretakers.
background:
  cultural: Tyana grew up in South Boston, Virginia, within a close‑knit African‑American community whose roots trace back to generations of resilience and shared cultural traditions. Her upbringing was
    shaped by the values of church, family, and mutual support that are central to the Black community in Halifax County. She has retained the culinary heritage of Southern cooking—particularly dishes such
    as collard greens, cornbread, and gumbo—while adapting recipes for health and budget considerations. Tyana’s religious life is anchored in a historically Black Baptist church, where she participates
    in worship, choir, and community service projects. She also honors the legacy of local civil‑rights history by attending annual commemorations at the Halifax County African American Cultural Center
    and sharing stories of her grandparents’ experiences. These cultural influences inform her everyday practices, from the rhythm of her cooking to the communal spirit she brings to her work and her modest
    social circles.
attributes:
  skills: '["Residential cleaning", "Carpet and floor care", "Laundry and fabric preservation", "Stain removal", "Meal preparation (Southern cuisine)", "Home organization and storage solutions", "Household
