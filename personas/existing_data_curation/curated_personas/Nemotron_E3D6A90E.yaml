personas:
  professional: Joel Gaitan is an aspiring visual storyteller who blends photography, skateboarding, and bilingual narratives to capture the shifting light of his border town, using a curious eye and spontaneous
    workflow that often leaves deadlines unfinished but fuels inventive TikTok videos.
  sports: Joel Gaitan spends afternoons skating at the local park, cheers for the San Antonio Spurs and Dallas Cowboys on game nights, follows Club Tijuana’s Liga MX matches, and joins a weekend youth soccer
    league that keeps them moving while balancing community ties.
  arts: Joel Gaitan is a budding creator who sketches mural‑inspired digital art, studies tutorials from YouTubers like "Proko" and "Draw with Jazza", admires the street‑art mystique of Banksy and the colorful
    folk paintings of Frida Kahlo, and curates TikTok videos that blend indie rock soundtracks with cinematic visual effects.
  travel: Joel Gaitan loves spontaneous road trips to White Waters National Monument, dreams of attending the Day of the Dead celebrations in Oaxaca, hopes to explore the neon streets of Tokyo for anime
    immersion, and plans to revisit the desert sunsets of New Mexico’s White Sands, balancing modest family budget with a big‑picture wanderlust.
  culinary: Joel Gaitan enjoys helping prepare tamales and pozole for family fiestas, relishes street‑taco al pastor and churros with cinnamon sugar, experiments with making sushi after binge‑watching anime,
    and prefers cooking with fresh cilantro, lime, and chipotle for bold flavor bursts.
  core: Joel Gaitan is a curious, spontaneously creative teen who flips between the lens of a camera, the board of a skateboard, and a TikTok screen, all while juggling school, family traditions, and a
    pocketful of impulse buys.
background:
  cultural: Joel is a first‑generation Mexican‑American growing up in Del Rio, a vibrant border town where Mexican traditions and American influences intersect daily. He speaks Spanish at home and English
    at school, giving him a bicultural perspective that informs his art and communication style. Family celebrations are steeped in Mexican customs—preparing tamales for holidays, honoring ancestors during
    Día de los Muertos, and participating in community fiestas that feature música ranchera and folklorico dance. At the same time, he experiences the broader Texan culture through school events, sports,
    and local festivals. This dual heritage nurtures his appreciation for diverse ideas, fuels his curiosity about cross‑cultural storytelling, and shapes his ambition to bridge both worlds through creative
    work.
attributes:
  skills: '[''digital illustration'', ''Scratch programming'', ''bilingual communication (Spanish/English)'', ''acoustic guitar'', ''traditional Mexican cooking'', ''observational sketching'']'
  hobbies: '[''photography'', ''sketching and mural art'', ''skateboarding'', ''Minecraft building'', ''listening to music (regional Mexican, hip‑hop, indie rock)'', ''cooking with family'', ''watching
    anime'', ''creating short TikTok videos'', ''reading graphic novels'']'
  career_goals: Joel dreams of becoming a multimedia storyteller who can blend visual art, music, and technology to share the unique stories of his border community. He hopes to attend an arts-focused high
    school where he can deepen his graphic design and video production skills, eventually pursuing a degree in Visual Arts or Game Design. He envisions creating an animated short or documentary that captures
    the everyday life along the Rio Grande, highlighting cultural traditions and the voices of his friends and family. Long‑term, he aspires to work as a creative director for a studio that values diverse
    narratives and to mentor other young artists from under‑represented backgrounds.
