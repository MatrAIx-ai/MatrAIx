  hobbies: '["Reading contemporary fiction and poetry","Creative writing/poetry","Fusion cooking (South Asian & Creole)","Gardening","Bayou hiking","Yoga","Book club participation","Volunteer tutoring/after‑school
    program"]'
  career_goals: Chandni aims to expand her impact beyond her own classroom by moving into instructional leadership. She plans to pursue a master's degree in educational administration within the next two
    years, with the goal of becoming a department chair or assistant principal at her school. She also aspires to mentor new teachers, lead professional‑development workshops on culturally responsive pedagogy,
    and contribute to district‑wide curriculum design that integrates multicultural perspectives. Long‑term, she envisions authoring a resource guide for teachers on blending traditional literary study
    with digital learning tools.
