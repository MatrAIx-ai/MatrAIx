personas:
  professional: Chandni Singh, a seasoned secondary‑school English teacher with over a decade of experience, blends creative curriculum design with tech‑savvy tools, using their bilingual fluency to craft
    culturally responsive lessons that balance classic literary analysis with modern digital resources, while their calm authority and practical mindset keep the classroom organized yet adaptable.
  sports: Chandni Singh, an avid supporter of the New Orleans Saints and LSU Tigers, participates in a co‑ed adult soccer league on Saturdays, hikes bayou trails for cardio, and practices sunrise yoga while
    occasionally joining a local kayaking group, balancing competitive spirit with leisure.
  arts: Chandni Singh, a devoted member of a community book club, devours contemporary fiction by authors like Chimamanda Adichie and Jhumpa Lahiri, writes poetry in a worn notebook during lunch breaks,
    attends live jazz performances at the Charhadi Festival, and enjoys the fusion cello‑sitar compositions of Mahesh Raghvan.
  travel: Chandni Singh, an adventurous planner who prefers a blend of cultural immersion and relaxation, has explored the historic districts of New Orleans, trekked the rice terraces of Bali, and dreams
    of a culinary tour of the Mediterranean, always booking flights through reward points while balancing family responsibilities.
  culinary: Chandni Singh, a creative home cook, perfects curry‑jambalaya using smoked sausage, basmati rice, and creole spices, whips up masala‑gumbo with okra and coconut milk, and delights in preparing
    fresh mango‑lassi, often sourcing heirloom tomatoes from their vegetable garden.
  core: Chandni Singh, a 41‑year‑old educator who fuses literary tradition with digital innovation, balances disciplined budgeting with spontaneous spice experiments, manages health with yoga despite occasional
    medication lapses, and channels community spirit into every classroom, garden, and poetry notebook.
background:
  cultural: Chandni is a first‑generation American of Indian descent whose family has retained strong South Asian cultural ties while embracing the Southern hospitality of Louisiana. She grew up celebrating
    Diwali, Holi, and family gatherings centered around traditional music, dance, and cuisine, which have shaped her values of community, education, and cultural pride. Living in Mandeville, she blends
    these traditions with local customs, participating in community festivals and incorporating multicultural narratives into her teaching. Her bilingual fluency in English and Hindi enables her to connect
    with diverse student families and to embed global perspectives in her classroom.
attributes:
  skills: '["Curriculum development","Differentiated instruction","Classroom management","Formative and summative assessment","Educational technology integration","Student mentorship","Parent-teacher communication","Culturally
