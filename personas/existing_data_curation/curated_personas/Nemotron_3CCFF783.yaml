  career_goals: Approaching retirement, Robert aims to leave a lasting legacy by formalizing a mentorship program for apprentices and documenting a comprehensive operations handbook that captures his decades
    of practical knowledge. He hopes to earn an advanced certification in smart‑building automation, enabling his crew to adopt IoT‑enabled HVAC solutions. Post‑retirement, he envisions consulting for small
    contractors on workflow efficiency and possibly teaching part‑time at the local community college, sharing his blend of technical expertise and imaginative approach to problem‑solving.
