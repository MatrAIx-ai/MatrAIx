personas:
  professional: Robert Carter, a seasoned HVAC supervisor with over four decades of hands‑on experience, blends meticulous project scheduling and budgeting expertise with an imaginative flair for integrating
    IoT building automation, all while mentoring apprentices and documenting operational wisdom for future generations.
  sports: Robert Carter regularly hikes the White Mountains, joins local snowshoe meet‑ups with the Berlin Outdoor Club, follows the Boston Red Sox and New England Patriots, and participates in weekend
    chess tournaments that serve as a mental fitness routine.
  arts: Robert Carter, an avid watercolor abstract painter, draws inspiration from Georgia O'Keeffe and Mark Rothko, frequently visits exhibitions featuring the works of contemporary artist Julie Mehretu,
    and shares a love of chess strategy with the local historic society’s arts gatherings.
  travel: Robert Carter prefers meticulously planned trips that combine art gallery tours in European capitals like Paris and Florence with nature hikes in the Canadian Rockies, yet dreams of a relaxed
    summer sailing adventure along the Norwegian fjords once retirement frees up more time.
  culinary: Robert Carter enjoys cooking simple yet flavorful dishes such as herb‑crusted salmon with a lemon‑dill sauce, roasted root vegetables seasoned with rosemary, and a classic New England clam chowder,
    while regularly sourcing fresh ingredients from the Saturday farmers’ market and occasionally treating themselves to a glass of pinot noir with dinner.
  core: Robert Carter embodies a methodical engineer’s precision tempered by a painter’s imagination, balancing disciplined project management with spontaneous creative pursuits, and occasionally letting
    a love of fine art derail their otherwise exacting budget.
background:
  cultural: Robert grew up in Berlin, New Hampshire, in a family with deep New England roots that valued self‑reliance, community service, and a connection to the natural landscape. Raised in a modest,
    middle‑class household, he attended local public schools before pursuing some college coursework in engineering technology. The region’s seasonal rhythms, from summer hikes to harsh winter weather,
    shaped his love for outdoor recreation. His cultural identity blends traditional Protestant work ethics with an appreciation for the historical heritage of the White Mountains area, influencing both
    his collaborative demeanor at work and his dedication to preserving local history through volunteer activities.
