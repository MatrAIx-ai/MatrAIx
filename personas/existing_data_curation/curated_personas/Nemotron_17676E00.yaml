personas:
  professional: Mark Magee, a 14-year-old middle school student who merges their love for strategy video games and LEGO building into an emerging passion for game design, often sketching level ideas during
    volunteer tech workshops at the local community center, where their compassionate nature helps them mentor younger peers while their preference for flexible planning lets them adapt on the fly.
  sports: Mark Magee, a 14-year-old point guard for the Cranberry Eagles middle school basketball team who spends weekends hiking with the Cranberry Trails Club, cheering for the Pittsburgh Steelers and
    rooting for the Pittsburgh Penguins while proudly keeping a collection of Pittsburgh Pirates baseball cards, often encourages their teammates with supportive cheers and helps organize practice drills.
  arts: Mark Magee, a 14-year-old LEGO enthusiast who balances their structured mind with a love for the cinematic scores of Hans Zimmer, the indie rock of Imagine Dragons, and the animated storytelling
    of Pixar, often visiting the Butler County Fair’s art pavilion to admire local crafts.
  travel: Mark Magee, a 14-year-old who prefers spontaneous road trips to nearby state parks like Ohiopyle and weekend family outings to Pennsylvania Dutch Country, while dreaming of a future summer adventure
    in Tokyo’s gaming districts, plans trips with a flexible itinerary scribbled in a notebook, balancing school constraints with an eagerness for new experiences.
  culinary: Mark Magee, a 14-year-old who enjoys devouring pepperoni pizza, loaded nachos, and the local specialty Primanti’s sandwich, can whip up a decent grilled cheese and spaghetti with meat sauce,
    and loves experimenting with toppings like jalapeños and pineapple on their homemade pizza nights.
  core: Mark Magee, a 14-year-old who blends strategic gaming and community volunteering with a laid‑back approach to planning, often juggling basketball practice and LEGO builds while occasionally forgetting
    homework deadlines but always finding time to help a friend in need, showing that they value teamwork over personal gain.
