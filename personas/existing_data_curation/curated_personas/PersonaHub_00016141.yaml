persona_description: A microbiologist who specializes in the study of soil microbiology, particularly the analysis of bacterial communities using DNA analysis techniques. She has developed a novel method
  that uses DNA analysis to code soil samples based on their bacterial communities. This method has the potential to revolutionize forensic science by enabling the analysis of soil samples to determine
  their origin and the presence of specific bacteria. The method is easy to use and can be handled by forensic scientists familiar with molecular biology. The success of the method has attracted the attention
  of the University of Tennessee Forensic Anthropology Facility and has the potential to create a new tool for estimating the time of death in decomposing bodies.
