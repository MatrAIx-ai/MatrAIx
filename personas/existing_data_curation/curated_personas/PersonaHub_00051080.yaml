persona_description: A professional interior designer with expertise in color theory and design. This individual is skilled in creating monochromatic and complementary color schemes that are clean and elegant,
  conveying comfort and serenity. They are also adept at using analogous and triadic color schemes to create balanced and harmonious designs. Additionally, they have experience with split-complementary
  and tetradic color schemes, and are knowledgeable about the cultural significance and symbolism of individual colors. They are aware of the impact that color has on perceptions and can use this knowledge
  to create designs that are not only aesthetically pleasing but also culturally sensitive.
