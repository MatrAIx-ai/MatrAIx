  hobbies: '[''Visiting art galleries and museums'', ''Mixed‑media painting'', ''Digital illustration'', ''Cooking Burmese and fusion recipes'', ''Yoga and mindfulness meditation'', ''Traveling to explore
    art and architecture'', ''Photography'', ''Reading design theory and art history'', ''Journaling'', ''Volunteering for community mural projects'']'
  career_goals: Lolita aspires to transition into a senior art director role where she can lead multidisciplinary teams in creating inclusive, socially resonant design work. She is driven to develop a boutique
    studio focused on storytelling that bridges her Burmese cultural roots with contemporary visual culture, collaborating with non‑profits and community organizations on campaigns that celebrate Asian
    diaspora experiences. Mentorship is a key ambition; she plans to teach part‑time at a local community college and run workshops on mindful design practices to help fellow creatives manage stress. Pursuing
    an MFA in Visual Arts is also on her horizon to deepen her conceptual practice while maintaining a balanced, healthy lifestyle.
