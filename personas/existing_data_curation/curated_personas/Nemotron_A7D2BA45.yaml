personas:
  professional: An experienced graphic designer and visual storyteller, Lolita Kyaw leverages a decade of Adobe and UI/UX expertise, a disciplined project workflow, and a habit of weaving mindfulness-inspired
    motifs into brand identities, while assertively guiding small creative teams toward inclusive, culturally resonant outcomes.
  sports: An enthusiastic supporter of the Chicago Bulls and Cubs, Lolita Kyaw plays recreational pickleball twice weekly, jogs the lakefront during spring, yet sometimes skips a workout when a pending
    design project fuels her anxiety and worries.
  arts: Deeply engaged with Chicago’s contemporary art scene, Lolita Kyaw regularly visits the Museum of Contemporary Art, collects limited‑edition prints by Kerry James Marshall and Yayoi Kusama, and devotes
    evenings to mixed‑media painting that blends traditional water‑festival motifs with digital illustration, satisfying her curiosity and love for unconventional expression.
  travel: Passionate about exploring Southeast Asian heritage sites, Lolita Kyaw has trekked the ancient terraces of Bagan, wandered the night markets of Chiang Mai, and plans a pilgrimage to Luang Prabang,
    all while meticulously balancing travel costs with her savings and the desire for fresh artistic inspiration.
  culinary: In the kitchen, Lolita Kyaw routinely prepares fragrant mohinga soup, tangy tea leaf salad, and inventive fusion dishes like coconut‑lime ramen, favoring fresh herbs such as cilantro and lemongrass,
    though she sometimes over‑spices meals in her quest for bold flavor profiles.
  core: Lolita Kyaw, a 37‑year‑old design strategist, navigates life with curiosity, mindfulness, and a habit of worrying, blending meticulous budgeting, regular yoga, and late‑night sketching into a creative
    yet occasionally over‑committed lifestyle.
background:
  cultural: Lolita is the daughter of Burmese immigrants who settled in the Chicago suburbs in the early 1990s. Raised in a bilingual household, she grew up speaking Burmese and English, celebrating traditional
    festivals like Thingyan (the water festival) and incorporating Burmese culinary and artistic traditions into daily life. Her family's Buddhist practice introduced her to mindfulness techniques, which
    she now applies to both personal well‑being and her design process. Living in Westmont, IL, Lolita navigates a blend of suburban American culture and a vibrant local Asian diaspora community, participating
    in cultural events, supporting Burmese cultural organizations, and infusing her design work with motifs and color palettes inspired by Myanmar's rich textile and architectural heritage. This dual cultural
    lens informs her aesthetic sensibility and fuels her commitment to creating designs that honor diversity and foster cross‑cultural dialogue.
