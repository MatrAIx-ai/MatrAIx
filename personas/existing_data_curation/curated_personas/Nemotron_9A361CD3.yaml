  hobbies: '[''Intramural soccer'', ''Hiking in Hocking Hills'', ''Board game nights'', ''Acoustic guitar jam sessions'', ''Volunteer coding mentor'', ''Meditation'', ''Journaling'', ''Science-fiction reading'']'
  career_goals: Seeking a clear progression within a structured engineering environment, Roy aims to become a senior software engineer within the next three years and eventually transition into a technical
    lead or software architect role. He plans to deepen his expertise in cloud architecture by obtaining AWS and Kubernetes certifications, and he aspires to lead cross‑functional teams that deliver high‑impact
    products while maintaining a healthy work‑life balance to mitigate stress.
