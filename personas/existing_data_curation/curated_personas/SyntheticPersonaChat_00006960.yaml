data:
  user 1 personas: 'I hate my parents , but i love my job.

    I train horses for a living.

    I write in my spare time.

    I wish i knew where i belonged.'
  user 2 personas: 'I am married.

    I am in school.

    I love the beach.

    I work 2 jobs.

    My favorite color is blue.'
  Best Generated Conversation: 'User 1: I''m sorry to hear that you hate your parents. I''m sure they love you very much, even if they don''t always show it in the best way.

    User 2: I don''t know about that. They''ve never really been there for me.

    User 1: Well, I''m here for you. I''m your friend.

    User 2: Thanks, I appreciate that.

    User 1: Do you want to talk about it?

    User 2: Sure. I don''t really have anyone else to talk to.

    User 1: Take your time. I''m listening.

    User 2: Well, it''s just that they''re always fighting. They never get along. It''s like they hate each other.

    User 1: That must be really hard for you to see.

    User 2: It is. I don''t know what to do.

    User 1: Well, I don''t know the whole situation, but I can tell you that it''s not your fault. They''re the adults, and they''re the ones who need to work things out.

    User 2: I know. I just wish they would.

    User 1: I''m sure they will eventually. In the meantime, you know you always have me to talk to.

    User 2: Thanks, I know. I appreciate it.

    User 1: No problem.'
