  hobbies: '[''Salsa & Folkloric Dance'', ''Cooking Mexican Cuisine'', ''Hiking (Rattlesnake Ledge, Discovery Park)'', ''Live Music & Open‑Mic Nights'', ''Photography (Cultural Events)'', ''Volunteering
    at Community Festivals'', ''Language‑Exchange Meetups'', ''Reading Contemporary Fiction'']'
  career_goals: Maria aims to translate her bilingual communication and organizational capabilities into a career that bridges cultures and empowers communities. In the short term, she plans to secure an
    entry‑level position as a community outreach coordinator or program assistant at a nonprofit organization or diversity‑focused department of a tech firm in Seattle. She intends to enroll in a bachelor’s
    program in Human Services or Business Administration to deepen her strategic and managerial knowledge, while pursuing a Certified Associate in Project Management (CAPM) credential. Over a five‑year
    horizon, Maria envisions moving into a senior program manager or director of community engagement role, where she can design inclusive initiatives, mentor Latinx youth, and lead cross‑functional teams.
    She also hopes to develop a community‑centered mentorship program that pairs college students with high‑school seniors from underrepresented backgrounds.
