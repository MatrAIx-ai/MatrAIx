personas:
  professional: Rebecca Shilling, a budding preschool "mini community organizer", loves arranging snack times, lining up storybooks, and practicing leadership in her class, reflecting her curiosity and
    methodical nature.
  sports: Rebecca Shilling, a member of the Redding Little Sprouts soccer club and a fan of the San Francisco Giants, enjoys weekend hikes on forest trails, dribbling a small soccer ball past tiny obstacles,
    reflecting her love of outdoor activity and small‑group play.
  arts: Rebecca Shilling, who adores drawing woodland scenes with Crayola crayons, sings along to Disney’s "Frozen" soundtrack and listens to kid‑friendly tunes by KIDZ BOP, lets her imagination guide her
    crafts, embodying her quiet curiosity and cooperative spirit.
  travel: Rebecca Shilling, who cherishes family road trips to Redwood National Park and a summer visit to Disneyland, prefers itineraries with clear stop‑times and familiar snacks, and dreams of exploring
    the giant sequoias of Yosemite, reflecting her love for nature and structured adventures.
  culinary: Rebecca Shilling, who delights in mac & cheese with hidden peas, enjoys strawberry‑banana smoothies she stirs herself, and helps knead pizza dough with a tiny wooden roller, balances her picky
    palate with occasional adventurous bites for the sake of family meals.
  core: Rebecca Shilling, a meticulously organized five‑year‑old who packs her crayons, saves for sparkly toys, and keeps a health chart on her fridge, blends curiosity with practicality while quietly preferring
    small circles of friends.
background:
  cultural: Rebecca is raised in a middle‑class white American family in Redding, California. Her upbringing blends broader U.S. traditions—such as celebrating Thanksgiving, Christmas, and the Fourth of
    July—with the local Northern California love of outdoor activities, forest hikes, and community events. She attends a local preschool that emphasizes early literacy, practical skills, and respectful
    interaction, reinforcing her curiosity, organization, and cooperative spirit.
