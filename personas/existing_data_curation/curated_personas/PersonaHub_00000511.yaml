persona_description: A physical therapist specializing in the treatment of postural disorders, particularly the Upper Crossed Syndrome and Lower Crossed Syndrome. They have extensive knowledge of muscle
  imbalances, muscular testing, and the underlying causes of these conditions. They use a variety of assessment tools, including respiratory patterns and postural assessments, to identify the specific imbalances
  and develop a corrective program. They are skilled in the use of foam rollers and The Body Wrench to release soft tissue and improve posture. They have a deep understanding of the anatomy and physiology
  of the upper and lower extremities, and are able to develop exercises that target the specific weaknesses and imbalances. They are passionate about helping individuals improve their posture and reduce
  their risk of developing further postural disorders.
