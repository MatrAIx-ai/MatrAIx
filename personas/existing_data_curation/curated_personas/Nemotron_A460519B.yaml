personas:
  professional: Luke Nwankwo, a 49‑year‑old licensed practical nurse with a strong foundation in health informatics, channels their meticulous patient‑assessment abilities, wound‑care expertise, and vivid
    imagination into designing data‑driven workflow improvements and embedding digital art‑therapy modules within the hospital’s electronic health record system.
  sports: Luke Nwankwo embraces rugged outdoor fitness, joining the North Georgia Hiking Club for seasonal treks along the Blue Ridge Trail, cheering the Atlanta Falcons and Atlanta Braves, and playing
    recreational tennis at the Marietta Community Center on weekday evenings.
  arts: Luke Nwankwo paints abstract watercolors inspired by Wassily Kandinsky, captures experimental digital photographs echoing the style of Annie Leibovitz, and composes ambient soundscapes reminiscent
    of Brian Eno, regularly attending exhibitions at the High Museum and local art meet‑ups.
  travel: Luke Nwankwo prefers thoughtfully curated road trips, having explored Asheville’s Blue Ridge scenery and the historic streets of Savannah, while dreaming of a future immersive stay in Kyoto for
    its tea‑ceremony culture and Reykjavik for its avant‑garde design scene.
  culinary: Luke Nwankwo experiments in the kitchen, mastering sous‑vide miso‑glazed black cod, crafting saffron‑infused paella, and integrating fermented kimchi and za'atar into unexpected dishes, all
    while relying on a well‑stocked spice rack and YouTube tutorials for guidance.
  core: Luke Nwankwo fuses clinical rigor with artistic curiosity, driving innovative health solutions while secretly hoarding an ever‑growing collection of vintage camera lenses that often distracts them
    from paperwork.
background:
  cultural: Luke grew up in a suburban family in the Atlanta metropolitan area, rooted in Southern white culture with a strong emphasis on community, church, and family traditions. Though his surname reflects
    Nigerian heritage, he identifies primarily with his white American upbringing, celebrating holidays like Thanksgiving and the Fourth of July while also valuing multicultural perspectives gained through
    his STEM education and diverse workplace. His marriage and life in Suwanee, GA, embed him in a blend of suburban comfort, Southern hospitality, and an increasingly multicultural neighborhood, shaping
    a worldview that balances respect for tradition with curiosity about global ideas.
attributes:
  skills: '[''Patient assessment'', ''Wound care'', ''Medication administration'', ''Health informatics'', ''Electronic health record management'', ''Data analysis for quality improvement'', ''Patient education'',
