  hobbies: '[''Abstract watercolor painting'', ''Digital photography'', ''Composing ambient music'', ''Reading science‑fiction and philosophy'', ''Attending art exhibitions'', ''Tech meet‑ups'', ''Hiking
    in North Georgia'', ''Volunteering at community health fairs'', ''Cooking experimental dishes'', ''Playing chess'']'
  career_goals: He aims to transition from licensed practical nursing to a registered nurse role, eventually pursuing a Nurse Practitioner or Clinical Nurse Specialist certification with a focus on wound‑care
    management and digital health integration. Luke also aspires to lead a quality‑improvement team in his hospital, championing evidence‑based practice and introducing art‑therapy initiatives for patients.
    In the long term, he envisions establishing a community health program that blends technology, preventive care, and creative expression, positioning himself as a bridge between clinical practice and
    innovative health solutions.
