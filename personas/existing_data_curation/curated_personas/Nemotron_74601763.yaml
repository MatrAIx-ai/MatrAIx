  career_goals: Even though she is retired, Yolande aims to leave a lasting legacy by compiling a family cookbook that blends recipes with personal stories from her upbringing. She hopes to teach occasional
    cooking workshops at the local Vietnamese cultural association to preserve her heritage for younger generations. Additionally, she is determined to stay mentally and physically active, mastering new
    digital tools to keep in touch with distant relatives, and to continue mentoring her grandchildren in language and culinary traditions. Maintaining her independence and health through gentle exercise
    and regular check‑ups remains a central personal ambition.
