personas:
  professional: Jeanette Santiago, a 35‑year‑old psychiatric aide in Charlotte, blends meticulous infection‑control and compassionate de‑escalation skills with a spontaneous, art‑infused mindset that fuels
    her drive to launch an on‑unit art‑therapy program while navigating the flexible, often unpredictable schedules of the mental‑health ward.
  sports: Jeanette Santiago, a quiet fitness enthusiast in Charlotte, favors solitary hikes along the foothills of the Carolina mountains and monthly yoga classes, while cheering on the Charlotte Hornets
    during off‑season and following the Carolina Panthers with modest devotion, and they belong to a local walking club that meets on the first Saturday of each month.
  arts: Jeanette Santiago immerses herself in Charlotte’s vibrant art scene, regularly attending openings for emerging creators like Maya Hayuk, drawing inspiration from Yayoi Kusama’s installations and
    Ansel Adams’ contrasts, while channeling personal expression into watercolor studies and photographing urban‑natural textures set to the experimental soundscapes of Joanna Newsom.
  travel: Jeanette Santiago prefers contemplative solo travel, meticulously planning weekend escapes to Asheville’s Blue Ridge trails or Marfa’s desert art installations, while dreaming of an immersive
    cultural retreat in Kyoto’s Zen gardens, though budget constraints keep overseas adventures occasional and carefully timed.
  culinary: Jeanette Santiago enjoys a modestly experimental palate, often preparing quinoa bowls with roasted beets, goat cheese, fresh tarragon, and a perfectly brewed matcha latte, while delighting in
    farm‑to‑table evenings at Charlotte’s The Cowfish, though they admit to neglecting meal prep during especially busy weeks.
  core: Jeanette Santiago is a solitary, art‑driven psychiatric aide who balances a restless curiosity with spontaneous flexibility, a habit of splurging on creative supplies, and a quiet determination
    to weave therapy and imagination into mental‑health care.
background:
  cultural: Jeanette comes from a non-Hispanic white family with deep roots in the Carolinas. She grew up in a suburban neighborhood near Charlotte, where Southern hospitality, church-based community gatherings,
    and strong family ties shaped her early worldview. Traditions such as weekend barbecues, support for local high-school sports, and an appreciation for regional folk storytelling and music were part
    of her upbringing. While she identifies with these regional cultural touchstones, she also embraces the broader diversity of Charlotte’s growing arts scene and multicultural neighborhoods, often seeking
    out new ideas and perspectives that align with her curious nature.
