  career_goals: Jeanette aims to deepen her clinical expertise by obtaining a Certified Nursing Assistant (CNA) credential and later a Psychiatric Technician certification. She envisions progressing to
    a supervisory position on her unit, where she can mentor new aides, improve workflow efficiency, and advocate for patient-centered practices. Parallel to her career advancement, she wishes to fuse her
    artistic passion with mental-health care by developing a modest art-therapy program for patients, providing them with creative outlets for expression and healing. In the long term, Jeanette aspires
    to serve as a community mental-health coordinator, designing and implementing programs that integrate therapeutic art, outreach, and supportive services for underserved populations.
