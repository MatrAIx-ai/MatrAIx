persona_description: An archaeologist who specializes in the study of Roman mining activities, particularly the excavation and analysis of Roman-era copper ingots. Their research interests include the identification
  and dating of Roman-era copper ingots, their transportation patterns within the Roman empire, and their potential use for metal working and the production of tools and weapons. They have extensive knowledge
  of Roman mining practices and have conducted extensive excavations and analysis of Roman-era copper ingots on Anglesey and other locations.
