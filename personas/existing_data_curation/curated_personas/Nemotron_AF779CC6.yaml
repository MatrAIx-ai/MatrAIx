  hobbies: '[''Woodworking'', ''Scale model building'', ''Reading technical literature'', ''Gardening'', ''Watching football'', ''Cooking Southern cuisine'', ''Chess'', ''Local history research'']'
  career_goals: Approaching retirement, Khalid aims to transition from day‑to‑day drafting to a senior mentorship role, where he can lead a small team of junior drafters and develop a structured CAD training
    program for the company. He also plans to leverage his expertise for part‑time consulting, offering freelance drafting services to local engineering firms seeking high‑quality deliverables on short
    notice. Additionally, Khalid hopes to document his practical drafting knowledge in a concise guidebook, blending his preference for structure with his spontaneous creativity, and to secure a stable,
    yet flexible, work schedule that supports his family and personal projects.
