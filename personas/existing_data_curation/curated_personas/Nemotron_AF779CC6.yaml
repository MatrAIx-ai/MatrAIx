personas:
  professional: Khalid Smith, a veteran drafter with over three decades of hands‑on experience, combines meticulous CAD expertise in AutoCAD, SolidWorks, and Revit with a spontaneous knack for on‑the‑fly
    problem solving, mentors junior staff, and shapes a structured training program as they transition toward a senior mentorship role.
  sports: Khalid Smith is an avid supporter of the Oklahoma Sooners football team, never misses a broadcast, participates in a weekly fantasy football league, and maintains membership in a local senior
    jogging club that meets for casual 3‑mile runs, balancing team loyalty with personal fitness.
  arts: Khalid Smith engages with the arts through detailed model‑kit building of classic automobiles like the 1965 Ford Mustang and historic landmarks such as the Eiffel Tower, enjoys listening to Mark
    Knopfler’s acoustic guitar work and the blues of B.B. King while woodworking, and participates in their church’s small‑group hymn rehearsals, blending craftsmanship with auditory inspiration.
  travel: Khalid Smith prefers purposeful road trips that combine a love for historic engineering sites and quiet retreats, having driven to the Henry Ford Museum in Michigan, explored the historic district
    of Savannah, Georgia, and planning a future pilgrimage to the National Woodworking Museum in Pennsylvania, favoring itineraries that allow ample time for solitary reflection.
  culinary: Khalid Smith favors Southern comfort cooking, often preparing biscuits with fresh garden herbs, skillet‑seared catfish seasoned with Cajun spice, and homemade tomato‑basil sauce for pasta, possessing
    a moderate skill level that balances tried‑and‑true family recipes with occasional experimental twists.
  core: Khalid Smith is a disciplined, detail‑obsessed drafter who channels solitary, hands‑on passions into woodworking and model building while navigating the tension between structured routines and spontaneous
    problem solving, all underscored by a competitive streak, a skeptical eye, and a devotion to family, faith, and Southern‑style comfort food.
background:
  cultural: Khalid is an African‑American who grew up in the Midwest, with deep roots in Oklahoma's Black community. His family’s experiences during the civil‑rights era and the Great Migration inform his
    appreciation for resilience and self‑reliance. He is an active member of his local Baptist church, where communal support and gospel music play significant roles in his cultural life. Khalid celebrates
    traditional African‑American holidays, enjoys soul food staples like collard greens and fried fish, and values storytelling traditions that connect him to his ancestors. His cultural identity blends
    Southern heritage, Midwestern work ethic, and the collaborative spirit of his community, shaping both his professional demeanor and personal pursuits.
attributes:
