  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Quilting'', ''Crafting handmade gifts'', ''Community theater attendance'', ''Line dancing'', ''Library volunteer (story-time)'', ''Gardening'',
    ''Hiking nature trails'', ''Reading science-fiction/fantasy'', ''Experimental cooking'']'
  career_goals: Mary aims to advance from a general office clerk to a senior office manager or administrative supervisor within the next five years. She plans to earn an Office Administration certification
    through a local community college and develop a reputation for implementing efficient office systems that save time and reduce errors. In the longer term, she hopes to combine her administrative expertise
    with her love for the arts by leading a community arts program or opening a small boutique shop that sells handcrafted items made by local artists. Mentoring younger employees and fostering a collaborative,
    supportive work environment are also central to her professional aspirations.
