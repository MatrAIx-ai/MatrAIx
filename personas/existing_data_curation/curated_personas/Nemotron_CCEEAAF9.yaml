personas:
  professional: Mary Flores is an office clerk who leverages her meticulous organizational skills, advanced Excel expertise, and vivid imagination to streamline office workflows, design eye‑catching newsletters,
    and mentor new staff, all while approaching challenges with a calm, methodical demeanor and they consistently seek ways to improve efficiency.
  sports: Mary Flores enjoys early‑morning walks on nature trails, participates in a community pickleball league, supports the Carolina Panthers and Clemson Tigers, and they incorporate line‑dancing cardio
    sessions into their weekly routine to stay active without feeling like a chore.
  arts: Mary Flores channels her imagination through watercolor abstracts inspired by the Palmetto State’s lowlands, joins a quilting circle that often references the works of Georgia O’Keeffe, and they
    regularly attend community theater productions featuring the likes of Lin‑Manuel Miranda while listening to folk‑rock icons such as Gillian Welch for artistic inspiration.
  travel: Mary Flores prefers well‑planned road trips that blend cultural immersion with scenic relaxation, having recently explored the historic streets of Savannah and the vineyards of Tuscany, and they
    keep a modest travel budget that prioritizes family‑friendly stays in Asheville and occasional solo retreats to the Blue Ridge Mountains.
  culinary: Mary Flores loves experimenting in the kitchen, blending Southern staples like shrimp‑and‑grits with international twists such as lemongrass‑infused gravy, and they frequently whip up kimchi‑topped
    collard greens, mastering the balance of smoked paprika, fresh basil, and a dash of miso.
  core: Mary Flores is a methodical dreamer who balances spreadsheet precision with spontaneous watercolor splashes, yet they have a habit of hoarding stray craft supplies, leading to a delightfully chaotic
    home office.
background:
  cultural: Mary was born and raised in the rural setting of Lee County, South Carolina, where her family has deep roots in farming and small‑town community life. She grew up immersed in Southern hospitality,
    church gatherings, and county fair traditions, which instilled a strong sense of family, faith, and community service. While she values these traditional customs—such as communal potlucks, gospel music,
    and local storytelling—she also embraces contemporary artistic influences, blending the old with the new in her creative pursuits. Her upbringing in a close‑knit Southern environment shapes her warm,
    sociable demeanor and her commitment to contributing positively to her community.
attributes:
  skills: '[''Data entry'', ''Record keeping'', ''Scheduling and calendar management'', ''Microsoft Office (Word, Excel, Outlook)'', ''Inventory management'', ''Customer service'', ''Internal communication'',
