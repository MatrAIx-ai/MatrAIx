  hobbies: '[''running'', ''5K races'', ''crossword puzzles'', ''Sudoku'', ''DIY home improvement'', ''gardening'', ''woodworking'', ''strategy board games'', ''community events'', ''volunteering at food
    pantry'']'
  career_goals: Jennifer aims to advance within the manufacturing plant by obtaining certifications in industrial machine operation and lean manufacturing. Her short‑term goal is to become a shift lead,
    overseeing a small team and ensuring the line runs smoothly. In the medium term, she plans to pursue an associate degree in industrial technology to qualify for a quality assurance specialist role.
    Ultimately, she aspires to move into plant supervisory or operations management, where she can apply her practical expertise to improve efficiency and mentor newer employees.
