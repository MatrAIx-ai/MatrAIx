personas:
  professional: Michelle Schneider, a seasoned patient support specialist with three decades of hands‑on care and electronic health record expertise, blends her practical curiosity and calm assertiveness
    to mentor new staff, streamline workflow, and bridge clinical protocols with the lived experiences of her community.
  sports: Michelle Schneider enjoys daily walks around the National Mall, participates in a senior‑friendly walking club, cheers on the Washington Commanders in the fall and the Washington Wizards during
    winter, and joins a gentle yoga class at the local community center for flexibility.
  arts: Michelle Schneider regularly attends jazz performances by the Wynton Marsalis Septet on U Street, immerses herself in the poetry of Langston Hughes and the novels of Toni Morrison at her book club,
    and keeps a lifelong quilting tradition alive with patterns inspired by the works of Faith Ringgold.
  travel: Michelle Schneider prefers thoughtfully planned trips that blend cultural immersion with relaxation, such as weekend getaways to New Orleans for its jazz heritage, a literary pilgrimage to Boston’s
    historic libraries, and an annual visit to Savannah to savor Southern cuisine, all while balancing a modest retirement budget.
  culinary: Michelle Schneider, an adept home cook who tends a balcony herb garden, delights in preparing collard greens seasoned with smoked turkey, sweet potato pie spiced with nutmeg, and gumbo enriched
    with okra, while they also relish exploring new flavors at jazz‑night supper clubs.
  core: Michelle Schneider weaves together a life of compassionate caregiving, jazz‑filled strolls, and a habit of losing track of time while knitting, all driven by a relentless curiosity balanced with
    practical perseverance.
background:
  cultural: Michelle grew up in Washington, DC, as the daughter of civil-rights-era activists who instilled a strong sense of community, resilience, and pride in her African-American heritage. She spent
    her youth exploring the vibrant cultural life of neighborhoods like U Street and Howard University, where music, poetry, and activism intersected. The legacy of her family’s involvement in churches
    and local civic organizations shaped her commitment to service and informed her awareness of health disparities affecting Black seniors. Throughout her life, she has celebrated traditions such as Juneteenth,
    Soul Food gatherings, and spoken-word poetry, while also navigating the challenges of being a Black woman in a predominantly white healthcare environment. These experiences have cultivated a deep cultural
    competence that she brings to every patient interaction, bridging gaps between clinical practice and the lived realities of the community she serves.
attributes:
  skills: '[''Patient care & assistance'', ''Vital signs monitoring'', ''Electronic health record documentation'', ''Clear health communication'', ''Cultural competence & health equity awareness'', ''Crisis
