  hobbies: '[''Reading African-American literature'', ''Gardening & herb cultivation'', ''Walking the National Mall and local parks'', ''Attending jazz concerts'', ''Participating in a book club'', ''Knitting
    and quilting'', ''Volunteering at community health fairs'', ''Leading a widowed seniors support group'']'
  career_goals: Michelle aims to transition into a supervisory role where she can shape the day-to-day workflow of the support team and serve as a mentor for newer staff. She plans to obtain a Certified
    Nursing Assistant credential and pursue a gerontology certification to deepen her expertise in elder care. Leveraging her humanities background, she hopes to design community-based health-education
    workshops that address chronic disease prevention among older Black residents of Washington, DC. Additionally, she aspires to collaborate with local health policymakers to advocate for culturally responsive
    care standards and to document her experiences in a memoir that highlights resilience in the face of personal loss and systemic challenges.
