personas:
  professional: Exequiel Rosario, a seasoned ambulance driver with a methodical approach to emergency response, they leverage bilingual fluency and meticulous documentation to provide compassionate BLS
    care while nurturing a growing interest in integrating art‑based wellness programs into community health initiatives.
  sports: Exequiel Rosario, an avid supporter of the Philadelphia Eagles, Phillies, and Flyers, they join a weekend hiking group along the Delaware Canal for low‑impact cardio, participate in community
    basketball pick‑up games, and balance their love for gentle outdoor exercise with occasional friendly soccer matches at the local park.
  arts: Exequiel Rosario, a frequent visitor to the Philadelphia Museum of Art and local gallery openings, they paint acrylic landscapes of the Pennsylvania countryside inspired by Andrew Wyeth, dance to
    salsa icons like Celia Cruz and jazz legends such as Miles Davis at community events, and collect works by emerging regional artists for their home studio.
  travel: Exequiel Rosario, a meticulous yet adventurous planner, they have explored San Juan’s historic Old Town, admired Renaissance art in Florence, enjoy weekend retreats to the Poconos for quiet reflection,
    and budget for future trips to Caribbean islands that combine cultural immersion with family time.
  culinary: Exequiel Rosario, a passionate home chef, they delight in preparing arroz con gandules, pernil, and mofongo using garden‑fresh cilantro and oregano, skillfully incorporate sofrito and adobo
    into each dish, and host neighborhood potlucks where their flavorful creations earn frequent compliments.
  core: Exequiel Rosario blends a methodical EMS career with a vibrant love for art, music, and cooking, balancing disciplined planning with occasional indulgent splurges and a gentle habit of late‑night
    painting sessions.
background:
  cultural: Exequiel was born to Puerto Rican parents who emigrated to the mainland United States in the 1970s. He grew up in a bilingual household where Spanish was spoken daily, and traditions such as
    Noche de San Juan, Día de los Muertos, and family gatherings centered around music, food, and storytelling were integral. In Easton, he remains an active member of the Puerto Rican community, participating
    in cultural events at the local Latino Center, supporting Spanish‑language youth programs, and preserving the island’s culinary and musical heritage. His cultural identity influences his compassionate
    approach to patient care and his desire to bridge health services with community arts initiatives.
attributes:
  skills: '[''Emergency vehicle operation'', ''Basic Life Support (BLS)'', ''CPR and first aid'', ''Patient assessment and vital signs monitoring'', ''Medical incident documentation'', ''Bilingual communication
    (Spanish/English)'', ''Crisis de‑escalation'', ''Route planning and navigation'', ''Ambulance equipment maintenance'', ''Team coordination'', ''Time management and reliability'']'
  hobbies: '[''Painting (acrylics)'', ''Visiting art galleries and museums'', ''Listening to and dancing to salsa and jazz music'', ''Cooking Puerto Rican cuisine'', ''Gardening'', ''Hiking and walking
    trails'', ''Volunteering at local cultural festivals'', ''Photography of local landscapes'']'
  career_goals: He aims to attain EMT certification and eventually become a certified paramedic, leveraging his experience to take on a supervisory role in the ambulance service. He also hopes to develop
    a community health education program that integrates art and cultural activities to promote wellness among Easton's Latino population. Long‑term, he envisions completing a bachelor's degree in emergency
    management or public health, mentoring younger EMTs, and possibly contributing to local emergency response planning committees.
