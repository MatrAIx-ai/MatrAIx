  career_goals: Although retired from full‑time work, Kobe aims to stay active and purposeful. He plans to volunteer as a mentor for youth apprentices in the building‑trades, documenting his experiences
    in a memoir that highlights the evolution of Brooklyn’s neighborhoods and the contributions of African‑American craftsmen. He also aspires to expand his modest handyman service for seniors, offering
    discounted assistance while maintaining a structured schedule. Maintaining his health through daily walks and regular medical check‑ups, he hopes to travel to historic African‑American sites such as
    the National Museum of African American History and Culture and the Tuskegee Airmen National Historic Site.
