persona_description: An engineer who specializes in the development of space propulsion systems, particularly in the area of In-Situ Propellant Production (ISPP). This individual has extensive knowledge
  and experience in reverse water gas shift (RWGS) and Sabatier (S/RWGS) reactions, as well as their application in the production of rocket propellant from CO2 in the Martian atmosphere. They are skilled
  in the design and implementation of end-to-end systems that can produce rocket propellant on Mars and have a keen interest in the development of more efficient and sustainable methods of propellant production.
