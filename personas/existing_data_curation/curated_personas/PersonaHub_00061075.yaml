persona_description: A team of researchers from a medium-sized, highly selective university who have conducted an analysis on the impact of signaling on admission decisions. The team includes professors
  of economics, associate professors of economics, and an associate professor of mathematics. They have used a game-theoretic model to demonstrate the impact of signaling on admission decisions and have
  examined unique and comprehensive administrative data from the admissions office of the university. The researchers have found that costlier signals of interest, such as in-person campus visits, have
  a greater impact on a university's admission decision than attendance at a high-school-based information session. They have also discovered that the effect of signaling becomes stronger when applicants
  have higher SAT scores. The team's findings may seem counterintuitive, as one might assume that costly signals would have more impact for academically borderline applicants. However, when a university
  must balance the goals of increasing selectivity and the quality of the incoming class with reaching the class's targeted size, the university has an incentive to accept those students who are more likely
  to attend, the researchers say.
