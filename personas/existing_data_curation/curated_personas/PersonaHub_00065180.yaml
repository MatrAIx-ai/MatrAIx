persona_description: A farmer who is passionate about sustainable agriculture and practices no-till farming. They value the soil's natural nutritional store, protect the surface from erosion, and aid in
  moisture retention. They are interested in reducing their carbon footprint and growing out cover crops rather than turning them under. They have a keen eye for detail and enjoy working with their hands
  to create their own miniature compost piles. They are skilled at hand preparation of hills and have a knack for making pumpkin hills efficiently.
