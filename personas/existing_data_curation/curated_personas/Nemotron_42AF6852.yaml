  career_goals: Lucas dreams of becoming a professional soccer player, envisioning daily training routines and competitive matches. He is also fascinated by the idea of hosting a kids' television show where
    his talkative nature and love for the spotlight can shine, allowing him to share stories and lead interactive segments. Additionally, Lucas hopes to design his own video games someday, merging his strategic
    thinking and digital creativity. He imagines future roles that combine his love for competition, community involvement, and leadership, such as a youth sports coach or a community activity organizer.
