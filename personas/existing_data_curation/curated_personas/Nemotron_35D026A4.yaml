personas:
  professional: David Locke, a 30‑year‑old board‑certified family physician, blends a practical, evidence‑based mindset with a sociable charisma to deliver swift, accurate diagnoses, lead collaborative
    care teams, and design a future rural health clinic that integrates primary care, mental health, and telehealth services.
  sports: David Locke, an avid outdoor enthusiast, spends weekends hiking Cascade trails, competes in the local intramural soccer league with the Cascade United team, follows the Seattle Seahawks in football,
    cheers for the Seattle Mariners in baseball, and paddles the Skagit River with a self‑organized kayak club.
  arts: David Locke plays acoustic guitar at community open‑mic nights, drawing inspiration from folk icons like Bob Dylan and indie storytellers such as The Decemberists, while unwinding with historical
    nonfiction by David McCullough and admiring the timeless films of Tom Hanks.
  travel: David Locke prefers spontaneous road trips that blend a hike through the North Cascades, a weekend culinary tour of Vancouver’s fresh seafood markets, and a bucket‑list trek to Patagonia’s Torres
    del Paine, all funded through a mix of credit‑card points and modest savings.
  culinary: David Locke, a home‑brewing enthusiast, crafts beers with Cascade hops and incorporates those flavors into meals like smoked salmon with dill and dungeness crab cakes, often pairing them with
    a hearty beef chili spiced with chipotle, though they sometimes forget to rotate pantry stock, leading to ingredient overstock.
  core: David Locke is a structured yet spontaneous family doctor whose passion for community health, craft beer, and outdoor adventure is balanced by occasional forgetfulness around appointments and a
    relentless drive to address health equity.
background:
  cultural: David grew up in a small town near Seattle in a family of German‑Scandinavian descent. His upbringing emphasized self‑reliance, community service, and a love for the natural environment of the
    Pacific Northwest. He was encouraged to pursue higher education, leading him to attend a state university for pre‑medical studies before completing his MD at the University of Washington. The regional
    culture of modesty, pragmatism, and collaborative problem‑solving shaped his professional approach. Living now in Sedro‑Woolley, he blends his Midwestern work ethic with Northwest outdoor traditions,
    participating in local festivals and valuing the tight‑knit rural community.
