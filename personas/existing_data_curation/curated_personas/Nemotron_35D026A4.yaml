  hobbies: '[''hiking'', ''kayaking'', ''intramural soccer'', ''playing acoustic guitar'', ''community open‑mic performances'', ''volunteering at food bank'', ''craft beer brewing'', ''reading historical
    nonfiction'', ''attending medical conferences'', ''photography of Pacific Northwest landscapes'']'
  career_goals: David aims to establish a comprehensive rural health clinic in Sedro‑Woolley that integrates primary care, mental health, and telehealth services. Over the next five years he plans to complete
    a fellowship in family medicine focused on health equity, lead a community health program addressing chronic disease prevention, and mentor medical students and residents. He aspires to become a medical
    director, creating systematic care pathways that improve patient outcomes while remaining open to innovative care models such as mobile health units. Ultimately, he hopes to influence health policy
    at the county level to support underserved populations.
