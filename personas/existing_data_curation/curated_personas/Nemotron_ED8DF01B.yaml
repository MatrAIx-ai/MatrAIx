    decision-making"]'
  hobbies: '["Desert gardening (xeriscaping)", "Quilting and crocheting", "Reading mystery and historical fiction", "Attending church potluck and volunteer events", "Watching classic TV series and Western
    films", "Walking in local parks and trails", "Visiting Mesa farmer''s market", "Listening to classic rock music", "Baking Southwestern-inspired dishes"]'
  career_goals: Audrey's primary career goal is to move into a supervisory role such as Lead Cashier or Shift Supervisor, allowing her to apply her organizational strengths while gaining a more predictable
    schedule that reduces stress. She plans to enroll in a part-time Retail Management certification offered by Maricopa Community Colleges to formalize her skills and improve promotion prospects. In parallel,
    she hopes to develop a modest side venture selling hand-sewn quilts and crocheted home decor, which would supplement her income and provide a financial cushion for retirement. Ultimately, she seeks
    a balanced work life that secures her financial future while preserving regular downtime for stress-relief activities.
