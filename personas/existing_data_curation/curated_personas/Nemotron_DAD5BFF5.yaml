personas:
  professional: Corene Johnson, a retired community organizer in Deer Park, leverages their knack for event coordination, modest budget management, and intergenerational storytelling—balancing meticulous
    planning with easygoing flexibility and assertively guiding volunteer committees—to run senior center workshops, church gatherings, and local art exhibitions, while confidently navigating email and
    video calls to keep volunteers connected.
  sports: Corene Johnson energetically enjoys cheering on the Houston Astros during baseball season, the Texans on crisp fall Sundays, and the Rockets when the NBA schedule permits, while staying active
    through a weekly senior walking club at Deer Park Community Center, gentle water aerobics at the local pool, and occasional low‑impact ballroom dance classes that combine social fun with light cardio.
  arts: Corene Johnson immerses themselves in the arts by attending openings at the Houston Museum of Fine Arts featuring works by Georgia O'Keeffe and contemporary Texan painters, humming along to Miles
    Davis, B.B. King, and Mahalia Jackson while crocheting quilts inspired by the Iowa Star pattern, and leading book‑club discussions on historical biographies like David McCullough’s 'John Adams', all
    of which fuel their vibrant storytelling at senior gatherings.
  travel: Corene Johnson prefers relaxed, group‑oriented travel, often joining senior tours to Galveston’s historic Strand, day trips to Big Bend National Park for sunrise hikes, and annual visits to Savannah’s
    historic squares, while dreaming of a curated art pilgrimage to Paris’s Musée d’Orsay and a cultural immersion in New Orleans’ jazz scene when a senior discount package makes the trip affordable.
  culinary: Corene Johnson, an adept home chef, delights in reimagining classic Southern fare such as shrimp and grits with smoked paprika, collard greens simmered with garden‑grown rosemary and thyme,
    and low‑sugar pecan pie sweetened with honey, while frequently hosting potluck brunches where guests savor their signature hibiscus‑infused sweet tea.
  core: Corene Johnson is a spry 79‑year‑old gospel‑singing, garden‑tending community catalyst who blends meticulous event planning with spontaneous quilting marathons, a love for Southern culinary experiments,
    and an insatiable curiosity for art and history.
background:
  cultural: Corene is a Black Texan whose upbringing was shaped by the rich traditions of African-American culture in the Gulf Coast region. Raised during the civil‑rights era, she internalized values of
    resilience, community solidarity, and storytelling. Her family gatherings are centered around soul food, gospel music, and lively conversation, reinforcing a strong sense of identity and belonging.
    The church has been a cornerstone of her social life, providing spiritual grounding and opportunities for service. Living in Deer Park, she draws on both Southern hospitality and the multicultural vibrancy
    of Houston’s nearby urban landscape. These cultural roots inform her appreciation for art, her commitment to mentoring younger generations, and her active participation in community events.
attributes:
  skills: '[''Event planning and coordination'', ''Budget management'', ''Volunteer recruitment and supervision'', ''Intergenerational mentorship'', ''Basic computer literacy (email, video calls, social
