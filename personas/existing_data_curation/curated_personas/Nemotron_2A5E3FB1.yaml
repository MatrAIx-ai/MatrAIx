  hobbies: '[''Watercolor painting'', ''Community theater'', ''Book club'', ''Gardening'', ''Listening to music and podcasts'', ''Volunteer work at food pantry'', ''Knitting'', ''Quilting'', ''Genealogy
    research'', ''Local hiking'', ''Writing short stories'', ''Attending art fairs'']'
  career_goals: Mira hopes to transition from a front‑line cashier role to a supervisory or assistant manager position where she can mentor younger staff and shape store policies that prioritize customer
    well‑being. She also dreams of completing her associate's degree in Business Administration or Fine Arts, which would enable her to work part‑time at a local art gallery or community center as a volunteer
    coordinator. Long‑term, she envisions launching a modest home‑based crafts studio selling hand‑painted items and quilts, blending her love of art with her entrepreneurial spirit, while also continuing
    to volunteer in mental‑health support groups to help others manage anxiety and distress.
