  hobbies: '["Gardening", "Fishing", "Woodworking", "Reading western novels", "Listening to classic rock", "Dog walking", "Church potlucks", "Volunteering at senior center"]'
  career_goals: Chester hopes to formalize his experience by earning a Certified Nursing Assistant (CNA) credential and eventually a Home Health Aide certification. He aims to move into a lead‑assistant
    or mentorship role where he can train younger staff and advocate for schedules that reduce stress for both caregivers and patients. In the longer term, he envisions participating in patient‑advocacy
    committees that focus on improving quality of life for seniors in his community, while also taking a few stress‑management courses to better manage his own worries.
