personas:
  professional: Rosa Pastrana, a bilingual library technician at the Fort Lauderdale Public Library, blends meticulous cataloging expertise with a growing passion for digital archiving, designing bilingual
    storytimes and workshops while they pursue an ALA Certified Library Technician credential to transition into senior outreach coordination.
  sports: Rosa Pastrana supports the Miami Heat and the Miami Dolphins, they join a community beach‑volleyball league at Fort Lauderdale Beach during the summer, and they enjoy early morning jogs along
    the shoreline while listening to a Build‑Back‑Stronger podcast for motivation.
  arts: Rosa Pastrana, an avid reader of contemporary Latin American writers like Valeria Luiselli and classic authors such as Gabriel Garcia Marquez, they accompany literary evenings with playlists featuring
    folk singer Juanes and occasionally visit the Broward Center for the Performing Arts to see productions starring Meryl Streep and Lin‑Manuel Miranda.
  travel: Rosa Pastrana plans trips with a blend of structured itineraries and spontaneous beach days, they favor short flights to Cartagena and longer road trips to Everglades National Park, while budgeting
    carefully to accommodate their family's occasional weekend getaways.
  culinary: Rosa Pastrana's culinary repertoire showcases homemade arepas filled with queso de mano, hallacas seasoned with cumin and cilantro, and sweet cachapas topped with ham, while they also experiment
    with Mediterranean quinoa salads and savor a dash of ají picante for heat.
  core: Rosa Pastrana interlaces bilingual library service, cautious financial stewardship, health‑focused self‑care, and vibrant cultural rituals into a life paced by curiosity, community, and a lingering
    tendency to worry over details, which they manage with quiet determination.
background:
  cultural: Rosa was born and raised in Venezuela, growing up in a close‑knit family that celebrated traditional holidays such as Día de la Independencia and Carnaval with music, dancing, and family meals.
    She migrated to the United States in the early 2000s, bringing with her a deep appreciation for Venezuelan cuisine, folklore, and the Spanish language. In Fort Lauderdale, she remains actively involved
    in the local Venezuelan diaspora, attending community gatherings, cultural festivals, and church services conducted in Spanish. Her cultural identity influences her daily life—she speaks Spanish at
    home, cooks Venezuelan dishes, and shares stories of her homeland with patrons. Rosa’s heritage also informs her professional commitment to providing bilingual resources and fostering a welcoming environment
    for other immigrants navigating a new country.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Cataloging (Dewey Decimal & MARC)'', ''Circulation management'', ''Customer service and patron assistance'', ''Electronic resource navigation
