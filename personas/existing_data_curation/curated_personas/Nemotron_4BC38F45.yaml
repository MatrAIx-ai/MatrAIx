    scanners, printers)'', ''Literacy support for children and adults'', ''Community outreach and resource referral'', ''Inventory management and shelf organization'', ''Time management and multitasking'',
    ''Conflict resolution and empathetic patron interaction'']'
  hobbies: '[''Reading contemporary and classic literature (including Venezuelan authors)'', ''Cooking traditional Venezuelan dishes (arepas, hallacas, cachapas)'', ''Gardening tropical plants on a balcony'',
    ''Knitting and crocheting'', ''Walking along Fort Lauderdale beaches'', ''Attending local cultural festivals and dancing'', ''Practicing yoga and mindfulness meditation'', ''Volunteering at community
    centers and church literacy programs'', ''Listening to Latin music and radio programs'', ''Exploring genealogy and family history'']'
  career_goals: Rosa aspires to deepen her professional expertise while maintaining the reliable service she values. She plans to enroll in a library technology certificate program at a local community
    college and pursue the ALA Certified Library Technician credential. Her long‑term ambition is to transition into a senior library technician or community outreach coordinator role, where she can design
    and lead bilingual programs that connect the Venezuelan and broader Hispanic communities with library resources. Additionally, Rosa is eager to learn digital archiving and metadata preservation techniques
    to support the library’s growing electronic collections. By securing these qualifications, she hopes to achieve greater job stability, reduce work‑related stress, and serve as a mentor for newer staff
    members.
