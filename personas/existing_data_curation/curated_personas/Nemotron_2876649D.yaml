  career_goals: Nicole aims to transition from floor‑level retail to a role that leverages her artistic sensibility and desire for solitary, flexible work. In the short term she plans to complete a part‑time
    certificate in Digital Marketing and Sustainable Retail to deepen her expertise in online curation and ethical sourcing. Her immediate professional goal is to become a Visual Merchandising Manager for
    a boutique or museum gift shop, where she can design displays and curate product assortments with minimal daily customer interaction. Long‑term, Nicole hopes to launch her own e‑commerce platform that
    showcases emerging local artists and artisanal home‑decor items, allowing her to work remotely, set her own schedule, and continue learning about new ideas and unconventional designs.
