personas:
  professional: Jerry Porter, a seasoned software architect with three decades of enterprise C#/.NET and Java experience, leads legacy modernization projects with rigorous test‑driven and DevOps practices,
    while mentoring junior engineers and drafting meticulous documentation, reflecting his preference for structure, predictability, and practical problem‑solving.
  sports: Jerry Porter is a devoted follower of the Clemson Tigers college football team, attends home games each fall, participates in the senior center’s weekly walking club, and occasionally joins a
    local bridge‑swing softball league, combining his love for community sport with a low‑impact fitness routine.
  arts: Jerry Porter enjoys listening to classic blues legends like B.B. King and appreciating the works of Southern novelist Pat Conroy, chuckles at reenactments of vintage car ads, and spends quiet evenings
    at community theater productions, integrating his appreciation for narrative storytelling into his leisure.
  travel: Jerry Porter prefers road‑trip itineraries that blend coastal scenery with historical stops, such as his annual drives along South Carolina’s Lowcountry to Charleston and a longing to explore
    New Orleans’ culinary scene, but he balances this wanderlust with his wife’s desire for relaxed, budget‑friendly stays.
  culinary: Jerry Porter delights in cooking Southern comfort dishes like gumbo and shrimp & grits using fresh tomatoes, okra, and shrimp procured from his garden and local fish market, while his woodworking
    projects often double as makeshift outdoor kitchens where he experiments with smoked brisket and homemade barbecue sauces.
  core: Jerry Porter blends meticulous engineering discipline with a love of low‑key outdoor hobbies, steady finances, and a well‑honed routine that values predictability, community, and occasional indulgences.
background:
  cultural: Jerry grew up in the Lowcountry region of South Carolina, a setting that fostered strong ties to family, community, and the natural environment. His upbringing emphasized Southern hospitality,
    a work ethic rooted in practicality, and participation in local traditions such as church gatherings, the annual county fair, and seasonal hunting and fishing trips. He is an active member of a Baptist
    congregation, where he contributes to outreach programs and volunteers for youth events. The region’s blend of historic preservation and gradual modernization informs his appreciation for both legacy
    systems and emerging technologies, shaping a worldview that values dependable structures while remaining open to measured change.
attributes:
  skills: '[''Software Architecture'', ''Full‑Stack Development (C#, .NET, Java)'', ''Database Design and Optimization (SQL Server, PostgreSQL)'', ''Agile and Scrum Methodologies'', ''DevOps & CI/CD (AWS,
