    (Procore, PlanGrid)'']'
  hobbies: '[''Hiking in the Medicine Bow Mountains'', ''Fly fishing on the North Platte River'', ''DIY woodworking and home improvement projects'', ''Restoring classic automobiles'', ''Attending local
    rodeos and community barbecues'', ''Reading about sustainable construction and emerging building tech'', ''Strategic board games (chess, Settlers of Catan)'', ''Landscape photography'', ''Target shooting
    at the local gun club'']'
  career_goals: Gary aims to move from site‑level management to a senior regional leadership role, overseeing multiple construction portfolios across Wyoming and neighboring states. Over the next five years
    he plans to earn PMP and LEED AP certifications to deepen his strategic and green‑building expertise. He envisions launching a boutique consulting firm that specializes in sustainable, modular construction
    solutions for rural communities, leveraging his curiosity for new technologies and his competitive drive to deliver projects faster and under budget. In parallel, he wants to mentor emerging construction
    managers, sharing his flexible, pragmatic approach to problem‑solving while fostering a culture of accountability.
