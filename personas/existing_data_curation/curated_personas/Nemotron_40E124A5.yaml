  hobbies: '[''Watercolor painting'', ''Sketching'', ''Digital illustration'', ''Photography'', ''Cooking Mexican cuisine'', ''Yoga'', ''Meditation'', ''Reading graphic novels'', ''Hiking'', ''Community
    art workshops'']'
  career_goals: Sofia aims to advance from her current graphic designer role to a senior designer position within the next three years, focusing on deepening her expertise in UI/UX and motion graphics.
    She plans to enroll in a bachelor's program in graphic design or visual communication to complement her associate’s degree, while building a robust portfolio featuring culturally resonant projects for
    Mexican‑American businesses. In the long term, she aspires to become a creative director, leading a small multidisciplinary team that produces socially impactful design work, and eventually launch her
    own boutique studio that mentors emerging designers from underrepresented backgrounds—all while maintaining a balanced workload to protect her mental wellbeing.
