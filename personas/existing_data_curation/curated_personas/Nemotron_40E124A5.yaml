personas:
  professional: A meticulous visual communicator and graphic designer, Sofia Ricardo leverages expert-level proficiency in Adobe Photoshop, Illustrator, and InDesign to craft brand identities infused with
    vibrant folk art motifs, while methodically expanding into UI/UX and motion graphics to achieve a senior role within three years.
  sports: Enjoying the arid trails of Imperial County, Sofia Ricardo hikes with a tight‑knit group of friends, practices yoga for flexibility, and follows the Los Angeles Rams and San Diego Padres, though
    they prefer solo outdoor activity over crowded gym sessions.
  arts: An avid creator and collector, Sofia Ricardo spends evenings watercolor painting folk‑inspired motifs, sketches digitally in Figma, and draws inspiration from artists such as Frida Kahlo, Diego
    Rivera, and graphic novelists like Alan Moore, integrating these influences into community workshops.
  travel: Sofia Ricardo prefers low‑key, purpose‑driven travel, often planning weekend trips to the desert sprawl of Joshua Tree or the historic streets of Guanajuato, while balancing a modest travel budget
    with occasional aspirations to explore the vibrant markets of Oaxaca.
  culinary: In the kitchen, Sofia Ricardo enjoys an intermediate level of cooking, mastering traditional dishes such as tamales, mole, and pozole, delighting in ingredients like masa harina, dried chiles,
    hominy, and fresh cilantro, while occasionally over‑seasoning in a quest for authentic flavor depth.
  core: A compassionate yet anxiety‑prone visual storyteller, Sofia Ricardo blends disciplined organization with restless curiosity, balancing meticulous design work, solo artistic pursuits, and a yearning
    for culturally resonant impact, all while wrestling with occasional overthinking and a habit of leaving coffee cups unfinished.
background:
  cultural: Sofia was raised in a Mexican immigrant family in Brawley, California, growing up bilingual and immersed in traditions such as Día de los Muertos, quinceañeras, and family gatherings centered
    around homemade Mexican cuisine. Her Mexican heritage profoundly influences her design aesthetic, encouraging the use of vibrant colors, geometric patterns, and symbolic motifs drawn from folk art.
    Living near the US‑Mexico border, she experiences a blend of Mexican and Californian cultures, actively participates in local Mexican‑American community events, and values the strong family bonds and
    communal support that shape her worldview. Sofia strives to honor her cultural roots responsibly in her professional work, aiming to uplift her community through design that reflects and celebrates
    its rich heritage.
