  hobbies: '[''Watercolor painting'', ''Sketching'', ''Speculative fiction reading'', ''Art gallery visits'', ''Yoga'', ''Mindfulness meditation'', ''Hiking'', ''Experimental cooking'', ''Volunteer health‑education
    workshops with art'', ''Journaling'', ''Puzzle solving'', ''Book club'']'
  career_goals: Leigh aims to become a charge nurse or nurse manager within three years, pursue a Master of Science in Nursing focusing on Nursing Informatics or Clinical Education, develop interdisciplinary
    training programs that incorporate creative problem‑solving and art‑based stress‑reduction techniques, launch a community outreach initiative in Bergen County that blends health education with visual‑arts
    workshops, and mentor emerging nurses to foster compassionate and innovative care.
