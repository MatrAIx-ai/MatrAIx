persona_description: A healthcare professional who works in the field of emergency medicine, particularly in the treatment of acute mountain sickness (AMS). This individual is experienced in assessing the
  risk factors for AMS, including travel history, altitude attained, and medical history, and is skilled in administering acetazolamide or dexamethasone to manage the condition. They are also familiar with
  the clinical function score and the Lake Louise Questionnaire Score, as well as the importance of preacclimatization and medical prophylaxis.
