persona_description: A researcher at Harvard Medical School who specializes in emergency response and social media analysis, particularly in the field of disaster management. They have expertise in observing
  and analyzing information flow on social media platforms during emergencies, and have developed methods to use social media data to expedite public health, safety, or medical response in crises. They
  are skilled at integrating with existing analysis and alerting infrastructure and are interested in developing approaches to survey social media to complement traditional approaches to situation awareness
  after emergency events.
