  career_goals: Connie dreams of a future where she can combine her love of helping people and animals. She imagines becoming a teacher or a veterinarian, roles that let her share knowledge, care for living
    things, and work closely with others. Her practical streak makes her think about ways to make a tangible difference in her community, such as organizing school clean‑up days or tutoring younger classmates.
