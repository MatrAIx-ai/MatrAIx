personas:
  professional: A budding junior architect Connie Wood builds intricate LEGO cities, turning their boundless curiosity about how things fit together and their practical knack for problem‑solving into early
    design skills, while their relaxed, flexible attitude lets them experiment without strict plans and happily collaborate with friends on group building projects.
  sports: An energetic athlete Connie Wood dashes around the playground during recess, practices soccer drills with the Brookside Kids Soccer Club, cheers on the city’s Major League Baseball team, the River
    City Raptors, and joins a seasonal ice‑skating class in winter, balancing their love for group games with a flexible, fun‑first approach.
  arts: An enthusiastic creator Connie Wood spends afternoons drawing bright scenes inspired by 'Frozen' and 'Mickey Mouse', copies the bold brushstrokes of Bob Ross in their paintings, builds imaginative
    worlds with LEGO, and delights in listening to kid‑friendly tunes by The Wiggles and watching performances by the local children's theater group, the Storytime Players.
  travel: An adventurous explorer Connie Wood loves spontaneous treasure hunts in the neighborhood woods, eagerly attends day trips to the nearby county park and the community fair, dreams of family vacations
    to Disneyland and Yellowstone National Park, and cherishes each outing as a big adventure despite the occasional budget‑driven limits on travel.
  culinary: A budding chef Connie Wood loves crunchy carrot sticks, cheesy pepperoni pizza with extra mozzarella, and sweet strawberry smoothies, enjoys helping their mom make peanut butter and jelly sandwiches,
    and proudly creates simple fruit kebabs with banana, grapes, and strawberries, though they sometimes forget to wash their hands before cooking.
  core: Connie Wood is a curious, carefree seven‑year‑old who builds LEGO castles, tags friends in endless games, saves spare change in a pink piggy bank, and tackles mild asthma with occasional forgetfulness,
    embodying boundless energy and a love for spontaneous fun.
background:
  cultural: Connie grows up in a typical Midwestern small‑town environment in Troy, Illinois, surrounded by a white, largely Protestant community that values family gatherings, school involvement, and local
    traditions. Her family celebrates American holidays such as Thanksgiving, Fourth of July fireworks, and community festivals tied to Madison County's agricultural heritage. Church activities and school
    programs provide her with a sense of belonging, while the town’s close‑knit neighborhoods encourage her sociable and cooperative nature.
