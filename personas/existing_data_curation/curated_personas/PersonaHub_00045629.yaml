persona_description: A political economist who specializes in the study of economic theories and practices, particularly those related to the political economy of supersonic transport. He is particularly
  interested in the economic analysis of the Concorde and its impact on the political landscape of the time. He is a vocal critic of the economic assumptions used to justify the Concorde project and is
  interested in alternative technologies and solutions for the transportation of goods and people. He is also interested in the political and social implications of the Concorde project and its legacy.
