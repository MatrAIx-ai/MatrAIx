personas:
  professional: Marc Cantu harnesses two decades of full‑stack development and a business strategy background to lead cross‑functional squads, translating technical roadmaps into profit‑driven product visions
    while mentoring junior coders with a blend of curiosity‑driven experimentation and pragmatic delivery.
  sports: Marc Cantu dominates the Saturday night pick‑up basketball court in Riverside Park, dons a New York Knicks jersey for games, hikes the Hudson Valley with friends as a member of the Adirondack
    Trail Club, and passionately roots for the New York Yankees during baseball season, balancing competitive team play with solitary trail endurance.
  arts: Marc Cantu sharpens his quick‑thinking flair in a citywide improv troupe that riffs on the works of Amy Poehler and Mike Birbiglia, curates street‑level photography inspired by Henri Cartier‑Bresson,
    and maintains a nostalgic collection of vintage video games including Super Mario Bros. and The Legend of Zelda, all of which fuel his sociable yet critical creative outlet.
  travel: Marc Cantu prefers spontaneous weekend escapes to the Hudson Valley’s vineyards and historic Hudson towns, while also scheduling annual tech conference pilgrimages to Lisbon’s Web Summit and a
    summer cultural tour of Barcelona to indulge in architectural photography, blending an unstructured adventure appetite with structured career networking trips.
  culinary: Marc Cantu registers for hands‑on Italian cooking workshops where he perfects fresh tagliatelle, carbonara sauce, and tiramisu, pairs his dishes with boutique Chianti, and often recreates the
    recipes at home while balancing his love for hearty street‑food tacos after hikes, reflecting his curiosity for flavor and pragmatic home‑cooking efficiency.
  core: Marc Cantu is a tech‑savvy, competitive improv enthusiast who balances late‑night coding sprints with pick‑up basketball, meticulous financial planning, and a lingering habit of over‑booking social
    events.
background:
  cultural: Marc was raised in a middle‑class, white American family with deep Italian and Irish roots in the New York metropolitan area. Family gatherings often centered around Sunday pasta dinners and
    lively storytelling, instilling a strong sense of community and appreciation for tradition. Growing up in Queens, he was exposed to the city’s cultural diversity, which fostered his sociable and outgoing
    nature. While he respects his heritage—celebrating holidays like St. Patrick’s Day and traditional Italian festivals—he also embraces the broader urban New York culture, participating in local arts,
    tech communities, and neighborhood events.
