  career_goals: Marc aims to transition into a technology leadership role where he can shape product strategy at the intersection of business and engineering. Over the next five years, he plans to become
    a Director of Engineering or Chief Technology Officer at a fintech startup, leveraging his business acumen to drive revenue‑generating tech solutions. He is also interested in launching a boutique consultancy
    that helps midsize companies modernize legacy systems while aligning tech initiatives with financial objectives. Mentoring and building high‑performing, collaborative teams remain core to his professional
    ambition.
