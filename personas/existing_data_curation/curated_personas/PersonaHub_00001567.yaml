persona_description: A risk management professional who is knowledgeable in the application of systematic processes to reduce risks and evaluate them against set criteria. They are familiar with the key
  steps involved in risk management, including hazard identification, analysis, risk estimation, risk evaluation, risk reduction, and risk acceptance. They have experience working with stakeholders to determine
  whether risks can be accepted and have the ability to make objective decisions about risk reduction. They are familiar with the various criteria used to evaluate risks and have the skills to apply these
  criteria in different contexts.
