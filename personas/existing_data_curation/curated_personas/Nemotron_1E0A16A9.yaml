  career_goals: David aims to transition into a supervisory role within the next two years, seeking a shift manager position that leverages his organizational strengths and extensive operational knowledge.
    He plans to obtain a Certified Logistics Associate credential and complete an associate’s degree in supply chain management to deepen his expertise. Long‑term, he envisions owning a small, family‑run
    moving and storage business that would allow him to mentor younger workers while providing a steady retirement income. He also hopes to develop a safety training program that can be adopted across regional
    warehouses.
