persona_description: A space enthusiast who is interested in the study of stars and their properties, particularly binary star systems and their components. They are particularly fascinated by the 61 Cygni
  system, which consists of two orange-red K-type dwarfs moving in a highly elongated orbit about each other with a mean separation of about double the distance from Pluto to the Sun. They are also interested
  in the history and science behind the 61 Cygni system, including its discovery and the calculation of its distance from Earth, and its association with Hal Clement's fictional fast-rotating planet, Mesklin,
  in Mission of Gravity. They are also interested in the Star Trek universe and the home of the Tellarite race, 61 Cygni.
