  career_goals: As she approaches retirement, Karen aims to transition into a mentorship and safety‑training role, seeking certification as a construction safety trainer so she can formally teach younger
    workers in Stokes County. She hopes to launch a part‑time consulting service for local contractors, focusing on efficient workflow, compliance, and practical problem‑solving. Karen also wants to give
    back to her community by volunteering with Habitat for Humanity, organizing a senior‑worker skill‑share program, and assisting at her church’s outreach projects.
