  career_goals: Timothy aspires to become a professional concept artist and illustrator, ideally working for video‑game or animation studios or as a freelance creator. He plans to enroll in a specialized
    art program at a community college or art institute, secure an apprenticeship with a local graphic‑design shop, and eventually build a personal brand showcasing his speculative fiction and visual art.
    Long‑term, he hopes to publish a collection of illustrated short stories, open an online shop for his prints, win regional art contests, and contribute to community cultural projects.
