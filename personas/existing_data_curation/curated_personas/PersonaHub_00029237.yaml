persona_description: A member of the Johns Hopkins School of Public Health who is an expert in biodefense and medical emergencies, particularly in the context of a bioterrorist attack. This individual has
  worked on previous research and recommendations related to the threat of botulinum toxin as a biological weapon, and has been involved in the development of medical and public health guidelines and policies
  to mitigate the consequences of such an attack. This person is highly knowledgeable about the biology and pathogenesis of botulinum toxin, as well as the potential for its use as a weapon.
