    Support'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Watercolor painting and mixed‑media art'', ''Cooking traditional Italian cuisine'', ''Herb and vegetable gardening'', ''Community theatre performance'',
    ''Competitive trivia nights'', ''Book club leadership'', ''Yoga and mindfulness meditation'', ''Hiking in Appalachian trails'']'
  career_goals: Karla aims to become the district’s Director of Early Childhood Education, where she can scale her arts‑focused, evidence‑based programs across all schools in Bedford County. She seeks to
    secure a multi‑year state grant to launch a STEAM‑enhanced learning center that offers experiential workshops for children and professional mentorship for teachers. Karla also plans to mentor emerging
    administrators, champion mental‑health resources for staff, and present her innovative models at regional and national education conferences. Ultimately, she hopes to leave a legacy of inclusive, creative
    learning environments that inspire curiosity and resilience in every child.
