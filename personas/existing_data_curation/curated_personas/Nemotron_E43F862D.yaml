personas:
  professional: John Mcphail, a seasoned embalmer and restorative artist with deep expertise in crematory operations, blends meticulous record‑keeping and compassionate client counseling to craft personalized
    memorial experiences while methodically pursuing a funeral‑director license and integrating eco‑friendly cremation practices.
  sports: John Mcphail, a devoted fan of the St. Louis Cardinals baseball team and the Kansas City Chiefs football club, spends Sundays at local sports bars watching games, while joining a weekend hiking
    club that participates in the Ozark 10‑Miler race each spring.
  arts: John Mcphail, who paints oil landscapes inspired by Thomas Moran, collects recordings of Bill Monroe and Alison Krauss, and curates a personal gallery of his own photography of the Ozark sunrise,
    often pairing creative sessions with vinyl spins of bluegrass classics.
  travel: John Mcphail, who favors carefully planned road trips, has explored the Great Smoky Mountains National Park and the Arkansas River Valley, dreams of photographing the fjords of Norway, and schedules
    annual family visits to the historic town of Eureka Springs for its arts festivals.
  culinary: John Mcphail, whose kitchen favors rustic comfort foods like pan‑seared trout with lemon‑dill sauce, cornbread with honey butter, and apple‑cinnamon crumble, enjoys experimenting with fresh
    rosemary and thyme in cooking, but admits to overindulging in weekend craft beers while painting.
  core: John Mcphail, a methodical, art‑loving mortician who balances caring memorial work with quiet hikes, late‑night oil painting, and a slight coffee‑dependence, sees life as a canvas where every detail
    matters.
background:
  cultural: John was raised in rural eastern Arkansas in a working‑class white family, where Southern hospitality, close‑knit community ties, and strong church involvement shaped his values. He grew up
    with a deep respect for family traditions and the rituals surrounding death, which guided his career in funeral services. The local culture of modesty, self‑reliance, reverence for the land, and communal
    support continues to influence his outlook and daily life.
attributes:
  skills: '["Embalming","Crematory operation","Mortuary health and safety compliance","Grief counseling","Artistic memorial arrangement","Floral design basics","Administrative record‑keeping","Equipment
    maintenance","Client communication","Inventory management"]'
  hobbies: '["Oil painting","Woodworking","Photography","Hiking","Reading historical non‑fiction","Folk and bluegrass music listening","Genealogy research","Model train building","Community volunteering","Chess"]'
  career_goals: John aims to obtain his funeral director license within the next two years, expand his responsibilities to oversee a small family‑owned funeral home in Stone County, incorporate sustainable
    and eco‑friendly cremation practices, develop a line of handcrafted urns and personalized memorial artwork, and mentor apprentices to uphold high professional standards in the funeral industry.
