persona_description: A network security professional who specializes in asset detection and discovery tasks, particularly in the use of indirect-type sensors to identify previously unknown address information
  of known and unknown devices within a network. This professional is adept at using port mirroring data to discover additional addresses of discovered devices, including those of previously unidentified
  devices and IP addresses, and is skilled in communicating these discovered addresses to an asset management system for further processing and analysis. This persona is highly knowledgeable in the use
  of indirect-type sensors to identify additional address information and devices within a network, and is adept at using this knowledge to improve the efficiency and effectiveness of asset detection and
  discovery tasks.
