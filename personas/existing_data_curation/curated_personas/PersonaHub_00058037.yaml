persona_description: A poet and professor who is known for his profound and introspective poetry, particularly in the form of the "Concerning the Book that is the Body of the Beloved" poems. He has a unique
  ability to capture the essence of the beloved and the pain of loss, and his work has been praised by renowned poets and literary critics. Orr is a professor at the University of Virginia and founder of
  its MFA writing program, and he is known for his ability to place mindfulness almost instantly back inside the mind.
