personas:
  professional: Valeria Concepcion is a secondary‑school arts integration specialist who leverages bilingual fluency and meticulous curriculum design to weave visual, literary, and performance projects
    into state‑aligned lessons, while their outgoing nature fuels collaborative faculty leadership and community‑based exhibitions.
  sports: Valeria Concepcion hikes the Acadia coastal trails with a local senior walking club, supports the Boston Red Sox and New England Revolution, and occasionally joins community kayaking outings,
    balancing seasonal outdoor activity with a love for low‑impact fitness.
  arts: Valeria Concepcion creates watercolor landscapes infused with New England vistas and folk motifs, crafts traditional papel picado and embroidered textiles, directs community‑theater productions,
    and captures classroom moments inspired by photographers like Vivian Maier and painters such as Georgia O'Keeffe.
  travel: Valeria Concepcion enjoys weekend road trips to Maine’s coastal towns, has explored Oaxaca’s artisan markets, yearns to wander Barcelona’s Gothic Quarter, and prefers detailed itineraries that
    allow ample time for sketching and local food tastings.
  culinary: Valeria Concepcion experiments with regional dishes from their family's culinary tradition like tamales de elote, mole paired with locally sourced Maine lobster, and chiles rellenos, blending
    heritage spices with fresh Atlantic seafood while honing a confident sauté technique.
  core: Valeria Concepcion balances a tireless curiosity for artistic cross‑pollination with a chronic tendency to over‑schedule, often juggling multiple workshops while quietly worrying about meeting every
    deadline.
background:
  cultural: Valeria was raised in a Mexican‑American household where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and family weekly meals were central to her
    identity. Her parents instilled a deep respect for community, storytelling, and the visual arts, especially folk art forms like alebrijes and talavera pottery. After moving to Maine, she blended these
    Mexican roots with New England customs, celebrating local harvest festivals while maintaining Mexican holiday observances. This bicultural experience informs her teaching philosophy, allowing her to
    draw connections between Mexican artistic heritage and the broader curriculum, fostering a classroom environment where cultural diversity is both taught and lived. She actively shares her heritage through
    classroom projects, community workshops, and by mentoring students from immigrant backgrounds, emphasizing the value of multicultural perspectives in personal growth and academic achievement.
