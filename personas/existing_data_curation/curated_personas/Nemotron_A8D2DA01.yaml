  hobbies: '["Watercolor painting", "Traditional Mexican crafts (e.g., papel picado, embroidery)", "Cooking Mexican cuisine", "Reading Latin American literature", "Folklorico dance", "Hiking and nature
    walks", "Photography", "Community theater involvement", "Yoga and meditation", "Participating in book clubs"]'
  career_goals: Valeria aspires to become a district arts curriculum specialist, where she can champion systemic integration of the arts across all schools and develop professional development workshops
    for teachers nationwide. She hopes to launch a sustained cross‑cultural exchange program linking her school with a partner school in Oaxaca, giving students immersive experiences in Mexican art and
    language. Valeria also aims to mentor emerging educators, lead a school‑wide arts initiative that culminates in an annual community arts festival, and eventually publish a guide on culturally responsive
    arts teaching. On a personal level, she seeks to refine her stress‑management practices, ensuring her well‑being while maintaining her commitment to student success.
