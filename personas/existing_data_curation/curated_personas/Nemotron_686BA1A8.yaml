  career_goals: In the short term, Beatriz aims to become a captain of her school’s varsity soccer team and to lead her peer group in community service projects. Looking ahead, she dreams of earning a degree
    in sports management or criminal justice so she can work as a professional sports event coordinator, a sports broadcaster, or a community‑focused police officer. Her ambition combines her love for structure,
    competitive drive, and desire to engage with people in dynamic, real‑world settings.
