  career_goals: Although Michael is currently not in the workforce, he aims to stay active and purposeful through community involvement. He plans to complete his associate degree in business administration
    to solidify his knowledge of budgeting and small‑business operations. He hopes to become a regular volunteer handyman for the local senior center and community garden, providing reliable maintenance
    support while honing his trade skills. Michael also aspires to mentor younger adults interested in practical trades, sharing his experience in a structured, low‑stress setting. Maintaining his mental‑health
    stability is a primary goal, so he seeks a routine that balances helpful service with personal wellbeing, ultimately preserving his independence and financial self‑sufficiency.
