personas:
  professional: Michael Smith is a retired handyman‑volunteer who leverages his mechanical troubleshooting, basic carpentry, and meticulous inventory‑keeping skills to provide reliable maintenance support
    at the local senior center, and their preference for routine and empathetic listening makes them a calming presence in small‑group projects.
  sports: Michael Smith enjoys low‑impact exercise such as seasonal fishing on nearby streams, follows the Chicago Cubs baseball team, and participates in a senior bowling league at the community center
    while maintaining a weekly walking routine in the local park, and they find these activities soothing.
  arts: Michael Smith feels a nostalgic connection to the music of The Beatles, The Rolling Stones, and Joan Baez, appreciates classic western films starring John Wayne, and occasionally attends the community
    theater’s production of 'Our Town', which together nourish their love of familiar, timeless art.
  travel: Michael Smith favors short, meticulously planned road trips to historic small towns like Asheville, North Carolina, and Annapolis, Maryland, traveling by car with a detailed itinerary, and while
    their fixed budget limits overseas travel, they dream of a tranquil retreat in the English countryside.
  culinary: Michael Smith enjoys preparing simple comfort foods such as chicken pot roast, baked mac and cheese, and homemade vegetable soup, favoring ingredients like carrots, potatoes, rosemary, and occasionally
    crafting an apple crumble with a buttery crust, reflecting their love of routine and modest culinary skill.
  core: Michael Smith is a methodical, garden‑loving handyman who balances a deep love of routine with quiet anxiety, preferring solitary projects, careful budgeting, and nostalgic comforts while they occasionally
    over‑indulge in gardening supplies.
background:
  cultural: Michael was raised in a Midwestern, white working‑class family in the Mahoning County area of Ohio, a region shaped by the Rust Belt’s industrial heritage. His upbringing emphasized hard work,
    self‑reliance, modesty, and community solidarity—values common in the local Appalachian‑influenced culture. He grew up attending a Protestant church that reinforced traditional virtues and the importance
    of helping neighbors. The local culture celebrates practical skill, patience, and routine, which dovetails with Michael’s preference for familiarity and order. While he never married, his family ties
    and community connections remain strong, reflecting the region’s emphasis on loyalty and mutual support.
