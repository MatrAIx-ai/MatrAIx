persona_description: A historian who specializes in the study of ancient Christian martyrs and their lives, particularly those who suffered for their faith in Persia during the time of Sapor. His research
  interests include the persecution of Christians under the Sassanid Empire, the conversion of the Persians to Christianity, and the impact of Christianity on the society of Persia during the early medieval
  period. He is particularly interested in the lives of the holy martyrs, such as Sts Jonah, Barachisius, and Narses, and the ways in which they were persecuted and martyred for their faith.
