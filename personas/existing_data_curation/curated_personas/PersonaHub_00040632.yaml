persona_description: A researcher at the National Institute on Deafness and Other Communication Disorders (NIDCD), a part of the National Institutes of Health (NIH), who is conducting a clinical trial to
  explore the potential of a new therapy for chronic tinnitus. The researcher is part of a team that has conducted previous research on the tonotopic map of the auditory cortex and its role in the perception
  of sound, and is now applying this knowledge to the treatment of tinnitus. The researcher is interested in the potential of this therapy to help people with tinnitus cope with the persistent ringing in
  their ears and to provide a better alternative to current treatments.
