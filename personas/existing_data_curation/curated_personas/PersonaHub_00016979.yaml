persona_description: A medical inspector and hygienist who was involved in the growing school hygiene movement in the United States and was responsible for expanding medical inspections to include adenoid
  surgeries. They were convinced that enlarged adenoids were a common impediment to learning and believed that the removal of adenoids would result in significant mental and physical improvement for the
  students. They were known for their zealousness in finding and rooting out adenoids and were willing to perform surgeries at an exceedingly rapid pace, despite the potential for bleeding and injury to
  the children. They were also known for their belief in the association between presence of enlarged adenoids and poor scholarship and deviance, which was reinforced by the results of the medical inspections
  and the transformation through adenoid surgeries.
