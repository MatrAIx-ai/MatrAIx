personas:
  professional: Simon Leblois, a 29‑year‑old broadcast sound and lighting technician, blends the reliable mindset of his Midwestern upbringing with a curiosity for new audio tech, and they deliver polished
    live mixes on Avid Pro Tools and program dynamic DMX rigs on GrandMA while staying cool under pressure and mentoring junior crew members.
  sports: Simon Leblois is an avid hiker who tackles the Ozark Trail each weekend with the Springfield Hiking Club, follows the local Springfield Cardinals baseball team and the St. Louis Blues hockey club,
    and they occasionally join a community basketball pickup league at the YMCA, balancing outdoor adventure with casual spectator sports.
  arts: Simon Leblois volunteers as the sound engineer for the Springfield Little Theatre, attends weekly jazz sessions at The Blue Note featuring Miles Davis tributes, curates a personal collection of
    vintage Moog and Buchla synths, and they spend evenings dissecting the film theories of Susan Sontag and the avant‑garde compositions of Aphex Twin.
  travel: Simon Leblois prefers road‑trip itineraries that blend rugged Ozark hikes with stops at regional music festivals, has already toured Nashville for songwriting workshops, dreams of exploring the
    Synth‑Berlin Expo in Germany and the historic streets of Quebec City, and they plan their trips around affordable lodging and the chance to test portable recording gear in new environments.
  culinary: Simon Leblois enjoys cooking experiments ranging from slow‑cooked Missouri pork ribs seasoned with smoked paprika, brown sugar, and cayenne to mastering a fragrant Vietnamese pho broth with
    star anise and fresh basil, and they often pair their meals with a craft bourbon cocktail featuring orange bitters.
  core: Simon Leblois, a 29‑year‑old broadcast tech, fuses Midwestern reliability with a collector’s obsession for vintage synths, balancing meticulous budgeting, proactive health habits, and a love for
    Ozark hikes, jazz nights, and experimental cooking, and they approach life with calm curiosity.
background:
  cultural: Simon grew up in a middle‑class white family in Springfield, Missouri, with deep roots in the Midwest. His surname reflects a French‑Canadian ancestry, and his family tradition blends modesty,
    community involvement, and a strong work ethic typical of the region. Raised in a Catholic household, he was exposed early to church choirs, community theater, and local folk music, which nurtured his
    appreciation for both tradition and artistic expression. The Midwestern cultural emphasis on reliability, practicality, and courteous interaction shaped his balanced approach to professional responsibilities
    and personal relationships. While he values the stable, collaborative spirit of his hometown, his education in the arts broadened his perspective, encouraging curiosity about diverse cultural narratives
    and modern media practices.
attributes:
  skills: '["Audio mixing (Pro Tools, Fairlight)", "Live sound reinforcement", "DMX lighting programming (ETC, GrandMA)", "Broadcast signal routing and compliance", "Timecode and synchronization", "Equipment
    maintenance and troubleshooting", "Cable management and rigging", "Stage design coordination", "Digital audio workstation proficiency", "Remote wireless audio systems", "LED and moving‑head lighting
    control", "Live event cue management", "Safety and compliance knowledge", "Collaboration and crew leadership"]'
  hobbies: '["Analog synthesizer tinkering", "Vintage audio equipment collection", "Volunteer sound engineering for community theater", "Attending local concerts and jazz shows", "Hiking the Ozark trails",
    "Landscape photography", "Home‑theater system experimentation", "Reading contemporary philosophy and film theory", "Board‑game evenings", "Cooking and trying new recipes"]'
  career_goals: Simon aims to transition from a hands‑on technician role to a senior technical director position within the next five years, overseeing both sound and lighting for major regional broadcasts
    and live productions. He plans to earn Society of Broadcast Engineers (SBE) certifications and advanced lighting design credentials, while building expertise in immersive audio formats for streaming
    platforms. In parallel, he wants to mentor junior crew members, develop efficient workflow tools that blend traditional broadcast rigs with modern IP‑based technologies, and eventually launch his own
    freelance production consultancy that serves broadcasters, theater groups, and event firms across the Midwest. His ambition balances a practical drive for career stability with a curiosity for pioneering
    new production technologies.
