personas:
  professional: Imelda Huertasdelpino, a construction and building inspector in Bryan, Texas, blends her detail‑oriented precision with a curiosity for emerging tech like drones and infrared thermography,
    producing thorough inspection reports while mentoring junior staff and bridging language gaps with contractors using her bilingual fluency in English and Tagalog.
  sports: Imelda Huertasdelpino stays fit by leading weekly Zumba and aerobic sessions with friends, hikes the Brazos River trails on weekends, supports the Houston Astros and the Houston Texans, and belongs
    to the local Brazos Park Soccer Club, where they combine competitive spirit with a social focus.
  arts: Imelda Huertasdelpino enjoys karaoke nights featuring traditional folk songs alongside modern country hits from artists like Kacey Musgraves and Morgan Wallen, and finds inspiration in the vibrant
    murals of Austin’s Hope Outdoor Gallery and the soulful vocals of Beyoncé, integrating music into their social gatherings.
  travel: Imelda Huertasdelpino prefers short‑haul road trips that blend adventure with cultural immersion, having explored Austin’s food trucks, the historic San Antonio River Walk, and a weekend surf
    retreat in Costa Rica, while budgeting for future trips to Banff National Park and Kyoto’s cherry‑blossom season.
  culinary: Imelda Huertasdelpino showcases culinary roots by perfecting adobo with soy sauce, vinegar, garlic, and bay leaves, simmering tangy sinigang with tamarind, ginger, and green papaya, and pairing
    these dishes with home‑grown kale and baby carrots from their garden, all while hosting lively weekend cooking gatherings for friends.
  core: Imelda Huertasdelpino balances meticulous professionalism with a vibrant social life, channeling curiosity into tech‑forward inspections, juggling financial diligence with spontaneous karaoke, and
    constantly battling a perfection‑driven worry that fuels both their ambition and occasional burnout.
background:
  cultural: Imelda is a second‑generation Filipino‑American; her parents immigrated from the Luzon region of the Philippines after the 1990s and settled in Bryan, Texas. Growing up in a bilingual household,
    she speaks English fluently and retains Tagalog for family conversations and cultural events. Her upbringing blended traditional Filipino customs—such as celebrating Simbang Gabi, Noche Buena, and the
    annual Philippine Independence Day parade—with typical Texan traditions like Fourth of July fireworks and local rodeos. She remains actively involved in the local Filipino community, attending church
    festivals, participating in cultural dance groups, and sharing Filipino cuisine with friends across the multicultural fabric of Brazos County.
attributes:
  skills: '[''Reading and interpreting construction blueprints'', ''Knowledge of Texas Building Code and International Building Code'', ''Conducting structural and safety inspections'', ''Operating inspection
    tools (moisture meters, infrared cameras, drones)'', ''Report writing and documentation'', ''Use of inspection management software (iAuditor, Excel, CAD viewer)'', ''Effective communication with contractors
    and public officials'', ''Training and mentoring junior inspectors'', ''Bilingual communication (English and Tagalog)'', ''Risk assessment and problem solving'']'
  hobbies: '[''Zumba and group fitness classes'', ''Hiking Brazos River trails'', ''Volunteer work (Habitat for Humanity, community events)'', ''Filipino cooking and recipe sharing'', ''Karaoke nights with
    friends'', ''Dancing (Filipino folk dances and line dancing)'', ''DIY home‑improvement projects'', ''Gardening a backyard vegetable plot'', ''Reading mystery novels and building‑code updates'']'
  career_goals: Imelda aims to become a senior lead inspector for Brazos County and to acquire the International Code Council Certified Building Official (CBO) and LEED Accredited Professional credentials
    within the next three years. She plans to pursue an associate degree in construction management to deepen her theoretical knowledge while continuing on‑the‑job training. Long‑term, she envisions opening
    her own building‑compliance consulting firm that specializes in green‑building practices and offers community workshops on construction safety. She is also passionate about increasing diversity in the
    construction field, so she hopes to develop a mentorship program for young women and immigrants interested in trade careers.
