  hobbies: '[''Visiting local art galleries and street‑mural tours'', ''Cooking traditional Mexican cuisine and fusion recipes'', ''Practicing yoga and meditation for stress relief'', ''Photography of urban
    and cultural scenes'', ''Reading contemporary literature'', ''Dancing salsa and cumbia'', ''Participating in community cultural festivals'', ''Joining language‑exchange groups'', ''Volunteering at youth
    art programs'']'
  career_goals: Maria aspires to advance to a senior buyer or category manager role within a major retailer, focusing on sustainable and culturally diverse product lines. She plans to earn a professional
    certification in supply chain management and deepen her data analytics capabilities, aiming to lead initiatives that integrate Mexican and broader Latin American designs into mainstream retail. In the
    long term, she dreams of opening her own boutique that showcases emerging artists and artisans from her heritage, leveraging her buyer expertise to support underrepresented creators. She also seeks
    mentorship opportunities to inspire other young Hispanic women entering the retail industry.
