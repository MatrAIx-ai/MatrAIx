background:
  cultural: Arturo is raised in a Dominican household in Jersey City, New Jersey. His family speaks Spanish, celebrates Dominican traditions such as Día de la Independencia and Carnaval, enjoys foods like
    mangú, sancocho, and empanadas, and embraces music ranging from merengue to bachata. Growing up in a vibrant Caribbean diaspora community, he experiences a bilingual environment, strong familial bonds,
    and a cultural emphasis on hospitality, resilience, and community support.
