  hobbies: '[''Reading chapter books'', ''Collecting rocks and shells'', ''Lego building'', ''Drawing/sketching'', ''Jigsaw puzzle solving'', ''Nature walks and plant identification'', ''Pet care (dog feeding/grooming)'',
    ''Baking simple cookies with family'']'
  career_goals: Diana hopes to become a teacher who works with small groups of children, or a wildlife biologist who studies and protects animals she loves. She sets short-term goals like reading more books,
    getting good grades in school, and participating in the science fair. Her organized and competitive nature drives her to aim for top performance in class and to eventually earn a degree in education
    or biology.
