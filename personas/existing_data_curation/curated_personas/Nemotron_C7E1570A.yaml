personas:
  professional: Diana Stutts, a budding young explorer in elementary school, channels her curiosity and methodical planning into building intricate Lego constructions where their organized, competitive
    nature drives them to meticulously follow instructions and quietly outshine peers in creativity.
  sports: Diana Stutts spends Saturday mornings in the Riverdale Rovers youth soccer league, sprinting across the field with a competitive edge, while cheering for the United States Women's Soccer Team
    and occasionally joining family nature hikes that double as informal cardio sessions.
  arts: Diana Stutts nurtures their artistic side by sketching quiet still-life scenes inspired by Eric Carle's vivid illustrations and by immersing themselves in the musical scores of Disney's Moana, while
    their love of Lego builds reflects a tactile appreciation for the geometric designs of architect Frank Lloyd Wright.
  travel: Diana Stutts enjoys family road trips to nearby state parks where they collect river stones and shells, dreams of visiting Yellowstone National Park's geysers and the Great Barrier Reef's coral
    gardens, and prefers carefully mapped itineraries that leave plenty of quiet downtime for sketching and exploring nature on their own.
  culinary: Diana Stutts helps their parents whisk together chocolate chip and peanut butter cookies, proudly measures flour and sugar with a junior kitchen scale, savors homemade spaghetti with marinara
    sauce topped with grated parmesan, and delights in tasting fresh apple slices sprinkled with cinnamon for a simple snack.
  core: Diana Stutts is a meticulous, curious seven-year-old who turns nature walks into rock-collecting expeditions, competitively perfects Lego builds, and balances a skeptical eye with a surprisingly
    methodical approach to everything from savings to snack time.
background:
  cultural: Diana was born and raised in Susanville, a small, rural town in Lassen County, California. Her family’s lifestyle emphasizes self-reliance, a strong appreciation for the outdoors, and tight-knit
    family connections. Local traditions such as the annual county fair, holiday gatherings with extended relatives, and community service projects at school shape her values. Growing up in a predominantly
    White, middle-class environment, she experiences typical American customs, values education, personal discipline, and enjoys activities like hiking, fishing, and exploring the nearby forest.
attributes:
  skills: '[''Reading comprehension (grade 2)'', ''Basic arithmetic'', ''Puzzle solving'', ''Organizing personal belongings'', ''Using a simple calendar/planner'', ''Basic computer operation (drag-and-drop)'',
