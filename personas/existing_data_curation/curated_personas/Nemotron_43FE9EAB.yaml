personas:
  professional: Joanna Wren, a seasoned metal assembly veteran with three decades of MIG/TIG welding and CNC machining expertise, now channels their practical, structured mindset into mentoring younger
    workers, championing OSHA safety standards, and gradually building a modest line of handcrafted metal art for the local market.
  sports: Joanna Wren is an avid hiker who tackles the rugged trails of the Bitterroot Mountains each summer, participates in the local senior walking club, and roots for the University of Montana Grizzlies
    football team and the Missoula Osprey minor‑league baseball club during the season, and they often wear a well‑worn hiking hat that has become a trademark.
  arts: Joanna Wren weaves intricate quilts and knits patterned sweaters inspired by traditional folk motifs, collects works by painter Charles M. Russell, enjoys listening to the folk sounds of The Chieftains
    and the storytelling of author Laura Ingalls Wilder’s historical fiction, and they occasionally showcase hand‑forged metal sculptures at the community art fair.
  travel: Joanna Wren plans her travels with a detailed itinerary, favoring road trips to scenic destinations like Glacier National Park and the historic town of Virginia City, while dreaming of a future
    pilgrimage to the historic sites of Colonial Williamsburg and the Oregon Coast, and they always pack a reusable water bottle and a notebook for sketching landscapes.
  culinary: Joanna Wren’s culinary repertoire centers on preserving garden bounty into jars of tangy tomato jam, spiced pickled cucumbers, and hearty sauerkraut, while they love cooking rustic dishes such
    as rosemary‑roasted root vegetables, skillet cornbread, and beef stew seasoned with locally sourced rosemary and thyme.
  core: Joanna Wren is a pattern‑obsessed, safety‑first metalcraft veteran who balances a structured work ethic with a love for nature, community crafting, and the occasional over‑indulgence in spare‑part
    hoarding.
background:
  cultural: Joanna was born and raised in a small rural community in Montana within a white, European‑American family that traced its roots to early 20th‑century homesteaders and miners. Her upbringing
    emphasized self‑reliance, hard work, and community involvement, values reinforced by a Lutheran church that stressed modesty, service, and practicality. The wide‑open landscapes and seasonal cycles
    of Broadwater County fostered her appreciation for the outdoors and seasonal rhythms, which she reflects in her gardening and outdoor activities. These cultural influences have shaped her pragmatic
    outlook, structured approach to work and leisure, and her commitment to contributing to her local community.
attributes:
  skills: '[''Metal assembly'', ''Fabrication techniques'', ''Blueprint reading'', ''MIG welding'', ''TIG welding'', ''CNC machining'', ''Equipment maintenance'', ''Troubleshooting'', ''Safety compliance'',
    ''Quality inspection'', ''Inventory control'', ''Workflow scheduling'', ''Mentoring and training'']'
  hobbies: '[''Vegetable gardening'', ''Flower gardening'', ''Quilting'', ''Knitting'', ''Hiking'', ''Reading historical fiction'', ''Montana history reading'', ''Cooking and canning'', ''Volunteer crafting
    group'']'
  career_goals: Joanna plans to gradually shift her focus toward mentorship and safety training while still contributing to the assembly shop. She aims to become a certified safety trainer, lead an apprenticeship
    program for local high‑school graduates, and share her knowledge of efficient assembly processes. In the longer term, she hopes to create a modest line of handcrafted metal art for local markets and
    secure a comfortable retirement that allows more time for gardening, volunteer work, and family gatherings.
