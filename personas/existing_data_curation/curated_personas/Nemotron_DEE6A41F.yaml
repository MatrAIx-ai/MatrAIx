personas:
  professional: Kimberly Roeder, a 29-year-old social worker, merges evidence-based trauma-informed counseling with rigorous data analysis using SPSS and R, channeling her curiosity and competitive streak
    into designing preventive mental-health programs while maintaining a reserved, methodical approach to interdisciplinary teamwork.
  sports: Kimberly Roeder hikes the Colorado Front Range trails on weekends, practices sunrise yoga at a local studio, rallies behind the Denver Broncos and Colorado Avalanche, and belongs to the Rocky
    Mountain Hiking Association, favoring solitary endurance activities over team sports.
  arts: Kimberly Roeder immerses herself in the Denver Art Museum’s rotating exhibitions, draws technique inspiration from watercolorists Winslow Homer and Agnes Martin, plays Sufjan Stevens and Fleet Foxes
    while sketching, and discusses contemporary sci-fi works by Margaret Atwood and Octavia Butler in a tight-knit book club, all while volunteering to run after-school art workshops for local children.
  travel: Kimberly Roeder meticulously plans solo trips, having trekked Zion National Park’s canyon trails, explored Kyoto’s historic temples, and taken weekend ski escapes to Aspen, yet she balances her
    wanderlust against student-loan repayments and a demanding work schedule.
  culinary: Kimberly Roeder prefers cooking hearty Colorado lamb stew seasoned with rosemary, crafting quinoa bowls topped with roasted beets and hemp seeds, and perfecting avocado toast drizzled with turmeric-infused
    olive oil, demonstrating an intermediate kitchen skill set that occasionally gives way to convenient takeout after a long day.
  core: Kimberly Roeder, a data-driven yet creatively-inclined social worker, channels intense anxiety into meticulous empathy, balancing solitary artistic pursuits with a competitive drive to transform
    youth mental-health services.
background:
  cultural: Kimberly grew up in a middle‑class White family in the Denver metropolitan area, where the blend of suburban stability and a strong outdoors culture shaped her values. The Colorado emphasis
    on environmental stewardship, progressive social attitudes, and personal wellness has informed her worldview. While she identifies with mainstream American cultural norms, she incorporates the region’s
    love of nature, local arts, and community engagement into both her personal life and professional practice.
attributes:
  skills: '[''Individual Counseling'', ''Group Counseling'', ''Trauma-Informed Care'', ''Case Management'', ''Program Evaluation'', ''Statistical Analysis (SPSS, R)'', ''Grant Writing'', ''Crisis Intervention'',
    ''Art-Based Therapy Integration'', ''Risk Assessment'', ''Documentation'', ''Multidisciplinary Collaboration'']'
  hobbies: '[''Hiking'', ''Yoga & Mindfulness'', ''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Reading (Literature & Psychology)'', ''Book Club (Science Fiction)'', ''Coding Small
    Data Visualization Projects'', ''Volunteering at After-School Art Workshops'']'
  career_goals: Kimberly aspires to obtain her Licensed Clinical Social Worker (LCSW) credential and become a lead clinician for a school‑district mental‑health program. She aims to design and implement
    data‑driven preventive interventions for at‑risk youth, secure sustainable funding for community mental‑health services, and mentor emerging social workers. Long‑term, she envisions founding a nonprofit
    that merges evidence‑based practice with creative arts therapy, shaping state‑level policy to improve child and family well‑being.
