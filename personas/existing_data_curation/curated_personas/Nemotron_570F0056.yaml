  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Philosophical discussions'', ''Playing ukulele'', ''Jazz and gospel listening'', ''Community health volunteering'',
    ''Cooking Creole cuisine'', ''Yoga'', ''Photography'']'
  career_goals: Aldrema aims to complete her Bachelor of Science in Nursing within the next two years, followed by a Master’s degree in Nursing Leadership or Nurse Practitioner studies. She envisions a
    career that blends clinical excellence with innovative patient‑centered care, such as developing a hospital‑based art‑therapy program for pediatric patients or leading community health initiatives that
    integrate wellness education with creative expression. Long‑term, she hopes to influence health policy to improve equity for underserved Black communities in Louisiana.
