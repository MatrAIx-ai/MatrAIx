    cuisine", "Learning new languages (e.g., Spanish)"]'
  career_goals: Shirley aims to leverage her expertise and social energy to shape community-driven initiatives that fuse art and technology. She aspires to serve on the board of a local museum or cultural
    institution, designing interdisciplinary educational programs that introduce STEM concepts through creative workshops for seniors and schoolchildren. Additionally, she plans to establish a makerspace
    at a community center where she can mentor women and retirees returning to tech, encouraging innovative thinking while fostering collaborative networks. Her competitive drive pushes her to pursue leadership
    roles that amplify her impact and ensure the programs she creates achieve measurable outcomes and lasting community engagement.
