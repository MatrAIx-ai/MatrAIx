personas:
  professional: John Schnepf is a seasoned civil litigator in Tampa who leverages a deep command of Florida procedural law and a flair for abstract thinking to craft compelling arguments, negotiate creative
    settlements, and mentor junior lawyers while pursuing a boutique practice that serves artists and tech innovators.
  sports: John Schnepf plays weekly tennis at the Tampa Tennis Club, sails with the Tampa Bay Sailing Association on weekends, and passionately supports the Buccaneers, Lightning, and Rays, often debating
    game stats at local sports bars after a match.
  arts: John Schnepf paints abstract canvases inspired by Jackson Pollock and Gerhard Richter, curates a modest collection featuring Tschabalala Self and emerging street artists, writes poetry echoing T.S.
    Eliot, and performs improv with Improv Tampa, all of which inform their legal storytelling and cultural advocacy.
  travel: John Schnepf prefers culturally immersive trips, having explored the art districts of Paris, the galleries of Barcelona, and the culinary scene of Mexico City, while frequently sailing to the
    Florida Keys and planning future voyages to Kyoto for its tea ceremonies, balancing spontaneous itineraries with meticulous research to accommodate family commitments and firm responsibilities.
  culinary: John Schnepf experiments in the kitchen with fusion dishes like miso‑glazed mahi‑mahi tacos, jerk‑spiced paella, and saffron‑infused shrimp étouffée, sourcing fresh ingredients from Tampa’s
    farmers markets, yet often burns the edges of a sauce when juggling case work and late‑night poetry revisions.
  core: John Schnepf blends a lawyer’s analytical rigor with a painter’s imagination, thrives on competition in both the courtroom and trivia nights, and navigates life with a structured yet adventurous
    spirit, occasionally letting curiosity override deadlines.
background:
  cultural: John grew up in the Tampa Bay area in a middle‑class family of German descent; his grandparents immigrated to Florida in the 1970s and retained traditions such as celebrating Oktoberfest and
    emphasizing punctuality and craftsmanship. The multicultural atmosphere of Tampa—shaped by strong Latino, Caribbean, and Southern influences—exposed him to a vibrant mix of cuisines, music, and artistic
    expression. This blend of German heritage, Floridian coastal lifestyle, and the diverse cultural tapestry of his hometown informs his appreciation for both disciplined work ethic and creative, community‑oriented
    experiences.
