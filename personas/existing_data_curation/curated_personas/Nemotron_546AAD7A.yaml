  career_goals: John aims to become a partner at a boutique Tampa firm specializing in arts, entertainment, and emerging‑technology law, leveraging his imaginative approach to attract high‑profile creative
    clients. He plans to launch his own practice within the next five years that offers boutique legal services to artists and inventors. Additionally, John hopes to publish scholarly articles on the intersection
    of copyright and digital innovation, serve on the Florida Bar’s Arts Law Committee, and mentor younger attorneys from non‑traditional educational backgrounds, demonstrating that rigorous self‑study
    can lead to legal excellence.
