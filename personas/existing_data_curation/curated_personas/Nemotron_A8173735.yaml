  career_goals: Stella aims to transition from her current hiatus into a role that bridges her analytical expertise and creative interests, such as user experience research, data visualization consulting,
    or educational technology design. She plans to complete a short certification in UX design and build a portfolio of visual analytics projects that demonstrate her ability to turn data into compelling
    narratives. In the longer term, she hopes to lead community‑based STEM outreach programs that empower young learners—especially girls—in her region, using hands‑on workshops that blend science, technology,
    and art. She also aspires to achieve a sustainable work‑life balance that allows her to support her family while continuing personal growth through lifelong learning and creative pursuits.
