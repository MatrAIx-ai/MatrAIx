persona_description: A researcher at the Massachusetts Institute of Technology (MIT) who is working on developing liquid-metal batteries for renewable energy storage. The researcher is optimistic about
  the potential of liquid-metal batteries to provide reliable energy storage for renewable energy sources, and has launched a startup company to commercialize the technology. The researcher is knowledgeable
  about the potential of liquid-metal batteries for renewable energy storage and has won a grant from New York state to develop and test a prototype battery with Con Edison, a major U.S. electric utility.
  The researcher is also interested in the competition with lithium-ion batteries and believes that liquid-metal batteries will be a better fit for large storage systems that feed the grid.
