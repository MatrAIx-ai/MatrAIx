  hobbies: '["Abstract watercolor painting", "Quilting", "Reading poetry", "Jazz, blues, and soul music listening", "Herb gardening", "Cooking traditional recipes", "Church choir participation", "Community
    art workshops", "Walking in parks", "Knitting", "Crossword puzzles"]'
  career_goals: Although retired, Marie aims to compile her memoirs and favorite family recipes into a modest booklet to share with grandchildren and the wider community. She wishes to continue mentoring
    younger members of her church and local art groups, offering workshops in quilting and storytelling. Learning new artistic mediums, such as digital painting, is a personal ambition that satisfies her
    love of novelty. Maintaining health and independence so she can travel to visit family, attend cultural events, and remain an active presence at community gatherings also ranks high among her goals.
