  career_goals: Brian aims to secure stable full‑time employment within the next year, targeting roles that leverage his hands‑on skills, such as a field service technician or entry‑level HVAC installer.
    He plans to enroll in a vocational program to earn an HVAC certification within two years, with the long‑term goal of launching his own small home‑repair business that offers reliable services to his
    community. Concurrently, he is interested in expanding his technical knowledge in IT support to keep career options flexible, while ensuring his work schedule allows quality time with his spouse and
    family.
