personas:
  professional: Brian Floyd is a hands‑on aspiring field service technician who blends his DIY carpentry, basic electrical know‑how, and self‑taught Python scripts to troubleshoot home repairs and small
    IT issues, while they maintain a pragmatic balance between curiosity and reliable schedule adherence.
  sports: Brian Floyd cycles on the nearby Patuxent Trail with the Annapolis Bike & Hike Club, hikes Shenandoah’s Skyline Drive during fall, cheers the Baltimore Orioles in baseball and the Washington Capitals
    in hockey, and they occasionally join a local adult recreational soccer league on Saturdays.
  arts: Brian Floyd immerses themselves in classic rock from The Rolling Stones and Led Zeppelin while working on renovations, unwinds with Miles Davis and John Coltrane at the Bay Blues Club, and they
    orchestrate low‑key board‑game nights featuring Settlers of Catan and Ticket to Ride for a close circle of friends.
  travel: Brian Floyd prefers self‑planned road trips, using detailed spreadsheets to map routes to destinations like Shenandoah National Park, Charleston’s historic waterfront, and Portland, Oregon for
    its micro‑brewery scene, balancing a love of nature with a modest travel budget and occasional family constraints, and they always pack a spare multi‑tool for unexpected repairs.
  culinary: Brian Floyd is an adept home cook who perfects Chesapeake Bay specialties—crab cakes seasoned with Old Bay, oyster stew with a splash of sherry, and steamed blue crabs—while harvesting basil,
    dill, and mint from their backyard garden and they frequently experiment with new recipes each weekend.
  core: Brian Floyd is a methodical hand‑yman who blends practical repairs with a curiosity for tech, a classic‑rock soundtrack, and an occasional coffee‑driven insomnia that fuels late‑night DIY projects,
    and they never miss a chance to organize their toolbox by size and frequency of use.
background:
  cultural: Brian is a white American who grew up in suburban Prince George’s County, Maryland. His upbringing reflects a blend of Mid‑Atlantic and broader American cultural traditions, with family gatherings
    centered around holidays like Thanksgiving and the Fourth of July, often featuring local Chesapeake Bay foods such as crab cakes and Old Bay seasoning. He attended local public schools and participated
    in community sports, fostering a modest sense of civic responsibility. While his immediate community is predominantly middle‑class, the proximity to Washington, D.C., exposed him to diverse cultural
    influences, though his own background remains rooted in mainstream American values that emphasize self‑reliance, family cohesion, and community service.
