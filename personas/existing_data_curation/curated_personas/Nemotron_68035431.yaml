personas:
  professional: Chad Ramos, a retired multidisciplinary artisan and community organizer, merges their methodical planning with vivid imagination to design handcrafted wooden furniture, abstract paintings,
    and folk art, while coordinating cultural workshops and preserving oral histories for their community.
  sports: Chad Ramos, an avid supporter of the Indiana Pacers and the Indianapolis Colts, enjoys playing weekly pickleball at the Bloomington Community Center, follows the Indiana State Sycamores basketball
    team, and brings a competitive edge to the senior tennis league at the local park.
  arts: Chad Ramos, an abstract painter inspired by the bold colors of their childhood landscapes, collects vintage vinyl from artists such as Inti-Illimani and Los Lobos, carves wooden figurines echoing
    Andean folklore, and draws philosophical insight from Camus and Neruda, all of which shape their eclectic creative identity.
  travel: Chad Ramos, who has already explored the Andes in Peru visiting Cusco and Machu Picchu and savors weekend trips to Brown County State Park, now plans a pilgrimage to rural Peru to reconnect with
    their ancestral community and document their crafts, balancing a limited budget with a love for immersive cultural travel.
  culinary: Chad Ramos, a competent home chef, prepares family recipes such as tamales, pachamanca, and quinoa soup using heirloom corn, Peruvian aji amarillo peppers, and fresh herbs from their garden,
    while experimenting with new spice blends and occasionally over-seasoning in enthusiastic bursts.
  core: Chad Ramos, a meticulous yet worry-prone 69-year-old, channels boundless imagination into art, community heritage work, and competitive hobbies while constantly balancing organized routines with
    bouts of skepticism and occasional indulgent splurges.
background:
  cultural: Chad’s cultural identity is a blend of Latin American and indigenous roots. His parents emigrated from the Andean highlands of Peru, where they belonged to a Quechua community that intermarried
    with mestizo families. Growing up, he heard Spanish and Quechua words, celebrated Día de los Muertos, and learned traditional weaving, music, and culinary techniques. After settling in Bloomington,
    Indiana, he integrated into the local Latino community while preserving his ancestral customs, often sharing folk stories and traditional dishes with neighbors and at community festivals.
