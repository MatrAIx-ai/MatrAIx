  career_goals: Though retired, Chad aims to leave a lasting cultural legacy. He plans to compile his family's stories and recipes into a self‑published memoir, host a weekly workshop series where seniors
    learn woodworking and folk art, and mentor local youth interested in preserving indigenous traditions. He hopes to travel to the Andean region of Peru to reconnect with his ancestral community and document
    their crafts. Maintaining his health, he aspires to stay active through daily gardening and regular art practice, while ensuring his wife’s comfort and financial security.
