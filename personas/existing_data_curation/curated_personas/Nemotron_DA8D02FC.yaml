  hobbies: '["Traditional Mexican Cooking", "Reading Historical Novels", "Crossword Puzzles", "Hiking", "Yoga", "Volunteering at Hispanic Cultural Center", "Teaching Spanish Conversation", "Community 5K
    Running", "Strategic Board Games (Settlers of Catan)"]'
  career_goals: Coralys aims to advance to a senior HR leadership role within the next five years, targeting the position of HR Manager and eventually Director of Human Resources for a mid‑size regional
    employer. She plans to earn the SHRM‑CP certification and deepen her expertise in HR analytics to drive evidence‑based workforce strategies. Her competitive drive fuels a goal to reduce employee turnover
    by 15% within two years and to launch a comprehensive employee engagement program that aligns with the company’s business objectives. Long‑term, she envisions leveraging her experience to consult for
    small businesses in the Tri‑City area, especially those serving the Hispanic community, helping them build culturally competent HR practices.
