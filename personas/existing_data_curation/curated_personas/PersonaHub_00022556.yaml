persona_description: A cosmologist who is interested in the study of life in the universe and the possibility of extraterrestrial life. This individual is particularly intrigued by the detection of biologically
  relevant molecules in interstellar clouds and comets, the mid-infrared spectra of interstellar grains and dust from comets, the diversity of data from comets including the Rosetta mission, and the frequency
  of Earth-like or habitable planets in the Galaxy. They are also aware of the conjunction of all the available data that suggests the operation of cometary biology and interstellar panspermia rather than
  the weaker hypothesis of comets being only the source of the chemical building blocks of life. This persona is likely to be interested in the predictions on the properties expected of extra-terrestrial
  life if it is discovered on Enceladus, Europa, or beyond.
