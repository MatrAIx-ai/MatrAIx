  hobbies: '[''Cycling'', ''Hiking'', ''Soccer (weekend league)'', ''Landscape photography'', ''Visiting art museums'', ''Community theater'', ''Volunteering with Habitat for Humanity'', ''Cooking'', ''Traveling'',
    ''Attending the Minnesota State Fair'']'
  career_goals: Ian aims to earn his Professional Engineer (PE) license and advance to a senior project manager or principal engineer role within the next five years. He aspires to lead large‑scale, environmentally
    responsible infrastructure projects that integrate art and community spaces, such as green bridges, parkways, and public plazas. In the longer term, he envisions founding a consulting firm focused on
    sustainable design and community‑engaged engineering, while mentoring junior engineers and championing inclusive, interdisciplinary collaboration.
