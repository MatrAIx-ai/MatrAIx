personas:
  professional: A civil engineer renowned for integrating sustainable infrastructure design with artistic concepts, Ian Johnson uses their structural analysis expertise, GIS mapping proficiency, and charismatic
    collaboration style to spearhead community‑centered projects while actively pursuing a PE license.
  sports: Ian Johnson fuels their competitive spirit by cycling with the Midwest Cycling Club, hiking the Superior Hiking Trail each summer, playing forward in a co‑ed weekend soccer league at the Minneapolis
    Sports Complex, and passionately cheering for the Minnesota Vikings, Twins, Timberwolves, and Wild.
  arts: Ian Johnson immerses themselves in the Twin Cities art scene by attending exhibitions featuring Jacob Lawrence at the Minneapolis Institute of Art, exploring contemporary installations at the Walker
    Art Center, performing in community theater productions of Sondheim’s 'Into the Woods', and curating photo series inspired by Ansel Adams, while their playlists regularly feature Bon Iver, The War on
    Drugs, and Sufjan Stevens.
  travel: Ian Johnson balances a love for culinary discovery with a pragmatic budget, planning two‑week trips that blend structured itineraries and spontaneous detours; they’ve explored Portland’s farm‑to‑table
    scene, savored Cajun cuisine in New Orleans, trekked the volcanic landscapes of Iceland while sampling Reykjavik’s street food, and dream of a springtime culinary tour through Japan’s Tokyo sushi markets
    and Kyoto’s kaiseki restaurants.
  culinary: Ian Johnson enjoys cooking hearty Midwestern fare such as pan‑seared walleye with dill butter and wild‑rice casserole, alongside experimental dishes like Korean kimchi fried rice and rosemary
    focaccia, demonstrating a solid home‑cook skill set that thrives on fresh, seasonal ingredients and occasional forays into international spice blends.
  core: Ian Johnson is a curiosity‑driven, socially energized civil engineer who fuses art with infrastructure, thrives on group adventures and creative pursuits, yet occasionally skips proper stretch routines,
    leading to stubborn lower‑back aches.
background:
  cultural: Ian grew up in the Upper Midwest, shaped by a Midwestern work ethic, community‑oriented values, and a cultural landscape that blends Scandinavian, German, and broader white American traditions
    common in Minnesota. He embraces local customs such as lake‑side recreation, the Minnesota State Fair, and a strong emphasis on civic engagement and volunteerism. His upbringing emphasized modesty,
    reliability, and a balanced respect for both tradition and innovative ideas, all of which inform his professional and personal life.
