    meals for family gatherings"]'
  career_goals: Although retired, Jung Pal remains purposeful. She wishes to compile a memoir documenting her migration story and the evolution of her family’s cultural traditions, creating a tangible legacy
    for future generations. She aspires to launch a weekly calligraphy workshop at the local senior center, fostering cross‑generational appreciation of East Asian arts. Additionally, she hopes to curate
    an annual community art exhibition featuring works by senior artists, thereby enriching Chico’s cultural landscape. Her long‑term ambition is to mentor younger volunteers in organizational skills so
    that community initiatives continue to thrive.
