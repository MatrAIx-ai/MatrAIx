personas:
  professional: James Berkley, a seasoned commercial painter with three decades of hands-on experience, now leans toward mentoring apprentices and pursuing a foreman role while preparing to launch a modest
    family-run painting business that will serve local churches and schools, and they are working toward a contractor's license.
  sports: James Berkley is a devoted fan of the Chicago Bears and the Decatur high-school football team, enjoys occasional Saturday bowling league matches, spends winter weekends hunting deer in state parks,
    and they proudly display a vintage Chicago Cubs cap while cheering on their favorite teams.
  arts: James Berkley spends evenings listening to classic rock legends like The Rolling Stones and Bruce Springsteen on their old FM receiver, attends the local community theater's productions of classic
    plays, builds wooden birdhouses inspired by folk art, and they often re-watch black-and-white movies such as 'Casablanca' and 'Gone with the Wind' with their wife.
  travel: James Berkley prefers low-budget road trips that blend outdoor adventure with family time, having driven to Shawnee National Forest for weekend hikes, to the Wisconsin Dells for a cabin stay,
    and dreaming of a summer fishing expedition in Alaska, all planned on a loose schedule and funded by careful savings, while they enjoy spontaneous detours to small-town diners along the way.
  culinary: James Berkley enjoys cooking hearty Midwestern meals such as herb-seasoned grilled trout, tomato-based spaghetti using garden-grown tomatoes, and classic meatloaf topped with mashed potatoes,
    though their cooking skill rests at the confident home-cook level, and they often add a pinch of smoked paprika for extra flavor.
  core: James Berkley blends pragmatic diligence with a relaxed approach to planning, channeling their Midwestern work ethic into community-focused painting while indulging in solitary fishing trips, backyard
    gardening, and occasional forgetfulness around paperwork, and they often smile at the small joys of daily routine.
background:
  cultural: James grew up in the working-class heart of central Illinois, where Midwestern values of hard work, modesty, and community cooperation are deeply ingrained. His family's roots trace back to
    German and Irish immigrants who settled in the Decatur area in the early 1900s, and he was raised in a Protestant (Methodist) household that emphasizes service and fellowship. The close-knit fabric
    of Decatur—its local fairs, high school sports, and church gatherings—shapes his worldview, reinforcing a pragmatic, friendly, and compassionate outlook characteristic of the regional white working-class
    culture.
attributes:
