  career_goals: Although retired, Francisco is driven to remain purposeful. He aims to mentor emerging entrepreneurs through the local Chamber of Commerce, contribute his experience as a volunteer business
    advisor for a community incubator, and document his family's migration story in a memoir that blends personal anecdotes with practical business lessons. He also aspires to maintain his health to enjoy
    weekend trips with his wife to family in Mexico and to keep exploring new technologies that can enhance his community engagements.
