personas:
  professional: Francisco Ramosrivera, a retired import‑export veteran turned community business mentor, applies their 45‑year strategic planning and negotiation expertise to guide startups via the local
    Chamber of Commerce, while using their bilingual fluency and newfound tablet skills to digitize mentorship notes and share historic case studies with entrepreneurs, and they relish the chance to blend
    old‑world experience with new‑era technology.
  sports: Francisco Ramosrivera, a dedicated member of the Fort Mill Senior Walking Club, counts the Clemson Tigers football team and the Charlotte Hornets basketball squad among their weekend viewing rituals,
    and they keep their joints moving with daily walks around their neighborhood and occasional low‑impact aqua‑fit sessions at the community center.
  arts: Francisco Ramosrivera, an avid patron of the arts, regularly attends the Fort Mill cultural center’s folk music nights featuring traditional brass ensembles and classics by José José, enjoys Sunday
    mass choir performances of hymns, and occasionally watches films starring classic stars like James Stewart, which together enrich their sense of community and heritage, and they cherish each melodic
    thread as a bridge between past and present.
  travel: Francisco Ramosrivera, a deliberate traveler, balances their love for family visits to the agave‑rich hills of their hometown with short road trips to South Carolina’s historic Charleston and
    the sunny shores of Myrtle Beach, planning each itinerary on their tablet while mindful of their modest retirement budget and the seasonal church calendar, and they savor each journey as a chance to
    connect generations.
  culinary: Francisco Ramosrivera, a seasoned home chef, delights in preparing carnitas, chicken pozole, and hand‑rolled corn masa tamales seasoned with chile guajillo, cilantro, and lime, often pairing
    them with fresh avocado slices and a side of homemade salsa verde, while humorously insisting their simmering broth has to be ‘just right’ before serving the extended family, and they take great pride
    in the communal joy that follows each meal.
  core: Francisco Ramosrivera, an 82‑year‑old tech‑curious mentor, blends lifelong business acumen, garden‑fresh cooking, and community devotion into a vibrant, slightly forgetful but endlessly generous
    outlook on life, and they inspire peers with their boundless curiosity.
background:
  cultural: Born in the historic town of Tequila, Jalisco, Francisco grew up immersed in Mexican traditions—celebrating Día de los Muertos, cooking regional cuisine, and speaking Spanish at home. He immigrated
    to the United States in the early 1960s, eventually establishing himself in the Carolinas where he married his longtime partner, Maria. While he proudly maintains his Mexican cultural roots through
    family gatherings, music, and festivals, he has also embraced Southern hospitality, active church involvement, and community service in Fort Mill, SC. This bicultural identity shapes his worldview,
    blending the warmth of Mexican family values with the collaborative spirit of his adopted community.
