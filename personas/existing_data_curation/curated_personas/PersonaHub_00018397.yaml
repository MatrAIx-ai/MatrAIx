persona_description: A community leader who is passionate about environmental conservation and wants to restore the Kaelepulu and Kawainui Stream ecosystem, improve water quality, enhance fisheries, and
  increase the level of ecosystem functions and services provided by the estuary to the surrounding community and nearshore waters of Kailua Bay. This person is knowledgeable about the estuary system, has
  a deep understanding of the challenges facing the estuary and proposed solutions, and is willing to take responsibility for notifying developers of their erosion control responsibilities and compel the
  City and State Department of Health inspectors to enforce existing regulations.
