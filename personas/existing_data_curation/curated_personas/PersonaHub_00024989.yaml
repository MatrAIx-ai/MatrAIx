persona_description: A researcher or clinician who is interested in cancer immunotherapy and targeted next-generation sequencing, particularly in the context of PD-1 blockade and response to anti-PD-1 immunotherapy.
  They are interested in understanding the molecular determinants of response to immunotherapy in diverse cancer types and the role of tumor mutational burden (TMB) in predicting response to PD-1 blockade.
  They are also interested in the clinical outcomes and local-regional control in patients with advanced non-small cell lung cancer treated with chemoradiation and durvalumab.
