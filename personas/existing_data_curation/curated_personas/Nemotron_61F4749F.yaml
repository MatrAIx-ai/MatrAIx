personas:
  professional: Jose Rivera is a high‑school esports enthusiast and budding DIY electronics hobbyist whose competitive fire and skeptical, practical mindset drive them to design custom gaming controllers
    while juggling schoolwork with a relaxed, sometimes chaotic schedule.
  sports: Jose Rivera spends weekends shooting hoops at the Kings County Youth Basketball League while cheering for the Brooklyn Nets, and after school they cruise the ramps at Coney Island Skatepark, treating
    skateboarding as both a stress‑relief outlet and a way to stay fit, despite a tendency to skip structured workouts in favor of spontaneous play.
  arts: Jose Rivera’s soundtrack for a night of gaming is a blend of Bad Bunny and J Balvin reggaeton tracks, classic salsa legends like Celia Cruz and Marc Anthony, and the pulsating rhythms of local bomba
    ensemble Los Pleneros de la 21, shaping their identity and feeding their competitive spirit during both virtual battles and real‑world skate sessions.
  travel: Jose Rivera prefers spur‑of‑the‑moment road trips over meticulously planned itineraries, having already explored San Juan’s historic Old City with their family and dreaming of attending the Tokyo
    Game Show in Japan, while also eyeing a future summer camping adventure in the Adirondacks for a break from the digital grind.
  culinary: Jose Rivera’s culinary swagger shines in the kitchen where, alongside their family, they whip up mofongo stuffed with crispy plantains, arroz con gandules seasoned with sofrito and adobo, and
    a rum‑glazed pork shoulder, proving their cooking skill is a mix of DIY confidence and a love for bold, aromatic flavors.
  core: Jose Rivera is a fiercely competitive teen who balances a love for high‑octane gaming and street skateboarding with a carefree, sometimes chaotic approach to schoolwork, budgeting, and health, often
    forgetting appointments but never missing a chance to remix a reggaeton beat while tinkering with a new controller.
background:
  cultural: Jose is a second‑generation Puerto Rican raised in Haverhill, Massachusetts. He grew up in a bilingual household where Spanish is spoken daily, and Puerto Rican traditions—such as cooking arroz
    con gandules, celebrating the Feast of St. Joseph, and dancing to bomba and plena—are woven into family life. He participates in the local Latino community, attends the annual Puerto Rican Parade in
    the Merrimack Valley, and feels a strong connection to his heritage while navigating mainstream American teenage culture.
