  career_goals: Jose aims to earn his GED and then enroll in a vocational program focused on computer networking or game development. He dreams of becoming a tech support specialist or a video game designer,
    and eventually launching his own online platform where he can stream gameplay and showcase Puerto Rican culture. In the longer term, he hopes to open a small food cart selling traditional Puerto Rican
    snacks, combining his technical skills with his culinary heritage.
