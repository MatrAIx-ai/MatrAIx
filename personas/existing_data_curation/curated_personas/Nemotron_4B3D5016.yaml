  hobbies: '[''Visiting art galleries'', ''Urban photography'', ''Playing acoustic guitar'', ''Cooking experimental recipes'', ''Hiking in Staten Island Greenbelt'', ''Volunteering at local food pantry'',
    ''Board game nights'', ''Attending live theater'', ''Participating in community art workshops'', ''Yoga and meditation'']'
  career_goals: Joel aims to translate his organizational talent and love of the arts into a part‑time role as a community arts program coordinator or cultural outreach specialist, ideally within a local
    nonprofit or municipal arts council. He plans to finish the remaining coursework of his associate degree in Arts Management, obtain a certification in nonprofit leadership, and eventually launch a small
    consulting business that helps neighborhood organizations design and promote art‑focused events. Re‑entering the workforce is also motivated by a desire for financial stability and a structured routine
    that can mitigate his stress and worry.
