personas:
  professional: C Caskey is a veteran medical secretary with 15 years of experience who blends a business education with hands‑on healthcare office expertise, deftly managing patient scheduling, insurance
    verification, and Epic/EHR systems while leveraging their curiosity for new tech to streamline workflows and mentor junior staff.
  sports: C Caskey enjoys low‑impact fitness through mindfulness walks along the Tennessee River and weekend hikes on local nature trails, supports the Tennessee Titans and the University of North Alabama
    Lions, and participates in a casual community running club called the Shoals River Runners, preferring social, seasonal activities over rigid training regimens.
  arts: C Caskey is an avid reader of historical fiction and mystery novels, favoring authors like Ken Follett and Agatha Christie, while regularly attending live blues and country shows featuring artists
    such as B.B. King and John Prine, and contributing thoughtful insights at a local book club.
  travel: C Caskey prefers spontaneous road trips that blend scenic drives through the Shoals region’s historic sites with occasional longer excursions to New Orleans, Savannah, and Asheville, planning
    loosely to accommodate family commitments and a modest travel budget.
  culinary: C Caskey experiments with Southern‑style cooking, often incorporating garden‑fresh heirloom tomatoes into shrimp and grits, fried green tomatoes, and collard greens seasoned with smoked paprika,
    while honing intermediate kitchen skills at farmers’ markets and weekend cooking workshops.
  core: C Caskey balances curiosity and practicality, juggling a flexible work ethic, garden‑to‑table meals, and spontaneous adventures while occasionally letting disorganization slip into finances and
    health routines.
background:
  cultural: Martha grew up in a close‑knit, working‑class family in the Deep South, specifically Alabama. Her upbringing reflects traditional Southern values—hospitality, resilience, and community involvement—shaped
    by church gatherings and local festivals. She identifies with the cultural heritage of the Alabama Shoals, appreciating regional music, cuisine, and the slower pace of small‑town life. Her white Southern
    background informs her interpersonal style, emphasizing courteous communication and a pragmatic, down‑to‑earth approach to both work and personal matters. While she embraces the comfort of her roots,
    her business education and professional experience have broadened her perspective beyond regional norms.
