  hobbies: '["Gardening", "Southern cooking and recipe experimentation", "Reading historical fiction and mystery novels", "Book club participation", "DIY home‑automation projects", "Attending live blues
    and country music events", "Hiking and exploring nature trails", "Mindfulness walking along the Tennessee River"]'
  career_goals: She aims to earn a Certified Medical Administrative Assistant credential and advance into a supervisory role as a clinic office manager within the next three years. Long‑term, Martha envisions
    overseeing multiple practice sites as a health services manager or consultant, applying her business background to improve patient flow, integrate digital health tools, and mentor junior staff. She
    also hopes to pursue part‑time coursework toward an MBA in healthcare management to broaden her strategic leadership capabilities, while maintaining the flexibility that fits her balanced lifestyle.
