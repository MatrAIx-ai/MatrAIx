  hobbies: '[''Volleyball league'', ''Hiking in Cache Valley'', ''Salsa and bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Community tutoring'', ''Listening to reggaeton and pop music'', ''Attending
    local concerts'']'
  career_goals: Estefany aims to advance within the customer experience field, targeting a team lead or supervisory role within the next two to three years. She plans to complete her associate’s degree
    in Business Administration, then pursue a bachelor’s in Marketing or Human Resources to broaden her qualifications. Long‑term, she envisions moving into a managerial position where she can mentor new
    representatives, design service‑improvement initiatives, and shape client‑experience strategies for a regional or national operation. She also expresses interest in leveraging her bilingual abilities
    to work in international account management or support for Latin American markets.
