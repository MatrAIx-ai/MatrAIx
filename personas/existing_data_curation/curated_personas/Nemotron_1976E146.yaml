personas:
  professional: Estefany Duque excels as a bilingual customer experience representative, leveraging their strong interpersonal communication, CRM expertise in Zendesk and Salesforce, and a practical, organized
    approach to consistently meet performance metrics while flexibly handling unpredictable call volumes.
  sports: Estefany Duque is a competitive member of the Logan co‑ed volleyball league, a regular hiker with the Cache Valley Hiking Association who organizes weekend treks in the Wasatch Range, and a devoted
    fan of the Utah Jazz and Real Salt Lake, often timing game viewings around their active schedule.
  arts: Estefany Duque embraces Latin dance, attending weekly salsa and bachata classes while vibing to reggaeton hits from Bad Bunny and J Balvin and contemporary pop anthems by Ariana Grande, and they
    eagerly anticipate live concerts at the Maverik Center featuring artists like Rosalia and Daddy Yankee.
  travel: Estefany Duque prefers group‑oriented weekend getaways, having hiked the scenic trails of Park City and relaxed on Maui's beaches, while dreaming of immersive dance retreats in Barcelona and cultural
    tours of Cartagena, all planned within a student budget that balances adventure with affordability.
  culinary: Estefany Duque delights in cooking traditional Puerto Rican dishes such as mofongo and arroz con gandules, skillfully blending plantains, pork, and sofrito, while also experimenting with contemporary
    twists like quinoa‑filled empanadas and enjoying casual outings for poke bowls and artisanal tacos.
  core: Estefany Duque is a structured social butterfly who juggles call‑center metrics, salsa steps, and weekend hikes, driven by a love for organized chaos and occasionally derailed by a coffee addiction
    that fuels late‑night study sessions.
background:
  cultural: Estefany was raised in a Puerto Rican household where Spanish was spoken daily and family gatherings centered around food, music, and storytelling. Her parents emphasized the importance of hard
    work, education, and maintaining cultural traditions, such as celebrating Three Kings’ Day and preparing festive dishes like lechón. Growing up in the United States and later relocating to Logan, UT,
    she blends the warmth of Puerto Rican communal values with the pragmatic, community‑oriented culture of the Intermountain West. This bicultural perspective shapes her identity, encouraging her to stay
    connected to her heritage through language, cuisine, and dance while also embracing the outdoor lifestyle and close‑knit community values of her Utah surroundings.
attributes:
