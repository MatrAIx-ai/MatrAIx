personas:
  professional: An 18‑year‑old computational art enthusiast, Gina Whitworth merges Python‑driven machine‑learning pipelines with generative visual design, leveraging their strong quantitative skills and
    love for solitary, abstract problem‑solving to craft AI‑powered art prototypes while navigating a habit of relaxed deadlines.
  sports: A solitary fitness hobbyist, Gina Whitworth enjoys night‑time runs under the Texas sky and casual yoga sessions, follows the Dallas Mavericks for basketball and the Houston Astros for baseball,
    and belongs to a small local astronomy‑themed hiking group that meets monthly.
  arts: A digital visual alchemist, Gina Whitworth draws inspiration from generative artist Refik Anadol, ambient composer Brian Eno, and sci‑fi author Ted Chiang, spending evenings crafting algorithmic
    paintings in Photoshop while listening to modular synth experiments on Ableton.
  travel: An introverted explorer, Gina Whitworth plans low‑key trips to dark‑sky sites like the Atacama Desert in Chile and Big Bend National Park, favoring solo stargazing over crowded tourist itineraries
    and keeping a modest travel budget constrained by student loans.
  culinary: A self‑taught experimental cook, Gina Whitworth loves concocting spicy chicken‑taco bowls with chipotle aioli and experimenting with matcha‑infused cheesecake, often ordering fresh avocados
    and black garlic from local farmers’ markets to fuel late‑night coding marathons.
  core: Gina Whitworth is an imaginative 18‑year‑old coder who fuses art and AI, wrestles with anxiety, and thrives on solitary, late‑night creativity while occasionally letting disorganization spill into
    their schedule.
background:
  cultural: Gina grew up in the close‑knit, rural community of Quitman, Texas, where independence and self‑reliance are core values. Her family emphasized education, encouraging her early entry into college
    and fostering a love for both the sciences and the arts. While the region leans traditionally conservative, her household embraced curiosity and intellectual freedom, allowing her to explore unconventional
    academic paths. This blend of Southern hospitality, small‑town modesty, and a supportive, intellectually open environment shaped her appreciation for solitude, flexibility, and creative autonomy.
attributes:
  skills: '[''Python programming'', ''R data analysis'', ''Statistical modeling'', ''Machine learning algorithm design'', ''Data visualization'', ''Arduino prototyping'', ''Raspberry Pi hardware integration'',
