  hobbies: '[''Digital painting'', ''Generative art creation'', ''Science‑fiction reading'', ''Philosophy exploration'', ''Stargazing'', ''Mindfulness meditation'', ''Logic puzzles'', ''3D‑printed sculpture
    tinkering'', ''Ambient music composition'']'
  career_goals: Gina envisions a career that fuses technology and creativity. She aims to pursue a Ph.D. in computational neuroscience or artificial intelligence, focusing on how generative algorithms can
    simulate artistic processes. In the short term, she plans to secure a remote research internship or freelance data‑science contracts that allow flexible, solitary work environments. Ultimately, she
    hopes to launch a boutique consultancy that creates AI‑driven visual experiences for independent artists and small‑scale tech startups, prioritizing autonomy, intellectual novelty, and a work‑life balance
    that mitigates her tendency toward stress and worry.
