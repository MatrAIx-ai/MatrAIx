  career_goals: Robbie aspires to turn his love for art and technology into a future career that merges creativity with interactive experiences. In the short term, he plans to build a strong portfolio of
    drawings, digital paintings, and small coding projects, attend local art workshops, and join his middle-school robotics club to deepen his technical skills. His long-term ambition is to enroll in a
    specialized high-school program focused on visual arts and computer science, then pursue a degree in game design, interactive media, or digital storytelling. He hopes to create video games or educational
    applications that encourage curiosity, empathy, and artistic expression in others.
