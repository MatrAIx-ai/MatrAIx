personas:
  professional: Robbie Pitre is a budding robotics enthusiast and indie narrative game prototype creator, merging their sketching talent, love of sci‑fi storytelling, and hands‑on LEGO building to design
    interactive systems for the school’s robotics club.
  sports: Robbie Pitre enjoys biking the forest trails around Seattle, hikes the Snoqualmie region on weekends, follows the Seattle Seahawks and Seattle Sounders FC, and participates in the local youth
    mountain‑bike club where they practice trail skills and occasional trail runs.
  arts: Robbie Pitre channels their imagination into sketching vibrant sci‑fi landscapes, painting mixed‑media pieces inspired by Hayao Miyazaki, reading graphic novels like "Saga", listening to indie acts
    such as Tame Impala and Phoebe Bridgers, and capturing candid nature photos with a smartphone to edit into short clips for friends.
  travel: Robbie Pitre spends summer weekends exploring Olympic National Park, dreams of visiting Kyoto to soak up cherry‑blossom vistas and anime culture, and plans a future family road‑trip along the
    Pacific Coast Highway to collect shoreline sketches.
  culinary: Robbie Pitre favors homemade ramen bowls with miso broth, crunchy avocado toast, and experimental smoothies featuring frozen berries and spinach, while occasionally attempting to bake brownies
    that turn out a little undercooked when they get distracted by a new game release.
  core: Robbie Pitre is a quietly curious 13‑year‑old who balances a love of art, robotics, and indie music with a penchant for hoarding spare change, occasional forgetfulness about skin care, and endless
    day‑dreams of sketching futuristic worlds.
background:
  cultural: Robbie was raised in Lynnwood, a suburban community in Snohomish County, Washington, within a middle-class family that values education, creativity, and community involvement. His family’s ancestry
    traces back to French-Canadian and Anglo-American roots, reflected in occasional family traditions such as bilingual holiday greetings and a fondness for storytelling. The Pacific Northwest’s lush forests,
    rainy climate, and proximity to Seattle’s vibrant arts and tech scenes have shaped his worldview, fostering a respect for nature and an interest in innovative technology. He regularly visits the local
    library, community art center, and neighborhood parks, and participates in school events that celebrate cultural diversity. These experiences blend a modest suburban American upbringing with the region’s
    emphasis on environmental stewardship and creative expression.
