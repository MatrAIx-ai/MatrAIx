persona_description: A researcher or developer who is interested in the integration of virtual worlds and language learning, particularly in Second Life (SL) as a platform for language teaching and the
  use of SL for promoting conversational interactions. This person is likely to be familiar with theories of second language acquisition, especially those related to Task Based Language Teaching and the
  Interaction Hypothesis. They are interested in designing and implementing an interactive task space (AITS) in SL that incorporates SLA theories and is controllable, and are looking for ways to evaluate
  its effectiveness in promoting language learning.
