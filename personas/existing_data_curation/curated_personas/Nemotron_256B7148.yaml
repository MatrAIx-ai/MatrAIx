personas:
  professional: An emerging technophile, Ricardo Alberto merges their love for robotics with their talent for digital illustration, designing Arduino‑controlled light‑up comic panels while juggling school
    projects and weekend soccer matches.
  sports: Ricardo Alberto kicks off after‑school soccer matches at the Roswell community park with the local youth league, supporting New Mexico United in the USL Championship and training as a midfielder
    for the Roswell Rovers club, all while swapping tactical ideas with friends during halftime.
  arts: Ricardo Alberto channels their curiosity into comic creation, drawing vibrant superheroes on a tablet inspired by Alan Moore and Junji Ito, while their acoustic guitar sessions reinterpret mariachi
    melodies with rock riffs reminiscent of Carlos Santana's electric phrasing.
  travel: Ricardo Alberto loves weekend explorations of White Sands National Park and day trips to the historic town of Santa Fe, documenting desert sunsets with their DSLR, dreaming of a future road trip
    to the Grand Canyon, yet they often overpack snacks and gadgets, balancing a tight travel budget with their family's car‑sharing schedule.
  culinary: Ricardo Alberto delights in baking pan de muerto for Día de los Muertos, crafts guacamole with ripe Hass avocados, lime, cilantro, and toasted pepitas, and experiments with spiced taco al pastor
    fillings, although they sometimes over‑salt their salsa when eager to share with friends.
  core: Ricardo Alberto is a curious, socially energetic teen who blends art, tech, music, and tradition into a lively daily rhythm, occasionally juggling homework procrastination with a passion for desert
    adventures.
background:
  cultural: Ricardo was raised in a Mexican‑American household in Roswell, New Mexico. At home, Spanish is spoken alongside English, and he grew up with Mexican traditions such as Día de los Muertos, Semana
    Santa, and festive foods like tamales and pozole. His family blends these customs with the broader New Mexican cultural mosaic, which includes Native American and frontier influences. Roswell's unique
    identity—known for its UFO lore and desert environment—also shapes his interests in space and folklore. Ricardo's bicultural upbringing gives him a strong sense of identity, and he often shares stories,
    music, and recipes from his heritage with friends at school and in community events.
