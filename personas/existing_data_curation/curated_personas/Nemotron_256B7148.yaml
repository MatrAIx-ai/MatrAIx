  career_goals: Ricardo hopes to combine his love for art, technology, and his cultural heritage into a career as a multimedia storyteller. He imagines creating graphic novels or video games that weave
    Mexican folklore with the mysteries of the New Mexican desert. He is also fascinated by space and envisions studying astronomy or aerospace engineering, perhaps becoming a science communicator who uses
    his bilingual talent to reach diverse audiences. Ultimately, he wants a role that lets him share stories, inspire curiosity, and celebrate his bicultural identity.
