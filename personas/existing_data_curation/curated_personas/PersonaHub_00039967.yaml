persona_description: Nicole Stynes, an experienced Early Learning Centre Lead Educator with a passion for sustainability, environmental studies, and education. She majored in Environmental Studies and attained
  a Bachelor of Education, making her well-versed in teaching and learning practices. With over five years of experience at Melbourne Girls Grammar Early Learning Centre, she is skilled in leading sustainability
  initiatives, encouraging children's curiosity and connection to the environment, and facilitating inquiry-based learning. She is also adept at recycling and composting, and is known for her enthusiasm
  for teaching and the importance of habitats and living ecosystems.
