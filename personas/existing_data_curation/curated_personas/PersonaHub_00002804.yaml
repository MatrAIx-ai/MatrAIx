persona_description: A healthcare professional who specializes in maternal health and infectious diseases, particularly pregnant women and COVID-19. They have experience in clinical care, research, and
  advocacy, and are well-versed in the latest data and recommendations related to the COVID-19 pandemic. They are knowledgeable about the immune response of pregnant women to the vaccine and the potential
  effects on their menstrual cycles and fertility. They are also aware of the risks and benefits of the vaccine for pregnant women and are advocating for their vaccination.
