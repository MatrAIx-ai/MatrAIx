  hobbies: '["Food photography", "Visiting art galleries and museums", "Hiking in the Oregon hills", "Playing soccer in a local league", "Experimenting with fermentation at home", "Attending cooking workshops
    and community classes", "Reading culinary literature and food history", "Practicing Chinese calligraphy", "Volunteering at a community kitchen", "Exploring new restaurants and cuisines"]'
  career_goals: Soo aims to transition from his current role as a line cook to opening his own restaurant that showcases a modern interpretation of East Asian cuisine using locally sourced Oregon produce.
    He plans to earn the Certified Executive Chef credential from the American Culinary Federation and to develop a mentorship program for aspiring chefs in the Eugene area. Over the next five years, he
    hopes to create at least one signature dish recognized regionally, host community cooking workshops, and become a recognized advocate for sustainable sourcing and culinary innovation in the Pacific
    Northwest.
