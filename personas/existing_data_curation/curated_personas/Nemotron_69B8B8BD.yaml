personas:
  professional: Thomas Bo, an aspiring young robotics enthusiast, combines a knack for methodical problem‑solving with a vivid imagination, channeling their love for LEGO Technic and Minecraft into building
    functional prototypes for their after‑school robotics club.
  sports: Thomas Bo, a dedicated swimmer at the community pool and avid cyclist on Palm Bay’s park trails, cheers for the Miami Marlins and follows the Tampa Bay Lightning, balancing a competitive edge
    in swim meets with casual weekend backyard baseball games with friends.
  arts: Thomas Bo, a comic‑book aficionado who sketches superhero mash‑ups on a tablet, devours graphic novels by Frank Miller and enjoys the energetic tunes of Imagine Dragons and the whimsical animations
    of Pixar, letting these influences shape their vivid storytelling.
  travel: Thomas Bo loves weekend trips to nearby Cocoa Beach for stargazing and tide‑pooling, dreams of touring the Kennedy Space Center’s launch pads, and hopes to experience New York City’s Times Square
    lights before middle school ends.
  culinary: Thomas Bo favors cheesy pizza, chicken nuggets, and a surprising love for fish tacos, often experimenting with adding pineapple chunks to pizza for a sweet twist, and looks forward to sipping
    homemade egg‑nog during the Christmas celebrations.
  core: Thomas Bo is a methodical, curiosity‑driven ten‑year‑old who juggles LEGO engineering, comic‑book art, and a competitive streak, yet can’t resist sneaking extra screen time after bedtime.
background:
  cultural: Thomas grows up in a middle-class, white family in Palm Bay, Florida, an area shaped by its proximity to the Atlantic coast and the Kennedy Space Center. His heritage includes Irish and German
    roots, celebrated with family traditions like St. Patrick's Day and Christmas egg-nog. The local culture emphasizes outdoor activities—beach outings, fishing trips, and community sports—while the regional
    emphasis on space exploration fuels his fascination with rockets and astronomy. He attends a public elementary school where multicultural events are common, giving him exposure to the diverse Hispanic
    and Caribbean communities in Brevard County. His family participates in a local church youth group, fostering a sense of community service and modest American values.
