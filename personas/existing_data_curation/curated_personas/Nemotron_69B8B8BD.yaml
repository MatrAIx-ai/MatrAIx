  career_goals: Thomas dreams of becoming an astronaut-engineer who designs spacecraft and creates visual art for missions. He aspires to win science fairs with innovative projects that blend robotics and
    digital illustration, to develop his own educational video game, and eventually attend a university known for aerospace engineering. His short-term goals include earning the top spot in his school's
    robotics competition and mastering intermediate Python to build his own simulations.
