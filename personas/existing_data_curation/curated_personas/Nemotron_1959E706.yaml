  career_goals: Although retired from formal employment, Ana remains driven to contribute to her community. She hopes to launch a bilingual literacy workshop for seniors and their grandchildren at the local
    community center, mentor emerging teachers on culturally responsive pedagogy, advocate for greater mental‑health resources for older adults, document and share her family’s oral histories in a modest
    memoir, and continue expanding her digital fluency so she can stay connected with family and support virtual community initiatives.
