  career_goals: Even at six, Mounir dreams big. He imagines becoming an astronaut who travels to distant planets and then shares his experiences through vivid drawings and stories. He also envisions a future
    as an artist who paints the worlds he discovers and as a scientist who solves nature's mysteries. Though his ambitions are still playful, he already wishes to help others understand complex ideas in
    simple, caring ways, perhaps one day as a teacher or storyteller who inspires curiosity in other children.
