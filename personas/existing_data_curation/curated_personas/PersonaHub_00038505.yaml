persona_description: A literary critic who is interested in the relationship between religious and literary devotion, particularly in the works of Philip Sidney and the biblical Psalms. They are knowledgeable
  about the historical context of Sidney's work and the literary traditions of the English Renaissance, and have a keen interest in the poetics of voice and personification in poetry. They are also familiar
  with the commentarial tradition that emphasizes the power of poetic personae in conveying religious and literary devotion.
