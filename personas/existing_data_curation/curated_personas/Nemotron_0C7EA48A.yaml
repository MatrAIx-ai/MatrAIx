personas:
  professional: Ashley Roark, an aspiring digital world‑builder, merges a love for Minecraft architecture with a budding talent for illustration, using sketchbooks to design game concepts while managing
    schoolwork with a methodical schedule, and their innate curiosity fuels experimentation with simple coding on Scratch.
  sports: Ashley Roark, a coastal‑area youth, spends summer mornings at the community swim club, plays midfield for a local U‑12 soccer team that cheers for the San Diego Wave FC, and enjoys weekend beach
    volleyball with friends while proudly wearing a Los Angeles Lakers cap, embodying an active yet relaxed approach to fitness.
  arts: Ashley Roark immerses themselves in the arts by sketching characters inspired by Hayao Miyazaki and J.K. Rowling, paints watercolor seascapes at community workshops led by a muralist who emphasizes
    collaborative creation, and frequently listens to the orchestral scores of Hans Zimmer and the indie folk of Hozier while crafting fan‑fiction stories, reflecting a highly imaginative and socially considerate
    artistic life.
  travel: Ashley Roark loves planning trips with a map‑sticker journal, has explored the Outer Banks’ dunes and the marshes of the Everglades, dreams of snorkeling the Great Barrier Reef and hiking Iceland’s
    basalt fields, and prefers family‑oriented itineraries that blend adventure with quiet beachcombing, all while budgeting their allowance for travel souvenirs.
  culinary: Ashley Roark enjoys a palate that balances comfort food like cheesy macaroni and fish tacos with adventurous bites such as sushi rolls featuring cucumber and avocado, can whip up a 'Creeper'
    shaped green frosting cookie with the help of online tutorials, and eagerly experiments with ingredients like dragon fruit and seaweed snacks, showcasing a moderate cooking skill set and a curiosity
    for diverse flavors.
  core: Ashley Roark, an 11‑year‑old dreamer, builds intricate LEGO kingdoms, sketches fantastical creatures, and balances disciplined allowance budgeting with an insatiable curiosity for the natural world
    and creative storytelling.
background:
  cultural: Ashley grows up in Bluffton, a historic coastal town in South Carolina’s lowcountry. The community values Southern hospitality, close family ties, and a deep appreciation for the natural environment.
    Local traditions such as church gatherings, community festivals, and fresh seafood meals are part of her everyday life. The town’s vibrant arts scene, with galleries, public murals, and youth art classes,
    nurtures her creative side, while easy access to beaches, marshes, and historic sites fuels her curiosity about nature and local history.
