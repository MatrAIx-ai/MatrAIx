  career_goals: Ashley dreams of turning her vivid imagination into a future career where she can both create and explore. She hopes to become an illustrator or graphic novelist who brings her stories to
    life, and she is also fascinated by marine life, so she imagines studying marine biology or environmental science to draw and explain the ocean’s wonders. In the short term, she wants to build a strong
    portfolio of artwork, learn more coding to make interactive stories, and attend a summer art camp or a science program.
