  hobbies: '[''fishing'', ''hiking'', ''car maintenance and modification'', ''reading technology and mechanics books'', ''playing strategy video games'', ''listening to soul and hip hop music'', ''woodworking'',
    ''attending church gatherings'', ''small‑group basketball'']'
  career_goals: Tevin aims to move from laborer to a supervisory position within the next three years, targeting a shift‑lead or warehouse manager role. He plans to earn a Certified Warehouse Manager (CWM)
    credential and obtain a Commercial Driver’s License so he can transition into independent freight driving or logistics consulting. Ultimately, he wants a stable, higher‑paying position that lets him
    save for homeownership and potentially start a side business offering local material‑moving services.
