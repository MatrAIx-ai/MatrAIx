personas:
  professional: Tommi Bonner, an aspiring LEGO architect and budding game developer, combines methodical planning with boundless curiosity, using step‑by‑step instructions and creative improvisation to
    design intricate builds and simple Scratch animations that showcase their practical problem‑solving and collaborative spirit.
  sports: Tommi Bonner, a dedicated member of the Beaverton Youth Soccer Club, loves playing forward on Saturdays, cheering for the Portland Timbers, and spends autumn weekends exploring the Springwater
    Trail for a casual jog, balancing competitive play with a love for nature.
  arts: Tommi Bonner enjoys piano practice, favoring pieces by Ludwig van Beethoven and contemporary composer Yiruma, while also devouring adventure novels by Jules Verne and sci‑fi series by Rick Riordan,
    and collecting LEGO art kits that blend tactile creativity with storytelling.
  travel: Tommi Bonner dreams of a weekend road trip to Cannon Beach to build sandcastles and collect tide‑pool shells, while also cherishing day‑long hikes in Tualatin Hills Nature Park and planning a
    future family vacation to Washington D.C. to see historic monuments after finishing their next LEGO set.
  culinary: Tommi Bonner’s favorite meals include pepperoni pizza with extra cheese, homemade mac‑and‑cheese with hidden broccoli florets, and strawberry‑banana smoothies, and they love helping in the kitchen
    by measuring flour for pancakes and carefully arranging fruit on a plate.
  core: Tommi Bonner is a methodical, curiosity‑driven eight‑year‑old who balances organized LEGO building, soccer, and piano practice with a disciplined allowance plan and a meticulous approach to health
    and hobbies.
background:
  cultural: Tommi grew up in Beaverton, Oregon, a suburb of Portland known for its blend of suburban life and easy access to the Pacific Northwest’s forests, rivers, and parks. His family emphasizes a balanced,
    pragmatic approach to life—valuing education, independence, and a close relationship with nature. Weekend outings to places like Forest Park and the Columbia River Gorge fostered his love for outdoor
    exploration, while his school’s strong focus on STEM programs and project‑based learning nurtured his curiosity and practicality. Community events often highlight environmental stewardship and collaborative
    projects, shaping Tommi’s cooperative yet assertive personality and his desire to contribute meaningfully to both technology and the natural world.
