  career_goals: Tommi dreams of becoming a robotics or mechanical engineer who designs practical machines that help people and protect the environment. He is also interested in exploring careers in environmental
    science or wildlife conservation, hoping to combine his curiosity about nature with his knack for building and problem solving. He envisions himself contributing to community projects that blend technology
    with sustainability.
