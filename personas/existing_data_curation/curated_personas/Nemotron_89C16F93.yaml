personas:
  professional: Mae Hampton, a community arts program manager, blends methodical grant‑writing expertise with vivid, imaginative storytelling to design data‑driven initiatives that honor local folk traditions
    while introducing contemporary art, and they maintain a reserved yet assertive leadership style that unites small‑group stakeholders across government, nonprofits, and artists.
  sports: Mae Hampton enjoys low‑impact fitness through weekend hikes with the Henry County Trailblazers, spring bird‑watching outings at Red River Gorge, and a weekly senior bowling league, and they cheer
    for the University of Kentucky Wildcats basketball team while watching the Kentucky Derby each May to stay socially connected to local sporting culture.
  arts: Mae Hampton channels her love for watercolors, poetry, and Appalachian folk storytelling into community mural projects, and they draw inspiration from the lyrical ballads of Gillian Welch, the serene
    canvases of Andrew Wyeth, the evocative verses of Ocean Vuong, and the dramatic narratives of Tennessee Williams, all of which shape her curatorial eye.
  travel: Mae Hampton plans meticulously curated cultural getaways that blend art festivals with nature, such as a summer immersion in Asheville’s River Arts District, a fall weekend exploring the historic
    streets of Siena, and a spring pilgrimage to the Scottish Highlands to trace Celtic folk roots, while always budgeting for a modest road‑trip to local historic sites like the Henry County Courthouse,
    and they cherish the quiet moments of sketching landscapes on a train.
  culinary: Mae Hampton, an adept home cook, often reinvents classic Southern fare by simmering smoked pork shoulder with bourbon‑glazed sweet potatoes, tossing black‑eyed peas with fresh collard greens,
    and finishing dishes with thyme and sage, while they occasionally indulge in a fine‑dining tasting menu featuring seared scallops with beurre blanc for inspiration.
  core: Mae Hampton is a quietly ambitious arts steward who balances modest, community‑first values with a restless imagination, though they can’t resist impulsively buying premium art supplies after every
    successful grant cycle.
background:
  cultural: Mae grew up in a small town in Kentucky, where community hospitality, modesty, and a strong sense of self‑reliance were deeply ingrained. Her family’s roots extend into the Appalachian region,
    giving her an appreciation for regional folk music, crafts, and storytelling traditions. Although she pursued a graduate degree in arts and humanities outside the South, she maintains a close connection
    to her Southern heritage, blending it with a broader curiosity cultivated through travel, reading, and academic study. Her cultural outlook balances respect for local customs with an eagerness to introduce
    novel artistic ideas, fostering inclusive programming that honors the past while encouraging contemporary expression.
attributes:
