  hobbies: '[''Watercolor Painting'', ''Poetry Writing'', ''Reading Contemporary Fiction'', ''Local History Research'', ''Birdwatching'', ''Hiking'', ''Photography'', ''Yoga'', ''Cooking'', ''Community
    Mural Volunteering'']'
  career_goals: Mae aspires to transition into a senior leadership position as the director of a regional arts council, where she can shape policy and secure sustainable funding for community arts initiatives.
    She dreams of establishing a locally owned arts center that offers interdisciplinary programs, artist residencies, and educational workshops, preserving the cultural heritage of Henry County while introducing
    innovative artistic perspectives. In the longer term, she hopes to mentor emerging arts administrators, publish a memoir reflecting on her career in cultural management, and eventually serve as a consultant
    helping other small communities develop vibrant arts ecosystems.
