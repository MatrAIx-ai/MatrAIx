  hobbies: '["Gardening", "Watercolor Painting", "Bird‑watching", "Reading Historical Fiction and Biographies", "Attending Small Art Exhibits", "Listening to Jazz", "Participating in a Small Book Club",
    "Fishing Trips"]'
  career_goals: Even in retirement, Andrew aims to keep his mind active and his contributions meaningful. He plans to volunteer as a mentor for younger artisans at the local community center, help digitize
    and curate historical photographs for the Brunswick Historical Society, and develop a small oral‑history project documenting the memories of his peers. He also hopes to master a new watercolor technique
    each year, learn a few classic jazz standards on the piano, and continue fostering harmony within his small social circles by organizing low‑key gatherings that celebrate art, music, and regional cuisine.
