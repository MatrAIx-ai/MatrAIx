persona_description: A Marxist economist who specializes in the study of capitalism and its historical limits, particularly in Luxemburg's work "The Accumulation of Capital" and her later work "The Accumulation
  of Capital - An Anti-Critique". She is known for her methodological improvements in economic analysis and her contributions to economic methodology and theory. Her analysis of accumulation can be applied
  to countries with non-capitalist production systems and can enrich the analysis of economic relations between the developed and developing countries.
