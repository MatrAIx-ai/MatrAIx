  hobbies: '[''Group Fitness Classes'', ''Hiking'', ''STEM Mentorship Volunteering'', ''Cooking and Hosting Dinner Parties'', ''Reading Fiction'', ''Local Theater'', ''Travel Photography'']'
  career_goals: Danielle aims to advance to a senior leadership position such as Director of Operations or Vice President of Operations within a mid‑size technology or manufacturing firm in the Baltimore–Washington
    corridor. In this role, she plans to lead large‑scale transformation initiatives, embed sustainability practices, and champion employee well‑being programs. She also aspires to mentor emerging women
    leaders, spearhead diversity and inclusion efforts, and eventually transition into strategic consulting focused on operational excellence for nonprofit organizations.
