personas:
  professional: Marilyn Keane, an 85‑year‑old community historian and sustainable‑gardening mentor, blends meticulous budgeting skills with a quiet curiosity, channeling decades of farm‑house management
    into preserving family stories, curating a local genealogy archive, and guiding neighbors through low‑maintenance garden practices.
  sports: Marilyn Keane enjoys low‑impact exercise, joining a senior walking club that circles the local park each morning, follows the Tennessee Volunteers football team on Saturdays, and participates
    in a weekly bowling league at the community recreation center, while keeping an eye on the local high‑school baseball games for her grandchildren.
  arts: Marilyn Keane spends evenings listening to classic country legends like Johnny Cash and Dolly Row, gospel greats such as Mahalia Jackson, and reads historical fiction by authors like Margaret Mitchell,
    finding inspiration for her quilting patterns and garden design.
  travel: Marilyn Keane prefers relaxed, purposeful trips, having toured the Blue Ridge Parkway and the Great Smoky Mountains National Park with her garden club, and she dreams of a gentle river cruise
    along the Mississippi to explore family roots while staying within a modest budget.
  culinary: Marilyn Keane excels at cooking from scratch, regularly preparing Southern staples like buttermilk biscuits, fried chicken, collard greens simmered with smoked ham hocks, and homemade peach
    preserves, and she delights in swapping recipes for heirloom tomato jam while gifting her famous cornbread to church gatherings.
  core: Marilyn Keane, an 85‑year‑old archivist and garden sage, balances quiet curiosity with steadfast routine, occasionally binge‑solving crossword puzzles late into the night, and never says no to a
    fresh batch of biscuits, even when the kitchen smells like dust.
background:
  cultural: Marilyn is a white Southern American rooted in the rural traditions of Maury County, Tennessee. Growing up on a modest farm, she internalized values of hospitality, self‑reliance, and strong
    community ties, often centered around church and family gatherings. While she respects long‑standing Southern customs—such as cooking from scratch and preserving family recipes—her lifelong curiosity
    has led her to embrace new ideas, especially in genealogy and sustainable gardening, blending heritage with thoughtful innovation.
