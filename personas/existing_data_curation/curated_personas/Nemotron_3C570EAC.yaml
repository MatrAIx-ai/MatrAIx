    communication", "Training new EMTs"]'
  hobbies: '["Gardening", "Baking", "Jogging", "Yoga", "Crossword puzzles", "Reading medical journals", "Reading self‑help books", "Volunteering at health fairs", "Church volunteer fire‑safety committee",
    "Listening to country/folk music", "Watching procedural medical dramas"]'
  career_goals: Mary aims to become a certified Paramedic within the next two years, pursued through additional coursework and hands‑on training. She plans to obtain Advanced Cardiac Life Support (ACLS)
    and Pediatric Advanced Life Support (PALS) certifications to expand her clinical capabilities. In the longer term, she aspires to a supervisory role such as Field Training Officer or EMS Supervisor
    for Walworth County, where she can develop training programs and improve emergency response protocols. She also considers earning a bachelor's degree in Emergency Management or Health Administration
    to transition into a leadership or disaster‑preparedness position, while maintaining a balanced schedule that allows time for self‑care.
