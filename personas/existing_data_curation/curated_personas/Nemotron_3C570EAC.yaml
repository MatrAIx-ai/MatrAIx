personas:
  professional: Mary Lee, a 24‑year‑old certified Emergency Medical Technician, combines meticulous patient assessment, precise medical documentation, and disciplined route planning with a methodical, routine‑driven
    work style that makes them the go‑to liaison for dispatch and a reliable trainer for new EMTs, all while quietly chasing paramedic certification and future supervisory leadership in Walworth County.
  sports: Mary Lee jogs with the Walworth Trail Runners on weekend mornings, and they attend weekly yoga at Lakeview Yoga Studio, they root for the Milwaukee Brewers and Green Bay Packers, and they occasionally
    join community fire‑safety drills that double as functional fitness sessions.
  arts: Mary Lee unwinds to classic country and folk legends like Johnny Cash, Dolly Parton, and Gillian Welch while binge‑watching procedural medical dramas such as Grey's Anatomy and ER, and they fill
    crossword‑puzzle evenings with clues inspired by their favorite NYT puzzles.
  travel: Mary Lee prefers structured weekend getaways, having explored Door County, Wisconsin, the Upper Peninsula of Michigan, and Nashville's music scene, and they dream of hiking New Zealand's South
    Island and tracing folk‑song heritage in the Scottish Highlands once their paramedic schedule stabilizes.
  culinary: Mary Lee excels at baking sourdough loaf and apple‑cinnamon rolls using heritage rye flour and garden‑fresh thyme, crafts herb focaccia with basil from their own plot, and they balance these
    creations with rustic roasted beet salads and comforting chicken pot pie for family meals.
  core: Mary Lee is a routine‑loving EMT who channels anxiety into a disciplined blend of gardening, baking, and volunteer firefighting, yet they occasionally trade their meticulous schedule for late‑night
    crossword marathons and a secret stash of sugary pastries that they indulge in guilt‑free.
background:
  cultural: Mary grew up in Walworth, a small, predominantly white, Midwestern community in Wisconsin, with deep roots in German‑Scandinavian farming families. Her upbringing was shaped by traditional Protestant
    values, a strong sense of community, and an emphasis on practicality and hard work. Family gatherings, local county fairs, and church events reinforced a culture of self‑reliance and mutual assistance.
    The rural landscape and close‑knit social fabric have instilled in her a respect for routine, an appreciation for nature, and a commitment to serving her hometown through reliable, hands‑on work.
attributes:
  skills: '["Patient assessment", "Basic life support (BLS)", "Cardiopulmonary resuscitation (CPR)", "Trauma triage", "Emergency medical equipment operation", "Medical documentation", "Ambulance navigation
