  career_goals: Tomas aspires to combine his love for animals with his practical problem‑solving mindset by becoming a veterinarian who designs better animal‑care tools. He also dreams of studying engineering
    to create innovative solutions for farm and pet health. In the short term, he aims to attend a high‑school STEM program, earn science and math recognitions, and volunteer at the local animal shelter
    to build experience. Ultimately, he hopes to pursue a college degree in veterinary medicine or mechanical engineering and later lead community outreach programs that teach kids about science and animal
    welfare.
