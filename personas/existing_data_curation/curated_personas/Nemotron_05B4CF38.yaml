personas:
  professional: Tomas Plaster, a 13‑year‑old coding enthusiast, blends his curiosity for game design with a methodical habit of documenting each Scratch project, positioning himself as a budding programmer
    who treats every bug as a puzzle to solve and enjoys showcasing his creations to friends.
  sports: Tomas Plaster dominates the neighborhood basketball court and captains his middle school soccer team, follows the Los Angeles Lakers and MLS’s LAFC for inspiration, and belongs to the community
    club Future Stars FC where he schedules regular drills, seeing each practice as both a social gathering and a chance to stay organized and fit.
  arts: Tomas Plaster devours fantasy series like Harry Potter and Percy Jackson, strums acoustic renditions of Ed Sheeran’s hits on his guitar, and sketches comic strips in the style of Alan Moore to process
    his emotions, often sharing his work during youth group gatherings.
  travel: Tomas Plaster loves weekend road trips to nearby state parks and has visited Washington, D.C., where he toured the National Air and Space Museum, while dreaming of a family vacation to the Harry
    Potter Studio Tour in London and an adventurous summer camp in New Zealand’s Hobbiton region.
  culinary: Tomas Plaster enjoys building his own pepperoni pizza with extra mozzarella, whipping up easy banana‑bread muffins, and experimenting with taco night using seasoned ground beef and fresh cilantro,
    yet habitually forgets to finish his vegetables, claiming they’re ‘just a side note.’
  core: Tomas Plaster is a sociable, organized teen who channels his boundless curiosity into coding, LEGO building, and comic art while navigating intense anxiety with a steadfast love for team sports
    and fantasy worlds.
background:
  cultural: Tomas grew up in Sedgwick, a small town in central Kansas, within a white, German‑American family that values hard work, community, and modesty. The town’s Midwestern culture emphasizes neighborliness,
    participation in local events such as the county fair, and a close connection to agriculture, which is reflected in his involvement with 4‑H. At the same time, his school provides a modern STEM environment
    that nurtures his curiosity about technology. He attends a public middle school, participates in his church’s youth group, and is encouraged by family and teachers to balance traditional values with
    innovative pursuits.
