    managing time under stress'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Sketching fabric designs'', ''DIY upcycling of clothing'', ''Yoga and mindfulness meditation'', ''Hiking local New England trails'', ''Listening
    to indie music at coffee shops'', ''Reading contemporary fiction'', ''Experimenting with fusion cooking'']'
  career_goals: Lisa aims to transition from press operation to a role that blends her technical knowledge with her artistic curiosity, such as a textile design assistant or a production coordinator for
    a sustainable fashion line. She plans to enroll in evening courses on apparel design and textile science to broaden her skill set. In the longer term, she hopes to launch a small eco‑friendly clothing
    brand that incorporates upcycled fabrics, allowing her to exercise creative freedom while maintaining a flexible work schedule that accommodates her need for stress‑relief and personal time.
