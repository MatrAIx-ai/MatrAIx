persona_description: A senior economist at the World Bank who specializes in analyzing the economic prospects and challenges of African countries, particularly those with resource-rich economies. She has
  a deep understanding of the "resource curse" and the challenges faced by countries with abundant natural resources in ensuring that the benefits of growth are shared equitably among the population. She
  is particularly interested in the potential of natural resources to fuel economic growth and development, but also in the risks and challenges associated with relying on natural resources for economic
  development. She is also knowledgeable about the global economy and its impact on African countries, and is constantly monitoring developments to ensure that the World Bank's policies and programs are
  aligned with the needs and priorities of African countries.
