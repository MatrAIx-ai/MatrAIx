personas:
  professional: Renan Torres, an enthusiastic 10‑year‑old STEM club member, channels curiosity and practical discipline into building complex LEGO Technic machines, coding Scratch mini‑games, and leading
    organized neighborhood scavenger hunts, while they effortlessly command attention with a confident, talkative presence.
  sports: Renan Torres, a dedicated youth basketball player with the local Junior Tigers club, spends after‑school drills perfecting dribbling while cheering for the NBA’s Boston Celtics and using salsa
    practice as a fun cardio routine, balancing disciplined training with a love for spontaneous street games with friends, and they often organize pickup games after school.
  arts: Renan Torres, an avid collector of adventure graphic novels like Kazu Kibuishi’s Amulet and Jeff Smith’s Bone, relishes listening to salsa legends such as Celia Cruz while mastering the steps taught
    by family, and they love sharing these performances during school assemblies, blending comic‑book imagination with rhythmic movement.
  travel: Renan Torres, who prefers family‑planned trips that mix hands‑on science stops like the Smithsonian’s National Air and Space Museum with the excitement of amusement parks, cherishes past visits
    to the local coastal boardwalk and dreams of exploring Barcelona’s interactive CosmoCaixa museum, and they keep a scrapbook of ticket stubs as a personal travel log.
  culinary: Renan Torres, a budding junior chef, enjoys mastering the aromatic balance of arroz con gandules—tossing pigeon peas, sofrito, and annatto‑stained rice under the watchful eye of grandparents—while
    occasionally over‑seasoning their experimental pizza crusts and delighting the family with their enthusiastic, albeit messy, kitchen dance, and they laugh at the flour clouds that fill the kitchen.
  core: Renan Torres blends razor‑sharp curiosity with a charismatic, talkative nature, turning every LEGO build or neighborhood hunt into a staged performance, yet sometimes forgets to finish a Scratch
    game before they launch into the next project.
background:
  cultural: Renan’s family originates from San Juan, Puerto Rico, and they preserve vibrant cultural traditions while living in Howell, NJ. Raised bilingual, he speaks Spanish at home and English at school,
    and celebrates holidays such as Día de los Santos and the Puerto Rican Day Parade in nearby New York. Family gatherings are filled with salsa and bomba music, storytelling about the island’s history,
    and shared meals of arroz con gandules, lechón, and flan. These experiences foster a strong sense of identity, pride in his heritage, and a commitment to sharing Puerto Rican culture with classmates
    through school presentations and community events.
