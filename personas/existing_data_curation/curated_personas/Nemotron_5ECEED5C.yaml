  career_goals: Renan envisions a future where his love for science, technology, and community intersect. He aspires to become a robotics engineer who designs affordable, educational kits for schools, especially
    those serving under‑represented groups. He also hopes to serve as a bilingual mentor, encouraging other kids to explore STEM while celebrating their cultural roots. Long‑term, Renan sees himself leading
    community outreach programs that host tech workshops and cultural festivals, bridging his Puerto Rican heritage with a passion for innovation.
