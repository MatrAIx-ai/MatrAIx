personas:
  professional: Lavera Heilig, a 27‑year‑old elementary and middle‑school teacher, blends her curiosity for the arts with tech‑savvy lesson design, using differentiated instruction and project‑based STEAM
    units while maintaining a relaxed, improvisational classroom management style that encourages student competition and peer collaboration.
  sports: Lavera Heilig, an avid hiker and casual cyclist living in the Pacific Northwest, cheers for the Portland Trail Blazers and Timbers, participates in the Portland Outdoor Club’s weekend mountain‑bike
    rides, and joins a community center’s summer pick‑up basketball league to stay active.
  arts: Lavera Heilig, a regular at Portland’s contemporary galleries, draws inspiration from the street art of Banksy, the vivid colors of Frida Kahlo’s paintings, and the inventive scripts of Sarah Jones,
    while she also enjoys improv nights with The Improv Collective and playlists ranging from Tame Impala to Beethoven’s Ninth.
  travel: Lavera Heilig, who balances a love for spontaneous weekend getaways with a modest budget, has backpacked the Canadian Rockies, explored Kyoto’s historic temples, and dreams of a road trip down
    California’s Highway 1, planning routes on shared Google Maps but leaving room for unplanned detours.
  culinary: Lavera Heilig, a moderately skilled home cook, loves crafting spicy Thai green curry with lemongrass and coconut milk, perfecting sourdough bread using local whole‑grain flour, and experimenting
    with fig‑goat cheese tarts, though she occasionally burns the edges of a quinoa‑crusted salmon when juggling multiple kitchen projects.
  core: Lavera Heilig is a curiosity‑driven, socially energetic educator who fuses art and technology in teaching, lives on a flexible budget that sometimes slips, balances health with occasional lapses,
    and channels competitive spirit into both classroom innovation and weekend adventures.
background:
  cultural: Lavera is a white American who grew up in the suburban‑rural environs of Chester County, Pennsylvania. Her family heritage includes German roots reflected in her surname, and she was raised
    with an appreciation for the region's blend of historic traditions and progressive educational values. The local community’s emphasis on school involvement, community events, and a strong work‑life
    balance has shaped her collaborative yet individually driven outlook.
