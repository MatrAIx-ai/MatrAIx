  career_goals: Lavera aims to deepen her expertise by pursuing a master's degree in curriculum and instruction with a focus on STEAM integration. She envisions moving into a lead teacher or curriculum
    specialist role within her district, where she can champion innovative, art‑infused teaching models. Long‑term, she aspires to a district‑level position such as Instructional Coach or Assistant Principal,
    and eventually to launch an educational consultancy that helps schools adopt flexible, student‑centered learning frameworks.
