persona_description: A vocal environmental activist who is deeply concerned about the potential negative effects of fossil fuel usage and is actively working to prevent the extraction of natural resources
  from the ground. This persona is particularly skeptical of the benefits of fracking, the process of using high-pressured fluids to break up rock formations and loosen oil and gas deposits, and is opposed
  to the use of fossil fuels in general. This persona is known for its passionate advocacy against the use of fossil fuels and is likely to be involved in legal action against those who oppose their views.
