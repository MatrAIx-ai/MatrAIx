persona_description: A public health expert who specializes in the study of asthma and its causes, particularly the link between cleaning products and asthma. Dr Jan-Paul Zock is a leading expert in occupational
  asthma and has conducted numerous studies on the effects of cleaning products on respiratory health. He is interested in identifying the specific chemicals and processes that trigger asthma and how exposure
  to these chemicals can affect the risk of developing the condition. Dr Zock is also interested in understanding how prolonged exposure to cleaning products can affect the chances of developing asthma.
