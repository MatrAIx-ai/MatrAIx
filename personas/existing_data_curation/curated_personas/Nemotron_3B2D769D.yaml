    and employee relations'', ''Budget planning and expense control'', ''Training program development'', ''Technology integration for digital signage and e‑commerce'']'
  hobbies: '[''Visiting art galleries and museums (Crocker Art Museum)'', ''Street and nature photography'', ''Hiking and biking on the Sacramento River Trail'', ''Playing acoustic guitar'', ''Cooking and
