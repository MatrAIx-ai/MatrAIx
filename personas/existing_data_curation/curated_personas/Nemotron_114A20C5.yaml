  career_goals: Although retired from formal employment, Kaitlyn aims to deepen her leadership role in the Howard City community. She plans to chair the annual fall festival planning committee, mentor younger
    volunteers at the senior center, author a memoir that weaves her family’s genealogy with local Michigan history, and obtain a certification in senior caregiving to support other widows. Additionally,
    she hopes to expand her involvement with the Newaygo County Historical Society and launch a quarterly newsletter that highlights local stories and resources.
