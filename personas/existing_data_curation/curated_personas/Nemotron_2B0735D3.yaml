  hobbies: '["Local soccer league","Hiking in nearby state parks","Metal sculpting and custom knife making","DIY furniture building","Motorcycle maintenance and customization","Participating in competitive
    welding contests","Attending welding trade shows and maker meetups","Playing electric guitar","Competitive online gaming (FPS and strategy)","Volunteering at community events"]'
  career_goals: Nathan aims to become a certified welding inspector (CWI) within the next two years and pursue AWS Certified Welding Engineer credentials. He is competitive in regional welding contests
    and seeks recognition as a top welder in the Carolinas. Over the next five years, he plans to advance to a foreman or lead welder position, managing a crew on large‑scale projects such as bridge constructions
    or aerospace component fabrication. Ultimately, Nathan aspires to open his own custom metal‑fabrication shop that blends functional engineering with artistic metalwork, leveraging his curiosity for
    innovative techniques and his practical industry experience.
