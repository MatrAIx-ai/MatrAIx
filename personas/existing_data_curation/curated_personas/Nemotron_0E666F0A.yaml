  career_goals: Nathan dreams of becoming a charismatic television presenter or digital content creator who can blend his love for storytelling, improvisation, and community engagement. He aspires to compete
    professionally in esports, aiming to channel his competitive drive into a career that entertains and informs his peers. Additionally, he envisions a future where he could serve as a youth tour guide
    or local historian, sharing the history and culture of Washington, D.C. while maintaining a flexible, creative work environment.
