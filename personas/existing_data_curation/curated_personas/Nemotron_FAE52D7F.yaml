personas:
  professional: Bette Desalvo, a retired community storyteller‑organizer, leverages decades of volunteer leadership, gardening know‑how, and crafting expertise to curate senior‑center events, collect oral
    histories, mentor younger volunteers, and now pilots virtual storytelling sessions, all while balancing meticulous planning with an adaptable, curious spirit.
  sports: Bette Desalvo enjoys low‑impact fitness through morning walks on the Madera County trail network, weekly senior dancing classes, and cheering on the Los Angeles Dodgers, Sacramento Kings, and
    San Jose Earthquakes, while also participating in the local Madera Walking Club’s weekend strolls.
  arts: Bette Desalvo frequents the Madera County Historical Museum’s rotating exhibits, especially drawn to watercolor pieces by local artist Marcia L. Hill, savors live folk performances at the county
    fair by John Gorka and Ketch Secor of Old Crow Medicine Show, and is currently enrolled in a community‑college watercolor course that fuels their own creative expression.
  travel: Bette Desalvo prefers organized, senior‑friendly trips, having toured Yosemite National Park on a guided bus, taken a comfortable train ride to San Francisco’s Fisherman’s Wharf, and dreaming
    of a day‑long excursion to the coastal town of Carmel, always selecting destinations with accessible terrain and sharing travel costs with fellow volunteers.
  culinary: Bette Desalvo’s kitchen showcases family recipes like heirloom tomato basil pasta, rosemary‑roasted chicken, and sweet‑potato sage strata, seasoned with garden‑fresh basil, garlic, and locally
    harvested zucchini, while they experiment with a Californian twist by adding avocado salsa to classic meatball sauce and baking a fig‑and‑honey galette for community potlucks.
  core: Bette Desalvo blends a lifelong devotion to community storytelling, gardening, and quilting with a curious, organized yet flexible nature, turning every senior‑center gathering into a vibrant tapestry
    of shared history and friendship.
background:
  cultural: Bette was born in 1936 to an Italian‑American family that settled in the Central Valley during the early 20th century. Raised in a Catholic household, she grew up with traditional Italian meals,
    holiday celebrations, and the Italian language spoken at home. Living in Madera, she was also steeped in the agricultural rhythms of California’s farm communities and developed a friendly rapport with
    Spanish‑speaking neighbors, sharing picnics and community festivals. Her cultural identity blends the warmth of Italian family customs with the broader American ethos of self‑reliance, community service,
    and appreciation for the arts, reflecting the diverse tapestry of mid‑century California.
