  career_goals: Although retired, Bette aims to leave a lasting legacy by documenting the stories of long‑time Madera residents and compiling them into a community memoir. She hopes to mentor younger volunteers
    at the senior center, teaching them how to organize inclusive events and preserve local history. Bette also aspires to learn watercolor painting, attend a short art‑history course at the nearby community
    college, and improve her digital literacy so she can host virtual story‑telling sessions for grandchildren and friends.
