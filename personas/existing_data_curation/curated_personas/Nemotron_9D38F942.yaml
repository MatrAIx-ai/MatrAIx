    Midwestern recipes'', ''Volunteering at historical society'', ''Leading senior dance group'']'
  career_goals: Although retired, Melissa seeks to deepen her involvement in the local arts scene, mentor younger volunteers at the senior center, and compile a memoir of her family's Midwestern heritage.
    She aspires to lead a weekly art appreciation class, contribute articles to the community newspaper, and support initiatives that preserve local history.
