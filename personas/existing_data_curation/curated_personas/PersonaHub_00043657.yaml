persona_description: A scientist or environmental manager who is interested in applying ecological and biological monitoring methods to water resource management. They are looking for an index or tool that
  can effectively assess the health and integrity of fish assemblages in different regions and identify areas of concern or opportunity for management. They are familiar with the concept of biotic integrity
  and are interested in adapting existing monitoring tools to their specific application. They are looking for a tool that can be used to establish tolerance rankings, score criteria, and adjust for gradient
  differences in streams of similar size. They are interested in applying the IBI index to water resource management in various regions, including those with low species richness, and are open to modifications
  to accommodate regional differences in fish distribution and assemblage structure and function.
