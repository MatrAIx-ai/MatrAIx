  career_goals: Kay imagines a future where she can combine her caring personality with a structured, practical role. She dreams of becoming a teacher or a pediatric nurse, professions that let her help
    others, provide clear routines, and foster a harmonious environment. Occasionally she mentions a love for animals and the idea of being a veterinarian, but she gravitates toward careers that involve
    predictable schedules and direct, positive impact on people's lives.
