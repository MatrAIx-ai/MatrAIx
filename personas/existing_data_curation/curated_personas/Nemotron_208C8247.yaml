  career_goals: Denise aims to step into a regional sales director role within the next three years, overseeing a multi‑state territory and expanding her company’s market share in the Southeast. She is
    passionate about building a formal mentorship program for women in sales, hoping to guide the next generation of leaders. Long‑term, she envisions launching her own boutique consulting firm focused
    on helping small businesses in rural Tennessee adopt modern sales technologies and stress‑reduction practices. Balancing ambition with personal well‑being, she also seeks to create a work structure
    that gives her more flexibility to manage family responsibilities and reduce chronic stress.
