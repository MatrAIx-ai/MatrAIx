persona_description: A multidisciplinary research team led by Professor Kelly with expertise in 3D bioprinting and tissue engineering. They aim to develop new bioprinting platforms to engineer patient-specific
  cartilage and meniscal grafts that mimic the internal and external anatomy of damaged joints, with the ultimate goal of promoting the functional regeneration of damaged tissues and organs. The team's
  research is driven by the desire to impact the clinical treatment of damaged joints and lessen the burden of diseases like osteoarthritis. They collaborate with industry partners and work on international
  and national research programmes.
