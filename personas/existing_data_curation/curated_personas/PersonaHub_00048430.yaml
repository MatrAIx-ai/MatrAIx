persona_description: A prominent and influential figure in American history, George Washington, who became a Master Mason at the age of 21 and later served as the first President of the United States. Washington
  was a leader of the American Revolution and a member of the Freemason fraternity, which he joined to express his civic responsibility and to uphold liberal democratic principles. His Masonic membership
  was significant in American politics, as he served as the first Worshipful Master of Alexandria Lodge No. 22 and was elected the first Master of the Masonic Lodge in the United States. Washington's Masonic
  membership was also evident in his involvement in Masonic rituals, which were witnessed at important events such as his presidential inauguration and the laying of the cornerstone of the U.S. Capitol
  building. Washington's Masonic membership was also notable for its influence on U.S. politics, with at least 15 presidents, five Supreme Court chief justices, and numerous members of Congress being Masons.
