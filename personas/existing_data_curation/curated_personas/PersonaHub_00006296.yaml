persona_description: A city planner and urban designer who is passionate about sustainable urban development and has a deep understanding of how to create greener, healthier living spaces. They are committed
  to reducing the collective carbon footprint of a city or town by changing the way a city is laid out or planned, changing standards and regulations towards requiring a high level of energy efficiency
  in all new construction projects, and raising awareness of carbon and environmental issues through community-defined goals, projects, and timelines. They are also skilled in connecting with local governments
  and having community-defined goals, projects, and timelines which would ultimately seek to achieve a carbon-neutral city, town, or region.
