personas:
  professional: An emerging young coder, Sarah Meetze, transforms her love for mystery novels and scientific curiosity into structured Scratch projects, designing interactive story‑games that they test
    with their soccer teammates while keeping a tidy code notebook that satisfies their need for predictability.
  sports: An active team player, Sarah Meetze stars as a forward for the Beaumont Youth Soccer Association, swims laps at the community pool to stay fit, and they cheer for the Dallas Cowboys on Friday
    nights while also following the Houston Astros during baseball season.
  arts: Culturally tuned, Sarah Meetze loves sketching local wildlife after trips to the wetlands, draws inspiration from John James Audubon’s bird illustrations, enjoys listening to the zydeco band BeauSoleil
    at community festivals, and they relax with mystery novels by Agatha Christie while occasionally watching cooking shows hosted by Rachael Ray for culinary inspiration.
  travel: Travel‑curious, Sarah Meetze has explored Galveston's historic waterfront and spent a weekend in New Orleans discovering the French Quarter’s music scene, and they now dream of a family road trip
    to Big Bend National Park and a future Disney World vacation, balancing their excitement with the practical need to save allowance for travel.
  culinary: Culinary‑enthusiastic, Sarah Meetze enjoys mixing ingredients for sweet tea and gumbo during family barbecues, bakes chocolate chip cookies for neighborhood gatherings, can confidently prepare
    shrimp étouffée with Cajun spices, and they rate their cooking skill as intermediate while still learning to perfect the perfect roux.
  core: Sarah Meetze blends structured curiosity with Southern community spirit, juggling code, soccer, and cookie‑baking while they navigate teen quirks like bedtime procrastination and occasional candy
    splurges.
background:
  cultural: Sarah was raised in a white, middle‑class family in Beaumont, Texas, a city on the Gulf Coast that blends Southern hospitality with the cultural rhythms of the oil‑and‑petrochemical industry.
    Her family values community, church attendance on Sundays, and family gatherings that often feature typical Texas barbecues, seafood dishes like gumbo, and local sweet tea. Growing up near the Louisiana
    border, she’s familiar with Cajun influences, occasional zydeco music at festivals, and the region’s love for high‑school football on Friday nights. The proximity to the coast gives her opportunities
    to explore wetlands, seashell collecting, and birdwatching, which have shaped her appreciation for the natural environment. These regional traditions and the emphasis on hard work and practical skills
    have informed her outlook and aspirations.
attributes:
  skills: '[''Reading comprehension and analysis'', ''Pre-algebra math (linear equations, fractions, decimals)'', ''Digital literacy (Google Docs, Slides, Scratch programming)'', ''Time management and planner
    organization'', ''Team collaboration and leadership in school projects'', ''Basic pet-care and first-aid knowledge'']'
  hobbies: '[''Reading mystery and science books'', ''Drawing and sketching animals'', ''Playing soccer with the school team'', ''Swimming at the community pool'', ''Coding simple interactive stories in
    Scratch'', ''Birdwatching at local wetlands'']'
  career_goals: Sarah’s immediate goal is to keep her grades high, especially in science and math, and to earn a spot in her school’s Science Club where she can work on hands‑on projects. She plans to spend
    afternoons volunteering at the local animal shelter, learning basic animal handling and first‑aid skills. In the next few years she hopes to attend a summer veterinary‑tech program and secure a mentor
    from a nearby vet clinic. Her long‑term ambition is to earn a scholarship to a university with a strong pre‑veterinary track, complete a Doctor of Veterinary Medicine program, and eventually open a
    small clinic that also offers community education on pet health and wildlife conservation.
