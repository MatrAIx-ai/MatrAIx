  career_goals: Richard aims to transition from employee to owner‑operator, founding a boutique electrical contracting firm that emphasizes sustainable energy solutions and artistic lighting installations
    for homes and boutique businesses. Over the next five years he plans to obtain his journeyman electrician license, complete certification in solar PV installation (NABCEP), and pursue coursework in
    sustainable design and smart‑home integration. He hopes to lead a small team, mentor apprentices, and eventually expand into consulting on renewable energy retrofits for historic desert properties.
