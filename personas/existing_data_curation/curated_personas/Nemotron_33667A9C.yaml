  career_goals: Fabian aims to advance from his current role into store management within the next two to three years, seeking a position that offers clear structure, defined performance metrics, and the
    opportunity to implement efficient operational procedures. He is motivated to develop a reputation as a reliable leader who can mentor junior staff and streamline processes to improve profitability.
    In the longer term, Fabian dreams of opening a small boutique that blends contemporary retail trends with Caribbean‑inspired products, leveraging his cultural heritage and business experience to create
    a niche market. To support these ambitions, he plans to enroll in part‑time business management courses at a community college.
