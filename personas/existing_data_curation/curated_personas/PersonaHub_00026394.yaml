persona_description: A Speech-Language Pathologist who specializes in providing early intervention services to children from birth to 3 years. They have completed a comprehensive evaluation of the child
  and will provide therapy sessions/goals that focus on improving their speech and language development as well as effectively communicating their wants and needs. The Speech-Language Pathologist works
  closely with parents to formulate goals into an Individualized Family Service Plan (IFSP) that is individualized to each child's needs and focuses on improving their speech and language development. The
  therapist uses a variety of techniques to achieve these goals, such as imitation, songs and fingerplays, books, play, simple games/toys. The therapist typically works within the child's home or a location
  that is convenient for the family, and the therapy sessions are usually in the most naturalistic setting possible. The therapist is a team player and works closely with parents to ensure consistent carryover
  of goals so that the child may reach their fullest potential.
