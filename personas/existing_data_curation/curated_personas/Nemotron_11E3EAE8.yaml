personas:
  professional: Alicia Harnage, a 12-year-old budding community organizer, channels their love for structure and teamwork into school projects and local service, leading the library’s reading club and coordinating
    the garden initiative with reliable attention to detail.
  sports: Alicia Harnage is a forward on the Warrensburg Youth Soccer Club, drills daily with the local team, cheers for St. Louis City SC during the MLS season, and idolizes Megan Rapinoe’s teamwork on
    the field, balancing structured practice with spontaneous scrimmages, and they thrive on the predictable rhythm of drills.
  arts: Alicia Harnage spends afternoons at the Warrensburg Public Library devouring Nancy Drew mysteries, composes short stories for school contests, practices piano pieces by Ludwig van Beethoven and
    modern tunes by Taylor Swift, and crafts friendship bracelets to share with friends, and they find comfort in the structured creativity of each activity.
  travel: Alicia Harnage prefers day trips planned with parents, revisiting the St. Louis Zoo and the Kansas City Science City, while dreaming of a family vacation to London’s Harry Potter Studios and the
    Eiffel Tower, balancing budget constraints with a craving for new stories, and they relish the anticipation of each new destination.
  culinary: Alicia Harnage favors classic kid comforts like mac and cheese and peanut-butter-jelly sandwiches, delights in making chocolate-chip cookies and fruit smoothies with fresh strawberries, and
    occasionally experiments with simple pasta dishes seasoned with basil and parmesan, and they often invite friends over to share their culinary creations.
  core: Alicia Harnage is a structure-loving, socially vibrant 12-year-old who balances soccer drills, library mysteries, and crafty kindness, all while juggling a modest allowance, mild allergies, and
    a penchant for Sunday-morning piano practice.
background:
  cultural: Alicia was raised in Warrensburg, Missouri, a midsized Midwestern town where community ties and local traditions play a central role. Her family places a high value on reliability, mutual respect,
    and involvement in neighborhood events such as the county fair, church gatherings, and volunteer clean‑up days. Growing up in a predominantly white, middle‑class environment, she has been exposed to
    the region’s emphasis on education, modesty, and a steady, predictable lifestyle, which has shaped her preference for structure and her cooperative outlook. She often celebrates regional holidays like
    Independence Day with barbecues and fireworks, and she enjoys seasonal activities like pumpkin picking in the fall and hiking in the nearby rolling hills.
