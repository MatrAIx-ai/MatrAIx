  career_goals: Alicia envisions a future where she can combine her love for community and her knack for organization in a helping profession. In the short term, she aims to become class president and lead
    student‑led service projects at her middle school. Long‑term, she aspires to study education or social work, with the goal of becoming a middle‑school teacher or youth program coordinator who creates
    supportive, well‑structured learning environments for children. She also dreams of volunteering for local nonprofit initiatives, such as the town’s annual fair and neighborhood clean‑up efforts.
