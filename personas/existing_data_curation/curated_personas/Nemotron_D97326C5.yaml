personas:
  professional: Ran Shakya, a 25‑year‑old heavy‑vehicle and mobile‑equipment service technician in Queens, combines methodical diesel diagnostics, welding expertise, and a competitive drive to streamline
    fleet maintenance while relentlessly pursuing ASE and EPA certifications to eventually lead a field‑service team.
  sports: Ran Shakya spends Saturdays shooting hoops at the Queens Community Center and evenings joining pickup soccer games, proudly roots for the New York Knicks and New York City FC, and maintains a
    personal fitness regimen that includes jogging in Flushing Meadows after work.
  arts: Ran Shakya finds artistic release in building Arduino light shows while listening to A.R. Rahman's soundtracks and occasional jazz from Miles Davis, frequently attends local Diwali cultural performances
    at the Queens Library, and draws inspiration from street murals in Jackson Heights for his custom motorcycle designs.
  travel: Ran Shakya enjoys weekend motorcycle rides along the Hudson Valley, dreams of a cross‑country road trip to the Pacific Coast Highway, has already explored the bustling streets of Bangkok and the
    historic sites of Istanbul, and plans to combine travel with volunteer work at immigrant shelters in major U.S. cities.
  culinary: Ran Shakya experiments with homemade butter chicken, fragrant biryani featuring basmati rice and saffron, and spicy chaat, while also mastering New York‑style pizza slices topped with pepperoni,
    often spicing his dishes with fresh cilantro, ginger, and garam masala.
  core: Ran Shakya is a methodical, competitive technician who balances a love for diesel engines, street‑wise social life, and a relentless curiosity that fuels both his side business and his nightly motorcycle
    tinkering.
background:
  cultural: Ran is a second‑generation South Asian American, raised in the vibrant multicultural environment of Queens. He grew up in a household where English coexists with Hindi (and occasional Gujarati),
    and family traditions like celebrating Diwali, Holi, and community festivals are central to his identity. The blend of his parents' work ethic—valuing practical skills and educational achievement—with
    the diverse neighborhoods of East Elmhurst has shaped his respect for manual trades and his drive to succeed competitively. He maintains close ties to the local South Asian community, participates in
    cultural events, and balances those traditions with a distinctly New York social life.
attributes:
  skills: '["diesel engine diagnostics","hydraulic system repair","pneumatic system maintenance","preventative maintenance scheduling","technical manual interpretation","diagnostic software (Paladin, WABCO)","welding
    and basic machining","OSHA and EPA compliance","inventory management","tablet‑based service logging","troubleshooting and root‑cause analysis","hybrid‑drive and telematics diagnostics"]'
  hobbies: '["basketball","pickup soccer","cooking South Asian cuisine","experimenting with fusion recipes","motorcycle tinkering","Arduino and small‑electronics projects","automotive documentaries","racing
    video games","volunteering at immigrant assistance programs","jogging in Queens parks","hiking in nearby nature trails"]'
  career_goals: Ran aims to become a lead technician and eventually a field service manager for a major construction or municipal fleet, overseeing a team of mechanics and driving efficiency initiatives.
    He plans to earn ASE Heavy‑Duty Diesel certification, an EPA emissions compliance credential, and a fleet‑management certification. Over the next five years, he hopes to launch a side business offering
    mobile repair services for small‑scale contractors, leveraging his competitive edge to become the top‑rated provider in Queens. Ultimately, he aspires to mentor junior technicians, contribute to safety‑first
    culture, and possibly pursue an associate degree in diesel technology to broaden his technical leadership opportunities.
