  career_goals: Wayne aims to advance to a regional or district management position within the next five years, where he can implement standardized training programs and best‑practice operational frameworks
    across multiple stores. He aspires to become a mentor for emerging retail supervisors, championing employee development and workplace harmony. Long‑term, he envisions launching a consultancy that helps
    independent retailers adopt data‑driven, employee‑centric strategies while also championing community outreach initiatives tied to corporate social responsibility.
