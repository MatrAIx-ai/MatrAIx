personas:
  professional: Wayne Gomory, a seasoned retail supervisor with a knack for data‑driven inventory optimization and process streamlining, leverages his practical, structured mindset and natural sociability
    to lead harmonious store teams while championing employee development and community outreach.
  sports: Wayne Gomory plays weekend golf at the Oakland Hills Country Club, follows the Detroit Tigers and Lions with steadfast loyalty, joins a local senior soccer league as an occasional midfielder,
    and balances his fitness routine with morning walks and occasional pick‑up basketball at the community center.
  arts: Wayne Gomory’s evenings often feature classic rock playlists ranging from Led Zeppelin to The Rolling Stones, while he frequently attends Detroit Symphony Orchestra concerts and regional art festivals,
    drawing inspiration for his own DIY Arduino light installations and hearty family dinners.
  travel: Wayne Gomory prefers well‑planned road trips that combine family visits to familiar Midwestern towns with occasional pilgrimages to cultural hotspots such as New York City and Chicago, and dreams
    of a culinary tour of Tuscany and a summer escape to Acadia National Park, balancing his love for convenience with a craving for new experiences.
  culinary: Wayne Gomory, a confident home cook, delights in preparing hearty dishes like slow‑roasted herb‑crusted pork loin, creamy chicken pot pie with a flaky crust, and classic mac & cheese, often
    seasoning with garlic, rosemary, and smoked paprika while pairing meals with a robust Michigan craft IPA.
  core: Wayne Gomory blends Midwestern pragmatism with tireless sociability, juggling community leadership, data‑driven retail strategy, and a relentless habit of late‑night Arduino tinkering that often
    leaves the garage a maze of wires.
background:
  cultural: Wayne grew up in the suburban Detroit area, embodying Midwestern values of practicality, hard work, and neighborly friendliness. His family background includes several engineers and educators,
    reinforcing a respect for education and technical expertise. He celebrates traditional American holidays—Thanksgiving, Fourth of July, and Christmas—with a focus on family and community gatherings.
    The diverse population of Oakland County has given him a broad cultural awareness, while his white Midwestern upbringing contributes to a communication style that is straightforward, courteous, and
    inclusive.
