  hobbies: '[''Sailing on Lake Michigan'', ''Hiking coastal dunes'', ''Landscape photography'', ''Yoga'', ''Arduino/Raspberry Pi tinkering'', ''Reading historical fiction'', ''Community garden volunteering'',
    ''Board game nights'', ''Attending the Tulip Festival'', ''Baking seasonal treats'']'
  career_goals: Brandi aims to become a senior title examiner and eventually a team lead within a regional title agency. She plans to earn the Certified Title Examiner (CTE) credential and to integrate
    advanced data analytics and machine‑learning tools into the title search workflow to increase efficiency and reduce errors. Over the next five years she hopes to spearhead a digital transformation project
    that standardizes automated abstracting processes across her office. In the longer term she envisions launching her own boutique title consultancy that leverages cloud‑based platforms and offers flexible,
    tech‑driven services to small‑scale developers, while also mentoring new examiners and contributing to professional associations such as the American Land Title Association.
