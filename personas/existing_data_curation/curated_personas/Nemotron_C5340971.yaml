personas:
  professional: Brandi Wade is an analytical title examiner whose meticulous research of property records, Python‑driven automation scripts, and GIS mapping skills are balanced by a relaxed, sometimes disorganized
    work style that values flexibility and collaborative problem‑solving, while they assertively lead data‑analytics initiatives to modernize their agency’s workflow.
  sports: Brandi Wade is a weekend sailor on Lake Michigan, a regular hiker of the Holland dunes, and a yoga enthusiast who supports the Grand Rapids Griffins and Detroit Tigers, they prefer low‑key, nature‑based
    fitness over structured gym routines while they occasionally join a local sailing club race.
  arts: Brandi Wade captures sunrise landscapes with a DSLR, they immerse themselves in early‑American historical fiction by authors like James Alexander, enjoy folk music from The Lumineers and Molly Tuttle,
    and spend board game nights playing Catan, weaving visual, literary, and musical inspirations into their creative identity.
  travel: Brandi Wade prefers flexible, budget‑conscious trips that blend adventure and relaxation, they’ve kayaked the coastal waters of British Columbia, hiked the Rocky Mountains in Colorado, explored
    the tulip fields of Haarlem, and dream of a sustainable eco‑tour of New Zealand’s South Island, often booking last‑minute to capture spontaneous moments.
  culinary: Brandi Wade loves farm‑to‑table cuisine, they frequently cook perch fillets with lemon‑dill butter, beet and kale salads topped with locally crafted Gouda, and an occasional apple crisp, showcasing
    intermediate cooking skills and a preference for fresh, seasonal ingredients.
  core: Brandi Wade blends meticulous analytical work with a love for spontaneous outdoor adventures, they juggle a practical tech‑driven career and an occasional tendency to leave paperwork scattered in
    the garage.
background:
  cultural: Brandi grew up in Holland, Michigan, a small Midwestern city known for its strong Dutch heritage and close‑knit community spirit. Though her family background is broadly European, her paternal
    great‑grandparents immigrated from the Netherlands, and she was raised participating in local traditions such as the Tulip Time Parade and Sinterklaas celebrations. The Midwestern values of modesty,
    practicality, and collaborative effort shaped her outlook, while the region’s emphasis on education encouraged her pursuit of a STEM graduate degree. Brandi identifies as an American with an appreciation
    for the cultural blend of her hometown—enjoying the mix of American holidays with the town’s Dutch‑inspired festivals, local farm‑to‑table cuisine, and community‑oriented activities.
attributes:
  skills: '[''Title examination and abstracting'', ''Legal document analysis'', ''Public‑record database navigation'', ''Python scripting for automation'', ''SQL data querying'', ''GIS mapping of parcels'',
