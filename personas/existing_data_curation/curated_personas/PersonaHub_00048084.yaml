persona_description: An anthropologist or historian with a special interest in the cultures and ways of life of the indigenous peoples of Canada before European contact. This person is likely to be interested
  in the detailed descriptions of the unique cultural characteristics of the Micmac, Huron, Blackfoot, Haida, and Inuit peoples and their nearly extinct way of life. They are likely to appreciate the ways
  in which these ancient societies have changed their environment and rediscovered ways to live in harmony with nature, and may be interested in learning about the ways in which humans today can learn from
  their experiences and adapt to changing environmental conditions.
