persona_description: A marine surveyor who specializes in the investigation and analysis of electrical systems aboard boats, and who is particularly skilled in identifying and addressing issues related
  to overcurrent devices and fuse usage. This person is experienced and knowledgeable in the field of marine electrical systems, and is likely to have a deep understanding of the importance of proper fuse
  usage and the potential consequences of using overrated fuses or fuses marked "SFE" or "AGC" in marine applications. This person is likely to have a keen eye for detail and a strong desire to prevent
  electrical fires from occurring aboard boats.
