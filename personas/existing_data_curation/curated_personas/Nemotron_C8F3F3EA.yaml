  career_goals: Robert often talks about wanting to become someone who helps others and creates beautiful things. He says he wants to be a "big artist" who paints bright pictures for everyone, and he also
    imagines being a teacher or a community helper who can make his friends happy. His ambitions are shaped by his love of art, his desire to support others, and his enjoyment of learning new ideas.
