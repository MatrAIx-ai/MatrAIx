personas:
  professional: Leonardo Alvarez, an 11‑year‑old budding digital illustrator and robotics hobbyist, transforms sci‑fi and folklore inspirations into detailed sketches and short animated clips while methodically
    programming simple LEGO robots for school club projects, showcasing a blend of imagination, organization, and assertive creativity.
  sports: Leonardo Alvarez plays forward for the local youth soccer club “San Juan FC Juniors,” regularly practices with friends after school, cheers for the Puerto Rico national soccer team during international
    tournaments, and balances his competitive drive with cooperative teamwork, all while staying emotionally stable under match pressure.
  arts: Leonardo Alvarez, inspired by Moebius’s sci‑fi visuals, Lin‑Manuel Miranda’s rhythmic storytelling, and traditional island folklore, spends hours sketching characters on paper, animating them on
    a tablet while listening to reggaetón, salsa, and indie bands, and curates a personal online gallery that reflects his eclectic taste and methodical approach to creative projects.
  travel: Leonardo Alvarez enjoys family road trips to nearby beaches and annual visits to Orlando’s theme parks, meticulously documents each journey in a scrapbook, dreams of exploring Japan’s anime districts
    and historic castles, and balances his structured planning with spontaneous detours to local festivals when possible.
  culinary: Leonardo Alvarez helps his parents prepare arroz con gandules, sautés plantains, and experiment with homemade mango salsa, frequently adds a pinch of adobo seasoning to his creations, and enjoys
    trying new dishes like sushi rolls, all while developing his cooking skills through trial‑and‑error and a keen curiosity for flavor combinations.
  core: Leonardo Alvarez blends a vivid sci‑fi imagination with disciplined organization, turning playful LEGO builds and digital sketches into purposeful projects while managing allowance, health, and
    friendships with a steady, sometimes quirky, self‑reliant rhythm.
background:
  cultural: Leonardo grew up in a bilingual Puerto Rican household in Lowell, Massachusetts, where Spanish is spoken at home and English at school. His family maintains strong ties to Puerto Rican traditions,
    celebrating holidays such as Three Kings' Day (Día de los Reyes) and conducting weekly gatherings featuring bomba and plena music, storytelling, and homemade dishes like pasteles and arroz con gandules.
    He participates in community events organized by the local Puerto Rican cultural center, where he learns about the island’s history, art, and folkloric legends. Living in a diverse New England city,
    Leonardo also interacts with peers from various backgrounds, fostering a multicultural perspective while staying rooted in his heritage.
