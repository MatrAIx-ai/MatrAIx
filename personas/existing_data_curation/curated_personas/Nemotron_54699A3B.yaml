  career_goals: Leonardo aspires to become a creator who blends art and technology. He dreams of designing immersive video games or interactive stories that transport players to imaginative worlds. He is
    also fascinated by architecture and hopes to one day design innovative, sustainable buildings that reflect his cultural heritage. In the long term, he envisions using his bilingual background and creative
    skills to develop educational experiences that inspire other children, especially those from diverse communities.
