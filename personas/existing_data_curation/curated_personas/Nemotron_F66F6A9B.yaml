personas:
  professional: Curtis Yert is a seasoned department‑store sales associate who leverages two decades of inventory control, POS expertise, and clear‑cut communication to keep shelves orderly, train new staff,
    and troubleshoot system glitches, while eyeing a promotion to store manager within two years to apply their systematic mindset to scheduling, budgeting, and regional oversight.
  sports: Curtis Yert follows the Carolina Panthers and Charlotte Hornets on television, cheers on the Hickory High School football team at weekend games, volunteers with the local Hickory Community Fishing
    Club for early‑morning casts on Lake Hickory, and maintains a low‑impact fitness regimen consisting of lake walks, light garden labor, and occasional woodworking that doubles as functional strength
    training.
  arts: Curtis Yert enjoys listening to acoustic folk legends like Gillian Welch and contemporary bluegrass group The Steeldrivers, attends seasonal performances at the Hickory Community Theatre—often watching
    productions of classic plays such as 'Our Town'—and appreciates classic films starring Tom Hanks and Meryl Streep, while their book club delves into regional history works by authors like William S.
    Powell.
  travel: Curtis Yert favors low‑key, road‑trip travel, planning itineraries weeks in advance to explore nearby attractions such as the Blue Ridge Parkway, Asheville’s historic Biltmore Estate, and the
    historic town of Savannah, while dreaming of a future fishing‑focused vacation to Canada’s Lake of the Woods, all balanced against a modest budget and family commitments.
  culinary: Curtis Yert prefers hearty Southern comfort foods, frequently preparing homemade chicken pot pie with garden‑grown carrots and peas, grilling catfish seasoned with a Cajun rub of paprika, garlic,
    and cayenne, and savoring a classic shrimp and grits topped with fresh parsley, while their weekend barbecues feature tangy Lexington‑style pork shoulder smothered in vinegar‑based sauce.
  core: Curtis Yert blends a methodical, routine‑driven mindset with a quiet love for hands‑on crafts, balancing a steadfast work ethic with a knack for occasional impulsive tool purchases and a gentle
    aversion to large crowds.
background:
  cultural: Curtis grew up in the foothills of the Appalachian region of western North Carolina, part of a multi‑generational family rooted in small‑town values and Southern Baptist traditions. The community
    emphasized hard work, self‑reliance, and a modest, down‑to‑earth lifestyle—principles that still shape his worldview. He celebrates regional customs such as the annual Dogwood Festival, enjoys classic
    Southern comfort foods like fried chicken and barbecue, and maintains close ties to his extended family through regular gatherings at the church cellar. While he identifies as white and American, his
    cultural identity is strongly tied to the rhythms of rural life, local folklore, and the steady cadence of seasonal agricultural cycles that inform his appreciation for routine and predictability.
attributes:
  skills: '[''Customer Service'', ''Inventory Management'', ''POS Operation'', ''Cash Handling'', ''Merchandising'', ''Sales Reporting'', ''Microsoft Excel'', ''QuickBooks Basics'', ''Staff Training'',
    ''Problem Solving'', ''Conflict Resolution'', ''Time Management'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Reading (history & biographies)'', ''Garden maintenance'', ''Small book club'', ''Attending local high‑school sports'']'
  career_goals: Curtis aims to transition from front‑line sales to a supervisory role within the next two years, targeting a store manager position at his current retailer. He wants to leverage his organizational
    strengths to oversee staffing schedules, budgeting, and performance metrics, while maintaining a predictable work routine that fits his family life. In the longer term, he envisions moving into a regional
    district manager role, where he can apply his systematic approach to multiple locations, mentor emerging leaders, and implement store‑wide efficiency initiatives. He also harbors a modest ambition to
    eventually open a small specialty shop—perhaps focused on outdoor gear or home‑improvement tools—allowing him to combine his retail expertise with a personal passion for the local community, yet without
    sacrificing the structured environment he values.
