  career_goals: Even though he is only eight, Bobby dreams of turning his love of imagination and structure into a future career. He often talks about becoming an architect who designs fantastical buildings,
    an illustrator for children’s books, or an inventor who creates new toys and gadgets. He also imagines working as a video game designer, crafting worlds that blend art and logic. His ambition is driven
    by a desire to create things that bring joy and inspire others while using his methodical approach to bring ideas to life.
