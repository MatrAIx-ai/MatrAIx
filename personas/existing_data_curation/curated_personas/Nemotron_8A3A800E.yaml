personas:
  professional: Bobby Romine, an aspiring young technologist, blends a vivid imagination with meticulous planning to craft Scratch animations and intricate LEGO constructions, showcasing early talent for
    digital storytelling and problem‑solving, and they often spend hours refining each detail.
  sports: Bobby Romine energizes after‑school hours with soccer practice at the local Sunnyvale Youth Soccer Club in the fall, cheers on the Los Angeles Dodgers during baseball season, and enjoys weekend
    bike rides in the neighborhood park as a low‑key way to stay active, and they look forward to the next game.
  arts: Bobby Romine channels boundless imagination into hand‑drawn fantasy landscapes inspired by Hayao Miyazaki and Dr. Seuss, while eagerly listening to Imagine Dragons and watching the animated series
    Star Wars Clone Wars for narrative inspiration, and they often replay favorite scenes on a tablet.
  travel: Bobby Romine loves meticulously planning family trips, having explored Redwood State Park on nature hikes and daydreaming about a future visit to the Smithsonian National Air and Space Museum
    in Washington, D.C., balancing curiosity with a need for parental supervision and modest budget, and they keep a scrapbook of travel ideas.
  culinary: Bobby Romine delights in cheesy pepperoni pizza, chicken nuggets with dipping sauce, and homemade fruit smoothies blended with banana, strawberry, and a splash of orange juice, proudly assembling
    simple snacks like peanut butter‑jelly sandwiches and occasionally trying new flavors such as mango sorbet, and they love helping a parent stir the batter.
  core: Bobby Romine is an eight‑year‑old organized dreamer who sketches every idea in a journal, turns LEGO bricks into sprawling worlds, and occasionally loses track of time, forgetting chores until reminded,
    and they sometimes get lost in a maze of LEGO bricks.
background:
  cultural: Bobby grows up in a white, Midwestern American household in Livonia, Michigan. His family participates in typical suburban traditions such as holiday celebrations, school events, and community
    gatherings like the local Fourth of July fireworks. He attends a public elementary school where emphasis is placed on teamwork, respect, and personal responsibility. The local culture values modesty,
    reliability, and a strong sense of community, which align with Bobby’s organized and considerate nature. Access to the public library, nearby parks, and family outings reinforces a love for learning
    and outdoor exploration.
