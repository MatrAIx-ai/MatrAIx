persona_description: A semiconductor engineer who specializes in the study of semiconductor physics, particularly the physics behind the short channel effect and the effects of scaling on the transistor.
  He is interested in the potential for FinFET technology to extend beyond the 22nm node and is focused on the manufacturing cost per die and per transistor with the use of EUV and 450mm wafers at the 14nm,
  8nm, and 3nm nodes. He is also interested in the potential for FinFET technology to overcome the short channel effect and extend beyond the 7nm node.
