  career_goals: Kristen aims to transition into a senior leadership role within the next five years—targeting a Director of Business Operations or Chief Strategy Officer position at a mid‑size organization
    in the Texas Hill Country, preferably in the healthcare or sustainable manufacturing sectors. To achieve this, she plans to complete her Lean Six Sigma Black Belt and PMP certifications, deepen her
    expertise in AI‑driven analytics, and lead large‑scale transformation projects that embed design‑thinking and creative problem‑solving into traditional business processes. Parallel to her corporate
    trajectory, she envisions launching a boutique consultancy that helps local artisans and small manufacturers scale sustainably, marrying her analytical skill set with her passion for the arts and community
    development.
