  hobbies: '["Visiting art museums and galleries", "Watercolor painting", "Community theater and improv workshops", "Hiking and kayaking in Minnesota''s waterways", "Reading contemporary fiction and psychology",
    "Cooking experimental global recipes", "Photography of urban and natural landscapes", "Board game nights with friends", "Volunteer tutoring for at‑risk youth", "Attending live music performances"]'
  career_goals: Amanda aspires to become a curriculum coordinator or instructional coach, where she can champion innovative, arts‑infused teaching practices across the district. She plans to pursue a master's
    in Educational Leadership to gain the administrative expertise needed for a future role as a department head. Long‑term, she hopes to launch a district‑wide mental‑health initiative that equips teachers
    with strategies to support students’ well‑being, reflecting her personal experience with stress and worry. She also dreams of publishing a guide on flexible, student‑driven lesson planning for teachers
    seeking to balance structure with creative freedom.
