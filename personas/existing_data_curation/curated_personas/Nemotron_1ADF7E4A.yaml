personas:
  professional: Amanda Bradshaw, a 28‑year‑old secondary school teacher, they blend curiosity‑driven curriculum design with spontaneous arts integration, using assertive yet empathetic classroom management
    to foster student‑centered, project‑based learning while eyeing a future as a curriculum coordinator and district mental‑health champion.
  sports: Amanda Bradshaw, an avid outdoor enthusiast, they hike the Sauk River trail, kayak the Mississippi River, ride a road bike with the Twin Cities Cyclists Club, and cheer for the Minnesota Vikings
    and Minnesota Twins during football and baseball seasons.
  arts: Amanda Bradshaw channels artistic curiosity into watercolor paintings inspired by Frida Kahlo and Yayoi Kusama, they capture candid moments through photography of local galleries, and they energize
    the community theater troupe with improv sketches echoing the Upright Citizens Brigade, while often quoting Shakespeare during rehearsals.
  travel: Amanda Bradshaw prefers spontaneous, low‑budget road trips that blend nature and culture, they recently trekked Iceland’s volcanic landscapes, plan a future culinary pilgrimage to Oaxaca, and
    frequently retreat to Lake Superior’s shoreline for weekend getaways, balancing wanderlust with a modest travel fund.
  culinary: Amanda Bradshaw, a moderately skilled home chef, they delight in crafting Thai green curry with fresh lemongrass, Japanese ramen broth simmered for hours, and Ethiopian injera using teff flour,
    while occasionally over‑indulging in artisanal cheese boards during board‑game nights.
  core: Amanda Bradshaw, a curious yet chronically scattered 28‑year‑old teacher, they thrive on weaving arts into education, splurge on creative supplies, wrestle with anxiety, and find balance through
    outdoor adventure and spontaneous social gatherings.
background:
  cultural: Raised in a modest, middle‑class white family in central Minnesota, Amanda grew up in a community where Lutheran and Methodist church activities emphasized service, modesty, and close‑knit social
    ties. The Midwest’s seasonal rhythms—long, snowy winters and vibrant summer festivals—shaped her appreciation for both indoor creative pursuits and outdoor recreation. Exposure to the University of
    Minnesota’s vibrant arts scene during college broadened her perspective, fostering an openness to unconventional ideas and diverse cultural expressions. While she identifies with Midwestern values of
    hard work and community responsibility, her education and personal curiosity have led her to adopt a more progressive, inclusive outlook that values artistic exploration and mental‑health awareness.
attributes:
  skills: '["Curriculum design", "Project‑based learning", "Differentiated instruction", "Classroom technology integration", "Arts integration", "Collaborative group facilitation", "Student counseling",
