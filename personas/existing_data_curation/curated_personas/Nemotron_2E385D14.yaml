personas:
  professional: Educational guidance counselor Tanyel Williams blends a robust STEM background with culturally responsive counseling, using psychometric assessments and emerging tech to design personalized
    STEM pathways for underrepresented students while often navigating deadlines in a spontaneous, sometimes disorganized manner.
  sports: Athletically, Tanyel Williams enjoys weekend nature walks along the James River, participates in the Henrico Trail Runners club for occasional 5K runs, attends yoga sessions at the local community
    center, and cheers on the Virginia Cavaliers football team, the Richmond Flying Squirrels baseball club, and the Washington Commanders during the NFL season.
  arts: Culturally, Tanyel Williams nurtures creative expression through watercolor painting sessions and intimate gatherings featuring jazz legends like Wynton Marsalis and gospel icons such as The Clark
    Sisters, while also finding inspiration in the literary works of Malcolm Gladwell and the poetic rhythms of spoken-word artist Sarah Kay.
  travel: Travel-wise, Tanyel Williams favors low-key, spontaneous weekend getaways to places like Shenandoah National Park and Colonial Williamsburg, dreams of soaking in New Orleans jazz festivals and
    the historic charm of Savannah, and typically plans trips on a whim while balancing limited vacation days and a modest travel budget.
  culinary: At the kitchen table, Tanyel Williams experiments with Southern-inspired dishes such as shrimp and grits, collard greens seasoned with smoked paprika, and sweet-potato pie, drawing fresh ingredients
    from their vegetable garden and enjoying the process despite occasionally forgetting to prep ahead because of their spontaneous nature.
  core: Curious yet pragmatic, Tanyel Williams weaves a love of solitary learning, community mentorship, and spontaneous creativity into a life that balances data-driven counseling with occasional disorganization
    and a penchant for fresh garden meals and intimate jazz evenings.
background:
  cultural: Tanyel is an African-American woman whose family has deep roots in Virginia's Black community. Raised in a close-knit, multigenerational household, she grew up attending a historically Black
    church where music, fellowship, and community activism were central. She is proud of her heritage, celebrating Juneteenth, Kwanzaa, and family reunions that feature soul food, gospel singing, and storytelling.
    A first-generation college graduate from an HBCU, she carries forward a legacy of resilience and values education as a pathway to empowerment. Her cultural identity informs her commitment to equity,
    mentorship, and culturally responsive counseling for Black and other underrepresented students in Henrico County.
attributes:
  skills: '[''career counseling'', ''academic advising'', ''college admissions guidance'', ''psychometric test interpretation'', ''STEM outreach program development'', ''culturally responsive counseling'',
