  hobbies: '[''gardening'', ''experimenting with Southern cooking'', ''reading non-fiction (psychology, education, African-American history)'', ''solving crosswords and Sudoku puzzles'', ''nature walks
    by the James River'', ''listening to jazz and gospel music'', ''volunteering in STEM mentorship program'', ''watercolor painting'']'
  career_goals: She aims to become a district lead counselor and champion of STEM pathways for underrepresented students. Over the next five years, Tanyel plans to earn a master's degree in school counseling,
    obtain national certification, and launch a community partnership program linking Henrico County schools with local tech firms and universities. She envisions creating a digital resource hub that offers
    personalized career planning tools, and she hopes to influence policy at the Virginia Department of Education to expand equity-focused guidance services.
