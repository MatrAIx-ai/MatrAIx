persona_description: A materials scientist who specializes in the synthesis and characterization of atomically thin materials, particularly van der Waals heterostructures. His research interests include
  the design and optimization of such materials for various technological applications, such as creating superconductors and modifying semiconductor properties. He is also interested in the challenges and
  opportunities presented by the misalignment of layers within van der Waals stacks and the potential for developing new technologies based on such stacks.
