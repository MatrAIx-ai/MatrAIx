persona_description: A soil specialist and agronomist who works with growers to manage the challenges of managing sales and managing soil salinity and sodium issues in their crops. They understand the importance
  of adequate soil drainage and the methods to control soil salinity at tolerable levels. They have experience with irrigation water salinity levels and have knowledge of the effects of excessive soil salinity
  on tree growth. They are knowledgeable in the use of amendments to control soil salinity and have experience with injecting sulfuric acid or gypsum into irrigation water or adding them directly to calcareous
  soils. They understand the importance of tillage and the use of amendments to improve drainage and allow salts to leach from the rooting zone.
