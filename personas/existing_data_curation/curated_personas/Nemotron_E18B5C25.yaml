  career_goals: Although retired, Sheila remains driven to apply her strengths toward meaningful community contributions. She aims to lead the creation of a neighborhood garden that provides fresh produce
    and a gathering space for seniors. She plans to organize an annual oral‑history project, collecting stories from longtime residents to preserve Wood County’s heritage. Sheila also wishes to complete
    a detailed family genealogy, documenting four generations of Conleys and sharing the findings in a printed booklet for her descendants. Maintaining her health is a priority; she sets goals for regular
    walking and low‑impact yoga to stay physically active. Digitally, she aspires to master photo‑editing software to archive family photos and to become confident in using video‑conferencing tools for
    virtual family reunions. Finally, she hopes to mentor younger volunteers at the local church, sharing her organizational methods and fostering leadership in the next generation.
