personas:
  professional: Stephanie Ramsey is a meticulous senior CAD drafter who leverages advanced AutoCAD, SolidWorks, and Revit expertise to translate conceptual sketches into production‑ready plans, while her
    organized, methodical nature and curiosity about emerging BIM technologies drive her to mentor junior drafters and lead precise, deadline‑driven projects.
  sports: Stephanie Ramsey enjoys regular hikes through nearby forest preserves, is a member of the local trail‑running club that meets on Saturday mornings, and follows the Chicago Cubs and Milwaukee Brewers,
    cheering them during the baseball season while balancing her fitness regimen with occasional weekend yoga sessions.
  arts: Stephanie Ramsey fuels her love of storytelling by reading historical fiction from Philippa Gregory and Ken Follett, immersing herself in science nonfiction by Mary Roach, attending community theater
    productions starring local talent, and collecting vintage posters of classic films featuring Meryl Streep and Denzel Washington, which together enrich her creative outlook.
  travel: Stephanie Ramsey prefers meticulously planned trips that blend outdoor adventure with cultural immersion, favoring weekend drives to the Wisconsin Dells for kayaking, annual pilgrimages to the
    historic streets of Charleston, and dreaming of exploring Norway's fjords and the Cotswolds once her retirement savings allow for a longer overseas vacation.
  culinary: Stephanie Ramsey delights in cooking Midwestern comfort meals such as chicken pot pie with flaky puff pastry, slow‑cooked pork chops with applesauce, and cheesy broccoli casserole, while on
    weekends she experiments with homemade sourdough starters, Thai basil chicken, and incorporates fresh garden harvests of heirloom tomatoes, sweet corn, and rosemary into her dishes.
  core: Stephanie Ramsey blends methodical precision with a restless curiosity, juggling a thriving drafting career, a garden of thriving vegetables, and a penchant for weekend woodworking projects that
    often leave her covered in sawdust and fresh basil.
background:
  cultural: Stephanie was raised in a Midwestern white family in Illinois that emphasized hard work, community involvement, and practical skills. Her upbringing in the Chicago suburbs fostered a respect
    for education, especially in the sciences and engineering, and a love for local traditions such as seasonal festivals, church gatherings, and family potlucks. She values self‑reliance, modesty, and
    the collaborative spirit of her neighborhood, and she continues to participate in community service and local heritage events, reflecting a blend of traditional Midwestern culture with an openness to
    technological innovation.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''Revit'', ''Technical drawing'', ''Blueprint interpretation'', ''Building code compliance'', ''GIS mapping'', ''Project coordination'', ''Quality assurance'', ''Python
    scripting'', ''Mentoring'']'
  hobbies: '[''Gardening'', ''Reading (historical fiction and science nonfiction)'', ''Book club'', ''Woodworking'', ''Quilting'', ''Hiking'', ''Math tutoring'', ''Community theater'', ''Cooking'']'
  career_goals: Stephanie aims to advance to a senior drafting supervisor role within the next three years, lead a small team of drafters, obtain the Certified Professional Drafter (CPD) credential, and
    expand her expertise in Building Information Modeling (BIM) to become a BIM coordinator. Long‑term, she envisions establishing a boutique consulting practice that offers design review and drafting services
    for small‑scale construction firms, while also serving as a mentor and trainer for women entering technical drafting fields. She wants to balance these ambitions with a stable family life and continue
    contributing to community projects.
