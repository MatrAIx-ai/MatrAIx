  career_goals: Diana aims to obtain her GED within the next year and subsequently pursue a certification as a Certified Nursing Assistant, attracted by the structured environment, clear responsibilities,
    and the opportunity to help others—aligning with her practical and routine‑oriented mindset. Simultaneously, she harbors an ambition to continue developing as a competitive soccer player, hoping to
    earn a scholarship for college and eventually transition into coaching or sports mentorship, where she can channel her competitive drive and leadership skills. She also envisions leveraging her social‑media
    savvy to build a modest personal brand around lifestyle tips for teens, blending her creative interests with a potential side income.
