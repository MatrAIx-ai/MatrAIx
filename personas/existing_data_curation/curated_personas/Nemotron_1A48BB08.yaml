  hobbies: '[''Street Photography'', ''Sketching'', ''Painting'', ''Art Gallery Visits'', ''Live Music Events'', ''Improv Comedy'', ''Community Health Fair Volunteering'', ''Game Nights'', ''Kayaking'',
    ''Beach Fishing'', ''Southern‑Italian Cooking'', ''Local Hobby Club Participation'', ''Community Theater'']'
  career_goals: Logan aims to build on his associate’s education by completing a bachelor’s degree in nursing within the next three years, ultimately achieving Registered Nurse licensure. He aspires to
    specialize in community health or geriatric care, integrating his love for art into therapeutic programs that promote patient well‑being. In the short term, he seeks leadership roles such as charge
    nursing assistant or patient liaison, where he can mentor peers and coordinate care with flexibility that accommodates his creative pursuits. Long‑term, he hopes to design and run community outreach
    initiatives that combine health education with cultural and artistic activities, strengthening harmony and support in his coastal community.
