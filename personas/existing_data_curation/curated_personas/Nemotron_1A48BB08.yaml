personas:
  professional: Logan Stangarone is a nursing assistant at a coastal community hospital who blends meticulous patient care—vital sign checks, wound dressing, and medication reminders—with a flair for creative
    engagement, using street photography to brighten rooms while eyeing a transition to a registered nurse role in geriatric community health, despite a relaxed approach to scheduling that sometimes leads
    to last‑minute scramble for shift swaps, and they often rely on improvisational humor to ease tense moments.
  sports: Logan Stangarone paddles a 10‑foot sea kayak with the weekly Coastal Kayakers Club, cheers for the Tampa Bay Buccaneers during football season and the Miami Marlins in baseball, and joins pick‑up
    beach volleyball games at the local shoreline whenever the summer heat eases the grind of hospital shifts.
  arts: Logan Stangarone immerses themselves in the arts by wandering local waterfront galleries to study works by Ansel Adams and contemporary muralist Shepard Fairey, snapping street photos that echo
    the candid humor of Diane Arbus, sketching seaside scenes while listening to The Strokes at the downtown dive bar, and sharpening quick‑wit at weekly improv nights inspired by the comedic timing of
    Tina Fey.
  travel: Logan Stangarone prefers spur‑of‑the‑moment coastal getaways, having already kayaked through the Everglades mangroves, photographed sunrise over Santorini’s white cliffs, and dreaming of a cross‑country
    road trip down Route 66 that balances low‑cost hostels with occasional splurges on culinary tours, all while juggling a flexible work schedule that sometimes forces last‑minute cancellations.
  culinary: Logan Stangarone is a self‑taught kitchen tinkerer who blends Southern‑Italian flavors—think shrimp‑and‑tomato cavatelli, lemon‑basil bruschetta, and a spicy arrabbiata‑style gumbo—using fresh
    basil, pecorino, and locally caught fish, yet they often forget to pre‑heat the oven and end up improvising the final garnish.
  core: Logan Stangarone is a fiercely sociable nursing assistant who channels a love for art and spontaneous adventure into daily work and weekend escapades, even if their delightfully chaotic schedule
    sometimes leaves them scrambling for laundry night.
background:
  cultural: Logan was raised in a blended Southern and Italian‑American household in the Lowcountry of South Carolina. His family emphasized hospitality, community gatherings, and a love for food, often
    combining traditional Italian pasta dishes with Southern seafood recipes. He grew up attending Catholic services and participating in local festivals that celebrate the region’s Gullah‑Geechee heritage,
    fostering an appreciation for diverse cultural expressions. Living in Okatie, he embraces the coastal lifestyle, cherishing the natural beauty of the marshes and the close‑knit community spirit that
    values generosity, mutual support, and a relaxed approach to life.
