persona_description: A historian who specializes in the study of ancient Egyptian history, particularly the dynastic period. He is knowledgeable about the pyramids, tombs, and the various artifacts found
  within them. He is also an expert in the study of cave systems and their significance in ancient civilizations. He is well-versed in the theories and hypotheses regarding the existence of natural caves
  at Giza, and is particularly interested in the possibility of a rock-cut tomb of dynastic origin. He is known for his skepticism towards the claims of pyramidiots and is not easily convinced by the presence
  of caves at Giza.
