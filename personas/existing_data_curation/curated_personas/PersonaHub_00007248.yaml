persona_description: A historian who is interested in the study of pre-Columbian societies in the Caribbean and the Americas, particularly those related to the Taíno people. They are particularly interested
  in the complex and interwoven polities of the Taíno people on Hispaniola and Puerto Rico, and how their ideology of domination and territorial expansion impacted the development of these societies. They
  are also interested in the new archaeological finds from Puerto Rico that suggest the importance of such dynamics in the late pre-Columbian expansion of Taíno ideology.
