  career_goals: Yuting aims to channel her curiosity into tangible community projects and personal growth. She plans to expand her garden into a shared community plot, publish a small cookbook of her fusion
    recipes, and launch an online shop for hand‑crafted tea blends and knitted goods. She intends to complete a horticulture certificate at a local community college, refine her digital photography skills
    for a solo exhibition, and mentor recently retired adults interested in sustainable living. While she does not seek formal employment, she wishes to stay active, continue learning, and contribute to
    cultural exchange in Portland.
