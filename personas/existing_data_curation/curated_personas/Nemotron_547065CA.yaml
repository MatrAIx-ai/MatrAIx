  hobbies: '[''Running'', ''Cycling'', ''Tai Chi'', ''Reading scientific journals'', ''Chess'', ''Cooking Cantonese cuisine'', ''Volunteer teaching at senior centers'', ''DIY fitness equipment projects'',
    ''Attending fitness workshops'', ''Listening to classical music'']'
  career_goals: Chiu aims to transition from solely delivering classes to shaping the broader fitness landscape in Queens. Over the next five years he plans to open a boutique studio that blends scientific
    movement assessment with traditional Eastern practices such as Tai Chi, offering specialized programs for adults over 50. He is pursuing advanced certifications in senior fitness and functional movement
    screening, and hopes to mentor emerging trainers through a structured apprenticeship curriculum. Ultimately, he envisions publishing a guide on integrating biomechanics and mind‑body principles for
    community‑based fitness, and becoming a recognized consultant for senior‑center wellness initiatives.
