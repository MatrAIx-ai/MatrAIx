persona_description: A war expert who seeks to reshape America's understanding of the Civil War and its emancipation of 4 million slaves. He is a former president of the University of Richmond and a member
  of the leadership team of "The Future of Richmond's Past." His approach has earned him praise in Richmond, the former capital of the Confederate States of America, but also denunciations from some whose
  ancestors fought on its behalf. He is known for his unique perspective on the Civil War, which sees slavery as the primary cause, but also wants to move beyond the notion that the explanation for the
  most important conflict in American history could fit on a bumper sticker.
