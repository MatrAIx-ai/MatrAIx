  career_goals: Jimmy aims to become a principal engineer or cloud solutions architect within the next five years, leading high‑impact projects that streamline operations for regional tech firms or defense
    contractors. He plans to earn advanced AWS and Kubernetes certifications, mentor junior developers, and contribute to open‑source projects that showcase his competitive drive. Long‑term, he envisions
    launching a boutique consulting firm that helps midsize companies adopt scalable, secure cloud infrastructures while maintaining the structured, results‑oriented approach he values.
