persona_description: A military strategist and military leader, particularly known for his involvement in the Thirty Years' War and his strategic planning in the Battle of Alte Veste. He is a skilled tactician
  and a master of warfare, having fought in several battles and campaigns throughout the war. Wallenstein was hired by the Habsburgs after the defeat of Count Tilly at Breitenfeld and was later recalled
  by Ferdinand II after several Protestant victories over Catholic armies. He was known for his ambition and his desire to align with the Protestants. He was assassinated at Eger by one of the army's officials,
  Walter Devereaux.
