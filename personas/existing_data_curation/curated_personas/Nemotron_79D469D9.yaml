  hobbies: '[''Soccer (playing and watching)'', ''Cooking Mexican cuisine'', ''Reading historical fiction'', ''Hiking local trails'', ''Photography'', ''Volunteer work at community center'', ''Listening
    to Latin music'', ''Board games'', ''DIY home improvement projects'']'
  career_goals: Alexander aims to advance from first‑line supervisor to store manager within the next two years, with a long‑term goal of becoming a regional operations manager for a multi‑store retail
    chain. He is motivated to lead a top‑performing store, earn recognition such as "Store of the Year," and champion inclusive workplace practices that reflect his cultural background. To support these
    ambitions, he plans to pursue an MBA focused on retail management, deepen his data‑driven decision‑making skills, and develop expertise in integrating e‑commerce solutions with brick‑and‑mortar operations.
