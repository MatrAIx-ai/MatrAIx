  hobbies: '[''Gardening'', ''Cooking traditional Latino cuisine'', ''Book club (mystery & historical fiction)'', ''Walking on the beach'', ''Home yoga practice'', ''Volunteering at community center (cultural
    event organization, Spanish tutoring)'']'
  career_goals: Samantha aims to advance within the transportation sector while preserving a predictable routine. She plans to obtain a commercial driver’s license (CDL) to qualify for larger vehicle operations
    and eventually transition into a fleet supervisor or driver‑trainer role, where she can mentor new drivers and develop safety training programs. Additionally, she intends to complete a certification
    in logistics management to broaden her career options. Her long‑term ambition is to secure a steady position with consistent hours that allows her to balance work, personal life, and community involvement.
