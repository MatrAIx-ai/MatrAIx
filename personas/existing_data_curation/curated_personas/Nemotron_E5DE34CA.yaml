  career_goals: He plans to complete an associate degree in environmental studies or communications, then secure a role that marries his curiosity with practical impact—such as a sustainability coordinator,
    community outreach specialist, or user‑experience researcher. He seeks a flexible, often remote position that lets him work on projects that improve community well‑being while allowing spontaneous,
    self‑directed learning. Long‑term, he hopes to build a portfolio in web design and digital communication to broaden his impact.
