personas:
  professional: Steven Tatsch is a budding sustainability coordinator in training, blending beginner‑level Python and front‑end web skills with a calm, people‑first approach to community outreach, and producing
    clear documentation for small‑scale environmental projects while often juggling deadlines with a spontaneous, flexible work style.
  sports: Steven Tatsch enjoys weekend hikes with the Everglades Trailblazers, follows the Miami Dolphins and Orlando Magic loyally, plays casual intramural soccer with friends at the local community center,
    and maintains a low‑key fitness routine of bird‑watching walks and occasional paddle‑boarding, rarely committing to a structured gym schedule.
  arts: Steven Tatsch spends evenings strumming acoustic renditions of John Denver and Iron & Wine, curates a photo collection inspired by Ansel Adams and Chris Burkard, and watches sci‑fi classics like
    Blade Runner while collecting vinyl records of folk artists, finding quiet creative solace in these low‑key artistic pursuits.
  travel: Steven Tatsch favors spontaneous road trips to nearby wetlands and the Florida Keys, has backpacked through Asheville’s Blue Ridge Mountains and Dreaming Big Costa Rica eco‑lodges, and dreams
    of a solo trek across Iceland’s volcanic landscapes, always planning just enough to secure a campsite but leaving room for impromptu detours.
  culinary: Steven Tatsch experiments with simple cooking, often whipping up grilled tilapia tacos with mango salsa, homemade avocado toast topped with lime zest, and a weekly Thai green curry using fresh
    cilantro and Thai basil, while appreciating the occasional fancy brunch at a local farmer’s market café.
  core: Steven Tatsch is a calm, curiosity‑driven 20‑year‑old who balances DIY tech projects and quiet nature hikes with a penchant for spontaneous, loosely structured work, occasional budgeting laxity,
    and a habit of over‑stocking on Arduino parts.
background:
  cultural: Steven is a white American of mixed German and Irish ancestry, raised in a middle‑class suburban household in Deltona, Florida. His family values education, self‑reliance, and community involvement,
    reflecting both traditional American middle‑class ethos and the relaxed, hospitality‑oriented culture of Central Florida. He celebrates standard U.S. holidays, enjoys Florida’s outdoor lifestyle, and
    occasionally explores his heritage through genealogy and cultural food traditions.
