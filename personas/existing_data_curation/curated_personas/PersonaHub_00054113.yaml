persona_description: A health care provider who specializes in neonatology and is responsible for the diagnosis, treatment, and management of neonatal jaundice, particularly kernicterus, in full-term infants.
  They are knowledgeable about the risk factors for hyperbilirubinemia, the management of severe neonatal jaundice, and the use of phototherapy and exchange transfusion to prevent the development of severe
  hyperbilirubinemia and bilirubin encephalopathy (kernicterus). They are also responsible for providing verbal and written information to parents and other caretakers about the signs and treatment of jaundice
  and hyperbilirubinemia.
