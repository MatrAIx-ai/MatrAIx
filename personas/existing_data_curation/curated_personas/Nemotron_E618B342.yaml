  hobbies: '[''Fishing'', ''Gardening'', ''Church and gospel choir participation'', ''Chess'', ''Reading historical fiction'', ''Woodworking'', ''Listening to jazz and blues'', ''Attending equestrian events'',
    ''Road trips with spouse'']'
  career_goals: Freddie aims to transition into a senior advisory role focused on community development projects in the Aiken region, leveraging his experience to guide large‑scale infrastructure and historic‑preservation
    initiatives. He seeks to mentor emerging project managers through workshops and informal coaching, and he plans to obtain a PMP certification to formalize his expertise. Over the next few years, Freddie
    hopes to design a local training program that blends practical tools with flexible, curiosity‑driven problem solving, while gradually scaling back his workload to devote more time to volunteer consulting
    for nonprofit organizations and civic events.
