personas:
  professional: Cherri Labrecque, an 83‑year‑old retired environmental data analyst, now channels her quantitative expertise into a senior‑focused science mentorship program while spearheading a tech‑help
    initiative at the Venice public library and drafting a memoir that blends statistical storytelling with community leadership.
  sports: Cherri Labrecque stays active through early‑morning kayaking with the Sarasota Kayak Club, weekly senior fitness classes at the Venice Senior Center, and avidly follows the Tampa Bay Buccaneers
    and Tampa Bay Rays, cheering them from her living‑room armchair while also participating in a local senior bridge league that satisfies her competitive streak.
  arts: Cherri Labrecque enriches her leisure time by acting in community theatre workshops with the Venice Community Theatre, listening to Andrea Bocelli’s operatic arias, admiring Monet’s water‑lily paintings,
    and regularly attending performances at the Sarasota Opera, all of which nourish her love for storytelling and cultural expression.
  travel: Cherri Labrecque favors low‑key, senior‑friendly travel, planning week‑long road trips to historic St. Augustine, bird‑watching excursions in the Everglades, and occasional cruises to the Caribbean
    while dreaming of a guided tour of the Galápagos to observe endemic avian species, always using senior discounts and a meticulously prepared itinerary to balance adventure with comfort.
  culinary: Cherri Labrecque, an avid home cook, delights in preparing Mediterranean staples such as grilled lamb with rosemary, tabbouleh with fresh mint, homemade hummus, and olive‑oil‑drizzled Greek
    salad, skillfully using herbs harvested from her butterfly‑attracting garden and occasionally experimenting with saffron‑infused paella for friends at her weekly dinner gatherings.
  core: Cherri Labrecque blends relentless curiosity, a competitive bridge mind, and a love for birdwatching into a vibrant senior life, though they sometimes overcommit to community projects and forget
    their reading glasses on the library desk.
background:
  cultural: Cherri Beth was born in Burlington, Vermont, to a family of French‑Canadian descent; her grandparents immigrated from Quebec, instilling a respect for heritage and a modest bilingual upbringing.
    Raised in a middle‑class, primarily Protestant household, she embraced the New England ethos of self‑reliance, curiosity, and community service. Relocating to Venice, Florida, after retirement, she
    has integrated into the region's vibrant retiree culture, which values arts, outdoor recreation, and civic engagement. Her cultural identity blends the pragmatic, inquisitive spirit of her New England
    roots with the laid‑back, community‑oriented lifestyle of coastal Florida.
