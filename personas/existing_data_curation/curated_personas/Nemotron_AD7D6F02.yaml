personas:
  professional: An enthusiastic lemonade‑stand entrepreneur, Sandra Stone organizes their tiny inventory, sets prices, and negotiates with neighborhood friends, blending their curiosity about how things
    work with a practical, organized approach while also demanding fairness and competitiveness in every transaction.
  sports: A spirited little athlete, Sandra Stone dashes around Hope Mills park playing flag football with the Cumberland County Little Giants, cheers loudly for the Carolina Panthers during Sunday games,
    and insists on a daily superhero‑themed stretch routine, balancing their competitive drive with group fun.
  arts: A budding artist, Sandra Stone fills sketchbooks with bright crayon scenes of backyard critters after library storytime, sings along to Raffi's "Baby Beluga" and "Sesame Street" tunes, and eagerly
    watches the community theatre's puppet shows, letting their creative curiosity color everyday life.
  travel: An adventurous explorer, Sandra Stone has packed a small backpack for weekend trips to the Wrightsville Beach boardwalk and the nearby Great Smoky Mountains, while dreaming of a future family
    vacation to Disney World, preferring hands‑on, nature‑filled outings over long car rides, and their excitement often leads them to ask endless "why?" questions.
  culinary: A tiny food enthusiast, Sandra Stone loves to help whisk together macaroni and cheese, savors the smoky tang of homemade pulled pork at family barbecues, sips sweet tea from a plastic cup, and
    proudly assembles the perfect peanut‑butter‑and‑jelly sandwich with crunchy lettuce, demonstrating their enthusiastic palate and occasional sticky‑finger habit.
  core: A curious, organized, and sociable 5‑year‑old, Sandra Stone blends Southern‑style community warmth with a competitive streak, tackling everything from lemonade stands to backyard sports with boundless
    energy, a pinch of skepticism, and their habit of collecting shiny rocks.
background:
  cultural: Sandra grows up in Hope Mills, a close‑knit community in Cumberland County, North Carolina. Her family reflects Southern hospitality and strong community ties, with regular church attendance,
    weekend family barbecues featuring pulled pork and sweet tea, and participation in local county fairs and community park events. She often visits the county library for storytime and enjoys outdoor
    play in the town's green spaces. The regional emphasis on friendliness, self‑reliance, and outdoor recreation shapes Sandra's outlook, while her supportive middle‑class family environment nurtures her
    curiosity and practical problem‑solving skills.
