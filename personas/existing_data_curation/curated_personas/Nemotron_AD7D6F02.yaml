  career_goals: Sandra dreams of becoming an astronaut or a scientist who explores space, motivated by her fascination with stars and her desire to create and build things. She also imagines being a teacher
    one day, helping other children discover new ideas while staying organized and practical. Her ambition is to be a leader who turns curiosity into real inventions and to excel in any field she chooses,
    whether it be exploring the universe or guiding peers in learning.
