personas:
  professional: An experienced computer systems analyst, Yris Espinal leverages a decade of expertise in UML, BPMN, Python automation, and ERP implementation to methodically dissect complex business processes,
    they maintain rigorous documentation and risk assessments, and they balance a preference for structured planning with a pragmatic willingness to adapt when deadlines shift, ensuring solutions are vetted
    against measurable outcomes despite a competitive, skeptical streak.
  sports: Yris Espinal enjoys weekend hikes in the Palos Forest Preserve, they run with the Chicago Valley Runners club when training for the local 5K, and they avidly follow the Chicago Cubs and Chicago
    Bulls, often wearing vintage jerseys during game nights despite preferring solitary workouts over crowded gyms.
  arts: Yris Espinal cultivates a quiet artistic side by reading novels by Isabel Allende and non‑fiction tech histories, they listen to Latin jazz legends like Tito Puente and classic rock icons such as
    The Rolling Stones while editing their own nature photographs, and they occasionally attend local gallery openings featuring emerging photographers.
  travel: Yris Espinal plans trips with a detailed itinerary yet allows spontaneous detours, they have explored the historic streets of San Miguel de Allende and the coastal cliffs of Big Sur, they dream
    of hiking to Machu Picchu and savoring a weekend in the wine country of Mendoza, and they prefer relaxing stays in boutique B&Bs over crowded resorts.
  culinary: Yris Espinal’s culinary repertoire blends comfort cooking of ajiaco, empanadas, and arepas with experimental dishes like quinoa‑coconut curry, they possess solid home‑cooking skills honed in
    a modest backyard kitchen, they source fresh herbs from their garden for sauces, and they relish tasting the fragrant notes of cumin, cilantro, and panela in every meal.
  core: Yris Espinal balances a love for structured analysis with a habit of misplacing receipts, they thrive on solving puzzles while quietly competing with themselves, and they cherish solitary evenings
    of cooking and photography over bustling social scenes.
background:
  cultural: Yris’s Colombian heritage is an integral part of her identity. Raised in a bilingual household, she is fluent in both Spanish and English and often switches languages comfortably in conversation.
    Family ties remain strong; she maintains regular video calls with relatives in Bogotá and participates in annual celebrations of Colombian holidays such as Día de la Independencia and Carnaval de Barranquilla,
    even while living in Mount Prospect. Her cultural roots influence her culinary repertoire, especially her love for traditional Colombian recipes, and she occasionally attends community events organized
    by the local Colombian diaspora, where she connects with a small network of fellow expatriates. While Yris values her private time, she appreciates sharing aspects of her culture—like music, literature,
    and cuisine—with close friends, fostering a subtle yet meaningful exchange of traditions.
