  career_goals: Looking ahead, Yris aims to transition into a senior systems analyst role with a focus on strategic digital transformation, eventually stepping into an IT Solutions Architect position where
    she can shape enterprise‑wide technology roadmaps. She plans to earn certifications such as the Certified Business Analysis Professional (CBAP) and the AWS Solutions Architect Associate to broaden her
    expertise. Yris is also interested in leading a small, high‑performing team, leveraging her competitive drive to mentor junior analysts and promote data‑driven decision‑making. Balancing her ambition
    with family commitments, she seeks opportunities that offer flexible work arrangements, allowing her to maintain the structured yet adaptable work style she values. In the long term, Yris hopes to contribute
    to diversity initiatives within the tech community, especially supporting fellow Colombian and Hispanic professionals in the Chicago area.
