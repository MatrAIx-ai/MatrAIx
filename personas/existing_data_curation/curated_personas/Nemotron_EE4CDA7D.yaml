personas:
  professional: Marcela Salazar, a health services administrator with over twenty years of experience, blends data-driven strategic planning and creative problem-solving to streamline operations across
    multi-site networks, while leveraging bilingual communication to champion equity-focused programs and steer digital health adoption toward senior leadership.
  sports: Marcela Salazar enjoys early-morning jogs with the Queens Striders running club, follows the New York Knicks and Yankees fervently, and plays casual tennis at St. Albans Recreation Center during
    summer weekends.
  arts: Marcela Salazar, an abstract painter who frequents Manhattan gallery openings featuring artists like Kehinde Wiley and Jean-Michel Basquiat, also draws inspiration from the salsa rhythms of Celia
    Cruz and the theatrical storytelling of Lin-Manuel Miranda's Hamilton.
  travel: Marcela Salazar alternates between weekend trips to the Caribbean island of Puerto Rico, where she explores vibrant street art, and longer journeys to Barcelona to study Gaudi's architecture,
    while also eagerly planning a cultural pilgrimage to New Orleans for its jazz heritage.
  culinary: Marcela Salazar, an adept home chef, masterfully prepares sancocho, mangú, and pastelitos using fresh plantains, yuca, and sofrito, often experimenting with Caribbean spice blends like adobo
    and cumin, and she enjoys hosting potluck gatherings where she pairs her dishes with tropical fruit cocktails.
  core: Marcela Salazar navigates life as a disciplined health executive who channels boundless artistic imagination into nightly canvases, balances meticulous budgeting with occasional impulsive art-supply
    splurges, and combats stress through yoga while never missing a salsa night.
background:
  cultural: Marcela is a second‑generation Dominican‑American who grew up in the vibrant Dominican enclave of Washington Heights before moving to Queens. Fluent in both Spanish and English, she carries
    forward the island’s strong sense of familia, community solidarity, and celebration of music and food. She stays closely connected to her roots through participation in the Dominican Day Parade, supporting
    local immigrant health initiatives, and infusing Caribbean flavors into her cooking. Her cultural perspective deeply informs her professional commitment to culturally competent care and health equity
    for underserved populations in her community.
attributes:
  skills: '[''Healthcare Operations Management'', ''Strategic Planning'', ''Financial Management'', ''Regulatory Compliance (HIPAA, Medicare/Medicaid)'', ''Quality Improvement'', ''Health Information Systems
    (EHR) Implementation'', ''Staff Recruitment & Development'', ''Crisis Management'', ''Data Analytics & Reporting'', ''Community Outreach'', ''Bilingual Communication (Spanish/English)'', ''Conflict
    Resolution'', ''Creative Problem Solving'', ''Patient Advocacy'']'
  hobbies: '[''Abstract Painting'', ''Gallery Visits'', ''Community Mural Projects'', ''Salsa/Bachata Dancing'', ''Cooking Traditional Dominican Cuisine'', ''Reading Latin American Literature'', ''Yoga'',
    ''Volunteering at Community Health Fairs'', ''Rooftop Gardening'']'
  career_goals: Marcela aims to advance to a senior executive position—such as Director of Operations or Vice President of Community Health—within a large, multi‑site health network serving diverse New
    York City populations. She is committed to championing equity‑focused programs that reduce health disparities for Latino and Caribbean communities, integrating behavioral health services, and leading
    the adoption of innovative digital health tools. To support these ambitions, she plans to earn a formal MBA or a Master’s in Health Administration and obtain the FACHE (Fellow of the American College
    of Healthcare Executives) certification.
