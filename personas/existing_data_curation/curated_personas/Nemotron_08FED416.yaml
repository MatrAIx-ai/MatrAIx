  career_goals: Elaney aims to advance to the rank of sergeant within the next two years, followed by a lieutenant position where she can shape department strategy. She is committed to building a robust
    community‑policing program that uses data analytics to reduce crime hotspots and improve public trust. Long‑term, she envisions serving as a precinct commander or deputy chief, championing crisis‑negotiation
    training and mental‑health response protocols. To support these ambitions, she plans to pursue a master's degree in public administration and earn advanced certifications in threat assessment and organizational
    leadership. Post‑retirement, she is interested in consulting for private security firms or advising municipal agencies on public‑safety best practices.
