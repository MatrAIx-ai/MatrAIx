  hobbies: '[''Reading (science fiction & non-fiction)'', ''Chess'', ''Puzzle solving (crosswords, Sudoku)'', ''Hiking and nature walks'', ''Photography'', ''Playing piano'', ''Baking'', ''Genealogy research'']'
  career_goals: Helen aims to pursue a degree in biomedical engineering or data analytics at a community college, with the long‑term goal of working in a research lab where she can apply her curiosity to
    practical health solutions. She wants to secure scholarships through competitive academic achievement and eventually become a project leader who bridges innovative ideas with reliable processes. She
    also envisions building a small side venture, such as a freelance web‑design service, that leverages her technical skills.
