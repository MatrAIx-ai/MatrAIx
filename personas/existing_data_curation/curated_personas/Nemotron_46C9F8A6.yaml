  hobbies: '[''Zumba dance classes'', ''Hiking in Red Rock Canyon'', ''DIY crafts and knitting'', ''Cooking and hosting dinner parties'', ''Board game nights'', ''Volunteering at community garden'', ''Reading
    parenting and self‑help books'', ''Yoga for stress management'', ''Community theater acting'', ''Participating in local women’s groups'']'
  career_goals: Randi aims to complete her associate degree in early childhood education within the next two years and obtain a Child Development Associate (CDA) credential. She aspires to move into a lead
    teacher or program coordinator role at a larger childcare center, where she can shape curriculum that emphasizes social‑emotional learning and flexible, child‑led exploration. Long‑term, she envisions
    opening her own boutique home‑based daycare that offers a nurturing, community‑oriented environment, while also providing workshops for staff on stress management and resilience.
