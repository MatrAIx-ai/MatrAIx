  career_goals: Although retired, William is driven to stay engaged and purposeful. His primary ambition is to support his community by continuing his volunteer leadership at the fire department and church,
    mentoring younger volunteers, and preserving local heritage through the historic society. He also aims to expand his woodworking hobby into creating functional pieces for charitable fundraisers, and
    to maintain his health so he can remain present for his family.
