personas:
  professional: Gowri Khan, a 10-year-old aspiring robotics engineer, leverages their love for puzzles, disciplined piano practice, and precise drawing skills to methodically design and program small-scale
    robots, and they thrive in the structured environment of their school's robotics club.
  sports: Gowri Khan, a member of the Dolphin Youth Swim Team, swims laps twice a week for solitary calm, roots for the local junior soccer club the Thunderbolts, and they occasionally try beginner gymnastics
    at the community center, balancing a competitive mindset with a preference for small-group activity.
  arts: Gowri Khan, who practices piano daily, enjoys playing pieces by Mozart and contemporary pianist Yiruma, sketches realistic wildlife illustrations inspired by John James Audubon, and they spend weekends
    attending the city's children's art workshops featuring muralist JR.
  travel: Gowri Khan, who loves science museums, has visited the Smithsonian National Air and Space Museum and the interactive science centre in Tokyo, prefers meticulously planned weekend trips with parents
    over spontaneous vacations, and they hope to explore the coral reefs of the Great Barrier Reef to study marine life firsthand.
  culinary: Gowri Khan, who helps prepare meals, delights in measuring exact portions for homemade spaghetti carbonara, bakes perfectly crisp chocolate chip cookies using a digital kitchen scale, and they
    experiment with spice blends such as cumin and coriander to add a precise flair to family dinners.
  core: Gowri Khan, a meticulous 10-year-old with a penchant for puzzles, piano, and precise cooking, balances relentless self-discipline with a quiet worry about perfection, and they often over-plan even
    simple activities.
background:
  cultural: Gowri is a second‑generation South Asian American whose family descends from the Indian subcontinent and practices Islam, reflected in the surname Khan. At home, she and her family speak English
    fluently and also use Urdu for cultural phrases and prayers. They observe Islamic traditions such as Ramadan fasting and celebrate Eid al‑Fitr with festive meals that blend traditional dishes like biryani
    with Texan favorites. The family participates in the vibrant South Asian community in San Antonio, attending cultural events at the local diaspora center, where Gowri learns classical music and dance
    in a respectful, structured setting. While deeply rooted in her heritage, she also embraces the multicultural fabric of Bexar County, enjoying community celebrations like Fiesta San Antonio and sharing
    her cultural festivals with friends from diverse backgrounds. Education is highly valued in her household, and her parents encourage disciplined study, which aligns with her personal preference for
    organization and achievement.
attributes:
