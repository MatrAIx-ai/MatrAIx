  career_goals: Gowri envisions a future where she applies her love of structure and problem solving to a career in engineering, ideally aerospace or sustainable technology. She aims to attend a top STEM
    high school, earn scholarships through high academic achievement, and eventually obtain an engineering degree. She is motivated to design practical solutions that improve everyday life, especially for
    her community. Alongside her technical aspirations, she hopes to mentor younger girls in her neighborhood, encouraging them to pursue disciplined study habits and confidence in STEM fields.
