  career_goals: Although retired, Khamsone aims to leave a lasting legacy by writing a memoir of her life and family’s migration story, establishing a small community art studio where seniors and youth
    can collaborate on projects, and creating a scholarship fund for local students pursuing studies in the arts or cultural preservation. She also hopes to document and archive traditional Vietnamese recipes
    and craft techniques for future generations.
