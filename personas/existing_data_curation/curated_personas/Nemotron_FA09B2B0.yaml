personas:
  professional: David Colon, a retired humanities scholar turned community archivist, channels his deep knowledge of island art history and bilingual storytelling into organizing intergenerational art workshops,
    senior-center cultural festivals, and a volunteer docent program at the local museum, balancing meticulous planning with an openness to unconventional ideas.
  sports: David Colon, a loyal supporter of the Orlando Magic and Orlando City SC, spends mornings walking through Lake Eola Park with his senior walking club, joins the local senior bowling league each
    winter, practices gentle tai chi twice weekly to keep joint flexibility, and uses a cane for stability during occasional joint flare-ups.
  arts: David Colon, an avid watercolorist who regularly visits the Orlando Museum of Art, draws creative spark from painters like Georgia O'Keeffe, Frida Kahlo, and contemporary island artists who explore
    vibrant tropical palettes, and volunteers as a docent sharing stories of unconventional modern art while habitually sketching cafe patrons after each exhibition.
  travel: David Colon, who prefers thoughtfully itineranted trips that blend cultural immersion with budget-friendly lodging, has journeyed to the historic colonial town of Old San Juan on his ancestral
    Caribbean island and enjoys scenic drives along Florida's Gulf Coast, while dreaming of a return pilgrimage to the island's coastal villages that inspired his family's culinary traditions.
  culinary: David Colon, a passionate home chef, expertly prepares arroz con gandules, slow-roasted lechon with crisp skin, pastelitos wrapped in banana leaves, and silky tembleque made with coconut milk,
    fills his kitchen with the aroma of sofrito, yet sometimes forgets to turn off the stovetop when engrossed in lively conversation.
  core: David Colon, an 84-year-old lifelong learner whose curiosity fuels a vibrant blend of art, cooking, and community storytelling, balances exuberant sociability with a lingering worry about health
    and finances.
background:
  cultural: David was raised in a bilingual Puerto Rican household that preserved island traditions, Catholic rituals, and a strong sense of community. His parents emigrated from a small town near San Juan,
    bringing with them the flavors, music, and folklore of the island. Living in Orlando's vibrant multicultural environment, he blends his Caribbean heritage with the diverse influences of Florida, actively
    participating in local Puerto Rican festivals, Noche Buena celebrations, and intergenerational cultural exchanges. His identity is rooted in the pride of his Puerto Rican ancestry while embracing the
    broader American cultural landscape.
attributes:
  skills: '["Art history (Caribbean & Puerto Rican)", "Bilingual Spanish‑English communication", "Cultural storytelling and oral history documentation", "Community program coordination", "Event planning
    for cultural festivals", "Mentorship and teaching", "Memoir writing", "Traditional Puerto Rican culinary arts", "Basic digital archiving and tablet usage"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Salsa dancing and bongó playing", "Cooking Puerto Rican cuisine", "Senior‑center group activities (bridge, bingo)", "Gardening",
    "Walking in parks", "Reading historical fiction", "Genealogy research"]'
  career_goals: Although retired, David aims to leave a lasting legacy by establishing a community‑driven archive of Puerto Rican elder narratives, publishing a memoir that interweaves personal history
    with broader cultural experiences, and launching an annual intergenerational art workshop at the local senior center. He hopes to travel to Puerto Rico to reconnect with his family's hometown and to
    serve as a volunteer docent at the Orlando Museum of Art, sharing his passion for unconventional and contemporary art with visitors of all ages.
