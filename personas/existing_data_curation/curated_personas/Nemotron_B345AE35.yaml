personas:
  professional: Elizabeth Everage, a seasoned auditor with four decades of experience in GAAP compliance and nonprofit financial stewardship, blends meticulous analytic rigor with her love of art by designing
    creative grant budgets and mentoring junior accountants in a relaxed, collaborative atmosphere that values flexibility over strict timelines.
  sports: Elizabeth Everage enjoys low‑impact exercise such as daily walks on the nearby nature preserve, participates in a seasonal senior tennis league at the Morris County Community Center, and avidly
    follows the New York Giants, New Jersey Devils, and New York Yankees, cheering them on from her living room while occasionally missing the occasional yoga class due to a tendency to over‑commit socially.
  arts: Elizabeth Everage, an avid patron of the arts, frequents the Montclair Art Museum to view Impressionist works by Monet and Renoir, acts in community theater productions of classic plays like "Our
    Town," follows the music of Barbra Streisand and enjoys reading biographies of Frida Kahlo, all of which shape her identity and provide a creative sanctuary from auditing stresses.
  travel: Elizabeth Everage prefers leisurely, well‑planned trips that combine historic immersion and natural beauty, having taken guided tours of Rome’s ancient ruins, a garden‑focused vacation in Kyoto’s
    cherry‑blossom season, and a road trip along the Hudson Valley’s historic estates, while balancing these adventures with her modest fixed income.
  culinary: Elizabeth Everage loves experimenting in the kitchen, especially with herb‑infused dishes like rosemary‑scented roasted chicken, lemon‑basil pasta primavera, and classic French ratatouille,
    often sourcing fresh thyme, sage, and lavender from her own garden to create seasonal menus for her bridge club potlucks.
  core: Elizabeth Everage embodies a curious, art‑loving accountant who balances meticulous financial oversight with a relaxed disorganization, a tendency to worry, and a penchant for garden‑fresh cooking,
    bridge games, and community theater.
background:
  cultural: Elizabeth was born and raised in the suburban communities of northern New Jersey during the post‑World War II era. Her family traces its roots to Irish and German ancestry, and she grew up in
    a middle‑class, predominantly Catholic environment that emphasized hard work, education, and community service. The cultural fabric of Morris County—a blend of traditional American values, strong civic
    duty, and a growing appreciation for the arts—has shaped her worldview. She participates in local holiday traditions, church gatherings, and volunteers at the community food bank. This upbringing fosters
    a balanced appreciation for reliable, conservative principles while remaining open to progressive ideas and unconventional thinking.
attributes:
