  hobbies: '["Watercolor painting", "Genealogy research", "Gardening (roses, native plants)", "Reading historical fiction", "Attending local theater and art exhibits", "Quilting and patchwork", "Cooking
    Southern cuisine", "Birdwatching", "Crossword puzzles", "Walking in community parks"]'
  career_goals: Although no longer in the formal workforce, Grace’s ambition is to stay mentally sharp, socially connected, and creatively fulfilled. She aims to complete a handwritten memoir of her family’s
    history and self‑publish it for future generations. She wants to expand her artistic repertoire by learning digital photography and using it to document community events and her garden. Grace hopes
    to launch a small intergenerational art workshop at the local senior center, mentoring teens and sharing her painting and quilting techniques. Maintaining her independence and health so she can continue
    volunteering at the Bowling Green Historical Museum is also a key goal.
