  career_goals: Although retired, Lanchi aims to remain a pillar of her senior center by leading health‑workshop series and mentoring new volunteers. She plans to complete a short certification in senior
    wellness to deepen her contribution. At home, she seeks to document and preserve her family's recipes and genealogical stories for future generations. Maintaining her independence and health through
    regular tai chi practice and routine medical check‑ups is also a priority. Ultimately, she hopes to see her grandchildren succeed academically while keeping her cultural heritage alive within the family.
