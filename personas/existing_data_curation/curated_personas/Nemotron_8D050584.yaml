  career_goals: Jake aims to advance to a shift‑supervisor role within the next two years, leveraging his experience to lead a team in applying continuous‑improvement initiatives that reduce waste and increase
    efficiency. He plans to obtain an OSHA Forklift Certification and enroll in a local community‑college associate program in industrial technology to broaden his technical knowledge. Ultimately, he envisions
    becoming a plant‑level quality‑assurance manager, where he can integrate his curiosity for new ideas with his commitment to reliable, organized production. At the same time, he wants to maintain a healthy
    work‑life balance that allows him to support his family and pursue his artistic interests.
