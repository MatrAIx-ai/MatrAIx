persona_description: William Johnston, ECSA President, 1971, was a prominent figure in the fight against apartheid in South Africa. He was the President of Episcopal Churchmen for South Africa (ECSA), a
  group that advocated for the rights of the African people in South Africa. Johnston testified before the United Nations Special Committee Against Apartheid regarding the South African government's actions
  against churchmen. His testimony likely shed light on the human rights violations committed by the apartheid regime and the efforts of the ECSA to support the African people. As an ECSA President, Johnston
  likely had a deep understanding of the challenges faced by the African people in South Africa and the need for international intervention to address these issues.
