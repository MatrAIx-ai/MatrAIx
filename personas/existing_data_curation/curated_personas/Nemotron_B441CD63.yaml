  hobbies: '[''Chess'', ''LEGO Technic building'', ''Coding with Scratch/Python'', ''Basketball'', ''Piano playing'', ''Reading engineering nonfiction'', ''Watching science documentaries'', ''Strategic
    video games (e.g., Civilization)'', ''Journaling'']'
  career_goals: Emmanuel aspires to pursue a career that offers clear structure, measurable progress, and opportunities for problem solving. He aims to attend a STEM‑focused high school, earn a scholarship
    in engineering, and eventually study mechanical or civil engineering at a reputable university. He is particularly interested in robotics and sustainable infrastructure, hoping to design systems that
    improve everyday life. His ambition includes obtaining certifications in computer programming and participating in engineering competitions to build a strong portfolio. Ultimately, he seeks a stable,
    well‑defined career path where his methodical approach and reliability are valued.
