  career_goals: Dolores aspires to transition into a curriculum specialist role where she can design district-wide arts-infused programs for elementary and middle schools. She plans to enroll in a master's
    program in Educational Leadership to gain administrative expertise, with the long-term goal of becoming a district arts coordinator or principal who champions interdisciplinary learning and mental-health
    supportive policies. She also hopes to present her integrative lesson models at regional and national education conferences, and to publish a guide on incorporating mindfulness into elementary classrooms.
