    management'', ''Report writing'', ''Critical thinking'', ''Creative problem solving'', ''Interpersonal communication'']'
  hobbies: '[''Watercolor painting (landscape and abstract)'', ''Sketching and drawing'', ''Creative writing (short speculative fiction)'', ''Reading science fiction and poetry'', ''Visiting art galleries
    and theater'', ''Yoga and mindfulness meditation'', ''Hiking (Mauna Loa trails)'', ''Snorkeling'', ''Photography'', ''Strategic board games'', ''Volunteering for after‑school financial literacy programs'']'
  career_goals: Amber aims to become a Certified Public Accountant within the next two years and leverage that credential to move into a senior auditor role at a firm that serves nonprofit and educational
    clients. Her long‑term ambition is to take on a financial leadership position—such as Controller or CFO—within an educational organization or a community‑focused nonprofit in Hawaii, where she can integrate
    her expertise in finance with her passion for learning and curriculum design. She also envisions developing a series of financial‑literacy workshops and online courses tailored for teachers and students,
    using her instructional design skills to make accounting concepts accessible and engaging. Balancing career advancement with mental‑health and creative fulfillment is a core priority, so she plans to
    adopt flexible work arrangements and mentor junior staff to foster a supportive, collaborative workplace.
