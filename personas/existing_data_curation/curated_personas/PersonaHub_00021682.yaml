persona_description: An aerospace engineer who specializes in the study of tribological behavior of red mud composite coatings. He is interested in understanding the morphological behavior and erosion wear
  characteristics of the coatings during plasma spraying. His research interests include the wear behavior of ceramic coatings against various substrates, the impact of solid particles on the coatings,
  and the development of wear-resistant coatings for aerospace applications.
