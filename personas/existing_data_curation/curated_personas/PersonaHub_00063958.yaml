persona_description: A healthcare attorney who specializes in representing nursing home residents who have suffered from bedsores or decubitus ulcers. The attorney has experience working with nursing homes
  in the greater Jacksonville area and has a deep understanding of the legal and medical aspects of these cases. The attorney is particularly interested in cases involving residents who have been operated
  on for bedsores but are still developing or worsening, and who have not received the appropriate care. The attorney is also interested in cases involving residents who have been operated on for bedsores
  but have not received the appropriate follow-up care, and who have not recovered from the surgery. The attorney is dedicated to obtaining justice for nursing home residents who have suffered from bedsores,
  and is willing to work tirelessly to ensure that the residents receive the care and attention they deserve.
