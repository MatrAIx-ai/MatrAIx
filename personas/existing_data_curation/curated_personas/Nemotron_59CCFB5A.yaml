personas:
  professional: Rae Pearson, a two‑year‑old who delights in arranging shape‑sorting blocks with the precision of a tiny engineer, meticulously plans each tower’s construction, competes with peers to build
    the tallest structure, and adheres to a daily play‑schedule that reflects a strong preference for structure and predictability, and they often repeat the steps to perfect their designs.
  sports: Rae Pearson, a two‑year‑old who thrives on the swing set at the local park, participates in a toddler gymnastics class at the community center, and avidly supports the Chicago Cubs and the Chicago
    Bulls, often wearing their caps while playing, and they always line up for the game with a determined grin.
  arts: Rae Pearson, a two‑year‑old who enjoys the whimsical tunes of Raffi, watches Sesame Street with rapt attention, and creates bold crayon scribbles inspired by Van Gogh’s Starry Night, using music
    and color to express a vivid inner world despite occasional anxiety‑driven moods, and they often hum the tunes while drawing, turning anxiety into creative bursts.
  travel: Rae Pearson, a two‑year‑old who loves family road trips to the nearby aquarium, has visited the Grand Canyon, and dreams of a beach holiday in Hawaii, preferring itineraries with familiar routines,
    frequent rest stops, and the comfort of a favorite stuffed animal, and they ask to see the sea when they hear about waves.
  culinary: Rae Pearson, a two‑year‑old who prefers smooth mashed sweet potatoes, bite‑size cheese cubes, and strawberry yogurt, can assemble a simple peanut‑butter toast with a plastic spatula under supervision,
    and consistently avoids spicy foods like jalapeños, favoring predictable, mild flavors, and they proudly finish their plate when the flavors match expectations.
  core: Rae Pearson, a two‑year‑old bundle of structured curiosity, meticulously organizes play, budgets snack portions, battles intense anxiety when routines break, and competes fiercely even in toddler
    games, making every day a blend of methodical order and emotional turbulence, and they navigate each challenge with a mix of meticulous planning and impulsive emotional spikes.
background:
  cultural: Rae is raised in a predominantly white, Anglo‑American household in Juneau, Alaska, with family roots tracing back to Scandinavian and Irish ancestors who settled in the Pacific Northwest. Her
    family embraces typical American traditions such as Thanksgiving, Christmas, and birthday celebrations, while also honoring the unique Alaskan environment through seasonal activities like salmon fishing
    trips, hiking in the Tongass National Forest, and community events that sometimes feature Tlingit cultural performances. This blend of mainstream American customs and close‑knit Alaskan community life
    shapes her worldview, fostering a respect for nature, a sense of belonging in a small town, and an appreciation for diverse cultural expressions.
attributes:
  skills: '[''fine motor coordination (stacking blocks, scribbling)'', ''basic color and shape identification'', ''ordering and sorting toys by size or hue'', ''early numeracy (counting objects)'', ''simple
    sentence formation and vocabulary building'', ''routine adherence and predictability'']'
  hobbies: '[''shape-sorting toys'', ''block building'', ''simple animal puzzles'', ''observing marine wildlife'', ''listening to lullabies and nursery rhymes'', ''quiet play with a stuffed bear'', ''storytime
    at the library'']'
  career_goals: Although still very young, Rae’s playful imagination already hints at future ambitions that align with her love of order and predictability. She often talks about wanting to be a librarian
    or a data organizer when she grows up, envisioning herself arranging books or numbers in perfect rows. Her fascination with the marine life around Juneau also sparks a budding interest in becoming a
    marine scientist or a wildlife ranger, roles that would let her bring systematic care to Alaska's natural world. In all these aspirations, she aims to create structured environments where she feels
    secure and can help others thrive.
