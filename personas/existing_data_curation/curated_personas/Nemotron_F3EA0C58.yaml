personas:
  professional: Ottavio Niad, a retired handyman turned community organizer, leverages his carpentry, automotive repair, and gardening expertise to lead senior‑center projects, while his spontaneous, competitive
    streak fuels a lively, sometimes chaotic approach to coordinating events and mentoring volunteers.
  sports: Ottavio Niad is a regular at Jacksonville Jaguars tailgates, a fervent supporter of the Florida Gators, competes in the senior bowling league at the local alley, and joins a weekend fishing crew
    on the St. Johns River, balancing his love of competition with group camaraderie.
  arts: Ottavio Niad spins classic rock from The Rolling Stones and jazz from Miles Davis on a portable record player while photographing Florida sunsets, admires Ansel Adams’ composition, and occasionally
    attends community theater performances starring local talent.
  travel: Ottavio Niad dreams of cruising the Intracoastal Waterway to Amelia Island and the Everglades, has already taken day trips to Key West and Sanibel Island, and prefers day‑long boat outings over
    long‑haul flights, budgeting his travels around the senior‑center schedule.
  culinary: Ottavio Niad favors grilling shrimp skewers, stone‑crab claws, and seasoned pork ribs, incorporates home‑grown tomatoes and basil into his sauces, and rates a perfectly charred steak higher
    than any restaurant, though he often forgets to turn the grill off after a night of stories.
  core: Ottavio Niad blends restless curiosity with practical hands‑on skills, a love of community gatherings, and a worry‑prone heart that sometimes leads to missed deadlines and extra grill fuel.
background:
  cultural: Ottavio comes from a white, Italian‑American family that has lived in the Southeast for several generations. Raised in a Catholic household, he grew up with the values of hospitality, family
    loyalty, and community service that are common in both his heritage and in Jacksonville’s Southern culture. He celebrates traditional holidays such as Christmas and Easter with large family meals, participates
    in local festivals like the Riverside Arts Market, and maintains a respect for the region’s history and natural environment.
