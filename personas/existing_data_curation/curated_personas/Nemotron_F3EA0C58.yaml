  hobbies: '[''Bowling'', ''Bridge club'', ''Fishing'', ''Gardening'', ''Barbecuing'', ''Attending sports events (Jaguars, Gators)'', ''Hiking in local nature preserves'', ''Digital photography'', ''Listening
    to classic rock and jazz'']'
  career_goals: Although retired, Ottavio aims to stay actively engaged in his community and to leave a lasting imprint on his family and neighbourhood. He hopes to mentor younger volunteers at the senior
    centre, document his family’s oral history, and eventually publish a short memoir of life in Jacksonville. He also aspires to travel the coastal waterways of Florida by boat, improve his digital photography
    skills, and win a senior division title in the local bowling league. Managing his worry and stress, he seeks to adopt simple daily routines that balance his spontaneous spirit with a bit more structure.
