persona_description: A scientist who specializes in the study of slugs and their populations, particularly in the UK. He has a background in entomology and has worked extensively with the invasive species
  Arion vulgaris, also known as the Spanish slug or the killer slug. He is currently leading research into the species and its potential impacts on native species and agriculture. He has a keen interest
  in the use of genomic analysis to understand the genetic structure of the species and its susceptibility to control measures.
