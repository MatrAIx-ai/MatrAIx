  career_goals: Although retired, Cheryl is determined to stay independent and purposeful. She aims to complete a written memoir that chronicles her family’s history and the changes she has witnessed in
    Gresham over the decades. She also aspires to enhance her digital skills further, mastering new communication tools to keep in touch with her grandchildren. A key ambition is to advocate for better
    senior services in Multnomah County, leveraging her organizational talents to lobby for accessible transportation and health resources for older adults. Maintaining her health, reducing stress through
    routine, and ensuring her estate planning remains up‑to‑date are also central to her goals.
