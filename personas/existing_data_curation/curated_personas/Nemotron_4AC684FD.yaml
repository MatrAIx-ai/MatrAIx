  career_goals: Phyllis dreams of exploring a future where she can combine her love for art and curiosity about the natural world. She imagines becoming an illustrator who creates books about wildlife,
    or a marine biologist who uses drawings to document sea life. In the short term, she aims to deepen her drawing skills, learn more about coding, and participate in school science fairs, laying the groundwork
    for a career that blends creativity and scientific inquiry.
