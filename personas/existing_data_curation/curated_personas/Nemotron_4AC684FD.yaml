personas:
  professional: Phyllis Walters, an aspiring junior architect and storyteller, channels their boundless curiosity and methodical planning into constructing intricate LEGO cities and crafting simple games
    on Scratch, where they demonstrate early problem‑solving skills and a collaborative, harmony‑focused approach.
  sports: Phyllis Walters plays on the Irvine Junior Strikers soccer team in the spring, attends Los Angeles Dodgers games with family in the summer, and goes on weekend bike rides in local parks, blending
    team spirit with a love for outdoor activity.
  arts: Phyllis Walters paints watercolor scenes from Dr. Seuss books, enjoys listening to children's singer‑songwriter Laurie Berkner, and watches Pixar’s "Toy Story" and Studio Ghibli’s "My Neighbor Totoro",
    letting these artistic influences shape their imaginative play and sketching.
  travel: Phyllis Walters loves weekend trips to Newport Beach’s tide pools, family camping at Crystal Cove State Park, and dreams of traveling to Disneyland Paris, preferring well‑planned outings that
    blend adventure with familiar comforts.
  culinary: Phyllis Walters delights in making peanut butter‑banana sandwiches, topping pizza with pepperoni and extra cheese, and experimenting with no‑bake cookies using oats, honey, and chocolate chips,
    showing a budding enthusiasm for simple cooking.
  core: Phyllis Walters is a curious, organized eight‑year‑old who balances LEGO building and library adventures with a knack for saving allowance, a love for nature, and a quiet determination to keep their
    crayons neat.
background:
  cultural: Phyllis comes from a white, middle‑class family in Irvine, California. Her household reflects the suburban Californian lifestyle, with emphasis on education, community involvement, and exposure
    to diverse cultural experiences common in Orange County. She participates in school events, local library programs, and neighborhood community activities that celebrate both American traditions and
    the multicultural environment of Southern California.
