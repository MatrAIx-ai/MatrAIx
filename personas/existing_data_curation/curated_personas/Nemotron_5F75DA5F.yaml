  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Volunteering at the library (assisting Spanish-speaking patrons)'', ''Reading non-fiction (local history, technology)'', ''Hiking'', ''Genealogy
    research'']'
  career_goals: Chris aims to deepen his administrative expertise and move into a supervisory role within a municipal office, healthcare facility, or nonprofit organization. He plans to earn a Certified
    Administrative Professional (CAP) credential, develop advanced customer-service training modules, and leverage his bilingual skills to serve as a community outreach coordinator for Spanish-speaking
    residents. Over the next few years, he hopes to mentor new staff, improve office efficiency processes, and eventually contribute to strategic planning for community information services.
