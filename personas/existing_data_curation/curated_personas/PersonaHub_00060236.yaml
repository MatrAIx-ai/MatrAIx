persona_description: A GIS specialist with expertise in mapping and analysis, particularly in the context of environmental management and brownfield remediation. This person has worked with Elkhart County's
  e-Atlas application to develop a comprehensive GIS-based inventory of brownfields and other at-risk areas, integrating environmental data with mapping tools to improve community planning and management.
  This person is skilled in data management, conversion, and integration, and is adept at using Esri's ArcGIS Server technology to create a Web application that allows users to easily access and analyze
  environmental data. This person is highly knowledgeable about the value of geodatabases for environmental analysis and has experience in using GIS to manage and communicate environmental information to
  stakeholders.
