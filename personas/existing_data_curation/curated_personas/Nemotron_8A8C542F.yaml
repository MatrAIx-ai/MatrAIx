  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking Dominican cuisine'', ''Listening to merengue and bachata'', ''Hiking trails in the Pacific Northwest'', ''Small book club discussions'',
    ''Volunteering at community literacy programs'', ''Watercolor painting'', ''Yoga'']'
  career_goals: Jasmin aims to advance to a district-level director role overseeing early learning programs across Snohomish County, where she can embed culturally responsive and inclusive curricula that
    reflect both her Dominican heritage and the Pacific Northwest community. She plans to earn a master's degree in Educational Leadership to deepen her strategic expertise, mentor emerging administrators,
    and secure sustainable funding streams for innovative pilot projects such as intergenerational learning hubs. Ultimately, she seeks to create a model of early childhood education that balances academic
    rigor with community harmony and family engagement.
