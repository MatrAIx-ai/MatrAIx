persona_description: A cardiologist who specializes in the study of aortic valve disease and has conducted research on the genetic link between high levels of a cholesterol-like substance called Lp(a) and
  the development of this condition. The researcher is interested in the potential for targeted medications to slow the progression of valve disease and reduce the need for valve surgery in patients. The
  research was funded by grants from various organizations, including the Canadian Institutes of Health Research and the National Heart, Lung, and Blood Institute.
