personas:
  professional: Sherry Mcclellan is a junior IT support specialist whose knack for diagnosing Windows and macOS issues is complemented by a flair for creating clear, empathy‑driven visual guides and UI
    mockups, and they aim to transition into a UX design role that merges technical precision with whimsical storytelling.
  sports: Sherry Mcclellan stays active with weekly yoga classes and occasional community volleyball games, is a devoted fan of the New Orleans Saints and the LSU Tigers, and rides with the Crescent City
    Cyclists when the weather permits, though their schedule often pushes exercise to the back of the list.
  arts: Sherry Mcclellan spends evenings watercolor‑painting whimsical scenes, crafting digital illustrations inspired by N.K. Jemisin’s speculative worlds, attending Zydeco nights featuring The Red Stick
    Ramblers, and quoting poetry by Ocean Vuong while curating a growing Pinterest board of Banksy street art.
  travel: Sherry Mcclellan prefers short, immersive trips to art‑rich destinations such as New Orleans for Mardi Gras, Austin for SXSW, and plans a future pilgrimage to Kyoto to explore traditional Japanese
    ink painting, but tight finances often confine them to weekend getaways.
  culinary: Sherry Mcclellan delights in simmering hearty gumbo with fresh crawfish, experimenting with vegan twists on classic étouffée, and pairing meals with locally roasted coffee, yet they often reach
    for comfort snacks like beignets when stressed.
  core: Sherry Mcclellan is an emotionally sensitive, imagination‑driven tech support whiz who channels anxiety into inclusive design, art, and community service while battling a habit of late‑night caffeine
    binges and impulsive art‑supply purchases.
background:
  cultural: Sherry grew up in Thibodaux, Louisiana, a close‑knit town in Assumption Parish with deep Southern roots and a blend of Cajun and Creole influences. Her family is of Anglo‑American descent, and
    she was raised in a modest, middle‑class household that valued community, family gatherings, and church involvement. The local culture, emphasizing hospitality, traditional cuisine such as gumbo and
    boudin, and celebrations like Mardi Gras and regional music festivals, shaped her appreciation for collective harmony and cultural expression. Proximity to the LSU campus exposed her to academic curiosity
    and a diverse student body, fostering her imaginative outlook while reinforcing the importance of helping neighbors and maintaining a supportive community.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Network connectivity diagnostics'', ''Remote desktop support'', ''Basic IT security practices'', ''Empathetic customer
    communication'', ''Technical documentation and visual guide creation'', ''Digital illustration and UI mockup design'', ''Time management and workflow organization'', ''Basic scripting (PowerShell, Bash)'']'
  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Speculative fiction reading'', ''Creative writing'', ''Attending local art fairs and Zydeco concerts'', ''Yoga and mindfulness meditation'',
    ''Journaling'', ''Volunteering to teach basic computer skills'', ''Tabletop role‑playing games'', ''Exploring emerging tech gadgets'']'
  career_goals: Sherry aims to complete her bachelor's degree in Information Technology with a focus on user experience and human‑computer interaction. In the next few years, she hopes to transition from
    a support role into a UI/UX design or product development position where she can merge her technical expertise with her artistic imagination. She aspires to lead projects that create accessible digital
    tools for underserved communities, potentially launching a nonprofit tech‑support service for low‑income families. Long‑term, Sherry envisions a senior role such as UX Lead, Solutions Architect, or
    IT Manager, driving innovative, empathy‑driven solutions that prioritize inclusivity and user well‑being.
