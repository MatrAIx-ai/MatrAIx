  career_goals: Paquita aims to achieve tenure within the next five years while establishing a research program focused on inclusive STEM pedagogy and sustainable engineering solutions. She aspires to secure
    a major grant to expand community‑based STEM outreach for underrepresented high‑school students in the Twin Cities area. Additionally, she hopes to design a mentorship pipeline that connects undergraduate
    students with graduate mentors, publish influential studies on teaching practices, and embed mental‑health support structures into the department’s culture.
