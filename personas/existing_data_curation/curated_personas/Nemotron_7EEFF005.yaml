  career_goals: Martha aims to progress from senior developer to solutions architect within the next three years, leveraging her cloud and micro‑service expertise to shape enterprise‑scale platforms. She
    intends to earn advanced certifications (AWS Certified Solutions Architect – Professional, Certified Kubernetes Administrator) and deepen her competence in AI‑enabled services to lead cross‑functional
    teams on data‑driven product initiatives. Long‑term, Martha aspires to a principal engineer or technology director role where she can mentor emerging talent, champion sustainable development practices,
    and influence strategic roadmaps. Her practical mindset guides her to set clear milestones, while her curiosity encourages her to explore innovative domains such as serverless architectures and edge
    computing.
