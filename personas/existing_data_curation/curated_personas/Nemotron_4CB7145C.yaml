    tools)'']'
  hobbies: '[''amateur radio (ham radio)'', ''home audio system building'', ''fishing'', ''hiking local trails'', ''pickup basketball'', ''live music shows'', ''sci‑fi movies'', ''classic rock listening'',
    ''video gaming (FPS)'', ''grilling and BBQ'']'
  career_goals: Gary aims to become a lead field technician and eventually a project supervisor within the next five years, leveraging his competitive drive to earn advanced certifications such as BICSI
    Installer and Designer credentials and FCC Technician licenses. He envisions starting his own small contracting firm that specializes in smart-home and small-cell telecommunications installations for
    residential and commercial clients in the Greater Boston area. To achieve this, he plans to improve his organizational skills, build a reliable network of subcontractors, and stay at the forefront of
    new communication technologies.
