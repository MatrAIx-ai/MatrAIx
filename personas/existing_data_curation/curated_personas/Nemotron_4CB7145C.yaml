personas:
  professional: Gary Davis is a field technician specializing in RF and fiber optic installations, renowned for their rapid on‑site troubleshooting, competitive push for BICSI and FCC certifications, and
    a relaxed scheduling style that sometimes clashes with client expectations.
  sports: Gary Davis is a devoted fan of the Boston Celtics, New England Patriots, and Boston Red Sox, plays pickup basketball with the Back Bay Basket league at the community center, hikes with the Boston
    Hiking Club in the autumn, and spends weekends fishing with the Massachusetts Anglers Association, treating fitness as a flexible outlet rather than a regimented regimen.
  arts: Gary Davis enjoys classic rock legends like Led Zeppelin, Pink Floyd, and David Bowie while frequenting live shows at The Sinclair and Paradise Rock Club, unwinds with sci‑fi films such as Blade
    Runner and The Matrix, and occasionally dabbles in DIY audio art installations inspired by avant‑garde soundscapes.
  travel: Gary Davis prefers spontaneous road trips to New England gems like Acadia National Park and Cape Cod, dreams of exploring Tokyo’s tech districts and Reykjavik’s geothermal pools, but usually plans
    vacations on a shoestring budget, balancing his love of adventure with the practical need to fund his future contracting business.
  culinary: Gary Davis favors outdoor grilling, regularly mastering dishes like smoky barbecue ribs, honey‑glazed pork chops, and classic New England clam chowder, and while their cooking skill is solid
    enough for a well‑seasoned grill, they often experiment with hickory wood chips and homemade spice rubs as a creative counterpart to their electronic tinkering.
  core: Gary Davis is a curious, hands‑on tech enthusiast whose competitive drive fuels a relentless pursuit of new certifications, yet their laid‑back, sometimes chaotic, approach to scheduling and budgeting
    means they’re as likely to finish a custom audio build as to forget a dentist appointment.
background:
  cultural: Gary grew up in a modest, working‑class family in the Boston suburbs, reflecting a typical New England white American background. His upbringing emphasized self‑reliance, a strong work ethic,
    and community involvement, values that persist in his practical, competitive nature. He identifies with the regional culture of modesty blended with a love for local sports, seasonal outdoor activities,
    and a straightforward, no‑frills communication style.
attributes:
  skills: '[''RF signal testing'', ''fiber optic splicing'', ''network troubleshooting'', ''reading schematics and blueprints'', ''use of spectrum analyzers'', ''FCC compliance'', ''OSHA safety procedures'',
