  career_goals: Samar aims to transition into a senior engineering role where she can lead a small, supportive team focused on inclusive products, especially tools that address mental‑health and emotional
    wellbeing. She plans to pursue a master's in Human‑Computer Interaction to deepen her expertise in user‑centered design, and she hopes to mentor junior developers from underrepresented backgrounds,
    reflecting her cooperative yet assertive nature. Balancing her desire for predictable, stable work environments, she also envisions launching a side project—a bilingual digital storybook platform for
    Vietnamese diaspora children—allowing her creative spontaneity to flourish alongside structured career growth.
