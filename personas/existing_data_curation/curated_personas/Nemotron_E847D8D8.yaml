personas:
  professional: Andrea Mendez is a meticulous full‑stack developer fluent in Python, JavaScript, and Java, who applies Agile rigor and clean‑code principles to build accessible web apps for rural communities,
    while mentoring junior coders and leading tech workshops at the local community center.
  sports: Andrea Mendez enjoys weekend hikes on the Piedmont trails with the Georgia Trail Hikers club, follows the Atlanta Falcons and Georgia Bulldogs for football, and maintains a structured fitness
    routine that includes morning jogs and weekly yoga sessions to balance screen time.
  arts: Andrea Mendez frequently attends live gospel choir performances at the local church, enjoys jazz evenings at the town hall featuring artists like Wynton Marsalis, and participates in a weekly book
    club that delves into contemporary American literature, all of which fuel their creative coding inspirations.
  travel: Andrea Mendez favors road‑trip itineraries that blend cultural immersion—like a culinary tour of New Orleans and a weekend exploring Asheville’s art scene—with careful budgeting, and they dream
    of hiking the Appalachian Trail while still maintaining family responsibilities back home.
  culinary: Andrea Mendez loves cooking fragrant dishes such as plantain‑topped chicken stew, roasted sweet potatoes with a touch of cumin, and grilled corn on the cob drizzled with lime and chili, and
    they experiment with these flavors while perfecting a weekend batch of homemade salsa.
  core: Andrea Mendez blends methodical engineering with community‑centered compassion, balancing a love for structured problem‑solving, meticulous budgeting, and a penchant for gospel rhythms and spicy
    home‑cooked meals.
background:
  cultural: Andrea grew up in a multicultural household in Unadilla, Georgia. Her mother is African‑American and her father is of Colombian descent, giving her a blend of Black Southern traditions and Latino
    cultural influences. She was raised attending a local Baptist church, where communal service and gospel music were integral parts of family life. The rich oral storytelling heritage of the African‑American
    community, combined with the rhythmic beats and vibrant cuisine from her father's heritage, shaped Andrea’s worldview. She takes pride in her identity as a Black woman in tech, actively participating
    in local chapters of Black Girls CODE and Afro‑Latina professional networks. The supportive close‑knit community of Houston County, with its emphasis on family, faith, and mutual aid, continues to inform
    her values of compassion, cooperation, and dedication to uplifting others.
