  career_goals: Andrea aims to become a senior software engineer within the next three years, focusing on creating accessible, user‑friendly applications that serve underserved communities in rural Georgia.
    She plans to earn certifications in cloud computing (AWS Solutions Architect) and cybersecurity to broaden her expertise. Long‑term, she hopes to lead a development team or launch a nonprofit tech initiative
    that provides free coding education and digital resources to young Black and Latino youth. She is also interested in product management, wanting to shape technology strategy that balances technical
    excellence with social impact.
