  hobbies: '[''Gardening'', ''Reading mystery and historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Bridge (card game)'', ''Walking nature trails'', ''Cooking Southern comfort food'', ''Volunteering
    at food pantry'']'
  career_goals: Tina aims to transition from a helper role to a supervisory position within the next few years, targeting a shift lead or team coordinator role at her current plant. She plans to attain
    OSHA safety certification and a certified forklift operator credential to strengthen her qualifications. Beyond promotion, she hopes to develop leadership skills that allow her to mentor younger employees
    and eventually move into a logistics or operations planning role, leveraging her practical knowledge of production processes. Financial stability and greater autonomy are also key motivations as she
    navigates her separated status.
