  hobbies: '[''Reading theological and philosophical works'', ''Hiking local trails'', ''Playing acoustic guitar'', ''Photography'', ''Journaling'', ''Cooking simple meals'', ''Small‑group Bible study participation'',
    ''Board‑game nights with friends'', ''Volunteer community service'', ''Casual video gaming'']'
  career_goals: Joseph aims to continue his religious education, possibly attending a seminary, with the long‑term goal of becoming an ordained pastor who leads a modest congregation in the Midwest. He
    hopes to develop a robust youth program that blends contemporary issues with traditional teachings, and eventually take on a leadership role that allows him to mentor other young clergy while maintaining
    the flexibility he values.
