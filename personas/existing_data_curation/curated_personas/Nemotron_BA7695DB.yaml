personas:
  professional: Flora Mart, a seasoned marketing leader with a STEM‑based analytical foundation, leverages data‑driven strategic planning, Agile project management, and a compassionate, collaborative style
    to deliver integrated campaigns while mentoring mid‑career women on the path to senior leadership.
  sports: Flora Mart channels her energy into leading a weekly walking group on the Allegheny trails, pitches in with a local co‑ed softball league in the spring, and cheers loudly for the Pittsburgh Steelers,
    Penguins, and Pirates while never missing the annual charity 5K run.
  arts: Flora Mart cultivates a love for the arts by crafting pottery at weekend studio sessions, attending live shows featuring John Legend and local folk band The Nittany Aires, and regularly discussing
    Shakespeare’s sonnets at the PTA book club, all of which feed her creative spark.
  travel: Flora Mart prefers well‑planned road trips that mix scenic drives through the Pennsylvania countryside with stops in New York City and Asheville, has already explored Kyoto’s gardens, and hopes
    to schedule a summer escape to the Amalfi Coast once her consultancy launch stabilizes.
  culinary: Flora Mart delights in farm‑to‑table cooking, turning garden harvests of heirloom tomatoes, carrots, and kale into hearty vegetable lasagna and rosemary‑roasted chicken, while curating potluck
    spreads that feature her signature maple‑glazed pumpkin soup.
  core: Flora Mart navigates life with data‑driven precision, community‑first compassion, a habit of over‑booking her calendar, and a secret love for binge‑watching true‑crime documentaries on quiet evenings.
background:
  cultural: Flora grew up in a suburban, middle‑class white family in Western Pennsylvania, with deep roots in the region’s Scottish‑Irish immigrant heritage. The community’s emphasis on hard work, self‑reliance,
    and neighborly support shaped her values. She celebrates traditional holidays such as Thanksgiving and the Fourth of July with family gatherings, and participates in local church and community events
    that reflect the area’s blend of Protestant and secular civic traditions. Her upbringing emphasized education, modesty, and civic duty, which continues to influence her professional ethos and community
    involvement.
