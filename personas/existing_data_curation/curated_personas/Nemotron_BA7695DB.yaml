  career_goals: Flora aims to advance to a senior director or vice‑president of Marketing role within the next five years, overseeing multi‑channel strategy for a regional or national consumer brand. She
    wants to spearhead data‑centric decision making, integrate CSR into core brand messaging, and build a high‑performing, inclusive marketing team. She also plans to earn an executive MBA and become a
    recognized mentor for mid‑career women in marketing. Post‑retirement, she envisions launching a boutique consultancy that helps small businesses and nonprofits craft community‑focused marketing campaigns.
