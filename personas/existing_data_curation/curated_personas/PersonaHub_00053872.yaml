persona_description: A geologist who specializes in the study of sedimentary rocks, particularly those formed in the Upper Cretaceous period. He is interested in the formation and preservation of fossils
  and the study of sclerobionts, organisms that live on or in a hard substrate. He has a project to revisit a locality where an extensive bed of hiatus concretions, most of them bored or encrusted by sclerobionts,
  is found between the Zihor and Menuha formations in the Upper Cretaceous. He has collected more information about these Cretaceous cobbles and has found more sclerobionts and other associated fossils.
