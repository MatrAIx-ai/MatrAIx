  hobbies: '[''Woodworking hobby projects'', ''Soccer'', ''Cuban music and dancing'', ''Cooking Cuban cuisine'', ''Fishing in the Comal River'', ''Hill Country hiking'', ''Chess and strategy board games'']'
  career_goals: Carlos aims to become a certified master carpenter within the next five years, earning NCCER credentials and completing a construction management associate degree. He plans to transition
    to a foreman role on larger residential projects, eventually launching his own contracting business that specializes in energy‑efficient homes and bespoke furniture for the San Marcos area. He is also
    interested in mentoring apprentices and contributing to community building projects through Habitat for Humanity.
