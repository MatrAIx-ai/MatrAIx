personas:
  professional: Carlos Bonillarodriguez, a 19‑year‑old aspiring master carpenter, harnesses their precise measurement skills, blueprint interpretation, and methodical project planning to craft custom guitars
    and coffee tables, while their competitive, skeptical nature drives them to double‑check every joint and safety protocol as they work toward NCCER certification and a future foreman role.
  sports: Carlos Bonillarodriguez anchors the San Marcos Strikers youth soccer team, tracks the Texas Rangers and San Antonio Spurs, and supplements competitive match play with weekend hikes along the Hill
    Country trails and fishing trips on the Comal River, approaching fitness with the same disciplined conditioning and strategic mindset they apply to chess.
  arts: Carlos Bonillarodriguez draws creative fuel from building guitars while listening to Jimi Hendrix and Paco de Lucía, dances to salsa rhythms echoing Celia Cruz at community nights, and sharpens
    strategic thinking by studying Magnus Carlsen’s chess games, merging hands‑on craftsmanship with a deep appreciation for musical and intellectual art forms.
  travel: Carlos Bonillarodriguez favors meticulously mapped road trips that blend outdoor pursuits with cultural immersion, having spent long weekends exploring Austin’s live‑music venues, fishing in the
    Guadalupe River, and hiking Enchanted Rock, and they now eye a spring adventure to Cartagena to study Caribbean architecture and sustainable building techniques.
  culinary: Carlos Bonillarodriguez enjoys cooking traditional dishes such as ropa vieja, mojo‑marinated pork, and black beans with cumin and oregano, demonstrating intermediate kitchen skills by timing
    spice additions like a craftsman measuring cuts, and they often pair meals with locally roasted coffee while occasionally testing new recipes at friends’ gatherings.
  core: Carlos Bonillarodriguez is a methodical 19‑year‑old carpenter who combines a competitive edge with a love for salsa, chess, and custom woodworking, yet they obsessively double‑check measurements
    and over‑schedule every weekend, sometimes at the expense of spontaneous fun.
background:
  cultural: Carlos is a first‑generation Cuban‑American who grew up in a bilingual household, fluent in both Spanish and English. He carries forward the Cuban emphasis on family cohesion, hospitality, and
    a strong work ethic, often sharing meals and celebrations with extended relatives and the local Cuban community in Texas. His cultural heritage influences his aesthetic preferences, inspiring him to
    incorporate subtle Latin American design motifs into his carpentry work. He balances respect for his roots with an adaptive, pragmatic outlook shaped by his life in San Marcos and his practical, goal‑oriented
    personality.
