  hobbies: '[''Sketching and Watercolor Painting'', ''Visiting Art Galleries and Museums'', ''Cooking Traditional Honduran Dishes'', ''Photography (Street and Nature)'', ''Reading Contemporary Fiction and
    Philosophy'', ''Yoga and Meditation'', ''Journaling'', ''Bilingual Book Club'', ''Volunteering at Community Art Workshops'']'
  career_goals: Maria Andrea aims to complete a bachelor's degree in Arts Management or Communication within the next three years, with the goal of working in arts administration or community outreach for
    cultural institutions. She aspires to become a program coordinator for a museum or nonprofit that highlights Latin American art and supports immigrant communities. Long‑term, she envisions founding
    a community arts space in Peoria that offers workshops, exhibitions, and mentorship for young artists of diverse backgrounds. She also hopes to develop a bilingual online platform or blog that showcases
    Honduran culture, contemporary art, and social issues, leveraging her digital media skills. While ambitious, she prioritizes roles that allow a healthy work‑life balance to manage her stress and maintain
    personal well‑being.
