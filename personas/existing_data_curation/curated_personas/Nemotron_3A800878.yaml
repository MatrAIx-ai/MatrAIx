personas:
  professional: Maria Cuesta, an emerging arts management student with a flair for graphic design and community event coordination, merges meticulous organization with creative flexibility to produce engaging
    cultural programs and dynamic social media content for local institutions.
  sports: Maria Cuesta, a casual fitness enthusiast who enjoys weekend runs along the Illinois River, selects yoga classes at a local studio for flexibility and supports the Chicago Bulls, White Sox, and
    Bears as her go‑to professional sports teams, while occasionally joining a community intramural volleyball league.
  arts: Maria Cuesta, a dedicated visual arts explorer, spends weekends sketching watercolor pieces inspired by folk motifs and modern abstraction, visits the Peoria Riverfront Museum for contemporary exhibits,
    follows artists such as Yayoi Kusama, Frida Kahlo, and Banksy, and curates content for her blog using Adobe Photoshop.
  travel: Maria Cuesta, an adventurous yet budget‑aware traveler, prefers culturally immersive trips like a weekend art retreat in Oaxaca, a photography getaway to the lavender fields of Provence, and a
    hiking excursion in the Grand Canyon, planning most outings through detailed itineraries while leaving room for spontaneous street photography.
  culinary: Maria Cuesta, a moderately skilled home cook, revels in preparing traditional dishes like baleadas with refried beans, cheese, and salsa, as well as sopa de caracol seasoned with cilantro and
    lime, while experimenting with fresh herbs and seasonal vegetables to infuse contemporary twists into family recipes.
  core: Maria Cuesta blends a curious, organized spirit with a love for art, community service, and mindful self‑care, often juggling creative projects, tight budgets, and occasional bouts of worry.
background:
  cultural: Maria Andrea was born to Honduran immigrant parents and grew up in a bilingual household in Peoria. Her family maintains close ties to Honduran traditions, celebrating holidays like Día de la
    Independencia (September 15) with music, dance, and food. She speaks fluent Spanish and English, and her upbringing blends Central American values of family solidarity and community with Midwestern
    American customs. These dual influences shape her worldview, fostering an appreciation for cultural diversity and a desire to bridge her heritage with the broader community. She participates in local
    Honduran community events, such as the annual Feria Hondureña, and incorporates elements of her cultural background into her artistic projects and volunteer work.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Graphic Design (Canva, Photoshop)'', ''Research and Analytical Writing'', ''Community Event Planning'', ''Social Media Management'', ''Basic Web Development
