  career_goals: Matthew aims to move into a senior technology‑strategy role where he can shape the digital transformation agenda for his organization. He wants to lead cross‑functional teams that integrate
    emerging technologies—such as AI‑driven analytics and IoT—into existing enterprise systems while preserving reliability. Mentorship is a key ambition; he plans to coach junior analysts and foster a
    culture of continuous learning. Over the next five years he hopes to earn certifications in cloud architecture and enterprise architecture, publish thought‑leadership pieces on pragmatic innovation,
    and position himself for a VP of IT or Chief Technology Officer role at a mid‑size firm or consultancy. Throughout his advancement, he seeks to preserve the flexible work style that allows him to balance
    demanding projects with family time.
