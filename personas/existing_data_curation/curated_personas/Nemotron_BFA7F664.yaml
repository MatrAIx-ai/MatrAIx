  hobbies: '[''sketching and watercolor painting'', ''nature photography'', ''reading contemporary fiction and poetry'', ''reflective journaling'', ''watching documentary series on art and science'', ''learning
    basic Python coding'', ''mindfulness meditation'', ''participating in virtual illustration workshops'', ''listening to indie folk and ambient music'']'
  career_goals: Helen aspires to earn a bachelor’s degree in visual arts or communications, with an emphasis on illustration and storytelling. She hopes to build a freelance career that lets her create
    graphic novels, concept art, and content for independent publications, allowing her to work from home or quiet studio spaces. Over the long term, she is intrigued by the intersection of art and mental
    health and aims to gain additional training in art therapy so she can help others manage stress through creative expression. Throughout her path, she values autonomy, flexibility, and opportunities
    for deep, solitary creative immersion while remaining open to occasional collaborative projects that expand her artistic perspective.
