personas:
  professional: Emmett Calvo, though still an infant, already exhibits a strong preference for orderly environments, prompting caregivers to project a future as a data analyst or accountant where systematic
    thinking and meticulous attention to detail will serve them well.
  sports: Emmett Calvo, still learning to roll over, shows early enthusiasm for movement by swimming in parent‑guided infant swim classes and proudly wearing a soft‑cotton jersey of the local Seattle Mariners
    while also being a tiny fan of the nearby youth soccer club Little Kickers.
  arts: Emmett Calvo, an infant who calms to the lullabies of Mozart’s “Eine kleine Nachtmusik” and the soothing tones of the modern folk duo The Milk Carton Kids, spends playtime draped in a plush blanket
    printed with Van Gogh’s “Starry Night,” shaping a budding appreciation for both classical and contemporary music.
  travel: Emmett Calvo, a newborn who has already visited the family’s grandparents in the countryside and taken a weekend road trip to the nearby coastal town of Monterey, dreams—through their parents’
    stories—of one day seeing the bright lights of Tokyo and the serenity of Iceland’s geysers.
  culinary: Emmett Calvo, a newborn with a growing palate for sweet, smooth textures, delights in homemade carrot‑apple puree, avocado mash, and occasional oatmeal with a pinch of cinnamon, though they
    are notoriously picky about rejecting any spoon with a visible grain of rice, prompting parents to stealthily blend ingredients.
  core: Emotive, routine‑loving, and surprisingly meticulous for a newborn, Emmett Calvo balances a gentle disposition with a tendency toward worry, thriving in structured environments while occasionally
    succumbing to fussiness when routines are disrupted.
background:
  cultural: Emmett is raised in a white, middle‑class family in Appleton, Wisconsin, a community known for its Midwestern values of modesty, neighborliness, and a strong sense of local tradition. His cultural
