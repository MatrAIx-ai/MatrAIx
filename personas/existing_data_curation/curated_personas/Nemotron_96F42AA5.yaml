personas:
  professional: Eileen Herlihy is a seasoned civil engineer who, after three decades of designing stormwater systems and sustainable infrastructure across the Twin Cities, now channels their love of art
    and a harmony‑focused mediation style into consulting on resilient, community‑driven park redesigns while they mentor emerging women engineers.
  sports: Eileen Herlihy enjoys gentle fitness through weekly hikes at the Minnesota Landscape Arboretum and bird‑watching walks around the Chain of Lakes, while cheering quietly for the Minnesota Twins
    in spring and the Minnesota Vikings during football season, and they are a member of the local Minneapolis Trails Club.
  arts: Eileen Herlihy channels their curiosity into watercolor paintings of Lake Calhoun’s sunrise, draws inspiration from Monet and O'Keeffe at the Walker Art Center, and unwinds to the works of Beethoven
    and the Minnesota Orchestra, frequently joining intimate pottery workshops led by local artisans, and they often share their creations at community art shows.
  travel: Eileen Herlihy favors relaxed, small‑group getaways that blend nature and art, such as a weekend retreat in Santa Fe’s art colonies, a scenic drive through Michigan’s Upper Peninsula, and a loosely
    scheduled visit to the historic gardens of England’s Cotswolds, and they always prioritize a comfortable pace that accommodates occasional rest stops.
  culinary: Eileen Herlihy, an amateur home chef, relishes preparing wild‑rice pilaf with dried cranberries and almonds, a classic rhubarb crumble featuring fresh Minnesota rhubarb, and simmering salmon
    with dill and lemon, often pairing meals with a locally brewed pilsner, and they enjoy swapping recipes at the neighborhood potluck.
  core: Eileen Herlihy is a curiosity‑driven, art‑loving civil engineer who balances a relaxed, occasionally disorganized routine with a deep commitment to harmony, mentorship, and sustainable community
    design, and they approach each new project as a canvas for both function and beauty.
background:
  cultural: Eileen is a second‑generation Irish‑American whose family settled in the Midwest generations ago. Raised in Minneapolis, she absorbed a blend of Midwestern pragmatism and a vibrant local arts
    scene. Her Irish heritage fostered a love for storytelling, music, and community gatherings, while the progressive cultural fabric of the Twin Cities encouraged her openness to new ideas and unconventional
    thinking. She identifies with regional values of modesty, hard work, and cooperative spirit, yet embraces the city’s diverse influences—from Indigenous art to contemporary installations—reflecting a
    nuanced cultural identity.
