  career_goals: Approaching retirement, Eileen aims to transition into a consulting role that emphasizes resilient, environmentally friendly projects for the Twin Cities region. She hopes to mentor more
    women and underrepresented engineers, champion inclusive design practices, and lead a community‑driven redesign of a local park that blends art, ecology, and engineering. Additionally, she aspires to
    author a reflective memoir on her career and the interplay between engineering and community art, and to volunteer her expertise with non‑profits focused on sustainable urban development.
