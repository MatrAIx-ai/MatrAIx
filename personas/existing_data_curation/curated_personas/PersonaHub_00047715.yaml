persona_description: A finance manager who is responsible for overseeing the financial operations of a company and making decisions related to finance. They are skilled in maintaining balance between risk
  and profitability, coordinating various processes within the business, and analyzing financial statements. They are also knowledgeable in the use of financial institutions such as stock exchanges, capital
  markets, and other financial institutions, and have experience in choosing the sources of funds for the company. They are responsible for determining the financial needs of the enterprise and choosing
  the sources of funds, as well as interpreting financial statements and analyzing financial ratios to make decisions. They are also responsible for managing working capital and dividend policies, and reconciling
  the conflicting aims of investors and management.
