  hobbies: '["Gardening (vegetables and herbs)","Cooking Venezuelan cuisine","Playing chess","Listening to Venezuelan folk music (joropo, gaita)","Reading historical biographies","Walking in local parks","Volunteering
    as a tutor/mentor","Salsa dancing"]'
  career_goals: Although retired, Luis aims to leave a lasting legacy by mentoring younger engineers and STEM students, especially those from Latinx backgrounds, through volunteer workshops at the local
    community college. He aspires to document his life story and professional experiences in a memoir that celebrates both his Venezuelan heritage and his contributions to the New Jersey engineering community.
    Additionally, he seeks to spearhead a cross‑generational cultural‑STEM initiative that blends Venezuelan traditions with hands‑on science projects for seniors and youth alike.
