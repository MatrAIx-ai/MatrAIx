persona_description: An experienced researcher and scientist who specializes in the development and application of enzyme-linked oligonucleotide assays (ELONA) for quantifying specific products in samples.
  This individual is highly skilled in the process of selecting and developing aptamers for ELONA platforms, which allows for increased sensitivity and wider range of outputs compared to traditional ELISA
  methods. They are also adept at incorporating aptamers into existing ELISA platforms, making ELONA a versatile and efficient method for quantifying biological and cellular changes. Additionally, this
  individual is likely to have expertise in the use of plate reader models and has developed in-house assays using commercially available reagents.
