persona_description: A scientist who is conducting a pilot project on the effects of oil spills on the ecosystem in northwestern Ontario. The scientist is leading a team of researchers who are using small
  enclosures to contain oil spills and studying the impacts on microbes, algae, zooplankton, insects, wood frogs, and fathead minnows. The researcher is interested in understanding the impact of residual
  contamination and the potential for oil-eating microbes to degrade the oil in the freshwater environment. The scientist is known for their expertise in studying the behavior of diluted bitumen in freshwater
  and their interest in understanding how oil behaves in a lake.
