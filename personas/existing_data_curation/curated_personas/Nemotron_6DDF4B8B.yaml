personas:
  professional: A budding young illustrator named Linda Pinckney channels her curiosity about nature and disciplined love of organization into detailed bird and plant sketches, and, because they thrive
    on step‑by‑step structure, they plan each drawing like a LEGO set, hoping to publish a comic‑strip series by middle school.
  sports: A grassroots sports fan named Linda Pinckney cheers for the local youth soccer team, the Riverdale Rovers, keeps a scrapbook of baseball stats from the hometown minor league team, and attends
    weekend family bike rides along the river trail to stay active while preferring low‑key participation over competitive leagues.
  arts: An avid art enthusiast named Linda Pinckney spends afternoons sketching birds while listening to Miles Davis and Nina Simone, dives into graphic novels such as Kazu Kibuishi’s “Amulet”, enjoys classic
    tales like “The Wind in the Willows”, and participates in the school’s Tiny Artists Club where they share their creations with a close circle of peers.
  travel: A curious explorer named Linda Pinckney loves family hikes in the nearby Whispering Pines State Park, dreams of visiting the Grand Canyon and the historic Smithsonian museums in Washington, D.C.,
    and meticulously plans weekend trips with a printable checklist to ensure every sketchbook and snack is packed.
  culinary: A budding food critic named Linda Pinckney prefers simple yet vibrant meals, often making a grilled cheese sandwich with sharp cheddar and a side of carrot sticks, delighting in fresh berries
    like strawberries and blueberries, and occasionally experimenting with a kid‑friendly sushi roll using avocado and cucumber.
  core: Linda Pinckney, a nine‑year‑old with a disciplined eye for detail, blends quiet curiosity, a love for nature‑inspired art, and a cautious yet imaginative spirit into every sketch, savings plan,
    and bedtime routine.
background:
  cultural: Linda is raised in a proud African-American family in Tulsa, Oklahoma. Her grandparents share stories of resilience and community solidarity dating back to the early 20th century, including
    the legacy of the Tulsa race massacre and the subsequent cultural revival. Family gatherings often feature soulful cooking, gospel singing, and oral histories that emphasize kindness, cooperation, and
    the importance of education. Linda's parents encourage her curiosity by taking her to local museums, the Greenwood Cultural Center, and community art workshops, fostering a deep appreciation for her
    heritage and the broader Black artistic tradition.
