  career_goals: Linda dreams of a future where she can combine her love for animals, art, and science. She aspires to become a veterinarian who also educates children about animal welfare through illustrated
    books and interactive workshops. She imagines designing educational displays for museums, merging scientific curiosity with creative storytelling. Her disciplined mindset drives her to set long-term
    goals, such as mastering biology in middle school and honing her artistic skills for a career in science communication.
