persona_description: A scientist and environmentalist who is dedicated to preserving and documenting the rich cultural resources of the Channel Islands and the history of human settlement in the Americas.
  She is concerned about the potential loss of these artifacts due to rising sea levels and global warming. She is also interested in the study of prehistoric burials and ancient settlements, and the impact
  of climate change on these sites. She is a member of the Archaeological Institute of America and has experience working with the Channel Islands National Park.
