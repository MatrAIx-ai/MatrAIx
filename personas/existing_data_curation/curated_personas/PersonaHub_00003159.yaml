persona_description: A historian who specializes in the study of the Civil Rights Movement in the United States, particularly the case of the Laws Family and their fight for housing discrimination. The
  historian is interested in the legal and social implications of restrictive covenants and the impact of the U.S. Supreme Court's ruling in their favor. They are knowledgeable about the history of African-American
  rights and the Civil Rights Movement in California, and are interested in the role of media in documenting and preserving the history of the movement.
