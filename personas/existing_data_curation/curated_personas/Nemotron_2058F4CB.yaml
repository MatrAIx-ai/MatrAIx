  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Speculative fiction writing'', ''Strategy board games'', ''Improv comedy'', ''Coffee shop culture'', ''Pop-up art shows'', ''Arduino tinkering'',
    ''Yoga'', ''Mindfulness journaling'', ''Nature walks'']'
  career_goals: Margaret aspires to transition from classroom teaching to a role as a STEM curriculum leader within her district, where she can scale her innovative, art-infused teaching models. She plans
    to earn a master's degree in Curriculum and Instruction and secure a grant to launch a community makerspace that partners with local libraries and museums. Ultimately, she hopes to author a guide on
    integrating abstract art concepts into elementary science lessons, positioning herself as a thought-leader in STEAM education while maintaining a flexible schedule that supports her creative work style.
