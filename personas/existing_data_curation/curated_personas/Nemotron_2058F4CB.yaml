personas:
  professional: Margaret Landry, a 26‑year‑old elementary teacher who merges STEM expertise with abstract art, designing project‑based lessons that weave Arduino‑driven installations into science units,
    while juggling a relaxed approach to deadlines and a competitive drive to win district curriculum grants.
  sports: Margaret Landry follows the Boston Celtics and Boston Red Sox with fervor, joins a co‑ed ultimate frisbee league in Cambridge each spring, practices yoga three times a week at a local studio,
    and hikes the Middlesex Fells on weekends, preferring low‑impact activities that double as creative inspiration.
  arts: Margaret Landry paints abstract canvases inspired by Kandinsky, illustrates digital fantasies reminiscent of James Jean, writes speculative fiction in the vein of N.K. Jemisin, attends improv sessions
    at ImprovBoston, and curates pop‑up art shows featuring local talents like Jared Gustafson, while blasting Björk and Arcade Fire to fuel her creative flow.
  travel: Margaret Landry favors flexible, budget‑friendly trips that blend art and nature, having explored the street murals of Berlin, the sushi stalls of Tokyo, and the coastal cliffs of Maine, while
    dreaming of a summer workshop at Reykjavik’s Design & Technology Institute and a weekend retreat at a New England cabin to recharge from teaching.
  culinary: Margaret Landry is a competent home cook who loves experimenting with vibrant dishes like avocado bruschetta, miso‑ramen, and turmeric‑spiced quinoa bowls, often plating them as edible abstract
    art, yet regularly indulges in artisanal coffee and blueberry scones from Cambridge cafés, occasionally forgetting to log her daily vegetable intake.
  core: Margaret Landry, a 26‑year‑old STEAM innovator, balances boundless artistic curiosity with chronic worry, impulsive coffee‑shop splurges, and a habit of starting more projects than she finishes.
background:
  cultural: Margaret comes from a middle-class New England family with Anglo-American and French-Canadian roots. She was raised in the suburbs of Boston, where her parents emphasized academic achievement
    and community involvement. Attending a state university for a STEM degree and completing her teacher credential exposed her to the progressive, multicultural environment of the Greater Boston area,
    particularly Cambridge's blend of historic tradition and innovative tech culture. This upbringing instilled in her a respect for individual independence, a curiosity about diverse perspectives, and
    an appreciation for local customs such as Fourth of July parades and the annual Cambridge Arts River Festival.
attributes:
  skills: '[''STEM subject expertise'', ''Project-Based Learning design'', ''Interdisciplinary STEAM curriculum development'', ''Educational technology integration'', ''Maker-space facilitation'', ''Data-driven
