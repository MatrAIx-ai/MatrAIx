persona_description: A healthcare professional who is responsible for diagnosing and treating patients with Lyme disease. They are knowledgeable about the symptoms, diagnosis, and treatment of Lyme disease,
  and are skilled in interpreting laboratory tests and antibiotics. They are aware of the importance of early diagnosis and treatment for reducing the risk of further symptoms developing. They are also
  aware of the potential for misdiagnosis or delayed diagnosis, and are knowledgeable about the use of laboratory tests for diagnosis and the most appropriate antibiotic treatments. They are aware of the
  importance of recognizing the characteristic bull's-eye rash associated with Lyme disease and the use of ELISA laboratory tests to guide a Lyme disease diagnosis.
