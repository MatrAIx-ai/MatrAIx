  hobbies: '[''gardening (vegetables and bonsai)'', ''woodworking'', ''Chinese calligraphy'', ''traditional cooking'', ''tai chi'', ''walking/hiking'', ''reading biographies and local history'', ''attending
    cultural festivals'']'
  career_goals: Although retired from formal employment, Yong Han Xu aims to stay active and purposeful. He plans to continue his volunteer leadership at the senior center, expanding the community garden
    program to involve more intergenerational participants. He wishes to compile a family history book that includes recipes, stories, and photographs, preserving his cultural heritage for his grandchildren.
    Maintaining his health is a priority, so he intends to deepen his tai chi practice and attend a weekend horticulture workshop at a local community college. Financially, he aims to keep a stable budget
    to support his wife's needs and occasional travel to visit relatives in Asia. Ultimately, he hopes to leave a legacy garden that reflects both his practical skills and cultural roots.
