  skills: '[''Circuit Design'', ''PCB Layout'', ''Embedded Systems Programming'', ''Power Electronics'', ''Signal Processing'', ''MATLAB'', ''Simulink'', ''Altium Designer'', ''C/C++'', ''Project Management'',
