  hobbies: '[''Salsa Dancing'', ''Fitness Classes'', ''Volleyball'', ''Hiking'', ''Cooking Mexican Cuisine'', ''Hosting Potluck Gatherings'', ''STEM Outreach Volunteering'', ''Robotics Mentoring'', ''Yoga'',
    ''Mindfulness Meditation'']'
  career_goals: Natalie aims to become a senior electrical engineer and eventually a project lead within a renewable‑energy or clean‑tech company, using her expertise to design efficient power‑conversion
    systems for solar microgrids that serve underserved communities in Southern California. She plans to obtain her Professional Engineer (PE) license within the next three years and later pursue an MBA
    to broaden her strategic and managerial capabilities. Mentorship is also a priority; she wants to lead STEM outreach programs for Mexican‑American youth, fostering diversity in engineering. Maintaining
    a balanced, structured work life that allows time for family and self‑care is an essential part of her long‑term vision.
