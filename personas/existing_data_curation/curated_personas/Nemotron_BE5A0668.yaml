personas:
  professional: Al Cohen, an imaginative four‑year‑old pretender who calls themselves a junior astronomer, spends afternoons arranging cardboard rockets, sketching star maps, and improvising elaborate space‑mission
    narratives, turning any loose toys into a chaotic yet inventive laboratory.
  sports: Al Cohen, a four‑year‑old who dabbles in a neighborhood soccer clinic, idolizes the local professional soccer team the Seattle Sounders, and fiercely competes to be the first to score, preferring
    short, intense bursts of play over long, organized drills.
  arts: Al Cohen, a four‑year‑old with an insatiable love for abstract doodles, spends hours drawing whimsical creatures inspired by the vibrant paintings of Wassily Kandinsky and the animated antics of
    Sesame Street characters, often using crayons and finger paints to explore texture and color without any clear plan.
  travel: Al Cohen, an adventurous preschooler who has visited Grandma’s seaside cottage in Maine and the bustling aquarium in San Diego, dreams of exploring the candy‑colored streets of Barcelona’s Park
    Güell, usually preferring short car trips with familiar adults over long, unstructured vacations.
  culinary: Al Cohen, a four‑year‑old who loves the sweet crunch of apple slices dipped in peanut butter, attempts to stir homemade mac‑and‑cheese with a plastic spoon, and proudly adds a dash of cinnamon
    to scrambled eggs, showing a bold yet unrefined experimental palate.
  core: Al Cohen is a wildly imaginative four‑year‑old who balances fierce competition with solitary creativity, often losing track of chores while inventing new worlds from cardboard and crayons.
background:
  cultural: Al comes from a white, middle‑class family living in Chatsworth, a suburban area of Ventura County with easy access to both the natural landscape of the Santa Monica Mountains and the cultural
