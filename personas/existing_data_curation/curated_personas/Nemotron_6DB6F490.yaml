  career_goals: Xiaoping aims to become a licensed general contractor specializing in high‑end glass architecture and to launch his own boutique glazing firm that merges functional craftsmanship with artistic
    glass features. He plans to earn advanced certifications in energy‑efficient glazing and smart‑window systems, secure contracts for landmark Bay Area projects, and mentor apprentices to pass on his
    trade knowledge. Financial stability for his family and a reduced workload to manage stress are also central to his long‑term ambitions.
