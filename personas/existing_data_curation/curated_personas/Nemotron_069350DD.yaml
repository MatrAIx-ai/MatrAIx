  career_goals: Catherine aims to lead a multidisciplinary research team focused on sustainable energy materials, leveraging her scientific expertise and business insight to bring innovations from the lab
    to market. She aspires to a director‑level role where she can shape research strategy, secure funding, and champion policies that promote renewable technologies. Mentorship is a core ambition; she wants
    to create formal programs that support women and underrepresented groups in STEM. Balancing professional impact with personal harmony, she plans to incorporate community engagement and public science
    communication into her leadership portfolio.
