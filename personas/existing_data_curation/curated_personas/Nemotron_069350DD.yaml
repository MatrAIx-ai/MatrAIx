personas:
  professional: Catherine Hagen is a senior materials scientist and emerging research director at a renewable‑energy institute in Chandler, Arizona, who leverages their expertise in X‑ray diffraction, electron
    microscopy, and Python data visualization to design sustainable energy materials, while their Midwestern upbringing of collaborative modesty and natural curiosity drive them to mentor junior staff,
    translate complex results into clear narratives, and align research strategy with market‑ready business models.
  sports: Catherine Hagen’s athletic pursuits center on desert hiking on the Superstition and McDowell mountain trails, casual stargazing hikes, and cheering for the Arizona Diamondbacks and Phoenix Suns
    while also participating in community 5k runs supporting STEM outreach, embodying their love of the outdoors, teamwork, and a moderate competitive spirit.
  arts: Catherine Hagen’s artistic life flourishes in watercolor landscapes of desert sunsets inspired by Georgia O’Keeffe and Ansel Adams, regular visits to the Phoenix Art Museum to study contemporary
    Southwest artists, attendance at the Chandler Desert Art Festival, and a devotion to listening to folk‑rock singer Molly Tuttle while painting, which together satisfy their curiosity, appreciation for
    visual storytelling, and desire for creative balance.
  travel: Catherine Hagen’s travel style blends meticulous itinerary planning with spontaneous desert road trips, favoring escapes to Sedona’s red rocks, a recent culinary tour of Oaxaca, a bucket‑list
    visit to the aurora borealis in Tromsø, Norway, and weekend getaways to local hot‑springs, all while balancing family time and professional responsibilities with their Midwestern sense of practicality.
  culinary: Catherine Hagen’s culinary experiments fuse Southwestern heat with Mediterranean freshness, leading them to perfect dishes like chipotle‑marinated chicken tacos with feta crumbles, quinoa‑and‑beet
    salads drizzled with pomegranate‑mint vinaigrette, and homemade mole using dried chilies, agave nectar, and toasted sesame seeds, while their moderate cooking skill and love for occasional sous‑vide
    precision reflect a balance of curiosity and disciplined practice.
  core: Catherine Hagen balances a scientist’s analytical mind with an artist’s eye, navigating research leadership, sustainable investing, health monitoring, desert hiking, watercolor painting, and fusion
    cooking, all while occasionally overcommitting to projects and forgetting to water their houseplants.
background:
  cultural: Catherine comes from a third‑generation white American family with German roots, raised in the Midwest where practicality, community involvement, and modesty were emphasized. Relocating to Chandler,
    Arizona for her scientific career exposed her to the vibrant Southwest culture—including Native American art, Hispanic culinary traditions, and a strong outdoor ethic—which she embraces through local
    festivals and culinary exploration. Her upbringing instilled a collaborative, egalitarian mindset, while her current environment adds an appreciation for diverse perspectives and a commitment to inclusive,
    harmonious relationships.
