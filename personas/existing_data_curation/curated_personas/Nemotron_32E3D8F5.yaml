personas:
  professional: David Lawson is a seasoned landscape professional who leverages three decades of hands‑on experience in plant selection, irrigation design, and crew supervision, and they apply their structured,
    practical mindset to deliver low‑maintenance, sustainable projects on time and within budget.
  sports: David Lawson follows the Alabama Crimson Tide football with fervor, catches Huntsville Havoc hockey games on television, plays casual softball in their church league during spring, and maintains
    weekend hikes up Monte Sano to keep their fitness low‑impact yet consistent.
  arts: David Lawson enjoys the acoustic storytelling of folk legend Doc Watson, reads William Faulkner novels while sipping sweet tea, and crafts small wooden tables in their workshop to the background
    of Willie Nelson’s classic country hits, occasionally attending community theater productions such as 'A Streetcar Named Desire' at the local playhouse.
  travel: David Lawson prefers meticulously planned road trips, often traveling the Natchez Trace Parkway to explore Civil War battlefields like Gettysburg and Vicksburg, enjoys short getaways to Charleston,
    South Carolina, and dreams of a guided snorkeling tour of the Great Barrier Reef, though their retirement budget keeps most of their adventures within the Southeast.
  culinary: David Lawson favors Southern comfort cuisine, frequently preparing cornmeal‑crusted catfish, shrimp étouffée with okra, fresh heirloom tomato salads from their garden, and, despite their intermediate
    cooking skill, has a habit of over‑salting their dishes, prompting them to keep a trusty spice shaker at hand.
  core: David Lawson blends a methodical work ethic, love for solitary outdoor pursuits, and prudent financial habits into a steady pursuit of a sustainable landscaping business while cherishing their precise
    routines and occasional quirks.
background:
  cultural: David grew up in a middle‑class, white Southern family in the Huntsville region, where community ties, church involvement, and a strong work ethic were emphasized. His upbringing in a modest,
    rural‑suburban environment fostered a respect for practical skills, self‑reliance, and the value of steady, hands‑on labor. While he identifies with traditional Southern values such as hospitality and
    modesty, his personal experiences—including a divorce and a long career in landscaping—have shaped a pragmatic worldview that balances personal independence with a sense of responsibility toward his
    neighbors and the local environment.
attributes:
  skills: '["Landscape design and layout","Plant identification and selection","Irrigation system installation and maintenance","Heavy equipment operation and maintenance","Project budgeting and scheduling","Crew
    supervision and training","Safety compliance and OSHA standards","Soil testing and amendment","Native plant restoration","Customer service and client communication"]'
  hobbies: '["Fishing","Vegetable gardening","Birdwatching","Woodworking","Reading horticulture and ecology books","Community garden volunteering","Visiting historic sites"]'
  career_goals: David aims to transition from employee to small business owner, establishing a boutique landscaping firm that specializes in sustainable, low‑water designs for residential properties in
    Madison County. He plans to obtain a state‑approved horticulture certification and an EPA‑recognized pesticide applicator license to broaden his service offerings. Over the next five years, he hopes
    to mentor an apprentice crew, build a loyal client base that values reliability and quality, and secure a comfortable retirement by leveraging the business’s profitability while maintaining a balanced
    work schedule that allows for personal downtime.
