personas:
  professional: An aspiring young visual artist and budding coder, Melinda Menard channels their curiosity and love for watercolor into school art club murals while experimenting with Scratch animations,
    embracing a flexible, sometimes disorganized approach that lets creativity flow over strict planning.
  sports: A member of the Lancaster Youth Soccer Club and a casual fan of the Philadelphia Eagles, Melinda Menard enjoys weekend pick‑up soccer games in the fall and swims at the community pool during summer,
    preferring low‑pressure exercise that fits their relaxed, small‑group vibe.
  arts: Melinda Menard immerses themselves in the works of watercolorists like John Singer Sargent and the dreamy scores of Yiruma while crafting friendship bracelets, attending the Warner Museum of Art
    exhibits, and swapping sketches with friends in their art club, making art both a personal sanctuary and a communal language.
  travel: Melinda Menard loves short trips to nearby Amish farms and annual visits to Philadelphia’s historic sites, while dreaming of a future family road trip to the Grand Canyon, balancing their desire
    for quiet exploration with occasional excitement for city adventures.
  culinary: With a budding talent for baking chocolate chip cookies and a knack for assembling fresh strawberry salads with basil, Melinda Menard often helps their family prepare hearty chicken pot pie
    on Sunday evenings, delighting in the tactile process of mixing, measuring, and sharing meals.
  core: Melinda Menard is a quietly curious 11‑year‑old whose love of watercolor, friendship bracelets, and spontaneous craft projects reveals a delightful blend of artistic spirit, gentle kindness, and
    occasional disorganization.
background:
  cultural: Melinda grew up in Gap, Pennsylvania, a close‑knit rural community in Lancaster County known for its agricultural roots and quiet small‑town atmosphere. Her family celebrates typical American
    holidays such as Thanksgiving, Christmas, and the Fourth of July with community gatherings, potluck meals, and church events, fostering a sense of togetherness and mutual support. The surrounding Amish
    and Pennsylvania Dutch heritage has exposed her to simple, craft‑oriented traditions and a respect for hands‑on creation, which aligns with her love for art and making. Although her household reflects
    a mainstream white American upbringing, the local emphasis on community harmony and cooperation influences her considerate and collaborative personality.
