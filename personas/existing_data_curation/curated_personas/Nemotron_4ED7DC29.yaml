  career_goals: Melinda dreams of turning her love for art and storytelling into a lifelong career. She hopes to attend an arts-focused high school where she can deepen her skills in illustration and graphic
    design, eventually studying visual arts at the college level. Her long‑term ambition is to become a concept artist for video games or animated films, creating characters and worlds that inspire others.
    She also envisions using her artistic talents to teach art workshops for children in her community, fostering creativity and confidence in the next generation.
