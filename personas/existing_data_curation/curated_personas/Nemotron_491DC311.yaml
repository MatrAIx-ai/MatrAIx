  hobbies: '["Sketching and Watercolor Painting", "Visiting Art Galleries and Museums", "Photography", "Cooking Chinese Cuisine", "Reading Science Fiction", "Listening to Indie and Jazz Music", "Hiking
    in Monterey County Trails", "Exploring Local Farmers Markets"]'
  career_goals: Zhiyi aims to move beyond entry-level stock work into a supervisory or inventory-control role within the next few years. She plans to earn her GED and take a community-college certificate
    in logistics or supply-chain management, which will equip her for a shift-lead position or a warehouse coordinator role. While she values the stability of the retail sector, she also wants to carve
    out time for her artistic passions, hoping eventually to launch a small online shop selling her own hand-painted ceramics and prints. Her long-term ambition is to blend a reliable logistics career with
    a flexible side business that lets her explore new ideas and creative projects.
