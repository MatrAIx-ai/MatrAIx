  hobbies: '[''Metal sculpture creation'', ''Film photography'', ''Live music concerts'', ''Pickup basketball league'', ''Model airplane building'', ''Science‑fiction reading'', ''Home brewing craft beer'',
    ''Barbecue gatherings'', ''Community maker‑space projects'', ''Attending art fairs and craft shows'']'
  career_goals: He aspires to become an AWS Certified Welding Inspector and eventually move into a supervisory role overseeing a municipal infrastructure welding crew. Simultaneously, he dreams of launching
    a side studio where he can produce and sell custom metal sculptures and functional art for local businesses and events. To achieve this, he plans to enroll in night courses for advanced welding techniques
    and business management, gain leadership experience within his union, and build a portfolio of artistic pieces for regional craft fairs. A key personal ambition is to provide greater financial stability
    for his family while channeling his creative curiosity into respected community projects.
