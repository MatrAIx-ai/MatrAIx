personas:
  professional: Paul Prescott is a veteran welding and brazing specialist with over two decades of experience in industrial fabrication and custom metal art, who leverages their MIG/TIG mastery, OSHA-savvy
    safety practices, and a flair for turning abstract concepts into functional sculptures while mentoring apprentices and pursuing AWS Certified Welding Inspector credentials to lead a municipal infrastructure
    welding crew.
  sports: Paul Prescott dominates the neighborhood pickup basketball league, roots for the University of Louisville Cardinals men's basketball team on Saturdays, sports a Louisville City FC cap while cheering
    at Riverfront Stadium, and balances their competitive drive with occasional tailgate barbecues after games.
  arts: Paul Prescott immerses themselves in Louisville's maker-space community, crafting welded metal sculptures inspired by Jeff Koons, capturing street-art murals with their vintage film camera, and
    frequenting blues nights at the Mercury Ballroom featuring B.B. King tributes and indie rock shows by The War on Drugs, while also admiring folk storyteller Gillian Welch.
  travel: Paul Prescott prefers spur-of-the-moment road trips with the family, often detouring to bourbon-trail towns like Bardstown or the Indiana Dunes for weekend camping, while they dream of a longer
    pilgrimage to the Bavarian Alps for Oktoberfest and a photo-filled exploration of Berlin's vibrant street art scene.
  culinary: Paul Prescott is a competent home-cook who loves smoking bourbon-glazed pork ribs, brewing a batch of homemade IPA with Cascade hops, and plating a hearty Kentucky Hot Brown topped with sliced
    tomatoes and Mornay sauce, they often season with fresh thyme and rosemary to impress friends at their backyard barbecues.
  core: Paul Prescott blends gritty welding expertise with a restless artistic imagination, thriving on community gatherings, competitive sport, and craft-beer experimentation while they wrestle with disorganization,
    worry, and a competitive streak that colors both their work and play.
background:
  cultural: Paul grew up in a working‑class family in the Louisville suburbs of Jefferson County, Kentucky. His upbringing was shaped by the region’s blue‑collar values, hospitality, and a strong sense
    of community tied to the local bourbon and horse‑racing culture, especially the Kentucky Derby. He is part of a generational line of tradespeople who have been members of the International Brotherhood
    of Boilermakers, reflecting the area’s industrial heritage along the Ohio River. The city’s growing arts scene, from riverfront galleries to folk music festivals, has nurtured his artistic instincts,
    while church potlucks and neighborhood barbecues have reinforced his sociable, outgoing nature. This blend of Southern hospitality, Mid‑American industriousness, and a vibrant local arts community forms
    the backdrop of his cultural identity.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Precision brazing'', ''Soldering of copper and brass'', ''Blueprint interpretation'', ''Metal fabrication and repair'', ''Equipment maintenance and troubleshooting'',
