personas:
  professional: Ali Wimberly is a high‑school senior poised to enter a technical college, where his methodical planning, persuasive communication, and hands‑on problem‑solving will launch a career as a
    certified electrician while his sociable, competitive nature fuels a side venture producing digital content for local businesses.
  sports: Ali Wimberly dominates local park basketball courts in the Saturday pickup league, cheers for the Chicago Bulls, and maintains a personal fitness regimen that includes daily hoop drills, occasional
    weight training at the community gym, and a self‑set goal to improve his vertical leap.
  arts: Ali Wimberly curates dynamic playlists that blend Kendrick Lamar, H.E.R., and Kirk Franklin, experiments with beat‑making on a basic laptop using FL Studio, and shares his tracks on TikTok, where
    his competitive drive fuels a growing following among teen hip‑hop and R&B enthusiasts.
  travel: Ali Wimberly prefers low‑budget road trips with friends, having already explored New Orleans’ music districts and New York’s Madison Square Garden, while dreaming of a future backpacking trek
    through the Rocky Mountains to combine adventure with sustainable farming workshops.
  culinary: Ali Wimberly enjoys quick comfort foods like chicken‑and‑waffles, spicy ramen, and homemade guacamole, showcases modest cooking skill by preparing fresh garden salads with herbs from the community
    garden, and never skips the weekly family‑style Sunday dinner featuring fried catfish and collard greens.
  core: Ali Wimberly is a socially driven, hyper‑organized teen who balances competitive basketball, beat‑making, and community leadership while occasionally splurging on sneakers and battling self‑doubt
    during high‑pressure moments.
background:
  cultural: Ali grew up in Riverdale, a suburb of Atlanta with a strong African‑American community. His family traditions are rooted in Southern Black culture—Sunday church services, soulful gospel music,
    and family gatherings featuring soul food classics like fried chicken, collard greens, and peach cobbler. He celebrates cultural milestones such as Juneteenth and Martin Luther King Jr. Day with community
    events and learning about the civil‑rights legacy of the region. The vibrant local scene, from rap battles to neighborhood block parties, has shaped his identity, giving him a deep appreciation for
    storytelling, resilience, and communal support.
