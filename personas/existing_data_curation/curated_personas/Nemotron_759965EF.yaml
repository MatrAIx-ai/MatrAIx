  hobbies: '[''Basketball'', ''Hip‑hop and R&B music'', ''Beat‑making'', ''Video gaming (NBA 2K, online shooters)'', ''Church youth group volunteering'', ''Community gardening'', ''Social media trend tracking'']'
  career_goals: Ali aspires to combine his practical skills with his passion for community engagement. He aims to enroll in a technical college to become a certified electrician or HVAC technician, ensuring
    a stable, hands‑on career. Simultaneously, he plans to develop a side venture producing digital content for local businesses and community events, leveraging his social media expertise. Long‑term, he
    hopes to become a community outreach coordinator or small‑business owner who can mentor younger teens, foster local initiatives, and provide reliable services.
