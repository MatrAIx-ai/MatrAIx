personas:
  professional: Greter Adams is a budding junior architect who spends hours assembling intricate Lego structures; they channel their innate curiosity and love for fantasy art into creative design, yet their
    relaxed, disorganized nature often leaves projects half‑finished.
  sports: Greter Adams thrives on the neighborhood park’s Tiny Goalies soccer league, where they sprint for the ball with fierce competitiveness, cheering for the US Women’s National Soccer Team while also
    rooting for the local professional club, City FC.
  arts: Greter Adams draws vibrant animals and fantasy scenes inspired by cartoon classics like "Adventure Time" and picture books by Dr. Seuss, often sketching on the back of snack wrappers, and they eagerly
    study the work of illustrator James Gurney for technique tips.
  travel: Greter Adams loves family nature walks that turn into mini‑expeditions to collect rocks, leaves, and feathers, dreaming of exploring Yellowstone National Park’s geysers and the towering dinosaur
    fossils at the Museum of Natural History on their next vacation.
  culinary: Greter Adams enjoys helping bake chocolate‑chip cookies, enthusiastically measuring flour and sugar, and they favor snack‑time dishes like mini‑pizza topped with pepperoni and a side of sliced
    apples.
  core: Greter Adams is a curious, Lego‑loving six‑year‑old who balances boundless imagination with a lovable habit of leaving projects unfinished and a competitive spark on the soccer field.
background:
  cultural: Greter was raised in a white, middle‑class family in the Louisville‑area suburbs of Bullitt County, Kentucky. His upbringing reflects a blend of Southern hospitality and Midwestern practicality.
    Family traditions include Sunday meals featuring fried chicken and biscuits, annual trips to the Kentucky Derby festivities, and participation in local community events like the Louisville Art Fair.
    He attends a public kindergarten where he interacts with peers from diverse backgrounds, and his family values education, outdoor play, and community involvement. The cultural environment encourages
    curiosity, creativity, and a love for local arts, sports, and nature.
attributes:
  skills: '[''drawing'', ''Lego construction'', ''basic counting and number sense'', ''storytelling'', ''basic tablet navigation'', ''pattern recognition'', ''curiosity-driven exploration'']'
