  career_goals: Greter dreams of becoming an astronaut who explores distant planets, a painter who creates vivid murals, or a video game designer who builds worlds for others to explore. He is fascinated
    by space, colors, and interactive stories, and often imagines himself leading a team on a mission or showcasing his art in a gallery. His competitive spirit fuels a desire to excel in whatever path
    he chooses, hoping to be recognized for his creativity and curiosity.
