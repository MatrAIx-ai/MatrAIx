  hobbies: '[''DIY Home Renovation'', ''Scale Model Building'', ''Gardening'', ''Crossword Puzzles'', ''Reading Non-fiction'', ''Audiobook Listening'', ''Birdwatching'', ''Fitness Walking'', ''Methodical
    Cooking'']'
  career_goals: Taylor aims to leverage her extensive hands‑on experience into a supervisory role. Over the next five years she plans to obtain an OSHA 30‑hour certification, a Forklift Operator certification,
    and a Construction Safety Officer credential, positioning herself for a foreperson or site‑supervisor position. Ultimately she aspires to become a certified construction manager and potentially run
    her own small contracting business focused on residential concrete work, while maintaining high standards of safety and quality.
