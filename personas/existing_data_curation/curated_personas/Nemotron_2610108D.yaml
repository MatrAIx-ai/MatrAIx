  hobbies: '[''Cooking Mexican cuisine'', ''Folkloric Mexican dance'', ''Hiking in the Sangre de Cristo Mountains'', ''Reading contemporary fiction and biographies'', ''Herb gardening'', ''Knitting'', ''Listening
    to mariachi and indie folk music'']'
  career_goals: Esperanza aims to complete an associate degree in Business Administration and later transfer to a four-year university to earn a Bachelor’s in Hospitality Management. In the short term,
    she seeks a position as a project coordinator or administrative assistant at a nonprofit organization serving the Hispanic community in Santa Fe, where she can apply her organizational talents and bilingual
    skills. Long-term, she dreams of opening a family-run café that blends traditional Mexican cuisine with contemporary health-focused options, providing employment opportunities for local youth and serving
    as a cultural hub. She also envisions becoming a mentor for other young Mexican-American women pursuing higher education.
