  career_goals: Griffen plans to earn his GED within the next two years and then enroll in a vocational program focused on automotive technology or agricultural mechanics. He aims to secure an apprenticeship
    with a local repair shop or farm equipment dealer, eventually becoming a certified mechanic or equipment manager. In the longer term, he hopes to combine his technical skills with his love for the outdoors
    by operating a small service business that provides maintenance for farm machinery and recreational vehicles in his community. He also aspires to earn a football scholarship that could open doors to
    a college education and strengthen his leadership experience.
