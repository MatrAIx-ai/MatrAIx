  career_goals: Claudia aims to transition into a technical leadership role—such as a team lead or engineering manager—within the next three to five years, focusing on building products that improve mental‑health
    outcomes and community well‑being. She plans to deepen her architectural skills, earn cloud certifications, and contribute to open‑source initiatives that promote accessible technology. Long‑term, she
    envisions launching a startup that leverages data‑driven insights and mobile platforms to help users manage anxiety and stress, while maintaining a balanced, flexible work schedule that supports her
    family life.
