  hobbies: '[''Reading mystery novels'', ''Listening to health‑science podcasts'', ''Gardening'', ''Knitting'', ''Hiking in Osage Hills'', ''Cooking Midwestern comfort foods'', ''Book club participation'',
    ''DIY home‑improvement projects'', ''Volunteering at senior center'']'
  career_goals: Annie aims to build on her hands‑on experience by earning an associate degree in nursing and becoming a Licensed Practical Nurse (LPN) within the next three years. She is drawn to geriatric
    and chronic wound management and plans to obtain specialty certifications in those areas. Long‑term, she envisions a supervisory role as a shift lead or patient‑care coordinator, where she can shape
    staff training and improve patient safety protocols. She also wishes to volunteer for community health outreach programs in Broken Arrow, eventually leading health‑education workshops for underserved
    residents. Her career path balances practical advancement with her desire to make a tangible, caring impact on her community.
