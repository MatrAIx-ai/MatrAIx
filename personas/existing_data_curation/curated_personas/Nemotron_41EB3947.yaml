personas:
  professional: Annie Phelps is a Certified Nursing Assistant at a bustling community hospital, where their meticulous documentation, reliable infection‑control practice, and natural empathy dovetail with
    an organized, curiosity‑driven mindset, making them a go‑to mentor for new aides and a key contributor to quality‑improvement projects.
  sports: Annie Phelps enjoys weekend hikes along the Osage Hills trails, participates in the Broken Arrow Outdoor Enthusiasts hiking club, and roots for the Oklahoma City Thunder while casually joining
    a Sunday morning yoga class at the local community center to maintain flexibility.
  arts: Annie Phelps frequently loses herself in Agatha Christie mysteries at the church book club, delights in the acoustic folk tunes of Gillian Welch, and enjoys occasional community theater productions
    of classic plays like ‘Our Town,’ which together nourish their reflective, kindness‑driven spirit.
  travel: Annie Phelps prefers carefully planned weekend road trips to Midwestern gems such as the Ozark National Forest and the historic downtown of Kansas City, while dreaming of an extended summer stay
    in the coastal town of Bar Harbor, Maine, balancing their love of nature with a desire for low‑stress travel.
  culinary: Annie Phelps enjoys cooking hearty Midwestern comfort foods such as creamy chicken and dumplings, pan‑seared pork chops with apple chutney, and a garden‑fresh beet and kale salad drizzled with
    balsamic vinaigrette, showcasing their modest culinary skill and love for seasonal, farm‑to‑table ingredients.
  core: Annie Phelps blends methodical precision with a compassionate heart, juggling a bustling CNA career, a thriving garden, and a habit of knitting for strangers, all while obsessively double‑checking
    every list—even when sleep runs thin.
background:
  cultural: Annie grew up in a middle‑class white family in the Tulsa metropolitan area, attending public schools and completing a post‑secondary nursing‑assistant program at a local community college.
    The cultural fabric of Broken Arrow emphasizes community bonding, modesty, and self‑reliance, values that shape her cooperative and considerate nature. She participates in regional traditions such as
    the Oklahoma State Fair, high‑school football gatherings, and church‑based service activities. While rooted in Midwestern American customs, she respects the local Cherokee heritage and often incorporates
    community health outreach that reflects the area's diverse cultural landscape.
attributes:
  skills: '[''Patient care'', ''Vital signs measurement'', ''Basic wound care'', ''Activities of daily living assistance'', ''Infection control'', ''Electronic health record documentation'', ''Medical terminology'',
