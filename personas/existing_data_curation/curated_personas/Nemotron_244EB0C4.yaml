  career_goals: Michelle aims to transition from a general office clerk to a senior administrative assistant within the next three years, leveraging her strong organizational skills and people‑focused mindset.
    She plans to complete her associate degree in Business Administration and earn a Certified Administrative Professional (CAP) credential to enhance her qualifications. Long‑term, she aspires to become
    an office manager or operations coordinator at a nonprofit or a state agency in Sacramento, where she can blend her desire for predictable structures with opportunities to mentor new staff and contribute
    to community‑focused projects. She also hopes to develop a side expertise in project coordination, allowing for flexible, hybrid work arrangements that accommodate her need for both routine and variety.
