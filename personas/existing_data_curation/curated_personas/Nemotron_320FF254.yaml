  hobbies: '[''crayon drawing'', ''listening to gospel/blues/jazz music'', ''clapping and dancing to rhythm'', ''participating in library storytime'', ''building and organizing block constructions'', ''family
    gatherings and social playdates'']'
  career_goals: Even as a newborn, Amber’s caregivers notice her innate curiosity about art and community, and they nurture an emerging vision for her future. She is imagined growing up to become a visual
    artist who uses her work to celebrate Black Southern heritage, and later a community organizer who creates inclusive cultural events in St. Clair County.
