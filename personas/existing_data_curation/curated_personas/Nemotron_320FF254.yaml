personas:
  professional: Amber Brave, though merely a newborn, already serves as an informal product tester, offering immediate feedback on infant gear through a consistently calm demeanor, a strict feeding schedule,
    and a natural curiosity for new textures, and they seem destined for a future in user‑experience design for baby products.
  sports: Amber Brave, a newborn, delights in weekly baby swim classes at the community center, enjoys gentle rocking during parents’ Sunday viewings of the Seattle Seahawks, and shows early engagement
    by smiling whenever the crowd erupts, and they appear to already appreciate the communal energy of sports.
  arts: Amber Brave, a newborn, shows an early appreciation for the arts by focusing intently on a pastel mobile featuring Van Gogh's Starry Night replica and responding enthusiastically to lullabies by
    Yo‑Yo Ma and the folk melody 'You Are My Sunshine', and they seem to derive calm and curiosity from each melodic and visual stimulus.
  travel: Amber Brave, an infant, has already been taken to the city zoo on a weekend family outing and is slated for a summer road trip to the Grand Canyon, preferring car rides with a soft blanket, a
    dimmed interior, and a playlist of classical piano pieces, and they appear comforted by rhythmic motion and new scenery.
  culinary: Amber Brave, a newborn, prefers an organic vanilla‑infused formula blended with a hint of sweet rice cereal, has developed a fondness for pureed carrots and apples, and eagerly explores new
    textures during each feeding, and they often signal contentment with a satisfied sigh.
  core: Amber Brave is a remarkably calm newborn who thrives on structured routines, seeks sensory variety, and effortlessly becomes the center of any gathering while habitually demanding the softest blanket,
    and they embody a blend of curiosity and composure.
background:
  cultural: Amber is raised in a Black Southern family in Odenville, Alabama. Her cultural environment blends church-centered community life, Southern cuisine, gospel and blues music, and strong family
    ties. Local traditions such as church choir singing, weekend barbecues, and community festivals shape her values of togetherness, resilience, and artistic expression.
