    rocket building'']'
  career_goals: John aims to combine his artistic sensibilities with technology by studying visual communication or interactive media at a university such as the University of Kansas. He aspires to become
    a multimedia designer or creative technologist who creates immersive experiences that connect people with nature and community stories. In the long term he hopes to collaborate with local museums or
    environmental organizations to develop exhibits and digital projects that educate the public about Kansas’s prairie ecosystem. He also envisions opening a modest workshop in his hometown where he can
    teach art and basic tech skills to younger students, fostering curiosity and community harmony.
