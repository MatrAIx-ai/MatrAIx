personas:
  professional: John Payne, an aspiring multimedia designer, blends digital illustration mastery, basic Python scripting, and love of the Kansas prairie into interactive projects that aim to educate the
    public about local ecosystems, while their calm, collaborative nature makes them a natural leader in the school environmental club.
  sports: John Payne enjoys early‑morning trail runs through the Flint Hills, plays intramural soccer in the spring, and cheers for the Kansas City Royals and the University of Kansas Jayhawks, preferring
    low‑key community leagues over high‑pressure varsity sports.
  arts: John Payne spends evenings sketching prairie sunsets with charcoal, listening to folk guitar legend John Denver, and attending the local county fair’s art exhibit where they admire works by regional
    watercolorist Susan Baugh, turning these inspirations into digital pieces on their Procreate‑filled tablet.
  travel: John Payne favors weekend road trips that combine photography and nature, such as a sunrise shoot at the Tallgrass Prairie National Preserve and a weekend exploration of St. Louis’s Forest Park,
    while dreaming of a future solo trek across the Badlands to capture the raw prairie spirit.
  culinary: John Payne enjoys cooking simple Midwestern fare, from buttery cornbread and grilled chicken tossed with fresh garden basil to experimenting with beet‑infused hummus, and they take pride in
    sourcing ingredients at the local farmer’s market where heirloom tomatoes and sweet corn are staples.
  core: John Payne is a quietly curious teen who balances a love for prairie art and tech with a disciplined savings habit, all while battling a habit of staying up late perfecting digital sketches.
background:
  cultural: John grew up in Ozawkie, a small town in northeastern Kansas, rooted in Midwestern rural traditions. His family has lived in the region for generations, emphasizing self‑reliance, modesty, and
    a strong sense of community reflected in local 4‑H clubs, county fairs, and church gatherings. The cultural atmosphere values hard work, respect for the land, and cooperative problem‑solving, which
    aligns with John’s calm, considerate nature. Although the area is predominantly white, John’s upbringing includes awareness of the region’s Native American history and the legacy of German and Czech
    settlers, nurturing his curiosity about diverse cultural narratives. School curricula and community events have introduced him to regional art forms, agriculture, and environmental stewardship, shaping
    his artistic interests and his desire to give back to the community.
