personas:
  professional: Norma Poole, a 36‑year‑old technical program manager, blends Agile and Waterfall methodologies to steer complex federal and private‑sector projects while they leverage data‑driven decision‑making,
    process optimization, and a calm, routine‑oriented leadership style that balances assertive stakeholder engagement with collaborative team building.
  sports: Norma Poole energizes their weekends by playing in the mixed‑gender Capital Softball League, attending high‑intensity spin and Zumba classes, hiking with the DC Hikers Club through Rock Creek
    Park, and they cheer on the Washington Capitals and DC United whenever possible.
  arts: Norma Poole finds inspiration at Smithsonian museum exhibitions, grooves to live performances by H.E.R. and Anderson .Paak at the DC Jazz Festival, and they unwind with streaming sessions of Taylor
    Swift and Lin‑Manuel Miranda during quiet evenings.
  travel: Norma Poole and their husband prioritize historic travel, revisiting sites such as Gettysburg, Colonial Williamsburg, and the National Mall while they prefer relaxed itineraries that blend guided
    tours with familiar boutique hotels, and they dream of a future pilgrimage to Edinburgh’s Castle for its deep‑rooted history.
  culinary: Norma Poole orchestrates monthly neighborhood potluck nights featuring dishes such as chickpea shakshuka, Thai green curry, and homemade sourdough, meticulously following step‑by‑step recipes
    that showcase cumin, lemongrass, and tahini, while they proudly claim a modest but growing skill set in fermenting kimchi.
  core: Norma Poole is a routine‑loving, sociable tech leader who balances meticulous project planning with a laid‑back approach to life, often juggling detailed to‑do lists they seldom follow and a steadfast
    calm that turns crises into minor inconveniences.
background:
  cultural: Norma is a white American of European descent, raised in a middle‑class suburban family in the Mid‑Atlantic region. Her upbringing emphasized education, practicality, and community involvement,
    with strong family traditions around holidays such as Thanksgiving and Christmas. She earned her STEM graduate degree at a state university that valued hands‑on learning and applied research, shaping
    her pragmatic outlook. Relocating to Washington, DC, she has been immersed in the nation’s civic and professional culture, which reinforces her respect for structured processes and collaborative problem‑solving.
    While she embraces the diverse cultural offerings of the capital, she remains grounded in mainstream American values and the traditional work ethic instilled by her family.
