  career_goals: Norma aims to advance to a senior director or vice‑presidential role overseeing operations and technology strategy within a federal agency or a Washington‑area tech firm. She wants to spearhead
    initiatives that improve operational efficiency and embed data‑driven practices while preserving reliable, routine‑based processes. Obtaining PMP certification and an executive MBA are on her short‑term
    agenda, as is championing mentorship programs for women in STEM. Long‑term, she envisions leading a high‑impact organization that balances innovative solutions with pragmatic, results‑focused execution,
    all while maintaining a flexible work schedule that supports her family life.
