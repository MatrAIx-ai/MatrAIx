  career_goals: Javier aims to scale his company into a global leader in sustainable technology, leveraging his STEM background to drive innovative, eco‑friendly solutions. He envisions expanding market
    presence across Latin America, building strategic alliances that bridge U.S. and Central American economies. A core ambition is to embed a robust corporate social responsibility program that supports
    education and entrepreneurship in Salvadoran communities. Long‑term, he hopes to establish a venture fund dedicated to nurturing tech startups from the diaspora and to serve on the board of a Fortune‑500
    firm, championing diversity and inclusive leadership.
