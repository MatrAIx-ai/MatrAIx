persona_description: A European "New Space" start-up founder and CEO who is passionate about developing new models and technology to tackle the future of agriculture and food by leveraging the effect of
  microgravity on complex biological systems. The founder is also a botanist and is excited to lead the global Mission WISE effort and coordinate two research teams in Bordeaux, France (ISVV) and Erlangen,
  Germany (FAU). The founder is known for his expertise in the field of space research, particularly in the context of "Self-Guided Evolution," a unique scientific process that yields more tangible outcomes
  for Earth applications. The founder has a background in mathematics and is known for his contributions to the field of group theory, particularly the concepts and theorems related to subgroups and isomorphisms.
  The founder is also a life science expert and has a strong interest in exploring space to attain scientific breakthroughs in biology for a sustainable future.
