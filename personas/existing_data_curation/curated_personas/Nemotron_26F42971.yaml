  career_goals: Maria dreams of a future where she can combine her love for routine, helping others, and her cultural roots. She often says she wants to become a teacher because she enjoys the structured
    environment of a classroom and likes the idea of guiding younger children through learning, especially in Spanish language and cultural heritage. She also imagines herself as a community cook or culinary
    instructor who teaches kids how to prepare healthy Puerto Rican dishes, seeing it as a way to preserve family traditions while providing a stable, practical career. Her long‑term ambition is to find
    a profession that offers a clear daily schedule and the chance to make a positive impact on her family and community.
