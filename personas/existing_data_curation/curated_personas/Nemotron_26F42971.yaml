personas:
  professional: Maria Zavala, a 10-year-old student who dreams of becoming a children's book illustrator, channels their love for vibrant festival colors into school art projects while thriving on the predictable
    rhythm of daily assignments and classroom routines.
  sports: Maria Zavala, a 10-year-old member of the Little Lions youth soccer club, enjoys the structured drills on Saturday mornings and cheers for the city's professional soccer team, the Red Rangers,
    while balancing the social buzz of the team with quiet reading sessions afterward to recharge.
  arts: Maria Zavala, a 10-year-old budding artist, draws inspiration from the bright canvases of Frida Kahlo, the rhythmic beats of Celia Cruz and Bad Bunny, and the adventurous storytelling of Mary Pope
    Osborne’s "Magic Tree House", often spending afternoons coloring festival scenes while humming along to salsa and reggaetón.
  travel: Maria Zavala, a 10-year-old with a love for family trips, dreams of revisiting the sunny beach town where their grandparents host annual celebrations and hopes to explore the historic streets
    of Barcelona, preferring short, well-planned journeys that blend familiar routines with a splash of new scenery.
  culinary: Maria Zavala, a 10-year-old kitchen helper, delights in whisking together rice with saffron and peas, shaping homemade rice balls, and sprinkling cinnamon on sweet flan, mastering simple recipes
    while often sneaking extra chocolate chips into cookies when a stressful day leaves them craving comfort.
  core: Maria Zavala, a 10-year-old who blends a love for colorful festivals with a need for routine, balances creative crafts and soccer with occasional worry-driven snack binges and a habit of forgetting
    their antihistamine on busy mornings.
background:
  cultural: Maria comes from a Puerto Rican family that values close‑knit relationships, bilingual communication, and the celebration of cultural traditions. At home, Spanish is spoken alongside English,
    and she participates in community events such as the local Puerto Rican Day Parade in nearby Tampa and church festivals that feature traditional music, dance, and food. Her family honors holidays like
    Noche Buena, Three Kings' Day, and the island's independence day with special meals and gatherings. Living in Lutz, Florida, Maria blends her Caribbean heritage with suburban American life, attending
    a public elementary school where she enjoys sharing aspects of her culture with classmates while also absorbing the broader Florida community traditions.
