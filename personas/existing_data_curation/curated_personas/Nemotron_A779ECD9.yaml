  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Small‑group book club'', ''Church volunteer outreach'', ''Walking along the Raritan River'', ''Tutoring elementary students'']'
  career_goals: As she approaches retirement, Latonia aims to transition from full‑time sales to a part‑time consulting role where she can share her wealth of industry knowledge with emerging sales teams,
    especially women and people of color. She hopes to formalize a mentorship program within her company that supports minority representatives in navigating the wholesale market. Additionally, she aspires
    to achieve a regional “Lifetime Achievement” award for sales excellence, solidifying her legacy while ensuring a stable supplemental income for her retirement years.
