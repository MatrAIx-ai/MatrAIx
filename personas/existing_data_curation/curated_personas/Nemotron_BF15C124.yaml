  career_goals: Felipe aims to secure a stable, structured role that leverages his organizational strengths—such as a project coordinator or data analyst position within a nonprofit or midsize company.
    He plans to complete his bachelor's degree in information systems within the next two years, obtain relevant certifications (e.g., Google Data Analytics), and build a career that offers predictable
    routines, clear expectations, and opportunities to help others. Long‑term, he hopes to advance into a supervisory role where he can mentor new employees while maintaining a balanced work‑life schedule
    to manage his stress and anxiety.
