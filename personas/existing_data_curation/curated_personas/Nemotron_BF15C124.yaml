personas:
  professional: Felipe Reitz is a detail‑oriented project coordinator‑in‑training who leverages Excel, SQL, and introductory Python to streamline nonprofit workflows, applying the same methodical precision
    they use when planning board‑game nights while navigating the occasional anxiety of tight deadlines.
  sports: Felipe Reitz is a devoted fan of the Minnesota Timberwolves and the Minnesota Twins, belongs to the Minneapolis Hiking Club which organizes weekly trail hikes in Minnehaha and Mississippi River
    parks, and prefers steady, low‑impact runs over high‑intensity workouts to maintain a predictable fitness routine.
  arts: Felipe Reitz indulges in acoustic guitar sessions inspired by John Mayer and Iron & Wine, reads contemporary fiction by Sally Rooney and Haruki Murakami, and attends occasional showcases at Midtown
    Global Market featuring local muralists, which feed their structured yet introspective creative side.
  travel: Felipe Reitz plans trips with spreadsheets, favors low‑cost, off‑peak travel to nature‑focused spots like Glacier National Park and the North Shore of Lake Superior, dreams of attending Oktoberfest
    in Munich and Día de los Muertos celebrations in Oaxaca, and currently budgets for a solo road‑trip to the Minnesota Boundary Waters.
  culinary: Felipe Reitz enjoys cooking simple, healthy meals such as quinoa bowls with roasted sweet potatoes, avocado, black beans, and lime, experiments with chicken tinga tacos and kale‑berry salads,
    favors ingredients like chickpeas, fresh herbs, and seasonal berries, and follows a structured Sunday meal‑prep routine to reduce daily decision‑fatigue.
  core: A meticulous planner who balances a love for data‑driven organization with quiet acoustic guitar sessions and solo hikes, Felipe Reitz quietly wrestles anxiety while they keep life surprisingly
    orderly.
background:
  cultural: Felipe comes from a mixed White heritage that blends German-American roots (reflected in his surname Reitz) with Hispanic influences seen in his first name Felipe, and a family history that
    includes a South Asian Muslim ancestor suggested by the middle name Abdool. Raised in Minneapolis, he grew up celebrating both German traditions—like Oktoberfest and Christmas markets—and Hispanic customs
    such as Dia de los Muertos with extended family. He is fluent in English, has conversational Spanish skills, and respects the diverse cultural fabric of his community, often participating in local multicultural
    festivals while maintaining a largely secular worldview.
