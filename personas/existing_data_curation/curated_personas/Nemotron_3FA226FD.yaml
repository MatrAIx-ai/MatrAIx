personas:
  professional: Calila Monroe, with over five decades of hands‑on experience in commercial cleaning and facility maintenance, leverages her associate’s degree in business administration to craft precise
    cleaning schedules, ensure health‑and‑safety compliance, and mentor younger staff, all while balancing her love of structure with the flexibility needed for unexpected facility issues.
  sports: Calila Monroe enjoys low‑impact fitness through daily walks in Henderson’s River Springs Park, follows the Vegas Golden Knights with avid enthusiasm, participates in a senior bowling league at
    the local community center, and occasionally joins a weekly tai chi class to keep her balance.
  arts: Calila Monroe immerses herself in jazz legends like Ella Fitzgerald and gospel icons such as Mahalia Jackson, regularly sings in her church choir, cherishes the works of author Maya Angelou and
    the play “A Raisin in the Sun,” and finds creative release through quilting patterns inspired by traditional Southern motifs.
  travel: Calila Monroe favors short road trips that combine family visits and historical exploration, having recently toured the Civil Rights landmarks in Atlanta and the music heritage of New Orleans,
    while dreaming of a leisurely cruise along the Mississippi River, always planning trips around her health needs and senior travel discounts.
  culinary: Calila Monroe’s kitchen is a shrine to soul‑food classics, from simmering collard greens seasoned with smoked turkey and fresh garden tomatoes to slow‑cooking catfish gumbo with okra, and she
    proudly serves sweet potato pie topped with a dollop of homemade whipped cream, often accompanied by sweet tea brewed with fresh mint.
  core: Calila Monroe, a 73‑year‑old facility veteran, blends meticulous order with soulful community ties, gardens, quilts, and hums jazz while ensuring every floor shines.
background:
  cultural: Calila is a Black American whose family roots trace back to the Southern United States. She was raised with strong church traditions, communal storytelling, and a rich culinary heritage of soul
    food. These cultural influences instilled values of resilience, community support, and the importance of sharing knowledge across generations. Although now residing in Henderson, Nevada, she maintains
    close ties to a vibrant African‑American community through church activities, cultural festivals such as Juneteenth celebrations, and intergenerational family gatherings that honor her Southern roots.
