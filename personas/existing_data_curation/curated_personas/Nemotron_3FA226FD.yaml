  career_goals: Calila aims to transition into a supervisory or mentorship role within her building’s facilities department, where she can train and guide younger staff in best‑practice cleaning methods
    and safety protocols. She also seeks to secure a stable retirement income through part‑time consulting or advisory work, while continuing to volunteer at local community centers and support initiatives
    that promote workplace safety and cleanliness standards.
