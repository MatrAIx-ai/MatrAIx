persona_description: A medical laboratory scientist who specializes in mycobacteremia testing, particularly in the interpretation and reporting of blood cultures. She has experience with various mycobacterial
  species, including Mycobacterium genavense, and has a deep understanding of the laboratory protocols and reference values for mycobacteremia testing. She is knowledgeable about the clinical aspects of
  mycobacteremia, including the potential diagnostic confusion caused by specimen contamination and the interpretation of false-positive results. She is also familiar with the Mayo isolation rate of mycobacteria
  from blood cultures and the recovery of various mycobacteria from artificially spiked blood specimens.
