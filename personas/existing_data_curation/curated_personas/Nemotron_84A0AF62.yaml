personas:
  professional: Veronica Joel, a 36‑year‑old engineering technologist, blends mechanical design expertise, Six Sigma precision, and a spontaneous problem‑solving style to lead sustainable product development
    projects while championing women in engineering through hands‑on mentorship; they thrive in flexible environments where curiosity meets practicality.
  sports: Veronica Joel spends weekends scaling the Flatirons crags, trekking the Lyons trail network, and cheering on the Colorado Mammoth roller‑hockey team, while they belong to the Lyons Trail Club’s
    women’s climbing cohort and practice yoga three times a week to balance the adrenaline of rock climbing.
  arts: Veronica Joel captures the shifting Colorado light with a DSLR, curates black‑and‑white prints for a rotating exhibit at the Fort Collins Art Museum, and they unwind by listening to Fleet Foxes,
    crafting pottery at a weekend maker fair, and attending the Denver Symphony’s performances of Beethoven’s Ninth.
  travel: Veronica Joel favors spontaneous road trips that weave through Colorado’s high country before jetting to eco‑focused destinations like Iceland’s geothermal springs or Kyoto’s bamboo forests, balancing
    wanderlust with a modest consultancy budget that funds annual backcountry treks in Rocky Mountain National Park.
  culinary: Veronica Joel’s palate gravitates toward Colorado wild‑game chili, quinoa salads with locally foraged goat cheese, and they often experiment with sous‑vide salmon using a Raspberry Pi temperature
    controller, though they sometimes over‑season dishes when the weekend’s climbing adrenaline still pulses.
  core: Veronica Joel is a curiosity‑driven engineer who channels anxiety into meticulous prototyping, yet they habitually procrastinate on deadlines, binge‑watch nature documentaries, and hoard half‑finished
    Arduino projects.
background:
  cultural: Veronica comes from a White, middle‑class American background rooted in the Front Range of Colorado. Growing up near Fort Collins, she was influenced by a blend of small‑town community values,
    a strong work ethic, and an outdoor‑focused lifestyle that celebrates hiking, climbing, and environmental stewardship. Her family emphasized education and practical problem‑solving, encouraging her
    to pursue a STEM degree while also fostering an appreciation for collaborative community activities. The region's progressive attitudes toward gender equality and sustainability have shaped her commitment
    to mentoring women in engineering and to pursuing eco‑friendly technological solutions.
attributes:
