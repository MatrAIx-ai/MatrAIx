  hobbies: '[''Hiking and landscape photography'', ''Rock climbing'', ''Arduino/Raspberry Pi hobby projects'', ''Yoga and mindfulness meditation'', ''Reflective journaling'', ''STEM mentorship for girls'',
    ''Wood‑turning and pottery'']'
  career_goals: Veronica aims to advance into a lead engineering technologist role where she can steer sustainable product development projects, particularly in renewable energy systems and energy‑efficient
    manufacturing. She is pursuing certification in Project Management (PMP) to better structure her work while still preserving the flexibility she thrives on. Over the next five years she hopes to contribute
    to patented innovations in solar‑integrated HVAC technology and to mentor more young women entering STEM fields. Balancing ambition with her emotional sensitivity, she also wants to establish a side
    consultancy offering rapid prototyping services for local startups, giving her creative autonomy and a controlled work pace that mitigates stress from rigid corporate timelines.
