personas:
  professional: Jane Marzullo, a seasoned full‑stack software engineer with 25 years of enterprise experience, leverages their deep expertise in React, Node.js, Python, cloud platforms, and agile project
    leadership to craft secure, visually elegant applications while mentoring junior developers and championing inclusive design in pursuit of a future Director of Engineering role.
  sports: Jane Marzullo, a devoted Buffalo Bills fan, regularly attends Sabres games, participates in the local Erie Canal Trail Hikers Club, practices weekend cycling with the Buffalo Cycling Collective,
    and swaps indoor treadmill sessions for cross‑country skiing in upstate New York during winter, balancing competitive spirit with low‑impact endurance activities.
  arts: Jane Marzullo, who regularly attends gallery openings featuring emerging artists like Lila Gomez and enjoys the surreal watercolor works of contemporary painter Yuko Hasegawa, draws inspiration
    from musicians such as Joanna Newsom and the ambient scores of Hans Zimmer, and incorporates these influences into their UI/UX designs, blending tech with artistic sensibility.
  travel: Jane Marzullo, an avid planner who prefers curated itineraries over spontaneous trips, has explored the historic streets of Quebec City, trekked the Scottish Highlands, photographed the cherry
    blossoms in Kyoto, and dreams of a road‑trip through the Finger Lakes, balancing travel with professional commitments and occasional family obligations.
  culinary: Jane Marzullo, a moderately skilled home cook, delights in preparing farm‑to‑table dishes like roasted beet and goat‑cheese salad with locally harvested kale, crafting artisanal pizza topped
    with buffalo mozzarella and fresh basil, and savoring sushi rolls featuring wild‑caught salmon, often pairing meals with a glass of pinot noir from the Niagara wine region.
  core: Jane Marzullo blends a meticulous tech mind with an artistic soul, mentors the next generation while tending a vegetable garden, navigates finances with disciplined investing and occasional tech‑gadget
    splurges, and finds balance through solitary hikes, watercolor painting, and a love for Buffalo sports.
background:
  cultural: Jane is a second‑generation Italian‑American raised in the suburbs of Niagara County, Western New York. Her family’s Catholic roots and Italian heritage emphasized close‑knit family gatherings,
    traditional cuisine, and celebrations such as Festa della Madonna. Growing up near the industrial history of North Tonawanda and the natural grandeur of Niagara Falls fostered a respect for hard work,
    community solidarity, and the outdoors. While she identifies as white American, her cultural perspective blends Mid‑Atlantic industrial values with Italian familial warmth, a love of art and music,
    and a commitment to community service. Jane participates in local cultural events, including Italian festivals, regional art fairs, and volunteer programs that reflect the diverse fabric of the Niagara
    region.
attributes:
  skills: '[''Full-stack web development (React, Node.js, Python, Java)'', ''Database design and optimization (SQL Server, PostgreSQL, MongoDB)'', ''Cloud computing (AWS, Azure)'', ''DevOps (Docker, Kubernetes,
    CI/CD pipelines)'', ''Data analysis and visualization (pandas, NumPy, Tableau)'', ''Cybersecurity best practices'', ''UI/UX design principles'', ''Agile project management (Scrum, PMP)'', ''Team leadership
    and mentorship'', ''Technical documentation'']'
  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading (science‑fiction, philosophy, design thinking)'', ''Small‑group art workshops and gallery visits'', ''Gardening'', ''Hiking the Erie
    Canal Trail'', ''Women‑in‑tech meetups and mentoring'', ''Hack‑athons'', ''Exploring new tech gadgets'']'
  career_goals: Jane aims to transition into senior technology leadership within the next three years, targeting roles such as Director of Engineering or Chief Technology Officer at an organization that
    prioritizes digital transformation and inclusive design. She plans to deepen her expertise in artificial intelligence and machine learning, applying these technologies to enhance user experiences and
    operational efficiency. Passionate about fostering diversity in tech, she intends to launch a mentorship program for women and underrepresented groups in the Niagara region and to collaborate with local
    colleges on curriculum development. In the longer term, Jane envisions a gradual shift toward technology consulting and adjunct teaching, allowing her to share her knowledge while maintaining a balanced,
    flexible lifestyle.
