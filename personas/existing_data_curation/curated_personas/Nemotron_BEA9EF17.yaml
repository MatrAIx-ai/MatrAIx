  hobbies: '[''gardening'', ''fishing'', ''listening to blues, jazz, and gospel music'', ''volunteering at the food bank'', ''attending church events'', ''reading culinary history'', ''experimenting with
    new recipes'', ''tinkering with kitchen equipment'']'
  career_goals: Antonio aims to advance to a kitchen manager or food service supervisor role within a regional restaurant chain, school district, or municipal facility. He plans to earn a ServSafe Manager
    certification and an associate degree in culinary arts from a nearby community college. In the longer term, he hopes to launch a community‑focused catering service that celebrates Southern soul‑food
    heritage while providing affordable, nutritious meals for local families and mentoring at‑risk youth interested in culinary careers.
