personas:
  professional: An aspiring visual communicator, Jose Melinsky leverages bilingual fluency, Photoshop and Illustrator expertise, and a knack for community storytelling to design vibrant public art concepts
    while juggling high school responsibilities and a fledgling YouTube channel.
  sports: A passionate recreational soccer player, Jose Melinsky regularly watches Sacramento Republic FC matches, plays midfield for the community’s Saturday morning soccer league, and supplements with
    weekend jogs in William Land Park while sometimes letting academic stress cause missed workouts.
  arts: An avid creator and cultural explorer, Jose Melinsky immerses themselves in Sacramento’s mural scene—drawing inspiration from artists like Banksy and Shepard Fairey—sketches in city parks, strums
    acoustic renditions of Jack Johnson, designs digital illustrations influenced by the graphic novel series ‘Scott Pilgrim’, shoots urban photography for their YouTube video essays, and curates playlists
    featuring indie folk and lo‑fi beats.
  travel: A budget‑conscious wanderer, Jose Melinsky plans spontaneous weekend road trips to Lake Tahoe and the historic Gold Rush towns of Nevada, dreams of a springtime art pilgrimage to Barcelona’s street‑art
    districts, and enjoys weekday evenings exploring Sacramento’s diverse neighborhoods on foot.
  culinary: A self‑taught foodie, Jose Melinsky favors eclectic food‑truck fare—tacos al pastor with pineapple, Korean tteokbokki spiced with gochujang, and vegan avocado toast on sourdough—occasionally
    experiments with home cooking, whipping up quick shrimp tacos using cilantro, lime, and corn tortillas, though they often rely on takeout for convenience.
  core: Jose Melinsky is a curious, socially‑charged teen who channels relentless artistic energy into murals and music while battling a habit of over‑thinking and occasional procrastination.
background:
  cultural: Growing up in a Mexican‑American household in Sacramento, Jose was raised bilingual and steeped in traditions such as Día de los Muertos, quinceañeras, and family gatherings centered around
    Mexican cuisine. The multicultural vibe of the city, combined with the close‑knit Mexican community, fostered his appreciation for art, music, and collective storytelling. These roots shape his worldview,
    fueling a desire to celebrate heritage while embracing diverse influences.
attributes:
  skills: '["Bilingual Spanish-English", "Digital illustration", "Graphic design (Adobe Photoshop, Illustrator)", "Photography", "Basic HTML/CSS", "Social media content creation", "Event planning and coordination",
