  hobbies: '["Visiting murals and art galleries", "Sketching and digital painting", "Playing acoustic guitar", "Urban photography", "Attending cultural festivals and Día de los Muertos celebrations", "Playing
    soccer with friends", "Exploring food trucks and Mexican cuisine", "Reading graphic novels", "Creating video essays for YouTube", "Volunteering at youth art workshops"]'
  career_goals: Jose aims to earn a bachelor’s degree in Visual Communication or Marketing and eventually lead a community‑focused creative studio or cultural nonprofit in Sacramento. He wants to design
    public art projects, curate youth art programs, and use social media to amplify Mexican‑American voices while building a career that balances creative fulfillment with personal well‑being.
