persona_description: A neuroscientist who studies the effects of alcohol and marijuana on brain health in adolescents. She is particularly interested in the long-term effects of these substances on memory,
  attention, and decision-making, and is conducting research to understand how these substances impact the brain. She is using brain scans to gather data on the changes in brain tissue health before and
  after exposure to alcohol and marijuana, and is looking for correlations between the level of substance use and changes in brain health.
