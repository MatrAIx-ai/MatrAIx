persona_description: A historian who specializes in the study of medieval and early modern legal systems, particularly those of Moldavia and Walachia. This person is knowledgeable about the ecclesiastical
  justice system in the 17th century, including the regulations on domestic violence enforced by the Metropolitan Bishops and the Princes of Moldavia and Walachia. They are interested in the legal and social
  implications of domestic violence during this period and how it was perceived and regulated.
