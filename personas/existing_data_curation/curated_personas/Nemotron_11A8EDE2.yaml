  hobbies: '[''Hiking'', ''Cooking Mexican cuisine'', ''Photography'', ''Reading'', ''Yoga and meditation'', ''Herb gardening'', ''Salsa dancing (small groups)'', ''Volunteering at health fairs'', ''Listening
    to medical and technology podcasts'']'
  career_goals: Delmarys aims to advance her nursing career by earning a Master’s degree in Nursing Informatics within the next three years, positioning herself to lead data‑driven quality improvement projects.
    She aspires to develop a community‑focused telehealth program that expands access to primary care for Spanish‑speaking families in Prince William County. In the longer term, she envisions becoming a
    Nurse Practitioner with a specialization in community health, eventually taking on a leadership role such as nurse manager or director of patient education where she can mentor new nurses and champion
    culturally sensitive care.
