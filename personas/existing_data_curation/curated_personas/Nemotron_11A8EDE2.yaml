personas:
  professional: A data‑savvy registered nurse who leverages their STEM foundation and bilingual fluency to translate complex patient data into actionable care pathways, Delmarys Mireles thrives on spontaneous
    problem‑solving in acute settings, yet often wrestles with the need for structured timelines as they pursue a Master’s in Nursing Informatics and envision leading community‑focused telehealth initiatives.
  sports: An avid hiker and community‑oriented fitness fan, Delmarys Mireles routinely conquers the Occoquan Trail, tracks their mileage with the Virginia Trails Club, roots for the Washington Commanders
    and Capitals, and adds a pop of rhythm to their routine by joining a small‑group salsa fitness circle on Friday evenings.
  arts: A contemplative visual storyteller, Delmarys Mireles captures misty riverbanks and urban murals through their DSLR, curates a modest collection of Ansel Adams prints, devours contemporary novels
    by Haruki Murakami and Sally Rooney, and tunes into the soulful crooning of Lila Downs while occasionally catching a play at the Kennedy Center.
  travel: A purposeful wanderer who blends spontaneity with practical planning, Delmarys Mireles has explored the historic streets of Old Town Alexandria, trekked the blue ridges of Shenandoah National
    Park, and is saving for a culinary pilgrimage to Oaxaca, favoring short‑haul flights and weekend road trips that fit within their tight work calendar.
  culinary: A creative home cook who reimagines traditional mole with quinoa and roasted root vegetables, Delmarys Mireles cultivates fresh cilantro, oregano, and thyme on their balcony, perfects homemade
    chiles rellenos with a splash of chipotle adobo, and delights in plating vibrant ceviche with mango alongside classic pozole during family gatherings.
  core: Delmarys Mireles is a curiosity‑driven nurse‑informaticist who merges data with compassion, often swapping between spontaneous hiking trips and late‑night kitchen experiments, yet frequently forgets
    to file their expense reports on time.
background:
  cultural: Delmarys was born to Mexican immigrant parents who settled in Virginia when she was a child. Growing up in a bilingual household, she speaks Spanish fluently and celebrates Latino traditions
    such as Día de los Muertos, Cinco de Mayo, and family gatherings centered on food and music. The values of familismo, respeto, and personalismo shape her approach to patient care, prompting her to prioritize
    cultural competence and family involvement. She remains actively involved with the local Hispanic community in Prince William County, participating in cultural festivals and volunteering at community
    health events. This bicultural experience enriches her perspective, allowing her to bridge American healthcare practices with the nuanced needs of Spanish‑speaking patients.
