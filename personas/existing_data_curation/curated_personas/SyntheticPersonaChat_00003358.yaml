    User 2: That''s funny, I''m actually a pretty good cook myself.


    User 1: Really? What''s your favorite dish to make?


    User 2: I love to make pasta dishes.


    User 1: Me too! I make a mean lasagna.


    User 2: I''ve always wanted to learn how to make lasagna.


    User 1: It''s actually pretty easy. I can give you a recipe if you want.


    User 2: That would be great!


    User 1: Sure, here it is:


    [Gives recipe]


