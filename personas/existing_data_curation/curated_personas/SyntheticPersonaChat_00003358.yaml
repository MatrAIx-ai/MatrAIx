    User 1: You''re welcome.


    User 2: So, what else do you like to do for fun?


    User 1: I love to read, go swimming, and shop online.


    User 2: Me too! I love to read fantasy fiction novels.


    User 1: I love those too! I''m currently reading The Name of the Wind by Patrick Rothfuss.


    User 2: I''ve heard good things about that book. I''m currently reading The Way of Kings by Brandon Sanderson.


    User 1: That''s a great book! I''ve read it twice.


    User 2: I''m really enjoying it so far.


    User 1: I''m glad.


    User 2: So, what else do you like to do for fun?


    User 1: I also like to go to the movies, go to concerts, and play video games.


    User 2: Me too! I love going to the movies. I just saw The Batman last weekend.


    User 1: I heard that was really good. I''m going to see it this weekend.


    User 2: You''re going to love it.


    User 1: I hope so.


    User 2: So, what are you doing this weekend?


    User 1: I''m not sure yet. I might go to the movies or go shopping.


    User 2: If you go to the movies, you should see The Batman.


    User 1: I''ll keep that in mind.'
