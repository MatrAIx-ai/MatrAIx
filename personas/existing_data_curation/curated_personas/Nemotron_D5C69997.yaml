  hobbies: '["Hiking in local parks", "Fishing at nearby lakes", "Pickup basketball", "Model kit building", "Strategy video gaming", "Reading non-fiction (technology, history, DIY)", "Volunteering at animal
    shelter"]'
  career_goals: Ray is looking to channel his curiosity and practicality into a skilled trade. In the short term, he plans to enroll in a technical college program in automotive technology or welding, aiming
    to earn ASE certification within the next two years. He also intends to complete a small‑business management course to prepare for entrepreneurship. In the medium term, he hopes to secure a stable position
    as a service technician or CNC operator at a local manufacturing firm, where his reliability and methodical approach will be valued. Over the longer horizon, he dreams of opening his own auto‑repair
    shop or a home‑improvement contracting business, combining his hands‑on skills with his organizational strengths. He also remains open to exploring entry‑level roles in logistics at a nearby distribution
    center to broaden his industry experience.
