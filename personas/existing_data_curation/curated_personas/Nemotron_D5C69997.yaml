personas:
  professional: Ray Newman, a 22‑year‑old aspiring automotive technician, combines meticulous hands‑on repair skills with a strong penchant for systematic project planning, making them a reliable go‑to
    for both routine maintenance and complex diagnostics in a local garage.
  sports: Ray Newman stays active by playing in a Wednesday night pickup basketball league, cheering on the Wichita State Shockers during March Madness, following the Kansas City Chiefs for NFL excitement,
    and spending Saturday mornings hiking with the Cedar Bluff Trail Club while using a custom‑made workout schedule to keep their back strong.
  arts: Ray Newman finds artistic balance by listening to classic rock legends such as The Eagles while assembling model airplane kits, visiting the Wichita Art Museum to admire works by regional realist
    painters, and unwinding with strategy video games like Civilization VI that double as interactive storytelling experiences.
  travel: Ray Newman prefers affordable road trips that combine outdoor adventure with hands‑on experiences, having recently driven to Colorado’s Rocky Mountain National Park for a weekend hike and dreaming
    of a future visit to Germany’s Stuttgart to explore its automotive museums and engineering workshops.
  culinary: Ray Newman enjoys cooking simple yet hearty meals, often grilling fresh trout caught at Cheney Reservoir with lemon‑pepper seasoning, whipping up classic cheeseburgers with a secret blend of
    smoked paprika and garlic, and experimenting with DIY wood‑smoked ribs on their backyard smoker, though they sometimes forget to defrost meat in time.
  core: Ray Newman is a methodical 22‑year‑old who balances a love for hands‑on tinkering, nature hikes, and strategic gaming with a disciplined schedule, yet habitually procrastinates on flossing and occasionally
    gets lost in late‑night model‑kit projects.
background:
  cultural: Ray grew up in a middle‑class family in Wichita, Kansas, immersed in Midwestern values that emphasize hard work, friendliness, and practicality. His upbringing combined suburban community life
    with exposure to the region’s agricultural heritage; his parents encouraged involvement in local activities such as the Future Farmers of America club and community service projects. He attended a public
    high school where he participated in sports and volunteer clubs, fostering a sense of cooperation and civic responsibility. The cultural milieu of Wichita, with its blend of small‑town neighborliness
    and modest urban amenities, shaped his cooperative nature and his preference for reliable, methodical approaches to challenges.
attributes:
  skills: '["Automotive maintenance and repair", "Carpentry and woodworking", "Microsoft Office and basic PC troubleshooting", "Planning and time management", "Customer service and communication", "Volunteer
