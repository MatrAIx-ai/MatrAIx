  career_goals: In the short term Holly aims to strengthen her organizational habits and maintain strong grades in English and social studies while expanding her involvement in the school’s community‑service
    club. Over the next few years she hopes to earn a scholarship to a Georgia university where she can study education or social work, with the long‑term ambition of becoming a school counselor or youth
    program coordinator who can foster inclusive, supportive environments for teen students. She envisions a career that balances helping others, flexible scheduling, and continued personal growth, allowing
    her to stay connected to family and community.
