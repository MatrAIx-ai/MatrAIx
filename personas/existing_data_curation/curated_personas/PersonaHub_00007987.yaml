persona_description: A care worker who is responsible for caring for individuals with incontinence, ensuring they have access to the necessary resources and strategies to manage their condition effectively.
  They will be engaged in skin care, applying and managing continence aids, implementing effective toileting regimes, ensuring access to mobility aids / toilets, and maintaining ongoing hygiene. They will
  follow the care plan set by the person's continence health professional and liaise with the National Continence Helpline to access practical information on resources and continence services.
