personas:
  professional: Gerardo Prado, an aspiring junior engineer, channels his enthusiasm for LEGO vehicle sets into hands‑on design projects, creates simple traffic‑light games in Scratch, and follows their
    methodical, step‑by‑step workflow, proving that they can plan and finish each task with disciplined precision.
  sports: Gerardo Prado, a forward on the River Valley Youth Soccer League team, loves scoring goals, cheers for the professional City Hawks, and after each match they systematically count their stats,
    practice dribbling drills, and set up a weekly training schedule that reflects their organized approach.
  arts: Gerardo Prado, a budding storyteller, draws comic panels inspired by Jules Verne’s adventure novels, watches the imaginative visuals of ‘The LEGO Movie’ directed by Phil Lord, jams to Kidz Bop tracks,
    and uses these influences to design elaborate LEGO scenes, showing that they blend creativity with their love for structured play.
  travel: Gerardo Prado, who enjoys family road trips, proudly displays photos from a recent visit to the ancient ruins of Machu Picchu, dreams of exploring Tokyo’s interactive science museum, and always
    creates a detailed itinerary that balances a scheduled LEGO‑building break with an adventurous hike, proving they thrive on both predictability and discovery.
  culinary: Gerardo Prado, a junior kitchen assistant, helps his grandparents roll corn tortillas, fill them with seasoned beef, onions, cilantro, and cheese for tacos, steam masa dough for tamales, and
    though they love these family dishes, they sometimes struggle to flip an omelette without burning the edges.
  core: Gerardo Prado is a methodical eight‑year‑old who fuses a love for LEGO construction, soccer strategy, and structured routines into a uniquely disciplined yet playful outlook on life, and they often
    hoard stickers while double‑checking every step before moving on.
background:
  cultural: Gerardo comes from a Mexican‑American family that keeps Spanish as the primary language at home while also embracing the English‑speaking environment of Houston. He celebrates Mexican holidays
    such as Día de los Muertos, Cinco de Mayo, and his family’s annual quinceañera preparations for his older relatives. Traditional foods, music, and stories from Mexico are a regular part of his upbringing,
    and he blends these cultural practices with the diverse influences of the Houston community, including attending multicultural festivals and learning about other cultures through school.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizational habits'', ''Step‑by‑step instruction following'', ''Scratch programming basics'', ''Soccer teamwork'', ''Bilingual communication
    (Spanish/English)'']'
  hobbies: '[''LEGO building'', ''Soccer'', ''Reading adventure/science books'', ''Puzzle solving'', ''Scratch programming'', ''Helping cook Mexican meals'', ''Sticker collecting'']'
  career_goals: Gerardo loves to imagine building things that help people, so he says he wants to become an engineer—specifically a civil engineer who designs safe bridges and playgrounds for his community.
    In the short term, he aims to finish the current school year with top grades, master a new Scratch project, and make the varsity junior soccer team in a few years. He is also interested in learning
    more about firefighting and helping others, and he hopes his future career will combine practical problem‑solving with serving his neighborhood.
