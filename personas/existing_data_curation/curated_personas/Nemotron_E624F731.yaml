personas:
  professional: Robert Dove is a senior transit electrician with eight years of hands‑on experience fixing wiring, PLCs, and power systems in buses and light‑rail vehicles, who leverages his curiosity‑driven
    improvisation and practical problem‑solving to lead maintenance crews while tolerating a loosely organized schedule and thriving under pressure thanks to his calm, resilient demeanor.
  sports: Robert Dove rows with the Baltimore Rowing Club on the Chesapeake Bay, fishes with the Chesapeake Angling Association, hikes the Patapsco Valley State Park on weekends, and cheerfully supports
    the Baltimore Ravens and Washington Capitals, preferring low‑key, solitary fitness activities over crowded gyms.
  arts: Robert Dove engages with the arts by attending live jazz performances by the Smithsonian Jazz Lab, collecting minimalist sculptures by Donald Judd, listening to the synth‑driven soundtracks of Vangelis
    and Daft Punk, and reading the engineering biographies of Nikola Tesla, which shape his appreciation for the intersection of creativity and technology.
  travel: Robert Dove prefers self‑guided road trips that balance adventure with practicality, having explored the historic streets of Savannah, Georgia, the coastal charm of Newport, Rhode Island, and
    the tech hubs of Austin, Texas, while dreaming of a future visit to Tokyo's Akihabara district to source cutting‑edge electronics.
  culinary: Robert Dove enjoys cooking simple, well‑executed meals like pan‑seared salmon with lemon‑dill sauce, roasted sweet potatoes tossed in rosemary, and a side of quinoa, favoring fresh, locally
    sourced ingredients and a reliable cast‑iron skillet, though they occasionally forget to thaw meat in advance, leading to last‑minute panicking.
  core: Robert Dove thrives on solitary tinkering, seamlessly blending curiosity with practicality, while a relaxed, somewhat disorganized approach and a calm, resilient temperament let them navigate both
    complex bus wiring and impulsive hobby purchases with equal poise.
background:
  cultural: Robert was raised in Dundalk, Maryland, a working-class community on the eastern edge of Baltimore with deep ties to the region's manufacturing and port industries. His family's history of trade
    work—particularly in electrical and mechanical occupations—instilled a respect for hard work, technical proficiency, and reliability. The Mid-Atlantic maritime culture, with its emphasis on pragmatism
    and modesty, shaped his calm and resilient demeanor. He identifies with middle-class American values, appreciating community solidarity while valuing personal flexibility over rigid schedules. Local
    traditions such as the Dundalk Festival and seasonal gatherings at the bay are part of his cultural experience, but he typically engages in them in small, familiar groups, reflecting his reserved personality.
attributes:
  skills: '["Electrical wiring installation", "Electronic system diagnostics", "Transportation equipment maintenance", "Interpretation of technical schematics", "Programmable logic controller (PLC) programming",
    "Safety compliance (NEC, OSHA)", "Use of diagnostic tools (multimeter, oscilloscope)", "Hydraulic and pneumatic system troubleshooting", "Preventive maintenance scheduling", "Field troubleshooting under
    flexible conditions"]'
  hobbies: '["Arduino and Raspberry Pi projects", "Model train building and restoration", "Fishing on Chesapeake Bay", "Hiking in Patapsco Valley State Park", "Reading engineering and science non-fiction",
    "Listening to technology podcasts", "Cooking with spouse", "DIY home improvement projects", "Volunteering at local maker space STEM workshops"]'
  career_goals: Robert aims to become a senior technician or foreperson within the next five years, taking on leadership of a maintenance crew that services electric buses and emerging autonomous vehicle
    fleets. He plans to obtain a Journeyman Electrician license and pursue the Certified Electrical Safety Compliance Professional (CESCP) credential to deepen his expertise in safety and regulatory standards.
    His curiosity about electric-vehicle battery management drives him to learn advanced battery diagnostics and eventually specialize in retrofitting legacy transportation equipment with sustainable power
    systems. Long-term, he envisions launching a small, flexible contracting business that offers preventative maintenance and custom electronic upgrades to local transit operators, allowing him to balance
    his desire for autonomy with his commitment to practical, community-focused service.
