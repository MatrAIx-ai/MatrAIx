personas:
  professional: Lillian Erhart, an organized elementary and middle school teacher who meticulously aligns lesson plans to Louisiana state standards, integrates Google Classroom and Smartboards to streamline
    instruction, excels in classroom management and data‑driven assessment, and leverages her sociable, competitive nature to lead school assemblies, PTA meetings, and community events, positioning herself
    for future leadership as a curriculum coordinator or assistant principal.
  sports: Lillian Erhart is a devoted LSU Tigers football fan who organizes weekly game‑day viewing parties, follows the New Orleans Saints season religiously, and participates in the Baton Rouge Adult
    Softball League each spring, using sports as a lively social conduit for community bonding.
  arts: Lillian Erhart, a vibrant member of the Baton Rouge Community Theater starring in productions such as A Streetcar Named Desire, devotes evenings to reading historical fiction by Ken Follett and
    Philippa Gregory, practices quilting with intricate patterns inspired by Miriam’s Quilting Guild, and finds solace in the soulful jazz of Louis Armstrong, all of which enrich her social gatherings and
    personal identity.
  travel: Lillian Erhart plans vacations with the same detailed checklists she uses for lesson plans, favoring weekend getaways to historic Southern towns like Natchitoches, Louisiana and Charleston, South
    Carolina, occasional road trips to New Orleans for its music festivals, and, when savings permit, a dream cultural immersion trip to Paris, France, always balancing travel costs with her commitment
    to community events back home.
  culinary: Lillian Erhart, an enthusiastic home cook, cultivates fresh okra, tomatoes, and sweet potatoes in her garden to craft authentic gumbo seasoned with andouille sausage and Cajun spices, and she
    bakes a signature pecan pie featuring toasted pecans and a buttery crust, often showcasing these dishes at meticulously organized dinner parties for friends and family.
  core: Lillian Erhart blends meticulous routine with vivacious sociability, channeling their competitive spirit into classroom leadership and spirited game‑day hosting, while occasionally overcommitting
    to community events at the expense of personal downtime.
background:
  cultural: Lillian grew up in a close‑knit, predominantly white community in Deridder, Louisiana, where Southern hospitality and church life shaped her values. Her family upheld traditional customs such
    as weekly potlucks, seasonal celebrations like Mardi Gras and St. Patrick's Day, and a strong emphasis on education as a pathway to stability. She identifies with the region’s modest, practical outlook
    while embracing the richness of local cuisine and music, including Zydeco and country classics. This cultural foundation reinforces her preference for routine, her practical approach to problem‑solving,
    and her desire to contribute actively to the community through both her teaching career and extracurricular involvement.
attributes:
  skills: '["Lesson planning", "Curriculum alignment with LA DOE standards", "Differentiated instruction", "Classroom management", "Student assessment and data analysis", "Parent‑teacher communication",
    "Public speaking", "Event coordination", "Technology integration (Google Classroom, Smartboard)", "Conflict resolution", "Team collaboration (grade‑level team lead)"]'
  hobbies: '["Volunteer work at local church", "Community theater acting", "Hosting dinner parties", "Gardening (vegetable and flower beds)", "Southern cooking and baking", "Reading historical fiction",
    "Quilting and crocheting", "Attending LSU football games", "Karaoke nights with friends", "DIY home décor projects"]'
  career_goals: Lillian aims to advance from classroom teaching to a leadership role within her district. She plans to pursue a master’s degree in Educational Leadership to become a curriculum coordinator
    or assistant principal, where she can shape school‑wide instructional strategies and mentor new teachers. A competitive streak drives her to earn recognition such as Teacher of the Year and to spearhead
    a district‑wide literacy improvement initiative. She also hopes to develop a robust after‑school STEM program that reinforces routine academic support for her students while fostering community partnerships.
