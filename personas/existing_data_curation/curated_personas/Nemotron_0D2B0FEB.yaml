  career_goals: In the next two years, Starr aims to earn her Certified Financial Planner (CFP) designation and deepen her expertise in socially responsible investing. She plans to develop a niche practice
    serving artists, musicians, and gallery owners, combining her financial acumen with her art background to offer tailored advisory services. Long‑term, she envisions launching a boutique financial firm
    that integrates financial literacy programs into local arts institutions, creating a supportive ecosystem for creatives to achieve financial stability while pursuing their passions. Starr also aspires
    to become a thought leader in the intersection of finance and the arts, publishing articles and speaking at industry conferences.
