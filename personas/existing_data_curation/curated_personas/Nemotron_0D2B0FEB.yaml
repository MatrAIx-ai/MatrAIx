personas:
  professional: Starr Fouche is a junior financial adviser who blends behavioral finance insights with a deep appreciation for the arts, translating complex investment concepts into clear, actionable plans
    for creative clients while they leverage an organized yet flexible approach to build long-term trust.
  sports: Starr Fouche is an avid beach-volleyball player in Tampa’s sunny summer league, a salsa-dance enthusiast who counts weekly dance socials as cardio, and a loyal fan of the Tampa Bay Buccaneers
    and the Tampa Bay Lightning, while they keep a modest running routine along the Riverwalk for balance.
  arts: Starr Fouche immerses themselves in Tampa’s vibrant arts community, sketching watercolor waterfronts inspired by the luminous realism of Andrew Wyeth and the edgy street murals of Banksy, attending
    gallery openings featuring emerging Latin-American artists such as Carlos Garaicoa, and they volunteer to teach financial literacy to local creators at the Suncoast Arts Center.
  travel: Starr Fouche curates travel itineraries that prioritize street-art festivals and cultural immersion, having explored Berlin’s urban galleries, Mexico City’s vibrant murals, and New Orleans’ jazz-filled
    streets, while they budget modestly by using points from a travel credit card and preferring short-weekend trips that fit their busy client schedule.
  culinary: Starr Fouche delights in a fusion of Gulf seafood and Caribbean flavors, often cooking shrimp and grouper ceviche with lime, cilantro, and a hint of habanero, while they also savor a classic
    Cuban sandwich with pork, ham, Swiss cheese, pickles, and mustard on pressed Cuban bread at local cafés.
  core: Starr Fouche blends a love for watercolor sunsets, meticulous budgeting, and community-driven art advocacy into a socially-conscious financial practice, all while they juggle nightly caffeine rituals
    and a habit of over-booking their calendar.
background:
  cultural: Starr comes from a white, middle‑class family with deep roots in the southeastern United States, supplemented by European heritage from both her parents. Growing up in Tampa, she was exposed
    to a blend of Southern hospitality and the city’s diverse cultural tapestry, including Cuban and Caribbean influences that shape the local arts and culinary scenes. Her family emphasized education,
    community involvement, and an appreciation for the arts, encouraging her to travel and experience varied cultural expressions. This upbringing cultivated her open‑minded curiosity, collaborative spirit,
    and a strong commitment to fostering harmony within both personal and professional relationships.
