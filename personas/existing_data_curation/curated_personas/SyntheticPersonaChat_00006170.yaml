    User 2: Thanks. I''m proud of you too. You''re doing great work as a designer.

    User 1: Thank you. I''m glad you think so.

    User 2: I know a lot of people who would love your clothes.

    User 1: That means a lot. I''m always looking for new ways to reach my audience.

    User 2: Maybe you could start a blog or an online store.

    User 1: That''s a great idea! I''ll look into it.

    User 2: I''m sure you''d do great. You''re very talented.

