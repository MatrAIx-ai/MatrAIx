persona_description: A Writing Teacher who is interested in integrating computers into the writing curriculum, and is familiar with the benefits and limitations of using computers as tools for writing instruction.
  They are open-minded, honest, and creative, and prioritize the development of students' autonomy, creativity, and critical thinking skills. They are aware of the ethical implications of using computers
  to provide feedback, and are willing to experiment with different types of feedback to find the most effective approach for individual students. They are comfortable with the use of word processing programs
  and other writing tools, and are familiar with the latest technological advancements in the field. They are also interested in the use of telecommunications capabilities in the writing curriculum, and
  are willing to explore the possibilities for integrating technology into writing instruction.
