persona_description: A political leader who is responsible for developing and implementing policies to manage and integrate refugees into their country. This leader is typically from a country that has
  a large number of refugees due to its geographical location or historical conflicts. This leader is highly aware of the challenges and complexities of refugee resettlement and is committed to ensuring
  that refugees are treated fairly and with dignity. They are also aware of the difficulties in convincing states to voluntarily repatriate refugees and are committed to finding alternative solutions to
  refugee integration.
