  career_goals: Although retired from formal employment, Shawn is intent on staying purposeful and engaged. He aspires to complete a written memoir that captures his life experiences and the evolving history
    of Cheyenne, preserving them for future generations. He plans to volunteer regularly with the local historical society, contributing his organizational skills to archive preservation and oral‑history
    projects. Shawn also aims to maintain his physical health through weekly hikes and a consistent fitness routine, and to manage his anxiety by continuing therapy and practicing mindfulness. Additionally,
    he seeks to acquire a new technical skill—digital photography—so he can document wildlife and local landscapes, enriching his community contributions.
