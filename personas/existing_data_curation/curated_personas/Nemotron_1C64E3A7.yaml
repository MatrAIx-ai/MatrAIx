  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Community theater improv'', ''Hiking in the San Bernardino Mountains'', ''Photography'', ''Experimental cooking (Asian‑Californian fusion)'',
    ''Japanese language study'', ''Volunteering for immigrant career counseling'', ''Board‑game meetups'', ''Tech and design community meetups'']'
  career_goals: Jin aims to progress to a senior HR leadership role—ideally HR Business Partner or Director of People Services—within an innovative, creativity‑focused organization. He wants to earn the
    SHRM‑SCP credential and pursue a master’s degree in Human Resource Management to deepen his strategic expertise. A core ambition is to spearhead comprehensive diversity, equity, and inclusion programs
    that integrate artistic expression as a tool for employee well‑being and collaboration. Long‑term, he envisions launching a consultancy that helps companies design culturally resonant, art‑infused workplace
    experiences, while also speaking at industry conferences on the intersection of creativity and organizational development.
