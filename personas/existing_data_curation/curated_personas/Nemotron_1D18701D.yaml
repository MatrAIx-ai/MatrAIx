  hobbies: '[''Strategic board games (Terraforming Mars, Settlers of Catan)'', ''Running (morning jogs)'', ''Cooking fusion Asian‑American dishes'', ''Reading science‑fiction'', ''Personal programming projects
    (budgeting app)'', ''Volunteering at STEM outreach events'']'
  career_goals: She aims to secure an entry‑level engineering role that values data‑driven design and clear performance metrics, ideally as a product development engineer in a technology firm. Over the
    next five years she plans to obtain a professional engineering (PE) license, deepen her expertise in automation, and eventually transition into a senior technical lead position where she can mentor
    junior engineers and drive innovative projects. She also considers pursuing a master’s degree in robotics or applied data science to complement her practical experience.
