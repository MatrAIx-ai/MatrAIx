personas:
  professional: Vanessa Fernando, a data-driven product development engineer-in-training, leverages their CAD, FEA, and Python expertise to design modular automation solutions, while their love for structured
    planning and competitive edge drives meticulous project timelines and rigorous performance metrics.
  sports: Vanessa Fernando fuels their competitive streak by clocking early morning jogs with the Riverside Runners club, training for 10 km races and a half‑marathon, while cheering on the New York Knicks
    in basketball and the Los Angeles Rams in football, and occasionally joining local tabletop gaming tournaments that blend strategy with sport.
  arts: Vanessa Fernando immerses themselves in speculative fiction, devouring novels by Neal Stephenson and N.K. Jemisin, while their playlists swing between the synth‑driven soundscapes of Daft Punk and
    the ambient electronica of ODESZA, and they attend quarterly screenings of classic sci‑fi films at the downtown ArtHouse cinema.
  travel: Vanessa Fernando prefers meticulously planned trips that blend tech tourism with culinary adventures, such as a week‑long itinerary through Tokyo’s robotics expos, Osaka’s street food markets,
    and a side excursion to the coastal town of Kamakura, while they also dream of a road‑trip across the Pacific Northwest to explore Portland’s maker spaces and craft breweries.
  culinary: Vanessa Fernando experiments in their kitchen with fusion dishes like lemongrass‑marinated BBQ chicken tacos, spicy mango sushi rolls, and Thai‑basil pesto pasta, blending coconut milk, tamarind,
    sriracha, and fresh basil to create bold flavors that echo their love for combining systematic engineering precision with creative culinary exploration.
  core: Vanessa Fernando is a competitive, structure‑loving engineer who runs at dawn, codes budgeting tools, and cooks daring Southeast‑Asian‑American fusion while obsessively tracking every metric from
    project timelines to calorie counts.
background:
  cultural: Vanessa’s family heritage is a blend of Filipino and Indian roots, reflecting a multicultural Asian background that she navigates alongside her American upbringing in Upstate New York. Growing
    up, she celebrated both Diwali and the Filipino Feast of the Black Nazarene, fostering a respect for diverse traditions and a strong emphasis on education and discipline. Bilingual in English and Tagalog,
    and conversational in Hindi, she often incorporates family recipes and cultural values into her daily life, while also participating in community events in Monroe that celebrate multiculturalism.
attributes:
