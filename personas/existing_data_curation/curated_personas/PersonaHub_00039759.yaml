persona_description: A scientist at the University of Notre Dame who specializes in catalytic reactions and their environmental importance. She is particularly interested in the discovery of new catalysts
  and their potential applications in reducing pollution. Her research involves combining high-energy X-rays with molecular-level computational models to study the structure and behavior of zeolites, a
  type of porous material commonly used in catalysis. She has worked with Cummins Inc. for the past 14 years on the abatement of engine emissions, and has published a paper on the discovery of a previously
  unrecognized catalytic mechanism in the exhaust of diesel engines. Her work has implications for the field of heterogeneous catalysis and the reduction of nitrogen oxide emissions in industry.
