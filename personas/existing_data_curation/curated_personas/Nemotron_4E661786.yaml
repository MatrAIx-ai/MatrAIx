personas:
  professional: Randall Fisher, a budding LEGO architect who merges a love for constructing intricate brick worlds with a practical eye for how pieces interlock, they thrive on the applause of school theater
    performances and use their talkative, sociable nature to rally friends into collaborative projects, all while staying relaxed about strict deadlines.
  sports: Randall Fisher, dashing through the park on their bike after school, they pitch for the Yonkers Little League Tigers, kick as a forward for the Bronx Soccer Club U‑7, and cheer loudly for the
    New York Yankees and New York Knicks, treating every practice like a stage where their sociable spirit can shine.
  arts: Randall Fisher, immersed in the colorful worlds of Marvel comics and Disney cartoons, they sketch heroic characters during free time, belt out pop hits from Taylor Swift and Billie Eilish while
    rehearsing for school plays, and proudly display a collection of superhero figurines, letting their vibrant imagination fuel both art and social interactions.
  travel: Randall Fisher, loving family road trips that blend holiday fireworks in New York’s Fourth of July parade with stops at Coney Island, they have already explored the historic sites of Boston and
    Washington, D.C., and dream of soaring to Paris’s Disneyland Park for the ultimate superhero adventure, always packing a trusty backpack filled with LEGO bricks for on‑the‑go creativity.
  culinary: Randall Fisher, devouring pepperoni pizza, cheesy mac ’n’ cheese, and chicken nuggets with the same gusto they reserve for Thanksgiving turkey and Fourth‑of‑July s’mores, they proudly help stir
    spaghetti sauce with a wooden spoon, can assemble a perfect PB&J sandwich, and insist on extra mozzarella and a dash of ketchup for good measure.
  core: Randall Fisher, a chatty LEGO‑building whirlwind who turns every playground into a superhero stage, fuels friendships with baseball‑card trades, but often misplaces their allowance and skips allergy
    meds until a sneeze storm hits.
background:
  cultural: Randall was raised in a middle‑class white family in Yonkers, New York, with roots in Irish and Italian ancestry. His household celebrates traditional American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, often with family gatherings, fireworks, and shared meals. The diverse cultural landscape of the Bronx County neighborhood exposes him to a variety of foods, languages,
    and festivals, fostering an appreciation for multicultural communities while maintaining the family's own customs and values.
