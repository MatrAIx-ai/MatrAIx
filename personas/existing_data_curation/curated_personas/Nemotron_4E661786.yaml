  career_goals: Even at seven, Randall dreams of careers that let him be in the spotlight and connect with others. He aspires to become a teacher or a TV host where he can share stories and inspire friends,
    and he also imagines himself as an astronaut exploring new frontiers. His long‑term ambition is to lead community projects that bring people together and make learning fun.
