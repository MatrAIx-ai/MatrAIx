  career_goals: Gerardo aims to re‑enter the workforce in a stable, structured role that leverages his administrative and community‑service strengths, such as a program coordinator or administrative assistant
    within a nonprofit or municipal agency serving Hispanic/Latino populations. He plans to complete a bachelor’s degree in Public Administration or Business Management over the next three years to qualify
    for supervisory positions. Long‑term, he dreams of establishing a family‑run catering business that showcases authentic Dominican cuisine, balancing his professional aspirations with his cultural heritage.
