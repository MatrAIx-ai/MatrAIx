persona_description: A person who is passionate about body image and mental health, and is dedicated to helping others heal from negative body image through art therapy techniques and positive body image
  workshops. They are knowledgeable about the effects of media messages, dieting pressure, and trauma on body image, and are skilled in working with individuals to challenge distorted perceptions about
  their weight, size, and shape, restore trust in their body's ability to regulate appetite and weight, develop acceptance of perceived imperfections, create a new definition of beauty outside of the media's
  narrow standards, and express appreciation for all that the body allows them to do. They are also knowledgeable about the eating disorder diagnoses listed above and the importance of treatment for body
  image in healing from negative body image.
