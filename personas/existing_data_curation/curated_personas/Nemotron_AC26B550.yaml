  career_goals: Carol enjoys helping others and loves art, so she often talks about wanting to become someone who can make a difference, such as a teacher who reads stories and paints pictures for children,
    an artist who creates bright murals, or a caregiver like a nurse who looks after people. Although she is very young, these playful aspirations reflect her compassionate and creative personality.
