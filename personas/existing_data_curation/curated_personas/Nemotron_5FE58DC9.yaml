  career_goals: Peter aspires to become the head of the humanities department at his school, where he can scale his curriculum innovations across the district. He seeks to launch a regional collaborative
    program that connects history and literature teachers from neighboring counties, and to publish a textbook on interdisciplinary primary‑source analysis. In the longer term he aims to transition into
    a school‑wide leadership role—assistant principal or principal—so he can influence school culture, promote critical‑thinking initiatives, and expand community‑engagement programming. He also hopes to
    serve on the local school board to advocate for evidence‑based policies and expanded extracurricular opportunities.
