    phone, in‑person)'', ''Remote collaboration tools (Zoom, Slack, Microsoft Teams)'']'
  hobbies: '[''Trail hiking'', ''Gardening (herbs and vegetables)'', ''Knitting/Crocheting'', ''Reading historical non‑fiction and classic literature'', ''Puzzle solving (crosswords, Sudoku)'', ''Nature
    photography'', ''Chess (small group play)'', ''Home yoga and guided meditation'']'
  career_goals: Nancy aims to advance to an office manager or senior executive assistant role within the next five years, overseeing a small administrative team and shaping office procedures. She plans
    to earn the Certified Administrative Professional (CAP) credential and complete a business management certificate to solidify her leadership credentials. While seeking greater responsibility, she also
    values a stable, low‑stress environment, so she is exploring hybrid or remote work options that provide more control over her schedule. Long‑term, she envisions launching a boutique virtual‑assistant
    service that leverages her expertise in workflow optimization and client communication, allowing her to work independently and manage her own client portfolio.
