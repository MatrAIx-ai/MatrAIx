persona_description: A historian who is interested in the social and economic migrations of black Americans in the 20th century, particularly the exodus from the southern United States to the North and
  Western cities. They are fascinated by the human stories behind the migration, the cultural changes that occurred, and the impact on American society. They are also interested in the intersection of race,
  class, and history, and how these factors shaped the experiences of the black migrants. They are likely to be a scholar or a journalist who writes about history and social issues.
