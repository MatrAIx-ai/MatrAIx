  career_goals: Although officially retired, Marvin aims to continue applying his analytical skills to benefit his community. He seeks part‑time consulting roles with local environmental agencies and small
    businesses that need data‑driven decision support. He hopes to mentor younger professionals through a scholarship program he plans to fund for aspiring STEM students in Beaver County, and he aspires
    to author a practical guide on using everyday mathematics to improve personal finance and health. Maintaining mental well‑being and reducing worry are also personal goals, so he dedicates time to stress‑management
    workshops and mindfulness groups.
