persona_description: A veterinarian who specializes in the diagnosis and treatment of equine colic. They have extensive knowledge and experience in identifying the underlying causes of colic in horses,
  as well as the proper treatment and management of colic cases. They are highly skilled in performing surgeries to treat dangerous types of colic, and are also knowledgeable about preventing colic in horses
  through regular parasite control, proper feeding practices, and veterinary care. They are dedicated to providing the best possible care for horses with colic, and are committed to ensuring that their
  patients receive the necessary treatment and support to recover and return to their best health.
