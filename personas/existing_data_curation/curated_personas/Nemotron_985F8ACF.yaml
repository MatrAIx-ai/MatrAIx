personas:
  professional: Susi Nguyen, an ambitious cleaning professional with a knack for efficiency, leverages their methodical approach, bilingual communication, and curiosity about safety protocols to excel in
    facility maintenance while eyeing a supervisory role within the next few years.
  sports: Susi Nguyen's weekend routine includes hiking the nearby state park trails and biking with the local "Greenway Cyclists" club, while cheering on the regional soccer team the River City FC, embodying
    a balance of outdoor adventure and community sports fandom.
  arts: Susi Nguyen cultivates a vibrant artistic life by attending contemporary and traditional dance classes, joining film nights featuring directors like Bong Joon‑ho and Greta Gerwig, and curating playlists
    that range from Tame Impala to classic Vietnamese folk songs, allowing music and movement to shape their social energy.
  travel: Susi Nguyen favors spontaneous road trips to scenic spots like the Grand Canyon and coastal towns in New Mexico, while also planning a future pilgrimage to the bustling night markets of Ho Chi Minh
    City and the serene rice terraces of Bali, balancing budget-friendly exploration with dream destinations.
  culinary: Susi Nguyen delights in cooking fragrant phở broth with star anise and lemongrass alongside sizzling Tex‑Mex burritos stuffed with jalapeño‑infused shrimp, often experimenting with fusion sauces
    while occasionally neglecting to clean the stovetop after a late‑night cooking session.
  core: Susi Nguyen blends meticulous organization with a love for community dance, pragmatic budgeting, and adventurous cooking, all while juggling occasional back pain and a penchant for impulse purchases
    of dance gear.
background:
  cultural: Susi was raised in a Vietnamese‑American household in Fort Bend County, an area with a vibrant Southeast Asian community. Her family celebrates cultural traditions such as Tet, prepares Vietnamese
    dishes at home, and speaks Vietnamese, while also embracing broader Texan customs. This bicultural upbringing instills a strong sense of family responsibility, respect for elders, and communal values,
    balanced by her outgoing personality and adaptability to diverse settings. She often leverages her bilingual skills to bridge cultural gaps at work and in community events.
