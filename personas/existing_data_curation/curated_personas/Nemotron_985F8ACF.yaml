  career_goals: Susi aims to move from a frontline cleaning role to a supervisory position in facilities management within the next three to five years. She plans to enroll in a community‑college program
    in facilities management or occupational safety to earn certifications, then become a lead janitor or facilities coordinator overseeing a small team. Long‑term, she hopes to launch her own cleaning
    service that emphasizes sustainable practices and provides job opportunities for other young adults in her community.
