personas:
  professional: Nick Britt, a seasoned front-of-house professional with over three decades in high-volume diners, leverages their keen curiosity for new service tricks while staying grounded in tried‑and‑true
    floor‑management routines; their competitive edge drives them to mentor younger staff, tighten workflow, and aim for a floor‑manager role within two years, all while maintaining a flexible, people‑first
    approach that reads guests’ moods and de‑escalates tension.
  sports: Nick Britt fuels their energy by playing pickup basketball at the local recreation center, cheering on the Detroit Pistons and Detroit Tigers, and joining the Sanilac County Hiking Club for weekend
    treks in the state park, while also taking part in a community fishing league on Lake Huron that feeds both their love of the sport and their competitive spirit.
  arts: Nick Britt channels artistic appreciation by listening to classic‑rock legends like Led Zeppelin and The Rolling Stones, dancing the night away at swing‑style dance halls to the live sounds of local
    big‑band ensembles, and crafting small furniture pieces in a woodworking club that doubles as a creative outlet inspired by Midwestern craftsmanship traditions.
  travel: Nick Britt prefers road‑trip adventures that balance fishing on Lake Huron with occasional weekend escapes to the Upper Peninsula’s Pictured Rocks, while dreaming of a culinary pilgrimage to Oaxaca,
    Mexico, yet they keep travel plans modest due to their full‑time restaurant schedule and the goal of saving for their future café.
  culinary: Nick Britt, an avid backyard grill master, experiments with smoky brisket rubbed in paprika and brown sugar, hickory‑chip‑infused salmon, and a signature honey‑mustard pork shoulder, while also
    enjoying fish tacos with cilantro‑lime slaw at food festivals and cooking classic Midwestern comfort dishes like chicken pot pie and apple crisp with a modest but confident culinary hand.
  core: Nick Britt blends a competitive, curiosity‑driven work ethic with a sociable, community‑centered lifestyle, often juggling late‑night barbecues, spontaneous fishing trips, and a relentless pursuit
    of a modest café that reflects both practicality and creative flair.
background:
  cultural: Nick grew up in a small, predominantly white Midwestern community in Michigan, where his family has deep ties to agriculture and small-business entrepreneurship. The region’s values of self-reliance,
    hard work, and neighborly support shaped his practical outlook. He was raised with a mix of Lutheran and community-spirited traditions, which emphasized modest celebration of holidays, participation
    in local fairs, and involvement in charitable events. His cultural identity blends the stoic, down-to-earth ethos of rural Michigan with a curiosity about broader culinary trends, giving him a pragmatic
    yet open-minded perspective on both work and leisure.
