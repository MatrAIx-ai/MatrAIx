  career_goals: Nick aims to move from server to a supervisory role within the next two years, targeting a floor-manager position where he can mentor younger staff and implement service-efficiency initiatives.
    He is working toward earning a ServSafe Manager certification to strengthen his credentials. In the longer term, he dreams of opening a modest, family-run café that showcases Midwestern comfort food
    with a seasonal twist, offering a space for community gatherings and senior-friendly dining. He also hopes to be recognized for his contributions with regional hospitality awards, which would satisfy
    his competitive drive while reinforcing his commitment to quality service.
