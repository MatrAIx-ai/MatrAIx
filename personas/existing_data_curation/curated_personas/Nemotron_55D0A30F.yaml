  career_goals: Hayden often talks about wanting to become a firefighter or a farmer when he grows up. He is drawn to these roles because they involve clear routines, helping others, and working outdoors
    in familiar settings. He also imagines being a construction worker because he enjoys building and sees it as a practical, hands‑on job.
