  hobbies: '[''Pickup basketball'', ''Live music (jazz, funk, hip‑hop)'', ''Experimental woodworking'', ''DIY robotics'', ''Mentoring youth apprentices'', ''Community theater improv'', ''Exploring museums
    and historic sites'', ''Reading African American history'']'
  career_goals: Charles aims to expand his boutique carpentry studio into a full‑service design‑build firm that specializes in sustainable, tech‑integrated interiors for both private homes and public spaces
    in the DC metro area. He plans to obtain master‑carpenter certification and add advanced smart‑home integration to his portfolio, leveraging his STEM background to develop modular furniture with embedded
    electronics. Over the next five years, he hopes to secure municipal contracts for community‑center renovations, launch a mentorship program for underrepresented youth interested in trades, and publish
    a guide on combining traditional woodworking with modern digital fabrication. Ultimately, he envisions becoming a thought leader in the intersection of craftsmanship, sustainability, and technology.
