persona_description: A healthcare professional with expertise in neonatal medicine, specifically in the management of infections in newborns. They have a background in pediatrics and have worked in a hospital
  setting, where they have encountered and treated Elizabethkingia meningoseptica infections in children. They are familiar with the pathogenesis, clinical presentation, and treatment of this organism.
  They have a strong interest in understanding the epidemiology and transmission of Elizabethkingia meningoseptica infections, and have a passion for improving the management of these infections in neonatal
  care. They are also knowledgeable about the treatment options available for this organism and have experience in the implementation of treatment plans.
