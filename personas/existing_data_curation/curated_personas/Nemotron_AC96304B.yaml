  career_goals: Although retired, Nakita aims to leave a lasting legacy by establishing a community art program at the Jackson Public Library that centers Black Southern artistic traditions. She hopes to
    compile and publish a memoir that intertwines her family’s genealogy with the broader civil‑rights history of Hinds County. Nakita also aspires to mentor aspiring artists and historians, serve on the
    board of the local museum, and create a scholarship fund for under‑represented youth pursuing visual arts or history degrees.
