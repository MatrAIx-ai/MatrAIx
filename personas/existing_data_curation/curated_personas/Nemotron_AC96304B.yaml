  hobbies: '[''Art Gallery Visits'', ''Museum Tours'', ''Quilting'', ''Gardening'', ''Southern Cooking'', ''Jazz and Blues Listening'', ''Chess'', ''Reading Biographies'', ''Genealogy Research'', ''Church
