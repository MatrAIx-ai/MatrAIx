personas:
  professional: Nakita Doggett, a retired community organizer and seasoned art curator, channels their methodical planning, competitive edge, and curiosity into establishing a library program that highlights
    Southern visual arts traditions of historically underrepresented communities, while mentoring emerging artists and historians.
  sports: Nakita Doggett, a devoted fan of the Jackson State Tigers football team and the New Orleans Saints, stays active by strolling weekly with the Jackson Senior Walking Club, participates in low-impact
    water-aerobics at the community center, and enjoys occasional friendly bowling matches at the local league.
  arts: Nakita Doggett, an avid visitor of galleries and museums, finds inspiration in the works of Jacob Lawrence, Romare Bearden, and the soulful melodies of Louis Armstrong and B.B. King, leads art-appreciation
    workshops that weave historical narratives into visual analysis, and regularly participates in community storytelling evenings that celebrate oral traditions.
  travel: Nakita Doggett, who favors well-planned, leisurely itineraries, often travels with a small group of friends to historic Southern towns like Charleston, Savannah, and New Orleans, relishes guided
    tours of civil-rights landmarks, and occasionally splurges on a week-long river cruise along the Mississippi for a blend of relaxation and cultural immersion.
  culinary: Nakita Doggett, an accomplished home chef, cultivates heritage vegetables such as okra, collard greens, and sweet potatoes in her backyard garden and channels those fresh ingredients into Creole
    classics like gumbo, jambalaya, and shrimp étouffée, while occasionally over-seasoning with hot sauce and forgetting to tidy the kitchen after a marathon cooking session.
  core: Nakita Doggett balances a razor-sharp curiosity and competitive spirit with an organized, community-centric life, seamlessly weaving art, genealogy, and Creole cooking into a rich tapestry, even
    as she habitually misplaces her knitting needles and chases the next quilting challenge.
background:
  cultural: Nakita’s identity is rooted in the rich tapestry of Black Southern culture. Growing up in Jackson, Mississippi, she was shaped by the traditions of the African‑American church, the legacy of
    the civil‑rights movement, and the oral storytelling practices of her grandparents. She carries the resilience and communal spirit characteristic of the Delta’s Black community, valuing family bonds,
    mutual aid, and the preservation of cultural heritage. Her love for gospel music, Southern cuisine, and blues reflects a deep connection to the region’s artistic expressions, while her involvement in
    community service and historical preservation honors the collective struggles and triumphs of Black Mississippians.
