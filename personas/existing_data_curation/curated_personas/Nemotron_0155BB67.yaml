personas:
  professional: Angel Moreno, a budding digital artist and junior coder at eleven, blends a love for sketching landscapes with early coding games, and they channel their curious mind into whimsical animated
    stories that reflect their solitary focus.
  sports: Angel Moreno enjoys solitary outdoor activities, often joining the local Paso Robles youth hiking club to explore trail systems, and they also cheer for the San Luis Obispo baseball team while
    occasionally playing pick-up soccer with friends at the community field.
  arts: Angel Moreno immerses themselves in artistic pursuits, drawing inspiration from graphic novel author Alan Moore, studying Claude Monet's landscape techniques, and listening to classical composers
    such as Mozart and Debussy while they digitally paint dreamlike scenes on their tablet.
  travel: Angel Moreno prefers low-key adventures, planning weekend hikes along the rolling hills of Paso Robles and day trips to coastal towns like Cambria, and they dream of visiting Japan's cherry-blossom
    festivals to sketch sakura trees, though their travel plans are limited by school schedules and a modest family budget.
  culinary: Angel Moreno enjoys cooking simple family recipes such as tamales and quesadillas, relishing the aroma of fresh corn tortillas, roasted chilies, and cilantro, and they frequently experiment
    with adding seasonal wild herbs they collect from nature trails into their dishes.
  core: Angel Moreno is a quietly curious eleven-year-old who balances a love for solitary creative expression with a reliable, organized routine, yet they occasionally procrastinate on chores in favor
    of sketching or coding.
background:
  cultural: 'Angel is a first‑generation Mexican‑American raised in Paso Robles, California. At home she speaks Spanish with her parents and grandparents, preserving family traditions such as celebrating
    Día de los Muertos, making tamales, and listening to mariachi music. The blend of Mexican heritage and the Californian agricultural community influences her worldview: she values hard work, community
    ties, and the vibrant colors and stories of Mexican culture. Angel’s bicultural identity informs her artistic interests, often incorporating folk motifs and bilingual narratives into her creations.'
attributes:
  skills: '[''Self-directed learning'', ''Reading comprehension'', ''Creative writing'', ''Sketching'', ''Watercolor painting'', ''Basic digital illustration'', ''Bilingual communication (English/Spanish)'',
    ''Organizational skills'', ''Time management'', ''Basic coding with Scratch'']'
  hobbies: '[''Reading graphic novels'', ''Sketching landscapes'', ''Journaling'', ''Nature walking'', ''Photography'', ''Digital art'', ''Educational coding games'', ''Listening to classical music'', ''Cooking
    Mexican dishes'']'
  career_goals: Angel hopes to become a visual artist and illustrator who blends Mexican cultural motifs with contemporary design. She dreams of attending an art‑focused high school and later studying graphic
    design or animation at university. In the future, she envisions working as a freelance concept artist or museum curator for Latino art, creating projects that celebrate her heritage. She also expresses
    a budding interest in using art to raise awareness about sustainable agriculture in her community.
