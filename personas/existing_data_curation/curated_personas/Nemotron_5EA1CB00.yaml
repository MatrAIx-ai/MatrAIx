  career_goals: Mathew dreams of a career that blends his love for art, technology, and the environment. He envisions studying environmental design or landscape architecture, creating spaces that are both
    functional and aesthetically inspiring. He is also intrigued by user experience design and digital media, hoping to become a designer who crafts intuitive digital products or interactive storytelling
    experiences. In the short term, he aims to attend a high school with strong STEM and arts programs, participate in advanced science fairs, and take portfolio classes. Ultimately, he aspires to earn
    a degree in interdisciplinary design or environmental science and work on community projects that integrate sustainable practices with artistic expression, such as public art installations in natural
    settings.
