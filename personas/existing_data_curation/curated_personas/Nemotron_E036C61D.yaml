  hobbies: '[''Reading historical biographies and educational research'', ''Gardening (heirloom vegetables and herbs)'', ''Knitting and crocheting'', ''Birdwatching'', ''Genealogy research'', ''Puzzle solving
    (crosswords, Sudoku)'', ''Volunteering at the local library'']'
  career_goals: While planning to transition into retirement, Amanda aims to leave a lasting impact on her district by authoring a comprehensive curriculum guide that merges traditional teaching frameworks
    with evidence‑based innovations. She hopes to become a mentor‑coach for new educators, offering workshops on practical lesson planning and data‑driven instruction. Additionally, she aspires to volunteer
    as a reading specialist at the local library, develop a community tutoring program for underserved students, and eventually serve on the school board’s advisory committee to champion policies that balance
    academic rigor with student well‑being. Publishing a reflective memoir on her teaching journey and the evolution of education over the past fifty years also sits on her agenda.
