personas:
  professional: Amanda Campo, a seasoned elementary and middle‑school educator with four decades of classroom mastery, leverages her competitive drive and meticulous organization to design data‑driven,
    differentiated curricula, mentor novice teachers, and champion practical innovations as she winds down her career toward retirement.
  sports: Amanda Campo, a member of the O'Fallon Senior Walking Club, enjoys low‑impact cardio on crisp autumn mornings, follows the St. Louis Cardinals baseball season avidly, and plays weekly pickleball
    at the nearby community center to keep her joints limber.
  arts: Amanda Campo, an avid reader of historical biographies, spends evenings listening to Yo‑Yo Ma’s cello suites while knitting intricate Fair‑Isle blankets, and attends occasional performances by the
    St. Louis Symphony Orchestra, especially works by Mahler, enriching her solitary leisure time.
  travel: Amanda Campo, a meticulous planner who charts itineraries in her tidy notebook, favors short culturally‑rich trips such as Charleston’s cobblestone streets and Savannah’s moss‑draped squares,
    enjoys weekend drives to the scenic Ozark trails, and dreams of a pilgrimage to a rugged Atlantic island famed for medieval ruins and folk traditions to explore her family’s distant lineage.
  culinary: Amanda Campo, a confident home cook who harvests garden‑fresh rosemary, chives, and heirloom tomatoes, regularly prepares herb‑infused roasted chicken, a caprese salad with fresh mozzarella
    and heirloom tomatoes, and a seasonal sauerkraut stew, yet sometimes over‑salts her dishes while savoring a slice of bakery‑bought apple pie on Sundays.
  core: Amanda Campo, a fiercely curious yet meticulously organized retired teacher, channels her competitive edge into detailed garden journals, obsessive bird‑watching logs, hoards overdue library books,
    and finds calm in solitary knitting sessions.
background:
  cultural: Amanda grew up in a Midwestern, white family with Irish and German roots, raised in a modest suburban community near O'Fallon, Illinois. Her upbringing was shaped by the region’s emphasis on
    hard work, self‑reliance, and community involvement, values reinforced by a Protestant (Methodist) church tradition that highlighted education and service. As a baby‑boomer, she experienced the social
    changes of the 1960s and 1970s, which fostered her independent, skeptical outlook and competitive drive. The cultural milieu of small‑town Illinois—marked by seasonal festivals, strong school ties,
    and a deep respect for practical knowledge—has influenced her balanced blend of curiosity and pragmatism, her preference for intimate gatherings, and her commitment to lifelong learning.
attributes:
  skills: '[''Classroom management'', ''Curriculum development'', ''Differentiated instruction'', ''Literacy instruction'', ''Assessment design and data analysis'', ''Educational technology integration'',
