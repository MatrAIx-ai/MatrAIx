  hobbies: '[''Reading historical non-fiction'', ''Fishing'', ''Sailing'', ''Woodworking'', ''Gardening'', ''Running'', ''Meditation'', ''Volunteer work at the Sandwich Historical Society'', ''Photography
    of coastal landscapes'']'
  career_goals: William aims to become the leading boutique brokerage in the Cape Cod region, specializing in high‑value waterfront and historic properties. Over the next five years he plans to earn the
    "Top Producer" award, expand his team with agents who share his disciplined, client‑centric values, and launch a mentorship program for new agents. He also seeks to diversify his portfolio by adding
    property development advisory services, while preserving a work‑life balance that reduces stress and allows him to support his family's stability.
