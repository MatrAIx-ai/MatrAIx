  career_goals: Approaching retirement, Jedediah aims to transition from frontline sales to a mentorship and advisory role, leveraging his practical experience to coach younger sales representatives. He
    hopes to establish a part-time consulting practice helping small manufacturers adopt efficient sales strategies and digital tools. He is also interested in exploring emerging market segments, such as
    renewable energy equipment, to keep his curiosity alive and ensure his remaining years remain professionally engaging without the pressure of meeting aggressive quotas.
