personas:
  professional: A seasoned wholesale and manufacturing sales veteran, Jedediah Latta leverages three decades of B2B negotiation, supply-chain expertise, and a calm, hands-on problem-solving style; they
    now mentor younger reps while exploring emerging renewable-energy equipment markets on a flexible, curiosity-driven schedule.
  sports: An avid supporter of the Baltimore Ravens and the Washington Capitals, Jedediah Latta enjoys low-impact fitness through regular walks along the Pocomoke River, occasional community birdwatching
    hikes with the Eastern Shore Birdwatchers Club, and a weekly bocce league at the senior center, favoring small-group activities over crowded stadiums.
  arts: A quiet connoisseur of folk heritage, Jedediah Latta spends evenings listening to John Hartford’s banjo tunes, reading historical nonfiction by C. Vann Woodward, and attending the Chesapeake Bay
    Maritime Museum’s rotating exhibitions of nautical art, while occasionally sketching wooden model train designs in a modest home studio.
  travel: A low-key traveler, Jedediah Latta prefers solitary road trips to places like Assateague Island’s wild horses, the quiet cabins of Shenandoah National Park, and historic St. Andrews, Scotland,
    planning journeys loosely around fishing opportunities and garden-inspired souvenirs rather than strict itineraries.
  culinary: A modest home chef, Jedediah Latta delights in grilling fresh catfish with a dash of Old Bay, simmering garden-grown tomato soup, crafting flaky crab cakes, and baking apple-cinnamon pie, though
    they often forget to clean the grill promptly after a long fishing day.
  core: Jedediah Latta is a calm, curiosity-driven former sales maestro who fills their retirement with fishing, woodworking, mentorship, and occasional disorganized filing of receipts.
background:
  cultural: Jedediah is a white American raised in the rural Eastern Shore of Maryland. His family's roots trace back to English and Irish settlers who have lived on the region's farms and small towns for
    generations. Growing up in Girdletree, he absorbed a modest, hard-working culture that values self-reliance, community service, and respect for the natural environment. Local traditions, such as seasonal
    fishing, county fairs, and close-knit church gatherings, have shaped his worldview. While his upbringing emphasized practicality and stoicism, his lifelong curiosity has kept him open to new ideas and
    modestly influenced by the region's blend of agricultural, maritime, and manufacturing heritage.
