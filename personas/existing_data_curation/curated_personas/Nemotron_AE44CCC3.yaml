  career_goals: Jill aims to transition into a software architecture role where she can lead cross‑functional teams to build innovative, user‑centric products that fuse technology and art. She plans to
    obtain AWS Solutions Architect certification and deepen her knowledge of machine learning to explore intelligent, creative applications. Long‑term, Jill envisions founding a boutique startup that creates
    interactive digital installations for museums and community spaces, while also establishing a mentorship program for women and mid‑career professionals entering the tech field.
