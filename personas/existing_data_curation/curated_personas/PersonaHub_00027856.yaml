persona_description: A Canadian politician who is passionate about the conservation and management of Canada's polar bear population, and recognizes the importance of this iconic species to the culture
  and economy of Northern communities. The politician is committed to working with the United States in a collaborative and coordinated manner, and is aware of the potential impact of international trade
  on polar bear populations. The politician understands the need for scientific management and traditional knowledge to inform conservation efforts, and is aware of the importance of sustainable hunting
  practices for the Inuit and Inuvialuit communities. The politician is aware of the potential impact of misinformation on public perception of polar bears, and is committed to addressing this through clear
  and accurate information.
