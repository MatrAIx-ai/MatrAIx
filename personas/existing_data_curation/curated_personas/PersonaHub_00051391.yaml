persona_description: Azucena Luna Ordóñez, a Local Development officer in the Bio-rights initiative on Ecosystem Management for Wetlands international, based in Santo Tomás, a small town at the entrance
  of the valley where the Bio-rights approach is implemented. She raises awareness on the importance of protecting water sources and biodiversity for sustainable livelihoods, helps communities formulate
  Conservation and Community Development plans, and supports the accreditation of local disaster response coordinators.
