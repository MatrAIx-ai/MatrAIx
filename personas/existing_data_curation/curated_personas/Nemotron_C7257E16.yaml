personas:
  professional: Danielle Crawford, a veteran elementary and middle‑school teacher with over three decades of experience, excels at meticulous lesson planning, dependable classroom routines, and calm conflict
    resolution, and channels her competitive streak into driving school‑wide literacy initiatives that blend community volunteers with proven, standards‑aligned curricula.
  sports: Danielle Crawford stays active through a co‑ed softball league, weekly Cascades hikes with her local trail club, and cheering for the Seattle Seahawks, Seattle Sounders FC, and Seattle Storm,
    treating fitness as a social commitment rather than a strict regimen.
  arts: Danielle Crawford expresses her creative side by singing baritone parts in a community choir that performs classics from Joni Mitchell to Handel, quilting intricate patterns during quiet evenings,
    and devouring contemporary fiction like Sally Rooney’s novels, while occasionally attending shows at the Seattle Repertory Theatre.
  travel: Danielle Crawford prefers road‑trip adventures that combine Cascades hikes, visits to family in Portland, and national park explorations in Glacier and Yosemite, planning trips around group activities
    and modest budgets, while dreaming of a leisurely European tour of the Scottish Highlands and historic English countryside.
  culinary: Danielle Crawford enjoys cooking her family’s staple salmon baked with rosemary and lemon, a hearty beef stew with carrots from her community garden, and a perfectly brewed pour‑over coffee,
    showcasing solid home‑cooking skills that shine when she shares meals at neighborhood potlucks.
  core: Danielle Crawford blends a competitive, routine‑loving mindset with a sociable, community‑focused heart, often juggling a love for hiking, quilting, and coffee while occasionally letting disorganization
    creep into bill payments.
background:
  cultural: Danielle comes from a white, Northern‑European American background, raised in the Pacific Northwest where a blend of progressive values and practical sensibilities is common. Growing up in Seattle's
    suburbs, she was immersed in the region's strong emphasis on education, outdoor recreation, and community involvement. The local coffee culture, love for hiking, and commitment to civic engagement have
    shaped her worldview, fostering a pragmatic yet socially active lifestyle. While she appreciates the area's diversity, her traditional upbringing and competitive nature sometimes make her cautious about
    new ideas, preferring familiar, proven approaches.
attributes:
  skills: '["Classroom management", "Lesson planning", "Curriculum development", "Reading instruction", "Mathematics instruction", "Parent‑teacher communication", "Community outreach", "Collaborative team
