  hobbies: '["Reading book clubs", "Community gardening", "Local theater participation", "Hiking in the Cascades", "Cooking traditional family recipes", "Singing in a community choir", "Trivia night competitions",
    "Softball league", "Crafting (quilting, knitting)", "Volunteering for after‑school tutoring", "Attending Seattle music festivals"]'
  career_goals: Looking ahead, Danielle aims to transition into a lead teacher or curriculum coordinator role within the Seattle Public Schools district, where she can mentor newer educators and shape practical,
    standards‑aligned curricula. She aspires to spearhead a school‑wide reading initiative that leverages community volunteers and local libraries, blending her love for routine with her competitive drive
    to improve student literacy scores. As retirement nears, she also hopes to serve part‑time as an education consultant for after‑school programs, ensuring that her practical, hands‑on teaching philosophy
    continues to benefit the broader community.
