  career_goals: Kevin dreams of becoming a helper for others. He expresses a desire to be a firefighter who rescues people, a veterinarian who cares for animals, or a teacher who supports friends in learning.
    In the near term, he aims to master reading simple storybooks, improve his counting, and be the 'big kid' who assists his family with chores and offers support to his peers.
