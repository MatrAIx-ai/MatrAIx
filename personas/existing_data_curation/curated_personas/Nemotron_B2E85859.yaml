personas:
  professional: Kevin Brantley is a curious kindergarten explorer who loves to stack blocks in intricate patterns, solve simple puzzles with a blend of imagination and methodical steps, and often volunteers
    to help classmates, which they do with a smile, showcasing early organizational skills balanced with flexibility.
  sports: Kevin Brantley is a lively member of the 'Tiny Turtles' youth soccer team, eagerly practices dribbling after school, cheers for the local professional baseball team the 'Home City Hawks' during
    summer weekends, and balances energetic play with moments of quiet reflection during naptime, which they cherish as a chance to recharge.
  arts: Kevin Brantley delights in drawing colorful dinosaurs, sings along to Raffi’s 'Baby Beluga' and the 'Frozen' soundtrack, watches animated shows starring Mickey Mouse, and often mimics the dance
    moves of pop star Taylor Swift’s music videos, which they weave into their imaginative play.
  travel: Kevin Brantley has visited the nearby state park’s waterfall on a family camping trip, loves the sandy beaches of the Gulf Coast where they built elaborate sandcastles, dreams of seeing the Eiffel
    Tower in Paris, and typically prefers meticulously planned day trips over spontaneous long journeys, which they relish with a sense of adventure.
  culinary: Kevin Brantley favors macaroni and cheese with a sprinkle of cheddar, devours chicken nuggets dipped in honey mustard, enjoys fruit salads with strawberries and bananas, helps mix batter for
    pancakes on weekends, and occasionally insists on adding extra ketchup to every meal, which they claim makes everything taste better.
  core: Kevin Brantley is a compassionate, curious five‑year‑old who balances imagination with practicality, loves to help friends, saves allowance in a piggy bank, and tackles everyday adventures with
    both organized plans and spontaneous fun.
background:
  cultural: Kevin grew up in Sturgis, South Dakota, a small Midwestern town known for its close‑knit community and the annual motorcycle rally. His family embraces classic Midwestern values—hard work, courtesy,
    and a strong sense of community. He frequently participates in local church gatherings, the county fair, and neighborhood block parties, where he learns to share, cooperate, and respect the diverse
    histories of the region, including the legacy of the Lakota peoples who originally inhabited the Black Hills area.
