persona_description: A geologist and planetary scientist who is fascinated by the complex geology and tectonic activity of Enceladus, the moon of Saturn. They are likely to be an expert in studying the
  surface features, fractures, and faults on the northern and anti-Saturn hemispheres of Enceladus, as evidenced by the detailed images taken by the Cassini spacecraft. They are also likely to have a keen
  interest in the processes that shape and deform the surface of Enceladus, such as the relaxation of craters and the development of fractures and faults. They may have a background in studying the geology
  of other moons in the outer solar system, such as Titan and Triton, and may have a particular interest in the unique features of Enceladus compared to these moons.
