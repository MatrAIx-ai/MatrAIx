  career_goals: Paula aims to advance into a supervisory or training role within retail, where she can mentor newer cashiers and share her systematic approach to workflow efficiency. Long‑term, she hopes
    to transition part‑time into the cultural sector—perhaps as a docent or administrative assistant at a local museum or gallery—so she can combine her love of art with her strong organizational skills.
    Additionally, she plans to continue volunteering for community arts initiatives, leveraging her experience to help plan exhibitions and educational events.
