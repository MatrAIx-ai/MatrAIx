personas:
  professional: Marcia Lee, a meticulous machine service technician specializing in coin‑vending and arcade equipment, they apply their methodical troubleshooting, schematic expertise, and love of structured
    processes to keep machines humming while quietly leading on‑site safety audits and inventory controls.
  sports: Marcia Lee, an avid hiker of the Wasatch foothills and weekend skier at Park City, they cheer for the Utah Jazz and Real Salt Lake, belong to a local hiking club that meets monthly, and prefer
    low‑impact cardio over team sports.
  arts: Marcia Lee, a quiet lover of vintage arcade art and night‑sky photography, they find inspiration in Ansel Adams’ landscapes, collect classic pinball machine artwork, unwind to the folk rock of The
    Avett Brothers, and keep a sketchbook of star‑trail compositions.
  travel: Marcia Lee, a planner who maps out trips in spreadsheet columns, they favor solo scenic drives to Zion and Bryce, dream of photographing the Northern Lights in Iceland, and schedule a yearly cultural
    pilgrimage to Kyoto’s autumn leaves, balancing work commitments with low‑key relaxation.
  culinary: Marcia Lee, a garden‑to‑table enthusiast, they often toss fresh basil, rosemary, and heirloom tomatoes into quinoa bowls, bake hearty chicken pot pies on rainy evenings, and indulge in vintage
    cola sodas from restored arcade machines, though they admit to over‑seasoning dishes in pursuit of bold flavors.
  core: Marcia Lee, a methodical introvert with an obsessive love of vintage machines, they balance precise work routines with a shy habit of talking to themselves while tinkering, and occasionally lose
    track of time in night‑sky photography sessions.
background:
  cultural: Marcia was raised in a predominantly white, Western-American community in Utah, within a middle-class, Church-affiliated (LDS) environment that emphasized self-reliance, modesty, and community
    service. The Intermountain West culture fostered an appreciation for the outdoors, practicality, and a strong work ethic. While she respects family and religious traditions, her introverted nature leads
    her to value quiet personal time and solitary pursuits.
attributes:
  skills: '["Mechanical troubleshooting", "Electrical diagnostics", "Technical manual interpretation", "Preventive maintenance planning", "Parts inventory management", "Safety compliance", "Remote diagnostics
    (IoT)", "Vendor negotiation", "Report writing", "Hand and power tool proficiency"]'
  hobbies: '["Gardening (herbs & vegetables)", "Reading technical manuals and non-fiction", "Restoring vintage arcade cabinets", "Hiking in Wasatch foothills", "Night sky photography", "Knitting", "Puzzle
    solving (Sudoku, logic puzzles)"]'
  career_goals: Marcia aims to move into a senior maintenance management position where she can design and implement systematic preventive-maintenance programs that reduce downtime across the regional vending
    network. She plans to earn certifications such as the Certified Maintenance & Reliability Professional (CMRP) and complete OSHA safety training. In the long term, she hopes to open a small, locally-focused
    service shop that offers specialized repair for vintage arcade and vending machines while mentoring junior technicians, ensuring a predictable, high-quality service environment.
