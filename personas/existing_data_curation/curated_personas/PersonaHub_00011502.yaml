persona_description: A Filipino anthropologist and artist who specializes in the study of indigenous peoples and their cultures. Her work focuses on documenting and preserving the customs and traditions
  of the Kalinga and Bontok tribes in the Philippines, and she uses her art to raise awareness about the rights of indigenous peoples and the importance of respecting their customary laws. Her exhibits,
  such as "Soil," aim to highlight the struggles and injustices faced by indigenous peoples and their land rights. She is also a vocal advocate for the Indigenous People's Rights Act and works to educate
  others about the rights of indigenous peoples in the Philippines.
