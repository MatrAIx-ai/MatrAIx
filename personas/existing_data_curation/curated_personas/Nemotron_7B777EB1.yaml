personas:
  professional: Alodia Garcia is a bustling warehouse operator proficient in forklift operation, bilingual coordination, and on-the-fly process improvements, whose spontaneous but cooperative nature lets
    them pivot tasks quickly while assertively leading small teams toward safety‑first efficiency.
  sports: Alodia Garcia spikes beach volleyball on Galveston’s piers, keeps a weekly swim routine, and cheers for the Houston Astros while participating in a local co‑ed volleyball league, balancing spontaneous
    pick‑up games with a disciplined (but sometimes missed) gym schedule, and they relish the camaraderie of weekend rodeo fairs.
  arts: Alodia Garcia immerses themselves in cumbia and salsa rhythms at community fiestas, belts out Bad Bunny lyrics in the car, winds down to The Rolling Stones on weekends, and they volunteer as a festival
    assistant to preserve traditional dance with a modern twist.
  travel: Alodia Garcia maps weekend getaways to Gulf Coast fishing villages and dreams of a road trip down the Pan‑American Highway to visit loved ones in Central America, favoring spontaneous itineraries
    over strict bookings while juggling limited student finances, and they often stop at New Orleans for its vibrant music scene.
  culinary: Alodia Garcia crafts perfect pupusas filled with ricotta and chicharrón, experiments with shrimp ceviche spiced with lime and ají, treats themselves to fusion tacos topped with mango salsa,
    showcasing a confident home‑chef skill set that blends traditional masa techniques with daring seafood twists, and they love teaching family members to roll the dough.
  core: Alodia Garcia is a 22‑year‑old bilingual logistics whiz who swaps forklift shifts for motorcycle tweaks, lives for spontaneous beach volleyball matches, and they occasionally let a chatty social
    life derail meticulous budget plans.
background:
  cultural: Alodia was born to Salvadoran immigrants who settled in Galveston, Texas. Growing up in a bilingual household, she celebrated both Salvadoran traditions—such as Día de la Independencia, Pónchona,
    and family posadas during Christmas—and local Texan customs like beach gatherings and rodeo fairs. Catholic values and strong family ties shaped her sense of community, while the coastal environment
    inspired her love for the sea and outdoor activities. Her cultural identity blends the warmth and communal spirit of El Salvador with the pragmatic, diverse spirit of the Gulf Coast, informing her worldview,
    work ethic, and social connections.
attributes:
  skills: '["Material handling and loading/unloading", "Certified forklift operation", "Inventory tracking and data entry", "Basic equipment maintenance", "Warehouse safety compliance", "Adaptability and
    problem solving", "Bilingual communication (Spanish/English)", "Team coordination and assertive communication", "Basic logistics planning"]'
  hobbies: '["Cooking traditional Salvadoran dishes", "Dancing Cumbia and Salsa", "Beach volleyball and swimming", "DIY mechanical projects", "Listening to diverse music", "Reading logistics and technology
    books", "Participating in local cultural festivals", "Bilingual community volunteering"]'
  career_goals: Alodia aims to complete her associate degree in Business Administration and acquire advanced certifications in supply‑chain management and OSHA safety. She hopes to move from a laborer role
    into a supervisory position within the warehouse or port logistics sector, eventually becoming a logistics team leader who can mentor new hires and implement process improvements. Long‑term, she envisions
    starting a small, family‑run freight brokerage that connects Texas ports with Central American markets, leveraging her cultural ties and bilingual skills. She values flexibility, so she looks for opportunities
    that allow her to balance hands‑on work with strategic planning.
