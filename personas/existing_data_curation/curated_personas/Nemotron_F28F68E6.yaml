  hobbies: '[''fishing'', ''hiking'', ''vegetable gardening'', ''vintage lawn mower restoration'', ''reading science magazines'', ''listening to classic country music'', ''homebrewing'', ''woodworking (birdhouses,
    coffee tables)'']'
  career_goals: Joe aspires to turn his practical abilities into low‑stress, part‑time consulting for neighbors and local small businesses, focusing on home‑maintenance advice and energy‑saving upgrades.
    He hopes to earn a certificate in sustainable landscaping, volunteer as a mentor at the community garden, create a modest online portfolio of his projects, and improve his personal organization to better
    balance family responsibilities with his interests.
