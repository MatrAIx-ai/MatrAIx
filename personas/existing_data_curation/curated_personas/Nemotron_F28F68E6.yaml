personas:
  professional: Joe Roark, a 42‑year‑old practical handyman‑turned‑part‑time home‑maintenance consultant, blends hands‑on carpentry, plumbing, and electrical troubleshooting with a calm, flexible style
    that favors low‑stress, cost‑effective solutions for neighbors and small businesses, and they approach each project with pragmatic curiosity.
  sports: Joe Roark enjoys early‑morning hikes on the rolling hills of Rutherford County, participates in a local 5K running club, follows the Tennessee Titans and Nashville Predators with enthusiasm, joins
    a casual weekend softball team with a small circle of friends, and they value low‑key fitness activities.
  arts: Joe Roark finds comfort in classic country music, regularly playing vinyl records by Johnny Cash, Dolly Parton, and Merle Haggard, while also attending community theater productions of 'A Streetcar
    Named Desire' and occasionally painting modest landscape sketches of their garden, and they find inspiration in the simple rhythms of country life.
  travel: Joe Roark prefers low‑key road trips that blend spontaneous stops at roadside farms with visits to nearby natural attractions such as the Great Smoky Mountains and Blue Ridge Parkway, while dreaming
    of an ambitious trek through the Patagonia region of Argentina, and they often let spontaneity guide their route.
  culinary: Joe Roark enjoys homebrewing craft ales flavored with fresh garden herbs like rosemary and cilantro, cooking grilled salmon with a lemon‑dill glaze, and tossing heirloom tomatoes and kale into
    a rustic vegetable stir‑fry, though they often improvise recipes without precise measurements.
  core: Joe Roark, a 42‑year‑old DIY enthusiast who lovingly restores vintage lawn mowers yet habitually misplaces their own tools, approaches life with curious pragmatism, a relaxed schedule, and an occasional
    scatter‑brained habit of forgetting appointments, and they often procrastinate on filing paperwork.
background:
  cultural: Joe grew up in a small town in central Tennessee and now lives in Mount Juliet, surrounded by Southern Appalachian culture. His upbringing emphasized church attendance, Sunday barbecues, hospitality,
    and a strong sense of neighborly reciprocity. While he identifies with traditional white Southern heritage, he also values personal curiosity and respects the growing diversity of his community, blending
    modest conservatism with an open‑minded approach to new ideas.
attributes:
  skills: '[''basic carpentry'', ''plumbing repair'', ''electrical troubleshooting'', ''garden maintenance'', ''small engine repair'', ''DIY electronics'', ''budget management'', ''conflict mediation'',
