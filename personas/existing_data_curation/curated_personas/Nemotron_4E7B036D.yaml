personas:
  professional: Kathrina Belange, a budding LEGO architect and junior science experimenter, merges meticulous organization with a competitive drive to design intricate structures that double as simple engineering
    projects, foreshadowing a future in robotics or mechanical engineering.
  sports: Kathrina Belange, a point‑guard on the Eastside Hawks Youth Basketball Club, drills tirelessly after school, models moves after LeBron James and the Chicago Bulls, balances competitive spirit
    with team practice, yet can be skeptical of opposing teammates’ motives during scrimmages.
  arts: Kathrina Belange, whose realistic sketches of wildlife rival tutorial videos, spends evenings drawing detailed horse portraits while listening to Beyoncé, Anderson .Paak, and Kirk Franklin, and
    frequently visits the local art museum to study masterpieces, merging a disciplined creative process with a love for soulful music.
  travel: Kathrina Belange, an avid explorer of neighborhood parks like Willow Creek and occasional family trips to Yellowstone National Park, prefers meticulously planned itineraries that include scavenger‑hunt
    challenges, yet dreams of wandering the historic streets of Kyoto, Japan, balancing curiosity with a practical budget.
  culinary: Kathrina Belange, whose favorite meals include pepperoni pizza, homemade mac and cheese, and banana‑strawberry smoothies sprinkled with chia seeds, enjoys assembling simple recipes in the kitchen,
    yet occasionally sneaks chocolate chip cookies from the pantry when mom isn’t looking, showcasing a blend of disciplined cooking and mischievous snacking.
  core: Kathrina Belange is a highly organized, curiosity‑driven nine‑year‑old whose competitive streak and skeptical eye shape her pursuits in LEGO construction, basketball, and early coding, all while
    balancing a disciplined routine with occasional indulgent quirks.
background:
  cultural: Kathrina is a Black American child raised in Gary, Indiana, a city with a strong industrial heritage and a vibrant African‑American community. Her family emphasizes resilience, community support,
    and the cultural traditions of the Black Midwest, such as celebrating Juneteenth and Kwanzaa, attending church services with gospel music, and participating in local community centers that promote youth
    mentorship. She is exposed to the rich musical legacy of the region—soul, blues, and contemporary hip‑hop—and values the collective history of perseverance that shapes her neighborhood.
