  career_goals: She aspires to become a scientist or engineer who creates practical solutions for everyday challenges. Kathrina wants to win regional science fairs, join a robotics team, earn scholarships
    for a STEM‑focused college, and later use her expertise to mentor other girls in her community. Her long‑term ambition includes developing inventions that improve the quality of life in Gary and serving
    as a role model for resilience and achievement.
