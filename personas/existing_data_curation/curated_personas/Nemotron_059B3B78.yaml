    solving in fabrication environments'']'
  hobbies: '[''Acoustic guitar playing and local open‑mic performances'', ''Organizing community jam sessions'', ''Hiking in the central Pennsylvania outdoors'', ''Cycling club rides'', ''Classic‑car restoration
    (1967 Chevrolet Camaro)'', ''Volunteering welding workshops at the community college'', ''Home‑brewing craft beer'']'
  career_goals: Charles aims to advance into a senior supervisory role within the regional manufacturing sector, targeting a Welding Shop Manager position where he can shape operational standards and mentor
    the next generation of welders. He plans to obtain advanced certifications such as Certified Welding Engineer (CWE) and Certified Welding Supervisor (AWS). Long‑term, he envisions launching his own
    small‑scale custom metal fabrication business that blends classic craftsmanship with modern techniques like laser welding and additive manufacturing, serving both industrial clients and local artisans.
    His ambition balances personal entrepreneurial interest with a commitment to elevating workforce skill levels in his community.
