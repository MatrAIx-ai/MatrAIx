    responsibility'']'
  hobbies: '[''Competitive video gaming (strategy games)'', ''Soccer'', ''Chess club participation'', ''Electronics tinkering and Arduino projects'', ''Reading graphic novels'', ''Preparing traditional
    Mexican dishes with family'', ''Collecting and organizing trading cards'']'
  career_goals: Victor aims to obtain his GED or complete high school equivalency within the next two years, then enroll in a vocational program at a community college to become a certified automotive technician
    or IT support specialist. He hopes to leverage his bilingual skills to work in customer‑service or technical support roles that require clear communication in both Spanish and English. Long‑term, he
    aspires to achieve financial independence, support his family, and build a stable, structured career with clear advancement pathways.
