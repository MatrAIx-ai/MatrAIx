personas:
  professional: Victor Trujillo, an aspiring IT support specialist, blends bilingual fluency, a strategic mindset honed by chess and video gaming, and a meticulous, schedule‑driven work ethic to troubleshoot
    everyday electronics while reliably assisting classmates and family members with tech issues.
  sports: Victor Trujillo enjoys playing pickup soccer at Kildaire Farm Park and follows the NC State Wolfpack football, the Charlotte Hornets basketball, and the USL’s North Carolina FC, balancing a competitive
    edge on the field with a structured training routine.
  arts: Victor Trujillo immerses themselves in graphic novels like 'Saga' by Brian K. Vaughan and 'Monstress' by Marjorie Liu, listens to the chiptune soundtrack of 'Ori and the Blind Forest' and classic
    mariachi tunes played during family celebrations, and occasionally sketches pixel art for indie game mods, reflecting a creative outlet that balances strategic gaming with narrative appreciation.
  travel: Victor Trujillo prefers short, budget‑friendly trips such as weekend road trips to the Blue Ridge Mountains for hiking, a family reunion in Mexico City where vibrant markets and historic plazas
    offered cultural immersion, and an annual visit to Orlando’s amusement parks, while dreaming of a future adventure to Barcelona to explore its iconic architecture, combining structured planning with
    a love for new culinary experiences.
  culinary: Victor Trujillo helps prepare traditional tacos al pastor and tamales using corn masa, pork, and achiote, while also experimenting with homemade salsa verde and occasionally cooking spaghetti
    carbonara for friends, showcasing a blend of family‑rooted flavors and teenage curiosity in the kitchen.
  core: Victor Trujillo is a competitively minded, bilingual teen who meticulously organizes everything from gaming tournaments to allowance budgets, yet routinely stays up late mastering strategy games,
    often forgetting to hydrate during marathon sessions.
background:
  cultural: Victor grew up in a bilingual Mexican household in Raleigh, North Carolina. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Christmas Posadas, and cooking
    authentic Mexican cuisine at home. He values family closeness, respect for elders, and community support, blending these cultural norms with the broader American environment of his neighborhood and
    school. This dual cultural identity shapes his language fluency, food preferences, holiday celebrations, and his desire to use his bilingual abilities in future professional settings.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic computer operation (Windows, Microsoft Office, internet research)'', ''Fundamental troubleshooting of electronics and small mechanical devices'',
