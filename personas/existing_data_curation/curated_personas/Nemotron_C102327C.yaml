personas:
  professional: Natalia Lovio, a high‑school senior with a GED goal, blends hands‑on automotive and DIY electronics know‑how with a passion for digital photography and aerospace curiosity, channeling her
    cooperative yet assertive nature into organizing community events and planning a future as an aerospace technology technician or freelance visual storyteller.
  sports: Natalia Lovio hikes the mesas around Roswell and joins the local high‑school cross‑country club during the spring, occasionally cheering for the New Mexico State Aggies football team, while maintaining
    a flexible fitness routine that mixes stair‑climbing at the library and weekend stargazing walks.
  arts: Natalia Lovio explores creative expression through digital photography, drawing inspiration from Ansel Adams and contemporary Instagram photographer Chris Burkard, while also attending nightly screenings
    of classic sci‑fi films like Blade Runner and reading authors such as Octavia Butler, weaving these influences into her visual storytelling.
  travel: Natalia Lovio savors road‑trip adventures across New Mexico, having visited Carlsbad Caverns and the White Sands National Park, and dreams of a future trip to Houston’s Johnson Space Center, preferring
    to plan itineraries on a spreadsheet, blend low‑budget backpacking with occasional splurges on astrophotography tours.
  culinary: Natalia Lovio prefers hearty desert fare—think chile‑ranchero, carne asada tacos, and homemade saguarito salads—while experimenting with a portable grill to roast marshmallows during night‑time
    stargazing, and enjoys crafting quick avocado toast with lime‑zest for late‑night editing sessions.
  core: Natalia Lovio is a curious, pragmatic teen who balances night‑time stargazing, DSLR clicks, and community service, all while juggling a frugal budget, occasional migraine management, and a steady
    hunger for desert‑flavored tacos and astrophotography adventures.
background:
  cultural: Natalia comes from a multi‑generational White, European‑American family that settled in the Southwest decades ago, blending Midwestern roots with the distinctive cultural tapestry of New Mexico.
    Growing up in Roswell, she has been immersed in a community that values self‑reliance, outdoor recreation, and a fascination with aerospace and UFO lore. The local traditions—ranching heritage, Southwest
    cuisine, and community festivals—shape her practical yet curious outlook, encouraging a balanced appreciation of new ideas and established ways.
