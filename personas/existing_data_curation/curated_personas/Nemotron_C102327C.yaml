  hobbies: '[''Stargazing'', ''Science‑fiction reading'', ''Digital photography'', ''Hiking'', ''Attending Roswell UFO Festival'', ''Volunteering at the library'']'
  career_goals: Natalia plans to complete her GED within the next year and then enroll in a community‑college program focused on aerospace technology or digital media production. She aims to work as a technician
    at a local aerospace firm or build a freelance portfolio as a photographer and content creator that showcases Roswell’s unique cultural and scientific landscape. Long‑term, she hopes to combine her
    practical skills with her curiosity by mentoring younger students in STEM outreach programs and contributing to community projects that bridge innovation and local heritage.
