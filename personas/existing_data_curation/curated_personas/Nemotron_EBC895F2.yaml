  hobbies: '[''Painting (abstract)'', ''Sketching'', ''Reading contemporary literature and philosophy'', ''Latin music and dancing'', ''Cooking Dominican cuisine'', ''Gardening'', ''Crocheting'', ''Community
    volunteering (art workshops)'', ''Attending art exhibitions'', ''Digital photography (beginner)'']'
  career_goals: Alejandra aims to step into a supervisory or shift‑manager role within her retail chain, using her reliability and organizational strengths to lead a team. Parallel to her retail ambitions,
    she dreams of establishing a community art space in the Bronx that offers free workshops for children and seniors, allowing her to share her love of abstract painting and crafts. Long‑term, she hopes
    to launch a modest side business selling her own artwork, handcrafted accessories, and Dominican‑inspired designs, balancing a part‑time retail position with her artistic venture while remaining financially
    secure.
