personas:
  professional: Alejandra Henriquez crafts a reliable retail presence as an experienced cashier, expertly handling cash, POS systems, and daily sales reconciliation while mentoring new staff and designing
    artistic window displays, and they envision advancing to a shift‑manager role by applying their organized yet imaginative problem‑solving style.
  sports: Alejandra Henriquez enjoys dancing to salsa and merengue at local community nights, participates in a weekend walking group at the Bronx Recreation Center, and they cheer for the New York Knicks
    and Bronx Bombers, balancing light cardio with supportive fandom.
  arts: Alejandra Henriquez immerses themselves in abstract painting, drawing inspiration from Jackson Pollock, Carmen Herrera, and the improvisational rhythms of Tito Puente, while also curating community
    mural projects and admiring performances by Celia Cruz and Rubén Blades.
  travel: Alejandra Henriquez prefers immersive cultural trips, having explored the historic streets of Santo Domingo, the vibrant markets of Puerto Rico, and the art districts of Barcelona, yet they plan
    future journeys to the Caribbean coast and a jazz festival in Montreal, budgeting each adventure around their part‑time work schedule.
  culinary: Alejandra Henriquez savors cooking family favorites like sancocho with yucca, plantains, and corn, and prepares mangú with buttery onions, showcasing a knack for layering flavors using cilantro,
    garlic, and pepper, while also experimenting with fusion twists in their balcony garden’s fresh herbs.
  core: Alejandra Henriquez blends disciplined retail expertise, a relentless curiosity for abstract art, and community‑centered activism, all while they juggle health checks and occasional indulgent art‑supply
    splurges.
background:
  cultural: Alejandra grew up in a Dominican household in the Bronx, raised bilingual in Spanish and English. Her family maintains strong ties to Dominican traditions, celebrating holidays such as Independence
    Day and Carnaval with music, dance, and home‑cooked meals. She participates in local Dominican community gatherings, attends church services that blend Catholic rituals with Caribbean customs, and often
    shares stories of the island's folklore with friends. The vibrant Dominican diaspora in the Bronx influences her identity, shaping her culinary tastes, rhythmic preferences, and commitment to giving
    back to her community through cultural and artistic initiatives.
