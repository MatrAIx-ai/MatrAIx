  hobbies: '[''digital illustration'', ''coding simple games'', ''reading sci‑fi and graphic novels'', ''listening to K‑pop'', ''baking Asian pastries'', ''hiking in the Sonoran Desert'', ''robotics club'',
    ''playing piano'']'
  career_goals: Chae aims to pursue a college degree in computer science or interactive media, with the long‑term ambition of becoming a software engineer or UI/UX designer. She envisions a career that
    offers clear progression and the ability to work both independently and in small, collaborative teams, allowing her to apply her practical problem‑solving skills to create user‑friendly digital experiences.
    While she values the stability of a structured tech career, she also hopes to keep flexibility for personal creative ventures, such as developing a boutique online bakery that blends her culinary interests
    with technology. She plans to seek internships that provide hands‑on experience, build a strong portfolio, and eventually lead a modest, cooperative tech team.
