personas:
  professional: An aspiring indie game developer, Chae Hing blends manga illustration skills and robotics club experience to prototype simple narrative-driven games on their laptop, thriving in the structured
    yet flexible workflow that lets them see tangible results quickly.
  sports: A low‑key outdoor enthusiast, Chae Hing joins a weekend school hiking club that explores Sonoran Desert trails near Sedona and roots for the Phoenix Suns and Arizona Diamondbacks, preferring solo
    reflection over team sports yet occasionally playing pickup basketball with a small group of friends.
  arts: A dedicated visual storyteller, Chae Hing spends evenings drawing manga‑style panels inspired by Studio Ghibli’s Hayao Miyazaki, curates playlists featuring BTS, IU, and indie band HYUKOH while
    sketching, and practices piano pieces by Yiruma, weaving these influences into a unique artistic voice.
  travel: A spontaneous teen traveler, Chae Hing dreams of hiking the Redwood forests of California and tasting street food in Seoul, typically planning trips on a loose checklist that leaves room for last‑minute
    detours, but their school schedule and limited budget often anchor them to weekend getaways in nearby national parks.
  culinary: A budding pastry chef, Chae Hing delights in baking moon‑shaped red bean paste buns and matcha‑flavored taro cakes with their family, mastering the balance of glutinous rice flour and sweet
    fillings, yet sometimes over‑sweetens the dough when experimenting with new flavors.
  core: Chae Hing is a reserved, structure‑loving teen who channels their practical creativity into manga art, indie game coding, and precise pastry baking, all while juggling a laid‑back approach to budgeting
    and an occasional forgetfulness about school assignments.
background:
  cultural: Chae Hing is a second‑generation East Asian American raised in Gilbert, Arizona. Her parents immigrated from Taiwan, bringing with them a blend of Mandarin and English language use at home and
    a strong appreciation for cultural traditions such as Lunar New Year, the Mid‑Autumn Festival, and family gatherings centered around shared meals. From a young age, Chae helped prepare dishes like dumplings,
    scallion pancakes, and bubble tea, integrating these culinary practices into her routine. Attending a diverse public middle school, she experiences a mix of American and Asian influences, joining a
    small robotics club with peers from varied backgrounds and participating in community events at the local Asian cultural center. Regular video calls with extended family abroad keep her connected to
    her heritage, reinforcing values of respect, diligence, and community involvement while also encouraging her to pursue her individual interests in technology and the arts.
