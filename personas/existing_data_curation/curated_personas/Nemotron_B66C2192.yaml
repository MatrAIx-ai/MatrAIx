personas:
  professional: Robert Mendez, a retired general contractor and longtime community handyman, they blend their decades of home maintenance, automotive repair, and woodworking expertise into informal mentorships
    at the Sandia Park senior center, favoring spontaneous, hands‑on demonstrations over rigid lesson plans and often juggling multiple projects with a relaxed, go‑with‑the‑flow attitude.
  sports: Robert Mendez, an avid hiker of the Sandia Mountains and birdwatcher, they participate in the local senior walking club, follow the Albuquerque Isotopes baseball team and the New Mexico United
    soccer club, and maintain a low‑impact fitness routine that blends seasonal trail hikes with gentle stretching to keep their joints supple.
  arts: Robert Mendez, a devoted amateur photographer, they capture the shifting desert light at sunrise and sunset, draw inspiration from the landscapes painted by Georgia O'Keeffe and the folk melodies
    of John Denver, and enjoy attending the annual Gathering of Nations cultural festival where they mingle with traditional musicians and local artisans.
  travel: Robert Mendez, a lover of road trips, they prefer scenic drives that blend historic pueblo visits, have taken leisurely tours of Santa Fe's art districts, explored the Grand Canyon on a guided
    hike, and dream of a relaxed cultural immersion trip to Oaxaca, Mexico, while balancing travel plans around the limited budget of a retiree.
  culinary: Robert Mendez, a seasoned home cook, they specialize in traditional New Mexican dishes like green chile stew, carne adovada, and roasted corn pudding, lovingly incorporate fire‑roasted Hatch
    chiles and Pueblo‑grown beans into their recipes, and enjoy sharing meals at community gatherings, though they sometimes under‑season their sauces in favor of the chile’s natural heat.
  core: Robert Mendez, a 72‑year‑old retired craftsman, they blend practical know‑how with a relaxed, community‑centric outlook, often juggling garden, woodworking, and storytelling projects while occasionally
    misplacing their keys or forgetting appointments.
background:
  cultural: Robert grew up in a family with deep Anglo‑Hispanic roots in the Southwest, raised in a small ranching community near Sandia Park. His upbringing blended frontier pragmatism with the region's
    Hispanic and Native American traditions, influencing his appreciation for local history, regional cuisine, community gatherings at the church and senior center, and a cooperative, modest outlook characteristic
    of New Mexico's cultural tapestry.
