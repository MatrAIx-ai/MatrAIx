  career_goals: Mckenzie aims to grow her brokerage into one of the top-performing teams in Tarrant County, integrating AI‑driven market forecasting tools to stay ahead of the competition. She aspires to
    achieve a consistent 100‑plus transaction volume annually and earn recognition as a Texas Real Estate Board award‑winning agent. Long‑term, she plans to diversify into sustainable and energy‑efficient
    housing, obtain a real‑estate development license, and create a mentorship program that empowers new agents, especially women, to thrive in the industry. Community involvement remains central; she hopes
    to lead local housing‑affordability initiatives and serve on the city planning board.
