  hobbies: '["Reading (mystery and historical fiction)", "Journaling and planner customization", "Cooking Vietnamese family recipes", "Digital illustration", "Playing piano", "Volunteering at community
    center", "Herb gardening", "Puzzle solving (Sudoku, crosswords)"]'
  career_goals: Cing aspires to attend college and pursue a degree in nursing, with the long‑term goal of becoming a registered nurse who works in community health. She is drawn to the structured, evidence‑based
    nature of healthcare and wants to use her empathy and organizational strengths to improve health outcomes for families like her own. In the meantime, she hopes to earn a certification in first aid and
    volunteer at local clinics to gain practical experience. She also keeps open the possibility of a future role in education, such as a health‑education teacher, where she can combine her love for helping
    others with her talent for planning and clear communication.
