personas:
  professional: Cing Tran, a diligent high‑school junior, blends meticulous planning skills with a budding passion for community health, regularly coordinating youth workshops at the local community center
    while excelling in science coursework and preparing for a future nursing career.
  sports: Cing Tran fuels her love for routine‑driven fitness by attending varsity soccer practices for the Westside Wolves and joining a weekend yoga class at the community center, preferring the predictable
    drills and calm stretches to spontaneous workouts.
  arts: Cing Tran channels her structured creativity into digital nature sketches inspired by Studio Ghibli’s landscapes, while practicing piano pieces by Ludwig van Beethoven and finding solace in Agatha
    Christie mystery novels.
  travel: Cing Tran plans meticulously organized weekend getaways, dreaming of a spring visit to Kyoto’s cherry blossoms and a cultural immersion trip to Hoi An, yet currently explores local state parks
    with a reusable picnic kit to balance budget and curiosity.
  culinary: Cing Tran refines her culinary repertoire by perfecting pho broth with star anise and fish sauce, crafting bánh mì with pickled daikon, and experimenting with Thai basil‑infused spring rolls,
    all while documenting each recipe in a color‑coded kitchen journal.
  core: Cing Tran is a methodical teen whose love of order shapes everything—from her meticulously sticker‑laden planner to her volunteer‑driven path toward community nursing—yet she occasionally forgets
    to unwind, leading to late‑night puzzle marathons.
background:
  cultural: Cing comes from a Vietnamese‑American family that settled in Carson, California. At home, Vietnamese is spoken alongside English, and she celebrates cultural traditions such as Tet (Lunar New
    Year) and the Mid‑Autumn Festival with her grandparents. Family meals often feature homemade dishes that reflect regional Vietnamese flavors, and she helps prepare them during weekends. The community
    in Carson includes a vibrant Southeast Asian diaspora, and Cing participates in local cultural events at the Vietnamese community center, where she volunteers for language‑exchange programs and cultural
    fairs. Respect for elders, a strong sense of family responsibility, and the value placed on education are central to her upbringing, shaping both her personal outlook and her future aspirations.
attributes:
  skills: '["Time management", "Organizational planning", "Note taking", "Basic computer literacy (Google Workspace)", "Bilingual communication (English/Vietnamese)", "Basic cooking (Vietnamese dishes)",
