  hobbies: '["Visiting Art Galleries", "Watercolor Painting", "Hiking in the Sierra Foothills", "Live Music Concerts", "Improv Comedy Workshops", "DIY Electronics and AR Prototypes", "Volunteer Coaching
    Youth Arts Programs", "Experimental Cooking", "Board Game Nights"]'
  career_goals: Eager to shape the future of community entertainment, Maria aims to become a senior director of event programming within the next five years, overseeing large‑scale festivals that blend
    immersive technology with artistic expression. She plans to obtain certifications in sustainable event management and expand her network across the Bay Area cultural scene, eventually founding her own
    boutique agency that prioritizes accessibility, environmental responsibility, and innovative audience experiences. In addition, she hopes to mentor emerging professionals, especially women in STEM,
    encouraging interdisciplinary collaboration and inclusive creativity.
