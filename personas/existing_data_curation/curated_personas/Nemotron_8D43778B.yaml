personas:
  professional: Maria Sterling works as a junior event coordinator for a Bay Area cultural nonprofit, leveraging their expertise in Agile project management, Tableau-driven audience analytics, and Adobe
    Creative Suite to orchestrate immersive community festivals while maintaining meticulous budgets and stakeholder alignment.
  sports: Maria Sterling regularly hikes the Sierra foothills with a local trail‑running club, follows the Golden State Warriors and the San Jose Earthquakes, and participates in weekend rock‑climbing sessions
    at an indoor gym, balancing cardio endurance with strength training to stay energized for marathon event planning marathons.
  arts: Maria Sterling spends weekends sketching watercolors at contemporary galleries featuring artists like Yayoi Kusama and Banksy, collaborates on DIY AR installations for hackathons, attends live performances
    by Tame Impala and local improv troupes, and curates board‑game nights that blend strategic storytelling with artistic flair.
  travel: Maria Sterling prefers spontaneous weekend road trips to nearby Napa Valley vineyards and the Redwood National Park, while also planning annual summer visits to Tokyo for its cutting‑edge tech
    and art scenes, using travel apps to find eco‑friendly accommodations that align with their sustainable event ethos.
  culinary: Maria Sterling loves experimental cooking, often whipping up sous‑vide salmon with miso‑glaze, matcha‑infused panna cotta, and saffron‑risotto, and they source fresh herbs from the local farmers’
    market to blend culinary science with artistic plating.
  core: Maria Sterling blends a meticulous event‑planning mind with a boundless artistic curiosity, channeling calm resilience into immersive festivals, while their love for tech‑infused creativity and
    experimental cooking fuels a vibrant, socially‑driven lifestyle.
background:
  cultural: Maria comes from a middle‑class Anglo‑American family that has lived in the Sacramento Valley for three generations. Growing up in Roseville, she was exposed to a blend of suburban stability
    and the dynamic cultural offerings of nearby Sacramento and the Bay Area. Her family’s emphasis on education, self‑reliance, and community service shaped her practical outlook, while the region’s outdoor
    lifestyle and diverse arts scene fostered her love of nature, music, and visual arts. Although she identifies as white, she values the multicultural fabric of California and actively seeks inclusive
    experiences in both her personal and professional life.
attributes:
  skills: '["Event Planning", "Budget Management", "Stakeholder Liaison", "Data Analytics", "Project Management (Agile/Scrum)", "Python Programming", "Tableau/Data Visualization", "Adobe Creative Suite",
