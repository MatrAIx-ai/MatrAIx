personas:
  professional: Helene Long is an aspiring junior scientist who channels her curiosity and practicality into school science projects, using organized yet flexible LEGO constructions to model experiments,
    and their competitive streak drives them to win the annual science fair.
  sports: Helene Long plays forward for the Riverside Rangers youth soccer team, trains three times a week, cheers for the hometown professional team the City FC, and their competitive nature makes every
    match feel like a strategic challenge while still enjoying the camaraderie of group play.
  arts: 'Helene Long fills sketchbooks with detailed animal drawings, builds intricate LEGO sculptures inspired by the architectural style of Frank Lloyd Wright, enjoys listening to Taylor Swift and the
    whimsical scores of Disney movies like ''Moana'', and they sometimes act out scenes from the animated series ''Avatar: The Last Airbender'' for fun.'
  travel: Helene Long loves weekend family road trips to the nearby foothills for organized hikes, dreams of exploring the Grand Canyon and the Great Barrier Reef, prefers a blend of planned scavenger hunts
    and spontaneous snack stops, and they save a portion of their allowance for future travel adventures.
  culinary: Helene Long favors homemade pepperoni pizza with extra cheese, enjoys blending strawberry‑banana smoothies with fresh fruit, often experiments with rock candy in their chemistry kit, and they
    proudly showcase their growing skill in crafting LEGO‑inspired cookie designs.
  core: Helene Long is an energetic, curious eight‑year‑old who mixes a competitive spirit with meticulous organization, turning every LEGO set, soccer match, and nature hike into a strategic adventure
    while still day‑dreaming about dinosaurs and space missions.
background:
  cultural: Helene comes from a white, middle‑class family rooted in Colorado Springs, a city that blends suburban life with a strong outdoor and mountain culture. Her family values community involvement,
    education, and appreciation for the natural environment surrounding the Pikes Peak region. With occasional exposure to the nearby military community, she has learned respect for teamwork and discipline,
    while her parents encourage curiosity through museum visits, local park programs, and weekend trips to the Rockies. This blend of suburban Colorado life and the region’s emphasis on nature and adventure
    shapes her worldview and daily experiences.
