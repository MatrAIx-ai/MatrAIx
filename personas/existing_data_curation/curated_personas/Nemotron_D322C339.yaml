  career_goals: Helene is fascinated by the natural world and space, and she often talks about becoming a wildlife biologist or a veterinarian who helps animals in the Rockies. She also dreams of exploring
    beyond Earth as an astronaut, reflecting her mix of curiosity and practical goal‑setting. In the near future she hopes to join a junior ranger program, earn a science fair award, and eventually pursue
    a career that lets her combine her love of animals, the outdoors, and problem‑solving.
