  career_goals: Fung aims to translate his practical curiosity into a stable career in a skilled trade or technical support field. He plans to enroll in a community‑college apprenticeship program—such as
    electrician, HVAC technician, or IT support specialist—so he can earn certifications while gaining hands‑on experience. Long‑term, he wants a reliable job that offers a clear progression path, allows
    him to contribute to his community, and provides enough financial security to reduce his lingering worries about the future.
