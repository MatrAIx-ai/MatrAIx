  hobbies: '[''Church choir singing'', ''Cooking traditional Mexican cuisine'', ''Backyard gardening (chilies, tomatoes, herbs)'', ''Folkloric dance workshops'', ''Participating in Mexican cultural festivals'',
    ''Quilting and jewelry crafting'', ''Reading family histories'', ''Volunteering at senior center (storytelling and activity leading)'']'
  career_goals: As she approaches retirement age, Natalie’s primary goal is to remain actively engaged in the workplace while passing her extensive knowledge to younger colleagues. She hopes to formalize
    a mentor role, perhaps as a senior safety champion, helping to uphold the plant’s excellent safety record. She also aspires to receive recognition for her long‑standing reliability, such as a service
    award or employee of the month distinction. Beyond work, she wishes to preserve her Mexican heritage by teaching family recipes to her grandchildren and by volunteering at the local community center,
    where she can lead cooking workshops and cultural activities. Maintaining her health through staying active and socially connected is also a personal ambition.
