  hobbies: '[''Watercolor painting'', ''Curating community art exhibits'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Gardening native succulents and herbs'', ''Birdwatching'', ''Volunteering at Charro
    Days festival'', ''Attending community theater'', ''Crochet circle'']'
  career_goals: Looking ahead, Ana Teresa aims to transition into a mentorship role, guiding younger real‑estate professionals on best practices for community engagement and sustainable property management.
    She plans to spearhead a pilot program that incorporates local art installations and green spaces into HOA developments, fostering cultural pride and environmental stewardship. Over the next five years
    she hopes to serve on the board of a regional housing advocacy group, influencing policy to support affordable, culturally inclusive housing while gradually reducing her direct workload to enjoy a semi‑retired
    consulting schedule.
