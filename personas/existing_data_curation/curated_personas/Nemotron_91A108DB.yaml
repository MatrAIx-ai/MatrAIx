  hobbies: '["Recreational soccer", "Hiking in Sabino Canyon and surrounding desert trails", "Cooking Mexican dishes", "Dancing to cumbia, norteño, and reggaeton", "Playing video games (FIFA)", "Creating
    TikTok videos", "Photography of desert landscapes", "DIY electronics projects (Arduino)"]'
  career_goals: Looking ahead, Pablo aims to turn his bilingual skills and community spirit into a stable career. He plans to enroll in a local community college to earn his GED and pursue an associate
    degree in hospitality management or business administration, with the long‑term goal of opening a small Mexican‑style food truck that serves both traditional dishes and healthier fusion options. In
    parallel, he is interested in obtaining a formal certification as a community outreach coordinator, allowing him to work with nonprofit organizations that support recent immigrants and at‑risk youth
    in the Tucson area. While he values the flexibility to stay involved with his friends and family, he also wants a reliable income that reduces his financial stress and provides a sense of security.
