persona_description: A person who is interested in fisheries management, specifically in the assessment and monitoring of fish populations using fish counting methods. They are likely to be a biologist
  or a fisheries scientist who works for the U.S. Fish and Wildlife Service (FWS), the Bureau of Ocean Energy Management (BOEM), or other federal agencies responsible for managing and protecting aquatic
  resources. They are familiar with the use of fish counting techniques, including day and night counts, and are skilled in analyzing and interpreting the results to make informed decisions about fish populations
  and the impacts of various factors on them. They may also be involved in the development and implementation of fish counting protocols and guidelines.
