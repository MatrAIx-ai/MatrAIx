personas:
  professional: Eduardo Rosarioreyes is an aspiring IT support specialist who combines bilingual fluency, solid hardware troubleshooting, and a habit of meticulous ticket tracking to serve Spanish‑speaking
    users, while their curiosity pushes them to prototype Python automation scripts and their tendency to worry under pressure sometimes delays ticket resolution.
  sports: Eduardo Rosarioreyes stays active by trekking the trails of Caribou‑Targhee National Forest in summer, joining a local soccer pick‑up league that frequently faces off against the Pocatello United
    crew, while cheering for the Idaho Falls Chukars and the Boise State Broncos during baseball and college football seasons.
  arts: Eduardo Rosarioreyes finds balance in strumming acoustic guitar renditions of Los Tigres del Norte ballads infused with Idaho pine‑scented rhythms, and unwinds watching classic films like "Coco"
    and live performances by folk singer‑songwriter Jorge Drexler whenever a break from coding is needed.
  travel: Eduardo Rosarioreyes favors budget‑friendly road trips that mix rugged hikes in Yellowstone with weekend visits to family in northern New Mexico, while dreaming of a solo culinary tour of Oaxaca’s
    markets and a serene escape to the lavender fields of Provence, always planning itineraries on a shared Google Doc with friends.
  culinary: Eduardo Rosarioreyes blends traditional mole sauce with locally sourced Idaho potatoes to craft a fusion mole‑potato casserole, experiments confidently with fresh trout tacos topped with jalapeño‑infused
    salsa verde, and usually cooks for friends on weekends despite occasionally over‑seasoning in his enthusiasm.
  core: Eduardo Rosarioreyes is a bilingual tech enthusiast who channels curiosity into DIY scripts, nerves into mindfulness, and a love for mountain trails into weekend hikes, even if their habit of over‑thinking
    sometimes stalls progress.
background:
  cultural: Eduardo was raised in a Mexican‑American household where Spanish was spoken daily and cultural traditions like Día de los Muertos, quinceañeras, and family gatherings were central to his upbringing.
    Moving to Pocatello, Idaho for his associate's degree introduced him to a predominantly Anglo‑American environment, prompting him to blend his Mexican heritage with the local mountain culture. He remains
    connected to his roots by celebrating Mexican holidays, cooking family recipes, and speaking Spanish with his parents and extended family, while also embracing Idaho's outdoor lifestyle and community
    events. This bicultural experience informs his identity, shaping a worldview that values both communal solidarity and individual adaptability.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Basic network configuration'', ''Software support and troubleshooting'', ''Bilingual communication (English/Spanish)'', ''Python scripting (self‑taught)'',
