  hobbies: '[''Hiking and mountain biking in the Idaho outdoors'', ''Cooking Mexican cuisine and fusion cooking'', ''Playing acoustic guitar (Mexican folk music)'', ''Watching and discussing Liga MX soccer'',
    ''Participating in community soccer pick‑up games'', ''Mindfulness meditation and journaling'']'
  career_goals: Eduardo aims to secure an entry‑level IT support position with a focus on serving bilingual communities, leveraging his language skills to bridge communication gaps. In the medium term,
    he aspires to obtain certifications such as CompTIA A+ and Network+, and to transition into a system administrator role where he can integrate his curiosity for emerging technologies with practical
    infrastructure management. He also harbors an entrepreneurial ambition to eventually launch a small technology‑assistance and repair service that caters to both the local Idaho population and the growing
    Hispanic community, combining his technical expertise with his cultural ties.
