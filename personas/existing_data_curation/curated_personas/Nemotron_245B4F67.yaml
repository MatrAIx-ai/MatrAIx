personas:
  professional: Troy Hooper, a 14-year-old high-school freshman, merges their curiosity for electronics with a practical knack for storytelling by building Arduino prototypes and filming quirky TikTok videos,
    balancing spontaneous creativity with the occasional need to meet school project deadlines, and they often scramble to finish assignments on time.
  sports: Troy Hooper dominates the neighborhood basketball court after school, plays midfield for the community center's Thunder Soccer Club, roots for the Los Angeles Lakers and Manchester United, and
    they squeeze in weekend skateboarding sessions at the local skate park for cross-training.
  arts: Troy Hooper channels their energetic personality into creating fast-paced TikTok sketches, editing YouTube vlogs inspired by Mark Rober's DIY style, and playing improv games with the school theatre
    troupe, while they binge-watch performances by Lin-Manuel Miranda and jam to Billie Eilish on repeat.
  travel: Troy Hooper prefers spontaneous weekend getaways to nearby state parks like Yosemite for hiking and to the family-run cabin by Lake Tahoe, yet dreams of an immersive trip to Tokyo's Akihabara
    for video-game culture, balancing limited pocket money with an appetite for adventure, and they often scout travel blogs for budget tips.
  culinary: Troy Hooper enjoys sampling new diner specials—from loaded chicken-and-waffle plates to spicy ramen bowls—and they experiment at home with avocado toast topped with jalapeños and fresh basil,
    though their cooking is limited to quick, one-pan meals.
  core: Troy Hooper is a hyper-curious 14-year-old whose spontaneous energy propels them from skate parks to Arduino labs, videography, and late-night gaming, and they constantly juggle an ever-growing
    collection of sneakers with a tendency to forget homework.
