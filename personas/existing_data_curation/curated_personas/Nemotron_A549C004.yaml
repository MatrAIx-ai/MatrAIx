  hobbies: '[''Oil painting'', ''Watercolor landscape painting'', ''Photography'', ''Reading literary fiction'', ''Poetry'', ''Folk music gatherings'', ''Community theater volunteering'', ''Gardening'',
    ''Hiking in the Allegheny foothills'', ''Experimenting with AI‑driven art tools'']'
  career_goals: Monica aims to transition into a senior advisory role where she can mentor the next generation of analysts and lead interdisciplinary projects that blend technology with cultural preservation.
    She hopes to launch a community‑wide digital archive for Punxsutawney’s historical photographs, newspaper clippings, and oral histories, using her systems expertise and artistic sensibility. Over the
    next few years she also plans to teach part‑time courses in information systems and digital humanities at a nearby community college, allowing her to share her lifelong curiosity while maintaining a
    balanced, flexible schedule.
