persona_description: Meghan Sullivan, a professor of philosophy at the University of Notre Dame, is a leading figure in the field of philosophy as a way of life. She has a unique perspective on the importance
  of philosophical education in today's world, where sustained, wisdom-seeking conversations are becoming increasingly rare. With a passion for helping students develop the skills they need to navigate
  the complexities of life, she has launched the "Philosophy as a Way of Life" project, which aims to establish a network of faculty committed to developing assignments, teaching texts, and building diverse,
  collaborative learning communities around the theme of philosophy as a way of life. Her project is funded by the Andrew W. Mellon Foundation and will collaborate with universities across the United States
  to introduce students to philosophical traditions focused on thinking more deeply and rigorously about the good life.
