personas:
  professional: Brannon Huynh is an aspiring robotics and game developer who spends afternoons tinkering with LEGO robotics kits and crafting simple Scratch games, channeling their curiosity for new ideas
    into practical, code‑driven projects while balancing schoolwork responsibilities.
  sports: Brannon Huynh fuels their energetic nature by playing on the middle school basketball team and competing in a local youth soccer club affiliated with the city’s professional team, cheering on
    the city’s NBA and MLS squads while also enjoying spontaneous streetball games at the neighborhood park.
  arts: Brannon Huynh expresses creativity through acoustic guitar practice—favoring songs by BTS, Blackpink, and Kendrick Lamar—anime‑style digital illustrations inspired by Studio Ghibli and My Hero Academia,
    and designing Scratch animations set to traditional folk melodies, even though they sometimes stay up past bedtime editing videos.
  travel: Brannon Huynh loves planning weekend escapades to places like Shenandoah National Park and dreaming of attending San Diego Comic‑Con, while they also hope to one day explore the heritage region
    of their ancestors in Southeast Asia, balancing family travel constraints with a modest savings plan.
  culinary: Brannon Huynh cooks family recipes such as phở bò and lumpia with their parents, experimenting with fusion dishes like phở‑pizza topped with basil and mozzarella, while they also favor quick
    snacks like ramen and pizza, proudly showcasing their favorite ingredients—star anise, lemongrass, and shrimp—in every kitchen experiment.
  core: Brannon Huynh is a sociable, curiosity‑driven teen who blends engineering, sports, music, and cooking into a balanced life, though they sometimes procrastinate on homework and forget to recycle
    plastic after school projects.
background:
  cultural: Brannon grows up in a mixed Filipino‑Vietnamese household in Philadelphia’s vibrant multicultural neighborhoods. At home, his parents speak both Tagalog and Vietnamese, and they celebrate holidays
    such as Tet (Vietnamese Lunar New Year) and the Filipino festivals of Sinulog and Pasko. Family meals often feature dishes like phở, bánh mì, lumpia, and arroz caldo, linking him to both culinary traditions.
    The surrounding community includes Asian cultural centers, temples, and youth programs that reinforce cultural pride while he navigates his American school environment. This bicultural upbringing instills
    respect for elders, a strong sense of community solidarity, and an appreciation for both traditional customs and contemporary American life.
