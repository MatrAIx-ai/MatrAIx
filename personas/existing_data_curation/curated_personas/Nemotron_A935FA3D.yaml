  career_goals: Brannon aims to attend a STEM‑focused high school where he can deepen his coding and engineering skills. In the future, he hopes to become a software developer who builds apps that solve
    everyday problems for his community, such as tools for local small businesses or health‑tracking platforms for underserved neighborhoods. He also wants to give back by mentoring younger students in
    after‑school coding clubs and volunteering at community centers, blending his technical interests with his desire to support others.
