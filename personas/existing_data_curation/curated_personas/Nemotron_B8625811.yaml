personas:
  professional: Valentina Perez is a bilingual early childhood educator who blends rigorous STEM curriculum design with spontaneous, hands‑on experiments, using clear visual schedules while also allowing
    children’s curiosity to steer lessons, and she is driven to become a lead teacher and curriculum specialist who will launch a district‑wide STEAM program and eventually open a bilingual preschool rooted
    in her family’s cultural traditions.
  sports: Valentina Perez competes in recreational volleyball with the City Beach Volleyball Club, plays midfield in the San Diego Soccer League, hikes the coastal trails of La Jolla and the hills of Torrey
    Pines for cardio, and follows the San Diego Wave FC and San Diego State Aztecs with fervent enthusiasm.
  arts: Valentina Perez indulges in indie folk music by Sufjan Stevens, streams classic films by Hayao Miyazaki, collects vintage graphic novels by Junji Ito, and attends monthly community theater productions
    featuring contemporary playwrights, finding that these artistic outlets fuel her creativity in lesson planning.
  travel: Valentina Perez prefers weekend road trips along the Pacific Coast Highway to Santa Barbara and hiking excursions in the Redwood forests, while also dreaming of a cultural immersion tour of Kyoto’s
    temples and a future family vacation to the Caribbean islands, though budgeting constraints sometimes limit these plans.
  culinary: Valentina Perez enjoys cooking family‑tradition dishes like tamales, chilaquiles, and mole, experimenting by adding quinoa and avocado to create fusion plates, and she confidently hosts monthly
    potluck gatherings where guests savor her signature chipotle‑infused corn salsa and homemade horchata.
  core: Valentina Perez is a socially‑driven, competitively‑spirited educator who balances structured curriculum design with spontaneous creativity, wrestles with anxiety and occasional disorganization,
    and channels her energy into vibrant community activities and culinary experiments.
background:
  cultural: Valentina is a first‑generation Mexican‑American raised in a close‑knit family that values both Mexican heritage and American opportunities. She fluently speaks Spanish and English, celebrates
    Día de los Muertos, Cinco de Mayo, and other Mexican holidays, and incorporates cultural stories and music into her classroom. Growing up in San Diego's vibrant Latino community, she maintains strong
    ties to local cultural centers, participates in neighborhood festivals, and draws on the region's bicultural milieu to create an inclusive, multicultural learning environment for her students.
attributes:
  skills: '["STEM curriculum development","Early childhood classroom management","Bilingual (English/Spanish) instruction","Hands‑on science experiments","Collaborative group facilitation","Data‑driven
    child assessment","Lesson planning with flexible scaffolding","Use of educational technology"]'
  hobbies: '["Volleyball (recreational league)","Soccer (community league)","Hiking in coastal trails","Cooking Mexican and fusion cuisine","Yoga and mindfulness meditation","Volunteer bilingual tutoring","Escape
    rooms and trivia nights"]'
  career_goals: Valentina aims to become a lead teacher and curriculum specialist for a preschool that emphasizes STEAM education. She aspires to design a district‑wide early STEM program and eventually
    open her own bilingual preschool that integrates Mexican cultural traditions with innovative science learning. She also hopes to mentor new teachers, lead professional development workshops, and secure
    grants for community STEM outreach targeting under‑served families in San Diego.
