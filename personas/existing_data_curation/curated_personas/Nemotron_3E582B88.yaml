  hobbies: '[''Visiting art museums and galleries'', ''Attending theater and concert performances'', ''Reading classic and contemporary literature'', ''Writing memoirs and essays'', ''Gardening'', ''Photography
    of historic sites'', ''Traveling to cultural events and museums'', ''Genealogy research'', ''Volunteering at historical museum'', ''Playing bridge'', ''Participating in a book club'']'
  career_goals: Although retired, Michael aims to remain an active contributor to the cultural life of Wichita. He plans to curate a traveling exhibition of regional artists, author a memoir that weaves
    his personal history with reflections on art, and mentor aspiring curators through workshops. He also hopes to travel to major museums in Europe and the United States to broaden his artistic perspective,
    and to serve on the board of the local historical society to help preserve the city’s heritage. Ultimately, his ambition is to foster intergenerational appreciation for the humanities while continuing
    his own lifelong learning.
