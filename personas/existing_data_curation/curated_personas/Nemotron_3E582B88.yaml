personas:
  professional: Michael Mckendree is a retired humanities scholar turned civic curator who leverages their deep knowledge of 19th‑century American and European painting, meticulous archival skills, and
    disciplined project coordination to design itinerant exhibitions, write winning grant proposals, and mentor emerging curators at the Wichita Historical Museum.
  sports: Michael Mckendree is an avid follower of the Wichita Thunder hockey team and the Kansas City Royals, participates in weekly bridge sessions that double as mental exercise, and maintains a light‑intensity
    walking routine through their garden and local park, occasionally joining a community pickleball group to stay limber.
  arts: Michael Mckendree is a devoted patron of the Wichita Art Museum, frequently attends performances by the local theater troupe, and draws inspiration from artists such as Mary Cassatt, Claude Monet,
    and contemporary photographer Andreas Gursky, often weaving these influences into their memoir writing and curatorial projects.
  travel: Michael Mckendree is a meticulous planner of art‑focused trips, favoring structured itineraries that include the Louvre in Paris, the Uffizi Gallery in Florence, and the Getty Center in Los Angeles,
    while balancing their travel budget by staying at modest boutique hotels and using senior discounts to maximize cultural exposure.
  culinary: Michael Mckendree is an enthusiastic home gardener who enjoys preparing simple yet elegant meals featuring heirloom tomatoes, carrots, and fresh basil—often roasted with olive oil and sea salt—paired
    with Earl Grey tea, though they occasionally over‑indulge in richly sour pickles harvested from their garden.
  core: Michael Mckendree blends disciplined organization with boundless curiosity, curating art and family histories with equal zeal, while they occasionally let nostalgia drive late‑night bridge sessions
    and a stubborn reluctance to modernize garden tools.
background:
  cultural: Michael comes from a white Midwestern background, with family roots in French‑Canadian and Anglo‑American ancestors who settled in the Great Plains. Raised in the modest, community‑oriented
    culture of Kansas, he internalized values of hard work, self‑reliance, and civic participation. His upbringing in a small‑town environment, combined with a liberal arts education, fostered a deep appreciation
    for cultural heritage and the arts. He maintains a connection to his heritage through participation in local cultural festivals and by preserving family histories.
