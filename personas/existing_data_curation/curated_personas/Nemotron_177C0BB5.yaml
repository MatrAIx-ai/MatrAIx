personas:
  professional: Courtney Douglas, a budding arts program coordinator, blends a meticulous eye for budgeting with a flexible, spontaneous event‑planning style, using their Photoshop and Canva skills to design
    eye‑catching promotional materials while confidently leading community workshops and stepping up to resolve unexpected logistical hiccups with calm assertiveness.
  sports: Courtney Douglas enjoys weekend hikes along the Ozark trails, cheers for the Arkansas Razorbacks basketball team, participates in a co‑ed recreational soccer league at the community center, and
    finds their rhythm in Zumba classes that satisfy their energetic, sociable nature while keeping them fit.
  arts: Courtney Douglas immerses themselves in painting rolling Arkansas landscapes inspired by Monet’s brushstrokes, stages community theater productions that echo the narrative depth of Sam Shepard,
    captures local events with a Nikon D3500 in a style reminiscent of Annie Leibovitz, reads contemporary poetry collections by Rupi Kaur and Ocean Vuong, and curates playlists that weave together classic
    jazz legends with modern hip‑hop beats, all of which fuel their curious, open‑minded artistic vision.
  travel: Courtney Douglas plans trips that balance detailed itineraries with spontaneous detours, favoring road‑trip adventures to music hubs like Austin, cultural retreats to Santa Fe’s art festivals,
    and weekend stays at Asheville’s mountain cabins, all while using budget‑friendly Airbnb options and a flexible schedule that reflects their organized yet adaptable approach.
  culinary: Courtney Douglas experiments in the kitchen, mastering comfort dishes such as braised short ribs and collard greens, perfecting Korean bibimbap and Italian risotto, sourcing fresh heirloom tomatoes,
    basil, and goat cheese from the local farmers’ market, and often hosts potluck dinners where their eclectic palate and creative flair bring friends together.
  core: Courtney Douglas is a curious, organized creative who transforms community spaces into vibrant art hubs, balances freelance design work with budgeting quirks, and fuels their life with hiking, cooking,
    and an eclectic soundtrack.
background:
  cultural: Courtney is an African‑American woman raised in Paragould, Arkansas, a small town where Black residents are a minority. Her family’s roots trace back to the Mississippi Delta and the Great Migration,
    bringing a legacy of resilience and cultural pride. She grew up in a close‑knit Black church community, where gospel music, oral storytelling, and collective service were everyday experiences. The Southern
    traditions of hospitality, cooking, and reverence for the land blend with the rich artistic heritage of African‑American culture—jazz, blues, visual arts, and literature—that she embraces. Navigating
    a largely white environment has sharpened her awareness of representation and motivated her to uplift Black voices through community art initiatives. Courtney draws inspiration from African‑American
    visual artists, civil‑rights history in Arkansas, and the rhythmic vitality of Southern music, weaving these influences into her personal identity, creative pursuits, and aspirations to foster inclusive
    cultural spaces in her hometown.
