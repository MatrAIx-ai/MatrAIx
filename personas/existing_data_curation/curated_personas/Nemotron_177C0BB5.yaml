    dancing)'']'
  career_goals: Courtney aims to translate her passion for art and community into a stable, impact‑driven career. In the short term, she plans to complete a bachelor's degree in Arts Administration or a
    related field, building on her existing coursework. Her goal is to secure a full‑time role as an arts program coordinator at the Paragould Public Library or a regional nonprofit, where she can design
    inclusive art workshops, curate exhibitions, and mentor emerging local artists, especially youth of color. Long‑term, she envisions launching her own community arts studio that serves as a collaborative
    space for creators, offers affordable classes, and hosts pop‑up galleries that celebrate African‑American cultural expression. Parallel to these ambitions, she seeks to grow a freelance graphic‑design
    portfolio, achieving financial independence to support her post‑divorce life while remaining a visible leader advocating for equitable cultural programming in her hometown.
