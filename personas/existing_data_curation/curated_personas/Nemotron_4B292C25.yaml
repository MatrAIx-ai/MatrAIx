  hobbies: '["Visiting art museums and galleries", "Reading historical and contemporary non‑fiction", "Gardening", "Playing bridge", "Traveling to cultural destinations", "Volunteering as a museum docent",
    "Attending classical music concerts", "Writing memoir excerpts"]'
  career_goals: Anthony's current ambitions focus on giving back to his community and preserving his legacy. He aims to mentor emerging business leaders through a structured apprenticeship program, serve
    on the board of the local art museum to promote interdisciplinary arts education, establish a scholarship that supports students pursuing combined studies in business and the arts, and author a memoir
    that highlights the intersection of entrepreneurship, philanthropy, and lifelong learning.
