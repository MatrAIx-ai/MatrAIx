  hobbies: '[''Reading historical fiction and biographies'', ''Book club participation'', ''Watercolor painting'', ''Quilting and crocheting'', ''Birdwatching'', ''Genealogy research'', ''Community theater
    attendance'', ''Classic jazz listening'', ''Senior center dance socials'', ''Attending county fairs and craft expos'']'
  career_goals: Although retired, Shelby remains driven by personal growth and community contribution. She aims to deepen her appreciation for visual art by attending virtual museum tours, local gallery
    openings, and taking beginner watercolor classes, eventually sharing what she learns through informal art workshops at the senior center. She plans to compile a memoir that intertwines her life story
    with the broader history of Hawley, preserving family photos, recipes, and anecdotes for future generations. Shelby also aspires to mentor a grandchild or neighbor in gardening and craft techniques,
    fostering intergenerational skill sharing. Maintaining her health through regular walks, low‑impact exercise, and cognitive activities like crossword puzzles is a continual ambition, as is supporting
    the local historical society’s archival projects.
