  hobbies: '[''Sketching and Mixed-Media Collage'', ''Digital Photography of Urban Landscapes'', ''Reading Contemporary Fiction and Art Theory'', ''Cooking Traditional Puerto Rican Cuisine'', ''Hosting
    Small-Group Book Club Discussions'', ''Attending Local Gallery Openings'', ''Gardening for Relaxation'']'
  career_goals: Marianela aims to transform her passion for art into a community-focused vocation while preserving the flexibility she values. In the next few years she plans to complete an online museum
    studies certificate, which will equip her to serve as a docent or volunteer curator at the Grand Rapids Art Museum. Parallel to that, she hopes to launch an online platform that spotlights Puerto Rican
    artists, offering curated virtual exhibitions and bilingual commentary. She also envisions opening a modest studio space in Grand Rapids where she can host intimate, hands-on workshops for small groups,
    blending her artistic skills with her love for teaching. Ultimately, she wants to blend cultural advocacy with sustainable income, allowing her to stay at home with her family while contributing meaningfully
    to the local arts scene.
