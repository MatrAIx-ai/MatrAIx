personas:
  professional: Marianela Beltran is a community‑focused visual‑arts curator in Grand Rapids who blends bilingual storytelling skills with an inquisitive eye for emerging talent, orchestrating intimate
    exhibitions, bilingual workshops, and an upcoming online platform that spotlights island‑inspired artists while juggling a relaxed, sometimes disorganized, work style.
  sports: Marianela Beltran enjoys early morning jogs along the Grand River, participates in a co‑ed recreational softball league called the Kent County Breakers, follows the Grand Rapids Griffins hockey
    team and the Detroit Tigers baseball club, and attends weekly yoga sessions at a local studio to balance a generally sedentary artistic routine.
  arts: Marianela Beltran spends evenings sketching watercolor studies, crafting mixed‑media collages inspired by Frida Kahlo’s introspection and Basquiat’s street energy, curates small pop‑up shows featuring
    local painters like Helen Harrington, and keeps a playlist of salsa legend Celia Cruz and contemporary jazz vocalist Esperanza Spalding while hosting a book club that dissects poetry by Langston Hughes
    and visual theory texts.
  travel: Marianela Beltran prefers loosely planned getaways that blend cultural immersion and natural scenery, having explored the historic streets of Old San Juan, the cobblestones of Lisbon, and the
    Great Lakes’ shoreline, while dreaming of a future trip to New Orleans for its jazz festivals and to a remote Caribbean island to revisit family‑style cooking traditions.
  culinary: Marianela Beltran proudly cooks aromatic dishes such as mofongo, arroz con gandules, and pasteles, enhancing them with locally sourced herbs like rosemary and sage, while also experimenting
    with seasonal Midwestern vegetables, mastering the art of slow‑roasted lechón and regularly hosting potluck evenings where guests savor the fusion of island flavors and Great Lakes produce.
  core: Marianela Beltran is a curious, solitary creator who balances a love for intimate community art projects with a habit of leaving paperwork unfinished, a flexible money mindset, and a penchant for
    late‑night cooking adventures that often leave a lingering scent of fried plantains in the house.
background:
  cultural: Marianela’s Puerto Rican heritage is a core part of her identity, even as she lives in Grand Rapids, Michigan. She grew up in a bilingual household where Spanish was spoken at the dinner table,
    and family celebrations were marked by salsa music, bomba drums, and dishes like mofongo and lechón. The cultural emphasis on storytelling and communal gatherings shaped her appreciation for art as
    a means of preserving memory. While adapting to life in the Midwest, she has woven her Caribbean roots into her everyday life by organizing occasional cultural evenings for the small Latino community
    in Kent County, sharing music, dance, and cuisine. This blend of Caribbean tradition and Midwestern sensibility informs her artistic perspective, allowing her to bridge diverse cultural narratives in
    her work.
attributes:
  skills: '[''Art Critique and Interpretation'', ''Small-Scale Exhibition Curation'', ''Watercolor & Acrylic Painting'', ''Digital Photography'', ''Adobe Lightroom Photo Editing'', ''Bilingual Spanish-English
