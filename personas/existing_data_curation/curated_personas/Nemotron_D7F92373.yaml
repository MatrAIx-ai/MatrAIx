  career_goals: Jaime aims to transition from a frontline sales representative to a regional sales manager within the next three years, where she can lead a team while integrating her instructional expertise
    to build a formal training academy for service reps. She is ambitious about mentoring junior colleagues, developing data‑driven sales strategies for the Mariposa region, and creating a community outreach
    program that connects her company's services with local senior citizens. While pursuing advancement, she is focused on maintaining a sustainable work‑life balance that mitigates stress, and she envisions
    eventually launching a consulting practice that helps small rural businesses improve their customer engagement and sales processes before she fully retires.
