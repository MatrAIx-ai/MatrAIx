  hobbies: '[''Reading Science-Fiction'', ''Solo Hiking'', ''DIY Electronics'', ''Programming Challenges'', ''Meditation'', ''Desert Photography'', ''Puzzle Solving'', ''Kaggle Competitions'']'
  career_goals: Max aims to transition from floor supervision to a senior operational role that leverages his analytical background while reducing the day‑to‑day social demands of managing large teams.
    In the next 2‑3 years he plans to earn a certification in retail analytics and lead a pilot project that implements AI‑based inventory forecasting in his store. His longer‑term ambition is to become
    a regional operations strategist for a national retailer, shaping supply‑chain policies from a data‑centric perspective and eventually overseeing multiple locations remotely. He is also interested in
    launching a side consultancy that helps small retailers adopt low‑cost tech solutions, allowing him to monetize his technical expertise without extensive interpersonal commitments.
