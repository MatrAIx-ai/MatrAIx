  career_goals: Phong aims to become a senior technical leader who spearheads sustainable product development, merging engineering excellence with market insight. In the next three years he plans to earn
    PMP certification and pursue a master's in engineering management. He envisions leading a multidisciplinary team to launch eco‑friendly consumer devices, eventually founding his own startup focused
    on circular‑economy solutions. Mentoring junior engineers, especially from underrepresented backgrounds, and expanding STEM outreach programs in his community are core to his long‑term ambition.
