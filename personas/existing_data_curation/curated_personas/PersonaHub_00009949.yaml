persona_description: A computer engineer who specializes in hard drive design and development, particularly in the field of magnetic disk drives. They have extensive knowledge of the design and operation
  of hard disk drives, including the use of separate arms and heads for each platter, the use of air to keep the heads closer to the platters to increase storage density, and the storage capacity of 28
  million characters per module on 20 platters. They are likely to have worked on the development of the IBM 1301 Disk Storage Unit and have a deep understanding of the technology behind hard disk drives.
