personas:
  professional: Mercedes Herrera is a budding comic illustrator who combines a love for drawing cartoon characters with a laid‑back approach to school assignments, using their cooperative nature to thrive
    in group projects and youth‑group media activities while preferring routine study schedules over abstract planning.
  sports: Mercedes Herrera enjoys casual soccer games with friends on weekends, plays for the Eastside Youth Soccer Club, and follows the LA Galaxy and Los Angeles Dodgers, balancing a love of spontaneous
    play with a preference for familiar routines in their fitness schedule.
  arts: Mercedes Herrera immerses themselves in regional Mexican music from Los Tigres del Norte and Ana Gabriel, watches telenovelas starring Thalía, and channels that cultural flair into drawing comic
    characters inspired by classic cartoons like Mickey Mouse and contemporary graphic novels by Art Spiegelman.
  travel: Mercedes Herrera prefers family‑guided trips that blend routine and adventure, having visited Oaxaca to explore cuisine with their mother and dreaming of a road‑trip to the Grand Canyon, while
    they tend to book travel last‑minute due to their flexible planning style.
  culinary: Mercedes Herrera cooks traditional Mexican dishes such as tacos al pastor, tamales, and sopa de tortilla with their mother, skillfully handling corn masa and chile ancho, yet often forgets to
    pre‑heat the oven, turning weekend cooking sessions into both delicious successes and occasional kitchen mishaps.
  core: Mercedes Herrera blends a love for routine‑driven comic drawing, relaxed budgeting, and warm family traditions with a tendency to procrastinate on organization, creating a uniquely balanced yet
    occasionally haphazard teenage outlook.
background:
  cultural: Mercedes is a Mexican-American teen raised in a bilingual, close-knit family in San Antonio, Texas. Her household celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and
    family gatherings centred around homemade food. She frequently attends Catholic services and community festivals that blend Mexican heritage with Tex-Mex influences from the city. Fluent in both Spanish
    and English, she navigates both cultures with ease, drawing on her family's values of hard work, family unity, and respect for community.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Basic cooking (tacos, tamales, quesadillas)'', ''Computer literacy (smartphone, email, word processing)'', ''Peer mediation and conflict resolution'',
    ''Assisting younger siblings with schoolwork'', ''Organizing small community events'']'
  hobbies: '[''Listening to regional Mexican music'', ''Watching telenovelas'', ''Drawing cartoons'', ''Playing casual soccer'', ''Church youth group activities'', ''Cooking traditional Mexican dishes'']'
  career_goals: Mercedes aims to finish high school and, if possible, obtain a GED, then pursue a community-college program in nursing to become a certified nursing assistant. She values a stable, routine-driven
    career that allows her to help others and support her family. Additionally, she dreams of one day opening a small family-run taco stand where she can share her love of cooking with the community.
