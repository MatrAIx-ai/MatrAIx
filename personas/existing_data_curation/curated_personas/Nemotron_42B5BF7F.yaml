personas:
  professional: Mary Medlin is a seasoned residential housekeeping expert who blends three decades of deep‑cleaning precision with a curiosity for eco‑friendly innovations, using scheduling software to
    juggle client needs while mentoring younger staff toward sustainable practices.
  sports: Mary Medlin enjoys leisurely walks along the Indian Creek Trail, participates in a senior‑center yoga class, and cheers on the Kansas City Chiefs and Royals from her comfortable living room while
    occasionally joining a community pickleball league for light competition.
  arts: Mary Medlin is an avid reader of Agatha Christie mysteries and historical non‑fiction, attends local theater productions featuring classic plays, and finds inspiration from folk musicians like Joni
    Mitchell while knitting scarves to the rhythm of her favorite vinyl records.
  travel: Mary Medlin prefers relaxed, culturally rich travel, having explored the Missouri Ozarks, the historic streets of Savannah, and the vineyards of Napa, and she hopes to visit Sedona’s red rocks,
    all while planning trips within a senior‑friendly budget and health considerations.
  culinary: Mary Medlin blends Midwestern comfort food with sustainable ingredients, often preparing tomato‑basil soup, roasted herb chicken with heirloom tomatoes from her garden, quinoa salads, and spiced
    kale chips, while experimenting with low‑sugar desserts and sipping herbal tea.
  core: Mary Medlin balances a green‑cleaning career, garden‑fresh meals, and community service with a love for mystery novels, all while navigating mild arthritis and a disciplined, eco‑centric financial
    plan.
background:
  cultural: Mary was raised in a small Midwestern town in Kansas, part of a white, predominantly Anglo‑American community that values hard work, neighborly support, and modesty. Her family’s heritage traces
    back to German and English ancestors who settled the region in the late 19th century. Growing up, she attended public schools and later took courses at a community college, where she cultivated a pragmatic
    outlook balanced with curiosity about new ideas. The cultural emphasis on community involvement, reliability, and a respect for tradition informs her cooperative demeanor and her commitment to maintaining
    harmonious home environments. While she identifies with the region’s Protestant Christian roots, Mary’s personal practice is more ecumenical, focusing on kindness and service.
attributes:
  skills: '["deep cleaning", "hardwood floor polishing", "tile and grout cleaning", "carpet & upholstery stain removal", "eco-friendly cleaning methods", "inventory management", "time management", "client
