  hobbies: '["gardening", "reading mystery novels", "historical non-fiction reading", "knitting", "crocheting", "bridge club", "community clean-up volunteering", "walking on Indian Creek Trail", "experimenting
    with cooking healthy comfort food", "attending local church gatherings"]'
  career_goals: Mary aims to transition from full‑time housekeeping to a part‑time mentorship role in the next two years, passing on her practical knowledge and green‑cleaning techniques to younger staff.
    She plans to obtain a Certified Professional Cleaner (CPC) credential with an emphasis on sustainable practices, and to launch a boutique consulting service that advises affluent households in Leawood
    on streamlining household management and implementing environmentally responsible cleaning routines. Additionally, she hopes to volunteer as a trainer for a local senior‑center program that teaches
    basic home‑care skills, ensuring her expertise supports the community while allowing a more balanced workload as she approaches retirement.
