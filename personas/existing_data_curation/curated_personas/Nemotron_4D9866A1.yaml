personas:
  professional: Roxana Buckland, a veteran higher-education instructional designer, merges their expertise in curriculum development and educational technology with a pragmatic yet curious mindset, routinely
    championing collaborative workshops, grant-driven research, and community-based learning initiatives while navigating the occasional chaos of a flexible schedule.
  sports: Roxana Buckland, an avid hiker of the Ouachita and Ozark trails, also follows the Arkansas Razorbacks football team and the St Louis Cardinals baseball club, and participates in a local walking
    club that meets every Saturday morning for a mile-long circuit around the neighborhood park.
  arts: Roxana Buckland, a dedicated member of a community theater troupe, frequently stages productions inspired by August Wilson and Tennessee Williams, enjoys square dancing to the tunes of Bill Monroe,
    and they often discuss the plays over coffee with fellow members while finding literary solace in historical fiction authors such as Philippa Gregory and Ken Follett.
  travel: Roxana Buckland prefers relaxed road-trip itineraries that blend hiking in the Great Smoky Mountains, exploring historic sites in Savannah, Georgia, and revisiting the charming streets of Asheville,
    while they budget for occasional weekend getaways to the Texas Hill Country for its vineyards and live music scene.
  culinary: Roxana Buckland delights in preparing Southern staples like shrimp and grits, collard greens seasoned with smoked ham hocks, pecan pie, and fresh heirloom tomato salads, and they showcase a
    moderate cooking skill that shines during elaborate potluck dinners for neighbors.
  core: Roxana Buckland balances a boundless curiosity for innovative pedagogy with a delightfully disorganized, socially vibrant lifestyle that sees them juggling theater, gardening, and frequent community
    gatherings, and they thrive on the energy of group activities.
background:
  cultural: Roxana is a White American woman whose family has lived in Arkansas for several generations. She was raised in a small town in the Ozark region, where community ties, Southern hospitality, and
    an appreciation for the natural landscape were central to her upbringing. Her cultural identity blends a Midwestern work ethic with Southern traditions, including participation in church activities,
    seasonal festivals, and a love of local cuisine. Educated at the University of Arkansas, she maintains strong connections to the local community, often taking part in regional events and supporting
    agricultural heritage. Living in Springdale’s diverse environment, she values inclusivity and cultural exchange while preserving her own heritage.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Adult Learning Theory'', ''Educational Technology Integration'', ''Student Mentoring'', ''Assessment Design'', ''Grant Writing'', ''Community
