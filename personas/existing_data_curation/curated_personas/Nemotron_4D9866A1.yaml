  hobbies: '[''Community Theater'', ''Gardening'', ''Hiking'', ''Cooking'', ''Potluck Hosting'', ''Book Club'', ''Square Dancing'', ''Volunteer Tutoring'', ''Yoga'', ''Mindfulness'']'
  career_goals: Roxana aspires to advance into a leadership role within the university, such as department chair or director of the Center for Teaching Excellence, where she can shape institutional policies
    that promote innovative pedagogies and student wellbeing. She aims to develop interdisciplinary programs that connect students with local businesses and community organizations, secure external funding
    for research on adult learning and mental health, and mentor early‑career faculty. Long term, she hopes to author a textbook on experiential learning and to establish a statewide network of community
    based learning hubs.
