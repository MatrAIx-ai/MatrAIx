persona_description: A historian who is interested in the history of the Church of England and the architecture of its parish churches. This individual is knowledgeable about the Decorated and Perpendicular
  Gothic styles, the history of the church, and the restoration work that has taken place on the church. They are particularly interested in the history of the church's monuments, such as the ones commemorating
  John Doyley, Elizabeth Poole, and Richard Harrington, and the restoration work that has been done on the church. They are also interested in the Gothic Revival architecture of the church and the restoration
  work that has been done on it.
