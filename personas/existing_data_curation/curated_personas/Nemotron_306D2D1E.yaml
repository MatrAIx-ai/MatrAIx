personas:
  professional: Lourdes Gonzalez, an aspiring accountant, transforms her love of structure into precise bookkeeping by mastering QuickBooks, Sage 50, and advanced Excel pivot tables, applying her methodical,
    detail‑oriented nature to maintain flawless ledgers, meet tight deadlines, and communicate clear, concise financial reports in collaborative team settings.
  sports: Lourdes Gonzalez enjoys early‑morning jogs along the Homestead Extension of the Everglades, follows the Miami Heat and Miami Dolphins avidly, trains with the Homestead Everglades Trail Running
    Club, and plays recreational soccer on weekends for Inter Miami CF’s community outreach league, preferring structured workouts over spontaneous group sports.
  arts: Lourdes Gonzalez immerses herself in the passionate rhythms of Paco de Lucía’s flamenco guitar, the avant‑pop of Rosalía, and the cinematic storytelling of Pedro Almodóvar, while occasionally attending
    intimate open‑mic evenings where she recites bilingual poetry and displays her admiration for Frida Kahlo’s vibrant prints.
  travel: Lourdes Gonzalez, a careful planner, has trekked the Everglades National Park and explored historic Seville, dreams of backpacking along Barcelona’s Catalan coast, and prefers itineraries that
    blend cultural festivals with serene nature escapes while budgeting within her student finances.
  culinary: Lourdes Gonzalez excels at crafting paella al saffron and crisp gazpacho, meticulously weighing bomba rice, smoked chorizo, fresh tomatoes, and a pinch of paprika, while sourcing local seafood
    from the Miami farmer’s market and sharing these dishes during family gatherings on Día de los Reyes.
  core: Lourdes Gonzalez is a methodical 19‑year‑old accounting student who balances spreadsheet perfection with crossword puzzles, perfects paella down to the last grain, and occasionally over‑books her
    weekends, leaving little room for spontaneity.
background:
  cultural: Lourdes is a first‑generation American of Spanish descent; her parents immigrated from Andalusia and keep many customs alive at home. She is fluent in both Castilian Spanish and English, and
    she celebrates Spanish holidays such as Día de los Reyes, Semana Santa, and traditional family gatherings with tapas and sangria. Living in Homestead, she is also exposed to the multicultural vibrancy
    of Miami‑Dade County, which enriches her appreciation of Latin American music and cuisine, though she remains deeply rooted in her European Spanish identity. Her cultural upbringing emphasizes respect
    for structure, punctuality, and family loyalty, traits that echo in her personal and professional life.
attributes:
  skills: '["Bookkeeping", "QuickBooks", "Sage 50", "Microsoft Excel (advanced formulas, pivot tables)", "Accounts payable/receivable processing", "Financial statement preparation", "Data reconciliation",
    "Compliance and internal controls", "Time management", "Confidentiality handling"]'
  hobbies: '["Sudoku puzzles", "Crossword puzzles", "Cooking Spanish cuisine (paella, gazpacho, tortilla española)", "Nature walks in Everglades", "Photography of local flora", "Language exchange (English/Spanish)"]'
  career_goals: Lourdes aims to finish her associate degree in accounting and later obtain a bachelor's degree, followed by the Certified Bookkeeper (CB) credential. Within the next five years she hopes
    to advance to a senior bookkeeping or junior auditor role at a mid‑size firm in Miami‑Dade County. Her long‑term ambition is to become a Certified Public Accountant (CPA) and eventually serve as a financial
    controller for a company that values systematic processes and ethical oversight. She also wishes to develop expertise in tax preparation to better serve the growing Spanish‑speaking small‑business community
    in her area.
