  hobbies: '[''Gardening'', ''Baking Southern cuisine'', ''Hiking local trails'', ''Reading historical fiction'', ''Knitting for charity'', ''Volunteering at animal shelter'', ''Community theater'']'
  career_goals: Kathi aims to build a stable career in office administration or logistics. She plans to enroll in a community‑college program for an associate degree in business administration, followed
    by a certification in supply‑chain management. Her short‑term goal is to secure a full‑time administrative or logistics coordinator position with a local manufacturer or healthcare provider, and she
    eventually hopes to move into a supervisory role where she can apply her methodical approach to improve workflow and team efficiency.
