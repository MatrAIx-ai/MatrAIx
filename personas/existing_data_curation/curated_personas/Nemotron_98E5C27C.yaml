  hobbies: '[''Fishing'', ''Hiking'', ''Acoustic guitar'', ''Woodworking'', ''Vintage car restoration'', ''Podcast listening (sales, psychology)'', ''Reading non-fiction (business, self‑improvement)'',
    ''Community volunteering (food bank)'', ''County baseball games'', ''Country/bluegrass concerts'']'
  career_goals: Jesse aims to earn the Chartered Property Casualty Underwriter (CPCU) designation within the next two years and advance to a senior sales consultant role at his agency. He aspires to become
    one of the top-performing agents in the region, leveraging his competitive drive to consistently rank in the top 5% of sales producers. Long‑term, he plans to launch his own boutique insurance agency
    focused on serving small businesses in Maury County, integrating innovative fintech solutions to streamline client onboarding. He also wants to mentor new agents, sharing his blend of practical curiosity
    and real‑world experience.
