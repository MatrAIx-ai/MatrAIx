persona_description: A researcher and inventor focused on the development and application of precision micromechanical levers for cell culture systems. Dr. Ana Rita Ribeiro has expertise in optical trapping
  and sensing using optical fibers, as well as biophysical systems for cell cultures. Her work has been published in 4 scientific papers and 17 conference proceedings. Her goal is to develop a reliable
  and commercialized device for cell confinement using precision micromechanical levers, which she plans to use in various applications such as studying cell dynamics triggered by or under mechanical effects,
  co-culturing cells, and mimicking the natural cell environment.
