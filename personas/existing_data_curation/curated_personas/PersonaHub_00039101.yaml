persona_description: A professional engineer who specializes in the design and implementation of industrial signal processing systems, particularly in the field of temperature measurement. They are experienced
  in the use of analog-to-digital converters (A/D converters) and microcontrollers to interface with various types of sensors, including thermocouples, RTDs, and thermistors. They are skilled in the use
  of background calibration techniques to maintain the accuracy of the sensor signals over time and temperature, and are familiar with the use of spi interfaces for serial communication. They are also experienced
  in the use of a variety of sensors, including current loops, and are skilled in the design and implementation of low-power, high-precision industrial 4-20mA current loops. They are also familiar with
  the use of ultra-low quiescent current linear regulators for the power supply of the current loop transmitter.
