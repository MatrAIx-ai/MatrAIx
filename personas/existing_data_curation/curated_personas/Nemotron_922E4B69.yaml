  career_goals: Edie aspires to turn her love for communication and community engagement into a career in public relations or digital media. She aims to earn a degree in communications after completing
    high school, eventually managing campaigns for local businesses or serving as a spokesperson for community initiatives. Her competitive drive pushes her to develop a personal brand on social platforms
    and to eventually launch her own boutique event‑planning service.
