personas:
  professional: Edie Moore, a high‑school junior who runs the drama club’s publicity team, blends her strong verbal communication, pragmatic tech curiosity, and competitive drive to organize school events—from
    student‑run harvest festivals to church youth group fundraisers—and they create TikTok videos that showcase a knack for mediating peer conflicts and delivering polished messaging.
  sports: Edie Moore, a varsity volleyball player at her high school, spends her weekends biking the Columbia River Trail with the Kennewick Cycling Club, cheering on the Seattle Seahawks on game days,
    and they incorporate quick HIIT workouts inspired by the Seattle Sounders’ training regimens to stay fit and competitive, often joining the annual riverfront bike rally for community fun.
  arts: Edie Moore, an avid drama club member, channels her love for storytelling by directing short TikTok skits, performing scenes from Lin‑Manuel Miranda’s works at the local community theater, and they
    unwind watching indie films by the Dardenne brothers while listening to the ethereal sounds of Aurora and the lo‑fi beats of Tom Misch, which together shape her creative outlook.
  travel: Edie Moore prefers spontaneous weekend getaways over meticulous planning, often hopping on a Greyhound to explore Portland’s food carts and Seattle’s vibrant murals, and they dream of backpacking
    through New Zealand’s South Island once enough savings from their part‑time job accumulate, while also cherishing annual trips to nearby national parks for community hikes.
  culinary: Edie Moore, a casual home cook, enjoys whipping up quick avocado toast topped with feta and chili flakes for breakfast, baking traditional custard tarts for church gatherings, indulging in spicy
    ramen bowls with soft‑boiled eggs when dining out, and they experiment with TikTok‑trending food hacks using matcha powder and beet juice, all while maintaining a modest skill level that favors simple,
    flavorful creations.
  core: Edie Moore blends a competitive, talkative spark with pragmatic curiosity, constantly juggling drama rehearsals, TikTok trends, and a calendar so packed they sometimes skip lunch, yet they always
    find a moment to snap a sunset photo of the Columbia River before bedtime.
background:
  cultural: Edie grew up in a white, middle‑class family in Kennewick, Washington, where the Pacific Northwest’s mix of agricultural heritage and outdoor recreation shaped her outlook. Her Portuguese‑ancestry
    surname, Leite, reflects a family tradition of celebrating modest, community‑focused holidays and attending a local church youth group. The region’s emphasis on self‑reliance, local festivals, and a
    close‑knit school spirit informs her values of teamwork, pragmatism, and a healthy skepticism toward new ideas.
