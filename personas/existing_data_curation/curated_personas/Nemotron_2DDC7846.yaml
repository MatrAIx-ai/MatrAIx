  hobbies: '["Reading historical fiction and biographies", "Gardening (vegetables, herbs, flowers)", "Hiking and birdwatching", "Photography", "Quilting and knitting", "Genealogy research", "Community theatre
    attendance", "Book club participation"]'
  career_goals: Even though she is retired from formal employment, Jennifer’s ambitions remain community‑focused. She aims to complete a memoir intertwining her family’s New England roots with reflections
    on local history, and to publish a series of articles for the Mansfield Historical Society’s journal. She plans to mentor younger volunteers, passing on her event‑planning and research skills, and to
    develop a small intergenerational workshop series that blends digital literacy with traditional crafts. Additionally, she hopes to advocate for senior accessibility in town planning and to serve on
    the advisory board of the local senior center, ensuring programs balance social engagement with private time.
