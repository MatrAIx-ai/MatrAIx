persona_description: A scientist or astrophysicist who specializes in studying the physical processes involved in the core-collapse supernova explosion of SN 1987A. This person is likely to be interested
  in the detailed study of the stages of supernova explosions, the physical mechanisms involved, and the impact of these explosions on the surrounding environment. They would be interested in the creation
  and validation of 3-D computer models that can simulate the complete burst in all three dimensions, from the first milliseconds after the explosion is triggered in the core, to a time three hours later.
  This person would also be interested in the unexpected discovery of nickel, iron, and other heavy metal-rich elements mixing with hydrogen and moving outward as they erupted from the center of SN 1987A,
  and the implications of these findings for the structure and evolution of massive stars.
