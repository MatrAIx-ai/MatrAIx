  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Vietnamese Cooking'', ''Gardening'', ''Reading Classic Literature'', ''Hiking on Coastal Trails'', ''Playing Chess'', ''Volunteer Docent at Local
    Museum'', ''Traveling to Vietnam for Family Visits'', ''Meditation'']'
  career_goals: Looking ahead, Ngoi aims to transition into a senior leadership role within the county’s assessment office, where he can shape policy on fair property tax valuation and champion the adoption
    of modern GIS and AI tools to improve accuracy and efficiency. He also hopes to mentor junior assessors, sharing his blend of technical knowledge and humanities perspective. Parallel to his professional
    path, he envisions contributing to historic preservation projects, leveraging his research skills to help protect culturally significant buildings in Rhode Island. While he values organized, reliable
    work, his flexible mindset encourages him to explore unconventional solutions. Ultimately, Ngoi plans to balance a phased reduction in workload with continued volunteer work as a community educator
    on property rights, local art history, and cross‑cultural understanding, even as his tendency to worry pushes him to double‑check outcomes and maintain high standards.
