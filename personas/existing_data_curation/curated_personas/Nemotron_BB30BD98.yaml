personas:
  professional: Ann Cascio, a seasoned drywall and plaster specialist nearing retirement, leverages their meticulous attention to detail, OSHA safety rigor, and natural mentorship flair to oversee community
    college workshops and guide Habitat for Humanity volunteers, blending their organized, resilient nature with a curiosity for sustainable building practices.
  sports: Ann Cascio stays active through a weekly walking club and light gardening, roots for the Hartford Yard Goats and the New England Patriots, and enjoys dancing to swing music at the town hall, ensuring
    their fitness routine blends community spirit with gentle exercise.
  arts: Ann Cascio regularly knits patterns inspired by traditional folk motifs, dances to the sounds of Ella Fitzgerald and Duke Ellington during swing nights at the local hall, and devours historical
    fiction by Hilary Mantel, letting these creative outlets reinforce their sense of continuity and community.
  travel: Ann Cascio prefers relaxed road trips that combine coastal history and culinary stops, having already explored Mystic Seaport, Newport, and planning a future pilgrimage to the historic forts of
    St Augustine, Florida, while balancing a modest travel fund and their husband's schedule.
  culinary: Ann Cascio boasts a high‑skill kitchen that delights in simmering a hearty ragù with fresh San Marzano tomatoes, basil, and oregano from their garden, crafting homemade gnocchi, and perfecting
    a crisp bruschetta topped with heirloom tomatoes and garlic.
  core: Ann Cascio blends a lifelong builder’s precision with a zest for community, swapping drywall tips for knitting patterns while never missing a swing dance night, even if they occasionally forget
    to water their tomatoes on rainy days.
background:
  cultural: Ann was raised in a close‑knit Italian‑American family in Connecticut, where Catholic traditions, respect for elders, and a strong work ethic were core values. Her upbringing combined the warmth
    of family gatherings with the modest, reliable ethos of New England. This blend influences her practical curiosity, love of community service, and appreciation for both tradition and innovation. She
    maintains ties to local Italian cultural societies, celebrates holidays such as Feast of San Gennaro, and embraces the regional emphasis on self‑reliance and civic involvement.
attributes:
  skills: '[''drywall installation'', ''ceiling‑tile installation'', ''joint taping and finishing'', ''blueprint reading'', ''building code compliance'', ''OSHA safety training'', ''project scheduling'',
