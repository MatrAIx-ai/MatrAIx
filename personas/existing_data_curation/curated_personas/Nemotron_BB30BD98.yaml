  hobbies: '[''book club'', ''community gardening'', ''knitting circle'', ''dance hall socials'', ''cooking Italian recipes'', ''genealogy research'', ''participating in town festivals'', ''volunteering
    with Habitat for Humanity'']'
  career_goals: Although Ann is approaching retirement, she plans to transition into a mentoring role, offering part‑time workshops at the local community college and volunteering with Habitat for Humanity
    to train the next generation of women in the trades. She hopes to complete her associate degree in construction management, write a guidebook on sustainable drywall techniques, and travel with her husband
    to historic sites along the New England coast while remaining an active advisor for small‑scale renovation projects in her community.
