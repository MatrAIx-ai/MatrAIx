  hobbies: '[''Architectural history reading'', ''Gardening'', ''Quilting'', ''Cooking Southern dishes'', ''Jazz listening'', ''Community volunteering'', ''Historic preservation tours'', ''Yoga'', ''Walking
    trails'']'
  career_goals: Approaching the latter stage of her career, Sandra aims to transition into a consulting and mentorship role where she can guide the next generation of drafters and champion inclusive, sustainable
    design practices. She plans to obtain LEED AP certification to integrate green building principles into community projects, and she is eager to lead a local historic‑preservation initiative that documents
    and revitalizes Montgomery County’s culturally significant sites. Additionally, she hopes to author a guidebook on practical, accessible design for small‑scale residential projects, blending her curiosity
    for new ideas with a pragmatic, hands‑on approach.
