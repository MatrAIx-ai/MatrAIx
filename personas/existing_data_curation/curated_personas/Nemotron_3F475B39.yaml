personas:
  professional: A seasoned architectural and civil drafter, Sandra Maryland leverages her graduate STEM background and advanced CAD/BIM expertise to produce precise construction documents for historic preservation
    projects while mentoring junior staff, balancing curiosity for new sustainable design methods with a pragmatic, hands‑on approach.
  sports: Sandra Maryland, an avid supporter of the Philadelphia Eagles and Phillies, spends weekend mornings walking the Schuylkill River Trail with a local walking club, attends gentle yoga classes twice
    a week for flexibility, and participates in community garden volunteer projects that double as low‑impact exercise, reflecting her balanced yet laid‑back fitness routine.
  arts: Sandra Maryland frequently attends jazz concerts featuring legends like Miles Davis and contemporary ensembles, explores local art exhibitions at the Philadelphia Museum of Art, and volunteers at
    a heritage museum where she helps curate exhibits on historic neighborhoods, while also dedicating evenings to quilting projects inspired by traditional folk patterns.
  travel: Sandra Maryland prefers relaxed, culturally immersive trips, often taking short road trips to historic towns such as Annapolis and Charlottesville, while dreaming of a guided tour of the UNESCO
    World Heritage sites of the American Southeast, balancing limited retirement funds with a desire for meaningful experiences.
  culinary: Sandra Maryland loves cooking Southern comfort dishes—she perfects collard greens, shrimp and grits, and cornbread using heirloom vegetables from her garden, and while she experiments with occasional
    fusion recipes, she often defaults to time‑tested family recipes that remind her of her childhood.
  core: Sandra Maryland blends a curious, hands‑on approach to design and community with a laid‑back, sometimes disorganized lifestyle, finding joy in gardening, jazz, and mentoring while pragmatically
    planning her late‑career transition into sustainable consulting.
background:
  cultural: Sandra is an African‑American woman whose family migrated north during the Great Migration, settling in the Philadelphia suburbs. Raised in a close‑knit Black community, she was deeply influenced
    by church, family storytelling, and the civil‑rights activism of the 1960s, which instilled a strong sense of resilience, communal responsibility, and pride in her heritage. Living in Bryn Mawr, she
    bridges the area's historic charm with her cultural identity, actively participating in local Black cultural events such as Juneteenth celebrations and supporting initiatives that preserve African‑American
    neighborhood histories. This background informs her professional ethos, motivating her to advocate for inclusive design that honors cultural narratives and to mentor young Black professionals entering
    the STEM and drafting fields.
attributes:
