  career_goals: Fernando aspires to earn a scholarship to an art‑focused high school or community college where he can develop his visual storytelling skills. Long‑term, he aims to become a concept artist
    for video games or animation studios, with a special interest in creating culturally rich characters that reflect his Mexican heritage. He also envisions using his methodical work style to transition
    into a creative project coordinator role, ensuring collaborative teams work harmoniously. Ultimately, he hopes to publish his own graphic novel that blends sci‑fi themes with Mexican folklore.
