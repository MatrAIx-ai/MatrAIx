personas:
  professional: Fernando Hoyos is an aspiring concept artist who merges hand‑drawing, digital illustration, and beginner Python coding to prototype interactive stories, leveraging meticulous daily planning,
    bilingual communication, and a calm, collaborative mindset to coordinate small school art projects.
  sports: Fernando Hoyos enjoys low‑key physical activity, taking contemplative walks in local parks, joining occasional pick‑up soccer games with a small circle of friends, and loyally following the regional
    soccer club and the national basketball league during weekends.
  arts: Fernando Hoyos devotes hours to sketching abstract forms, creating digital paintings with Procreate, composing simple acoustic guitar melodies while listening to Hans Zimmer’s scores, and drawing
    narrative inspiration from graphic novelist Jeff Smith and the anime 'Fullmetal Alchemist.'
  travel: Fernando Hoyos favors reflective short‑haul trips, meticulously planning visits to historic towns like San Miguel de Allende and nature preserves such as the Sierra Nevada, budgeting modestly
    while dreaming of a future pilgrimage to the ancient ruins of 'Teotihuacan.'
  culinary: Fernando Hoyos loves preparing traditional dishes such as tamales and mole, mastering the complex balance of chilies and chocolate, experimenting with lavender‑infused churros, yet often rushes
    plating because they become distracted by new artistic ideas.
  core: Fernando Hoyos is an organized, imaginative teen who channels creative anxiety into journaling, blends art and code, finds refuge in guitar chords and quiet parks, yet habitually over‑commits to
    projects and sometimes neglects self‑care.
background:
  cultural: Fernando grew up in a Mexican‑American household in Pflugerville, Texas, where both Spanish and English are spoken daily. His family preserves traditions such as celebrating Día de los Muertos,
    Cinco de Mayo, and preparing regional dishes, instilling in him a deep appreciation for Mexican art, music, and folklore. The vibrant Latino community in his neighborhood provides a supportive network,
    and he frequently participates in cultural events at local community centers. This bicultural upbringing shapes his worldview, giving him a strong sense of identity and a desire to represent his heritage
    in his creative work.
