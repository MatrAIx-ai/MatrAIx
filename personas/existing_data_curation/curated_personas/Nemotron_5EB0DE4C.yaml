  hobbies: '[''Watercolor painting'', ''Wood carving'', ''Urban gardening'', ''Cooking (Mexican and Asian fusion)'', ''Reading art history'', ''Visiting museums'', ''Crossword puzzles'', ''Volunteer mentoring
    at community center'']'
  career_goals: Although retired from formal work, Devin aspires to deepen his artistic practice by learning watercolor techniques and digital photography, documenting family histories and cultural stories.
    He hopes to share his culinary knowledge by volunteering at the local community center, teaching Mexican cooking classes to younger residents. He also aims to preserve his heritage by creating a small
    home altar for Día de los Muertos and recording oral histories for future generations. Managing stress and maintaining mental well‑being through creative expression are central to his personal ambitions.
