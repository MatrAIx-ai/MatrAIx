  career_goals: Elvia aims to transition from a specialist analyst role to a strategic leadership position within the next five years, targeting roles such as Senior Solutions Architect or IT Operations
    Manager for a regional municipality or a technology consulting firm. She plans to earn certifications like AWS Solutions Architect, PMP, and Certified Information Systems Security Professional (CISSP)
    to bolster her technical credibility. Passionate about community development, she aspires to launch a mentorship program that supports aspiring tech professionals in Puerto Rico, especially women and
    underrepresented groups, and to lead digital‑transformation projects that modernize public services in Aguadilla and Isabela, integrating cloud and IoT solutions to improve local infrastructure.
