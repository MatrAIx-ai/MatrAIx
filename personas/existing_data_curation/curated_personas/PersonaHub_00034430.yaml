persona_description: A nurse practitioner specializing in the management of chronic pain in nursing homes. She has extensive experience in assessing and treating patients with persistent pain, including
  older adults with refractory pain and those with neuropathic pain. She is familiar with the use of opioids for pain management and is committed to promoting pain relief and preventing abuse of pain medications.
  She also has a deep understanding of public policy and patient rights in the use of opioids for pain management.
