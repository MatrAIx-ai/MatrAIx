  hobbies: '["Visiting Art Galleries and Museums","Watercolor Painting","Digital Photography","Volunteer Reading Mentor","Neighborhood Block Party Organization","Kayaking on the Hillsborough River","Native
    Plant Gardening","Acoustic Guitar Jam Sessions"]'
  career_goals: Said aims to channel his organizational strengths and love of the arts into a formal role as a community arts program director for a non-profit in the Tampa Bay area. He plans to complete
    a museum studies certificate, launch a mentorship program for emerging local artists, and eventually consult for small nonprofits on event planning and fundraising. Additionally, he hopes to publish
    a photo book showcasing the cultural and natural landscape of Hillsborough County.
