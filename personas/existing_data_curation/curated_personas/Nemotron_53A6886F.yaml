personas:
  professional: Said Yonts, an aspiring community arts program director, leverages two decades of volunteer leadership, meticulous project planning, budget oversight, and curatorial insight to design inclusive
    exhibitions and mentorship initiatives, turning their organized, empathetic nature into smoothly executed cultural events across Tampa Bay.
  sports: Said Yonts leads a weekend kayaking crew under the banner of the Hillsborough River Kayak Club, cheers for the Tampa Bay Buccaneers and Tampa Bay Lightning, and stays fit by partaking in community
    softball leagues and occasional sunrise runs along the Bayshore Boulevard Trail.
  arts: Said Yonts paints watercolor coastlines inspired by Winslow Homer, captures wildlife with a Nikon D5600 in the style of Ansel Adams, and brings acoustic guitar jams to life playing John Mayer classics
    while volunteering to curate rotating shows at the Hyde Park Gallery.
  travel: Said Yonts prefers curated weekend getaways that blend history and nature, having explored St. Augustine’s historic district, the Everglades by airboat, and a culinary tour of New Orleans, while
    they dream of photographing the lantern‑lit streets of Kyoto during cherry blossom season.
  culinary: Said Yonts enjoys cooking with fresh garden herbs, often preparing grilled grouper with lime butter, key‑lime pie, and shrimp‑and‑grits, reflecting a strong comfort with coastal flavors and
    a competent, albeit occasionally experimental, skillet technique.
  core: Said Yonts balances a meticulous, community‑centric mindset with a spontaneous love for art, water, and music, often juggling event spreadsheets while humming a guitar riff.
background:
  cultural: Said is a White American whose family has lived in central Florida for several generations. He was raised in a middle-class environment steeped in Southern hospitality and the relaxed, outdoor-oriented
    lifestyle of the Tampa Bay region. His upbringing included regular participation in church activities, community festivals, and local volunteer initiatives, fostering a strong sense of civic duty and
    appreciation for both traditional and emerging cultural expressions prevalent in modern Florida.
attributes:
  skills: '["Project Planning and Coordination","Budget Management","Community Event Organization","Volunteer Leadership","Art Curation and Exhibit Design","Digital Photography","Graphic Layout (Adobe Photoshop/Illustrator)","Home
