persona_description: A heritage archaeologist who is responsible for the management and preservation of archaeological resources on TRCA lands, working closely with modern descendant communities to ensure
  a positive relationship with communities whose interests may be impacted by TRCA projects. The archaeologist has extensive experience in the field, having developed an Archaeological Master Plan and formulated
  Engagement Guidelines to obtain guidance on stewardship and management decisions within the archaeological assessment process and other TRCA land management processes. The archaeologist is knowledgeable
  in the unique riverine association of TRCA lands and has a passion for preserving the heritage value of the archaeological resources on the TRCA lands.
