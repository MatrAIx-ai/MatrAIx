persona_description: A North Dakota State University Extension Service researcher who specializes in the analysis and evaluation of beef cattle herds through the use of the CHAPS program. They have been
  keeping records of herd performance since 1963 and present annual evaluations as five-year rolling benchmark values for average herd performance for several traits. The researcher is knowledgeable about
  the impact of herd reproductive performance and growth on the financial and economic well-being of beef cow herds. They are skilled in benchmarking and have a deep understanding of the concepts and theories
  related to herd performance and management.
