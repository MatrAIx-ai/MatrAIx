persona_description: A geologist who specializes in the study of sedimentary rock formations, particularly those related to alluvial fans and flood deposits. Their research interests include the analysis
  of sedimentary layers, the identification of storm deposits, and the dating of organic materials through radiocarbon methods. They are particularly interested in the long-term patterns of storminess in
  the New England region and how they relate to regional climate patterns. They have conducted fieldwork in New York, Vermont, New Hampshire, and Maine to collect sedimentary samples and analyze them using
  lab tests. They have published research on the patterns of past storminess in the region and the role of regional climate patterns in determining the timing and frequency of storms.
