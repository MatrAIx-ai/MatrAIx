personas:
  professional: Oscar Garcia is a master‑level automotive technician with over a decade of hands‑on experience repairing everything from pickup trucks to construction machinery, leveraging bilingual communication,
    meticulous documentation, and a skeptical yet curious mindset to verify every fix, while they envision opening a boutique garage that blends high‑precision repairs with street‑art inspired customizations.
  sports: Oscar Garcia follows the Miami Heat and Miami Dolphins avidly, plays pickup basketball at local courts, runs weekly with the Everglades Trail Runners club, enjoys seasonal surfing trips to the
    Florida Keys, and they maintain a disciplined strength‑training routine at a CrossFit box.
  arts: Oscar Garcia immerses themselves in the vibrant street‑art scene of Wynwood, drawing inspiration from muralists like Banksy and local artist Jorge Ramirez, while they strum chords to songs by Juan
    Luis Guerra, Bob Marley, and the flamenco flair of Paco de Lucía, shaping their creative vehicle customizations.
  travel: Oscar Garcia prefers spontaneous weekend getaways to the Everglades or Key West, but also plans annual trips to Costa Rica’s cloud forests and Barcelona’s architecture, balancing a modest travel
    budget with a desire for cultural immersion, and they often time these adventures around family celebrations like Carnaval.
  culinary: Oscar Garcia enjoys cooking gallo pinto, nacatamales, and quesillo on lazy Saturday mornings, expertly seasoning with cilantro, achiote, and lime, while they range from novice sauté techniques
    to mastering slow‑cooked pork belly, often pairing dishes with a cold glass of cerveza artesanal.
  core: Oscar Garcia is a methodical mechanic with a competitive edge, a love for street‑art and vintage motorcycles, a habit of over‑thinking finances, occasional insomnia, and they have a weekend ritual
    of cooking family‑style meals to reconnect with heritage.
background:
  cultural: Oscar was raised in a close‑knit Nicaraguan immigrant family in Homestead, Florida. He grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties to his cultural
    heritage through music, cuisine, and community celebrations such as La Purísima and Carnaval. The values of hard work, family loyalty, and resilience—common in Nicaraguan culture—have shaped his disciplined
    approach to his trade. While fully integrated into the multicultural fabric of Miami‑Dade, Oscar still celebrates Nicaraguan traditions, participates in local Latino festivals, and regularly visits
    a nearby Nicaraguan church, preserving a sense of identity that informs both his personal life and professional ethos.
attributes:
  skills: '[''Automotive diagnostics'', ''Hydraulic system repair'', ''Pneumatic system troubleshooting'', ''Engine overhaul and rebuild'', ''Transmission repair'', ''Welding and metal fabrication'', ''Technical
    documentation and record‑keeping'', ''Bilingual customer communication (English/Spanish)'', ''EPA emissions compliance'', ''Electric/hybrid vehicle systems basics'', ''Preventive maintenance scheduling'']'
  hobbies: '[''Street photography'', ''Visiting art galleries and murals'', ''Playing guitar (Latin folk/reggae)'', ''Cooking traditional Nicaraguan cuisine'', ''Restoring classic motorcycles'', ''Reading
    automotive and technology magazines'', ''Hiking in local nature preserves'', ''Practicing yoga for stress relief'']'
  career_goals: Oscar aims to earn ASE Master Technician certification and an EPA-certified specialist designation within the next two years. He envisions opening his own boutique garage in Miami‑Dade that
    blends high‑quality repair work with artistic vehicle customizations—painting, graphic wraps, and retro‑modern restorations that reflect his appreciation for art. He also hopes to become a part‑time
    instructor at a local community college, sharing his technical knowledge with the next generation of mechanics. On a personal level, Oscar wants to achieve a steadier work‑life balance to better manage
    stress, purchase a home in Homestead, and eventually support his family in Nicaragua through regular remittances and occasional visits.
