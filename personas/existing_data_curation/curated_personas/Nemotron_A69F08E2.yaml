  hobbies: '[''Reading Caribbean and Latin American literature'', ''Watercolor painting'', ''Cooking traditional Puerto Rican cuisine'', ''Hiking and birdwatching in local nature preserves'', ''Yoga and
    long‑distance running'', ''Participating in small‑group cultural events and museum workshops'']'
  career_goals: Bermudez aims to ascend to a supervisory role, targeting the rank of Sergeant within the Alachua County Sheriff's Office to lead a specialized Community Outreach Unit that integrates her
    humanities background with practical policing. In the medium term, she seeks to become a Police Academy instructor, designing curricula that emphasize cultural sensitivity, resilience, and data‑driven
    decision‑making. Long‑term, she envisions shaping municipal safety policy as a consultant and establishing a mentorship program for at‑risk youth, particularly within Puerto Rican and broader Hispanic
    communities, leveraging her experience to foster trust and opportunity.
