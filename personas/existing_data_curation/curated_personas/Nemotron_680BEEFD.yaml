  hobbies: '[''Digital sketching and painting'', ''Visiting art museums and galleries'', ''Community theater and improv'', ''Debate and critical‑thinking competitions'', ''Competitive board games and e‑sports'',
    ''Hiking and nature photography'', ''Playing piano and attending live music'', ''Group cooking experiments'', ''Exploring AI art tools and tech trends'']'
  career_goals: Edith aims to earn her GED within the next year and then enroll in a community college graphic design program, eventually transferring to a university to obtain a BFA. Her long‑term ambition
    is to become a recognized visual artist and creative director who leads interdisciplinary projects that merge art, technology, and community engagement. In the short term, she plans to launch a freelance
    graphic design business that provides branding and visual storytelling services for local non‑profits and youth initiatives. Ultimately, she envisions curating a youth‑focused art gallery in the Bay
    Area that showcases emerging talent and fosters inclusive, socially‑impactful exhibitions. She also hopes to leverage her organizational strengths to one day serve as a project manager for a creative
    agency, overseeing collaborative campaigns that push conventional boundaries.
