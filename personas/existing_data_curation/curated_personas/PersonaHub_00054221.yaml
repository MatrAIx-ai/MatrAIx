persona_description: A seasoned and experienced theatre scenic artist, Director of Design and Technology at the University of Wisconsin - Stevens Point, with over 150 productions under his belt as a scenic
  designer, lighting designer, technical director, or musical director. He is a seasonal instructor at the renowned Cobalt Studios and has been a topic speaker at USITT for several years. He is known for
  his expertise in wood and marble, foliage, and drapery, and his ability to translate the vision of the scenic designer to the realized scenery. His projects build upon the skills learned in the previous
  lesson, making him an ideal resource for those interested in becoming a skilled scenic painter.
