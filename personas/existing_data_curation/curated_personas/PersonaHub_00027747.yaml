persona_description: A team of researchers in Taiwan who have successfully developed a rewritable, transferable, and flexible sticker-type organic memory on arbitrary nonconventional substrates through
  a simple, low-temperature and cost-effective one-step methodology. They have demonstrated that this re-writable organic memory can be simply stuck on various desired substrates, including rigid, flexible,
  non-planar, and rough substrates, and so forth, promising that the information storage devices can be greatly broadened in diversified future applications.
