  career_goals: Although approaching retirement, Timothy aims to cement a legacy of measurable cost savings and operational efficiency within his company. He seeks to spearhead a transition to digital,
    e‑procurement tools that embed sustainability criteria, positioning the organization for future resilience. He also wants to mentor the next generation of purchasing professionals, sharing his extensive
    knowledge while fostering a culture of disciplined curiosity. In the long term, he envisions consulting part‑time for local businesses, helping them streamline procurement and adopt innovative sourcing
    strategies.
