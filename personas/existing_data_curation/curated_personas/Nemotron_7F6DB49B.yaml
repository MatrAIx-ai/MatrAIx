  hobbies: '[''Watercolor Painting'', ''Reading Contemporary Art & Philosophy'', ''Jigsaw Puzzles'', ''Collecting Vintage Postcards'', ''Antique Farm Tool Restoration'', ''Vegetable Gardening'', ''Crossword
