  hobbies: '["Visiting art galleries and museums", "Attending community theater and dance workshops", "Cooking and experimenting with fusion recipes", "Gardening herbs and seasonal vegetables", "Reading
    historical fiction and genealogy research", "Playing bridge and participating in trivia nights", "Listening to Hindustani classical music", "Senior yoga and gentle exercise classes", "Watching classic
    Bollywood films"]'
  career_goals: Ravita’s primary ambition is to remain an active, engaged presence in her community while preserving and sharing her South Asian heritage. She hopes to compile and publish a memoir documenting
    her family’s immigration story, create a digital archive of photographs and oral histories, and mentor younger members of the local Indian cultural association in cooking, language, and traditions.
    She also aims to serve as a volunteer docent at the St. Louis Art Museum, lead art‑related workshops for seniors, and establish a community garden that blends Missouri vegetables with herbs used in
    South Asian cuisine. Maintaining her health, staying socially connected, and continuing to learn new skills such as digital photography are central to her aspirations.
