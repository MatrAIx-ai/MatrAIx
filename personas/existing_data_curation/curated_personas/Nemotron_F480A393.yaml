personas:
  professional: Ravita Das, an 81‑year‑old volunteer docent and senior‑center arts coordinator, blends storytelling flair with meticulous event planning while channeling a competitive edge and healthy skepticism
    to ensure community festivals run smoothly.
  sports: Ravita Das enjoys low‑impact fitness through senior yoga and weekly brisk walks in Tower Grove Park while passionately cheering the St. Louis Cardinals and following the St. Louis City SC, and
    they regularly compete in bridge tournaments that feel like a sport of the mind.
  arts: Ravita Das treasures visits to the St. Louis Art Museum and local theater productions, finds inspiration in Hindustani classical music and classic Bollywood cinema, and curates a personal collection
    of vintage posters, often debating artistic interpretations with a competitive streak.
  travel: Ravita Das plans spontaneous weekend getaways to nearby Hermann, Missouri for wine tasting and to New Orleans for jazz, while dreaming of a photo‑journalism trip to the historic streets of Oaxaca,
    balancing a love of adventure with a cautious budget and occasional anxiety about forgetting travel documents.
  culinary: Ravita Das delights in cooking spiced chickpea bharta with fresh cilantro and mint alongside Midwest corn succotash, experiments with turmeric‑infused apple crumble and garam‑masala roasted
    carrots, and, despite a tendency to over‑salt, shares these fusion dishes at senior‑center potlucks.
  core: Ravita Das is an energetic, art‑loving octogenarian who blends cultural storytelling, competitive bridge, and experimental cooking, while wrestling with worry and a penchant for occasional disorganization.
background:
  cultural: Ravita Das was born into an Indian family that immigrated to the United States in the 1960s. She grew up celebrating festivals such as Diwali, Holi, and Durga Puja, and was raised speaking Bengali
    and Hindi alongside English. Her childhood home was steeped in traditional music, dance, and cooking, instilling a deep appreciation for artistic expression. After marrying and later relocating to Festus,
    Missouri, Ravita became a cultural bridge, actively participating in the local Indian cultural association and organizing events that introduce South Asian traditions to her Midwestern neighbors. Her
    identity blends the values of family unity, hospitality, and reverence for the arts from her heritage with the openness and community spirit of her adopted hometown.
attributes:
  skills: '["Traditional South Asian cooking", "Storytelling and cultural narration", "Basic digital literacy (tablet, social media)", "Community event coordination", "Art appreciation and commentary",
