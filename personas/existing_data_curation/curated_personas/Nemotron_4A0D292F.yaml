  hobbies: '[''Watercolor sketching'', ''Visiting art galleries and museums'', ''Birdwatching'', ''Hiking in the Pine Barrens'', ''Houseplant care'', ''Reading philosophy and non-fiction'', ''Journaling'',
    ''Meditation'', ''Digital illustration'', ''Listening to classical music'']'
  career_goals: Mark aims to advance into a senior sales leadership role within the next three years, overseeing a team of representatives and shaping regional strategy for eco‑friendly manufacturing solutions.
    He also envisions eventually launching his own boutique wholesale company that specializes in sustainable art supplies and handcrafted home décor, allowing him to merge his commercial expertise with
    his passion for art. To support these ambitions, he plans to complete online certifications in sustainable business practices and project management, while cultivating a mentorship network that can
    help him navigate the transition.
