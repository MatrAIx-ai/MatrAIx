personas:
  professional: Mark Negron leverages a decade of B2B wholesale manufacturing sales expertise—mastering negotiation, Salesforce-driven demand forecasting, and client relationship stewardship—to champion
    eco‑friendly product lines, and they pair this with a curiosity for visual art and a methodical yet flexible work style that fosters empathetic leadership and innovative problem‑solving.
  sports: Mark Negron engages in low‑impact fitness through weekend hikes in the Pine Barrens, birdwatching walks along the New Jersey coastline, occasional trail runs with the local Pine Barrens Hikers
    Club, and they cheer for the New York Giants, New Jersey Devils, and Philadelphia Phillies while playing in a recreational Sunday morning soccer league.
  arts: Mark Negron immerses themselves in visual culture by solo visits to the Montclair Art Museum and local galleries during off‑peak hours, sketching watercolor impressions of works by Georgia O'Keeffe
    and Ansel Adams, experimenting with digital illustration in Procreate, curating playlists featuring Debussy, Philip Glass, and Yo‑Yo Ma to accompany creative sessions, and they find the music essential
    for focus.
  travel: Mark Negron prefers meticulously planned, solo off‑season trips that blend art inspiration and nature, having explored the autumnal Hudson River Valley, bird‑rich Scottish Highlands, the historic
    temples of Kyoto, and the seaside charm of Cape May, while they balance a modest travel budget against their long‑term goal of launching a sustainable art‑supplies boutique.
  culinary: Mark Negron favors plant‑forward cuisine, often preparing roasted beet quinoa bowls with walnuts and fresh basil from their kitchen herb garden, baking a spicy miso ramen on rainy evenings,
    and they occasionally indulge in artisanal cheese plates, reflecting a moderate cooking skill set that balances health, sustainability, and occasional comfort cravings.
  core: Mark Negron is a quiet, art‑driven sales strategist who channels a relentless curiosity and gentle anxiety into meticulously crafted sustainable solutions, all while they nurture a solitary world
    of watercolor, birdsong, and thriving houseplants.
background:
  cultural: Mark grew up in Ocean Gate, a small coastal borough in Ocean County, New Jersey, within a middle‑class, primarily Anglo‑American family that valued hard work and community ties. The town’s proximity
    to both the Atlantic shoreline and local manufacturing plants gave him a blend of maritime leisure and industrial pragmatism, shaping his appreciation for both nature and the practical aspects of trade.
    Raised in a modest, possibly Protestant household, he was encouraged to be self‑reliant, courteous, and attentive to others’ needs, a background that informs his considerate demeanor and his interest
    in regional art scenes from nearby New York and Philadelphia.
attributes:
  skills: '[''B2B sales negotiation'', ''Client relationship management'', ''Product knowledge in manufacturing'', ''CRM (Salesforce) proficiency'', ''Data analysis and forecasting (Excel)'', ''Strategic
