  career_goals: David aims to launch a boutique creative studio in Pensacola that produces immersive art installations for local businesses, public spaces, and cultural festivals. He plans to develop a
    series of community‑focused workshops that combine art, emerging technology, and abstract thinking, positioning himself as a regional thought leader in interdisciplinary creativity. Over the next five
    years, he seeks to secure regional design awards, obtain grant funding for large‑scale public projects, and publish a book on the creative process that blends philosophy, speculative fiction, and visual
    design. He also aspires to mentor emerging artists, serve on the board of a local arts nonprofit, and expand his studio’s reach to national art festivals.
