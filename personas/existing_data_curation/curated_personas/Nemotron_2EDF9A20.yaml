  career_goals: Even in retirement, Chanthone is determined to leave a lasting impact. She aims to launch a scholarship fund for Southeast Asian women pursuing business studies, to expand a mentorship network
    that pairs senior professionals with young start‑ups in Los Angeles, and to document her family's migration story in a memoir. Her ambitions also include staying physically active through regular tai
    chi, maintaining her community garden plot, and fostering intergenerational harmony within her cultural community.
