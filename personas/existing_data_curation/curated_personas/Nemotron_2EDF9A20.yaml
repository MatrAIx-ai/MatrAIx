personas:
  professional: Chanthone Fung is a retired corporate finance strategist who now channels her disciplined, detail‑oriented mindset into mentoring emerging entrepreneurs, orchestrating community fundraising
    events, and ensuring meticulous record‑keeping for nonprofit initiatives, all while leveraging her bilingual fluency to bridge gaps between senior leaders and grassroots volunteers.
  sports: Chanthone Fung stays active through morning tai chi at the senior center, leisurely walks along Santa Monica beach, and cheering for the Los Angeles Lakers while occasionally joining a local senior
    volleyball league that practices at the Santa Monica Recreation Center.
  arts: Chanthone Fung finds solace in the rhythmic strings of Yo‑Yo Ma’s cello, the vivid brushwork of Monet’s water lilies, the poignant narratives of historical fiction authors like Ken Follett, and
    regularly contributes to storytelling sessions at the Asian Pacific American Heritage Festival, where she also curates traditional folk performances.
  travel: Chanthone Fung enjoys gentle road trips to nearby coastal towns like Malibu and Laguna Beach, reminisces about her cherished pilgrimage to Kyoto’s temple gardens, dreams of strolling through the
    vineyards of Tuscany, and prefers meticulously planned itineraries that balance cultural immersion with comfortable accommodations for her age.
  culinary: Chanthone Fung delights in preparing aromatic larb with ground turkey, lime, fresh mint, and toasted rice powder, perfecting fluffy sticky rice beside coconut milk, and often experiments with
    herbs from her community garden such as cilantro, basil, and lemongrass, while occasionally indulging in an extra serving of fried spring rolls when guests linger.
  core: Chanthone Fung blends disciplined financial acumen, steadfast community service, and a love for cultural storytelling into a vibrant senior life, punctuated by daily tai chi, meticulous budgeting,
    and an occasional sweet tooth.
background:
  cultural: Chanthone was born in Vientiane, Laos, into a close‑knit family that prized hospitality, communal responsibility, and reverence for elders. Emigrating to the United States as a refugee in the
    late 1970s, she settled in California where she blended her Lao heritage with the multicultural vibrancy of Los Angeles. She maintains Lao customs—celebrating Pi Mai (Lao New Year) with ceremonial offerings,
    preparing staple foods like sticky rice, and practicing Theravada Buddhist traditions. Her bilingual fluency in Lao and English, combined with her involvement in the local Southeast Asian community,
    enables her to act as a cultural bridge, preserving her roots while fostering inclusive connections in Santa Monica.
