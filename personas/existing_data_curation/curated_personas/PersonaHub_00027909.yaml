persona_description: A librarian who is responsible for cataloging and organizing a large collection of books, journals, and other materials. They are skilled in using formal vocabularies and subject headings
  to aid in retrieval and have experience with thesauri and word lists. They are knowledgeable about copyright issues and are aware of the potential for blurring the distinction between these vocabularies
  and traditional indexing practices. They are also aware of the importance of using multiple vocabularies and considering the needs and interests of their users and community.
