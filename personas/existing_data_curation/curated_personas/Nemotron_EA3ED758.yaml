  career_goals: Although retired, Gabrielle aims to expand her impact on the local community by establishing a senior-led community garden, documenting her family's history in a published memoir, and completing
    a series of online courses on digital photography and oral history techniques. She also hopes to serve on the board of the Georgetown Senior Center, advocating for programs that support social engagement
    and health for older adults.
