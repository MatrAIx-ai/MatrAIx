personas:
  professional: Sammie Aisenberg is a 13‑year‑old robotics club leader who designs and programs competition bots, applying disciplined project‑management skills and a skeptical eye for shortcuts while dreaming
    of becoming a mechanical engineer who bridges sci‑fi concepts with real‑world applications.
  sports: Sammie Aisenberg plays on the Willow Creek Wolves youth soccer team in the spring, follows the regional high school basketball squad, and hikes the Blue Ridge Trail every summer, approaching fitness
    with a disciplined training log but a competitive urge to outperform teammates.
  arts: Sammie Aisenberg practices piano three times a week, favoring Chopin nocturnes and anime soundtracks, reads Isaac Asimov and N.K. Jemisin, and sketches technical diagrams alongside doodles of robots,
    drawing creative inspiration from musicians like Yiruma and visual artists such as H.R. Giger.
  travel: Sammie Aisenberg enjoys planning weekend nature outings to the nearby State Park, has traveled to the National Air and Space Museum in Washington, D.C., and dreams of attending the International
    Robotics Olympiad in Shanghai, balancing a love of structured itineraries with spontaneous detours to local farmer’s markets.
  culinary: Sammie Aisenberg prefers quick, protein‑rich meals like chicken‑and‑vegetable stir‑fry and homemade granola bars, experiments with sushi rolls for dinner clubs, and sharpens their cooking by
    following Jamie Oliver’s teen‑friendly recipes, while often forgetting to refrigerate leftovers due to a busy schedule.
  core: Sammie Aisenberg is a relentlessly organized, curiosity‑driven teen who competes in robotics, saves every penny, schedules health routines, and balances disciplined pursuits with occasional forgetfulness
    and a skeptical view of shortcuts.
background:
  cultural: Sammie is a white Southern teenager raised in Wedowee, Alabama, a small, close‑knit community in Randolph County. Her family emphasizes hard work, self‑reliance, and community service, rooted
    in traditional Southern Christian values. Local customs such as church gatherings, community festivals, and support for local schools shape her sense of belonging, while school programs and online resources
    expose her to technology and science. Growing up in a rural environment has given her a deep appreciation for agriculture, nature, and the practical needs of her community, informing both her hobbies
    and her ambition to apply scientific knowledge for local benefit.
