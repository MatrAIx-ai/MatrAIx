  career_goals: Sammie aims to pursue a career in biomedical engineering, with a focus on developing affordable medical devices and health‑tech solutions for rural communities like her hometown. She plans
    to maintain top academic performance throughout high school, participate in STEM competitions, secure internships or mentorships in engineering labs, and eventually earn a degree from a leading university
    engineering program. Long‑term, she hopes to lead outreach initiatives that inspire other young people in small‑town Alabama to explore science and technology careers.
