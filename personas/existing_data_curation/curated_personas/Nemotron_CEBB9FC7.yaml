  career_goals: Lydia aims to advance to a supervisory role within casino security, such as a surveillance team lead or security manager, where she can shape policies that balance rigorous safety standards
    with compassionate treatment of staff and patrons. She plans to obtain a certification in risk management and possibly pursue a master’s degree in security studies. In the short term, she wants to develop
    a training curriculum for new guards that emphasizes emotional intelligence, stress‑resilience, and community‑focused service. Long‑term, Lydia envisions a transition into a community‑outreach position
    that bridges casino security with local law‑enforcement and social services, reducing gambling‑related harm and fostering a safer environment for the broader Orange County community.
