  hobbies: '[''Yoga'', ''Mindfulness'', ''Gardening'', ''Creative Writing'', ''Volunteering at Homeless Shelter'', ''Reading Mystery Novels'', ''Karaoke'', ''Dance Classes'', ''Community Theater'', ''Cooking'',
