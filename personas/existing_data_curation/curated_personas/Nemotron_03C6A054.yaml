  career_goals: He aspires to become a senior pastor of a multi-ethnic congregation, launching a diocesan STEM outreach initiative that bridges science and faith for local youth. He plans to pursue a Master
    of Divinity followed by a doctorate in theology to deepen his scholarly impact. Over the next five years, he aims to increase his church’s community services by 30%, establish a bilingual community
    center for immigrants, and author a book on integrating scientific reasoning with Catholic spirituality. His competitive drive fuels a vision of his parish becoming a regional model for organized, data-informed
    ministry.
