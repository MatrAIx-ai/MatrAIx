personas:
  professional: Francisco Rodriguez, a bilingual pastor with a solid STEM background, they leverage data analytics, strategic budgeting, and meticulous sermon preparation to lead a congregation with structured
    yet flexible ministries, reflecting their calm resilience and competitive drive to model a data‑informed faith community.
  sports: Francisco Rodriguez, a mountain‑enthusiast who hikes the Colorado Rockies on weekends, they join a co‑ed soccer league in Denver and cheer the Denver Broncos, Colorado Avalanche, and Colorado
    Rapids, apply data‑driven training logs to improve performance, yet habitually skip post‑game stretching.
  arts: Francisco Rodriguez, an avid photographer of nature and church events, they curate a playlist of cumbia and salsa legends like Celia Cruz and Grupo Niche, hand‑craft wooden altar furnishings inspired
    by traditional designs, while occasionally binge‑watching classic cinema for artistic inspiration.
  travel: Francisco Rodriguez, an organized explorer who maps multi‑day treks through the Rockies and plans low‑cost weekend trips to national parks such as Yosemite and Grand Teton, they prioritize cultural
    festivals abroad while balancing a modest budget, yet often overpack their gear.
  culinary: Francisco Rodriguez, a home‑cook who perfects pupusas filled with cheese, pork, and beans, they prepare tamales seasoned with achiote and cilantro, source fresh corn masa from local farmers’
    markets, enjoy communal meals with friends, though they sometimes forget to fully defrost meat before cooking.
  core: Francisco Rodriguez blends data‑driven pastoral leadership with mountain hiking, soccer strategy, and handcrafted cuisine, navigating life with calm competitiveness, structured planning, and occasional
    impulse purchases.
background:
  cultural: Francisco is a first-generation Salvadoran-American raised in a bilingual household with deep Catholic roots. He celebrates Salvadoran traditions such as Semana Santa, Día de la Madre Salvadorena,
    and local diaspora festivals, incorporating familiar music, food, and communal solidarity into his ministry. His fluency in Spanish and understanding of immigrant experiences enable him to serve Aurora’s
    growing Latino community with cultural sensitivity. While honoring his heritage, he blends his STEM education with faith, fostering a dialogue that resonates with both his Salvadoran identity and his
    American context.
