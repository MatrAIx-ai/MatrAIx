  career_goals: Lourdes aims to move into a regional Director of Marketing role within the next two to three years, where she can shape multi‑market brand strategies, champion inclusion of multicultural
    perspectives, and mentor emerging talent. Looking further ahead, she envisions establishing a boutique consulting firm that helps small Southern businesses incorporate authentic cultural narratives
    into their marketing, allowing her to blend her competitive drive with a desire to give back to her community.
