personas:
  professional: Lourdes Rodriguez, a three‑decade veteran of marketing, combines meticulous campaign workflow design with community‑centric storytelling, leveraging bilingual communication and a humanities
    background to craft data‑driven yet personally resonant brand narratives, and they now aim to step into a regional Director of Marketing role where they can embed multicultural perspectives into multi‑market
    strategies while mentoring emerging talent.
  sports: Lourdes Rodriguez stays active through weekly salsa dance rehearsals, occasional tennis matches at the local club, and follows the Charleston Battery soccer team and the Carolina Panthers football
    franchise, while they also belong to a community 5K running group that meets every Saturday morning.
  arts: Lourdes Rodriguez infuses their life with artistic expression by teaching basic art and design workshops at the community center, discussing works by Octavio Paz and Carlos Fuentes in a book club
    that also dives into Jane Austen, and they regularly enjoy the vibrant sounds of Celia Cruz and Marc Anthony during dance practice, shaping their creative outlook.
  travel: Lourdes Rodriguez favors well‑planned cultural trips that blend relaxation with discovery, having explored Oaxaca’s historic markets, Barcelona’s modernist architecture, and the historic districts
    of Charleston and Savannah, they now dream of a leisurely road‑trip along the Amalfi Coast while balancing family obligations and a modest travel budget.
  culinary: Lourdes Rodriguez boasts an advanced knack for cooking, regularly hosting Mexican‑Southern fusion evenings featuring dishes like chipotle‑marinated barbecue ribs, collard greens sautéed with
    chorizo, and sweet‑potato tamales, and they delight in ingredients such as corn masa, smoked paprika, okra, and fresh cilantro while balancing bold flavors with Southern comfort.
  core: Lourdes Rodriguez epitomizes a disciplined, community‑driven marketer who blends cultural flair with meticulous organization, yet their competitive edge sometimes fuels impulsive spending on dance
    shoes and specialty ingredients.
background:
  cultural: Lourdes was born to Mexican immigrant parents who settled in Texas before she moved to South Carolina after marriage. She grew up bilingual, speaking Spanish at home and English at school, and
    her upbringing combined the values of Mexican family cohesion with the practicality of a working‑class environment. While living in Duncan, she blends traditional Mexican celebrations—such as Día de
    los Muertos and Cinco de Mayo—with Southern hospitality, often sharing home‑cooked dishes at church gatherings and community events. Her Catholic faith and strong family ties remain central, and she
    actively preserves Mexican culinary and artistic traditions through her hobbies and community involvement.
