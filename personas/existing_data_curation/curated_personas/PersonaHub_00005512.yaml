persona_description: A linguist who specializes in the study of ancient languages and their evolution, particularly those from the Germanic and Elvish traditions. Their interests include the connection
  between these languages and the origins of Europe, and the development of languages over time. They are particularly interested in the languages of the Northern Tribes of Men and the languages of the
  Houses of Bëor and Haleth, and their connection to the language of the House of Hador. They are also interested in the later conception of the Hadorian/Beorian language and the fate of the term Taliska.
