personas:
  professional: Mark Bajorek is a budding mini‑architect in the playroom, constructing elaborate block towers with methodical planning and vivid imagination, while their competitive streak fuels races to
    finish first and their calm demeanor ensures each structure is completed carefully.
  sports: Mark Bajorek attends a toddler soccer class with the Little Kickers Club, cheers loudly for the Houston Astros during family baseball outings, and loves backyard tag games, embodying their energetic,
    competitive spirit and love for group activities.
  arts: Mark Bajorek delights in drawing colorful animals inspired by Eric Carle’s picture books, sings along to folk tunes like "Hej Sokoły" during family gatherings, and watches The Wiggles and Sesame
    Street, letting their vivid imagination and love for abstract concepts flourish through music and visual art.
  travel: Mark Bajorek enjoys weekend trips to Galveston’s sandy shoreline, annual visits to San Antonio’s River Walk, and eagerly dreams of a future adventure to historic European castles, preferring family‑oriented
    itineraries that blend playful exploration with familiar comforts.
  culinary: Mark Bajorek relishes hand‑shaped pierogi filled with cheese, munches on chicken nuggets with sweet potato fries, and proudly helps stir batter for blueberry pancakes, showcasing a budding cooking
    skill level and a palate that favors comforting foods with occasional adventurous bites like sliced strawberries.
  core: Mark Bajorek is an imaginative, methodical three‑year‑old who thrives on group play, remains unusually calm under pressure, and balances a competitive edge with a love for storytelling and simple
    routines.
background:
  cultural: Mark is raised in a Polish‑American household in League City, Texas. His family honors Polish traditions such as celebrating Wigilia, sharing pierogi, and listening to folk music, while also
    fully participating in typical Texan and broader American customs—including Fourth of July fireworks, Thanksgiving feasts, and community picnics. The suburban Gulf Coast setting provides access to public
    libraries, parks, and early‑learning centers that emphasize cultural diversity and group activities, reinforcing his sociable nature. His upbringing blends the values of hard work, modesty, and family
    cohesion common in Polish culture with the warm, inclusive spirit of the Gulf Coast community.
