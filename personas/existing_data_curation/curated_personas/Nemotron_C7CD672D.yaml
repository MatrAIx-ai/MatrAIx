  career_goals: Mark often declares that he wants to be a builder or artist when he grows up. His long‑term ambition is to become an architect or visual artist who can transform his vivid imagination into
    real‑world designs. He also hopes to lead a community art or makerspace club, combining his love for storytelling, organization, and teamwork. His competitive drive and calm resilience push him toward
    participating in science fairs, design contests, and eventually a career in creative engineering where he can innovate novel products.
