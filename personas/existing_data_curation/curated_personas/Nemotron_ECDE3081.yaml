  hobbies: '[''Debate Club'', ''Volunteer Food Bank Coordination'', ''Event Hosting for Friends'', ''Game Nights'', ''Journaling'', ''Sketching'']'
  career_goals: Judith aspires to pursue a degree in communications or event management, with the long‑term goal of becoming a community outreach coordinator for a non‑profit organization in Philadelphia.
    She wants to combine her organizational talents with her love for connecting with people, aiming to design inclusive programs that foster social cohesion. In the near future, she plans to secure a scholarship,
    obtain an internship with a local civic group, and take on a leadership role in the school's student council to build a portfolio of successful events and community projects.
