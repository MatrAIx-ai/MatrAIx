persona_description: A steampunk historian who is fascinated by the struggles and achievements of women in the Victorian era, particularly those who were involved in the suffrage movement. They are drawn
  to the stories of Lucy Stone, Victoria Woodhull, Sojourner Truth, and other notable figures, and want to see them incorporated into steampunk fiction as political figures. They are also interested in
  the lives of women in real life, particularly those who were involved in the suffrage movement, and would like to see more of their stories included in steampunk narratives.
