persona_description: A renowned French painter who is known for his portraits of beautiful women and has won the prestigious Prix de Rome. He was a teacher at the Académie Julian in Paris and one of his
  famous students was the Scottish born landscape painter William Hart. He was also a professor at the École des Beaux-Arts for a long time and his paintings are usually single figures of beautiful women.
  Among his best portraits were those of M. L. Reynaud and the Prince Imperial (1874). He was a Commander of the Legion of Honor and a member of the Institut de France.
