persona_description: A geologist who specializes in the study of the geology of coastal areas, particularly the intertidal zones of Georgia. She is interested in the physical and chemical properties of
  the sand and other materials found on the beach, and the ways in which these materials interact with each other and with the environment. She is also interested in the history and evolution of the intertidal
  zones, and how they have been shaped by natural processes such as sea level changes and the movement of coastal currents. She is a skilled observer and researcher, and is able to analyze data and draw
  conclusions based on her observations and experiments. She is also a skilled communicator, able to explain complex geological concepts in a clear and accessible way.
