personas:
  professional: Lori Navas, a seasoned bank teller with over twenty years of precise cash handling and deep familiarity with Fiserv and Jack Henry systems, they leverage their structured, detail-oriented
    mindset and compassionate customer focus to mentor new hires, defuse tense situations, and champion community outreach, all while eyeing a supervisory role that blends empathetic leadership with operational
    excellence.
  sports: Lori Navas enjoys long, leisurely hikes along the trails of Hot Springs National Park, participates in the local Hot Springs Trail Walking Club, cheers on the Arkansas Razorbacks football and
    basketball teams, and they join a casual senior badminton league at the community center during the winter months.
  arts: Lori Navas expresses creativity through a church choir where they sing gospel classics by Mahalia Jackson, a quilting circle inspired by the intricate patterns of Mary F. Caldwell, and a love for
    mystery novels from Agatha Christie, often discussing story twists over tea brewed with garden-grown herbs.
  travel: Lori Navas prefers thoughtfully planned road trips that balance relaxation with exploration, such as weekend getaways to the Ozark National Forest, cultural visits to Nashville's music scene,
    and a long-standing dream of touring Kyoto's historic temples, always keeping travel costs within a modest budget and they coordinate schedules around family commitments.
  culinary: Lori Navas cherishes cooking with garden-fresh rosemary, thyme, and homegrown rose petals, often preparing herb-infused roasted chicken, fragrant rosemary focaccia, and a delicate rose-petal
    jam that they serve alongside classic Arkansas cheese biscuits, showcasing a competent yet home-centric culinary style.
  core: Lori Navas blends meticulous banking expertise with compassionate community service, nurturing a garden of native roses while they manage health worries, financial prudence, and a love for choir,
    quilting, and nature-filled walks.
background:
  cultural: Lori is a white, Southern-born Arkansan who grew up in a modest, close-knit community that values hospitality, church involvement, and self-reliance. Raised near Hot Springs, she developed an
    appreciation for the natural landscape and the historic spa culture of the area. Family traditions emphasize community service, modesty, and respect for routine, which align with her practical and structured
    personality. Lori stays connected to her heritage through participation in local church events, seasonal festivals, and support of regional causes such as the food pantry and environmental conservation
    projects.
attributes:
  skills: '["Cash handling", "Customer service", "Transaction processing", "Regulatory compliance", "Conflict resolution", "Attention to detail", "Time management", "Banking software proficiency", "Data
    entry", "Mentoring", "Community outreach coordination"]'
  hobbies: '["Gardening", "Reading mystery novels", "Walking in Hot Springs National Park", "Church choir singing", "Quilting", "Volunteering at the food pantry", "Yoga and mindfulness meditation"]'
  career_goals: Lori aims to advance into a supervisory role, such as Lead Teller or Branch Operations Manager, where she can leverage her structured approach and compassionate leadership to improve team
    performance and customer satisfaction. She plans to complete a Certified Bank Teller certification and attend leadership workshops to strengthen her managerial skills. Additionally, Lori hopes to expand
    the branch’s financial literacy programs for seniors and low-income families in Hot Springs, eventually overseeing community outreach efforts while maintaining a balanced work schedule that allows time
    for family and self-care.
