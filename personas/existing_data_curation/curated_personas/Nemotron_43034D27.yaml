  career_goals: Kevin aims to advance from his current managerial role to a senior operations director position, overseeing multiple sites across the Pacific Northwest. He plans to earn a bachelor’s degree
    in business administration to formalize his expertise and eventually launch a consulting boutique that helps midsize firms streamline workflows while embracing innovative practices. Long‑term, he seeks
    to mentor emerging managers, publish thought pieces on operational excellence, and achieve recognition as a forward‑thinking leader in his industry.
