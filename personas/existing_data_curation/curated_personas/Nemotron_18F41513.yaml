  hobbies: '[''Volunteering at community events'', ''Organizing school clubs'', ''Soccer'', ''Baking'', ''Hiking'', ''Reading fiction'', ''Photography'', ''DIY crafts'']'
  career_goals: Mary aims to obtain her GED within the next year and enroll in a community‑college nursing program to become a registered nurse serving her hometown. In parallel, she dreams of opening a
    small family‑run café that can serve as a community hub, combining her interest in hospitality, event planning, and local cuisine. She sees these paths as practical ways to help her community while
    satisfying her curiosity about healthcare and small‑business management.
