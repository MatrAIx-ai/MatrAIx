personas:
  professional: Mary Ferreira is an aspiring community‑college nursing student‑to‑be who leverages her strong organizational skills and event‑planning experience from church festivals to streamline patient
    intake processes and coordinate health‑education workshops at her local clinic.
  sports: Mary Ferreira plays forward for the co‑ed Albemarle United soccer club, follows the Carolina Hurricanes and the North Carolina Courage, hikes the Albemarle Sound trail network every weekend, and
    balances high‑energy team practices with weekly yoga sessions to maintain flexibility and prevent injuries.
  arts: Mary Ferreira captures candid moments with her DSLR, frequently shares street‑style photos on Instagram, reads contemporary fiction by Sally Rooney and Ocean Vuong, and attends local theater productions
    starring the community‑run Coastal Playhouse, while her DIY home décor projects draw inspiration from the minimalist designs of Marie Kondo and the vibrant murals of street artist Shepard Fairey.
  travel: Mary Ferreira prefers road‑trip itineraries mapped out in Google Sheets, enjoys weekend getaways to the Outer Banks and a yearly family visit to Washington, D.C., dreams of exploring Lisbon’s
    historic bakeries, and balances her wanderlust with a part‑time job that limits her to budget‑friendly hostels and camping trips.
  culinary: Mary Ferreira bakes flaky pastéis de nata and buttery Southern biscuits using high‑quality butter, cream, and cinnamon, experiments with chouriço‑infused quiches for community events, and relishes
    pairing her pastries with locally roasted coffee, while she credits her skill to years of watching her grandmother’s kitchen and mastering the art of perfect crumb texture.
  core: Mary Ferreira blends a pragmatic drive for a nursing career with a vibrant love for community‑centered baking, soccer, and photography, juggling meticulous planning with occasional late‑night study
    marathons and impulsive pastry‑shop splurges.
background:
  cultural: Mary is a second‑generation Portuguese‑American. Her grandparents emigrated from the Azores in the early 1990s and settled in Perquimans County, where they blended their island traditions with
    the local Southern culture. At home she grew up hearing Portuguese lullabies, celebrating festas, and preparing dishes like bacalhau and caldo verde, while also participating in typical Southern customs
    such as church picnics, high‑school football games, and community barbecues. This mixed heritage fosters her appreciation for family, hospitality, and community involvement.
