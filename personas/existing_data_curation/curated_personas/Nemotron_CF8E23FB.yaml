personas:
  professional: Willamenia Mann, a 17-year-old aspiring graphic designer, blends pencil sketches, watercolor washes, and digital illustration on a tablet with their curious, organized nature to produce
    community murals that celebrate local stories, while their willingness to experiment and cooperative temperament make them a dependable project coordinator for their church youth group.
  sports: Willamenia Mann enjoys casual cross-country runs with the Newton Trails Club, roots for the Boston Red Sox and Boston Celtics, and occasionally joins a community pick-up basketball game at the
    local recreation center, preferring low-impact fitness that complements their artistic routine; they also cherish the quiet moments of solo jogging through the woods as a creative recharge.
  arts: Willamenia Mann immerses themselves in a blend of gospel choirs, soulful R&B playlists featuring artists like Marvin Gaye and Alicia Keys, jazz standards from Miles Davis, and contemporary hip-hop
    beats by Kendrick Lamar to fuel their sketching sessions, while they draft poetry inspired by the works of Langston Hughes and visually reference the color palettes of Claude Monet.
  travel: Willamenia Mann dreams of sketching the historic streets of Savannah, exploring the vibrant murals of Asheville, and capturing sunrise over the Atlantic at Cape Cod, but they currently plan weekend
    trips to nearby Boston museums and the Salem witch trials historic site, balancing their limited teen budget with a yearning for Southern coastal inspiration.
  culinary: Willamenia Mann loves cooking their grandparents' collard greens and cornbread, often adding a pinch of smoked paprika or a drizzle of honey for a modern twist, while they experiment with fresh
    herbs from the community garden and occasionally bake experimental watercolor-inspired cupcakes topped with edible flower petals.
  core: Willamenia Mann is a curious, community-oriented teen who channels their artistic passions into vibrant local projects, balances disciplined saving with spontaneous art splurges, and navigates teenage
    health hurdles with a resilient, organized spirit; they also find comfort in the rhythm of gospel music during quiet evenings.
background:
  cultural: Willamenia is a Black teenager raised in Newton, a small town in Jasper County, Mississippi. Her family roots trace back to multiple generations of Southern African‑American families who have
    lived through the Great Migration and the civil‑rights era. The local church has been a central hub for worship, gospel music, storytelling, and community support, shaping her values of cooperation,
    harmony, and service. She grew up savoring soul food recipes—collard greens, fried catfish, cornbread—passed down from her grandparents, and her home is filled with the sounds of blues, gospel, and
    contemporary Black music. Family gatherings often include oral histories that inform her sense of identity and inspire her artistic vision. While the rural setting offers limited resources, the close‑knit
    community provides mentorship opportunities and cultural events such as church picnics, the county fair, and local music festivals, all of which feed her curiosity about art, new ideas, and varied experiences.
attributes:
  skills: '[''Drawing'', ''Watercolor painting'', ''Digital illustration'', ''Poetry writing'', ''Gospel singing'', ''Keyboard basics'', ''Community event planning'', ''Project coordination'', ''Social
