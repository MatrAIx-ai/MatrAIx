  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital illustration'', ''Poetry writing'', ''Listening to gospel, R&B, jazz, hip‑hop'', ''Photography'', ''Nature walks and birdwatching'', ''Volunteer
    work at church youth group'', ''Crafting (tie‑dye, friendship bracelets)'', ''Cooking traditional Southern dishes'']'
  career_goals: Willamenia aims to earn her GED within the next two years and enroll in a community college program in Graphic Design or Visual Arts. She plans to build a professional portfolio of illustrations
    and murals that celebrate African‑American Southern heritage, and hopes to secure freelance commissions for local businesses and community projects. Long‑term, she envisions opening a youth art workshop
    in Newton, where she can mentor other teens, promote cultural storytelling through art, and possibly pursue a degree in Art Education to become an art teacher or community arts program director.
