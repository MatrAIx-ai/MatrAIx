persona_description: Dr. Sharma, a seasoned science teacher with a passion for mentoring and facilitating socialization into the teaching profession for adult non-traditional learners. Her expertise lies
  in virtual mentoring, which she used during the pandemic to address the challenges faced by non-traditional students in university coursework. Dr. Sharma's approach to virtual mentoring includes providing
  space for mentees to ask questions freely, exposing them to the landscape of science teaching and learning, and encouraging deeper understanding of course themes. Her goal is to continue developing this
  virtual peer mentoring program beyond the pandemic to meet the ongoing need for responsive online teacher education courses and pedagogies that introduce non-traditional learners to the joy of science
  teaching.
