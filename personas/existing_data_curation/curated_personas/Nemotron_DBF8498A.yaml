  hobbies: '[''Community gardening'', ''Hawaiian cooking (poke, laulau)'', ''Hula dancing and ukulele music'', ''Birdwatching and native plant identification'', ''Short hiking and beach walks'', ''Landscape
    and wildlife photography'', ''Knitting and crochet'', ''Volunteering for youth STEM outreach'', ''Book club participation'', ''Senior fitness classes (water aerobics)'']'
  career_goals: Although officially retired, Casey aims to leave a lasting legacy by mentoring younger generations in STEM, expanding the local community garden, and documenting her experiences in a memoir
    that blends her engineering career with island life. She hopes to serve on the Kauai Seniors’ Advisory Council to advocate for age‑friendly infrastructure and to complete a certification in native Hawaiian
    plant restoration. Continuing her education through short courses in environmental science and staying active in volunteer leadership remain central to her aspirations.
