personas:
  professional: Casey Anido, a retired civil engineer turned community garden coordinator, leverages decades of project planning, Excel and Python data analysis, and grant writing to meticulously expand
    Kapaa’s garden while mentoring youth in STEM, embodying their love for structure and sociable leadership.
  sports: Casey Anido stays fit through water aerobics at the senior center, follows the local Kauai Hurricanes football team, and joins the island’s bird‑watching hike club that meets monthly for trail
    runs, balancing low‑impact exercise with spirited support for their hometown sports.
  arts: Casey Anido participates in senior‑center hula and ukulele circles, routinely listens to performances by Israel Kamakawiwoʻole and the Hawaiian band Kapena, and draws inspiration from local painter
    Herb Kawainui Kane while knitting scarves patterned after traditional motifs during lull moments.
  travel: Casey Anido prefers leisurely, organized trips, often joining the senior group’s escorted tours to the Napali Coast, the historic town of Hanapepe, and a recent cultural immersion in Okinawa,
    Japan, where they cherished both structured itineraries and spontaneous beach walks.
  culinary: Casey Anido delights in cooking poke with ahi tuna, laulau wrapped in ti leaves, and sweet potato poi, expertly seasoning dishes with limu seaweed and macadamia nuts, while their modest kitchen
    skills yield occasional over‑cooked rice from absent‑mindedness during garden duties.
  core: Casey Anido blends methodical engineering precision with island‑grown community spirit, juggling garden leadership, senior‑center arts, and disciplined finance, all while indulging in occasional
    culinary glitches.
background:
  cultural: Casey's cultural roots are in a white, Protestant, middle‑class American family from the Midwest, but she has called Kapaa, Kauai home for more than five decades. After moving to Hawaii following
    her engineering degree, she embraced the islands’ multicultural spirit, learning basic Hawaiian phrases, celebrating Lei Day, and participating in local environmental stewardship projects. While she
    still observes traditional American holidays, she also values 'ohana and participates in community gatherings that reflect native Hawaiian values of respect, humility, and aloha. Her long‑term involvement
    with the Kapaa garden and senior center exemplifies her blend of mainland upbringing with island community life.
