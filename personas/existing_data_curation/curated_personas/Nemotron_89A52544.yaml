  career_goals: Scottie envisions a future where he can merge his love for art and technology, aiming to become a video game designer or a digital media creator. He also dreams of creating a popular YouTube
    channel that showcases his artwork, game tutorials, and behind‑the‑scenes looks at game development. In the long term, he aspires to study graphic design or interactive media at a university, and eventually
    work in a creative studio that values innovative thinking and collaboration. He remains open to exploring related fields such as animation or immersive experience design.
