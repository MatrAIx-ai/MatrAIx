personas:
  professional: Scottie Smith is an aspiring digital artist and budding game developer who merges cartoon drawing with Scratch coding, using their curiosity for unconventional storytelling to prototype
    interactive animations for their YouTube channel, and they eagerly share each new creation with their growing audience.
  sports: Scottie Smith plays pick‑up basketball three evenings a week at the community center, follows the New York Knicks and Brooklyn Nets enthusiastically, and balances a competitive drive on the court
    with disciplined stretching and shooting drills to stay agile, and they often challenge teammates to friendly scoring contests.
  arts: Scottie Smith channels a love for indie music from bands like Tame Impala and The Strokes into rhythm‑driven animation sketches, draws inspiration from classic cartoonists such as Chuck Jones and
    contemporary street artists like Banksy, and regularly visits the Museum of Modern Art for fresh ideas, and they keep a sketchbook filled with doodles that double as storyboards for future projects.
  travel: Scottie Smith prefers short, weekend family getaways, spending visits to Manhattan's MoMA, the Met, and Williamsburg's vibrant street‑art corridors, while dreaming of a future road trip to San
    Francisco's Exploratorium to merge tech and art experiences, and they keep a travel journal where they scrap out postcards and ticket stubs.
  culinary: Scottie Smith enjoys a hearty slice of New York‑style pizza topped with mozzarella and pepperoni, experiments with homemade ramen broth flavored with miso and soy sauce, and occasionally concocts
    a cereal‑milkshake dessert, though they often skip washing dishes after late‑night snack sessions, and they sometimes swap recipes with friends on their YouTube channel.
  core: Scottie Smith is a curious 13‑year‑old who fuses cartoon art with coding, trades basketball victories for sketchbook scribbles, can’t resist a midnight cereal‑milkshake, constantly double‑checks
    their YouTube analytics for feedback, and they proudly post weekly tutorials despite occasional procrastination.
background:
  cultural: Scottie comes from a white, middle‑class family with Irish‑German roots living in the diverse borough of Manhattan. Growing up in New York City, he has been exposed to a rich tapestry of cultures,
    languages, and artistic expressions, which fuels his curiosity and appreciation for varied experiences. His family celebrates traditional American holidays while also introducing elements of their European
    heritage, such as St. Patrick’s Day traditions. The city’s vibrant art scene, street performances, and multicultural neighborhoods have shaped his outlook, encouraging open‑mindedness and a competitive
    drive to stand out in creative pursuits.
