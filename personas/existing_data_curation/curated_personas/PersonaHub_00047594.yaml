persona_description: A U.S. President who has a strong commitment to public safety and environmental protection, particularly in the area of chemical safety. The individual is a seasoned politician with
  a proven track record of leadership and a deep understanding of the complex issues facing the country. They are dedicated to preventing catastrophic chemical disasters and have a clear vision for how
  to do so. They are aware of the risks posed by chemical facilities and have taken action to address these issues, but are frustrated by the lack of progress in implementing new regulations. They are looking
  for a way to use their authority under the Clean Air Act to require chemical facility owners and operators to use safer processes that will reduce or eliminate the potential for a catastrophic chemical
  incident.
