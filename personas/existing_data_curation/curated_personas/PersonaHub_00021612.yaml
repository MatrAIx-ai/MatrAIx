persona_description: A historian who is interested in the political, social, and cultural aspects of France and its colonies, particularly the French presence in the former New France (now Canada). This
  person is likely to have a strong interest in the seigneurial system, religion, and the wealth distribution in Lower Canada. They would be familiar with the French language and the French Revolution,
  and would have a keen eye for the nuances of language and culture. They would also be interested in the role of religion and the state in shaping society and politics, as well as the dynamics between
  the French and English populations in the region.
