  hobbies: '[''gardening'', ''birdwatching'', ''reading non-fiction biographies'', ''experimental cooking'', ''solo hiking'', ''photography'', ''quiet yoga'', ''community volunteer work with small local
    charity groups'']'
  career_goals: Shayna aims to transition into a senior development leadership role, such as Director of Development, where she can shape long‑term fundraising strategy for a midsize regional nonprofit.
    She is driven to integrate innovative digital giving platforms with traditional community‑based philanthropy, expanding the donor base while preserving personal connection. Mentoring emerging fundraisers
    and fostering a collaborative culture that values both creative spontaneity and sustainable revenue growth are also central to her ambition. Ultimately, she hopes to leave a legacy of financial resilience
    for the causes she cares about most.
