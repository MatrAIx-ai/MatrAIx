  career_goals: Although retired from formal employment, Thomas aims to volunteer as a literacy coach at the Burlington community center and to develop a series of senior arts workshops that blend painting,
    storytelling, and digital media. He hopes to author a collection of short stories that capture Southern life and to mentor aspiring teachers through informal tutoring. A long‑term ambition is to help
    establish a locally run art gallery that showcases regional artists and encourages intergenerational collaboration. He also plans to complete a certificate in adult education to deepen his ability to
    design lifelong‑learning programs.
