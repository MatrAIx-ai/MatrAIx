  hobbies: '[''Visiting Art Galleries'', ''Live Theater'', ''Photography'', ''Acoustic Guitar'', ''Hiking'', ''Casual Basketball'', ''Cooking'', ''Hosting Dinner Parties'', ''Meditation'', ''Yoga'', ''Reading
    Business & Self‑Help Books'', ''Listening to HR Podcasts'']'
  career_goals: In the next two to three years Bradford aims to step into an HR Business Partner role where he can influence strategic workforce planning and shape a culture that values both efficiency
    and creativity. He plans to earn SHRM‑SCP certification and enroll in an MBA program with a focus on Human Capital Management. Long‑term, his ambition is to become an HR Director or Chief People Officer,
    leading initiatives that integrate arts‑based interventions and mental‑wellness programs to reduce workplace stress and foster innovative thinking. He is motivated to mentor junior HR staff and champion
    policies that promote employee well‑being, reflecting his own sensitivity to stress and desire for harmonious work environments.
