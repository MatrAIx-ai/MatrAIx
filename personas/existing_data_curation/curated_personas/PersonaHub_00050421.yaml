persona_description: A scientist who specializes in the study of avian behavior, particularly in the context of predator detection and mobbing. Their research interests include the vocalizations and behavior
  of Carolina chickadees, and how they use different types of calls to communicate with each other and respond to threats. They have published several studies on the use of D notes in chickadee calls, and
  their findings suggest that these notes can serve as a signal for mobbing, bringing flockmates to a particular location to drive a predator away.
