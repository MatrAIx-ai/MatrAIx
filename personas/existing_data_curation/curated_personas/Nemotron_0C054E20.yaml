personas:
  professional: Anthony Borroto, a 50‑year‑old manufacturing veteran with two decades of hands‑on Lean production expertise and bilingual shop‑floor fluency, balances a practical knack for equipment maintenance
    with a restless curiosity for safety improvements, and is currently channeling his cooperative spirit and occasional disorganization into a push for a supervisory role and CSP certification.
  sports: Anthony Borroto, a spirited member of his neighborhood soccer league, cheers passionately for Ecuador’s national team and keeps tabs on the MLS side Seattle Sounders while also fitting in weekend
    pick‑up games at the local park, using the sport as both social glue and stress outlet.
  arts: Anthony Borroto, an avid salsa‑and‑merengue dancer and regular attendee of live Latin music nights featuring artists like Celia Cruz, Carlos Vives, and Marc Anthony, weaves his love for rhythm into
    his evenings and finds cultural depth in historical Andean novels by Eduardo Gómez Papas.
  travel: Anthony Borroto, who has already explored Quito’s historic center, the Galápagos archipelago, and Buenos Aires’s tango halls, now dreams of trekking to Machu Picchu and sampling street food in
    Mexico City while balancing his travel ambitions with the modest budget required for his eventual food‑truck startup.
  culinary: Anthony Borroto, a competent home chef whose culinary repertoire includes tangy lemon‑lime ceviche with fresh cilantro, golden‑fried empanadas stuffed with spiced beef, and slow‑roasted hornado
    glazed with achiote, often channels his energetic spirit into volunteering as a cook at local Latinx festivals while occasionally juggling the occasional over‑salting habit.
  core: Anthony Borroto is a sociable, curiosity‑driven 50‑year‑old who balances a hands‑on manufacturing career with a love for Latin rhythms, community cooking, and a habit of juggling plans and stress
    in equal measure.
background:
  cultural: Anthony is a first‑generation American of Ecuadorian descent. Raised in a bilingual household, he grew up speaking Spanish at home while navigating English‑dominant schools and workplaces. His
    upbringing is rooted in Catholic traditions, familial solidarity, and the vibrant customs of his parents’ homeland—celebrating Carnaval, honoring Día de la Independencia, and sharing dishes like ceviche
    and fanesca. Living in Chicago's diverse neighborhoods, he blends Ecuadorian cultural pride with the multicultural rhythms of the city, actively participating in Latinx community organizations, supporting
    immigrant rights initiatives, and maintaining strong ties with the Ecuadorian diaspora.
