  career_goals: Anthony aims to transition from a production line role to a supervisory or safety‑training position within the next three years. He plans to complete a Certified Safety Professional (CSP)
    or OSHA 30‑hour certification to formalize his safety knowledge, and to enroll in a short‑term leadership course to strengthen his organizational skills. Long‑term, he hopes to leverage his love of
    Ecuadorian cuisine and community ties by opening a modest food‑truck serving traditional dishes, providing a flexible income source that respects his need for a lower‑stress work environment.
