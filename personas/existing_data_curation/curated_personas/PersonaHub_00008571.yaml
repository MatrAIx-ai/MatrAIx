persona_description: A Native American elder who has lived on the reservation in Oklahoma where his ancestors were relocated and is deeply connected to the land and its spiritual significance. He/she is
  a member of the Ihanktonwan Dakota/Nakota tribe and has extensive knowledge of the sacredness of the land and the route of the proposed pipeline. The elder has been a vocal opponent of the pipeline and
  is passionate about protecting the land and its cultural and spiritual values. He/she is a member of the Cowboy and Indian Alliance and is part of the group that calls itself the Cowboy and Indian Alliance.
