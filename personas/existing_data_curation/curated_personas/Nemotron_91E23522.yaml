  hobbies: '[''Surfing'', ''Snorkeling'', ''Hiking on the Koʻolau Range'', ''LEGO building'', ''Scratch programming'', ''Reading science fiction'', ''Playing basketball'', ''Beach clean‑up volunteering'',
    ''Playing ukulele'', ''Mindful breathing exercises'']'
  career_goals: David aspires to a future where he can protect Hawaii's marine environment, dreaming of becoming a marine biologist or an environmental engineer focused on reef conservation. He also hopes
    to blend his curiosity for technology with his desire to help others by creating educational games that teach science concepts to his peers. In the near term, he aims to earn a badge in marine conservation,
    join his middle school robotics club, attend a summer STEM camp, and continue leading local beach clean‑up projects, building a foundation for his long‑term ambitions.
