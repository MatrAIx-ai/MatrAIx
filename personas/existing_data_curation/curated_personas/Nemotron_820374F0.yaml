personas:
  professional: John Concepcion, a 38‑year‑old police officer in Miami County, blends meticulous investigative techniques, data‑driven crime mapping, and community art outreach to build trust while pursuing
    a promotion to detective, channeling his disciplined organization and curiosity for unconventional problem‑solving into every case.
  sports: John Concepcion combines early‑morning jogs on the Miami County trails with membership in the local "River Run" running club, follows the Cleveland Browns and Ohio State Buckeyes with fervor,
    supports the Dayton Dragons in the minor league, and joins a weekend fishing crew on the Great Miami River for quiet reflection.
  arts: John Concepcion fuels his creative spark by sketching downtown street scenes, curating collections of Ansel Adams prints, attending Dayton Opera productions starring Frances McDormand, and drawing
    inspiration from Edward Hopper’s Midwestern realism and Banksy’s street‑level provocations.
  travel: John Concepcion favors well‑planned road trips to Midwestern county fairs and historic towns like Madison, Wisconsin, while dreaming of a summer art‑focused tour of Florence, Italy and a culinary
    pilgrimage to New Orleans, always balancing limited vacation time with a modest travel budget that prioritizes cultural immersion over luxury.
  culinary: John Concepcion enjoys experimenting in a modest kitchen, whipping up homemade gnocchi with fresh sage, grilling river trout seasoned with rosemary and lemon, and crafting espresso‑driven brunches
    featuring avocado toast, while regularly patronizing farm‑to‑table eateries that showcase locally sourced heirloom tomatoes and artisanal cheese.
  core: John Concepcion is a disciplined police investigator who secretly hoards vintage camera lenses, refuses to start the day without a strong cup of coffee, and occasionally forgets to turn off the
    garage lights, embodying a blend of methodical duty and artistic curiosity.
background:
  cultural: John was raised in Troy, Ohio, a predominantly white, working‑class Midwestern community where values such as hard work, civic duty, and neighborly support are deeply ingrained. His family,
    originally of Italian descent, maintained a modest Catholic upbringing that emphasized respect for tradition while encouraging curiosity and education. Growing up in the Midwest exposed him to local
    customs like county fairs, high‑school football culture, and a strong sense of community solidarity. These influences, combined with his later exposure to diverse artistic scenes in nearby larger cities,
    have shaped a cultural identity that blends Midwestern pragmatism with an appreciation for multicultural art and community engagement.
