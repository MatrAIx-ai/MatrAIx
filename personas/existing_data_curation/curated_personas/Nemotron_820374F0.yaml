    with new recipes'']'
  career_goals: John aims to advance to a supervisory role such as Sergeant or Detective within the Miami County Police Department, focusing on homicide or major crimes investigations. He is passionate
    about integrating data‑driven methods and community‑based art programs into policing to improve public trust and reduce recidivism. Long‑term, he aspires to become a Police Chief or a regional law‑enforcement
    strategist, where he can shape policy, champion mental‑health training for officers, and develop partnerships with local cultural institutions.
