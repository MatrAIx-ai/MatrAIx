  career_goals: Edward plans to enroll in a local community college to study hospitality management or public relations, aiming to secure a role as a community event coordinator or front‑of‑house manager
    at a hotel or restaurant. In the longer term, he aspires to launch his own event‑planning business focused on culturally‑rich celebrations and festivals in Dallas, providing both financial stability
    for his family and opportunities to support his community.
