personas:
  professional: Anthony Cole is a high‑school senior who has already mastered basic automotive maintenance, carpentry, and team coordination, and intends to enroll in a technical college for automotive
    technology, applying his strategic gaming mindset and cooperative communication style to excel in hands‑on learning while planning to eventually launch a local repair shop.
  sports: Anthony Cole cheers for the Tennessee Titans and the Nashville Predators, plays pickup basketball on weekends, fishes at local streams, hikes the Appalachian foothills, and belongs to a neighborhood
    fishing club that meets each spring, while keeping a casual routine of bodyweight exercises to stay fit despite occasional procrastination.
  arts: Anthony Cole strums an acoustic guitar, learning classics like Sweet Home Alabama, Take It Easy, and a few country ballads from Dolly Parton, often performing at small community gatherings, and
    spends evenings streaming live concerts by Lynyrd Skynyrd, Neil Young, and the modern folk duo The Avett Brothers, which fuels his creative outlet.
  travel: Anthony Cole favors road‑trip adventures with friends, having driven the Blue Ridge Parkway and visited the Great Smoky Mountains, and dreams of a summer backpacking trip to Yellowstone and a
    future weekend in Asheville’s arts district, balancing his love for nature with the practical need to stay within his modest travel budget.
  culinary: Anthony Cole enjoys cooking the trout he catches with lemon‑herb butter, whips up a hearty southern‑style chili with beans and smoked paprika, bakes cornbread from scratch, yet often resorts
    to pizza delivery when school projects pile up, reflecting his mix of budding culinary skill and occasional laziness.
  core: Anthony Cole blends a hands‑on, community‑focused mindset with a gamer’s strategic flair, juggling a love for cars, guitars, and the outdoors while battling occasional disorganization, anxiety,
    and a penchant for impulsive sneaker buys.
background:
  cultural: Anthony grew up in Cleveland, Tennessee, a small‑town community in Bradley County with strong Southern roots. His family is part of a Protestant tradition, often attending a local Church of
    God congregation that emphasizes fellowship, modesty, and service. The town’s culture revolves around high school sports, county fairs, and church gatherings, fostering a sense of close‑knit community
    and hospitality. Family meals feature Southern staples such as fried chicken, barbecue, and homemade biscuits, reinforcing his connection to regional culinary traditions. He was raised with values of
    hard work, respect for elders, and a pragmatic outlook common in rural Appalachia. While he embraces modern influences—like video gaming and online media—he also maintains an appreciation for the slower‑paced,
    community‑oriented lifestyle that defines his hometown.
attributes:
  skills: '[''Basic automotive maintenance'', ''Carpentry and DIY projects'', ''Effective verbal communication and mediation'', ''Team collaboration in school sports'', ''Basic computer proficiency (Microsoft
    Office, internet research)'', ''Strategic decision‑making from video gaming'', ''Organizing community volunteer events'']'
  hobbies: '[''Playing video games (NBA 2K, Call of Duty)'', ''Fishing at local lakes and streams'', ''Playing acoustic guitar'', ''Hiking in the Appalachian foothills'', ''Attending high school football
    games'', ''Participating in community clean‑up events'', ''Building model kits (airplanes, cars)'', ''Listening to country and classic rock music'']'
  career_goals: Anthony aims to secure a stable, hands‑on career that balances predictability with the flexibility he values. He plans to enroll in a technical college to earn certification in automotive
    technology or HVAC servicing, fields that offer clear pathways and reliable income. After graduation, he hopes to work for a reputable local service shop, gaining experience while contributing to his
    community’s needs. Long‑term, he envisions starting his own small repair business, allowing him to set his own schedule and maintain a harmonious work‑life balance. He also sees the possibility of joining
    the U.S. Army Reserve as a way to gain additional structure and benefits, while still pursuing his trade. Financial independence and the ability to support his family are central motivations behind
    his career aspirations.
