  career_goals: Although only five, George frequently talks about his future dreams. He imagines becoming an astronaut to explore new ideas and space, a teacher because he loves sharing knowledge and helping
    friends learn, and a community storyteller who uses his talkative nature to bring people together. He also picture‑books himself as a soccer coach, combining his love of the sport with leading a team.
    These aspirations reflect his curiosity, desire to help others, and enjoyment of being the center of attention.
