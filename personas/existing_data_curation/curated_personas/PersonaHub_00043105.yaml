persona_description: A cardiologist who specializes in the field of regenerative medicine, particularly in the use of gene therapy to treat heart disease. She has a background in molecular biology and is
  interested in the mechanisms by which stem cells and other cells respond to SCF and how they can be harnessed to improve cardiac function and reduce the progression of heart failure. She is looking for
  new and innovative ways to deliver SCF to the heart after a heart attack and is interested in the potential of recruiting c-Kit+ cells to the damaged heart to improve clinical outcomes.
