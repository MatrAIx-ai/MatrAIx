personas:
  professional: Logan Bush is an early-career civil engineer who blends his AutoCAD and Civil 3D expertise with a painter’s eye, delivering sustainable infrastructure designs that double as public art,
    while leveraging they outgoing communication style to rally multidisciplinary teams and champion community-focused projects.
  sports: Logan Bush plays forward on a local adult basketball league, champions the Dallas Mavericks and the Dallas Cowboys during game nights, and hikes with the Hill Country Trekking Club, often training
    on Saturday mornings while still fitting in occasional pickup football games at the county fairgrounds.
  arts: Logan Bush spends weekend afternoons watercolor-painting the Texas Hill Country, curates a personal collection of landscape photography inspired by Ansel Adams, attends live shows by local folk-rocker
    Cody Jinks, and reads sci-fi epics by N. K. Jemisin, soaking in creative energy that fuels they design work.
  travel: Logan Bush favors spontaneous road trips in their trusty pickup, has road-tripped through New Mexico’s White Sands for sunrise hikes, explored Austin’s music scene during SXSW, dreams of strolling
    the streets of Barcelona for Gaudí inspiration, yet they stay within a budget that balances family reunions in neighboring Texas towns.
  culinary: Logan Bush loves slow-cooked Texas brisket seasoned with smoked paprika and garlic, enjoys crafting fresh guacamole with ripe avocados and jalapeños, experiments with sous-vide chicken thighs
    on weekends, and often pairs meals with craft beers from local breweries while occasionally burning toast in a rush.
  core: Logan Bush is a 22-year-old civil engineer who fuses artistic vision with sustainable design, balances disciplined saving with creative splurges, manages minor health quirks through tech, stays
    active in basketball and hiking, indulges in watercolor and live folk-rock, road-trips for inspiration, and cooks hearty barbecue with a dash of culinary experimentation.
background:
  cultural: Logan was raised in Godley, a small town in Johnson County, Texas, within a predominantly Anglo‑American community. His upbringing reflects traditional Texan values such as independence, neighborliness,
    and a strong sense of community. He grew up attending local high school football games, county fairs, and Sunday gatherings at a Methodist church, which fostered his appreciation for communal events
    and regional traditions. The region’s blend of rural heritage and growing suburban development has shaped his interest in sustainable, community‑focused civil engineering projects. Family meals often
    feature Texas barbecue, and he maintains ties to his extended family through regular reunions that emphasize storytelling and shared cultural heritage.
