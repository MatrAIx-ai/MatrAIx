  career_goals: Logan aims to obtain his Professional Engineer (PE) license within the next three years, progress to lead structural and civil projects that integrate artistic elements, specialize in sustainable
    urban infrastructure, and ultimately become a project manager or founding partner of a firm that designs signature public spaces. He also plans to complete a bachelor's degree in civil engineering and
    possibly a master's focusing on smart‑city technologies, while balancing his responsibilities as a husband.
