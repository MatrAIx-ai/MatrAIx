persona_description: A climate scientist who specializes in the study of Arctic climate change and the potential impacts of human-induced warming on the Arctic. This person is knowledgeable about the potential
  consequences of a warming Arctic, including the melting of the Greenland Ice Sheet and the potential rise in sea level. This person is concerned about the potential for rapid ice melt and consequent rapid
  sea level rise and is working to raise awareness of the potential for climate change to lead to a new climate that will destroy parts of our current landscape. This person is fighting to stop the human
  activities that would lead to such a future climate and is choosing to be smart today instead of all-wet tomorrow.
