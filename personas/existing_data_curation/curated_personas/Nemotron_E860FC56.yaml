personas:
  professional: Phuong Jackson is a meticulous project coordinator who leverages bilingual fluency, data‑driven market research, and dynamic public speaking to design and execute community outreach campaigns,
    and they are positioning themselves for a future role as a nonprofit program manager serving immigrant families in Texas.
  sports: Phuong Jackson fuels their energetic drive with thrice‑weekly Zumba and bootcamp sessions, joins a community soccer league on Saturdays, follows the Houston Astros during baseball season, and
    they use weekend hikes along the Sabine River as a restorative training ground.
  arts: Phuong Jackson captures sunrise over marshlands inspired by Ansel Adams, they immerse themselves in live performances by Stevie Ray Vaughan tributes at local venues, and they lead the karaoke crowd
    with renditions of ‘Bohemian Rhapsody’ and ‘I Will Survive’, blending visual and musical arts into their social calendar.
  travel: Phuong Jackson prefers road‑trip adventures that blend nature hikes in the Texas Hill Country with culinary festivals in New Orleans and Austin, while budgeting for a future solo voyage to Tokyo
    to explore their family’s culinary roots, and they plan each itinerary with a spreadsheet to balance costs and experiences.
  culinary: Phuong Jackson excels at crafting aromatic phở broth seasoned with star anise, ginger, and kaffir lime, perfecting bánh mì sandwiches with pickled daikon and cilantro, while also mastering Texas‑style
    smoked brisket rubbed with hickory and brown sugar, and they often share these fusion feasts at community potlucks.
  core: Phuong Jackson balances razor‑sharp project planning with a love for smoky barbecues and spontaneous karaoke, channeling their competitive spark into community impact while occasionally juggling
    too many side projects at once, and they rely on coffee to power through marathon schedules.
background:
  cultural: Phuong is a second‑generation Vietnamese‑American raised in Port Arthur, Texas. Her parents arrived in the United States after the Vietnam War, bringing traditions such as Tet celebrations,
    family‑style cooking, and the Vietnamese language, which she continues to practice at home. Growing up in the Gulf Coast, she absorbed Southern hospitality, love for seafood, and community festivals,
    blending these influences into a unique bicultural identity. She remains actively involved in the local Vietnamese diaspora, participating in cultural events, intergenerational mentorship programs,
    and community advocacy, while also embracing the broader Texan culture through local cuisine, music, and outdoor activities.
