  hobbies: '["Cooking Vietnamese cuisine", "Exploring Texan barbecue fusion", "Volunteering at community center events", "Attending live music concerts", "Group fitness classes (Zumba, bootcamp)", "Hiking
    local nature trails", "Photography", "Language exchange (English/Vietnamese)", "Karaoke nights"]'
  career_goals: Phuong aspires to transition into a community program manager role within a nonprofit organization that serves Southeast Asian immigrants in Texas, leveraging her organizational talents
    and cultural insight to design impactful services. Over the next two years she intends to complete a Bachelor’s degree in Business Administration and obtain a Project Management Professional (PMP) certification.
    She also plans to launch a small side business offering Vietnamese catering and cultural workshops, aiming to build a reputation as a trusted culinary entrepreneur. Long‑term, Phuong envisions becoming
    a regional leader who secures funding, partners with local institutions, and creates sustainable programs that empower immigrant families while preserving cultural heritage.
