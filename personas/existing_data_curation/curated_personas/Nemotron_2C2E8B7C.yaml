  career_goals: Although still young, Teresa expresses a strong desire to explore and create. She dreams of becoming an astronaut who can travel to space and discover new worlds, or an artist who can bring
    her imaginative stories to life through paintings and comics. She is also fascinated by science and hopes to be a scientist who invents new gadgets and solves mysteries, aiming to win recognition for
    her innovative ideas. These ambitions reflect her curiosity for novelty, competitive drive, and love of abstract concepts.
