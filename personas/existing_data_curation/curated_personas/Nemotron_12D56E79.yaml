personas:
  professional: Ibette Ladrondeguevara is an aspiring administrative coordinator who applies her Excel budgeting prowess, bilingual communication, and meticulous time‑management to streamline office workflows
    while confidently navigating the demands of a nonprofit operations environment.
  sports: Ibette Ladrondeguevara enjoys solo desert trail hikes near Phoenix, follows the Phoenix Suns and Arizona Diamondbacks, and participates in a local weekend recreational soccer league to stay fit
    and socially engaged.
  arts: Ibette Ladrondeguevara spends evenings devouring contemporary novels by authors like Haruki Murakami and Margaret Atwood, attends the Phoenix Theatre’s monthly productions, and collects limited‑edition
    prints by modern muralists, letting literature and visual art fuel her creative side.
  travel: Ibette Ladrondeguevara prefers budget‑friendly road trips, having explored the Grand Canyon and Sedona’s red rocks, while dreaming of a future backpacking adventure across the historic streets
    of Barcelona and the vibrant markets of Marrakech.
  culinary: Ibette Ladrondeguevara loves cooking family‑heritage dishes such as spiced corn‑based stews and chilies‑infused sauces, meticulously measuring ingredients like masa harina, chipotle, and cilantro,
    and often experiments by adjusting cooking times to perfect flavor balance.
  core: Ibette Ladrondeguevara blends structured efficiency with creative curiosity, channeling precise budgeting, habit‑driven health routines, and a passion for cultural flavors into a reliable yet adventurous
    young adult.
background:
  cultural: Ibette is a first‑generation Mexican‑American whose grandparents migrated from Michoacán. Growing up in Litchfield Park, Arizona, she was raised in a bilingual household where Spanish was spoken
    at home and English at school. Family gatherings are central to her life, featuring traditional celebrations such as Día de los Muertos and Cinco de Mayo, which she helps organize. She values the strong
    family ties and community-oriented ethos of Mexican culture while also embracing the diverse influences of the Southwest United States. This dual heritage informs her food preferences, language use,
    and her desire to give back to the local Latino community through volunteer work.
attributes:
  skills: '["Microsoft Office (Excel, Word, PowerPoint)", "Spanish‑English bilingual communication", "Time management and scheduling", "Basic bookkeeping and budgeting", "Research and academic writing",
