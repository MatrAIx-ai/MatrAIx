  hobbies: '["Cooking Mexican cuisine", "Hiking desert trails", "Reading contemporary fiction and non‑fiction", "Yoga and meditation", "Volunteering at community center", "Digital photography (capturing
    desert landscapes)"]'
  career_goals: Ibette aims to complete her associate degree in Business Administration within the next two years, with a focus on operations management. She envisions a career as an administrative coordinator
    or office manager where she can apply her organizational strengths and reliability. In the longer term, she hopes to step into a project management role in a nonprofit organization that serves the Mexican‑American
    community, allowing her to combine her professional ambitions with her cultural values. She also plans to obtain a certification in bookkeeping to enhance her credentials and increase job stability.
