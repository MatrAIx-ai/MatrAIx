  career_goals: She hopes to become a children’s book author and illustrator, merging her love for storytelling and visual art while inspiring other kids. She also imagines a future as a child psychologist
    or science educator, where she can blend her compassion with a desire to help others understand and manage emotions. In the short term, she plans to start a school club that encourages creative expression
    and provides a supportive space for peers dealing with anxiety.
