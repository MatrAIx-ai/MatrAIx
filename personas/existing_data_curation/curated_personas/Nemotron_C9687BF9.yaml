personas:
  professional: Kristina Lowery, an 11‑year‑old budding author‑illustrator, blends her love of fantasy novels, sketching, and Scratch game‑making to craft small story‑games, where her vivid imagination
    and compassionate nature shape characters that solve conflicts peacefully, while her balanced organization helps her meet school deadlines despite occasional day‑dreaming.
  sports: Kristina Lowery enjoys weekend nature hikes with her family, participates in the local youth soccer club called the River Runners, follows the junior basketball team of her school, and maintains
    a habit of sketching birds she spots on the trail, using these activities to balance her energetic imagination with physical movement.
  arts: Kristina Lowery spends Saturdays in a community art class learning watercolor techniques, practices the ukulele while humming tunes from artists like Taylor Swift and Disney's *Moana*, reads fantasy
    series by authors such as J.K. Rowling and C.S. Lewis, and draws inspiration from Hayao Miyazaki's animated films to create whimsical characters in her sketchbook.
  travel: Kristina Lowery prefers short family road trips to nearby national parks like Yellowstone for leaf‑collecting and bird‑watching, dreams of visiting the Harry Potter Studio Tour in London, and
    balances her curiosity with a cautious approach, always packing a journal and a sketchpad to document each new scenery.
  culinary: Kristina Lowery favors bright, colorful meals like rainbow fruit salads, homemade pizza topped with cherry tomatoes and basil, crafts DIY unicorn-shaped sugar cookies, and enjoys mixing mango
    and banana smoothies, though she sometimes skips vegetables when a story captivates her.
  core: Kristina Lowery is an imaginative 11‑year‑old who channels her boundless fantasy world into art, stories, and games, navigates anxiety with breathing and journaling, saves pennies in a pink piggy
    bank, and balances creative solitude with lively community activities.
background:
  cultural: Kristina comes from a White American family with roots in Northern European heritage, raised in Federal Way, Washington. The Pacific Northwest upbringing has fostered a connection to outdoor
    activities like hiking, biking, and exploring the coastal environment. Her community values emphasize environmental stewardship, inclusivity, and collaboration, reflecting the diverse cultural mosaic
    of King County. School experiences expose her to classmates from many backgrounds, encouraging her to incorporate multicultural perspectives into her art and storytelling while maintaining a sense of
    American middle‑class upbringing.
