persona_description: A scientist who is fascinated by the physical forces that affect cells and their potential role in cancer development. They are interested in understanding how cells sense their physical
  environment and how this sense is translated into a mechanical response pathway that can lead to the upregulation of β-catenin and the activation of cancer-promoting pathways. They are also curious about
  how cells respond to mechanical stresses and how this might be related to cancer. They have a background in physics and are interested in the intersection of physics and biology.
