  hobbies: '[''Cooking Mexican cuisine'', ''Gardening (vegetables & herbs)'', ''Classical guitar'', ''Reading historical fiction'', ''Hiking in Texas Hill Country'', ''Attending Tejano music festivals'',
    ''Volunteering (adult Spanish literacy)'', ''Collecting vintage vinyl records'', ''Watching classic Mexican cinema'', ''Playing chess'']'
  career_goals: Romel aims to become department chair within the next five years, using that platform to launch an interdisciplinary program focused on Mexican diaspora studies and transnational cultural
    exchange. He seeks a major NEH or Mellon grant to fund a research project on 20th‑century Mexican narrative forms, and plans to publish a scholarly monograph on the subject. Additionally, Romel is committed
    to mentoring junior faculty, expanding online course offerings for adult learners, and strengthening partnerships with local cultural organizations to enhance student engagement and community impact.
