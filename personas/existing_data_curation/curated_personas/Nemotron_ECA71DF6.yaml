personas:
  professional: Romel Ramos, a seasoned postsecondary humanities professor, balances curiosity with practicality by weaving community traditions like altar celebrations into Latin American literature courses,
    while their competitive drive fuels relentless grant pursuits, mentorship of junior faculty, and a cautious skepticism that ensures rigorous scholarly standards.
  sports: Romel Ramos, an avid hiker who tackles the Texas Hill Country trails each weekend and joins a senior walking group at the community center, also follows the Houston Astros, loyally roots for the
    Houston Texans on Sundays, and catches occasional Houston Rockets games, while their competitive streak surfaces in friendly pick‑up soccer matches at the local park.
  arts: Romel Ramos, a devoted classical guitar enthusiast who often practices pieces by Andrés Segovia, curates a vintage vinyl collection featuring Violeta Parra and Selena, immerses in classic cinema
    from his heritage, and revisits literary masterpieces by Gabriel García Márquez, allowing these artistic encounters to enrich both his personal leisure and academic teaching.
  travel: Romel Ramos, whose travel style blends meticulous planning with spontaneous detours, spends his limited vacation weeks exploring Hill Country vineyards, historic colonial towns that host vibrant
    Day of the Dead festivals, and a cultural pilgrimage to Andalusia's flamenco plazas, all while balancing family commitments and a modest travel budget.
  culinary: Romel Ramos, an accomplished home cook, regularly prepares festive pozole, chiles en nogada, and hand‑rolled tamales using masa, dried ancho chilies, tomatillos, and fresh cilantro, delighting
    his family with authentic flavors while occasionally over‑simmering sauces or forgetting to refrigerate leftover salsas.
  core: Romel Ramos, a 53‑year‑old scholar‑practitioner, balances a competitive drive for academic excellence with a love of quiet guitar evenings, a tendency to over‑plan budgets yet splurge on vintage
    records, and a lingering worry that fuels both meticulous work and occasional stress‑induced sleeplessness.
background:
  cultural: Romel was raised in a Mexican‑American household in Houston, Texas, where Spanish was spoken at home and Mexican cultural traditions—such as Día de los Muertos, family gatherings around the
    altar, and Catholic celebrations—were integral to his upbringing. He maintains strong ties to his extended family and participates in local community events hosted by Mexican cultural centers. Romel’s
    bicultural identity informs his teaching philosophy, allowing him to incorporate Mexican perspectives into humanities curricula while fostering an inclusive environment for students of diverse backgrounds.
    His heritage also influences his culinary interests, music preferences, and commitment to community service within the Hispanic community of Houston.
attributes:
  skills: '[''Curriculum Development'', ''Bilingual (Spanish/English) Instruction'', ''Latin American Literary Analysis'', ''Research Design and Grant Writing'', ''Academic Advising'', ''Workshop Facilitation'',
