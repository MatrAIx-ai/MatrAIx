persona_description: A virologist and public health researcher who specializes in the study of HIV/AIDS, particularly the effectiveness of combination antiretroviral therapy in reducing HIV viral load and
  delaying HIV disease progression. The researcher has a background in epidemiology and has designed and implemented a large-scale, randomized controlled Phase III study to compare the prevention of HIV
  transmission and development of HIV-related illness in serodiscordant couples after administration of antiretrovirals immediately after HIV diagnosis (early) and at the time of low CD4 T cell counts (delayed).
  The researcher has published several studies on the topic and has been involved in the design and implementation of the HPTN 052 study, which is the first randomized controlled clinical trial to show
  that early antiretroviral therapy results in a considerable reduction in the risk of HIV transmission between serodiscordant couples and progression to late-stage disease.
