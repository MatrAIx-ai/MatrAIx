persona_description: A World Jewish Congress representative who played a crucial role in alerting the international community about the Nazi Holocaust, sending a telegram to British and American diplomats
  in 1942 with alarming information about a coordinated extermination plan. Despite initial disbelief and skepticism, the telegram was eventually confirmed and played a significant role in the creation
  of the War Refugee Board and efforts to save Jews during World War II.
