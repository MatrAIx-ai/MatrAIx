  career_goals: Catalino is aiming to leverage his supervisory experience into an area‑manager role within the next two years, positioning himself for a smooth transition into retirement. He envisions opening
    a small boutique‑gallery after retirement, where he can combine his retail know‑how with his passion for local artists. He also hopes to serve as a mentor and occasional consultant for visual merchandising
    projects, helping younger managers adopt his creative, customer‑centric approach. Securing a comfortable financial cushion to travel to major art events and cultural festivals is another long‑term ambition.
