  hobbies: '[''Woodworking'', ''Classic Car Restoration'', ''Historical Reading'', ''Garden Tending'', ''Fishing'', ''Poker Nights'', ''Church Volunteer Work'', ''Digital Photography'', ''Memoir Writing'']'
  career_goals: Although retired from full‑time work, Michael aims to stay active by mentoring younger community members in practical trades, volunteering at the local food pantry, and completing a small
    home‑renovation project that will improve accessibility for his aging spouse. He also plans to document his life experiences in a memoir and pursue a short course on digital photography to capture his
    family’s milestones.
