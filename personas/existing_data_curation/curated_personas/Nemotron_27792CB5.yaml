personas:
  professional: Michael Just, a retired facilities maintenance supervisor, leverages decades of HVAC, electrical, and plumbing expertise to mentor apprentices, manage budgeting and work‑order schedules,
    and apply meticulous record‑keeping, all while embodying the structured, reliable, and practical approach that defines his work ethic.
  sports: Michael Just stays active through low‑impact activities like fishing trips with the Lakeside Anglers club and weekend walks in the community park, while cheering on the Metro County Clippers baseball
    team and keeping an eye on the regional semi‑pro bowling league, preferring a leisurely pace over high‑intensity workouts.
  arts: Michael Just finds solace in the mellow twang of Johnny Cash, the timeless brushstrokes of Winslow Homer, and the vintage allure of classic car shows, often replaying Frank Sinatra's crooning while
    sanding a wooden table, and he occasionally attends local community theater productions of Shakespeare's plays.
  travel: Michael Just prefers meticulously planned road trips to historic sites like Gettysburg and New England's colonial towns, balancing a love for quiet cabin getaways in the Smoky Mountains with occasional
    dreams of a leisurely guided tour of the English countryside, all while keeping travel expenses within his modest retirement budget.
  culinary: Michael Just, a competent home cook, delights in preparing garden‑fresh ratatouille with heirloom tomatoes, basil, and zucchini, alongside a slow‑cooked brisket seasoned with smoked paprika
    and garlic, and he often pairs meals with a glass of dry Riesling.
  core: Michael Just blends steadfast, hands‑on practicality with a solitary love for historical narratives, channeling his meticulous nature into woodworking, classic car restoration, and a weekly poker
    ritual, while occasionally hoarding spare parts he never uses.
background:
  cultural: Michael grew up in the Midwestern heartland of Ohio, raised in a white, primarily Protestant family with German and Irish ancestry. The community’s emphasis on modesty, self‑reliance, and neighborly
    cooperation shaped his values, fostering a strong work ethic, respect for tradition, and a commitment to local service. These cultural roots, combined with the small‑town environment of Plain City,
    influence his preference for close‑knit relationships, practical problem‑solving, and a steady, predictable lifestyle.
attributes:
  skills: '[''Facility Maintenance'', ''HVAC Systems'', ''Electrical Troubleshooting'', ''Plumbing Repairs'', ''Budget Management'', ''Work Order Scheduling'', ''Team Supervision'', ''Record Keeping'',
