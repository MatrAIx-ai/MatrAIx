  career_goals: Aaron aims to earn his Certified Public Accountant (CPA) license within the next two years and progress to a senior auditor role. He envisions moving into audit management, leading a small
    team where he can foster a supportive and harmonious work environment. Balancing his sensitivity to stress, he seeks a position that offers a predictable schedule and opportunities for professional
    development without excessive overtime. Long‑term, he dreams of launching a boutique accounting firm that emphasizes personalized service and employee well‑being.
