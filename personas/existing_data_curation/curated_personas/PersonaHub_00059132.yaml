persona_description: A healthcare professional who is knowledgeable in the field of antimicrobial therapy and infection management. They are familiar with the decision-making process for choosing appropriate
  antimicrobial agents and the importance of accurate clinical diagnosis, obtaining proper microbiologic samples, and continuously reevaluating and tailoring antimicrobial therapy based on clinical responses
  and microbiologic data. They have experience with the rapid evolution of antimicrobial discovery and development in the mid-20th century and the significant contribution of antimicrobials to the quality
  of life of many people. They are skilled in interpreting clinical and microbiologic data, making decisions based on evidence, and managing infections in a healthcare setting.
