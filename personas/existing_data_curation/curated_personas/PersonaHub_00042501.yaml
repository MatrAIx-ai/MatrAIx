persona_description: A computer scientist and bioinformatician who specializes in developing AI and pattern recognition techniques for protein modeling and structure prediction. He has over 8 years of experience
  collaborating with researchers in the Computer Science Department and the Department of Biochemistry and Biophysics at Texas A&M, where he developed TEXTAL, an automated system for protein model-building.
  He is an Associate Professor in the Department of Computer Science at Texas A&M and has received his BS, MS, and PhD degrees in Computer Science from the University of Illinois. His research interests
  include Artificial Intelligence, Bioinformatics, and the development of automated systems for protein modeling and structure prediction.
