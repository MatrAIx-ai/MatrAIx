    podcasts'']'
  career_goals: Looking ahead, Lisa aims to move from a stocker role into a supervisory position within the next two years, overseeing a team of order fill‑ers and managing shift schedules. She plans to
    earn a CPIM certification and complete her associate’s degree in Business Administration online. Her longer‑term ambition is to become an inventory control analyst or warehouse manager at a regional
    distribution center, where she can apply her curiosity for new technologies and competitive drive to lead efficiency projects and mentor junior staff.
