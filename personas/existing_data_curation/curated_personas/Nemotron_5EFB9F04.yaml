  career_goals: Robert aims to transition from frontline housekeeping to a supervisory role where he can mentor junior staff and oversee quality standards. He is also exploring the possibility of launching
    his own eco‑friendly cleaning service that caters to small‑business owners and homeowners who value sustainable practices. To support this ambition, he plans to enroll in evening classes on small‑business
    management and interior design, hoping to combine his love of art with a professional service that enhances both the cleanliness and aesthetic appeal of living spaces. Ultimately, he seeks a more stable
    schedule that reduces stress and allows more time for personal growth.
