persona_description: A public health expert who is passionate about addressing public health concerns through the design and restoration of the built environment. They believe that the built environment
  has the potential to address many of the nation's current public health challenges, including obesity, cardiovascular disease, diabetes, asthma, depression, violence, and social inequities. They are interested
  in developing policies that incentivize "smart buildings" and "smart communities" and disincentivize plans and construction that threaten the nation's well-being and survival. They are a strong advocate
  for creating buildings and communities that use less resources and much less fossil fuels, offering a rich engagement in life, meaningful work, local healthy food, and plenty of "incidental" physical
  activity. They are a dedicated individual who is committed to finding solutions that solve problems across many challenges and is willing to work from the bottom up and from the top down.
