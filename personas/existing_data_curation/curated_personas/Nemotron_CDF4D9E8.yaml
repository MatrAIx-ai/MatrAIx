  hobbies: '[''Pickleball'', ''Community basketball'', ''Car restoration'', ''Motorsport watching'', ''Fishing'', ''Cooking Korean cuisine'', ''Volunteering at community center'', ''Karaoke'', ''Sacramento
    Raiders football fandom'']'
  career_goals: Sung Ha aims to move from a front‑line driver role into a supervisory position within the next three years, targeting roles such as Lead Driver, Safety Coordinator, or Fleet Dispatcher.
    He plans to obtain a Certified Transportation Safety Professional (CTSP) credential and a Safe Driving Certification to qualify for these responsibilities. Ultimately, he hopes to launch a small regional
    trucking business that offers predictable schedules, higher earnings for drivers, and a structured, low‑stress environment for his family, aligning with his desire for stability and reduced workplace
    anxiety.
