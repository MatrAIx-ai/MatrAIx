personas:
  professional: Sung Ha is a veteran long‑haul truck driver with a Class A CDL, whose meticulous route planning, defensive driving expertise, and methodical log‑book documentation reinforce a competitive
    drive to uphold a spotless safety record, and they actively mentor new drivers and lead safety briefings.
  sports: Sung Ha is an avid participant in the Elk Grove Pickleball Club and a regular on the community basketball league, they also follow the Sacramento Raiders football team and cheer for the Sacramento
    Kings, and they incorporate weekend fishing trips at nearby lakes as a low‑impact way to stay active.
  arts: Sung Ha enjoys karaoke nights where they belt out classics by Beyoncé and Queen, they attend local theater productions of Shakespeare plays, and they collect vintage automotive posters by artists
    like Peter Max, finding inspiration for both their driving career and car restoration projects.
  travel: Sung Ha prefers meticulously planned road trips that blend scenic drives with family‑friendly stops, they have recently explored Lake Tahoe and Napa Valley, they dream of cruising New Zealand’s
    South Island coastal highway, while budget constraints keep international travel occasional.
  culinary: Sung Ha is a competent home chef who skillfully prepares bulgogi, kimchi jjigae, and tteokbokki, they love adding gochujang and sesame oil to recipes, and they frequently host barbecue evenings
    featuring marinated pork ribs and grilled vegetables for family and friends.
  core: Sung Ha is a methodical, socially energetic 47‑year‑old who balances a high‑stress driving career with group sports, car restoration, and family rituals, and they often wrestle with worry‑driven
    insomnia.
background:
  cultural: Sung Ha is a second‑generation Korean American. He grew up in a bilingual household that emphasized Confucian values of discipline, respect for authority, and dedication to family. He celebrates
    cultural holidays such as Lunar New Year and Chuseok, maintains strong ties with the local Korean community, and regularly attends a Korean church in Sacramento County. While fully integrated into American
    society, he preserves traditional customs through language, cuisine, and participation in cultural festivals, blending his East Asian heritage with the multicultural environment of Elk Grove.
