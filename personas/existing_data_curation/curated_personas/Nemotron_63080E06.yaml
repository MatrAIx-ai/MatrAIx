  career_goals: Clara wants to turn her practical experience into a stable career. In the short term, she plans to enroll in a community-college associate program in early childhood education, aiming for
    a preschool teaching credential. She views this path as a way to combine her caring nature with a structured work environment. Long-term, she hopes to open a modest home-based daycare that also serves
    homemade snacks inspired by her Italian-Southern heritage. Additionally, she dreams of turning her love for crocheting and preserving into a small online shop, providing a supplemental income that offers
    flexibility when family demands shift.
