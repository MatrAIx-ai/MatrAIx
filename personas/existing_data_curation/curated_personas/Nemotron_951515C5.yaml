  hobbies: '[''Pickup basketball'', ''Community volunteering (food drives, neighborhood clean‑ups)'', ''Fishing trips'', ''DIY woodworking and car restoration'', ''Listening to country and classic rock
    music'', ''Attending local live music events'', ''Karaoke nights'', ''Online multiplayer gaming'']'
  career_goals: Robert aims to secure stable employment in a skilled trade, leveraging his hands‑on experience. In the next two years, he plans to obtain a GED and enroll in a vocational training program
    for automotive mechanics or HVAC, hoping to become an apprentice. He also hopes to eventually launch his own handyman service, offering affordable home repairs to neighbors in Oklahoma City. Alongside
    professional goals, he seeks to develop better stress‑management habits, such as regular physical activity and participation in supportive social groups, to reduce his tendency toward worry and improve
    overall mental wellbeing.
