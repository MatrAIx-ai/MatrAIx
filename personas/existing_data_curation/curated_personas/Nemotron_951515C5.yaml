personas:
  professional: Robert Carter is an aspiring handyman and automotive enthusiast, and they leverage their hands‑on DIY expertise, knack for organizing community projects, and sociable energy to secure a
    future apprenticeship in automotive mechanics or HVAC while building a reputation for reliable, personable service in Oklahoma City.
  sports: Robert Carter enjoys playing in local pickup basketball games, cheering for the Oklahoma City Thunder, and spending weekends fishing at Lake Thunderbird, and they are an active member of the Oklahoma
    City Community Fishing Club, balancing casual competition with a love for the outdoors.
  arts: Robert Carter immerses themselves in classic rock and country, regularly attending live shows by Bruce Springsteen covers at the Blue Door Theatre, belting out Garth Brooks at karaoke nights, and
    they collect vintage vinyl, which fuels their DIY aesthetic and adds a soundtrack to their weekend car restorations.
  travel: Robert Carter prefers road‑trip adventures that blend fishing, camping, and music festivals, having recently driven to the Ozark National Forest for weekend fly‑fishing and planning a future trip
    to Austin, Texas for the South by Southwest festival, and they budget travel expenses through careful fuel savings and shared lodging with friends.
  culinary: Robert Carter favors hearty Midwestern comfort food, often grilling catfish seasoned with paprika and lemon, cooking smoked brisket with a dry rub of brown sugar and chili powder, and they enjoy
    swapping recipes for robust chili at local potlucks, while their cooking skill remains modest, relying on simple, flavorful ingredients.
  core: Robert Carter is a sociable DIY enthusiast who balances a practical knack for fixing things with a restless worry that drives both diligent planning and occasional impulsive splurges on tools, music,
    and fishing trips, and they often find themselves juggling optimism and anxiety.
background:
  cultural: Robert grew up in a working‑class family in Oklahoma City, immersed in a Mid‑American cultural mix that blends Southern hospitality, country music, and a strong sense of community. The region’s
    emphasis on self‑reliance, modesty, and neighborly support shaped his values. Local traditions such as high school football games, county fairs, and church gatherings have been central to his social
    life. While his ethnic background is White, his identity is closely tied to the 'Okie' ethos of perseverance, hard work, and cooperative community spirit.
attributes:
  skills: '[''Basic home repair (plumbing, drywall, furniture assembly)'', ''Automotive maintenance (oil changes, tire rotations, minor troubleshooting)'', ''Community event organization'', ''Interpersonal
