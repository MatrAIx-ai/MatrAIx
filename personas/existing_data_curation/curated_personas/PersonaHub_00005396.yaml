persona_description: A geneticist and anthropologist who specializes in the study of ancient populations, particularly those from the Canary Islands. They are particularly interested in the genetic and
  linguistic history of the islands, and have conducted research on the presence of ancient Iberian and Atlantic European genes in the populations of the islands. They have also studied the ancient scripts
  of the Canary Islands, and have found evidence of an abundance of Iberian language scripts in the islands. They are likely to be interested in the historical and cultural aspects of the Canary Islands,
  and are likely to have a strong background in genetic and linguistic research.
