personas:
  professional: Paul Preston is a budding digital artist and hobbyist programmer who merges hand-drawn sketches with code to create animated short loops, channeling his curious, open-minded mindset and
    organized work habits into art club projects and robotics competitions.
  sports: Paul Preston spends weekend afternoons kayaking with the Ouachita River Youth Club, shoots hoops during lunch at school, follows the Arkansas Razorbacks football team with fervor, and participates
    in sprint training with the track club, balancing solo nature outings with team-oriented activities.
  arts: Paul Preston fills sketchbooks with noir-style drawings while listening to Arcade Fire, Miles Davis, and local Louisiana blues guitarist Lightnin' Slim on his guitar, devours sci-fi novels by Neal
    Stephenson, and dissects experimental films by David Lynch and Terrence Malick, embodying his curiosity and unconventional taste.
  travel: Paul Preston seeks adventurous yet budget-friendly trips, planning weekend drives to Austin for the South by Southwest festival, day trips to New Orleans for live blues and beignets, and occasional
    hikes in the Ouachita National Forest, balancing a love for photography with family-approved itineraries.
  culinary: Paul Preston enjoys a mix of comfort and experimental cooking, frequently whipping up creamy pasta carbonara with pancetta, mastering spiced gumbo with okra and Andouille sausage, and crafting
    avocado toast topped with smoked salmon and a drizzle of hot honey, while scouting fresh Cajun spices at local farmer’s markets.
  core: Paul Preston blends art, code, and river adventures into a curious, organized teen who often stays up all night perfecting digital animations, sometimes at the expense of sleep and homework.
background:
  cultural: Paul grew up in West Monroe, Louisiana, a small city in Ouachita Parish with a blend of Southern hospitality, tight-knit community values, and a rich cultural tapestry that includes Cajun and
    Creole influences. His family traditions involve church gatherings, Friday night high-school football games, and regional cuisine like gumbo, jambalaya, and barbecue. He has been exposed to local festivals
    such as the West Monroe Art & Heritage Festival and nearby Mardi Gras celebrations, fostering an appreciation for both traditional Southern arts and the evolving creative scene.
attributes:
  skills: '[''Hand drawing and sketching'', ''Digital illustration (Procreate, Photoshop)'', ''Basic graphic design'', ''Introductory Python programming'', ''Creative coding with Scratch'', ''Simple game
    prototyping'', ''Video editing (iMovie)'', ''Basic photography'', ''Acoustic guitar basics'', ''Time management and project organization'']'
  hobbies: '[''Sketching'', ''Digital illustration'', ''Creative coding'', ''Acoustic guitar playing'', ''Reading sci-fi/fantasy'', ''Experimental film watching'', ''Nature photography'', ''Hiking and exploring
    Ouachita River'', ''Art club participation'', ''Robotics club activities'']'
  career_goals: He aims to pursue a career that merges his love for art and technology, such as game design, interactive media, or animation. In the next few years, he wants to refine his digital illustration
    and programming skills, create a portfolio of short animated clips and indie games, and attend a specialized high-school program in visual arts or technology. Ultimately, he envisions studying graphic
    design or multimedia arts at a college, working as a concept artist or UI/UX designer for games or digital experiences, and traveling to major art museums and gaming conventions to broaden his perspective.
