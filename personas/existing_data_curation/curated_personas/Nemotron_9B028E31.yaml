  hobbies: '[''Street Art Photography'', ''Recreational Soccer'', ''Competitive Video Gaming'', ''Spontaneous Road Trips'', ''Hiking'', ''Salsa Dancing'', ''Volunteering at Cultural Festivals'', ''Cooking
    Mexican Cuisine'', ''Live Music Attendance'', ''Collecting Vintage Vinyl Records'']'
  career_goals: Antonio aims to advance from his current clerk role to an inventory analyst position, then to a logistics coordinator, eventually becoming a supply chain manager at a regional distribution
    center. He plans to complete his bachelor's degree in supply chain management and obtain the APICS CPIM certification within the next three years. Long‑term, he hopes to combine his love for art and
    logistics by launching a boutique consulting firm that assists art galleries and museums with specialized handling, shipping, and storage of artwork.
