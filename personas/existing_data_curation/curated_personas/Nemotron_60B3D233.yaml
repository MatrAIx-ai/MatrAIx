    ''Stargazing'', ''Technical drawing'', ''Robotics club participation'']'
  career_goals: Clara aspires to a career that blends her love of structure, independent work, and scientific inquiry. She hopes to become a marine data scientist, using coding and statistical analysis
    to study and protect the Chesapeake Bay’s ecosystem. To achieve this, she aims to excel in mathematics and science, win school science‑fair competitions, earn a place in a high‑school STEM academy,
    and eventually pursue a university degree in computer science or environmental engineering. Her long‑term ambition is to develop reliable software tools that help researchers monitor ocean health.
