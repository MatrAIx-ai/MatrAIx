persona_description: A professor of Chemistry and Environmental Sciences who is experimenting with a new solar cell technology derived from polymers that could potentially power houses, cars, laptops, and
  other consumer electronics. He is a pioneer in this field and has published several journal papers and co-authored books on the subject. His research is in the scientific stage and involves developing
  organic solar cells from polymers, which can be inexpensively printed or painted on exterior building walls or roofs. He is also involved in research on carbon nanotubes and buckyballs, which are used
  to create snake-like structures that trap electrons and make the electrons or current flow. He hopes to see this process become an inexpensive energy alternative for households around the world.
