personas:
  professional: An aspiring visual artist who blends sketching, mixed media, and community mentorship, Jaron Clarke channels curiosity and meticulous organization into after‑school art sessions that nurture
    younger peers while experimenting with urban landscape narratives.
  sports: A casual sports fan who prefers watching, not playing, Jaron Clarke roots for the Washington Capitals in the NHL and the Virginia Cavaliers basketball team, joins a local skateboarding club on
    weekends, and they help organize neighborhood pickup games to foster inclusion.
  arts: A devoted creative explorer, Jaron Clarke draws inspiration from the works of Keith Haring, the jazz improvisations of Miles Davis, the graphic storytelling of "Sandman", and the soulful vocals
    of Aretha Franklin, weaving these influences into sketches, keyboard practice, and poetry that capture the pulse of their community, and they often share these pieces during after‑school sessions.
  travel: A thoughtful young traveler, Jaron Clarke enjoys weekend road trips to Charlottesville’s historic downtown, annual visits to Washington, D.C.’s National Gallery of Art, and they dream of a summer
    pilgrimage to New Orleans for live jazz, all planned around school schedule and family budget.
  culinary: A budding home chef, Jaron Clarke loves whipping up peanut butter‑banana smoothies, mastering a simple ramen‑bowl with pork belly, and experimenting with homemade mac and cheese infused with
    smoked paprika, though they occasionally over‑season dishes in the quest for bold flavor.
  core: Jaron Clarke blends quiet curiosity with a compassionate drive, turning sketching sessions, savings habits, and community kindness into a uniquely balanced teen life, and they approach each day
    with calm determination.
background:
  cultural: Jaron is an African‑American teen growing up in Richmond, a city steeped in Black history from the Civil War to the Civil Rights Movement. He lives in Chesterfield County, where his family maintains
    strong ties to the local church and community center. His upbringing includes regular visits to the Virginia Museum of History & Culture and the African American Cultural Center, where he learns about
    the contributions of Black Virginians. Family traditions feature Sunday gatherings with extended relatives, cooking soul‑food dishes such as collard greens, sweet potatoes, and fried chicken, and listening
    to gospel, R&B, and hip‑hop. He is aware of the legacy of the Richmond slave trade, the Freedom Trail, and local stories of resilience that shape his sense of identity and his responsibility to uplift
    his community.
