    keyboard"]'
  career_goals: He intends to complete his GED and enroll in a community college program that blends graphic design and counseling. Jaron aspires to become a community arts coordinator or youth mentor,
    using visual storytelling to engage and empower other teenagers. He hopes to design and lead workshops that combine art therapy techniques with cultural history, creating murals and digital projects
    that celebrate Black heritage in Richmond. Long‑term, he envisions founding a nonprofit that provides free art‑based mental health resources for underserved neighborhoods, and possibly pursuing a bachelor’s
    degree in visual communications or social work to deepen his impact.
