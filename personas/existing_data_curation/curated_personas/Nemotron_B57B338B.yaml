  career_goals: His primary ambition is to transition toward a senior advisory role where he can mentor the next generation of production planners while integrating his passion for the arts into the workplace.
    He aims to design and implement a company‑wide continuous‑improvement curriculum that incorporates creative problem‑solving techniques drawn from artistic thinking. Over the next few years he hopes
    to complete a Six Sigma Black Belt certification, publish a reflective essay series on the intersection of manufacturing efficiency and artistic creativity, and ultimately secure a comfortable retirement
    that allows him to volunteer as a docent at local museums and lead community art workshops.
