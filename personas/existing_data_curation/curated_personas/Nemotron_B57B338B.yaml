personas:
  professional: Jay Dunn is a seasoned manufacturing operations leader who leverages three decades of SAP and Oracle NetSuite expertise to streamline supply‑chain workflows while infusing creative problem‑solving
    drawn from his years as a watercolor painter and museum docent, and he now seeks a senior advisory role that mentors planners through Kaizen‑inspired curricula blended with artistic thinking.
  sports: Jay Dunn enjoys low‑impact fitness by walking the Colleyville Nature Trail three times a week, playing seasonal pickleball at the Colleyville Senior Athletic Club, and cheering on the Dallas Cowboys
    (NFL) and Dallas Mavericks (NBA) while occasionally joining a senior center bocce league during winter.
  arts: Jay Dunn immerses himself in the Dallas‑Fort Worth arts scene, regularly attending exhibitions at the Kimbell Art Museum, studying Monet and O'Keeffe’s use of light, curating watercolor landscapes
    of the Texas Hill Country, and collaborating on set design for the community theater alongside local actors who perform works by Tennessee Williams and Arthur Miller.
  travel: Jay Dunn plans trips with the same meticulous checklists he uses for production workflows, favoring weekend road trips to Hill Country vineyards, a nostalgic visit to Santa Fe’s art markets, and
    longer pilgrimages to European art capitals such as Florence and Paris, while his limited retirement budget nudges him toward off‑season travel and occasional stays at family‑owned ranches in West Texas.
  culinary: Jay Dunn prefers farm‑to‑table flavors, often cooking grilled Texas brisket seasoned with smoked paprika, cauliflower rice with fresh native rose petals, and a side of roasted sweet potatoes
    drizzled with honey, while his pantry staples include heirloom tomatoes, jalapeños, and a bottle of aged Texas whiskey he savors on quiet evenings.
  core: Jay Dunn blends rigorous manufacturing expertise with a painter’s eye, navigating life through meticulous planning, creative curiosity, emotional intensity, and a steadfast commitment to community
    art and mindful well‑being.
background:
  cultural: Jay is a second‑generation American of European descent who spent his childhood in the Midwest before relocating to the Dallas‑Fort Worth metroplex in his thirties. Raised in a middle‑class
    Protestant family, he was encouraged to pursue education and community involvement. His formal education in the humanities deepened his appreciation for Western art, literature, and philosophy, while
    living in Texas exposed him to a blend of Southern hospitality, cowboy heritage, and a growing multicultural urban environment. These experiences have shaped a cultural identity that values tradition,
    civic engagement, and a curiosity for diverse artistic expressions.
