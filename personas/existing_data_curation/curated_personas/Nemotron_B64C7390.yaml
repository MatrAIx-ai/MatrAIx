  hobbies: '[''Watercolor Painting'', ''Digital Photography'', ''Acoustic Guitar'', ''Hiking'', ''Reading Contemporary Fiction'', ''Philosophy'', ''Board Games'', ''Community Volunteering'', ''Short Film
    Making'', ''Attending Live Music Performances'']'
  career_goals: John aims to re-enter the teaching profession as a middle-school humanities teacher, where he can blend literature, history, and visual arts into a cohesive learning experience. Over the
    next five years he hopes to become a curriculum coordinator focusing on interdisciplinary and culturally responsive instruction, eventually overseeing school-wide arts integration programs. He aspires
    to develop after-school workshops that give students hands-on exposure to photography and graphic design, while also mentoring new teachers in innovative pedagogical methods. In the longer term, his
    ambition is to shape educational policy at the district level to prioritize creative learning and student well‑being, balancing his drive for impact with a commitment to personal mental‑health resilience.
