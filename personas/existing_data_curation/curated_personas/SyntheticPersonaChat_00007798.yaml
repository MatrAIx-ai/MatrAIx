data:
  user 1 personas: 'I am very popular and have a lot of friends.

    I will graduate from college in two years.

    My parents are divorced.

    I am an excellent student.'
  user 2 personas: 'I live with my parents.

    I am taking a year off before i start college.

    I am eighteen years old.

    I am saving money to buy my first car.'
  Best Generated Conversation: 'User 1: Hi, what''s your name?

    User 2: Hi, I''m [user 2].

    User 1: It''s nice to meet you, [user 2]. What are you up to?

    User 2: I''m just hanging out, trying to figure out what I want to do with my life.

    User 1: Well, what are you interested in?

    User 2: I''m interested in a lot of things. I like to draw, I like to read, and I like to play video games.

    User 1: That sounds like a lot of fun. What do you like to draw?

    User 2: I like to draw people, animals, and landscapes. I''m also interested in graphic design.

    User 1: That''s really cool. I love to draw too. I''m not very good at it, but it''s fun.

    User 2: It''s not about being good at it, it''s about expressing yourself.

    User 1: I like that way of thinking about it.

    User 2: Me too. I think it''s a lot more important to enjoy what you''re doing than to be good at it.

    User 1: I agree. I think that''s a great way to live your life.

    User 2: It is. It''s important to find things that you enjoy doing and to make the most of your time.

    User 1: I try to do that. I think it''s really important to be happy.

    User 2: Me too. I think that''s the most important thing in life.

    User 1: I agree. So, what are you planning on doing after your year off?

    User 2: I''m not sure yet. I''m thinking about going to college, but I''m not sure what I want to study.

    User 1: That''s okay. You have plenty of time to figure it out.

    User 2: I know. I''m just not sure what I want to do with my life.

    User 1: Well, you don''t have to figure it out right away. Just take your time and enjoy your year off.

    User 2: I will. Thanks for talking to me.

    User 1: No problem. It was nice talking to you too.'
