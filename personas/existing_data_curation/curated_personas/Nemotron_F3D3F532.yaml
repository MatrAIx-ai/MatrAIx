personas:
  professional: Israel Izquierdo, a two‑year‑old budding explorer of preschool learning, builds block towers with surprising precision while scattering crayons in organized bursts of color, reflecting a
    curious mind that balances structure and spontaneity, and they love sharing toys with a small circle of friends.
  sports: Israel Izquierdo, a two‑year‑old who loves energetic play, toddles enthusiastically in a community toddler soccer program, squeals with delight when the family watches the New York Yankees on
    game night, and they proudly wear a miniature Mets cap on sunny afternoons at the park.
  arts: Israel Izquierdo, an inquisitive two‑year‑old, moves joyfully to the lively rhythms of salsa and reggaeton during family gatherings, mimics the dance steps of icons like Celia Cruz and Daddy Yankee,
    and they love scribbling bright spirals on paper inspired by the music’s vibrant beats.
  travel: Israel Izquierdo, a two‑year‑old with a budding sense of adventure, has explored the sandy beaches of a family home in the Caribbean during Three Kings' Day celebrations, waddled through the bustling
    streets of New York City on a weekend trip, and they dream of someday seeing the snow‑capped peaks of Colorado.
  culinary: Israel Izquierdo, a two‑year‑old food enthusiast, giggles at the fragrant steam of arroz con gandules simmering on the stove, delights in soft banana slices and cheese‑filled pasta shells, helps
    stir the batter for pasteles with a tiny wooden spoon, and they occasionally turn away from broccoli in favor of sweet treats.
  core: Israel Izquierdo, a curious two‑year‑old who balances organized play with spontaneous creativity, loves music and sharing, and navigates daily life with calm compassion and a hint of selective picky
    eating.
background:
  cultural: Israel is raised in a Puerto Rican household in Perth Amboy, New Jersey, an area known for its vibrant Latino community. At home, Spanish is spoken alongside English, and family traditions such
    as Three Kings' Day, Nochebuena, and Puerto Rican cuisine like arroz con gandules and pasteles are celebrated. He is regularly exposed to Caribbean music genres—salsa, bomba, plena, and reggaeton—which
    nurture his early artistic appreciation. The close‑knit family environment emphasizes respect for elders, communal support, and a deep sense of cultural pride, all of which shape his identity and worldview.
