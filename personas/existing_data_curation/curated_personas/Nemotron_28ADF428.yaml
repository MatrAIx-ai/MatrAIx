  hobbies: '[''Gardening (vegetable and ornamental)'', ''Traditional cooking and recipe experimentation'', ''Nature walks along local trails and shoreline'', ''Knitting and crocheting'', ''Playing mahjong
    with seniors'', ''Reading historical fiction'', ''Watching cultural documentaries'', ''Volunteering at the senior center & community kitchen'']'
  career_goals: Although retired from formal employment, Vivian aims to deepen her role as a cultural mentor within the Port Orchard community. She aspires to lead cooking workshops that blend her heritage
    with local ingredients, volunteer regularly at the senior center to provide peer counseling, and perhaps write a small memoir of her family's immigration story. Maintaining health and independence,
    she also hopes to travel to regional festivals that celebrate Southeast Asian culture.
