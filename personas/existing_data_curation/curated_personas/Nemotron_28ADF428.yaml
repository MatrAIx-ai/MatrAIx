personas:
  professional: Vivian Ouk, a retired community organizer turned cultural mentor, leverages her lifelong cooking, event‑coordination, and bilingual communication skills to lead intergenerational cooking
    workshops that blend family culinary traditions with Pacific Northwest harvests, while they bring calm resilience and pragmatic curiosity to keep the classes relaxed yet purposeful.
  sports: Vivian Ouk stays active through daily walks along the Kitsap shoreline, low‑impact yoga at the senior center, and cheering on the Seattle Seahawks, Seattle Sounders, and Seattle Kraken, and they
    belong to the local Kitsap Walking Club that meets every Saturday morning.
  arts: Vivian Ouk nurtures her creative side by knitting scarves for friends while listening to Joni Mitchell and Yo‑Yo Ma, attending performances at the Seattle Repertory Theatre, and devouring historical
    novels by Ken Follett, a blend that fuels their appreciation for storytelling across mediums.
  travel: Vivian Ouk prefers relaxed road trips to the San Juan Islands, the cherry‑blossom celebrations in Seattle’s Washington Park Arboretum, and occasional visits to Portland’s lantern festival, planning
    loosely around community events and using coupons to keep travel costs modest, while they occasionally dream of attending an overseas cultural showcase.
  culinary: Vivian Ouk combines expert home cooking of classic phở and bánh mì with Pacific Northwest staples such as smoked salmon, kale, and native mushrooms, frequently experimenting with lemongrass‑infused
    dill broth and cedar‑planked pork, and they delight in sharing these dishes at neighborhood potlucks and upcoming workshops.
  core: Vivian Ouk bridges generations with a calm, curiosity‑driven love of gardening, cooking, and knitting, yet they routinely misplace their glasses and forget appointments, turning everyday life into
    a gently improvisational blend of tradition and spontaneity.
background:
  cultural: Vivian is the daughter of Vietnamese immigrants who arrived in the United States in the 1970s. Raised in a household where Vietnamese language, cuisine, and customs were central, she internalized
    values of family cohesion, respect for elders, and communal responsibility. While she has embraced the Pacific Northwest lifestyle, she continues to celebrate Tet, prepare phở and bánh mì, and participates
    in local Vietnamese-American community events, serving as a bridge between her heritage and her adopted home in Port Orchard.
attributes:
  skills: '[''Traditional Southeast Asian cooking'', ''Gardening (vegetables and native plants)'', ''Basic computer literacy'', ''Household budgeting and expense tracking'', ''Community event coordination'',
