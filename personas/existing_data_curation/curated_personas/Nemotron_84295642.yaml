  career_goals: Pauline aims to become a bilingual community outreach professional or a middle‑school teacher who can bridge cultural and linguistic gaps for Latino families in Houston. She wants to use
    her communication talents, love for education, and practical problem‑solving skills to design programs that empower youth, promote health awareness, and support academic success. In the longer term,
    she envisions a role in public‑health education or media where she can share Salvadoran culture and inspire other teens to pursue STEM and the arts.
