personas:
  professional: Pauline Gallego, an ambitious middle schooler passionate about digital storytelling, merges her love for sketching, short science demos, and cooking tutorials into a growing TikTok channel
    that showcases bite-sized creativity while balancing school assignments with their club commitments.
  sports: Pauline Gallego, a forward on her school's co-ed soccer team and a member of the local youth club "City Kickers", channels the energy of the US Women's National Team and the LA Galaxy while also
    dancing salsa on the weekends, balancing structured drills with spontaneous cardio sessions at the community park, and they thrive on the camaraderie of team sports.
  arts: Pauline Gallego, a karaoke enthusiast who belts out Ariana Grande and Bad Bunny hits, draws whimsical cartoons inspired by Rebecca Sugar and Matt Groening, and they curate short TikTok performances
    that blend sketches, recipe tutorials, and DIY volcano experiments, turning everyday moments into expressive mini-productions.
  travel: Pauline Gallego, after a memorable family road-trip to the Grand Canyon and a weekend cultural festival in New Orleans, dreams of exploring the vibrant markets of Oaxaca and the historic streets
    of Barcelona, preferring organized itineraries that mix adventure with opportunities to share stories on social media, yet they often ask for extra screen time to edit travel vlogs.
  culinary: Pauline Gallego, who loves helping her family hand-press pupusas filled with cheese and loroco and spicy beans, also experiments with quick-mix chocolate chip cookies and avocado toast, boasting
    a growing repertoire of simple recipes that they proudly showcase on TikTok, though they sometimes over-salt the salsa in the rush of recording.
  core: Pauline Gallego, a sociable, curiosity-driven 13-year-old who blends soccer, salsa, and TikTok creativity into a lively routine, and they habitually over-season salsa while passionately juggling
    schoolwork, friends, and a budding online persona.
background:
  cultural: Pauline grew up in a Salvadoran-American household within Houston's vibrant Hispanic community. Her parents immigrated from El Salvador and keep strong ties to their cultural roots through language,
    food, and celebrations such as Día de la Independencia (September 15) and Navidad. At home she speaks Spanish with her grandparents and learns traditional recipes like pupusas, tamales, and yuca frita.
    The family attends a local Catholic parish and participates in events at the Salvadoran cultural center, where she is exposed to folk dances like la banda and traditional music. This blend of Salvadoran
    customs and Texan influences shapes her identity, fostering pride in her heritage while encouraging a sense of belonging in a multicultural city.
