  career_goals: In the next two years, Derrick aims to earn his Project Management Professional (PMP) certification and step into a senior project manager role within a technology-driven company, ideally
    focusing on renewable energy or aerospace projects that align with his STEM background. He wants to lead larger, cross-functional teams and spearhead initiatives that incorporate innovative, data-driven
    methodologies while maintaining strong community and environmental stewardship. Long-term, Derrick envisions becoming the director of a Project Management Office (PMO) where he can shape organizational
    culture toward inclusivity and mental-wellness. Ultimately, he aspires to launch his own consulting firm that helps midsize firms adopt agile, equity-focused project practices and provides mental health
    resources for project teams.
