  hobbies: '[''Playing basketball'', ''Hiking'', ''DIY electronics (Arduino/Raspberry Pi)'', ''Cooking soul food'', ''Attending live music (jazz, R&B, hip-hop)'', ''Community youth mentorship'', ''Mindfulness
