personas:
  professional: Derrick Mcwhite is a meticulous project manager who blends advanced Agile, Lean Six Sigma expertise with a hands‑on curiosity for IoT, delivering data‑rich roadmaps for tech firms while
    championing inclusive team cultures and mental‑wellness initiatives.
  sports: Derrick Mcwhite competes in the Tucson Central Basketball Club’s local league, roots for the Arizona Wildcats and the Phoenix Suns, and spends weekends hiking Sonoran Desert trails, balancing
    team camaraderie with solo endurance challenges.
  arts: Derrick Mcwhite immerses themselves in Tucson’s live music scene, regularly attending shows by Kamasi Washington, The Roots, and Anderson .Paak, while curating a personal playlist of classic R&B
    and contemporary hip‑hop that fuels their creative problem‑solving.
  travel: Derrick Mcwhite prefers meticulously planned road trips to nearby wonders like Sedona and the Grand Canyon, yet dreams of a spontaneous cultural immersion in Kyoto’s tea houses and New Zealand’s
    South Island, balancing budget constraints with a yearning for both relaxation and adventure.
  culinary: Derrick Mcwhite enjoys cooking soulful dishes such as fried catfish, collard greens, and sweet potato pie, experiments with Tucson’s Sonoran hot dogs and chilaquiles, and often sources fresh
    jalapeños and cilantro from the local farmer’s market, showcasing a moderate but enthusiastic culinary skill set.
  core: Derrick Mcwhite, a 27‑year‑old project manager with a data‑driven mind, relentless curiosity, and a penchant for over‑planning, channels their anxiety into meticulous work, vibrant social life,
    and soulful cooking.
background:
  cultural: Derrick identifies as African American and grew up in a multigenerational household where education, storytelling, and community solidarity were emphasized. His family's roots trace back to
    the Southern United States, and traditions such as Sunday gospel gatherings, soul-food cooking, and oral histories have shaped his values. Living in Tucson, he blends this heritage with the desert's
    multicultural vibe, participating in local Black cultural festivals, supporting the Tucson Black Arts Alliance, and embracing the region's blend of Native American, Mexican, and Southwestern influences.
    His cultural identity fuels his commitment to mentorship, social equity, and fostering inclusive environments both at work and in his community.
