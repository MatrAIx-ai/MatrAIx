  career_goals: Inspired by her love of art, community, and science, Julia envisions a future where she can combine creativity with social impact. She dreams of studying visual arts or graphic design at
    the University of Puerto Rico Mayagüez, later becoming a community muralist and art‑education facilitator who uses public art to raise awareness about environmental stewardship and Puerto Rican heritage.
    She also hopes to develop interactive digital projects that teach younger children about the island’s marine ecosystems, reflecting her curiosity about the sea and her desire to give back to her neighborhood.
