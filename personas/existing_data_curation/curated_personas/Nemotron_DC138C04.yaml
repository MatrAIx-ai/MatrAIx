personas:
  professional: Julia Rivera is an aspiring digital illustrator and budding game creator who blends curiosity with disciplined organization, and they produce watercolor cliff scenes, sketchbook characters,
    and Scratch‑based interactive stories.
  sports: Julia Rivera trains with the Mayagüez Youth Soccer Club, cheers for the Indios de Mayagüez baseball team, enjoys weekend beach volleyball, and they follow the Puerto Rico women's national volleyball
    team during international competitions.
  arts: Julia Rivera’s artistic rhythm combines sketching characters inspired by Raina Telgemeier, painting watercolor landscapes echoing Claude Monet, creating digital doodles influenced by animator Rebecca
    Sugar, and they perform piano pieces by Ludwig van Beethoven while harmonizing in the school choir’s rendition of Ave Maria.
  travel: Julia Rivera prefers family‑guided trips that balance school responsibilities with adventure, having explored Old San Juan’s colorful streets, snorkeled the crystal waters of Culebra, and they
    now daydream about visiting Kyoto’s bamboo groves and the Eiffel Tower in Paris.
  culinary: Julia Rivera delights in tropical flavors, frequently enjoying fresh mango slices, preparing fish tacos with lime, cilantro, and a splash of hot sauce, and they occasionally bake chocolate‑chip
    cookies with real butter and dark chocolate chunks alongside a parent.
  core: Julia Rivera is a curious, organized 12‑year‑old who blends art, music, and technology, balancing school duties with family festivals, a love for beach explorations, and they occasionally overindulge
    in chocolate‑chip cookies.
background:
  cultural: Julia comes from a proud Puerto Rican family rooted in Mayagüez. She grows up speaking both Spanish and English, celebrating traditions such as Nochebuena, the Feria de Mayo, and local patronal
    festivals that feature bomba, plena, and salsa music. Family meals often include arroz con gandules and pasteles, and she helps her abuela prepare holiday sweets. The island’s natural beauty—its beaches,
    mangroves, and nearby mountain trails—instills in her a deep respect for the environment. Her community values hospitality, family cohesion, and collective responsibility, which shape her cooperative
    spirit and her desire to contribute to cultural and ecological preservation.
