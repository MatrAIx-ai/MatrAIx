persona_description: A historian who is interested in the study of Jewish history, particularly the chronological events leading up to the New Testament Canon. They are likely to be interested in the technical
  and historical chronology of the Jews and their ancestors from the earliest time to the close of the New Testament Canon, and the controversies surrounding the date of the Exodus. They may also be interested
  in the theories and corrections made to the biblical chronology by different scholars, and the impact of these chronologies on the interpretation of the Bible.
