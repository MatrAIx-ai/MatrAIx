  hobbies: '["Woodworking and carving", "Hiking in the Rockies", "Cooking traditional Mexican cuisine", "Small‑group soccer", "Volunteer home‑repair projects", "Listening to regional Mexican folk music",
    "Reading DIY construction magazines"]'
  career_goals: Juan aims to become a certified lead carpenter and eventually transition into a supervisory role as a foreman on larger renovation projects. He plans to earn a Construction Management certification
    to broaden his expertise and eventually launch his own boutique custom‑furniture business that blends modern design with traditional Mexican woodcraft. Stability for his family and the ability to set
    his own schedule are key motivators, so he also seeks opportunities that allow him to balance structured project timelines with flexible work arrangements.
