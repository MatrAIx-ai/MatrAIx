  career_goals: Josemanuel aims to transfer to a four‑year university to complete a bachelor's degree in Business Administration, with a focus on logistics and supply‑chain management. He aspires to secure
    an entry‑level position in a distribution center or transportation firm where his structured approach and attention to detail can drive operational efficiency. Long‑term, he hopes to become a logistics
    coordinator or manager, eventually leveraging his experience to help small businesses in his community improve their supply chains. He also envisions giving back by mentoring other young adults from
    immigrant backgrounds and supporting local economic development initiatives.
