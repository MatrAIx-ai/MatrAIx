persona_description: A historian or curator of concentration camps, particularly interested in the history and context of the Gusen Concentration Camp during World War II. They have a deep understanding
  of the camp's architectural development, the forced labor system, and the systematic mass killing of prisoners. They are knowledgeable about the camp's role in the larger context of the Holocaust and
  the efforts to commemorate and remember the victims. They are likely to be familiar with the work of the KZ Gusen Memorial Committee and have a passion for the history and legacy of the camp.
