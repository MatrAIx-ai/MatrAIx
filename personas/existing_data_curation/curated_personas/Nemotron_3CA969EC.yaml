  career_goals: His primary career ambition is to earn a ServSafe manager certification and advance to a shift supervisor or head chef role within his current facility, where he can implement more structured
    safety protocols and mentor younger workers. Over the longer term, he hopes to launch a small catering service that blends traditional Southern soul food with healthier menu options, allowing him to
    maintain a flexible schedule while providing financial security for his family.
