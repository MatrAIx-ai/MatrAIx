persona_description: A marine biologist who has dedicated her career to studying the effects of oil spills on marine ecosystems and has been involved in the development of international agreements related
  to oil spill response. She is knowledgeable about the unique challenges of responding to an oil spill in the Arctic, including the potential effects of the cold and icy environment, and has experience
  with joint exercises and the use of equipment for oil spill cleanup. She is aware of the potential issues with the Jones Act and the need for increased U.S. Coast Guard presence to respond to a spill
  in the Arctic.
