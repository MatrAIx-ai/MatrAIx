persona_description: A conservation scientist who is interested in understanding the vulnerability of plant communities to environmental stressors such as land use conversion, human population growth, and
  road effects. They are familiar with the Gap Analysis Program (GAP) and its methodology for evaluating the relative degree of threat faced by species or ecological communities. They are also aware of
  the limitations of the classification of management status and the need for more direct indicators such as future growth and current road effects to complement status in rating the potential vulnerability
  of plant communities and setting conservation priorities.
