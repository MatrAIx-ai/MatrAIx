  career_goals: Alina aims to launch a boutique sustainable fashion line that marries Mexican cultural motifs with Colorado's outdoor aesthetic, emphasizing comfort and accessibility for a diverse clientele.
    She aspires to integrate advanced textile technologies, such as biodegradable fibers and 3D‑printed components, while maintaining a predictable production schedule. Long‑term, she hopes to mentor emerging
    Latinx designers, create a community apprenticeship program, and collaborate with nonprofit organizations to provide affordable, high‑quality clothing for underserved populations.
