personas:
  professional: Alina Mercado is a sustainable fashion entrepreneur whose technical garment construction, CAD pattern development, and textile engineering expertise blend with her methodical project management
    to launch collections that marry Colorado's outdoor aesthetic with folk-inspired motifs, all while maintaining a calm, compassionate consulting style that keeps client relationships smooth despite her
    preference for solitude.
  sports: Alina Mercado enjoys solo mountain hikes on the Front Range, practices sunrise yoga in her garden, and supports the Colorado Avalanche hockey team and Denver Broncos football team, preferring
    low‑impact cardio over competitive team sports.
  arts: Alina Mercado captures Colorado’s vast landscapes with a DSLR, handcrafts silver jewelry echoing traditional folk art patterns, devours contemporary fiction by authors like Zadie Smith, and draws
    creative inspiration from Ansel Adams’ black‑and‑white photography.
  travel: Alina Mercado plans detailed weekend trips to Rocky Mountain National Park, schedules a yearly cultural immersion visit to Oaxaca to study regional cuisine, and prefers solo trekking over group
    tours, balancing adventure with a meticulous itinerary.
  culinary: Alina Mercado lovingly prepares mole poblano, tamales, and chiles en nogada using home‑grown chilies, corn, and epazote from her garden, but her tendency to multitask while managing design projects
    sometimes results in over‑cooked tortillas.
  core: Alina Mercado is a detail‑driven sustainable fashion designer who channels her solitary, compassionate nature into meticulous workflows, mindful wellness practices, and a love for mountain hikes,
    folk art, and hearty Mexican cooking.
background:
  cultural: Alina is a first‑generation Mexican American who grew up bilingual in a close‑knit family that celebrated traditional customs such as Día de los Muertos and quinceañeras. Her heritage influences
    her design palette, often incorporating vibrant colors, embroidery techniques, and symbolic motifs from Mexican folk art. Relocating to Colorado Springs introduced her to the rugged Southwest, blending
    desert hues and outdoor functionality into her collections. She values community responsibility, often participating in cultural festivals and supporting local Mexican‑American youth initiatives, while
    maintaining the structured, practical approach cultivated by her STEM background.
