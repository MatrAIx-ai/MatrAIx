persona_description: A researcher and hydrologist working for Kirklareli Ataturk Research Institute of GDRS, focusing on the development and application of synthetic unit hydrographs for watershed analysis
  and structure design. The individual is proficient in using the SCS (Soil Conservation Service) method, which requires geographical parameters for hydrograph derivation and is equipped with GIS software
  to process and analyze the data. They have experience with contour lines and other topographic features, and are skilled in overlay analysis for determining areas with similar characteristics. The persona
  is likely to be familiar with the concepts and techniques of hydrology, watershed analysis, and structural engineering, and has a strong interest in applying these principles to practical problems.
