personas:
  professional: A budding robotics enthusiast with a knack for structured problem‑solving, Anthony Couch channels their practical mindset into designing LEGO Mindstorms machines while keeping track of group
    schedules in the school band and sports teams.
  sports: An energetic middle‑school athlete, Anthony Couch splits time between the school’s soccer and basketball squads, enjoys cheering on the Washington Capitals, and practices drills with the local
    Reston FC youth soccer club on weekends.
  arts: A rhythm‑focused band percussionist, Anthony Couch draws inspiration from The Beatles’ drumming, the percussive flair of Imagine Dragons, and the storytelling magic of Harry Potter, while also dabbling
    in creating pixel art for Minecraft.
  travel: A curious explorer, Anthony Couch has trekked the Shenandoah trails, visited the Smithsonian museums in Washington, D.C., dreams of a road trip to Yellowstone National Park, and hopes to experience
    the bright lights of Tokyo’s Akihabara district.
  culinary: A budding home cook, Anthony Couch loves whipping up cheesy macaroni, crafting pepperoni pizza with fresh basil from the community garden, and experimenting with veggie stir‑fry using carrots,
    broccoli, and tofu.
  core: Anthony Couch blends a practical, structured mindset with a lively social streak, balancing robotics, sports, and music while quietly wrestling with worry and a penchant for over‑saving teen cash.
background:
  cultural: Anthony comes from a middle‑class, white family in Charlottesville, Virginia, a region that blends Southern traditions with a vibrant academic atmosphere due to the nearby University of Virginia.
    His upbringing includes typical Southern cultural elements such as celebrating holidays with extended family, attending local fairs, and enjoying regional foods like apple butter and peanuts. The community’s
    emphasis on civic engagement has encouraged his involvement in volunteer activities, while the local appreciation for outdoor activities has fostered his love for hiking and gardening.
