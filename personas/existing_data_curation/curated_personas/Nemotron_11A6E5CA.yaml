personas:
  professional: David Johnson is a seasoned sales manager who blends strategic business acumen with a deep appreciation for the arts, leveraging his humanities background and data‑driven insights to craft
    experience‑focused sales campaigns for cultural institutions while coaching a collaborative team toward ambitious targets.
  sports: David Johnson is a devoted community‑league basketball player who cheers for the Syracuse Orange during the college season, follows the NBA’s Golden State Warriors, and incorporates weekly pick‑up
    games at the Oneida recreation center into his social calendar, using the sport as both fitness outlet and networking opportunity.
  arts: David Johnson immerses himself in the local art scene, frequenting Oneida galleries to view works by emerging regional painters and internationally renowned creators like Banks and Wiley, while
    also curating pop‑up exhibitions for the Oneida Arts Festival and casually strumming acoustic guitar at after‑hours gatherings, channeling his curiosity into both appreciation and creation.
  travel: David Johnson favors culturally rich itineraries, having explored the historic streets of Boston, the museum districts of Florence, and the vibrant art quarters of Barcelona, planning trips around
    major exhibitions, often traveling with a small group of friends to blend sightseeing with collaborative brainstorming sessions for upcoming sales projects.
  culinary: David Johnson experiments in the kitchen with dishes such as Thai green curry, Spanish paella, and Japanese ramen, savoring fresh herbs like cilantro and rosemary, and while his cooking skill
    sits at an enthusiastic amateur level, he enjoys pairing his meals with craft beers and occasionally over‑indulges in rich sauces after long workweeks.
  core: David Johnson is a curiosity‑driven sales leader who balances data‑centric strategy with a love for art, spontaneous travel, and community basketball, yet sometimes forgets to stretch after games,
    leading to occasional back pain.
background:
  cultural: David is a white American who was raised in Oneida, New York, within a middle‑class family that valued education, community engagement, and cultural enrichment. He attended local public schools
    before earning a Bachelor of Arts in humanities from the State University of New York system. Growing up near the Oneida Nation reservation and the historic Erie Canal corridor gave him exposure to
    the region's indigenous heritage and industrial history, fostering a broad appreciation for diverse cultural narratives. His family traditions include attending local theater productions, supporting
    regional art fairs, and participating in volunteer initiatives, all of which have shaped his inclusive outlook and collaborative demeanor.
