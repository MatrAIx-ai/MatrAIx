    ''Networking at professional and creative meetups'']'
  career_goals: David aims to advance into senior leadership, targeting a role as Regional Director of Sales within the next three years, followed by a Vice‑President of Sales position at a national firm.
    He is passionate about integrating his love for the arts into his professional trajectory, envisioning a niche where he leads sales for cultural institutions, galleries, and creative enterprises. In
    the longer term, he aspires to launch his own consultancy that blends data‑driven sales strategies with storytelling and experiential marketing, helping brands craft authentic, art‑infused customer
    experiences. To support these ambitions, he plans to pursue an executive MBA and expand his network within both the business and arts communities of upstate New York.
