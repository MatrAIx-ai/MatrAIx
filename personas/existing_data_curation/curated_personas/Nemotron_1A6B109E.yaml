  career_goals: Jimmie aspires to become a multidisciplinary creator, aiming for roles such as concept artist for video games, independent animator, or multimedia storyteller. He envisions building an online
    portfolio that showcases his sketches, digital art, and interactive projects, possibly launching a webcomic or a niche YouTube channel that explores abstract ideas. In the long term, he hopes to study
    visual arts or interactive media at a university and eventually lead a creative studio focused on experimental, narrative-driven projects.
