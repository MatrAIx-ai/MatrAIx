personas:
  professional: Jimmie Castro is a 17‑year‑old aspiring multidisciplinary creator who fuses hand‑drawn surreal characters with Procreate and Blender, scripts interactive art pieces in Python and Arduino,
    and leverages their boundless imagination and preference for flexible, often messy workflows to develop concept art and storyboards for indie video games.
  sports: Jimmie Castro spends weekends trekking the misty coastal trails with the Marin County Hikers Club, drops by the Berkeley Skate Collective for impromptu skate sessions, and casually watches the
    San Francisco Giants, preferring low‑key, nature‑driven fitness that balances their need for creative solitude with occasional social sport, and they often feel rejuvenated after a long hike.
  arts: Jimmie Castro draws surreal inspiration from Salvador Dalí and H.R. Giger, they tune into the glitchy soundscapes of Aphex Twin and Autechre while crafting digital paintings in Procreate, and they
    regularly visit local galleries to admire emerging talent such as Bee Morgan, all woven into their contributions at Bay Area indie game meet‑ups like the Game Jam.
  travel: Jimmie Castro favors spontaneous, low‑budget weekend getaways, trekking the Redwood forests and soaking in the misty cliffs of Marin County, while dreaming of a future backpacking adventure through
    Tokyo’s Akihabara district and the otherworldly basalt formations of Iceland’s Reykjanes Peninsula, balancing a love for nature with a longing for urban creative immersion, and they often map out itineraries
    on the fly.
  culinary: Jimmie Castro keeps a modest kitchen stocked with avocado, miso paste, and matcha powder, they whip up quick ramen bowls and vegan burrito bowls for post‑hike fuel, relish the smoky crunch of
    chipotle‑seasoned kale chips, and unwind by savoring craft cold brew while experimenting with ambient sound‑paired dining playlists featuring Aphex Twin.
  core: Jimmie Castro is a 17‑year‑old dreamer who channels surreal visions into sketchbooks and Arduino prototypes, yet habitually trades sleep and tidy schedules for midnight art marathons and spontaneous
    hikes, and they often find themselves juggling creative bursts with a whirlwind of unfinished projects.
background:
  cultural: Jimmie grew up in the affluent Bay Area community of Belvedere Tiburon, surrounded by the cultural vibrancy of nearby San Francisco and the natural beauty of Marin County. His family’s roots
    trace back to European ancestry, primarily Irish and German, and his upbringing reflects the region’s progressive, environmentally-conscious values. Easy access to museums, tech workshops, and outdoor
    recreation has cultivated his appreciation for art, innovation, and a balanced lifestyle that blends creativity with nature.
