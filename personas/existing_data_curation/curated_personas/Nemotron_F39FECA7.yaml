  hobbies: '[''Paddle‑boarding'', ''Morning beach walks'', ''Indoor gardening'', ''Sketching coastal scenes'', ''Yoga'', ''Reading design and psychology literature'', ''Volunteer design consulting'', ''Small‑group
    dinner gatherings'']'
  career_goals: Celia aims to earn her NCIDQ certification within two years and specialize in environmentally sustainable interiors that promote mental well‑being. She plans to advance to a senior designer
    role at a boutique firm in San Diego County, eventually leading a multidisciplinary team focused on eco‑friendly residential projects. Long‑term, she envisions launching her own studio that offers pro‑bono
    design services for community shelters and senior centers, while also hosting workshops on mindful, harmonious living environments.
