personas:
  professional: Celia Wilson, a 22‑year‑old interior designer specializing in residential and boutique commercial spaces, leverages AutoCAD, SketchUp, Revit, and Photoshop to craft sustainable, harmonious
    environments while maintaining a client‑centered focus; they balance meticulous spatial planning with compassionate listening and are diligently pursuing NCIDQ certification.
  sports: Celia Wilson embraces low‑impact, nature‑centric fitness by sunrise paddle‑boarding, beach walks, weekly yoga sessions, and participation in a local beach‑volleyball club, while cheering on the
    San Diego Wave FC for soccer inspiration; they prioritize activities that nurture both body and mind.
  arts: Celia Wilson nurtures their creative side by sketching coastal scenes in a leather‑bound sketchbook, drawing aesthetic cues from designers like Kelly Wearstler and artists like Monet, listening
    to indie folk musicians such as Sufjan Stevens and Bon Iver, and regularly attending exhibitions at the Museum of Contemporary Art San Diego; they seamlessly weave artistic appreciation into both personal
    downtime and professional design practice.
  travel: Celia Wilson favors thoughtfully planned, eco‑conscious getaways, having explored coastal gems like Big Sur and Santa Barbara, while dreaming of sustainable design tours in Copenhagen and Iceland,
    and they usually book boutique guesthouses that provide quiet spaces for sketching and reflection.
  culinary: Celia Wilson delights in preparing simple, herb‑forward meals such as grilled lemon‑basil salmon and avocado‑mint quinoa bowls for intimate gatherings, cultivating fresh basil and thyme in their
    indoor succulent garden, but they occasionally resort to late‑night sushi takeout when a design deadline looms.
  core: Celia Wilson balances disciplined design ambition with serene sunrise paddle‑boarding, herb‑filled sketching sessions, and compassionate community work, while they keep a meticulous budget and indulge
    in occasional takeout as a stress‑relief habit.
background:
  cultural: Celia was raised in Oceanside, a laid‑back beach city in San Diego County, where the surf‑centric lifestyle intertwines with a multicultural Southern‑California vibe. Though her ethnic background
    is primarily European‑American, her upbringing absorbed the region’s emphasis on sustainability, outdoor recreation, and a blend of Anglo, Mexican, and Pacific influences. This backdrop fostered her
    appreciation for natural light, muted coastal palettes, and community‑oriented design, shaping both her professional aesthetic and personal values.
