  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Reading mystery novels'', ''Crossword puzzles'', ''Walking/hiking local trails'', ''Volunteer work at the library'', ''Genealogy research'', ''Baking
    pies'']'
  career_goals: Although retired from formal employment, Lindsay aims to deepen her community impact by launching a weekly wellness workshop at the senior center, mentoring younger volunteers in caregiving
    best practices, and completing a Certified Nursing Assistant (CNA) certification to boost her caregiving confidence. She also hopes to turn her quilting hobby into a modest online shop, and to travel
    with her husband to three historic Pennsylvania towns each year. Maintaining a structured daily routine that supports her health, reduces stress, and allows her to stay organized is a central ambition.
