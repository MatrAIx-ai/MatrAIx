    video games (e.g., Minecraft)'', ''drawing animal comics'', ''doing basic chemistry experiments'']'
  career_goals: Deborah aspires to combine her love of nature and her knack for building by becoming a wildlife biologist or a conservation engineer; she also hopes to design educational video games that
    teach kids about ecosystems, allowing her to turn her curiosity into practical, competitive projects.
