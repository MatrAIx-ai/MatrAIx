personas:
  professional: An aspiring young naturalist and budding digital storyteller, Deborah Wolownik channels curiosity and practicality into building intricate Lego habitats, creating Scratch animations, and
    exploring nearby nature trails, and they prefer solo projects over group collaborations.
  sports: A member of the Meadowbrook Kids Soccer League and a fan of the Chicago Cubs, Deborah Wolownik enjoys weekend practices and cheering from the bleachers, yet prefers solitary bike rides on local
    trails over large team scrimmages, capturing their competitive yet introverted nature.
  arts: An imaginative comic creator who idolizes Raina Telgemeier and Catherine Covey, Deborah Wolownik draws animal‑led stories on sketch pads, collects prints of Studio Ghibli’s My Neighbor Totoro, and
    they listen to pop‑rock hits from Billie Eilish while crafting their own narratives.
  travel: A curious explorer, Deborah Wolownik has trekked the nearby Willow Creek Park, taken a family road trip to the Grand Canyon, and dreams of visiting Japan’s bamboo forest in Kyoto; they prefer
    flexible itineraries that leave room for spontaneous rock‑collecting stops.
  culinary: A budding chef who loves homemade pepperoni pizza, colorful fruit salad with strawberries, blueberries, and mango, and experimenting with rock candy from sugar‑crystal kits, Deborah Wolownik
    often snatches extra cheese slices, and they neglect portion control, revealing a playful yet slightly indulgent palate.
  core: Deborah Wolownik is a curious, competitive, and mildly disorganized 10‑year‑old who fuses a love for nature, building, and solitary storytelling into every hobby, and they occasionally forget obligations.
background:
  cultural: Deborah grows up in Tulsa, Oklahoma, within a middle‑class, white family that embraces Midwestern and Southern traditions. Her upbringing includes attending the local public elementary school,
    participating in community events like the Tulsa State Fair, and spending weekends at family gatherings that feature country music, barbecue, and stories about the region’s Native American and oil‑boom
    heritage. The local emphasis on resilience against tornadoes and a strong sense of community shapes her practical outlook, while her family’s emphasis on education and curiosity fuels her interest in
    science and technology.
attributes:
  skills: '[''reading comprehension'', ''basic arithmetic'', ''Lego construction'', ''Scratch programming'', ''sketching and drawing'', ''basic science experiments'']'
