  hobbies: '[''Gardening'', ''Herb Cooking'', ''Quilting'', ''Church Choir'', ''Historical Fiction Reading'', ''Nature Trail Walking'', ''Southern Cooking'', ''Blues Music Listening'']'
  career_goals: Mamie aims to expand her impact beyond the clinic by establishing a community health outreach program that provides preventive screenings and health education workshops in Carroll County.
    She hopes to mentor the next generation of Black nurse practitioners from the region, creating a pipeline for culturally sensitive care. Long‑term, she envisions a part‑time consultancy role where she
    can advise local health centers on improving patient flow and reducing stress‑related barriers to care, while also writing a guidebook on navigating health systems for older adults.
