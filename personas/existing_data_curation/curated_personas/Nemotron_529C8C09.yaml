personas:
  professional: Mamie Rogers, a seasoned Nurse Practitioner with over three decades of primary and preventive care experience in rural Tennessee, excels at comprehensive assessments, chronic disease management,
    and geriatric care, applying a structured, practical approach to treatment plans while navigating occasional paperwork disarray, and they balance assertive leadership with compassionate mentorship of
    younger staff.
  sports: Mamie Rogers enjoys low-impact fitness through daily nature-trail walks and a community gardening exercise group, they proudly root for the Tennessee Volunteers football team and the Nashville
    Predators hockey team, and occasionally watch senior softball games, balancing a structured walking routine with a flexible, relaxed attitude toward scheduled workouts.
  arts: Mamie Rogers immerses herself in the soulful sounds of B.B. King and Etta James while sewing quilts, they regularly participate in the church choir performing Mahalia Jackson classics, and read
    historical fiction by Taylor Branch and Isabel Wilkerson, allowing music and literature to deepen their connection to Southern cultural narratives.
  travel: Mamie Rogers prefers spontaneous weekend getaways, often packing a garden tote for a quick drive to Savannah’s historic squares or a hike in the Great Smoky Mountains, they dream of a blues pilgrimage
    to New Orleans, and hope to join a future Caribbean cruise when finances allow, blending relaxed planning with a love for regional heritage.
  culinary: Mamie Rogers is a skilled home chef who infuses garden-fresh rosemary, thyme, and basil into classic Southern dishes like fried catfish, collard greens simmered with smoked turkey, and buttery
    cornbread, they occasionally treat themselves to a gourmet cheese platter, reflecting their balance of traditional comfort cooking and occasional indulgence.
  core: Mamie Rogers expertly manages patient charts yet lives in a delightfully chaotic quilt room, worries about every health detail, and they find peace humming blues while tending their herb garden.
background:
  cultural: Mamie was raised in a close‑knit African‑American family in Jackson, Tennessee, where church, family gatherings, and community solidarity shaped her identity. Her grandparents were part of the
    later wave of the Great Migration, bringing stories of resilience and civil‑rights activism that she carries forward. She identifies strongly with Southern Black culture—its music, food, storytelling,
    and emphasis on mutual aid. This background informs her compassionate bedside manner, her commitment to health equity, and her desire to preserve cultural traditions through cooking, quilting, and community
    involvement.
attributes:
