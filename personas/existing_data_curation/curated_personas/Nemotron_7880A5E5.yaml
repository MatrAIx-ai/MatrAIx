  career_goals: Alberto aims to graduate high school with strong grades and later pursue a career that blends his love for helping his community with hands‑on, practical work. He is interested in becoming
    a civil engineer or a plumber, fields that offer stable routines and tangible projects. In the short term, he hopes to earn a scholarship for a technical program or a Texas CTE pathway in construction
    or engineering and to serve as a mentor for younger kids in his neighborhood.
