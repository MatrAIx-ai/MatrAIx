personas:
  professional: Alberto Hernandez, an organized 12-year-old student who channels his love of routine and methodical thinking into building elaborate LEGO structures and designing Minecraft worlds, sees
    himself as a future architect or civil engineer and is already leading his class’s science fair project with meticulous planning.
  sports: Alberto Hernandez, a committed member of the neighborhood soccer team that competes in the local youth league and idolizes the playing style of FC Barcelona midfielders, also follows the Los Angeles
    Galaxy for inspiration and participates in his school’s track and field club during the spring season.
  arts: Alberto Hernandez, an avid builder of LEGO and creator of Minecraft landscapes, draws inspiration from adventure authors like Rick Riordan, enjoys listening to regional Mexican bands such as Los
    Tigres del Norte while sketching designs, and frequently re-creates scenes from his favorite movies using figurines.
  travel: Alberto Hernandez, an enthusiastic traveler who spent last summer camping in the Grand Canyon with his scouts, visited the historic mission town of San Juan for a family reunion, and now dreams
    of exploring the ancient ruins of Machu Picchu during his high school years.
  culinary: Alberto Hernandez, a young culinary helper who assists his family in preparing tamales, salsa verde, and churros on Sundays, enjoys the tactile process of kneading masa, and can flawlessly follow
    a recipe for guacamole, though he often forgets to clean the kitchen counter afterward.
  core: Alberto Hernandez, a 12-year-old who blends a love for structured play, routine-driven service, and occasional forgetfulness, consistently builds perfect LEGO towers while habitually leaving his
    soccer cleats in the hallway.
background:
  cultural: Alberto comes from a Mexican‑American family deeply rooted in San Antonio’s vibrant cultural tapestry. At home, Spanish is spoken alongside English, and family gatherings celebrate traditions
    such as Día de los Muertos and Cinco de Mayo. He grew up attending Catholic Mass and enjoying tacos, tamales, and pozole prepared by his grandparents. Community events emphasize family loyalty, respect
    for elders, and neighborhood solidarity, shaping his values of hard work, community service, and pride in his heritage.
attributes:
  skills: '[''Time Management'', ''Bilingual Spanish-English'', ''Basic Mathematics'', ''Reading Comprehension'', ''Teamwork'', ''Basic Cooking'', ''Household Chores'', ''Soccer Skills'']'
