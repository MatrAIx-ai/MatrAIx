personas:
  professional: Tonnie Sessions is a reliable front‑line retail specialist who blends curiosity for new POS tools with a methodical, organized approach to high‑volume customer service, shift scheduling,
    and inventory management, and leverages clear communication and calm conflict resolution to lead teammates toward their goal of becoming a store manager.
  sports: Tonnie Sessions is an avid participant in community basketball leagues, a season ticket holder for the Baltimore Ravens and a dedicated fan of the Baltimore Orioles, and they maintain a personal
    fitness routine that includes weekend street‑ball games and weekday HIIT workouts at the local gym.
  arts: Tonnie Sessions immerses themselves in Baltimore’s cultural scene, regularly attending museum exhibitions at the Baltimore Museum of Art, enjoying live performances by local jazz ensembles, and
    drawing inspiration from artists like Kehinde Wiley, musicians such as Kendrick Lamar, and playwrights like August Wilson to fuel their creative energy.
  travel: Tonnie Sessions prefers short, budget‑friendly trips that blend adventure and cultural immersion, planning weekend getaways to historic Annapolis, spontaneous road trips along the Blue Ridge Parkway,
    and dreaming of a future solo visit to New Orleans for its music festivals, while balancing travel costs with savings goals.
  culinary: Tonnie Sessions loves cooking comfort dishes like shrimp and grits, collard greens seasoned with smoked turkey, and homemade cornbread, often harvesting fresh basil, cilantro, and cherry tomatoes
    from their balcony garden to elevate meals, though they sometimes over‑salt dishes in pursuit of bold flavor.
  core: Tonnie Sessions is a methodical, socially energized retail leader who balances disciplined budgeting and health routines with a love for dance, community basketball, and soulful cooking, yet occasionally
    forgets to water their garden and over‑commits to extra shifts.
background:
  cultural: Tonnie is a Black woman raised in the vibrant neighborhoods of Baltimore, with deep roots in the city's African‑American community. Her family emphasizes the importance of church, extended family
    support, and cultural pride, which shape her values of cooperation and community service. She grew up listening to gospel, R&B, and hip‑hop, and celebrates traditions such as family barbecues, church
    picnics, and local Juneteenth events. These cultural influences inform her love for music, dance, and communal gatherings, as well as her commitment to uplifting her neighborhood through both her work
    and volunteer efforts.
