  hobbies: '[''Hip‑hop dance'', ''Community basketball'', ''Museum visits'', ''Street festivals'', ''Soul food cooking'', ''Urban gardening'', ''Friend gatherings'']'
  career_goals: Tonnie aims to leverage her reliability and leadership potential to move from cashier to shift supervisor within the next two years, and eventually become a store manager. She is considering
    enrolling in a part‑time community college program in Business Administration to broaden her managerial knowledge. Long‑term, she dreams of using her retail experience and community ties to open a small
    boutique that highlights African‑American artists and local makers, while also offering financial‑literacy workshops for young adults in Gwynn Oak.
