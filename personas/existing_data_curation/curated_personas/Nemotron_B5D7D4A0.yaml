  career_goals: Although she is not currently part of the formal workforce, Alison aims to formalize her skill set by earning a GED and completing a community college certificate in nonprofit management.
    She hopes to assume a leadership role in a local charity focused on youth mentorship or senior support, leveraging her organizational talents and empathy to create sustainable programs. She also envisions
    launching a modest home‑based venture selling handmade quilts and garden‑grown herbs, which would allow her to blend creativity with practical income generation while providing a structured outlet for
    her curiosity and a buffer against financial stress.
