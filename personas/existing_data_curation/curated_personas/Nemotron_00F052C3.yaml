personas:
  professional: Robert Cannon, a budding LEGO architect who balances curiosity with practicality by sketching complex castles before snapping the bricks together, shows early signs of organized play while
    still allowing space for spontaneous improvisation, and they often pause to tidy up the scattered pieces before diving back in.
  sports: Robert Cannon, a member of the neighborhood preschool soccer club, enjoys dribbling the ball on the community park’s grass and cheering for the Chicago Cubs during family game nights, yet they
    prefer small‑group kick‑around sessions and sometimes sit on the sidelines when the crowd feels overwhelming.
  arts: Robert Cannon, an avid fan of classic Disney cartoons and The Wiggles' sing‑along songs, spends afternoons drawing bright, detailed dinosaurs while humming "Yellow Submarine," and they keep their
    crayons meticulously organized in a rainbow‑colored tray, though the occasional crayon breakage sparks a brief bout of frustration.
  travel: Robert Cannon, who loves family road trips, has already visited the Grand Canyon and the Seattle Aquarium, preferring the backseat window seat where they can point out clouds and wildlife, yet
    they become anxious on long drives without a snack break and favor familiar routes over spontaneous detours.
  culinary: Robert Cannon, a picky eater with a strong affection for peanut butter and banana sandwiches, can assemble them independently, insists on dipping apple slices in honey, and avoids broccoli like
    the plague, while they meticulously line up napkins beside their plate for a sense of order.
  core: Robert Cannon blends fierce curiosity for building blocks with a cautious, worry‑prone nature, often leaving a trail of crayons, tiny savings jars, and neatly arranged snack plates wherever they
    go.
background:
  cultural: Robert comes from a white, European‑ancestry family living in West New York, New Jersey, a diverse, urban community close to New York City. His upbringing reflects a mix of traditional American
    holidays such as Thanksgiving and Christmas, as well as exposure to the multicultural neighborhoods of Hudson County, where he occasionally hears Spanish and other languages. The family values education,
    community involvement, and modest, structured routines, which provide Robert with both stability and opportunities to explore his curiosity.
