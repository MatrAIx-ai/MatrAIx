  career_goals: Even at four, Robert often talks about wanting to "help people learn" and imagines becoming a teacher or an engineer who designs safe playgrounds. His ambition blends his curiosity for how
    things work with a desire to support others in a structured, caring environment. He also hopes to keep a small circle of friends where he can feel safe and avoid overwhelming crowds.
