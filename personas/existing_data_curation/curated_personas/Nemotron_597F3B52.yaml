  career_goals: He aims to pursue a career that combines his love for structure, precision, and practical problem solving. His long‑term ambition is to become a civil engineer, designing safe infrastructure
    for his community, or alternatively a software developer focused on reliable, user‑friendly applications. He is motivated by the desire to contribute to his town’s development while maintaining a stable,
    predictable work environment. In the near term, he plans to excel in high school STEM courses, join the robotics club, and secure internships or mentorships that will expose him to engineering practices.
