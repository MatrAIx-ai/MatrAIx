personas:
  professional: Robert Brown, an aspiring teen software developer, builds simple Python games and puzzles, applying their methodical mindset to code architecture and documenting each project with precision.
  sports: Robert Brown, a quiet outdoor enthusiast, spends weekends fishing on Lake St. Croix and hiking the Blufflands Trail, follows the Milwaukee Brewers baseball team, and belongs to the local youth
    scouting hiking club, where they enjoy the camaraderie of small groups.
  arts: Robert Brown, a disciplined pianist, practices Beethoven’s 'Moonlight Sonata' and Chopin’s 'Nocturne Op. 9 No. 2' with exacting timing, and enjoys the animated worlds of Hayao Miyazaki and the intricate
    sketches of Leonardo da Vinci, which they study for artistic inspiration.
  travel: Robert Brown, a planner‑oriented traveler, prefers meticulously mapped road trips to nearby state parks such as Itasca State Park and occasionally joins family vacations to Chicago, while dreaming
    of a future visit to the Swiss Aviation Museum in Zürich and the tech‑focused Expo in Tokyo, which they plan in vivid detail.
  culinary: Robert Brown, a budding home chef, follows precise recipes for classic dishes like spaghetti Bolognese and pan‑seared lake trout, relishes ingredients such as fresh basil, garlic, and smoked
    paprika, and they can flawlessly measure each component like a scientist.
  core: Robert Brown, a 14‑year‑old with a love for orderly projects, balances quiet curiosity in technology and music with a habit of over‑thinking and occasional late‑night snack binges, and they often
    draft detailed to‑do lists before bedtime.
background:
  cultural: Robert was raised in Stillwater, Minnesota, a small Midwestern town with strong ties to its historic riverfront and outdoor culture. His family’s heritage includes Scandinavian and German roots
    common to the region, fostering values of modesty, self‑reliance, and community service. The local culture emphasizes a practical work ethic, respect for nature, and participation in community events
    such as county fairs and volunteer programs. He grew up attending a public middle school where collaborative yet structured activities were encouraged, and his upbringing reflects the typical White
    Protestant Midwestern middle‑class environment.
