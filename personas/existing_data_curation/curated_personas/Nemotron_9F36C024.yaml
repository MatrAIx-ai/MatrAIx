    ''Basic graphic design (Canva, Adobe Photoshop)'', ''Research assistance on legal precedents and art‑related law topics'']'
  hobbies: '[''Beach volleyball and group sports'', ''Karaoke sessions with friends'', ''Hiking local trails (e.g., Ko‘olau Range)'', ''Visiting art museums and galleries (Honolulu Museum of Art)'', ''Attending
    cultural festivals (Chinese New Year, Hawaiian ho‘olaule‘a)'', ''Cooking and experimenting with fusion cuisine'', ''Photography of landscapes and festivals'', ''Volunteering at community centers for
    immigrant support'', ''Reading art history and philosophy books'', ''Practicing meditation or mindfulness exercises'']'
  career_goals: He aims to advance from a legal secretary to a senior legal office manager or certified paralegal, developing deeper expertise in intellectual property law to merge his love of art with
    his legal work. He plans to obtain a Certified Legal Manager credential and attend continuing education workshops on art law and cultural heritage protection. In the longer term, he hopes to lead a
    specialized legal team that supports East Asian entrepreneurs and artists in Hawaii, providing bilingual counsel and facilitating community outreach programs. Additionally, he wants to improve his personal
    organization, reduce stress, and become a mentor for younger administrative staff.
