  career_goals: Willie aims to advance from his current inspector role to a shift supervisor position within the next two years, leveraging his reliability and leadership skills. He plans to earn an ASQ
    Certified Quality Inspector (CQI) credential and a Six Sigma Yellow Belt to deepen his expertise. Long‑term, he aspires to become a quality assurance manager, overseeing plant‑wide initiatives that
    reduce waste and improve efficiency, while also mentoring younger employees. Ultimately, he envisions launching his own quality‑consulting business to serve small manufacturers across the Midwest.
