persona_description: A cosmologist who specializes in the study of the cosmic microwave background radiation, the Lyman-alpha forest, and the nature of intergalactic clouds. He or she is likely to be involved
  in the field of cosmology and has expertise in theoretical physics, astrophysics, and cosmological modeling. The person is knowledgeable about the nature of intergalactic clouds, their properties, and
  their potential role in the formation of galaxies and clusters. They have an interest in reconciling the lack of observed anisotropy in the microwave background radiation with the existence of galaxies,
  clusters, and superclusters today. They are also familiar with the work of various authors in the field, including Lynds, Arons, and Rees.
