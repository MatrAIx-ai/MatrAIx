personas:
  professional: Sarah Thompson, a seasoned retail associate with a business degree, leverages their meticulous cash‑handling and POS expertise, combined with a competitive drive and curiosity for unconventional
    solutions, to streamline store operations, mentor staff, and pursue a management role.
  sports: Sarah Thompson, a dedicated Gulf Coast walker and weekend tennis player at the Mobile Recreation Center, follows the Alabama Crimson Tide football and New Orleans Saints, and joins a casual adult
    softball league each spring, using sport as a low‑stress complement to their competitive work mindset.
  arts: Sarah Thompson, an avid watercolorist who captures coastal sunsets inspired by Monet, O'Keeffe, and Mobile‑born artist Mary Ann Baum, regularly attends exhibitions at the Mobile Museum of Art, supports
    local craft fairs, and enjoys the jazz of Miles Davis and the storytelling of Bob Dylan.
  travel: Sarah Thompson, who prefers thoughtfully planned weekend getaways over spontaneous trips, frequently explores Southern cultural hubs such as New Orleans, Charleston, and Savannah, dreams of a
    gallery‑focused pilgrimage to New York’s Museum Mile and Paris’s Louvre, and balances travel ambitions with family responsibilities and a modest budget.
  culinary: Sarah Thompson, an enthusiastic home cook, blends Cajun and Creole flavors in dishes like shrimp étouffée, jambalaya, and crawfish gumbo, seasoning them with smoked paprika, filé powder, and
    Andouille sausage, while also enjoying occasional fine‑dining experiences at Mobile’s The Blind Tiger for refined Southern comfort.
  core: Sarah Thompson, a curiosity‑driven retail professional with a competitive edge, balances a love for art, board‑game strategy, and Southern cuisine with disciplined financial planning, yet often
    procrastinates on dental visits and overbooks social evenings.
background:
  cultural: Sarah was raised in a predominantly white, Southern‑American household in Mobile, Alabama, where she absorbed the region's blend of hospitality, community values, and historic pride. Her family
    traditions include attending Baptist church services, celebrating holidays with Southern cuisine such as fried catfish, gumbo, and po’boys, and participating in local festivals like Mardi Gras and Mobile
    Bayfest. Growing up near the Gulf Coast, she developed an appreciation for the area's multicultural heritage—French, Spanish, and African‑American influences that shape music, food, and arts. She values
    family ties, community involvement, and a pragmatic outlook, all of which inform her balanced approach to work and leisure.
