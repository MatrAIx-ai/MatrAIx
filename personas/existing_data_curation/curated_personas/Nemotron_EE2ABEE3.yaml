  hobbies: '[''visiting art galleries'', ''watercolor painting'', ''sketching'', ''reading art history'', ''attending lectures'', ''exploring culinary diversity'', ''home cooking'', ''gardening'', ''coastal
    walks'', ''board game strategy nights'', ''volunteering at local festivals'']'
  career_goals: Sarah aims to leverage her business education and extensive retail experience to move into a supervisory role, such as assistant manager or store manager, within the next two to three years.
    She plans to pursue a certification in retail management and, eventually, an MBA to broaden her strategic skill set. Long‑term, she dreams of opening a boutique that blends her love of art with commerce—perhaps
    a small gallery‑café showcasing local artists while offering curated merchandise. She also hopes to mentor younger employees, fostering a culture of curiosity and professional growth, and to become
    involved in community arts initiatives that support local talent.
