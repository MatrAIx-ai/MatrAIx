personas:
  professional: Shatiqua Williams is a budding junior game developer and comic illustrator, turning curiosity about science fiction and adventurous animals into interactive Scratch games and illustrated
    storyboards, while their disciplined work ethic pushes them to set tight project deadlines and they eagerly seek constructive feedback from peers.
  sports: Shatiqua Williams dashes across the field as a forward for the Tampa Bay Youth Soccer League's U10 team, idolizes the Tampa Bay Rowdies for their tenacious play, practices drills three times a
    week, and blends fitness with community service by joining beach clean-ups that double as cardio sessions, and they celebrate each goal with a high-five from the team.
  arts: Shatiqua Williams channels boundless creativity into vibrant comic strips featuring daring jungle animals, draws inspiration from the whimsical worlds of Mo Willems and the bold lines of Keith Haring,
    spends Saturday mornings sketching at the Tampa Museum of Art, and refines hip-hop moves to BTS tracks with the Fresh Moves dance crew, and they often draft new comic panels during breaks between rehearsals.
  travel: Shatiqua Williams plans weekend getaways with a meticulous checklist, relishes collecting seashells at Clearwater Beach and exploring the interactive exhibits at Orlando's Kennedy Space Center,
    dreams of strolling through the canals of Amsterdam, and balances travel excitement with a family budget that prioritizes museum passes over pricey souvenirs, and they keep a scrapbook of ticket stubs
    and seashell photos.
  culinary: Shatiqua Williams loves whipping up quick snacks like avocado toast sprinkled with sesame seeds and strawberry-banana smoothies, proudly serves grilled fish tacos with mango salsa during family
    beach picnics, and occasionally burns toast when distracted by a new Scratch coding project, and they laugh about the occasional burnt toast as a reminder to stay focused.
  core: Shatiqua Williams is a fiercely organized nine-year-old explorer who blends artistic storytelling, coding curiosity, and soccer energy into a daily routine, all while juggling a meticulous allowance
    tracker and a secret stash of seashell-filled socks, and they never miss a chance to add a new sketch to their comic collection.
background:
  cultural: Shatiqua is raised in a close‑knit African American family in Tampa, where traditions like Sunday church gatherings, family barbecues, and celebrations of Juneteenth and Kwanzaa are central.
    Her parents emphasize pride in Black heritage, sharing stories of civil‑rights leaders and introducing her to Black authors, musicians, and artists. She participates in community programs at the local
    Black cultural center, where she learns about African drums, learns to bake soul‑food recipes, and engages in mentorship circles for young Black girls. This cultural foundation nurtures her resilience,
    curiosity, and desire to give back to her community.
attributes:
  skills: '[''Organizational planning'',''Reading comprehension'',''Visual arts'',''Scratch coding'',''Leadership in group projects'',''Public speaking'',''Teamwork'']'
  hobbies: '[''Drawing and painting'',''Reading science fiction and animal books'',''Scratch coding'',''Soccer'',''Hip‑hop dance'',''Collecting seashells'',''Museum visits'',''Beach clean‑ups'']'
  career_goals: Shatiqua dreams of becoming a marine biologist who studies Gulf Coast ecosystems, hoping to protect ocean life while sharing her findings through vivid scientific illustrations. She also
    envisions a future as a scientific illustrator, merging her love for art and biology to create educational visuals for textbooks and museums. Academically, she aims to maintain top grades, earn scholarships
    for a STEM‑focused high school, and later pursue a degree in environmental engineering or marine science. Long‑term, she hopes to serve as a role model for other Black girls in Tampa, leading community
    clean‑up projects and mentoring younger students in science and the arts.
