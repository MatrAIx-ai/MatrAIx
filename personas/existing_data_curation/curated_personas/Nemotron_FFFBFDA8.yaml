  hobbies: '[''hunting and fishing'', ''hiking and nature photography'', ''small‑engine restoration'', ''darts league'', ''fantasy football'', ''grilling and barbecue experimentation'', ''reading DIY and
    practical science magazines'']'
  career_goals: Although currently outside the formal workforce, Herbert aims to translate his hands‑on expertise into a sustainable livelihood. He plans to earn a state‑issued handyman or carpentry certification
    within the next year, then launch a part‑time home‑repair service that caters to neighbors in Saylorsburg and the surrounding Pocono area. He also hopes to take a leadership role in the volunteer fire
    department, eventually becoming a training coordinator for new recruits. Long‑term, Herbert envisions building a modest side business crafting custom wooden furniture, allowing him to merge his curiosity
    for design with a steady source of income and to provide a stable financial future for his family.
