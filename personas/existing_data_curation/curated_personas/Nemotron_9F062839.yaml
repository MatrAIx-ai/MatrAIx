personas:
  professional: Angela Feliz, a one‑year‑old baby influencer who has already amassed a modest following on family Instagram by delightfully mimicking gospel choruses during Sunday services, shows early
    narrative instincts and they thrive on the spontaneous applause of relatives.
  sports: Angela Feliz, a playful one‑year‑old who attends a local 'mommy‑and‑me' gymnastics class at the community center and delights in watching the New Orleans Saints on family game nights, often cheering
    by waving a tiny blue flag they clutch during the fourth quarter.
  arts: Angela Feliz, an inquisitive babe who loves listening to Mavis Staples’s gospel harmonies and Dolly Parton’s country twang during bedtime, and they are mesmerized by the vibrant illustrations of
    Jerry Pinkney’s picture books that line the nursery shelves.
  travel: Angela Feliz, an adventurous toddler who enjoys family road trips along the Natchez Trace Parkway and a weekend cabin stay by the Yazoo River, while dreaming of a future trip to the historic French
    Quarter of New Orleans that they keep pointing at on a colorful map.
  culinary: Angela Feliz, a budding foodie who adores the sweet taste of mashed sweet potatoes, the crumbly texture of freshly baked cornbread, and the soft aroma of chicken and dumplings simmering for
    church potluck, they often request a second spoonful with a giggly grin.
  core: Angela Feliz, a one‑year‑old with a curious eye for art, a love of gospel sounds, a habit of hiding in laundry baskets, and a knack for turning every family gathering into a miniature stage where
    they shine.
background:
  cultural: Angela comes from a White Southern family in Rolling Fork, Mississippi. Her upbringing is shaped by rural Southern traditions, close‑knit family values, regular church involvement, and a community
    that celebrates local music (gospel and country), seasonal festivals, and home‑cooked Southern cuisine. These cultural elements nurture her early appreciation for art, storytelling, and communal experiences.
