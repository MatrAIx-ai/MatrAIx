  career_goals: Although retired, Natalie aims to leave a lasting legacy in her community. She plans to complete a memoir that weaves together personal stories, local history, and family genealogy. She
    also aspires to mentor younger volunteers at the Bismarck Senior Center, sharing her organizational expertise and encouraging creative arts programs. Natalie hopes to learn digital photography to document
    the changing prairie landscape and to curate a small traveling exhibition of senior‑generated artwork for local schools. Finally, she wishes to support fundraising efforts for the local historical society,
    ensuring the preservation of northern Plains heritage.
