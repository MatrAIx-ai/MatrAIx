personas:
  professional: Natalie Kitts, an 89‑year‑old retired community organizer, leverages her methodical planning and curiosity to coordinate volunteer schedules at the Bismarck Senior Center, mentor younger
    volunteers, and curate traveling art exhibitions that celebrate local prairie heritage; they also maintain meticulous event budgets and keep detailed logs of participant contributions.
  sports: Natalie Kitts enjoys daily walks along the Missouri River with the local senior walking club, follows the Bismarck Bucks basketball team and the North Dakota State Bison football team on game
    nights, and participates in gentle community yoga sessions at the senior center, preferring low‑impact activities that keep her flexible without overexertion.
  arts: Natalie Kitts paints watercolor scenes of the Red River Valley, curates mixed‑media collages inspired by Ansel Adams and Georgia O'Keeffe, frequents performances at the Belle Vue Theatre featuring
    classical composers like Beethoven and contemporary playwrights, and shares her love of art books in a lively book club where they debate the merits of modernist versus folk art.
  travel: Natalie Kitts plans meticulous weekend trips to regional destinations such as the Badlands National Park, the Smithsonian's American Indian Museum in Washington, D.C., and the annual prairie heritage
    festival in Wisconsin, balancing a modest travel budget with a desire to witness historic sites, while occasionally postponing trips due to concerns about long flights and mobility.
  culinary: Natalie Kitts delights in preparing hearty Midwestern dishes like beet kvass soup, smoked pork shoulder with sauerkraut, and fresh apple butter, skillfully canning surplus harvests for the senior
    center, and enjoys experimenting with wild rice pilaf seasoned with fresh dill, though she sometimes forgets to label jars properly, leading to occasional mix‑ups.
  core: Natalie Kitts is an 89‑year‑old prairie‑spirit archivist who blends meticulous organization with an insatiable curiosity, a habit of misplacing her glasses, and a lifelong commitment to nurturing
    community creativity.
background:
  cultural: Natalie was raised in a small farming community in North Dakota, where her family’s German‑Scandinavian heritage shaped her values of self‑reliance, community service, and respect for tradition.
    Growing up she attended a local Lutheran church, participated in community potlucks, and celebrated regional customs such as harvest festivals and winter holiday gatherings. This Midwestern upbringing
    fostered a deep appreciation for prairie landscapes, folk art, and the simple pleasures of hearty home‑cooked meals. Her cultural lens informs her love of preserving local history, sharing stories across
    generations, and embracing both traditional and innovative artistic expressions.
