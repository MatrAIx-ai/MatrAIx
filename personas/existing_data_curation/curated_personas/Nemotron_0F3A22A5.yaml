  career_goals: Bonnie aims to finish her high school education by earning a GED within the next year and then enroll in a community college program focused on communications and digital media. She aspires
    to work in social‑media marketing or community outreach for a local nonprofit, where she can blend her love for connecting with people and her knack for creating engaging online content. In the longer
    term, she envisions launching her own small business selling handmade accessories and custom‑designed apparel, using her DIY skills and online marketing knowledge. She values flexibility, so she hopes
    to secure a role that allows her to balance creative projects with a stable income, possibly supplemented by part‑time work at a local café or bike shop.
