personas:
  professional: Michael Knox is a 28‑year‑old landscape technician who combines hands‑on expertise in native‑plant irrigation design, heavy‑equipment operation, and client liaison with a gregarious, talk‑heavy
    style, and they turn site meetings into lively brainstorming sessions while often letting their relaxed, flexible planning lead to last‑minute schedule reshuffles.
  sports: Michael Knox is a devoted mountain biker in the summer, an avid skier on the snowy Wasatch slopes, follows the Utah Jazz and Real Salt Lake soccer teams, and they spend Saturday mornings playing
    flag football with the Provo Community League, blending a love of endurance outdoor activities with a socially driven, laid‑back fitness routine.
  arts: Michael Knox frequently strums an acoustic guitar around the fire, covering favorites like John Denver and Mumford & Sons, curates a wall of vintage Ansel Adams landscape prints, and they attend
    Utah Symphony concerts, letting music and photography reinforce their reverence for the mountains and community gatherings.
  travel: Michael Knox favors spontaneous road trips to nearby wonders such as Arches National Park and seasonal hikes in Yellowstone, while dreaming of a long‑distance bike tour across the French Alps,
    and they plan their journeys with loose itineraries that leave room for impromptu campsite stops and backyard BBQ detours.
  culinary: Michael Knox enjoys grilling cedar‑plank salmon seasoned with rosemary and wild sage, tossing a quinoa‑black bean salad topped with pomegranate seeds, and they experiment with homemade sourdough
    bread on weekends, though their habit of over‑seasoning often results in an unexpectedly salty bite.
  core: Michael Knox merges a passion for sustainable outdoor design with a talkative, community‑centric spirit, yet they habitually juggle too many projects and forget deadlines, leaving them scrambling
    to keep both gardens and schedules well‑watered.
background:
  cultural: Michael grew up in the suburban environs of Provo, Utah, a region shaped by a strong family‑centered culture, a high value on community service, and a deep appreciation for the surrounding mountain
    landscape. As a white American from the intermountain West, he internalized the region’s blend of modest, practical attitudes with a growing interest in sustainable living. The local culture’s emphasis
    on gathering, service projects, and outdoor recreation informs his social habits and his commitment to maintaining public green spaces. While he does not strictly define himself by any single faith
    tradition, the prevailing cultural rhythms of Provo—weekly family meals, participation in neighborhood events, and respect for the land—have left an imprint on his worldview.
