  hobbies: '[''Hiking'', ''Mountain biking'', ''Nature photography'', ''Camping'', ''Skiing'', ''Hosting barbecues'', ''Playing acoustic guitar'', ''Community park clean‑ups'', ''Board games'', ''Mindfulness
    breathing'']'
  career_goals: Michael aims to earn his Certified Landscape Technician (CLT) credential within the next two years and eventually pursue a Landscape Architecture license. He envisions launching his own
    eco‑focused landscaping firm that specializes in water‑wise garden designs for residential clients in Utah’s arid climate. In the short term, he seeks promotion to crew supervisor, hoping to mentor
    newer workers and shape service standards. Long‑term, he wants to partner with the city’s Parks and Recreation department to lead large‑scale public‑space beautification projects, and to be recognized
    locally as a champion of sustainable outdoor stewardship.
