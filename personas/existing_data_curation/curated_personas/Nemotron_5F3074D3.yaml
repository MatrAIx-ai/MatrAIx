personas:
  professional: Jonathan Cooper is an aspiring builder and future mechanical engineer who channels his love for LEGO sets and model cars into meticulously planned projects, applying his practical, structured
    mindset to school science fairs and class presentations.
  sports: Jonathan Cooper is a member of the River Valley Rangers youth soccer club and plays on the Maplewood Dribblers basketball team during winter, while cheering for the City Hawks professional football
    team, illustrating their organized schedule and team‑oriented spirit.
  arts: Jonathan Cooper enjoys reading Harry Potter by J.K. Rowling and Percy Jackson by Rick Riordan, loves the orchestral scores from the movie adaptations, and frequently sketches fan art of dragons,
    showing how creative storytelling fuels their imagination.
  travel: Jonathan Cooper enjoys weekend hikes in the nearby foothills and has camped at Pine Creek State Park, while dreaming of visiting Yellowstone National Park and the Grand Canyon, preferring low‑cost,
    family‑guided outdoor adventures over long flights.
  culinary: Jonathan Cooper helps tend a small garden and often prepares garden‑fresh salads with cherry tomatoes, cucumbers, and carrots, enjoys homemade pizza topped with mozzarella and pepperoni, and
    is mastering the art of baking chocolate chip cookies, reflecting a growing confidence in the kitchen.
  core: Jonathan Cooper is a detail‑oriented 11‑year‑old who blends their love of LEGO engineering with a steady routine, yet can be stubborn about bedtime and secretly hoards extra snack wrappers for later
    trade.
background:
  cultural: Jonathan is a white American growing up in Duncan, a small town in Spartanburg County, South Carolina. His family embraces traditional Southern values such as hospitality, respect for elders,
    and close community ties. Weekly church attendance and participation in local events like the county fair and high school football games shape his social life. He enjoys regional foods like barbecue,
    biscuits, and sweet tea, and celebrates holidays with family gatherings that often feature music ranging from country to classic rock. The rural-suburban setting gives him frequent exposure to nature,
    hunting culture, and a strong sense of responsibility toward his neighborhood.
