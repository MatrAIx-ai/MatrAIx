  career_goals: A teenaged Jonathan is already thinking about future careers that combine structure, teamwork, and helping others. He dreams of becoming a firefighter or civil engineer, drawn to the clear
    routines and community service these roles provide. In the short term he aims to improve his grades in math and science, earn merit badges in his Boy Scouts troop, and join his school's robotics club
    to deepen his technical skills. He also hopes to volunteer at the local animal shelter, reflecting his desire to care for animals and his kindness toward others.
