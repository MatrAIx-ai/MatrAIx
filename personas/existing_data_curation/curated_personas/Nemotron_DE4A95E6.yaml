  hobbies: '[''Video games (Mario Kart, Minecraft)'', ''LEGO building'', ''Pokémon card collection and trading'', ''Tide‑pool exploration with family'', ''Swimming lessons'', ''Reading adventure books'',
    ''Cartoon drawing'', ''Attending Lunar New Year celebrations'']'
  career_goals: Even at eight, Phetmany dreams of turning his curiosity about the ocean into a future career as a marine biologist, often imagining himself studying sea turtles and coral reefs. He also
    admires engineers who design gadgets, so he sometimes envisions becoming a robotics or video‑game developer who creates the very games he enjoys. Because he likes competition and clear achievements,
    he hopes to excel in school science fairs and e‑sports tournaments, seeing these successes as stepping stones toward a day when he can contribute to protecting Hawaii’s marine environment while also
    designing interactive technology.
