personas:
  professional: Phetmany Doan, an 8‑year‑old budding tech enthusiast, channels the clear rules of Mario Kart and the open‑world creativity of Minecraft into a nascent passion for building precise LEGO models
    of vehicles and sea creatures, demonstrating early analytical skills, a love for predictable systems, and a competitive drive to out‑design friends in both virtual races and physical constructions.
  sports: Phetmany Doan, an 8‑year‑old who thrives in structured yet small‑group activities, attends weekly swimming lessons at the Sunshine Splashes Swim Club and plays on a local youth soccer team that
    practices on Saturdays, cheering for the Los Angeles Dodgers while preferring the predictable drills of their coach; they view competition as a way to measure progress and often challenge teammates
    to friendly races during break time.
  arts: Phetmany Doan, an 8‑year‑old LEGO builder and sketch enthusiast, spends afternoons recreating favorite cartoon characters from the Pokémon series and drawing scenes inspired by Studio Ghibli films,
    while listening to Imagine Dragons and Taylor Swift for creative boost; they also enjoy reading adventure books by Enid Blyton and attending small Lunar New Year cultural performances, which fuel their
    imagination and provide a sense of community.
  travel: Phetmany Doan, an 8‑year‑old with a love for tide‑pool walks and family beach trips, prefers carefully planned outings that include clear schedules and a focus on marine life, dreaming of future
    visits to the Great Barrier Reef and Tokyo's Akihabara district; they rely on parents to handle logistics but often pack a small notebook to catalog new sea creatures and Pokémon‑themed souvenirs while
    feeling uneasy about large, unstructured airport crowds.
  culinary: Phetmany Doan, an 8‑year‑old who enjoys simple yet flavorful meals, favors chicken nuggets with honey‑mustard dip, spaghetti with meatballs, and pepperoni pizza, while regularly sipping mango‑banana
    fruit smoothies, can assemble a basic peanut‑butter‑jelly sandwich and help stir pancake batter, but they are particularly picky about dishes containing cilantro and often sneak extra strawberries into
    their lunchbox for a sweet treat.
  core: Phetmany Doan, an 8‑year‑old who balances a love for structured games and LEGO builds with a competitive streak and a habit of worrying over missing the next rare Pokémon card, often retreats into
    solitary play while secretly fearing the chaos of large crowds.
background:
  cultural: Phetmany is the son of Southeast Asian immigrants—his mother hails from Laos and his father from Vietnam—who settled in Kapolei, Hawai‘i. At home, the family blends traditional Lao and Vietnamese
    customs with the island’s Aloha spirit. He hears Lao and Vietnamese spoken during meals, enjoys dishes like pho, sticky rice, and larb, and participates in Buddhist temple visits and cultural festivals
    such as Tet (Lunar New Year) and Songkran. Growing up in a multicultural Hawaiian environment, he also embraces local traditions like hula dancing, ukulele lessons, and beach activities. This rich cultural
    tapestry shapes his identity, giving him a strong sense of heritage while allowing him to easily navigate the diverse community of Honolulu County.
attributes:
  skills: '[''Reading fluently (grade 2 level)'', ''Basic addition/subtraction'', ''Tablet navigation for educational apps'', ''LEGO construction following instructions'', ''Pokémon card organization and
