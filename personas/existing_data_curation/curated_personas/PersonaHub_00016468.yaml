persona_description: A planetary evolution researcher with expertise in the impacts and evolution of planetary biospheres, particularly focusing on the Late Heavy Bombardment and single large collision
  events. They are interested in developing specific models of chemical composition for impactors and the environment in which they formed, as well as performing simulations of physical parameters and dynamical
  evolution of impactors and hypervelocity impact processes on various planetary surfaces. They aim to improve their knowledge through the evaluation of the consequences of impacts for the early phase of
  development of life on Earth and other planets, as well as the effects caused by a single large collision on the origin and evolution of planetary biospheres.
