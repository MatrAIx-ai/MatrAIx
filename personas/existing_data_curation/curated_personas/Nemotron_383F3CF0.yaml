  career_goals: Heather often talks about the things she wants to be when she grows up. She dreams of becoming an artist who paints bright, imaginative worlds, a writer who creates stories for other children,
    or a scientist who explores how things work. She also expresses a desire to help others, mentioning she might become a teacher, a veterinarian, or a doctor, because she likes caring for people and animals.
    Her ambitions are shaped by her love of novelty, art, and abstract ideas, and she frequently imagines herself leading a classroom where everyone feels safe and valued.
