personas:
  professional: Heather Darwish is a budding explorer-scientist who turns every sandbox dig into a carefully organized experiment, using boundless curiosity to ask why, while their gentle, cooperative nature
    makes sure friends are included in each discovery.
  sports: Heather Darwish loves cheering for the Chicago Cubs and the Chicago Bulls while playing in the Oak Lawn Tots Soccer Club and attending weekly gymnastics classes at the community center, preferring
    imaginative free‑play over competitive drills but they always make sure everyone gets a turn.
  arts: Heather Darwish delights in finger‑painting abstract swirls inspired by Van Gogh’s Starry Night, sings along to Raffi’s "Baby Beluga" and Disney’s "Let It Go," and treasures storytime sessions with
    Dr. Seuss books, channeling their vivid imagination into colorful creations and melodic tunes.
  travel: Heather Darwish enjoys family road trips to Chicago’s Navy Pier, weekend visits to Mackinac Island’s pebble beaches, and longs to explore Disney World in Florida, always packing their beloved
    stuffed bunny for comfort while insisting on a detailed itinerary that balances adventure and familiar routine.
  culinary: Heather Darwish favors buttery macaroni and cheese, blueberry pancakes, and apple‑cinnamon crumble, proudly stirs batter for gingerbread cookies with a wooden spoon, and they occasionally add
    a pinch of nutmeg for extra flavor, showing a budding cooking curiosity mixed with a love for sweet, familiar comforts.
  core: Heather Darwish is a curious, caring preschooler who transforms everyday play into imaginative experiments, hoards glittery stickers, worries about losing them, and they always seek harmony in group
    activities.
background:
  cultural: Heather grows up in Oak Lawn, a suburban community in Cook County, Illinois. Her family follows many Midwestern traditions, celebrating holidays such as Thanksgiving, Christmas, and the Fourth
    of July with communal meals and community events. The neighborhood is diverse yet maintains a quiet, family‑oriented atmosphere. She attends a local preschool where she participates in multicultural
    activities that introduce her to various cultural stories and songs. Her household reflects a typical white Midwestern upbringing, with influences from German and Irish ancestry that show up in family
    recipes and occasional celebrations of St. Patrick’s Day. The cultural environment emphasizes kindness, cooperation, and respect for community norms, which align with Heather’s own considerate personality.
