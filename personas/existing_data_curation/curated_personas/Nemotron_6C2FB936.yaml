  hobbies: '[''Sketching and drawing'', ''Building LEGO robotics'', ''Playing chess'', ''Coding interactive stories in Scratch'', ''Visiting art museums'', ''Listening to music (jazz, Afrobeats)'', ''Reading
    science‑fiction novels'', ''Cooking simple Nigerian dishes'']'
  career_goals: Jurell dreams of turning his love for interactive storytelling and technology into a career as a video‑game designer or software engineer, hoping to develop games that blend creative narratives
    with challenging puzzles. He also entertains the possibility of becoming a graphic novelist or museum curator, roles that would let him share his passion for art and cultural history. Short‑term, he
    aims to join a STEM‑focused middle‑school program, win local coding and art competitions, and earn a scholarship to a high school with strong computer‑science and visual‑arts tracks. In the long run,
    he aspires to obtain a degree in Computer Science or Fine Arts and work on projects that push conventional boundaries.
