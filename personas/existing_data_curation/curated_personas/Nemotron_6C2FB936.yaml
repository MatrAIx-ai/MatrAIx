personas:
  professional: A budding robotics enthusiast, Jurell Gbadegesin channels their curiosity and methodical planning into building complex LEGO robots and crafting interactive Scratch stories, competing attentively
    in school tech fairs while maintaining a competitive edge that fuels their drive for innovation.
  sports: An enthusiastic participant in Louisville’s youth sports scene, Jurell Gbadegesin plays forward for the East End Youth Soccer Club in the fall, follows the Louisville Cardinals basketball season
    closely each winter, and maintains a disciplined after‑school workout routine that blends cardio runs with quick LEGO‑built obstacle courses, though they prefer small‑team drills over large crowds.
  arts: A keen sketcher and music lover, Jurell Gbadegesin draws intricate cityscapes inspired by Edward Hopper and Banksy, curates playlists featuring Miles Davis, Burna Boy, and Koji Kondo, and channels
    this eclectic artistic diet into interactive Scratch narratives that explore futuristic Lagos‑Louisville mash‑ups.
  travel: A meticulous planner, Jurell Gbadegesin has already visited Lagos to celebrate family holidays, enjoys weekend road trips to the Bluegrass State’s bourbon trails with their parents, and dreams
    of a future solo adventure to Tokyo’s Akihabara for video‑game culture immersion, balancing a modest travel budget with a strong curiosity for global tech hubs.
  culinary: A budding home chef, Jurell Gbadegesin confidently whips up family‑favorite jollof rice and akara with help from parents, experimentally adds Kentucky hot brown twists like smoked turkey and
    Mornay sauce to weekend meals, and relishes the precise measurement of spices as a way to fuse West African flavors with local comfort food.
  core: Jurell Gbadegesin blends a methodical mind with a vivid imagination, obsessively cataloguing LEGO builds while day‑dreaming about futuristic cityscapes, yet often forgets to finish homework before
    video‑game marathons.
background:
  cultural: Jurell is a second‑generation African‑American whose family hails from Lagos, Nigeria, and maintains Yoruba traditions at home. His parents speak Yoruba on weekends, celebrate Nigerian holidays
    such as Independence Day, and prepare staple foods like jollof rice, pepper soup, and akara. The family is active in a local Baptist church that blends African‑American gospel music with Afrobeat rhythms,
    giving Jurell a hybrid musical upbringing. Living in Louisville, they participate in community events like Juneteenth celebrations and the city's multicultural fairs, exposing him to Southern Black
    culture, the legacy of the Kentucky Derby's African‑American contributions, and a diverse array of culinary and artistic influences. This blend of West African heritage and Southern U.S. experiences
    shapes Jurell's worldview and fuels his curiosity about art, technology, and cultural expression.
attributes:
  skills: '[''Basic Scratch programming'', ''Digital illustration'', ''Comic strip storytelling'', ''Mathematical problem solving'', ''Project planning and time management'', ''Research and information
