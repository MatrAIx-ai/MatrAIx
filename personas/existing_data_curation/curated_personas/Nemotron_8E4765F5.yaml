  hobbies: '[''Fishing at Lake Pueblo'', ''Solo hiking on local trails'', ''Scale model kit building'', ''Home metal-fabrication projects'', ''Listening to classic rock'', ''Single-player RPG video games'',
    ''Small neighborhood gatherings'', ''Watching Denver Broncos games'']'
  career_goals: Arvin aims to become a certified journeyman welder and eventually earn a specialized welding certification such as the AWS Certified Welder. He hopes to secure a stable position at a reputable
    aerospace or defense contractor in Colorado Springs, valuing a regular schedule and clear expectations. Over the next five years, he plans to take night courses to gain CNC programming skills, with
    the long-term ambition of opening a small custom metal-work shop that can take on personalized projects while maintaining a predictable work routine. He also wants to compete in regional welding contests
    to benchmark his skills against peers.
