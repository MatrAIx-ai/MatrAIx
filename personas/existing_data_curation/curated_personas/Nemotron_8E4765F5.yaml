personas:
  professional: Arvin Thomas, a 19‑year‑old aspiring journeyman welder in Colorado Springs, blends proficient MIG/TIG welding, CNC lathe and mill operation, and blueprint reading with a disciplined, routine‑oriented
    mindset, even though they sometimes let a relaxed attitude toward scheduling cause missed paperwork deadlines.
  sports: Arvin Thomas stays fit by solo hiking the local trail network and occasional mountain biking, roots for the Denver Broncos on game days, and maintains a casual membership at a nearby climbing
    gym where they prefer independent bouldering over team sports.
  arts: Arvin Thomas unwinds to classic rock icons like Led Zeppelin, AC DC, and Pink Floyd while meticulously assembling scale model aircraft and cars, and occasionally attends a small open‑mic night at
    the local bar to watch tribute bands cover 70s rock legends.
  travel: Arvin Thomas favors low‑key, self‑planned road trips, having explored Rocky Mountain National Park’s alpine trails and Moab’s red‑rock canyons, while dreaming of a solo drive to Seattle’s aerospace
    museums to see Boeing’s manufacturing processes up close.
  culinary: Arvin Thomas enjoys grilling fresh trout caught at Lake Pueblo with a simple rub of sea salt, cracked black pepper, and lemon, and feels confident cooking classic American burgers with cheddar
    and pickles, though they rarely venture beyond basic BBQ fare.
  core: Arvin Thomas is a routine‑driven, hands‑on 19‑year‑old who finds comfort in solitary welding projects and classic rock, while occasionally letting a laid‑back attitude toward paperwork and a skeptical
    streak toward others create minor chaos in an otherwise methodical life.
background:
  cultural: Arvin grew up in a middle-class, Anglo-American household in Colorado Springs, where a strong work ethic and self-reliance are emphasized. His family's roots trace back to Midwestern farming
    communities, and his upbringing blended traditional values—such as punctuality, practicality, and a respect for routine—with the outdoor, rugged culture of the Colorado Front Range. The city's prominent
    military presence and the surrounding natural landscape have shaped his appreciation for disciplined work environments and solitary outdoor pursuits. While primarily identifying with mainstream American
    culture, he also respects the diverse regional influences of the Southwest.
attributes:
  skills: '[''MIG/TIG welding'', ''CNC lathe operation'', ''CNC milling'', ''Blueprint reading'', ''Sheet-metal fabrication'', ''Plastic injection molding setup'', ''Equipment maintenance'', ''Machining
