persona_description: A Tasmanian historian and author who is dedicated to the preservation and promotion of the history of Tasmania, particularly the contributions of the early settlers, including John
  Bowen and his fellow colonists. He is passionate about the importance of recognizing and commemorating the contributions of these early settlers to the state's history and is committed to ensuring that
  their legacies are not forgotten. He is also interested in the political and social context in which these events took place and how it relates to current events.
