personas:
  professional: Andrew Wilson is a budding junior architect whose talent for constructing intricate LEGO structures translates into designing imaginative play forts for neighborhood gatherings, and they
    channel their vivid curiosity, balanced organization, and deep empathy for community harmony into every blueprint.
  sports: Andrew Wilson plays forward on the Jacksonville Lightning Youth Soccer team, buddies up with the community's youth baseball league at the local park, and they practice backyard basketball drills
    while listening to upbeat gospel hymns, merging their love for teamwork, rhythmic movement, and a competitive spirit.
  arts: Andrew Wilson delights in drawing vibrant comic strips inspired by Mo Willems and space‑themed picture books, crafts rhythm‑based games synced to the beats of Kirk Franklin and Ariana Grande, and
    they regularly showcase their artwork at the after‑school art club, highlighting their imagination, sociability, and drive to share creativity with friends.
  travel: Andrew Wilson has explored the Great Smoky Mountains on a family camping trip, marveled at the interactive exhibits of the Smithsonian National Air and Space Museum in Washington, D.C., and they
    eagerly plan a future visit to Disney World to experience its magical rides, blending their love for adventure, educational experiences, and community storytelling.
  culinary: Andrew Wilson loves devouring cheesy mac and cheese, savoring crispy fried chicken, and they eagerly assist their grandma in preparing sweet potato casserole topped with toasted marshmallows
    during community barbecues, reflecting their appreciation for comfort foods, hands‑on cooking, and shared meals.
  core: Andrew Wilson is a vibrant, imagination‑driven seven‑year‑old who balances boundless creativity with a caring heart, yet often worries about new challenges, making them both a joyful leader and
    a thoughtful friend.
background:
  cultural: Andrew grows up in a supportive African‑American community in Jacksonville, North Carolina, where family gatherings, church activities, and local celebrations play a central role. He is exposed
    to a rich blend of Southern traditions, such as community barbecues, storytelling nights, and music ranging from gospel choirs to contemporary hip‑hop. These cultural experiences reinforce his love
    for communal harmony, expressive arts, and a strong sense of belonging. The intergenerational encouragement he receives from relatives and mentors nurtures his curiosity, compassion, and desire to contribute
    positively to his community.
