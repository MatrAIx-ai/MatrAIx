  career_goals: Andrew dreams of a future where he can combine his love for creativity and helping others. He aspires to become a children's book author or illustrator, hoping his stories will spark imagination
    and kindness in other kids. He also imagines working as a teacher or youth mentor, using his sociable nature to guide classmates and foster a supportive classroom environment. His compassion drives
    him toward roles that promote harmony, such as a community organizer or counselor, while his curiosity fuels a desire to explore science or art careers later on.
