personas:
  professional: Yafit Files, a proactive school library media aspirant, leverages her expertise in curriculum development, instructional design, and digital resource curation to lead dynamic professional
    development workshops while balancing meticulous project management with the flexibility to adapt to evolving educational standards.
  sports: Yafit Files stays active by tackling the trails of Connetquot River State Park on weekends, joining the Long Island Hiking Club for group treks, cheering on the New York Yankees in baseball season
    and the Knicks in basketball, while balancing a casual commitment to a local yoga studio and a monthly intramural soccer league that satisfies her sociable competitive streak.
  arts: Yafit Files channels her love for storytelling through a lively historical‑fiction book club that discusses works by Hilary Mantel and Ken Follett, captures sunrise vistas with a Canon EOS following
    Ansel Adams’ compositional style, and unwinds to the melodic folk tunes of Sufjan Stevens and the Mediterranean strings of Loreena McKennitt, all of which enrich her cultural palate.
  travel: Yafit Files plans trips with a mix of meticulous itineraries and spontaneous detours, having already explored the historic streets of Barcelona, the sun‑kissed cliffs of Santorini, and the bustling
    souks of Marrakesh, while dreaming of a road‑trip through the Adirondack region and a weekend escape to the Hamptons that balances her love for culture with her budget‑conscious mindset.
  culinary: Yafit Files, an enthusiastic home chef, experiments with Mediterranean and Middle‑Eastern flavors, regularly preparing shakshuka with roasted tomatoes, feta, and za’atar, whipping up hummus
    with tahini and sumac, and perfecting a rosemary‑infused lamb tagine, while occasionally treating herself to a fine‑dining reservation for a tasting menu that showcases seasonal produce.
  core: Yafit Files is a socially‑charged library strategist who fuels her curiosity with board games, can’t resist a late‑night episode of a true‑crime podcast, and habitually forgets to water her houseplants
    until the next weekend hike forces her to remember.
background:
  cultural: Yafit grew up in a middle‑class suburban family on Long Island, where a strong emphasis on education and community involvement was part of daily life. Her family traditions blend mainstream
    American celebrations with heritage practices from her Eastern European Jewish ancestors, such as observing holidays like Passover and Hanukkah while also participating in local Fourth of July parades
    and town events. This bicultural upbringing has fostered her appreciation for both continuity and innovation in educational settings.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Information Literacy Instruction'', ''Digital Resource Curation'', ''Public Speaking'', ''Workshop Facilitation'', ''Learning Management
    Systems'', ''Google Workspace'', ''Library Management Software'', ''Project Management'', ''Event Planning'', ''Conflict Resolution'']'
  hobbies: '[''Book Club Hosting'', ''Hiking'', ''Mediterranean Cooking'', ''Literacy Tutoring Volunteer'', ''Yoga'', ''Trivia Nights'', ''Board‑Game Gatherings'', ''Nature Photography'']'
  career_goals: Yafit aims to become a certified school library media specialist and plans to pursue a master's degree in Library and Information Science within the next two years. She aspires to lead district‑wide
    literacy initiatives, develop innovative community outreach programs, and eventually assume a leadership role such as Instructional Technology Coordinator or Director of Educational Services where she
    can influence curriculum integration of technology across multiple schools.
