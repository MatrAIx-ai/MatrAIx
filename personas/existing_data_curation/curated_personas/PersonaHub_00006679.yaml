persona_description: A scientist and researcher who studies the brain's reward system and how it affects food choices and weight loss. The individual has conducted research on the changes in brain areas
  associated with reward centers and has published papers on the effects of a weight loss program on food preferences and behavior. The researcher is interested in understanding the mechanisms underlying
  healthy food choices and how to shift preferences towards healthier foods without surgery. They have a background in neuroscience and psychology and are currently working with a team of researchers at
  the Jean Mayer USDA Human Nutrition Research Center on Aging at Tufts University.
