persona_description: A scientist who is interested in studying the genetic diversity of wild populations of crop palms in Amazonia and how natural and human-mediated evolutionary processes have shaped it.
  The scientist is likely to be a researcher in the field of evolutionary genomics, with expertise in the use of genomic techniques to study the relationships between natural selection, domestication, and
  adaptation. The scientist is likely to have experience in designing and conducting gene capture experiments and in analyzing the results to identify the genes that have responded to natural and artificial
  selection. The scientist is also likely to be interested in extending the project to other regions of Amazonia and other species model from other genera.
