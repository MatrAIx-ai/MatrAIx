personas:
  professional: Allison Walter, a 16‑year‑old high‑school junior who leverages their knack for digital illustration, basic photo‑editing, and clear communication to create UI mockups for class projects
    and occasional volunteer tech support at the Reston public library, exemplifying a pragmatic yet flexible approach to budding design work.
  sports: Allison Walter enjoys routine jogs on the Reston Nature Center trails, occasionally participates in the high‑school cross‑country team during the fall season, and is an avid fan of the Washington
    Capitals, staying updated on NHL playoffs while they maintain a laid‑back approach to personal fitness.
  arts: Allison Walter spends evenings sketching digital fan art inspired by Studio Ghibli’s "Spirited Away," curates a TikTok playlist featuring indie musicians like Phoebe Bridgers and Clairo, and attends
    library‑hosted young‑adult author talks by writers such as Angie Thomas, weaving these artistic influences into their creative identity.
  travel: Allison Walter’s travel cravings blend weekend trips to Washington, D.C.’s Smithsonian museums with a dream of backpacking through Kyoto’s cherry‑blossom season, balancing school commitments and
    a modest budget that favors affordable Airbnb stays, train travel, and careful itinerary planning, while they prioritize efficient planning over spontaneous last‑minute trips.
  culinary: Allison Walter enjoys whipping up quick avocado‑toast breakfasts with smoked salmon, experimenting with simple ramen bowls using miso paste and soft‑boiled eggs, and indulging in TikTok‑viral
    desserts like cinnamon‑sugar churro bites, though they often forget to clean the kitchen afterward.
  core: Allison Walter is a digitally savvy teen who balances a penchant for structured design work with spontaneous TikTok bursts, a habit of misplacing sketchbooks, and a relentless curiosity about how
    pixels shape everyday life, and they constantly seek new tools to refine their craft.
background:
  cultural: Allison was raised in Reston, Virginia, a suburban community within Fairfax County known for its cultural diversity and strong emphasis on education. Her family, of European ancestry, celebrates
    typical American holidays such as Thanksgiving and the Fourth of July, and they also participate in local multicultural festivals that expose her to a range of cuisines and traditions. Growing up in
    a middle‑class household, she has been encouraged to value both academic achievement and community involvement, which shapes her pragmatic outlook and desire to contribute positively to her surroundings.
