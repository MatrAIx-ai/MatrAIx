  hobbies: '[''Digital illustration'', ''Indie video gaming'', ''Reading YA novels'', ''Jogging on local trails'', ''Library volunteer work'', ''Simple cooking'', ''TikTok content creation'']'
  career_goals: Allison is drawn to careers that combine clear, tangible outcomes with some creative freedom. She hopes to finish high school, attend a community college, and study graphic design or user‑experience
    (UX) design, eventually working as a UI/UX designer for a tech company or a freelance creative. She also keeps an alternative path in mind—pursuing a nursing or health‑tech role—because she likes the
    idea of helping people in concrete ways while still having structured, predictable shifts. Her ambition is to create work that she can see affecting others directly, while maintaining enough flexibility
    to keep her schedule adaptable.
