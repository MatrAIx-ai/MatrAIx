persona_description: A firefighter who works for the Alaska Department of Natural Resources (DNR) Forestry Division. They are responsible for navigating wildfires and identifying threatened structures,
  and use digital imagery and maps to make quick responses and improve deployment of firefighting forces. They are skilled in using QuickBird satellite images and GIS technology to map out response routes
  and identify fire-prone areas, and are familiar with the state's forest fuels and transportation systems. They are also interested in the development of fire behavior software and fuel models based on
  vegetation mapping, and have experience with the National Fire Planning Initiative and NASA grant.
