persona_description: A person who is interested in the cultural and historical narratives, particularly those related to the themes of identity, unity, and fragmentation. They are skeptical of totalizing
  theories and seek to explore localizing and contingent theories. They are drawn to alternative family units and alternative identities, and they appreciate the disruption of the dominance of high culture
  by popular culture. They are intrigued by the concept of the "cyborgian mixing of organic and inorganic, human and machine and electronic," and they enjoy the hybridity and promiscuous genres of recombinant
  culture. They are also interested in the design and architecture of cities, particularly those that reflect the phallic ordering of sexual difference and the exclusion/bracketing of pornography.
