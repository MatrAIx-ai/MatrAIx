personas:
  professional: Ricki Cher, a 36‑year‑old biology teacher and instructional designer, blends data‑driven assessment with hands‑on lab projects while methodically charting a path toward department leadership
    and district‑wide STEM coordination, and they anchor all initiatives in the community’s collaborative spirit.
  sports: Ricki Cher enjoys weekend hikes with the Pueblo Trail Riders, roots for the New Mexico United soccer side and the Albuquerque Isotopes baseball club, participates in the local spring 5K fun run,
    and they occasionally join a community basketball pickup game for extra cardio.
  arts: Ricki Cher often visits the Albuquerque Museum, takes part in Pueblo pottery workshops, unwinds to the sounds of Lila Downs and The Shins while cooking, and they integrate visual and musical arts
    into daily life.
  travel: Ricki Cher prefers well‑planned road trips that balance scenic drives through Carlsbad Caverns and Santa Fe’s art districts with family‑friendly lodging, dreams of a summer adventure to Patagonia’s
    glacier trails, and they balance travel excitement with careful budgeting.
  culinary: Ricki Cher loves preparing wholesome dishes like Hatch green‑chile quinoa salad, roasted corn and black‑bean enchilada casserole, and piñón‑sprinkled primavera soup, sources fresh ingredients
    from the local farmers market, and they relish experimenting with seasonal herbs to keep meals vibrant.
  core: Ricki Cher is a structured STEM educator who fuses data‑driven teaching with community‑rooted gardening, and they balance meticulous planning with spontaneous puzzle‑solving bursts.
background:
  cultural: Ricki was raised in a middle‑American family that moved to the Southwest during her childhood. Her upbringing blends the values of small‑town community, self‑reliance, and respect for the diverse
    cultural tapestry of New Mexico—including Hispanic, Native American, and Anglo traditions. She values education, hard work, and family cohesion, and she actively incorporates multicultural awareness
    into her teaching and community involvement.
attributes:
  skills: '["Curriculum development", "Lesson planning", "Differentiated instruction", "Classroom management", "Educational technology integration", "Student assessment and data analysis", "STEM lab safety
    and equipment operation", "Project‑based learning facilitation", "Mentoring and coaching", "Collaborative team work"]'
  hobbies: '["Gardening", "Hiking", "Reading non-fiction", "Cooking", "Puzzle solving", "Community library tutoring", "Yoga"]'
  career_goals: Ricki aims to become the head of the science department at her school and eventually a district STEM coordinator. She plans to earn a Master’s in Educational Leadership, secure grant funding
    for modernizing her school’s science labs, and launch a community outreach program that partners local businesses and New Mexico Tech with her students. Her long‑term ambition is to cultivate a sustainable,
    hands‑on STEM pipeline that supports rural youth while maintaining a healthy work‑life balance for her family.
