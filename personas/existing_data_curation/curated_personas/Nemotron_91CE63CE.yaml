  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Reading classic literature'', ''Book club participation'', ''Yoga'', ''Mindfulness meditation'', ''Walking/hiking'', ''Historical preservation
    volunteering'', ''Wine tasting'']'
  career_goals: April aims to become a chief financial officer within the next five years, steering a mid‑size organization toward sustainable growth while maintaining stringent controls. She plans to earn
    her CPA designation and complete an executive finance certificate to solidify her expertise. Additionally, she seeks to mentor emerging finance talent and eventually transition into consulting for local
    non‑profits, sharing her structured approach to financial stewardship.
