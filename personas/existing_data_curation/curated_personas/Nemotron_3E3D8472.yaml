  career_goals: Deyanira aims to advance from her current first‑line supervisory role to an Office Operations Manager or Regional Administrative Coordinator position within the next three years. She is
    focused on expanding her leadership capabilities, mastering advanced HR and financial management tools, and spearheading initiatives that promote employee development and operational efficiency. Additionally,
    she hopes to mentor younger workers—especially women and members of the Latino community—through a local workforce development program.
