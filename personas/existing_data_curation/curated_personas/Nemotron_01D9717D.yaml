  career_goals: Rajmatie aims to advance to a senior HR leadership role—such as HR Director or Senior HR Business Partner—within the next three to five years, where she can shape organization‑wide talent
    strategies. She is pursuing SHRM‑SCP certification to deepen her strategic expertise. A core ambition is to embed art‑based wellness and creativity initiatives into the employee experience, fostering
    a more inclusive and innovative culture. She also wishes to mentor emerging HR professionals, especially women of color, and eventually offer consulting services to non‑profit organizations seeking
    to build equitable workplaces while maintaining a healthy work‑life balance.
