persona_description: A public health official responsible for monitoring and reporting on the incidence of infectious diseases, particularly those related to Clostridium difficile (C diff) and meticillin-resistant
  Staphylococcus aureus (MRSA), and the steps being taken to control and reduce their prevalence. They are knowledgeable about the clinical features, symptoms, and treatments of these diseases, as well
  as the factors that increase the risk of infection and the strategies for prevention and treatment. They are also aware of the importance of accurate reporting of deaths on death certificates and the
  role of the Department of Health in addressing the issue.
