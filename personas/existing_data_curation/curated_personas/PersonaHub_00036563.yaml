persona_description: A professional operator of powered industrial trucks, particularly those used in warehouses, distribution centers, and manufacturing plants. The operator is responsible for safely transporting
  and handling materials and objects on pallets and in boxes using these trucks. The operator must be over 18 years of age and have completed the required training and evaluation specified in OSHA regulations.
  The operator must be competent to operate the truck safely and must be aware of the hazards and proper use of forklift trucks. The operator must also be familiar with the different types of powered industrial
  trucks and their configurations and attachments. The operator must be able to perform daily pre-shift inspections of the truck and modify the daily checklists for each type of truck to suit the workplace
  needs. The operator must be aware of the OSHA standards for powered industrial trucks and ensure compliance with the agency's regulations. The operator must be able to attend the educational events for
  National Forklift Safety Day at the Hyatt Capitol Hill in Washington, DC.
