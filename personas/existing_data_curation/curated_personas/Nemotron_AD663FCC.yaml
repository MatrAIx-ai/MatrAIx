personas:
  professional: David Williams is a budding helper in his preschool, meticulously sorting crayons, arranging puzzle pieces in order, and gently reminding classmates to clean up, reflecting an early love
    of structure and dependable responsibility.
  sports: David Williams participates in the Clover Tiny Tots soccer club, practices structured drills on Saturday mornings, and cheers for the Carolina Panthers during family game nights, enjoying the
    predictable routine and the camaraderie of his small teammate group.
  arts: David Williams spends his afternoons drawing bright dinosaurs, dancing to Sesame Street melodies, and singing every line of Frozen’s 'Let It Go', indulging his creative side while often preferring
    solo play.
  travel: David Williams loves family trips to Myrtle Beach and short drives to historic Charleston, where he enjoys the familiar stops for snacks and the chance to collect shells, yet gets restless on
    long flights to Disney World, preferring a predictable itinerary.
  culinary: David Williams adores buttery biscuits, creamy mac and cheese, and crispy chicken nuggets, proudly sprinkling a pinch of hot sauce on his fries and helping stir the gravy with his trusty wooden
    spoon, showcasing his emerging culinary confidence.
  core: David Williams is a three‑year‑old who thrives on tidy routines, insists on lining up his toy trucks before play, but secretly giggles when surprise balloons appear at church picnics.
background:
  cultural: David is raised in a white Southern American family in Clover, South Carolina. His upbringing includes frequent family meals featuring Southern dishes, attendance at a local church with Sunday
    school, and participation in community events like church picnics and neighborhood barbecues. The family values routine, politeness, and close‑knit relationships, reinforcing his preference for structure
    and small‑group interactions.
