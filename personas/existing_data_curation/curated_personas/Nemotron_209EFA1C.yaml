  hobbies: '[''visiting art museums'', ''painting'', ''reading contemporary literature'', ''philosophy'', ''writing essays'', ''hiking'', ''cooking experimental recipes'', ''attending small gallery openings'',
    ''participating in book club'', ''listening to public lectures on new ideas'']'
  career_goals: Linda aims to advance to a senior underwriting leadership position within the next five years, focusing on emerging risk categories such as cyber liability and climate‑related exposures.
    She plans to earn the Chartered Property‑Casualty Underwriter (CPCU) designation and spearhead the development of a niche practice in fine‑art and cultural‑property insurance, integrating advanced data‑analytics
    and AI tools into underwriting workflows. Additionally, she aspires to publish thought‑leadership articles in industry journals, mentor junior underwriters, and influence underwriting best practices
    that balance rigorous risk analysis with innovative, creative solutions.
