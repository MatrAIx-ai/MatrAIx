personas:
  professional: Jessica Wooten is a veteran hazardous‑materials specialist with decades of hands‑on expertise in asbestos and lead‑paint abatement, and they bring a methodical, safety‑first mindset and
    quiet assertiveness to meticulous site assessments, rigorous crew training, and a steady pursuit of CHMM and CSP credentials to mentor the next generation of removal workers.
  sports: Jessica Wooten maintains their fitness by walking the Shelby Farms trails four times a week, joining a senior tennis league at the Riverfront Community Center, cheering on the Memphis Grizzlies
    during the NBA season and the Memphis Redbirds in summer, and they often play casual corn‑hole during family board‑game nights.
  arts: Jessica Wooten finds artistic solace in photographing Memphis riverfront sunsets, listening to the soulful blues of B.B. King, Al Green, and Otis Redding, and they occasionally attend intimate performances
    at the New Daisy Theatre, while their appreciation for historical nonfiction by David McCullough and DIY guides fuels their creative problem‑solving.
  travel: Jessica Wooten prefers well‑planned, low‑stress trips that blend quiet exploration with family connection, and they have enjoyed weekend getaways to historic Charleston, the blues‑rich streets
    of New Orleans, and scenic hikes in the Great Smoky Mountains, while dreaming of a leisurely river cruise along the Mississippi to experience the birthplace of their favorite music.
  culinary: Jessica Wooten delights in baking Southern desserts, especially pecan pie with a flaky, buttery crust made from real butter and fresh pecans, and they skillfully prepare classic dishes like
    fried catfish, collard greens simmered with smoked ham hocks, and sweet tea sweetened with a touch of cane sugar, often pairing meals with locally roasted coffee and a glass of bourbon on special occasions.
  core: Jessica Wooten is a methodical, safety‑obsessed hazardous‑materials veteran whose love for quiet gardening, blues music, and precise budgeting reflects a balanced blend of curiosity, tradition,
    and practical self‑care, and they approach each day with disciplined calm.
background:
  cultural: Jessica grew up in a middle-class, white Southern family in Memphis, Tennessee. Her upbringing was shaped by the city's rich musical heritage, the close-knit neighborhood communities, and a
    Protestant (Baptist) church tradition emphasizing service, modesty, and respect for tradition. The cultural landscape of Memphis, with its blues roots, Civil Rights history, and community festivals,
    has instilled in her a deep sense of local pride and hospitality. While she values the continuity of Southern customs such as family gatherings, home-cooked meals, and community involvement, she also
    embraces the diverse cultural influences that define modern Memphis.
attributes:
  skills: '[''Hazardous Materials Identification'', ''Asbestos Abatement'', ''Lead-Based Paint Removal'', ''Chemical Spill Containment'', ''OSHA and EPA Regulatory Compliance'', ''Site Risk Assessment'',
    ''Personal Protective Equipment (PPE) Selection and Fitting'', ''Hazardous Waste Packaging and Labeling'', ''Decontamination Procedures'', ''Emergency Response Coordination'', ''Safety Training and
    Mentorship'', ''Detailed Documentation and Record-Keeping'', ''Equipment Maintenance and Calibration'', ''Project Planning and Scheduling'', ''Team Leadership in Small Crews'', ''Problem-Solving Under
    Pressure'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical nonfiction and DIY guides'', ''Listening to Memphis blues and soul music'', ''Baking Southern desserts'', ''Photography of riverfront and
    historic neighborhoods'', ''Board game nights with family'', ''Volunteering with Habitat for Humanity'', ''Walking the Mississippi River trail'']'
  career_goals: She aims to obtain the Certified Hazardous Materials Manager (CHMM) and Certified Safety Professional (CSP) credentials within the next two years, leveraging her practical experience to
    transition into a supervisory and mentoring role. Jessica plans to develop a structured apprenticeship program for entry-level removal workers, ensuring the next generation inherits her diligent, safety-first
    ethos. As she approaches retirement, she envisions consulting for local small-business owners on compliance and safe waste disposal, and volunteering to lead community workshops on household hazardous
    waste management in Memphis.
