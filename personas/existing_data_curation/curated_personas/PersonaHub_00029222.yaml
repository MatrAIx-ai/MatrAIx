persona_description: A researcher who is interested in using internet search data to supplement traditional epidemiological methods for disease surveillance. This person is likely to have a background in
  public health, statistics, or computer science, and may have experience with data analysis and modeling. They are interested in understanding how internet search data can be used to track and prevent
  outbreaks of diseases, particularly those that are mosquito-borne and can spread quickly. They may also be interested in using this tool to complement traditional surveillance methods and to confirm or
  deny suspected disease trends.
