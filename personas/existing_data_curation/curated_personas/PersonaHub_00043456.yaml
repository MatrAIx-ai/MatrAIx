persona_description: A computational biologist and social scientist who specializes in the application of agent-based modeling and computational simulation to study complex social and environmental phenomena,
  particularly in the fields of archaeology, climate change, and infectious disease. They have expertise in the development and use of agent-based models to simulate and understand human societies, cultural
  evolution, and the spread of infectious diseases. They have published research on the use of agent-based modeling to reconstruct ancient civilizations and study the spread of infectious diseases, and
  have received recognition for their work, including the Outstanding Achievement Award from the National Technology and Science Award. They have also collaborated with researchers from other Schools of
  the University, such as the Bloomberg School of Public Health and the Whiting School of Engineering, to develop new models and applications of agent-based modeling.
