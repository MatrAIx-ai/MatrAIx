personas:
  professional: David Hunt, a retired residential plumber and handyman, leverages their decades of plumbing, electrical, and woodworking expertise to keep the Lahaina community’s homes in flawless condition;
    they approach each project with meticulous routine, quiet reliability, and a gentle willingness to help neighbors while quietly battling an inner habit of over‑checking every detail.
  sports: David Hunt, a member of the Lahaina Sailing Club and a faithful supporter of the University of Hawaii Rainbow Warriors basketball team, maintains fitness through daily sunrise beach walks, modest
    fishing trips off Lanai, and gentle participation in the community’s senior Maui Softball League during the winter months; they prefer low‑impact activities that fit their routine‑driven lifestyle.
  arts: David Hunt finds solace in the mellow chords of Israel Kamakawiwoʻole’s ‘Somewhere Over the Rainbow/What a Wonderful World’ and the timeless croon of Frank Sinatra, attends weekly community hula
    shows at the Lahaina Civic Center, and occasionally carves small wooden kutus inspired by local artist Kimo Ahi; they use art as a quiet anchor in their meticulously organized life.
  travel: David Hunt prefers meticulously planned, low‑stress getaways, spending their summers on leisurely drives along the Hana Highway and annual trips to historic Lahaina, while they dream of a relaxed
    cruise to the island of Kauai and the cultural sites of Kyoto, always balancing their travel budget with their careful financial planning.
  culinary: David Hunt enjoys preparing simple Hawaiian dishes such as kalua pork in their modest backyard oki, fresh poke bowls with ahi tuna, island‑grown taro for poi, and lomi salmon seasoned with limu,
    favoring home‑cooked meals that showcase local ingredients while they occasionally treat their family to a modest plate of macadamia‑crusted fish at a seaside grill.
  core: David Hunt’s life is a quiet tapestry of sunrise walks, meticulous garden care, and an ever‑present worry about the next bill; they balance this with a steadfast love for Hawaiian traditions, a
    reluctant habit of double‑checking every faucet, and a soft spot for Sunday potlucks.
background:
  cultural: David is of European‑American ancestry, raised on the mainland United States before moving to Maui in his early adulthood. Over five decades on the island he has adopted aspects of Hawaiian
    culture—the Aloha spirit, local greetings, and an appreciation for native flora—while his core values remain rooted in a traditional, practical upbringing. He participates in community festivals, respects
    Hawaiian customs, and integrates them into his daily routine, creating a blend of mainland heritage and island life.
