personas:
  professional: Fred Ashley, a seasoned electrician and aspiring master‑licensor, merges practical curiosity with meticulous planning to design solar‑enhanced smart‑home upgrades, they leverage a sociable
    communication style to mentor apprentices and soothe client worries while staying vigilant about code compliance.
  sports: Fred Ashley, an avid outdoor enthusiast, hikes the Green River Trail, follows the Wyoming Cowboys football team, volunteers as a junior coach for a local youth soccer league, they also play pickup
    basketball at the community center and prefer sunrise runs to mitigate their anxiety.
  arts: Fred Ashley, a community‑theater aficionado, stars in productions of "Our Town" and "Les Misérables", strums acoustic renditions of John Prine and Neil Young at local open‑mic nights, they curate
    monthly folk‑music gatherings and often quote song lyrics to ease their own worries.
  travel: Fred Ashley, a family‑oriented explorer, spends summer weekends camping in Yellowstone, has a bucket‑list of photographing the aurora borealis in Iceland, they plan occasional road trips to the
    Grand Canyon, but budget constraints keep international travel limited.
  culinary: Fred Ashley, a modest home‑cook, perfects smoked trout from the Green River, whips up hearty bison chili with jalapeños, they occasionally treat the family to a craft‑beer‑paired steak, though
    they tend to over‑season dishes in a frantic attempt to impress guests.
  core: Fred Ashley balances a practical, tech‑savvy electrician career with a sociable, musical soul, they often wrestle with worry but find calm in river walks, guitars, and community service.
background:
  cultural: Fred grew up in Green River, Wyoming, a small town with a close‑knit, working‑class community. His upbringing emphasized self‑reliance, respect for the natural environment, and a strong work
    ethic rooted in the western frontier tradition. Family gatherings often revolved around outdoor activities, community service, and practical skill‑sharing, which fostered his appreciation for hands‑on
    problem solving. While identifying as white, Fred’s cultural identity is shaped more by the regional values of modesty, neighborly support, and a pragmatic approach to life rather than any singular
    ethnic narrative. He maintains ties to local institutions such as the town church, the volunteer fire department, and the community college, reflecting a commitment to contributing positively to his
    community.
attributes:
  skills: '["Residential wiring and rewiring", "Commercial electrical systems", "Electrical code compliance (NEC)", "Troubleshooting and diagnostics", "Solar photovoltaic installation", "Smart home automation
    and IoT integration", "Blueprint and schematic reading", "Project planning and scheduling", "Team leadership and apprenticeship mentorship", "Customer communication and conflict resolution", "Safety
    training and OSHA compliance", "Basic HVAC and low‑voltage systems"]'
  hobbies: '["Hiking in the Wyoming wilderness", "Fly fishing on the Green River", "Camping and backcountry cooking", "Playing acoustic guitar at local venues", "Participating in community theater productions",
    "Building smart‑home prototypes", "DIY home improvement projects", "Mentoring youth apprentices in electrical trades", "Photography of prairie landscapes", "Leading mindfulness walks for stress relief"]'
  career_goals: Fred aims to achieve Master Electrician licensure within the next two years and subsequently obtain a contractor’s license to launch his own electrical firm focused on sustainable residential
    retrofits and smart‑home installations throughout Sweetwater County. He envisions creating a workplace culture that prioritizes safety, teamwork, and mental‑well‑being, offering structured mentorship
    programs for new tradespeople. Additionally, Fred plans to volunteer his expertise on community projects—installing solar power for low‑income households—and to pursue an Associate’s degree in Electrical
    Engineering to deepen his technical knowledge and expand his service offerings.
