  hobbies: '[''Reading classic literature and fantasy novels'', ''Personal journaling and poetry'', ''Watercolor painting of landscapes'', ''Gardening (herbs and seasonal flowers)'', ''Birdwatching in the
    Shenandoah Valley'', ''Puzzle solving (crosswords, Sudoku)'', ''Beginner coding tutorials for personal organization'']'
  career_goals: Autumn aspires to turn her compassion and structured mindset into a career that supports young people facing emotional challenges. She aims to pursue a bachelor's degree in psychology, followed
    by graduate training in counseling or clinical child psychology, with the long-term goal of working as a school counselor or therapist where she can create safe, organized spaces for students to seek
    help. She also envisions a secondary path in library science, valuing the quiet atmosphere of libraries and the opportunity to guide peers toward knowledge. In any role, she hopes to design programs
    that combine clear organization with emotional support, ultimately fostering harmony within her community.
