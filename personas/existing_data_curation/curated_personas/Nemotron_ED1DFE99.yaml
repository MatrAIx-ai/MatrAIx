  hobbies: '["Abstract water-color painting", "Reading poetry and magical-realist fiction", "Gardening (native roses and herbs)", "Quilting (hand-woven textile art)", "Sketching nature on hikes", "Attending
    a small women''s craft circle", "Listening to vintage jazz"]'
  career_goals: Approaching retirement, Seely aims to cement her legacy as the most efficient office supervisor in her organization. She is targeting the upcoming Senior Office Manager position, hoping
    to lead a broader team and implement a departmental redesign that incorporates her creative workflow solutions. Over the next two years, she plans to mentor at least two junior administrative assistants,
    guiding them toward supervisory roles. Simultaneously, she dreams of launching a small community-focused art studio where she can teach hand‑painting and quilting to local seniors, eventually organizing
    an annual showcase of participants’ work. She also hopes to compile a memoir of her life’s journey, reflecting on her Southern upbringing, career challenges, and artistic passions, and to see it published
    through a self‑publishing platform.
