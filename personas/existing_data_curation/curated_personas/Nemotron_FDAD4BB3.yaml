  hobbies: '[''Gardening'', ''Quilting'', ''Historic preservation volunteering'', ''Bridge (card game)'', ''Reading historical fiction'', ''Walking along the Ohio River'', ''Cooking traditional Midwestern
    dishes'', ''Exploring sustainable building practices'']'
  career_goals: Debbie aims to transition into a part‑time safety supervisor role, overseeing training on best practices and volunteering her construction skills with Habitat for Humanity to help build
    affordable housing in her community. She also aspires to document her five decades of experience in a guide for older construction workers, ensuring that the practical knowledge she has accumulated
    remains accessible to future generations. Maintaining her health and staying active in the local labor union’s mentorship program are additional personal ambitions for her retirement years.
