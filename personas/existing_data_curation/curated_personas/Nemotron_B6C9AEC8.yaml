  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Gallery Visits'', ''Reading Contemporary Fiction'', ''Art Theory'', ''Yoga'', ''Meditation'', ''Cooking South Indian Cuisine'', ''Fusion Cooking'',
    ''Volunteering at Community Art Workshops'', ''Travel to Cultural Festivals'', ''Photography'']'
  career_goals: She aims to advance to a senior director position within a cultural institution or nonprofit arts organization, where she can shape community-focused arts programming and champion inclusive
    access to the arts. In the next five years, she plans to lead a regional arts initiative in New Jersey, develop partnerships with schools and local businesses, and possibly launch her own consultancy
    that helps corporations integrate creative thinking into their strategic processes. She also aspires to mentor emerging arts professionals and pursue a graduate certificate in nonprofit management.
