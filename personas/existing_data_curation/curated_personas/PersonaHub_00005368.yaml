persona_description: A climate scientist who studies the impact of climate change on food production, particularly barley, and how it could affect global beer production. This person is interested in understanding
  how extreme climate events, such as droughts and heatwaves, may impact barley yields and, consequently, beer production. They are also aware of the potential economic and social consequences of declining
  beer production, particularly in less affluent countries.
