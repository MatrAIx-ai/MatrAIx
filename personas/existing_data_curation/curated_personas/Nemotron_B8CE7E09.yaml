  hobbies: '[''Beach volleyball'', ''Pickup basketball'', ''Kayaking'', ''Acoustic guitar'', ''Spontaneous road trips'', ''Community charity runs'', ''Volunteer work at senior centers'', ''Reading psychology
    and neuroscience'', ''Group dance classes'', ''Cooking experimental meals'']'
  career_goals: David aims to become an Orthopedic Clinical Specialist and eventually open a community-focused physical therapy clinic that blends conventional rehab with integrative wellness services such
    as yoga and aquatic therapy. He is driven to mentor junior therapists, develop streamlined patient education programs, and expand his outreach through free mobility workshops for underserved populations
    in Jacksonville. Improving his organizational skills to handle clinic administration efficiently is also a personal priority.
