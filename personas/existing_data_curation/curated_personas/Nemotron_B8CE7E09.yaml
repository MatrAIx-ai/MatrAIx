personas:
  professional: David Rushing, a 33‑year‑old physical therapist in Jacksonville, blends evidence‑based manual therapy with spontaneous, client‑centered exercise design, excels at group rehab sessions and
    rapid treatment adjustments, yet they habitually battle meticulous documentation and deadline pressure.
  sports: David Rushing regularly joins beach volleyball tournaments at Jacksonville Beach, pick‑up basketball games at Riverside Park, paddles the St. Johns River with the Jacksonville Kayak Club, supports
    the Jacksonville Jaguars, and participates in charity runs organized by the local running club, where they thrive on the team spirit.
  arts: David Rushing channels their love for music by playing acoustic guitar at local open‑mic nights, drawing inspiration from John Mayer, Bon Iver, and regional folk singer‑songwriter circles, while
    also attending Jacksonville Theatre productions to recharge their creative spirit, and they often stay after shows to mingle with performers.
  travel: David Rushing prefers spontaneous, weekend road trips to nearby nature escapes like Ocala National Forest and Savannah, Georgia, often using last‑minute deals on Airbnb and enjoys planning itineraries
    on the fly, while dreaming of a future backpacking adventure through New Zealand’s South Island, where they hope to surf and hike.
  culinary: David Rushing’s palate favors fresh Gulf shrimp, grilled fish tacos with mango salsa, avocado toast, and a dash of hot sauce, and they cook simple Mediterranean meals at home while still indulging
    in craft beer tastings at local breweries.
  core: David Rushing is an exuberant, community‑focused therapist whose spontaneous energy and deep compassion drive their life, even as they wrestle with chronic anxiety, disorganized paperwork, and a
    habit of impulsive spending.
background:
  cultural: David grew up in Jacksonville, Florida, within a white, middle-class Southern family that valued community, hospitality, and outdoor recreation. His upbringing was shaped by the relaxed coastal
    lifestyle of the Florida coast, with regular family gatherings, church involvement, and a strong emphasis on helping neighbors. The Southern emphasis on friendliness and "Southern hospitality" informs
    his warm, cooperative approach to patient care, while the region’s multicultural tourist influx exposed him to diverse perspectives, fostering his curiosity for new ideas.
attributes:
