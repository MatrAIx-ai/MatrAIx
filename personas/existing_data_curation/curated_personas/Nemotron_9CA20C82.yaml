  career_goals: Selina aims to finish the associate degree she began in business administration, leveraging her organizational strengths to launch a small home‑based boutique selling handcrafted home décor
    and garden products. She also wants to take on a part‑time role as a community liaison for a local nonprofit focused on environmental stewardship, using her experience in volunteer coordination to expand
    outreach programs. Long‑term, she envisions mentoring younger volunteers and possibly teaching basic budgeting and garden management workshops at the community center.
