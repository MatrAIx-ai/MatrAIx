personas:
  professional: Selina Short is a detail‑oriented volunteer coordinator and aspiring small‑business owner who applies her organized, methodical budgeting and event‑planning expertise, balanced curiosity,
    and assertive compassion to streamline community garden initiatives while laying the groundwork for a home‑based boutique of handcrafted home décor.
  sports: Selina Short enjoys weekend hikes on the Spokane foothills with the local Spokane Hiking Club, participates in a casual 5K run with the Women’s Running Group, and avidly roots for the Spokane
    Chiefs hockey team and the Seattle Seahawks during their seasons.
  arts: Selina Short cultivates her creative spirit by crocheting blankets while listening to the folk harmonies of Gillian Welch, diving into the historical novels of Philippa Gregory, and supporting Spokane’s
    community theater where she admires performances by local actor James Marins, each art form enriching her meticulous yet compassionate outlook on life.
  travel: Selina Short prefers low‑key, nature‑focused getaways, often weekend‑camping in the Columbia River Gorge and planning longer trips to Canada’s Banff National Park and Italy’s Tuscany region to
    study Mediterranean gardens, balancing meticulous itineraries with spontaneous detours to local farmers’ markets wherever she travels.
  culinary: Selina Short, a confident home cook, thrives on turning garden harvests into nutrient‑dense meals like roasted beet and goat‑cheese salad, quinoa‑studded ratatouille, and fresh herb pesto pasta,
    while occasionally indulging in her signature spiced carrot ginger soup, all seasoned with basil, thyme, and a dash of local honey.
  core: Selina Short blends pragmatic organization with a nurturing curiosity, meticulously budgeting every cent while habitually losing track of time on late‑night knitting marathons that leave the garden
    to wilt for a day.
background:
  cultural: Selina grew up in a middle‑class, white family in the Spokane region of Washington, where the Pacific Northwest’s blend of self‑reliance, outdoor recreation, and community involvement shaped
    her values. Her heritage includes German and Scandinavian ancestors, reflected in a practical, no‑frills upbringing that emphasized hard work, education, and modest celebrations of cultural holidays.
    The local culture’s emphasis on environmental stewardship and neighborly collaboration informs her everyday life and community activities.
attributes:
  skills: '["Budget management","Event coordination","Home organization","Gardening","Cooking","Basic computer troubleshooting","Volunteer coordination","First‑aid certification"]'
