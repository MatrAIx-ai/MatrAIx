persona_description: A conservationist with expertise in tiger conservation, particularly in India. They are passionate about the plight of tigers and are committed to finding solutions to the threats they
  face. They have a deep understanding of the challenges of balancing infrastructure development, agricultural expansion, urbanisation, and conflict between people and wildlife, and are working with partners
  to mitigate these threats. They are dedicated to the goal of doubling the tiger population by 2022, but acknowledge that this will require full action, investment, and collaboration from all tiger range
  countries.
