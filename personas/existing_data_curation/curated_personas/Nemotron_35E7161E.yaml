personas:
  professional: Johnny Hall, a budding young engineer who constructs intricate LEGO cities and designs orderly Minecraft realms, shows an early talent for spatial reasoning and systematic problem‑solving,
    and they constantly juggle a love of structure with a desire for spontaneous creativity.
  sports: Johnny Hall, playing striker for the local youth soccer club River Valley Kickers and cheering on Manchester United from the living‑room TV, idolizes Lionel Messi’s dribbling, they sprint after
    every pass with boundless energy, and they also keep an eye on the Chicago Cubs during family weekend barbecues.
  arts: Johnny Hall, drawing superhero comic strips inspired by Stan Lee and immersing themselves in the classic rock sounds of The Rolling Stones, Led Zeppelin, and Pink Floyd while their parents spin
    vinyl, they weave mystery adventure plots from Rick Riordan novels into their panels, channeling that creativity into both paper and pixel.
  travel: Johnny Hall, who has already explored the whimsical lands of Disneyland in Anaheim and trekked the towering redwoods of Muir Woods with family, daydreams about the ancient castles of Edinburgh’s
    Old Town, they prefer guided tours that blend adventure with parental supervision, and they save birthday money for future plane tickets.
  culinary: Johnny Hall, who loves whipping up a cheesy macaroni bake with shredded cheddar, savoring pepperoni pizza slices topped with fresh basil harvested from the garden, and blending strawberry‑banana
    smoothies with a drizzle of honey, they often forget to rinse the mixing bowl, leaving a sticky mess.
  core: Johnny Hall, a nine‑year‑old LEGO architect who worries about every tiny detail, they balance imaginative construction with a habit of leaving soccer cleats on the hallway floor, and constantly
    seek both structure and the freedom to improvise.
background:
  cultural: Johnny is a white American raised in Berlin, Connecticut, a small town with a close‑knit community. His family traces its roots to New England ancestors of English and German descent, celebrating
    typical American holidays such as Thanksgiving and the Fourth of July, and occasionally honoring German heritage with seasonal traditions like Oktoberfest gatherings featuring pretzels and bratwurst.
    This blend of cultural influences informs his appreciation for community events, family meals, and an emphasis on both individuality and collective harmony.
