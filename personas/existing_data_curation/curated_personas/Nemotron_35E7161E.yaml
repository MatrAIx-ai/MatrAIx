  hobbies: '["LEGO building", "Minecraft", "Reading adventure books", "Soccer", "Drawing comic strips", "Classic rock music", "Gardening", "Dog care"]'
  career_goals: Johnny dreams of one day becoming a firefighter because he admires the clear training pathways, disciplined teamwork, and the chance to protect and help his community. He also hopes to work
    as a veterinarian to care for animals, reflecting his love for his family dog and his gentle, nurturing side. In the short term, he wants to excel in school, especially in science and math, to build
    a strong foundation for these future careers, while maintaining a balanced routine that eases his occasional anxiety.
