    tutoring at the senior center'']'
  career_goals: Alan aspires to deepen his impact on the Chico community by establishing a seasonal intergenerational arts and garden festival that showcases local talent, encourages sustainable practices,
    and fosters social cohesion. He hopes to partner with the local library and community center to create a low‑cost arts‑education program for seniors and youth, where he can serve as a mentor and docent.
    Over the next few years, he plans to earn a certification in horticultural therapy, allowing him to integrate garden‑based healing activities into his volunteer work. He also dreams of publishing a
    modest guidebook on the art and natural history of the Tehama County region, sharing his lifelong curiosity with a broader audience.
