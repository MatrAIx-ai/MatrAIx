persona_description: A journalist who specializes in reporting on humanitarian crises, particularly those involving ethnic and religious tensions, and who has covered conflicts in the Central African Republic,
  Sudan, and Darfur. She has a deep understanding of the complex dynamics of power and violence in these regions, and has reported on the human suffering caused by these conflicts. She is well-versed in
  the use of data and statistics to convey the severity of the crisis, and is skilled at analyzing the underlying causes of the conflict. She is also well-versed in the use of multimedia to convey the impact
  of the crisis, and is skilled at using social media to reach a wider audience. She has a strong commitment to social justice and is dedicated to using her reporting to bring attention to the plight of
  those affected by these conflicts.
