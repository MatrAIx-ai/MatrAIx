persona_description: A historian who specializes in the study of the British Raj in India, particularly the events and figures that shaped the city of Kanpur during the period of 1857-1947. Her research
  interests include, but are not limited to, the history of the city, its cultural heritage, and its role in the broader context of British colonialism in India. She is particularly interested in the massacres
  and other violent incidents that occurred in the city during this period, and how they reflect the complexities of the British Raj and its relationship with the Indian people.
