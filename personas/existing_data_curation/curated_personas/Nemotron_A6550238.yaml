personas:
  professional: Felix Kelly is a seasoned janitor in Camdenton who leverages their deep expertise in floor care, basic plumbing, and light carpentry to solve on‑site problems quickly, while their curious
    streak drives them to experiment with eco‑friendly cleaning methods and their relaxed, flexible attitude lets them mentor new staff without strict routines.
  sports: Felix Kelly is an avid follower of the St. Louis Cardinals, attends home games whenever possible, participates in a local hunting club for small‑game season, and spends early mornings fishing
    at Lake of the Ozarks, while also playing pickup basketball at the community center on weekends.
  arts: Felix Kelly’s artistic side shines through their love for classic rock legends like Led Zeppelin and The Rolling Stones, frequent visits to a nearby live‑music bar, and a penchant for crafting rustic
    furniture, where each piece reflects their hands‑on creativity and appreciation for timeless craftsmanship.
  travel: Felix Kelly prefers road‑trip adventures that combine camping, fishing, and exploring the Ozarks’ state parks, yet they dream of a summer getaway to the Canadian Rockies for backpacking, balancing
    the desire for new scenery with the practical need to stay within a modest family budget.
  culinary: Felix Kelly enjoys grilling fresh catfish caught at the lake, whipping up a hearty chicken‑fried steak for family dinners, and experimenting with smoky BBQ rubs that incorporate locally sourced
    honey, though their cooking skills stay mostly at the BBQ‑pit level rather than a gourmet kitchen.
  core: Felix Kelly blends a curious DIY spirit with a laid‑back, sometimes disorganized, approach to life, constantly juggling work, fishing trips, and a growing ambition to launch an eco‑friendly cleaning
    venture.
background:
  cultural: Felix grew up in the small‑town Midwest of Missouri, where his family’s roots trace back to German and Irish immigrants who settled in the region in the early 20th century. The community emphasizes
    self‑reliance, modesty, and a strong work ethic, values that shaped Felix’s practical outlook. Local traditions such as county fairs, church gatherings, and outdoor recreation are a regular part of
    his life, reinforcing a sense of belonging and shared cultural heritage.
