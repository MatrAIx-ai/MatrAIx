  hobbies: '["Fishing", "Hunting", "Camping", "Woodworking", "DIY home improvement", "Listening to classic rock", "Watching baseball", "Community clean-up volunteering", "Gardening", "Model train building"]'
  career_goals: Felix aims to move into a supervisory role within facilities management, such as a lead janitor or building services coordinator, where he can apply his hands‑on knowledge while mentoring
    newer staff. He plans to obtain his GED within the next year and pursue certifications in environmental services and OSHA safety, positioning himself for higher‑pay positions or eventually opening his
    own small cleaning business that emphasizes eco‑friendly practices. His ambition is to achieve a stable income that supports his family while preserving the flexibility he values.
