  career_goals: Melanie aims to develop a professional portfolio that showcases her illustration and storytelling work, eventually securing freelance contracts as a concept artist for indie video games
    or animated projects. She hopes to enroll in a fine‑arts or animation program that offers flexible, project‑based learning, while also planning to launch a community art workshop in Chula Vista that
    provides a creative space for local youth. Long‑term, she envisions a career that blends artistic freedom with community impact, possibly evolving into a creative director for collaborative studios
    that value experimental and inclusive design.
