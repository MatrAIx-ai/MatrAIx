personas:
  professional: Ad Brown, a 21-year-old service technician renowned for precise OBD-II diagnostics, brake and suspension repairs, and custom welding, merges their curiosity and love for street-art into
    bold paint schemes while they maintain a meticulously organized workspace, all in pursuit of ASE Master Technician certification and a future shop that fuses high-performance tuning with artistic design.
  sports: Ad Brown, a regular on the Neighborhood Pythons basketball league, roots for the Chicago Bulls and the Chicago Bears, follows the NASCAR Cup Series for its engineering thrills, trains at the community
    center three times a week, yet they often skip post-game stretches due to late-night gaming.
  arts: Ad Brown, an avid fan of hip-hop and soulful Southern blues (from Kendrick Lamar and Anderson .Paak to The Allman Brothers), regularly creates graffiti-style sketches on canvas and car panels, attends
    local street-art festivals and live shows at The Hideout venue, and they occasionally jam on a portable keyboard while listening to vinyl classics.
  travel: Ad Brown, who plans road trips around regional car events like the Detroit Auto Expo and the Gulf Coast Classic Car Cruise, enjoys weekend getaways to Nashville's music scene and spends free nights
    exploring Austin's live-music bars, prefers budget-friendly Airbnbs over hotels, and they dream of a future overseas trip to Japan's Tokyo Auto Salon.
  culinary: Ad Brown, who enjoys experimenting in the kitchen with smoky barbecue ribs seasoned with paprika, brown sugar and chipotle, crafts loaded nachos piled with jalapenos, queso and pulled pork,
    savors pour-over coffee using beans from a neighborhood roaster, and they admit a weak spot for late-night pepperoni pizza slices.
  core: Ad Brown is a 21-year-old gear-savvy car enthusiast who fuses technical precision with street-art flair, constantly balancing work, play, and a love for music, and they juggle a modest budget and
    occasional backaches.
background:
  cultural: Ad grew up in Goodrich, Texas, within a close‑knit African‑American community where church, family gatherings, and Southern hospitality shape daily life. He was immersed in the rich traditions
    of Black car culture—lowrider aesthetics, custom paint, and a love for powerful rides—while also absorbing the broader Texan values of self‑reliance and community service. Music from gospel choirs to
    hip‑hop played a constant role in his upbringing, and Sunday services taught him the importance of mentorship and giving back. These cultural influences blend with his rural surroundings, creating a
    unique perspective that celebrates both his heritage and the diverse, creative world of automotive art.
attributes:
  skills: '[''Engine diagnostics with OBD‑II scanners'', ''Brake and suspension repair'', ''Electrical system troubleshooting'', ''Welding and metal fabrication'', ''Custom paint and body work'', ''Performance
    tuning and modifications'', ''Customer service and communication'', ''Team collaboration and leadership'', ''Diagnostic software proficiency'', ''Basic hybrid/electric vehicle knowledge'']'
  hobbies: '[''Car restoration and customization'', ''Custom paint and graphic art on vehicles'', ''Attending car shows and meet‑ups'', ''Playing basketball in community league'', ''Listening to hip‑hop,
    R&B, and Southern blues'', ''Street‑style sketching and graffiti drawing'', ''Photography of automobiles'', ''Racing video games'']'
  career_goals: Ad aims to become an ASE Master Technician within the next three years, gaining additional certifications in diesel and electric‑vehicle systems. He plans to open his own custom automotive
    shop that blends high‑performance tuning with artistic paint and body designs, creating a space where car culture meets creative expression. Long‑term, he hopes to establish a mentorship program that
    teaches young people from his community practical automotive skills and fosters appreciation for both technical craftsmanship and artistic design. Continuing education, whether through community‑college
    courses or industry workshops, is a core part of his ambition to stay at the forefront of evolving automotive technologies.
