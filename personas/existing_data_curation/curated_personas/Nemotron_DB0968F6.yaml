personas:
  professional: Zenaida Tran, a budding kindergarten class helper and future explorer, uses their curiosity and love of art to lead story‑time circles, gently encouraging classmates to share ideas while
    they embrace a carefree, flexible approach to classroom responsibilities.
  sports: Zenaida Tran loves swinging on the playground’s monkey bars and kicking a bright orange soccer ball with the local Riverside Rookies kids’ team, they regularly join Saturday soccer clinics while
    also dabbling in beginner swimming lessons at the community pool.
  arts: Zenaida Tran adores watching animated classics like 'Moana' and 'Toy Story', drawing vibrant pictures of the characters with Crayola crayons, and they dance along to catchy tunes by The Wiggles
    and 'Baby Shark' that fill the living room, letting their boundless curiosity shape a playful artistic spirit.
  travel: Zenaida Tran enjoys weekend family trips to the local zoo in San Diego, summer vacations at the sun‑kissed beaches of Santa Cruz, and they dream of spotting pandas at Chengdu’s Research Base in
    China, favoring spontaneous outings over rigid itineraries.
  culinary: Zenaida Tran loves slurping spaghetti with a tangy tomato sauce, munching crunchy carrot sticks, savoring peanut butter‑and‑jelly sandwiches, and they sip sweet mango smoothies made with coconut
    milk, often helping to assemble fruit kebabs with a plastic knife under parental supervision.
  core: Zenaida Tran is a curious, sociable five‑year‑old who blends artistic wonder with a relaxed approach to responsibilities, and they turn everyday moments into colorful adventures.
background:
  cultural: Zenaida is a Vietnamese‑American child growing up in Lake Worth, Florida. At home, her parents speak Vietnamese and preserve traditions such as celebrating Tet (Lunar New Year) with red envelopes,
    festive meals, and lion dance performances. Family gatherings often feature pho, bánh mì, fresh spring rolls, and traditional music. She attends a local Vietnamese cultural center where she participates
    in language classes and community festivals, while also embracing American customs like Halloween and summer camp. This bicultural environment nurtures her curiosity about both her heritage and the
    diverse world around her.
