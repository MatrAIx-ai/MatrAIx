  career_goals: Clemencia aims to complete her high school education or earn a GED within the next two years, then pursue an associate degree in hospitality management or communications at a local community
    college. She envisions leveraging her charisma and cultural roots to eventually open a small café or food kiosk that blends traditional Mexican flavors with a modern, social‑media‑friendly atmosphere.
    In the meantime, she hopes to build a personal brand as a lifestyle influencer, sharing recipes, dance clips, and community‑spotlight videos that celebrate her border‑city heritage.
