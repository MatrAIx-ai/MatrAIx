persona_description: A healthcare professional who is dedicated to reducing the incidence of Group B Streptococcus (GBS) infection in newborn babies in the United States. They have experience with the implementation
  and evaluation of screening and treatment protocols for GBS, and are passionate about improving the standard of care for mothers and newborns. They are knowledgeable about the history and evolution of
  GBS testing and guidelines in the USA, and have experience with the universal screening programme that has led to a significant reduction in GBS infection in newborns in the US. They are committed to
  advocating for a wider-ranging screening programme in the UK, and are knowledgeable about the devastating effects of GBS infection on babies and their families.
