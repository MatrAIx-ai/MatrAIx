persona_description: A biologist who specializes in the study of animal behavior, particularly the social and emotional aspects of primates. They have a deep understanding of the root of human morality
  in the sociality exhibited by the primates and the evolution of co-operative behavior. They are likely to be interested in the development of moral reasoning and decision-making processes in humans and
  other primates, and to have a unique perspective on the relationship between morality and reason. They are likely to be open-minded and willing to consider the role of emotions and emotional intelligence
  in moral development.
