personas:
  professional: Angela Scott, a 28‑year‑old investigative detective, combines methodical research, digital forensics, and persuasive case storytelling with a sociable, competitive edge—leveraging their
    emotional stability to thrive under pressure while occasionally embracing a relaxed, disorganized workflow as they chase the Certified Professional Investigator credential and envision launching a boutique
    fraud‑and‑missing‑person agency.
  sports: Angela Scott fuels their high‑energy lifestyle through weekly hikes in the San Bernardino foothills, membership in a local women's recreational soccer league affiliated with the LA Galaxy fan
    group, and avidly follows the Los Angeles Lakers and Los Angeles Dodgers, using these outlets to blend competitive spirit with seasonal outdoor fitness.
  arts: Angela Scott channels their narrative flair into improv performances with a local troupe, salsa dancing to the rhythms of Celia Cruz, and street photography inspired by Henri Cartier‑Bresson, while
    unwinding with true‑crime podcasts hosted by Sarah Koenig and classic noir novels by Raymond Chandler that together shape their artistic identity.
  travel: Angela Scott favors a hybrid travel style—organizing group hiking expeditions to nearby Joshua Tree, spontaneous weekend getaways to Mexico City, and occasional road trips along the Pacific Coast—while
    dreaming of a future solo adventure in Iceland’s geothermal landscapes, all balanced against a modest travel budget and a busy investigative career.
  culinary: Angela Scott delights in crafting carnitas tacos with pickled red onions, mastering bibimbap bowls seasoned with gochujang, and savoring spicy miso ramen at local eateries, pairing a moderate
    home‑cooking prowess with a penchant for street‑food flavors and occasional late‑night coffee‑fueled meal prep after a night of improv.
  core: Angela Scott merges razor‑sharp investigative discipline with a sociable, adventure‑driven streak, turning nightly improv jokes and trail hikes into tools for uncovering truth while navigating life
    with a competitively restless yet emotionally steady compass.
background:
  cultural: Angela grew up in a middle‑class, White Anglo‑American family in the suburban outskirts of Riverside County. Her upbringing blended mainstream Southern Californian values—like independence,
    self‑reliance, and a love for outdoor recreation—with exposure to the region’s diverse communities, especially the vibrant Latino culture present in Corona. This multicultural environment nurtured her
    sociable, outgoing personality and gave her a practical appreciation for varied viewpoints. Her bachelor's degree in arts and humanities deepened her interest in storytelling, film noir, and historical
    contexts, which now inform both her investigative methods and personal hobbies.
attributes:
  skills: '[''investigative research'', ''surveillance'', ''witness interviewing'', ''critical analysis'', ''digital forensics'', ''photographic documentation'', ''evidence collection'', ''report writing'',
    ''self‑defense (Krav Maga)'', ''negotiation'', ''networking'', ''case narrative development'']'
  hobbies: '[''hiking in the San Bernardino foothills'', ''improv theater'', ''salsa dancing'', ''true‑crime podcasts'', ''reading noir literature'', ''street photography'', ''volunteering with neighborhood
    watch'']'
  career_goals: Angela aims to obtain her Certified Professional Investigator (CPI) credential and eventually launch her own boutique investigative agency focused on corporate fraud and missing‑person cases
    in Southern California. She wants to build a reputation for delivering swift, reliable results that outpace competing firms, while mentoring newer detectives to raise the profession’s standards. Long‑term,
    she envisions expanding her practice to include a consulting branch that advises law firms on case strategy and evidence handling.
