personas:
  professional: Rachel Mcmillon, they bring over forty years of floor‑care mastery and green‑cleaning expertise to a veteran facilities supervisor role, blending practical problem‑solving with a curious
    drive for sustainable innovations, and using their sociable, compassionate leadership to mentor younger custodial staff while championing a waste‑reduction initiative in a large office complex.
  sports: Rachel Mcmillon, they enjoy weekly line‑dancing at the community center for cardio, hike the Wasatch foothills with their husband as part of the Wasatch Trail Club, support the Utah Jazz and Real
    Salt Lake, and participate in the Silver Sneakers walking group, balancing organized exercise schedules with the flexibility to join spontaneous community scrambles.
  arts: Rachel Mcmillon, they are an enthusiastic backstage crew member of the local theater, delight in the works of Stephen Sondheim, devour mystery novels by Agatha Christie and Tana French, and channel
    their compassionate energy into quilting vibrant blankets for church donations while quoting favorite authors during rehearsals.
  travel: Rachel Mcmillon, they prefer well‑planned road trips that blend adventure and comfort, having explored Utah’s national parks like Zion and Bryce, visited Rome for its historic cuisine, trekked
    Kyoto’s bamboo groves, and now hoping to hike Patagonia’s Torres del Paine with their husband, all while budgeting travel expenses through a dedicated savings account.
  culinary: Rachel Mcmillon, they cook hearty comfort meals such as tomato basil soup, chicken pot pie, and apple cinnamon crumble, expertly incorporate fresh garden herbs like basil and rosemary into dishes,
    enjoy baking brownies and holiday cookies for church fundraisers, and, while modest in culinary ambition, proudly experiment with seasonal vegetable stir‑fries.
  core: Rachel Mcmillon, they fuse decades of practical cleaning expertise with a curious, compassionate spirit, turning community service, sustainable living, and lively hobbies into a vibrant, organized
    yet flexible lifestyle.
background:
  cultural: Rachel grew up in a middle‑class white family in the Intermountain West, spending her childhood in a small Utah town where community service and self‑reliance were everyday values. Influenced
    by the region’s pioneer heritage and a strong LDS (Latter‑Day Saint) cultural presence, she learned the importance of modesty, family cohesion, and helping neighbors. Living in Layton, Davis County,
    she has absorbed a blend of suburban, outdoor, and multicultural experiences, allowing her to appreciate both traditional Midwestern work ethic and the growing diversity of Utah’s modern communities.
