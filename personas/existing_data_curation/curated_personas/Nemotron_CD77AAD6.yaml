  hobbies: '[''Line dancing'', ''Community theater (backstage crew)'', ''Gardening'', ''Hiking in the Wasatch foothills'', ''Reading mystery novels'', ''Quilting'', ''Cooking and baking'', ''Volunteer work
    at food bank'']'
  career_goals: While approaching retirement, Rachel aims to step into a supervisory role where she can mentor younger custodial staff and spearhead a sustainability initiative that reduces chemical waste
    in her building. She plans to obtain a Certified Professional Cleaner (CPC) credential and develop a short‑course training program for new hires focused on safety and eco‑friendly practices. Beyond
    work, Rachel hopes to volunteer her expertise to local schools and community centers, helping them maintain clean, healthy environments.
