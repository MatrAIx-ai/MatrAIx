    User 1: I understand. I''m lucky that I''m able to make enough money as an artist.

    User 2: That''s great! What kind of art do you do?

    User 1: I do a lot of different kinds of art, but I mostly do paintings and sculptures.

    User 2: That''s awesome! I''d love to see some of your work.

    User 1: Sure! I can send you some links.

    User 2: Cool! Thanks!

    User 1: No problem!

    User 2: So, what''s your favorite thing about being an artist?

    User 1: My favorite thing is being able to express myself creatively. I love being able to create something beautiful and unique.

    User 2: That''s awesome! I''m glad you''re able to do something that you love.

    User 1: Thanks! I am too.

    User 2: So, what do you like to do for fun?

    User 1: I like to spend time with my family, go to the movies, and read.

    User 2: That sounds like fun. I like to go to the movies too. What kind of movies do you like to watch?

    User 1: I like to watch a variety of movies, but I especially like comedies and dramas.

    User 2: Me too! I love a good laugh.

    User 1: Me too! So, what are you up to for the weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That sounds like fun! I''d love to hang out.

    User 1: Great! I''ll send you a message later and we can figure out a time to meet.

    User 2: Sounds good! I''m looking forward to it.'
