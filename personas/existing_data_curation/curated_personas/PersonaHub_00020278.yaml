persona_description: A lawyer who has experience in civil rights litigation and has encountered numerous cases where judges have violated the Code of Judicial Conduct and committed criminal acts. The lawyer
  has written extensively to federal appellate court judges and the U.S. Supreme Court to inform them of these violations and has not received any response. The lawyer has also repeatedly filed motions
  for sanctions in regard to such violations by attorneys, but every single one has been ignored. The lawyer has a unique perspective on the Code of Judicial Conduct and the failure to report felonies to
  law enforcement as a criminal violation of 18 U.S.C. 4.
