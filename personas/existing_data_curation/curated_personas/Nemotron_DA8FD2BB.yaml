  career_goals: Brittney aims to attend a college with a strong pre‑nursing program, earn a Bachelor of Science in Nursing, and become a registered nurse specializing in pediatric care. She is motivated
    by the desire for a stable, respected career that allows her to apply her reliable nature and organizational strengths to help others. She plans to maintain top grades, secure a merit‑based scholarship,
    and later obtain advanced certification so she can eventually take on a leadership role in a community health clinic or become a nurse educator. Her competitive drive pushes her to be at the top of
    her class and to earn recognition for academic and service achievements.
