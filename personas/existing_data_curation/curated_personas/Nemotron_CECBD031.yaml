personas:
  professional: Yokaira Alonso is a budding robotics enthusiast who channels their curiosity and methodical nature into building complex Lego structures and programming simple robot tasks, always planning
    each step on paper before execution, while also sketching architectural ideas for future cityscapes, and they eagerly share their prototypes with classmates.
  sports: Yokaira Alonso enjoys after‑school soccer with the Springfield Junior Tigers, cheers for the Los Angeles Stars during the World Cup, and spends summer afternoons swimming at the community pool,
    balancing team play with solo bike rides for personal fitness, and they often practice penalty kicks after school.
  arts: Yokaira Alonso explores the City Art Museum and the Interactive Gallery every quarter, sketches scenes inspired by Monet’s water lilies and Banksy’s street stencils, and devotes weekend evenings
    to learning classical pieces on the piano, their curiosity driving them to blend visual and auditory art, and they regularly organize mini‑exhibits of their sketches for family.
  travel: Yokaira Alonso prefers family‑planned road trips that blend museum stops in Washington, D.C., a hiking adventure in the Grand Canyon, and occasional beach days in San Diego, savoring both structured
    itineraries and spontaneous sandcastle building, and they keep a travel journal to note each new sight.
  culinary: Yokaira Alonso delights in helping grandparents in the kitchen, mastering the art of rolling fresh tortillas, chopping avocado for guacamole, and seasoning tacos with a dash of lime and cumin,
    while also proudly baking chocolate chip cookies from scratch on weekend afternoons, and they love sharing the fresh dishes with friends.
  core: Yokaira Alonso is a curious, organized ten‑year‑old who balances art, robotics, and kitchen adventures with a meticulous allowance plan and a knack for worrying about the smallest details, and they
    often double‑check their schedules before bedtime.
background:
  cultural: Yokaira comes from a Mexican-American family that maintains strong ties to Mexican traditions while embracing the multicultural environment of Houston. She speaks both Spanish and English at
    home, celebrates Día de los Muertos and Mexican Independence Day with family gatherings, enjoys traditional foods like tamales and pozole, and participates in community events hosted by the local Hispanic
    cultural center. The values of family cohesion, respect for elders, and communal harmony shape her outlook and interpersonal style.
