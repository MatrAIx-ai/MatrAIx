persona_description: A professional software developer who specializes in coding and working with various coding schemes, including encoding schemes. They are familiar with the different types of encoding
  schemes, such as IBM-PC, IBM EBCDIC, ASCII, ISO/IEC 7-bit and 8-bit, ISO/IEC 10646 UCS, and Unicode encoding formats, and how they can be used to encode and decode data. They have experience with code
  page conversion, and are knowledgeable about the risks and benefits of using different coding schemes. They are also familiar with the Unicode Standard and its benefits in data interchange.
