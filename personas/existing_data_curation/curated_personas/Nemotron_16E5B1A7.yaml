  career_goals: Although officially retired, Robb aims to channel his engineering experience into community service and knowledge transfer. He plans to volunteer as a technical advisor for York’s municipal
    infrastructure projects, mentor high‑school and college students through local STEM outreach programs, and author a memoir that captures the evolution of American manufacturing from his perspective.
    He also wishes to continue competing in model‑train exhibitions and to contribute to preserving York’s industrial heritage through the local historical society. His overarching ambition is to leave
    a lasting, practical legacy that blends his curiosity with his desire to give back.
