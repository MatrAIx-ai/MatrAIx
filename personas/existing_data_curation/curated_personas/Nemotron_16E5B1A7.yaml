personas:
  professional: Robb Kapetanakis, a retired mechanical and systems engineer, leverages decades of CAD, Fortran, and project management expertise to mentor youth STEM workshops and advise York’s municipal
    infrastructure, blending methodical precision with a curiosity for new technology.
  sports: Robb Kapetanakis follows the Pittsburgh Steelers and the York Revolution with fervor, plays chess at the York Senior Center Chess Club where they compete in weekly tournaments, and participates
    in a local vintage tractor club’s annual rally, mixing strategic thinking with a love of hands‑on competition.
  arts: Robb Kapetanakis enjoys the blues of B.B. King, the classical symphonies of Beethoven, and the poetry of C. P. Cavafy, while spending evenings reading mystery novels by Agatha Christie and attending
    quarterly performances at the York Community Theatre.
  travel: Robb Kapetanakis prefers meticulously planned road trips, having explored the Greek islands of Crete and Santorini to trace family roots, while also delighting in weekend drives through Pennsylvania’s
    Amish Country and annual visits to the historic Gettysburg battlefield.
  culinary: Robb Kapetanakis delights in preparing moussaka, spanakopita, and baklava using garden‑fresh oregano, rosemary, and heirloom tomatoes, and balances their cooking with hearty Pennsylvania Dutch
    chicken pot pie on casual family gatherings.
  core: Robb Kapetanakis is a pragmatic tinkerer who channels a lifetime of engineering precision into community mentorship, while occasionally letting a stubborn streak cause them to argue over the correct
    gauge of a model‑train track.
background:
  cultural: Robb descends from Greek immigrants who settled in Pennsylvania’s steel towns in the early 20th century. Raised in a bilingual household, he grew up attending the Greek Orthodox Church and celebrating
    cultural festivals, which instilled a respect for family, education, and community service. While he embraces his American identity—particularly the pragmatic, independent spirit of York, Pennsylvania—he
    maintains ties to his heritage by cooking traditional Greek cuisine, participating in the local Greek community events, and preserving his family’s stories. This blend of Greek cultural values and Pennsylvanian
    middle‑class upbringing shapes his worldview.
