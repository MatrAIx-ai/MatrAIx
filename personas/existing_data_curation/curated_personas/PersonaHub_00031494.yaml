persona_description: A high school guidance counselor or administrator who is committed to preventing dropouts and ensuring that at-risk students receive the necessary support and attention. They are familiar
  with the challenges of managing large numbers of students and the importance of early intervention. They are interested in using technology to improve their work and have a strong interest in data-driven
  solutions. They are likely to have experience with software systems and are open to new tools and approaches to help them do their job more effectively. They are also likely to be interested in the economic
  impact of dropout rates and are committed to finding solutions that can help to reduce them.
