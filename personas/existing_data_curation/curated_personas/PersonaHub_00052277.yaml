persona_description: A climate change advocate and futurist who is deeply concerned about the impact of fossil fuels on the environment and the future of the planet. This person is interested in exploring
  the potential of electric vehicles and solar power to mitigate the effects of climate change and slow down the growth of fossil fuels. They are likely to be familiar with the Grantham Institute at Imperial
  College London and the Carbon Tracker Initiative, as well as the potential of emerging technologies such as printable solar photovoltaics. They may also be aware of the importance of reducing carbon emissions
  from other sectors such as heating buildings and heavy industry.
