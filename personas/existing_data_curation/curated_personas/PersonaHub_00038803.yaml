persona_description: A healthcare provider who specializes in the management of patients with moderate-to-severe protein-calorie malnutrition, particularly those with conditions such as stroke, motor neuron
  disease, multiple sclerosis, Parkinson disease, cerebral tumors, head and neck cancers, burns, cystic fibrosis, abdominal malignancy, esophageal malignancy, prolonged coma, neurologic diseases, psychomotor
  retardation, HIV/AIDS, cystic fibrosis, Crohn disease, short bowel syndrome, and distal gastric obstruction. The healthcare provider is experienced in the use of PEG tube placement and has a deep understanding
  of the ethical and clinical considerations involved in this procedure. They are knowledgeable about the relative contraindications and absolute contraindications to PEG tube placement, as well as the
  importance of patient education and informed consent. They are skilled in performing the PEG tube placement procedures, including the peroral pull technique, the peroral push technique, and the direct
  percutaneous procedure, and are able to optimize the location of the tract for feeding tube insertion.
