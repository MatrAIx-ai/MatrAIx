persona_description: A conservationist and environmental advocate who is passionate about protecting pronghorn antelope and their migration route through Craters of the Moon National Monument and Preserve
  in Idaho. They are committed to working with landowners, conservationists, and public lands managers to safeguard the large family ranches that have helped support this migration route over the past 100
  years. The persona is knowledgeable about pronghorn ecology, habitat management, and the challenges facing the migration route due to development pressure and growing interest in large-scale wind farms.
  They are also aware of the importance of considering wildlife needs in fencing decisions and are actively involved in efforts to remove or modify fences that could interfere with the migration.
