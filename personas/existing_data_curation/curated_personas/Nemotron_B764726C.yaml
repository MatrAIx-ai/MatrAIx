  career_goals: Margie aspires to become a veterinarian, dreaming of one day opening a community-focused animal‑care clinic that also offers low‑cost services for neighborhood pets. She is eager to combine
    her love for animals with her strong communication skills by engaging in outreach programs that educate peers about responsible pet ownership and wildlife conservation. In the short term, she plans
    to volunteer more extensively at the local animal shelter, pursue a pre‑veterinary track in high school, and perhaps start a small pet‑sitting side business to gain hands‑on experience and fund her
    future education at a Michigan state university.
