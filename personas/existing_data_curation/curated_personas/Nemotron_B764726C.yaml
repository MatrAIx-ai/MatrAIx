personas:
  professional: Margie Bridges, a junior student leader and volunteer coordinator at the local animal shelter, leverages their practical focus, outgoing energy, and cooperative assertiveness to organize
    adoption events, manage shelter volunteers, and lead the school soccer team, balancing structured planning with on‑the‑fly improvisation.
  sports: Margie Bridges, a spirited midfield player on their co‑ed school soccer team, thrives on fast‑paced, team‑oriented play, cheers for the United States Women’s National Team, and they spend weekend
    afternoons at Riverside Skatepark as a member of the local skateboard club, honing tricks that complement their athletic agility.
  arts: Margie Bridges, an enthusiastic drama club participant, delights in improvisational exercises and stage performances, draws creative inspiration from Lin‑Manuel Miranda’s musical storytelling, binge‑watches
    TikTok creator Charli D’Amelio for dance trends, and they frequently quote John Green’s YA novels during rehearsals.
  travel: Margie Bridges enjoys spontaneous weekend escapes, having road‑tripped with family to the Grand Canyon and visited Disneyland with friends, while dreaming of a future cultural immersion in Tokyo’s
    cherry‑blossom season, they prefer flexible itineraries over meticulously planned tours.
  culinary: Margie Bridges favors bold, handheld foods like pepperoni pizza, chicken quesadillas, and sushi rolls, can whip up a quick pasta with marinara sauce for a study night, loves blending banana‑strawberry
    smoothies for post‑practice recovery, yet they often grab sugary energy drinks for a quick caffeine boost.
  core: Margie Bridges is a hyper‑social, action‑driven teen who balances team leadership on the soccer field with spontaneous skateboarding sessions, channels their outgoing energy into digital storytelling,
    and navigates life with a practical yet flexibly relaxed approach to planning.
background:
  cultural: Margie grew up white in Ann Arbor, Michigan, a university town that blends midwestern suburban values with a vibrant, progressive academic atmosphere. Her family observes conventional American
    holidays such as Thanksgiving and Christmas while also participating in community events like the Ann Arbor Summer Festival, local farmers' markets, and county fairs. Exposure to the University of Michigan's
    outreach programs has broadened her awareness of cultural diversity and environmental stewardship, fostering a respect for nature and a strong sense of community service that underpins her love for
    animals and outdoor activities.
