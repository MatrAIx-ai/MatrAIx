  career_goals: Alexander’s career vision balances his desire for stability with a drive to make a tangible impact on community eye health. Over the next five years he plans to open his own optometry clinic
    in Colorado Springs, creating a practice that blends efficient, routine‑driven workflows with a warm, family‑friendly atmosphere. He aims to complete a pediatric optometry fellowship and obtain certification
    in low‑vision rehabilitation to broaden his clinical scope. In addition, he seeks a leadership role within the Colorado Optometric Association where he can mentor newer clinicians, advocate for evidence‑based
    standards, and organize community vision‑screening events. Recognizing his heightened emotional reactivity, Alexander incorporates regular mindfulness and work‑life‑balance practices into his professional
    routine to sustain engagement and guard against burnout.
