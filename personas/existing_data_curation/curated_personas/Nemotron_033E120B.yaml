  career_goals: Although retired from the formal workforce, Joyce’s ambitions center on deepening her impact within the Austin senior community and preserving her family legacy. She aims to develop a neighborhood
    garden that provides fresh produce to local food banks, leveraging her gardening know‑how and organizational skills. Joyce also plans to compile a memoir and a detailed family genealogy, documenting
    stories for future generations. She aspires to mentor younger volunteers at the community center, sharing her structured approach to project management while learning new digital tools like digital
    photography. Maintaining health and independence remains a primary goal, so she seeks to stay active through regular walks, low‑impact exercise classes, and continued participation in her book club.
