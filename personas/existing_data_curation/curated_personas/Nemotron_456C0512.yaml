  career_goals: Approaching the final phase of her professional life, Kenia aspires to transition from frontline supervision to a senior mentorship and policy‑shaping role within San Diego County’s correctional
    system. She aims to formalize a county‑wide, arts‑integrated restorative‑justice program that offers alternative pathways for older and first‑time offenders, drawing on her curiosity for innovative
    interventions. Kenia also hopes to author a research paper on the impact of cultural competency in probation outcomes, presenting her findings at regional conferences. Ultimately, she envisions serving
    as a consultant and trainer, empowering a new generation of officers to blend data‑driven practices with empathy, while continuing volunteer work that supports at‑risk youth and seniors in her community.
