personas:
  professional: Kenia Rodriguez, a veteran probation officer, uses their analytical rigor and sociable, arts‑focused personality to blend data‑driven risk assessment with community‑centered restorative‑justice
    initiatives that empower clients and mentor junior staff.
  sports: Kenia Rodriguez enjoys brisk coastal hikes at Torrey Pines and weekly senior yoga classes, while cheering on the San Diego Padres and the San Diego Wave FC, and they serve as a volunteer coordinator
    for the community’s senior walking club that meets every Saturday morning.
  arts: Kenia Rodriguez immerses themselves in creating vibrant folkloric paintings that echo the colors of traditional Day of the Dead altars, regularly attends exhibitions at the Museum of Contemporary
    Art San Diego, and delights in live performances by Carlos Santana and the San Diego Symphony, allowing their love for artistic expression to shape community outreach.
  travel: Kenia Rodriguez prefers thoughtfully planned trips that balance cultural immersion with a relaxed pace, often exploring the coastal charm of Catalina Island and the artistic neighborhoods of Santa
    Barbara, while dreaming of guided tours through Seville’s cathedral cloisters and the ancient ruins of Cusco.
  culinary: Kenia Rodriguez enjoys experimenting with fusion dishes such as chipotle‑lime quinoa paella and herb‑infused heirloom tomato gazpacho, skillfully prepares classic tamales and fresh pico de gallo
    for neighborhood gatherings, and they savor dining experiences that pair bold cumin and cilantro flavors with local Californian produce.
  core: Kenia Rodriguez blends a lifelong love of community, art, and data‑driven compassion into a vibrant, worry‑prone yet deeply generous spirit that never shies away from the center of a crowded room.
background:
  cultural: Born to Mexican immigrant parents who settled in the Chula Vista area, Kenia grew up in a bilingual household where Spanish was spoken at home and English at school. Her family’s roots trace
    back to Jalisco, and she cherishes traditional customs such as Día de los Muertos celebrations, mariachi music, and communal cooking of tamales. Catholic rituals and strong family ties shaped her early
    worldview, fostering a deep respect for community harmony and collective well‑being. Over the decades, she blended these Mexican cultural pillars with the multicultural tapestry of Southern California,
    participating in local parades, supporting neighborhood mural projects, and maintaining close ties with the Mexican‑American senior network. This bicultural identity informs her empathetic approach
    to probation work, her passion for integrating folk art into rehabilitation, and her dedication to preserving cultural heritage in a modern American context.
