  career_goals: Although officially retired, Scarlett is driven to leave a lasting cultural legacy. She aims to publish a memoir that weaves her family’s immigration story with the social changes she witnessed
    from the 1940s onward, while also compiling an illustrated guide to the historic neighborhoods of Contra Costa County. She hopes to launch an intergenerational art mentorship program at the local senior
    center, pairing seasoned artists with younger volunteers to create public murals. Serving on the advisory board of the Clayton Historical Society is another ambition, as is collaborating with nearby
    museums on exhibitions that highlight senior perspectives on contemporary art. On a personal level, Scarlett plans to travel to European art capitals—Florence, Vienna, and Seville—while taking beginner
    Italian classes to enrich her cultural understanding. Maintaining her health through regular yoga, mindful meditation, and stress‑management workshops remains a core goal.
