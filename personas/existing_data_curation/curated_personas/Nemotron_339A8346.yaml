    experimental cuisines'']'
  career_goals: Edward is preparing for a gradual transition from day‑to‑day support work to a role that leverages his experience as a mentor and community advocate. He hopes to become a senior trainer
    or customer‑experience coach within his company, designing workshops that blend creative problem‑solving with service fundamentals. Beyond the corporate setting, he is interested in partnering with
    local nonprofits to develop a mentorship program for youth and young adults, especially those who seek careers in service and communications. Edward also plans to complete a bachelor’s degree in Business
    Administration and earn a certificate in diversity and inclusion, positioning himself to lead initiatives that improve equitable service delivery.
