  career_goals: Jaime dreams of turning her love for nature and practical problem‑solving into a career as an environmental scientist or wildlife rehabilitator. In the short term, she wants to secure a
    spot in her high school's STEM and environmental clubs, improve her organization and time‑management skills, and maintain strong grades to keep scholarship options open. Long‑term, she aspires to earn
    a degree in biology or environmental engineering, work with a local wildlife sanctuary or conservation nonprofit, and eventually lead youth education programs that promote sustainable practices in her
    community. She also hopes to combine her technical skills with environmental advocacy by developing simple educational apps or tools that make scientific information accessible to her peers.
