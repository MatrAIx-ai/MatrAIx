personas:
  professional: Jaime Rutledge, a budding junior programmer, blends curiosity about ecosystems with practical problem‑solving, channeling their love of mystery stories into creating Scratch games that teach
    basic biology, and they often scramble to meet project timelines due to their spontaneous nature.
  sports: Jaime Rutledge enjoys weekend hikes in nearby state parks and occasional pick‑up frisbee games with friends, they root for the Seattle Seahawks and the Seattle Mariners while staying loosely affiliated
    with the school’s outdoor adventure club.
  arts: 'Jaime Rutledge sketches detailed nature scenes in a well‑worn journal, devours mystery novels by Agatha Christie and fantasy sagas by Sarah J. Maas, and they unwind listening to the atmospheric
    soundscapes of Sigur Rós and the indie pop of Mitski while binge‑watching Avatar: The Last Airbender.'
  travel: Jaime Rutledge dreams of exploring the bird‑rich Monteverde Cloud Forest in Costa Rica and the towering redwoods of California’s Redwood National Park, but they prefer spontaneous weekend day‑trips
    to nearby state parks, packing a sketchbook and binoculars for impromptu nature sessions.
  culinary: Jaime Rutledge, a budding home‑chef, loves crafting herb‑infused grilled cheese with fresh oregano from their garden, swapping store‑bought chips for homemade kale chips, and indulging in occasional
    cheesy ramen, while still relying heavily on sugary cereal for breakfast.
  core: Jaime Rutledge is a curious, nature‑obsessed teen who balances sketching birds and coding simple games with a spontaneous streak that fuels both creative bursts and occasional disorganization.
background:
  cultural: Jaime is a white teenager growing up in Brecksville, Ohio, a suburban community in Summit County known for its strong public schools and family‑oriented environment. Her family’s heritage includes
    German and Irish roots, which occasionally surface in cultural traditions such as celebrating St. Patrick’s Day and enjoying classic American holidays like Thanksgiving and Christmas. The Midwestern
    values of modesty, independence, community involvement, and a deep appreciation for the changing seasons shape her worldview. Local activities such as hiking in nearby parks, participating in community
    service, and attending school events reinforce a sense of belonging, while her family encourages both academic achievement and practical skill development, aligning with her blend of curiosity and practicality.
