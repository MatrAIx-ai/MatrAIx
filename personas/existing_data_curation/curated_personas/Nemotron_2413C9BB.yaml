personas:
  professional: Natalia Jaquez, a veteran flooring foreperson with three decades of expertise in carpet, tile, and floor installation, blends meticulous subfloor preparation and precise material estimation
    with a pragmatic curiosity for sustainable materials, and their sociable, cooperative nature makes them a beloved mentor to apprentices and a trusted liaison for clients.
  sports: Natalia Jaquez, an avid participant in Saturday salsa sessions and weekend hikes in the San Gabriel Mountains, also roots for the Los Angeles Lakers, the LA Dodgers, and LAFC, and they attend
    local community yoga classes and play with the Pasadena Soccer Club’s recreational league to keep both heart and spirit lively.
  arts: Natalia Jaquez, who paints vibrant tile motifs inspired by Frida Kahlo’s bold colors and the rhythmic storytelling of Juan Gabriel, regularly attends performances by the Los Angeles Philharmonic
    and the cultural dance troupe Ballet Folklorico de Los Angeles, and they unwind while listening to the soulful croons of Lila Downs during kitchen prep.
  travel: Natalia Jaquez prefers thoughtfully planned cultural getaways, having explored Oaxaca’s historic markets, Barcelona’s Gothic Quarter, and Napa Valley’s serene vineyards, yet they often delay a
    long‑awaited trek to the Grand Canyon because family responsibilities and the financial caution required for their upcoming business launch keep them grounded.
  culinary: Natalia Jaquez, a skilled home chef who effortlessly layers the complex flavors of mole poblano, chiles en nogada, and fresh salsa verde with herbs like epazote and cilantro, delights friends
    with homemade tamales on festive nights, and they sometimes over‑season to the point of fiery heat when experimenting after midnight.
  core: Natalia Jaquez merges seasoned craftsmanship with a green‑hearted curiosity, juggling community devotion, a lingering worry about the future, and a penchant for late‑night salsa dancing that they
    find keeps life vibrant.
background:
  cultural: Natalia is a first‑generation Mexican‑American who grew up in a bilingual household that celebrated Día de los Muertos, Las Posadas, and other Mexican traditions. Fluent in Spanish, she maintains
    close ties with her extended family and often hosts cultural gatherings that feature traditional music, food, and storytelling. Living in Pasadena, she participates in the vibrant Mexican‑American community,
    attending festivals, supporting local Mexican artisans, and integrating her heritage into her daily life and work ethic. Her cultural roots shape her values of family, community, hospitality, and a
    strong sense of responsibility toward others.
attributes:
  skills: '["Tile installation", "Carpet laying", "Floor finishing", "Subfloor preparation", "Material estimation", "Blueprint reading", "Project scheduling", "Safety compliance", "Bilingual communication
