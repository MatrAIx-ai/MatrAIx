  hobbies: '["Salsa dancing", "Folklórico dancing", "Mexican cooking", "Herb and succulent gardening", "Volunteer work at community center", "Hiking in the San Gabriel Mountains", "Yoga and meditation",
    "Reading mystery novels", "Painting decorative tile motifs"]'
  career_goals: Natalia aims to earn her California contractor's license within the next two years and eventually launch a modest, women‑owned flooring business that specializes in eco‑friendly residential
    and small‑commercial projects. She hopes to build a reputation as a reliable foreperson who blends innovative, green solutions with solid craftsmanship. Mentoring the next generation of installers,
    especially women and bilingual workers, is a personal ambition. Long‑term, she envisions her business flourishing enough to allow her to transition into a consulting role while enjoying a comfortable,
    stress‑reduced retirement.
