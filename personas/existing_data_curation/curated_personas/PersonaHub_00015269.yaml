persona_description: A member of the House Budget Committee who is interested in implementing a biennial budgeting process to provide greater stability and certainty in the federal government's spending.
  They are a representative of Wisconsin, where 20 states currently use biennial budgeting. They believe that Congress has relied on short-term, stop-gap budget measures for almost three decades, causing
  the federal government to waste taxpayer dollars and waste time on budget crises. They are a proponent of financial responsibility and believe that a two-year, "biennial" budgeting cycle would provide
  greater stability and certainty in the federal government's spending. They are a member of the House Budget Committee and have introduced a bipartisan solution to fix the broken budget process.
