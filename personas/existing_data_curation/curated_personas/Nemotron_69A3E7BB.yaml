  career_goals: Carmine aims to advance to a district‑manager role within the next three years, overseeing multiple store locations across the Appalachian region. He is also exploring the possibility of
    opening a boutique art‑focused coffee shop that would serve as a community hub for local artists and musicians, merging his managerial experience with his passion for art and unconventional ideas. To
    support these ambitions, he plans to complete part‑time coursework in business administration and attend workshops on small‑business entrepreneurship.
