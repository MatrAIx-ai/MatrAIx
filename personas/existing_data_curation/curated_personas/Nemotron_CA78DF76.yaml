  career_goals: Elizabeth dreams of a future where she can combine her love for animals, nature, and people. She often talks about becoming a veterinarian so she can care for pets and farm animals, or an
    environmental scientist who helps protect the woods and streams near Jackson Springs. She also imagines teaching younger kids, sharing the fun of reading and exploring the outdoors. Her ambitions are
    grounded in a practical desire to stay close to her community and make a tangible difference in the lives of both people and creatures around her.
