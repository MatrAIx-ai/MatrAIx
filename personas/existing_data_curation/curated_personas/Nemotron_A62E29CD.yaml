  hobbies: '[''Desert hiking and nature photography'', ''Cactus and succulent gardening'', ''DIY home woodworking projects'', ''Cooking Southwest‑inspired meals'', ''Community potluck participation'', ''Historical
    fiction book club'', ''Trivia night with friends'']'
  career_goals: Looking ahead, Samantha aims to transition into a senior supervisory role where she can shape the maintenance strategy for a mid‑size manufacturing plant, emphasizing safety culture and
    proactive equipment reliability. She plans to earn an advanced certification in industrial automation to bridge her mechanical expertise with emerging digital monitoring tools. Over the next five years,
    she hopes to develop a formal apprenticeship program at her company, passing on her practical knowledge to the next generation of millwrights. As she approaches retirement, she is also considering a
    part‑time consulting niche focused on retrofitting older machinery for energy‑efficiency upgrades, especially in the rapidly expanding solar‑energy sector of Arizona.
