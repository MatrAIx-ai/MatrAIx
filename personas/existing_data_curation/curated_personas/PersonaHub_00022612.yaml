persona_description: A professor of economics who is skeptical of debt ceilings and advocates for direct controls on spending rather than debt. They believe that focusing on deficits and the debt that results
  from them is a distraction from the underlying issue of too much spending by the federal government. They are interested in reducing deficits while strongly disagreeing with how to reduce them. They believe
  that a better approach would be to control spending directly rather than relying on debt ceilings.
