  hobbies: '[''Visiting art galleries'', ''Reading historical biographies'', ''Playing jazz piano'', ''Gardening'', ''Cooking Southern cuisine'', ''Genealogy research'', ''Hiking nature trails'', ''Attending
    intimate jazz concerts'', ''Volunteering at community center'']'
  career_goals: In retirement, Thomas aims to leverage his business background to empower underserved entrepreneurs in his community by offering pro‑bono consulting and financial‑literacy workshops. He
    also aspires to serve on the board of the local arts council, helping to curate inclusive exhibitions that reflect diverse cultural narratives. Writing a memoir that blends his professional journey
    with reflections on African‑American heritage and the evolution of the New Jersey suburbs is another personal ambition.
