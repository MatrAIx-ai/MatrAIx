  career_goals: She dreams of becoming a bilingual teacher or pediatric nurse, drawn to helping other children learn and stay healthy. Ada also imagines exploring science as an astronaut or marine biologist,
    inspired by the Gulf Coast and her curiosity about sea life. Her practical side leads her to envision a career that combines caring for others with clear structures, such as a teacher who organizes
    classroom activities. She hopes to use her Spanish fluency to support her community and serve as a role model for younger kids.
