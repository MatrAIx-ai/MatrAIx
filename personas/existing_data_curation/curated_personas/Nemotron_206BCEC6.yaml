personas:
  professional: Ada Diaz, a budding caregiver who treats her stuffed animals like patients, blends her curiosity about how bodies work with a practical habit of keeping a tidy 'clinic' corner, and they
    confidently direct playtime while feeling occasional nerves when new medical toys arrive.
  sports: Ada Diaz, a spirited member of the Sunshine City Youth Soccer Club who idolizes the local professional team the River Rapids, spends weekends chasing a soccer ball in the park and dives into the
    community pool during summer to practice freestyle strokes, while they occasionally skip practice when a new LEGO set tempts them.
  arts: Ada Diaz, an imaginative doodler who fills sketchbooks with bright crayons, imitates dance moves from cumbia star Carlos Vives and pop icon Taylor Swift, and they relish bedtime stories narrated
    by actor Lin‑Manuel Miranda, letting these influences color their own drawings.
  travel: Ada Diaz, a curious explorer who prefers family road trips to the nearby shoreline town of Seaside Cove for seashell hunting, dreams of visiting the tropical beaches of Puerto Rico and the magical
    castles of Disneyland Paris, yet they sometimes fret about long car rides, clinging to their favorite stuffed turtle.
  culinary: Ada Diaz, a budding kitchen helper who loves to roll mini taco shells, mash avocados with lime and cilantro for guacamole, and sprinkle cheese on everything, proudly claims chocolate chip cookies
    as the ultimate treat, while they occasionally over‑salting the guacamole and giggle at the mess.
  core: Ada Diaz, a lively six‑year‑old who balances boundless curiosity with tidy play‑areas, rushes head‑first into games, yet they often pause for a nervous sigh when unexpected changes arise.
background:
  cultural: Ada grows up in a Mexican‑American household where Spanish is spoken alongside English, and family traditions such as Día de los Muertos altars, quinceañera preparations for older relatives,
    and festive celebrations of Mexican holidays are woven into daily life. Her family enjoys classic Mexican dishes like tacos, tamales, and pozole, often preparing them together in the kitchen, which
    fuels her interest in cooking. Living in Seabrook, Texas, near the Gulf of Mexico, she experiences a blend of coastal Texan and Mexican cultural influences—she attends a local Catholic church, participates
    in community festivals that feature both mariachi music and Tex‑Mex cuisine, and frequently visits the beach to explore marine life, reinforcing her budding curiosity about the ocean. This rich cultural
    tapestry shapes her bilingual abilities, love for music and dance, strong sense of community, and pride in her heritage.
