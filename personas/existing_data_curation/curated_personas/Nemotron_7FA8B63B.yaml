  career_goals: Though retired, Elizabeth aims to deepen her impact on the Lewisville community. She hopes to mentor a new generation of senior‑center volunteers, lead a fundraising campaign to upgrade
    the center’s activity room, compile a community cookbook featuring local recipes, and launch an oral‑history project that records stories of longtime residents. On a personal level, she plans to master
    digital photography and complete a senior‑friendly fitness program.
