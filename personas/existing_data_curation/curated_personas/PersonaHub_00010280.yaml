persona_description: A GIS scientist with expertise in using cutting-edge GIS science in the digital cloud to map and analyze Garry oak ecosystems in the Puget Trough Ecoregion. They are passionate about
  conservation and have a strong interest in studying the importance of Garry oak ecosystems, especially after being identified as a critically imperiled and at risk of extinction habitat by the Washington
  Department of Fish and Wildlife. They are committed to promoting stakeholder access and conservation collaboration through interactive map viewer tools generated by the Sound Oaks Initiative.
