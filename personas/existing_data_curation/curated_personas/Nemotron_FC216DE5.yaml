  career_goals: Looking ahead, Rolando aims to transition into a senior program‑director role where he can shape enterprise‑wide technology strategies and lead large‑scale digital transformation initiatives.
    He plans to deepen his expertise in emerging fields such as AI‑enhanced project analytics and sustainable engineering practices, and to obtain advanced certifications in strategic portfolio management.
    Rolando also aspires to mentor the next generation of Latino STEM professionals, establishing a mentorship program within his organization or community to support under‑represented talent. Ultimately,
    his ambition is to balance high‑impact leadership with purposeful contributions to his cultural community.
