    repair", "Time management and shift scheduling"]'
  hobbies: '["Backyard gardening", "Arduino and electronics tinkering", "Walking along the Vallejo waterfront", "Playing soccer with community friends", "Cooking traditional Nicaraguan cuisine", "Reading
    historical biographies", "Crossword puzzles", "Attending and organizing local cultural festivals", "Mentoring youth in STEM (volunteer)", "Collecting Nicaraguan folk music recordings"]'
  career_goals: Andres aims to advance to a supervisory or assistant manager role at his current store within the next two years, focusing on boosting operational efficiency and staff performance. He plans
    to propose a simple inventory‑tracking database that leverages his STEM background to reduce shrinkage and streamline restocking. Beyond his work, he intends to volunteer as a STEM mentor for local
    high‑school students, especially those from Latino backgrounds, sharing his technical knowledge and career insights. Long‑term, he hopes to secure a comfortable retirement that allows him to support
    his family and travel back to Nicaragua to reconnect with extended relatives and partake in community events.
