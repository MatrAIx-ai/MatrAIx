  hobbies: '["Abstract Watercolor Painting", "Digital Illustration", "Historical Research", "Photography", "Analog Darkroom Techniques", "Chess", "Community Gardening", "Reading Science Fiction", "Philosophy",
    "Classical/Jazz Music Listening"]'
  career_goals: Even in retirement, Edward remains driven by achievement and legacy. He aims to complete a memoir that intertwines his personal narrative with the transformation of Spokane over the past
    six decades. He plans to publish a limited‑edition book pairing his abstract paintings with essays on art theory and local history. Edward also seeks to launch an online archive that houses digitized
    photographs, oral histories, and documents from the Inland Northwest, making them freely accessible to scholars and the public. He hopes to secure a recurring guest‑curator role at the Spokane Art Museum,
    where he can organize interdisciplinary exhibitions that fuse historical context with contemporary abstraction. Finally, he aspires to mentor a cohort of young artists through a formal apprenticeship
    program, passing on his disciplined creative process and commitment to community service.
