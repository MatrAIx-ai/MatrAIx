personas:
  professional: Edward Wilkerson, a retired archivist and community art organizer, leverages their meticulous research skills, disciplined project management, and vivid abstract illustration talent to curate
    interdisciplinary exhibitions and mentor emerging artists, all while maintaining an exacting standard of scholarly rigor.
  sports: Edward Wilkerson, a devoted walker and occasional low‑impact senior cyclist, trains on the Riverfront Trail three times a week, supports the Spokane Chiefs hockey team and the Seattle Seahawks
    football franchise, and participates in the local Golden Age Walking Club, preferring gentle endurance over high‑intensity competition and often noting that they feel most alive when the rhythm of their
    steps matches the river’s cadence.
  arts: Edward Wilkerson, an abstract watercolorist and digital illustrator, draws inspiration from Kandinsky’s color theory, the minimalist compositions of Agnes Martin, and the atmospheric photography
    of Ansel Adams, while they curate listening sessions of Beethoven symphonies and Miles Davis’s Kind of Blue to accompany late‑night sketching.
  travel: Edward Wilkerson, a meticulous planner with a love of quiet cultural immersion, prefers leisurely journeys to historic sites such as Kyoto’s temples and the museums of Paris, enjoys annual road
    trips along the Columbia River gorge, and dreams of exploring Iceland’s volcanic landscapes and Italy’s Biblioteca Salaborsa in Bologna, always balancing a modest travel budget with a desire for scholarly
    enrichment and often noting that they plan each trip like a research project.
  culinary: Edward Wilkerson, a competent home cook who favors seasonal Pacific Northwest fare, regularly prepares pan‑seared salmon with dill, wild mushroom risotto, and a meticulously layered French onion
    soup, while they delight in the occasional indulgence of a perfectly baked sourdough loaf made with heritage grains.
  core: Edward Wilkerson, a disciplined octogenarian who meticulously catalogs both historical archives and paint pigments, often loses track of time wandering the Riverfront Trail, returning home late
    with a camera full of half‑finished photographs and a lingering scent of fresh watercolor, and they sometimes forget to water their garden until the next day.
background:
  cultural: Edward is a White American who grew up in a modest, post‑war suburban household in Spokane, Washington. Raised in a Protestant family that emphasized self‑reliance, education, and community
    responsibility, he later adopted a secular, humanistic worldview while retaining respect for the region's cultural heritage. The Pacific Northwest’s deep connection to the natural landscape, its independent
    spirit, and its tradition of volunteerism have shaped his values and pursuits. He holds a profound respect for the local Native American tribes, often incorporating their motifs into his artwork in
    a collaborative and reverent manner. Edward’s cultural identity is a blend of mid‑20th‑century Pacific Northwest values—hard work, curiosity, and a commitment to preserving the collective memory of
    his community.
attributes:
  skills: '["Archival Research", "Technical Writing", "Copy Editing", "Digital Illustration", "Graphic Design", "Project Management", "Community Workshop Facilitation", "Data Organization", "Public Speaking",
