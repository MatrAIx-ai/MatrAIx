    local trails'', ''Attending art workshops'']'
  career_goals: Driven by his love for art and technology, Jason aspires to become a video game designer or interactive media artist, blending storytelling, visual design, and coding. He hopes to attend
    a high‑school program focused on computer science and graphic arts, eventually earning a degree in game development or digital arts. In the longer term, he dreams of creating games that encourage creativity
    and curiosity in other kids, and perhaps establishing his own indie studio.
