personas:
  professional: Jason Pappalardo, a 12-year-old aspiring game designer, blends his love for strategy video games and chess with budding digital illustration skills to prototype level designs on his drawing
    tablet, approaching each project with meticulous organization tempered by his curiosity for unconventional mechanics.
  sports: Jason Pappalardo enjoys weekend hikes on the Tualatin Hills Nature Park trails and the nearby forest, occasionally cheering for the Portland Timbers and following the Oregon Ducks basketball team,
    while he belongs to a local youth mountain‑bike club that meets after school.
  arts: Jason Pappalardo channels his imagination through drawing detailed sci‑fi cityscapes and comic characters inspired by artists like Hayao Miyazaki and graphic novelist Jillian Tamaki, regularly attending
    community art workshops where he experiments with mixed media and shares his work on a kid‑friendly online portfolio.
  travel: Jason Pappalardo prefers short, family‑oriented road trips that balance adventure and relaxation, having explored Crater Lake, the Oregon coast at Cannon Beach, and a weekend camping trip in the
    Columbia River Gorge, while he dreams of visiting Tokyo’s Akihabara for its gaming culture.
  culinary: Jason Pappalardo favors easy‑to‑make meals like pepperoni pizza slices and ramen bowls, often adding his favorite ingredient—sriracha—for a spicy kick, and he enjoys preparing trail mix with
    dried mango, almonds, and pretzel sticks for his hikes.
  core: Jason Pappalardo is a curious, competitively‑driven twelve‑year‑old who blends art, strategy games, and outdoor exploration into a habit of meticulously planning projects while secretly hoarding
    snack crumbs under his desk.
background:
  cultural: Jason is raised in a white, middle‑class family in Tualatin, Oregon, a suburb of Portland known for its blend of suburban life and easy access to outdoor recreation. His household reflects typical
    Pacific Northwest values, emphasizing environmental awareness, community involvement, and a love for nature. Family meals often feature homemade dishes that blend traditional American fare with occasional
    Italian‑American recipes handed down through extended relatives. He participates in local school events, the Tualatin Farmers Market, and community art walks, exposing him to the region’s cultural diversity
    while maintaining a grounded, family‑centric upbringing.
