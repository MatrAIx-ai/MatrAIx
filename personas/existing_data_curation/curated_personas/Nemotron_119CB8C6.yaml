  career_goals: Dalton aims to obtain his GED within the next year and pursue a vocational certification in either automotive technology or electrical maintenance. He envisions a stable, hands‑on career
    that leverages his practical skills, such as working in a local garage, becoming a maintenance technician, or eventually running a modest home‑repair service. He values job security and the ability
    to support his family while continuing to learn new tools and techniques. Because he worries about future stability, he sets incremental milestones and prefers clear, attainable objectives.
