personas:
  professional: Dalton Lapat, a curious toddler who meticulously assembles building blocks, already shows an organized, reliable nature that hints at a future career in engineering where methodical planning
    and follow‑through become professional strengths.
  sports: Dalton Lapat, a one‑year‑old, loves energetic crawl‑races at the local indoor playground, enjoys watching the Seattle Seahawks with their parents on game days, and attends the Little Sprouts Playgroup's
    baby gymnastics sessions each spring.
  arts: Dalton Lapat, an inquisitive infant, spends quiet afternoons absorbed in picture books featuring Beatrix Potter while listening to gentle piano works by Ludovico Einaudi, and their rhythmic clapping
    to lullabies reveals a budding appreciation for music and visual storytelling.
  travel: Dalton Lapat, while still an infant, has already taken short family road trips to the Grand Canyon and a weekend seaside stay in Santa Barbara, preferring the familiarity of a well‑packed diaper
    bag and a favorite stroller over spontaneous wanderings.
  culinary: Dalton Lapat's palate embraces pureed carrots, sweet potato mash, and avocado slices, showing particular enthusiasm for soft oatmeal, often creating a delightful mess on the high‑chair tray
    that they later attempt to clean with determined suck‑and‑spit techniques.
  core: Dalton Lapat is a methodical, curious infant who balances a love for new toys with a cautious reluctance to let go of favorite comforts, often worrying about unfamiliar sounds but finding solace
    in predictable routines.
background:
  cultural: 'Dalton was raised in a white, middle‑class family in Justin, Texas, a suburban community within Denton County. The local culture emphasizes self‑reliance, community support, and a blend of
    traditional Southern hospitality with modern suburban values. He grew up attending local community events and a small-town church, which fostered a sense of cooperation and modest assertiveness. Exposure
    to the surrounding agricultural landscape and nearby Dallas‑Fort Worth urban influences gave him a balanced perspective: appreciation for countryside pragmatism and curiosity about broader technological
    trends.'
