  career_goals: Although approaching retirement age, Charles aims to transition from line labor to a supervisory role. He plans to earn an OSHA 30‑hour certification and a formal crew‑leadership training
    program offered by his union, positioning himself for a foreman position on medium‑size residential projects. He also dreams of launching a modest, owner‑operated renovation business that would let
    him select projects, apply his curiosity for new building techniques such as low‑VOC finishes and solar‑ready installations, and provide steady income after his divorce. In the longer term, Charles
    hopes to become a mentor and safety advocate within the local construction community, perhaps serving as a union rep or trainer for apprentice programs.
