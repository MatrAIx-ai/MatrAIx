  career_goals: She aims to move into a supervisory quality‑assurance role where she can shape inspection protocols, introduce digital tools for defect detection, and lead a small team. She plans to obtain
    an ASQ Certified Quality Inspector credential to formalize her expertise. In the longer term, Kathryn hopes to combine her passion for art and process improvement by developing training programs that
    use visual storytelling to teach quality concepts to workers. She also wishes to establish a support network for employees dealing with workplace stress, leveraging her own experiences with anxiety.
