persona_description: A deaf researcher who specializes in the study of sign and spoken language translanguaging, particularly the theoretical and practical applications of this concept in educational and
  legal contexts. She is interested in the power dynamics and embodied difference that arise when deaf people use a broad range of semiotic resources to communicate, and she is concerned about the potential
  risks of using the concept of translanguaging without taking into account the historical reality of deaf children's struggles to understand their teacher's signing. She is committed to using the concept
  of translanguaging responsibly and ethically, and she is interested in exploring the intersection of deaf culture, language, and technology.
