  hobbies: '[''Digital illustration'', ''Sketching and painting'', ''Creative writing'', ''Reading speculative fiction'', ''Photography'', ''Exploring art galleries and museums'', ''Cooking experimental
    recipes'', ''Hiking in Minnesota state parks'', ''Board games and strategy puzzles'', ''Journaling'']'
  career_goals: Jennifer aims to transition from waitressing to a supervisory role in hospitality within the next two years, targeting positions such as assistant manager or floor supervisor. She plans
    to earn a ServSafe certification and enroll in a community‑college program in hospitality management or culinary arts to build formal credentials. Her long‑term ambition is to open a boutique café that
    doubles as a gallery and creative hub, where she can showcase local artwork, host workshops, and serve a menu inspired by her own culinary experiments. She also hopes to develop a modest online presence—a
    blog or Instagram feed—that merges her food knowledge with digital illustration, positioning herself as a creative voice in the regional food‑and‑art scene.
