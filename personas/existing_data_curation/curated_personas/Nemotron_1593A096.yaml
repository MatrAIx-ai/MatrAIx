personas:
  professional: Lynn Lane, an aspiring community health nurse and outreach coordinator, leverages their tight‑knit event‑planning skills, disciplined time‑management, and natural charisma from high school
    cheerleading to design and run health‑education workshops for underserved families in Livingston Parish.
  sports: Lynn Lane stays active by marching with the school band on Friday nights, cheering at every New Orleans Saints game on Sundays, and hitting the local community center’s yoga classes twice a week,
    while rooting for the LSU Tigers during college football season.
  arts: Lynn Lane captures the vibrant energy of Mardi Gras parades and neighborhood block parties through vivid phone photography, draws inspiration from the soulful storytelling of Beyoncé and the breezy
    rhythms of Clifton Chenier, and relaxes with mystery novels by Agatha Christie while humming to Taylor Swift’s latest pop anthem.
  travel: Lynn Lane, who plans trips with a mix of spontaneous TikTok inspirations and detailed checklists, has taken weekend road trips to New Orleans for jazz festivals and to the Great Smoky Mountains
    for hiking, and dreams of a summer backpacking adventure through the historic streets of Paris and the coastal cliffs of Santorini.
  culinary: Lynn Lane, a confident home chef, perfects hearty gumbo with Andouille sausage and okra, bakes buttery pecan pie featuring fresh pecans from the local market, and experiments with spicy jambalaya
    on TikTok, always pairing each dish with a side of crusty French bread and a dash of homemade hot sauce.
  core: Lynn Lane combines a relentless organizer’s checklist with a heart‑wide‑open devotion to community, juggling late‑night TikTok edits, anxiety‑fuelled worry, and a habit of over‑seasoning every dish.
background:
  cultural: Lynn grew up in Denham Springs, a small town in the heart of Louisiana’s Cajun‑Creole region. Her family is part of the white Southern community, with deep roots in church life—regularly attending
    a Baptist congregation. The local culture of hospitality, community festivals, and a strong emphasis on family and faith shaped her values. She grew up enjoying regional foods like jambalaya and po’boys,
    attending high school football Saturdays, and participating in seasonal events such as Mardi Gras parades and the Livingston Parish Fair.
attributes:
  skills: '[''Event Planning'', ''Public Speaking'', ''Team Leadership'', ''Time Management'', ''Social Media Content Creation'', ''Basic First Aid'', ''Conflict Resolution'', ''Customer Service'', ''Organizational
