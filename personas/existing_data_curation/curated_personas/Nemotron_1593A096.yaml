  hobbies: '[''Cheerleading'', ''Volunteering at local food banks'', ''Cooking Southern recipes'', ''Photography'', ''Social media content creation'', ''Yoga'', ''Reading mystery novels'', ''Attending high
    school football games'', ''Gardening'', ''Journaling'']'
  career_goals: Lynn aims to pursue an associate degree in health sciences at Baton Rouge Community College, followed by a bachelor's in nursing or public health. She aspires to become a community health
    nurse or outreach coordinator, using her organizational talents to design health education programs for underserved families in Livingston Parish. Long‑term, she hopes to launch a nonprofit that offers
    wellness workshops and mentorship for local teens, combining her desire to help others with her drive for achievement.
