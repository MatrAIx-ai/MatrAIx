personas:
  professional: John Perez, a diesel technician with masterful diagnostic and fabrication skills, blends his imaginative flair for bold graphics with a calm, competitive edge that drives his team to win
    national repair contests.
  sports: John Perez fuels his fitness with weekend hikes in the foothills of the Rocky Mountains, fishing trips on the Snake River, casual basketball games with friends, and stays loyal to the Boise State
    Broncos basketball and football teams while regularly racing at the Nampa Drag Racing Club.
  arts: John Perez channels his love for abstract painting into bold vehicle wrap designs inspired by Mark Rothko’s color fields and Banksy’s street-art wit, while his acoustic-guitar sessions echo the
    folk stylings of Neil Young and John Denver at local community events.
  travel: John Perez prefers spur-of-the-moment road trips that blend rugged adventure with car-culture stops, such as weekend drives to Yellowstone’s geysers, a fishing weekend on Alaska’s Kenai River,
    and occasional scouting trips to the Tokyo Auto Salon for inspiration.
  culinary: John Perez enjoys cooking hearty, flame-kissed meals like smoked brisket rubbed with coffee grounds, honey-glazed trout seasoned with fresh dill, and hand-rolled sourdough pizza topped with
    wild mushrooms, while also indulging in Idaho’s famed finger-steak tacos at local diners.
  core: John Perez balances a relentless drive to innovate diesel tech and craft bold art with a laid-back, sometimes disorganized lifestyle that sees them swapping engine parts one minute and leaving paint
    tubes uncapped the next.
background:
  cultural: John was raised in Nampa, Idaho, within a close-knit, predominantly white, small-town community that values self-reliance, hard work, and neighborly cooperation. His family’s roots trace back
    to the American Midwest, with generations of tradespeople who emphasized practical skills and community service. While his surname reflects a Hispanic heritage, his cultural upbringing aligns with mainstream
    Western American traditions—celebrating local fairs, Fourth of July parades, and outdoor recreation such as hunting, fishing, and hiking. The region’s agricultural and industrial backdrop has shaped
    his pragmatic work ethic, while the surrounding natural landscapes nurture his love for the outdoors and inspire his artistic pursuits.
attributes:
  skills: '[''diesel engine diagnostics'', ''heavy vehicle maintenance'', ''hydraulic system repair'', ''electrical wiring and troubleshooting'', ''fuel injection system calibration'', ''welding and metal
    fabrication'', ''custom vehicle modifications'', ''alternative fuel conversion (biodiesel)'', ''diagnostic software proficiency (e.g., BOSCH, Snap-On)'', ''shop workflow coordination'', ''mentoring
    apprentices'', ''creative problem solving'']'
  hobbies: '[''abstract painting'', ''scale model diesel engine building'', ''reading speculative fiction and philosophy'', ''hiking in the Rocky Mountains'', ''fishing on the Snake River'', ''participating
    in drag-racing events'', ''attending regional car shows'', ''playing acoustic guitar'', ''volunteering for automotive workshops'', ''casual basketball games'']'
  career_goals: He aspires to become a Master Diesel Technician and eventually open his own independent shop in Nampa that blends high-performance repairs with creative custom builds. John aims to specialize
    in eco-friendly conversions, offering biodiesel and electric drivetrain retrofits for buses and trucks. He also plans to host community workshops and a mentorship program for aspiring mechanics, positioning
    his shop as a regional hub for skill development. Competitive by nature, he seeks to qualify for national diesel-tech contests and showcase his innovative solutions at industry expos. Throughout, he
    values flexibility in his schedule to pursue personal projects and maintain a balanced lifestyle.
