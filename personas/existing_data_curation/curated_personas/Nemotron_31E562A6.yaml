personas:
  professional: Donna Duncan, a budding mini-architect, arranges building blocks with meticulous organization and methodical planning, channeling their curiosity for new ideas and reliable follow-through
    into every imaginative construction.
  sports: Donna Duncan, a member of the Little Stars soccer club, loves the rhythmic bounce of soccer balls at practice, cheers for the Chicago Cubs during family game nights, and balances high-energy playground
    tag with quiet moments on the swing set to manage their emotional intensity.
  arts: Donna Duncan, an enthusiastic participant in preschool art class, delights in drawing bright rainbows with Crayola markers, sings along to The Wiggles and 'Let It Go' by Idina Menzel, and collects
    postcards featuring Van Gogh's Sunflowers, finding solace in creative expression after moments of anxiety.
  travel: Donna Duncan, a curious explorer who loves family road trips to the local zoo and beach, has visited Disneyland and dreams of seeing the Great Barrier Reef, preferring organized itineraries with
    plenty of snack breaks to keep anxiety at bay.
  culinary: Donna Duncan, a budding food critic at the family dinner table, adores macaroni and cheese with extra cheddar, peanut butter and jelly sandwiches on whole-grain bread, and apple slices dipped
    in honey, often insisting on arranging their plate like a colorful mosaic.
  core: Donna Duncan, a four-year-old whirlwind of curiosity and meticulous play, balances bright artistic bursts with sudden bouts of anxiety, often clutching a beloved stuffed bunny when overwhelmed.
background:
  cultural: Donna lives in Mount Airy, a small town in Stokes County, North Carolina, within a predominantly white, Southern Appalachian community. Her family participates in local church gatherings, community
    fairs, and seasonal traditions such as apple picking and quilting circles. The region’s folk music, storytelling, and close‑knit neighborhood values influence her appreciation for art, music, and everyday
    rituals.
