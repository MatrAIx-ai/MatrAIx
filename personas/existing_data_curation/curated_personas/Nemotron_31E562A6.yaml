  career_goals: Donna dreams of becoming an artist who paints bright pictures that make people smile, a teacher who shares stories and songs with other children, or a scientist who explores the outdoors
    and discovers new things about nature. Her ambitions reflect her curiosity about art, new ideas, and helping others, even though she is still very young.
