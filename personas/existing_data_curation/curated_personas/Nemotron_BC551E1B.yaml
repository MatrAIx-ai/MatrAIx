personas:
  professional: Doris Banks, a ten-year-old aspiring junior detective, channels a love for adventure and mystery books into organized case files where they catalog clues from schoolyard mysteries, practice
    logical reasoning, and volunteer to lead the church youth group's help-others project, showing a blend of practical structure and compassion.
  sports: Doris Banks plays on the local youth soccer team, where they appreciate the predictable practice schedule and small-sided matches, diligently carry water for teammates, yet they occasionally skip
    the post-game snack due to lingering worries about schoolwork.
  arts: Doris Banks sketches cartoon characters inspired by classic comics while listening to R&B singer Alicia Keys and gospel choir performances, often reenacts scenes from mystery novels during the church
    youth group's talent show, and they keep a secret stash of colored pencils under the couch for late-night doodles.
  travel: Doris Banks prefers family trips with a clear itinerary, such as weekend visits to the nearby state park's nature center and a summer stay at a seaside resort where they can collect shells, yet
    they long for a future adventure to Washington, D.C., to tour the Smithsonian with a structured guide.
  culinary: Doris Banks enjoys helping their grandmother bake chocolate chip cookies, perfects the dough by measuring ingredients with a child-size digital scale, loves the buttery crunch of homemade biscuits,
    and they occasionally sneak an extra spoonful of vanilla extract when no one’s watching.
  core: Doris Banks blends a love for mystery storytelling, disciplined routine, and heartfelt compassion into a ten-year-old life marked by carefully organized allowances, modest anxiety, and a talent
    for sketching cartoon heroes while secretly hoarding extra vanilla.
background:
  cultural: Doris is a Black girl growing up in Augusta, Georgia, a city with a rich African‑American history and vibrant community life. Her family places high value on church involvement, celebrating
    cultural events such as Juneteenth and local festivals. Traditional Southern soul food, storytelling, and intergenerational mentorship shape her daily life. She experiences a strong sense of community
    pride, educational encouragement, and cultural heritage through family gatherings, church activities, and neighborhood support networks.
attributes:
  skills: '[''Reading comprehension'', ''Basic math (addition, subtraction, multiplication)'', ''Organized schoolwork'', ''Computer literacy (educational apps)'', ''Empathetic listening'', ''Peer conflict
    mediation'', ''Drawing and crafts'', ''Basic kitchen assistance'']'
  hobbies: '[''Reading adventure/mystery books'', ''Drawing and sketching'', ''Board games (Monopoly Junior)'', ''Listening to R&B and gospel music'', ''Church youth group and community service'', ''Caring
    for pet hamster'', ''Baking cookies with grandmother'']'
  career_goals: She dreams of a future where she can help other children in a structured, caring environment, aspiring to become a pediatric nurse or an elementary school teacher. Doris also imagines working
    as a community health advocate to support families in her neighborhood, valuing a stable routine and the opportunity to make a positive impact.
