  career_goals: He aims to transition from financial manager to a senior finance executive—ideally chief financial officer—within the next five years, positioning himself as a strategic partner who drives
    growth through data‑driven decision making and innovative financing. Gino plans to earn a CPA credential and complete an executive MBA to deepen his expertise in corporate strategy and international
    finance. He is passionate about integrating emerging fintech tools (e.g., blockchain‑based payments) to improve operational efficiency. Outside the corporate ladder, he wants to launch a community‑focused
    financial‑literacy program for Hispanic families in West Covina and eventually start a boutique consulting practice that helps small, culturally‑rooted businesses secure capital. Throughout his career
    progression, he seeks to maintain a work‑life balance that protects family time and space for his personal creative pursuits.
