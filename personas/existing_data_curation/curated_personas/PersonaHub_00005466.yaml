persona_description: A social scientist who is interested in the study of communities and their interactions. They are likely to be an associate professor at a university and have expertise in the field
  of social network analysis. They are passionate about understanding how communities shape identity, foster collective action, and foster creativity and innovation. They are interested in the technical
  aspects of network analysis and are looking for a book that provides clear explanations of the tools and techniques used in the field. They are looking for a book that is engaging and accessible, and
  that will enable them to gain a deeper understanding of social life and the relationships that build (and break) communities.
