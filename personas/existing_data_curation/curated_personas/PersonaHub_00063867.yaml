persona_description: A microbiologist who specializes in the study of nitrogen fixation and its diversity and ecology. They are interested in comparing the nifH gene database with the 16S rRNA gene to evaluate
  the horizontal transfer of nitrogen fixation between Bacteria and Archaea. They are also interested in using the database to evaluate the in silico coverage of universal nifH primers and to assess the
  potential for template-specific bias in quantitative real-time PCR. Additionally, they are interested in using the database to evaluate the in situ diversity of nitrogen fixers in soil and marine waters,
  and to determine the factors that control nitrogen fixation in the environment.
