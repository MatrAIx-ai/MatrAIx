  career_goals: Juan aims to advance rapidly within the Salinas Police Department, targeting a promotion to detective within the next three years. He is drawn to the Homicide and Narcotics units, where
    his analytical mindset and attention to detail can add value. To support his ambitions, he plans to enroll in an associate degree in criminal justice and attend advanced training in forensic investigation
    and crisis negotiation. Long‑term, Juan envisions becoming a lieutenant who can implement community‑oriented policing programs that integrate arts and culture, such as a mural project that engages at‑risk
    youth. He also aspires to earn commendations for exemplary service and to be recognized as a top performer in the precinct.
