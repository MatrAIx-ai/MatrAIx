persona_description: A scientist who specializes in the field of cell biology, particularly in the development of new human embryonic stem (ES) cell lines. Dr. Xu's research involves the purification and
  refinement of ES cell culture media, the removal of animal feeders and their secreted factors, and the development of a cocktail of completely defined materials to replace the medium. His goal is to provide
  hope for the development of new and safe cell-based therapeutics for a wide range of diseases.
