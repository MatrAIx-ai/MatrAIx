  career_goals: James aims to transition into a leadership and instructional role within EMS. He plans to become a certified paramedic instructor and eventually an EMS director, where he can shape training
    curricula and response protocols. He is developing a community health‑literacy program that uses visual storytelling and interactive workshops to improve emergency preparedness. He also intends to pursue
    a Master’s degree in Public Health or Emergency Management to influence county‑wide policy, and to integrate emerging technologies such as drone‑delivered AEDs and AI‑driven triage tools into local
    emergency services. While advancing his career, he wishes to maintain occasional field shifts to stay connected to direct patient care.
