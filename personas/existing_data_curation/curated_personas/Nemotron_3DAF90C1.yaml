  career_goals: Although Lena is only two, she already hints at future ambitions that blend her curiosity with a practical desire to help. She often points to animals in picture books and exclaims she wants
    to “take care of the dogs” or “be a doctor for animals,” suggesting an early interest in becoming a veterinarian or wildlife caregiver. She also likes building towers with blocks and says she wants
    to “make big houses,” indicating a nascent fascination with construction and design. Her emerging goals reflect a love for exploring how things work while wanting to provide care and safety for living
    beings.
