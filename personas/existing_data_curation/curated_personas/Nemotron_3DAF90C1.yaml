personas:
  professional: A budding preschool problem‑solver named Lena Skyrm displays early engineering instincts through block stacking, merging curiosity with practicality while their spontaneous energy makes
    structured classroom time a challenge.
  sports: An energetic two‑year‑old named Lena Skyrm attends the Sprout Kids gymnastics club, cheers for the nearby NFL team the Chicago Bears during family TV nights, and loves splashing at the local splash
    pad where they delight in the cool spray, always preferring free‑form movement over rigid schedules.
  arts: A vivid imaginative dreamer named Lena Skyrm delights in The Wiggles' upbeat songs, repeats the lullaby Twinkle Twinkle Little Star, and they re‑enact scenes from the animated series Bluey, weaving
    a tapestry of playful artistic inspiration into daily pretend play.
  travel: A wide‑eyed explorer named Lena Skyrm loves family trips to the nearby zoo, beach outings at Santa Monica, and the magical wonder of Disneyland, preferring spontaneous sandcastle building to rigid
    itineraries, though they sometimes cling anxiously to parents on crowded rides.
  culinary: A budding foodie named Lena Skyrm prefers smooth macaroni‑and‑cheese with extra cheddar, banana slices with a dab of peanut butter, and bright strawberry yogurt, yet stubbornly rejects broccoli,
    relying on parents to blend meals and they often demand a sweet treat after a tantrum.
  core: A curious yet emotionally volatile two‑year‑old, Lena Skyrm toggles between spontaneous discovery and a sudden need for structure, thriving on tactile play while they erupt into tears over the smallest
    setbacks.
background:
  cultural: Lena is a white American child raised in North Easton, Massachusetts, a suburban area with deep New England roots. Her family celebrates typical American holidays such as Thanksgiving, Halloween,
    and Christmas, often incorporating local traditions like attending the town’s farmers market and participating in the public library’s story‑time program. The cultural atmosphere emphasizes community
    involvement, practical problem‑solving, and a love of the outdoors, all of which align with Lena’s spontaneous curiosity and need for structured, comforting routines. Exposure to a multilingual and
    multicultural community in the Greater Boston region subtly broadens her awareness, though her daily life reflects predominantly Anglo‑American customs.
