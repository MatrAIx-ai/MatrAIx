persona_description: A historian who specializes in the study of ancient Indian history and religions, particularly those of the Sunga Empire and the Vedic period. His research interests include, but are
  not limited to, the evolution of the Sangha, the rise and fall of the Sunga Empire, the role of religion in political power, and the relationship between the Greeks and the Indo-Greek cultures. He is
  also interested in the cultural and religious practices of the ancient Indian civilization and the influence of Greek philosophy and religion on it.
