  career_goals: Cassy imagines a future where she can blend her love of exploration with practical problem‑solving. She often talks about becoming a veterinarian because she wants to understand animals
    and help them in real, hands‑on ways. She also dreams of designing playgrounds or toys, combining her creative drawing skills with her practical mindset to create safe, fun spaces for other kids. While
    these ambitions are playful, they reflect her desire to help others, use her curiosity, and apply organized thinking to real‑world challenges.
