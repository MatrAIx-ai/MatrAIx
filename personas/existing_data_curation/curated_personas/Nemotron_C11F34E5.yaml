personas:
  professional: Cassy Layton, a budding junior naturalist, channels their curiosity and practical mindset into daily science experiments and garden observations, meticulously recording each finding in a
    color‑coded notebook that balances creativity with organization.
  sports: Cassy Layton, a lively member of the Riverdale Tigers youth soccer club, cheers for the Denver Broncos on game nights, spends Saturdays hiking the trails of Rocky Mountain National Park, and practices
    beginner yoga in their backyard to maintain flexibility and calm focus.
  arts: Cassy Layton, an avid board‑game fan and adventure‑book collector, revels in the whimsical illustrations of Beatrix Potter, the bold colors of Eric Carle’s picture books, and the strategic depth
    of the board game ‘Ticket to Ride,’ often sketching their own game maps during quiet afternoons.
  travel: Cassy Layton, an enthusiastic family traveler, has explored the towering red rocks of Sedona, the bubbling geysers of Yellowstone National Park, and the historic castles of Scotland, preferring
    itineraries that blend guided tours with free‑roaming nature walks and treasure‑hunt style scavenger games.
  culinary: Cassy Layton, a budding home chef, loves whipping up peanut butter‑banana sandwiches, stirring garden‑fresh tomatoes into a simple spaghetti sauce, and baking chocolate chip cookies, carefully
    measuring each ingredient with their sunny‑yellow kitchen scale and sprinkling a pinch of cinnamon for extra flavor.
  core: Cassy Layton, a quietly curious 7‑year‑old, balances investigative play with practical organization, thrives in small‑group settings, and turns everyday moments into mini‑experiments.
background:
  cultural: Cassy is raised in a predominantly white, Midwestern family in Fairfield, Ohio, where community values such as friendliness, reliability, and modesty are emphasized. Her family celebrates typical
    American holidays—Thanksgiving, Christmas, and Fourth of July—with local traditions like county fair visits and church gatherings. The Midwestern emphasis on practicality and organization influences
    her daily routines, while the region's love for outdoor activities and seasonal events nurtures her curiosity about nature and community involvement.
