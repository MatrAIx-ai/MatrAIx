  hobbies: '[''Visiting art galleries and museums'', ''Photography (architectural and street)'', ''Gardening and landscape design'', ''Reading non‑fiction on psychology, sociology, and business innovation'',
    ''Cooking Mediterranean cuisine'', ''Volunteering at the local community center'', ''Hiking in Long Island state parks'']'
  career_goals: Vasilios aims to progress from first‑line supervision to a facilities‑manager role overseeing multiple properties in the Nassau County area. He plans to deepen his expertise in sustainable
    operations by completing certifications in green cleaning and facilities management. Over the next five years, he hopes to lead a department that integrates innovative technology and eco‑friendly practices,
    mentor emerging supervisors, and eventually contribute to strategic planning for a regional hospitality group.
