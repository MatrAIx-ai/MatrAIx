personas:
  professional: Regina Dobbins, a two‑year‑old with a keen curiosity and methodical mind, transforms everyday playtime into a mini‑enterprise by meticulously sorting crayons by hue, constructing towering
    block cities, and earnestly claiming the title of 'Chief Organizer' in their make‑believe kindergarten office, where they proudly issue imaginary work orders.
  sports: Regina Dobbins, a two‑year‑old who delights in toddler gymnastics at the community center, joins a mini‑soccer group where they competitively chase the ball, and cheers loudly for the local baseball
    team, the River City Royals, during family outings to the park.
  arts: Regina Dobbins, a two‑year‑old with an innate appreciation for vibrant art, spends mornings finger‑painting bold swirls on oversized paper while humming the catchy tunes of Raffi’s 'Baby Beluga',
    and proudly displays a collage of crayon‑scraped leaves they collected during a park walk.
  travel: Regina Dobbins, a two‑year‑old who loves short family adventures, explores the local zoo and the interactive children's museum in Chicago with boundless curiosity, and dreams of the day they can
    toddle through the gardens of Versailles and see the Eiffel Tower sparkle at night.
  culinary: Regina Dobbins, a two‑year‑old who favors soft, sweet foods like mashed banana and avocado, often grabs a spoon to sprinkle shredded cheddar on their mac & cheese, and they delight in occasional
    crunchy carrot sticks as a celebratory snack after finishing a puzzle.
  core: Regina Dobbins, a two‑year‑old whose curiosity fuels methodical play, competitive saving, and calm confidence, they balance organized creativity with a healthy dose of independent stubbornness and
    occasional splurges on squeaky toys.
background:
  cultural: Regina is raised in a Black American family in Indianapolis, Indiana, where community, church, and family traditions shape her daily life. Her household celebrates African‑American cultural
    events such as Juneteenth and embraces soulful music, gospel choirs, and storytelling traditions passed down through generations. The neighborhood’s rich mural art and local cultural festivals expose
    her to diverse artistic expressions, reinforcing her curiosity and appreciation for unconventional ideas while grounding her in Midwestern values of reliability and hard work.
attributes:
  skills: '[''Basic language (identifying colors and objects)'', ''Shape and color sorting'', ''Fine motor coordination (crayon drawing)'', ''Simple puzzle solving (3‑piece puzzles)'', ''Memory for routine
