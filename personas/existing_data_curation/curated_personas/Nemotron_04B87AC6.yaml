  hobbies: '[''Crayon coloring and drawing'', ''Building block towers'', ''Listening to children’s music and African‑American lullabies'', ''Visiting the Indianapolis Children’s Museum'', ''Library storytime
    sessions'', ''Playing with water tables'', ''Pretend play with dolls and cars'']'
  career_goals: Although Regina is not yet in the workforce, her ambitions are oriented toward learning and creative expression. She aspires to read picture books independently, to draw recognizable pictures,
    and imagines someday becoming a teacher or an artist who can share her love of art and new ideas with others. Her competitive streak motivates her to master new skills quickly and outperform peers in
    simple games.
