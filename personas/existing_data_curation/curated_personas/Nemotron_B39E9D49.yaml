personas:
  professional: Niyla Holley, a centenarian applied mathematician and community data analyst, leverages Python, R, and statistical modeling to translate complex health and education data into clear visual
    reports for seniors, while mentoring youths through an art-infused STEM program she designs with meticulous project management and a penchant for storytelling.
  sports: Niyla Holley, an avid member of the local senior walking club, follows the Alabama Crimson Tide football season, regularly attends Birmingham Barons baseball games, and participates in gentle
    garden-based exercise, balancing her love for outdoor activity with low-impact stretching to protect her joints.
  arts: Niyla Holley, a watercolor landscape painter and dedicated piano hobbyist, shares her creations at the Northport Community Arts Center, draws inspiration from gospel hymns and the works of Johann
    Sebastian Bach, and leads a quilting circle that honors traditional patchwork storytelling, often quoting the poetry of Langston Hughes in her sessions.
  travel: Niyla Holley, who prefers slow, purpose-driven travel, has taken leisurely road trips to New Orleans for its jazz festivals, visited Washington, D.C. to tour the National Museum of History and
    Culture, and enjoys day excursions to Gulf Shores for sunrise walks, always traveling with a carefully packed herb-infused tea for comfort.
  culinary: Niyla Holley, a modest cook who tends a vegetable garden for fresh collard greens, sweet potatoes, and tomatoes, delights in preparing seasoned fried catfish with a splash of lemon, baking cornbread
    with honey butter, and seasoning dishes with cayenne, thyme, and smoked paprika, while occasionally over-salting her gumbo in a burst of enthusiasm.
  core: Niyla Holley blends a century of scientific rigor, artistic flair, and community stewardship into a disciplined yet quirky lifestyle marked by meticulous budgeting, daily health vigilance, a love
    of watercolor and gospel, and an unyielding dedication to intergenerational mentorship.
background:
  cultural: Niyla’s cultural background is deeply rooted in the African‑American experience of the Deep South. Raised in Tuscaloosa County during segregation, she witnessed the civil‑rights movement firsthand,
    shaping a lifelong commitment to social justice and community solidarity. Her family traditions emphasize gospel music, Southern cooking, oral storytelling, and a reverence for education—especially
    at historically Black institutions where she earned her graduate degree. These influences nurture her values of perseverance, mentorship, and collective uplift, while also informing her appreciation
    for both scientific inquiry and artistic expression.
