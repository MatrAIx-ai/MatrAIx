  career_goals: Even at 101, Niyla’s ambition centers on leaving a lasting legacy of knowledge and empowerment. She intends to complete a memoir that weaves together her experiences of the civil‑rights
    era, the evolution of women in STEM, and her lifelong love of art. She also aims to broaden her intergenerational mentorship program by partnering with local schools to introduce art‑infused STEM curricula,
    and to advocate for greater digital inclusion for seniors in Northport through workshops and community tech hubs.
