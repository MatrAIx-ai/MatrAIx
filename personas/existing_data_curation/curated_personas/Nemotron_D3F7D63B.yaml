  career_goals: Lee aims to leverage his extensive administrative experience to move into an Office Manager or Executive Assistant role within the next two to three years. He plans to obtain the Certified
    Administrative Professional (CAP) credential and to lead a small team, focusing on improving office workflows and implementing best‑practice procedures. Long‑term, he is interested in transitioning
    to an operations coordinator position where he can apply his process‑orientation and competitive drive to drive efficiency across the organization.
