personas:
  professional: Lynn Wobser, a 25‑year‑old real‑estate professional in Orange County, leverages their STEM‑rooted analytical skills and a data‑driven mindset to dominate market analysis and negotiate luxury
    deals while channeling a competitive streak into building a tech‑enabled boutique brokerage brand.
  sports: Lynn Wobser, an avid runner along the Irvine coastline and member of the local Irvine Tennis Club, tunes in to the LA Dodgers and Los Angeles Lakers, plays competitive tennis on weekends, joins
    a seasonal beach‑volleyball league in summer, and plans a winter ski trip to Big Bear, showing that they balance a love of outdoor rhythm with team loyalty.
  arts: Lynn Wobser, who decorates their loft with DIY projects inspired by mid‑century modern pieces from designers like Charles and Ray Eames, curates a rotating gallery of urban architecture photos reminiscent
    of Andreas Gursky, and unwinds to the indie folk sounds of Phoebe Bridgers and Tame Impala, blending visual and auditory art into daily life.
  travel: Lynn Wobser, who has road‑tripped the Pacific Coast Highway, spent a weekend exploring the vibrant food markets of Tokyo for design inspiration, dreams of hiking Zion National Park’s Angel’s Landing,
    and plans to attend a startup conference in Berlin, showing that they balance a love of coastal relaxation with a thirst for tech‑forward urban experiences.
  culinary: Lynn Wobser, a self‑taught home chef, frequently whips up avocado‑toast topped with heirloom tomatoes and feta, perfects a spicy tuna poke bowl with sesame oil and edamame, experiments with
    cauliflower‑crust pizza using fresh rosemary and thyme, and enjoys attending food festivals to taste artisanal kimchi and gourmet tacos al pastor, showing that they maintain a palate that blends health‑focused
    trends with adventurous flavors.
  core: Lynn Wobser, a data‑obsessed yet spontaneously flexible 25‑year‑old, combines a competitive drive with a love for outdoor rhythm, often juggling meticulous market spreadsheets while forgetting to
    water a new houseplant, illustrating that they embody a blend of precision and laid‑back pragmatism.
background:
  cultural: Lynn was raised in a middle‑class suburban family of German and Irish ancestry in the diverse Orange County region. Growing up in Southern California's multicultural environment, she absorbed
    mainstream American values alongside a health‑focused, outdoor‑oriented lifestyle. Her upbringing emphasized independence, pragmatism, and self‑reliance, while exposure to a variety of cultural perspectives
    fostered an appreciation for diversity and the entrepreneurial spirit of the Irvine tech corridor.
attributes:
  skills: '[''Real Estate Market Analysis'', ''Property Valuation'', ''Negotiation and Closing'', ''Client Relationship Management'', ''Digital Marketing for Listings'', ''Data Analysis with Excel and GIS'',
