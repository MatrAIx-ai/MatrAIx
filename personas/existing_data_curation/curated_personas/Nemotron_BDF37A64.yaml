  career_goals: While officially retired, Mandy’s ambition centers on staying engaged, giving back, and continuing personal growth. She aims to expand her volunteer leadership by becoming the volunteer
    coordinator for the Hillsboro Senior Resource Center, where she can design inclusive programs and mentor new volunteers. Mandy also wants to complete a short course in digital photography to document
    her garden and local community events, with the long‑term goal of creating an illustrated memoir of her life in Oregon. Maintaining her health and independence is another priority, so she plans to regularly
    attend senior‑friendly yoga classes and participate in local walking groups.
