  hobbies: '[''Fishing'', ''Woodworking'', ''Classic car restoration'', ''Card games'', ''Church community events'', ''Volunteer parade organizing'', ''Classic movie watching'', ''Country‑folk music'',
    ''Road trips to state parks'']'
  career_goals: In the next few years, Matthew aims to transition from full‑time shop work to a part‑time consultancy role where he can pass on his machining expertise to local manufacturers and apprentices.
    He hopes to establish a modest workshop in Quenemo where hobbyists and small farms can have custom metal parts fabricated. He also plans to volunteer as a technical instructor at the community college's
    vocational program, and to secure a stable retirement fund to support his late wife's memorial foundation.
