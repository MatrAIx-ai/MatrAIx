personas:
  professional: Henry Davis is a senior strategic analyst who blends quantitative data mastery (Excel, Power BI, Tableau, SQL) with a humanities‑informed lens to craft policy recommendations that lift underserved
    neighborhoods, leveraging his curiosity and practical mindset while occasionally battling deadline pressure due to his spontaneous work style.
  sports: Henry Davis plays pickup basketball at the local community center, follows the Washington Wizards and DC United, and hikes the Shenandoah trails on weekends, joining a Fairfax County running club
    that meets every Saturday for 5K runs while maintaining a flexible fitness routine that accommodates their spontaneous nature.
  arts: Henry Davis captures candid street scenes with a DSLR, frequents live jazz venues to hear Kamasi Washington, Miles Davis (a namesake homage), and Erykah Badu, and volunteers at the regional museum
    for Juneteenth exhibitions, melding a love for visual storytelling with a deep appreciation for soulful music and community art projects.
  travel: Henry Davis prefers flexible road trips that blend nature and history, having explored Shenandoah National Park, historic neighborhoods of Washington, D.C., and the jazz clubs of New Orleans,
    while dreaming of a future cultural immersion tour to Ghana to trace diaspora roots.
  culinary: Henry Davis enjoys cooking collard greens, cornbread, and jambalaya at family gatherings, skillfully seasons dishes with smoked paprika and hot sauce, but often opts for takeout soul‑food bowls
    after late‑night board game nights, balancing moderate cooking confidence with a love for bold, comforting flavors.
  core: Henry Davis is a data‑driven community strategist whose curiosity fuels policy innovation, yet a love for spontaneous jazz outings and occasional deadline slip‑ups keeps life delightfully unpredictable.
background:
  cultural: Henry grew up in a middle‑class Black family in the suburbs of Washington, D.C., with deep roots in the Mid‑Atlantic African‑American community. His grandparents were part of the civil‑rights
    movement, and family gatherings often centered around stories of resilience and cultural pride. He attended a historically Black church that emphasized education, social justice, and community service,
    shaping his sense of responsibility toward equity. Living in Fairfax County, a diverse and rapidly growing region, exposed him to a mosaic of cultures, reinforcing his appreciation for cross‑cultural
    dialogue. His humanities degree let him explore African diaspora literature and history, deepening his connection to his heritage. These experiences inform his professional focus on policies that uplift
    underserved communities and his personal commitment to preserving and celebrating Black cultural traditions through participation in Juneteenth events, museum visits, and community arts projects.
attributes:
