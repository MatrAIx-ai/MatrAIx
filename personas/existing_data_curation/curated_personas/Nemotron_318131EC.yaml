  hobbies: '[''Urban Hiking'', ''Street Photography'', ''Reading Historical Nonfiction'', ''Pickup Basketball'', ''Jazz and Soul Music Listening'', ''Board Game Nights'', ''Mentoring at Local Youth Center'',
    ''Coffee Shop Journaling'']'
  career_goals: Henry aims to advance to a senior strategic analyst or director of policy analysis within a government agency or nonprofit focused on urban development and community empowerment. He seeks
    to lead initiatives that increase equity in public services across Fairfax County, integrate data‑driven decision‑making, and adopt emerging technologies such as AI‑enhanced analytics. To support these
    ambitions, he plans to pursue a PMP certification or an MBA, strengthening his leadership and organizational skills. Ultimately, he wants to be recognized as a trusted advisor who blends creative insight
    with practical implementation to drive meaningful social impact.
