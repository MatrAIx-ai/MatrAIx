persona_description: Dr Carl Heneghan, a renowned expert in evidence-based medicine and non-communicable diseases, has been invited to speak at the World Health Day at the World Health Organization. He
  is a director of The Centre for Evidence-Based Medicine and is known for his collaboration with the WHO on a guideline for self-care in non-communicable diseases. Dr Heneghan's expertise in evidence-based
  medicine and his ongoing collaboration with the WHO make him an ideal speaker for the event, highlighting the importance of high blood pressure as a public health concern and the need for the recognition
  and treatment of high blood pressure.
