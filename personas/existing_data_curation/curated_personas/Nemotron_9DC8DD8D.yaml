  career_goals: Despite being 94, Xiaoling remains driven to leave a lasting intellectual legacy. She aims to complete a memoir intertwined with a curated anthology of essays on Chinese‑American art, preserving
    her perspective for future scholars. She plans to organize a small exhibition of her calligraphy and paintings at the Palo Alto Senior Community Center, showcasing unconventional ink techniques she
    has developed. Xiaoling seeks to serve as a senior advisor to the Asian Art department of the Palo Alto Museum of Art, providing critical feedback on upcoming shows and mentoring curators. She also
    wishes to establish a mentorship circle for emerging senior artists, offering one‑on‑one critique sessions that emphasize independent thinking and healthy skepticism. Finally, she hopes to contribute
    her oral histories to the Stanford University Archive of Asian American Experiences, ensuring that the stories of her generation are documented.
