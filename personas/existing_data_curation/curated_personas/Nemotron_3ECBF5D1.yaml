personas:
  professional: An accomplished civil engineer, Loretta Ellison, leverages three decades of structural design expertise to lead data‑driven, cost‑conscious infrastructure projects across the Bronx, translating
    community input into resilient bridges and streetscapes while mentoring emerging women engineers, and they consistently secure winning bids through a competitive, risk‑aware approach.
  sports: An avid supporter of the New York Knicks and a regular participant in senior Zumba and salsa classes at the Bronx Community Center, Loretta Ellison also joins a local walking club that meets for
    Saturday morning strolls through Pelham Bay Park, balancing a competitive spirit—often challenging teammates in friendly basketball pick‑ups—with a love for lively group exercise.
  arts: Passionate about soulful expression, Loretta Ellison sings tenor in her church choir, frequents jazz nights featuring Wynton Marsalis at the Blue Note, enjoys Afro‑beat tributes to Fela Kuti, and
    draws inspiration from the writings of Maya Angelou and the Broadway production of Hamilton, all of which shape her creative outlook and community storytelling.
  travel: Traveling with a blend of adventure and family responsibility, Loretta Ellison plans weekend getaways to Jamaica to explore her ancestors' culinary roots, longs for a cultural tour of Washington,
    D.C.'s civil‑rights landmarks, and occasionally visits the Hudson Valley for relaxed fall‑foliage trips, all while booking budget‑friendly accommodations that fit her structured calendar.
  culinary: With a kitchen that smells of slow‑cooked collard greens, sweet‑potato pie, and fragrant jerk chicken, Loretta Ellison masterfully fuses soul‑food classics with Caribbean flavors—crafting dishes
    like oxtail stew with ginger‑scallion rice and Trinidadian doubles—while their cooking skill ranges from confident roux‑making to occasional over‑seasoned experiments that become the talk of neighborhood
    potlucks.
  core: Loretta Ellison is a meticulous, community‑driven civil engineer who balances competitive project leadership with a love for choir, Zumba, soulful cooking, and knitting scarves for shelters, while
    wrestling with occasional stress‑induced worry and a habit of over‑checking spreadsheets.
background:
  cultural: Loretta grew up as a Black woman in the Bronx during the transformative years following the civil‑rights movement, surrounded by a close‑knit African‑American community that valued resilience,
    family, and faith. Her upbringing was shaped by the rhythms of local churches, block parties, and the vibrant cultural mosaic of the Bronx, which includes strong Caribbean influences. These experiences
    fostered a deep respect for community solidarity and a commitment to social justice. Loretta celebrates traditions such as Kwanzaa and Juneteenth, and she maintains strong ties to her extended family,
    often gathering for storytelling sessions that honor her ancestors' journeys from the Great Migration to New York City. Her cultural identity informs her professional ethos—prioritizing equitable infrastructure,
    uplifting underrepresented voices, and mentoring the next generation of Black engineers.
attributes:
