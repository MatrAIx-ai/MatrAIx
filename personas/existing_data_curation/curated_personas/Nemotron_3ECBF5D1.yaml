  hobbies: '["Community gardening", "Church choir", "Jazz and Afro‑beat concerts", "Zumba classes", "Salsa dancing", "Cooking (soul‑food and Caribbean dishes)", "Potluck hosting", "Reading historical fiction",
    "Watching the New York Knicks", "Knitting for shelters"]'
  career_goals: Approaching the culmination of a distinguished career, Loretta aims to transition into a senior advisory role that leverages her expertise to shape resilient, equitable infrastructure for
    the Bronx. She intends to spearhead a flagship flood‑mitigation project that integrates green stormwater design with community input, positioning the borough as a model for climate‑adapted urban planning.
    Simultaneously, she plans to establish a scholarship fund and mentorship program for Black women pursuing engineering, ensuring her legacy of diversity and inclusion. Over the next five years, Loretta
    seeks to secure a consulting contract with the New York City Department of Transportation, allowing her to influence policy while maintaining a structured, predictable work rhythm that supports her
    health and reduces stress.
