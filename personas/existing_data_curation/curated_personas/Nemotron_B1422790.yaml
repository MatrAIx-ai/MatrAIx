  career_goals: Saturnino plans to enroll in a Business Administration program at a nearby college, aiming to specialize in operations or project management. He seeks internships in logistics, event coordination,
    or hospitality to apply his organizational strengths in real‑world settings. In the long term, he aspires to become an Operations Coordinator for a regional nonprofit or start his own community‑focused
    café that celebrates Cuban culture while providing job training for local youth. He is motivated to blend his disciplined work ethic with his desire to give back to his community.
