personas:
  professional: Anjali King, a budding junior scientist‑storyteller, merges an organized curiosity with a competitive edge, and they channel these traits into designing LEGO‑based experiments and leading
    school debate rounds while dreaming of becoming a future aerospace engineer.
  sports: Anjali King thrives on after‑school soccer matches with the Little Eagles Soccer Club, roots for Manchester United’s Premier League games, and supplements the competition with summer swimming
    lessons and winter ice‑skating sessions at the community rink.
  arts: Anjali King spends weekends dancing to A.R. Rahman’s upbeat Bollywood tracks, devours fantasy series like Percy Jackson, and admires actress Millie Bobby Brown for her role in Stranger Things, weaving
    these artistic passions into lively storytelling at school.
  travel: Anjali King prefers family road trips with detailed itineraries, has explored Yellowstone National Park, dreams of visiting the Space Center in Houston, and eagerly awaits a future adventure to
    London’s Natural History Museum.
  culinary: Anjali King shows a budding knack for cooking, often helping whip up crispy Aloo Samosas and sweet Gulab Jamun for Diwali, while also perfecting pepperoni pizza at home, and they never miss
    the chance to add extra mango chutney for a flavorful twist.
  core: Anjali King is a talkative, competitively spirited nine‑year‑old who balances relentless curiosity with meticulous planning, inspires friends with daring LEGO creations, yet sometimes doubts others’
    motives and battles bedtime procrastination.
background:
  cultural: Anjali is a second‑generation South Asian American of Indian heritage. Her family speaks both English and Hindi at home, and they observe cultural festivals such as Diwali and Holi, sharing
    traditional foods like samosas and biryani. Growing up in Southlake, Texas, she balances the values of her Indian cultural roots—respect for family, education, and community—with the diverse, suburban
    American environment. This blend influences her love for storytelling, music, dance, and a strong appreciation for both new ideas and established traditions.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Basic coding (Scratch)", "LEGO building", "Science experiment planning", "Public speaking", "Group project organization"]'
  hobbies: '["Reading adventure books", "Soccer", "Bollywood dance", "LEGO building", "Science kits", "School debate club", "Storytelling club", "Cultural celebrations (Diwali)"]'
  career_goals: Anjali dreams of a future where she can explore the unknown and create tangible solutions. She aspires to become an astronaut or a STEM researcher, fascinated by space and technology, while
    also imagining herself as a teacher or community leader who can inspire other children. She wants to develop her leadership and technical skills now, aiming to win science fairs, lead school clubs,
    and eventually contribute to innovative projects that blend curiosity with practicality.
