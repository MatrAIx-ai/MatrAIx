  career_goals: Christopher aspires to transition from supervising a single housekeeping team to overseeing facility operations for a larger complex or a portfolio of properties. He aims to obtain professional
    certifications such as the Certified Professional Cleaner (CPC) and Sustainable Facility Management credentials, and to champion eco‑friendly cleaning programs that reduce chemical waste and improve
    employee health. Over the next five years, he plans to move into a facility manager or district operations role where he can combine his technical background with his people‑focused leadership style,
    eventually mentoring other supervisors and contributing to industry best‑practice guidelines.
