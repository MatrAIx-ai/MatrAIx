personas:
  professional: Stephanie Dixson, a veteran community volunteer and aspiring senior caregiver, leverages her methodical planning, budgeting expertise, and outgoing spirit to coordinate engaging programs
    for older adults at the San Bernardino senior center while pursuing certification.
  sports: Stephanie Dixson, a dedicated fan of the Los Angeles Dodgers and a regular participant in the San Bernardino senior walking club, swaps her line‑dance shoes for comfortable sneakers each Saturday
    to stroll the river trail, viewing the activity as both social time and gentle cardio.
  arts: Stephanie Dixson, a soulful member of her church choir, finds inspiration in the voices of Aretha Franklin and the storytelling of Maya Angelou, spends evenings reading historical novels, and frequently
    attends performances at the San Bernardino Community Playhouse.
  travel: Stephanie Dixson, who cherishes road trips to the historic streets of New Orleans and the vibrant markets of Oaxaca, now dreams of a pilgrimage to Washington, D.C.’s national museums to trace
    the broader narratives that echo her own family’s journey.
  culinary: Stephanie Dixson, a confident home chef, blends Southern collard‑green stew with Mexican‑style corn‑masa tamales, often seasoning with smoked paprika, cumin, and fresh cilantro, and delights
    in baking sweet‑potato pies that become the centerpiece of neighborhood potlucks.
  core: Stephanie Dixson is a meticulous, worry‑prone garden‑enthusiast who balances a love for community baking with a habit of hoarding coupons and late‑night recipe experiments.
background:
  cultural: Stephanie was raised in the Black community of San Bernardino during the civil‑rights era, absorbing the strong church‑centered traditions, Southern culinary heritage, and a deep sense of mutual
    support. Her family’s migration from the South to California exposed her to a blend of African‑American and Mexican cultural influences, reflected in her cooking, music, and communal values. She maintains
    close ties to local Black churches, senior groups, and community festivals that celebrate African‑American history and the contributions of Black residents to the Inland Empire.
attributes:
  skills: '[''Traditional cooking'', ''Baking'', ''Household budgeting'', ''Garden cultivation'', ''Volunteer coordination'', ''Event planning'', ''Caregiving'', ''Conflict mediation'', ''Basic computer
    literacy'']'
  hobbies: '[''Backyard gardening'', ''Line dancing'', ''Church choir singing'', ''Reading historical fiction'', ''Genealogy research'', ''Baking'', ''Card games with friends'']'
  career_goals: She aspires to obtain a certified senior caregiver credential and volunteer as a program coordinator at the San Bernardino senior center, where she can design social activities that foster
    community among older adults. She also hopes to complete her GED, enabling her to mentor youth in her neighborhood on practical life skills. In the longer term, she dreams of publishing a cookbook that
    weaves together family recipes and stories of the Black community in the Inland Empire.
