  hobbies: '[''Collecting leaves and pine cones'', ''Building forts with blankets and cushions'', ''Drawing and coloring'', ''Playing with LEGO bricks or wooden blocks'', ''Reading picture books about animals
    and machines'', ''Simple science experiments (baking soda volcano)'', ''Singing and dancing to children’s songs'', ''Visiting the neighborhood park'']'
  career_goals: Guy often talks about becoming a “helper” when he grows up. He imagines working as a park ranger who explores nature, a teacher who guides younger children, or a veterinarian who cares for
    animals. He also expresses interest in building things like a tiny engineer, reflecting his curiosity about how things work. His ambitions are guided by a desire to keep people safe, stay organized,
    and make a positive difference in his community.
