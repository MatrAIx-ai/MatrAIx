personas:
  professional: Guy Mckeon, a budding classroom organizer, applies curiosity and a practical mindset to help their teacher sort toys and arrange art supplies, and they prefer flexible routines over rigid
    plans.
  sports: Guy Mckeon participates in the Little Explorers preschool soccer club, where their flexible, easy‑going style lets them enjoy the game without strict positioning, and they often hype up televised
    Manchester United matches, trying to imitate the players’ celebrations during playtime.
  arts: Guy Mckeon spends afternoons drawing whimsical dinosaurs inspired by Dr. Seuss's illustrations and sings along loudly to the catchy tunes of The Wiggles, finding comfort in familiar melodies while
    their imagination fuels new story ideas.
  travel: Guy Mckeon loves family road trips that blend relaxed stops at playgrounds with occasional visits to big attractions like Disney World and the Grand Canyon, planning most days on the fly while
    they secretly worry about losing their favorite stuffed bear on the journey.
  culinary: Guy Mckeon enjoys the crunchy taste of chicken nuggets paired with sweet ketchup, loves buttery macaroni and cheese, and, despite limited cooking skills, proudly spreads peanut butter on toast
    by themselves, though they sometimes forget to wash their hands afterward.
  core: Guy Mckeon is a curious, kind‑hearted 5‑year‑old who balances practical play with imaginative daydreams, worries about small mishaps, and thrives on flexible routines and gentle social interactions,
    and they often seek quiet corners after lively play.
background:
  cultural: Guy grows up in a white, middle‑class family in Big Lake, Minnesota, a community known for its close‑knit, friendly atmosphere and strong seasonal traditions. His family’s heritage includes
    German and Scandinavian roots common in the region, which influence holiday celebrations and seasonal activities like ice skating, snowshoeing, and fishing. The local school and church emphasize cooperation,
    modesty, and community service, reinforcing his considerate and harmonious nature. Exposure to community events, library story times, and neighborhood playdates shapes his interests in nature, storytelling,
    and helping others, while also contributing to his occasional worry in new or noisy environments.
attributes:
  skills: '[''Drawing simple pictures'', ''Counting to 20'', ''Building towers with blocks'', ''Pretend play (doctor, teacher, firefighter)'', ''Following simple routines'', ''Sharing and cooperating with
