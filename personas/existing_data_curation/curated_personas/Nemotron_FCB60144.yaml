personas:
  professional: Naome Mcswain, a budding junior architect, channels their love for whimsical drawings and meticulous LEGO constructions into early design experiments, and they plan each imagined building
    with surprising methodical detail while often doubting classmates’ ideas and striving to prove the superiority of their own concepts.
  sports: Naome Mcswain plays on the Little Tigers Soccer Club as a goalkeeper, where their competitive edge shines; they meticulously practice drills and track stats on a homemade scoreboard, yet they
    sometimes clash with teammates over strategies and prefer winning over teamwork.
  arts: Naome Mcswain delights in sketching whimsical creatures with crayons and watercolors, drawing inspiration from picture‑book illustrators like Eric Carle and Mo Willems, while they dance to the upbeat
    tunes of Raffi and The Wiggles, and they proudly display a wall of self‑made artwork that reflects their organized yet imaginative spirit.
  travel: Naome Mcswain dreams of exploring the vibrant coral reefs of Hawaii and the historic castles of Scotland after meticulously planning a pretend itinerary on graph paper, balancing the excitement
    of adventure with the comfort of familiar backyard expeditions, and they often worry about traveling far from home.
  culinary: Naome Mcswain loves the comforting taste of macaroni and cheese, the crunch of apple slices, and the sweet zing of strawberry jam, enjoys helping in the kitchen by stirring batter for pancakes
    and arranging colorful fruit platters, but they sometimes forget to wash hands before cooking, prompting caregivers to gently remind them.
  core: Naome Mcswain is a curious, organized six‑year‑old who blends competitive creativity with a habit of worrying over every detail, from building LEGO towers to saving allowance, and they constantly
    seek control through meticulous planning.
background:
  cultural: Naome lives in New Hebron, a small town in Simpson County, Mississippi, within a predominantly white community that values Southern hospitality, close family ties, and community gatherings.
    Her family attends church on Sundays, celebrates holidays with traditional meals and backyard barbecues, and participates in local events such as the county fair. These cultural experiences encourage
    her curiosity and creativity while reinforcing a sense of responsibility, politeness, and modesty.
attributes:
  skills: '[''Reading simple sentences'', ''Counting to 100'', ''Puzzle solving'', ''Basic drawing and coloring'', ''Following step‑by‑step instructions'', ''Organizing school supplies'']'
  hobbies: '[''Drawing and painting'', ''Reading picture books'', ''Building with LEGO and wooden blocks'', ''Collecting leaves and rocks'', ''Listening to children’s music'', ''Exploring the backyard garden'']'
  career_goals: Naome often talks about becoming an artist who creates imaginative pictures that tell new stories, a museum curator who discovers unusual artworks, or a scientist who explores how things
    work. She dreams of a future where she can combine her love for art, curiosity about new ideas, and her organized, methodical approach to bring creative projects to life.
