persona_description: A healthcare professional who works in a hospital or clinic, responsible for identifying and managing potential risks associated with bloodborne viruses (BBVs) exposure incidents. This
  person is highly knowledgeable about the risks associated with BBVs, the types of injuries that carry a higher risk, and the laboratory tests that can help detect if a person has been infected by a BBV
  virus. They are skilled in managing exposure incidents and are familiar with the testing procedures, including antibody tests, viral load tests, and liver function panel tests. They are also aware of
  the window period for detecting antibodies, the importance of confirming a live, active infection through a confirmatory test, and the use of NAT assays to detect viral RNA/DNA. They have a deep understanding
  of the genetic testing process for BBVs and the importance of distinguishing contaminating from infecting strains.
