  career_goals: Although retired from formal employment, Joyce aims to remain an active contributor to her community. She plans to take on a volunteer leadership role at the Hartford senior center, designing
    and facilitating flexible activity programs that blend learning with fun. She hopes to launch a senior-focused mentorship circle where older adults can share life stories, practical skills, and healthy
    competition through games like bridge and trivia. Joyce also aspires to complete a personal genealogy project, documenting her family’s New England roots, and to enhance her digital skills by mastering
    photography and photo-editing for a community history exhibit. Maintaining her independence and health is a core ambition, so she intends to stay involved in low-impact fitness classes and regular health
    screenings.
