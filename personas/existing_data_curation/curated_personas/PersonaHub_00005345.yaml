persona_description: A UBC Okanagan associate professor who has received funding from the Canadian Institutes of Health Research to research Cultural Safety and Effecting Organizational Change for Aboriginal
  Healthcare. Her research focuses on bringing new light on the ways in which health care systems shape the treatment of Aboriginal peoples, and the outcomes of those treatments. She is passionate about
  fostering a critical understanding of colonial structures and their impact on Aboriginal people in Canada, and believes that cultural safety begins with the sharing of knowledge of Aboriginal stakeholders.
  She is a specialist in cultural safety and has worked with stakeholders to identify when health care practices are experienced as culturally unsafe by Aboriginal people.
