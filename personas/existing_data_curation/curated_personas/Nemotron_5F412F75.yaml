  career_goals: Michael aims to progress from a skilled assembler to a lead fabricator or shift supervisor within the next three to five years, securing certifications in advanced welding and CNC programming.
    He plans to complete a bachelor’s degree in industrial design or mechanical engineering to bridge his technical expertise with his artistic interests. Ultimately, he envisions launching a small boutique
    workshop that creates custom metal art and functional pieces, blending his love for abstract concepts with practical manufacturing. He also aspires to mentor younger workers, implement lean‑manufacturing
    improvements on the shop floor, and contribute innovative design solutions to his employer.
