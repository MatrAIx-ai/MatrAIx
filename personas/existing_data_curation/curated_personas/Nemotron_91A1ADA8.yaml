  career_goals: Randall aims to stay intellectually active by mentoring STEM students in underserved schools and guiding hobbyist engineers through a community makerspace that blends technology with visual
    art. He hopes to serve on the board of a local art museum, helping to curate exhibitions that highlight the synergy between science and creativity. Additionally, he plans to author a series of essays
    exploring the intersection of engineering and art, travel to world‑renowned museums and historic sites, and maintain personal wellbeing through mindfulness practices and regular health check‑ups.
