persona_description: A scientist and researcher with expertise in stem cell research and treatment, particularly in the fields of heart disease and lung diseases. They have received at least 99 CIRM awards
  totaling more than $215 million since 2004, and have been involved in the creation of the Sanford Stem Cell Clinical Center at UC San Diego Health, which is the center of the CIRM-designed Stem Cell Alpha
  Clinics Network. They are currently investigating the use of genetically modified hematopoietic stem cells and mesenchymal stem cell extracellular vesicles (MSC-EV) as potential therapies for Danon disease
  and pulmonary fibrosis, respectively.
