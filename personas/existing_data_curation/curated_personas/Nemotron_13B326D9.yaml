personas:
  professional: Tameki Hall, a two‑year‑old budding explorer, already demonstrates nascent problem‑solving skills by stacking blocks methodically while experimenting with new shapes, balancing boundless
    curiosity with a surprisingly practical approach to play that hints at future engineering interests.
  sports: Tameki Hall, a lively two‑year‑old, participates in toddler soccer sessions at the community center, roots for the local baseball team, the Chicago Cubs, and spends afternoons climbing jungle
    gyms, balancing energetic bursts of activity with needed quiet playtime on the sandbox.
  arts: Tameki Hall, a curious two‑year‑old, delights in finger‑painting vivid swirls while humming Disney’s “Let It Go” from Frozen, eagerly listens to Dr. Seuss story‑time at the library, and dances to
    upbeat tunes by Beyoncé during family living‑room dance parties.
  travel: Tameki Hall, an adventurous two‑year‑old, has toured the nearby aquarium and enjoyed a sunny family getaway to the Florida beach, prefers short stroller‑friendly trips, and dreams of exploring
    the dinosaur exhibits at the Natural History Museum in Washington, D.C.
  culinary: Tameki Hall, a selective two‑year‑old, adores crunchy chicken nuggets paired with sweet potato fries, prefers sliced apples over grapes, delights in spreading butter on soft toast, and occasionally
    sneaks a bite of the family’s mild salsa when no one’s looking.
  core: Tameki Hall, a two‑year‑old bundle of inquisitive energy, balances relentless curiosity with practical play, often negotiating for an extra bedtime story while clutching their favorite stuffed bunny.
background:
  cultural: Tameki is an African‑American child raised in Saint Augustine, Florida, a city steeped in Southern history and a vibrant multicultural community. Her family celebrates African‑American cultural
    traditions through music, storytelling, and regular participation in church services where gospel and jazz often feature. They attend local festivals and historic tours that highlight St. Augustine’s
    colonial past, fostering a sense of place and heritage. Family gatherings emphasize strong intergenerational bonds, shared meals of Southern staples such as collard greens and sweet potatoes, and communal
    values of support and resilience. These cultural influences shape her early experiences, providing a rich blend of heritage and the diverse environment of St. Johns County.
