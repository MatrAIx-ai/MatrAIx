  hobbies: '["Quilting and textile craft", "Visiting local art galleries and museums", "Reading poetry and diaspora literature", "Balcony herb gardening", "Walking in Bronx parks", "Cooking fusion meals",
    "Teaching sewing to youth", "Collecting local oral histories"]'
  career_goals: Although retired from formal employment, Shannon aims to leave a lasting imprint on her community. She hopes to compile a visual and oral history of the Bronx’s Black and immigrant neighborhoods,
    using her quilts and photographs as storytelling media. She aspires to mentor a small group of senior women in preserving family recipes and craft traditions, and eventually host a community exhibition
    that celebrates the cultural cross‑currents of African‑American and South Asian heritage. Additionally, she wishes to continue learning new artistic techniques and perhaps write a short memoir that
    captures her life’s resilience.
