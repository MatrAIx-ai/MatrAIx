personas:
  professional: A budding LEGO architect, Quang Pham channels meticulous routine into mastering complex sets, and they treat each build like a mini engineering challenge, yet they often forget to finish
    homework on time, reflecting a relaxed attitude toward obligations.
  sports: A disciplined mini‑athlete, Quang Pham drills at the Eastside Taekwondo Academy every Saturday, catches baseballs with the Maple Grove Cardinals Little League, and they cheer for the Chicago Cubs,
    yet their procrastination on stretching often results in sore muscles after practice.
  arts: An imaginative comic enthusiast, Quang Pham flips through Dav Pilkey’s Dog Man and Kazu Kibuishi’s Amulet while sketching original superhero panels, and they emulate the pixel‑art style of Markus Persson’s
    Minecraft, though their perfectionist streak sometimes stalls their drawings.
  travel: A cautious explorer, Quang Pham enjoys well‑planned weekend trips to the downtown aquarium and a family vacation at the Grand Canyon, and they rely on a familiar LEGO travel set for comfort, but
    their nervousness about unfamiliar crowds can make them cling to routine.
  culinary: A budding kitchen assistant, Quang Pham enjoys assembling fresh spring rolls with rice paper, shrimp, cucumber, and mint, mastering the perfect peanut dipping sauce, and they often forget to
    clean up the prep area, prompting gentle reminders from their mother.
  core: Quang Pham is a routine‑driven nine‑year‑old LEGO master who balances competitive gaming with a wary eye on chores, and they frequently lose track of time and worry about the little things.
background:
  cultural: Quang was born and raised in Grovetown, Georgia, to parents who emigrated from Vietnam. At home the family speaks Vietnamese and celebrates traditional holidays like Tet, preparing dishes such
    as pho, banh chưng, and gifting red envelopes. He attends Vietnamese language classes at a local community center and participates in cultural events with other Vietnamese families. While deeply rooted
    in his heritage, Quang also embraces Southern customs — he plays baseball in a neighborhood league, enjoys peach cobbler, and listens to country music with his friends. His parents emphasize education,
    practicality, and respect for routine, values that echo his own preference for familiar, structured activities.
