  hobbies: '["LEGO building", "Minecraft", "Roblox", "Graphic novel reading", "Comic drawing", "Taekwondo", "Baseball card collecting", "Catching games", "Simple cooking (spring rolls)"]'
  career_goals: Quang hopes to turn his love of building and coding into a future career as a software or robotics engineer, imagining himself designing games or machines that work reliably. He also dreams
    of one day opening a small family‑run Vietnamese food stall, combining his practical cooking skills with an entrepreneurial mindset. Above all, he wants a stable, well‑paid job that lets him support
    his family and continue learning new technical skills.
