  hobbies: '[''Reading historical biographies and poetry'', ''Gardening tropical and native plants'', ''Crocheting blankets and textiles'', ''Cooking traditional Honduran dishes'', ''Listening to classical
    music while journaling'', ''Birdwatching in local parks'', ''Visiting quiet art galleries and museums'', ''Participating in low‑key cultural festivals'']'
  career_goals: Mariana aims to compile a memoir that records her family's migration story and preserves Honduran folk songs and recipes for future generations. She wishes to create a small bilingual oral‑history
    archive for the local Honduran diaspora and mentor younger community members in traditional arts and storytelling. Another ambition is to develop a neighborhood garden featuring Central American flora,
    providing a quiet space for reflection and cultural sharing. She also plans to volunteer as an advisor at the local senior center, offering occasional translation services for community events and cultural
    festivals, thereby continuing her lifelong commitment to helping others and bridging cultural gaps.
