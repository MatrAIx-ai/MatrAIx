personas:
  professional: Mariana Campa, a bilingual cultural liaison and freelance genealogist, they leverage their graduate training in arts and humanities to translate community documents, guide informal study
    groups, and preserve oral histories, all while balancing a relaxed approach to deadlines with a compassionate, harmony‑keeping demeanor.
  sports: Mariana Campa, an avid supporter of the San Antonio Spurs, they enjoy watching basketball games on television and participate in the senior walking club that meets at the San Antonio Missions
    National Historical Park for gentle hikes.
  arts: Mariana Campa immerses herself in the local art scene, they attend intimate gallery openings featuring folk-inspired paintings by artists like Ana Laura, listen to classical pieces by Debussy while
    journaling, and share crocheted art pieces at community cultural festivals.
  travel: Mariana Campa favors leisurely road trips to nearby botanical gardens such as the San Antonio Botanical Garden and historic towns like Fredericksburg, they plan trips loosely to allow spontaneous
    stops at roadside heritage sites, while dreaming of a future visit to the formal gardens of Versailles.
  culinary: Mariana Campa delights in perfecting traditional dishes like baleadas, tamales, and sopa de caracol, they experiment with fresh herbs, plantain leaves, and a splash of lime, while also crafting
    tropical fruit smoothies featuring mango, papaya, and pineapple.
  core: Mariana Campa blends scholarly curiosity with a gentle, disorganized rhythm, they preserve cultural stories through gardens, recipes, and quiet reflection, all while quietly championing community
    harmony.
background:
  cultural: Mariana was raised in a modest town in Honduras before immigrating to the United States as a young adult. Her upbringing was steeped in Catholic traditions, family‑centered celebrations, and
    folk music, which continue to shape her identity. While she has adapted to life in Uniondale, NY, she maintains Spanish as her primary language at home and celebrates Honduran holidays such as Día de
    la Independencia (September 15) and Semana Santa with traditional foods, music, and customs. Her bicultural experience informs her empathy and drive to serve as a cultural ambassador, introducing neighbors
    to Honduran cuisine, stories, and art. She values community solidarity, respect for elders, and humility—principles rooted in her Honduran heritage—while also appreciating the practical, individualistic
    aspects of her American surroundings.
attributes:
  skills: '[''Bilingual Spanish‑English translation'', ''Cultural liaison for community programs'', ''Art history and literature analysis'', ''Historical and genealogical research'', ''Traditional Honduran
