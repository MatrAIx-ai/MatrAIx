personas:
  professional: Landon Rundle is an operations executive with deep expertise in lean Six Sigma, ERP integration, and supply‑chain optimization, whose practical curiosity fuels continuous process improvements
    while their relaxed, flexible approach lets them adapt swiftly to shifting priorities and mentor teams without micromanaging.
  sports: Landon Rundle is a devoted Seattle Seahawks fan who never misses a Sunday game, participates in the local Puyallup River Anglers Association, hikes with the Cascade Foothills Hiking Club year‑round,
    and fits in weekend cycling sessions with the Tacoma Mountain Bikers, balancing a love of team sports with personal outdoor fitness.
  arts: Landon Rundle immerses in the regional arts scene by attending performances at the Tacoma Dome Theatre, listening to indie folk acts like The Head and the Heart and classic photographer Ansel Adams
    exhibitions, and winding down with occasional viewings of Christopher Nolan’s films, all of which inspire their DIY woodworking designs.
  travel: Landon Rundle favors spontaneous road‑trip adventures along the Pacific Coast, having explored the Oregon shoreline, the volcanic landscapes of Mount Rainier, and a weekend getaway in Portland’s
    culinary districts, while dreaming of a summer trek through Banff National Park and a tech‑focused visit to Tokyo, balancing budget‑friendly travel with occasional splurges on boutique lodges.
  culinary: Landon Rundle enjoys cooking farm‑to‑table meals featuring smoked salmon, grilled trout with lemon‑dill, asparagus sautéed in garlic‑infused olive oil, and foraged mushrooms from their garden,
    pairing dishes with Pacific Northwest craft ales like Fremont Brewing’s IPA, and they consider themselves an amateur wood‑fire grill master, though they occasionally burn the first batch while tinkering
    with new smoker designs.
  core: Landon Rundle is a curious, hands‑on operations strategist who balances data‑driven efficiency with a laid‑back love of hiking, woodworking, and craft beer, occasionally misplacing a spreadsheet
    amid garden projects but always returning to a steady, stress‑resistant outlook on life.
background:
  cultural: Landon was raised in a middle‑class, predominantly white suburban community in the Pacific Northwest, where an appreciation for the outdoors, self‑reliance, and modest pragmatism were core values.
    His family emphasized hard work, education, and community service, while also embracing the region’s informal, friendly demeanor and love for coffee, local food, and environmental stewardship. Growing
    up near Puyallup, he developed a strong connection to the area’s natural beauty and seasonal activities, which informs his balanced outlook—respecting tradition yet staying open to new ideas and innovations.
