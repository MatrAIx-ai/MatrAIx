  hobbies: '[''Hiking in the Cascade foothills'', ''Fishing in the Puyallup River'', ''Home woodworking projects'', ''Gardening'', ''Craft beer tasting'', ''Attending Seahawks games'', ''Reading non‑fiction
    (business, technology, history)'', ''DIY smart‑home automation'', ''Volunteering at local community events'', ''Nature photography'']'
  career_goals: Landon aims to transition into a senior executive role—such as Director of Operations or Vice President of Operations—where he can shape company strategy, drive large‑scale efficiency initiatives,
    and champion sustainable, technology‑enabled practices. He intends to earn advanced certifications like PMP and Six Sigma Black Belt, deepen his expertise in digital transformation, and eventually launch
    a boutique consulting firm that helps mid‑size manufacturers improve operational performance. Balancing his ambition with family life, he also seeks a role that provides flexibility for quality time
    with his spouse and community involvement.
