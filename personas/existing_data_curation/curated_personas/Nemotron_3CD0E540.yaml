  hobbies: '[''Basketball (local league)'', ''Desert hiking'', ''Live music concerts'', ''Poker and strategic board games'', ''Volunteer work at community shelters'', ''Shooting range practice'', ''Urban
    and desert photography'', ''Cooking Southwestern cuisine'', ''Sci‑fi series binge‑watching'', ''Tabletop RPG sessions'']'
  career_goals: Bryan aims to leverage his practical curiosity and high standards to move into a senior supervisory role within the casino security industry. He plans to earn professional certifications
    such as the Certified Protection Professional (CPP) and Physical Security Professional (PSP) while completing his bachelor’s degree in criminal justice or business administration. His long‑term ambition
    is to become a security operations manager overseeing multiple sites, eventually transitioning to a consultancy where he can design integrated security solutions for gaming enterprises. He also hopes
    to mentor younger officers and contribute to industry best‑practice development.
