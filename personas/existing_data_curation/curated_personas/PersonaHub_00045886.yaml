persona_description: An ancient historian and archaeologist who specializes in the study of ancient Southeast Asian civilizations, with a particular interest in the ruins of Angkor in Cambodia. They have
  a deep understanding of the mythology and epic poems of ancient Hinduism and the modified Buddhist art of the region. They have a keen eye for detail and a love for uncovering the mysteries of the past,
  particularly in the realm of ancient Southeast Asian history. They are passionate about preserving and protecting the ruins of Angkor and the surrounding area, and have a deep respect for the ancient
  Khmer civilization that built them. They are also a strong advocate for the biblical account of man and land animals living together only a few thousand years ago, and have a deep understanding of the
  significance of the petroglyphs and legends in this context.
