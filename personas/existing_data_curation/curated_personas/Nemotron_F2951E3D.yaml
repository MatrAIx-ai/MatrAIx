  career_goals: Teddrick aims to leave a lasting legacy that bridges generations through knowledge, art, and service. He plans to launch an oral‑history project that records the personal stories of longtime
    Norwalk residents, partnering with the local library to create an accessible archive. He also wants to establish a weekly art‑appreciation circle at the senior center, where participants explore African
    American visual arts and discuss their cultural significance. Completing a GED program is another personal milestone he wants to achieve, both to formalize his education and to model lifelong learning
    for younger community members. Ultimately, he seeks recognition as a trusted community elder who nurtures harmony, fosters creative curiosity, and empowers others to thrive.
