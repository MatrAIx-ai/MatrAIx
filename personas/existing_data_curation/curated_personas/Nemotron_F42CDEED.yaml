  career_goals: Alicia aims to advance from bartender to bar manager within the next two years, focusing on building a tightly coordinated team and refining operational efficiency. She plans to earn a Certified
    Specialist of Spirits (CSS) credential to deepen her expertise. Long‑term, Alicia dreams of opening a small, community‑focused lounge in Orange Park that highlights African‑American culinary traditions
    and offers mentorship programs for aspiring bartenders from under‑represented backgrounds. Her ambition is balanced by a desire for a stable, low‑stress environment that allows her to maintain her structured
    routine and continue supporting local charitable initiatives.
