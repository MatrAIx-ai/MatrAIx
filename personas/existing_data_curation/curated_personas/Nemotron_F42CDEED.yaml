personas:
  professional: A highly organized bartender named Alicia Britt leverages methodical mixology and rigorous inventory checklists to create a welcoming bar environment, and they are set on becoming a bar
    manager within two years while pursuing a Certified Specialist of Spirits credential.
  sports: A low-key sports enthusiast named Alicia Britt follows the Jacksonville Jaguars and the Tampa Bay Rays on game nights, attends a weekly community yoga class as her primary fitness routine, and
    they occasionally join a casual adult softball league for light competition.
  arts: A jazz and soul aficionado named Alicia Britt cycles through records by John Coltrane, Miles Davis, and Nina Simone while journaling drink ideas, and they participate in a book club that reads works
    by authors from historically underrepresented communities, finding creative inspiration in both music and literature.
  travel: A detail-oriented traveler named Alicia Britt prefers structured itineraries, having explored Savannah’s historic squares and Asheville’s mountain art scene, and they now yearn for a culinary-focused
    trip to Oaxaca, Mexico to study regional cuisine and mezcal production.
  culinary: A garden-to-glass culinary enthusiast named Alicia Britt tends heirloom tomatoes and okra in a modest backyard plot, seasoning a summer garden salad with smoked paprika, fresh basil, and a squeeze
    of lime, and they craft classic cocktails using house-made simple syrups infused with citrus zest and lavender.
  core: Alicia Britt blends disciplined bartender precision with a compassionate heart, structuring every aspect of life—from finances to fitness—while quietly wrestling with a propensity for worry and
    a love for solo creative rituals.
background:
  cultural: Alicia is a Black woman raised in the Southern United States, bringing a rich tapestry of African‑American cultural influences to her life in Orange Park, Florida. Her family traditions emphasize
    communal meals, soulful cooking, and strong ties to the local Black church, which instilled a deep sense of community service and solidarity. Growing up, she absorbed the flavors of Southern cuisine—collard
    greens, cornbread, and spicy gumbo—which she later incorporated into her cocktail creations. Living in a diverse Floridian environment, Alicia also appreciates the Afro‑Caribbean rhythms and culinary
    nuances present in the area, blending these elements into her personal and professional identity. Her cultural heritage informs her compassionate demeanor, her commitment to mentoring younger community
    members, and her desire to celebrate Black culinary artistry through her future lounge.
