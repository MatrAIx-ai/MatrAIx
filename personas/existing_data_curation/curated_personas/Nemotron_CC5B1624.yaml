  career_goals: Hung aims to transition from a database administrator to a lead database architect, designing scalable, resilient data platforms for fast‑growing tech companies. He plans to earn advanced
    cloud certifications (AWS Solutions Architect – Professional, Google Professional Data Engineer) and eventually lead a data‑engineering team that integrates cutting‑edge analytics with creative applications,
    such as interactive art installations. In the longer term, he envisions founding a boutique consultancy that helps startups implement responsible data governance while fostering cross‑disciplinary innovation.
