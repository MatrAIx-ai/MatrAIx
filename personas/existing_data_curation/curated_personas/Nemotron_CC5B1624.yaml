personas:
  professional: Hung Zheng, a 23‑year‑old data specialist in San Francisco, blends deep expertise in relational and NoSQL databases, Python and Bash automation, and multi‑cloud services (AWS RDS, GCP Cloud
    SQL, Azure Cosmos DB) with a love for data‑driven visual art, designing scalable architectures that leave room for spontaneous experimentation, even if a relaxed attitude to timelines sometimes leads
    to late‑night debugging marathons.
  sports: Hung Zheng enjoys shooting hoops at a community basketball league, cheering on the Golden State Warriors, hiking the Marin Headlands each summer, and attending weekly yoga sessions at a local
    studio, but often skips logging workouts because a flexible schedule feels more rewarding than rigid tracking.
  arts: Hung Zheng dives into San Francisco’s vibrant art scene, attending gallery openings featuring Ai Weiwei and Douglas Coupland, sketching Mission District murals, creating data‑driven photography
    projects inspired by Hiroshi Sugimoto, and practicing Chinese calligraphy as a meditative hobby that fuels their creative mindset.
  travel: Hung Zheng prefers spontaneous weekend escapes, having already road‑tripped the Pacific Coast Highway, explored Kyoto’s historic temples during Lunar New Year, sampled night markets in Singapore,
    and dreams of a summer trek across Iceland’s volcanic landscapes.
  culinary: Hung Zheng’s palate swings from steaming xiao long bao and spicy Mapo tofu at a Chinatown stall to the Bay Area’s signature sourdough bread bowls with clam chowder, while their modest kitchen
    experiments include miso‑marinated tofu ramen and a weekend habit of perfecting bubble‑tea foam.
  core: Hung Zheng fuses data engineering with visual storytelling, navigating life with inquisitive curiosity, artistic flair, and a delightfully relaxed, occasionally disorganized rhythm.
background:
  cultural: Hung is a second‑generation East Asian American, born to immigrant parents who emigrated from Taiwan. Raised in a bilingual household, he is fluent in Mandarin and English and observes traditional
    celebrations such as Lunar New Year and the Mid‑Autumn Festival. His family emphasized education and perseverance, values that shaped his STEM pursuits. Living in San Francisco, he blends his cultural
    heritage with the city’s diverse, progressive vibe—participating in community cultural events, enjoying both classic Chinese cuisine and the Bay Area’s eclectic food scene, and integrating respect for
    collective well‑being with a personal drive for innovative, unconventional thinking.
