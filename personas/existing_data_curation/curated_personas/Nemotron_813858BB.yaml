personas:
  professional: Cheryl Dorville, a seasoned personal care aide with over thirty years of hands‑on patient support, blends their expertise in hygiene assistance, mobility aid, and medication reminders with
    an imaginative flair for art‑infused therapeutic activities, using guided watercolor sessions and soulful music to lift spirits while battling a tendency to procrastinate on paperwork and deadline management.
  sports: Cheryl Dorville enjoys weekend hikes along the Hudson River Valley trails, supports the New York Yankees and New York Knicks, and occasionally joins the Hudson Valley Hiking Club for group treks
    while attending gentle Pilates classes at the community center to stay fit.
  arts: Cheryl Dorville immerses themselves in abstract watercolor painting, finds inspiration in the verses of Ocean Vuong and Mary Oliver, regularly attends gallery openings featuring contemporary artists
    such as Kehinde Wiley, and fills their home with the soulful sounds of John Coltrane, Aretha Franklin, and Mahalia Jackson.
  travel: Cheryl Dorville prefers slow, contemplative travel that blends local nature retreats in the Catskills and coastal escapes to Provincetown with dream itineraries to Florence, Italy, and Kyoto,
    Japan, where they can sketch landscapes and study historic art, all while budgeting modestly due to retirement planning.
  culinary: Cheryl Dorville loves cooking comforting dishes such as braised chicken with rosemary, creamy mac and cheese seasoned with smoked paprika, and seasonal roasted root vegetables, boasting a confident
    stovetop skill set and a penchant for hosting potluck gatherings where friends sample their signature herbed dumplings and fresh garden salads.
  core: Cheryl Dorville blends a lifelong caregiving career with a vivid artistic imagination, juggling spontaneous creativity and lingering worries about structure, making them a compassionate yet occasionally
    disorganized advocate for senior well‑being.
background:
  cultural: Cheryl is a second‑generation African‑American whose grandparents migrated from the rural South to New York City before the family eventually settled in upstate New York. Her upbringing was
    steeped in Black church traditions, gospel music, and oral storytelling that emphasized community resilience and creative expression. Living in New Windsor, she navigates a predominantly white regional
    culture while actively preserving and sharing her heritage—through soulful cooking, artistic collaborations, and participation in cultural festivals. This blend of experiences informs her compassionate
    caregiving, fostering a deep respect for diverse cultural practices and inspiring her to integrate artistic therapy into elder care as a bridge between worlds.
attributes:
  skills: '[''Personal Care Assistance'', ''Patient Advocacy'', ''Empathetic Communication'', ''Creative Therapeutic Activities'', ''Adaptive Problem Solving'', ''Cultural Competence'', ''Basic Medical
    Documentation'', ''Flexible Scheduling'', ''Team Collaboration'', ''Community Resource Navigation'']'
  hobbies: '[''Watercolor painting'', ''Poetry writing'', ''Reading speculative fiction'', ''Gardening'', ''Nature hiking'', ''Attending local art exhibitions'', ''Knitting'', ''Listening to jazz and gospel
    music'', ''Community storytelling circles'', ''Cooking soul food recipes'']'
  career_goals: Cheryl aims to earn a Certified Nursing Assistant (CNA) credential and later pursue Licensed Practical Nurse (LPN) training, while also exploring a certificate program in art therapy to
    blend her caregiving with her artistic passions. She envisions creating a community art‑therapy workshop for seniors that incorporates watercolor painting, poetry, and music as healing modalities. Long‑term,
    she hopes to move into a supervisory role where she can mentor new aides, champion culturally responsive practices, and influence care policies. Additionally, Cheryl dreams of establishing a modest
    home studio to produce handcrafted items—such as knitted scarves and painted ceramics—to fund creative projects for the local senior center. Her ambition is to craft a career that honors both the science
    of caregiving and the joy of artistic expression.
