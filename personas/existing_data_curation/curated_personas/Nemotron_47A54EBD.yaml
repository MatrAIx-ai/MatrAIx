  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Sketching and digital illustration'', ''Hiking in desert landscapes'', ''Cooking Mexican‑Arizona fusion cuisine'', ''Reading
    science fiction and popular science'', ''Participating in hackathons and tech meetups'', ''Playing acoustic guitar'', ''Volunteering as a STEM mentor for youth'']'
  career_goals: Andres aims to secure a role that merges his technical expertise with his passion for creativity, such as a creative technologist or UX researcher focused on culturally resonant experiences.
    In the short term, he plans to join a data‑driven organization—ideally a municipal agency or nonprofit in Tucson—that tackles sustainable urban development and community well‑being. He also hopes to
    build a portfolio of interactive installations that celebrate Mexican heritage through technology. Long‑term, Andres envisions launching a startup that creates educational tools blending STEM concepts
    with Mexican cultural narratives, empowering underrepresented youth to see themselves reflected in the tech world.
