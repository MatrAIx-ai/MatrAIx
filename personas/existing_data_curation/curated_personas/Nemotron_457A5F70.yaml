  career_goals: Even at 74, Anthony is focused on leaving a lasting legacy for his family and community. He aims to transition the farm to his children while establishing a formal succession plan that embeds
    sustainable practices. He hopes to expand the farm’s role in agri‑tourism, offering seasonal tours that highlight the region’s mining history, art installations, and modern farming techniques. He is
    also working on a memoir that blends his life on the land with reflections on art, technology, and the evolving Western frontier, and he aspires to mentor a regional network of senior farmers to adopt
    climate‑resilient strategies.
