persona_description: A scientist who specializes in the study of avian influenza, particularly the movements and risks associated with bird migration. Their research interests include mapping the risk of
  high pathogenicity avian influenza to Australia, the nature and extent of bird movements in the region, and the lack of quantitative data on the extent of bird movements between Australia and its northern
  neighbors. They have expertise in risk mapping, the ability to map risk from high pathogenicity avian influenza to Australia is hampered by the lack of quantitative data on the extent of bird movements
  between Australia and its northern neighbors.
