  career_goals: Terry aims to become a head chef within the next three years, leading a kitchen that emphasizes farm-to-table dishes sourced from Lancaster County farms. He plans to obtain a culinary certification,
    eventually open a small neighborhood bistro that offers affordable nutritious meals, and create a supportive workplace culture that prioritizes teamwork and employee well‑being. He also hopes to mentor
    aspiring cooks from his community.
