personas:
  professional: Robert Mast, a veteran welder in Jacksonville with advanced MIG, TIG, and stick welding expertise, blueprint reading and CNC programming skills, blends a safety‑first, structured mindset
    with a spontaneous drive to mentor junior welders and launch a future marine‑welding contracting business; they are now pursuing AWS Certified Welding Inspector credentials to transition into a supervisory
    role.
  sports: Robert Mast, a die‑hard Jacksonville Jaguars fan who tailgates with friends at EverBank Field and follows the Tampa Bay Rays during baseball season, also belongs to the St. Johns River Fishing
    Club, where they compete in local bass tournaments to stay active.
  arts: Robert Mast, who enjoys rocking out at live shows featuring Foo Fighters and Lenny Kravitz, frequently jams on acoustic guitar with fellow hobbyists, and appreciates the gritty realism of metal
    sculpture exhibitions, blending their hands‑on craftsmanship with a love for high‑energy music.
  travel: Robert Mast, who prefers spontaneous weekend road trips over meticulously planned vacations, often jet‑skis to Amelia Island, has fished in the Florida Keys, and dreams of a guided salmon‑fishing
    expedition in Alaska while balancing family commitments, they relish the freedom of open roads.
  culinary: Robert Mast, an enthusiastic backyard grill master, loves smoking pork shoulder with a mesquite wood rub, searing blackened catfish with Cajun seasoning, and experimenting with homemade bourbon‑infused
    BBQ sauce, while their cooking skill hovers between competent and creative.
  core: Robert Mast blends a structured, safety‑focused welding career with a social, low‑key love for fishing, grilling, rock concerts, and spontaneous weekend projects, even as they battle deadline‑driven
    disorganization and occasional health neglect.
background:
  cultural: Robert was born and raised in Jacksonville, Florida, into a middle‑class, working‑class white family with deep ties to the local maritime and blue‑collar community. His upbringing was shaped
    by the cultural blend of Southern hospitality and coastal Gulf Coast lifestyle, emphasizing family, community involvement, and a strong work ethic. He grew up attending a local public high school, later
    taking courses at a community college where he began training in welding. He maintains active participation in his neighborhood church's fellowship activities and is a regular volunteer at community
    events, reflecting the cooperative and harmony‑seeking values common in his cultural environment. The regional emphasis on fishing, boating, and outdoor recreation, combined with the practical, hands‑on
    ethos of the local trades, informs his everyday life and worldview.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding", "Brazing", "Soldering", "Blueprint reading", "Metal fabrication", "Welding inspection", "OSHA safety compliance", "Equipment maintenance", "Mentoring
