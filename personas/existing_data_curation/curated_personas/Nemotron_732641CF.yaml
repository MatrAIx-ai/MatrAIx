  hobbies: '["Fishing", "Boating", "Attending Jacksonville Jaguars games", "Tailgating", "Barbecue cooking", "Volunteer metalworking workshops for youth", "Live rock concerts", "Playing acoustic guitar",
    "DIY home improvement", "Car restoration", "Group hiking in local nature preserves"]'
  career_goals: Robert aims to transition into a senior supervisory role within the welding field, targeting a position as a lead welder or welding supervisor at a maritime or construction firm in the Jacksonville
    area. He plans to earn the AWS Certified Welding Inspector (CWI) credential and pursue additional certifications in marine welding to enhance his expertise. Over the next five years, he envisions leading
    a cohesive welding team, implementing improved safety and quality protocols, and eventually launching his own small contract welding business that serves local shipyards, boat manufacturers, and custom
    fabrication clients. Recognizing his occasional difficulty with tight deadlines, he is also focused on strengthening his project‑management and organizational skills to become a more reliable leader.
    His career aspirations are guided by a desire for stable income, professional recognition, and the ability to mentor the next generation of tradespeople.
