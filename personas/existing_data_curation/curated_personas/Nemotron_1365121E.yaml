personas:
  professional: Katie Mathews, a 23‑year‑old aspiring project coordinator, leverages their event‑planning experience at the community center and data‑entry precision to streamline nonprofit initiatives,
    balancing their competitive drive with methodical organization while keeping a skeptical eye on unrealistic proposals.
  sports: Katie Mathews is an avid intramural volleyball player in Moses Lake, a regular participant in the local frisbee league, and a seasonal fan of the Spokane Indians baseball team and the Seattle
    Seahawks, and they often combine team practice with weekend hikes on the Columbia Plateau to stay fit.
  arts: Katie Mathews finds creative escape in crafting mood boards inspired by the minimalist aesthetic of designer Marie Kondo, snapping sunrise photos of the lake with a vintage Fujifilm camera, and
    curating Spotify playlists that blend The Head and the Heart with indie folk singer Phoebe Bridgers during game nights, and they regularly share these creations on social media.
  travel: Katie Mathews prefers road‑trip adventures that blend outdoor exploration with social bonding, having recently driven the Pacific Coast Highway to capture cliffside sunsets, planning a spring
    hike in Glacier National Park, dreaming of a weekend retreat to the vibrant coffee scene of Portland, Oregon, and they meticulously budget travel expenses through a dedicated spreadsheet.
  culinary: Katie Mathews enjoys the ritual of discovering new coffee blends at local roasters, favors breakfast dishes like avocado toast with smoked salmon and a dash of feta, experiments with quick Canva‑inspired
    plating for Instagram, occasionally treats themselves to a cheese poutine from a food truck as a reward after a successful event‑planning sprint, and they savor the communal vibe of shared meals with
    friends.
  core: Katie Mathews is a hyper‑organized, socially driven nonprofit enthusiast who balances their love for community events and coffee‑fueled creativity with a healthy dose of skepticism and a penchant
    for over‑booking their calendar.
background:
  cultural: Katie grew up in a predominantly white, small-town community in central Washington. Her family values self-reliance, practical problem-solving, and close ties to neighbors and local institutions
    such as the volunteer fire department and the community center. The Pacific Northwest setting has fostered an appreciation for the outdoors, seasonal traditions, and a modest, down-to-earth lifestyle,
    while her exposure to regional festivals and high school clubs nurtured her sociable, competitive spirit.
attributes:
  skills: '[''Event Planning'', ''Data Entry'', ''Customer Service'', ''Social Media Management'', ''Group Facilitation'', ''Basic Graphic Design'', ''Problem Solving'']'
  hobbies: '[''Volleyball'', ''Frisbee'', ''Hiking'', ''Food Bank Volunteering'', ''Game Nights'', ''Photography'', ''Coffee Shop Exploration'']'
  career_goals: Katie aims to transition from casual volunteer work into a full-time role within the next two years, targeting positions such as project coordinator or community outreach specialist at a
    nonprofit or regional business. She wants to leverage her organizational strengths and outgoing nature to lead community programs, eventually moving into a managerial role where she can design and implement
    larger initiatives. Completing her associate degree in communications and obtaining certifications in project management are key steps for her.
