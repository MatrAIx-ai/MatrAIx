  hobbies: '[''Community Theatre'', ''Volunteer Work (Food Bank)'', ''Gardening'', ''Cooking'', ''Reading Mystery Novels'', ''Quilting'', ''Traveling (Historic Sites)'', ''Yoga'', ''Senior Center Dancing
    Classes'']'
  career_goals: Charlotte aims to spearhead a sustainability initiative within her organization, shifting the procurement strategy toward greener and locally sourced products while maintaining cost efficiency.
    She hopes to formalize a mentorship program that pairs her decades of practical knowledge with younger employees, fostering a culture of continuous learning. Looking ahead to a phased retirement, she
    envisions transitioning into a part‑time consulting role where she can advise small businesses on procurement best practices and lean purchasing. Throughout, she values flexibility, seeking opportunities
    that let her balance practical results with her curiosity about new tools and methods.
