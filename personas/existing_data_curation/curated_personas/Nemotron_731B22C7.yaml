personas:
  professional: Charlotte Lyles, a seasoned purchasing manager with a talent for vendor negotiation, contract development, and data‑driven strategic sourcing, blends pragmatic efficiency with a curiosity
    for sustainable procurement, leading their team with compassionate assertiveness while their relaxed, occasionally disorganized scheduling sometimes leaves follow‑up emails unanswered.
  sports: Charlotte Lyles stays active through a senior‑center swing‑dance class, weekly walks with the local Midwest Strollers walking club, and passionately supports the Chicago Cubs, the Indianapolis
    Colts, and the Minnesota Timberwolves, all of which they follow with enthusiastic loyalty.
  arts: Charlotte Lyles, an avid participant in community theatre as both actress and stage manager, revels in performing classic Agatha Christie mysteries and contemporary works by Lin‑Manuel Miranda,
    while in their spare time they quilt to the soundtrack of Meryl Streep’s films and devour mystery novels by Tana French.
  travel: Charlotte Lyles prefers spontaneous weekend road trips to Midwestern historic treasures such as Cahokia Mounds, Galena’s 19th‑century Main Street, Indiana Dunes National Park, Mackinac Island’s
    Victorian forts, and St. Louis’s historic Lemp Brewery, often sketching their itinerary on a notepad the night before and opting for modest B&B stays that let them soak in local charm.
  culinary: Charlotte Lyles, a confident home cook, combines Midwestern staples like chicken pot pie, cornbread, and Amish chicken and dumplings with garden‑fresh herbs such as rosemary, thyme, basil, and
    sage to create herb‑infused roasted carrots, seasonal pesto, and sweet‑corn‑and‑pork‑sausage succotash, and they often finish desserts with an apple‑cinnamon crumble.
  core: Charlotte Lyles is a community‑oriented procurement veteran who balances pragmatic cost‑saving expertise with a curious push toward sustainability, while they juggle yoga, theater, and herb‑rich
    Midwestern cooking, despite occasional disorganization and lingering worries.
background:
  cultural: Charlotte grew up in a small‑town, white, Midwestern family with roots in German and Irish ancestry. Raised in a Protestant environment, she internalized values of modesty, hard work, and community
    service. The cultural norm of self‑reliance combined with a strong sense of hospitality shapes her interactions—she is comfortable engaging with neighbors, local organizations, and coworkers alike.
    Her upbringing emphasized practical problem‑solving and a respect for established methods, while also encouraging curiosity about new ideas, which aligns with her balanced, pragmatic outlook.
