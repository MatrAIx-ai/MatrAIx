persona_description: A historian who specializes in the study of American architecture, particularly the styles of the Roman Classical Revival and the Greek Revival. Her research interests include the evolution
  of architectural styles in the United States, the influence of foreign architectural styles on American architecture, and the impact of political and cultural factors on architectural design. She is particularly
  interested in the political symbolism of architectural styles, such as the use of ancient Roman temples as models for the newly formed nation. Her expertise in American architecture makes her well-versed
  in the details and characteristics of these styles, including the use of classical order columns, full height entry porches, and symmetrical placement of windows and doors.
