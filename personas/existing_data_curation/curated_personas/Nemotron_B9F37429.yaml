  career_goals: Megan aims to complete her bachelor's degree in Business Administration within the next two years while pursuing PMP certification to formalize her project management expertise. In the short
    term, she seeks to assume a regional supervisory role overseeing multiple store locations in Shasta County, allowing her to implement process improvements and sustainability initiatives. Long-term,
    she aspires to become a director of operations for a mid-size company, where she can mentor emerging leaders and champion community-focused programs such as workforce development partnerships with local
    colleges. Additionally, she hopes to establish a small family-run café that emphasizes locally sourced ingredients and supports local artisans.
