  career_goals: Jesus aims to preserve his independence and health while staying actively involved in his church and the Aurora Hispanic community. He hopes to document his family’s recipes and stories,
    pass on his practical skills and cultural knowledge to his grandchildren, provide occasional financial support to his family, and serve as a mentor for younger adults at the local community center.
