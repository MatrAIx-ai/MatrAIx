personas:
  professional: Jesus Nevarez, a seasoned community handyman, applies his decades‑long expertise in home maintenance, woodworking, and basic automotive repair to keep Aurora’s neighborhood homes in top
    shape, tackling each job with a methodical routine, quiet assertiveness, and a lingering worry that everything stays safe for his family and neighbors.
  sports: Jesus Nevarez enjoys watching the Colorado Rapids and cheering for the Aurora Mariners, a local senior soccer league team, gathers with friends for weekend match viewings at the parish hall, participates
    in a senior walking group that patrols City Park each Tuesday, and occasionally joins informal card nights after the games.
  arts: Jesus Nevarez immerses himself in mariachi music, especially the melodies of Vicente Fernández and José Alfredo Jiménez, attends seasonal cultural concerts at the parish, reflects on stories from
    classic cinema of his homeland while reading the Aurora Sentinel, and finds quiet pleasure solving simple crossword puzzles.
  travel: Jesus Nevarez prefers short, well‑planned trips, such as annual visits to his hometown to celebrate Día de los Muertos with relatives, weekend getaways to nearby Colorado Springs for hiking, and
    dreams of attending a culinary festival in a renowned gastronomic city abroad, all while balancing travel costs with his modest pension.
  culinary: Jesus Nevarez excels at preparing pozole, tamales, and myriad salsas, skillfully balancing hominy, dried chilies, corn masa, and fresh garden herbs, and he is currently documenting these family
    recipes alongside cherished anecdotes for future generations.
  core: Jesus Nevarez, a 75‑year‑old community handyman, blends steadfast routine with occasional anxiety, preserves cultural traditions through cooking and faith, and mentors younger neighbors while carefully
    guarding his independence.
background:
  cultural: A Mexican‑American who grew up in a close‑knit family in central Mexico before relocating to Colorado in his thirties, Jesus maintains deep‑rooted Catholic values, a strong sense of family loyalty,
    and pride in Mexican culinary and festive traditions. He celebrates Día de los Muertos, Semana Santa, and Mexican Independence Day, often sharing these customs with his extended family and neighbors.
    Living in Aurora’s multicultural neighborhood, he blends his Mexican identity with the local Hispanic community, maintains bilingual communication, and participates in cultural festivals that honor
    both his origins and his American life.
