personas:
  professional: Krystyn Lee, a 29‑year‑old healthcare operations strategist in El Paso, leverages data analytics, design‑thinking, and a vivid imagination to redesign patient flow, thriving on spontaneous
    brainstorming sessions while tolerating the occasional chaos of missed deadlines due to their relaxed, flexible work style.
  sports: Krystyn Lee, a 29‑year‑old adventure seeker, spends Saturdays hiking the Franklin Mountains, joins the El Paso Climb‑Society for bouldering nights, roots for the El Paso Locomotive FC soccer team,
    but often swaps planned gym sessions for impromptu board‑game marathons with friends.
  arts: Krystyn Lee channels the bold, sun‑worn murals of the downtown border art scene into digital paintings, attends improv nights with the local Spotlight Improv troupe, devours speculative novels by
    N.K. Jemisin, and produces glitchy ambient tracks reminiscent of Aphex Twin on their modular synth.
  travel: Krystyn Lee favors spontaneous road trips across West Texas, often detouring to the art‑filled streets of Marfa and the historic plaza of Santa Fe, dreams of a desert‑starlit trek in Patagonia,
    but budget constraints push them toward last‑minute flight deals and weekend camping getaways.
  culinary: Krystyn Lee, an experimental home chef, fuses carne asada tacos with Korean gochujang and kimchi, seasons roasted nopales with smoked paprika, crafts chai‑spiced churros, and while their skill
    with a spice rack is impressive, their tendency to abandon dishes mid‑mix leaves a half‑baked quinoa‑pistachio crumble on the counter.
  core: Krystyn Lee is a visionary health‑tech strategist who blends data‑driven rigor with artistic spontaneity, lives on a diet of coffee and curiosity, and sometimes lets a missed deadline slip because
    a new synth patch felt too irresistible to ignore.
background:
  cultural: Krystyn is a white American whose family roots trace back to the Midwest, where she grew up with a mix of traditional holiday celebrations and an emphasis on self‑reliance. Relocating to El Paso
    after college introduced her to a richly bilingual environment, and she has embraced many aspects of Hispanic culture—especially the communal food traditions, Día de los Muertos art, and the festive
    atmosphere of local street fairs. While she maintains core American values of individualism and competitive ambition, she also values cross‑cultural communication and often incorporates Mexican motifs
    into her design work. Her marriage has further broadened her cultural perspective, fostering a household where diverse traditions are celebrated and where flexibility in daily routines reflects her
    relaxed, adaptable personality.
