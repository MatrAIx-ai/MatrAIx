  career_goals: Krystyn aims to move into senior executive leadership within the next five years, targeting a Director of Health Services or Vice President role at a regional hospital network. She envisions
    spearheading innovation initiatives that integrate AI‑driven diagnostics, tele‑medicine platforms, and patient‑centred design to improve outcomes and accessibility in the border region. Long‑term, she
    hopes to launch a health‑tech startup focused on culturally adaptive digital health solutions, while also mentoring emerging women leaders in health administration and influencing state health policy
    through advisory committees.
