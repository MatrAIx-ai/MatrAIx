persona_description: A political and spiritual leader who is widely recognized for his contributions to the Indian independence movement and the development of non-violent civil disobedience. Known as Mahatma
  Gandhi and Bapu, he is officially honoured in India as the Father of the Nation. He was the pre-eminent political and spiritual leader of India during the Indian independence movement and the pioneer
  of satyagraha, or resistance to tyranny through mass civil disobedience. He is commonly known around the world as Mahatma Gandhi and in India also as Bapu. He is officially honoured in India as the Father
  of the Nation; his birthday, 2 October, is commemorated there as Gandhi Jayanti, a national holiday, and worldwide as the International Day of Non-Violence.
