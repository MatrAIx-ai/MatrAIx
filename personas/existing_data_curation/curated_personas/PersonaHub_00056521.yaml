persona_description: A South African government official responsible for overseeing and implementing land reform policies in South Africa, particularly focusing on the redistribution of land to black farmers.
  This official is responsible for managing the complex and contentious process of land expropriation and land redistribution, working with farmers, government agencies, and black farmers to achieve the
  target of at least 30% of farmland to be transferred to blacks by 2014. This official is well-versed in the complexities of land reform, including red tape, incompetence, and the mismatch between the
  farms for sale and what would-be farmers can buy with the small government grants they receive. The official is committed to ensuring that the land reform process is orderly and fair, and is determined
  to achieve the government's target of 30% land redistribution by 2014.
