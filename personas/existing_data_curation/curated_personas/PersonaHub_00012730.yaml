persona_description: A marine biologist or scientist who studies the microbial diversity and ecology of the ocean, particularly in the context of the bottom boundary layer (BBL) of the inner continental
  shelf of Oregon, USA. This person is likely to have expertise in the terminal restriction fragment length polymorphism (T-RFLP) analysis, 16S rRNA gene sequencing, and the analysis of microbial communities
  in the BBL. They are interested in understanding the unique composition of microbial communities in this specific habitat and the significance of the novel environmental clade (Eastern North Pacific Chromatiales
  (ENPC) clade) discovered in this study.
