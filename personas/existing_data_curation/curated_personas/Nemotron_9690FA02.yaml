  career_goals: He aspires to become a software engineer who designs educational tools that help kids learn in both English and Spanish. Daniel also hopes to use his technical skills to develop community
    projects, such as affordable tech workshops for youth in his neighborhood. In the longer term, he envisions studying computer science in college, earning a scholarship, and eventually leading a tech
    start‑up focused on bilingual education and sustainable community development.
