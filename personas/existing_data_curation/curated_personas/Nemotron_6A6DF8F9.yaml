personas:
  professional: Yuleidy Vazquezromero is a network and systems administrator who leverages their methodical planning and competitive drive to design fault‑tolerant LAN/WAN architectures, automate cloud
    migrations with Python scripts, and meticulously document procedures, positioning themselves for a senior network engineer role within three years.
  sports: Yuleidy Vazquezromero competes in a co‑ed volleyball league with the Westside Wave Club, trains for weekend hikes in Griffith Park and the Santa Monica Mountains, and avidly follows the Los Angeles
    Lakers, Dodgers, and Rams, channeling their competitive spirit into a regimented weekly workout schedule.
  arts: Yuleidy Vazquezromero enjoys salsa and bachata nights to the beats of Celia Cruz, Marc Anthony, and modern Latin pop star Rosalía, frequently attending performances by the LA Philharmonic and binge‑watching
    films by Guillermo del Toro, weaving these artistic experiences into their social gatherings.
  travel: Yuleidy Vazquezromero plans trips with a spreadsheet itinerary, favoring group culinary tours to cities like Oaxaca, Barcelona, and Kyoto that blend adventure with food exploration, while balancing
    a modest travel budget that prioritizes weekend getaways to nearby Santa Barbara over expensive overseas cruises.
  culinary: Yuleidy Vazquezromero is an intermediate home chef who perfects mole poblano with ancho chilies, chocolate, and roasted seeds, crafts hand‑made tamales using masa and pork shoulder, and prepares
    fresh ceviche with lime, jalapeño, and cilantro, while also scouting LA's food trucks for innovative tacos al pastor and ramen bowls.
  core: Yuleidy Vazquezromero is a structure‑loving network guru who balances competitive volleyball, salsa nights, and meticulous budgeting, yet often skips sleep to tinker with Raspberry Pi projects.
background:
  cultural: Yuleidy is a first‑generation Mexican‑American whose family emigrated from Jalisco to Los Angeles when she was a child. Growing up in a bilingual household, she speaks Spanish fluently and English
    natively, which has shaped her ability to navigate both cultures seamlessly. Mexican traditions, such as Día de los Muertos, family reunions, and Saturday afternoon meals featuring homemade dishes,
    are integral to her identity. These customs have fostered a strong sense of community, respect for elders, and an appreciation for hard work and perseverance. Living in the multicultural environment
    of Los Angeles, she blends her Mexican roots with the city's diversity, participating in local cultural festivals and volunteering with organizations that support Latino youth. Her heritage influences
    her collaborative yet competitive drive, as she aims to represent her community positively in the tech industry and inspire the next generation of Mexican‑American professionals.
attributes:
  skills: '[''Cisco routing and switching (CCNA certified)'', ''LAN/WAN network design and troubleshooting'', ''Wireless network management (Wi‑Fi, Aruba, Cisco Meraki)'', ''Windows Server administration'',
    ''Linux system administration (Ubuntu, CentOS)'', ''Virtualization (VMware vSphere, Hyper‑V)'', ''Cloud services management (AWS, Azure)'', ''Scripting and automation (Python, PowerShell, Bash)'', ''Network
    security (firewalls, VPNs, IDS/IPS)'', ''ITIL incident and change management'', ''Documentation and SOP development'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Co‑ed volleyball (league)'', ''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Exploring LA food scene'', ''Hiking (Griffith Park, Santa Monica Mountains)'', ''Attending cloud
    computing meetups'', ''Mentoring high‑school students in STEM'', ''Raspberry Pi and smart home projects'']'
  career_goals: Yuleidy aims to advance from her current role as a network and computer systems administrator to a senior network engineer position within the next three years, focusing on cloud‑native
    networking and security. She plans to obtain advanced certifications such as CCNP, AWS Solutions Architect Professional, and Certified Information Systems Security Professional (CISSP) to deepen her
    expertise. Her long‑term ambition is to lead an IT infrastructure team as an IT Operations Manager or Cloud Architecture Lead, overseeing large‑scale deployments and driving strategic technology initiatives.
    She also aspires to mentor and sponsor other Latino women entering the tech field, establishing a community network that provides mentorship, workshops, and scholarship opportunities.
