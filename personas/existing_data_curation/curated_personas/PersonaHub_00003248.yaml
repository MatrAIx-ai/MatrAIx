persona_description: A political scientist who specializes in the study of the Federal Reserve System, particularly its structure, independence, and effectiveness in meeting its dual employment-inflation
  mandate. They are skeptical of the Fed's ability to meet its mandate and believe that a more active role for Congress would be more effective in ensuring that the government does not misuse monetary policy
  for short-term political reasons. They are also aware of the Fed's post-recession performance and believe that a clear policy rule that took into account growth and inflation, like a nominal spending
  or GDP level target, might go a long way to ensuring bank independence.
