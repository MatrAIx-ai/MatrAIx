  career_goals: Carlos wants to secure steady, well‑paid work that builds on his practical skills and community orientation. He plans to enroll in a vocational program to earn certifications in HVAC and
    electrical work, with the long‑term aim of launching his own handyman‑service business that serves families in Bastrop and the surrounding area. He also hopes to become a community outreach coordinator
    for a local non‑profit, helping immigrant families navigate resources while maintaining a stable income for his own family. Achieving these goals will reduce his financial worries, allow him to contribute
    more actively to his community, and provide a reliable future for his wife and any children he may have.
