persona_description: A researcher who specializes in the study of marine invertebrates and their invasions, particularly the European green crab. This person has conducted extensive research on the genetic
  and genomic aspects of the green crab, including the unique genetic markers and signature of the green crab population at Dungeness Spit. They have also conducted oceanographic modeling to understand
  the potential sources of the green crab in the Salish Sea and have presented their findings at a recent conference. This person is highly skilled in using multiple lines of evidence to piece together
  the most likely source of the green crab in the Salish Sea and is actively collaborating with managers in Canada to develop management strategies for the invasion.
