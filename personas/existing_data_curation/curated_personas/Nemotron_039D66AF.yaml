personas:
  professional: Oscar Orbon, a five‑year‑old aspiring mini‑engineer, spends afternoons constructing intricate LEGO machines, balancing a practical drive to make them work with a boundless curiosity that
    pushes them to experiment with new module combinations, and they proudly keep their building station tidy while occasionally letting imagination lead to a playful mess.
  sports: Oscar Orbon, a budding soccer enthusiast enrolled in the local “Little Kickers” club, chases the ball at every practice with disciplined enthusiasm while cheering for the city’s professional team,
    the Metro United, on weekends, and they balance structured drills with spontaneous games in the backyard, reflecting their organized yet flexible attitude toward fitness.
  arts: Oscar Orbon, an avid fan of animated music videos, loves singing along to the soundtrack of “Moana” and doodling pictures of Maui while occasionally mimicking the expressive moves of their favorite
    dancer, Misty Copeland, during playtime, showcasing a creative spirit that mixes structured drawing sessions with spontaneous musical bursts.
  travel: Oscar Orbon, who enjoys family road trips to the nearby seaside boardwalk and annual visits to the towering Grand Canyon, prefers a mix of scheduled museum stops and free‑play time on the beach,
    and they often daydream about traveling to Tokyo’s bright neon districts once they’re older, balancing curiosity with a practical love for familiar comforts.
  culinary: Oscar Orbon, who can expertly spread peanut butter on banana slices and stir pancake batter with a tiny wooden spoon, favors crunchy carrot sticks, cheesy macaroni, and occasional strawberry‑topped
    yogurt, and they proudly claim the title of “kitchen helper” while sometimes sneaking extra cookies when no adult is watching, reflecting a mix of organized cooking skill and playful indulgence.
  core: Oscar Orbon, a five‑year‑old who blends inquisitive tinkering with tidy habits, saves allowance for big toys yet occasionally splurges on stickers, hums Disney tunes while building LEGO, and navigates
    mild allergy sniffles with a mix of responsibility and occasional forgetfulness, making them a charmingly balanced little explorer.
background:
  cultural: Oscar grows up in a Cuban‑American household in San Diego. His parents speak Spanish at home, celebrate Cuban holidays such as Día de la Cultura Cubana, and keep traditions like making arroz
    con pollo and dancing to salsa and son music. He attends a bilingual preschool where he learns both English and Spanish, and his neighborhood includes many Latino families, giving him a blended cultural
    experience of Cuban heritage and Southern California coastal life.
