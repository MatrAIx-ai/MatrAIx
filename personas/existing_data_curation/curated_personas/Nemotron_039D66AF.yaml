  career_goals: Oscar dreams of becoming an astronaut because he loves exploring the unknown, and he also hopes to be a firefighter one day to help people in his community. His curiosity drives him to ask
    questions about how rockets launch and how fire trucks work, while his practical side keeps him focused on roles that protect and serve. He envisions a future where he continues learning, stays curious,
    and maybe combines his love of exploration with a job that makes a positive difference.
