personas:
  professional: Susan Berry is a retired community volunteer who leverages decades of household management, event coordination, and interpersonal communication to lead senior‑center memory‑lane programs,
    organize block parties, and mentor junior historians, and they channel their competitive bridge mindset into meticulous project planning while embracing new video‑calling tools despite a relaxed approach
    to strict scheduling.
  sports: Susan Berry enjoys weekly walks with the senior center walking club, watches the St. Louis Cardinals baseball games on TV, and treats bridge tournaments as the mental sport where their competitive
    streak shines, they prefer low‑impact activities that keep them social yet active.
  arts: Susan Berry is a lover of classic cinema, regularly hosting movie nights featuring Audrey Hepburn’s “Breakfast at Tiffany’s” and Cary Grant’s “North by Northwest”, they also treasure Agatha Christie
    mystery novels and attend the local community theater’s productions of Shakespeare, weaving artistic appreciation into their social gatherings.
  travel: Susan Berry dreams of a road trip across the Midwest to visit the Henry Ford Museum, the Cahokia Mounds, and the historic town of Galena, they also plan to attend the Chicago Flower & Garden Show
    each spring, balancing a love of historic sites with a modest travel budget and a need for accessible accommodations.
  culinary: Susan Berry delights in cooking with heirloom vegetables, often preparing a summer ratatouille with heirloom tomatoes, zucchini, and eggplant, they also bake classic apple pie with a flaky crust
    and pumpkin pie spiced with nutmeg and cinnamon, sharing these dishes at church bake sales and community potlucks.
  core: Susan Berry blends curiosity and practicality into a vibrant community‑centered life, turning gardening, bridge, and genealogy into social rituals while their competitive edge and occasional disorganization
    keep each day delightfully unpredictable.
background:
  cultural: Susan grew up in post‑war Ohio as part of a white, Midwestern, working‑class family with German and Irish roots. Her upbringing emphasized self‑reliance, community service, and modest celebrations
    of family traditions. A lifelong Methodist, she has been active in church outreach and local civic groups. The cultural values of the Midwest—politeness, practicality, and a strong sense of neighborliness—have
    shaped her worldview, while the social changes of the 1960s and 1970s sparked a curiosity that still drives her to learn new skills and explore different perspectives.
