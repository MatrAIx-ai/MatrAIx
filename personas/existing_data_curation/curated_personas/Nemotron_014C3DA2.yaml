  hobbies: '[''gardening'', ''book club'', ''bridge'', ''knitting'', ''baking pies'', ''classic movie nights'', ''volunteering at historical society'', ''community potlucks'', ''traveling with spouse'']'
  career_goals: Even though she is officially retired, Susan sets personal goals that keep her engaged and purposeful. She aims to master video‑calling and social‑media tools so she can stay in touch with
    grandchildren and share family stories online. She wants to lead a senior‑center “memory lane” program that pairs older adults with younger volunteers to record local history. She hopes to travel with
    her husband to visit historic sites in the Midwest and to attend at least one major gardening expo each year. Maintaining her health, independence, and contribution to her community are her primary
    ambitions.
