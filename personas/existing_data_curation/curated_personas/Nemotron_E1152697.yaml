personas:
  professional: Brenden Davis is a self‑appointed “classroom mayor” in his kindergarten, crafting detailed play‑time schedules while flexibly improvising when peers demand a new game, showcasing budding
    leadership, negotiation skills, and a love for being the center of attention.
  sports: Brenden Davis loves Saturday morning soccer practice with the neighborhood under‑5 league, cheers loudly for the Chicago Cubs while wearing a cap, and eagerly joins family hikes in the spring,
    yet prefers loosely structured backyard tag games where they can dominate the winning streak.
  arts: Brenden Davis spends afternoons drawing superhero comics inspired by Marvel’s Spider‑Man and singing along to Disney’s "Let It Go" from Frozen, often performing for family gatherings as the show’s
    star, reflecting a thriving imagination and love for the spotlight.
  travel: Brenden Davis dreams of returning to the Disney World vacation where they rode Space Mountain, plans future trips to Myrtle Beach with a meticulous itinerary of sandcastle contests, but also enjoys
    spontaneous weekend visits to grandparents’ rural farm, balancing structure with flexibility.
  culinary: Brenden Davis favors crunchy chicken nuggets, cheesy macaroni, and banana slices, can assemble a peanut‑butter‑and‑jelly sandwich with minimal spill, but occasionally sneaks extra ketchup, and
    delights in tasting new fruit like kiwi, highlighting a simple yet adventurous palate.
  core: Brenden Davis is a chatty, competition‑driven five‑year‑old who craves order yet thrives on spontaneous play, worries about tiny mishaps, and always seeks the spotlight at home and school.
background:
  cultural: Brenden grows up in a middle‑class white family in the suburban community of Coral Springs, Florida. His upbringing reflects mainstream American culture blended with the diverse atmosphere of
    South Florida. He celebrates holidays such as Halloween, Thanksgiving, and Independence Day with neighborhood block parties and family gatherings, and attends a local public elementary school where
    he engages with classmates from various backgrounds. The frequent warm weather brings regular trips to the beach and community parks, while the multicultural setting introduces him to Spanish signage,
    regional foods, and a mix of cultural influences. His family’s traditions include Christian festivities and a strong emphasis on community involvement.
attributes:
  skills: '["Recognizes uppercase letters and reads simple sight words", "Counts to 20 and performs basic addition", "Draws basic shapes and colors within lines", "Builds structures with LEGO and building
