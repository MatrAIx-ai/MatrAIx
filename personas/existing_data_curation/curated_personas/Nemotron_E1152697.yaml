  hobbies: '["Building LEGO and block towers", "Pretend play as superhero or firefighter", "Soccer practice and games", "Listening to children’s music and podcasts", "Drawing and coloring", "Watching animated
    cartoons", "Singing along to favorite songs", "Exploring local parks and beaches", "Playing hide‑and‑seek", "Playing board games like Candy Land"]'
  career_goals: Brenden imagines a future where he can combine his love of order, teamwork, and being in the spotlight. He dreams of becoming a firefighter or police officer who protects his community and
    works within a clear structure, while also hoping to one day host a kids’ TV show or podcast where he can share stories and keep an audience entertained. His competitive streak fuels a desire to be
    a soccer team captain, leading his teammates to victories and gaining recognition for his leadership.
