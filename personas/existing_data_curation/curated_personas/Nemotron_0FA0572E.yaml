personas:
  professional: Luis Estupinan is a budding automotive technician‑in‑training who blends his hands‑on knack for fixing bikes and engines with bilingual communication skills, volunteering at the community
    center while balancing schoolwork and a practical eye toward a stable career in Hill Country, and they often approach new mechanical challenges with both curiosity and measured caution.
  sports: Luis Estupinan plays midfield for the Wimberley United youth soccer team, cheers on the San Antonio FC during weekends, and they regularly join the Texas Hill Country Cycling Club for trail rides,
    balancing competitive matches with relaxed weekend bike excursions.
  arts: Luis Estupinan strums an acoustic guitar and sings classic folk ballads by Vicente Fernández and Juan Gabriel at neighborhood gatherings, while also appreciating indie folk from Bon Iver and the
    occasional classic rock riff of The Eagles, and they find these musical moments a soothing counterbalance to their daily worries.
  travel: Luis Estupinan dreams of road‑tripping through the Texas Hill Country to Fredericksburg’s vineyards, enjoys periodic weekend escapes to the San Antonio River Walk, and they hope to one day budget
    a week‑long backpacking adventure to the capital of a neighboring country to explore its historic mercados.
  culinary: Luis Estupinan, an intermediate home‑cook, delights in hand‑rolling tamales de pollo, simmering salsa verde with fresh tomatillos and chipotle, and perfecting carnitas for family feasts, often
    pairing their meals with homemade agua de jamaica, though they sometimes forget to clean the kitchen before the next round of cooking.
  core: Luis Estupinan balances a restless curiosity for mechanics with a lingering worry about the future, often fixing bikes while obsessively checking their savings app, staying up late polishing their
    guitar only to forget homework, and they rely on quiet evenings to recharge.
background:
  cultural: Luis was raised in a Mexican‑American household where Spanish was spoken at home and English at school, giving him a bicultural perspective. Family gatherings feature celebrations of Día de
    los Muertos, quinceañeras, and traditional Mexican holidays, often centered around homemade food and music. He attends a local Catholic church, which plays a role in his community involvement and values
    of harmony and service. Living in Wimberley, Texas, Luis blends Mexican culinary traditions with Tex‑Mex influences, and he participates in regional festivals that showcase both his heritage and his
    Texan surroundings.
