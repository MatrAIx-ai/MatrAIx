  career_goals: Luis aims to earn his GED within the next year and then enroll in a community‑college program for automotive technology or HVAC certification, fields that combine his mechanical curiosity
    with reliable job prospects. He hopes to secure a stable position as a certified technician in the Hill Country, where he can support his family and continue learning new technologies. In the longer
    term, Luis dreams of opening a small family‑run taquería that showcases authentic Mexican recipes, providing a gathering place for his community and preserving cultural traditions.
