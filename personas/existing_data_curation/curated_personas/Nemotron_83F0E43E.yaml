personas:
  professional: Jayme Everett, a 74‑year‑old retired office administrator, leverages her meticulous budgeting skills, Microsoft Office expertise, and love for genealogy to coordinate volunteers and assist
    patrons with computer use at the East Hartford public library while pursuing senior courses in digital photography and New England history.
  sports: Jayme Everett enjoys low‑impact fitness through daily walks in Moss Hill Park to spot belted warblers, follows the Hartford Yard Goats baseball team and the New England Patriots with a modest
    collection of memorabilia, and is a member of the local senior walking club that meets every Saturday morning.
  arts: Jayme Everett spends quiet afternoons photographing the changing seasons of her herb garden, draws inspiration from Ansel Adams and Claude Monet, knits scarves while listening to Sarah McLachlan,
    and volunteers at the town arts council to help organize historical exhibitions.
  travel: Jayme Everett prefers meticulously planned, low‑key trips, using senior discounts to explore historic towns like Williamsburg, VA, and coastal getaways such as Cape Cod, where she stays in quiet
    B&Bs that offer a garden view, always returning home with a new seed packet or a vintage postcard.
  culinary: Jayme Everett cultivates basil, thyme, and rosemary in her spring herb garden, then crafts herb‑infused olive oil, pesto pasta, and rosemary‑seasoned chicken soup, while occasionally over‑salting
    her stew when distracted by a new genealogy discovery.
  core: Jayme Everett blends solitary curiosity with practical organization, tending herb beds, charting family trees, budgeting with military precision, and quietly mastering old‑school hobbies while gently
    battling forgetfulness and a love for frugality.
background:
  cultural: Jayme is a white American who grew up in the post‑war suburbs of Connecticut. Her family lineage reaches back to early New England settlers, and she was raised with the region’s traditional
    emphasis on self‑reliance, modesty, and community service. The rhythmic change of New England seasons, the town‑meeting civic model, and a strong public‑library culture have shaped her love for quiet
    study, local history, and understated civic participation. While she identifies with mainstream American cultural norms, she also appreciates the growing multicultural tapestry of East Hartford, often
    attending neighborhood heritage events as an observer and occasional volunteer.
attributes:
  skills: '["Organizational planning", "Budget management", "Microsoft Office (Word, Excel, Outlook)", "Basic computer troubleshooting", "Herb and vegetable gardening", "Knitting and textile crafts", "Volunteer
    coordination", "Genealogical research"]'
  hobbies: '["Herb gardening", "Reading (historical fiction and non‑fiction)", "Crossword puzzles", "Jigsaw puzzles", "Birdwatching", "Knitting", "Genealogical research", "Digital photography"]'
  career_goals: Although retired from formal employment, Jayme aims to stay intellectually active and quietly give back to her community. She plans to enroll in senior‑learning courses at a local community
    college, exploring topics like digital photography and New England history. Volunteering at the East Hartford public library, she hopes to assist patrons with computer use and support literacy programs.
    Jayme also aspires to complete a memoir and a detailed family genealogy archive to preserve her heritage for future generations. Maintaining health, independence, and a sense of purposeful solitude
    remain central to her personal ambitions.
