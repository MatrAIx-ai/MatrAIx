  career_goals: Michael aims to transition from senior designer at his agency to founding a boutique consultancy that merges sustainable design with cultural storytelling, focusing on community‑centered
    projects in New England. He hopes to mentor emerging designers through workshops and adjunct teaching at the Rhode Island School of Design, leveraging his humanities background. Over the next five years,
    he plans to curate a traveling exhibition of his own mixed‑media artwork, and to integrate AI‑driven design tools into his practice to stay at the cutting edge. He also dreams of authoring a book that
    explores the interplay between regional maritime history and contemporary design, positioning himself as a thought leader in place‑based design.
