  hobbies: '[''Visiting contemporary art galleries'', ''Painting'', ''Photography'', ''Salsa dancing'', ''Cooking Ecuadorian cuisine'', ''Hiking local parks'', ''Tech meetups and hackathons'', ''Board games
    with friends'', ''Mindfulness meditation'', ''Journaling'', ''Reading psychology and personal development books'']'
  career_goals: Maria aims to evolve from a senior developer into a technical architect, shaping large‑scale systems that integrate sophisticated UI/UX experiences inspired by contemporary art. She hopes
    to lead initiatives that increase diversity and inclusion for Latinx women in tech, leveraging her own journey to mentor and sponsor upcoming talent. Over the next five years, she plans to launch a
    boutique consultancy that creates interactive, art‑driven software installations for museums and cultural institutions, allowing her to merge her love of art and technology. Parallel to these professional
    aspirations, she wants to champion mental‑health awareness within her workplace, establishing peer‑support groups and advocating for flexible work policies that accommodate the emotional intensity she
    sometimes experiences.
