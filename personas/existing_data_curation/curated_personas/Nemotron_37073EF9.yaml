personas:
  professional: Maria Hernandez, a senior full‑stack software developer specializing in Python, JavaScript, React, and cloud architecture on AWS and Azure, channels their curiosity and artistic sensibility
    into crafting visually striking, user‑centric web applications while leading hackathon teams with a competitive edge and mentoring junior developers, though they often favor flexible, improvisational
    problem‑solving over rigid planning.
  sports: Maria Hernandez fuels their fitness routine with weekly salsa dancing, weekend hikes through Watchung Reservation, and a casual loyalty to the New York Yankees, Knicks, and Rangers, blending a
    competitive spirit on the dance floor with a relaxed approach to team sports.
  arts: Maria Hernandez immerses themselves in contemporary art by frequenting MoMA, the Whitney, and exhibitions featuring artists such as Yayoi Kusama, Kehinde Wiley, and Banksy, while also practicing
    photography that captures New York’s street vibrancy and attending live salsa performances that blend rhythm and cultural storytelling.
  travel: Maria Hernandez prefers curated cultural trips, often exploring art‑laden cities like Barcelona and Florence after work, while also taking weekend getaways to nearby destinations like the Hudson
    Valley and the Poconos, balancing a love for museum tours with a pragmatic budget that favors short‑haul flights and occasional train journeys.
  culinary: Maria Hernandez delights in cooking traditional dishes such as ceviche and seco de chivo, skillfully blending fresh cilantro, lime, and plantains, and they frequently host potluck gatherings
    where friends sample their experimental twists on classic recipes, though they sometimes burn the guava glaze in their haste.
  core: Maria Hernandez blends tech mastery, artistic flair, and a zest for community with a competitive drive and occasional emotional turbulence, creating a vibrant yet sometimes disorganized tapestry
    of professional ambition and personal passions that they navigate with both confidence and occasional self‑doubt.
background:
  cultural: Maria grew up in a bicultural household that celebrated Ecuadorian traditions while adapting to life in the United States. Spanish was spoken at home, and she learned the rhythms of traditional
    music, dance, and cuisine from her parents, fostering a deep appreciation for her heritage. Family gatherings often featured dishes like rice and beans, plantains, and the festive spirit of Carnaval
    and Mama Negra, which she now recreates for friends in New Jersey. As a first‑generation American, Maria balances the collective values of her native culture—community, resilience, and respect for elders—with
    the individualistic ethos of American society. This dual perspective informs both her collaborative work style and her desire to champion diversity within the tech industry. Living in Chatham, NJ, she
    stays connected to the local Latinx community through cultural festivals and volunteer work, and she frequently shares her love of Ecuadorian art and music with her sociable network.
