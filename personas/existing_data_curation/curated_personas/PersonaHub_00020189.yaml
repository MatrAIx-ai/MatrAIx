persona_description: A space astronomer who specializes in the study of infrared radiation and infrared astronomy. She has worked with multiple telescopes, including the Spitzer Space Telescope, Herschel
  Space Observatory, and Planck Observatory, and has contributed to the discovery of previously hidden black holes, the observation of the Milky Way's supermassive black hole, and the first X-ray images
  of Mars. Her expertise also includes the use of infrared radiation to detect exoplanets and study the Cosmic Microwave Background.
