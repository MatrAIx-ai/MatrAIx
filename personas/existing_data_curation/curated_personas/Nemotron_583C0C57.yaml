personas:
  professional: Darian Jackson is a budding junior inventor who spends afternoons assembling LEGO robots and sketching simple Scratch programs, channeling their curiosity and practicality into playful problem‑solving
    while thriving in group projects and sometimes forgetting to tidy their workspace.
  sports: Darian Jackson is a lively member of the Fisherville Tigers Youth Soccer Club, cheers for the Kentucky Wildcats during basketball season, and participates in neighborhood pickup games, balancing
    assertiveness on the field with a cooperative spirit that shines when coordinating team strategies.
  arts: Darian Jackson grooves to contemporary hip‑hop beats from Kendrick Lamar, sings along with gospel choir harmonies at Sunday services, and loves crafting Minecraft realms and Scratch animations inspired
    by R&B rhythms, turning their energetic imagination into digital and musical expression.
  travel: Darian Jackson enjoys spontaneous road trips with family to Nashville for live music festivals and dreams of camping in the Great Smoky Mountains, preferring short, adventure‑filled outings that
    match their energetic curiosity over lengthy vacations.
  culinary: Darian Jackson loves helping stir collard greens with smoked ham and bake cornbread alongside their grandmother, while also insisting on a side of creamy mac and cheese and sneakily tasting
    sweet potato pie whenever a chance arises.
  core: Darian Jackson is an energetic, curiosity‑driven 8‑year‑old who balances playful invention, soccer enthusiasm, soulful music, and spontaneous spending, all while navigating a relaxed approach to
    chores and occasional allergies.
background:
  cultural: Darian is an African‑American boy growing up in Fisherville, Kentucky, a community with deep Southern Black roots. His family maintains traditions of church fellowship, gospel music, and community
    gatherings that celebrate heritage, such as Juneteenth and local festivals. He frequently hears stories from older relatives about the region's history and enjoys soulful cooking, including collard
    greens and cornbread, prepared during family meals. This cultural environment blends rural Kentucky values—friendliness, modesty, and a love of the outdoors—with the vibrant rhythms, language, and communal
    spirit of Black Southern culture, shaping his identity and worldview.
