  career_goals: Inspired by his love of building and helping others, Darian dreams of becoming an engineer who designs safe, fun playgrounds for his community, or a firefighter who protects the town he
    calls home. He also imagines coaching a youth soccer team one day, combining his leadership skills with his passion for the sport. These ambitions are guided by his curiosity about how things work and
    his practical desire to make a visible, positive impact on the people around him.
