persona_description: A media and communications researcher or educator who is interested in understanding the complex and ever-evolving landscape of media and communications in Australia, as well as the
  impact of digital technologies on traditional media industries. They are likely to be familiar with the key media industries and the various approaches taken in studying the media, and are interested
  in exploring the thorny issues surrounding media ethics, youth media, celebrity culture, and the future of public broadcasting. They may also be interested in the citation counts and the citation databases
  used to measure the impact of media and communications research.
