persona_description: A neuroscientist who studies the neural pathways that regulate sleep/wakefulness states and the synaptic input of orexin/hypocretin-producing neurons. This individual has expertise
  in transgenic methods for mapping neuronal populations and electrophysiological studies to understand the neural pathways involved in sleep/wakefulness regulation. They are interested in the input and
  output of orexin neurons and the potential impact of cholinergic neurons in the basal forebrain on wakefulness.
