  career_goals: Looking ahead, Nathan aims to earn his GED and pursue a certification such as Certified Professional Sales Leader to strengthen his credentials. He aspires to advance to a sales operations
    manager role, overseeing multiple supervisory teams and shaping regional sales strategy. Ultimately, he envisions moving into a district or regional director position where he can drive large‑scale
    initiatives, mentor emerging leaders, and introduce data‑driven sales innovations. Parallel to his corporate goals, Nathan hopes to launch a small family‑owned service business—perhaps a home‑maintenance
    or auto‑repair shop—to provide additional financial security and a legacy for his children. Throughout these ambitions, he prioritizes work‑life balance to mitigate his tendency toward stress and to
    maintain a supportive home environment.
