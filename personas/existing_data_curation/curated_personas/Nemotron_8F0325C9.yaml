  career_goals: In the next two years, Anthonio aims to become the top‑producing sales representative in his territory and earn recognition as a sales MVP within his company. He plans to pursue a Certified
    Professional Sales Person (CPSP) credential to deepen his expertise. Within five years, he targets a promotion to regional sales manager, overseeing a team of representatives across the Northeast and
    shaping sales strategy for sustainable manufacturing products. Ultimately, he envisions launching his own boutique wholesale distribution firm that focuses on eco‑friendly industrial supplies, leveraging
    his network, competitive drive, and industry insight to become a market leader.
