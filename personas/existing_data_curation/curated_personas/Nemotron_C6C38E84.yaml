  career_goals: Merita plans to complete her GED within the next year and pursue a certificate in office administration or hospitality management. She seeks a stable full‑time role that offers routine and
    clear responsibilities, such as a front‑desk coordinator, administrative assistant, or hospitality staff member, where she can leverage her people‑skills and organizational strengths. In the longer
    term, she aspires to move into a supervisory position that allows her to mentor new employees while maintaining a harmonious and supportive work environment.
