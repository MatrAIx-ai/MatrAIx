personas:
  professional: Merita Nunez is an aspiring front‑desk coordinator who leverages her strong interpersonal communication and meticulous scheduling skills to keep community events running like clockwork,
    thriving on the routine and the chance to be the friendly face everyone greets.
  sports: Merita Nunez enjoys cheering on the Minnesota Twins and the Minnesota Vikings, participates in a local yoga class twice weekly, and plays casual softball on a co‑ed community league, valuing the
    camaraderie and routine of weekend sport.
  arts: Merita Nunez is a lead soprano in her church choir, a regular attendee of productions at the Guthrie Theater, and a fan of Broadway classics like "The Sound of Music" and modern hits such as "Hamilton,"
    often quoting lyrical lines during community gatherings.
  travel: Merita Nunez prefers organized weekend road trips to nearby destinations like the historic towns of Stillwater and Duluth, while dreaming of a summer pilgrimage to the Norwegian fjords to connect
    with her ancestral traditions, yet she budgets carefully to keep travel within her modest savings.
  culinary: Merita Nunez loves cooking savory Midwestern hotdish, baking blueberry muffins, and perfecting rye bread, frequently using ingredients like wild rice, fresh cheese curds, and farm‑sourced honey,
    and she enjoys sharing these dishes at church potlucks and neighborhood bake‑sales.
  core: Merita Nunez blends a love for orderly community routines with a vibrant social flair, bouncing effortlessly between front‑desk duties, choir rehearsals, and baking marathons, even if she sometimes
    overcommits to too many potlucks.
background:
  cultural: Merita grew up in a middle‑class, Midwestern white American family in Minneapolis. Her upbringing emphasized practicality, routine, and community involvement, reflecting regional values shaped
    by Scandinavian and German heritage influences common in the area. Family and church activities reinforced traditional values of reliability, cooperation, and social harmony, which continue to guide
    her outlook and daily life.
