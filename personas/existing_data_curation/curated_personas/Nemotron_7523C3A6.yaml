personas:
  professional: Mark Sims, an aspiring nursing student at Oklahoma State University, leverages their meticulous patient‑care certification, CPR and phlebotomy skills, and strong time‑management instincts
    to thrive in clinical rotations while constantly battling a lingering worry about making mistakes, which drives them to double‑check every vital sign and documentation entry.
  sports: Mark Sims trains at the Stillwater community gym, participates in the OSU intramural weight‑lifting club, hikes the Lake McMurphy trails on weekends, and they avidly follow the Oklahoma State
    Cowboys football and basketball teams, wearing their red‑and‑white gear to every game.
  arts: Mark Sims unwinds with classic‑rock playlists featuring The Eagles, Led Zeppelin, and Creedence Clearwater Revival, attends occasional live performances at the Stillwater Arts Center, and they enjoy
    re‑watching classic films starring Tom Hanks and John Wayne, which remind them of small‑town values blended with cinematic adventure.
  travel: Mark Sims prefers short, budget‑friendly road trips that let them explore nearby landmarks like the Ozark National Forest and Tulsa’s Route 66 attractions, using a student discount travel card
    and a detailed itinerary to maximize sightseeing while keeping costs low.
  culinary: Mark Sims favors hearty regional dishes such as chicken‑fried steak, smoked BBQ ribs, and homemade chili, and while their cooking skill is modest, they enjoy perfecting a simple brisket rub
    with brown sugar, paprika, and cayenne for weekend grill sessions.
  core: Mark Sims is a structure‑loving, anxiety‑prone nursing aspirant who balances meticulous patient care with classic‑rock nostalgia, budget‑tight finances, and they have a habit of over‑packing their
    gym bag.
background:
  cultural: Mark grew up in a modest, white, Midwestern‑style family on the outskirts of Stillwater, Oklahoma. His upbringing emphasized hard work, personal responsibility, and community involvement, values
    reinforced by regular attendance at a local Baptist church and participation in county fairs and youth sports. The regional culture of the Great Plains—practicality, self‑reliance, and a close‑knit
    neighborly network—shapes his worldview. Moving to Stillwater for college introduced him to the broader, more diverse environment of Oklahoma State University, adding exposure to different perspectives
    while maintaining his core small‑town values. He enjoys regional cuisine such as chicken‑fried steak and BBQ, and respects the heritage of nearby Native American tribes, although his own ethnicity is
    white. This blend of traditional rural roots and campus life informs his personal identity and aspirations.
attributes:
  skills: '[''Patient care assistance'', ''Vital signs measurement'', ''Electronic health record documentation'', ''Infection control protocols'', ''CPR and First Aid certification'', ''Basic phlebotomy
