  hobbies: '[''Strategic board games (e.g., Settlers of Catan)'', ''Weight training'', ''Hiking local trails'', ''Listening to classic rock'', ''Reading non‑fiction (health, self‑improvement)'', ''Volunteer
    at community health fairs'', ''Video gaming (strategy titles)'']'
  career_goals: Mark plans to finish his remaining credits toward an associate’s degree in health sciences and then transfer to Oklahoma State University’s nursing program to become a Registered Nurse.
    He aims to specialize in geriatric or mental‑health nursing, fields where his compassionate yet practical nature can thrive. In the longer term, he hopes to obtain a Bachelor of Science in Nursing,
    pursue a nursing leadership certification, and eventually move into a nurse manager or health services coordinator role that offers a stable, structured career path with clear advancement milestones.
