persona_description: A historian and urban planner who specializes in the study of the decline and transformation of urban areas in the United States during the post-World War II era. She is particularly
  interested in the impact of suburbanization and the loss of jobs on the geography and demographics of cities, as well as the role of institutions such as schools, hospitals, and law firms in shaping urban
  communities. She is also knowledgeable about the economic and social changes that occurred in New Jersey during this period, including the growth of the suburbs and the loss of jobs in major cities like
  Newark and Camden.
