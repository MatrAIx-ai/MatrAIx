personas:
  professional: Medina Anderson, a retired community organizer turned museum docent in training, blends their skill in public storytelling, garden stewardship, and digital photography to lead immersive
    tours and intergenerational workshops that celebrate Savannah’s artistic and historic legacy.
  sports: Medina Anderson follows the Savannah Bananas baseball team with enthusiasm, participates in a weekly walking club at the historic riverfront, enjoys casual spring tennis, and prefers relaxed gardening
    and dancing at gospel concerts over competitive sports; they occasionally skip a tennis match when an unexpected photo opportunity arises.
  arts: Medina Anderson immerses themselves in the arts by attending live performances of jazz legends like John Coltrane, blues sessions featuring B.B. King tribute bands, and gospel choirs led by local
    choirmasters; they also appreciate visual works by Faith Ringgold, choreography by Misty Copeland, and often explore the Telfair Museums to study contemporary photographers such as Carrie Mae Weems.
  travel: Medina Anderson has traveled to the National Museum of American History’s civil‑rights exhibit in Washington, D.C., the historic landmarks of Selma, Alabama, and the Sea‑Island heritage sites
    of Charleston; they hope to walk the Freedom Trail in Boston and explore the historic French Quarter of New Orleans next summer, always arranging trips around community events and senior travel discounts.
  culinary: Medina Anderson delights in cooking collard greens seasoned with smoked turkey, shrimp and grits with fresh Gulf shrimp, sweet potato pie with nutmeg, and experimenting with okra gumbo, often
    using locally sourced heirloom tomatoes and cornmeal from the community garden; they proudly host informal cooking gatherings where friends sample the dishes and share stories.
  core: Medina Anderson is a curious, community‑focused elder who weaves storytelling, gardening, and soulful music into a vibrant, slightly chaotic life of lifelong learning; they greet each day with an
    open mind, a ready smile, and the occasional forgotten bill reminder.
background:
  cultural: Medina is an African‑American woman whose roots run deep in Savannah’s historic Black neighborhoods, including influences from the Gullah/Geechee culture of the Sea Islands. Her upbringing was
    shaped by the church, community activism, and the legacy of the civil‑rights movement in the South. Family traditions emphasize storytelling, soulful music, and Southern cuisine, which she carries forward
    in her daily life. She actively participates in local African‑American cultural festivals, honors the city’s rich Black heritage through volunteer work, and maintains strong ties to intergenerational
    community networks that celebrate resilience, creativity, and shared history.
