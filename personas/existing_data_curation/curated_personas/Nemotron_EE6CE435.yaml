  career_goals: Although retired from formal employment, Medina aims to deepen her impact on Savannah’s cultural landscape. She hopes to become a docent at the Telfair Museums, leading tours that highlight
    African‑American artistic contributions. She aspires to launch a monthly intergenerational art workshop that blends quilting, painting, and digital media, fostering creative exchange between seniors
    and youth. Medina also plans to author a memoir that weaves personal narrative with the city’s civil‑rights history, and she hopes to travel along the Freedom Trail to connect with historic Black sites
    across the South. Continuing lifelong learning, she intends to enroll in short courses at the local community college on African‑American history and emerging photographic techniques.
