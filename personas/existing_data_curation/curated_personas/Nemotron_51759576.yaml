  hobbies: '["Gardening", "Woodworking", "Hiking", "Mexican Cooking", "Reading Historical Biographies", "Puzzle Solving", "Mindfulness Meditation", "Spanish Teaching (Volunteer)"]'
  career_goals: Adan aims to advance to a senior director of operations role within the next five years, overseeing multi-site logistics and championing lean, sustainable practices. He seeks to deepen his
    expertise through a bachelor’s degree in business administration and certifications in Six Sigma and project management. Mentoring emerging managers and fostering inclusive, culturally aware workplaces
    are central to his long-term vision. Ultimately, he aspires to transition into strategic consulting, leveraging his calm, resilient leadership style to help organizations improve efficiency and employee
    well‑being.
