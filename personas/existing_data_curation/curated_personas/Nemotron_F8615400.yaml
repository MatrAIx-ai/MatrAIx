personas:
  professional: Christopher Mccandless, a middle‑school student with a passion for coding and model‑kit construction, applies a meticulous, rule‑driven mindset to self‑directed programming projects and
    detailed hobby builds, reflecting their practical, organized yet imaginative approach to learning.
  sports: Christopher Mccandless participates in after‑school basketball practice with the local youth team, the Riverdale Cyclones, while cheering for the Golden State Warriors and using weekend hikes
    in nearby Green Valley Park to stay fit and release tension.
  arts: Christopher Mccandless avidly reads science‑fiction classics like Dune and Neuromancer, curates indie and rock playlists featuring Arctic Monkeys and Tame Impala, and treats model‑kit assembly as
    a form of hands‑on art that satisfies their creative impulse within a predictable framework.
  travel: Christopher Mccandless enjoys planned weekend trips to state parks such as Yosemite and dreams of traveling to Tokyo for its tech culture, favoring organized itineraries that balance exploration
    with the comfort of familiar routines.
  culinary: Christopher Mccandless prefers simple, comforting meals like pepperoni pizza and homemade ramen, often experimenting with fresh basil and ginger in the kitchen while mastering the art of baking
    chocolate chip cookies as a relaxing after‑school activity.
  core: Christopher Mccandless is a detail‑driven 13‑year‑old who channels intense anxiety into structured hobbies like coding, model‑building, and basketball, juggling teenage finances and health with
    a blend of caution and occasional impulsivity.
