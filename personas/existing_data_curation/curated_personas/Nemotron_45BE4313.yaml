    ''cooking family recipes'']'
  career_goals: Tocara aims to complete her GED within the next two years and later pursue a degree in social work or counseling so she can become a youth mentor and mental‑health advocate. She hopes to
    establish a mentorship program at her local community center that supports at‑risk teens, combining her love for education, counseling, and community service. In the long term, she envisions working
    as a licensed therapist or community outreach coordinator, helping others navigate stress and emotional challenges while fostering a supportive environment.
