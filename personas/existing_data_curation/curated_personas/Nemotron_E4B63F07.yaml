  career_goals: Jeff hopes to complete his GED within the next two years and secure an apprenticeship with a local automotive repair shop. He envisions gaining certification as a mechanic, eventually working
    toward becoming a master technician. Over time, he aims to open a small, community‑focused garage that offers reliable, affordable services, allowing him to maintain stable employment while staying
    rooted in his hometown. His long‑term ambition includes providing for his family, contributing to the local economy, and possibly mentoring other youths interested in trade skills.
