personas:
  professional: Jeff Clayton is a budding automotive enthusiast who leverages his methodical, routine‑oriented mindset to excel at repairing his family’s sedan, troubleshooting home networks, and assembling
    model kits, turning each task into a structured learning opportunity as they pursue a future apprenticeship in auto repair.
  sports: Jeff Clayton enjoys low‑key fitness activities, joining the Lakeside Bike Club for weekend rides, cheering on the Brookfield Eagles high‑school football team and the Detroit Tigers baseball club,
    and keeps a routine of early‑morning fishing trips that provide a calm, structured form of exercise.
  arts: Jeff Clayton channels his love of precise, hands‑on creation into woodworking while listening to classic rock icons like The Beatles and folk singer John Denver, and occasionally watches Bob Ross’s
    painting tutorials for their soothing, step‑by‑step approach to art.
  travel: Jeff Clayton prefers well‑planned, budget‑friendly trips, spending summers at nearby Lake Clear for fishing and weekend camping, while dreaming of a future road‑trip to the Henry Ford Museum in
    Dearborn and an overseas pilgrimage to the Mercedes‑Benz Museum in Stuttgart.
  culinary: Jeff Clayton enjoys straightforward, hearty meals, often grilling fresh trout caught on their lake trips with lemon, dill, and butter, whipping up cheeseburgers with crisp lettuce and cheddar,
    and occasionally simmering a classic beef stew using carrots, potatoes, and thyme.
  core: Jeff Clayton is a methodical, hands‑on teen who finds comfort in routine, whether fixing engines, building models, or planning the next pragmatic adventure, all while balancing a quiet confidence
    with a few stubborn quirks.
background:
  cultural: Jeff was raised in a typical Midwestern white family in Urbana, Illinois. His upbringing reflects the region’s emphasis on practicality, self‑reliance, and community involvement. Family traditions
    include celebrating holidays like Thanksgiving and Fourth of July with modest gatherings, and participating in local events such as the Champaign County Fair. The local culture promotes a straightforward
    work ethic, respect for routine, and a preference for modest, reliable lifestyles. While the community is diverse, Jeff’s cultural framework is grounded in the values of modesty, responsibility, and
    a close‑knit neighborhood network.
