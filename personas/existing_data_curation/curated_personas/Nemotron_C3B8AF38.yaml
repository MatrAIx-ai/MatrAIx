  hobbies: '["gardening", "birdwatching", "beach walks and photography", "reading historical fiction", "knitting", "church choir singing", "board‑game nights", "journaling", "crossword puzzles", "volunteering
    at senior center", "attending community workshops"]'
  career_goals: Although retired from formal employment, Maxine aims to deepen her community involvement by becoming a regular volunteer coordinator at the local senior center and by mentoring younger neighbors
    in gardening. She wishes to learn digital photography to document the coastal wildlife and garden progress, and to compile a memoir that captures her family’s history and the changing landscape of Villas,
    NJ. Maintaining her health and independence through regular walks on the beach and gentle exercise is also a core personal ambition.
