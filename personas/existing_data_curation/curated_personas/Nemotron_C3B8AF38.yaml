personas:
  professional: Maxine Altieri, a retired home‑maintenance artisan turned senior‑center volunteer coordinator, leverages their knack for hands‑on repairs and sustainable gardening while soothing neighborhood
    disputes with a gentle, cooperative demeanor.
  sports: Maxine Altieri enjoys gentle daily beach walks with their walking club, follows the New Jersey Devils and Philadelphia Eagles on TV, participates in a senior softball league at the community park
    each spring, and treats yoga classes at the local senior center as part of their low‑impact fitness routine.
  arts: Maxine Altieri sings in their church choir, delights in listening to Ella Fitzgerald, Joan Baez, and the modern folk trio The Lumineers, reads historical fiction by Hilary Mantel and Ken Follett,
    and visits the Asbury Park art gallery to admire works by local painter Jane Smith, allowing music and narrative to color their quiet evenings.
  travel: Maxine Altieri prefers relaxed road trips along the Jersey Shore and day‑long ferry rides to Cape May, has visited the historic districts of Savannah, Georgia, dreams of touring the vineyards
    of Tuscany, Italy, and typically plans their travel by sketching itineraries in a notebook, balancing limited senior travel budgets with a yearning for seaside serenity.
  culinary: Maxine Altieri favors home‑cooked comfort foods, from their signature garden‑fresh ratatouille seasoned with rosemary and thyme to a creamy New England clam chowder enriched with locally sourced
    clams, delights in preserving heirloom tomatoes in jars, and enjoys experimenting with spice blends like smoked paprika and cumin when crafting weekend casseroles.
  core: Maxine Altieri is a garden‑obsessed, choir‑loving retiree whose gentle mediating spirit coexists with a habit of misplacing their keys and a lingering worry about the future, turning each sunrise
    on the beach into a quiet reminder for them to savor the present.
background:
  cultural: Maxine grew up in a middle‑class white, likely Italian‑American family in mid‑20th‑century New Jersey. Raised Catholic, she values community, hospitality, and modest traditions handed down through
    generations. Her upbringing in the Jersey Shore region fostered a strong connection to the coast, local food customs, and neighborhood solidarity. These cultural influences are reflected in her love
    of family recipes, participation in church and community events, and her dedication to preserving local history and nature.
attributes:
  skills: '["home maintenance and small repairs", "vegetable gardening with sustainable techniques", "cooking family recipes and experimenting with new dishes", "basic computer use (email, video calls,
