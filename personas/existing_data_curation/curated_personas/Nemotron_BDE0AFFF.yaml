personas:
  professional: Latoya Wrentz, an aspiring community organizer in her church's youth group, leverages her talkative charisma, keen sense of routine, and competitive edge to coordinate events, manage volunteer
    schedules, and keep her team on track.
  sports: Latoya Wrentz captains the Willow Creek Youth Soccer Club, drills hard after school to stay match‑ready, cheers for the U.S. Women’s National Soccer Team and the local professional basketball
    franchise the Chicago Bulls, and balances their competitive spirit with a habit of stretching and yoga class attendance on rainy days, occasionally joining the Girl Scouts’ annual hike to stay fit.
  arts: Latoya Wrentz fuels their storytelling circles with the dynamic beats of Beyoncé and Kirk Franklin, gushes over Raina Telgemeier’s graphic novels such as *Smile* and *Sisters*, and lets their dance
    classes channel the choreography of Megan Thee Stallion’s hip‑hop routines, often mimicking John Legend’s piano riffs on a classroom keyboard during free periods.
  travel: Latoya Wrentz prefers structured family road trips that follow a printed itinerary, dreaming of a future visit to the Smithsonian museums in Washington, D.C., has already taken a weekend adventure
    to Disney World in Orlando, and adds a nostalgic stop at their grandparents' farmhouse in upstate New York to their ever‑growing travel bucket list, always packing a checklist of snacks, games, and
    a favorite graphic novel for the journey.
  culinary: Latoya Wrentz enjoys whipping up quick kid‑friendly meals like loaded nachos with cheddar, jalapeños, and black beans, perfecting chocolate‑chip banana muffins with a dash of cinnamon, and proudly
    presenting a spicy chicken stir‑fry seasoned with soy sauce and ginger after an afternoon of soccer practice, often inviting friends over to sample the dishes and trade recipe ideas.
  core: Latoya Wrentz is a talkative, routine‑loving ten‑year‑old who blends competitive drive with a love for community, music, and meticulously planned adventures, even if they sometimes neglect bedtime
    for a good story.
background:
  cultural: Latoya comes from an African‑American family rooted in the Pontiac, Michigan community. Her family celebrates cultural traditions such as Juneteenth, soul‑food gatherings, and church holidays,
    emphasizing the importance of community, family bonds, and resilience. She attends a local public elementary school and participates in after‑school programs at the community center, which expose her
    to a blend of Midwest Black culture, contemporary music, and neighborhood mentorship initiatives.
