  hobbies: '[''Soccer'', ''Dance classes'', ''Church youth group activities'', ''Graphic novels'', ''R&B and gospel music'', ''Girl Scouts'', ''Craft projects'', ''Puzzle tournaments'', ''Chess'', ''Storytelling
    circles'']'
  career_goals: Latoya dreams of becoming an elementary school teacher because she loves routine, practical work, and guiding younger children. In the near term, she wants to earn the title of class representative
    and maintain top grades in reading and math. She also expresses interest in community health roles, such as a pediatric nurse, to help keep her neighborhood safe and healthy. Her competitive spirit
    drives her to strive for academic awards and sports team captaincy.
