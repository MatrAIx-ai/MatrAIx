personas:
  professional: Haewon Le is an aspiring young architect of LEGO masterpieces, and they combine meticulous planning, a love for geometry from math club, and disciplined piano practice to envision and construct
    intricate structures with an eye for detail.
  sports: Haewon Le enjoys playing on the community soccer team and follows the Los Angeles Lakers, while also participating in school track events and attending after‑school karate classes at the local
    dojo, and they eagerly check game scores and practice drills after school.
  arts: Haewon Le is a dedicated piano student who practices daily, drawing inspiration from pianist Lang Lang and the emotive melodies of Yiruma, while also exploring traditional calligraphy strokes and
    admiring the animation works of Studio Ghibli, and they often perform impromptu recitals for family members.
  travel: Haewon Le loves family road trips to national parks like Yosemite, dreams of visiting the historic Seoul palace and the bustling streets of Tokyo, and always plans itineraries with checklists
    to ensure every museum and snack stop is covered, and they keep a hand‑drawn map journal of each journey.
  culinary: Haewon Le prefers tidy meals such as the neatly arranged bibimbap bowl with gochujang, sushi rolls, and homemade pepperoni pizza, often attempting to replicate the dishes themselves with a careful
    step‑by‑step recipe guide, and they take pride in measuring ingredients precisely to avoid any culinary chaos.
  core: Haewon Le channels disciplined curiosity into LEGO constructions, piano scales, and strategic chess moves, balancing a competitive edge with a love for orderly routines and occasional sweet indulgence,
    and they rarely miss a daily practice session.
background:
  cultural: Haewon comes from a Korean‑American family that blends traditional Korean customs with life in Southern California. At home, both Korean and English are spoken, and she celebrates Korean holidays
    such as Seollal (Lunar New Year) and Chuseok (harvest festival) with family rituals, traditional foods, and cultural storytelling. Her parents place a strong emphasis on education, reflecting a cultural
    value of academic achievement, while also encouraging her to explore a variety of interests. Outside the home, Haewon participates in community activities in Upland, CA, and navigates a multicultural
    environment that shapes her identity as both Korean and American.
attributes:
