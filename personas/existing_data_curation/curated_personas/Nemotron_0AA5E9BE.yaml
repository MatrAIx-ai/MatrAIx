  career_goals: Haewon dreams of turning her love for precision and helping others into a future as a pediatric surgeon, where she can combine meticulous skill with compassionate care. She also imagines
    designing educational software, so she aspires to become a software engineer who creates engaging, structured learning tools for children. To prepare, she aims to win math competitions, place highly
    in science fairs, and maintain top grades throughout middle school and high school.
