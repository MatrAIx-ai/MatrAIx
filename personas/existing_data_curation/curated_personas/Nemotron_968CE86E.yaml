personas:
  professional: Maria Acevedo, a budding problem-solver who delights in arranging shape-sorter blocks, showcases early engineering instincts by balancing curiosity with a practical focus on concrete outcomes,
    while they adopt a relaxed approach to routine that leads to spontaneous, unstructured play sessions and a competitive edge when vying for favorite toys.
  sports: Maria Acevedo, an avid admirer of the Los Angeles FC, participates in toddler gymnastics at the Little Sprouts Gymnastics Club and enjoys parent-and-me swimming lessons, yet favors solitary play
    with soft balls over organized team drills.
  arts: Maria Acevedo, a budding aficionado of lullabies, spends quiet moments twirling to the soothing tunes of Raffi and Baby Einstein, often exploring a soft-toy keyboard alone, while their skeptical
    nature makes them wary of group sing-alongs.
  travel: Maria Acevedo, a curious stroller explorer, delights in family trips to the city zoo and a weekend beach getaway at Santa Monica, favoring flexible, unstructured strolls over rigid itineraries,
    yet feels uneasy amidst crowded airports and unfamiliar crowds.
  culinary: Maria Acevedo, a selective eater with a fondness for avocado puree, sweet potato mash, and ripe banana slices, usually enjoys the familiar texture of soft foods but becomes distressed when offered
    new flavors, leading caregivers to stick to a predictable menu of beloved purees.
  core: Maria Acevedo, a one-year-old explorer, blends fierce curiosity with practical play, thrives on solitary discovery, reacts intensely to stress, and navigates a world of flexible routines with occasional
    competitive tug-of-war over toys.
background:
  cultural: Maria Enid Acevedo was born and raised in Gurnee, Illinois, to Mexican-American parents. Her household is bilingual, with Spanish spoken at home alongside English, and she is exposed to Mexican
    cultural traditions such as Dia de los Muertos celebrations, family gatherings around Mexican cuisine, and Spanish language songs. The community around her includes both Latino and broader Midwestern
    American influences, providing a mix of cultural experiences that shape her identity from an early age.
