  career_goals: Eric aspires to move from a laborer role to a supervisory position within a regional distribution center, aiming to become a shift lead within the next three years. He plans to obtain a
    Certified Materials Handler credential and an OSHA Forklift Operator certification, and later enroll in an associate program in supply chain management. His long-term ambition is to manage a logistics
    team at the Port of Baltimore, leveraging his practical experience to improve efficiency and safety. He also hopes to mentor newer workers, sharing his knowledge and competitive drive while fostering
    a dependable team culture.
