  sports: John Cormier, though only an infant, is already attending a parent-led toddler swim class at the local community center where the staff wear Chicago Bears jerseys, and they delight in the water's
    rhythm while his parents hope the early exposure will nurture a lifelong love for aquatic sports.
  arts: John Cormier, while still swaddled, is serenaded daily with Debussy's Clair de Lune and folk lullabies, and they respond by tracking the moving mobile with bright eyes, making them an early connoisseur
    of ambient music and hinting at a future devotion to impressionist art.
  travel: John Cormier, after his first month, joined his family on a weekend road trip to the Great Lakes shoreline where they explored a lighthouse museum and tasted local cherry pie, and they already
    show a curiosity for new horizons that his parents plan to nurture with future family vacations to places like Kyoto and Patagonia.
  culinary: John Cormier, currently on a schedule of breastmilk and occasional avocado puree, displays a particular preference for the buttery texture of ripe avocados and the subtle sweetness of carrot
    mash, and they often wiggle happily when the spoon reaches the rim of the bowl.
  core: John Cormier, a newborn with an uncanny fascination for swirling patterns, a habit of fussing over bright lights, and an early tendency to drop pacifiers whenever a new sound plays, already embodies
    a blend of imaginative curiosity and compassionate calm that they will carry forward.
