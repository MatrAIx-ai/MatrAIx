  career_goals: At 65, Edwin aims to transition from full‑time research to a part‑time consulting role with regional labs in the Tri‑Cities, offering his expertise in mathematical modeling for environmental
    and agricultural projects. He is passionate about mentoring the next generation of Mexican‑American scientists, planning to expand his volunteer tutoring program at the local community center and develop
    a scholarship pipeline for underrepresented students. He also dreams of authoring a popular‑science book that intertwines mathematics with visual art, showcasing how patterns in nature and culture intersect.
    Ultimately, Edwin hopes to leave a legacy of collaborative, compassionate knowledge sharing while maintaining the flexibility to pursue personal artistic projects and family time.
