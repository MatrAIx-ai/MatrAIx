personas:
  professional: Edwin Teran, a senior mathematician transitioning to part‑time environmental consulting, merges deep expertise in differential equations, stochastic processes, and numerical analysis with
    a painter’s eye for patterns, delivering data‑driven solutions to regional labs while mentoring underrepresented students through bilingual curriculum workshops; they approach each model as both a puzzle
    and a canvas.
  sports: Edwin Teran enjoys seasonal hiking in the Columbia River Gorge with the local Columbia River Hiking Club, occasionally joins a weekend cycling group, and follows the Seattle Seahawks, Seattle
    Sounders FC, and the Seattle Kraken with enthusiastic, albeit relaxed, loyalty, often attending games when the schedule fits their garden duties.
  arts: Edwin Teran channels a painter’s curiosity into abstract canvases echoing the bright motifs of his childhood folk celebrations, strums the guitar in a small traditional folk ensemble for community
    festivals, finds inspiration from artists like Georgia O’Keeffe and Jackson Pollock, and unwinds with the music of classic Latin guitarists and John Coltrane while devouring works by Octavio Paz and
    contemporary Latin American novelists; they view each brushstroke as a mathematical expression of rhythm.
  travel: Edwin Teran prefers loosely planned road trips that blend nature and cultural stops, having trekked the Oregon Coast, explored the San Juan Islands, immersed in the artistic community of Taos,
    and dreaming of strolling through the vineyards of Tuscany and the historic streets of Granada; they often let the next sunrise decide the next destination.
  culinary: Edwin Teran delights in cooking heritage dishes such as tamales, chiles rellenos, and mole, skillfully using corn masa, poblano peppers, and fresh cilantro, while also experimenting with fusion
    creations like a quinoa‑based taco bowl that marries traditional flavors with modern health trends; they rarely miss a chance to pair a fresh garden harvest with a splash of spice.
  core: Edwin Teran, a mathematically rigorous yet art‑infused retiree, constantly balances disciplined modeling with spontaneous brushstrokes, often forgetting to pay a bill but never missing a garden
    watering.
background:
  cultural: Edwin was raised in a bilingual Mexican household, where Spanish was spoken at home and Mexican customs—such as Día de los Muertos, posadas, and family gatherings centered around food—were integral
    to his upbringing. His parents immigrated to the United States in the 1960s, instilling values of hard work, mutual aid, and respect for community. After moving to Washington state, Edwin blended his
    heritage with the Pacific Northwest’s outdoor lifestyle, participating in local festivals that celebrate both Mexican culture and regional arts. He remains active in the local Mexican community, volunteering
    as a mentor for youth programs and helping organize cultural events, while also embracing the diverse, inclusive ethos of his Kennewick neighborhood.
