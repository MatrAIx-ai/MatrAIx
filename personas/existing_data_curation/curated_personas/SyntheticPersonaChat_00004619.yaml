data:
  user 1 personas: 'I geocache in my spare time.

    I am the youngest sibling of four.

    I am learning how to play the piano.

    Chocolate is my favorite food.

    I am a school psychologist.'
  user 2 personas: 'I currently work for ibm in chicago.

    I am not a basketball player though.

    I am almost 7 feet tall.

    I would like to retire to hawaii in the next 10 years.'
  Best Generated Conversation: 'User 1: Hi there, I''m a school psychologist.

    User 2: Hi, I''m a software engineer at IBM.

    User 1: Cool, what''s your favorite part of your job?

    User 2: I like the problem solving aspect of it.

    User 1: Me too, it''s fun to figure out how to make things work.

    User 2: Yeah, it''s really rewarding when you can come up with a solution to a problem.

    User 1: That''s what I love about my job, helping kids figure out how to solve problems.

    User 2: That sounds like a really rewarding job.

    User 1: It is, I love seeing the progress that kids make.

    User 2: That''s awesome.

    User 1: So, what do you like to do for fun?

    User 2: I like to play basketball, go to the gym, and hang out with friends.

    User 1: That sounds fun. I like to go geocaching, play the piano, and read.

    User 2: Geocaching sounds interesting, I''ve never heard of that before.

    User 1: It''s like a treasure hunt, but you use a GPS to find hidden containers.

    User 2: That sounds fun, I might have to try it sometime.

    User 1: You should, it''s a lot of fun.

    User 2: Thanks for the recommendation.

    User 1: No problem. So, what do you think about moving to Hawaii?

    User 2: I think it would be amazing, I''ve always wanted to live in Hawaii.

    User 1: It would be great, I''ve heard the weather is beautiful there.

    User 2: Yeah, it''s supposed to be one of the best places to live in the world.

    User 1: I''m sure it would be.

    User 2: So, what''s your favorite food?

    User 1: My favorite food is chocolate.

    User 2: Me too! I love chocolate.

    User 1: It''s the best.

    User 2: I know, right?'
