  hobbies: '[''Surfing'', ''Hula dancing'', ''Karaoke'', ''Cooking Hawaiian‑Asian fusion dishes'', ''Hiking the West Maui mountains'', ''Yoga and meditation'', ''Volunteering at community festivals'', ''Attending
    local cultural events (Lei Day, Maui Film Festival)'', ''Mandarin language meet‑ups and calligraphy'', ''Photography of island landscapes'']'
  career_goals: Anchi aims to transition from her current secretarial role to a supervisory position such as Office Manager within the next two to three years. She plans to complete a bachelor's degree
    in Business Administration and earn the Certified Administrative Professional (CAP) credential to deepen her strategic and leadership capabilities. Long‑term, she envisions leading a team that coordinates
    community‑focused events and tourism initiatives on Maui, leveraging her organizational precision, cultural fluency, and people‑oriented style to create harmonious, efficient workplaces. She also hopes
    to mentor junior staff, promote inclusive office cultures, and eventually explore a role in community outreach or nonprofit program coordination.
