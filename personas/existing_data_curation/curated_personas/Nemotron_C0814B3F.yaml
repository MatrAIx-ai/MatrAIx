personas:
  professional: Elizabeth Composto, an industrial engineer turned safety consultant, blends rigorous process optimization and OSHA expertise with a heartfelt commitment to mental-wellbeing, leading cross-functional
    teams and mentoring younger engineers while championing data-driven safety cultures because they believe safety must nurture both body and mind.
  sports: Elizabeth Composto, an avid hiker with the Spokane Trailblazers Hiking Group and a regular at the Riverfront Aquatic Center's water-aerobics class, also follows the Spokane Indians minor-league
    baseball team and the Washington Huskies football squad, using weekend treks and gentle cardio to stay fit while balancing her energetic social nature because they find physical activity a crucial outlet
    for stress relief.
  arts: Elizabeth Composto, a theater enthusiast who regularly seats herself at the Spokane Civic Theatre to watch productions of August Wilson and Arthur Miller, fills her evenings with folk classics by
    Joan Baez and occasional visits to the Northwest Museum of Art to admire works by Thomas Hart Benton, while knitting scarves and crafting wooden bowls as her own artistic outlets because they cherish
    creative expression as both personal fulfillment and community connection.
  travel: Elizabeth Composto, who favors nature-focused trips such as a week-long trek through Banff National Park and a scenic drive along Oregon's Columbia River Gorge, also dreams of exploring the historic
    streets of Rome and the vineyards of Tuscany, planning her journeys with detailed itineraries to ensure comfort, affordability, and the opportunity to share experiences with her close-knit book club
    friends because they view travel as a means to broaden perspective and deepen relationships.
  culinary: Elizabeth Composto, a confident home cook who delights in preparing cedar-plank salmon with fresh dill, quinoa-beet salads tossed with garden-grown rosemary and lavender, and hearty lentil soups
    seasoned with sage, while occasionally treating herself to a night of upscale dining at Spokane's River Park Grill for a slice of mushroom risotto because they believe nourishing food fuels both body
    and spirit.
  core: Elizabeth Composto, a seasoned safety engineer turned community mentor, balances a meticulous, data-driven mind with a restless curiosity and occasional bouts of anxiety, channeling her energy into
    hiking, theater, and crafting while striving to embed mental-health awareness into workplace safety because they see safety as a holistic practice.
background:
  cultural: Elizabeth was raised in Spokane in a family of Italian descent. Her grandparents immigrated to the Pacific Northwest after World War II, and she grew up with a blend of American Midwestern values
    and an appreciation for Italian traditions, such as family gatherings, cooking, and a strong work ethic. The multicultural environment of Spokane, including the presence of Native American heritage
    and a growing arts scene, has broadened her perspective and fostered a respect for diverse cultures. She identifies as a practicing Catholic, which shapes some of her community involvement, and she
    cherishes the close‑knit family ties that encourage both compassion and resilience.
attributes:
  skills: '[''Process Optimization'', ''Risk Assessment'', ''Ergonomic Design'', ''Lean Manufacturing'', ''OSHA Regulatory Compliance'', ''Incident Investigation'', ''Data Analysis'', ''Root Cause Analysis'',
