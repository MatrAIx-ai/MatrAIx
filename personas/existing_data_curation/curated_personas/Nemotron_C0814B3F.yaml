  hobbies: '[''Hiking'', ''Group Yoga'', ''Water Aerobics'', ''Gardening'', ''Book Club'', ''Community Theater'', ''Volunteer Safety Workshops'', ''Knitting'', ''Woodworking'']'
  career_goals: As she approaches the latter stage of her career, Elizabeth aims to leave a lasting legacy by shaping a culture of safety that values both physical and psychological well‑being. She plans
    to mentor emerging engineers, develop a regional safety‑training consortium for small businesses, and publish a handbook on integrating mental‑health considerations into occupational safety. Over the
    next five years she hopes to achieve Certified Safety Professional (CSP) accreditation, deliver keynote presentations at national safety conferences, and transition to a consulting role that allows
    her to work on high‑impact projects while maintaining a flexible schedule for family and community involvement.
