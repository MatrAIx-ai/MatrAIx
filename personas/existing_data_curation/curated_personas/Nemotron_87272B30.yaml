personas:
  professional: Thanhxuan Derige is a seasoned operations leader with over 30 years of experience in strategic planning, budget management, and cross‑functional project coordination, leveraging advanced
    Excel modeling and CRM/ERP expertise while channeling their sociable, talkative nature into mentorship and inclusive culture building as they pursue a senior executive role.
  sports: Thanhxuan Derige enjoys early‑morning walks and trail runs along the Michigan lakeshore, participates in a local senior badminton club, cheers on the Detroit Lions in football season and the Detroit
    Red Wings in hockey, and joins a community gardening group that doubles as a low‑impact cardio workout.
  arts: Thanhxuan Derige regularly attends jazz nights featuring Wynton Marsalis and world‑music performances by Anoushka Shankar, engages in a historical fiction book club that debates Hilary Mantel’s
    works, and finds inspiration for their culinary storytelling in the lyrical paintings of contemporary artist Bui Xuan Phong.
  travel: Thanhxuan Derige plans vacations around cultural immersion, having explored the historic streets of Old Quebec and the scenic coast of Hokkaido, while they study French to prepare for a future
    culinary pilgrimage to Paris and Provence, favoring budget‑friendly road trips that include stops at national parks like the Badlands.
  culinary: Thanhxuan Derige delights in crafting aromatic pho broth with star anise, ginger, and fish sauce, perfecting Thai green curry with kaffir lime leaves and coconut milk, and regularly grows lemongrass,
    cilantro, and chilies in their backyard garden to ensure fresh flavors in every home‑cooked meal.
  core: Thanhxuan Derige blends analytical rigor with heartfelt hospitality, turning spreadsheets into social calendars and kitchen experiments into community celebrations, all while balancing a talkative,
    inclusive spirit with a pragmatic drive for efficiency.
background:
  cultural: Thanhxuan's parents emigrated from Vietnam to the United States in the late 1970s, settling in the Detroit metropolitan area. Growing up in a bilingual household, she retained fluency in Vietnamese
    while navigating American schooling. Her upbringing blended the Vietnamese values of family cohesion, respect for elders, and communal harmony with the American emphasis on individual achievement and
    openness. She celebrates Tet, Mid‑Autumn Festival, and other Southeast Asian traditions, and actively participates in the local Vietnamese community in Macomb County, contributing to cultural events,
    language preservation classes, and intergenerational mentorship. This bicultural perspective shapes her collaborative leadership style, her passion for harmony, and her commitment to bridging cultural
    gaps in the workplace.
