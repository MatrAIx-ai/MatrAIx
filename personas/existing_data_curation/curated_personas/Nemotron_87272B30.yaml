  career_goals: She aims to transition to a senior executive role such as Director of Operations within the next 3‑5 years, focusing on driving organizational efficiency and fostering a culture of inclusion.
    She also aspires to mentor the next generation of leaders, develop a mentorship program within her company, and eventually consult for small businesses in the Asian‑American community, helping them
    navigate growth while preserving cultural values.
