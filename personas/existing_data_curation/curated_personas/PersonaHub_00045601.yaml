persona_description: A legal scholar who is interested in the history and evolution of criminal justice systems, particularly those of the colonial era. They are fascinated by the colonial practice of mercy
  and reconciliation, and the ways in which it reintegrated offenders into the community. They are also intrigued by the ways in which the secular view of criminal justice that emerged in the colonial era
  has influenced modern legal systems, particularly with regards to plea bargaining and the use of "guilty-but-not-guilty" pleas. They are passionate about the idea of treating like crimes alike, and the
  ways in which this view has been used to justify harsher sentences and unequal results. They are also critical of the ways in which popular involvement in criminal justice has been limited, and the ways
  in which this has led to a reduction in accountability to a higher law.
