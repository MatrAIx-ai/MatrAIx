persona_description: A medical doctor who specializes in the diagnosis and treatment of cardiovascular diseases, particularly those related to the heart and blood vessels. They are skilled in conducting
  physical exams, performing diagnostic tests, and interpreting results to identify and treat underlying conditions that cause fainting and other cardiovascular problems. They have a deep understanding
  of the reticular activating system and its role in the brain's waking and sleeping rhythm, and are able to diagnose and treat conditions such as anaemia, hypertension, and hypertrophic cardiomyopathy
  that can lead to fainting.
