personas:
  professional: Dany Garcia, a teenage aspiring automotive technician, combines hands‑on mechanical skill with meticulous organization, applying their methodical mindset and bilingual communication to excel
    in community car‑maintenance workshops and plan a future apprenticeship.
  sports: Dany Garcia, who plays midfield for the Edmond United Youth Soccer club, routinely watches Oklahoma City Thunder games for basketball strategy insights, supports the Kansas City Chiefs during
    football season, and balances team practice with disciplined personal workouts at the local community center, reflecting their structured approach to fitness.
  arts: Dany Garcia, an avid listener of regional Mexican legends like Los Tigres del Norte and modern hits from Banda El Recodo, channels that rhythmic precision into assembling intricate model car kits
    and frequently attends local Dia de los Muertos art fairs, where they appreciate both traditional altars and contemporary mural paintings.
  travel: Dany Garcia, who has taken weekend road trips to Austin, Texas for live music festivals and explored the Henry Ford Museum in Detroit during a school field trip, now dreams of a future drive‑through
    tour of Mexico City’s historic markets to taste authentic street foods and study classic car culture, but they balance this wanderlust with a tightly budgeted schedule and family responsibilities.
  culinary: Dany Garcia, who proudly prepares tacos al pastor using achiote‑marinated pork, fresh pineapple, handmade corn tortillas, cilantro, and a squeeze of lime, also masters a spicy chipotle salsa
    for their grilled cheese experiments, often sharing these dishes with family during Dia de los Muertos celebrations.
  core: Dany Garcia blends a love for order with a competitive gaming streak, meticulously plans every task yet frequently burns the midnight oil on FIFA matches, making them a disciplined dreamer who never
    skips a spreadsheet nor a family celebration.
background:
  cultural: Dany's Mexican heritage is a core part of his identity. Raised in a bilingual household, he speaks Spanish with his parents and grandparents while using English at school and in the broader
    Edmond community. Family gatherings often feature celebrations of Dia de los Muertos and Cinco de Mayo, where he helps prepare traditional foods and music. Living in Edmond, OK, he blends his cultural
    practices with Midwestern influences, participating in local festivals and community service projects. This dual cultural immersion shapes his values of family responsibility, respect for tradition,
    and adaptability to his surrounding environment.
attributes:
  skills: '[''Basic automotive maintenance'', ''Mechanical troubleshooting'', ''Budget management'', ''Time management'', ''Bilingual communication (Spanish/English)'', ''Basic computer literacy (email,
