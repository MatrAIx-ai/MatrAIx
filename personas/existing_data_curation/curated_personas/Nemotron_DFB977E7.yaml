  hobbies: '[''Competitive video gaming (FIFA, Call of Duty)'', ''Soccer (youth league)'', ''Model car building'', ''Puzzle solving (jigsaw, Sudoku)'', ''Listening to regional Mexican music'', ''Cooking
    traditional Mexican dishes'', ''Participating in community cultural events'']'
  career_goals: Dany aims to earn his GED within the next year and enroll in a vocational program for automotive technology at a community college. He sees himself working as a certified automotive technician,
    valuing the clear structure of apprenticeships and the opportunity to advance through measurable skill milestones. In the longer term, he aspires to open a small, family-run garage that can serve his
    local community, offering reliable service and a stable income to support his family. He also considers the possibility of joining the Oklahoma National Guard, attracted by the disciplined environment
    and benefits.
