personas:
  professional: Amada Diaz is a 19‑year‑old budding marketer with an associate’s degree in Business Administration, fluent bilingual communication, solid Excel and bookkeeping skills, and a knack for turning
    unstructured social‑media projects into modest brand‑building successes, thanks to her curiosity‑driven yet pragmatic approach and relaxed attitude toward rigid deadlines.
  sports: Amada Diaz enjoys casual soccer with the Rio Grande Valley FC youth club, follows the Dallas Cowboys and Houston Astros on TV, and maintains fitness by strolling along the Pharr riverfront and
    doing occasional yoga sessions at the community center, though her flexible schedule often leads to missed workouts.
  arts: Amada Diaz immerses herself in contemporary Mexican literature, devouring novels by Valeria Luiselli and Juan José Saer, captures riverfront scenes inspired by the composition of Dorothea Lange,
    and curates playlists featuring Vicente Fernández and newer norteño acts, while dabbling in digital art with Canva to create simple graphics for her blog.
  travel: Amada Diaz prefers low‑key, small‑group trips that blend cultural immersion with photo‑opportunities, having explored nearby San Antonio and a weekend in Monterrey, and she dreams of backpacking
    through Oaxaca’s markets and photographing Kyoto’s cherry‑blossom rivers, but her modest budget often postpones the larger adventures.
  culinary: Amada Diaz loves cooking regional dishes like tamales filled with pork and masa, hearty pozole broth seasoned with hominy and chilies, and she experiments with fresh cilantro, corn, and slow‑roasted
    chiles, boasting a home‑cooking skill level that is intermediate—confident enough to host small dinner gatherings but still prone to over‑spicing on impulse.
  core: Amada Diaz is a curious yet laid‑back 19‑year‑old who blends bilingual business savvy, a love for quiet creative pursuits, and a tendency to procrastinate on organization, resulting in a vibrant
    but sometimes scattered personal rhythm.
background:
  cultural: Amada comes from a Mexican‑American family rooted in the Rio Grande Valley, where Spanish is spoken at home and many traditions from her parents' hometown in central Mexico are celebrated. She
    grew up with a blend of Mexican cultural values—family closeness, respect for elders, and Catholic festivities like Día de los Muertos and Las Posadas—mixed with the Texan borderland’s bicultural vibe.
    Bilingualism is a natural part of her daily life, and she maintains strong ties to both the local Hispanic community and broader American society, often serving as a cultural bridge in her neighborhood.
attributes:
