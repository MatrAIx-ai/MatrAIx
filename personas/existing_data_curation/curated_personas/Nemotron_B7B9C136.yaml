  hobbies: '["Reading contemporary Mexican literature", "Cooking traditional Mexican dishes", "Photography (landscape & street)", "Journaling", "Digital art and graphic design", "Listening to regional Mexican
    music", "Participating in small book clubs", "Volunteering at local community center"]'
  career_goals: Amada aims to continue her education by pursuing a bachelor’s degree in Marketing or Business Management, with the long‑term goal of launching a small, community‑focused online boutique
    that blends Mexican cultural designs with contemporary fashion. She seeks a career path that balances her curiosity for new digital tools with the practical need for a flexible schedule, allowing her
    to remain close to family and her local community. In the short term, she plans to gain hands‑on experience through internships or part‑time roles in community outreach or e‑commerce, where she can
    apply her bilingual skills and collaborative yet assertive style.
