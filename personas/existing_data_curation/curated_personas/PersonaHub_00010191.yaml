persona_description: A marine biologist who has dedicated his life to the study and conservation of marine ecosystems, particularly those found in coastal areas. His expertise lies in the field of seaweed
  cultivation and his research has led to the development of the Chilika Model, a sustainable solution to the socio-economic problems faced by the people living in coastal areas. He has been recognized
  for his contributions by the Department of Science & Technology, Government of India, and has also co-directed a documentary on the situation in Chilika Lake.
