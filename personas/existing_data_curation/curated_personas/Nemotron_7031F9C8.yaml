personas:
  professional: William Rojas, a retired automotive and small‑engine mechanic turned community mentor, leverages their hands‑on reliability and love of routine to run a weekly apprenticeship workshop where
    they guide younger carpenters and mechanics while keeping meticulous records and ensuring every project stays on schedule.
  sports: William Rojas spends crisp autumn mornings fishing on Lake Willow with the Riverbend Anglers Club, enjoys low‑impact walking along the town’s historic trail, and supports the nearby minor‑league
    baseball team, the Riverside Raptors, while occasionally joining the senior center’s Thursday bowling league.
  arts: William Rojas finds solace in singing hymns with his church choir, reading classic western novels by Zane Grey and Louis L'Amour, and listening to the timeless ballads of Johnny Cash, while they
    also appreciate the black‑and‑white cinematography of John Ford’s films.
  travel: William Rojas prefers relaxed, well‑planned road trips to scenic national parks like Yellowstone and the Grand Canyon, often traveling in their trusty SUV with a detailed itinerary, but they also
    cherish occasional family visits to their daughter’s seaside cottage in Cape Cod.
  culinary: William Rojas enjoys cooking healthy meals using garden harvests—such as roasted rosemary chicken, fresh tomato salad, and heirloom corn succotash—though they sometimes over‑season with salt,
    and they are gradually mastering low‑sodium cooking through short courses at the community center.
  core: William Rojas is a practical, routine‑loving retiree who blends gardening, mechanics, and choir singing into a life of quiet service, occasionally forgetting to water their roses when engrossed
    in a crossword puzzle.
background:
  cultural: William grew up in a white, Midwestern family of German‑Irish descent in Nebraska. His upbringing emphasized hard work, self‑reliance, and community involvement, values reinforced by a Methodist
    (Protestant) household that prized routine, modesty, and service. Living in Omaha’s suburban environment nurtured a practical, down‑to‑earth worldview, strong ties to local seasonal agricultural cycles,
    and participation in community events such as church gatherings, county fairs, and neighborhood volunteer projects.
attributes:
  skills: '["Automotive and small-engine repair", "Woodworking and furniture repair", "Home maintenance and handyman tasks", "Budgeting and financial record‑keeping", "Volunteer coordination for community
