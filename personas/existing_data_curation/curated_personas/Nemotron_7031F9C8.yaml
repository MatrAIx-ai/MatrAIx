  hobbies: '["Gardening (vegetables and roses)", "Woodworking (birdhouses, small furniture)", "Fishing", "Church attendance and choir participation", "Bridge and card games", "Reading historical nonfiction
    and western novels", "Crossword puzzles"]'
  career_goals: In retirement, William aims to remain a dependable pillar for his wife and family while sharing his practical knowledge with younger relatives. He aspires to mentor youth through a local
    apprenticeship program, keep his garden thriving, and complete short courses on healthy cooking and senior wellness. He also wishes to document his family’s genealogy and pass on stories to his grandchildren,
    ensuring his legacy of service and craftsmanship endures.
