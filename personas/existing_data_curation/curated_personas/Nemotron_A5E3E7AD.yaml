  hobbies: '[''Leading a book club'', ''Organizing neighborhood clean‑up events'', ''Stagehand for community theater'', ''Kayaking'', ''Sailing on Pensacola Bay'', ''Salsa and bachata dancing'', ''Cooking
    Italian‑Mexican fusion dishes'', ''Herb & vegetable gardening'', ''Attending live music festivals'', ''Exploring southern food fairs'']'
  career_goals: Virginia aims to step into a senior leadership role as Director of the Project Management Office within the next five years, where she can champion a hybrid agile‑waterfall framework that
    balances innovation with proven reliability. She plans to earn the PMP and Agile Certified Practitioner certifications, expand her influence by leading high‑visibility community development projects
    in the Gulf Coast region, and establish a mentorship program for emerging project managers. Ultimately, she envisions launching her own consulting practice focused on helping midsize firms in Florida
    adopt flexible, results‑driven project delivery models while promoting inclusive team cultures.
