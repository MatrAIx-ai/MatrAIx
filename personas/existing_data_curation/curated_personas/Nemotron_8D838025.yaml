  career_goals: Christopher aims to scale his current venture into a nationally recognized market leader by his early thirties, forging a corporate culture that fuses business rigor with artistic innovation.
    He aspires to become a thought leader in sustainable entrepreneurship, speaking at major industry conferences, publishing interdisciplinary strategy insights, and eventually launching a venture fund
    that backs founders at the intersection of technology, design, and social impact. In the long term he envisions taking his company public, using its platform to support community arts initiatives in
    Philadelphia, and mentoring the next generation of dynamic leaders.
