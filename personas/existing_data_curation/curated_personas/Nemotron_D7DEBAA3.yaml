  hobbies: '[''Gardening'', ''Vintage electronics restoration'', ''Book club'', ''Coastal walking'', ''Yoga'', ''Volunteer computer tutoring'', ''Cooking Cuban and Haitian dishes'', ''Jazz listening'']'
  career_goals: Jill aims to advance to a senior service specialist role, earning certifications such as CompTIA A+ and Certified ATM Service Technician. She plans to lead a regional maintenance program
    that reduces equipment downtime for banking clients, and to develop a mentorship pipeline for new technicians. Long‑term, she hopes to launch a boutique repair business focused on high‑security ATMs
    for community banks, while continuing to share her expertise through community workshops on basic computer skills for seniors.
