  career_goals: Erin aims to advance into a leadership role within early childhood education, such as a program director or curriculum specialist, where she can scale her arts‑focused pedagogy across a
    larger community. She plans to pursue a Master’s degree in Early Childhood Education or Special Education to deepen her expertise in inclusive teaching and developmental psychology. Long‑term, she dreams
    of founding a nonprofit after‑school and summer program in Syracuse that combines visual arts, storytelling, and STEM exploration, providing low‑income families with enriching experiences. She also
    hopes to present her innovative curriculum models at regional and national education conferences, contributing to the field’s broader conversation about creativity in early learning.
