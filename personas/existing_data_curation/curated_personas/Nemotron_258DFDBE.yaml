  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Book Club'', ''Volunteer Work at Food Bank'', ''Walking in Parks'', ''Live Country Music'', ''Cooking Tex-Mex and Barbecue'', ''Hosting Dinner
