  career_goals: Kwame aims to turn his self‑taught abilities into a stable freelance career that merges his passion for cars and art. In the next three years he plans to establish a modest mobile workshop
    offering custom car modifications and restoration services while simultaneously building a client base for commission‑based street‑art murals and digital illustrations. He hopes to secure recurring
    contracts with local businesses for branded artwork and to launch an online shop for limited‑edition prints and custom merchandise. Long‑term, Kwame envisions opening a community space in Detroit where
    he can mentor youth in both automotive skills and visual art, creating a creative hub that bridges technical craftsmanship with cultural expression. Achieving reliable income will also help him manage
    his anxiety and provide a sense of purpose for his family.
