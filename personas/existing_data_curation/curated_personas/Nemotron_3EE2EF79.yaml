personas:
  professional: An ambitious 31‑year‑old Detroit‑based freelance automotive artist named Kwame Dixon fuses self‑taught digital illustration with hands‑on engine repair, using meticulous project planning
    and concise client pitches to land custom car‑modification contracts and street‑art mural commissions while still allowing spontaneous creative bursts.
  sports: Kwame Dixon follows the Detroit Pistons and Tigers passionately, attends local pickup basketball games at the community center for cardio, and joins seasonal cycling clubs that explore abandoned
    industrial sites, using the physical activity as a grounding counter‑balance to their high‑intensity mental focus.
  arts: Kwame Dixon curates a vinyl collection featuring Miles Davis, J Dilla, and underground hip‑hop, draws inspiration from Basquiat, Banksy, and Detroit muralist Swoon, and regularly sketches graffiti‑style
    pieces while listening to soulful jazz, weaving philosophy and urban sociology into each visual narrative.
  travel: Kwame Dixon prefers weekend urban‑exploration trips, having photographed murals in Berlin’s East Side Gallery, and road‑tripping through Michigan’s Upper Peninsula for abandoned factories, while
    dreaming of a future art‑focused residency in Lisbon’s street‑art scene.
  culinary: Kwame Dixon enjoys cooking medium‑rare ribeye steaks, assembling Detroit‑style pizza with pepperoni, mozzarella, and a drizzle of hot honey, and indulging in classic coney dogs topped with chili,
    sliced onions, and cheese, though they often skip meal prep in favor of late‑night coffee and snacks during long studio sessions.
  core: Kwame Dixon is a solitary, anxiety‑prone yet fiercely curious freelance car‑artist who blends mechanics with murals, budgeting obsessively while occasionally neglecting self‑care in pursuit of creative
    mastery.
background:
  cultural: Kwame is an African‑American man raised in Detroit, a city celebrated for its musical legacy, automotive history, and vibrant street‑art culture. His first name, Kwame, reflects a conscious
    connection to his Ghanaian roots, and he often incorporates West African symbols and colors into his artwork. Growing up in a working‑class neighborhood, he experienced the dual realities of economic
    uncertainty and strong community bonds, shaping his resilience and critical view of institutions. Family traditions include church gatherings, soul‑food cooking, and storytelling, which inform his appreciation
    for rhythm, narrative, and collective memory. His marriage anchors him in Detroit’s contemporary Black middle‑class, while his partner’s shared love for music and cultural preservation deepens his commitment
    to safeguarding the city’s urban heritage through artistic expression.
