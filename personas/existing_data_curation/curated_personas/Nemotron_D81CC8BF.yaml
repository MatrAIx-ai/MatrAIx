  hobbies: '[''Digital photography'', ''Visiting contemporary art galleries'', ''Exploring street murals'', ''Reading science-fiction and philosophy'', ''Playing acoustic guitar'', ''Solving cryptographic
    and logic puzzles'', ''Hiking local trails'', ''Participating in capture-the-flag (CTF) competitions'', ''Attending small indie-music concerts'', ''Collecting vintage vinyl records'']'
  career_goals: David aims to advance to a senior security analyst role within the next three years, focusing on threat hunting and security architecture. He plans to earn the CISSP and Certified Ethical
    Hacker (CEH) certifications, deepen his expertise in cloud security, and eventually launch his own boutique consultancy that helps small businesses integrate robust security practices with user‑friendly,
    visually engaging training. He also hopes to improve his time‑management skills to meet deadlines more consistently.
