  career_goals: Ricardo aims to earn a Certified Nursing Assistant (CNA) credential within the next year and pursue an associate degree in health sciences to deepen his clinical knowledge. He aspires to
    transition into a supervisory role where he can mentor new aides, implement evidence‑based care improvements, and eventually launch a boutique home‑care agency that blends personalized service with
    innovative health‑tech tools. His ambition balances competitive drive with a practical plan for incremental advancement.
