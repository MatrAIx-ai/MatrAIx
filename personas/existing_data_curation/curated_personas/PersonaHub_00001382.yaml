persona_description: A primatologist who studies the evolution of pair bonds in owl monkeys and the implications for human monogamy. She is interested in understanding the factors that contribute to the
  success of pair bonds in these primates and how these insights may apply to human monogamy. She is also interested in exploring the evolutionary history of pair bonds in primates and how it may have influenced
  the emergence of monogamy in humans.
