  career_goals: Rosemary plans to complete her GED and pursue further education in community health, social work, or hospitality management. Her long‑term ambition is to become a community outreach coordinator
    or cultural event planner, using her people‑skills to design inclusive festivals and support youth services in Assumption Parish. She also dreams of opening a small café that showcases traditional Cajun
    cuisine while providing a welcoming space for local teens and families.
