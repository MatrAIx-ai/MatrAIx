personas:
  professional: Rosemary Soler, a 16-year-old student with a talent for rallying peers, channels their natural charisma and knack for event planning into coordinating church youth gatherings and local Zydeco
    dance nights, blending a curiosity-driven willingness to try new formats with pragmatic logistics while often letting spontaneity outweigh strict schedules.
  sports: Rosemary Soler, a high-school sophomore who avidly follows the New Orleans Saints (NFL) and the New Orleans Pelicans (NBA), spends weekends kayaking the local bayous with the junior paddling club,
    plays on the school's co-ed softball team, and participates in informal community fishing trips, balancing their love for outdoor adventure with a laid-back approach to organized training.
  arts: Rosemary Soler, a budding accordion player and Zydeco enthusiast, draws inspiration from legends such as Clifton Chenier and the band BeauSoleil, crafts handmade paper-mâché masks for Mardi Gras
    celebrations, and curates playlists that blend traditional regional rhythms with contemporary folk artists like Rhiannon Giddens, channeling their talkative energy into lively performances at community
    events.
  travel: Rosemary Soler dreams of weekend road trips that weave through the bayou trails of their hometown, day-long outings to the historic French Quarter of New Orleans, beach escapes to Gulf Shores,
    and a future cultural immersion visit to Quebec City to practice fluent French snippets, preferring spontaneous, friend-filled itineraries while keeping an eye on limited teen travel funds.
  culinary: Rosemary Soler, a self-taught teen chef, experiments with Louisiana-style gumbo, jambalaya, and etouffee using Andouille sausage, shrimp, a dark roux, and okra, delights in perfecting a signature
    hot sauce blend, yet often over-seasons or burns the roux in their eagerness, and they love winding down with a warm beignet and chicory coffee from the local café.
  core: Rosemary Soler blends contagious sociability, a love for spontaneous community gatherings, and a culinary passion into a teenage vision of a welcoming café that feeds both bodies and bonds, and
    they radiate optimism in every interaction.
background:
  cultural: Rosemary was raised in Pierre Part, a tight‑knit Cajun community in Assumption Parish, Louisiana. Though identified as white, her family roots trace back to French‑Acadian settlers, and she
    grew up immersed in Catholic traditions, Cajun French language snippets, and the region’s vibrant music and cuisine. Community gatherings, Mardi Gras celebrations, and a strong emphasis on hospitality
    are central to her worldview.
