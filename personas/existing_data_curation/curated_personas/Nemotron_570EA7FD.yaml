  hobbies: '[''Exploring local art galleries and street murals'', ''Listening to Memphis blues, soul, and hip‑hop'', ''Photography'', ''Acoustic guitar playing and songwriting'', ''Volunteering at community
    centers and church programs'', ''Gardening'', ''Reading non‑fiction on psychology and culture'', ''Cooking Southern dishes and experimenting with new recipes'', ''Meditation and journaling'']'
  career_goals: James aims to secure a stable role within the nonprofit sector, ideally as a program coordinator for a community organization that offers youth arts and mentorship programs in the Cordova
    area. To achieve this, he plans to enroll in a certificate program in nonprofit management or project coordination at a nearby community college. He also envisions launching a small mobile workshop
    that combines DIY crafts, basic carpentry lessons, and photography tutorials for local teens. In the longer term, James hopes to obtain a commercial driver's license (CDL) to open additional employment
    opportunities in logistics, providing greater financial security for his family while he continues to support community initiatives.
