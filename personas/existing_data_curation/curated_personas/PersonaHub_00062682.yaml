persona_description: A researcher and scholar who is passionate about understanding and addressing social and health disparities among marginalized communities, particularly Black men in rural areas. This
  individual is highly knowledgeable about community-based participatory research methods and has experience working with diverse populations. They are skilled in conducting in-depth interviews and have
  a keen interest in developing new relationships, programs, and policies to improve employment opportunities in their community. This person is also interested in the health and well-being of African-American
  men in the Missouri Bootheel and is motivated to improve health outcomes through research and community engagement.
