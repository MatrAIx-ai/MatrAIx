  hobbies: '[''sketching'', ''digital painting'', ''listening to jazz and hip‑hop'', ''keyboard playing'', ''mobile beat making'', ''hiking in local woods'', ''reading science‑fiction'', ''creative writing
    (short stories & poetry)'', ''attending open‑mic events'', ''visiting art galleries/museums'']'
  career_goals: Samuel aspires to turn his artistic and technical interests into a sustainable career as a multimedia creator. He plans to earn a GED within the next year, build a polished portfolio of
    digital illustrations, interactive web projects, and original music, and seek an apprenticeship or internship at a local design studio or independent game developer. Ultimately, he hopes to work as
    a freelance visual artist and UI/UX designer, creating compelling graphics and user experiences for games, apps, or social‑impact campaigns, while also mentoring younger teens in his community about
    creative self‑expression and coping with stress.
