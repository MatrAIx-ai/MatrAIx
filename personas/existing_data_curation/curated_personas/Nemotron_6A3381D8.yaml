personas:
  professional: Samuel Griggs, a 16‑year‑old budding multimedia creator, blends hand‑drawing, free‑software illustration, and beginner‑level coding to craft interactive web sketches and lo‑fi beats, channeling
    their curiosity and competitive drive into polished portfolio pieces while meticulously tracking project notes.
  sports: Samuel Griggs enjoys weekend hikes with the local adventure club, plays pickup basketball with friends, follows the Golden State Warriors with fervor, and trains for the school’s cross‑country
    team each fall, balancing their solitary nature with occasional group runs.
  arts: Samuel Griggs draws inspiration from the brushwork of Frida Kahlo, the improvisational jazz of Miles Davis, the lyrical flow of Kendrick Lamar, and the animation of Studio Ghibli, regularly attending
    community open‑mic nights and local gallery shows to feed their eclectic artistic palate.
  travel: Samuel Griggs favors low‑key nature retreats, having trekked the Appalachian Trail sections near home, and they dream of exploring Kyoto’s temples for anime and culinary inspiration, while they
    plan a budget‑friendly road trip to New Orleans to experience its vibrant music scene.
  culinary: Samuel Griggs prefers simple yet inventive meals, often whipping up avocado toast with smoked salmon, experimenting with ramen broth flavored by miso and sriracha, and enjoys the occasional
    homemade pizza topped with fresh basil and mozzarella, though they sometimes forget to refrigerate leftovers.
  core: Samuel Griggs is a hyper‑curious teen who transforms screen time into art and code, worries about perfection, hoards sketch notebooks, and they can’t resist a midnight gaming prototype binge.
background:
  cultural: Samuel is a Black teenager raised in Andover, a small town in Sussex County, New Jersey. His family’s roots trace back to the African‑American diaspora of the Mid‑Atlantic, with grandparents
    who migrated from the South during the Great Migration and a mother who grew up in a close‑knit church community. Local cultural influences include the region’s modest Black church gatherings, community
    festivals that celebrate African‑American heritage, and a growing local hip‑hop scene that melds urban beats with the rural backdrop of the Pine Barrens. Samuel’s cultural identity is shaped by family
    stories of resilience, the modest but supportive neighborhood church, and the diverse artistic voices he discovers through school‑district programs and community art workshops.
attributes:
