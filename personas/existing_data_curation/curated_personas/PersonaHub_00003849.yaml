persona_description: A geologist who is interested in the geological history of Nova Scotia, particularly in the Bluestone Formation and its associated turbidites. They are familiar with the geological
  map of Nova Scotia, the Bluestone Formation, and the characteristics of the turbidites found in Point Pleasant Park. They have a strong interest in the study of sedimentary rocks and the processes that
  led to the formation of these rocks, including the transport of sediment by rivers and the erosion of the Gondwana landmass. They are also interested in the reclassification of the Bluestone Formation
  into the Bluestone Formation, Cunard Formation, and Beaverbank Formation.
