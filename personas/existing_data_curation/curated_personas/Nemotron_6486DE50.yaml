  career_goals: Brenda aspires to become a concept artist and independent game designer, hoping to create immersive fantasy worlds that blend her love of storytelling, mythology, and visual art. She also
    dreams of writing and illustrating her own graphic novels, and ultimately hopes to work at a studio where she can merge narrative and interactive design. In the longer term, she envisions leading her
    own creative studio that values experimental ideas and solitary creative work.
