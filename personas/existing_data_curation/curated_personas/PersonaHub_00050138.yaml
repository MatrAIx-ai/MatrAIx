persona_description: An environmental scientist with expertise in ecological risk assessments, hazardous materials and waste management, background chemicals at cleanup sites, and natural resource injuries
  during cleanup and restoration. This person has experience in working with the Department of Energy (DOE) and Department of Defense (DoD) facilities to design and implement site-specific ecological risk
  assessments, as well as in developing policy and guidance related to these areas. They have also provided assistance in the development of guidance for biomonitoring and monitoring plans for contaminated
  sites. Additionally, they have expertise in environmental restoration training for the Navy and other DoD services, including courses on ecological risk assessment, human health risk assessment, environmental
  background analysis, environmental geographic information systems/geostatistics, and naval environmental restoration program.
