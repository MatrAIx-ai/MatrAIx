  career_goals: At 56, Wray aims to transition into a senior executive role such as Chief Information Officer, where he can shape enterprise‑wide digital transformation and strengthen cybersecurity resilience.
    He is driven to champion data‑driven decision making and sustainable IT practices that balance innovation with practical risk management. A key ambition is to establish a formal mentorship program that
    nurtures the next generation of IT professionals, helping them navigate stress and career growth. Over the next five years, he plans to lead a flagship cloud‑migration project for his organization,
    publish thought‑leadership pieces on pragmatic AI adoption, and gradually shift toward advisory consulting to share his accumulated expertise while preserving a healthier work‑life balance.
