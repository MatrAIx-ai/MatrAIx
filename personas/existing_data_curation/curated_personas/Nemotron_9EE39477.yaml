personas:
  professional: Jeanne Bankston, a 9‑year‑old budding comic‑strip creator, channels boundless curiosity into vivid doodles and impromptu storyboards during recess, yet frequently abandons projects when
    a newer idea sparks their imagination.
  sports: Jeanne Bankston darts onto the local Tigers U‑8 soccer field with fierce competitiveness, rides a mountain bike along country trails after practice, and cheers for the Chicago Cubs while eyeing
    the next sports camp to sharpen their stamina.
  arts: Jeanne Bankston blends watercolor splash techniques with LEGO architecture, draws inspiration from Studio Ghibli’s My Neighbour Totoro and the vibrant comics of Dav Pilkey, and bursts into pop‑song
    dance routines to Ariana Grande hits during family gatherings.
  travel: Jeanne Bankston dreams of exploring the Redwood forests of California after their weekend bike rides, has already visited the nearby state museum, and longs to journey to Tokyo’s anime districts
    and Disney World for immersive adventure.
  culinary: Jeanne Bankston loves handheld pizza slices, buttery popcorn, and strawberry‑banana smoothies, proudly 'cooks' simple grilled cheese with a plastic spatula, and experiments with bright watercolor‑inspired
    food plating for play‑dinner nights.
  core: Jeanne Bankston is an imaginative, high‑energy 9‑year‑old who transforms curiosity into comic art, competes fiercely on the soccer field, feels emotions in vivid waves, and occasionally trades organization
    for spontaneous creativity.
background:
  cultural: Jeanne grew up in Versailles, a small town in Ripley County, Indiana, where Midwestern values of community, modesty, and hard work are common. Her family participates in local church gatherings,
    county fairs, and seasonal farm festivals, exposing her to traditional crafts, folk music, and community theater. While rooted in these rural traditions, Jeanne also accesses a wide range of digital
    media and art resources through the internet, blending classic Midwest small‑town life with contemporary creative influences.
attributes:
  skills: '[''quick sketching'', ''creative storytelling'', ''improvisational group play'', ''basic reading and writing'', ''basic tablet drawing apps'', ''soccer coordination'', ''social facilitation'']'
  hobbies: '[''drawing and sketching'', ''watercolor painting'', ''comic‑strip creation'', ''LEGO building'', ''reading fantasy books'', ''playing soccer'', ''bike riding'', ''nature exploration'', ''dance
    and performance'', ''watching animated films'']'
  career_goals: Jeanne dreams of turning her love for drawing into a career as a comic‑book artist or animator, imagining her own characters coming to life on screen. She also hopes to be a star player
    on her school’s soccer team, leading it to a championship. In the longer term, she imagines creating a community art club where kids can experiment with painting, storytelling, and performance, merging
    her artistic drive with her desire to guide peers.
