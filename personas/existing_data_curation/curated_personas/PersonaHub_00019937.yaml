persona_description: A scientist who is part of a team that has reprogrammed the Catalina Sky Survey's near-Earth object telescopes to look for both asteroids and cosmic mergers. The team has built a sophisticated
  algorithm to analyze LIGO and Virgo data and help the Catalina Sky Survey determine what to look for. The scientist has experience in gravitational wave astronomy and has previously worked on similar
  projects. They are excited about the potential of the new approach and hope that as the survey continues to run, and as LIGO and Virgo identify new targets, the Catalina Sky Survey will observe the optical
  signal of a merger event responsible for a gravitational wave.
