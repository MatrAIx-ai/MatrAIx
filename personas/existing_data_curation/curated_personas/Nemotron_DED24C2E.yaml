  career_goals: Looking ahead, Samuel aims to transition his extensive volunteer experience into a formal role as a community program manager or nonprofit director, focusing on creating inclusive, health-oriented
    programs for families in Snohomish County. He plans to complete a bachelor's degree in nonprofit management within the next three years, while also establishing a local mentorship network that pairs
    experienced volunteers with younger community members. Ultimately, he aspires to foster a resilient, collaborative community where resources are shared and everyone feels supported.
