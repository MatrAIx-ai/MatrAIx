  hobbies: '[''Beach volleyball'', ''DIY home renovation'', ''Vlogging and video editing'', ''Competitive gaming (eSports)'', ''Live music concerts'', ''Community service (beach clean‑ups)'', ''Improvisational
    theater'', ''Travel photography'']'
  career_goals: Brennan aims to earn a degree in construction management or business administration and eventually launch his own boutique construction firm that specializes in sustainable, coastal‑friendly
    homes. In the short term, he wants to secure an apprenticeship with a reputable local contractor, obtain certifications such as OSHA and LEED, and build a portfolio of DIY projects to attract freelance
    work. He also envisions developing an online platform that showcases his DIY tutorials while connecting homeowners with vetted local builders, merging his love for community engagement, entrepreneurship,
    and practical problem‑solving.
