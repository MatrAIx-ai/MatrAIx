  hobbies: '["Woodworking", "Gardening", "Fishing", "Playing bridge", "Attending town hall meetings", "Reading historical biographies", "Listening to classic rock music", "Amateur radio", "Walking nature
    trails", "Hosting dinner parties"]'
  career_goals: Although retired, John aims to become a respected elder and mentor within his community. He plans to serve on the board of the local historical society and write a memoir that chronicles
    both his life and the transformation of Hampton Falls over the decades. He hopes to launch a small, hobby‑based woodworking venture to sell handcrafted furniture and decorative pieces, using his skills
    to generate supplemental income. John also aspires to lead a weekly discussion group for seniors, focusing on current events and civic engagement, and to run for a short term on the town council to
    influence local planning decisions. Managing his anxiety and emotional reactivity through counseling and mindfulness practices is a personal priority, as is staying physically active with regular walks
    in the nearby nature trails.
