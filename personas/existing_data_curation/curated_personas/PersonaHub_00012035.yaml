persona_description: A teacher of second language (L2) or mother tongue (MT) literacy who is interested in pedagogical issues related to teaching and learning. They are familiar with the concepts of acquisition
  and learning for learners, immersion and telling by teachers, and they are open to the idea of a continuum between these two terms. They are interested in the pedagogical activity of revealing and how
  it can be used to modulate the polarity between these two terms. They are interested in the use of examples of teaching phonemic awareness to 6-year-olds and strategies for directing older students' attention
  to larger forms of written language.
