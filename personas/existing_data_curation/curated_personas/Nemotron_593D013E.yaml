  career_goals: Jenie often talks about wanting to become a teacher or a veterinarian. She loves helping her friends learn new things and caring for stuffed animals, imagining a future in a bright, organized
    classroom or a friendly animal clinic. She also dreams of performing on stage as a dancer because she enjoys music and movement. Her aspirations reflect her preference for structured, predictable settings
    while valuing flexible, creative expression.
