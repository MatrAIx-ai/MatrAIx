personas:
  professional: Jenie Chang is a preschool classroom helper who delights in arranging story‑time books on the shelf in neat rows, loves the predictable routine of circle time, yet also joyfully leaps into
    the spontaneous group games that break the schedule, balancing a love of order with a natural sociability.
  sports: Jenie Chang waddles around the turf at the Tiny Tots Soccer League during fall, splashes through the toddler swim class at the local community pool every summer, eagerly dons a tiny jersey of
    the local baseball team the City Cubs for game day celebrations, and they delight in energetic tag games during recess, preferring fun movement over structured training.
  arts: Jenie Chang revels in drawing colorful crayons on paper like a mini‑Picasso, sings loudly to the catchy tunes of Baby Shark and The Wiggles on repeat, watches the animated adventures of Bluey and
    Peppa Pig with wide‑eyed fascination, and they proudly collect stickers of Disney's Elsa and Ariel, letting those characters shape their imaginative playtime.
  travel: Jenie Chang prefers short family car trips with a plush backpack of snacks, enjoys the sensory adventure of the local zoo where they can feed giraffes, looks forward to annual beach outings at
    Sandy Shores where they build sandcastles, and they dream of one day riding the magical rides at Disneyland, always reveling in vibrant colors and friendly characters.
  culinary: Jenie Chang loves buttery mac and cheese, crunchy chicken nuggets dipped in honey mustard, sweet strawberry slices, and they insist on sprinkling colorful sprinkles atop vanilla yogurt, though
    they are still mastering the art of stirring batter in a plastic bowl while giggling at the mess.
  core: Jenie Chang balances a love for predictable routines with spontaneous group fun, insisting on organizing toys while sprinting into impromptu dance circles, a quirky habit that makes every day both
    orderly and delightfully chaotic.
background:
  cultural: Jenie is raised in an East Asian (Chinese‑American) household in El Monte, California, a city with a vibrant Chinese and Taiwanese community. Her family blends traditional customs—celebrating
    Lunar New Year, preparing dim sum, speaking Mandarin at home, and emphasizing education—with the multicultural environment of Southern California. She attends a local preschool that encourages cultural
    awareness, participates in community festivals such as dragon‑dance parades, and enjoys both American and Chinese holidays, shaping a bicultural identity.
