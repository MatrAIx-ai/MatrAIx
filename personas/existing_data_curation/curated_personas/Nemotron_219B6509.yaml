personas:
  professional: Sean Perez, a retired handyman turned community mentor, leverages decades of hands‑on experience in home repair, automotive maintenance, and gardening to teach DIY workshops at the senior
    center, and they apply a pragmatic yet curious mindset while maintaining a competitive edge in demonstrating efficient solutions.
  sports: Sean Perez competes in the Greenfield Senior Bowling League, plays bridge at the senior center, regularly hikes with the Blue Ridge Trails club, and avidly follows the Milwaukee Brewers, often
    debating game stats over post‑game drinks.
  arts: Sean Perez spends evenings listening to classic rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd, attends occasional community theater productions featuring local actors, and collects
    vintage concert posters, which they proudly display in their garage workshop.
  travel: Sean Perez prefers road‑trip adventures in his restored 1970s Chevrolet, having driven the Pacific Coast Highway to soak in coastal vistas, trekked the Grand Canyon’s South Rim with his hiking
    group, and plans a future cross‑country tour to visit classic car museums in Detroit and Austin.
  culinary: Sean Perez frequently cooks garden‑fresh meals, favoring roasted beet and carrot salads drizzled with olive oil, grilled pork chops seasoned with smoked paprika, and classic homemade chili,
    and they relish occasional visits to the local diner for a well‑made cheeseburger.
  core: Sean Perez, a competitive yet pragmatic retired handyman, balances a love for classic cars, garden‑grown meals, and community bowling with a habit of over‑organizing tool inventories and occasional
    skepticism toward unfamiliar DIY advice.
background:
  cultural: Sean grew up in a working‑class white family in the Central Valley before moving to the Bay Area in his thirties. His upbringing emphasized self‑reliance, community ties, and a respect for practical
    trades, values that continue to shape his outlook. Living in San Jose’s multicultural environment, he has embraced the region’s diverse traditions—occasionally attending neighborhood festivals and learning
    basic Spanish phrases from neighbors—while maintaining the cultural norms of his Midwestern‑influenced heritage.
