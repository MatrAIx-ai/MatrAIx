  career_goals: Although retired from formal employment, Sean aims to channel his expertise into mentorship and community service. He plans to volunteer as a hands‑on instructor at the local senior center,
    teaching DIY home‑repair workshops. He also hopes to earn a basic certification in home safety (e.g., OSHA 10‑hour) to formalize his knowledge and eventually help organize a neighborhood tool‑lending
    library that encourages practical skill‑sharing among residents.
