  career_goals: He aims to re‑enter the workforce by earning a vocational certification in a skilled trade such as HVAC, electrical, or plumbing, leveraging his hands‑on experience and methodical approach.
    In the short term, he plans to take community‑college courses and complete an apprenticeship, while building a small portfolio of completed projects to market a freelance handyman service. Long‑term,
    he aspires to grow that business into a reputable local service provider, eventually hiring a crew and managing larger renovation contracts. He also envisions developing a side stream of remote tech
    support for home users, combining his practical curiosity with his computer troubleshooting abilities.
