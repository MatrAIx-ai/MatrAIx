persona_description: A professional planning and development practitioner who is responsible for making decisions and recommendations related to the use of land and development in local government areas.
  They work closely with local councils to ensure that development applications are properly assessed and that the needs of the community are met. They are highly knowledgeable about the planning and development
  processes and are skilled in making informed judgments based on a range of factors. They are aware of the challenges facing the planning industry, including the shortage of planners and the need for additional
  resources to support their work. They are committed to improving the workplace environment for planners and are open to new ideas and approaches to address the challenges facing the industry.
