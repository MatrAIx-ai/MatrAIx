  hobbies: '[''Watercolor painting'', ''Photography'', ''Cooking experimental dishes'', ''Listening to classic rock and jazz'', ''Hiking'', ''Fishing'', ''Community theater backstage work'', ''Reading historical
    non-fiction'', ''Genealogy research'', ''Attending local art workshops'']'
  career_goals: Steven aims to advance within the hospitality field by moving into a supervisory role, targeting a floor manager or shift lead position within the next few years. He plans to broaden his
    culinary knowledge through a community‑college certification in food preparation and hopes to eventually open a modest café that doubles as a gallery space for local artists, blending his love of food
    and art. Maintaining a stable income to support his family while preserving time for his artistic pursuits is a core ambition. He also wishes to mentor younger staff, sharing his customer‑service expertise,
    and is open to unconventional career paths such as coordinating community events that fuse cuisine, music, and visual arts.
