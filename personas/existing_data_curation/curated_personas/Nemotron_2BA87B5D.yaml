personas:
  professional: Jenny Tharpe, a retired K-12 educator with deep expertise in instructional design and grant writing, now channels her imagination and sociable nature into mentoring novice teachers, leading
    intergenerational art workshops, and drafting community grant proposals for an emerging intergenerational art studio that pairs seniors with schoolchildren.
  sports: Jenny Tharpe, an avid participant in seasonal trail hikes through the Blue Ridge foothills and a member of a local senior walking club, also enjoys cheering on the UNC Tar Heels basketball team
    during March Madness and follows the Asheville Tourists minor-league baseball games for a touch of summer nostalgia.
  arts: Jenny Tharpe, an avid watercolorist who captures Appalachian hillsides with colors inspired by Andrew Wyeth, a quilt maker who weaves folk motifs reminiscent of traditional Appalachian song lyrics,
    a loyal listener of bluegrass legends like Bill Monroe and The Carolina Chocolate Drops, and a regular attendee of community theater productions starring regional talents such as actress Bethany Hamilton,
    uses these artistic encounters to fuel her creative writing and storytelling workshops.
  travel: Jenny Tharpe, who loves both the comfort of planned excursions and the thrill of spontaneous discovery, often spends weekends driving the Blue Ridge Parkway to photograph misty valleys, has already
    visited historical sites in Charleston, Savannah, and the Lexington battlefield, and dreams of a spring pilgrimage to the Smithsonian Folklife Festival in Washington, D.C., while balancing travel costs
    with her modest pension.
  culinary: Jenny Tharpe, who delights in cooking with herbs from her native herb garden, such as sage, rosemary, and thyme, frequently prepares heirloom vegetable ratatouille, a creamy pumpkin soup seasoned
    with nutmeg, and a signature apple-cinnamon crumble, and while her cooking skill is intermediate, she occasionally over-spices her dishes in pursuit of bold flavor.
  core: Jenny Tharpe, a 72-year-old retired educator with a boundless imagination, blends her love of Appalachian art, community mentorship, and meticulous budgeting into a life of intergenerational creativity,
    occasional health-management quirks, and a habit of collecting obscure watercolor paper.
background:
  cultural: Jenny was raised in mid‑century rural Kentucky, where close‑knit family ties, church participation, and a strong work ethic shaped her worldview. Growing up in the Appalachian foothills of Rowan
    County, she absorbed a heritage of storytelling, folk music, and craft traditions. Her family emphasized the value of education as a pathway to broader horizons, which propelled her into a career in
    teaching. Throughout her life, she has blended Southern hospitality with a curiosity for broader cultural expressions, fostering inclusive community spaces that honor both local customs and the wider
    artistic world.
