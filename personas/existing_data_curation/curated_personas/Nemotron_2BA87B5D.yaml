  hobbies: '[''Watercolor Painting'', ''Quilting'', ''Reading Historical Fiction'', ''Gardening'', ''Hiking Local Trails'', ''Book Club'', ''Volunteering at Senior Center'', ''Community Theater'', ''Genealogy
    Research'', ''Bluegrass Music Jam Sessions'']'
  career_goals: Even in retirement, Jenny aims to nurture lifelong learning within her community. She plans to launch an intergenerational art studio that pairs seniors with schoolchildren for collaborative
    projects, mentor retired educators in volunteer literacy tutoring, and compile a memoir reflecting on her decades of teaching and the cultural history of Rowan County. She also hopes to secure a modest
    endowment for a local scholarship supporting aspiring teachers from rural backgrounds and to publish a quarterly newsletter celebrating Appalachian arts and stories.
