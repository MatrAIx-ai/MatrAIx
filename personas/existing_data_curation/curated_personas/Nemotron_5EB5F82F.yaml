  hobbies: '[''Playing soccer'', ''Guitar practice'', ''Cooking Mexican dishes'', ''PC gaming (strategy and simulation games)'', ''Fishing on Lake Michigan'', ''Hiking and exploring local trails'', ''Snowshoeing
    and winter sports'', ''Robotics and electronics tinkering'', ''Volunteering at community festivals'']'
  career_goals: Cesar aims to finish high school and earn a vocational certificate in automotive technology or culinary arts, fields that blend his mechanical curiosity and love for cooking. He envisions
    opening a small food‑truck serving Mexican‑American fusion fare in the Michigan lakes region while also working part‑time as a bilingual service technician, helping Spanish‑speaking customers with car
    maintenance. In the longer term, he hopes to become a community liaison, using his language skills and practical experience to support immigrant families in Harbor Springs and advocate for local youth
    programs.
