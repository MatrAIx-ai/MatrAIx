personas:
  professional: Andy Obando is a budding mini-architect who arranges building blocks into structured towers while flexibly improvising with colorful shapes, displaying early planning skills and an inquisitive,
    organized yet adaptable mindset in playtime, and they delight in reorganizing their creations whenever inspiration strikes.
  sports: Andy Obando cheers enthusiastically for the Seattle Seahawks during family game nights and participates in the Little Sprinters toddler soccer club at the community park, eagerly sprinting after
    soft balls and mastering the basics of balance and coordination, and they laugh as they chase the soft balls with bright enthusiasm.
  arts: Andy Obando delights in finger‑painting bright abstracts inspired by Dr. Seuss, dances to the cheerful tunes of Raffi and The Wiggles, and can recite lines from Sesame Street, weaving a vivid love
    of visual and musical arts into daily play, and they hum along to the melodies with a joyful grin.
  travel: Andy Obando has visited the Magic Kingdom in Orlando and the Monterey Bay Aquarium, loves the sensory wonder of bright lights and marine life, and dreams of a future family road trip to the Grand
    Canyon’s colorful cliffs, and they point excitedly at every new exhibit they encounter.
  culinary: Andy Obando favors creamy macaroni‑and‑cheese, sweet banana slices, and occasional strawberry yogurt, enjoys helping stir the pot with a plastic spoon, and often creates tiny messes on the kitchen
    floor that become an amusing part of mealtime, and they giggle when the spoon goes splash.
  core: Andy Obando is a curious, energetic two‑year‑old who balances organized play with spontaneous creativity, eagerly exploring the world through blocks, music, and mess‑making adventures, and they
    love to share discoveries with anyone nearby.
background:
  cultural: Andy is raised in a Mexican‑American household in Sturgis, Michigan. His family blends traditional Mexican customs—speaking Spanish at home, celebrating Día de los Muertos and other Mexican
    holidays, cooking dishes like tacos and tamales, and listening to mariachi and regional folk music—with Midwestern community life. This bicultural environment nurtures his appreciation for art, music,
    and communal gatherings, and it instills values of family cohesion, respect for cultural heritage, and openness to diverse experiences.
