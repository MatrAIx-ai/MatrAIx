  career_goals: Though still very young, Andy exhibits early signs of future aspirations. He often expresses a desire to help people, saying he would like to be a firefighter, a teacher, or an artist who
    creates bright paintings. His love for music and group activities suggests a budding interest in becoming a musician or performer who shares cultural songs with his community. Overall, his ambitions
    are oriented toward roles that combine creativity, helping others, and being part of a community.
