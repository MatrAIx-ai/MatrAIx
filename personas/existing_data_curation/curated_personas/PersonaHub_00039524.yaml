persona_description: A historian who specializes in the study of the history of the Catholic Church, particularly the development of the doctrine of Sacramental Confession and Absolution. His research interests
  include, but are not limited to, the history of the Church's liturgical practices, the development of the doctrine of Penance and its relation to the Sacraments of Reconciliation and Eucharist, and the
  impact of the Lateran Council's dogma of Transubstantiation on the Church's teachings on Sacramental Confession and Absolution.
