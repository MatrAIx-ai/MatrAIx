personas:
  professional: Thomas Johnson is a seasoned civil engineer who leverages over twenty years of structural design and site development expertise to lead municipal and commercial projects; they apply AutoCAD,
    Revit, and Civil 3D with meticulous precision, champion rigorous safety protocols, and balance assertive client communication with cooperative teamwork, all while channeling a practical, predictable
    mindset shaped by years of managing budgets, codes, and multidisciplinary crews.
  sports: Thomas Johnson is a steadfast supporter of Midwestern sports, cheering for the Chicago Bears (NFL) and St. Louis Cardinals (MLB) while routinely attending local high school basketball games; they
    also play in a community softball league on weekends, watch college football with a small group of friends, and treat fishing at nearby reservoirs as both sport and meditation.
  arts: Thomas Johnson enjoys the craftsmanship of American folk art, listening to Johnny Cash and Emmylou Harris while woodworking, they frequent regional galleries showcasing Grant Wood‑style paintings,
    appreciate the sleek lines of classic cars as moving art, and unwind with classic film noir like 'The Treasure of the Sierra Madre' after a long day on the drafting table.
  travel: Thomas Johnson prefers self‑planned road trips that blend work‑life balance with outdoor recreation, they have driven the Great River Road to explore river towns, camped in the Ozark National
    Forest for weekend fishing and hiking, visited Pittsburgh’s iconic steel bridges for engineering inspiration, and aspire to a Pacific Northwest salmon‑fishing expedition, always opting for modest motels
    or campgrounds to keep travel costs predictable.
  culinary: Thomas Johnson delights in preparing simple, garden‑fresh meals such as grilled lake perch caught on a recent reservoir trip, heirloom tomato and basil salad, and a hearty chicken pot pie with
    a crust baked in a wood‑fired oven they built themselves; they also enjoy roasting root vegetables, making cornbread, and sipping a dark roast coffee with oat milk while listening to bluegrass tunes.
  core: Thomas Johnson is a methodical engineer who blends a love for solitary hands‑on crafts, disciplined financial planning, and steady community‑rooted pursuits, all while quietly battling mild back
    pain and a penchant for early‑morning fishing trips.
background:
  cultural: Thomas was raised in a small town in southern Indiana and embodies Midwestern white working‑class values such as self‑reliance, modesty, and community service. His family traditions include
    regular church attendance at a Methodist congregation, participation in county fairs, and strong support for local high school sports. He values family gatherings, appreciates the pace of life in Clark
    County, and maintains a practical, down‑to‑earth outlook shaped by the region's emphasis on hard work and neighborly cooperation.
attributes:
  skills: '[''Structural Design'', ''Site Development'', ''Project Management'', ''AutoCAD'', ''Revit'', ''Civil 3D'', ''Construction Safety'', ''Budgeting and Cost Control'', ''Regulatory Compliance'',
    ''Risk Assessment'', ''Team Leadership'', ''Client Relations'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''Gardening'', ''Classic Car Restoration'', ''Reading Engineering History'', ''Chess'', ''Local Community Club Participation'']'
  career_goals: Thomas aims to advance to a senior project manager role where he can lead large‑scale transportation and water‑resource infrastructure projects across the Midwest. He plans to obtain his
    Professional Engineer (PE) license and a Project Management Professional (PMP) certification within the next two years to bolster his credentials. He is eager to mentor junior engineers, champion sustainable
    design practices, and eventually establish his own consulting firm focused on resilient community infrastructure. His long‑term ambition includes contributing to regional policy development on infrastructure
    resilience and serving on local planning boards.
