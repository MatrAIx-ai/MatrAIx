  hobbies: '[''Sketching'', ''Watercolor painting'', ''Reading art books'', ''Gardening'', ''Crocheting'', ''Knitting'', ''Listening to folk/bluegrass music'', ''Journaling'', ''Visiting galleries and museums'',
