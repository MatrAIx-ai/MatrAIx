  career_goals: Brianna aims to turn her self‑taught crafts into a modest entrepreneurial venture. She plans to complete a GED program within the next year, after which she hopes to open an online boutique
    selling her handcrafted textiles and up‑cycled décor items. Additionally, she dreams of founding a small community art circle in her neighborhood, offering low‑pressure workshops that cater to solitary,
    creative individuals. While she values flexibility and quiet, she seeks a sustainable part‑time income that supports her family and provides her with the freedom to pursue her artistic passions.
