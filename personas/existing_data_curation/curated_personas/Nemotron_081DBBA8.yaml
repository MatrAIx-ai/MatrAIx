personas:
  professional: Brianna Knotts is a self‑taught craft entrepreneur who is channeling her watercolor‑sketching eye and up‑cycling knack into a soon‑to‑launch online boutique, while simultaneously planning
    a low‑pressure neighborhood art circle despite a relaxed, sometimes chaotic approach to scheduling.
  sports: Brianna Knotts enjoys solitary hikes along the Kentucky countryside, practices gentle yoga in their backyard, cheers quietly for the Louisville Bats and the Kentucky Wildcats while sipping tea,
    and occasionally joins a weekend community gardening club that doubles as a low‑impact fitness group.
  arts: Brianna Knotts spends weekends immersed in watercolor painting of rolling hills, curates an ever‑growing home gallery of prints ranging from Georgia O’Keeffe to local folk artist Sarah Redmond,
    listens to Bill Monroe on a loop while crocheting, and seeks out rare poetry volumes by Rita Dove at antique bookstores, all of which feed their quiet creative soul.
  travel: Brianna Knotts prefers off‑peak solo travel that feels like a quiet field trip, having roamed the historic streets of Savannah, wandered the Blue Ridge Mountains near Asheville, and savored a
    month‑long summer stay in a rustic Provençal farmhouse, always planning trips on a shoestring budget and returning home with sketchbooks full of new motifs.
  culinary: Brianna Knotts cooks with herbs harvested from their own garden, favoring rosemary‑infused roasted chicken, beet‑and‑goat‑cheese salad with a drizzle of balsamic reduction, and weekly pickled
    cucumbers, while occasionally treating themselves to farm‑to‑table evenings at the local Bluegrass Bistro.
  core: Brianna Knotts is a quietly curious 38‑year‑old who stitches together art, gardening, and thrift‑store treasures into a solitary yet community‑touching lifestyle, powered by folk music, a penchant
    for disorganized budgeting, and a steadfast desire for flexible independence.
background:
  cultural: Brianna grew up in Louisville, Kentucky, within a white, working‑class family rooted in Southern Appalachian traditions. The River City’s blend of historic bourbon culture, Southern hospitality,
    and the annual Kentucky Derby festivities shaped her appreciation for community rituals and regional arts. Early exposure to church gatherings and bluegrass music, along with family meals featuring
    Southern comfort foods like fried chicken, biscuits, and collard greens, reinforced a modest, community‑oriented upbringing. Louisville’s vibrant arts scene—including street murals, the Speed Art Museum,
    and local craft markets—nurtured her curiosity for visual arts. While she prefers solitude, her cultural identity reflects a strong sense of place, a respect for handcrafted traditions, and an appreciation
    for the tactile, communal aspects of her Southern heritage.
