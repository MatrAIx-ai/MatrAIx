personas:
  professional: Cyrus Bishop, a budding problem‑solver who spends hours stacking blocks into precarious towers, demonstrates early engineering instincts and a competitive edge, treating playtime as a miniature
    research lab where they critically test which structures hold and which collapse.
  sports: Cyrus Bishop, an energetic toddler at the neighborhood playground, loves chasing after a bright orange soccer ball with the local kids’ preschool soccer club and mimics the moves of the city’s
    Major League Baseball team, the River City Runners, while they sprint, tumble, and cheer loudly.
  arts: Cyrus Bishop, a curious two‑year‑old with a love for bright pictures, spends afternoons finger‑painting to the tunes of Raffi’s “Baby Beluga” and waving a toy drum while watching the animated adventures
    of Sesame Street’s Elmo, showing an early appreciation for music, color, and storytelling.
  travel: Cyrus Bishop, a stroller‑loving explorer, recently enjoyed a short drive to the seaside boardwalk where they collected seashells and giggled at the gulls, and dreams of a future family trip to
    Disney World’s Magic Kingdom, balancing short, safe outings with a budding wanderlust.
  culinary: Cyrus Bishop, a picky eater with a soft spot for cheesy macaroni, smooth banana mash, and honey‑drizzled pancakes, can proudly pour cereal into their own bowl but often refuses vegetables like
    broccoli, preferring the sweet crunch of apple slices.
  core: Cyrus Bishop is a fiercely curious but worry‑prone toddler who juggles artistic doodles, competitive block building, and spontaneous snack negotiations, often slipping into brief meltdowns when
    their flexible routine feels unsteady.
background:
  cultural: Cyrus is raised in a predominantly white, suburban middle‑class family in Maple Valley, Washington. The family values outdoor activities typical of the Pacific Northwest, such as hiking and
    gardening, and integrates this into his upbringing. Local community events, multicultural festivals at nearby schools, and exposure to regional art and environmental education shape his cultural experiences,
    fostering an appreciation for both the natural world and creative expression.
