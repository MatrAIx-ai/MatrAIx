personas:
  professional: James Harris is a budding builder who spends hours constructing intricate LEGO structures, blending a natural curiosity for new designs with a practical knack for making things fit together,
    while preferring solitary play and often ignoring the messy aftermath of his projects.
  sports: James Harris is a pint‑sized soccer enthusiast who dribbles a bright orange ball at preschool recess, proudly wears the jersey of his local youth club, and when watching TV he roots for the New
    York Yankees, modeling his competitive spirit after the baseball legends.
  arts: James Harris immerses himself in vivid imagination through watching Disney's Frozen, singing along to the whimsical tunes of Baby Shark and the playful rhymes of Sesame Street, and he spends quiet
    afternoons drawing pictures of dinosaurs inspired by the illustrations of Dr. Seuss.
  travel: James Harris prefers low‑key family road trips where he can explore a sandbox at a rest stop, yet he dreams of the sensory overload of a future visit to Walt Disney World in Florida and the awe
    of the geysers at Yellowstone, balancing his love of solitude with occasional excitement for new landscapes.
  culinary: James Harris favors crunchy peanut butter sandwiches, mac‑and‑cheese with extra cheese, and strawberry‑filled cupcakes, proudly declares a love for blueberries and carrot sticks, but his cooking
    skill is limited to stirring cereal in a bowl and occasionally helping splash pancake batter under close adult supervision.
  core: James Harris is a solitary little explorer whose boundless curiosity fuels LEGO castles, yet his penchant for leaving LEGO pieces scattered everywhere reveals a charmingly chaotic streak.
background:
  cultural: James is raised in a predominantly white, middle‑class family in Charlottesville, Virginia, an area known for its historic sites, university presence, and accessible public parks. His upbringing
    blends suburban Southern culture—valuing independence, practical activities, and community gatherings like local farmers’ markets—with exposure to a broad curriculum from the local school district and
    library programs that encourage curiosity about science and engineering.
