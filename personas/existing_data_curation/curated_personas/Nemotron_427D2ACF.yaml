personas:
  professional: Sherry Blankenship is a senior operations research analyst who leverages advanced stochastic optimization and data visualization to craft sustainability-focused solutions for public infrastructure,
    while they blend methodical project management with a quiet, art-inspired curiosity that makes complex models accessible to stakeholders.
  sports: Sherry Blankenship enjoys low-impact cardio like sunrise mangrove trail walks and weekend yoga, follows the Tampa Bay Rays for a gentle connection to community sports, and occasionally paddles
    with the local kayak club, preferring solitary movement over loud gym environments, and they find the rhythmic paddling especially meditative.
  arts: Sherry Blankenship creates digital collages and watercolors inspired by the serene mangrove scenery, regularly attends intimate openings at the Tampa Museum of Art featuring artists like Julie Mehretu,
    and finds intellectual sustenance in the works of Georgia O'Keeffe and the surrealist exhibitions at the Dali Museum, while they often experiment with new compositional techniques in their modest home
    studio.
  travel: Sherry Blankenship prefers meticulously planned, low-key trips that blend natural observation with art appreciation, having explored the Everglades and the gardens of Kyoto on solo journeys, while
    they harbor a bucket-list desire to wander the volcanic landscapes of Iceland and the design museums of Copenhagen.
  culinary: Sherry Blankenship enjoys cooking with the fresh heirloom vegetables they grow, often preparing rosemary-grilled Mahi-Mahi, ratatouille with heirloom tomatoes, and quinoa salads tossed with
    home-grown arugula, while they indulge in the occasional key lime pie from a local bakery.
  core: Sherry Blankenship is a methodical analytics leader who unwinds on mangrove trails sketchbook in hand, merges data-driven sustainability work with quiet artistic pursuits, and they occasionally
    procrastinate on email replies while obsessively cataloguing stray art supplies.
background:
  cultural: Sherry grew up in a middle-class family in the Midwest before relocating to Florida after college. Her cultural upbringing reflects classic American values of self-reliance, community service,
    and a respect for education. Her family encouraged intellectual curiosity and participation in local arts programs, leading her to develop a lifelong appreciation for visual arts and literature. As
    a white American, she identifies with the broader cultural narratives of the region, while also embracing the diverse, multicultural milieu of the Tampa Bay area; she frequently volunteers at community
    outreach events that promote STEM education for underrepresented youth and supports local arts charities. Her marriage and stable family life provide a supportive foundation that aligns with her preference
    for harmonious, cooperative relationships.
