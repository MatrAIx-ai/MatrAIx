  career_goals: Sherry aims to deepen her expertise in advanced optimization techniques, particularly those addressing sustainability and resource allocation in public infrastructure. Over the next five
    years, she envisions stepping into a senior leadership role—such as Principal Operations Research Analyst or Analytics Team Lead—where she can mentor younger analysts and champion data-driven decision
    making within her organization. She is also interested in publishing research on hybrid deterministic-stochastic models and presenting at interdisciplinary conferences that blend analytics with artistic
    design thinking. In the longer term, Sherry aspires to consult with nonprofit and governmental agencies in Florida, helping them implement efficient, evidence-based strategies that improve community
    services while preserving environmental quality.
