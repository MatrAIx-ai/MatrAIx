    art workshops'']'
  career_goals: Andrea plans to transfer to a four‑year university to earn a bachelor's degree in Art History and Museum Studies, aiming to become a curator or community arts coordinator. She intends to
    develop a professional portfolio, lead inclusive community art projects, and eventually blend artistic practice with social impact through roles such as art therapy or educational programming. Sustainable
    design and environmentally informed art are also long‑term interests.
