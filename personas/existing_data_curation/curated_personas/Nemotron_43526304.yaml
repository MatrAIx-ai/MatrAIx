personas:
  professional: Andrea Hanson, an aspiring art history student with a flair for sketching, analog photography, and digital illustration, leverages their curiosity and strong listening skills to curate inclusive
    pop‑up exhibitions for local art workshops, all while battling a habit of last‑minute planning and a tendency to let deadlines slip.
  sports: Andrea Hanson finds balance on the trails, joining the Duluth Hiking Club for weekend hikes along Lake Superior, cheering on the Minnesota Timberwolves and Twins on game nights, and occasionally
    playing pick‑up basketball at the local community center despite a preference for solitary activities.
  arts: Andrea Hanson, enchanted by the dreamy brushstrokes of Monet, the bold patterns of Yayoi Kusama, and the lyrical storytelling of indie folk artists like Fleet Foxes and Sufjan Stevens, spends evenings
    sketching river vistas while listening to these artists and devouring speculative fiction by N.K. Jemisin and Jeff VanderMeer.
  travel: Andrea Hanson, a budget‑savvy explorer, has trekked the rugged coastlines of the Upper Peninsula, taken a weekend road trip to Chicago’s art districts, and dreams of wandering the misty highlands
    of Scotland and the serene temples of Kyoto, always planning trips around semester breaks and art residencies.
  culinary: Andrea Hanson enjoys cooking simple yet earthy meals such as wild‑rice pilaf with sautéed mushrooms, cedar‑plank salmon seasoned with fresh dill, and seasonal berry crumble, favoring locally
    sourced honey and foraged herbs while admitting a habit of over‑seasoning their dishes.
  core: Andrea Hanson, a 19‑year‑old art lover with a penchant for spontaneous creativity, balances thrift‑driven budget splurges on supplies with a laid‑back approach to deadlines, and finds solace in
    sketching lakeside vistas while journaling their inner world.
background:
  cultural: Andrea was raised in Marquette, Michigan, a small lakeside town in the Upper Peninsula where a close‑knit community values the outdoors, seasonal festivals, and local music. Her family emphasizes
    education, modesty, and community involvement. Growing up, she was exposed to regional traditions and developed an awareness of the Ojibwe heritage of the area, fostering both respect for her own Midwestern
    roots and an openness to diverse cultural perspectives.
