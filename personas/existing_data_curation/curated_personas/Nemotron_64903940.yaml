  career_goals: As she grows, Ma Angel envisions a future where she can help and nurture others. Inspired by caring adults around her, she often talks about ‘being a teacher’ or ‘a helper’ in pretend play,
    and she looks forward to learning more about caring for children and the community. Her long‑term ambition is to work in a supportive role—such as a teacher, pediatric nurse, or community volunteer—where
    her compassion and cooperative nature can make a positive difference.
