personas:
  professional: Ma Tarrero, a curious two‑year‑old who blends practicality with imagination, treats the living‑room sandbox as a mini‑project space, sorting blocks by color and size while staying flexible
    enough to pivot when a playmate suggests a new tower, and they delight in collaborating with peers to achieve shared building goals.
  sports: Ma Tarrero, an energetic two‑year‑old who thrives at the community park's "Little Sprouts" toddler soccer clinic, loves swinging on the jungle gym, enjoys watching the hometown baseball team the
    Red Sox on family evenings, and they regularly attend weekly toddler gymnastics classes at Busy Bees Gym.
  arts: Ma Tarrero, a vibrant two‑year‑old who sings along to The Wiggles, dances to Disney’s "Let It Go", creates bold finger paintings of dinosaurs inspired by Sesame Street, and they often stage impromptu
    performances for family members, demanding encore applause.
  travel: Ma Tarrero, a two‑year‑old who adores family road trips to the nearby zoo, weekend beach stays at Lake Tahoe, and dreams of exploring Disneyland and the Grand Canyon, favors itineraries with familiar
    routines, and they become visibly distressed when travel plans change unexpectedly.
  culinary: Ma Tarrero, a picky yet adventurous two‑year‑old who favors mac and cheese, banana slices, and chicken nuggets, helps stir pancake batter with a tiny spoon, loves the aroma of cinnamon in baked
    apples, and they insist on warm milk before bedtime as a soothing ritual.
  core: Ma Tarrero, a curious, sociable, and emotionally intense two‑year‑old who balances tidy routines with spontaneous play, constantly seeks harmony while wrestling with vivid anxieties, and they often
    turn to hugging a favorite plush when overwhelmed.
background:
  cultural: Ma Angel’s family roots are Mexican, and her household blends traditions from both Mexican and Texan cultures. She is regularly exposed to Spanish through conversations at home, hears traditional
    songs like mariachi lullabies, and participates in cultural celebrations such as Día de los Muertos and Mexican Independence Day. Family meals often feature tacos, arroz con frijoles, and fresh salsa,
    providing a rich culinary heritage. Living in Cedar Park, Texas, she benefits from a multicultural community while maintaining strong family ties and bilingual communication, shaping her identity with
    a vibrant, bicultural perspective.
