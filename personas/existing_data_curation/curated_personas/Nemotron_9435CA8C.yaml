  career_goals: Paul aims to eventually launch a modest subcontracting business that specializes in home renovation and repair for his community. He plans to obtain a journeyman carpenter certification,
    take on leadership roles within his local union, and serve as a trusted mentor to younger construction workers. He also hopes to contribute to community‑focused building projects, such as volunteer
    home repairs for low‑income families.
