personas:
  professional: Paul Vasquezrojas, a seasoned residential and small-commercial builder with three decades of framing, concrete, heavy equipment operation, and blueprint reading, they blend practical curiosity
    with an easygoing approach to keep job sites safe, mentor junior carpenters, and flexibly coordinate crews while dreaming of launching a community-focused subcontracting firm.
  sports: Paul Vasquezrojas chews on team spirit as they rally behind the Lewisburg High School Pioneers football squad, root for the Pittsburgh Steelers in the NFL and the Washington Nationals in MLB,
    join the Greenbrier County Conservation Club’s seasonal duck-hunt outings, and keep fit by hiking Appalachian trails and tossing a basketball at the local recreation center.
  arts: Paul Vasquezrojas lets their creative side shine as they strum a battered acoustic guitar at bluegrass jam sessions, admire the twang of Bill Monroe and the harmonies of Alison Krauss, and collect
    folk paintings by Appalachian artist Earl Smith displayed at the annual Lewisburg Art Fair.
  travel: Paul Vasquezrojas favors spontaneous road trips that they plan on the fly, weaving stops at the James River for fishing, hikes through Shenandoah National Park, and overnight stays in Nashville
    to catch live country shows, yet their modest budget and family responsibilities keep longer vacations, like a coveted European tour, on the backburner.
  culinary: Paul Vasquezrojas enjoys cooking hearty meals, turning garden-grown heirloom tomatoes, green beans, and peppers into rustic stews, while pan-frying weekend catches of trout and catfish with
    lemon-butter, serving them alongside buttery cornbread and a dollop of homemade apple butter.
  core: Paul Vasquezrojas is a laid-back, guitar-strumming construction veteran who spends Sundays fishing, mentors apprentices with a blend of curiosity and blunt practicality, yet still forgets to refill
    their truck’s oil until the engine coughs.
background:
  cultural: Paul grew up in the heart of Appalachia, raised in a white, working‑class family that has lived in Greenbrier County for generations. His cultural identity is shaped by the region’s values of
    self‑reliance, tight‑knit community ties, and a deep appreciation for the outdoors. He was raised in a Methodist household, regularly attends church, and cherishes traditions such as bluegrass music,
    family potlucks, and the seasonal hunting and harvest cycles that mark the rhythm of life in rural West Virginia.
