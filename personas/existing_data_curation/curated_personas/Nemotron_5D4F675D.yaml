personas:
  professional: Eduardo Manzano, a senior electrical field engineer with three decades of hands-on experience in industrial and commercial power systems, blends a safety-first mindset with meticulous design
    of power distribution layouts, motor-control circuitry, and PLC ladder-logic programs, and they channel their methodical, structured approach into mentoring apprentices while pursuing a PE license and
    a future as a project manager for large-scale energy-efficiency retrofits.
  sports: Eduardo Manzano, an avid fan of the Houston Astros and Dallas Cowboys who also enjoys weekend fishing trips along the Rio Grande, participates in a local senior softball league, and they maintain
    a modest fitness routine of early-morning walks, though they sometimes skip workouts during busy retrofit project seasons.
  arts: Eduardo Manzano, a dedicated acoustic-guitarist who rehearses traditional folk songs and occasionally performs at church gatherings, curates a modest vinyl collection featuring artists like Woody
    Guthrie, Pete Seeger, and Los Lobos, and they find solace in music after long days on site, though they sometimes neglect practice when paperwork piles up.
  travel: Eduardo Manzano, a weekend explorer who has taken scenic drives to Big Bend National Park, enjoyed a family road trip along the River Walk in San Antonio, attended a solar conference in Austin,
    and they dream of visiting the German Renewable Energy Expo in Berlin, balancing travel plans with family commitments and a modest travel budget.
  culinary: Eduardo Manzano, a seasoned home cook renowned for mastering tamales, carne asada, and inventive Tex-Mex fusion dishes like chili-lime shrimp tacos, sources fresh cilantro, tomatillos, and ancho
    chilies from the local market, and they occasionally over-salt their sauces while proudly feeding neighbors at neighborhood fiestas.
  core: Eduardo Manzano, a structured yet stress-prone electrician-turned-aspiring-project-manager who finds balance in quiet fishing, guitar strumming, and meticulous budgeting, all while nurturing a quirky
    habit of over-cooking his own recipes.
background:
  cultural: Eduardo is a first‑generation Mexican‑American raised in McAllen, a vibrant border city where Mexican traditions blend seamlessly with Texan culture. He grew up bilingual, speaking Spanish at
    home with his parents and grandparents while schooling in English, which gives him fluency in both languages and a deep appreciation for both cultures. Family and community are central to his identity;
    weekly gatherings feature shared meals of tacos, pozole, and freshly baked pan dulce, and celebrations such as Día de los Muertos and Cinco de Mayo are observed with candles, altars, and music. As a
    practicing Catholic, he attends Mass regularly and participates in parish outreach programs. Eduardo’s Mexican heritage informs his work ethic, sense of responsibility, and respect for collective well‑being,
    while the Texan influence adds a pragmatic, independent streak that shapes his professional and personal outlook.
attributes:
  skills: '["Industrial electrical system design", "Motor control and PLC programming", "Electrical code compliance (NEC, Texas)", "Fault diagnosis and troubleshooting", "Project budgeting and scheduling",
    "Technical documentation (AutoCAD, ETAP)", "Safety training and OSHA compliance", "Mentoring and apprentice development", "Preventive maintenance planning", "Equipment integration and testing"]'
  hobbies: '["Fishing on the Rio Grande", "Woodworking and DIY home projects", "Playing acoustic guitar (Mexican folk music)", "Cooking Mexican and Tex‑Mex cuisine", "Participating in church and community
    events", "Volunteering with senior center for safety checks", "Reading renewable energy and technology journals", "Attending regional trade shows and workshops"]'
  career_goals: Eduardo’s primary career goal is to secure a Professional Engineer (PE) license and a bachelor’s degree in electrical engineering from a local community college, which would formalize his
    extensive practical knowledge. He aspires to transition from senior field engineer to project manager for large‑scale energy‑efficiency retrofits in the Rio Grande Valley, where he can apply his structured
    approach to deliver predictable timelines and cost‑effective solutions. In the longer term, he hopes to launch his own consulting firm that specializes in integrating solar photovoltaic and battery‑storage
    systems for small businesses, providing his family with stable income while reducing his daily stress through better work‑life balance. Throughout, he remains committed to mentoring the next generation
    of Mexican‑American technicians, ensuring a pipeline of skilled workers for the region.
