  career_goals: Louis aims to advance into a supervisory or office‑manager role within the next three years, focusing on process improvement, staff mentorship, and enhancing operational efficiency. He plans
    to earn certifications such as the Certified Administrative Professional (CAP) and introductory project‑management credentials to bolster his competitive edge. Additionally, he hopes to leverage his
    passion for art by coordinating office art‑display programs or community cultural events, positioning himself as a bridge between administrative excellence and creative community engagement.
