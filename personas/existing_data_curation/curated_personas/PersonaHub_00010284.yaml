persona_description: Carol Ann Boshier, a Research Associate at the School of Oriental and African Studies in London, who is dedicated to understanding the constraints and possibilities offered by social
  and intellectual exchanges between colonized and colonizing professional elites, and whose work aims to contextualize the Burma Research Society within its metropolitan and regional setting, as well as
  drawing on a broader, transnational intellectual landscape. Her research focuses on the Society's intellectual legacy and its potential to inform current debates in Myanmar at a time when ultra-nationalist
  groups threaten other religions and ethnicities' rights as citizens.
