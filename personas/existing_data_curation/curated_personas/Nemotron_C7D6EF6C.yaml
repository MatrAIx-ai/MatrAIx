personas:
  professional: Thomas Sabo is a detail‑oriented 16‑year‑old who coordinates after‑school events at the community center and applies their organized, reliable approach to hands‑on automotive maintenance
    projects, positioning themselves for a future vocational apprenticeship in skilled trades.
  sports: Thomas Sabo plays point guard for the local youth basketball league’s Knights team, follows the Chicago Bulls and Detroit Pistons closely, and they combine structured weekly practices with personal
    cardio sessions, always using a stopwatch to log drills and improve efficiency.
  arts: Thomas Sabo immerses themselves in classic rock, cranking out tracks by Led Zeppelin, The Who, and Pink Floyd while building model kits, and they attend occasional community theater productions
    of classic plays like "Our Town," which fuels their appreciation for storytelling.
  travel: Thomas Sabo enjoys day trips to the National Air and Space Museum in Washington, D.C., loves touring the Henry Ford Museum in Detroit for automotive inspiration, and they dream of a future backpacking
    tour across the Bavarian Alps to explore historic train routes, balancing budget constraints with a love for hands‑on exploration.
  culinary: Thomas Sabo prefers hearty, practical meals such as homemade spaghetti carbonara, grilled cheese with sharp cheddar, and crunchy chicken wings seasoned with paprika, and they are comfortable
    cooking a simple dinner for themselves but still rely on take‑out pizza after marathon gaming sessions.
  core: Thomas Sabo is a methodical teen who blends a love for model building, classic rock, and community service with a disciplined approach to school, money, and personal health, though they sometimes
    binge‑watch video games late into the night.
background:
  cultural: Thomas is a white American teenager raised in Baltimore, Maryland. Growing up in an urban Mid‑Atlantic setting, he has been shaped by the city’s rich history, diverse neighborhoods, and strong
    community‑oriented culture. His family reflects typical middle‑class Mid‑Atlantic values that emphasize hard work, respect, and civic engagement. Local influences include the city’s sports fandom (Orioles,
    Ravens), the regional music scene, and participation in youth programs that promote responsibility and teamwork.
