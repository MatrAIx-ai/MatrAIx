  career_goals: Thomas aims to earn his GED within the next year and enroll in a vocational program—either automotive technology, electrical work, or a skilled‑trade apprenticeship—where his methodical
    approach and reliability will be assets. He envisions a stable, structured career in a field such as logistics, law enforcement, or the skilled trades, and hopes to eventually give back by mentoring
    younger teens and participating in community development projects.
