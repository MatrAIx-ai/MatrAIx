  hobbies: '["Gardening (vegetables, herbs, and flowers)", "Knitting and Quilting", "Reading historical fiction", "Church choir participation", "Bridge (card game)", "Birdwatching", "Bingo nights", "Local
    history tours", "Cooking new recipes"]'
  career_goals: Even at 86, Daphne aims to remain vibrant and contributive in her community. She plans to continue volunteering at the local senior center, mentor younger volunteers, and serve as a bridge
    between generations. Her personal projects include compiling a family cookbook that captures beloved Southern recipes, documenting oral histories of longtime residents for the Person County historical
    society, and learning new digital tools to video‑chat regularly with her grandchildren. Daphne also prioritizes her health through daily walks, attends church services and choir rehearsals, and hopes
    to travel occasionally to family reunions in neighboring states.
