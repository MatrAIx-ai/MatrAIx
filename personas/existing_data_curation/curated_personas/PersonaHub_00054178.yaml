persona_description: A researcher in the field of neurology, particularly focused on the study of enteroviruses and their potential role in the development of acute flaccid myelitis (AFM). Schubert and
  his team's findings suggest that enteroviruses are a significant factor in AFM cases, and the new antibody test provides a valuable tool for further research into the specific risk factors that transform
  a relatively innocuous upper respiratory infection into a life-altering paralytic illness. The team's research is expected to spur vaccine development and improve our understanding of the virus's role
  in the disease.
