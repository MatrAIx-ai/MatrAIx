persona_description: An ancient Florentine musician, particularly interested in the history and development of the pifferi, a three-part instrumental ensemble in the 14th century. The persona is knowledgeable
  about the history of the ensemble, its repertoire, and the roles of its musicians, particularly the German trombonists who were hired and eventually replaced by native Florentine shawm players. The persona
  is also interested in the cultural significance of the pifferi in Florentine society and the broader context of Renaissance music.
