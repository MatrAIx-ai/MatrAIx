personas:
  professional: Lisette Valbuena, an 89-year-old veteran community treasurer and senior-center organizer, blends bilingual fluency, meticulous budgeting expertise from decades of managing a family grocery
    store, and methodical event planning to keep local programs financially sound while skeptically vetting vendors and fostering a competitive yet supportive atmosphere among volunteers.
  sports: Lisette Valbuena enjoys low-impact activities such as daily walks in her garden, participates in the local senior walking club and watches the Delaware Blue Hens baseball team, while still competing
    fiercely in community bridge tournaments and weekend bingo games that satisfy her competitive streak.
  arts: Lisette Valbuena spends afternoons quilting intricate patterns, crocheting traditional motifs, and listening to folk guitar legends like Paco de Lucia and soulful singers such as Mercedes Sosa,
    while her evenings are filled with re-reading historical biographies of leaders and chanting the verses of classic folk ballads that echo her heritage stories.
  travel: Lisette Valbuena favors purposeful travel, planning trips to historic sites like Philadelphia's Independence Hall and scenic coastal getaways at Rehoboth Beach, while dreaming of a pilgrimage
    to the highland villages of her youth, and she prefers modest, family-oriented itineraries that balance adventure with her limited mobility.
  culinary: Lisette Valbuena masterfully prepares traditional corn-based stews, slow-cooked poultry dishes seasoned with roasted peppers, and homemade tamales, using fresh garden herbs like cilantro and
    epazote, and she teaches her grandchildren the art of nixtamalizing corn each weekend, though she occasionally forgets to refrigerate leftovers in her haste.
  core: Lisette Valbuena is an organized, fiercely competitive octogenarian who preserves her independence through meticulous budgeting, garden-based workouts, and the continual passing of her bilingual
    culinary and cultural legacy to younger generations, even if she sometimes gets lost in spreadsheets or forgets meal prep steps.
background:
  cultural: Lisette was born and raised in a small town near Antigua, Guatemala, in a Catholic, predominantly Ladino family with deep respect for Maya traditions. Her upbringing was steeped in communal
    celebrations, such as Semana Santa processions and the annual Fiesta de la Virgen, and in agricultural rhythms tied to coffee and corn cultivation. She learned to speak Spanish at home while hearing
    indigenous Mayan phrases from neighbors, fostering an appreciation for linguistic diversity. In the early 1970s, she immigrated to the United States after marrying an American businessman, settling
    first in New York before moving to Felton, Delaware. She has maintained strong ties to Guatemalan diaspora groups, participating in cultural festivals, sharing traditional recipes, and preserving the
    language and customs for her family and the local community.
attributes:
  skills: '["Bilingual Spanish‑English translation", "Budgeting and financial record‑keeping", "Small‑business management", "Traditional Guatemalan cooking", "Seasonal gardening and horticulture", "Community
    event planning", "Basic technology troubleshooting"]'
  hobbies: '["Vegetable and herb gardening", "Quilting and crocheting", "Reading historical biographies and folklore", "Listening to traditional Guatemalan folk music", "Community bingo and bridge", "Cooking
    family recipes", "Teaching Spanish to grandchildren"]'
  career_goals: At 89, Lisette’s ambitions focus on preserving her independence, staying mentally active, and passing on her heritage. She aims to complete a memoir that documents her journey from Guatemala
    to Delaware, highlighting the cultural recipes and family stories she wishes to share with younger generations. She also hopes to continue mentoring volunteers at the senior center, offering workshops
    on budgeting, cooking, and gardening. Maintaining her health and mobility to enjoy daily walks in her garden and occasional visits to family remains a central goal.
