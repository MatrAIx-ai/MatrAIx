  career_goals: Janice aims to become a senior associate within three years and to make partner at her mid-sized firm in the next five to seven years, focusing on real estate development and corporate transactions
    in the fast‑growing Central Florida market. She also plans to earn an LL.M. in Business Law, expand her professional network through the Florida Bar and local business chambers, and eventually launch
    her own boutique practice that offers affordable legal services to small businesses and first‑time homebuyers. Community impact is important to her, so she hopes to lead pro‑bono initiatives and become
    a trusted legal advisor for nonprofit organizations in Lake County.
