    communication with building occupants'']'
  hobbies: '[''Gardening (vegetable and flower beds)'', ''Crossword puzzles and Sudoku'', ''Hiking on local trails'', ''Knitting and crocheting'', ''Cooking and experimenting with eco-friendly recipes'',
    ''Volunteer book shelving at the community library'', ''Bird watching at local parks'']'
  career_goals: Mary aims to advance to a supervisory or facilities management role within her organization, leveraging her expertise to oversee multiple sites. She plans to obtain additional certifications
    in environmental health and green building operations, and she is considering completing a bachelor's degree in occupational safety to broaden her career prospects. In the longer term, she dreams of
    starting a small consulting service that helps small businesses implement sustainable cleaning practices while also mentoring younger janitorial staff. She also seeks to develop coping strategies for
    her anxiety, pursuing mindfulness workshops and work‑life balance initiatives.
