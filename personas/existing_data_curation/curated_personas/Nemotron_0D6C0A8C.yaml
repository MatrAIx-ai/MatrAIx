personas:
  professional: Mary Hoque, a senior janitorial specialist with 25 years of experience and OSHA-certified green-cleaning expertise, applies their methodical checklist mindset, meticulous inventory tracking,
    and competitive drive to optimize cleaning protocols across multiple sites while mentoring new staff toward high-quality standards, positioning themselves for a facilities-supervisor role.
  sports: Mary Hoque stays fit by joining the local senior hikers’ club for leisurely treks along the Ralston Reservoir trail, roots for the Denver Broncos and Colorado Avalanche during football and hockey
    seasons, and participates in community garden volunteer days that double as light manual labor workouts.
  arts: Mary Hoque finds creative release knitting intricate scarves while listening to folk classics by Johnny Cash, classical cello works of Yo‑Yo Ma, and the occasional ghazal from their husband’s family
    tradition, and regularly chats about Jane Austen novels at the Littleton library’s book club, blending literary and musical appreciation into quiet evenings.
  travel: Mary Hoque prefers well-planned road trips that balance scenic drives with comfortable lodging, favoring destinations like Rocky Mountain National Park, Banff National Park, Asheville's Blue Ridge
    Mountains, and a family reunion in New Delhi where they savor cultural exchange while keeping travel costs within a modest budget.
  culinary: Mary Hoque enjoys cooking classic comfort meals such as chicken pot pie and meatloaf, experiments with low-waste recipes like roasted vegetable quinoa bowls featuring seasonal zucchini and kale,
    occasionally incorporates fragrant cardamom and turmeric in a nod to their husband’s heritage, and prides themselves on mastering the art of a flawless sourdough starter.
  core: Mary Hoque is a detail-driven, anxiety-prone veteran cleaner who channels competitive ambition into sustainable practices, knits intricate scarves, and balances meticulous budgeting with occasional
    indulgences.
background:
  cultural: Mary grew up in a middle‑class, Anglo‑American family in the Denver metro area and has lived most of her life in the Front Range. Her upbringing emphasized hard work, punctuality, and community
    involvement, values that are reflected in her methodical approach to work. She was raised attending a local Protestant church and participates in community events in Littleton. Through her marriage,
    she has also embraced elements of her husband's South Asian heritage, giving her a broader cultural perspective while still identifying primarily with her white, Colorado‑rooted background.
attributes:
  skills: '[''Floor care and polishing'', ''Restroom sanitation and deep cleaning'', ''Chemical safety and OSHA compliance'', ''Inventory management and procurement'', ''Scheduling and time management'',
