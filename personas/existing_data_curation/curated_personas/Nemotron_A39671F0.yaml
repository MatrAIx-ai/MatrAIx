  career_goals: Sydney aims to move from a front‑line stocker role to a supply‑chain coordinator position within a large retailer, leveraging her hands‑on experience and curiosity to design more efficient
    workflows. She plans to complete her associate degree in business logistics, earn APICS CPIM certification, and eventually become a logistics manager or procurement analyst. In parallel, she hopes to
    develop a side project—a mobile app for real‑time inventory tracking—that satisfies her competitive drive and love for new ideas. Her long‑term ambition is to balance practical outcomes with innovative
    solutions while gaining mentorship and leadership experience.
