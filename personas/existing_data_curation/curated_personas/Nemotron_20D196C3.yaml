  career_goals: Even at 89, Aaliyah remains forward‑looking. Her primary ambition is to preserve and pass on Micronesian traditions to her grandchildren and the broader Cheney community. She plans to compile
    a family recipe book, record oral histories, and teach traditional weaving at a local cultural center. She aims to continue her volunteer service at the senior center, mentoring new volunteers and contributing
    to the advisory board. Maintaining her health, supporting her husband in daily activities, and, if possible, taking a short trip back to her native islands to reconnect with extended family are also
    cherished goals.
