  career_goals: Although she is no longer part of the formal workforce, Ying aims to channel her expertise into community-focused initiatives. She plans to develop and lead a series of free STEM workshops
    for adult learners and high‑school students in the San Mateo area, emphasizing hands‑on problem solving and real‑world applications. She also aspires to author a concise guide on data‑driven decision
    making for small businesses, positioning herself as a trusted mentor within the local entrepreneurial ecosystem. Her competitive spirit drives her to seek recognition as a leading volunteer educator,
    while her calm resilience ensures she can sustain long‑term contributions without burnout.
