personas:
  professional: Terry Ellington is a budding junior architect and creative explorer, whose boundless curiosity fuels daily sketches of imagined worlds and elaborate LEGO constructions, yet their spontaneous
    nature often leads them to abandon a project midway in pursuit of a new idea, making them a delightfully unstructured but innovative little creator.
  sports: Terry Ellington dashes through the fields of the Durham Youth Soccer Club during fall practice, cheers on the Durham Bulls Minor League baseball team at the downtown ballpark on weekends, and
    splashes in community pool swim lessons in the summer, all while favoring spontaneous, unstructured play over rigid drills.
  arts: Terry Ellington immerses themselves in the whimsical illustrations of Dr. Seuss, the calming brushstrokes of Bob Ross’s television lessons, and the catchy tunes of The Wiggles, channeling this inspiration
    into vivid drawings of imagined planets, rhythmic keyboard improvisations, and enthusiastic dance moves during art club meets.
  travel: Terry Ellington prefers spontaneous day trips to nearby green spaces like William B. Umstead State Park, delights in family outings to the Durham Children’s Museum and the National Air and Space
    Museum in Washington, D.C., and dreams of exploring the towering cliffs of the Grand Canyon, though their travel plans often hinge on parental schedules and a modest allowance.
  culinary: Terry Ellington enjoys the comforting taste of macaroni and cheese, the cheesy stretch of pepperoni pizza, and the sweet crunch of apple slices with peanut butter, can assemble a simple peanut
    butter‑jelly sandwich unaided, and loves helping stir batter for chocolate cupcakes, while favoring bright, colorful plates that reflect their artistic flair.
  core: Terry Ellington is a curious, spontaneously creative seven‑year‑old who turns every park visit into an artistic adventure, juggles a modest allowance with occasional splurges, battles mild allergies
    and anxiety with a sketchbook in hand, and delights in LEGO builds, music, and the occasional impromptu dance.
background:
  cultural: Terry is a Black child growing up in Durham, North Carolina, a city known for its deep African-American heritage and vibrant cultural scene. His family takes part in community programs at the
    Durham Community Center that celebrate Black history, such as Juneteenth gatherings, Kwanzaa traditions, and storytelling sessions about local civil-rights leaders. He is often exposed to soulful jazz,
    hip-hop, and gospel music that echo the city’s rich Black musical legacy. Visits to the historic Black Wall Street district, the Duke University African-American archives, and local art festivals reinforce
    a sense of pride and cultural identity. These experiences nurture his curiosity, appreciation for art, and desire to contribute positively to his community.
