  career_goals: Terry dreams of growing up to be an artist who paints vibrant murals that tell stories and make people smile, or an inventor who creates fun gadgets that help friends solve everyday puzzles.
    He also loves the idea of being an explorer who discovers new things in nature and science. He hopes to combine his love of art and curiosity to bring joy to his community, and he wants his creativity
    to help him and others manage feelings of worry and stress as he gets older.
