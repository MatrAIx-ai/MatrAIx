  hobbies: '["Watercolor and acrylic painting (abstract and figurative)", "Acoustic guitar playing (Mexican folk music and improvisation)", "Creative cooking (traditional Mexican recipes with local twists)",
    "Reading magical realism and poetry", "Birdwatching and stargazing", "Volunteering at local library arts programs", "Collecting vintage Mexican folk art", "Rooftop gardening and herb cultivation"]'
  career_goals: Although retired from formal employment, Joel aims to deepen his artistic legacy and cultural impact. He plans to complete a series of abstract paintings for a local Wilmington gallery,
    exploring themes of memory and migration. He also intends to publish a bilingual memoir that weaves his Mexican roots with his American experiences, preserving family stories for future generations.
    Joel hopes to develop a curriculum for community art workshops that blends Mexican folk art techniques with contemporary expression, and to launch a modest online blog featuring his inventive Mexican
    recipes and the stories behind them. Finally, he aspires to mentor at the senior center, fostering creativity and cultural pride among older adults.
