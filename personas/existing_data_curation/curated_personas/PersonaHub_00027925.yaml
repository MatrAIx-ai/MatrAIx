persona_description: A student who is passionate about STEAM education and is interested in integrating science, technology, engineering, art, and mathematics (STEAM) learning areas to develop well-rounded
  students who can think across disciplines to problem-solve and apply learning to real-world scenarios. The student is drawn to the idea of building knowledge and skill through meaningful experiences and
  believes that integrating science, technology, engineering, art, and mathematics curricula helps engage students while providing fun and inspiring new ways to grasp complicated materials. The student
  is also interested in the role of art and design in everyday life and believes that an understanding and appreciation for art helps students profoundly when tackling complex problems and lessons. Additionally,
  the student is interested in the importance of design in many products and technological advances that drive our economy and improve our lives. The student is drawn to the Biome's focus on STEAM education
  and believes that it cultivates an atmosphere of imagination, innovation, and expressiveness, qualities crucial in the development of 21st century leaders.
