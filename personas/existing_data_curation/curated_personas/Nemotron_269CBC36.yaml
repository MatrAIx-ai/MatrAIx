  career_goals: Although retired, Fiorella’s ambitions focus on preserving her cultural legacy and staying active in her community. She hopes to compile a family recipe book that blends traditional dishes
    with a few new twists she discovers, teach small cooking workshops at the local senior center, and learn basic digital photography to capture family moments. Maintaining her independence, health, and
    daily routines remains a priority, as does deepening her relationships with grandchildren by sharing stories and language. She also aspires to volunteer occasionally in community meals, ensuring that
    her generosity continues to benefit others.
