personas:
  professional: Trevor Hitesman, a 17‑year‑old community volunteer, leverages strong interpersonal skills and hands‑on mechanical know‑how to lead youth basketball clinics and organize church events while
    eyeing a future as a CNA or EMT where routine and compassion can combine, even if they sometimes let paperwork slip through the cracks.
  sports: Trevor Hitesman coaches the Eastwood Eagles youth basketball program, spends Saturday mornings fishing on Lake Meridian, and avidly follows the Cityville Cyclones NFL team, balancing a love for
    team sports with occasional solo jogs to stay fit.
  arts: Trevor Hitesman curates indie‑folk playlists featuring The Lumineers and Billie Eilish for community center game nights, enjoys strategic board games such as Catan, and occasionally sketches comic
    panels inspired by video‑game heroes during late‑night gaming sessions.
  travel: Trevor Hitesman prefers low‑cost road trips, having road‑tripped to the Great Smoky Mountains with friends and dreaming of a future solo camping adventure in Yellowstone, while often planning
    future visits to coastal fishing spots in Florida when summer vacation arrives.
  culinary: Trevor Hitesman enjoys whipping up hearty meals like spaghetti carbonara and fish tacos with fresh lake‑caught bass for church youth gatherings, but frequently forgets to clean the kitchen afterward,
    leaving a lingering scent of grilled onions.
  core: Trevor Hitesman is a sociable, routine‑loving teen who balances community service with video‑game marathons, often juggling late‑night gaming with early‑morning fishing trips, and occasionally forgets
    to file school paperwork on time.
background:
  cultural: Trevor grew up in the small, working‑class town of Factoryville, PA, a community with deep roots in manufacturing and mining. His family is of Anglo‑American heritage, tracing back to German
    and Irish immigrants who settled in the region in the early 20th century. He was raised in a modest, Protestant (Methodist) household that emphasized hard work, reliability, and community service. Local
    traditions—such as attending church events, participating in high school sports, and supporting local fairs—shaped his values of practicality, routine, and helping neighbors. The close‑knit nature of
    Factoryville has reinforced his sociable and compassionate character.
