  career_goals: Trevor aims to earn his GED within the next year and then pursue a certification as a Certified Nursing Assistant (CNA) or Emergency Medical Technician (EMT) so he can combine his desire
    to help others with a stable, routine‑oriented career. He also envisions joining the local volunteer fire department, gaining hands‑on experience in emergency response and community service. Long‑term,
    he hopes to secure a full‑time position in the healthcare or public safety sector, eventually moving into a supervisory role where he can mentor younger volunteers and promote a supportive, cooperative
    work environment.
