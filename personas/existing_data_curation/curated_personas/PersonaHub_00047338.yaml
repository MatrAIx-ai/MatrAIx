persona_description: A golf course enthusiast who is interested in the conservation and restoration of degraded ecosystems, the study of native flora and fauna, and the importance of golf courses as spaces
  for environmental education and restoration. They appreciate the unique characteristics and ecological benefits of golf courses, such as the creation of ecotones and the restoration of degraded ecosystems.
  They are knowledgeable about the impact of golf courses on biodiversity, water birds, insects, amphibians, reptiles, and other wildlife, and are interested in the role of golf courses as a vector for
  environmental education.
