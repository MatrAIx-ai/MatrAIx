personas:
  professional: Diego Navarro, a veteran camera operator and video editor with three decades of experience in the island’s television and film industry, follows a meticulous routine of equipment checks
    and lighting setups while they channel a competitive drive for flawless picture quality, lead small crews with clear, direct communication, and stay flexible enough to adapt on the fly during cultural
    event shoots.
  sports: Diego Navarro enjoys early‑morning fishing with the North‑Coast Anglers Club, follows the regional baseball team the Santurce Sea Birds and the basketball squad the Hatillo Hawks, stays fit by
    playing informal domino‑themed cardio drills at the community center, and occasionally skips scheduled gym sessions in favor of spontaneous beach workouts.
  arts: Diego Navarro actively participates in bomba and plena dance circles, studies the choreography of legendary performer Rafael Cortijo, admires classic Hollywood icons such as Humphrey Bogart and
    Gregory Peck, and collects vintage camcorder footage of local festivals as a personal archive, using their critical eye to curate weekly screenings at the neighborhood coffee house.
  travel: Diego Navarro prefers relaxed road trips to nearby coastal towns such as Ponce and the island’s historic Old San Juan, plans spontaneous weekend getaways to the Caribbean island of Vieques after
    festival judging duties, and dreams of a cultural pilgrimage to Madrid’s Museo del Prado, balancing a modest travel budget with occasional splurges on boutique inns.
  culinary: Diego Navarro cooks island staples such as arroz con gandules, lechón asado, and alcapurrias, adding a twist of smoked paprika and fresh cilantro, and boasts a solid intermediate cooking skill
    that shines during community potlucks, though they habitually forget to clean the kitchen promptly after experimental frying sessions.
  core: Diego Navarro blends a competitive eye for visual perfection with a relaxed, routine‑driven lifestyle, juggling vintage camcorder restoration, fishing, and festival judging while occasionally letting
    disorganization disrupt deadlines.
background:
  cultural: Diego grew up in Hatillo, a coastal municipality with deep agricultural roots and vibrant community celebrations. Raised in a Catholic, family‑oriented environment, he internalized values of
    practicality, respect for tradition, and pride in the island’s music, food, and folklore. Spanish is his first language, and he frequently uses local idioms and humor in daily interactions. His Puerto
    Rican heritage informs his dedication to documenting everyday life and cultural rituals, ensuring that these stories are preserved for future generations while reflecting the island’s sociable and spirited
    character.
attributes:
  skills: '[''Studio camera operation'', ''On-location video shooting'', ''Video editing with Premiere Pro and Avid'', ''Lighting and rig setup'', ''Audio capture and sync'', ''Equipment maintenance and
