  hobbies: '[''Fishing'', ''Bomba and plena dancing'', ''Playing dominoes'', ''Cooking traditional Puerto Rican meals'', ''Collecting vintage camcorders'', ''Volunteering at local festivals'', ''Watching
    classic cinema'', ''Socializing at community coffee shops'']'
  career_goals: Diego aims to cement his reputation as the go‑to camera operator and video editor for culturally significant productions in Puerto Rico. Over the next few years he plans to lead a series
    of documentary projects that capture Hatillo’s festivals and oral histories, mentor younger crew members, and eventually transition to freelance work that lets him choose projects aligned with his personal
    interests—such as preserving Puerto Rican culinary traditions on film. He also aspires to earn a regional broadcasting award and see his work featured on a national Spanish‑language network, thereby
    solidifying a lasting legacy of practical, high‑quality storytelling.
