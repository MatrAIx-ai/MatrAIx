persona_description: A gardener or a botanist who is interested in the propagation, care, and maintenance of Rudbeckia fulgida, commonly known as Black-eyed Susan or Orange coneflower. They are likely to
  have experience with dividing and controlling the spread of the plant, and are familiar with the pests and diseases that can affect the plant. They may also have knowledge of the plant's habits, such
  as its spreading by rhizomes and seed, and its favorite winter food, the ripe seed of the finches. They may have a special interest in the plant's flowers, which are a favorite of finches, and may be
  interested in propagating the plant by division.
