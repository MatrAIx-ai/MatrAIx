  hobbies: '[''Strategy video games'', ''LEGO and model building'', ''Reading mystery/science‑fiction novels'', ''Chess'', ''Hiking'', ''Robotics workshops'', ''Piano'', ''Journaling'']'
  career_goals: Short‑term, Louis aims to improve his coding skills, earn a recognized Python certification, and maintain a high GPA while refining his study habits to reduce anxiety about grades. Long‑term,
    he envisions a career in software engineering or data analysis, drawn to roles that offer clear structure, predictable problem‑solving processes, and the opportunity to work on tangible projects. He
    also hopes to gain real‑world experience through a summer internship or volunteer position at a local tech company, building a portfolio that demonstrates reliability and attention to detail.
