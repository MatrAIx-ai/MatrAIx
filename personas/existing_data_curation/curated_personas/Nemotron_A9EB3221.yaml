personas:
  professional: Jonathan Moore, a 57‑year‑old wealth‑management specialist with a STEM graduate background, blends rigorous financial planning, tax strategy, and ESG‑focused alternative investing with a
    flair for cultural enrichment, using tools like MoneyGuidePro and AI‑driven analytics to craft bespoke portfolios that often incorporate art collectibles and impact‑oriented assets while maintaining
    a relaxed, client‑centric, and adaptable advisory style, and they regularly leverage their sociable network to bring art‑focused seminars to clients.
  sports: Jonathan Moore fuels their fitness through seasonal activities like forested hikes around Lake Superior with the Lake Superior Hiking Club, cross‑country skiing on the Upper Peninsula’s snow‑blanketed
    trails during winter, and occasional pick‑up basketball games at the community center, while cheering on the Detroit Lions, Detroit Red Wings, and the Michigan Tech Huskies, and they blend personal
    outdoor vigor with regional sports loyalty.
  arts: Jonathan Moore immerses themselves in the arts by regularly attending exhibitions at the Northern Michigan Art Center and the Lake Michigan Repertory’s production of A Streetcar Named Desire, collecting
    limited‑edition prints from emerging talents like Lena Ortiz and Megan L. Sullivan, while bringing their own folk fiddle flair to weekly jam sessions that feature tunes by Old Crow Medicine Show and
    Bob Dylan, and they frequently cite the storytelling of playwright August Wilson as a source of inspiration.
  travel: Jonathan Moore prefers group‑oriented, art‑centric travel, joining curated tours to destinations such as the Venice Biennale, Art Basel Miami, and the Gwangju Biennale, while also savoring regional
    getaways to Door County and Mackinac Island, and they plan their trips loosely around workshop schedules and a modest travel budget that balances their semi‑retirement desire for cultural immersion
    with careful expense management.
  culinary: Jonathan Moore enjoys a farm‑to‑table culinary scene, often whipping up smoked whitefish chowder and roasted beet salad with goat cheese using vegetables from their own garden, while experimenting
    with home‑brewed American Pale Ales flavored with Cascade hops and savoring New York Finger Lakes Pinot Noir and Michigan Leelanau Peninsula Chardonnay alongside local craft beers like Founders All‑Day
    IPA, and they frequently pair these drinks with fresh‑picked herbs from the garden.
  core: Jonathan Moore, a 57‑year‑old wealth‑manager‑artist hybrid, fuses financial savvy with folk fiddling, craft brewing, and spontaneous art‑focused travel, all while habitually misplacing their vintage
    camera and juggling a delightfully disorganized schedule that never dims their sociable, curiosity‑driven spark, and they continually seek new ways to blend numbers with culture.
background:
  cultural: Born and raised in Garden, a small community in Michigan's Upper Peninsula, Jonathan grew up within a predominantly white population with deep Finnish and German ancestry. The region's heritage
    of mining, lumber, and lake-nation life cultivated values of self-reliance, modesty, and a strong connection to the rugged natural environment. Family life was shaped by Lutheran traditions, hearty
    communal meals, and storytelling about local history. While his upbringing emphasized hard work and community cohesion, his extensive travels and appreciation for the arts have broadened his cultural
    perspective, fostering a respectful curiosity toward diverse artistic expressions and unconventional ideas.
attributes:
  skills: '["Financial Planning", "Investment Management", "Tax Strategy", "Retirement Planning", "Estate Planning", "Risk Assessment", "Behavioral Finance Application", "Alternative Investment Advisory",
