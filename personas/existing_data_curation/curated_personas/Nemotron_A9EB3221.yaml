  hobbies: '["Visiting art galleries and theatre productions", "Collecting art prints", "Landscape photography", "Hiking in the Upper Peninsula", "Playing folk fiddle", "Bridge at community center", "Traveling
    to international art festivals", "Volunteering for financial-literacy workshops", "Craft brewing and wine tasting", "Gardening"]'
  career_goals: Jonathan aims to evolve his practice into a boutique advisory firm that blends traditional wealth management with cultural and artistic enrichment. He seeks to become a regional thought
    leader on integrating ESG and alternative assets, author a guide on financial wellness for creative professionals, and mentor emerging advisors within his firm. A key ambition is to expand community
    outreach by delivering free financial-literacy workshops throughout Delta County and the Upper Peninsula. Over the next five years, he plans to adopt advanced analytics and AI tools to personalize client
    plans, while gradually shifting to a semi-retirement schedule that grants him more flexibility for travel, art projects, and personal growth.
