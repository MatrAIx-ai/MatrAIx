  career_goals: Marion aims to advance to a senior market research manager role within the next five years, leading cross‑functional teams and shaping strategic consumer insight initiatives for a major
    consumer‑goods or tourism brand. She plans to earn a bachelor’s degree in marketing or business administration and obtain professional certifications such as the Certified Market Research Analyst (CMRA)
    and Google Analytics. Long‑term, Marion envisions launching her own boutique consulting firm that blends data‑driven insights with creative brand storytelling, focusing on businesses in the Gulf Coast
    tourism sector. She also hopes to become a recognized thought leader in the field through speaking engagements at industry conferences and publishing articles on innovative research methodologies.
