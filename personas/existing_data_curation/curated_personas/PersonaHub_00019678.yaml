persona_description: A healthcare professional who specializes in pediatrics, particularly in the diagnosis and treatment of failure to thrive in infants and children. They have extensive knowledge of the
  medical causes and treatments for failure to thrive, as well as the impact on children's physical and mental development. They are knowledgeable about the importance of proper nutrition, family relationships,
  and living conditions in the treatment of failure to thrive. They are also skilled in identifying and treating medical conditions that may contribute to failure to thrive. They are trained to recognize
  signs of failure to thrive in infants and children, and to provide appropriate treatment and support. They are also knowledgeable about the importance of regular check-ups and appointments with healthcare
  providers to detect and treat failure to thrive in children.
