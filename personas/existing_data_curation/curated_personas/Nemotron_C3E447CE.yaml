  career_goals: Ileana dreams of attending a specialized arts high school where she can deepen her skills in illustration and multimedia design. She hopes to study graphic design or concept art in college
    and eventually work as a visual storyteller for video games, animated films, or as a museum exhibit designer. She also imagines using her creativity to raise awareness about environmental issues through
    community art projects, blending her love for art with a desire to make a positive impact.
