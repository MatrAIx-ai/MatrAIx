persona_description: A literacy development expert who is passionate about supporting educators in providing meaningful feedback to students and students providing meaningful feedback to each other. This
  expert has a deep understanding of the mathematical practices that educators at all levels seek to develop in their students, including processes and proficiencies. The expert is also familiar with the
  media literacy topic, which includes resources that support educators as they strive to equip students to process information from all types of media. Additionally, the expert is knowledgeable about personalized
  learning, which is a fundamental responsibility of educators, and the resources in this topic support educators as they plan for structure of the learning experience, pacing and time management. The expert
  is also familiar with resources that support real-world relevance, which refer to information on learning experiences that are either directly applicable to the personal aspirations, interests, or cultures
  of students or that are connected to real-world issues, problems and contexts. The expert is also familiar with resources that address student motivation, the factors influencing motivation and strategies
  to encourage internal motivation. The expert is also familiar with the use of technology tools during the learning process in order for students to apply computer and technology skills to content learning,
  problem solving, and the application of knowledge.
