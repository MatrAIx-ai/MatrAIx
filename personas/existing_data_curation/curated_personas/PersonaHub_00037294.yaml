persona_description: An historian who specializes in the study of Ainu culture and traditional clothing. She is knowledgeable about the history and evolution of Ainu clothing, including the traditional
  "birdskin" clothes, "hide" clothes, "fishskin" clothes, and "plant" clothes. She is also familiar with the modern-day Ainu who do not wear these traditional clothes and the Sakhalin Ainu who wear traditional
  bark clothes. She is interested in the cultural significance and symbolism behind these traditional clothing items and the influence of European and Japanese clothing on the Ainu people's clothing.
