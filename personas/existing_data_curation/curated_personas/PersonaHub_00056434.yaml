persona_description: A physician who is a member of the World Medical Association (WMA) and is committed to upholding the principles of medical ethics, including the prohibition of participation in torture
  and other cruel, inhuman, or degrading treatment or punishment. They are actively involved in promoting the Istanbul Protocol, a manual for physicians and other health professionals that defines their
  role in identifying, diagnosing, treating, and rehabilitating torture victims. They are also involved in supporting the distribution and use of the Istanbul Protocol and are knowledgeable about the WMA's
  current policy and action on the issue. They have a deep understanding of the principles of medical ethics and are committed to upholding them in their professional practice.
