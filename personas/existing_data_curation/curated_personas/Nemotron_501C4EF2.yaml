    under pressure'',''Documentation and regulatory compliance'',''Medical terminology and anatomy knowledge'']'
  hobbies: '[''Watercolor painting'',''Landscape photography'',''Hiking in the Wasatch Range'',''Reading art‑history books'',''Genealogy research'',''Knitting'',''Crossword puzzles'',''Attending intimate
    art workshops'',''Volunteering art instruction at community senior center'']'
  career_goals: Approaching retirement, Summer aims to transition from full‑time duties to a part‑time mentorship role, acquiring the Certified Surgical Technologist (CST) credential to formalize her expertise.
    She aspires to lead a safety‑improvement committee at her hospital, focusing on instrument tracking and infection control, and to volunteer as an educator for community health programs that introduce
    high‑school students to medical careers. Long‑term, she hopes to consult with medical‑device manufacturers on user‑friendly design improvements for rural clinics.
