personas:
  professional: Summer Holden, a veteran surgical technologist with over thirty years of OR expertise, combines meticulous instrument sterilization and rapid tray assembly with a competitive edge that drives
    them to mentor newcomers and champion infection‑control innovations as they transition toward a part‑time CST‑certified role.
  sports: Summer Holden stays fit by hiking the Wasatch Trail network in summer, joining the senior members of the Wasatch Trail Hikers club, cheering for the Utah Jazz and Real Salt Lake while occasionally
    attending Utah Utes women's cross‑country meets, and they practice gentle yoga at the local community center during winter.
  arts: Summer Holden spends quiet mornings painting Utah mountain vistas in watercolor, draws inspiration from Claude Monet’s Water Lilies and Ansel Adams’ black‑and‑white landscapes, devotes weekends
    to attending Springville Museum of Art workshops featuring works by John Singer Sargent, and they curate a personal collection of limited‑edition prints by contemporary artist David Hockney.
  travel: Summer Holden prefers meticulously planned road trips, charting routes on vintage paper maps, and they have recently road‑tripped from Salt Lake City to the sea cliffs of Big Sur, while dreaming
    of a spring pilgrimage to Kyoto’s historic Gion district and a leisurely summer stay in Santorini’s white‑washed villages.
  culinary: Summer Holden enjoys an intermediate level of cooking, regularly preparing rosemary‑infused lamb stew with root vegetables, huckleberry scones for the senior center’s bake‑sale, and a delicate
    trout almondine seasoned with fresh sage, while they savor occasional fine‑dining outings for a Utah peach cobbler at a local bistro.
  core: Summer Holden blends a surgical technologist’s exacting precision with a watercolor artist’s quiet curiosity, a competitive crossword streak, and they habitually catalog every new trail photo in
    a well‑organized scrapbook.
background:
  cultural: Summer grew up in Springville, Utah, a small town renowned as the state's "Art City" and steeped in a largely Mormon cultural heritage. While she respects the community's emphasis on service,
    family, and modesty, she cultivated an independent appreciation for artistic expression and scientific inquiry. Her white, Midwestern‑American upbringing blended traditional values with an openness
    to new ideas, shaping a worldview that balances conservatism with curiosity. The surrounding Utah landscape, with its outdoor recreation culture and close‑knit social networks, has instilled in her
    a love of nature, self‑reliance, and modest community involvement.
attributes:
  skills: '[''Operating room aseptic technique'',''Surgical instrument sterilization and handling'',''Setup of surgical trays and equipment'',''Patient positioning and preparation'',''Intra‑operative assistance
