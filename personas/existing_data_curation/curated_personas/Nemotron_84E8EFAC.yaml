personas:
  professional: Magali Candelaria, a veteran construction specialist with three decades of hands‑on experience, merges concrete‑mixing mastery, blueprint fluency, and bilingual crew coordination into a
    relaxed, safety‑first leadership style that leans on improvisation and a love for infusing sustainable, artistic designs into every project.
  sports: Magali Candelaria, an avid hiker who belongs to the Ruta Verde Trail Club, roots for the Cangrejeros de Santurce baseball team and the Puerto Rico national basketball squad, and squeezes early‑morning
    yoga and low‑impact cardio into a flexible fitness routine that balances weekend treks through the Cordillera Central with occasional community softball games.
  arts: Magali Candelaria, a watercolor hobbyist who channels the vivid hues of Frida Kahlo and the street‑level storytelling of Banksy into coastal and mountain scenes, spends Saturday nights dancing bomba
    and joining a neighborhood drum circle, and volunteers to co‑paint community murals inspired by the communal spirit of Diego Rivera.
  travel: Magali Candelaria favors spontaneous, eco‑conscious trips, often swapping a weekend hike in the Cordillera Central for a sudden ferry ride to a nearby island, while dreaming of exploring the terracotta
    rooftops of Santorini and the Patagonian trails of Chile, always balancing adventure with the modest budget of a near‑retirement phase.
  culinary: Magali Candelaria, an enthusiastic home cook, blends Caribbean flavors such as sofrito, plantains, and coconut milk into dishes like arroz con gandules and mango‑chile salsa, while their garden
    yields fresh cilantro, oregano, and purple sweet potatoes that inspire weekly experimental supper parties.
  core: Magali Candelaria is a seasoned builder turned community‑focused artist, whose relaxed, curiosity‑driven spirit fuels a life of watercolor vistas, spontaneous mural collaborations, and a steady
    march toward a sustainable contracting venture, all while wobbling between meticulous safety briefings and occasional missed bill payments.
background:
  cultural: Magali was born and raised in the adjacent municipalities of Vega Alta and Morovis on the island of Puerto Rico. She grew up in a close‑knit family where Spanish was spoken at home, but she
    learned English through school and work with mainland contractors. The island’s blend of Spanish colonial heritage, African rhythmic traditions, and Taino indigenous roots shaped her worldview; the
    lively music of bomba and plena, colorful street murals, and the tradition of community fiestas left lasting impressions. Her upbringing emphasized cooperation, respect for elders, and a strong sense
    of community solidarity, values she carries into her construction work and volunteer activities. Although never married, she maintains deep connections with her extended family and neighborhood, often
    serving as a supportive presence during celebrations and mutual‑aid efforts.
attributes:
  skills: '[''Concrete Mixing and Finishing'', ''Formwork Carpentry'', ''Basic Masonry'', ''Blueprint Reading'', ''OSHA 10-hour Safety Certification'', ''Bilingual Communication (Spanish–English)'', ''Team
    Coordination and Conflict Mediation'', ''Operation of Light Construction Equipment'']'
  hobbies: '[''Watercolor Painting'', ''Bomba and Plena Dancing'', ''Hiking in the Cordillera Central'', ''Gardening with Native Plants'', ''Reading on Sustainable Architecture'', ''Participating in Community
    Mural Projects'']'
  career_goals: Magali aims to transition into a supervisory role such as foreman or site supervisor within the next two years. To support this goal she plans to obtain the OSHA 30‑hour certification and
    a certified construction manager credential through evening courses offered locally. She also hopes to mentor younger workers, especially women and members of the Puerto Rican community, by establishing
    a small apprenticeship program in partnership with a local vocational center. In the longer term she envisions launching her own modest contracting business that blends sustainable building practices
    with community art installations, turning vacant lots into collaborative murals and green spaces.
