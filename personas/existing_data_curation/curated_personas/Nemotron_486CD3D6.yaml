    and Creative Thinking"]'
  hobbies: '["Visiting art galleries and museums", "Sketching architectural concepts", "Hiking in the Texas Hill Country", "Yoga and mindfulness meditation", "Community volunteering (art in public spaces)",
    "Cooking experimental cuisines", "Reading contemporary literature", "Traveling to historic European cities", "Photography", "Playing acoustic guitar"]'
  career_goals: Andrea aims to advance to a senior executive role, such as Director of Design or Vice President of Architecture, where she can shape the firm’s strategic vision and champion innovative,
    sustainable, and socially responsible projects. She intends to foster a culture that values artistic exploration and interdisciplinary collaboration, mentor the next generation of women engineers and
    architects, and lead high-profile civic projects that enhance community wellbeing. In the longer term, she envisions launching her own boutique studio that integrates art, technology, and community-centric
    design, while maintaining a balanced lifestyle that mitigates stress.
