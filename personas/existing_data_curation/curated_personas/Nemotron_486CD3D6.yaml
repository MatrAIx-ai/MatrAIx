personas:
  professional: Andrea Watkins is a senior architectural project manager who leverages their engineering leadership, BIM expertise, and love for artistic exploration to guide multidisciplinary teams in
    delivering sustainable, community-focused designs while constantly negotiating client expectations with a flexible, compassionate approach.
  sports: Andrea Watkins fuels their fitness regimen with weekend hikes in the Texas Hill Country and morning yoga, belongs to the Hill Country Hiking Club, supports the San Antonio Spurs and the Austin
    FC, and joins a community adult soccer league each spring to balance disciplined training with social interaction.
  arts: Andrea Watkins enriches their creative life by sketching architectural studies at local galleries, photographing historic facades, and diving into the works of Ansel Adams, Zaha Hadid, and contemporary
    author Margaret Atwood, while regularly attending performances by the Austin Symphony and listening to indie folk artists like Sufjan Stevens for inspiration.
  travel: Andrea Watkins curates travel experiences that blend historic immersion and artistic discovery, having explored Florence’s Renaissance palazzos, the medieval streets of Prague, and the vineyards
    of the Loire Valley, while planning future trips to Barcelona’s modernist architecture and the coastal villages of Portugal, often balancing solo wanderings with family-friendly itineraries.
  culinary: Andrea Watkins approaches cooking as experimental lab work, frequently crafting sous-vide salmon with miso glaze, heirloom tomato tarts with smoked mozzarella, and fermented hot-chili jam, while
    sourcing ingredients like sumac, Oaxaca cheese, and locally foraged mushrooms at the Hill Country farmers' market.
  core: Andrea Watkins is an architect-engineer who fuses artistic curiosity with meticulous project leadership, combats chronic worry through mindful routines, and occasionally over-organizes both their
    spreadsheets and their spice rack.
background:
  cultural: Andrea grew up in a middle‑class suburban environment in the Dallas‑Fort Worth metroplex, rooted in a white American family with European (German and Irish) ancestry. Her upbringing blended
    Southern hospitality and a strong sense of community with a progressive appreciation for cultural arts. The Texas setting exposed her to both expansive natural landscapes and a vibrant urban arts scene,
    fostering her love of architecture and design. Her graduate studies in arts and humanities further deepened her appreciation for cultural history and interdisciplinary thinking, shaping her compassionate,
    collaborative outlook.
attributes:
  skills: '["Architectural Project Management", "Sustainable Design Practices", "Building Information Modeling (Revit, AutoCAD)", "Team Leadership and Mentoring", "Client Relations and Stakeholder Communication",
