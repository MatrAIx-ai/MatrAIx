  hobbies: '[''drawing'', ''watercolor painting'', ''digital sketching'', ''reading illustrated books'', ''building LEGO'', ''science experiments'', ''visiting art museum'', ''art club'', ''nature walks'',
    ''nature journaling'', ''Scratch coding'', ''board games'']'
  career_goals: Deanna dreams of becoming a children’s book illustrator, combining her love for art and storytelling to bring characters to life. She hopes to study graphic design in high school and later
    at a university, eventually working for a publishing house or creating her own series of picture books. She also wants to use her empathy to create stories that help other kids understand and cope with
    strong feelings.
