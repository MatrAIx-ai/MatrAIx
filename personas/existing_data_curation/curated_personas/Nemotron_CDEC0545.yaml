personas:
  professional: Deanna Hubbard is a budding junior illustrator and aspiring game designer who channels their methodical planning and boundless curiosity into detailed cartoon sketches and simple Scratch
    games, and they use their organized approach to meticulously draft storyboards while their emotional sensitivity fuels vivid, expressive characters.
  sports: Deanna Hubbard enthusiastically participates in the Oakwood Fireflies youth soccer league and attends weekly gymnastics classes at the Little Stars Club, balancing their organized training routine
    with nature walks in the nearby state park where they journal observations, and they avidly follow the Chicago Cubs and Golden State Warriors, often mimicking their moves during recess games.
  arts: Deanna Hubbard immerses themselves in the whimsical worlds of Dr. Seuss, the vibrant watercolors of Mary Blair, and the enchanting animation of Hayao Miyazaki, while they regularly sketch characters
    inspired by Pixar’s "Toy Story" and listen to the playful scores of "Frozen," weaving these influences into their own cartoon creations and weekend art‑club projects.
  travel: Deanna Hubbard enjoys family‑planned weekend getaways to the local natural history museum and the nearby state park where they keep a travel journal, dreams of exploring the Louvre in Paris and
    the bamboo forests of Kyoto, and prefers itineraries that blend hands‑on art workshops with outdoor adventures, all while balancing their parents’ budget and school schedule.
  culinary: Deanna Hubbard delights in whipping up bright vegetable sushi rolls with avocado and cucumber, assembling rainbow fruit kebabs of strawberries, grapes, and pineapple, and baking chocolate‑chip
    cookies with a sprinkle of sea salt, while their go‑to meals include cheesy macaroni, peanut‑butter banana sandwiches, and a favorite splash of strawberry‑banana smoothies, and they often share these
    creations with friends during playdates.
  core: Deanna Hubbard is an endlessly curious, meticulously organized nine‑year‑old whose vibrant imagination fuels cartoon creations, yet their heightened anxiety often turns routine art projects into
    emotional rollercoasters, and they sometimes need extra reassurance from adults.
background:
  cultural: Deanna grows up in Tinley Park, a suburban community in Cook County, Illinois, where Midwestern American values of friendliness, community involvement, and modesty are part of daily life. Her
    family celebrates holidays such as Thanksgiving, Fourth of July, and Christmas with shared meals and local traditions, and they often participate in school and neighborhood events. While her ethnic
    background is white, her heritage includes roots in German and Irish ancestry common to the region, giving her an appreciation for family stories, seasonal festivals, and a close‑knit neighborhood culture.
