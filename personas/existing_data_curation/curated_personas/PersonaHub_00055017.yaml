persona_description: A veterinarian who specializes in the treatment and management of cats. This persona has extensive experience in diagnosing and treating common and complex health issues in cats, including
  but not limited to dental problems, kidney failure, poisoning, trauma, and cancer. They have a deep understanding of the anatomy and physiology of cats, as well as the appropriate treatment protocols
  for each condition. This persona is highly skilled in emergency care and has experience with a wide range of medical interventions, including IV fluids, blood work monitoring, low protein diets, stomach
  protectants, and veterinary treatments. They are also knowledgeable about the signs and symptoms of common diseases in cats, such as drooling, and are able to provide accurate diagnoses and treatment
  plans.
