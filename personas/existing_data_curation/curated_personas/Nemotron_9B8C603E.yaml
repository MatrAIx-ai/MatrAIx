  hobbies: '[''Strategy video gaming'', ''LEGO Technic building'', ''Chess'', ''Small‑group soccer'', ''Cooking traditional Mexican food'', ''Celebrating cultural holidays'']'
  career_goals: Jose hopes to pursue a career in engineering, preferably civil or mechanical, where he can apply his love for building things and solving practical problems. He is also intrigued by computer
    science and envisions becoming a software developer who designs reliable applications. In the short term, he aims to join his high school's robotics club, earn advanced placement in math and science,
    and secure an internship or mentorship with a local engineering firm. His competitive nature drives him to aim for top grades and leadership positions in any technical project he undertakes.
