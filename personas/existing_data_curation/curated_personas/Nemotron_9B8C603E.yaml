personas:
  professional: Jose Valle is a junior high student aspiring to become a game designer, using spreadsheets to meticulously plan custom Civilization scenarios and LEGO Technic builds, reflecting their love
    for structure, competitive edge, and methodical problem‑solving.
  sports: Jose Valle plays soccer with the local Cucamonga United youth club, preferring tightly controlled small‑team drills over full‑field scrimmages, and follows the LA Galaxy and Manchester City for
    inspiration, showing their competitive nature and preference for structure in training.
  arts: Jose Valle enjoys listening to traditional folk ensembles such as Los Churumbeles and the lively brass of mariachi bands during family gatherings, while also appreciating cinematic scores by John
    Williams and video game compositions by Koji Kondo, reflecting a blend of cultural roots and modern creative influences.
  travel: Jose Valle favors meticulously planned road trips, having explored the Grand Canyon and a weekend stay in San Diego's seaside boardwalk, while dreaming of a future adventure to Tokyo for its neon
    streets and to the historic European city of Barcelona to experience its iconic architecture and vibrant festivals.
  culinary: Jose Valle enjoys helping prepare hand‑shaped corn tortillas for carnitas tacos and steaming sweet tamales with masa and pork, often seasoning them with fresh cilantro, lime, and smoky chipotle,
    and they take pride in mastering the perfect guacamole dip, reflecting a practical, hands‑on love for family‑rooted recipes.
  core: Jose Valle blends a competitive, methodical mind with a love for structured games, tiny soccer drills, and family traditions, while secretly hoarding spare LEGO pieces in a hidden drawer and meticulously
    tracking every allowance cent.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in Rancho Cucamonga, California. He grows up in a bilingual household where Spanish is spoken daily, giving him a strong connection to Mexican
    customs and values. Family gatherings often feature traditional foods, music such as mariachi and regional folk tunes, and celebrations of holidays like Día de los Muertos and Mexican Independence Day.
    While he is fully integrated into American school life, he maintains close ties to his Mexican heritage through language, cuisine, and community events at the local Hispanic cultural center.
attributes:
