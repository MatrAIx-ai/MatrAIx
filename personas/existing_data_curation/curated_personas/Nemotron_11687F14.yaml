  career_goals: Elena's emerging imagination hints at future aspirations. She often watches picture books with vivid illustrations and pretends to 'draw' with her fingers, suggesting a budding desire to
    become an artist or storyteller who celebrates her cultural heritage. Her natural inclination to comfort other children and share toys points toward a later ambition to work as a caregiver, teacher,
    or community helper who nurtures harmony and cooperation. She also expresses a simple wish to protect the backyard birds she loves watching, hinting at an early environmental stewardship mindset.
