  hobbies: '[''gardening'', ''woodworking'', ''reading historical biographies'', ''cooking Honduran cuisine'', ''watching soccer'', ''church community volunteering'', ''journaling'', ''walking in nature'']'
  career_goals: Pablo aims to obtain his GED and enroll in a community-college certification program for residential maintenance, with the long-term goal of launching a part-time home-repair service that
    serves seniors and low-income families in Lenoir County. He also hopes to secure a stable, structured position as a maintenance technician at a local school or small business, where his methodical approach
    and reliability can be fully utilized. In parallel, he plans to establish a regular routine of therapy, mindfulness exercises, and physical activity to better manage his anxiety and emotional reactivity,
    and eventually mentor younger Hispanic immigrants who are navigating similar life transitions.
