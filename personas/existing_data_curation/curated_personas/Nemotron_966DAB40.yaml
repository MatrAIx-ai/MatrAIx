personas:
  professional: Tina Lang, a diligent middle school student with a penchant for structured storytelling, channels her love of fantasy novels and sketching into detailed comic panels for the school newspaper
    while they reliably organize youth group events.
  sports: Tina Lang, a spirited midfielder for the Riverside Rangers U‑13 soccer team, dribbles through weekend practices with friends at the community field and cheers for the hometown Eagles during Friday
    night high school games, while they also follow the national women’s league’s Portland Thorns for inspiration.
  arts: Tina Lang, a budding illustrator inspired by J.K. Rowling’s magical worlds and the whimsical art of Studio Ghibli, spends afternoons sketching enchanted characters and practicing piano pieces by
    Beethoven and Yiruma, while they find harmony between visual and musical expression.
  travel: Tina Lang, who has road‑tripped with family to the towering cliffs of Grand Canyon National Park and dreams of visiting the Harry Potter Studio Tour in London, balances school obligations with
    a love for weekend getaways that blend nature hikes and immersive fantasy‑themed attractions, while they often plan trips using detailed checklists to satisfy their need for structure.
  culinary: Tina Lang, a novice baker who perfects chocolate‑chip cookies by adding a pinch of sea salt and experimenting with oat flour, enjoys decorating them with smiley faces using royal icing, and
    often gifts the treats to volunteers at the animal shelter and members of the church youth group, while they keep a secret notebook of recipe tweaks and sometimes forget to clean up the kitchen in their
    excitement.
  core: Tina Lang navigates adolescence with a structured, compassionate mindset, juggling fantasy‑filled imagination, disciplined schoolwork, and a habit of meticulously planning every cookie batch and
    soccer drill, while they constantly check their to‑do list.
background:
  cultural: Tina was raised in a Southern, Christian, white family in Bossier City, Louisiana. Her upbringing reflects the region's emphasis on hospitality, community involvement, and family gatherings
    centered around traditional Southern cuisine such as gumbo, po'boys, and fried catfish. She celebrates local customs like Mardi Gras and the excitement of high school football games, and attends weekly
    church services where she engages in youth group outreach. While her cultural identity is primarily Anglo-American, she is also influenced by the surrounding Cajun and Creole flavors evident in the
    food and music of her community, shaping a blend of modest Southern values and a strong sense of belonging.
