  career_goals: Tina aspires to a career in health care, aiming to become a pediatric nurse so she can combine her compassion for children with her structured, reliable nature. She also envisions the possibility
    of teaching, seeing it as a way to provide mentorship, organization, and support to younger students. To reach these goals, she plans to focus on science courses in high school, pursue a nursing program
    at a university, and ultimately work in a children's hospital or community health clinic, while keeping the option to give back to her hometown through education.
