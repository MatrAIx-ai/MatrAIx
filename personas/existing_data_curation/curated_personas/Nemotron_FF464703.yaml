personas:
  professional: Lan Chiu, a data‑savvy clinical psychologist in Chicago, blends rigorous CBT, DBT, and trauma‑informed care with advanced statistical modeling and machine‑learning techniques to design evidence‑based,
    culturally nuanced interventions while managing a meticulously organized caseload and research agenda.
  sports: Lan Chiu, an avid outdoor enthusiast, hikes the lakefront trails and the Chicago Botanic Garden’s paths, practices weekly yoga, follows the Chicago Cubs and Chicago Bulls, and participates in
    a local running club that trains for the annual Chicago Marathon.
  arts: Lan Chiu, a passionate photographer and jazz aficionado, captures urban street scenes reminiscent of Vivian Maier while curating playlists featuring Miles Davis, Kamasi Washington, and contemporary
    indie folk artist Sufjan Stevens, and regularly attends performances at the Chicago Jazz Festival.
  travel: Lan Chiu, a meticulous planner with a love for cultural immersion, has trekked the cedar forests of Hokkaido while learning Japanese, explored the historic neighborhoods of Kyoto, dreams of hiking
    Iceland’s volcanic landscapes, and typically books flights using reward points while balancing a modest travel budget.
  culinary: Lan Chiu, a confident home cook, creates fusion dishes like gochujang‑glazed pork tenderloin with roasted corn and kale, kimchi‑spiced mac and cheese, and miso‑infused beet salad, delighting
    friends with the bold marriage of umami‑rich sauces and hearty Midwestern ingredients.
  core: Lan Chiu, a methodical yet curious psychologist‑researcher, balances data‑driven rigor with artistic spontaneity, often juggling spreadsheet formulas while snapping street photos, and occasionally
    over‑schedules themselves, leading to late‑night coffee binges.
background:
  cultural: Lan was raised in a bilingual household by immigrant parents who immigrated from East Asia (her family’s roots are in Korea/China/Vietnam). The family emphasized education, perseverance, and
    community service, shaping her pragmatic curiosity and organized disposition. Growing up in Chicago, she navigated the blend of collectivist cultural values—including respect for elders and communal
    responsibility—and the individualistic ethos of American society. Lan remains actively connected to the local Asian American community through cultural festivals, language exchange groups, and mentorship
    programs for younger immigrants. Her cultural background informs her culturally sensitive clinical approach, allowing her to tailor interventions that honor clients’ heritage while addressing contemporary
    mental‑health challenges.
