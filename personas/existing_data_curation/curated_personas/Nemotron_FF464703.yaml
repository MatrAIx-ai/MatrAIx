    ''group facilitation'', ''culturally competent counseling'', ''program design and implementation'', ''clinical research'', ''evidence-based practice'', ''client record management'']'
  hobbies: '[''hiking the Chicago lakefront'', ''yoga'', ''mindfulness meditation'', ''reading scientific literature'', ''reading contemporary fiction'', ''book club participation'', ''cooking fusion cuisine'',
    ''volunteering at community mental‑health workshops'', ''photography (urban and nature)'', ''attending live jazz performances'', ''learning Japanese language'']'
  career_goals: Lan aspires to become a board‑certified clinical psychologist and eventually launch a private practice that offers evidence‑based treatment for anxiety, depression, and trauma, with a focus
    on culturally adapted interventions for Asian American youth and families. She is eager to lead a university research lab that integrates neuroscience findings with psychotherapeutic techniques, publish
    in high‑impact journals, and secure grant funding for community mental‑health initiatives. Additionally, Lan aims to mentor underrepresented students in psychology, serve on local mental‑health policy
    advisory boards, and advocate for expanded access to culturally responsive services in underserved neighborhoods of Chicago.
