    and organizational planning'', ''Adaptation to emerging real estate technologies'', ''Networking and community engagement'']'
  hobbies: '[''Hiking in the Wasatch foothills'', ''Landscape and interior photography'', ''Yoga and mindfulness meditation'', ''Seasonal cooking and coffee brewing'', ''Community volunteer clean‑ups'',
    ''Mentoring aspiring real‑estate professionals'']'
  career_goals: May aims to become one of the top‑producing agents in Salt Lake County, leveraging her expertise to specialize in eco‑friendly and smart‑home properties. She plans to earn the Certified
    Residential Specialist designation and eventually launch a boutique brokerage that mentors new agents while fostering a culture of balanced curiosity and practical results. Long‑term, she envisions
    investing in multi‑family properties to build a modest portfolio that supports her family’s financial security and community‑focused initiatives.
