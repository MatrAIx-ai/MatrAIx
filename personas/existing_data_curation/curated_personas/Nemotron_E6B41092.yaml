personas:
  professional: May Pressley, a real‑estate agent in Salt Lake County, leverages analytical market insight, negotiation finesse, and digital marketing savvy while balancing curiosity‑driven adoption of
    AI pricing tools with pragmatic transaction coordination, and they maintain a calm, resilient demeanor that steadies high‑stakes deals.
  sports: May Pressley, an avid hiker with the Wasatch Hiking Club and a regular participant in the Utah Trail Series, balances weekend yoga sessions with trail runs, proudly roots for the Utah Jazz and
    Real Salt Lake, and they schedule seasonal ski trips to the Wasatch Powder Bowl to stay fit and refreshed.
  arts: May Pressley, a landscape and interior photography enthusiast, draws inspiration from Ansel Adams and interior designer Kelly Wearstler, curates a collection of prints from Edward Burtynsky, and
    relaxes to the folk sounds of Sufjan Stevens and The Lumineers while visiting galleries at the Utah Museum of Fine Arts.
  travel: May Pressley, a methodical yet spontaneous traveler, plans detailed photography trips to national parks like Zion and Bryce Canyon while also indulging in spur‑of‑the‑moment weekend getaways to
    Colorado’s Rocky Mountain towns and a long‑awaited dream visit to Iceland’s volcanic landscapes, balancing budget‑friendly Airbnb stays with occasional splurges on boutique eco‑lodges.
  culinary: May Pressley, an intermediate home chef, relishes crafting seasonal farm‑to‑table dishes such as roasted beet and goat cheese salad, quinoa‑crusted salmon with asparagus, and wild mushroom risotto,
    while experimenting with home‑brew pour‑over coffee using Ethiopian Yirgacheffe beans and a manual grinder.
  core: May Pressley fuses analytical real‑estate acumen with an explorer’s eye for landscape, balancing a calm, resilient spirit with a habit of over‑loading their camera bag and a love for perfecting
    pour‑over coffee on sunrise hikes.
background:
  cultural: May was raised in the Intermountain West, where a blend of self‑reliance, community orientation, and appreciation for the outdoors shapes daily life. Growing up in South Jordan, she absorbed
    the region’s emphasis on family, modesty, and a pragmatic work ethic, while also being exposed to the increasing cultural diversity of Salt Lake County. Her white, American heritage aligns with the
    area's pioneer roots, yet her experiences in a growing metropolitan environment have fostered an openness to new ideas and a respect for varied perspectives. This background underpins her balanced approach
    to curiosity and practicality in both personal and professional realms.
attributes:
  skills: '[''Real estate market analysis'', ''Negotiation and deal closing'', ''Client relationship management'', ''Digital marketing and social media promotion'', ''Property staging and presentation'',
