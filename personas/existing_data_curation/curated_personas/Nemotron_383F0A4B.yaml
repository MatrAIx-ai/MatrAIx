personas:
  professional: Avis Rucker, a 17‑year‑old aspiring graphic designer, creates TikTok surf‑and‑skate videos while sketching graffiti‑style murals, leveraging basic digital tools and a passion for community
    storytelling to blend structure with spur‑of‑the‑moment creativity.
  sports: Avis Rucker rides the Pacific waves at Oceanside Pier, drops tricks at the local skate park, roots for the San Diego Wave FC and the LA Chargers, and follows professional surfer John John Florence
    for inspiration, balancing daily surf sessions with strength‑training routines.
  arts: Avis Rucker channels the rhythm of gospel music and hip‑hop into vivid street‑style murals, draws inspiration from Kendrick Lamar’s lyricism, Erykah Badu’s soulful sound, and Banksy’s stencil techniques,
    and curates a personal playlist featuring SZA and Anderson .Paak while sketching in a downtown art studio.
  travel: Avis Rucker prefers spontaneous weekend getaways, planning last‑minute trips to nearby surf spots like Huntington Beach, dreaming of a cultural surf‑camp in Bali, and cherishing family visits
    to the annual community festival in Santa Barbara, while balancing school obligations.
  culinary: Avis Rucker enjoys cooking collard greens with smoked turkey, perfecting fish tacos with mango salsa, and whipping up mango‑banana smoothies, boasting a modest cooking skill set that blends
    family soul‑food traditions with coastal flavors.
  core: Avis Rucker blends surf‑side spontaneity with meticulous sketching, wrestles with procrastination and anxiety, but channels those energies into vibrant TikTok content and community mentorship.
background:
  cultural: Avis grew up in a close‑knit African‑American family in Oceanside, where coastal beach culture intertwines with Black cultural traditions. Family gatherings often feature gospel music, soul
    food, and storytelling, while community events like the San Diego Black Film Festival and local church youth groups provide a sense of identity and pride. She draws inspiration from Black artists in
    music and visual arts, and she values the resilience and solidarity of her community, which shapes her perspectives on creativity, service, and self‑expression.
attributes:
  skills: '[''Social media content creation'', ''Basic computer literacy (Google Docs, Microsoft Word)'', ''Interpersonal communication'', ''Peer mentorship'', ''First aid basics'', ''Sketching and graffiti
