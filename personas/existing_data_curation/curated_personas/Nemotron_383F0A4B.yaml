  hobbies: '[''Surfing'', ''Skateboarding'', ''Social media video creation'', ''Sketching/Street art'', ''Listening to hip‑hop and R&B'', ''Journaling'', ''Youth center volunteering'', ''Attending cultural
    festivals'']'
  career_goals: Avis aims to obtain her GED within the next year and enroll in a community college program focused on graphic design and visual communication, with the long‑term goal of becoming a freelance
    digital artist and content creator. She also envisions using her platform to promote mental health awareness among her peers, eventually earning a certification as a mental health first responder. In
    the meantime, she is considering a part‑time apprenticeship at a local surf shop to combine her love for the beach with practical work experience. Ultimately, Avis hopes to build a career that balances
    creative freedom with a stable income, allowing her to support her family and give back to her community.
