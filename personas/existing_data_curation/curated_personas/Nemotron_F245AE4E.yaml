  career_goals: Although retired, Joeann aims to stay mentally and physically active while deepening her knowledge of local history and family genealogy. She hopes to mentor younger relatives in cooking,
    gardening, and research skills, and to volunteer occasionally at the Smithtown public library and the local historical society. One long‑term ambition is to compile a family recipe book and memoir that
    captures her life experiences and cultural heritage for future generations.
