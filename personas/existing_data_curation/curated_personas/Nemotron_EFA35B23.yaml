  career_goals: Jacqueline aims to leverage her practical experience and curiosity to advance into retail management. Over the next two years she plans to become a shift supervisor and then an assistant
    store manager, while completing a part‑time retail management certification at a nearby community college. She also intends to earn a bachelor’s degree in business to broaden her strategic skills. Long‑term,
    she dreams of opening a small specialty shop or coffee‑café that combines community interaction with locally sourced products, seeking a role that maintains flexibility for her hobbies and volunteer
    work while providing clear pathways for leadership development.
