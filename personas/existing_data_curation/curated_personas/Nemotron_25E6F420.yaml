personas:
  professional: Santhosh Reddy is a budding game designer who spends hours in Minecraft and Super Mario Maker building intricate levels, channeling their love for structured creativity into early programming
    experiments while balancing school chores with spontaneous bursts of imagination.
  sports: Santhosh Reddy enjoys playing soccer with friends at the neighborhood park and practicing cricket on weekends, cheering for local club FC Dynamo and the national cricket team while favoring spontaneous
    pick‑up games over regimented training.
  arts: Santhosh Reddy delights in graphic novels and Bollywood/Telugu music, drawing cartoons inspired by favorite superheroes and listening to artists like Arijit Singh and Shreya Ghoshal, which fuels
    their creative breaks after homework.
  travel: Santhosh Reddy, constrained by school schedules and a modest family budget, favors short family trips to nearby heritage sites such as ancient forts close to home, while secretly dreaming of exploring
    Kyoto's temples and Marrakech's vibrant bazaars.
  culinary: Santhosh Reddy helps their mother whip batter for dosa and grate fresh coconut for chutney, loves snacking on cheesy pizza rolls after gaming sessions, and occasionally experiments by adding
    bright red chili powder to homemade sauces.
  core: Santhosh Reddy is a structured yet spontaneous 11‑year‑old who balances a passion for building worlds in video games and LEGO with cautious money habits, health monitoring, and a tendency to worry
    about upcoming school challenges while sneaking extra gaming time.
background:
  cultural: Santhosh belongs to a South Indian Telugu‑speaking family that migrated to the United States before he was born. Growing up in Lawrence Township, New Jersey, he balances American school life
    with rich Indian traditions at home. The family celebrates Diwali, Sankranti, and Ugadi with elaborate meals, rangoli art, and prayer rituals, and they frequently gather for weekend dhabas where he
    learns classic recipes. He is fluent in English and conversational in Telugu, and he attends a local Hindu temple's youth group, where he participates in cultural programs, dance, and language classes.
    The community's values of education, respect for elders, and close‑knit family ties shape his worldview, while his American peers expose him to diverse sports, music, and pop culture.
