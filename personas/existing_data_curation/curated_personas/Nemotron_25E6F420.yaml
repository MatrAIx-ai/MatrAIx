  career_goals: Santhosh dreams of turning his love for technology into a career as a software engineer or game developer, hoping to create apps that help kids stay organized and calm. He also admires civil
    engineers who design bridges and is drawn to the idea of building something that lasts. Inspired by his parents' emphasis on education and his community's respect for doctors, he sometimes imagines
    becoming a pediatrician who can combine caring for children with scientific problem solving. Ultimately, he seeks a stable, respected profession that lets him use his logical skills while making a positive
    impact, even though he sometimes worries about the effort required to reach those goals.
