    Teamwork'']'
  hobbies: '[''Gardening (vegetable garden)'', ''Birdwatching'', ''Historical fiction reading'', ''Genealogy research'', ''Quilting and knitting'', ''Small‑group book club'', ''Bridge (card game)'', ''Volunteer
    tutoring at senior center'', ''Library volunteer work'', ''Hiking local trails'']'
  career_goals: Approaching retirement, Emily aims to transition from full‑time clerical duties to a mentorship role where she can share her logistics expertise with younger staff and community volunteers.
    She hopes to teach a part‑time course on supply‑chain basics at the local community college or adult‑education center, blending her passion for teaching with practical industry insights. Additionally,
    Emily aspires to lead a small initiative at her workplace to adopt greener packaging and waste‑reduction practices, reflecting her growing interest in environmental stewardship. Ultimately, she seeks
    a balanced lifestyle that allows her to remain intellectually engaged while enjoying the flexibility to pursue her personal interests.
