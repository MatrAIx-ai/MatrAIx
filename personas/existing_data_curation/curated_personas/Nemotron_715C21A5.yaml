  career_goals: Lucas aims to leverage his hands‑on experience to become a registered nurse, enrolling in an RN‑to‑BSN program within the next two years, while also pursuing certification in mental‑health
    support. He is motivated to work in community health settings, particularly rural clinics, to improve access to care for underserved populations in Lewis County. In the longer term, he aspires to take
    on a care‑coordination or health‑education leadership role, designing programs that integrate preventive health education with patient advocacy. He also hopes to develop expertise in telehealth technologies
    to bridge geographic gaps, and to eventually mentor new healthcare support staff, fostering a collaborative and compassionate workplace culture.
