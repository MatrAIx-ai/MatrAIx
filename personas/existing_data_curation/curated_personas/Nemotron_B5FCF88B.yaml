personas:
  professional: Paul Petty is a budding robotics enthusiast and self‑taught Python coder, whose competitive drive pushes them to solve technical challenges quickly while they stay reliable in team projects
    and balance curiosity with practical problem‑solving.
  sports: Paul Petty plays forward for the Fort Wayne Jr. Thunder soccer club and guard for the Fort Wayne Warriors youth basketball team, cheering on the Indiana Pacers and Indianapolis Colts, and spends
    Saturdays perfecting free‑throws at the community gym.
  arts: Paul Petty builds intricate LEGO sci‑fi sets, reads Isaac Asimov novels, listens to Imagine Dragons and Billie Eilish while coding, and draws inspiration from the synth‑wave soundtrack of Rocket
    League and the vibrant county‑fair murals.
  travel: Paul Petty hikes local trails in the Foellinger‑Freimann Botanical Gardens, enjoys weekend road trips to the Indiana Dunes, has visited Chicago’s Navy Pier, and dreams of exploring Yellowstone
    National Park and Tokyo’s Akihabara district.
  culinary: Paul Petty prefers pepperoni pizza, chicken tenders with ranch dip, and homemade mac and cheese, often baking chocolate chip cookies after gaming, though their cooking skills are limited to
    microwave popcorn and cereal.
  core: Paul Petty is a curiosity‑driven, competitive teen who blends robotics tinkering, basketball, and pragmatic budgeting while staying emotionally stable and occasionally questioning others’ motives.
background:
  cultural: Paul grew up in a middle‑class white family in Fort Wayne, Indiana. The local Midwestern culture emphasizes friendliness, community involvement, and a practical work ethic. He participates in
    school sports, local youth programs, and family outings to county fairs and nearby natural areas. His household celebrates holidays such as Thanksgiving and Independence Day with gatherings that blend
    traditional Midwestern values and contemporary digital culture, giving him a balanced perspective on both heritage and modern technology.
