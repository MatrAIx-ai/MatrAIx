personas:
  professional: Jerome Loiero, a 24-year-old aspiring arts administrator, translates their strong organizational and planning abilities, event coordination experience, and foundational knowledge of visual
    arts into curating community-focused exhibitions and outreach programs at regional museums while leveraging digital media skills to amplify engagement on social platforms.
  sports: Jerome Loiero, who plays intramural basketball for the Hudson Valley College Hawks, joins the local frisbee league at Beacon's Riverside Park, roots for the New York Knicks and Hudson Valley Renegades,
    and hikes the Catskill trails every weekend, blends team camaraderie with personal fitness in a highly sociable and energetic routine.
  arts: Jerome Loiero, an avid visitor to the Hudson Hall Art Museum, the Beacon Arts Center, and the Contemporary Arts Center in Poughkeepsie, spends weekends photographing historic stone houses inspired
    by Ansel Adams, curates playlists of indie folk icons like Bon Iver and The National, and channels these artistic experiences into a forward-thinking curatorial perspective.
  travel: Jerome Loiero, who meticulously plans weekend getaways by train to the Catskills, Woodstock, and historic Philadelphia, dreams of cultural pilgrimages to Florence and Paris to study Renaissance
    art, yet keeps travel budgets tight by opting for hostels, couch-surfing, and off-season travel packages.
  culinary: Jerome Loiero, a self-taught home-cook who loves farm-to-table flavors, regularly prepares butternut squash risotto with sage, roasts apple-cider glazed pork tenderloin, and crafts artisanal
    charcuterie boards featuring goat cheese, figs, and locally sourced honey, while habitually snacking on granola bars during photo shoots.
  core: Jerome Loiero, a 24-year-old arts enthusiast who merges meticulous event planning with spontaneous photography hikes, obsessively curates Instagram feeds yet forgets to floss, and can quote Ansel
    Adams while negotiating museum budgets.
background:
  cultural: Jerome comes from a White American background, with family roots tracing back to Italian and Irish immigrants who settled in upstate New York. Growing up in Pleasant Valley, he was exposed to
    a blend of suburban Mid‑Atlantic culture and the distinctive heritage of the Hudson Valley, including its historic ties to early American settlement, local folk traditions, and a vibrant regional arts
    scene. This upbringing fostered his appreciation for both classic American cultural values—such as community involvement and self‑reliance—and the diverse artistic expressions of the area.
attributes:
  skills: '[''Organizational planning'', ''Event coordination'', ''Communication and public speaking'', ''Digital photography'', ''Photo editing (Adobe Lightroom, Photoshop)'', ''Social media content creation'',
