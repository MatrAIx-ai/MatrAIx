  hobbies: '[''Visiting art galleries and museums'', ''Live music and concert attendance'', ''Photography (landscape & architecture)'', ''Volunteer work in community arts projects'', ''Intramural basketball'',
    ''Frisbee'', ''Hiking in Hudson Valley'', ''Board game nights'']'
  career_goals: Jerome aims to pursue a certificate or associate’s degree in arts administration or museum studies within the next two years, with the goal of securing a role as an assistant curator or
    program coordinator at a regional art center or historical museum. He also hopes to leverage his event planning and community outreach skills to develop collaborative art programs that engage diverse
    audiences in the Hudson Valley. Long‑term, he envisions a leadership position where he can shape cultural initiatives and foster creative partnerships.
