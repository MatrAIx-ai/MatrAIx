  career_goals: Philip aims to transition from his current unemployment into a full‑time role in operations or project management within Vero Beach’s hospitality, tourism, or community‑service sectors.
    In the next three years he hopes to become a team lead overseeing event programming for local festivals, and ultimately pursue a senior manager position where he can shape strategic initiatives and
    mentor junior staff. He values stable, structured work environments that allow him to meet high performance standards while contributing to community wellbeing.
