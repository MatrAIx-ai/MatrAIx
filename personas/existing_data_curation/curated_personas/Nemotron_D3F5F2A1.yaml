  career_goals: Julie aspires to become the chair of the Humanities department at the University of Michigan, where she can drive curriculum innovation and champion interdisciplinary collaboration across
    the liberal arts. She aims to secure a multi‑year grant to launch a community‑engaged humanities program that connects students with local cultural institutions. Publishing a seminal monograph on contemporary
    cultural theory is a long‑term scholarly ambition, as is mentoring a new generation of scholars, especially those from underrepresented backgrounds. Julie is committed to implementing evidence‑based
    teaching practices that boost student retention and satisfaction, while also establishing regular self‑care routines to manage her propensity for worry and stress.
