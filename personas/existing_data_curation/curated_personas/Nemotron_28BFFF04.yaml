  hobbies: '[''Hiking in Sonoma County'', ''Landscape photography'', ''Wine tasting and pairing'', ''Watercolor painting'', ''Metal sculpture'', ''Playing bass guitar in a community band'', ''Mentoring
    at a local maker space'', ''Cycling'', ''Cooking classes'', ''Participating in community festivals'']'
  career_goals: Timothy aims to leverage his decades of hands‑on experience to transition into a senior technical role where he can shape the next generation of machinists. Over the next few years, he plans
    to earn an official CNC programmer certification, complete a leadership course in lean manufacturing, and begin offering workshops at the local community college’s vocational program. He also dreams
    of opening a small bespoke metal‑fabrication studio that creates artistic pieces for local galleries and the wine‑country hospitality sector, blending his technical precision with his love of art. Ultimately,
    he wants to stay active in the industry while enjoying a balanced work‑life rhythm that allows more time for his family and community involvement.
