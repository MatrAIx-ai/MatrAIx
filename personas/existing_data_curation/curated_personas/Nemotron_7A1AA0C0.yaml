personas:
  professional: Anthony Bigby, a budding junior librarian‑in‑training who loves sorting picture books by color and retelling the stories to their stuffed companions, blends their natural curiosity with
    a practical love of order, even though they sometimes let their play area become a charming mess.
  sports: Anthony Bigby, a tiny soccer enthusiast who dashes across the YMCA’s after‑school mini‑field every Tuesday, proudly wears a DC United jersey, cheers for the Washington Wizards on game nights with
    dad, and enjoys splash‑time at the neighborhood pool in summer, showing that they prefer a relaxed but joyful approach to staying active.
  arts: Anthony Bigby, a budding music lover who taps their feet to Louis Armstrong’s 'What a Wonderful World', hums along to Beyoncé's 'Halo', giggles to Kendrick Lamar's playful beats during family dance
    sessions, and eagerly listens to storytime readings of Ezra Jack Keats' 'The Snowy Day', showing that they incorporate oral storytelling and soulful tunes into their artistic world.
  travel: Anthony Bigby, a curious little explorer who delights in weekend trips to the Smithsonian’s National Museum of History and Culture’s civil‑rights exhibit, enjoys splash‑filled days at Ocean City,
    MD, and dreams of a family road‑trip to Disney World in Florida, and they favor spontaneous outings over rigid itineraries.
  culinary: Anthony Bigby, a picky but adventurous eater who delights in cheesy macaroni, crispy chicken nuggets, and sweet banana slices, often helps stir the batter for homemade pancakes with a splash
    of vanilla, and loves to dip carrots into hummus, and they balance familiar comforts with small culinary experiments.
  core: Anthony Bigby, a quiet 4‑year‑old whose boundless curiosity is balanced by a love for unstructured play, habitually leaves toy blocks scattered across the floor while they narrate epic tales to
    their stuffed audience.
background:
  cultural: Anthony grows up in Washington, DC, within a close‑knit African‑American family that values community, oral storytelling, and music. Family gatherings often feature soul, jazz, and contemporary
    hip‑hop, and his parents share stories of the city’s civil‑rights history, including visits to the National Museum of African American History and Culture. He attends the local public library’s early‑learners
    programs, where books by Black authors are highlighted, and participates in neighborhood events such as the annual Martin Luther King Jr. Day celebration. These experiences shape his sense of identity,
    pride, and curiosity about his cultural heritage.
