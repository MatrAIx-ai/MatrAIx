  career_goals: Grace dreams of becoming a veterinarian because she loves animals and wants to help them in tangible ways. She is determined to excel academically, aiming to win her school’s science fair
    and earn recognition for a project on animal care. Looking ahead, she hopes to lead a robotics or coding team in middle school, combining her Scratch skills with her competitive drive, and eventually
    contribute to community wildlife education programs in her hometown.
