personas:
  professional: Grace Deoliveira, a budding junior architect and coder, channels her love for LEGO construction, Minecraft creative design, and Scratch animation into early problem‑solving projects, applying
    her practical, structure‑loving mindset and competitive edge to plan intricate builds while often preferring solo work over group collaborations.
  sports: Grace Deoliveira plays forward for the local youth soccer team, the Riverbank Rovers, attends weekly beginner tennis lessons at the community center, and avidly follows the New York Knicks, channeling
    her competitive spirit into these organized, small‑group activities.
  arts: Grace Deoliveira devotes spare afternoons to devouring adventure series like 'Harry Potter' and 'Percy Jackson' while sketching flora in her nature journal, assembling LEGO creations to the soundtrack
    of 'The Legend of Zelda', and attending weekend art workshops where she paints landscapes inspired by the works of Claude Monet.
  travel: Grace Deoliveira loves weekend family hikes through the nearby woods and has treasured trips to Yellowstone National Park, but dreams of a future adventure to the magical realms of Disney World,
    planning each excursion with a detailed nature checklist while balancing school obligations.
  culinary: Grace Deoliveira favors pepperoni pizza, mac and cheese, and strawberry yogurt, often crafting quick PB&J sandwiches and helping bake chocolate‑chip cookies, while insisting on adding crunchy
    carrot sticks to any snack for the satisfying crunch she loves.
  core: Grace Deoliveira, a 9‑year‑old puzzle‑loving explorer, blends a love for structured LEGO builds with spontaneous woodland adventures, often trading meticulous planning for impromptu creativity and
    a stubborn habit of losing socks during hikes.
background:
  cultural: Grace comes from a Portuguese‑American family that settled in the hills of Indiana County, Pennsylvania. While English is her primary language, she hears Portuguese phrases at home and participates
    in family traditions such as making pastéis de nata during holidays and celebrating the Feast of Saint Anthony. The family’s Catholic faith guides regular attendance at the local parish and involvement
    in church festivals and charity drives. Growing up in the small, close‑knit community of McIntyre, she also embraces the region’s Appalachian influences—an appreciation for the outdoors, local fairs,
    and a practical, hardworking ethos.
