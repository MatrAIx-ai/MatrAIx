  hobbies: '[''Reading adventure books'', ''Jigsaw puzzles'', ''LEGO building'', ''Chess'', ''Card games (Uno)'', ''Nature walks'', ''Rock and leaf collecting'', ''Nature journaling'', ''Minecraft (creative
