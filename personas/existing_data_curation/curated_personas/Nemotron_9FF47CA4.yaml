  career_goals: At 66, Norman seeks to deepen his artistic legacy while giving back to his community. He aims to complete a series of large‑scale abstract paintings that explore the interplay of memory
    and industrial heritage, and to organize a local exhibition at the Flushing community center. He also plans to start a weekly “Creative Seniors” workshop where he mentors older adults in painting and
    digital collage, fostering both skill development and social connection. Additionally, he wishes to document his life story in a memoir that weaves personal anecdotes with the history of Genesee County,
    contributing to the local historical society’s archive. On the personal side, he hopes to maintain his health to continue participating in weekly trivia nights, chess clubs, and walking groups, reinforcing
    his active, sociable lifestyle.
