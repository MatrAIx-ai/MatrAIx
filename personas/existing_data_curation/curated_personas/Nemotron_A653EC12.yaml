  career_goals: Oliver aims to advance to a lead engineer role within the next three to five years, focusing on building robust, scalable systems that deliver tangible value. He intends to deepen his expertise
    in cloud architecture, obtain an AWS Solutions Architect certification, and eventually transition into a software architect position where he can shape high‑level system designs. Maintaining a predictable
    and stable work schedule is essential to him, as it supports a healthy work‑life balance with his wife. Additionally, he hopes to contribute to open‑source projects that benefit community health or
    education, aligning his technical talents with his desire to support others.
