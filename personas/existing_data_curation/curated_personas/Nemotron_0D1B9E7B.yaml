  career_goals: Michel aspires to become a software engineer specializing in video game development. He envisions creating immersive, story-driven games that reflect diverse cultures and offer thoughtful
    experiences. He plans to attend a STEM‑focused high school, then pursue a computer science degree at a university known for strong engineering programs. Ultimately, he aims to work at a studio where
    he can contribute to design and programming while enjoying the structured yet flexible work environment that aligns with his preference for quiet, focused work.
