personas:
  professional: Michel Hurst, an aspiring game designer who translates a love for strategy video games into detailed level sketches on Procreate, channels a preference for predictable structures while allowing
    the spontaneous bursts of creativity that often emerge from LEGO building sessions, they balance a practical, reality‑focused mindset with an emerging collaborative spirit.
  sports: Michel Hurst, a budding basketball enthusiast who participates in the Houston Rockets Youth League and follows the Houston Astros during baseball season, prefers solitary weekend jogs in Discovery
    Green when the heat is low, they devote weekend afternoons to building stamina through video‑game‑inspired fitness challenges, yet they often forget to stretch, leading to occasional knee soreness.
  arts: Michel Hurst, an avid aficionado of jazz legend John Coltrane, instrumental hip‑hop producer J Dilla, and classic soul singer Marvin Gaye, spends evenings sketching futuristic cityscapes inspired
    by visual futurist Syd Mead while curating playlists that blend smooth saxophone riffs with lo‑fi beats, they also frequent the Houston Museum of African American Culture for its rotating exhibits,
    and they occasionally dabble in digital animation using Procreate.
  travel: Michel Hurst, a curious explorer who dreams of tracing the trajectory of rockets at NASA Space Center Houston and strolling through the historic streets of New Orleans during Mardi Gras, prefers
    flexible family‑guided trips over meticulously planned itineraries, they keep a travel scrapbook filled with pressed ticket stubs and doodles of imagined future destinations like Kyoto and Reykjavik.
  culinary: Michel Hurst, a self‑taught junior chef, loves whipping up cheesy macaroni with a crisp breadcrumb topping and spicing it with a dash of hot sauce, they also cherish family‑style dishes such
    as smoked brisket, collard greens, and sweet potato casserole during holiday gatherings, and they experiment with fresh ingredients like rosemary, cilantro, and jalapeños when building LEGO‑inspired
    culinary creations.
  core: Michel Hurst, an introspective 11‑year‑old who channels solitary creativity into video‑game strategies, LEGO constructions, and futuristic art while wrestling with anxiety‑driven mood swings, they
    thrive on structured routines yet delight in spontaneous bursts of imagination.
background:
  cultural: Michel is a Black youth raised in Houston's diverse Harris County. He is rooted in African American cultural traditions, including exposure to gospel music at family gatherings, community storytelling
    events, and local celebrations like Juneteenth and Kwanzaa. His family emphasizes education, self‑expression, and pride in Black history, encouraging him to explore the contributions of Black scientists
    and artists. The multicultural atmosphere of Houston, with its vibrant food, music, and art scenes, has shaped his appreciation for a blend of Southern and urban Black culture while reinforcing a strong
    sense of community identity.
