  hobbies: '[''Running'', ''Yoga'', ''Book club'', ''Community theater'', ''Gardening'', ''Cooking'', ''Hiking'', ''Board games'', ''Travel planning'', ''Professional development seminars'']'
  career_goals: Sara aims to become a district director of early childhood education, overseeing a network of schools and shaping regional policy. She seeks to secure grant funding for innovative, technology‑enhanced
    learning programs and to establish a model for integrating social‑emotional support for both students and staff. Long‑term, she envisions earning a doctorate in education leadership, earning statewide
    recognition as a thought leader, and eventually launching her own consultancy to help schools improve operational efficiency and student outcomes while promoting staff well‑being.
