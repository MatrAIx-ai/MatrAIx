personas:
  professional: Sara Leeper is a detail‑driven educational administrator who leverages their business‑grade financial acumen and structured leadership style to run early‑childhood programs, design data‑driven
    curricula, and negotiate district grants while aggressively pursuing their goal of becoming a district director of early childhood education.
  sports: Sara Leeper is a morning runner who joins a community jogging club, hikes with the local Northwest Hikers’ Association, participates in a weekend mixed‑doubles tennis league at the recreation
    center, and cheers on the Chicago Cubs, Chicago Bulls, and Chicago Bears while they keep a disciplined training log.
  arts: Sara Leeper immerses themselves in community theater productions of Sondheim’s “Into the Woods,” coordinates a book club that devours contemporary fiction by authors like Celeste Ng, and relaxes
    to the folk‑rock sounds of Brandi Carlile and the indie vibes of The National, further fueling their love for storytelling.
  travel: Sara Leeper plans group itineraries with meticulous spreadsheets, has led friends on a fall foliage road‑trip through New England, a spring cultural tour of Kyoto’s temples, and dreams of organizing
    a summer retreat to the Amalfi Coast, balancing budget constraints with their desire for immersive experiences.
  culinary: Sara Leeper orchestrates weekly meal plans centered on Mediterranean quinoa salad with feta and olives, slow‑cooked lamb stew spiced with rosemary and cumin, and weekend baking of sourdough
    bread, showcasing their high‑level organization while occasionally indulging in rich chocolate mousse as a stress‑relief treat.
  core: Sara Leeper blends disciplined, spreadsheet‑obsessed leadership with a sociable love for theater, board games, and early‑morning runs, yet worries about perfection and sometimes lets stress dictate
    their sleep schedule.
background:
  cultural: Sara was raised in a suburban Midwestern environment near Chicago, reflecting a predominantly white American cultural context with likely German and Polish ancestry common in the region. Her
    upbringing emphasized community involvement, punctuality, a strong work ethic, and civic responsibility. She grew up attending local public schools, participating in community events, and internalizing
    Midwestern values of practicality, modesty, and a commitment to public service, which continue to shape her professional and personal life.
attributes:
