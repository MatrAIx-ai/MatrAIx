personas:
  professional: Johnny Glenn, a retired mechanical engineer who once directed state infrastructure projects, now channels their precision in technical drawing, data analysis, and simulation programming
    into mentoring apprentice engineers, authoring detailed articles for the regional engineering society newsletter, and meticulously documenting the historical evolution of Augusta's waterways, and they
    consider methodical documentation essential to the process.
  sports: Johnny Glenn stays active by jogging along the Kennebec River each sunrise, attending the local Senior Walking Club, paddling with the Kennebec River Canoe Club during summer, and cheering for
    the New England Patriots and the Boston Red Sox on game days, while they avoid high‑impact sports due to osteoarthritis concerns.
  arts: Johnny Glenn nurtures a quiet appreciation for the arts by listening to the folk ballads of Joan Baez, studying Ansel Adams’ black‑and‑white landscapes for their photography projects, attending
    occasional performances by the Portland Stage Company, and keeping a collection of classic films starring Cary Grant, all of which they use to inspire their own storytelling of New England’s historical
    narrative.
  travel: Johnny Glenn prefers meticulously planned short‑term trips, often visiting Acadia National Park for sunrise hikes, taking a scenic weekend drive to the Hudson Valley’s historic Hudson River towns,
    and arranging a once‑a‑year excursion to St. Andrews, New Brunswick to explore its preserved maritime heritage, though they sometimes skip longer vacations due to health concerns and budget constraints.
  culinary: Johnny Glenn delights in preparing hearty New England fare—such as lobster bisque, maple‑glazed river trout, and a slow‑cooked Brunswick stew—using home‑grown tomatoes, fresh rosemary, and thyme
    from their garden, while they expertly bake an apple crisp with locally sourced apples, preferring rustic, seasonal dishes over processed meals.
  core: Johnny Glenn blends a lifelong engineer’s need for order with a quiet reverence for nature, cataloguing bird sightings before sunrise while obsessively polishing wooden tools, yet they habitually
    worry about the next spreadsheet and occasionally neglect bedtime to finish a model‑train layout.
background:
  cultural: Johnny was raised in a modest, multigenerational family of English and Irish descent in rural Maine. The cultural ethos of New England, emphasizing self-reliance, respect for the natural environment,
    and a quiet, community-oriented lifestyle, has shaped his values. He grew up attending a Congregationalist church, celebrating seasonal harvest festivals, and participating in neighborhood clean-up
    initiatives. His identity is intertwined with the maritime heritage of the Kennebec River, a love for local history, and a deep appreciation for the region's changing seasons.
