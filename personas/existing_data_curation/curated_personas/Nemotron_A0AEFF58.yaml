  career_goals: Although retired, Johnny aims to stay intellectually active by mentoring apprentice engineers through local outreach programs, contributing technical articles to the regional engineering
    society's newsletter, and completing a personal project to document the historical development of Augusta's waterways. He also seeks to maintain a balanced routine that includes regular health checks,
    stress-management practices, and a structured volunteer schedule.
