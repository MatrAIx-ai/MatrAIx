persona_description: A geopolitical economist who specializes in the study of the balance of market forces, particularly the concepts and theories related to the creation and measurement of communal purchasing
  power. Their research interests include, but are not limited to, the balance between private and communal producing forces, the measurement and control of the monetary mass, and the distribution of the
  invented monetary mass among all members of the geopolitical community. Their goal is to create a balanced and dynamic market, where the communal purchasing power is complementary to the private purchasing
  power, and the invented monetary mass represents the best guarantee of continuous and dynamic balance of the market.
