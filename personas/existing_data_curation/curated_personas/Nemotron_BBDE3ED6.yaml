personas:
  professional: Ras Butler, a highly disciplined 21‑year‑old machinist, leverages meticulous blueprint interpretation and CNC precision to lead production schedules while fostering a collaborative shop
    floor culture, and they balance structured workflow with their outgoing team spirit.
  sports: Ras Butler, an avid weightlifter and pickup basketball player, trains at Detroit Fitness Lab, supports the Detroit Pistons and Red Wings, and they shuttle between summer park courts and winter
    indoor leagues to keep stamina for the shop floor.
  arts: Ras Butler drums in a neighborhood funk band inspired by James Brown and Parliament‑Funkadelic, frequents live shows at St. Andrew’s Hall, snaps graffiti murals in Detroit’s Eastern Market, and
    they stream classic Motown records on weekends.
  travel: Ras Butler plans road trips with precision, favoring garage‑friendly routes that take them to Detroit’s Motor City Museum, Nashville’s music venues, and Germany’s Stuttgart automotive exhibitions,
    and they balance a limited student budget with a desire for automotive culture immersion.
  culinary: Ras Butler cooks soulful meals like fried chicken, collard greens, and cornbread, skillfully seasoning with smoked paprika and garlic, often preparing for family gatherings while they experiment
    with sous‑vide techniques to perfect meat textures.
  core: Ras Butler blends disciplined machining expertise with a love for funk drumming, classic cars, and community mentorship, though they sometimes stay up late gaming at the expense of a regular sleep
    schedule.
background:
  cultural: Ras grew up in a tight‑knit African‑American community in Detroit, where the legacy of Motown music, the automotive industry, and strong church ties shaped his identity. His family’s history
    of working in the auto plants and participating in community activism instilled a deep respect for hard work, resilience, and collective progress. Ras celebrates Detroit’s cultural heritage through
    music, food, and local festivals, and he maintains close connections with neighborhood elders who emphasize the importance of giving back and preserving the city’s rich black heritage.
attributes:
  skills: '["CNC programming", "Manual machining", "Blueprint interpretation", "Precision measurement", "Metrology", "Machinery maintenance", "Quality inspection", "Industrial safety compliance", "Team
    coordination", "Problem solving", "Basic CAD/CAM (Fusion 360)", "Lean manufacturing principles", "Time management", "Shop floor organization"]'
  hobbies: '["Basketball", "Drumming (funk/hip‑hop)", "Classic car restoration", "Simulation video gaming", "Cooking soul‑food", "Youth vocational mentorship", "Weightlifting", "Attending local music festivals",
    "DIY electronics projects"]'
  career_goals: Ras aims to become a lead CNC machinist within the next three years, earning advanced certifications such as NIMS and OSHA 30-hour. He plans to master complex programming techniques and
    eventually transition into a manufacturing engineering role, where he can design production workflows and mentor junior workers. Long‑term, Ras aspires to open his own precision machining shop in Detroit,
    providing apprenticeship opportunities for local youth and contributing to the revitalization of the city’s blue‑collar workforce.
