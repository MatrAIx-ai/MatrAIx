  career_goals: Although she is not currently employed, Angel aims to deepen her involvement in community cultural initiatives. She aspires to take on a volunteer leadership role as a cultural program coordinator
    for a nonprofit serving the Latino community in Hudson County, develop digital outreach skills to promote events online, mentor younger Colombian immigrants in artistic pursuits, and eventually serve
    on the board of a local arts council.
