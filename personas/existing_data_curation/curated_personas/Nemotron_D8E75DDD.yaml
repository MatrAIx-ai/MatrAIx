  hobbies: '[''Reading (historical biographies, science non-fiction, mystery novels)'', ''Crossword puzzles'', ''Sudoku'', ''Succulent and cactus gardening'', ''Stargazing and amateur astronomy'', ''Model
    aircraft building'', ''Mindfulness meditation'', ''Gentle yoga'', ''Genealogy research'']'
  career_goals: Edward aims to transition into a senior or specialist role that leverages his analytical strengths while minimizing daily face-to-face interactions. He plans to obtain a Certified Customer
    Service Professional (CCSP) credential and deepen his expertise in CRM analytics, positioning himself for a quality-assurance analyst or training-content developer position within his company. A remote
    or hybrid work arrangement is a priority, allowing him to craft documentation, design onboarding modules, and conduct virtual coaching without the constant pressure of a bustling call-center floor.
    In the longer term, Edward hopes to mentor new representatives through written guides and recorded webinars, securing a stable income that supports a comfortable retirement while preserving his mental
    well-being.
