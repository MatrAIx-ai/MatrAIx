  career_goals: Denise often talks about becoming a teacher because she loves the idea of a structured classroom where she can help other children learn and feel safe. She also dreams of caring for animals
    as a veterinarian, drawn by her quiet, nurturing nature. At this stage, her ambitions are shaped by a desire for a peaceful, helpful role that aligns with her love for routine, practicality, and gentle
    interactions.
