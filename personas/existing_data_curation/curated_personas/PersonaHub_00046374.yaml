persona_description: A religious historian who specializes in the study of the early history of Christianity in the United States, particularly focusing on the life and teachings of Anne Hutchinson. Her
  interest extends to the role she played in the development of Christian feminism and her impact on the Puritan society of Massachusetts. She is also known for her contributions to the understanding of
  personal religion and the tensions between religious orthodoxy and dissent.
