personas:
  professional: Jason Hotard, a 28‑year‑old secondary‑school teacher, blends visual‑arts flair with tech‑savvy lesson design, using interactive whiteboards and project‑based STEAM units that draw on local
    swamp ecology while fostering collaborative creativity among their students.
  sports: Jason Hotard, an avid cyclist with the Lake Okeechobee Cycling Club, regularly mentors a youth basketball league, hikes the Okeechobee trail network, and roots for the Miami Heat, Florida Gators,
    and Tampa Bay Rays while balancing weekly cardio rides with weekend pickup games.
  arts: Jason Hotard, a watercolor enthusiast who frequents the Okeechobee Arts Center, paints landscapes inspired by the Everglades, performs acoustic covers of Bob Dylan and Ed Sheeran at community open‑mic
    nights, and cites Georgia O’Keeffe, Frida Kahlo, and local folk group The Swamp Singers as artistic inspirations.
  travel: Jason Hotard, a weekend road‑tripper who has explored the Keys’ mangroves, the historic streets of New Orleans during Jazz Fest, and the blue‑grass festivals of Asheville, prefers a blend of spontaneous
    detours and carefully mapped routes, and dreams of trekking the Guatemalan highlands next summer.
  culinary: Jason Hotard, a self‑taught home cook, delights in citrus‑marinated grilled chicken, key‑lime pie, jambalaya with okra, and experiments with plantain‑based dishes, favoring fresh lime, smoked
    paprika, and a generous splash of hot sauce while often leaving the kitchen a mess they later clean up on Monday.
  core: Jason Hotard fuses swamp‑born community spirit with a watercolor‑splashed curiosity, leading innovative STEAM classrooms by day and crafting fiery, citrus‑infused meals by night, all while occasionally
    forgetting to water their houseplants.
background:
  cultural: Jason is a White American who grew up in the rural setting of Okeechobee, Florida. His upbringing blended Southern hospitality and a strong work ethic with the unique swamp‑country culture of
    Central Florida. Family traditions centered around community events, church gatherings, and seasonal agriculture—citrus and sugarcane farming shaped local life. Living in a county with significant Hispanic
    and African‑American populations, Jason developed an appreciation for cultural diversity, which informs his inclusive teaching style. He values the close‑knit nature of small‑town life, a respect for
    nature’s rhythms, and a willingness to embrace new ideas—a mix that reflects both classic Southern values and a progressive, curious outlook.
