  career_goals: Jason aims to earn a bachelor's degree in education and pursue a master's in educational leadership within the next three years, positioning himself for a department chair role. He envisions
    developing a STEAM program that links art, technology, and environmental studies, securing grant funding to create a community art garden on the Lake Okeechobee shoreline. Long‑term, he aspires to become
    a school principal and later influence district‑wide curriculum policy, championing inclusive, experiential learning that reflects the cultural diversity of Glades County. He also hopes to mentor emerging
    teachers, fostering a collaborative professional community that values innovative pedagogy.
