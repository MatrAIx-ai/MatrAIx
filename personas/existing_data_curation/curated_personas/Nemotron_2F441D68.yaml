  career_goals: As he approaches traditional retirement age, Bao Joe aims to transition into a mentorship and consultancy role within the Brookline recreation department. He hopes to formalize a senior‑focused
    wellness curriculum, integrate low‑tech and digital tools for activity tracking, and train younger staff in culturally responsive recreation practices. A longer‑term ambition is to establish a community‑based
    intergenerational program that pairs seniors with local schools, fostering mutual learning and social support while leaving a lasting legacy of inclusive recreation.
