personas:
  professional: Leah Kent is a hands‑on meat cutter in a bustling Minneapolis processing plant, where they apply ServSafe certification, knife mastery, and a curiosity for flavor pairings to keep production
    efficient and sanitary, while charting a path toward master butcher certification and one day managing an upscale charcuterie shop.
  sports: Leah Kent, a member of the Minneapolis Outdoor Club, spends weekends hiking the Minnesota Great River Bluffs while cheering for the Minnesota Vikings and the Timberwolves, joins a spring soccer
    pickup league at St. Paul’s park, and pads up for indoor volleyball with friends during the cold winter months.
  arts: Leah Kent immerses themselves in Minneapolis’s vibrant arts scene, catching indie performances by Low at First Avenue, photographing street murals inspired by the bold colors of local artist Kathryn
    Whelsey, dancing contemporary routines that echo Martha Graham’s fluidity, and attending gallery openings featuring painter Karl Bacher’s mixed‑media work.
  travel: Leah Kent, a budget‑conscious explorer, plans spontaneous road trips along Minnesota’s North Shore to hike waterfalls, dreams of a culinary tour through Italy’s Emilia‑Romagna region for sausage
    inspiration, and frequently escapes to Chicago for weekend music festivals, always booking stays through Airbnb to keep costs low.
  culinary: Leah Kent, an enthusiastic home‑cook, perfects bratwurst seasoned with juniper berries and maple glaze, smoke‑cures pork belly over applewood chips for a sweet‑savory finish, experiments with
    fennel‑seed chorizo, and pairs their charcuterie boards with locally brewed craft beer and sourdough crackers.
  core: Leah Kent blends butcher precision with artistic imagination, turning daily meat processing into creative craftsmanship while balancing community service, live music, and a relentless curiosity
    for new flavors.
background:
  cultural: Leah grew up in a middle‑class, white family in the Twin Cities, with roots tracing back to Scandinavian (particularly Swedish) and German ancestors who valued hard work, practicality, and community.
    The multicultural atmosphere of Minneapolis exposed her to a wide range of culinary traditions—from Polish pierogies to Ethiopian injera – shaping her open‑minded approach to food and art. She embraces
    the Midwestern ethos of friendliness and cooperation, which informs her collaborative spirit both at work and in her social life, while also appreciating the city’s progressive arts scene.
attributes:
  skills: '[''Meat cutting and portioning'', ''Food safety (ServSafe) certification'', ''Sanitation and hygiene compliance'', ''Inventory and stock management'', ''Knife and slicer operation'', ''Team coordination
    and communication'', ''Basic culinary techniques'', ''Understanding of animal anatomy'', ''Customer service'', ''Knowledge of sustainable sourcing'']'
  hobbies: '[''Visiting art galleries'', ''Photography'', ''Cooking and experimenting with recipes'', ''Home charcuterie and sausage making'', ''Hiking'', ''Community potluck gatherings'', ''Dance classes'',
    ''Volunteering at community kitchen'', ''Live music attendance'', ''Exploring local food markets'']'
  career_goals: Leah aims to become a certified master butcher and eventually manage the meat department at a high-end grocery or specialty market. She plans to complete a culinary arts program to deepen
    her cooking skills and to pursue a business management certificate so she can open her own artisanal meat and charcuterie shop that highlights locally sourced, ethically raised products. In the longer
    term, she envisions collaborating with local farms to develop sustainable meat processing practices and possibly creating a line of ready-to-cook meat products that incorporate her artistic flair for
    presentation.
