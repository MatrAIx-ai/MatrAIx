persona_description: A former WASP pilot who was part of the experiment that proved women could fly as well as men, and who went on to write poetry about her experiences as a pilot. She was one of the 1,074
  WASP pilots who earned their wings and flew every kind of aircraft in simulated strafing and smoking missions, searchlight tracking, and mountain mapping. She was one of the 25,000 women who applied for
  the WASP program and only 1,830 were chosen. She trained at Sweetwater, Tex., under Jacqueline Cochran, the first female aviator to break the sound barrier. She flew a plane with damaged wings from California
  to Texas for repair, and flew B-26s, towing targets at the gunnery school near Las Vegas, while gunners in B-17s fired live ammunition at the sleeve she towed. She was one of the 38 WASP pilots who died
  during the two years of the program, and she never forgot one crash near Las Vegas, which killed everyone aboard. She wrote poetry about her experiences as a pilot, and her collection of poems, "Flying
  the Zuni Mountains," is dedicated to all women pilots particularly to the WASP members of 44-W-3 on this, the 50th anniversary year of our graduation, receiving of our wings.
