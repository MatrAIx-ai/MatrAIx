personas:
  professional: Juli Jenkins is a senior retail visual merchandiser and customer‑service lead, renowned for turning store windows into gallery‑like displays that reflect current trends, using their curiosity
    for art, strong interpersonal communication, and competitive drive to set sales goals and coach teammates, even while their relaxed approach to planning sometimes leads to last‑minute schedule juggling,
    which they manage by improvising solutions on the fly.
  sports: Juli Jenkins plays in the Des Moines Rebounders co‑ed recreational soccer league, avidly follows the Iowa Hawkeyes men’s basketball team and the Des Moines Menace soccer club, and their flexible,
    competitive nature means they prioritize weekend pick‑up games over strict workout routines, often improvising fitness plans on the fly.
  arts: Juli Jenkins frequents the Des Moines Art Center, sketches watercolors inspired by Grant Wood and Georgia O'Keeffe, immerses themselves in the music of Sufjan Stevens and Lin‑Manuel Miranda, and
    regularly attends community‑theatre productions of classics like \"A Streetcar Named Desire\" starring local talent, letting these artistic experiences shape both their visual merchandising and personal
    outlook, a process they cherish.
  travel: Juli Jenkins enjoys weekend road trips to the Iowa Great Lakes and annual visits to Chicago’s Art Institute, has explored Portland’s coffee scene, and dreams of strolling through Venice’s canals
    and attending the Edinburgh Festival, balancing local explorations with a longing for European cultural immersion that they actively plan for each spare vacation.
  culinary: Juli Jenkins favors farm‑to‑table flavors, often cooking a roasted beet and goat‑cheese salad with fresh basil and honey, loves avocado toast with poached eggs and chili oil at coffee shops,
    and occasionally experiments with homemade kimchi, a culinary curiosity they pursue on weekends.
  core: Juli Jenkins blends a curiously artistic eye with a competitive retail drive, juggling coffee‑shop cravings, occasional disorganization, and a passion for community art, all while they dream of
    a boutique that showcases Midwestern creators.
background:
  cultural: Juli is a White Midwestern American who grew up in Iowa, absorbing the region’s emphasis on community, modesty, and practicality. Her upbringing in Des Moines gave her a strong connection to
    local traditions such as county fairs, farmers markets, and Midwestern hospitality. While she values these roots, her curiosity drives her to seek diverse cultural experiences through art, music, and
    travel. Her divorce has deepened her resilience and reinforced her reliance on a broad social network of friends, coworkers, and community groups.
attributes:
  skills: '[''Customer Service'', ''Interpersonal Communication'', ''Visual Merchandising'', ''Trend Spotting'', ''Sales Goal Management'', ''Basic Data Analysis (Excel)'', ''Conflict Resolution'', ''Improvisational
    Problem Solving'', ''Team Leadership'', ''Community Outreach'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Community theater'', ''Reading contemporary fiction'', ''Exploring coffee shops'', ''Recreational soccer'', ''Charity thrift‑store volunteering'',
    ''DIY home décor'', ''Photography'']'
  career_goals: Juli aims to be promoted to store manager within the next two years, leveraging her leadership skills and artistic eye to boost store performance. In the longer term she wants to move into
    district management or a corporate merchandising role where she can shape visual concepts across multiple locations. Ultimately, she dreams of opening a boutique that showcases works by local Midwestern
    artists, merging her love of art with retail entrepreneurship.
