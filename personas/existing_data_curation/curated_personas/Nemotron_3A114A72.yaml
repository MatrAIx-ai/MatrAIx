  hobbies: '[''Building block towers'', ''Backyard nature exploration'', ''Picture book storytime'', ''Crayon drawing'', ''Pretend play with fire trucks'', ''Singing nursery rhymes'', ''Play kitchen assistance'']'
  career_goals: Charles often talks about becoming a firefighter or a teacher when he grows up, saying he wants to help people and keep everyone safe. His ambition is guided by his natural compassion and
    his love for learning how things work—he enjoys watching fire trucks and listening to stories about community helpers. Although he is still very young, he shows an early desire to pursue a career that
    combines caring for others with practical problem solving.
