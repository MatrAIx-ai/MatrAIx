  hobbies: '[''Improv Comedy'', ''Board Games'', ''Hiking'', ''Running'', ''College Basketball Fan'', ''Acoustic Guitar'', ''Open‑Mic Performances'', ''Theater Attendance'', ''Art Gallery Visits'', ''Reading
    Non‑Fiction on Leadership and Culture'']'
  career_goals: William aims to advance from his current supervisory role to a district manager position within the next three to five years, overseeing multiple store locations. He plans to enroll in an
    MBA program focusing on supply chain and retail strategy to broaden his business acumen. Long‑term, he envisions launching his own boutique retail concept that blends his passion for the arts with curated
    product offerings, leveraging e‑commerce platforms while maintaining a strong community presence.
