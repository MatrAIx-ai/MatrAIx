  career_goals: He aims to advance to a senior program‑manager role overseeing enterprise‑wide technology initiatives, earn PMP and Agile Certified Practitioner credentials, and eventually launch his own
    consultancy that promotes psychologically safe project environments. William also seeks to embed mindfulness and stress‑reduction practices into his teams, reducing the intense anxiety he experiences
    personally while fostering healthier work cultures.
