  hobbies: '["Gardening", "Hiking", "Reading mystery novels", "Knitting", "Cooking Southern cuisine", "Listening to classic rock", "DIY home improvement projects", "Meditation and yoga", "Attending local
    music festivals"]'
  career_goals: Gayle aims to move from seasoned installer to lead foreperson on larger commercial projects, leveraging her curiosity for sustainable flooring options such as cork and reclaimed wood. She
    hopes to obtain a certification in green building practices and eventually start a small family-run flooring business that pairs high-quality craftsmanship with flexible scheduling for workers. Mentoring
    apprentices is important to her, and she wants to be recognized as a reliable, innovative professional while securing a stable environment that helps manage her anxiety.
