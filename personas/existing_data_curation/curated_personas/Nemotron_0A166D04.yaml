  career_goals: Robert dreams of becoming someone who can combine his love for action, teamwork, and helping others. He imagines a future as a professional athlete—particularly a football or soccer player—so
    he can stay active and lead a team. He is also drawn to roles that provide structure and immediate community impact, such as a firefighter or a police officer. At the same time, his fascination with
    video games fuels an ambition to someday create his own games, where he can design stories that bring friends together. Regardless of the path, he wants a career that lets him stay connected to his
    peers, make a tangible difference, and offer a clear, predictable routine.
