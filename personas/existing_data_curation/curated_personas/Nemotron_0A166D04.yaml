personas:
  professional: Robert Tyson is an aspiring junior programmer who crafts simple Scratch games and builds LEGO robotics kits, blending his love for teamwork with a practical, step‑by‑step mindset while occasionally
    letting his relaxed attitude toward deadlines cause him to scramble before school projects are due.
  sports: Robert Tyson plays on the Midtown Juniors youth soccer team and joins flag football games with friends, cheers for the local high‑school Riverdale Rams, rides his bike around the neighborhood
    after school, and channels his assertive energy into both cooperative plays and occasional competitive rivalries.
  arts: 'Robert Tyson devours graphic novels like "Spider‑Man: Homecoming" and streams pop hits from Billie Eilish and hip‑hop tracks by Travis Scott, while his LEGO creations echo the vivid color palettes
    of street artist Banksy’s murals and his Scratch projects showcase a budding flair for digital storytelling.'
  travel: Robert Tyson enjoys weekend rides on his bike to the nearby Pine Creek State Park for camping drills with his Boy Scout troop, dreams of exploring the Grand Canyon’s rim, and prefers family road
    trips that balance structured itineraries with spontaneous stops at quirky roadside attractions.
  culinary: Robert Tyson favors pepperoni pizza, chicken nuggets, and homemade tacos, often experimenting with assembling LEGO‑shaped fruit skewers, yet he tends to snack on sugary cereal while gaming,
    and his practical side ensures he always has a stash of pretzels for after‑practice refueling.
  core: Robert Tyson is an energetic 11‑year‑old who blends a love for team sports, LEGO engineering, and video‑game strategy with a practical yet sometimes disorganized mindset, constantly juggling worries
    about performance and money while thriving in social, collaborative settings.
background:
  cultural: Robert grew up in a middle‑class White family in North Charleston, South Carolina, where Southern traditions and community ties shape daily life. His family celebrates holidays like Thanksgiving,
    Christmas, and Easter with typical Southern foods such as fried chicken, barbecue, and sweet potato casserole. He attends a local public elementary school that emphasizes community service, and his
    family participates in church activities, reflecting the region’s Christian heritage. The local culture, with its love for football, outdoor recreation along the Charleston harbor, and a strong sense
    of hospitality, influences his interests, values, and social interactions.
