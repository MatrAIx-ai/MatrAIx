  career_goals: Ilias aims to deepen his impact on Montclair’s cultural landscape by serving on the board of a local historical society and launching a community oral‑history initiative that captures stories
    of long‑time residents. He wishes to mentor emerging nonprofit leaders through a structured apprenticeship program, and to author a book chronicling the architectural evolution of Montclair’s neighborhoods.
    Additionally, he aspires to achieve certification in non‑profit financial management to enhance his advisory capacity.
