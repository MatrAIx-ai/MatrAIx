  hobbies: '[''Reading Latin American literature'', ''Playing charango and acoustic guitar'', ''Cooking Bolivian cuisine'', ''Hiking in Virginia parks'', ''Nature photography'', ''Volunteering at cultural
    festivals'', ''Learning basic Quechua'', ''Attending museum exhibitions and documentaries'']'
  career_goals: Carlos aims to transition from his current period outside the formal workforce into a role that merges his passion for cultural heritage with his practical skill set. He plans to pursue
    a Master's degree in Museum Studies or Public History within the next two years, positioning himself for a position as a Cultural Programs Coordinator at a regional museum or a nonprofit focused on
    Latin American immigrant integration. His long‑term ambition is to become a Cultural Programs Manager, designing bilingual educational workshops, curating exhibitions that showcase Bolivian and Andean
    traditions, and securing grant funding to sustain community outreach initiatives. He balances his curiosity for new ideas with a pragmatic approach to career stability, seeking a role that offers both
    creative fulfillment and reliable income.
