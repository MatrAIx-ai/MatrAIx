personas:
  professional: Carlos Reyesrivera leverages bilingual research expertise and methodical project management to design bilingual museum workshops, draft grant proposals, and coordinate community cultural
    events, and they balance creative curiosity with pragmatic deadlines to ensure reliable program delivery.
  sports: Carlos Reyesrivera enjoys weekend hikes across the Shenandoah and Blue Ridge Mountains, complemented by avid nature photography, and they follow the Washington Nationals and the Women's National
    Soccer Team, joining a local hiking club that meets monthly while maintaining a modest cardio routine on a stationary bike.
  arts: Carlos Reyesrivera immerses themselves in contemporary Latin American literature, often citing works by Marcelo Ordoñez, devotes evenings to mastering the charango and acoustic guitar for traditional
    folk songs, and they regularly attend museum exhibitions featuring modern photography and documentary screenings, drawing inspiration from artists such as Frida Kahlo and singer-songwriter Mercedes
    Sosa.
  travel: Carlos Reyesrivera prefers self-planned adventure travel, crafting detailed itineraries for hikes across the Appalachian Trail and dreaming of future treks to the Andes, balancing active exploration
    with occasional weekend getaways to historic colonial towns like Cartagena for cultural immersion, all while managing a modest travel budget.
  culinary: Carlos Reyesrivera enjoys preparing traditional dishes such as salteñas and pique macho, expertly crafting the spiced meat filling for the former, cooking hearty slices of sausage for the latter,
    and experimenting with quinoa-based salads featuring roasted corn, cilantro, and ají amarillo paste, while they often host potluck gatherings for friends to share their culinary creations.
  core: Carlos Reyesrivera blends scholarly rigor with artistic curiosity, meticulously planning cultural projects while indulging in charango melodies, mountain hikes, and homemade quinoa dishes, navigating
    life with a pragmatic yet adventurous spirit.
background:
  cultural: Carlos was born to Bolivian parents who immigrated to the United States in the early 1990s. He grew up in a bilingual household in the Washington, D.C. metro area, celebrating traditional festivals
    such as Carnaval de Oruro and Cruz de Mayo. His family maintains strong ties to their hometown of Cochabamba, visiting regularly and preserving customs like sharing traditional music, dance, and food.
    Carlos participates in the local Bolivian diaspora community in Fairfax, attending cultural events, contributing to community newsletters, and supporting newer immigrants. His Catholic upbringing interweaves
    with Indigenous Andean beliefs, shaping a multifaceted cultural identity that influences his worldview and professional aspirations.
