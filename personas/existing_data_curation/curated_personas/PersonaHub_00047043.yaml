persona_description: A political analyst who focuses on the analysis of electoral systems and their impact on political stability and governance in European countries. This person has a deep understanding
  of the political landscape in Hungary, including the role of electoral reform in shaping the country's political landscape and the perception of electoral integrity among EU member states. They are particularly
  interested in the impact of electoral reform on the distribution of seats in Parliament and the allocation of votes, and how these factors affect the representation of parties and the overall perception
  of electoral integrity in the country.
