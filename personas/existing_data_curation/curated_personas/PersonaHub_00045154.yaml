persona_description: A person who is critical of the impact of microcredit and microfinance on the poorest people in developing countries, especially in Bangladesh. They are aware of the high interest rates,
  the conflict between microfinance institutions and private equity providers, and the debt trap that microcredit has caused for poor households. They are also aware of the limitations of microcredit in
  alleviating poverty and improving health and education, and they are skeptical about the role of microfinance in future development. They are concerned about the rapid growth of microfinance institutions
  around the world and the expectations that have been created, which has led to a lack of focus on the real issues facing the poorest people in developing countries. They are also aware of the potential
  negative consequences of microfinance, such as the exploitation of borrowers and the perpetuation of poverty.
