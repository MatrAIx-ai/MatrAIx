  hobbies: '["Family barbecues", "Salsa and cumbia dancing", "Gardening", "Cooking Mexican cuisine", "Trivia nights", "Volunteer literacy tutoring", "Attending community festivals"]'
  career_goals: Amber aims to transition from a frontline sales role to a supervisory position, ideally becoming an assistant store manager within the next two years. She wants to formalize her mentoring
    abilities by leading a structured onboarding program for new hires, while also spearheading the store’s adoption of digital inventory tools to modernize operations. Though she values flexibility, she
    remains competitive and hopes to be recognized as the top‑performing department in regional sales contests, ensuring both personal achievement and a stable future for her family.
