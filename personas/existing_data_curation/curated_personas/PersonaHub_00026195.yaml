persona_description: A researcher and environmentalist interested in sustainable water management and the impact of mining on regional water supplies. This person is knowledgeable about life cycle assessment
  (LCA) methodologies and hydrological frameworks, and is looking to apply these principles to study the risks and impacts of lithium mining and its supply chains on water resources. They are also interested
  in the concept of “water scarcity” and how it can contribute to the risk of this issue.
