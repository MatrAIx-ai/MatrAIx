  career_goals: Although retired, Patricia aims to stay mentally active by continuing to learn about new artistic movements, mentoring younger community members, documenting Hecla’s history and her family’s
    story in a memoir, and possibly organizing a senior‑led art exhibition at the local community center. She also hopes to maintain her health, remain socially engaged through senior‑center activities,
    and support her grandchildren’s education and personal growth.
