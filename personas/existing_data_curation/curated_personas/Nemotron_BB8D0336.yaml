personas:
  professional: An ambitious rental clerk named Sonja Bolano uses their bilingual fluency, cash‑handling expertise, and knack for conflict resolution to deliver stellar service in Miami’s tourist hub, while
    eyeing a supervisory role that blends organization with their natural flexibility.
  sports: Sonja Bolano competes in beach volleyball with the Miami Beach Volleyball Club, follows the Miami Dolphins and the Miami Marlins for their community vibe, and fits in weekly morning jogs along
    the boardwalk to stay fit.
  arts: Sonja Bolano’s artistic side shines through salsa and bachata nights in Little Havana, weekend street‑art photography of Wynwood murals, devotion to writers like Junot Díaz and Zadie Smith, and
    they never miss the live performances of Celia Cruz tribute band The Mambas.
  travel: Sonja Bolano plans trips with a mix of spontaneous day‑trips to the Florida Keys and structured weekend getaways to Cartagena, balancing their love for vibrant street scenes with budget‑conscious
    Airbnb stays, and they always pack a reusable water bottle and a camera.
  culinary: Sonja Bolano enjoys cooking mofongo with chicharrón, arroz con gandules with sofrito, and crispy plantain tostones for friends, boasting an intermediate skill level that blends family recipes
    with their own improvisations yet often burns the garlic when multitasking.
  core: Sonja Bolano is a sociable, organized go‑getter who blends practical work savvy with vibrant cultural passions, while occasionally succumbing to impulse splurges and forgetful health routines.
background:
  cultural: Sonja is a second‑generation Puerto Rican who grew up in a bilingual household in Miami. She was raised with the island’s vibrant music, food, and family traditions—celebrating holidays such
    as Día de la Independencia de Puerto Rico and participating in local fiestas that feature bomba, plena, and salsa. Her home environment blends Caribbean rhythms with the multicultural tapestry of South
    Florida, giving her fluency in both Spanish and English and a deep appreciation for Caribbean and Latin American cultures. Sonja maintains close ties to the Puerto Rican diaspora community, often attending
    cultural gatherings at La Casa de la Cultura Puertorriqueña and supporting initiatives that preserve island heritage within the city. This cultural grounding informs her friendly, inclusive approach
    to service and community involvement.
