  hobbies: '[''Salsa and Bachata Dancing'', ''Cooking Traditional Puerto Rican Dishes'', ''Community Volunteering (after‑school tutoring & senior programs)'', ''Exploring Miami Neighborhoods and Street
    Photography'', ''Beach Volleyball'', ''Attending Live Music and Cultural Festivals'', ''Reading Contemporary Fiction and Caribbean Literature'', ''Participating in a Spanish‑Language Book Club'']'
  career_goals: Sonja aims to move into a supervisory role within the rental industry within the next two years, leveraging her hands‑on experience and bilingual strengths to manage a team of clerks. She
    plans to enroll in a community‑college certificate program in hospitality management to formalize her knowledge and eventually qualify for a branch manager position. In the longer term, she dreams of
    launching her own small‑scale rental business—such as a bike‑share or beach‑gear outlet—that emphasizes community outreach and affordable services for locals and tourists alike. Throughout her career
    progression, she is motivated by the opportunity to mentor new employees, improve customer experiences, and contribute positively to Miami’s vibrant tourism ecosystem.
