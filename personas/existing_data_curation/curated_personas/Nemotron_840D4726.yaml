  hobbies: '["Visiting art galleries and mural tours", "Watercolor painting", "Salsa, bomba, and plena music", "Reading art history and Caribbean literature", "Cooking traditional Puerto Rican cuisine with
    modern twists", "Participating in community festivals", "Guiding cultural heritage tours", "Following Puerto Rico baseball league"]'
  career_goals: At this stage, Axel aims to transition from front‑line support to a leadership role within the customer service department, such as a team lead or quality‑assurance specialist, where he
    can mentor younger agents and shape service standards. He is also interested in developing a training curriculum that incorporates creative problem‑solving techniques inspired by his love of art and
    unconventional thinking. Long‑term, Axel envisions leveraging his industry experience and artistic curiosity to consult for small businesses on customer experience design or to launch a community‑focused
    initiative that showcases local Puerto Rican artists, combining his professional expertise with his cultural passions while maintaining a balanced work‑life schedule before retirement.
