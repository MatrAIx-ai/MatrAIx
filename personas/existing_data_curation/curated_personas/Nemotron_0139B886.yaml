  career_goals: Donna dreams of a career that blends her love for art, helping others, and creating structured, inclusive environments. She aspires to become a teacher or school counselor so she can support
    students academically and emotionally, and she is also intrigued by the idea of a community arts coordinator who designs workshops that bring people together. In the long term, she plans to pursue a
    degree in education or social work with a minor in visual arts, allowing her to integrate creativity into her professional life.
