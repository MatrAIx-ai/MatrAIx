personas:
  professional: Donna Sutherland, an aspiring young illustrator who merges traditional sketching with digital art on a tablet, meticulously plans each project from concept to final detail, and lets their
    curiosity drive experiments with mixed media, even as they worry about achieving perfection.
  sports: Donna Sutherland, a spirited midfielder on the Mahomet Middle School soccer team who also follows the Chicago Fire and cheers for the Chicago Cubs, dedicates weekend mornings to practice while
    balancing a love for cooperative games, yet often overthinks performance under pressure.
  arts: Donna Sutherland, a passionate visual artist who spends afternoons drawing fantasy characters, painting with watercolors, creating digital comics on their tablet, and performing in the school drama
    club, drawing inspiration from Hayao Miyazaki, J.K. Rowling, and Lin‑Manuel Miranda, while sometimes staying up late perfecting a piece.
  travel: Donna Sutherland, who loves exploring the forest trails along the Sangamon River, dreams of camping in Yosemite National Park, hopes to visit the Wizarding World at Universal Studios, and prefers
    budget‑friendly road trips with family, though they often overpack their sketchbooks for each outing.
  culinary: Donna Sutherland, who enjoys making homemade pizza topped with fresh mozzarella and basil, blending rainbow fruit smoothies, and occasionally baking cupcakes for school fundraisers, yet often
    forgets to clean the kitchen after cooking.
  core: Donna Sutherland, a curious, organized, and compassionate 12‑year‑old whose boundless creativity in art and soccer is balanced by a tendency to worry and over‑schedule every spare moment.
background:
  cultural: Donna grew up in Mahomet, a small Midwestern town in Piatt County, Illinois, where community ties, family involvement, and local traditions such as county fairs and volunteerism are highly valued.
    Her upbringing reflects a blend of modest, hard‑working values common in the region, an emphasis on education, and participation in school and community activities. While she identifies as white, her
    family and neighborhood celebrate a diverse set of perspectives through school programs and community events, fostering her appreciation for varied experiences and her compassionate outlook.
