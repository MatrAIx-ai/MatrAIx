personas:
  professional: Tammy Littleton, an elementary and middle school teacher in Harnett County, combines disciplined curriculum design with a passion for integrating visual arts into core subjects, using data‑driven
    instruction and structured routines to foster a calm, creative learning environment.
  sports: Tammy Littleton enjoys low‑impact fitness, joining the Harnett County Trail Club for weekly hikes, cheering on the Carolina Panthers and the Duke Blue Devils, and attending seasonal community
    runs while preferring solitary walks over team sports.
  arts: Tammy Littleton expresses their artistic side through watercolor landscapes of the North Carolina countryside, draws inspiration from Georgia O’Keeffe and Monet, captures sunrise moments with a
    Nikon DSLR, and frequents the Greensboro Art Museum and local community theater productions of "The Glass Menagerie."
  travel: Tammy Littleton plans meticulous weekend getaways, favoring the Blue Ridge Mountains for sunrise hikes, has visited Asheville’s River Arts District, dreams of touring Florence’s Uffizi Gallery,
    and balances travel budgeting with a longing for quiet, nature‑focused retreats.
  culinary: Tammy Littleton, a competent home cook, delights in preparing grilled trout with lemon‑dill sauce, sautéed collard greens with smoked turkey, and a seasonal wild mushroom risotto featuring fresh
    herbs from their native‑plant garden, while occasionally treating themselves to a late‑night slice of artisan pizza from a local pizzeria.
  core: Tammy Littleton is a disciplined educator who thrives in solitary creative pursuits, balances meticulous budgeting with artistic indulgences, and channels curiosity into both classroom innovation
    and quiet personal hobbies.
background:
  cultural: 'As a white woman raised in Dunn, a small town in Harnett County, North Carolina, Tammy grew up immersed in Southern hospitality, close-knit community values, and a modest, work-oriented family
    culture. Her upbringing included regular participation in church gatherings, family potlucks featuring Southern comfort foods, and an appreciation for regional folklore and storytelling. These cultural
    influences shape her teaching philosophy: she values respect, personal responsibility, and community connections while encouraging students to explore diverse ideas. Tammy also incorporates local history
    and regional literature into her lessons, fostering a sense of place and belonging among her students.'
attributes:
  skills: '[''Curriculum design with arts integration'', ''Differentiated instruction'', ''Classroom management and behavior support'', ''Data-driven assessment'', ''Educational technology integration'',
    ''Lesson planning and organization'', ''Special education basics (IEP coordination)'', ''Teacher mentorship'', ''After-school program coordination'', ''Professional development facilitation'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading contemporary fiction and art history'', ''Birdwatching'', ''Hiking local trails'', ''Native-plant gardening'', ''Digital photography'', ''Visiting
    local art galleries'', ''Attending community theater (quietly)'']'
  career_goals: Tammy is determined to complete her bachelor's degree in education and pursue a master's in Curriculum and Instruction within the next three years. She aims to become a lead teacher or curriculum
    specialist where she can champion interdisciplinary, art-focused teaching models across the Harnett County school system. Long-term, she aspires to a school administration role, such as principal, to
    influence schoolwide policy and foster a culture of high expectations paired with creative inquiry. Additionally, she hopes to launch a district-wide after-school arts initiative that provides quiet,
    structured creative outlets for students who thrive in solitary, reflective environments.
