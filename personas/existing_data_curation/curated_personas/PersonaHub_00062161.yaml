persona_description: A scientist who studies the behavior and survival strategies of small fish, particularly those that use false eyespots to protect themselves from predators. The scientist is a member
  of the ARC Centre of Excellence for Coral Reef Studies, where they have conducted research on the topic and published their findings in the journal Scientific Reports. The scientist is interested in the
  evolutionary adaptations of small fish and how they use these adaptations to survive in their environment. They are likely to be curious about the details of the study and to be interested in the implications
  of the research for the conservation of coral reefs and the survival of small fish populations.
