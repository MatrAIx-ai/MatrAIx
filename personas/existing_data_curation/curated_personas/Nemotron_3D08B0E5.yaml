  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Cooking Bengali cuisine'', ''Yoga'', ''Mindfulness workshops'', ''Volunteering for free tax assistance'', ''Attending cultural festivals'', ''Reading contemporary
    fiction'', ''Balcony gardening'']'
  career_goals: Sadia is focused on building a stable, upward-moving career in accounting. In the next two to three years she plans to earn the Certified Bookkeeper designation and complete an associate
    degree in accounting at a local community college. She aims to transition into a senior bookkeeping or accounting clerk role, taking on supervisory responsibilities for a small team. Long-term, Sadia
    hopes to qualify for an internal audit position within a mid-size firm, leveraging her detail-oriented nature and stress-resilience to contribute to compliance and risk-management initiatives. She values
    structured career pathways and seeks opportunities that allow her to combine her technical expertise with her interest in supporting community-focused financial services, such as volunteering for low-income
    tax assistance programs.
