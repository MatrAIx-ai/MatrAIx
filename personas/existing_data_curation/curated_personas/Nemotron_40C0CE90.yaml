  career_goals: At this stage of his career, Franco aspires to lead a multidisciplinary research laboratory focused on sustainable energy materials, leveraging his physics background and artistic sensibility
    to innovate novel solutions. He aims to secure a major, multi‑year grant from a national funding agency, publish a series of high‑impact papers, and become a recognized speaker at international conferences.
    Franco is also committed to fostering the next generation of underrepresented scientists, particularly Mexican‑American youth, by expanding mentorship programs and establishing science‑art outreach
    initiatives within Dallas schools. Ultimately, he hopes to influence science policy at the state level, advocating for increased funding for interdisciplinary research and community‑engaged STEM education.
