  career_goals: Although only three, Phillip loves imagining future jobs that let him help others. He often says he wants to be a 'big helper' – dreaming of roles like firefighter, teacher, or veterinarian.
    He shows curiosity about how things work, prompting playful fantasies of building simple machines or fixing broken toys, while his caring nature steers him toward caring for people and animals. His
    modest ambition is to keep learning new things and eventually contribute to his community.
