personas:
  professional: Phillip Ford, a curious three‑year‑old who loves building tall towers with wooden blocks, treats every play session like a miniature engineering project, blending imagination with a surprisingly
    practical eye for balance and stability.
  sports: Phillip Ford, a little explorer who races the grass slides at the neighborhood park, cheers for the Loganville Little Kickers soccer team during Saturday matches, and watches the Georgia Bulldogs
    football games with his family on Sundays, often mimicking the players’ victory dances.
  arts: Phillip Ford, an enthusiastic fan of the Sesame Street soundtrack and the upbeat tunes of the Mickey Mouse Clubhouse, spends afternoons coloring printable scenes of his favorite characters while
    trying to hum along to the songs of contemporary pop kid group Kidz Bop.
  travel: Phillip Ford, who reverently remembers the bright lights of Disney World in Orlando from a family vacation last summer and now dreams of splashing in the gentle waves at Tybee Island, prefers
    short road trips neatly planned by his parents with plenty of snack breaks.
  culinary: Phillip Ford, who can always be found reaching for a bite of crispy chicken nuggets, slurping mac and cheese, or savoring a warm spoonful of peach cobbler after dinner, enjoys helping stir the
    batter with a plastic spoon while humming a kitchen‑timer tune.
  core: Phillip Ford is the sweet‑tempered, curious three‑year‑old who balances a love for building, saving pennies, and weekend family traditions, all while occasionally forgetting to tidy up his crayons.
background:
  cultural: 'Phillip was raised in a suburban, predominantly white community in Loganville, Georgia. His family participates in typical Southern traditions: attending a local church on Sundays, celebrating
    holidays like Thanksgiving and Christmas with family gatherings and southern foods such as fried chicken, peach cobbler, and barbecue. Community values of hospitality, politeness, and outdoor recreation—like
    playing at the neighborhood park or joining school‑organized preschool activities—shape his worldview. These cultural influences foster his cooperative and considerate nature while providing a familiar,
    safe environment for his curiosity to flourish.'
