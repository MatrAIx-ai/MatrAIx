  career_goals: Looking ahead, Douglas aims to transition into a solution architect role where he can shape the strategic direction of large‑scale digital transformation projects while preserving the structured,
    predictable workflows he values. Over the next five years he plans to earn an AWS Solutions Architect certification and lead a cross‑functional team of developers and analysts as a principal engineer.
    He is committed to mentoring junior talent both within his company and through local coding bootcamps, and hopes to eventually shift to part‑time consulting so he can balance work responsibilities with
    family time and reduce chronic stress. His long‑term ambition includes authoring a guide on integrating business analysis with agile development for mid‑size enterprises.
