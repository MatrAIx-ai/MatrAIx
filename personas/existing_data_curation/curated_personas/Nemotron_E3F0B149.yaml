personas:
  professional: Mae Phillip, a seasoned certified public accountant, blends deep expertise in GAAP, IFRS, SAP, and Six Sigma‑driven process improvement with their curiosity‑practical balance to lead audit
    teams that embrace technology while they uphold meticulous internal controls.
  sports: Mae Phillip enjoys early‑morning hikes in the Big Thicket National Preserve, plays casual tennis at the Beaumont Community Center, cheers for the Houston Astros and Texans, and they participate
    in a women’s hiking club that meets monthly for trail clean‑ups.
  arts: Mae Phillip immerses themselves in the local blues scene, attending weekly shows at Beaumont’s Roxy where they often see tributes to B.B. King and Stevie Ray Vaughan, collect live recordings of
    Wynton Marsalis, and contribute soulful storytelling at their church’s gospel choir and the neighborhood book club.
  travel: Mae Phillip prefers road‑trip itineraries that blend cultural immersion and culinary adventure, having recently explored New Orleans’ French Quarter for gumbo tasting and spent a rejuvenating
    week in Jamaica’s reggae‑filled coastal towns, they meticulously plan trips around school holidays and use credit‑card points to offset airfare for their family.
  culinary: Mae Phillip’s kitchen reflects a love for Southern and Caribbean flavors, expertly preparing dishes like jambalaya, collard greens braised with smoked turkey, and Trinidadian roti filled with
    curried goat, while their herb garden supplies fresh basil, thyme, and okra, though they sometimes over‑spice a batch in their enthusiasm for bold heat.
  core: Mae Phillip balances a disciplined accountant’s precision with a soulful devotion to blues, garden‑fresh cooking, and community mentorship, and they regularly battle a habit of late‑night spreadsheet
    tinkering.
background:
  cultural: Mae is an African‑American woman whose family roots trace back to the Great Migration from the Deep South. Raised in Beaumont, Texas, she grew up amid a blend of Southern hospitality, church‑centered
    community life, and the Gulf Coast’s diverse cultural tapestry, including influences from neighboring Creole and Cajun traditions. Her cultural identity emphasizes family cohesion, service to the community,
    and a celebration of Black artistic expressions such as blues, jazz, and storytelling. These traditions shape her values of cooperation, resilience, and a commitment to uplifting others.
attributes:
  skills: '[''Financial reporting'', ''Audit planning and execution'', ''Tax compliance'', ''Internal controls'', ''GAAP'', ''IFRS'', ''ERP systems (SAP, Microsoft Dynamics)'', ''Advanced Excel (including
