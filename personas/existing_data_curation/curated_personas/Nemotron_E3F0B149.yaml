  hobbies: '[''Cooking Southern and Caribbean cuisine'', ''Gardening (vegetables and herbs)'', ''Reading historical fiction and biographies'', ''Yoga and pilates'', ''Volunteer financial literacy teaching'',
    ''Attending blues and jazz concerts'', ''Hiking in Big Thicket National Preserve'', ''Book club participation'']'
  career_goals: Mae aims to move into a senior managerial position within her firm, eventually becoming Director of Audit Services or Chief Financial Officer of a mid‑size organization. She plans to deepen
    her expertise in forensic accounting and earn the Certified Fraud Examiner designation. Over the next five years, she intends to lead a regional audit team, spearhead technology‑driven audit initiatives,
    and champion diversity and inclusion programs within the accounting profession. In the long term, she envisions launching a boutique consultancy that provides financial literacy workshops to underserved
    communities in East Texas.
