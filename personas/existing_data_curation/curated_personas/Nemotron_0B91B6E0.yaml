  career_goals: Pedro aims to become a fully certified heavy‑equipment operator by completing a nationally recognized apprenticeship and obtaining a commercial driver’s license. He plans to advance to a
    crew foreman role within the next five years, leveraging his organized work style and leadership potential. Long‑term, he dreams of starting his own small construction firm that integrates functional
    building with aesthetic considerations, allowing him to merge his technical expertise with his appreciation for art and design.
