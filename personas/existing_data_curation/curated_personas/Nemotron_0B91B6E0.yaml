personas:
  professional: A meticulous heavy‑equipment operator, Pedro Duenez expertly maneuvers excavators and bulldozers on Houston construction sites, adhering to strict safety protocols, reading blueprints with
    ease, and intuitively sketching site layouts that blend functionality with the city’s vibrant street‑art aesthetic, all while coordinating crew tasks in both English and Spanish.
  sports: Pedro Duenez plays competitive pickup soccer for a local league that rallies like the Houston Dynamo, frequents MacArthur Skatepark to practice tricks while blasting regional Mexican tracks, casts
    a line at sunrise on Lake Houston for quiet fishing sessions, and follows the Houston Astros and Rockets with a fervor that mirrors their own competitive spirit.
  arts: Pedro Duenez explores Houston’s thriving street‑art corridors, capturing murals with a handheld camera and sketching designs inspired by the bold colors of Diego Rivera and the dynamic brushwork
    of contemporary graffiti artist Kelsey Montague, while their playlists swing between the gritty riffs of Muse and the heartfelt verses of Los Tigres del Norte.
  travel: Pedro Duenez enjoys weekend road trips to Austin’s eclectic music scene and the hill country’s fishing spots, dreams of a mural‑tour across Berlin’s East Side Gallery, and plans a future summer
    backpacking adventure through the highlands of Peru to sketch Andean architecture, balancing modest savings with a penchant for spontaneous detours.
  culinary: Pedro Duenez favors bold flavors, frequently preparing tacos al pastor with pineapple‑marinated pork, fresh cilantro, and homemade salsa verde, experiments with grilling catfish seasoned with
    smoked paprika and lime, and, despite only moderate kitchen confidence, enjoys hosting friends for late‑night nacho spreads featuring cotija cheese and jalapeño slices.
  core: Pedro Duenez fuses a disciplined construction work ethic with an off‑beat artistic curiosity, habitually staying up late to draft mural ideas while occasionally forgetting to set their alarm, a
    quirky mix that fuels both their career ambition and weekend fishing rituals.
background:
  cultural: Pedro grew up in a bilingual Mexican‑American household in Houston’s East End, where family gatherings often feature traditional dishes like tacos, tamales, and pozole. He speaks Spanish at
    home and English at work, bridging both cultures. Celebrations such as Cinco de Mayo, Día de los Muertos, and local Hispanic festivals are central to his social life, reinforcing community ties. His
    upbringing instilled a strong sense of family loyalty, respect for Mexican heritage, and an openness to the diverse cultural landscape of Houston.
