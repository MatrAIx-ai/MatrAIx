persona_description: A software engineer at NASA's Johnson Space Center who specializes in developing software systems for solving trajectory design and optimization problems for spacecraft. The individual
  has expertise in the development of a unified framework for modeling, designing, and optimizing spacecraft trajectories for robotic and human missions. The software provides a single, unified framework
  for modeling and optimization for problems ranging from a single spacecraft orbiting a single celestial body to a mission involving multiple spacecraft and multiple propulsion systems operating in gravitational
  fields of multiple celestial bodies. The unique architecture allows analysts to solve a trajectory optimization problem in one of three distinct control methods. The software may be released for U.S.
  Government purposes only. The individual is likely to be interested in the technology's potential commercial applications and is seeking information about the technology and NASA's technology transfer
  program.
