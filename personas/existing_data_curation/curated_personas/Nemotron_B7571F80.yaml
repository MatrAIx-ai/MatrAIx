  career_goals: Although retired, James is determined to keep contributing his expertise to the community. He aims to obtain an Advanced Community Emergency Response Team (CERT) instructor certification
    and expand his role as a volunteer emergency‑response trainer. He plans to launch a hands‑on apprenticeship program for local teens, teaching practical trades like carpentry and engine maintenance.
    Over the next few years he hopes to compile and publish a modest oral‑history of Saint Leonard, preserving stories of longtime residents. James is also driven to earn the county’s “Citizen Volunteer
    of the Year” award and to become a recognized mentor and speaker at regional community‑development conferences.
