persona_description: A veterinarian who specializes in the treatment of cats and has expertise in the management of chronic feline gingivostomatitis, a severe inflammation or ulceration of the oral tissues.
  She is highly skilled in the extraction of all teeth to provide complete relief for the cats and has experience in the use of interferon and cyclosporin to help block the immune system's attack on the
  tissue. She is also knowledgeable about the use of antibiotics to decrease the amount of bacteria in the plaque build-up, which may be a trigger for the cat's immune response. Additionally, she is aware
  of the importance of annual exams with the family veterinarian to identify and treat the condition as soon as possible.
