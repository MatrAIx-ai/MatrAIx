personas:
  professional: Jacqueline Williams is a prototype engineering specialist who merges CNC programming, SolidWorks and Fusion 360 modeling, and hand‑craft pattern‑making to translate concept sketches into
    high‑precision metal and plastic parts, channeling her curiosity and artistic eye into sustainable material experiments while balancing meticulous organization with the flexibility needed to stay calm
    under pressure.
  sports: Jacqueline Williams enjoys a low‑impact fitness routine centered on weekend hikes along the Natchez Trace and state park treks, practices weekly Vinyasa yoga at the downtown studio and participates
    in the local Natchez Trailblazers hiking club, while cheering for the Nashville Predators in hockey and the Atlanta Braves in baseball, balancing solitary cardio with occasional group pick‑up volleyball
    in summer.
  arts: Jacqueline Williams devotes her evenings to gentle watercolor studies of forest glades and polymer‑clay miniatures of imagined alien flora, draws creative inspiration from indie folk musicians like
    Sufjan Stevens and Fleet Foxes, and immerses herself in speculative fiction by N.K. Jemisin and Ann Leckie, often sketching ideas for future prototype designs as she listens to the music.
  travel: Jacqueline Williams prefers meticulously planned solo trips that combine artistic inspiration with nature, having hiked the Blue Ridge Mountains near Asheville and explored the red rocks of Sedona,
    she now dreams of wandering Kyoto’s historic temples and Barcelona’s modernist architecture while budgeting for a future cross‑country roadtrip to showcase her sustainable prototype designs at design
    festivals.
  culinary: Jacqueline Williams is an avid home baker who perfects Southern classics like pecan pie and buttermilk biscuits while experimenting with lavender‑infused shortbread and beet‑colored cupcakes,
    often sourcing fresh herbs from the farmer’s market and occasionally over‑salt­ing her soups when distracted by a new prototype idea.
  core: Jacqueline Williams blends a meticulous engineer’s precision with a solitary artist’s imagination, navigating chronic worry through yoga and watercolor, while occasionally over‑indulging in midnight
    spreadsheet tweaks and oversalted soups.
background:
  cultural: Jacqueline grew up in Jackson, Tennessee, a small city in Madison County with deep Southern roots. Her family emphasized community values, modesty, and a strong work ethic, often participating
    in local church events and county fairs that highlighted regional crafts such as quilting and woodcarving. Exposure to the area's rich musical heritage—bluegrass, gospel, and country—instilled an appreciation
    for storytelling through art. While she respects these traditions, Jacqueline also actively seeks contemporary design influences from national and international sources, blending her Southern upbringing
    with a curiosity for innovative, global ideas.
attributes:
  skills: '[''CNC programming'', ''SolidWorks'', ''Autodesk Fusion 360'', ''Pattern drafting'', ''Manual machining'', ''Metal casting'', ''Plastic injection molding'', ''3D printing'', ''Technical drawing'',
    ''Material selection'', ''Quality inspection'', ''Project scheduling'', ''Spatial visualization'', ''Problem solving'', ''Collaboration with engineers'']'
  hobbies: '[''Watercolor painting'', ''Polymer clay sculpting'', ''Scale model kit building'', ''Hiking'', ''Yoga'', ''Meditation'', ''Speculative fiction reading'', ''Indie folk music listening'', ''Southern
    baking'', ''Photography of industrial architecture'']'
  career_goals: Jacqueline aims to advance to a senior prototype engineering role where she can lead multidisciplinary teams in developing innovative, sustainable products for the automotive and aerospace
    sectors. She is motivated to deepen her expertise in environmentally friendly materials and additive manufacturing, eventually establishing her own boutique studio that offers custom pattern‑making
    services while also showcasing her artistic prototypes at design exhibitions. Long‑term, she hopes to mentor aspiring makers and contribute to industry standards that emphasize both functionality and
    aesthetic quality.
