personas:
  professional: Curtis Beal, an aspiring nursing student and experienced personal care aide, leverages their meticulous care documentation, CPR certification, and a creative talent for therapeutic art,
    so they provide empathetic geriatric home health support.
  sports: Curtis Beal, who enjoys weekend hikes along the Suwannee River Trail and occasional pickup basketball at the local community center, follows a flexible fitness routine that mixes trail running
    and yoga, cheers for the Jacksonville Jaguars in the NFL and the Miami Heat in the NBA, and they are a member of the Jefferson County Outdoor Adventurers club.
  arts: Curtis Beal, an avid sketcher of urban scenes and natural landscapes, frequently draws inspiration from Edward Hopper’s somber cityscapes and the lyrical guitar work of Bon Iver, spends evenings
    listening to indie folk playlists featuring Sufjan Stevens while playing acoustic guitar, and they regularly attend local art club meet-ups where they discuss graphic novels like 'Saga' and the cinematic
    storytelling of director Greta Gerwig.
  travel: Curtis Beal, who prefers low-cost, semi-spontaneous road trips that balance nature hikes with cultural stops, enjoys weekend getaways to the Florida Keys and occasional backpacking excursions
    in the Appalachian Mountains, dreams of visiting the historic art districts of New York City and the misty lochs of Scotland, and they usually plan trips using budget-friendly apps while juggling work
    and caregiving responsibilities.
  culinary: Curtis Beal, a self-taught home cook who favors fresh, seasonal ingredients, often prepares avocado toast with lemon-zest ricotta, hearty shrimp and grits, and occasional vegetable stir-fry
    featuring bok choy and ginger, while they savor indie folk cafés for their signature cold brew, and they occasionally binge on sugary snack cakes during late-night gaming sessions.
  core: Curtis Beal, an 18-year-old aspiring nurse who channels their worry-prone, art-obsessed, and empathetic nature into caring for seniors while they occasionally hoard sketchbooks and over-spend on
    art supplies.
background:
  cultural: Curtis grew up in Lamont, a small, predominantly white town in Jefferson County, Florida, where Southern hospitality and close‑knit community values shape daily life. His family traditions include
    church gatherings, backyard barbecues featuring staple Southern dishes like fried catfish and collard greens, and seasonal festivals that celebrate local folk music and crafts. The rural environment
    fostered an appreciation for nature, simple living, and self‑reliance, while the regional emphasis on kindness and cooperation reinforced his considerate personality. These cultural roots, combined
    with exposure to the diverse artistic influences of nearby Gainesville and Tallahassee, have given Curtis a grounded yet open‑minded outlook.
attributes:
  skills: '[''Personal Care Assistance'', ''Basic First Aid & CPR'', ''Client Hygiene Management'', ''Mobility Support'', ''Medication Reminders'', ''Care Documentation'', ''Empathetic Communication'',
    ''Conflict Resolution'', ''Time Management'', ''Sketching'', ''Digital Illustration'', ''Photography'']'
  hobbies: '[''Sketching'', ''Digital Illustration'', ''Photography'', ''Acoustic Guitar'', ''Listening to Indie Folk Music'', ''Hiking and Nature Walks'', ''Reading Graphic Novels'', ''Volunteering at
    Senior Center'', ''Video Gaming (RPGs)'', ''Meditation'']'
  career_goals: Curtis aims to enroll in a community‑college nursing program within the next year, earn an Associate’s Degree in Nursing, and become a licensed Registered Nurse with a focus on geriatric
    and home health care. He hopes to blend his caregiving expertise with his passion for the arts by developing therapeutic art programs for seniors that address isolation and stress. Long‑term, he envisions
    opening a community health center in Jefferson County where clinical services and creative workshops coexist, and he wants to mentor younger aides to foster compassionate, innovative care.
