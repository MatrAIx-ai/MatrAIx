  career_goals: Toby aims to step into a senior sales‑management role where he can shape regional strategies, lead a team of representatives, and introduce innovative sales approaches that marry his curiosity
    for novelty with measurable results. He also aspires to eventually launch a boutique venture that offers custom‑finished metal art and functional décor, leveraging his deep industry contacts and artistic
    interests. Beyond professional advancement, he seeks to secure a comfortable retirement for his family while leaving a mentorship legacy within his company and local community.
