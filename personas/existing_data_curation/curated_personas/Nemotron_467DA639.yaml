personas:
  professional: Toby Rigsbee leverages over three decades in wholesale and manufacturing sales to craft compelling narratives, sketch custom product concepts, mentor younger reps, and negotiate complex
    contracts, all while dreaming of leading a regional strategy team and later launching a boutique metal‑art venture that merges their inventive mindset with measurable results.
  sports: Toby Rigsbee spends weekend mornings fishing on the Savannah River, follows the Atlanta Braves and the Atlanta Hawks with a modest fan enthusiasm, and participates in a local senior‑citizen walking
    club to stay limber, blending low‑key recreation with occasional community sports spirit.
  arts: Toby Rigsbee paints abstract canvases inspired by Jackson Pollock, sketches industrial machinery reminiscent of early Ford factories, sings in their church’s gospel choir performing classics like
    “Total Praise,” and attends pottery workshops where they experiment with Raku glazing, weaving a tapestry of visual and auditory creativity.
  travel: Toby Rigsbee favors purposeful road trips to industrial heritage sites such as Detroit’s Automotive Hall of Fame and cultural hubs like New York’s MoMA, while dreaming of an Icelandic aurora‑chasing
    adventure, balancing itinerary flexibility with a modest retirement budget and occasional family constraints.
  culinary: Toby Rigsbee enjoys cooking Southern comfort foods like shrimp‑and‑grits and collard greens, seasons them with fresh basil and thyme harvested from their garden, experiments with smoked brisket
    rubs, yet often over‑spices dishes while paint dries, reflecting a willingness to experiment tempered by occasional impatience.
  core: Toby Rigsbee, 59, is a sales veteran whose imagination fuels a love for metal art, community gardening, and gospel singing, tempered by a relaxed approach to planning and a penchant for occasional
    impulsive splurges.
background:
  cultural: Toby was raised in a middle‑class, white working‑class family in the Upstate South Carolina region, where Southern hospitality, Methodist church involvement, and a strong sense of community
    were core values. Growing up near Aiken County's historic textile and manufacturing hubs gave him early exposure to the industrial sector that later defined his career. The local culture—a blend of
    traditional Southern cuisine, church gatherings, high school football Fridays, and a growing appreciation for the arts—has shaped his worldview, fostering both a pragmatic work ethic and a deep curiosity
    for novelty and creative expression.
