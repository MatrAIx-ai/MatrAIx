persona_description: A geotechnical engineer with expertise in marine foundations and bridge construction, particularly in the design and construction of bridges across the most dangerous channels in North
  Carolina. The engineer has experience working in challenging marine environments and has a deep understanding of repetitive, precast concrete structural elements, which is essential in the harsh marine
  environment of the Outer Banks. The engineer is skilled in using first-of-their-kind design and construction methods in placing concrete piles that support the Marc Basnight Bridge, making it one of the
  most challenging marine foundations projects in North Carolina’s history. The engineer is also interested in the environmental impact of the bridge and has a passion for creating bridges that are not
  only functional but also environmentally sustainable.
