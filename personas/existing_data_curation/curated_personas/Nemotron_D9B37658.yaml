  career_goals: Keenan dreams of becoming an astronaut or a civil engineer, combining his love for space exploration with his desire to build things that improve his neighborhood. He imagines designing
    sustainable playgrounds or vehicles for future missions, and he hopes to one day mentor younger kids in science and teamwork, showing them that curiosity and practical skills can work together.
