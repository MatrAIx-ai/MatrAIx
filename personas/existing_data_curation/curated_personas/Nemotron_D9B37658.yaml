personas:
  professional: Keenan Mayela is an aspiring junior engineer, building intricate LEGO structures and experimenting with science kits, applying methodical planning and a curiosity for how things work.
  sports: Keenan Mayela is a member of the Riverside Youth Soccer Club, energetically playing midfield at the local park, and avidly follows Manchester United and the Los Angeles Lakers, balancing weekend
    practices with school, while keeping a habit of doing a quick stretch routine before each game.
  arts: Keenan Mayela channels creative energy into drawing comic‑style panels of superheroes, listening to Kendrick Lamar beats and Miles Davis jazz, and tapping out rhythms on a small drum pad, often
    remixing scenes from favorite books with LEGO creations, all of which fuel their imagination.
  travel: Keenan Mayela loves family road trips to national parks like Yellowstone and the Grand Canyon, enjoys weekend visits to the city aquarium, and dreams of exploring Tokyo’s tech districts and the
    Great Barrier Reef, preferring packed itineraries with plenty of hands‑on activities and a carefully checked packing list.
  culinary: Keenan Mayela prefers pizza with extra cheese, chicken nuggets, and homemade banana pancakes, can assemble a simple spaghetti Bolognese with parental supervision, and delights in tasting fruit
    smoothies made with strawberries, mango, and yogurt, while occasionally sneaking chocolate chips into cereal.
  core: Keenan Mayela is an organized, energetic 8‑year‑old who blends a love for soccer, LEGO engineering, and science experiments with a habit of meticulously tracking allowances and a penchant for improvising
    comic art to the rhythm of jazz and hip‑hop.
background:
  cultural: Keenan is an African‑American boy raised in the vibrant neighborhoods of St. Louis, Missouri. His family maintains strong ties to the local Black community, attending church services and community
    events that celebrate heritage through music, storytelling, and food. He grew up hearing the blues and jazz that the city is famous for, and he enjoys the lively rhythms of modern hip‑hop. The city's
    deep sports culture, especially the love for the St. Louis Cardinals and local youth soccer leagues, influences his social life. His parents encourage academic achievement and participation in after‑school
    programs that blend cultural pride with skill development, shaping a balanced blend of tradition and contemporary influences.
