  hobbies: '[''Golf'', ''Walking club'', ''Swing dancing'', ''Cooking'', ''Community volunteering'', ''Gardening'', ''Beach trips'', ''Theme park outings'', ''Book club (medical memoirs)'', ''Live jazz
    concerts'']'
  career_goals: Dr. Wells plans to transition gradually to a part-time advisory role, focusing on mentoring early‑career physicians and developing practical guidelines for senior patient care. He aims to
    launch a community‑based wellness program for older adults in Orlando that blends preventive medicine with social activities. Additionally, he hopes to author a concise handbook on managing common chronic
    conditions in primary care and to expand his volunteer work with local health fairs and disaster‑response teams.
