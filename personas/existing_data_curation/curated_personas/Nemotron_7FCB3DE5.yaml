personas:
  professional: Alvin Wells, a 60-year-old board-certified internal medicine physician, merges a classic work ethic with spontaneous adaptability, delivering efficient evidence-based chronic care while
    mentoring residents, leading multidisciplinary teams, and spearheading community health initiatives with a personable, collaborative style that they apply in every patient encounter.
  sports: Alvin Wells enjoys a steady routine of early-morning walks with the Orlando Sunrise Walking Club, weekly 18-hole rounds at Lake Baldwin Golf Course, cheering on the Orlando Magic during the NBA
    season and the Tampa Bay Buccaneers in the NFL, and they keep active by dancing to swing music at community events.
  arts: Alvin Wells finds rhythm at community swing and jazz dance nights where the sounds of Duke Ellington, Benny Goodman, and Ella Fitzgerald fill the hall, and they unwind by watching classic golden-age
    Hollywood films starring Cary Grant, which feed their appreciation for timeless artistry.
  travel: Alvin Wells prefers spontaneous weekend getaways, often driving to Clearwater Beach or Disney World with friends, while nurturing a dream of wandering through Savannah's historic squares and savoring
    Tuscany's vineyards, a balance they achieve with flexibility and a modest travel budget.
  culinary: Alvin Wells enjoys cooking hearty Southern comfort foods - shrimp and grits seasoned with smoked paprika, chicken-fried steak smothered in sage gravy, and peach-glazed ham - showcasing competent
    home-chef skills, and they often share these dishes at potluck gatherings.
  core: Alvin Wells blends a steadfast devotion to routine and practical efficiency with a love for spontaneous social outings, balancing disciplined health and financial habits against occasional procrastination
    on paperwork and a penchant for last-minute weekend trips that they eagerly pursue.
background:
  cultural: Alvin is a white American who was raised in the Midwest, where he absorbed a strong work ethic, practicality, and traditional values. After completing his STEM education and medical training,
    he moved to Florida for his career. In Orlando, he embraces the region's cultural diversity while maintaining his roots in classic American holidays, church community (Methodist), and family-oriented
    traditions. His background informs his pragmatic approach to medicine and his commitment to community service.
