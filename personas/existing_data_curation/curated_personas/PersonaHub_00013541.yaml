persona_description: A Canadian neuroscientist who specializes in the study of appetite control and obesity. He has conducted neuroimaging studies to identify brain networks for appetite control and has
  found that obese individuals exhibit greater brain activation in response to sweet or fatty food cues. His research has led to the emergence of differences between lean and obese individuals and has provided
  insights into the neurobehavioral problem of obesity, which is a disease resulting from a vulnerable brain in an unhealthy environment.
