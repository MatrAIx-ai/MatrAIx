persona_description: A pilot in the Royal Flying Corps who flew combat operations over the Western Front in January and March 1917, specifically on January 27 and February 9. He was a qualified gunner/observer
  and trained to use machine guns and take photographs from the air with a fixed camera. He flew five combat operations over the Western Front between January and March 1917, the first being a fighter patrol
  on January 27. He was shot down and killed in action while on a photo-reconnaissance operation in March 1917.
