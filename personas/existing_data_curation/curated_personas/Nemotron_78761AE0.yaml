  hobbies: '[''Reading African‑American literature'', ''Attending live‑music and jazz events'', ''Participating in book clubs'', ''Gardening'', ''Yoga and meditation'', ''Volunteering at cultural museums'',
    ''Cooking soul‑food'', ''Quilting'', ''Road trips to explore family heritage'', ''Impromptu poetry slams'']'
  career_goals: Looking ahead, Dorothy aims to expand inclusive early childhood education within the Austin area by establishing a community learning hub that bridges generations. She hopes to mentor the
    next wave of educators, especially those from underrepresented backgrounds, and to serve as a consultant for culturally responsive curriculum design. Ultimately, she envisions influencing district policy
    to embed equity and flexibility into the core of preschool programming, while also authoring a guidebook that shares her practical approaches to nurturing harmonious learning environments.
