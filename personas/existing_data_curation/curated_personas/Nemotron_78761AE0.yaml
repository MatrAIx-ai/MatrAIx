personas:
  professional: Dorothy Conner, a veteran early‑childhood program director in Austin, blends curriculum design expertise and grant‑writing savvy with a spontaneous, people‑first leadership style that favors
    flexible timelines over rigid deadlines; they thrive on fostering collaborative environments while resisting overly strict schedules.
  sports: Dorothy Conner enjoys low‑impact fitness, attending weekly gentle yoga classes, walking their garden, and cheering on Austin FC during the MLS season, while they also participate in the Austin
    Women's Running Club’s Sunday morning 5k runs and occasionally play senior‑level tennis at the local community center.
  arts: Dorothy Conner finds artistic fulfillment in curating jazz playlists featuring Miles Davis and Etta James, attending spontaneous poetry slams that echo Maya Angelou’s lyrical spirit, and immersing
    themselves in quilting projects inspired by the vibrant patterns of American folk art, often sharing their creations at community art fairs.
  travel: Dorothy Conner prefers relaxed, road‑trip style travel, often planning weekend drives from Austin to historic Southern towns like Savannah and New Orleans to reconnect with family roots, while
    they also dream of a leisurely Mediterranean cruise that balances their love for cultural discovery with a modest retirement budget.
  culinary: Dorothy Conner, an adept home cook, prepares Southern‑style comfort dishes such as collard greens simmered with smoked turkey, sweet‑potato casserole, and cornbread spiced with jalapeño, often
    sourcing fresh tomatoes, okra, and herbs from their garden, and they relish hosting friends for pot‑luck meals accompanied by live jazz.
  core: Dorothy Conner, a 67‑year‑old early‑childhood visionary, blends spontaneous community storytelling with a habit of misplacing receipts, an unyielding love for jazz, and a garden that doubles as
    their meditation sanctuary; they bring kindness and flexibility to every endeavor.
background:
  cultural: Dorothy’s cultural background is rooted in the Black community of the American South, with family traditions steeped in church, storytelling, and a strong emphasis on education as a pathway
    to empowerment. Growing up during the civil‑rights era, she witnessed the power of collective action, which shaped her commitment to equity and community service. Her heritage informs her appreciation
    for African‑American music, cuisine, and oral history, and she remains active in local Black cultural organizations in Austin. This background fuels her dedication to creating inclusive educational
    spaces that honor the histories and experiences of Black children and families.
