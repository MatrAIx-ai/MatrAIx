    ''team training and mentorship'']'
  hobbies: '[''watercolor painting'', ''sketching'', ''photography (wildlife and pet)'', ''hiking'', ''visiting art galleries'', ''attending community theater'', ''book club'', ''cooking South Asian fusion
    dishes'', ''yoga'', ''gardening'', ''volunteering at animal shelter'', ''mentoring veterinary tech students'']'
  career_goals: Mala aims to advance into a supervisory role as lead veterinary technician, overseeing clinic operations and mentoring junior staff. She plans to obtain advanced certifications in veterinary
    anesthesia and dental technology, and to spearhead a community outreach program that educates local pet owners on preventive care, especially within underserved South Asian immigrant neighborhoods.
    Long‑term, she envisions opening a boutique pet wellness center that blends evidence‑based veterinary care with holistic services such as therapeutic grooming and animal‑focused art therapy workshops,
    creating a soothing environment for both pets and owners.
