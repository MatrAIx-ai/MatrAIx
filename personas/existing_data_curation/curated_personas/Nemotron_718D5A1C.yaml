personas:
  professional: Taylor Armstrong, a retired applied mathematician turned community educator, leverages their analytical acumen and vivid imagination to translate complex data into engaging storytelling
    workshops for seniors and youth, while their relaxed, improvisational style keeps sessions lively and loosely structured.
  sports: Taylor Armstrong enjoys low-impact activities like walking with the Corinth Senior Strollers club and occasional shuffleboard at the community center, cheering on the Memphis Grizzlies in winter
    basketball and the New Orleans Saints during football season while preferring a relaxed, social approach to staying active.
  arts: Taylor Armstrong channels their love for abstract watercolor into canvases reminiscent of Georgia O'Keeffe and Mark Rothko, while their poetry nights often feature readings of Maya Angelou and Sylvia
    Plath, and they delight in playing impromptu piano medleys inspired by Joni Mitchell and Bill Evans to accompany community storytelling sessions.
  travel: Taylor Armstrong favors leisurely road trips that blend cultural immersion with scenic serenity, having explored the historic streets of New Orleans, the lavender fields of Provence, and the jazz-filled
    cafe of Kansas City, while dreaming of a virtual reality journey through the Martian landscape as a next-level adventure.
  culinary: Taylor Armstrong, an adept home cook, experiments with heritage rose petal jam drizzled over classic shrimp and grits, pairs wildflower honey with herb-roasted chicken, and often adds a pinch
    of smoked paprika to sweet peach cobbler for an unexpected Southern-global flavor twist.
  core: Taylor Armstrong, an 88-year-old polymath who flips effortlessly between algebraic models, abstract paintings, and piano improvisations, tends to misplace their glasses while searching for fresh
    paint, yet never misses a chance to host a lively story circle at the senior center.
background:
  cultural: Taylor grew up in post‑World War II rural Mississippi, near Corinth, where traditional Southern values—church attendance, family gatherings, hospitality, and a love for regional cuisine—shaped
    her early life. A supportive high school teacher sparked her fascination with science and mathematics, leading her to pursue a graduate degree in a STEM field. She witnessed the civil‑rights era and
    the evolving social landscape of the Delta, which broadened her worldview and deepened her curiosity about societal change. Her white Southern heritage is reflected in her appreciation for gospel music,
    oral storytelling traditions, and a strong sense of community, while her education and personal interests continually push her toward novelty, artistic expression, and interdisciplinary exploration.
