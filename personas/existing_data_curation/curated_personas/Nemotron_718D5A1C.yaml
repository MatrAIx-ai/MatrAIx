  hobbies: '[''Abstract painting'', ''Creative writing (poetry & memoir)'', ''Playing piano'', ''Reading science-fiction'', ''Storytelling circles'', ''Gardening (heritage roses and wildflowers)'', ''Experimenting
    with Southern cuisine'', ''Crossword puzzles'', ''Learning new digital tools (tablet, video calls, VR)'']'
  career_goals: Even at 88, Taylor strives to leave a lasting legacy of interdisciplinary learning for her grandchildren and the Corinth community. She aims to compile a memoir that weaves together her
    scientific background, artistic journey, and Southern heritage. She hopes to secure a modest grant to launch a community arts‑and‑STEM tutoring program that pairs senior volunteers with local youth,
    fostering curiosity and creativity. Taylor also dreams of curating a small exhibition of her abstract paintings at the Alcorn County community center and exploring emerging digital tools—such as AI‑assisted
    art generation and virtual reality storytelling—to stay at the forefront of novelty and innovation.
