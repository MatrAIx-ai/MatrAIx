personas:
  professional: Richard Stringfellow, a veteran journeyman electrician with three decades of Maine wiring experience, leverages their curiosity for renewable tech and rapid on‑site problem‑solving to push
    solar retrofits while informally mentoring apprentices, thriving in collaborative job‑site environments despite a dislike for rigid paperwork.
  sports: Richard Stringfellow, an avid member of the Saint Croix River Fishing Club and Washington County Snowmobile Crew, regularly casts early mornings, hits backcountry trails in winter, and plays darts
    and pool at the neighborhood bar while cheering for the Portland Sea Dogs and the Boston Bruins, combining spontaneous outdoor thrills with light‑hearted community competition.
  arts: Richard Stringfellow, a fan of folk icons like John Denver and contemporary singer‑songwriter Tyler Childers, enjoys live performances at the Portland Stage Company, collects vintage fishing‑themed
    artwork, and frequently quotes Bruce Springsteen lyrics at potlucks, letting music and visual art reinforce their outgoing, competitive spirit.
  travel: Richard Stringfellow, who favors spontaneous weekend road trips to Acadia National Park and unplanned snowmobile excursions to the Canadian border, also dreams of an eco‑tour of Iceland’s geothermal
    farms, balancing low‑budget planning with occasional splurges on guided renewable‑energy tours.
  culinary: Richard Stringfellow, a competent home cook who loves searing fresh Maine lobster with garlic butter, simmering hearty New England clam chowder with thyme, and baking blueberry crumble, often
    experiments with smart‑kitchen appliances and occasionally over‑salts dishes in enthusiasm for flavor.
  core: Richard Stringfellow, a restless 56‑year‑old electrician who mixes competitive curiosity with a love for community‑driven outdoor adventures, smart‑home tinkering, and occasional over‑confidence
    that leads to both innovative projects and missed appointments.
background:
  cultural: Richard comes from a generations‑old, white working‑class family rooted in the rural towns of Washington County, Maine. His ancestry traces back to early New England settlers of English and
    Irish descent, and his upbringing was shaped by the region’s pragmatic, self‑reliant ethos. The close‑knit community culture of Harrington—centered around seasonal outdoor activities, town meetings,
    local churches, and volunteer fire‑department service—has instilled in him a strong sense of duty, modesty, and camaraderie. He embraces New England traditions such as seasonal hunting and fishing,
    cooperative gatherings like potlucks, and a straightforward, no‑frills approach to work and life. This cultural backdrop blends with his personal curiosity and competitive streak, fostering a balance
    between respect for established practices and a willingness to experiment with new technologies.
attributes:
  skills: '["Residential wiring and troubleshooting", "Commercial electrical repairs and maintenance", "National Electrical Code compliance and inspections", "Solar photovoltaic system installation and
    maintenance", "Battery storage and home energy management integration", "Smart-home device configuration (e.g., lighting, thermostats)", "Generator and backup power system setup", "HVAC electrical interfacing
    and wiring", "Metal conduit bending and basic welding", "Blueprint reading and load calculation", "Informal apprenticeship mentorship and skill sharing", "Safety inspection and hazard mitigation"]'
  hobbies: '["Fishing (St. Croix River outings)", "Snowmobiling on Washington County trails", "Volunteer electrical safety inspection for the local fire department", "DIY home improvement and smart-home
    projects", "Community potluck and festival participation", "Darts and pool at the neighborhood bar", "Hobby woodworking (building shelves, small furniture)", "Camping and hiking trips with friends",
    "Watching New England sports (especially the Boston Bruins)", "Gardening (practical vegetable garden)"]'
  career_goals: Richard’s chief career ambition is to evolve from a journeyman contractor into a master electrician who runs a small, independent firm focused on renewable‑energy retrofits, solar installations,
    and smart‑home upgrades for homes across Washington County. He plans to obtain the state‑issued Master Electrician license and additional certifications in solar PV and energy‑storage systems, positioning
    himself as the go‑to specialist for sustainable power projects in his community. In parallel, he wants to formalize his mentorship by offering occasional workshops at the local technical college, helping
    train the next generation of Maine electricians. Financially, he aims to build a modest retirement fund that allows him to reduce his hours while still taking selective, high‑tech jobs that satisfy
    his curiosity and maintain a flexible schedule. Competitively, he aspires for his business to be recognized for an impeccable safety record, on‑time project delivery, and a reputation for technical
    excellence.
