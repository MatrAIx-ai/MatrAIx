persona_description: A researcher at IBM's Almaden Research Center who specializes in nanotechnology and microchip assembly, specifically focusing on the use of synthetic DNA and tiny lithographic templates
  to control the placement of silicon nanowires, carbon nanotubes, and other tiny components on microchips. This researcher is part of a team working to keep pace with Moore's law, the observation by Intel
  co-founder Gordon Moore that the number of transistors placed on an integrated circuit doubles every two years. The researcher is looking for better ways to assemble microchip components at the nanoscale
  without the need to replace existing chip-making technology, while also considering the potential downsides of smaller components and the need to dissipate heat before it destroys the surrounding circuitry.
