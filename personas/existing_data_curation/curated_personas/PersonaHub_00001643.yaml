  the Sky" at Walker Valley High School. Her innovative approach has led to positive results, including increased enrollment in calculus and pre-calculus courses, and a higher representation of minority
  students and those from lower socioeconomic backgrounds. Bryan's lesson has also brought attention to high-level math and science, and she has observed immediate improvements in students' performance.
