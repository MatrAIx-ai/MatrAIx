    at local museum"]'
  career_goals: Although retired, Maria aims to channel her structured skill set into a senior‑focused mentorship program. She hopes to design a clear, step‑by‑step resource guide for local older adults
    on navigating digital services, and to serve as a volunteer treasurer for a neighborhood historical society. Her ambition includes completing a personal memoir that documents the regional history she
    feels passionate about, maintaining intellectual rigor while managing her own worry about unfinished projects.
