personas:
  professional: Maria Benton, a retired administrative specialist with a sharp eye for financial detail, now volunteers as a treasurer for a local historical society while designing a step‑by‑step digital‑services
    guide for seniors and drafting a memoir of regional history, and they apply their methodical yet adaptable approach to every project.
  sports: Maria Benton enjoys hiking the Colorado River trail and birdwatching on local mesas, participates in the Mesa County senior walking club, follows the Denver Broncos and Colorado Rockies, and they
    occasionally attend games at the nearby stadium when they can fit it into their schedule.
  arts: Maria Benton expresses creativity through crocheting intricate blankets, devours mystery novels by Louise Penny set in the American West, attends the Mesa County Museum’s rotating art exhibits,
    and they enjoy listening to folk‑rock legends like Willie Nelson while occasionally catching a performance at the local community theater.
  travel: Maria Benton prefers thoughtfully planned road trips that blend cultural enrichment with natural beauty, having visited Mesa Verde National Park, taken a weekend getaway to Santa Fe’s historic
    plaza, and they dream of a leisurely cruise through the Hawaiian Islands once their travel budget allows.
  culinary: Maria Benton favors simple, wholesome meals such as grilled trout with lemon‑herb quinoa, roasted sweet potatoes with rosemary, and occasionally indulges in a spicy green‑chile enchilada, and
    they often sip mint tea brewed from fresh garden herbs while crochet projects unfold.
  core: Maria Benton is a detail‑oriented yet adaptable senior who blends structured community service with competitive hobbies, battles a chronic worry about unfinished projects, and they find solace in
    the ordered patterns of puzzles and crochet.
background:
  cultural: Maria is a white American of German‑Irish ancestry, born in rural Kansas in 1953 and raised with a Midwestern work ethic and Methodist values. She moved to Grand Junction, Colorado in her early
    thirties, where the blend of frontier independence, outdoor recreation, and a close‑knit small‑town community shaped her identity. Her cultural outlook combines pragmatic, self‑reliant attitudes with
    an appreciation for the region’s Native American heritage and the rugged landscape of the Colorado Plateau.
attributes:
