  career_goals: Robert aspires to pursue a career that combines structure, technical problem-solving, and tangible outcomes. He dreams of becoming a civil engineer or a robotics engineer, envisioning himself
    designing bridges, sustainable infrastructure, or autonomous machines. He is motivated by the prospect of creating orderly systems that improve daily life, and he sets long-term goals to earn a scholarship
    to a STEM-focused high school and later attend a university known for engineering.
