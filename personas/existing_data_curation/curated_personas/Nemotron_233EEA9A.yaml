personas:
  professional: Robert Nance, an eleven‑year‑old aspiring robotics developer, channels his love of meticulous LEGO city building and chess puzzles into designing competition robots for his school's robotics
    club, where his disciplined, highly organized mindset drives every code line and mechanical tweak.
  sports: Robert Nance, a devoted member of the Youth Figure Skating Club, hits the local rink three times a week, cheers for the Detroit Red Wings during hockey season, and follows a rigid warm‑up regimen—yet
    they sometimes neglect cross‑training, preferring the focused precision of skating over broader conditioning.
  arts: Robert Nance, a disciplined piano student, practices Beethoven’s “Moonlight Sonata” and the jazzier pieces of Koji Kondo’s video‑game scores, while devouring non‑fiction works like Carl Sagan’s
    “Cosmos,” which fuels the creative spark behind their robotics designs.
  travel: Robert Nance, a checklist‑obsessed traveler, has toured the Smithsonian’s Air and Space Museum and competed at a regional robotics contest in Boston, and now dreams of attending the International
    Robot Expo in Tokyo, preferring meticulously planned itineraries over spur‑of‑the‑moment detours.
  culinary: Robert Nance, an aspiring home chef, loves constructing layered spaghetti‑bolognese plates, perfecting pepperoni pizza margherita with fresh basil, and whipping up chocolate‑chip pancakes on
    Saturday mornings, though they often forget to clean the kitchen until the end of the session.
  core: Robert Nance is an intensely organized 11‑year‑old who blends a passion for LEGO, robotics, and piano with a disciplined daily routine—yet they occasionally surrender to late‑night video‑game marathons
    as a rare escape.
background:
  cultural: Robert grew up in a middle-class white family in Minneapolis, Minnesota, where Midwestern values of hard work, community involvement, and practicality are emphasized. His household observes
    typical American holidays—Thanksgiving, Christmas, and the Fourth of July—with regional customs such as attending the Minnesota State Fair and participating in local snow-related activities. His family's
    ancestry includes German and Swedish roots, reflected in occasional cultural foods and stories. The city's strong public school system, extensive library network, and youth programs have shaped his
    access to structured learning opportunities and extracurricular activities.
