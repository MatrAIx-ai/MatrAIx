persona_description: A climate modeler who specializes in studying tropical ocean circulation and its impact on global climate. He is interested in understanding how biological and chemical aspects of the
  ocean will change in the future and how the winds, which can lead to conclusions that are exactly opposite to what you'd expect, play a crucial role in predicting how the oceans will respond to climate
  change. He is a lead author of a study published in Science and funded by the National Science Foundation, the Gordon and Betty Moore Foundation, the U.S. Geological Survey, and the Lamont-Doherty Earth
  Observatory.
