persona_description: A historian of science who is interested in the history of physics and the role of physics in explaining the mind-body problem. The individual is likely to be familiar with the works
  of Maxwell, Stewart, Cournot, and Boussinesq, and is interested in the development of physics-based theories in the 19th century. They are likely to be interested in the controversy surrounding the irreducibility
  of life and the mind to physics and the use of physics-based theories to account for the influence of the mind on the body.
