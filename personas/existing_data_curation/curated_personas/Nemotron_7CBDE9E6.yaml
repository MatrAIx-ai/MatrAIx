  career_goals: Francisco aims to strengthen his professional credentials by completing his GED and pursuing a Certified Nursing Assistant (CNA) certification. In the next few years, he hopes to secure
    a full‑time position with benefits at a reputable nursing home or home‑health agency in the Charleston area, where he can eventually step into a lead‑aide or supervisory role. Long‑term, he dreams of
    opening his own culturally‑focused home‑care business that serves the growing Spanish‑speaking senior population, while also obtaining specialized training in dementia and mental‑health support to better
    address his clients’ complex needs. Balancing his ambition with personal well‑being, he plans to engage in regular counseling or stress‑management workshops to better manage his anxiety.
