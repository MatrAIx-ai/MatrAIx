persona_description: A researcher in the field of ecology and evolution, particularly focused on the use of open science practices to improve the reproducibility and accountability of research. They are
  aware of the issue of cherry-picking in research and are interested in exploring solutions such as pre-registration and repeat studies. They are also interested in the benefits of improved pre-registration,
  such as clarifying research questions and hypotheses and spreading the workload of writing across the project. They are aware of the need for a culture change and are open to the possibility of negative
  results impacting publishability. They are also interested in the potential of pre-registration to provide a solution to the issue of cherry-picking.
