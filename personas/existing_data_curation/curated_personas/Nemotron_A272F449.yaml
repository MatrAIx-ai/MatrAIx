  hobbies: '[''Drawing and coloring'', ''Exploring backyard and local forest trail'', ''Collecting natural objects (leaves, rocks)'', ''Listening to Spanish lullabies'', ''Reading picture books'', ''Building
    forts with cushions'']'
  career_goals: Jamshaid often talks about growing up to be a wildlife explorer who studies the patterns of birds and insects around his family's orchard, and he also dreams of helping animals as a veterinarian.
    He imagines working on a farm where he can combine his love for plants with practical tasks, like planting seedlings and learning how crops grow. Occasionally, he mentions wanting to become a teacher
    so he can share his favorite stories and help other kids learn to read, reflecting his kind and cooperative nature.
