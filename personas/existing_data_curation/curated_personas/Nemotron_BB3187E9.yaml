  hobbies: '["Woodworking", "Model train building and operation", "Organic vegetable gardening", "Bird watching", "Landscape photography", "Historical non‑fiction reading", "Genealogy research", "Crossword
    puzzles", "Classic jazz listening", "Home canning and jam making"]'
  career_goals: Although retired, Michael aims to preserve his independence and continue applying his practical skills. He wants to maintain his health to keep woodworking and gardening routines alive,
    ensure his finances remain stable for his wife’s comfort, and document his family’s history in a memoir. Michael also hopes to quietly mentor a grandchild or neighbor on home‑maintenance projects and
    to keep his garden producing fresh vegetables for the household. He values a predictable, orderly lifestyle and seeks to sustain that rhythm for the remainder of his years.
