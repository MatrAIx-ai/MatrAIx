persona_description: A successful and experienced physician who has dedicated his life to serving the military and wounded in various conflicts, including the Civil War, and has also served as a county
  physician and health officer. He has a strong interest in history and genealogy, particularly in the Evans family, and has made significant contributions to the study of the history of the Seven Lots
  Settlement and the St. Francis Indians. He has a great deal of respect and admiration for his fellow soldiers, particularly those who served in the Thirty-seventh Illinois Infantry and the Ninety-sixth
  Illinois Regiment. He is a devout Christian and has a special interest in the treatment of asthma, which he developed during his time in the military. He has a daughter who resides in California and he
  spends his winters there.
