personas:
  professional: Stephen Dearmas, an 18‑year‑old IT associate degree student, leverages his hands‑on expertise in custom PC assembly, hardware troubleshooting, and bilingual communication to excel in junior
    tech support roles, applying his competitive mindset to resolve tickets quickly while thriving in the predictable structure of scheduled shifts.
  sports: Stephen Dearmas is a dedicated hiker, regularly joining the Desert Trails Hiking Club for sunrise treks in the Sonoran Desert, while also supporting the Phoenix Suns and Arizona Cardinals as an
    avid season ticket holder, occasionally playing pickup soccer with friends at a local field.
  arts: Stephen Dearmas unwinds by practicing acoustic guitar, covering classics by Carlos Santana and Los Lobos, and regularly attends intimate gigs at local venues showcasing emerging Mexican‑folk bands,
    letting music fuel his analytical focus.
  travel: Stephen Dearmas prefers low‑key road trips that combine tech conventions with scenic solitude, having recently driven to the Grand Canyon for a sunrise hike and planning a future visit to the
    Tokyo Game Show to scout emerging hardware.
  culinary: Stephen Dearmas enjoys cooking and eating Mexican street‑food staples such as tacos al pastor and elote, occasionally tackling homemade chilaquiles for brunch, while relying on his proficient
    but modest kitchen setup to experiment with fresh cilantro, lime, and Oaxaca cheese.
  core: Stephen Dearmas is a meticulous, competition‑driven tech enthusiast who balances a love for solitary tinkering with a cautious streak of financial pragmatism and a quiet appreciation for rugged
    desert solitude.
background:
  cultural: Stephen grew up in a Mexican‑American family in the West Phoenix area, where Spanish was spoken daily and cultural traditions were celebrated. His parents, both first‑generation immigrants who
    worked in construction, emphasized a strong work ethic and pride in their heritage. Stephen participates in community events such as Día de los Muertos altar preparations and local mariachi performances,
    and he enjoys cooking traditional Mexican dishes like tacos al pastor and tamales with his relatives. While fully integrated into American society, his cultural identity influences his values of family
    loyalty, respect for elders, and a deep appreciation for Mexican cuisine, music, and bilingual communication.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Custom PC building and configuration'', ''Basic networking'', ''Automotive maintenance and repair'', ''Bilingual Spanish‑English communication'', ''Problem
    solving under pressure'']'
  hobbies: '[''Custom PC building'', ''Strategy and simulation video gaming'', ''Automotive tinkering'', ''Acoustic guitar practice'', ''Hiking desert trails'', ''Listening to Latin rock and Mexican folk
    music'', ''Exploring Mexican street‑food stalls'']'
  career_goals: Stephen’s immediate goal is to complete his associate degree in information technology within the next year and obtain industry certifications such as CompTIA A+ and Network+. He aims to
    secure a full‑time help‑desk or junior network support role with a company that offers clear career ladders and structured work schedules, allowing him to apply his practical problem‑solving abilities.
    Over the next five years, he plans to advance to a system administrator position or specialize in cybersecurity, eventually leveraging his competitive drive to become a recognized technical expert in
    the Phoenix tech community. He also entertains the long‑term ambition of launching a small freelance IT services outfit to serve local small businesses.
