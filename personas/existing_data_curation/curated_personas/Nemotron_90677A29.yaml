  career_goals: He aims to leverage his technical and community-oriented skills to pursue a career that blends technology with social impact. Over the next few years, he plans to enroll in a bachelor's
    program in Computer Science or Information Systems, while gaining entry‑level experience as a junior developer or data analyst at a socially responsible tech firm. His long‑term ambition is to create
    a nonprofit tech hub in Oakland that offers coding workshops, digital literacy training, and entrepreneurship support for Southeast Asian immigrant youth. He also envisions eventually leading community
    partnership initiatives that bridge tech innovation and local economic development.
