  career_goals: Myrna aims to deepen her expertise at the intersection of software development and visual experience. In the next five years she hopes to become a senior full‑stack engineer who leads small,
    cross‑functional teams focused on creating accessible, aesthetically‑driven products. She is interested in building a side project—a web‑based art‑curation platform that leverages AI to recommend emerging
    artists—while keeping a flexible work schedule that lets her balance family life. Long‑term, she sees herself transitioning into a product‑design leadership role, where she can shape strategy without
    sacrificing the collaborative, low‑pressure environment she values.
