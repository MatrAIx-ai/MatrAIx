personas:
  professional: Myrna Tague, a 33‑year‑old full‑stack web developer with a knack for weaving visual design into code, they lead agile ceremonies with a calm, collaborative flair while experimenting with
    Svelte and GraphQL to craft accessible, aesthetically‑driven user interfaces.
  sports: Myrna Tague enjoys low‑key fitness, they join the local Knob Noster Trail Runners club for weekend jogs, cheer on the Kansas City Chiefs on Sundays, and practice yoga at a community studio to
    balance long hours of desk work.
  arts: Myrna Tague cultivates a personal indie‑film library featuring titles like "Moonlight" and "The Last Black Man in San Francisco", they sketch watercolor prairie vistas inspired by the Kitchell Wilderness,
    curate experimental playlists from artists such as Sufjan Stevens and Flying Lotus, and frequent gallery openings showcasing emerging painters like Maya Carver.
  travel: Myrna Tague prefers spontaneous road trips to off‑the‑beaten‑path destinations, they enjoy weekend drives to the Ozark National Forest, have explored Asheville’s River Arts District, and dream
    of wandering Kyoto’s tea gardens while balancing wanderlust with family commitments.
  culinary: Myrna Tague delights in seasonal farm‑to‑table cooking, they often prepare roasted beet and goat‑cheese salads, grilled salmon with miso glaze, and a signature lemon‑tarragon pasta while snacking
    on raw carrot sticks during code reviews, and they are relentless about sourcing locally milled flour for occasional sourdough experiments.
  core: Myrna Tague blends a restless curiosity for emerging tech with a calm, collaborative spirit, they allow occasional disorganization to coexist with a deep love for watercolor, indie film, and quietly
    vibrant community involvement.
background:
  cultural: Myrna grew up in a middle‑class, predominantly white Midwestern community in central Missouri, where modesty, self‑reliance, and neighborly cooperation are core values. Her family’s roots trace
    back to German and Irish immigrants, and she was raised with a blend of Lutheran traditions and a pragmatic work ethic. The region’s emphasis on community events—county fairs, church gatherings, and
    volunteer projects—shaped her collaborative spirit and her preference for close‑knit groups over large crowds. At the same time, the proximity to St. Louis’s growing tech and arts scenes exposed her
    to progressive ideas and artistic experimentation, which nurtured her curiosity and unconventional thinking.
