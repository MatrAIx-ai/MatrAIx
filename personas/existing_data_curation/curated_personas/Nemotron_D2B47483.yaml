personas:
  professional: Chester Desantis, a budding LEGO architect and junior coder, channels their love for structure and predictable outcomes into designing intricate build plans and crafting simple Scratch programs,
    all while staying flexible enough to improvise when a piece goes missing.
  sports: Chester Desantis plays midfield for the Little Eagles Soccer Club, enjoys cheering for the local professional team the City Hawks, practices dribbling drills on Saturdays, and balances competitive
    games with relaxed pick‑up matches that let them improvise strategies on the fly.
  arts: Chester Desantis draws comic‑style superheroes inspired by Stan Lee, watches classic cartoons like Looney Tunes and Tom and Jerry, and collects illustrated dinosaur books by authors such as Dr. David Bannister,
    all of which fuel their vivid imagination and love for structured storytelling.
  travel: Chester Desantis loves family hikes in Redwood State Park, has visited the Grand Canyon on a school trip, dreams of exploring the dinosaur fossils of Mongolia, and prefers trips that blend a clear
    itinerary—like a scheduled museum visit—with spontaneous nature stops where they can build LEGO forts on the spot.
  culinary: Chester Desantis enjoys assembling dinosaur‑shaped chicken nuggets, mixing macaroni with cheese in perfectly measured portions, and can follow a simple peanut‑butter‑and‑jelly sandwich recipe
    without spilling the jam, yet often forgets to clean the kitchen afterward, leading to a slightly chaotic counter.
  core: Chester Desantis is an eight‑year‑old LEGO‑building enthusiast who thrives on structured routines, but also embraces the spontaneous thrill of nature hikes, board games, and comic art, all while
    staying calmly resilient under any challenge.
background:
  cultural: Chester grows up in a predominantly Anglo-American household in Fort Worth, Texas. His family participates in local traditions such as Friday night high-school football games, celebrating Fourth
    of July fireworks, and enjoying Texas barbecue and Tex-Mex meals. He attends a public elementary school where he observes a mix of cultural celebrations, and his family attends a community church that
    emphasizes service and togetherness. The regional values of hospitality, community involvement, and a love of outdoor activities shape his outlook.
