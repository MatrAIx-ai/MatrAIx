  career_goals: Though still young, Chester dreams of a future where he can build and explore. He imagines becoming an astronaut or an engineer because he loves constructing things and learning how they
    work, while also admiring community helpers like firefighters. In the near term, he aims to improve his reading, join the school science club, and earn a spot on the after-school soccer team.
