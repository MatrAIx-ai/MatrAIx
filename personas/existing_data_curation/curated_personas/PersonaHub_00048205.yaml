persona_description: A nurse anesthetist who has completed two to four years of nursing education and two additional years of training to administer anesthesia. She works in hospitals or clinics and is
  supervised by a board-certified doctor to ensure patient safety. She may work in small offices or clinics but prefers larger facilities and hospitals due to the regularity of her services. She has a unique
  knowledge of the process of putting a patient under anesthesia and the working conditions for each type of anesthetist.
