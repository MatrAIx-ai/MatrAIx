personas:
  professional: Corey Dasher, an 8‑year‑old budding comic illustrator and junior coder, combines a love for drawing fantasy creatures, methodical LEGO building, and Scratch game creation into a classroom
    role as the go‑to visual explainer for group projects, where their organized, reliable nature and assertive yet compassionate teamwork shine.
  sports: Corey Dasher, a lively member of the Crystal Lake youth soccer league, spends Saturday mornings dribbling for the Lake Wolves club, idolizes the Chicago Fire FC, and balances energetic play with
    a penchant for weekend hikes in the nearby forest preserve where they collect rocks as trophies.
  arts: Corey Dasher, an avid sketcher of dragons and spaceships, draws inspiration from the whimsical worlds of Studio Ghibli's 'Spirited Away,' the comic adventures of 'Teenage Mutant Ninja Turtles,'
    and the soaring scores of Hans Zimmer, often composes piano backgrounds while constructing LEGO cityscapes, and proudly displays their illustrated comic panels on the fridge.
  travel: Corey Dasher, a curious explorer who prefers family road trips to nearby state parks like Starved Rock, dreams of visiting the Kennedy Space Center in Florida and the Grand Canyon, and meticulously
    maps out imagined interplanetary voyages in Scratch, their travel style blends structured itineraries with spontaneous stops for ice cream at local diners.
  culinary: Corey Dasher, a self‑declared pizza connoisseur, favors pepperoni slices with extra cheese but also loves the simplicity of mac and cheese, delights in making homemade trail mix with dried mango,
    pretzels, and chocolate chips, and is learning to whisk batter for pancakes while occasionally sneaking a scoop of cookie‑dough ice cream when no one watches.
  core: Corey Dasher is a highly imaginative, organized eight‑year‑old whose boundless curiosity fuels a love for drawing fantastical worlds, building intricate LEGO cities, and tackling anxiety with a
    notebook of doodles and a pocket full of spare change, all while they sprint across soccer fields and dream of space adventures.
background:
  cultural: Corey grows up in a middle‑class suburban family in Crystal Lake, Illinois. His household observes typical Midwestern traditions such as Fourth of July fireworks, Thanksgiving meals, and local
    community events like the Crystal Lake Summer Festival. The area’s emphasis on school involvement, volunteerism, and outdoor recreation—like trips to the nearby forest preserves and lake activities—shapes
    his love for nature and teamwork. He is exposed to mainstream American children's media, comics, and school curricula, which blend with his family's encouragement of curiosity, creativity, and cooperative
    play.
