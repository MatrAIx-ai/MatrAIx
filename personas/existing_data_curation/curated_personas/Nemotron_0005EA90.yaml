  career_goals: Corey dreams of becoming an astronaut or astrophysicist who designs imaginative spacecraft, and he also imagines working as a video game designer creating immersive worlds for kids. He aspires
    to write and illustrate his own storybooks, sharing his fantastical ideas with others. In the long term, he hopes to lead a team of creative peers to develop community art installations or science outreach
    programs that inspire other children to explore curiosity and creativity.
