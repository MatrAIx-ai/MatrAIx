personas:
  professional: Rodney Mereus, a 10‑year‑old budding game creator and comic illustrator, channels his curiosity and competitive nature into designing Scratch games and intricate LEGO stories, balancing
    meticulous planning with spontaneous creativity.
  sports: Rodney Mereus, a 10‑year‑old basketball enthusiast, spends afternoons honing his jump shot at the local YMCA courts and cheering for the Cleveland Cavaliers while playing pick‑up games with friends
    at Columbus’s downtown park, approaching fitness with a competitive edge that drives him to improve his dribbling and stamina.
  arts: Rodney Mereus, a keen comic artist and digital illustrator, draws inspiration from the superhero stories of Stan Lee and the vibrant murals at the Columbus Museum of Art, while his playlist loops
    classic jazz from Miles Davis, contemporary hip‑hop by Kendrick Lamar, and gospel hymns of Mahalia Jackson, shaping his creative world with bold colors and rhythmic beats.
  travel: Rodney Mereus, a curious traveler, loves family road trips to the Rock and Roll Hall of Fame in Cleveland and weekend getaways to Cincinnati’s zoo, dreams of exploring the interactive exhibits
    at the Smithsonian in Washington D.C., and prefers a mix of planned museum visits and spontaneous stops at local ice‑cream shops, constrained by his school schedule and allowance.
  culinary: Rodney Mereus, a budding chef in the making, favors cheesy pepperoni pizza, homemade mac and cheese, and strawberry‑banana smoothies, can confidently whip up a grilled cheese sandwich using
    butter and cheddar, and while he enjoys trying new flavors like mango salsa, he often sidetracks his vegetable intake for sugary cereal at breakfast.
  core: Rodney Mereus is a competitively spirited, curious 10‑year‑old who merges comic‑making, LEGO engineering, and basketball drills into a vibrant routine, occasionally over‑indulging in sweets and
    forgetting chores.
background:
  cultural: Rodney was raised in a supportive African‑American family in Columbus’s Near Eastside neighborhood, where community, church, and cultural traditions are central. His parents share stories of
    African‑American history and celebrate events such as Juneteenth and the African World Festival, which have deepened his pride in his heritage. At home, soulful gospel, jazz, and contemporary hip‑hop
    shape his musical tastes and artistic sensibilities. The city’s vibrant arts scene, public libraries, and multicultural programs provide Rodney with exposure to a wide range of perspectives, reinforcing
    his curiosity and appreciation for diverse experiences.
