  career_goals: Rodney dreams of turning his love for art and technology into a future career as a visual artist or video‑game designer, where he can create characters and stories that spark imagination.
    His competitive nature fuels a goal to excel in basketball, hoping to earn a scholarship and play at the collegiate level. He aims to win awards in school art contests and science fairs, and he plans
    to attend summer programs that combine STEM and the arts to build the skills needed for those ambitions.
