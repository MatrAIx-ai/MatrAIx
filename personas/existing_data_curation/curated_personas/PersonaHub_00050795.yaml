persona_description: A paleontologist who specializes in the study of plesiosaurs, particularly those from North America and Sweden. They are knowledgeable about the discovery of Thalassomedon, a plesiosaur
  from North America, and the remains of plesiosaurs discovered in the Skåne region of Sweden, including teeth and vertebrae. They are interested in the unique features of Thalassomedon, such as its long
  neck, and the context in which these fossils were discovered, particularly around Lake Ivösjön in northeast Skåne.
