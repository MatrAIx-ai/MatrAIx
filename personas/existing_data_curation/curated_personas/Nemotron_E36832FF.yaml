personas:
  professional: Jeri Garcia, a seasoned community arts organizer and abstract watercolor painter, blends meticulous event planning with a free‑flowing creative spirit, leading Danville art fairs while mentoring
    emerging artists and coordinating genealogical workshops, reflecting their imaginative curiosity and calm resilience.
  sports: Jeri Garcia, a dedicated member of the Danville Senior Walking Club, enjoys brisk morning walks along the wetlands, participates in the local senior softball league during summer, and cheers on
    the Danville Braves baseball team in spring, balancing gentle exercise with a mindful approach to staying active.
  arts: Jeri Garcia, whose evenings are spent painting abstract watercolors inspired by Monet and Kandinsky while listening to Debussy’s Clair de Lune and Satie’s Gymnopédies, also curates weekly book‑club
    discussions on Virginia Woolf, attends performances at the Danville Arts Center featuring local theater productions and chamber music, and mentors young artists by sharing deep knowledge of modern art
    movements.
  travel: Jeri Garcia, an avid traveler with a meticulously kept scrapbook, has visited the Getty Center in Los Angeles, the Museum of Modern Art in New York, and the de Young Museum in San Francisco, and
    dreams of strolling the Musée d’Orsay in Paris while preferring itineraries that balance guided museum tours with relaxed afternoons in garden cafés.
  culinary: Jeri Garcia, an experimental home chef, blends fresh rosemary, thyme, and home‑grown basil from their organic garden into Spanish‑inspired dishes such as paella verde, gazpacho with heirloom
    tomatoes, and patatas bravas, while mastering improvisation at a moderate skill level that sometimes results in overly seasoned sauces.
  core: Jeri Garcia, a tranquil, endlessly curious septuagenarian, channels boundless imagination into daily watercolor sessions, birdwatching pauses, spontaneous culinary experiments, and a secret stash
    of crossword puzzles for late‑night brain teasers.
background:
  cultural: Jeri grew up in a mid‑20th‑century white, middle‑class family in the Bay Area, raised with Protestant values that emphasized hard work, community service, and an appreciation for the arts. Her
    childhood home encouraged reading, music, and participation in local cultural events, laying the foundation for her lifelong curiosity. Living in Danville, an affluent suburb of Contra Costa County,
    she has been shaped by both the traditional American suburban culture and the broader multicultural environment of the greater San Francisco region. Although her ethnic background is white, her marriage
    to a man of Hispanic heritage introduced her to Spanish language food traditions and celebrations such as Día de los Muertos, which she now incorporates into family gatherings. This blend of mainstream
    American values and multicultural influences informs her artistic sensibility and community involvement.
