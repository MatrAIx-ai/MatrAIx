  hobbies: '[''vegetable gardening'', ''cooking and recipe development'', ''quilting and knitting'', ''walking in local parks'', ''attending church events'', ''listening to classic pop music'', ''reading
    how‑to and mystery books'']'
  career_goals: Although she is not currently seeking paid employment, Cecilia aims to deepen her involvement in community service by obtaining a GED and completing a certified caregiving program offered
    through a local adult‑education center. She hopes to lead a weekly seniors‑cooking workshop, provide mentorship for younger women on household management, and eventually start a small home‑based catering
    service that supplies healthy meals to neighboring families and community events.
