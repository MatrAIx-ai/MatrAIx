    and process improvement'']'
  hobbies: '[''Visiting art galleries and murals'', ''Playing recreational soccer'', ''Cooking Honduran and Tex‑Mex cuisine'', ''Attending tractor‑pull and vintage truck shows'', ''Volunteering at community
    center (Spanish tutoring)'', ''Exploring Texas Hill Country on road trips'', ''Listening to live music and dancing (salsa, bachata)'', ''Socializing at local festivals and cultural events'']'
  career_goals: Jose aims to advance into a supervisory or safety‑trainer role within the next five years, obtaining certifications such as Certified Forklift Trainer and OSHA 30‑hour General Industry.
    He wishes to lead a team of operators, implement efficiency initiatives, and mentor newer workers. Long‑term, he is interested in starting his own equipment‑rental business serving the San Antonio area,
    leveraging his technical expertise and community connections. He also hopes to integrate his love for art by sponsoring workplace mural projects that celebrate cultural diversity.
