  hobbies: '[''building LEGO sets'', ''solving puzzles'', ''drawing animals'', ''playing soccer with friends'', ''listening to Spanish lullabies'', ''dancing to folk music'', ''helping in the kitchen'',
    ''participating in group storytime'']'
  career_goals: Jose dreams of becoming a teacher one day because he loves helping friends learn and enjoys the structure of a classroom. He also imagines being a firefighter, attracted by the clear roles
    and the chance to help others in need. Occasionally, he talks about exploring space as an astronaut, fascinated by the organized training required. His ambitions reflect his desire for purposeful, orderly
    work that benefits the community.
