personas:
  professional: Jose Juarez, an enthusiastic preschool class monitor who uses his love for structure to organize line‑ups, help teachers with daily schedules, and ensure his classmates follow simple routines,
    reflecting his methodical and cooperative nature, and they take pride in keeping the classroom orderly.
  sports: Jose Juarez, a lively five‑year‑old who plays on the neighborhood Kid’s Soccer Club and joins a Little League baseball team, idolizes the Los Angeles Dodgers and the Chicago Bulls, and they channel
    their boundless energy into daily playground games and structured dance‑movement classes that satisfy their love for predictable routines.
  arts: Jose Juarez, an avid fan of Disney’s animated classics and Sesame Street, spends afternoons drawing bright characters like Mickey Mouse, memorizing the lyrics of 'Let It Go' and 'Can’t Stop the
    Feeling!', and they enjoy performing these tunes for family gatherings, reflecting their outgoing and harmonious personality.
  travel: Jose Juarez, a curious traveler who eagerly awaits family trips to the nearby aquarium and the grand expanse of the Grand Canyon, prefers itineraries that include scheduled playtimes and snack
    breaks, and they dream of one day seeing the bright lights of Disneyland while their parents handle the logistics.
  culinary: Jose Juarez, a budding junior chef who loves the comforting melt of mac and cheese, the crisp bite of chicken nuggets, and the sweet tang of strawberry‑banana smoothies, enjoys helping their
    mother whisk pancake batter and proudly insists on sprinkling a pinch of cinnamon on their oatmeal every morning.
  core: Jose Juarez, a five‑year‑old whose structured mind and sociable heart combine to make them a meticulous, worry‑prone little planner who thrives on group fun, careful savings, and bright, predictable
    routines.
background:
  cultural: Jose is raised in a Mexican household in Pratt, Kansas, where both Spanish and English are spoken at home. His family celebrates traditional Mexican holidays such as Día de los Muertos and Navidad
    with food, music, and storytelling, blending these customs with the small‑town community life of prairie Kansas. His upbringing emphasizes family cohesion, respect for elders, and sharing cultural foods
    like tamales and tacos, while also participating in local events such as the county fair and library story hours.
