personas:
  professional: As an 11‑year‑old budding technophile, Andres Rivera channels his curiosity and practicality into building mechanized LEGO sets and crafting simple Scratch games, often letting a relaxed
    attitude toward deadlines turn projects into spontaneous, unstructured experiments.
  sports: Preferring low‑key exercise, Andres Rivera takes daily walks in the neighborhood park, participates in a local youth soccer league, and avidly follows the Atlanta Braves (MLB) and Atlanta United
    (MLS) on television, though organized training programs are rare.
  arts: Andres Rivera’s artistic palate blends reggaeton hits from Bad Bunny, salsa classics by Marc Anthony, and Koji Kondo’s video‑game soundtracks, while they devour graphic comics by Alan Moore and
    sketch cityscapes inspired by Hayao Miyazaki’s futuristic worlds.
  travel: Enjoying nature‑focused getaways, Andres Rivera recalls a family road trip to the Grand Canyon and dreams of bird‑watching in Costa Rica’s rainforests and exploring Tokyo’s neon districts, favoring
    flexible itineraries over rigid schedules.
  culinary: Andres Rivera favors quick‑cook comfort foods like cheese quesadillas with avocado, chocolate‑chip pancakes drizzled with strawberry syrup, and occasional cucumber‑crab sushi rolls, yet their
    cooking is limited to simple microwave meals and occasional kitchen experiments.
  core: Andres Rivera is a quietly curious, solitary creator whose love for LEGO engineering and Scratch coding coexists with persistent worry, a relaxed approach to planning, and a habit of retreating
    into nature to unwind.
background:
  cultural: Andres belongs to a Puerto Rican family that settled in Trenton, New Jersey. At home, Spanish is spoken alongside English, and family meals often feature traditional dishes such as arroz con
    gandules, pasteles, and flan. Music like salsa, bomba, and modern reggaeton plays during celebrations, and the family participates in community events such as the Puerto Rican Day Parade in nearby Newark.
    These cultural ties give Andres a bilingual edge and a strong sense of heritage, while his daily life is shaped by the rhythms of a suburban New Jersey neighborhood and the diverse influences of his
    school and city.
