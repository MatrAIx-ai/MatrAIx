  career_goals: Andres dreams of a future where he can combine his love for technology with his concern for the environment. He hopes to become a software engineer or robotics specialist, working on projects
    that let him design and program autonomous devices, ideally in a quiet, focused setting. He also imagines contributing to community‑oriented initiatives, such as developing low‑cost educational tech
    tools for schools in his neighborhood, allowing him to give back while still working largely independently.
