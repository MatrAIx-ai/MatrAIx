personas:
  professional: Nicole Gettridge, a senior software engineer with three decades of Java and C++ enterprise development, channels their methodical, documentation‑heavy style and preference for structured
    processes into mentoring junior developers and designing robust legacy migrations, while their competitive drive fuels consulting proposals that promise predictable, low‑risk IT solutions for small
    nonprofits.
  sports: Nicole Gettridge, an avid early‑morning walker who leads a small walking club at the local community center and follows the Atlanta Braves in baseball and the Washington Capitals in hockey, prefers
    low‑impact fitness like light stretching and occasional lawn‑care aerobics, reflecting their structured routine and reserved social preferences.
  arts: Nicole Gettridge, a quilting enthusiast who studies Kaffe Fassett’s color palettes while reading Margaret Mitchell‑inspired historical fiction and singing hymns alongside Mahalia Jackson recordings
    in the church choir, channels their creative impulse into meticulous patchwork that doubles as a calming ritual against their anxiety.
  travel: Nicole Gettridge, a planner who meticulously maps out short, guided tours to heritage sites like Savannah’s historic district and the Blue Ridge Parkway, favors low‑stress itineraries over spontaneous
    trips, and dreams of a serene river cruise on the Danube once retirement fully settles in, so they schedule each outing months in advance.
  culinary: Nicole Gettridge, a seasoned home cook who perfects Southern soul‑food classics such as collard greens simmered with smoked turkey, peach‑glazed barbecue ribs, and sweet potato casserole seasoned
    with smoked paprika, enjoys sourcing heirloom tomatoes from their garden, and treats weekly church potlucks as opportunities to showcase their culinary precision.
  core: Nicole Gettridge, a structured yet emotionally intense 68‑year‑old tech veteran, balances meticulous problem‑solving with a love for quiet creative pursuits, while their skeptical, competitive streak
    and occasional anxiety color every personal and professional decision.
background:
  cultural: Nicole was raised in a close‑knit Black community in rural Georgia, where church, family, and community service were central pillars of daily life. The traditions of Southern gospel music, soul‑food
    cooking, and oral storytelling have shaped her values of resilience, mutual support, and respect for heritage. She remains active in her local African American church, participates in community festivals
    that celebrate Black history, and volunteers with the local NAACP chapter, reflecting a deep connection to her cultural roots while navigating a career in a predominantly white tech field.
attributes:
  skills: '["Java", "C++", "SQL Server", "Database design", "Debugging and troubleshooting", "Software documentation", "Version control (Git, SVN)", "Structured development methodologies", "Test‑driven
    development", "Mentoring junior developers"]'
  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Cooking Southern cuisine", "Walking dogs", "Crossword puzzles", "Volunteer teaching basic computing", "Singing in church choir"]'
  career_goals: Nicole aims to leverage her extensive background to transition into a consulting role that helps small businesses and local nonprofits modernize their IT infrastructure while maintaining
    reliable, predictable systems. She hopes to obtain an AWS Solutions Architect certification to broaden her cloud expertise, and eventually lead a small, tightly‑run development team that values clear
    processes and accountability. Additionally, she wants to create a mentorship program for underrepresented youth in technology and advocate for mental‑health awareness within the tech community to reduce
    workplace distress.
