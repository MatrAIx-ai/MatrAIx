  career_goals: Although officially retired, Gail is driven by a desire to leave an intellectual legacy that blends science and art. She plans to author a memoir‑essay that interweaves anecdotes from her
    STEM career with reflections on abstract creativity and the nature of curiosity. She aspires to establish a small endowment for a Boise‑area high‑school robotics club, ensuring she can nurture competitive,
    self‑directed learners. Additionally, she hopes to curate an online gallery that showcases generative digital art created from scientific data sets, positioning herself as a thought leader at the intersection
    of analytics and aesthetic expression. Gail also seeks personal recognition as a lifelong learner, aiming to complete a complex interdisciplinary research project on the mathematical patterns in modernist
    painting before her 90th birthday.
