personas:
  professional: A disciplined cultural program consultant-in-training, Sung Hsu merges their project coordination expertise, advanced Excel modeling, and digital photography skills to design immersive exhibitions
    that honor traditional calligraphy while maintaining rigorous budgets and timelines.
  sports: An organized fitness enthusiast, Sung Hsu starts each day with a solo jog along the Potomac, participates in a weekend cycling club, practices yoga at home, follows the Washington Commanders in
    football season, cheers for the Washington Capitals in hockey, and occasionally attends DC United soccer matches, blending personal discipline with a steady fandom.
  arts: An avid art lover, Sung Hsu frequents museum exhibitions featuring creators like Ai Weiwei, Banksy, and Mark Rothko, curates micro‑shows using their calligraphic expertise, and draws creative fuel
    from the minimalist compositions of Philip Glass and the lyrical storytelling of Sufjan Stevens during intimate live performances.
  travel: Meticulously planning each trip in Excel, Sung Hsu has explored cultural capitals such as Berlin, Barcelona, and Kyoto, enjoys weekend retreats in Shenandoah’s fall foliage, and aspires to embark
    on a solo journey through the Scottish Highlands and the deserts of Marrakech while balancing family obligations and a modest travel budget.
  culinary: A precise home cook, Sung Hsu blends traditional techniques with modern twists, crafting dishes like soy‑glazed salmon with miso‑ginger glaze, hand‑rolled dumplings, and matcha‑infused desserts,
    while honoring the ritual of a carefully prepared tea ceremony using premium loose‑leaf tea.
  core: Sung Hsu balances disciplined project management with a quiet, curiosity‑driven love of calligraphy, photography, and culinary experiments, yet can be guilty of endlessly reorganizing their Lightroom
    catalog at the expense of timely paperwork.
background:
  cultural: Sung Chang Hsu is a first‑generation American of Chinese descent whose family immigrated to the United States in the early 1970s. Raised in a bilingual household, he grew up speaking Mandarin
    at home and English in school, absorbing both Confucian values of harmony, respect, and collective well‑being and the individualistic spirit of American culture. This dual heritage informs his courteous
    and cooperative demeanor, his emphasis on community harmony, and his deep respect for artistic traditions. Living in Fairfax, Virginia, he actively participates in local Chinese cultural celebrations
    such as Lunar New Year and the Mid‑Autumn Festival, and he often serves as a bridge between the Asian community and broader local cultural institutions.
attributes:
  skills: '[''Project coordination'', ''Event planning'', ''Budget management'', ''Advanced Excel and data analysis'', ''Digital photography (shooting and post‑processing)'', ''Adobe Photoshop and Lightroom
    editing'', ''East Asian art history research'', ''Chinese calligraphy'', ''Community volunteer leadership'', ''Bilingual communication (English, Mandarin)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Digital photography and photo editing'', ''Chinese calligraphy'', ''Cooking Asian‑fusion dishes'', ''Tea ceremony practice'', ''Reading speculative
    fiction and philosophy'', ''Puzzle solving (jigsaw, sudoku)'', ''Small book‑club discussions'', ''Volunteer work at community cultural events'', ''Attending intimate live music or theater performances'']'
  career_goals: Although currently not in the formal workforce, Sung aspires to channel his organizational excellence and artistic curiosity into a part‑time role as a cultural program consultant for local
    museums or nonprofit arts organizations. He aims to earn a certificate in museum studies and develop expertise in exhibition design, particularly showcasing East Asian contemporary art. In the near
    term, he plans to volunteer as an exhibition coordinator, lead workshops on Chinese calligraphy and digital photography for community seniors, and contribute to a small advisory board for cultural events
    in Fairfax. Long‑term, he hopes to establish a modest community art studio that offers hands‑on workshops and serves as a gathering space for small art‑focused groups, while also authoring a guidebook
    on integrating traditional Asian art techniques into modern practice.
