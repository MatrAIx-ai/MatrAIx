personas:
  professional: Jesus Fernandez, a veteran large‑scale farmer and rancher, blends decades of hands‑on expertise in crop rotation, cattle breeding, and irrigation system design with a curious yet practical
    mindset that drives him to experiment with precision‑ag technologies while keeping the farm’s traditional rhythms intact.
  sports: Jesus Fernandez stays active by lifting weights each morning, barrel‑racing with the local 4‑H rodeo club on weekends, dancing salsa at community nights, and cheering on the Dallas Cowboys on
    football Sundays and the Houston Astros during baseball season.
  arts: Jesus Fernandez expresses his artistic side through woodworking projects and a deep appreciation for country legends like George Strait and the timeless salsa rhythms of Celia Cruz, regularly attending
    local folk‑art fairs and community‑theater productions.
  travel: Jesus Fernandez prefers low‑key road trips that blend farming insights with family time, having driven through the Texas Hill Country vineyards, explored the historic missions of San Antonio,
    and aiming to visit the cheese farms of Wisconsin for agritourism inspiration.
  culinary: Jesus Fernandez delights in cooking farm‑to‑table heritage dishes such as slow‑braised carnitas, fresh corn‑salsa, and homemade pozole, skillfully blending ingredients like ancho chilies, epazote,
    and locally harvested heirloom tomatoes while mastering the occasional brisket smoke.
  core: Jesus Fernandez balances a stubborn love for traditional ranching with a restless curiosity for tech, often staying up late poring over agronomy journals while neglecting sleep, and can be found
    humming country tunes while polishing an old tractor.
background:
  cultural: Jesus was raised in a Mexican‑American household that values hard work, family loyalty, and Catholic traditions. He grew up celebrating Día de los Muertos and Cinco de Mayo while also embracing
    the Texan ranching culture of Amarillo. Bilingual at home, he frequently switches between Spanish and English, preserving his family’s linguistic heritage. The blend of Mexican culinary traditions and
    the rugged ranch lifestyle informs his daily routine, from sharing tamales at family gatherings to applying the Mexican principle of "trabajo con corazón" (work with heart) to his farming practices.
    He maintains close ties with the local Mexican community, participating in church activities and regional cultural festivals.
attributes:
  skills: '[''Crop rotation planning'', ''Livestock breeding and health management'', ''Irrigation system design and maintenance'', ''Heavy equipment operation and repair'', ''Precision agriculture data
