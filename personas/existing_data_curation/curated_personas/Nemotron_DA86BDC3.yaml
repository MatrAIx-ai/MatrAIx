  hobbies: '["Sketching/Drawing", "Painting", "Creative Writing", "LEGO Building", "Scratch Programming", "Reading Fantasy & Science Books", "Puzzle Solving (jigsaw, logic puzzles)", "Small Group Art Club",
    "Listening to Instrumental Music"]'
  career_goals: Francine dreams of becoming a concept artist or illustrator for video games and movies, aiming to create new worlds that fuse her love of abstract ideas with visual storytelling. She aspires
    to win national art competitions and eventually attend a specialized art academy. Intrigued by scientific imagination, she also contemplates a future as a science communicator or astronaut who can illustrate
    cosmic concepts for the public. Her overarching ambition is to be recognized for her originality and to inspire others through her creative work.
