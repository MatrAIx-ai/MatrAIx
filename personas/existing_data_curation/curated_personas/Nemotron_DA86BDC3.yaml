personas:
  professional: Francine Blanchard, an aspiring young game designer, blends their love of fantasy storytelling, meticulous LEGO construction, and Scratch programming to prototype whimsical interactive animations,
    channeling their competitive edge into perfecting puzzle mechanics while maintaining a disciplined schedule of project milestones.
  sports: Francine Blanchard, a member of the Sunflower Youth Soccer Club (U10 division) and a Saturday swimmer for the Riverside Aquatics Team, follows the New York Yankees and the Golden State Warriors,
    and embraces a competitive training routine that includes timed drills and personal best logs, though they prefer solo practice over scrimmages.
  arts: Francine Blanchard, who spends evenings sketching characters inspired by Studio Ghibli’s 'Spirited Away,' listening to instrumental scores by Hans Zimmer and Yoko Kanno, and devouring graphic novels
    by Neil Gaiman, channels their imagination into vivid illustrations and short stories shared in their after‑school art club.
  travel: Francine Blanchard, who delights in family road trips to the nearby coastal lighthouse and dreams of exploring the ancient ruins of Machu Picchu and the neon streets of Tokyo, plans their adventures
    around school breaks with detailed itineraries that allocate time for sketching scenic vistas.
  culinary: Francine Blanchard, an enthusiastic home cook who perfects macaroni‑and‑cheese, loves crafting avocado toast topped with cherry tomatoes and fresh basil, and delights in assembling homemade
    pizza with mozzarella, pepperoni, and pine nuts, yet often forgets to wash their hands before cooking.
  core: Francine Blanchard merges a vivid imagination with a meticulous, competitive streak, turning solitary LEGO builds into strategic puzzles, while habitually hoarding stray pieces as secret collectibles.
background:
  cultural: Francine comes from a middle‑class, European‑American family in Porter, Texas, a suburban community within Harris County. She was raised with a mix of Southern hospitality and contemporary Texan
    cultural influences, including participation in community fairs, Fourth of July celebrations, and family gatherings centered around barbecue and holiday traditions. Her family places a strong emphasis
    on education and encourages independent exploration, reflecting the region’s focus on community involvement and support for the arts. While primarily identifying with mainstream American culture, she
    also absorbs the diverse artistic and technological influences of nearby Houston, exposing her to multicultural media, museums, and tech workshops.
