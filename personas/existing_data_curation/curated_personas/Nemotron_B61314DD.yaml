  career_goals: Although retired from the formal workforce, Rita aims to leverage her business background to make a meaningful impact locally. She hopes to serve on the board of a nonprofit that supports
    seniors, offer part‑time consulting to small businesses in Manatee County, and mentor aspiring entrepreneurs. Rita also plans to complete an online certification in digital marketing to stay current
    with modern outreach methods, and she envisions traveling to historic towns in the Southeast with a close friend as a personal enrichment goal.
