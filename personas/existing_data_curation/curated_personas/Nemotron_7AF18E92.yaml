personas:
  professional: Stephannie Mayo, a seasoned municipal police officer with two decades of front-line experience and a humanities degree, leverages their analytical mindset, crisis-intervention expertise,
    and competitive drive to lead tactical operations, craft data-driven training programs, and they aspire to a promotion to shift commander while maintaining a meticulous, structure-oriented approach
    to law-enforcement.
  sports: Stephannie Mayo devotes evenings to hiking with the Portland Hiking Club on Appalachian Trail segments, paddles with the Casco Bay Kayak Collective, follows the New England Patriots and Boston
    Bruins avidly, and they keep a disciplined fitness regimen that includes weekend runs and occasional intramural soccer with the Maine United Women's Team.
  arts: Stephannie Mayo channels their love of maritime scenery into watercolor studies of Winslow Homer-inspired seascapes and captures dramatic sunrise shots reminiscent of Ansel Adams, while unwinding
    with classic novels by Jane Austen and historical biographies, and they occasionally attend performances by the Portland Stage Company featuring contemporary playwrights.
  travel: Stephannie Mayo prefers meticulously planned road trips that blend rugged outdoor adventure with cultural stops, having recently explored Acadia National Park's sunrise hikes, visited Reykjavik
    for its maritime museums, and they jotted down future itineraries for a winter getaway to Quebec's historic Old Town, all while balancing family commitments and a modest travel budget.
  culinary: Stephannie Mayo enjoys cooking at an intermediate level, favoring fresh Maine lobster rolls, creamy New England clam chowder with thyme and bay leaves, and blueberry crumble topped with local
    honey, while they also experiment with Mediterranean-inspired grilled salmon seasoned with dill and lemon zest.
  core: Stephannie Mayo is a detail-obsessive, competitively driven police veteran who balances a love of structured problem-solving with a restless urge to chart new coastal trails, even if it means stubbornly
    sticking to a checklist for every hike, and they never miss a chance to map out their next route.
background:
  cultural: Stephannie identifies as White American, having grown up in a small New England town where Anglo‑American cultural norms emphasized self‑reliance, community responsibility, and a connection
    to the sea. Her family’s roots trace back to English and Irish ancestors, and the regional heritage of Maine—its coastal towns, historic shipbuilding, and close‑knit neighborhoods—has shaped her respect
    for public service and practical problem‑solving. While she values broader American ideals of individualism and merit, she also appreciates the subtle traditions of New England hospitality and civic
    engagement.
attributes:
  skills: '[''Crisis Intervention'', ''De‑escalation Techniques'', ''Law Enforcement Procedures'', ''Arrest and Evidence Handling'', ''First Aid/CPR'', ''Report Writing'', ''Community Engagement'', ''Surveillance
    and Observation'', ''Data Analysis'', ''Physical Fitness Training'', ''Critical Thinking'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Classic literature reading'', ''Historical non‑fiction'', ''Watercolor painting'', ''Coastal photography'', ''Chess'', ''Volunteer archival research'']'
  career_goals: Stephannie aims to secure a supervisory position—preferably as a shift commander or lieutenant—within the Portland Police Department. She is ambitious about spearheading a high‑stakes investigative
    unit focused on organized crime and cyber‑theft, and hopes to design evidence‑based training programs that raise tactical standards. Her competitive drive pushes her to earn commendations for exemplary
    service, and she seeks to influence department policy by emphasizing data‑driven decision making and transparent community outreach. Long‑term, she envisions a role where she can mentor new officers
    while maintaining the structured, results‑oriented environment she values.
