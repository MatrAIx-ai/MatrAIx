  career_goals: Looking ahead, Sonia aspires to transition into a senior art‑director or creative‑lead position where she can steer a multidisciplinary team toward socially inclusive campaigns. She is eager
    to harness her deep appreciation for Mexican visual traditions to create branding that celebrates cultural diversity while resonating with mainstream audiences. Over the next five years, she plans to
    obtain a formal UX certification and build a portfolio of community‑centered projects, eventually founding a boutique design studio focused on empowering underrepresented entrepreneurs and nonprofit
    organizations. Mentoring emerging designers, especially those from bilingual or immigrant backgrounds, is a core ambition, as is contributing to public art initiatives that foster neighborhood cohesion.
