personas:
  professional: Sonia Aviles is a senior graphic designer and emerging art director whose two decades of mastery in Adobe Creative Cloud, typography, and color theory blend with an organized, methodical
    workflow and a compassionate drive to embed cultural storytelling into every brand identity.
  sports: Sonia Aviles is a regular participant in Queens’ weekend salsa dance circles and a casual player on a co‑ed recreational softball league, while cheering for the New York Yankees and staying tuned
    to New York City FC matches each spring.
  arts: Sonia Aviles is an avid gallery‑hopper who draws inspiration from the mural legacy of Diego Rivera, the vibrant palettes of Frida Kahlo, and contemporary street installations by Shepard Fairey,
    and she frequently volunteers to lead youth art workshops that celebrate communal narratives.
  travel: Sonia Aviles favors thoughtfully planned cultural trips, having explored Oaxaca’s historic markets and the colorful streets of Guanajuato, while dreaming of a Pacific‑coast road‑trip to Santa
    Barbara, balancing her travel ambitions with a modest family budget.
  culinary: Sonia Aviles delights in preparing mole poblano from scratch with chiles de árbol and chocolate, rolling tamales seasoned with hoja santa, and crafting fresh ceviche with lime, avocado, and
    jalapeño, while she experiments with herb blends harvested from her rooftop garden to season home‑cooked dishes.
  core: Sonia Aviles blends meticulous design craft with a quiet, compassionate curiosity, juggling a love for folk art, yoga, and occasional impulsive online print buys, all while nurturing a rooftop herb
    garden they sometimes forget to water.
background:
  cultural: Sonia's cultural background is rooted in a Mexican‑American household that celebrates both traditional customs and the dynamism of a multicultural New York neighborhood. Growing up, she participated
    in Día de los Muertos altars, learned folk storytelling, and was exposed to the vibrant colors and patterns of Oaxaca textiles, which continue to inform her visual palette. Fluency in Spanish and English
    enables her to navigate bicultural spaces and serve clients across linguistic divides. Residing in Oakland Gardens, Queens—a borough known for its rich Latino communities—has deepened her connection
    to contemporary Mexican diaspora experiences, from attending local salsa nights to collaborating on community murals that honor immigrant narratives. This blend of heritage and urban exposure fuels
    her commitment to infuse cultural authenticity into her design work while fostering inclusive dialogues.
