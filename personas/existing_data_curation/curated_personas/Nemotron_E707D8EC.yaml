  hobbies: '[''Morning Yoga'', ''Long-Distance Running'', ''Hiking (Arroyo Seco, Eaton Canyon)'', ''Strategic Board Games (Settlers of Catan, Chess)'', ''Reading Non-Fiction (Finance, Behavioral Economics,
    Personal Development)'', ''Volunteer Financial Literacy Workshops'']'
  career_goals: Elizabeth aims to obtain her Certified Financial Planner (CFP) designation within the next 12 months, followed by a Chartered Financial Analyst (CFA) Level I certification to deepen her
    analytical expertise. In the medium term, she plans to transition from a boutique advisory team to a senior advisor role, overseeing a client portfolio of high‑net‑worth families in Los Angeles County.
    Her long‑term ambition is to launch her own independent financial‑planning practice that emphasizes structured, evidence‑based strategies and provides free financial‑literacy workshops for underserved
    communities. She measures success through client satisfaction scores, portfolio growth metrics, and the achievement of clear, quarterly performance targets.
