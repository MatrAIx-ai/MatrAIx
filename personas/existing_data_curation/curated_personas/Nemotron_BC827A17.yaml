personas:
  professional: Jean Salvador is an aspiring storyteller and illustrator who weaves adventure tales from history books into hand‑drawn narratives, showing a practical eye for detail while working at a relaxed,
    sometimes disorganized pace that reflects their love of routine and flexibility over strict planning.
  sports: Jean Salvador enjoys playing soccer with the local Junior Tigers club, practices at the community park every Saturday, and cheers for the Metropolitan Lions professional team, preferring informal
    pick‑up games and a flexible routine over regimented training schedules.
  arts: Jean Salvador loves drawing characters from Adventure Time, creating colorful papel picado decorations, listening to the music of Taylor Swift and BTS while sketching, and admiring the storytelling
    of J.K. Rowling, blending vibrant visual art with a soundtrack of contemporary pop.
  travel: Jean Salvador prefers family road trips with a clear itinerary, having enjoyed a weekend visit to the regional science museum and a sunny day at Clearwater Beach, while dreaming of future adventures
    to the Eiffel Tower in Paris and a safari in Kenya.
  culinary: Jean Salvador enjoys helping prepare homemade pizza topped with mozzarella and fresh basil, mixing chocolate chips into brownie batter, and tossing a fruit salad with strawberries, bananas,
    and honey, showing budding cooking skills that balance comforting classics with occasional experimental spice experiments.
  core: Jean Salvador is a routine‑loving, quietly creative ten‑year‑old who oscillates between meticulous crafting and occasional forgetfulness, channeling their love of history and soccer into imaginative
    stories while often misplacing their sketchbooks in the rabbit’s hutch.
background:
  cultural: Jean Iris comes from a Mexican‑American family that maintains many traditions from their heritage while living in Chandler, Oklahoma. At home, Spanish is spoken alongside English, and the family
    celebrates holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day with homemade foods, music, and storytelling. Her grandparents share stories of their hometown in Jalisco, teaching
    her traditional songs and recipes. The close‑knit community of Lincoln County blends rural Oklahoma values with the vibrant customs of her Mexican roots, shaping her identity and daily life.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Tablet/Computer literacy'', ''Basic Spanish conversation'', ''Cooking simple Mexican dishes'', ''Arts and crafts (drawing, papel picado)'',
