  hobbies: '[''Reading'', ''Drawing and coloring'', ''Crafting (papel picado, embroidery)'', ''Helping with cooking'', ''Caring for pet rabbit'', ''Collecting rocks'', ''Playing soccer in small groups'',
    ''Listening to Mexican music'']'
  career_goals: She dreams of becoming a teacher who can work in a bilingual classroom, sharing knowledge with younger children while honoring her cultural roots. At the same time, she imagines caring for
    animals as a veterinarian, combining her love for pets with a practical, community‑focused career. For now, she is focused on doing well in school and learning new skills that will help her achieve
    these goals.
