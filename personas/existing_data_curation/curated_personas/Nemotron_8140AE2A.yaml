  career_goals: As she approaches retirement age, Ana aims to transition her extensive frontline experience into a supervisory or training role within her call center, where she can design structured onboarding
    programs and mentor younger staff. She values a predictable schedule that supports her health and family commitments, so she is seeking part-time or flexible arrangements that allow her to continue
    contributing while reducing stress. In the longer term, she hopes to volunteer as a community liaison for local nonprofit organizations, applying her interpersonal skills to coordinate outreach events
    and improve service delivery for seniors in Fort Branch.
