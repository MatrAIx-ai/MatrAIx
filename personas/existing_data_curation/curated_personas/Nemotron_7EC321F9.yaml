personas:
  professional: Amanda Greene, a seasoned landscape architect with three decades of experience, blends meticulous site analysis, AutoCAD and GIS expertise, and a deep reverence for New England’s historic
    gardens to deliver low‑impact, heritage‑preserving designs while they systematically mentor emerging designers through a structured apprenticeship program.
  sports: Amanda Greene, an avid walker, spends weekend mornings trekking the Farmington River trail, hikes with the Connecticut Hiking Association, enjoys cross‑country skiing in winter, and they root
    for the New England Patriots and Hartford Yard Goats, embodying a modest yet dedicated approach to fitness and regional sports loyalty.
  arts: Amanda Greene, a pottery enthusiast, shapes clay at a local studio inspired by Bernard Leach, reads works on Charles Bulfinch and Henry Hobson Richardson, attends occasional performances at the
    Ansonia Playhouse featuring productions starring Meryl Streep, and they find quiet creative fulfillment in both hands‑on craft and architectural history.
  travel: Amanda Greene, a methodical planner, favors small‑group garden tours to England’s historic estates, weekend getaways to Cape Cod’s lighthouse trails, has visited Kyoto’s temple gardens, and they
    prioritize detailed itineraries and eco‑friendly lodging, balancing their love for heritage landscapes with a careful travel budget.
  culinary: Amanda Greene, a farm‑to‑table cook, delights in preparing heirloom roasted carrots with thyme, beet and goat‑cheese salads, and homemade sourdough using stone‑ground wheat, regularly experiments
    with seasonal squash soups, and they occasionally over‑salt their dishes in pursuit of perfect flavor.
  core: Amanda Greene, a methodically organized garden‑designer, blends solitary stewardship of historic landscapes with a quiet determination, a knack for talking to plants, and an occasional indulgence
    in heirloom seed collecting, and they often plan each garden layout like a gentle 19th‑century tableau.
background:
  cultural: Amanda grew up in a multi‑generational Anglo‑American family rooted in the small towns of southwestern Connecticut. The New England culture of town meetings, self‑reliance, and reverence for
    the natural landscape shaped her values of order, practicality, and community stewardship. Her upbringing emphasized seasonal rhythms—celebrating harvests, maintaining a well‑kept homestead, and participating
    in local fairs—instilling a deep respect for regional heritage and the outdoors. Though culturally mainstream, she identifies with the modest, industrious ethos typical of the area and incorporates
    those traditions into her professional and personal life.
attributes:
  skills: '[''Site analysis'', ''Grading and drainage design'', ''Native plant selection'', ''Low‑impact stormwater design'', ''AutoCAD'', ''SketchUp'', ''ArcGIS'', ''Project scheduling'', ''Budget management'',
    ''Client liaison'', ''Connecticut environmental regulations'', ''Historic preservation guidelines'', ''Hardscape installation oversight'']'
  hobbies: '[''Garden cultivation'', ''River and trail walking'', ''Reading architectural history'', ''Small‑group book club'', ''Historical park restoration volunteering'', ''Pottery'']'
  career_goals: Amanda aims to transition her practice toward a boutique consultancy that focuses on preserving historic landscapes and promoting ecological stewardship in Connecticut. Over the next five
    years she plans to mentor emerging landscape designers through a structured apprenticeship program, leveraging her methodical approach to teach best‑practice workflow and project documentation. She
    also hopes to secure a senior advisory role with the Ansonia Planning Department, where she can influence municipal zoning and green‑infrastructure policies while maintaining a predictable workload.
    Ultimately, Amanda wishes to author a guidebook on New England garden design that blends practical planting techniques with cultural heritage, leaving a lasting resource for the local community.
