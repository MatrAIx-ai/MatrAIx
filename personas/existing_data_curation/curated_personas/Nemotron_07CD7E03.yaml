  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and spoken‑word performances'', ''Exploring diverse cuisines, especially South Asian and Caribbean'', ''Playing basketball in
    local leagues'', ''Hiking coastal trails in Rhode Island'', ''Podcasting on tech and cultural trends'', ''Volunteering at Indo‑Caribbean festivals'', ''Mentoring junior sales colleagues'']'
  career_goals: Razi aims to progress from a sales representative to a sales manager within the next three years, overseeing a team of representatives and shaping the company's service portfolio. He plans
    to earn a professional sales certification (CSP) and pursue an associate degree in business administration. Long‑term, he envisions becoming a Director of Business Development, driving strategic partnerships
    and perhaps launching his own consultancy that merges technology services with cultural creativity, helping brands reach diverse audiences.
