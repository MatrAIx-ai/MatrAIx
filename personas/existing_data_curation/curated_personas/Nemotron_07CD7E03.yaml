personas:
  professional: Razi Persaud leverages their charismatic communication and cultural competency to excel as a sales representative, skillfully using CRM analytics to craft bespoke proposals while passion
    for arts fuels creative pitch storytelling, positioning them as a rising candidate for a sales manager role within three years.
  sports: Razi Persaud, a member of the Providence Community Basketball Club, competes in local basketball leagues, follows the Boston Celtics and Providence Bruins enthusiastically, and they stay fit by
    hiking the coastal trails of Block Island each weekend.
  arts: Razi Persaud regularly visits RISD Museum exhibitions, enjoys live spoken-word performances by poet Natalie Diaz, and curates playlists featuring Kendrick Lamar, Björk, and local jazz trio The Subiaco
    Sisters, and they use these artistic inspirations to fuel their podcast on emerging tech and cultural trends.
  travel: Razi Persaud prefers curated cultural getaways, having explored the historic streets of Cartagena, the art districts of Berlin, and the seaside trails of Bermuda, and they are planning future
    trips to Marrakech and the Caribbean islands, balancing budget constraints by using airline points and short-term rentals to maximize experience over luxury.
  culinary: Razi Persaud delights in sampling and recreating South Asian and Caribbean dishes like chicken tikka masala, roti, jerk chicken, and goat curry, often experimenting with spice blends such as
    garam masala and allspice at a modest skill level, and they frequent Providence’s Union Square Kitchen for innovative fusion plates.
  core: Razi Persaud is a 28-year-old sales enthusiast whose curiosity for art, talkative charisma, and love of spontaneous food adventures drive a career focused on cultural-savvy business development,
    even as they juggle occasional back pains and a habit of last-minute event bookings.
background:
  cultural: Razi is of Indo‑Caribbean descent, with family roots tracing back to Indian ancestors who migrated to Guyana and later to the Caribbean before settling in the United States. Growing up in a
    South Asian household in Providence, he was immersed in a blend of Indian traditions—such as Diwali, Holi, and devotional music—and Caribbean cultural practices like Carnival and reggae rhythms. He
    speaks English fluently and has conversational knowledge of Hindi and Caribbean Creole. This multicultural upbringing nurtures his appreciation for diversity, informs his social interactions, and enriches
    his ability to connect with clients from varied backgrounds.
attributes:
  skills: '[''Client relationship management'', ''Cold calling and lead generation'', ''Negotiation and closing'', ''Public speaking and presentations'', ''Networking and community outreach'', ''CRM software
