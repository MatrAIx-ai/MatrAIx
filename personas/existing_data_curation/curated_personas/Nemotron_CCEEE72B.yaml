  career_goals: Although retired from formal employment, Kobe’s ambition is to stay actively engaged in his community. He aims to lead a weekly senior‑center activity group, mentor teens interested in trades,
    and compile a memoir of his life’s lessons for future generations. He also hopes to complete a small community garden project that provides fresh produce for the local food bank, and to maintain his
    health through regular walking and low‑impact exercise.
