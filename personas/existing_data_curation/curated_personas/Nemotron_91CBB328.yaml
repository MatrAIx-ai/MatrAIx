  hobbies: '[''Model kit building'', ''LEGO Technic construction'', ''Puzzle solving (Rubik’s Cube, jigsaw)'', ''Hiking'', ''Rock climbing'', ''Reading non‑fiction (productivity, self‑improvement)'', ''Strategy
    video gaming'', ''Attending local trivia nights'']'
  career_goals: Daniel aims to secure a stable, structured career with clear advancement pathways. He is interested in entering a skilled trade—such as HVAC technician or electrician—or a logistics role
    within a reputable company where his organizational strengths and reliability can be leveraged. Over the next year, he plans to pursue an apprenticeship or an associate degree in a technical field,
    with the long‑term goal of becoming a certified professional and eventually supervising a team. His competitive drive pushes him to achieve certifications and performance metrics that distinguish him
    from peers, while his desire for predictability leads him to seek workplaces with transparent policies and defined processes.
