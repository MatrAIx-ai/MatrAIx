persona_description: A film enthusiast who is particularly interested in the history and cultural significance of animated films, particularly those produced by Disney and the Fleischer Studios. They are
  knowledgeable about the techniques and innovations used in animation, such as rotoscoping and motion capture, and are interested in the impact of these techniques on the development of the medium. They
  are also interested in the cultural and social context in which animated films were produced and the ways in which they reflect and contribute to the larger cultural and historical narratives.
