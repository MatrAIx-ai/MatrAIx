personas:
  professional: Kendelle Johnson, a retired community volunteer, leverages their practical budgeting skills and love of structured yet adaptable planning to coordinate food‑pantry drives and senior‑center
    workshops, while their relaxed approach to deadlines lets them improvise when needed.
  sports: Kendelle Johnson stays active through daily gardening, morning walks, a weekly senior yoga session, and occasional friendly tennis matches at the Fort Mill community center, all while they loyally
    root for the Carolina Panthers and Charlotte Hornets during the football and basketball seasons.
  arts: Kendelle Johnson nurtures their creative side by quilting while listening to Mahalia Jackson and Aretha Franklin, they attend occasional gospel choir rehearsals at their church, and devour historical
    fiction like Maya Angelou’s memoirs, which together shape their artistic appreciation and personal storytelling.
  travel: Kendelle Johnson prefers relaxed, family‑oriented road trips, having enjoyed weekend getaways to Savannah, Asheville, and New Orleans, and they hope to one day explore Washington DC’s National
    Museum of American History with their grandchildren, planning each journey around modest budgets and senior‑friendly pacing.
  culinary: Kendelle Johnson delights in preparing soulful dishes such as collard greens seasoned with smoked turkey, sweet potato pie, and peach cobbler, while their expert hand at knitting and quilting
    is matched only by their skill at baking banana bread and crafting seasonal recipes that feature fresh herbs from their garden and a dash of molasses, and they often share these treats with neighbors
    during church potlucks.
  core: Kendelle Johnson is a structured yet delightfully disorganized garden‑lover who balances thrift with occasional sweet treats, prefers quiet evenings with gospel hymns, and can’t resist humming old
    soul tunes while they knit late into the night.
background:
  cultural: Kendelle grew up as an African‑American woman in the South during the late 1950s and 1960s, experiencing the civil‑rights era and the strong communal ties of the Black church. Her upbringing
    emphasized faith, family, and collective resilience, with family gatherings centered around soul‑food, gospel music, and oral storytelling. The cultural heritage of Southern hospitality, respect for
    elders, and a deep connection to the land shaped her love for gardening and cooking. These influences persist in her daily life in Fort Mill, where she maintains close relationships with church members,
    neighbors, and extended family, honoring traditions while adapting to modern technologies to stay linked with younger generations.
attributes:
