  hobbies: '["Gardening","Cooking traditional Southern dishes","Knitting and quilting","Reading historical fiction and memoirs","Listening to gospel music","Bridge (card game)","Volunteer work at food pantry","Small‑group
    Bible study"]'
  career_goals: Although retired from formal employment, Kendelle aims to expand her volunteer leadership at the local senior center, learn advanced digital tools to stay connected with her grandchildren,
    and eventually compile a small family history book that blends oral stories with genealogical research. She also hopes to start a modest home‑based venture selling her baked goods and handcrafted items
    to support local charities.
