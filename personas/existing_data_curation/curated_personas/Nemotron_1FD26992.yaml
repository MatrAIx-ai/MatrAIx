  career_goals: Ashley plans to obtain her GED within the next year and then enroll in a community college program focused on hospitality management or health services. She is attracted to careers that
    let her work directly with people, such as a front‑desk coordinator at a local bed‑and‑breakfast, a retail associate in a tourist‑focused shop, or a medical assistant in the county health clinic. In
    the longer term, she dreams of opening a small community space where locals can gather for events, workshops, and social activities, combining her love for organizing group experiences with her practical
    skill set.
