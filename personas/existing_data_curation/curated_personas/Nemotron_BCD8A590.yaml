personas:
  professional: An event strategist with a flair for inclusive design, Tiara Rickard blends rigorous data analytics with charismatic stakeholder engagement to orchestrate hybrid conferences that celebrate
    community storytelling traditions while meeting tight budgets, and they consistently adapt plans to accommodate unexpected challenges.
  sports: A dedicated member of the Riverside Community Running Club, Tiara Rickard enjoys early‑morning 5K jogs in spring, avidly follows the New York Knicks and Philadelphia Eagles, and they supplement
    cardio with monthly yoga flow classes to maintain flexibility and mental calm.
  arts: An avid performer, Tiara Rickard lights up local comedy stages with stand‑up routines, curates playlists featuring gospel maestro Kirk Franklin, jazz virtuoso Esperanza Spalding, and spoken‑word
    poet Saeed Jones, and they regularly direct community theater productions that weave in traditional storytelling elements.
  travel: An explorer of cultural immersion, Tiara Rickard has trekked the historic streets of New Orleans, savored the vibrant markets of Accra, and they are planning a solo retreat to Portugal’s coastal
    villages to blend mindfulness workshops with culinary forays.
  culinary: A culinary experimenter, Tiara Rickard reimagines classic soul‑food staples like collard greens and smoked turkey by infusing them with za’atar, smoked paprika, and heirloom ingredients from
    their urban garden, and they delight friends with these inventive dishes at intimate dinner parties.
  core: Tiara Rickard blends a relentless drive for inclusive, tech‑forward events with a love for late‑night comedy improv, manages anxiety through daily yoga practice, yet often succumbs to caffeine‑fuelled
    all‑night planning marathons.
background:
  cultural: Tiara’s cultural identity as a Black woman from the vibrant, multicultural suburbs of Audubon, New Jersey, deeply informs her worldview and professional ethos. Raised in a close‑knit family
    that celebrated African‑American traditions—such as Juneteenth gatherings, gospel music, and storytelling—she carries a strong sense of community responsibility. Her upbringing exposed her to the rich
    tapestry of Caribbean and African diaspora cultures present in the region, fostering an appreciation for diverse perspectives. This background motivates her to design events that are inclusive, feature
    representation of Black artists and speakers, and honor cultural heritage. She also actively mentors young Black professionals and participates in local organizations that promote racial equity and
    economic empowerment.
attributes:
  skills: '[''Strategic event logistics planning'', ''Budget development and financial oversight'', ''Vendor negotiation and contract management'', ''Risk assessment and contingency planning'', ''Hybrid
