    problem solving under pressure'', ''Sustainable and inclusive event design'']'
  hobbies: '[''Stand‑up comedy and community theater'', ''Culinary experimentation and hosting dinner parties'', ''Yoga and mindfulness meditation'', ''Urban gardening (herbs and heirloom vegetables)'',
    ''Public speaking at industry events'', ''Blogging about event planning trends'', ''Volunteering at local cultural festivals'']'
  career_goals: Tiara aims to transition from managing regional conferences to shaping the strategic direction of large‑scale, international conventions. She aspires to become a Senior Director of Events
    within a leading corporate or nonprofit organization, where she can champion sustainable, tech‑forward, and culturally inclusive experiences. Over the next five years she plans to earn a professional
    certification such as the Certified Special Events Professional (CSEP) and complete an executive MBA to strengthen her business acumen. Ultimately, she envisions launching her own boutique event firm
    that empowers under‑represented voices and provides mentorship opportunities for emerging Black women in the events industry.
