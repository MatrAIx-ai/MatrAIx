persona_description: A veterinarian who specializes in treating cattle and sheep for acute infectious diseases caused by the Clostridium genus, such as blackleg or black quarter. This professional is experienced
  in managing severe muscle damage caused by the toxins produced by the organism, which is more prevalent in young animals. They are likely to work in a veterinary clinic or research laboratory, utilizing
  large doses of antibiotics to treat the disease and prevent its spread in endemic areas.
