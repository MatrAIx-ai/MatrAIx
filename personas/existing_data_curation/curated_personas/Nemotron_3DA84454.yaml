  career_goals: Olga hopes to continue her education beyond high school, aiming to attend a college that offers programs in education or nursing. Inspired by her desire to help others and maintain community
    stability, she envisions herself as a teacher or pediatric nurse in her hometown, contributing to the well-being of younger children and families. She plans to develop leadership skills through student
    council and community service, and to acquire certifications in first aid and CPR to be prepared for emergencies. Long-term, she wants to be a respected, reliable professional who can combine her organizational
    strengths with a caring role.
