personas:
  professional: Jimmy Plachy, a budding game developer and digital artist, merges love for comic sketching with Scratch coding to prototype interactive stories, leveraging their curious mindset and relaxed
    approach to deadlines to experiment freely.
  sports: Jimmy Plachy, a member of the Chandler Youth Soccer Club, enjoys casual hikes on South Mountain and follows professional teams like the Phoenix Suns, Arizona Diamondbacks, and Arizona Cardinals,
    preferring unstructured outdoor activity over competitive school sports.
  arts: Jimmy Plachy, an avid fan of comic creators Jeff Smith and Adrian Tomine, draws inspiration from indie rock bands such as Tame Impala and classic legends like Led Zeppelin while playing guitar,
    and spends free evenings listening to ambient composer Brian Eno to fuel their sketching.
  travel: Jimmy Plachy, who loves spontaneous family road trips, has explored the Grand Canyon and Sedona’s red‑rock landscapes, dreams of visiting Tokyo’s Akihabara district and Iceland’s volcanic terrain,
    and prefers flexible itineraries that leave room for impromptu art sessions.
  culinary: Jimmy Plachy, a self‑taught kitchen experimenter, favors tacos with cilantro, lime, and carne asada, enjoys making avocado toast topped with chili flakes, can whip up a quick spaghetti with
    tomato‑basil sauce, though they often forget to clean up the kitchen afterward.
  core: Jimmy Plachy is a creatively restless 13‑year‑old who turns intense anxiety into art, splurges on gadgets and snacks, lives for spontaneous hikes and late‑night gaming, yet remains notoriously disorganized.
background:
  cultural: Jimmy grew up in a typical suburban middle‑class family in Chandler, Arizona. His household reflects a broadly American cultural backdrop, with holidays such as Fourth of July, Thanksgiving,
    and Halloween celebrated with community events and family traditions. The Southwest environment influences his appreciation for desert landscapes and outdoor activities. He attends a public middle school
    that emphasizes STEM and arts integration, exposing him to a diverse peer group and local tech industry influences from nearby Phoenix. While his ethnic background is white, his family values openness
    to new ideas, encouraging curiosity, creativity, and emotional expression.
