  career_goals: Mehreen aims to advance to a senior executive role, such as Chief Financial Officer, within the next five years, focusing on leading financial transformation initiatives that integrate emerging
    technologies like AI‑driven analytics. She seeks a position where she can shape corporate strategy, drive sustainable financial performance, and mentor the next generation of finance professionals.
    Additionally, she plans to earn the CFA charter to deepen her investment expertise and to become an active member of the Philadelphia Financial Executives Association, contributing to industry best
    practices. A personal ambition includes establishing a family trust and comprehensive retirement plan to ensure long‑term financial security for her children and grandchildren.
