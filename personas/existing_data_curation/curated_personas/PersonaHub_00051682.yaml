persona_description: A researcher in environmental science who studies the impact of pesticides on crop plants and the environment. This person is likely to be interested in the study conducted by the University
  of Turku and the University of Helsinki, which investigates the effects of glyphosate residue in poultry manure on crop plants. They are likely to be interested in the results of the study, which show
  that glyphosate residue in poultry manure can affect the growth and reproduction of crop plants, as well as the indirect effects on the growth of other plants. They may also be interested in the implications
  of the study for the poultry industry and the use of organic fertilizers.
