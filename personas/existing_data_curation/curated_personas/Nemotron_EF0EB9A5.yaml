personas:
  professional: Collin Clay, a 29-year-old licensed commercial driver in Southern California, blends a flawless safety record, hands-on vehicle maintenance know-how, and savvy use of fleet-management software
    to deliver top-line sales while coaching new hires, all driven by a competitive curiosity that fuels their goal of becoming a logistics manager and eventually running an independent freight brokerage.
  sports: Collin Clay dribbles in a local recreational basketball league, smashes reps at a CrossFit box, cheers on the Los Angeles Lakers, Dodgers, and LA Galaxy, and they schedule weekly park runs to
    stay lean for their competitive gaming marathons.
  arts: Collin Clay can be found at Southern California venues listening to The Strokes, Red Hot Chili Peppers, and local surf-rock bands, binge-watches indie films starring Joaquin Phoenix, and occasionally
    sketches car designs inspired by Blade Runner's neon aesthetic.
  travel: Collin Clay prefers spontaneous weekend road trips along the Pacific Coast Highway from Santa Monica to Big Sur, has tasted the wines of Paso Robles, dreams of cruising Iceland's Ring Road and
    wandering Tokyo's electric alleys, and they always book budget-friendly Airbnbs while curating a custom driving playlist.
  culinary: Collin Clay, a competent home cook, grills marinated carne asada tacos with cilantro, lime, and diced onions, whips up quick miso ramen with soft-boiled eggs on night shifts, and at community
    barbecues perfects a smoky brisket rub featuring coffee grounds, brown sugar, and smoked paprika.
  core: Collin Clay, a 29-year-old Southern California trucking enthusiast, channels competitive curiosity into logistics, fuels friendships through live music and car meets, and despite a habit of late-night
    sports bets and occasional missed dentist appointments, relentlessly tracks performance metrics to stay ahead.
background:
  cultural: Collin grew up in the diverse, working‑class neighborhoods of Los Angeles County, where he was immersed in a blend of mainstream American culture and the multicultural vibrancy of the South‑Bay
    area. As a white Californian, his upbringing reflects the West Coast car and trucking culture, with a strong work ethic rooted in family‑owned businesses and community ties. While he primarily celebrates
    traditional U.S. holidays, his daily life is shaped by the local Hispanic and Latino influences of Maywood, from the food he enjoys to occasional exposure to Spanish language and community events.
attributes:
  skills: '["Commercial Driver''s License (CDL)", "Defensive and safety-focused driving", "Vehicle maintenance and basic mechanical repair", "Load securement and cargo handling", "Route optimization and
