  hobbies: '["Recreational basketball", "CrossFit and gym workouts", "Live music concerts and festivals", "Southern California road trips", "Car and truck enthusiast meetups", "Online multiplayer gaming
    (e.g., FIFA, Call of Duty)", "Community barbecues and neighborhood gatherings", "DIY vehicle maintenance and performance upgrades", "Sports betting and fantasy leagues"]'
  career_goals: Collin aims to move from driver‑sales roles into a supervisory position, such as fleet coordinator or logistics manager, where he can shape routing strategies and mentor new drivers. He
    is also interested in eventually purchasing his own truck and establishing a small independent freight brokerage, leveraging his competitive drive and curiosity about emerging transport technologies
    like telematics and autonomous trucks. In the next five years, he plans to obtain additional certifications in logistics and business management to support these ambitions.
