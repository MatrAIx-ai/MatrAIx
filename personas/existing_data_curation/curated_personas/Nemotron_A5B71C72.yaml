  hobbies: '[''Jazz and Live Music'', ''Second‑Line Parades and Mardi Gras Festivities'', ''Creole Cooking'', ''Rooftop Gardening'', ''Fishing on Bayou St. John'', ''Mentoring Youth in Trades'', ''Community
    Volunteer Work'', ''Workshops on Sustainable Building and Historic Preservation'']'
  career_goals: Approaching retirement, Jaquan aims to transition into a senior advisory role where he can share his wealth of practical knowledge with younger facility professionals and municipal agencies.
    He wishes to lead community‑focused projects that improve the safety and sustainability of public buildings, especially schools and community centers in underserved neighborhoods. He also aspires to
    become a consultant for disaster‑ready facility design, helping organizations develop low‑stress, resilient maintenance plans that balance cutting‑edge solutions with reliable, tried‑and‑true practices.
