personas:
  professional: Jaquan Smith, a veteran facility operations leader specializing in historic building maintenance, blends three decades of preventive maintenance planning, hurricane‑ready emergency protocols,
    and tight budgeting with a curious embrace of IoT sensor tech, all while mentoring junior staff and championing community‑focused renovation projects with disciplined precision, and they consistently
    apply the same meticulous checklist mindset to every community jazz night they attend.
  sports: Jaquan Smith enjoys weekend fishing trips along Bayou St. John, cheers on the New Orleans Pelicans at the Smoothie King Center, and joins a senior softball league at the community center, balancing
    low‑impact cardio with occasional bouts of competitive spirit, though they sometimes skip the post‑game stretching due to lingering joint pain.
  arts: Jaquan Smith frequents the iconic Maple Leaf Bar for live jazz, dancing in second‑line parades to the brass sounds of the Rebirth Brass Band, and collects recordings by Wynton Marsalis and Trombone
    Shorty, letting music’s improvisational flow inform their creative problem‑solving at work, and they often translate the spontaneity of a solo into innovative maintenance solutions.
  travel: Jaquan Smith plans trips with a blend of meticulous itinerary maps and spontaneous detours, having explored the historic streets of Savannah, the colonial charm of Cartagena, and the French Quarter’s
    hidden courtyards, while dreaming of a guided tour of the Loire Valley’s chateaux, and they prioritize cultural immersion over luxury within a modest retirement budget.
  culinary: Jaquan Smith’s kitchen is a laboratory for Creole comfort, expertly simmering gumbo with andouille sausage, okra, and file powder, perfecting jambalaya with shrimp and crawfish, and baking beignets
    dusted with powdered sugar, while they proudly source fresh herbs from their rooftop garden and host communal meals that double as recipe‑sharing workshops.
  core: Jaquan Smith merges disciplined organization with a restless curiosity, steering historic facilities toward resilient futures while juggling community jazz nights, rooftop gardening, and a chronic
    worry that keeps them double‑checking every detail, and they often find themselves re‑checking even the tiniest maintenance log entries.
background:
  cultural: Jaquan is part of the African‑American community in New Orleans, rooted in neighborhoods like Tremé that celebrate a rich blend of Black, Creole, and French heritage. His upbringing immersed
    him in the city’s music, culinary traditions, and strong church fellowship, shaping a deep sense of community responsibility. He values the resilience and solidarity of Black New Orleanians, drawing
    strength from family gatherings, church events, and the city's collective memory of overcoming adversity through mutual support.
