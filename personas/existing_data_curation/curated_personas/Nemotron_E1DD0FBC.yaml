  career_goals: Nolan plans to enroll in an undergraduate program in Visual Arts or Communications at Portland State University, with the long‑term ambition of working as a curator or program manager at
    a community‑focused art institution. He wants to blend his love for contemporary art with social impact, eventually leading projects that bring underrepresented voices into public spaces. At the same
    time, he aims to develop personal resilience strategies—through mental‑health advocacy and peer support—to manage his tendency toward worry and stress, hoping to become a mentor for other young creatives
    facing similar challenges.
