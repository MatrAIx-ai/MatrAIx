persona_description: A naturalist who specializes in the study of Crematogaster, a species of ground-dwelling bees found in various habitats such as pine/palmetto flatwoods, mixed hardwood forests, and
  lawns. They are particularly interested in the arboreal habitat of Crematogaster, which allows them to survive the depredations of Tetramorium tsushimae. They are skilled at collecting the species using
  various methods and microhabitats, and have collected the species from elevations ranging from 3 to 335 meters. Their expertise is in the study of the species' feeding habits, including their preference
  for extrafloral nectaries and honeydew-excreting hemipterans.
