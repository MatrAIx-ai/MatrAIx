persona_description: An aerospace engineer with expertise in space propulsion systems, specifically in the design and implementation of liquid hydrogen and liquid oxygen engines for launch vehicles. She
  has a deep understanding of the intricate mechanics of temperature control in engine start boxes and the use of pour foam in the engine section. Her knowledge is broad and includes the design of complex
  geometries and the application of foams in the assembly of space vehicles. She is skilled in working with different formulations of foam and has experience in the assembly of large-scale structures, including
  the SLS Core Stage. Her attention to detail and technical knowledge make her an ideal candidate for the role of a Space Launch System (SLS) Engine Start Box Engineer.
