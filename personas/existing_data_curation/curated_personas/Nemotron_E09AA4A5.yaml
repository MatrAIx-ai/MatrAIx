    ''Collecting rocks and minerals'', ''Scouting activities'']'
  career_goals: Christopher dreams of turning his love for the natural world into a career that lets him protect and study Montana’s wildlife. He imagines himself as a future park ranger or wildlife biologist,
    spending days in the field cataloguing species, monitoring ecosystems, and educating visitors about conservation. At the same time, his fascination with how things work fuels an interest in engineering;
    he hopes to study mechanical or environmental engineering so he can design sustainable tools for outdoor use. While he feels excited about these possibilities, he sometimes worries about whether he
    will succeed, which motivates him to stay focused on school and to seek mentorship from teachers and community members.
