personas:
  professional: Christopher Bartley is an aspiring junior engineer who tinkers with Minecraft redstone, builds model rockets, and dreams of designing real spacecraft, balancing his curiosity with a practical
    hands‑on approach despite his relaxed attitude toward deadlines.
  sports: Christopher Bartley enjoys weekend hikes on the nearby Rocky Mountain trails, follows the Montana Grizzlies football team, and participates in his local Scouts' adventure club where he practices
    basic orienteering and occasional fishing trips with a modest youth fishing license.
  arts: Christopher Bartley immerses himself in sci‑fi novels by authors like Andy Weir, sketches the landscapes he encounters during hikes, and listens to the cinematic scores of Hans Zimmer and the electronic
    rock of Muse while building intricate Minecraft worlds.
  travel: Christopher Bartley loves exploring the wilderness of Yellowstone National Park and plans to visit the Space Center Houston, preferring spontaneous road trips with his family over meticulously
    planned itineraries, yet he often packs only a snack and his sketchbook.
  culinary: Christopher Bartley favors hearty homemade meals such as beef‑and‑barley stew, enjoys fish‑cakes caught from local streams, and often snacks on trail mix with dried apricots and pumpkin seeds
    while experimenting with basic campfire cooking techniques.
  core: Christopher Bartley is a curious, solitary tinkerer who balances a love of rockets and wilderness with a habit of procrastinating and a persistent undercurrent of worry.
background:
  cultural: Christopher is a White American growing up in Butte, Montana, a town shaped by its historic copper‑mining industry and a strong working‑class heritage. His family traces roots back to Irish
    and German immigrants who settled in the region during the early 1900s, bringing a mix of cultural traditions that blend with the rugged, self‑reliant spirit of the American West. The community values
    modesty, cooperation, and a deep respect for the outdoors, which is reflected in local events like the county fair, fishing derbies, and seasonal festivals. The landscape—ranging from river valleys
    to the foothills of the Rockies—offers abundant opportunities for hiking, wildlife watching, and seasonal sports, shaping his appreciation for nature. At school, he experiences a supportive but small‑scale
    environment, where teachers emphasize practical learning and community involvement. This cultural backdrop fosters his interest in environmental stewardship, hands‑on problem solving, and a balanced
    view of tradition and innovation.
