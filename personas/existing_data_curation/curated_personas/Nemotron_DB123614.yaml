  career_goals: Anthony aims to achieve tenure at his institution within the next three years and ultimately serve as department chair, guiding the humanities program toward greater inclusivity and relevance.
    He aspires to publish a monograph on African American literary narratives, secure a major research grant focused on community‑engaged scholarship, and develop a cross‑disciplinary initiative linking
    literature, history, and social justice. Additionally, he is committed to mentoring first‑generation college students and expanding outreach programs that bridge the university with Cleveland’s local
    Black community.
