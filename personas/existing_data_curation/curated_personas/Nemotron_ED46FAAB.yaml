personas:
  professional: Pedro Tollinchi, a veteran construction and building inspector with three decades of hands‑on experience, leverages deep knowledge of the International Building Code, infrared thermography,
    and historic preservation guidelines while channeling their curiosity and artistic eye into meticulous aesthetic assessments, often turning inspection reports into narratives that blend technical rigor
    with visual storytelling, despite a relaxed approach to strict scheduling.
  sports: Pedro Tollinchi, an avid weekend angler and member of the Ogeechee River Anglers Club, follows the Savannah Bananas and the Atlanta Braves with fervor, participates in a community senior walking
    group during spring, and uses occasional gym sessions to counteract knee stiffness, favoring low‑impact cardio over high‑intensity sports.
  arts: Pedro Tollinchi, an architectural photographer and watercolor hobbyist, draws inspiration from the luminous cityscapes of Edward Burtynsky, the tropical palettes of Claude Monet’s later works, and
    the rhythmic conga beats of Celia Cruz, while regularly attending exhibitions featuring contemporary Southern artists like Mickalene Thomas at the Savannah College of Art and Design.
  travel: Pedro Tollinchi, who delights in immersive travel, frequently explores the historic districts of Savannah and Charleston, has revisited Puerto Rico’s coastal towns and the vibrant streets of Cartagena,
    and dreams of a photography pilgrimage to Barcelona’s modernist architecture and the misty highlands of the Scottish Isles.
  culinary: Pedro Tollinchi, a competent home chef, perfects traditional Puerto Rican arroz con gandules using sofrito, annatto oil, and pigeon peas, masters hand‑rolled pasteles with green banana leaves,
    and enjoys pairing his fresh river‑caught catfish with a side of sautéed collard greens seasoned with garlic and smoked ham.
  core: Pedro Tollinchi, a 58‑year‑old building inspector turned sustainable‑preservation entrepreneur, blends a meticulous eye for structural detail with a laissez‑faire approach to deadlines, an unshakable
    love for salsa rhythms, occasional procrastination on paperwork, and a habit of snapping spontaneous photos of every historic doorway he passes.
background:
  cultural: Pedro is a first‑generation Puerto Rican American who spent his early years in San Juan before moving to the mainland United States in his twenties to pursue a career in construction. He maintains
    a strong connection to his Caribbean roots through language, music, and cuisine; Spanish is his primary language at home, and he celebrates cultural holidays such as Nochebuena, Día de la Independencia
    de Puerto Rico, and the Festival de la Calle San Juan. In Georgia, Pedro blends his vibrant Puerto Rican cultural identity with Southern hospitality—participating in local community events, sharing
    traditional dishes with neighbors, and engaging with the small but active Puerto Rican diaspora in Savannah. His bilingual abilities and appreciation for both Caribbean and Southern artistic traditions
    enrich his interactions, making him a bridge between diverse cultural groups.
