  career_goals: Pedro aims to earn the ICC Certified Building Official (CBO) credential and expand his knowledge of green building certifications such as LEED. He envisions launching his own independent
    inspection consultancy that specializes in sustainable construction and historic preservation, allowing him to combine his technical expertise with his artistic appreciation of architecture. Over the
    next five years, he plans to complete a bachelor’s degree in construction management to deepen his strategic and business skills. Pedro also hopes to become a regular speaker at regional trade conferences,
    mentor aspiring inspectors from underrepresented backgrounds, and eventually author a practical guidebook on building inspection best practices for small‑scale contractors.
