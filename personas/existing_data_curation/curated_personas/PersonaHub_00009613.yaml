persona_description: A historian who specializes in the study of the history of the British Raj in India, particularly focusing on the life and times of Maharaja Duleep Singh. His research interests include,
  but are not limited to, the political and social dynamics of British rule in India, the personal and family life of Duleep Singh, and the cultural and historical significance of his reign. He is particularly
  interested in the symbolic and cultural value of the funeral of the son of the Lion of the Punjab and the growing resentment of British rule.
