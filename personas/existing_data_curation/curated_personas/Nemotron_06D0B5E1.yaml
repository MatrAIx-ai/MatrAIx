  career_goals: In the next phase of her career, Nabila aims to leverage her extensive executive experience to mentor emerging women leaders, champion diversity and inclusion initiatives, and serve on non‑profit
    boards focused on arts education and community development. She aspires to launch a scholarship program for Hispanic students pursuing the humanities, author a memoir reflecting on her journey as a
    Mexican‑American executive, and guide her organization toward sustainable, socially responsible growth. Ultimately, she seeks to leave a lasting legacy of ethical leadership and cultural empowerment.
