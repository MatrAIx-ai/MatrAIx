personas:
  professional: Minyoung Hu, a 35‑year‑old health information specialist working in Brooklyn, blends meticulous expertise in Epic and Cerner, deep knowledge of ICD‑10 and CPT coding, and bilingual Korean‑English
    communication to streamline medical records, train staff, and embed AI‑driven analytics while upholding HIPAA compliance, reflecting their curious, organized, and methodical nature.
  sports: Minyoung Hu stays fit through sunrise runs with the Prospect Park Running Club, follows the Brooklyn Nets and New York Rangers for basketball and hockey inspiration, attends weekly yoga sessions
    at a community studio, and treats weekend hikes in the Catskills as essential mental resets.
  arts: Minyoung Hu immerses in Brooklyn’s vibrant arts scene by sketching street murals inspired by Banksy, attending indie film screenings of directors like Jim Jarmusch, practicing Korean calligraphy
    as a meditative art, and curating playlists that weave together Sufjan Stevens and Bon Iver, letting curiosity and quiet contemplation shape their creative outlook.
  travel: Minyoung Hu blends meticulous itinerary planning with spontaneous wanderlust, having explored Kyoto’s temples, hiked Iceland’s waterfalls, taken weekend retreats to the Hudson Valley, and now
    dreams of a solo trek through the Scottish Highlands to capture rugged light for photography.
  culinary: Minyoung Hu balances a moderately skilled home kitchen with a love for traditional Korean cooking, regularly preparing kimchi jjigae, bibimbap with gochujang, and experimenting with fermented
    soy sauce, while also seeking out Brooklyn’s artisanal coffee roasters and occasional pop‑up taco stands, reflecting a palate that craves bold flavors and cultural depth.
  core: Minyoung Hu, a 35‑year‑old Brooklyn health information analyst, fuses a methodical mind with artistic curiosity, using yoga to offset late‑night coffee binges and a penchant for cataloguing gallery
    visits in a well‑worn notebook.
background:
  cultural: As a second-generation Korean American raised in Queens and now living in Brooklyn, Minyoung grew up in a household that blended Confucian-inspired values of respect, harmony, and family cohesion
    with the multicultural energy of New York City. She speaks Korean at home, celebrates Korean holidays such as Chuseok and Lunar New Year, and attended a Korean weekend school where she learned Hangul
    and traditional arts. The immigrant narrative of diligence and community service shaped her cooperative nature, while exposure to the city’s diverse arts scene nurtured her appreciation for unconventional
    ideas. This bicultural upbringing informs her balanced perspective, allowing her to navigate both collective expectations and personal creativity.
