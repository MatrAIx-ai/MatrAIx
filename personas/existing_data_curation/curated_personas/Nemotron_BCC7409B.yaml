  career_goals: Minyoung aims to obtain a Registered Health Information Administrator (RHIA) certification and eventually transition into a health information management leadership role, overseeing data
    governance and quality improvement initiatives for a large health system. She is keen to integrate emerging technologies such as AI-driven data analytics into medical records workflows to enhance patient
    care efficiency. Additionally, she hopes to mentor junior staff and contribute to community health education programs, using her organizational strengths to design effective training curricula.
