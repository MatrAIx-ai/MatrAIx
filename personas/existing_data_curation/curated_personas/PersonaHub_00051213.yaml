persona_description: A healthcare professional who specializes in diagnosing and treating cardiovascular diseases, specifically peripheral artery disease and peripheral vascular disease. They have a background
  in radiology and have extensive knowledge in x-ray techniques, angiography, and interventional procedures. They are skilled in reading and interpreting angiograms, recognizing signs of blockages and narrowing
  of arteries, and performing angioplasty to open up blocked arteries. They are also familiar with the effects of fatty deposits and cholesterol buildup in the inner lining of arteries, and have experience
  in diagnosing and treating CLI and critical limb ischemia.
