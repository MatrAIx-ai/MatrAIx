personas:
  professional: Eric Sullivan, a 23‑year‑old automotive parts salesperson in Perry County, blends his curiosity for how components work with a methodical inventory system and a quiet, courteous demeanor,
    turning routine sales into trusted, community‑focused service while aiming for a parts‑manager role.
  sports: Eric Sullivan, a 23‑year‑old outdoor enthusiast, spends weekends fishing at Dale Hollow Lake, hikes the Cumberland Plateau trails, and avidly follows the Tennessee Titans and Nashville Predators
    while cheering on the Perry County High School basketball team as a dedicated booster.
  arts: Eric Sullivan, a 23‑year‑old amateur guitarist, finds inspiration in southern storytellers like John Prine and the soulful riffs of Lynyrd Skynyrd while occasionally catching live bluegrass shows
    at the local community hall and enjoying classic films starring Tom Hanks during quiet evenings.
  travel: Eric Sullivan, a 23‑year‑old road‑trip lover, has driven the Blue Ridge Parkway to Asheville and plans a Route 66 adventure to the Grand Canyon, preferring self‑planned itineraries that combine
    a weekend of fishing at Lake Lanier with a quick stop at the Nashville auto show.
  culinary: Eric Sullivan, a 23‑year‑old home‑cooker, delights in mastering Southern comfort dishes such as smoked pork shoulder with apple‑cider glaze, buttermilk fried chicken, and homemade pecan pie,
    often seasoning meals with smoked paprika, garlic, and a dash of molasses while his wife perfects the accompanying collard greens.
  core: Eric Sullivan, a 23‑year‑old blend of quiet practicality and garage‑filled curiosity, can spend hours fine‑tuning a 1972 Camaro, yet habitually misplaces his keys and forgets to water his plants,
    balancing community devotion with a stubborn love for mechanical puzzles.
background:
  cultural: Eric grew up in a close‑knit, middle‑class white family in rural Central Tennessee, where church attendance, community events, and family gatherings were central to life. The Southern values
    of hospitality, modesty, and a strong work ethic shaped his outlook. He and his wife continue traditions such as church service, Thanksgiving cooking, supporting the local high school sports teams,
    and participating in county fairs, reflecting the region's emphasis on community and family.
attributes:
  skills: '[''Automotive parts knowledge'', ''Customer service'', ''Inventory management'', ''Basic mechanical repair'', ''Sales negotiation'', ''POS system operation'', ''Problem-solving'', ''Attention
    to detail'', ''Time management'']'
  hobbies: '[''Classic car restoration'', ''Fishing'', ''Woodworking'', ''Hiking'', ''Reading automotive magazines'', ''Acoustic guitar'']'
  career_goals: Eric aims to advance from parts salesperson to parts manager within the next three years, pursuing ASE certification and a part‑time associate degree in automotive technology. His long‑term
    ambition is to open a family‑owned auto parts store in Perry County that also offers a small workshop where he can mentor younger technicians and provide personalized service to the local community.
