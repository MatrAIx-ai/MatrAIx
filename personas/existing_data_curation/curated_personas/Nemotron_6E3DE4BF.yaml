  hobbies: '[''Art gallery visits'', ''Theater attendance'', ''Pottery'', ''Watercolor painting'', ''Desert gardening'', ''Bridge club'', ''Historical fiction book club'', ''Cooking traditional Vietnamese
    cuisine'', ''Road trips to national parks'', ''Attending cultural festivals'']'
  career_goals: Although retired from formal employment, Ila aims to stay actively involved in education by creating an intergenerational art education program at the Palm Desert senior center, where seniors
    can both learn and teach artistic techniques. She aspires to author a memoir that weaves her Southeast Asian immigrant narrative with her educational philosophy, providing a resource for aspiring teachers.
    Ila also seeks to mentor young educators through a local university partnership, advocate for senior‑friendly learning technologies, and volunteer as a reading companion at the community library, ensuring
    her expertise continues to benefit the broader community.
