persona_description: A historical enthusiast and geographer who is interested in the growth and development of small towns in the American West, particularly Yellowstone County, Montana. They are fascinated
  by the rapid growth of Billings and the surrounding area, the presence of coal mines, the development of a wool market, and the abundant waterpower available. They are also interested in the history of
  the Crow reservation and its impact on the growth of Yellowstone County.
