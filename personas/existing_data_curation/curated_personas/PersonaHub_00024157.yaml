persona_description: A radiopharmacist who specializes in the production and use of positron emission tomography (PET) tracers, particularly those containing fluorine-18. This person is knowledgeable about
  the complex and expensive process of producing PET tracers, including the use of a cyclotron to produce [18F]fluoride, the preparation of the radioisotope, and the incorporation of the radioisotope into
  the precursor molecule. They are also skilled in the use of emerging technologies to address bottlenecks in PET tracer production, such as kit-based synthesizers and miniaturized radiosynthesizers based
  on microfluidics.
