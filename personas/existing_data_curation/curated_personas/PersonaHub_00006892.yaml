persona_description: A media education advocate who is passionate about teaching young people how to consume media images with an active, critical mind and asking the right questions. They are knowledgeable
  about the history of stereotyping in media and the importance of diversity representation in media. They are also aware of the impact of media on public perception and the need for media literacy. They
  are interested in teaching media literacy to young people in Aboriginal communities and are dedicated to ensuring that their students are equipped with the skills they need to navigate the media landscape.
