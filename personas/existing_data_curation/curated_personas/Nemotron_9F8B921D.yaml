  hobbies: '[''drawing'',''soccer'',''organizing playground games'',''Sunday school activities'',''puzzles and block building'',''watching cartoons'',''creating new game rules'']'
  career_goals: Jeralene dreams of becoming a teacher who can create fun and organized classrooms, a veterinarian who helps animals, and a professional soccer player because she loves competition and teamwork.
    She also imagines opening a small bakery where she can design and share treats with friends, reflecting her love for structure and creativity.
