personas:
  professional: Jeralene Marion, an aspiring kindergarten teacher, thrives on arranging classroom activities with a clear routine but frequently throws in unexpected games, showing they balance their love
    of predictability with a craving for flexibility.
  sports: Jeralene Marion dashes into the neighborhood's Willow Creek Cubs U5 soccer team, cheers on the nearby Boston Red Sox during family game nights, and insists on stretching before each practice,
    demonstrating they are competitive yet fun‑loving in sport.
  arts: Jeralene Marion sings loudly along to the soundtrack of Frozen, especially Idina Menzel’s soaring voice, and spends afternoons drawing pictures of Paw Patrol pups, revealing they have a vibrant
    and imaginative artistic side.
  travel: Jeralene Marion enjoys family trips to Disneyland and the Florida Keys, but also delights in spontaneous stops at roadside ice‑cream shops, preferring parents’ carefully planned itineraries mixed
    with occasional surprise detours, which they find thrilling.
  culinary: Jeralene Marion adores cheesy pepperoni pizza, loves the bright red ketchup on crispy chicken nuggets, and proudly helps stir the batter for banana pancakes, indicating they have a budding yet
    selective palate.
  core: Jeralene Marion is a spirited five‑year‑old whose love of order constantly battles with a penchant for spontaneous play, making them both meticulous and delightfully unpredictable.
background:
  cultural: Jeralene is a Black child growing up in Loganville, GA. Her family has deep roots in the Southern African American community, with traditions that include church gatherings, family potlucks,
    and celebrating Juneteenth. She attends a local preschool where cultural diversity is celebrated, and she often hears stories about her grandparents' migration from rural Georgia to the city. Music,
    food, and oral storytelling are integral parts of her upbringing, providing a strong sense of identity and community.
