personas:
  professional: Donna Peeples, a 45‑year‑old facilities maintenance specialist, blends their systematic floor‑care expertise, OSHA‑savvy compliance, and calm conflict‑resolution style to train new staff,
    uphold spotless environments, and pursue a supervisory role.
  sports: Donna Peeples, an avid walker, spends weekends strolling the Cuyahoga River Trail with the Cleveland Riverwalk Walking Club, supports the Cleveland Guardians and Browns from the comfort of their
    living room, and maintains fitness through low‑impact routines that suit their structured lifestyle.
  arts: Donna Peeples, a quiet reader of Agatha Christie mysteries and Hilary Mantel’s Tudor sagas, finds inspiration for their quilting patterns in Georgia O’Keeffe’s floral motifs, and lends their alto
    voice to a church choir that often performs Handel arias and the Cleveland Orchestra’s renditions of Mahler.
  travel: Donna Peeples prefers carefully planned weekend getaways, such as scheduled tours of Ohio’s Amish Country and an annual visit to Charleston, SC, while dreaming of a literary pilgrimage to England’s
    historic libraries, balancing travel costs with their family responsibilities.
  culinary: Donna Peeples, a modest home cook, delights in using balcony‑grown basil, thyme, and rosemary to create herb‑infused chicken soup, roasted vegetable medleys, and occasional apple crisp, while
    occasionally treating themselves to a cozy dinner at the local family‑run bistro.
  core: Donna Peeples is a methodical facilities professional whose quiet love of quilting, meticulous budgeting, and steady river‑walk routines paint a portrait of dependable care, punctuated by a habit
    of hoarding extra yarn for future projects, and they often find solace in the predictability of their daily schedule.
background:
  cultural: Donna is an African‑American woman whose family has lived in the Cleveland area for generations, tracing roots back to the Great Migration. Her cultural identity is shaped by the city's rich
    Black heritage, including strong ties to the local church, soulful music, and community solidarity. She grew up celebrating family gatherings that featured traditional soul food, storytelling, and music,
    fostering a deep sense of belonging and responsibility to give back. Donna’s experiences as a working‑class professional have reinforced values of perseverance, mutual support, and pride in contributing
    to the upkeep of shared spaces within her neighborhood.
