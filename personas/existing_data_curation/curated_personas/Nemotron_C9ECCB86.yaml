  career_goals: Donna aims to move into a supervisory role within the facilities department, where she can apply her organizational strengths to oversee a small team and implement quality‑control standards.
    She plans to obtain an OSHA certification and a custodial‑supervisor credential to strengthen her qualifications. Long‑term, she envisions mentoring younger workers, developing a training program for
    new hires, and possibly launching a small, community‑focused cleaning service that emphasizes reliability and respectful client relationships.
