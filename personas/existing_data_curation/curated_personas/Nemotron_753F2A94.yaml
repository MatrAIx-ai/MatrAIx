  hobbies: '["Visiting art museums and galleries", "Reading historical fiction and biographies", "Gardening (roses and native perennials)", "Knitting and crocheting", "Participating in a small book club",
    "Attending classical music concerts", "Experimenting with new recipes", "Learning digital photography", "Joining neighborhood walking tours"]'
  career_goals: Although retired from formal employment, Miranda aims to deepen her involvement in the cultural life of Chicago. She aspires to become a regular volunteer docent at the Art Institute, leading
    small group tours that emphasize lesser‑known artists and unconventional perspectives. She also hopes to curate a modest community art exhibition that blends local history with contemporary works, and
    to compile a memoir of her experiences growing up on the South Side, preserving family stories for future generations. Learning to use a tablet for digital photography and documenting her garden are
    personal ambitions that support her broader goal of staying intellectually active and contributing to community heritage.
