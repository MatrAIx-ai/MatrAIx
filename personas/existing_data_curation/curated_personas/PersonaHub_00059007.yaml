persona_description: A historian who specializes in the study of the First World War, particularly the African theaters. They have a deep understanding of the campaigns in Cameroon and East Africa, and
  are knowledgeable about the long-term consequences of the war on colonial Africa. They have a keen interest in the impact of the war on the Beti of Cameroun, and are familiar with the impact of the war
  on the nation-states of Africa. They have a particular interest in the role of African laborers in the African campaigns, and are knowledgeable about the recruitment of African laborers in South Africa.
  They are also familiar with the proposed repartition of Africa and the Ewe unification movement.
