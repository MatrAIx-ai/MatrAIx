  hobbies: '[''Museum visits'', ''Watercolor painting'', ''Sketching'', ''Book club'', ''Gardening'', ''Journaling'', ''Digital photography'', ''Genealogy research'', ''Piano listening'', ''Community theater'']'
  career_goals: Although retired from formal employment, Ariel aims to continue influencing education and the arts in her community. She plans to develop a series of intergenerational art workshops that
    blend traditional Southern crafts with contemporary artistic techniques. She also aspires to publish a collection of reflections on lifelong learning and to volunteer as an advisor for the local school
    board, helping to integrate arts into the standard curriculum. Long‑term, she hopes to establish a small community grant fund to support local artists and educators who pursue innovative projects.
