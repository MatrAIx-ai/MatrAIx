personas:
  professional: A certified nail technician with advanced gel and acrylic expertise, Dennis Lach blends meticulous sanitation standards with an easygoing, client-focused vibe, leveraging their business
    coursework to run a buzzing freelance schedule while dreaming of a boutique studio in the Greater New York area.
  sports: An avid weekend athlete, Dennis Lach plays pickup basketball at the local gym, roots for the New York Knicks and New Jersey Devils, and joins the Watchung Reservation Hiking Club for trail runs
    and nature walks.
  arts: A creatively inclined performer, Dennis Lach plays guitar in a garage band covering John Mayer and Lizzo, draws choreography inspiration from Beyoncé for community dance nights, and crafts nail
    art that pays homage to anime, K-Pop, and classic pop-culture icons.
  travel: An impromptu traveler, Dennis Lach has explored Philadelphia’s historic food markets, spent a weekend in Williamsburg, Brooklyn, and aspires to visit Kyoto’s cherry blossom season, all while stretching
    a travel budget with a points-earning credit card and careful planning.
  culinary: A culinary explorer, Dennis Lach delights in New Jersey-style pepperoni pizza with extra cheese, whips up avocado toast topped with hemp seeds and cherry tomatoes, and blends vegan smoothies
    packed with kale, mango, and coconut water for post-studio recovery.
  core: Dennis Lach is a sociable, detail-oriented nail tech who balances a structured freelance hustle with spontaneous basketball games, yoga breaks, and an addiction to collecting limited-edition nail
    polish collections.
background:
  cultural: Dennis was raised in a middle‑class white family in northern New Jersey. His parents, descendants of German and Irish immigrants, emphasized hard work, practicality, and community involvement.
    Growing up in Wayne, he was exposed to a diverse population, fostering an appreciation for different cultural customs and a desire to serve a broad client base. He celebrates traditional American holidays
    while also participating in multicultural events throughout Passaic County, reflecting the region's varied cultural tapestry.
