persona_description: A historian or scholar who specializes in the study of German literature and censorship during the Imperial German period, particularly focusing on the role of formal state controls
  on literary and political life. They are interested in understanding the intent, function, contested legal basis, institutions, and everyday operations of literary censorship, as well as its impact on
  authors, publishers, and theater directors. They are likely to have a deep knowledge of the political and social context of the period, as well as a keen interest in the literary and cultural norms that
  were being challenged and subverted by the state.
