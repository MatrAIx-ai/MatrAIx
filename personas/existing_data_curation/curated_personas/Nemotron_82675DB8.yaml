  career_goals: Adam aims to earn a certified trade qualification—such as an HVAC, plumbing, or electrical apprenticeship—within the next two years, after completing a community‑college preparatory program.
    He also hopes to eventually start a small hand‑crafted furniture side‑business that leverages his woodworking skills. He is motivated to achieve financial independence, secure a reliable income, and
    reduce his stress about the future, while also gaining a sense of accomplishment and credibility in his community.
