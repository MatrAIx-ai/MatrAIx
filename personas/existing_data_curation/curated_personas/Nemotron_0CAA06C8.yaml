  career_goals: Tuyet dreams of a future where she can blend her love of art and science. She envisions herself as a marine biologist who explores and protects ocean life, a muralist who paints vibrant
    stories that honor her Southeast Asian heritage while imagining futuristic worlds, or an astronaut who discovers new frontiers in space. Her ambition is to keep learning, to create works that inspire
    curiosity in others, and to make a positive impact on the environment and her community.
