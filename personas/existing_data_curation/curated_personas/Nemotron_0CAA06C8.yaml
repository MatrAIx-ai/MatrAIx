personas:
  professional: An emerging young creator, Tuyet Kapadia blends watercolor sketching, digital art experiments, and simple Scratch Jr. coding to develop a uniquely imaginative problem‑solving mindset, balancing
    the careful organization of LEGO builds with the free‑form spontaneity of their artwork.
  sports: A spirited junior explorer, Tuyet Kapadia joins the Riverside Kids FC after‑school soccer team, participates in weekly story‑time jogs in the local park, follows the high‑school basketball Hawks
    for inspiration, and they enjoy occasional nature‑themed scavenger‑hunt challenges with friends.
  arts: A budding visual storyteller, Tuyet Kapadia spends weekends watercoloring scenes inspired by Hayao Miyazaki’s animated worlds, emulating Claude Monet’s brushstrokes in nature sketches, vibing to
    pop anthem "Shake It Off" alongside traditional lullabies, and they attend local art workshops to experiment with mixed‑media collages.
  travel: An intrepid mini‑traveler, Tuyet Kapadia has explored Redwood State Park and Cannon Beach, collected seashells on family trips, and they dream of visiting Kyoto’s ancient temples and Marrakech’s
    vibrant souks for future artistic inspiration.
  culinary: A junior kitchen collaborator, Tuyet Kapadia loves rolling fresh spring rolls filled with lettuce, carrots, and vermicelli, perfecting sweet rice cakes topped with toasted sesame, experimenting
    with rainbow fruit kebabs, and they sometimes forget to rinse their hands before handling ingredients.
  core: Curious, organized yet flexible, Tuyet Kapadia channels boundless creativity into art, coding, and LEGO builds, balances a disciplined allowance system with occasional splurges, and they navigate
    minor allergies and occasional forgetfulness with steady optimism.
background:
  cultural: Tuyet is raised in a Southeast Asian household, with her parents having immigrated from Vietnam, and lives in the multicultural city of Bellflower, Los Angeles County. At home, she hears both
    Vietnamese and English, celebrates Lunar New Year and the Mid‑Autumn Festival, and participates in family traditions such as preparing festive meals and offering respect to elders. These cultural practices
    instill in her a deep appreciation for storytelling, art, and community values. In school and the broader community, she engages with peers from diverse backgrounds, enriching her worldview while maintaining
    a strong connection to her heritage.
