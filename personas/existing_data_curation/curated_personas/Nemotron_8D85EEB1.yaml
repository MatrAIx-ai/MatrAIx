personas:
  professional: Francisco Garcia, a budding soccer enthusiast and LEGO architect, channels their curiosity and practicality into early leadership roles on the neighborhood team, often organizing drills,
    designing imaginative play structures, and thriving as the lively centerpiece of group activities.
  sports: Francisco Garcia thrills in Saturday afternoon soccer matches with the Little Strikers youth league, idolizing FC Barcelona and mimicking the footwork of Lionel Messi, while also cheering for
    the New York Yankees during baseball season.
  arts: Francisco Garcia spends evenings drawing comic‑style panels inspired by Marvel heroes, dancing to salsa and reggaeton beats from artists like Bad Bunny and Marc Anthony at family gatherings, and
    losing themselves in adventure books such as "The Lost City of Z" and "Space Adventures".
  travel: Francisco Garcia dreams of trekking through lush tropical rainforests, wandering ancient cobbled streets in a vibrant Caribbean capital, and exploring the futuristic thrills of Tokyo Disneyland,
    while a recent family road trip to the Grand Canyon sparked a love for canyon hikes and photo‑ops.
  culinary: Francisco Garcia loves rolling out arroz con gandules, savoring the caramelized sweetness of mangu’s plantains, and mastering the perfect cheese pizza crust, often bragging about the secret
    of adding a pinch of oregano to the family’s marinara sauce.
  core: Francisco Garcia, the chatty nine‑year‑old who juggles soccer goals with LEGO towers, dances whenever reggaeton plays, and hoards pocket money for the next adventure, epitomizes boundless energy
    tempered by a surprising knack for organization.
background:
  cultural: Francisco comes from a proud Puerto Rican family that maintains strong ties to the island's traditions while living in Fayetteville, North Carolina. Spanish is spoken at home, and he grows up
    learning both languages, which enriches his cultural identity. Family celebrations such as Nochebuena and the Puerto Rican holidays of Navidad and Día de los Reyes bring music, dancing, and foods like
    mofongo and pasteles into his life. The vibrant rhythms of plena and salsa are a regular backdrop, influencing his love for dance and rhythm. Living in a military‑influenced community, he also experiences
    a diverse mix of cultures, making him comfortable with people from various backgrounds. This blend of Puerto Rican heritage and Southern U.S. environment fosters his sociable nature, respect for community,
    and appreciation for both new ideas and established customs.
