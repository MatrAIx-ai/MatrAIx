  career_goals: Francisco dreams of becoming a firefighter one day because he wants to protect and help his community, especially after hearing stories about bravery at local fire stations. He also loves
    animals and sometimes imagines himself as a veterinarian, caring for pets and wildlife. His curiosity about the world makes him think about being an astronaut, exploring space and learning new things.
    At the same time, he feels a strong urge to share knowledge, so teaching younger children or being a community mentor is another path he sees as rewarding and practical.
