persona_description: A business executive with expertise in environmental business and agricultural development, particularly in dry climates. Joakim Hauge is the CEO of the Sahara Forest Project, an environmental
  business that aims to improve and strengthen agriculture in dry climates while remaining accessible enough that local resources fuel the salt-water based greenhouses that they implement. He is interested
  in improving agricultural productivity in countries that are dealing with climate change and has developed a system that uses saltwater to cool air and provide nutrients to the soil.
