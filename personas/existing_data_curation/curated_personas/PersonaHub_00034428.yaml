persona_description: A professional land-use planner or developer who is interested in addressing wildfire risk and is looking for guidance on how to do so through better land use planning and regulation.
  This person is likely to be familiar with the concept of the wildland/urban interface (WUI) and the challenges it poses for communities. They are interested in exploring different approaches to addressing
  wildfire risk, such as implementing wildfire regulations and using WUI tools to address development in a way that better prepares communities for climate change and wildfire risk. This person may also
  be interested in learning about the resources and tools provided by NFPA, such as the Safer from the Start DVD and pamphlet, which provide guidance on how to address development in a way that better prepares
  communities for wildfire risk.
