    planning'', ''Team coordination'']'
  hobbies: '[''Community volunteering'', ''Event organization'', ''Book club participation'', ''Reading mystery and historical fiction'', ''Hiking and cycling'', ''Weekend road trips'', ''Cooking and experimenting
    with recipes'', ''Gardening'', ''Crocheting'', ''Crossword puzzles'']'
  career_goals: Jacqueline aims to transition from her current administrative assistant role to an office manager position within the next two years, overseeing a team of assistants and streamlining workflow
    processes. She plans to pursue a bachelor's degree in Business Administration or a certification such as the Certified Administrative Professional (CAP) to deepen her expertise. Her long‑term ambition
    is to implement digital automation solutions that increase efficiency for her organization, and eventually to mentor junior staff and contribute to community outreach programs through her employer.
    She also envisions taking a leadership role in a local nonprofit or civic organization, leveraging her organizational skills to benefit the community.
