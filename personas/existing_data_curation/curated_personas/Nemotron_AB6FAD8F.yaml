    to aesthetic detail'', ''Basic art‑handling and preservation cleaning practices'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Nature photography'', ''Hiking and biking on local trails'', ''Reading art history and contemporary fiction'',
    ''Listening to indie folk and acoustic music'', ''Participating in community volunteer clean‑up events'', ''Yoga and meditation'', ''Gardening (herb and flower beds)'', ''Cooking experimental dishes
    inspired by regional cuisine'']'
  career_goals: Tracey aims to advance from entry‑level cleaning to a supervisory or facilities‑manager role within the next five years. She plans to complete her associate degree in facilities management
    or environmental studies, and to earn certifications such as OSHA 10‑hour, Green Cleaning Professional, and LEED Accredited Professional. Her long‑term ambition is to work in a cultural institution—such
    as a museum, art gallery, or historic site—where she can combine her expertise in building maintenance with her passion for art preservation and sustainable cleaning practices. She also envisions eventually
    launching her own eco‑friendly cleaning service that specializes in serving artistic and heritage spaces in the Richmond‑Ashland region.
