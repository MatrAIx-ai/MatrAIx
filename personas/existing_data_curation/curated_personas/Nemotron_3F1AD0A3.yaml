  career_goals: Even at 85, Levi is driven to leave a lasting imprint on his community. He aims to compile a memoir that weaves personal anecdotes with the broader narrative of Sand Lake’s evolution, preserving
    the region’s heritage for future generations. He seeks to expand the senior center’s arts program by introducing weekly painting workshops and art appreciation sessions. Maintaining his health through
    daily walks, gardening, and regular exercise is a personal ambition, as is mastering digital photography to document local events and natural scenery. Levi also hopes to mentor a small cohort of volunteers,
    passing on his organizational skills and historical knowledge, and to serve as an advisory board member for the Montcalm County Historical Society.
