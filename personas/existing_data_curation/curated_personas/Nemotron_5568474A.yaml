personas:
  professional: Ivan Seneca is a seasoned welding and metal-fabrication specialist who leverages two decades of MIG, TIG, and stick expertise to mentor apprentices and create public art, channeling their
    curious, relaxed-about-obligations mindset into inventive projects while their sociable, outgoing energy fuels collaborative workshops and union leadership aspirations.
  sports: Ivan Seneca fuels their love of movement by playing soccer in a local Saturday pickup league, cheering for Puerto Rico FC and the Cangrejeros de Santurce baseball team, and they unwind on the
    coast fishing or surfing during the summer months, maintaining a casual fitness routine that balances group drills with solo paddling.
  arts: Ivan Seneca immerses themselves in the artistic scene by dancing salsa to Celia Cruz at the community center, drumming congas along with the Fania All-Stars playlists, crafting metal sculptures
    inspired by Banksy's street installations, and they stay current with design podcasts featuring designers like Jonathan Adler while devouring sci-fi novels from authors such as Ann Leckie.
  travel: Ivan Seneca prefers spontaneous, group-oriented trips that blend adventure and cultural immersion, having explored the secluded beaches of Culebra, the historic streets of Old San Juan, and the
    vibrant markets of Cartagena, and they dream of a tech-focused pilgrimage to Tokyo to visit cutting‑edge welding expos.
  culinary: Ivan Seneca is an avid home chef who expertly prepares island staples like mofongo stuffed with shrimp and garlicky pasteles, seasoning with adobo, sofrito, and ripe plantains, and they relish
    experimenting with smoky grill techniques while occasionally treating friends to a communal feast of tostones and arroz con gandules.
  core: Ivan Seneca is a curiosity-driven, sociable metal-artist who trades meticulous welding craft for spontaneous community projects, balances a laid-back money mindset with occasional splurges on tools,
    and wrestles with back pain that they monitor but rarely schedule doctor visits for.
background:
  cultural: Ivan grew up in Santa Isabel, a coastal municipality on the southern shore of Puerto Rico, where Afro‑Spanish traditions, Catholic festivities, and the legacy of the sugar‑cane industry shape
    daily life. He speaks fluent Spanish and comfortable English, and he cherishes the town’s Fiestas Patronales, plena music, and the communal spirit of neighborhood gatherings. The island’s blend of Caribbean
    rhythms, vibrant street art, and close‑knit family networks informs his values of cooperation, resilience, and openness to new ideas. His heritage inspires both his love for communal celebrations and
    his desire to fuse traditional craftsmanship with contemporary artistic expression.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding (SMAW)'', ''Flux‑cored welding'', ''Silver brazing'', ''Bronze brazing'', ''Electronic soldering'', ''Blueprint reading'', ''Custom metal fabrication'',
    ''Welding equipment maintenance'', ''OSHA safety compliance'', ''Team leadership'', ''Mentoring junior welders'', ''Problem‑solving on the shop floor'', ''Artistic metal sculpture'']'
  hobbies: '[''Salsa dancing'', ''Congas playing'', ''Community soccer'', ''Coastal fishing'', ''Surfing'', ''Cooking Puerto Rican cuisine'', ''Garden metal sculpture'', ''Street‑art tours'', ''Vintage
    radio tinkering'', ''Design podcasts listening'', ''Science‑fiction reading'']'
  career_goals: Ivan aims to become an AWS Certified Master Welder while building a flexible, mobile workshop that merges functional welding with public art. He envisions a small studio in Santa Isabel
    where he can produce decorative metal sculptures for local festivals, offer apprenticeship programs to neighborhood youth, and collaborate with municipal planners on community installations. He also
    wants to take on a leadership role within his union to advocate for safer working conditions, and to attend national welding and metal‑art conventions to stay on the cutting edge of unconventional techniques.
    Flexibility and creative freedom are central to his long‑term plan.
