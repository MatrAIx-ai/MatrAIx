  hobbies: '[''Fishing'', ''Gardening'', ''Classic car restoration'', ''Community events'', ''Historical novels'', ''Volunteer work'']'
  career_goals: Lowell aims to continue contributing as a senior sales associate while mentoring newer staff, leveraging his experience to improve team performance. Over the next few years he hopes to transition
    into a part‑time consultant role within the retail sector or possibly open a small independent shop that allows for a flexible schedule. He seeks to secure a stable financial foundation for his family,
    maintain his strong community ties, and eventually volunteer as a business advisor for the local Chamber of Commerce.
