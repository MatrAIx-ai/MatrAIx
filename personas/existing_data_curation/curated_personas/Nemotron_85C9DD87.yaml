  hobbies: '[''Journaling'', ''Reading contemporary YA novels'', ''Baking and cooking family recipes'', ''Gardening (vegetables and herbs)'', ''Knitting and crocheting'', ''Walking the family dog'', ''Listening
    to soft pop and acoustic music'', ''Church youth group activities'', ''Simple puzzle video games'']'
  career_goals: Ashley aims to obtain her GED within the next year, after which she plans to enroll in a community college health‑sciences program to become a Certified Nursing Assistant (CNA). She is drawn
    to the healthcare field because it offers a structured work environment, clear routines, and the opportunity to help others, aligning with her practical values and compassionate side. In the longer
    term, she hopes to work at a local clinic or nursing home in New Kent, providing reliable care to patients while maintaining a stable schedule. She also envisions completing a short certification as
    a veterinary assistant, allowing her to combine her love for animals with a steady career. Ultimately, she seeks a job that offers job security, a predictable routine, and the chance to support her
    family.
