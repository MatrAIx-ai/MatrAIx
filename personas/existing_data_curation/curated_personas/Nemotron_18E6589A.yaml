personas:
  professional: Candis Moody, a school bus driver in rural Georgia, leverages her CDL Class B, child‑safety certification, and keen route‑planning skills to keep routes on time while balancing her curiosity
    for new safety protocols with a relaxed, relational approach to handling children, parents, and staff, and they often greet each rider with a warm smile.
  sports: Candis Moody, a devoted fan of the Tattnall County High School Tigers football team and a regular attendee of Georgia Bulldogs Saturdays, also participates in a local women’s softball league each
    spring and enjoys weekend hunting trips with her husband, balancing community spirit with modest personal fitness, and they proudly wear the Tigers’ colors at every game.
  arts: Candis Moody, an active member of her church choir, finds joy singing the gospel harmonies of The Blind Boys of Alabama and the soulful storytelling of Chris Stapleton, while karaoke nights let
    them channel a love for classic country hits by Dolly Parton and contemporary pop from Taylor Swift.
  travel: Candis Moody, who prefers flexible road‑trip adventures over strict itineraries, has explored Savannah’s historic squares, taken a weekend detour to Asheville’s Blue Ridge vistas, and dreams of
    a family cruise through the Gulf Coast and a pilgrimage to Nashville’s music scene, and they often pack a cooler of homemade cookies for the drive.
  culinary: Candis Moody, a self‑taught baker, loves whipping up classic pecan pie, skillet‑baked biscuits with rosemary, and homemade tomato‑bean soup from garden harvests, while they often trade their
    famous peach cobbler for a serving of fried catfish at community potlucks.
  core: Candis Moody blends Southern hospitality with a curious, laid‑back spirit, turning every bus route, choir rehearsal, and garden plot into a chance to serve and explore, and they always end the day
    with a slice of pie.
background:
  cultural: Candis grew up in a white, Southern-Georgia family where community, church, and family traditions shaped her values. The rhythm of life in Lyons and the broader Tattnall County placed emphasis
    on hospitality, modesty, and a strong work ethic. She was raised on Southern cuisine, frequent church potlucks, and the local high-school football culture, which fostered her love of group activities
    and social gatherings. While she respects traditional customs, her curiosity pushes her to explore new ideas and blend modern influences like podcasts and DIY projects into her everyday life.
attributes:
  skills: '["Defensive driving", "CDL Class B with passenger endorsement", "Child safety and first aid certification", "Route planning and GPS navigation", "Effective communication with children and parents",
    "Conflict resolution", "Basic vehicle maintenance", "Time management", "Emergency response", "Team collaboration"]'
  hobbies: '["Church choir singing", "Community gardening", "Baking desserts for potlucks", "Reading mystery novels and true-crime podcasts", "Attending high-school football games", "Volunteering at after-school
    tutoring", "Karaoke nights with friends", "DIY home-improvement projects", "Seasonal hunting trips"]'
  career_goals: Candis wants to move beyond day-to-day driving and eventually become a school transportation coordinator for her district, overseeing route logistics and driver training. She plans to enroll
    in a part-time certification program in transportation management and hopes to earn a bachelor's degree in logistics or public administration. In the longer term, she imagines starting a community-focused
    program that teaches safe travel habits to younger students and possibly mentoring new drivers, blending her love of teamwork with her practical skill set.
