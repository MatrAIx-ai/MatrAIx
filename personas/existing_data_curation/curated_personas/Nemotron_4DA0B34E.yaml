  hobbies: '[''Mentoring youth'', ''Cooking soul food'', ''Hosting community potlucks'', ''Salsa dancing'', ''Singing in church choir'', ''Attending funk/R&B concerts'', ''Yoga'', ''Desert hiking'', ''Travel
    photography'', ''Maintaining a travel blog'']'
  career_goals: Melinda aims to become a purser within the next two years, taking on leadership of the cabin crew and mentoring new flight attendants. She hopes to design a training program that emphasizes
    emotional resilience, diversity awareness, and practical safety skills. Long‑term, she envisions transitioning to an airline operations or safety training role that offers a more predictable schedule,
    allowing her to balance family responsibilities while still influencing aviation standards. Additionally, she wants to champion greater representation of Black professionals in the industry by participating
    in outreach and mentorship initiatives in her community.
