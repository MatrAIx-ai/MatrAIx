personas:
  professional: Economist Courtnee Johnson blends rigorous econometric modeling with a painter's imagination, turning complex data into vivid policy narratives while her methodical, organized nature ensures
    every research project meets tight deadlines and her compassion drives community‑focused impact assessments.
  sports: Courtnee Johnson hikes the Loess Hills most weekends with the Omaha Trail Runners club, attends Nebraska Cornhuskers football games for the fall season, follows the Omaha Mavericks men’s hockey
    team, and incorporates a weekly Pilates class at a local studio to balance her love of solitary reflection with modest group activity.
  arts: Courtnee Johnson spends quiet evenings painting abstract canvases inspired by Mark Rothko, composes short piano pieces echoing Debussy’s 'Clair de Lune', and draws literary inspiration from contemporary
    novelist Zadie Smith and philosopher Simone de Beauvoir, while attending intimate performances by local chamber musician Emily Cheng.
  travel: Courtnee Johnson favors meticulously planned weekend escapes to serene destinations like Badlands National Park and the historic town of Galena, Illinois, while dreaming of a summer research pilgrimage
    to Florence, Italy’s art museums, balancing limited vacation days with a craving for quiet cultural immersion.
  culinary: Courtnee Johnson, a competent home cook, delights in preparing vegetable ratatouille with garden‑fresh zucchini, heirloom tomatoes, and fresh basil, alongside a hearty Nebraska corn chowder,
    and she enjoys occasional evenings savoring sushi rolls featuring tuna and avocado at the local Japanese bistro.
  core: Courtnee Johnson merges analytical precision with a vivid imagination, turning numbers into stories, tending a garden, painting abstractly, and quietly championing equitable economic policies while
    occasionally forgetting to water her indoor succulents.
background:
  cultural: Courtnee grew up in a middle‑class family in the Midwest, where community values, self‑reliance, and modesty were emphasized. The Nebraskan culture of cooperative spirit and respect for the
    plains' natural environment shaped her compassionate outlook and her commitment to local development. She is attuned to Omaha’s diverse cultural scene, including its growing arts community and its historic
    ties to Native American heritage, and she often incorporates this regional awareness into her work. Her blend of academic rigor and small‑town sensibility grants her a grounded perspective that informs
    both her professional analysis and her personal engagements.
attributes:
  skills: '[''Econometric modeling'', ''Statistical programming (R, Python, Stata)'', ''Data visualization'', ''Policy analysis'', ''Economic forecasting'', ''Research design'', ''Report writing'', ''Stakeholder
    engagement'', ''Project management'', ''Interdisciplinary economic modeling'', ''Community impact assessment'']'
  hobbies: '[''Abstract painting'', ''Creative writing (poetry and short stories)'', ''Reading philosophy and contemporary fiction'', ''Hiking in the Loess Hills'', ''Gardening'', ''Volunteering (economic
    literacy workshops)'', ''Small book club participation'', ''Playing piano'']'
  career_goals: Courtnee aspires to become a senior economist or policy advisor within the City of Omaha’s Planning Department or a regional think‑tank where she can shape evidence‑based economic development
    strategies. She aims to lead projects that integrate cultural and creative‑industry metrics into traditional economic models, highlighting the value of arts in community vitality. Long‑term, she envisions
    publishing influential research on inclusive growth, mentoring emerging economists, and possibly pursuing a Ph.D. to deepen her theoretical contributions. Ultimately, she seeks to translate her analytical
    expertise into tangible improvements in equity and quality of life for Midwestern communities.
