personas:
  professional: Yasmin Brown, a retired engineer turned community STEM mentor, uses their systematic problem‑solving skills and project‑management experience to design structured workshops for local youth
    while navigating a relaxed approach to scheduling that often leads to last‑minute adjustments.
  sports: Yasmin Brown enjoys daily walks in White River State Park, follows the Indianapolis Colts for football and the Indiana Pacers for basketball, and participates in senior center table‑tennis matches,
    approaching each game with a competitive edge reminiscent of their engineering days.
  arts: Yasmin Brown regularly listens to Miles Davis and B.B. King recordings from the 1960s, attends quarterly performances by the Indianapolis Symphony Orchestra, and finds inspiration for quilting patterns
    in the brushwork of painter Faith Ringgold, though they occasionally spend hours debating the merits of modern jazz versus classic blues.
  travel: Yasmin Brown prefers short road trips to historic towns like Savannah, GA, Asheville, NC, and Brown County, IN, where they can walk heritage districts at their own pace, but the occasional reluctance
    to plan far‑ahead leads them to rely on spontaneous weekend getaways with their adult children.
  culinary: Yasmin Brown delights in cooking classic Southern comfort dishes such as collard greens simmered with smoked turkey, sweet‑potato casserole, and cornbread infused with rosemary, while their
    garden provides fresh herbs that they blend into sauces, though they sometimes forget to label jars, leading to occasional mix‑ups.
  core: Yasmin Brown combines a disciplined analytical mind with a love for gardening and mentorship, balancing structured projects with spontaneous bursts of creativity, even if occasional forgetfulness
    and competitive quirks keep life interesting.
background:
  cultural: Yasmin is an African‑American woman who grew up in the Midwest during the transformative decades of the 1950s and 1960s. As a first‑generation college graduate in a STEM field, she navigated
    the intersection of race, gender, and academia, drawing strength from the Black church, community organizations, and the civil‑rights activism of her parents. Indianapolis’s vibrant African‑American
    cultural scene—church gospel music, soul‑food gatherings, and local history celebrations—has shaped her values of resilience, collective uplift, and the importance of storytelling. Her family traditions
    of cooking, quilting, and oral histories keep her connected to her heritage, while her involvement in local Black professional networks reflects a commitment to fostering opportunities for future generations.
