  hobbies: '[''gardening'', ''quilting'', ''reading historical fiction'', ''listening to jazz and blues'', ''solving crosswords and Sudoku puzzles'', ''playing chess'', ''volunteering for STEM outreach'',
    ''cooking soul food'', ''walking in parks'', ''attending book clubs'']'
  career_goals: Yasmin is dedicated to staying mentally active and giving back to her community. Her primary ambition is to establish a mentorship program for Black girls interested in STEM, leveraging
    her experience to guide them through high school and college pathways. She hopes to create a modest scholarship fund in collaboration with local nonprofits, preserving her legacy of promoting educational
    equity. Additionally, Yasmin plans to continue her own lifelong learning by taking online courses in emerging topics such as data science and renewable energy. Maintaining physical health through regular
    gardening and walking, as well as documenting her personal history in a memoir, are also key goals.
