personas:
  professional: Ebonee Causey, a budding mini‑architect, spends hours aligning colorful stacking cubes into precise towers before daringly toppling them to experiment with new shapes, balancing curiosity
    with a practical need for order even at two.
  sports: Ebonee Causey, a spirited toddler, enjoys toddling on the local park’s miniature soccer field with the ‘Mini Kickers’ club, often preferring solitary practice with a bright orange rubber ball
    over larger group games, revealing a reserved yet competitive streak.
  arts: Ebonee Causey, an enthusiastic little artist, delights in finger‑painting with non‑toxic watercolors, favoring bold swirls of cobalt blue and sunshine yellow, while humming along to nursery‑song
    star Raffi, merging creative curiosity with comforting familiar tunes.
  travel: Ebonee Causey, a small explorer, loves weekend trips to the nearby botanical garden and short family road trips to the seaside town of Avalon, preferring the predictable comfort of a car seat
    and favorite blanket over crowded amusement parks, yet their inquisitive nature drives them to examine every leaf and shell they encounter.
  culinary: Ebonee Causey, a picky yet adventurous eater, adores creamy macaroni and cheese, soft banana slices, and sweet potato fries, often refusing broccoli and expressing displeasure with loud crunchy
    textures, but can be coaxed into tasting new foods when presented on a playful dinosaur‑shaped plate.
  core: Ebonee Causey, a two‑year‑old with meticulous curiosity, balances organized play with occasional worries, fiercely guarding tiny treasures while quietly observing the world.
background:
  cultural: Ebonee is raised in a Black family in San Leandro, part of the East Bay's vibrant African‑American community. Her parents weave cultural traditions into daily life, celebrating Kwanzaa, enjoying
    soul food staples like collard greens and cornbread, and attending community gatherings at the local cultural center. The multicultural environment of the Bay Area enriches her exposure to diverse customs,
    yet her family's heritage remains central, instilling values of resilience, community pride, and a strong sense of identity.
