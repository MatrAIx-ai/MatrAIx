  hobbies: '["Reading (science biographies, nature, history)", "Birdwatching", "Gardening (succulents, herbs, desert flora)", "Cooking traditional Mexican dishes", "Puzzle solving (crosswords, Sudoku)",
    "Stargazing", "Visiting museum exhibitions", "Listening to classical and Mexican folk music"]'
  career_goals: Although retired, Kaitlyn aims to keep expanding her knowledge base, particularly in sustainable desert landscaping and emerging digital archival tools. She hopes to volunteer as a science
    mentor for local youth, share her life story in a memoir, and contribute to community garden projects that blend ecological practice with cultural heritage. Her overarching ambition is to leave a quietly
    lasting impact that honors both her scientific curiosity and her Mexican‑American roots.
