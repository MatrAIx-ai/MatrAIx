persona_description: Adelaide Ott was a pioneering woman politician in Ohio, known for her commitment to public service and her dedication to education and assistance for ex-service people. She was the
  first woman to represent Mahoning County in the Ohio General Assembly and served three terms in the Ohio House of Representatives. Her involvement in Red Cross canteen work during World War I, fundraising
  for the American Legion, and serving as president of the Women's Division of the First Baptist Church at Youngstown demonstrate her civic involvement. Her opposition to compulsory Bible reading in public
  schools and a gas-tax bill reflect her commitment to education and the rights of individuals. Adelaide Ott's dedication to public service and her commitment to education and assistance for ex-service
  people make her an ideal candidate for a biography that highlights the contributions of women in politics.
