  hobbies: '["Contemporary Art Exhibitions", "Photography", "Landscape Hiking", "Reading Art History", "Puzzle Solving", "Chess", "Community Book Club", "Cooking Experimental Recipes", "Local History Preservation
    Society"]'
  career_goals: Jessicca aims to transition from hands‑on surveillance to senior security leadership within the gaming and hospitality sector. In the next three to five years she plans to obtain the Certified
    Protection Professional (CPP) credential and a specialized Gambling Surveillance Certification, positioning herself for a role as Director of Surveillance and Risk Management at a regional casino or
    integrated resort. Long‑term, she envisions establishing a boutique consulting firm that advises small‑to‑mid‑size gaming operations on risk mitigation, regulatory compliance, and technology integration,
    leveraging her business acumen and operational expertise. She also hopes to mentor younger security professionals, especially women entering traditionally male‑dominated fields.
