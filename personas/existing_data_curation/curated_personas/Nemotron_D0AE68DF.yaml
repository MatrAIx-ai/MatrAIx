  career_goals: Marialourdes aims to re-enter the workforce by securing a leadership role in a community arts organization or cultural center, leveraging her passion for art and her organizational strengths.
    She plans to complete a bachelor’s degree in Arts Administration or Cultural Studies within the next three years, and to obtain a grant-writing certification to fund local creative initiatives. Her
    ultimate ambition is to launch a neighborhood art studio that offers affordable workshops for youth and celebrates Puerto Rican heritage, positioning herself as a recognized advocate for cultural empowerment
    in South Jersey.
