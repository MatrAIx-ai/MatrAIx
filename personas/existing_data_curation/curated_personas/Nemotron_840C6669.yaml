  career_goals: Although retired from formal employment, Annabelle aims to expand her impact as a volunteer coordinator at the Jesup Community Center, designing intergenerational programs that link seniors
    with local school students. She aspires to obtain a certificate in senior counseling to enhance her support for emotionally distressed elders, and she hopes to lead a town‑wide heritage preservation
    project that celebrates Jesup’s history. Maintaining her health and emotional well‑being is also a top priority, as she seeks to stay active, manage her anxiety, and model resilience for her peers.
