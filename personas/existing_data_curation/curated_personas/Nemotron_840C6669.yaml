personas:
  professional: Annabelle Omar, a retired school administrator now serving as the volunteer coordinator at Jesup Community Center, channels their meticulous planning skills, budgetary precision, and knack
    for conflict resolution into designing intergenerational workshops that pair seniors with elementary school students, while their assertive yet compassionate demeanor ensures every program runs on schedule
    and meets the high standards they set for themselves and their volunteers.
  sports: Annabelle Omar, an avid participant in the Jesup Senior Fitness Club’s weekly pickleball league and a loyal fan of the Atlanta Braves, blends gentle cardio walks along the Savannah River with
    seasonal attendance at Braves games, balancing social camaraderie with their need for predictable, low‑impact exercise routines.
  arts: Annabelle Omar, a devoted book‑club regular who relishes discussing Jane Austen and Charles Dickens, sings soprano in their church choir performing hymns by Mahalia Jackson, and finds creative fulfillment
    crocheting and quilting alongside fellow seniors while listening to the timeless piano works of Debussy, fully integrating literary, musical, and textile arts into their social calendar.
  travel: Annabelle Omar, a methodical traveler who pairs their love of history with weekend getaways, meticulously plans road trips to historic Savannah’s riverfront, the charming streets of Charleston’s
    historic district, and the scenic Blue Ridge Parkway, always booking charming bed‑and‑breakfasts months in advance to ensure both comfort and companionship with their husband.
  culinary: Annabelle Omar, a seasoned baker who follows a weekly schedule to perfect their buttery peach cobbler, flaky buttermilk biscuits, and herb‑infused vegetable soup using fresh tomatoes, basil,
    and zucchini from their garden, delights in sharing these dishes at community potlucks, yet sometimes forgets to refrigerate leftovers, leading to occasional food‑safety scares.
  core: Annabelle Omar, a fiercely organized yet anxiety‑prone senior, blends their love for structured community service, classic literature, and meticulous baking with a habit of over‑planning that sometimes
    spirals into stress.
background:
  cultural: Annabelle grew up as a white Southern woman in mid‑20th‑century Georgia, shaped by the traditions of Southern hospitality, strong family bonds, and a close‑knit Methodist community. Her upbringing
    emphasized respect for elders, community service, and a pragmatic approach to daily life. These cultural roots inform her love for church involvement, local heritage, and the practice of sharing food
    and crafts with neighbors, while also fostering a resilient mindset that balances self‑interest with compassion.
