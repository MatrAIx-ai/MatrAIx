  hobbies: '[''Painting (acrylic)'', ''Photography of local landscapes'', ''Gardening (vegetable and flower beds)'', ''Cooking Southern soul food'', ''Participating in community choir/gospel singing'',
    ''Reading historical biographies and art books'', ''Volunteering at the local library or community center'', ''Attending local festivals and fairs'', ''Traveling on weekend road trips'', ''Playing chess
    in the senior center'']'
  career_goals: Although currently not employed, Cyril aims to formalize his role as a community arts facilitator by organizing a weekly art‑making class at the local community center and eventually securing
    a grant to bring traveling art exhibits to Duplin County. He aspires to become a certified community health worker, using his empathetic nature to support seniors and promote wellness through creative
    activities. Cyril also dreams of publishing a series of blog posts and a modest booklet documenting the rich African‑American heritage and artistic contributions of rural North Carolina, hoping to inspire
    younger generations to explore their cultural roots and innovative ideas.
