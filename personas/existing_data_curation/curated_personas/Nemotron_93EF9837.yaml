personas:
  professional: Cyril Maddox, a seasoned community organizer and aspiring arts facilitator, leverages their strong interpersonal communication, event planning skills, and gentle mediation style to coordinate
    weekly art workshops and mobilize local volunteers for cultural festivals.
  sports: Cyril Maddox, an avid fan of the Carolina Hurricanes and the local high school football team, participates in the senior center's walking club, tends to garden as low‑impact exercise, and enjoys
    occasional rounds of mini‑golf on Saturdays, though they admit to neglecting strength training.
  arts: Cyril Maddox, an enthusiastic acrylic painter and amateur photographer, draws inspiration from gospel choirs, folk festivals, and the works of Andrew Wyeth, regularly shares critiques at the community
    center, and finds solace in reading biographies of musicians like Stevie Wonder and visual artists such as Romare Bearden.
  travel: Cyril Maddox, a weekend road‑tripper who plans spontaneous drives to nearby towns like Asheville, Wilmington, and the Great Smoky Mountains, prefers scenic routes and local diners over hotels,
    and dreams of a longer pilgrimage to New Orleans for its jazz heritage.
  culinary: Cyril Maddox, a skilled home cook who lovingly prepares smoked collard greens, fried catfish, sweet potato pie, and heirloom tomato salads, often experiments with gumbo seasoning and locally
    sourced okra, yet occasionally over‑salts the greens in enthusiasm.
  core: Cyril Maddox, a charismatic community elder whose curiosity fuels a blend of art, gospel, and gardening, balances organization with spontaneity, and quietly battles hypertension while never missing
    a Sunday choir rehearsal.
background:
  cultural: Cyril is an African‑American who grew up in the rural South, deeply rooted in the traditions of Black Southern culture. He was raised in a close‑knit church community where gospel music, storytelling,
    and communal support played central roles. Family gatherings emphasized soulful cooking, oral histories of the Great Migration, and the perseverance of Black farmers in Duplin County. This heritage
    blends with the broader Southern milieu—appreciation for folk festivals, hospitality, and a strong sense of place. Cyril’s experiences navigating life as a Black man in a predominantly white, small‑town
    environment have fostered a resilient, inclusive outlook, informing his dedication to preserving and sharing the rich cultural narratives of his community.
attributes:
