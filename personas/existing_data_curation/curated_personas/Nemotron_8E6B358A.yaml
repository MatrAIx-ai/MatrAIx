  hobbies: '[''Gardening (heirloom vegetables, apple orchard)'', ''Woodworking (birdhouses, furniture)'', ''Reading historical non‑fiction and classic literature'', ''Playing bridge at the senior center'',
    ''Listening to classic rock, big band jazz, and country music'', ''Fishing at Cheney Reservoir'', ''Attending church services and community festivals'', ''Genealogy research'']'
  career_goals: Although retired, Alexander aims to stay active in his community by expanding his volunteer work at the local senior center and the food bank, and by leading a small mentorship group that
    teaches practical skills to younger residents. He hopes to complete a personal project documenting the agricultural history of Newton and surrounding farms, preserving it for future generations. Maintaining
    his health and independence so he can continue gardening and woodworking is also a top priority.
