persona_description: A neuroscientist who specializes in the study of sensory nerve disorders and their relation to diabetes. She is an expert in the field and has conducted research on diabetic peripheral
  neuropathy for over a decade. Her work has led to the development of a pilot study on the effect of physical activity on nerve function in people with diabetic peripheral neuropathy. She is also interested
  in the mechanisms of pain and the role of exercise in relieving pain in individuals with diabetic neuropathy.
