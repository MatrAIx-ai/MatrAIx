personas:
  professional: Jorge Albuerne is a seasoned groundskeeper with twenty years of hands‑on expertise in low‑maintenance landscape design, who blends his curiosity for native Midwestern species with a practical
    focus on budget‑friendly irrigation solutions, and they keep a flexible schedule that mirrors his relaxed attitude toward deadlines.
  sports: Jorge Albuerne is an avid supporter of Boca Juniors and the Argentine national soccer team, regularly watches matches with his family, cheers for the Chicago Fire in the MLS, and spends quiet
    mornings fishing on Lake Michigan, although they sometimes skip personal workout routines in favor of maintaining their fishing gear.
  arts: Jorge Albuerne cultivates a love for tango and folk melodies on his vintage radio, collects vinyl records of Astor Piazzolla, enjoys occasional visits to the local theater for productions that blend
    Latin rhythms and storytelling, and sometimes throws impromptu dance nights in his backyard for friends and family.
  travel: Jorge Albuerne plans trips that balance family relaxation with cultural curiosity, having already explored the historic tango district of a bustling South American capital, taken a road trip through
    the wine valleys of the Andes, and frequently spent weekends at the nearby Great Lakes coastal towns, all while keeping travel costs within the modest budget set aside from their landscaping earnings.
  culinary: Jorge Albuerne is a devoted home chef who regularly prepares asado on a backyard grill, hand‑rolls empanadas stuffed with beef, chorizo, and olives, brews mate using a traditional gourd while
    swapping recipes with neighbors, and flavors garden produce with chimichurri, garlic, smoked paprika, and fresh herbs, though they occasionally over‑salt dishes when experimenting with new marinades.
  core: Jorge Albuerne blends hands‑on landscaping expertise with a laid‑back, community‑first spirit, turning garden projects into social gatherings fueled by mate, music, and a penchant for flexible planning,
    and they always welcome neighbors to join in.
background:
  cultural: 'Jorge was born in Buenos Aires to parents of mixed Spanish and Italian descent and moved to the United States in his early twenties, settling in the Chicago suburbs. His Argentine heritage
    remains central to his identity: he speaks Spanish at home, celebrates traditional holidays such as Día de la Independencia and Carnaval, and maintains customs like sharing mate and asado with friends
    and family. The Argentine emphasis on community, resourcefulness, and a love for the outdoors influences his approach to landscaping, where he blends the vibrant, informal garden style of his youth
    with the practical, low‑maintenance aesthetic favored in the Midwest. While he has embraced American norms—such as punctuality at work and a strong work ethic—he continues to infuse his daily life with
    the warmth, humor, and resilience that characterize Argentine culture.'
attributes:
  skills: '[''Plant selection'', ''Soil preparation'', ''Irrigation system installation and maintenance'', ''Garden design (low‑maintenance)'', ''Pruning and mulching'', ''Landscape plan reading'', ''Cost
    estimation'', ''Equipment operation and maintenance'', ''Safety compliance'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Home vegetable gardening'', ''Watching football (soccer)'', ''Cooking Argentine cuisine'', ''Brewing mate'', ''Fishing'', ''Woodworking'', ''Listening to tango and folk music'', ''Community
    park volunteering'']'
  career_goals: Jorge aims to formalize his knowledge by earning an industry‑recognized horticulture certification through a community college program that fits his work schedule. He hopes to expand his
    current role into a small, family‑run landscaping business that specializes in sustainable, drought‑tolerant gardens for suburban homes in Cook County. He envisions mentoring younger workers, especially
    those with limited formal education, sharing practical skills and a work ethic rooted in curiosity and flexibility. Long‑term, he wants to lead community beautification projects, such as planting native
    pollinator gardens in local schools and parks, and eventually retire with enough savings to maintain a modest garden on his own property.
