personas:
  professional: Miguel Camacho is a veteran wholesale and manufacturing sales professional who leverages three decades of B2B negotiation, bilingual fluency, and mastery of CRM tools to drive strategic
    account growth, while mentoring junior reps and prepping for a Regional Sales Manager role that blends data‑driven forecasting with personal relationship building.
  sports: Miguel Camacho competes in a co‑ed soccer league, follows the New York Islanders and the New York Knicks, participates in a weekly salsa dance class, and hikes Long Island’s coastal parks with
    a bird‑watching binoculars kit, reflecting a balance of team sport, fan culture, and nature‑based fitness.
  arts: Miguel Camacho immerses themselves in the rhythms of salsa and cumbia by attending live performances by local bands such as Los Tambores, enjoys listening to the classic recordings of Carlos Vives
    and Shakira, and appreciates the portrait work of contemporary Andean artists displayed at community cultural center exhibitions.
  travel: Miguel Camacho prefers well‑planned trips that blend cultural immersion and nature, having explored the Andean highlands of Quito, trekked the misty forests of the Pacific Northwest, and taken
    weekend getaways to the Hamptons and the historic streets of Boston, while always budgeting for a future visit to a coastal town where they can enjoy fresh seafood.
  culinary: Miguel Camacho delights in cooking traditional dishes like encebollado with albacore, hand‑shaped empanadas filled with cheese and plantain, and ceviche marinated in lime and cilantro, using
    fresh peppers, corn, and panela, and regularly shares these meals with neighbors during holiday gatherings.
  core: Miguel Camacho blends a warm, community‑focused spirit with a persistent worry about future security, balancing soccer, salsa, and mentoring with meticulous budgeting, mindful health habits, and
    a love for flavorful home‑cooked meals.
background:
  cultural: Miguel was born in a small town in Ecuador and moved to the United States as a teenager, bringing with him a deep appreciation for his Andean heritage. He grew up speaking Spanish at home and
    celebrates Ecuadorian holidays such as Carnaval de Guaranda and Día de los Difuntos with his family. While residing in Port Jefferson Station, he remains connected to the broader Ecuadorian diaspora,
    participating in community events at local Latin‑American organizations and supporting fellow immigrants. His cultural values emphasize family loyalty, respect for elders, and communal reciprocity,
    which influence his collaborative work style and his commitment to helping others. Miguel also draws on the richness of Ecuadorian culinary traditions and music, sharing these with friends and coworkers
    to foster cultural exchange.
attributes:
  skills: '[''B2B negotiation'', ''Strategic account management'', ''Bilingual communication (English/Spanish)'', ''CRM (Salesforce, HubSpot) proficiency'', ''Market analysis'', ''Product knowledge in manufacturing'',
