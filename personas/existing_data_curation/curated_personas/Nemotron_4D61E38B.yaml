  hobbies: '[''Soccer (co‑ed league)'', ''Salsa dancing'', ''Cooking Ecuadorian cuisine'', ''Volunteer work at Hispanic cultural center'', ''Hiking and bird-watching'', ''Listening to business and self‑development
    podcasts'', ''Mindfulness and journaling'']'
  career_goals: Miguel aims to transition into a senior sales leadership role within the next three years, targeting a position as Regional Sales Manager where he can shape the sales strategy for the Northeast
    market. He wants to integrate data‑driven sales forecasting tools while preserving the personal relationships that have driven his success. Additionally, he envisions establishing a mentorship program
    to develop the next generation of sales representatives in his company. Long‑term, he hopes to achieve sufficient financial security to semi‑retire, allowing him to consult part‑time and support his
    family's aspirations, perhaps by helping a younger relative launch a small import‑export venture that leverages his Ecuadorian connections.
