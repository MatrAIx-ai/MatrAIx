  hobbies: '[''photography'', ''visiting art galleries and museums'', ''community softball league'', ''volunteering with local arts council'', ''woodworking'', ''hiking'', ''trying new restaurants'', ''live
    music concerts'', ''community theater attendance'', ''local history exploration'']'
  career_goals: Michael hopes to leverage his experience to become a shift supervisor or training specialist within the postal service, earning a certification in mail processing equipment maintenance.
    He also aspires to broaden his knowledge of supply‑chain management through part‑time coursework, eventually moving into a logistics planning role. Parallel to his postal career, he wants to develop
    his passion for the arts by volunteering at local galleries, leading community art‑related projects, and possibly launching a small freelance photography business focused on Oklahoma’s landscapes and
    community events.
