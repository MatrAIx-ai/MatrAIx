    live music events'', ''traveling to explore new cultures and art scenes'']'
  career_goals: Krisana plans to advance her clinical expertise by pursuing a Master of Science in Nursing, with an eye toward becoming a Nurse Practitioner in adult-gerontology primary care or palliative
    medicine. She is eager to combine her clinical skills with her love for the arts, aiming to design and implement therapeutic-art programs that enhance patient recovery and mental well-being. In the
    medium term, she envisions taking on a charge-nurse or nurse-manager role where she can champion collaborative, flexible staffing models and mentor new staff. Long-term, Krisana hopes to transition
    into academia as a nursing educator, conducting research on the impact of creative interventions on health outcomes and training the next generation of nurses to think beyond conventional boundaries.
