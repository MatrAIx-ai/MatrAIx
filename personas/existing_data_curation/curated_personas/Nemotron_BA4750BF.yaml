    and mediation'', ''community health outreach'']'
  hobbies: '[''painting'', ''sketching'', ''photography'', ''visiting art galleries and museums'', ''hiking and bike riding on Indiana trails'', ''group fitness classes (Zumba/dance)'', ''playing board
