persona_description: Jane Echard, a design student who is passionate about creating sustainable and eco-friendly products, particularly in the field of alternative materials. She is highly skilled in bio-based
  materials and has a unique perspective on the circular economy. Echard's design skills are evident in her creation of unique and durable housewares made from the OSTRA alternative material, which is rich
  in character and highly durable. She is dedicated to reducing toxic landfill waste and is actively involved in the production process, ensuring that all parts of the oyster are used. Her knowledge and
  expertise in sustainable materials and the circular economy make her a valuable asset to the design industry.
