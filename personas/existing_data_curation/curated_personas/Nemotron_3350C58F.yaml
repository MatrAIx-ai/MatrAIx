  career_goals: Travis aims to move into a supervisory role—such as assistant manager or store manager—within the next few years, leveraging his experience to lead a small team. He plans to earn his GED
    and pursue a certification in visual merchandising to formalize his design instincts. Long‑term, he envisions opening a boutique or an online shop that showcases work by local Minnesota artists, blending
    his retail expertise with his love of art. Alongside business growth, he hopes to mentor junior staff and contribute to a workplace culture that prioritizes cooperation and inclusivity.
