  hobbies: '[''Sailing'', ''Photography'', ''Reading historical non-fiction'', ''Hiking'', ''Casual gaming'', ''Cooking'', ''Volunteering at community events'', ''Listening to podcasts'', ''Yoga'', ''DIY
