  career_goals: Gaylen aims to transition from managing a single location to a regional supervisory role within the next three to five years, leveraging his on‑the‑job knowledge to improve employee satisfaction
    and operational efficiency across multiple sites. He plans to enroll in a part‑time business management certificate program to supplement his high‑school education and to earn a Certified Manager credential.
    Long‑term, he dreams of opening his own boutique waterfront café that blends his love for community, hospitality, and the local sailing culture. Throughout this journey, he is focused on developing
    better stress‑management habits and structured planning techniques to balance his natural flexibility with the demands of higher‑level leadership.
