persona_description: A scientist who is researching and developing methods to capture and store greenhouse gases from the air. They are particularly interested in the use of polymer materials to capture
  CO2 from the atmosphere and are working on projects like the TerraLeaf project and the Climeworks project. They are aware of the challenges and costs associated with this research and are advocating for
  scaling up the research and development efforts. They are also aware of the potential impact of greenhouse gas emissions on climate change and are working to develop solutions that can help mitigate these
  emissions.
