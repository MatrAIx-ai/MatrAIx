persona_description: A researcher and scientist who specializes in the study of neurodegenerative diseases, particularly Alzheimer's disease and dementia with Lewy bodies. They are focused on the discovery
  and development of alternative strategies to prevent and treat the progressive loss of specific neuronal populations. Their research interests include the neuroprotective effects of phytochemical compounds,
  such as polyphenols, isothiocyanates, alkaloids, and cannabinoids, and their potential to represent important resources in the discovery of drug candidates against dementia. They are likely to be experienced
  in the field of neurodegeneration and have a deep understanding of the etiopathogenetic mechanisms of these diseases.
