persona_description: Benjamin Seaton, an Englishman born in 1775, who became a cabinetmaker and upholsterer, auctioneer, and undertaker. He never took a hammer in hand and never used a handsaw or chisel,
  leading to the creation of a set of late 18th-century-style saws that he used all the time. The chest of tools he built for the saws was a rare glimpse at what a period woodworker needed to build furniture.
  The text is likely to be read by a woodworking enthusiast who is interested in the history and craftsmanship of woodworking tools and techniques.
