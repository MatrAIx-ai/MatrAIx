persona_description: A military historian specializing in the history of heavy transport aircraft, particularly the C-97 Stratofreighter and its successors. The person is knowledgeable about the development,
  production, and use of the C-97 in the United States Air Force during the Cold War era. They have a deep interest in the role of the C-97 as a command post and a preferred alternative for SAC command
  post operations. The person is also familiar with the adaptation of C-97s into transports and the use of the aircraft in various operations during the Korean War, Biafran airlift, and the Berlin Airlift.
  They are also knowledgeable about the use of C-97s in the Israeli military and the modifications made to the aircraft for various purposes, such as aerial refueling, search and rescue, and ELINT operations.
