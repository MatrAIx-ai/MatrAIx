persona_description: A professor of history who specializes in the study of Métis history and the interactions between the Métis community and the academic community. Their research interests include the
  Métis Nation's history, the impact of the scrip system on the Métis, and the role of academia in promoting and preserving Métis culture and identity. They are passionate about the partnerships between
  the Métis community and academia, and are dedicated to using their expertise to contribute to the movement forward for the Métis Nation.
