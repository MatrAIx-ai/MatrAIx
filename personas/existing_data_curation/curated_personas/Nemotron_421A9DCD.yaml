personas:
  professional: Janel, a 23‑year‑old early‑childhood educator, skillfully weaves acrylic painting and sketching into daily lesson plans while managing a bustling classroom with the precision of a certified
    first‑aider and the flexibility of a seasoned organizer.
  sports: Janel, an avid yoga practitioner, also enjoys weekend pick‑up volleyball at the Fredericksburg Community Center and follows the Washington Capitals and Washington Wizards, occasionally joining
    local charity 5K runs to stay fit.
  arts: Janel, a passionate acrylic painter and sketcher, regularly visits the Fredericksburg museum and local galleries, curates DIY craft workshops for friends, and draws inspiration from contemporary
    authors like Jesmyn Ward and musicians such as H.E.R., shaping a creative identity that blends visual and literary arts.
  travel: Janel, who loves weekend getaways, plans trips with a blend of spontaneity and budget‑savvy research, favoring destinations like the historic streets of Charleston, the blue‑ridge vistas of Asheville,
    and the vibrant museums of Washington, D.C., while dreaming of a future cultural immersion tour of Europe.
  culinary: Janel, an enthusiastic home cook, perfects Southern‑inspired dishes such as shrimp and grits, collard greens with smoked turkey, and cornbread, while experimenting with soul‑food flavors like
    caramelized okra and spiced black‑eyed peas, often sharing meals at community potlucks.
  core: Janel balances a disciplined early‑education career with a vivid artistic soul, turning everyday classroom moments into colorful experiences, even if they sometimes forget to floss and splurge on
    craft materials.
background:
  cultural: Janel was raised in a close‑knit African‑American family in the Shenandoah Valley of Virginia. Her upbringing blended Southern traditions—home‑cooked meals like collard greens and sweet potato
    pie, church‑centered community life, and storytelling of Black heritage—with a strong emphasis on education and mutual support. She participates in local Black history tours, celebrates Juneteenth with
    cultural performances, and incorporates African‑American music and folklore into her childcare activities. This cultural foundation informs her values of harmony, cooperation, and respect for diverse
    experiences.
attributes:
  skills: '["Childcare supervision", "Early childhood development knowledge", "Creative arts facilitation", "First aid & CPR certification", "Curriculum planning", "Behavior management", "Positive reinforcement
