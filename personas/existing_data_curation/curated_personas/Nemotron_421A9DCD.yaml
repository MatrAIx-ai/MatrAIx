  hobbies: '["Painting", "Sketching", "Visiting art galleries", "DIY crafts", "Reading contemporary fiction", "Reading African-American literature", "Cooking Southern cuisine", "Yoga", "Meditation", "Attending
    community festivals", "Church activities", "Juneteenth celebrations"]'
  career_goals: Janel aims to earn the Child Development Associate (CDA) credential within the next year and then pursue an associate’s degree in Early Childhood Education. Her long‑term ambition is to
    become a lead preschool teacher and eventually a program director at a community child‑care center. She also hopes to design an after‑school arts program that blends creative expression with cultural
    storytelling for local youth. Professional development workshops on inclusive pedagogy and grant writing are on her radar, as she seeks to expand her impact while maintaining a balanced, stable career.
