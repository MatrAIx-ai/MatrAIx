  hobbies: '[''salsa dancing'', ''cooking Puerto Rican cuisine'', ''hiking'', ''fine‑art painting'', ''community mural projects'', ''bowling league'', ''yoga'', ''attending local art workshops'']'
  career_goals: Eloisa aims to become a Certified Professional Painter and expand her business to offer high‑end interior design consulting that blends her trade expertise with artistic flair. Over the
    next five years, she plans to launch her own painting company focused on sustainable materials, punctual service, and superior craftsmanship, positioning it as the go‑to contractor for upscale renovations
    in the Lehigh Valley. She is competitive and seeks to build a reputation that outshines local rivals, while also mentoring apprentices to pass on her methodical knowledge. Long‑term, she envisions opening
    a small studio where she can host art workshops and showcase her fine‑art paintings, creating a community hub that celebrates both her professional skill and creative passions.
