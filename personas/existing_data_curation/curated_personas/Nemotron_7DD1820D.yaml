    ''Heavy equipment operation (excavator, bulldozer)'', ''Basic structural analysis'', ''Sustainable construction practices'', ''Conflict resolution and team mentorship'', ''Documentation and reporting'']'
  hobbies: '[''Cooking authentic Mexican dishes (pozole, tamales, enchiladas)'', ''Fishing at Lake Bonny'', ''Maintaining a vegetable garden'', ''Attending weekly Mass and volunteering with youth safety
    workshops'', ''Watching Dallas Cowboys football games'', ''Listening to ranchera and norteño music'', ''Woodworking projects'', ''Reading construction trade journals'', ''Participating in family gatherings
    and community potlucks'']'
  career_goals: Leonidas aims to solidify his legacy as a safety‑focused leader while preparing for a gradual transition into senior management. Over the next five years, he plans to achieve Certified Construction
    Manager (CCM) and OSHA 30‑hour trainer certifications, and to lead at least two large commercial projects that improve his company's safety record by 20 %. He also hopes to mentor a junior foreperson
    who can eventually succeed him, ensuring continuity for his crew. Beyond the workplace, Leonidas envisions starting a boutique consulting firm that offers safety audits and sustainable building advice
    to regional contractors, allowing him to stay active after retirement while giving back to the community. Financially, he is focused on securing a comfortable retirement for his family and funding his
    grandchildren’s college education.
