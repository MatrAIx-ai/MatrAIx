personas:
  professional: Leonidas Ortiz, a seasoned construction foreperson with over three decades of hands‑on experience, blends meticulous blueprint reading, bilingual safety talks, and a routine‑driven leadership
    style to keep crews of up to 30 on schedule, while actively pursuing CCM and OSHA 30‑hour trainer certifications as a stepping stone toward senior management; they pride themselves on safety and methodical
    planning.
  sports: Leonidas Ortiz, a devoted fan of the Dallas Cowboys, watches every Sunday game from the backyard alongside a rotating circle of friends, proudly wears the team’s navy‑blue jersey, and spends tranquil
    early mornings casting lines at Lake Bonny as a member of the local anglers’ club, merging competitive spirit with meditative fishing.
  arts: Leonidas Ortiz, an avid listener of ranchera legend Vicente Fernández and norteño group Los Tigres del Norte, fills the workshop with their heartfelt ballads while hand‑crafting small wooden furniture,
    and regularly flips through construction trade journals for design inspiration, thereby weaving traditional music into his creative woodworking practice.
  travel: Leonidas Ortiz prefers meticulously planned getaways, favoring short road trips to the Hill Country vineyards or overnight fishing stays at Lake Bonny over spontaneous tourism, yet dreams of a
    pilgrimage to the historic ruins of Chichén Itzá, balancing a love for structured itineraries with the occasional desire for adventurous exploration.
  culinary: Leonidas Ortiz thrives on preparing authentic pork‑based pozole, hand‑shaped tamales, and layered enchiladas, seasoning each with dried ancho chilies and fresh cilantro from their backyard garden,
    and though they occasionally over‑salt a pot to satisfy guests’ cravings, they view each family potluck as a ritual that reinforces communal ties.
  core: Leonidas Ortiz, the disciplined foreperson with a love for traditional cooking, football and quiet fishing, channels persistent worry into a relentless quest for safety and routine.
background:
  cultural: Leonidas embraces a blended cultural heritage rooted in his Mexican family traditions and the broader Texas frontier spirit. Raised in a bilingual household, he speaks both Spanish and English
    fluently, preserving the language through daily conversation and by teaching his children and grandchildren. His Catholic faith shapes his values of community service, humility, and respect for elders,
    evident in his regular attendance at parish events and participation in Día de los Muertos altar preparations. Culinary traditions are central to his identity; he proudly prepares regional Mexican recipes
    while also incorporating Texan influences like barbecue and chili. Community festivals such as Cinco de Mayo and local rodeos provide a social anchor, allowing him to celebrate his roots alongside his
    neighbors. This cultural synthesis informs his work ethic—hard‑working, family‑oriented, and grounded in practical, hands‑on problem solving.
attributes:
