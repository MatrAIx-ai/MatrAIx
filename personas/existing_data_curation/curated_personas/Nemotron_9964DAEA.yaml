personas:
  professional: Rose Manning, a seasoned security operations specialist with three decades of gambling‑facility surveillance experience, leverages a methodical eye for detail and a curiosity for emerging
    technology to produce crystal‑clear incident reports, coordinate compliance with Texas gaming regulations, and mentor junior guards, while preparing to step into a shift‑lead role and earn a Certified
    Protection Officer credential.
  sports: Rose Manning, a lifelong fan of Texas sports, roots for the Dallas Cowboys in the fall and the Houston Astros during the baseball season, and joins the Wise County Senior Walking Club for morning
    strolls along the creek trail and a weekly low‑impact water‑aerobics class at the community center; they also play gentle tennis doubles with the local senior league each summer, preferring steady activity
    over high‑intensity workouts.
  arts: Rose Manning, an avid watercolorist who delights in capturing the subtleties of Texas sunsets, regularly attends traveling art exhibits featuring contemporary Mexican muralist Diego Rivera and the
    ethereal watercolors of American painter John Marin, and volunteers as an art‑appreciation guide at the senior center, where they discuss the techniques of Claude Monet, Frida Kahlo, and local folk
    artist Susan Gonzales; their love for theater includes the community production of Arthur Miller's "The Crucible" starring local actors.
  travel: Rose Manning, an inquisitive traveler who balances a love of quiet exploration with a limited retirement budget, prefers meticulously planned road trips to historic towns such as Marfa, New Mexico,
    and Santa Fe, where they can peruse Southwestern galleries, while also harboring a dream of a week‑long art pilgrimage to Barcelona to walk the streets that inspired Gaudí and visit the Picasso Museum;
    they favor staying in boutique B&Bs that showcase local craftsmanship.
  culinary: Rose Manning, a creative home chef who experiments with Tex‑Mex fusion, often cooks smoky chipotle chicken enchiladas topped with a tangy avocado‑lime crema, pairs them with prickly pear margaritas,
    and sprinkles pomegranate seeds over carne asada tacos for a burst of color; they showcase their skill by mastering homemade blue‑corn masa, fresh cilantro, and aged cheddar, and occasionally host intimate
    dinner parties where the centerpiece is a hand‑crafted cazuela de mole.
  core: Rose Manning blends disciplined surveillance expertise with an insatiable curiosity for art, cooking, and community, navigating retirement planning, health maintenance, and modest indulgences with
    methodical precision and a dash of creative flair.
background:
  cultural: Rose grew up in a middle-class Anglo-American family in East Texas, where community, self-reliance, and modesty were core values. The region's strong ties to church, high-school football Saturdays,
    and family gatherings shaped her sense of responsibility and hospitality. Her upbringing emphasized hard work and respect for authority, which dovetailed with her career in security. While rooted in
    traditional Texan culture - enjoying country music, BBQ, and local festivals - Rose also embraces broader artistic influences, reflecting a blend of rural heritage and a lifelong curiosity for the wider
    world.
attributes:
  skills: '[''CCTV operation and live monitoring'', ''Behavioral observation and threat identification'', ''Incident documentation and reporting'', ''Risk assessment and mitigation'', ''Conflict de-escalation'',
