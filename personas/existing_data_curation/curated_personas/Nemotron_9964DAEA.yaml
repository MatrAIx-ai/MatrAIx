    and casino management'', ''Technology scouting for surveillance innovations'']'
  hobbies: '[''Watercolor painting'', ''Visiting traveling art exhibits'', ''Community theater attendance'', ''Birdwatching'', ''Gardening'', ''Crossword puzzles'', ''Experimental cooking (Tex-Mex fusion)'',
    ''Antique market exploring'', ''Historical nonfiction book club'', ''Volunteer art-appreciation workshops'']'
  career_goals: Rose aims to transition from front-line surveillance to a supervisory role within the next two years, seeking to become a shift lead or security manager for the casino. She plans to obtain
    the Certified Protection Officer (CPO) credential and pursue advanced training in digital forensics to enhance the facility's investigative capabilities. Long-term, she envisions mentoring younger guards,
    establishing a small security consultancy that serves local businesses in Wise County, and integrating her love of art by advising on the design of secure yet aesthetically pleasing public spaces.
