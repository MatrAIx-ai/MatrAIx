personas:
  professional: Joseph Mccoy, a budding engineer and robotics enthusiast, applies his methodical planning and hands‑on curiosity to designing and programming simple robots and intricate LEGO Technic models,
    consistently documenting each step with meticulous notes.
  sports: Joseph Mccoy fuels his fitness through regular bike rides on local trails with the Trailblazers youth cycling club, follows the national soccer team United Eagles, and occasionally joins school
    cross‑country practice, preferring solitary endurance activities over team sports.
  arts: Joseph Mccoy immerses himself in sci‑fi literature, favoring authors like Isaac Asimov and Liu Cixin, and enjoys the synth‑rich scores of Daft Punk and the visual storytelling of director Christopher
    Nolan, often sketching ideas for future robotic inventions alongside his reading.
  travel: Joseph Mccoy prefers structured travel that feeds his engineering curiosity, having planned visits to the Smithsonian National Air and Space Museum in Washington, D.C., a weekend camping trek
    in the nearby Blue Ridge Mountains, and dreaming of a future trip to Tsukuba, Japan, to explore its robotics exhibitions.
  culinary: Joseph Mccoy gravitates toward quick but tasty meals, often building his own pizza with mozzarella, pepperoni, and pineapple, and enjoys crafting homemade granola bars with oats, honey, and
    dried cranberries as a snack after long LEGO sessions.
  core: Joseph Mccoy, a methodical 13‑year‑old tinkerer, balances solitary engineering projects with meticulous planning, cautious spending, and a love for sci‑fi, all while navigating teen life with quirks
    like occasional screen‑time overindulgence.
background:
  cultural: Joseph grew up in Maumee, Ohio, a suburban community in Lucas County that blends small‑town Midwestern values with easy access to the larger Toledo metropolitan area. His family is white, middle‑class,
    and rooted in the region’s traditions of hard work, community involvement, and practical skill‑building. He attends a public middle school where he experiences a curriculum that emphasizes STEM and
    community service. Local cultural influences include attendance at county fairs, support for the local high school sports teams, participation in church‑related community events (often a blend of Protestant
    and Catholic traditions), and an appreciation for Midwestern cuisine such as turkey dinners and corn on the cob. The area's automotive and manufacturing heritage informs his interest in mechanics and
    engineering, while the nearby Ohio River and Lake Erie provide opportunities for outdoor recreation.
attributes:
  skills: '["Basic programming (Scratch, introductory Python)", "Logical problem solving", "Organizational and time‑management skills", "Model building (LEGO Technic, model cars)", "Basic woodworking and
    tool use", "Fundamental arithmetic and science concepts", "Research and information synthesis", "Clear communication in small groups"]'
  hobbies: '["Building LEGO Technic and model car kits", "Strategy video gaming (Minecraft, Civilization)", "Reading science‑fiction and popular science books", "Robotics club participation", "Electronics
    tinkering and repair", "Cycling on local trails", "Bird watching and nature walks", "Gardening with family"]'
  career_goals: Joseph aims to channel his curiosity for how things work into a future career in engineering, ideally mechanical or robotics engineering. In the short term, he wants to lead his middle school's
    robotics team to a regional competition, earn a certification in basic automotive maintenance through a local community college program, and secure a summer mentorship with a local manufacturing firm.
    Longer‑term, he aspires to attend a high school with a strong STEM curriculum, earn a bachelor's degree in engineering, and eventually work on designing sustainable transportation solutions or community
    infrastructure projects in the Midwest. He also hopes to contribute to his hometown by volunteering for STEM outreach programs.
