persona_description: A scientist who is passionate about wildlife conservation and has a particular interest in the poaching of sea turtles. She is a member of the World Wildlife Fund and has worked on
  a project to develop GPS-enabled decoy turtle eggs to prevent the illegal trade of turtle eggs. Her work has been published in the journal Current Biology. She is also interested in the education and
  job opportunities that drive poaching and is working on creating 3D decoy hammerhead shark fins to raise awareness and deter illegal poaching.
