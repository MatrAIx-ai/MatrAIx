  hobbies: '[''Rotary Club participation'', ''Charity organizing'', ''Volunteering at food bank'', ''High school football spectating'', ''Fishing'', ''Gardening'', ''DIY home improvement'', ''Listening
    to classic rock'', ''Attending local festivals'', ''Game nights (bridge, board games)'']'
  career_goals: Looking ahead, Luis aims to advance to a Plant Manager or Regional Operations Director role within the next five years, where he can shape broader strategic initiatives while preserving
    the stable, routine‑focused environment he values. He is committed to introducing Lean manufacturing practices to boost efficiency without sacrificing employee well‑being. Additionally, he plans to
    formalize a mentorship program for new hires and eventually transition to a part‑time consulting role for small manufacturers in Jay County, allowing him to continue helping local businesses and volunteer
    as a career mentor at the community college after retirement.
