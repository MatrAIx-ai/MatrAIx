  career_goals: Looking ahead, Bree aims to step into a senior director of operations role where she can shape plant‑wide digital transformation initiatives and embed sustainable manufacturing practices.
    She is passionate about mentoring the next generation of women engineers and production managers, building inclusive teams, and championing continuous‑improvement cultures. As she approaches the final
    decade of her career, she also envisions transitioning to a consulting capacity to help regional manufacturers adopt lean and automated processes while preserving operational reliability.
