personas:
  professional: Gaspar Urra is a retired master carpenter and preservationist who channels their meticulous budgeting and project-planning expertise into restoring historic adobe homes in Albuquerque while
    mentoring senior volunteers, blending their investigative genealogical skills with a disciplined, critical approach to every nail and ledger entry.
  sports: Gaspar Urra follows the New Mexico State Aggies basketball team and catches the occasional Albuquerque Isotopes baseball game, but primarily sustains their fitness with early-morning desert walks,
    weekly laps at the community pool, and a gentle tai-chi class that helps preserve joint flexibility and balance.
  arts: Gaspar Urra immerses themselves in the passionate strains of Paco de Lucia and Camaron de Isla, captures the stark beauty of the New Mexican desert through a vintage Nikon film camera, and spends
    quiet evenings reading the poetry of Federico Garcia Lorca, letting the rhythmic intensity of flamenco and the austere desert vistas shape their artistic sensibility.
  travel: Gaspar Urra meticulously plans road trips to historic adobe towns such as Santa Fe and Taos, dreams of a pilgrimage to Seville and Granada to trace their family roots, prefers mid-week travel
    to avoid crowds, and books modest boutique inns that fit their fixed retirement budget.
  culinary: Gaspar Urra is a practiced home chef whose repertoire spotlights authentic paella with saffron, rabbit, and chorizo, as well as chilled gazpacho brimming with vine-ripe tomatoes, cucumbers,
    and a dash of sherry vinegar, and they often experiment with desert-grown prickly-pear fruit to garnish salads, though they occasionally over-salt the paella while lost in a crossword puzzle.
  core: Gaspar Urra is a meticulous, solitary polymath who restores adobe homes, solves chess puzzles against computers, obsessively catalogs every receipt, and lets worry over garden droughts keep them
    up at night.
background:
  cultural: Gaspar was born in Seville, Spain, and emigrated to the United States in his early thirties after marrying his wife, Maria, who also shares Spanish ancestry. Settling in Albuquerque, he has
    woven his Andalusian roots into the fabric of the Southwest, preserving the Spanish language at home and celebrating traditional holidays such as Semana Santa and Día de los Reyes. He embraces the multicultural
    landscape of New Mexico, participating in local Hispanic festivals, appreciating the adobe architectural style, and incorporating desert flora into his garden. This hybrid identity blends a deep respect
    for historic Spanish customs with the pragmatic, community‑oriented spirit of the American Southwest.
