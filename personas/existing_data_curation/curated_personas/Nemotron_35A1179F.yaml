personas:
  professional: Dominique Webb is a budding junior coder who blends curiosity with practicality by methodically designing Scratch games in after‑school workshops, while simultaneously channeling storytelling
    energy into drama club performances and meticulously organized LEGO constructions.
  sports: Dominique Webb kicks the ball for the Capitol City Youth Soccer Club in the fall, cheers on the Oklahoma City Thunder and idolizes guard Shai Gilgeous‑Alexander on weekends, and also joins school
    basketball drills to stay balanced across seasonal sports.
  arts: Dominique Webb sketches vivid fantasy scenes, sings gospel harmonies in the church choir, dazzles onstage in drama club reenactments of Disney’s "The Lion King" and Lin‑Manuel Miranda’s "Hamilton,"
    and keeps a playlist featuring Beyoncé’s "Halo," Lin‑Manuel Miranda’s "My Shot," and John Williams’ orchestral scores.
  travel: Dominique Webb creates hand‑drawn itineraries for weekend getaways, fondly recalls family trips to the Oklahoma City Zoo and the Grand Canyon, and dreams of future adventures to Washington, D.C.’s
    National Museum of History and a lively music festival in New Orleans.
  culinary: Dominique Webb, an enthusiastic kitchen helper, delights in whisking sweet potato pie with cinnamon and nutmeg, munches crisp collard greens seasoned with smoked turkey, and perfects the classic
    PB&J sandwich, proudly presenting each creation on a colorful plate for family brunch.
  core: Dominique Webb blends organized curiosity with a chatty, stage‑loving spirit, yet an undercurrent of anxiety drives them to obsessively line up LEGO bricks, rehearse lines, and double‑check their
    allowance budget before bedtime.
background:
  cultural: Dominique comes from an African‑American family rooted in the Oklahoma City community. Her mother, a public‑school teacher, and her father, a community organizer, infuse home life with a strong
    emphasis on education, service, and cultural pride. The family celebrates Juneteenth, Black History Month, and Kwanzaa, sharing stories of historic figures and cooking traditional Southern dishes such
    as collard greens and sweet potato pie. Attending a predominantly Black church, Dominique participates in gospel music and community outreach programs. The local heritage of the Great Migration and
    civil‑rights activism is woven into school projects, deepening her appreciation for her cultural legacy while also shaping her desire to give back to her neighborhood.
