  career_goals: Dominique dreams of becoming an elementary school teacher so she can share her love of reading and organized learning with younger children. She also imagines exploring space as an astronaut
    or scientist, fascinated by the stars she watches through a backyard telescope. Her passion for leading activities and helping friends fuels an ambition to be a community youth mentor, organizing after‑school
    clubs that blend creativity and science. While she enjoys these big ideas, she knows she will need to finish school, earn a degree, and continue developing her leadership and academic skills.
