personas:
  professional: Steve Kornegay, a budding robotics enthusiast on his middle school team, blends methodical problem‑solving with a knack for teamwork, and they consistently translate classroom guidelines
    into functional machines while reliably meeting project deadlines.
  sports: Steve Kornegay, a right‑hand pitcher for the Morenci Middle School baseball team, idolizes the Detroit Tigers and practices year‑round with the local youth baseball club, regularly cheering on
    the Michigan Wolverines during football season, and they also participate in community pickup games at the county fairgrounds.
  arts: Steve Kornegay immerses themselves in creative outlets by building intricate LEGO sets modeled after Star Wars, reading adventure novels by Rick Riordan, and listening to pop hits from Taylor Swift
    and the band Imagine Dragons while they sketch game strategies for their favorite multiplayer titles.
  travel: Steve Kornegay enjoys weekend bike rides along the Huron River trail, day trips to the Great Lakes State Park for fishing, and family vacations to Niagara Falls and Chicago, and they balance a
    modest travel budget with a desire to explore new lakeside towns and amusement parks like Cedar Point.
  culinary: Steve Kornegay prefers classic comfort foods such as crispy chicken nuggets, homemade mac & cheese, and Michigan cherry pie, often trying their hand at cooking with their dad, and they have
    mastered a secret family barbecue sauce that incorporates local cherry jam.
  core: Steve Kornegay is a routine‑loving, sociable 12‑year‑old who blends structured hobbies like robotics and baseball with a flair for teamwork, a tendency to over‑schedule, and they also sneak extra
    video game time after chores.
background:
  cultural: Steve grew up in Morenci, a small town in Lenawee County, Michigan, steeped in Midwestern values of hard work, community involvement, and modesty. His family has a multi‑generational connection
    to the region, with grandparents who worked in local manufacturing and parents who run a small family‑owned auto repair shop. The community’s cultural life centers around school sports events, church
    gatherings, and seasonal festivals such as the annual county fair and Fourth of July parade, all of which have shaped Steve’s sense of belonging and civic pride. The local culture emphasizes practicality,
    reliability, and a straightforward approach to problem‑solving, traits that are reflected in Steve’s everyday routines and aspirations. While his heritage is primarily European‑American, he is raised
    with an appreciation for the region’s agricultural roots, the nearby Great Lakes, and the close‑knit social fabric of rural Michigan.
