  career_goals: Steve aspires to build a career that combines his love for practical work, routine, and service to his community. He plans to graduate high school with a focus on technical subjects and
    then enroll in a vocational program in automotive technology or emergency services. His primary ambition is to become a certified automotive mechanic, learning the trade from hands‑on experience at
    his father's garage and eventually opening his own repair shop that serves Morenci and surrounding towns. He also expresses a strong interest in joining the local volunteer fire department, seeing it
    as a way to apply his steadiness under pressure and his desire to help others. Additionally, Steve hopes to stay connected to his passion for teamwork by coaching youth baseball once he has completed
    his training, allowing him to mentor younger players while reinforcing community ties.
