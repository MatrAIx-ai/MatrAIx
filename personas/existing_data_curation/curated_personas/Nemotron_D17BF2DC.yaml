  hobbies: '["Gardening (native plants and butterfly garden)", "Birdwatching", "Reading historical fiction and memoirs", "Cooking and baking Southern cuisine", "Crocheting and quilting", "Church attendance
    and bible study", "Volunteering at senior center", "Crossword puzzles", "Beach walks and shell collecting"]'
  career_goals: Although retired from formal employment, Kirsten aims to deepen her impact in the Lynn Haven community. She aspires to lead a senior‑mentor program that pairs experienced volunteers with
    younger community members. She also hopes to launch a small home‑based craft business selling crocheted blankets and quilts, using her skills to generate modest supplemental income. Writing a memoir
    for her grandchildren is another personal ambition, preserving family history and local stories. Continuing to learn new technology, such as smartphone photography, and helping establish a neighborhood
    community garden are also key goals she plans to pursue over the next few years.
