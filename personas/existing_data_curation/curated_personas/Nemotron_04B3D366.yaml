personas:
  professional: Thompson Doan, a seasoned retail associate with a decade of experience in customer service, POS systems, and inventory management, leverages their practical curiosity and balanced approach
    to drive efficient store operations while nurturing team rapport, positioning themselves for a department manager role within the next few years.
  sports: Thompson Doan, a lifelong fan of the Atlanta Braves and Falcons, watches games at the local sports bar while cheering with their crew, participates in a community softball league on weekends,
    and follows the Atlanta United MLS team, balancing their love for team sports with solo fishing trips to Lake Lanier for relaxation.
  arts: Thompson Doan immerses themselves in classic rock, spinning The Eagles and Led Zeppelin on road trips, enjoys occasional live performances at the historic Fox Theatre, and attends community potluck
    gatherings where local folk singer Susan Jackson performs, letting music shape their leisure and social rituals.
  travel: Thompson Doan prefers road‑trip travel, charting routes through the Blue Ridge Mountains to Asheville and historic Charleston, often stopping at roadside diners for breakfast tacos, while reserving
    longer vacations for fishing excursions on Florida’s Gulf Coast, balancing adventure with the practical need to stay within a modest travel budget.
  culinary: Thompson Doan loves preparing home‑grown tomatoes, sweet corn, and collard greens into Southern‑style BBQ plates featuring smoked brisket and homemade peach cobbler, their cooking skill hovers
    between competent and enthusiastic, and they routinely experiment with hot sauce blends featuring Carolina reaper and garlic.
  core: Thompson Doan blends practical curiosity with Southern community spirit, juggling retail ambitions, garden‑fresh meals, classic rock road trips, and a steadfast love for Braves baseball, all while
    navigating modest financial plans and a touch of health vigilance with their measured approach.
background:
  cultural: Thompson grew up in Hall County, Georgia, within a working-class white Southern family that valued hard work, community ties, and modest living. His upbringing was shaped by the region’s traditions
    of Southern hospitality, church involvement, and a close-knit neighborhood culture. Although he left school early, he carries forward the pragmatic, resourceful mindset typical of the rural‑suburban
    Georgia environment, which informs his everyday interactions and outlook.
