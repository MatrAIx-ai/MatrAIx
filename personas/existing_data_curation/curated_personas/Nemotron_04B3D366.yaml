  career_goals: Thompson aims to move into a supervisory role within the next two to three years, targeting a department manager position at his current store. He is working toward a retail management certification
    to strengthen his qualifications. Long-term, he hopes to become a store manager or district manager, with the ultimate ambition of opening a small independent shop that reflects his interest in local
    products and community service. He balances these goals with a realistic view of his education, focusing on gaining experience, mentorship, and incremental responsibility.
