  hobbies: '[''Basketball'', ''Ice hockey'', ''Competitive online gaming'', ''Fishing'', ''Woodworking'', ''Boy Scouts (leadership & merit badges)'', ''Event organizing (school dances, fundraisers)'', ''Team
    sports'']'
  career_goals: William aims to complete his high school education through a GED program by age 18 and then enroll in a trade apprenticeship—preferably in electrical work or construction—to gain a stable,
    routine‑oriented career. He sets a goal of obtaining journeyman certification within five years while also volunteering as an assistant coach for the local high school basketball team. In the longer
    term, he envisions opening his own small handyman or sports‑equipment service business in Pine City, where he can combine his practical skills, high standards, and community‑focused mindset. His ambition
    is driven by a desire for tangible achievements, financial independence, and a respected role within his hometown.
