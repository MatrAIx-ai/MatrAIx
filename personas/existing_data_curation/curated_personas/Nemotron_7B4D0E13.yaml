  hobbies: '[''Basketball league'', ''Soccer team'', ''Karaoke nights'', ''Korean cooking'', ''Habitat for Humanity volunteering'', ''East Bay hiking'', ''Bicycle riding'', ''Online gaming'']'
  career_goals: Ji An plans to earn his OSHA 30‑hour certification and become a certified journeyman in concrete and structural framing within the next three years. He aims to complete his associate degree
    in construction management, which he started in community college, and move into a foreman or crew‑lead role where he can blend hands‑on work with leadership. In the longer term, he envisions starting
    his own small general‑contracting business that emphasizes safety, community projects such as Habitat for Humanity builds, and a collaborative work culture that still offers him flexibility to enjoy
    his social life.
