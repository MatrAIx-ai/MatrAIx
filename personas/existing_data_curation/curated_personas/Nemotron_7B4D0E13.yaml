personas:
  professional: Sung An is a hands‑on construction laborer in the Bay Area who excels at concrete pouring, formwork, and operating skid‑steer loaders, and leverages their natural sociability to act as the
    informal liaison that keeps crews coordinated while they chase OSHA 30 certification and a journeyman credential.
  sports: Sung An bolts onto a local basketball league and co‑ed soccer team, rides a bike with the Hayward Cycle Club, hikes the East Bay Regional Parks on weekends, and roots for the Golden State Warriors,
    San Jose Earthquakes, and San Francisco Giants.
  arts: Sung An unwinds at a Korean karaoke bar belting out hits by BTS and classic rock anthems, streams The Weeknd and Blackpink in the background while cooking, and occasionally catches improv comedy
    shows at a downtown theater.
  travel: Sung An prefers spur‑of‑the‑moment road trips to Lake Tahoe or Napa Valley with friends over rigid itineraries, but has a bucket‑list entry for a cultural immersion tour of Tokyo and Kyoto in
    the next few years.
  culinary: Sung An enjoys mastering bulgogi, kimchi, and japchae at home, seasoning with gochujang, sesame oil, and garlic, while their cooking skill hovers between confident sauté and occasional over‑salting,
    and they love grabbing a slice of New York‑style pizza or fresh sushi on evenings out.
  core: Sung An blends a practical construction mindset with a love for group sports, karaoke, and spontaneous road trips, all while juggling a relaxed approach to budgeting and a persistent back ache.
background:
  cultural: Sung Ji An was born and raised in Hayward, California, to South Korean immigrant parents. He grew up bilingual, speaking Korean at home and English at school, which gives him a strong cultural
    bridge between his heritage and American life. His family emphasized hard work, respect for elders, and the value of education, influencing his practical approach to his construction career and his
    commitment to teamwork. He remains active in the local Korean‑American community, attending a Korean church, celebrating holidays such as Chuseok and Lunar New Year, and participating in cultural festivals.
    At the same time, he embraces the multicultural environment of the Bay Area, enjoying a mix of Asian and American customs and social circles.
attributes:
  skills: '[''Concrete pouring'', ''Formwork assembly'', ''Heavy equipment operation (skid‑steer loader, backhoe)'', ''Blueprint reading'', ''Safety inspections'', ''Crew coordination'', ''Basic carpentry'',
