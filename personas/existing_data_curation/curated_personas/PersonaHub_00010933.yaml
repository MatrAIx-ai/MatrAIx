persona_description: A professional astronomer who specializes in the study of galaxy clusters and their radio emission. They have expertise in the detection and analysis of radio waves, particularly in
  the context of black hole activity and galaxy cluster formation. They have a deep understanding of the physics of radio jets and their role in powering galaxy clusters. They have conducted extensive research
  on the M87 galaxy cluster, including its radio emission, X-ray emission, and jet structure, and have contributed to the understanding of the physics of these phenomena. They have a keen interest in the
  use of advanced imaging techniques and computational power to study these complex systems.
