  career_goals: Joshuajames aims to transition into a senior engineering technologist role where he can lead multidisciplinary product development teams and influence strategic direction. He aspires to
    obtain a professional engineering technologist (PET) certification and eventually move into an engineering manager position overseeing large‑scale manufacturing projects. In the longer term, he envisions
    launching a boutique consultancy that merges cutting‑edge engineering with aesthetic design, helping startups bring artistically inspired, high‑performance products to market. His competitive drive
    motivates him to publish technical papers and secure patents for novel manufacturing processes.
