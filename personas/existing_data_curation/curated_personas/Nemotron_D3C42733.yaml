  hobbies: '[''Soccer'', ''Beach volleyball'', ''Salsa and reggaeton dancing'', ''DIY electronics and Arduino projects'', ''Cooking Puerto Rican cuisine'', ''Hiking coastal trails'', ''Community water‑conservation
    volunteering'', ''Coastal clean‑up events'']'
  career_goals: Junior aims to become a senior pump‑station supervisor within the next five years, leading a team of operators and overseeing a network of stations across the municipality. He plans to earn
    the Certified Water Operations Specialist credential and later complete an associate’s degree in Mechanical Engineering Technology. His long‑term ambition is to transition into a management role in
    municipal utilities, where he can implement efficiency improvements, adopt smart‑grid water technologies, and mentor younger technicians. He also hopes to contribute to community water‑conservation
    projects and be recognized for innovations that reduce energy consumption at pumping facilities.
