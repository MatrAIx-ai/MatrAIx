personas:
  professional: Yan Huang, a 15‑year‑old middle‑school student, channels a practical, structured mindset into robotics, often leading the club’s competition projects while meticulously scheduling meetings,
    yet they remain flexible enough to incorporate teammates’ ideas during design sprints.
  sports: Yan Huang is a dedicated midfielder for the school’s ‘Eagle Warriors’ soccer team, committing to thrice‑weekly practices and weekend matches while cheering for FC Barcelona and supporting the
    local youth club’s futsal league, though they occasionally skip cool‑down stretches after games when worrying about upcoming robotics deadlines.
  arts: Yan Huang immerses themselves in K‑pop choreography, regularly rehearsing BTS’s ‘Dynamite’ and BLACKPINK’s ‘How You Like That’ with friends, while also preserving cultural art through calligraphy
    inspired by Wang Xizhi, and unwinding with YA novels by John Green and Sarah J. Maas, even though they occasionally stay up late replaying dance routines, sacrificing study time.
  travel: Yan Huang dreams of a balanced travel itinerary that alternates between bustling city tours and quiet cultural retreats, having already visited Shanghai’s historic Bund and Seoul’s Myeong‑dong
    for a K‑pop concert, they now plan a summer trip to Kyoto’s temples and a weekend camping adventure in the nearby mountains, all while budgeting their allowance carefully.
  culinary: Yan Huang enjoys cooking family recipes such as jiaozi (dumplings) stuffed with pork and cabbage, mapo tofu spiced with Sichuan peppercorns, and stir‑fried fried rice with shrimp and scallions,
    displaying a competent yet experimental cooking style that mixes precise measurements with spontaneous improvisation, though they sometimes over‑salt dishes when stressed.
  core: Yan Huang is a structured yet sociable teen who balances robotics precision, soccer teamwork, and K‑pop flair, all while wrestling with anxiety‑driven perfectionism and a habit of late‑night journaling.
background:
  cultural: Yan’s family is of Chinese descent, originally from Guangdong province. They maintain strong ties to Chinese cultural traditions while adapting to life in Texas. Mandarin is spoken at home,
    and the family celebrates Lunar New Year, the Mid-Autumn Festival, and customs such as making mooncakes and dumplings. Their cultural values emphasize respect for elders, the importance of education,
    and community harmony. Growing up in Wylie, Yan also engages with the local multicultural community, attending community fairs and participating in English-language programs. She navigates a bicultural
    identity, balancing the collectivist values of her heritage with the individualistic aspects of American teen culture, which informs her perspectives, work ethic, and social interactions.
