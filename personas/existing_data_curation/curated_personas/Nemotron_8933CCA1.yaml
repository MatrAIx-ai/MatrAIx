  career_goals: Yan aims to pursue a career that blends her practical mindset, desire to help others, and interest in technology. In the short term, she plans to graduate high school with honors and earn
    a scholarship in a STEM field. She intends to study biomedical engineering or computer science in college, with a long-term goal of developing medical devices or health-tech applications that improve
    pediatric care. Alongside her academic pursuits, Yan hopes to mentor younger students in her community, drawing on her leadership experience. She also seeks internships at tech companies or research
    labs to gain hands-on experience before completing her degree. Ultimately, she wants a career that provides clear structure, collaborative problem-solving opportunities, and tangible impact on people's
    lives.
