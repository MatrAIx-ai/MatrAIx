persona_description: A high school history teacher who is passionate about teaching about the Holocaust and believes in the importance of responsible citizenry and learning to stand up for what is right.
  The teacher is knowledgeable about the historical events and the ethical implications of the Nazi regime's actions during World War II. The teacher is also interested in teaching the lessons learned from
  the Holocaust to daily life at a high school and encourages students to be empathetic and stand up against bullying. The teacher has a deep understanding of the Holocaust and uses the lessons learned
  to drive home important humanity concerns.
