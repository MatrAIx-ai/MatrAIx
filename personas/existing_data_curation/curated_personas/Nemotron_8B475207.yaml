personas:
  professional: Mary Drolet, a seasoned management analyst at a mid‑size firm, leverages Python, R, and SQL to build predictive models, designs interactive Tableau dashboards, and drives Lean Six Sigma–based
    process improvements, all while mentoring junior staff with a calm, detail‑oriented communication style that balances structure with flexible problem‑solving, and they consistently translate complex
    data into clear strategic recommendations.
  sports: Mary Drolet supports the Brooklyn Nets and New York Yankees, jogs the 2‑mile loop in Prospect Park three times weekly, participates in a local weekend recreational tennis league, and treats the
    annual New York City Marathon as a personal benchmark for endurance, balancing structured training with occasional couch‑potato evenings, and they enjoy seasonal activities such as ice‑skating at the
    rink in winter.
  arts: Mary Drolet explores artistic expression through street photography inspired by Vivian Maier, curates a rotating playlist that includes Nina Simone, Joni Mitchell, and contemporary jazz pianist
    Brad Mehldau, and attends off‑Broadway productions starring Lin‑Manuel Miranda, while engaging in a community book club that discusses works by Malcolm Gladwell and Brené Brown, and they often experiment
    with photo editing techniques to capture Brooklyn’s cultural tapestry.
  travel: Mary Drolet prefers meticulously planned itineraries, favoring cultural immersion trips such as a week‑long culinary tour of Oaxaca, a spring stroll through Kyoto’s historic temples, and short
    weekend getaways to the Hudson Valley’s farm‑to‑table festivals, yet they often postpone longer journeys due to their demanding work schedule, and they rely on detailed travel spreadsheets to keep budgets
    and timelines on track.
  culinary: Mary Drolet delights in precision cooking, perfecting dishes like pan‑seared lemon‑herb salmon with quinoa‑tabbouleh, mastering the ratios of a sourdough starter using baker’s percentages, and
    experimenting with seasonal produce from their balcony garden—especially heirloom tomatoes, fresh basil, and rainbow carrots—and they enjoy pairing meals with carefully selected wines to complement
    the flavors.
  core: Mary Drolet is a data‑driven strategist who balances meticulous planning with creative hobbies, from garden‑to‑table cooking to street photography, all while they maintain a calm, organized approach
    to work, finances, health, and community.
background:
  cultural: Mary Dawn Drolet was raised in a stable, middle‑class family of European descent in Brooklyn, New York. Her upbringing combined traditional White American cultural values—such as a strong work
    ethic, community responsibility, and celebration of holidays like Thanksgiving and Christmas—with the eclectic, multicultural environment of Kings County. Growing up in a diverse urban neighborhood
    exposed her to a wide range of cultural practices, cuisines, and artistic expressions, fostering an inclusive outlook and a deep appreciation for community engagement. While she identifies with broader
    White American cultural norms, Mary also embraces the vibrant artistic, culinary, and social traditions that define Brooklyn, integrating this rich tapestry into her personal and professional life.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Python programming'', ''R programming'', ''SQL querying'', ''Advanced Excel'', ''Tableau'', ''Power BI'', ''Financial forecasting'', ''Lean Six
