    photography'']'
  career_goals: Mary aims to advance into senior strategic roles where she can shape large‑scale organizational transformation initiatives. Over the next five years, she plans to obtain a Six Sigma Black
    Belt and a PMP certification to solidify her expertise in process excellence and project leadership. Her ambition is to become a Director of Business Strategy or a Chief Data Officer, guiding data‑centric
    cultures that prioritize efficiency, accountability, and measurable outcomes. She also seeks to mentor emerging talent and contribute thought leadership through industry conferences and publications,
    while maintaining a balanced work schedule that allows her to continue her community involvement in Brooklyn.
