  career_goals: Jennifer aspires to translate her love of art and people into a career that bridges community engagement and cultural programming. In the short term, she plans to complete a bachelor’s degree
    in arts management or communications, secure an internship at a local museum or nonprofit arts organization, and develop a professional portfolio of event‑planning and digital‑content projects. Long‑term,
    she aims to become an Arts Outreach Coordinator or Museum Education Director, leading large‑scale exhibitions and community workshops. She also dreams of launching her own multimedia platform that spotlights
    under‑represented artists, eventually turning it into a sustainable business and establishing herself as an influential cultural curator.
