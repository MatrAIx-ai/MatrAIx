personas:
  professional: Yoana Dominguez, a retired business consultant and community organizer, leverages her financial planning expertise, bilingual communication skills, and knack for event coordination to mentor
    youth entrepreneurs and run senior‑center programs with a blend of structure and flexibility.
  sports: Yoana Dominguez enjoys leisurely walks in Bayamón’s parks, joins low‑impact tai chi sessions, and avidly follows the local baseball team, the Cangrejeros de Santurce, while balancing her activity
    level with her arthritis.
  arts: Yoana Dominguez sings in her church choir, revels in merengue and bachata dance classes, and regularly attends folk festivals featuring artists like Rubén Blades and Marc Anthony, using music and
    dance as social glue for her community.
  travel: Yoana Dominguez prefers short trips to nearby Caribbean islands and family visits, plans journeys around festival calendars, and dreams of a nostalgic return to the island of her ancestors to
    reconnect with relatives, all while budgeting carefully due to a fixed retirement income.
  culinary: Yoana Dominguez specializes in hearty island dishes such as sancocho, mangú, and pastelitos, flavors them with cilantro, plantain leaves, and achiote, enjoys preparing them for neighborhood
    potlucks, and occasionally over‑salts the broth in her enthusiasm.
  core: Yoana Dominguez blends seasoned business savvy with vibrant community spirit, turning her love for dance, cooking, and mentorship into a lively, organized yet flexible retirement life.
background:
  cultural: Yoana was born to Dominican parents and grew up immersed in the island’s vibrant music, cuisine, and family traditions. After moving to Puerto Rico, she embraced the island’s own cultural rhythms
    while preserving her Dominican heritage. Bilingual in Spanish and English, she celebrates Dominican holidays such as Independence Day and Día de la Restauración, and integrates Puerto Rican customs
    like parranda and the feast of San Juan. Her Catholic faith and close‑knit extended family network shape her values of hospitality, respect for elders, and communal solidarity. Through her community
    work, Yoana serves as a cultural bridge, fostering mutual appreciation between Dominican and Puerto Rican neighbors.
