  hobbies: '["Merengue and bachata dancing", "Cooking traditional Dominican cuisine", "Community gardening", "Reading historical fiction", "Bridge (card game)", "Walking in Bayamón parks", "Volunteering
    at senior center", "Singing in church choir", "Attending Dominican and Puerto Rican festivals", "Traveling to the Dominican Republic"]'
  career_goals: Although retired from formal employment, Yoana is driven to continue contributing to her community. She aims to expand the senior-center mentorship program she founded, offering financial
    literacy workshops for low-income families, and to document her family's culinary traditions in a cookbook that blends Dominican and Puerto Rican flavors. She also aspires to become a certified community
    financial counselor, to travel back to the Dominican Republic to reconnect with extended family, and to foster intergenerational cultural exchange through local festivals. Her goals are grounded in
    practicality, seeking tangible impacts while satisfying her curiosity about new community-development approaches.
