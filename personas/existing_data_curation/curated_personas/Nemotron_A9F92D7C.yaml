personas:
  professional: Andres Singh, a budding junior naturalist who transforms the family living room into a tiny science lab, curates collections of pine cones and LEGO creations with meticulous order while
    still allowing spontaneous experiments, reflects a curious yet skeptical mind that seeks proof before embracing new ideas.
  sports: Andres Singh, a member of the Kirkland Little Hawks soccer team and a regular at Lake Washington paddle‑boarding lessons, channels their competitive spirit into scoring goals in small‑group matches
    while also enjoying family hikes in the nearby Cascades during summer.
  arts: Andres Singh, an enthusiastic participant in the Kirkland Kids’ Art Club, delights in creating watercolor scenes of the lake, idolizes illustrator Eric Carle and musician Jack Johnson, and eagerly
    attends storytime performances at the local library, letting art shape their solitary playtime.
  travel: Andres Singh, a curious traveler who prefers short road trips to nature spots like the San Juan Islands and Olympic National Park, enjoys lakeside picnics at Woodinville and dreams of exploring
    the rainforest in Costa Rica, balancing family‑guided itineraries with a budding desire for independent discovery.
  culinary: Andres Singh, a budding kitchen helper who loves whisking blueberry pancakes, assembling homemade sushi rolls with cucumber and avocado, and savoring grilled salmon with a honey glaze, often
    swaps a bite of mac and cheese for a crunchy carrot stick to keep a balanced palate.
  core: Andres Singh, a curious and methodical five‑year‑old explorer, navigates the world with a competitive edge, a love for nature, and a habit of secretly stashing coins in sock drawers.
background:
  cultural: Andres was raised in Kirkland, a city on the waters of Lake Washington in the Pacific Northwest, where outdoor exploration and community arts programs are common. His family, though identified
    as white, includes multigenerational influences that value creativity, curiosity, and respect for nature. Weekend visits to local museums, library storytimes, and nature walks have shaped his appreciation
    for diverse artistic expressions and scientific wonder.
