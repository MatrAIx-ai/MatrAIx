persona_description: A cognitive scientist who specializes in the study of social cognition and the evolution of human cognition, focusing on the comparison of young children's and infants' cognitive abilities
  with that of great apes such as chimpanzees and orangutans. This scientist is interested in understanding the biological foundations of what makes us uniquely human and how our cognitive development differs
  from that of other primate species. They are particularly interested in the physical and social domains of cognition and how they differ between humans and great apes.
