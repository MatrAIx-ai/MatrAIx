  career_goals: Tina aims to advance within the United States Postal Service by securing a senior supervisory position, such as a postmaster or route manager, within the next five to seven years. She plans
    to complete the Postal Service’s Logistics Management certification to deepen her understanding of efficiency and technology integration. Her ambition includes mentoring new carriers, improving route
    efficiency to reduce stress for the team, and eventually transitioning to a community outreach role that leverages her outgoing nature while offering a more predictable schedule that supports her family
    life and personal well‑being.
