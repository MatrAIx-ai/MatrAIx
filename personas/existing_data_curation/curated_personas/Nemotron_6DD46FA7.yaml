personas:
  professional: Lidia Barbosa is a budding civil engineer‑in‑training who channels her love for constructing elaborate LEGO cities into meticulous blueprint sketches, and they apply their organized, methodical
    mindset and competitive spirit to design imaginary bridges and towers with the seriousness of a seasoned architect.
  sports: Lidia Barbosa dashes around the backyard playing tag, attends the Little Stars Soccer Club on Saturdays while proudly wearing a cap of the San Antonio FC, cheers for the San Antonio Spurs during
    basketball season, and they prefer strategic board games to organized sports, yet still enjoy a good game of hopscotch after school.
  arts: Lidia Barbosa immerses herself in the world of color by painting watercolor scenes inspired by the whimsical illustrations of Dr. Seuss, listening to folk melodies by Lila Downs while dancing with
    family, and they emulate the soft brushwork of Claude Monet in their art notebooks, all of which shape their creative identity.
  travel: Lidia Barbosa has explored the Grand Canyon’s towering cliffs and the sun‑kissed beaches of Cabo San Lucas with her family, and they dream of snorkeling the coral reefs of Belize and wandering
    the ancient ruins of Machu Picchu, preferring trips that combine nature discovery with a chance to catalog new leaves and rocks in their trusty notebook.
  culinary: Lidia Barbosa delights in taco lunches with corn tortillas, seasoned chicken, fresh cilantro, and lime, enjoys whipping up banana‑strawberry smoothies with yogurt, and they take pride in arranging
    smiley faces on pancakes using blueberry berries, though they sometimes over‑indulge in sugary gummies after a long day of play.
  core: Lidia Barbosa is a tiny, relentless architect‑in‑training whose boundless curiosity and competitive streak fuel a love for building, yet they hoard stickers, forget to tidy their art supplies, and
    occasionally lose focus when a new LEGO set arrives.
background:
  cultural: Lidia grows up in a Mexican‑American household in Laredo, Texas, where Spanish is spoken at home and English at school. Her family celebrates traditional holidays such as Día de los Muertos,
    Las Posadas, and Mexican Independence Day, incorporating music, food, and storytelling that nurture her appreciation for art and culture. The vibrant Tex‑Mex community around her provides a blend of
    cultural experiences, from taco trucks to mariachi performances, shaping her love for colorful visuals and rhythmic sounds. Her parents encourage bilingualism, respect for elders, and communal gatherings,
    while also emphasizing education and personal achievement. This cultural tapestry influences Lidia’s curiosity, her competitive drive, and her desire to contribute positively to both her local neighborhood
    and the broader world.
