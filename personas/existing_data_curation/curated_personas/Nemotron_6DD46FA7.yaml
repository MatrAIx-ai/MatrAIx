  hobbies: '[''drawing and watercolor painting'', ''reading picture books'', ''LEGO and block building'', ''nature collecting and cataloguing'', ''listening to Mexican folk music'', ''dancing at cultural
    celebrations'', ''playing strategy board games'', ''watching educational cartoons'']'
  career_goals: Lidia dreams of becoming an astronaut who can explore space and discover new worlds, and she also imagines herself as a professional artist who can share stories through paintings. She is
    determined to study science and art in school, and she hopes to inspire other kids in her community to pursue their passions. Her competitive spirit pushes her to set small milestones, like mastering
    more complex LEGO builds or winning a school art contest, as stepping stones toward her big dreams.
