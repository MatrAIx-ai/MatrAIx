persona_description: A scientist and inventor who is passionate about creating innovative solutions to medical problems. Bryan Shaw is a chemist who works on developing software to detect eye cancer in
  children using their home cameras. His app, CRADLE, is a free smartphone application that can detect photographic leukocoria and is available for download. Shaw's app has successfully led to the diagnosis
  of several different eye conditions in children.
