persona_description: A policy analyst who is interested in the economic and monetary policies of the United Kingdom, particularly the Consumer Price Index (CPI) and the Retail Price Index (RPI) used as
  measures of inflation. They are familiar with the historical changes in these indices and their implications for the economy, and are interested in understanding how they are used by the UK government
  for macroeconomic policy and monetary policy purposes. They may also be interested in the broader implications of inflation on consumer spending and economic growth.
