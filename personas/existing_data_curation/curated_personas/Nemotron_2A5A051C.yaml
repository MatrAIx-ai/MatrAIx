personas:
  professional: Ron Moore is a seasoned maritime craftsman and community mentor who combines decades of boat‑repair, carpentry, and native‑plant gardening expertise into a fledgling custom boat‑refurbishment
    business, delivering hands‑on workshops that reflect their curious yet pragmatic problem‑solving style while occasionally wrestling with the deadline‑driven demands of entrepreneurship.
  sports: Ron Moore is an avid fisherman and casual sailor who spends weekends with the Brunswick County Yacht Club, roots for the Carolina Panthers during football season, dribbles a worn‑out basketball
    at the local community center for mid‑summer fitness, and enjoys early‑morning runs along the marshes to stay in shape.
  arts: Ron Moore frequents the Brunswick shrimp festival and nearby folk music gatherings where they revel in the storytelling songs of Sturgill Simpson, the timeless lyrics of Bob Dylan, and the soulful
    blues of local fiddler James Carter, allowing these sounds to color their woodworking rhythms and weekend evenings.
  travel: Ron Moore prefers spontaneous, low‑key road trips along the Atlantic seaboard—spending a weekend fishing in the Outer Banks, a relaxed retreat in Savannah’s historic squares, and a brief escape
    to Key West for deep‑sea angling—while dreaming of an affordable sailing adventure to the Azores when a future side business finally funds the journey.
  culinary: Ron Moore, an adept home chef, specializes in smoking fresh catch with a custom rub of Old Bay, smoked paprika, and a pinch of sumac, perfects classic shrimp and grits with sweet corn and andouille
    sausage, and experiments with honey‑soy glazes on blackening catfish, often balancing beloved family recipes with bold new spice blends.
  core: Ron Moore, a 48‑year‑old maritime tinkerer, blends relentless curiosity with hands‑on practicality, loves spontaneous sunrise fishing trips, yet habitually misplaces tools and procrastinates paperwork,
    making them a charmingly disorganized yet deeply community‑rooted craftsperson.
background:
  cultural: Ron grew up in a coastal town in Brunswick County, North Carolina, within a family that blended Southern traditions—hospitality, church gatherings, and love of the sea—with an Ashkenazi Jewish
    heritage passed down through generations. Holiday celebrations often interweave Passover Seder customs with Southern barbecue, and he maintains a modest connection to a local synagogue while participating
    in community events like the annual shrimp festival. This mixed cultural background instills in him a strong sense of community, practical self‑reliance, curiosity about diverse traditions, and a respect
    for both the land and the waterways that shape his everyday life.
attributes:
  skills: '[''Boat repair and small-engine maintenance'', ''Carpentry and woodworking'', ''Home renovation and DIY projects'', ''Gardening (especially native and edible plants)'', ''Seafood cooking and
    smoking'', ''Basic electrical work'', ''Local ecology and history knowledge'']'
  hobbies: '[''Fishing, crabbing, and sailing'', ''Woodworking and boat restoration'', ''DIY home improvement projects'', ''Gardening (native and edible plants)'', ''Birdwatching'', ''Seafood cooking and
    smoking'', ''Reading about marine biology and local history'', ''Attending community music festivals and farmers’ markets'', ''Solo nature walks'']'
  career_goals: Although currently out of the formal workforce, Ron aims to translate his practical skills into a community‑focused side business, such as a custom boat‑refurbishment service and occasional
    woodworking commissions. He plans to finish the remaining coursework from his college studies in environmental science or business to better structure his ventures. A long‑term ambition is to mentor
    younger residents through workshops at the local community center, sharing his knowledge of sustainable fishing, gardening, and DIY repair. He also hopes to write a guidebook about the Lowcountry’s
    maritime heritage, blending his curiosity with a desire for tangible, lasting contributions.
