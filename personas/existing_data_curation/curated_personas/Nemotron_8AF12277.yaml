personas:
  professional: An organized teen game designer in training, Gregory Owen, they leverage their disciplined work ethic to craft intricate Scratch games that weave fantasy narratives with clean code, drawing
    on their love of reading sci-fi novels and habit of sketching storyboards, while their reserved nature ensures thoughtful collaboration with their close chess-playing friend.
  sports: A nature-focused junior athlete, Gregory Owen, they enjoy trail hiking around Lake Waconia, participate in their school's cross-country club, and follow the Minnesota Vikings and the Minnesota
    Timberwolves on game days, balancing their disciplined training regimen with occasional lapses that cause them to miss a practice.
  arts: An enthusiastic young artist, Gregory Owen, they immerse themselves in watercolor sketching, digital illustration on their tablet, and frequent visits to the regional museum where they admire works
    by Claude Monet and Studio Ghibli's Hayao Miyazaki, while keeping a meticulously labeled sketchbook that reflects their organized mindset, though they occasionally forget to clean their brushes after
    a long session.
  travel: An inquisitive teen explorer, Gregory Owen, they prefer planning weekend nature getaways to state parks and the Grand Canyon, dream of a future trip to Tokyo's Ghibli Museum, and allocate a portion
    of their allowance each month to fund these adventures, yet family constraints sometimes limit longer journeys.
  culinary: A budding home cook, Gregory Owen, they enjoy preparing blueberry-banana smoothies, chicken-and-vegetable stir-fry, and homemade pizza topped with fresh basil and mozzarella, often experimenting
    with honey-glazed carrots, while their organized pantry mirrors their disciplined habits, though they sometimes sneak a candy bar while gaming.
  core: Gregory Owen, they are a disciplined, curiosity-driven 13-year-old whose love for artistic creation, strategic games, and quiet exploration fuels a methodical yet imaginative approach to life, punctuated
    by occasional impulsive snack breaks and a penchant for meticulously organized sketchbooks.
background:
  cultural: Gregory was raised in a middle‑class White family in Waconia, Minnesota, a small suburban community in Carver County. His upbringing reflects typical Midwestern values of hard work, modesty,
    and community involvement. He attends a local public middle school and participates in extracurricular activities through the community center and nearby library. The region’s strong emphasis on education,
    outdoor recreation, and support for the arts has shaped his curiosity and appreciation for both nature and creative expression. Family gatherings often center around shared meals and seasonal celebrations,
    reinforcing his cooperative and considerate nature. Exposure to local Lutheran and broader American cultural traditions has instilled a sense of respect for tradition while encouraging open‑minded exploration
    of new ideas.
attributes:
  skills: '[''Organizational and time‑management skills'', ''Proficiency with Google Workspace and Microsoft Office'', ''Basic programming in Scratch'', ''Strong reading comprehension and analytical writing'',
    ''Fundamental mathematics (pre‑algebra and geometry)'', ''Drawing and sketching with pen and watercolor'', ''Introductory knowledge of art history and visual analysis'']'
  hobbies: '[''Reading (fantasy and science‑fiction novels)'', ''Drawing and watercolor sketching'', ''Digital art using a tablet (Procreate, Krita)'', ''Creating simple games in Scratch'', ''Playing chess'',
    ''Exploring nature trails around Lake Waconia'', ''Attending art club meetings and museum visits'', ''Volunteering at the community library'']'
  career_goals: Gregory aims to attend a rigorous high school and later pursue a degree that blends technology and design, such as computer science, software engineering, or architecture. He envisions a
    future where he creates intuitive digital experiences—perhaps as a UX designer or creative director—while also contributing to community-oriented projects like designing public spaces or educational
    tools. Over the long term, he hopes to mentor younger students and lead collaborative initiatives that foster creativity and problem‑solving.
