personas:
  professional: Jevon Billiot, a 26‑year‑old cashier with a business degree, leverages precise cash‑handling, Excel‑based budgeting, and a calm, routine‑driven demeanor to keep register lines moving flawlessly
    while quietly diffusing customer disputes; they thrive on predictable workflows and meticulous inventory checks.
  sports: Jevon Billiot enjoys solitary evening jogs on the city’s river trail, participates in a low‑key Saturday morning running group, and roots for the Chicago Bulls during the NBA season while occasionally
    catching Cubs games on TV; they find collective sports excitement energizing yet still prefer personal exercise routines.
  arts: Jevon Billiot unwinds by listening to Kendrick Lamar’s storytelling verses and SZA’s mellow R&B, streams indie game soundtracks for inspiration, and sometimes attends the church’s gospel choir performances
    for a soulful connection; they appreciate lyrical depth and quiet musical vibes.
  travel: Jevon Billiot prefers low‑stress weekend getaways to calm natural spots like the Great Smoky Mountains and the Oregon Coast, plans trips on a loose spreadsheet, and dreams of a solo cultural tour
    of Kyoto to explore its historic tea houses and gaming arcades; they balance wanderlust with budget constraints.
  culinary: Jevon Billiot cooks simple meals such as stir‑fried chicken with bell peppers, garlic‑infused spaghetti aglio‑e olio, and garden‑fresh herb salads, favoring versatile staples like olive oil,
    garlic, and fresh basil, while occasionally treating themselves to a pepperoni pizza from the neighborhood pizzeria; they enjoy the quiet satisfaction of preparing food from their small garden.
  core: Jevon Billiot is a quietly meticulous 26‑year‑old who thrives on structured routines, silently battles daily worries, and can’t resist a late‑night RPG download despite a habit of forgetting to
    file receipts.
background:
  cultural: Jevon grew up in a middle-class African-American family in the South, where church, family gatherings, and community ties were central. The cultural rhythm of Southern hospitality, respect for
    elders, and a collective spirit shaped his considerate and cooperative disposition. He was exposed to a blend of traditional Southern cuisine and modern Black music, and his education at a state university
    reinforced the value placed on academic achievement within his community. While he embraces the broader American culture of Kannapolis, his identity is anchored in the values of perseverance, mutual
    support, and practicality common to many Black families in the region.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale operation'', ''Customer service'', ''Basic bookkeeping'', ''Microsoft Excel'', ''Inventory tracking'', ''Conflict resolution'', ''Team collaboration'', ''Budgeting
