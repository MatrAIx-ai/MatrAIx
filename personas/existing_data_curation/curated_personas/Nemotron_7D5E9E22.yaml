  hobbies: '[''Reading business and self-help books'', ''Puzzle solving (crossword, sudoku)'', ''Walking/jogging on local trails'', ''Solo gaming (RPGs, strategy games)'', ''Cooking simple meals'', ''Gardening'',
    ''Listening to hip-hop and R&B music'', ''Attending church services'']'
  career_goals: He aims to move beyond the cashier role into supervisory and managerial positions within retail, first pursuing an assistant manager role and then a store manager position where his love
    for routine and practical problem-solving can thrive. In the longer term, Jevon hopes to leverage his business education to oversee district operations or transition into a back-office role in finance
    or operations, possibly obtaining certifications in retail management or accounting. Throughout his career progression, he seeks stable hours and a predictable work environment that support his need
    for low-stress, orderly routines.
