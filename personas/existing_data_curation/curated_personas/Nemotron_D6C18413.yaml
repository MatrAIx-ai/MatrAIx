personas:
  professional: Kevin Fernandez, a budding creative engineer, blends their love for drawing, LEGO building, and exploratory science shows to prototype playful inventions, and they apply an organized yet
    flexible approach and competitive drive to turn imaginative sketches into tangible models.
  sports: Kevin Fernandez thrives as a forward on the Eastside Strikers youth soccer league, idolizes Lionel Messi’s dribbling, cheers for the LA Galaxy during family game nights, and spends weekends sprinting
    drills with friends, while they channel their competitive streak into tracking personal stats on a smartwatch.
  arts: Kevin Fernandez channels their vibrant imagination into cartoon sketches inspired by classic Disney animators and modern creators like Hayao Miyazaki, paints bold murals reminiscent of Keith Haring,
    eagerly explores art tutorials on YouTube, and they often share their latest pieces with classmates during art club.
  travel: Kevin Fernandez prefers family road trips that blend adventure and learning, cherishing past visits to the Grand Canyon and a weekend museum tour in Washington D.C., while they dream of future
    explorations to Tokyo’s anime districts and rainforest canopy tours of Costa Rica, planning each journey with a colorful map and sticky notes.
  culinary: Kevin Fernandez loves helping in the kitchen, expertly mashing avocados for guacamole, whisking together fresh salsa with tomatoes, cilantro, and lime, assembling homemade tacos with grilled
    chicken, yet they consider a grilled cheese sandwich with cheddar their favorite snack, reflecting a blend of culinary curiosity and kid‑friendly comfort.
  core: Kevin Fernandez is a curious, competitive eight‑year‑old who turns every drawing, LEGO set, and soccer game into a chance to outdo themselves, while they juggle a bright imagination with a surprisingly
    disciplined allowance habit.
background:
  cultural: Kevin’s family maintains strong ties to their Mexican heritage while living in Baytown, Texas. He celebrates Día de los Muertos, Las Posadas, and Mexican Independence Day with community events
    featuring mariachi music, folkloric dance, and traditional foods. At home, Spanish and English are spoken interchangeably, giving him a bilingual advantage. His parents share stories of their hometown
    in Mexico, teaching him about Mexican history, cuisine, and values. The multicultural environment of Baytown blends Southern Texas and Mexican cultures, shaping Kevin’s identity and fostering an appreciation
    for both traditions.
