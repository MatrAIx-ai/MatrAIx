  career_goals: James dreams of a future where he can combine his love for building things with a desire to improve his community. He is fascinated by engineering and hopes to become a civil or environmental
    engineer who designs sustainable infrastructure and green spaces in towns like Irwin. He also entertains the idea of working as a wildlife biologist to protect the nearby Appalachians. To achieve these
    goals, he plans to join his high school's robotics club, attend STEM summer camps, and continue developing his coding skills. His ambition is to be a problem-solver who balances innovative ideas with
    practical solutions that benefit his hometown.
