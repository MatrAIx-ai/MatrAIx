  hobbies: '[''LEGO building'', ''Scratch coding'', ''Minecraft exploration'', ''Biking'', ''Soccer'', ''Gardening'', ''Boy Scouts'', ''Reading science-fiction'', ''Watching documentaries'', ''Robotics
