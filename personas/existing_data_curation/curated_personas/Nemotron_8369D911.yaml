personas:
  professional: James Cole is an aspiring young engineer who combines a love of LEGO machine replicas with Scratch coding to prototype simple simulations, balancing curiosity with practicality by meticulously
    planning builds while staying flexible enough to improvise when pieces run out, and they often volunteer to help set up the school science fair, demonstrating cooperative assertiveness and emotional
    steadiness under pressure.
  sports: James Cole is a soccer‑enthusiast who plays forward for the Irwin Youth Soccer Club, cycles the local trails for cardio, proudly cheers for the Pittsburgh Steelers on Sundays, and they balance
    competitive drive with teamwork, often organizing pickup games after school while also enjoying the occasional football game at the high school stadium.
  arts: James Cole is a creative builder who spends weekends designing intricate LEGO mechanisms and crafting custom Minecraft worlds, while also drawing inspiration from sci‑fi authors like Andy Weir,
    listening to the soundtrack of Hans Zimmer, and watching documentaries by director Christopher Nolan, and they let their imagination fuel both structured projects and spontaneous storytelling.
  travel: James Cole prefers family road trips that blend planned stops at historic sites like Gettysburg and Pennsylvania Dutch Country with spontaneous detours to local amusement parks, while dreaming
    of a future visit to the Kennedy Space Center in Florida, and they balance a modest budget with an adventurous curiosity that often leads them to sketch travel itineraries on graph paper during school
    recess.
  culinary: James Cole enjoys the smoky flavor of backyard BBQ ribs and corn on the cob, often helping to harvest tomatoes and zucchini from the family garden to toss into a fresh vegetable pasta sauce,
    and they can reliably make a perfect grilled cheese sandwich with cheddar and a dash of hot sauce, reflecting a budding culinary confidence paired with a love for classic comfort foods.
  core: James Cole is a hands‑on tinkerer who balances methodical LEGO building with spontaneous Minecraft adventures, saves allowance in a piggy bank and a custodial IRA, manages mild allergies with occasional
    forgetfulness, leads on the soccer field while cheering Steelers, draws inspiration from sci‑fi creators, plans road trips mixed with spur‑of‑the‑moment detours, and cooks simple yet tasty meals, all
    while maintaining a practical yet curious outlook and a habit of leaving tools scattered in the garage.
background:
  cultural: James comes from a working-class, white family in Irwin, a small town in Westmoreland County, Pennsylvania. The region's heritage of coal mining and steel production has instilled a strong sense
    of community, hard work, and practicality in his upbringing. Family gatherings often revolve around backyard barbecues, Fourth of July fireworks, and local high-school football games. His parents value
    both academic achievement and hands-on skills, encouraging him to take part in community service and local events. The cultural atmosphere blends traditional Appalachian values with contemporary suburban
    life, giving James a balanced perspective that honors his town's history while embracing new ideas.
