  career_goals: Sahira dreams of becoming a teacher who can design clear, structured learning environments for young children, reflecting her love for order and predictability. She also imagines a future
    as an architect, designing organized spaces, and is interested in a career in educational technology to develop tools that help kids learn bilingually. As she grows, she hopes to combine her passion
    for teaching with her Peruvian heritage by creating culturally inclusive classroom resources.
