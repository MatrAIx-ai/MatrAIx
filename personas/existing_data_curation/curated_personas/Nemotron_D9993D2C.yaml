personas:
  professional: Sahira Zayas, an aspiring young pianist and budding builder, channels her love for structure into disciplined piano practice and meticulous LEGO constructions, foreshadowing a future in
    music and engineering.
  sports: Sahira Zayas is a budding member of the Pilsen Kids Soccer Club who cheerfully dons a Chicago Cubs cap and a Chicago Bulls jersey during weekend games, blending her love for organized team sports
    with the occasional family dance practice that keeps her feet moving.
  arts: Sahira Zayas delights in the piano recordings of Lang Lang, draws inspiration from Eric Carle’s vivid animal illustrations, and giggles while watching the animated adventures of Mickey Mouse Clubhouse,
    letting these artistic influences shape her own sketches of alpaca-filled highlands and her rhythmic play on the keyboard.
  travel: Sahira Zayas prefers family-organized trips with clear itineraries, savoring the rides at Chicago’s Navy Pier, exploring the interactive exhibits at the Museum of Science and Industry, and daydreaming
    about a future adventure to an ancient Andean citadel after a visit to the bustling city where her grandparents reside.
  culinary: Sahira Zayas loves helping her mother prepare the tangy ceviche with fresh lime and ají, layering the colorful potato causa with avocado and cilantro, and sizzling the lomo saltado with tender
    beef and soy sauce, proudly declaring herself an eager junior chef despite occasionally over-spilling the seasoning.
  core: Sahira Zayas is a meticulous seven-year-old who thrives on orderly LEGO builds and piano practice, yet rebels with secret candy raids and occasional missed allergy drops, balancing a quiet confidence
    with a love for family traditions.
background:
  cultural: Sahira is a second‑generation Peruvian‑American raised in Chicago’s multicultural Pilsen neighborhood. At home she speaks both Spanish and English, celebrates Peruvian holidays like Día de la
    Independencia and the Señor de los Milagros festival, and enjoys traditional dishes such as ceviche, causa, and lomo saltado prepared with her family. She attends a bilingual Montessori school that
    values cultural inclusion, where she learns about both Peruvian and American traditions. Her family maintains close ties to relatives in Lima, sharing stories, music, and dance (marinera and festejo)
    during gatherings. Community events at the Chicago Cultural Center, such as the annual Fiesta de la Cultura Peruana, reinforce her connection to her heritage while she navigates life in an American
    urban setting.
