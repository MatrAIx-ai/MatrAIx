    and art museums'']'
  career_goals: Eduardo aims to earn his GED within the next year and enroll in a community college program focused on visual communication or interaction design. He envisions a career as a multidisciplinary
    designer, creating digital artwork, branding, and user‑experience prototypes for startups or creative agencies. Long‑term, he hopes to launch his own freelance studio that combines Mexican cultural
    motifs with contemporary design, offering services such as branding, illustration, and UI/UX consulting. He also wants to mentor other youth from his community, showing them how self‑directed learning
    can open creative pathways.
