personas:
  professional: Eduardo Molina is a budding multidisciplinary designer who combines digital illustration, web prototyping, and Arduino tinkering to create vibrant brand identities, while their methodical
    planning and competitive edge drive project deadlines and community art collaborations.
  sports: Eduardo Molina is an avid skateboarder who spends weekends at the Lake Elsinore Skate Park, follows the LA Galaxy and the LA Lakers, and channels kinetic energy into street‑style tricks while
    maintaining a disciplined strength‑training regimen at a community gym.
  arts: Eduardo Molina immerses themselves in the local arts scene, drawing inspiration from muralists like Shepard Fairey, listening to bands such as The Strokes, Bad Bunny, and Iron & Wine, and regularly
    contributes to collaborative murals that fuse folk motifs with contemporary graphic design.
  travel: Eduardo Molina prefers spontaneous road trips over meticulously planned itineraries, often exploring the desert art installations near Joshua Tree, dreaming of a cultural immersion visit to Barcelona’s
    street‑art districts, and balancing travel ambitions with a part‑time job to fund future trips.
  culinary: Eduardo Molina enjoys cooking comfort food like loaded ramen bowls, spiced chickpea tacos, and experimenting with homemade hot sauce, but their limited kitchen space means they frequently rely
    on quick pan‑seared quesadillas and takeout from the local taco truck for inspiration.
  core: Eduardo Molina navigates life with a blend of vibrant creativity, methodical discipline, and a restless curiosity that fuels both their art‑filled streets and tech‑tinkering desk, all while juggling
    teenage hustle and occasional impulsive splurges.
background:
  cultural: Eduardo grows up in a Mexican‑American household where Spanish and English flow interchangeably. Family celebrations of Día de los Muertos, Mexican holidays, and shared meals of tacos, tamales,
    and pozole keep his heritage alive. He participates in local cultural festivals in Riverside County that showcase Chicano art, graffiti murals, and traditional dance, which influence his artistic style.
    His upbringing blends the warmth of Mexican communal traditions with the eclectic, sun‑baked lifestyle of Southern California, shaping his identity as a bicultural youth who honors his roots while embracing
    contemporary American culture.
