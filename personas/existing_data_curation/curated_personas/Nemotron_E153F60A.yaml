personas:
  professional: David Hibbard, a 23‑year‑old aspiring tradesperson, blends his methodical wood‑working and automotive repair skills with a disciplined, routine‑driven work ethic, making them a reliable
    candidate for a future HVAC or electrical apprenticeship where his precise time‑management and inventory‑tracking abilities shine.
  sports: David Hibbard enjoys low‑key fitness by fishing on Lake Erie with the local Anglers' Club, plays pickup basketball at the community center, and follows the Cleveland Browns, Cleveland Guardians,
    and Cleveland Cavaliers, preferring home‑based viewing to crowded stadiums.
  arts: David Hibbard finds solace in classic rock legends like Led Zeppelin and The Eagles and country icons such as George Strait, often playing vinyl on a vintage turntable while carving furniture, and
    they attend occasional local folk‑music nights featuring artists like Jason Isbell.
  travel: David Hibbard prefers meticulously planned road trips, having recently driven the historic Route 66 to Chicago and dreaming of a summer tour of Yellowstone and the Canadian Rockies, but budget
    constraints keep their adventures within a 500‑mile radius of Lake Erie.
  culinary: David Hibbard cooks practical comfort meals—such as beef stew with carrots, potatoes, and rosemary, homemade meatloaf with a side of garden‑grown tomatoes, and grilled salmon with dill—leveraging
    their hands‑on skill set while rarely dining out, favoring recipes that require measured ingredients and reliable outcomes.
  core: David Hibbard is a routine‑obsessed, quietly competitive 23‑year‑old who channels anxiety into meticulous planning, whether it’s budgeting, woodworking, or mapping out the next fishing trip, yet
    they often over‑schedule to the point of burnout.
background:
  cultural: David grew up in Spencer, a small town in Lorain County, Ohio, within a multigenerational working‑class white family. His upbringing was shaped by Midwestern values of hard work, self‑reliance,
    modesty, and practicality. He was raised in a Protestant (Methodist) environment that emphasized community involvement, family responsibility, and punctuality. Local traditions such as high school football
    games, county fairs, and church picnics were familiar parts of his life. The region’s historical reliance on manufacturing and recent economic shifts have contributed to his awareness of job security
    and his desire for a stable trade career.
attributes:
  skills: '[''Basic automotive maintenance'', ''Hand and power tool operation'', ''Woodworking and furniture repair'', ''Basic computer hardware troubleshooting'', ''Personal budgeting and finance management'',
    ''Time management and scheduling'', ''Inventory tracking for household supplies'']'
  hobbies: '[''Woodworking'', ''Car maintenance and restoration'', ''Fishing'', ''Reading practical handbooks'', ''Chess'', ''Gardening'', ''Listening to classic rock and country music'']'
  career_goals: David aims to obtain his GED within the next year and then enroll in a community‑college trade program, focusing on either HVAC or electrical certification. His primary ambition is to secure
    an apprenticeship that will provide hands‑on experience and a clear pathway to a stable, well‑paid career in the skilled trades. Long‑term, he hopes to become a licensed electrician or HVAC technician,
    eventually starting his own small contracting business to gain independence and financial security. He also wants to establish a dependable daily routine that reduces his anxiety and offers structure,
    allowing him to manage stress more effectively.
