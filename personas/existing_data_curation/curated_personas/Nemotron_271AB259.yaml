personas:
  professional: Penny Gallon leverages three decades of hands‑on construction expertise, from concrete formwork to site safety briefings, to mentor crews, manage material inventories, and lead community
    art installations, all while pursuing a Construction Management Certificate to transition into a supervisory role that emphasizes sustainable, low‑income home remodels and will eventually launch a women‑owned
    subcontracting firm.
  sports: Penny Gallon supports the Dallas Cowboys, follows the Dallas Mavericks, plays tennis in a senior league at the community center, and leads a Saturday morning walking club for seniors, blending
    spirited fandom with gentle fitness routines.
  arts: Penny Gallon contributes construction skills to local mural projects, sings in a gospel choir that celebrates the legacy of Mahalia Jackson, and regularly attends Dallas Museum of Art openings featuring
    contemporary creators such as Kehinde Wiley, using these experiences to inspire both community beautification and personal creativity.
  travel: Penny Gallon enjoys road‑trip adventures, having driven to New Orleans for jazz festivals, explored Big Bend National Park's desert trails, and savored Tex‑Mex delights in San Antonio, while planning
    future visits to Savannah’s historic squares and Oaxaca for cultural immersion, all within a modest retirement budget.
  culinary: Penny Gallon loves preparing gumbo‑style okra stew with garden‑fresh tomatoes and cilantro, then fusing it into chili‑spiced enchiladas, often serving herb‑marinated grilled chicken and cornbread
    at neighborhood potlucks, showcasing a soul‑food and Tex‑Mex fusion palate.
  core: Penny Gallon merges seasoned construction know‑how with a gospel‑filled heart, turning concrete pours into canvases, garden harvests into community feasts, and safety briefings into humming hymn
    verses, all while balancing a modest budget, a love for senior walks, and a habit of sprinkling artistic flair into everyday tasks.
background:
  cultural: Penny was raised in a tight‑knit African‑American family in the Dallas area, where church, family gatherings, and community solidarity were central values. The rich musical traditions of gospel
    and soul music, the celebration of Juneteenth, and the legacy of the civil‑rights movement in Texas have shaped her worldview. Growing up in Garland, she experienced the blend of Southern hospitality
    and urban Dallas culture, which fostered a strong sense of pride in her heritage. Her family’s recipes—collard greens, cornbread, and brisket—are a staple at holidays, and she often shares these dishes
    with friends and neighbors. This cultural grounding informs her compassionate nature, her love for communal art projects, and her commitment to improving the living conditions of her community.
attributes:
  skills: '[''Concrete formwork and finishing'', ''Framing and carpentry assistance'', ''Drywall sanding and finishing'', ''OSHA safety compliance and briefings'', ''Material inventory and delivery coordination'',
    ''Operation of concrete mixers and pneumatic tools'', ''Power‑tool maintenance'', ''Mentoring and crew development'', ''Community art installation support'']'
  hobbies: '[''Gospel choir singing'', ''Community mural painting and installation'', ''Reading African‑American history and art'', ''Visiting Dallas art galleries'', ''Backyard gardening and vegetable
    sharing'', ''Attending Juneteenth and cultural festivals'', ''Cooking classes focused on soul‑food and Tex‑Mex fusion'', ''Leading a senior walking club at church'']'
  career_goals: Penny aims to earn a Construction Management Certificate from the local community college and move into a site‑supervisor role within the next two years. She hopes to combine her practical
    experience with her growing knowledge of sustainable building practices, eventually leading a crew that specializes in energy‑efficient home remodels for low‑income neighborhoods. A long‑term ambition
    is to start a small, women‑owned subcontracting firm that offers both construction services and community‑focused art installations, giving back to the Garland community by creating safe, beautiful
    spaces. She also wishes to become a certified safety trainer to formalize her passion for protecting fellow workers.
