  career_goals: Willette aims to transition from a laborer to a supervisory role, such as crew foreman or site safety coordinator, within the next three to five years. She plans to earn an OSHA Construction
    Safety Trainer certification and take night courses in construction management to complement her associate's degree. Ultimately, she hopes to leverage her experience to start a small residential renovation
    business that allows her to work on projects at a slower, more controlled pace while providing stable income for her retirement.
