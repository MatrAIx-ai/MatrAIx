persona_description: A researcher interested in the health and social conditions of indigenous communities in South America, particularly the Kaingáng people of the Xapecó Indigenous Reserve in Santa Catarina,
  Brazil. This persona is likely to be interested in the health problems faced by the Kaingáng, the health care system in place, and the effectiveness of the clinic in providing treatment and care. They
  may also be interested in the nutritional and sanitary conditions of the Kaingáng, as well as the use of the clinic by adults and the prevalence of infectious and parasitic diseases among the children.
