personas:
  professional: Evemarie Webb, a retired educator turned community arts organizer, channels their imaginative drive and methodical nature into curating senior art workshops, budgeting grant proposals, and
    teaching watercolor collage classes, while their occasional worry fuels meticulous planning for each event, and they find comfort in checking off each task from a handwritten list.
  sports: Evemarie Webb enjoys gentle morning walks with the Lincolnton Senior Trail Club, follows the Charlotte Hornets and Carolina Panthers for occasional excitement, and cheerfully roots for the North
    Carolina Tar Heels during March Madness, while they treat fitness as a calming complement to their artistic routine.
  arts: Evemarie Webb immerses themselves in abstract watercolors inspired by Georgia O'Keeffe’s desert palettes and Mark Rothko’s color fields, creates mixed‑media collages echoing Willem de Kooning’s
    gestural strokes, shares quilting projects with a circle that sings Nora Jones folk standards, and frequently references literary works by Virginia Woolf in their art journaling, while they meticulously
    catalog each piece.
  travel: Evemarie Webb prefers curated, low‑impact trips that blend nature and history, such as weekend drives along the Blue Ridge Parkway, a guided tour of Asheville’s botanical gardens, a nostalgic
    visit to Charleston’s historic district, and a dream pilgrimage to Florence, Italy, where they hope to sketch the Arno River while savoring gelato, all planned with careful budgeting and a detailed
    itinerary.
  culinary: Evemarie Webb delights in cooking classic shrimp and grits and collard greens seasoned with smoked ham hocks, yet they eagerly experiment with Thai green curry using lemongrass, kaffir lime,
    and heirloom tomatoes, balancing their culinary repertoire with a modest garden harvest of basil and rosemary.
  core: Evemarie Webb blends boundless imagination with meticulous organization, turning worry into productive artistic projects while they nurture a garden of wildflowers and a mind full of poems.
background:
  cultural: Evemarie grew up in a small Piedmont town in North Carolina during the 1950s and 60s, immersed in Southern hospitality and Methodist church traditions. Her family lineage traces back to Appalachian
    settlers, fostering a deep appreciation for storytelling, self‑reliance, and community involvement. Local customs such as seasonal festivals, church gatherings, and homegrown food have shaped her values.
    The Southern emphasis on oral history fuels her interest in genealogy and memoir writing, while the region’s respect for nature influences her gardening and birdwatching hobbies. Though rooted in her
    cultural heritage, she remains open to novel ideas and artistic experimentation, reflecting her intellectually curious personality.
