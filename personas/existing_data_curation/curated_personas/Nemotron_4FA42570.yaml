  hobbies: '["Abstract watercolor painting", "Charcoal sketching", "Reading (fiction, philosophy, nature)", "Gardening (native wildflowers, herbs)", "Birdwatching", "Crossword puzzles and Sudoku", "Genealogy
    research", "Senior book club", "Quilting circle", "Volunteer art teaching", "Cooking Southern cuisine"]'
  career_goals: Even in retirement, Evemarie sets ambitious creative goals. She aims to mount her first public art exhibition at the Lincolnton Public Library within the next two years, featuring a series
    of abstract watercolors inspired by the local landscape. She also plans to compile a family memoir that weaves together her genealogy discoveries with reflections on Appalachian heritage, and hopes
    to self‑publish it. Additionally, she wants to launch a mentorship circle for senior artists, offering workshops and one‑on‑one guidance to younger community members. Securing a small grant to create
    a community garden with artistic installations that promote mindfulness and connection is another key ambition. These pursuits allow her to channel her curiosity, organization skills, and desire for
    novel experiences while managing her occasional worry through purposeful activity.
