  career_goals: Hoping to become a senior cost estimator within the next three years, Kevin aims to acquire certifications such as the Certified Professional Estimator (CPE) and AACE's Certified Cost Professional.
    He aspires to lead a cost‑control team for large‑scale mixed‑use developments in the Las Vegas area, championing data‑driven estimation methods and experimenting with AI‑enabled forecasting tools. In
    the longer term, he envisions establishing his own consultancy that advises developers on sustainable, cost‑effective construction practices while maintaining the flexibility to explore innovative costing
    frameworks.
