  career_goals: While still in early childhood, Jose expresses budding interests that hint at future aspirations. He frequently mentions wanting to "draw big pictures" and "make things that move," showing
    a clear attraction to creative and hands‑on fields. He dreams of becoming an artist or a community helper who can share stories and bring joy to others. As he grows, he is likely to pursue activities
    that allow him to explore new ideas, create visually striking works, and engage with people in lively, expressive settings.
