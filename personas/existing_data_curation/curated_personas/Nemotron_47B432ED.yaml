personas:
  professional: Jose Velazquez is a two-year-old mini-architect who arranges building blocks into precise towers while whimsically deconstructing them for novel designs; they captivate an audience of parents
    and siblings with talkative explanations and a competitive drive to build the tallest structure.
  sports: Jose Velazquez is a two-year-old energetic member of the Little Tots Soccer Club who loves kicking a soft orange ball at the neighborhood park, proudly wears a miniature Los Angeles Dodgers cap
    to each practice, and competes eager ly with peers to be the first to score a goal, while occasionally demanding a turn on the swing set after games.
  arts: Jose Velazquez is a two-year-old who delights in the bright melodies of Sesame Street, claps along to the catchy tunes by Lin-Manuel Miranda from Moana, and browses oversized picture books featuring
    the abstract swirls of Yayoi Kusama, and they often reenact scenes with exuberant gestures that draw cheers from family members.
  travel: Jose Velazquez is a two-year-old who has already marveled at the playful penguins at the San Diego Zoo, giggled on a family road trip to the Grand Canyon, and now dreams of exploring Tokyo's Disneyland,
    and they point excitedly at pictures of cherry blossoms and colorful parades in travel books.
  culinary: Jose Velazquez is a two-year-old with a strong affection for cheesy macaroni, sweet banana slices, and crisp carrot sticks, they can expertly stir a spoonful of peas under mom's watchful eye,
    yet they stubbornly hide broccoli under their plate, refusing to try it despite gentle encouragement.
  core: Jose Velazquez is a two-year-old whirlwind of imaginative curiosity and competitive spirit, they thrive on attention, meticulously arranging toys yet gleefully overturning them, and occasionally
    battling stubbornness over snack choices.
background:
  cultural: Jose is raised in a Mexican‑American household in Pharr, Texas, a community enriched by cross‑border traditions. He grows up bilingual, hearing both Spanish and English at home, and is immersed
    in cultural practices such as celebrating Día de los Muertos, enjoying mariachi music, and partaking in family meals featuring tacos, tamales, and other Mexican dishes. This cultural blend nurtures
    his appreciation for vibrant colors, rhythmic sounds, and strong community ties, influencing his playful imagination and sociable nature.
