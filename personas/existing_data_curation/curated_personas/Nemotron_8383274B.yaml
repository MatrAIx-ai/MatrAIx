  hobbies: '[''abstract painting'', ''creative writing (poetry and short stories)'', ''book club (speculative fiction)'', ''community theater involvement'', ''hiking and birdwatching in the Appalachians'',
    ''herb gardening'', ''yoga and meditation'', ''cooking with local produce'', ''handmade jewelry crafting'', ''board‑game nights'']'
  career_goals: Kayla aims to re-enter the workforce by turning her artistic passions into a sustainable livelihood. She envisions opening a small community art studio that offers workshops and classes,
    fostering creativity among local residents. Long‑term, she aspires to earn a certification in art therapy, enabling her to combine her empathy and artistic skills to support individuals coping with
    stress and anxiety. She also hopes to secure a part‑time position as a community arts coordinator for a local non‑profit, where she can blend event planning, outreach, and creative programming. Overcoming
    her tendency toward worry, Kayla is committed to building confidence as a leader in community initiatives and to creating a stable income stream that aligns with her love of novelty and collaboration.
