personas:
  professional: Bruce Glenn, a budding teen technophile, channels their love for structured challenges into aspiring mechanical engineering projects, building intricate LEGO Technic models and coding modest
    scripts, while meticulously documenting progress in a bullet‑journal, showcasing an early blend of hands‑on design and analytical thinking.
  sports: Bruce Glenn, while preferring solitary pursuits, avidly follows the New York Knicks and the Westchester County Soccer Club, participates in a local after‑school walking club that explores nearby
    woods for nature sketches, and maintains a light fitness routine consisting of weekend bike rides and occasional pick‑up basketball games with a close friend.
  arts: Bruce Glenn immerses themselves in the arts through sci‑fi literature by authors like Isaac Asimov, soundtrack appreciation for composers such as Hans Zimmer, and fan‑level admiration of visual
    artist Syd Mead, while also dabbling in digital art by creating concept sketches of imagined spacecraft during quiet evenings.
  travel: Bruce Glenn dreams of traveling to the Kennedy Space Center and the European Space Agency’s ESA Visitor Centre after meticulously planning each trip in a spreadsheet, enjoys school field trips
    to the American Museum of Natural History, and favors quiet, nature‑filled getaways to places like the Catskill Mountains where they can sketch and reflect.
  culinary: Bruce Glenn prefers simple, structured meals like perfectly timed mac‑and‑cheese, enjoys experimenting with space‑themed snacks such as astronaut ice cream, and occasionally attempts to bake
    a precise batch of chocolate chip cookies, always measuring ingredients with a digital scale to satisfy their love of order.
  core: Bruce Glenn is a methodical teen who blends a love for solitary STEM hobbies with meticulous self‑care routines, yet battles intense anxiety that colors every facet of daily life.
background:
  cultural: 'Bruce grew up in Yorktown Heights, a suburban community in Westchester County with a predominantly white, middle‑class demographic. His family’s cultural frame reflects typical American suburban
    values: an emphasis on education, personal responsibility, and community involvement. He celebrates holidays such as Independence Day and Thanksgiving with extended family gatherings, although his preference
    for solitude means he often observes these events more passively. The local school district’s emphasis on STEM programs and extracurricular clubs has shaped his interest in technology and structured
    hobbies. While his ancestry is primarily of Northern European descent, his household incorporates a mix of contemporary American and regional cultural influences, from local historical sites related
    to the Revolutionary War to community volunteer events.'
