  career_goals: Although still early in his academic journey, Bruce is drawn to careers that combine logical structure, independent work, and clear outcomes. He aspires to become a software developer or
    data analyst, imagining a future where he can design and troubleshoot computer programs from a quiet, focused environment. He also entertains the idea of pursuing a technical trade such as engineering
    technology, where precise schematics and methodical processes appeal to his need for predictability. In the short term, he aims to earn a certification in introductory coding, such as a Code.org or
    Scratch badge, and participate in a summer STEM camp to solidify his foundational knowledge.
