  career_goals: Carissa envisions a future where she can combine her love for helping others with her organizational talents. She aims to pursue a degree in psychology or social work at a community college
    and later transfer to a university, with the long‑term goal of becoming a high school guidance counselor or community outreach coordinator for a youth‑focused nonprofit. She is also intrigued by the
    possibility of building a personal brand as a teen wellness influencer, using social media to share mental‑health tips, study strategies, and uplifting content for her peers. In any career path she
    chooses, Carissa hopes to remain engaged with her local community in Plano, fostering supportive environments for young people.
