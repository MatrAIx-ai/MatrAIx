personas:
  professional: Carissa Sherry is a budding student organiser who channels her practical mindset into scheduling the school dance club's rehearsals and coordinating the youth soccer team's logistics, often
    drafting detailed weekly plans that get scrambled by spontaneous after-school hangouts, yet their knack for rallying peers keeps projects moving forward.
  sports: Carissa Sherry plays forward for the Riverside Rovers youth soccer squad, practices drills at the local park, and cheers loudly for FC Dallas during the MLS season, while also enjoying weekend
    bike rides and informal pick-up games with friends.
  arts: Carissa Sherry finds creative expression in hip-hop and contemporary dance routines with the school crew, while binge-listening to Doja Cat, Lil Nas X, and BTS, devouring YA novels like "One of
    Us Is Lying" and crafting short stories that blend teen angst with whimsical humor.
  travel: Carissa Sherry loves spontaneous weekend getaways to nearby state parks for bike rides and picnics, dreams of road-tripping to the Grand Canyon, and hopes to experience the cherry blossoms in
    Kyoto, all while balancing schoolwork and a modest travel allowance.
  culinary: Carissa Sherry enjoys whipping up simple recipes such as avocado toast, mango smoothies, pepperoni pizza, and chocolate-chip cookies, experimenting with toppings and flavors in the kitchen while
    often improvising with whatever ingredients are on hand in the house.
  core: Carissa Sherry is a sociable teen who blends a love for structured group projects with a penchant for spontaneous TikTok antics, often forgetting homework but meticulously planning the next group
    hangout.
background:
  cultural: Carissa grew up in a middle‑class, predominantly white suburban neighborhood in Plano, Texas, a city known for its blend of Southern hospitality and modern, diverse influences. Her family celebrates
    traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July with communal gatherings, backyard barbecues, and fireworks. While her immediate cultural upbringing reflects typical
    Texan values—friendliness, community involvement, and a strong work ethic—she has also been exposed to the multicultural fabric of the Dallas‑Fort Worth Metroplex, enjoying foods like tacos and tamales
    at local festivals and participating in school events that highlight diverse cultures. This mix of regional traditions and broader cultural exposure informs her sense of identity and her appreciation
    for community diversity.
