  hobbies: '[''Gardening'', ''Bridge and card games'', ''Church choir singing'', ''Book club reading'', ''Hiking'', ''Knitting'', ''Cooking for family gatherings'', ''Hosting potluck events'', ''Volunteering
    at community festivals'']'
  career_goals: Although retired, Suzan aims to deepen her involvement with the local senior center by becoming a program coordinator and launching a mentorship program that pairs younger volunteers with
    seniors. She also aspires to document her family’s history in a memoir, learn more advanced digital tools to stay connected with grandchildren, and advocate for senior‑friendly community initiatives
    in Pierre.
