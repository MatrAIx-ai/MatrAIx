personas:
  professional: Suzan Park, a retired community organizer with a knack for event planning, uses their practical mindset and strategic card‑playing skills to coordinate senior‑center programs, mediate volunteer
    disputes, and launch a mentorship initiative that pairs young helpers with seniors in Pierre, and they relish the chance to shape community life.
  sports: Suzan Park hikes the Niobrara River trail each summer, joins a local walking club that meets on Tuesdays, and they cheer on the South Dakota State Jackrabbits football team from their porch during
    fall games, blending gentle exercise with spirited fandom.
  arts: Suzan Park sings in their church choir, delights in the timeless folk ballads of Johnny Cash and the soaring harmonies of the Mormon Tabernacle Choir, and they stitch intricate blankets inspired
    by Faith Ringgold’s patterns, weaving these artistic passions into their evenings at the book club.
  travel: Suzan Park prefers planned weekend getaways to the Badlands and Black Hills, where they photograph sunrise over the granite spires, yet they also embrace spontaneous road trips to visit their
    grandchildren in Minnesota, balancing a love for nature with family ties despite a modest travel budget.
  culinary: Suzan Park orchestrates family feasts featuring garden‑fresh heirloom tomato bruschetta, rosemary‑roasted chicken, and a riverside‑inspired shrimp étouffée, while they expertly season dishes
    with fresh basil, garlic, and a pinch of smoked paprika, showcasing both a love for large‑scale cooking and a modest culinary expertise.
  core: Suzan Park, a 78‑year‑old garden‑tending, bridge‑strategist who blends schedule‑driven planning with spur‑of‑the‑moment potluck gatherings, they channel their skeptical yet sociable nature into
    community leadership while never missing a chance to plant sunflowers on a rainy morning.
background:
  cultural: Suzan grew up in a mid‑western white family in South Dakota, where community, self‑reliance, and church life shaped her values. The rural setting fostered a strong sense of neighborly responsibility
    and a practical, hands‑on approach to problem‑solving. Her cultural background emphasizes modesty, perseverance, and participation in local traditions such as county fairs, church socials, and volunteer
    service, all of which continue to influence her daily life in Pierre.
