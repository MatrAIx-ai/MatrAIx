persona_description: A science educator who believes in the importance of integrating inquiry-based, student-centered teaching practices and emphasizes the need for professional learning opportunities to
  support teachers in adopting such approaches. This individual is open to making changes to the NGSS to better align with their preferred pedagogical approach, but is cautious about tinkering with the
  document's overall purpose and adherence to the NSTA Position Statements. They recognize the importance of incorporating performance expectations into the NGSS to provide clear expectations for student
  learning, but also recognize that this would limit the flexibility of the curriculum. This persona is interested in exploring ways to improve the NGSS while still maintaining its core purpose and alignment
  with the NSTA Position Statements.
