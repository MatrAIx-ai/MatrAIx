  career_goals: Betty dreams of becoming someone who creates and shares art and ideas with the world. She imagines a future as an illustrator or museum curator who discovers new artworks, as a young scientist
    exploring space and nature, or as a tech inventor who designs simple games for kids. Her competitive spirit fuels a desire to excel in school science fairs and art contests, while her love for solitude
    drives her toward careers that allow deep focus, such as research, design, or digital storytelling.
