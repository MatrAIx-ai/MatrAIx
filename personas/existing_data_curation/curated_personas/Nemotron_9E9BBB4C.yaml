personas:
  professional: Betty Smith is a budding junior inventor who merges their love for Lego engineering, ScratchJr storytelling, and methodical planning into detailed prototype models, often entering school
    invention fairs where their competitive streak secures top placements.
  sports: Betty Smith enjoys weekly gymnastics sessions at the local Little Tots Gymnastics studio and plays on the Pearland Tigers Soccer Club’s under‑7 team, while cheering for the Houston Astros during
    spring games and the Houston Rockets in the winter, practicing a disciplined routine that balances competitive drills with solitary backyard nature walks.
  arts: Betty Smith channels their love for vibrant colors into watercolors inspired by Jacob Lawrence’s dynamic scenes, while practicing simple piano melodies of Stevie Wonder and humming gospel hymns
    reminiscent of Mahalia Jackson during church gatherings, and they frequently re‑create these influences in storybooks illustrated with bold, rhythmic strokes.
  travel: Betty Smith prefers family‑planned road trips that balance structured museum visits—such as the Space Center Houston and the Houston Museum of Natural Science—with leisurely stops at quiet beaches
    like South Padre Island, and they dream of a future trip to the Kennedy Space Center in Florida to see real rockets up close.
  culinary: Betty Smith loves the comforting taste of collard greens and homemade cornbread served at family gatherings, enjoys helping to stir the batter for banana bread, and often snacks on apple slices
    with peanut butter, while proudly mastering the art of making a perfect grilled cheese sandwich with cheddar and a hint of paprika.
  core: Betty Smith is a quiet, methodical six‑year‑old whose fierce curiosity fuels endless Lego creations, yet they sometimes hoard allowance in a clear jar and forget to wear sunscreen during sunny backyard
    explorations.
background:
  cultural: Betty is raised in a close‑knit Black family in Pearland, Texas, where community, faith, and family traditions play pivotal roles. Her grandparents share stories of Southern African‑American
    heritage, celebrating Juneteenth, soul music, and home‑cooked meals like collard greens and cornbread. Local church gatherings provide a space for singing gospel hymns and learning about cultural history.
    Betty’s parents encourage her curiosity through visits to the Houston Museum of Natural Science and community art workshops, fostering an appreciation for African‑American artists and scientists. These
    cultural influences shape her worldview, artistic preferences, and aspirations.
