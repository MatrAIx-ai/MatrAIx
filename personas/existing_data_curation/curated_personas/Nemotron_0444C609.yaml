personas:
  professional: Dayanand Wahid is an 11‑year‑old aspiring engineer who channels his methodical curiosity into building intricate LEGO sculptures, coding Scratch games, and designing Arduino garden sensors,
    all while applying the disciplined work ethic learned from community mentorship and Sunday gospel gatherings.
  sports: Dayanand Wahid, a devoted member of the Helena community center youth basketball league, devotes his weekends to pickup games where he channels his competitive drive, idolizes the Arkansas Razorbacks,
    and tracks his shooting percentages in a notebook just as he tracks his LEGO builds.
  arts: Dayanand Wahid immerses himself in the soulful sounds of Nina Simone, the raw blues of Muddy Waters, and the lyrical flow of Kendrick Lamar, using these rhythms as inspiration for his Scratch game
    soundtracks and the narrative storytelling woven into his elaborate LEGO dioramas.
  travel: Dayanand Wahid prefers meticulously planned weekend outings, such as bird‑watching expeditions in the nearby bayous, family road trips to Memphis to explore Beale Street's musical heritage, and
    a coveted summer adventure to the Great Smoky Mountains, balancing his curiosity with the limited budget of an 11‑year‑old.
  culinary: Dayanand Wahid enjoys helping his family prepare classic soul‑food dishes like fried catfish with cornmeal crust, collard greens simmered with smoked turkey, and buttery cornbread, while his
    own kitchen experiments often involve seasoning his garden‑grown tomatoes with fresh basil and a pinch of cayenne pepper.
  core: Dayanand Wahid is a methodical 11‑year‑old tinkerer who balances a quiet, competitive spirit with a love for LEGO, code, and soulful music, while staying remarkably calm and organized in both school
    and play.
background:
  cultural: Dayanand grew up in a close‑knit African‑American family in Helena, a town with deep roots in the Mississippi Delta region of Arkansas. Family life often centers around Sunday gospel services,
    soul‑food meals, and storytelling that conveys histories of resilience and community solidarity. Musical traditions from his grandparents—spirituals, blues, and contemporary hip‑hop—fill the household
    and shape his appreciation for rhythm and expression. The local black community places strong emphasis on education, mentorship, and mutual support, reinforcing his respect for elders and his desire
    to give back. While he prefers solitude and small groups, the cultural values of perseverance, collective progress, and calm confidence inform his competitive spirit and methodical approach to challenges.
