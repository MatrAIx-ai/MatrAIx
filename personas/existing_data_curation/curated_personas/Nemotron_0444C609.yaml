  hobbies: '[''LEGO building'', ''Scratch game development'', ''Arduino tinkering'', ''Reading science biographies'', ''Documentary watching'', ''Birdwatching'', ''Garden plot maintenance'', ''Basketball
    with a small group'']'
  career_goals: He envisions a future where he can combine his love for technology with community impact, aiming to become a software engineer or robotics specialist who designs tools that improve farming
    efficiency in rural Arkansas. He also dreams of contributing to STEM education in his hometown by leading after‑school clubs and mentoring younger students. His competitive drive pushes him to set ambitious
    milestones, such as winning a state‑level coding competition or earning a scholarship for an engineering program.
