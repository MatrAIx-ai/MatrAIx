persona_description: A researcher, historian, or genealogist interested in the history and culture of Native Americans, particularly in the context of Catholic evangelization and mission work among the
  Ojbwa and Métis in the Pembina, North Dakota area. This person is likely to have an interest in the history of the Assumption of the Blessed Virgin Mary Church and school, the Catholic evangelization
  among the Ojbwa and Métis, and the contributions of Catholic missionaries and leaders like Reverend Julius M. Belleau. They may also be interested in the broader context of Christianity and Native America,
  as well as the impact of Catholicism on American Indian communities.
