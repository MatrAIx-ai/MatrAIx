personas:
  professional: Wesley Perry, an aspiring digital illustrator and budding graphic designer, merges hand‑drawn sketches with free‑software tools like GIMP and Krita while using basic HTML/CSS to build immersive
    online portfolios that spotlight mental‑health narratives, channeling their meticulous planning and spontaneous creativity into client projects and freelance commissions.
  sports: Wesley Perry, a laid‑back fitness enthusiast, enjoys weekend hikes in the nearby Shawnee hills, occasional yoga at the community center, and follows the Chicago Cubs and Chicago Bulls, while playing
    in a casual local soccer league.
  arts: Wesley Perry, a dedicated creator, spends free time drawing surreal sketches, experimenting with digital painting on GIMP, strumming acoustic guitar covers of John Mayer and Bon Iver, photographing
    Murphysboro’s historic downtown, and drawing inspiration from Hayao Miyazaki, Shaun Tan, Neil Gaiman, and local muralists, while actively participating in library workshops and board‑game evenings.
  travel: Wesley Perry, an introspective traveler, prefers modest road trips to scenic spots like the Shawnee National Forest, historic Galena, and vibrant New Orleans, planning routes with sketch‑filled
    notebooks and balancing curiosity with a limited teen budget that often requires careful saving.
  culinary: Wesley Perry, a modest home‑cook, loves crafting mushroom risotto, skillet‑baked cornbread, and apple‑cinnamon crumble, experiments with Korean bibimbap after watching online tutorials, and
    frequently fuels late‑night art sessions with trail‑mix and latte‑style coffee.
  core: Wesley Perry, a quietly intense 17‑year‑old artist, channels emotional turbulence into vivid illustrations and acoustic melodies, juggling tight budgets, anxiety, and a relentless curiosity for
    new ideas.
background:
  cultural: Wesley grew up in Murphysboro, a small city in southern Illinois with deep Midwestern roots. His family background reflects a conventional white, working-class Midwestern culture, where values
    such as modesty, self-reliance, and community service are emphasized. He was raised in a Protestant environment, most likely attending a local Methodist or Baptist church, where weekly gatherings, potlucks,
    and seasonal celebrations formed part of his social fabric. Murphysboro's proximity to Southern Illinois University Carbondale exposed him to a modest but active arts scene, including community art
    classes, local gallery openings, and the county fair. These influences blend traditional Midwestern sensibilities with an emerging curiosity about broader cultural and artistic ideas accessed through
    the internet.
