  career_goals: His primary ambition is to turn his artistic talent into a sustainable career. He plans to earn his GED within the next year, then enroll in an associate-degree program in graphic design
    or digital media at a community college or at Southern Illinois University Carbondale. While studying, he intends to build a professional portfolio that blends illustration, web design, and storytelling.
    After graduation he hopes to secure a junior graphic designer or freelance illustration role, eventually specializing in visual projects that raise awareness about mental-health issues. Long-term, he
    envisions combining his art with peer-support work, perhaps as an art therapist or community outreach coordinator, using creativity to help other emotionally sensitive youths.
