  hobbies: '[''Watercolor Painting'', ''Nature Photography'', ''Reading Contemporary Fiction'', ''Book Club Participation'', ''Gardening'', ''Yoga and Meditation'', ''Cooking New Recipes'', ''Volunteer
    Reading Programs'', ''Attending Local Art Exhibits'', ''Creative Writing Workshops'']'
  career_goals: Kelly aims to re‑enter the education sector as a curriculum specialist or instructional coordinator, focusing on integrating the arts into STEM subjects to create STEAM learning experiences
    for rural schools. She plans to pursue a master's degree in Educational Leadership within the next two years, preparing her for future roles as a school administrator or district‑level consultant. Kelly
    also aspires to launch a community‑based art education program that offers workshops, after‑school classes, and mentorship opportunities for youth in Waynesville. In parallel, she is interested in freelance
    educational content creation, developing online modules that blend pedagogy with creative expression. Ultimately, she seeks a career that merges her methodical expertise with her passion for art and
    lifelong learning.
