personas:
  professional: Kelly Griffin, a 37‑year‑old aspiring curriculum specialist, blends their methodical expertise in instructional design and data‑driven assessment with a deep curiosity for the arts, regularly
    crafting STEAM lesson plans that seamlessly integrate watercolor projects and photography assignments while quietly championing inclusive, small‑group learning environments.
  sports: Kelly Griffin enjoys early‑morning hikes on the Ozark trails, participates in a local yoga circle at the Waynesville Community Center, roots for the St. Louis Cardinals in baseball, follows the
    St. Louis Blues in hockey, and occasionally joins the amateur “Ozark Trailblazers” running club for 5‑k races, balancing solitary nature walks with occasional team‑spirit game nights that they relish.
  arts: Kelly Griffin fills their weekends with watercolor landscapes reminiscent of Georgia O’Keeffe’s desert palettes, captures sunrise architecture through a Nikon D5600 inspired by Ansel Adams, discusses
    contemporary fiction by Chimamanda Ngozi Adichie at their book club, and finds solace in listening to Bon Iver while curating a modest collection of prints by local Missouri artist Sarah Howe, an activity
    they cherish.
  travel: Kelly Griffin prefers meticulously planned road trips that blend quiet retreats with cultural stops, having recently explored the Great Smoky Mountains’ misty overlooks, the historic streets of
    Savannah, Georgia, and a weekend art‑focused getaway to Santa Fe, New Mexico, while dreaming of a solo photography pilgrimage to the lavender fields of Provence, a journey they hope to embark on next
    summer.
  culinary: Kelly Griffin’s kitchen experiments often feature farm‑to‑table creations like pan‑seared trout with lemon‑basil butter, roasted beet and goat‑cheese salad drizzled with local honey, and a spicy
    miso‑tofu stir‑fry that showcases heirloom tomatoes, fresh mint, and a dash of smoked paprika, though they admit to over‑salting the occasional sauce when a new recipe excites them.
  core: Kelly Griffin is a quietly driven educator‑artist who meticulously plans every curriculum and garden bed, indulges in late‑night watercolor sessions, and habitually forgets to water succulents when
    a new book captures their attention, a quirk they attribute to their love of stories over seedlings.
background:
  cultural: Kelly was raised in a modest, middle‑class family in central Missouri, absorbing the values of small‑town Midwestern life such as community involvement, self‑reliance, and politeness. As a White
    American, her cultural heritage includes traditional American holidays, church gatherings, and a strong connection to the local landscape, which fostered her love for nature and outdoor activities.
    Growing up near Waynesville, she experienced a blend of military‑influenced diversity due to nearby Fort Leonard Wood and the close‑knit rural community, shaping an appreciation for both structured
    discipline and informal neighborly support. These cultural influences inform her respectful communication style, commitment to community service, and comfort navigating both conventional and unconventional
    ideas.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Instructional Design'', ''Educational Technology Integration'', ''Assessment Design'', ''Classroom Management'', ''Differentiated Instruction'',
