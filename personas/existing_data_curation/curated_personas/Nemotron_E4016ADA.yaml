  hobbies: '[''Reading (Mystery & Historical Fiction)'', ''Journaling'', ''Gardening'', ''Solo Hiking'', ''Baking'', ''Crossword and Sudoku Puzzles'', ''Yoga and Meditation'', ''Nature Photography'', ''Documentary
