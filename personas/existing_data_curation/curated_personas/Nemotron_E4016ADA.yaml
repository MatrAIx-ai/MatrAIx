  career_goals: Diane’s career aspirations center on deepening her expertise in structured administrative work while securing a role that offers predictability and supportive boundaries. In the next few
    years she plans to obtain the Certified Administrative Professional (CAP) credential and achieve advanced Microsoft Office Specialist certifications. She aims to transition into a senior office‑manager
    or administrative coordinator position within a school district or nonprofit organization, where her education background can be leveraged and clear procedural guidelines are valued. Long‑term, she
    envisions launching a virtual assistance consultancy that allows her to design a highly organized, low‑stress workflow and serve other professionals seeking reliable administrative support.
