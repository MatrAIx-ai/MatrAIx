  career_goals: Even in her later years, Olivia aims to leave a lasting legacy by mentoring the next generation of health‑service managers and championing rural health initiatives. She seeks to strengthen
    the local hospital’s advisory board, expand outreach programs that serve seniors in Norton, and secure additional funding for preventive care services. Additionally, she hopes to author a practical
    guide on managing healthcare operations in small‑town settings, sharing her practical insights and fostering continuity of compassionate care in her community.
