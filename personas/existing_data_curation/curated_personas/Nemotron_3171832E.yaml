personas:
  professional: Axel Balbona, a newborn explorer with a vivid imagination and relentless curiosity for shapes, spends hours tracing the colorful patterns on a mobile, laying the groundwork for a future
    in visual design while their talkative, sociable nature turns each feeding session into a lively conversation, hinting at a collaborative, communication‑rich career path.
  sports: Axel Balbona, a newborn wrapped in a tiny New York Knicks onesie, enjoys gentle weekly Aqua Tots swim lessons that foster motor development, kicks a soft infant soccer ball at home, and watches
    the Boston Red Sox with the family on Sundays, cultivating early enthusiasm for professional team sports.
  arts: Axel Balbona, a newborn surrounded by rotating classic picture books and lulled by Beethoven, Mozart, and contemporary composer Ludovico Einaudi, also gazes at nursery walls adorned with prints
    of Claude Monet and a plush replica of Van Gogh’s ‘Starry Night’, nurturing an innate love for abstract art and music.
  travel: Axel Balbona, a newborn who has already visited the Grand Canyon on a weekend family hike, flown to San Diego for a beach stay, and enjoyed a calm cruise to the Bahamas, all meticulously planned
    around nap and feeding schedules, reflecting a blend of adventurous curiosity and parental practicality.
  culinary: Axel Balbona, a newborn whose palate delights in smooth purees of sweet potato, avocado, and organic apple with a hint of cinnamon on oatmeal, relies on parents who craft homemade baby meals
    with fresh carrots and lentils, showcasing an early appreciation for natural flavors.
  core: Axel Balbona, a newborn who greets each sunrise with lively coos, craves bright colors, thrives on caregiver interaction, and subtly follows a carefully structured routine, marrying boundless imagination
    with a budding sense of order.
background:
