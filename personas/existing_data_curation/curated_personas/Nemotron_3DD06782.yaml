personas:
  professional: Margarita Colon, a seasoned painter and paperhanger in Berks County, combines meticulous surface preparation, eco‑friendly finish expertise, and a competitive drive to lead small crews while
    pursuing contractor licensure and a niche in historic‑home restoration.
  sports: Margarita Colon charges onto the community center’s pickleball courts, trails the Blue Mountain hills on weekends, chants for the Reading Fightin Phils and the Philadelphia Eagles, and infuses
    her salsa dancing with a competitive edge.
  arts: Margarita Colon blends her love for bold, rhythmic patterns with a deep appreciation for Diego Rivera’s murals, the salsa sounds of Celia Cruz, and local folk art, often leading youth workshops
    where she teaches basic painting techniques while experimenting with custom wall designs.
  travel: Margarita Colon prefers organized road trips, having explored the Blue Ridge Parkway, the historic streets of New Orleans during Mardi Gras, and the art‑laden alleys of Barcelona, while she schedules
    weekend getaways to the Pocono Mountains for hiking and relaxation despite a busy work calendar.
  culinary: Margarita Colon whips up traditional mofongo and arroz con gandules with a signature sofrito blend, often experimenting with fusion creations like plantain‑crusted taco shells, and delights
    in pairing her dishes with adobo‑spiced pork and fresh cilantro garnish.
  core: Margarita Colon navigates life with a structured, competitive spirit, balancing a methodical work ethic and community salsa vibes, a habit of late‑night craft coffee, and an occasional tendency
    to over‑schedule her weekends.
background:
  cultural: Margarita was born to Puerto Rican parents and grew up bilingual, speaking both Spanish and English. She carries the island’s vibrant cultural traditions—music, dance, and festive food—into
    her daily life, celebrating holidays such as Nochebuena and the Three Kings Day with family and friends in Reading. Her heritage informs her eye for bold colors and rhythmic patterns, which she sometimes
    incorporates into custom wall designs. Though never married, she maintains strong ties to the local Latino community through church groups and cultural organizations, balancing her Puerto Rican roots
    with the practical, structured lifestyle of a working‑class professional in Berks County.
attributes:
  skills: '["Interior painting", "Exterior painting", "Surface preparation", "Color matching", "Paper hanging", "Wallpaper installation", "Custom wall coverings", "Project estimating", "Time management",
    "Team coordination", "Safety compliance (OSHA)", "Use of spray equipment", "Touch‑up and finishing", "Customer service", "Basic design principles", "Eco‑friendly paint knowledge"]'
  hobbies: '["Salsa dancing", "Cooking Puerto Rican cuisine", "Reading mystery novels", "Hiking the Blue Mountain trails", "Playing pickleball", "Volunteering at community festivals", "Landscape gardening",
    "DIY home improvement projects"]'
  career_goals: Margarita aims to become a licensed contractor and eventually launch her own painting and paper‑hanging business that specializes in historic‑home restoration and sustainable finishes. She
    is pursuing certification in lead‑paint removal and advanced spray‑painting techniques to differentiate herself in the Berks County market. Driven by competition, she plans to expand her service area,
    secure larger commercial contracts, and mentor other women entering the trade. Long‑term, she envisions opening a hands‑on training workshop that blends practical skills with project‑management fundamentals,
    positioning herself as a respected industry leader in the region.
