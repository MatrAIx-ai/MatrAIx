persona_description: A zoologist who specializes in the study of sea-squirts, particularly those that are the subject of Paul Kammerer's experiments in the early twentieth century. Kammerer's work on sea-squirts
  demonstrated the ability of organisms to transmit characteristics to their offspring, and Kammerer's experiments on sea-squirts are still referenced in the field of zoology today. The persona is likely
  to be interested in the study of genetics and the mechanisms by which organisms transmit traits to their offspring. They may also be interested in the field of zoology and the history of scientific research
  in that field.
