persona_description: A health and physical education (PHE) teacher who is passionate about promoting physical, cognitive, affective, and behavioural health and well-being in young people during and after
  the COVID-19 pandemic. They have a deep understanding of the core subject matter, health and well-being, and are skilled in finding creative solutions to health and well-being in schools. They are dedicated
  to providing equitable support for health and well-being in schools and call on all educators, ministries of education, school system leaders, and faculties of education to prioritize quality, holistic
  education that includes health and well-being as a priority.
