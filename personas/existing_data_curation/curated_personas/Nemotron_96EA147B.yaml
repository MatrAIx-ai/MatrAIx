  hobbies: '[''Skiing'', ''Snowboarding'', ''Hiking'', ''Gardening'', ''Reading Mystery Novels'', ''Reading Historical Fiction'', ''Community Volunteering'', ''Knitting'', ''Crocheting'', ''Cooking Southwestern
    Cuisine'', ''Journaling'', ''Listening to Folk Music'']'
  career_goals: Karen aims to transition from day‑to‑day interviewing to a senior talent acquisition role within a regional resort or hospitality organization, where she can shape hiring strategies and
    mentor junior staff. She is developing a customized interview training program targeting small businesses in rural New Mexico, hoping to become a trusted consultant for local employers. Long‑term, she
    envisions leading an HR department that balances structured processes with the flexibility valued by the community, and using her experience to support workforce development initiatives in the Angel
    Fire area.
