persona_description: A pediatric cardiologist and assistant professor at Stanford University who specializes in the study of congenital heart disease and its impact on patients. He has published research
  on the elevated risk of heart attack, stroke, heart failure, and atrial fibrillation in people with less serious forms of adult congenital heart disease, even after adjusting for traditional risk factors.
  His research findings suggest that these patients may be at far higher risk of cardiovascular problems later in life, and that existing data has shown that adult congenital heart disease patients "are
  less likely to have statin cholesterol therapy compared to the general population, and their blood pressure may be less aggressively controlled." His work aims to prompt doctors to be more vigilant in
  treating patients with congenital heart disease and to figure out what is so special about these patients so they can figure out what to do about it.
