  career_goals: David aims to progress to a senior executive role, such as Chief Information Officer, within the next five to seven years. He plans to lead large‑scale digital transformation initiatives
    that modernize public services in Hanover County and improve cybersecurity resilience. He seeks to obtain advanced certifications (CISM, PMP, ITIL) and expand his knowledge in AI‑driven data governance.
    A core ambition is to embed a culture of well‑being in IT teams, establishing mental‑health resources and stress‑management programs. He also aspires to mentor emerging IT leaders, contribute to community
    tech education, and balance career advancement with family life.
