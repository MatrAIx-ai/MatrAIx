  hobbies: '[''Abstract painting'', ''Bilingual poetry writing'', ''Reading philosophy and literature'', ''Quilting and embroidery'', ''Community gardening'', ''Cooking traditional Mexican dishes'', ''Volunteer
    art classes for seniors and youth'', ''Genealogy research'', ''Learning new art techniques (digital illustration)'', ''Birdwatching in local nature preserves'', ''Participating in cultural festivals'']'
  career_goals: Although retired, Angelica remains driven to leave a lasting legacy for future generations. She plans to complete her bachelor's degree in Art History or Sociology, a goal that reflects
    her intellectual curiosity and desire for formal recognition of her studies. She aims to compile a richly illustrated memoir that weaves personal anecdotes with the broader story of Mexican-American
    life in the Rio Grande Valley. Angelica also envisions launching a community cultural center in San Benito that offers workshops, exhibitions of local folk art, and a permanent oral‑history archive
    of elder residents. Through mentorship programs she hopes to bridge the gap between seniors and school‑age children, fostering mutual learning and cultural appreciation. Finally, she aspires to obtain
    certification as a volunteer art therapist, allowing her to blend her artistic skills with her compassionate nature to support mental wellness in her community.
