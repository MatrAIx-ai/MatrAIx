personas:
  professional: Angelica Velez, a retired school secretary turned volunteer coordinator, uses their meticulous organization and bilingual fluency to design grant‑backed art workshops for seniors and youth
    while pursuing a bachelor’s degree in Art History.
  sports: Angelica Velez stays active with gentle morning walks through the San Benito Senior Walking Club, enjoys casual pickleball at the local community center, and passionately cheers for the Houston
    Astros in spring, the Dallas Cowboys in fall, while occasionally attending Rio Grande Valley FC Toros matches with friends.
  arts: Angelica Velez channels their imagination into abstract canvases inspired by Frida Kahlo’s bold colors and Carlos Santana’s rhythmic blues, writes bilingual poetry echoing Pablo Neruda, and leads
    community workshops that weave together traditional papel picado and modern digital illustration techniques.
  travel: Angelica Velez prefers thoughtfully planned, low‑key road trips that blend cultural immersion and nature—having already visited the historic streets of San Miguel de Allende, the Pueblo art scene
    in Santa Fe, and the coastal bird‑watching spots of the Gulf Islands, they now dream of a pilgrimage to Machu Picchu before health permits.
  culinary: Angelica Velez, a seasoned home cook, expertly prepares mole poblano with chiles mulato, raisins, and sesame seeds, rolls tender pork tamales adorned with fresh hoja santa, and delights in sharing
    their signature pico de gallo with avocado slices, though they cannot resist a midnight bowl of salsa with tortilla chips.
  core: Angelica Velez is a disciplined, bilingual art advocate who meticulously plans community workshops, savors late‑night salsa, and never misses a chance to sprinkle a pinch of painted sugar on every
    holiday altar they create.
background:
  cultural: Angelica was born into a Mexican‑American family in the Rio Grande Valley, where Spanish and English interwove daily life. Her upbringing blended Mexican customs—such as celebrating Día de los
    Muertos, cooking family recipes, and attending the local parish—with the Texan spirit of community resilience. She grew up hearing folk stories, listening to ranchera and mariachi music, and participating
    in neighborhood festivals that honor both Mexican and regional Texas heritage. This bicultural foundation has shaped her worldview, fostering a deep respect for family, faith, and communal harmony.
    Angelica remains fluent in Spanish, uses it to connect with older relatives and neighbors, and actively preserves cultural practices by sharing traditional crafts, cuisine, and oral histories with younger
    generations.
