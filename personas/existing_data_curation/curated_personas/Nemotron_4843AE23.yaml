personas:
  professional: David Morris, a 17‑year‑old aspiring IT support specialist, merges his curiosity for technology with a methodical, hands‑on approach, applying his self‑taught Python scripting, home‑repair
    skills, and meticulous planning to solve everyday tech problems while preparing for a GED and future community‑college certification.
  sports: David Morris, an avid hiker of the Green Mountains, frequently joins the local Vermont Trailblazers club for weekend treks, follows the New England Patriots and Vermont Catamounts on game days,
    and participates in seasonal community runs that emphasize endurance over competition.
  arts: David Morris, a devoted fan of classic science‑fiction authors like Isaac Asimov and Arthur C. Clarke, immerses himself in the ambient soundscapes of Brian Eno while assembling detailed scale model
    aircraft, and enjoys strategy board games such as Settlers of Catan during low‑key gatherings with friends.
  travel: David Morris plans low‑budget, nature‑focused trips with meticulous spreadsheets, dreaming of hiking the Rocky Mountains in Colorado, exploring the alpine trails of the Swiss Alps, and taking
    a weekend road trip to the historic maritime town of Mystic, Connecticut, while balancing his GED studies and part‑time job.
  culinary: David Morris prefers simple, home‑cooked meals like roasted vegetable quinoa bowls, grilled cheese with smoked cheddar, and occasional experimental dishes featuring herbs from his backyard garden,
    while savoring a meticulously brewed pour‑over coffee with beans from a local Vermont roaster.
  core: David Morris combines a methodical, introverted curiosity with practical DIY skills, balancing anxiety‑driven self‑monitoring and disciplined budgeting while nurturing a quiet passion for tech,
    model building, and solitary exploration.
background:
  cultural: David was raised in a middle‑class White family of Anglo‑Irish ancestry in Williston, Vermont, a suburban community in the Burlington‑Chittenden County region. His upbringing reflects typical
    New England values such as self‑reliance, modesty, and an appreciation for the outdoors. He participates in local community events like seasonal clean‑ups and volunteer work at a nearby community garden,
    and he has occasional involvement with a small Protestant congregation that emphasizes service and stewardship. The region’s emphasis on education, practical skills, and connection to nature has shaped
    his outlook, encouraging both independence and a sense of responsibility toward his community.
attributes:
  skills: '[''Computer Troubleshooting'', ''Basic Networking'', ''Spreadsheet Management'', ''Budgeting'', ''Light Home Repair'', ''Furniture Assembly'', ''Woodworking'', ''Model Kit Construction'', ''Self‑directed
    Learning (Python programming)'', ''Organizational Planning'']'
  hobbies: '[''Reading science‑fiction and technology books'', ''Hiking local trails in the Green Mountains'', ''Model aircraft kit construction'', ''Writing Python scripts for automation'', ''Journaling
    for stress management'', ''Playing strategy board games with a close circle of friends'']'
  career_goals: David aims to earn his GED within the next year and then enroll in a community‑college program focused on information technology or a skilled‑trade apprenticeship, such as carpentry or electrical
    work. He envisions gaining a certification as a Computer Support Specialist while simultaneously building hands‑on experience in home renovation. His long‑term ambition is to establish a small, locally‑run
    home‑repair and IT support business that can provide stable income while allowing him to work in familiar, controlled environments. He also hopes to develop coping strategies for his anxiety by maintaining
    a structured routine and pursuing further education that aligns with both his curiosity and his desire for practical, reliable outcomes.
