    podcasts'']'
  career_goals: Lal Mae aspires to move into a senior management analyst or strategy consulting role where she can lead cross-functional improvement projects. She plans to earn a Certified Business Analysis
    Professional (CBAP) credential and a master’s degree in business analytics or an MBA to deepen her strategic expertise. Over the next five years, she hopes to mentor junior analysts, shape data-driven
    decision-making processes, and champion workplace practices that support mental-health resilience. Balancing career growth with family life, she also aims to cultivate a more predictable schedule that
    reduces anxiety.
