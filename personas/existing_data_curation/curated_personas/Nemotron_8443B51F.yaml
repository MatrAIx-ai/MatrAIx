  career_goals: Christianne aims to progress from management analyst to senior strategic consultant within the next five years, focusing on leading cross‑functional initiatives for public‑sector and regional
    businesses in South Dakota. She plans to obtain a Lean Six Sigma Green Belt and PMP certification to deepen her expertise in operational excellence. Long‑term, she aspires to a director‑level position
    where she can shape organizational strategy, mentor junior analysts, and champion data‑driven decision‑making that balances innovative ideas with proven best practices.
