  hobbies: '["mural painting", "sketching", "reading speculative fiction", "playing banjo", "hiking", "photography", "collecting vintage paint tools", "board game nights", "community theater", "volunteering
    for public art projects"]'
  career_goals: Teddy aims to launch his own boutique interior‑finishing studio in the Greater Cincinnati area that blends traditional craftsmanship with contemporary artistic expression. Over the next
    five years he wants to become a recognized specialist in decorative wall art, offering custom mural commissions for residential and commercial clients while developing a signature line of paint colors.
    He also plans to mentor apprentices, teach evening courses at a local community college, and eventually author a guidebook on imaginative interior painting techniques.
