personas:
  professional: Jordan Mccolloch, a 30‑year‑old private investigator in Bath County, blends meticulous surveillance planning and forensic photography with a community‑first ethic, leveraging their methodical
    mindset and natural empathy to build trust during interviews while staying keenly aware of the stress that each case brings.
  sports: Jordan Mccolloch stays active by shooting hoops in the Bath County Hoops basketball league, cheering on the Louisville Cardinals and Cincinnati Bengals on game nights, and hunting deer during
    the fall season, a routine that balances team camaraderie with solitary outdoor challenge, reflecting the structure they crave and the social energy they draw from group play.
  arts: Jordan Mccolloch channels their love for storytelling into community‑theater roles and acoustic‑guitar evenings, drawing inspiration from folk icons like The Avett Brothers and John Prine while
    capturing mountain sunsets through their DSLR, a hobby that fuels their detective instincts.
  travel: Jordan Mccolloch prefers road‑tripping in a pickup, mapping weekend hikes through the Daniel Boone National Forest and Red River Gorge, with a dream to trek the Scottish Highlands and explore
    New Zealand’s South Island once their firm’s budget allows, a plan they draft with detailed itineraries to keep anxiety at bay.
  culinary: Jordan Mccolloch enjoys cooking hearty regional fare—bourbon‑marinated BBQ ribs, cornbread with honey butter, and venison stew seasoned with sage and rosemary—while their moderate cooking skill
    lets them impress neighbors at church potlucks, though they occasionally burn a batch of biscuits when juggling case files.
  core: Jordan Mccolloch is a structurally‑minded yet socially‑charged investigator whose love for community, the outdoors, and vintage guns—tempered by a steady undercurrent of worry—defines a life balanced
    between order and the untamed, a blend they navigate with a mix of careful planning and spontaneous compassion.
background:
  cultural: Jordan grew up in Flemingsburg, a small town in Bath County, Kentucky, steeped in Appalachian Southern culture. His white, multigenerational family background emphasized hospitality, community,
    self‑reliance, and a strong work ethic rooted in the region’s agricultural and coal‑mining heritage. Regular participation in church activities, county fairs, and high‑school sports fostered his sociable,
    outgoing personality. Though he attended some college courses at the University of Kentucky, he left to follow a practical career path in private investigation, valuing hands‑on problem solving over
    abstract study. The close‑knit nature of his community, combined with the rural outdoors lifestyle—hunting, fishing, and weekend gatherings—shapes his pragmatic outlook, his desire to help neighbours,
    and his appreciation for structure within a fluid environment.
attributes:
  skills: '["Surveillance planning", "Interviewing and rapport building", "Evidence collection and preservation", "Forensic photography", "Digital forensics and OSINT", "Report writing and documentation",
