  hobbies: '["Hiking in the Daniel Boone National Forest", "Performing in community‑theater productions", "Playing in a recreational basketball league", "Volunteering at a local crisis hotline", "Landscape
    and documentary photography", "Restoring vintage firearms", "Fishing on the Licking River", "Reading classic detective and crime literature", "Playing acoustic guitar"]'
  career_goals: Jordan aspires to become a lead investigator for a regional law‑enforcement support agency while maintaining his independence as a private detective. He plans to earn the Certified Professional
    Investigator (CPI) credential and to specialize in missing‑person and domestic‑violence cases, areas where his compassion and desire for harmony can make a direct impact. Over the next five years he
    aims to expand his own boutique investigation firm in Bath County, employing a small team of investigators who share his values of reliability, ethical conduct, and community service. He also hopes
    to mentor younger investigators and to develop a local support network for victims dealing with trauma.
