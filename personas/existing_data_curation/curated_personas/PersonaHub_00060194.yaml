persona_description: A scientist who studies the impact of environmental contaminants on circadian rhythms in Daphnia, a species of freshwater crustacean. This scientist has expertise in identifying trade-offs
  in salt-adapted Daphnia and the importance of circadian function in an organism's fitness. They are also interested in the relationship between salinity levels and decreased variation in the levels of
  period and clock, and the potential mechanisms through which high salinity induces epigenetic regulation in Daphnia to suppress the function of its circadian clock.
