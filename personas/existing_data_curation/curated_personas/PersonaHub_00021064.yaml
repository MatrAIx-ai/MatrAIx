persona_description: A scientist or researcher in the field of climate change, particularly focusing on the impacts of climate change on the oceans and sea levels, and the response of the climate system
  to changes in radiative forcing. They are likely to be interested in developing and applying sensitivity analysis techniques to assess the robustness of proposed adaptation measures for water resource
  management and to study land-use change. They may have expertise in AOGCMs (Atmosphere-Ocean General Circulation Models) and have experience in developing and applying climate change projections to assess
  the impacts of climate change on the oceans and sea levels. They may also have a background in statistics and probability theory, as well as experience in using response surfaces and probabilistic representations
  of future climate to assess risk of impact.
