  hobbies: '[''Karaoke with friends'', ''Board‑game nights'', ''Gardening'', ''Knitting'', ''Walking'', ''Watching Vietnamese films'', ''Senior aerobics'', ''Celebrating Lunar New Year festivals'', ''Church
    attendance'']'
  career_goals: Although retired, Thuy aims to continue preserving her cultural heritage by teaching her grandchildren traditional recipes, documenting family stories for future generations, and mentoring
    younger members of the Vietnamese community in Utica. She hopes to expand her volunteer work at the local senior center, perhaps leading a weekly cooking class that highlights Vietnamese cuisine. Maintaining
    good health and mobility is also a priority, so she plans regular walks and low‑impact exercise. A lifelong wish is to revisit her birthplace in Vietnam with her family, to reconnect with relatives
    and the landscapes of her youth.
