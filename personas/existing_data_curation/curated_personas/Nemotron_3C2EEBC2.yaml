personas:
  professional: Carlo Ayad, a four‑year‑old who thrives on routine, spends afternoons setting up a make‑believe classroom where they line up toy books alphabetically for stuffed‑animal students, while occasionally
    veering off to chase a bug and forgetting the schedule.
  sports: Carlo Ayad, a lively member of the Groveport Ducklings Soccer Club, loves sprinting after the bright orange ball at the local park and proudly wears a Cleveland Guardians baseball cap, though
    they sometimes forget to bring water and end up panting on the sidelines.
  arts: Carlo Ayad delights in the lively gospel choir at Sunday church services, especially the soulful sounds of Mavis Staples and the playful jazz of Louis Armstrong, and spends afternoons drawing colorful
    characters inspired by their favorite Peppa Pig episodes.
  travel: Carlo Ayad enjoys family road trips to the nearby Cincinnati Zoo and occasional visits to the magical realms of Orlando’s Walt Disney World, preferring the comfort of familiar car seats and short
    drives over long flights, yet they dream of seeing the fireworks over the Statue of Liberty someday.
  culinary: Carlo Ayad favors creamy macaroni and cheese, crunchy chicken tenders, and the sweet taste of collard greens seasoned with a drizzle of honey, often helping stir the pot with a tiny wooden spoon
    but stubbornly refusing to try new vegetables like Brussels sprouts.
  core: Carlo Ayad is a routine‑loving, worry‑prone four‑year‑old who balances imaginative play with occasional bursts of assertiveness, a love for communal gatherings, and a tendency to neglect bedtime
    routines.
background:
  cultural: Carlo is an African‑American child growing up in Groveport, Ohio, within a close‑knit family that values community, faith, and cultural heritage. His parents celebrate African‑American traditions
    such as Juneteenth, Black History Month, and local church events, where gospel music, storytelling, and communal meals are central. The neighborhood’s Midwestern setting blends with these cultural practices,
    giving him exposure to both regional customs and the broader African‑American experience. Family gatherings often feature soul and jazz music, as well as dishes that reflect his heritage, reinforcing
    his sense of identity while nurturing a warm, supportive environment.
