  hobbies: '[''building blocks'', ''pretend play with uniforms'', ''drawing and coloring'', ''listening to storybooks'', ''clapping and singing nursery rhymes'', ''exploring the backyard'', ''simple puzzles'',
    ''watching educational videos'']'
  career_goals: Although still very young, Carlo often talks about future jobs that involve clear uniforms, predictable schedules, and helping others. He imagines himself as a firefighter or a police officer,
    attracted to the idea of wearing a badge or a helmet and working with a team that follows set procedures. He also enjoys pretending to be a teacher, because he likes the structure of a classroom and
    the chance to share knowledge. These ambitions reflect his love of routine, practicality, and a desire to contribute to his community in a concrete way.
