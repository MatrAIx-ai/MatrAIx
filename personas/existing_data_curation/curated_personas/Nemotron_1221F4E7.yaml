  hobbies: '[''Seasonal gardening'', ''Knitting (fair isle patterns)'', ''Baking artisan breads'', ''Reading historical fiction and mystery novels'', ''Birdwatching'', ''Walking local nature trails'', ''Community
    theater participation'', ''Crossword puzzles'', ''Volunteering at the library'', ''Senior center assistance'']'
  career_goals: Although officially retired, Gabriella aims to deepen her impact on the Wanaque community by assuming leadership roles on local nonprofit boards and spearheading a sustainable community
    garden project. She also aspires to complete a certificate in senior mental‑health support, mentor emerging volunteers, and digitize the town’s historical records to preserve its heritage for future
    generations.
