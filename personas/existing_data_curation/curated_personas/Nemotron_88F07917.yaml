personas:
  professional: Benito Vega, a 30‑year‑old Miami auto mechanic, combines meticulous diagnostic expertise with bilingual communication, and they keep the shop running like a well‑orchestrated rhythm section,
    all while their talkative, upbeat demeanor lifts team morale even under tight deadlines.
  sports: Benito Vega chains their morning runs along South Beach, logs miles with the Miami Beach Running Club, roots for the Miami Heat and Inter Miami CF, and they join a local recreational basketball
    league each winter to balance their love of routine fitness with team camaraderie.
  arts: Benito Vega’s evenings often revolve around salsa nights where they dance to the sounds of Marc Anthony, Celia Cruz, and contemporary timba groups, while their living room playlists also feature
    classic boleros by Julio Jaramillo and the occasional vinyl of John Coltrane for a jazzy interlude.
  travel: Benito Vega prefers short, organized getaways that blend cultural immersion and relaxation; they have explored the historic streets of New Orleans, the art deco of Miami Beach, and the pine‑forested
    trails of Asheville, while dreaming of a future road‑trip along the Pacific Coast Highway to experience sunrise surf sessions.
  culinary: Benito Vega is a confident home‑cook who regularly prepares arroz con pollo, tostones, and maduros, seasoning dishes with garlic, cumin, and fresh cilantro, yet they occasionally over‑spice
    in a spontaneous attempt to impress friends during weekend dinner parties.
  core: Benito Vega is a methodical, talkative mechanic whose love of routine collides with bouts of anxiety, driving them to chase perfection in both the garage and social circles while occasionally over‑committing
    to salsa nights.
background:
  cultural: Benito grew up in a close‑knit Cuban‑American household in Miami‑Dade County, where Spanish was spoken at home and English at school. His family maintains strong ties to Cuban traditions, celebrating
    holidays such as Carnaval and Día de los Reyes with music, family meals, and community gatherings. The rhythm of Afro‑Cuban percussion, the aroma of freshly brewed cafecito, and the emphasis on hospitality
    shaped his sociable personality. While he respects the practical, hardworking values passed down by his parents, Benito also embraces the multicultural vibe of Miami, blending his heritage with the
    diverse influences of his city.
attributes:
  skills: '[''Vehicle engine diagnostics'', ''Hydraulic system repair'', ''Mobile equipment installation'', ''Preventive maintenance scheduling'', ''Parts inventory management'', ''Customer communication
    and service'', ''Team training and coordination'', ''Technical documentation and compliance'', ''Bilingual Spanish-English communication'', ''Diagnostic software operation (OBD‑II, telematics)'']'
  hobbies: '[''Salsa dancing'', ''Listening to timba and salsa music'', ''Cooking Cuban cuisine'', ''Playing dominoes with friends'', ''Attending Miami car shows'', ''Restoring classic cars as a side project'',
    ''Morning beach runs'', ''Journaling for stress management'', ''Volunteering at a Cuban cultural center'']'
  career_goals: Benito aims to become a master‑certified technician (ASE Master) within the next two years and to leverage his expertise to become the lead supervisor of a Miami‑based service department
    that handles fleet maintenance for local delivery and transportation companies. He dreams of eventually opening his own workshop that emphasizes structured, routine‑driven processes and a supportive
    team culture, allowing him to mentor younger mechanics while creating a stable income that helps him manage his anxiety. He also hopes to develop a set of best‑practice maintenance protocols that could
    be adopted by regional businesses, positioning himself as a go‑to authority in mobile equipment reliability.
