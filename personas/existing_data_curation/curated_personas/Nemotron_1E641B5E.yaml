  hobbies: '[''Vietnamese Cooking'', ''Home Gardening'', ''Historical Fiction Reading'', ''Retail Technology Podcasts'', ''Yoga'', ''Book Club'', ''Community Volunteering'']'
  career_goals: Phi aims to advance from her current role as a retail salesperson to a store manager position within the next three years, eventually aspiring to a district management role overseeing multiple
    locations. She seeks to deepen her expertise in retail analytics and e‑commerce integration, hoping to lead a hybrid boutique‑online venture that merges the personal touch of in‑store service with digital
    sales channels. Balancing her ambition with family responsibilities, she also plans to acquire a bachelor's degree in Business Administration to solidify her strategic leadership capabilities.
