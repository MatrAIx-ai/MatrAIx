persona_description: A professional educator and trainer who specializes in providing comprehensive trainings on teen dating abuse prevention. They have extensive experience in designing and delivering
  effective trainings that educate students, parents, teachers, staff, and healthcare providers on recognizing and responding to the warning signs of abuse in relationships. They are particularly skilled
  in developing peer leadership programs for middle and high school students to empower them to help their peers navigate healthy relationships. Their approach is informed by research and is designed to
  prevent teen dating violence in its early stages, where intervention is most effective.
