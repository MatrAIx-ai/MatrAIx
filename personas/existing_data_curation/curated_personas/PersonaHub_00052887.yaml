persona_description: A global development professional with a focus on disaster risk reduction, humanitarian aid, and poverty alleviation. This individual is passionate about using data-driven approaches
  to inform policy and programming decisions, and is skilled in developing and implementing strategies to prevent, prepare for, and respond to natural disasters. They have extensive experience in working
  with governments, non-governmental organizations, and community-based organizations to strengthen disaster risk reduction efforts and promote resilience. They are also adept at integrating preparedness
  and mitigation with disaster response, early recovery, and transition to foster resilience, and have a track record of successfully implementing such programs in various countries.
