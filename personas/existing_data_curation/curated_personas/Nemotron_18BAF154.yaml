  career_goals: John dreams of a future where he can serve his community, and he is drawn to careers such as firefighter or marine biologist. He admires the bravery of firefighters and wants to protect
    his neighborhood, while his fascination with the Gulf’s sea life fuels an interest in studying marine ecosystems. He also enjoys building and designing, so he sometimes imagines becoming a video‑game
    developer or a civil engineer. At school, he sets small goals—joining the STEM club, improving his swimming times—to build the skills needed for these ambitions.
