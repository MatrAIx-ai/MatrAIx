personas:
  professional: John Foster, a budding junior soccer captain who blends a love for structured practice with his creative flair for building elaborate LEGO forts and designing Minecraft worlds, shows early
    leadership and meticulous planning that hint at a future in sports management or game design.
  sports: John Foster dazzles as a forward for the Metairie Youth Soccer League’s Eagles, draws inspiration from the New Orleans Saints and Pelicans, and stays fit by swimming laps at the community pool
    during summer breaks.
  arts: John Foster fuels his imagination by devouring graphic novels from Stan Lee and Mo Willems, sketching original comic strips after school, and channeling the swing of Louis Armstrong and local jazz
    ensembles while drumming in the church’s youth choir.
  travel: John Foster has explored the vibrant French Quarter during Mardi Gras, splashed in Gulf Coast beaches, and dreams of a future family road trip to Disneyland in California and a summer vacation
    at Disney World in Florida.
  culinary: John Foster’s palate swings between piping‑hot gumbo seasoned with okra and cayenne, cheesy pepperoni pizza, and sweet beignets dusted with powdered sugar, while they proudly whip up a DIY LEGO‑inspired
    snack platter of cheese cubes and grapes.
  core: John Foster is a structured yet imaginative 10‑year‑old who balances soccer teamwork with LEGO engineering, trades baseball cards, and chases the rhythm of jazz while meticulously planning every
    allowance dollar.
background:
  cultural: John comes from a white, middle‑class family in Metairie, a suburban enclave of New Orleans. His upbringing blends typical suburban American life with the unique cultural flavor of the Gulf
    Coast. He participates in Catholic traditions, attending Mass and holiday celebrations with his family. The local customs of Mardi Gras, second‑line parades, and Creole cuisine—such as gumbo and beignets—are
    a regular part of his life, shaping his love for community gatherings and lively music. While English is his primary language, he has heard French‑Cajun phrases at family gatherings and community events,
    giving him a modest appreciation of the region’s multicultural heritage.
