personas:
  professional: Sean Grover, a 25-year-old aspiring agricultural service technician, pairs meticulous mechanical troubleshooting of combines and tractors with a data-driven approach using Excel pivot tables,
    while they channel a competitive edge into a relentless pursuit of reliability and certification milestones.
  sports: Sean Grover favors solitary endurance pursuits, spending weekends trail-hiking and seasonal deer hunting, while they follow the Milwaukee Bucks and Green Bay Packers for basketball and football,
    and they occasionally join a local cycling group that meets Saturday mornings for 30-mile rides.
  arts: Sean Grover unwinds by building scale model airplanes and listening to classic rock legends like Led Zeppelin and progressive folk artist Gordon Lightfoot, while they also binge-watch historical
    documentaries by Ken Burns, drawing inspiration for both precision in hobby projects and a love of storytelling.
  travel: Sean Grover prefers low-key road trips and wilderness excursions, meticulously planning itineraries on spreadsheets, has already explored Yellowstone National Park and the Adirondack Trail System,
    and dreams of a guided hunting safari in Patagonia.
  culinary: Sean Grover favors hearty farm-to-table meals, often cooking smoked trout with rosemary and lemon, perfecting a chili-laden pulled pork, and while they are comfortable grilling, they sometimes
    rely on pre-made spice blends for convenience when time is short.
  core: Sean Grover, a 25-year-old mechanical savant with a solitary streak, balances relentless curiosity for emerging tech with rugged hunting-seasoned practicality, all while a covert competitive edge
    drives every maintenance schedule and project plan.
background:
  cultural: Sean was raised in a rural community in western Nebraska, where farming and land stewardship are central to local culture. His family values self‑reliance, modesty, and community involvement.
    He attended public schools in Sidney and spent a year at a nearby community college before deciding to focus on practical experience. The region’s traditions, such as the county fair and church gatherings,
    have shaped his appreciation for both heritage and modern technology. He identifies with Midwestern values of hard work, personal responsibility, and a pragmatic outlook on life.
attributes:
  skills: '["Mechanical troubleshooting (agricultural equipment)", "Farm equipment maintenance", "Basic automotive repair", "Computer literacy (Windows, Office)", "Introductory Python scripting", "Project
    planning and scheduling", "Data analysis with Excel (pivot tables)", "Problem solving under pressure"]'
  hobbies: '["Hunting", "Fishing", "Trail hiking", "Reading non-fiction (history, technology)", "Electronics tinkering", "Model airplane building", "Online strategic gaming with small group", "Volunteering
    at 4‑H events"]'
  career_goals: Sean aims to become a certified service technician for a leading farm equipment manufacturer, eventually earning a journeyman certification. He plans to complete an associate degree in Agricultural
    Technology within the next two years, and as a longer‑term ambition, to open his own small‑scale equipment repair shop serving local farmers. He is motivated to be recognized for reliability and technical
    expertise, and hopes to take on supervisory responsibilities in the future.
