  career_goals: Paul aims to transition from front‑line support to a senior training and quality‑assurance role within the next three years, where he can design curricula that embed empathy and cultural
    awareness into customer interactions. He envisions leading a small team of coaches, developing metrics that balance efficiency with customer satisfaction, and eventually consulting for local small businesses
    to improve their service experience. Additionally, he hopes to volunteer as a mentor for at‑risk youth, using his communication skills to guide them toward steady employment.
