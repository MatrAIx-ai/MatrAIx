  career_goals: Anna aims to become Executive Director of the Newport Community Center within the next five years, leveraging her experience to expand programming, secure larger grant funding, and elevate
    community engagement across Carteret County. To support this ambition, she plans to pursue a Master’s in Public Administration, deepening her expertise in policy, strategic planning, and nonprofit leadership.
    Long-term, she envisions launching a consulting practice that helps small coastal towns develop sustainable tourism and education initiatives, while also mentoring emerging female managers and serving
    on regional economic development boards.
