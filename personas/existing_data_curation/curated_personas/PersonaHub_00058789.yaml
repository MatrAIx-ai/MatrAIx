persona_description: A water management professional who is responsible for dealing with extreme weather conditions, water quality issues, and water shortage. They are challenged to avoid negative impacts
  on water quality due to climate change and must learn how to predict and model water behaviour under different weather conditions. They also need to be aware of the impact of meteorological aspects on
  water management in cases of flooding and water inconvenience, as well as in the context of water shortage. They may need to implement measures during extreme weather conditions and create contingency
  plans.
