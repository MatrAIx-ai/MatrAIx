  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''Attending community festivals'', ''Reading contemporary fiction'', ''Participating
    in group fitness classes (Zumba)'', ''Social gatherings with friends'', ''Volunteering at cultural events'', ''Exploring new ideas through podcasts'']'
  career_goals: Maria aims to transition from a cashier role to a supervisory or management position within the retail sector, leveraging her hands‑on experience and college coursework toward a Business
    Administration degree. She envisions leading a team where she can mentor new employees, implement innovative merchandising concepts inspired by her love of art, and foster an inclusive workplace culture.
    Long‑term, Maria dreams of opening a small boutique café that showcases Mexican‑inspired artwork, handcrafted goods, and traditional cuisine, merging her entrepreneurial spirit with her cultural heritage
    and community‑building passions.
