persona_description: A biologist who specializes in the study of eukaryotic cells, specifically focusing on the origin and evolution of mitochondria and plastids. Her research interests include the endosymbiotic
  theory of organelle evolution, the role of symbiosis in eukaryotic cell evolution, and the comparative genomics of mitochondria and plastids. She is known for her work in organizing an all-encompassing
  view of eukaryogenesis and for her vigorous promotion of the endosymbiotic origin of mitochondria and plastids.
