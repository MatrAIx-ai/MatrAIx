  career_goals: Vanessa aims to transition from a senior technologist role to a plant operations manager position, where she can integrate her technical expertise with strategic business leadership. She
    plans to earn a Lean Six Sigma Black Belt and pursue certification as a Professional Engineering Technologist (PE Technologist). Long‑term, she hopes to mentor women of color entering the engineering
    trades, lead sustainability initiatives that reduce waste and energy consumption at her facility, and eventually launch a consulting firm that helps mid‑size manufacturers implement lean processes and
    inclusive workplace practices.
