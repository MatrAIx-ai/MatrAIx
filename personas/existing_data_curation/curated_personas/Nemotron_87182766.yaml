  career_goals: Ashlee aims to attend a four‑year university—potentially the University of Oklahoma or a regional college—to study communications or marketing. Her goal is to leverage her sociable personality
    and organizational talent into a career in community outreach or public relations, ideally working for a nonprofit that serves the Tulsa County area or as a marketing manager for a local business. She
    also hopes to build a personal brand on platforms like TikTok or YouTube, sharing lifestyle and DIY content that reflects her curiosity and practical mindset, while serving as a positive role model
    for other teens in her hometown.
