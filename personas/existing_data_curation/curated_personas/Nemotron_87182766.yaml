personas:
  professional: Ashlee Westmoreland, an 18‑year‑old high‑school senior, channels their methodical planning and charismatic public‑speaking into leading school dances, orchestrating community fundraisers,
    and producing polished TikTok marketing clips, all while they network with local nonprofits to lay the groundwork for a future career in public relations.
  sports: Ashlee Westmoreland stays active through varsity cheerleading, weekly contemporary dance classes, weekend hikes with the Tulsa Trailblazers hiking club, and casual volleyball matches at the Bixby
    community center, while they cheer on the Oklahoma City Thunder and root for the Oklahoma Sooners during football season.
  arts: Ashlee Westmoreland shines on stage in community theater productions, draws inspiration from Lin‑Manuel Miranda’s Broadway storytelling and the eclectic sounds of The Flaming Lips, and they spend
    evenings binge‑watching Oscar‑winning performances by Viola Davis to refine their own acting craft.
  travel: Ashlee Westmoreland favors budget‑friendly road trips, having explored the Grand Canyon’s rim, Austin’s vibrant live‑music scene, and Savannah’s historic streets, while dreaming of a spring‑break
    adventure to New York City’s Broadway district and they meticulously plan each itinerary in Google Trips to balance school duties with wanderlust.
  culinary: Ashlee Westmoreland, an enthusiastic home chef, experiments with sweet‑potato chili, chicken‑fried steak tacos, and homemade sourdough, favoring fresh cilantro, smoked paprika, and a dash of
    cayenne, though they sometimes over‑salt sauces in the rush of filming quick TikTok recipe videos.
  core: Ashlee Westmoreland is an organized, talkative teen who blends a love for performance and community service into every project, even if they occasionally over‑commit, skip sleep, and binge‑watch
    drama series late into the night.
background:
  cultural: Ashlee grew up in a white, middle‑class family in Bixby, Oklahoma, where community and modesty are core values. Her upbringing reflects the heartland’s emphasis on hospitality, church participation,
    and strong family ties. She celebrates traditional American holidays—Thanksgiving, Fourth of July barbecues, and Halloween—often with neighborhood gatherings or high‑school football tailgates. The local
    culture of county fairs, rodeos, and a close‑knit small‑town atmosphere has shaped her sense of belonging and community responsibility, encouraging her to stay engaged with local charities and social
    events.
