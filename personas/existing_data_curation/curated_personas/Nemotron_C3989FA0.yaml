  hobbies: '[''Electronics tinkering'', ''DIY projects'', ''Fishing'', ''Hiking'', ''Tabletop gaming'', ''Football watching'', ''Podcast listening (productivity and tech)'', ''Reading sci‑fi novels'']'
  career_goals: Daniel aims to earn the APICS CPIM certification within the next two years and transition into a senior production planner role. He hopes to broaden his strategic understanding of supply
    chain management, eventually moving into an operations manager position at a midsize manufacturing firm in Pennsylvania. Recognizing his tendency toward worry, he also plans to attend workshops on stress
    reduction and organizational techniques to become a more resilient leader. Long‑term, he envisions opening a consultancy that helps small producers implement lean processes while maintaining a healthy
    work‑life balance.
