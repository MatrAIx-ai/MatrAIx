  hobbies: '[''Visiting Art Galleries'', ''Contemporary Art Appreciation'', ''Classical Guitar Playing'', ''Hiking in North Georgia Trails'', ''Gardening'', ''Cooking Guatemalan Cuisine'', ''Reading Historical
    Biographies'', ''Volunteer Math Tutoring for Immigrant Youth'', ''Exploring Cultural Heritage through Travel'']'
  career_goals: Jorge aims to transition into a senior data science leadership role where he can shape data-driven decision-making at an organizational level. He is passionate about building interdisciplinary
    teams that blend analytical rigor with creative storytelling, fostering a culture of continuous learning. Long‑term, he envisions launching a consultancy that offers strategic analytics services to
    small businesses and non‑profits, particularly those serving Hispanic communities. He also hopes to develop outreach programs that inspire underrepresented youth to pursue careers in mathematics and
    data science, leveraging his Guatemalan heritage and community ties.
