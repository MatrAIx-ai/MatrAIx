personas:
  professional: Jorge Hincapie blends their business acumen with deep quantitative expertise, spearheading data science initiatives that transform complex datasets into strategic narratives while mentoring
    junior analysts with a patient, culturally aware approach.
  sports: Jorge Hincapie enjoys weekend hikes along the pine-covered trails of North Georgia, participates in the Georgia Trails Community Club's group bike rides, follows the Atlanta Braves and Atlanta
    Falcons, and they occasionally join a local tennis league for light competition.
  arts: Jorge Hincapie frequents the High Museum of Art and neighborhood galleries, finds inspiration in Monet's water lilies and Georgia O'Keeffe's desert abstractions, and they unwind each evening practicing
    classical guitar pieces by Villa-Lobos and Segovia, merging visual and auditory artistry with analytical thinking.
  travel: Jorge Hincapie prefers thoughtfully planned journeys that blend natural scenery and cultural depth, having trekked the Blue Ridge Mountains near Asheville, wandered Savannah's historic squares,
    explored Florence's Uffizi Gallery, and they dream of a future trek through the Andes to trace culinary traditions of their ancestors.
  culinary: Jorge Hincapie delights in cooking traditional family recipes like slow-cooked pork with roasted plantains, chiltepin-spiced salsa, and corn masa tamales, often harvesting cilantro and epazote
    from their garden, and they pair meals with a cup of aged Central American coffee while listening to classical guitar recordings.
  core: Jorge Hincapie is a data-driven storyteller who balances analytical rigor with artistic curiosity, nurtures a garden and classical guitar as meditative escapes, and they manage disciplined finances
    while volunteering to mentor immigrant youth in mathematics.
background:
  cultural: Jorge was born in Guatemala and immigrated to the United States in his early twenties. He maintains a strong connection to his heritage through language, family traditions, and cuisine. Fluent
    in both Spanish and English, he often serves as a cultural bridge within his community, celebrating Guatemalan holidays such as Semana Santa and Día de los Muertos while also embracing Southern hospitality.
    His upbringing emphasized family cohesion, respect for elders, and community support, values that continue to influence his interpersonal relationships and professional ethos.
