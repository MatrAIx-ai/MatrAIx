  hobbies: '[''Visiting local art galleries'', ''Attending community theater performances'', ''Reading historical novels and biographies'', ''Gardening'', ''Walking along the Providence River waterfront'',
    ''Knitting and crocheting'', ''Participating in senior learning classes'', ''Traveling to New England museums and cultural festivals'', ''Cooking traditional New England dishes'', ''Volunteering at
    the town historical society'']'
  career_goals: Even in retirement, Joyce is motivated to leave a lasting cultural imprint on her community. She aims to curate a rotating art exhibition at the local library, author a memoir that intertwines
    her family’s textile‑mill heritage with the broader New England story, and mentor younger volunteers in event organization and senior advocacy. She also hopes to complete a series of online courses
    in art history and digital archiving, and to travel to at least three major museums in the northeastern United States each year. Her ultimate ambition is to ensure that the histories and artistic expressions
    of West Warwick and surrounding towns are preserved and celebrated for future generations.
