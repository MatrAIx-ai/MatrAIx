personas:
  professional: Joyce Hinebaugh, a retired community event organizer, they channel their meticulous planning and love of art history into curating rotating exhibitions at the West Warwick library while
    mentoring younger volunteers and maintaining detailed budget spreadsheets.
  sports: Joyce Hinebaugh, an active senior, they keep fit by walking daily along the Providence River, joining a low‑impact yoga class at the community center, and cheering on the Providence Bruins, the
    New England Patriots and the Boston Red Sox.
  arts: Joyce Hinebaugh, a dedicated arts enthusiast, they frequent the Providence Performing Arts Center, draw inspiration from Claude Monet and Mary Cassatt, knit quilts patterned after pastel palettes,
    and devour historical biographies by David McCullough.
  travel: Joyce Hinebaugh, an avid cultural traveler, they plan itineraries to major northeast museums such as the Museum of Fine Arts Boston, the Yale Peabody Museum, and the Metropolitan Museum of Art
    each year, while also attending the Newport Folk Festival and exploring historic lighthouse towns.
  culinary: Joyce Hinebaugh, a passionate home cook, they prepare classic New England dishes like clam chowder with fresh Rhode Island clams, bake apple‑cinnamon pies with locally sourced apples, and experiment
    with maple‑glazed baked beans, though they occasionally forget to set the timer and end up a caramelized crust.
  core: Joyce Hinebaugh, a 73‑year‑old retired event planner, they blend meticulous organization with boundless curiosity, curating community art, mentoring volunteers, savoring historic comfort foods,
    and strolling riverbanks, while habitually misplacing reading glasses and over‑booking their calendar.
background:
  cultural: Joyce’s cultural background is rooted in the small‑town, white Anglo‑Saxon Protestant (WASP) heritage of New England. Her family has lived in Rhode Island for generations, originally working
    in the textile mills that once powered West Warwick’s economy. She grew up with modest, community‑centered values, celebrating holidays like Thanksgiving potlucks, Fourth of July parades, and church
    gatherings. Though the region’s cultural fabric has diversified over the decades, Joyce maintains a deep appreciation for the local history, maritime traditions, and New England’s emphasis on self‑reliance,
    civic participation, and quiet resilience.
