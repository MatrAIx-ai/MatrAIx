  hobbies: '[''salsa dancing'', ''group fitness classes'', ''board games'', ''escape rooms'', ''volunteering at farmers markets'', ''hiking'', ''experimental cooking'', ''live music concerts'', ''café people‑watching'',
    ''mobile photography'']'
  career_goals: Joyce wants to turn her social energy and flexibility into a career that lets her shape community experiences. Her short‑term goal is to earn a certificate in event planning while taking
    on part‑time roles such as a festival volunteer coordinator or a retail associate with room for creative input. Long‑term, she aspires to become a community events manager for a regional arts organization
    or launch her own pop‑up event company that blends local Midwestern culture with fresh, experimental experiences. She seeks a position that offers autonomy, minimal rigid scheduling, and room for spontaneous,
    people‑focused projects.
