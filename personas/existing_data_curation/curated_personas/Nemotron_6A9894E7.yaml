personas:
  professional: Joyce Sison is an aspiring community event coordinator who leverages their rapid improvisational skills, charismatic verbal communication, and basic Canva design ability to craft spontaneous
    pop-up experiences, while their competitive spirit fuels a drive to outshine peers even as a tendency toward disorganization occasionally threatens deadline adherence.
  sports: Joyce Sison powers through Zumba and spin classes, lights up salsa nights, hikes regularly with the Ozark Trailblazers club, and loyally roots for the St. Louis Cardinals, Kansas City Chiefs,
    and Springfield Little League during the season.
  arts: Joyce Sison fuels their creative spark by devouring indie sounds from Phoebe Bridgers and The Avett Brothers and bluegrass legends like Old Crow Medicine Show, while they design eye-catching pop-up
    event flyers on Canva and attend shows at the historic Route 66 Live music venue.
  travel: Joyce Sison prefers spontaneous weekend getaways, often booking last-minute trips to hike the Ozark National Scenic Riverways, catch a live music weekend in Austin, Texas, or dream of salsa-filled
    nights in Barcelona, while they stretch travel budgets by mixing Airbnb stays with reward points from a travel credit card.
  culinary: Joyce Sison experiments with regional BBQ twists, slow-smoking brisket with hickory-infused rubs, drizzling apple-cider BBQ sauce and topping it with chipotle-spiced slaw, while their coffee
    habit borders on obsessive, favoring pour-over brews made from lavender-infused beans sourced from local roasters.
  core: Joyce Sison is a 24-year-old social dynamo who balances a competitive edge with a love for spontaneous group fun, but often lets last-minute planning and a caffeine binge derail their best-laid
    projects.
background:
  cultural: Joyce grew up in Columbia, Missouri, a quintessential Midwestern college town where community ties run deep. Her family has German‑American roots, reflecting the broader heritage of many Missouri
    residents. She was immersed in local traditions such as county fairs, community picnics, and weekly farmers’ markets, and she enjoys regional foods like BBQ and comfort cooking. The Midwestern values
    of friendliness, modesty, hard work, and a strong sense of belonging have shaped her outlook, while the presence of the university and vibrant arts scene has kept her curious about new ideas and cultural
    experiences.
attributes:
  skills: '[''effective communication'', ''improvisational problem solving'', ''event coordination'', ''social media content creation'', ''basic graphic design (Canva)'', ''customer service'', ''first aid'',
