  career_goals: Brenda aims to transition into a technical leadership role where she can shape architectural strategy and drive innovation at a mid‑size technology firm or a fast‑growing startup. In the
    next five years, she hopes to become a Lead Engineer or Solutions Architect, championing cloud‑native design and fostering a culture of continuous learning. She is passionate about mentoring junior
    developers, especially women entering STEM, and plans to launch a regional mentorship program and sponsor open‑source initiatives that address community needs, such as affordable healthcare tech tools.
    Additionally, she envisions leveraging her expertise to consult for small businesses in central Pennsylvania, helping them modernize legacy systems and adopt scalable digital solutions.
