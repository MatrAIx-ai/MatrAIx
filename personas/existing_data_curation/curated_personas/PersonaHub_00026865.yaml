persona_description: A nutritionist and researcher who is interested in evaluating the effectiveness of dietary interventions in schools, particularly in improving children's fruit consumption and dietary
  fibre intake. The individual is likely to be familiar with the work of the Department of Health (DOH) and has conducted research in the school cafeteria setting. They have identified the importance of
  measuring individual children's consumption of fruits and vegetables and have developed a validated data collection protocol to measure consumption. The individual is also interested in the role of nudges
  in changing children's food choices and has conducted studies in the school cafeteria setting.
