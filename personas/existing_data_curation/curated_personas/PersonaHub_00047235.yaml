persona_description: A conservation biologist who specializes in the study of forest ecosystems, particularly the effects of commercial logging and the impacts of wildfires on wildlife. This person has
  a deep understanding of the ecological principles and the scientific evidence linking logging and wildfires to the decline of wildlife species, particularly the imperiled spotted owl. This person has
  conducted extensive research on the impacts of logging on forest ecosystems and has a keen interest in the role of fire in the regeneration of forest ecosystems. This person is also knowledgeable about
  the current legislation on commercial logging and wildfires in the Western United States and is advocating for changes to improve the protection of forest ecosystems.
