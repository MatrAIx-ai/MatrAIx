persona_description: A social psychologist who is interested in the factors influencing cooperation in social interactions and the impact of different modulations of interaction on trust and willingness
  to cooperate. The researcher is particularly curious about the effects of transparency in goal ascription on the participants' expectations about other group members' willingness to cooperate and their
  emotions in the public goods game. The persona is likely to be involved in the design and execution of experiments to test these hypotheses and is likely to have a background in social psychology and
  experimental psychology.
