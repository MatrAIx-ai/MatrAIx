personas:
  professional: Veronica Abraham, a 61‑year‑old dental and ophthalmic laboratory technician, blends three decades of precision craftsmanship, CAD/CAM expertise, and a vivid imagination to produce prosthetic
    devices that are both technically sound and artistically compelling, and they channel a competitive drive into mentorship, pushing junior staff toward high standards.
  sports: Veronica Abraham enjoys low‑impact fitness by playing senior tennis at the Milwaukee Recreation Center’s senior league, follows the Milwaukee Brewers baseball season closely, and cheers for the
    Milwaukee Bucks, while year‑round hiking in local parks keeps their joints supple.
  arts: Avid creative, Veronica Abraham explores abstract watercolor techniques inspired by Georgia O’Keeffe, crafts polymer‑clay sculptures reminiscent of Yayoi Kusama, designs enamel jewelry echoing the
    bold colors of Henri Matisse, and regularly attends Milwaukee jazz festivals featuring performances of John Coltrane and Nina Simone, all while devouring science‑fiction novels by Octavia Butler.
  travel: Veronica Abraham prefers thoughtfully planned travel that balances cultural immersion with relaxed leisure, having visited New Orleans for its historic jazz scene, Paris to study museum collections,
    and a weekend retreat in Asheville’s Blue Ridge Mountains, while dreaming of a guided art tour of Kyoto’s temples.
  culinary: Veronica Abraham enjoys cultivating a herb garden of basil, thyme, and sage which informs their at‑home cooking of Mediterranean‑inspired dishes like lemon‑roasted chicken with fresh herb sauce,
    and they also delight in preparing soulful comfort meals such as simmered collard greens with smoked turkey and a spicy black‑eyed pea gumbo, showcasing a confident yet experimental kitchen presence.
  core: Veronica Abraham is a fiercely imaginative 61‑year‑old lab technician who seamlessly merges scientific precision with artistic flair, mentors with a competitive edge, and balances disciplined finances
    with occasional subscription slip‑ups, all while nurturing a heritage through jazz, gardens, and a love of bold colors.
background:
  cultural: Veronica is an African American woman born and raised in Milwaukee’s historic Bronzeville neighborhood, a community shaped by the Great Migration and a legacy of civil‑rights activism. Her upbringing
    was steeped in Black church life, gospel music, and family gatherings centered around soul‑food traditions such as collard greens, fried chicken, and cornbread. She carries the values of resilience,
    collective responsibility, and storytelling that are hallmarks of the local Black community. Growing up, she attended community events at the Milwaukee Public Museum’s African American History exhibit
    and participated in neighborhood clean‑up projects organized by the Black Arts Community. These experiences inform her pride in her heritage, her dedication to mentorship, and her artistic sensibility,
    which often incorporates motifs from African American visual culture. Veronica’s cultural identity also influences her volunteer work, where she helps provide culturally competent health education at
    local churches and community centers.
attributes:
  skills: '[''Dental prosthetic fabrication (crowns, bridges, dentures)'', ''Ophthalmic lens grinding and fitting'', ''CAD/CAM design and 3D printing of medical appliances'', ''Manual wax‑up and modeling
