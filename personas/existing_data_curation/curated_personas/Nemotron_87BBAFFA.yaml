    (OSHA, HIPAA)'', ''Laboratory equipment maintenance and troubleshooting'', ''Aesthetic design and artistic customization'', ''Patient and clinician communication'', ''Team training, mentorship, and
    apprenticeship guidance'', ''Inventory management and procurement'', ''Digital imaging interpretation and workflow optimization'']'
  hobbies: '[''Abstract watercolor painting'', ''Polymer‑clay sculpting'', ''Enamel jewelry design'', ''Reading science‑fiction and art‑history'', ''Volunteering at community health fairs'', ''Singing in
    a gospel/jazz choir'', ''Herb and culturally significant vegetable gardening'', ''Attending Milwaukee jazz and Black cultural festivals'', ''Experimenting with desktop 3‑D printing for artistic projects'']'
  career_goals: As she approaches retirement, Veronica aims to transition from routine production to a mentorship and innovation role. She plans to develop a niche service within her lab that offers artistically
    customized denture aesthetics and specialty ocular lenses, leveraging her visual imagination. Veronica hopes to become a certified instructor at a local community college or apprenticeship program,
    teaching the next generation of technicians both technical fundamentals and the creative problem‑solving she values. She also aspires to author a practical guide on integrating artistic design into
    medical appliance fabrication and to present her work at regional dental‑lab conferences. Ultimately, she wants to leave a legacy of elevated craftsmanship that blends science, art, and cultural pride
    while maintaining a balanced schedule that supports her family and community commitments.
