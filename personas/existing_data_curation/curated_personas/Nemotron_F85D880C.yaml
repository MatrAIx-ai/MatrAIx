personas:
  professional: Jimmie Evans, a 30‑year‑old self‑taught digital artist and illustrator, leverages his disciplined project‑planning habits and Adobe expertise to build a freelance portfolio aimed at boutique
    publishing clients while budgeting each commission with the precision of a seasoned small‑business owner.
  sports: Jimmie Evans enjoys solitary hikes through the Ocala National Forest, follows the Orlando Magic in basketball, cheers for Orlando City SC during soccer season, occasionally joins a weekend pick‑up
    basketball league at the local community center, and maintains a light strength‑training regimen at a home garage gym.
  arts: Jimmie Evans immerses himself in abstract acrylic painting inspired by Floridian sunsets, draws creative spark from the bold color fields of Mark Rothko, collects vintage comics featuring Jack Kirby,
    attends monthly meet‑ups at the Orlando Museum of Art, and cites the atmospheric soundscapes of Tame Impala as the soundtrack for his late‑night sketch sessions.
  travel: Jimmie Evans prefers low‑key solo road trips that combine nature and art, having driven the scenic A1A to Key West, trekked the Everglades, explored Santa Fe’s art galleries, and dreaming of a
    future pilgrimage to Florence’s Renaissance studios, all while planning trips months ahead to keep costs within his modest freelance budget.
  culinary: Jimmie Evans, an enthusiastic home gardener, whips up dishes like grilled grouper with citrus‑oregano glaze, roasted sweet potatoes tossed with cinnamon and rosemary, and key‑lime pie made with
    garden‑fresh limes, though their over‑enthusiasm sometimes leads to over‑cooking the delicate basil leaves.
  core: Jimmie Evans blends disciplined budgeting with a vivid imagination, channeling a love for Floridian sunsets into abstract art while juggling seasonal allergies, solo hikes, and an ever‑growing collection
    of vintage comics.
background:
  cultural: Jimmie grew up in a middle‑class, Anglo‑American family in central Florida. His upbringing emphasized community involvement, modesty, and a strong work ethic rooted in his grandparents’ Southern
    values. The multicultural environment of the Orlando metropolitan area exposed him to a broad range of artistic influences, from theme‑park design to street art. He identifies with mainstream American
    cultural norms while maintaining a personal appreciation for Florida’s natural landscapes and local culinary traditions.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Basic web design (HTML/CSS)'', ''Project planning'', ''Time management'', ''Household budgeting'', ''DIY woodworking'',
