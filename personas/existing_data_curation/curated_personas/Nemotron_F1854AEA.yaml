  hobbies: '[''Chess'', ''Woodworking'', ''Herb gardening'', ''Reading historical non-fiction'', ''Cooking Mexican cuisine'', ''Family outings'', ''Teaching computer basics to seniors'']'
  career_goals: Jesús seeks to advance to a supervisory role such as Surveillance Team Lead or Security Operations Manager within a major casino or security consulting firm, where he can apply his organizational
    strengths and high standards to improve operational efficiency. He aims to obtain professional certifications (e.g., CPP, PSP) and to develop a formal training curriculum for entry-level officers. Over
    the next five years, he plans to transition into a part-time consultancy that advises casinos on best-practice surveillance strategies, while mentoring junior staff and eventually preparing for a phased
    retirement.
