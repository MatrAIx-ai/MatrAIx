personas:
  professional: Carlos Fernandez is a seasoned carpenter and project lead who blends three decades of framing, cabinetmaking, and intricate wood carving with Mexican folk motifs, they bring a compassionate,
    cooperative approach to client communication, and their balanced blend of organization and flexibility keeps job sites running smoothly.
  sports: Carlos Fernandez enjoys low‑impact fitness through early‑morning walks in the Arroyo Seco, weekend hikes with the Los Angeles Hiking Club, and cheering on the Los Angeles Lakers and Dodgers, while
    occasionally joining a friendly senior basketball league at the Azusa Community Center.
  arts: Carlos Fernandez enriches evenings with visits to the Getty Center to admire works by Frida Kahlo and Diego Rivera, attends weekly salsa and folklórico sessions at Casa del Baile where the music
    of Celia Cruz and Tito Puente sets the rhythm, and supports local murals by artist Shepard Fairey, which fuels his own creative wood carving.
  travel: Carlos Fernandez plans trips with a detailed itinerary, favoring immersive cultural journeys to Oaxaca and San Miguel de Allende to study traditional woodworking, while also taking weekend getaways
    to Yosemite for hiking, balancing his love of adventure with family responsibilities that limit extended travel.
  culinary: Carlos Fernandez is an avid home chef who expertly prepares tamales with masa and pork, simmered mole poblano infused with dried pasilla and ancho chiles and a hint of cacao, and regularly seasons
    fresh garden rosemary and thyme into grilled fish, constantly experimenting with family recipes while maintaining a well‑stocked pantry of corn masa, ancho chilies, and artisanal cheese.
  core: Carlos Fernandez marries a lifelong devotion to handcrafted woodwork with a perpetual worry about meeting deadlines, a habit of humming folk songs while sanding, and a reluctant tendency to postpone
    routine health check‑ups for the next project.
background:
  cultural: Carlos was raised in a Mexican‑American household, with his parents having emigrated from Jalisco during the 1970s. He grew up bilingual, celebrating traditions such as Día de los Muertos, Las
    Posadas, and Mexican Independence Day with his extended family in Los Angeles County. The strong emphasis on family cohesion, respect for elders, and community support shaped his compassionate outlook.
    His heritage influences his craftsmanship; he often incorporates Mexican decorative motifs like Talavera tile patterns and indigenous wood‑carving styles into his projects. Living in Azusa, he balances
    his Mexican roots with the multicultural environment of Southern California, participating in local Hispanic community events, attending the annual Mexican Cultural Festival, and maintaining ties to
    both the Mexican diaspora and broader American society.
attributes:
  skills: '[''Framing'', ''Cabinetmaking'', ''Custom furniture design'', ''Wood carving'', ''Blueprint reading'', ''Material estimation'', ''Cost budgeting'', ''California building code compliance'', ''Safety
    regulations'', ''Hand and power tool proficiency'', ''Finishing techniques (staining, varnishing, oiling)'', ''Sustainable building practices (reclaimed wood, low‑VOC finishes)'', ''Project leadership'',
    ''Crew supervision'', ''Apprentice mentorship'', ''Client communication'', ''Bilingual Spanish-English'']'
  hobbies: '[''Custom woodworking projects (e.g., guitars, furniture restoration)'', ''Cooking traditional Mexican cuisine'', ''Visiting art galleries and cultural festivals'', ''Salsa and folklórico dance
    classes'', ''Gardening'', ''Reading architecture and design literature'', ''Volunteering as a woodworking instructor for youth'']'
  career_goals: Carlos aims to transform his independent carpentry work into a boutique studio that showcases a line of handcrafted furniture inspired by Mexican folk art, targeting both local clients and
    tourists. He plans to obtain LEED Accredited Professional certification to enhance his expertise in green building and to market his services as environmentally conscious. Over the next five years,
    he hopes to mentor a cohort of apprentices through a free community workshop he will establish in Azusa, providing hands‑on training and fostering vocational pathways for at‑risk youth. Ultimately,
    Carlos seeks a balanced retirement where he can continue limited custom projects, teach woodworking classes, and travel to Mexico to study traditional craftsmanship, all while ensuring financial stability
    for his family.
