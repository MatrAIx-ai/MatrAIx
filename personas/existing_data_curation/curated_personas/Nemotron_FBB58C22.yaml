personas:
  professional: Kandace Keels, an 18‑year‑old maintenance technician with an associate’s degree in Maintenance Technology, pairs a practical knack for troubleshooting HVAC, electrical and plumbing systems
    with relentless curiosity for new repair techniques, excels at meticulous work‑order documentation and safety compliance, and fosters a cooperative, calm workplace even during tight deadlines.
  sports: Kandace Keels channels their love for the outdoors into weekend hikes along the Mississippi River bluffs and fishing trips, roots for the St. Louis Cardinals in baseball, stays active with a local
    rock‑climbing gym, and occasionally joins pick‑up basketball games at the community center, balancing solo pursuits with light team‑sport camaraderie.
  arts: Kandace Keels expresses creativity through DIY woodworking and vintage‑appliance restoration, finds inspiration in folk artists like The Avett Brothers and indie filmmaker Greta Gerwig, and attends
    local community‑theater productions, allowing artistic appreciation to complement their hands‑on technical world.
  travel: Kandace Keels plans travel around natural sites, having already road‑tripped to the Ozark National Forest and camped in Acadia National Park, while dreaming of a future backpacking trek through
    Patagonia’s Torres del Paine to combine rugged hiking with low‑budget adventure.
  culinary: Kandace Keels, a modest yet experimental cook, frequently prepares grilled trout caught on weekend outings seasoned with lemon‑pepper and smoked paprika, pairs it with homemade corn tortillas
    and avocado salsa, and indulges in occasional weekend barbecues featuring slow‑cooked pork ribs glazed with apple‑cider reduction.
  core: Kandace Keels, an 18‑year‑old maintenance prodigy who balances a methodical budget, a habit of hoarding spare parts, and a relentless love for hiking and DIY projects, navigates life with calm pragmatism
    and a quietly curious spirit.
background:
  cultural: Kandace grew up in La Crescent, Minnesota, a small Midwestern town with strong community ties and a predominantly White population of German and Scandinavian ancestry. Her family values emphasize
    hard work, modesty, and helping neighbors, reflecting the region’s agricultural and industrial heritage. Raised in a Protestant household, she was taught the importance of reliability, humility, and
    cooperation. These cultural influences, combined with the local emphasis on outdoor recreation and self‑reliance, shape her practical outlook and her desire to contribute positively to her community.
attributes:
  skills: '["Electrical troubleshooting and repair", "Plumbing maintenance and leak detection", "HVAC system servicing and filter replacement", "Preventive maintenance planning", "Use of hand and power
    tools", "Safety compliance (OSHA, EPA)", "Work order documentation and computer logging", "Basic blueprint reading", "Team collaboration and communication", "Problem‑solving and quick decision making"]'
  hobbies: '["Hiking and nature walks", "Fishing on the Mississippi River", "DIY woodworking and furniture building", "Restoring vintage appliances", "Electronics hobby projects", "Reading technical manuals
    and home‑improvement blogs", "Community clean‑up volunteering"]'
  career_goals: Kandace aims to deepen her technical expertise by earning certifications such as the EPA Universal Certification, NATE HVAC certification, and a Journeyman Electrician license. Over the
    next five years, she hopes to move into a senior maintenance supervisor role where she can mentor new technicians and implement efficiency‑focused maintenance programs. Long‑term, she is interested
    in starting her own small‑scale repair business, offering reliable home‑repair services while continuing to learn about sustainable building technologies.
