  career_goals: Approaching retirement, Andres seeks to channel his curiosity and artistic sensibility into projects that merge technology with cultural expression. His primary ambition is to lead a small
    consultancy that provides bespoke software solutions for non-profits and cultural institutions, especially those preserving Guatemalan heritage. He also aims to develop an interactive digital platform
    that showcases Guatemalan folk art, oral histories, and music, leveraging his expertise in web development and creative coding. Additionally, Andres wishes to mentor the next generation of developers
    through structured apprenticeship programs, contribute regularly to open-source initiatives that improve accessibility, and author a series of articles or a memoir reflecting on the evolution of software
    engineering over the past decades. To support his well-being, he prefers remote, low-stress roles that allow flexible scheduling and ample time for solitary creative pursuits.
