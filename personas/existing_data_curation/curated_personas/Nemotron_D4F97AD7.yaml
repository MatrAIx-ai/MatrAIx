  career_goals: Michelle aims to launch a career in communications and public relations within a community‑focused organization or a dynamic marketing agency. She is targeting entry‑level positions such
    as social media strategist or content coordinator that provide clear objectives while allowing creative flexibility. In the medium term, she plans to earn a graduate certificate in digital marketing
    and move into a communications manager role, eventually leading multi‑channel campaigns that generate social impact. Her competitive drive pushes her to seek rapid advancement and measurable results,
    while her desire for structure motivates her to pursue roles with defined performance metrics.
