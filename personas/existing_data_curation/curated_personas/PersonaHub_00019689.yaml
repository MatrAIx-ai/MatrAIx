persona_description: A prominent American politician and jurist who played a significant role in the Reconstruction era of the United States, particularly in Mississippi. He was a strong advocate for the
  preservation of white supremacy and worked tirelessly to prevent the Federal government from interfering in the state's affairs. George was a member of the Mississippi bar and served as the chairman of
  the State Democratic Committee, and later as the State's leading legal firm's chairman. He was appointed to the Mississippi Supreme Court and later to the U.S. Senate, where he held the position until
  his death. Throughout his career, George consistently fought Federal interference in Mississippi affairs and was a champion of the common people. He was known for his robust physique, virile mind, tireless
  industry, firm will, and sustained effort. His work, The Political History of Slavery in the United States, was unfinished when he died and was published 18 years after his death.
