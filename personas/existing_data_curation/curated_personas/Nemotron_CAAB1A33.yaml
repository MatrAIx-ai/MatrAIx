  career_goals: Benjamin aims to transition into senior procurement leadership within the next five years, targeting a role such as Procurement Manager or Director of Purchasing for a regional manufacturing
    firm. He plans to earn the Certified Professional in Supply Management (CPSM) credential and to champion sustainable sourcing initiatives that increase supplier diversity and reduce environmental impact.
    Additionally, he wishes to mentor junior staff, fostering a collaborative team culture that balances innovative ideas with proven best practices, while preserving his commitment to work‑life balance
    and community involvement.
