  career_goals: Although retired, Amy aims to deepen her involvement in community service. She hopes to expand the local senior‑center garden program, mentor younger volunteers in sustainable gardening
    practices, and help preserve family and town histories through oral‑history projects. She also aspires to continue learning, perhaps taking a short course in digital photography to document local events
    and nature. Maintaining her health, staying emotionally balanced, and ensuring her marriage remains a source of mutual support are central to her personal ambitions.
