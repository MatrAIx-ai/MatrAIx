  hobbies: '[''Reading non-fiction (business, self‑improvement)'', ''Fishing at local lakes'', ''Hiking in Paynes Prairie Preserve State Park'', ''Model kit building (aircraft, cars)'', ''Puzzle solving
    (Sudoku, logic puzzles)'', ''Playing solo strategy video games'', ''Cooking methodical recipes (baking)'', ''Listening to instrumental jazz'', ''Organizing and decluttering personal spaces'', ''Volunteering
    for youth mentorship programs (structured sessions)'']'
  career_goals: In the short term, Alland aims to become the top‑performing sales representative at his company, achieve his quarterly quotas consistently, and earn a Certified Professional Sales Leader
    (CPSL) credential. Within the next three to five years, he plans to advance to a senior sales manager role, overseeing a small team while maintaining his structured, data‑focused approach. Ultimately,
    he envisions launching his own wholesale distribution business that serves niche manufacturing markets, leveraging his disciplined work ethic and deep industry knowledge to create a predictable, scalable
    operation.
