persona_description: A historian who specializes in the study of historical events from the 18th century, with a particular interest in the British and French military campaigns in North America and Europe
  during the Seven Years' War. He/she is also interested in the social and political changes that occurred during this time period, and how they influenced the development of the United States and Canada.
  The persona is knowledgeable about key events such as the Battle of Barari Ghat, the creation of Pownal, Vermont, the Great Fire of Boston, the arrival of New England planters in Nova Scotia, and the
  founding of Mayagüez, Puerto Rico. They are also interested in the role of the church in the settlement of the Americas and the impact of the Great Upheaval on the plantation economy in New England.
