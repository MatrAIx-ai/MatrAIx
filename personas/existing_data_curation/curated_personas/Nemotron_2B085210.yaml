  hobbies: '[''Scale Model Building'', ''Reading Architectural History'', ''Sketching Designs'', ''Hiking and Birdwatching'', ''Playing Bridge'', ''STEM Mentorship for High School Students'']'
  career_goals: At this stage of his career, Joshua aims to secure a lasting legacy in his community by shifting from day‑to‑day management to a senior advisory role. He plans to serve on the Rush County
    planning commission, guiding the integration of green building standards and preserving local historical architecture. Joshua also intends to publish a case‑study series on low‑rise sustainable design
    in Midwestern towns, mentor a cohort of emerging engineers through a regional apprenticeship program, and consult on select high‑profile projects that challenge conventional practices while respecting
    practical constraints. His competitive spirit fuels a desire to see his protégés earn professional accolades and to have his contributions recognized through industry awards.
