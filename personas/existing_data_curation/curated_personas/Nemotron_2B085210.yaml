personas:
  professional: Joshua Dalton, an experienced architectural and engineering leader, harnesses four decades of BIM expertise, strict Indiana code compliance, and meticulous budgeting to deliver sustainable
    civic projects, while methodically mentoring emerging engineers and steering his transition toward a senior advisory role on the Rush County planning commission.
  sports: Joshua Dalton avidly follows the Indianapolis Colts and the Chicago Cubs, hikes the Hoosier Trail with the Hoosier Trail Hikers club each spring, and competes in weekly bridge tournaments at the
    Rushville Bridge Club, balancing low‑impact cardio with strategic card play.
  arts: Joshua Dalton immerses himself in architectural history, regularly studying the works of Frank Lloyd Wright and Louis Sullivan, attends quarterly exhibitions at the Indianapolis Museum of Art, and
    enjoys listening to classical piano performances by Lang Lang, all of which inspire his detailed scale‑model creations.
  travel: Joshua Dalton prefers meticulously planned road trips to historic Midwestern towns such as New Harmony, Indiana, and Williamsburg, Virginia, while dreaming of a cultural pilgrimage to Barcelona
    to explore Gaudí’s architecture, mixing architecture tours with bird‑watching excursions in national parks.
  culinary: Joshua Dalton favors hearty Midwestern dishes like pork tenderloin glazed with rosemary and a side of cornbread, but delights in ordering the ahi tuna poke bowl at the farm‑to‑table restaurant
    The Harvest Table on special occasions, reflecting his moderate cooking skill and penchant for fresh herbs and occasional culinary indulgence.
  core: Joshua Dalton, a methodical retiree with a competitive edge, blends his love for historic architecture, precise scale‑model building, and strategic bridge play while occasionally hoarding miniature
    bricks and questioning every new trend.
background:
  cultural: Joshua was raised in the heartland of Indiana, embodying Midwestern values of hard work, modesty, and community involvement. His family’s roots trace back several generations to European immigrants
    who settled in the state’s agricultural and industrial regions, fostering a blend of practical ingenuity and appreciation for tradition. Growing up in a small town, he experienced tight‑knit community
    life, church gatherings, and local fairs, which reinforced his sense of responsibility and civic pride. His graduate education in a STEM field broadened his perspective, yet he remains grounded in the
    straightforward, reliable ethos of his upbringing, balancing a respect for established methods with an openness to innovation.
attributes:
  skills: '[''Architectural Design'', ''Structural Engineering'', ''Project Management'', ''Building Information Modeling (BIM)'', ''Construction Documentation'', ''Code Compliance (Indiana)'', ''Sustainable
