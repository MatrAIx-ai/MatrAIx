  career_goals: Beverly aims to become a lead design engineer within the next five years, focusing on sustainable mobility solutions such as electric‑vehicle powertrain components and lightweight structural
    systems. She plans to obtain her Professional Engineer (PE) license and to pursue advanced certifications in additive manufacturing and systems engineering. Driven by both curiosity and practicality,
    she wants to lead interdisciplinary teams that turn innovative concepts into market‑ready products, eventually advancing to a principal engineer or engineering manager role where she can mentor younger
    engineers and influence strategic technology roadmaps.
