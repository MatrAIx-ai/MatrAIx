  career_goals: Patrick aims to advance to a regional sales management role within the next three years, overseeing multiple stores and driving strategic growth. He plans to deepen his expertise in emerging
    vehicle technologies, particularly electric and hybrid power‑train components, positioning himself as a subject‑matter expert. Long‑term, he aspires to lead a statewide parts distribution network or
    launch his own boutique parts consultancy that integrates technical advisory with sales performance analytics.
