persona_description: A thermal engineer who specializes in the analysis and simulation of heat transfer and fluid flow in complex systems. They are skilled in defining and prescribing boundary conditions
  that link the models of different levels, such as wafer, package, board, system, and room. They are proficient in using computational methods and automation tools to optimize and verify the thermal performance
  of products in extreme operating environments. They have experience with modeling and simulating heat and fluid flow in various applications, including semiconductor manufacturing, data centers, and power
  plants. They are adept at interpreting and applying thermodynamic principles to solve complex engineering problems and are skilled in using data and simulations to inform decision-making in the design
  and operation of thermal systems.
