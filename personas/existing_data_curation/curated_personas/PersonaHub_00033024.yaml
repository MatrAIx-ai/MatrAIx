persona_description: Samuel J. Ervin, Jr., a lifelong opponent of civil rights legislation and a member of the Senate's Southern Caucus, was a constitutional expert and a prominent defender of civil liberties.
  His colleagues knew him as "just an ol' country lawyer," but his intellect and expertise were much more than that. Ervin was appointed to the Senate in 1954 and served there for three full terms, during
  which he served on the Select Committee to Study Censure Charges against Joseph McCarthy and chaired the Select Committee on Presidential Campaign Activities, known as the Watergate Committee. His work
  on these committees earned him the respect and admiration of his colleagues and the American public, and he became a kind of folk hero when the House Judiciary Committee used information uncovered by
  the Senate Watergate Committee to draft articles of impeachment against President Richard Nixon, who resigned on August 9, 1974.
