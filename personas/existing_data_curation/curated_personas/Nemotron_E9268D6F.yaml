  career_goals: Ruth Ann aims to complete her high school education—potentially through a GED—and pursue a stable, structured career that lets her help others while providing predictable daily schedules.
    She is drawn to roles such as certified nursing assistant, medical office aide, or early‑childhood educator, where her practical skills, reliability, and sociable nature can shine. Long‑term, she hopes
    to take on leadership responsibilities within her local church or community center, organizing programs that combine her love of structure with opportunities for social engagement and healthy competition.
