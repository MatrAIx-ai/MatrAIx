personas:
  professional: Ruth, a newborn infant, already displays a remarkable knack for establishing structured routines, turning feeding and nap times into a precise schedule while delighting caregivers with lively
    coos that make her the center of attention in any room.
  sports: Ruth, a newborn, loves tummy-time and enjoys the gentle motions of a parent-led baby swimming class at the local YMCA, while her family bonds over watching the Los Angeles Lakers games on TV and
    proudly displays a tiny Lakers blanket in her crib.
  arts: Ruth, a newborn, is soothed by a rotating playlist of Mozart lullabies, the soft acoustic guitar of Ed Sheeran, and classic Disney scores like 'When You Wish Upon a Star,' and she often gazes at
    the vibrant picture books of Eric Carle that adorn her bedside shelf.
  travel: Ruth, a newborn, has already taken a family road trip to the Blue Ridge Mountains of Virginia and a weekend getaway to San Diego, California, preferring car rides with frequent, predictable stops
    that let her watch the passing scenery while her caregivers manage a modest travel budget.
  culinary: Ruth, a newborn, primarily enjoys breastmilk but eagerly reaches for homemade purees of carrots, sweet potatoes, and avocado seasoned with a pinch of cinnamon, and her parents pride themselves
    on preparing organic, low-salt meals using fresh ingredients from the local farmer's market.
  core: Ruth, a newborn with an uncanny love for routine, talkative coos, and a competitive squeal for attention, balances her sociable energy with frequent worry when her schedule is disrupted, making
    her both a charming center of focus and a tiny bundle of nerves.
background:
  cultural: 'Ruth Ann comes from a white, Southern‑American background rooted in rural Floyd County, Georgia. Her upbringing reflects the values of the Appalachian‑influenced region: strong family ties,
    regular church involvement, hospitality, and a deep appreciation for Southern traditions such as folk music, communal gatherings, and home‑cooked meals. The local culture emphasizes hard work, practical
    self‑reliance, and community support, all of which have shaped her pragmatic outlook and competitive spirit while also providing a comforting framework of predictable routines.'
