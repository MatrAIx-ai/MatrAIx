personas:
  professional: Leah Mcafee is a skilled manufacturing assembler who deftly interprets technical drawings, operates CNC machines and MIG welders, and drives lean‑manufacturing improvements, while their
    relaxed yet structure‑loving mindset enables quick pivots on the shop floor and makes them a dependable team mentor ready for a shift‑supervisor role.
  sports: Leah Mcafee bolts onto the field as a pitcher for the Edmond Lady Thunder women’s softball league, stays fit through weekly Zumba classes, roots for the Oklahoma City Thunder and the Oklahoma
    Sooners with unabated enthusiasm, and spends Saturday afternoons hiking the rugged paths of Black Mesa State Park to blend cardio with nature.
  arts: Leah Mcafee’s artistic appetite includes dancing at live country shows headlined by Luke Bryan and Chris Stapleton, rocking out to the Foo Fighters, admiring classic film stars like Tom Hanks, and
    channeling a creative spark into woodworking projects that echo the rustic charm of folk artist Mary Rogers.
  travel: Leah Mcafee favors spontaneous road‑trip adventures that combine hiking, BBQ pit‑stops, and music festivals, having already driven to Zion National Park and the Texas Hill Country, while dreaming
    of a future expedition to Glacier National Park and a culinary tour of Austin’s renowned smoked‑meat scene.
  culinary: Leah Mcafee is a self‑taught backyard grill virtuoso who perfects Kansas‑City‑style smoked brisket, honey‑glazed baby‑back ribs, and tangy coleslaw using blends of smoked paprika, brown sugar,
    and apple cider vinegar, often engineering custom rib racks and spice‑mix dispensers with their 3D printer to elevate weekend cook‑outs.
  core: Leah Mcafee blends a laid‑back, slightly chaotic organization style with a hands‑on, community‑focused energy, juggling group sports, DIY metal projects, spontaneous BBQs, and an ever‑growing list
    of certifications and savings goals while never missing a chance to hit a live concert.
background:
  cultural: Leah grew up in Edmond, Oklahoma, within a culturally Midwestern, Protestant (Baptist) family that emphasizes hard work, community service, and modest living. Her upbringing in the heartland
    has ingrained a strong work ethic and appreciation for local traditions such as country music, BBQ, and the annual Oklahoma State Fair. She feels a deep connection to the friendly, neighborly spirit
    of her community, often participating in town events and volunteer activities that reflect the region's values of cooperation and self‑reliance.
attributes:
  skills: '[''Assembly line operations'', ''Blueprint reading'', ''Hand and power tool proficiency'', ''Basic MIG welding'', ''CNC machine setup basics'', ''Quality inspection and defect tracking'', ''Lean
