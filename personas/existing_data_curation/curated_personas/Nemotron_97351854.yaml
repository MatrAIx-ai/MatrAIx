  hobbies: '[''Softball league'', ''Group fitness classes (Zumba, spin)'', ''DIY home improvement'', ''Woodworking projects'', ''3D printing hobby'', ''Live music concerts'', ''Hiking local trails'', ''Volunteer
    woodworking workshops'', ''Cooking BBQ & Southern cuisine'']'
  career_goals: Leah aims to move from a skilled assembler role into a supervisory position within the next two years, targeting a shift supervisor role where she can mentor new hires and refine workflow
    efficiency. She plans to earn certifications such as the Certified Production Technician (CPT) and a Lean Six Sigma Yellow Belt to deepen her process‑improvement expertise. Long‑term, she envisions
    becoming a plant manager or starting her own custom metal‑fabrication shop that combines her practical skills with her desire for community involvement, all while maintaining a stable, predictable schedule
    that supports her active social life.
