persona_description: A scientist at the University of Arkansas Division of Agriculture who specializes in food science and the production of healthful oils, particularly those rich in conjugated linoleic
  acid (CLA). Proctor and his graduate student, Vishal Jain, have developed a process to produce trans fat oil that contains significant health benefits, specifically CLA. The process uses only refined
  soy oil, which does not introduce the health risks associated with hydrogenated oils. Proctor has received a $275,000 USDA grant to build a pilot plant that will process a greater volume of oil in less
  time.
