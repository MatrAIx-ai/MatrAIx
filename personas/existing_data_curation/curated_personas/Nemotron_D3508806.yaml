  career_goals: Elieser aims to advance to a senior systems analyst or solution architect role within the next five years. He plans to earn industry certifications such as CompTIA Security+, AWS Certified
    Solutions Architect, and ITIL Practitioner to deepen his technical credibility. While pursuing these goals, he seeks opportunities to mentor junior analysts and lead small‑scale projects that allow
    him to blend his curiosity for new technologies with a practical, low‑stress work environment. Ultimately, he wants a position that balances technical depth with strategic planning, offering a predictable
    workload that supports his family life and helps manage his sensitivity to stress.
