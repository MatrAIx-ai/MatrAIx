personas:
  professional: Elieser Gonzalez navigates the intricacies of mid-sized business IT infrastructures as a systems analyst who blends deep curiosity for emerging tech with a practical, low‑stress approach,
    leveraging Windows Server, Linux, virtualization, Python automation, and ITIL best practices while often juggling loose project plans and relying on their knack for translating jargon into plain language
    to keep stakeholders aligned.
  sports: Elieser Gonzalez enjoys quiet weekend fishing along coastal beaches and follows the local baseball team, the Miami Marlins, as well as the regional soccer club, FC Miami, participating in occasional
    pick‑up games while preferring low‑intensity activity to high‑impact sports.
  arts: Elieser Gonzalez blends a love for classic salsa and reggaón—spinning tracks by Celia Cruz and Daddy Yankee—while cooking, and occasionally strums an acoustic guitar at family gatherings, drawing
    inspiration from the rhythmic storytelling of these genres.
  travel: Elieser Gonzalez favors low‑cost, family‑friendly travel, planning weekend road trips to nearby island destinations such as Key West for fishing and cultural immersion, while also dreaming of
    a summer vacation to the historic streets of Cartagena, balancing relaxation with a modest budget.
  culinary: Elieser Gonzalez delights in cooking traditional island dishes like arroz con gandules, tostones, and pasteles, using fragrant sofrito, ripe plantains, and smoky pork, while their moderate cooking
    skills are complemented by a habit of experimenting with new spice blends each Sunday evening.
  core: Elieser Gonzalez is a pragmatic tech enthusiast who soothes stress through fishing, mindful cooking, and gentle guitar chords, yet their penchant for disorganization and lingering worries often
    clash with their desire for a balanced, low‑pressure life.
background:
  cultural: Elieser was raised in a bilingual household in Howard Beach, where his Puerto Rican roots are central to his identity. He grew up speaking Spanish with his parents and grandparents, celebrating
    traditions such as Noche Buena, Three Kings Day, and the annual San Sebastián festival. Family gatherings feature music, dance, and classic dishes like mofongo and lechón. He maintains strong ties with
    relatives on the island, frequently traveling or video‑calling them. His cultural heritage informs his collaborative style—valuing community, respect, and personal relationships—while also enriching
    his palate and love of rhythmic music.
