persona_description: A historian who specializes in the study of Norse paganism, particularly the festivals and traditions celebrated during the month of May, including Thrimilci, Floralia, and Roodmas.
  They are interested in the pagan origins and historical context of these festivals, and have a deep understanding of the cultural and religious practices of the Anglo-Saxon and Roman periods. They are
  also knowledgeable about the Catholic Church's attempts to take over May celebrations and the Puritan's ban on May Day during the English Civil War.
