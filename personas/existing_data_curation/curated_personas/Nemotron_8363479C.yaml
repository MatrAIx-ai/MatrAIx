  hobbies: '[''Visiting Art Galleries and Museums'', ''Painting and Sketching'', ''Cooking South Asian and Tex-Mex Fusion Dishes'', ''Attending Live Music and Jazz Nights'', ''Participating in Community
    Dance Workshops'', ''Traveling to Explore Diverse Cultures'', ''Reading Contemporary Fiction and Non-Fiction'', ''Yoga and Mindful Movement'', ''Gardening'', ''Volunteering for Local Arts Programs'',
    ''Hosting a Monthly Marketing Creativity Meetup'']'
  career_goals: Tam aspires to move into a senior leadership role such as Director of Marketing or Vice President of Brand Strategy, where she can shape high‑impact, culturally inclusive campaigns on a
    regional or national scale. She aims to launch a boutique consultancy that helps emerging brands integrate multicultural storytelling and art‑driven design. Mentoring young marketers, especially women
    of color, is a personal priority, and she hopes to become a recognized thought leader in inclusive marketing and community‑focused branding.
