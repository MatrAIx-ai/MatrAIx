personas:
  professional: Cynthia Guida, a 23‑year‑old network and computer systems administrator in northern Minnesota, blends meticulous documentation, PowerShell automation, and VMware virtualization to keep small‑business
    IT humming while dreaming of leading a team that designs secure, art‑inspired networks for rural communities, and they treat each network diagram like a well‑composed photograph.
  sports: Cynthia Guida skis cross‑country with the Twin Cities Ski Club, joins the Badger Trail Hikers on weekend treks, cheers for the Minnesota Wild during hockey season, and they never miss a Thursday
    night Vikings game at the local bar.
  arts: Cynthia Guida immerses herself in the quiet beauty of Ansel Adams' black‑and‑white mountain photographs, the folk tones of First Aid Kit, and the modern brushwork of Minnesota painter Sarah Thompson,
    regularly browsing the Minneapolis Institute of Arts and catching live sets at The Cedar Cultural Center where the bluegrass duo The Hillbilly Moon plays, and they often recreate Monet’s soft splotches
    in their own watercolor experiments.
  travel: Cynthia Guida prefers meticulously planned road trips to Minnesota’s North Shore, weekend kayaking in the Boundary Waters, and occasional international escapes to Norway’s fjords and Iceland’s
    geothermal pools, balancing budget‑friendly hostels with splurges on boutique photography workshops, and they always pack a waterproof camera bag for the unpredictable weather.
  culinary: Cynthia Guida cooks confidently at a moderate level, favoring rustic dishes like wild‑rice‑and‑mushroom soup, pan‑seared lake perch with fresh dill, and homemade apple‑cinnamon crumble, while
    they often season meals with locally sourced honey, birch syrup, and a dash of rye flour as a nod to family tradition.
  core: Cynthia Guida is a detail‑obsessed network pro who fuses a Midwestern work ethic with a love for art, nature, and community, even if they occasionally hoard extra camera gear and forget to floss.
background:
  cultural: Cynthia grew up in Badger, a small town in Roseau County, Minnesota, within a white, multi‑generational Midwestern family that values community, self‑reliance, and hard work. Her upbringing
    was shaped by long, snowy winters and vibrant seasonal activities, fostering a close connection to nature and outdoor recreation. Local traditions such as county fairs, church gatherings, and high‑school
    sports reinforced a collaborative spirit, while her family's German‑Scandinavian roots introduced her to folk music, craftsmanship, and an appreciation for both practicality and creativity. This cultural
    foundation informs her disciplined work ethic, her sociable personality, and her love for blending technology with artistic expression.
attributes:
  skills: '[''Network troubleshooting'', ''Router and switch configuration'', ''Firewall management'', ''Virtualization (VMware, Hyper‑V)'', ''Scripting (PowerShell, Python)'', ''System monitoring (Nagios,
    PRTG)'', ''Server administration (Windows Server, Linux)'', ''IT project coordination'', ''Technical support'', ''Disaster recovery planning'', ''Documentation and SOP creation'', ''Network security
    best practices'', ''Hardware installation and maintenance'', ''Remote assistance'']'
  hobbies: '[''Digital photography'', ''Watercolor painting'', ''Visiting art galleries'', ''Board gaming'', ''Tabletop role‑playing games'', ''Hiking'', ''Snowshoeing'', ''Cross‑country skiing'', ''Volunteer
    teaching computer basics'', ''DIY electronics and Raspberry Pi projects'']'
  career_goals: Cynthia aims to earn advanced certifications such as Cisco CCNP, CompTIA Security+, and AWS Certified Solutions Architect within the next three years, positioning herself for senior network
    engineer roles. She aspires to lead a team of IT professionals, overseeing the design of scalable, secure networks that serve rural communities like her own in northern Minnesota. Eventually, she envisions
    launching a consultancy that helps small businesses and non‑profits modernize their digital infrastructure while integrating creative solutions that reflect her love of art and technology.
