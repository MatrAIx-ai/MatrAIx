data:
  user 1 personas: 'I do not fully understand my own feelings.

    I wonder what it would be like to be a different gender.

    I feel that i cannot live up to many peoples standards.

    I am unsure of who i am attracted to.'
  user 2 personas: 'I have over 4000 friends on facebook.

    Formal situations make me uncomfortable.

    I live alone.

    I enjoy hitchhiking.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hi!

    User 1: What do you do for fun?

    User 2: I like to go on adventures. I''ve hitchhiked across the country and I''ve climbed mountains.

    User 1: That sounds exciting! I''ve never been hitchhiking, but I''ve always wanted to try it.

    User 2: It''s a lot of fun! It''s a great way to meet new people and see new places.

    User 1: I can imagine. I''m sure it would be a lot of fun to meet new people from all over the country.

    User 2: It is! I''ve met some really interesting people hitchhiking.

    User 1: That''s great! I''m glad you''ve had such a positive experience.

    User 2: Yeah, it''s been really fun. I''ve learned a lot about myself and the world.

    User 1: I''m glad to hear that.

    User 2: Thanks!

    User 1: What''s the most interesting thing you''ve learned about yourself?

    User 2: That I''m more independent than I thought I was.

    User 1: That''s great!

    User 2: Yeah, it is! I''ve always been a bit of a loner, but hitchhiking has really helped me to come out of my shell.

    User 1: That''s good to hear!

    User 2: Yeah, it is! I''m really glad I decided to try it.

    User 1: I''m sure you''ll have many more adventures in the future.

    User 2: I hope so!

    User 1: What''s your favorite place you''ve ever hitchhiked to?

    User 2: I''m not sure. I''ve been to a lot of amazing places.

    User 1: I''m sure you have!

    User 2: Yeah, I have! I guess I''d have to say New York City is my favorite.

    User 1: New York City is a great city!

    User 2: It is! I love the energy there.

    User 1: I can imagine. It''s a very vibrant city.

    User 2: Yeah, it is! I''m glad I had the chance to visit.

    User 1: I''m glad you did too!'
