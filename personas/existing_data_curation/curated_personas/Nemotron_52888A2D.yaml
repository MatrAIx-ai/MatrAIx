personas:
  professional: Kayla Muto, a retired elementary teacher turned community arts champion, blends their two‑decades of curriculum design expertise with a vivid imagination to craft intergenerational workshops
    where seniors and children co‑author stories, paint abstracts, and snap photographs that celebrate local heritage.
  sports: Kayla Muto, an avid walker who trails the Tennessee River greenway each morning, cheers on the Tennessee Titans on Sundays, and joins a friendly senior bowling league at the local community center,
    while occasionally participating in community garden volunteer days that count as light exercise.
  arts: Kayla Muto, whose watercolor canvases echo the bold colors of Georgia O'Keeffe and whose photography captures the rustic charm of Terry Miller's Southern architecture, regularly attends bluegrass
    concerts featuring the Del McCoury Band and folk sessions with the Avett Brothers, and admires the stage work of actress Audra McDonald, weaving these influences into their weekly crafts workshops at
    the senior center.
  travel: Kayla Muto, preferring low‑key road trips that balance cultural curiosity with accessibility, explores nearby gems such as the Great Smoky Mountains National Park and historic Asheville in the
    fall, dreams of strolling the gardens of Japan’s Kyoto during cherry blossom season, and often plans trips around family reunion dates to keep travel costs manageable.
  culinary: Kayla Muto, who enjoys preparing Southern comfort dishes like shrimp and grits topped with fresh parsley, baking lemon‑infused cornbread with a drizzle of honey, and assembling crisp watercress
    salads with goat cheese and toasted pecans, finds joy in growing heirloom tomatoes in their garden and occasionally indulges in a slice of rich chocolate cake at local bake‑sales.
  core: Kayla Muto, a relentlessly curious 73‑year‑old who mixes imagination with disciplined organization, effortlessly blends teaching, art, and community service, yet secretly hoards mismatched tea cups
    and occasional extra‑large slices of cake that they never finish.
background:
  cultural: Kayla was born and raised in the Appalachian foothills of Tennessee during the post‑World War II era. Her family’s heritage is rooted in Southern Appalachian traditions, which emphasized storytelling,
    music, and close‑knit community ties. Growing up in a modest, church‑centered household, she internalized values of hospitality, humility, and collective responsibility. The region’s rich folk art and
    craft legacy sparked her lifelong love of visual expression. Relocating to Chattanooga in her thirties exposed her to a growing, culturally diverse city, where she embraced the revitalized arts scene
    while preserving her Southern sensibility. These experiences blend a respect for tradition with an openness to novelty, informing her community‑focused and collaborative outlook.
