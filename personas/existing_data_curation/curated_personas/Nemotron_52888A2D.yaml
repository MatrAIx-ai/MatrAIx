  career_goals: Kayla aims to expand her impact on lifelong learning by establishing an intergenerational art program at the local community center, where seniors and youth collaborate on creative projects.
    She hopes to mentor new teachers through informal coaching circles and to develop a series of workshops that blend storytelling, visual art, and abstract thinking. Additionally, she aspires to author
    a collection of short stories and reflective essays about her teaching career and the changing educational landscape, and to serve on the board of the Chattanooga Arts & Culture Alliance to help shape
    inclusive community programming.
