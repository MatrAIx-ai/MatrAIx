personas:
  professional: Marcus Hill is a meticulous full‑stack software developer who writes test‑driven JavaScript, TypeScript, Python and Go, architects cloud micro‑services on AWS and Azure, and mentors junior
    engineers while keeping a disciplined sprint cadence, all driven by a curiosity for new patterns balanced with practical, organized execution.
  sports: Marcus Hill is an early‑morning lakefront runner who logs 5‑6 km runs with Strava, follows the Chicago Bulls and Cubs as a loyal fan, participates in a local pickup basketball league on weekends,
    and treats chess as a strategic sport, competing on online platforms to sharpen mental stamina.
  arts: Marcus Hill is a street‑photographer who captures Chicago’s skyline and murals, unwinds to Miles Davis, John Coltrane and Kendrick Lamar, curates a personal playlist of jazz and hip‑hop that fuels
    their coding rhythm, and applauds local spoken‑word events that echo the community’s storytelling tradition.
  travel: Marcus Hill prefers meticulously planned trips that blend cultural immersion with downtime, having explored New Orleans for its jazz roots, taken a weekend road‑trip to Milwaukee’s lakefront,
    and dreaming of a future visit to Barcelona’s architecture while budgeting travel expenses through a dedicated travel fund.
  culinary: Marcus Hill enjoys cooking soulful dishes such as shrimp and grits, collard greens with smoked turkey, and sweet potato pie, experimenting with spices like smoked paprika and cayenne, while
    their spouse handles plating and they often end up multitasking between stirring a pot and debugging a script.
  core: Marcus Hill is a disciplined, curiosity‑driven technologist who runs at dawn, snaps urban photos, mentors youth, and treats life like a finely tuned algorithm, even if occasional late‑night hardware
    tinkering and skeptical competitiveness sometimes throw off their otherwise organized rhythm.
background:
  cultural: Marcus grew up in Chicago's South Side as part of an African-American family that prized education, community, and resilience. His upbringing was shaped by church gatherings, neighborhood block
    parties, and a strong tradition of storytelling. He draws inspiration from the city's rich blues and jazz heritage and incorporates that cultural rhythm into his work ethic. Marcus remains active in
    local initiatives that promote diversity in technology, such as the Chicago Urban League's tech mentorship program, and he celebrates cultural milestones like Juneteenth with his family and friends.
