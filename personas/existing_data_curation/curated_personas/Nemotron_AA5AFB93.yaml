  hobbies: '[''Raspberry Pi projects'', ''Smart-home automation'', ''Street photography'', ''Chess'', ''Jazz music'', ''Hip-hop music'', ''Cooking'', ''Lakefront running'', ''Board-game nights'', ''Mentoring
    coding workshops'']'
  career_goals: He aims to become a principal engineer or lead architect within the next five years, guiding large-scale fintech platforms that serve underbanked communities. Marcus plans to earn an AWS
    Solutions Architect Professional certification and a part-time master's degree in Computer Science to deepen his expertise in distributed systems and machine learning. He also aspires to launch his
    own SaaS venture focused on secure, low-cost payment solutions, while continuing to mentor Black youth in tech through coding bootcamps and speaking at industry conferences.
