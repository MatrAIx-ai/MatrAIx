personas:
  professional: Alice Suarez is a budding preschool architect, building block towers that fuse bright imagination with sturdy, tried‑and‑true designs, leading group play with confident yet relaxed guidance
    while they favor flexible schedules over rigid classroom rules.
  sports: Alice Suarez plays on the Tiny Tigers preschool soccer team, cheering loudly for the New York Yankees during family game nights, while also enjoying spontaneous dance circles in the living room
    and energetic tag games on the playground, embodying a sociable and flexible attitude toward fitness.
  arts: Alice Suarez loves drawing Peppa Pig and Mickey Mouse, singing along to The Wiggles and Sesame Street songs, and often puts on mini‑concerts for family, balancing a love for classic nursery rhymes
    with a curiosity for new cartoon characters and bold color experiments.
  travel: Alice Suarez delights in family trips to Disneyland and the shoreline of Myrtle Beach, preferring day‑long outings with loose itineraries that allow spontaneous ice‑cream stops, and they dream
    of someday seeing the Eiffel Tower in Paris, blending adventurous curiosity with a relaxed travel style.
  culinary: Alice Suarez favors macaroni and cheese, peanut butter‑and‑jelly sandwiches, and strawberry slices, enjoys stirring batter for banana muffins (though they sometimes sprinkle flour across the
    kitchen), and they eagerly request extra honey on toast, reflecting an enthusiastic yet occasionally messy culinary curiosity.
  core: Alice Suarez is a curious, energetic four‑year‑old who blends playful imagination with practical habits, thriving in group settings while delighting in spontaneous adventures and occasional messes.
background:
  cultural: Alice comes from a white, Midwestern family in Oak Grove, Missouri. Her upbringing reflects the rural community’s values of friendliness, self-reliance, and close family ties. She often participates
    in community events like county fairs and church gatherings, enjoying potluck meals and local music. The cultural emphasis on outdoor play, modesty, and helping neighbors influences her daily life.
