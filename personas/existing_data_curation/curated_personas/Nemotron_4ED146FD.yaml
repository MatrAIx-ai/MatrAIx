personas:
  professional: Yukiko Wiggins, a 37‑year‑old private investigator, blends a methodical forensic mindset with a competitive drive, leveraging expertise in digital forensics, open‑source intelligence, and
    courtroom preparation to deliver meticulous cyber‑crime and corporate fraud investigations while meticulously planning every case.
  sports: Yukiko Wiggins enjoys weekend hikes across the Appalachian foothills, practices self‑defense drills at a local women’s club, follows the Baltimore Ravens for football, and joins a community running
    group for 5K races, approaching fitness with a blend of discipline and occasional playful competition.
  arts: Yukiko Wiggins immerses themselves in classic mystery novels by Agatha Christie, captures moody street scenes inspired by Henri Cartier‑Bresson’s photography, and unwinds to the jazz‑infused compositions
    of Miles Davis, allowing artistic expression to sharpen their observational instincts.
  travel: Yukiko Wiggins prefers meticulously planned journeys that balance nature and culture, having trekked the White Mountains, explored the historic streets of Kyoto, and now yearning to tackle the
    Patagonia Torres del Paine trek while balancing a modest travel budget with occasional splurges on boutique lodgings.
  culinary: Yukiko Wiggins experiments in the kitchen with Japanese‑American fusion, mastering dishes like miso‑glazed salmon with corn‑edamame salad, hand‑rolled sushi burritos featuring pickled ginger
    and jalapeño, and spices meals with shichimi togarashi while relying on garden‑fresh heirloom tomatoes and kale for daily meals.
  core: Yukiko Wiggins is a relentlessly organized sleuth who balances solitary hikes, precise tea ceremonies, and a competitive edge, resulting in a quirky habit of cataloguing every camera lens like evidence
    and a tendency to double‑check every detail before sleep.
background:
  cultural: Yukiko Ann Wiggins is a white American raised in a small-town, middle‑class family in York County, Pennsylvania. Her given name reflects a deep personal connection to Japanese culture—her husband
    is a second‑generation Japanese‑American, and they have embraced many traditions such as tea ceremony, language study, and celebration of the Cherry Blossom Festival. While she identifies primarily
    with mainstream American values—self‑reliance, punctuality, and community participation—her household blends these with Japanese aesthetics and customs, influencing her disciplined work ethic and appreciation
    for balance between novelty and tradition.
