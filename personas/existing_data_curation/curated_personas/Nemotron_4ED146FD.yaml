  career_goals: She aims to transition from a solo investigator to founding her own boutique investigative firm, specializing in cyber-crime and corporate fraud. Within the next five years, she hopes to
    obtain senior certification (e.g., Certified Professional Investigator), mentor junior detectives, and develop a training curriculum for local law enforcement. Long-term, she envisions authoring a practical
    guide on investigative techniques and becoming a speaker at national security conferences.
