personas:
  professional: A budding architect-in-training, Hyun San channels their meticulous, disciplined nature into crafting intricate LEGO cityscapes and mastering advanced arithmetic puzzles, laying the groundwork
    for a future career in design or engineering.
  sports: A disciplined Taekwondo student who also follows the Los Angeles Dodgers, Los Angeles Lakers, and LA Galaxy, Hyun San attends a local youth soccer clinic on weekends, treating each drill as a
    tactical puzzle and striving to outperform peers.
  arts: A creative soul, Hyun San spends afternoons sketching manga‑style characters inspired by Studio Ghibli’s Hayao Miyazaki and Naoko Takeuchi while practicing piano pieces by Yiruma and Mozart, often
    sharing their artwork at the school art club and online fan forums.
  travel: Balancing school schedules with family travels, Hyun San has explored Disneyland, the San Diego Zoo, and the Korean Festival of Santa Anita, while dreaming of a future adventure to Tokyo’s anime
    district Akihabara and a weekend road trip along the Pacific Coast Highway.
  culinary: A budding food enthusiast, Hyun San loves the tangy crunch of kimchi, the colorful layers of bibimbap, and the celebratory taste of tteokguk, and often helps their parents stir‑fry bulgogi while
    also mastering the art of making perfect pepperoni pizza at home.
  core: Hyun San is a curious, organized nine‑year‑old who blends disciplined study with creative art, projects a competitive streak, and navigates a world of cherished family holidays and lively school
    projects.
background:
  cultural: Hyun's cultural background is rooted in his Korean immigrant family while growing up in the multicultural community of Garden Grove, Orange County. At home he speaks Korean with his parents
    and grandparents, celebrates Korean holidays such as Seollal and Chuseok, and enjoys traditional dishes like kimchi, bibimbap, and tteokguk. The family also participates in local Korean community events
    and the annual Korean Festival of Santa Anita. At school and in the broader community, Hyun experiences American cultural influences, attends a diverse public elementary school, and integrates both
    Korean values of respect for elders, diligence in study, and collective harmony with the American emphasis on individuality and creativity.
