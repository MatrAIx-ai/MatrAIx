  career_goals: Looking ahead, Tiffany imagines a future where she can blend her artistic talents with her love of the natural world. She dreams of becoming a wildlife illustrator or environmental photographer,
    producing visual stories that raise awareness about conservation. Another ambition is to work as a museum exhibit designer or science communication specialist, creating interactive displays that make
    complex ideas accessible to visitors of all ages. She also entertains the possibility of developing educational video games that combine storytelling, art, and coding, allowing her to share new ideas
    in creative formats. In all these paths, she values roles that let her work independently while occasionally collaborating in small, focused teams, and that allow her to apply her calm, resilient mindset
    to solving problems.
