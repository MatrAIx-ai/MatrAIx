personas:
  professional: A budding visual artist and junior coder, Tiffany Gorday merges watercolor landscapes with Scratch animations, applying their meticulous organization and quiet curiosity to transform solitary
    sketches into interactive storytelling.
  sports: An outdoor‑oriented young athlete, Tiffany Gorday plays on the Springfield Youth Soccer Club, attends after‑school swimming lessons at the community center, enjoys weekend hikes in the nearby
    prairie, and, they follow the Chicago Cubs in baseball and the Chicago Bears in football for professional inspiration.
  arts: An enthusiastic budding artist, Tiffany Gorday spends afternoons emulating Claude Monet’s watercolor washes, flips through Raina Telgemeier’s graphic novel 'Smile', enjoys the folk melodies of Sufjan Stevens,
    and, they participate in community‑center workshops led by local painter Maya Jackson.
  travel: An inquisitive young traveler, Tiffany Gorday prefers family road trips that blend educational stops—such as a day at the Chicago Museum of Science and Industry and a visit to the historic Lincoln
    Home—and, they dream of future adventures to Yellowstone National Park and the ancient ruins of Machu Picchu, all balanced against school calendars and a modest family budget.
  culinary: A budding home chef, Tiffany Gorday loves crafting homemade apple turnovers seasoned with cinnamon and nutmeg, perfecting grilled cheese sandwiches on sourdough with sharp cheddar, designing
    colorful fruit platters featuring strawberries, blueberries, and kiwi, and, they experiment with watercolor‑inspired plating.
  core: Tiffany Gorday is a calm, curious 10‑year‑old who turns solitary sketches, nature hikes, and modest allowances into a uniquely organized yet imaginative world, even if they occasionally lose track
    of time while day‑dreaming over a half‑finished watercolor.
background:
  cultural: Tiffany was born and raised in Atlanta, Illinois, a modest town in Logan County characterized by agricultural landscapes and a close‑knit community. Her family is of mixed English and German
    ancestry, with deep roots in the Midwest that go back several generations. Growing up, she attended a small public elementary school where community values such as respect, self‑reliance, and cooperation
    were emphasized. Her household observes Christian traditions, celebrating holidays and participating in church‑related service projects. The local culture offers a blend of rural simplicity and support
    for the arts through the county library’s summer reading program, the community center’s youth art classes, and annual county fairs showcasing crafts and music. These influences have nurtured Tiffany’s
    appreciation for nature, her calm demeanor, and her inclination toward solitary creative pursuits while still valuing small‑group collaboration.
