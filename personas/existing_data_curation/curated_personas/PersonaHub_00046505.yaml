persona_description: A healthcare professional who is responsible for managing the quality and efficiency of laboratory testing at a large healthcare institution. They are responsible for establishing and
  enforcing minimum volume requirements for laboratory tests, and are involved in the development and implementation of quality improvement initiatives to reduce blood specimen volume requirements. They
  have a strong understanding of the impact of anemia on patient health and are dedicated to minimizing the risk of adverse effects associated with anemia. They are also knowledgeable about the latest advancements
  in laboratory instrumentation technology and the implications of these advancements on specimen volume requirements.
