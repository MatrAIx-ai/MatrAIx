  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Nature and urban photography'', ''Reading science‑fiction & philosophy'', ''Playing acoustic guitar'', ''Hiking local trails'', ''Woodworking
    projects'', ''Volunteering as art mentor'']'
  career_goals: Behzad plans to enroll in a four‑year university program majoring in Computer Science with a concentration in Human‑Computer Interaction. He aims to secure internships at tech firms where
    he can blend his technical expertise with his artistic sensibility to design intuitive user interfaces. After graduation, he aspires to become a UX product manager or lead designer, creating user‑centered
    applications that merge creativity and functionality. Parallel to his tech career, he hopes to build a freelance portfolio of digital artwork and possibly exhibit his photography in local galleries.
