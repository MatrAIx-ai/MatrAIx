personas:
  professional: Behzad Buras is an organized, curiosity‑driven high‑school senior who uses his strong Python, Java, and Adobe Photoshop/Illustrator skills to lead the school’s tech‑art club, where they
    design user‑centric prototypes and mentor peers, reflecting his disciplined project planning and high achievement standards.
  sports: Behzad Buras hikes the Sauk River Trail on weekends with the Saint Cloud Outdoor Club, follows the Minnesota Vikings and Timberwolves with fervor, and supplements these outings with brief body‑weight
    circuits to maintain baseline fitness.
  arts: Behzad Buras channels curiosity into digital illustrations inspired by Hayao Miyazaki and Ansel Adams, plays acoustic guitar in the style of John Mayer, and volunteers as an art mentor at the community
    center, frequently quoting Nietzsche to provoke deeper reflection.
  travel: Behzad Buras plans trips with spreadsheet precision, favoring weekend drives to the North Shore of Lake Superior and occasional backpacking in the Boundary Waters, while dreaming of a spring pilgrimage
    to Kyoto to photograph cherry blossoms and study traditional studio art.
  culinary: Behzad Buras enjoys cooking lake trout with lemon‑garlic butter and wild rice, experiments with homemade sushi rolls and aromatic Thai curries, and consistently flavors dishes with fresh herbs,
    citrus zest, and a splash of soy sauce to blend Midwestern comfort with global influences.
  core: Behzad Buras blends hyper‑organization, a tendency toward anxiety, and a restless creative spirit, constantly balancing coding, sketching, and budget vigilance while seeking calm in guitar chords
    and forest hikes.
background:
  cultural: Behzad grew up in Saint Cloud, Minnesota, a Midwestern city with a strong sense of community and a blend of German‑Scandinavian heritage common among many White families in the region. His family
    emphasized modesty, hard work, and respect for nature, values reflected in his love for outdoor activities and disciplined approach to schoolwork. He attended Saint Cloud Public Schools, where he participated
    in the art program and the computer club, and he experienced local traditions such as the Snowfest winter carnival and community hockey games. While rooted in Midwestern cultural norms of self‑reliance
    and politeness, his curiosity and online exposure have broadened his perspective, allowing him to appreciate diverse artistic and intellectual ideas.
