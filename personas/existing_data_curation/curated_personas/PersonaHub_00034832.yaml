persona_description: A cardiologist who studies the progression of hypertension and the role of lifestyle factors in its development. She is interested in the impact of aging on blood pressure and the potential
  for individuals to maintain a normal range of blood pressure throughout life. She is motivated by the need to prevent progressive rises in blood pressure, especially in middle and older age. She is familiar
  with the American Heart Association and American College of Cardiology guidelines and is looking for new ways to understand life course trends in blood pressure. She is eager to investigate the sequence
  of changes in the body that occur before hypertension sets in and to determine the potential benefits of interventions in preventing progressive rises in blood pressure, at any age.
