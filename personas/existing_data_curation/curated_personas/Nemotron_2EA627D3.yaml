  career_goals: Juan aims to secure a stable, structured position in the technology or logistics sector where his organizational strengths and technical aptitude can be fully utilized. He plans to complete
    his associate degree in Business Administration and earn industry certifications such as CompTIA A+ and Cisco CCNA within the next two years. His short‑term goal is to obtain an entry‑level IT support
    role at a local firm, gaining hands‑on experience with network and systems troubleshooting. In the medium term, he aspires to move into a junior systems analyst or operations coordinator role, eventually
    leading a small team. Juan also envisions opening a modest tech repair side business, providing a reliable source of income while maintaining a work‑life balance that helps him manage stress and maintain
    mental well‑being.
