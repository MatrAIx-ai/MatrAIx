  hobbies: '[''Watercolor painting'', ''Abstract mixed‑media art'', ''Creative writing'', ''Reading magical realism'', ''Traditional Mexican cooking'', ''Gardening'', ''Digital photography'', ''Attending
    small art gatherings'', ''Collecting Mexican folk art'', ''Listening to classical guitar music'', ''Meditation for anxiety management'']'
  career_goals: Although retired, Marta aspires to leave a lasting artistic and cultural imprint. She aims to curate a solo exhibition of her abstract works at a local gallery, publish a memoir‑style collection
    of poems that explore Mexican‑American identity, and create a digital archive of oral histories from older Mexican immigrants in San Diego. Additionally, she hopes to mentor younger seniors in a community
    art program, learn new artistic techniques each year, and integrate mindfulness practices into her creative routine to better manage her anxiety and emotional intensity.
