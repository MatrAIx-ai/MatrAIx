personas:
  professional: Marta Loyola, a retired humanities scholar turned community arts curator, blends meticulous event coordination with a vivid imagination, using her bilingual fluency and watercolor expertise
    to organize intimate gallery shows and translate cultural texts while navigating a skeptical outlook toward collaborators and an emotional intensity that fuels her creative drive.
  sports: Marta Loyola enjoys low‑impact activities such as daily walks in Balboa Park, participates in the Golden Years Walking Club, tends a garden as moderate exercise, follows the San Diego Padres and
    the San Diego Wave FC, and occasionally joins a senior badminton group at the community center.
  arts: Marta Loyola spends afternoons layering watercolor abstractions inspired by Kandinsky, writes magical‑realism poetry echoing the tone of a poet renowned for surreal narratives, collects Talavera
    pottery and vibrant hand‑woven textiles, and attends intimate talks featuring classical guitarist Andrés Segovia and local curator María González, allowing the arts to shape her identity and calm her
    emotions.
  travel: Marta Loyola prefers meticulously planned small‑group trips that blend photography and cultural immersion, has visited a historic colonial town known for vibrant markets and colorful festivals,
    explored a highland town famed for its mural‑filled streets, taken a road‑trip to Santa Barbara, and dreams of photographing the ruins of an ancient Andean citadel and the architecture of a Mediterranean
    city.
  culinary: Marta Loyola cooks traditional mole with dried ancho, pasilla, and chocolate, prepares tamales using fresh masa and epazote from her garden, enjoys the aromatic combination of cilantro and lime
    in salsas, and treats each cooking session as a meditative practice, though she sometimes over‑season when emotional intensity spikes.
  core: Marta Loyola is a 78‑year‑old retired scholar who channels a vivid imagination and emotional intensity into watercolor, poetry, and community art, while balancing cautious finances, health vigilance,
    and a love for quiet travel and traditional cooking.
background:
  cultural: Marta was raised in a close‑knit Mexican‑American household in the San Diego area, where Spanish filled the home and Mexican customs—such as Día de los Muertos altars, quinceañera stories, and
    family recipes of mole, tamales, and pozole—shaped her childhood. Her grandparents emigrated from Jalisco, bringing Ranchera music, folk crafts, and a reverence for communal celebrations. Growing up
    near the U.S.–Mexico border, she blended these traditions with the multicultural vibrancy of Southern California, participating in local Latino festivals, volunteering at cultural centers, and preserving
    bilingual family stories. This bicultural heritage informs her artistic sensibility, civic involvement, and desire to share Mexican cultural legacy with a broader audience.
