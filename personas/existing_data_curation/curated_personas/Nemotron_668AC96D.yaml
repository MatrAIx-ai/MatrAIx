    and conflict resolution'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Backyard gardening'', ''Volunteering at community health center'', ''Attending Mexican cultural festivals'', ''Reading historical fiction and biographies'',
    ''Hiking in Sierra foothills'', ''Nature photography'', ''Crocheting'']'
  career_goals: Driven by a desire for professional growth and community impact, Marta aims to advance to a senior records supervisor role within the next five years. She plans to earn a Certified Records
    Manager (CRM) credential and complete her GED, followed by an associate degree in business administration. Her long‑term ambition includes leading a small team that implements digital archiving initiatives
    for the county, reducing paper waste while improving public access to records. Marta also hopes to integrate her compassionate nature into her work by mentoring younger employees, especially those from
    immigrant backgrounds, and by partnering with local nonprofit agencies to streamline their record‑keeping processes.
