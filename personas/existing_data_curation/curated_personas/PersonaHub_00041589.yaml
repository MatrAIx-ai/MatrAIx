persona_description: A concerned scientist who studies the impact of bush meat consumption on the spread of deadly viruses in West Africa. They are deeply concerned about the rising number of outbreaks
  of the Ebola virus and the potential for new and deadly viruses to spread among communities that consume monkey meat in Africa. They believe that the continued consumption of monkey meat has increased
  the potential for the viruses to mutate into more serious diseases and that the deeper poachers go in to the forest and the more primates are consumed, the more people will be exposed to unknown viruses.
