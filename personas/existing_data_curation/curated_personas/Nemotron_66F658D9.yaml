personas:
  professional: Ingrid Lavilla, a seasoned engineering technician specializing in electrical and mechanical systems, leverages methodical troubleshooting, PLC programming, and bilingual communication to
    ensure safety compliance while fostering a collaborative, art‑inspired workplace culture, and they consistently mentor junior staff.
  sports: Ingrid Lavilla embraces an active lifestyle as a member of the Arizona Desert Hiking Club, regularly salsa‑dances at the local studio, and cheers for the Phoenix Suns and Arizona Diamondbacks,
    while they occasionally join the city's 5K charity runs.
  arts: Ingrid Lavilla frequently visits the Phoenix Art Museum, the Mesa Contemporary Arts Museum, and community theater productions, drawing inspiration from artists like Georgia O'Keeffe, Banksy, and
    Frida Kahlo, and they often incorporate that visual flair into their DIY electronics creations.
  travel: Ingrid Lavilla’s travel itinerary blends desert adventures—such as exploring Sedona’s red rocks and New Mexico’s White Sands—with cultural trips to Oaxaca for culinary immersion, and they aspire
    to trek Patagonia’s glaciers, all planned around a modest budget and family commitments.
  culinary: Ingrid Lavilla enthusiastically experiments with traditional Mexican dishes like mole poblano, carnitas, and tamales, using ingredients such as chipotle, epazote, and fresh corn masa, while
    they also fuse flavors in creations like taco ramen, and they proudly host weekly dinner gatherings for friends and fellow makers.
  core: Ingrid Lavilla merges a meticulous engineering mindset with a vibrant love for art, dance, and sustainable cooking, balancing disciplined productivity with spontaneous creative bursts, even if occasional
    procrastination and health check shortcuts sneak in, and they remain unfailingly generous to colleagues.
background:
  cultural: Ingrid grew up in a Mexican‑American household in Phoenix, where Spanish was spoken at home and Mexican traditions such as Día de los Muertos, quinceañeras, and holiday family gatherings were
    celebrated. Her parents immigrated from Jalisco, and she maintains close connections to the local Mexican community through church events, cultural festivals, and neighborhood networks. This bicultural
    upbringing instilled values of hospitality, family cohesion, and collaborative spirit, influencing both her personal relationships and professional teamwork style.
attributes:
  skills: '[''Electrical troubleshooting'', ''Programmable Logic Controller (PLC) programming'', ''Mechanical maintenance'', ''Technical drawing and CAD (AutoCAD)'', ''Safety and compliance (OSHA)'', ''Bilingual
    communication (Spanish/English)'', ''Project coordination'', ''Data acquisition and instrumentation'', ''Quality assurance and inspection'', ''Basic scripting (Python)'']'
  hobbies: '[''Salsa dancing'', ''Hiking in the Sonoran Desert'', ''Visiting art galleries and museums'', ''DIY electronics projects'', ''Cooking traditional Mexican dishes'', ''Volunteering at community
    centers'', ''Photography'', ''Reading sci‑fi and engineering magazines'', ''Participating in local maker meetups'']'
  career_goals: Ingrid aims to obtain an associate degree in engineering technology and become a certified engineering technician. She aspires to lead a maintenance team at a manufacturing firm, mentor
    new technicians, and eventually transition into a project management role focusing on sustainable infrastructure projects in the Southwest. She also envisions starting a small consulting practice that
    helps local businesses adopt efficient, eco‑friendly engineering solutions.
