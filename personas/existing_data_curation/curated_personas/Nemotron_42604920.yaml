  hobbies: '[''Sketching'', ''Landscape photography'', ''Hiking and nature exploration'', ''Reading sci‑fi and speculative philosophy'', ''Synth music creation'', ''Chess'', ''Journaling'', ''Attending
    small local art meet‑ups'']'
  career_goals: Teresa aims to first complete her GED within the next two years, then enroll in a specialized art high‑school program or a community college art curriculum focused on visual communication.
    Her long‑term ambition is to become a concept artist for video games or an independent graphic novelist, leveraging her blend of illustration, storytelling, and digital design skills. She is determined
    to build a sustainable freelance career that affords her creative independence, and she envisions launching an online store to sell prints, custom artwork, and synth‑generated soundtracks. Additionally,
    Teresa hopes to establish a small community art hub in Narvon, offering workshops and collaborative projects that encourage other youth to explore unconventional artistic paths. Her competitive nature
    drives her to seek professional recognition through portfolio contests and artist residencies.
