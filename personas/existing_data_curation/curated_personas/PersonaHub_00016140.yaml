persona_description: A political scientist who specializes in studying the political systems and governance structures of American colonies. They are interested in the political inequality and the lack
  of political representation that Puerto Rico faces, and believe that a fundamental restructuring of its relationship with the mainland is necessary to fully recover from its ongoing vulnerability to hurricanes
  and economic dysfunction. They are also interested in the potential solutions that could revitalize the economy and halt population loss in Puerto Rico.
