  hobbies: '["Cooking traditional Mexican dishes", "Photography (nature and street)", "Gardening (vegetable and flower beds)", "Reading history and biographies", "Attending art exhibitions", "Participating
    in cultural festivals (e.g., Día de los Muertos)", "Playing acoustic guitar", "Learning digital illustration", "Walking with his wife", "Church community activities"]'
  career_goals: Even in retirement, Hector aims to stay active by mentoring bilingual teenagers at the local community center, creating a community garden that blends Midwestern vegetables with Mexican
    herbs, establishing a digital archive of his family's history, and learning digital illustration to complement his love of art. He also hopes to volunteer as a cultural liaison for Mexican-American
    festivals and to maintain his health so he can travel to visit family in Mexico.
