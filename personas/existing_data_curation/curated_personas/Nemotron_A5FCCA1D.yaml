  career_goals: Stephanie aims to leverage her managerial experience into a regional supervisory role, overseeing multiple food‑service locations across the state. She also dreams of launching a community‑focused
    catering venture that highlights Kentucky-grown produce and classic African‑American culinary traditions. A key ambition is to formalize a mentorship program for young Black professionals entering the
    hospitality field, providing them with the structure and support that she wishes had been more readily available. Additionally, she plans to introduce a comprehensive staff wellness framework at her
    current workplace, reducing turnover and mitigating the stress that she personally feels keenly.
