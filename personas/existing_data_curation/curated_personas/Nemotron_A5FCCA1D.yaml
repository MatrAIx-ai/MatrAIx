personas:
  professional: Stephanie Edwards, a 53‑year‑old food‑service operations manager, merges her love for structured inventory control and staff coaching with a spontaneous knack for on‑the‑fly menu redesigns
    during busy service, balancing her practical, detail‑oriented nature with an improvisational flair that keeps the kitchen both efficient and lively.
  sports: Stephanie Edwards enjoys weekend hikes with the Bonnieville Trail Club along the rolling contours of Otter Creek Ridge and is a devoted fan of the Kentucky Wildcats basketball team, combining
    solitary outdoor fitness with the camaraderie of collegiate sports enthusiasm.
  arts: Stephanie Edwards, an active member of her church’s choir, finds creative fulfillment in the soulful stylings of the gospel ensemble "Hope Voices" and the timeless choral works of Johann Sebastian
    Bach, while diving into historical fiction novels by Hilary Mantel and Ken Follett, which together shape her appreciation for melodic and narrative depth.
  travel: Stephanie Edwards prefers road‑trip adventures to historic Southern gems like Savannah and Asheville, and harbors a dream of a culinary tour of Lyon, France, yet plans her journeys carefully around
    a modest retirement budget and occasional family obligations.
  culinary: Stephanie Edwards loves improvisational cooking, often turning homegrown collard greens, heirloom tomatoes, and fresh basil into inventive twists on classic shrimp and grits or smoked turkey
    collard wraps, while occasionally sprinkling in exotic spices like sumac and kaffir lime to surprise her family's palate.
  core: Stephanie Edwards balances meticulous structure at work with spontaneous kitchen experiments, nurtures a garden and quilting hobby to unwind, yet wrestles with lingering stress and occasional impulsive
    spending.
background:
  cultural: Stephanie’s identity is shaped by her upbringing as a Black woman in rural Kentucky, where family, church, and community gatherings have long been central to daily life. She grew up immersed
    in the rich culinary traditions of Southern soul food—think fried chicken, collard greens, and sweet potato pie—learning recipes passed down through generations of women in her family. The church has
    been a cornerstone of her cultural experience, offering both spiritual support and a venue for collective celebration through music and fellowship. Stephanie’s African‑American heritage informs her
    values of resilience, mutual aid, and storytelling, which she carries into her professional role by fostering a supportive workplace culture and championing community‑focused initiatives. While she
    embraces the broader Southern customs of hospitality and neighborliness, she also actively preserves and shares her cultural roots through food, music, and mentorship.
