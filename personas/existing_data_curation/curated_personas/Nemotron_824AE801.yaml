  career_goals: Although retired from formal employment, Logan aims to turn his lifelong passions into lasting contributions. He plans to complete a series of twelve watercolor paintings inspired by the
    changing seasons of New Jersey, culminating in a community exhibition at the Lodi Public Library. He also hopes to write and self‑publish a memoir that interweaves personal anecdotes with the local
    history he has gathered. Logan aspires to expand his volunteer role, leading art‑and‑craft workshops for senior peers, and to travel to at least three major art museums—such as the Met, the MoMA, and
    the Whitney—to deepen his artistic vocabulary. Maintaining his health and reducing stress remain secondary but essential goals.
