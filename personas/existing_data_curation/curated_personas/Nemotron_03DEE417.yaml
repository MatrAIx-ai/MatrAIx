personas:
  professional: Juan Cruz, a 28‑year‑old first‑line construction supervisor in Los Angeles, blends meticulous safety oversight, blueprint interpretation, and crew scheduling with a humanities‑inspired talent
    for storytelling and conflict mediation, using project‑management software and CAD viewers while occasionally letting a relaxed attitude toward deadlines spark creative on‑site problem solving.
  sports: Juan Cruz hikes the San Gabriel Mountains on weekends with a local trail club, follows the Los Angeles Lakers and LA Galaxy seasons, and plays pickup basketball at a community center, preferring
    flexible, low‑key workouts over rigid gym routines.
  arts: Juan Cruz sketches downtown skylines, curates a personal photo series of street murals inspired by Banksy’s satire, strums acoustic covers of Jimi Hendrix and Los Lobos on guitar, and volunteers
    on Día de los Muertos mural projects that echo Frida Kahlo’s vivid palettes.
  travel: Juan Cruz favors spontaneous road trips to Santa Fe’s art districts and the coastal cliffs of Big Sur, while dreaming of an immersive spring visit to Oaxaca’s markets and a laid‑back weekend in
    Barcelona’s Gothic Quarter, planning most getaways on a whim but keeping a modest travel fund to balance work obligations.
  culinary: Juan Cruz home‑cooks hearty pozole and handmade tamales using fresh masa, dried chilies, hominy, and avocado‑lime salsa, while occasionally treating themselves to a fine‑dining Mexican‑fusion
    restaurant for dishes like huitlacoche risotto, balancing modest kitchen experiments with occasional culinary splurges.
  core: Juan Cruz, the art‑loving, laid‑back construction supervisor who sketches between site walks, loses track of receipts, and can’t say no to a late‑night gaming marathon, embodies a community‑driven
    yet spontaneous approach to life.
background:
  cultural: Juan grew up in a Mexican‑American household in Los Angeles, speaking Spanish at home and English at school. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    quinceañeras, and weekly family meals featuring home‑cooked Mexican food. He identifies with the Chicano cultural movement, appreciates Mexican folk art, and participates in local Latino community events.
    His bicultural experience shapes his inclusive worldview and his desire to blend artistic expression with construction projects that serve diverse neighborhoods.
