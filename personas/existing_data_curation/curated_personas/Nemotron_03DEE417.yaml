    murals'', ''Attending cultural festivals'']'
  career_goals: Juan aims to advance from first-line supervisor to project manager within the next three years, eventually leading larger commercial development projects that incorporate sustainable building
    practices and public art. He is interested in pursuing a certification in construction management and possibly a master's degree in urban planning to blend his love for art with community development.
    He also hopes to start a side initiative that mentors young Latino workers and sponsors murals in under‑served neighborhoods.
