persona_description: A geologist who specializes in groundwater exploration and water resource management. The individual is interested in studying the geological and hydrogeological conditions of critical
  water deficit areas and exploring groundwater sources, especially in areas with fractured bedrock aquifers. They are also interested in evaluating the structural geology and hydrogeological conditions
  of the area together with a suitable geophysical method for the environment. The individual is looking for high yielding boreholes and successful groundwater exploration for the area, but should be limited
  to establish hand pump schemes. The person is also interested in exploiting groundwater through hand pumps to support small communities.
