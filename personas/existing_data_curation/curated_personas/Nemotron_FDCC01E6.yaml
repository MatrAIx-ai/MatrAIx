personas:
  professional: Haley Simon, a full‑stack software engineer who blends Python, TypeScript, and cloud mastery with a humanities perspective, designs visually resonant and accessible digital products, while
    their relaxed approach to obligations sometimes leads to last‑minute sprint pushes and a charmingly disorganized workspace, which they navigate with a playful improvisational mindset.
  sports: Haley Simon, a member of the Baltimore Hiking Club, enjoys weekend hikes in Patapsco Valley State Park, supports the Ravens and Orioles, and balances yoga sessions with spontaneous pickup basketball
    games at the community center, a rhythm they maintain to stay energized for community projects.
  arts: Haley Simon immerses in Baltimore’s vibrant arts scene, frequenting galleries showcasing Theaster Gates, joining community mural projects, attending live shows at Baltimore Center Stage and The
    In/Out Comedy Club, and creating watercolor pieces inspired by the surreal digital illustrations of Keiichi Tanaami, which they often incorporate into experimental code art.
  travel: Haley Simon favors spontaneous weekend road trips to the Blue Ridge Mountains and curated cultural tours of Lisbon and Kyoto, but often postpones longer vacations due to project deadlines, keeping
    a passport stamped from New Orleans, Dublin, and Charleston, a pattern they justify as saving creative energy for local community work.
  culinary: Haley Simon enjoys cooking lemon‑basil risotto, grilled salmon with dill, and experimenting with kimchi, hosts dinner parties featuring homemade charcuterie boards, yet occasionally forgets
    to restock pantry staples after a hectic week, a lapse they attribute to prioritizing coding sprints over grocery runs.
  core: Haley Simon is a curious, sociable tech‑artist whose ambitious leadership goals coexist with a love for spontaneous art‑filled evenings, occasional disorganization, and a habit of turning dinner
    parties into collaborative brainstorming sessions, a dynamic they embrace wholeheartedly.
background:
  cultural: Haley is a white American who grew up in a middle‑class suburban community in Baltimore County. Her family’s roots trace back to Mid‑Atlantic and Midwestern ancestors, giving her a blend of
    traditional Mid‑Atlantic values—pragmatism, community orientation, and a respect for education—combined with an appreciation for the cultural diversity of the Baltimore metropolitan area. Frequent visits
    to museums, historic sites, and local festivals during her childhood cultivated her love for the arts and encouraged an open‑minded worldview. Today, she remains connected to her regional heritage while
    actively engaging with the city's multicultural artistic and tech ecosystems.
