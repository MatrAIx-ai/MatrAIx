  career_goals: Haley aims to leverage her dual passion for technology and the arts to lead innovative product initiatives that empower creators and foster inclusive digital experiences. In the next five
    years she hopes to transition into a leadership role such as Director of Engineering or Chief Technology Officer, focusing on interdisciplinary teams that blend software development with design and
    cultural storytelling. She also aspires to mentor more women and underrepresented professionals in tech, contribute to open‑source projects that democratize creative tools, and eventually launch her
    own startup centered on interactive art installations and community‑driven platforms.
