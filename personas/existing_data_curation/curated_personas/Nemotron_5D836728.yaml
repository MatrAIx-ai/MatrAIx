    at a community garden'', ''Mentoring middle‑school students in STEM'']'
  career_goals: Vivian aspires to become a senior director of infrastructure for the City of Minneapolis or a leading consultancy, where she can spearhead large‑scale, low‑carbon transportation and green
    stormwater initiatives. She aims to champion innovative projects that fuse functionality with artistic expression, partnering with local artists and community groups to create public spaces that inspire.
    Vivian is committed to mentorship, seeking to increase the representation of women and underrepresented minorities in engineering through formal mentorship programs and outreach. Long‑term, she envisions
    serving on municipal planning committees to shape policy that promotes resilient, equitable, and aesthetically enriching urban environments.
