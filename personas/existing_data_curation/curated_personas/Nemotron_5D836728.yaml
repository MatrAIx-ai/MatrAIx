personas:
  professional: Vivian Ripps, a licensed Professional Engineer with a master’s degree in civil and environmental engineering, merges rigorous structural analysis, transportation planning, and sustainable
    design using AutoCAD, Revit, ArcGIS, and Python, while championing artistic collaborations and community outreach to deliver low‑carbon public projects that feel like living art.
  sports: Vivian Ripps cycles with the Minneapolis Bicycling Club, joins weekend group runs organized by the Twin Cities Running Crew, paddles a kayak on the Mississippi River, and staunchly supports the
    Minnesota Vikings, Minnesota Timberwolves, and Minnesota Wild, structuring training around early‑morning rides and late‑afternoon runs to sustain stamina and community spirit.
  arts: Vivian Ripps delights in immersive installations by Yayoi Kusama at the Walker Art Center, modernist works by Georgia O’Keeffe at the Minneapolis Institute of Art, indie rock shows at First Avenue
    featuring the Replacements, practices photography inspired by Ansel Adams, and regularly attends Minnesota Orchestra performances of contemporary composer John Adams, integrating art into both work
    and leisure.
  travel: Vivian Ripps prefers meticulously planned trips that blend photography excursions with cultural immersion, having recently hiked Norway’s Geirangerfjord at sunrise, toured Kyoto’s historic districts
    during the Gion Matsuri, and attended the Sundance Film Festival in Park City, while budgeting future visits to Joshua Tree’s desert art installations and Cartagena’s vibrant street festivals.
  culinary: Vivian Ripps enjoys cooking seasonal quinoa risotto with locally foraged wild mushrooms and spruce tips, relishes smoked Arctic char with dill and lemon, often orders kimchi fried rice and Nordic
    lamb stew when dining out, and maintains a habit of photographing every plated dish before tasting it, reflecting a moderate home‑cooking skill level and a passion for global flavors.
  core: Vivian Ripps is a methodical yet art‑obsessed engineer who channels curiosity into sustainable infrastructure, balances rigorous spreadsheets with spontaneous photo walks, and sometimes hoards concert
    tickets and vintage postcards, even if it means late‑night inbox checks.
background:
  cultural: Vivian is a white American with deep Midwestern roots. Raised in a small town in Iowa, she grew up with values of hard work, modesty, neighborliness, and a strong sense of community. Her family
    traditions include Thanksgiving gatherings, summer outings to Minnesota’s lakes, and an appreciation for the region’s natural landscapes. After moving to Minneapolis for graduate school, she embraced
    the city’s progressive, inclusive culture and its Scandinavian‑influenced design ethos. Vivian integrates this cultural blend—practical Midwestern pragmatism and a love for artistic expression—into
    both her professional work and personal life.
