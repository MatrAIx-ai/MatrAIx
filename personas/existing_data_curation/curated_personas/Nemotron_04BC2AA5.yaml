  career_goals: Kevin aims to finish his GED within the next year and enroll in a community college program in business administration or communications, building on his customer‑service foundation. In
    the short term, he is targeting a promotion to senior representative or team lead, seeking to develop supervisory skills and mentor newer agents. He also plans to obtain a Certified Customer Service
    Professional (CCSP) credential to bolster his qualifications. Long‑term, Kevin envisions moving into call‑center management or a sales development role, eventually leveraging his frontline experience
    to launch his own small e‑commerce venture that combines his customer‑focused mindset with his interest in technology.
