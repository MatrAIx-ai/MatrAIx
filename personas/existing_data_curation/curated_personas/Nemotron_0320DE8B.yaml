  hobbies: '[''Reading historical fiction'', ''Book club'', ''Local theater attendance'', ''Volunteer at library senior outreach'', ''Gardening'', ''Nature walks'', ''Tai chi'', ''Knitting'', ''Bridge (competitive)'',
