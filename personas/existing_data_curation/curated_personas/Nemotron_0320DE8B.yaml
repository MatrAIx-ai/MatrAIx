personas:
  professional: Alexis Trapp, a retired community‑college professor of literature and cultural history, leverages three decades of curriculum development, grant writing, and volunteer management expertise
    to craft structured yet flexible arts‑mentorship programs and community workshops, channeling their practical, organized nature and sociable competitive spirit into meticulous event planning and strategic
    budgeting for nonprofit initiatives, and they routinely mentor younger volunteers with a blend of rigor and encouragement.
  sports: Alexis Trapp enjoys regular three‑mile walks in Riverside State Park, practices tai chi for balance, follows the Spokane Chiefs in the WHL and occasionally attends Seattle Seahawks games when
    travel permits, and they are an active member of the Spokane Senior Walking Club that meets each Saturday for group hikes.
  arts: Alexis Trapp immerses themselves in the arts by reading historical fiction, attending River City Repertory productions starring local talent, knitting scarves for charity while listening to Meryl
    Streep’s performances, and capturing the misty Cascades through digital photography inspired by Ansel Adams, and they find that these pursuits shape their identity and leisure.
  travel: Alexis Trapp follows a meticulously planned travel style, favoring off‑season trips to destinations like the Oregon Coast, Yellowstone, the San Juan Islands, and international sites such as Paris
    and Bavaria, balancing their love of nature with an appreciation for historic architecture, and they maintain a modest travel budget that aligns with their retirement income.
  culinary: Alexis Trapp enjoys cooking at a comfortable intermediate level, favoring Pacific Northwest flavors like wild‑caught salmon glazed with dill, mushroom risotto using foraged chanterelles from
    their garden, and hearty sourdough bread seasoned with rosemary and thyme, and they often pair these meals with a cup of tea and fresh scones while playing bridge tournaments.
  core: Alexis Trapp combines a structured, community‑driven mindset with a competitive spark, balancing a love of literature, photography, and gardening against a habit of over‑scheduling and occasional
    skepticism toward new acquaintances, and they often channel that energy into organized group activities.
background:
  cultural: Alexis descends from a white American family with deep roots in the Pacific Northwest. Her grandparents immigrated from Germany and Ireland in the early 1900s and settled in Spokane, where her
    parents were raised. She grew up in a modest, middle‑class household that emphasized education, community service, and an appreciation for the region’s natural beauty. Active in her local Methodist
    church and numerous community organizations, she witnessed Spokane’s cultural evolution firsthand and developed a respectful awareness of the Spokane Tribe’s heritage, often incorporating Indigenous
    perspectives into her humanities teaching. These experiences have forged a cultural identity grounded in civic responsibility, love of the outdoors, and a lifelong commitment to the arts.
