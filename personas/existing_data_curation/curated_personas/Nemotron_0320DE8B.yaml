  career_goals: Even in retirement, Alexis aims to keep contributing her expertise to the community. She plans to launch an intergenerational arts mentorship program linking senior volunteers with younger
    artists, author a memoir chronicling Spokane’s cultural history, and serve on the board of the Spokane Arts Council. She also intends to mentor new volunteers at the local library, lead a senior trivia
    team that competes regionally, and complete a certificate in digital photography to exhibit her nature photographs. Maintaining her health is a priority, so she has set personal goals to walk three
    miles a week, attend weekly tai chi classes, and stay actively engaged in group activities.
