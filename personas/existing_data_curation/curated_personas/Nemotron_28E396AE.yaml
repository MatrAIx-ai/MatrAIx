personas:
  professional: Fidelia Adame is a veteran elementary and middle‑school educator who leverages bilingual fluency, arts‑integrated curriculum design, and mastery of Google Classroom and Seesaw to craft differentiated,
    project‑based lessons, while their methodical planning and curiosity drive continuous pedagogical experimentation.
  sports: Fidelia Adame enjoys low‑impact fitness through weekly yoga sessions, early‑morning walks along the James River, participates in a community adult tennis league at the Chesterfield Sports Complex,
    and cheers for the Virginia Cavaliers basketball team and the Washington Commanders during the fall season.
  arts: Fidelia Adame pursues watercolor painting and sketching inspired by Central American folk art motifs, studies the works of Frida Kahlo and contemporary photographer Carrie Mae Weems, attends exhibitions
    at the Virginia Museum of Fine Arts featuring artists like Kehinde Wiley, and finds solace listening to singer‑songwriter Lila Downs while their sketchbook fills with vibrant, nature‑driven scenes.
  travel: Fidelia Adame plans trips with meticulous spreadsheets, favoring cultural immersion over luxury, has explored Oaxaca’s vibrant markets, trekked the Blue Ridge Parkway’s autumn foliage, dream‑tours
    the historic streets of Cartagena and the cherry blossoms of Kyoto, yet balances ambition with a modest travel budget.
  culinary: Fidelia Adame enjoys cooking traditional coastal seafood soup (sopa de caracol) with fresh conch, garlic, cilantro, and lime, prepares classic baleadas—crispy tortillas stuffed with refried
    beans, cheese, and avocado—while experimenting with seasonal vegetables, and demonstrates intermediate culinary skill in both home cooking and occasional community potlucks.
  core: Fidelia Adame blends a methodical educator’s mindset with restless curiosity, channeling art, mindfulness, and meticulous budgeting into a life balanced between classroom leadership and quiet creative
    pursuits, all while managing a constant undercurrent of worry.
background:
  cultural: Fidelia was born in Honduras and moved to the United States as a young adult, bringing with her a rich tapestry of Central American traditions. She maintains fluency in Spanish and celebrates
    Honduran holidays such as Semana Santa and Día de la Independencia with family gatherings, traditional foods, and folkloric music. Her cultural heritage informs her teaching philosophy; she regularly
    incorporates Honduran stories, music, and visual motifs into lesson plans to promote cultural awareness and pride among her students. Community values—respect for elders, strong family bonds, and cooperative
    spirit—shape her kind, considerate demeanor both in the classroom and in her volunteer work. Living in Chesterfield, VA, she blends these roots with local customs, fostering a multicultural classroom
    environment that honors diversity.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Literacy and Reading Instruction'', ''Art Integration'', ''Bilingual Spanish‑English Communication'',
