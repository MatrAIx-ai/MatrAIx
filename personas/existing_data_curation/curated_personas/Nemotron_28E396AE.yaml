  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading contemporary Latin American literature'', ''Gardening'', ''Cooking traditional Honduran dishes'', ''Small‑group book clubs'', ''Attending local
    art exhibitions'', ''Volunteer after‑school tutoring'', ''Mindfulness meditation'', ''Gentle yoga'']'
  career_goals: Fidelia aspires to transition into a curriculum specialist role within Chesterfield County Public Schools, where she can design district‑wide interdisciplinary programs that weave visual
    arts and multicultural perspectives into core subjects. She intends to pursue a master's degree in Educational Leadership to qualify for a lead teacher or assistant principal position, aiming to mentor
    new educators and champion inclusive practices. Additionally, she hopes to author a children’s book that celebrates Honduran folklore, thereby extending her classroom impact to a broader audience. Managing
    stress remains a priority, so she plans to incorporate wellness initiatives for both staff and students into her leadership agenda.
