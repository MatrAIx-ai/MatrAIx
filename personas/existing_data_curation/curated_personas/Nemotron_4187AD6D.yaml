personas:
  professional: Betty Graham, a 23‑year‑old auditor, combines her strong analytical background and mastery of Excel macros, SAP and NetSuite with a methodical, detail‑driven work style, assertively guiding
    clients through GAAP and IFRS audits while championing sustainable accounting practices.
  sports: Betty Graham spends weekends hiking the Flatirons, trail‑running with the Boulder Runners club, rock climbing at the Boulder Rock Club, and cheers for the Colorado Rockies, Denver Broncos, and
    Denver Nuggets during their respective seasons.
  arts: Betty Graham captures Colorado vistas inspired by Ansel Adams, curates playlists featuring The Lumineers, Phoebe Bridgers, and John Denver, and attends the Boulder International Film Festival to
    unwind after her analytical work.
  travel: Betty Graham prefers low‑impact travel, planning spontaneous day hikes in Rocky Mountain National Park, weekend road trips to Moab’s Arches, and dreaming of a future backpacking trek through Patagonia’s
    Torres del Paine after saving for sustainable travel experiences.
  culinary: Betty Graham experiments with plant‑based dishes like quinoa‑stuffed bell peppers, tempeh tacos, and kale‑nutrient bowls, favoring ingredients such as avocado, nutritional yeast, and seasonal
    vegetables, and rates herself an intermediate home chef who occasionally orders vegan ramen for inspiration.
  core: Betty Graham blends analytical precision with a love of the outdoors, turning spreadsheets into sustainable solutions while nurturing community through budgeting workshops.
background:
  cultural: Betty Anne was raised in a middle‑class white family in the Midwest, where values of diligence, self‑reliance, and the importance of formal education were emphasized. Relocating to Boulder for
    college exposed her to a progressive, environmentally conscious community that prizes outdoor recreation, sustainability, and social responsibility. This blend of traditional American work ethic with
    Boulder’s emphasis on work‑life balance and civic engagement informs her worldview, shaping a professional identity that balances practicality with a commitment to environmental stewardship and community
    involvement.
attributes:
  skills: '[''Financial accounting'', ''GAAP and IFRS auditing'', ''Tax compliance'', ''Advanced Excel (pivot tables, macros, VBA)'', ''QuickBooks'', ''SAP'', ''Oracle NetSuite'', ''Tableau'', ''Power BI'',
    ''Python for data analysis'', ''Internal control assessment'', ''Risk assessment'', ''Project management basics'', ''Clear written and oral communication'', ''Attention to detail'', ''Time management'',
    ''Assertive client interaction'']'
  hobbies: '[''Hiking'', ''Trail running'', ''Rock climbing'', ''Yoga'', ''Plant-based cooking'', ''Photography'', ''Reading (financial non-fiction and sci‑fi)'', ''Board games'', ''Volunteer financial
    literacy tutoring'']'
  career_goals: Betty Anne aims to obtain her Certified Public Accountant (CPA) license within the next two years and advance to a senior auditor position at a leading public accounting firm. She aspires
    to move into a managerial role where she can lead audit teams focused on sustainable enterprises and environmental accounting, reflecting Boulder’s emphasis on green practices. Over the longer term,
    she hopes to become a partner or to launch her own boutique accounting practice that serves technology startups and eco‑focused businesses. To support these ambitions, she plans to pursue a master's
    degree in accounting or an MBA and to mentor other young women entering the accounting profession.
