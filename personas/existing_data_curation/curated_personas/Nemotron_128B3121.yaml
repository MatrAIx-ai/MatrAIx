  hobbies: '[''Beachcombing and marine wildlife photography'', ''School science club and experiments'', ''Ukulele playing'', ''Cooking traditional Venezuelan dishes with family'', ''Reading mystery novels'',
    ''Sketching marine life'', ''Socializing with friends at the park'', ''Journaling'']'
  career_goals: Marleny aspires to turn her curiosity about marine life and animals into a career as a marine biologist or veterinarian. She aims to attend a high school with strong STEM programs, participate
    in science fairs and local wildlife conservation projects, and eventually pursue a college degree in biology or environmental science. Driven by her practical mindset, she also imagines creating educational
    outreach programs that teach younger children about ocean stewardship, blending her love for learning with community service.
