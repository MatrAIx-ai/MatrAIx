personas:
  professional: Marleny Lucuara, an aspiring junior marine biologist, channels her curiosity and practicality through school science club experiments, meticulous marine photography, and collaborative projects,
    all while staying organized yet flexible enough to adapt to new findings.
  sports: Marleny Lucuara enjoys weekend beach volleyball with the Jupiter Youth Beach Volleyball Club, follows the Miami Dolphins and Florida State Seminoles with enthusiastic devotion, and occasionally
    joins family swimming outings at the Jupiter Inlet, balancing team spirit with personal fitness.
  arts: Marleny Lucuara expresses creativity by playing the ukulele to songs by Jake Shimabukuro, sketching detailed marine scenes inspired by Winslow Homer, devouring mystery novels by Agatha Christie,
    and watching Venezuelan cooking shows featuring chef Carlos Riedel, weaving artistic appreciation into daily life.
  travel: Marleny Lucuara prefers spontaneous day trips to nearby nature preserves like the Loxahatchee National Wildlife Refuge, dreams of snorkeling in the Galápagos Islands, and has already visited Key
    West and San Juan, Puerto Rico, planning future family vacations around marine wildlife experiences.
  culinary: Marleny Lucuara delights in preparing crisp arepas stuffed with black beans, cheese, and avocado while also experimenting with ceviche and grilled fish tacos, boasting a budding cooking skill
    that mixes Venezuelan flavors with local seafood ingredients like lime and cilantro.
  core: Marleny Lucuara is a beach‑loving, science‑curious teen who balances meticulous marine photography and ukulele practice with a steady allowance‑saving habit, navigates mild health quirks with proactive
    care, and occasionally forgets homework in favor of sketching sea turtles.
background:
  cultural: Marleny comes from a Venezuelan family that immigrated to Florida, preserving a strong sense of cultural heritage while adapting to life in the United States. At home, Spanish is spoken daily,
    and she celebrates traditional holidays such as Dia de los Reyes and Carnaval with music, dance, and home‑cooked meals. Family stories about Venezuela’s natural landscapes foster her love for nature
    and conservation. The multicultural environment of Jupiter, with its diverse Latin American community, offers her opportunities to partake in both Venezuelan and broader Floridian cultural events, shaping
    a bicultural identity that values family bonds, resilience, and an appreciation for both her roots and her new home.
