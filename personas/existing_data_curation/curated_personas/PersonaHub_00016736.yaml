persona_description: A person who is interested in understanding the experiences of Australian expatriates and their educational backgrounds in different countries, particularly in the context of the OECD
  countries. This person may be interested in researching the reasons behind the high ratio of Irish-born people in other OECD countries, the proportion of expatriates with a high level of education, and
  the impact of migration policies on the educational outcomes of expatriates. This person may also be interested in learning about the cultural and social differences between Australia and other countries,
  and the ways in which these differences affect the experiences of Australian expatriates.
