personas:
  professional: Kerry Park, a 72-year-old retired community organizer, harnesses their meticulous planning skills and genealogical curiosity to expand Rock Hill’s annual heritage festival, mentor a new
    generation of volunteers, and they are building a digital photography archive documenting local events.
  sports: Kerry Park stays active by walking the nearby trails with their spouse, cheering on the Carolina Panthers on game day, and attending weekly line‑dancing classes, though they sometimes limp from
    a stubborn knee ache after dancing.
  arts: Kerry Park nurtures creativity through a vibrant quilting circle that weaves family history into fabric, immerses themselves in historical fiction by authors such as Philippa Gregory and Ken Follett,
    and enjoys live performances by the Charlotte Symphony, all of which they consider essential nourishment for their soul.
  travel: Kerry Park approaches travel with the same methodical planning they apply to community events, favoring heritage tours to Savannah and Charleston, weekend hikes in the Great Smoky Mountains, and
    an annual research trip to Washington, D.C.’s National Archives to uncover new family records.
  culinary: Kerry Park delights friends with Southern comfort dishes like fried chicken, collard greens, buttery cornbread, and peach cobbler, expertly prepared in a seasoned cast‑iron skillet, while they
    meticulously preserve each recipe in a handwritten binder that doubles as a community cookbook.
  core: Kerry Park is a disciplined, garden‑loving community pillar who blends pragmatic organization with warm hospitality, even if they occasionally misplace their glasses while poring over genealogy
    charts.
background:
  cultural: Kerry Ann grew up in mid‑20th‑century South Carolina in a white, middle‑class family with strong Baptist roots. The Southern culture of hospitality, community service, and respect for tradition
    shaped her values. She experienced the social changes of the civil‑rights era, reinforcing her commitment to harmonious relationships and inclusive community activities. Her upbringing emphasized family
    gatherings, church involvement, regional cuisine, and a deep appreciation for local history and heritage.
attributes:
  skills: '["Event planning & coordination", "Volunteer recruitment & management", "Budgeting and financial oversight", "Basic computer instruction for seniors", "Conflict resolution and mediation", "Gardening
