  hobbies: '["Gardening", "Quilting", "Line dancing", "Historical fiction reading", "Genealogy research", "Southern cooking and baking", "Book club participation", "Bridge (card game)", "Volunteer work
    at local church", "Nature walks with friends"]'
  career_goals: Even in retirement, Kerry Ann aims to remain an active pillar of Rock Hill. She aspires to expand the annual heritage festival she helps organize, create a published family history memoir,
    and develop a digital photography portfolio documenting local events. She seeks to mentor a new generation of volunteers, secure a small community‑service award for her contributions, and ensure long‑term
    financial security for herself and her husband while maintaining a healthy, active lifestyle.
