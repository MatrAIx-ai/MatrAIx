  career_goals: Jennifer aspires to finish high school with honors and earn a scholarship to study environmental science or communications at a university. She is drawn to careers that let her apply scientific
    curiosity while making a tangible impact on her community, such as wildlife conservation, community health education, or nonprofit digital outreach. In the longer term, she envisions leading youth-mentoring
    programs that combine her love for the outdoors and her knack for organizing group activities, while also maintaining a presence on social media to raise awareness about local environmental issues.
