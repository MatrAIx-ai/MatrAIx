personas:
  professional: Leticia Guthrie is a seasoned community organizer whose razor‑sharp budgeting skills and calm, skeptical demeanor drive her success in orchestrating theater productions, senior‑center workshops,
    and town‑wide fundraisers while mentoring volunteers in structured project‑management techniques.
  sports: Leticia Guthrie enjoys daily waterfront walks with the Narragansett Bay Walkers, cheers the Providence Bruins during hockey season, attends New England Patriots games when traveling to Boston,
    and competes in a local bridge league that satisfies her competitive strategic streak.
  arts: Leticia Guthrie channels her love for community theater into starring roles and set design for productions of Arthur Miller’s ‘The Crucible’ and the musical ‘Hamilton’ (inspired by Lin‑Manuel Miranda),
    hosts evenings where friends compare Meryl Streep’s performances, and winds down listening to Bob Dylan’s folk classics while planning her next bake‑off.
  travel: Leticia Guthrie, after touring historic sites in Boston and exploring the coastal charm of Nantucket, dreams of sailing the fjords of Norway and visiting the medieval towns of Brittany, France,
    yet balances this wanderlust with budget‑friendly weekend getaways to nearby Providence and the White Mountains.
  culinary: Leticia Guthrie is a proficient baker who expertly crafts classic New England apple, pumpkin, and blueberry pies—infused with nutmeg, fresh thyme, and a flaky lattice crust—while also whipping
    up heirloom tomato and Vermont cheddar quiches from vegetables harvested in her own garden.
  core: Leticia Guthrie blends meticulous organization with sociable flair, channeling her competitive drive into community arts, strategic fundraising, and bridge triumphs, all while nurturing a garden
    and a penchant for perfect pies.
background:
  cultural: Leticia comes from a long‑standing white New England family, with roots tracing back to early English and Irish settlers in Rhode Island. Her upbringing in Bradford, a close‑knit town in Washington
    County, emphasized self‑reliance, frugality, and community service—values that continue to shape her worldview. The region's cultural heritage of maritime trade, modest Puritan work ethic, and seasonal
    town gatherings informs her love for local history, seasonal cooking, and participation in town events. While she respects traditional customs, she also embraces the evolving multicultural flavor of
    contemporary Rhode Island, often seeking to learn about neighboring cultures through community programs. Her cultural identity supports a pragmatic yet warm approach to life, balancing respect for tradition
    with an openness to new ideas.
attributes:
