  hobbies: '[''Community theater acting and production'', ''Gardening (vegetable and flower beds)'', ''Baking and cooking New England dishes'', ''Local history and genealogy research'', ''Walking and coastal
    hiking'', ''Book club participation'', ''Volunteer work at senior center'', ''Playing bridge'']'
  career_goals: Although currently not in the formal workforce, Leticia aims to channel her experience into civic leadership. She plans to secure a board seat at a local nonprofit focused on senior services
    or community arts, leveraging her fundraising acumen to expand program funding. She also hopes to mentor younger volunteers, teaching them structured project‑management techniques. To deepen her impact,
    she intends to earn a certificate in nonprofit management or public administration through a local community college. Ultimately, Leticia aspires to influence town policy by participating in the Bradford
    town council or a civic advisory committee, using her competitive drive to champion initiatives that improve the quality of life for residents.
