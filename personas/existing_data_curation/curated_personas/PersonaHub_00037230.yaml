persona_description: A neuroscientist who specializes in the study of the brain, specifically focusing on the mechanisms underlying the development, function, and pathology of schizophrenia. They are particularly
  interested in the role of inhibitory neurons in the brain and the effects of stress on neuronal function and structure. They have published several studies on the loss of inhibitory function and structure
  in schizophrenia and have recently presented evidence that the cerebral cortex of individuals with schizophrenia lacks normal inhibitory neuronal machinery. They have also studied the effects of cannabis
  abuse on brain size and function in individuals with schizophrenia.
