  hobbies: '[''Hiking'', ''Kayaking'', ''Community Science Outreach'', ''Math Tutoring'', ''Historical Non-Fiction Book Club'', ''Cooking'', ''Gardening'', ''Board Games'', ''Puzzle Solving'', ''Salsa Dancing'']'
  career_goals: Sarah aims to transition into a senior leadership role where she can mentor emerging analysts and shape data-driven strategies for community development. She intends to complete a bachelor's
    degree in Mathematics or a certification in Data Science to formalize her knowledge, and eventually launch a part-time consulting practice that offers analytics support to local nonprofits and small
    businesses. Her long-term ambition is to create an open-source data portal for Issaquah that empowers residents with transparent environmental and transportation data.
