personas:
  professional: Sarah Keyes leads data-driven initiatives for community development, leveraging three decades of quantitative analysis, statistical modeling in Python, R, and SQL, and GIS expertise, while
    their preference for structure manifests in meticulous project plans and their sociable energy fuels cross‑functional workshops that blend rigor with collaborative problem‑solving.
  sports: Sarah Keyes tackles the Cascade foothills on weekend hikes, kayaks Lake Sammamish with the Issaquah Outdoor Adventures club, and cheers for the Seattle Seahawks, Seattle Sounders, and Seattle
    Mariners, embodying a structured yet socially vibrant commitment to fitness and local sports culture.
  arts: Sarah Keyes channels their sociable spirit through salsa‑dancing socials, an eclectic book club that devours Ken Burns documentaries and David McCullough biographies, and evenings listening to Carlos Santana
    and Anoushka Shankar, while occasionally visiting the Pacific Northwest Symphony to see works by Mahler, weaving a tapestry of artistic appreciation into daily life.
  travel: Sarah Keyes plans their travel with a balance of careful itineraries and spontaneous hikes, having explored Banff, Glacier National Park, and Vancouver, while dreaming of trekking Patagonia’s
    Torres del Paine and savoring the spring blossoms in Kyoto, illustrating a structured yet adventurous wanderlust.
  culinary: Sarah Keyes, an enthusiastic home cook, transforms garden harvests into dishes such as roasted beet and goat‑cheese salad, miso‑glazed salmon, and saffron‑infused paella, demonstrating a moderate
    skill level that blends precise recipe follow‑through with spontaneous flavor experiments.
  core: Sarah Keyes is a structured yet spirited data veteran who balances meticulous project roadmaps with spontaneous salsa nights, garden‑to‑table cooking, and a relentless curiosity for community‑driven
    analytics.
background:
  cultural: Sarah grew up in a middle-class, white, European-American family in the Pacific Northwest, where an appreciation for nature, self-reliance, and community involvement were core values. Her family
    traditions include celebrating holidays like Thanksgiving and Christmas, attending a local church community, and participating in neighborhood volunteer projects. The region's emphasis on outdoor recreation
    and environmental stewardship has shaped her connection to the land and her commitment to civic engagement.
attributes:
  skills: '[''Statistical Modeling'', ''Predictive Analytics'', ''Python Programming'', ''R Programming'', ''SQL'', ''Geographic Information Systems (GIS)'', ''Scientific Writing'', ''Grant Proposal Development'',
