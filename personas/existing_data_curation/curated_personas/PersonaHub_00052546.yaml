persona_description: A computational biologist who specializes in the analysis of bacterial genomes and the study of genetic mechanisms. Sze and his colleague, Qingwu Yang, have developed a computational
  tool that can predict the location of operons in different species of bacteria, improving previous methods that relied on statistical predictions. Sze's tool is more accurate than previous methods, as
  it starts from a known and experimentally validated E. coli operon to find similar operons in other bacteria. His research interests include the organization and function of bacterial operons, and the
  use of computational tools to study complex biological systems.
