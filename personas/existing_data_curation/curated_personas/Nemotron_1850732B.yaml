  career_goals: Yuling aims to secure tenure while launching a cross‑cultural arts laboratory that integrates traditional East Asian aesthetics with cutting‑edge digital media. She plans to develop a series
    of online courses tailored for solitary learners, publish a memoir reflecting her unconventional educational journey, and mentor emerging artists from immigrant backgrounds. Ultimately, she aspires
    to establish a nonprofit that provides resources and exhibition space for under‑represented creators in the Bay Area.
