personas:
  professional: An interdisciplinary art professor, Yuling Wong designs curricula that weave East Asian art history with digital media, leveraging Mandarin instruction and mindfulness practices to empower
    solitary adult learners while navigating the administrative maze of tenure with a relaxed, flexible approach that sometimes borders on disorganization.
  sports: Yuling Wong enjoys low‑traffic hikes in the Santa Cruz Mountains, practices gentle winter yoga, follows the San Francisco Giants and Golden State Warriors loyally, and participates in a local
    trail‑running club that meets on Saturday mornings.
  arts: Yuling Wong curates a personal collection of ambient soundscapes by Brian Eno and Autechre, finds inspiration in the minimalist paintings of Agnes Martin, and regularly attends indie gallery openings
    featuring emerging artists like Tschabalala Self, while practicing calligraphy reminiscent of ancient masters.
  travel: Yuling Wong prefers meticulously planned solo trips that blend quiet contemplation with artistic discovery, having recently trekked the bamboo forests of Kyoto and the coastal cliffs of Portugal’s
    Azores, and now dreaming of the geothermal vistas of Iceland’s Landmannalaugar.
  culinary: Yuling Wong enjoys brewing matcha‑infused tea with jasmine blossoms and experimenting with vegetarian miso ramen topped with shiitake mushrooms, tofu, and a splash of yuzu, though their culinary
    confidence remains modest, often relying on simple stir‑fry recipes.
  core: Yuling Wong is a quietly curious 36‑year‑old educator who thrives in solitude, turns disorganized spontaneity into creative breakthroughs, and habitually loses track of time while painting or journaling,
    often forgetting to water their urban garden.
background:
  cultural: Yuling is a first‑generation Chinese American whose parents emigrated from Guangdong in the early 1980s. Raised in San Jose's vibrant multicultural community, she grew up bilingual in Mandarin
    and Cantonese while absorbing the values of family cohesion and respect for elders from her heritage. She celebrates Lunar New Year and traditional festivals, yet fully engages with the diverse artistic
    scene of Silicon Valley, blending Eastern aesthetics with Western contemporary practices in both her personal and professional life.
