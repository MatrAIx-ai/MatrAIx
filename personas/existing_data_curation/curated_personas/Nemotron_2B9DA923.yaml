personas:
  professional: Jeffrey Chahal, an 85‑year‑old retired engineer, leverages his lifelong technical expertise and disciplined project‑management style to mentor budding makers at the local makerspace, translating
    complex engineering concepts into hands‑on workshops while meticulously documenting every lesson for future reference.
  sports: Jeffrey Chahal follows New Mexico United for soccer, cheerfully attends monthly games in Albuquerque, enjoys watching the Albuquerque Isotopes baseball team from the comfort of his backyard while
    bragging about his own senior bowling league victories at the local senior center, and maintains a light fitness routine of gardening and weekly tai chi classes.
  arts: Jeffrey Chahal immerses himself in the works of Georgia O’Keeffe and the folk songs of Pete Seeger, attends the Roswell Museum’s rotating exhibition openings, and spends quiet evenings listening
    to classical piano recordings by Glenn Gould while sketching model aircraft designs inspired by Cessna’s historic planes.
  travel: Jeffrey Chahal prefers meticulously planned road trips to desert marvels like Carlsbad Caverns and Sedona’s stargazing festivals, often charting routes with vintage paper maps, and dreams of a
    leisurely cruise to Norway’s fjords when mobility permits, yet they remain rooted in the local Southwest’s seasonal festivals and family reunions in Texas.
  culinary: Jeffrey Chahal delights in cooking seasoned green chile stew and carne adovada sourced from his own garden’s tomatoes and chilies, expertly roasts fresh rosemary chicken on his wood‑fired grill,
    and occasionally tests his skill by attempting intricate baked goods such as lemon‑infused shortbread, though they sometimes forget to defrost meat in time.
  core: Jeffrey Chahal’s disciplined curiosity fuels a life of orderly hobbies—crafting model planes, cataloguing family lineage, and mentoring juniors—punctuated by a habit of color‑coded sticky notes
    that map every task, even if they occasionally over‑schedule themselves.
background:
  cultural: Jeffrey was raised in a mid‑western, small‑town environment that emphasized hard work, education, and community service. As a white American, his cultural upbringing blended traditional Protestant
    values with a pragmatic, post‑war generation mindset. After relocating to Roswell, New Mexico for his engineering career, he adopted an appreciation for the desert landscape, local traditions, and the
    eclectic spirit of the region (including the iconic UFO culture). He respects the diverse heritage of the Southwest while maintaining the disciplined, cooperative ethos of his upbringing, which influences
    his volunteer work and interpersonal relationships.
