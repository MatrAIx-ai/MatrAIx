    Learning)'', ''Presentation & Storytelling'']'
  hobbies: '[''Reading non‑fiction (behavioural economics, psychology)'', ''Playing chess'', ''Hiking desert trails'', ''Cooking traditional Mexican cuisine'', ''Listening to marketing and tech podcasts'',
