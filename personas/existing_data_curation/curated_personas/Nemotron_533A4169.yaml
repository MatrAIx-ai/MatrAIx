  hobbies: '[''Reading non-fiction (history, culinary)'', ''Cooking soul‑food recipes'', ''Listening to jazz and blues'', ''Basketball pickup games'', ''Car maintenance'', ''Volunteering at youth cooking
    program'', ''Exploring Chicago neighborhoods'']'
  career_goals: Lawrence aims to move from dishwasher to kitchen supervisor within the next two years, leveraging his organizational strengths and recent ServSafe certification. He plans to enroll in a
    community college culinary program to broaden his kitchen knowledge, with the long‑term goal of becoming a kitchen manager or facilities manager at a hotel or catering firm. Ultimately, he hopes to
    use his disciplined approach to start a small, family‑run catering service that focuses on traditional Chicago soul‑food dishes, providing a stable future for his wife and any future children.
