  hobbies: '[''Visiting art galleries'', ''Exploring the U.S. Space & Rocket Center'', ''Watercolor painting'', ''Photography'', ''Collecting African American folk art'', ''Reading philosophy and astronomy'',
    ''Mindfulness meditation'', ''Yoga'', ''Gardening'', ''Volunteer financial literacy instruction'', ''Playing trumpet in a jazz ensemble'', ''Traveling to culturally diverse locations'']'
  career_goals: Ayinde aims to deepen his impact by establishing a community‑focused financial wellness center that integrates financial literacy with mental health support. He plans to obtain advanced
    credentials such as the Chartered Financial Analyst (CFA) designation to broaden his expertise in investment analysis. Over the next five years, he wants to mentor a cohort of young Black financial
    advisors, launch a nonprofit offering free financial counseling to low‑income families in Madison County, and author a guidebook on the emotional aspects of retirement planning. He also aspires to curate
    a series of art‑infused financial education workshops, using visual storytelling to make complex concepts accessible.
