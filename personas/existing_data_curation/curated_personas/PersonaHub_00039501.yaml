persona_description: A team of MIT graduate students who have developed a lightweight, plastic, dome-shaped device called Robopsy, which they hope will make lung cancer biopsies less invasive and less prone
  to complications. The team, led by Conor Walsh and Nevan Hanumara, with the support of Professor Alexander Slocum and Massachusetts General Hospital radiologist Rajiv Gupta, is working on a machine called
  Robopsy that holds a biopsy needle and can sit on a patient's chest during a CT scan. The device has the capacity to hit smaller lesions, decrease complications, and may eliminate the need for overnight
  hospital stays. The team is working toward FDA approval and has already won a $5,000 Boeing Prize and a cash prize in the Biomedical Engineering Innovation, Design and Entrepreneurship Award competition.
