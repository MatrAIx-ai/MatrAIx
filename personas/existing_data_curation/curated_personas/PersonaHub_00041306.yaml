persona_description: A healthcare worker who is responsible for diagnosing and treating patients with the Ebola virus outbreak in West Africa. They must be highly trained, knowledgeable about the virus
  and its symptoms, and have the ability to quickly assess and treat patients in a high-stress and dangerous environment. They must also be able to work closely with other healthcare professionals and be
  prepared to take on a variety of roles, including being the first port of call for someone who might have the disease. They must be prepared to face the challenges of working in a contaminated environment,
  dealing with the emotional and physical toll of treating patients, and being aware of the potential for infection.
