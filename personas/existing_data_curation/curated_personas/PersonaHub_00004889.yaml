persona_description: A historian who specializes in the study of ancient Israelite history, particularly focusing on the events leading up to the downfall of the northern kingdom of Israel. This historian
  is particularly interested in the moral and spiritual deterioration of the Israelite people and the consequences of their actions, as well as the modern counterparts of the sins that Israel committed.
  This person is knowledgeable about the great events that had taken place in Israel's history in the territory of the northern kingdom, which had brought glory to God, and deliverance to the people. This
  person is also interested in the condition of Israel after the downfall of the northern kingdom and the reasons for its downfall.
