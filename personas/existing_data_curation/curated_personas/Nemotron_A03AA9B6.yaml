personas:
  professional: Joanne, a 10‑year‑old aspiring young architect, channels their love of LEGO and puzzle‑solving into meticulous model‑building, applying their natural organization, calmness, and methodical
    planning to design miniature versions of iconic structures while dreaming of future blueprints.
  sports: Joanne, a 10‑year‑old swimmer at the Metairie Community Pool, participates in the local Dolphin Swim Club, and they cheer for the New Orleans Pelicans during basketball season, and they follow
    the New Orleans Saints' football schedule, embracing structured swim drills and small‑group fitness routines.
  arts: Joanne, a 10‑year‑old avid reader of middle‑grade mysteries and enthusiastic LEGO builder, enjoys listening to Louis Armstrong’s jazz classics and Taylor Swift’s pop hits while crafting at the Metairie
    Arts & Crafts Festival, and they often sketch scenes inspired by the Saint Louis Cathedral’s spire.
  travel: Joanne, a 10‑year‑old who loves planning mini‑adventures in their bullet‑journal, frequently visits the nearby Gulf Coast beaches of Grand Isle, enjoys family trips to Baton Rouge’s historic sites,
    and they dream of a summer vacation at Orlando’s theme parks, preferring short, well‑structured trips with their parents.
  culinary: Joanne, a 10‑year‑old budding baker, delights in mixing simple desserts like chocolate chip cookies and classic beignets with powdered sugar, enjoys helping their mother stir gumbo seasoned
    with okra and sausage, and they proudly assemble their own lunchbox meals featuring turkey wraps and apple slices.
  core: Joanne, a 10‑year‑old organized puzzle‑master who methodically plans every hobby, saves their allowance with precision, and navigates life with calm resilience, though they sometimes over‑arrange
    their LEGO bricks by color, turning playtime into a tiny, orderly universe.
background:
  cultural: Joanne is a white American raised in Metairie, Louisiana, a suburban community just outside New Orleans. Her family follows a Catholic tradition, attending weekly Mass and celebrating religious
    holidays with a blend of Southern hospitality. Growing up in the Gulf Coast region, she has been exposed to the local French‑Louisianan heritage—she often hears regional expressions like "lagniappe"
    and enjoys occasional family meals featuring gumbo or beignets. Seasonal events such as the family‑friendly Mardi Gras parades and the Metairie Arts & Crafts Festival are part of her community life,
    reinforcing a sense of belonging while respecting her preference for small, predictable gatherings.
