  career_goals: Joanne dreams of designing safe, well‑structured spaces, so she aspires to become an architect or civil engineer one day. She also values helping others learn in a predictable environment,
    which fuels a secondary ambition to become a teacher who can create organized, nurturing classrooms. In the short term, she hopes to lead her school’s science fair committee and organize community clean‑up
    events, blending her love of order with a desire to contribute positively to her neighborhood.
