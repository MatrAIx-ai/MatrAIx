  hobbies: '[''painting'', ''mixed media art'', ''gallery visits'', ''live music and dance festivals'', ''fusion cooking (Indian‑Southern dishes)'', ''volunteering at community cultural events'', ''hiking
    in Croatan National Forest'']'
  career_goals: Sejal aspires to turn her passion for art and cultural exchange into a professional path. She plans to complete a bachelor's degree in Arts Management or Community Development within the
    next two years, leveraging scholarships for first‑generation college students. Her long‑term ambition is to become a Community Arts Coordinator at the Greenville Museum of Art or a similar cultural
    institution, where she can design programs that highlight South Asian artistic traditions alongside local Southern arts. Ultimately, Sejal hopes to launch a nonprofit cultural hub that offers workshops,
    pop‑up exhibitions, and intergenerational storytelling events, fostering greater cross‑cultural understanding in Edgecombe County.
