personas:
  professional: Sejal Noman, a budding arts administrator, leverages their curiosity and bilingual communication strengths, using Canva and Photoshop to craft visually engaging community event promos, and
    they thrive in collaborative planning despite occasional disorganization and a preference for flexible over strict schedules.
  sports: Sejal Noman enjoys weekend hikes in the Croatan National Forest, they follow the Greenville Drive minor‑league baseball team, cheer for the Carolina Hurricanes, and occasionally join a local pickup
    soccer league at the community park.
  arts: Sejal Noman immerses themselves in the regional art scene, they draw inspiration from contemporary painter Kehinde Wiley and folk musician Rhiannon Giddens, and they regularly attend the Greenville
    Arts and Music Festival where they dance to both modern beats and traditional dhol rhythms.
  travel: Sejal Noman prefers spontaneous weekend getaways, they often backpack to Asheville’s Blue Ridge Parkway for scenic hikes, while also dreaming of a culinary pilgrimage to Jaipur to explore vibrant
    street food, balancing travel with a modest student budget and occasional group travel constraints.
  culinary: Sejal Noman balances Indian spices like cumin and garam masala with Southern staples such as collard greens and fried catfish, they cook fusion dishes like butter chicken‑topped cornbread for
    friends, yet they frequently forget to chill their homemade chai long enough, resulting in a occasionally lukewarm brew.
  core: Sejal Noman is a socially driven, art‑obsessed 23‑year‑old who blends cultural flavors in cooking, they thrive on flexible community projects, and they habitually misplace deadlines while never
    losing their upbeat energy.
background:
  cultural: Sejal was raised in a South Asian (Indian) immigrant family that settled in North Carolina when she was a child. Her household blends traditional customs—celebrating Diwali, observing Navratri,
    and preparing family recipes—with Southern hospitality and community values prevalent in Greenville. Fluent in both English and Bengali, she navigates seamlessly between the two cultural spheres, often
    acting as a cultural bridge for peers and neighbors. The family's emphasis on education, respect for elders, and communal harmony has shaped her cooperative nature, while exposure to the local Southern
    lifestyle has fostered an appreciation for outdoor activities and regional cuisine. This dual heritage informs her artistic sensibilities and her desire to share multicultural experiences with the broader
    community.
