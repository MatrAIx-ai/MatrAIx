  hobbies: '[''Reading fantasy novels'', ''Manga drawing'', ''Piano practice'', ''Soccer'', ''Lego building'', ''Hiking'', ''Calligraphy'', ''Scratch coding'', ''Community gardening'']'
  career_goals: Melba aspires to become a veterinarian because she loves caring for animals, but she also dreams of merging her curiosity for technology and science into a career as a marine biologist or
    a software engineer who designs educational games for children. She aims to excel academically, earn a scholarship, and attend a university where she can study both biology and computer science. Ultimately,
    she hopes to contribute to environmental conservation and create tools that inspire the next generation of curious, practical thinkers.
