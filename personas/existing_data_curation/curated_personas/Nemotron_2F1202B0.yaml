personas:
  professional: Melba is an aspiring junior coder and storyteller who blends a love for fantasy novels with practical problem-solving as they design simple games in Scratch, organize school projects with
    the same disciplined approach taught by their family's high value on education, and balance curiosity with the need to meet deadlines.
  sports: Melba plays forward for the El Monte Soccer Club U12 team, cheers for the LA Galaxy, balances a love for competition with a habit of stretching after practices, yet they occasionally skip the
    cooldown when rushing home for homework.
  arts: Melba is a manga enthusiast who sketches Tite Kubo-style characters, practices piano pieces by Yiruma and Beethoven, attends calligraphy workshops where they admire the brushwork of Wang Xizhi,
    and frequently draws inspiration from Studio Ghibli films such as Spirited Away.
  travel: Melba enjoys weekend hikes in the San Gabriel Mountains, has visited Disneyland and the Natural History Museum in Los Angeles, and dreams of traveling to the Great Wall region to experience the
    lantern festivals celebrated during Lunar New Year with their grandparents, which they eagerly anticipate.
  culinary: Melba loves helping prepare jiaozi (dumplings) and stir-fried bok choy with soy-ginger sauce, experiments with homemade pizza toppings like pepperoni and pineapple, and proudly claims their
    best creation is a sweet-savory moon-cake-inspired cheesecake that they often share at family gatherings.
  core: Melba balances a curious mind with practical habits, juggling schoolwork, soccer, and creative projects while they sometimes lose track of time building intricate Lego models and indulging in snack
    cravings.
background:
  cultural: Melba comes from an East Asian (Chinese) family that settled in El Monte, a city known for its vibrant Asian community. Her household places a high value on education, respect for elders, and
    bilingual proficiency, regularly celebrating Lunar New Year, the Mid‑Autumn Festival, and other cultural traditions. She learns traditional Chinese recipes and calligraphy from her grandparents while
    also navigating the multicultural environment of her American school. This blend of cultural heritage and local community life shapes her worldview, fostering a balance between curiosity about new ideas
    and appreciation for established practices.
