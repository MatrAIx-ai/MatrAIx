persona_description: A marine biologist with a passion for the study of large marine species, particularly manta rays. She is an expert in the identification and conservation of manta rays and has dedicated
  her career to understanding their behavior, ecology, and conservation needs. Her work has been instrumental in the recognition and conservation of the Reef Manta, Manta alfredi, and the Giant Manta, Manta
  birostris. She is also known for her work with the Marine Megafauna Foundation, a non-profit organization that focuses on the research and conservation of threatened large marine species. Her expertise
  and dedication to the study of manta rays make her a highly sought-after expert in the field.
