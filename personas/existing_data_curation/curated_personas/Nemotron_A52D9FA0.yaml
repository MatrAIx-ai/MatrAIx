personas:
  professional: Angela Perkins is a former cashier who blends precise cash handling and inventory expertise with a self‑taught flair for visual aesthetics, aiming to become a gallery assistant where their
    competitive edge fuels relentless efficiency, their preference for solitary, low‑stimulus environments drives a love for quiet back‑office tasks, and their occasional skepticism of corporate agendas
    leads them to seek independent, artist‑led spaces, even as they navigate occasional anxiety spikes during sudden rushes by employing self‑regulation techniques.
  sports: Angela Perkins, a casual runner who clocks modest times in the Seattle Marathon each spring, passionately supports the Seattle Seahawks (NFL) and Seattle Sounders FC (MLS), and spends Saturday
    mornings in the Cedar Yoga Collective while also playing third‑base for the Lakeside Legends, a co‑ed adult softball league.
  arts: Angela Perkins curates indie and ambient playlists featuring Bon Iver, Nils Frahm, and Tycho, immerses themselves in watercolor studies of Edward Hopper‑style urban vistas, devotes evenings to digital
    illustrations inspired by Refik Anadol’s data‑driven art, and regularly attends openings that showcase emerging multimedia artists like Leah Bella, weaving these experiences into a personal aesthetic
    that balances quiet introspection with a hunger for avant‑garde concepts.
  travel: Angela Perkins prefers low‑key, off‑season travel, having trekked the misty wetlands of Iceland, explored the street art corridors of Lisbon, and spent a quiet weekend in the Sonoma wine country,
    while future plans include a solo retreat to the Japanese islands of Shikoku for temple meditation, all booked through meticulous DIY itineraries that avoid crowded tourist peaks.
  culinary: Angela Perkins enjoys cooking simple yet refined meals like quinoa‑salad with smoked salmon, avocado, and fresh dill, perfecting a seasonal beet‑and‑goat‑cheese tart, while they indulge in occasional
    upscale dining at a downtown farm‑to‑table bistro for truffle mushroom risotto, and cherish the ritual of brewing single‑origin pour‑over coffee with Ethiopian Yirgacheffe beans each morning.
  core: Angela Perkins is a quietly ambitious introvert who channels competitive energy into artistic precision, navigates anxiety through disciplined routines, and balances a love for solitary creativity
    with occasional splurges on avant‑garde experiences.
background:
  cultural: Angela grew up in a middle‑class, predominantly white suburb of central Florida, influenced by a blend of Southern hospitality and the multicultural vibe of nearby Tampa Bay. Her family's cultural
    traditions include church gatherings, community potlucks, and a strong emphasis on self‑reliance. Exposure to the region’s vibrant art scene—murals, local galleries, and craft fairs—nurtured her appreciation
    for visual arts. While she identifies with the broader American cultural narrative, her personal values reflect a mix of pragmatic independence and an emerging curiosity about diverse artistic expressions.
attributes:
  skills: '[''cash handling'', ''transaction accuracy'', ''basic bookkeeping'', ''customer needs assessment'', ''inventory management'', ''visual aesthetics appreciation'', ''self‑directed learning'', ''digital
