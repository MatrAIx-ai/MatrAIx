  hobbies: '[''watercolor painting'', ''sketching'', ''digital illustration'', ''reading contemporary fiction'', ''philosophical essays'', ''bird‑watching'', ''gardening'', ''journaling'', ''curating indie/ambient
    music playlists'', ''visiting small art galleries'']'
  career_goals: She aspires to transition from front‑line retail to a role that merges her love of art and her organizational strengths, such as a gallery assistant, art supply store manager, or remote
    freelance digital illustrator. In the near term, she aims to complete a certificate in graphic design, gain supervisory experience at her current workplace, and eventually secure a position that offers
    more autonomy, quieter work environments, and opportunities for creative expression. Long‑term, she dreams of opening a small community art studio that provides workshops for introverted artists.
