  career_goals: As he approaches retirement age, Henry aims to secure a stable position that leverages his expertise while minimizing physical strain. He aspires to obtain an advanced AWS Certified Welding
    Supervisor certification and transition into a shop foreman role where he can oversee safety compliance, schedule work, and mentor younger welders. He also hopes to develop a part‑time apprenticeship
    program at the local community college, allowing him to share his knowledge in a structured, low‑stress environment. Maintaining a predictable work routine and a clear path to a comfortable retirement
    are central to his goals.
