persona_description: A geoscientist who specializes in the study of geysers and their development over time, particularly focusing on the development of Castle Geyser in Yellowstone National Park. He is
  interested in using 3-D laser scanning technology to visualize and interpret geologic features and has conducted preliminary 14C dating of sinter from a pool near the upper portion of the geyser cone.
  His research interests include the development and evolution of geysers, particularly in relation to their life stories and the factors that influence their longevity.
