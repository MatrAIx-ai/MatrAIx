  hobbies: '[''Visiting art galleries and fairs'', ''Attending community theater'', ''Line dancing'', ''Group fitness and walking clubs'', ''River clean‑up volunteer events'', ''Bird‑watching and photography'',
    ''Crocheting and crafting home décor'', ''Cooking seafood recipes'', ''Reading art history books'', ''Traveling to nearby natural attractions'']'
  career_goals: Dawn aspires to advance from a dedicated housekeeper to a supervisory role within a boutique hotel or resort in the Crystal River area. She plans to obtain a professional housekeeping certification
    and training in green cleaning to lead a team focused on sustainable practices. Over the next few years, she hopes to mentor new staff, develop a small cleaning‑service business that caters to vacation
    rentals and local galleries, and integrate her love for art by offering specialised care for artwork in clients' homes. Ultimately, she seeks to combine her organizational expertise with her artistic
    curiosity to create a niche service that preserves both the cleanliness and aesthetic value of living spaces.
