personas:
  professional: Rachel Nelsen is a sheet‑metal fabricator with five years of experience, proficient in manual and CNC forming, MIG and TIG welding, and blueprint interpretation, who blends curiosity about
    emerging fabrication technologies with a practical, safety‑first mindset to deliver precise, high‑quality components while mentoring small crews.
  sports: Rachel Nelsen enjoys solitary desert hikes and occasional trail runs, cheers for the Tucson Roadrunners and the Arizona Diamondbacks, belongs to a small weekend hiking club that explores Sabino
    Canyon, and prefers home‑based stretching and light weight training over crowded gyms.
  arts: Rachel Nelsen expresses creativity through handcrafted metal jewelry inspired by the geometric patterns of indigenous artisans and finds artistic inspiration in the sci‑fi novels of Neal Stephenson,
    the photography of Edward Burtynsky, and the ambient soundscapes of Tycho, while attending local desert‑themed art fairs.
  travel: Rachel Nelsen favors self‑planned road trips that combine desert photography with quiet contemplation, has already explored Saguaro National Park, the Grand Canyon, and a weekend getaway to Santa
    Fe for its vibrant markets, and dreams of a solo trek through Patagonia’s Torres del Paine to capture sunrise over rugged peaks.
  culinary: Rachel Nelsen enjoys cooking southwestern dishes like chiles rellenos, prickly‑pear‑glazed salmon, and roasted cactus salad, skillfully blends flavors with fresh local ingredients such as Hatch
    chiles and lime, and appreciates occasional meals at a family‑run taco stand where they savor homemade salsa verde.
  core: Rachel Nelsen balances a pragmatic sheet‑metal career with a solitary love of desert hikes, metal jewelry making, and sci‑fi reading, all while occasionally overspending on hobby supplies and forgetting
    to floss.
background:
  cultural: Rachel is a white American who grew up in Tucson after her family relocated from the Midwest. Her upbringing blends a Midwestern work ethic with the Southwest’s appreciation for the outdoors,
    community, and cultural diversity. Living in Tucson exposed her to Native American and Mexican influences in food, art, and local festivals, fostering a respect for multiculturalism while her family
    emphasized self‑reliance, practicality, and service to others. These regional and familial values shape her pragmatic yet curious outlook, her love of solitary nature activities, and her commitment
    to collaborative, harmony‑focused environments.
attributes:
  skills: '["Sheet metal fabrication", "MIG/TIG welding", "CNC machining", "Blueprint reading", "Basic AutoCAD drafting", "Material selection", "Quality inspection", "Safety compliance", "Equipment maintenance",
    "Small‑team coordination"]'
  hobbies: '["Hiking in the Sonoran Desert", "Desert photography", "Metal jewelry making", "Model ship building", "Reading science‑fiction", "DIY electronics", "Small robotics projects", "Book club participation",
    "Habitat for Humanity volunteering", "Container gardening"]'
  career_goals: Rachel aims to become a certified master sheet‑metal fabricator within the next three years, obtaining advanced welding certifications and deepening her CNC programming expertise. She plans
    to pursue an associate’s degree in industrial technology to complement her practical experience. In the medium term, she aspires to a foreperson or supervisory role where she can mentor a small crew
    and implement efficiency improvements. Long‑term, Rachel dreams of launching a boutique metal‑work shop that offers custom architectural accents and handcrafted metal jewelry, blending her technical
    skills with her creative interests while maintaining a sustainable, locally‑focused business model.
