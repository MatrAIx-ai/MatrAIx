  career_goals: Larry aims to leverage his competitive drive and practical skills into a future career. He hopes to earn a high school sports scholarship to continue playing basketball at the collegiate
    level while also pursuing a college program in computer science or game design. Alternatively, he is considering a trade apprenticeship in automotive technology to secure a stable job after graduation.
    His immediate goal is to improve his basketball performance and develop a modest follower base on his gaming stream, positioning himself for future opportunities.
