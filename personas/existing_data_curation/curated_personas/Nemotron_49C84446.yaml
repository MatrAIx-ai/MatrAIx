  career_goals: Kenneth dreams of becoming a teacher or community storyteller who can make learning fun for other kids. He also imagines hosting a local youth radio show or creating video content where
    he can share his enthusiasm for science and adventure. In the longer term he hopes to study environmental science and become a wildlife guide, using his communication skills to educate others about
    nature. He is determined to combine his love of talking, creativity, and practical problem‑solving in a career that involves helping people learn.
