personas:
  professional: Kenneth Cenizal is a budding junior coder who builds simple games in Scratch, designs LEGO city layouts, and leads school drama skits, channeling their curiosity and talkative energy into
    collaborative, hands‑on projects while often forgetting to tidy up their workspace.
  sports: Kenneth Cenizal loves playing soccer and basketball at the community park, cheering for the Carolina Panthers and Charlotte Hornets while aspiring to join the Lancaster High School Lancers junior
    league, and they practice a loose, improvisational style that mirrors their relaxed attitude toward obligations.
  arts: Kenneth Cenizal delights in performing improv skits for the drama club, jam‑sessions of classic Disney songs like 'When You Wish Upon a Star', and drawing inspiration from beloved performers such
    as Lin‑Manuel Miranda, Taylor Swift, and the comedic antics of Jim Carrey, which fuel their storytelling flair.
  travel: Kenneth Cenizal’s travel dreams blend weekend trips to nearby Charleston’s historic waterfront and annual visits to the Lancaster County Peach Festival with a wish to explore the Great Smoky Mountains
    and one day ride a roller coaster at Disney World, preferring spontaneous road trips over meticulously planned itineraries, and they are especially thrilled by the idea of hiking scenic trails.
  culinary: Kenneth Cenizal favors Southern comfort food, eagerly munching on smoky barbecue ribs, fluffy biscuits with honey butter, and peach cobbler at family barbecues, while they proudly master the
    art of making grilled cheese sandwiches with sharp cheddar and a dash of hot sauce.
  core: Kenneth Cenizal is a curiosity‑driven, talkative 10‑year‑old who juggles LEGO skyscrapers, Scratch games, and neighborhood jokes, often forgetting to clean up but always lighting up any room with
    stories and spontaneous humor, and they thrive on the buzz of friendly chatter.
background:
  cultural: Kenneth grew up in Lancaster, South Carolina, a small, close‑knit town with a strong Southern heritage. His family participates in local church activities and community gatherings, emphasizing
    hospitality and respect for tradition. While his background is predominantly white, the school environment introduces him to a modest mix of cultures, which broadens his perspective. He enjoys Southern
    cuisine like barbecue and biscuits, and he takes part in community festivals such as the Lancaster County Peach Festival. The values of friendliness, community service, and a love for the outdoors are
    woven into his everyday life.
