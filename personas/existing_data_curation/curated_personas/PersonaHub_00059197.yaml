persona_description: A historian who specializes in the study of the Crusades and their impact on the development of Christianity in Europe. His research interests include, but are not limited to, the religious
  and political context of the Crusades, the spread of Catharism, the role of the papacy in the Crusades, and the impact of the Crusades on the development of Christianity in Europe. He is particularly
  interested in the role of heresy in medieval Europe and the impact of the Crusades on the spread of heresy. He has a deep understanding of the religious and political history of Europe and has written
  extensively on the Crusades.
