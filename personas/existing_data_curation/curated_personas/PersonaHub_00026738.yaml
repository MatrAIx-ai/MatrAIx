persona_description: A 19th-century German poet and botanist known for his prose narrative "Peter Schlemihl" and his scientific works, particularly his expedition to the Pacific Ocean and the Bering Sea.
  He was appointed botanist to the Russian ship Rurik and married his friend's foster daughter Antonie Piaste in 1818. His works include "Frauenliebe und Leben" and "Salas y Gomez," and he died in Berlin
  at the age of 57.
