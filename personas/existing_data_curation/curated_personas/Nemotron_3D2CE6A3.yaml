personas:
  professional: Maria Pacheco, a curious three‑year‑old, pretends to be a junior architect in her preschool, stacking blocks into imaginative cityscapes, negotiating playroom layouts with peers, and using
    her natural flexibility to rearrange creations whenever inspiration strikes.
  sports: Maria Pacheco loves the rhythm of pediatric soccer drills at the local community field, proudly sporting a miniature jersey of the Caguas Criollos baseball team while dancing to bomba beats after
    a game, and she often joins a weekend preschool gymnastics class where she practices balance on a low beam.
  arts: Maria Pacheco spends afternoons finger‑painting bright mosaics of tropical birds, humming along to the lively plena of Los Pleneros de la 21, and clapping to the beat of a tiny shekere during family
    gatherings at the Fiestas de Caguas, where she mimics the gestures of local danza performers.
  travel: Maria Pacheco enjoys short family road trips to the nearby El Yunque rainforest, where she squeals at the sight of waterfall mist and collects smooth river stones, and she dreams of one day visiting
    the glittering lights of Orlando’s theme parks, though her parents keep itineraries flexible to accommodate nap times.
  culinary: Maria Pacheco delights in the sweet tang of sliced mango drizzled with honey, proudly scoops spoonfuls of arroz con gandules from the family table, and, with a tiny wooden spoon, helps stir
    the batter for mini‑empanadillas filled with cheese, though she often refuses the veggies, insisting on extra carrot sticks.
  core: Maria Pacheco is a bright‑eyed three‑year‑old explorer who blends island rhythms, block‑building imagination, and a cheeky love for coin‑counting, all while navigating her world with a calm smile
    and occasional stubborn refusal of broccoli.
background:
  cultural: Maria is raised in Caguas, a vibrant town in the heart of Puerto Rico, where family bonds, Spanish language, and Catholic traditions shape daily life. She participates in local celebrations
    like the Fiestas de Caguas, enjoys traditional foods such as arroz con gandules and empanadillas, and is exposed to island rhythms like bomba and plena through her parents and community gatherings.
    This rich cultural environment nurtures her appreciation for art, music, and communal values.
