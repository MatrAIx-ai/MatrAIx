    books'']'
  career_goals: Even at three, Maria imagines herself as a storyteller who sings and draws, dreaming of becoming a painter or a singer who shares joyful songs with friends. She also loves helping others
    and likes the idea of being a teacher who reads picture books to younger children, reflecting her natural curiosity and love for art.
