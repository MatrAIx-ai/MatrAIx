persona_description: Thigesh Vather is a doctoral student at the University of KwaZulu-Natal in South Africa who is working toward a PhD in hydrology. He is interested in using cosmic ray technology to
  validate hydrometeorological and remote soil moisture sensors, and he has received funding from a National Science Foundation PEER grant, the South African Ecological Observation Network and the Office
  of Global Engagement at the UNL Institute of Agriculture and Natural Resources to come to UNL to conduct further research in using the cosmic ray probe for static and mobile data collection in different
  types of hydrogeologic environments. Vather is also interested in using the cosmic ray probe to evaluate how groundwater pumping for diamond mining in northern South Africa is affecting tree growth along
  the Limpopo River.
