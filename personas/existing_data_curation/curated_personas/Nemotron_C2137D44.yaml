    planning'']'
  hobbies: '[''Vegetable gardening'', ''Fly-fishing'', ''Woodworking (birdhouses, garden furniture)'', ''Bridge (senior club)'', ''Model train collecting and assembly'', ''Reading Southern historical non‑fiction'',
    ''Listening to classic rock music'']'
  career_goals: Frederick is approaching retirement but wishes to leave a lasting professional legacy. His primary goal is to mentor younger analysts in the county’s Department of Community Development,
    sharing both technical and interpersonal approaches. He aims to publish a comprehensive study on aging demographics in Randolph County, influencing local health policy. He also hopes to secure a part‑time
    consultancy role that allows him to advise on grant writing for community organizations, ensuring sustainable funding for programs he cares about. Finally, he wants to develop a structured succession
    plan for the community outreach programs he has managed, preserving the routine‑oriented processes he values.
