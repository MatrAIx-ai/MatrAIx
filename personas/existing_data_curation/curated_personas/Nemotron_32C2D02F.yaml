  hobbies: '["Gardening (herbs, tomatoes, plantains)", "Cooking traditional Puerto Rican dishes", "Knitting and quilting", "Listening to salsa and bolero music", "Attending church services and community
    events", "Reading historical fiction in book club", "Participating in senior-center cultural dance nights"]'
  career_goals: Although officially retired, Jocelyn's ambitions focus on staying active, healthy, and culturally engaged. She aims to preserve and share her Puerto Rican culinary heritage by teaching cooking
    workshops at the local senior center, to mentor younger volunteers on organizing community events, and to compile a family memoir that records oral histories for future generations. Maintaining her
    independence is a priority, so she sets personal health goals such as regular walking, attending wellness classes, and managing stress through meditation and breathing exercises. She also hopes to deepen
    her involvement with the Hartford County Puerto Rican cultural association, helping to organize the annual Three Kings Day celebration.
