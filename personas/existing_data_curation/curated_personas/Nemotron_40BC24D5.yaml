personas:
  professional: Gabriela Greene is a seasoned Class B commercial driver who leverages their bilingual Spanish-English communication and frontline sales experience to build rapport with diverse customers,
    expertly plans routes using GPS and logistics software, and rigorously performs vehicle inspections, though their relaxed approach to obligations sometimes leads to a loosely structured schedule.
  sports: Gabriela Greene, an avid member of the Albuquerque Hiking Club who routinely tackles the Sandia Mountains, keeps a casual eye on New Mexico United soccer and the Albuquerque Isotopes baseball,
    and they weave brisk trail walks and occasional community softball games into their fitness routine, preferring flexible, outdoor activities over regimented gym sessions.
  arts: Gabriela Greene expresses their creative side through desert photography heavily influenced by Ansel Adams and immerses themselves in regional Mexican music from artists like Lila Downs and Los
    Tigres del Norte, regularly showcasing their images at local festivals where they also volunteer teaching basic Spanish.
  travel: Gabriela Greene prefers spontaneous solo road trips that combine desert adventure with culinary discovery, having already journeyed across Arizona’s Monument Valley and planning a future trek
    to Oaxaca’s highland markets to source unique ingredients, while balancing occasional family visits in New Mexico with their demanding driving schedule.
  culinary: Gabriela Greene is a dedicated home chef who masterfully prepares mole poblano and chiles rellenos, frequently experimenting with locally sourced Hatch chiles, fresh corn masa, prickly-pear
    cactus, and heirloom tomatillos discovered at farmers’ markets to reinvent family recipes.
  core: Gabriela Greene blends a curious, hands-on spirit with a laid-back, occasionally disorganized work style, turning long hauls into desert photography adventures while habitually forgetting to log
    mileage until the last minute.
background:
  cultural: Gabriela is a first‑generation Mexican‑American whose family emigrated from the state of Jalisco. She grew up speaking Spanish at home and celebrates Mexican traditions such as Día de los Muertos,
    Las Posadas, and local quinceañeras. Living in Albuquerque, she participates in the city’s vibrant bicultural community, attending the annual Albuquerque International Balloon Fiesta’s Mexican‑heritage
    events and supporting the local Mercado de la Luz. Her bilingual ability and strong ties to the Mexican community shape her interpersonal style, infusing her work with a warm, family‑oriented approach
    while maintaining a practical, independent mindset.
attributes:
  skills: '[''Commercial Driver License (CDL) – Class B'', ''Bilingual Spanish‑English communication'', ''Route optimization using GPS and logistics software'', ''Customer service and basic sales negotiation'',
    ''Inventory and delivery documentation'', ''Vehicle maintenance and safety inspections'', ''Basic computer skills (Microsoft Office, CRM platforms)'']'
  hobbies: '[''Hiking in the Sandia Mountains'', ''Photography of desert scenery'', ''Cooking and adapting traditional Mexican dishes'', ''Listening to Mexican regional music and transportation podcasts'',
    ''Volunteering at local cultural festivals'']'
  career_goals: Gabriela aims to upgrade her CDL to a Class A rating within the next year so she can take on longer hauls and higher‑pay routes. She plans to finish her associate degree in Business Administration
    through online coursework, then pursue a bachelor’s in Logistics Management. In the medium term she wants to move into a logistics coordinator role for a regional distributor, where she can blend her
    hands‑on driving experience with planning and scheduling. Her long‑term ambition is to launch a small, locally‑focused courier service that specializes in delivering fresh Mexican food products to restaurants
    and community markets throughout New Mexico.
