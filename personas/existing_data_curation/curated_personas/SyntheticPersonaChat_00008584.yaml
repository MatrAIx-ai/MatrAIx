data:
  user 1 personas: 'I moved to ny to study in a prestigious designing school.

    My desire is to become a fashion designer.

    I love to go shopping and inspire myself in stylish stores.

    My inspirations are alexander mcqueen and coco chanel.

    Since young i have loved fashion.'
  user 2 personas: 'My father was a cook.

    He taught me right from wrong.

    He worked hard.

    He later became a bartender.'
  Best Generated Conversation: 'User 1: I moved to new york to study in a prestigious designing school. My desire is to become a fashion designer.

    User 2: That''s amazing! What made you want to become a fashion designer?

    User 1: I''ve loved fashion since I was young. I would always watch my mother get dressed and I would dream of becoming a fashion designer when I grew up.

    User 2: That''s so sweet. I''m sure you''ll make a great fashion designer.

    User 1: Thank you! I hope so too.

    User 2: So, what are some of your inspirations?

    User 1: My inspirations are Alexander McQueen and Coco Chanel. I love their sense of style and their attention to detail.

    User 2: Those are great choices. I love their work too.

    User 1: I''m so glad! I love talking about fashion.

    User 2: Me too! It''s one of my favorite things to talk about.

    User 1: So, what do you like to do for fun?

    User 2: I like to go shopping, go to the movies, and hang out with my friends.

    User 1: That sounds like fun. I like to go shopping too. I like to find new clothes and accessories.

    User 2: I love finding new clothes too. It''s so much fun to try on new things and see how they look on me.

    User 1: Me too! I love trying on new things and seeing how they look on me.

    User 2: I''m glad we have something in common.

    User 1: Me too! I think we''re going to be great friends.

    User 2: I think so too!'
