  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Watercolor painting'', ''Digital photography'', ''Nature walks'', ''Thrift store browsing'', ''Listening to indie and folk music'', ''Reading psychological
    thrillers'', ''Mindfulness journaling'', ''Yoga'']'
  career_goals: She aims to transition from a cashier position to a role that merges her passion for art and community engagement, such as a gallery assistant, community arts program coordinator, or a small-business
    owner of a boutique that showcases local crafts. To achieve this, she plans to complete an associate degree in Art History or Visual Arts, obtain a retail management certification, and volunteer at
    local cultural events. In the long term, she hopes to curate traveling exhibitions that bring contemporary art to rural North Carolina and eventually open her own art-focused coworking space.
