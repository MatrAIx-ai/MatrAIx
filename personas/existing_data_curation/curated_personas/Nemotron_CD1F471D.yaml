personas:
  professional: Cheryl Caulder, a retail cashier turned aspiring community arts coordinator, leverages her sharp interpersonal skills, knack for quick problem solving, and love of visual storytelling to
    bridge the gap between local craftspeople and gallery audiences, even as her spontaneous nature sometimes clashes with tight exhibition deadlines.
  sports: Cheryl Caulder, an avid weekend hiker who belongs to the Blue Ridge Trail Walkers club, combines her love of nature with occasional yoga flow classes and supports the Charlotte Hornets, cheering
    loudly at home games while preferring low‑key community softball catch‑ups over large stadium events.
  arts: Cheryl Caulder, a watercolor sketcher and digital photographer who spends Saturdays browsing the Rowan Arts Center and finds inspiration in the works of contemporary painter Emily Mae Smith and
    indie folk musician Sufjan Stevens, often curating small pop‑up exhibits in thrift‑store venues to showcase emergent local talent.
  travel: Cheryl Caulder, a road‑trip enthusiast who plans detailed itineraries for weekend escapes to Asheville’s art districts, spontaneous hikes in Shenandoah National Park, and yearly cultural pilgrimages
    to Lisbon to explore street murals, balancing her wanderlust with a modest travel budget and a family‑oriented calendar.
  culinary: Cheryl Caulder, a home‑cook who blends Southern farm‑to‑table traditions with eclectic flavors, regularly prepares shrimp and grits seasoned with fresh thyme, sautés kale with roasted beets
    and goat cheese, and experiments with charcoal‑grilled peach salad, while their occasional over‑indulgence in late‑night sweet tea and store‑bought pastries reflects a love of comfort foods.
  core: Cheryl Caulder, a curious yet anxiety‑prone boutique dreamer, balances spontaneous creativity with the nagging pull of deadlines, often juggling vintage finds while worrying about the next art show,
    and habitually doodles in their mindfulness journal during idle moments.
background:
  cultural: Cheryl was raised in a close-knit, predominantly white community in Iredell County, North Carolina. Her family’s Southern roots emphasize hospitality, church involvement (Methodist), farm-to-table
    cooking, and a strong work ethic. While she holds an appreciation for traditional Southern customs such as community picnics and storytelling, she also actively seeks broader cultural experiences, drawing
    inspiration from contemporary art movements, diverse music, and progressive ideas. This blend of Southern heritage and open-minded curiosity shapes her worldview and personal identity.
