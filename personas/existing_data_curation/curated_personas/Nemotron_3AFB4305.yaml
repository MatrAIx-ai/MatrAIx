  career_goals: Even at six, Anthony talks about future roles that mix hands‑on creation with helping others. He dreams of becoming a firefighter who protects his community, or a structural engineer who
    designs sturdy, safe buildings. His competitive streak pushes him to aim to be the "best builder" in his class and to win future science‑fair awards. At the same time, he worries about making mistakes,
    so he hopes to build confidence through practice and supportive guidance.
