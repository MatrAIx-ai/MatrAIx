  career_goals: John aims to transform his artistic passions into a modest entrepreneurial venture by establishing an online shop for his paintings, prints, and handcrafted wooden pieces. He hopes to open
    a community art studio in Vernon Parish that offers free workshops for youth and senior residents, fostering creativity and personal expression. Concurrently, he plans to complete a certificate program
    in digital media to sharpen his online presence and explore multimedia storytelling. Writing a memoir that weaves together his experiences of personal change, regional culture, and artistic growth is
    also a central ambition, with the goal of publishing it either traditionally or through self‑publishing platforms. Ultimately, John seeks to leave a lasting creative legacy in his hometown while continuing
    to learn and experiment with new artistic mediums.
