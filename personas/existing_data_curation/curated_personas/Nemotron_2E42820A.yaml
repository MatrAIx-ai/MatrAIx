  hobbies: '[''Arduino projects'', ''Raspberry Pi tinkering'', ''Python programming for fun'', ''Reading sci-fi novels'', ''Watching tech documentaries'', ''Swimming'', ''Beach volleyball'', ''STEM tutoring/mentoring'',
    ''Community clean-up volunteering'', ''Acoustic guitar playing'', ''Photography (sunrise/ocean)'', ''Strategic board games'', ''Cooking (exploring cuisines)'']'
  career_goals: David aims to blend his technical expertise with his desire to help others by pursuing graduate studies in environmental engineering or data science within the next two years. He envisions
    a career developing data‑driven, sustainable technology solutions for Miami’s coastal challenges, such as flood mitigation and water quality monitoring. After completing his advanced degree, he hopes
    to join a research institute or a socially‑focused startup where he can lead interdisciplinary projects that translate research into practical, community‑benefiting outcomes. Alongside his professional
    path, David plans to continue mentoring underrepresented youth in STEM, fostering inclusive collaboration and harmony in his field.
