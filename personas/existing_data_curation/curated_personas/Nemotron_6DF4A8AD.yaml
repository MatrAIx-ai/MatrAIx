personas:
  professional: Hubert Kelly, a retired master mechanic and carpenter, leverages decades of hands‑on trade expertise to mentor apprentices with a methodical, routine‑driven approach, applying their critical
    skepticism to diagnose problems before any work begins.
  sports: Hubert Kelly, an avid fan of the Green Bay Packers and the Chicago Bulls, participates in a weekly senior bowling league at the community center and takes gentle morning walks along the local
    river trail, valuing low‑impact exercise that fits their solitary, routine‑oriented lifestyle.
  arts: Hubert Kelly, a lover of classic soul and jazz, fills their workshop with records by Aretha Franklin, Nina Simone, and Miles Davis while savoring biographies of Thomas Edison and reading technical
    guides, allowing the music’s steady rhythm to complement their woodworking focus.
  travel: Hubert Kelly, a meticulous planner, enjoys short road trips to historic railway towns such as Strasburg, Pennsylvania, and dreams of a guided tour of Stuttgart’s classic‑car museums, preferring
    well‑scheduled itineraries that balance sightseeing with ample rest periods.
  culinary: Hubert Kelly, a garden‑to‑table enthusiast, regularly cooks hearty vegetable ratatouille, roasted chicken with rosemary, and apple crumble using fresh carrots, heirloom tomatoes, and locally
    sourced honey, while their skill level is solid but limited to simple, reliable dishes.
  core: Hubert Kelly, a solitary, routine‑loving retiree, combines meticulous trade expertise with a skeptical mindset, tending gardens, building model trains, and listening to jazz, yet often forgets to
    schedule social gatherings, preferring the quiet predictability of their own company.
background:
  cultural: Hubert grew up in Buffalo’s historically Black neighborhoods during the 1950s and 60s, a time marked by the civil‑rights movement and the rise of community solidarity. His parents worked in
    local factories, instilling a strong work ethic and the value of self‑reliance. The local Black church was a cultural hub, exposing him to gospel music, communal gatherings, and a sense of collective
    resilience, although he now prefers quieter, more solitary settings. His heritage influences his love for Southern‑style cooking—especially dishes like collard greens and fried fish—and his appreciation
    for African‑American musical traditions. These cultural roots shape his emphasis on practical skill, personal responsibility, and the desire to give back to his community through mentorship and volunteer
    work.
