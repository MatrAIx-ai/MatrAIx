personas:
  professional: Miguel Don is an aspiring young engineer who builds complex LEGO machines with gears and wheels, channeling their curious yet practical mindset into spontaneous designs, often improvising
    new inventions on the fly while proudly demonstrating them to classmates.
  sports: Miguel Don kicks the ball for the Elizabeth Pioneers U‑8 soccer team, idolizing the New York Red Bulls, and they spend weekends mastering drills at the local park while also cheering for the New
    York Yankees during baseball season, proving their competitive spirit extends from the field to the stands.
  arts: Miguel Don lights up family gatherings with energetic salsa and reggaetón dance moves, belts out karaoke versions of songs by Bad Bunny and Shakira, sketches comic‑book heroes inspired by Spider‑Man
    and draws vibrant scenes that they later animate in Scratch, revealing a talkative and creative personality that thrives on audience applause.
  travel: Miguel Don dreams of catching the salty breeze of Daytona Beach after visiting his aunt in Florida last summer, and they also hope to explore the historic streets of San Juan, Puerto Rico, while
    planning each trip with parents using colorful maps and counting down the days with excitement.
  culinary: Miguel Don adores the sweet aroma of plantains frying in butter, the savory depth of ropa vieja made with shredded beef and olives, and they love sprinkling extra cheese over macaroni, often
    insisting on helping stir the pot while occasionally sneaking extra toppings when Mom isn’t looking.
  core: Miguel Don is a fiercely curious, socially magnetic seven‑year‑old who bursts with energy building LEGO gadgets, dancing to rhythmic beats, and negotiating snacks, all while juggling a playful competitiveness
    and a heads‑up habit of forgetting homework until the last minute.
background:
  cultural: Miguel grew up in a bilingual Cuban household in Elizabeth, New Jersey. His parents immigrated from Cuba, and family gatherings are filled with Spanish conversations, Cuban dishes such as ropa
    vieja, plantains, and Cuban sandwiches, and the lively rhythms of salsa and son. He celebrates Cuban cultural holidays like the Día de la Cultura Cubana, where music, dancing, and traditional foods
    are shared with extended family and neighbors. The local Latino community center offers salsa lessons and Cuban‑heritage events that Miguel attends, strengthening his connection to his roots. Living
    in the diverse city of Elizabeth gives him a mix of cultures, but his daily life at home and in community celebrations keeps his Cuban identity vibrant and integral to who he is.
