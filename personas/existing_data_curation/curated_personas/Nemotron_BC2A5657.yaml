  career_goals: Miguel’s biggest dreams revolve around roles where he can entertain, create, and lead. He imagines becoming a TV game‑show host who can challenge audiences with puzzles, showcase his own
    inventions, and keep everyone laughing. He also talks about wanting to design cool gadgets one day, blending his curiosity about how things work with a practical knack for building. On the sports side,
    he aspires to be a professional soccer player, enjoying the competition and the spotlight. These ambitions reflect his love for being the center of attention, his competitive spirit, and his desire
    to turn ideas into real results.
