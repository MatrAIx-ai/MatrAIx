  hobbies: '["Hiking and nature journaling", "Reading historical nonfiction and classic literature", "Participating in a small book club", "Woodworking", "Landscape and macro photography", "Volunteer writing
    mentor", "Gardening in a community plot", "Board games with close friends"]'
  career_goals: John aspires to transition his academic background and community-service experience into a sustainable role within the non-profit or cultural-heritage sector. He aims to become a program
    coordinator for a regional museum or historic society, where he can design and manage educational workshops, curate exhibitions, and secure funding through grant writing. In the longer term, he envisions
    contributing to a statewide initiative that increases public access to Maine’s literary and natural heritage. He seeks a position that balances intellectual challenge with a predictable schedule, allowing
    him to maintain his family responsibilities while reducing the chronic stress that has affected his well-being.
