personas:
  professional: John Truong blends rigorous historical research and meticulous grant writing with hands‑on woodworking, positioning them as a program coordinator who designs engaging museum workshops while
    keeping budgets tight and respecting both tradition and innovation.
  sports: John Truong enjoys weekend hikes with the Bangor Outdoor Club on the Appalachian Trail, follows the Boston Red Sox and the New England Patriots on TV, participates in a local amateur archery league
    during winter, and fits in morning yoga sessions to counterbalance the sedentary nature of research work.
  arts: John Truong channels a love for classic literature and New England’s visual heritage by leading a book club that reads Melville and Baldwin, photographing landscapes inspired by Ansel Adams, and
    crafting furniture that echoes the simplicity of Shaker design, while attending concerts by the Bangor Symphony Orchestra and listening to Bob Dylan’s folk recordings.
  travel: John Truong prefers thoughtfully planned road trips that combine natural serenity with cultural depth, having explored Acadia National Park, the historic streets of Quebec City, the literary sites
    of Oxford, and dreaming of a quiet retreat in Tuscany, always balancing itinerary details with spontaneous detours for hidden vistas.
  culinary: John Truong enjoys cooking hearty New England fare such as lobster bisque, baked cod with thyme, and wild mushroom risotto, showcasing intermediate‑level cooking skills while often foraging
    for fresh herbs during hikes, and occasionally savoring craft brews at local microbreweries.
  core: John Truong is a detail‑oriented historian‑writer who finds peace in woods and woodworking, yet wrestles with constant worry, a penchant for meticulous budgeting, and a habit of over‑preparing for
    every project.
background:
  cultural: John grew up in a predominantly Anglo-American household in the greater Bangor area, where the cultural rhythm is shaped by New England’s seasonal cycles, a strong sense of community, and an
    appreciation for self-reliance. He identifies with the region’s values of modesty, neighborly assistance, and respect for the natural environment. His marriage and long-standing friendships are rooted
    in local traditions such as town meetings, community festivals, and volunteer initiatives that preserve the area’s historic and ecological legacy. Though his ancestry is largely European, he embraces
    the diverse influences of Maine’s growing cultural mosaic, which informs his inclusive outlook and collaborative spirit.
attributes:
  skills: '["Research and analysis", "Academic writing", "Grant proposal development", "Digital content management", "Basic HTML/CSS", "Project coordination", "Event planning", "Budgeting", "Woodworking",
