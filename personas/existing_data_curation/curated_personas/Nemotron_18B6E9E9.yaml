  hobbies: '[''Building LEGO models'', ''Reading adventure and science books'', ''School science club experiments'', ''Collecting and cataloguing trading cards'', ''Nature walks and insect identification'',
    ''Drawing detailed neighborhood maps'']'
  career_goals: Although only eight, Charly often imagines a future where he becomes an engineer or architect who designs safe, functional spaces for his community. He is fascinated by how things work and
    hopes to create inventions—like a simple water‑filtration system for his town—that improve daily life. He also talks about becoming a veterinarian because he wants to help animals in a practical, reliable
    way. His ambitions are guided by his desire for order, reliability, and making tangible, positive changes.
