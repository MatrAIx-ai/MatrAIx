  hobbies: '[''Pickup basketball games'', ''Live jazz and blues concerts'', ''Soul‑food cooking'', ''Mentoring youth in STEM programs'', ''Reading science‑fiction novels'', ''Sketching architectural ideas'',
    ''Yoga and meditation'']'
  career_goals: Roddrick aims to move into a senior BIM manager role where he can lead interdisciplinary design teams on large‑scale, socially responsible projects—particularly affordable housing and community
    facilities in Chicago’s underserved neighborhoods. He aspires to obtain a Professional Engineer (PE) license, establish a mentorship program for Black youth interested in STEM and design, and eventually
    launch his own consulting firm that integrates inclusive design principles with cutting‑edge technology.
