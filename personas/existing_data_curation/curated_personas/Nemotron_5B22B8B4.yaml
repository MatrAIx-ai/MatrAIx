personas:
  professional: Roddrick Lee, a 48‑year‑old Chicago architectural drafter turned BIM specialist, blends meticulous 2D/3D CAD expertise with a pragmatic curiosity and a talkative, compassionate leadership
    style to coordinate interdisciplinary teams on socially responsible affordable‑housing projects while preparing for his PE licensure.
  sports: Roddrick Lee, an avid basketball player, joins weekly pickup games at the West Loop park, competes in the Chicago Men’s Basketball League, cheers for the Chicago Bulls and Bears, and balances
    high‑intensity play with calming yoga sessions to mitigate anxiety.
  arts: Roddrick Lee, a devoted patron of live jazz and blues, regularly attends performances at the Green Mill featuring artists like Kamasi Washington and Muddy Waters tributes, sketches futuristic architectural
    concepts inspired by Octavia Butler and William Gibson, and finds creative release in the improvisational rhythms of Miles Davis.
  travel: Roddrick Lee, a weekend‑trip planner who blends structured itineraries with spontaneous detours, has explored New Orleans for its music and soul food, wandered historic Savannah, dreams of studying
    Gaudí’s work in Barcelona, and envisions a cultural immersion in Kyoto’s minimalist temples.
  culinary: Roddrick Lee, an enthusiastic home chef, perfects soul‑food staples like fried catfish, collard greens simmered with smoked turkey, sweet‑potato pie, and jambalaya, constantly experimenting
    with smoked paprika, cayenne, and hot‑sauce drizzles while mastering a flawless cornbread crust.
  core: Roddrick Lee, a talkative, compassionate BIM aspirant, channels anxiety into yoga, jazz, and spirited community basketball while balancing ambitious career goals, thoughtful financial planning,
    and a love for soulful cooking.
background:
  cultural: Roddrick grew up on Chicago’s South Side, a neighborhood rich in African‑American history, music, and community activism. His family’s roots trace back to the Great Migration, and he was raised
    with the values of resilience, storytelling, and collective uplift. The city’s vibrant cultural scene—church gatherings, block parties, and local arts festivals—shaped his sociable and compassionate
    outlook. He proudly celebrates Black heritage through participation in Juneteenth events, Black History Month panels, and mentorship initiatives that aim to increase representation of Black professionals
    in engineering and design.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''Revit (BIM)'', ''MicroStation'', ''GIS mapping'', ''Technical blueprint reading'', ''Construction document preparation'', ''Code compliance analysis'', ''Project
