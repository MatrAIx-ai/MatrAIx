personas:
  professional: Roger Rosario, an 87‑year‑old master mechanic with six decades of hands‑on diesel truck, tractor, and construction equipment repair, they translate their step‑by‑step workflow, competitive
    drive, and talkative nature into meticulous repair manuals and hands‑on apprenticeships, ensuring every bolt is tightened to standard while captivating apprentices with lively anecdotes.
  sports: Roger Rosario, an avid fan of baseball and the national soccer team, they never miss a Los Angeles Dodgers game on television and cheer loudly for every match of the squad, while their competitive
    streak fuels lively debates at the senior center’s domino table about past championships.
  arts: Roger Rosario, a lifelong aficionado of classic mariachi, norteño, and ranchera tunes, they spend evenings listening to the crooning of Vicente Fernández and the storytelling ballads of José Alfredo
    Jiménez while also dazzling the senior center crowd with vivid anecdotes that blend mechanical metaphors with cultural references.
  travel: Roger Rosario, a pragmatic traveler who favors short, low‑stress trips, they have taken relaxed drives to nearby San Diego beaches, explored the historic missions of Baja, and dream of a quiet
    pilgrimage to the ancient ruins of Chichen Itza, all while budgeting carefully to keep funds available for family emergencies.
  culinary: Roger Rosario, a proud purveyor of home‑cooked mole, tamales, and fresh salsa, they cultivate chili peppers and herbs in a small backyard garden, expertly blend dried chiles, chocolate, and
    spices for rich sauces, and host family gatherings where their flavorful dishes become the centerpiece of lively storytelling.
  core: Roger Rosario, an 87‑year‑old diesel‑engine wizard who blends meticulous workshop discipline with gregarious storytelling, they worry about health costs, thrive at senior‑center games, and proudly
    cook, garden, and cheer on their favorite teams.
background:
  cultural: Roger was born to Mexican immigrant parents and grew up in a bilingual household where Spanish was spoken at home and English at school. He identifies strongly with the Mexican‑American community
    of Calexico, celebrating traditions such as Día de los Muertos, quinceañeras, and patron saint festivals. His Catholic faith and family‑centric values have shaped his sense of responsibility and his
    competitive spirit in his trade. The cross‑border culture of Imperial County, blending Mexican customs with American influences, informs his hospitality, work ethic, and deep involvement in local community
    events.
attributes:
  skills: '[''Diesel engine repair and overhaul'', ''Hydraulic system diagnostics and repair'', ''Transmission servicing'', ''Fuel injection troubleshooting'', ''Preventative maintenance scheduling'', ''Welding
    and metal fabrication'', ''Air brake system maintenance'', ''Electrical system troubleshooting'', ''Parts procurement and inventory management'', ''Safety compliance and OSHA standards'']'
  hobbies: '[''Playing dominos and card games at the senior center'', ''Listening to mariachi, norteño, and ranchera music'', ''Cooking traditional Mexican dishes (mole, tamales, salsas)'', ''Walking along
    the border promenade'', ''Volunteering as a guest speaker for vocational students'', ''Attending local festivals (Día de los Muertos, Cinco de Mayo)'', ''Watching baseball and Mexican soccer'', ''Storytelling
    with family and friends'', ''Maintaining a backyard garden of chili peppers and herbs'']'
  career_goals: Approaching the end of his working life, Roger aims to solidify his legacy by creating a concise handbook that captures his practical repair methods for future mechanics in the region. He
    plans to mentor a younger apprentice from the local vocational school, sharing his structured approach and competitive drive to become the most reliable service provider in Imperial County. Additionally,
    he hopes to secure a modest pension that will ease his worries about health expenses and ensure financial support for his grandchildren, while being recognized by the local mechanic association for
    his decades of dedication.
