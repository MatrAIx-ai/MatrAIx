  career_goals: Shaun aims to leave a lasting cultural imprint on Pickett County. He plans to self-publish a collection of poems and short stories that reflect Appalachian life, and to curate a modest community
    art exhibit featuring local artists. He hopes to launch a mentorship program at the Jamestown library where he can teach teens creative writing and painting. Another ambition is to record oral histories
    of older residents, preserving the county’s heritage for future generations. Through these projects, he seeks personal fulfillment as a storyteller and a catalyst for community enrichment.
