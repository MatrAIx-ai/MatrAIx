  career_goals: Isamar aims to advance from her current role as marketing manager to senior leadership positions such as Director of Marketing or Chief Marketing Officer, with a focus on inclusive, socially
    responsible campaigns. She wants to champion sustainability‑focused branding initiatives, embed community outreach programs that reflect her Mexican heritage, and mentor emerging talent—especially women
    and Latinx professionals. To reduce stress and improve work‑life balance, she plans to implement more efficient workflows while preserving her dynamic, people‑centric approach.
