persona_description: A public health researcher or statistician interested in the analysis of NHANES data, particularly in the context of sampling design, oversampling, and the use of masked variance units.
  They are familiar with the complex sampling procedure used to select participants for NHANES, the importance of carefully reviewing documentation for each survey cycle to determine which subgroups were
  oversampled, and the use of MVUs to estimate sampling errors and to define strata and PSU variables. They have experience with statistical analysis techniques such as ANOVA, regression analysis, and hypothesis
  testing, and are skilled in interpreting NHANES data to inform public health policy and practice.
