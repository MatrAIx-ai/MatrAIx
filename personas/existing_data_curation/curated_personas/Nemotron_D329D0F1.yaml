personas:
  professional: A senior administrative assistant named Taga Bradley leverages their expertise in calendar management, document preparation, and workflow automation—balancing curiosity for new tools like
    Zapier with a practical respect for established procedures—to keep a nonprofit arts organization’s office running smoothly while nurturing an inclusive, collaborative culture.
  sports: Taga Bradley enjoys seasonal fitness, jogging through Griffith Park’s trails in spring, practicing yoga at the downtown "LA Urban Flow" studio, and joining a community‑center basketball pick‑up
    league that rallies behind the Los Angeles Lakers, while occasionally attending Los Angeles Galaxy soccer matches for a change of pace.
  arts: Taga Bradley curates eclectic jazz and R&B playlists featuring Miles Davis, Erykah Badu, and Robert Glenn, visits LACMA to admire works by Kehinde Wiley and local muralist LA Robinson, and regularly
    attends spoken‑word sessions at The Company of Speakers, weaving poetry by Maya Angelou into their own journal entries.
  travel: Traveling with purpose, Taga Bradley has taken weekend trips to Catalina Island and a cultural immersion in New Orleans’s jazz scene, explored the independent bookstores of Portland, and dreams
    of savoring the street food of Havana and the gardens of Kyoto while balancing a modest travel budget with a desire for meaningful experiences.
  culinary: In the kitchen, Taga Bradley excels at preparing aromatic jerk chicken with Scotch bonnet pepper, creamy coconut‑milk rice and peas, spiced plantain fritters, and fragrant curried goat using
    fresh thyme, all while experimenting with calligraphy‑inspired plating and occasionally perfecting a classic avocado toast for brunch gatherings.
  core: Balancing meticulous office stewardship with a poet’s heart, Taga Bradley navigates life through disciplined routines, a love for jazz, spontaneous culinary experiments, and a lingering worry that
    fuels both their ambition and their nightly meditation.
background:
  cultural: Taga identifies as African American, raised in the vibrant Black community of Los Angeles. Her family’s heritage traces back to the Southern United States and the Caribbean, infusing her upbringing
    with soulful music, storytelling, and a strong sense of community activism. She regularly participates in local Black cultural events such as Juneteenth celebrations, Black History Month exhibitions,
    and performances at the California African American Museum. This cultural foundation informs her inclusive communication style, her appreciation for Afro‑Caribbean cuisine, and her commitment to supporting
    Black artists and community initiatives. Living in Los Angeles, she also embraces the city’s multicultural mosaic, blending her heritage with broader artistic and social experiences.
