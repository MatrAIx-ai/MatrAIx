    ''Research and Information Gathering'', ''Content Creation and Social Media Scheduling'', ''Cultural Sensitivity and Inclusivity Practices'', ''Workflow Automation (Zapier, macros)'']'
  hobbies: '[''Reading historical fiction'', ''Poetry and spoken‑word events'', ''Visiting art museums and galleries'', ''Yoga and meditation'', ''Cooking Afro‑Caribbean dishes'', ''Journaling'', ''Nature
    walks in Griffith Park'', ''Volunteering at community centers'', ''Exploring multicultural neighborhoods'', ''Listening to jazz and R&B'', ''Calligraphy'', ''Knitting'']'
  career_goals: Taga aspires to advance from a senior administrative assistant to an Office Manager or Executive Assistant role within a nonprofit arts or community‑development organization in Los Angeles.
    She aims to lead a small administrative team, implement efficient workflows, and foster an inclusive, harmonious workplace culture. To support this progression, she plans to earn the Certified Administrative
    Professional (CAP) credential and pursue a Master’s degree in Organizational Leadership or Public Administration. Taga also seeks to deepen her project management skills, eventually overseeing community
    outreach programs that align with her commitment to social equity. Balancing ambition with her sensitivity to stress, she prioritizes work‑life balance and intends to incorporate mindfulness practices
    into her leadership style.
