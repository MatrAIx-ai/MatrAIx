  hobbies: '[''Reading adventure chapter books'', ''Building LEGO models'', ''Drawing comic art'', ''Playing Minecraft (creative mode)'', ''Taekwondo martial arts'', ''Cooking Vietnamese dishes with family'',
    ''Nature walks and leaf collecting'', ''Journaling for emotional self‑regulation'']'
  career_goals: Dieu dreams of growing up to become a civil engineer who designs safe, predictable structures like bridges and community centers, inspired by his love of building stable LEGO creations.
    He also imagines teaching younger children because he enjoys helping others and maintaining orderly environments. He hopes his future work will contribute to harmonious, well‑organized spaces where
    families feel secure, and he aspires to be known for reliability, kindness, and a calm, methodical approach.
