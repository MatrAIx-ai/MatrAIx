personas:
  professional: Dieu Pham, an 8‑year‑old budding builder, treats every LEGO set like a miniature construction project, channeling methodical planning and disciplined focus from Taekwondo into imaginative
    engineering designs.
  sports: Dieu Pham, a dedicated Taekwondo practitioner twice a week, also cheers for the local youth soccer club, the River Runners, and follows the Los Angeles Lakers, occasionally joining weekend bike
    rides in the neighborhood park to keep active.
  arts: Dieu Pham, an avid comic‑strip creator, draws inspiration from classic adventure novels by Rick Riordan, the whimsical animations of Hayao Miyazaki, and the upbeat tunes of Imagine Dragons, often
    sketching new panels while humming their favorite songs.
  travel: Dieu Pham, who loves nature walks, has explored the nearby state park’s waterfall and dreams of visiting the snow‑capped peaks of the Canadian Rockies and the bustling streets of Tokyo’s Shibuya
    district, planning each trip with a hand‑drawn itinerary that balances adventurous hikes and safe, family‑friendly attractions.
  culinary: Dieu Pham, a confident junior cook, enjoys assembling fresh spring rolls with rice paper, vermicelli, and mint leaves, mastering the balance of sweet chili sauce and crunchy carrots, and also
    delights in baking chocolate chip cookies that fill the house with a comforting aroma.
  core: Dieu Pham, an organized 8‑year‑old with a flair for detailed creation, navigates life through structured play, careful budgeting, and a calming journal habit, all while battling bursts of anxiety
    that spur both meticulous planning and occasional meltdowns.
background:
  cultural: Dieu is a Vietnamese‑American raised in Murfreesboro, Tennessee. He speaks both English and Vietnamese at home, allowing him to converse with his parents and grandparents in their native language.
    The family celebrates traditional holidays such as Tết (Lunar New Year) with special meals, red envelopes, and lanterns, while also participating in local Southern customs like Thanksgiving and community
    festivals. Vietnamese cultural values of family cohesion, respect for elders, and harmony influence his polite demeanor and cooperative nature. At school, he enjoys sharing stories about his heritage,
    and he attends a weekend Vietnamese language class where he learns calligraphy and traditional folk songs, reinforcing his cultural identity within a diverse American setting.
attributes:
  skills: '[''Fluent reading (grade‑2 level)'', ''Basic addition and subtraction'', ''Organized personal space management'', ''LEGO construction and spatial reasoning'', ''Introductory coding with Scratch'',
