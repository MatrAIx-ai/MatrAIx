persona_description: A scientist who specializes in astrobiology and has made significant contributions to the field of extraterrestrial life. Dr. Xi Chang is a graduate of MIT and has been actively involved
  in the study of alien civilizations through the National Radio Astronomy Observatory. His expertise lies in the study of the genetic code and the conversion of genetic information into usable proteins.
  Dr. Xi Chang's discovery of the first verified transmission from an alien civilization has sparked a global interest and is likely to have far-reaching implications for the field of astrobiology.
