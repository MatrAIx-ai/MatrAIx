  hobbies: '[''Salsa dancing'', ''Playing and watching baseball'', ''Cooking traditional Puerto Rican dishes'', ''Gardening'', ''Walking in local parks'', ''Participating in community festivals'', ''Volunteering
    at church health fairs'', ''Listening to bomba and plena music'', ''Fishing with friends'']'
  career_goals: Miguel aims to transition into a supervisory or laboratory manager role within the next five years, leveraging his extensive hands‑on experience to shape workflow improvements and staff
    development. He plans to earn a bachelor’s degree in health sciences and obtain ASCP certification to solidify his professional credentials. His ambitions include leading a quality‑improvement project
    that integrates automation for high‑throughput testing, expanding the lab’s molecular diagnostics capabilities, and establishing a mentorship program for new technologists. Additionally, he hopes to
    collaborate on community health outreach initiatives that provide free screening services in the Cataño–Bayamón area.
