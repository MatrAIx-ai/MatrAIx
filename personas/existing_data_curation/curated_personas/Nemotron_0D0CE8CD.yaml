personas:
  professional: Miguel Caceres, a 53‑year‑old clinical laboratory technologist with three decades of expertise in clinical chemistry, hematology, microbiology, immunoassays, and molecular diagnostics, combines
    meticulous organization, methodical problem‑solving and a sociable, mentor‑oriented style to lead shift briefings, ensure CLIA‑compliant quality control, and drive workflow automation projects as they
    prepare for a supervisory role.
  sports: Miguel Caceres stays active by playing catcher for a local seniors baseball league, attends weekend games of the Cangrejeros de Santurce baseball team and the Vaqueros de Bayamón basketball team,
    and keeps fit with regular walks in the Bayamón park and occasional fishing trips with their buddies.
  arts: Miguel Caceres immerses themselves in the rhythms of salsa and plena, regularly dancing to tracks by Willie Colón, Celia Cruz, and Rubén Blades, and they enjoy live performances by local bomba ensembles
    and occasional theater productions featuring actors like Benicio del Toro.
  travel: Miguel Caceres prefers well‑planned, family‑oriented vacations, having explored the historic streets of Old San Juan, the beaches of Culebra and Vieques, and a memorable road trip to Key West,
    while they dream of a cultural pilgrimage to Cartagena, Colombia, and a leisurely cruise through the Caribbean islands.
  culinary: Miguel Caceres, an enthusiastic home chef, expertly prepares traditional dishes such as arroz con gandules, lechón marinado with adobo and annatto, and mofongo with garlic‑infused sofrito, favoring
    fresh plantains, cilantro, and a splash of local rum to finish their weekend feasts.
  core: Miguel Caceres, a 53‑year‑old laboratory veteran who blends routine‑driven precision with a lively love of salsa nights, never misses a weekend cooking session, yet they habitually forget to water
    their garden until the last minute.
background:
  cultural: Miguel was born and raised in Puerto Rico, deeply rooted in the island’s Caribbean culture. He grew up in a bilingual household where Spanish is the primary language and English is spoken at
    school and work, giving him fluency in both. Family ties and Catholic traditions are central to his identity, and he participates in local celebrations such as San Juan Bautista and the Fiestas de la
    Calle San José. The rich musical heritage—particularly salsa, bomba, and plena—shapes his social life, while the island’s cuisine influences his cooking passion. Living in the Cataño–Bayamón region,
    he enjoys the close‑knit community atmosphere, values mutual support, and frequently engages in neighborhood gatherings and volunteer efforts that reflect the collective spirit of Puerto Rican society.
attributes:
