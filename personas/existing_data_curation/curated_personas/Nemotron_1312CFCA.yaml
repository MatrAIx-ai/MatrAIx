  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Surfing'', ''Paddleboarding'', ''Hiking volcanic trails'', ''Yoga'', ''Beach clean‑ups'', ''Hula workshops'', ''Lei making'', ''Attending
