  career_goals: Anissa aims to advance into a senior technical leadership role, such as Lead Engineering Technologist or Technical Project Manager, where she can champion sustainable engineering solutions
    for Hawaii’s marine and renewable‑energy infrastructure. She plans to obtain a Certified Engineering Technologist (CET) credential and consider a master’s degree in Engineering Management to broaden
    her strategic impact. Mentoring emerging engineers and fostering interdisciplinary collaboration between engineering and the arts are core to her ambition, and she envisions eventually launching a consultancy
    that blends technical innovation with culturally‑responsive design.
