personas:
  professional: Anissa Bethune is a seasoned mechanical and electrical engineering technologist who leverages CAD, CNC programming, and lean manufacturing expertise to lead cross‑functional projects, while
    her meticulous organization and talkative, collaborative style turn complex technical challenges into accessible, aesthetically‑informed solutions.
  sports: Anissa Bethune is an avid surfer at Ala Moana Bowls, paddleboarder on Kailua Bay, and frequent hiker of the Diamond Head volcanic trail, a member of the Aloha Surf Club, regular yogi at Honolulu
    Yoga Collective, and a dedicated fan of the University of Hawaii Rainbow Warriors football and the Golden State Warriors NBA team.
  arts: Anissa Bethune paints watercolor seascapes of the island coast, creates digital illustrations, curates her own mini‑exhibitions at the Honolulu Museum of Art, draws inspiration from Jack Johnson’s
    acoustic melodies, Israel Kamakawiwo'ole’s ukulele ballads, and the dynamic performances of the hula troupe Kukui, while actively participating in local art festivals such as Makai Art Festival.
  travel: Anissa Bethune prefers meticulously planned eco‑focused getaways, regularly exploring Maui’s Hana Highway, the volcanic landscapes of the Big Island, and the tranquil beaches of Kauai, while also
    seeking international immersion in Okinawa’s coral reefs, New Zealand’s South Island fjords, and the Galápagos Islands, balancing wanderlust with budget-conscious travel insurance and a love for spontaneous
    surf‑spot scouting.
  culinary: Anissa Bethune enjoys cooking fusion dishes like kalua pork tacos, miso‑glazed mahi‑mahi, and taro‑infused ramen, favors ingredients such as limu seaweed, passion fruit, and coconut milk, possesses
    a competent home‑cooking skill set that shines in weekend brunches, yet occasionally burns the toast when multitasking between art projects.
  core: Anissa Bethune blends engineering precision with island artistry, surf‑driven vitality, and community‑focused leadership, all driven by an organized, talkative curiosity that sometimes leads to
    impulsive art buys and occasional dental neglect.
background:
  cultural: Anissa is a White American who grew up on the mainland United States before relocating to Honolulu in her early thirties. Over the past two decades she has embraced the multicultural fabric
    of Hawaii, adopting the aloha spirit in her daily interactions and participating in local traditions such as lei greetings, hula, and community service. While she maintains ties to her European heritage
    through family celebrations, her worldview is shaped by a blend of mainland upbringing and deep appreciation for Hawaiian culture, fostering an inclusive and respectful perspective toward the island’s
    diverse communities.
