  hobbies: '[''Zydeco dancing'', ''Cooking and recipe experimentation'', ''Attending local festivals and Mardi Gras'', ''Karaoke nights'', ''Softball league participation'', ''Fishing in bayous'', ''Exploring
    wetlands and nature trails'', ''Community volunteering at food banks'', ''Listening to classic rock and country music'', ''Reading romance novels'']'
  career_goals: Olivia aims to move beyond managing a single restaurant and become a regional manager for a multi‑unit food service chain, giving her broader responsibility for operations and staff development.
    She plans to enroll in an associate’s program in Hospitality Management and later pursue a bachelor’s degree to strengthen her strategic and financial expertise. Long‑term, she dreams of opening a family‑owned
    Cajun eatery that showcases her love for local cuisine while providing a supportive workplace culture. Olivia also hopes to become a certified food safety trainer, allowing her to mentor other managers
    and raise industry standards in her community.
