persona_description: A researcher and scientist who specializes in the study of protein structures in solution, particularly in the field of crystalline proteins. They are skilled in using RDC and SAXS
  methodologies to determine the global shape and architecture of multicomponent proteins and protein complexes. They have experience with simulated data for proteins like HIV-1 protease and have evaluated
  and determined the structures of two-domain proteins like L11 and gammaD-Crystallin. They have also evaluated complexes with weakly associating proteins and tightly bound proteins, and have determined
  structures for these proteins using this method. They are skilled in using experimental data to back-calculate the structures and have demonstrated the use of this methodology in determining the structures
  of these proteins.
