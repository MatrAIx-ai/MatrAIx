  hobbies: '[''Herb gardening'', ''Traditional cooking'', ''Reading historical novels'', ''Knitting'', ''Walking along the River Walk'', ''Attending cultural festivals'', ''Volunteering for community heritage
    events'', ''Participating in a weekly knitting circle'']'
  career_goals: Although retired from full‑time work, Adriana aims to stay actively involved in education by volunteering as a tutor at a local senior center and offering occasional guest lectures at the
    community college on bilingual teaching methods. She wishes to compile her life stories and family migration history into a memoir that preserves her heritage for future generations. Adriana also plans
    to master video‑chat technology to maintain regular virtual visits with her grandchildren, and she hopes to lead a monthly workshop on traditional Tex‑Mex cuisine for neighborhood families, blending
    her structured teaching style with spontaneous culinary creativity.
