personas:
  professional: Adriana Vilca, a retired bilingual educator with a graduate degree in education, blends meticulous lesson planning with spontaneous improvisation, using her decades‑long classroom management
    expertise to mentor younger teachers and organize culturally rich community workshops.
  sports: Adriana Vilca, a devoted fan of the San Antonio Spurs and San Antonio FC, participates in a senior walking group along the River Walk three times weekly, joins a low‑impact yoga class at the local
    community center, and enjoys cheering on the Texas Rangers during baseball season.
  arts: Adriana Vilca, an avid reader of historical novels by Ken Follett and memoirs by Isabel Allende, also attends local performances of traditional mariachi bands and enjoys the paintings of Frida Kahlo,
    while she contributes hand‑knit pieces to the weekly craft circle.
  travel: Adriana Vilca, who prefers leisurely travel with careful itinerary planning, has revisited New Mexico’s historic pueblos, dreams of a guided pilgrimage to the Cathedral of Sevilla in Spain, and
    selects nearby river cruises over long flights due to mobility considerations.
  culinary: Adriana Vilca, an experienced home cook, delights in creating cilantro‑lime grilled chicken, fresh salsa with garden‑grown jalapeños, and slow‑cooked pozole, skillfully balancing a structured
    recipe framework with spontaneous flavor tweaks.
  core: Adriana Vilca, a structured yet whimsically creative 92‑year‑old, balances disciplined lesson plans and budgeting with impromptu herb‑garden experiments, occasional forgetfulness about appointments,
    and a steadfast love for community storytelling.
background:
  cultural: Adriana is a Mexican‑American who grew up in a bilingual household in San Antonio, a city steeped in Tejano culture. Her upbringing emphasized familismo, respect for elders, and a strong Catholic
    faith, which continues to shape her daily rituals and community involvement. She celebrates Día de los Muertos, Christmas posadas, and local festivals that honor both Mexican traditions and Texas history.
    This cultural tapestry influences her love for storytelling, her dedication to preserving Spanish language skills, and her commitment to pass on cultural knowledge to younger generations.
attributes:
  skills: '[''Bilingual classroom instruction (Spanish/English)'', ''Curriculum development'', ''Classroom management'', ''Student mentorship'', ''Community outreach'', ''Public speaking'', ''Cultural storytelling'',
