  career_goals: Although retired from formal employment, Cong Chun aims to remain intellectually engaged and to give back to his community. He hopes to mentor high-school and middle-school students in STEM
    subjects, especially those from underrepresented backgrounds, by offering workshops on basic programming and hands-on engineering projects. He also plans to develop a personal blog that explores the
    intersection of science, technology, and visual art, sharing his photography and reflections on artistic concepts. Additionally, he aspires to curate a small exhibition of contemporary Asian-American
    artists at the Watsonville Community Center, leveraging his organizational skills to bring together artists, local sponsors, and volunteers. Managing his health and stress, he seeks to maintain a balanced
    routine that includes regular tai chi practice and gardening.
