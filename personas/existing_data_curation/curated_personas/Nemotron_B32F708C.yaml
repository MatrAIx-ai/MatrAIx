    library'', ''Walking clubs'', ''Participating in community festivals'']'
  career_goals: Although retired from formal employment, Ana aims to deepen her contribution to the Swayzee community. She hopes to become the lead volunteer coordinator for the local senior center, mentoring
    younger volunteers and expanding outreach programs such as intergenerational story‑telling workshops. She also dreams of documenting her family's genealogy and local history in a memoir to preserve
    the town’s heritage. Learning a new language—Spanish—so she can assist immigrant families in the area is another modest ambition. Lastly, she wishes to maintain her health through weekly gardening,
    walking clubs, and occasional dance classes, ensuring she remains active and socially engaged.
