  career_goals: Although retired, Martin aims to remain an active contributor to his community. He plans to launch a volunteer mentorship program that pairs seniors with high‑school students interested
    in trades and environmental projects, and to serve on the board of a local non‑profit focused on watershed restoration. He also hopes to travel to several national parks in the western United States,
    document his experiences in a series of reflective essays, and eventually compile his life stories into a memoir that highlights the evolution of Olympia over the past decades.
