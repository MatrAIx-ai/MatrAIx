  hobbies: '[''Sketching'', ''Watercolor painting'', ''Scale model building'', ''Woodworking'', ''Listening to Mexican folk music'', ''Cooking Mexican dishes'', ''Gardening'', ''Volunteering at food bank'',
    ''Organizing community art events'']'
  career_goals: Nestor aims to advance from assembler to lead fabricator or shop supervisor within the next five years, obtaining a welding certification and a CNC programming credential to broaden his
    technical repertoire. He hopes to combine his technical skills with his artistic interests by creating a small community maker space where he can teach basic fabrication and craft projects to teenagers
    and adults. Ultimately, he wants to secure a stable, higher‑paying position that allows him to support his family while giving back to his town through mentorship and collaborative projects.
