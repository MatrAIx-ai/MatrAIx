persona_description: A critical scholar who is interested in the representation of gender in Shakespeare's plays, particularly focusing on the representation of heroism through competing representations
  of gender. This individual is knowledgeable about Shakespearean tragedy, history, and sovereignty, and has a deep interest in the intersection of literature and gender studies. They are also familiar
  with feminist criticism and the works of notable scholars such as Madelon Sprengnether, and are looking for a deeper understanding of Shakespeare's portrayal of heroism through gender.
