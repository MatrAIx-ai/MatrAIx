personas:
  professional: David Brown, a retired mechanical engineer, now channels his systematic problem‑solving and Lean expertise into community woodworking workshops and senior‑center event coordination, blending
    precision drafting with a collaborative, methodical approach.
  sports: David Brown enjoys regular hikes on nearby trails and participates in the Casco Bay Senior Walking Club, follows the Portland Sea Dogs during baseball season, roots for the New England Patriots
    in fall football, and occasionally joins a weekend cross‑country skiing group in winter, valuing low‑impact activity that keeps them fit.
  arts: David Brown is a lively member of the local community theater, performing in productions such as Arthur Miller’s 'The Crucible' and handling set design backstage, while also attending concerts by
    the Portland Symphony Orchestra and listening to folk legends like Joan Baez, which together satisfy their love of storytelling and performance.
  travel: David Brown prefers meticulously planned road trips to historic maritime destinations, having explored Boston’s Freedom Trail, the Mystic Seaport Museum, and the coastal town of Newport, while
    dreaming of a summer cruise to the Scottish Isles and a winter visit to the Canadian Maritimes, always budgeting each journey with a detailed itinerary and a modest travel fund.
  culinary: David Brown, an adept home cook, delights in preparing New England clam chowder with fresh clams, potatoes, thyme, and a splash of cream, crafting roasted cod with lemon‑butter glaze, and harvesting
    garden tomatoes for a summer gazpacho, while occasionally treating themselves to a lobster roll at the local dockside shack.
  core: David Brown blends an engineer’s precision with a community‑driven spirit, turning retirement into a canvas of woodworking, theatre, mentorship, and active living, all guided by a methodical yet
    sociable outlook.
background:
  cultural: David grew up in a multi‑generational family of Irish‑English descent in coastal Maine. Raised in a small town where fishing, lobsters, and a strong work ethic shaped daily life, he carries
    the New England values of self‑reliance, community involvement, and respect for the natural environment. He is an active member of his local Methodist congregation, participates in town meetings, and
    celebrates traditional holidays with extended family gatherings centered around fresh seafood and seasonal produce.
attributes:
  skills: '[''Mechanical design'', ''Project management'', ''SolidWorks CAD'', ''Lean manufacturing'', ''Process optimization'', ''Technical writing'', ''Team leadership'', ''Mentoring and training'', ''Community
