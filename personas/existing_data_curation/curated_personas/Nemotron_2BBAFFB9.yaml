  hobbies: '[''Fishing'', ''Model ship building'', ''Woodworking'', ''Community theater'', ''Volunteer STEM mentoring'', ''Walking and hiking'', ''Gardening'', ''Reading historical nonfiction'']'
  career_goals: Although retired from formal employment, David aims to continue sharing his expertise by serving as a volunteer mentor for high‑school STEM clubs in Gray and neighboring towns. He hopes
    to author a practical guide on home‑based woodworking projects that combine engineering principles with craft. He also plans to contribute to the local historical society by documenting the town’s industrial
    heritage, and he aspires to stay physically active through regular walking groups and occasional fishing trips with friends and family.
