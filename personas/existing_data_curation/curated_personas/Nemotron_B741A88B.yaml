  career_goals: Phillips frequently talks about becoming a firefighter because he likes helping people and appreciates the clear structure of a fire station. He also dreams of being an astronaut, fascinated
    by rockets and the precise procedures of space missions. He expresses an interest in teaching, wanting to share knowledge and guide classmates, and his disciplined nature drives him to aim for excellence
    in whatever role he chooses. Occasionally he mentions building things, hinting at a future as an engineer or architect, where his love of organization and high standards could thrive.
