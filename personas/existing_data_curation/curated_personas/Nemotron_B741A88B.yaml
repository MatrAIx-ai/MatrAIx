personas:
  professional: Phillips Mitchum, an aspiring LEGO architect, combines meticulous step‑by‑step building with a love for order, turning each set into a miniature project that mirrors their disciplined, structured
    mindset.
  sports: Phillips Mitchum, a diligent member of the Flower Mound Soccer Club, attends thrice‑weekly soccer practices, enjoys Saturday swim lessons at the community pool, and cheerfully roots for the Dallas
    Cowboys and the Texas Rangers, always lining up sneakers and a water bottle before heading out.
  arts: Phillips Mitchum, a passionate LEGO builder and colored‑pencil pattern artist, reads picture books by Dr. Seuss and National Geographic Kids, watches Pixar films like Toy Story, and can recite songs
    by The Wiggles, using the same organized flair to arrange art supplies by hue.
  travel: Phillips Mitchum, an eager backyard explorer who recently visited the San Antonio River Walk with family and dreams of a future trip to Disney World in Florida, prefers trips with clear itineraries
    and plenty of scheduled playtime, often drawing a map of each destination in a notebook before departure.
  culinary: Phillips Mitchum, a junior kitchen helper who loves mixing pancake batter, prefers fluffy buttermilk pancakes topped with blueberries, enjoys spaghetti with meatballs and cheesy mac and cheese,
    and proudly identifies cinnamon as his favorite spice in the pantry.
  core: Phillips Mitchum is a meticulous six‑year‑old who lines up toys by color, thrives on routine, and can’t resist a perfectly snapped LEGO piece, but sometimes gets frustrated when a puzzle piece feels
    stubborn.
background:
  cultural: Phillips is a white American child raised in a middle-class suburban family in Flower Mound, Texas. His ancestry includes English and German roots, reflected in family stories and occasional
    traditions such as Easter egg hunts and German-style holiday meals. He grows up in a community that celebrates major U.S. holidays—Thanksgiving, Independence Day, and Christmas—often with backyard barbecues,
    fireworks, and neighborhood gatherings. The family attends a local Methodist church where he participates in children's Sunday school, reinforcing values of kindness and cooperation. Pet ownership,
    especially a family dog, and frequent visits to local parks also shape his cultural experiences.
