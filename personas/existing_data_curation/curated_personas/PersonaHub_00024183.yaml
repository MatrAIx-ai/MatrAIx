persona_description: A researcher and scientist who specializes in the study of Earth's ionosphere and its changes due to anthropogenic emissions. They are interested in detecting signs of global change
  in the ionospheric data and have experience in using long-term trends in critical frequencies and the height of the F2-peak to analyze the changes. They are likely to be familiar with the Sodankyla, Finland
  data set used in the study and have experience in using statistical models to analyze the data.
