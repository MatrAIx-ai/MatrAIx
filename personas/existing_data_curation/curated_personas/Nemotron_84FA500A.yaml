  hobbies: '["Hiking", "Biking", "Photography", "Sketching", "Visiting art galleries", "Attending indie music concerts", "Film festivals", "Reading travel memoirs", "Cooking experimental dishes", "Exploring
    coffee shops"]'
  career_goals: Shawn aims to progress to a senior travel consultant position, eventually leading a ticketing team or managing a regional travel office. He plans to earn professional certifications such
    as the Certified Travel Associate (CTA) and may pursue a short‑term hospitality management program to broaden his managerial skills. Long‑term, Shawn dreams of launching his own boutique travel agency
    that curates culturally immersive tours, blending his love for art, music, and unique experiences. He also hopes to collaborate with museums or cultural institutions to develop travel‑focused programming
    that highlights regional artists and heritage.
