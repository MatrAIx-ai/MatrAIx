personas:
  professional: Shawn Hurst, a 28‑year‑old reservation and ticketing specialist, channels their curiosity for art and love of flexible collaboration into expertly navigating Amadeus and Sabre systems, turning
    busy booking windows into opportunities to suggest culturally rich itineraries while they keep a calm, people‑centered demeanor.
  sports: Shawn Hurst fuels their fitness routine by biking the Willamette River trail with the Portland Bicycling League, tackling weekend hikes in the Columbia River Gorge, and cheering on the Portland
    Timbers and Trail Blazers, all while they occasionally join a neighborhood rock‑climbing meet‑up at a community gym.
  arts: Shawn Hurst spends evenings sketching street‑art murals inspired by Banksy and local Portland graffiti crews, soaking in contemporary exhibits featuring Yayoi Kusama at the Portland Art Museum,
    and catching indie concerts by The Decemberists and Mt. Joy, while they often attend poetry readings that feature the lyrical style of Rupi Kaur.
  travel: Shawn Hurst dreams of curating immersive tours that whisk travelers from Oregon’s misty coast to the fjords of Iceland and the tea houses of Kyoto, preferring loosely planned itineraries peppered
    with spontaneous detours, and they currently have a shortlist of spots like Oaxaca, Sedona, and the Scottish Highlands after already conquering Seattle, Vancouver, and San Francisco.
  culinary: Shawn Hurst experiments in the kitchen with hazelnut‑crusted salmon, kimchi ramen with locally foraged mushrooms, and sourdough‑based flatbreads, all while savoring single‑origin beans from
    Stumptown and Coava, and they occasionally indulge in late‑night food‑truck tacos that upset their otherwise experimental cooking schedule.
  core: Shawn Hurst is a wander‑loving, art‑obsessed travel pro whose relaxed, community‑first nature fuels a slightly chaotic but passionately curated approach to life, from biking river trails to concocting
    experimental dishes, and they often rely on spontaneous inspiration over rigid plans.
background:
  cultural: Shawn grew up in the Pacific Northwest, shaped by Oregon’s mix of rugged natural scenery and a vibrant, progressive arts community. His family’s roots trace back to mid‑western settlers who
    moved west for timber and farming opportunities, fostering a modest, community‑oriented upbringing. The region’s emphasis on environmental stewardship, independent thinking, and a DIY cultural ethos
    has nurtured his open‑minded appreciation for diverse artistic expressions and his flexible, collaborative approach to both work and personal life.
attributes:
  skills: '["Customer service", "Ticketing system operation (Amadeus, Sabre)", "Travel logistics planning", "Fare calculation", "Conflict resolution", "Multitasking", "Microsoft Office", "Google Workspace",
