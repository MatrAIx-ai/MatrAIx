personas:
  professional: Mohamed Back is a first‑line retail supervisor who blends data‑driven decision‑making with hands‑on visual merchandising, and they apply a calm, curious, and organized approach to lead a
    team of floor associates, resolve customer complaints, and deliver concise sales reports that impress upper management.
  sports: Mohamed Back spends summer mornings paddle‑boarding with the Pompano Beach Paddle Board Club, jogs along the shoreline three times a week, lifts at the local gym’s CrossFit box during cooler months,
    and they root for the Miami Heat and Tampa Bay Buccaneers while occasionally joining a weekend beach‑volleyball league.
  arts: Mohamed Back captures golden‑hour sunsets with a DSLR, admires the vibrant rhythms of reggae legend Bob Marley and contemporary Caribbean fusion duo Major Lazer, and they attend monthly art walks
    featuring local muralists, letting these visual and musical inspirations influence their own photography style.
  travel: Mohamed Back prefers short, budget‑friendly getaways that balance adventure and relaxation, having explored the historic streets of Old San Juan, snorkeled around the Bahamas, and they dream of
    a road‑trip to the coastal towns of the Germanic Alps, while using a travel‑planning app to snag off‑peak flight deals.
  culinary: Mohamed Back enjoys grilling Caribbean‑inspired dishes, perfecting a smoky jerk chicken marinated with scotch bonnet peppers, thyme, and allspice, while they also whip up fresh ceviche with
    lime and cilantro, showcasing an intermediate cooking skill set and love for bold, tangy flavors.
  core: Mohamed Back is a calm, curiosity‑driven retail leader who balances disciplined work habits with a love for beachside adventure, grilling experiments, and sunset photography, all while they quietly
    manage finances and health with steady routines.
background:
  cultural: Mohamed grew up as a White American in Pompano Beach, Florida, with a mixed German‑Irish heritage. His upbringing combined traditional Midwestern work values with the multicultural, beach‑oriented
    lifestyle of South Florida. He celebrates typical American holidays while also partaking in local festivities that highlight Caribbean music and seafood cuisine. This blend of cultural influences has
    shaped his relaxed yet diligent demeanor, his appreciation for diverse perspectives, and his adaptive approach to both personal and professional life.
attributes:
  skills: '[''team leadership'', ''customer service management'', ''inventory control'', ''visual merchandising'', ''sales analytics'', ''conflict resolution'', ''staff scheduling'', ''POS system proficiency
