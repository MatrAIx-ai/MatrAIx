  hobbies: '[''paddle‑boarding'', ''jogging'', ''video gaming (strategy/simulation)'', ''grilling and culinary experimentation'', ''sunset photography'', ''gym workouts'', ''volunteering at food banks'',
    ''road‑trip travel'']'
  career_goals: Mohamed aims to advance from his current supervisory role to a store manager position within the next two years, and eventually to a district manager overseeing multiple locations in South
    Florida. He plans to complete an associate's degree in business administration to strengthen his strategic planning skills. Long‑term, he is interested in opening his own boutique retail concept that
    blends online and in‑store experiences, emphasizing customer engagement and sustainable practices. He also aspires to mentor younger retail professionals, fostering a collaborative and resilient workplace
    culture.
