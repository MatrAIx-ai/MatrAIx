  career_goals: James dreams of exploring the stars as an astronaut or studying animals as a wildlife biologist. He also imagines designing his own robots and building innovative inventions. With his blend
    of curiosity and practicality, he hopes to create things that help people and the environment, and he likes the idea of becoming a firefighter one day to protect his community.
