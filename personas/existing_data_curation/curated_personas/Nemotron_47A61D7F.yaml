  career_goals: Rodney dreams of turning his love for art and storytelling into a career as a children's book illustrator or a video‑game designer, where he can create immersive worlds that others can explore
    alone. He is fascinated by space and hopes one day to become an astronomer or a science communicator, perhaps presenting his discoveries through illustrated media. He aims to win his school’s science
    fair by building a model of the solar system, which would give him a stepping stone toward a future in STEM. His competitive streak pushes him to be the best in local art contests and coding challenges,
    while his preference for solitary work leads him to envision careers that allow independent creation, such as freelance illustration, animation, or independent game development.
