personas:
  professional: Rodney Miller is a budding junior coder and aspiring architect who channels an intense curiosity, an affinity for solitude, and a competitive streak into crafting detailed LEGO cityscapes,
    sketching park scenes, and animating interactive Scratch stories.
  sports: Rodney Miller is a quiet enthusiast of the New York Knicks basketball team and the New York Rangers hockey club, preferring to watch games alone at home while channeling their competitive energy
    into weekly lap swimming lessons at the West Side Community Center, where they focus on personal bests rather than team drills.
  arts: Rodney Miller immerses themselves in visual arts by sketching city park scenes inspired by the brushstrokes of Claude Monet and the perspective studies of Leonardo da Vinci, while frequent visits
    to the Metropolitan Museum of Art spark a fascination with Vincent van Gogh’s starry skies and Ai Weiwei’s modern sculptures, and they channel that fascination into solitary drawing sessions and intricate
    LEGO design.
  travel: Rodney Miller dreams of strolling through the cobblestone streets of Paris and experiencing the neon lights of Tokyo, yet their real travel consists of weekend trips to Central Park, ferry rides
    to the Statue of Liberty, and stone‑collecting outings along the Hudson River, and they meticulously plan each outing with hand‑drawn maps and a strict itinerary.
  culinary: Rodney Miller favors simple comfort foods like pepperoni pizza, mac and cheese, and strawberry‑banana smoothies, they enjoy helping slice fresh strawberries for the smoothies and sprinkling
    chocolate chips on pizza, but often sneak extra chips despite a parental reminder to limit sugary treats.
  core: Rodney Miller is an eight‑year‑old solo explorer whose fierce curiosity, quiet competitiveness, and vivid imagination drive LEGO engineering, sketch‑filled journaling, and disciplined savings, while
    they find relief from anxiety through art and routine.
background:
  cultural: Rodney grows up in a middle‑class family of European descent in New York City. His parents, both professionals, value education and expose him to the city’s rich cultural resources. Family traditions
    include celebrating Thanksgiving, Christmas, and the Fourth of July, while also incorporating multicultural experiences from their diverse neighborhood—such as attending the annual Chinatown Lunar New
    Year parade and sampling foods from various ethnic eateries. He regularly visits the Museum of Modern Art, the American Museum of Natural History, and the New York Public Library, fostering his appreciation
    for art and science. Although his ethnic background is primarily white American, his daily environment is a mosaic of cultures, which subtly shapes his worldview and encourages an open, inquisitive
    outlook.
