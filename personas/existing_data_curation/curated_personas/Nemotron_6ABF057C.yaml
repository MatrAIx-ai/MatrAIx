personas:
  professional: Jason Kertesz, a veteran management analyst with 35 years of experience, leverages advanced Excel, VBA, Power BI, Tableau, and SQL to deliver data‑driven strategic insights while balancing
    a skeptical, competitive edge with practical, results‑oriented mentorship for junior analysts.
  sports: Jason Kertesz spends his weekends fishing on Lake Whitney and hunting in the woods, maintains fitness through regular hikes with the Texas Hill Country Hiking Club, and cheerfully roots for the
    Dallas Cowboys, Texas Rangers, and Houston Rockets while occasionally joining a local senior softball league.
  arts: Jason Kertesz, an avid patron of the local community theater where he often applauds productions starring regional talent like Susan Gant, immerses himself in the music of Willie Nelson and Lyle
    Lovett while occasionally dabbling in woodworking that echoes the craftsmanship of furniture maker Sam Maloof.
  travel: Jason Kertesz prefers meticulously planned road trips that balance adventure with comfort, such as spring drives through the Texas Hill Country vineyards, annual pilgrimages to Santa Fe’s art
    markets, and a long‑awaited cultural tour of Kyoto, Japan, all scheduled around his volunteer commitments and modest retirement budget.
  culinary: Jason Kertesz, a seasoned backyard pitmaster, prides himself on smoking Texas‑style brisket with a coffee‑pepper rub, crafting slow‑cooked Texas chili loaded with ancho chilies and beans, and
    grilling Gulf shrimp seasoned with Old Bay, while his garden supplies fresh herbs for his sauces.
  core: Jason Kertesz blends a disciplined, data‑driven career with a quietly competitive spirit, channeling his curiosity into both strategic advisory work and a passion for Texas‑style BBQ, fishing, and
    community service, all while habitually checking his smartwatch for health metrics and occasionally indulging in a late‑night poker game.
background:
  cultural: Jason is a second‑generation Texan of Central European (Hungarian/Polish) descent whose family has lived in Ellis County for generations. Raised in a modest, close‑knit community that values
    hard work, self‑reliance, and Southern hospitality, he grew up attending church, neighborhood gatherings, and local festivals. While he respects traditional values and family customs—such as holiday
    reunions and backyard cookouts—his lifelong curiosity has led him to embrace new ideas and continuous learning. This cultural blend of Midwestern pragmatism and Texas "bigger" ethos shapes his balanced,
    competitive yet community‑oriented outlook.
