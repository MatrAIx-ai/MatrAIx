  career_goals: In the short term, Tuananh aims to obtain a PMP certification and advance to a Six Sigma Black Belt, positioning herself for senior consulting roles that lead enterprise‑wide transformation
    projects. Over the next five years she seeks to head cross‑functional initiatives that drive operational efficiency across Southern California firms. Long‑term, she envisions launching her own boutique
    analytics consultancy focused on data‑driven process improvement for mid‑size companies, while mentoring emerging analysts. Throughout her career, she values flexible work arrangements that preserve
    her independence and allow her to maintain a small, supportive professional network.
