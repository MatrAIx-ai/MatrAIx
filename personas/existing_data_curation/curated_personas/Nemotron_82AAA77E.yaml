personas:
  professional: Lee Gibson, a 21‑year‑old public safety dispatcher in Wichita, leverages rapid information processing, meticulous log‑keeping, and calm de‑escalation skills to keep emergency communications
    running like a well‑orchestrated relay, while constantly eyeing senior‑dispatcher certification and future emergency‑management leadership.
  sports: Lee Gibson, a 21‑year‑old basketball enthusiast, plays point guard in the local Wichita Recreational League, drills strength training at Iron Works Gym, follows the Wichita State Shockers passionately,
    and proudly wears a Wichita Thunder hoodie while cheering the Kansas City Royals during the baseball season.
  arts: Lee Gibson, a 21‑year‑old concert‑goer, frequents the Beacon Theatre to catch live shows by "The Strokes", "Lizzo", and "Tame Impala", curates indie‑rock playlists for game nights, and occasionally
    visits the Wichita Art Museum to see works by contemporary American painters such as Kerry James Marshall.
  travel: Lee Gibson, a 21‑year‑old who prefers meticulously planned trips, has road‑tripped to Denver and Austin using a printed itinerary, dreams of hiking the Fiordland National Park in New Zealand,
    and budgets annual travel by saving a portion of each paycheck in a dedicated travel fund.
  culinary: Lee Gibson, a 21‑year‑old who values protein‑rich meals, whips up weekly batch‑cooked quinoa bowls with grilled chicken, black beans, and avocado, indulges in Kansas‑style barbecue ribs on weekends,
    and can flawlessly prepare a spicy chicken fried steak with jalapeño cornbread.
  core: Lee Gibson, a 21‑year‑old dispatch prodigy, blends relentless organization with a love for team sports and live music, while secretly hoarding limited‑edition game skins and forgetting to floss
    after late‑night gaming marathons.
background:
  cultural: Lee was raised in a Midwestern, middle‑class white family in Wichita, Kansas. His upbringing emphasized hard work, self‑reliance, and community involvement, reflecting the cultural values of
    the Great Plains. He grew up attending local public schools and participating in church youth groups, which reinforced a sense of responsibility and cooperation. The region's strong ties to agriculture
    and manufacturing, combined with a close‑knit neighborhood culture, have shaped his practical outlook, preference for order, and dedication to serving his community.
attributes:
  skills: '[''Emergency call handling'', ''Computer-Aided Dispatch (CAD) operation'', ''Geographic Information System (GIS) mapping'', ''Radio communication'', ''Crisis de‑escalation'', ''Multitasking under
