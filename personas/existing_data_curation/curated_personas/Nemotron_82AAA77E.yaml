  hobbies: '[''Recreational basketball'', ''Community event volunteering'', ''Supporting Wichita State Shockers'', ''Live music attendance'', ''Strength training and cardio workouts'', ''Strategic multiplayer
    video gaming'']'
  career_goals: Lee aims to advance within the public safety communications field, seeking promotion to senior dispatcher or shift supervisor within the next three years. He plans to obtain certifications
    such as the National Emergency Number Association (NENA) Certified Dispatcher and Emergency Communications Specialist. Long‑term, he aspires to transition into emergency management, possibly taking
    on a role coordinating disaster response for Sedgwick County, while also pursuing an associate degree in Public Safety or Criminal Justice.
