  career_goals: Francisco aspires to become a senior full‑stack engineer within five years, focusing on building platforms that enrich cultural heritage and arts education. He aims to lead interdisciplinary
    teams that integrate AI‑driven creativity tools, contribute to open‑source generative‑art libraries, and champion accessibility and inclusive design. In the longer term, he envisions transitioning into
    a product leadership role—such as a tech lead or product manager—where he can shape the strategic direction of tech products that fuse artistic expression with cutting‑edge software. He also plans to
    pursue a master’s degree in Human‑Computer Interaction or Digital Humanities to deepen his interdisciplinary expertise.
