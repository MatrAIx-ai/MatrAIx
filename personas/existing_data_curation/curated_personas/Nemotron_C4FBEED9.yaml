personas:
  professional: A budding game developer, Cristian Goyos channels their disciplined focus and love for solitary exploration into crafting simple Scratch games, meticulously planning each level and debugging
    with the same precision they apply to intricate LEGO builds.
  sports: A focused youth athlete, Cristian Goyos plays on the Riverside Rovers junior soccer team, enjoys solo running sessions at the local track, and keeps a steady eye on the Los Angeles Dodgers and
    the LA Lakers, balancing team involvement with a preference for quiet, disciplined training.
  arts: Cristian Goyos immerses themselves in sci‑fi storytelling inspired by the novels of Isaac Asimov and the films of James Cameron, enjoys listening to the orchestral scores of Hans Zimmer, and draws
    elaborate LEGO‑themed illustrations in the style of Studio Ghibli’s Miyazaki, reflecting a blend of technical curiosity and artistic imagination.
  travel: Cristian Goyos prefers meticulously planned weekend trips, having explored the Space Center Houston and the historic Alhambra in Spain, while dreaming of a future family adventure to the International
    Space Station via a simulated mission, balancing curiosity with structured itineraries.
  culinary: Cristian Goyos enjoys hands‑on cooking sessions with family, expertly rolling masa for tamales al rojo, mastering the blend of dried chilies, pork, and fresh cilantro, while also experimenting
    with homemade pizza using mozzarella, tomato sauce, and basil, demonstrating a developing culinary skill set balanced with playful curiosity.
  core: Cristian Goyos is a disciplined ten‑year‑old prodigy who thrives on solitary problem‑solving, meticulously organizes LEGO masterpieces, saves every penny for the next set, yet occasionally forgets
    to brush their teeth before bedtime, revealing a blend of precision and endearing oversight.
background:
