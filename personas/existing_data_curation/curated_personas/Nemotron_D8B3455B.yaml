personas:
  professional: Catherine Wassom, a 66‑year‑old community volunteer, leverages their watercolor artistry, poetic voice, empathetic listening, and knack for informal mediation to facilitate expressive art
    workshops and collaborative mural projects for seniors, despite a relaxed approach to deadlines that sometimes leads to last‑minute scrambling.
  sports: Catherine Wassom stays active by strolling the wetlands with the Troy Senior Walking Club, attending weekly Silver Sneakers classes, and cheering for the Detroit Tigers and Michigan State Spartans,
    yet they often skip the occasional senior tennis match due to their disorganized schedule.
  arts: Catherine Wassom expresses themselves through delicate watercolor landscapes inspired by Claude Monet, writes verses echoing Emily Dickinson’s introspection, knits charity scarves while listening
    to Leonard Cohen, and regularly attends local theater productions of 'Our Town' and monthly poetry readings featuring contemporary poet Sarah Kay.
  travel: Catherine Wassom prefers low‑key, small‑group getaways, often planning trips over a cup of tea in the garden, and has explored the historic streets of Charleston, the vineyards of Napa Valley,
    and the red rock vistas of Sedona, while dreaming of a future pilgrimage to the hilltop villages of Tuscany and the colonial town of Guanajuato, Mexico.
  culinary: Catherine Wassom, an enthusiastic home cook, often prepares fragrant lavender‑honey tea, rustic ratatouille with garden‑grown heirloom tomatoes, rosemary‑infused roasted chicken, and fresh basil
    pesto pasta, delighting in the vivid colors and aromas that echo their watercolor palette.
  core: Catherine Wassom blends watercolor, poetry, and garden‑grown herbs into a gentle community tapestry, yet their penchant for impulse craft purchases and bouts of anxiety‑driven overthinking add a
    lively, if slightly scattered, rhythm to each day.
background:
  cultural: Catherine grew up in the heart of the Midwest, in a white, primarily Protestant (Methodist) family with German and Irish ancestry. The values of modesty, self‑reliance, and neighborly support
    that characterize Troy, Ohio, shaped her upbringing. Family gatherings often featured home‑cooked meals and storytelling, fostering an early appreciation for history and community bonds. The local church
    and civic groups emphasized volunteerism, which reinforced her compassionate nature. Though rooted in traditional Midwestern customs, Catherine has always been drawn to artistic expression, finding
    solace in the region’s natural landscapes and seasonal festivals.
attributes:
  skills: '["Active listening & informal counseling", "Watercolor painting", "Mixed-media collage", "Creative writing (poetry & short essays)", "Community gardening", "Herbal horticulture", "Genealogy research",
