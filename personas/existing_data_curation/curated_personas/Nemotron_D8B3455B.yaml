  hobbies: '["Watercolor painting", "Poetry reading and writing", "Community gardening (flowers, herbs, vegetables)", "Knitting and crocheting", "Genealogy research", "Birdwatching", "Reading classic literature",
    "Small book‑club discussions"]'
  career_goals: Catherine hopes to channel her creative and compassionate strengths into a lasting community legacy. She aims to volunteer as a peer‑support facilitator at the local senior center, leading
    small workshops on expressive art and storytelling for older adults. She also aspires to organize a collaborative mural project that celebrates Troy’s history, and to compile a family‑history archive
    for interested residents. On a personal level, she wishes to finish a memoir that weaves together her memories, artistic reflections, and the stories of neighbors, while learning mindfulness techniques
    to better manage her anxiety.
