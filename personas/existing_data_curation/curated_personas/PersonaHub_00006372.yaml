persona_description: A project manager who is responsible for overseeing the logistics and supply chain of a biomass energy project. They are interested in minimizing costs, maximizing efficiency, and ensuring
  a consistent supply of biomass to the biopower plant. They are skilled in developing and implementing systems to optimize the collection, transportation, and storage of biomass, as well as in negotiating
  with stakeholders to ensure fair compensation for their share of costs. They are also knowledgeable in the economics and cultural practices of biomass supply and have experience in working with rail and
  pipeline transport modes.
