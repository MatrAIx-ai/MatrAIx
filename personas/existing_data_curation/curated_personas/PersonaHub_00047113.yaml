persona_description: A researcher with a passion for understanding the etiology and pathogenesis of schizophrenia, particularly in the adolescent-onset form. This individual is interested in conducting
  studies to identify specific clinical characteristics in the premorbid and prodromal phases that can predict the individuals at a high risk for developing psychosis. They are also interested in prospectively
  identifying the early beginnings of the psychotic illness with an adequate degree of reliability to be able to intervene early. This researcher is dedicated to further clarifying the clinical features
  in the first psychotic episode that can help predict subsequent illness course and to better understand the neurodevelopmental and neurodeteriorative processes that may underlie both the emergence and
  the subsequent course of the first psychotic episode. They are also interested in conducting longitudinal studies of the early-onset form of the disease to establish bridges between the phenotypic manifestations
  of schizophrenia and the neurobiologic substrate.
