personas:
  professional: Nayibe Perez combines her hands‑on construction expertise—carpentry, concrete finishing, heavy equipment operation, and blueprint interpretation—with a pragmatic curiosity that drives evidence‑based
    problem solving, making them a reliable on‑site leader who balances meticulous documentation with flexible, on‑the‑fly adjustments.
  sports: Nayibe Perez fuels her passion for the outdoors with weekly trail runs in the Rockies, belongs to the Denver Mountain Club for group hikes, and roots for the Colorado Avalanche and Denver Broncos,
    channeling their competitive nature into personal bests while maintaining a flexible training plan that fits their construction schedule.
  arts: Nayibe Perez immerses herself in the cadence of contemporary Latin artists like Rosalía and classic rock legends such as Led Zeppelin, regularly attends flamenco shows at the Denver Center for the
    Performing Arts, and supports local gallery openings, allowing them to unwind and draw creative inspiration for sustainable design projects.
  travel: Nayibe Perez favors adventure‑focused itineraries, having trekked the Grand Canyon, explored the vineyards of Napa, and dreamed of a sustainable‑architecture tour in Denmark, while balancing family
    commitments and budgeting constraints that steer them toward road trips and off‑season travel deals.
  culinary: Nayibe Perez channels her garden’s bounty into vibrant dishes—saffron‑infused seafood paella, rosemary‑seasoned roasted vegetables, and garlic‑topped tapas—showcasing modest cooking skill that
    blends Mediterranean flavors with Colorado’s local produce, though they sometimes over‑spice in pursuit of authentic taste.
  core: Nayibe Perez is a goal‑driven construction professional who merges pragmatic problem‑solving with a love for outdoor adventure, sustainable cooking, and competitive self‑improvement, all while they
    cautiously balance curiosity, skepticism, and a healthy dose of stubborn independence.
background:
  cultural: Nayibe’s Spanish roots are a subtle but meaningful part of her identity. She grew up in a bilingual household, speaking both Spanish and English, and celebrates key cultural holidays such as
    Día de los Muertos and Semana Santa with family and the broader Denver Hispanic community. Her upbringing emphasized close family ties, respect for hard work, and a love for communal meals, which influence
    her cooking and social gatherings. While she lives in Denver and works in a multicultural construction environment, she stays connected to her heritage through local Spanish cultural festivals, participation
    in a neighborhood Spanish language group, and occasionally traveling to Spain to visit relatives and explore her ancestral towns.
