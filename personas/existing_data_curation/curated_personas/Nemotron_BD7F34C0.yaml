  hobbies: '[''hiking'', ''trail running'', ''gardening'', ''Spanish cooking'', ''flamenco dancing'', ''Volunteering with Habitat for Humanity'', ''reading on sustainable architecture'', ''watching documentary
    series about construction technology'', ''listening to Latin and classic rock music'']'
  career_goals: Nayibe aims to advance from laborer to forewoman within the next three years, obtaining certifications such as OSHA 30‑hour, NCCER carpentry, and a Commercial Driver’s License to broaden
    her responsibilities. She plans to complete her associate degree in construction management, positioning herself for a future role as a project supervisor or owner‑operator of a small renovation firm
    focused on sustainable, energy‑efficient building practices. Long‑term, she hopes to mentor more women entering the trades and to establish a reputable, family‑friendly construction business that can
    provide stable income and growth opportunities for herself and her children.
