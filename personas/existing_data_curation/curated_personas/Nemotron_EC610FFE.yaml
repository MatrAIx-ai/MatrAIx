  career_goals: Daniel dreams of turning his love for talking and entertaining into a career in digital media—whether as a YouTube or TikTok content creator, a local radio or TV host, or a future communications
    major in college. He also hopes to develop his empathy into a role that helps other teens, such as a youth mentor or school counselor, using his personal experience with anxiety to support others while
    building a stable, creative professional path.
