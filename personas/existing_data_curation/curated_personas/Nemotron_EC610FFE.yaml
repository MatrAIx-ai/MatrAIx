personas:
  professional: Daniel Roten, a budding digital storyteller who blends Minecraft building sessions, Fortnite tactics, and drama club monologues into a charismatic presence on TikTok, leverages their love
    for structure to script engaging videos while occasionally missing school deadlines due to a laid‑back approach to obligations.
  sports: Daniel Roten, a basketball enthusiast who shoots hoops at the town park after school, cheers for the nearby Oneida High School Indians and the New York Knicks, and hikes the Adirondack trail system
    during summer weekends, balances competitive spirit with a laid‑back attitude toward organized practice.
  arts: Daniel Roten, a drama club lead who loves performing Shakespeare‑adapted scenes, creates TikTok skits inspired by Taylor Swift’s music videos, draws comic strips featuring a Minecraft‑themed hero,
    and idolizes director Hayao Miyazaki for the whimsical storytelling that fuels their own creative projects.
  travel: Daniel Roten, an adventure‑seeking teen who has explored the Finger Lakes on family road trips, dreams of backpacking through the historic streets of Boston and Disney World’s theme parks, prefers
    spontaneous weekend getaways over meticulous itineraries, and budgets travel expenses by selling custom comic art to friends.
  culinary: Daniel Roten, a self‑proclaimed snack connoisseur who favors pepperoni pizza, chicken nuggets with honey‑mustard, and homemade mac and cheese, occasionally experiments with baking Minecraft‑shaped
    cupcakes using in‑store frosting, but often forgets to clean up, leaving a trail of crumbs on the kitchen counter.
  core: Daniel Roten, a talkative, anxiety‑prone teen who thrives on being the center of a gaming crew or drama stage, balances a love for structured creative projects with a habit of late‑night snack binges
    and missed homework.
background:
  cultural: Daniel comes from a white, middle‑class family in Rome, New York, a small city in Oneida County. The community‑oriented, modest American culture of upstate New York influences his values—school
    sports, local festivals, and a blend of suburban and rural traditions. His family likely participates in common regional customs and holidays, with possible ties to the area's historically Catholic
    community, though his primary cultural reference points are peer social life and the shared experiences of small‑town youth.
