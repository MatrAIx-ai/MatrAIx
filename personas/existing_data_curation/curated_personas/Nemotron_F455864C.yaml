personas:
  professional: Randy Crosby, an aspiring concept artist and multimedia storyteller, leverages their skill with Procreate, Photoshop, and Blender to create experimental visuals for indie games while juggling
    a freelance commission schedule that reflects their love for flexibility over strict deadlines.
  sports: Randy Crosby, a beach‑side enthusiast, plays casual volleyball with friends at Fort Lauderdale’s shoreline, follows the Miami Heat and Miami Dolphins with avid fandom, and participates in a local
    surf club that meets on Saturday mornings.
  arts: Randy Crosby, a dedicated creator, spends weekends sketching beachgoers, curating mixed‑media collages inspired by the vibrant murals of local street artists like Banksy and Shepard Fairey, and
    immerses themselves in speculative fiction by N.K. Jemisin while vibing to experimental hip‑hop producers such as Flying Lotus and Afro‑Caribbean rhythms from Burna Boy.
  travel: Randy Crosby, an impulsive traveler, frequently road‑trips to Miami for Art Basel, dreams of backpacking through Barcelona’s Gothic Quarter to study street art, and hopes to attend Trinidad’s
    Carnival to experience the Afro‑Caribbean beats that fuel their creative projects.
  culinary: Randy Crosby, a budding foodie, loves weaving Caribbean flavors like jerk chicken, mango salsa, and plantain chips into home‑cooked meals, perfects avocado‑lime smoothies for early‑morning sketch
    sessions, and occasionally treats themselves to sushi rolls after late‑night gaming marathons.
  core: Randy Crosby, an 18‑year‑old imaginative whirlwind, drifts between sketchbooks and gaming consoles, splurges on art gear, procrastinates on bills, and channels their eclectic cultural beats into
    vivid, experimental visuals.
background:
  cultural: Randy grew up in a culturally diverse neighborhood of Fort Lauderdale, where the African‑American and Afro‑Caribbean communities intersect. Family gatherings often featured soulful gospel, jazz,
    and reggae, and he was exposed to the rhythmic beats of Miami’s hip‑hop scene. The city's coastal vibe, multicultural festivals like the Broward County Juneteenth celebration, and the vibrant street‑art
    scene have shaped his aesthetic sensibility. He identifies with the Black experience in South Florida, values community storytelling traditions, and incorporates elements of his heritage—such as rhythmic
    language and vivid color palettes—into his artistic work.
attributes:
  skills: '[''Concept Art'', ''Digital Illustration'', ''Creative Writing'', ''Video Editing'', ''Basic 3D Modeling'', ''Web Design (HTML/CSS)'', ''Research & Ideation'']'
  hobbies: '[''Visiting art galleries'', ''Sketching beach scenes'', ''Writing poetry'', ''Creating digital illustrations'', ''Making experimental short videos'', ''Reading speculative fiction'', ''Story-driven
    gaming'', ''Volunteering at youth art workshops'', ''Exploring street art'']'
  career_goals: Randy aims to build a career that blends his love for abstract visual art and storytelling. In the next few years, he plans to enroll in a BFA program focused on illustration or game design,
    while taking freelance commissions to develop a professional portfolio. He envisions working as a concept artist for indie game studios or animation projects, and eventually launching his own creative
    studio that produces multi‑media experiences, from graphic novels to interactive installations. He also hopes to publish a collection of speculative poetry that reflects his cultural roots and imaginative
    outlook.
