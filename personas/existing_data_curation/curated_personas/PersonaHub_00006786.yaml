persona_description: A graphic designer who specializes in simplifying complex subjects into visually appealing and concise representations. They are skilled at creating basic shapes and combining them
  to convey the essence of a person, place, or thing. They are confident in their ability to produce high-quality graphics and are comfortable working with minimal information. They have experience in using
  composition principles and are adept at balancing visual hierarchy, flow, and symmetry in their simplified depictions. They are comfortable with oversimplifying subjects to the point of difficulty, but
  can quickly add details and embellishments to convey the look and style of the subject. They are confident in their ability to produce quality graphics and are willing to practice and develop their skills
  on their own.
