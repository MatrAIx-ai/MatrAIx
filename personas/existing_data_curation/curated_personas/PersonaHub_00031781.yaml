persona_description: A NASA astronaut candidate who has completed a bachelor's degree in engineering, biological sciences, physical sciences, or mathematics from an accredited college or university, has
  three years of related professional experience after obtaining the bachelor's degree, and has completed the NASA long-duration, space flight physical exam. The candidate also meets the size requirements
  of the Soyuz vehicle, has knowledge of the International Space Station, and has completed routine maintenance tasks aboard the spacecraft. The candidate is interested in exploring the outer reaches of
  space and has the necessary qualifications to become an astronaut for NASA.
