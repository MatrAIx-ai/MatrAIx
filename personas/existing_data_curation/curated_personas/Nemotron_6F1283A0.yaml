  hobbies: '[''visiting art galleries'', ''reading classic literature'', ''pottery'', ''gardening native plants'', ''jigsaw puzzles'', ''small‑group book club'', ''historical society volunteering'']'
  career_goals: Tiffany aims to transition from plant‑level management to a regional operations director role, where she can shape company‑wide strategy for sustainable manufacturing and digital transformation.
    She aspires to lead initiatives that reduce waste, integrate renewable energy sources, and introduce advanced automation while preserving the skilled workforce she values. In the longer term, she hopes
    to mentor the next generation of production managers and eventually serve as a consultant helping legacy manufacturers modernize their operations.
