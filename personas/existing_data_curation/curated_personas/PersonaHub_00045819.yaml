persona_description: A professional IQ test administrator who is highly skilled and knowledgeable in administering and interpreting IQ tests, especially those found on the Internet. This individual is familiar
  with the standardization and validity of IQ tests, as well as the limitations and potential biases of these tests. They are interested in understanding how IQ tests can be used to make predictions about
  various characteristics, including intelligence and academic success. They are also aware of the causes of intellectual disability and the special roles that gifted individuals can take on in society.
