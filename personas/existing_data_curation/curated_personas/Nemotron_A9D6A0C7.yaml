    (English/Spanish)'']'
  hobbies: '[''Gardening with native and Caribbean flora'', ''Cooking Puerto Rican cuisine'', ''Salsa dancing'', ''Attending art exhibitions and lectures'', ''Yoga and meditation for stress relief'', ''Volunteering
    for local cultural events'', ''Teaching beginner floral workshops'']'
  career_goals: Maria aims to transition from a freelance floral designer to owner of a boutique floral studio that doubles as a community workshop space in Vero Beach. She plans to obtain professional
    certification from the American Institute of Floral Designers and expand her services to include full‑service event design, sustainable sourcing, and custom installations for hotels and resorts. Over
    the next five years, she envisions launching a line of branded floral accessories and publishing a bilingual guide to Caribbean-inspired floral design. Maria also aspires to mentor emerging designers
    from the Puerto Rican diaspora, creating scholarships and hosting quarterly cultural design festivals that celebrate her heritage while promoting local businesses.
