personas:
  professional: Maria Feliciano, a floral design entrepreneur, channels a disciplined workflow and meticulous budgeting into narrative-driven wedding and corporate installations, while thriving on the center‑stage
    energy of client consultations and leading a collaborative studio team with their sociable, detail‑oriented approach.
  sports: Maria Feliciano, an avid salsa dancer, supplements weekly dance classes with bi‑weekly beach volleyball at the Vero Beach Volleyball Club, follows the Orlando Magic and Tampa Bay Rays, and trains
    for the annual Florida 5K run, treating physical activity as both a social outlet and a stress‑relief routine.
  arts: Maria Feliciano, a regular attendee of Vero Beach art walks, draws inspiration from the bold color palettes of Kehinde Wiley and the whimsical illustrations of Charley Harper, enjoys evenings listening
    to salsa legends like Celia Cruz while curating floral designs that echo those artistic motifs, and participates in historical talks that deepen the narrative themes of her arrangements.
  travel: Maria Feliciano, who prefers semi‑planned trips that blend cultural immersion with relaxation, has explored the historic streets of Key West, indulged in a culinary tour of Oaxaca, Mexico, and
    dreams of strolling Cartagena’s colonial waterfront, all while funding these adventures through a dedicated travel savings account.
  culinary: Maria Feliciano, an enthusiastic home chef, delights in preparing traditional dishes such as arroz con gandules and pasteles, experimenting with local seasonal produce like sweet plantains,
    fresh cilantro, and rosette‑spiced pork, and often hosts dinner gatherings where they serve mofongo, flan, and craft sangria alongside their own floral centerpiece.
  core: Maria Feliciano, a structured yet socially vibrant entrepreneur, weaves cultural gastronomy and dance into lush floral storytelling while juggling entrepreneurial ambition, health anxieties, and
    occasional impulsive spending.
background:
  cultural: Maria is a first‑generation Puerto Rican American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains close ties to the island, celebrating
    traditions such as San Sebastián Festival and Noche de San Juan. These cultural experiences shape her aesthetic, inspiring her to incorporate vibrant Caribbean colors, tropical foliage, and symbolic
    motifs like the coquí frog or the hibiscus flower into her designs. Maria values community, hospitality, and familial bonds, which are reflected in her collaborative work style and her involvement in
    local cultural organizations. While residing in Vero Beach, she bridges her Puerto Rican heritage with Floridian coastal culture, often creating floral pieces that honor both her island roots and the
    beachside lifestyle of her hometown.
