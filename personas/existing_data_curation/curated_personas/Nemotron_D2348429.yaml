  career_goals: Mary aims to earn her full teaching credential and a Master's degree in education within the next three years, positioning herself for a certified elementary teacher role that emphasizes
    art‑infused curricula. She aspires to design and lead a school‑wide STEAM program that encourages novelty and interdisciplinary learning. Competitive and driven, she seeks a leadership position such
    as Lead Teaching Assistant or Instructional Coordinator, where she can mentor new aides and influence curriculum development. Mary also plans to present her innovative teaching methods at regional conferences
    and contribute articles to educational journals, reinforcing her professional reputation.
