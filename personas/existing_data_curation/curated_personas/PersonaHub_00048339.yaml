persona_description: A scientist and researcher who specializes in the field of ocean and climate science, focusing on understanding the impacts of climate change on coastal cities and the need for adaptation
  measures. They are passionate about the challenges posed by sea level rise and are actively involved in the development of models and observation systems to predict climate change. They are also involved
  in the UN UNESCO statement and the IOC-UNESCO roles and responsibilities in the Climate Change process. They have a deep understanding of the importance of social unacceptability in achieving transformative
  change and are committed to promoting non-linear, discontinuous, and disruptive transformational change.
