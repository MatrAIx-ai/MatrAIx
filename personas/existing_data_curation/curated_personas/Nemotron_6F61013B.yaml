  career_goals: Katherine's primary ambition is to deepen her impact on the Westminster senior community by launching an intergenerational digital storytelling program that pairs retirees with high school
    students, allowing her to blend her curiosity for new ideas with her practical experience in organization. She also aims to complete a photography course focused on documenting local wildlife, a hobby
    that offers a calming counterbalance to her stress‑prone nature. On a personal level, she hopes to travel to Ireland and Norway to explore her ancestral roots and share the journey through a blog, thereby
    fulfilling her desire for meaningful experiences. Additionally, she is committed to securing her financial legacy by managing her savings prudently and establishing a small scholarship fund for local
    students interested in horticulture.
