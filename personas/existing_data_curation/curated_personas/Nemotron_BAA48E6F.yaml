personas:
  professional: Sandra Harper is a seasoned highway maintenance specialist with three decades of heavy‑equipment expertise, combining meticulous road safety protocols with a curiosity for public art, and
    they aim to become a crew supervisor while pioneering sustainable, community‑focused infrastructure projects.
  sports: Sandra Harper is an avid hiker in the Shoshone National Forest, a dedicated bird‑watcher, and a loyal fan of the Wyoming Cowboys football team and the Cody Rodeo, often joining a local hiking
    club on Saturdays and volunteering as a stagehand for rodeo events while they keep fit through moderate trail walks and occasional snow‑shoeing.
  arts: Sandra Harper channels her love for western heritage by sketching the Absaroka Range at the Buffalo Bill Center of the West, performing supporting roles in Cody’s community theater, quilting classic
    patterns with friends, and devouring historical fiction novels by Bernard Cornwell, while drawing inspiration from artists such as Frederic Remington and Georgia O’Keeffe.
  travel: Sandra Harper prefers spontaneous road trips across the Rocky Mountain corridor, having already explored Yellowstone, Grand Teton, and a summer art retreat in Santa Fe, while dreaming of a pilgrimage
    to the Musée d’Orsay in Paris, balancing wanderlust with a modest retirement budget and a love for nature‑focused getaways.
  culinary: Sandra Harper enjoys cooking farm‑to‑table dishes like bison chili with roasted root vegetables, huckleberry crumble, and homemade sourdough, often sourcing ingredients from nearby ranches and
    farmers’ markets, and they excel at blending rustic western flavors with a hint of smoked paprika.
  core: Sandra Harper is a sociable, art‑loving highway veteran who transforms anxiety into community murals, mindful yoga, and native‑plant gardening, even as they occasionally lose track of appointments.
background:
  cultural: Sandra hails from a family of European‑American settlers who have lived in the Wyoming high plains for generations, blending Midwestern pragmatism with Mountain‑West frontier values. Growing
    up in a small‑town environment, she internalized a strong sense of community, self‑reliance, and respect for the rugged natural landscape. In Cody, she embraces the local Western heritage—participating
    in rodeos, valuing cowboy folklore, and honoring the region’s Native American history through museum visits and cultural events. Her weekly attendance at a non‑denominational church reflects the modest,
    family‑oriented traditions common in her cultural upbringing. While firmly rooted in these traditions, Sandra’s curiosity has led her to explore broader artistic currents, giving her a nuanced appreciation
    of both classic Western art and contemporary expressions. This blend of heritage and openness informs her identity as a socially engaged, culturally aware resident of Park County.
attributes:
  skills: '[''Heavy equipment operation'', ''Road surface repair and maintenance'', ''Highway safety standards compliance'', ''Drainage and culvert upkeep'', ''Field inspection and hazard identification'',
    ''First aid and emergency response'', ''Effective communication and community liaison'', ''Problem‑solving under variable conditions'', ''Basic computer data entry for maintenance logs'', ''Mentoring
    and training of crew members'', ''Artistic insight for public‑works concepts'', ''Community event coordination'']'
  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Community theater participation'', ''Volunteering at Cody Rodeo'', ''Hiking and birdwatching in Shoshone National Forest'',
    ''Native‑plant gardening'', ''Quilting and craft circles'', ''Historical fiction book club'', ''Farm‑to‑table cooking classes'', ''Mindfulness yoga and meditation'', ''Leading community road‑safety
    talks'']'
  career_goals: Sandra aims to advance to a crew supervisor position within the Park County Highway Department, where she can formalize her mentorship role and lead safety training programs. She plans to
    obtain an NCCER certification in heavy‑equipment operation and to complete her associate degree in civil‑engineering technology, which she began at a local community college. Passionate about blending
    function with aesthetics, she hopes to spearhead a pilot project that incorporates local artwork—such as murals or decorative railings—into highway infrastructure, showcasing Cody’s cultural heritage.
    Additionally, Sandra is interested in introducing more sustainable maintenance practices by using recycled materials and low‑impact techniques. Over the next decade, she envisions transitioning to a
    part‑time consultant role, offering workshops on road safety, community outreach, and public‑art integration, while remaining active in local heritage preservation initiatives.
