  hobbies: '[''Watercolor painting'', ''Visiting art galleries and exhibitions'', ''Local theater acting and attendance'', ''Hiking in the Columbia River Gorge'', ''Hosting board‑game and potluck gatherings'',
    ''Volunteer clean‑up with Habitat for Humanity'', ''Experimenting with culinary recipes'', ''DIY home‑improvement projects'', ''Photography (interior and architectural)'', ''Yoga and mindfulness practice'']'
  career_goals: Kathryn aims to advance into facility‑management leadership, ultimately becoming a Director of Operations for a large campus or hospitality group. She plans to earn professional certifications
    such as the Facility Management Professional (FMP) and Certified Green Cleaner. Her long‑term ambition is to spearhead a sustainability program that achieves zero‑waste cleaning and integrates IoT sensors
    for real‑time performance monitoring. She also wishes to mentor emerging women supervisors and later launch a consultancy that helps organizations redesign housekeeping processes through innovative,
    data‑driven solutions.
