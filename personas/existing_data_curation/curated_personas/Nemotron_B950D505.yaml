personas:
  professional: Kathryn Freeman, a 39‑year‑old facilities operations manager, blends her STEM background with a flair for aesthetics and sustainability, using data‑driven scheduling, quality‑control audits,
    and eco‑friendly cleaning methods to lead a diverse crew while fostering a harmonious, innovative work environment.
  sports: Kathryn Freeman, an avid hiker with the Columbia River Gorge Hiking Society, runs local 5K events, plays intramural volleyball on weekends, and cheers for the Portland Trail Blazers and Seattle
    Seahawks, while also following the Oregon Ducks women's soccer team.
  arts: Kathryn Freeman, a watercolor enthusiast, draws inspiration from Georgia O'Keeffe’s bold palettes, frequents the Portland Art Museum’s contemporary exhibitions, and regularly attends experimental
    theater productions by the Portland Center Stage's Next‑Stage series, while listening to Radiohead and the avant‑garde compositions of John Zorn to spark creative ideas.
  travel: Kathryn Freeman favors self‑planned road trips that blend adventure with cultural immersion, having explored the Oregon Coast’s Cannon Beach and Ashland’s Shakespeare Festival, while dreaming
    of a spring wander through Kyoto’s temples and the rice terraces of Bali, always budgeting her trips through a travel spreadsheet to balance work and family commitments.
  culinary: Kathryn Freeman, a competent home cook, delights in crafting miso‑glazed salmon with fresh ginger, quinoa salads tossed with arugula, roasted cauliflower, and toasted sesame seeds, and occasionally
    kneads sourdough starter sourced from a local bakery, while relishing farmer’s market finds like heirloom tomatoes and wild mushrooms.
  core: Kathryn Freeman merges analytical precision with artistic curiosity, leading sustainable facilities teams by day, organizing vibrant community events by night, while juggling a habit of over‑stocking
    cleaning supplies and a penchant for late‑night watercolor sessions.
background:
  cultural: Kathryn is a white American with roots in the Midwest, where she was raised with an emphasis on education, community service, and practical self‑reliance. Relocating to the Pacific Northwest
    introduced her to a culture that values environmental stewardship, progressive arts, and inclusive community engagement. Her upbringing blends traditional Western values of hard work and reliability
    with the region’s open‑minded, collaborative ethos, shaping her appreciation for diverse experiences, sustainability, and artistic expression.
attributes:
  skills: '[''Team Leadership'', ''Staff Scheduling'', ''Quality Assurance'', ''Safety Compliance'', ''Inventory Management'', ''Process Optimization'', ''Data Analysis (Excel, PowerBI)'', ''Project Management'',
