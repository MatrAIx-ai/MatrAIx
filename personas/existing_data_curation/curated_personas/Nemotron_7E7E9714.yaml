  career_goals: Jack aspires to a career that combines his love for structure, practical problem‑solving, and helping others. He is interested in becoming a civil engineer or a community‑focused emergency‑services
    professional, such as a firefighter or EMT, where he can design safe infrastructure and respond to real‑world challenges. To prepare, he plans to deepen his STEM knowledge through advanced robotics
    workshops, seek mentorship from local engineers, and continue volunteering with the county fire department’s youth outreach program.
