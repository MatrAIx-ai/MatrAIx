personas:
  professional: Jack Reed, an aspiring junior game developer who creates rule‑driven Scratch games, approaches each coding project with the same systematic planning he applies to LEGO Technic builds, leverages
    his scouting experience to document progress in checklists, and occasionally frustrates himself when unexpected bugs force him to deviate from his preferred orderly workflow.
  sports: Jack Reed, a dedicated Little League pitcher who models his wind‑up after New York Yankees ace Gerrit Cole, practices daily with the Springfield Youth Baseball Club, follows a disciplined fitness
    schedule that includes sprint drills and core work, yet sometimes forgets to stretch, leading to occasional shoulder tightness, and cheers for the New York Yankees during off‑season games.
  arts: Jack Reed, a meticulous LEGO Technic builder inspired by the kinetic sculptures of Theo Jansen and the cinematic scores of John Williams, recreates iconic scenes from Orson Scott Card’s Ender’s
    Game using LEGO bricks, volunteers to read sci‑fi passages to children at the library accompanied by background music from Hans Zimmer, but tends to dismiss modern pop culture in favor of classic sci‑fi
    literature.
  travel: Jack Reed, a detail‑oriented traveler who prefers pre‑planned excursions to historically rich sites such as the National Museum of American History in Washington, D.C., and the Kennedy Space Center
    in Florida, maps out daily LEGO building challenges for road trips, enjoys staying with family during summer vacations, yet sometimes resists spontaneous detours that disrupt his itinerary.
  culinary: Jack Reed, a budding home cook who favors straightforward dishes like pepperoni pizza, spaghetti Bolognese, and macaroni‑and‑cheese, enjoys arranging food on plates in geometric patterns reminiscent
    of LEGO builds, relies on precise recipes from a family‑passed cookbook, but often skips vegetables unless they are cut into bite‑sized cubes resembling LEGO bricks.
  core: Jack Reed, a methodical 13‑year‑old who blends a love for structured LEGO engineering, disciplined baseball practice, and compassionate community service into a life guided by routine, yet occasionally
    battles perfectionist tendencies and a reluctance to embrace the unexpected.
background:
  cultural: Jack grew up in a suburban middle‑class family in Leesburg, Virginia, where community involvement and traditional American values are emphasized. His household observes holidays such as Independence
    Day and Thanksgiving with family gatherings, and he often attends the local Baptist church, which reinforces a sense of service, discipline, and respect for routine. The region’s mix of historical heritage
    and proximity to Washington, D.C., provides him with exposure to civic pride and an appreciation for public service, shaping his compassionate yet practical outlook on life.
