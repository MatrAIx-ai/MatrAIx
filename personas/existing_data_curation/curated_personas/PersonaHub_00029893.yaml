persona_description: A researcher and advocate for sustainable development, Sophie Tyldesley is committed to understanding and addressing the environmental issues that threaten the finite nature of the
  natural world. She is dedicated to the idea that the pursuit of traditional capitalist economic growth is incompatible with a sustainable economy, and she is actively working towards correcting the environmentally
  damaging elements of capitalism. Her background in politics and international relations has equipped her with the knowledge and skills necessary to understand the complex interplay between economic systems
  and environmental sustainability. Sophie is passionate about using her research to inform policy decisions and to raise awareness about the importance of sustainable development.
