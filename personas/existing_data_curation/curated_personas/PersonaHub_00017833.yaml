persona_description: A researcher who is passionate about understanding the key energy sensing pathways in the body, particularly the AMP-activated protein kinase, and its potential role in preventing and
  treating obesity and Type 2 diabetes. He is a professor of medicine at the Michael G DeGroote School of Medicine, holds the Canada Research Chair in Metabolism and Obesity, and is the J. Bruce Duncan
  Chair in Metabolic Diseases. His lab has a specific focus on understanding how the AMP-activated protein kinase tells cells when they need to fill up with gas before they run out, and he hypothesizes
  that switching on this enzyme in combination with calorie restriction and the diabetes medication metformin could be a key molecular link in preventing and treating obesity and Type 2 diabetes. His research
  is also of critical importance considering that the rate of childhood obesity has climbed significantly over the past couple of decades, and it has significant health and economic implications. He is
  a rising star in the field of metabolism and obesity, and his efforts are buoyed by McMaster University's solid foundation of clinical cardiovascular and diabetes research established by his peers.
