personas:
  professional: Theresia Wilcox is a budding multimedia visual artist who blends sketching, digital illustration, and basic web design to craft narrative-driven graphics, while leveraging their methodical
    planning and outgoing nature to lead the school art club’s projects and envision a future as a creative director championing inclusive storytelling.
  sports: Theresia Wilcox stays active by playing pickup basketball at the local community center, cheering for the Detroit Pistons during the NBA season, and joining the school’s intramural volleyball
    team in the spring, while maintaining a disciplined routine of stretching and short‑run cardio to keep energy levels high for artistic pursuits.
  arts: Theresia Wilcox immerses themselves in the visual arts scene by sketching daily, experimenting with Adobe Photoshop and Illustrator on a tablet, attending exhibitions at the Detroit Institute of
    Arts, and drawing inspiration from musicians like Stevie Wonder, Sun Ra, and Aphex Twin, which fuels their poetry and speculative fiction writing.
  travel: Theresia Wilcox prefers weekend road trips that blend creativity and culture, such as exploring the street art of Ann Arbor, visiting the murals of Chicago, dreaming of a future study abroad stint
    in Kyoto’s design districts, and meticulously planning itineraries on a shared Google Sheet while balancing school responsibilities.
  culinary: Theresia Wilcox enjoys a vibrant palate, often whipping up homemade ramen bowls with miso broth, crafting mango salsa for tacos, and perfecting classic mac and cheese, while their cooking skill
    sits at a confident intermediate level, and they love experimenting with fresh herbs like basil and cilantro during late‑night study sessions.
  core: Theresia Wilcox is a highly organized, socially vibrant teen who fuses imaginative visual storytelling with community‑focused activism, balancing artistic ambition with occasional sleep‑deprived
    work marathons.
background:
  cultural: Theresia is a Black American teen raised in Grosse Pointe, Michigan, near the vibrant cultural landscape of Detroit. Her family traces its roots to the Great Migration, bringing a legacy of
    resilience and a deep appreciation for African‑American artistic traditions. She frequently attends community events at the local church and participates in cultural celebrations such as Juneteenth
    and Detroit’s Afro‑Future Fest. Exposure to Detroit’s rich music heritage—motown, soul, and contemporary hip‑hop—shapes her artistic sensibilities, while the suburban setting offers access to museums
    and art programs that broaden her perspective. Balancing the expectations of a predominantly affluent suburban environment with the pride of her Black heritage, Theresia actively seeks to blend these
    influences through her art and communal projects.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration'', ''Basic graphic design (Photoshop, Illustrator)'', ''HTML/CSS website creation'', ''Creative writing (poetry, speculative fiction)'', ''Public
    speaking and workshop facilitation'', ''Event planning and project coordination'']'
  hobbies: '[''Sketching and doodling'', ''Digital illustration on tablet'', ''Creative writing (poetry, short stories)'', ''Visiting museums and galleries'', ''Playing basketball with friends'', ''Improv
    theatre participation'', ''Organizing art jam sessions'', ''Listening to diverse music (Motown, hip‑hop, experimental]'']'
  career_goals: Theresia aims to attend a specialized high school focused on the visual and digital arts, followed by a bachelor's degree in Graphic Design or Multimedia Arts. She dreams of becoming a creative
    director at an agency that champions inclusive storytelling, using her art to amplify Black voices and experiences. In the longer term, she envisions launching community art initiatives in Detroit that
    empower underserved youth through mentorship and collaborative projects, merging her passion for art, social impact, and organized leadership.
