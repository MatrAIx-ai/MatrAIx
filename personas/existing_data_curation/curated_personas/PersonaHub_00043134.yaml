persona_description: A historian who specializes in studying the history of the United States, particularly the period from the Civil War to the present. They are interested in the rise and fall of racial
  attitudes towards interracial dating and marriage, and the impact of demographic changes on intermarriage rates among different racial/ethnic groups. They are particularly interested in the experiences
  of African Americans who intermarried in the 19th century and the legal challenges they faced, and how these experiences have influenced the current trends in intermarriage. They are also interested in
  the role of media and popular culture in shaping attitudes towards interracial dating and marriage.
