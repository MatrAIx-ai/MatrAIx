personas:
  professional: Marguerite Ellison, a visual merchandiser at a regional retail chain, blends her disciplined project coordination and strong color theory expertise with a curious eye for art to craft window
    displays that attract foot traffic while adhering to brand standards and budget constraints.
  sports: Marguerite Ellison stays fit by hiking the Blue Ridge trails with the Asheville Hiking Collective, follows the Asheville Tourists baseball team, and occasionally practices yoga at a local studio
    while favoring low‑impact cardio over competitive sports.
  arts: Marguerite Ellison draws artistic inspiration from the vibrant canvases of Georgia O'Keeffe, the black‑and‑white landscapes of Ansel Adams, and the lyrical folk of Neko Case, weaving these influences
    into her acrylic paintings, architectural sketches, and seasonal photography that she regularly shares at Asheville’s River Arts District exhibitions.
  travel: Marguerite Ellison prefers meticulously planned solo trips that blend architectural tours and natural scenery, having already explored the historic districts of Charleston and the coastal charm
    of Savannah, while dreaming of a weekend hike in the Canadian Rockies and a design‑focused pilgrimage to Barcelona’s Sagrada Família.
  culinary: Marguerite Ellison, an adept home cook, favors seasonal farm‑to‑table meals such as roasted beet and goat‑cheese salad with fresh thyme, pan‑seared salmon with lemon‑dill sauce, and occasionally
    experiments with kimchi‑infused fried rice, while she regularly visits Asheville’s farm‑to‑fork eateries for a taste of locally sourced trout and craft cider.
  core: Marguerite Ellison, a quietly ambitious visual merchandiser, blends meticulous organization with a restless curiosity for art, often losing sleep polishing displays while hoarding stray paint tubes
    and sketchbooks.
background:
  cultural: Marguerite grew up in Hendersonville, a town nestled in Western North Carolina’s Appalachian foothills. Raised in a middle‑class, white family with deep roots in the region, she was immersed
    in Southern hospitality, community church gatherings, and the tradition of Appalachian folk art such as quilting and woodcarving. The natural beauty of the Blue Ridge Mountains and the vibrant craft
    scene in nearby Asheville shaped her appreciation for both classic Americana and contemporary design. While her upbringing emphasized modesty and hard work, her family encouraged curiosity, leading
    her to explore diverse artistic influences beyond the local culture.
attributes:
  skills: '["Visual Merchandising", "Window Display Design", "Color Theory", "Spatial Planning", "Planogram Development", "Inventory Management", "Basic Adobe Photoshop", "SketchUp 3D Modeling", "Project
    Coordination", "Budget Management", "Trend Research", "Vendor Communication"]'
  hobbies: '["Acrylic Painting", "Sketching", "Landscape Photography", "Gallery Visits", "Design Magazine Reading", "DIY Up‑cycling Projects", "Hiking", "Fiber Art Craft Circles", "Book Club Participation"]'
  career_goals: Marguerite aims to advance from her current role to a senior visual merchandiser position within a regional retail chain, eventually overseeing multiple store concepts. She plans to enroll
    in a part‑time associate’s program in Visual Communications to deepen her design skills, while building a portfolio of innovative displays. In the longer term, she envisions launching her own boutique
    design consultancy, offering curated window concepts and visual storytelling for small businesses that value craftsmanship and regional aesthetic.
