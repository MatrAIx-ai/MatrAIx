  career_goals: Hoang aims to move from first‑line supervision to an Operations Manager role within the next five years. He plans to earn a Six Sigma Green Belt and complete a bachelor’s degree in Business
    Administration through night classes, building on his associate’s foundation. His ambition is to lead larger, multi‑shift facilities, implement data‑driven process improvements, and mentor future supervisors.
    In the longer term, Hoang envisions launching a small consulting firm that helps local Idaho manufacturers adopt lean practices, offering his expertise to boost regional competitiveness while maintaining
    a stable work‑life balance.
