personas:
  professional: Ronald Jones, a disciplined veteran computer support specialist with over four decades of experience, merges their meticulous documentation habits and love of visual aesthetics to deliver
    crystal-clear user guides and lead art-infused tech workshops, while actively transitioning toward mentorship and senior digital-literacy consulting.
  sports: Ronald Jones follows the Alabama Crimson Tide football team and the Birmingham Barons baseball club with seasonal enthusiasm, participates in a senior walking group that traverses the riverbanks
    for photography, and maintains a modest home-exercise routine of light resistance band work to keep their joints supple.
  arts: Ronald Jones, a devoted watercolorist of Southern landscapes, frequents the Birmingham Museum of Art and regional galleries, draws inspiration from Andrew Wyeth and local realist painter Mary Ann
    Wurster, and curates vintage radio exhibits that celebrate the intersection of design history and technology, reflecting their appreciation for both art and engineering.
  travel: Ronald Jones prefers leisurely road trips that blend photography and history, such as a recent drive along the Natchez Trace to explore historic sites and capture river vistas, while dreaming
    of a spring visit to the Japanese gardens of Kyoto to study Zen-inspired art and horticulture, a plan that balances their curiosity with practical budgeting.
  culinary: Ronald Jones enjoys farm-to-table Southern cooking, often using their garden’s tomatoes and native wildflowers to garnish shrimp and grits, collard greens, and a beloved pecan pie, while their
    modest culinary skill shines in homemade tomato preserves and occasional barbecues with friends.
  core: Ronald Jones is a curious, organized septuagenarian who balances meticulous tech mentorship with watercolor painting, yet wrestles with periodic anxiety and a penchant for hoarding vintage radio
    parts.
background:
  cultural: Born and raised in Decatur, Alabama, Ronald’s cultural background reflects the traditions of the American South. He grew up in a close‑knit community where hospitality, storytelling, and respect
    for local history were central values. While his upbringing emphasized conventional Southern customs—from family gatherings around home‑cooked barbecue to involvement in community churches—his personal
    curiosity led him to embrace broader artistic and technological influences. This blend of Southern rootedness with an openness to new ideas shapes his identity as a pragmatic yet reflective individual
    who values both heritage and innovation.
attributes:
  skills: '["Windows OS troubleshooting", "macOS support", "Network configuration and diagnostics", "Hardware repair and maintenance", "Help desk ticketing systems (e.g., ServiceNow, Zendesk)", "Technical
