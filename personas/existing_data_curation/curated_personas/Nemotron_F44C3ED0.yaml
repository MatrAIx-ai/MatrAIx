  hobbies: '[''jigsaw puzzles'', ''LEGO Duplo building'', ''bead sorting'', ''picture book reading'', ''collecting leaves and rocks'', ''caring for a hamster'', ''Sunday school crafts'']'
  career_goals: Annegret dreams of a future where she can create organized, calm spaces for learning and caring. She frequently says she wants to be a teacher, especially a kindergarten teacher, because
    she likes small groups of kids and a predictable classroom routine. She also imagines becoming a librarian, where she can keep books in order and help others find information. Occasionally she mentions
    wanting to be a veterinarian to care for animals, but she consistently emphasizes the importance of structure in any role she chooses.
