    and documentation","Adaptability to varied worksite environments"]'
  hobbies: '["Pickup basketball","R&B, hip‑hop, and jazz music","Church gospel choir and outreach events","Weekend fishing on the Kennebec River","DIY vehicle customization and classic car restoration","Soul-food
    cooking and barbecuing","Youth mentorship and mechanical workshops","Attending local jazz and food festivals"]'
  career_goals: Gary aims to move into a supervisory position within the next three years, targeting a crew‑lead or safety‑trainer role that lets him shape work‑site protocols and mentor junior staff. He
    plans to obtain a Commercial Driver’s License and an advanced heavy‑equipment trainer certification to broaden his qualifications. In the longer term he envisions launching a small, locally based trucking
    and equipment‑rental business that can provide stable, entry‑level jobs for other young workers in Androscoggin County, especially those from under‑represented backgrounds, while maintaining his commitment
    to community and safety.
