personas:
  professional: Gary Banks is a reliable heavy‑equipment operator who blends strict OSHA adherence and meticulous load planning with a solution‑focused, mentorship‑oriented mindset, and they aim to become
    a crew lead and safety trainer within three years.
  sports: Gary Banks plays pickup basketball at the Lisbon community center, follows the Portland Sea Dogs and the Boston Celtics, joins a local Kennebec River anglers club for weekend fishing, and they
    incorporate weekend jogs to stay fit despite a relaxed scheduling style.
  arts: Gary Banks immerses themselves in R&B and hip‑hop icons like D'Angelo and Kendrick Lamar, jazz legends Miles Davis and John Coltrane, and regularly performs gospel choir pieces by Mahalia Jackson
    at church, while attending the annual Maine Jazz Festival and collecting vintage vinyl records.
  travel: Gary Banks favors spontaneous road‑trip adventures in their customized truck, exploring destinations like Acadia National Park, New Orleans for its music scene, and Nashville for songwriting workshops,
    while budgeting for a future business trip to Orlando to research equipment rentals.
  culinary: Gary Banks enjoys cooking soulful dishes such as collard greens, fried catfish, candied yams, and cornbread, showcasing a solid intermediate skill set in the kitchen and often experimenting
    with spice rubs and homemade hot sauces for family gatherings.
  core: Gary Banks is a structure‑driven heavy‑equipment operator who balances community‑centric generosity with a laid‑back, slightly disorganized lifestyle, and they are fueled by a love for music, basketball,
    and entrepreneurship.
background:
  cultural: Gary grew up in Lisbon, Maine, as part of a close‑knit African‑American family whose grandparents migrated north during the Great Migration for industrial work. Their household blended New England
    values of hard work and self‑reliance with Black cultural traditions such as soul‑food cooking, gospel music, and storytelling. He maintains family rituals like weekend barbecues and church gatherings,
    and he participates in local community events that celebrate both his regional identity and his heritage. This dual influence shapes his outlook, fostering a strong sense of community responsibility,
    an appreciation for music and food, and a pragmatic, collaborative approach to both personal and professional life.
attributes:
  skills: '["Heavy equipment operation (industrial trucks, tractors)","Forklift and telehandler certification","Preventative maintenance and minor mechanical repairs","OSHA safety compliance and hazard
