  career_goals: Michael aims to transition into a senior technical architect role that emphasizes mentorship and collaborative problem‑solving. Over the next three to five years he plans to earn an AWS
    Solutions Architect certification and deepen his cloud expertise, positioning himself to lead a small agile team that modernizes legacy production software for local manufacturers. He also intends to
    launch a boutique consulting practice serving small Wisconsin businesses, leveraging his business background to align technology with operational goals while maintaining a balanced work‑life schedule.
    Additionally, Michael hopes to formalize a mentorship program within his current organization to support junior developers and promote a culture of knowledge sharing.
