persona_description: A historian and biographer who is passionate about the life and work of the Cavendish family, particularly Sir Charles Cavendish and his brother William. They are interested in the
  family's contributions to the sciences and letters, their involvement in the public discourse on natural philosophy in England, and their network on the continent, communicating with mathematicians and
  philosophers alike. They are also interested in the works of Elizabeth and Jane, daughters of William's first wife, who were well-educated young women who wrote their own plays around 1645. They are interested
  in the modern funding body that Sir Charles Cavendish enabled others' research and the need to diversify the canon and include literary examples from a much wider range of authors and contexts.
