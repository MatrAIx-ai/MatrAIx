  career_goals: Linda aims to evolve from a hands‑on developer into a technical lead who mentors junior programmers and guides small, flexible teams toward building real‑world applications. She hopes to
    spearhead projects that combine emerging IoT technologies with practical solutions for local agriculture and community services in DeKalb. Over the next five years, she plans to obtain a GED and pursue
    targeted certifications (e.g., AWS Certified Solutions Architect) to formalize her knowledge while continuing to prioritize a work‑life balance that allows for creative freedom. Ultimately, she envisions
    launching a boutique consulting practice that helps regional small businesses adopt affordable tech solutions.
