personas:
  professional: A pragmatic software developer, Linda Baum excels at rapid prototyping, debugging legacy code, and stitching together Python, JavaScript, and C# into practical IoT tools for local agriculture,
    while her relaxed stance on formal planning lets her pivot quickly in agile sprints and mentor junior teammates with a hands‑on, collaborative approach.
  sports: As an avid hiker of the rolling prairie trails near DeKalb and a weekend disc‑golf enthusiast, Linda Baum fuels her fitness by joining the local "Prairie Path" running group, cheering on the Chicago
    Bulls during basketball season, and scheduling occasional bike rides along the Illinois River while keeping a relaxed, "move when you can" attitude toward structured workouts.
  arts: Creative in her downtime, Linda Baum devotes evenings to board‑game nights featuring titles like "Terraforming Mars", captures misty cornfield sunrises with a Nikon D3500, and immerses herself in
    science‑fiction novels by Octavia Butler and Ted Chiang, while her playlist often spins folk‑rock bands such as Mumford & Sons.
  travel: Travel‑wise, Linda Baum plans spontaneous road trips that blend her love of technology and nature, having already toured the Chicago tech scene, explored Michigan’s Lake Michigan shoreline wineries,
    and backpacked through Iowa’s Loess Hills, all while favoring budget‑friendly Airbnbs and a flexible itinerary that leaves room for impromptu stops at farmer’s markets.
  culinary: In the kitchen, Linda Baum, an intermediate home chef, transforms harvests of heirloom tomatoes, sweet carrots, and fresh basil into rustic roasted beet salad, spicy carrot‑ginger soup, and
    occasionally ferments her own kimchi, relishing the tactile satisfaction of a cast‑iron skillet and the seasonal rhythm of her vegetable garden.
  core: Linda Baum is a curiosity‑driven, hands‑on technologist who balances practical solutions with a relaxed, sometimes disorganized streak, channeling her love of gardening and DIY electronics into
    every facet of life.
background:
  cultural: Linda grew up in a midwestern white family in Illinois, surrounded by a mix of agricultural traditions and the academic atmosphere of nearby Northern Illinois University. Her cultural upbringing
    emphasizes community support, modesty, and a pragmatic work ethic characteristic of the Midwest. Family gatherings often featured hearty home‑cooked meals and stories of farming life, influencing her
    appreciation for practical solutions that improve daily living. Although raised with a Protestant Christian background, she identifies more with a secular, inclusive outlook, valuing the region’s diversity
    through her participation in local tech and hobbyist groups. This blend of rural heritage, Midwestern hospitality, and exposure to university‑driven innovation shapes her worldview and informs both
    her professional and personal pursuits.
attributes:
