  career_goals: Denise dreams of turning her love for animals and art into a future career as a wildlife illustrator, where she can draw and paint the creatures she discovers in the woods around Cleveland.
    She also imagines inventing playful, eco‑friendly toys that teach other kids about science, reflecting her curiosity and desire to help others learn. In the longer term, she hopes to visit national
    parks, study different ecosystems, and perhaps become a storyteller who shares her adventures through illustrated books. She wants her work to bring joy and raise awareness about protecting nature.
