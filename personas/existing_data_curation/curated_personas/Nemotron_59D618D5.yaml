personas:
  professional: Erika White, a retired community event planner turned senior‑center volunteer coordinator, blends meticulous scheduling with a flexible, people‑centric approach to design intergenerational
    art, history, and gardening workshops that reflect their curiosity and love of collaborative storytelling, and they enjoy guiding seniors through each step of the creative process.
  sports: Erika White enjoys low‑impact fitness through weekly walks with the Lake Orion Seniors Walking Club, lively shuffleboard games at the local senior center, and passionately follows the Detroit
    Lions and Detroit Red Wings, and they often sport team colors while cheering from the community lounge.
  arts: Erika White immerses herself in visual and performing arts, regularly visiting exhibitions featuring Faith Ringgold and Jacob Lawrence, volunteering as a docent for shows on jazz icons Duke Ellington
    and Ella Fitzgerald, and attending community theater productions starring local talent like Marlee Channell, while their own watercolor landscapes echo American Impressionist influences and they enjoy
    sharing the stories behind each brushstroke with friends.
  travel: Erika White favors senior‑friendly travel, taking organized bus tours to Mackinac Island’s historic forts, joining a winter cruise to New Orleans for its jazz heritage, and dreaming of a cultural
    pilgrimage to Washington, D.C.'s Smithsonian National Museum of African American History and Culture, always planning trips well in advance to accommodate mobility needs, and they relish the chance
    to photograph each new destination.
  culinary: Erika White, an adept home chef, delights in soulful Southern dishes like fried chicken marinated in hot‑cayenne buttermilk, collard greens simmered with smoked turkey, and buttery cornbread,
    while also crafting Midwestern farm‑to‑table meals such as heirloom tomato bruschetta, roasted sweet potatoes with rosemary, and a seasonal peach cobbler that showcases fresh produce from their garden,
    and they proudly serve these meals at family gatherings, often recounting the garden’s stories as they plate each dish.
  core: Erika White, an 80‑year‑old community dynamo, balances a meticulous planner’s precision with spontaneous watercolor splashes, occasionally misplaces glasses while rummaging through garden tools,
    and they never say no to a potluck invitation.
background:
  cultural: Erika’s family is rooted in the African‑American Great Migration tradition, with her grandparents moving from the rural South to Detroit in the 1940s seeking industrial work and better schooling.
    Raised in a close‑knit church community, she absorbed the rich traditions of gospel music, oral storytelling, and communal solidarity. The values of perseverance, hospitality, and collective uplift
    shaped her worldview. Living in Oakland County, she blends Southern culinary heritage with Midwestern farming practices, creating a unique family cuisine that honors both her ancestors and her adopted
    home. Her cultural identity is expressed through participation in local African‑American cultural festivals, preservation of family stories, and mentorship of younger generations, reflecting a deep
    respect for history and a commitment to nurturing community bonds.
attributes:
