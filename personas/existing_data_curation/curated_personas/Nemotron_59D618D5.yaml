  hobbies: '[''Visiting art exhibitions and museum volunteering'', ''Watercolor painting'', ''Community theater participation'', ''Gardening and heirloom vegetable cultivation'', ''Soul food cooking for
    family gatherings'', ''Reading historical fiction and African‑American literature'', ''Leading a book‑club'', ''Attending church choir concerts and jazz festivals'', ''Cultural heritage fairs'', ''Photography
    and journaling of community events'']'
  career_goals: Although officially retired, Erika aspires to become a lead volunteer coordinator for the local senior center, designing programs that blend art, history, and gardening. She hopes to launch
    an intergenerational art workshop where seniors teach quilting techniques to school‑age children. Erika also wishes to compile a community oral‑history archive, preserving the stories of Lake Orion’s
    African‑American residents. Learning digital photography is a current ambition, enabling her to visually document neighborhood events and share them online. Ultimately, she aims to advocate for senior
    representation in municipal cultural planning committees, ensuring older adults have a voice in community development.
