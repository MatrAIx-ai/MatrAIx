  career_goals: Sara intends to enroll in a Bachelor of Science program in Environmental Science with a focus on sustainable resource management. Her goal is to blend her curiosity about ecological issues
    with pragmatic solutions, eventually becoming a project manager for community‑based renewable‑energy initiatives in the Pacific Northwest. She also aspires to develop data‑analysis skills that can inform
    policy recommendations. In the longer term, Sara hopes to lead interdisciplinary teams that balance environmental stewardship with economic viability, while keeping space for personal growth and occasional
    creative pursuits.
