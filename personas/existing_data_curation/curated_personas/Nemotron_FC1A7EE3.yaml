personas:
  professional: Sara Soto, a 19‑year‑old soon‑to‑be environmental science undergraduate, leverages strong written communication, beginner‑level Python data‑analysis, and first‑aid certification to coordinate
    community garden workshops while they balance academic deadlines with a pragmatic, detail‑oriented approach.
  sports: Sara Soto, a 19‑year‑old avid member of the Boise Hiking Club and a regular participant in the Boise State Broncos fan community, spends weekends trail‑blazing the Foothills, hits the slopes at
    Bogus Basin for snowboarding in winter, and squeezes in yoga sessions at the local community center, while they maintain a casual loyalty to the Idaho Steelheads hockey team.
  arts: Sara Soto, a 19‑year‑old budding acoustic guitarist, finds inspiration in folk artists like John Denver, indie‑folk duo The Avett Brothers, and ambient creator Bon Iver, attends monthly performances
    at the Boise Contemporary Theater, and incorporates storytelling into their knitting projects, often humming along to classic tunes while they craft.
  travel: Sara Soto, a 19‑year‑old adventure‑oriented yet budget‑conscious traveler, has hiked through Yellowstone and camped in Banff, enjoys spontaneous weekend road trips to Portland and the Oregon Coast,
    dreams of trekking the glaciers of Patagonia and exploring Iceland’s geothermal sites, and meticulously plans each journey using a blend of itineraries and flexible day‑by‑day adjustments, while they
    always keep a spare notebook for unexpected detours.
  culinary: Sara Soto, a 19‑year‑old experimental home cook, frequently prepares roasted sweet potato‑quinoa bowls with fresh kale and citrus vinaigrette, masters spicy lentil soup seasoned with cumin and
    coriander, bakes sourdough crusts using locally sourced flour, and delights in crafting avocado toast topped with za’atar and heirloom tomatoes while they constantly tweak recipes for optimal flavor.
  core: Sara Soto, a 19‑year‑old curiosity‑driven environmental enthusiast, balances meticulous planning with spontaneous creativity, often over‑packing for hikes yet forgetting to water their indoor plants,
    and they laugh about their habit of losing track of time in the kitchen.
background:
  cultural: Sara grew up in Boise, Idaho, within a white, middle‑class family that values self‑reliance, community involvement, and an appreciation for the natural landscape of the intermountain West. Her
    upbringing combined the modest, neighborly culture typical of a mid‑size Pacific Northwest city with exposure to the region’s growing tech and sustainability sectors. Family traditions include seasonal
    outdoor activities, a respect for practical education, and a balanced view of independence and togetherness, all of which shape her worldview and personal aspirations.
