personas:
  professional: A community‑focused marketing associate, Terry Simms leverages their knack for organized event planning and dynamic public speaking to craft engaging Instagram and TikTok campaigns for Chicago
    nonprofits, while coordinating volunteer teams with deadline‑driven precision.
  sports: A devoted Chicago Bulls fan, Terry Simms plays pickup basketball at neighborhood courts, logs four weekly weightlifting sessions at a local gym, and follows the Chicago White Sox and Chicago Fire,
    rarely missing a game when their schedule permits.
  arts: An avid nightlife enthusiast, Terry Simms frequents blues venues like The Kingston Mines, jazz spots such as The Green Mill, and hip‑hop showcases at the Subterranean, regularly attends open‑mic
    poetry slams inspired by Gwendolyn Brooks, and shares candid street‑scene photos on their Instagram feed.
  travel: When budget allows, Terry Simms embarks on weekend road trips to New Orleans for Cajun music, Nashville for songwriting workshops, and Lake Michigan’s shoreline for photography retreats, always
    mapping itineraries in Google Docs to maximize time and minimize costs.
  culinary: A self‑taught soul‑food chef, Terry Simms perfects fried chicken seasoned with smoked paprika, collard greens simmered with ham hocks, and sweet‑potato mac and cheese, often pairing these with
    corn‑meal cornbread made from locally sourced ingredients at community potlucks.
  core: Terry Simms is an organized social catalyst who meticulously designs community events and digital content, yet habitually procrastinates on filing receipts, resulting in a perpetually overflowing
    desk drawer.
background:
  cultural: Terry is an African‑American raised in Chicago’s South Side. His family’s history traces back to the Great Migration, and he grew up surrounded by a close‑knit community that values resilience,
    church fellowship, and cultural expression through music and food. He participates in annual Juneteenth celebrations, supports local Black-owned businesses, and follows the city’s sports traditions,
    cheering for the Bulls and the Bears. The blend of historic Black cultural traditions, contemporary Chicago arts, and a strong sense of neighborhood solidarity shapes his worldview and fuels his commitment
    to give back through community‑oriented projects.
attributes:
  skills: '["Public speaking", "Event coordination", "Social media content creation", "Basic graphic design (Canva)", "Customer service", "Microsoft Office Suite", "Time management", "Community outreach",
