  hobbies: '["Attending live music venues (blues, jazz, hip‑hop)", "Open‑mic and poetry slam nights", "Pickup basketball games", "Street photography around Chicago neighborhoods", "Cooking soul food and
    Southern‑inspired dishes", "Weightlifting and gym workouts", "Volunteering at youth and community centers", "Online multiplayer gaming", "Exploring local food festivals"]'
  career_goals: Terry aims to build on his associate degree by completing a bachelor’s in communications or public administration within the next three years, while securing a part‑time role in marketing
    or community outreach at a Chicago nonprofit or small business. In the short term he wants an internship or entry‑level position that lets him apply his event‑planning and social‑media skills, demonstrate
    his reliability, and expand his professional network. Long‑term, he aspires to become a program manager who designs and executes community‑development initiatives, eventually launching his own socially‑focused
    venture that blends cultural events with youth mentorship.
