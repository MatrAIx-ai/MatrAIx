  career_goals: Taylor aspires to combine her love for art and technology by pursuing a career in graphic design or multimedia production. She dreams of attending a college with a strong art program where
    she can further develop her digital illustration and interactive media skills. Long‑term, she hopes to work as a creative director for a socially conscious brand, using visual storytelling to highlight
    community issues and empower young people in her hometown. She also considers a backup plan of entering a STEM field, such as computer science, to keep her options open.
