personas:
  professional: Taylor Vernon (15) is an aspiring visual storyteller who merges sketching, sci‑fi narratives, and eclectic music tastes into after‑school art workshops at the local community center, leveraging
    their innate curiosity and flexible mindset while occasionally juggling disorganized schedules.
  sports: Taylor Vernon (15) enjoys pick‑up basketball at the community center, follows the local high school soccer team, avidly supports the New Orleans Pelicans, and occasionally swims with a youth club,
    embracing a laid‑back fitness routine that balances short jogs with weekend gaming marathons.
  arts: Taylor Vernon (15) sketches neighborhood scenes while listening to Aretha Franklin and Kendrick Lamar, immerses themselves in graphic novels by Jim Lee and Mike Mignola, and draws inspiration from
    the murals of Shepard Fairey, weaving these eclectic influences into personal journal pages and volunteer art workshops.
  travel: Taylor Vernon (15) favors spontaneous weekend road trips to historic towns like Savannah and Asheville, dreams of exploring the Louvre in Paris and Berlin’s street‑art scene, and balances these
    wanderlust ambitions with school responsibilities and a modest family travel budget.
  culinary: Taylor Vernon (15) enjoys the bold taste of Southern fried chicken, the comforting comfort of mac and cheese, and the bright zest of sushi rolls, they experiment with sketch‑inspired veggie
    wraps using fresh basil and avocado at home, but often resort to quick microwave meals when homework piles up.
  core: Taylor Vernon (15) is a curious, sketch‑loving teen who fuses music‑driven art with a relaxed, occasionally chaotic routine, channeling bursts of creativity into community workshops while habitually
    procrastinating on organizing supplies.
background:
  cultural: Taylor is a Black teenager raised in Cartersville, Georgia, where Southern African‑American traditions shape her daily life. Family gatherings often feature soulful gospel music, homemade soul
    food, and storytelling that reinforces community values and resilience. The local church plays a central role, providing a supportive space for both worship and cultural expression through choir and
    youth programs. Taylor’s heritage connects her to a rich legacy of Southern Black artists and activists, inspiring her appreciation for art that speaks to social change. She embraces both the historic
    roots of her community and the contemporary cultural currents that influence her generation.
