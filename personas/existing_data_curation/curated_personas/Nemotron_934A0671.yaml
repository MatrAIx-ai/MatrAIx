  hobbies: '[''Woodworking'', ''Home Renovation Projects'', ''Reading Historical Non-fiction'', ''Writing a Construction Blog'', ''Hiking'', ''Cycling'', ''Fishing'', ''Playing Guitar'', ''Local Live Music'',
    ''Amateur Theater Set Design'', ''Attending Community Events'', ''Following Indiana Sports'']'
  career_goals: David aims to advance from construction manager to senior project manager and eventually regional director for a mid-size construction firm in the Midwest. He plans to earn professional
    certifications such as the PMP and LEED AP to deepen his expertise in project delivery and green building. Over the next five years, he wants to lead a flagship commercial development that showcases
    innovative, energy-efficient design, and to mentor emerging tradespeople through a formal apprenticeship program. In the longer term, he envisions launching his own consulting firm that helps small
    contractors adopt sustainable practices and improve safety performance.
