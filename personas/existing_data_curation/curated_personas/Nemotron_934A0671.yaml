personas:
  professional: David Omohundro, a 37‑year‑old construction manager who blends a humanities‑informed curiosity with hands‑on practicality, leads multidisciplinary building projects by rigorously interpreting
    blueprints, negotiating with subcontractors, and keeping tight budgets while staying flexible enough to adapt to on‑site surprises, and they regularly mentor junior tradespeople to instill both safety
    and sustainable practices.
  sports: David Omohundro fuels his fitness by hiking the Hoosier National Forest trails, cycling with the Indianapolis Cycling Club, casting for bass on the nearby reservoir, while cheering for the Indianapolis
    Colts in football, the Indiana Pacers in basketball, and they squeeze in a weekly pickup basketball game at the community center to stay active.
  arts: David Omohundro weaves his love of narrative into nightly acoustic sets of John Mayer and Bob Dylan at the Bloomington Open‑Mic, designs atmospheric backdrops for the Indy Playhouse community theater
    productions, and they regularly quote Jane Jacobs while drafting blog posts that tie historic architecture to modern design.
  travel: David Omohundro prefers meticulously planned weekend road trips that blend outdoor adventure with architectural curiosity, having cycled through the Ozarks, hiked the Great Smoky Mountains, and
    now dreaming of a spring visit to Copenhagen to study Danish passive‑house design while balancing a modest travel budget.
  culinary: David Omohundro, a competent home chef, enjoys crafting a wood‑fire pork tenderloin with apple‑cider glaze, perfecting hand‑made sourdough using a San Francisco starter, pairing meals with local
    Indiana craft beers like Sun King Lager, and they relish hunting for fresh mushrooms and herbs at farmer’s markets.
  core: David Omohundro is a strategically skeptical builder who meticulously budgets every nail yet secretly hoards vintage Edison bulbs, opting for late‑night guitar riffs over sleep after a deadline.
background:
  cultural: David grew up in Evansville, Indiana, a city shaped by its location on the Ohio River and a strong Midwestern work ethic. His family traces roots to German and Irish immigrants who settled in
    the region in the early 20th century, and he was raised in a modest Methodist household that emphasized community service and self-reliance. The local culture of practicality, friendliness, and civic
    pride informs his approach to both work and life. He embraces regional traditions such as backyard barbecues, high-school football Saturdays, and a growing interest in craft brewing, while also valuing
    the historic preservation efforts that celebrate Evansville’s river-town heritage.
