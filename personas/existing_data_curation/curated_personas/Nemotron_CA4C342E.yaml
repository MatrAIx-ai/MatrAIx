  hobbies: '[''Dancing (pop and Mexican folk)'', ''Soccer'', ''Cooking family recipes'', ''Sketching and digital illustration'', ''Reading young-adult fiction'', ''Participating in drama club'', ''Volunteering
    at library tutoring program'', ''Journaling and mindfulness practice'', ''Organizing community events'']'
  career_goals: Angel aspires to graduate high school and later pursue a degree in social work or counseling, aiming to become a bilingual mental-health counselor who can support other young people dealing
    with anxiety and cultural transitions. She is also interested in community health outreach, envisioning a role as a health educator in Latino neighborhoods. In the short term, she plans to earn her
    GED, gain experience as a volunteer mentor at the local community center, and develop a certification in first aid.
