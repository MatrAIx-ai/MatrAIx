personas:
  professional: Angel Luna is a bilingual high‑school senior who volunteers as a tutor, organizes youth‑club events with meticulous precision, and aspires to become a mental‑health counselor, channeling
    their passion for active listening and peer mediation into future community health outreach.
  sports: Angel Luna plays midfielder for the Riverside Youth Soccer Club, trains three times a week, follows professional teams such as the US Women’s National Team and MLS side Real Salt Lake, and uses
    soccer drills as a primary outlet for managing intense emotions and staying physically fit.
  arts: Angel Luna dances to contemporary pop hits by Ariana Grande and to traditional folk rhythms at school events, acts in drama club productions like A Midsummer Night’s Dream, sketches cartoons inspired
    by Adventure Time and Steven Universe, and follows artists such as Lin‑Manuel Miranda, Misty Copeland, and Bad Bunny for creative inspiration.
  travel: Angel Luna enjoys weekend trips to nearby state parks, dreams of backpacking through the Peruvian Andes, and hopes to experience the carnival in Rio de Janeiro, planning itineraries meticulously
    to balance budget constraints with a desire for cultural immersion and volunteer opportunities.
  culinary: Angel Luna delights in cooking family‑heritage pork stew with a modern twist—adding quinoa, cilantro, and lime—while also mastering quick dishes like avocado toast with smoked salmon and salsa,
    showcasing a solid kitchen skill set and a love for experimenting with spice blends.
  core: Angel Luna blends organized ambition with creative flair, juggling bilingual tutoring, soccer, and a passion for community mental‑health advocacy while navigating fierce anxiety and occasional impulsive
    spending.
background:
  cultural: Angel grew up in a Mexican-American household in Port Saint Lucie, where both Spanish and English are spoken at home. She celebrates cultural traditions such as Día de los Muertos, Mexican Independence
    Day, and family gatherings featuring tacos, tamales, and mole. Her family maintains strong ties to their roots through regular visits to local Hispanic community centers, participation in cultural festivals,
    and the practice of Catholic holidays blended with Mexican customs. This bicultural environment shapes her identity, values of family solidarity, and her desire to serve the Latino community.
