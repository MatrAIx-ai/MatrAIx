persona_description: A theologian who specializes in the study of the natural, sensitive, and rational appetites, particularly their role in determining human behavior and moral decision-making. This theologian
  has a deep understanding of the medieval scholastic tradition and is skilled in applying this knowledge to theological problems related to God's desire for man, the consequences of original sin, the perfection
  of Christ's humanity, and the influence of passion on human action. This theologian also has a keen interest in the intersection of theology and psychology, and how the theory of appetite can be applied
  to understanding human motivation and decision-making.
