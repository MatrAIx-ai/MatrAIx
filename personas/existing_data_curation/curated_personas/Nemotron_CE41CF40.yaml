personas:
  professional: Sandra Cade, a community social worker with a humanities background, blends crisis‑intervention expertise and grant‑writing skill while integrating arts‑based therapeutic techniques into
    case management, a practice that reflects their curious, flexible, and occasionally disorganized approach to building deep client trust.
  sports: Sandra Cade, a casual runner who joins the Greensboro Saturday Morning 5K Club, follows the Carolina Hurricanes and NC State Wolfpack basketball, and practices yoga three times a week, prefers
    low‑impact, flexible workouts that accommodate anxiety fluctuations.
  arts: Sandra Cade, an avid photographer and community‑theater participant, frequents local galleries featuring artists such as Kehinde Wiley and attends performances that echo the poetic voices of Langston
    Hughes and Maya Angelou, drawing creative inspiration for short stories that explore the nuances of Greensboro’s neighborhoods.
  travel: Sandra Cade prefers spontaneous, culturally immersive trips, having explored Asheville’s art scene, New Orleans’ jazz festivals, and a weekend in Charleston, while dreaming of a week‑long stay
    in Oaxaca’s colorful markets, all planned on a flexible budget that allows for last‑minute changes.
  culinary: Sandra Cade cultivates a small herb garden to flavor herb‑infused pesto pasta, lemon‑garlic roasted chicken, and garden salads laced with basil, thyme, and mint, cooking at an intermediate level
    that blends practical nutrition with a love for aromatic kitchen experiments.
  core: Sandra Cade channels restless curiosity into arts‑driven social work, balances a relaxed approach to money with occasional splurges, wrestles with anxiety through mindfulness, prefers low‑key fitness,
    and fuels creativity with photography, theater, and herb‑rich cooking, while navigating a habit of missed appointments and spontaneous travel plans.
background:
  cultural: Sandra identifies as African American and draws strength from the rich cultural tapestry of the South. Her family traditions emphasize storytelling, music, and community solidarity, shaping
    her deep appreciation for collective wellbeing. Growing up in Greensboro, she has been active in local Black cultural organizations and church groups, which have informed her commitment to social equity
    and culturally responsive care. These experiences influence both her professional focus on inclusive practice and her personal passion for arts that celebrate Black heritage.
attributes:
  skills: '[''Client Assessment'',''Crisis Intervention'',''Case Management'',''Community Outreach'',''Advocacy and Policy Navigation'',''Trauma‑Informed Care'',''Arts‑Based Therapeutic Programming'',''Grant
    Writing'',''Cultural Competency'',''Conflict Mediation'']'
  hobbies: '[''Photography'',''Visiting Art Galleries'',''Creative Writing'',''Community Theater'',''Gardening'',''Cooking Southern Cuisine'',''Yoga and Mindfulness'',''Journaling'',''Local History Exploration'',''Social
    Justice Volunteering'']'
  career_goals: Sandra aims to earn a master's in social work and become a licensed clinical social worker within the next three years. She aspires to lead a community mental‑health program that integrates
    visual and performing arts as therapeutic tools for underserved youth in Greensboro. Ultimately, she hopes to launch her own nonprofit focused on culturally responsive arts therapy and influence state‑level
    policies that improve funding for holistic mental‑health services.
