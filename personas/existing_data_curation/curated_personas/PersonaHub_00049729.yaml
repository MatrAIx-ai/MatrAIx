persona_description: A historian and theologian who is interested in the Puritan period and its impact on society and religion. They have a deep understanding of the Puritan culture and the strict religious
  practices they followed. They are fascinated by the concept of required obedience leading to requited affection and the importance of discipline in society. They are also curious about the Puritan's approach
  to evangelism and how it led to "Puritan Tribalism." They believe in the importance of covenant succession and how it can help them to reach the lost.
