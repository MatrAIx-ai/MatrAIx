personas:
  professional: Christy Kliger, a budding LEGO architect who thrives on structured play, harnesses their logical mind to design intricate builds, often leading classroom building challenges and dreaming
    of one day becoming a civil engineer.
  sports: Christy Kliger, a forward on the Oakwood Owls U7 soccer team, combines competitive drive with teamwork to score goals, while passionately rooting for the Chicago Fire FC and the Chicago Cubs during
    family viewing nights.
  arts: Christy Kliger delights in sketching woodland scenes with colored pencils, often listening to the soundtrack of Disney's 'Moana' and drawing inspiration from illustrator Mary GrandPré, while also
    eagerly collecting limited-edition 'Frozen' stickers.
  travel: Christy Kliger has explored the interactive exhibits at the Children's Museum of Indianapolis, dreams of hiking the Grand Canyon's South Rim, and hopes to snorkel in Kona, Hawaii, balancing school
    schedules with family road trips.
  culinary: Christy Kliger prefers pepperoni pizza with extra mozzarella, enjoys assembling homemade taco bowls with shredded lettuce, avocado, and cheddar cheese, and is proud of their banana-pancake flipping
    skills, though they often forget to finish their vegetables.
  core: Christy Kliger is a pragmatic, puzzle-loving seven-year-old who blends structured creativity with a competitive streak, balancing a love for LEGO builds and soccer with a meticulous allowance habit,
    yet occasionally forgets to tidy their room.
background:
  cultural: Christy is raised in a predominantly White, Midwestern small‑town environment in Dyersville, Iowa. Her family participates in community traditions such as county fairs, local school events,
    and seasonal harvest festivals. The cultural ethos emphasizes practicality, self‑reliance, respect for nature, and a close‑knit community spirit, which shapes her values of responsibility, competitiveness,
    and balanced social engagement.
