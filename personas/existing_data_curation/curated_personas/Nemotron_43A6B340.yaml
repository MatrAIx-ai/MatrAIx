personas:
  professional: Michael Haygood, a 13‑year‑old budding naturalist and hobbyist coder, blends meticulous field notes from lake fishing and birdwatching with Scratch game development, showing how curiosity
    and practicality guide a future in environmental science.
  sports: Michael Haygood spends weekends hiking the forest trails around Lake Minocqua, practices catch‑and‑release fishing as a low‑key sport, runs on their middle‑school cross‑country team, cheers for
    the Green Bay Packers and Milwaukee Brewers, and belongs to the local Boy Scouts Troop 101 hiking crew.
  arts: Michael Haygood channels creative energy into constructing model boats and coding Scratch games while listening to Bon Iver and the orchestral scores of Hans Zimmer, and they often rewatch Pixar’s
    Up for inspiration, reflecting a quiet appreciation for storytelling and music.
  travel: Michael Haygood prefers meticulously planned nature trips, having camped in the Upper Peninsula of Michigan and explored the Apostle Islands, they now dream of hiking Yellowstone’s geothermal
    basins, though school and limited pocket money keep most adventures local.
  culinary: Michael Haygood enjoys cooking simple yet precise meals such as pan‑seared trout with lemon‑dill sauce, wild mushroom risotto, and blueberry pancakes drizzled with local maple syrup, though
    they sometimes forget to clean the skillet promptly, leading to a lingering burnt scent.
  core: Michael Haygood is a methodical 13‑year‑old nature enthusiast who balances quiet curiosity with a hint of anxiety, turning solitary hikes, model‑building, and code into a disciplined, slightly obsessive
    quest for understanding.
background:
  cultural: Michael grows up in a predominantly white, middle‑class family in Minocqua, a small resort town in northern Wisconsin known for its lakes, forests, and seasonal tourism. The community places
    a high value on self‑reliance, outdoor recreation such as fishing, hunting, snowmobiling, and strong family ties. Local traditions and a heritage of German‑Scandinavian ancestry shape his upbringing,
    emphasizing modesty, hard work, and stewardship of the natural environment. These cultural influences foster his appreciation for practical skills, organized planning, and a deep connection to the surrounding
    wilderness.
attributes:
  skills: '[''Basic computer programming (Scratch, Python)'', ''Digital photo editing'', ''Computer hardware troubleshooting'', ''Woodworking and model building'', ''Mathematics problem solving'', ''Science
    research (ecology, geography)'', ''Detailed journaling and planning'']'
  hobbies: '[''Fishing and freshwater ecology'', ''Hiking and trail exploration'', ''Birdwatching and wildlife observation'', ''Model boat and RC vehicle building'', ''Scratch and introductory Python programming'',
    ''Reading science and nature magazines'', ''Journaling and personal reflection'']'
  career_goals: Michael dreams of turning his curiosity about nature and his methodical mindset into a career that blends science and practical problem solving. He aspires to become an environmental engineer
    or wildlife biologist, working with state parks or conservation agencies to design sustainable solutions and conduct field research on the lakes and forests of northern Wisconsin. In the longer term,
    he hopes to lead community projects that protect local natural resources while applying scientific methods to real‑world challenges. His ambition is to build a stable, purposeful profession that balances
    his love of the outdoors with a structured, organized approach.
