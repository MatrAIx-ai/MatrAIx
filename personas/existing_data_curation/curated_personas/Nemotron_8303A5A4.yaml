personas:
  professional: A budding digital illustrator and Scratch programmer, Kiana Wiggins blends boundless curiosity with a love for solitary creation, turning sketchbook doodles into interactive stories while
    often sidestepping homework because of relaxed, disorganized habits.
  sports: Kiana Wiggins enjoys low‑key fitness like after‑school swimming at the community pool and Saturday soccer matches with the Riverdale Youth Soccer Club, roots for the Los Angeles Lakers during
    the NBA season, but often skips team drills because social interaction feels draining.
  arts: Kiana Wiggins spends evenings sketching fantastical creatures while listening to Brian Eno’s ambient tracks and Aretha Franklin’s soulful classics, draws inspiration from indie animated films such
    as "The Breadwinner" and "Wolfwalkers", and idolizes digital artists Loish and Sakimichan for their vibrant color palettes.
  travel: Kiana Wiggins prefers spontaneous family road trips to places like the Grand Canyon, dreams of wandering Tokyo’s anime districts and Scotland’s ancient castles, loosely sketches itineraries in
    a notebook, yet frequently forgets to pack favorite art supplies, leading to improvised travel journaling.
  culinary: Kiana Wiggins enjoys whipping up simple meals like ramen with extra veggies, mac and cheese sprinkled with crispy breadcrumbs, and strawberry‑banana smoothies, showing a budding flair for mixing
    textures and colors, though the kitchen often ends up a mess as they drift into daydreams.
  core: Kiana Wiggins is a quiet, curiosity‑driven 11‑year‑old artist who channels intense emotions into vivid sketches, hoards doodle notebooks, forgets chores, and navigates the world with a blend of
    imaginative bravery and anxious hesitation.
background:
  cultural: Kiana is raised in a Black family in Spring Valley, a diverse suburb of San Diego. Her parents emphasize the importance of African‑American cultural heritage, sharing stories of civil‑rights
    leaders, music from jazz, soul, and hip‑hop, and encouraging visits to local cultural institutions such as the African American Museum of San Diego and community art programs. These experiences, combined
    with the multicultural vibe of Southern California, shape her artistic style, which often blends bold colours with themes of identity and resilience. She values the close‑knit support of her extended
    family and the broader Black community, which inform her sense of belonging and purpose.
attributes:
  skills: '["drawing", "digital illustration", "basic coding (Scratch)", "creative writing", "research", "critical thinking", "empathetic listening", "problem solving"]'
  hobbies: '["sketching", "digital painting", "reading fantasy and sci‑fi novels", "listening to music", "creating Scratch projects", "watching indie animation", "journaling"]'
  career_goals: Kiana dreams of turning her love for art and storytelling into a career as a concept artist or illustrator, creating characters and worlds for books, animation, or video games. She hopes
    to attend a specialized arts high school and later study illustration at a college that values diverse perspectives. She also aspires to use her artwork to raise awareness about mental‑health challenges
    faced by introverted youth, possibly developing a series of graphic novels that offer comfort and representation.
