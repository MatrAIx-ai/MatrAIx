personas:
  professional: Jeralyn Brigman, a budding young visual storyteller, blends watercolor, digital art, and LEGO architecture to design immersive fantasy worlds for school projects, the library story‑time
    program, and community science fair displays.
  sports: Jeralyn Brigman participates in after‑school gymnastics and contemporary dance, cheers on the hometown youth soccer team the Wildcats, and enjoys weekend bike rides with friends to stay active.
  arts: Jeralyn Brigman draws inspiration from Hayao Miyazaki’s animated worlds, the vivid colors of Studio Ghibli’s 'Spirited Away', and the whimsical illustrations of Shaun Tan, while also practicing
    piano pieces by Ludovico Einaudi.
  travel: Jeralyn Brigman’s travel diary includes a weekend road trip to the state natural history museum, a summer visit to a coastal beach town for tide‑pool exploration, and a growing wishlist of a trip
    to Kyoto’s bamboo forest and the Smithsonian’s National Air and Space Museum.
  culinary: Jeralyn Brigman favors pepperoni pizza, sushi rolls with avocado and cucumber, and homemade chocolate‑chip pancakes, and they enjoy experimenting with bright edible glitter on cupcakes for birthday
    parties.
  core: Jeralyn Brigman is a highly organized, imagination‑driven 12‑year‑old who channels curiosity into art and storytelling while wrestling with worry‑induced perfectionism and occasional impulsive snack
    cravings.
background:
  cultural: Jeralyn comes from a white, Midwestern family that has lived in the Milwaukee area for several generations. Her parents, both working‑class professionals—her mother a registered nurse and her
    father a skilled tradesperson—instilled values of hard work, community service, and respect for diversity. Growing up in the vibrant, multicultural neighborhoods of Milwaukee, she has been exposed to
    a mix of cultural traditions, from local summer festivals to holiday celebrations like Christmas, Easter, and community barbecues. The family attends a community church that emphasizes charitable outreach,
    and they take part in regional customs such as attending the Summerfest music festival and supporting the Milwaukee County Zoo educational programs. Her school promotes inclusive curricula, encouraging
    her curiosity about different cultures while her household maintains classic Midwestern customs like family dinners, backyard barbecues, and seasonal activities like apple picking and ice skating. This
    blend of strong family ties, community involvement, and exposure to a diverse urban environment shapes her worldview.
