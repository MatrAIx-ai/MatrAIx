  career_goals: Jeralyn aspires to blend her love for art and imagination with a purposeful career that helps others. In the long term, she envisions becoming a children's book author and illustrator, creating
    stories that inspire curiosity and empathy. She also dreams of studying architecture or design to turn abstract ideas into tangible spaces. Her organized nature fuels a goal to attend a specialized
    high‑school program in visual arts, win state‑level art competitions, and eventually earn a scholarship for a university program in illustration or design. Because she values harmony and caring for
    others, she hopes to volunteer as a peer counselor in middle school, develop workshops that teach stress‑relief techniques, and perhaps pursue a dual path in art therapy. Short‑term ambitions include
    leading her school's art club, securing a role in the community theater production crew, and completing a coding project that combines storytelling with interactive graphics.
