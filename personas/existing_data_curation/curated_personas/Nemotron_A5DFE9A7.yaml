  hobbies: '[''Community choir singing'', ''Karaoke nights with friends'', ''Tropical gardening'', ''Cooking traditional Vietnamese and Hawaiian dishes'', ''Knitting and crochet'', ''Beach walks and trail
    hiking'', ''Volunteering at senior center'', ''Attending cultural festivals'', ''Exploring smartphone photography'', ''Oral storytelling sessions'']'
  career_goals: She hopes to pass on her culinary knowledge by hosting cooking workshops for younger community members, mentor teens at the local youth center, document family recipes in a small cookbook,
    stay physically active through regular walks, and become comfortable with video‑calling and photo editing to keep her connection with relatives abroad. While she does not seek formal employment, she
    aims to be a catalyst for cultural exchange and to leave a lasting legacy of community spirit.
