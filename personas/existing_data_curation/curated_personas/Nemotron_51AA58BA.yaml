  hobbies: '["Listening to music (regional Mexican, pop)","Dancing (cumbia, bachata)","Cooking experiments and recipe development","Creating short cooking videos for TikTok","Hiking local Sandhills trails","Sketching
    fashion designs","Reading young adult fiction (English and Spanish)","Journaling"]'
  career_goals: Paola aims to earn her GED within the next two years, then enroll in a culinary arts certificate program at a nearby community college. Her long‑term ambition is to become a professional
    chef who blends Mexican flavors with Southern Appalachian cuisine and eventually open a small family‑owned restaurant that provides steady employment for her siblings. She values a career path that
    offers clear structure, immediate results, and a reliable income to support her family.
