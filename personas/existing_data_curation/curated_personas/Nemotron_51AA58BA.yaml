personas:
  professional: Paola Flores, a 17‑year‑old aspiring chef and TikTok cooking‑tutorial creator, combines bilingual fluency and practical budgeting experience to structure their culinary experiments, yet
    they often let the flexibility of teen life lead to spontaneous, sometimes chaotic, recipe development.
  sports: Paola Flores spends weekends hiking the Sandhills trails near Southern Pines, joins a community dance class for cumbia and bachata, and roots for the Carolina Panthers, balancing a love for casual
    fitness with occasional lapses in consistency when they feel overwhelmed by school pressures.
  arts: Paola Flores immerses themselves in the rhythmic beats of Banda Los Recoditos and the contemporary pop of Billie Eilish, sketches runway‑inspired fashion designs, and devours YA novels by Leigh
    Bardugo, allowing the blend of music, literature, and visual art to shape their creative outlook, even when they procrastinate on assignments.
  travel: Paola Flores dreams of road‑tripping through the Blue Ridge Mountains and later visiting Oaxaca to study traditional cuisines, yet they often plan trips on a shoestring budget, alternating between
    spontaneous weekend hikes in the Sandhills and careful research of affordable hostels.
  culinary: Paola Flores delights in crafting tacos al pastor with pineapple‑glazed pork and pairing them with Appalachian smoked collard greens, constantly refining recipes on TikTok while juggling a modest
    pantry and a habit of burning the edges of their tamales when they feel stressed.
  core: Paola Flores is a goal‑driven teen who channels anxiety into bold, spicy sauces and nightly journaling, but they often procrastinate on schoolwork and let a love for spontaneous cooking override
    strict planning.
background:
  cultural: Paola is the daughter of Mexican immigrants who settled in Southern Pines, North Carolina, when she was five. She grew up in a bilingual household where Spanish is spoken at home and English
    in school and the broader community. Her family maintains Mexican traditions such as Día de los Muertos, Las Posadas, and the preparation of dishes like tamales and mole, while also participating in
    local Southern festivals, church activities, and community events. This blend of Mexican heritage and Southern small‑town culture shapes her identity, influencing her love for food, music, family celebrations,
    and her desire to share Mexican cuisine with her North Carolina neighbors.
