  career_goals: Chadwick dreams of turning his artistic passions into a career, aiming to become a multimedia creator who blends illustration, animation, and storytelling. He envisions attending a specialized
    arts high school or a college program in graphic design or game development, where he can refine his technical skills and build a professional portfolio. He hopes to launch an independent webcomic series
    and eventually work as a concept artist for video games or animated films. Recognizing his competitive edge, he also considers entering youth art contests and digital design competitions to gain exposure.
    Long‑term, he aspires to run his own creative studio that produces original content while maintaining the flexibility he values.
