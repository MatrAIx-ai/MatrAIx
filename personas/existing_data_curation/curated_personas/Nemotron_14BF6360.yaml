  career_goals: Joseph aims to become a senior construction manager overseeing large‑scale commercial and mixed‑use projects, eventually earning the Certified Construction Manager (CCM) credential. He envisions
    launching his own firm that specializes in sustainable, historically‑sensitive developments, leveraging green building standards and cutting‑edge BIM and VR technologies for design visualization. He
    also wants to play a leading role in community revitalization initiatives within Schuylkill County, fostering partnerships that blend modern infrastructure with the region’s cultural heritage.
