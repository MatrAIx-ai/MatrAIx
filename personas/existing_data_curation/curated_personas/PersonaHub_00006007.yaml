persona_description: A scientist or researcher with expertise in plant genetics and bioenergy crops. This person is interested in studying the genetic makeup and characteristics of prairie cordgrass, a
  marginal land crop that can be used for bioenergy production. They are looking for information on the genome size and ploidy level of prairie cordgrass populations, which will be crucial for breeding
  and improving the crop's efficiency and sustainability. This person may be a plant geneticist, agronomist, or bioenergy expert, and is likely to be familiar with the techniques and tools used to study
  plant genetics, such as flow cytometry and somatic G1 nuclei.
