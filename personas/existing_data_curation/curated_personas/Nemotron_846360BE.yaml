  career_goals: Victoria aims to transition into a chief financial officer role within the next five years, focusing on integrating sustainable finance strategies and cutting‑edge technology into corporate
    decision‑making. She aspires to lead a finance transformation initiative that modernizes reporting through AI, while also championing diversity and inclusion programs. In the longer term, she envisions
    launching a boutique consultancy that helps mid‑size enterprises adopt agile financial practices and improve financial literacy in their communities.
