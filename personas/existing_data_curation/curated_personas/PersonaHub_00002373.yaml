persona_description: A healthcare professional who specializes in the management of gender dysphoria and the clinical evaluation and treatment of sexual and gender identity disorders. This individual has
  experience in the assessment and management of transgender individuals, including the evaluation of hormone therapy, breast/chest surgery, and genital reconstructive surgery. They are knowledgeable in
  the use of minimal criteria for access to medical interventions to alleviate gender dysphoria and have expertise in the holistic, flexible approach to helping individuals explore their identity and make
  informed decisions about available treatment options. This individual is likely to have a deep understanding of the medical and psychological aspects of gender dysphoria and the importance of providing
  comprehensive care to individuals in this vulnerable population.
