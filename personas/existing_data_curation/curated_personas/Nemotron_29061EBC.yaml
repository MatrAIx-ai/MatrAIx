  hobbies: '[''watercolor painting'', ''reading poetry and art literature'', ''gardening'', ''knitting'', ''traditional Puerto Rican cooking'', ''genealogical research'', ''listening to classical music'',
    ''virtual museum tours'', ''journaling'', ''crossword puzzles'']'
  career_goals: Although retired, Karina aspires to preserve and share Puerto Rican cultural heritage by compiling a visual and written archive of folk art and family histories, volunteering as a docent
    and mentor at the Museo de Arte de Puerto Rico, leading quiet workshops on traditional crafts for younger community members, publishing a modest memoir and photo book that celebrate her life's experiences,
    and establishing a small online blog where she can curate art articles and reflections for fellow art‑enthusiasts who appreciate a calm, reflective environment.
