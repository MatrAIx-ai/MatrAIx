  career_goals: Cheree aspires to merge her technical acumen with her love for art and community impact. In the short term, she aims to secure a role as a UX researcher or product designer at a health‑tech
    startup that serves underserved populations, allowing her to apply data‑driven insights to create intuitive, inclusive tools. She plans to pursue a master's degree in Human‑Computer Interaction to deepen
    her expertise in user‑centered design. Long‑term, she envisions leading a community‑focused STEM outreach program in the St. Louis area, developing interactive educational platforms that empower youth
    from diverse backgrounds and advocating for policies that reduce health and technology disparities. Flexibility and creative autonomy are central to her career vision, enabling her to explore interdisciplinary
    projects while maintaining a balanced, stress‑aware lifestyle.
