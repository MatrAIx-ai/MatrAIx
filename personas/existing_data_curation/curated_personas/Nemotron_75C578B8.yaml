personas:
  professional: Cheree Scott is a budding UX researcher and product designer with a STEM background who merges data analytics in Python, JavaScript, and R with whimsical watercolor illustrations to prototype
    inclusive health‑tech tools for underserved communities, while their relaxed approach to deadlines sometimes leads to last‑minute sprint marathons.
  sports: Cheree Scott dives into ultimate frisbee leagues with the St. Louis Ultimate Club, hikes the Ozark Trail on weekends, and tunes into the St. Louis Cardinals and St. Louis City SC games, balancing
    a love for spontaneous group workouts with a habit of forgetting to stretch post‑practice.
  arts: Cheree Scott paints abstract watercolors inspired by Yayoi Kusama and blends digital illustrations that echo the surrealism of Salvador Dalí with scientific motifs, while regularly attending indie
    shows featuring bands like Snail Mail and exploring street murals by Banksy, fueling their creative impulse and social gatherings.
  travel: Cheree Scott prefers spontaneous weekend road trips to nearby national parks like the Great Smoky Mountains, dreams of visiting Kyoto during cherry blossom season, and occasionally volunteers
    in Oaxaca, Mexico to support community gardens, though budget constraints often keep them grounded in local explorations.
  culinary: Cheree Scott’s palate favors bold, experimental dishes such as miso‑glazed salmon with kimchi, spicy ramen, and homemade avocado‑lime toast topped with microgreens, though their cooking skill
    hovers at enthusiastic beginner level, leading to frequent fire‑alarm visits during impromptu midnight snack attempts.
  core: Cheree Scott blends scientific rigor with artistic whimsy, trading structured plans for spontaneous creativity, all while juggling anxiety‑fuelled worry and a love for community‑centered collaboration.
background:
  cultural: Cheree is a second‑generation African‑American raised in Wildwood, a suburban enclave of St. Louis County. Her parents, who migrated to Missouri in the early 1990s, kept close ties to Southern
    culinary traditions, gospel music, and the church community, fostering a strong sense of family and cultural pride. Growing up, she regularly attended Juneteenth celebrations and local Black cultural
    festivals, absorbing the rich jazz, blues, and hip‑hop heritage of the St. Louis region. These experiences nurtured her appreciation for collective storytelling and community solidarity. While navigating
    a predominantly white suburban environment, Cheree has cultivated a nuanced identity that blends Midwestern values of practicality with the resilience and creativity of Black cultural expression, motivating
    her commitment to equity‑focused STEM outreach and artistic collaboration.
