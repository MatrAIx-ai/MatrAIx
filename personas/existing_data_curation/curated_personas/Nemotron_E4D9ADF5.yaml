personas:
  professional: Christina Little, a seasoned pharmacy aide with over thirty years of experience, leverages her methodical record-keeping, inventory mastery, and empathetic patient communication to keep
    the local drugstore running smoothly, while her curiosity drives her to stay current on pharmacy practices and mentor new aides with assertive, organized guidance.
  sports: Christina Little, a devoted fan of Louisville’s sports scene, routinely attends Louisville Cardinals men’s basketball games and follows the Louisville Bats minor-league baseball team, while she
    stays active by joining the local senior walking club for morning strolls along the Ohio River Trail each spring, prefers low-impact exercise over competitive sports, and enjoys seasonal community pickleball
    leagues in the fall despite occasional sore knees.
  arts: Christina Little, an avid patron of the arts, spends her weekends wandering the Speed Art Museum and the Kentucky Center for the Performing Arts, where she admires works by regional painter Mary
    Beth McIntosh, delights in folk-rock recordings by John Prine and bluegrass legend Bill Monroe, and channels her own creativity through quilting projects inspired by folk motifs, often listening to
    live sounds of the Louisville Symphony during intermissions.
  travel: Christina Little, a nostalgic road-trip enthusiast, carefully plans weekend getaways using a printed map and a notebook, favoring historic sites like the Shaker Village at Pleasant Hill, the Civil
    War battlefields of Perryville, and small-town festivals in Bardstown and Lexington, while dreaming of a cross-country visit to Colonial Williamsburg, yet she keeps travel modest to protect her fixed
    pension.
  culinary: Christina Little, a modest home cook with a green thumb, delights in preparing garden-fresh heirloom tomato salads drizzled with aged balsamic vinegar, stews of slow-cooked pork shoulder seasoned
    with sweet paprika and fresh rosemary, and classic Kentucky bourbon-glazed chicken, while she occasionally indulges in a slice of pecan pie at the local diner, and her quilting afternoons often conclude
    with a cup of Earl Grey tea sweetened with honey.
  core: Christina Little, a curious and organized septuagenarian, blends meticulous pharmacy work, art-filled leisure, and a steady devotion to community, all while occasionally forgetting to water her
    succulents and splurging on a vintage quilting pattern.
background:
  cultural: Christina grew up in a white, middle‑class Kentucky family where community, hospitality, and a strong sense of tradition were central values. The cultural fabric of Louisville, with its blend
    of Southern charm, bourbon heritage, horse‑racing excitement, and a vibrant arts scene, has shaped her outlook. She identifies with the region’s emphasis on neighborly support and church involvement,
    while also embracing the city’s more progressive cultural offerings such as theater, music festivals, and contemporary art. Her background includes participation in local customs like attending Kentucky
    Derby festivities and supporting local farmers’ markets, which inform her appreciation for regional food, crafts, and folk traditions.
attributes:
  skills: '[''Medication preparation'', ''Prescription order verification assistance'', ''Inventory management'', ''Pharmacy software operation'', ''Patient counseling'', ''Record-keeping'', ''First aid/CPR
