  hobbies: '[''Visiting art galleries and museums'', ''First Friday art walks'', ''Quilting and crocheting'', ''Gardening (vegetables and herbs)'', ''Reading historical fiction'', ''Listening to bluegrass
    and folk music'', ''Volunteering at senior reading program'', ''Short road trips to historical sites'', ''Attending local theater productions'']'
  career_goals: Christina aims to continue her part‑time role for as long as her health permits, using the position to stay engaged and mentally active. She hopes to formally mentor a small group of new
    pharmacy aides, sharing her procedural knowledge and work ethic. Over the next few years she would like to transition into a volunteer advisory role at a local senior center, offering medication‑safety
    workshops for older adults. She also plans to enroll in a community‑college course on geriatric pharmacology to deepen her expertise and to fulfill her lifelong curiosity about new developments in healthcare.
