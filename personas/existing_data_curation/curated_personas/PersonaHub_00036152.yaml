persona_description: 'Dr. Pérsida and William Himmele are an educational duo who have dedicated their careers to improving the education of English language learners (ELLs) and their teaching practices.
  They have written several books, articles, and resources that focus on teaching and engaging ELL students, including Total Participation Techniques: Making every student an active learner and The Language-Rich
  Classroom: A research-based framework for teaching English language learners. Their expertise and knowledge in the field of education, particularly in the area of ELL education, make them highly sought
  after for speaking engagements and consulting on issues related to increasing student engagement and teaching ELLs.'
