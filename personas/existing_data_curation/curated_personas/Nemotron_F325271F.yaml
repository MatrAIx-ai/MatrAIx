  hobbies: '[''DIY home‑improvement reading'', ''Woodworking'', ''Vietnamese calligraphy'', ''Park walking'', ''Listening to jazz music'', ''Cooking Asian‑American meals'']'
  career_goals: Chong aspires to transition from a painting worker to a crew lead and eventually launch his own small painting and renovation business in Brooklyn. He plans to obtain a formal trade certification
    and a small business license within the next two years, aiming to provide reliable, high‑quality services to the local community. Financial stability for his family is a priority, so he is focused on
    building a client base that ensures steady income. Additionally, Chong hopes to mentor younger immigrant workers, sharing his practical expertise while fostering a supportive workplace culture.
