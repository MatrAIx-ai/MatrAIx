personas:
  professional: Peggy Moreno, a senior police investigator with two decades of service in Kendallville, seamlessly blends meticulous crime‑scene documentation, data‑driven crime‑mapping, and calm crisis
    de‑escalation with a curious, art‑inspired outlook, turning community‑focused outreach into strategic policing initiatives while assertively mentoring junior officers, and they consistently champion
    data‑driven decision‑making.
  sports: Peggy Moreno, an energetic fitness enthusiast, leads a weekend hiking club for fellow officers across the rolling hills near Kendallville, attends high‑intensity boot‑camp classes at the local
    gym, plays on a co‑ed recreational softball league with the police department, and they passionately support the Indiana Pacers and Indianapolis Colts, often cheering them on at the Bankers Life Fieldhouse
    and Lucas Oil Stadium.
  arts: Peggy Moreno, a curious watercolorist and community‑theater improviser, paints Indiana farmland scenes inspired by Thomas Hart Benton and Ansel Adams, volunteers as a docent at the annual county
    fair art showcase, performs improv sketches at the local theater, and they find creative respite in the folk ballads of John Prine and the piano preludes of Debussy during church socials.
  travel: Peggy Moreno, a methodical planner with a love for scenic escapes, maps detailed weekend road trips to the Indiana Dunes and the historic covered bridges of Madison, dreams of trekking New Zealand’s
    Milford Track, and they balance a modest travel fund by setting aside a portion of each paycheck while occasionally indulging in a summer getaway to Tuscany’s vineyards.
  culinary: Peggy Moreno, an intermediate home cook who tends a small vegetable garden, delights in preparing fresh beet and goat‑cheese salads, slow‑roasted pork tenderloin with apple glaze, and a classic
    Indiana sugar‑cream pie, while they occasionally treat themselves to sushi rolls with tuna and avocado after a long shift.
  core: Peggy Moreno is a disciplined, art‑infused police veteran who balances meticulous crime analysis with spontaneous watercolor sessions, yet they can't resist binge‑reading true‑crime novels late
    into the night.
background:
  cultural: Peggy Sue Moreno grew up in a small‑town Midwestern environment, shaped by the community‑oriented values of northeastern Indiana. Her upbringing emphasized hard work, self‑reliance, and civic
    responsibility, fostering a deep respect for public service. While identifying as white with European ancestry, she has long embraced the cultural diversity of DeKalb County, incorporating local traditions—from
    county fairs to heritage festivals—into her personal and professional life. This blend of Midwestern pragmatism and openness to varied experiences informs her approach to policing, community engagement,
    and her appreciation for the arts.
