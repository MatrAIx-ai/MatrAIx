  career_goals: Peggy Sue Moreno aspires to advance to the rank of police lieutenant or captain within the Kendallville Police Department, where she can shape departmental strategy and mentor a larger cohort
    of officers. She seeks to formalize a community-arts partnership that uses public murals, workshops, and youth art programs as preventative tools against crime and to foster trust. To support these
    ambitions, she plans to complete a bachelor's degree in criminal justice and attend advanced leadership courses at the state police academy. Ultimately, she envisions transitioning into a training role,
    imparting her organized, data-focused, and compassionate approach to the next generation of law-enforcement professionals.
