personas:
  professional: Mark Carter, a boutique salon owner‑scientist in Orem, blends a decade of hair‑design experience with a chemist’s precision, using advanced color formulation, geometric facial analysis,
    and data‑driven inventory control to deliver personalized, evidence‑based hair care, while their meticulous organization and solitary work style keep the studio a quiet laboratory of beauty.
  sports: Mark Carter, a solo hiker and member of the Wasatch Forefront Hiking Club, tackles the Wasatch foothills each weekend, follows the Utah Jazz and Real Salt Lake with fervor, and incorporates weekly
    indoor rock‑climbing sessions at The Front Climbing Club to stay fit, preferring low‑impact, nature‑centric exercise over team sports.
  arts: Mark Carter, an acoustic guitarist who reveres the folk stylings of Nick Drake and the intricate melodies of Sufjan Stevens, dedicates evenings to recording homemade tracks, curates a personal collection
    of classic sci‑fi novels by Isaac Asimov and Arthur C. Clarke, and draws photographic inspiration from Ansel Adams’ black‑and‑white landscapes, all of which inform their aesthetic sensibility in salon
    design.
  travel: Mark Carter, whose wanderlust blends scientific curiosity with scenic appreciation, has trekked the red canyons of Zion and Bryce, plans annual research trips to Kyoto’s botanical gardens, eagerly
    anticipates a summer tour of the Italian Alps for mineral water studies, yet prefers low‑key, budget‑conscious travel to avoid disruption of their meticulous salon schedule.
  culinary: Mark Carter, an experimental home chef, favors plant‑based fare, crafting quinoa salads with roasted pomegranate seeds, pistachios, and a drizzle of rosemary‑infused olive oil, while their precision
    extends to measuring exact macros for each dish and they often test natural hair‑care ingredients like argan oil alongside their meals.
  core: Mark Carter, the solitary hair‑science enthusiast, balances obsessive organization with a deep curiosity, channels stress into meticulous salon experiments, and occasionally indulges in late‑night
    guitar sessions and elaborate quinoa salads, all while cautiously navigating financial investments and chronic eczema.
background:
  cultural: Mark is a white American raised in the suburban environment of Utah County, where the cultural milieu blends a strong emphasis on family, community, and self‑reliance with the outdoor lifestyle
    of the Intermountain West. Growing up in Orem, he was exposed to the values of the predominant LDS‑influenced community—modesty, hard work, and service—though he identifies more broadly with mainstream
    American cultural norms. His educational path in STEM reflects the region's support for technical education, while his career in cosmetology illustrates the growing acceptance of diverse professional
    choices within the local culture. He frequently participates in regional events such as the Utah State Fair and enjoys the seasonal outdoor activities that are central to Utah's cultural identity.
attributes:
  skills: '["Advanced color formulation", "Precision cutting with geometric analysis", "Hair chemistry and product formulation", "Digital salon management and scheduling", "Inventory control and financial
    forecasting", "Cosmetology education and mentorship", "Evidence‑based hair‑care protocol development", "DIY hair‑care lab experimentation"]'
  hobbies: '["Solo hiking and nature photography", "Reading scientific journals and science‑fiction literature", "DIY hair‑care formulation experiments", "Mindfulness meditation", "Acoustic guitar playing",
    "Attending advanced hair‑care workshops"]'
  career_goals: He aims to open a boutique salon in Orem that integrates scientific research with personalized hair‑care, offering clients custom‑formulated treatments backed by data. Within the next five
    years, Mark plans to launch his own line of chemically balanced, cruelty‑free hair products, leveraging his STEM expertise and partner with local universities for product testing. He also intends to
    become a certified Cosmetology Instructor at the Utah College of Beauty Arts, sharing his analytical approach with the next generation of stylists. Ultimately, Mark envisions establishing a regional
    hub for hair‑science research and consultancy, positioning himself as a thought leader who bridges the gap between beauty and science while maintaining a stable, family‑friendly schedule.
