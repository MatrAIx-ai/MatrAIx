  hobbies: '[''Photography'', ''Sketching'', ''Live music concerts'', ''Hiking'', ''Calligraphy'', ''Tabletop RPGs'', ''Cooking experimental dishes'', ''Craft brewery visits'', ''Art gallery tours'', ''Tech
