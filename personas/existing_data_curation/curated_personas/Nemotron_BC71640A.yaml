  career_goals: Pierce aims to become a senior industrial engineer leading cross‑functional safety and sustainability initiatives within a forward‑thinking manufacturing firm, eventually advancing to a
    Safety Manager or Director role. He is passionate about integrating AI‑driven predictive safety and environmentally conscious practices into production lines, and envisions launching his own consultancy
    that helps midsize companies adopt ergonomic best practices while reducing waste. He also seeks to mentor junior engineers, contribute thought pieces to industry journals, and maintain a work‑life balance
    that supports his growing family.
