personas:
  professional: Pierce Haubert, a 28‑year‑old certified Six Sigma Green Belt industrial engineer, merges data‑driven process optimization and ergonomic design with an artistic eye, using Python, R, and
    SolidWorks to prototype safety‑centric production layouts while thriving in flexible, kanban‑driven teams that value improvisation as much as measurable improvement.
  sports: Pierce Haubert enjoys weekend hikes through the Texas Hill Country, occasional trail runs with the Austin Trail Runners club, and follows Austin FC and the Texas Longhorns, balancing a laid‑back
    yoga practice for flexibility with sporadic gym visits that they sometimes skip when a new photography project captures their attention.
  arts: Pierce Haubert immerses themselves in Austin’s vibrant arts scene, capturing long‑exposure shots of downtown murals, sketching industrial structures with a self‑taught style inspired by David Hockney,
    attending live shows at The Mohawk featuring St. Vincent, and practicing calligraphy as a meditative counterpoint to their analytical work.
  travel: Pierce Haubert favors spontaneous road trips to Hill Country vineyards like Becker Vineyards and cultural escapes to Santa Fe, while dreaming of photographing Icelandic waterfalls and exploring
    Japan’s tech districts, planning most getaways with a quick notebook list rather than rigid itineraries and balancing travel costs against their family’s future savings goals.
  culinary: Pierce Haubert experiments in the kitchen with dishes such as miso‑glazed salmon topped with chipotle‑corn salsa and saffron‑infused risotto, relishes the smoky notes of Jester King’s barrel‑aged
    beers, and occasionally leaves a pile of dishes in the sink after late‑night cooking sessions with their spouse.
  core: Pierce Haubert is a 28‑year‑old industrial engineer who fuses data‑driven safety solutions with a love for long‑exposure photography, but often rolls over paperwork deadlines and can’t resist a
    craft‑brew after a day of ergonomic tinkering.
background:
  cultural: Pierce grew up in a Midwestern suburb within a German‑American family, where practical problem‑solving and community values were emphasized. Relocating to Austin exposed him to the city’s eclectic
    blend of tech entrepreneurship, progressive arts, and Texan hospitality. This mix shapes a cultural identity that honors hard work and reliability while celebrating creativity, openness, and collaborative
    spirit. His white American background, combined with the diverse influences of central Texas, informs his appreciation for inclusive design and his willingness to question conventional engineering norms.
