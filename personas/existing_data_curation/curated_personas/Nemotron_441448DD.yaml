  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Attending jazz and soul concerts'', ''Reading contemporary nonfiction'', ''Traveling to cultural festivals'', ''Cooking and tasting diverse
    cuisines'', ''Gardening'', ''Nature walks'', ''Community book club'', ''Writing travel journal'']'
  career_goals: She aims to advance into a senior management role within her credit department, eventually becoming a branch manager or regional director where she can shape lending policies that promote
    equitable access to credit. Faustina is passionate about establishing a community‑focused financial empowerment program that pairs credit counseling with arts‑based workshops to engage underserved borrowers.
    She plans to earn the Certified Financial Planner (CFP) designation and to pursue a master’s degree in community development to deepen her expertise. Long‑term, she envisions launching her own consulting
    firm that offers culturally responsive financial coaching and advocacy for policy reforms that reduce predatory lending in Black communities.
