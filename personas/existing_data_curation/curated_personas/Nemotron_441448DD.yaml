personas:
  professional: Faustina Sellars, a senior credit analyst at a regional bank, blends deep expertise in loan underwriting, risk assessment, and financial counseling with a vibrant curiosity and artistic
    perspective, turning complex credit data into clear, compassionate reports while occasionally misplacing paperwork due to a relaxed approach to organization.
  sports: Faustina Sellars enjoys low‑impact fitness, joining a Riverfront Walking Club for weekly strolls along the Missouri River, cheering on the Kansas City Chiefs in fall football and the St. Louis
    Cardinals in spring baseball, and occasionally plays gentle water aerobics at the local community pool.
  arts: Faustina Sellars, an avid watercolorist in her home studio, regularly visits Boone County Historical Society exhibits, attends live performances by local jazz ensembles featuring artists like Kamasi
    Washington and soul tributes to Aretha Franklin, and draws creative inspiration from painters such as Georgia O'Keeffe and Claude Monet.
  travel: Faustina Sellars favors unstructured, curiosity‑driven trips, documenting regional cultural festivals in Asheville, NC and New Orleans, LA, while dreaming of a leisurely week in the vineyards
    of Tuscany, Italy, balancing modest travel budgets with occasional splurges on gourmet food tours.
  culinary: Faustina Sellars, a competent home cook, delights in preparing grilled salmon with a miso‑ginger glaze, roasted root vegetables seasoned with rosemary, and a seasonal garden salad topped with
    heirloom tomatoes, while indulging in soul food classics like shrimp and grits during outings, and she experiments with spices from her travels.
  core: Faustina Sellars is a financially savvy, art‑obsessed credit professional who channels curiosity into community empowerment, yet often juggles paperwork chaos, worries about health, and the occasional
    impulsive art‑supply splurge.
background:
  cultural: Faustina is an African‑American woman whose family’s roots trace back to the Great Migration, bringing a blend of Southern culinary traditions and Midwestern community values to Columbia, Missouri.
    Growing up in a close‑knit Black church community, she was immersed in gospel music, storytelling, and a tradition of mutual aid. Her name, Latifah, reflects a personal connection to African and Islamic
    cultural influences, and she actively supports local Black artists and cultural events. This heritage informs her empathetic approach to counseling, her advocacy for financial equity, and her appreciation
    for art as a means of cultural expression and empowerment.
attributes:
  skills: '[''Credit analysis'', ''Loan underwriting'', ''Financial counseling'', ''Risk assessment'', ''Regulatory compliance'', ''Client relationship building'', ''Negotiation'', ''Conflict resolution'',
