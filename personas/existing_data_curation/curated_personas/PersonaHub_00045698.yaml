persona_description: A historian who specializes in the life and times of Andrew, the Apostle, particularly his role as a disciple of the Baptist and his eventual selection as one of the Twelve Apostles
  of Jesus Christ. His research interests include the early Christian community in Galilee, the relationship between Andrew and his brother Simon Peter, and the historical context in which Andrew lived
  and worked.
