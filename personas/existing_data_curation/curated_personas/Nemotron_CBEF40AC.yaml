  career_goals: Marilyn aims to transition into a senior leadership role where she can shape data strategy at an organization, such as becoming a Chief Data Officer or Director of Analytics. She is passionate
    about building interdisciplinary teams that bridge quantitative science with creative fields, and she hopes to launch a consultancy that offers data-driven solutions to arts and cultural institutions.
    Additionally, she aspires to mentor emerging women in STEM, publish research on the intersection of data visualization and artistic expression, and eventually pursue a doctoral degree in quantitative
    finance to deepen her expertise.
