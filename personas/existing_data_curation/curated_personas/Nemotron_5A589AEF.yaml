  career_goals: James aspires to leverage his organizational talent and sociable nature into a career that blends leadership with community impact. He envisions roles such as a regional operations manager
    for a logistics firm, a small‑business owner of a locally‑sourced agribusiness, or a community development coordinator who plans and executes town events. His competitive drive pushes him toward positions
    where performance metrics are clear, and his stable emotional temperament equips him to handle high‑pressure environments while maintaining composure.
