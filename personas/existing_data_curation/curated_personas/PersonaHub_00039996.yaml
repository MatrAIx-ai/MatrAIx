persona_description: A marine biologist who specializes in the study of the North Sea ecosystem, particularly focusing on the impact of water pollution, overfishing, and sea floor disturbance. She is interested
  in the history of the North Sea, including the impact of overfishing on small fishing villages along the east coast of Scotland, and the ongoing threats to the biota. She is also interested in the ecological
  impacts of sea floor disturbance, particularly the loss of benthic habitat and the aggravation of turbidity through mechanical disturbance.
