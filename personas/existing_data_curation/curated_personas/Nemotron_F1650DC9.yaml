  hobbies: '[''Digital drawing and illustration'', ''Creative writing (speculative short stories, poetry)'', ''Playing chess and Go'', ''Coding generative art projects'', ''Solving logic puzzles (Rubik’s
    Cube, Sudoku)'', ''Listening to ambient/electronic music'', ''Urban photography'', ''Project planning and personal portfolio development'']'
  career_goals: Martin aspires to become a concept artist and visual developer for independent video games, eventually founding his own studio where he can blend narrative, art, and procedural generation.
    He aims to gain admission to a specialized art‑technology high school and later study digital media or interactive design at a university, building a professional portfolio that showcases his unique
    fusion of Southeast Asian cultural elements and futuristic aesthetics. In the longer term, he hopes to exhibit his digital paintings in galleries, contribute to immersive VR experiences, and perhaps
    explore a research role that merges AI‑generated art with human creativity.
