personas:
  professional: A civil engineer named Alfredo Leiva blends structural design expertise with a love for public art, leveraging BIM modeling and bilingual communication to champion sustainable, community‑focused
    infrastructure projects in Chicago, while juggling a relaxed, sometimes disorganized work style and a persistent undercurrent of worry about meeting deadlines.
  sports: Alfredo Leiva fuels his competitive streak by playing forward in a Chicago YMCA recreational basketball league, cheering on the Bulls and White Sox, and joins a local salsa‑dance fitness class
    that doubles as cardio, while he occasionally skips workouts when project deadlines loom.
  arts: Alfredo Leiva captures Chicago’s vibrant street life through photography inspired by Henri Cartier‑Bresson, sketches murals echoing the bold colors of Diego Rivera, attends improv comedy nights
    featuring local troupe The Second City, and dances to salsa rhythms popularized by Celia Cruz.
  travel: Alfredo Leiva prefers spontaneous weekend getaways to culturally rich spots like Antigua, Guatemala, and Berlin’s art districts, mixes meticulous itinerary planning for longer trips with on‑the‑fly
    adjustments, and dreams of exploring the rice terraces of Bali while balancing his budget and work commitments.
  culinary: Alfredo Leiva delights in cooking pepian and kakʼik with roasted pepitas and achiote, experiments by adding smoked chipotle to traditional tamales, and enjoys sourcing heirloom corn at local
    farmers’ markets, yet often burns the salsa when juggling a deadline.
  core: Alfredo Leiva is a charismatic, art‑obsessed engineer who channels his anxiety into creative community projects, juggling spontaneous bursts of spending and occasional disorganization with a deep
    commitment to sustainable design.
background:
  cultural: Born to Guatemalan parents, Alfredo grew up immersed in a bilingual household that celebrated traditions like Día de los Muertos, Semana Santa, and the rich flavors of Central American cuisine.
    Moving to the United States for college, he now lives in Chicago’s vibrant neighborhoods where Latin American culture and the city’s architectural heritage intersect. He maintains strong ties to the
    local Guatemalan community, often volunteering at cultural festivals and supporting immigrant‑focused civic initiatives. His background instills a deep respect for collectivism, family, and community
    resilience, which he channels into his professional focus on inclusive, people‑centered design.
attributes:
  skills: '["Structural design (concrete and steel)", "AutoCAD/Revit BIM modeling", "Project planning and coordination", "Geotechnical analysis", "Sustainable design principles", "Construction site safety
    management", "Budget estimation and cost control", "GIS mapping for infrastructure", "Multilingual communication (Spanish/English)", "Creative problem solving", "Public speaking and community engagement"]'
  hobbies: '["Street photography", "Visiting art museums and galleries", "Urban sketching", "Recreational basketball league", "Salsa dancing", "Community gardening volunteer work", "Travel planning and
    exploration", "Cooking Guatemalan cuisine", "Reading about sustainable architecture", "Attending tech meetups and hackathons", "Improvisational comedy classes", "Meditation and yoga practice"]'
  career_goals: Alfredo aims to become a senior project manager leading large‑scale, eco‑friendly infrastructure projects that weave art and community culture into the built environment. He plans to earn
    his Professional Engineer (PE) license, pursue advanced certification in BIM, and eventually launch a consultancy focused on sustainable urban design for underserved neighborhoods in Chicago. Balancing
    his desire for flexibility with professional growth, he also seeks roles that allow for creative autonomy and reduced bureaucratic strain, while cultivating a healthier work‑life balance to manage his
    stress and worry.
