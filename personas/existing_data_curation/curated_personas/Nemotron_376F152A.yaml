personas:
  professional: Cody Dobbs, a retired mechanical engineer, leverages their lifelong troubleshooting and project‑management skills; they lead a community maker space for seniors and teens, direct a micro‑solar
    power project for the town hall, and mentor high‑school engineering students while maintaining high standards in woodworking and vintage‑car restoration.
  sports: Cody Dobbs is a passionate river fisherman, a frequent competitor in senior chess tournaments, and a devoted fan of the New Orleans Saints and Mississippi State Bulldogs; they often travel to
    attend games when their schedule permits.
  arts: Cody Dobbs volunteers as a set carpenter for the town’s community theater, enjoys classic folk songs by Johnny Cash and contemporary narratives by Lin‑Manuel Miranda, and spends evenings reading
    tech‑focused books by Malcolm Gladwell; they blend their love of performance with a curiosity for emerging ideas.
  travel: Cody Dobbs prefers meticulously planned road trips; they have explored Nashville, New Orleans, and the Gulf Coast on weekend getaways, and they dream of driving the historic Route 66 through the
    heartland to visit small‑town craft fairs.
  culinary: Cody Dobbs delights in cooking Southern comfort dishes such as fried catfish with hushpuppies, collard greens simmered with smoked turkey, and preserves heirloom tomatoes from their garden;
    they often use their wood‑fired smoker to add a smoky flavor to BBQ ribs.
  core: Cody Dobbs blends disciplined engineering precision with a sociable, competitive spirit; they turn their hands‑on hobbies into community projects while staying impeccably organized and remarkably
    calm.
background:
  cultural: Cody was born and raised in Simpson County, Mississippi, into a multigenerational farming family. His upbringing emphasized Southern customs—church gatherings, family barbecues, and a strong
    sense of community responsibility. While the region’s conservative values shaped his pragmatic outlook, his bachelor’s degree in a STEM field introduced him to broader technological perspectives. He
    maintains a deep respect for traditional Southern hospitality, self‑reliance, and modest living, yet he actively seeks to blend these roots with innovative ideas, especially in sustainable agriculture
    and community development.
attributes:
  skills: '["Mechanical troubleshooting", "Agricultural equipment maintenance", "Renewable energy system design", "Data analysis and optimization", "Project management", "Budgeting and financial oversight",
