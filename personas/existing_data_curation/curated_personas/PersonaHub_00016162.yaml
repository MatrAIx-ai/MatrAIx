persona_description: A member of the English Department who has expertise in teaching writing and has developed a curriculum that emphasizes the development of writing skills across different levels of
  the curriculum. The person is likely to have experience in teaching both personal and narrative writing, and is familiar with the transition from these forms to more elaborated, public, and professional
  forms of writing. The person is also knowledgeable about the interrelationship between genre and task in writing, and has developed procedures and documents to track and assure continued progress in students'
  writing ability. The person has a deep understanding of the importance of writing development in the Department's content-oriented curriculum and is dedicated to helping students develop their writing
  skills.
