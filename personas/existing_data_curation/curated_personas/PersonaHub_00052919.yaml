persona_description: Dr. John L. Jifon, an Assistant Professor in Horticultural Sciences at Texas AgriLife Research, is focused on environmental stress physiology of plants, specifically on improving crop
  water use efficiency and the health-promoting properties of foods. His research is driven by the need to optimize productivity and quality by improving plant tolerance to environmental stresses. He aims
  to use integrated measurements obtained at leaf, whole-plant, and stand levels to study factors that regulate photosynthetic efficiency, water/nutrient use efficiency, assimilate partitioning, yield and
  quality. Dr. Jifon's research has significant implications for improving on-farm water conservation, reducing production costs, and improving the health-promoting properties of target crops.
