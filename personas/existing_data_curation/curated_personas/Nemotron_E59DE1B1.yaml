  hobbies: '["reading","journaling","herb gardening","cooking Hawaiian‑inspired dishes","hiking","birdwatching","yoga","mindfulness meditation","nature photography","knitting","crocheting","library volunteering"]'
  career_goals: Janet aims to deepen her professional credentials by earning the Certified Administrative Professional (CAP) certification and completing a part‑time bachelor’s degree in Business Administration.
    She envisions moving from a general secretary role to an executive assistant position supporting senior leadership, and eventually stepping into an office manager or operations coordinator role where
    she can influence workflow efficiency. Long‑term, Janet is interested in establishing a remote virtual‑assistant business that serves nonprofit organizations, aligning her career with her desire for
    stability, autonomy, and community contribution. She also hopes to specialize in records management and compliance within a local government or community agency, reflecting her commitment to harmony
    and reliable service.
