personas:
  professional: Raymond Cherry, a seasoned hospitality veteran with four decades of expertise in concierge services, baggage handling, and guest relations, leverages meticulous organization, a curious eye
    for art, and assertive yet compassionate leadership to craft personalized itineraries that showcase Maine’s natural beauty and cultural scene.
  sports: Raymond Cherry stays active through regular hikes with the Androscoggin County Hiking Club, follows the Portland Sea Dogs and the New England Patriots, joins a seasonal cross‑country skiing league
    in winter, and balances his fitness regimen with disciplined morning walks that double as photography outings.
  arts: Raymond Cherry is a watercolor painter inspired by Winslow Homer and Claude Monet, frequently volunteers at the Portland Museum of Art’s community events, curates local gallery shows featuring artists
    like John Fery, and enjoys theater productions at the Ogunquit Playhouse, with a particular fondness for performances by the Portland Stage Company.
  travel: Raymond Cherry prefers meticulously planned road trips that blend art and nature, having toured Acadia National Park, Bar Harbor, and Montreal’s vibrant museum district, while dreaming of a summer
    itinerary through Florence, Italy and the vineyards of Bordeaux, always using loyalty points to stretch his modest travel budget.
  culinary: Raymond Cherry, an enthusiastic home cook, favors regional staples such as lobster rolls, New England clam chowder, and blueberry crisp, skillfully crafts wooden serving boards in his workshop,
    and pairs meals with craft brews like Allagash White, often seasoning with fresh dill and thyme.
  core: Raymond Cherry blends disciplined hospitality expertise with a lifelong passion for art, hiking, and curated experiences, all while juggling modest indulgences and a meticulous, curious approach
    to life.
background:
  cultural: Raymond was born and raised in the New England region, reflecting traditional Anglo‑American values of self‑reliance, community engagement, and a deep appreciation for the natural landscape.
    His family roots trace back to early English settlers in Maine, and he identifies strongly with the state's maritime heritage, seasonal festivals, and culinary traditions such as lobster, maple syrup,
    and blueberry pie. Living in Auburn has deepened his connection to the local arts scene, historic architecture, and the close‑knit community ethos of Androscoggin County, shaping a cultural identity
    that blends modesty, pride, and a love of varied experiences.
