  career_goals: Although retired from formal employment, Amelia remains driven to make a lasting impact. She aspires to lead a yearly senior arts showcase that highlights local talent, serve as an advisory
    board member for the Sunflower Historical Society, and complete a memoir that weaves together personal memories with the town's evolving history. She also hopes to continue her education through community
    college courses on art history and digital storytelling, and to mentor emerging volunteers, ensuring the community's traditions are passed on to the next generation.
