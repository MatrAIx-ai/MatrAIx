persona_description: A business analyst who specializes in the analysis of global economic trends, particularly in relation to the impact of globalization on wage disparity and energy consumption. They
  are interested in understanding how the laws of physics deal with the distribution of goods and services in an economy, and how changes in energy consumption can affect global economic growth. They are
  also concerned with the potential negative consequences of a declining energy supply, such as a decline in world GDP, and are looking for new sources of cheap energy to replace the benefit received from
  China and India's rapid energy consumption growth.
