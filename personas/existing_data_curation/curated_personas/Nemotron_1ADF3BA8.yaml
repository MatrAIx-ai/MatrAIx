personas:
  professional: Henry Mashburn is a high‑school senior whose knack for organization, public speaking, and conflict resolution drives them to lead the debate club, coordinate school events, and volunteer
    at an animal shelter, all while they prepare to study Public Health or Social Work and ultimately become a community outreach coordinator.
  sports: Henry Mashburn eagerly plays point guard in a local basketball league, follows the Kentucky Wildcats men's basketball team, hikes weekend trails with the Bluegrass Trail Club, and occasionally
    attends Louisville Cardinals football games, integrating disciplined training sessions into their schedule and using these activities to channel their energetic and sociable nature.
  arts: Henry Mashburn spends evenings strumming acoustic guitar to the tunes of John Prine and Ed Sheeran, attends open‑mic nights at Lexington coffee houses, and watches indie films starring Saoirse Ronan,
    letting the blend of folk music and cinema shape their creative outlet and offering a balanced counterpoint to their organized daily routine.
  travel: Henry Mashburn dreams of weekend road trips to Asheville’s Blue Ridge Parkway, a summer volunteer stint in Costa Rica, and a future backpacking adventure along the Appalachian Trail, while they
    currently favor budget‑friendly stays at Airbnbs in Nashville and Cincinnati for short getaways, balancing adventure with the practical constraints of a high‑school budget.
  culinary: Henry Mashburn enjoys cooking simple yet regional dishes such as bourbon‑glazed chicken, fried green tomato BLT, and homemade cornbread, experimenting with ingredients like sweet potatoes, smoked
    paprika, and local honey, and they often share these meals with friends during study sessions, using cooking as a social bridge.
  core: Henry Mashburn is a methodical, socially‑charged 18‑year‑old who juggles basketball, guitar practice, and community service while they habitually forget to eat breakfast and constantly carry a planner.
background:
  cultural: Henry was raised in a middle‑class, white family in Lexington, Kentucky. His upbringing blends Southern hospitality with the pragmatic, community‑oriented values of the Bluegrass region. He
    grew up attending University of Kentucky sporting events, local horse‑show festivals, and community service projects organized by his family’s Methodist congregation. This environment emphasized education,
    modest conservatism, and a strong sense of civic duty, shaping his reliable, cooperative, and service‑focused outlook.
