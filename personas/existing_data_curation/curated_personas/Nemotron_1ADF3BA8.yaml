  hobbies: '[''Basketball'', ''Hiking'', ''Acoustic guitar'', ''Volunteer work at animal shelter'', ''Debate club'', ''Cooking'', ''Video gaming'']'
  career_goals: Henry aims to enroll in a four‑year university to study Public Health or Social Work, with the long‑term goal of becoming a community outreach coordinator focused on youth mentorship and
    health education. He plans to supplement his degree with a certification as an Emergency Medical Technician, allowing him to contribute directly to emergency response efforts. Ultimately, he aspires
    to lead a nonprofit organization that creates inclusive programs for disadvantaged families in the Lexington area, combining his organizational strengths with his compassionate desire to help others.
