personas:
  professional: Robert Cook is a high‑school linebacker and budding automotive technician who channels his methodical, hands‑on skills into leading his football defense while mastering modern vehicle diagnostics,
    reflecting his practical curiosity and organized mindset; they thrive on teamwork and precision.
  sports: Robert Cook is a linebacker for his high‑school football team, a die‑hard Dallas Cowboys fan, and a regular at the local skate park where they practice tricks with friends while cheering on the
    Dallas Mavericks and following the Texas Rangers in baseball.
  arts: 'Robert Cook expands their creative palate by listening to Travis Kendrick, Led Zeppelin, and local Texas country‑rock bands, devouring the latest action‑movie releases like ‘Top Gun: Maverick’,
    and occasionally sketching custom car graphics inspired by classic hot‑rod artwork.'
  travel: Robert Cook has road‑tripped to Austin’s music scene and hiked the Colorado Rockies on a school field trip, they dream of touring Detroit’s auto museums and Japan’s Tokyo Shibuya district for
    car culture, and they hope to spend the summer after graduation at a community‑college internship in Austin.
  culinary: Robert Cook favors Texas‑style barbecue—slow‑smoked brisket, spicy chili, and homemade mac and cheese—while often grilling rib‑eyed steaks on their project car’s custom exhaust, supplementing
    meals with protein shakes and the occasional slice of pepperoni pizza after late‑night gaming sessions.
  core: Robert Cook is a 17‑year‑old Texas‑raised linebacker‑mechanic whose competitive edge, DIY drive, and community‑rooted reliability push them toward a future in custom automotive performance while
    balancing teen life’s impulsive cravings.
background:
  cultural: Robert grew up in a middle‑class neighborhood in Fort Worth, Texas, in a family that traces its roots back to the Midwest and the American South. The community values self‑reliance, hard work,
    and friendly neighborliness—traits reflected in local barbeque gatherings, high‑school football culture, and weekend trips to county fairs. His family celebrates typical Texan holidays such as Independence
    Day with fireworks and picnics, and they attend local church services that emphasize service to the community. Though his cultural setting is predominantly white, his household has adopted a mix of
    Southern hospitality and modern, technology‑oriented outlooks, encouraging him to pursue practical skills while staying open to new ideas. He identifies strongly with the Texan ethos of "doing it yourself,"
    which informs his DIY projects and his willingness to take on responsibility at a young age.
attributes:
  skills: '[''basic automotive repair'', ''car brake and oil service'', ''engine diagnostics with handheld scanner'', ''computer hardware troubleshooting'', ''operating system installation'', ''team leadership
    (football)'', ''practice drill planning'', ''conflict mediation'', ''basic woodworking'', ''metalworking for car accessories'', ''event logistics and inventory management'']'
  hobbies: '[''football (linebacker)'', ''team‑based video gaming'', ''car modification projects'', ''skateboarding'', ''music listening (hip‑hop and classic rock)'', ''volunteering at community events'']'
  career_goals: Robert wants to earn his GED within the next year and enroll in a community‑college automotive technology program. He aims to become a certified automotive technician, specializing in modern
    electronic fuel‑injection systems and hybrid vehicles. Over the next five years he hopes to work at a reputable garage to gain experience, then eventually open his own custom car shop focused on performance
    upgrades and community apprenticeship opportunities. He also sees himself as a possible elected officer in his local community, using his organizational skills to improve youth programs. His ambition
    blends curiosity about emerging automotive tech with the practical desire for stable income and local entrepreneurship.
