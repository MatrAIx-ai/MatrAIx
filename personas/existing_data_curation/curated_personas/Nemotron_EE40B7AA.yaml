personas:
  professional: Sultan Watson, a 28‑year‑old structural engineer in the Triangle, blends rigorous expertise in AutoCAD, Revit, GIS, and sustainable infrastructure planning with a naturally charismatic,
    talk‑show‑host vibe that turns stakeholder meetings into lively dialogues, while they channel a competitive streak into meticulous cost estimation and risk‑assessment metrics that keep projects on schedule
    and budget.
  sports: Sultan Watson dominates the local Saturday night basketball league, roots for the Charlotte Hornets and follows the Durham Bulls during baseball season, while they also lace up for weekend hikes
    at Umstead State Park to balance the high‑intensity games.
  arts: Sultan Watson fuels their love for rhythm by attending Kendrick Lamar concerts and Kamasi Washington jazz sets, hones storytelling skills at monthly improv theatre workshops where they frequently
    steal the spotlight, and curates eclectic playlists for game nights that blend old‑school hip‑hop with classic soul.
  travel: Sultan Watson plans trips with a blend of structured itineraries and spontaneous detours, having trekked the historic streets of Lisbon, the neon alleys of Tokyo, and the eco‑friendly neighborhoods
    of Copenhagen, while dreaming of exploring the ancient markets of Marrakech on a future vacation.
  culinary: Sultan Watson boasts a solid mastery of Southern comfort cooking, often whipping up shrimp and grits and jalapeño‑cheddar biscuits, but also experiments with sushi rolls and spiced chickpea
    falafel when gathering friends for DIY dinner parties.
  core: Sultan Watson is a competitively driven, socially magnetic engineer who converts curiosity into concrete projects, yet can be skeptical and occasionally over‑commits, swapping late‑night coffee
    for basketball rebounds and impromptu improv jokes.
background:
  cultural: Raised in a close‑knit African‑American community in Raleigh, Sultan grew up with strong family ties, church involvement, and community festivals that celebrated Black heritage. His parents
    emphasized the value of education, perseverance, and giving back, instilling in him a deep respect for cultural storytelling and collective uplift. He stays connected to his roots through music (hip‑hop,
    jazz, gospel), soul food cooking, and participation in local cultural events such as Juneteenth parades. As a Black professional in civil engineering, Sultan feels a responsibility to increase diversity
    in the field, mentor young Black students, and promote inclusive design practices that reflect the cultural fabric of his community.
attributes:
  skills: '["Structural Design", "Construction Project Management", "AutoCAD", "Revit", "Civil 3D", "GIS Mapping", "Cost Estimation", "Regulatory Compliance", "Sustainable Infrastructure Planning", "Risk
