  hobbies: '["Basketball", "Live Music Concerts", "Hiking", "Traveling", "Improvisational Theatre", "DIY Furniture Building", "Photography", "STEM Outreach Volunteering", "Reading Non-Fiction", "Cooking"]'
  career_goals: Sultan aims to become a senior project manager overseeing large‑scale transportation and urban development projects in the Triangle region, with a focus on integrating sustainable design
    and community impact. He aspires to lead multidisciplinary teams, champion innovative construction methods, and eventually launch his own consulting firm that bridges engineering with social equity.
    Long‑term, he envisions influencing regional infrastructure policy, mentoring Black and underrepresented students in STEM, and establishing a scholarship program that reflects his commitment to education
    and professional excellence.
