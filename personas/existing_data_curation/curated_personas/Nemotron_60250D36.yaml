  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Walking nature trails'', ''Church choir participation'', ''Volunteer driver for community charities'',
    ''Attending Ole Miss football games'']'
  career_goals: Martha aims to transition into a supervisory role as a fleet manager or training coordinator within the next two years, allowing her to leverage her extensive field experience to improve
    safety standards and operational efficiency. She also plans to mentor younger drivers, particularly women entering the industry, and hopes to eventually launch a small consulting service that helps
    local businesses streamline their delivery processes. While preparing for a gradual retirement, she wants to ensure a smooth succession for the drivers she has trained and to remain active in community
    volunteer driving projects.
