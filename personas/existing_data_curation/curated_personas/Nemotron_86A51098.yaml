personas:
  professional: Vasantha Patel, a 15-year-old aspiring robotics tinkerer, merges a talent for assembling autonomous bots with a budding YouTube channel where they review gadgets and share coding mini-games,
    often juggling school projects with spontaneous prototype testing.
  sports: Vasantha Patel plays Saturday-morning soccer with friends at the local park, is a member of the East Bay Youth Soccer Club, idolizes the San Jose Earthquakes and follows Golden State Warriors
    games, but they prefer informal kickabouts over organized leagues, often forgetting to bring water.
  arts: Vasantha Patel sketches a comic series featuring a tech-savvy superhero, draws inspiration from K-pop groups like BTS, Western pop star Taylor Swift, and Punjabi pop star Diljit Dosanjh, and they
    often cite anime director Hayao Miyazaki as a favorite visual influence.
  travel: Vasantha Patel enjoys weekend trips to the coastal cliffs of Big Surf and has visited Vancouver during summer; they dream of exploring Seoul's K-pop festivals and Kyoto's cherry-blossom temples,
    but travel plans often hinge on family budget and school schedules.
  culinary: Vasantha Patel loves preparing sarson da saag with homemade butter, frying jalebi for Diwali, and experimenting with avocado toast topped with smoked salmon, while they showcase quick gadget-enhanced
    recipes like Instant-Pot mac & cheese on their YouTube channel.
  core: Vasantha Patel is a gadget-obsessed teen comic artist who juggles robotics projects, soccer scrimmages, and late-night cooking videos; they often forget homework but never skip a chance to tinker.
background:
  cultural: Vasantha’s family traces its roots to the Punjab region of India, and she grew up in a bilingual household where Punjabi and English are spoken. Traditional celebrations such as Vaisakhi, Diwali,
    and Holi are observed with family gatherings, music, and homemade foods like sarson da saag and jalebi, which she often helps prepare. At school and in the Antioch community, she navigates a multicultural
    environment, balancing South Asian values—respect for education, close family ties, and communal hospitality—with the independent, diverse culture of the Bay Area. These dual influences shape her identity,
    giving her a strong sense of cultural pride while encouraging openness to new ideas and experiences.
