  career_goals: She aims to study Computer Science or a related field at a top university, with the goal of designing user‑friendly tech products that solve everyday problems. Vasantha wants to create an
    educational app that blends interactive learning with gamified challenges, catering to students from diverse backgrounds. She also dreams of building a personal brand as a digital content creator, producing
    tech tutorials and cultural food vlogs. Her competitive spirit pushes her to seek leadership positions in tech clubs and hackathons, while her practical mindset keeps her focused on projects that can
    have real impact.
