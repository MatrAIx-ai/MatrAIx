personas:
  professional: Maria Tobal is an aspiring junior visual storyteller who channels their insatiable curiosity and love of vibrant drawing, digital tablet art, and papel‑picado into school projects and personal
    comics, while their laid‑back, sometimes disorganized attitude toward homework means they thrive when given creative freedom and often compete to be the class’s most imaginative presenter.
  sports: Maria Tobal dashes across the neighborhood field as a forward for the Junior Tigers U‑10 soccer club, idolizes Lionel Messi and cheers for the local City FC team during games, while they also
    twirl in the school’s folkloric dance troupe, using daily drills and spontaneous kick‑around sessions to stay fit.
  arts: Maria Tobal fills sketchbooks with bold, color‑splashed drawings inspired by Frida Kahlo’s vivid portraits and the dynamic panels of Stan Lee, crafts intricate papel picado for holidays, and they
    lose themselves listening to mariachi groups such as Los Camperos, all of which fuel their creative identity.
  travel: Maria Tobal daydreams about joining a school field trip to the historic ruins of Machu Picchu after having toured the local science museum and the nearby seaside town of Coral Bay, and they prefer
    group outings that blend adventure with photo‑op spots for their art notebooks.
  culinary: Maria Tobal loves the bright flavors of tacos al pastor topped with pineapple, cilantro, and lime, frequently helps mom assemble quesadillas with shredded cheese and avocado, and enjoys experimenting
    with rainbow fruit kebabs, though they often forget to eat a balanced meal after a soccer match.
  core: Maria Tobal is a vibrant, competitive 10‑year‑old whose boundless curiosity for art and science fuels energetic group play, yet their worry‑laden, disorganized side can turn simple tasks into frantic
    scrambles.
background:
  cultural: Maria is a Mexican‑American growing up in Burleson, Texas. Her family celebrates Día de los Muertos, prepares traditional foods like tamales and pozole, and participates in community festivals
    featuring mariachi bands and folkloric dance. She speaks both Spanish and English, learns Mexican folk art techniques from her grandparents, and balances her vibrant heritage with the local Texan culture,
    attending a bilingual school and joining Hispanic community events.
