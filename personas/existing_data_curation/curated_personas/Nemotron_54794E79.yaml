  career_goals: Maria envisions a future where she can blend creativity with community impact. She dreams of becoming a children’s book illustrator who brings Mexican folklore to life, or a museum exhibit
    designer that creates interactive, culturally rich experiences. She also imagines helping animals as a veterinarian and enjoys the idea of competing on a school soccer team. Ultimately, she wants a
    career that allows her to explore new ideas, work with others, celebrate her heritage, and stay flexible in her approach.
