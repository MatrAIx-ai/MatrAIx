personas:
  professional: James Bostic, a 44‑year‑old retail associate with sharp people‑skills and a keen eye for visual detail, is leveraging their knack for calming customer complaints and organizing informal
    community events to pursue a supervisory role while eyeing part‑time work at local art galleries, viewing their flexible schedule as a bridge between commerce and culture.
  sports: James Bostic hits the Wasatch trails for weekend hikes, pedals their mountain bike on the Alpine loop, joins a local recreational softball league with the Salt Lake City Snoods, plays pickup basketball
    at the community center while cheering on the Utah Jazz and staying updated on Real Salt Lake matches, using their active social nature to blend fitness with camaraderie.
  arts: James Bostic, a regular at the Utah Museum of Fine Arts and downtown gallery openings, devours exhibits featuring Ansel Adams and Georgia O'Keeffe, strikes up conversations about color theory with
    curators, and unwinds to the sounds of the Utah Symphony and indie folk band The Staves, letting art shape their weekend routine and inspire their own landscape photography.
  travel: James Bostic prefers spur‑of‑the‑moment road trips to national parks like Bryce Canyon and Arches, plans annual family visits to Yellowstone, and dreams of a summer pilgrimage to Iceland’s waterfalls
    and Norway’s fjords, balancing their love of the outdoors with occasional cultural city breaks to Barcelona for its art scene.
  culinary: James Bostic enjoys experimenting in their kitchen, mastering dishes like Indian butter chicken, Vietnamese pho, and Moroccan tagine, while their go‑to comfort foods stay rooted in classic Utah
    fry sauce fries and homemade blueberry pie, and their moderate culinary skill shines when they pair meals with fresh, locally sourced pinto beans and heirloom tomatoes.
  core: James Bostic weaves their love of community, art, and the mountains into a flexible, people‑focused life, juggling spontaneous hikes, overdue bill reminders, and a habit of snapping candid photos
    of everyday moments before a sudden urge to reorganize their closet.
background:
  cultural: James comes from a typical Western‑American white background, with family roots in the Midwest and the Intermountain West. Growing up in Utah, he was exposed to a culture that emphasizes community,
    family, and outdoor recreation. While not strictly religious, he respects the region’s predominant values of modesty, hard work, and neighborly support. His upbringing included exposure to regional
    traditions such as local fairs, high school sports, and an appreciation for the natural landscape, which continues to shape his social and recreational choices.
