  career_goals: Mehrdad aims to advance from his current managerial position to a regional director role within the next five years, overseeing multiple locations. He plans to develop a mentorship program
    for employees, lead community‑engagement initiatives, and implement data‑driven operational improvements that increase profitability while maintaining a supportive workplace culture. Long‑term, he envisions
    launching his own boutique hospitality venture that blends his passion for social gatherings with his business expertise.
