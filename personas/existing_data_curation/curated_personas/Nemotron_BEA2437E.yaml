personas:
  professional: Darryl Glover is a seasoned IT support specialist who leverages their methodical hardware troubleshooting, networking know‑how, and meticulous documentation skills to keep a small‑business’s
    tech ecosystem running smoothly, while their anxiety‑driven need for predictability fuels their relentless pursuit of certification and systematic workflow optimization.
  sports: Darryl Glover enjoys low‑impact fitness by walking with a neighborhood walking club each Saturday, follows the Chicago Bulls and Chicago Bears for weekly game nights, and participates in a casual
    community badminton league where their structured practice routine mirrors their professional approach.
  arts: Darryl Glover finds comfort in classic soul and R&B legends like Marvin Gaye, Aretha Franklin, and Al Green, regularly attends the local jazz lounge featuring tribute bands, and keeps a curated
    vinyl collection that they spin while tinkering with PC builds on quiet evenings.
  travel: Darryl Glover prefers meticulously planned weekend getaways, has explored New Orleans for its music scene, taken a road trip through the Smoky Mountains, and dreams of a solo pilgrimage to Kyoto’s
    zen gardens, always booking accommodations and itineraries weeks in advance to minimize stress.
  culinary: Darryl Glover’s culinary palette blends comfort‑food cravings for fried chicken, macaroni‑and‑cheese, and collard greens with a home‑grown herb garden that supplies fresh basil and cilantro
    for their occasional Mediterranean‑inspired pasta, and their cooking skill lands them at a solid intermediate level, especially when assembling elaborate brunch spreads on Saturdays.
  core: Darryl Glover is a methodical 38‑year‑old IT specialist whose love for structured routines fuels their precise tech work, anxiety‑driven financial caution, solo hobbies, and devotion to soulful
    music and community service.
background:
  cultural: Darryl is an African‑American who grew up in Oconee County, GA, within a close‑knit, church‑oriented community. His upbringing emphasized resilience, mutual aid, and respect for elders, with
    regular gatherings featuring gospel music, Southern cooking, and community service. Facing limited formal education, he turned to self‑directed learning and mentorship to advance his technical abilities.
    His cultural heritage informs his cooperative, considerate nature and his commitment to helping others, especially youth in his neighborhood. The blend of Southern Black traditions and his personal
    determination shapes his identity and fuels both his professional goals and his community‑focused hobbies.
attributes:
  skills: '[''Computer hardware repair'', ''Network troubleshooting'', ''Operating system installation and configuration'', ''Technical documentation and SOP creation'', ''Customer support and troubleshooting'',
    ''Basic scripting (PowerShell, batch)'', ''Data backup and recovery'', ''Custom PC assembly'', ''Asset inventory management'', ''Cybersecurity fundamentals (firewall setup, antivirus)'']'
  hobbies: '[''Custom PC building'', ''Mechanical and jigsaw puzzle solving'', ''Listening to soul & R&B music'', ''Church community involvement'', ''Volunteer computer tutoring'', ''Urban gardening'',
    ''Mindfulness journaling'', ''Board games (chess, Settlers of Catan)'']'
  career_goals: Darryl aims to obtain CompTIA A+, Network+, and Security+ certifications within the next two years to formalize his expertise. He envisions advancing to a senior IT support specialist or
    network administrator role at a stable local institution such as a hospital or university, where he can lead a small technical team. Long‑term, he hopes to open his own computer repair and consulting
    shop, providing reliable services and mentorship to aspiring technicians, while maintaining a work schedule that supports his mental‑health needs.
