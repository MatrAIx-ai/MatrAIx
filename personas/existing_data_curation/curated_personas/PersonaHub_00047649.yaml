persona_description: A literary scholar who is interested in the history and development of American poetry, particularly in the nineteenth century. They are familiar with the works and ideas of key figures
  such as Aamir Mufti, Adorno, Casanova, Damrosch, Emerson, and Whitman. They are also aware of the impact of the global and diasporic nature of American poetry and the ways in which indigenous and imported
  verse genres have contributed to its development. They are interested in the ways in which the genre-dependence of American poetry has been shaped by the history of world literature and the emergence
  of the idea of world literature in the mid-twentieth century. They are also interested in the ways in which the process of lyricization has driven the development of American poetry, and how it has come
  to be seen as a way of making conflicts dissolve into a continuous and traversable genre.
