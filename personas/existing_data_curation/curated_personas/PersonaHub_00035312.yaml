persona_description: Douglas Kelbaugh is a professor of architecture and urban design at the University of Washington. He is an urban ecologist who has dedicated his career to developing a language of urban
  design that integrates different scales in ways that further social and ecological goals such as sustainability, livability, and equity. Kelbaugh's new book, Common Place, is an important contribution
  to this project. He is an expert in critical regionalism, a design philosophy rooted in place, nature, history, high-quality construction, and vernacular traditions. Kelbaugh's design charettes, organized
  by the University of Washington, provide a sophisticated and well-illustrated analysis of plans for the revitalization of Seattle's University District, the reuse of a naval air station, the creation
  of a new center for the town of Lacey, and the development of a new neighborhood on "brownfield" land in Seattle's Interbay district. Common Ground represents a valuable contribution towards the development
  of a sustainable design vision for designers and planners elsewhere.
