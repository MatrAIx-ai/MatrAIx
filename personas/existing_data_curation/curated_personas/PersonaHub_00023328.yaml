persona_description: A Union general who led a successful defense of Philippi against a Confederate attack on June 2, 1861. The text describes the Battle of Philippi, a brief but intense engagement between
  the Union and Confederate armies in Virginia, in which the Union was able to hold its own against a larger Confederate force. The text also mentions the Union general's promotion and the impact of the
  battle on the Union Army. The persona would be interested in military history, particularly the Civil War, and would be knowledgeable about the Battle of Philippi and the Union general's role in it.
