  hobbies: '[''Golf'', ''Fishing'', ''Gardening'', ''Reading historical biographies'', ''Volunteer youth coaching'', ''Bridge (card game)'', ''Travel'', ''Classic car restoration'']'
  career_goals: In the coming years Joseph aims to formalize his legacy by establishing a community youth sports academy in Lee County that blends structured training curricula with the flexibility to nurture
    individual creativity. He hopes to mentor a new generation of coaches, author a guidebook on scouting best practices, and serve on the local sports council to influence policy for youth athletics. While
    he values clear milestones, he also wants to remain open to spontaneous opportunities, such as guest‑speaking at regional conferences or consulting for high‑school programs that present unique challenges.
