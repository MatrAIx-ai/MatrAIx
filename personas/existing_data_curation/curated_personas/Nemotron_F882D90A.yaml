  career_goals: Richard is aiming for a future where he can combine his love for structure, mechanics, and teamwork. He aspires to become an engineer—preferably civil or mechanical—so he can design and
    build tangible projects that improve his community. He also entertains the idea of a career in law enforcement or firefighting, drawn by the clear hierarchy, disciplined environment, and service aspect.
    He sees himself eventually leading a technical team, perhaps as a project manager, where his organizational strengths and competitive drive can shine. He wants to attend a reputable high school STEM
    program and later pursue a bachelor's degree in engineering, with a long‑term goal of working on infrastructure projects in North Carolina.
