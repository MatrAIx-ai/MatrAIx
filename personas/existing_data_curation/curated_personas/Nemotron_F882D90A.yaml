personas:
  professional: Richard Hartjen is a budding engineer‑in‑training who spends afternoons designing LEGO Technic creations and leading their middle‑school soccer squad, channeling their methodical planning
    and competitive spirit into both mechanical projects and on‑field strategies.
  sports: Richard Hartjen throws themselves into the middle‑school soccer season as a disciplined midfielder, cheers the Carolina Panthers on NFL Sundays, and spends Saturday afternoons tailgating at local
    high‑school football games while maintaining a personal fitness routine of weekend hikes in the Appalachian foothills to balance competitive play with outdoor endurance.
  arts: Richard Hartjen fuels their creative spark by listening to classic rock legends like Led Zeppelin and The Beatles alongside modern pop icons such as Taylor Swift, and they unwind after scouting
    meetings by sketching detailed designs of their LEGO Technic builds, a hobby that mirrors the precision of their favorite engineers.
  travel: Richard Hartjen prefers meticulously planned weekend getaways, often camping in the Great Smoky Mountains or exploring historic sites in Washington, D.C., but dreams of a future spring‑break road
    trip to Orlando’s theme parks, balancing family budget limits with a yearning for adventurous experiences.
  culinary: Richard Hartjen enjoys the comfort of Southern barbecue ribs, fried chicken, and homemade mac & cheese at family potlucks, while their modest cooking skills allow them to whip up quick peanut‑butter‑and‑jelly
    sandwiches and experiment with building edible LEGO‑inspired snack towers using cheese cubes, pretzels, and grape halves.
  core: Richard Hartjen is a predictably organized teen who channels competitive energy into soccer and LEGO builds, battles occasional anxiety with puzzles, and secretly hoards spare change for impulse
    LEGO splurges.
background:
  cultural: Richard grew up in Belmont, a small town in Gaston County, North Carolina, where Southern hospitality and community ties are strong. His family celebrates traditional Southern holidays and enjoys
    barbecues, high‑school football Saturdays, and church gatherings, reflecting a modest Christian upbringing. The region’s emphasis on hard work, respect for authority, and clear social structures aligns
    with his preference for predictability and organization. He is familiar with local customs such as attending church potlucks, participating in community service through his scouting troop, and supporting
    the Carolina Panthers. His cultural influences also include a love for outdoor activities like fishing and hiking in the nearby Appalachian foothills, and a respect for the practical, hands‑on ethos
    of the area’s manufacturing and trade heritage.
