  hobbies: '[''sketching'', ''digital painting'', ''reading fantasy novels'', ''writing short stories'', ''building with LEGO'', ''playing piano'', ''coding games in Scratch'', ''star gazing'', ''hiking
    local trails'', ''journaling'']'
  career_goals: Athera dreams of turning her love for art and imagination into a future career. She hopes to attend a specialized arts high school where she can deepen her skills in illustration and animation,
    eventually studying fine arts and computer graphics in college. Her long‑term ambition is to work as a concept artist or animator for a studio like Pixar or DreamWorks, creating vivid worlds that inspire
    others. She also aspires to use art as a therapeutic tool, perhaps leading workshops for children to help them express emotions. She values a career that merges creativity, collaboration, and positive
    impact.
