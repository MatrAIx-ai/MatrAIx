  career_goals: Olga dreams of becoming a teacher because she values the orderly environment of a classroom and enjoys helping peers learn step‑by‑step. She also imagines herself as a veterinarian one day,
    driven by her love for caring for animals and her competitive spirit to excel in science. In the short term, she aims to win her school’s spelling bee and become a lead player on her soccer team, seeing
    these achievements as stepping stones toward a future that blends structure, responsibility, and personal passion.
