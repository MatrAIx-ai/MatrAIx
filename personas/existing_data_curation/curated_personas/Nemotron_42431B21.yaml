personas:
  professional: A budding illustrator and storyteller, Olga Lugo channels the structured fantasy of the Magic Tree House series into detailed cartoon sketches, relying on their routine of nightly reading
    to fuel disciplined practice and a practical, step‑by‑step approach to character design.
  sports: A spirited young soccer enthusiast, Olga Lugo trains with the local Little Legends Soccer Club every Saturday, idolizes the skillful midfielders of FC Barcelona, and translates competitive drive
    from the field into a habit of scoring goals in friendly neighborhood matches.
  arts: An avid creative, Olga Lugo spends afternoons drawing cartoons inspired by Dr. Seuss and Studio Ghibli, coloring intricate mandala‑style patterns while listening to Spanish lullabies, and frequently
    constructs narrative worlds with LEGO, merging imagination with structured play.
  travel: A curious traveler, Olga Lugo dreams of exploring the historic streets of Old San Juan and the tropical waterfalls of Costa Rica, while cherishing past family trips to the local beach where they
    collected seashells and built sandcastles, preferring organized itineraries that fit around school and soccer practice.
  culinary: A junior baker, Olga Lugo delights in mixing dough for pan de bebé and empanadillas, sprinkling cinnamon and sweet plantain filling, and often experiments with colorful icing on LEGO‑shaped
    cookies, though they sometimes over‑sweeten pastries in the excitement of sharing with friends.
  core: Olga Lugo is an organized, competitively‑spirited 8‑year‑old who blends routine reading, soccer, and creative building into a disciplined yet playful worldview, occasionally letting a love for sweets
    and stickers tip into overindulgence.
background:
  cultural: Olga grows up in a bilingual Puerto Rican household in West Milford, NJ. Spanish is spoken daily at home, and she participates in cultural celebrations such as Three Kings Day, Noche Buena,
    and Puerto Rican festivals in the nearby community. Her parents often share stories of Puerto Rico, and she visits relatives on the island during school holidays, reinforcing her connection to her heritage.
    Traditional foods, music, and dance are woven into family life, and she maintains close ties with a local Puerto Rican community center where she sometimes joins cultural workshops and soccer leagues.
