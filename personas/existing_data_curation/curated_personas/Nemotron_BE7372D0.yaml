  hobbies: '[''Calligraphy'', ''Watercolor painting'', ''Art gallery visits'', ''Street mural tours'', ''Hiking'', ''Meditation'', ''Fusion cooking'', ''Mentorship volunteering'', ''Guzheng playing'']'
  career_goals: Ha aims to transition from full‑time studio work to a consultancy role where she can guide emerging designers and help tech startups craft inclusive, culturally resonant visual experiences.
    She hopes to teach a semester‑long design course at a local university, develop a community‑focused public art series that celebrates Asian diaspora narratives, and publish a handbook on integrating
    East Asian visual philosophies into modern digital design. Ultimately, she seeks to leave a legacy of socially responsible design that bridges technology, art, and community.
