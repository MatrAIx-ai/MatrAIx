personas:
  professional: An experienced sports scout and youth program director, Pedro Molina leverages three decades of coaching, graduate business training, and bilingual fluency to craft data‑driven talent pipelines
    and rigorously manage community‑sports budgets, with a disciplined, detail‑oriented approach that blends curiosity about emerging analytics with respect for proven evaluation methods.
  sports: A lifelong fan of the Miami Heat and Miami Marlins, Pedro Molina participates in pick‑up basketball at a community center, fishes in the Everglades on weekends for relaxation, and leads a youth
    soccer club where they apply performance analytics to nurture emerging talent.
  arts: A passionate aficionado of salsa and son, Pedro Molina frequents dance nights featuring live bands like Buena Vista Social Club, captures the vibrancy of community events with a vintage 35mm camera,
    and enjoys the murals of local Latin‑inspired street artists, reflecting a sociable, outgoing spirit.
  travel: An adventurous planner, Pedro Molina has explored historic Old San Juan, rainforest trails in Costa Rica, and the jazz festivals of New Orleans, favoring itineraries that blend immersive music
    scenes with opportunities to scout regional talent, though their scholarship fund often limits the frequency of overseas trips.
  culinary: A skilled home chef, Pedro Molina perfects classic dishes such as ropa vieja, picadillo, and fried plantains, often adding a personal twist of smoked paprika, while they occasionally over‑salt
    the sauce in their rush to host extended family gatherings.
  core: Pedro Molina is a disciplined, sociable scout who fuses data‑driven talent identification with a love for salsa, vintage photography, and community mentorship, balancing meticulous budgeting with
    a penchant for occasional culinary indulgence.
background:
  cultural: Pedro was born to Cuban immigrant parents who settled in Hialeah, a hub of Cuban‑American life. Growing up in a bilingual household, he absorbed the rhythms of Cuban music, the passion for baseball,
    and the strong emphasis on family and community solidarity. His cultural identity blends the warmth and resilience of Cuban traditions with the entrepreneurial spirit of South Florida. He maintains
    close ties with the local Cuban community, participates in festivals such as Carnaval Miami, and values the intergenerational exchange of stories, food, and values that shape his outlook on life and
    coaching.
