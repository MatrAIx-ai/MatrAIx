  career_goals: Pedro’s primary ambition is to build a regional scouting network that links promising Cuban‑American athletes in South Florida with collegiate and professional opportunities. He plans to
    launch a sports‑management consultancy that offers leadership training and talent‑development workshops for coaches, author a book on integrating cultural heritage into coaching philosophy, and establish
    a scholarship fund for under‑privileged youth in Hialeah. Over the next five years, he also aims to transition into a senior advisory role with a professional sports organization, shaping talent pipelines
    and community‑engagement strategies while preserving his hands‑on involvement with local teams.
