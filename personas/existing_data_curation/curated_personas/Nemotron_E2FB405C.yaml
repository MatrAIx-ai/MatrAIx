personas:
  professional: Kathy Brooks is a budding little architect who loves stacking colorful blocks into intricate towers, displaying early organizational and methodical planning skills, while their curious mind
    embraces new designs, they prefer solitary play, occasionally doubting peers' intentions, and demonstrate a competitive edge in building the tallest structure.
  sports: Kathy Brooks enjoys toddler gymnastics at the Little Stars Gymnastics Club, participates in the Tots Soccer League at the community park, loves splashing in the kiddie pool during summer, and
    quietly cheers for the New York Yankees on television, preferring small, organized playdates over large, noisy games.
  arts: Kathy Brooks is a budding storyteller who reenacts scenes from Disney's 'Frozen' starring Idina Menzel, sings along to Raffi's 'Baby Beluga', and fills crayon‑filled sketchbooks with vivid drawings
    of these beloved characters, reflecting their open appreciation for art and unconventional imagination.
  travel: Kathy Brooks prefers short, family‑organized road trips, delights in building sandcastles on Florida's Gulf Coast beaches, has visited the Grand Canyon on a parent‑guided tour, and daydreams about
    riding the Disneyland monorail in California during their next vacation.
  culinary: Kathy Brooks delights in creamy mac and cheese with extra cheddar, loves crunchy apple slices dipped in peanut butter, can stir batter in a bowl with a plastic spoon, is picky about trying new
    vegetables, and often chooses the colorful kids' menu at family‑friendly diners.
  core: Kathy Brooks is a meticulous mini‑architect who hoards crayons, overthinks snack choices, competes fiercely with peers to build the tallest tower, and quietly worries about the world around them.
background:
  cultural: Kathy Lynn is raised in a Black family in Canton, Georgia, where family life blends Southern traditions with a strong sense of community. Weekly gatherings at the local Baptist church include
    gospel singing, storytelling, and shared meals featuring Southern soul food such as collard greens and cornbread. Her parents encourage participation in community events like Juneteenth celebrations
    and school art projects that highlight African‑American heritage. Visits to the Cherokee County Historical Museum and the Canton Arts Center provide exposure to local history and visual art, nurturing
    her appreciation for culture, music, and creative expression.
attributes:
  skills: '[''color sorting'', ''shape matching'', ''basic drawing'', ''singing nursery rhymes'', ''counting to five'', ''simple puzzle completion'', ''following routines'']'
  hobbies: '[''crayon drawing'', ''building block towers'', ''listening to children’s music'', ''collecting and sorting leaves'', ''picture book reading'', ''re‑enacting cartoon scenes'']'
  career_goals: Even at three, Kathy Lynn imagines herself as a creator—she often says she wants to be a painter or an illustrator when she grows up, hoping to fill walls with bright pictures like the ones
    she loves in picture books. She also talks about becoming a teacher who can share stories and art with younger children. Her competitive streak drives her to win the preschool’s ‘best artwork’ award,
    and she dreams of one day opening a small community art corner where kids can explore colors and ideas together.
