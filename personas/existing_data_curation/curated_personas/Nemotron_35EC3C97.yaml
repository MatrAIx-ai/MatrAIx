  hobbies: '["Visiting contemporary art galleries and museums", "Street photography", "Playing chess", "Listening to avant‑garde jazz", "Attending experimental theatre", "Mindfulness meditation", "Running
    in Central Park", "Experimenting with fusion cooking", "Reading speculative fiction", "Traveling to off‑the‑beaten‑path destinations"]'
  career_goals: His next career milestone is to advance into a senior strategy consultant or Director of Business Insights position within a leading financial services or technology firm, where he can direct
    large‑scale transformation initiatives. He also aspires to create a boutique consultancy that helps corporations embed artistic creativity and design‑thinking into strategic planning. Over the next
    five years, he plans to earn a PMP certification, deepen his expertise in machine‑learning‑driven analytics, and publish thought‑leadership pieces on innovative management. Ultimately, he envisions
    reaching C‑suite influence, possibly as a Chief Strategy Officer, while maintaining a reputation for analytical rigor and creative insight.
