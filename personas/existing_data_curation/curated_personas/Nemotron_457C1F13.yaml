  hobbies: '[''Cooking traditional meals'', ''Crocheting and knitting'', ''Gardening'', ''Church choir participation'', ''Reading historical fiction'', ''Genealogy research'', ''Walking in the neighborhood'',
    ''Listening to gospel music'', ''Watching classic movies'']'
  career_goals: Usha’s primary goal is to preserve her family’s wellbeing and cultural traditions, ensuring her grandchildren stay connected to their heritage. She aims to continue volunteering at the senior
    center and church, document her life story for future generations, and advocate for improved senior services in Oklahoma City. Though retired, she seeks to mentor younger volunteers and support community
    harmony, focusing on practical contributions rather than ambitious career advancement.
