  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction and biographies'', ''Listening to blues, gospel, and soul music'', ''Birdwatching'', ''Cooking Southern soul‑food'', ''Volunteering
    at church food pantry'', ''Participating in a women’s book club'']'
  career_goals: Latisha hopes to obtain an ASE certification in diesel mechanics within the next year to formalize her expertise. She envisions transitioning to a lead mechanic role at her current shop,
    where she can oversee quality control and train the next generation of technicians. Long‑term, she dreams of opening a modest mobile repair service that would serve small farms and local businesses
    in Troup County, giving her the flexibility to work part‑time while spending more time on her garden and with her grandchildren. She also aspires to partner with the local community college to develop
    a workshop series on basic vehicle maintenance for residents.
