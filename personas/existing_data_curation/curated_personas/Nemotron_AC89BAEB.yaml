personas:
  professional: Latisha Davis, a 56‑year‑old diesel‑mechanics specialist, blends two decades of hands‑on repair skill with a curious, practical mindset; they improvise clever solutions when parts are scarce,
    mentor apprentices in clear, courteous language, and pursue ASE certification while envisioning a future mobile repair service for local farms.
  sports: Latisha Davis stays active with low‑impact exercise, joining the local Sunset Striders walking club for morning strolls and bird‑watching hikes, enjoys casual softball with the Troup County Senior
    League in spring, and they faithfully follow Atlanta’s professional teams—the Falcons, Braves, and Hawks—while cheering on the Georgia Bulldogs during college football season.
  arts: Latisha Davis weaves cultural threads into daily life, tuning in to the blues of B.B. King, gospel of Mahalia Jackson, and soul of Aretha Franklin; they create patchwork blankets inspired by heritage
    patterns, devour biographies of pioneering women such as Hidden Figures, and regularly attend the local historic museum’s rotating exhibits and monthly book‑club discussions at the community library.
  travel: Latisha Davis prefers relaxed, flexible getaways, often taking weekend road trips to Savannah’s historic squares, Charleston’s waterfront, or the Great Smoky Mountains for bird‑watching, dreaming
    of a music‑filled visit to New Orleans, and they occasionally join family on longer trips to the Grand Canyon, all while balancing a modest travel budget and coordinating plans around grandchildren’s
    school schedules.
  culinary: Latisha Davis cooks soulful meals with a seasoned hand, turning home‑grown tomatoes and collard greens into fragrant stewed collards and fresh tomato salsa, grilling smoked chicken with a secret
    blend of smoked paprika, cayenne, and buttermilk brine, and serving sweet peach cobbler for gatherings, while their love for classic soul cooking is balanced by an occasional indulgence in store‑bought
    fried catfish, and they often host potluck dinners for friends and neighbors.
  core: Latisha Davis is a pragmatic, curious mechanic who blends hands‑on expertise with a soulful love for gardening, quilting, and community, navigating life with gentle flexibility, quiet kindness,
    and a knack for improvising solutions, and they inspire those around them with quiet confidence.
background:
  cultural: Latisha’s cultural background is rooted in the African‑American Southern tradition of the Black Belt region of Georgia. Growing up in a close‑knit Black community, she was immersed in church
    life, gospel music, and the oral storytelling that celebrated resilience and family ties. The values of mutual support, respect for elders, and community service have shaped her compassionate nature.
    She carries forward the culinary heritage of soul‑food cooking and the craft of quilting passed down from her grandmother. The legacy of hard work and self‑reliance in a rural setting informs her practical
    approach to problem‑solving and her pride in skilled trade work. While she embraces modern techniques, she also honors the cultural rituals of church gatherings, family reunions, and local festivals
    that celebrate Black heritage in rural Georgia.
attributes:
  skills: '[''Mechanical diagnostics'', ''Diesel engine repair'', ''Hydraulic system maintenance'', ''Welding and metal fabrication'', ''Electrical wiring and troubleshooting'', ''Preventive maintenance
