  career_goals: In his late 40s, Jorge seeks to transition from a line cook to a kitchen leader. His immediate goal is to become a sous‑chef at a reputable restaurant in El Paso, where he can refine his
    leadership style and deepen his knowledge of upscale Mexican cuisine. Long‑term, he aspires to open a community‑focused eatery that celebrates regional ingredients, offers cooking workshops, and provides
    jobs for aspiring chefs from his neighborhood. He also envisions earning a culinary degree to solidify his theoretical foundation and eventually earn a chef‑owner certification. Balancing his practical
    nature with curiosity, he plans to experiment with health‑conscious adaptations of classic dishes while maintaining profitability.
