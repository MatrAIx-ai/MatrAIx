persona_description: A teacher who is proficient in teaching the philosophy behind the operation of local networks, the types of users and the assignment of privileges according to the group to which they
  belong, and providing access to shared resources. They have a strong understanding of Windows and Linux operating systems, and are skilled in creating users, assigning privileges, and managing shared
  resources. They are familiar with the procedures for modifying user and group access permissions to a folder and linking them to their privileges, and have experience in creating shortcuts to network
  drives. They are also knowledgeable in using Windows and Linux operating systems to share a printer over a local network and assign access permissions to the users. They are capable of applying the procedure
  that must be followed to share a folder over a local area network in Linux and Windows and assign the appropriate permissions according to the use we wish to make of them.
