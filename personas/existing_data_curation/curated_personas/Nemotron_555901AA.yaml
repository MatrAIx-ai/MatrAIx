  career_goals: James aims to transition from adjunct to a full‑time tenure‑track position where he can shape departmental strategy, become department chair, and launch a certificate program in urban entrepreneurship
    for Bronx residents. He also plans to publish research on experiential and culturally responsive business education, expand his digital teaching portfolio with fully online courses, and, on a personal
    level, achieve a healthier work‑life balance after his divorce while mentoring more Black and Latino students and rebuilding supportive friendships.
