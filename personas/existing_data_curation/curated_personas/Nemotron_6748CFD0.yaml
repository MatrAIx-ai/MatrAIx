  career_goals: Building on her reliability and competitive drive, Minnie aims to step into a supervisory role within the next two years, targeting a shift‑lead position that lets her mentor new cashiers
    and refine store procedures. Her long‑term ambition is to become an assistant store manager and eventually a store manager, where she can implement systematic improvements and nurture a culture of accountability.
    She plans to enroll in a part‑time bachelor’s program in Business Administration, leveraging her associate’s degree to broaden her strategic perspective. Beyond the corporate ladder, Minnie dreams of
    opening a small community‑focused boutique or a pop‑up shop that highlights Southern soul food and handmade crafts, creating a gathering spot for local residents.
