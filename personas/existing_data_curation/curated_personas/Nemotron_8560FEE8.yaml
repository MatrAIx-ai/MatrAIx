  career_goals: Shung aims to pursue a career that lets him work independently on technical challenges. He envisions attending a specialized STEM high school, eventually earning a computer-science degree,
    and becoming a software engineer or game developer who can design both the code and the visual assets for indie games. He also hopes to combine his artistic side with technology by creating interactive
    digital comics. While he values clear milestones—such as completing a personal coding project each year—he prefers flexible pathways that let him explore new tools at his own pace.
