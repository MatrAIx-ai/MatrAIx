personas:
  professional: Shung Lu, an aspiring junior software developer who crafts small Python scripts and tinkers with robotics kits, channels their love for structure into methodical coding sessions while favoring
    the freedom of solo projects over collaborative school assignments.
  sports: Shung Lu, a member of the local community swimming club who enjoys disciplined laps during early mornings, quietly tracks personal bests on a wearable, and roots for the city’s baseball team,
    the Cubs, while finding team sports too chaotic for their preference.
  arts: Shung Lu, a digital drawer enamored with manga aesthetics, spends evenings emulating the line work of Osamu Tezuka, drawing inspiration from contemporary artists like Ross Tran, and flips through
    graphic novels such as 'Akira' and 'Saga' for visual storytelling cues.
  travel: Shung Lu, who has taken family road trips to the nearby national park for quiet hikes and once visited the vibrant streets of Tokyo’s Akihabara district during a school exchange, dreams of returning
    to explore Japan’s manga museums and robotics exhibitions.
  culinary: Shung Lu, who prefers simple, repeatable meals, can reliably whip up a bowl of instant ramen topped with soft-boiled eggs and nori, yet occasionally experiments with making homemade sushi rolls
    using cucumber, avocado, and crab sticks when the mood strikes.
  core: Shung Lu, a 13-year-old introverted tech-enthusiast, balances structured coding and manga art with occasional impulsive gaming splurges, all while navigating the perpetual tug-of-war between organization
    and relaxed spontaneity.
background:
  cultural: Shung comes from a Chinese-American family that settled in Los Angeles. His parents, both first-generation immigrants, emphasize education and respect for tradition while encouraging him to
    explore American youth culture. He celebrates Lunar New Year at home, learning about Chinese customs and cuisine, and also participates in school activities that reflect the multicultural fabric of
    Los Angeles. His bilingual environment shapes his communication style, allowing him to navigate both East Asian and Western social contexts with ease.
