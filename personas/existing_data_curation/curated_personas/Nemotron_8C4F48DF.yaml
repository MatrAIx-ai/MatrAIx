  hobbies: '[''Visiting art galleries'', ''Sketching and acrylic painting'', ''Reading African-American literature'', ''Attending poetry open-mics'', ''Organizing game nights'', ''Dance workshops'', ''Cooking
    soul-food'', ''Volunteering at community garden'']'
  career_goals: Sophia aims to obtain her GED within the next year, followed by a certificate in community health or nonprofit management. She aspires to become a community outreach coordinator or peer
    support specialist at a local nonprofit focused on mental‑health advocacy and cultural programming. In the longer term, she hopes to launch a community art studio that offers workshops, exhibition space,
    and mentorship for young Black artists in New Castle County, blending her passions for art, organization, and community empowerment.
