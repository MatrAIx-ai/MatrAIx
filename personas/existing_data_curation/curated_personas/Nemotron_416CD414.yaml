  career_goals: Approaching the later stage of his career, Manuel aims to transition from full‑time research into a mentorship‑focused role that leverages his extensive experience to uplift the next generation
    of mathematicians and data scientists in the San Antonio community. He plans to establish a small consulting practice that offers statistical and analytical services to local government agencies and
    small businesses, ensuring data‑driven decision making. Simultaneously, he seeks to become an emeritus lecturer at the University of Texas at San Antonio, where he can develop culturally relevant STEM
    curricula for Mexican‑American students. Manuel also aspires to publish a monograph that bridges mathematical theory with real‑world applications in public health and urban planning, positioning himself
    as a thought leader in applied mathematics within Bexar County.
