personas:
  professional: Aaron Tomlinson is a teenage DIY tech enthusiast who runs a weekend electronics repair service for neighbors, leveraging his methodical routine, practical mindset, and competitive streak
    to solve problems efficiently and outpace local peers.
  sports: Aaron Tomlinson is an avid outdoorsman who fishes early on Saturdays at Lake Evergreen and hunts with his uncle, belongs to the county 4‑H shooting club and the Lakeside Fly Fishing Association,
    and passionately follows the Detroit Lions and the local high school baseball team, the Valley Vikings, using routine physical activity to balance his competitive e‑sports sessions.
  arts: Aaron Tomlinson channels his creative side through building model cars and woodworking, often listening to classic rock legends like Led Zeppelin and country icons such as Johnny Cash while watching
    the car‑building series Fast N’ Loud, and they admire the craftsmanship of woodworker Sam Maloof, which fuels their hands‑on projects.
  travel: Aaron Tomlinson prefers road‑trip adventures to nearby natural spots like Red Rock Canyon and the Great Smoky Mountains, meticulously planning itineraries with checklists that echo his fishing
    routine, while dreaming of a summer camping expedition at Yellowstone, all within a family‑budget‑friendly framework.
  culinary: Aaron Tomlinson enjoys hearty, practical meals such as grilled trout with lemon‑dill, a robust homemade chili, and fish tacos topped with cilantro and avocado, and despite being a self‑taught
    cook, they reliably prep these dishes after a day on the lake, while occasionally indulging in quick microwave pizza during marathon gaming sessions.
  core: Aaron Tomlinson is a routine‑driven teen who blends hands‑on tinkering, competitive gaming, and outdoor pursuits, balancing a practical mindset with a competitive edge, yet sometimes lets gaming
    marathons override responsibilities.
background:
  cultural: Aaron grew up in Pleasant Hope, a small, predominantly white town in Polk County, Missouri. His family traces several generations of Midwestern roots, with a strong emphasis on self‑reliance,
    hard work, and community involvement. He was raised in a modest, Christian household that values practicality, responsibility, and traditional family ties. Local culture—high school sports, church gatherings,
    county fairs, and a close‑knit neighborly network—has shaped his worldview, reinforcing a preference for stable routines and the practical side of life.
attributes:
  skills: '[''Auto maintenance (oil changes, brake repair)'', ''Small-engine repair (lawn mower, chainsaw)'', ''Basic woodworking (shelf building, furniture assembly)'', ''Computer troubleshooting and gaming
    rig setup'', ''Organizational skills (tool inventory, schedule management)'']'
  hobbies: '[''Fishing'', ''Competitive video gaming (FPS and sports games)'', ''Model car building'', ''Woodworking projects'', ''Hunting with family'', ''4-H participation'']'
  career_goals: Aaron aims to turn his practical skills into a stable career after he completes high school. He plans to enroll in a vocational program for automotive technology at a nearby community college,
    earn his ASE certification, and eventually open a modest auto‑repair shop serving the Pleasant Hope area. He also considers joining the U.S. Army as a mechanic, seeing it as a way to build discipline
    and gain technical experience. His long‑term ambition is to become financially independent, support his family, and be recognized locally for reliable, high‑quality work.
