  hobbies: '[''Gardening (vegetable and flower beds)'', ''Crocheting'', ''Reading mystery and historical fiction novels'', ''Volunteering at a local food pantry'', ''Participating in women truck drivers’
    meetup'', ''Attending church services'', ''Cheering for local high school sports'']'
  career_goals: Looking ahead, Katherine aims to transition from a driver‑sales hybrid role to a senior logistics coordinator position within her company, where she can shape route strategies and safety
    policies. She is pursuing a CDL endorsement for hazardous‑material handling and plans to earn a Certified Transportation Manager (CTM) certification within two years. Ultimately, she hopes to co‑found
    a small, family‑run freight service with her husband that emphasizes punctuality and transparent pricing, while also serving as a mentor for younger women entering the trucking industry. Achieving a
    consecutive year of zero‑accident records and being recognized as the top performer in on‑time deliveries are key milestones for her.
