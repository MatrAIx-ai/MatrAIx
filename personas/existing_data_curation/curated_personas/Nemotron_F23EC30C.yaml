personas:
  professional: Katherine Case is a veteran commercial truck driver‑sales hybrid who excels in route planning, meticulous paperwork, and client negotiations, and she applies her methodical, reliability‑driven
    personality to maintain flawless compliance and on‑time deliveries while mentoring new drivers.
  sports: Katherine Case is a loyal supporter of the local high‑school football team, proudly wears its colors on game days, tracks the Chicago Bears’ season, participates in a seniors’ walking club on
    weekends, and occasionally drives the women‑truck‑drivers’ softball team to regional tournaments.
  arts: Katherine Case immerses herself in creative pursuits by crocheting intricate blankets while listening to Gillian Welch, devouring Agatha Christie mystery novels, and attending community theater
    productions of classic plays such as 'Our Town'.
  travel: Katherine Case enjoys meticulously planned road trips along Midwest scenic routes, recently toured the Badlands and Door County, and dreams of a cultural pilgrimage to Ireland’s County Kerry,
    balancing travel with budget constraints and family responsibilities.
  culinary: Katherine Case favors farm‑to‑table meals, regularly harvests heirloom tomatoes, peppers, and kale to prepare roasted vegetable medleys with garlic and rosemary, and indulges in homemade apple
    pie made with crisp Granny Smith apples and a flaky crust.
  core: Katherine Case blends a structured logistics career with a garden‑to‑loom lifestyle, a love of mystery novels, and a steadfast focus on safety, savings, and community mentorship.
background:
  cultural: Katherine was raised in the heart of Michigan’s Midwestern culture, where community ties, modesty, and a strong work ethic are emphasized. Her family has deep roots in the agricultural and manufacturing
    sectors of Ingham County, shaping her practical outlook. A lifelong member of a Methodist congregation, she values service, punctuality, and self‑reliance. Her upbringing in a predominantly white, middle‑class
    environment has reinforced traditional Midwestern values—respect for routine, appreciation for seasonal cycles, and a pragmatic approach to problem‑solving—while her career as a truck driver has broadened
    her perspective through travel across the United States.
attributes:
  skills: '[''Commercial Driving (Class A CDL)'', ''Route Planning and Optimization'', ''Freight Loading and Securing'', ''Vehicle Maintenance and Troubleshooting'', ''Customer Relationship Management'',
