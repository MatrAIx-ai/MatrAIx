  hobbies: '[''Attending high‑school sports events'', ''Participating in senior bingo nights'', ''Community gardening'', ''Hiking along the Ohio River trail'', ''Collecting vintage vinyl records'', ''Hosting
    potluck dinners'', ''Reading mystery novels'', ''Listening to true‑crime podcasts'', ''Watercolor painting'', ''DIY home‑decor projects'']'
  career_goals: Although not currently employed, Kathryn aims to channel her sociability and curiosity into part‑time roles that benefit her community. She hopes to earn a Mental Health First Aid certification
    so she can lead support groups at the local senior center, and she plans to launch a small home‑based craft business on Etsy featuring handmade décor items. Long‑term, she envisions becoming a volunteer
    outreach coordinator for a nonprofit that tackles anxiety and depression among middle‑aged adults in the Rust Belt region.
