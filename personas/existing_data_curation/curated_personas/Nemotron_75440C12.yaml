    media content creation'', ''Basic photography and visual storytelling'', ''Interpersonal teamwork and conflict resolution'']'
  hobbies: '[''Visiting murals and art galleries in San Diego'', ''Street soccer with friends'', ''Cooking traditional Mexican dishes'', ''Urban photography'', ''Exploring San Diego beaches'', ''Attending
    live music concerts'', ''Volunteering at community cultural festivals'', ''Reading graphic novels and contemporary art books'', ''Participating in local cultural workshops'', ''Socializing at neighborhood
    gatherings'']'
  career_goals: Jose Joel aims to advance from his current office clerk role to an office manager or project coordinator within the next three to five years. He plans to complete a bachelor's degree in
    Business Administration or Management, leveraging his organized work style and leadership potential. He aspires to lead a team, oversee operational workflows, and eventually specialize in event planning
    or community outreach, where he can blend his organizational expertise with his passion for art and cultural events. Long‑term, he envisions establishing a boutique consultancy that organizes culturally‑focused
    events and workshops for local businesses and community groups, providing stable income for his family while promoting Mexican‑American heritage.
