  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Baking and recipe experimentation'', ''Quilting'', ''Genealogy research'', ''Walking in nature'', ''Listening to gospel and jazz'', ''Solving
    crosswords and Sudoku'', ''Online courses on personal finance'', ''Quiet volunteering at the local food bank'']'
  career_goals: Loretta aims to re-enter the workforce in a role that leverages her practical strengths and curiosity for new learning. She plans to obtain a Certified Home Health Aide (CHHA) credential
    so she can provide care for elderly residents in her community, combining her caregiving experience with formal training. Simultaneously, she dreams of launching a small home-based catering service
    focused on healthy, culturally inspired meals, allowing her to experiment with new recipes while generating supplemental income. To support these ambitions, she intends to complete her GED and enroll
    in a community college course on nutrition and small-business management. Long-term, Loretta hopes to become a mentor for other Black women seeking career transitions, offering workshops on financial
    literacy and entrepreneurship through her local church.
