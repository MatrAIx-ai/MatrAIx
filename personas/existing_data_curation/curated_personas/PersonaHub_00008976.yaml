persona_description: A person who is interested in economics and has a background in microeconomics, especially in the circular flow model and national income accounting. They are familiar with the concept
  of total income and total output, and understand the limitations of national income accounting. They are also aware of the importance of final goods and services in measuring economic activity and the
  need for exclusion of certain activities and transactions. They have an interest in understanding the role of the government in the economy and the impact of taxes and transfer payments on households
  and businesses. They are likely to be a student or researcher in economics or a related field who is interested in understanding the complexities of the economy and its workings.
