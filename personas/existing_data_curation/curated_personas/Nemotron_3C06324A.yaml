personas:
  professional: Joshua Jenkins, a seasoned process and systems engineer with over two decades of experience in manufacturing and infrastructure, leverages their mastery of Six Sigma, CAD tools, and data
    analytics to streamline production lines while applying a calm, structured leadership style to mentor cross‑functional teams and champion sustainable practices.
  sports: Joshua Jenkins stays active by fishing with the Pee Dee River Anglers Club, hiking the Congaree National Park trail system, and cheering on the Carolina Panthers and Clemson Tigers while playing
    pick‑up basketball at the local community center every summer.
  arts: Joshua Jenkins immerses themselves in blues legends like B.B. King and jazz masters such as Miles Davis while browsing the Charleston Art Gallery, and they occasionally join the church gospel choir
    for weekend performances, finding the music a soundtrack to their woodworking projects.
  travel: Joshua Jenkins prefers meticulously planned road trips that blend heritage and adventure, having explored Charleston’s historic district and the jazz clubs of New Orleans, while dreaming of an
    eco‑tour of Norway’s fjords and a family fishing expedition to the Canadian Rockies.
  culinary: Joshua Jenkins, a competent home cook, perfects Southern comfort dishes like smoked pork ribs, shrimp and grits, and collard greens seasoned with smoked paprika and okra, often preparing meals
    while listening to jazz and occasionally over‑saucing their barbecue sauce in pursuit of the perfect flavor balance.
  core: Joshua Jenkins, a 47‑year‑old engineer with a calm, methodical mind, balances structured work with hands‑on hobbies, a devotion to community, and a gentle penchant for over‑seasoning their barbecue.
background:
  cultural: Joshua is an African‑American who grew up in a close‑knit Black community in South Carolina. He attended South Carolina State University, a historically Black university, where he earned his
    degree in engineering. His cultural identity is shaped by the values of resilience, family, and community service that are central to Southern Black life. He maintains strong ties to his church, where
    he participates in outreach initiatives, and he celebrates cultural traditions such as family barbecues, gospel music, and the oral histories of the civil‑rights era. These experiences influence his
    collaborative leadership style and his commitment to uplifting the next generation of Black professionals.
attributes:
  skills: '[''Process Engineering'', ''Lean Six Sigma'', ''Statistical Process Control'', ''CAD (SolidWorks, AutoCAD)'', ''Data Analysis (MATLAB, Python)'', ''Project Management'', ''Team Leadership'',
    ''Technical Writing'', ''Regulatory Compliance'', ''System Integration'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Blues and Jazz Listening'', ''Southern Cooking'', ''STEM Volunteer Mentoring'']'
  career_goals: Joshua aims to advance into a senior leadership role, such as Director of Engineering, where he can shape organizational processes and champion sustainable manufacturing practices. He plans
    to earn a Six Sigma Black Belt and become a certified Professional Engineer (PE) within the next two years. Beyond corporate advancement, he aspires to launch a consulting firm that supports small and
    mid‑size manufacturers in the Southeast to adopt efficient, eco‑friendly production methods. He also wants to mentor the next generation of Black engineers through partnerships with local schools and
    historically Black colleges.
