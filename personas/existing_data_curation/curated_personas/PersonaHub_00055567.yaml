persona_description: A historian who is interested in the military architecture and fortifications of Malta during the late 19th and early 20th centuries, particularly the fortifications built by the British
  during the Second World War. This person has a deep understanding of the design and construction of military structures, and is particularly interested in the use of thin walls and ditches in British
  fortifications of the late 19th century. They have a particular interest in the role of aerial bombardment in fortification design and the importance of perimeter defence in protecting military installations.
