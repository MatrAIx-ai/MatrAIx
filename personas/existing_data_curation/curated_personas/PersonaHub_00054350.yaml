persona_description: A researcher and anthropologist who specializes in the study of infant feeding practices and their impact on infant health and development. She is particularly interested in the traditional
  and healthy feeding method of pre-mastication, which exposes infants to their mothers' saliva and teaches their immune systems how to deal with disease pathogens. Her research has led her to conclude
  that pre-mastication was the solution to feeding infants during this interim period for most of human history and remains the method used in many cultures today. She is currently leading a study to complete
  the evidence for pre-mastication and its impact on infant health and development.
