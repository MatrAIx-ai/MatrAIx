personas:
  professional: Jose Perera is a freelance electronics specialist who merges microcontroller prototyping, custom‑fabrication, and accessible technical documentation for regional agricultural businesses,
    leveraging his curiosity and competitive drive to solve problems quickly—though his aversion to rigid schedules sometimes results in last‑minute rushes.
  sports: Jose Perera cycles the Ozark trail network on weekends, competes in a local amateur soccer league with the Lowell Timberwolves, follows Arkansas Razorbacks football, and joins seasonal hunting
    trips with the Arkansas Hunters Association, balancing competitive play with a relaxed appreciation for outdoor recreation.
  arts: Jose Perera captures the Arkansas countryside through nature photography inspired by Ansel Adams, curates a vinyl collection of classic rock from The Rolling Stones and modern Latin pop like Carlos
    Vives, and unwinds by binge‑watching science‑themed documentaries by David Attenborough, blending visual art with his engineering mindset.
  travel: Jose Perera prefers weekend getaways that mix adventure and cultural immersion, having road‑tripped to the Grand Canyon for rock‑climbing, explored the historic streets of Oaxaca for its vibrant
    markets, and dreaming of a future bike‑tour through the Pacific Northwest’s coastal trails, all while balancing travel costs with a modest budget.
  culinary: Jose Perera frequently prepares traditional mole poblano, freshly made tamales, and grilled elote, using ingredients like dried chiles, corn masa, and cotija cheese, while their home‑brew hobby
    leads them to experiment with smoky stouts that pair perfectly with their spicy dishes, reflecting a blend of culinary tradition and experimental flair.
  core: Jose Perera is a 37‑year‑old tech tinkerer who balances a love for hands‑on electronics and Mexican‑inspired cooking with a competitive edge that fuels both hobby projects and weekend poker tables,
    all while battling a chronic habit of missing deadlines and occasional dental neglect.
background:
  cultural: Jose grew up in a Mexican‑American household where Spanish was spoken at the dinner table and family traditions such as Día de los Muertos and festive holiday meals were central to his identity.
    Living in Lowell, Arkansas, he has also absorbed the rural, community‑focused culture of Benton County, participating in local events, supporting regional farmers, and enjoying outdoor activities like
    hunting and fishing. This blend of cultures informs his culinary preferences, his bilingual communication style, and his desire to serve both his heritage community and his broader neighbor­hood, fostering
    connections through shared meals, technical workshops, and community service.
attributes:
  skills: '["Electronics prototyping using Arduino and Raspberry Pi", "CAD drafting in SolidWorks and AutoCAD", "Data analysis with Python (Pandas, NumPy) and R", "Mechanical troubleshooting of household
    appliances", "Basic welding and metal fabrication", "DIY home automation and smart‑home integration", "Mathematical modeling and simulation", "Technical documentation and hobbyist guide writing", "Basic
    CNC machine operation", "Informal STEM teaching and workshop facilitation"]'
  hobbies: '["DIY electronics projects", "Model rocketry", "Cycling on Ozark trails", "Cooking traditional Mexican dishes", "Competitive card games (poker, bridge)", "Playing soccer in the local adult league",
    "Nature photography", "Homebrewing craft beer", "Reading popular science magazines", "Informal tutoring of neighborhood kids in robotics"]'
  career_goals: Jose aims to channel his technical versatility into a steady yet autonomous career. Over the next few years he plans to obtain certification as a Certified Electronics Technician and to
    acquire a small commercial space where he can run a custom‑fabrication and tech‑consulting shop serving local agricultural businesses and Mexican‑American entrepreneurs. His long‑term ambition is to
    become a go‑to problem‑solver for small manufacturers, helping them adopt automation and data‑driven processes while preserving the flexibility he values. He also envisions mentoring youth in his community
    through informal STEM workshops, bridging his competitive drive with a sense of contribution.
