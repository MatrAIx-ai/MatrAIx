  career_goals: Rose aims to transition into a nurse manager role within the next three years, leveraging her leadership abilities to mentor new nurses and streamline unit operations. She plans to earn
    a certification in nursing informatics to bridge clinical care with technology, and she hopes to spearhead a regional chronic‑disease education program that blends evidence‑based practice with community
    outreach. Long‑term, she envisions taking on a director of clinical services position, influencing policy and quality standards while maintaining a hands‑on connection to bedside care.
