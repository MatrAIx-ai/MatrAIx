personas:
  professional: Rose Carter, a seasoned registered nurse and emerging nursing informatics specialist, merges meticulous patient assessment, IV therapy, wound care, and emergency triage with data‑driven
    quality‑improvement projects, while her pragmatic curiosity and balanced assertiveness enable her to streamline electronic health records and mentor junior staff without sacrificing bedside compassion.
  sports: Rose Carter stays active by practicing yoga three times a week at the community wellness center, joining the Clover Walking Club for weekend trail hikes, and cheering on the Carolina Panthers
    during football season while occasionally catching Charlotte Hornets games on a business trip, blending low‑impact exercise with passionate regional team support.
  arts: Rose Carter unwinds with a battered copy of Philippa Gregory’s ‘The Other Boleyn Girl’, savors the bluegrass tones of Alison Krauss, regularly attends performances at the York County Community Theatre
    where they admire local playwrights and the occasional cameo by Tom Hanks on televised stage productions, and draws knitting pattern inspiration from the floral canvases of Georgia O’Keeffe.
  travel: Rose Carter prefers low‑key, meticulously planned weekend escapes to historic Southern towns like Savannah and Asheville, where they explore antebellum architecture and farm‑to‑table markets,
    while dreaming of a solo cultural pilgrimage to Edinburgh’s medieval streets, always booking through an online portal and budgeting carefully to preserve the garden fund for upcoming planting seasons.
  culinary: Rose Carter, a confident home cook, refreshes classic Southern fare by baking herb‑crusted tilapia instead of fried catfish, enriching collard greens with quinoa and smoked turkey, topping peach
    cobbler with a pinch of fresh ginger, and relishes occasional meals at the local farm‑to‑table bistro featuring kale and black‑bean salads.
  core: Rose Carter navigates life with a pragmatic curiosity that fuels data‑driven nursing, a habit of meticulously labeling garden seedlings, and an unabashed love for late‑night Southern sweet tea despite
    a prediabetes warning.
background:
  cultural: Raised in a middle‑class Southern family in upstate South Carolina, Rose grew up immersed in traditional values of hospitality, hard work, and community service. Her family's modest farming
    roots and church involvement instilled a sense of modesty, respect, and a strong work ethic. While she embraces the warmth of Southern gatherings, she also values progressive education, reflected in
    her pursuit of a STEM‑related bachelor's degree and a career in nursing. Living in Clover, York County, she balances reverence for regional customs—such as Southern cuisine and seasonal festivals—with
    an openness to new ideas, fostering a cultural identity that blends heritage with a forward‑looking, pragmatic outlook.
