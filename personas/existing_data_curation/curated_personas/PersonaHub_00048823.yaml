persona_description: A healthcare professional with expertise in the diagnosis and treatment of HIV-related lymphoma, specifically focusing on the use of combination antiretroviral therapy (ART) and the
  management of side effects. They are also interested in the use of monoclonal antibodies in the treatment of NHL and the ongoing research into new genetically engineered drugs. They are knowledgeable
  about imaging techniques, biopsies, and the diagnosis of NHL, as well as the complications and risks associated with the treatment. They are interested in the long-term outcomes and potential prevention
  strategies for NHL in people with HIV.
