  career_goals: Although retired from formal employment, Bradley aims to stay actively involved in his community and to translate his practical knowledge into mentorship and volunteer leadership. He hopes
    to become a certified first‑aid instructor for the local Red Cross chapter, lead a weekly DIY workshop series at the Manatee County senior center, and organize an annual neighborhood block party that
    celebrates local culture. He also aspires to write a concise guidebook on affordable home maintenance for seniors, and to cultivate a more balanced lifestyle that reduces his chronic worry through regular
    mindfulness practice and structured exercise.
