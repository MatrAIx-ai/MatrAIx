  hobbies: '[''Pickleball'', ''Vegetable gardening'', ''Fishing'', ''Senior center socials'', ''Card games'', ''Classic rock listening'', ''Classic car restoration'', ''Barbecue cooking'', ''Food bank volunteering'',
