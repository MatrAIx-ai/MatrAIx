  career_goals: George aims to secure stable, full‑time employment in a skilled trade that offers a clear routine and measurable outcomes. He plans to complete a GED program, followed by an apprenticeship
    in carpentry or HVAC service, and eventually obtain a certification that will allow him to start a small, locally‑focused maintenance business. His ambition includes achieving financial independence,
    building a reputation for dependable service in the Hanahan community, and eventually being able to support extended family members.
