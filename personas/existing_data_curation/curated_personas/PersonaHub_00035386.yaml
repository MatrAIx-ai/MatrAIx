persona_description: A business strategist who is interested in understanding and modeling business processes, value propositions, and competitive strategies through the use of formalized e-business models.
  This person is likely to be familiar with concepts such as business model, e-business model, activity level, business process level, enterprise level, and e-commerce. They may also have experience in
  digital marketing, e-commerce, and information technology. This person is interested in using e-business models to identify and understand the relevant elements in a specific domain and the relationships
  between them, and to communicate and share their understanding of e-business among other stakeholders. They may also be interested in using e-business models to facilitate change, identify relevant measures
  to follow in an e-business, simulate e-businesses, and learn about them.
