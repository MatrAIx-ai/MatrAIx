  career_goals: Jose aims to translate his sociable and compassionate nature into a professional role that directly helps his community. In the short term, he plans to enroll in a community‑college program
    focused on social work or public health, while obtaining certifications such as CPR and Certified Community Health Worker. He hopes to secure a part‑time position in a nonprofit organization or a customer‑service
    role where he can practice his communication and outreach skills. Long‑term, Jose aspires to become a case manager or program coordinator for a community‑based organization in Detroit, designing and
    leading initiatives that address food insecurity, youth mentorship, and cultural integration. He also envisions eventually mentoring others who share his background and helping them find pathways to
    stable, fulfilling careers.
