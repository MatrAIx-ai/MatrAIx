  hobbies: '["sketching/drawing", "digital illustration on tablet", "reading graphic novels", "playing soccer", "cooking pupusas with family", "nature walks and wildlife sketching", "community art workshops",
    "basic coding in Scratch", "listening to Salvadoran folk and Latin pop music"]'
  career_goals: Hector dreams of becoming a visual storyteller—combining his love of art, technology, and his Salvadoran heritage to create graphic novels and interactive digital experiences that celebrate
    cultural narratives. In the short term, he aims to attend an arts-focused high school, build a strong portfolio by entering local art contests, and volunteer as a youth art mentor at his community center.
    Long-term, he plans to pursue a Bachelor of Fine Arts with a concentration in illustration and later work as a graphic novelist or digital content creator for educational platforms, potentially collaborating
    with museums to design culturally‑rich exhibits.
