personas:
  professional: Hector Tobon is an aspiring junior digital illustrator who blends hand‑sketched fantasy scenes with vibrant tablet work, channeling a curious yet organized mindset into each project while
    they value collaborative feedback from classmates and workshop mentors.
  sports: Hector Tobon is a dedicated member of the Lake County Tigers youth soccer squad, thriving in small‑sided games that foster close teamwork, and they cheer on the professional San Jose Earthquakes
    whenever a weekend match aligns with their schedule.
  arts: Hector Tobon immerses themselves in graphic novel art, drawing inspiration from creators like Neil Gaiman, Marjane Satrapi, and the vivid panels of 'Saga', while they also enjoy listening to traditional
    folk melodies on accordion and contemporary Latin pop hits by artists such as Rosalía during their sketch marathons.
  travel: Hector Tobon loves weekend nature hikes in Lake County Regional Park, where they sketch local wildlife, dreams of trekking the towering cliffs of Yosemite National Park, and they hope to explore
    the historic streets of San Antonio next summer to discover vibrant murals and new artistic inspiration.
  culinary: Hector Tobon often helps prepare pupusas filled with cheese and beans alongside family, delights in the tangy zest of fresh salsa verde, and they experiment by adding diced mango to fruit salads
    for a sweet twist that reflects their playful culinary curiosity.
  core: Hector Tobon is a quietly curious 12‑year‑old who blends art, soccer, and family cooking into a harmonious routine, cherishing solo sketch sessions while nurturing close friendships and managing
    a careful allowance.
background:
  cultural: Hector comes from a Salvadoran-American family that immigrated to the United States a generation ago. At home, Spanish is spoken alongside English, making him fluent in both languages. Family
    gatherings are centered around traditional foods like pupusas, yuca frita, and tamales, and they celebrate Salvadoran holidays such as Día de la Independencia (Sept 15) and Semana Santa with special
    foods, music, and community events. The family is active in the local Catholic parish, where celebrations blend Salvadoran customs with American traditions. In Leesburg, Florida, Hector participates
    in a vibrant Salvadoran community that organizes cultural festivals, language classes, and dance workshops, helping him maintain strong ties to his heritage while also absorbing the multicultural environment
    of Central Florida.
