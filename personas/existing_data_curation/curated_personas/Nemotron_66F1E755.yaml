personas:
  professional: Jason Hudson, an aspiring junior programmer who spearheads their middle‑school coding club, blends their enthusiasm for strategy video games and hands‑on LEGO construction into a practical,
    detail‑oriented approach to building simple games and automations, yet often veers into spontaneous, unplanned side projects that reflect their love of improvisation.
  sports: Jason Hudson, a member of the neighborhood bike club who competes in the town’s youth fishing derby, roots for the Seattle Seahawks and the local high‑school basketball team, and they maintain
    fitness through brisk trail rides and occasional skate sessions with a small circle of friends.
  arts: Jason Hudson, an avid reader of Isaac Asimov and Brandon Sanderson, spends evenings listening to Hans Zimmer’s orchestral scores while crafting intricate LEGO cityscapes, and they occasionally channel
    the pixel‑art aesthetic of classic retro video games into custom doodles and model airplane designs.
  travel: Jason Hudson, who has camped in Yosemite National Park and visited the Kennedy Space Center with their family, dreams of a future trip to Japan to attend a manga convention, and they prefer to
    plan excursions around hands‑on activities like LEGO exhibit tours while sometimes joining spontaneous weekend camping trips when friends suggest them.
  culinary: Jason Hudson, who favors pepperoni pizza and cheesy nachos after marathon gaming sessions, enjoys whipping up simple meals such as grilled cheese sandwiches and microwavable mac‑and‑cheese,
    and they occasionally experiment with building edible LEGO‑inspired cupcakes decorated with rainbow sprinkles.
  core: Jason Hudson, a methodical yet impulsive teen who balances a love for structured building with spontaneous gaming adventures, treasures solitary creativity while still diving into small‑group activities,
    and they often trade disciplined planning for last‑minute fun.
background:
  cultural: Jason grew up in Frankford, a small community in Sussex County, Delaware. His family follows typical Mid‑Atlantic American traditions, celebrating holidays such as Thanksgiving, Fourth of July,
    and Easter, and attending a local Protestant church where he participates in youth gatherings. The town’s close‑knit atmosphere, proximity to farmland and coastal wetlands, and community events like
    county fairs have shaped his appreciation for practical work and outdoor activities. He values self‑reliance, community support, and a blend of modern technology with traditional rural life.
