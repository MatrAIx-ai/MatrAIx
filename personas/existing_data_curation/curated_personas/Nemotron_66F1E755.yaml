  career_goals: He plans to finish middle school and high school, enroll in a vocational program focused on automotive technology or mechanical engineering, and eventually work as a skilled mechanic or
    a robotics technician. He also hopes to keep developing his coding abilities to someday create video games or software tools. He wants a career that blends practical hands‑on work with a clear progression
    path, allows him to contribute to his community, and offers long‑term stability.
