personas:
  professional: Maria Landry, a 55‑year‑old management analyst, they combine rigorous data modeling and advanced Excel, Tableau, and SQL expertise with a design‑thinking mindset and gentle, empathetic communication,
    delivering strategic insights that guide senior leaders through complex change‑management initiatives.
  sports: Maria Landry, a fan of low‑impact fitness, they enjoy weekly yoga, weekend pickleball matches at the Macon Community Center, bird‑watching hikes on local trails, and cheer on the Atlanta Braves
    and Atlanta Falcons during the baseball and football seasons.
  arts: Maria Landry, an avid museum‑goer, they spend afternoons sketching the reflective light in the Macon Museum of Arts, draw inspiration from Georgia O’Keeffe’s botanical paintings and Yayoi Kusama’s
    immersive installations, and regularly volunteer at the Macon Arts Festival to curate panels featuring emerging Southern‑fusion artists.
  travel: Maria Landry, a meticulous planner, they alternate weekend getaways between bird‑watching treks in the Okefenokee Swamp, cultural tours of Savannah’s historic squares, and an annual pilgrimage
    to Florence, Italy, to study Renaissance frescoes, all while balancing a modest travel budget.
  culinary: Maria Landry, a creative home‑cook, they experiment with Southern‑fusion cuisine, perfecting dishes such as miso‑glazed shrimp and grits, peach‑infused bourbon barbecue sauce, and collard‑green
    kimchi, while sourcing heirloom tomatoes, pecans, and smoked paprika from local farmers' markets.
  core: Maria Landry is a quietly inquisitive strategist who channels a love for art and meticulous data into thoughtful solutions, yet habitually worries over every detail and can’t resist a late‑night
    slice of pecan pie.
background:
  cultural: Maria grew up in a close‑knit community in central Georgia, where Southern hospitality, church involvement, and family gatherings shaped her values. The region’s rich musical and artistic traditions
    sparked her early appreciation for visual and performing arts. While she respects longstanding customs—such as seasonal festivals, communal potlucks, and a reverence for local heritage—her college education
    and professional experiences broadened her worldview, encouraging openness to unconventional ideas. This blend of Southern roots and a curiosity for new cultural experiences informs her collaborative
    style, her commitment to community service, and her preference for intimate, meaningful social settings.
attributes:
  skills: '[''Strategic analysis'', ''Data modeling'', ''Data visualization (Tableau, Excel)'', ''SQL querying'', ''Process improvement'', ''Budgeting and financial forecasting'', ''Change management'',
    ''Executive report writing'', ''Workshop facilitation'', ''Design thinking for business solutions'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and psychology'', ''Yoga and mindfulness meditation'', ''Gardening (Georgia lilies
    and native plants)'', ''Cooking Southern‑fusion cuisine'', ''Volunteering at community arts festivals'', ''Bird‑watching'', ''Landscape photography'']'
  career_goals: Maria aims to transition into a senior strategic consulting role where she can lead large‑scale transformation projects for midsize companies in the Southeast. She wants to earn a PMP certification
    and deepen her expertise in predictive analytics to become a recognized thought leader in data‑driven decision making. Mentorship is important to her; she hopes to sponsor junior analysts, especially
    women returning to the workforce, and to eventually launch a boutique consultancy that blends analytics with cultural‑program development for community revitalization in Twiggs County.
