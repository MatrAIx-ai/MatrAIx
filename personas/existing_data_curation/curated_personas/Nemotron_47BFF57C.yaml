personas:
  professional: An aspiring game designer, Anthony Manley channels his love for strategic and simulation video games into creating detailed level prototypes, leveraging his knack for structured planning
    while flexibly adapting to new ideas, even as school projects sometimes slip to the back of his schedule.
  sports: Anthony Manley spends weekday afternoons riding at the local equestrian club, follows the Dallas Cowboys and Texas Rangers, and they enjoy weekend fishing trips on the family ranch while participating
    in a youth 4‑H hunting program during the hunting season.
  arts: Anthony Manley dives into science‑fiction epics by Brandon Sanderson and classic fantasy by J.R.R. Tolkien, while his soundtrack alternates between Johnny Cash, Willie Nelson, Led Zeppelin, and
    The Eagles, and they spend rainy evenings sketching model kit designs inspired by the aeronautical art of Frank Taylor.
  travel: Anthony Manley has camped in Big Bend National Park and dreams of fishing the rivers of Patagonia, and they prefer road‑trip itineraries that balance detailed maps with spontaneous stops at roadside
    diners, often packing a portable fishing rod for unexpected lakes.
  culinary: Anthony Manley favors hearty meals like smoked brisket tacos with jalapeño salsa, homemade chili con carne, and classic country‑style biscuits and gravy, and they can assemble a decent grilled
    cheese in under five minutes, though they often skip breakfast in favor of late‑night gaming snacks.
  core: Anthony Manley is a methodical teenager who pairs precise model‑building with spontaneous hunting trips, habitually procrastinates on schoolwork, and collects vintage country vinyl records for the
    occasional nostalgic break.
background:
  cultural: Anthony grew up in a small, predominantly white rural community in West Texas. His family’s daily life centers around ranching and oil‑field work, and local traditions—county fairs, high‑school
    football Friday nights, and church gatherings—form the backdrop of his upbringing. This environment has instilled values of self‑reliance, respect for the outdoors, and a straightforward, practical
    outlook common to many West Texas families.
attributes:
  skills: '["Basic mechanical repair (small engines, ATVs, lawn mowers)", "Woodworking (simple furniture and repairs)", "Computer troubleshooting and basic coding (Scratch)", "Ranching chores (livestock
    feeding, fence maintenance)", "Strategic video gaming (problem solving and planning)", "Basic gardening and horticulture"]'
  hobbies: '["Playing strategy/simulation video games", "Model kit building", "Fishing", "Hunting", "Reading sci‑fi/fantasy novels", "Horseback riding", "Listening to country music"]'
  career_goals: Anthony aims to earn his GED and enroll in a technical trade program to become a certified diesel mechanic or agricultural equipment technician. He envisions working for an oil‑field service
    company or a local ranch, where his mechanical skills will be in demand. Long‑term, he hopes to open his own repair shop that services farm machinery and trucks, providing reliable service to his community
    while achieving financial independence.
