  career_goals: Eduardo dreams of becoming an astronaut or a scientist who explores space, merging his curiosity about the universe with his love for creative problem‑solving. He also imagines working as
    an animator or museum curator, roles where he could blend his artistic skills with his cultural heritage to tell stories that inspire other kids. He aims to keep learning new ideas, develop his technical
    abilities, and one day contribute to projects that combine science, art, and community outreach.
