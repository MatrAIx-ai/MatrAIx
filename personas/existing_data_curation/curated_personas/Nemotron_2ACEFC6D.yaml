personas:
  professional: Eduardo Mendez is an aspiring young game developer who designs simple Scratch games inspired by sci‑fi books and folklore, showcasing curiosity, meticulous planning, and a talent for storytelling
    that shines in his after‑school art club.
  sports: Eduardo Mendez is an energetic midfielder who organizes weekend soccer mini‑tournaments with friends at the local park, proudly jerseys up for Atlanta United FC, and also practices baseball fundamentals
    with the Lawrenceville Youth League during the spring.
  arts: Eduardo Mendez creates vibrant cartoons that blend Mexican folklore motifs with futuristic sci‑fi elements, drawing inspiration from Frida Kahlo, the animated film Coco, and comic creator Stan Lee,
    while also enjoying the music of Luis Miguel during art sessions.
  travel: Eduardo Mendez loves family road trips that blend amusement and culture, having explored Disney World in Orlando and San Antonio’s River Walk, and they dream of visiting Oaxaca’s bustling markets
    and the historic streets of Barcelona for a future cultural adventure.
  culinary: Eduardo Mendez enthusiastically chops cilantro, squeezes lime, and helps assemble tacos and guacamole at home, while also mastering the art of rolling mini‑tamales and proudly baking chocolate
    churros, showcasing a budding chef’s love for bold, spice‑laden flavors.
  core: Eduardo Mendez blends disciplined creativity with boundless energy, juggling soccer, coding, and vivid storytelling while occasionally overindulging in sweets and skipping chores.
background:
  cultural: Eduardo comes from a Mexican‑American family in Lawrenceville, Georgia. He speaks Spanish at home and English at school, allowing him to comfortably navigate both cultures. His family celebrates
    Día de los Muertos, Mexican Independence Day, and enjoys traditional foods such as tamales and pozole. He attends a local Catholic church where community festivals reinforce his cultural identity. Growing
    up in a diverse suburb, he also experiences Southern U.S. customs, blending Mexican traditions with American school life, which shapes his outlook and values.
