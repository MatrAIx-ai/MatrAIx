persona_description: A scientist who specializes in virology, particularly in the study of Zika virus and its interactions with the placenta. She is interested in understanding the mechanisms by which Zika
  virus infects and replicates in immune cells from the placenta, and how this infection can lead to the transmission of the virus to the developing brain cells in the fetus. She is also interested in the
  role of host genetics, non-viral factors, and timing in determining infectivity, and in the potential for antiviral therapies and preventive measures.
