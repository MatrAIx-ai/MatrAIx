personas:
  professional: Adanna Watkins, a budding preschool storyteller, channels a curious and energetic spirit into leading imaginative play circles at kindergarten, where their talent for improvising simple
    narratives and flexible, relaxed attitude toward rules creates lively, occasionally chaotic sessions.
  sports: Adanna Watkins dabbles in T‑ball with the local Little Guardians club, cheers passionately for the Atlanta Braves during spring outings, and channels a competitive energy into backyard races with
    cousins, balancing a love of team spirit with a personal drive to win.
  arts: Adanna Watkins spends afternoons in the community art center painting vibrant scenes inspired by the town’s holiday parades, idolizes artist Georgia O’Keeffe and delights listening to Yo‑Yo Ma’s
    cello suites, while their open‑minded curiosity fuels a habit of trying new crafts like clay modeling and finger painting.
  travel: Adanna Watkins enjoys family road trips to historic Savannah, the bustling Georgia Aquarium in Atlanta, and dreams of a future adventure to Disneyland, favoring relaxed itineraries with plenty
    of playground stops, yet they sometimes get restless if plans feel too rigid.
  culinary: Adanna Watkins favors creamy mac and cheese sprinkled with cheddar, loves the sweet crunch of peanut butter and jelly sandwiches, can whisk together a simple fruit salad with strawberries and
    bananas, and delights in tasting cornbread at church potlucks, while their playful messiness often leaves flour dust on the kitchen counter.
  core: Adanna Watkins is a curious, energetic four‑year‑old who thrives on group play, artistic experiments, and occasional competitive scraps, all while juggling a love for spontaneous fun with a tendency
    to forget the little details.
background:
  cultural: Adanna is raised in Griffin, a close‑knit community in Butts County, Georgia, within a white Southern family that values church fellowship, family gatherings, and local traditions like weekend
    picnics and holiday parades. While embracing these Southern roots, her parents foster an open‑minded environment that celebrates diverse artistic experiences—museum visits, multicultural art workshops,
    and a variety of music—from classical to world rhythms. This blend of Southern community spirit and exposure to broader cultural influences nurtures her appreciation for art, curiosity about the world,
    and comfort in participating in group activities.
