  career_goals: Adanna dreams of a future where she can keep exploring new ideas. She often says she wants to be an astronaut who travels to space, an artist who creates vibrant paintings, or a wildlife
    explorer who cares for animals and discovers new species. Her competitive spark makes her eager to be the best at any pursuit, and she imagines a career that lets her stay curious, work with others,
    and bring imaginative projects to life.
