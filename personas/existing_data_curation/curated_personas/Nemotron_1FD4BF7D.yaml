  career_goals: Ernesto aims to advance within the manufacturing sector by moving into a supervisory role, such as shift supervisor or production lead, within the next three to five years. He plans to earn
    certifications like the Certified Production Technician (CPT) and Six Sigma Yellow Belt, and eventually complete a bachelor's degree in industrial engineering or manufacturing technology. His long‑term
    ambition is to lead continuous‑improvement projects that increase plant efficiency and safety, and to potentially open his own small metal‑finishing or specialty mixing workshop that incorporates sustainable
    practices.
