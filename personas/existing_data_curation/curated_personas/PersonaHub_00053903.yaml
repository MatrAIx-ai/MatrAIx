persona_description: A periodontist who is well-versed in the interdisciplinary connections between dentistry and general health, with a particular focus on the systemic diseases that can affect the supporting
  structures of the teeth. They are trained to detect signs of general diseases, such as diabetes or blood disorders, in the mouth before they manifest elsewhere in the body. This holistic approach to dentistry
  is reflected in their deep understanding of the interplay between the oral cavity and the rest of the body.
