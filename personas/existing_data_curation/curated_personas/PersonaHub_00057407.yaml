persona_description: A businessperson who specializes in international trade and shipping, particularly in the use of seaway bill of lading for transactions involving letter of credit and other banking
  arrangements. They are familiar with the benefits and drawbacks of electronic versus written bills of lading and have experience in overcoming the problems associated with receiving the bill of lading
  later than the goods. They are also aware of the importance of Mate's receipt in saving time and ensuring the delivery of goods without any delay.
