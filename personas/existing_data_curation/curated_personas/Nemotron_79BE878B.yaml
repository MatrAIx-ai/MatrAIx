  career_goals: Joseph aims to deepen his impact on higher education by earning a master’s degree in educational leadership within the next two years, positioning himself for a department chair role at
    his college. He plans to spearhead a blended-learning initiative that leverages his curiosity for new ideas while maintaining practical outcomes for students. Additionally, he seeks to publish research
    on adult learner retention in rural settings and to build community partnerships that bring local resources into the classroom.
