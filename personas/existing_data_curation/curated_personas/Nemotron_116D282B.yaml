personas:
  professional: Chester Petrat, a four‑year‑old aspiring builder, spends hours arranging LEGO bricks into precise, repeatable structures, showcasing a love for routine and practical problem‑solving while
    eagerly sharing their creations with peers, though they’re sometimes swayed to abandon the plan for a spontaneous twist when a friend suggests a new idea.
  sports: Chester Petrat, a four‑year‑old who dashes through the preschool soccer field every Saturday with their Tiny Tykes club, idolizes the energy of the New York Yankees during baseball season and
    the speed of the Los Angeles Lakers on TV, and they channel their outgoing, competitive spirit into high‑energy games while occasionally preferring the comfort of familiar routines like the same warm‑up
    stretches each week.
  arts: Chester Petrat, a four‑year‑old who spends afternoons drawing colorful crayon pictures of dinosaurs and superheroes, sings along to the catchy tunes of The Wiggles and the playful melodies of Disney’s
    “Let It Go,” and eagerly attends weekend storytime featuring classic picture books by Dr. Seuss, they exhibit an energetic, social love for the arts that mixes routine favorite songs with occasional
    curiosity about new characters.
  travel: Chester Petrat, a four‑year‑old who loves short family road trips to the nearby zoo and beachside splash parks, dreams of visiting Disneyland in California and the Great Barrier Reef someday,
    and they prefer the comfort of familiar car seats and snack packs while their parents plan each outing down to the favorite swing‑set stop, balancing a love for routine with bursts of adventurous curiosity.
  culinary: Chester Petrat, a four‑year‑old who devours mac and cheese with extra cheddar, spreads peanut butter on toast with a plastic knife, eagerly drinks strawberry yogurt laced with honey, and begrudgingly
    pushes peas around the plate, they show a simple yet enthusiastic palate that favors bright, recognizable flavors and a budding sense of independence in the kitchen.
  core: Chester Petrat, a four‑year‑old who thrives on familiar routines, bursts with sociable energy, and balances a playful competitiveness with a laid‑back approach to obligations, they create a uniquely
    spirited outlook on life.
background:
  cultural: Chester is a White American raised in Brooklyn's diverse Kings County neighborhood. His family celebrates mainstream American holidays such as Thanksgiving, Christmas, and the Fourth of July,
    while also participating in community events that reflect the multicultural fabric of the borough. He attends a public preschool with children from many ethnic backgrounds, giving him daily exposure
    to a variety of languages, foods, and cultural traditions, which broadens his understanding of the world beyond his own family's traditions.
