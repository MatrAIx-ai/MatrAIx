  career_goals: Jatravian aims to expand his company's presence across the Gulf Coast while embedding sustainable and socially responsible practices. He seeks to position the firm as a benchmark for inclusive
    leadership, creating a pipeline of Black and minority executives through mentorship programs and a scholarship fund for humanities students in Lafayette. He also intends to author a memoir that weaves
    together his business insights with reflections on African‑American heritage in the South, thereby leaving a lasting intellectual legacy. Additionally, he is committed to strengthening the company's
    resilience by promoting mental‑health resources and stress‑management initiatives for all employees.
