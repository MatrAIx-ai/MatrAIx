  career_goals: Although retired from formal employment, Grace aims to channel her engineering expertise into mentorship and community impact. She plans to volunteer as a STEM curriculum advisor for local
    schools and youth programs, develop a mentorship network for young women entering engineering fields, and secure a grant to establish a community makerspace in Southfield that offers hands‑on workshops
    for all ages. Additionally, she aspires to author a memoir chronicling her experiences as a woman in a traditionally male‑dominated profession, and to serve on the board of the Oakland County Science
    & History Museum, where she can help shape educational initiatives and public exhibitions.
