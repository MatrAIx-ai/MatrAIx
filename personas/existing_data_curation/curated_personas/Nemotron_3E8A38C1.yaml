  hobbies: '[''Gardening'', ''Baking and Canning'', ''Quilting'', ''Church Choir'', ''Walking with Friends'', ''Community Bingo Nights'', ''Line Dancing'', ''Reading Mystery Novels'']'
  career_goals: While no longer in the formal workforce, Ann aims to stay active and independent, preserve her family’s culinary and craft traditions, mentor younger neighbors in practical skills, and continue
    contributing to the social life of her community. She also hopes to maintain her health through regular walks and garden work, and to travel occasionally within coastal North Carolina to visit family
    and attend regional festivals.
