personas:
  professional: Toni Daniels runs a high‑end nail studio in Austin that blends precise manicure techniques with scientific analysis of product chemistry, using their STEM background to formulate safe, custom
    nail art while leveraging digital design tools and social‑media savvy to attract a loyal, eco‑conscious clientele.
  sports: Toni Daniels fuels fitness by practicing Vinyasa yoga thrice weekly, hiking the Texas Hill Country with the Austin Outdoor Club, cheering for Austin FC soccer, and occasionally joining a weekend
    recreational softball league with salon staff to stay sociable and energetic.
  arts: Toni Daniels draws artistic inspiration from street‑art icons like Banksy, the vivid color palettes of Frida Kahlo, and the immersive installations of Yayoi Kusama, regularly attending Austin’s
    art fairs and collaborating with local muralists to translate those motifs into innovative, eco‑friendly nail designs.
  travel: Toni Daniels curates travel trips that blend creative retreats and nature hikes, having trekked the red rocks of Sedona, explored the vibrant galleries of Barcelona, and road‑tripped through the
    Hill Country to Taos for its Pueblo art scene, always balancing a modest travel budget with the desire for fresh inspiration.
  culinary: Toni Daniels experiments in the kitchen with intermediate skill, frequently whipping up avocado‑lime salsa, rosemary‑infused quinoa bowls, and herb‑crusted salmon while savoring seasonal Texas
    heirloom tomatoes and West Texas pecans, often using leftovers as natural pigments for limited‑edition nail polish swatches.
  core: Toni Daniels is a scientifically minded nail artist who knits curiosity, eco‑conscious entrepreneurship, and a love for vibrant art into a balanced, community‑focused lifestyle punctuated by yoga,
    hiking, and a habit of over‑investing in limited‑edition craft supplies.
background:
  cultural: Toni grew up in a close‑knit, predominantly white community in central Texas, with family roots that trace back to both Southern and Midwestern traditions. Her upbringing emphasized Southern
    hospitality, hard work, and community involvement, which she blends with a modern, open‑minded appreciation for diverse artistic expressions. While she respects local customs such as weekend barbecues
    and community festivals, she also embraces the eclectic cultural mix of the Austin‑Temple corridor, drawing inspiration from its music, visual arts, and progressive ideas.
attributes:
  skills: '[''Nail Art Design'', ''Manicure & Pedicure Techniques'', ''Salon Safety Protocols'', ''Color Theory'', ''Customer Service'', ''Business Management'', ''Basic Cosmetic Chemistry'', ''Social Media
    Marketing'', ''Product Formulation Insight'', ''Inventory Management'']'
  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Yoga'', ''Dance'', ''Hiking'', ''DIY Crafts'', ''Cooking'', ''Reading Science Articles'', ''Community Volunteering'']'
  career_goals: Toni aims to open her own boutique salon in the Temple area that doubles as a creative studio for custom, eco‑friendly nail art. She plans to develop a line of non‑toxic, sustainably sourced
    nail polishes that combine her STEM knowledge of chemistry with her artistic vision. Over the next five years she hopes to earn advanced certification in nail technology, host workshops for aspiring
    nail artists, and eventually expand her brand to a small regional franchise while maintaining a community‑oriented, hands‑on approach.
