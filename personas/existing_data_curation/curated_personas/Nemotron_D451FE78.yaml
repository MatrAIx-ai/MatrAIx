personas:
  professional: Debra Phan, a 22‑year‑old arts administration major, combines meticulous event‑planning skills with a flair for digital storytelling, coordinating campus exhibitions, leading a volunteer
    art‑mentor program, and leveraging Photoshop and Canva to craft inclusive outreach campaigns while assertively championing under‑represented local artists.
  sports: Debra Phan enjoys weekend hikes with the Asheville Hiking Club, is a casual member of the Raleigh Running Club where they train for 5 k races, avidly follows the Charlotte Hornets and North Carolina
    Courage, and squeezes in yoga sessions to counterbalance long hours of event planning.
  arts: Debra Phan frequents the Asheville Art Museum, sketches in the margins of catalogues, curates pop‑up shows featuring emerging talent, draws inspiration from Yayoi Kusama’s immersive installations
    and the photography of Ansel Adams, and never misses a live set by local indie band The Woodlawn Collective.
  travel: Debra Phan prefers meticulously planned weekend escapes to the Blue Ridge Mountains, has trekked the Appalachian Trail to photograph sunrise over Hawksbill Mountain, dreams of visiting the street
    art districts of Berlin, and balances limited student finances with cost‑effective Airbnb stays and spontaneous local festivals.
  culinary: Debra Phan experiments with recipes like Thai green curry with fresh lemongrass, Southern cornbread with jalapeño, and matcha tiramisu, enjoys sourcing miso and heirloom tomatoes at farmers’
    markets, but habitually burns the edges of roasted vegetables when multitasking between photo editing and cooking.
  core: Debra Phan blends a curious, organized nature with an outgoing love for art and community, juggling meticulous planning and occasional impulsive splurges while nurturing a habit of late‑night coffee‑fuelled
    creativity.
background:
  cultural: Debra grew up in La Grange, a small town in Greene County, North Carolina, where Southern hospitality, close‑knit community ties, and local traditions such as county fairs and church gatherings
    shaped her upbringing. Her family placed a high value on education and community involvement, encouraging her to pursue college studies and to stay engaged with local cultural events. While rooted in
    the rhythms of rural life—farmers' markets, seasonal festivals, and a strong sense of neighborliness—Debra also embraces broader artistic influences through school, online platforms, and travel, creating
    a blend of regional heritage and contemporary cultural curiosity.
attributes:
  skills: '[''Event planning'', ''Public speaking'', ''Team leadership'', ''Project coordination'', ''Curatorial research'', ''Digital media editing (Photoshop, Canva)'', ''Social media management'', ''Customer
