  hobbies: '[''Visiting art galleries'', ''Sketching and painting'', ''Photography'', ''Live music concerts'', ''Reading contemporary fiction'', ''Hiking'', ''Cooking new recipes'', ''Community theater
    participation'', ''Youth art mentorship volunteering'', ''Exploring local craft fairs'']'
  career_goals: Debra aims to complete her bachelor's degree in arts administration or communications, building a portfolio that blends creative direction with community outreach. She aspires to work in
    a regional museum, cultural center, or non‑profit arts organization where she can design inclusive programs, manage exhibitions, and promote local artists. In the longer term, she envisions leading
    a community arts initiative in rural North Carolina that connects youth with creative resources and fosters cultural vitality in her hometown.
