  hobbies: '["Exploring art galleries and street murals", "Spontaneous photography", "Listening to philosophy/science podcasts", "Cooking experimental recipes", "Hiking local trails", "Writing an anonymous
    caregiving blog", "Participating in online debate forums", "DIY home projects"]'
  career_goals: Wilbur plans to earn his GED within the next year and obtain a Certified Nursing Assistant (CNA) certification shortly after. With those credentials, he aims to be promoted to a senior aide
    position and eventually transition into a supervisory or case‑manager role within his home‑care agency. Long‑term, he dreams of launching his own boutique personal‑care service that integrates art‑therapy
    activities to improve client quality of life. To support this vision, he intends to attend workshops on geriatric nutrition, art therapy, and business management, and build a network of local healthcare
    providers.
