personas:
  professional: Wilbur Rogers, a 27‑year‑old home‑care aide in Harford County, blends hands‑on caregiving with an instinct for spontaneous art‑therapy, leveraging solid first‑aid training and a creative
    problem‑solving style to tailor daily routines for elderly clients while eyeing a GED and CNA certification to advance toward a senior aide or supervisory role.
  sports: Wilbur Rogers enjoys weekend hikes on the Susquehanna River Trail with the Harford County Hiking Club, joins pick‑up basketball games with friends while rooting for the Baltimore Ravens on Sundays,
    and occasionally squeezes in a quick spin class at the local gym despite a generally unstructured fitness routine.
  arts: Wilbur Rogers drifts through Bel Air’s pop‑up galleries and street murals—drawing inspiration from Vivian Maier’s candid photography and the bold colors of local muralist Travis Hall—while curating
    a personal playlist of Hozier’s folk‑rock anthems and Kamasi Washington’s expansive jazz suites to accompany spontaneous photo walks.
  travel: Wilbur Rogers prefers spur‑of‑the‑moment weekend getaways, often packing a bike and camera for a fast drive to Annapolis’s historic waterfront or a solo hike through Shenandoah National Park,
    yet dreams of an extended solo backpacking trek across the misty Scottish Highlands to capture loch‑side sunrise photos and explore Celtic folklore.
  culinary: Wilbur Rogers, a self‑taught kitchen experimenter, whips up quick Mediterranean bowls brimming with chickpeas, feta, and roasted red peppers, perfects a caramelized onion tart for friends, obsessively
    balances smoky chipotle into his signature pulled‑pork sliders, and still savors the occasional bite of a perfectly fried Maryland crab cake from his favorite waterfront eatery.
  core: Wilbur Rogers channels a restless curiosity into spontaneous art‑infused caregiving, hoards camera lenses and half‑finished recipes, and battles a chronic aversion to rigid schedules that leaves
    them scrambling at deadlines.
background:
  cultural: Wilbur grew up in a working‑class family in Harford County, Maryland, an area characterized by a blend of suburban stability and proximity to Baltimore’s cultural diversity. As a white American
    from the Mid‑Atlantic, his upbringing emphasized a strong work ethic, self‑reliance, and community ties typical of small‑town Maryland life. He was raised in a household that valued practical skills
    and informal learning, which contributes to his hands‑on approach to both work and hobbies. Although he left formal schooling before completing a high school diploma, he continues to pursue education
    through community courses and self‑directed study, reflecting the region’s emphasis on lifelong learning and personal improvement.
attributes:
  skills: '["Personal care assistance", "Mobility support", "Medication reminders", "Basic first aid", "Health monitoring", "Client communication", "Creative problem solving", "Meal preparation", "Household
