persona_description: A conservation biologist and researcher who specializes in the study of orangutan populations and their habitat use in oil palm landscapes. They are highly knowledgeable about the ecological
  and social dynamics of orangutan communities in the Kinabatangan region of Sabah, Malaysia, and have conducted extensive fieldwork and research on the subject. They have published numerous papers and
  studies on the topic, and are recognized as a leading expert in the field. They are committed to understanding the complex interplay between human activities, such as oil palm cultivation, and the orangutan
  populations in the region, and are advocating for the adaptation of oil palm landscapes to ensure the long-term survival of the orangutan populations in the area.
