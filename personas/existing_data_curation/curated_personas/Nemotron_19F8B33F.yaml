personas:
  professional: Joanne Jones, a budding imaginative architect, constructs towering block cities with a curious yet practical eye, inviting nearby toddlers into cooperative play, while they often leave a
    charmingly disordered scatter of bricks across the playroom floor.
  sports: Joanne Jones loves dart‑like runs across the park with a bright orange cricket bat, reenacting summer baseball excitement of the Chicago Cubs, and they regularly join the local YMCA’s toddler
    Mini‑Tots T‑ball league, though their energy often spills over into improvised dance marathons after games.
  arts: Joanne Jones sways energetically to Raffi’s Baby Beluga, giggles at the vivid illustrations of Eric Carle’s The Very Hungry Caterpillar, and eagerly stages dramatic pretend‑play concerts featuring
    Disney’s Let It Go, even as they stubbornly scribble outside the coloring book lines.
  travel: Joanne Jones delights in family road trips to the sunny shores of Miami Beach where they splash in gentle waves, and they dream of a future adventure to the dazzling marine exhibits of Tokyo’s
    Aqua Park, envisioning themselves marveling at the neon‑lit fish tanks.
  culinary: Joanne Jones relishes buttery mashed potatoes sprinkled with cheddar, happily spreads strawberry jam on soft white bread, yet they stubbornly push away broccoli florets, often smearing the spoon
    with peanut butter in a messy, yet joyous, snack ritual.
  core: Joanne Jones explores the world with a gentle, compassionate curiosity, while an endearing habit of scattering toys everywhere reflects that they often prefer a relaxed, disorganized approach to
    life.
background:
  cultural: Joanne is raised in a Black family in Newark, New Castle County, Delaware, where African‑American cultural traditions blend with the Mid‑Atlantic community. Her family celebrates milestones
    with soulful music, gospel hymns, and home‑cooked soul food, often gathering for Sunday church services and neighborhood block parties. She is exposed to storytelling that honors her heritage, teaching
    values of respect, resilience, and community support. Growing up in a diverse suburban setting, she also experiences the rhythms of local festivals and multicultural preschool activities, which reinforce
    her identity and social empathy.
