  career_goals: At two years old, Joanne has no defined career path yet, but her play often reflects budding ambitions. She enjoys pretending to be a caregiver, feeding dolls, and mimicking teachers reading
    books aloud, indicating an early interest in nurturing and educational roles. Her curiosity about how everyday objects work (e.g., watching her mother cook) suggests a future inclination toward hands‑on
    problem solving. For now, her primary ambition is to explore her environment safely, learn new words, and develop the ability to help others through play.
