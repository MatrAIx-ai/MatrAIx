persona_description: A healthcare policy expert and advocate for universal health coverage (UHC) who is familiar with the complexities and challenges of implementing UHC in different countries. This person
  has a deep understanding of the financial mechanisms that underpin UHC, including fee-for-service, diagnostic-related groups (DRGs), and capitation payment systems. They are also knowledgeable about the
  role of government and finance ministries in shaping UHC policies and programs, and have experience with research on how competition can improve hospital quality. This person is passionate about promoting
  UHC and believes in the potential for significant improvements in health outcomes and economic growth if UHC is implemented effectively.
