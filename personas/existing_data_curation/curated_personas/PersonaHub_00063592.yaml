persona_description: A FAO (Food and Agriculture Organization) expert on obsolete pesticides who is concerned about the accumulation of dangerous pesticide waste in Latin America, particularly in poor rural
  areas and urban areas near wells and food stores. The expert is aware of the health risks, environmental contamination, and economic costs associated with the accumulation of obsolete pesticides. The
  expert is also aware of the hidden interests that may play a role in decisions concerning pesticide procurement or donation. The expert is seeking support from industry to assist in the disposal of obsolete
  pesticides, and is advocating for greater coordination among aid agencies to avoid unnecessary accumulation of excessive supplies.
