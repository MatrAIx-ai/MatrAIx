personas:
  professional: Yusniel Soto, a security guard and gambling‑surveillance officer, leverages a keen eye for CCTV anomalies and a pragmatic curiosity about AI‑driven analytics to keep operations smooth, yet
    they sometimes let their relaxed attitude toward paperwork produce disorganized shift reports.
  sports: Yusniel Soto, a midfielder for the community league side Maryland United and an avid fan of the Baltimore Ravens, they stay fit through weekend soccer matches and leisurely fishing along the Monocacy
    River, preferring low‑impact cardio over structured gym routines.
  arts: Yusniel Soto, who fills their garage workshop with Garífuna rhythms from Andy Palacio and reggaeton beats by Bad Bunny, also frequents the Baltimore Museum of Art to view Kehinde Wiley’s portraits,
    and they find these auditory and visual experiences essential for balancing the high‑stress demands of their job.
  travel: Yusniel Soto, mixing spur‑of‑the‑moment road trips to the Shenandoah Valley with carefully budgeted flights to Costa Rica’s fishing villages, they balance a love of adventure with financial caution
    imposed by their recent divorce, and they always pack a portable cooler for river fishing stops.
  culinary: Yusniel Soto, an accomplished home chef who perfects baleadas with refried beans, cheese, and plantains while experimenting with shrimp‑and‑grits tacos seasoned with cilantro and lime, they
    enjoy the creative process yet sometimes abandon a dish midway to check surveillance feeds.
  core: Yusniel Soto is a curiosity‑driven security professional who grapples with disorganization, worries about finances, and they find solace in soccer, fishing, and bold, home‑cooked meals.
background:
  cultural: Yusniel was raised in a Honduran immigrant household, fluent in both Spanish and English. His family’s Catholic traditions, celebrations of Semana Santa, and the communal spirit of Honduran
    gatherings have shaped his values of loyalty, hospitality, and respect for elders. Relocating to Frederick, Maryland, he navigated a bicultural identity, blending Central American customs with Mid‑Atlantic
    lifestyle. This dual perspective gives him a natural ability to connect with diverse coworkers and patrons, while his cultural heritage fuels his love for music, food, and community events. He maintains
    close ties with an extended family network that lives in both Honduras and the United States, providing a sense of belonging that balances his independent, pragmatic approach to work and life.
attributes:
  skills: '["CCTV camera operation and maintenance", "Live video monitoring and real-time threat detection", "Analysis of recorded surveillance footage", "Knowledge of state and local gambling regulations",
    "Cash-handling security procedures", "De-escalation and conflict-resolution techniques", "First aid and CPR certification", "Incident report writing and documentation", "Collaboration with local law
    enforcement", "Basic cybersecurity awareness for surveillance systems", "Physical fitness and self-defense basics"]'
  hobbies: '["Soccer (playing and watching)", "Fishing at the Monocacy River", "Cooking traditional Honduran dishes", "Listening to regional music (Garífuna, reggaeton)", "Building DIY electronics kits",
    "Gardening", "Reading crime novels and true‑crime podcasts", "Playing chess (online and in person)", "Exploring local history museums", "Watching documentaries on security technology"]'
  career_goals: Yusniel aims to move from floor‑level monitoring to a supervisory position, eventually becoming a shift manager or head of surveillance for a regional casino or security firm. He plans to
    augment his associate’s degree with coursework in criminal justice and cybersecurity, focusing on AI‑driven video analytics. His ambition includes designing more efficient monitoring protocols that
    blend his curiosity for new technology with the practical need for reliable security operations. He also hopes to mentor newer guards, creating a supportive team environment that balances cooperation
    with assertive leadership. Long‑term, he envisions establishing a consulting service that advises smaller gaming venues on cost‑effective surveillance solutions, providing financial stability for his
    family after divorce.
