  hobbies: '[''Soccer (team play)'', ''LEGO building'', ''Scratch programming'', ''Recorder music practice'', ''Cooking Mexican dishes with family'', ''Día de los Muertos crafts'', ''Reading adventure books'',
    ''Strategy board games'']'
  career_goals: Bernardo aims to become a civil engineer, motivated by his enjoyment of building things, his methodical approach, and desire to create safe, functional spaces for his community. He is also
    intrigued by technology and hopes to develop educational software, and he envisions leading a soccer team or community program that encourages teamwork and collaboration.
