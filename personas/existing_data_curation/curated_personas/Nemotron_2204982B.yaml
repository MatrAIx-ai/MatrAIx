personas:
  professional: Bernardo Peralta, a 10‑year‑old aspiring coder, treats each Scratch project like a mini‑software development sprint, meticulously planning game logic, documenting sprites, and iterating
    with the same disciplined routine they apply to LEGO builds.
  sports: Bernardo Peralta thrives on the soccer field as a forward for the Northside Strikers youth club, eagerly follows LA Galaxy matches, and maintains a disciplined weekly practice schedule that mirrors
    their organized nature.
  arts: Bernardo Peralta, an enthusiastic recorder player, practices simple Mozart pieces while devouring adventure novels by Rick Riordan, strategizing board games like Catan, and admiring LEGO designer
    Nathan Sawaya’s creations as well as Studio Ghibli’s My Neighbor Totoro.
  travel: Bernardo Peralta prefers family trips with clear itineraries, such as a road adventure to the Grand Canyon, a guided tour of the Smithsonian museums in Washington, D.C., and a summer stay at a
    beach resort in Santa Cruz, always packing a notebook to record each experience.
  culinary: Bernardo Peralta loves helping in the kitchen, expertly mashing avocados with lime, cilantro, and jalapeños to make guacamole, assisting with holiday tamale preparations, and confidently measuring
    ingredients for simple recipes, though they sometimes over‑salt dishes in youthful enthusiasm.
  core: Bernardo Peralta is a routine‑loving, sociable 10‑year‑old who balances structured soccer practice, meticulous LEGO building, and budding coding projects with a lively appetite for guacamole and
    a habit of over‑salting when cooking.
background:
  cultural: Bernardo is a Mexican‑American growing up in the suburban community of Ridgewood, New Jersey. At home, Spanish is spoken regularly, and he shares Mexican traditions such as cooking with his
    mother, celebrating Día de los Muertos, and participating in local Mexican cultural events. He balances these customs with typical American school life and community activities. His bicultural upbringing
    gives him a strong sense of family, respect for elders, and an appreciation for both Mexican and U.S. holidays.
attributes:
  skills: '[''Bilingual communication (English & Spanish)'', ''Organizational and planning skills'', ''Teamwork and leadership (school soccer team, class monitor)'', ''Basic Scratch programming'', ''Recorder
