personas:
  professional: Lorraine Peterson is a high‑school varsity soccer captain who also volunteers weekly at the local animal shelter, blending leadership, teamwork, and compassion while honing organizational
    skills and a budding eye for visual storytelling through photography.
  sports: Lorraine Peterson plays midfielder for the Eagle High School Lions varsity soccer team, trains with the River Valley Soccer Club on weekends, avidly follows the U.S. Women’s National Team and
    Manchester City, and uses school gym sessions to stay fit, though they sometimes skip cool‑down stretches after intense matches.
  arts: Lorraine Peterson strums acoustic guitar inspired by Ed Sheeran and Taylor Swift, writes simple song lyrics after school, reads contemporary YA novels by John Green and Sarah J. Maas, captures nature
    shots of pine forests during hikes, and builds elaborate Minecraft worlds, even though they often leave their sketchbook unfinished.
  travel: Lorraine Peterson enjoys weekend family hikes in the Sierra Nevada, has visited Yosemite National Park and the coastal town of Monterey, dreams of exploring Kyoto during cherry blossom season,
    prefers budget‑friendly road trips over overseas flights, and always packs a reusable water bottle for eco‑friendly adventures.
  culinary: Lorraine Peterson loves baking cupcakes—favorites include red velvet with cream cheese frosting and chocolate swirl—using ingredients like vanilla extract and fresh berries, often sharing them
    at school fundraisers, while also experimenting with homemade pizza toppings and snacking on avocado toast for breakfast.
  core: Lorraine Peterson balances a driven soccer leadership role, a creative guitar‑and‑Minecraft hobby, and compassionate animal‑shelter volunteering, all while navigating teen finances, occasional acne,
    and a habit of procrastinating on schoolwork but never missing a chance to bake cupcakes for friends.
background:
  cultural: Lorraine comes from a white, Midwestern‑American family rooted in Oklahoma’s small‑town culture. Raised in Stillwater, she has been shaped by community values such as self‑reliance, neighborly
    cooperation, and strong ties to local churches and school spirit. Family gatherings often feature traditional Midwestern meals, county fair outings, and seasonal celebrations like Thanksgiving and the
    Harvest Festival. The presence of Oklahoma State University in her town offers exposure to collegiate events and a broader cultural perspective, while her family’s involvement in community service and
    local outdoor activities reinforces a blend of practical work ethic and appreciation for the natural environment.
