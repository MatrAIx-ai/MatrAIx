  career_goals: Lorraine aspires to study veterinary medicine at Oklahoma State University, aiming to become a veterinarian who serves the rural communities of Oklahoma. She envisions combining her love
    for animals with her desire to educate youth, planning to develop after‑school programs that teach responsible animal care and wildlife conservation. In the long term, she hopes to work as a veterinary
    specialist in a wildlife rehabilitation center, using her practical skills to improve animal health and community awareness.
