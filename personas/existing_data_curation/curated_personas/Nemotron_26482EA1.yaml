personas:
  professional: Ali Guerrier is an exceptionally organized waiter who excels at precise order taking, POS operation, and inventory monitoring, consistently applying disciplined efficiency to meet high standards
    and positioning themselves for a fast-track promotion to shift supervisor within a year.
  sports: Ali Guerrier is a devoted fan of the Tampa Bay Buccaneers and the Miami Heat, watches weekly NFL and NBA highlights, and channels that competitive spirit into disciplined weight‑training sessions
    at the local gym while joining a community pickup basketball league each summer.
  arts: Ali Guerrier finds solace in classic R&B legends like Marvin Gaye and Aretha Franklin and modern gospel artists such as Kirk Franklin, often listening to their soulful melodies while organizing
    tables, and they occasionally attend a Sunday gospel choir performance at their church.
  travel: Ali Guerrier prefers meticulously planned weekend road trips to nearby Gulf Coast beaches, has already explored New Orleans for its culinary scene, dreams of a budget-friendly backpacking adventure
    through the Caribbean to sample island flavors for their future café, and they always book accommodations through loyalty programs.
  culinary: Ali Guerrier enjoys cooking Southern comfort dishes like fried chicken, collard greens, and cornbread alongside Caribbean staples such as jerk chicken, rice & peas, and plantains, often experimenting
    with scotch bonnet peppers and allspice while humming classic R&B tunes in the kitchen.
  core: Ali Guerrier is a routine‑driven, disciplined 20‑year‑old who balances early jogs, meticulous wait‑staff work, and a burgeoning dream of a Southern‑Caribbean café, all while occasionally overindulging
    in coffee and neglecting dental visits.
background:
  cultural: Ali is a Black American with Haitian roots, raised in Tampa’s vibrant West‑side community. His family blends Southern African‑American traditions—such as church gatherings, soul food, and celebration
    of Juneteenth—with Caribbean customs like Creole cooking and Haitian Creole phrases. He values hard work, family loyalty, and community support, which shape his practical outlook and ambition.
attributes:
  skills: '[''Customer service'', ''Accurate order taking'', ''POS operation'', ''Cash handling'', ''Table setting and sanitation'', ''Inventory tracking'', ''Food safety compliance'', ''Team coordination'',
    ''Problem solving under pressure'', ''Training new staff'']'
  hobbies: '[''Jogging'', ''Weight training'', ''Chess'', ''Reading business/self‑development books'', ''Watching NFL/NBA games'', ''Volunteering at church food pantry'', ''Listening to R&B and gospel music'']'
  career_goals: Ali intends to advance from server to shift supervisor within the next year, then obtain a certified food safety manager credential and become a restaurant manager within three to five years.
    He ultimately hopes to open a modest, family‑run café in Tampa that offers both Southern comfort food and Caribbean flavors, providing stable employment for his community.
