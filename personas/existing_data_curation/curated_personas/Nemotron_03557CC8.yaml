personas:
  professional: Leonardo Santos is a certified personal care aide who leverages meticulous checklists, bilingual communication, and a detail‑oriented approach to daily living assistance, medication timing,
    and documentation, while his competitive drive fuels his ambition to become a supervisory LPN overseeing structured home‑health programs.
  sports: Leonardo Santos fuels his competitive edge through focused weight‑training sessions at his local gym, hikes the Cascade foothills with the Wilsonville Trail Club, follows the Portland Timbers
    and the Trail Blazers, and joins a recreational 5K running league each spring to stay disciplined.
  arts: Leonardo Santos unwinds by strumming acoustic guitar renditions of John Mayer and Ben Howard, devours mystery novels by Gillian Flynn and Tana French, captures sunrise vistas in the style of Ansel
    Adams with his DSLR, and occasionally attends local art‑house screenings featuring performances by Mahershala Ali.
  travel: Leonardo Santos plans every trip on a detailed spreadsheet, preferring off‑peak road‑trip adventures that combine hiking in Oregon’s Columbia River Gorge, a weekend surf getaway to Cannon Beach,
    and a bucket‑list trek through Patagonia’s Torres del Paine, while budgeting carefully to fund future photography excursions abroad.
  culinary: Leonardo Santos delights in recreating family‑heritage dishes like slow‑cooked pork carnitas, hand‑made corn tortillas, and vibrant mole sauces spiced with chipotle, cumin, and fresh cilantro,
    honing his culinary skills through weekend cooking marathons that blend precise timing with spontaneous flavor experiments.
  core: Leonardo Santos balances a fiercely structured work ethic with solitary creative pursuits, channeling a competitive yet reserved spirit into meticulous care, disciplined fitness, and methodical
    culinary experiments, while occasionally over‑organizing every aspect of life.
background:
  cultural: Leonardo grew up in a Mexican‑American household where Spanish was spoken alongside English. Family traditions such as celebrating Día de los Muertos, preparing tamales during the holidays,
    and attending local mariachi festivals have shaped his identity. His parents emphasized hard work, respect for elders, and community solidarity, values he carries into his caregiving role. Being bilingual,
    he often acts as a cultural liaison for Spanish‑speaking clients, helping them navigate the U.S. healthcare system while preserving their cultural customs.
attributes:
  skills: '[''Patient hygiene assistance'', ''Medication reminders'', ''Mobility support and safe transfers'', ''Basic wound care'', ''Vital signs monitoring'', ''Accurate documentation and charting'',
    ''Bilingual Spanish‑English communication'', ''Time management and scheduling'', ''Household organization and cleaning'', ''Meal planning and preparation'']'
  hobbies: '[''Hiking on local trails'', ''Cooking traditional Mexican dishes'', ''Reading mystery novels'', ''Playing acoustic guitar'', ''Landscape photography'', ''Woodworking small projects'', ''Weight
    training at the gym'']'
  career_goals: Leonardo aims to build on his personal care experience by earning a Certified Nursing Assistant (CNA) credential and subsequently completing an associate degree to become a Licensed Practical
    Nurse (LPN). He aspires to a supervisory role in a home‑health agency where he can design structured care plans and mentor new aides. Long‑term, he hopes to launch a culturally responsive home‑care
    service that bridges language gaps for Mexican‑origin seniors in the Pacific Northwest, combining his competitive drive with his commitment to reliable, high‑quality care.
