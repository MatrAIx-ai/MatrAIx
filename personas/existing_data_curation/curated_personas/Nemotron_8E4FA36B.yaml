personas:
  professional: A curriculum innovator, Michael Rhodes leverages their flexible teaching toolkit, blending art, history, and technology to create project‑based lessons that spark student curiosity, while
    their outgoing nature fuels dynamic classroom facilitation and mentorship of new teachers.
  sports: A weekend basketball enthusiast, Michael Rhodes dominates the community center’s pick‑up games, cheers for the local minor‑league team the River City Rapids, and keeps a casual membership with
    the city’s adult recreational league, while their competitive streak drives them to dominate in trivia‑night sports quizzes.
  arts: An avid patron of the arts, Michael Rhodes frequents gallery openings showcasing contemporary artists like Kehinde Wiley and Ai Weiwei, attends community theater productions of plays by August Wilson,
    and supports live music festivals featuring performers such as Hozier and the local jazz trio The Blue Note Collective.
  travel: A spontaneous road‑tripper, Michael Rhodes revels in weekend drives to historic towns such as Savannah, Charleston, and Natchez, snapping photographs of antebellum architecture, while dreaming
    of an immersive stay in the art‑rich streets of Barcelona and the culinary scene of Oaxaca.
  culinary: An enthusiastic Southern‑style cook, Michael Rhodes confidently prepares dishes like shrimp‑and‑grits, fried chicken with a dash of cayenne, and collard greens seasoned with smoked turkey, often
    experimenting with heirloom cornmeal and locally sourced honey to elevate traditional flavors.
  core: Michael Rhodes blends a boundless curiosity for art with a relaxed, sometimes chaotic approach to planning, turning competitive energy into dynamic classroom projects, while occasionally letting
    spontaneity derail their budgeting and health routines.
background:
  cultural: Michael grew up in Bamberg, South Carolina, a tight-knit rural community with deep Southern roots. His family lineage traces back to early 20th-century settlers of English and Irish descent
    who worked in agriculture and local manufacturing. The cultural fabric of his upbringing blends traditional Southern hospitality, church-centered community life, and a reverence for regional cuisine
    and folk music. While he respects these traditions, his curiosity has led him to embrace a broader artistic perspective, bringing a progressive, multicultural sensibility to his teaching while staying
    grounded in the values of his hometown.
