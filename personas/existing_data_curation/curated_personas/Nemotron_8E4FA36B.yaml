  hobbies: '[''Visiting art galleries and museums'', ''Community theater participation'', ''Live music festivals'', ''Photography of historic sites'', ''Southern cooking and recipe experimentation'', ''Pick-up
    basketball'', ''Trivia nights'', ''Amateur chess tournaments'', ''Coaching middle-school debate'', ''Improv comedy group'']'
  career_goals: He aspires to become a curriculum specialist at the district level, championing flexible, arts-infused learning frameworks across schools. Michael aims to present his innovative teaching
    models at state and national education conferences, earn recognition for student achievement, and eventually move into an instructional leadership role such as Assistant Principal where he can influence
    policy and mentor a larger cohort of educators. He also dreams of establishing a regional after-school arts studio that offers project-based workshops for youth.
