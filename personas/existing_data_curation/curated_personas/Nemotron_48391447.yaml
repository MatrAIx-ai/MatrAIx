  hobbies: '["Attending local live music concerts", "Barbecue grilling and experimenting with recipes", "DIY woodworking projects", "Volunteering to paint community spaces", "Exploring new painting techniques
    through workshops", "Road trips to national parks", "Gardening", "Participating in community theater as a stagehand"]'
  career_goals: Douglas aims to transition from employee to owner of a small, locally‑focused painting and finishing contracting business within the next three years. He plans to obtain OSHA 30‑hour certification,
    lead‑safe training, and a green building designation to expand his service offerings to include historic home restoration and environmentally sustainable projects. Leveraging his sociable nature, he
    wants to build a reputation for reliability, high craftsmanship, and personable client interactions, ultimately hiring and mentoring at least two apprentices. Douglas also hopes to give back to the
    Bakersfield community by providing pro‑bono painting services for schools and community centers, and to achieve financial security that will allow a comfortable retirement while maintaining a portfolio
    of completed high‑quality projects.
