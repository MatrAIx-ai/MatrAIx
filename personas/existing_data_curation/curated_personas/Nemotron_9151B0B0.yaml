    recipe experimentation","Genealogy research","Playing bridge","Volunteering as a museum docent"]'
  career_goals: Although formally retired, June aims to deepen her impact on the community. She aspires to become a cultural ambassador for the town, curating a rotating art exhibition that showcases local
    artists and invites unconventional, experimental works. She hopes to mentor younger volunteers, especially teens interested in museum studies or event management. June also plans to author a memoir
    that weaves together her family’s New England heritage, her lifelong love of art, and reflections on aging gracefully. Travel to major art museums in Boston, New York, and Philadelphia is a personal
    ambition, paired with the goal of sharing those experiences through local talks and workshops.
