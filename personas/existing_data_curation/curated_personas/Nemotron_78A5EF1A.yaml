  career_goals: John aims to gradually shift from a full‑time shop role to owning a boutique consultancy that creates limited‑edition, artistically‑inspired tooling for niche manufacturers. He wants to
    mentor a small group of apprentices, preserving his hands‑on knowledge before retirement. A key ambition is to achieve a more flexible schedule that reduces the anxiety caused by rigid deadlines, while
    building enough financial security to travel with his wife to art museums, workshops, and cultural festivals that fuel his curiosity.
