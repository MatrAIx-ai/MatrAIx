personas:
  professional: John Marschner, a veteran tool‑and‑die maker with three decades of CNC, manual lathe, and EDM expertise, channels his precise metal‑working skill and restless curiosity into designing limited‑edition,
    artistically enhanced tooling for niche manufacturers, all while navigating a flexible, occasionally disorganized schedule that mirrors his competitive yet solitary spirit.
  sports: John Marschner spends his weekends hiking the Santa Ana Mountains and riding mountain‑bikes with the Orange County Trail Runners, while rooting for the Los Angeles Dodgers and the Los Angeles
    Lakers from his patio deck.
  arts: John Marschner immerses himself in the Southern California art scene, exhibiting his miniature steel sculptures at the Laguna Beach Art Museum, drawing inspiration from industrial photographer Andreas
    Gursky and conceptual artist Ai Weiwei, and unwinding to the vinyl sounds of Joni Mitchell and the cinematic scores of Hans Zimmer.
  travel: John Marschner prefers loosely planned road trips that blend stops at coastal art festivals in Santa Barbara with spontaneous detours to the historic steel mills of Pittsburgh, while dreaming
    of future pilgrimages to the Uffizi Gallery in Florence and the contemporary art districts of Berlin.
  culinary: John Marschner, an adventurous home chef, crafts Mediterranean‑Californian fusion dishes such as grilled branzino with lime‑marinated figs, roasted eggplant ratatouille topped with avocado‑lime
    crema, and charred corn tacos seasoned with za’atar, favoring fresh heirloom tomatoes, Kalamata olives, and locally sourced microgreens.
  core: John Marschner is a meticulously precise metal artisan whose creative curiosity is punctuated by an occasional chaotic workspace, a lingering anxiety that fuels both his artistic breakthroughs and
    his tendency to procrastinate on mundane tasks.
background:
  cultural: John is a white American of European descent who grew up in suburban Orange County, California. His upbringing combined the region’s middle‑class, suburban values of self‑reliance and hard work
    with the diverse cultural tapestry of Southern California, where Hispanic and Asian influences are part of everyday life. This environment fostered an appreciation for both the practical, hands‑on tradition
    of manufacturing and the vibrant local arts scene. While his core cultural identity reflects a typical Mid‑western family heritage, his adult life in San Juan Capistrano has added layers of coastal,
    outdoor, and multicultural experiences that shape his worldview.
