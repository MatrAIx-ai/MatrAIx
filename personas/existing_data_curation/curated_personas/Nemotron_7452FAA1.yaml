personas:
  professional: Mohammad Farwell is a community event planner and aspiring freelance illustrator who leverages meticulous spreadsheet budgeting and a vivid imagination to design promotional materials and
    craft nature‑inspired artwork for local fairs, while enrolling in graphic design courses to professionalize their creative side.
  sports: Mohammad Farwell follows the Tampa Bay Buccaneers and the Miami Heat, joins the Live Oak Trailblazers Hiking Club for weekend treks, competes in local bass‑fishing tournaments, and they maintain
    a regular routine of early‑morning jogs along the Suwannee River to balance their sedentary illustration work.
  arts: Mohammad Farwell immerses themselves in the arts by painting Suwannee River vistas inspired by the color palettes of Vincent van Gogh, photographing wildlife in the style of Ansel Adams, illustrating
    speculative‑fiction cover art influenced by Brian K. Vaughan’s graphic novels, and they regularly attend performances by local folk singer‑songwriter John Wallace, while drawing narrative inspiration
    from authors Margaret Atwood and Neil Gaiman.
  travel: Mohammad Farwell prefers meticulously planned road trips that blend artistic inspiration with nature, having already explored the Everglades, the Great Smoky Mountains, and a weekend getaway to
    Asheville to study Appalachian folk art, while dreaming of a future pilgrimage to Kyoto’s historic temples for calligraphy study, and they balance these adventures against the time constraints of launching
    their community arts hub.
  culinary: Mohammad Farwell enjoys cooking a hearty surf‑and‑turf dinner of grilled catfish seasoned with lemon‑dill and low‑country honey‑glazed pork ribs, experiments with Cajun jambalaya using Andouille
    sausage, bell peppers, and okra, and they frequently incorporate fresh herbs like basil and cilantro into creative breakfast omelets while occasionally over‑salting dishes when distracted by a pending
    illustration deadline.
  core: Mohammad Farwell is an imaginative, methodical community organizer and artist who channels their competitive spark and chronic worry into meticulously planned creative projects, social gatherings,
    and they relentlessly pursue turning their passion into profit.
background:
  cultural: Mohammad grew up in a predominantly white, rural community in Live Oak, Florida, where Southern hospitality and self‑reliance are core values. His family roots trace back to generations of small‑farm
    and timber workers, and he was raised attending a local Methodist church, participating in county fairs, and cruising the backroads on family outings. The region’s natural environment—the Suwannee River,
    pine forests, and abundant wildlife—has shaped his appreciation for outdoor activities like fishing, hunting, and birdwatching. While his upbringing emphasized modesty and community service, his personal
    curiosity led him to explore broader artistic and intellectual realms, blending traditional Southern cultural elements with a contemporary, imaginative outlook.
attributes:
  skills: '[''Community event planning'', ''Graphic design (digital illustration)'', ''Traditional painting (oil & watercolor)'', ''Photography (nature and portrait)'', ''DIY home repair and basic carpentry'',
    ''Automotive maintenance basics'', ''Research and fact‑checking (local history)'', ''Critical thinking and debate'', ''Spreadsheet budgeting and project management'', ''Strategic board game analysis'']'
  hobbies: '[''Landscape painting (oil & watercolor)'', ''Digital illustration'', ''Reading science fiction and fantasy'', ''Birdwatching'', ''Fishing and hiking in the Suwannee River area'', ''Trivia nights'',
    ''Poker and chess'', ''Volunteer event coordination for local fairs'', ''Short story writing'', ''Model kit building'']'
  career_goals: He aims to transition his hobbyist artwork into a sustainable income source by establishing an online store and a local pop‑up gallery featuring his nature‑inspired pieces and historically
    themed prints. To support this, he plans to earn his GED and enroll in community‑college courses in graphic design to sharpen technical skills. Within five years, he hopes to launch a community arts
    hub in Live Oak that offers workshops, hosts local art fairs, and provides leadership opportunities for youth. He also aspires to become a recognized freelance illustrator for regional publications
    and to use his event‑management expertise to direct cultural festivals, while maintaining a structured routine that helps manage stress.
