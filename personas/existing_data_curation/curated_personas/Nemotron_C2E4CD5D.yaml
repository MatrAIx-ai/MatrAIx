personas:
  professional: William Weathers is a 23‑year‑old budding graphic designer in Miami who translates their love of street art into digital branding using Photoshop and Canva, coordinates community art workshops
    and DJ nights with meticulous spreadsheet planning, pursues freelance mural commissions while eyeing a junior designer role, and occasionally over‑commits to projects because their competitive streak
    drives them to prove themselves.
  sports: William Weathers enjoys early‑morning swims at Miami Beach, follows the Miami Heat basketball team and the Miami Marlins baseball club, participates in weekend beach volleyball pick‑ups, and maintains
    a personal fitness routine of freestyle swimming and occasional yoga to stay flexible for DJ gigs.
  arts: William Weathers immerses themselves in Miami’s vibrant art scene by frequenting the Pérez Art Museum, touring the Wynwood Walls to photograph murals, curating DJ sets at underground electronic
    venues featuring artists like Flume and Tame Impala, and volunteering to teach digital illustration to local youth, while drawing inspiration from street‑art icons such as Shepard Fairey.
  travel: William Weathers prefers spontaneous weekend getaways, often jet‑setting from Miami to the Florida Keys for sunrise kayaking, hopping on a ferry to Havana for a cultural immersion of music and
    cuisine, and planning annual trips to New York’s Armory Show to scout emerging designers, all while budgeting through a shared spreadsheet.
  culinary: William Weathers experiments with fusion cuisine at home, combining Midwestern comfort staples like cornbread with Caribbean jerk seasoning to create dishes such as jerk‑spiced chicken fried
    steak with mango salsa, frequently over‑spices in pursuit of bold flavors, and enjoys sourcing fresh fish at the local fish market for grilled fish tacos with plantain chips.
  core: William Weathers is a curious, organized, and competitively driven 23‑year‑old Miami creative who balances street‑art‑inspired design, DJ mixes, and community workshops while often juggling too
    many projects and staying up late perfecting beats.
background:
  cultural: William grew up in a small Midwestern suburb as a White American, experiencing a traditional American upbringing. After graduating high school, he relocated to Miami to immerse himself in its
    diverse cultural scene. The city’s strong Cuban and Caribbean influences—evident in its music, food, and vibrant street art—have reshaped his aesthetic sensibilities and social outlook. While he retains
    family customs from his Midwestern roots, he embraces the multicultural, beach‑oriented lifestyle of South Florida, integrating these diverse cultural elements into his personal identity and creative
    pursuits.
attributes:
  skills: '["digital illustration", "graphic design (Adobe Photoshop, Canva)", "urban photography", "event planning", "project management with spreadsheets", "strategic thinking (eSports)", "music mixing
    (DJ)"]'
  hobbies: '["visiting art galleries and street‑art tours", "urban photography of murals", "live music concerts (electronic, indie)", "DJ mixing for events", "competitive video gaming (strategy, fighting
    games)", "reading science‑fiction and philosophy", "beach swimming", "cooking fusion dishes (Midwest + Caribbean)", "volunteering at community art workshops"]'
  career_goals: William aims to enroll in a community college program or a vocational certificate in graphic design within the next year, building a professional portfolio that blends his love for street
    art and digital media. He hopes to secure an entry‑level junior designer role at a local studio or marketing agency, where his methodical workflow and reliability will be valued. In parallel, he plans
    to launch a side business offering custom murals, event‑branding services, and DJ mixes for Miami’s cultural festivals. Long‑term, he envisions founding a community art space that showcases emerging
    talent and fosters cross‑cultural collaborations, positioning himself as a creative director and cultural curator.
