persona_description: A researcher or policy maker interested in understanding the social, economic, and environmental conditions of the Aboriginal population in the Greater Vancouver Regional District (GVRD).
  They are looking for comprehensive data and benchmarks to assess the quality of life of the urban Aboriginal population and to identify areas of improvement. They are also interested in the cultural,
  educational, health, and economic aspects of Aboriginal life in urban areas, and would like to explore the impact of migration and urbanization on the Aboriginal community.
