  career_goals: Although still very young, Hercules often talks about future jobs with the excitement of a child. He dreams of becoming a firefighter because he loves the bright trucks and helping people,
    or a soccer player like his favorite Colombian star. He also expresses an interest in being a musician, inspired by the rhythms he hears at family gatherings. These aspirations reflect his desire to
    be helpful, energetic, and to share joy with others.
