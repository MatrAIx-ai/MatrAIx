personas:
  professional: A budding community helper, Hercules Rojas spends afternoons turning a cardboard box into a pretend store, sorting toy money, asking “why?” about every transaction while staying relaxed
    about the store’s rules, showing early signs of curiosity balanced with practicality; they delight in helping friends set up play scenarios and often forget the “closing time” in favor of endless play.
  sports: Enthusiastic on the playground, Hercules Rojas runs with the "Kiddie Soccer Club" where they practice dribbling a size‑3 ball under Coach Alvarez, cheer loudly for the Chicago Cubs and Chicago
    Bulls during family game nights, and love the occasional splash in the local pool’s kids' swim class, always ready for a fresh, flexible session of fun.
  arts: An imaginative mini‑artist, Hercules Rojas spends snack‑time drawing bright dinosaurs inspired by Pixar’s Finding Nemo, sings along to The Wiggles and Disney’s “Let It Go”, and proudly mimics Tom
    Holland’s Spider‑Man voice, turning everyday moments into creative performances that they share eagerly with friends.
  travel: Adventure‑loving and curiosity‑driven, Hercules Rojas has explored the San Diego Zoo and Disneyland with family, enjoys collecting seashells at the beach, and dreams of visiting Paris’s Eiffel
    Tower and the Great Barrier Reef, often planning trips with colorful stickers on a wall calendar while remaining flexible about exact dates.
  culinary: Food‑enthusiastic and a budding chef, Hercules Rojas adores creamy macaroni and cheese with a dash of cheddar, chicken nuggets paired with sweet strawberry slices, and loves helping stir banana
    pancake batter made of ripe bananas, flour, and eggs, though they sometimes spill the milk in a playful mess.
  core: Hercules Rojas is a curious, sociable four‑year‑old whose boundless energy and kindness blend with a touch of worry, making every day a mix of playful exploration and gentle concern.
background:
  cultural: Hercules belongs to a Colombian‑heritage family that maintains strong ties to its roots while living in Humble, Texas. At home, he hears Colombian music such as cumbia and vallenato, enjoys
    traditional foods like bandeja paisa and arepas, and celebrates holidays such as Día de los Muertos and Carnaval. The bilingual environment exposes him to both Spanish and English, blending Colombian
    customs with Texan influences like rodeo festivals and football games. This cultural mix shapes his values of family cohesion, warmth, and community participation.
attributes:
  skills: '["Basic counting (1‑10)", "Color and shape recognition", "Fine‑motor coordination for drawing and block building", "Bilingual vocabulary (Spanish & English)", "Following simple multi‑step directions",
