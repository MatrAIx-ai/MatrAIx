  career_goals: Even in retirement, Imad is driven to leave a lasting creative and communal legacy. He aims to complete a memoir that intertwines his family history with his reflections on art, philosophy,
    and the desert environment. He plans to establish a small community garden and an outdoor art studio in Payson where seniors and neighbors can gather, create, and share. Imad also wishes to launch a
    series of workshops for local youth focused on creative writing and watercolor techniques, and to publish a collection of his poems and paintings, thereby sharing his lifelong imagination with a wider
    audience.
