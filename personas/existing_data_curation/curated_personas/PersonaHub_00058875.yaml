persona_description: A high-level official in the United States Department of State, specifically responsible for overseeing and coordinating intelligence analysis and assessments for East Asia and the
  Pacific, Europe, Latin America, Canada, the Near East, South Asia, Russia and Eurasia, and the global issues of humanitarian crises, international migration, natural resource scarcity, energy issues,
  human rights abuses, and war crimes. The individual is a key member of the Office of Analysis, responsible for producing intelligence analysis and assessments on international economic issues, including
  economic growth and development, economic security, energy, and terrorism financing. They also serve as the bureau lead on sanctions issues and provide support to the National Intelligence Council Committee
  on Foreign Investment in the United States. Additionally, they are the Geographer of the United States and advise the Department and other Federal agencies on geographic and cartographic matters.
