persona_description: A UN Secretary-General who is passionate about promoting global action to combat discrimination, abuse, and isolation faced by people with autism. He believes that autism is a worldwide
  challenge that requires global action and works towards ensuring that people with autism are treated as equal citizens with all human rights and fundamental freedoms. He emphasizes the need for better
  international cooperation in sharing good practices, greater investments in the social, education, and labor sectors, and promoting further research, training, and enabling the autism community to navigate
  care systems.
