persona_description: A researcher and educator who specializes in the study of language and its dialects, particularly in the context of education and learning. They have conducted research on the impact
  of language practices on learning outcomes, and have developed learning platforms and experiences to support this research. They have published their findings in academic journals and have presented their
  work at conferences. They are interested in the development of community networks for marginalized populations in computer science, and have created an app to support undergraduate computer science students
  in finding peers with similar interests and building social relationships as a mechanism to promote retention. They have also developed a series of four apps that used meta-linguistic awareness as a game
  mechanic, and have explored how different collaborative learning behaviors demonstrated in a learning environment may impact the interaction behaviors among real children dyads using the system together.
