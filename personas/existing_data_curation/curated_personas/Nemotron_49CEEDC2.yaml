  career_goals: Cindy aims to secure tenure within the next three years and aspires to become department chair, shaping the strategic direction of the education program at her institution. She seeks to
    expand her research portfolio by publishing peer‑reviewed articles on blended learning efficacy and to obtain external funding for a regional service‑learning initiative that integrates community partnerships
    into teacher preparation. Additionally, she is driven to mentor early‑career faculty, develop evidence‑based professional development workshops, and foster a supportive, low‑stress environment for both
    students and colleagues.
