personas:
  professional: Cindy Mollenhour, a veteran university professor of education with over two decades of experience designing blended curricula and leveraging instructional technology, blends her investigative
    curiosity with a grounded, pragmatic approach to develop evidence‑based courses while juggling the disorganized chaos of tenure‑track deadlines and a competitive drive to out‑publish peers.
  sports: Cindy Mollenhour enjoys low‑impact fitness, regularly hiking the boardwalks of Congaree National Park and participating in a local historic‑walking club that doubles as a social fitness group,
    while cheering on the Carolina Panthers on game nights and following the Charlotte Hornets for a dash of competitive spirit.
  arts: Cindy Mollenhour immerses themselves in Southern literary fiction, savoring works by Eudora Welty and William Faulkner, while crafting handmade quilts inspired by traditional patterns and attending
    community theater productions featuring plays by Tennessee Williams, and they unwind listening to folk‑rock artists like Alison Krauss and the soulful stylings of Alabama Shakes.
  travel: Cindy Mollenhour prefers purposeful, modest‑budget road trips that blend historical exploration with natural serenity, having driven the coastal routes of Charleston and Savannah to study antebellum
    architecture, and planning a future pilgrimage to the historic sites of Williamsburg and the Blue Ridge Parkway for a balance of adventure and relaxation.
  culinary: Cindy Mollenhour delights in low‑country cooking, frequently whipping up shrimp and grits, collard greens seasoned with smoked ham hocks, and sweet tea infused with fresh mint from their garden,
    while experimenting with heirloom tomatoes and okra in seasonal casseroles, though they sometimes over‑season dishes in a quest for bold flavors.
  core: Cindy Mollenhour is a curiosity‑driven yet pragmatically disorganized educator who balances scholarly ambition with solitary hobbies, a competitive edge, and a lingering worry that fuels both meticulous
    research and occasional stress‑induced overthinking.
background:
  cultural: Cindy was raised in a middle‑class, white Southern family in the Midlands of South Carolina, where church attendance and community involvement were common. The region’s emphasis on hospitality,
    modesty, and respect for tradition informs her values, while a strong local emphasis on education and civic engagement shaped her career path. Her Southern upbringing is reflected in her love for low‑country
    cooking, appreciation for the natural landscapes around Columbia, and a cultural reverence for storytelling and local history. Though she maintains a pragmatic outlook, she also upholds Southern ideals
    of resilience and independence, which align with her competitive and occasionally skeptical nature.
