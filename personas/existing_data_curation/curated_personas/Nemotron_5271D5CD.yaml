  hobbies: '[''Fishing at Lake Norman'', ''Hiking on Piedmont trails'', ''Classic car restoration'', ''Attending NASCAR events'', ''Woodworking'', ''Reading true-crime books'', ''Volunteering as a youth
    mentor'']'
  career_goals: His primary career ambition is to earn the rank of Sergeant and lead a specialized data‑analytics unit within the Iredell County Sheriff’s Office, integrating his STEM background to develop
    predictive policing models that improve public safety while fostering stronger community ties. He also aims to refine his personal organization skills to meet reporting deadlines more consistently,
    mentor new recruits, and eventually serve as an instructor at the North Carolina Police Academy, sharing his blend of technical and field expertise.
