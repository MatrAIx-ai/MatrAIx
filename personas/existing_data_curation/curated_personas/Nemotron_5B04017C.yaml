personas:
  professional: Janene Shelton, an 18-year-old claims handler at a regional insurance agency, blends a methodical, detail-oriented approach with a competitive, outgoing demeanor, leveraging her proficiency
    in Xactimate and Guidewire to swiftly assess property and vehicle damage while negotiating fairly with claimants and contractors, all while adhering to the practical, hard-working values instilled by
    her Midwestern upbringing.
  sports: Janene Shelton thrives on the camaraderie of her local Troy Tigers softball team, cheers on the Kansas City Chiefs and Royals during the season, and supplements her competitive spirit with weekly
    yoga sessions and occasional runs at the Doniphan County park, viewing fitness as a blend of team play and personal discipline.
  arts: Janene Shelton regularly attends community concerts featuring country stars like Luke Bryan and local bluegrass groups, delights in karaoke nights where she belts out Journey's 'Don't Stop Believin''
    and finds inspiration in the storytelling of Taylor Swift, using these artistic experiences to fuel her social energy and competitive edge.
  travel: Janene Shelton prefers short, budget-friendly road trips with friends—such as a weekend getaway to the Ozarks, a music-filled stop in Chicago, and an annual pilgrimage to the Kansas State Fair—yet
    dreams of a solo adventure to the historic streets of Copenhagen to connect with her ancestral roots while expanding her horizons.
  culinary: Janene Shelton enjoys hearty Midwestern fare like BBQ ribs, hand-made chili, and cheesy cornbread, while also experimenting with German-style sausages and Swedish meatballs during occasional
    potluck gatherings, and she balances her modest cooking skills by mastering the perfect pancake flip and savoring fresh farm-grown tomatoes in summer salads.
  core: Janene Shelton is a fiercely competitive yet community-driven 18-year-old who balances a meticulous claims career with high-energy social life, a persistent anxiety that fuels both creative outlets
    and occasional over-thinking, and a quirky habit of scribbling to-do lists on napkins during karaoke.
background:
  cultural: Janene grew up in Troy, a close‑knit town in Doniphan County, Kansas, within a predominantly white, Midwestern community. Her family’s roots trace back to German and Scandinavian settlers, and
    she was raised with values of hard work, self‑reliance, and neighborly support. Participation in local church events and school 4‑H programs reinforced a sense of community responsibility. While she
    embraces the region’s modest, practical outlook, her outgoing nature and competitive spirit reflect a blend of traditional Midwestern values with a modern drive for personal achievement.
attributes:
  skills: '[''Claims investigation'', ''Policy analysis'', ''Damage appraisal'', ''Use of Xactimate software'', ''Guidewire ClaimsCenter'', ''Data entry and report writing'', ''Customer communication'',
    ''Negotiation'', ''Time management'', ''Organizational skills'', ''Attention to detail'', ''Basic legal knowledge in insurance'']'
  hobbies: '[''Softball'', ''Escape rooms'', ''Yoga'', ''Journaling'', ''Karaoke'', ''Community concerts'', ''Volunteering at the county fair'']'
  career_goals: She aims to become a senior claims adjuster within the next five years, specializing in complex property and casualty claims. Janene plans to obtain the Certified Professional Claims Analyst
    (CPCA) credential and later pursue a managerial role overseeing a team of adjusters. In the longer term, she envisions launching her own insurance consultancy that blends analytical rigor with client‑focused
    service, allowing her to leverage her competitive drive and desire for stability.
