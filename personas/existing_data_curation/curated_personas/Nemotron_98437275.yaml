  career_goals: Alberto aims to graduate high school with a strong academic record and then pursue a college degree in civil engineering or environmental science. He wants to apply his practical problem‑solving
    skills and love of teamwork to design resilient infrastructure and sustainable projects that benefit his hometown of Lares, especially in the wake of natural challenges like earthquakes and hurricanes.
    Long‑term, he envisions mentoring younger students through after‑school clubs or community programs, combining his sociable nature with a commitment to give back to his community.
