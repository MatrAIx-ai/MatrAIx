personas:
  professional: Alberto Gomez, a budding game creator, channels their organized mindset and love for team sports into building collaborative soccer‑themed games on Scratch.
  sports: Alberto Gomez plays forward for the neighborhood soccer club, joins nightly pick‑up basketball at the community gym, cheers for the Los Angeles Lakers and follows the local minor‑league baseball
    team, while maintaining a weekend hiking routine through nearby hills.
  arts: Alberto Gomez nurtures a passion for traditional music, practicing the cuatro while listening to bomba and plena artists such as Ismael Rivera and Héctor Lavoe, and spends evenings reading graphic
    novels like Saga and Watchmen, which inspire their creative coding projects.
  travel: Alberto Gomez dreams of exploring the cloud forest in Costa Rica and wandering the historic streets of Barcelona, but this year they saved for a budget weekend trip to a nearby coastal town, balancing
    family constraints with a love for both adventure and relaxation.
  culinary: Alberto Gomez delights in cooking arroz con gandules and tostones, mastering the simmering of sofrito and the crispness of fried plantains, yet occasionally burns the rice when multitasking
    between gaming and kitchen duties.
  core: Alberto Gomez blends disciplined organization with vibrant social energy, balancing soccer fields, Scratch coding, and traditional music while navigating teenage impulses and occasional forgetfulness.
background:
  cultural: Alberto grows up in Lares, a town known for its historic role in the Grito de Lares and its tight‑knit community spirit. His family maintains a bilingual household where Spanish dominates daily
    conversation, and they observe Catholic traditions and local fiestas patronales. He is immersed in Puerto Rican cultural expressions, from the rhythms of bomba and plena to the flavors of arroz con
    gandules, lechón, and mofongo prepared during family gatherings. Community involvement is a cornerstone of his upbringing, with regular participation in neighborhood clean‑ups, church events, and the
    annual Feria de la Campesina, all of which reinforce his values of cooperation, harmony, and pride in his heritage.
