  career_goals: Leticia dreams of turning her curiosity and people‑skills into future roles. She wants to become a scientist who invents new gadgets, a teacher who inspires other kids, or a television host
    who shares exciting stories. She plans to win science fairs, lead a school club, and maybe start a tiny lemonade business to learn entrepreneurship. She also imagines becoming an astronaut exploring
    the stars because she loves both imaginative ideas and practical experiments.
