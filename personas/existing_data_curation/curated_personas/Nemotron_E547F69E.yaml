personas:
  professional: Leticia Gritz is an aspiring junior engineer who builds elaborate LEGO cities, uses ScratchJr to animate her designs, and channels her curiosity and practical tinkering into problem‑solving
    play, while their relaxed approach sometimes leaves projects half‑finished.
  sports: Leticia Gritz is a spirited soccer player on the neighborhood ‘Sunrise Strikers’ youth league team, loves cheering for the Seattle Sounders FC, and balances energetic practices with occasional
    bouts of over‑competitiveness that sometimes leads to arguing over who's the best striker.
  arts: Leticia Gritz delights in drawing Dr. Seuss characters, dancing to Ariana Grande pop hits, crafting stop‑motion stories on ScratchJr, and performing skits at family gatherings, while they fiercely
    protect their imaginative ideas, sometimes refusing to share their favorite storyline with friends.
  travel: Leticia Gritz enjoys hands‑on family trips like camping in Yellowstone National Park, a weekend beach visit to Santa Cruz, and a magical day at Disneyland, preferring itineraries that include
    nature scavenger hunts and plenty of time to collect rocks and leaves for their notebook.
  culinary: Leticia Gritz favors cheesy pizza slices, spaghetti with meatballs, and crunchy apple slices, helps stir the garden soil for seedlings, and can confidently make a peanut‑butter‑banana sandwich,
    though they often sneak an extra cookie from the kitchen counter when no one watches.
  core: Leticia Gritz is a curiosity‑driven, sociable 7‑year‑old who mixes competitive spark with a love for nature, LEGO, and spontaneous storytelling, while occasionally letting disorganization and snack
    cravings lead the day.
background:
  cultural: Leticia is a white child living in Chico, CA. Her family has deep ties to the small‑town community of Butte County, blending Midwestern and Pacific‑Coast cultural values that emphasize community
    involvement, outdoor recreation, and school participation. She attends a local public elementary school, participates in after‑school arts and sports programs, and celebrates regional events like Fourth
    of July parades and the Chico State Farmers’ Market. Weekend trips to the Sierra foothills for hiking reflect the area’s appreciation for nature and environmental stewardship. While her upbringing is
    rooted in the local "small‑town American" ethos of friendliness, self‑reliance, and respect for natural surroundings, she is also exposed to the multicultural influences common in Northern California,
    such as diverse community activities and bilingual signage.
