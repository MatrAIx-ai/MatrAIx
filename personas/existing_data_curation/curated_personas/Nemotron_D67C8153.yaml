  career_goals: Laurie aims to formalize her administrative expertise by earning the Certified Administrative Professional (CAP) credential within the next two years. She envisions moving into an office‑manager
    role where she can lead a small team, streamline processes, and mentor newer staff members. While she values flexibility, she also wants to develop stronger organizational habits to reduce her own stress
    and improve departmental efficiency. Long‑term, Laurie is interested in transitioning to an operations coordinator position at a local nonprofit or manufacturing firm, where she can blend her practical
    office skills with her passion for community service and collaborative problem‑solving. She hopes to balance career advancement with a stable, supportive work environment that respects her need for
    a manageable, low‑stress workload.
