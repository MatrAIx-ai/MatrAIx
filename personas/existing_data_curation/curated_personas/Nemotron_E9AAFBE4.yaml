  career_goals: Magda aims to turn her culinary passion into a small home‑based catering business that offers authentic Nicaraguan dishes for local events and family gatherings, while maintaining the flexibility
    she values. To support this goal, she plans to earn a culinary certificate and complete her GED, opening the door for part‑time work as a kitchen assistant. Simultaneously, she hopes to launch a mentorship
    program for recent Nicaraguan immigrants, providing language support, cultural orientation, and practical life‑skills workshops. Her long‑term ambition is to become a recognized cultural liaison within
    Miami‑Dade’s Hispanic organizations, using her practical curiosity and calm leadership to strengthen community ties.
