personas:
  professional: Magda Ortizvega blends bilingual outreach, event planning expertise, and home‑cooking mastery to launch a flexible catering service while concurrently developing an immigrant mentorship
    program, applying their calm, resilient disposition and relaxed approach to scheduling to navigate the demands of community liaison work.
  sports: Magda Ortizvega stays active by attending salsa and merengue nights at a local dance studio, participating in a community recreational soccer league with the Hialeah Hurricanes, and cheering for
    the Miami Heat, Miami Dolphins, and Miami Marlins as their favorite professional sports teams.
  arts: Magda Ortizvega immerses themselves in folk music from artists like Rubén Blades and Celia Cruz, enjoys live performances at the Miami Art Museum featuring muralist José Mensah, and channels that
    inspiration into DIY home décor projects inspired by local artisans they meet at cultural festivals.
  travel: Magda Ortizvega prefers flexible, short‑haul trips that blend relaxation and cultural immersion, having explored the Everglades National Park, the vibrant streets of Key West, and a weekend getaway
    to San Juan, while dreaming of a future culinary tour of Oaxaca and a family reunion trip to Central America.
  culinary: Magda Ortizvega is a confident home chef who expertly prepares traditional dishes such as gallo pinto, vigorón, and nacatamales using fresh heirloom corn, plantains, and garden‑grown herbs,
    while also experimenting with fusion plates that pair these flavors with avocado‑lime salsa and roasted pork shoulder.
  core: Magda Ortizvega balances a calm, resilient mindset with a habit of procrastinating paperwork, a love for spontaneous dance marathons, and a penchant for hoarding colorful DIY décor pieces that clutter
    their cozy kitchen.
background:
  cultural: Magda’s Nicaraguan roots shape much of her daily life. Raised in a bilingual household, she celebrates traditional holidays such as Semana Santa, La Purísima, and Nicaraguan Independence Day
    with family gatherings, music, and food. Catholic customs and communal values are important to her, as is the practice of sharing stories and folklore. Living in Hialeah, she blends her Central American
    heritage with the broader Hispanic culture of Miami‑Dade, participating in local festivals, supporting fellow immigrants, and maintaining strong ties to the Nicaraguan diaspora through community groups
    and cultural events.
