personas:
  professional: An experienced civil engineer with 35 years of practice, Carlos Loyola leverages AutoCAD, Revit, and MATLAB to integrate sustainable design and public art into complex infrastructure projects,
    while their bilingual communication and competitive drive enable them to negotiate stakeholder interests and mentor junior engineers toward community-focused solutions.
  sports: A dedicated recreational athlete, Carlos Loyola follows the New York Knicks, New York City FC, and New York Yankees, they participate in a senior soccer league at local parks, hike the trails
    of Flushing Meadows Corona Park, and dance salsa three times a week, all while maintaining a membership with a Queens cycling club that fuels their competitive spirit.
  arts: An avid cultural enthusiast, Carlos Loyola regularly visits the Queens Museum, collects street‑mural photographs, they dance to the rhythms of Celia Cruz and Paco de Lucía at their local salsa club,
    and draws inspiration from the works of Basquiat and Frida Kahlo, allowing these artistic experiences to shape their creative outlook and community projects.
  travel: A curious traveler, Carlos Loyola has explored the historic streets of Barcelona, the vibrant jazz scene of New Orleans, and the coastal charm of a South American Pacific shore, they prefer meticulously
    planned itineraries that blend cultural festivals with affordable accommodations, though retirement budgeting often limits longer trips abroad.
  culinary: An enthusiastic home chef, Carlos Loyola masterfully prepares traditional dishes such as ceviche, seco de chivo, and llapingachos using ají, cilantro, and plantains, they showcase moderate cooking
    skill at weekly community potlucks, delight in pairing meals with robust Colombian coffee, yet occasionally overindulge in late‑night street‑food tacos during salsa nights.
  core: Curious, competitive, and community‑driven, Carlos Loyola blends engineering expertise with cultural passion, balancing meticulous organization with spontaneous artistic pursuits while occasionally
    indulging in high‑energy salsa and sweet culinary temptations, and they always seek the next opportunity to fuse function with festivity.
background:
  cultural: Carlos grew up in a bilingual household in Guayaquil before moving to the United States in his early twenties. His Ecuadorian roots shape his values around family, community, and an appreciation
    for music and cuisine, which he proudly shares with his neighbors in Jackson Heights. Fluent in Spanish and English, he bridges cultural gaps by organizing cultural festivals and serving as a liaison
    between Latin American businesses and municipal agencies. Living in one of New York City's most diverse neighborhoods, Carlos blends his heritage with the multicultural fabric of Queens, maintaining
    traditional celebrations like Carnaval while also embracing the artistic vibrancy of his urban environment.
