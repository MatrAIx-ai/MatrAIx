  hobbies: '[''Visiting Art Exhibitions'', ''Salsa Dancing'', ''Cooking Ecuadorian Cuisine'', ''Hosting Community Potlucks'', ''STEM Mentorship'', ''Hiking in Local Parks'', ''Street Photography'', ''Playing
    Chess'', ''Traveling to Ecuador'', ''Reading Technology and Design Books'', ''Volunteering with Immigrant Support Organizations'']'
  career_goals: In the next few years, Carlos aims to transition into a senior advisory role where he can shape policy for sustainable urban development in Queens, especially focusing on affordable housing
    for immigrant communities. He plans to earn a professional certification in green building (LEED AP) and to launch a mentorship program for Latino youth interested in engineering. He also envisions
    authoring a series of articles that bridge engineering and public art, and eventually retiring with a consultancy that merges his technical expertise with his passion for cultural projects.
