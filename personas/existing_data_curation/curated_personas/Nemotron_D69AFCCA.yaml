  hobbies: '[''True‑crime nonfiction reading'', ''Chess and Sudoku puzzles'', ''Home‑automation security tinkering'', ''Running along the waterfront'', ''Weightlifting'', ''Guided meditation'', ''Reflective
    journaling'', ''Ethical lock‑picking club'']'
  career_goals: David aims to earn a bachelor's degree in Criminal Justice or Security Management within the next two years, followed by certification as a Certified Protection Professional (CPP). His short‑term
    goal is to be promoted to Security Manager for a large corporate campus in the New York metropolitan area. Long‑term, he envisions leading a regional security operations department or founding a boutique
    security consulting firm that specializes in risk mitigation for high‑net‑worth clients, leveraging both cutting‑edge technology and proven procedural standards.
