personas:
  professional: Gerardo Ho is an 18‑year‑old budding electrician who leverages his meticulous organization and curiosity to excel at residential wiring, blueprint reading, and integrating Arduino‑controlled
    smart‑home upgrades while volunteering as a safety trainer for seniors, and they approach each project with disciplined precision.
  sports: Gerardo Ho is a devoted soccer enthusiast who plays midfield for the North Texas Community League, cheers on FC Dallas matches, follows the Dallas Cowboys for seasonal thrills, and they hike the
    Trinity River trails on Saturdays to maintain stamina and camaraderie with teammates.
  arts: Gerardo Ho spends quiet evenings strumming his acoustic guitar to classic rock legends like Led Zeppelin and regional Mexican icons such as Los Tigres del Norte, while also attending local live‑music
    showcases and curating playlists that blend cross‑cultural rhythms, and they view music as a disciplined yet expressive outlet for their organized mind.
  travel: Gerardo Ho dreams of road‑tripping across the Southwest to visit solar farms in Arizona, has already backpacked to the Grand Canyon, and they save travel credits to explore sustainable tourism
    spots like Costa Rica's rainforests, balancing their limited student budget with a disciplined trip‑planning spreadsheet.
  culinary: Gerardo Ho enjoys cooking family‑style tamales de puerco and fresh salsa verde, experiments with spice blends while occasionally over‑salting, and they use his Arduino‑controlled smart kettle
    to perfect the perfect boiled corn for street‑food‑style elote.
  core: Gerardo Ho is an ultra‑organized 18‑year‑old electrician‑in‑training whose curiosity fuels DIY smart‑home experiments, whose compassion drives community safety workshops, and they occasionally over‑indulge
    in LED shopping, lighting up both their workbench and life.
background:
  cultural: Gerardo was born to Mexican immigrant parents who settled in the Dallas-Fort Worth metroplex. He grew up bilingual, speaking Spanish at home and English at school, and his family emphasizes
    close-knit relationships, respect for elders, and collective responsibility. Traditional celebrations such as Día de los Muertos, Cinco de Mayo, and Christmas posadas are central to his upbringing,
    as are Mexican culinary traditions that he helps prepare with his mother and grandparents. Living in Melissa, TX, he blends these roots with the broader Texan culture, appreciating the region's emphasis
    on community service and the growing interest in sustainable living. His Catholic faith and involvement in the local parish further shape his compassionate outlook and commitment to helping neighbors.
attributes:
  skills: '[''Residential wiring'', ''Conduit installation'', ''Load calculations'', ''Blueprint and schematic interpretation'', ''NEC code compliance'', ''Circuit troubleshooting'', ''Use of multimeters
    and test equipment'', ''Smart home device installation'', ''Basic Arduino/Raspberry Pi programming'', ''Project documentation and safety checklist management'']'
  hobbies: '[''Acoustic guitar playing'', ''Soccer (community league)'', ''Arduino and LED lighting projects'', ''Smart home automation tinkering'', ''Volunteer electrical safety workshops'', ''Cooking
    Mexican dishes'', ''Hiking on local trails'', ''Listening to music podcasts'', ''Watching technology/renewable energy videos'']'
  career_goals: Gerardo aims to complete his electrical technology associate degree and obtain his journeyman license within the next two years. His long-term ambition is to become a master electrician
    with a focus on renewable-energy installations, particularly solar photovoltaic and energy-efficiency retrofits for residential homes in Collin County. He envisions launching his own small-scale contracting
    business that prioritizes affordable, sustainable solutions for his neighborhood and offers apprenticeship opportunities to other young workers. Alongside professional growth, he aspires to become a
    certified safety trainer, helping peers and community members understand electrical safety.
