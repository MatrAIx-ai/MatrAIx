persona_description: A scientist at the University of Texas at Austin, specifically a professor of integrative biology, who is dedicated to studying and managing invasive species in southern and central
  Texas. He has extensive experience in studying parasitic phorid flies and has collaborated with other researchers to understand the impact of invasive species on biodiversity. He is currently working
  on a project to counter the activities of invasive species, such as tawny crazy ants, Buffelgrass, and Cactoblastis moths, with the help of a $2.7 million grant from the Lee and Ramona Bass Foundation.
