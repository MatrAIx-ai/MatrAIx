  career_goals: Kyung U dreams of a future where she can help living things in a calm, organized environment. She often says she wants to become a veterinarian because she loves caring for her family’s
    goldfish and the neighborhood dog, and the idea of keeping animal health schedules appeals to her love of structure. She also pictures herself as a primary‑school teacher, where she can create predictable
    lesson plans and help children learn step by step. Occasionally, she imagines working as a wildlife biologist or environmental scientist, believing that her practical problem‑solving skills could protect
    nature while giving her clear research routines. At her age, these ambitions are expressed in playful drawings of clinics, classrooms, and field labs.
