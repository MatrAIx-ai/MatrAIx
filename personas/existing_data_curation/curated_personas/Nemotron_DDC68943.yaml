personas:
  professional: Kyung Zhou is a budding engineer in training, turning LEGO set instructions into miniature construction projects that teach systematic problem‑solving and spark a future passion for design
    and technology.
  sports: Kyung Zhou practices Tae Kwon Do every Thursday, proudly wearing the blue belt while cheering for the local youth soccer team, the Riverdale Rockets, and they also follow the NBA’s Los Angeles
    Lakers, imagining themselves dribbling in a high‑energy game.
  arts: Kyung Zhou plays piano for fifteen minutes each night, working through simplified arrangements of Beethoven’s "Für Elise," and they spend spare moments folding origami cranes and sketching plants
    like a junior botanist, while their favorite picture books feature illustrations by Beatrix Potter.
  travel: Kyung Zhou has visited the nearby state park, the seaside aquarium in Monterey Bay, and the grand museums of Washington, D.C., dreaming of a future trip to the Great Wall of China and a summer
    camp in the Swiss Alps.
  culinary: Kyung Zhou loves chicken nuggets with honey mustard, devours spaghetti with meatballs, enjoys fresh mango slices, and they occasionally help their parents roll homemade dumplings, carefully
    placing each filling like a miniature LEGO brick.
  core: Kyung Zhou is an eight‑year‑old who thrives on structured play, balancing precise LEGO builds and disciplined Tae Kwon Do with creative piano and origami, yet they often worry about getting every
    detail perfect, leading to occasional over‑thinking and a habit of double‑checking their work.
background:
  cultural: 'Kyung U comes from a mixed Korean‑Chinese household that values education, family respect, and cultural traditions. Her mother, a first‑generation immigrant from South Korea, teaches her Korean
    phrases and celebrates Chuseok, while her father, originally from Guangzhou, incorporates Mandarin lessons and Lunar New Year customs at home. The family lives in Edmond, Oklahoma, where they participate
    in a local Asian cultural association, attending community festivals that feature lantern displays, dumpling making, and Korean drum performances. This blend of East Asian heritage and Midwestern American
    life gives Kyung U a bicultural perspective: she enjoys traditional dishes like kimchi fried rice and dim sum on family gatherings, yet she also loves Friday night baseball games and school events in
    the community. The family’s emphasis on structured learning and responsibility—mirrored in both cultural expectations and the practical rhythm of daily life in Oklahoma—shapes Kyung U’s worldview and
    personal habits.'
