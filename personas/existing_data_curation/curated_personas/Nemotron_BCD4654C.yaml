  career_goals: Maha aspires to merge her love for art and technology. She hopes to attend a specialized high‑school program in visual arts, build a strong portfolio, and eventually pursue a bachelor's
    degree in Graphic Design, Interactive Media, or Illustration. In the long term, she envisions a career as a multimedia artist or UX designer, creating engaging visual experiences that convey stories
    and social messages, especially about mental‑health awareness. She also dreams of leading creative projects as a project manager for an advertising agency or cultural institution, and aims to earn scholarships
    that enable her to travel for art residencies and workshops.
