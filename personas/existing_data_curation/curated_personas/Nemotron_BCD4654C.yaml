personas:
  professional: Maha Sarfert, a 14‑year‑old aspiring digital illustrator and junior game developer, channels their sci‑fi curiosity into organized, storyboard‑first workflows that turn sketch ideas into
    Scratch mini‑games, and they often double‑check every pixel out of lingering anxiety about perfection.
  sports: Maha Sarfert, a member of the Wichita Middle School Running Club who enjoys sprint drills after school, follows the Wichita State Shockers basketball team and the Kansas City Chiefs with weekend
    enthusiasm, and they schedule their practice times meticulously while occasionally feeling pressure to match their more athletic peers.
  arts: Maha Sarfert, a frequent visitor to the Wichita Art Museum inspired by digital painter Ross Tran and fantasy illustrator Julie Dillon, spends evenings sketching scenes from N.K. Jemisin novels while
    listening to Tame Impala, and they channel this blend of visual and literary influences into short fiction, poetry, and experimental digital art on their tablet.
  travel: Maha Sarfert, who loves planning trips in their journal, often explores Kansas’s natural spots like the Tallgrass Prairie and has visited Yellowstone on a family road trip, while dreaming of a
    cultural immersion in Kyoto, Japan, and they balance a modest allowance with a yearning for adventure by saving a portion of their allowance for future travel.
  culinary: Maha Sarfert, an enthusiastic home cook who loves whipping up Kansas‑style chili, experimenting with sushi rolls using fresh basil and soy sauce, and baking simple banana bread, often forgets
    to set timers leading to occasional burnt toast, and they enjoy pairing meals with a splash of homemade lemonade.
  core: Maha Sarfert, a 14‑year‑old curious artist‑coder who balances meticulous planning with bouts of anxiety, channels a love for sci‑fi into sketchbooks, Scratch games, and poetry, while juggling school,
    a modest allowance, and a quest for creative expression.
background:
  cultural: Maha was raised in Wichita, Kansas, a Midwestern city that blends urban amenities with prairie heritage. Her family’s cultural background is predominantly white American, emphasizing values
    such as community involvement, self‑reliance, and a modest, pragmatic outlook. The local culture—characterized by a strong public school system, seasonal events like the Kansas State Fair, and a supportive
    arts scene that includes the Wichita Art Museum and community theater—has nurtured her appreciation for creativity while reinforcing an organized, goal‑oriented mindset. Exposure to both rural surroundings
    and city life in Sedgwick County gives her a balanced perspective that honors tradition while welcoming innovation.
