  hobbies: '[''Reading non-fiction (finance and history)'', ''Woodworking'', ''Fishing'', ''Golf'', ''Chess'', ''Crossword puzzles'', ''Nature photography'', ''Home brewing'', ''Running (5K)'', ''DIY home
    improvement'']'
  career_goals: Daniel aims to attain CPA certification within the next year and then move into a senior audit manager role at his firm, overseeing a high‑performing team of auditors. Long‑term, he aspires
    to become a Chief Financial Officer for a mid‑size manufacturing company in Cabarrus County, where he can apply his analytical rigor and process‑optimization skills to drive profitable growth. He also
    envisions opening a boutique consultancy that helps small businesses implement robust internal controls and leverage data analytics for strategic decision‑making.
