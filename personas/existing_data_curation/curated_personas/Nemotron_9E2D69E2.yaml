  hobbies: '["Gardening", "Coastal walks", "Fishing", "Reading detective novels", "Woodworking", "Cooking New England seafood", "Board games", "Neighborhood potlucks", "Church community clean‑up volunteering"]'
  career_goals: Tommy aims to advance into a supervisory role within facilities management, obtaining certification such as Certified Facility Manager (CFM) or a Green Cleaning Specialist credential. Over
    the next five years he plans to become a shift supervisor and eventually a facilities manager for a corporate campus, where he can implement sustainable cleaning programs. He also dreams of launching
    a small, family‑owned cleaning business that provides reliable, eco‑friendly services to local businesses while maintaining the steady income needed to support his family.
