personas:
  professional: Tommy Stout, a seasoned commercial cleaning professional with over a decade of expertise in green cleaning, OSHA compliance, and crew coordination, channels their love of routine and practical
    thinking into meticulously organized schedules that keep facilities spotless while they foster a harmonious work environment.
  sports: Tommy Stout stays active through early-morning shoreline walks, recreational fishing in Long Island Sound, a seasonal membership at the Guilford Community Gym where they join a Tuesday night intramural
    softball league, and cheering for the Boston Red Sox, New England Patriots, and Hartford Yard Goats during weekend games.
  arts: Tommy Stout balances work and leisure by devouring classic detective novels from Agatha Christie and Raymond Chandler, listening to folk-rock storytelling of Bob Dylan, watching film noir staples
    like Chinatown, and building wooden bookshelves inspired by This Old House, all of which shape their appreciation for Americana art such as Winslow Homer seascapes, and they often discuss these influences
    at neighborhood potlucks.
  travel: Tommy Stout prefers low-key, well-planned getaways that blend nature and family time, often weekend-hiking the White Mountains of New Hampshire, touring Maine's lobster shacks, or savoring a historic
    inn in St. Augustine, Florida, while they maintain a modest travel budget that reserves larger splurges for occasional sailing charters in the Bahamas.
  culinary: Tommy Stout, an adept home chef, relishes crafting New England staples such as creamy clam chowder with baby potatoes, pan-seared scallops with lemon-butter, and lobster rolls on toasted brioche,
    often seasoning with garden-fresh herbs like dill and thyme, and they master the art of perfectly smoked grilled corn as a side dish.
  core: Tommy Stout blends a love of orderly routines with hands-on craftsmanship, balancing green-cleaning expertise, garden-to-table cooking, and a quiet devotion to classic mysteries, while they quietly
    hoard a secret stash of half-finished clam chowder in the fridge for late-night cravings.
background:
  cultural: Tommy was raised in a middle‑class, white New England family in the Hartford area, later settling in Guilford, Connecticut. His upbringing emphasized the New England work ethic, modesty, and
    community responsibility. Family traditions include regular Sunday meals, local church involvement, and participation in town events like Fourth of July fireworks and town clean‑up days. Though his
    surname reflects a blend of Anglo and Hispanic ancestry, his cultural identity is rooted in the practical, family‑oriented values of the region, with a strong appreciation for seasonal seafood, outdoor
    recreation, and maintaining harmonious relationships with neighbors.
attributes:
