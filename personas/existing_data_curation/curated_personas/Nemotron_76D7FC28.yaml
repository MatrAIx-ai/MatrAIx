personas:
  professional: Jason Gasparino, a budding visual storyteller and LEGO architect, channels their curious, organized mindset into sketching comic strips, building intricate brick structures, and coding simple
    Scratch games, consistently balancing meticulous detail with creative flexibility.
  sports: Jason Gasparino, a dedicated member of the Fresno Youth Soccer Club who practices three times a week after school, avidly follows the Fresno State Bulldogs football team and the Los Angeles Lakers,
    and blends structured drills with spontaneous backyard matches to stay fit and improve their footwork.
  arts: Jason Gasparino, who attends art workshops at the Fresno Art Museum, draws inspiration from cartoonists Bill Watterson and manga creator Akira Toriyama, enjoys listening to the Beatles and Olivia
    Rodrigo, and spends evenings sketching superheroes while experimenting with watercolor landscapes.
  travel: Jason Gasparino, who loves family road trips to the Sierra Nevada, has explored Yosemite National Park and the San Diego Zoo, dreams of wandering Rome’s ancient streets and Barcelona’s colorful
    markets, and plans vacations by balancing school holidays with their parents’ budget‑friendly itineraries that mix theme‑park thrills and nature hikes.
  culinary: Jason Gasparino, whose palate delights in spaghetti carbonara with crispy pancetta, pepperoni pizza topped with fresh basil and mozzarella, and homemade chocolate chip cookies, enjoys helping
    their mother stir sauce and can bake the cookies on their own, though they often leave crumbs on the kitchen counter.
  core: Jason Gasparino, a curiosity‑driven 10‑year‑old whose days blend sketching comic heroes, building LEGO masterpieces, kicking soccer balls, and savoring Sunday pasta meals, frequently loses track
    of time in art projects and forgets to finish their chores.
background:
  cultural: Jason comes from an Italian‑American family that has lived in Fresno for generations. Family gatherings often feature homemade pasta, pizza, and Sunday meals that reinforce close‑knit relationships.
    His parents celebrate Catholic holidays and traditional festivals, passing down stories of their heritage while also embracing the multicultural vibe of the Central Valley. Growing up near farms and
    a diverse community, he has picked up some Spanish words from neighbors and enjoys local events like the Fresno County Fair, blending his Italian roots with the broader Californian cultural mosaic.
