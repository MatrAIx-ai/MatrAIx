  hobbies: '[''Reading historical fiction and educational literature'', ''Playing basketball in community leagues'', ''Gardening (herb and vegetable garden)'', ''Cooking Southern and family recipes'', ''Listening
    to jazz, hip‑hop, and soul music'', ''Attending African‑American cultural festivals and heritage events'', ''Volunteering at community youth center'', ''Exploring educational technology tools and podcasts'',
    ''Practicing mindfulness meditation for stress management'']'
  career_goals: Craig aspires to move into a school‑wide instructional leadership role, such as instructional coach or curriculum specialist, where he can influence teaching practice across his district
    while still staying connected to the classroom. He plans to earn a master's degree in Educational Leadership within the next three years, with a focus on equity and culturally responsive pedagogy. Additionally,
    he wants to launch an after‑school STEAM program that partners with local community centers, providing hands‑on science and coding experiences for under‑represented students. Balancing his desire for
    professional growth with his need for manageable stress, he also seeks training in time‑management and organizational tools to improve his own workflow.
