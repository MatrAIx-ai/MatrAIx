personas:
  professional: Craig Haggins, a 46‑year‑old elementary and middle‑school teacher in Woodbridge, VA, leverages his curiosity and data‑driven mindset to design differentiated, culturally responsive lessons
    while juggling the spontaneous classroom moments that often strain his organizational habits, and he routinely mentors peers on integrating technology and equity‑focused practices.
  sports: Craig Haggins plays weekly pick‑up games with the Woodbridge Hoops Club, follows the Washington Wizards in the NBA, and stays fit by joining a local weekend basketball league that doubles as his
    social outlet and stress‑relief routine.
  arts: Craig Haggins fills his downtime with listening to Miles Davis, Kendrick Lamar, and Marvin Gaye while swapping historical fiction novels with fellow teachers, regularly attending the Woodbridge
    Cultural Arts Festival and the local African‑American heritage showcase to keep his love for storytelling alive.
  travel: Craig Haggins prefers short, carefully budgeted road trips that blend culinary discovery and cultural immersion, such as weekend getaways to Charleston’s historic district for low‑country cuisine,
    annual visits to New Orleans for jazz and gumbo, and he dreams of a longer journey to Ghana to explore ancestral roots when his teaching schedule permits.
  culinary: Craig Haggins, an avid herb gardener, enjoys crafting Southern‑style barbecue ribs, slow‑cooked collard greens seasoned with smoked turkey, and experimental dishes that feature fresh basil,
    thyme, and rosemary from his garden, often sharing them at family gatherings.
  core: Craig Haggins, a 46‑year‑old educator who blends curiosity‑driven lesson design with a penchant for spontaneous basketball games, wrestles with chronic worry and occasional disorganization, yet
    finds balance through gardening, mindfulness, and community‑center mentoring.
background:
  cultural: Craig identifies as African American and grew up in a close‑knit family that emphasized the importance of education, community service, and cultural pride. His upbringing in the Mid‑Atlantic
    region exposed him to a blend of Southern culinary traditions, church‑based communal gatherings, and the rich history of the civil‑rights movement. This heritage informs his teaching philosophy, especially
    his commitment to equity, storytelling, and fostering a sense of belonging for all students. Living in Woodbridge, VA, he benefits from a diverse suburban environment, allowing him to celebrate his
    cultural roots while engaging with neighbors from a variety of backgrounds through local events, food, and music.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Curriculum development'', ''Literacy coaching'', ''Technology integration (Google Classroom, interactive whiteboards)'', ''Parent
