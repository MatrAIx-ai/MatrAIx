  career_goals: Peter aims to progress to a senior regional director role within the next five years, overseeing multiple sites across the Southwest. He plans to earn an MBA to complement his humanities
    background and to lead a company‑wide digital transformation focused on sustainability and efficiency. Long‑term, he aspires to mentor emerging managers and eventually launch his own consulting practice
    that helps small businesses streamline operations while staying grounded in practical, data‑backed solutions.
