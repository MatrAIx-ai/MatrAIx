  hobbies: '[''Hiking'', ''Mountain Biking'', ''Fishing'', ''Reading Historical Non‑fiction'', ''Creative Writing'', ''Cooking'', ''Woodworking'', ''Acoustic Guitar'', ''Community Theater'', ''Local Heritage
