personas:
  professional: Glenn Edenfield, a retired agricultural engineer with decades of expertise in electrical and mechanical farm systems, now channels his pragmatic curiosity into mentoring high‑school STEM
    students, designing low‑cost irrigation upgrades for local growers, and translating complex technical concepts into clear workshops for community members.
  sports: Glenn Edenfield leads a senior walking club that traverses the orchards and river trails of Glenn County, cheerfully supports the Sacramento River Cats minor‑league baseball team, and enjoys occasional
    pickleball matches at the local recreation center.
  arts: Glenn Edenfield sings in his church choir, delights in folk‑rock classics by Bob Dylan and John Denver, attends seasonal performances at the local theater featuring productions of “Our Town,” and
    frequently reads historical non‑fiction by David McCullough, which fuels his storytelling at the town historical society.
  travel: Glenn Edenfield plans relaxed road trips with his wife to historic sites such as Gettysburg, Colonial Williamsburg, and Mesa Verde, preferring scenic drives and modest bed‑and‑breakfast stays,
    while also enjoying frequent weekend excursions to Napa Valley vineyards and the nearby Lassen Volcanic National Park.
  culinary: Glenn Edenfield cultivates a vegetable garden that supplies fresh tomatoes, heirloom carrots, and sweet corn, which he incorporates into simple, hearty dishes like roasted beet salad with goat
    cheese, grilled corn on the cob seasoned with smoked paprika, and occasional sourdough bread baked with home‑grown rosemary.
  core: Glenn Edenfield blends lifelong engineering acumen with a sociable, garden‑fueled routine, mentoring youth, managing a cautious retirement portfolio, and balancing health maintenance while savoring
    classic folk tunes and historic road trips.
background:
  cultural: Glenn was raised in a small farming town in the Central Valley, where his family’s roots trace back to European immigrants who settled the region in the early 20th century. The community’s emphasis
    on hard work, self‑reliance, and close‑knit social ties shaped his values. He grew up attending a Protestant church, which reinforced a sense of service and collective responsibility. While he identifies
    as a white American, he respects the diverse cultural fabric of Orland and actively engages with neighbors of varied backgrounds, celebrating local festivals and supporting community initiatives that
    bridge cultural divides.
