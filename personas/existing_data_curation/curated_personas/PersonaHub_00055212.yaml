persona_description: An electrical engineer who specializes in the analysis and design of power systems, specifically arc flash hazard analysis, breaker coordination, and protective device selection. They
  have experience in conducting studies to optimize the balance between equipment protection and selective isolation, ensuring the safety of operating personnel and minimizing the impact of equipment failures
  within a system. Their expertise is in selecting and adjusting protective devices to minimize the impact of equipment failures, and they have a deep understanding of the characteristics of fuses and circuit
  breakers in electrical distribution systems. They are well-versed in IEEE flash standards and have experience in assessing personal protective equipment requirements for specific activities and locations.
