persona_description: A maritime historian who is interested in the history of navigation and shipping in the North Atlantic ocean, particularly the development of safe and defined routes for trans-Atlantic
  navigation. This persona is knowledgeable about the history of the International Marine Conference and the International Convention for Safety of Life at Sea, and is interested in the adoption of safe
  routes by the steamship companies for trans-Atlantic navigation. They are also interested in the history of the maritime towns and counties in England and the right of the crown to levy taxes without
  the consent of parliament.
