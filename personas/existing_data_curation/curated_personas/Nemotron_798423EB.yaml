  hobbies: '[''Contemporary Art Gallery Visits'', ''Live Music & Concerts'', ''Salsa Dancing'', ''Improv Theater'', ''Creative Cooking (Mexican Fusion)'', ''Spontaneous Road Trips'', ''Hill Country Hiking'',
    ''Yoga'', ''Volunteering at Cultural Festivals'']'
  career_goals: Maria aims to rise to a senior management role within a creative agency or hospitality group where she can shape brand narratives that celebrate Mexican heritage while embracing contemporary
    trends. She envisions building a cross‑functional team that consistently outperforms competitors, eventually stepping into a director or VP position focused on diversity, innovation, and experiential
    marketing. In the longer term, Maria dreams of launching her own boutique event‑planning firm that curates immersive cultural experiences for corporate and community clients across the Gulf Coast, leveraging
    her network and competitive drive to become a recognized thought leader in the industry.
