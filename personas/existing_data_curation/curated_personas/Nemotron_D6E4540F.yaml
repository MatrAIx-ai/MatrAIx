personas:
  professional: Carlos Dominguez, a veteran bilingual secondary school teacher with over four decades of experience, they leverage their methodical lesson‑design skills, data‑driven assessment, and practical
    curiosity to craft culturally responsive curricula while mentoring younger educators and leading professional‑development workshops.
  sports: Carlos Dominguez, an avid supporter of local sports, they cheer the Detroit Tigers in summer, the Detroit Red Wings during hockey season, and participate in a senior walking club that meets weekly
    for 3‑mile hikes along the Huron River while occasionally joining a community softball league.
  arts: Carlos Dominguez, a quiet lover of the arts, they attend local community theater productions of classic plays like "Our Town," enjoy listening to the folk ballads of Joan Baez and traditional folk
    ensembles from their heritage, and admire the paintings of Frida Kahlo and Diego Rivera at museum exhibitions.
  travel: Carlos Dominguez, an inquisitive traveler with a love for history, they favor well‑planned road trips to historic sites such as the colonial towns of their ancestors' homeland, the mission ruins
    in Texas, and European landmarks like Barcelona and Rome, always traveling with a detailed itinerary and a notebook for genealogy research.
  culinary: Carlos Dominguez, a skilled home‑cook who revels in preparing traditional dishes from their family's recipes, they expertly make tamales with masa, pork, and roasted chilies, sauté nopales with
    cilantro, and a tangy salsa verde, while also experimenting with garden‑fresh vegetables in hearty soups and stews.
  core: Carlos Dominguez, a methodical yet curious retiree, they blend a love for gardening, chess, and heritage cooking with a disciplined approach to budgeting, health, and community service, all while
    quietly preferring small gatherings over large crowds.
background:
  cultural: Carlos was raised in a Mexican‑American household in Michigan, where Spanish was spoken at home and Mexican traditions such as Día de los Muertos and quinceañeras were celebrated. His Catholic
    faith and strong family ties shaped his values of respect, cooperation, and community service. He incorporates Mexican cultural references into his teaching, using bilingual resources to connect students
    with their heritage, and he actively supports local Latino families through school outreach programs. This heritage informs his emphasis on harmony, kindness, and cultural responsiveness in the classroom.
attributes:
  skills: '[''Curriculum Design'', ''Bilingual Education'', ''Instructional Technology Integration'', ''Data-Driven Assessment'', ''Classroom Management'', ''Differentiated Instruction'', ''Mentoring'',
    ''Professional Development Facilitation'', ''Interdisciplinary Collaboration'']'
  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Reading (history and education)'', ''Woodworking'', ''Chess'', ''Walking/hiking'', ''Genealogy research'', ''Attending cultural festivals'']'
  career_goals: Carlos plans to retire from full‑time teaching within the next two years, but he intends to remain active in education by serving as a part‑time instructional coach for Spanish language
    teachers, developing a district‑wide bilingual curriculum, and authoring a practical guide on culturally responsive teaching. He also hopes to contribute to the local school board’s equity initiatives
    and mentor early‑career educators through a retired‑teachers’ support network.
