  hobbies: '[''vegetable gardening'', ''crocheting'', ''cooking Guatemalan cuisine'', ''reading historical fiction'', ''book club participation'', ''guided meditation'', ''gentle yoga'', ''walking along
    the Charles River'', ''volunteering at Hispanic cultural center'']'
  career_goals: Grisel aims to transition from front-line sales to a mentorship and leadership role within her agency, aspiring to become a senior sales manager or training coordinator. She plans to obtain
    the CPCU designation to deepen her technical expertise and enhance credibility. Over the next three years, she wants to consistently rank in the top 10% of agents while adopting a more predictable schedule
    that supports her family and mental-health routine. Ultimately, she hopes to leverage her experience to consult small businesses on risk management, providing structured, community-focused advisory
    services.
