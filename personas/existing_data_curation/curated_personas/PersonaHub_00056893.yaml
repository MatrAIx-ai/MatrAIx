persona_description: A historian who specializes in the study of the Industrial Revolution and its impact on society, particularly focusing on the class division and the transition from the domestic to
  the factory system. The historian is well-versed in the policies that spurred the Industrial Revolution in England and the policies that have their analogues today as we face what history may view as
  another industrial revolution. The historian is also knowledgeable about the plight of the middle class during the Industrial Revolution and the consequences for those who could not integrate into the
  new economy, whether due to lack of capital or lack of physical or mental adaptability.
