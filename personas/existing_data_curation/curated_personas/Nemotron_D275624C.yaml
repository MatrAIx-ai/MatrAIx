  career_goals: Sergio aims to move from his current cashier role to a shift‑supervisor position within the next two years, leveraging his practical knowledge and competitive drive to meet performance metrics.
    He plans to obtain his GED and complete community‑college courses in retail management and inventory systems, ultimately targeting an assistant store‑manager role. Long‑term, he envisions opening a
    small family‑run convenience store in Toledo that blends efficient operations with his Mexican culinary heritage, providing a stable future for his wife and any children.
