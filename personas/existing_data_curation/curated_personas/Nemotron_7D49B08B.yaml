  hobbies: '[''Woodworking'', ''Model‑train building'', ''Reading non‑fiction (technology, engineering, personal finance)'', ''Vegetable gardening'', ''Chess (online and in‑person)'', ''Solo walking in
    local parks with podcasts'', ''Tinkering with vintage radios'']'
  career_goals: Although not currently employed, John aims to turn his practical skills into a modest, community‑focused venture. He plans to establish a part‑time handyman service that caters to senior
    neighbors in El Monte, emphasizing reliability and high‑quality workmanship. He also seeks to deepen his expertise in sustainable home technologies, such as residential solar panel installation, to
    offer eco‑friendly solutions. Additionally, John aspires to achieve financial stability that will allow him to retire comfortably while still being able to volunteer his skills to local youth programs,
    teaching basic home‑repair and budgeting basics. Ultimately, he hopes to be recognized as a trusted resource within his small community, balancing his competitive drive with a desire to give back.
