personas:
  professional: John Holloway, a 57‑year‑old aspiring part‑time handyman, leverages his methodical home‑repair expertise and skeptical eye for shortcuts to build a reliable, senior‑focused service in El Monte,
    while competitively pursuing sustainable solar installations to differentiate his brand.
  sports: John Holloway maintains modest fitness through daily solitary walks in El Monte’s park system, follows the Los Angeles Dodgers and Lakers with quiet devotion, and participates in a small neighborhood
    walking club that meets on Saturday mornings, while avoiding competitive sports due to his reserved nature.
  arts: John Holloway nurtures his creative side by restoring vintage radios, listening to Miles Davis’s “Kind of Blue” and The Beatles’ “Abbey Road” while working in his workshop, and attending occasional
    community theater productions of classic plays, though he rarely engages in social art events.
  travel: John Holloway prefers meticulously planned solo road trips to scenic national parks like Yosemite and the Grand Canyon, delights in weekend visits to the historic lighthouse towns of the Pacific
    Northwest, and dreams of a future pilgrimage to Japan’s radio museums, all balanced against his budget and modest retirement timeline.
  culinary: John Holloway, an adept home gardener, often cooks garden‑fresh dishes such as roasted chicken with rosemary, tomato‑basil pasta, and hearty chili con carne, enjoys occasional sourdough bread
    baking, and treats himself to a well‑deserved shrimp scampi with garlic and parsley after completing a demanding woodworking project.
  core: John Holloway blends a relentless curiosity for mechanical detail with a cautious, budget‑obsessed mindset, finding solace in solitary hobbies, yet frequently battling worry that fuels his meticulous
    planning and occasional over‑cautiousness.
background:
  cultural: John grew up in the post‑war suburban expansion of Southern California, born in the early 1960s to a working‑class white family. His upbringing was shaped by the American middle‑class values
    of self‑reliance, hard work, and practical problem‑solving. Living in El Monte, he was exposed to a multicultural neighborhood where Mexican cultural elements—such as food, community festivals, and
    a strong neighborly ethos—were part of everyday life, subtly influencing his appreciation for close‑knit community ties. Although he never married and completed only an elementary education, the cultural
    emphasis on individualism and personal responsibility guided his independent lifestyle. His pragmatic outlook reflects the broader West‑Coast work ethic that values hands‑on skill acquisition and adaptability.
attributes:
