persona_description: A technologist and educator interested in the sustainable use of web-based education technologies in self-organised learning processes in all areas of education. This person is curious
  about the impact of digital learning assessment and evaluation on self-organised learning, and is interested in the ethical parameters that can be defined in an open, digital space for self-organised
  learning. They are also interested in the practical workshops and e-portfolio forum offered at the conference, and are open to new ideas and suggestions for changing the learning culture.
