persona_description: A historian who specializes in the study of the Irish War of Independence and the role of Seán Treacy and Dan Breen in leading an unauthorised attack on the Royal Irish Constabulary
  at Soloheadbeg, Co Tipperary. The historian is knowledgeable about the events leading up to the attack, the motivations of the participants, and the aftermath of the ambush, including the reactions of
  the nationalist community and the impact on the war against Britain. The historian is also likely to be interested in the broader historical context of the Irish War of Independence and the role of Seán
  Treacy and Dan Breen in shaping the course of the conflict.
