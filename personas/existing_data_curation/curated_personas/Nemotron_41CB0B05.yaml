personas:
  professional: Jeffery Matthews, a seasoned construction supervisor who excels at interpreting blueprints, ensuring OSHA safety compliance, and coordinating multi‑trade crews, blends practical curiosity
    with a relaxed, flexible planning style, and they meticulously manage budgets and vendor relationships while testing emerging building methods.
  sports: Jeffery Matthews, a dedicated early‑morning fisherman on the Caloosahatchee River who also roots for the Miami Dolphins and the Tampa Bay Rays, joins a local senior softball league each spring,
    and they keep fit with occasional backyard calisthenics rather than formal gym routines.
  arts: Jeffery Matthews, an avid reader of regional history and fan of folk musicians like John Hartford and storyteller Tom Waits, spends evenings on the porch listening to classic blues while sketching
    woodworking designs, and they occasionally attend performances at the historic Barbara B. Mann Performing Arts Center.
  travel: Jeffery Matthews, who prefers low‑key road trips with their wife, has explored the mangroves of the Everglades, taken weekend getaways to Sanibel Island for shell‑collecting, dreams of a scenic
    drive through Asheville’s Blue Ridge Mountains, and they usually plan itineraries on a simple paper map rather than digital apps.
  culinary: Jeffery Matthews, a competent home chef who harvests heirloom tomatoes and bell peppers from their garden, loves grilling fresh catfish with a lemon‑herb rub, frequently prepares fish tacos
    topped with cilantro and avocado, and they indulge in occasional shrimp gumbo at local seafood shacks.
  core: Jeffery Matthews, a pragmatic yet curiously disorganized mentor‑to‑be who swaps early‑morning fishing for late‑night tool tinkering, thrives on quiet routines, and can’t resist buying one more woodworking
    gadget despite a tight budget.
background:
  cultural: Jeffery is a second‑generation white Floridian whose upbringing in a small Gulf Coast town instilled Southern hospitality, a strong work ethic, and a deep appreciation for the outdoors. His
    cultural identity blends practical, hands‑on values common to the region's construction trades with a community‑oriented mindset that emphasizes cooperation, modesty, and respect for local traditions.
attributes:
  skills: '["Blueprint Reading", "OSHA Safety Compliance", "Crew Supervision", "Project Scheduling", "Heavy Equipment Operation", "Budget Management", "Vendor Relations", "Problem Solving on Site", "Mentoring
    Apprentices"]'
  hobbies: '["Fishing", "Boating", "Woodworking", "Gardening", "Reading about construction technology", "Local history", "Volunteer community clean‑ups"]'
  career_goals: Jeffery aims to transition into a mentorship‑focused role, guiding younger tradespeople and formalizing a safety‑training program for his company. He hopes to leverage his practical knowledge
    to start a modest consulting service for residential remodels in the North Fort Myers area, allowing a flexible semi‑retirement while staying connected to the trade he loves.
