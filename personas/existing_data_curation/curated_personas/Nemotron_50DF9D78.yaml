  career_goals: Although still an infant, Shelby’s emerging traits hint at future aspirations of nurturing others and creating beauty. As she grows, she is imagined to aim for roles that blend compassion
    with creativity—such as a teacher who inspires curiosity, a community volunteer who supports neighbors, or an artist who celebrates local culture. Her long‑term ambition is to turn her natural empathy
    and love of art into a fulfilling, people‑oriented career.
