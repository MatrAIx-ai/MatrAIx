  career_goals: Joanna dreams of turning her imagination into a career that blends art, narrative, and technology. She hopes to become a concept artist or animator for video games or animated films, where
    she can design original worlds and characters. She also imagines writing and illustrating her own picture books, especially stories that help children understand and manage feelings like worry or stress.
    As she grows, she is open to exploring marine biology or environmental design, inspired by the coastal environment of Wilmington, but her core ambition remains creating vibrant, emotionally resonant
    content that invites others to explore new ideas.
