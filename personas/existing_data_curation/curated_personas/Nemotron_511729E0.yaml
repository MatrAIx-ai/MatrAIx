personas:
  professional: Joanna Thorburn, an aspiring junior visual storyteller, merges her love for drawing fantastical creatures, Minecraft world‑building, and Scratch coding into creating concept art and prototype
    narrative games, though her laid‑back attitude sometimes leaves school art assignments unfinished.
  sports: Joanna Thorburn channels their energy into the local junior surf club and the school’s swim team, cheerfully supporting the regional coastal soccer squad the Seaside Strikers while occasionally
    joining weekend beach‑volleyball games, and they prefer a playful, unstructured approach to fitness that balances swimming laps with building sandcastles.
  arts: Joanna Thorburn finds inspiration in the whimsical illustrations of Brian Froud, the vibrant animation of Studio Ghibli’s Hayao Miyazaki, and the lyrical storytelling of singer‑songwriter Aurora,
    often recreating their styles in sketchbooks while attending weekly art club sessions where they showcase their watercolor experiments.
  travel: Joanna Thorburn dreams of exploring tide‑pools in the Hawaiian Islands and wandering the ancient ruins of Machu Picchu, while their recent family trips have taken them to the rugged cliffs of
    Big Sur and the historic seaside town of Whitby, fueling their imagination for future fantasy worlds.
  culinary: Joanna Thorburn enjoys crafting simple sea‑salted avocado toast topped with cherry tomatoes and a drizzle of lemon zest, experimenting with strawberry‑mango smoothies, and eagerly helping their
    parent whisk together easy banana‑bread muffins, though they sometimes forget to clean the dishes afterward.
  core: Joanna Thorburn is an imaginative eleven‑year‑old who blends art, storytelling, and ocean love into every hobby, but their scattered organization and tendency toward worry often turn creative sessions
    into frantic yet magical marathons.
background:
  cultural: Joanna is a white American growing up in Wilmington, North Carolina, a historic coastal city with a blend of Southern hospitality and a vibrant maritime culture. Her family values education,
    creativity, and community involvement, often attending local festivals such as the Azalea Festival and participating in neighborhood beach activities. The proximity to the Atlantic Ocean nurtures her
    fascination with marine life and environmental stewardship, while the region’s rich literary tradition and school programs encourage her love of reading and storytelling. She occasionally attends a
    family church, where she learns about compassion and service, reinforcing her cooperative yet assertive nature. These Southern and coastal influences shape her worldview, providing a supportive backdrop
    for her imaginative pursuits.
