persona_description: A theologian who specializes in the study of predestination, particularly the concepts and arguments related to Calvinism and Arminianism. Their research interests include, but are
  not limited to, the nature and scope of predestination, the relationship between predestination and election, the role of faith and works in predestination, and the implications of predestination for
  salvation and divine sovereignty. They are also interested in the historical and theological context of predestination, as well as its impact on contemporary theology and ecclesiology.
