persona_description: A researcher and scientist who is interested in the development of new diagnostic tools for cancer, particularly microRNA-based tests. They are particularly interested in the use of
  microRNA molecules to detect kidney cancer and understand their functions in the development and progression of the disease. They are also interested in the potential therapeutic applications of increasing
  levels of certain microRNAs, such as miR-651 and miR-708, as a new treatment for renal cell carcinoma.
