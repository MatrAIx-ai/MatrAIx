persona_description: This text is likely to be read by a structural engineer or a civil engineer who is using the ARTeMIS Modal Pro software to analyze and evaluate the dynamic response of structures. The
  reader is interested in using the Damage Detection plugin to detect and quantify damage in the structure based on the uploaded reference state model and the uploaded measurement files. The reader may
  also be interested in understanding the statistical thresholds and damage indicators used in the damage detection process, as well as the null space estimation of the reference state model. The reader
  is familiar with the concepts of structural engineering and the analysis of dynamic response, and may have some experience with using software tools for structural analysis.
