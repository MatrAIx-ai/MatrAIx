  hobbies: '[''Cycling and countryside biking'', ''Wildlife and landscape photography'', ''DIY home improvement projects'', ''Pick-up basketball'', ''Strategy video gaming'', ''Reading business books and
    listening to podcasts'', ''Volunteering with the local historical society'']'
  career_goals: Robert aims to become one of the top-producing agents in Lancaster County within the next five years. He plans to earn his full Pennsylvania broker's license, then launch his own boutique
    brokerage focused on historic homes and farmland properties—a niche that aligns with the region's heritage. He also intends to obtain the Certified Residential Specialist (CRS) designation, expand his
    referral network with local builders and lenders, and eventually mentor new agents. Financially, he targets a six-figure annual income and the freedom to invest in a small rental portfolio.
