personas:
  professional: Curtis Duhon, a curious 9‑year‑old aspiring game designer, merges their love for LEGO architecture, Minecraft world‑building, and Scratch programming into playful prototypes while often
    sidestepping deadlines because they prefer spontaneous creative bursts.
  sports: Curtis Duhon, a skate‑park regular and weekend soccer enthusiast, cheers for the Denver Broncos and the Colorado Rockies while favoring the local Denver Youth Soccer League for friendly matches
    and the Rocky Mountain skate crew for practice sessions, and they often practice new tricks after school.
  arts: Curtis Duhon, whose sketchbooks overflow with Stan Lee‑inspired comic heroes and Monet‑style Rocky Mountain vistas, absorbs vibrant colors at the Denver Art Museum while humming recorder renditions
    of "Hot Cross Buns" and collecting postcards of Alex Grey’s surreal illustrations for inspiration, and they often experiment with watercolor techniques after museum visits.
  travel: Curtis Duhon, an adventurous youngster who spends Saturdays exploring Denver’s foothill trails and dreams of trekking the high alpine paths of Rocky Mountain National Park, as well as riding the
    roller‑coasters at Disneyland during summer vacations, prefers spontaneous day trips over meticulously planned itineraries, and they usually pack a small backpack with snacks and a sketchbook for each
    outing.
  culinary: Curtis Duhon, a self‑appointed pizza connoisseur who favors extra cheese and pepperoni, often tosses together quick cheese quesadillas and snack‑size trail mix with dried apricots, treats themselves
    to rock‑candy‑like granola bars after a day of LEGO building, and they love finishing meals with a frosty chocolate milkshake.
  core: Curtis Duhon, a calm‑yet‑curious 9‑year‑old, builds sprawling LEGO kingdoms, sketches comic heroes, roams Denver’s trails, skates fearlessly, and they bounce back from every scrape with a grin.
background:
  cultural: Curtis grows up in a white American family in Denver, Colorado, where the blend of urban life and nearby mountain culture shapes his outlook. His parents value education, community involvement,
    and outdoor recreation, so family weekends often include hikes in the Rockies, trips to local museums, and attendance at community festivals that celebrate the city’s diverse heritage. The multicultural
    environment of Denver’s schools exposes him to a variety of traditions and perspectives, fostering his openness to new ideas while grounding him in the regional values of independence, respect for nature,
    and a love of creative expression.
