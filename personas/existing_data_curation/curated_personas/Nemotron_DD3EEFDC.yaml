  career_goals: Curtis dreams of a future where he can blend art, technology, and exploration. He often talks about becoming a video-game designer who creates worlds that inspire players to think creatively,
    or an inventor who builds gadgets that solve everyday problems. He also imagines working as an environmental scientist who uses art to raise awareness about Colorado’s mountain ecosystems. Above all,
    he wants a career that lets him keep learning, stay curious, and have the freedom to experiment without strict schedules.
