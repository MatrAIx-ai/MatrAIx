personas:
  professional: Ira Smallwood, a 41‑year‑old telecommunications technician, combines meticulous blueprint reading and RF troubleshooting with a compassionate, hands‑on training style to lead broadband deployment
    projects, mentor junior installers, and champion connectivity solutions for underserved St. Louis neighborhoods, reflecting a balance of curiosity-driven innovation and practical reliability.
  sports: Ira Smallwood, an avid hiker of Forest Park’s trails, holds a season ticket for the St. Louis Cardinals, joins a weekend adult softball league, and participates in community charity walks for
    seniors, blending organized fitness habits with flexible social engagement and a supportive, team‑oriented spirit.
  arts: Ira Smallwood enjoys quilting with a circle of friends, draws creative inspiration from the prairie landscape, reads historical novels such as Ken Follett’s ‘The Pillars of the Earth,’ and routinely
    unwinds listening to folk‑rock artist Gillian Welch at church potlucks, merging compassionate community involvement with a thoughtful appreciation of narrative and craft.
  travel: Ira Smallwood prefers moderate road‑trip adventures—like weekend getaways to the Ozark Mountains and an annual visit to Charleston’s historic district—while using amateur‑radio contacts to enrich
    overseas trips to Edinburgh and Munich, balancing limited vacation time with a love for historic architecture, quiet cabin stays, and culturally immersive experiences.
  culinary: Ira Smallwood delights in garden‑to‑table cooking, often preparing seasonal salads with heirloom tomatoes, roasted beets, and feta, hearty chicken‑and‑dumpling soup for church potlucks, and
    a signature sunflower‑seed loaf, showcasing a home‑cooking skill set that blends Midwestern comfort food with fresh herbs harvested from their own backyard.
  core: Ira Smallwood blends technical precision and community compassion, thriving at the intersection of RF engineering, gardening, and grassroots connectivity, while occasionally hoarding vintage radio
    gear and forgetting to water indoor plants during busy weeks.
background:
  cultural: Ira grew up in a close‑knit, middle‑class family in suburban Missouri, imbued with Midwestern values of hard work, self‑reliance, and community service. Her family’s roots trace back to several
    generations of white, rural Midwestern settlers who valued practical skills and mutual aid. She was raised in a Protestant (United Methodist) household, attending church regularly and participating
    in neighborhood events. This background fosters her compassionate, cooperative nature and her drive to help others while maintaining a pragmatic, steady approach to life.
attributes:
  skills: '[''RF system installation'', ''Antenna alignment'', ''Signal testing & analysis'', ''Low‑voltage wiring'', ''Technical schematics interpretation'', ''Use of spectrum analyzers and OTDRs'', ''FCC
    compliance and safety protocols'', ''Customer training and support'', ''Troubleshooting of telecom hardware and software'', ''Basic networking fundamentals'']'
  hobbies: '[''Gardening'', ''Amateur radio'', ''Hiking'', ''Quilting'', ''Volunteer tech tutoring for seniors'', ''Reading historical fiction'', ''Community potluck events'']'
  career_goals: Ira aims to earn advanced certifications (e.g., Certified Tower Technician, Cisco CCENT) and transition into a senior technician or team lead role within the next three years. She hopes
    to mentor new installers, lead larger deployment projects, and eventually start her own small contracting business focused on expanding broadband access in underserved neighborhoods of the St. Louis
    metro area. She also wants to contribute to community initiatives that bring reliable connectivity to local schools and senior centers.
