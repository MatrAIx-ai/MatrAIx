personas:
  professional: Lisa Nazworth, a 28‑year‑old manufacturing operations manager, leverages analytical acumen, process‑optimization expertise, and data‑driven decision‑making to lead cross‑functional teams,
    while their preference for structure and disciplined approach translates into meticulously documented SOPs and a habit of scheduled check‑ins; they are actively pursuing PMP certification and an MBA
    to scale sustainable manufacturing initiatives and mentor emerging women in STEM.
  sports: Lisa Nazworth maintains a disciplined fitness routine that includes early‑morning runs with the local Evergreen Runners club, winter cross‑country skiing trips, and a casual membership in a community
    yoga studio, while they cheer on the Seattle Seahawks and Seattle Kraken, reflecting a balance of individual challenge and team spirit.
  arts: Lisa Nazworth unwinds by listening to the minimalist piano compositions of Nils Frahm, attending quarterly performances at the Seattle Symphony, and curating a small but cherished collection of
    contemporary photography by Mickalene Thomas, though they rarely discuss these artistic interests in large gatherings.
  travel: Lisa Nazworth plans every trip with an Excel itinerary, favoring purpose‑driven short getaways to science museums in Kyoto, hiking the volcanic landscapes of Iceland, and weekend bike tours of
    Portland, while they balance a modest travel budget with a deep curiosity for sustainable practices and cultural immersion.
  culinary: Lisa Nazworth enjoys preparing Mediterranean‑inspired dishes such as quinoa tabbouleh with fresh parsley, lemon, and feta, and a spicy lentil stew spiced with cumin and harissa, but their culinary
    skill peaks at efficient meal‑prepping on Sundays, and they occasionally over‑season meals with extra hot sauce for an added kick.
  core: Lisa Nazworth is a disciplined, data‑driven operations leader who solves puzzles for mental clarity, sacrifices social outings for spreadsheets, and can’t resist an extra cup of coffee before bedtime,
    even though they know it disrupts their early‑morning runs.
background:
  cultural: Lisa grew up in a Midwestern, white, working-class family in Iowa, where values of hard work, community involvement, modesty, and self-reliance were emphasized. Her cultural identity blends
    Midwestern pragmatism with a respect for tradition and a progressive outlook on gender equity in STEM.
