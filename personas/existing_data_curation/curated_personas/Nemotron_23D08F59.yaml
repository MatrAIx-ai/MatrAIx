  hobbies: '[''Reading classic literature and philosophy'', ''Visiting art museums and galleries'', ''Walking or cycling along the Lakefront Trail'', ''Gardening (vegetable gardening with seasonal planning)'',
    ''Playing chess at the local chess club'', ''Photography of urban architecture'', ''Woodworking projects (furniture building)'', ''Cooking with his spouse'', ''Listening to jazz in small venues'', ''Volunteering
    at a community literacy program'']'
  career_goals: Robert aims to transition into a program director role for a city‑wide addiction treatment network, where he can standardize protocols, expand evidence‑based services, and increase access
    for underserved Chicago neighborhoods. He plans to earn a Certified Addiction Counselor Level III credential and complete a leadership fellowship to deepen his administrative expertise. Over the next
    five years, he hopes to publish a guide on structured, arts‑integrated counseling for mid‑western populations and mentor a new generation of counselors, leaving a lasting impact on community health.
