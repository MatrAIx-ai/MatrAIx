  career_goals: James aims to become a senior mechanical design engineer within the next five years, focusing on high-performance components for electric vehicles or aerospace applications. He plans to
    deepen his expertise in advanced simulation, additive manufacturing, and sustainable design through a combination of on-the-job projects and a possible master’s degree in mechanical engineering. Long-term,
    he is interested in founding a boutique consultancy that merges engineering precision with artistic product aesthetics, allowing him to work on innovative, interdisciplinary projects while leading a
    small, collaborative team. His competitive drive pushes him to seek leadership roles early, yet he remains aware of his tendency toward stress and is working on strategies to maintain balance.
