personas:
  professional: James Mullis, a 22‑year‑old budding mechanical design engineer, blends solid‑modeling expertise with a street‑photography eye to prototype high‑performance electric‑vehicle components, while
    their informal organization and competitive streak drive them to chase leadership roles despite occasional stress‑induced burnout.
  sports: James Mullis loves pickup basketball at the local community center and follows the Golden State Warriors and the Dallas Mavericks, joins weekend hiking trips with a regional trail club, and occasionally
    plays recreational soccer with a friends’ league, using their energetic nature to stay fit despite a tendency to skip warm‑ups.
  arts: James Mullis is an avid street‑photographer capturing urban murals and neon signage, frequents the regional contemporary art museum, creates digital illustrations inspired by Syd Barrett and Hayao
    Miyazaki, and plays rhythm guitar in a jam circle covering classic rock bands like Led Zeppelin and The Rolling Stones.
  travel: James Mullis prefers spur‑of‑the‑moment road trips over meticulously planned vacations, having recently driven to the Pacific Northwest to hike the Columbia River Gorge and dreaming of a solo
    cycling tour through the Dutch countryside, yet budget constraints keep overseas trips limited to occasional weekend getaways to nearby cities like Austin and Portland.
  culinary: James Mullis enjoys cooking ramen bowls with homemade broth, experimenting with smoked paprika‑spiced chicken wings, and whipping up quick avocado toast, while they often order greasy pizza
    after long gaming sessions, reflecting a balance between culinary curiosity and convenient indulgence.
  core: James Mullis is a hyper‑curious, art‑infused engineering prodigy who juggles endless projects, competitive gaming, and social hang‑outs, while battling stress‑driven worry and living a slightly
    chaotic, yet passionately creative, life.
background:
  cultural: James grew up in a suburban neighborhood of Stafford County, Virginia, where a blend of historic Civil War sites and modern commuter culture shaped his outlook. His family, with a background
    that includes a parent who served in the nearby military community, emphasized practical skills, community involvement, and an appreciation for local traditions. Growing up near Fredericksburg’s vibrant
    arts scene gave him early exposure to galleries, music festivals, and public murals, fostering his curiosity about visual aesthetics alongside a grounded, middle-class American upbringing. This environment
    has cultivated a pragmatic work ethic tempered by an openness to unconventional ideas and a comfort navigating both technical and creative spaces.
