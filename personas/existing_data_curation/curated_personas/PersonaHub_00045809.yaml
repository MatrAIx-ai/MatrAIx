  of genetic alteration on animals and the ethical considerations involved in animal welfare. They have experience working with various types of animals and understand the importance of minimizing pain
  and distress during the research process. This persona is likely to be involved in the development and testing of new medicines and is passionate about ensuring that these medicines are safe and effective
  for both the animals and humans they are intended to help.
