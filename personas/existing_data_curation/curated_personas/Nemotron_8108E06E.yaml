personas:
  professional: An aspiring automotive apprentice with a knack for community building, Nariman Hanson blends hands-on engine diagnostics and Arduino tinkering with outgoing mentorship, and they envision
    launching a neighborhood garage that doubles as a DIY workshop hub.
  sports: A competitive pickup basketball and soccer player who rallies local friends for weekend games, Nariman Hanson favors the Indianapolis Colts and Indiana Pacers, volunteers at community sports clinics,
    and they prioritize quick-thinking on the field over structured drills.
  arts: A music-festival-loving gamer who streams competitive multiplayer titles, Nariman Hanson enjoys country acts like Luke Bryan, indie bands like The Avett Brothers, and occasional live performances
    by Hozier, and they use these experiences to fuel their creative reflections.
  travel: A road-trip enthusiast who prefers spontaneous weekend getaways, Nariman Hanson has explored Nashville's music scene and Detroit's automotive museums, dreams of visiting Japan's Odaiba for tech
    expos, and they budget trips through part-time earnings despite occasional last-minute cancellations.
  culinary: A grill-centric cook who loves pepper-crusted steak, loaded nachos, and homemade pizza topped with fresh mozzarella and basil, Nariman Hanson experiments with smoky rubs on car-related project
    nights, and they often pair meals with craft sodas or cheap beer.
  core: A curiosity-driven, socially energetic tinkerer who wrestles with worry, impulsive spending, and a penchant for last-minute plans, Nariman Hanson channels those quirks into hands-on projects and
    community gatherings.
background:
  cultural: Nariman grew up in Greene, a small town in Floyd County, Iowa, a region characterized by its agricultural roots, tight‑knit community, and Midwestern values of hard work, self‑reliance, and
    neighborly support. His family tradition includes participation in local church activities and annual county fairs, which fostered a sense of belonging and communal responsibility. While he identifies
    with mainstream American culture—enjoying country music, high school sports, and fast‑food gatherings—he also values the practical, do‑it‑yourself ethos common in rural Iowa. This blend of rural upbringing,
    exposure to community events, and contemporary digital culture shapes his worldview and aspirations.
