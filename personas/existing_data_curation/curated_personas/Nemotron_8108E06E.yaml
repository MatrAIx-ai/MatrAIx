  career_goals: Nariman wants to turn his practical skills into a sustainable career. He aims to pursue an apprenticeship in automotive technology or a trade school program that combines hands‑on work with
    classroom learning. Long‑term, he envisions opening a community‑focused garage that offers repair services, DIY workshops, and a small auto‑parts retail space, serving fellow residents of Greene and
    surrounding towns. He is also considering a side path as a competitive eSports player or local sports coach, leveraging his competitive drive and social charisma. He hopes to balance his curiosity for
    new technologies with the stability of a trade, providing both personal fulfillment and a reliable income.
