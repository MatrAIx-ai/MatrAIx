personas:
  professional: Aron Ruefli is a self‑taught tech enthusiast who blends hands‑on electronics tinkering with a growing knack for visual storytelling; they channel their analytical mindset into troubleshooting
    hardware, writing Python scripts for small automation tasks, and producing short videos for friends, while preparing to launch a freelance IT support and multimedia service during their GED studies
    and experimenting with UX/UI prototypes for a future boutique studio.
  sports: Aron Ruefli finds motivation in the rhythm of pick‑up basketball games at the local community center and in weekend hikes through the nearby state forest, where they capture trail footage for
    their vlog; they avidly follow the New York Red Bulls in soccer, cheer for the Connecticut Huskies basketball team, and keep tabs on Team Liquid’s League of Legends matches, yet they avoid regimented
    gym routines, seeing structured workouts as another constraint on their flexible schedule.
  arts: Aron Ruefli curates a soundtrack of cumbia, vallenato, and modern Latin pop—artists like Carlos Vives, Shakira, and J Balvin fill their room while they strum an intermediate guitar; they devour
    graphic novels such as Saga, Monstress, and Watchmen and lose themselves in sci‑fi novels by Isaac Asimov and Neil Gaiman, and they occasionally attend open‑mic nights at a downtown café to discuss
    ideas and showcase their music.
  travel: Aron Ruefli’s travel style mixes impromptu photo walks with budget‑tight planning; they have already trekked the trails of Shenandoah, snapped street scenes in New York City, and explored the
    coffee culture of Portland, and they dream of photographing the ruins of Machu Picchu, wandering the historic streets of Kyoto, and hiking Patagonia’s glaciers, all while balancing a part‑time freelance
    schedule and limited family resources.
  culinary: Aron Ruefli whips up family‑style arepas stuffed with melting cheese and hearty arroz con pollo with cilantro and peas, often accompanied by fresh mango salsa and homemade empanadas; their cooking
    skill sits at an intermediate level—comfortable in the kitchen with a parent’s guidance, they love experimenting with ingredients like sweet corn, plantains, and ají, and they savor the occasional street‑food
    taco from the local food‑truck scene.
  core: Aron Ruefli is a tech‑savvy, camera‑obsessed teen who juggles solitary tinkering, spontaneous video projects, and a laid‑back approach to planning, all while navigating teenage acne, occasional
    budgeting slip‑ups, and a love for Latin rhythms.
background:
  cultural: Aron was raised in a bicultural household in Fairfield, Connecticut, where his Colombian parents preserve many traditions from their homeland. Spanish is spoken at home, and family gatherings
    celebrate Colombian holidays such as Independence Day and Carnaval de Barranquilla with music, dancing, and traditional foods. He grew up enjoying Colombian coffee, salsa dancing at community events,
    and learning recipes passed down through generations. While fully immersed in American teenage culture, Aron maintains a strong connection to his Colombian roots, which shapes his language skills, culinary
    interests, and appreciation for Latin music and communal values.
attributes:
  skills: '["Python (basic)", "JavaScript (basic)", "Hardware troubleshooting", "Raspberry Pi projects", "Photography", "Video editing", "Spanish (conversational)", "Guitar (intermediate)", "Basic Colombian
