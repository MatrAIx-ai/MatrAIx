  hobbies: '["Strategy video gaming", "Raspberry Pi/Arduino projects", "Photography", "Video editing", "Listening to Colombian and Latin music", "Reading graphic novels and sci‑fi books", "Cooking Colombian
    dishes", "Small group hangouts at local cafés", "Exploring nature trails"]'
  career_goals: Aron aims to finish his high school education through a GED program and enroll in a community college to earn an associate degree in information technology or media production. In the short
    term, he hopes to obtain a certification as an IT support specialist and start a small freelance service repairing computers and creating simple multimedia content for local businesses. Long‑term, he
    envisions combining his technical and creative skills to work as a UX/UI designer or a multimedia producer, possibly launching his own boutique studio that serves both the Fairfield community and the
    broader Colombian diaspora.
