  hobbies: '["building custom gaming PCs", "Arduino and Raspberry Pi tinkering", "playing basketball", "reading science-fiction novels", "following tech news", "weight training at the gym", "volunteering
    as a STEM mentor"]'
  career_goals: He aims to secure an entry‑level mechanical or systems engineering position within Michigan’s automotive or renewable‑energy sector, where he can apply his CAD and programming skills to
    product development. Over the next three years, Benjamin plans to earn professional certifications such as Certified SolidWorks Professional (CSWP) and a Six Sigma Green Belt, positioning himself for
    a senior engineering role. Ultimately, he aspires to lead a multidisciplinary team that designs innovative, sustainable solutions and eventually start his own consultancy that helps small manufacturers
    adopt modern engineering practices while mentoring underrepresented youth in STEM.
