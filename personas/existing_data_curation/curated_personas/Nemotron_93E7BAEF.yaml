personas:
  professional: Benjamin Rodriquez, a 23‑year‑old mechanical engineer with a solid foundation in CAD, FEM, and embedded systems, applies their methodical, competitive mindset to designing automotive components
    that meet industry benchmarks while rigorously tracking progress with Trello and Gantt charts.
  sports: Benjamin Rodriquez, an avid pick‑up basketball player at Detroit’s community center, also hits the gym three times a week for weight training, follows the Detroit Pistons and the Michigan State
    Spartans, and plays for the local Sunday Warriors club, channeling their competitive drive into both court and barbell.
  arts: Benjamin Rodriquez, a sci‑fi aficionado, spends evenings dissecting the works of Isaac Asimov and William Gibson while blasting synthwave legends like Daft Punk and listening to the Blade Runner
    soundtrack, and occasionally attends open‑mic nights at a downtown Detroit art venue.
  travel: Benjamin Rodriquez prefers meticulously planned road trips—like weekend drives from Detroit to Mackinac Island—yet also dreams of a spontaneous tech‑conference adventure in Tokyo, balancing budget
    constraints with a craving for cultural immersion and cutting‑edge innovation.
  culinary: Benjamin Rodriquez enjoys moderate cooking, often whipping up spicy chili con carne with jalapeños and homemade cornbread, while also perfecting a ramen broth infused with miso, but admits they
    frequently order a pepper‑laden pizza after late‑night gaming sessions.
  core: Benjamin Rodriquez is a 23‑year‑old mechanically‑inclined, competitively‑driven engineer who balances methodical work, structured finances, and a love for basketball, sci‑fi, and weekend DIY projects,
    all while occasionally succumbing to late‑night gaming pizza cravings.
background:
  cultural: Benjamin grew up in a close‑knit African‑American family in the Detroit metropolitan area, where music, community, and resilience were everyday themes. His parents emphasized the importance
    of education and hard work, instilling a strong sense of responsibility that aligns with his practical outlook. He regularly attends local cultural events such as the Detroit Jazz Festival and community
    gatherings that celebrate Black heritage, reinforcing his connection to his roots. The rich automotive history of the region sparked his early fascination with mechanics, while the supportive network
    of Black professionals in engineering provides both role models and a sense of belonging. These cultural influences shape his identity, motivation, and his desire to give back to the community through
    mentorship and outreach.
attributes:
  skills: '["SolidWorks", "Autodesk Inventor", "Finite element analysis", "Python", "C++", "MATLAB", "Data analysis", "Arduino prototyping", "Raspberry Pi projects", "PCB design (Altium Designer)", "Project
