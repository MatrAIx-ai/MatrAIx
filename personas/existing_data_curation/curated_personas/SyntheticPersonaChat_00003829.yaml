    User 2: It''s not too bad. It can be busy at times, but it''s usually pretty fun.

    User 1: Do you like your job?

    User 2: I do. I like the people I work with and the customers are usually pretty nice.

    User 1: That''s good to hear. What do you like to do outside of work?

    User 2: I like to play basketball, go to concerts, and hang out with my friends.

    User 1: That sounds like fun. I like to do a lot of the same things.

    User 2: It sounds like we have a lot in common.

    User 1: Yeah, we do. It''s nice to meet someone who likes the same things I do.

    User 2: Me too. It''s been nice talking to you.

    User 1: You too. We should talk again sometime.

    User 2: Sounds good. I''ll give you my number'
