personas:
  professional: Wilson Cartaya, a 17‑year‑old aspiring automotive mechanic, combines a love for routine maintenance with a knack for spontaneous troubleshooting, leveraging hands‑on carpentry, bike‑repair,
    and budgeting skills to assist family projects while eyeing a future apprenticeship and journeyman certification.
  sports: Wilson Cartaya joins pickup soccer games at the local park, rides a skateboarding crew on weekend trails, avidly follows the LA Galaxy and the Portland Timbers, and maintains a casual fitness
    routine that alternates between early‑morning jogs and spontaneous neighborhood matches, treating exercise as both social outlet and routine.
  arts: Wilson Cartaya immerses themselves in regional Mexican music, with a playlist that cycles between Vicente Fernández, Los Tigres del Norte, and contemporary banda artists, while also enjoying the
    adrenaline‑pumping soundtracks of action video games like Call of Duty, and regularly attends community festivals showcasing folkloric dance and live mariachi.
  travel: Wilson Cartaya prefers low‑cost road trips to nearby state parks such as Mount Washington and the desert trails of New Mexico, dreams of visiting Mexico City’s historic markets and the beaches
    of Oaxaca, balances travel plans around school obligations and family duties, and typically books rides through rideshare apps but values spontaneous detours over rigid itineraries.
  culinary: Wilson Cartaya assists in preparing homemade tacos al pastor, mole poblano, and fresh salsa verde using garden‑grown chilies, tomatoes, and cilantro, boasts a solid intermediate cooking skill
    level, enjoys experimenting with roasted corn elotes, and frequently eats out at local taquerias for a quick bite when gaming friends visit.
  core: Wilson Cartaya is a routine‑loving teen with a spontaneous problem‑solving streak, who balances soccer and skateboarding, helps the family kitchen, saves for a mechanic apprenticeship, and occasionally
    splurges on video games despite occasional acne and knee aches.
background:
  cultural: Wilson comes from a Mexican‑American household; his parents immigrated from central Mexico and instilled strong family values, respect for tradition, and a love for Mexican cuisine and celebrations.
    He grew up bilingual, speaking Spanish at home and English in school and the broader community. Religious practice includes attending a local Catholic church on major holidays, and he takes part in
    cultural events such as Día de los Muertos and Mexican Independence Day celebrations held in nearby Portland. Living in Damascus, Oregon, he blends his Mexican heritage with the rural Pacific Northwest
    lifestyle, enjoying outdoor activities like hiking and gardening while preserving cultural customs through family gatherings and food.
