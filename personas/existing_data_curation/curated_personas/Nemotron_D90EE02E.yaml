  hobbies: '[''Pickup soccer'', ''Skateboarding'', ''Video gaming (sports and action games)'', ''Cooking Mexican meals with family'', ''Gardening (vegetables and herbs)'', ''Listening to regional Mexican
    music'', ''Participating in local cultural festivals'']'
  career_goals: Wilson aims to complete a GED program to earn his high‑school equivalency and then enter a trade apprenticeship, preferably in automotive mechanics or residential carpentry. He envisions
    gaining journeyman certification within five years, securing stable, routine‑oriented work that lets him support his family financially. In the longer term, he hopes to open a modest, family‑run auto‑repair
    or handyman shop that serves the Damascus community while preserving the practical, predictable work environment he values.
