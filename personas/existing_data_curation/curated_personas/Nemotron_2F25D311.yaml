personas:
  professional: Luis Hernandez is a bilingual customer service specialist who leverages their meticulous CRM expertise and natural empathy to de‑escalate calls, coach new agents, and drive consistent SLA
    performance, all while eyeing a supervisory role that blends organization with a people‑first mindset.
  sports: Luis Hernandez anchors the midfield for the Seattle Northwest Stars in a local amateur soccer league every Saturday, enjoys hiking the Cascades with the Seattle Hiking Club, and they keep fit
    through biweekly pickup games and occasional strength training at a community gym, while proudly cheering for the Seattle Sounders FC during the MLS season.
  arts: Luis Hernandez immerses themselves in cumbia and mariachi rhythms—frequently streaming Los Lobos and Carlos Santana—while attending Seattle’s Cinco de Mayo and Día de los Muertos celebrations, participating
    in community dance workshops, and they regularly catch live performances at the Teatro Latino Seattle.
  travel: Luis Hernandez is a weekend‑oriented traveler who plans detailed itineraries for short trips to the Pacific Northwest—such as hiking in Mount Rainier National Park or exploring Vancouver—but they
    also dream of a culturally immersive journey to Oaxaca, balancing adventure with the financial constraints of saving for their future taquería.
  culinary: Luis Hernandez cooks traditional tacos al pastor, hand‑made tamales, and rich mole poblano almost every Sunday, sourcing fresh corn tortillas, dried chilies, and cacao, sharing the meals with
    friends and neighbors, yet they sometimes over‑spice the mole when experimenting with new chili blends.
  core: Luis Hernandez blends routine‑driven organization with a sociable, community‑focused spirit, channeling stress‑prone perfectionism into coaching colleagues, cooking for friends, and dreaming of
    a family‑run taquería.
background:
  cultural: Luis is a first-generation Mexican American whose parents immigrated from Jalisco. He grew up bilingual, speaking Spanish at home while attending English-language schools in the Seattle area.
    Mexican family traditions—Sunday family meals, celebration of holidays like Día de los Muertos, Christmas posadas, and the importance of respeto (respect) and comunidad (community)—shape his values.
    He maintains close ties with extended family in both Mexico and the U.S., often traveling to visit relatives. His cultural heritage influences his warm, cooperative demeanor, his preference for harmony,
    and his pride in sharing Mexican food and music with his friends. Participation in the local Mexican cultural association helps him preserve traditions while adapting to life in Marysville.
