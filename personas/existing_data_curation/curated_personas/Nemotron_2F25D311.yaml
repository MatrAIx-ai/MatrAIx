  hobbies: '[''Soccer (amateur league)'', ''Cooking Mexican cuisine'', ''Attending cultural festivals (Cinco de Mayo, Día de los Muertos)'', ''Traditional Mexican dance workshops'', ''Hiking in the Cascades'',
    ''Listening to cumbia and mariachi music'', ''Cooperative video gaming'', ''Volunteering to teach Spanish'', ''Hosting weekly dinner gatherings'']'
  career_goals: Luis aspires to advance within the customer service field by moving into a team lead or supervisory role within the next two to three years, where he can apply his organizational strengths
    and supportive nature to mentor junior agents. He plans to complete an associate's degree in Business Administration and earn a Certified Customer Service Professional (CCSP) credential to solidify
    his expertise. In the longer term, he hopes to transition into a quality-assurance or training specialist position, eventually becoming a manager responsible for designing efficient service processes
    that balance consistency with flexibility. He also harbors a personal ambition to open a small Mexican-style taquería with his family once he achieves financial stability.
