  career_goals: At this stage Arthur’s ambitions are playful and exploratory. He often points to fire trucks and farm animals, saying he wants to be a 'big helper.' His curiosity about how things work and
    his enjoyment of helping his parents on the family ranch suggest a budding interest in caring for animals or contributing to the community. While concrete career plans are not yet formed, his love for
    exploration and service may guide future aspirations toward wildlife care, farming, or a community‑service role.
