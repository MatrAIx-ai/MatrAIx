  hobbies: '[''Visiting art galleries'', ''Digital photography'', ''Reading science and African diaspora literature'', ''Chess'', ''Gardening'', ''Cooking heritage recipes'', ''Listening to jazz'', ''Arranging
    music for community ensemble'', ''Traveling to cultural festivals and museums'']'
  career_goals: Although retired from formal employment, William aims to leverage his expertise to enrich his community. He aspires to serve on the advisory board of the local history museum, mentor emerging
    engineers through a regional STEM outreach program, and author a series of reflective essays that blend scientific insight with artistic observation. He also hopes to complete a series of online courses
    in contemporary African art history, travel to cultural sites in West Africa to deepen his personal heritage, and support his grandchildren’s education through scholarships and tutoring. Ultimately,
    his ambition is to remain intellectually active while contributing meaningfully to both the scientific and artistic spheres of his hometown.
