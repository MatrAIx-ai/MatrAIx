  career_goals: Jose aims to secure a stable role that lets him help others, such as a community outreach coordinator or a certified community health worker. He plans to enroll in a GED program and pursue
    a certification in health or social services, with the long‑term ambition of leading bilingual support programs for the Mexican‑American community in Las Vegas. Flexibility and the ability to maintain
    personal connections are key factors in his career aspirations.
