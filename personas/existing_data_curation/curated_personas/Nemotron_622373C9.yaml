personas:
  professional: An aspiring agricultural technology practitioner, Larice Morris blends a fierce competitive drive honed in strategic battle‑royale video games with practical gardening skills, producing
    DIY horticulture tutorials for TikTok while organizing their path toward a vocational horticulture program after earning their GED.
  sports: An active yet low‑key athlete, Larice Morris maintains daily bodyweight workouts and weekend rides with the local River Road Riders cycling club, occasionally joins the Immokalee youth softball
    league, follows the Florida Gators football and Miami Heat basketball teams, and incorporates light jogging to stay fit for their gardening chores.
  arts: A creatively inclined teen, Larice Morris devotes their free time to crocheting blankets, sewing simple garments, reading mystery novels by Gillian Flynn, listening to indie folk singer Brandi Carlile,
    and watching David Attenborough nature documentaries, all of which shape their aesthetic sensibility and inspire the narratives they share in their online gardening videos.
  travel: An exploratory yet budget‑mindful traveler, Larice Morris has visited the Everglades on a school field trip, enjoyed a weekend getaway to Clearwater Beach, dreams of backpacking through Costa
    Rica’s cloud forests and touring Oregon’s organic farms, and meticulously plans their future trips around seasonal harvest festivals and affordable transportation options.
  culinary: A culinary experimenter, Larice Morris delights in preparing Southern comfort dishes like fried chicken and peach cobbler alongside multicultural fare such as tamales, frequently incorporates
    fresh garden produce like heirloom tomatoes and collard greens into herb‑infused grilled chicken and corn chowder, and relishes blending sweet jalapeño salsa with peppery greens in their kitchen to
    balance flavor and nutrition.
  core: A curious, self‑reliant 16‑year‑old who balances competitive gaming with sustainable gardening, Larice Morris mixes a skeptical, competitive mindset with a passion for community‑rooted DIY creativity,
    often juggling anxiety‑driven worry with meticulous organization in their daily routine.
background:
  cultural: Larice grew up in Immokalee, a small agricultural community in Hendry County, Florida, where a mix of Southern and Latino influences shapes everyday life. Her family, long‑time white Floridians,
    uphold values of self‑reliance, hard work, and community involvement, often participating in local church gatherings (Methodist) and county fairs that celebrate farming traditions. Although her cultural
    heritage is primarily Southern, Larice has been exposed to the region's diverse migrant farmworker community, giving her a basic familiarity with Spanish phrases and an appreciation for multicultural
    foods such as tamales and fresh produce markets. The local cuisine—southern comfort foods like fried chicken, collard greens, and peach cobbler—features prominently in family meals. This blend of rural
    Southern roots, exposure to a multicultural agricultural environment, and a strong sense of independence informs her worldview and personal identity.
attributes:
  skills: '["Basic computer literacy", "Internet research", "Social media content creation (short videos)", "Gardening and small‑scale farming", "Animal care (pet and livestock)", "Basic mechanical repair
    (bicycles, small engines)", "Cooking and meal planning", "Handcrafts (sewing, crocheting)", "Critical thinking and problem solving", "Organizational skills", "Basic first aid"]'
  hobbies: '["Competitive video gaming", "Reading mystery/thriller novels", "Journaling", "Gardening", "Animal care (pet dogs/cats)", "Handcrafting (sewing, crocheting)", "Cooking and recipe experimenting",
    "Watching documentaries (science, nature)", "Puzzle solving (Sudoku, crosswords)", "Exploring DIY tutorials online"]'
  career_goals: Larice plans to obtain her high school equivalency (GED) within the next two years and then enroll in a vocational program focused on horticulture or agricultural technology. Her long‑term
    ambition is to run a sustainable garden or small farm that supplies fresh produce to her community, allowing her to blend hands‑on work with environmental stewardship. Simultaneously, she is cultivating
    a personal brand on TikTok and YouTube, where she shares DIY gardening tips and streams competitive gaming sessions, hoping to generate modest income and develop a reputation as a knowledgeable creator.
    She values independence, seeks a career that offers a balance of autonomy and practical engagement, and aims for financial self‑sufficiency while managing stress through structured, purpose‑driven work.
