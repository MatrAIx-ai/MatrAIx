  career_goals: Dwayne aims to transition from hands‑on grounds‑keeping to a design‑focused leadership role. He plans to earn a professional horticulture certification and to complete a certificate program
    in landscape architecture to formalize his creative vision. Within the next five years, he hopes to launch his own boutique landscaping and garden‑design business that blends desert ecology with public
    art installations, emphasizing community involvement and sustainable practices. He also aspires to mentor younger workers in his region, offering apprenticeships that combine technical trade skills
    with artistic and ecological education. Ultimately, Dwayne envisions his firm becoming a trusted partner for local municipalities and nonprofit groups seeking to revitalize public spaces and create
    collaborative community gardens.
