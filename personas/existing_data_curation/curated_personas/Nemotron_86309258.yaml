  career_goals: In retirement, Thanh aims to continue expanding her knowledge, particularly in renewable energy and marine ecology, and to share her expertise by mentoring young students in Ketchikan. She
    aspires to publish a memoir that weaves together her scientific career and Vietnamese heritage, organize an intergenerational art‑science exhibition celebrating both Vietnamese and Alaskan traditions,
    and contribute to local environmental conservation by promoting sustainable practices and citizen science initiatives.
