    ''Resource Allocation & Capacity Planning'', ''Quality Assurance & Control'', ''Mentoring & Team Development'']'
  hobbies: '[''Cooking traditional Puerto Rican meals'', ''Backyard gardening (tomatoes, herbs, tropical plants)'', ''Reading historical biographies'', ''Listening to salsa and bolero music'', ''Walking
    along Connecticut River Trail'', ''Playing chess'', ''Solving jigsaw puzzles'', ''Tutoring youth in math and Spanish (volunteer)'']'
  career_goals: Professionally, Gustavo aims to obtain the Project Management Professional (PMP) certification and eventually transition into a senior leadership role such as Director of a Project Management
    Office, where he can shape organizational processes and mentor junior colleagues. He is motivated to lead high‑impact initiatives that serve Hartford’s Puerto Rican diaspora, delivering community‑focused
    programs in education, health, and cultural preservation. Gustavo also seeks to embed structured mental‑health practices into his teams—regular check‑ins, resilience training, and supportive feedback—to
    balance career advancement with personal well‑being and reduce his own anxiety.
