persona_description: A climate change activist and street artist, Bill McKibben, who is known for his work with 350.org and his efforts to raise awareness about climate change on the Navajo reservation.
  Jetsonorama, his alias, is a 25-year veteran of the Indian Health Service and has created large-scale installations depicting a Navajo child under a lump of coal to raise awareness about climate change.
  He is a doctor and has a special knowledge of the Navajo people's relationship with coal, pollution, and the environment.
