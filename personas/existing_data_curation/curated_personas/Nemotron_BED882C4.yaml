    assessment'', ''First aid and emergency response'', ''Illustrative client education materials'', ''Basic sketching of animal anatomy'']'
  hobbies: '[''Watercolor painting'', ''Detailed animal anatomy sketching'', ''Hiking and nature walks'', ''Birdwatching'', ''Volunteer work at an animal shelter'', ''Yoga'', ''Baking artisanal bread'',
    ''Attending gallery openings'', ''Reading contemporary fiction'', ''Participating in intimate book clubs'']'
  career_goals: She aims to complete a Bachelor of Science in Veterinary Technology within the next two years, followed by certification as a Veterinary Technician Specialist in Emergency and Critical Care.
    Claudia also envisions leading a small animal practice in Spokane where she can integrate her artistic skills into client communication, develop community outreach programs, and mentor new technicians.
    Long-term, she hopes to establish a wellness center that combines conventional veterinary care with art-based therapy workshops for pets and owners, fostering holistic health and emotional resilience.
