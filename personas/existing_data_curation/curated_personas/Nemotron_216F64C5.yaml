personas:
  professional: Kevin Black, though only two, already treats the Montessori block set like a tiny laboratory, displaying an early knack for organizing pieces by shape and color while skeptically testing
    each tower's stability, hinting at a future path in engineering or research, and they often re‑arrange the blocks when adults look away.
  sports: Kevin Black loves the splash of the Lakefront Trail pond during family walks and has a budding fascination with the Chicago Cubs, often imitating a batting stance in the backyard while attending
    toddler soccer at the local park, but prefers solitary play on the swing set over group games, and they proudly wear a Cubs cap to the field.
  arts: Kevin Black enjoys listening to Laurie Berkner’s upbeat folk songs and watching Sesame Street, and spends quiet moments drawing bold squiggles on paper, a solitary artistic ritual that reinforces
    their independent imagination, and they often line up crayons by hue before creating new masterpieces.
  travel: Kevin Black has explored the nearby Lincoln Park Zoo and taken a weekend ferry ride to Mackinac Island, favoring short, structured trips with familiar routines over long vacations, and always
    asks for a map with bright colors to track where they’ve been, and they cling to a favorite stuffed bear during travel.
  culinary: Kevin Black prefers creamy mac & cheese and soft banana slices, can effortlessly stack a mini‑plate of carrot sticks when the shape appeals, yet is notoriously picky about textures, often turning
    away from anything with visible chunks, and they sometimes sneak a handful of goldfish crackers when no one is watching.
  core: Kevin Black is a tender‑aged explorer who balances a fierce curiosity and meticulous order with a craving for solitude, frequent mood swings, and a delightfully skeptical approach to every new toy
    or snack.
background:
  cultural: Kevin is raised in a middle‑class white family in Wilmette, a suburb of Chicago in Cook County, Illinois. His upbringing blends typical Midwestern values of independence, safety, and community
    involvement with the cultural resources of an affluent suburb—access to well‑stocked public libraries, early childhood education programs, and green spaces such as nearby parks and the Lakefront Trail.
    While his household reflects mainstream white American cultural norms, his parents encourage curiosity, self‑reliance, and respect for personal boundaries, shaping his solitary and skeptical nature.
