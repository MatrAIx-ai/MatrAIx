  hobbies: '["Weightlifting and cardio workouts", "Strategy video gaming", "Listening to Mexican and indie music", "Cooking Mexican dishes (tamales, mole)", "Volunteering for community entrepreneurship
    workshops", "Bullet journaling", "Hiking in the Sierra foothills", "Reading leadership and mindfulness books", "Collecting vintage vinyl records"]'
  career_goals: In the short term, Felix aims to secure seed funding for his startup, refine its operational processes, and establish a workplace culture that openly supports mental‑health practices. Over
    the next three to five years, he plans to scale the company to serve tens of thousands of customers across California, hire a diverse team of young professionals, and launch a mentorship program for
    aspiring Latinx entrepreneurs. Ultimately, Felix envisions transforming his venture into a socially‑focused enterprise that creates sustainable jobs for Mexican‑American youth, earns an MBA to deepen
    his strategic expertise, and creates a scholarship fund for students from his community.
