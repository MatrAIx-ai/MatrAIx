personas:
  professional: Estine Schiff is a senior financial analyst turned strategic planner whose expertise in budgeting, SAP, and Excel is paired with a curiosity for unconventional problem‑solving, allowing
    them to translate complex financial data into accessible narratives for cross‑functional teams while navigating their own penchant for flexible, sometimes disorganized, work habits.
  sports: Estine Schiff enthusiastically joins Zumba classes at the local community center and hikes the Wichita Mountains with friends, cheering on the Oklahoma City Thunder and the Oklahoma Sooners while
    also belonging to the OKC Trail Runners club, using sport as a social outlet and a buffer against work‑related stress.
  arts: Estine Schiff frequents the Oklahoma City Museum of Art’s contemporary exhibits featuring artists like Yayoi Kusama and Banksy, attends downtown theater productions of new playwrights, and participates
    in interactive workshops that blend visual art with technology, often discussing these experiences in their book club gatherings.
  travel: Estine Schiff prefers spontaneous weekend road trips to nearby destinations such as Santa Fe and the Great Smoky Mountains, while also dreaming of a spring visit to Kyoto’s Zen gardens and Barcelona’s
    modernist architecture, balancing limited vacation days with a love for cultural immersion and group travel with friends.
  culinary: Estine Schiff experiments with global flavors, whipping up miso‑glazed salmon, spicy lentil curry with gochujang, and a smoked beet‑quinoa salad for potluck gatherings, showcasing intermediate
    cooking skills that blend comfort food with avant‑garde ingredients like sumac and edible flowers.
  core: Estine Schiff is a curiosity‑driven financial strategist who fuses artful insight with data, thrives in group settings, and battles stress‑induced overthinking while occasionally letting spreadsheets
    gather dust.
background:
  cultural: Estine grew up in a small Midwestern town in Oklahoma, where community ties, modesty, and a strong work ethic are central values. Her white, American heritage is colored by the regional culture
    of generosity, church involvement, and a love for local traditions such as state fairs and country music. Living in Norman, close to the University of Oklahoma, she benefits from a vibrant academic
    and artistic scene that fuels her curiosity, while her experience as a widow has deepened her empathy and commitment to community service.
