  career_goals: She aims to progress to a senior executive role such as Chief Financial Officer within the next five years, while championing innovative, data‑driven financial strategies that incorporate
    sustainability and social impact. Estine also hopes to mentor emerging finance professionals, develop a financial‑literacy program for local non‑profits, and eventually transition into consultancy where
    she can apply her unconventional thinking to a broader range of organizations.
