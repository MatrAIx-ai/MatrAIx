persona_description: A wildlife specialist and extension specialist at Ohio State University who focuses on managing invasive species, particularly feral swine. She has extensive experience in the study
  and control of feral swine, and is well-versed in the impact they have on agriculture, the environment, and human health. She works with Wildlife Services and the Ohio Department of Natural Resources
  to reduce feral swine populations and prevent further damage. She is also an expert in invasive species management and has published research on the impacts of invasive species on biodiversity and the
  economy. Her expertise and knowledge are widely recognized in the field of wildlife management and conservation.
