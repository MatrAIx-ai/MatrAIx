  hobbies: '[''Knitting'', ''Quilting'', ''Reading historical fiction'', ''Listening to jazz, gospel, and Nasheed music'', ''Gardening in a community plot'', ''Walking in Central Park'', ''Crossword puzzles'',
    ''Senior‑center social gatherings'', ''Attending church and mosque services'']'
  career_goals: Even at 93, Charmaine’s ambitions focus on legacy and well‑being. She aims to stay physically and mentally healthy enough to continue sharing her stories and recipes with younger family
    members and community youth. She hopes to compile a small memoir of oral histories, preserving the cultural narratives of her Black Muslim upbringing for future generations. Charmaine also aspires to
    mentor a local senior‑center storytelling group, fostering intergenerational connections, and to support a neighborhood food‑bank by donating prepared meals and homemade blankets.
