  hobbies: '[''vegetable gardening'', ''cooking traditional Guatemalan dishes'', ''listening to folk and country music'', ''attending church services and choir'', ''watching baseball'', ''walking and birdwatching'',
    ''playing dominoes'', ''reading local history'', ''genealogy research'']'
  career_goals: Although retired, Alonso is eager to remain active and purposeful. He hopes to keep his health and independence by maintaining his garden and staying physically engaged. He aims to document
    his family’s migration story and recipes in a handwritten memoir that he can share with grandchildren. He wishes to mentor younger members of the church by teaching them gardening basics and cooking
    techniques. He also plans to learn to use a tablet to record video interviews with his relatives, preserving their stories for future generations. Finally, he aspires to help expand the local community
    garden, encouraging sustainable food practices in Smithfield.
