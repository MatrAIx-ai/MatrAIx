  career_goals: Though retired, Rushie aims to deepen his impact on Detroit's older adult community. He plans to develop a mentorship program at the local senior center, teaching practical DIY skills and
    digital literacy to peers. He also aspires to compile a memoir of his family's migration experiences, preserving Detroit’s Black heritage for future generations. Additionally, he wishes to learn more
    about sustainable gardening techniques to start a community garden plot, and to become an advocate for affordable senior housing policies.
