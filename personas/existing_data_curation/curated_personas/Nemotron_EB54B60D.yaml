  career_goals: Andrew aspires to complete high school with strong grades and then pursue a degree in emergency medical services or public health at a community college. He is motivated by a deep desire
    to help others in urgent situations and to improve health outcomes in his border community. In the short term, he plans to earn a Certified First Responder certificate and volunteer with local health
    outreach programs. Long‑term, he envisions a career as a paramedic or community health worker, where he can use his organizational skills, bilingual ability, and compassionate nature to serve diverse
    populations. He also hopes to mentor younger students, fostering teamwork and safety awareness.
