personas:
  professional: Andrew Santoyo, a diligent middle‑school student who leads the school’s soccer club and volunteers at the neighborhood youth center, balances a love for structured practice sessions with
    an easygoing, sometimes forgetful approach to scheduling, and they channel their compassionate nature into after‑school tutoring.
  sports: Andrew Santoyo dominates the community soccer field as a forward for the town’s U‑14 league, idolizes the offensive flair of the LA Galaxy youth academy, spends weekends at the local skatepark
    perfecting ollies, and they rally with teammates while cheering for the Los Angeles Lakers during basketball season.
  arts: Andrew Santoyo brings comic‑style heroes to life on sketch pads after school, draws creative fuel from the rhythmic pulse of norteño and banda songs, and they often practice the lively dance steps
    of corrido performers at family gatherings, blending visual and musical expression.
  travel: Andrew Santoyo dreams of swapping the desert heat for a spring trip to San Diego’s coastline, reminisces about a family road‑trip to a historic mission in San Juan, and now saves up for a future
    adventure to the vibrant streets of Oaxaca, hoping to capture the colorful markets on a travel vlog.
  culinary: Andrew Santoyo loves helping grandparents roll tacos al pastor with pineapple‑marinated pork and fresh cilantro salsa, but they frequently forget to clean up the kitchen afterward, leaving a
    lingering aroma that tempts the whole house.
  core: Andrew Santoyo is a high‑energy teen who blends soccer, skateboarding, and after‑school tutoring with late‑night gaming marathons, yet they habitually misplace homework and snack wrappers in the
    living room.
background:
  cultural: Andrew was raised in a Mexican‑American household in Laredo, Texas, a vibrant border city where American and Mexican cultures intersect daily. He grew up bilingual, speaking Spanish at home
    and English at school, and his family celebrates both U.S. holidays like Thanksgiving and Mexican traditions such as Día de los Muertos, quinceañeras, and the annual Charro Days festivities. The neighborhood’s
    strong emphasis on family, community, and Catholic values, combined with the lively music, food, and folklore of northern Mexico, shape his identity. This bicultural environment instills in him a deep
    respect for his heritage while encouraging active participation in the broader Texan community.
