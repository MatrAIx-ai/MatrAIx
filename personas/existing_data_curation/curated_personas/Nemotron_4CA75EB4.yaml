  hobbies: '[''Watercolor and mixed‑media painting experimentation'', ''Reading speculative‑fiction and fantasy literature'', ''Creative writing (poetry, journaling)'', ''Visiting galleries and street art
    installations'', ''Yoga and guided meditation for anxiety management'', ''Hiking coastal trails around the Bay Area'', ''Cooking experimental fusion meals'', ''Tending a balcony herb and succulent garden'',
    ''Listening to avant‑garde jazz and spoken‑word'', ''Volunteering for library story‑time programs'']'
  career_goals: Diedra aspires to transform her artistic passions into a sustainable freelance career that also serves her community. She dreams of launching a boutique studio in the Bay Area where she
    can sell her paintings, prints, and handmade crafts while offering low‑cost art‑therapy sessions and workshops focused on mental‑health resilience for Black residents. Concurrently, she plans to develop
    an online platform—blog and YouTube channel—where she shares creative process videos, recipes, and mindfulness practices, building a supportive audience around art, culture, and emotional wellbeing.
    Over the next five years, she hopes to complete a community‑college certificate in graphic design to sharpen her digital skill set and eventually secure part‑time teaching roles at local community centers.
