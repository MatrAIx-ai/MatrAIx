personas:
  professional: An eclectic freelance mixed-media artist and mindfulness facilitator, Diedra Biggins channels their watercolor, digital illustration, and expressive photography skills into community art-therapy
    workshops while thriving on flexible, often chaotic, scheduling.
  sports: An avid coastal hiker and yoga club member, Diedra Biggins spends weekends traversing the Pacific litoral trail, follows the San Francisco Giants in baseball season, and cheers on the Golden State
    Warriors during basketball playoffs, where the high-energy atmosphere fuels their creative recharge.
  arts: A boundary-pushing creator, Diedra Biggins curates avant-garde jazz playlists featuring Albert Ayler and Sun Ra while attending experimental music venues, paints murals inspired by the surrealist
    works of Remedios Varo, writes speculative poetry echoing the style of Octavia Butler, and hosts pop-up galleries showcasing emerging local talent.
  travel: An adventurous yet budget-conscious traveler, Diedra Biggins prefers spontaneous weekend getaways to nearby coastal towns like Mendocino and occasionally dreams of immersive cultural stays in
    Kyoto's temples or Porto's wine cellars, balancing their love for discovery with limited studio funding.
  culinary: An experimental home chef, Diedra Biggins blends Southern soul food staples such as fried catfish and collard greens with global twists like Korean gochujang glaze or Ethiopian berbere spice,
    frequently cooking dishes like shrimp étouffée with harissa and foraging fresh basil and rosemary from their balcony herb garden.
  core: Creative, anxiety-prone Diedra Biggins lives on a kaleidoscope of colors, spontaneous art projects, and mindfulness rituals, often juggling chaotic schedules, impulsive purchases, and a relentless
    quest for novel expression.
background:
  cultural: Diedra is an African American woman whose family traces its roots to the American South, where storytelling, music, and food were central to daily life. Growing up in a close‑knit Black community
    before moving to the Bay Area, she absorbed the rich oral traditions, gospel harmonies, and soul‑food cuisine of her heritage. In San Francisco, she has embraced the vibrant Black artistic scene, regularly
    attending Juneteenth celebrations, Black‑culture film screenings, and community murals. Her creative work often reflects the interplay of African‑American history with contemporary abstract art, and
    she draws inspiration from Black visual artists like Kara Walker, Kehinde Wiley, and Basquiat. Diedra also feels a strong responsibility to give back, using her art and mental‑health advocacy to empower
    other Black individuals navigating emotional challenges.
