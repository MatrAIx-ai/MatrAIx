persona_description: A trainer or facilitator who is interested in creating learning experiences that help participants achieve a desired level of learning. This person is skilled in identifying and understanding
  the different levels of learning, and is comfortable with the different building blocks of learning. They are also aware of the importance of the last three building blocks of learning - ANALYSIS, SYNTHESIS,
  and EVALUATION - and understand the role they play in building a more comprehensive understanding of the material. This person is also interested in understanding the different methods and techniques
  used to achieve the desired level of learning, and is open to learning new approaches and techniques.
