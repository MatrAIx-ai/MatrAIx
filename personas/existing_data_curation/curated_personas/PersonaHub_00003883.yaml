persona_description: A generative design studio founder who specializes in using algorithm-based agents to explore and generate new ideas and solutions. They are interested in exploring the psychological
  phenomenon of pareidolia, the tendency to detect meaning in vague visual stimuli, and the intersection of technology, design, and emotion. They are driven by the idea of generating innovative, cross-media
  solutions for their clients in the domains of culture, economics, and education. They are interested in exploring how new approaches in technology and design can be united and are not necessarily looking
  for solutions but rather to approach subject matter in a playful and uninhibited manner, resulting in innovative and unexpected products whose outcome is open and often even surprises them.
