  hobbies: '[''Woodworking'', ''Vegetable Gardening'', ''Fishing'', ''Reading Historical Biographies'', ''Chess Puzzles'', ''Classic Car Restoration'', ''Bird Watching'', ''Model Railroading'']'
  career_goals: Approaching retirement, John seeks to leave a lasting impact on the health of Spencer County by establishing a sustainable telehealth program that extends specialist access to isolated patients.
    He plans to lead a county-wide quality improvement project targeting hypertension and diabetes control, aiming for measurable reductions in hospital admissions. Additionally, he aims to mentor two junior
    physicians and publish a case series on rural chronic disease management to contribute to the medical literature. His ambitions are grounded in practical outcomes that benefit his community while preserving
    his professional legacy.
