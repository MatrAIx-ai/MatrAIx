personas:
  professional: Maria Ryals, a two‑year‑old with an early fascination for cause‑and‑effect toys, shows a budding aptitude for problem‑solving and a practical streak as they build block towers and sort shapes
    by size, hinting at a future in engineering.
  sports: Maria Ryals, a shy yet assertive toddler, enjoys the small‑group 'tots tumble' gymnastics class at Little Sun Sports Club and cheers quietly for the Seattle Sounders alongside their family during
    weekend outings, finding comfort in gentle movement rather than demanding team sports.
  arts: Maria Ryals, despite a reserved demeanor, delights in humming the whimsical tunes of Disney’s 'Let It Go' performed by Idina Menzel and loves finger‑painting in the style of Eric Carle, often presenting
    their colorful scribbles to an appreciative family circle.
  travel: Maria Ryals, an inquisitive two‑year‑old, prefers short, sensory‑rich trips like a weekend visit to the Monterey Bay Aquarium and a family stay at a cozy cabin in the Smoky Mountains, while they
    day‑dream about future adventures to the bamboo forests of Kyoto.
  culinary: Maria Ryals, with a budding palate, favors soft sweet potatoes, banana slices, and gently scrambled eggs with cheddar, often helping stir oatmeal flavored with cinnamon and vanilla, and they
    occasionally squish avocado on toast, showcasing a growing love for simple, nutritious flavors.
  core: Maria Ryals, a two‑year‑old who balances curious exploration with practical play, thrives on flexible routines, scatters toys in charming disarray, and meets the world with a quiet yet assertively
    expressive spark.
background:
  cultural: Maria comes from a white, Midwestern American background. Raised in Chicago’s diverse neighborhoods, she experiences a blend of urban city life and family traditions typical of a middle‑class
    household, such as celebrating holidays like Christmas and Thanksgiving, enjoying classic American foods like pizza and apple pie, and participating in community events at a local early‑childhood center.
    Her family’s cultural roots trace back to European ancestry, and she is exposed to the multicultural fabric of the city while retaining modest, family‑centered values.
