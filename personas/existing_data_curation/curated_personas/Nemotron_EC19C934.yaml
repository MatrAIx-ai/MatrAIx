personas:
  professional: Billy Marotta, a 37‑year‑old licensed civil engineer specializing in structural design, site development, and sustainable infrastructure, leverages their practical, detail‑oriented mindset
    and sociable, team‑focused demeanor to coordinate multidisciplinary project teams, ensure compliance with Colorado building codes, and deliver budget‑conscious, community‑friendly outcomes while eyeing
    a future as Principal Engineer.
  sports: Billy Marotta spends weekends scaling the Sangre de Cristo peaks, carving backcountry runs in Colorado’s ski resorts, hitting the mountain bike trails with the Denver Mountain Bike Association,
    and playing competitive soccer and softball in a local league, all while cheering for the Colorado Avalanche, Colorado Rockies, and Colorado Rapids as their hometown teams.
  arts: Billy Marotta unwinds after work by attending live shows at Red Rocks Amphitheatre featuring artists like Bon Iver and John Denver, curating an eclectic vinyl collection that includes The Strokes
    and Taylor Swift, and occasionally strumming an acoustic guitar at Habitat for Humanity gatherings, highlighting how music and performance weave into their social fabric.
  travel: Billy Marotta plans meticulously organized weekend getaways to high‑altitude spots such as Banff and Moab, relishes spontaneous backcountry hikes when time permits, and dreams of future expeditions
    to Patagonia’s Torres del Paine and Italy’s Tuscan countryside, though their demanding project schedule frequently limits extended vacations.
  culinary: Billy Marotta enjoys showcasing moderately advanced culinary chops by preparing classic Italian dishes such as creamy Risotto alla Milanese, perfectly al dente Pasta Carbonara, and wood‑fired
    Margherita pizza, always reaching for San Marzano tomatoes, fresh basil, Pecorino Romano, and a splash of balsamic glaze to impress friends at dinner gatherings.
  core: Billy Marotta balances a meticulously structured engineering career with a love for rugged outdoor adventures, yet their chronic worrier streak often drives late‑night coffee binges and a tendency
    to over‑plan even spontaneous hikes.
background:
  cultural: Billy comes from a white, Italian‑American heritage; his family name Marotta reflects its Italian roots, and he grew up celebrating both traditional American holidays and cultural customs such
    as making homemade pasta during family gatherings. Raised in the Mountain West, he identifies strongly with the outdoor, community‑oriented lifestyle of Colorado, valuing hard work, reliability, and
    a collaborative spirit.
