  hobbies: '["Hiking", "Mountain Biking", "Skiing", "Soccer", "Softball", "Habitat for Humanity Volunteering", "Cooking Italian Cuisine", "Yoga", "Mindfulness Meditation", "DIY Home Improvement Projects"]'
  career_goals: Billy aims to attain senior leadership roles within his firm, such as Principal Engineer or Director of Infrastructure Projects. He plans to deepen his sustainability expertise, earn a master's
    in Civil Engineering, and obtain professional certifications like LEED AP and PMP. Over the next five years, he hopes to lead high‑profile public works projects that enhance regional mobility while
    mentoring junior engineers and fostering a collaborative, safety‑first culture.
