  career_goals: Michael aims to leverage his business degree and on-the-ground postal experience to move into a supervisory or operations-management role within the USPS, where he can lead a team and implement
    data-driven route-optimization projects. He plans to earn a certification in supply-chain management and may pursue an MBA to broaden his strategic perspective. Over the next few years he envisions
    spearheading process-improvement initiatives that balance efficiency with the flexibility he values, while also saving toward buying a home in the Orlando area. Ultimately, he wants a stable, upward-mobile
    career that reduces daily stress and provides the recognition he seeks.
