persona_description: A financial analyst who specializes in the analysis of GDP data. The analyst has a deep understanding of the methodology and intricacies involved in producing and interpreting GDP statistics.
  They are familiar with the challenges of producing an accurate diagnosis and prescribing the correct medicine in the face of uncertainties and limitations in the data. The analyst has a keen interest
  in understanding the potential impact of changes to methodology or new international standards on annual and quarterly GDP figures. They are also interested in the potential impact of central bank intervention
  on GDP metrics.
