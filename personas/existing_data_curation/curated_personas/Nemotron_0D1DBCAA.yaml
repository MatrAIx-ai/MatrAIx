personas:
  professional: A pragmatic IT repair specialist, Edisson Olmedo leverages a solid foundation in hardware troubleshooting, network cabling, and DIY maintenance while channeling a competitive drive and a
    preference for clear, structured tasks to exceed expectations in local tech support roles, even when they improvise solutions on the fly.
  sports: A dedicated member of the Naranjito Hawks baseball club, Edisson Olmedo competes in the local league while cheering for the San Juan Mets, balances his competitive spirit on the field with regular
    hill hikes around Naranjito for fitness, and prefers solitary workouts over crowded gyms.
  arts: A passionate aficionado of salsa, plena, and bomba, Edisson Olmedo curates a collection that includes tracks by Eddie Palmieri, Willie Colón, and Rafael Cortijo, while also capturing the island’s
    rural light and texture in personal landscape photographs inspired by the works of Ansel Adams.
  travel: A budget‑conscious explorer, Edisson Olmedo often drives to nearby coastal towns like Rincón and Vieques for weekend getaways, yet dreams of strolling through Cartagena’s historic plazas, balancing
    spontaneous road trips with careful budget planning and occasional family obligations.
  culinary: A devoted home chef, Edisson Olmedo skillfully prepares mofongo with plantains and chicharrón, arroz con gandules seasoned with sofrito and ají dulce, and empanadillas filled with seasoned pork,
    often adding his own twist of roasted red peppers, and enjoys sharing these meals with close friends.
  core: Edisson Olmedo is a practical, competition‑driven handyman who cherishes solitary hobbies, balances a love for structure with a laid‑back approach to finances, and battles mild hypertension while
    occasionally letting chores pile up.
background:
  cultural: 'Edisson was born and raised in Naranjito, a municipality known for its blend of rural charm and close‑knit community life. Growing up in a Puerto Rican household, he was immersed in Spanish
    language, Catholic traditions, and island festivities such as the Festival del Jíbaro, where music, food, and family gatherings play central roles. While he maintains strong ties to his local community
    and respects the collective values of Puerto Rican culture, his experience attending college in the metropolitan area of San Juan exposed him to a broader, more individualistic perspective. This dual
    influence shapes his identity: he values familial connections and cultural heritage, yet he also seeks personal autonomy and practical self‑reliance. His bilingual ability and familiarity with both
    island customs and mainland U.S. practices equip him to navigate diverse social settings with a nuanced, respectful outlook.'
attributes:
  skills: '[''basic computer hardware troubleshooting'', ''network cable installation and configuration'', ''mobile phone repair'', ''automotive maintenance and minor repairs'', ''basic carpentry and handyman
    tasks'', ''Spanish–English informal translation'', ''digital photo editing (Photoshop basics)'']'
  hobbies: '[''playing baseball in a local neighborhood league'', ''listening to and collecting salsa, plena, and bomba music'', ''cooking traditional Puerto Rican dishes'', ''hiking the hills and trails
    around Naranjito'', ''reading technology blogs and watching tutorial videos'', ''landscape photography of Puerto Rican countryside'']'
  career_goals: Edisson aims to transition back into the workforce by securing a certification—such as the CompTIA A+ or an HVAC technician credential—that formalizes his practical abilities and offers
    a clear career ladder. He envisions a stable, structured role in a local tech support or maintenance firm where expectations are transparent and tasks are defined, but he also hopes to eventually launch
    a small, home‑based repair service that lets him combine his competitive drive with the flexibility he values. In the longer term, he aspires to become known in his community for reliable, efficient
    solutions, positioning himself as a trusted go‑to technician while maintaining the freedom to set his own schedule.
