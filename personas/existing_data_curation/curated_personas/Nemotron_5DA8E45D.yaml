personas:
  professional: Marisol Guevara, a 26‑year‑old credit counselor and loan officer, blends meticulous documentation, bilingual Spanish‑English communication, and a curiosity for fair lending practices to
    guide underserved borrowers through budgeting, debt management, and loan applications, while their organized, methodical approach ensures regulatory compliance and client trust.
  sports: Marisol Guevara, who frequents Griffith Park trails for weekend hikes and attends sunrise yoga sessions at a local studio, cheers for the Los Angeles Lakers, follows the Dodgers’ baseball season,
    and plays casual beach volleyball with a community league that meets at Marina del Rey.
  arts: Marisol Guevara, a devoted reader of contemporary Latin American literature, devotes evenings to the works of Jorge Luis Borges and Valeria Luiselli, captures urban street life through a Canon EOS
    Rebel, and finds inspiration in the films of Alfonso Cuarón and the music of Lila Downs.
  travel: Marisol Guevara, who budgets travel carefully, has explored Mexico City’s historic center and the coffee farms of Chiapas, dreams of trekking the Andes in Peru, and plans a weekend road‑trip to
    Joshua Tree to combine photography and nature while staying within a modest savings plan.
  culinary: Marisol Guevara, an enthusiastic home cook, perfects pupusas stuffed with mozzarella and refried beans, rolls tamales with pork and masa seasoned with annatto, and experiments with quinoa‑based
    salads, often pairing dishes with freshly squeezed citrus drinks and a hint of jalapeño for extra kick.
  core: Marisol Guevara balances a love for community finance, yoga, and photography with a habit of over‑scheduling, a tendency to binge‑read late at night, and a steadfast belief that organized planning
    can empower immigrant families to achieve financial stability.
background:
  cultural: Marisol was raised in a close‑knit Salvadoran family that emigrated to California before she was born. She grew up speaking both Spanish and English, celebrating traditions such as Día de la
    Independencia de El Salvador, with family gatherings centered around pupusas, music, and storytelling. Her cultural heritage instills a strong sense of community, respect for family ties, and an appreciation
    for collective resilience. These values influence her compassionate approach to counseling, her dedication to serving the Salvadoran diaspora in Ingleville, and her commitment to preserving and sharing
    her cultural identity through food, language, and community involvement.
attributes:
  skills: '[''Credit counseling'', ''Loan underwriting'', ''Financial analysis'', ''Risk assessment'', ''Regulatory compliance'', ''Bilingual communication (Spanish/English)'', ''Budget planning'', ''Customer
    service'', ''Data entry and reporting'', ''Conflict mediation'', ''Community outreach'', ''Critical thinking'', ''Research and writing'']'
  hobbies: '[''Reading Latin American literature'', ''Cooking Salvadoran cuisine'', ''Yoga'', ''Hiking'', ''Volunteer financial literacy tutoring'', ''Photography'', ''Attending cultural festivals'']'
  career_goals: Marisol aims to become a senior loan officer within the next three years, leading a team of counselors and shaping loan policies that prioritize underserved borrowers. She plans to earn
    the Certified Credit Counselor credential and pursue a master's degree in finance or public policy to deepen her expertise. Long‑term, she aspires to launch a community‑focused financial education nonprofit
    that provides workshops, mentorship, and resources for immigrant families, particularly those from Salvadoran backgrounds, while also exploring opportunities in sustainable lending practices.
