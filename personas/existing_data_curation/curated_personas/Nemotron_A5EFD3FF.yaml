    ''Conflict Resolution'']'
  hobbies: '[''Woodworking'', ''Cross‑country skiing'', ''Ice‑fishing'', ''Adult basketball league'', ''Strategy board games (e.g., Settlers of Catan)'', ''Reading construction and science publications'',
    ''Home‑brewing craft beer'', ''DIY home improvement projects'', ''Photography of natural landscapes'']'
  career_goals: David aims to advance from site‑level management to senior project director within the next five years, eventually earning his General Contractor license and establishing his own construction
    firm focused on green building in the Upper Midwest. He plans to acquire professional certifications such as OSHA 30‑hour, PMP, and LEED AP to strengthen his credibility. In the longer term, he wants
    to mentor the next generation of tradespeople, champion innovative construction methods, and expand his business portfolio to include mixed‑use developments that balance economic viability with environmental
    stewardship.
