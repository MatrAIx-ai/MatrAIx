  hobbies: '[''Watercolor painting'', ''Hiking along the Ohio River'', ''Reading (fiction and art history)'', ''Journaling'', ''Knitting/Crocheting'', ''Photography'', ''Attending community theater'', ''Participating
    in local art festivals'']'
  career_goals: Sherrie aims to move into a supervisory or training role within her call‑center, where she can mentor newer agents and shape a supportive, harmonious team culture. She plans to earn a Certified
    Customer Service Professional (CCSP) credential and enroll in a part‑time associate‑degree program in Business Administration to broaden her managerial knowledge. Over the longer term, she hopes to
    combine her passion for the arts with her service background by becoming a community‑outreach coordinator for a local art center or museum, designing programs that make the arts accessible to small‑town
    audiences.
