  hobbies: '["Spin classes", "Dance classes", "Weekend hiking", "Community volunteering (food bank)", "Community gardening", "Board game nights", "Cooking workshops", "Local music festivals"]'
  career_goals: Varsha aims to move from her current role as a parts salesperson into a supervisory or sales‑team‑lead position within the next two to three years. She is motivated to develop mentoring
    programs for new hires, streamline inventory processes, and design customer‑focused sales strategies that boost satisfaction and repeat business. Long‑term, she envisions overseeing a regional parts
    division or launching her own boutique parts supply shop that emphasizes personalized service and community outreach. To support these ambitions, she plans to complete her undergraduate degree in business
    administration part‑time and obtain certifications in supply‑chain management.
