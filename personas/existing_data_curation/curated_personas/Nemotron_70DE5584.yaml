  hobbies: '["painting landscapes", "hiking", "birdwatching", "reading speculative fiction", "knitting", "genealogy research", "cooking traditional dishes", "volunteering at arts festivals", "organizing
    community reading circles"]'
  career_goals: Although she is not currently employed, Wendy aims to transform her artistic practice into a small sustainable venture, selling original artworks and handcrafted items through an online
    shop and at regional markets. She aspires to lead monthly art workshops at the local community center, sharing painting and craft techniques with adults and teenagers interested in creative expression.
    Long‑term, she dreams of compiling a book that blends her poems, short stories, and local folklore, preserving the cultural narratives of Floyd. She also plans to enroll in a few courses at the nearby
    community college to refine her digital marketing skills, enabling her to reach a broader audience while maintaining a flexible schedule that honors her family commitments.
