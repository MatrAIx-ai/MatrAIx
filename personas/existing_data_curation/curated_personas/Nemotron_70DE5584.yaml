personas:
  professional: Wendy Kim is a versatile visual artist who blends watercolor landscapes and mixed‑media storytelling, using her organized yet flexible nature to coordinate community workshops, manage a
    modest online shop, and bring a gentle assertiveness to her event‑planning roles.
  sports: Wendy Kim enjoys hiking with the Shenandoah Trailblazers club, follows the Washington Commanders football team, plays weekly pickup softball for the Floyd Meadowlarks, and integrates gentle yoga
    into her routine to keep her hands supple for woodworking.
  arts: Wendy Kim finds inspiration in the watercolor works of Andrew Wyeth, the folk songwriting of Gillian Welch, the magical realism of author Isabel Allende, and the performances of the local bluegrass
    group The Copper Creek Band, weaving these influences into her own paintings and short stories.
  travel: Wendy Kim prefers low‑key road trips that blend nature and culture, often revisiting Shenandoah National Park, weekending in Charlottesville’s historic Downtown Mall, and dreaming of a folk‑music
    pilgrimage to Dublin while budgeting each journey in a simple spreadsheet.
  culinary: Wendy Kim delights in seasonal farm‑to‑table cooking, frequently preparing heirloom apple crisp with cinnamon and toasted pecans, hand‑dyed rye bread scented with fresh rosemary, and grilled
    trout with a lemon‑dill glaze, while occasionally experimenting with homemade kimchi to add a surprising twist.
  core: Wendy Kim blends mountain‑rooted self‑reliance with a vivid imagination, turning solitary sketching sessions into community‑driven art projects, even if she occasionally forgets to water her garden
    while day‑dreaming about her next story.
background:
  cultural: Wendy’s cultural background is rooted in the Appalachian traditions of Floyd, Virginia. Raised in a multigenerational family of Scots‑Irish descent, she grew up with stories of mountain life,
    folk music, and a strong sense of community tied to the local church and seasonal festivals. The region’s emphasis on self‑reliance, craftsmanship, and storytelling shaped her appreciation for handmade
    art and oral history. While she embraces contemporary ideas and global literature, she remains connected to the rhythms of rural life—valuing seasonal cycles, close‑knit family ties, and the hospitality
    that characterizes small‑town gatherings.
