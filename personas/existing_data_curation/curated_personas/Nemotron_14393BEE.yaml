  career_goals: Dhruv aims to move from frontline janitorial work to a supervisory role within the next three years, targeting a Lead Janitor or Facilities Coordinator position where he can oversee a small
    team and influence cleaning protocols across multiple sites. He plans to earn the ISSA Certified Professional Cleaner credential and eventually complete an associate‑to‑bachelor pathway in Facility
    Management. With his competitive drive, he hopes to launch his own environmentally focused cleaning business that serves both commercial properties in Denton County and residential clients, leveraging
    his knowledge of green cleaning technologies and his network of local contacts. Long‑term, he envisions a role where he can mentor newcomers and contribute to safer, more sustainable building operations.
