  hobbies: '[''Watercolor painting'', ''Creative writing (short stories, speculative fiction)'', ''Acoustic guitar'', ''Nature photography'', ''Fishing and kayaking'', ''Model building (rockets, drones)'',
    ''Board games (Catan, Dungeons & Dragons)'', ''Reading science fiction and philosophy'', ''Programming and interactive art'', ''Environmental volunteer work'', ''Yoga and meditation'']'
  career_goals: Denny aspires to translate his curiosity and artistic vision into a new, flexible career that blends technology and creativity. He plans to develop a freelance consulting practice that offers
    innovative, story‑driven digital solutions for small businesses in his region, while simultaneously working on an indie video‑game project that melds speculative fiction with interactive design. He
    hopes to publish a collection of short sci‑fi stories and to launch a community workshop series at Houghton Lake that teaches youth basics of coding, electronics, and visual arts. To support these ambitions,
    he intends to earn a certification in UI/UX design, strengthen his portfolio, and cultivate a healthier work‑life balance that mitigates his anxiety through structured creative routines.
