personas:
  professional: Seth Henderson is a seasoned visual designer in Milwaukee who leverages precise typography, systematic brand guidelines, and a meticulous Adobe workflow to deliver timeless corporate identities,
    and they constantly battle a tension between their love of routine and occasional spur‑of‑the‑moment brainstorming that can jeopardize deadlines.
  sports: Seth Henderson supports the Milwaukee Bucks and the Milwaukee Brewers, participates in a weekly lunchtime walking club that circles the lakefront to keep a steady routine, and occasionally joins
    a small pick‑up basketball game at a neighborhood gym, but they avoid marathon training or overly competitive leagues, preferring low‑key, predictable activity.
  arts: Seth Henderson spends evenings listening to the melancholy strums of Nick Drake, the poetic folk of Joni Mitchell, and the reflective indie folk of Sufjan Stevens, while curating a personal library
    of Bauhaus and mid‑century design magazines and shooting film photographs of industrial warehouses in muted monochrome, and they find quiet inspiration in these solitary artistic rituals.
  travel: Seth Henderson prefers meticulously planned weekend getaways to nearby Door County's quiet lakeside cabins, where they can tend a small herb garden and sketch local typography, yet they occasionally
    indulge in spontaneous trips to the Deutsches Design Museum in Munich when a flight deal surfaces, balancing a love for routine with a sporadic thirst for design‑focused adventure despite a modest travel
    budget.
  culinary: Seth Henderson enjoys preparing simple, herb‑infused dishes like lemon‑rosemary roasted chicken and creamy mushroom risotto using fresh basil, thyme, and sage from their balcony garden, approaches
    cooking with the same precise measurement mindset as design layout, yet they often reward themselves with a Wisconsin cheese curd‑laden poutine from a favorite downtown eatery when anxiety spikes.
  core: Seth Henderson is a methodical yet intermittently impulsive visual designer who channels anxiety into exacting craftsmanship, prefers solitary routine but secretly they crave occasional spontaneity,
    and they balance a pragmatic approach to work, money, health, and leisure with a quietly competitive streak.
background:
  cultural: Seth was born and raised in the Milwaukee metropolitan area to a family of German‑Polish descent that embodied the traditional Midwestern work ethic. Growing up in a modest, middle‑class household,
    he attended public schools where practical skills and community responsibility were emphasized. His cultural upbringing blended the region’s historical ties to German brewing and manufacturing with
    a strong sense of modesty and self‑reliance. While his family practiced Catholic traditions, his personal values lean toward pragmatic, secular perspectives. The city’s mix of industrial heritage and
    vibrant arts scene informed his appreciation for functional design and the modest aesthetic characteristic of the Upper Midwest.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Typography'', ''Layout Design'', ''Brand Identity Development'', ''UI/UX Wireframing'', ''HTML/CSS basics'', ''Print Production'',
    ''Color Theory'', ''Visual Consistency Auditing'']'
  hobbies: '[''Reading classic literature'', ''Design history study'', ''Woodworking'', ''Urban gardening'', ''Film photography'', ''Collecting vintage design magazines'', ''Attending small acoustic concerts'',
    ''Journaling'']'
  career_goals: Seth aims to transition from freelance and junior‑level design work to a senior art director role within a regional marketing firm in Milwaukee, where he can lead a small team in crafting
    cohesive brand identities for local businesses. He also aspires to establish his own boutique design studio that specializes in practical, timeless branding for small to mid‑sized enterprises, allowing
    him to maintain a predictable workflow and avoid chaotic project structures. Over the next five years, he wants to build a reputation for reliability and visual precision, while developing a supportive
    professional network that helps him manage his anxiety and maintain emotional balance.
