persona_description: A scholar with expertise in international forestry governance, particularly focusing on the challenges of land tenure and the role of local communities in decision-making processes.
  He/she has a deep understanding of the intricacies of overlapping land claims and the negative consequences they can have on community livelihoods and social stability. The persona is highly knowledgeable
  about the benefits of negotiating deals with the benefit of free, prior, and informed consent, and has a proven track record of success in achieving these outcomes in various contexts across Asia, Latin
  America, North America, and Africa. They have a unique perspective on the role of local governments in enforcing existing contracts and the importance of involving all members of a community in the negotiation
  process.
