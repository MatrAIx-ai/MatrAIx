  career_goals: At 74, Joel’s career focus has shifted toward legacy building. He aims to transition into a part‑time consultancy role where he can advise small firms on integrating sustainable practices
    and cost‑effective engineering solutions. He is passionate about mentoring the next generation of engineers, planning to volunteer as a guest lecturer at the local community college and to establish
    a scholarship for students pursuing interdisciplinary studies in engineering and business. Additionally, Joel hopes to author a memoir that explores the intersection of art, engineering, and entrepreneurship,
    hoping to inspire professionals to adopt more creative and holistic problem‑solving approaches.
