  hobbies: '[''Reading poetry and philosophy'', ''Watercolor painting and abstract collage'', ''Gardening herbs and flowers'', ''Cooking traditional Caribbean and Latin recipes'', ''Storytelling at community
    gatherings'', ''Listening to Latin jazz and salsa'', ''Digitizing family photographs'', ''Attending local theatre performances'', ''Knitting scarves'', ''Playing Scrabble with friends'']'
  career_goals: Even in her 90s, Johana aims to leave a lasting legacy. She plans to complete a memoir that weaves together her family’s migration story, cultural traditions, and personal reflections on
    art and philosophy. She wishes to compile and self‑publish a collection of her poems and favorite recipes for her grandchildren. Additionally, she hopes to volunteer as an oral historian with the Leesburg
    Historical Society, offering workshops on bilingual storytelling. Learning simple graphic‑design tools to illustrate her stories is also a personal ambition, embraced with her open‑minded curiosity.
