  career_goals: Modesto aims to transform his practical abilities into a sustainable career. Within the next two years, he plans to earn a certification as an HVAC technician, allowing him to offer freelance
    climate‑control and maintenance services to residential clients in the Baytown area. Simultaneously, he intends to enroll part‑time at a community college to obtain an associate degree in information
    technology, positioning himself for remote technical support or entry‑level IT roles that accommodate his solitary work style. His long‑term ambition is to achieve financial independence, purchase a
    modest home where he can maintain a quiet workspace, and eventually expand his services into a small, locally‑owned repair business that blends his mechanical and electrical expertise.
