persona_description: A team leader in a workplace who is interested in improving the physical health and well-being of their employees by implementing evidence-based programs that counteract the negative
  effects of sitting at work. They are motivated by the potential to increase productivity, reduce sick leave, and foster a positive work environment. They are open-minded and willing to try new approaches,
  and they seek out the latest research in motor learning and cooperative learning to ensure that their programs are effective and evidence-based. They have a unique blend of experience and expertise, having
  first-hand knowledge of sitting-related back issues and having rehabilitated themselves through exercise, as well as coaching both casual gym goers and elite strength athletes. They are passionate about
  helping others achieve their health and fitness goals and are committed to making a positive impact on their employees' lives.
