  hobbies: '["Gardening","Yoga","Reading historical mysteries","Cycling the Atlanta BeltLine","Science outreach volunteering","Southern farm-to-table cooking","Podcast listening (leadership & resilience)","Kayaking","Photography","Spontaneous
    weekend road trips"]'
  career_goals: In the next five years, Mary aims to step into a senior program management role overseeing multiple concurrent initiatives within a regional government agency or a mid-size tech firm, where
    she can influence portfolio strategy. She also intends to obtain the PMI-PgMP (Program Management Professional) certification and mentor emerging women project managers in Georgia. Ultimately, she hopes
    to launch a boutique consultancy that helps small businesses adopt flexible project practices without sacrificing needed structure.
