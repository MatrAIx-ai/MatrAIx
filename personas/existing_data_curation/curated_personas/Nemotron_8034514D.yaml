personas:
  professional: Mary Mckenzie is a seasoned program coordinator with a STEM background who leverages hybrid Agile‑waterfall methods, multi‑million‑dollar budget stewardship, and data‑driven tools like Power BI
    to translate technical detail into actionable plans, while balancing her love for structure with a relaxed tolerance for occasional disorganization, positioning them to pursue a senior program‑management
    role and PMI‑PgMP certification.
  sports: Mary Mckenzie cycles the Atlanta BeltLine with the Atlanta Cycling Club, paddles a kayak on Lake Lanier during summer, runs occasional 5 k races with friends, and they channel seasonally their
    enthusiasm as a dedicated fan of the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks.
  arts: Mary Mckenzie immerses herself in historical mystery novels by authors like C.J. Sansom and Ellis Peters, attends live performances of classic plays at the Alliance Theatre, enjoys the acoustic
    storytelling of musician Gillian Welch, and they find inspiration in the photographic work of Ansel Adams while exploring nature.
  travel: Mary Mckenzie balances meticulous planning with spontaneous detours on road trips to Lake Oconee, the Blue Ridge Parkway, and Asheville, cherishes weekend getaways to Lake Lanier for kayaking
    and photography, and they dream of a future solo journey to the Canadian Rockies, all while budgeting travel expenses within mid‑range savings.
  culinary: Mary Mckenzie curates Southern‑inspired farm‑to‑table meals using garden‑fresh heirloom tomatoes, collard greens, and smoked turkey, mastering dishes like shrimp and grits with stone‑ground
    corn, roasted beet and goat‑cheese salad, and buttermilk‑fried chicken, while they often experiment with spice blends from a local farmer’s market and enjoy occasional brunches at the farm‑focused Pear
    Tree Café.
  core: Mary Mckenzie blends meticulous project discipline with a love for spontaneous garden cooking, cycling, and mystery novels, while they occasionally let paperwork slip in favor of a last‑minute lake
    adventure.
background:
  cultural: Mary grew up in the suburban outskirts of Atlanta, Georgia, in a middle-class family that valued community involvement, Southern hospitality, and a strong work ethic. Her upbringing involved
    church gatherings, local festivals, and family barbecues, which fostered an appreciation for close-knit relationships and regional cuisine. Though she identifies as a progressive professional, she retains
    an affection for Southern traditions such as storytelling, supporting neighborhood initiatives, and the informal, friendly communication style typical of the area. Her cultural experiences have shaped
    her collaborative yet assertive approach in both personal and professional settings.
attributes:
  skills: '["Project Scheduling","Hybrid Agile-Waterfall Methodology","Risk Management","Budget Management","Stakeholder Communication","Technical Translation","Cross-Functional Team Leadership","Process
