  career_goals: Pedro aims to merge his technical expertise with his drive to help others by pursuing a career in biomedical engineering focused on affordable health‑care solutions for underserved populations,
    particularly Latinx communities in the United States. He plans to join a research‑oriented company or start‑up that values interdisciplinary teamwork, and he hopes to earn a master’s degree in bio‑engineering
    within the next few years. In the long term, he envisions leading a community‑based initiative that provides STEM mentorship to youth and develops low‑cost medical devices, while maintaining a flexible
    work environment that allows him to stay involved in volunteer projects.
