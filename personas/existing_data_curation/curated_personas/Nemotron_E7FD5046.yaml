personas:
  professional: Pedro Garcia is a budding biomedical engineer who leverages their mechanical engineering background, Python and MATLAB expertise, and hands‑on lab experience to design low‑cost medical devices,
    while they bring a relaxed, flexible approach and strong empathy to collaborative, community‑focused projects.
  sports: Pedro Garcia is an avid pickup soccer player who regularly joins the Roanoke Rovers Amateur Soccer Club, follows D.C. United in the MLS, and supplements cardio with Appalachian Trail hikes in
    the fall, using sport as both a social outlet and a way to stay fit despite occasional disorganization about training schedules.
  arts: Pedro Garcia blends a love for music by strumming classic rock riffs from Jimi Hendrix and covering traditional Mexican ballads reminiscent of Los Tigres del Norte, while they also enjoy cinema
    by watching films from Guillermo del Toro and attending local art fairs featuring works inspired by Frida Kahlo, making creative expression a core part of their social gatherings.
  travel: Pedro Garcia prefers spontaneous, budget‑friendly road trips with friends, having already explored sections of the Appalachian Trail near Shenandoah National Park and taken a weekend getaway to
    Montreal, while dreaming of a cultural immersion tour in Oaxaca to sample regional cuisine and music.
  culinary: Pedro Garcia enjoys cooking family‑style tamales filled with pork and masa, mastering the perfect enchilada sauce with dried chilies, and experimenting with homemade guacamole using ripe avocados,
    cilantro, and lime, while also relishing pizza nights with extra mozzarella and pepperoni, showcasing a competent yet experimental home‑cooking style.
  core: Pedro Garcia is a socially‑charged, guitar‑strumming engineering student who channels curiosity into low‑cost medical device ideas, yet their laid‑back habit of forgetting to file taxes and misplacing
    project notes often leads to last‑minute scrambles.
background:
  cultural: Pedro was raised in a Mexican‑American household, with parents who immigrated from Jalisco. He grew up speaking both Spanish and English, celebrating cultural traditions such as Día de los Muertos,
    Semana Santa, and family gatherings centered around Mexican cuisine. Living in Lexington, Kentucky, he navigates a bicultural identity, blending Mexican values of family solidarity and communal support
    with the Mid‑Southern emphasis on hospitality and community involvement. This background fuels his commitment to bridge cultural gaps, especially by mentoring Latinx youth in STEM and promoting health
    equity.
