  career_goals: Christian aims to leverage his STEM background to move into a supervisory or logistics analyst role within the United States Postal Service, focusing on data‑driven route planning and process
    improvement. He is considering additional certifications in supply chain management and hopes to eventually become a postmaster or a senior operations manager, where he can implement innovative technologies
    to enhance efficiency. In the longer term, he dreams of launching his own tech‑enabled delivery service that blends community focus with cutting‑edge logistics.
