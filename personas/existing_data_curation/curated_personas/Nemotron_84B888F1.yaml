  career_goals: Bruce aspires to combine his love for art and his deep empathy for others into a career that uses visual storytelling to support mental‑well‑being. He hopes to attend a high‑school art program,
    then study illustration or animation at a university, eventually working as a concept artist for games or films while also volunteering as a youth art‑therapy facilitator. He also dreams of contributing
    to environmental education through visual media, creating murals and educational graphics that raise awareness about coastal conservation. His organized approach drives him to set short‑term goals,
    such as mastering Photoshop, building a portfolio, and completing a certification in peer counseling by the time he graduates high school.
