personas:
  professional: Bruce Shannon, a 13‑year‑old aspiring marine biologist and comic‑book creator, channels their curious, methodical nature into photographing tide‑pool creatures and sketching scientific‑fantasy
    narratives that blend marine life facts with superhero plots.
  sports: Bruce Shannon enjoys surfing with the local junior surf club and supports the regional soccer team, the Coastal Riptides, while occasionally joining the school’s swim team during spring, balancing
    a love for ocean‑based activity with seasonal team sports.
  arts: Bruce Shannon spends evenings drawing comic‑style heroes inspired by Stan Lee and Hayao Miyazaki, tinkering with digital painting tools after school, and finds solace in listening to the melodic
    indie folk of Bon Iver while sketching, letting these artistic influences shape their storytelling voice.
  travel: Bruce Shannon dreams of snorkeling the vibrant reefs of the Great Barrier Reef after a summer spent at the local Monterey Bay, and frequently plans family road trips to nearby state parks like
    Redwood National Forest, balancing wanderlust with the budget constraints of a middle‑schooler’s allowance.
  culinary: Bruce Shannon’s palate favors fresh seafood dishes such as grilled shrimp tacos with mango salsa and classic clam chowder, yet their cooking skill is limited to assembling simple wraps and preparing
    a well‑seasoned avocado toast, often experimenting with herbs like cilantro and lime to flavor their meals.
  core: Bruce Shannon is a curious, organized teen who merges marine science with comic art, navigates anxiety through creative outlets, and balances careful savings with occasional impulse buys.
background:
  cultural: Bruce grew up in Oceano, a small coastal community in San Luis Obispo County, California. His family identifies as white American, with roots in the Midwest that settled on the Central Coast
    several generations ago. The local culture blends laid‑back beach life, outdoor recreation, and a strong environmental ethic, shaped by the Pacific shoreline and nearby agricultural lands. The community
    celebrates regional traditions such as summer surf festivals, farmers’ markets, and coastal clean‑up events, which have instilled in Bruce a respect for nature and a collaborative spirit. While predominantly
    Anglo‑American, the area’s proximity to diverse neighboring towns introduces him to a mosaic of Hispanic and Pacific‑Northwest influences, reflected in the multicultural food, bilingual signage, and
    inclusive school environment that encourages openness to varied perspectives.
