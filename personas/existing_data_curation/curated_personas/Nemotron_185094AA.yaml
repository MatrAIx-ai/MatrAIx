  career_goals: Dedra aims to expand her boutique, Guillory Gems, by launching a robust online store that showcases her bespoke collections and a new signature line inspired by African heritage motifs.
    She plans to earn a formal Gemological Institute of America (GIA) certification to deepen her expertise and credibility. Over the next five years, she hopes to open a second studio in nearby Winter
    Park, partner with local galleries for curated exhibitions, and offer regular workshops that teach jewelry‑making fundamentals to community members. Ultimately, she seeks to secure a comfortable retirement
    while solidifying her reputation as a leading artisan in Central Florida’s craft scene.
