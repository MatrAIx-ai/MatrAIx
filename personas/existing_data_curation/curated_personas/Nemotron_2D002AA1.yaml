  career_goals: Although retired from formal employment, Kelly aims to continue contributing her expertise by mentoring aspiring entrepreneurs through the local Small Business Development Center, serving
    on the board of the Redding Community Resource Center, and preserving regional history via a volunteer archivist role. She also plans to complete a series of online courses on digital marketing and
    data visualization to stay current, and hopes to author a memoir chronicling her business journey and community service.
