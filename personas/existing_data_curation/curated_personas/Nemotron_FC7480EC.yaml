  career_goals: Even at her young age, Amber dreams of a future where she can help and organize. She often talks about becoming a teacher or preschool caregiver, imagining herself leading group activities,
    making sure everyone has what they need, and keeping the classroom tidy. She also shows interest in caring for animals, saying she’d like to be a veterinarian so she can help pets feel better. Amber’s
    high standards and love for teamwork suggest she may aim for a role that combines community service with planning, such as a community event coordinator or a youth program leader.
