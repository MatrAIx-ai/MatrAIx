personas:
  professional: Amber Marion, a budding three‑year‑old project coordinator in her playroom, arranges her blocks and puzzles with methodical precision, channels curiosity into invented games, and they delight
    in leading their preschool friends through organized treasure hunts.
  sports: Amber Marion, a high‑energy three‑year‑old who sprints through Lathrop’s community park for the Little Sprouts gymnastics class, cheers for the San Jose Earthquakes on family game nights, and
    they make a ritual of hopping on a mini‑trampoline after each nap to stay fit.
  arts: Amber Marion, a miniature arts enthusiast, hums along to Raffi’s “Baby Beluga,” flips through Dr. Seuss picture books, and they love recreating Mo Willems’ sticky‑note rabbit drawings, often performing
    spontaneous dance numbers to “Let It Go” from Frozen.
  travel: Amber Marion, an inquisitive three‑year‑old traveler, has explored Disneyland, camped in the backyard during the Lathrop Fair, and they delight in family road‑trips to Redwood National Park where
    they collect pine cones as souvenirs.
  culinary: Amber Marion, a picky yet adventurous three‑year‑old eat‑er, adores cheesy macaroni, munches on chicken nuggets with ketchup, sips strawberry‑banana smoothies, and they consistently refuse broccoli,
    turning dinner time into a playful negotiation.
  core: Amber Marion is an unusually organized, compassionate three‑year‑old whose boundless curiosity drives tidy toy towers, while their habit of humming “Twinkle, Twinkle” at bedtime and occasional ice‑cream
    meltdowns add charming quirks.
background:
  cultural: Amber is raised in a white, middle‑class family in Lathrop, California, an area with a blend of suburban and agricultural influences. Her upbringing reflects typical American customs—celebrating
    holidays like Thanksgiving, Christmas, and the Fourth of July—and participation in community events such as the Lathrop Fair and local park picnics. The family values education, community involvement,
    and cooperative behavior, encouraging Amber to take part in library storytimes and neighborhood playgroups. While her immediate cultural environment is predominantly white, living in the diverse state
    of California gives her occasional exposure to broader cultural practices and multilingual neighbors, fostering an early appreciation for variety within a familiar cultural framework.
