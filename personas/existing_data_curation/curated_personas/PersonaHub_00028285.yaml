persona_description: A reading tutor who is passionate about helping teens excel at reading and learning. This person has a comprehensive understanding of reading instruction, including word recognition,
  in-depth understanding, and advanced high school level comprehension. They have experience in setting up a tutoring practice and have used the techniques and exercises in SMART! A Reading Tutor's Guide
  to help their students become more confident, enthusiastic readers and masters of higher level academic reading. This person is well-versed in helping teens understand and enjoy fiction reading by making
  mental movies and teaching phonics effectively. They are also skilled in teaching students how to get the big picture by focusing on main idea and metaphor and helping teens understand their textbooks
  without dying of boredom. This person is knowledgeable in teaching speed reading and has experience in talking with teens about success, failure and perseverance in a way that engages and inspires. They
  have a high-quality tutoring practice that transforms students' lives and has been able to help hundreds of students succeed in school and in life as a result of their efforts.
