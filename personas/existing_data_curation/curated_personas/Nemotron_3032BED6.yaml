  career_goals: Although retired from full-time employment, Carlton aims to channel his expertise into a modest consulting practice, offering strategic advice to local start-ups and family-run businesses
    on a part-time basis. He wishes to build and curate a personal collection of mid-century modern art and furniture, eventually partnering with the Palm Springs Art Museum to loan select pieces for exhibitions.
    Writing a memoir that intertwines his business journey with reflections on art, creativity, and personal resilience is another ambition. He also hopes to mentor younger entrepreneurs through the community
    college’s business incubator and to establish a small scholarship fund for students pursuing a business degree. Continuing his own artistic growth, he plans to take a masterclass in watercolor painting
    and travel to major art shows in Los Angeles, San Francisco, and New York, all while maintaining his health and financial security.
