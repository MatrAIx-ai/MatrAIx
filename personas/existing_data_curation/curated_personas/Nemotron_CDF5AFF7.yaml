personas:
  professional: Flo Barnes, a 16-year-old aspiring freelance illustrator, blends their strong visual sensibility, self-taught Procreate skills, and relaxed, curiosity-driven approach to turn sketchbook
    ideas into concept art for indie video games and local graphic-novel projects, while navigating the occasional disorganization of school deadlines with assertive bursts of creativity.
  sports: Flo Barnes enjoys casual kayaking on the Missouri River in summer, participates in the school's track-and-field program, follows the South Dakota State Jackrabbits basketball team and the Kansas
    City Chiefs football team with devotion, and occasionally streams indie skateboarding videos, but prefers low-key activity over organized team sports.
  arts: Flo Barnes immerses themselves in artistic creation, drawing inspiration from James Jean's intricate illustrations, the surreal watercolor works of Yuko Kobayashi, experimental indie sounds of FKA
    Twigs and Mitski, and regularly visits the Yankton Area History Museum's rotating exhibitions, all of which inform their own mixed-media pieces posted on Instagram.
  travel: Flo Barnes prefers spontaneous weekend getaways to nearby natural spots like the Lewis and Clark Recreation Area, while dreaming of a spring trip to Santa Fe's art districts and a future solo
    pilgrimage to Kyoto's manga cafés, balancing a modest family budget with a love for low-key cultural immersion.
  culinary: Flo Barnes's culinary palate favors fresh river trout grilled with lemon, vibrant rainbow fruit salads, and quick avocado toast topped with feta, while they experiment with homemade bubble-tea
    recipes for creative drink combos, yet they often rely on the local coffee shop's oat-milk latte for late-night drawing sessions.
  core: Flo Barnes is a quietly curious teen artist who trades organized schedules for spontaneous sketching marathons, hoards limited-edition sketchbooks, forgets to reply to texts until deadlines loom,
    and finds peace in the quiet splash of watercolor on paper.
background:
  cultural: Flo is raised in a white, Midwestern family that has lived in Yankton County for several generations, with roots in farming and small‑town community life. Her upbringing includes attendance
    at a local Lutheran church, participation in county fairs, and a strong sense of self‑reliance common in rural South Dakota. Though her family is not directly affiliated with the local Sioux heritage,
    they have grown up attending multicultural events at the Yankton Area Community Center, giving Flo an awareness and appreciation of the region's Native American history and artistic traditions. The
    combination of Midwestern modesty, a close‑knit community ethos, and the openness to new ideas encouraged by her school’s art program shapes her cultural perspective.
attributes:
  skills: '[''drawing and sketching'', ''digital illustration using Procreate'', ''basic graphic design with Canva'', ''introductory HTML/CSS web design'', ''self‑directed research and information synthesis'',
    ''collaborative small‑group project coordination'']'
  hobbies: '[''sketching and watercolor painting'', ''digital art on tablet'', ''landscape photography'', ''reading speculative fiction and graphic novels'', ''listening to indie/experimental music'', ''participating
    in a small‑group art club'', ''coding simple websites'', ''maintaining an idea journal'']'
  career_goals: Flo hopes to turn her love of visual art into a creative career, ideally as a freelance illustrator or concept artist for independent video games and graphic novels. She is also intrigued
    by the possibility of working in community arts—perhaps curating local exhibitions at the Yankton Area History Museum or teaching art workshops for youth. In the longer term she imagines pursuing an
    Associate of Arts in Graphic Design at a community college, followed by a Bachelor’s degree if she decides to deepen her technical skills. She values flexibility, so she envisions a career that lets
    her set her own schedule, mix remote digital work with occasional in‑person studio sessions, and travel to explore new cultural influences for her art.
