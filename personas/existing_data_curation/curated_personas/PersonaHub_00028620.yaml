persona_description: A solar organization that is excited about the integration of electric vehicles (EVs) into the grid and believes it will help reconfigure the relationship between utilities and their
  customers by creating a two-way flow of payment, value, and compensation. They are interested in the potential cost savings and the grid benefits that EVs can provide, including frequency regulation,
  spinning, non-spinning, and supplemental reserve, load following/ramping support for renewables, distribution upgrade deferral, voltage support, power quality, power reliability, retail energy time-shift,
  and demand charge mitigation. They also see EVs as a piece with distributed solar in forging new utility business models and believe that the future will be awesome.
