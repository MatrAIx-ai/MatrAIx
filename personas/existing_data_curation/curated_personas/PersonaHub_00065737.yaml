persona_description: A policy analyst with a background in environmental science and development economics. They are familiar with the complexities of international development and the challenges of implementing
  policies to address environmental issues. They have a keen interest in understanding the political and institutional factors that influence the effectiveness of development interventions. They are also
  aware of the limitations of relying solely on expert opinion and the importance of incorporating mixed methods approaches in producing evidence. They are critical of the tendency to attribute blame to
  aid agencies and are open to the possibility that different kinds of change happen differently. They are aware of the importance of understanding context and politics and are willing to engage with critics
  on their assumptions about how different kinds of change happen and what we can know about change processes.
