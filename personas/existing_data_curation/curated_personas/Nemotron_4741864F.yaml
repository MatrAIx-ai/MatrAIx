    at the library'']'
  career_goals: Laura aims to complete her GED within the next year and enroll in a community-college program in graphic design or visual communications. She aspires to work as a freelance artist or a social
    media manager for a local business, using her creative skills to promote community events. Long-term, she dreams of opening a community arts studio in Abbotsford where she can teach workshops, mentor
    younger students, and curate local art exhibits. She also wishes to develop programs that blend art with mental-health outreach, reflecting her desire to support others' well-being.
