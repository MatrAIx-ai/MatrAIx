  career_goals: Although Carlos is not currently employed, he aims to stay intellectually engaged and contribute to his community. He plans to establish a small, low‑key workshop in his backyard where neighborhood
    youth can explore hands‑on STEM activities under his guidance. He also hopes to obtain a certification in residential solar‑panel installation so he can retrofit his own home with renewable energy and
    share that knowledge with neighbors. Additionally, Carlos dreams of documenting his family's genealogy and writing a concise memoir that captures the resilient spirit of his generation in rural Alabama.
    His ambitions are modest, flexible, and rooted in personal growth and community harmony rather than formal career advancement.
