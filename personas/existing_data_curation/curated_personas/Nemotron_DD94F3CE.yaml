personas:
  professional: Amneris Marenco, a 56‑year‑old bilingual general maintenance specialist, blends three decades of electrical, plumbing, HVAC and carpentry expertise with a relaxed, improvisational style
    that lets them swiftly devise quick‑fix solutions while assertively coordinating crew members on residential and small‑commercial projects.
  sports: Amneris Marenco stays active through weekly salsa and merengue dance classes, joins a community walking group that follows the coastline during the cooler winter months, and cheers passionately
    for the Vaqueros de Bayamón basketball team and the Bayamón FC soccer club whenever they play at the local stadium.
  arts: Amneris Marenco channels their love for Caribbean rhythm through regular salsa dancing to the classic sounds of Willie Colón, Héctor Lavoe, and Marc Anthony, regularly attends the annual San Sebastián
    Street Festival to witness local steel‑pan ensembles, and they find inspiration in Puerto Rican theater productions starring Benicio del Toro’s compatriots.
  travel: Amneris Marenco prefers spontaneous weekend getaways to local gems like the bioluminescent bay in Vieques and the cliffs of Cabo Rojo, while dreaming of a future cultural tour of Granada, Spain
    and a music‑filled pilgrimage to Havana, Cuba, and they balance modest travel budgeting with occasional splurges on ferry tickets and boutique hostels.
  culinary: Amneris Marenco, an enthusiastic home cook, perfects arroz con gandules with a fragrant sofrito of tomatoes, bell peppers, cilantro and basil from their balcony garden, slow‑roasts pernil seasoned
    with adobo and garlic, and hand‑rolls pasteles wrapped in plantain leaves, while they occasionally experiment with a basil‑pesto twist on mofongo for visiting friends.
  core: Amneris Marenco is a community‑driven, hands‑on problem solver whose resilient optimism and love for salsa often eclipse their habit of starting too many DIY projects and misplacing their keys,
    yet they always carry a trusty multitool and a smile to brighten any repair or gathering.
background:
  cultural: Amneris was born and raised in Bayamón, a vibrant municipality within the San Juan metropolitan area, and her identity is deeply rooted in Puerto Rican culture. She grew up speaking Spanish
    at home while learning English at school, giving her fluency in both languages and an ability to navigate between local and broader contexts. Family gatherings centered around music, dance, and food
    have instilled in her a love for salsa, plena, and the island’s culinary traditions. She participates in Catholic holidays, community festivals such as the Fiestas de Bayamón, and the island‑wide San
    Sebastián Street Festival, reflecting a strong connection to communal celebrations. Having lived through the challenges of recent hurricanes, she developed a pragmatic resilience and a community‑oriented
    mindset that values mutual support and resourcefulness. These cultural influences shape her warm, outgoing personality and her commitment to serving her neighbors.
attributes:
  skills: '[''Electrical wiring and troubleshooting'', ''Plumbing repairs and pipe replacement'', ''HVAC maintenance and basic refrigerant handling'', ''Carpentry and custom shelving construction'', ''Preventive
