  hobbies: '[''Salsa and merengue dancing'', ''Cooking Puerto Rican cuisine'', ''Balcony gardening'', ''Neighborhood clean‑up volunteering'', ''Senior‑care program volunteering'', ''DIY woodworking'', ''Reading
    home‑improvement magazines'', ''Attending local festivals and cultural events'']'
  career_goals: Amneris aims to evolve from a frontline maintenance technician to a supervisory role where she can design and oversee preventive‑maintenance programs for larger property portfolios. Over
    the next few years she plans to earn professional certifications such as Certified Maintenance Manager (CMM) and an HVAC‑R credential, and to complete a short‑term management course focused on occupational
    safety and team leadership. With these credentials she hopes to secure a maintenance supervisor position at a major residential complex or municipal facility, allowing her to mentor apprentices and
    implement eco‑friendly maintenance practices. In the longer term she aspires to launch her own community‑focused maintenance service, offering reliable repair solutions to small businesses and aging
    homeowners while providing on‑the‑job training to younger Puerto Rican workers.
