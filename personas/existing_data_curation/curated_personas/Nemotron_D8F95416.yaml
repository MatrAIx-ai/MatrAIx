personas:
  professional: Leah Ahumada, a 54‑year‑old technology strategist‑in‑training, melds two decades of full‑stack development in Python, C#, and JavaScript with sharp business‑strategy acumen to architect
    cloud‑native, serverless solutions that balance rigorous organization with creative problem‑solving, while they mentor junior developers, champion diversity, and infuse UI/UX designs with an artist’s
    eye.
  sports: Leah Ahumada hikes the Ozark foothills every Saturday with the Trailblazers Hiking Club, follows the Arkansas Razorbacks men's basketball season and the St. Louis Cardinals for baseball, and plays
    casual tennis at the community Y, preferring low‑impact cardio that fuels their long coding days without sacrificing joint health.
  arts: Leah Ahumada spends weekday afternoons sketching watercolor landscapes inspired by Monet and O'Keeffe, digitizes illustrations on a Wacom tablet while listening to Tori Amos on piano, attends independent
    film screenings at the Walton Arts Center, and cites Diane Arbus as a pivotal photographic influence, weaving these artistic threads into their UI/UX design ethos.
  travel: Leah Ahumada plans trips with a blend of meticulous itineraries and spontaneous detours, favoring weekend escapes to Hot Springs' historic bathhouse district, annual pilgrimages to Santa Fe for
    its art fairs, and a long‑term dream of immersing themselves in Barcelona's Gaudí architecture and tech incubators, all while balancing a modest travel budget and family obligations.
  culinary: Leah Ahumada cooks Southern‑inspired meals such as shrimp and grits, collard greens, and jalapeño cornbread using fresh vegetables from their garden, often experimenting with homemade hot sauce
    made from local peppers, yet they have a habit of over‑salting the gumbo when juggling a demanding workday, and they enjoy pairing dishes with a glass of chilled Muscadine wine.
  core: Leah Ahumada is a curiosity‑driven tech strategist who fuses business metrics with artistic intuition, balances disciplined spreadsheets with spontaneous brushstrokes, and occasionally lets late‑night
    coding marathons eclipse their self‑care routines.
background:
  cultural: Leah was raised in a middle‑class, Anglo‑American family in the American South. Her upbringing in Arkansas imbued her with the region’s traditions of hospitality, community involvement, and
    an appreciation for local folk art and music. While she respects these roots, her graduate business education and career in software development have broadened her worldview, fostering an openness to
    diverse cultures and unconventional ideas. She identifies with the values of self‑reliance and modesty common in Southern culture, yet she actively seeks to blend these with progressive attitudes toward
    gender equity in tech and the integration of arts into everyday life. Her cultural identity is thus a tapestry of Southern heritage, professional ambition, and a lifelong curiosity about the wider world.
