  career_goals: Leah aims to leverage her unique blend of business acumen and technical depth to become a technology strategist for regional enterprises in Arkansas, guiding digital transformation initiatives
    that integrate artistic and cultural experiences. Over the next five years she plans to step into a senior leadership role such as Director of Engineering or Chief Technology Officer, where she can
    shape product roadmaps, foster innovation, and champion diversity in tech. She is also passionate about mentoring women and mid‑career professionals entering software development, and hopes to establish
    a community workshop series that combines coding with creative arts. Keeping pace with emerging technologies, Leah aspires to deepen her expertise in artificial intelligence and immersive media so she
    can create platforms that support local artists and cultural institutions.
