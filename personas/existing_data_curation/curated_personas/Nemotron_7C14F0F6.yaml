  career_goals: Although officially retired, Julia aims to leave a lasting cultural imprint on Jacksonville. She plans to launch a quarterly community art showcase that highlights emerging local artists,
    author a memoir weaving her artistic journey with reflections on Southern heritage, and mentor young creators through workshops. She also aspires to complete a comprehensive family genealogy project
    and publish the findings online, and eventually organize a regional art-and-history symposium.
