personas:
  professional: Julia Mace is a retired community arts organizer who leverages her watercolor, mixed‑media, and digital illustration expertise to curate quarterly showcases, orchestrate nonprofit fundraisers,
    and mentor emerging creators through methodical workshops, while they apply a critical eye and competitive drive to elevate Jacksonville's cultural scene.
  sports: Julia Mace follows the Jacksonville Jaguars and often watches Jacksonville Jumbo Shrimp games, jogs along the St. Johns River each sunrise, attends community yoga classes, and rows with the Jacksonville
    Rowing Club during the milder months, treating fitness as a disciplined yet relaxed pastime.
  arts: Julia Mace immerses herself in the abstract works of Mark Rothko, the kinetic installations of Yayoi Kusama, and the bold canvases of locally celebrated artist James McBroom, regularly attending
    author talks featuring Zadie Smith and listening to Philip Glass’s minimalist scores while they create digital illustrations inspired by the Cummer Museum’s permanent collection.
  travel: Julia Mace plans her trips with the same spreadsheet precision she uses for exhibition budgets, favoring cultural pilgrimages like the Venice Biennale, Art Basel in Basel, and a week‑long literary
    tour of Edinburgh, while they also dream of a quiet retreat in Kyoto’s Zen gardens and keep a modest travel fund to balance their love of adventure with retirement finances.
  culinary: Julia Mace delights in cooking with garden‑fresh herbs like basil, rosemary, and magnolia leaf, frequently preparing shrimp‑and‑grits with a dash of smoked paprika, craftily plating dishes that
    echo her mixed‑media aesthetic, yet they sometimes over‑salt their paella while distracted by a puzzle, and they regularly indulge in coffee at the downtown café while sketching menu ideas.
  core: Julia Mace is a methodical, art‑obsessed retiree who channels competitive curiosity into community culture, balances disciplined budgets with occasional splurges, and navigates health, fitness,
    and travel with a blend of precision and spontaneous creativity.
background:
  cultural: Julia was raised in a middle-class, white Southern family in the Jacksonville area, with deep roots in the region’s traditions of hospitality, church community, and Southern cuisine. Her grandparents
    emigrated from Ireland and England, imparting a modest appreciation for folk storytelling and Celtic art. Growing up amid the Gulf Coast’s maritime culture, she developed an affinity for coastal landscapes
    and regional seafood dishes. While she embraces these Southern customs, her intellectual curiosity has led her to explore diverse artistic movements and global cultures, blending them into a uniquely
    eclectic personal identity.
