  hobbies: '[''Sketching and watercolor painting'', ''Digital illustration'', ''Visiting art galleries and museums'', ''Attending live music performances'', ''Hiking in the Ouachita foothills'', ''Practicing
    yoga'', ''Cooking and hosting dinner parties'', ''Volunteering at Tulsa Food Bank'', ''Participating in school theater productions'', ''Reading contemporary fiction and social‑justice literature'']'
  career_goals: She intends to enroll in a bachelor’s program in social work or art therapy, aiming to combine her compassion for helping others with her love of the arts. Over the next five years, Michelle
    hopes to gain experience as a youth mentor and community‑outreach coordinator, eventually establishing a non‑profit that offers affordable art workshops and mental‑health support for under‑served teens
    in Tulsa. Her long‑term ambition is to become a licensed art therapist or community program director, leading initiatives that foster creativity, resilience, and social inclusion.
