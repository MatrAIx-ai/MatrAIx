personas:
  professional: Michelle Roy is a budding community‑outreach coordinator in the making, blending their talent for event planning, digital illustration, and peer mentorship to craft inclusive art‑focused
    programs that empower Tulsa’s under‑served teens, and they eagerly anticipate launching the first pilot workshop by next summer.
  sports: Michelle Roy hikes the Ouachita foothills on weekends, practices Vinyasa yoga at a local studio, cheerfully follows the Tulsa Oilers and the Oklahoma City Thunder, and they regularly join a community
    running club for Saturday 5K runs, keeping an active lifestyle balanced with group camaraderie.
  arts: Michelle Roy draws inspiration from the works of Frida Kahlo and Banksy, attends indie folk shows at Cain’s Ballroom featuring artists such as Bon Iver and Joni Mitchell, spends evenings crafting
    watercolor paintings while experimenting with Procreate for digital illustrations, and they volunteer as a set designer for school theater productions, weaving art into every facet of their life.
  travel: Michelle Roy favors budget‑friendly road trips, having explored the art‑rich streets of Santa Fe, the soothing hot springs of Hot Springs, Arkansas, and the historic blues scene of Memphis, while
    they dream of a study‑abroad semester in Barcelona’s vibrant art districts, always planning itineraries meticulously and booking hostels through student discounts.
  culinary: Michelle Roy loves cooking communal meals, often whipping up chickpea tikka masala with fresh basil and a dash of gochujang, perfecting avocado toast with poached eggs, and experimenting with
    sweet potato gnocchi, and they consider their kitchen prowess to be an enthusiastic intermediate level that fuels social gatherings.
  core: Michelle Roy blends artistic curiosity, methodical planning, and boundless compassion into a life where sketchbooks accompany every adventure, and they treat community service as naturally as morning
    yoga.
background:
  cultural: Michelle was raised in a middle‑class, predominantly white neighbourhood of Tulsa, Oklahoma. Her upbringing reflects the Southern‑Midwestern values of hospitality, community involvement, and
    a strong work ethic, while her family encouraged openness to diverse artistic and cultural experiences. Growing up near the historic Route 66 corridor, she has been exposed to a mix of classic American
    traditions and contemporary creative scenes, which nurtured her curiosity about new ideas and unconventional thinking. The blend of regional pride and a desire for inclusive community service shapes
    her identity and outlook.
attributes:
  skills: '[''Community outreach coordination'', ''Event planning'', ''Public speaking'', ''Digital illustration'', ''Graphic design (basic)'', ''Social media content creation'', ''Project management'',
