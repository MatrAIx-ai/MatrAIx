  career_goals: Allan dreams of a future where he can apply his love for building and order. He often talks about becoming a construction engineer or a mechanic because these jobs involve clear steps, hands‑on
    work, and tangible results. He also expresses fascination with astronauts and firefighters, noting that they follow strict schedules and help solve real‑world problems. His ambitions are shaped by a
    desire for structured, practical roles where he can see the impact of his efforts.
