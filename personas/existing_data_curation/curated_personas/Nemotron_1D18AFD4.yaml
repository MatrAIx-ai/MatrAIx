  hobbies: '[''Hiking local trails'', ''Gardening'', ''Baking Southern desserts'', ''Reading historical fiction'', ''Volunteer tutoring'', ''DIY home projects'', ''Attending community theater'', ''Playing
    acoustic guitar'']'
  career_goals: Allena aims to transition her hands‑on community experience into a full‑time role in nonprofit program coordination or local government, focusing on rural development and youth enrichment
    in southwestern Georgia. She plans to enroll in a bachelor's program in Public Administration or Social Work while working part‑time, with the long‑term ambition of designing sustainable community initiatives—such
    as a farm‑to‑table education program that blends her interest in agriculture with her organizational expertise. Her pragmatic outlook fuels a goal of eventually launching a small community‑focused venture
    that provides fresh produce and culinary workshops, allowing her to merge her curiosity about sustainable food systems with a practical business model.
