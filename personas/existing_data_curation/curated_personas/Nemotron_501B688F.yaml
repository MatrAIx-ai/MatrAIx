personas:
  professional: Kirk Hartman, a senior‑center event coordinator and community historian, blends their lifelong woodworking, gardening, and storytelling skills with a curious, competitive edge to lead lively
    workshops, yet they are relaxed about scheduling, often resulting in last‑minute changes.
  sports: Kirk Hartman follows the Dallas Cowboys in football season, the Houston Astros in baseball, and the San Antonio Spurs in basketball, participates in the local senior walking club that meets weekly
    for gentle hikes at Hill Country trails, and they keep their fitness routine competitive by challenging friends to bridge marathons after a brisk walk.
  arts: Kirk Hartman regularly visits the Austin Art Center to view contemporary works by Texas artists like Mary McClelland and enjoys listening to Johnny Cash, Miles Davis, and The Rolling Stones on their
    vintage radio; they experiment with digital photography of wildflowers, often emulating the composition of Ansel Adams, and they host storytelling evenings where classic movies and mystery novels spark
    lively discussion.
  travel: Kirk Hartman prefers relaxed road trips to historic sites, having toured the Alamo in San Antonio, explored the Hill Country vineyards, and spent a week in Santa Fe, while dreaming of a leisurely
    Mediterranean cruise; they plan trips carefully around health considerations and a fixed income, often traveling with family or senior‑center companions.
  culinary: Kirk Hartman is a self‑taught barbecue enthusiast who slow‑smokes Texas brisket with hickory chips, seasons it with a blend of paprika, garlic, brown sugar, and chipotle, pairs it with garden‑fresh
    tomatoes, corn succotash, and coleslaw, and they enjoy experimenting with smoky rubs during weekend potlucks.
  core: Kirk Hartman is a curious, competitive 91‑year‑old storyteller who blends art, gardening, and barbecue into a vibrant senior‑center presence, even though they sometimes forget appointments and worry
    about health.
background:
  cultural: Kirk grew up in rural central Texas during the 1930s and 1940s, shaped by the values of self‑reliance, community, and Southern hospitality. Raised in a Protestant household, he lived through
    the wartime era, the post‑World War II oil boom, and the cultural shifts of the late 20th century. His identity is tied to Texan folk traditions—country music, barbecue, and a strong sense of local
    pride. Living in Huntsville, Walker County, with its historic ties to Sam Houston and a close‑knit community, has reinforced his respect for regional history while his curious nature keeps him open
    to broader artistic and cultural currents.
