persona_description: Dan and Tim Graettinger, a brother duo who are data miners and economists, have used data analysis to predict the number of medals won by different countries at the Winter Olympics.
  They have discovered that the most important factors to predict medal wins are a country's geographic size, GDP per capita, value of exports, and latitude of the Nation's capital. Their predictions have
  been accurate for the last two Winter Olympics, with the United States coming in first, followed by Germany and China. The brothers believe that their data analysis techniques can be applied to other
  departments to predict future outcomes.
