persona_description: A historian who specializes in the study of American history, particularly the history of the Upper Mississippi region. He is knowledgeable about the Spanish land grants in the area,
  the rebellion of French settlers, and the history of Dubuque. He is also interested in the administrative division of the Louisiana Territory and the decision of Spain to restrict its interests to an
  area south of the Missouri. He has a deep understanding of the region's history and its impact on the development of the United States.
