personas:
  professional: Dolores Caban is an aspiring junior visual storyteller who blends drawing, LEGO construction, and Scratch animation to bring imaginative worlds to life, using their organized planning and
    competitive drive to perfect every detail.
  sports: Dolores Caban cheers for the Harbor Hawks minor league baseball team and follows the Metro United youth soccer club, while training twice a week with the River Kids Swim Club, where their competitive
    spirit pushes them to improve lap times and master new strokes.
  arts: Dolores Caban draws inspiration from the animated worlds of Hayao Miyazaki, the whimsical illustrations of Oliver Jeffers, and the melodic pop of Taylor Swift, spending weekends crafting watercolor
    landscapes and sketching characters while humming the Harry Potter soundtrack.
  travel: Dolores Caban has visited a weekend cabin in the nearby mountains, trekked to the Grand Canyon on a school field trip, and dreams of exploring the bustling streets of Tokyo and the wildlife of
    the Galápagos Islands, preferring meticulously planned itineraries over spontaneous road trips.
  culinary: Dolores Caban loves rolling dough for empanadas filled with seasoned beef and sweet dulce de leche drizzles, bakes chocolate chip cookies using dark chocolate chips and sea salt, and often adds
    fresh strawberries to their breakfast yogurt, though they sometimes over‑salt the pasta sauce when experimenting with new recipes.
  core: Dolores Caban is a nine‑year‑old imagination engine who blends art, technology, and storytelling, thrives on organized challenges, and can be both fiercely competitive and unexpectedly generous,
    though they occasionally lose track of time when sketching.
background:
  cultural: Dolores comes from an Argentine‑American family living in Rowlett, Texas. At home, Spanish is spoken regularly, and Argentine customs are celebrated, such as enjoying weekend asado gatherings,
    watching soccer matches, and observing holidays like Día de la Tradición. Her parents share stories about their hometown in Argentina, and the household maintains a love for Argentine music, especially
    folk and tango, which Dolores has begun learning through dance classes. While she attends a diverse public elementary school where she participates in American cultural activities and holidays, she
    retains a strong connection to her Argentine roots, giving her a blended cultural perspective that influences her interests, language use, and artistic expression.
attributes:
  skills: '["visual storytelling and illustration", "basic coding (Scratch)", "elementary science experimentation", "organizational planning", "advanced reading comprehension (fantasy)", "bilingual English‑Spanish
