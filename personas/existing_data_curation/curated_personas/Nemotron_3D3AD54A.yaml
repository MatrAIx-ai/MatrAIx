  career_goals: Dolores dreams of becoming an astronaut who can explore distant planets, inspired by the space themes in her favorite books. She also envisions a future as a graphic novelist, publishing
    illustrated stories that blend Argentine folklore with imaginative worlds. She aims to win her school's science fair by inventing a novel experiment, perhaps involving renewable energy or robotics,
    and eventually pursue a career as a STEM researcher or inventor. Additionally, she hopes to share her cultural heritage through art, maybe creating a series of illustrations that celebrate Argentine
    traditions, and she looks forward to mastering tango dancing as a way to honor her family's roots.
