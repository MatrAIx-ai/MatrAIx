personas:
  professional: Maritza Reyes, an OSHA‑certified safety specialist, applies meticulous risk‑assessment skills and bilingual communication, and they create culturally aware safety programs for a mid‑size
    manufacturing plant, balancing data‑driven rigor with practical, hands‑on training.
  sports: Maritza Reyes, an avid hiker, tackles the seasonal trails of Racine County with their local hiking group, roots for the Milwaukee Brewers in baseball season, and they follow the Green Bay Packers,
    while preferring low‑impact cardio like Nordic walking over team sports.
  arts: Maritza Reyes, a quiet devotee of history and culture, finds inspiration in the murals of Diego Rivera, the narrative songwriting of Juan Gabriel, and the cinematic storytelling of Guillermo del
    Toro, and they often weave these artistic influences into their book club discussions and weekend puzzle sessions.
  travel: Maritza Reyes prefers thoughtfully planned road trips that combine cultural immersion with natural scenery, having explored the historic districts of Oaxaca, the pueblos of New Mexico, and the
    lakefront towns of Wisconsin such as Door County, and they budget carefully to keep travel within a modest yearly allowance.
  culinary: Maritza Reyes delights in preparing authentic Mexican cuisine, mastering dishes like mole poblano with dried chiles, epazote, and chocolate, hand‑made corn tortillas, and slow‑cooked carnitas,
    while sourcing fresh cilantro, tomatillos, and local heirloom tomatoes from the farmer’s market for their weekly family gatherings, and they take pride in sharing these meals with friends and neighbors.
  core: Maritza Reyes, a pragmatic yet curious safety professional, balances a love for methodical data tracking with a quiet penchant for evening crossword puzzles, and they occasionally let their perfectly
    organized spreadsheets linger untouched while a new novel tempts them to stay up late.
background:
  cultural: Maritza is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English fluently. Family ties and community cohesion are central to her identity,
    and she maintains close relationships with relatives both in Wisconsin and in Mexico. She celebrates cultural traditions such as Día de los Muertos and Mexican Independence Day, often incorporating
    traditional foods and music into family gatherings. These cultural roots shape her respect for collective well‑being and influence her inclusive approach to workplace safety, ensuring that training
    materials and communication respect linguistic and cultural diversity.
attributes:
  skills: '[''OSHA regulations compliance'', ''Hazard identification and risk assessment'', ''Incident investigation and root cause analysis'', ''Ergonomic assessment and injury prevention'', ''Emergency
    response planning and drills'', ''Safety training development and facilitation'', ''Safety audits and inspections'', ''First Aid and CPR certification'', ''Data collection and reporting using Excel
    and Access'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Reading historical nonfiction'', ''Gardening with native plants'', ''Cooking traditional Mexican cuisine'', ''Hiking local trails'', ''Puzzles (jigsaw, crosswords)'', ''Volunteering at community
    health fairs'', ''Participating in a small book club'', ''DIY home improvement projects'']'
  career_goals: Maritza aims to obtain the Certified Safety Professional (CSP) credential within the next three years and to transition into a supervisory role where she can lead a comprehensive safety
    program for a mid‑size manufacturing facility in the Midwest. She plans to pursue a bachelor’s degree in Occupational Health and Safety to deepen her technical knowledge. Long‑term, she hopes to develop
    culturally inclusive safety training curricula that reflect the diverse workforce in Racine, mentor junior safety technicians, and serve on regional safety committees to influence broader occupational
    health policies.
