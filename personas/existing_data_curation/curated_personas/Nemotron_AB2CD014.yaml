  career_goals: Christian aims to transition from a freelance designer to an art director at a regional advertising agency, where he can lead a creative team and shape brand strategies for local businesses.
    He is motivated to win regional design awards and build a signature style that blends his Southern heritage with contemporary visual trends. To support his competitive drive, he plans to complete advanced
    motion‑graphics certification and develop a robust online portfolio that attracts higher‑paying contracts. Ultimately, he hopes to launch his own boutique studio, providing steady work for his family
    while creating a supportive environment for designers who share his collaborative yet high‑energy work ethic.
