personas:
  professional: An experienced bilingual educator, Miriam Lopezlebron leverages four decades of curriculum design and community outreach to mentor teachers, champion structured bilingual policies, and coordinate
    intergenerational programs, all while applying their practical, detail-oriented mindset and outgoing, competitive spirit to ensure every event runs predictably and efficiently.
  sports: Miriam Lopezlebron stays active by attending salsa dancing classes at the local community center, walking with their senior group through Fairmount Park four times a week, and cheering for the
    Philadelphia Eagles and Flyers, while occasionally joining a bridge club that doubles as a mental workout, reflecting their competitive edge and love for structured group activities.
  arts: Miriam Lopezlebron immerses themselves in Latin American literature, discussing works by Gabriel García Márquez and Isabel Allende at their book club, while listening to cumbia legends like Carlos
    Vives and vallenato icons such as Diomedes Díaz, and attending occasional performances at the Kimmel Center, allowing their cultural passions to shape their social circles and creative outlook.
  travel: Miriam Lopezlebron has trekked the historic streets of Cartagena and explored the bustling markets of Bogotá for genealogical research, dreams of a leisurely cruise to the Caribbean islands, and
    prefers well-planned, low-stress itineraries that include visits to family in nearby New Jersey and day trips to the Philadelphia Museum of Art, balancing their love of adventure with the practicalities
    of senior travel.
  culinary: Miriam Lopezlebron expertly prepares traditional Colombian dishes such as arepas de queso, hearty sancocho de gallina, and crispy empanadas rellenas, seasoning them with fresh cilantro, ají
    picante, and cornmeal from their balcony herb garden, and delights in sharing these meals at neighborhood potlucks where they exchange recipes while occasionally indulging in their guilty pleasure of
    extra dulce de leche cake.
  core: Miriam Lopezlebron is a structured, socially vibrant 70-year-old educator who pairs competitive mentorship with salsa dancing, meticulous budgeting, and a habit of over-worrying about health and
    finances, and they often double-check every detail before taking action.
background:
  cultural: Miriam was born in Colombia and grew up immersed in the country’s rich traditions of family, music, and communal gatherings. She migrated to the United States in her early twenties, eventually
    settling in Philadelphia, where she has become an integral part of the Colombian diaspora community. Her upbringing instilled a deep appreciation for Spanish language, Catholic faith, and festive celebrations
    such as Carnaval de Barranquilla and Día de los Muertos, which she continues to observe. In Philadelphia, she blends her Colombian heritage with the city’s multicultural landscape, fostering cross‑cultural
    dialogue through bilingual education, community festivals, and mentorship programs that celebrate both her roots and her adopted home.
attributes:
  skills: '["Bilingual instruction (Spanish/English)", "Curriculum design", "Classroom management", "Culturally responsive lesson planning", "Adult education facilitation", "Community outreach coordination",
