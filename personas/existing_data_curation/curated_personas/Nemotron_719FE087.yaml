  hobbies: '["Salsa dancing", "Cooking Colombian cuisine", "Gardening", "Book club (Latin American literature)", "Walking in parks with a group", "Playing bridge", "Listening to cumbia and vallenato", "Genealogy
    research", "Participating in church festivals"]'
  career_goals: Miriam aims to remain an active contributor to the educational and cultural life of Philadelphia. She plans to mentor emerging teachers, champion bilingual education policies within the
    school district, and expand her volunteer work by establishing a senior‑youth mentorship program that pairs retirees with high‑school students for mutual learning. Additionally, she hopes to document
    her family’s migration story in a memoir and to organize a yearly Colombian cultural festival that celebrates music, dance, and cuisine. Through these initiatives, Miriam seeks to leave a lasting legacy
    while maintaining her health and social connections.
