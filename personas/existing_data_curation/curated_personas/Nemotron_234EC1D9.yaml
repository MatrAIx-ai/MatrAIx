  career_goals: Raul aims to transition from front‑line equipment operation to a supervisory role within the next three years, targeting a shift‑lead or safety coordinator position at his current plant.
    He plans to obtain Advanced Certified Safety Professional (CSP) credentials and a logistics management certification to broaden his expertise. Over the longer term, he hopes to open a small independent
    maintenance and repair shop catering to the Hispanic small‑business community in Tampa, leveraging his bilingual skills and extensive equipment knowledge. He also wishes to improve his organizational
    habits to reduce stress and enhance his reliability, ultimately securing a stable financial foundation for retirement.
