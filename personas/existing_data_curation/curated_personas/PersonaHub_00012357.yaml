persona_description: A historian or archaeologist who specializes in the study of Tibetan Buddhism and its monasteries, particularly those of the Taklung Kagyu lineage. Their interests include the history
  of the monastery's founding, the development of the lineage, and the reconstruction of the site's ruins. They are interested in the life and teachings of the founder, Taklung Thangpa Tashi Pal, and the
  influence of the monastery on the Gelugpa monasteries of Sera and Drepung. They are knowledgeable about the monastery's architecture, its role in the development of the Kagyu sect, and its impact on Tibetan
  Buddhism. They are also interested in the lineage's division into upper and lower branches and the power struggles that ensued.
