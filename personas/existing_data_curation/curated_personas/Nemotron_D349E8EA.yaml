  career_goals: Vickie aims to advance into senior executive leadership, ideally as a Director of Operations or Vice President of Innovation, where she can champion transformative, creativity‑driven initiatives
    across the organization. She aspires to embed mental‑health awareness and emotional resilience into corporate culture, positioning her company as a model for holistic employee well‑being. In the longer
    term, Vickie envisions launching a boutique consulting practice that helps mid‑size firms integrate design thinking and emotional intelligence into their strategic processes, while also pursuing an
    executive certificate in Organizational Psychology to deepen her expertise.
