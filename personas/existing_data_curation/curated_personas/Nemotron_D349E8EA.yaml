  hobbies: '["Abstract Painting", "Mixed‑Media Art", "Contemporary Art Gallery Visits", "Avant‑garde Theater", "Philosophy and Speculative Fiction Reading", "Rocky Mountain Hiking", "Yoga and Mindfulness
