  hobbies: '["Painting (acrylic)", "Sketching", "Digital illustration", "Photography", "Reading speculative fiction", "Poetry writing", "Visiting art galleries", "Mindfulness meditation", "Cooking experimental
    recipes", "Board games"]'
  career_goals: Sandra aims to transition from floor‑level retail work into a visual‑merchandising or brand‑marketing role where she can blend her eye for design with her understanding of consumer behavior.
    She plans to complete her associate degree in marketing or graphic design, build a portfolio of store displays and digital campaigns, and secure an entry‑level visual merchandiser position with a regional
    or national retailer. Long‑term, she hopes to curate her own boutique concept—either physical or online—that showcases emerging artists and sustainable fashion, allowing her to nurture community harmony
    while expressing her artistic vision.
