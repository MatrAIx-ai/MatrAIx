personas:
  professional: Sandra Moncada thrives as a retail associate at a bustling boutique, where they blend meticulous inventory tracking and POS efficiency with an imaginative flair for visual merchandising,
    using their strong communication and conflict‑de‑escalation skills to create harmonious store experiences that reflect their curiosity and desire for novelty.
  sports: Sandra Moncada enjoys casual weekend hikes with the Columbia River Hiking Club and practices yoga at a local studio to counteract stress, while passionately cheering for the Portland Timbers in
    the MLS season and following the Portland Trail Blazers for basketball, balancing low‑intensity fitness with community‑spirit sports fandom.
  arts: Sandra Moncada immerses herself in the arts by painting acrylics inspired by Frida Kahlo’s vibrant palettes, creating digital illustrations that echo the streetwise sarcasm of Banksy, snapping candid
    city scenes reminiscent of Henri Cartier‑Bresson, and attending gallery openings at the Eastside Art Collective, while finding lyrical resonance in Kendrick Lamar’s storytelling and speculative fiction
    by N.K. Jemisin, which together fuel her creative identity.
  travel: Sandra Moncada prefers budget‑friendly, solo travel that blends photographic adventures with cultural immersion, having road‑tripped to Sedona’s red canyons and explored the winding alleys of
    Barcelona, while dreaming of a contemplative journey to Kyoto’s ancient temples, and meticulously planning itineraries on Google Maps to maximize creative inspiration without overspending.
  culinary: Sandra Moncada, an intermediate home cook, delights in whipping up vibrant Thai green curry with fresh lemongrass and coconut milk, mastering a flawless margherita pizza topped with hand‑torn
    basil, and experimenting with avocado toast dusted with smoked paprika, often sourcing organic vegetables at the weekend farmers’ market and treating cooking as a creative extension of her artistic
    practice.
  core: Eagerly balancing a restless imagination with meticulous organization, Sandra Moncada channels their artistic cravings into daily sketches, yet habitually procrastinates on paperwork, frets over
    looming deadlines, and finds solace in late‑night ramen while doodling on receipt margins.
background:
  cultural: Sandra was raised in Augusta, Kansas, a small Midwestern town where community ties, modest living, and a strong work ethic are central values. Her family traces its roots to European immigrants—primarily
    German and Irish—who settled in the region in the early 20th century. The local culture blends church‑centered gatherings, county fairs, high‑school sports, and a growing appreciation for the arts through
    community workshops and a modest local gallery scene. These influences have given Sandra a grounded sense of responsibility and a collaborative spirit, while the town’s modest exposure to creative events
    nurtured her imaginative side.
attributes:
  skills: '["Customer service", "POS operation", "Inventory management", "Visual merchandising", "Digital illustration", "Photography", "Social media content creation", "Microsoft Office (Excel, Word, PowerPoint)",
