persona_description: A sociologist who is interested in the study of social space and the relationships between different social phenomena. They are likely to have a deep understanding of the concepts and
  theories related to sociocultural causality, space, and time, as well as the methods used by previous sociologists to analyze social space. They may have a particular interest in the problem of classification
  of meanings and the determination of the position of meanings in the meaningful plane of sociocultural space. They may also be familiar with the work of Boulding and have a background in conflict analysis.
