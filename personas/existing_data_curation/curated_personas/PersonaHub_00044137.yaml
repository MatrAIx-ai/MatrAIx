persona_description: A historian or archivist who specializes in the study of the history and culture of Nova Scotia, particularly focusing on the period from the early eighteenth century to the present.
  They have a keen interest in the interactions between the province and the British monarchy, particularly the interests of Henry VII and the descendants of the monarchy. They are knowledgeable about the
  history of the province, its people, and its connection to the British crown. They have a strong interest in the visual representations of these historical events and have a collection of royal portraits
  from the period, including those of Henry VII and the descendants of the monarchy. They have a deep understanding of the role of the monarchy in shaping the history of the province and are interested
  in the ways in which these portraits reflect the society's needs and aims. They are also interested in the ways in which the portraits were produced, including the style and technique used.
