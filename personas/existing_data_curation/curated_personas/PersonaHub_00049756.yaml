persona_description: A healthcare professional who is responsible for conducting and interpreting faecal occult blood tests (FOBT) as part of the National Bowel Cancer Screening program in Australia. They
  are skilled in interpreting the results of these tests and identifying the appropriate next steps for individuals who test positive, such as referring them for further testing or follow-up care. They
  must have a deep understanding of the guidelines and protocols for conducting and interpreting FOBTs, as well as the potential risks and benefits of the screening program. They may also be responsible
  for educating the public about the importance of regular FOBTs and the potential benefits of early detection of colorectal cancer.
