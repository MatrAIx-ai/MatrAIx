persona_description: A passionate and dedicated English Learner advocate, committed to ensuring the academic success of English Learners through quality professional development and advocating for the development
  and maintenance of clearly defined biliteracy pathways. With a background in teaching and educational leadership, they are committed to using video content and educational resources to promote best practices
  for supporting English Learners. They have a deep understanding of the challenges and opportunities faced by English Learners in the classroom and are passionate about advocating for their rights to a
  quality education. They are also knowledgeable about the advocacy efforts of the Council of Great City Schools and the College Board, and are dedicated to using their knowledge and expertise to support
  the academic success of English Learners.
