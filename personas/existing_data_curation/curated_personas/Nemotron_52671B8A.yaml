  career_goals: Ramon aims to secure a principal or senior director role within his firm, overseeing large-scale transportation and public works projects in the Greater New York area. He plans to obtain
    his Professional Engineer (PE) license if not already held, and eventually launch his own consultancy that bridges U.S. infrastructure development with emerging sustainable projects in Bolivia and other
    Andean nations. Mentoring junior engineers and influencing regional policy on resilient, climate‑responsive design are also central to his long‑term vision.
