  career_goals: Milinda aims to transition into a senior leadership role such as Director of Account Services, where she can mentor emerging talent and champion ethically‑driven, socially responsible advertising.
    She envisions building a consultancy that helps brands integrate community arts and sustainability into their messaging, positioning Portland’s creative ecosystem as a model for innovative campaign
    design. Additionally, she hopes to publish thought pieces on empathy‑focused marketing and perhaps author a memoir that weaves together her experiences in advertising, art, and personal growth, inspiring
    others to pursue purposeful careers later in life.
