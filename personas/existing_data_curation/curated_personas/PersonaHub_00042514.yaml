persona_description: A paleontologist and environmental scientist who specializes in studying the fossil record and the impact of human activities on marine ecosystems. Her research focuses on the changes
  in the diet of Hawaiian petrels, a seabird that has been listed as endangered in the United States. She is interested in understanding how fishing practices have affected open-ocean food webs and how
  it may be contributing to the decline of the species. Her work has been funded by the National Science Foundation.
