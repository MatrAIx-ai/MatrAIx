  hobbies: '[''Gardening (organic)'', ''Traditional Southeast Asian cooking'', ''Cultural festival participation'', ''Reading mystery novels'', ''Walking on local nature trails'', ''Volunteer computer tutoring'',
    ''DIY home improvement projects'', ''Learning basic Spanish'']'
  career_goals: Pacita values the stability of her current role but aspires to transition into a supervisory or facilities‑management position where she can shape cleaning protocols and mentor a larger
    team. She plans to earn an OSHA 30‑hour certification and complete a short course in green building operations. Additionally, she dreams of launching a small side business offering specialized deep‑cleaning
    and environmentally safe services for local senior‑living communities. Ultimately, she seeks a role that lets her influence workplace standards while securing a steady income for her retirement years.
