persona_description: A research scientist in the field of atmospheric science, specifically focusing on the application of Lagrangian particle dispersion models (LPDMs) for atmospheric transport, with a
  particular interest in using them to derive the upstream influence region on atmospheric measurement locations and to interpret trace gas measurements made at ground-based stations, on airborne platforms,
  and from remote sensing. They are actively developing and using STILT, a stochastic time-inverted Lagrangian transport model, for interpreting trace gas measurements and have a strong background in meteorological
  fields, including the use of various weather prediction models for both analysis of past observations and measurement planning purposes. They are also known for their expertise in interpreting regional
  scale budgets of greenhouse gases and other trace gases, using STILT with high-resolution emission inventories and biospheric flux models.
