persona_description: A political philosopher who advocates for a republic based on good laws and principles, particularly in the context of the United States and its government. He critiques the reliance
  on individuals for governance and argues that adherence to good principles is necessary for having a just republican government. He also refutes the idea that a virtuous citizenry is necessary in order
  to have a good republic. He is critical of the United States government, but believes it is the best yet formed because of its division of power and incorporation of good moral principles.
