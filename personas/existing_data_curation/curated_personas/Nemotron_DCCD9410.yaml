personas:
  professional: Sydney Potter, a 19‑year‑old aspiring journeyman mechanic, blends expert knowledge of hydraulic and pneumatic systems, MIG/TIG welding, CNC operation, and preventive maintenance planning
    with a competitive, skeptical drive that constantly challenges shop‑floor norms, while their outgoing, team‑oriented vibe makes them an informal mentor at the local makerspace and a natural leader on
    maintenance projects.
  sports: Sydney Potter, a 19‑year‑old adrenaline seeker, spends weekends scaling the indoor walls at the Detroit Rock Climbing Center, competes in a local e‑sports league that meets there, fervently follows
    the Detroit Lions (NFL) and Detroit Pistons (NBA), and joins a community salsa dance troupe that performs at city festivals, blending high‑energy physical pursuits with team‑spirit competition.
  arts: Sydney Potter, whose creative outlet extends from DIY woodworking to curating playlists, finds inspiration in the gritty blues of Gary Clark Jr., the industrial electronica of Nine Inch Nails, and
    the cinematic storytelling of Christopher Nolan, often attending maker fairs where they exhibit their handcrafted projects alongside live music from local bands.
  travel: Sydney Potter, eager for both adventure and cultural immersion, has hiked the Shenandoah National Park trails, dreams of touring the autobahn‑lined highways of Germany to explore its automotive
    heritage, plans a future road‑trip through Japan’s Tōkaidō route to study advanced vehicle tech, and prefers to book trips using a flexible, last‑minute travel app that lets them snap up budget flights
    while still budgeting tightly for certification costs.
  culinary: Sydney Potter, an experimental home chef, loves whipping up smoky chipotle‑infused pulled pork tacos, crafting homemade gnocchi with fresh ricotta, and testing unconventional ingredient combos
    like miso‑marinated carrots, while their hands‑on skill level is solid enough to build a custom kitchen workstation but they sometimes over‑season dishes due to their competitive drive to out‑spice
    friends at potluck challenges.
  core: Sydney Potter is a high‑energy, 19‑year‑old mechanic‑in‑training whose blend of skeptical competitiveness, hands‑on curiosity, and sociable leadership fuels relentless pursuit of technical mastery
    while occasionally over‑indulging in late‑night gaming and spicy food challenges.
background:
  cultural: Sydney grew up in Upper Darby, Pennsylvania, a diverse suburban community in Delaware County. Her family traces its roots to Irish and German ancestry, with several generations of tradespeople
    who emphasized hard work, reliability, and community involvement. The public schools she attended offered robust vocational programs that nurtured her practical skills and curiosity for how things work.
    Surrounded by a mix of cultural influences and a strong middle‑class work ethic, she values both tradition and innovation, balancing a pragmatic American outlook with an openness to new ideas.
