  career_goals: Sydney aims to earn her Journeyman mechanic certification within the next two years and become a lead maintenance supervisor at a major manufacturing facility. She is driven to integrate
    advanced IoT predictive‑maintenance technologies into shop processes, reduce equipment downtime, and eventually launch her own specialized industrial‑machinery service firm. Her long‑term ambition is
    to be recognized as an innovator who bridges practical mechanical expertise with emerging digital solutions.
