  hobbies: '["Knitting", "Community Gardening", "Walking in Local Parks", "Reading Historical Romance Novels", "Watching Classic TV Sitcoms", "Journaling", "Cooking Comfort Food", "Flea Market Browsing",
    "Crossword Puzzles", "Attending Farmer’s Markets"]'
  career_goals: Francesca aims to move into a supervisory role, such as Stockroom Shift Lead or Inventory Coordinator, within the next two years. She plans to earn a certificate in supply‑chain management
    from a local community college to strengthen her qualifications. Her goals include improving her personal organization to reduce work‑related stress, securing a stable schedule that accommodates her
    emotional wellbeing, and eventually mentoring younger staff. Long‑term, she hopes to achieve a reliable retirement benefit package while maintaining a predictable, routine‑based work life.
