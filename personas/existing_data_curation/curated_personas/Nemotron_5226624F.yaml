  hobbies: '["Book club (historical fiction)", "Community theater participation", "Gardening (vegetables and flowers)", "Mediterranean cooking classes", "Day trips to Michigan wineries", "Yoga and mindfulness
    practice", "Bridge club", "Volunteer event coordination at local senior center", "Family genealogy research", "Walking with her dog"]'
  career_goals: Approaching retirement, Mary aims to transition her expertise into a mentorship and consulting role. She plans to obtain the Certified Administrative Professional (CAP) credential, formally
    mentor junior administrative staff at her organization, and eventually offer part‑time consulting to small businesses and non‑profits seeking to streamline office processes and improve employee well‑being.
    Additionally, she hopes to serve on the board of a local community service organization, using her organizational talents to support charitable initiatives while maintaining a balanced, low‑stress lifestyle.
