  hobbies: '[''Gardening and vegetable canning'', ''Cooking and baking'', ''Quilting'', ''Church choir participation'', ''Volunteer leadership in community service'', ''Reading historical fiction and mystery
    novels'', ''Walking local park trails'']'
  career_goals: Melissa aims to re-enter the workforce on a part-time basis within the next two years, seeking a role that leverages her organizational strengths, such as office administration or community
    program coordination. She plans to enroll in a local community college to earn an associate’s degree in Business Administration or a certification in Bookkeeping, which would enable her to manage small-business
    finances or provide bookkeeping services for local nonprofits. Additionally, she dreams of turning her love for baking into a modest home-based catering venture, allowing her to combine practical skills
    with a modest entrepreneurial goal while maintaining family responsibilities.
