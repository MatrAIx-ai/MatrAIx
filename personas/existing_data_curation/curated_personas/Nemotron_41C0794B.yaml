  career_goals: Yesenia aims to progress to a senior logistics manager role within the next three years, eventually becoming a director of supply chain operations for a regional distribution network. She
    plans to obtain the Certified Supply Chain Professional (CSCP) credential and pursue a part‑time MBA focused on sustainable logistics. Her ambition is to spearhead initiatives that reduce carbon emissions,
    incorporate advanced analytics, and streamline cross‑border freight between the U.S. and Mexico. She also hopes to mentor emerging logisticians, especially women and bilingual professionals, and to
    balance her career advancement with her family life by fostering a resilient, low‑stress work environment.
