personas:
  professional: Mark Harris, a tech-savvy high-school junior with a knack for hardware repair and trail mapping, blends practical problem-solving with a green-tech mindset, often channeling their curiosity
    into building custom PCs while they brainstorm sustainable solutions for local trail maintenance.
  sports: Mark Harris rides the ramps at the local skate park with the Tier-One Skate Crew, hikes the Cascade foothills with the Oregon Trail Club, and roots for the Oregon Ducks football team while they
    occasionally join the high-school cross-country practice on weekends.
  arts: Mark Harris devours sci-fi epics by Brandon Sanderson and indie fantasy podcasts, strums acoustic renditions of John Mayer's 'Gravity' at the Saturday Market, and curates a small LED art installation
    for a community clean-up event, drawing inspiration from bands like The Strokes and local folk musicians, while they occasionally stay up late debating plot twists with friends online.
  travel: Mark Harris dreams of backpacking the Pacific Crest Trail after a summer camping trip to Smith Rock, has already taken weekend getaways to Portland's tech districts and the Oregon Coast for surf
    lessons, and meticulously plans each outing using Google Maps offline packs, though they must balance the adventure with a modest teen savings fund.
  culinary: Mark Harris enjoys crafting spicy ramen bowls with miso broth, flipping homemade veggie burgers on a portable grill during hikes, and experimenting with DIY granola bars flavored with dried
    cranberries and dark chocolate, but they often forget to clean the kitchen after late-night snack experiments.
  core: Mark Harris is a restless DIY tinkerer who swaps between coding scripts and carving birdhouses, staying up late to perfect a PC build while they habitually miss morning alarms for skate sessions.
background:
  cultural: Mark is a white teenager raised in Eugene, Oregon, in a middle‑class family with ancestry primarily German and Irish. He grew up surrounded by the Pacific Northwest’s outdoor culture, which
    emphasizes environmental stewardship, hiking, and a vibrant local music scene. His community is known for progressive values and a strong support for independent arts, influencing his appreciation for
    both practical skills and creative pursuits. He celebrates mainstream American holidays such as Thanksgiving and Christmas, and participates in local traditions like the Eugene Saturday Market and volunteer
    river clean‑ups.
attributes:
  skills: '["Computer hardware troubleshooting", "Basic programming (Python, JavaScript)", "Outdoor navigation and trail maintenance", "Team collaboration and event coordination", "Basic woodworking"]'
  hobbies: '["Reading sci‑fi and fantasy novels", "Playing strategy video games", "Skateboarding", "Hiking in the Cascade foothills", "Playing acoustic guitar", "Building and customizing PCs"]'
  career_goals: Mark aims to turn his curiosity for technology and love of the outdoors into a hands‑on career. He plans to earn his GED and enroll in a vocational program that combines IT support with
    sustainable trades, such as a green‑tech apprenticeship or a community college certificate in computer repair and renewable energy installation. In the longer term, he envisions running his own small
    business offering tech repair services and outdoor equipment maintenance, or possibly designing software tools for trail management.
