personas:
  professional: A seasoned fabricator and assembler, Bennett Fonseca leverages precision mechanical assembly, CNC operation, and Six Sigma fundamentals to streamline high‑tech manufacturing workflows, all
    while they mentor apprentices with a calm, resilient demeanor that balances curiosity for new solutions with a disciplined, practical approach.
  sports: An outdoor enthusiast, Bennett Fonseca spends weekends hiking the coastal cliffs of San Mateo and cycling with the Bay Area Trail Club, while they cheer on the San Francisco Giants, Golden State
    Warriors, and San Jose Earthquakes during the sports season.
  arts: A meticulous maker, Bennett Fonseca channels creativity into woodworking and scale model construction using SolidWorks, while they unwind to the mellow sounds of Bon Iver and visit the SFMOMA to
    admire works by Banksy and Yayoi Kusama that inspire their design sensibilities.
  travel: A detail‑oriented traveler, Bennett Fonseca plans methodical weekend getaways to coastal spots like Big Sur and Napa Valley for quiet hikes and wine tastings, and they dream of a spring immersion
    in Lisbon’s historic neighborhoods and Kyoto’s serene temples, balancing adventure with a modest travel budget.
  culinary: A culinary hobbyist, Bennett Fonseca perfects traditional Portuguese bacalhau à Brás with salted cod, onions, and olives while they also craft home‑brewed pale ales infused with citrus zest,
    and they delight in seasoning grilled sardines with smoked paprika and fresh lemon.
  core: Bennett Fonseca blends calm, precise craftsmanship with a quiet curiosity, obsessively fine‑tuning wood joints and CAD parts while they occasionally neglect social invites in favor of a perfectly
    balanced workbench.
background:
  cultural: Bennett is a second‑generation American of Portuguese descent, raised in the culturally diverse environment of South San Francisco. His family maintains traditions such as celebrating Festa
    de São Jorge, preparing seafood meals, and attending Mass, which have instilled a strong sense of community and respect for heritage. Growing up in the Bay Area, he has absorbed progressive Californian
    values, including environmental stewardship and a collaborative work ethic. This blend of Portuguese cultural roots and the innovative, eco‑conscious spirit of his hometown shapes his identity, influencing
    both his professional approach and personal interests.
attributes:
  skills: '[''Mechanical assembly'', ''Electrical wiring'', ''CNC machine operation'', ''Blueprint interpretation'', ''Welding (MIG/TIG)'', ''Quality control inspection'', ''Lean manufacturing practices'',
