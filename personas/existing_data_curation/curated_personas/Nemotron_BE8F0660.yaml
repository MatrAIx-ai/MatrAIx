  hobbies: '[''Woodworking'', ''Scale model building'', ''Coastal hiking'', ''Cycling'', ''Cooking Portuguese cuisine'', ''Reading tech literature'', ''DIY electronics (Arduino/Raspberry Pi)'', ''Home brewing'']'
  career_goals: Bennett aims to leverage his hands‑on experience into a supervisory and engineering track within the high‑tech manufacturing sector of the Bay Area. He plans to earn a Certified Production
    Technician credential and a Six Sigma Yellow Belt within the next two years, positioning himself for a shift‑lead role. Over the longer term, he aspires to become a production manager who can integrate
    sustainable manufacturing practices, mentor a small crew, and contribute to process innovation. His calm resilience and practical curiosity drive his ambition to blend operational reliability with continuous
    improvement, ultimately providing a stable and progressive career path for his family.
