  career_goals: Although retired, Maria remains goal‑oriented and seeks to leave a lasting legacy for her family and community. Her primary ambition is to document and preserve her family’s history through
    a detailed genealogy scrapbook that she can share with her grandchildren. She also aims to maintain her independence by sustaining her home and garden, ensuring they remain safe and productive. Maria
    aspires to continue contributing to her church and local senior center by mentoring younger volunteers, sharing her organizational expertise, and coordinating seasonal charitable drives. Ultimately,
    she wishes to be remembered as a steadfast and reliable pillar of her neighborhood, whose practical skills and calm demeanor have helped many generations.
