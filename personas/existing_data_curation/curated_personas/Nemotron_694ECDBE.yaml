personas:
  professional: Victoria Gotay, a 30‑year‑old industrial assembler, blends their mechanical aptitude with a relaxed attitude toward rigid schedules, applying lean‑manufacturing principles and improvisational
    metal‑craft skills to streamline production while mentoring peers and eyeing a lead‑assembler role within three years.
  sports: Victoria Gotay stays active by playing in a local co‑ed soccer league, cheering for the Dallas Cowboys on Sundays, and weaving traditional dance routines from cultural festivals into their cardio
    workouts, preferring casual team play over rigid gym regimens.
  arts: Victoria Gotay regularly visits the Dallas Museum of Art and neighborhood folk galleries, draws inspiration from Frida Kahlo’s vibrant palettes and Ai Weiwei’s metal installations, and channels
    that influence into DIY metal wall art that fuses traditional motifs with contemporary geometry.
  travel: Victoria Gotay enjoys spontaneous weekend road trips to Austin’s live‑music scene and San Antonio’s River Walk, while dreaming of a culturally immersive journey to Oaxaca for Day of the Dead celebrations,
    balancing limited budget constraints with a love for experiential travel.
  culinary: Victoria Gotay delights in cooking mole poblano, tamales, and experimenting with a Texas‑Mexican fusion by adding smoked brisket to tacos, often juggling a cluttered countertop and a playlist
    of regional corridos while perfecting the balance of chilies, epazote, and chocolate.
  core: Victoria Gotay is a mechanically savvy, art‑driven assembly specialist whose flexible, occasionally disorganized approach fuels both creative metal projects and a love for vibrant cultural celebrations.
background:
  cultural: Victoria is a first‑generation Mexican‑American whose family roots trace back to Jalisco. She grew up speaking both Spanish and English, and family gatherings are centered around traditional
    foods, music, and celebrations such as Día de los Muertos and Las Posadas. Living in Garland, Texas, she participates in the vibrant Hispanic community, volunteering at local cultural events and supporting
    bilingual education programs. Her Mexican heritage informs her aesthetic sensibility, especially in the vibrant colors and patterns she incorporates into her creative projects, while her Texan upbringing
    adds a blend of Southern hospitality and practical resilience.
