  career_goals: She aims to move into a lead assembler or floor supervisor role within the next three years, pursuing certifications such as OSHA safety, CNC machining, and Six Sigma Yellow Belt. Victoria
    also dreams of launching a side business that blends her love for art and fabrication — creating bespoke metal décor inspired by Mexican folk motifs. In the long term she hopes to become a mentor for
    new workers, sharing both technical expertise and a flexible, creative problem‑solving mindset.
