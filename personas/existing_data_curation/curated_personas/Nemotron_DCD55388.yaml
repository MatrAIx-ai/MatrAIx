  hobbies: '[ ''Dance classes'', ''Storytelling volunteering'', ''Craft circles'', ''Gardening'', ''Baking'', ''Hiking'', ''Attending community festivals'', ''Exploring local history sites'' ]'
  career_goals: She aims to advance to a lead teacher or curriculum coordinator role within her district, pursuing a master's degree in Early Childhood Education to deepen her expertise. Marie aspires to
    develop inclusive, arts-rich programs that support social-emotional development and to mentor new teachers. Long-term, she envisions establishing a community-based early learning center that offers
    holistic, culturally responsive education for families in Boone County.
