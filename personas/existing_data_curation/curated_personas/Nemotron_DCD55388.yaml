personas:
  professional: Marie Mcclimans is an early childhood educator who designs arts‑integrated curricula, balances structured lesson plans with spontaneous creative play, and mentors fellow teachers while they
    quietly fret over meeting every benchmark.
  sports: Marie Mcclimans is an avid weekend hiker who joins the Bluegrass Trail Runners, roots for the Kentucky Wildcats basketball team, follows the Louisville Cardinals football squad, and they squeeze
    in a weekly community yoga class to unwind from classroom stress.
  arts: Marie Mcclimans is a contemporary dance enthusiast who choreographs storytelling sessions at the county library, leads a craft circle inspired by the folk music of The Avett Brothers and the paintings
    of Mary Cassatt, and they fill quiet moments listening to the acoustic melodies of Gillian Welch while baking.
  travel: Marie Mcclimans prefers meticulously planned road trips across the rolling hills of Kentucky, enjoys weekend getaways to Asheville’s Blue Ridge Mountains and Nashville’s music scene, and they
    dream of a summer sojourn to the historic streets of Edinburgh, balancing adventure with a modest travel budget.
  culinary: Marie Mcclimans is an intermediate baker who crafts seasonal desserts like peach cobbler with fresh garden‑picked peaches, pumpkin spice cheesecake infused with cinnamon and nutmeg, and lemon
    drizzle cake topped with lavender sugar, while they also delight in whipping up savory herb‑roasted chicken using rosemary and thyme from their backyard garden.
  core: Marie Mcclimans blends a love of structured learning with a restless social energy, and they constantly juggle lesson plans, craft projects, and baking experiments, while silently fretting over
    the next deadline and secretly hoarding a stash of extra cookies for late‑night comfort.
background:
  cultural: Marie was raised in the suburban outskirts of Lexington, Kentucky, embracing a blend of Midwestern practicality and Southern hospitality. Her family traditions emphasize community involvement,
    church fellowship, and appreciation for local customs such as the Kentucky Derby and regional cuisine. This cultural mix informs her warm, cooperative nature and her desire to create inclusive, community-focused
    learning environments.
