  hobbies: '[''Visiting art galleries and museums'',''Cooking Mexican cuisine'',''Playing soccer in a local league'',''Gardening native plants'',''Volunteering at community centers'',''Participating in
    local festivals and cultural events'',''Listening to and playing music (guitar)'',''Dancing (cumbia, salsa)'',''Reading about art and history'',''Traveling within Texas and Mexico'']'
  career_goals: Alexander aims to re‑enter the workforce on a part‑time or project basis, focusing on roles that blend his love for culture, community, and hospitality. He plans to pursue a certification
    in community program management through a local community college, intending to become a cultural liaison or program coordinator for the City of San Antonio's recreation department. He also envisions
    launching a small catering service that highlights regional Mexican cuisine for events and festivals. Long‑term, he hopes to mentor younger members of the Mexican‑American community, fostering appreciation
    for the arts and cultural heritage while maintaining a stable contribution to his family’s financial well‑being.
