personas:
  professional: Penny Sutton is a retired community organizer who has turned her decades‑long expertise in household budgeting, garden stewardship, and event coordination into a modest home‑based quilt
    and knitting business, while also mentoring teenage volunteers at the senior center, applying her methodical, structured mindset and calm assertiveness to keep projects on schedule and ensure every
    piece benefits the local scholarship fund.
  sports: Penny Sutton enjoys a daily brisk walk around the neighborhood park, follows the Columbus Crew SC soccer team with casual enthusiasm, participates in low‑impact yoga classes at the senior center,
    and avoids high‑intensity sports due to their osteoarthritis, combining gentle activity with a love for communal sports fandom.
  arts: Penny Sutton finds creative fulfillment in knitting quilts for charitable donations, singing traditional hymns with the church choir while listening to the timeless jazz standards of Ella Fitzgerald,
    and reading historical fiction by authors such as Philippa Gregory, weaving together hands‑on craftsmanship, musical devotion, and literary escapism.
  travel: Penny Sutton prefers low‑key, short‑duration trips, often taking weekend drives to historic towns like Savannah and Charleston to explore antebellum architecture, while dreaming of a quiet retreat
    in Asheville’s Blue Ridge Mountains, planning each journey with a detailed itinerary to balance budget constraints and a love for cultural heritage sites.
  culinary: Penny Sutton delights in preparing Southern comfort foods such as buttermilk fried chicken, collard greens simmered with smoked turkey, and sweet potato casserole topped with toasted pecans,
    enjoys moderate cooking skills sharpened by years of family gatherings, and relishes experimenting with heirloom corn and okra in new recipes.
  core: Penny Sutton is a structured, garden‑loving senior who blends quiet creativity, community service, and disciplined budgeting into a life of purposeful solitude and gentle assertiveness.
background:
  cultural: Penny Mae is an African‑American woman whose family migrated to Ohio during the Great Migration of the early 20th century, settling in Columbus’s Hilltop neighborhood. Raised in a devout Baptist
    household, the church has been a cornerstone of her cultural identity, providing a support network and a platform for community service. She grew up hearing oral histories of civil‑rights activism from
    older relatives, which fostered a strong sense of social responsibility and pride in African‑American heritage. Food, music, and storytelling are integral to her family traditions, and she maintains
    these customs through cooking soul food, participating in gospel singing, and preserving family recipes. Her cultural experiences are interwoven with the broader history of Columbus’s Black community,
    including involvement in local festivals and historic preservation efforts.
