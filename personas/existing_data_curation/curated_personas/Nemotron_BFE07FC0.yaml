    ''Employee engagement measurement'', ''Process improvement and Lean HR practices'']'
  hobbies: '[''Reading nonfiction'', ''Journaling'', ''Gardening'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking and baking'', ''Hiking'', ''Volunteering at an animal shelter'']'
  career_goals: Lyubov aims to advance from her current HR generalist role to a senior HR manager position within the next three years, focusing on strategic workforce planning and measurable employee‑engagement
    initiatives. She plans to earn the SHRM‑CP certification, followed by SHRM‑SCP, and to lead a company‑wide performance‑management overhaul that reduces turnover by at least 15 %. In the longer term,
    she envisions founding a boutique HR consulting practice that helps small and mid‑size firms in the Midwest implement structured, data‑driven HR processes and build resilient workplace cultures.
