  hobbies: '[''Fishing'', ''Motorcycle restoration'', ''Traditional Mexican cooking'', ''Spanish-language book club'', ''Coastal hiking'', ''Mentoring at-risk youth'', ''Listening to ranchera music'', ''Attending
    local cultural festivals'']'
  career_goals: He aims to obtain the Certified Building Official (CBO) credential and advance to a supervisory role within the Cameron County Building Inspection Department. Long‑term, Abelardo envisions
    launching a consulting firm that provides safety audits and code‑training workshops for small contractors and homeowners. He also hopes to expand his community impact by leading safety‑awareness programs
    for local schools and volunteering his expertise on Habitat for Humanity projects.
