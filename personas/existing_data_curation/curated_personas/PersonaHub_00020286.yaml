persona_description: A farmer who takes great care to protect their livestock from the dangers of frostbite and hypothermia during calving season. They are experienced in managing weather conditions, windbreaks,
  bedding, and housing to ensure their calves are safe and warm. They are attentive to the needs of their calves and use a variety of techniques to maintain their health and well-being, including thawing
  tissues quickly, refreezing, and careful observation. They are also aware of the importance of providing adequate intake of the first milk and physical activity to maintain and generate the heat needed
  for their calves to stay warm.
