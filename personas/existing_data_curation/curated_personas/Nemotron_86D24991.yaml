personas:
  professional: Erica Robinson, a seasoned accountant and auditor, combines their methodical precision, mastery of QuickBooks, SAP, and advanced Excel/VBA with a natural curiosity for the arts to deliver
    clear, visual financial insights for nonprofit clients, while mentoring junior staff with a collaborative, compassionate style.
  sports: Erica Robinson stays active through weekly Latin‑African rhythm dance classes, early sunrise walks along Lake Michigan, and cheering for the Milwaukee Bucks and Brewers, while they also play badminton
    at a community center during the summer months.
  arts: Erica Robinson immerses themselves in the arts by attending live jazz performances featuring Gregory Porter and Wynton Marsalis, exploring contemporary exhibitions at the Milwaukee Art Museum, and
    discussing works by diverse authors in their book club, letting these experiences inspire creative problem‑solving in their audits.
  travel: Erica Robinson prefers culturally rich trips, meticulously planning a jazz heritage tour of New Orleans, a culinary weekend in Door County, and a family museum outing in Washington, D.C., balancing
    exploration with careful budgeting for future CPA exam costs.
  culinary: Erica Robinson delights in cooking soul‑inspired meals such as collard greens seasoned with garden‑grown thyme and rosemary, jambalaya, and sweet potato pie, often using fresh herbs from their
    backyard garden and sharing these dishes at community potlucks.
  core: Erica Robinson blends meticulous financial expertise, vibrant community involvement, a love for jazz and visual art, and a garden‑fresh culinary flair into an energetic, purpose‑driven life at 57.
background:
  cultural: Erica identifies as African American, with family roots that trace back to the Great Migration from the Southern United States to the Midwest. Growing up in Milwaukee's historic African‑American
    neighborhoods, she was immersed in a strong church community, the traditions of soulful music, and the values of resilience and collective uplift. She celebrates Black cultural holidays and participates
    in local festivals that honor African‑American heritage. Erica is an active member of the Milwaukee Chapter of the National Association of Black Accountants and supports initiatives that promote economic
    empowerment for Black families. Her cultural identity informs her appreciation for art, her commitment to community service, and her desire to mentor the next generation of Black professionals.
attributes:
  skills: '[''Financial Statement Analysis'', ''Audit Planning and Execution'', ''Tax Preparation'', ''Regulatory Compliance'', ''QuickBooks'', ''SAP'', ''Microsoft Dynamics'', ''Advanced Excel & VBA'',
    ''Data Visualization'', ''Risk Assessment'', ''Forensic Accounting'', ''Team Leadership'', ''Mentorship'']'
  hobbies: '[''Visiting art museums'', ''Attending jazz and blues concerts'', ''Reading diverse literature'', ''Participating in a book club'', ''Financial literacy volunteering'', ''Gardening'', ''Latin
    and African dance classes'', ''Exploring new cuisines'']'
  career_goals: Erica aims to obtain her Certified Public Accountant (CPA) credential within the next two years, leveraging her extensive practical experience to qualify for senior management roles. She
    aspires to become a senior audit manager in a firm that serves nonprofit and community‑based organizations, allowing her to combine her financial expertise with her passion for supporting cultural and
    social initiatives. Long‑term, she envisions establishing a boutique consulting practice focused on financial literacy and fiscal sustainability for small Black‑owned businesses and arts organizations
    in Milwaukee. She also hopes to serve as a mentor and speaker for professional groups such as the National Association of Black Accountants, encouraging more women of color to pursue careers in finance.
