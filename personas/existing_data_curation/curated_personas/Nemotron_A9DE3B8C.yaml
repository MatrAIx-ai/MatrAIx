  career_goals: Even at four, Venugopal loves imagining big‑picture jobs. He frequently says he wants to be a firefighter because he admires the bright trucks and helping people, an astronaut to explore
    space, and a soccer player to run fast with his friends. His ambitions are driven by his energetic, competitive nature and his desire to make a tangible impact in his community.
