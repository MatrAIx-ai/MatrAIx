personas:
  professional: Carlos Martinez, a retired mechanical engineer, they leverage a lifetime of hands‑on mechanical troubleshooting, basic electrical repair, and DIY design to mentor seniors and high‑school
    students through STEM workshops at the local senior centre, while also applying their woodworking and 3D‑printing skills to a community garden project and a vintage Chevrolet restoration, balancing
    curiosity with a relaxed, flexible planning style.
  sports: Carlos Martinez enjoys watching classic baseball games, cheering for teams such as the Los Angeles Dodgers and New York Yankees, they take leisurely walks around the town’s lakes several times
    a week, and on weekends they join a senior‑centre pickle‑ball league and attend local community sports events, balancing passive fandom with low‑impact physical activity.
  arts: Carlos Martinez finds artistic inspiration in folk ballads performed by regional troubadours and classic big‑band swing recordings of Benny Goodman, they attend the annual local heritage festival
    to watch traditional dance performances, regularly read popular science magazines like Scientific American, and blend scientific curiosity with a love for cultural storytelling.
  travel: Carlos Martinez prefers relaxed road trips to historic towns and occasional Gulf‑Coast cruises, they have visited the mission of San Antonio and dream of exploring the ancient ruins of Teotihuacan,
    balancing a modest travel budget with a desire to experience cultural landmarks and natural scenery.
  culinary: Carlos Martinez delights in cooking chiles rellenos stuffed with cheese and raisins and simmering a hearty pozole with hominy, pork, chilies, cilantro, oregano and jalapeños, they grow these
    herbs in their garden to boost fresh flavors, experiment with smoked paprika and masa harina to enhance traditional dishes, though they sometimes over‑season while enthusiastic.
  core: Carlos Martinez is a curious, hands‑on retiree who blends engineering ingenuity with gardening, woodworking, and community mentorship, yet wrestles with disorganization and worry, staying active
    through model rockets, vintage car restoration, and leisurely walks.
background:
  cultural: Carlos was born to Mexican immigrants in the Rio Grande Valley and moved to Texas as a teenager. He grew up speaking Spanish at home while learning English at school, giving him a bicultural
    perspective. His family traditions include celebrating Día de los Muertos, Easter Semana Santa processions, and cooking family recipes passed down through generations. Living in Denton, he bridges his
    Mexican roots with the Texan community, participating in local Mexican festivals and volunteering at the Hispanic senior outreach program. His Catholic upbringing and strong sense of familial responsibility
    shape his values of respect, perseverance, and community service.
