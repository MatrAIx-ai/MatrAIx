  hobbies: '["Gardening (vegetables and herbs)", "Cooking traditional Mexican dishes", "Reading popular science and space news", "Building model rockets and airplanes", "Woodworking projects", "Playing
    chess", "Attending cultural festivals", "Walking around local lakes", "Watching baseball"]'
  career_goals: Even in retirement, Carlos aims to stay mentally active and socially useful. He hopes to develop a community garden space that incorporates sustainable water‑use practices, mentor high‑school
    students interested in engineering, and complete a personal project building a restored vintage Chevrolet. He also wants to maintain his health through regular walks and join a local book club. A longer‑term
    ambition is to document his family’s migration story and preserve it for future generations.
