  hobbies: '[''Fishing'', ''Duck hunting'', ''Playing acoustic guitar'', ''Attending bluegrass and zydeco concerts'', ''DIY woodworking'', ''Organizing community barbecues'', ''Car restoration projects'',
    ''Church volunteer work'', ''Storytelling at gatherings'']'
  career_goals: While approaching the typical retirement age, David aims to transition into a supervisory or lead trainer role where he can combine his hands‑on expertise with his love for mentoring. He
    plans to earn a certification in programmable logic controller (PLC) programming and safety management, positioning himself as a go‑to resource for process‑improvement projects. In the longer term,
    he dreams of starting a small consulting service that helps local manufacturers adopt more efficient packaging workflows, giving him the flexibility to work on his own schedule and reduce daily stress.
