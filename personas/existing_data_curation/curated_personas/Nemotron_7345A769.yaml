  hobbies: '["Building LEGO models", "Playing soccer", "Exploring nature (hiking, birdwatching)", "Reading adventure and science‑fiction books", "Coding simple games with Scratch", "Drawing comics", "Collecting
    rocks", "Gardening with family"]'
  career_goals: Guided by his curiosity and practical mindset, Troy dreams of becoming an engineer—particularly a robotics or civil engineer—who designs useful tools and structures for his community. He
    is also fascinated by wildlife and hopes to study environmental science or become a wildlife biologist to protect the natural areas he loves exploring. In the short term, he aims to join his school's
    robotics club, lead a science‑fair project, and continue building more complex LEGO creations that could one day inspire real‑world inventions.
