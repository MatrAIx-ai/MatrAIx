  career_goals: Looking ahead, Jennifer aims to transition into a nurse educator role by completing her BSN and pursuing a Master's in Nursing Education, so she can shape the next generation of nurses.
    She is also interested in designing a community wellness program that combines preventive health with creative arts workshops for seniors and families in LaSalle County. In the longer term, she hopes
    to lead quality-improvement initiatives within her health system and serve on local health advisory boards, using her blend of clinical expertise and artistic curiosity to promote holistic care.
