personas:
  professional: A seasoned nurse with over 25 years in acute and chronic care, Jennifer Keeney blends expert wound management and health assessment skills with a passion for art‑based therapeutic activities,
    using their strong interpersonal talent to mentor staff and spearhead community wellness programs that integrate creative workshops for seniors.
  sports: A fitness‑oriented community member, Jennifer Keeney energizes weekends with Zumba sessions at the Peoria Community Center, hikes with the Peoria Trailblazers Club, and avidly supports the Chicago
    Cubs and Chicago Bears while they also cheer on the Chicago Bulls during the NBA season.
  arts: An avid creative, Jennifer Keeney paints Midwestern landscapes reminiscent of Monet, sculpts pottery inspired by the tactile works of Clay Smith, attends theater productions such as 'The Glass Menagerie'
    at the Peoria Civic Center, and regularly explores gallery openings featuring emerging artists at the Riverfront Museum, while they find literary inspiration from Celeste Ng and listen to folk legends
    like John Prine.
  travel: An adventurous yet relaxed traveler, Jennifer Keeney enjoys spur‑of‑the‑moment road trips to art‑rich destinations like Santa Fe and Asheville, relishes cultural immersion on a recent Tuscany
    culinary tour, and plans future visits to Kyoto’s temples, always favoring flexible itineraries that they can adapt for group outings with friends.
  culinary: An enthusiastic home cook, Jennifer Keeney cultivates heirloom tomatoes, rosemary, and basil in their garden, then they craft meals such as lemon‑dill grilled salmon, basil‑pesto pasta, and
    rustic sourdough bread, balancing comfort food with occasional experimental dishes featuring local farm‑to‑table ingredients.
  core: Jennifer Keeney is a curious, art‑infused nurse educator who blends community wellness with creative expression, balances flexible spontaneity with occasional disorganization, and they thrive on
    vibrant social connections and a zest for lifelong learning.
background:
  cultural: Jennifer was raised in the Midwestern town of Sandwich, Illinois, in a family of primarily English‑Irish ancestry. The region’s small‑town values—friendliness, practicality, and strong community
    ties—shaped her outlook, while her Protestant upbringing emphasized service and compassion. Growing up in LaSalle County exposed her to a blend of agricultural roots and a modest industrial presence,
    fostering an appreciation for both hard work and local traditions. Over the years she has embraced the cultural diversity of the broader Chicago area through travel and arts exposure, integrating that
    openness into her personal and professional life.
