personas:
  professional: Christopher Riggs, a veteran machinist turned CNC programming specialist, leverages three decades of hands‑on workshop mastery and an artistic eye to lead a small team in crafting precision
    parts that double as sculptural pieces, while they mentor apprentices through clear, no‑nonsense guidance.
  sports: Christopher Riggs is a steadfast fan of the Indianapolis Colts and the Indiana Hoosiers basketball team, regularly watches their games at the local tavern, and they spend weekends fishing at Montezuma
    State Park while participating in a community softball league that meets at the high school field.
  arts: Christopher Riggs channels their curiosity into sketching rust‑kissed factory silhouettes and crafting small metal sculptures, drawing inspiration from the industrial aesthetic of Charles Sheeler
    and the folk metal works of local maker John Riley, and they frequently visit the Indianapolis Museum of Art and the Crawfordsville Art Association’s monthly exhibitions.
  travel: Christopher Riggs prefers low‑key road trips that blend work and wonder, having driven the historic Route 66 to explore the Cadillac Ranch, taken a weekend tour of Chicago’s industrial architecture,
    and they dream of a future visit to Germany’s Ruhr region to see its steel heritage up close.
  culinary: Christopher Riggs enjoys hearty Midwestern fare, often grilling a perfectly seasoned steak or smoking a brisket seasoned with paprika and brown sugar, savoring classic dishes like pork tenderloin
    with apple sauce, corn chowder, and a slice of homemade blueberry pie made with fresh farm berries, and they relish experimenting with wood‑smoked flavors in the backyard.
  core: Christopher Riggs blends a steady, hands‑on work ethic with a hidden artistic streak, balancing meticulous CNC precision with impromptu metal sculpting, and they maintain a frugal yet occasionally
    indulgent lifestyle that reflects their Midwestern roots.
background:
  cultural: Christopher grew up in a modest, working‑class community in Crawfordsville, Indiana, where manufacturing and agriculture shaped daily life. His family valued practical skills, reliability, and
    active participation in local traditions such as county fairs, high school sports, and community art shows. This Midwestern environment fostered a straightforward communication style, a strong sense
    of self‑reliance, and an appreciation for hands‑on problem solving. Although he left formal schooling before ninth grade, the region's emphasis on apprenticeship and lifelong self‑education allowed
    him to develop his trade through on‑the‑job learning and informal mentorship. The separation from his spouse has reinforced his independent outlook, yet he remains deeply connected to longtime friends,
    the local makerspace, and community events that reflect the collaborative spirit of his cultural upbringing.
attributes:
  skills: '[''CNC milling'', ''Lathe operation'', ''Blueprint reading'', ''Precision measuring (micrometers, calipers)'', ''Machine maintenance and lubrication'', ''Troubleshooting mechanical issues'',
    ''Lean manufacturing practices'', ''Team mentoring'', ''Basic CAD design (SolidWorks)'', ''Creative problem solving'']'
  hobbies: '[''Sketching industrial scenes'', ''Visiting local art museums and galleries'', ''Creating small metal sculptures'', ''Building model airplanes'', ''Fishing at Montezuma State Park'', ''Participating
    in a community makerspace'', ''Reading science fiction and engineering history'', ''Playing acoustic guitar'', ''Volunteering to teach basic shop skills to kids'']'
  career_goals: Christopher aims to transition from a senior shop floor role to a lead CNC programmer and technical mentor, overseeing a small team while integrating artistic design concepts into industrial
    parts. He plans to earn an advanced CNC certification and deepen his proficiency in CAD/CAM to produce custom metal art pieces as a side venture. Over the next five years, he hopes to establish a small
    boutique fabrication studio that serves both functional manufacturing clients and local artists, eventually moving into a consulting and training capacity where he can share his blend of practical expertise
    and creative thinking with a broader audience.
