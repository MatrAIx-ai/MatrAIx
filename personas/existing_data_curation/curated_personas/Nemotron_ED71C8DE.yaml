  hobbies: '[''Coaching Adult Soccer'', ''Cooking Mexican Cuisine'', ''Community Festival Participation'', ''Woodworking'', ''Weekend Hiking'', ''Youth Mentorship'', ''Weekly Social Gatherings'', ''Listening
    to Vintage Mexican Music'']'
  career_goals: Gerardo aims to rise to a senior leadership role such as Vice President of Operations within the next five years, overseeing multiple facilities and spearheading a company‑wide operational‑excellence
    program. He plans to earn a Six Sigma Black Belt and an MBA to complement his STEM background. In the longer term, he aspires to launch a consulting firm that helps Mexican‑owned small manufacturers
    adopt lean practices, while also establishing a mentorship network for youth in Montgomery and surrounding communities.
