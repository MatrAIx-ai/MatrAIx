personas:
  professional: Carmen Alexander, a 20‑year‑old visual storyteller whose scientific background and vivid imagination drive their use of Python‑based batch editing, drone‑captured 3D mapping, and client‑centric
    project planning to produce narrative‑rich portrait and documentary work that amplifies under‑represented community stories, and they thrive on collaborative brainstorming sessions.
  sports: Carmen Alexander, a 20‑year‑old who hikes the Appalachian foothills on weekends, participates in the Knoxville Striders running club for trail runs, and follows the Tennessee Volunteers football
    and Nashville Predators hockey teams, balancing cardio hikes with occasional yoga sessions to maintain flexibility, and they often organize group hikes with friends.
  arts: Carmen Alexander, a 20‑year‑old who fills sketchbooks with concept art inspired by speculative fiction authors like N. K. Jemisin, immerses in contemporary galleries showcasing Olafur Eliasson’s
    installations, and attends live acoustic shows at Knoxville’s The Clarion featuring performers such as The Milk Carton Kids and jazz vocalist Cécile McLorin Salvant, and they frequently share their
    sketches on Instagram.
  travel: Carmen Alexander, a 20‑year‑old who meticulously plans road‑trip photography excursions, has explored the historic streets of Savannah and the misty cliffs of the Great Smoky Mountains, dreams
    of photographing the aurora borealis in Tromsø, Norway, and balances wanderlust with a modest freelance budget, and they keep a travel journal for each trip.
  culinary: Carmen Alexander, a 20‑year‑old home cook who blends Southern soul food with global flavors—think miso‑glazed shrimp and grits, smoked‑paprika collard greens, and cardamom‑spiced sweet‑potato
    pie—while curating jazz playlists, and they love pairing each dish with a curated jazz playlist, and they occasionally splurge on farm‑to‑table diners for a taste of fresh oysters.
  core: Carmen Alexander, a 20‑year‑old endlessly curious visual storyteller who juggles late‑night coding marathons, impromptu jam sessions, and a habit of forgetting to drink water during hikes, and they
    embody a vibrant blend of scientific precision and artistic spontaneity.
background:
  cultural: Carmen was raised in Knoxville as a second-generation African-American, with family roots that trace back to the Great Migration. Her upbringing blended the warmth of Southern hospitality, church-based
    community rituals, and the oral storytelling traditions of Black culture. Growing up in a predominantly white neighborhood and attending a STEM-focused university sharpened her awareness of representation,
    prompting her to champion inclusive narratives through her photography. She is actively involved in local Black art collectives, celebrates Juneteenth and Kwanzaa with her family, and draws inspiration
    from the culinary, musical, and literary heritage of the African-American South.
attributes:
  skills: '[''Portrait Photography'', ''Street Photography'', ''Conceptual and Abstract Photo Series'', ''Studio Lighting'', ''Natural Light Techniques'', ''Drone Photography'', ''Adobe Lightroom'', ''Adobe
    Photoshop'', ''Capture One'', ''Python for Image Processing'', ''Metadata Management'', ''Color Science'', ''Data Visualization'', ''Project Management'', ''Social Media Marketing'', ''Public Speaking'',
    ''Event Coordination'', ''Community Outreach'']'
  hobbies: '[''Reading Speculative Fiction'', ''Visiting Art Galleries and Museums'', ''Hiking in the Appalachian Foothills'', ''Cooking Modern Southern Soul Food'', ''Playing Acoustic Guitar'', ''Attending
    Live Jazz and Acoustic Performances'', ''Sketching Visual Concepts'', ''Mentoring Youth in Coding Clubs'', ''Participating in Black Photographers’ Meet-ups'', ''Exploring AI-generated Art Tools'']'
  career_goals: Carmen aims to fuse her scientific training with her artistic practice to become a leading visual storyteller for under-represented narratives. In the next five years she plans to launch
    a collaborative studio in Knoxville that offers portrait services, documentary projects, and experimental exhibitions focused on African-American culture and environmental justice. She hopes to secure
    a fellowship for computational photography, develop a grant-funded series that documents the interplay of technology and tradition in the South, and eventually publish a photo-essay book. Long-term,
    she envisions teaching workshops that empower young Black creators to harness STEM tools for creative expression.
