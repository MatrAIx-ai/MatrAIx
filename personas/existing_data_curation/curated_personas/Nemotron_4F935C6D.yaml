  hobbies: '[''Visiting art museums and galleries'', ''Sketching and drawing'', ''Urban and nature photography'', ''Playing acoustic guitar'', ''Reading contemporary fiction and philosophy'', ''Hiking San
    Diego County trails'', ''Spontaneous road trips to cultural festivals'', ''Volunteering at community art workshops'', ''Participating in improv theater groups'', ''Cooking experimental dishes'']'
  career_goals: Hubert aims to transition from a purely transactional role to a strategic position where he can shape the overall customer experience, ideally within a cultural or nonprofit organization.
    Over the next three to five years he plans to earn a certification in people management and pursue a part‑time Master’s in Arts Administration. His goal is to become a Customer Experience Manager or
    Training and Development Specialist for a museum, gallery, or community arts center, where he can blend his service expertise with his passion for the arts. He also hopes to design and lead empathy‑focused
    training programs for frontline staff, mentor new hires, and eventually launch a community‑driven art outreach initiative that provides free workshops to underserved neighborhoods.
