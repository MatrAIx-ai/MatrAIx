persona_description: A neurologist who specializes in the diagnosis and treatment of progressive supranuclear palsy, a rare and degenerative CNS disorder that progressively impairs voluntary eye movements
  and causes bradykinesia, muscular rigidity with progressive axial dystonia, pseudobulbar palsy, and dementia. She has extensive knowledge and experience in the field, including the clinical presentation,
  diagnosis, and treatment of progressive supranuclear palsy. She is likely to be involved in the management of patients with progressive supranuclear palsy and to collaborate with other specialists in
  the diagnosis and treatment of this disorder.
