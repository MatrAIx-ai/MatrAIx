persona_description: A concerned citizen who is interested in environmental issues and the impact of oil sands development on the environment, specifically focusing on air quality and water quality monitoring.
  They are likely to be aware of the ongoing debate surrounding the health impacts of oil sands pollution on the Athabasca River and the Fort Chip First Nation community. They are also likely to be aware
  of the government's monitoring program and its limitations in providing independent and comprehensive data on the impacts of oil sands development. They are critical of the government's claims and the
  lack of transparency and accessibility of the monitoring data.
