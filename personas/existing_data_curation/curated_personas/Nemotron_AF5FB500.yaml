personas:
  professional: An experienced manufacturing inspector, Luc Jackson leverages their keen eye for detail, statistical process control expertise, and knack for mentoring to ensure product quality while quietly
    positioning themselves for a future supervisory role.
  sports: A dedicated weekend fisherman, Luc Jackson spends early mornings at Bay Springs Lake, while also cheering on the New Orleans Saints and Mississippi State Bulldogs, and joins a local softball league
    for occasional low‑key physical activity.
  arts: A devoted blues and gospel aficionado, Luc Jackson listens to B.B. King, Muddy Waters, and Mahalia Jackson on their vintage turntable, and volunteers as a choir assistant at their church, letting
    the music shape their reflective downtime.
  travel: A road‑trip enthusiast, Luc Jackson has explored historic Savannah, the vibrant streets of New Orleans, and a cabin retreat in the Ozarks, and dreams of a leisurely cruise along the Gulf Coast
    once their children are grown.
  culinary: A seasoned backyard pitmaster, Luc Jackson experiments with rubs of paprika, brown sugar, and cayenne on pork ribs and brisket, favors hickory smoke, and pairs their meals with homemade coleslaw
    and cornbread, though they sometimes over‑smoke a batch, leading to a charred surprise.
  core: Luc Jackson blends disciplined craftsmanship with a relaxed, solitary lifestyle, balancing meticulous work in quality inspection with solitary hobbies, community church service, and a steady quest
    for modest financial and personal stability.
background:
  cultural: Luc was raised in Columbus, Mississippi, within a close-knit African American community that values family, faith, and resilience. His upbringing was shaped by regular church attendance, Sunday
    potlucks, and community festivals that celebrate the rich musical and culinary traditions of the South. He grew up hearing stories of the civil-rights movement and the legacy of the Mississippi Delta
    blues, which fostered a strong sense of cultural pride. Family traditions, such as preparing fried catfish and collard greens for holidays, and participating in church choirs, remain central to his
    identity. While he embraces modern work life, Luc continues to honor his heritage through music, food, and by mentoring younger community members, reflecting the intergenerational bonds typical of Southern
    Black families.
attributes:
  skills: '[''Quality inspection'', ''Sampling and weighing'', ''Statistical process control'', ''Equipment calibration'', ''MES data entry'', ''Safety compliance (OSHA)'', ''Problem solving'', ''Team mentorship'',
