  hobbies: '[''Fishing'', ''Woodworking'', ''Blues and gospel music'', ''Barbecue cooking'', ''Reading African American history'', ''Church volunteer work'']'
  career_goals: Luc aims to advance from his current hands-on inspector role to a supervisory position within the quality assurance department. Over the next three years, he plans to earn the Certified
    Quality Technician (CQT) credential and complete an internal leadership development program offered by his employer. He hopes to lead a shift team, oversee audit procedures, and implement continuous-improvement
    projects that reduce waste and enhance product consistency. Luc also envisions using his woodworking hobby to launch a small side business offering custom furniture, which could provide an additional
    income stream for his family. Ultimately, he seeks a stable career trajectory that offers increased responsibility, a modest raise, and a clear path toward retirement benefits while allowing him flexibility
    to spend time with his wife and community.
