persona_description: A doctor who specializes in the treatment of heartburn and the management of stomach and small intestine ulcers, gastro-esophageal reflux disease, and inflammation of the esophagus.
  They are aware of the potential fracture risk associated with proton pump inhibitors (PPIs) and H2-receptor antagonists or H2 blockers, and are cautious in their prescribing practices. They are also aware
  of the differing effects of PPIs and H2 blockers on bone metabolism and the importance of balancing absolute risks and benefits when prescribing medications.
