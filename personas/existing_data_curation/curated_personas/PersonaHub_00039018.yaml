persona_description: A researcher in developmental biology, particularly focused on the study of the DDK syndrome and its gene targets. This person is currently using gene targeting and conditional alleles
  to validate the functional significance of mutations in the Nle and Omcg1 genes, and is also investigating the in vivo functions of these genes using approaches such as gene expression analysis and in
  situ hybridization. This individual is also working on the characterization of the function of the HNF1β, Trapα, and Omcg1 genes using conditional mutagenesis and molecular analysis.
