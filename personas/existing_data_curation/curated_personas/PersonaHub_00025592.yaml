persona_description: A professional responsible for managing flood risk and planning developments in flood-prone areas. This persona is likely to have expertise in flood risk assessment, urban planning,
  and environmental management. They would be familiar with the latest research on climate change and its impact on flood risk, and would be responsible for developing and implementing strategies to mitigate
  these risks. They would also be involved in the planning and development of new buildings and additions within flood-prone areas, as well as managing activities to reduce the risk of flooding in flood-prone
  areas. They would require a deep understanding of legal and regulatory frameworks related to land use and development, and would be responsible for ensuring that new developments are constructed in a
  manner that minimizes the risk of flooding and maximizes the conveyance and storage capacity of floodplains.
