    and mentoring junior staff'', ''Budget forecasting and analysis'']'
  hobbies: '[''Gardening (raised beds with seasonal planning)'', ''Quilting (geometric patterns)'', ''Crossword puzzles'', ''Reading historical non‑fiction'', ''Walking along Gulf Shores'', ''Volunteer
    Income Tax Assistance (VITA) program'', ''Genealogy research'', ''Church choir participation'']'
  career_goals: Marcia aims to transition from full‑time audit work to a part‑time consulting role focused on helping small‑business owners in Baldwin County improve their financial reporting and compliance.
    She plans to complete her CPA certification to solidify her credentials and to lead a series of financial‑literacy workshops at the local community college. Additionally, she seeks to mentor at least
    two junior accountants each year, passing on her methodical work ethic and ensuring a smooth succession within her firm.
