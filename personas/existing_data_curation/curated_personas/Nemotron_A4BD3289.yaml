personas:
  professional: Jose Riosortiz is an aspiring teenage content creator and budding esports enthusiast, channeling their curiosity about new technology into TikTok videos and coordinating team strategies
    in Fortnite, while their relaxed, flexible mindset helps them improvise on the fly despite occasional disorganization.
  sports: Jose Riosortiz plays forward for the Northside Community Soccer League, joins the local skateboard crew at River Park, roots for the Seattle Sounders FC and the Golden State Warriors, and balances
    daily pickup games with weekend skate sessions, prioritizing fun and social interaction over strict training regimens.
  arts: Jose Riosortiz curates short TikTok narratives set to the beats of Billie Eilish, Travis Scott, and Imagine Dragons, follows Marvel movies and the latest TikTok dance trends, and draws inspiration
    from street‑art murals while editing video clips on a phone, turning their social energy into creative expression.
  travel: Jose Riosortiz prefers spontaneous weekend road trips to nearby coastal towns like Santa Monica, occasional family vacations to Disney World, and dreams of backpacking through Tokyo and Barcelona,
    but budget constraints keep most adventures short, flexible, and friend‑focused.
  culinary: Jose Riosortiz enjoys cooking family‑style tacos and tamales with fresh corn tortillas, seasoned chorizo, and roasted chilies, boasts an intermediate skill level in the kitchen, and also loves
    pizza with extra mozzarella and sushi rolls with avocado, often experimenting while music pumps in the background.
  core: Jose Riosortiz is a high‑energy teen who blends a love for soccer, skateboarding, and digital content creation with a laid‑back, occasionally messy approach to money, health, and plans, making every
    weekend an improv‑filled adventure.
background:
  cultural: Jose was raised in a Mexican‑American household in Blanchard, Oklahoma. His parents immigrated from Mexico and maintain strong ties to Mexican traditions, including language, cuisine, and holiday
    celebrations such as Cinco de Mayo and Día de los Muertos. The family practices Catholicism, attends a local church, and participates in community events that blend Mexican heritage with Midwestern
    culture. Bilingualism is a daily norm at home, and the blend of Mexican customs with the rural Oklahoma setting shapes Jose's identity, giving him a deep appreciation for his roots while fostering a
    flexible, inclusive outlook.
