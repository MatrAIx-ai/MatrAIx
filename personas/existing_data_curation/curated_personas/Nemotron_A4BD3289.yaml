  career_goals: Jose hopes to earn his GED within the next two years and then pursue an apprenticeship in automotive mechanics or a related trade, leveraging his hands‑on skills and mechanical curiosity.
    He also dreams of building a personal brand on social media that showcases youthful Mexican‑American culture, community events, and practical DIY tutorials, with the long‑term goal of turning his online
    presence into a small business or freelance consulting role. If the opportunity arises, he is open to enlisting in the military to gain technical training and broaden his horizons.
