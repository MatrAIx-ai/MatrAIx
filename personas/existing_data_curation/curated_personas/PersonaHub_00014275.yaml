persona_description: A biomedical engineering PhD student at Columbia University who is developing a mobile device for testing for HIV and syphilis, with the goal of making a significant impact on developing
  countries by providing a simple, mobile method to test for these diseases. The device is affordable, easy to use, and can be administered door to door by health care workers, which could help prevent
  mother-to-child transmission of HIV and reduce birth complications or neonatal death. The device is still in the testing phase, but has shown promise and has been published in a scientific journal.
