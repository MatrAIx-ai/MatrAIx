personas:
  professional: Todd Exalien, a 26‑year‑old with a methodical mindset, combines hands‑on carpentry, automotive repair, and meticulous budgeting to deliver reliable gig‑based services while pursuing a GED
    and eyeing an HVAC certification that will pave the way toward a stable utility job and eventually a community‑focused handyman business.
  sports: Todd Exalien, a competitive basketball player at the local community center, follows the Charlotte Hornets and the Carolina Hurricanes, joins a weekend pickup league, and they supplement their
    fitness with occasional fishing trips at Lake Gaston, balancing cardio with relaxed outdoor hobbies.
  arts: Todd Exalien, an avid listener of Kendrick Lamar, H.E.R., and Kirk Franklin, often streams gospel choirs and R&B classics while attending occasional open‑mic nights at the neighborhood cultural
    center, and they find inspiration for their DIY projects in the lyrical storytelling of these artists.
  travel: Todd Exalien, who prefers budget‑friendly road trips with a clear itinerary, has explored the historic streets of Savannah, the jazz scene of New Orleans, and the Blue Ridge Parkway, and they
    dream of a future solo adventure to the Caribbean islands once financial independence is achieved.
  culinary: Todd Exalien, a passionate home cook, loves preparing soul‑food staples like collard greens simmered with smoked turkey, crispy fried chicken marinated in buttermilk, and sweet potato pie spiced
    with cinnamon, and they experiment with hot‑sauce blends while occasionally opting for late‑night takeout after a long day of repairs.
  core: Todd Exalien, a 26‑year‑old pragmatist, blends a competitive spark, meticulous planning, and a love for soulful music and DIY projects, while battling chronic worry and an occasional neglect of
    self‑care.
background:
  cultural: Todd is a second‑generation African‑American from Rocky Mount, North Carolina. He grew up in a close‑knit Black community where church, family gatherings, and Southern culinary traditions were
    central. The local cultural landscape—gospel choirs, community barbecues, and a strong emphasis on perseverance—has shaped his values of self‑reliance and mutual support. While navigating systemic challenges
    common in the region, he draws pride from the rich heritage of Southern Black music, storytelling, and the legacy of resilience passed down through his elders.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic automotive maintenance'', ''Carpentry and woodworking'', ''Budgeting and personal finance'', ''Inventory management'', ''Customer service'',
