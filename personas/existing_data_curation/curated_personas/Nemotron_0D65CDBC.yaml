  hobbies: '[''DIY furniture building'', ''Car maintenance'', ''Basketball'', ''Hip‑hop and R&B music'', ''Self‑help reading'', ''Fishing'', ''Cooking Southern soul‑food'', ''Chess'']'
  career_goals: Todd aims to obtain his GED within the next year, then enroll in a vocational program for electrical or HVAC certifications. He seeks a stable full‑time role in a utility company or a logistics
    warehouse where his reliability and methodical work style can thrive. Long‑term, he hopes to launch a small handyman business that will allow him to be his own boss and provide services to his community.
    He also wants to achieve financial independence and eventually support family members.
