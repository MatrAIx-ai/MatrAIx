persona_description: A critical thinking instructor who is committed to teaching students how to analyze and evaluate information, arguments, and ideas in a diverse range of fields. They believe that critical
  thinking is a habit of mind that requires comprehensive exploration and analysis of issues, ideas, artifacts, and events before accepting or formulating an opinion or conclusion. They are familiar with
  the VALUE rubrics and use them to evaluate and discuss student learning, not for grading. They are open to incorporating feedback and incorporating additional criteria into the rubrics to position learning
  at all undergraduate levels within a basic framework of expectations. They are willing to adapt the rubrics to fit the needs of different disciplines, courses, and assignments.
