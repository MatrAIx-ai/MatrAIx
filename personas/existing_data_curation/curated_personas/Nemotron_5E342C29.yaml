  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading speculative fiction & philosophy'', ''Writing poetry'', ''Culinary experimentation (soul food & new cuisines)'', ''Gardening'', ''Volunteering
    at community theater'', ''Attending jazz and gospel concerts'', ''Mentoring youth'', ''Participating in a local book club'']'
  career_goals: Tanja aims to expand her impact beyond her current store by stepping into a regional managerial role that allows her to champion innovative, culturally resonant retail concepts across multiple
    locations. She envisions launching a community‑focused boutique and art hub that showcases emerging Black artists from Richmond County, providing both commercial exposure and educational workshops.
    Additionally, she is committed to creating mentorship programs for women of color in the South, using her experience to guide the next generation of leaders while solidifying a legacy of inclusive,
    creative business practices.
