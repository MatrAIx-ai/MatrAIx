personas:
  professional: Tan Hong, a 1-year-old with an early fascination for order and cause‑and‑effect, already demonstrates a methodical approach to stacking blocks and arranging toys, hinting at a future trajectory
    as a meticulous engineer or designer.
  sports: Tan Hong, a 1-year-old who loves crawling races in the park, attends weekly baby swim lessons at the community pool, proudly wears a miniature T‑shirt of the local soccer team Harbor City United,
    and participates in the Tiny Tots Soccer Club’s first‑step ball play sessions each spring.
  arts: Tan Hong, a 1-year-old who babbles along to lullabies by Mozart and modern pop hits like "Baby Shark," delights in rhythmic clapping to the beats of Baby Einstein’s music videos, and flips through
    vibrant picture books featuring artists such as Dr. Seuss and Eric Carle, cultivating an early love for auditory and visual arts.
  travel: Tan Hong, a 1-year-old who enjoys car rides with the window seat down, has visited the Singapore Botanic Gardens, played with sand at Bali’s Kuta Beach, and taken a family road trip to see the
    majestic vistas of the Grand Canyon, preferring relaxed, family‑centered adventures over crowded tourist attractions.
  culinary: Tan Hong, a 1-year-old with a budding preference for smooth textures, relishes sweet potato puree, mashed avocado with a dash of olive oil, and finely shredded chicken, while giggling at the
    bright orange yolk of a boiled egg and occasionally reaching for a soft cheese stick.
  core: Tan Hong, a curious one‑year‑old who compulsively lines up stuffed animals in perfect rows, worries when a toy is out of place, and bursts into tears at the slightest unexpected noise, blends meticulousness
    with a sensitive, competitive spirit.
background:
  cultural: Tan is raised in a Vietnamese‑American household in Greenville, South Carolina. Her family speaks both Vietnamese and English at home, celebrates Vietnamese holidays such as Tet, and incorporates
    traditional foods like rice and fresh herbs into meals while also enjoying Southern cuisine. Cultural values of respect for elders, diligence, and community are emphasized, shaping her organized and
    reliable demeanor while providing a blend of Eastern heritage and Southern U.S. community influences.
