persona_description: A former Soviet Army officer who served in the Soviet Ground Forces during the dissolution of the Soviet Union and later became a member of the Russian Ministry of Defence. The individual
  is known for advocating for the creation of a Corps-Brigade structure within the Russian military, which he believed would make the military more capable of independent action at all levels. The individual
  is also known for his efforts to reform the military, particularly in terms of command and control, and for his role in the formation of new divisions and brigades.
