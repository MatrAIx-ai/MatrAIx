  hobbies: '["Fishing on the Atchafalaya Bayou", "Gardening", "Woodworking", "Listening to blues and jazz music", "Cooking Creole cuisine", "Attending Mardi Gras parades and local festivals", "Volunteer
    mentoring at community center", "Reading technical and business publications"]'
  career_goals: Kelvin aims to transition into a senior technical consultancy role that leverages his combined engineering and business expertise to help local manufacturers and petrochemical plants optimize
    operations, cut costs, and enhance safety. He plans to mentor the next generation of technicians through a community‑based apprenticeship program and eventually launch a boutique consulting firm focused
    on safety compliance, process efficiency, and financial analytics for small‑ to mid‑size firms in the Gulf Coast region. Additionally, Kelvin hopes to contribute to industry standards committees and
    author a practical guide on integrating business analytics into technical maintenance workflows, leaving a lasting professional legacy.
