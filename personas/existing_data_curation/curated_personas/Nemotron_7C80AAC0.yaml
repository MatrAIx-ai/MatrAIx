  hobbies: '[''Folkloric Mexican dance (Ballet Folklórico)'',''Salsa dancing'',''Cooking traditional Mexican cuisine'',''Gardening'',''Hiking in Texas Hill Country'',''Volunteering at after‑school programs'',''Reading
    educational and psychology books'',''Puzzle solving (crosswords, Sudoku)'',''Improv theatre participation'',''Crafting papel picado and other cultural decorations'',''Attending local cultural festivals
    and parades'']'
  career_goals: Daisy aims to obtain her Texas teaching certification within the next two years, focusing on bilingual elementary education. She plans to pursue a master's degree in Curriculum and Instruction
    with a specialization in culturally responsive pedagogy, eventually becoming a lead teacher or bilingual program coordinator at her school district. Long‑term, she envisions taking on an administrative
    role—such as assistant principal—where she can shape school‑wide initiatives that celebrate diversity and strengthen community partnerships. Alongside her professional growth, Daisy hopes to mentor
    new teaching assistants and develop a community outreach program that provides after‑school tutoring for Spanish‑speaking families.
