  career_goals: Although still four, Mauro already talks about big‑picture dreams. He says he wants to become an astronaut so he can explore space, an artist who fills walls with bright pictures, and a
    teacher who can share stories with other kids. He also imagines helping people as a firefighter or community helper. His ambitions reflect his love of discovery, his joy in creating, and his desire
    to interact with and support others, while remaining open to whatever new ideas capture his interest.
