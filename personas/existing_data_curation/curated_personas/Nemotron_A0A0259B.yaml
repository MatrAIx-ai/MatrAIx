personas:
  professional: Mauro Kukler, a budding preschool junior architect, delights in constructing towering block cities, leverages their natural curiosity and outgoing nature to negotiate playtime concepts with
    peers, and treats every sandbox project as a collaborative venture.
  sports: Mauro Kukler plays in the Trumbull Tots Soccer Club during spring, enjoys cheering for the New England Patriots and Boston Red Sox at home, and spends weekends at Trumbull Little League baseball
    practice, combining energetic participation with a love for team camaraderie.
  arts: Mauro Kukler delights in finger-painting sessions at the local library, frequently mimics the bold colors of Van Gogh's "Starry Night" and the playful lines of Dr. Seuss, and can recite the Sesame
    Street theme song, weaving his art appreciation into daily storytelling.
  travel: Mauro Kukler has explored the shoreline of Hammonasset Beach State Park, taken a family train ride to New York City's Central Park, and dreams of visiting Disney World in Orlando and the historic
    streets of Boston, preferring short, supervised trips that blend adventure with familiar comforts.
  culinary: Mauro Kukler loves spaghetti with tomato sauce, meatballs, and fresh basil, enjoys making mini pepperoni pizzas topped with mozzarella, and often helps stir the mac and cheese while insisting
    on adding a sprinkle of cheddar for extra flavor.
  core: Mauro Kukler is an energetic, curiosity-driven 4-year-old who balances a love for messy art projects with a persistent habit of losing socks before bedtime.
background:
  cultural: Mauro is a 4‑year‑old white boy growing up in the suburban community of Trumbull, Connecticut. He lives in a middle‑class American household with European ancestry, and his family observes typical
    U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July, while also honoring some family traditions like cooking pasta dishes on weekends. His preschool and local library offer multicultural
    art activities and story sessions that expose him to a range of artistic styles and cultural narratives. The New England setting provides regular access to parks, nature walks, and community events,
    shaping his appreciation for outdoor exploration and communal gatherings.
