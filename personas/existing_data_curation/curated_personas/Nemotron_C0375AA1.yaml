  career_goals: Hugh aims to become a licensed general contractor in Massachusetts within the next five years and launch his own boutique flooring company that specializes in high‑end residential work and
    historic home restoration. He plans to earn certifications from the National Association of Home Builders and the Tile Council of North America, and to become known for using eco‑friendly materials
    and precision craftsmanship. In the longer term, he hopes to mentor apprentices, expand his crew, and build a reputation as one of the top‑rated installers on regional review platforms.
