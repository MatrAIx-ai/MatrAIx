personas:
  professional: Fatima Mabry, a certified medical assistant proficient in Epic and eClinicalWorks, merges meticulous patient intake and phlebotomy with vibrant Canva‑crafted education graphics, letting
    their imaginative flair and empathetic nature brighten clinical interactions while balancing organized workflow with creative flexibility.
  sports: Fatima Mabry stays active through sunrise yoga on the Lake Erie shoreline and weekend jogs with the Lake Erie Trail Runners club, while cheering on the Cleveland Browns in football season, the
    Guardians during baseball season, and the Cavaliers in basketball, blending low‑impact exercise with casual fan enthusiasm.
  arts: Fatima Mabry channels their imaginative spirit into abstract watercolors reminiscent of Kandinsky, digital illustrations inspired by Beeple’s futurist style, reflective poetry echoing Ocean Vuong,
    and frequent visits to Lorain’s community theatre where they admire performances by local talent like Sarah Martinez, all while devouring speculative fiction by N.K. Jemisin and the ethereal melodies
    of Sufjan Stevens.
  travel: Fatima Mabry’s travel style mixes careful budgeting with a craving for serene inspiration, leading to weekend escapes along Lake Erie, art‑focused trips to New York City and Montreal, and a dream
    itinerary that includes Kyoto’s zen gardens and the Adirondack trailheads, though anxiety sometimes makes spontaneous long‑haul flights feel overwhelming.
  culinary: Fatima Mabry enjoys cooking at a moderate skill level, often preparing quinoa bowls with roasted vegetables, basil‑infused pesto salmon, and avocado toast for breakfast, while occasionally indulging
    in comfort mac and cheese topped with smoked paprika, all seasoned with fresh cilantro, mint, and a splash of lemon zest.
  core: Fatima Mabry is a 26‑year‑old medical assistant whose boundless imagination fuels vibrant patient education art, yet chronic anxiety drives daily yoga rituals, spontaneous sketch‑book purchases,
    and a habit of over‑analyzing every detail.
background:
  cultural: Fatima is a second‑generation African‑American raised in Lorain, Ohio, where she grew up surrounded by a close‑knit Black community that values church, family gatherings, and soulful music.
    Her parents instilled an appreciation for cultural traditions such as cooking soul food with a healthy twist, celebrating Juneteenth, and participating in local African‑American cultural festivals.
    This heritage informs her commitment to health equity, and she often draws on her community’s oral histories and collective resilience when connecting with patients. While she embraces the broader Midwestern
    culture, she remains proud of her Black identity, which shapes her worldview and fuels her desire to serve as a bridge between medical care and culturally responsive support.
attributes:
  skills: '[''Phlebotomy'', ''Vital Signs Assessment'', ''Electronic Medical Records (Epic)'', ''Patient Intake and Triage'', ''Medical Terminology'', ''Infection Control Procedures'', ''Basic Wound Care'',
    ''Medication Reconciliation'', ''Appointment Scheduling'', ''Patient Education Material Development'', ''Digital Illustration for Health Communication'', ''Creative Problem Solving'']'
  hobbies: '[''Abstract Watercolor Painting'', ''Digital Illustration'', ''Poetry Writing'', ''Speculative Fiction Reading'', ''Yoga and Guided Meditation'', ''Nature Walks along Lake Erie'', ''Community
    Health Fair Volunteering'', ''Graphic Design for Patient Education'', ''Attending Local Art Workshops'', ''Participating in Community Theater'']'
  career_goals: Fatima aims to build on her associate degree by completing a Bachelor of Science in Nursing within the next three years, ultimately becoming a registered nurse with a focus on mental health
    and patient education. She is interested in pursuing certification in psychiatric‑mental health nursing and hopes to integrate her creative talents into developing therapeutic art programs for patients
    dealing with anxiety and depression. In the longer term, she envisions a leadership role as a clinical nurse educator or health‑communication specialist, designing culturally relevant health promotion
    campaigns for the African‑American community in Lorain.
