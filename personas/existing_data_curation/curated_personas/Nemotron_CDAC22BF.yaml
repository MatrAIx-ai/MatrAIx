  hobbies: '[''Community theater'', ''Trivia nights'', ''Volunteer work at senior center'', ''Gardening'', ''Fishing'', ''Hiking'', ''Board games'', ''Cooking for friends'', ''Reading Wisconsin history'',
    ''Walking/jogging'']'
  career_goals: William aims to move from a receptionist role into a supervisory position within the next three to five years, such as Office Manager or Community Liaison for a local nonprofit. He plans
    to earn a Certified Administrative Professional (CAP) credential to strengthen his leadership credentials. His long‑term ambition is to design and implement streamlined front‑office procedures that
    enhance both employee efficiency and visitor satisfaction, while continuing to foster a supportive, people‑focused workplace culture.
