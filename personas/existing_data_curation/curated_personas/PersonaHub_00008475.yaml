persona_description: A geologist who specializes in the study of crocodiles and their evolution, particularly the largest known crocodiles from East Africa. His research interests include the fossil record
  of crocodiles, the behavior and biology of crocodiles, and the potential for crocodiles to eat humans. He has expertise in paleontology and is particularly interested in the study of the relationship
  between crocodiles and their living cousins, the Nile crocodiles.
