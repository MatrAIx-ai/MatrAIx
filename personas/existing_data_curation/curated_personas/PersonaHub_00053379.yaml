persona_description: Thomas Hilyard was a shipbuilder and lumberman who played a significant role in the economic development of Saint John, New Brunswick. He was born in 1810 and passed away in 1873. Hilyard
  started his career in the shipbuilding industry and went on to build a large number of vessels, many of which were sold to major shipowners in Liverpool, England. Hilyard also expanded his business by
  purchasing a shipyard in Portland, N.B. and constructing a marine railway for ship repair. His reputation as a shipbuilder was highly respected, and his ships were advertised for sale in 1863. Hilyard's
  business continued under his two sons, Thomas K. and Henry, until 1915.
