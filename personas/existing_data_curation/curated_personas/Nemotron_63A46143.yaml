personas:
  professional: Teri Smith, a dedicated high-school dancer who balances her rigorous rehearsal schedule with a part-time role as a junior social-media content creator for her school's events, showcases
    her practical mindset by meticulously planning each routine and documenting the process in concise TikTok videos.
  sports: Teri Smith plays forward for the local recreational soccer club Maplewood Strikers, dazzles audiences as a member of her high-school dance team, and roots for the Chicago Bulls and Chicago Cubs
    on game nights, balancing competitive drive with a cooperative, team-first attitude.
  arts: Teri Smith channels her creative energy into contemporary dance, baking Instagram-ready cupcakes, and producing bite-size TikTok tutorials, drawing inspiration from Ariana Grande's choreography,
    Taylor Swift's storytelling lyrics, and the vibrant aesthetic of Disney's classic animations.
  travel: Teri Smith prefers well-planned family road trips to destinations like the Great Smoky Mountains and Disney World, but dreams of a solo backpacking adventure through Paris and London after graduation,
    balancing budget constraints with a yearning for cultural immersion.
  culinary: Teri Smith's palate gravitates toward sweet baked goods such as chocolate-chip cookies, red-velvet cupcakes topped with buttercream and edible glitter, and she enjoys mixing in unexpected flavors
    like matcha powder, though she occasionally over-sweets her creations.
  core: Teri Smith is a routine-loving, socially vibrant teen who blends disciplined dance rehearsals with spontaneous TikTok baking experiments, juggling a modest allowance, minor teenage acne, and a relentless
    drive to keep every schedule and cupcake perfectly timed.
background:
  cultural: Teri was raised in a predominantly white, middle‑class family in Monsey, New York. While the surrounding community includes a sizable Orthodox Jewish population, her household maintains a traditional
    American cultural identity rooted in practical values, routine, and community participation. Family gatherings often center around shared meals and holiday celebrations typical of a suburban New York
    upbringing, and she has been encouraged to take part in local youth programs and neighborhood events, fostering a strong sense of belonging to both her immediate cultural heritage and the broader, diverse
    fabric of Rockland County.
