  career_goals: Teri hopes to pursue a career that offers stability, a clear routine, and regular interaction with people. She is interested in becoming an administrative assistant or office coordinator,
    where her organizational strengths and communication abilities can be applied. Alternatively, she is drawn to healthcare support roles such as a certified nursing assistant, appreciating the practical,
    hands‑on nature of the work and the opportunity to help others. Long‑term, she dreams of opening a small neighborhood café or bakery, combining her love for cooking, community involvement, and the predictability
    of running a family‑run business.
