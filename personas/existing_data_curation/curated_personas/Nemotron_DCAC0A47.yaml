    technologies (digital locks, access control systems)'', ''Training and mentorship of junior staff'', ''Critical thinking and rapid decision‑making'', ''Cultural sensitivity and community liaison'']'
  hobbies: '[''Cooking traditional Gujarati/Indian dishes'', ''Playing cricket in a local amateur league'', ''Watching crime documentaries and listening to true‑crime podcasts'', ''Night‑time street photography'',
    ''Reading literary fiction and poetry'', ''Playing pool and darts at the casino lounge'', ''Attending community cultural festivals (Diwali, Eid)'', ''Participating in improv comedy workshops'', ''Learning
    new surveillance software tools'', ''Gardening (home vegetable garden)'']'
  career_goals: In the short term, Falgun aims to earn an Advanced Surveillance Certification and become the lead surveillance officer at his casino, driving down incident rates and improving response times.
    Mid‑term, he hopes to step into a security manager role, overseeing a broader team and shaping policy with a balance of innovative technology and time‑tested procedures. Ultimately, he envisions launching
    his own security consulting firm that specializes in casino and entertainment venues, leveraging his practical field experience and storytelling skills from his humanities background to train staff
    in effective communication and threat perception. Throughout his career path, he seeks recognition for performance, competitive excellence, and opportunities to mentor others while maintaining flexibility
    and autonomy in his work.
