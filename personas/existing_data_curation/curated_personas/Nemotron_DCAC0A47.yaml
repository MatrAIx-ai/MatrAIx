personas:
  professional: Falgun Zaman, a seasoned casino surveillance officer, leverages a keen eye for detail, a pragmatic curiosity about emerging tech, and a naturally charismatic demeanor to lead incident detection
    while mentoring junior staff, though their spontaneous nature sometimes clashes with rigid scheduling demands.
  sports: Falgun Zaman, a weekend cricketer in Kearny's local amateur league, rallies with New York Mets fans during baseball season, follows the New York Giants' football campaigns, and consistently dominates
    the casino lounge's pool tables and darts board, using the competitive edge from sport to stay alert on the job.
  arts: Falgun Zaman channels storytelling through improv comedy workshops with the Kearny Improv Collective, draws inspiration from actors like Philip Seymour Hoffman and comedians such is Dave Chappelle,
    and captures the neon pulse of the casino district in night-time street photography, sharpening the keen observational skills that serve their surveillance career.
  travel: Falun Zaman favors spontaneous road trips across the Northeast, has relished the bustling night markets of Bangkok, dreams of wandering the historic alleys of Lisbon, yet balances these wanderlust
    impulses with family commitments that limit extended overseas travel to a few carefully planned annual getaways.
  culinary: Falgun Zaman, an enthusiastic home chef, expertly prepares traditional dishes such as dhokla, khandvi, and sev tameta--spiced with fresh coriander, mustard seeds, and asafoetida--while experimenting
    with smoky chipotle glazes for weekend barbecues, often turning their dining room into a lively arena for friends and family to share stories.
  core: Falgun Zaman is a gregarious surveillance professional who mixes a detective's curiosity with a party host's flair, yet habitually forgets to lock the pantry after midnight, leading to impromptu
    snack raids that sabotage their diet.
background:
  cultural: Falgun was born to parents who emigrated from Gujarat, India, in the early 1980s. Raised in the multicultural suburb of Kearny, New Jersey, he grew up in a Gujarati‑Muslim household that cherished
    linguistic ties to Gujarati, celebrated Eid with family, and also embraced broader South Asian traditions such as Diwali and Navratri. The family emphasized respect for elders, the value of education,
    and active involvement in the local South Asian diaspora. Community gatherings, mosque events, and cultural festivals provided Falgun with a strong sense of identity and a deep appreciation for both
    heritage and the American experience. These roots shape his sociable nature, his respect for established customs, and his drive to share his culture through food, storytelling, and mentorship within
    the diverse community of Bergen County.
