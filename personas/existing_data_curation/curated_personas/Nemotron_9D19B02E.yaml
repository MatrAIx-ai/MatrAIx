personas:
  professional: David Santoni, an 18‑year‑old hospitality worker, blends solid fast‑paced food‑service experience with calm composure, efficiently handling POS transactions, inventory tracking, and crowd
    management while their curiosity drives them to master mixology and aim for a supervisory role in a sustainable Flagstaff brewpub.
  sports: David Santoni fuels their love of the outdoors by mountain biking with the Flagstaff Bicycle Club, playing pickup soccer on weekends, and cheering for the Phoenix Suns and Arizona Cardinals while
    occasionally attending NAU Lumberjacks basketball games, and they stay fit through a mix of trail rides and weekend scrimmages.
  arts: David Santoni captures the stark desert light with a Canon EOS, inspired by Ansel Adams, while soaking up live sets from The Head and the Heart at Flagstaff’s Orpheum and winding down to the mellow
    tunes of Bon Iver, weaving visual and musical aesthetics into their personal brand, and they often edit photos late into the night.
  travel: David Santoni prefers low‑key, adventure‑filled road trips, having already explored the red rocks of Sedona and the alpine trails of the Grand Canyon, while dreaming of a backpacking tour through
    New Zealand’s South Island and a weekend foodie escapade in Asheville, North Carolina, and they budget each journey with a mix of savings and occasional gig income.
  culinary: David Santoni, an intermediate home‑chef, whips up rosemary‑marinated chicken and smoky chipotle tacos for friends while brewing a modest batch of citrus‑hopped IPA, favoring fresh cilantro,
    roasted corn, and locally sourced honey, and they often experiment with seasonal ingredients sourced from the community garden they volunteer at.
  core: David Santoni blends a calm, organized hustle with restless curiosity, juggling fast‑paced restaurant shifts, mountain‑bike trails, and a budding home‑brew hobby while occasionally over‑booking
    social plans and forgetting to water their succulents, and they love to document each moment with a camera.
background:
  cultural: David grew up in a middle‑class family of mixed Italian and American heritage in the Flagstaff area. His parents emphasized strong work ethic, hospitality, and appreciation for the outdoors.
    Family gatherings often feature Italian dishes like pasta and risotto, while community celebrations reflect typical Southwestern traditions, such as Fourth of July barbecues and local Native American
    festivals. He is fluent in English, understands some Italian phrases, and has a basic familiarity with Spanish from the regional culture.
attributes:
  skills: '["Food service operations", "Customer service", "POS system management", "Basic mixology", "Inventory management", "Food safety compliance", "Team coordination", "Conflict resolution", "Time
