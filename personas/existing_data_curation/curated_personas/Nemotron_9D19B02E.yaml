  hobbies: '["Hiking", "Mountain biking", "Soccer", "Photography", "Experimental cooking", "Home brewing", "Live music events", "Podcast listening", "Community gardening", "Travel planning"]'
  career_goals: David aims to earn a certification as a bartender and pursue an associate degree in hospitality management at a local community college. Over the next five years he hopes to advance to a
    supervisory role in a popular Flagstaff restaurant or brewpub, eventually managing his own sustainable café that sources ingredients from local farms and serves the outdoor‑enthusiast community. He
    also plans to combine his love for the outdoors by offering guided food‑and‑drink experiences for hikers on the San Francisco Peaks.
