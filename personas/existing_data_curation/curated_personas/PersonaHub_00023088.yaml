persona_description: A NASA astronaut who was a member of the first crew to fly on the Space Transportation System (STS) and had a significant role in the design and operation of the Shuttle program. He
  was involved in the testing and evaluation of the Shuttle's external propellant tank insulation, and was a part of the team that ultimately decided to change the method of installing the tiles. He was
  also a member of the crew that lost the Columbia shuttle during its final mission in 2003.
