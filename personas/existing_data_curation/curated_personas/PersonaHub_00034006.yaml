persona_description: A Department of Primary Industries scientist who specializes in research on the effects of weather conditions on fruit production, specifically in the Goulburn Valley region of Victoria.
  She is conducting research to understand how shade netting reduces sun damage on Royal Gala apples, which will provide valuable information for growers and help prevent losses due to sun-damaged apples
  and pears. Her research aims to improve the understanding of how weather components interact to cause sun damage and how to prevent it, ultimately helping to improve fruit quality and reduce losses.
