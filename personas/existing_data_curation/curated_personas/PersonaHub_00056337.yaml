persona_description: A radiology resident at the University of California in Los Angeles who is interested in the relationship between an active lifestyle and brain structure, particularly in relation to
  cognitive function. The resident is interested in the use of MRI and voxel-based morphometry to assess the relationship between energy output and gray matter volume, and how this can be used to improve
  brain health and reduce the burden of dementia and Alzheimer's disease. The resident is also interested in the positive influence of an active lifestyle on the brain and the potential benefits of a combination
  of lifestyle choices and activities.
