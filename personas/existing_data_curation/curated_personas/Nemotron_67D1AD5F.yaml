    ''Performance metrics and KPI monitoring'', ''Cross-functional team coordination'', ''Culturally competent care for American Indian communities'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Exploring Native American pottery and beadwork'', ''Hiking and nature photography in the Sonoran Desert'', ''Reading scientific journals
    and books on healthcare innovation'', ''Practicing yoga and mindfulness meditation'', ''Cooking traditional Indigenous recipes and modern fusion dishes'', ''Participating in small book clubs focused
    on non-fiction and cultural topics'', ''Volunteering with tribal health outreach programs'', ''Sketching and watercolor painting'', ''Attending local jazz or folk music performances'']'
  career_goals: Cianna aims to advance to a senior executive role within a regional health system, ultimately serving as Chief Operations Officer. She plans to pursue a Master’s in Health Administration
    to deepen her strategic acumen and to lead multi‑facility networks that integrate innovative, patient‑centered models—such as telehealth and arts‑based therapeutic programs. A core ambition is to champion
    culturally responsive care, influencing policy and resource allocation to improve health outcomes for American Indian populations. She also aspires to mentor emerging health managers, fostering a collaborative
    and high‑performing organizational culture.
