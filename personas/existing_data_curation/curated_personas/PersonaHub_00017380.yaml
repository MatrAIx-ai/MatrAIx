persona_description: A linguist who specializes in the study of the Melanesian languages, particularly the languages of the Solomon Islands. He is a master of beche de mer, a language spoken in the Pacific
  islands. His research interests include the structure and grammar of beche de mer, its usage in daily life, and its potential as a source of linguistic data for the study of other languages. He is also
  interested in the role of beche de mer in the cultural and social practices of the Pacific islanders.
