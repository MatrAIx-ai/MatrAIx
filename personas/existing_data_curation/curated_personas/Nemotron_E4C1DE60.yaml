  career_goals: As he approaches retirement, Johnnie aims to transition from front‑line dispatching to a mentorship and advisory role. He plans to develop a structured training program for new dispatchers,
    contribute to updating county emergency response SOPs, and volunteer as a liaison for community disaster‑preparedness workshops. He hopes to leave a legacy of reliability, compassion, and procedural
    excellence while continuing to support the emergency services in a part‑time consulting capacity.
