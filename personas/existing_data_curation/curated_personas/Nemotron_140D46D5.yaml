personas:
  professional: Julia Wong, a veteran special‑education teacher with three decades of experience, blends methodical grant‑writing expertise, bilingual communication, and art‑infused instructional design
    to craft individualized education plans that harness assistive technology, while aspiring to coordinate district‑wide inclusive programs and author a cultural‑art integration guide, and they approach
    leadership with data‑driven accountability.
  sports: Julia Wong, a lively salsa dancer who frequents community events and sponsors the senior badminton club at Harborview Community Center, also cheers for the Harbor City Mariners baseball team and
    follows the Islanders' basketball season, and they view physical activity as both social engagement and stress relief.
  arts: Julia Wong, an avid watercolorist who captures coastal sunrise vistas inspired by Monet and local horizons, regularly attends gallery openings featuring works by contemporary painter Ana Rivera,
    volunteers as a stagehand for the municipal theater where they admire the choreography of dancer Carlos Marquez, and they unwind listening to the jazz saxophone of John Coltrane and the classical piano
    of Lang Lang, weaving these influences into their own creative practice.
  travel: Julia Wong, an explorer of historic sites who has toured the island's colonial lighthouse at Punta Vista and the venerable Old Fort in San Miguel, now dreams of visiting Kyoto's temples and the
    vineyards of Tuscany while balancing travel costs with their retirement budget, and they prefer organized group tours that include cultural workshops.
  culinary: Julia Wong, an intermediate home chef who experiments with fusion recipes such as mango‑coconut curry with plantain chips and soy‑marinated tenderloin served over arroz con gandules, delights
    in using fresh herbs like cilantro and lemongrass, and they often pair meals with locally sourced coffee while attending community potlucks.
  core: Julia Wong, a curious yet organized 64‑year‑old who channels stress into watercolor and salsa, obsessively tracks every expense in spreadsheets, sometimes over‑worries about future plans, but always
    finds joy in blending art with education and community service.
background:
  cultural: Julia was born and raised in Ponce, Puerto Rico, where she grew up immersed in the island’s rich traditions of música bomba, plena, and vibrant festivals. Her family background includes both
    Puerto Rican and Chinese Caribbean ancestry, giving her a unique perspective on multicultural identity and cuisine. Fluent in Spanish and English, she often weaves local folklore, music, and art into
    her teaching to reflect her students' cultural heritage. This deep connection to her community fuels her commitment to inclusive education and her desire to preserve and celebrate Puerto Rican cultural
    expressions through her professional and personal endeavors.
attributes:
  skills: '[''Special Education Instruction'', ''IEP Development'', ''Assistive Technology Integration'', ''Curriculum Adaptation'', ''Classroom Management'', ''Data‑Driven Assessment'', ''Grant Writing'',
    ''Program Evaluation'', ''Bilingual Communication (Spanish/English)'', ''Art Therapy Integration'', ''Parent and Community Outreach'']'
  hobbies: '[''Watercolor painting'', ''Salsa dancing'', ''Visiting local art galleries'', ''Volunteering at community theater'', ''Gardening'', ''Cooking Puerto Rican‑Asian fusion dishes'', ''Reading mystery
    novels'', ''Yoga and mindfulness practice'', ''Traveling to historic sites in Puerto Rico'', ''Participating in a seniors book club'']'
  career_goals: Julia aims to transition into a leadership role as a Special Education Coordinator within her school district, where she can mentor younger teachers and champion inclusive, arts‑based learning
    models. She aspires to launch a community‑centered after‑school program that offers art workshops and therapeutic activities for students with special needs, leveraging her grant‑writing expertise to
    secure sustainable funding. Additionally, she hopes to author a guide on integrating cultural art practices into special education curricula, preserving Puerto Rican heritage while promoting innovative
    pedagogy. Throughout these ambitions, she remains focused on creating measurable outcomes that improve student achievement and well‑being.
