persona_description: A linguist or a historian interested in the study of language and language contact, especially in the early 20th century. They are familiar with the hypothesis of Thraco-Illyrian and
  its implications for the study of Indo-European languages. They are also aware of the controversies surrounding the existence of a Thraco-Illyrian branch and the possible influences of Illyrian and Thracian
  languages on each other. They have a keen interest in the development of the Albanian language and its possible origins, as well as the satem and centum nature of Indo-European languages.
