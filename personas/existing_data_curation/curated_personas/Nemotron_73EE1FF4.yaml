  hobbies: '[''Fishing'', ''Gardening'', ''Birdwatching'', ''Reading historical biographies'', ''Reading mystery novels'', ''Woodworking (small projects)'', ''Tinkering with vintage radios'', ''Basic electronics'',
    ''Volunteering at food pantry'', ''Church outreach'', ''Listening to classic country and bluegrass music'', ''Walking nature trails'']'
  career_goals: Johnnie aims to maintain a flexible work schedule that allows him to spend more time with his wife and pursue self‑care activities while still contributing his expertise to the store. Over
    the next few years he hopes to transition into a mentor or shift‑supervisor role, where he can guide younger colleagues and help improve store operations through his practical insights. He is also planning
    for a gradual retirement, with the goal of remaining active in the community by volunteering at the local food pantry, assisting neighbors with errands, and possibly running a small weekend garden‑supply
    stand that leverages his knowledge of gardening and home‑repair basics.
