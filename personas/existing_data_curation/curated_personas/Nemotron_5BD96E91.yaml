personas:
  professional: Jingmei Her, a retired biomedical engineer turned community science communicator, uses their vivid imagination and knack for storytelling to turn abstract research into lively senior‑center
    workshops, even though their relaxed approach to scheduling often leads to last‑minute changes that they embrace with a laugh.
  sports: Jingmei Her follows the Milwaukee Brewers on baseball season, participates in a senior bowling league at the community center, and takes daily walks through the Sheboygan River trail to spot migrating
    birds, balancing a love for low‑impact activity with a playful competitive streak.
  arts: Jingmei Her paints abstract watercolors inspired by scientific concepts, draws inspiration from Yayoi Kusama and Claude Monet, frequently attends productions by the Sheboygan Community Theater,
    and quotes Neil Gaiman during storytelling circles, letting artistic curiosity shape their lively social persona.
  travel: Jingmei Her cherishes road trips to the Upper Peninsula’s waterfalls, has taken a nostalgic train journey to Chicago to explore the Art Institute, dreams of revisiting the hometown where they
    celebrated Lunar New Year as a child, and prefers guided group tours that accommodate their comfort with a relaxed itinerary.
  culinary: Jingmei Her loves crafting fusion dishes such as soy‑glazed pork tenderloin with Wisconsin cheese curds, maple‑ginger glazed carrots, and a spicy Szechuan‑style bratwurst stew, often experimenting
    with fresh herbs from their heirloom vegetable garden while humming classic folk tunes.
  core: Jingmei Her is a sprightly 79‑year‑old science storyteller who blends curiosity, social flair, and a hint of organized chaos into every workshop, garden, and kitchen adventure.
background:
  cultural: Jingmei grew up in an immigrant family that balanced East Asian traditions—such as honoring ancestors, celebrating Lunar New Year, and speaking Mandarin at home—with the values of the American
    Midwest. This bicultural upbringing fostered a deep respect for education, community cohesion, and modesty, while also encouraging openness to new experiences. In Sheboygan, she maintains cultural ties
    by sharing traditional recipes and holiday customs with neighbors, and she participates in local multicultural festivals, illustrating how her heritage enriches her social interactions and community
    contributions.
