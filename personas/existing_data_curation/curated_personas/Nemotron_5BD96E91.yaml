  career_goals: Although retired, Jingmei aims to leave a lasting educational legacy in her community. She aspires to develop a senior‑focused science outreach program in Sheboygan, author a popular‑science
    memoir that intertwines her East Asian heritage with her love for abstract ideas, and collaborate on a community mural that visualizes scientific concepts. Her goals also include volunteering as a guest
    lecturer at local schools and fostering intergenerational dialogue through storytelling events.
