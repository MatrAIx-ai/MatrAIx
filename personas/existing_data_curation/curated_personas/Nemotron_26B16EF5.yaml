personas:
  professional: Brion Shomo, a methodical teen aspiring automotive technician, applies their organized, step‑by‑step mindset to hands‑on car repairs, hobby model building, and coordinating neighborhood
    clean‑up crews, positioning themselves as a reliable future apprentice.
  sports: Brion Shomo regularly cycles the Meramec River trail for fitness, follows the St. Louis Cardinals and St. Louis Blues with a disciplined schedule of game viewings, and joins a weekend recreational
    soccer pick‑up, preferring structured training routines to spontaneous play.
  arts: Brion Shomo, who recently began photographing Chesterfield’s riverfront architecture with a DSLR, admires Ansel Adams’ black‑and‑white landscapes and listens to Creedence Clearwater Revival while
    editing video clips, using their precise eye for detail to build a curated online portfolio.
  travel: Brion Shomo prefers low‑cost, meticulously planned trips, having explored the Missouri Botanical Garden and the historic town of Hermann, dreaming of attending the Model Aviation Expo in Kalamazoo,
    and tracks mileage and budget in a spreadsheet before each journey.
  culinary: Brion Shomo enjoys preparing simple comfort foods like grilled chicken thighs seasoned with smoked paprika and fresh rosemary, perfecting classic mac and cheese with sharp cheddar, and occasionally
    experimenting with a gear‑shaped pizza topped with pepperoni and bell peppers, reflecting a methodical cooking style that mirrors their hobby projects.
  core: Brion Shomo is a detail‑driven, reserved teen whose love of structured projects fuels ambitions in automotive tech, careful budgeting, and methodical hobbies, even as they occasionally fall into
    late‑night Civilization marathons.
background:
  cultural: Brion is a white male raised in the suburban Midwestern community of Chesterfield, Missouri. His family has roots in German and Irish ancestry and follows moderate Protestant Christian traditions
    that emphasize responsibility, modesty, and community service. Growing up in a middle‑class environment, he has been shaped by Midwestern values such as reliability, neighborliness, and a strong work
    ethic. He participates in local youth programs, attends church youth group events, and enjoys regional customs like the St. Louis County Fair, high school baseball games, and listening to classic rock
    and country music. These cultural influences reinforce his preference for structure, cooperation, and harmonious relationships.
attributes:
  skills: '[''Basic automotive maintenance'', ''Woodworking'', ''Computer troubleshooting'', ''Video editing'', ''Event coordination'']'
