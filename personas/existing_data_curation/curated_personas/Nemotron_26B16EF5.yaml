  career_goals: Brion plans to earn his GED within the next year and enroll in a vocational program that leads to a certified automotive technology or HVAC technician credential. He aims to begin as an
    apprentice, mastering practical skills under experienced mentors, and eventually achieve journeyman certification. In the longer term, he aspires to become a lead technician or shop manager, overseeing
    a small team while maintaining a predictable schedule and clear responsibilities. He also wants to deepen his knowledge of computer networking to provide additional support in his future workplace and
    keep open the option of transitioning into IT support roles.
