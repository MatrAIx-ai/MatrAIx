  career_goals: Willow aims to rise to a Regional Sales Manager position within the next three years, leading a team of agents to consistently rank in the top five percent of sales performance statewide.
    She plans to earn the Certified Insurance Counselor (CIC) credential and secure a life‑insurance underwriting license to broaden her service offerings. Long‑term, she envisions launching her own boutique
    agency focused on small‑business owners in the Midwest, leveraging digital sales tools she has helped pilot. Mentoring emerging agents and establishing a peer‑learning network are also central to her
    professional ambition.
