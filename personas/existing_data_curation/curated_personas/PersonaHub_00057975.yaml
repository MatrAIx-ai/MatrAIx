persona_description: A pediatrician who specializes in the diagnosis and treatment of plagiocephaly, a condition in which a baby's skull is flattened on one side of the back or front of the head. They are
  knowledgeable in the physical examination, diagnostic imaging, genetic testing, and treatment options for plagiocephaly, including surgery and helmet therapy, and have experience treating infants and
  children with congenital plagiocephaly. They are passionate about improving the quality of life for babies with plagiocephaly through evidence-based care and research.
