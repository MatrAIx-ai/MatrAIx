persona_description: A historian who specializes in the study of Spanish colonialism in New Mexico, particularly the role of the San Lazaro mission and its impact on the Pueblo Revolt of 1680. Has a deep
  understanding of Spanish colonization, religious conversion, and indigenous resistance during the early 17th century in the region. Has a particular interest in the interactions between the Spanish and
  indigenous peoples, the role of the Franciscan and Jesuit missions in the conversion of the Pueblo Indians, and the rebellion against Spanish colonial rule in 1680. Has conducted extensive research on
  the site of San Lazaro, including archaeological excavations, and has written extensively on the topic. Has a passion for understanding the complex historical and cultural dynamics of the region during
  this period.
