persona_description: A high-level executive with responsibility for the development and implementation of an information technology (IT) strategy within an organization. This individual is responsible for
  ensuring that the IT strategy aligns with the overall business objectives of the organization, while also addressing strategic informatics issues (SII) that impact the organization's performance. This
  individual must be able to gather and analyze information from multiple perspectives, develop and update strategic objectives, formulate strategies and plans, and manage the operational planning process.
  This individual must have strong communication and collaboration skills to work closely with informatics staff, business managers, and other stakeholders. Additionally, this individual must be able to
  analyze information and make informed decisions based on the results of the situation assessment stage.
