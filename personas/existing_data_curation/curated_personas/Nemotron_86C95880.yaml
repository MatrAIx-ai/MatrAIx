  hobbies: '[''Hiking and exploring nature'',''Fishing'',''Digital photography'',''Sketching and collage art'',''Acoustic guitar playing'',''Attending local jam sessions'',''Watching documentaries on art
    and social topics'',''Volunteering in church youth outreach'',''Organizing community clean‑ups'',''Multiplayer video gaming'',''Streaming gameplay'']'
  career_goals: Elliot hopes to turn his passion for helping others into a career that strengthens his rural community. He plans to earn his GED within the next year, followed by a vocational program in
    community outreach or social services at a nearby technical college. In the longer term, he envisions becoming a youth mentor or community‑center coordinator, where he can combine his artistic interests—perhaps
    leading art‑therapy workshops—and his knack for organizing volunteer activities. He also dreams of keeping a flexible schedule that lets him continue creating music and visual art, and he is open to
    exploring a future as a freelance graphic designer or musician if it aligns with his community‑focused goals.
