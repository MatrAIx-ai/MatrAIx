personas:
  professional: Elliot Kennedy, a 17‑year‑old high school senior with a natural talent for bringing people together, leverages strong interpersonal communication and informal mediation skills to organize
    church youth outreach, community clean‑ups, and local art‑therapy workshops, while they plot a path toward a vocational program in social services and occasional freelance graphic design gigs.
  sports: Elliot Kennedy, an avid outdoors enthusiast, spends weekends hiking the Appalachian foothills with the Summerville Trail Club, fishing at local streams, and playing in a casual pick‑up soccer
    league with the Summerville Rangers, while they cheer on the Atlanta Braves and the Nashville Predators for their seasonal sport fix.
  arts: Elliot Kennedy finds creative fuel in indie folk icons like Sufjan Stevens and the storytelling of Joni Mitchell, sketches Appalachian landscapes in a style reminiscent of Andrew Wyeth, curates
    mixed‑media collages inspired by the works of Frida Kahlo, and they regularly perform acoustic covers at open‑mic nights, all while binge‑watching art‑history documentaries about the Mexican muralists
    and contemporary street art.
  travel: Elliot Kennedy enjoys spontaneous weekend camping trips to the Great Smoky Mountains, day‑trips to the historic town of Asheville, and dreams of trekking the Scottish Highlands and exploring the
    vineyards of Tuscany, planning each outing on a smartphone travel app but often letting budget constraints steer them, so they opt for affordable, nature‑focused getaways.
  culinary: Elliot Kennedy, an enthusiastic but beginner home‑cook, loves preparing rustic Appalachian dishes such as cornbread made with stone‑ground cornmeal, smoked trout seasoned with fresh dill and
    lemon, and hearty bean stews spiced with locally foraged wild greens, while they experiment with seasonal blackberry compote and mushroom sauces for added flair.
  core: Elliot Kennedy is a charismatic, arts‑savvy community organizer whose spontaneous energy and easy‑going planning style drive both creative collaborations and occasional forgotten deadlines, a quirk
    they readily own.
background:
  cultural: Elliot grew up in a white Southern family in the rural town of Summerville, GA, where community ties, church involvement, and Southern hospitality are central. His upbringing is steeped in Appalachian‑influenced
    traditions—family barbecues, gospel music, and storytelling at porch gatherings. The close‑knit nature of Chattooga County has fostered a strong sense of local identity, with a deep appreciation for
    the natural landscape and a cultural emphasis on helping neighbors. Elliot’s cultural background blends the conservative values of a small‑town Southern environment with an emerging curiosity for diverse
    artistic expressions and progressive community initiatives.
