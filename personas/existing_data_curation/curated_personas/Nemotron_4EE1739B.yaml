  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Chess'', ''Fishing'', ''Motown and soul music'', ''Tool‑use workshops for youth'']'
  career_goals: Ricardo aims to advance into a senior supervisory role within his facility, overseeing a larger team and implementing data‑driven maintenance strategies that lower downtime and costs. He
    plans to earn certifications such as Certified Maintenance & Reliability Professional (CMRP) and specialized HVAC efficiency credentials. Long‑term, he envisions launching a small, community‑focused
    repair business that offers affordable services to local businesses and homeowners, while mentoring young apprentices from his neighborhood to pass on both practical skills and a disciplined work ethic.
