personas:
  professional: Ricardo Phillips is a seasoned maintenance and repair professional whose methodical maintenance logs, competitive drive for lower downtime, and cautious adoption of energy‑efficient HVAC
    technologies position them as a reliable candidate for senior supervisory roles while they meticulously mentor junior staff.
  sports: Ricardo Phillips channels his love for quiet competition into regular fishing trips on the Detroit River with the local anglers' club, follows the Detroit Lions, Pistons, and Red Wings passionately,
    and they maintain modest fitness through weekend bowling leagues and occasional jogs, preferring low‑impact activities that complement their hands‑on lifestyle.
  arts: Ricardo Phillips finds creative release in listening to classic Motown and soul legends like Marvin Gaye, Aretha Franklin, and Stevie Wonder while they occasionally attend Detroit’s Jazz Festival
    and browse vintage automobile museums, experiences that blend their appreciation for rhythm, heritage, and mechanical design.
  travel: Ricardo Phillips prefers meticulously planned road trips to classic car events such as the Woodward Dream Cruise, enjoys leisure fishing getaways to the Upper Peninsula’s remote lakes, and they
    dream of visiting the Mercedes‑Benz Museum in Stuttgart, balancing structured itineraries with spontaneous fishing detours.
  culinary: Ricardo Phillips enjoys cooking hearty soul‑food meals like smoked pork ribs seasoned with brown sugar and paprika, collard greens simmered with ham hocks, and pan‑fried catfish tossed with
    cornmeal and lemon, and they favor simple, flavor‑forward dishes that echo their hands‑on, practical approach.
  core: Ricardo Phillips is a pragmatic, detail‑obsessed technician who balances a competitive drive for efficiency with a fondness for solitary hobbies, a penchant for meticulous budgeting, occasional
    neglect of dental health, and a habit of humming Motown classics while they fine‑tune vintage engines.
background:
  cultural: Ricardo is an African‑American who grew up in Detroit's historic working‑class neighborhoods, where manufacturing and trade skills shaped community identity. His family's ties to the city’s
    post‑World War II industrial boom fostered a strong sense of resilience, self‑reliance, and pride in manual craftsmanship. He remains closely connected to the local Black church, which emphasizes fellowship,
    mutual support, and cultural celebration through music and food. These influences inform his work ethic, his commitment to mentoring the next generation, and his appreciation for the city’s rich musical
    heritage, especially the legacy of Motown that he carries into his personal and professional life.
attributes:
  skills: '[''HVAC system maintenance'', ''Electrical wiring repair'', ''Plumbing fixture repair'', ''Preventive maintenance scheduling'', ''Mechanical troubleshooting'', ''Safety compliance and inspections'',
