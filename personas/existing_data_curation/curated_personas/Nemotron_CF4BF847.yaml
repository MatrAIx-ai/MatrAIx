personas:
  professional: Wendell Owens, a retired theoretical physicist and applied mathematician, channels decades of research and engineering experience into mentoring, writing a memoir on science‑art intersections,
    and curating a desert‑inspired astrophotography exhibition, while still publishing occasional computational simulation papers.
  sports: Wendell Owens enjoys low‑impact hiking on the Sonoran desert trails with the Desert Trail Hikers Club, follows the Arizona Diamondbacks and Phoenix Suns from the porch, and participates in weekly
    senior‑center walking sessions that keep osteoarthritis at bay.
  arts: Wendell Owens spends afternoons painting watercolor landscapes inspired by Monet and Ansel Adams, captures nebulae with an astrophotography rig while listening to John Coltrane’s “A Love Supreme,”
    and attends local art‑history talks featuring exhibitions on Georgia O’Keeffe.
  travel: Wendell Owens prefers meticulously planned trips to clear‑air stargazing sites like the Atacama Desert and Sedona’s red‑rock country, while also enjoying short weekend drives to the Grand Canyon,
    balancing love of exploration with limited mobility and a modest travel budget.
  culinary: Wendell Owens prepares modest yet flavorful desert‑inspired meals, favoring dishes like cactus‑nopal tacos with roasted chilies, honey‑lavender ice cream, and quinoa salads with pomegranate
    seeds, while watercolor hobby adds a splash of artistic flair to kitchen plating.
  core: Wendell Owens is an 87‑year‑old physicist‑artist who weaves scientific rigor into watercolor landscapes, stargazing, and mentorship, all while navigating age‑related health quirks and a frugal yet
    passionate lifestyle.
background:
  cultural: Wendell comes from a white, middle‑class American family that originated in the Midwest. Born in 1938, he grew up during World War II and the post‑war boom, experiencing a cultural emphasis
    on scientific advancement, the space race, and civic responsibility to contribute to national progress. His family's values emphasized hard work, education, and modesty, guiding his pursuit of a graduate
    degree in STEM. In the 1970s, he relocated to the desert town of Oracle, Arizona, where he adopted aspects of the southwestern way of life—an appreciation for the natural desert landscape, a slower,
    community‑oriented rhythm, and a respectful curiosity about the region’s Indigenous histories. He balances mainstream American cultural norms of his generation with an openness to artistic expression
    and the diverse cultural tapestry of the Southwest.
