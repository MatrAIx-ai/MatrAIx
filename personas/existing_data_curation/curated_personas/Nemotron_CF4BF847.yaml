    programs'', ''Listening to classical music and jazz'', ''Volunteering at the local museum for science‑art exhibitions'']'
  career_goals: Although retired, Wendell remains driven by a desire to synthesize his lifelong passions for science and art. He aims to author a memoir that explores the intersections of theoretical physics,
    visual imagination, and the experience of aging in the American Southwest. He hopes to curate a small exhibition of his astrophotography and watercolor works at the local museum, and to mentor graduate
    students through a virtual \"Science-Art Dialogue\" series. He also aspires to contribute to a community astronomy outreach program, fostering curiosity among schoolchildren and senior peers. Ultimately,
    he wishes to see his interdisciplinary insights preserved in a self‑published anthology that may inspire others to pursue curiosity beyond conventional boundaries.
