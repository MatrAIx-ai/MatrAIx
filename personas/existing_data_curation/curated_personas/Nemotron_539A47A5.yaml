  professional: Donald Mcfadden, at one year old, is a budding product tester of sensory toys, applying a methodical approach to arranging blocks and exploring textures, hinting at a future in design or
    early childhood education where their preference for structure and reliability will shine, and they already exhibit a surprisingly organized play style.
  sports: Donald Mcfadden, at one year old, delights in crawling across the living room while cheering on the Boston Red Sox on the television and participates in the Tumble Tots gymnastics club, where
    their parents appreciate their structured routines and they eagerly mimic the moves of older toddlers.
  arts: Donald Mcfadden, at one year old, enjoys the soothing lullabies of Brahms' "Wiegenlied" and the playful melodies of Raffi's "Baby Beluga," while also being captivated by the bright animated world
    of Disney's "The Lion King" and the classic storytelling of Sesame Street, showing a budding appreciation for music and visual arts that aligns with their preference for predictable rhythms.
  travel: Donald Mcfadden, at one year old, has already visited the Grand Canyon on a family road trip, explored the bustling streets of Toronto with a stroller, and dreams (via picture books) of a future
    vacation to Kyoto's cherry‑blossom gardens, preferring well‑planned itineraries that balance familiar comforts with gentle adventure.
  culinary: Donald Mcfadden, at one year old, loves pureed sweet potatoes, banana mash, avocado slices, and tiny pieces of soft cheese, showing particular affinity for the natural sweetness of carrots and
    the creamy texture of oatmeal, while their parents introduce new flavors gradually to suit their methodical palate.
  core: Donald Mcfadden, at one year old, blends an uncanny love for routine with a curious, methodical exploration of the world, yet can become fussy when unexpected changes disrupt their predictable schedule.
