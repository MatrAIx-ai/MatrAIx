personas:
  professional: Migdalia Alvarezfernandez is a senior database administrator who leverages their methodical documentation, precise performance‑tuning, and clear communication to build secure, scalable data
    solutions, and as a proactive mentor they channel their practical, structured mindset into guiding emerging women technologists while preparing for a lead architect role.
  sports: Migdalia Alvarezfernandez follows the Cangrejeros de Santurce basketball team and the Criollos de Caguas baseball club, joins the San Juan Hiking Club for weekend treks in El Yunque, and balances
    their love for the outdoors with weekly yoga classes at the community center.
  arts: Migdalia Alvarezfernandez immerses themselves in the works of contemporary island author Mayra Santos‑Febres, practices Bomba and Plena at workshops featuring master drummer Héctor “El Sonero” Rodríguez,
    and captures urban textures through a Leica camera, often citing photographer Sebastião Salgado as visual inspiration.
  travel: Migdalia Alvarezfernandez prefers meticulously planned weekend getaways to historic Old San Juan and the surf‑capped town of Rincón, while longer vacations blend cultural immersion in Barcelona’s
    Gothic Quarter and culinary tours of Buenos Aires, all balanced by a modest travel budget that prioritizes on‑site photography over luxury lodging.
  culinary: Migdalia Alvarezfernandez, an adept home chef, delights in preparing mofongo with crispy tostones, garlic‑infused sofrito, and succulent pork shoulder, while also experimenting with fusion dishes
    like quinoa‑based pasteles, and they never shy away from sourcing fresh plantains and epazote from the local market.
  core: Migdalia Alvarezfernandez balances razor‑sharp analytical precision with a love for spontaneous photography, yet often forgets to turn off the oven after cooking, leaving a lingering scent of burnt
    plantains that serves as a reminder of their practical yet occasionally absent‑minded nature.
background:
  cultural: Migdalia was born and raised in Canóvanas, a municipality that blends coastal and mountainous traditions. She is bilingual in Spanish and English, with deep roots in Puerto Rican culture that
    include influences from Taíno, Spanish, and African heritage. Family gatherings, religious festivities, and community celebrations such as Día de San Juan shape her sense of identity. Her upbringing
    instilled a strong sense of communal responsibility, which she channels into both her professional focus on data stewardship for public benefit and her personal involvement in neighborhood events and
    cultural preservation.
attributes:
  skills: '[''SQL'', ''Oracle Database Administration'', ''PostgreSQL'', ''Performance Tuning'', ''Data Modeling'', ''ETL Design'', ''Python Scripting'', ''PowerShell Automation'', ''Data Security'', ''Backup
    & Recovery'', ''Cloud Database Services (AWS RDS, Azure SQL)'', ''Technical Documentation'', ''Project Coordination'', ''Data Governance'']'
  hobbies: '[''Reading contemporary Puerto Rican literature'', ''Cooking traditional Puerto Rican dishes'', ''Bomba and Plena dancing'', ''Hiking in El Yunque'', ''Photography of urban and natural landscapes'',
    ''Attending local tech meetups'', ''Mentoring aspiring women in IT'', ''Volunteering to teach basic computer skills to seniors'']'
  career_goals: Migdalia aims to transition from a senior database administrator to a lead database architect within the next three years, directing large‑scale data platforms for public or private enterprises
    in Puerto Rico. She plans to obtain advanced certifications such as Oracle Certified Master, AWS Certified Solutions Architect, and Certified Data Management Professional. Her long‑term ambition is
    to shape data governance policies that protect privacy while enabling data‑driven decision making for local government and community organizations. She also hopes to mentor emerging women technologists
    and eventually launch a consultancy focused on secure, resilient data infrastructures for island‑based businesses.
