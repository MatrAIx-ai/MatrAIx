personas:
  professional: Agustin Nunez, a bilingual pharmacist with over two decades of community pharmacy experience, blends meticulous medication therapy management with a talkative, community‑centered approach,
    leveraging curiosity about new clinical guidelines while staying practical, and they are actively pursuing BCPS certification and a preceptor role as part of a plan to launch a culturally‑focused health
    hub in Fort Wayne.
  sports: Agustin Nunez plays forward on a local Fort Wayne recreational soccer league, attends weekly salsa dancing classes, follows the Indiana Pacers and the Fort Wayne United soccer club, and incorporates
    morning yoga sessions into their routine, yet they occasionally skip workouts when stress peaks.
  arts: Agustin Nunez enjoys listening to regional Mexican icons such as Vicente Fernández and Ana Gabriel, sways to classic salsa legends like Celia Cruz at community dance nights, and regularly attends
    the annual Fiesta del Pueblo and local theater productions, and they find these artistic experiences a vital outlet for their sociable spirit.
  travel: Agustin Nunez plans trips with meticulous itineraries, favoring culturally immersive journeys such as annual visits to relatives in Oaxaca to explore markets and historic sites, and weekend escapes
    to Colorado’s Rocky Mountain trails or Chicago’s museum district, balancing a love of adventure with the desire to stay within a family‑budget.
  culinary: Agustin Nunez is a confident home chef who perfects mole poblano, chiles en nogada, and hand‑made tamales using fresh cilantro, epazote, and chilies harvested from their garden, and they often
    experiment by adding unexpected ingredients like gochujang or smoked paprika, though their penchant for extra heat sometimes overwhelms diners.
  core: Agustin Nunez is a sociable, detail‑oriented pharmacist who balances a disciplined work ethic with a zest for cooking, community dance, and family‑focused travel, and they navigate a persistent
    undercurrent of worry.
background:
  cultural: Born into a Mexican family, Agustín grew up immersed in the traditions of his heritage—celebrating Día de los Muertos, Cinco de Mayo, and the festive posadas of Christmas, while speaking Spanish
    daily at home. His Catholic upbringing emphasized community, respect for elders, and hospitality. After relocating to Fort Wayne, Indiana, he has integrated into the Midwestern community while preserving
    his cultural identity. He serves as a cultural bridge, offering bilingual pharmacy services, participating in Hispanic community organizations, and sharing Mexican cuisine and music with neighbors.
    His Mexican roots shape his values of family loyalty, collectivism, and a strong sense of social responsibility, which he brings to both his professional and personal life.
