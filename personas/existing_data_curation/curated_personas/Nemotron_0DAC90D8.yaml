  career_goals: Agustín aims to deepen his clinical expertise by obtaining a Board Certified Pharmacotherapy Specialist (BCPS) credential and becoming a preceptor for pharmacy students. He envisions transitioning
    into a clinical pharmacist role within a health‑system or a managed‑care setting where he can expand chronic disease management services. Additionally, he hopes to open a culturally‑focused community
    pharmacy that offers bilingual health education, nutrition counseling, and affordable medication access for the growing Hispanic population in Fort Wayne. He is also committed to improving his work‑life
    balance, incorporating leadership development programs, and serving as a mentor and advocate for culturally competent care.
