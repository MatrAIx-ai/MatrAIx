persona_description: A conservation biologist who specializes in the restoration and management of freshwater fish populations, with a particular focus on American shad. They are dedicated to the recovery
  of American shad populations by working with federal and state resource agencies, conducting research on the biology and ecology of the species, and implementing management programs to restore their range
  and abundance. They have experience working on the Roanoke River American Shad Restoration Program and have captured adult fish with hatchery marks, indicating the success of the propagation program.
  They are knowledgeable about the history and status of American shad, including the decline in their populations due to habitat degradation and over-harvesting, and the cooperative efforts of the N.C.
  Wildlife Resources Commission and the U.S. Fish and Wildlife Service in restoring the species. They have a strong interest in the biology and ecology of American shad, and are passionate about the recovery
  of this important commercial and recreational fishery.
