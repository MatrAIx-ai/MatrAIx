  hobbies: '[''Gardening'', ''Woodworking'', ''Theater Attendance'', ''Bridge'', ''Volunteer Food Pantry Work'', ''Historical Nonfiction Reading'', ''Cooking Midwestern Cuisine'', ''Walking Club'', ''Scrapbooking'']'
  career_goals: Although retired, Marcus aims to channel his high standards and achievement drive into meaningful community leadership. He plans to expand the seniors’ club he chairs, creating a mentorship
    program that links retirees with high‑school apprentices interested in trades. He also hopes to author a memoir that chronicles Milwaukee’s manufacturing evolution and his own life lessons, while maintaining
    a disciplined health regimen that includes regular walking, strength exercises, and stress‑reduction practices such as journaling and meditation. Marcus values giving back, so he seeks to continue serving
    on the board of the local food pantry and to become a trusted advisor for neighborhood improvement projects.
