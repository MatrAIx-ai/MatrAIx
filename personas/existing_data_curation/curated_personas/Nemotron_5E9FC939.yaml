  hobbies: '[''reading historical biographies'', ''gardening'', ''knitting and quilting'', ''cooking and recipe experimentation'', ''birdwatching'', ''nature photography'', ''small book club'']'
  career_goals: Although retired, Esther aims to continue contributing to her community by mentoring younger volunteers, documenting and preserving the histories of Springfield’s African‑American families,
    serving on the board of the local historical society, compiling a family‑recipe cookbook, and completing a memoir that reflects her experiences across the civil‑rights era to the present. She also hopes
    to maintain her health and independence to stay active in her church’s outreach programs.
