  career_goals: Talencia aims to obtain Certified Medical Assistant credentials within the next year to deepen her clinical expertise and become a mentor for newer staff. She aspires to design and lead
    an art‑therapy program at her clinic or a local senior center, using creative expression to reduce patient stress and improve health outcomes. Over the longer term, she hopes to transition into a community
    health educator role focused on improving health literacy among underserved Black residents in Cabarrus County and advocating for culturally sensitive care.
