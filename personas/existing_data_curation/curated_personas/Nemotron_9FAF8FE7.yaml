personas:
  professional: Maria Blanco, a veteran retail supervisor with expertise in staff scheduling, inventory analytics, and bilingual customer engagement, combines their methodical planning and calm conflict‑resolution
    style with a curious eye for emerging retail technologies to craft inclusive, story‑driven store experiences.
  sports: Maria Blanco, who is an avid participant in a local Latin dance troupe and the Midtown Seniors Walking Club, supports the Minnesota Vikings (NFL) and Minnesota Twins (MLB) while staying active
    by walking the Chain of Lakes trails each spring and autumn, and they relish the camaraderie of team sports as a social anchor.
  arts: Maria Blanco regularly attends productions at the Guthrie Theater, reviews works by Frida Kahlo and Lila Downs, discusses Gabriel García Márquez novels in their historical literature book club,
    and they find that visual and narrative arts continually shape their sense of identity.
  travel: Maria Blanco delights in traveling to culturally rich destinations such as Oaxaca for its Day of the Dead celebrations and Santa Fe for its Southwest art scene, dreams of a future trip to Buenos Aires,
    but they plan their journeys carefully around a fixed retirement budget and family responsibilities.
  culinary: Maria Blanco, a proficient home cook, loves preparing mole poblano, chicken tamales, and pozole using garden‑fresh cilantro, epazote, and dried chilies de árbol, while they also enjoy sharing
    these recipes in their senior‑center cooking classes.
  core: Maria Blanco balances an inquisitive love of new retail ideas with a meticulously organized lifestyle, yet their nightly habit of re‑checking schedules and worrying about tomorrow often leaves them
    exhausted despite their energetic community involvement.
background:
  cultural: Maria was raised in a Mexican household that valued family, community, and cultural traditions. She grew up celebrating Día de los Muertos, Mexican Independence Day, and weekly family gatherings
    centered around shared meals and music. Bilingual in Spanish and English, she maintains strong ties to the vibrant Mexican community in Minneapolis, participating in cultural festivals and supporting
    local immigrant-owned businesses. Her upbringing instilled a deep sense of hospitality, respect for elders, and an appreciation for storytelling through art, all of which influence her professional
    style and personal interests. While fully integrated into Minnesotan life, she balances these dual identities, honoring her heritage while contributing to her local community.
