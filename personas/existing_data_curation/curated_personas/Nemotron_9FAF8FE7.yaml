  hobbies: '[''Gardening'', ''Cooking traditional Mexican dishes'', ''Teaching Spanish classes'', ''Reading historical and cultural books'', ''Attending theater performances'', ''Latin dance'', ''Yoga for
    stress relief'', ''Volunteering at senior centers'']'
  career_goals: At this stage of her career, Maria aims to transition from daily supervisory duties to a mentorship and consulting role, sharing her decades of frontline experience with emerging managers
    across the Minnesota retail sector. She aspires to develop a mentorship program that emphasizes inclusive leadership and stress‑management techniques, helping younger staff navigate workplace pressures.
    Additionally, she hopes to achieve a district‑wide supervisory position that allows her to influence broader policy on employee well‑being, while also laying the groundwork for a small boutique that
    showcases Mexican artisans and local crafts, blending her heritage with her retail expertise.
