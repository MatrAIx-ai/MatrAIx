    ''Attending tech meetups and hackathons'', ''Participating in strategy board games (Chess, Settlers of Catan)'', ''Volunteering for STEM education programs'', ''Family outings and cultural celebrations'']'
  career_goals: Luis aims to progress to a senior engineering manager or director role where he can lead large‑scale, sustainable infrastructure projects in California. He plans to obtain his Professional
    Engineer (PE) license, pursue advanced certifications in project management, and eventually launch his own consultancy focused on delivering cost‑effective, community‑oriented engineering solutions
    for underserved Mexican‑American neighborhoods. Along the way, he wants to become a recognized speaker at industry conferences and mentor more engineers from diverse backgrounds.
