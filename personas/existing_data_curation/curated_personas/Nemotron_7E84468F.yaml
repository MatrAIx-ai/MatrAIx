personas:
  professional: Luis Chang, a mechanical engineer turned project lead, leverages their deep CAD expertise, Python data analysis, Lean Six Sigma rigor, and bilingual communication to orchestrate sustainable
    infrastructure projects, while their competitive streak drives them to over‑deliver on every milestone and their disciplined organization keeps their teams on a strict schedule.
  sports: Luis Chang captains a local adult soccer team in the Bay Area Soccer League, frequents the Yuba River Trail with the Sierra Hiking Club, follows the San Francisco 49ers and Golden State Warriors
    religiously, and they blend competitive training sessions with social post‑game brunches at the local taqueria.
  arts: Luis Chang fuels their creative side by listening to Los Tigres del Norte and Red Hot Chili Peppers while mixing their own craft beer, collects vintage vinyl of Frida Kahlo’s painted album covers,
    and they unwind after hackathons with Settlers of Catan strategies inspired by the narrative art of Guillermo del Toro.
  travel: Luis Chang favors road‑trip adventures that combine rugged hiking in Yosemite, cultural immersion in San Miguel de Allende, and tech‑conference networking in Tokyo, planning trips months ahead
    to secure budget‑friendly lodging yet they always leave room for spontaneous detours to local street‑food stalls.
  culinary: Luis Chang delights in cooking carnitas tacos, chilaquiles verdes, and mole poblano, perfecting flavors with fresh cilantro, chipotle, and roasted cumin, while pairing each dish with their own
    home‑brewed IPA infused with orange peel and coriander, and they often experiment with sous‑vide techniques to achieve restaurant‑grade precision.
  core: Luis Chang is a fiercely organized, socially energetic engineer who channels their competitive drive into sustainable infrastructure, craft‑beer brewing, and relentless pursuit of the next tech
    challenge, all while occasionally juggling impulsive gadget purchases and a skeptical view of new collaborators.
background:
  cultural: Luis grew up in a Mexican‑American household in Yuba City, where Spanish and English were spoken interchangeably. Family gatherings centered around traditional celebrations such as Día de los
    Muertos, Cinco de Mayo, and holiday tamale feasts, instilling a deep respect for Mexican heritage and communal values. While he primarily identifies as Mexican, the multicultural environment of Yuba
    City—home to a sizable Asian community—has given him an appreciation for diverse cultural expressions. This bicultural experience shapes his worldview, influencing his love for Mexican cuisine, music
    (mariachi and norteño), and community service, while also fostering a pragmatic, American‑style work ethic.
