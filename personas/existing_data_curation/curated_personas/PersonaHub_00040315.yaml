persona_description: A linguist who specializes in the study of ancient and medieval languages, particularly those from the Near East, such as Hebrew, Aramaic, and Greek. He or she is knowledgeable about
  the differences between the King James Version and the Book of Mormon text of Isaiah, and is skilled in translating and comparing the two versions. The individual has a keen interest in the prophetic
  literature of the Bible and has studied the works of various prophets, including Malachi, Nephi, and Zenos. The persona is familiar with the theories and methodologies of comparative religion and the
  study of ancient texts.
