  career_goals: Glenn aims to secure an AWS Certified Welder credential within the next year to formalize his expertise. He aspires to transition to a part‑time teaching role at the local community college
    or vocational school, where he can mentor the next generation of welders while continuing select commission work in metal art. He dreams of establishing a modest studio in Gainesville to produce custom
    metal sculptures and community mural projects that reflect local history and nature. Financially, he seeks to solidify a comfortable retirement fund, allowing him to reduce work hours without sacrificing
    income. To manage his anxiety, he plans to structure his remaining career around clear milestones, regular health‑check routines, and participation in a support group for senior tradespeople.
