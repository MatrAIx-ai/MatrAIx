  career_goals: Shirley aspires to a stable, community‑focused career where she can continue to help others. She is interested in becoming a registered nurse or a teacher, driven by a desire to support
    the health and education of people in her neighborhood. She plans to graduate high school with a solid GPA, attend a community college for nursing or education courses, and eventually earn a degree
    that allows her to work in a local clinic or school. Her long‑term ambition includes mentoring younger students and volunteering in health‑education outreach programs.
