personas:
  professional: Shirley Birch is an aspiring junior historian who channels their organized, methodical nature into school research projects, excels at synthesizing primary sources, and volunteers at the
    local library's oral history program, where their love for tradition and community narratives shines.
  sports: Shirley Birch enjoys attending Saturday youth soccer matches with friends, plays on the middle‑school cross‑country team, and follows the Charlotte Hornets and Carolina Panthers, appreciating
    the discipline and teamwork they model.
  arts: Shirley Birch frames their afternoons around piano practice and choir rehearsals, draws detailed botanical sketches inspired by their gardening, and finds inspiration in the works of composer Lang Lang,
    singer Alicia Keys, and author Maya Angelou, letting music and literature shape their reflective mind.
  travel: Shirley Birch prefers structured family trips, having explored historic sites in Washington, D.C., and the river towns of Savannah and Charleston, while dreaming of a future road trip along the
    Blue Ridge Parkway to capture the region's natural beauty.
  culinary: Shirley Birch loves baking soul‑food classics like cornbread, peach cobbler, and sweet potato pie, frequently harvesting fresh herbs from their backyard garden to season meals, and often experiments
    with seasoning blends that combine cinnamon, nutmeg, and a pinch of cayenne for a comforting kick.
  core: Shirley Birch is a methodical, community‑centered teen whose love of routine blends with quiet curiosity, expressed through disciplined study, careful budgeting, and soulful creative pursuits.
background:
  cultural: Shirley is raised in a close‑knit African‑American family in Charlotte and Cabarrus County, North Carolina. Her upbringing emphasizes respect for elders, community service, and the traditions
    of Southern Black culture, such as Sunday church gatherings, soul‑food family meals, and storytelling. She values the legacy of Black educators and healthcare professionals in her community and draws
    inspiration from African‑American literature, music, and local mentorship programs.
