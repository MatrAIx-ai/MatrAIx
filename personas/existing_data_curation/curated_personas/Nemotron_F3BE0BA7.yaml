    and Organization'']'
  hobbies: '[''Weight training'', ''Running'', ''Cooking Mexican cuisine'', ''Soccer (community league)'', ''Reading business and self‑improvement books'', ''Playing strategic board games (Settlers of Catan,
    Ticket to Ride)'', ''Listening to regional Mexican music'', ''Volunteer work at Hispanic community events'', ''Hiking in Texas Hill Country'', ''Journaling'']'
  career_goals: Kevin aims to advance to a senior management analyst role within the next three to five years, leading high‑impact cross‑functional projects that drive efficiency for municipal and private
    sector clients in Bexar County. He plans to complete a bachelor’s degree in Business Administration and earn a Six Sigma Black Belt to deepen his expertise in process excellence. Long‑term, he aspires
    to become a Business Operations Manager or Director of Business Analysis, where he can shape strategic initiatives, mentor junior analysts, and leverage data to improve public services and community
    outcomes. He also seeks to build a professional network within the Hispanic business community and contribute to regional economic development.
