    farmers’ markets'', ''volunteering at a community kitchen'', ''playing indie video games'']'
  career_goals: Malcolm aims to become a sous‑chef within the next two years and then advance to head chef, eventually opening his own farm‑to‑table bistro that highlights Michigan’s fresh produce and balances
    innovative techniques with comforting Midwestern flavors. He plans to complete an associate’s degree in Culinary Arts to solidify his credentials, earn a certified chef certification, and seek mentorship
    opportunities that will help him develop leadership skills and healthier coping strategies for workplace stress.
