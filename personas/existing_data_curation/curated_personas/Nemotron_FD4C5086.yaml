  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Landscape photography'', ''Reading contemporary philosophy'', ''Arduino tinkering'', ''Gardening'', ''Hiking local trails'', ''Small‑group
    book club participation'', ''Volunteering at museum'']'
  career_goals: Selina aims to expand her impact beyond Independence by establishing a regional non‑profit consortium that blends technology, environmental stewardship, and the arts to address the digital
    and social divide in Jackson County. She is pursuing a part‑time Master’s in Public Administration to deepen policy expertise, and hopes to become Director of Community Services for the county, where
    she can influence funding allocations and champion innovative, evidence‑based interventions. Long‑term, she aspires to mentor emerging community leaders and author a guide on leveraging STEM tools for
    grassroots social change.
