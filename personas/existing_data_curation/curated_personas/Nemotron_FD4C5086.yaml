personas:
  professional: Selina Newby blends two decades of community service management with a solid STEM foundation, using data‑driven program design, GIS mapping, and grant writing to launch participatory art‑tech
    projects that bridge digital gaps for seniors while they confidently negotiate with stakeholders in small‑group settings.
  sports: Selina Newby enjoys early‑morning hikes on the Ozark trails with the Jackson County Trails Association, follows the Kansas City Chiefs in the fall football season and the Royals in summer baseball,
    and they incorporate weekly yoga sessions at a local community center to balance the physical demands of gardening.
  arts: Selina Newby spends weekends sketching tranquil landscapes in watercolor after viewing Monet’s Water Lilies at the regional gallery, curates community art installations inspired by Ansel Adams’
    black‑and‑white photography, and they find intellectual stimulation in contemporary philosophy texts by Judith Butler.
  travel: Selina Newby prefers meticulously planned solo trips that blend cultural immersion with low‑impact adventure, such as a weekend kayak expedition on the Mississippi River, a restorative visit to
    the art‑filled streets of Florence, Italy, and a future goal to explore the cherry‑blossom festivals of Kyoto, Japan, while they balance travel costs against the nonprofit’s modest operating budget.
  culinary: Selina Newby enjoys crafting hearty vegetable‑forward meals, often preparing quinoa‑stuffed bell peppers with roasted beet‑hummus and fresh basil, and they indulge in occasional dining out at
    farm‑to‑table bistros to taste seasonal heirloom tomatoes and locally sourced goat cheese, though they sometimes neglect proper food storage when overloaded with grant paperwork.
  core: Selina Newby is a data‑driven community strategist who balances quiet artistic retreats with outspoken advocacy, habitually jots ideas on scrap paper during hikes, and they can’t resist a weekend
    binge‑watch of indie documentaries despite a strict budget.
background:
  cultural: Selina was raised in a middle‑class family in suburban St. Louis, immersed in Midwestern values of modesty, community responsibility, and self‑reliance. Her upbringing combined traditional Protestant
    community life with exposure to the region’s vibrant arts scene, fostering a lifelong appreciation for creative expression. The STEM education she pursued at university introduced her to analytical
    thinking and interdisciplinary collaboration, which she later applied to community service in Independence. As a divorced woman navigating career and personal transitions, she embodies the resilient,
    pragmatic spirit of the heartland while remaining open to new ideas and diverse perspectives.
attributes:
  skills: '[''Data-driven program design'', ''GIS mapping for community needs'', ''Grant writing'', ''Budget oversight'', ''Program evaluation'', ''Python scripting for reporting'', ''Database management'',
