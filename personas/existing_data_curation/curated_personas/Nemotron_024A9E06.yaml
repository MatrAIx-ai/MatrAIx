  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Hiking'', ''Yoga and mindfulness meditation'', ''Knitting'', ''Volunteer document organization'', ''Book club participation'']'
  career_goals: Daphne seeks to transition into a supervisory role where she can lead a team of office support staff, implement efficiency initiatives, and mentor newer employees. She aims to obtain a Certified
    Office Professional (COP) credential within the next two years and may pursue a bachelor’s degree in Business Administration part‑time. Long‑term, she envisions a position as an Office Services Manager
    or a consultant specializing in workflow optimization for small businesses, while maintaining a work‑life balance that supports her mental health.
