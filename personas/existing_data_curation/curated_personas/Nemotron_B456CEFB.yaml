personas:
  professional: Andres Ocampo, a 42‑year‑old financial analyst turned aspiring senior portfolio manager, blends deep expertise in quantitative modeling with a vivid imagination, delivering ESG‑focused investment
    strategies through advanced Excel, VBA, Python, and R while crafting visually striking presentations that satisfy both their methodical nature and competitive drive.
  sports: Andres Ocampo, a devoted community‑league basketball player, competes fiercely on the court for the Eastside Hoops squad, cheers for the Los Angeles Lakers and Clippers, and balances this high‑energy
    routine with calming yoga sessions at a downtown studio.
  arts: Andres Ocampo curates a growing collection of contemporary prints from artists such as Yayoi Kusama, Jeff Koons, and emerging Los Angeles muralists, frequents the Museum of Contemporary Art for
    inspiration, and experiments with street‑style photography influenced by Annie Leibovitz, channeling their boundless curiosity into visual storytelling.
  travel: Andres Ocampo seeks immersive cultural experiences, having toured Mexico City’s historic markets, celebrated Día de los Muertos in Oaxaca, and planning a future art‑focused pilgrimage to Berlin’s
    galleries, all while balancing trips around family commitments and a modest travel budget.
  culinary: Andres Ocampo spends weekends mastering traditional Mexican dishes like mole poblano, chiles en nogada, and tacos al pastor, savoring ingredients such as dried chilies, corn masa, and cacao,
    and they relish pairing these creations with explorations of Los Angeles hotspots like Guelaguetza and Bestia.
  core: Andres Ocampo fuses analytical rigor with artistic flair, juggling high‑stakes finance, competitive basketball, mindful yoga, and Mexican culinary traditions, all while wrestling with a chronic
    worry habit that fuels both meticulous planning and occasional over‑analysis.
background:
  cultural: Andres is a second‑generation Mexican‑American raised in the San Gabriel Valley, where he grew up bilingual in Spanish and English. His family places a strong emphasis on close‑knit relationships,
    honoring traditions such as holiday gatherings, religious celebrations, and community service within the local Latino community. He identifies with both his Hispanic heritage and the broader Californian
    culture, often blending them through his love of Mexican cuisine, music, and festivals while also engaging in the diverse, multicultural environment of Los Angeles. This bicultural perspective informs
    his values of hard work, respect for family, and an appreciation for cultural diversity, which he brings to his professional interactions and personal interests.
