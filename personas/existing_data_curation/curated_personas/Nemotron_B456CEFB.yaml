  career_goals: Andres aims to become a senior portfolio manager within the next five years, leading a high‑performance investment team at a forward‑thinking firm or fintech startup. He aspires to design
    cutting‑edge investment products that blend traditional finance with emerging assets such as digital art and renewable energy projects. Long‑term, he envisions moving into a Chief Investment Officer
    role where he can shape firm‑wide strategy, champion responsible investing, and mentor the next generation of analysts. He also hopes to publish research on the intersection of art, culture, and finance,
    and to speak at industry conferences, leveraging his sociable nature to expand his professional network.
