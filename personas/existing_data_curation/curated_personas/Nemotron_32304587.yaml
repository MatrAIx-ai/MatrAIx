  career_goals: David imagines a future where he can combine his love of art, science, and helping people. He often talks about becoming an astronaut who designs space habitats, an architect who creates
    inspiring museums, or a veterinarian who cares for animals. His current ambition is to earn the top badge in his school's science fair and to keep improving his drawing skills, believing that mastery
    today will open the door to any of these paths.
