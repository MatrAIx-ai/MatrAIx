personas:
  professional: A budding junior architect‑in‑training, David Coffey combines his love for drawing comic‑style heroes and constructing LEGO cityscapes with an unusually disciplined work ethic for a 7‑year‑old,
    and they turn playtime into a meticulous design studio where they chart blueprints on graph paper and always meet their self‑set deadlines.
  sports: An energetic member of the local youth soccer squad that competes in the Dallas Area Youth Soccer League, David Coffey proudly wears the green jersey of their club team, cheers for the Dallas
    Cowboys on game nights, and never skips their after‑school jogs around the neighborhood park while balancing their love for teamwork with a strong desire to keep the group harmonious.
  arts: An enthusiastic young creator, David Coffey draws inspiration from comic legends like Stan Lee and Jack Kirby, regularly recreates famous paintings from the Dallas Museum of Art in their sketchbook,
    and showcases their vocal talent in the elementary choir performing classics like 'Do‑Re‑Mi', all while swapping stickers with friends during art club sessions.
  travel: A curious explorer, David Coffey has taken family road trips to the Space Center Houston and the Hill Country ranch, dreams of visiting the natural wonders of Yellowstone, and meticulously maps
    each adventure in a scrapbook that includes tickets from their rides at the State Fair of Texas.
  culinary: A budding food critic, David Coffey loves the cheesy stretch of a perfectly baked pizza slice, the tangy kick of homemade BBQ sauce on chicken tenders, and often tries their hand at mixing a
    simple guacamole using ripe avocados and lime, though they occasionally sneak extra cookies before dinner.
  core: David Coffey is a hyper‑curious, overly organized 7‑year‑old who balances their love for comic art, LEGO, and soccer with a habit of worrying about perfection, a generous streak toward friends,
    and the occasional cookie‑stealing habit, and they often keep a secret stash behind the bedroom door.
background:
  cultural: David's cultural background is rooted in a suburban American family in Keller, Texas. His upbringing reflects the region's blend of Southwestern and broader American cultural traditions, including
    participation in community events, holiday celebrations, and an emphasis on school and extracurricular activities. Exposure to the diverse cultural fabric of the Dallas-Fort Worth area—through school
    peers, local museums, and neighborhood festivals—has broadened his appreciation for varied artistic and cultural expressions.
