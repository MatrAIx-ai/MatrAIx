  hobbies: '[''Drawing and comic creation'', ''LEGO building'', ''Scratch coding'', ''Reading adventure and nature books'', ''Exploring parks and nature journaling'', ''Playing soccer'', ''Piano practice'',
    ''Emotional journaling'', ''Community art classes'']'
  career_goals: Robert dreams of becoming an illustrator who creates vibrant children’s books and comic strips that explore nature, science, and imaginative worlds. He is fascinated by wildlife and hopes
    one day to combine his artistic skills with a career in environmental education or wildlife photography, using his drawings to raise awareness about local ecosystems. Robert also imagines leading community
    art workshops for younger kids, where he can share his love of drawing, LEGO building, and basic coding. He sees his methodical planning ability as a future asset for managing larger creative projects,
    and he hopes that art will continue to help him process his worries and channel his curiosity into meaningful work.
