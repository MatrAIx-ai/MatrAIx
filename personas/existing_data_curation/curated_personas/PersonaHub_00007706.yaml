persona_description: 'A historian who specializes in the study of Jewish history in the Italian peninsula, particularly focusing on the period between the Inquisition and the rise of the Ottoman Empire.
  His research interests include the persecution and expulsion of Jews from the Italian cities during the 16th century, the establishment of synagogues and communal organizations, and the impact of the
  Inquisition on Jewish life in the region. He is particularly interested in the role of the Maranos, a group of Sephardic Jews who were expelled from Spain and settled in Italy, and the way they interacted
  with the local Jewish community. He has written extensively on the topic, including his book "The Jews of Ancona: A History of the Inquisition and Its Aftermath."'
