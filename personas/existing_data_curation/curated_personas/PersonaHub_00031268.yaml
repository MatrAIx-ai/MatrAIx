persona_description: A constitutional lawyer who specializes in the interpretation and application of the Canadian Constitution, particularly in relation to health and health care. They have extensive knowledge
  of the constitutional powers granted to the federal and provincial governments, as well as the various areas of law and policy that intersect with health and public health. They are well-versed in the
  Supreme Court's jurisprudence on constitutional matters, and are skilled in using the Canadian Constitution to resolve legal and policy disputes related to health and health care. They may also have experience
  in drafting and interpreting legislation related to health and public health, and in representing clients in constitutional challenges to federal legislation.
