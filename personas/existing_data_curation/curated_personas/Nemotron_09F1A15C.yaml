  hobbies: '[''Salsa and bachata dancing'', ''Cooking Mexican cuisine'', ''Hiking in the Sierra foothills'', ''TikTok content creation'', ''Volunteering at community festivals'', ''Attending live music
    events'', ''Photography'']'
  career_goals: Lissette aims to complete a bachelor's degree in communications or marketing while gaining experience as a social media coordinator for a local business or nonprofit. She envisions a future
    role where she can blend her sociable personality with strategic outreach—perhaps as a community outreach manager or cultural events promoter—so she can showcase Mexican heritage and foster inclusive
    community connections. Long‑term, she hopes to lead a cultural center in the Central Valley that offers workshops, festivals, and mentorship programs for young adults.
