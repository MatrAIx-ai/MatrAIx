  career_goals: Lou aims to channel his technical curiosity into a career that balances independence with hands‑on problem solving. He plans to secure an apprenticeship in automotive technology or electronics
    engineering within the next two years, leveraging his self‑taught skills to complement formal training. Ultimately, he envisions establishing his own boutique service business—either a custom PC building
    and repair shop or a small-scale automotive maintenance studio—where he can work autonomously in a quiet, controlled environment. He is also considering developing a niche software tool that automates
    routine diagnostic processes for hardware technicians, hoping to commercialize it as a side venture while maintaining his competitive edge and self‑reliance.
