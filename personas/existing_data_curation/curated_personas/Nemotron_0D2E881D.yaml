personas:
  professional: Harold Sinnett, an aspiring young technologist, channels his methodical nature into robotics club projects, where he applies Scratch programming and LEGO Mindstorms to build functional robots
    that compete in regional challenges.
  sports: Harold Sinnett, a dedicated midfielder on the Riverside Youth Soccer Club who practices three times a week, follows the tactical play of Manchester United and the high‑energy style of the LA Galaxy,
    supplements training with weekend runs and occasional basketball games with friends, and tracks personal performance metrics in a notebook to stay competitive.
  arts: 'Harold Sinnett, an avid fan of the animated series Avatar: The Last Airbender, collects LEGO Architecture sets, spends weekend evenings listening to the cinematic scores of Hans Zimmer and the
    pop‑rock hits of Imagine Dragons, and enjoys sketching detailed diagrams of their model airplanes, using these artistic outlets to unwind after competitive gaming sessions.'
  travel: Harold Sinnett, who prefers meticulously planned trips with clear itineraries, dreams of visiting the Smithsonian Air and Space Museum in Washington, D.C., the LEGO House in Billund, Denmark,
    and a family road‑trip to the Grand Canyon, balancing a love of adventure with the comfort of familiar routines.
  culinary: Harold Sinnett, whose cooking skill is at the middle school level, enjoys assembling homemade pepperoni pizza using mozzarella, tomato sauce, and fresh basil, perfecting the crispy crust with
    a kitchen timer, and occasionally experiments with snack‑sized sushi rolls featuring cucumber, avocado, and crab meat, all while maintaining a disciplined snack schedule that mirrors their organized
    routine.
  core: Harold Sinnett, a methodical 12‑year‑old who blends routine‑driven robotics and soccer with competitive gaming, worries often but channels anxiety into meticulous journaling, saving, and model‑building,
    making them both reliably organized and fiercely competitive.
background:
  cultural: Harold grew up in Brighton, a small city in southeastern Michigan known for its close-knit suburban feel and Midwestern values. His family's cultural roots are typical of many white families
    in the region, emphasizing community involvement, respect for routine, and a strong work ethic. He has been raised with a mix of traditional American customs - such as celebrating holidays like Thanksgiving
    and Fourth of July with family gatherings and participating in local school and community events. The local culture places a high value on high school sports, especially soccer and football, and encourages
    participation in community organizations like the Boy Scouts. These influences have reinforced Harold's preference for familiar structures, his sociable nature, and his practical outlook on life.
attributes:
  skills: '["Organizational and time-management skills", "Team leadership in soccer", "Basic Scratch programming", "Mechanical aptitude through model building", "Reliable execution of group projects"]'
  hobbies: '["Soccer (school team)", "Robotics Club (Scratch and LEGO Mindstorms)", "Model airplane building", "Strategic video games (Minecraft, Age of Empires)", "Boy Scouts", "Journaling"]'
  career_goals: Harold aspires to a future where his love for structure, teamwork, and competition can intersect. He dreams of becoming a civil engineer or automotive technician who designs and builds practical
    solutions, valuing the predictability of concrete projects. Simultaneously, his competitive spirit fuels an ambition to excel in high-school athletics, aiming to be a varsity soccer captain and, eventually,
    a coach or sports manager. In both paths, he envisions a role that lets him plan, lead, and make dependable contributions to his community.
