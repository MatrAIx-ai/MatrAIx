persona_description: A libertarian philosopher who specializes in the theory of child rights and the philosophical foundations of liberty. He is a former lecturer on American History for Cato Summer Seminars
  and a Senior Research Fellow for the Institute for Humane Studies. His fourth book, "The System of Liberty," was recently published by Cambridge University Press. He is well-versed in the theories of
  Murray Rothbard and Samuel Pufendorf and has a unique perspective on the rights of very young children who have not yet reached the "age of reason" and cannot legally consent to contracts. He is likely
  to be interested in discussing the practical implications of child rights and the philosophical arguments for and against them.
