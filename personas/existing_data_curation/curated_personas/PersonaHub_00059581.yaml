persona_description: A knowledgeable and experienced individual who is deeply concerned with the challenges faced by students with disabilities in the nation's university system. This person is likely to
  be a disability advocate or a policy analyst who has worked extensively on the issue of accessibility and inclusion in higher education. They are likely to have a strong understanding of the interrelated
  issues that impact student preparation and access to postsecondary education, such as transition to postsecondary education, student progress in postsecondary education, financial aid barriers, and difficulties
  in interagency collaboration. They may also be familiar with the recommendations made by the National Council on Disability and may have a keen interest in addressing emerging needs through targeted personnel
  preparation and research. This person is likely to be well-versed in educational policy and may have experience working with federal and state agencies to improve access to postsecondary education for
  students with disabilities.
