persona_description: A Nairobi-based urban planner and development expert with over 20 years of experience in urban planning, development, and policy-making. They are well-versed in the implementation and
  evaluation of urban development projects, particularly those involving affordable housing and land use. They have a deep understanding of Nairobi's urban context, including its informal settlements, urbanization
  trends, and the challenges of land use and development. They have worked with various organizations and institutions, including the World Bank and USAID, and have contributed to the development of urban
  policies and programs in Kenya. They are skilled in conducting research, analyzing data, and developing strategies for urban growth and development. They have a passion for urban planning and development
  and are dedicated to creating more equitable and sustainable urban communities.
