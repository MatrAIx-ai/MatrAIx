personas:
  professional: A budding junior aerospace enthusiast, Raymond Hawkins designs LEGO rockets, sketches detailed spacecraft and lake landscapes, and uses their organized yet flexible mindset to lead small
    build sessions with friends, channeling their sociable energy into collaborative creation.
  sports: An enthusiastic ice‑rink regular, Raymond Hawkins skates for the Negaunee Falcons youth hockey team, cheers loudly for the Detroit Red Wings and the Minnesota Wild, and eagerly watches the Chicago
    Blackhawks on TV, while also joining school‑organized dodgeball tournaments in the fall.
  arts: A vivid young creator, Raymond Hawkins fills sketchbooks with animals, rockets, and pine‑forest scenes, is captivated by Studio Ghibli’s "My Neighbor Totoro," sings along to Raffi’s "Baby Beluga"
    and "The Wheels on the Bus" in music class, and proudly displays a handcrafted LEGO space station at the school art fair.
  travel: A curious explorer, Raymond Hawkins enjoys family outings to the Apostle Islands and Pictured Rocks National Lakeshore, eagerly anticipates winter trips to the Negaunee Snow Festival, dreams of
    a future visit to the Kennedy Space Center, and plans trips with parental guidance, balancing school schedules and a modest family budget.
  culinary: A budding kitchen helper, Raymond Hawkins loves mixing batter for chocolate chip cookies with their mother, relishes fresh blueberry pie at community gatherings, delights in the smoky taste
    of Lake Superior fish fry at summer picnics, and frequently snacks on trail‑mix mixes of dried cranberries and pumpkin seeds.
  core: Raymond Hawkins is a chatty, curiosity‑driven six‑year‑old who blends art, building, and community spirit into an eager explorer of both Earth and imagined space.
background:
  cultural: Raymond is raised in Negaunee, a close‑knit town in Michigan’s Upper Peninsula. His family’s roots trace back to Finnish and Irish immigrants who settled the region during the early 20th century,
    and the community’s traditions blend Midwestern values with a strong connection to the outdoors and the mining heritage of Marquette County. He attends a public elementary school where a mix of seasonal
    activities—ice‑fishing, snowshoeing, and local hockey—shape his daily life. Church gatherings and school festivals reinforce a sense of communal responsibility, while the local library’s story hours
    and the nearby Tahquamenon Falls inspire his love for nature and storytelling.
