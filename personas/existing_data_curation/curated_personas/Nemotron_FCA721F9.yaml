  career_goals: He dreams of becoming an artist who can paint the stories he imagines, an astronaut who explores the stars he reads about, and a teacher who can share exciting ideas with other kids. He
    also wants to help his community by organizing fun events and learning more about the local mining history, hoping one day to be a museum guide or community storyteller.
