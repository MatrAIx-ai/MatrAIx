    scenes'', ''E‑scooter riding'']'
  career_goals: Robert aims to earn his GED within the next two years and enroll in an automotive technology program at a nearby community college or vocational school. In the short term, he seeks an apprenticeship
    with a local auto repair shop to deepen his hands‑on experience and earn industry certifications such as ASE. His long‑term ambition is to open his own small automotive repair and custom‑bike shop that
    serves the Trenton area, providing reliable service while offering training opportunities for other youth. He also hopes to leverage his first‑aid skills and community connections to volunteer as a
    certified emergency responder during county events, blending his practical expertise with a desire to support his neighborhood.
