  hobbies: '[''Reading non‑fiction (business, history, psychology)'', ''Vegetable gardening'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Small book club participation'', ''Mindfulness meditation'', ''Journaling'']'
  career_goals: Maurice aims to advance from his current sales manager role to a regional director position where he can shape multi‑territory sales strategy by integrating data‑centric methods with time‑tested
    practices. He is driven to implement a performance framework that boosts productivity while fostering a supportive, low‑stress environment for his team, reflecting his concern for emotional well‑being.
    Long‑term, he envisions establishing a boutique consulting practice that helps small‑to‑mid‑size firms develop disciplined, ethically grounded sales operations, securing both professional fulfillment
    and financial stability for a comfortable retirement.
