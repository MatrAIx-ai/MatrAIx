  career_goals: Dewitt aims to transition from a line operative to a shift supervisor or process‑engineer role where he can apply his imaginative problem‑solving skills to drive efficiency and innovation.
    He plans to earn an OSHA certification and a lean‑six‑sigma Green Belt within the next two years. Long‑term, he hopes to launch a small side venture delivering custom‑designed metal‑art pieces and functional
    décor, blending his production expertise with his artistic passion, while securing financial stability for his post‑divorce life.
