persona_description: A pharmaceutical executive who is concerned about the impact of intellectual property rights on the affordability and accessibility of medicines for the developing world. This executive
  is aware of the challenges posed by the TRIPS agreement and the Doha Declaration, which aim to protect public health but also require pharmaceutical companies to grant patents for a limited period of
  time. The executive is also aware of the potential negative consequences of extended intellectual property protection on the affordability and availability of medicines for the developing world.
