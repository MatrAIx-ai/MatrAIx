personas:
  professional: Stephen Jackson channels their masterful floor‑and‑tile installation expertise, keen eye for abstract pattern design, and boundless imagination into crafting custom, culturally resonant
    floor surfaces, while their relaxed attitude toward obligations and preference for solitary, flexible work hours fuels the transition toward owning a boutique design studio.
  sports: Stephen Jackson’s athletic pursuits consist of seasonal hikes across the Badlands and prairie trail runs, membership in a local hiking club that meets monthly, and fervent fandom for the Minnesota
    Vikings (NFL) and Minnesota Timberwolves (NBA), which they follow from the quiet of their home studio.
  arts: Stephen Jackson’s artistic life blends painting abstract canvases inspired by Mark Rothko’s chromatic fields, crafting beadwork that echoes traditional indigenous symbols taught by grandparents,
    hand‑making functional wooden objects in the spirit of Sam Maloof, and photographing landscape textures in the documentary style of Ansel Adams, forging a multidisciplinary creative identity.
  travel: Stephen Jackson favors low‑key, nature‑centric travel, planning spontaneous road trips to the Badlands, Yellowstone, and, when budget permits, the Scottish Highlands or Icelandic fjords, while
    balancing a modest travel fund that reflects their love of solitude, photography, and occasional wanderlust for remote, rugged destinations.
  culinary: Stephen Jackson enjoys earthy, home‑cooked meals such as wild‑rice and mushroom risotto, smoked bison burgers seasoned with juniper berries, and cedar‑plank salmon brushed with maple‑infused
    glaze, preferring ingredients like smoked paprika, fresh herbs, and locally foraged mushrooms, while their cooking often leaves a cluttered kitchen—a testament to their creative focus over tidy housekeeping.
  core: Stephen Jackson is a solitary, imaginatively driven craftsman who melds abstract art with functional flooring, navigates life with a relaxed, sometimes disorganized rhythm, and leverages emotional
    stability to balance artistic passions with entrepreneurial aspirations.
background:
  cultural: Stephen was raised in a family with deep roots in the Dakota/Sioux heritage of North Dakota. Growing up on the outskirts of Rugby, he was exposed to the oral storytelling traditions, seasonal
    ceremonies, and reverence for the land that are central to his community. These cultural values fostered his respect for natural materials and inspired his incorporation of subtle tribal motifs into
    his flooring designs. He participates in local powwows, attends seasonal gatherings, and continues to learn traditional crafts such as beadwork from Elders. While his professional life is grounded in
    mainstream construction, his personal identity remains intertwined with the values of stewardship, community service, and artistic expression passed down through his lineage.
attributes:
  skills: '[''Carpet and rug installation'', ''Tile and stone laying'', ''Floor substrate preparation'', ''Custom pattern design'', ''Material selection and sourcing'', ''Blueprint reading'', ''Power tool
    operation'', ''Safety compliance'', ''Client consultation'', ''Creative problem solving'', ''Basic project budgeting'']'
  hobbies: '[''Abstract painting'', ''Woodworking'', ''Landscape photography'', ''Solo hiking'', ''Beadwork'', ''Reading mythology and folklore'', ''Digital floor design (CAD)'', ''Collecting vintage floor
    samples'', ''Listening to traditional tribal music'']'
  career_goals: Stephen aims to transition from a hands‑on installer to the owner of a boutique flooring studio that specializes in artistic, culturally inspired floor designs for homes and community spaces
    in the Upper Midwest. He wants to develop a portfolio that blends modern abstract aesthetics with traditional American Indian motifs, mentor apprentices from his community, and collaborate with local
    museums and cultural centers on heritage restoration projects. Over the next five years, he plans to secure a steady flow of custom commissions that allow him to balance work with his artistic passions,
    eventually scaling back to part‑time work focused on design and mentorship.
