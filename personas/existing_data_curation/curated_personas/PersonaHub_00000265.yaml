persona_description: A scientist who is conducting research on the James, York, and Rappahannock rivers, as well as the Chesapeake Bay, to determine the scope and extent of coastal and estuarine oxygen
  depletion. The scientist is using a variety of survey methods, including tow bodies, skis, and water samplers, to collect data. The scientist is also interested in mapping coral ecosystems and has conducted
  research in Narragansett Bay, Rhode Island, and the Gulf of Mexico. The scientist's work is being funded by the Environmental Protection Agency and is focused on assessing the dissolved oxygen criteria
  for the Chesapeake Bay.
