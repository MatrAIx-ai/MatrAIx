personas:
  professional: Scott Cobb is a technically skilled IT support specialist who translates complex hardware and networking issues into clear, user‑friendly documentation, leveraging their curiosity and relaxed
    yet cooperative style to mentor junior staff while eyeing a Systems Administrator role.
  sports: Scott Cobb enjoys low‑key fitness through weekend hikes with the local Appalachian Trail Conservancy crew, occasional cross‑country skiing in the Catskills during winter, and follows the New Jersey
    Devils in hockey while cheering for the New York Giants in football.
  arts: Scott Cobb channels their love for quiet exploration into nature photography inspired by Ansel Adams, sketching reminiscent of Vincent van Gogh’s brushwork, literary indulgence in Hilary Mantel’s
    historical narratives, unwinding with indie folk from Bon Iver and strategic tabletop RPG sessions featuring Dungeons & Dragons.
  travel: Scott Cobb prefers low‑key, self‑planned road trips that blend summit hikes and photography, having trekked the Appalachian Trail segment in Virginia, explored the geysers of Yellowstone, and
    dreaming of the rugged Scottish Highlands, all while balancing travel costs with a modest savings plan and a love for campsite cookouts.
  culinary: Scott Cobb enjoys whipping up quick, health‑conscious meals such as pan‑seared salmon with quinoa and roasted Brussels sprouts, indulges in a perfectly brewed pour‑over coffee using Ethiopian
    beans, and occasionally splurges on craft pizza topped with artisanal mozzarella, while their culinary skills remain at a competent home‑cook level.
  core: Scott Cobb is a curiosity‑driven, solitary tech enthusiast who blends methodical troubleshooting with an affinity for quiet outdoor pursuits, yet often lets relaxed scheduling let paperwork pile
    up and indulges in an occasional impulse buy of gaming gear.
background:
  cultural: Scott grew up in a middle‑class, white Anglo‑American family in suburban New Jersey, where a blend of East Coast pragmatism and community‑oriented values shaped his outlook. His upbringing emphasized
    self‑reliance, respect for personal space, and a modest appreciation for local history, including the colonial heritage of the region. The proximity to diverse natural areas fostered an early appreciation
    for outdoor recreation. His humanities education deepened his exposure to a broad range of cultural narratives and reinforced a thoughtful, reflective approach to both work and leisure. Together, these
    influences contribute to his balanced blend of curiosity, practicality, and a preference for flexible, low‑stress environments.
attributes:
  skills: '[''Computer hardware repair'', ''Operating system troubleshooting (Windows/macOS/Linux)'', ''Network configuration and Wi‑Fi setup'', ''Remote support tools (e.g., TeamViewer, AnyDesk)'', ''Ticketing
    system management (e.g., Zendesk, ServiceNow)'', ''Technical documentation and user guide creation'', ''Client communication and empathy'', ''Conflict de‑escalation'', ''Research and information synthesis'',
    ''Basic scripting (PowerShell, Bash)'']'
  hobbies: '[''hiking'', ''nature photography'', ''sketching landscapes'', ''reading historical nonfiction'', ''literary fiction'', ''tech blogging and podcasts'', ''PC building and tinkering'', ''strategic
    video gaming'', ''small‑group tabletop RPGs'', ''volunteering for trail maintenance'']'
  career_goals: Scott aims to transition from a frontline support role to a more strategic position such as Systems Administrator or IT Support Team Lead within the next three years. He plans to earn CompTIA
    Network+ and Security+ certifications to broaden his expertise in networking and cybersecurity. While he values career advancement, he also prioritizes flexibility and a low‑stress environment, so he
    is exploring remote or hybrid roles that allow a balance between professional growth and personal autonomy. Long‑term, he envisions launching a freelance tech‑consulting practice that combines his technical
    skills with his talent for creating user‑friendly documentation and training modules for small businesses.
