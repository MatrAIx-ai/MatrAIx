persona_description: A psychology professor who specializes in the study of child development and education. He is an expert in the psychology of children and has researched and taught about the psychology
  of children for 30 years. He is a research professor of psychology at Boston College and author of the widely used introductory textbook, Psychology. He will speak at 10:45 a.m. on Wednesday, July 11,
  in the Amphitheater, and he will focus on how children learn in their own natural ways and how they can become educated that way. He believes that a forced curriculum common in elementary schools can
  actually deteriorate the natural way in which children inherently educate themselves. He suggested that a healthy mingling with their peers without overbearing adult supervision or correction is the answer
  to the problem. He also said that schools have slowly become a much more "pressured community" in which children are rewarded based on performance. He believes that the retention rate for students who
  are genuinely interested in school material they’ve chosen is exponentially higher than that of students who are required to memorize and recite a variety of pre-chosen subjects. He also said that schools
  have slowly become a much more "pressured community" in which children are rewarded based on performance.
