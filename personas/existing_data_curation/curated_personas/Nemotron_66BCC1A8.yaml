personas:
  professional: Harold Sims, a methodical three‑year‑old pre‑engineer who meticulously sorts his LEGO bricks by color and shape before building towers, blending his natural curiosity about how pieces fit
    together with a practical habit of following step‑by‑step instructions.
  sports: Harold Sims, a budding sports enthusiast who dons a New York Yankees cap for weekend tee‑ball practice with the Little Lions preschool league, enjoys kicking a soft soccer ball during spring sessions
    with the Tiny Toads club, and prefers structured drills over chaotic free‑play, yet they occasionally resist prolonged activity when fatigue sets in.
  arts: Harold Sims, a lively little fan of Sesame Street and Disney classics, sings the 'Let It Go' chorus from Frozen at full volume, mimics the voice of Mickey Mouse during pretend play, collects crayons
    to draw pictures inspired by Dr. Seuss’s whimsical style, and they regularly ask for bedtime storytime featuring the adventures of The Wiggles.
  travel: Harold Sims, an adventurous three‑year‑old who loves family road trips to the Florida beaches and annual visits to Disney World, prefers meticulously packed snack boxes and scheduled nap breaks
    over spontaneous detours, yet they become easily distressed if the journey exceeds their patience, making short weekend getaways to the nearby countryside their sweet spot.
  culinary: Harold Sims, a selective eater whose favorite dish is cheesy macaroni paired with crunchy apple slices, enjoys helping stir batter for pancakes with a wooden spoon, yet they frequently push
    away broccoli and peas, claiming the textures are 'too squishy,' and delights in occasional treats like chicken nuggets with ketchup.
  core: Harold Sims, a methodical yet emotionally volatile three‑year‑old, balances a love for organized play with sudden bouts of anxiety, turning daily routines into miniature projects while navigating
    the world with curiosity and caution.
background:
  cultural: Harold is raised in a white, Southern family in Hopkinsville, Kentucky. His upbringing includes regular attendance at a local Baptist church, participation in community events such as county
    fairs and high school football games, and exposure to classic country and bluegrass music. Family traditions like Sunday meals, gardening, and storytelling shape his values of reliability, modesty,
    and respect for routine, while the rural environment fosters his practical curiosity and love for hands‑on activities.
attributes:
