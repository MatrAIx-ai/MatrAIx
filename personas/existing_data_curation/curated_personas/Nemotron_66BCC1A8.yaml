  hobbies: '[''building block towers'', ''arranging toy cars'', ''listening to storybooks'', ''drawing with crayons'', ''helping in the kitchen'', ''exploring the backyard'']'
  career_goals: Harold often talks about becoming a firefighter because he admires the organized gear and the idea of helping people in need. He also loves fixing his toy cars, dreaming of being a mechanic
    who can make things work reliably. Occasionally he mentions caring for the family dog and other animals, hinting at a future interest in veterinary work. These ambitions reflect his curiosity, practical
    mindset, and desire for order and safety.
