  career_goals: Although retired, Anna aims to stay actively engaged in her community. She hopes to lead a seniors’ advisory board at the local library, mentor younger volunteers in event coordination,
    and contribute to the Hudson Valley Historical Society by curating oral histories. She also plans to complete a short‑course in genealogy to deepen her understanding of the region’s heritage, and to
    publish a memoir of her life experiences for her grandchildren.
