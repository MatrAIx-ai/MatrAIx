  hobbies: '["Salsa and cumbia dancing", "Community senior soccer league", "Gardening (herbs and tropical fruits)", "Traditional Colombian cooking", "Volunteering at cultural festivals", "Storytelling circles",
    "Reading tech blogs", "Spontaneous trips to visit family in Colombia", "DIY home improvement projects"]'
  career_goals: Miguel’s career ambitions focus on community engagement rather than formal employment. He aspires to volunteer as a coordinator for cultural events, start a monthly cooking class that blends
    traditional Colombian dishes with contemporary techniques, mentor young adults in practical trades and digital literacy, and serve on the board of a local Hispanic community organization, helping shape
    programs that balance innovation with respect for heritage while staying active and connected to his roots.
