personas:
  professional: Miguel Figueroa, a 60‑year‑old community‑driven volunteer coordinator, blends bilingual communication, hands‑on DIY expertise, and a love for lively group activities to organize cultural
    festivals and senior‑friendly workshops with an improvisational, people‑first style that often bends deadlines.
  sports: Miguel Figueroa plays forward for the Sun Valley Seniors Soccer Club in the local senior league, dances salsa and cumbia as cardio, and avidly follows San Antonio FC and the San Antonio Spurs,
    balancing competitive spirit with a relaxed, social approach to fitness.
  arts: Miguel Figueroa immerses themselves in salsa and cumbia dance nights, regularly attends storytelling circles featuring folk tales, and draws inspiration from musicians like Carlos Vives, Shakira,
    and the legendary Celia Cruz, often incorporating these rhythms into community events.
  travel: Miguel Figueroa favors spur‑of‑the‑moment weekend flights to Bogotá and Cartagena to visit family, while also enjoying road‑trip adventures to Santa Fe, New Mexico, blending cultural immersion
    with a modest travel budget and flexible itineraries.
  culinary: Miguel Figueroa passionately cooks traditional dishes such as bandeja paisa, ajiaco, and arepas de queso using home‑grown herbs like cilantro and oregano, skillfully merging classic Colombian
    flavors with contemporary plating while often improvising with tropical fruits like mango and papaya.
  core: Miguel Figueroa is a socially vibrant, hands‑on volunteer who balances spontaneous curiosity with practical community action, occasionally letting disorganization slip while staying emotionally
    steady and deeply rooted in cultural traditions.
background:
  cultural: Miguel was born and raised in the Andean region of Colombia, where family gatherings, Catholic traditions, and vibrant music shaped his early life. He immigrated to the United States in his
    thirties and settled in Charlotte, NC, building a life that intertwines Colombian customs with Southern hospitality. He continues to celebrate Colombian holidays such as Carnaval de Barranquilla, Semana
    Santa, and festive Christmas novenas, while also participating in local community events and sharing his culture through food, dance, and storytelling. Fluent in both Spanish and English, Miguel serves
    as a cultural bridge, helping newer immigrants adapt and introducing his American neighbors to Colombian flavors and traditions.
