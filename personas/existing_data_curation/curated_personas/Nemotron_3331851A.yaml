  career_goals: Within the next three to five years, Lucia aims to transition into a sales manager role overseeing a small team, where she can apply her competitive drive to exceed regional targets and
    institute systematic sales processes. She plans to earn a Certified Professional Sales Leader (CPSL) credential, deepen her expertise in technology-enabled sales operations, and eventually explore launching
    her own niche distribution firm that balances structured growth with the ability to pivot quickly to market changes.
