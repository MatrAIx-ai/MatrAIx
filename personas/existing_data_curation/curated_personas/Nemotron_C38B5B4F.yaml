personas:
  professional: Johnny Harbour, a veteran funeral director and embalming specialist, merges their deep restorative‑art expertise, green‑burial compliance knowledge, and competitive drive to transform their
    Brevard County funeral home into a leading provider of artistic and environmentally conscious memorial services, even as their relaxed attitude toward scheduling sometimes results in last‑minute logistical
    scrambles.
  sports: Johnny Harbour avidly follows the Miami Dolphins and the Orlando Magic, plays pickleball at the local senior recreation club, occasionally joins a community baseball league for laid‑back batting
    practice, and incorporates birdwatching hikes as low‑impact cardio sessions during Florida’s cooler mornings.
  arts: Johnny Harbour pursues watercolor landscapes inspired by Monet and Winslow Homer, sculpts small figurines echoing Rodin’s form, curates a vintage camera collection that captures Ansel Adams‑style
    tonal depth, and regularly contributes to community theater set design while attending gallery openings featuring contemporary Florida artists like Lew Oliver.
  travel: Johnny Harbour delights in weekend trips to Savannah’s historic cemeteries, road‑trips along Florida’s A1A to photograph coastal lighthouses, and dreams of attending the classic‑car showcase in
    Stuttgart, Germany, yet their love of spontaneity often leads to last‑minute itineraries rather than detailed planning.
  culinary: Johnny Harbour favors garden‑fresh dishes—heirloom tomatoes, sweet corn, and basil—in salads and grilled seafood gumbo, while occasionally treating themselves to a perfectly seared stone crab
    cocktail, reflecting a blend of homegrown nutrition and indulgent Florida coastal cuisine.
  core: Johnny Harbour is a creatively driven, environmentally conscious funeral director who balances meticulous artistry with a laid‑back, sometimes chaotic lifestyle, channeling their competitive spirit
    into business innovation and classic‑car restoration.
background:
  cultural: Johnny grew up in a middle‑class, white Southern‑Florida family with deep roots in the region, tracing heritage back to Irish and English ancestors. Raised in a culturally Christian environment,
    he was accustomed to traditional funeral rites but, through his career, has developed a respect for the diverse rituals of the community he serves. His upbringing emphasized self‑reliance, a strong
    work ethic, and an appreciation for local history and natural landscapes, all of which shape his blend of conventional respect and innovative, artistic approaches to memorializing lives.
attributes:
  skills: '[''Embalming and restorative art'', ''Custom casket and urn design'', ''Grief counseling and client communication'', ''Funeral law and regulatory compliance'', ''Green burial and eco‑friendly
    practices'', ''Business management and budgeting'', ''Vendor negotiation and supply chain coordination'', ''Use of digital memorial platforms and 3D printing'', ''Public speaking and ceremony facilitation'',
    ''Knowledge of multicultural funeral customs'']'
  hobbies: '[''Watercolor painting'', ''Sculpting small figurines'', ''Historic cemetery photography'', ''Classic car restoration'', ''Attending art galleries and theater'', ''Set design volunteering for
    community theater'', ''Birdwatching in Florida nature reserves'', ''Vegetable gardening'', ''Exploring emerging funeral technology'', ''Studying funerary art history'']'
  career_goals: Johnny aims to position his funeral home as the premier provider of artistic and environmentally conscious services in Brevard County. He plans to expand his facility to include a dedicated
    green burial garden, integrate virtual memorial experiences, and launch a line of bespoke, handcrafted caskets. He also seeks leadership roles within the Florida Funeral Directors Association, hoping
    to influence industry standards toward more creative and sustainable practices. Ultimately, he wants his business to be recognized for its innovation, quality, and compassionate service, outpacing regional
    competitors.
