persona_description: A Marketing Professor who specializes in the study of consumer behavior and social media impact. Her research interests include the effects of mobile phone use on pro-social behavior
  and its potential social implications. She has conducted experiments on test groups of cellphone users and found that short periods of cellphone use can decrease pro-social behavior and persistence in
  solving word problems, especially when the participants are asked to draw a picture of their cellphones and think about how they used them. Her findings have implications for businesses and marketers
  who use mobile phones as a marketing tool.
