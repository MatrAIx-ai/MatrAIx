persona_description: A scientist or a researcher who specializes in the study of radiation effects, particularly in the field of polymer chemistry. They are likely to be interested in the interaction between
  radiation and materials, including the formation and destruction of unsaturated groups in polyethylene and paraffins. They would be familiar with the concept of l.e.t. (linear energy transfer) and its
  effects on radiation-induced reactions. They would have a keen interest in comparing the effects of different forms of radiation on the same material, and would be able to infer the proportion of H atoms
  that escape from the tracks of the two forms of radiation. They would also be interested in the formation of carbonyl with different forms of radiation and its effects on the material.
