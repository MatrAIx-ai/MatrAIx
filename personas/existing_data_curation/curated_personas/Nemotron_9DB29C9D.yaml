  career_goals: Ijaz aims to ascend to a regional sales director role within the next five years, where he can shape broader market strategies and mentor a larger cohort of sales professionals. He envisions
    launching a boutique consultancy that merges his sales expertise with his passion for creativity, helping firms design unconventional, art‑inspired sales campaigns. A personal ambition is to integrate
    emerging AI tools into his sales processes to enhance predictive forecasting and personalized client outreach. Balancing professional growth with well‑being, he aspires to champion mental‑health initiatives
    within his organization, creating supportive environments that address stress and negative emotional experiences. Ultimately, Ijaz hopes to transition to a semi‑retired phase where he can dedicate more
    time to his artistic pursuits and possibly open a small cultural café that showcases South Asian flavors alongside local craft beverages.
