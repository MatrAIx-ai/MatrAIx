personas:
  professional: Paulette Wright, a 27‑year‑old visual storyteller and freelance content creator, leverages her self‑taught Photoshop and Procreate skills to curate pop‑up exhibitions and craft social‑media
    campaigns that elevate emerging Southern artists, all while juggling a flexible schedule that reflects her love of spontaneity and competitive drive.
  sports: Paulette Wright cheers for the New Orleans Pelicans and the LSU Tigers, joins a community basketball league on Saturdays, and fits in sunrise yoga sessions at Baton Rouge’s City Park, preferring
    flexible, low‑impact workouts over rigid gym routines.
  arts: Paulette Wright immerses herself in Baton Rouge’s art scene by sketching cityscapes at the Shaw Center for the Arts, photographing street murals by local creator Malik Johnson, and drawing lyrical
    inspiration from jazz legend Wynton Marsalis while curating community workshops.
  travel: Paulette Wright prefers spontaneous, culturally‑rich trips—she’s savored the historic French Quarter of New Orleans, the oak‑lined streets of Savannah, and dreams of tracing ancestral roots in
    Accra, Ghana—yet she budgets carefully, often using last‑minute flight deals and staying in boutique B&Bs to stretch her freelance earnings.
  culinary: Paulette Wright cooks with a modest but confident hand, regularly whipping up shrimp étouffée seasoned with filé powder and andouille, perfecting beignets dusted with powdered sugar, and swapping
    in roasted okra for plant‑based meals when her yoga flow calls for lighter fare.
  core: Paulette Wright merges a fiercely competitive curiosity with a serene, almost unflappable calm, juggling spontaneous art gigs, late‑night gallery hunts, and a love of Creole cuisine, all while habitually
    misplacing her planner.
background:
  cultural: Paulette grew up in a close-knit African-American community in East Baton Rouge Parish, where the legacy of Southern Black culture shapes daily life. Family gatherings often revolve around gospel
    music, Creole cuisine, and storytelling that traces roots back to West African ancestors and the historic Creole-tied neighborhoods of Baton Rouge. She identifies strongly with the resilience and creativity
    of Black Southern artists, drawing inspiration from local institutions like the Shaw Center for the Arts and the annual Baton Rouge Blues Festival. This cultural tapestry informs her aesthetic sensibility,
    her commitment to amplifying Black voices, and her appreciation for the blend of tradition and innovation that defines contemporary Southern Black identity.
attributes:
  skills: '[''Digital photography'', ''Graphic illustration'', ''Photo editing (Adobe Photoshop, Lightroom)'', ''Critical research and analysis'', ''Creative writing and storytelling'', ''Social media content
