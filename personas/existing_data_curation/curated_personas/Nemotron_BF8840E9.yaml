  hobbies: '[''Visiting art galleries and street murals'', ''Sketching and watercolor painting'', ''Digital photography of urban scenes'', ''Reading speculative fiction and cultural nonfiction'', ''Attending
    live jazz, funk, and gospel performances'', ''Cooking Creole and soul food dishes'', ''Yoga and meditation'', ''Volunteering at community art workshops'', ''Playing strategy board games'']'
  career_goals: Paulette aims to turn her passion for art and culture into a sustainable, flexible career. Over the next few years she plans to enroll in a bachelor's program in Arts Administration or Museum
    Studies while building a freelance portfolio that includes visual content creation for local businesses, curating community art exhibitions, and running an online cultural blog that highlights emerging
    Black artists in the South. Her long-term ambition is to become a cultural program director for a regional museum or cultural center, where she can design inclusive, experimental programming that challenges
    conventional narratives and gives a platform to under-represented voices.
