  hobbies: '[''Reading historical non-fiction'', ''Solving Sudoku puzzles'', ''Gardening (vegetable and herb garden)'', ''Cooking traditional Nicaraguan dishes'', ''Model building (scale ships)'', ''Nature
    walks in local parks'', ''Digital photography (landscapes)'', ''Journaling'', ''Listening to marimba music'']'
  career_goals: Andy aims to move into a supervisory role within the next three years, targeting a position as an office manager or operations coordinator. To support this, he plans to earn the Certified
    Administrative Professional (CAP) credential and complete a bachelor’s degree in Business Administration part‑time. He is focused on building expertise in workflow optimization and team leadership,
    with the long‑term ambition of overseeing a small office team that values precision and reliability. Additionally, he hopes to achieve financial stability sufficient to purchase a home in Winter Park
    and eventually open a modest family‑run café that highlights Nicaraguan cuisine, blending his cultural roots with his disciplined work ethic.
