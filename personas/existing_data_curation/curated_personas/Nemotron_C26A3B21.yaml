personas:
  professional: Andrew Bishop is a full‑stack software developer and machine‑learning specialist who channels their methodical planning and sociable energy into building elegant, user‑centric applications,
    while leading agile teams and injecting generative art into product interfaces.
  sports: Andrew Bishop mixes weekend hikes through Snake River Canyon with casual pickup basketball at the Twin Falls Community Center, cheers on the Boise State Broncos during football season, belongs
    to the Teton Mountain Climbing Club where they boulder twice a week, and they also follow the Idaho Vandals men's basketball team for inspiration.
  arts: Andrew Bishop thrives as a digital painter who experiments with generative art inspired by Refik Anadol, performs improv comedy at Twin Falls’ Laugh Lab alongside local comedian Janae Miller, and
    they spend evenings remixing ambient tracks by Aphex Twin and Boards of Canada while crafting experimental sound designs.
  travel: Andrew Bishop prefers road‑trip adventures that blend nature and tech, planning meticulous itineraries for drives to Yellowstone National Park and Cannon Beach, while saving for a future solo
    hackathon retreat in Berlin’s art‑tech hub, yet they often procrastinate booking flights until the last minute.
  culinary: Andrew Bishop enjoys cooking fusion meals like cedar‑plank salmon with quinoa‑pomegranate salad, seasoning with smoked paprika and Himalayan pink salt, but they frequently order a craft pizza
    topped with truffle oil from the local pizzeria after late‑night coding sessions.
  core: Andrew Bishop blends a tech‑savvy mind with an improv‑stage flair, obsessively tracks expenses, hikes to recharge, and occasionally forgets to stretch after a long coding sprint.
background:
  cultural: Andrew grew up in a middle‑class family of European descent in Twin Falls, Idaho, where the values of independence, community involvement, and self‑reliance are emphasized. His upbringing combined
    traditional Midwestern cultural elements—such as attending county fairs, supporting local sports teams, and participating in community service—with exposure to progressive ideas through his university
    STEM program and the growing tech scene in the region. The dichotomy of rural Idaho's natural beauty and the influx of tech‑oriented innovation has shaped his worldview, fostering a respect for both
    grounded, hands‑on experiences and forward‑looking, abstract concepts. This blend informs his collaborative yet assertive demeanor, his appreciation for novelty, and his desire to bridge the local community
    with broader technological and artistic movements.
