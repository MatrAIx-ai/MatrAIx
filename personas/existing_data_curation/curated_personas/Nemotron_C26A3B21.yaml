  career_goals: Andrew aims to become a lead software architect at a forward‑thinking tech company where he can shape product strategy and drive innovation at the intersection of technology and art. He
    aspires to launch his own creative tech studio that produces interactive installations, immersive digital experiences, and educational platforms that make complex scientific concepts accessible to the
    public. In the next five years, he plans to speak at major developer conferences, mentor emerging developers through local hackathons, and contribute to open‑source projects that promote inclusive design
    and accessibility. Ultimately, he envisions a career that balances technical leadership with artistic expression, while fostering a collaborative community in his hometown of Twin Falls.
