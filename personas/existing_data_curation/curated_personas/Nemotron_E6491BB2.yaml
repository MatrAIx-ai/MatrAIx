  career_goals: Teja is focused on advancing from her current first-line supervisory role to an operations manager position within the next three years, overseeing multiple departments and leading cross-functional
    initiatives. She plans to earn a Project Management Professional (PMP) certification and pursue an MBA part-time to deepen her strategic and financial expertise. Long-term, she aspires to become a regional
    director of operations or launch a consulting practice that helps nonprofit and small-business organizations streamline administrative processes. Throughout her career progression, she aims to champion
    diversity and inclusion initiatives, mentor emerging Black professionals, and embed data-driven performance metrics that sustain high achievement while managing workplace stress.
