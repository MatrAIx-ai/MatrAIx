personas:
  professional: Teja Frazier, a meticulous operations supervisor with a data‑driven mindset, leverages ERP and Power BI to streamline staff scheduling, performance metrics and workflow automation while
    mentoring her team through disciplined, results‑oriented leadership that balances curiosity for new tools with pragmatic, proven processes.
  sports: Teja Frazier trains for 5K races, competes in a local women’s tennis league at the Bowie Community Club, cheers on the Washington Capitals and the Washington Nationals, and treats each workout
    as a data point in their personal performance log.
  arts: Teja Frazier devotes evenings to reading biographies of civil‑rights leaders and business strategists, curates playlists featuring Nina Simone and Marvin Gaye while cooking, attends the John F.
    Kennedy Center’s exhibits celebrating diaspora arts, and draws inspiration from the rhythmic storytelling of contemporary spoken‑word artists.
  travel: Teja Frazier prefers planned, purpose‑driven trips that blend culture and cuisine, such as weekend getaways to Charleston for its collard‑green brunches, a culinary tour of New Orleans’ gumbo
    kitchens, and an annual pilgrimage to Ghana’s Cape Coast to connect with ancestral roots, all while balancing family commitments and a modest travel budget.
  culinary: Teja Frazier, a confident home chef, skillfully blends soul‑food staples like gumbo, collard greens, and corn‑bread with fresh herbs from their urban garden—basil, thyme, and cilantro—to reinvent
    classic dishes while experimenting with sous‑vide techniques and sharing abundant meals at Juneteenth gatherings.
  core: Teja Frazier is a fiercely organized, data‑obsessed leader who turns every habit—from budgeting to garden‑harvesting—into a competitive benchmark, even as they wrestle with lingering worry and a
    relentless pursuit of perfection.
background:
  cultural: Teja identifies as African-American and was raised in a close-knit Black community in Prince George's County, where family, church, and community activism shaped her values. Her family traditions
    blend Southern culinary roots—such as collard greens, cornbread, and soulful gumbo—with the vibrant multicultural tapestry of the Mid-Atlantic region. She actively participates in local cultural events,
    including Juneteenth parades, African heritage festivals, and church gatherings that celebrate Black history and resilience. These experiences foster a strong sense of collective advancement, informing
    her leadership style that emphasizes mentorship, community uplift, and pragmatic approaches to overcoming systemic challenges. Her cultural identity also inspires her commitment to diversity and inclusion
    within her professional sphere.
