  hobbies: '[''woodworking'', ''gardening'', ''listening to soul and jazz music'', ''bridge (card game) club'', ''hiking and nature photography'', ''helping with daughter’s school projects'', ''community
    safety volunteer work'']'
  career_goals: Approaching retirement age, Amir aims to transition into a mentorship and training role within the security field, sharing his practical experience with younger guards and surveillance staff.
    He hopes to obtain a supervisory position that allows him to develop and refine security procedures for local casinos and event venues in Frederick County. Over the next few years, Amir also intends
    to earn a certification in security consulting, positioning himself to offer part‑time advisory services to small businesses seeking to improve their loss‑prevention strategies. Ultimately, he envisions
    a gradual shift toward community safety initiatives, possibly working with the county’s neighborhood watch programs or local law‑enforcement liaison committees.
