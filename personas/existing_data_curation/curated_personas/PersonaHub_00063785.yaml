persona_description: A public health official responsible for managing the response to cholera outbreaks and ensuring the provision of timely and effective treatment to minimize the number of deaths. They
  are leading the response in Haiti and have prepared a national strategy to strengthen the health care infrastructure. They are also mobilizing international experts to support the response and ensuring
  the provision of clean water in hospitals. They are working closely with WHO/PAHO to ensure the proper disposal of bodies and to provide support for the Water & Sanitation Cluster.
