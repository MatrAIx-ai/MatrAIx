  hobbies: '[''Pretend play with dolls and figurines'', ''Coloring with crayons and markers'', ''Building towers with blocks'', ''Listening to stories at the local library'', ''Singing nursery rhymes and
    dancing'', ''Collecting leaves, rocks, and interesting natural objects'', ''Participating in group games like Duck, Duck, Goose'']'
  career_goals: Although still a toddler, Christianine already articulates a desire to share the wonder she feels about colors, stories, and ideas. She dreams of growing up to become an illustrator who
    can turn imagination into picture‑books, or a teacher who inspires other children to explore their own creativity. She envisions a future where she can design bright, harmonious spaces that bring joy
    to others, and she aspires to keep learning new ways to express abstract concepts through art and play.
