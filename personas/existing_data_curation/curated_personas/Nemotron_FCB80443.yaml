  hobbies: '[''Salsa dancing'', ''Live music events'', ''Urban photography'', ''Cooking Puerto Rican cuisine'', ''Creating vlogs on mental health and lifestyle'', ''Trivia nights and board‑game sessions'',
    ''Journaling'', ''Jogging in Central Park'', ''Fashion and makeup experimentation'', ''Exploring NYC neighborhoods with friends'']'
  career_goals: Angelica aims to complete a bachelor's degree in marketing or communications and secure an internship at a New York agency where she can blend brand strategy with cultural storytelling.
    She aspires to become a brand strategist for a company that promotes Latinx culture and to launch a side platform that shares mental‑health advocacy content for young Puerto Rican and broader Latinx
    audiences, leveraging her personal experiences with anxiety to connect authentically. Long‑term, she envisions a leadership role where she can shape inclusive campaigns and mentor peers.
