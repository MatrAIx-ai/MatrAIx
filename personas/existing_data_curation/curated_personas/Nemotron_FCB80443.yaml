personas:
  professional: Angelica Vazquez, a 19‑year‑old marketing student with bilingual communication and social‑media content creation chops, channels their practical, competitive drive into culturally resonant
    brand narratives while juggling a chaotic calendar that often forces them to improvise on the fly.
  sports: Angelica Vazquez keeps fit by jogging through Central Park at dawn, joining a local co‑ed soccer league on weekends, and dancing salsa whenever they can, while cheering for the New York Knicks
    and New York City FC as their go‑to sports teams.
  arts: Angelica Vazquez blends creative expression by hitting salsa nights, catching live shows by emerging Latin‑influenced artists like J Balvin and Bad Bunny, curating urban photography inspired by
    street‑art legends such as Banksy, and producing mental‑health vlogs that reference the storytelling style of Lin‑Manuel Miranda.
  travel: Angelica Vazquez embraces spontaneous urban explorations, having wandered through Brooklyn's Bushwick graffiti corridors, spent a week soaking up the island vibe of San Juan, and dreamed of a
    future trip to Barcelona's tapas‑filled alleys, all while balancing a modest travel budget with their student finances.
  culinary: Angelica Vazquez whips up flavorful arroz con gandules, pastelón, and crispy tostones using a homemade sofrito base, showcasing their budding kitchen confidence while still relying on quick‑fix
    take‑out for late‑night study sessions.
  core: Angelica Vazquez is a socially vibrant, culturally driven marketing hopeful who juggles anxiety and disorganized habits with a fierce competitive streak and a love for rhythm, flavors, and storytelling,
    and they constantly seek to turn chaos into creative momentum.
background:
  cultural: Angelica was born to Puerto Rican parents and grew up in the vibrant diaspora of New York City. She embraces both the island's traditions—such as festive parrandas, bomba rhythms, and family‑centric
    values—and the multicultural dynamism of her urban environment. Bilingual and deeply connected to her community, she often participates in local cultural festivals, supports Puerto Rican businesses,
    and navigates the balance between her heritage and the broader American urban culture.
attributes:
  skills: '[''Interpersonal communication'', ''Bilingual (Spanish & English)'', ''Social media content creation'', ''Event coordination'', ''Improvisational problem‑solving'', ''Basic graphic design (Adobe
