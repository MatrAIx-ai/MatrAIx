  career_goals: Looking ahead, Michael aims to combine his artistic passion with his technical skills by pursuing a career in interactive media. He hopes to study computer science and digital arts in college,
    with a focus on video game design or interactive experience development, eventually becoming a lead game designer or software engineer at a studio that values innovative storytelling. He also envisions
    contributing to educational robotics programs, using his competitive drive to mentor younger students and compete in engineering contests. Long‑term, he would like to earn a scholarship that supports
    both his technical and creative pursuits and to be recognized for projects that blend art and technology.
