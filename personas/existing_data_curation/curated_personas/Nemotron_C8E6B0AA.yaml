personas:
  professional: L Purnell is an aspiring music producer and community mentor whose early exposure to gospel harmonies and hip‑hop beats fuels a methodical, curiosity‑driven approach to crafting tracks and
    organizing mentorship workshops for local youth, while their competitive edge pushes them to refine every beat with precision.
  sports: L Purnell throws for the East Nashville Little League baseball team, runs forward for Nashville Springtime FC youth soccer, and tunes into the Tennessee Titans, Nashville Predators, and Nashville
    SC during family game nights, channeling their competitive energy into regular backyard sprints and dance‑to‑the‑beat cardio sessions, while they practice teamwork on the field.
  arts: L Purnell constantly absorbs the rich tapestries of gospel choirs at church, the soulful vocals of Otis Redding, the inventive lyricism of Kendrick Lamar, and the improvisational jazz of Miles Davis,
    letting these influences shape a budding identity that intertwines rhythmic expression with a longing for them to someday master the drums.
  travel: L Purnell revels in weekend getaways to the Great Smoky Mountains for outdoor exploration and annual family trips to Nashville's Music Row and the Grand Ole Opry, while dreaming of future pilgrimages
    to New Orleans' French Quarter and Memphis's Sun Studio, and they balance budget‑friendly road trips with a love for music‑centric adventures.
  culinary: L Purnell favors soulful Southern comfort foods like fried chicken, collard greens, cornbread, and sweet‑potato casserole, and even as an infant enjoys pureed sweet potatoes seasoned with a
    pinch of cinnamon and honey, while their parents nurture a culinary curiosity by cooking together and introducing them to homemade peach cobbler and seasoned black‑eyed peas, and they often smile when
    tasting new flavors.
  core: L Purnell, a rhythm‑infused newborn, blends methodical curiosity, early community pride, and a competitive spark that together foreshadow a future driven by music, mentorship, and disciplined growth,
    and they are already humming to the beat of possibility.
background:
  cultural: L was raised in a Black family in Nashville’s North/Nashville East neighborhoods, where the city’s storied musical lineage is woven into daily life. Family gatherings often feature gospel singing,
    Southern soul, and storytelling about civil‑rights history, reinforcing a sense of pride and resilience. He celebrates cultural milestones such as Juneteenth and participates in church events that blend
    spiritual fellowship with rhythmic music. The vibrant African‑American community, local festivals, and the city's blend of country, blues, and hip‑hop have shaped his artistic sensibilities and his
    drive to give back to the community through music and mentorship.
attributes:
  skills: '[''Organizational planning'', ''Effective communication'', ''Basic computer troubleshooting'', ''LEGO building and mechanical reasoning'', ''Beat‑making with tablet apps'', ''Basketball teamwork
