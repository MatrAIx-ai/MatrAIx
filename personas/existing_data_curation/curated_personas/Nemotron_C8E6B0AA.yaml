  hobbies: '[''Basketball'', ''Beat‑making with digital audio software'', ''Rapping and lyric writing'', ''Choir singing'', ''Street art mural exploration'', ''Multiplayer video gaming'', ''Reading graphic
    novels'', ''Attending live music shows'']'
  career_goals: L aspires to turn his love for music and technology into a career as an audio producer or sound engineer, aiming to create beats that blend Nashville's musical heritage with contemporary
    hip‑hop. He also envisions mentoring younger kids in his neighborhood, using his reliable and methodical nature to run after‑school workshops on music creation and teamwork. Long‑term, he hopes to attend
    a university with a strong music‑technology program and eventually open a community studio that supports emerging Black artists in Nashville.
