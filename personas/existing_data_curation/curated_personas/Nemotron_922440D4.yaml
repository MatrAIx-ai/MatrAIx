personas:
  professional: Neil Glonek, a three‑year‑old who treats every block‑building session like a tiny engineering firm, prefers the familiar routine of stacking the same color bricks to satisfy their practical
    bent, yet they often scatter pieces in a disorganized flurry and relax about finishing tasks only when the tower feels stable enough.
  sports: Neil Glonek, an enthusiastic participant in the local preschool soccer program, cheers for the Los Angeles Dodgers on television, follows the simple routine of practicing kicking a ball in the
    backyard, but they often scramble the soccer gear in a disorganized pile, compete fiercely for the first turn on the slide, and become upset if a game deviates from the expected flow.
  arts: Neil Glonek, a budding fan of The Wiggles and Sesame Street, spends afternoons drawing bright dinosaurs with Crayola markers, follows the routine of singing Baby Shark before bedtime, yet they sometimes
    scatter crayons in a chaotic mess, compete with siblings for the spotlight on the living‑room stage, and become visibly upset when a drawing is crumpled.
  travel: Neil Glonek, who loves short car rides to the nearby zoo and eagerly anticipates the annual family trip to Disneyland, prefers the comfort of a familiar car seat and a predictable snack schedule,
    yet they become anxious when a new destination disrupts their routine, compete with cousins for the best seat on the plane, and sometimes resist packing by scattering toys everywhere.
  culinary: Neil Glonek, a picky eater who can expertly scoop macaroni and cheese with a plastic fork, delights in the routine of dipping carrot sticks into ranch dressing, yet they often throw away broccoli,
    fiercely compete for the last bite of banana‑flavored yogurt, and become distressed if their preferred banana‑flavored snack is missing from the lunchbox.
  core: Neil Glonek, a three‑year‑old who craves routine but erupts into bright bouts of anxiety, competes fiercely over toys, and navigates the world with an endearingly disorganized charm.
background:
  cultural: Neil was raised in Lyman, South Carolina, within a white Southern family that values community, church attendance on Sundays, and family meals featuring regional cuisine like fried chicken and
    collard greens. He attends a local preschool where he interacts with children from diverse backgrounds, gaining exposure to the broader cultural fabric of Spartanburg County. Family traditions include
    weekend porch gatherings, storytelling sessions, and seasonal holiday celebrations that blend Southern customs with contemporary influences.
