  hobbies: '[''building block towers'', ''coloring with crayons'', ''listening to bedtime stories'', ''watching educational cartoons'', ''playing in the backyard'', ''pretend play with toy cars'']'
  career_goals: 'While still very young, Neil expresses eager, imaginative ambitions typical of toddlers: he loves storybooks about firefighters and often says he wants to be a firefighter one day, helps
    people, and rides a big fire truck. He also admires his parents and sometimes says he wants to be a teacher or a builder because he enjoys making tall block towers. These early aspirations reflect his
    competitive streak and desire to be useful in familiar, heroic roles.'
