personas:
  professional: Justin Cornelius, a 19‑year‑old aspiring automotive service technician, blends his meticulous routine‑driven mindset with hands‑on woodworking and electronics tinkering, making him a reliable
    troubleshooter who painstakingly follows standard operating procedures and documents every repair in his community‑college‑filled notebook.
  sports: Justin Cornelius, a solo jogger who frequents the Huron River trails and an avid early‑morning angler with the Ypsilanti Fishing Club, roots for the Detroit Lions and Detroit Tigers while occasionally
    playing pick‑up basketball at the community center, reflecting his routine‑oriented, low‑key approach to fitness.
  arts: Justin Cornelius, who finds calm in the rhythmic sounds of classic rock bands like The Foo Fighters and folk artists like Bob Dylan, spends his free evenings listening to instrumental scores while
    building model cars, and occasionally visits the Ann Arbor Art Fair to admire handcrafted wood sculptures, integrating his love of craftsmanship into his artistic appreciation.
  travel: Justin Cornelius, a budget‑conscious traveler, prefers road‑trip itineraries that include practical stops such as the Detroit Auto Show, a weekend camping adventure at the nearby Pinckney State
    Recreation Area, and a planned future excursion to Germany’s Stuttgart automotive museum, balancing his love of routine with occasional spontaneous detours.
  culinary: Justin Cornelius, whose palate favors uncomplicated, hearty meals, frequently whips up grilled chicken with rosemary, homemade mac and cheese, and pan‑seared trout seasoned with lemon and dill,
    while also experimenting with a DIY smoker built from reclaimed wood to infuse his catches with smoky flavor.
  core: Justin Cornelius is a routine‑driven, solitary 19‑year‑old who blends his competitive edge with meticulous hands‑on projects, prefers low‑key social settings, and occasionally over‑allocates time
    to perfecting the next model car at the expense of socializing.
background:
  cultural: Justin grew up in a middle‑class, white, Midwestern family in Ypsilanti, Michigan. His upbringing reflects traditional Midwestern values of hard work, modesty, and community responsibility.
    Family gatherings often centered around simple, home‑cooked meals and local events like county fairs and high‑school sports. While his cultural exposure is primarily local, he appreciates the region's
    blend of industrial heritage and small‑town camaraderie, which shapes his practical outlook and preference for familiar, routine‑oriented environments.
attributes:
  skills: '["Automotive diagnostics and routine maintenance", "Computer hardware troubleshooting", "Microsoft Office Suite (Word, Excel, Outlook)", "Data entry and database management", "Woodworking and
    tool handling", "Basic Python scripting for automation", "Inventory control and stock management", "Quality control and standard operating procedure adherence"]'
  hobbies: '["Woodworking", "Model car building", "Strategy and simulation video games", "Fishing", "Jogging", "Reading non‑fiction (mechanics, history, self‑improvement)", "Classic rock music", "Local
    sports events (e.g., Michigan Wolverines football)", "DIY electronics projects", "Board‑game nights with a small group"]'
  career_goals: Justin aims to complete an associate's degree in automotive technology or business administration while obtaining industry certifications such as ASE (Automotive Service Excellence). He
    seeks a stable, full‑time position as a service technician or parts specialist at a local dealership or manufacturing plant, where he can apply his practical skills and advance to a lead technician
    role. Long‑term, he aspires to manage a small auto‑repair shop or a workshop that blends his mechanical expertise with his interest in DIY projects, leveraging his competitive drive to become a recognized
    provider of reliable service in the Ypsilanti area.
