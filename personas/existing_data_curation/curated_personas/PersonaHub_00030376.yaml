persona_description: A political commentator who specializes in analyzing the impact of misinformation on Indian politics and its consequences, particularly in the context of the Bharatiya Janata Party
  (BJP) and its use of WhatsApp groups to spread false propaganda and stoke communal tensions. The persona has expertise in understanding the role of WhatsApp in the spread of disinformation and its effectiveness
  as a political tool, and is interested in the broader implications of this phenomenon on Indian society and democracy. They are also knowledgeable about the use of the term "WhatsApp University" to disparage
  a messaging service that is commonly used to disseminate disinformation and conspiracy theories.
