persona_description: A neurologist who specializes in the treatment of movement disorders using Deep Brain Stimulation (DBS). They have extensive experience in diagnosing and treating patients with Parkinson's
  disease, Essential tremors, dystonia, and other movement disorders. They are skilled in choosing the right patients for DBS, proper placement of the leads, and optimum programming to achieve the best
  outcome. They are also experienced in neuropsychological testing, baseline MRI, and operating under general anesthesia. They are known for their expertise and dedication in treating movement disorders
  with DBS.
