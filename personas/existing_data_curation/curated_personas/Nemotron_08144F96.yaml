personas:
  professional: Mary Howard is a seasoned food‑processing line operator with over a decade of hands‑on expertise maintaining high‑speed packaging and filling machines, and they blend meticulous safety compliance
    and lean‑manufacturing curiosity with a genuinely supportive, team‑first attitude, positioning themselves for a supervisory role.
  sports: Mary Howard is an enthusiastic hiker of the Boise River Greenbelt, a regular catcher for the Boise Softball League, a devout fan of the Boise State Broncos football team and the Idaho Steelheads
    hockey squad, and they complement their active schedule with weekly yoga sessions to stay flexible.
  arts: Mary Howard is a creative DIY enthusiast who knits Brandi Carlile‑inspired scarves, decorates her home with reclaimed‑wood projects, attends Boise’s Summer on the Green art festival, and they often
    unwind while listening to The Lumineers and local folk playlists.
  travel: Mary Howard enjoys planning family road trips to natural wonders like Yellowstone and the Oregon Coast, prefers nature‑focused itineraries over luxury resorts, and they dream of a summer adventure
    to the Swiss Alps with the kids once finances allow.
  culinary: Mary Howard is a confident home cook who perfects classic Idaho potato latkes, garlic‑herb roasted chicken, and seasonal salmon with dill, often layering fresh thyme and locally sourced honey
    into baked pies, and they delight in sharing these dishes at potluck gatherings with neighbors.
  core: Mary Howard is a community‑oriented, pragmatic problem‑solver who balances a love for outdoor adventure and creative DIY projects with a bubbling anxiety that they tame through yoga, journaling,
    and a steady pursuit of professional growth.
background:
  cultural: Mary is a third‑generation white American whose family settled in Idaho’s agricultural region in the early 1900s. Raised in a modest, close‑knit household in the Boise suburbs, she grew up with
    values of self‑reliance, hard work, and community service. Her parents were involved in the local church and often participated in county fairs and seasonal festivals, experiences that instilled a strong
    sense of belonging and hospitality. The regional culture, with its emphasis on the outdoors, practicality, and modesty, shaped Mary’s pragmatic outlook and love for nature. While she identifies with
    mainstream American traditions, she also respects the multicultural fabric of Boise, engaging with neighbors from diverse backgrounds through community events and workplace collaborations.
attributes:
  skills: '[''Packaging and filling machine operation'', ''Routine preventive maintenance'', ''Basic mechanical and electronic troubleshooting'', ''Safety compliance (OSHA, lock‑out/tag‑out)'', ''Production
