    peer coaching'', ''Basic computer skills (ERP, reporting)'']'
  hobbies: '[''Community volunteering'', ''Hiking and nature walks'', ''Recreational softball'', ''Yoga and mindfulness'', ''Journaling'', ''Knitting and DIY crafts'', ''Cooking and potluck gatherings'',
    ''Listening to sustainability and food‑tech podcasts'']'
  career_goals: Mary is eager to move from a line operator to a supervisory role within the next three years. She aims to become a shift lead or team lead, where she can mentor newer operators, coordinate
    production schedules, and drive continuous‑improvement projects. To support this, she plans to obtain a Certified Packaging Professional credential and enroll in community‑college courses in industrial
    maintenance and quality assurance. Mary also aspires to specialize in machine maintenance, reducing reliance on external technicians. Long‑term, she envisions a position in quality control or logistics
    that leverages her practical knowledge of packaging processes while offering a more predictable work schedule to support her family’s needs. She is motivated to create a safer, more efficient work environment
    and to advocate for mental‑health resources for plant staff.
