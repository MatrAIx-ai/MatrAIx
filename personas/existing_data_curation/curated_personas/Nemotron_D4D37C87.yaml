  hobbies: '[''Reading (historical fiction, mystery)'', ''Journaling'', ''Beach walking and bird-watching'', ''Gardening (succulents)'', ''Yoga'', ''Puzzle solving (Sudoku, crosswords)'', ''Photography
    (nature)'', ''Volunteer work at animal shelter'', ''Knitting'']'
  career_goals: Elsie aims to complete her associate's degree in Business Administration (or Health Information Management) at Pensacola State College, followed by a certification such as Certified Medical
    Administrative Assistant or Certified Bookkeeper. Her short‑term goal is to secure a stable, full‑time position as a medical office administrator or office manager in a local clinic or hospital, where
    she can apply her organizational strengths and calm demeanor. Long‑term, she envisions advancing to an Operations Manager role, overseeing multiple departments to improve efficiency and quality while
    maintaining a predictable, supportive work environment. Throughout, she values a balanced lifestyle that allows her to stay connected to her community and personal interests.
