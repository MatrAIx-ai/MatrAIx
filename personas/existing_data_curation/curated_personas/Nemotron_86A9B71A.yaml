  hobbies: '[''Manga drawing and watercolor illustration'', ''Reading graphic novels and fantasy books'', ''Hiking and nature sketching in Forest Park'', ''After-school coding club (Scratch/Python)'', ''Volunteering
    at local animal shelter'', ''Preparing simple Vietnamese recipes at home'']'
  career_goals: Myong Diem aspires to a career that blends her love for animals, community service, and her bilingual abilities. She hopes to become a veterinary technician or a wildlife rehabilitation
    assistant, allowing her to work hands-on with animal care while applying her practical problem-solving skills. Simultaneously, she envisions volunteering as a youth cultural liaison in Portland's health
    clinics, using her language skills to help non-English-speaking families navigate medical services. In the longer term, she wants to pursue a degree in environmental science or animal health, with the
    ambition of contributing to sustainable wildlife conservation projects in the Pacific Northwest and Southeast Asia.
