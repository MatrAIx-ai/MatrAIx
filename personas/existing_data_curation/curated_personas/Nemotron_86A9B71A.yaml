personas:
  professional: Myong Vang is an aspiring junior game developer who channels their love for manga and watercolors into designing character sprites during the after-school coding club, balancing their preference
    for structure with spontaneous creative twists, while often forgetting to document code thoroughly.
  sports: Myong Vang enjoys weekend hikes through Forest Park with a close friend, occasionally joins a local junior soccer team for casual matches, and passionately roots for the Portland Timbers, reflecting
    their love of low-key fitness and community sports.
  arts: Myong Vang immerses themselves in manga creation, drawing inspiration from Naoki Urasawa and Studio Ghibli, while they devour graphic novels like 'Saga' and 'Monstress', and spend free evenings
    listening to the ambient scores of Joe Hisaishi to fuel their artistic imagination.
  travel: Myong Vang prefers low-stress day trips, planning hikes in nearby Columbia River Gorge with a simple checklist, yet dreams of visiting Tokyo's Akihabara for manga culture and the Pacific Northwest's
    Redwood National Park for epic scenery.
  culinary: Myong Vang enjoys experimenting with simple recipes, often cooking ramen with miso broth, sliced pork, and soft-boiled eggs, while they also master strawberry shortcake for school bake sales,
    demonstrating a moderate cooking skill level and a fondness for both savory and sweet flavors.
  core: Myong Vang blends disciplined coding with whimsical manga art, hoards leaf collections from hikes, and they navigate teen life with a steady mix of structured habits and delightful procrastination.
background:
  cultural: Myong Diem is a second-generation Vietnamese-American whose family settled in Portland's Hawthorne district. She grew up hearing both English and Vietnamese spoken at home, celebrating Tet (Lunar
    New Year) with traditional foods, lanterns, and community events at the Vietnamese Cultural Center. Her parents instilled a respect for both their heritage and the Pacific Northwest's outdoor lifestyle,
    so she often blends cultural practices - such as making pho with locally sourced herbs - into her daily life. The multicultural environment of Portland, with its vibrant Asian festivals and emphasis
    on sustainability, has shaped her outlook, encouraging her to value community harmony, environmental stewardship, and cultural bridges.
