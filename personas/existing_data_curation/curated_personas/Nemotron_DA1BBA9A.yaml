personas:
  professional: A retired diesel mechanic, Enoc Stanford leverages five decades of expertise in heavy‑duty truck engines and hydraulic systems to mentor apprentices at the community college, publish a hands‑on
    handbook, and keep the parish‑bus fleet humming, all while insisting on meticulous checklists and a schedule that mirrors a well‑tuned engine; they are known for never missing a Saturday fishing trip
    to Lake Erie.
  sports: A loyal sports enthusiast, Enoc Stanford cheers the Cleveland Guardians at every home game, participates in a local bocce league with senior‑center friends, fishes on Lake Erie on Saturdays as
    personal sport, and follows the Cleveland Cavaliers during basketball season, all while donning a favorite vintage team cap; they also enjoy watching classic truck shows, treating them as a form of
    high‑octane entertainment.
  arts: An avid cultural participant, Enoc Stanford delights in salsa dancing evenings at the community center, listens to the classic sounds of Celia Cruz and Marc Anthony, admires the craftsmanship of
    classic truck shows in automotive magazines, and occasionally sings along to traditional folk ballads while preparing garden vegetables; they consider music a vital rhythm that keeps their days from
    feeling monotonous.
  travel: A nostalgic traveler, Enoc Stanford enjoys road trips in his 1976 Freightliner to nearby Amish country and the shores of Lake Erie, dreams of revisiting the historic streets of Old San Juan during
    a family reunion, and plans modest day‑trips to Cuyahoga Valley National Park, all while balancing a limited retirement budget and a desire to travel with grandchildren; they often map routes on a printed
    atlas rather than rely on digital apps.
  culinary: A culinary traditionalist, Enoc Stanford masterfully prepares arroz con gandules, lechón, and sofrito‑infused beans using fresh garden herbs, while occasionally over‑seasoning with adobo, and
    loves hosting potluck dinners for neighbors where they swap recipes for prized vegetable garden produce.
  core: Enoc Stanford is a methodical, community‑oriented 76‑year‑old who blends diesel‑mechanic mastery with a love for family, tradition, and lively social rituals, even if they sometimes cling to routine
    at the expense of spontaneity.
background:
  cultural: Enoc grew up in a bilingual Puerto Rican household, where Spanish was spoken at home and English at school. He celebrated traditions such as Noche Buena, Día de los Reyes, and the vibrant celebrations
    of San Juan’s patron saint festivals. After moving to Ohio for work, he kept his cultural ties through church gatherings, salsa music, and cooking family recipes. His Puerto Rican heritage informs his
    warm hospitality, love for communal meals, and his habit of offering help in both English and Spanish, especially to fellow seniors in the Hispanic community.
attributes:
  skills: '[''diesel engine diagnostics'', ''heavy‑duty truck brake systems'', ''air‑suspension and hydraulic component repair'', ''fuel injection system troubleshooting'', ''electrical wiring and ECU diagnostics'',
    ''precision welding (MIG/TIG)'', ''preventative maintenance scheduling'', ''safety compliance and OSHA regulations'', ''bilingual communication (Spanish/English)'', ''mentoring apprentices and trainees'']'
  hobbies: '[''Fishing at Lake Erie'', ''Vegetable gardening'', ''Woodworking projects'', ''Cooking Puerto Rican cuisine'', ''Senior‑center bingo'', ''Bocce league'', ''Salsa dancing evenings'', ''Attending
    Cleveland Guardians baseball games'', ''Visiting classic truck shows'', ''Reading automotive magazines'']'
  career_goals: Although officially retired, Enoc aims to stay actively involved in the diesel‑mechanic community. He plans to mentor young technicians at the local community college, publish a practical
    handbook on diesel maintenance for hobbyists, and volunteer his services to keep the church’s parish‑bus fleet in safe working order. He also hopes to preserve his vintage 1976 Freightliner truck as
    a showcase piece for local classic‑vehicle events, and to maintain his own health so he can continue participating in group outings with his senior‑center friends.
