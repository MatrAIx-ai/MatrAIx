  career_goals: Eduardo aims to advance to a senior leadership role such as Director of Operations or Principal Consultant, where he can shape organizational strategy across multicultural markets. He wants
    to lead initiatives that integrate data‑driven decision making with culturally informed insights, improving both efficiency and community impact. Over the next five years he plans to earn advanced certifications
    in data analytics and attend executive leadership programs, while also mentoring younger analysts. Ultimately he hopes to launch a boutique consultancy that advises Brooklyn‑based firms on navigating
    the Mexican‑American consumer segment, blending his competitive drive with a desire for meaningful, stress‑balanced work.
