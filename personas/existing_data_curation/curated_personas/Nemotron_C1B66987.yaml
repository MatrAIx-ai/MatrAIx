  career_goals: Although retired from full‑time work, Sean aims to stay professionally engaged by offering pro‑bono consulting to local startups and small farms, serving on the board of the Anderson Community
    Arts Center, and leading workshops on stress‑management and financial literacy for seniors. He hopes to mentor at least ten aspiring entrepreneurs in the next five years, develop a community garden
    project that blends sustainable agriculture with educational programming, and continue expanding his knowledge of contemporary art and emerging business trends.
