personas:
  professional: Jordan Newby is a self‑taught full‑stack developer who builds pragmatic web applications using Python, JavaScript and React, excels at debugging and refactoring legacy code, and leverages
    a routine‑focused mindset to champion reliable, maintainable systems while steadily eyeing a senior lead role and a future shift into site‑reliability engineering, where they can mentor junior teammates
    and set coding standards.
  sports: Jordan Newby is a weekend angler on the Androscoggin River, a member of the Portland Trail Biking Club who rides local forest trails, and a dedicated fan of the Boston Red Sox, Boston Celtics
    and New England Patriots, balancing low‑key outdoor pursuits with occasional viewings of professional games at the neighborhood sports bar.
  arts: Jordan Newby spends evenings immersed in strategy board games with friends, tunes into classic rock legends like The Allman Brothers Band and modern indie folk artist Fleet Foxes while homebrewing,
    and volunteers at the Poland Community Library where they help organize occasional art‑themed community events, letting music and tabletop storytelling shape their creative outlet.
  travel: Jordan Newby prefers short, well‑planned road trips that blend fishing, hiking, and local culture, having already explored Acadia National Park, the historic streets of Portland, Maine, and a
    weekend getaway to Quebec’s Charlevoix region, while dreaming of a future coastal drive along the Pacific Northwest to sip local brews and fish for halibut.
  culinary: Jordan Newby enjoys home‑brewing craft IPA and stout on a weekly schedule, pairs their fresh trout catch with a lemon‑dill butter sauce and roasted new potatoes, and often experiments with hop‑infused
    marinades, though their penchant for improvisation sometimes leads to over‑hopping a batch or a slightly burnt fish fillet.
  core: Jordan Newby is a routine‑loving full‑stack developer who balances practical problem‑solving with weekend fishing, homebrewing, and a relaxed, occasionally disorganized approach to life.
background:
  cultural: Jordan grew up in the small town of Poland, Maine, within a traditionally New England, white‑American family with roots tracing back to Irish and English ancestors. The community’s emphasis
    on self‑reliance, modesty, and a close connection to the natural environment shaped his practical outlook. Local customs such as community potlucks, seasonal festivals, and a respect for the rugged
    coastal and forested landscape are integral to his identity. While his career in software development connects him to global tech culture, his everyday life is grounded in the steady rhythms, modest
    social networks, and independent spirit characteristic of rural New England.
