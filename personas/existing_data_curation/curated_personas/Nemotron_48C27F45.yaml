  hobbies: '["Fishing", "Hiking", "Bicycle riding", "Classic car restoration", "Strategy video gaming", "Tabletop board games", "Homebrewing craft beer", "Volunteer work at community library"]'
  career_goals: Jordan aims to deepen his expertise in reliable, maintainable software systems while preserving the routine and predictability he values. Over the next three to five years he hopes to move
    into a senior or lead developer role where he can mentor junior teammates, set coding standards, and oversee the stability of mission‑critical applications. He plans to earn an AWS Certified Developer
    credential to broaden his cloud deployment skills and eventually transition to a site‑reliability engineering position that blends his practical problem‑solving with proactive system monitoring. At
    the same time, he is open to launching a small consulting practice focused on helping local Maine businesses modernize their web presence, allowing him to work on familiar, community‑oriented projects
    with a flexible schedule.
