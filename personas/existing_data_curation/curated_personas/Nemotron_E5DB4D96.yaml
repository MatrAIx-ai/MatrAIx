personas:
  professional: Jorge Aradillas, a seasoned industrial welder with mastery of MIG, TIG, and SMAW processes and deep knowledge of AWS codes and OSHA safety, channels their calm, collaborative nature into
    leading small fabrication teams, mentoring apprentices with patient guidance, and infusing artistic metal motifs into structural projects.
  sports: Jorge Aradillas stays active by pitching for the Chicago Ridge Softball Club every Saturday, supporting the Chicago Cubs and the Chicago Bears during the seasons, and they supplement team play
    with weekly morning walks along the Lakefront Trail and occasional yoga sessions to counteract welding‑related stiffness.
  arts: Jorge Aradillas frequently explores the Art Institute of Chicago and Museum of Contemporary Art, draws inspiration from the bold murals of Diego Rivera and the intimate portraits of Frida Kahlo,
    enjoys listening to Los Lobos and Santana while welding, and they collaborate with fellow artisans in a weekend metal‑working club that transforms reclaimed steel into culturally resonant sculptures.
  travel: Jorge Aradillas prefers organized road‑trip itineraries that blend cultural festivals with family visits, having driven to the historic town of San Miguel de Allende for its vibrant Day of the
    Dead celebrations, taken weekend getaways to the Michigan shoreline, and dreaming of a future pilgrimage to the art‑filled streets of Barcelona while always budgeting trips through a dedicated travel
    savings account.
  culinary: Jorge Aradillas enjoys moderate‑level home cooking, expertly preparing tamales stuffed with pork and chile rojo, simmering hearty pozole with hominy and fresh cilantro, and they relish the aromatic
    blend of cumin, epazote, and smoked paprika that flavors their family gatherings, though they sometimes forget to defrost the corn masa ahead of time.
  core: Jorge Aradillas blends a calm, collaborative spirit with a lifelong devotion to craft, often found soldering late‑night projects while humming folk tunes, yet habitually misplaces their reading
    glasses on the welding bench.
background:
  cultural: Born to Mexican immigrant parents, Jorge grew up in a bilingual household where Spanish and English were spoken interchangeably. He cherishes Mexican traditions such as Día de los Muertos, the
    vibrant celebrations of Cinco de Mayo, and family gatherings centered around homemade tamales and pozole. These customs instilled in him a strong sense of community, hospitality, and respect for elders.
    Living in Chicago Ridge, he has blended his heritage with Midwestern values, actively participating in the local Mexican‑American community through cultural festivals, a neighborhood mutual‑aid group,
    and a church congregation that emphasizes service. His cultural identity informs his work ethic, his collaborative spirit, and his artistic expressions, often incorporating Mexican folk motifs into
    his metal creations.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding (SMAW)'', ''Brazing'', ''Precision soldering'', ''Blueprint and technical drawing interpretation'', ''Pipe and structural steel fabrication'',
    ''Custom metal art and sculpture'', ''Welding equipment maintenance'', ''Safety compliance (OSHA, AWS)'', ''Apprentice training and mentorship'', ''Team coordination and project management'', ''Quality
    assurance and inspection'']'
  hobbies: '[''Metal sculpture'', ''Cooking traditional Mexican dishes'', ''Attending local art galleries and museums'', ''Playing recreational softball'', ''Volunteering with Habitat for Humanity'', ''Participating
    in Mexican cultural festivals (Día de los Muertos, Cinco de Mayo)'', ''Listening to traditional and contemporary music'', ''Traveling to Mexico to visit family'', ''Photography of street art and community
    events'', ''DIY home improvement projects'', ''Soldering hobby electronics'']'
  career_goals: Looking ahead, Jorge is focused on transitioning from a hands‑on welder to a supervisory and educational role. He plans to earn the Certified Welding Inspector (CWI) designation and become
    a lead welder on larger construction projects, where he can apply his meticulous eye for quality and safety. Simultaneously, he hopes to launch a boutique side business creating custom metal art for
    community spaces, blending his technical skill with his love of art and Mexican cultural motifs. He is also eager to give back by volunteering as a part‑time instructor at a local community college
    or trade school, mentoring the next generation of welders and promoting inclusive, collaborative work environments. Ultimately, he aims to secure a stable retirement while staying actively involved
    in his community and craft.
