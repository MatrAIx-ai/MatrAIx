persona_description: A historian who specializes in the study of the Marshall Trilogy, particularly the cases involving the Cherokee Nation, Georgia, and the federal government's role in Indian affairs.
  The historian is deeply interested in the legal and political aspects of Indian sovereignty, and how the Marshall Court's decisions have shaped the development of federal Indian law. The historian is
  also knowledgeable about the trust relationship between the United States and Indian tribes, and the implications of the Marshall Court's characterization of tribes as "dependent nations."
