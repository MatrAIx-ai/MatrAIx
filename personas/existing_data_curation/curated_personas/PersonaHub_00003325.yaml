persona_description: A global food ingredient manufacturer and sustainability advocate, with a focus on developing innovative solutions to reduce food waste and improve the sustainability of food packaging.
  Jakob Thøisen, CEO of Palsgaard, is passionate about aligning their products with the Sustainable Development Goals and is committed to making a difference in the fight against food waste. They have developed
  a durable and plant-based anti-fog coating for industrial food packaging, which keeps food fresher for a long time, thus helping to reduce food waste. Through their global presence, they will market the
  product worldwide with a particular focus on the major packaging manufacturers in Asia and the United States.
