personas:
  professional: Corey Hamilton, a 28‑year‑old accountant who blends rigorous GAAP expertise with a humanities‑informed storytelling flair, uses their relaxed yet curious mindset to turn dense financial
    statements into engaging narratives for museums and galleries, while letting occasional disorganization spark creative problem‑solving.
  sports: Corey Hamilton combines hikes with the Everglades Trail Runners, regular salsa nights at the Miami Salsa Society, and a casual habit of watching the Miami Heat on game nights, keeping fit through
    a mix of trail runs, beach volleyball, and impromptu jazzercise after sax rehearsals.
  arts: Corey Hamilton regularly visits exhibitions featuring artists like Kehinde Wiley, documents Wynwood's murals, plays saxophone in a jazz quartet that covers John Coltrane, and enjoys reading contemporary
    fiction by Haruki Murakami and philosophy by Simone de Beauvoir, weaving these inspirations into their financial storytelling.
  travel: Corey Hamilton prefers spontaneous, culture‑focused trips, having taken weekend getaways to New Orleans for its jazz heritage, a two‑week immersion in Caribbean islands to refine their cooking,
    and dreaming of a summer art pilgrimage to Barcelona’s Museu Picasso and Berlin’s street‑art districts, all balanced against a modest travel budget they juggle with their CPA study schedule.
  culinary: Corey Hamilton is an enthusiastic home‑chef who mixes Scotch bonnet‑spiced jerk chicken, sautéed callaloo, and mango‑lime salsa, often pairing Caribbean feasts with a splash of dark rum, and
    enjoys experimenting with fresh cilantro, coconut milk, and plantains while hosting dinner nights for their art‑centric friends.
  core: Corey Hamilton, a 28‑year‑old accountant who trades spreadsheets for sax solos, thrives on turning numbers into stories for museums, yet habitually misplaces their keys while juggling a spontaneous
    salsa schedule and a growing collection of street‑art prints.
background:
  cultural: Corey is a Black American raised in Miami’s multicultural tapestry, with family roots tracing back to Jamaica and Haiti. He grew up immersed in Afro‑Caribbean rhythms, soul food, and the historic
    civil‑rights activism of South Florida. This heritage shapes his worldview, fostering a deep appreciation for diversity, community solidarity, and artistic expression. He actively participates in local
    cultural festivals, supports Black artists, and draws on his heritage to bridge financial stewardship with the thriving arts community of Miami.
attributes:
  skills: '[''Financial statement preparation'', ''GAAP compliance'', ''Internal audit and risk assessment'', ''Tax planning and compliance'', ''Advanced Excel and Power Query'', ''Financial modeling'',
    ''ERP navigation (SAP, Oracle)'', ''Data storytelling and report writing'', ''Cross‑cultural communication'', ''Project coordination'', ''Creative problem solving'', ''Basic art market valuation'']'
  hobbies: '[''Street art tours'', ''Photography'', ''Saxophone playing'', ''Cooking Caribbean cuisine'', ''Reading contemporary literature'', ''Salsa dancing'', ''Volunteering at community arts programs'',
    ''Hiking in Everglades'', ''Attending jazz concerts'', ''Collecting vintage vinyl records'']'
  career_goals: Corey aims to earn his CPA within the next year and subsequently move into a senior audit manager role, preferably with a firm that serves cultural institutions such as museums and galleries.
    Long‑term, he envisions leading the finance department of a major arts nonprofit or becoming a chief financial officer for a cultural organization, leveraging his dual background in accounting and the
    humanities. He also plans to pursue an MBA part‑time to broaden his strategic leadership skills while maintaining a flexible schedule that supports his creative pursuits.
