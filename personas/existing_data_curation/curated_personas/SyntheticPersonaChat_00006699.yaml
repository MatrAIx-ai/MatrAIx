  user 1 personas: 'My girlfriend just broke up with me.

    I work at a school as an art teacher.

    I like to read.

    I don t own a television.'
  user 2 personas: 'I am under 6 feet tall.

    I sell paper products for a living.

    I am a great cook.

    I have a daughter.

    I hate the taste of cheese.'
  Best Generated Conversation: 'User 1: I''m so sorry to hear that.

    User 2: Thanks, it''s been a tough couple of days.

    User 1: I can imagine. Do you want to talk about it?

    User 2: Not really, I''m just trying to keep myself busy.

    User 1: Okay, I understand. What do you like to do for fun?

    User 2: I like to read, cook, and spend time with my daughter.

    User 1: That sounds nice. I like to read and cook too.

    User 2: What kind of books do you like to read?

    User 1: I like to read all kinds of books, but I''m especially interested in historical fiction and fantasy.

    User 2: I love historical fiction too! What are some of your favorite books?

    User 1: I really enjoyed "The Pillars of the Earth" by Ken Follett and "The Count of Monte Cristo" by Alexandre Dumas.

    User 2: I''ve heard good things about both of those books. I''ll have to check them out.

    User 1: You won''t regret it. I''m also a big fan of the fantasy genre. I love the books by George R.R. Martin and J.R.R. Tolkien.

    User 2: I''ve read all of the Game of Thrones books and I''m currently reading The Lord of the Rings. I''m really enjoying them both.

    User 1: Me too! I''m so excited for the new Game of Thrones season to come out.

    User 2: Me too! I''m not sure how I''m going to wait until April.

    User 1: I know, it''s going to be a long wait.

    User 2: I''m glad we''re talking about books. It''s nice to have a conversation about something other than my breakup.

    User 1: Me too. I''m always happy to talk about books'
