personas:
  professional: Shad Mabry excels as a customer-service representative, using meticulous record-keeping, conflict-de-escalation expertise, and proficiency with Zendesk and Salesforce to deliver consistent
    support while mentoring new hires and preparing for a supervisory role.
  sports: Shad Mabry enjoys seasonal fishing at Lake Ray Hubbard, rides the Fort Worth bike trail with the local cycling club, supports the Dallas Cowboys (NFL) and Texas Rangers (MLB), and participates
    in the Fort Worth Anglers Club’s monthly catch-and-release events.
  arts: Shad Mabry appreciates classic country legends like Willie Nelson and Patsy Cline, folk icons such as Bob Dylan, watches timeless films like Casablanca and The Godfather, and spends weekends crafting
    model-railroad scenery inspired by historical Texas rail lines.
  travel: Shad Mabry prefers meticulously planned road trips that combine historic sites and quiet retreats, having driven the Texas Hill Country to Fredericksburg and planning a future visit to the Bavarian
    town of Rothenburg ob der Tauber to explore ancestral roots while still fitting within a modest budget.
  culinary: Shad Mabry enjoys cooking Texas-style smoked brisket, herb-seasoned trout caught on lake trips, and hearty chili, often seasoning with fresh rosemary, thyme, and cumin grown in their balcony
    garden and pairing meals with a cold Lone Star beer.
  core: Shad Mabry is a methodical, solitary 43-year-old who blends Texan pragmatism with precise hobbyist pursuits, balancing routine work responsibilities with disciplined finance, quiet hobbies, and
    a steady, low-risk approach to life.
background:
  cultural: Shad grew up in the suburban outskirts of Fort Worth, Texas, within a middle‑class, white family that traces part of its ancestry to German and Irish immigrants. Raised in a modest Protestant
    household, he was taught the values of hard work, personal responsibility, and community courtesy. The regional culture—marked by Texas hospitality, a love of barbecue, and appreciation for outdoor
    activities like fishing and cycling—has shaped his lifestyle. While he embraces the practical, down‑to‑earth ethos of the area, he also respects the local traditions of rodeo and country music, though
    he engages with them in a measured, personal way rather than as a primary social identity.
attributes:
  skills: '["Customer Service Communication", "Conflict Resolution", "CRM Software (Zendesk, Salesforce)", "Data Entry and Accuracy", "Time Management", "Process Adherence", "Technical Troubleshooting (Consumer
    Electronics)", "Training and Mentoring", "Documentation and Reporting", "Basic Spanish (Conversational)"]'
  hobbies: '["Model Railroading", "Woodworking", "Reading Historical Non-Fiction", "Herb Gardening", "Fishing", "Jigsaw Puzzles", "Crossword Puzzles", "Classic Film Watching", "Cycling on Familiar Trails",
    "Listening to Classic Country Music"]'
  career_goals: Shad aims to move from his current customer service role into a supervisory or quality‑assurance position within the call‑center environment. He wants to lead a small team, using his organized
    approach to improve service standards and streamline processes. Over the next three years, he plans to complete a bachelor’s degree in Business Management, which will open pathways to a process‑improvement
    analyst role. Ultimately, Shad envisions leveraging his methodical skills to launch a modest home‑repair or handyman business that allows him to maintain a steady routine while serving the local community
    on his own terms.
