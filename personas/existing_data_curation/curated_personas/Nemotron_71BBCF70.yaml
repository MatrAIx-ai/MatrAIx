personas:
  professional: Carlos Lara, a 16‑year‑old aspiring mechanical engineer, turns his natural curiosity and competitive drive into designing DIY drones, repairing friends’ gaming rigs, and applying strategic
    thinking from chess and eSports to lead school robotics projects.
  sports: Carlos Lara dominates the local park’s basketball court, emulating the fast‑break tactics of his favorite pro team, the city’s NBA franchise, while also shredding with the neighborhood skateboarding
    crew at the community skate park, and follows the regional youth league’s standings with a competitive zeal.
  arts: Carlos Lara’s soundtrack is a blend of reggaeton hits by Bad Bunny, salsa classics from Marc Anthony, and hip‑hop tracks by J. Cole, which fuels his creative side as he sketches graffiti‑inspired
    designs on his skate deck and attends monthly open‑mic nights featuring local Latin‑influenced musicians.
  travel: Carlos Lara dreams of swapping his skate board for a surfboard on the sun‑kissed beaches of the Caribbean, exploring the futuristic robotics exhibits in Tokyo, and taking a road trip across the
    U.S. Southwest to witness the desert’s night skies, all while budgeting his travel fund around school breaks.
  culinary: Carlos Lara whips up beloved island staples like arroz con gandules and crispy plantain fritters, mastering the perfect sofrito blend while experimenting with a dash of smoked paprika, and enjoys
    swapping recipes on Discord with fellow food‑loving gamers.
  core: Carlos Lara is a fiercely competitive teen who juggles basketball, drone engineering, and marathon gaming sessions, all while navigating a skeptical yet practical outlook that fuels his relentless
    tinkering and occasional late‑night snack binges.
background:
  cultural: Carlos was born in Dublin, Ohio, to parents who immigrated from Puerto Rico. He grew up in a bilingual household where Spanish is spoken at home and English at school, celebrating Puerto Rican
    traditions such as Three Kings Day, Noche de San Juan, and the annual Puerto Rican Day Parade in nearby Columbus. Family gatherings revolve around music, dance, and classic dishes that keep his cultural
    identity vibrant. While immersed in Midwestern community life—attending local sports leagues and school events—he also maintains strong ties to his Caribbean roots through language, cuisine, and participation
    in the local Hispanic community organization. This blend of cultures shapes his worldview, balancing the collective family values of Puerto Rico with the individualistic, pragmatic ethos of the Midwest.
attributes:
