  hobbies: '["Basketball", "Competitive video gaming (strategy/sports games)", "Drone building and flying", "Bicycle and electronics tinkering", "Listening to reggaeton and salsa", "Cooking Puerto Rican
    cuisine", "Skateboarding", "Volunteering at Hispanic cultural center"]'
  career_goals: Carlos aims to earn a scholarship to study engineering, with a particular interest in mechanical engineering focused on automotive design or robotics. He envisions working on sustainable
    vehicle technology or creating interactive gaming software that blends his love for tech and competition. While he keeps the option of playing college‑level basketball open, he prioritizes a career
    that lets him solve practical problems, stay connected to his Puerto Rican heritage, and eventually mentor younger students in STEM through community programs.
