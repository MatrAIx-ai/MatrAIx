  career_goals: Although retired, Fonzie aims to leave a lasting legacy by offering free financial‑literacy workshops for seniors, mentoring aspiring South Asian entrepreneurs, and documenting his family's
    oral history for future generations. He also hopes to curate community art exhibits, continue learning painting techniques, and make a pilgrimage to his ancestral homeland to deepen his cultural roots.
