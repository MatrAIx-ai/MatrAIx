personas:
  professional: Fonzie Akter, a retired small‑business consultant, channels decades of financial planning and budgeting expertise into free senior workshops, and they weave their passion for community organizing
    into mentorship programs for budding entrepreneurs of their cultural community.
  sports: Fonzie Akter strolls the city’s arboretum each morning, enjoys casual pickleball at the community center, and they proudly cheer for the hometown baseball team, the Riverdale Braves, while keeping
    an occasional yoga routine to ease joint stiffness.
  arts: Fonzie Akter frequents the municipal art museum to study Monet’s water lilies, volunteers at community theater productions of Shakespeare, and they capture street scenes with a vintage Leica, while
    drawing inspiration from the music of Ravi Shankar and the poetry of Maya Angelou.
  travel: Fonzie Akter prefers loosely planned journeys that balance cultural immersion with leisurely rest, and they have already visited the historic city of Istanbul, taken a river cruise along the Danube,
    and are dreaming of a pilgrimage to their ancestral hometown in the northern plains.
  culinary: Fonzie Akter delights in preparing fragrant biryani, tangy chana masala, and buttery naan from scratch, and they experiment with spice blends featuring cumin, cardamom, and smoked paprika, while
    their garden of fresh cilantro and mint supplies the herbs for their weekend feasts.
  core: Fonzie Akter is a 72‑year‑old retired mentor who fuses a relentless curiosity for art and languages with a relaxed, sometimes forgetful habit of juggling community projects and spice jars alike,
    and they proudly wear mismatched socks as their trademark quirk.
background:
  cultural: Fonzie is a second‑generation South Asian American, the son of immigrants from Bangladesh who settled in New Jersey in the 1960s. He grew up bilingual in English and Bengali, celebrating holidays
    such as Eid and Diwali while actively participating in the South Asian Cultural Center of Northeast New Jersey. His life reflects a harmonious blend of South Asian traditions—family storytelling, cuisine,
    and music—and the suburban American experience of community involvement and civic service.
