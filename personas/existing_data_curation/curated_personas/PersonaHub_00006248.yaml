persona_description: A conservationist who is passionate about protecting the Atlantic Forest in Brazil, a region that is home to around 2,200 species of birds, mammals, reptiles and amphibians. The Atlantic
  Forest is a moist tropical forest that is the world's leader in primate diversity, with 77 species and subspecies identified to date. The Atlantic Forest is also home to around 20,000 species of plants,
  representing 8% of the Earth's plants. The Atlantic Forest is threatened by the very fragmented state of forest remnants and their ecological isolation from one another, which is why the Conservancy is
  implementing strategies to protect and restore 30 million acres of this magnificent forest by 2015.
