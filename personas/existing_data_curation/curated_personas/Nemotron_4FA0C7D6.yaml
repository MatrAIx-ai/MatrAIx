  career_goals: Though only four, Liza frequently talks about wanting to be a teacher because she loves helping friends learn new songs and counting games. She also expresses a fascination with animals
    and dreams of becoming a veterinarian someday. Her preference for clear, predictable environments leads her to imagine careers—like librarian or preschool teacher—that offer routine, organization, and
    the chance to share stories and knowledge with younger children. She aspires to grow into a caring, reliable adult who can turn her love for structure into helping others succeed.
