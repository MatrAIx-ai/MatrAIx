personas:
  professional: Liza Osborn, a budding builder who loves stacking wooden blocks into orderly towers, displays an early talent for organization and practical problem‑solving while still allowing themselves
    moments of free‑form play when the mood strikes, reflecting their preference for structure tempered by relaxed flexibility.
  sports: Liza Osborn attends a twice‑weekly preschool gymnastics class, cheers for the Tiny Tots Soccer Club during weekend matches, and they are an enthusiastic fan of the New York Yankees, often shouting
    "Go Yanks!" during family TV night.
  arts: Liza Osborn spends afternoons painting watercolor scenes of Moana’s island, sings along to Idina Menzel’s "Let It Go," and delights in the playful antics of Peppa Pig, showing how music, film, and
    visual art shape their creative playtime.
  travel: Liza Osborn has explored the magical world of Disney World in Florida, built sandcastles on a local North Carolina beach, and they dream of gazing at the Eiffel Tower in Paris, preferring family‑guided
    trips that balance adventure with the comfort of familiar routines.
  culinary: Liza Osborn prefers cheesy macaroni, chicken nuggets with ketchup, and strawberry‑yogurt parfaits, enjoys spreading peanut butter and jelly on whole‑grain bread almost unaided, and they are
    fascinated by bright red strawberries and crunchy carrot sticks during snack time.
  core: Liza Osborn toggles between meticulous block‑building and spontaneous candy binges, quietly confident yet occasionally messy, embodying a blend of structure, flexibility, and a love for solo play.
background:
  cultural: Liza is being raised in a middle‑class, white Southern family in Greenville, South Carolina. Her family participates in typical regional traditions such as weekly church attendance, celebrating
    holidays like Thanksgiving and Christmas with Southern-style meals, and attending community events such as the local Fall Festival. The community emphasizes hospitality, politeness, and close family
    ties, and Liza often experiences outdoor activities like picnics and garden projects that reflect the region's appreciation for nature and communal gatherings.
