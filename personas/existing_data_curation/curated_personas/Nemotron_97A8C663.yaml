  career_goals: Melba aims to advance into senior leadership roles where she can shape workplace safety culture and drive sustainable engineering practices. She plans to pursue a master's degree in Industrial
    Engineering or Public Health to deepen her expertise in ergonomics and occupational wellness. Over the next five years, she envisions becoming a Safety Director overseeing health and safety programs
    for a multinational corporation, while also launching an initiative that provides safety consulting and mentorship to Black‑owned small businesses in the Southeast. Long‑term, she aspires to influence
    industry standards through policy advocacy and to become a recognized speaker at conferences that blend engineering, art, and social equity.
