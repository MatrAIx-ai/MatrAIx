personas:
  professional: Melba Robinson is a 25‑year‑old industrial engineer specializing in health, safety, and ergonomics, who fuses data‑driven Lean Six Sigma expertise with an imaginative design‑thinking approach
    to create worker‑centric solutions, leading cross‑functional teams with empathy and collaborative flair.
  sports: Melba Robinson starts each weekday with a sunrise run along the Atlanta BeltLine, joins the Atlanta Trails Club for weekend hikes in the Blue Ridge Mountains, practices yoga twice a week, cheers
    for the Atlanta Falcons on football Sundays, and plays recreational ultimate frisbee with a co‑working friends league.
  arts: Melba Robinson spends evenings painting abstract canvases inspired by Yayoi Kusama, curates glitch‑style digital illustrations that echo the experimental sounds of Aphex Twin, captures Atlanta’s
    gritty street textures in photographs reminiscent of William Klein, and attends immersive VR art installations by teamLab whenever they tour the city.
  travel: Melba Robinson favors spontaneous weekend escapes to Appalachian towns like Asheville for hiking and craft coffee, while saving toward a year‑long immersion trip to Kyoto’s Zen gardens and planning
    a future adventure to Iceland’s volcanic landscapes, balancing careful budgeting with a deep craving for cultural discovery.
  culinary: Melba Robinson delights in crafting Korean‑Mexican fusion dishes such as kimchi‑infused carne asada tacos topped with gochujang aioli, perfects matcha oat‑milk lattes with a dash of honey, and
    indulges in a slice of tiramisu flavored with cardamom whenever she experiments with new flavor pairings.
  core: Melba Robinson blends a meticulous safety‑engineer mindset with an unapologetically experimental art practice, staying up late perfecting VR prototypes while occasionally forgetting to water her
    houseplants or reply to texts, and she thrives on turning abstract concepts into concrete solutions.
background:
  cultural: Melba is an African American woman rooted in Atlanta's vibrant Black community. Raised in DeKalb County, she grew up attending church gatherings that emphasized service and collective uplift,
    and her family’s stories of civil‑rights activism shaped her commitment to equity. She earned her bachelor’s at Georgia Tech, where she was active in the National Society of Black Engineers and the
    Black Student Union, forging strong peer networks. Atlanta’s rich musical heritage—from gospel to hip‑hop—infuses her creative pursuits, while local cultural festivals like the Atlanta Jazz Festival
    and the Martin Luther King Jr. Celebration keep her connected to her heritage. Melba actively participates in Black professional circles, mentors youth in STEM, and draws inspiration from the city’s
    blend of innovation and tradition to inform both her engineering work and artistic expression.
