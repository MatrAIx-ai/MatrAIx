persona_description: A planetary scientist who specializes in the study of Enceladus and its moon, Enceladus. Her research focuses on the formation and behavior of the moon's ice shell and the mechanisms
  that cause cracks and stripes to form. She is particularly interested in the interaction between Enceladus's ice and the gravitational tugs from its fellow moons and the Saturnian system as a whole. Her
  work has implications for understanding the dynamics of icy moons and the potential for life in the cold and dark environments of the outer solar system.
