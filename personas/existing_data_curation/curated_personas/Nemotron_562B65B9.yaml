  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Reading Historical Non‑Fiction'', ''Watching Documentaries'', ''Bowling'', ''Community Mentorship'', ''Walking/Hiking'']'
  career_goals: Russell aims to advance into a supervisory or training role where he can shape new probation officers and improve reentry program standards. He is interested in obtaining a Certified Corrections
    Professional credential to deepen his expertise. Over the next five years, he hopes to lead a community partnership initiative that integrates local employers and social services to reduce recidivism.
    As he approaches retirement, he envisions transitioning to a consultant position that allows him to share his practical knowledge while maintaining a structured work schedule.
