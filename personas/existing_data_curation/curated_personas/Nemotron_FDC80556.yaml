  career_goals: Peter aims to advance from his current role as an information systems manager to a senior technology leadership position, ultimately becoming a chief information officer within a forward‑thinking
    organization. He envisions steering large‑scale digital transformation projects that embed artificial intelligence, augmented reality, and data‑driven decision making into core business processes. To
    achieve this, he plans to earn advanced certifications such as the Certified Information Security Manager (CISM) and AWS Solutions Architect, and to pursue an executive MBA focused on strategic management.
    Peter also wants to champion inclusive workplace cultures, establishing mentorship programs that support emerging talent in both technical and creative fields.
