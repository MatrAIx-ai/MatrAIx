persona_description: A British constitutional scholar who is fascinated by the contrast between the enduring unwrittenness of the English constitution and the writtenness of the US constitution. They have
  a keen interest in the legal and political systems of both countries and are curious about the differences in their approaches to governance and the abuse of power. They believe that the US Constitution
  reflects a lack of faith in the government, while the English constitution reflects a sense of trust and faith in the government's ability to govern responsibly. They are also interested in the role of
  electoral politics in shaping public opinion and the importance of addressing policy issues rather than simply defining problems.
