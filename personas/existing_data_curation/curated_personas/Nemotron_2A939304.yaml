    "Document Management", "Team Collaboration", "Assertive Decision‑Making"]'
  hobbies: '["Reading historical fiction and non‑fiction", "Exploring Boston’s historic neighborhoods", "Attending live theater and jazz performances", "Hiking in the Blue Hills Reservation", "Practicing
    yoga and mindfulness", "Volunteering at the Boston Public Library", "Cooking New England seafood dishes", "Journaling and reflective writing"]'
  career_goals: Cheyenne aims to advance from her receptionist role to an office manager or administrative supervisor position within the next five years. She plans to complete an associate’s degree in
    Business Administration while gaining experience in team leadership and budgeting. Her long‑term ambition is to oversee operations at a cultural institution or community center in Boston, where she
    can blend her curiosity for new initiatives with practical management skills, ultimately designing training programs for front‑desk staff and improving visitor experiences.
