personas:
  professional: Cheyenne Overfield, a seasoned front‑desk specialist at the Boston Public Library, leverages their meticulous record‑keeping, multitasking on high‑volume phone lines, and deep knowledge
    of the city’s transit system while they balance curiosity‑driven process improvements with a practical, compassionate approach to visitor service.
  sports: Cheyenne Overfield follows the Boston Red Sox passionately, attends Celtics games when possible, and they participate in the Boston Athletic Association's Saturday morning 5K runs, while maintaining
    a personal fitness routine of yoga and trail hikes in the Blue Hills, balancing competitive fandom with moderate, community‑oriented exercise.
  arts: Cheyenne Overfield regularly attends productions at the Boston Shakespeare Company, enjoys jazz setlists featuring Wynton Marsalis and Esperanza Spalding, reads historical novels by Kate Morton
    and local author Tom Cotter, and they find that the arts punctuate their reflective evenings and inform their curious worldview.
  travel: Cheyenne Overfield prefers low‑key weekend getaways to New England gems like Cape Cod, Salem, and the White Mountains, while they dream of an extended cultural tour of the United Kingdom’s historic
    towns, balancing careful budget planning with a desire for immersive historic experiences.
  culinary: Cheyenne Overfield is a competent home cook who delights in preparing classic New England seafood dishes such as creamy clam chowder, lobster rolls with buttered rolls, and roasted cod with
    fresh herbs, often sourcing local scallops and corn at the Boston Public Market, while they also enjoy occasional brunches featuring avocado toast and artisan coffee.
  core: Cheyenne Overfield blends Boston‑born civic pride and insatiable curiosity, balancing precise front‑desk efficiency with a habit of over‑committing to volunteer projects, a love of early‑morning
    yoga, and an occasional inability to say no to Red Sox game tickets, which they admit sometimes strains their personal schedule.
background:
  cultural: Cheyenne comes from a white Anglo‑Irish family that has lived in Boston for generations. She was raised with the New England values of education, civic responsibility, and modesty. Family traditions
    include celebrating Thanksgiving with a multi‑generational feast, participating in the Fourth of July parade, and supporting local sports teams, especially the Red Sox. Her upbringing in Boston’s diverse
    neighborhoods has fostered a strong sense of community involvement and an appreciation for the city’s blend of historic heritage and progressive culture.
attributes:
