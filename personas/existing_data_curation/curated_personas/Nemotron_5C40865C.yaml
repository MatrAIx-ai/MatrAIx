personas:
  professional: Iman Bonnell, a seasoned transit bus operator with four decades of expertise in route planning, real‑time problem solving, and passenger safety, channels their practical curiosity and sociable
    nature into championing electric‑bus adoption and mentoring new drivers, and they apply a meticulous yet flexible approach to guarantee reliable service and harmonious rider experiences.
  sports: Iman Bonnell enjoys crisp morning hikes with the senior walking club through Sabino Canyon, balances the routine with occasional shuffleboard matches at the local senior center, and they stay
    emotionally invested in Arizona’s sports scene by cheering for the Arizona Diamondbacks baseball team and the University of Arizona Wildcats basketball squad.
  arts: Iman Bonnell channels artistic energy into Southwest‑inspired quilting that pays homage to Frida Kahlo’s bold colors and Native‑American motifs, while they unwind with classic Carlos Santana vinyl
    records and find quiet satisfaction solving crossword puzzles that often feature literary nods to Maya Angelou.
  travel: Iman Bonnell favors well‑planned road trips that combine scenic desert drives and cultural stops, such as weekend getaways to Sedona’s red rocks, tranquil visits to Santa Fe’s art districts, and
    annual family excursions to the Grand Canyon, and they dream of a future pilgrimage to Oaxaca’s historic markets in Mexico.
  culinary: Iman Bonnell boasts a keen palate for Mexican and Sonoran fare, regularly perfecting carne asada tacos with hand‑made corn tortillas, savoring charred nopal (cactus) salads seasoned with lime
    and cilantro, and they experiment with homemade salsa verde made from fresh tomatillos and jalapeños, while considering themselves a confident home cook.
  core: Iman Bonnell, a 70‑year‑old transit veteran with restless curiosity, balances innate kindness with occasional worry, fills spare time stitching desert‑inspired quilt panels, journaling daily, and
    they never pass a crossword puzzle without a cup of coffee.
background:
  cultural: Iman was raised in a Midwestern white family with Irish‑German roots and moved to Tucson in her early‑fifties after marrying a fellow transit enthusiast. She has embraced the Southwest’s multicultural
    atmosphere, respecting the region’s Mexican‑American heritage while maintaining her Methodist faith and the community values of her upbringing. Her lifelong exposure to small‑town solidarity and later
    urban diversity informs her cooperative nature, and she often serves as a cultural bridge at community events, sharing stories from both her Midwestern heritage and her adopted Arizona home.
attributes:
  skills: '[''Route planning'', ''Passenger safety'', ''Vehicle inspection'', ''First-aid response'', ''Conflict de-escalation'', ''Customer service'', ''Basic conversational Spanish'', ''Scheduling software
    operation'', ''Mentorship and training'', ''Community outreach'']'
  hobbies: '[''Walking club outings'', ''Quilting'', ''Cooking and tasting Mexican/Sonoran cuisine'', ''Community gardening'', ''Journaling'', ''Crossword puzzles'', ''Sudoku'', ''Attending local music
    festivals'']'
  career_goals: Iman aims to transition from full‑time driving to a part‑time mentorship role, training new drivers on safety protocols and customer‑service best practices. She hopes to collaborate with
    Sun Tran to pilot a senior‑focused shuttle program, leveraging her understanding of older passengers’ needs. Over the next few years she also wants to earn a certified Transit Safety Instructor designation
    and serve on the local transit advisory board, advocating for more accessible routes and stress‑reduction measures for drivers.
