persona_description: A Japanese politician who has served as the leader of the Liberal Democratic Party and as the Prime Minister of Japan. Abe is known for his strong conservative stance and his support
  for Japan's role in World War II. He has been a vocal advocate for revising constitutional limitations on Japan's military, increasing Japan's role in international affairs, and taking a harder line in
  Japan's relations with North Korea. Abe's leadership was marked by a series of government scandals and the LDP's loss of control of the Diet's upper house, leading to his resignation in 2007. His successor,
  Yasuo Fukuda, succeeded him. Five years later, Abe was again elected leader of the LDP and led the party to a landslide victory, becoming Prime Minister again in December, 2012.
