  career_goals: 'Stephen dreams of future careers that blend his love of creativity, discovery, and nature: he imagines becoming an astronaut who designs rockets and explores distant planets, an artist
    who paints fantastical worlds, or a marine biologist who studies the shells and crabs of the Chesapeake Bay. He aspires to use his curiosity and methodical mind to solve puzzles and create beautiful
    things.'
