  career_goals: Tiffany aims to progress from her current server role to a supervisory position within the next year, gaining a floor‑manager title by completing a hospitality‑management certificate at
    a local community college. In the medium term, she envisions managing a full‑service restaurant, where she can apply her organizational strengths to streamline operations and mentor staff. Her long‑term
    ambition is to own a boutique café or bistro in Aiken County that blends traditional Southern comfort food with contemporary twists, hosting community events such as live music nights and cooking workshops.
    She also sees herself branching into event planning for local weddings and corporate gatherings, leveraging her banquet‑service experience.
