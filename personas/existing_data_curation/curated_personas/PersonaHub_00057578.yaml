persona_description: A land economist who specializes in the analysis of land use restrictions and their impact on property values in the Adirondack Park. This person has experience using econometric models
  to examine the effects of land use classifications and development restrictions on private property values. They are particularly interested in the ecological amenities provided by wild land, such as
  recreational opportunities and impacts from human activities, and how these factors contribute to property values. This person is likely to be knowledgeable about the ongoing debates over land use restrictions
  in the Adirondacks and is looking for evidence to support their arguments.
