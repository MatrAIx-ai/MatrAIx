    ERP systems)'']'
  hobbies: '[''Gardening (vegetables and herbs)'', ''Southern cooking and recipe experimentation'', ''Quilting and textile arts'', ''Hiking (Natchez Trace State Park)'', ''Reading (historical fiction, mystery)'',
    ''Church volunteer work (food pantry, youth mentorship)'', ''DIY home improvement projects'']'
  career_goals: Susan aims to advance to a lead cutter or CNC programmer role, earning industry certifications such as the NIMS CNC Machining Level I. She plans to pursue a shift‑supervisor position where
    she can lead process‑improvement initiatives and mentor new employees. Over the next few years she hopes to enroll in a part‑time bachelor's program in industrial technology to deepen her engineering
    knowledge and eventually transition into a quality‑assurance or production‑planning role. Long‑term, she envisions starting a side business offering custom‑cut wood furniture and homemade crafts for
    local customers, combining her technical skills with her creative interests while providing additional financial security for her family.
