personas:
  professional: Evan James is a seasoned manufacturing assembly specialist who leverages two decades of hands‑on experience with CNC milling, lean principles, and a curiosity for automation to lead small
    improvement teams while preparing for a supervisory role.
  sports: Evan James competes in the Springfield Softball League’s River Rats team, follows the St. Louis Cardinals and Kansas City Chiefs, tailgates at Missouri State Bears football games, and spends weekends
    fishing the Ozark River, blending community sports with regional team loyalty.
  arts: Evan James enjoys classic country legends like Johnny Cash and Merle Haggard, attends productions at the Springfield Little Theatre, and finds artistic expression through woodworking projects that
    echo the American Regionalist style of Thomas Hart Benton.
  travel: Evan James favors road‑trip adventures in their pickup, having explored the Ozark lakes, Nashville’s music scene, and New Orleans’ jazz districts, while dreaming of a fishing expedition to Patagonia
    but balancing travel plans with family commitments and a modest vacation budget.
  culinary: Evan James prides themselves on smoking Kansas City‑style ribs with hickory chips, grilling fresh trout caught on Ozark outings, and crafting homemade coleslaw, while their woodworking hobby
    fuels a collection of custom cutting boards used for weekend barbecues.
  core: Evan James blends the practical values of his upbringing with a tinkerer’s curiosity, juggling a hands‑on manufacturing career, community sports, and a love of BBQ, all while wrestling with stress‑induced
    worry and a habit of over‑planning.
background:
  cultural: Evan grew up in a middle‑class family in the Springfield, Missouri area, steeped in Midwestern values of hard work, community involvement, and modesty. His upbringing combined traditional Protestant
    church participation with a love of local traditions such as high school football, county fairs, and barbecue cook‑outs. The region’s emphasis on self‑reliance and practical problem‑solving shaped his
    pragmatic outlook, while the close‑knit community fostered his sociable, outgoing nature. He and his wife have deep roots in Greene County, maintaining connections with extended family and long‑time
    neighbors, and they actively contribute to local charities and the community center.
attributes:
  skills: '["Machining", "Welding (MIG/TIG)", "Blueprint reading", "CNC programming", "Quality control", "Lean manufacturing (5S, Kaizen)", "Team leadership", "Safety compliance (OSHA)", "Troubleshooting",
    "Project coordination"]'
  hobbies: '["Softball league", "River fishing", "Woodworking club", "Arduino/Raspberry Pi tinkering", "Weight training", "Mindfulness breathing", "Youth mentoring", "Family barbecue gatherings", "Tailgate
    parties at football games"]'
  career_goals: Evan aims to transition from a hands‑on assembler to a supervisory role within the next three years, seeking a shift lead or production manager position where he can apply his practical
    experience and curiosity about emerging manufacturing technologies. He plans to obtain a certification in CNC programming and complete a Lean Six Sigma Green Belt to deepen his expertise in process
    optimization. Ultimately, he would like to lead a cross‑functional team that integrates robotics and automation into the plant, improving efficiency while preserving job safety. He also entertains the
    longer‑term ambition of opening a small custom metal‑fabrication shop that could serve local businesses and hobbyists, allowing him to blend his technical skills with entrepreneurial interests. Balancing
    his practical nature with his desire for new ideas, he is mindful of work‑life balance to manage his tendency toward stress.
