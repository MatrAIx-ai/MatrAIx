personas:
  professional: Kimberly Hagen, a 40‑year‑old network architect with 15 years of experience designing resilient LAN/WAN infrastructures, is renowned for their methodical, documentation‑heavy approach, calm
    crisis management, and a determined drive to earn a CCIE while mentoring junior engineers toward senior leadership.
  sports: Kimberly Hagen, an outdoor enthusiast, spends weekends hiking Palo Duro Canyon and riding with the Vernon Equestrian Club, while cheering on the Dallas Cowboys in football season, the Dallas Mavericks
    in basketball, and the Texas Rangers during summer baseball outings.
  arts: Kimberly Hagen, an avid quilter and historical‑fiction reader, finds inspiration in the paintings of contemporary Texas artist James R. Adamson, the songs of Willie Nelson, and the novels of Larry McMurtry,
    often attending local art fairs and community‑theater performances.
  travel: Kimberly Hagen prefers meticulously planned road trips, using a spreadsheet itinerary to explore destinations like Santa Fe’s art scene, the Texas Hill Country’s wineries in Fredericksburg, and
    a weekend camping adventure at the Grand Canyon, balancing family relaxation with a touch of adventure.
  culinary: Kimberly Hagen, an accomplished home cook, delights in preparing authentic Tex‑Mex dishes such as chicken fajitas with fresh cilantro, lime, jalapeños, and homemade corn tortillas, complemented
    by garden‑grown rosemary‑infused roasted potatoes, showcasing a chef‑level confidence in blending spices and flavors.
  core: Kimberly Hagen is a methodical network architect who harmonizes small‑town values with high‑tech expertise, balancing disciplined budgeting, proactive health monitoring, outdoor vigor, quilting
    artistry, and carefully plotted travel.
background:
  cultural: Kimberly Marie Hagen grew up in Vernon, a small town in north-central Texas, within a family that traces its roots to German and Czech settlers who arrived in the region in the early 1900s.
    The community’s Southern hospitality, strong work ethic, and close-knit church life have deeply shaped her values. She embraces the modesty, self-reliance, and neighborly support that characterize small-town
    Texas culture, while also celebrating regional traditions such as holiday parades, county fairs, and communal volunteerism. Her background influences her collaborative approach at work, her dedication
    to reliable service, and her commitment to giving back through local service projects and church activities.
attributes:
  skills: '["Enterprise LAN/WAN design", "Network security architecture", "Cisco routing and switching (CCNA/CCNP/CCDP)", "Juniper network solutions", "SD-WAN deployment", "Network virtualization (VMware
    NSX, Cisco ACI)", "Firewall configuration (Palo Alto, Fortinet)", "Network performance monitoring (SolarWinds, NetFlow, Wireshark)", "Technical documentation and SOP creation", "Project management and
    budgeting", "Vendor management and contract negotiation", "Troubleshooting and root-cause analysis", "Compliance and risk assessment (PCI-DSS, ISO 27001)", "Team mentorship and training"]'
  hobbies: '["Gardening (native Texas herbs and roses)", "Hiking (Palo Duro Canyon and local trails)", "Horseback riding", "Quilting", "Volunteering at church food pantry", "Reading historical fiction",
    "Home automation projects (Raspberry Pi, smart home)", "Cooking Tex-Mex cuisine"]'
  career_goals: Kimberly aims to advance to a senior leadership role where she can shape the strategic direction of network infrastructure across a multi-state organization. Over the next five years she
    plans to earn the Cisco CCIE and a specialized cloud networking certification, lead a regional rollout of SD-WAN and hybrid cloud connectivity, and establish a formal mentorship program for emerging
    network engineers. She is also interested in influencing industry best-practice standards through participation in professional bodies such as the IEEE and the Network Professional Association. While
    pursuing these objectives, she remains committed to maintaining a healthy work-life balance, supporting her family, and contributing to her local community through volunteer tech workshops.
