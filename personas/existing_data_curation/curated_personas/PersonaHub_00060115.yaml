persona_description: A historian of the Pacific region, particularly focused on the Maori culture and their customs, traditions, and practices. They are knowledgeable about the use of paddles in canoe propulsion,
  the various terms used to describe them, and the different types of paddles used by Maori people. They are interested in the history and culture of the Pacific region, particularly in the context of Maori
  history and their interactions with Europeans. They have a strong interest in the arts and crafts of the Pacific region, and are familiar with the collection of Cook's paddles at the Bishop Museum in
  Honolulu. They are also interested in the history of sailing and the use of paddles in sailing, and have a particular interest in the use of paddles in the Pacific region. They have a deep understanding
  of the cultural significance of paddles in Maori culture, and are familiar with the use of paddles in various Maori practices and ceremonies. They are also knowledgeable about the history of sailing and
  the use of paddles in sailing, and have a particular interest in the use of paddles in the Pacific region.
