personas:
  professional: Orlando Bautista, though only one year old, already shows early signs of a future data scientist, captivated by shape‑sorting toys that require systematic reasoning and using structured
    daily routines, traits that they display through meticulous organization of their tiny play area.
  sports: Orlando Bautista enjoys toddler swim classes and mini gymnastics, often arrives at the community center in a stroller while his parents cheer on the Orlando Magic during televised games, and they
    proudly belong to a local kids' soccer group called the Little Lakers.
  arts: Orlando Bautista delights in listening to the soothing piano works of Debussy and the playful melodies of Raffi, loves the bright illustrations in Eric Carle books, and they frequently watch Sesame
    Street, where they admire the character Elmo and the musical performances of the Muppets.
  travel: Orlando Bautista’s family has taken him on a stroller‑friendly trip to Walt Disney World in Orlando and a weekend getaway to the beach town of Clearwater, where they enjoy gentle sand play and
    an endless supply of picture books, preferring short, well‑planned itineraries that keep his nap schedule intact.
  culinary: Orlando Bautista prefers the smooth texture of mashed sweet potatoes and ripe avocado puree, delights in organic banana slices, and they consider a lightly seasoned chicken and vegetable ragout
    their favorite spoon‑fed dish, while they occasionally reject bland rice cereal for more flavorful options.
  core: Orlando Bautista is a meticulous one‑year‑old who thrives on predictable routines, counts their toys before bedtime, and, when routines wobble, anxiously drops their pacifier and fusses, a habit
    they have yet to outgrow.
background:
  cultural: Orlando is raised in a Mexican‑American household in Amarillo, Texas. His parents speak both Spanish and English at home, sharing Mexican cultural traditions such as Día de los Muertos altars,
    family meals featuring tacos and tamales, and Spanish nursery rhymes. This bilingual, bicultural environment blends Mexican heritage with the local Texas community, influencing his early language exposure,
    food preferences, and celebration of cultural holidays.
