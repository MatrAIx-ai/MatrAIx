    User 2: Me too! What kind of stuff do you do there?

    User 1: I help customers find what they''re looking for, and I also stock shelves and help out in the back.

    User 2: That sounds like fun. I mostly just work in the back, stocking shelves and cleaning up.

    User 1: Yeah, it''s pretty good. I like meeting new people and helping them find what they need.

    User 2: I can see why. It sounds like you''re good at your job.

    User 1: Thank you! I try my best.

    User 2: Do you have any pets?

    User 1: No, I don''t. I''m allergic to cats, so I can''t have any.

    User 2: That''s too bad. I love cats. I have four of them.

    User 1: Oh, wow! That''s a lot of cats.

    User 2: Yeah, they''re a handful, but I love them.

    User 1: I can imagine. Cats can be a lot of work.

    User 2: They sure can. But they''re worth it.

    User 1: I''m sure they are.

    User 2: So, what kind of music do you like?

    User 1: I like a lot of different kinds of music, but my favorite band is Metallica.

    User 2: Oh, nice! I love Metallica too. They''re one of my favorite bands.

    User 1: Me too! I''ve seen them live a few times.

    User 2: Oh, that''s awesome! I''ve always wanted to see them live.

    User 1: You should! They put on an amazing show.

    User 2: I''ll definitely try to see them next time they''re in town.

    User 1: Good! You won''t be disappointed.'
