  career_goals: Guadalupe aims to move from her current first‑line supervisory role to an Operations Manager or Director of Administrative Services within the next three to five years, leveraging her organizational
    talent to drive efficiency and innovation across the organization. She plans to obtain a Project Management Professional (PMP) certification and enroll in an MBA program focused on organizational development.
    A key long‑term ambition is to create a corporate‑wide arts initiative that showcases local Mexican‑American artists, enriching workplace culture and community ties. She also aspires to mentor emerging
    administrative professionals, especially those from under‑represented backgrounds, and to champion data‑driven decision‑making that balances performance goals with creative thinking.
