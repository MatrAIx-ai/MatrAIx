personas:
  professional: Reema Kania, a seasoned registered nurse with over twenty years of bedside experience, blends their practical curiosity and methodical precision to excel in patient assessment, wound care,
    and health-informatics initiatives while mentoring newer staff and championing evidence-based practice.
  sports: Reema Kania follows the Dallas Cowboys and Houston Astros passionately, participates in a local women's softball league, and attends the Dallas Mavericks season tickets game every other year,
    balancing their love for team spirit with weekend morning walks in the neighborhood park and a modest commitment to a beginner's yoga class at the community center.
  arts: Reema Kania devotes evenings to mystery novels by Gillian Flynn and Tana French, enjoys the jazz stylings of Louis Armstrong and the soulful voice of Dolly Parton, and supports the local community
    theater where they occasionally assist with backstage lighting, finding artistic solace that tempers their high-stress nursing schedule.
  travel: Reema Kania prefers a mix of structured road trips and spontaneous escapes, having explored the Texas Hill Country's wineries, the historic streets of New Orleans, and a weekend retreat in Asheville,
    while dreaming of a cultural pilgrimage to Edinburgh's literary festivals and a leisurely cruise through the Greek Islands.
  culinary: Reema Kania's culinary experiments revolve around baking healthier Southern classics like almond-flour pecan pie, low-sugar banana bread with Greek yogurt, and whole-grain cornbread infused
    with honey and jalapeno, while they relish sourcing fresh heirloom tomatoes and sweet potatoes from the farmer's market for their weekly meals.
  core: Reema Kania merges a nurse's meticulousness with a baker's quest for wholesome flavor, navigating anxiety through journaling, budgeting with spreadsheet precision, and squeezing moments of mindfulness
    into a busy garden-filled life.
background:
  cultural: Reema was raised in a modest, middle‑class white family in suburban Texas, where Southern hospitality, church involvement, and community service were core values. Her upbringing emphasized hard
    work, reliability, and the importance of supporting neighbors, shaping her compassionate yet self‑advocating outlook. Although she identifies broadly with mainstream American culture, she maintains
    traditions such as holiday home‑cooked meals and regular church attendance, which provide both a sense of belonging and a structured framework for coping with her heightened emotional reactivity.
attributes:
  skills: '[''patient assessment'', ''IV insertion and therapy'', ''wound care'', ''medication administration'', ''electronic medical record documentation'', ''patient education'', ''triage coordination'',
