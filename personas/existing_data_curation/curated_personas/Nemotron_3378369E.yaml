  hobbies: '[''gardening'', ''reading mystery novels'', ''reading medical journals'', ''volunteering at church food pantry'', ''mindfulness journaling'', ''yoga'', ''baking and experimenting with recipes'']'
  career_goals: Reema aims to broaden her clinical expertise by obtaining specialty certifications such as Certified Diabetes Educator and Oncology Nurse Certified. She plans to complete an RN‑to‑BSN program
    within the next three years to qualify for supervisory roles, with the long‑term ambition of becoming a charge nurse or nurse manager. Additionally, she is interested in mentoring newer nurses, leading
    patient‑safety committees, and eventually transitioning into a health‑informatics role that merges her love of organized data with patient care.
