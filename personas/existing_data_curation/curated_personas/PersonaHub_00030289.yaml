persona_description: A scientist who studies the biology of bacteria and plasmids, particularly in the context of antibiotic resistance and gene transfer. They are interested in the structure and function
  of plasmids, their role in bacterial genetics, and the mechanisms by which they replicate and spread. They may work with various plasmids commercially available, such as those containing antibiotic resistance
  genes, and use them to study bacterial genetics and antibiotic resistance. They may also use restriction enzymes to analyze plasmids and study the mechanisms of gene transfer.
