  hobbies: '[''Gardening'', ''Reading Historical Nonfiction'', ''Reading Science Books'', ''Cooking Chesapeake Bay Recipes'', ''Hosting Dinner Gatherings'', ''Volunteer Medication Education'', ''Woodworking'',
