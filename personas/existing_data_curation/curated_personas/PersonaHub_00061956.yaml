persona_description: A British astronomer and photographer who is remembered for his pioneering work in wet-collodion photography and his role as the Astronomer Royal for Scotland. He is known for his early
  experiments with the calotype process and his contributions to the field of photography, particularly in the early history of wet-collodion photography. His scientific heritage and artistic sensibilities
  balance well, and he is remembered for his innovative photography through his wife, Jessie.
