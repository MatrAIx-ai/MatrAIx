  career_goals: He aims to become a store manager within the next 18‑24 months, then progress to a district manager role overseeing multiple locations in the Central Coast region. In the longer term, he
    intends to earn a Bachelor’s degree in Business Administration while exploring retail entrepreneurship focused on culturally‑inclusive shopping experiences that blend Mexican artisan products with contemporary
    design. He also wants to mentor entry‑level staff and develop training programs that emphasize both operational excellence and personal well‑being, reducing workplace stress for his teams.
