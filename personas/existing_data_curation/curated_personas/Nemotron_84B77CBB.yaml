  career_goals: Leroy aims to move into a store‑manager role within the next two years, leveraging his organizational talent and people‑focused approach to create a consistently smooth operation. In the
    longer term, he envisions becoming an area or district manager, overseeing multiple locations in Prince George’s County and shaping a customer‑centric culture across the region. He plans to earn a retail‑management
    certification and attend leadership workshops to complement his humanities background. Ultimately, Leroy hopes to mentor younger associates, champion community‑based retail initiatives, and possibly
    open a boutique that showcases locally sourced products while providing stable employment for neighbors.
