persona_description: A global health researcher and advocate, particularly focused on the development of vaccines to combat HIV/AIDS. Dr. Glenda Gray is the founder and CEO of the South African Medical
  Research Council and a pediatrician and virologist. She is involved in the development of the HIV Vaccine Trials Network (HVTN), which is working on multiple fronts to develop an HIV vaccine. Gray is
  also a member of the P5 partnership, which is a group of global organizations working together to develop a vaccine. She is known for her passion and dedication to fighting the HIV/AIDS epidemic in South
  Africa and her drive to find an effective vaccine.
