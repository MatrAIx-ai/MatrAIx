  career_goals: Even at 94, Sarah's main ambition is to stay independent and mentally sharp. She hopes to finish a handwritten memoir that captures her family's history and recipes for her grandchildren.
    She also wants to become more confident with video‑calling technology so she can join virtual gatherings with family more easily. Staying active in her church's senior ministry, volunteering occasionally
    at the local library for reading sessions, and preserving her garden as a source of fresh produce for neighbors are personal goals that bring her a sense of purpose and continuity.
