personas:
  professional: A three-year-old Wanda Davis channels their preference for structure into building towering block fortresses, and they take charge of arranging toys, insisting on precise color patterns,
    and leading the playroom tidy-up routine with an assertive yet gentle tone.
  sports: Wanda Davis loves the rhythmic thump of the local preschool soccer balls during Tuesday 'Mini‑Kick' sessions, quietly cheers for the hometown City Cubs baseball team on TV, and rides their teal
    tricycle around the cul-de-sac, preferring solo rides to large group games while they occasionally attend Little Sprouts Gymnastics Club on weekends.
  arts: Wanda Davis spends afternoons humming 'Let It Go' from Frozen while coloring pictures of animals they saw at the zoo, and they can recite the entire alphabet song from Sesame Street, showing how
    early exposure to Disney, The Wiggles, and educational music shapes their playtime.
  travel: Wanda Davis enjoys short, predictable trips to the nearby botanical garden where they follow the same winding path and watch the butterfly exhibit, and they dream of one day seeing the towering
    Eiffel Tower in Paris after their parents showed them a picture in a travel book.
  culinary: Wanda Davis prefers simple bites like cheese-filled pizza pockets, apple slices, and the occasional peanut-butter cookie, often proudly stirring the batter for banana pancakes with a plastic
    spoon and insisting on a tiny dash of cinnamon, though they can be stubborn about trying broccoli.
  core: Wanda Davis is a meticulous three-year-old who thrives on tidy routines, counts every coin before a purchase, and channels their organized mind into block towers and bedtime rituals, all while quietly
    insisting on their favorite snack.
background:
  cultural: Wanda is raised in a white Texan family in Bridge City, an area that embraces Southern traditions. Her household observes Christian holidays such as Easter and Christmas and attends church services
    each Sunday. Family gatherings often feature Southern cuisine like barbecue, fried catfish, and sweet tea, and community celebrations include Fourth of July parades and local fish‑fry festivals. While
    the broader community has Hispanic influences, Wanda's cultural experience centers on the modest, close‑knit values of her family, emphasizing routine, respect for elders, and a fondness for the Gulf
    Coast outdoors.
