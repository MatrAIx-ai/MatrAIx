  career_goals: Though still very young, Wanda often talks about wanting to help and teach others. She frequently says she will be a teacher one day, imagining herself reading storybooks to younger children
    and organizing classroom games. She also shows a budding interest in caring for animals, pretending to be a veterinarian for the family dog. Her ambitions reflect her love for structure, responsibility,
    and nurturing roles in a stable, supportive environment.
