persona_description: A biologist who specializes in studying the behavior and ecology of fish, particularly those that live in shallow water and have poor vision due to their lack of rod receptors. They
  are interested in the ways in which fish use their other senses to locate prey and their vision only comes into play at the last moment. They are also interested in the ways in which the behavior of fish
  is affected by the light levels in their environment, and how these light levels can impact their ability to see in low light conditions.
