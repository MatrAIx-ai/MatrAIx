personas:
  professional: Lydia Gordon, a miniature architect in the making, builds block towers with meticulous planning, turning each play session into a structured design project that showcases her methodical
    and reliable nature.
  sports: Lydia Gordon loves the local Kids' Soccer Club’s Saturday morning sessions, cheers loudly for the New York Yankees while waving a mini foam bat, and insists on a structured warm‑up routine before
    darting onto the grass with boundless energy.
  arts: Lydia Gordon delights in drawing rainbow‑colored dinosaurs, sings along to Raffi’s "Baby Beluga" on repeat, and can name the characters from Sesame Street while proudly displaying a hand‑painted
    picture of the Mona Lisa reinterpretation in crayon.
  travel: Lydia Gordon’s family road trips to Disneyland and the Grand Canyon have sparked a fascination with maps, prompting her to arrange stuffed animals in a travel‑themed play area and eagerly request
    a repeat visit to the beach in Florida, though she prefers the predictable routine of bedtime after each adventure.
  culinary: Lydia Gordon favors chicken nuggets, mac and cheese, and banana slices, proudly scoops peanut butter onto toast with a plastic spatula, and loves helping stir batter for cupcakes, while occasionally
    sneaking a bite of frosting before the timer rings.
  core: Lydia Gordon is a structured yet exuberant three‑year‑old who turns every activity—from block building to snack time—into a predictable, energetic routine, peppered with occasional glitter‑sticker
    splurges.
background:
  cultural: Lydia is raised in a Spanish‑heritage household in Evansville, Wyoming. At home she hears both Spanish and English, celebrates traditional Spanish holidays such as Día de los Reyes, enjoys Spanish
    foods like paella, and participates in local Wyoming customs like school field trips to ranches, community picnics, and seasonal outdoor activities. Her family values punctuality, routine, and close
    familial bonds, blending Mediterranean warmth with the pragmatic independence of rural Wyoming.
