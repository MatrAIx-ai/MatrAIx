personas:
  professional: Jose Ulibarri, a veteran healthcare delivery strategist in his early sixties, channels three decades of expertise in operational budgeting, regulatory compliance, and bilingual community
    outreach into leading multidisciplinary teams with clear, structured plans that he readily adapts when unexpected community events arise, balancing his methodical project management with a spontaneous
    willingness to step into last‑minute cultural workshops, while his assertive communication style keeps meetings on track despite occasional missed filing deadlines.
  sports: Jose Ulibarri, a forward for the Twin Cities Veterans Soccer League’s St. Paul Patriots, regularly cheers on the Minnesota Vikings and Minnesota Twins with friends at local bars, combines his
    weekly soccer matches with brisk hikes around Minnehaha Creek and Lake Harriet, and, while his sociable nature keeps him active, his penchant for late‑night post‑game celebrations sometimes causes him
    to skip his early‑morning jogs.
  arts: Jose Ulibarri, an avid listener of Mariachi Vargas de Tecalitlán’s traditional brass arrangements and Chucho Valdés’s vibrant Latin jazz piano, spends his evenings dancing to the cumbia beats of
    Los Angeles Azules at community festivals while drawing creative inspiration from the poetry of Octavio Paz, the stark narratives of Juan Rulfo, and American biographies by Doris Kearns Goodwin, a cultural
    blend that informs his storytelling in professional presentations.
  travel: Jose Ulibarri favors meticulously planned road trips that blend cultural immersion and outdoor adventure, having charted routes to Oaxaca’s renowned culinary festivals, the historic riverwalk
    of San Antonio, and Colorado’s Rocky Mountain National Park, yet he frequently inserts spontaneous detours to Minnesota’s Lake Itasca or a weekend getaway in New Orleans whenever the weather cooperates,
    balancing his modest retirement savings and family responsibilities.
  culinary: Jose Ulibarri, a charismatic host of community cooking workshops, expertly prepares mole poblano using dried chilies, Mexican chocolate, and sesame seeds, whips up fresh ceviche with lime, cilantro,
    and snapper, perfects hand‑rolled tamales with masa harina and pork shoulder, and keeps his pantry stocked with chiles de árbol, epazote, and a well‑worn cast‑iron comal, though he occasionally forgets
    to restock after a bustling workshop weekend.
  core: Jose Ulibarri marries disciplined strategic acumen with spontaneous community passion, juggling boardroom spreadsheets, late‑night soccer matches, and cooking‑class improvisations, while his love
    for mariachi, meticulous retirement planning, and occasional forgetfulness about paperwork paint a vivid portrait of a steadfast yet delightfully unpredictable elder mentor.
background:
  cultural: Jose is a first‑generation Mexican American whose parents immigrated to the United States in the late 1950s. Raised in a bilingual household, he grew up celebrating Día de los Muertos, Mexican
    Independence Day, and family gatherings centered around shared meals. His Mexican heritage remains a cornerstone of his identity, informing his values of family solidarity, community service, and respect
    for tradition. Living in Minneapolis, he has woven these cultural roots with Midwestern sensibilities, actively participating in neighborhood cultural exchanges and advocating for the needs of Latino
    residents in a predominantly Anglo‑American context. His fluency in Spanish and deep understanding of Mexican customs allow him to serve as a cultural bridge within the healthcare system.
attributes:
