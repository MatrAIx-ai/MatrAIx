  career_goals: Janell aims to deepen her expertise by completing a master’s degree in early childhood education within the next three years. She hopes to take on a lead teacher role, overseeing curriculum
    development and mentoring new educators at her preschool. Long‑term, she envisions directing a community‑focused early learning center that emphasizes inclusive, play‑based programs for children of
    diverse backgrounds. Additionally, she plans to author a blog sharing practical teaching strategies and creative classroom activities.
