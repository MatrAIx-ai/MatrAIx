personas:
  professional: Janell Young designs engaging, structured lesson plans that weave play‑based learning with core literacy and math, utilizing gentle behavior‑guidance techniques and arts‑integrated activities
    like knitting circles and watercolor storytelling, while they balance a practical focus on day‑to‑day classroom needs with a flexible, improvisational approach that reflects their desire for both predictability
    and creative freedom.
  sports: Janell Young joins the McHenry Trailblazers hiking club for Saturday morning treks through the Lake County trail system, roots for the Chicago Cubs and Chicago Bears on game days, and plays on
    a community co‑ed softball league during the summer, which they enjoy as a way to stay physically active and socially connected.
  arts: Janell Young spends evenings immersed in contemporary fiction by authors like Sally Rooney and Ocean Vuong, crafts brief poems inspired by daily observations, creates watercolor studies echoing
    Georgia O'Keeffe’s style, curates playlists featuring indie folk artists such as Phoebe Bridgers and Sufjan Stevens, and volunteers at the McHenry Public Library’s monthly author talks, where they help
    foster community appreciation for the arts.
  travel: Janell Young approaches travel with a blend of practicality and wander‑lust, taking budget‑friendly weekend getaways to Starved Rock State Park and Door County, while dreaming of a future summer
    road trip along the Pacific Coast Highway and a cultural immersion in Edinburgh, Scotland, and they balance cost considerations with a desire for fresh inspiration.
  culinary: Janell Young, an enthusiastic home cook with intermediate skill, frequently experiments with Mediterranean‑inspired dishes like quinoa tabbouleh brimming with fresh mint and lemon zest, bakes
    vegetable lasagna using garden‑grown zucchini and ricotta, and prepares weekend brunches of avocado toast topped with thin radish slices and a perfectly poached egg, which they relish as both creative
    outlet and nourishing fuel.
  core: Janell Young is a gentle‑hearted early‑learning educator who weaves poetry and crafts into daily lessons, thrives on structured yet adaptable routines, and secretly hoards extra yarn and craft supplies
    despite a tightly balanced budget, which they justify as essential for spontaneous classroom magic.
background:
  cultural: Janell grew up in the Midwestern United States, shaped by the close‑knit, community‑oriented culture of small‑town Illinois. Her upbringing emphasized modesty, reliability, and a strong appreciation
    for nature and seasonal activities. The values of cooperation, respect for others, and civic involvement—common in McHenry County—inform both her personal life and teaching philosophy. While identifying
    as white American, she embraces the region’s diverse traditions, from local festivals to volunteer service, integrating these cultural nuances into her classroom to foster a welcoming environment for
    all children.
