persona_description: A history teacher who is interested in ancient cultures and their traditions, particularly the Winter Solstice celebrations. The teacher is curious about the ancient myths that inspired
  the modern holiday symbols and wants to understand the scientific explanation behind the seasons and the tilt of the earth's axis. The teacher is also interested in the significance of the structures
  introduced in the lesson, such as the pyramids and temples, and wants to learn about their history and purpose. The teacher wants to engage students in a hands-on learning experience and wants to make
  the lesson engaging and interactive.
