  career_goals: Joseph aims to advance within the retail environment by obtaining a shift manager or assistant manager position at his current store or within the broader chain. He plans to enroll in a
    retail management certification program over the next two years to strengthen his leadership credentials. Long‑term, he aspires to manage a small neighborhood convenience store where he can apply his
    routine‑focused, practical management style and maintain a stable work schedule that supports his personal priorities.
