  hobbies: '[''Hiking on the Illinois Prairie Path'', ''Cycling on local trails'', ''Weight training'', ''Playing soccer in a community league'', ''Reading scientific and medical journals'', ''DIY electronics
    projects'', ''Meditation and mindfulness practice'', ''Cooking traditional Mexican dishes'', ''Listening to mariachi and regional Mexican music'', ''Volunteering at community health fairs'', ''Gardening'',
    ''Attending Chicago Cubs games'']'
  career_goals: Luis aims to open his own clinic in the Chicago suburbs that focuses on sports injury prevention and geriatric rehabilitation for the Hispanic community. He plans to earn advanced certifications
    such as Certified Orthopedic Manual Therapist and become an adjunct faculty member in a university physical therapy program. He also seeks to lead community outreach initiatives that provide low‑cost
    rehabilitation services and to develop mindfulness‑integrated protocols to help patients cope with anxiety and chronic pain. Ultimately, he aspires to be recognized as a leader who bridges clinical
    expertise with culturally responsive care.
