persona_description: A Norwegian education and training authority, likely the Norwegian Directorate for Education and Training, who has developed and approved the Framework for the five basic skills in
  the Norwegian education system. They are responsible for overseeing the development of subject-specific curricula, ensuring that the Framework is a reference document for subject curricula groups to develop
  and revise National Subject Curricula. The authority is interested in ensuring that the Framework is a useful tool for subject curricula groups to relate skills development to subject content, formulate
  competence aims, and make decisions on which skills are relevant for their subject.
