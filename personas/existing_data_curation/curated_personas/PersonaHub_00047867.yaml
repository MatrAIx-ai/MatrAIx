persona_description: A philosopher who specializes in the study of dialectical materialism, particularly the concepts and theories related to the dialectical process and the concept of contradiction. Their
  research interests include, but are not limited to, the analysis of the contradictions within matter and the cause of development and circular movement, as well as the analysis of the causes of class
  struggle and the historicity of all things. They believe that the view of man in Communist materialism is based upon Darwin's theory of evolution and reject the view that man is merely a higher animal.
