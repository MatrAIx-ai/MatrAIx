    data collection","Basic statistical analysis","Team collaboration","Methodical protocol development"]'
  hobbies: '["Yoga and guided meditation","Journaling","Reading historical biographies and medical literature","Gardening (herbs and vegetables)","Cooking soul-food inspired healthy meals","Knitting and
    quilting","Volunteer health education for youth"]'
  career_goals: Candace aims to become a lead sonographer and clinical educator within the next five years, pursuing advanced certifications such as the Registered Diagnostic Cardiac Sonographer (RDCS)
    and a master's degree in health informatics. She aspires to specialize in fetal echocardiography to improve early detection of congenital heart defects, particularly in underserved Black communities.
    Long-term, she envisions establishing a mentorship program for aspiring Black sonographers and contributing to research that reduces health disparities in maternal-fetal outcomes. Stability, professional
    growth, and the ability to make a tangible impact on patient care drive her career ambitions.
