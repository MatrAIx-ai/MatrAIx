    and STEM kits'', ''Organizing class birthday parties'', ''Volunteering at the local library storytime'', ''Collecting and sorting rocks and seashells'', ''Playing soccer with friends'']'
  career_goals: Betsy dreams of a future where she can combine her love for art, helping others, and her knack for organization. She imagines becoming a teacher or a children's museum curator who can inspire
    creativity and curiosity in young minds. She also thinks about someday working as a pediatric nurse or a community program coordinator, roles that let her care for people while planning events and activities.
    In the short term, she aims to earn all her school badges, perform in the school play, and lead a Girl Scouts project that benefits her neighborhood.
