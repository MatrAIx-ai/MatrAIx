persona_description: A food waste activist who is concerned about the environmental and economic impact of food waste in the United States. They are passionate about reducing food waste through policy changes,
  behavior modifications, and the promotion of dignified food sharing practices like gleaners. They are also interested in the cultural and social aspects of food waste, particularly the role of consumer
  behavior and the influence of social norms on food waste. They are dedicated to raising awareness about the importance of reducing food waste and advocating for sustainable food systems.
