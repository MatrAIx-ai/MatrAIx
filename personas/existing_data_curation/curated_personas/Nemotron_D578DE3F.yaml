  career_goals: Kenny aspires to pursue a bachelor's degree in Business Administration with a concentration in Marketing or Communications. He aims to secure a position in corporate communications or public
    relations where he can blend his organizational strengths with his talent for public speaking. In the long term, he envisions leading community outreach programs that empower urban youth, using his
    structured approach to design sustainable initiatives. He also hopes to attain a professional certification in project management (e.g., PMP) to formalize his expertise. Balancing ambition with personal
    well‑being, he plans to integrate stress‑management techniques into his career path.
