personas:
  professional: Kenny Augustine, an 18‑year‑old aspiring Business Administration student with a focus on marketing and communications, leverages their exceptional organization, public‑speaking confidence,
    and experience in student club event planning to design structured outreach campaigns while thriving on the energy of group collaboration.
  sports: Kenny Augustine stays active by playing pickup basketball at the local community center where they often emulate the Chicago Bulls' fast‑break style, competes in a weekly tennis league at the
    YMCA, and follows the Chicago Bears for football inspiration, using a Fitbit to log workouts.
  arts: Kenny Augustine curates eclectic playlists featuring artists like Kendrick Lamar, Billie Eilish, and Kamasi Washington, dabbles in beat‑making with FL Studio Lite, and finds inspiration in self‑development
    literature such as James Clear’s *Atomic Habits* and Brené Brown’s *Daring Greatly*, weaving these influences into their creative downtime.
  travel: Kenny Augustine plans trips with meticulous spreadsheets, preferring structured weekend getaways to destinations such as Asheville’s Blue Ridge Mountains for hiking, a weekend road trip to New
    York City to catch a Broadway show, and a summer study abroad stint in Barcelona, balancing budget constraints with a desire for cultural immersion.
  culinary: Kenny Augustine enjoys preparing quick, health‑focused meals like grilled chicken stir‑fry with broccoli and quinoa, avocado toast topped with poached eggs, and protein‑packed smoothies containing
    spinach, banana, and almond butter, while occasionally indulging in pepperoni pizza and energy drinks during late‑night study sessions.
  core: Kenny Augustine is an 18‑year‑old ultra‑organized, socially energized go‑getter whose drive for structure fuels both ambition and anxiety‑induced impulsive splurges, making them a disciplined yet
    occasionally over‑extended multitasker.
background:
  cultural: Kenny was raised in a multigenerational African‑American family in Newark. His grandparents moved north during the Great Migration, and his parents emphasized the importance of education, community
    solidarity, and cultural heritage. He grew up attending a vibrant Baptist church where gospel music and communal service were central. Family gatherings feature traditional soul food dishes such as
    collard greens, cornbread, and sweet potato pie, and celebrations often include Kwanzaa and Juneteenth traditions. The cultural fabric of Newark, with its rich history of civil rights activism and artistic
    expression, has shaped Kenny's values of resilience, collective uplift, and civic engagement.
