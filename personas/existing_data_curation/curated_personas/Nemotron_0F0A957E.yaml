  hobbies: '[''Improv Comedy'', ''Intramural Basketball'', ''Hiking'', ''Creative Writing'', ''Volunteering at Community Shelters'', ''Reading Literary Fiction'', ''Playing Guitar'', ''Board Game Nights'',
    ''Cooking Experiments'', ''Meditation and Yoga'']'
  career_goals: Matthew aims to translate his love of people and humanities into a career in community outreach or non‑profit program coordination. He wants to secure an entry‑level role where he can design
    and run mental‑health awareness workshops for young adults, build partnerships with local schools, and develop grant proposals to fund such initiatives. Over the next five years, he envisions advancing
    to a program director position, possibly after completing a master's degree in Social Work or Public Administration, and eventually leading a regional effort to improve youth mental health services
    in the Greater Philadelphia area.
