  hobbies: '[''Cycling along the Ohio River Trail'', ''Woodworking and furniture making'', ''Arduino and electronics tinkering'', ''Reading classic science‑fiction'', ''Live jazz performances'', ''Volunteer
    STEM outreach for high‑school students'', ''Community gardening'']'
  career_goals: At this stage in his career, Joe aims to broaden his impact beyond the department by establishing a university‑wide Center for Sustainable Engineering that partners with local industry and
    community organizations. He envisions mentoring a new generation of interdisciplinary researchers, publishing a widely adopted textbook on applied mechanics, and eventually serving as department chair
    to shape policies that foster inclusive, practice‑oriented education. Additionally, he hopes to secure larger research grants that enable student‑led projects addressing regional environmental challenges,
    reinforcing his commitment to both academic excellence and community service.
