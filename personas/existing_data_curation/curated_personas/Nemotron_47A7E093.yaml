personas:
  professional: Dana Menne, an aspiring art educator, blends their experience as a rural high‑school teaching assistant with a love of watercolor and digital illustration, using their organized yet flexible
    approach to craft lesson plans that weave Appalachian folk stories and modern art concepts into the classroom.
  sports: Dana Menne, an avid hiker and occasional runner, spends weekends tackling the Red River Gorge trails with the local Appalachian Trail Club and joins a yoga class at a community studio, while cheering
    on the Kentucky Wildcats basketball team and the Louisville Cardinals women's soccer squad.
  arts: Dana Menne, who paints watercolors of Appalachian hills and sketches digital illustrations of local folklore, finds inspiration in the works of Georgia O’Keeffe and the folk sounds of Bill Monroe,
    frequently attends bluegrass concerts featuring Alison Krauss, and participates in a book club that discusses contemporary fiction by authors like Margaret Atwood and art history texts on Impressionism.
  travel: Dana Menne, a budget‑conscious adventurer, plans road‑trip weekends to Shenandoah National Park and Asheville’s Blue Ridge Mountains, dreams of attending the Santa Fe Indian Market, and keeps
    a wish list that includes the Van Gogh Museum in Amsterdam, all while favoring campgrounds and staying with friends rather than pricey hotels.
  culinary: Dana Menne, a modest home‑cook with a penchant for Southern comfort, often whips up fried chicken, cornbread, and peach cobbler seasoned with a pinch of cinnamon, while also experimenting with
    homemade ramen broth and sushi rolls featuring cucumber and avocado, and they regularly source fresh herbs like basil and mint from a nearby community garden.
  core: Dana Menne fuses Appalachian storytelling with contemporary art, navigates life through quiet creativity and meticulous budgeting, yet occasionally succumbs to impulsive sketch‑shopping sprees,
    never starts the day without a strong coffee and a bluegrass playlist.
background:
  cultural: Dana grew up in Corbin, Kentucky, a small city nestled in the Appalachian foothills of Laurel County. Her family’s white, southern‑Baptist roots emphasize self‑reliance, close‑knit community
    ties, and a deep appreciation for local traditions such as folk music, storytelling, and seasonal festivals like the Laurel County Fair. While she values these heritage customs, her curiosity and openness
    expose her to broader artistic and intellectual influences through online courses, museum visits in Lexington, and interactions with diverse peers. This blend of rural Appalachian culture and contemporary
    art sensibility shapes her worldview, balancing respect for tradition with a desire for innovative expression.
attributes:
  skills: '[''Classroom Management'', ''Lesson Material Preparation'', ''Educational Technology (Google Classroom, Zoom)'', ''Student Tutoring'', ''Artistic Illustration'', ''Graphic Design Basics (Canva)'',
