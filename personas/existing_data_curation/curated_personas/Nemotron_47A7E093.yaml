  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Hiking'', ''Nature Photography'', ''Reading (philosophy, contemporary fiction, art history)'', ''Small‑group Book Club'', ''Folk/Bluegrass Music Appreciation'',
    ''Knitting'', ''Digital Illustration (Canva, Procreate)'']'
  career_goals: She aims to earn a bachelor’s degree in elementary or secondary education within the next three years, obtain state teaching certification, and transition from a teaching assistant to a
    full‑time classroom teacher. Long‑term, she hopes to specialize in art education, develop an after‑school arts program for under‑served students, and eventually move into curriculum design or educational
    leadership where she can champion interdisciplinary, creativity‑driven teaching methods. She also envisions pursuing professional development in integrating technology and experiential learning.
