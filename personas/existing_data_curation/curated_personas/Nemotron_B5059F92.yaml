personas:
  professional: Ehsan Arguello leverages their deep expertise in construction cost estimation—proficient in ProEst, Sage Estimating, advanced Excel VBA, Python, and R—to deliver precise budgets while integrating
    BIM and AI-driven analytics, balancing a curiosity for new technologies with a practical, data‑driven approach that keeps stakeholder reporting clear and negotiations assertive.
  sports: Ehsan Arguello competes in a Tampa Beach Soccer League, dominates beach volleyball tournaments at Clearwater Beach, holds season tickets for the Tampa Bay Lightning, jogs with the local Tampa
    Running Club, and paddles with the Tampa Bay Paddle Club on weekends, embodying their energetic, sociable, and organized fitness routine.
  arts: Ehsan Arguello frequents live music shows at the Orpheum Theatre, cheering to Foo Fighters and enjoying local jazz ensembles, while also attending the annual Gasparilla Festival and theatrical productions
    with the Straz Center, channeling their outgoing nature into cultural immersion.
  travel: Ehsan Arguello prefers short, adventure‑filled getaways to destinations like Key West, New Orleans, Barcelona, and Tokyo, planning trips with spreadsheet precision yet leaving room for spontaneous
    detours, balancing wanderlust with the practicalities of a stable home base.
  culinary: Ehsan Arguello is an enthusiastic grill master who experiments with shrimp tacos, Korean bulgogi, and harissa‑spiced lamb chops, often sourcing fresh fish from Tampa Bay markets and using a
    pellet smoker and wood chips to achieve smoky perfection, reflecting their curiosity‑driven culinary exploration.
  core: Ehsan Arguello is a data‑savvy cost estimator who blends a love for beach volleyball, live concerts, and experimental grilling with disciplined finances and occasional health procrastination, all
    driven by a balanced curiosity and practical outlook.
background:
  cultural: Ehsan grew up in a multicultural family that blends Anglo‑American traditions with Hispanic influences, reflected in his surname Arguello. Raised in Florida, he was immersed in the diverse cultural
    tapestry of the Gulf Coast, experiencing Southern hospitality, Latin music, and vibrant community festivals. While primarily English‑speaking, he has conversational Spanish skills that he uses to connect
    with the multicultural population of Tampa. He celebrates mainstream American holidays and occasionally participates in Hispanic celebrations such as Día de los Muertos and Cinco de Mayo with his family.
    This blend of cultural experiences shapes his inclusive outlook, appreciation for community engagement, and openness to diverse perspectives.
