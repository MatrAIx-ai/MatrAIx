  career_goals: Ehsan aims to progress to a senior cost estimator position within the next three years, taking responsibility for large commercial and infrastructure projects. He plans to earn the Certified
    Cost Professional (CCP) credential from AACE International to solidify his technical expertise. Long‑term, he aspires to become a cost estimating manager, leading a multidisciplinary team and championing
    data‑driven cost strategies across the organization. He also seeks to contribute to industry knowledge by publishing articles and speaking at regional construction conferences. Ultimately, Ehsan envisions
    launching his own boutique cost consulting firm that combines AI‑enhanced analytics with personalized client service.
