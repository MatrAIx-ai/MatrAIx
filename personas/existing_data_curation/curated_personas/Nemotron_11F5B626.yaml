    contexts'', ''Attention to detail and observational acuity'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending theater and film performances'', ''Reading art history and contemporary literature'', ''Street photography'', ''Collecting vintage prints
    and postcards'', ''Hiking in Harriman State Park'', ''Yoga and pilates'', ''Cooking and exploring international cuisines'', ''Board games and escape rooms'', ''Volunteering with community art workshops'']'
  career_goals: Elizabeth aims to advance to a supervisory role within security, eventually becoming a surveillance manager for a major casino or a security director for a museum or cultural institution
    where she can blend her security expertise with her passion for art. She intends to earn the Certified Protection Professional (CPP) credential and pursue a master's degree in Security Management or
    Museum Studies. Long‑term, she hopes to mentor junior officers, develop training programs that incorporate cultural sensitivity, and perhaps consult on risk mitigation for art exhibitions and high‑value
    collections. Financial stability and the ability to dedicate more time to personal artistic pursuits are also central to her ambitions.
