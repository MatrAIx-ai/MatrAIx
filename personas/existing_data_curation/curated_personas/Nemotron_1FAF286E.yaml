personas:
  professional: Timothy Flaherty, a 29‑year‑old graphic designer in Albany, blends pixel‑perfect print work with dynamic motion graphics, leveraging Adobe Creative Cloud mastery and UI/UX fluency while
    steering projects with an iterative, curiosity‑driven mindset and a cooperative yet assertive style that keeps team energy high despite occasional disorganization.
  sports: Timothy Flaherty, an avid member of the Capital City Hoops intramural basketball league, follows the New York Knicks and Buffalo Bills each season, joins the Adirondack Trail Runners for early‑morning
    trail runs, and balances competitive play with weekend hikes in the Adirondack foothills to stay fit and socially engaged.
  arts: Timothy Flaherty channels creative energy into acoustic guitar sets at Albany’s Lark Tavern, covering indie folk tunes from The National and Bon Iver, while regularly visiting the Albany Center
    for the Arts to admire works by Alex Katz and Shepard Fairey, and they savor indie‑film nights featuring performances by Frances McDormand and Joaquin Phoenix.
  travel: Timothy Flaherty prefers spontaneous weekend getaways—like a budget‑friendly road trip to Montreal’s Old Port and a quick hike in the Adirondack foothills—while dreaming of a longer excursion
    to Japan’s cherry‑blossom season for landscape photography, balancing a modest travel fund with occasional splurges when work permits.
  culinary: Timothy Flaherty, an intermediate home chef, delights in crafting Thai green curry with fresh lemongrass, Ethiopian injera spiced with berbere, and hand‑rolled Japanese ramen using miso paste,
    often sourcing seasonal produce from the Albany farmers’ market and pairing meals with curated playlists at their kitchen island.
  core: Timothy Flaherty blends restless curiosity with laid‑back practicality, juggling late‑night design brainstorms, spontaneous basketball games, and a habit of misplacing their sketchbook until the
    final minute before a deadline.
background:
  cultural: Timothy comes from an Irish‑American family rooted in upstate New York. His grandparents emigrated from Dublin in the 1950s, and he was raised in a modest, Catholic household that emphasized
    community, storytelling, and traditional celebrations such as St. Patrick’s Day. Growing up in Schenectady, he was exposed to a mix of industrial heritage and a growing arts scene, which fostered his
    appreciation for both classic craftsmanship and contemporary design trends. He maintains ties to his heritage through participation in a local Irish cultural society and by incorporating subtle Celtic
    motifs into some of his personal design projects.
