  hobbies: '[''Playing acoustic guitar'', ''Intramural basketball'', ''Hiking in the Adirondacks'', ''Photography'', ''Cooking experimental recipes'', ''Board game nights'', ''Visiting art galleries'',
    ''Volunteering at youth art workshops'']'
  career_goals: Timothy aims to advance from his current role as a graphic designer to a senior design position within the next three years, eventually stepping into an art director or creative director
    role. He plans to deepen his expertise in motion design and UI/UX by completing a bachelor’s degree in graphic design and pursuing certification in interaction design, while keeping a flexible schedule
    that lets him stay present for his family. Timothy also envisions establishing a boutique creative studio in the Albany region that blends his curiosity for emerging visual technologies—such as augmented
    reality experiences—with practical branding solutions for local businesses. He values a work environment that encourages collaborative team culture, allowing him to mentor junior designers and foster
    a community of creative experimentation without sacrificing project deliverables.
