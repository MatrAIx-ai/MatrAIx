personas:
  professional: Angel Flores, a seasoned community health program director in Waco, leverages their analytical STEM background and bilingual fluency to design data‑driven services, meticulously manage multi‑million‑dollar
    budgets, and ensure regulatory compliance, all while thriving in solitary, structured work environments that satisfy their disciplined, achievement‑oriented nature.
  sports: Angel Flores enjoys solitary morning walks along the Brazos River Trail as primary exercise, participates in a local senior walking club, follows the Baylor Bears football team and the Texas Rangers
    baseball club with fervor, and joins a community over‑50 softball league each spring for friendly competition.
  arts: Angel Flores captures everyday Waco moments in black‑and‑white photographs inspired by Ansel Adams, spends evenings crocheting intricate blankets while listening to Bach’s cello suites, and regularly
    attends Baylor’s classical concert series featuring Yo‑Yo Ma.
  travel: Angel Flores prefers methodical travel planning, having explored historic Guanajuato and the artful streets of San Miguel de Allende, beloved road trips to Austin and New Orleans, and now dreams
    of a tranquil retreat in Oaxaca, balancing limited retirement savings with a desire for culturally immersive experiences.
  culinary: Angel Flores proudly cooks traditional dishes such as mole poblano, pozole, and chiles en nogada using fresh vegetables from their garden, expertly blending spices like cumin, ancho chiles,
    and fresh cilantro, while also experimenting with Tex‑Mex fusion tacos that feature locally sourced beef and jalapeños.
  core: Angel Flores blends disciplined analytical leadership with quiet, reflective hobbies, channeling their love of community health into structured programs while indulging in solitary walks, black‑and‑white
    photography, and occasional crochet splurges.
background:
  cultural: Angel was raised in a Mexican‑American household that values familismo, respect for elders, and strong community ties. Bilingual and Catholic, she celebrates traditions such as Día de los Muertos
    and enjoys sharing Mexican culinary heritage. Her cultural identity informs her professional ethos, emphasizing collective well‑being and culturally responsive service. Living in Waco, she blends her
    Mexican roots with Texan influences, fostering connections across both communities and leveraging her background to advocate for underserved populations.
attributes:
  skills: '[''Program Development'', ''Strategic Planning'', ''Data Analysis (R, SPSS)'', ''Grant Writing'', ''Budget Management'', ''Performance Evaluation'', ''Stakeholder Engagement'', ''Policy Analysis'',
    ''Crisis Intervention'', ''Staff Supervision'', ''Bilingual Communication (Spanish/English)'', ''Community Needs Assessment'', ''Quality Assurance'', ''Process Optimization'', ''Volunteer Coordination'']'
  hobbies: '[''Reading (historical biographies, public health)'', ''Gardening'', ''Crochet'', ''Nature walks'', ''Cooking Mexican cuisine'', ''Black‑and‑white photography'', ''Classical music listening'',
    ''Puzzle solving'', ''Journaling'']'
  career_goals: Angel aims to expand evidence‑based health and social programs throughout McLennan County, securing multi‑year grant funding to ensure long‑term sustainability. She seeks to mentor emerging
    community service professionals, establishing a structured succession plan for her department. Ultimately, she envisions creating a legacy institute focused on culturally responsive service delivery
    for older Mexican‑American adults, cementing her impact while transitioning to a phased retirement.
