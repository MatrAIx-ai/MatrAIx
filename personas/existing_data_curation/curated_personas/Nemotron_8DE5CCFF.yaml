  career_goals: Irene dreams of turning her imagination into a career where art and ideas intersect. She aspires to become a concept artist or illustrator for video games, animation, or graphic novels,
    and she also entertains the idea of merging technology and creativity as a creative technologist. While she is open to exploring different pathways, she hopes to attend a specialized high school or
    summer program that nurtures artistic talent and experimental design, eventually studying visual arts or digital media at the college level.
