persona_description: A mathematician who specializes in the study of spherical geometry, particularly the concepts and theorems related to the area of the spherical triangle and its applications in astronomy
  and geography. His research interests include, but are not limited to, the study of the equatorial circumference of the Earth, the equatorial radius of the Earth, and the distance to the moon and its
  size. He is particularly interested in the work of Erastothenes and Aristarchus, and the use of their findings in understanding the properties of the Earth and the universe.
