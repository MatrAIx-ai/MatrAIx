  career_goals: Carol aspires to turn her love for art and storytelling into a career that allows her to explore new ideas and unconventional concepts. She aims to attend a reputable art school or a liberal
    arts college where she can study illustration, graphic design, or visual storytelling. Ultimately, she hopes to work as a concept artist for video games or as a freelance illustrator for independent
    publishing houses, combining her creative vision with technical skills. She also envisions using her art to raise awareness about environmental and community issues in Colorado, perhaps through mural
    projects or collaborative exhibitions. While she values flexibility, she wants a career that lets her balance independent work with occasional collaborative teams, ensuring she can stay true to her
    artistic curiosity.
