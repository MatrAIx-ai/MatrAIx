personas:
  professional: Carol Harper is an aspiring visual artist whose primary skills in sketching, watercolor, and digital illustration blend with a curiosity‑driven approach, allowing them to experiment freely
    while often leaving their studio messy due to a relaxed attitude toward organization.
  sports: Carol Harper enjoys casual mountain hiking in the foothills, participates in the high school cross‑country team during the fall, follows the Denver Broncos and Colorado Avalanche with enthusiasm,
    and belongs to a local teen outdoor club that meets on weekends for trail runs.
  arts: Carol Harper immerses themselves in indie and ambient soundscapes from artists like Bon Iver, Sufjan Stevens, and Sigur Rós while creating watercolor studies of wildflowers, admires illustrators
    such as James Gurney and Loish for their vibrant palettes, and regularly attends community center workshops where they exchange ideas with fellow young artists.
  travel: Carol Harper prefers spontaneous day trips to nearby peaks like Rocky Mountain National Park and weekend stays in Aspen, but they daydream about a future study abroad in Kyoto to capture cherry‑blossom
    gardens and an adventurous trek through Iceland’s volcanic landscapes, balancing limited family funds with a love for low‑key exploration.
  culinary: Carol Harper is a beginner cook who loves whipping up avocado toast with lemon zest, making strawberry shortcake with fresh berries from the local farmers market, and preparing trail‑ready granola
    bars using oats, honey, and dried cranberries, though they often snack on instant ramen when homework piles up.
  core: Carol Harper channels their love of nature and indie art into sketchbooks and playlists, juggling a scatter‑shot schedule and a pocketful of curiosity while occasionally forgetting chores and meals.
background:
  cultural: Carol grew up in Brighton, a suburban community in Adams County on Colorado’s Front Range. Her family is of European descent, reflecting a predominantly white demographic typical of the area.
    The town’s blend of prairie farmland and easy access to the Rockies instilled in her an appreciation for outdoor recreation, while the local school’s arts program and community events, such as the annual
    Cherry Blossom Festival, nurtured her artistic interests. The close‑knit nature of a small town encourages community involvement, which is evident in her volunteer activities at the library. At home,
    she experienced a generally middle‑class upbringing with values emphasizing independence, self‑reliance, and openness to new ideas—a cultural backdrop that aligns with the broader Western Colorado ethos
    of curiosity and flexibility.
