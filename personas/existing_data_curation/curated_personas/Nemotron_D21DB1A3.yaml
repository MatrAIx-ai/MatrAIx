  hobbies: '[''Karaoke'', ''Cooking Vietnamese Cuisine'', ''Watching Soccer'', ''Park Walks'', ''Cultural Festivals'', ''Volunteering at Senior Center'', ''Herb Gardening'']'
  career_goals: Phan aims to secure a promotion to shift supervisor or assistant manager within the next two years, leveraging his reliability and organizational strengths. He wants to mentor younger staff,
    streamline operational processes, and eventually transition to a part‑time advisory role that offers more personal time. He also plans to save for a modest retirement and explore the possibility of
    opening a small family‑run food stall featuring traditional Vietnamese dishes.
