personas:
  professional: Phan Duong, a seasoned fast‑food operations specialist with decades of expertise in cash handling, POS mastery, and strict food‑safety compliance, leverages a methodical, routine‑driven
    mindset and bilingual communication (English and their heritage language) to keep shift workflows smooth, mentor younger crew members, and pursue a shift‑supervisor promotion within the next two years.
  sports: Phan Duong is an avid soccer fan who never misses matches featuring clubs from their birth country and supports the local MLS team, enjoys weekly walks in Hermann Park with a senior walking club,
    and occasionally tunes into Houston Dynamo games on television.
  arts: Phan Duong finds joy in weekly karaoke gatherings where they belt out classic ballads by beloved singers from their youth, eagerly celebrates Tet with traditional performances and lantern displays,
    regularly attends cultural festivals showcasing folk dance and music, and keeps a modest collection of vinyl records from the golden era of their upbringing.
  travel: Phan Duong prefers low‑key travel that blends nostalgia with relaxation, having revisited the capital city of their birth country for family reunions, explored nearby Gulf Coast beaches for fresh
    seafood, and planning a future road trip along the Pacific Northwest’s scenic coastline.
  culinary: Phan Duong delights in preparing authentic home‑style dishes such as pho broth, rice‑paper spring rolls, and caramelized pork with lemongrass, often using fresh basil, cilantro, and mint from
    their herb garden, while occasionally experimenting with a modern twist like adding locally sourced smoked brisket.
  core: Phan Duong, a pragmatic yet sociable 69‑year‑old, balances meticulous work routines with lively karaoke, cautious finances, and a steadfast love for traditional flavors, though they occasionally
    hoard receipts and forget to stretch before walks.
background:
  cultural: Phan was born in Vietnam and emigrated to the United States in the early 1990s, settling in Houston's vibrant Vietnamese community. He maintains strong cultural ties by speaking Vietnamese at
    home, celebrating Tet and other traditional holidays, and preserving family recipes. His cultural values emphasize family loyalty, respect for elders, and a practical, routine‑oriented approach to daily
    life, which align closely with his personality.
attributes:
  skills: '[''Cash Register Operation'', ''Point‑of‑Sale (POS) System Management'', ''Food Safety and Hygiene Compliance'', ''Inventory Management'', ''Team Training and Supervision'', ''Bilingual Customer
