  hobbies: '[''Tea ceremony'', ''Traditional cooking (Japanese and Korean)'', ''Gardening (flowers and herbs)'', ''Birdwatching'', ''Walking group'', ''Knitting for charity'', ''Reading haiku and Korean
    poetry'', ''Storytelling at community center'', ''Singing in multicultural choir'']'
  career_goals: Even in her ninth decade, Sachiko aims to remain an active contributor to her neighborhood. She plans to continue mentoring younger volunteers, lead language‑and‑culture workshops, and help
    organize multicultural festivals that foster harmony. She is determined to preserve her East Asian heritage by sharing traditional recipes and stories, while also maintaining her health through daily
    walks and social engagement. Additionally, she wishes to document her life lessons in a memoir for her descendants and the wider community.
