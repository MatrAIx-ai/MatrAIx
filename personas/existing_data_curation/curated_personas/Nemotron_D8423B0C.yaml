  hobbies: '["drawing", "listening to music", "building with blocks", "exploring nature", "watching animated shows", "pretend play with small group of friends", "attending library storytime"]'
  career_goals: Antonio often talks about growing up to be an artist, saying he wants to paint big pictures that make people smile. He also dreams of exploring space like an astronaut because he loves learning
    how things work. Occasionally he mentions wanting to be a teacher so he can tell stories to a small group of kids, reflecting his comfort with intimate settings. His aspirations are shaped by his love
    of art, curiosity about the world, and desire to have the freedom to explore ideas without strict rules.
