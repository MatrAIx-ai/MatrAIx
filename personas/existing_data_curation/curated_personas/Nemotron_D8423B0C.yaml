personas:
  professional: Antonio Bouie, an imaginative five‑year‑old junior builder who loves assembling LEGO sets and cardboard forts, showcases early spatial reasoning and storytelling skills while embracing a
    carefree, disorganized play style that values flexibility over tidy clean‑up.
  sports: Antonio Bouie, a spirited five‑year‑old, dabbles in beginner soccer with the Little Lions Soccer Club and enjoys splash‑time swimming lessons, while cheering on the Los Angeles Dodgers whenever
    they catch a game on TV.
  arts: Antonio Bouie, an enthusiastic little art lover, spends afternoons drawing whimsical animals inspired by Eric Carle’s vivid illustrations and dancing to catchy tunes by Raffi, while eagerly watching
    the animated adventures of Pixar’s Toy Story and humming its songs.
  travel: Antonio Bouie loves family road trips to the nearby zoo and beach, is thrilled by the magic of Disneyland, and daydreams about exploring the towering cliffs of the Grand Canyon, preferring short,
    sensory‑rich excursions over long, unstructured journeys.
  culinary: Antonio Bouie delights in creamy mac and cheese, crunchy chicken nuggets, and sweet strawberry slices, proudly helps stir batter for pancakes with flour and eggs, and often requests extra cheese
    on pizza, reflecting a simple yet enthusiastic palate.
  core: Antonio Bouie, a curious five‑year‑old with an unquenchable love for LEGO, sticky‑sweet snacks, and spontaneous art scribbles, balances a playful confidence with occasional forgetfulness about bedtime.
background:
  cultural: Antonio comes from an African‑American family that deeply values oral storytelling, music, and community bonds. Living in Pinehurst, North Carolina, his family participates in church gatherings
    where gospel and jazz are a regular part of life, and they often share soul‑food meals during family reunions. The local Black neighborhood celebrates cultural heritage through festivals, community
    art projects, and intergenerational sharing of family histories. These traditions nurture Antonio’s appreciation for rhythm, color, and narrative, influencing his artistic interests and his respectful
    yet curious demeanor.
