personas:
  professional: Maria Martinez is a budding preschool problem‑solver who eagerly sorts crayons and puzzle pieces, applying her natural curiosity and practical mindset to learn new concepts while also relying
    on familiar routines, and she often leads group play with energetic sociability yet a hint of competitive skepticism.
  sports: Maria Martinez loves kicking a soft foam soccer ball in the backyard, attends weekend toddlers' tumble‑time gymnastics classes, and passionately cheers for the Denver Broncos during family game
    nights, displaying energetic enthusiasm tempered by a competitive edge.
  arts: Maria Martinez delights in finger‑painting to the lively tunes of Disney’s ‘Let It Go’ and traditional family folk songs, mimics the rhythmic clapping of her grandparents’ lullabies, and proudly
    collects picture books featuring characters like Sesame Street’s Elmo and Dora the Explorer.
  travel: Maria Martinez enjoys short family road trips to the Rocky Mountains for picnics, relishes the splash pads at the local Denver aquarium, and dreams of the magical adventure of visiting Disneyland
    Resort in California, balancing her love for familiar family outings with an emerging curiosity about far‑away wonderlands.
  culinary: Maria Martinez savors the warm aroma of tamales wrapped in corn husks and the hearty broth of pozole, loves spreading queso fresco on warm tortillas, and proudly helps stir batter for chocolate
    chip pancakes, yet she often refuses to eat green beans, preferring sweet fruit like sliced mango.
  core: Maria Martinez is a lively, curious three‑year‑old who blends organized play with spontaneous imagination, competes fiercely in sandbox games, insists on hearing stories in both Spanish and English
    before bedtime, and occasionally throws a tantrum when denied a cookie.
background:
  cultural: Maria grows up in a Mexican‑American household in Denver, where Spanish is spoken daily alongside English. Her family celebrates traditional holidays such as Día de los Muertos, Cinco de Mayo,
    and Christmas with Mexican customs, including festive foods like tamales and pozole, music, and vibrant decorations. Grandparents share cultural stories and teach her simple Spanish songs, while her
    parents emphasize the importance of family gatherings and community involvement. This bilingual, bicultural environment shapes her language development, culinary interests, and participation in cultural
    crafts and celebrations.
attributes:
  skills: '["Fine‑motor coordination", "Basic drawing and coloring", "Simple puzzle assembly", "Bilingual vocabulary (English & Spanish)", "Counting to ten", "Color and object naming", "Following routines",
    "Tidying up toys", "Basic problem‑solving with blocks", "Imitating simple chores"]'
  hobbies: '["Dancing to music (Mariachi & pop)", "Singing nursery rhymes (English & Spanish)", "Playing hide‑and‑seek and other group games", "Building towers with blocks", "Painting with bright colors",
    "Exploring parks and playgrounds", "Helping with simple cooking tasks", "Crafting papel picado for festivals", "Attending storytime at the library", "Imitating roles (teacher, veterinarian)"]'
  career_goals: Even at three, Maria loves to imagine future roles. She frequently says she wants to be a teacher who reads stories to younger children, a veterinarian who cares for neighborhood pets, and
    a dancer who performs at family celebrations. She also shows excitement about helping in the kitchen like her mother, preparing simple Mexican dishes. These ambitions blend her desire to help others,
    her love for active, competitive play, and her practical, hands‑on curiosity.
