  hobbies: '["Pottery classes", "Watercolor painting circles", "Senior center bingo and card games", "Gardening (herbs & vegetables)", "Visiting Monterey Bay Aquarium and art galleries", "Cooking and experimenting
    with fusion recipes", "Attending cultural festivals (Lunar New Year, Día de los Muertos)", "Tai Chi practice", "Listening to classical Chinese music", "Storytelling podcasts"]'
  career_goals: Although retired, Liping remains driven to make a lasting contribution. She aims to preserve her cultural heritage by documenting family recipes and oral histories for future generations,
    possibly publishing a small memoir. She aspires to continue leading arts and cooking classes at the senior center, fostering intergenerational exchange. Liping hopes to become a cultural liaison between
    the Chinese-American community and the broader Salinas population, organizing joint festivals and language exchange events. On a personal level, she seeks to maintain her physical health through regular
    walks along Monterey Bay and gentle Tai Chi, and to manage her anxiety through mindfulness practices and supportive social networks. Ultimately, she wishes to leave a legacy of connection, creativity,
    and cultural pride.
