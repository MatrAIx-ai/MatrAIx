    in insurance law'', ''AI tools for underwriting (basic)'']'
  hobbies: '[''Sketching'', ''Art gallery visits'', ''Art history reading'', ''Indie film reviews'', ''Puzzle solving (crossword, Sudoku, chess)'', ''Nature hiking'', ''Nature photography'', ''Small-group
    studio workshops'', ''Board-game nights'', ''Personal journaling'', ''Poetry writing'']'
  career_goals: Alda aims to advance from her clerk position to a senior claims adjuster or supervisory role within the next five years. She plans to earn the Chartered Property-Casualty Underwriter (CPCU)
    designation and deepen her knowledge of insurance law and fraud detection. Ultimately, she hopes to transition into a risk-management or underwriting position that leverages her analytical strengths
    while offering more strategic impact. In parallel, she aspires to develop a modest side venture curating and selling locally inspired artwork, merging her professional discipline with her artistic passion.
