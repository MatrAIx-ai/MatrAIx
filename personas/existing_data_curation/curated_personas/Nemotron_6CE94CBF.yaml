personas:
  professional: Jessica Hayes is an aspiring young visual storyteller who blends hand‑drawn cartoons with digital art experiments in Scratch, channeling their curiosity into vibrant, whimsical narratives
    while often battling the lack of structured deadlines that school projects demand.
  sports: Jessica Hayes enjoys Saturday morning bike rides on the Trailhead Loop and is a member of the Chandler Cubs youth soccer team, cheering on the Arizona Diamondbacks and occasionally practicing
    basic rock‑climbing moves at the local gym to stay active.
  arts: Jessica Hayes devotes evenings to sketching characters inspired by indie animators like Rebecca Sugar and listening to lo‑fi tracks from Clairo while practicing simple piano pieces such as “Für
    Elise” in C‑major, and they regularly attend the library’s art‑making workshops where they experiment with watercolor washes.
  travel: Jessica Hayes loves weekend family trips to the Grand Canyon’s South Rim and summer outings to Sedona’s red‑rock trails, dreaming of a future school exchange in Tokyo to explore anime studios,
    yet they prefer short, well‑planned journeys over long, unstructured vacations.
  culinary: Jessica Hayes delights in crafting rainbow fruit kebabs with strawberries, pineapple, and grapes, whipping up quick avocado toast with lemon zest, and occasionally helping their mom bake cheesy
    quesadillas topped with cilantro, though they often forget to brush their teeth after sugary smoothies.
  core: Jessica Hayes is a curious, solitary ten‑year‑old who transforms desert bugs into cartoon heroes, hoards stickers and art supplies, saves pennies for LEGO sets, and swings between meticulous sketching
    and carefree, spontaneous doodles.
background:
  cultural: Jessica comes from a White, middle-class American family in Chandler, Arizona. Her upbringing blends typical suburban values with the desert Southwest’s outdoor culture. Family outings to local
    museums, the Arizona Science Center, and community art festivals have exposed her to a mix of American and regional artistic influences, including Native American and Mexican border art that she finds
    fascinating. The multicultural environment of the Phoenix metro area has cultivated an openness to diverse ideas while her household places emphasis on curiosity, self-directed learning, and modest
    independence.
