  career_goals: Jessica dreams of turning her love of art and technology into a career as a multimedia creator, such as an interactive artist or game designer. She hopes to study visual arts and computer
    science, eventually producing projects that combine storytelling, illustration, and simple coding. She also imagines traveling to museums and natural sites to inspire her work, and possibly becoming
    a community art mentor for younger kids.
