personas:
  professional: Mark Hebron, a 62‑year‑old seasoned agronomist and machinery specialist, blends decades of hands‑on farm work with GPS‑guided precision tools, loosely schedules his emerging consulting gigs,
    and pursues a regenerative transition on his own acreage while mentoring younger growers.
  sports: Mark Hebron, an avid weekend angler on the Iowa River and occasional elk hunter, cheers on the Iowa Hawkeyes football team and the Des Moines Cubs baseball club, participates in local recreational
    softball leagues, and leads a barn‑dance crew that doubles as a low‑impact fitness group.
  arts: Mark Hebron, the harmonica‑playing member of his church’s music ministry, enjoys listening to Johnny Cash, Alison Krauss, and Bob Dylan, attends the Iowa Barn Theatre’s seasonal productions, and
    collects vintage country vinyls that echo his love for storytelling through song.
  travel: Mark Hebron prefers road‑tripping in his restored 1955 Chevrolet pickup to nearby state fairs, fishing spots, and hunting excursions, has toured the Iowa State Fair and taken a hunting trip to
    Montana, and dreams of a sustainable‑farm tour of New Zealand’s vineyards when time and finances allow.
  culinary: Mark Hebron, a home‑brew enthusiast, favors a hoppy American IPA brewed with Cascade hops and corn sugar, regularly cooks hearty Midwest staples like pork ribs, cornbread, and fresh garden salads,
    and enjoys pairing his meals with locally produced apple cider.
  core: Mark Hebron, a 62‑year‑old farm‑savvy harmonica player, blends drone‑assisted cropping with barn‑dance choreography, loves fishing and home‑brewing, but often misplaces paperwork and forgets to
    lock the barn door.
background:
  cultural: Mark was born and raised on a family farm near Osceola, Iowa, in a community with strong Midwestern roots and a heritage largely of German and Scandinavian ancestry. He grew up attending a United
    Methodist church, where values of humility, neighborliness, and service were emphasized. The local culture prizes hard work, self‑reliance, and collaborative spirit—principles that shaped Mark's cooperative
    and considerate nature. Although his upbringing reflects the traditional white, rural Iowa experience, he remains open to new ideas, especially those that support sustainable stewardship of the land
    and community well‑being.
attributes:
  skills: '[''farm equipment operation'', ''basic tractor and combine repair'', ''livestock handling and health monitoring'', ''crop planting, irrigation, and harvesting'', ''soil health assessment'', ''precision
    agriculture technology adoption (GPS guidance, drone scouting)'', ''farm safety training'', ''community agricultural mentorship'']'
  hobbies: '[''community barn‑dance evenings'', ''fishing on the Iowa River'', ''hunting trips with friends'', ''volunteering at 4‑H fair and youth livestock shows'', ''restoring a vintage pickup truck'',
    ''home‑brewing'', ''reading about agricultural technology and history'', ''playing harmonica in church band'']'
  career_goals: As he approaches retirement, Mark aims to transition from full‑time field work to a part‑time consulting role, offering mentorship to emerging farmers in Clarke County and sharing his blended
    knowledge of old‑school and new‑school practices. He wishes to implement regenerative farming techniques on his own acreage, such as cover cropping and reduced tillage, to improve soil health and showcase
    sustainable options for his peers. Mark hopes to secure a smooth generational hand‑off of the family farm to his children, ensuring they have both the practical skills and the openness to innovation
    he values. He also aspires to serve on the local extension advisory board, influencing regional agricultural policy and fostering community‑based projects like a small CSA program that connects neighbors
    to fresh, locally grown produce.
