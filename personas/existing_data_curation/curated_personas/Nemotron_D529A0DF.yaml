  hobbies: '["Line dancing", "Salsa dancing", "Group fitness classes (Zumba, spin)", "Cooking Tex-Mex cuisine", "Attending live music events", "Volunteer work at food banks", "Book club (personal development
    & fiction)", "Hiking local trails", "Gardening", "Podcast listening (leadership & technology)"]'
  career_goals: Cynthia aims to advance to senior HR leadership—such as Director of HR or Vice President of People—within the next five years, focusing on building a data‑driven, inclusive culture at a
    mid‑size technology firm in Dallas. She plans to earn the SHRM‑SCP credential, lead company‑wide transformation projects that integrate emerging HR technologies, and mentor emerging HR talent, especially
    those coming from non‑traditional educational backgrounds. On a personal level, she envisions purchasing a family home in a Dallas suburb and eventually launching an independent HR consulting practice
    to help small businesses foster healthy workplace environments.
