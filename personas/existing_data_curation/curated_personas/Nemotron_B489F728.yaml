personas:
  professional: Michelle Cristobal, a senior aerospace engineer specializing in aerodynamic and structural design for launch vehicles, leverages her CFD and finite‑element expertise together with a vivid
    artistic imagination to craft compelling visual presentations that translate complex technical data into accessible narratives, while leading multidisciplinary teams with an organized, methodical approach
    and a strong commitment to mentoring women and underrepresented talent.
  sports: Michelle Cristobal stays fit by combining weekend hikes in the Everglades with weekly salsa dancing at a downtown studio, supports the Miami Heat and Orlando Magic with enthusiastic game‑day viewings,
    and participates in a local running club that trains for the Florida Half Marathon each spring, reflecting an energetic and socially driven approach to sports.
  arts: Michelle Cristobal channels their imagination into abstract space‑themed canvases inspired by artists such as James Turrell and Yayoi Kusama, while also creating digital illustrations that echo
    the visual storytelling of the film "Interstellar," and regularly attends performances by contemporary ensembles like Snarky Puppy, integrating these artistic experiences into community outreach workshops.
  travel: Michelle Cristobal meticulously plans trips that blend scientific curiosity and artistic inspiration, having trekked through the Florida Keys' marine preserves, visited NASA’s Kennedy Space Center,
    explored the Atacama Desert’s star‑filled skies in Chile, and dreaming of future pilgrimages to the cultural museums of Kyoto and the volcanic landscapes of Iceland.
  culinary: Michelle Cristobal, an adept home chef, perfects a traditional heritage mole sauce infused with dark chocolate, roasted chiles, and aromatic spices, frequently experiments by fusing it with
    quinoa‑based salads and grilled sea bass, and showcases culinary artistry through beautifully plated meals that marry vibrant corn masa tortillas, fresh cilantro, and unexpected hints of citrus.
  core: Michelle Cristobal merges a razor‑sharp aerospace mind with an unabashed love for abstract space art, salsa dancing, and occasional night‑time worry‑driven overthinking, making them a relentlessly
    curious yet sometimes stress‑prone creator who never skips a treadmill session before a deadline.
background:
  cultural: Michelle is a first‑generation Mexican‑American who grew up bilingual in a close‑knit Latino community in Orlando. She celebrates Mexican traditions such as Día de los Muertos, quinceañeras,
    and family gatherings centered around homemade tamales and mole. Her cultural identity informs her collaborative style—emphasizing community, hospitality, and mutual support—while also shaping her advocacy
    for greater Latinx representation in aerospace. Regular trips to Mexico keep her connected to extended family, and she often incorporates Spanish language and Mexican motifs into her artistic projects
    and outreach initiatives.
