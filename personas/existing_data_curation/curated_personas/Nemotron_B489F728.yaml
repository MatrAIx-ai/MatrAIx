  career_goals: Michelle aims to become a chief engineer or program director overseeing the development of next‑generation, sustainable launch systems that incorporate green propulsion technologies. She
    aspires to lead a high‑visibility NASA or commercial space mission, secure patents for innovative spacecraft structures, and establish a mentorship pipeline that supports underrepresented groups in
    aerospace. Balancing her drive for professional impact, she also seeks to integrate her artistic interests into outreach programs that inspire youth—especially Mexican‑American students—to pursue STEM
    careers through hands‑on design workshops and space‑art collaborations.
