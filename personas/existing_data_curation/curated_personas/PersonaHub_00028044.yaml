persona_description: A historian and professor of history who specializes in the study of Korean and East Asian history, particularly focusing on the interactions between Korea and the Mongol Empire during
  the late thirteenth century. He has written extensively on the topic of the royal hunt under Mongol rule and its impact on elite identity, and has published two books on the subject. He has also studied
  the Tonghak religion and its influence on early modern Korea. He has held fellowships at prestigious institutions such as the Academy of Korean Studies and the Weatherhead East Asian Institute, and has
  received a research Fulbright in Seoul, Korea. His expertise and research interests include the study of Confucian statecraft, the clash of cultural norms, and the impact of new interactions on historical
  and cultural exchange.
