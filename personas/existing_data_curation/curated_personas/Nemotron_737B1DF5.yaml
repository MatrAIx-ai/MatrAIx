  hobbies: '[''fishing and boating'', ''Southern barbecue cooking'', ''college football fandom'', ''home improvement projects'', ''volunteering in youth mentorship'', ''reading logistics journals'', ''crossword
    puzzles'']'
  career_goals: Phillip aims to advance to a senior logistics manager role within the next three years, overseeing multiple freight agents and leading the implementation of advanced freight-tech solutions
    at the Port of Mobile. He plans to complete his Bachelor’s degree in Supply Chain Management and obtain Certified Supply Chain Professional (CSCP) certification to deepen his strategic expertise. Long-term,
    he envisions launching a boutique logistics consulting firm that helps regional businesses streamline their shipping operations while maintaining the reliability and personal touch that define his work
    ethic. He also hopes to mentor junior staff, fostering a collaborative culture that balances innovation with proven best practices.
