personas:
  professional: Caleb Marco, a retired mechanical engineer with deep expertise in agricultural and mining equipment design, applies his SolidWorks proficiency and hands-on troubleshooting skills to mentor
    high-school STEM clubs, run technical workshops at the Billings community center, and chronicle his field experiences in a memoir, blending a structured problem-solving mindset with a relaxed, improvisational
    approach.
  sports: Caleb Marco spends his free time fly-fishing on the Yellowstone River and hiking the Big Horn Mountains, while rooting for the Billings Mustangs baseball team and the Montana Grizzlies football
    squad, and he maintains a modest cardio habit by strolling the senior center's walking track each week.
  arts: Caleb Marco's artistic expression flourishes in his workshop where he crafts furniture and birdhouses inspired by Albert Paley's rustic designs and Ansel Adams's nature photography, and he frequently
    reads engineering biographies of figures like Isambard Kingdom Brunel and attends community theater productions of Arthur Miller's plays.
  travel: Caleb Marco prefers practical road trips that combine his love for the outdoors with a curiosity for engineering heritage, having driven the scenic byways of Yellowstone and Glacier National Parks,
    taken a weekend pilgrimage to the historic mining town of Butte, and dreaming of exploring the Alpine railways of Switzerland someday.
  culinary: Caleb Marco delights in grilling his freshly caught trout on cedar planks with a lemon-butter glaze, served alongside garden-grown heirloom tomatoes and roasted sweet potatoes, while his comfort
    meals include hearty beef stew with carrots and potatoes, and he occasionally treats himself to a slice of apple pie from the local bakery.
  core: Caleb Marco is a pragmatic, hands-on retiree who blends meticulous engineering instincts with a laid-back love for fishing, woodworking, and mentoring, all while navigating a modest budget and occasional
    health quirks.
background:
  cultural: Caleb grew up in a midwestern farming family that relocated to Billings, Montana during his teenage years. Immersed in the rugged individualism and community spirit of the American West, he
    was raised in a predominantly white Protestant environment that valued hard work, self‑reliance, and respect for the land. This upbringing, combined with his technical education, shaped a pragmatic
    worldview that balances traditional rural customs with an appreciation for modern engineering and technological progress.
attributes:
  skills: '["Mechanical design", "3D CAD (SolidWorks)", "Electrical systems troubleshooting", "Statistical analysis", "Project planning and documentation", "STEM mentorship", "Woodworking", "Furniture restoration",
    "Volunteer coordination"]'
  hobbies: '["Fly fishing", "Hiking", "Woodworking", "Model railroading", "Reading biographies and engineering history", "Historical society participation", "Gardening", "Poker"]'
  career_goals: Although retired, Caleb intends to remain active by mentoring high‑school students in local STEM clubs, assisting the Billings community center with technical workshops, and documenting
    his professional experiences in a memoir that highlights lessons in perseverance and practical problem‑solving. He also aims to preserve local history by volunteering with the Billings Historical Society,
    and to maintain his health through regular outdoor activity and continued learning.
