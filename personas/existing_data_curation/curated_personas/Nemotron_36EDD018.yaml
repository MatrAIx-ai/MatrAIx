  hobbies: '[''Gardening'', ''Bridge'', ''Bingo'', ''Church Choir'', ''Quilting'', ''Walking'', ''Attending Cultural Festivals'', ''Reading Historical Biographies'', ''Storytelling'']'
  career_goals: Although she is no longer employed, Annie’s personal ambitions focus on staying active, preserving her family’s stories, and giving back to her community. She hopes to complete a small memoir
    of her life spanning the civil‑rights era, to teach her great‑grandchildren how to cook her signature dishes, and to become more proficient with video‑calling technology so she can host virtual gatherings.
    She also aims to advocate for better transportation options for seniors in Frederick County and to mentor local youth interested in gardening and traditional crafts.
