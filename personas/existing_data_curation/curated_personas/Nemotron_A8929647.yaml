personas:
  professional: Olga Rojas is a veteran financial manager who blends rigorous data‑driven analysis with a collaborative leadership style, leveraging advanced Excel, Power BI, and ERP systems to drive strategic
    budgeting and risk management, while their curiosity for emerging fintech solutions balances practical fiscal stewardship.
  sports: Olga Rojas enjoys low‑impact fitness, strolling the Texas Hill Country trails with the Lone Star Walkers club, cheering on the San Antonio Spurs during the NBA season, and they join a local pickleball
    league each summer for social competition.
  arts: Olga Rojas finds inspiration in the murals of Diego Rivera, the soulful ballads of Vicente Fernández, and the gripping narratives of Isabel Allende, often weaving these artistic influences into
    their knitting projects and community workshops.
  travel: Olga Rojas favors relaxed road trips through the Texas Hill Country wine routes, relishes weekend getaways to Austin’s live‑music scene, and they dream of exploring Barcelona’s architecture while
    balancing travel costs against the desire to stay near family.
  culinary: Olga Rojas, an avid home chef, perfects mole poblano with chipotle and ancho chilies, crafts tender tamales using fresh epazote and masa, and they experiment with seasonal herbs from their garden,
    treating each meal as a laboratory for flavor.
  core: Olga Rojas blends financial acumen with culinary curiosity, walks the hills for calm, knits in quiet moments, and they occasionally forget to stretch after gardening, embodying a balanced yet delightfully
    idiosyncratic approach to life.
background:
  cultural: Olga's Mexican heritage is central to her identity; she grew up in a bilingual household that celebrated traditions like Día de los Muertos, quinceañeras, and weekly family meals featuring homemade
    tortillas and salsa. Fluent in both Spanish and English, she maintains strong ties to the local Mexican‑American community in Floresville, often participating in church activities and cultural festivals.
    Her values reflect a blend of Mexican familial solidarity and the Texan spirit of independence, fostering a pragmatic yet warm approach to both her professional and personal life. This bicultural perspective
    informs her collaborative work style, her emphasis on community service, and her appreciation for both innovative ideas and time‑tested practices.
