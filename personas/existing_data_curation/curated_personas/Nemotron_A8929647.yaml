  hobbies: '[''Cooking Mexican cuisine'', ''Herb gardening'', ''Reading historical novels'', ''Community volunteering (financial literacy)'', ''Attending cultural festivals'', ''Hill Country hiking'', ''Knitting'']'
  career_goals: Olga aims to transition into a senior executive role, such as Chief Financial Officer, where she can shape long‑term financial strategy and drive sustainable growth for her organization.
    She is passionate about integrating emerging fintech solutions while preserving proven financial practices, reflecting her curiosity‑practical balance. Additionally, Olga aspires to create a mentorship
    program for emerging finance professionals in Wilson County, emphasizing ethical decision making and financial literacy. In the longer term, she envisions consulting for small Mexican‑American businesses
    to help them navigate financial challenges and thrive in a competitive market.
