persona_description: A scientist or engineer who specializes in the field of material science, specifically focusing on the preparation and polishing of thin plastic specimens using a Struers metallographic
  polishing machine. They are responsible for designing and manufacturing sample holders for the specimens, selecting and testing adhesives for attaching the specimens to the sample holders, and developing
  polishing parameters to achieve the desired thickness of the specimens. They are also responsible for cleaning and drying the specimens after each polishing stage and removing them from the sample mount
  using a beaker of ethanol and ultrasonic cleaning.
