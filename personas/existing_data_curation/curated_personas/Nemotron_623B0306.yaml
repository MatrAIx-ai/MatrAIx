  career_goals: Audrey aims to move into a technical leadership role, such as a Solutions Architect or Development Team Lead, where she can shape the architecture of small‑to‑medium projects and foster
    a collaborative, low‑noise environment for her team. She plans to champion an internal mentorship program that pairs seasoned developers with early‑career talent, especially women entering tech in rural
    areas. Additionally, she wants to explore integrating emerging AI/ML services into legacy agricultural software, and eventually release a side project that combines her love of art and technology—an
    interactive digital exhibit that showcases Iowa’s seasonal landscapes. Long‑term, she envisions a smooth transition into consulting, helping local businesses adopt modern cloud practices while preserving
    their community values.
