personas:
  professional: Audrey Mcilroy, a seasoned full-stack software developer with over 25 years building enterprise solutions for Midwest agriculture and manufacturing, blends fluency in Python, Java, C#, TypeScript,
    and cloud platforms (AWS, Azure) with an art-infused UI/UX sensibility; they mentor junior coders through test-driven development and container orchestration, and they are now targeting a solutions-architect
    or team-lead role to shape microservice architectures and champion AI-enhanced legacy upgrades while fostering a low-noise, collaborative environment for women entering tech.
  sports: Audrey Mcilroy’s athletic interests center on low-impact outdoor activity, logging weekly hikes along the Loess Hills' rolling vistas, cheering on the Iowa Hawkeyes football team on Saturdays,
    and participating in a local walking club that meets for sunrise strolls; they occasionally attend community yoga sessions to stretch after long coding marathons.
  arts: Audrey Mcilroy devotes evenings to watercolor landscapes of the Iowa prairie, captures sunrise and storm-cloud photography with a vintage Nikon, plays soft Chopin nocturnes on her upright piano,
    attends intimate community theater productions of classics like "Our Town," and draws inspiration from artists such as Georgia O'Keeffe and photographer Ansel Adams; they find the convergence of visual
    and auditory art essential to their creative balance.
  travel: Audrey Mcilroy prefers thoughtful road-trip itineraries that blend photography-friendly scenery with cultural immersion, having driven the Badlands for storm-cloud shots, trekked the Scottish
    Highlands for misty vistas, and scheduled culinary-focused visits to Athens and Bangkok to deepen their Thai-Greek recipe repertoire; they maintain a modest budget that still allows occasional weekend
    getaways to nearby state parks.
  culinary: Audrey Mcilroy’s culinary adventures fuse a love of native herbs with experimental Thai and Greek dishes, frequently preparing fragrant Tom Yum Goong with garden cilantro and lemongrass, savory
    Spanakopita layered with home-grown spinach and feta, and relishing the occasional mishap of burnt rice that becomes a good-natured joke at dinner parties; they record each recipe in a sketchbook that
    doubles as a watercolor journal.
  core: Audrey Mcilroy is a curious coder who paints prairie horizons, hikes storm-trotted hills, and balances meticulous budgeting with spontaneous Thai-Greek flavor experiments; they embody a quiet yet
    assertive blend of analytical precision and artistic wanderlust.
background:
  cultural: Audrey grew up in a small farming community in central Iowa, the daughter of second‑generation German‑American parents who valued hard work, modesty, and community. She attended the local public
    schools and later pursued some college coursework in computer science before entering the software industry. The Midwestern values of self‑reliance, neighborliness, and practicality shape her worldview,
    while her appreciation for art and new ideas reflects a curiosity that extends beyond her rural roots. She and her husband have lived in Mapleton for the past three decades, participating in county
    fairs, church gatherings, and volunteer initiatives that reinforce the close‑knit fabric of Woodbury County. Her cultural identity blends a traditional Midwestern upbringing with a lifelong appetite
    for learning and creative expression.
