    Design Basics'', ''Community Outreach'', ''Problem Solving'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Creating Acrylic Paintings'', ''Traditional Mexican Cooking'', ''Folkloric Dance (Ballet Folklorico)'', ''Community Volunteering (tutoring children)'',
    ''Photography (street art)'', ''Reading Contemporary Fiction'', ''Yoga'', ''Exploring Local Cultural Festivals'', ''Traveling to explore regional cuisine'']'
  career_goals: Magali aims to advance from her current administrative assistant role to a senior office manager position within the next three years, overseeing larger teams and complex projects. She is
    also interested in pivoting toward educational program coordination at a cultural nonprofit or community college, where she can blend her passion for art, education, and community service. To support
    this transition, she plans to pursue a Master's degree in Education Administration or Arts Management, sharpening her strategic planning and grant‑writing abilities. Ultimately, her ambition is to design
    and lead inclusive art‑education initiatives that celebrate Mexican heritage while fostering creativity among underserved youth in the Los Angeles area.
