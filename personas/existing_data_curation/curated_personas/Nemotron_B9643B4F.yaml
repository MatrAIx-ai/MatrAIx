  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Yoga'', ''Volunteer at community health fairs'', ''Exploring Bronx street art'', ''Hosting potluck gatherings'', ''Listening to Latin
    music'', ''Reading personal development books'', ''Karaoke nights'']'
  career_goals: Alexia aims to open her own community wellness studio in the Bronx, offering a holistic suite of services that blend therapeutic massage with cultural elements such as Puerto Rican music
    and essential oils. She plans to earn advanced certifications in sports and prenatal massage, develop a signature "Island Wellness" program, and become a mentor for aspiring therapists from underserved
    backgrounds. Additionally, she hopes to partner with local businesses to provide corporate wellness sessions and expand her impact on community health.
