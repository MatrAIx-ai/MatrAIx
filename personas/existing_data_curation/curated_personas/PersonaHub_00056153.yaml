persona_description: A woman who is passionate about social justice and environmental issues. She is dedicated to promoting and supporting women artists who work on critical issues related to eco and social
  justice. She is interested in art as a tool for social change and healing. She has a strong background in teaching and has been teaching art as a subversive activity at various institutions. She has published
  essays on eco-art and social practice, and has written several works of speculative fiction. She is also an author of a book that is shifting studio arts curriculum around the world. She recently published
  a limited-edition artist's book, which is an example of her artistic work.
