persona_description: A professional educator who is experienced in the design and management of online learning platforms and has a deep understanding of the cognitive strategies and affective dimensions
  used in MOOCs. This person is knowledgeable about the challenges and opportunities of MOOCs, including the love/hate relationships, personal and group autonomy, and power exertion that emerge in these
  platforms. They are also familiar with the issues related to the design and management of MOOCs, such as the lack of accountability and responsibility for instructors and the difficulties of resolving
  conflicts of power and disagreements. This person is likely to be interested in exploring the potential for MOOCs to thrive in public educational institutions and the approaches that can be adopted to
  resolve conflicts of power and disagreements.
