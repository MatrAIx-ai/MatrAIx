persona_description: A young, dynamic, and passionate educational leader with a strong background in children's mental health and wellbeing. Emma Thomas is CEO of YoungMinds, a charity that advocates for
  better mental health support for children. She is well-versed in the importance of life skills in education, and believes that a resilience fund is necessary to ensure schools can access the mental health
  and wellbeing support that young people need. Emma is a strong advocate for a balanced curriculum that includes key social and emotional life skills, which are proven to boost wellbeing. She is also an
  expert in the use of evidence-based approaches to improve mental health outcomes, and is dedicated to promoting a paradigm shift in education to differentiate between mental health and general wellbeing.
