  career_goals: Ramon aims to leverage his hands‑on experience to move into supervisory roles within the hospitality sector. Over the next three years he plans to become a shift manager and then a restaurant
    manager, pursuing a hospitality‑management certificate to complement his on‑the‑job learning. His long‑term ambition is to open a small Mexican‑fusion eatery or a food‑truck that showcases family recipes
    while incorporating modern, health‑conscious twists. He is also interested in developing a digital presence for his future business, using social media marketing skills he has been exploring.
