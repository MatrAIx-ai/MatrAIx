  hobbies: '[''Abstract painting'', ''Cuban salsa dancing'', ''Vintage radio restoration'', ''Photography of Texas landscapes'', ''Reading art history'', ''Reading electrical engineering journals'', ''Volunteer
    lighting setup for community events'']'
  career_goals: Justo aims to transition from employee to owner‑operator of a boutique electrical contracting firm that specializes in sustainable energy installations and creative lighting solutions for
    small venues and galleries. Over the next five years, he plans to obtain his master electrician license, become a certified solar installer, and mentor apprentices from the local community. He also
    hopes to develop a portfolio of lighting projects that blend his technical expertise with his appreciation for art, eventually offering consulting services for cultural institutions in North Texas.
