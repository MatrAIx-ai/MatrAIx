personas:
  professional: Justo Gonzalez, a 52‑year‑old master electrician in the making, combines three decades of residential and commercial wiring expertise with a passion for sustainable energy and gallery lighting,
    while their spontaneous curiosity drives innovative solutions but their resistance to rigid schedules often leads to last‑minute project re‑planning.
  sports: Justo Gonzalez enjoys hummingbird‑fast morning jogs through the Texas hill‑country, follows the Dallas Cowboys and Texas Rangers avidly, participates in a local senior tennis league at the Fort
    Worth Tennis Club, and balances their love of movement with a laid‑back approach that favors spontaneous hikes over strict training regimens.
  arts: Justo Gonzalez paints abstract canvases echoing Caribbean hues while devouring art history texts on Jackson Pollock and Frida Kahlo, curates vintage radio sound installations for community theater,
    and finds inspiration in the raw energy of musicians like Celia Cruz and contemporary visual provocateur Banksy, often blending these influences into their lighting designs for local galleries.
  travel: Justo Gonzalez prefers slow‑paced road trips that let them photograph Texas hill‑country sunsets, has a nostalgic yearning to revisit Havana’s alleyways and explore the historic streets of Seville,
    but prioritizes weekend getaways to nearby Hill Country vineyards over distant travel due to family and business constraints.
  culinary: Justo Gonzalez, an enthusiastic home cook, relishes grilling brisket seasoned with smoked paprika, whipping up a hearty black bean soup with cilantro and lime, and occasionally experiments with
    Caribbean‑inspired arroz con coco, though their tendency to improvise sometimes leaves a half‑finished sauce on the counter.
  core: Justo Gonzalez is a technically brilliant, art‑obsessed electrician who trades structure for spontaneity, often juggling vintage radios, abstract canvases, and a growing solar business, while battling
    procrastination and a love for late‑night tinkering.
background:
  cultural: Justo was born to Cuban immigrant parents who settled in Miami before the family moved to Texas when he was a teenager. He grew up bilingual, speaking both Spanish and English, and maintains
    strong ties to Cuban traditions such as food, music, and family gatherings. While he has embraced the Texan work ethic and the local community in Rhome, his Cuban heritage informs his love of rhythm,
    vibrant colors, and a communal spirit. He celebrates cultural holidays like El Día de la Familia and enjoys cooking dishes like ropa vieja and tostones, often sharing them with neighbors. His cultural
    background also gives him a relaxed yet resilient outlook, balancing personal ambition with deep family commitments.
