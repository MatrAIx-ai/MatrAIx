personas:
  professional: Mirta Rosario, a ten‑year‑old aspiring soccer midfielder, shows they can balance structured drills with the excitement of matches, using practical organization, reliable attendance, and
    an outgoing energy to orchestrate practice schedules and motivate teammates.
  sports: Mirta Rosario thrives as a forward for the Willow Creek Sprouts youth soccer club, they practice year‑round with a focus on drills and match excitement, follow the professional women’s team Chicago
    Red Stars for inspiration, and also enjoy seasonal track events, maintaining fitness through daily warm‑ups and weekend games.
  arts: Mirta Rosario expresses creativity by sketching cartoon heroes inspired by Disney and Studio Ghibli, they dance to a mix of traditional folk tunes by Los Folkloristas and pop hits from Billie Eilish,
    and they curate sticker collections that double as personal art galleries.
  travel: Mirta Rosario loves spontaneous weekend excursions to Pine Valley State Park for hiking, they enjoy family trips to the seaside town of Playa del Mar, and they dream of a future adventure to the
    ancient ruins of Machu Picchu, preferring group travel with friends and family over solo trips.
  culinary: Mirta Rosario delights in munching on tacos al pastor topped with cilantro, lime, and diced onions, they craft homemade guacamole with ripe avocados and a pinch of salt, and they bake chocolate‑chip
    cookies where they sprinkle colorful candy toppings reminiscent of their sticker collections.
  core: Mirta Rosario blends structured soccer practice with a love for vibrant stickers, they turn every drill into a colorful game, but they often forget to bring their art supplies to school, leading
    to creative improvisations.
background:
  cultural: Mirta comes from a Mexican‑American family that maintains strong ties to its heritage. Spanish is spoken at home, and she celebrates holidays such as Día de los Muertos, Cinco de Mayo, and Las
    Posadas with her extended family, enjoying traditional foods like tacos, tamales, and aguas frescas. Living in Westmorland, CA, a community with many agricultural workers, she is familiar with the rhythms
    of farm life and respects the values of hard work, family cohesion, and community support that are central to her culture. Her Catholic upbringing and participation in church events also shape her sense
    of community and responsibility.
