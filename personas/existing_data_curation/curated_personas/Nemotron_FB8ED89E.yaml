  career_goals: Mirta aims to keep her grades high and earn a spot on her school's honor roll while serving as class representative to help organize events. She wants to become a key player on the soccer
    team and perhaps captain it one day. Long‑term, she dreams of a career that blends her love for animals and the land, such as a veterinarian or an agricultural scientist, and hopes to use her bilingual
    abilities to mentor younger children in her community. She also envisions helping her family’s garden become more sustainable as she grows older.
