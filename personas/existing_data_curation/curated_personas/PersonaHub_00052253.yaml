persona_description: A courtier, dancer, and official who played a significant role in the development of ballet and the study of choreography. Louis XIV, the Sun King, was a talented dancer who used his
  ability to learn and perform complex movements to project his identity as the absolute monarch of France. His official dance master, Pierre Beauchamps, codified the steps he designed for the king on stage,
  charting the five basic positions of dance and naming them. Raoul-Auger Feuillet, a student of Beauchamp's, made history by publishing a book containing the steps to some of the court's most famous ballroom
  dances, calling this conceptualization "chorégraphie." This persona likely has a deep understanding of the history of ballet and choreography, and their knowledge and skills are unique and special.
