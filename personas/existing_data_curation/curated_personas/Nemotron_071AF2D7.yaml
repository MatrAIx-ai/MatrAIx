personas:
  professional: Mariam Vega, a seasoned retail frontline specialist with three decades mastering cash handling, POS troubleshooting, and customer rapport, now eyeing a supervisory role to mentor new cashiers
    and institutionalize best practices; their practical focus on structure is tempered by a relaxed attitude toward occasional schedule chaos, and their competitive streak drives them to set sales targets
    while they naturally read body language to keep the checkout line humming.
  sports: Mariam Vega, an avid line‑dancer who twirls every Thursday at the community center and strolls the Virginia Beach boardwalk for bird watching, supports the Washington Nationals and the Virginia
    Beach City FC, and they stay fit through regular group walks and occasional beach volleyball games with friends, though they admit a habit of overindulging on post‑game shrimp‑and‑grits.
  arts: Mariam Vega, a passionate participant in community arts who leads quilting circles, enjoys classic country legends like Dolly Parton and Ray Charles, and frequently attends the local folk music
    festival featuring The Avett Brothers and Sarah Jarosz, they find creative expression through both music and needlework, occasionally staying up late perfecting intricate stitch patterns.
  travel: Mariam Vega, a modest road‑trip enthusiast who has explored the historic streets of Charleston, the shrimp markets of Savannah, and dreams of a coastal cruise along the Outer Banks, they prefer
    traveling by car with free‑spoon‑ticket stays at seaside B&Bs to keep costs low and flexibility high, while they balance family visits with personal wanderlust despite occasional knee discomfort.
  culinary: Mariam Vega, a home‑cooking aficionado specializing in Southern comfort dishes like shrimp‑and‑grits, barbecued ribs, and sweet‑potato pie, seasons everything with fresh basil, thyme, and rosemary
    from their garden, they blend intermediate cooking skills with a habit of taste‑testing a bit too often, which sometimes leads to over‑seasoned batches, and they love sharing their meals at neighborhood
    potlucks.
  core: Mariam Vega, a socially vibrant, structure‑oriented senior who blends competitive energy with relaxed spontaneity, they channel their love for line‑dancing, crafting, and community service into
    a balanced retirement plan.
background:
  cultural: Mariam grew up in a working‑class white family in the Hampton Roads area of Virginia. Her upbringing was shaped by the region’s blend of Southern hospitality and Atlantic‑coast pragmatism. Family
    gatherings centered around home‑cooked meals, church participation, and community events, instilling a strong sense of loyalty and service. The local culture—characterized by a laid‑back attitude toward
    time, a love for outdoor activities like beach walks, and a deep appreciation for regional seafood and barbecue—has influenced her tastes and social habits. While she identifies as white American, her
    surname “Vega” reflects a distant Hispanic lineage in her family history, which adds a subtle multicultural flavor to her culinary interests. Overall, her cultural background is a mixture of Mid‑Atlantic
    values, Southern customs, and a modest appreciation for diverse traditions, all of which inform her practical outlook and sociable nature.
attributes:
  skills: '[''Cash handling and reconciliation'', ''POS system operation (e.g., Square, Clover)'', ''Customer service and conflict resolution'', ''Sales upselling and product knowledge'', ''Basic inventory
