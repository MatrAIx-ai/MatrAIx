persona_description: A Grand Valley State University mathematics professor who worked with students from the university's mathematics Research Experiences for Undergraduates program to develop a new app
  called Street Bump, designed to detect potholes on roads. Aboufadel, the chair of the mathematics department, worked with the students to analyze data for the app, which uses a smartphone to collect data
  on phone movement, location, and speed. The students worked with Aboufadel for eight weeks before submitting their findings, and the app is currently being tested in Massachusetts and Zurich, Switzerland.
