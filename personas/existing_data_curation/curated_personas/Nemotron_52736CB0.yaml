personas:
  professional: Rose Senior, an aspiring junior engineer, translates curiosity into building intricate LEGO structures and creatively solves problems with a practical, organized mindset; they balance imaginative
    play with methodical planning.
  sports: Rose Senior, a dedicated member of the local youth soccer league, plays as a midfielder for the Riverdale Rovers, cheers for the national women's team during major tournaments, and practices drills
    on weekends to improve teamwork and stamina; they enjoy the camaraderie and the challenge of the sport.
  arts: Rose Senior, an aspiring watercolorist, spends afternoons sketching wildlife inspired by nature hikes and admires the delicate illustrations of Mary GrandPré and the vivid landscapes of Hayao Miyazaki,
    often humming the soundtrack of 'My Neighbor Totoro' while painting; they find inspiration in the blend of color and story.
  travel: Rose Senior, who dreams of exploring Redwood National Park after a memorable family trip to the Grand Canyon, prefers short, family-guided excursions over long solo adventures, and eagerly anticipates
    a future visit to the Great Barrier Reef once school breaks align with parents' vacation plans; they balance curiosity with practical scheduling.
  culinary: Rose Senior enjoys assembling peanut butter and banana sandwiches, whipping up mini pizza bites with mozzarella and basil, and experimenting with fruit salads featuring strawberries, blueberries,
    and a honey drizzle, while modestly claiming the title of 'master cookie decorator' after successfully icing a batch of chocolate chip cookies; they love the creative process of mixing flavors.
  core: Rose Senior blends a fierce curiosity for building and storytelling with a practical streak, juggling LEGO projects, soccer drills, and watercolor sketches, all while occasionally forgetting to
    floss and hoarding spare change for the next set; they navigate childhood with an endearing mix of ambition and adorable quirks.
background:
  cultural: Rose grows up in a Black family rooted in African‑American cultural traditions while living in Hesperia, California. Her household celebrates holidays such as Kwanzaa and Juneteenth, incorporating
    storytelling, music, and cooking of traditional dishes like collard greens and cornbread. She attends a local community church, where gospel music and fellowship reinforce a sense of heritage and community
    belonging. The diverse environment of San Bernardino County exposes Rose to a blend of cultures, and she enjoys participating in school multicultural events, which broaden her appreciation for different
    backgrounds while maintaining a strong connection to her own family's history and values.
attributes:
  skills: '[''Reading fluently'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Hands‑on science experimentation'', ''Organizational skills for school tasks'', ''Clear verbal communication
    in group settings'']'
  hobbies: '[''Reading adventure/mystery books'', ''Building LEGO structures'', ''Craft projects (beading, painting)'', ''Youth soccer'', ''Nature walks and insect observation'', ''Watercolor drawing'']'
  career_goals: Rose imagines future careers that blend her curiosity with practical problem‑solving. She often says she wants to become a veterinarian because she loves caring for animals and enjoys learning
    how they work. She also dreams of being an engineer, fascinated by building and designing simple structures with Legos and craft kits. Her medium‑term goal is to excel in school, especially in science
    and math, to lay a strong foundation for these ambitions.
