  career_goals: Abeo aims to secure a full‑time role that blends her curiosity for new community‑building strategies with her practical, methodical skill set—ideally as a program coordinator for a nonprofit
    focused on mental‑health advocacy or youth development. She plans to pursue a bachelor’s degree in social work or public administration to deepen her impact, while also exploring certification in trauma‑informed
    care. Long‑term, she envisions launching a small catering venture that celebrates her cultural culinary heritage, providing both a creative outlet and an additional source of stable income.
