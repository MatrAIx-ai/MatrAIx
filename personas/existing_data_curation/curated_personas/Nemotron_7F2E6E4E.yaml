  career_goals: Waldin aims to transition into a principal architect role where he can shape the technical direction of larger projects while still staying hands‑on with code. He is eager to mentor the
    next generation of developers, particularly those from under‑represented backgrounds, by expanding his involvement in community coding workshops and speaking at regional tech meet‑ups. Over the next
    five years he plans to launch a boutique consulting firm that helps small businesses in upstate New York modernize their digital infrastructure, leveraging his expertise in cloud migration and system
    optimization. Simultaneously, he hopes to contribute to open‑source projects that focus on improving accessibility and security in the software stack.
