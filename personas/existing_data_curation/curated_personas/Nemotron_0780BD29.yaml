  hobbies: '["Speculative fiction reading", "Creative writing (short stories, poetry)", "Acrylic painting", "Digital illustration (Procreate)", "Tabletop role‑playing games (D&D)", "Visiting art galleries
    and indie music shows", "Urban photography", "Cycling along the Scioto Trail", "Community improv comedy"]'
  career_goals: Zachery aims to earn a bachelor's degree in education within the next three years, followed by teacher certification to become a high‑school English teacher. He aspires to integrate his
    love for art and abstract concepts into the classroom by developing interdisciplinary curricula that blend literature, visual arts, and digital media. Long‑term, he envisions a role as a curriculum
    coordinator or instructional designer, possibly working for an educational technology startup where he can shape innovative learning tools that spark curiosity. He also hopes to launch an after‑school
    program that encourages creative writing and digital art among middle‑school students in Columbus.
