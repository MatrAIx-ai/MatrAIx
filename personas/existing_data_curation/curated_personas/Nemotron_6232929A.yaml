  career_goals: Although retired, Yen aims to stay engaged by expanding the neighborhood garden she helped start, providing fresh produce to low‑income families and fostering intergenerational interaction.
    She plans to become a volunteer coordinator at the local senior center, organizing wellness workshops and cultural events. Yen also wishes to document her family's immigration story in a memoir, preserving
    Vietnamese traditions for her grandchildren. To support this, she intends to complete a short certificate in digital storytelling, learning to archive oral histories and share them online. Managing
    stress and maintaining health remain central goals, so she incorporates regular mindfulness practice and tai chi into her routine.
