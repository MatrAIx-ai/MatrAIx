  career_goals: Nishan aims to transition from contract work to owning a boutique decorative‑finishing studio that offers custom murals and high‑end wall treatments. He plans to develop a signature line
    of handcrafted, desert‑inspired murals that blend traditional techniques with modern abstraction. Obtaining certification in sustainable coatings and expanding his services to include interior visual
    consulting are top priorities. He also wishes to mentor apprentices, sharing his methodical trade knowledge, and eventually publish a guide on contemporary wall art for homeowners and professionals.
