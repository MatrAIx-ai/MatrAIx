personas:
  professional: Kelley Rook is a 16‑year‑old high school junior who blends a love for animals with practical problem‑solving, leveraging basic computer skills and empathetic communication to volunteer at
    the county 4‑H program and organize youth group service projects while aspiring to become a veterinary technician.
  sports: Kelley Rook enjoys hiking local prairie trails and bird‑watching as low‑impact fitness, occasionally joining the high‑school cross‑country club and cheering for the nearby university’s basketball
    team, the State Wildcats, as a way to stay connected to community sports.
  arts: Kelley Rook dives into contemporary YA novels by John Green, listens to folk‑rock acoustic sets from artists like Brandi Carlile, knits scarves inspired by patterns seen in classic quilts, and curates
    a scrapbook of church events featuring photos of friends and family, weaving creativity into everyday life.
  travel: Kelley Rook dreams of exploring the Great Plains’ hidden prairie reserves and has already visited nearby state parks like Willow Creek, while planning a future road trip to Yellowstone National
    Park, balancing limited family budget with a love for nature‑focused getaways.
  culinary: Kelley Rook adores baking soft chocolate‑chip cookies and oatmeal raisin bars, expertly measuring out brown sugar and cinnamon, while also experimenting with rustic vegetable soups from garden
    harvests, favoring simple, comforting dishes that remind them of church potluck meals.
  core: Kelley Rook is a compassionate, detail‑oriented teen who steadies a restless curiosity with grounded routines, juggling garden care, guitar chords, and careful budgeting while navigating the occasional
    wave of anxiety.
background:
  cultural: Kelley is a white Midwestern teen raised in Taylorville, a small agricultural community in Christian County, Illinois. Her family has deep roots in the area, with several generations of farm
    and small‑business owners. The community’s culture is characterized by close‑knit relationships, strong Christian values, and a rhythm shaped by the seasons and local events such as the county fair,
    high school football games, and church gatherings. Family meals, church potlucks, and volunteer service are regular parts of life, fostering a sense of responsibility and communal harmony. While the
    town has limited diversity, it celebrates traditional American holidays and embraces modest, practical lifestyles. Kelley’s upbringing reflects the Midwestern emphasis on hard work, humility, and caring
    for neighbors, all of which inform her personal outlook.
