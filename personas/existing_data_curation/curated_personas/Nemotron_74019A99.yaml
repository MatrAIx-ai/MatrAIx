  career_goals: Kelley dreams of turning her love for animals and practical problem‑solving into a career as a veterinary technician or animal health aide. She plans to complete her GED and then enroll
    in a community‑college program that offers hands‑on training in veterinary technology, while also taking courses in biology and environmental science. In the long term she hopes to work at a local farm
    clinic or a small animal practice where she can apply her empathy and hands‑on skills to help pets and livestock alike. She also sees herself contributing to community health initiatives by volunteering
    with the county’s 4‑H program to teach youth about responsible animal care and sustainable gardening.
