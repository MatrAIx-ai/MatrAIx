personas:
  professional: Michel Pelkey, a 28‑year‑old eligibility interviewer for Florida's Department of Children and Families, leverages meticulous data‑entry skills, fluency in COMPASS and UNICIS, and a warmly
    inquisitive bedside manner to guide diverse clients through Medicaid, SNAP and TANF applications while mentoring new staff.
  sports: Michel Pelkey, an avid beach‑volleyball player with the Boynton Beach Suns league, paddles the Intracoastal each sunrise, hikes the Dyer Trail on weekends, and cheers for the Miami Heat and Miami
    Marlins while fitting regular gym sessions into a meticulously planned weekly schedule.
  arts: Michel Pelkey, a regular at the Norton Museum and Art Palm Beach, immerses themselves in contemporary visual dialogue by collecting limited‑edition prints from artists like Kehinde Wiley and Yayoi
    Kusama, attends live performances by Lin‑Manuel Miranda’s Broadway revivals and local Afro‑Caribbean jazz nights featuring Carlos Vives, and channels this creative energy into their hobby of street‑photography.
  travel: Michel Pelkey, who plans trips with a meticulous spreadsheet and a modest travel budget, indulges in weekend getaways to Key West and the Everglades, seeks cultural immersion on annual spring
    trips to New Orleans and Barcelona, and dreams of a future solo adventure to Reykjavik’s art scene, balancing adventurous itineraries with the practicalities of student loan repayments.
  culinary: Michel Pelkey, a self‑taught home cook who reliably whips up shrimp tacos with mango salsa, Cuban‑style medianoche sandwiches, and occasional Mediterranean paella using saffron, fresh oregano
    and local stone‑crab, while also delighting in tasting new dishes like ramen at eclectic downtown eateries and savoring artisanal gelato on spontaneous nights out.
  core: Michel Pelkey blends a methodical, community‑driven work ethic with an insatiable curiosity for art and culture, yet frequently procrastinates on filing taxes until the last minute and can’t resist
    a midnight slice of pizza after a long volunteering shift.
background:
  cultural: Michel was raised in a middle‑class, white family in Palm Beach County, with ancestral roots tracing back to Northern European (German and Irish) heritage. Growing up in Boynton Beach, he experienced
    the multicultural tapestry of South Florida—regularly encountering Hispanic, Caribbean, and African‑American neighbors, as well as the vibrant tourist community. This exposure shaped his appreciation
    for cultural diversity and informed his inclusive approach at work. His upbringing emphasized civic responsibility; his parents volunteered with local charities, reinforcing his commitment to public
    service. The region’s strong arts scene, from the annual SunFest music festival to the numerous galleries along Worth Avenue, nurtured his lifelong interest in visual and performing arts. Michel identifies
    as an American with a regional Florida identity that blends beach‑side lifestyle, cultural openness, and a dedication to community well‑being.
attributes:
  skills: '[''Client intake and eligibility assessment'', ''Knowledge of Florida public assistance programs (Medicaid, SNAP, TANF)'', ''Active listening and empathetic communication'', ''Accurate data entry
    and record-keeping in case-management software (e.g., COMPASS, UNICIS)'', ''Proficiency with Microsoft Office Suite, especially Excel'', ''Confidentiality and HIPAA compliance'', ''Conflict resolution
    and de-escalation techniques'', ''Team collaboration and interdisciplinary coordination'', ''Time management and scheduling'', ''Policy research and briefing summarization'', ''Mentoring and training
    of new interviewers'', ''Basic art appreciation and cultural event coordination'']'
  hobbies: '[''Visiting local art museums and galleries (e.g., Norton Museum of Art, Art Palm Beach)'', ''Attending live music and theater performances'', ''Photography – coastal and street subjects'',
    ''Beach volleyball with friends'', ''Paddleboarding and kayaking on the Intracoastal Waterway'', ''Hiking local nature trails (e.g., Dyer Trail)'', ''Volunteering at community art fundraisers'', ''Exploring
    diverse cuisines and cooking for friends'', ''Board-game nights and social gatherings'', ''Reading contemporary fiction and art-history literature'']'
  career_goals: Michel aims to advance from his current eligibility-interviewer role to a supervisory position within the Florida Department of Children and Families, such as Program Coordinator or Senior
    Case Manager. To support this progression, he plans to enroll in a bachelor’s program in Social Work or Public Administration within the next two years. His short-term goal is to lead a pilot project
    that streamlines eligibility verification through automated data-matching tools, reducing processing time and improving client satisfaction. Long-term, he aspires to influence state policy by becoming
    a policy analyst focused on integrating arts-based interventions into social service programs, thereby expanding holistic support for vulnerable populations. He also envisions establishing a mentorship
    program for new interviewers that emphasizes cultural sensitivity and effective communication.
