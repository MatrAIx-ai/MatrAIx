personas:
  professional: Leonor Lopez, a business administration specialist and teaching assistant, leverages a data‑driven mindset, meticulous planning, and bilingual communication to design curricula, guide students,
    and develop grant‑ready research proposals, reflecting their organized and reliable nature.
  sports: Leonor Lopez, an avid hiker on the pine‑forested trails near Hattiesburg, practices yoga at a local studio, roots for the University of Southern Mississippi Golden Eagles and the New Orleans Saints,
    and joins a community beach‑volleyball club on Gulf Coast weekends.
  arts: Leonor Lopez, a dedicated photographer of cultural events, regularly attends live ranchera and mariachi performances featuring artists like Vicente Fernández and Lila Downs, and enjoys the contemporary
    work of Mississippi painter John Glover, integrating visual and musical arts into their leisure.
  travel: Leonor Lopez prefers meticulously planned weekend getaways, alternating between relaxing beach stays in Gulfport and adventurous hikes in the Ozarks, while saving for a future culinary tour of
    Oaxaca to deepen their understanding of regional cuisines, balancing budget constraints with a love for immersive cultural experiences.
  culinary: Leonor Lopez, a skilled home cook, masterfully prepares mole poblano with toasted chilies and chocolate, fresh coastal ceviche with lime and cilantro, and experiments with regional twists like
    pine‑nut mole, sourcing ingredients at farmers’ markets and occasionally improvising with pantry staples when time is limited.
  core: Leonor Lopez balances a structured, goal‑oriented career in business education with a passion for cooking, hiking, and community mentorship, yet occasionally procrastinates on dental appointments
    and can’t resist a late‑night slice of queso fundido.
background:
  cultural: Leonor was raised in a Mexican‑American household in Houston, where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and Mexican Independence Day were
    celebrated with fervor. Her family emphasizes familismo, respect for elders, and collective responsibility, values that continue to shape her interpersonal style. Though she identifies with Catholic
    holidays, she embraces a broad spectrum of Mexican folklore, music, and cuisine, often integrating these elements into community events in Hattiesburg. Bilingual and bicultural, she leverages her heritage
    to foster inclusive classroom environments, advocating for culturally responsive pedagogy and supporting Hispanic students in navigating higher education.
attributes:
  skills: '[''Financial accounting'', ''Market analysis'', ''Strategic planning'', ''Data analysis (Excel, SPSS, Python)'', ''Instructional design'', ''Curriculum development'', ''Grading and assessment'',
    ''Learning management systems (Canvas, Blackboard)'', ''Bilingual communication (Spanish/English)'', ''Project management (Agile, Waterfall)'', ''Conflict resolution'', ''Time management'', ''Organizational
    workflow optimization'', ''Public speaking'', ''Cultural competency'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hiking nature trails'', ''Yoga'', ''Volunteering (financial literacy workshops)'', ''Mentoring high school students'', ''Reading business biographies'', ''Bullet
    journaling'', ''Photography'', ''Spanish conversation meet‑ups'', ''Listening to ranchera and mariachi music'']'
  career_goals: Leonor aims to transition from a teaching assistant role to a tenure‑track faculty position in a business school within the next five years, pursuing a Doctorate in Business Administration
    (DBA) to strengthen her research credentials. She is passionate about entrepreneurship education, particularly for underrepresented Hispanic students, and plans to develop a community‑based incubator
    program in the Gulf Coast region that offers mentorship, micro‑grant funding, and business‑plan workshops. To support these initiatives, she intends to earn a Project Management Professional (PMP) certification
    and secure grant funding for research on inclusive business practices. In the longer term, she envisions moving into academic leadership as Director of Undergraduate Business Programs, where she can
    shape curricula that integrate cultural relevance and experiential learning.
