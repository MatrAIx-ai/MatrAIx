  career_goals: He dreams of becoming an architect or designer who blends art, technology, and sustainability to create imaginative spaces for children. He also imagines inventing new toys or gadgets that
    spark curiosity. In the short term, he wants to enter school competitions for science fairs and art showcases, and later hopes to study engineering or visual arts in high school.
