personas:
  professional: Jose Marill, a budding 9‑year‑old coder and illustrator, blends a love of fantastical drawing with Scratch programming to create interactive cartoon adventures, and they plan each project
    with methodical precision while thriving in small collaborative circles.
  sports: Jose Marill, an avid supporter of the LA Galaxy and Los Angeles Lakers, plays on a neighborhood soccer team, practices basketball drills at the community center, and joins a youth swim club during
    summer, and they relish the routine of small‑team practice sessions that match their organized nature.
  arts: Jose Marill, a passionate young artist who sketches alien landscapes inspired by James Gurney and Hayao Miyazaki, constructs elaborate LEGO cityscapes while listening to the lively rhythms of Celia
    Cruz and Buena Vista Social Club, and they frequently collaborate with two close friends on after‑school mural projects.
  travel: Jose Marill, who dreams of stargazing from the Griffith Observatory, spending sunny afternoons at San Diego’s boardwalk, and someday wandering the historic streets of Cartagena, plans each family
    trip with colorful maps and checklist stickers, and they eagerly catalog every new sight in a scrapbook.
  culinary: Jose Marill, who loves helping prepare ropa vieja, tostones, and plantain fritters with their family, enjoys seasoning dishes with fresh cilantro and lime, can whip up a simple cheese quesadilla
    after watching cooking videos, but they often forget to wash the dishes afterward, leaving a tiny mess in the sink.
  core: Jose Marill is a methodical, imaginative nine‑year‑old who turns pocket‑money puzzles into LEGO marvels, midnight salsa beats, and meticulously organized art projects, and they occasionally splurge
    on comic books despite a tight allowance.
background:
  cultural: Jose is a Cuban-American raised in Chino, California. At home, Spanish is spoken regularly, and his family preserves Cuban traditions such as celebrating Carnaval, preparing ropa vieja, and
    dancing to salsa and son. He participates in local Cuban community events in Los Angeles County, which enrich his bilingual abilities and cultural pride. The blend of Cuban heritage and American upbringing
    influences his artistic style, love of rhythm, and appreciation for community harmony.
