personas:
  professional: John Clement is a diligent high school senior who blends hands‑on automotive repairs, basic carpentry, and organized event planning into a methodical, community‑oriented career path, and
    they use their competitive drive and reliable nature to lead projects and prepare for an apprenticeship in auto‑technology.
  sports: John Clement serves as the point guard for Saint Johns High's basketball team, cheers for the Detroit Pistons and LeBron James, follows the Detroit Tigers in baseball, and they spend weekends
    fishing at Lake St. Clair while organizing pickup games at the town park.
  arts: John Clement enjoys the storytelling of country‑rock artist Chris Stapleton, the lyrical poetry of Bob Dylan, and the high‑energy beats of Post Malone, and they often edit basketball highlight reels
    to music while attending the annual Michigan State University marching band parade.
  travel: John Clement has road‑tripped to Mackinac Island, explored Chicago’s museums, and dreams of visiting the Grand Canyon and New York City, and they prefer budget‑friendly, short trips planned down
    to the gas‑station stops and shared with friends or family.
  culinary: John Clement loves cooking hearty chicken fried steak with mashed potatoes, grilling burgers topped with crisp bacon, and whipping up campfire chili using ground beef, beans, corn, and smoked
    paprika, and they often experiment with a cast‑iron skillet and occasional apple crisp for dessert.
  core: John Clement blends a routine‑loving, competitive spirit with calm resilience, and they channel their organized energy into community‑rooted goals from truck tinkering to youth basketball coaching.
background:
  cultural: John comes from a white, Midwestern, rural background in Saint Johns, Gratiot County, Michigan. He was raised in a close‑knit community that values hard work, self‑reliance, and traditional
    family ties. His family likely participates in local church and community gatherings, and the region’s agricultural and manufacturing heritage informs his practical outlook and preference for routine
    tasks.
attributes:
  skills: '["Automotive maintenance (oil changes, brake inspection, basic repairs)", "Basic carpentry and woodworking", "Team sports – basketball and football", "Event planning and coordination for school
    clubs", "Leadership and group facilitation", "Digital scheduling and communication tools", "Competitive video gaming (sports simulation)", "Problem‑solving under pressure"]'
  hobbies: '["Basketball (pickup games and school team)", "Car tinkering and basic repairs", "Competitive video gaming (sports titles)", "Volunteer work at community events and festivals", "Fishing trips
    on local lakes", "Basic woodworking projects (shelves, birdhouses)"]'
  career_goals: John aims to earn his GED within the next year, then enroll in an automotive technology program at a community college to obtain a certified technician credential. He plans to secure an
    apprenticeship with a local repair shop, gaining hands‑on experience. Long‑term, he hopes to open his own small auto‑repair and hand‑tool service, becoming a trusted, organized provider in Saint Johns.
    He also wants to stay active in community sports, eventually coaching youth basketball teams.
