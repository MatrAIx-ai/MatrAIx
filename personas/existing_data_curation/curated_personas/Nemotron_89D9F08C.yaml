  hobbies: '[''reading bilingual storybooks'', ''drawing and painting'', ''crafting friendship bracelets'', ''nature walks and insect collecting'', ''LEGO building'', ''listening to Latin music'', ''dancing
    to folkloric rhythms'', ''helping in family kitchen'', ''educational tablet games'', ''quiet reading time'']'
  career_goals: Fiorella dreams of becoming a teacher who blends science experiments with storytelling to spark curiosity while creating a caring, inclusive classroom. She also imagines a future as a wildlife
    biologist or veterinarian, inspired by her love for animals and desire to protect them. Over time, she hopes to develop skills that let her support peers emotionally, perhaps as a school counselor,
    merging her kindness with her personal experience of intense emotions. Her long‑term ambition is to use her bilingual background to bridge cultural gaps and inspire other children to appreciate both
    new ideas and proven methods.
