personas:
  professional: Fiorella Mendoza, an aspiring junior naturalist and storyteller, channels their curiosity about animals into illustrated nature journals, and they mindfully organize each page with bright
    stickers while their heightened sensitivity leads them to double‑check every sketch for accuracy.
  sports: Fiorella Mendoza enjoys nature hikes, plays on the Maple Leaf Juniors youth soccer team, cheers for the Cityville Tigers baseball squad on weekends, and they maintain a habit of stretching after
    practice, though they sometimes skip warm‑ups when nervous about an upcoming game.
  arts: Fiorella Mendoza spends weekends sketching vibrant folklore scenes inspired by Mary Blair’s color palettes, listens to marimba rhythms from bands like Kumbia Queers, and they proudly showcase a
    collection of friendship bracelets modeled after Matthew Crudden’s craft tutorials.
  travel: Fiorella Mendoza loves family trips that blend nature and culture— they fondly recall exploring the geysers of Yellowstone and the butterfly garden at San Antonio’s zoo, dreams of a guided trek
    through the Monteverde Cloud Forest, and they prefer meticulously planned itineraries that include time for drawing, though they sometimes feel nervous sleeping in unfamiliar places.
  culinary: Fiorella Mendoza enjoys helping make tamales with fresh corn husks, crafting guacamole with ripe avocados, sipping cinnamon‑spiced atole, and they often experiment by adding shredded carrots
    to vegetable soup, yet they can be picky about broccoli and may refuse new spices without reassurance.
  core: Fiorella Mendoza is a bright, nature‑obsessed eight‑year‑old whose sketchbook is never far from their hand, they burst into energetic marimba dance before a sudden wave of anxiety sends them clutching
    their favorite friendship bracelet for comfort.
background:
  cultural: Fiorella is raised in Frederica, Delaware, within a close‑knit Guatemalan‑American family. Spanish is spoken at home, and she celebrates Guatemalan traditions such as Día de los Muertos, Semana
    Santa, and the annual Fiesta de la Virgen. Family meals often feature dishes like pepian, tamales, and atole, and she learns traditional recipes from her grandmother. She participates in a local Guatemalan
    cultural association, attending community dance events and holiday celebrations. Her Catholic upbringing includes attending church services and learning about religious customs. While she embraces typical
    American childhood experiences—school, Halloween, and weekend sports—she also maintains a strong connection to her Guatemalan heritage, which informs her language, food, music, and values.
