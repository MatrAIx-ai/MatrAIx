  hobbies: '[''Jazz appreciation'', ''Cooking Southern cuisine with a modern twist'', ''Hiking the Farmington River trail'', ''Reading African American history'', ''Volunteer financial literacy tutoring'',
    ''Photography (portrait and street)'', ''Yoga and meditation'', ''Collecting vintage vinyl records'', ''Attending local community festivals'', ''Gardening (organic vegetables)'']'
  career_goals: Ricky aims to transition from senior staff auditor to a managerial role within a major CPA firm, eventually seeking partnership or leading his own boutique advisory practice that serves
    small businesses in the Hartford region. He is motivated to integrate cutting‑edge financial technologies—such as automated analytics dashboards and blockchain‑based verification—into traditional accounting
    services, positioning himself as a forward‑thinking consultant. Additionally, he aspires to champion financial literacy initiatives in the Black community, leveraging his expertise to design workshops
    and mentorship programs that empower underserved entrepreneurs. Achieving CPA certification (if not already held) and earning a recognized leadership credential (e.g., CMA) are also key milestones on
    his professional roadmap.
