    ''Quality Assurance and Compliance'']'
  hobbies: '[''Watercolor painting'', ''Sketching wildlife and domestic animals'', ''Visiting art galleries and museum exhibitions'', ''Volunteer work at animal shelters'', ''Salsa dancing'', ''Hiking in
    the Blue Hills'', ''Running 5K charity races'', ''Yoga and mindfulness practice'', ''Reading contemporary African‑American literature and graphic novels'', ''Cooking fusion cuisine (Southern, Caribbean,
    New England)'']'
  career_goals: Crystal aims to become a board‑certified veterinary technologist with a specialization in exotic and small‑animal care, leveraging her artistic background to develop innovative educational
    programs that integrate visual art and animal welfare. She plans to pursue a Master’s degree in Veterinary Sciences or a related public health field to expand her research skills, targeting projects
    on stress reduction for shelter animals through environmental enrichment and therapeutic art. In the long term, she envisions managing a community‑focused veterinary practice in Boston, where she can
    lead outreach initiatives, create culturally responsive animal health workshops, and mentor emerging technologists from underrepresented backgrounds.
