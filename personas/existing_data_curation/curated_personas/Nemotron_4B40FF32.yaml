    and skepticism'', ''Effective written communication'', ''Customer service and conflict resolution'', ''Mentoring junior staff'', ''African American art history knowledge'', ''Digital photography basics'']'
  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Reading African American literature'', ''Listening to jazz and blues music'', ''Hiking in Wissahickon Valley'', ''Playing chess'', ''Genealogical
    research'', ''Experimenting with cooking'', ''Visiting art galleries and museums'', ''Volunteering for financial literacy workshops'']'
  career_goals: Michael aims to transition into a senior supervisory role, such as Claims Operations Lead, where he can shape policy‑processing standards across the county office. He plans to earn the CPCU
    (Chartered Property and Casualty Underwriter) designation within the next two years to deepen his strategic expertise. Ultimately, he wants to design and implement a mentorship and training program
    for new employees, leaving a legacy of streamlined, error‑free claim handling. As he approaches retirement, Michael hopes to volunteer his financial‑literacy knowledge to community centers, helping
    underserved residents navigate insurance and budgeting challenges.
