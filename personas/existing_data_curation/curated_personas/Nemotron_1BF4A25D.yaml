personas:
  professional: Alvaro Munoz, a 59‑year‑old journeyman electrician with deep expertise in residential wiring, conduit bending and blueprint interpretation, now expanding into solar PV and home‑automation
    retrofits, aims to earn a master electrician license and launch a solo‑focused energy‑efficiency contracting service while mentoring a single apprentice, blending his practical curiosity with a competitive
    drive to out‑perform larger firms.
  sports: Alvaro Munoz enjoys quiet solo fishing at the nearby Lake Monroe during the summer, follows the Indianapolis Colts and Indiana Pacers on game days, and participates in the local senior anglers’
    club while occasionally jogging in the crisp autumn evenings to stay fit.
  arts: Alvaro Munoz spends evenings listening to classic rock legends like Led Zeppelin and The Rolling Stones alongside regional Mexican icons such as Vicente Fernández, while channeling his creative
    side into woodworking small furniture and Arduino tinkering, often appreciating the craftsmanship of artisans like Dale Chihuly in his quiet moments.
  travel: Alvaro Munoz prefers low‑key road trips, having driven to the Grand Canyon and Big Bend National Parks for stargazing, and dreams of a future visit to the Oaxaca region of Mexico to explore the
    roots of the chilies he cultivates at home, planning his itineraries loosely and often balancing travel costs with his looming retirement budget.
  culinary: Alvaro Munoz relishes cooking hearty pozole and rich mole, blending home‑grown chilies and tomatoes with dried ancho chilies, cumin, and corn masa, while occasionally grilling fresh lake‑caught
    trout seasoned with lemon and rosemary, displaying a solid yet practical kitchen skill set.
  core: Alvaro Munoz is a solitary, curiosity‑driven electrician‑turned‑tinkerer who balances practical ingenuity with a relaxed, sometimes disorganized lifestyle, preferring solo projects and quietly competing
    against larger firms.
background:
  cultural: Alvaro is a Mexican‑American who grew up in a bilingual household, retaining fluency in Spanish and a strong connection to Mexican traditions. He celebrates Día de los Muertos and Mexican holidays
    with homemade foods and music, and maintains a fondness for Mexican cinema and soccer broadcasts, even though he prefers solitary enjoyment. While living in Thayer, Indiana, he blends his heritage with
    Midwestern values of self‑reliance and hard work, often incorporating Mexican culinary techniques into his cooking and using his cultural perspective to inform his practical, hands‑on approach to his
    trade.
