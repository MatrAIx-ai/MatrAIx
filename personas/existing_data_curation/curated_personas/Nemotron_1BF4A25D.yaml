  career_goals: As he approaches retirement age, Alvaro aims to earn a master electrician license and acquire specialty certifications in solar energy and home automation to broaden his service offerings.
    He plans to launch a small, flexible contracting business focused on energy‑efficiency retrofits for rural homeowners, which would allow him to set his own schedule and work primarily solo. Additionally,
    he hopes to mentor one dedicated apprentice to eventually pass on his expertise, and he is considering authoring a practical guide on DIY electrical upgrades for homeowners in the Midwest.
