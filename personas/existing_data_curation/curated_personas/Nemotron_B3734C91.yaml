  career_goals: Kaye aims to advance to an office manager position within her current organization, where she can oversee departmental efficiency, implement a comprehensive digital archiving project, and
    establish a mentorship program for new staff. She also aspires to lead process‑improvement initiatives that blend her analytical skills with her love of novelty. Over the longer term, Kaye envisions
    a part‑time role that integrates her administrative expertise with community arts coordination, allowing her to support local cultural events while maintaining a balanced work‑life schedule.
