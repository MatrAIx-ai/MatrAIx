persona_description: A civil engineer with expertise in masonry and carpentry construction, particularly in the design and construction of arches, columns, and other masonry structures. This person has
  a deep understanding of the principles of bonding, arch design, and the use of masonry in building construction. They are skilled in cutting and shaping stones for arches and columns, and in the use of
  arches in decorative and functional applications. This person is also knowledgeable about the construction and maintenance of masonry structures, and has experience in designing and building arches and
  columns for a variety of architectural and engineering projects.
