  hobbies: '[''gardening'', ''crocheting'', ''quilting'', ''reading historical fiction'', ''gospel music'', ''cooking traditional Southern dishes'', ''crossword puzzles'', ''birdwatching'', ''church choir'',
    ''storytelling'']'
  career_goals: Her foremost ambition is to sustain her health and independence while remaining an active presence in her family and church community. Porcha hopes to compile a memoir that records her life
    experiences, especially the civil‑rights era, for her grandchildren and great‑grandchildren. She wishes to mentor younger relatives in cooking, sewing, and community service, and to continue advocating
    for better senior‑care resources and accessible health services in Ladson.
