personas:
  professional: Porcha Phillips, a 97-year-old senior program coordinator for their local church, blends decades of budgeting acumen, event-planning precision, and oral-storytelling prowess to keep community
    gatherings orderly, and they assertively ensure tasks are completed on schedule, even if that means gently reminding volunteers of deadlines.
  sports: Porcha Phillips enjoys gentle morning walks in the nearby park, birdwatching along the trail, participates in the church’s senior stretch-and-step class, and they fervently follow the Charleston
    Battery soccer team and the Cleveland Browns football squad on TV, using these games as a reason to gather friends for weekly viewing parties.
  arts: Porcha Phillips fills their evenings with gospel hymns by Mahalia Jackson, jazz classics from Louis Armstrong and Ella Fitzgerald, relishes reading works by Alex Haley and James Baldwin, and they
    showcase their own quilting artistry at community exhibits, often humming the melodies while stitching heirloom blankets.
  travel: Porcha Phillips prefers well-planned, leisurely trips that combine family visits with historical sites, such as weekend drives to Savannah’s riverfront, annual pilgrimages to a historic Lowcountry
    heritage site in Beaufort, and occasional winter stays in Naples, Florida, always arranging accommodations early and they pack their beloved quilting supplies for downtime.
  culinary: Porcha Phillips expertly prepares gumbo brimming with home-grown okra, tomatoes, and collard greens, seasons their sweet tea with a pinch of fresh mint, bakes buttery biscuits using heirloom
    cornmeal, and, while they meticulously follow cherished family recipes, they occasionally indulge in experimenting with a splash of smoked paprika or a new cut of seafood, all while maintaining a well-stocked
    garden herb rack.
  core: Porcha Phillips, a 97-year-old garden-tending storyteller, balances meticulous routine with a warm, assertive presence, worries about the future yet delights in quilting, cooking, and sharing history,
    all while they cling to favorite yarns and discount coupons.
background:
  cultural: Porcha was raised in the African‑American community of the Charleston Lowcountry, steeped in Gullah heritage and the legacy of the civil‑rights movement. Her upbringing during the Jim Crow era
    reinforced the central role of the church, communal solidarity, and a strong oral tradition that emphasized family ties and resilience. She maintains Lowcountry culinary customs—such as gumbo, collard
    greens, and sweet tea—and participates actively in church gatherings, senior programs, and local storytelling events that celebrate African‑American history and culture.
