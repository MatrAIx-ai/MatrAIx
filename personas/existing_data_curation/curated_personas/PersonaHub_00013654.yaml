persona_description: A philosopher who is interested in expanding the critical horizon beyond pragmatism to humanism, beyond science to culture, and who advocates for the casting off of intellectual timidity
  that hampers the imagination. This person is familiar with the works of Dewey, Royce, Peirce, and Mead, and seeks to draw upon their theories to develop a philosophy of culture that incorporates key modes
  of forming the identity of self and world. This person is mindful of the warning that Dewey delivers against a deliberate striving for an American Philosophy, and seeks to understand cultures as "spiritual
  ecologies" that sustain the basic need for meaning. This person is interested in the problems of the "community of the present," especially in terms of transmitting patterns of suffering, prejudice, and
  hate as part of their self-identities.
