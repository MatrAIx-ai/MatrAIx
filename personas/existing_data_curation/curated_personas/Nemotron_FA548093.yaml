  hobbies: '[''salsa dancing'', ''hiking in the Bay Area'', ''tech meetups'', ''hackathons'', ''board‑game nights'', ''coding mentorship for high‑school girls'', ''church choir volunteering'', ''yoga'',
    ''mindfulness meditation'', ''street photography'', ''southern‑california fusion cooking'']'
  career_goals: Breya aspires to evolve into a lead full‑stack engineer or tech‑lead role where she can shape product direction while championing inclusive design. She plans to earn an AWS Solutions Architect
    certification and deepen her expertise in serverless architecture to build more resilient services. Long‑term, she hopes to launch a SaaS platform that offers mental‑health resources tailored for high‑pressure
    tech environments, drawing on her own experiences with anxiety. Breya also aims to increase the visibility of Black women in tech by expanding mentorship programs through organizations like Black Girls
    Code and speaking at industry conferences about both technical innovation and workplace well‑being.
