personas:
  professional: Breya Shahid, a 28‑year‑old full‑stack web developer known for turning hackathon ideas into polished, user‑centric apps, blends curiosity about emerging serverless tech with a laid‑back
    sprint style, mentors junior coders with empathy, and aspires to lead a product team that champions inclusive design.
  sports: Breya Shahid, an avid hiker of the Bay Area’s coastal trails and a weekend salsa‑dance enthusiast, roots for the Golden State Warriors and San Jose Earthquakes while occasionally joining a local
    women’s soccer pickup league and a hiking club that meets every Saturday.
  arts: Breya Shahid, a street‑photography aficionado who captures spontaneous moments of urban life with a Fuji X‑100, draws creative inspiration from the rhythms of Marc Antonio and Celia Cruz, and regularly
    attends performances at the San Francisco Playhouse and local open‑mic poetry nights.
  travel: Breya Shahid, who plans trips with a mix of spontaneity and a spreadsheet, has trekked the redwoods of Northern California, explored the culinary scene of New Orleans, and dreams of photographing
    the streets of Lisbon while balancing occasional budget constraints with a love for weekend getaways.
  culinary: Breya Shahid, a self‑taught home chef, blends Southern comfort—think shrimp and grits and collard greens—with Californian freshness, frequently seasoning dishes with smoked paprika, avocado,
    and citrus, and enjoys experimenting with fermented hot sauces while mastering the art of the perfect sous‑vide chicken.
  core: Breya Shahid, a socially energetic full‑stack developer with a penchant for spontaneous salsa dancing, hiking, and anxious overthinking, balances a flexible work style with a relentless drive to
    uplift under‑represented voices in tech.
background:
  cultural: Breya identifies as a Black American woman whose upbringing was steeped in African‑American cultural traditions, such as Sunday family gatherings, storytelling, and a love for soul, R&B, and
    hip‑hop music. Growing up in a diverse urban environment before moving to the Bay Area, she carries forward values of community solidarity and resilience. In her professional life, she actively engages
    with Black tech networks and advocates for representation and equity in the industry. Her cultural heritage informs her design sensibility, pushing her to prioritize accessibility and inclusivity, while
    her experiences in a progressive Silicon Valley setting reinforce her commitment to social impact and community empowerment.
