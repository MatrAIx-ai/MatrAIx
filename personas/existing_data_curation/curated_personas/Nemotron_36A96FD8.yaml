  hobbies: '[''Cooking traditional Mexican cuisine'', ''Herb gardening'', ''Reading historical biographies'', ''Chess puzzles'', ''Knitting'', ''Birdwatching'', ''Photographing urban nature'', ''Participating
    in cultural festivals (Día de los Muertos, Pilsen Festival)'', ''Volunteering as storyteller for senior center'', ''Mentoring youth in STEM'']'
  career_goals: Although no longer employed, Margarita’s ambition is to leave a lasting legacy that supports Mexican‑American youth in STEM. She plans to set up a modest scholarship fund at a local community
    college, mentor high‑school students through Chicago’s STEM outreach programs, and write a memoir that weaves her family’s migration story with reflections on scientific inquiry. Additionally, she aims
    to expand technology‑training workshops for seniors at her community center, helping older adults stay connected and empowered.
