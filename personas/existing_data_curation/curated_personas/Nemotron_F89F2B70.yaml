  career_goals: Melanie aims to advance from bartender to bar manager within the next two years, securing a hospitality management certification to strengthen her leadership credentials. In the longer term,
    she dreams of opening a boutique cocktail lounge in the Boise area that highlights locally sourced ingredients and offers mixology workshops. Her competitive nature fuels a desire to compete in regional
    bartending contests and to become known for innovative cocktail creations. She also hopes to mentor other aspiring bartenders and eventually oversee multiple venues.
