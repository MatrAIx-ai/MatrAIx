personas:
  professional: Melanie Prioletti, a 25‑year‑old bartender with five years of experience, blends sharp mixology expertise and meticulous inventory control with a skeptical eye for patron behavior, positioning
    them to swiftly ascend to bar manager while channeling their competitive drive into regional cocktail contests.
  sports: Melanie Prioletti, an avid hiker of the Boise Foothills and member of the Boise Trail Club, balances yoga sessions at sunrise with weekend pickup soccer games for the local Boise United squad,
    while cheering on the Boise State Broncos football team and following the Colorado Rockies for a splash of MLB excitement.
  arts: Melanie Prioletti, who strums acoustic guitar at downtown open‑mic nights and draws inspiration from artists like John Mayer, The Avett Brothers, and local folk singer Maya Rivera, frequently attends
    live shows at the Knitting Factory and curates eclectic playlists that blend indie rock with classic blues for their cocktail workshops.
  travel: Melanie Prioletti prefers adventure‑packed road trips to places like Yellowstone and the Oregon Coast, often planning itineraries with friends to include hiking, local breweries, and camping under
    the stars, while budgeting carefully to save for a future culinary tour of Spain's tapas bars as a stepping stone toward their dream lounge.
  culinary: Melanie Prioletti, an intermediate home‑cook, experiments with spice‑forward dishes such as jalapeño‑infused shrimp tacos and wild mushroom risotto, while brewing hop‑rich IPAs and crafting
    citrus‑bright cocktails that showcase fresh herbs like basil and rosemary, reflecting their love for bold flavors and local ingredients.
  core: Melanie Prioletti is a sociable, competitive 25‑year‑old bartender whose skeptical eye and curiosity drive them to master mixology, hustle through bustling nights, and relentlessly pursue a future
    boutique lounge despite occasional over‑caffeination and forgetfulness.
background:
  cultural: Melanie was raised in a white, middle‑class family in the Pacific Northwest/Idaho region, where community ties, self‑reliance, and a love of the outdoors are valued. Growing up near Boise, she
    was exposed to a growing craft beverage scene and a small‑town hospitality culture that emphasizes personal connection and modest entrepreneurship. Her marriage at a young age reflects the region’s
    emphasis on family stability, while her social activities—group outings, local festivals, and outdoor recreation—mirror the community‑oriented lifestyle typical of Canyon County.
