  career_goals: Although Yehia is not currently in the formal workforce, his ambition is to deepen his impact on the local community and nurture his personal growth. He aims to lead the creation of a neighborhood
    garden that brings together residents of all ages, develop a mentorship program for at‑risk youth leveraging his life experience, and take on a regular volunteer role at the Sarasota Art Museum. He
    also hopes to improve his digital literacy to document his garden project and share stories through a personal blog or memoir. Ultimately, Yehia aspires to remain an active, harmonious presence in Sarasota
    while exploring new artistic pursuits.
