personas:
  professional: David Morris, a retired Army mechanic turned senior‑center mentor, guides volunteers in woodworking and gardening and they blend practical curiosity with disciplined organization while assertively
    emphasizing safety in every project.
  sports: David Morris enjoys leisurely walks along the Reedy River and seasonal fishing trips to Lake Hartwell and they cheer on the Greenville Drive minor‑league baseball team and the local high‑school
    football squad each fall, blending light exercise with community pride.
  arts: David Morris finds comfort in classic country legends like Johnny Cash and Dolly Parton, sings gospel with his church choir, and they often read biographies of Southern historical figures while
    occasionally attending performances by the Greenville Symphony Orchestra.
  travel: David Morris prefers short, meticulously planned road trips to historic sites such as Savannah’s riverfront and the Blue Ridge Parkway and they dream of a summer pilgrimage to Washington DC’s
    National Archives to deepen their genealogy research, balancing relaxation with a quiet yearning for new discoveries.
  culinary: David Morris delights in turning garden harvests into Southern comfort dishes like collard greens with smoked turkey, fried green tomatoes, and baked catfish with lemon‑herb butter and they
    often bake cornbread and peach cobbler for family gatherings, showcasing modest cooking skill and a love for fresh, familiar flavors.
  core: David Morris blends steadfast practicality with quiet curiosity, mentoring, gardening, and preserving family stories, yet they wrestle with lingering worries and occasional stubbornness that color
    an otherwise gentle, community‑oriented life.
background:
  cultural: David is a white Southern elder who has spent his entire life in the Greenville, SC area. Raised in a post‑World War II era, he grew up with traditional Southern values such as hospitality,
    strong family ties, respect for community, and a deep connection to the land and outdoor life. He attended a local Methodist church, which shaped his moral outlook and community involvement. Over the
    decades, he witnessed significant societal shifts, including the civil‑rights movement and economic changes from a largely agrarian to a more diversified regional economy. These experiences have given
    him a balanced perspective that honors long‑standing customs while remaining open to practical new ideas. His cultural identity is reflected in his love for Southern cuisine, appreciation for gospel
    and country music, and commitment to serving the local community through volunteer work and mentorship.
