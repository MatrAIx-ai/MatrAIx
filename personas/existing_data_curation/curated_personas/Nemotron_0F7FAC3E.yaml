  career_goals: Desiree aims to enroll in a visual arts or graphic design program at a community college, eventually transferring to a university to earn a BFA. She dreams of building a freelance illustration
    practice that blends modern digital aesthetics with Mexican cultural motifs, allowing her to work flexibly from anywhere. In the long term, she hopes to curate community‑focused art exhibitions, work
    for a nonprofit that promotes Latino arts, and perhaps launch an online platform that showcases emerging Mexican‑American artists. Her competitive edge drives her to seek recognition through solo shows
    and collaborations with local galleries.
