    service excellence","Time management and prioritization","Training program design"]'
  hobbies: '["Reading literary fiction and historical biographies","Journaling and reflective writing","Solo nature walks and hiking along the Lake Superior shoreline","Landscape photography","Crochet and
    knitting projects","Attending small book club meetings","Exploring vintage bookstores and antique shops","Playing piano / listening to classical music","Volunteering at adult literacy programs"]'
  career_goals: Maxine aims to move from floor supervision to a district‑manager role within the next five years, overseeing multiple store locations while implementing a consistent employee‑development
    framework that emphasizes skill growth and well‑being. She plans to earn a professional retail‑management certification and complete graduate coursework in organizational psychology to deepen her understanding
    of workplace dynamics. Long‑term, she envisions transitioning into a consulting or training position that lets her shape retail culture regionally, while also exploring leadership roles within local
    cultural institutions that align with her humanities background.
