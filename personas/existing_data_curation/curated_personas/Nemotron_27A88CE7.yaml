personas:
  professional: Aurea Betanzos, a budding junior architect who builds elaborate LEGO cities with meticulous planning, channels an imaginative mind into design while applying their organized, methodical
    nature to follow step‑by‑step instructions and a competitive spark to out‑shine peers in the classroom LEGO challenge.
  sports: On the soccer field, Aurea Betanzos dazzles as a forward for the local Houston Dynamo youth club, practices drills with the same competitive fire they admire in the Houston Astros' spring training,
    and adds rhythmic gymnastics at the community center to keep their energy buzzing year‑round.
  arts: Aurea Betanzos sketches whimsical dragons inspired by Pixar's Inside Out, belts out the chorus of Disney's Moana during karaoke, and enthusiastically taps to the lively beats of Punta and marimba
    at family gatherings, all while idolizing the vibrant colors of Frida Kahlo’s paintings and the playful storytelling of Dr. Seuss, and they often rehearse the songs with a grin.
  travel: Excited by adventure, Aurea Betanzos has already trekked the backyard trails of Houston’s Hermann Park, taken a family road trip to the historic Alamo in San Antonio, and dreamed of exploring
    the colorful markets of Oaxaca, with a sunny wish to ride the cable cars of Medellín next summer, and they keep a scrapbook of postcards from every place they imagine visiting.
  culinary: Aurea Betanzos enjoys the cheesy goodness of homemade baleadas filled with refried beans, avocado, and crumbled queso fresco, loves scooping up sweet tamales with a side of cilantro‑lime rice,
    and proudly attempts to whisk together a simple mac‑and‑cheese in the kitchen, though they occasionally sneak extra chocolate chips into the mix when feeling mischievous.
  core: Aurea Betanzos blends boundless imagination with meticulous planning, a competitive spark and a heart that feels emotions like fireworks, turning every LEGO set, drawing, and soccer game into a
    vivid adventure while occasionally letting anxiety steal the spotlight, and they channel that intensity into creative bursts.
background:
  cultural: Aurea comes from a Honduran family that maintains strong ties to its heritage while living in Houston. Spanish is spoken at home, and she celebrates traditional Honduran holidays such as Semana
    Santa and Día de la Independencia with family gatherings, traditional foods like baleadas and tamales, and music such as Punta and marimba. Her parents encourage bilingualism and cultural pride, and
    she participates in community events organized by the local Honduran cultural association. At school, she navigates a multicultural environment, blending Honduran customs with the diverse influences
    of Houston's vibrant, multicultural city.
attributes:
  skills: '[''creative storytelling'', ''detailed drawing'', ''basic reading comprehension'', ''elementary arithmetic'', ''LEGO construction'', ''organizing group activities'', ''methodical task execution'',
    ''leadership in playground games'', ''critical observation'']'
  hobbies: '[''drawing and painting'', ''reading fantasy picture books'', ''building with LEGO bricks'', ''role‑playing adventure games'', ''soccer practice'', ''community dance classes'', ''visiting museums'',
    ''solving puzzles and brain teasers'', ''exploring local parks'', ''listening to music and singing'']'
  career_goals: Aurea dreams of becoming an illustrator of children's books or a young scientist who invents imaginative gadgets. She aims to win school art contests and science fairs, hoping one day to
    design her own illustrated worlds or develop creative solutions that help her community. She aspires to combine her love for art and curiosity about how things work, eventually working as a visual designer
    or inventor.
