personas:
  professional: Dianny Murillo, an aspiring event coordinator who is completing a degree in tourism management and targeting a PMP certification, blends meticulous project-management skills, bilingual communication,
    and a vibrant social energy to orchestrate community festivals and municipal initiatives, while leveraging their disciplined organization and assertive leadership style to meet high standards, they
    thrive under pressure.
  sports: Dianny Murillo, a beach-volleyball enthusiast who trains with the local 'Coastline Spikers' club on the northwestern shoreline, cheers for the Cangrejeros de Santurce baseball team during summer
    weekends, follows the Miami Heat for a taste of NBA excitement, bases their fitness routine on a mix of sand drills, early-morning jogs along coastal trails, and weekly yoga to stay flexible, they also
    compete in local 5-k runs whenever time permits.
  arts: Dianny Murillo, whose artistic life spins between dancing to reggaeton hits by Bad Bunny and salsa classics by Marc Anthony at local clubs, captures sunrise vistas and vibrant street scenes with
    a Canon EOS, curates a colorful Instagram feed featuring works by Frida Kahlo for inspiration, and finds motivation in personal-development podcasts by Simon Sinek while immersing themselves in Caribbean
    nightlife, they regularly share these images with a growing audience.
  travel: Dianny Murillo, a travel-savvy 26-year-old who plans trips with meticulous itineraries using Google Sheets, enjoys weekend getaways to Rincon's surf spots, overnight hikes in Vieques, and cultural
    excursions to Cartagena's historic walled city, while dreaming of a sustainable tourism project visit to Barcelona's coastal neighborhoods, they balance adventure with budget-friendly stays in boutique
    hostels.
  culinary: Dianny Murillo, a passionate home-cook who perfects mofongo with crispy plantain leaves, simmers arroz con gandules using a rich sofrito, fries alcapurrias stuffed with seasoned meat, experiments
    with seasonal seafood in paella-style dishes, and shares these family-style meals at weekly potlucks while documenting recipes on a personal blog, they love pairing each plate with a crisp local soda.
  core: Dianny Murillo, an organized, community-driven night owl who schedules every event down to the minute yet often forgets to floss after late-night salsa sessions, blends curiosity with practicality
    to turn island traditions into thriving tourism projects, they thrive on turning ideas into action.
background:
  cultural: 'Dianny grew up in the coastal town of Quebradillas, where the rhythm of the sea and the close‑knit community shape daily life. Puerto Rican culture is central to her identity: she cherishes
    family gatherings, the warmth of neighbors, and the island’s rich musical traditions such as plena, bomba, and modern reggaetón. Her upbringing emphasized bilingual fluency, religious festivals, and
    a deep respect for the natural environment, especially the nearby cliffs and beaches that attract both locals and tourists. These cultural roots inform her values of hospitality, resilience, and communal
    solidarity, and they drive her desire to promote sustainable tourism that honors her heritage while creating new opportunities for her hometown.'
attributes:
  skills: '[''Project Coordination'', ''Event Planning'', ''Community Outreach'', ''Bilingual Communication (Spanish/English)'', ''Microsoft Office Suite'', ''Google Workspace'', ''Social Media Management'',
    ''Time Management'', ''Conflict Resolution'', ''Team Leadership'']'
  hobbies: '[''Dancing (Reggaetón, Salsa)'', ''Volunteering at community festivals'', ''Beach volleyball'', ''Hiking coastal trails'', ''Cooking Puerto Rican cuisine'', ''Photography'', ''Social media content
    creation'', ''Reading personal development books'']'
  career_goals: Dianny aims to complete her bachelor's degree in Tourism Management or Business Administration within the next two years and earn a Project Management Professional (PMP) certification. Her
    short‑term goal is to secure an entry‑level position as an event coordinator or community development associate with a municipal agency or a local tourism board, where she can apply her organizational
    strengths and sociable nature to promote sustainable tourism in Quebradillas. Long‑term, she aspires to become a senior project manager leading multi‑disciplinary initiatives that preserve Puerto Rico’s
    coastal heritage while boosting the local economy. Ultimately, she envisions launching her own boutique event‑planning firm that specializes in culturally authentic celebrations and eco‑friendly festivals.
