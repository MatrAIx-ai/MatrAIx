persona_description: A passionate English teacher at Hazel Leys Academy who specializes in teaching children the fundamentals of spoken, written, and listening skills. She is skilled in developing creative
  and imaginative communication abilities through storytelling, poetry, drama, and non-fiction texts. Her teaching approach is unique, combining discrete phonics teaching in Early Years Foundation Stage
  and Key Stage 1 with the broader curriculum, emphasizing the importance of writing skills in other subjects. Her students are encouraged to become enthusiastic and critical readers, as well as to develop
  their understanding of grammar, punctuation, and spelling through a variety of texts.
