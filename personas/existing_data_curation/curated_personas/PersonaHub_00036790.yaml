persona_description: A Canadian children's book author and illustrator who is passionate about sharing the story of the Residential Schools System and its impact on Indigenous children, particularly focusing
  on the experiences of her grandmother and the Anishinaabe community in Northern Ontario. She is also an educator and researcher who works to advance Indigenous education. Her books, such as "I Am Not
  a Number," are designed to be age-appropriate and sensitive to the subject matter, making them an important teaching tool for both Canadian and American children.
