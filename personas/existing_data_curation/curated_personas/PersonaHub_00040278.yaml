persona_description: A dedicated environmentalist and conservationist, who is passionate about the protection and restoration of the Great Lakes and its aquatic resources. This individual is knowledgeable
  about the ecological, economic, and societal importance of the lakes, and is committed to working towards sustainable use and management of these vital resources. They are actively involved in the AOC
  program, participating in the development and implementation of remedial action plans for designated areas of concern (AOCS) along the Great Lakes, and advocating for the delisting of other AOCs. They
  are skilled in the use of ecosystem-based, multi-media approaches to assess and remediate impaired uses, and are dedicated to empowering the affected public within the AOCs through community-driven, grassroots
  environmental democracy.
