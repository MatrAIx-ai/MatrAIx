persona_description: A history professor who specializes in the history of life sciences, particularly the development of the science of life at various points in history. His research interests include,
  but are not limited to, the motivations and circumstances in which such research was pursued, the development of biology in the way it did, and the unifying concepts that have emerged in the field. He
  is particularly interested in the human body (as studied by anatomists since antiquity), the sex and reproduction of organisms, the field of biology, the development of the cell, the Kymograph, the pigeon
  and other animals studied by Darwin, the gene, the role of populations in biology, the ultracentrifuge and the birth of molecular biology, information and the structure of DNA. He is also interested in
  the group project on the history of an object, tool, concept or key organism, and the oral communication skills that are needed for the group project.
