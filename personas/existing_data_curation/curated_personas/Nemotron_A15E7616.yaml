  career_goals: Denard dreams of a future where he blends his curiosity about technology with his practical nature. He aims to excel academically, graduate high school with strong STEM grades, and earn
    a scholarship to study computer science or engineering. He envisions becoming a software engineer or a robotics specialist who creates tools that benefit his rural community, such as apps for local
    farmers or educational games for younger students. He also harbors an interest in veterinary work because of his love for animals, and he hopes to mentor younger kids, reflecting his cooperative spirit.
