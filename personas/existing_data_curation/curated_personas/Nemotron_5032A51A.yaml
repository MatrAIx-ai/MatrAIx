  hobbies: '[''Basketball League'', ''Urban Cooking'', ''Live Music Events'', ''Community Volunteering'', ''Podcast Listening'', ''Travel'', ''Sneaker Collecting'']'
  career_goals: Howard aims to move from front-line sales to leadership within the next three years. He plans to earn a certificate in retail management and eventually complete a bachelor's degree in business
    administration. His short-term goal is to become an assistant store manager, applying his organized mindset and people-focused approach to improve operational efficiency and staff morale. Long-term,
    he aspires to be a district manager overseeing several stores in the Long Island region or to open his own specialty boutique that reflects his passion for community-centric retail experiences.
