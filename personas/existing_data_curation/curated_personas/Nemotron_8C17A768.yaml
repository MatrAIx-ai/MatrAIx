  hobbies: '[''Gospel choir singing'', ''Coaching adult soccer'', ''Community block parties'', ''Heirloom vegetable gardening'', ''Visiting Black history museums'', ''Attending jazz concerts'', ''Cooking
    Southern cuisine'', ''Traveling to historic African‑American sites'', ''Reading biographies of civil‑rights leaders'', ''Photography of local cultural festivals'']'
  career_goals: Jeremiah aims to champion an inclusive, district‑wide early childhood initiative that integrates culturally responsive teaching and expands affordable childcare options for low‑income families
    in Orange County. He plans to earn a bachelor’s degree in Education Administration to complement his extensive hands‑on experience, and to mentor emerging administrators through a formal apprenticeship
    program. Long‑term, he envisions influencing state policy on early learning equity and possibly founding a nonprofit that provides high‑quality, community‑driven preschool services.
