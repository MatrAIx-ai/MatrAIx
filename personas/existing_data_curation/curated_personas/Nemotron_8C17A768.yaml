personas:
  professional: Jeremiah Johnson, a veteran early childhood administrator with over three decades of experience in Florida, blends practical curiosity and compassionate leadership to design developmentally
    appropriate, culturally responsive curricula, secure grant funding, manage budgets, ensure regulatory compliance, and mentor emerging leaders while balancing organization with flexibility in a collaborative
    district setting.
  sports: Jeremiah Johnson coaches a recreational adult soccer team, regularly plays pickup basketball at the local community center, avidly follows Orlando City SC and the Orlando Magic, and participates
    in a weekly senior golf league at a nearby country club.
  arts: Jeremiah Johnson leads a vibrant gospel choir, frequently attends jazz concerts featuring Wynton Marsalis and Esperanza Spalding, and curates a collection of vinyl records by Mahalia Jackson and
    Aretha Franklin, letting music shape both community gatherings and personal downtime.
  travel: Jeremiah Johnson explores historic Southern sites such as Selma, the Gullah district of Charleston, and the National Center for Civil and Human Rights in Atlanta on organized heritage tours, prefers
    relaxed itineraries that include family visits and local culinary experiences, and dreams of a future trip to Savannah’s historic riverfront for a combined history and music festival.
  culinary: Jeremiah Johnson delights in cooking Southern comfort dishes like smoked collard greens, shrimp and grits, and sweet potato pie, often seasoning with smoked paprika and fresh okra harvested
    from their heirloom garden, while also incorporating Caribbean jerk spices into weekend barbecues for family gatherings.
  core: Jeremiah Johnson is a community‑driven educator who balances practical curiosity with compassionate leadership, loves gospel music, garden‑grown heirloom veggies, and heritage travel, yet occasionally
    overspends on barbecue sauces and forgets eye check‑ups.
background:
  cultural: Jeremiah identifies as African‑American and was raised in Orlando’s historically Black neighborhoods, where church, family, and community activism shaped his values. Growing up during the post‑civil‑rights
    era, he witnessed the power of collective effort and the importance of educational equity. He maintains strong ties to his local Black church, where he volunteers as a youth mentor, and participates
    in annual cultural festivals that celebrate African‑American heritage. His culinary traditions draw from Southern comfort food while honoring the diverse flavors brought by Caribbean relatives. These
    cultural roots inform his dedication to fostering inclusive, supportive environments for children and families.
attributes:
  skills: '[''Curriculum Design'', ''Program Management'', ''Staff Supervision'', ''Budget Management'', ''Regulatory Compliance'', ''Community Outreach'', ''Conflict Resolution'', ''Grant Writing'', ''Data‑Driven
