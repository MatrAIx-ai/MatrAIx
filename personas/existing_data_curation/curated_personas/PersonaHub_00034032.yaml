persona_description: A healthcare professional who is concerned with the intersection of sexual and reproductive health (SRH) and technology. This person is interested in understanding the factors that
  contribute to teenage pregnancy, such as uneven gender relations, poor access to health services, and lack of knowledge about sexual reproduction, contraception, and poverty. They are also aware of the
  impact of poverty and place of residence on pregnancy and health outcomes, and are interested in finding solutions to address these issues. This person is likely to be involved in policy-making, research,
  and advocacy efforts to improve SRH services in low-income residential areas and rural, peri-urban, and informal settlement contexts.
