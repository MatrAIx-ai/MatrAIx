personas:
  professional: Johnny Chery is a veteran community events coordinator in Memphis who leverages their methodical planning skills, hands‑on woodworking knowledge, and passion for music to organize neighborhood
    festivals, youth workshops, and church choir performances, while quietly nurturing a side‑business of handcrafted furniture that reflects their love of Southern craftsmanship.
  sports: Johnny Chery is a steadfast supporter of the Memphis Grizzlies and the Tennessee Volunteers football team, regularly attending Saturday night basketball games at FedExForum and autumn college
    football tailgates, while keeping fit by early‑morning fishing trips on the Mississippi, occasional pickup basketball at the community center, and a weekly yoga class to counterbalance their woodworking
    back strain.
  arts: Johnny Chery immerses themselves in the world of blues and jazz, frequently catching live sets at B.B. King's Blues Club, humming along to the piano licks of John Coltrane on vinyl, and participating
    in a local jam circle where they trade harmonica riffs with fellow enthusiasts, while also curating visits to the Memphis Brooks Museum of Art to study works by 20th‑century painters and taking inspiration
    for their own woodcarvings.
  travel: Johnny Chery plans their travel with an eye for Southern history, having already explored the National Civil Rights Museum in Memphis, a weekend road trip to the civil war battlefields of Vicksburg,
    and a nostalgic visit to Savannah's historic squares, while dreaming of a future cruise along the Intracoastal Waterway that blends relaxation with opportunities to photograph riverfront blues festivals.
  culinary: Johnny Chery delights in reinventing Southern classics such as smoked pulled pork with an azalea honey glaze, shrimp and grits spiced with smoked paprika, and collard greens cooked with cracklin’
    and a splash of apple cider vinegar, often sourcing fresh heirloom tomatoes from their own garden and experimenting with bourbon‑infused barbecue sauces during weekend cook‑outs for friends and family.
  core: Johnny Chery, a 58‑year‑old garden‑to‑table enthusiast and community organizer, blends a pragmatic love for Southern food, blues music, and handcrafted woodwork with a restless curiosity that keeps
    them juggling workshops, festivals, and a modest side business, all while occasionally letting a stray commission slip through their otherwise meticulous schedule.
background:
  cultural: Johnny grew up in the Mississippi Delta region as part of a close‑knit African‑American community. His family’s roots trace back to sharecroppers who migrated from rural Mississippi and Arkansas
    during the Great Migration, bringing with them rich traditions of gospel music, soul food cooking, and a deep sense of community solidarity. The civil‑rights era of the 1960s left a lasting imprint
    on his worldview, fostering a respect for social justice and collective action. His cultural identity is shaped by the Southern black church, the blues heritage of nearby Memphis, and family gatherings
    centered around storytelling, music, and food. Today, he continues to celebrate these traditions through his involvement in church activities, local festivals, and community service, while also embracing
    contemporary influences through art and music.
attributes:
  skills: '["Community event planning and coordination", "Volunteer program management", "Household budgeting and financial tracking", "Basic carpentry and woodworking", "Southern gardening and horticulture",
