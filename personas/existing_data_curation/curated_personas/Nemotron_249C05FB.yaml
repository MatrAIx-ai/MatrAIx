  hobbies: '["Attending blues and jazz concerts", "Playing harmonica", "Visiting art galleries and museums", "Gardening (azaleas, camellias, heirloom vegetables)", "Cooking Southern cuisine and BBQ", "Singing
    in church choir", "Volunteering at local food bank", "Fishing on the Mississippi River", "Researching genealogy and local history", "Traveling to cultural heritage sites"]'
  career_goals: Johnny hopes to expand his impact on the local community by leading art‑based workshops for youth at the community center, mentoring teenagers interested in music and crafts, and possibly
    turning his woodworking hobby into a small home‑based business that sells handcrafted furniture or décor. He also aims to continue learning by taking a community‑college course in digital photography
    and African‑American history, and to travel with his wife to culturally significant sites across the South, such as the National Civil Rights Museum in Memphis and historic churches in the Mississippi
    Delta. Maintaining his health and an active lifestyle so he can keep participating in group activities and community service remains a top personal goal.
