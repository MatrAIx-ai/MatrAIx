  hobbies: '[''Reading (science non-fiction and mystery novels)'', ''Birdwatching'', ''Gardening'', ''Hiking in Ouachita National Forest'', ''Knitting'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking
    Southern cuisine'', ''Home brewing'', ''Genealogy research'', ''DIY woodworking projects'']'
  career_goals: Leslie aims to advance to a district‑level leadership role, such as Director of Early Childhood Programs or Assistant Superintendent, where she can champion innovative STEM initiatives across
    multiple schools in rural Arkansas. She is committed to securing sustainable funding for technology upgrades, establishing a model STEM preschool program that can be replicated statewide, and mentoring
    emerging educators to build capacity in data‑informed instruction. Ultimately, she hopes to leave a legacy of enhanced educational equity for children in underserved rural communities.
