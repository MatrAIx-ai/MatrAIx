persona_description: A group of education students at the University of Texas at Austin, who are part of the pre-service literacy instruction program, and are experimenting with the use of Android tablets
  and pen technology to enhance their personalized instruction and interventions for their students. They are part of the College of Education at the university and are using N-trig's active pens and pen-enabled
  tablets to maintain digital recordings of their handwritten notes during writing conferences with students. They are using the pen technology to make student writing conferences more productive and efficient.
