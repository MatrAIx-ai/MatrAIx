  hobbies: '[''gardening'', ''community garden volunteering'', ''woodworking'', ''hiking'', ''yoga'', ''bowling league'']'
  career_goals: Nora aims to move into a supervisory role within the next three years, targeting a foreman or site‑lead position where she can mentor younger workers, especially women entering the trades.
    She plans to obtain a Level 2 OSHA certification and complete an associate’s degree in construction management to strengthen her leadership credentials. Long‑term, she envisions opening a small, family‑owned
    contracting firm that emphasizes safety, reliability, and community hiring, providing stable, well‑paid jobs for locals in Trumbull County.
