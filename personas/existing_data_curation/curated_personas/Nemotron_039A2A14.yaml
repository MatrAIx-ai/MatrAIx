  career_goals: Erica aims to build a stable career that leverages her organizational strengths and love for community interaction. Over the next year she plans to complete a GED and enroll in a community‑college
    associate program in Business Administration with a focus on Event Management. She hopes to secure an entry‑level administrative assistant position at a local nonprofit or municipal office, gaining
    professional experience while continuing to volunteer. In the medium term, Erica envisions becoming a junior event coordinator, eventually advancing to a senior manager role where she can design large‑scale
    community festivals and cultural celebrations. She also keeps an eye on entrepreneurship, aspiring to launch her own boutique event‑planning service tailored to the cultural and family events of Amarillo’s
    diverse community.
