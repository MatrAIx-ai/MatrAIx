personas:
  professional: Erica Alexander is a budding event‑management professional who leverages their structured, detail‑oriented mindset and natural competitiveness to coordinate volunteer teams at community
    festivals, while using Microsoft Office and social‑media tools to keep everything on schedule.
  sports: Erica Alexander is a dedicated member of the Amarillo Violets women’s basketball league, a line‑dancing enthusiast at the local Sunday socials, and an avid hiker who tackles the trails of Palo
    Duro Canyon on weekends, while cheering for the Dallas Stars, the Houston Texans, and the Texas Rangers.
  arts: Erica Alexander expresses creativity through a powerful gospel choir voice at church, curates R&B and hip‑hop playlists featuring Beyoncé, Anderson .Paak, and Kirk Franklin, and enjoys line‑dancing
    to classic country hits from George Strait, all of which shape their vibrant social gatherings.
  travel: Erica Alexander prefers structured weekend getaways, often planning road trips to Austin’s music scene, Santa Fe’s art markets, or the New Mexico desert for sunrise hikes, balancing a modest travel
    budget with a desire to explore new cultures while keeping a close eye on family responsibilities.
  culinary: Erica Alexander loves experimenting with soul‑food classics like fried catfish, collard greens, cornbread, and sweet‑potato pie, cooking for friends in modest kitchen space, while occasionally
    over‑seasoning dishes with extra hot sauce and improvising with pantry staples like canned beans and spices.
  core: Erica Alexander blends structured ambition with a love for community, turning competitive energy into organized events, while juggling budget‑savvy habits, a busy sports schedule, and a soulful
    taste for cooking and music.
background:
  cultural: Erica grew up in an African‑American family in Amarillo, Texas, where the close‑knit Black community places a strong emphasis on church, family gatherings, and cultural traditions. Her parents,
    active volunteers, taught her the values of Southern hospitality, respect for heritage, and the importance of community service. Celebrations such as Juneteenth, soul food cook‑outs, and gospel music
    have shaped her identity. While living in a predominantly white region, Erica’s upbringing fostered resilience, pride in her Black heritage, and a commitment to fostering inclusive community events
    that reflect both her cultural roots and the broader Texan spirit.
