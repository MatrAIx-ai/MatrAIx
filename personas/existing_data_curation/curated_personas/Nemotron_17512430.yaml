personas:
  professional: Shane Thue, a retired manufacturing specialist who now mentors senior‑center volunteers, applies their decades of mechanical troubleshooting, small‑engine repair, and carpentry expertise
    to community projects, and their preference for structure and worry‑prone diligence make them the go‑to person for scheduling, budgeting and ensuring every DIY task is completed on time.
  sports: Shane Thue, an avid fisherman on the Cowlitz River and occasional participant in the local seniors’ walking club, supports the Seattle Seahawks, follows the Seattle Mariners, and enjoys watching
    the Portland Trail Blazers, while preferring low‑impact exercise that blends structure with the freedom of being outdoors for their daily routine.
  arts: Shane Thue, a fan of classic Westerns, regularly watches films starring John Wayne and Clint Eastwood, attends occasional piano concerts featuring works by Aaron Copland, and collects regional folk‑art
    prints by Chuck Beeson, all of which anchor their appreciation for storytelling and the rugged history of the Pacific Northwest.
  travel: Shane Thue, who plans trips meticulously on paper maps, favors road trips to national parks like Olympic and Mt. Rainier, enjoys weekend stays at historic B&Bs in Portland and Victoria, British
    Columbia, and dreams of a guided heritage tour of Dodge City, all while budgeting carefully to keep travel costs within their modest retirement allowance.
  culinary: Shane Thue, a competent home cook, regularly grills fresh salmon from their river catches with dill and lemon, sautés garden‑grown zucchini and heirloom tomatoes, and prides themselves on mastering
    a rustic sourdough loaf using local wheat flour, though they often forget to ice their cake until the last minute.
  core: Shane Thue blends hands‑on practicality with a love for structure, never missing a budget deadline, yet they can be easily rattled by uncertainty, spends weekends fishing and woodworking, and keeps
    a secret stash of vintage Western movie DVDs.
background:
  cultural: Shane comes from a white, multi‑generational Pacific Northwest family with roots in small‑town industries such as logging and manufacturing. Raised in a modest household that valued hard work,
    self‑reliance, and community cooperation, he internalized a pragmatic outlook and a respect for tradition. The cultural fabric of Tenino—a close‑knit, historically working‑class town—has reinforced
    his preference for structure, his cooperative nature, and his desire to contribute to communal harmony. While his upbringing emphasized practicality, he also inherited an appreciation for the outdoors
    and regional history, shaping his current lifestyle and interests.
