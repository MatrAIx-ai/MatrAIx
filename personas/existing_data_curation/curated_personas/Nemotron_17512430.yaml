  career_goals: Although retired from formal employment, Shane aims to remain purposeful by mentoring younger volunteers at the local senior center and offering occasional consulting on small‑scale home
    improvement projects. He hopes to preserve his health and independence, manage his retirement savings prudently, and support his spouse in maintaining a comfortable, well‑organized household. Shane
    also aspires to document the history of Tenino through oral‑history interviews, contributing to the town’s archives.
