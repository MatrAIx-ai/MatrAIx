  hobbies: '[''Soccer'', ''Folklorico dance'', ''Cooking Mexican cuisine'', ''Acoustic guitar'', ''Reading mystery novels'', ''Robotics kit building'', ''Animal shelter volunteering'']'
  career_goals: Cristina aims to combine her love for animals and practical problem‑solving by pursuing a career in veterinary medicine, eventually specializing in wildlife health. She also dreams of leveraging
    her STEM interests to study biomedical engineering, creating medical devices that serve underserved communities like hers. In the short term, she plans to earn a merit scholarship for a summer STEM
    camp, become varsity captain of her high school soccer team, and lead a community health outreach program that provides bilingual health information.
