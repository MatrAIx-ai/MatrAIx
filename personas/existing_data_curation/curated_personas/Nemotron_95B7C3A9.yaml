personas:
  professional: Cristina Sanjavier, a budding robotics enthusiast and youth soccer co-captain, blends their curiosity-driven engineering experiments with a competitive, organized approach to leading team
    tactics and school projects, and they often rally teammates with clear game plans.
  sports: Cristina Sanjavier shreds the midfield for the school's varsity soccer team, trains with the Eastside Youth Soccer Club, and they cheer for the local professional side City FC while incorporating
    plyometric drills and weekend hiking into their fitness routine to stay agile.
  arts: Cristina Sanjavier performs acoustic guitar covers of John Denver and Ed Sheeran at community events, joins the school folklorico dance troupe mastering traditional choreography, and they devour
    mystery novels by Agatha Christie during quiet evenings.
  travel: Cristina Sanjavier prefers road trips with their family, dreaming of weekend getaways to the Grand Canyon and a summer adventure in the coastal town of Monterey, while they balance school commitments
    and a modest travel budget.
  culinary: Cristina Sanjavier loves crafting tamales and pozole with their family, frequently experimenting with masa dough, roasted pork, and hominy, while they also master the art of perfecting guacamole
    and fresh salsa for casual get-togethers.
  core: Cristina Sanjavier is a competitively spirited teen who balances soccer, robotics, and folk dance with a practical curiosity, a knack for budgeting, and a love for hearty regional dishes, though
    they sometimes neglect routine health check-ups when schedules get tight.
background:
  cultural: Cristina is a Mexican‑American raised in Fairfield, Texas. Her household is bilingual, speaking both Spanish and English, and she celebrates Mexican traditions such as Día de los Muertos, Las
    Posadas, and Mexican Independence Day alongside Texas holidays. Family gatherings often revolve around cooking and music, reinforcing her cultural identity. She identifies strongly with the values of
    community, hard work, and respect for elders that are central to Mexican culture, while also embracing the friendly, small‑town spirit of Freestone County. Her cultural heritage informs her language
    fluency, culinary interests, and commitment to serving her multicultural community.
