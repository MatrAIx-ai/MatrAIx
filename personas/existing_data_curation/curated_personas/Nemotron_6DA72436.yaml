    center'']'
  career_goals: Leonardo aims to complete his Bachelor’s degree in Business Administration within the next three years, focusing on marketing and entrepreneurship. He aspires to advance to a district manager
    position for a retail chain, where he can apply his analytical mindset and leadership style to drive regional growth. Ultimately, he hopes to open a boutique gallery‑café that showcases emerging Mexican‑American
    artists, blending his managerial expertise with his passion for art and cultural expression.
