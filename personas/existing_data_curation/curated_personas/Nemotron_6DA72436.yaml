personas:
  professional: Leonardo Gibb, a shift manager at a regional grocery store and business student, leverages their methodical leadership, bilingual communication, and eye for visual design to streamline inventory,
    resolve customer issues, and craft eye‑catching promotional graphics using Canva.
  sports: Leonardo Gibb, a weekend jogger on the Illinois & Michigan Canal Trail and member of the Lockport Lions adult recreational soccer league, follows the Chicago Bears and Chicago Cubs closely, and
    balances a low‑key fitness routine with occasional basketball pick‑up games at a community center.
  arts: Leonardo Gibb, an avid watercolorist and digital collage creator, draws inspiration from the mural‑rich streets of downtown Chicago, listens to indie vinyl staples like Arcade Fire, Tame Impala,
    and local acoustic performers, and admires the works of Frida Kahlo and Banksy while volunteering art workshops for children.
  travel: Leonardo Gibb, a curious young traveler, has explored the historic markets of Oaxaca, the vibrant street art of Mexico City, and the lakeside cafés of Chicago, and dreams of photographing the
    desert night skies of Arizona and immersing in the jazz scene of New Orleans on future road trips.
  culinary: Leonardo Gibb, a home‑cook who skillfully prepares traditional mole and tamales using dried chiles de árbol, pasilla, fresh corn masa, and a splash of chocolate, enjoys experimenting with fusion
    dishes like mole‑glazed quinoa bowls, and occasionally forgets to clean the kitchen after late‑night cooking sessions.
  core: Leonardo Gibb, a methodical yet creatively restless 20‑year‑old, balances a disciplined work ethic and budget with a quiet passion for art, music, and cooking, occasionally neglecting floss and
    kitchen cleanup in pursuit of their next watercolor or vinyl discovery.
background:
  cultural: Leonardo was raised in a bilingual Mexican‑American household in Lockport, Illinois. His parents immigrated from Jalisco, and he grew up celebrating Día de los Muertos, quinceañeras, and other
    Mexican traditions while also embracing Midwestern holidays and community events. Fluent in both Spanish and English, he often serves as a cultural bridge at work and in his community, sharing stories
    of his heritage and cooking family recipes for friends and colleagues.
