  career_goals: Although no longer in the formal workforce, Felicia remains driven by a desire to leave a lasting cultural imprint on her community. She aims to complete a memoir that weaves her family’s
    history with reflections on the art she has loved, and to donate the manuscript to the Matthews Public Library. She is working toward curating a traveling art exhibition that showcases works by senior
    artists in Union County, hoping to inspire younger generations. Additionally, Felicia wishes to mentor new volunteers at the local senior center, teaching them compassionate listening and inclusive
    event planning. She aspires to secure a modest grant to fund a quarterly lecture series on art history and social justice, bridging her curiosity for new ideas with her commitment to harmony.
