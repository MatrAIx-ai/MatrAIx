personas:
  professional: Felicia Makanui, a seasoned volunteer art coordinator and community storyteller, blends her keen curatorial eye, empathetic listening, and organized flexibility to design intergenerational
    exhibitions that satisfy her curiosity while channeling her anxiety into meticulous attention to detail.
  sports: Felicia Makanui, a dedicated member of the Charlotte Senior Strollers walking club, enjoys gentle morning walks through Freedom Park, follows the Carolina Panthers and Charlotte Hornets on game
    days, and attends low‑impact aqua‑aerobics classes at the community center to stay active.
  arts: Felicia Makanui, a watercolor painter inspired by the tranquil landscapes of Andrew Wyeth, regularly visits the Mint Museum to study works by contemporary regional artists such as Stephen M. Mitchell,
    and unwinds to the folk melodies of Norman Blake while attending community theater productions of August Wilson’s "Fences".
  travel: Felicia Makanui, an organized yet adventure‑seeking traveler, prefers carefully planned road trips to the Blue Ridge Parkway and historic Savannah, while dreaming of a leisurely cultural tour
    of Tuscany’s vineyards, all arranged within the budget of her modest pension and senior discount programs.
  culinary: Felicia Makanui, a confident home cook, delights in garden‑fresh heirloom tomato salads with basil vinaigrette, slow‑cooked chicken and dumplings, and occasional shrimp and grits at Charlotte’s
    Chef’s Table, while sharing surplus produce and homemade biscuits with neighbors.
  core: Felicia Makanui, a fiercely curious octogenarian, balances meticulous garden stewardship with a habit of over‑caffeinating while poring over art catalogues, channels her anxiety into detailed memoir
    writing, and never lets a missed knitting stitch go uncorrected.
background:
  cultural: Felicia grew up in the post‑World War II American South, raised in a middle‑class white family that valued education, church fellowship, and community service. Her formative years coincided
    with the civil‑rights era, which cultivated her deep sense of compassion and her commitment to social harmony. Living most of her adult life in Matthews, a suburb of Charlotte, she has blended traditional
    Southern hospitality with an openness to diverse cultural expressions, especially through art and literature. Her upbringing emphasized modesty, perseverance, and the importance of helping neighbours,
    shaping her lifelong dedication to volunteerism and intergenerational connection.
