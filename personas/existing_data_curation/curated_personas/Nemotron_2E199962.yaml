  career_goals: Gloria aspires to attend a specialized high‑school program focused on visual arts and later earn a degree in graphic design, UI/UX design, or art therapy. She dreams of combining her love
    for creative expression with her methodical approach to become a professional illustrator or a community arts program coordinator, where she can help others use art as a tool for well‑being. She also
    hopes to develop a portfolio that showcases both traditional and digital artwork while learning strategies to manage her anxiety through creative practice.
