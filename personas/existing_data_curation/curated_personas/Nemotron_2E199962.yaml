personas:
  professional: Gloria Copeland, a 14‑year‑old aspiring visual storyteller, merges her love for hand‑drawn illustration, digital tablet art, and photography into concept sketches for fantasy worlds, employing
    their organized and methodical approach, and they channel their curiosity into each piece while balancing schoolwork and occasional bouts of self‑doubt.
  sports: Gloria Copeland enjoys weekend nature hikes with family, participates in her middle school cross‑country club, roots for the local high school basketball team, follows the international soccer
    phenomenon of Manchester United during school breaks, and they stay active through occasional bike rides around the neighborhood.
  arts: Gloria Copeland immerses herself in the arts by drawing fantasy landscapes inspired by Hayao Miyazaki, experimenting with digital brushes reminiscent of Frida Kahlo’s bold colors, snapping candid
    shots in the style of Annie Leibovitz, strumming simple chords on an acoustic guitar like John Denver, devouring sci‑fi novels by Brandon Sanderson for narrative inspiration, and they often blend these
    influences into a unique personal style.
  travel: Gloria Copeland favors thoughtfully planned day trips to nearby state parks, cherishes annual visits to the county fair, dreams of exploring Kyoto’s cherry‑blossom gardens and the Scottish Highlands,
    prefers low‑budget, family‑oriented travel that lets them sketch on the go, and they keep a travel journal of sketches and notes for each destination.
  culinary: Gloria Copeland delights in baking chocolate‑chip and snickerdoodle cookies with her family, experiments with vanilla‑infused almond butter frosting, savors dishes like homemade pizza margherita
    and ramen bowls, often sprinkling fresh basil and chilies for extra flavor, and they occasionally over‑mix batter, resulting in a few flat cookies.
  core: Gloria Copeland is a meticulous teenage dreamer who balances a vivid artistic imagination with organized planning, a penchant for worry‑driven perfectionism, and a love for cookies, hikes, and late‑night
    sketching, and they often lose track of time while drawing under the night lamp.
background:
  cultural: Gloria was raised in a white, Midwestern family in the small village of Baltic, Ohio, within Tuscarawas County. Her upbringing reflects typical rural Ohio values of hard work, community involvement,
    and modesty. Family traditions include attending a local church, participating in community events such as the county fair, and celebrating seasonal holidays with home‑cooked meals. While rooted in
    these Midwestern customs, Gloria is also exposed to broader artistic influences through school programs, online art communities, and visits to nearby museums, allowing her to blend local cultural grounding
    with an openness to diverse creative ideas.
