  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Fishing'', ''Bowling'', ''Community volunteering'', ''Mentoring apprentices'', ''Attending local festivals'', ''Watching San Antonio Spurs
    games'', ''Family gatherings'', ''Playing guitar'']'
  career_goals: In the next few years, Jose aims to formalize a mentorship program for junior mechanics, achieve an OSHA 30‑hour certification, and lead a lean‑process improvement project that reduces downtime
    by 15%. As he approaches retirement, he hopes to transition into a consulting role, offering safety and efficiency training to local contractors, and to establish a small scholarship for high‑school
    students pursuing vocational trades. He also wants to stay active in his union and community organizations, ensuring his legacy of teamwork and safety endures.
