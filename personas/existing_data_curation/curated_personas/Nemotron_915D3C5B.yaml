personas:
  professional: Jose Capote, a veteran mechanical systems specialist with over 30 years in HVAC, plumbing, and equipment repair, leverages bilingual fluency and a calm, collaborative leadership style to
    coordinate crew schedules and solve complex issues, while balancing an innate preference for structured safety protocols with a spontaneous, flexible problem‑solving flair they bring to mentorship and
    lean‑process projects.
  sports: Jose Capote, a die‑hard San Antonio Spurs supporter who never misses a home game, spends their weekdays bowling with the senior league at the local alley and their weekends fishing on Lake Travis,
    and fits in light weight‑training to keep arthritis at bay, a routine they follow with cheerful consistency despite occasional missed workouts.
  arts: Jose Capote, who lights up the dance floor to the classics of Celia Cruz and the modern hits of Marc Anthony, attends Fiesta San Antonio for mariachi performances and enjoys the vibrant murals of
    Diego Rivera, often discussing the art over a glass of horchata, a habit they share enthusiastically with friends and family.
  travel: Jose Capote, who blends organized road‑trip itineraries with spontaneous detours, regularly drives the Hill Country wine trail, has visited the historic town of San Miguel de Allende and the Gulf
    Coast beaches of Texas, and dreams of a leisurely cruise through the Galápagos, a plan they keep alive through meticulous savings and flexible travel bookings.
  culinary: Jose Capote, an accomplished home chef known for perfectly seasoned tamales, smoky carne asada, and tangy salsa verde made with fresh cilantro and jalapeños, enjoys hosting weekend barbecues
    and occasionally over‑salts their dishes in the excitement, a quirk they laugh off while perfecting each recipe.
  core: Jose Capote blends seasoned mechanical expertise, a structured yet adaptable work ethic, and an exuberant social life that includes salsa dancing, fishing, and spirited Spurs fandom, all while navigating
    retirement planning and occasional over‑enthusiastic cooking—traits that define they outlook on life.
background:
  cultural: Jose grew up in a Mexican‑American household in San Antonio, where Spanish was spoken at home and Catholic traditions marked family life. His upbringing emphasized respeto, comunidad, and hard
    work, shaping his collaborative and courteous approach to both personal and professional relationships. He maintains ties to relatives in Mexico, celebrates Cinco de Mayo, Día de los Muertos, and local
    Tex‑Mex festivals, and actively participates in community events that honor his heritage.
attributes:
  skills: '[''Mechanical Troubleshooting'', ''Team Leadership'', ''Project Scheduling'', ''Safety Compliance (OSHA)'', ''Quality Assurance'', ''Bilingual Communication (English/Spanish)'', ''Customer Relations'',
