personas:
  professional: An aspiring young game developer named Jose Perez combines their love for building intricate LEGO structures with Scratch programming, channeling their organized, high‑standard mindset into
    creating detailed game prototypes and interactive stories, and they meticulously document each step in a notebook.
  sports: Jose Perez thrives on organized soccer drills with the Bronx Soccer Club, cheers for the New York Red Bulls in MLS, and follows the New York Knicks during basketball season, and they always approach
    fitness with a structured routine and a competitive spirit.
  arts: Jose Perez is a budding percussionist who practices drumming patterns to the merengue hits of Juan Luis Guerra and the bachata melodies of Romeo Santos, and they also draw inspiration from adventure
    novels like 'Percy Jackson' and the animated films of Guillermo del Toro.
  travel: Jose Perez enjoys family trips that blend excitement with careful planning, having explored Orlando’s theme parks, the historic streets of San Juan, and the Bronx Zoo, and they dream of attending
    Rio de Janeiro’s carnival celebrations, always preferring a well‑mapped itinerary over spontaneous wandering.
  culinary: Jose Perez loves assisting in the kitchen, perfecting the creamy mash of mangú, simmering flavorful arroz con habichuelas with red beans and cilantro, caramelizing sweet plantains, and they
    occasionally treat themselves to pizza slices, showcasing a balanced skill set that mixes tradition with kid‑friendly cooking.
  core: Jose Perez is a disciplined, structure‑loving nine‑year‑old who merges their LEGO engineering, Scratch coding, soccer training, and rhythmic drumming into a vibrant, organized playworld grounded
    in family tradition, and they constantly seek new ways to combine fun and order.
background:
  cultural: Jose is raised in a bilingual Dominican household in the Bronx, where Spanish is spoken at home and English at school. He participates in Dominican cultural celebrations such as Carnaval and
    family gatherings featuring merengue and bachata music. Food traditions like mangú, arroz con habichuelas, and sweet plantains are a regular part of his life. The close‑knit family structure, respect
    for elders, and pride in his heritage shape his values and daily routines, reinforcing his disciplined and community‑oriented outlook.
