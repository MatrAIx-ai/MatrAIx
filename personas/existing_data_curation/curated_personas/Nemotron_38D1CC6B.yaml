personas:
  professional: Mariela Santamaria is a high school senior who channels their curiosity and flair for visual storytelling into sketching, watercolor, and digital illustration, using Canva and Photoshop
    to craft shareable art for school clubs and community events, while their sociable nature helps them coordinate informal art meet‑ups and plan culturally infused projects for local youth.
  sports: Mariela Santamaria stays active through weekend hikes in the nearby state parks and spontaneous skate sessions at the local skate park, while also embracing dance as a cardio workout, regularly
    attending salsa and bachata nights with friends, and they cheer for Orlando City SC during MLS season and follow the Orlando Magic for occasional basketball inspiration.
  arts: Mariela Santamaria immerses themselves in creative expression by drawing graphic novel panels inspired by the kinetic energy of bands like Arctic Monkeys, listening to the syncopated beats of cumbia
    and reggaeton while painting watercolors, and they frequently attend local street art festivals where they cite the works of contemporary illustrators such as Hayley Atwell and Adrian Smith as artistic
    benchmarks.
  travel: Mariela Santamaria prefers flexible, low‑cost trips that blend adventure and cultural immersion, often planning spontaneous weekend road trips to the Florida Keys for snorkeling, hiking the Everglades,
    and exploring the vibrant murals of Miami’s Wynwood district, while they dream of backpacking through Barcelona to study Gaudí’s mosaics and the street‑art scene of Lisbon.
  culinary: Mariela Santamaria enjoys a palate that balances comfort and experimentation, often whipping up avocado toast with poached eggs for breakfast, savoring spicy empanadas and arepas from local
    food trucks for lunch, and experimenting with homemade sushi rolls and caramel flan on lazy Sunday afternoons, all while collecting fresh herbs from a community garden to enhance their cooking.
  core: Mariela Santamaria blends a restless artistic curiosity with a love for spontaneous dance, skateboarding, and vivid storytelling, all while juggling a teen budget and occasional acne flare‑ups,
    making them a delightfully disorganized yet magnetically collaborative creative.
background:
  cultural: Mariela is a first-generation Colombian-American. She grew up in a bilingual household where Spanish is spoken daily, and family gatherings are filled with traditional foods like arepas, empanadas,
    and sancocho. Her parents keep Colombian traditions alive by celebrating holidays such as Dia de la Independencia and Carnaval de Barranquilla, and she often hears stories of life in Medellin. Living
    in Winter Garden, she blends this heritage with Floridian culture, participating in both local community events and Colombian cultural festivals, which shape her identity and artistic sensibilities.
