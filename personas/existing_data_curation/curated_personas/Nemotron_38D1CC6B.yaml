  career_goals: Mariela aspires to study visual arts or graphic design at a community college or art institute, aiming to become a professional illustrator or multimedia artist. She dreams of creating culturally
    infused artwork that celebrates her Colombian roots, and eventually hopes to run a community arts space in Winter Garden where local youth can explore creativity. In the longer term, she envisions freelancing
    on flexible projects that let her blend art, culture, and social activism.
