  career_goals: Mohamed plans to obtain advanced certifications in myofascial release and prenatal massage within the next two years, positioning himself as a specialist in holistic bodywork. He aims to
    enroll in a community college program to earn an associate degree in kinesiology, which will broaden his understanding of movement science and open pathways toward a future role as a physical therapist
    assistant. Long-term, he envisions opening a community-focused wellness studio in Kennewick that offers massage, yoga, and nutrition workshops, emphasizing affordable services for local families. He
    also hopes to mentor younger massage-therapy students, sharing his practical experience and commitment to routine-driven, client-centered care.
