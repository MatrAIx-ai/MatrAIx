  career_goals: She often imagines becoming a teacher or a veterinarian—roles where she can help others, provide structure, and work with groups of children or animals. She loves the idea of a classroom
    with clear routines where she can guide friends through games and learning activities. At times she also dreams of being a dancer or an astronaut, reflecting her energetic and adventurous side.
