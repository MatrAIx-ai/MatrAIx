personas:
  professional: Rhonda Myers, a budding preschool teacher in her imaginative sandbox world, channels a love for structure and predictability into arranging blocks into tidy patterns while they guide their
    playmates with a surprisingly assertive yet cooperative spirit.
  sports: Rhonda Myers, a spirited member of the local Little Kickers soccer club, loves sprinting on the playground in spring, builds snowmen in winter, cheers enthusiastically for the hometown baseball
    team, the Chicago Cubs, and regularly attends toddler swimming lessons at the community pool, showing they balance energetic group play with structured activity.
  arts: Rhonda Myers, an enthusiastic fan of Disney’s animated movies, sings along to the songs of Frozen and The Lion King, draws vibrant pictures of princesses and dinosaurs with crayons, never misses
    the Saturday morning cartoon block featuring The Wiggles and Sesame Street, and they feel these bright, whimsical arts shape their identity.
  travel: Rhonda Myers, a curious explorer who enjoys family road trips to the San Diego Zoo and occasional flights to Disney World in Orlando, prefers the excitement of car‑seat karaoke over meticulously
    planned itineraries, yet always asks to see the giant dinosaur skeleton at the natural history museum, showing they blend spontaneous fun with a love for discovery.
  culinary: Rhonda Myers, a picky yet adventurous eater, adores mac & cheese with extra cheddar, delights in strawberry‑topped pancakes for breakfast, loves dipping chicken nuggets in honey mustard, stubbornly
    refuses broccoli, and they enjoy helping their mom stir a pot of spaghetti sauce with a wooden spoon.
  core: Rhonda Myers is a structured, sociable 4‑year‑old who thrives on play‑based routines, keeps a secret stash of pennies, battles occasional allergies, and can be both assertively leading a game and
    whimsically worrying about the next snack, reflecting they balance predictability with flexibility.
background:
  cultural: Rhonda is raised in Amarillo, Texas, in a White, middle‑class family that values community, simple outdoor activities, and Texan traditions such as country music, local fairs, and family gatherings.
    Her upbringing blends the relaxed pace of the High Plains with a strong sense of friendliness and cooperation typical of small‑town Texas.
