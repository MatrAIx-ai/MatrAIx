  hobbies: '[''Visiting local art museums and galleries'', ''Sketching and watercolor painting'', ''Playing acoustic guitar'', ''Cooking Mexican cuisine'', ''Volunteering at senior center (English tutoring
    and cultural events)'', ''Exploring Texas Hill Country on weekend trips'', ''Attending community festivals (e.g., Día de los Muertos celebrations)'', ''Reading about Mexican art history'']'
  career_goals: Pedro aims to transition into a senior concierge or training supervisor role where he can mentor younger staff and embed his cultural‑awareness approach into the service model. He hopes
    to design a boutique art‑tour program for hotel guests that highlights local galleries, public murals, and Mexican‑American heritage sites. Over the next few years, he also envisions partnering with
    community organizations to create volunteer‑driven welcome workshops for newly arrived immigrants, blending his hospitality expertise with his passion for helping others and fostering harmony.
