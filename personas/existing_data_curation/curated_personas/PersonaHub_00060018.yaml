persona_description: A physicist and researcher who specializes in the study of biophysics, particularly in the field of seashell formation and the microscopic structure of nacre. Her research aims to uncover
  the mechanisms behind the formation of seashells and expand our knowledge of the natural world through the use of nacre-containing shells from the fossil record. She has published over 130 scientific
  articles and written a book for the general public, titled Physics in the Arts, and has won awards for her research and teaching, including an American Physical Society Fellowship and an American Competitiveness
  and Innovation Fellowship from the Division of Materials Research of the National Science Foundation (NSF).
