personas:
  professional: Luis Barba, a 12‑year‑old budding illustrator, channels their imagination into detailed sketchbook drawings of folklore‑inspired fantasy characters while embracing a relaxed, curiosity‑driven
    learning style that blends daily journaling and self‑taught guitar chords.
  sports: Luis Barba, a 12‑year‑old who prefers low‑key fitness activities, practices soccer with the local Junior Falcons club after school, joins a weekend swimming session at the community pool, and
    roots for the Los Angeles Lakers and Manchester United, maintaining a laid‑back attitude toward exercise that values fun over structured training.
  arts: Luis Barba, a 12‑year‑old creative enthusiast, immerses themselves in sketching folklore‑infused fantasy characters while drawing inspiration from the graphic novel artistry of Mike Mignola, the
    whimsical storytelling of Neil Gaiman, and the vibrant sounds of Los Lobos and indie band Tame Impala, and occasionally watches performances by Lin‑Manuel Miranda to fuel their imagination.
  travel: Luis Barba, a 12‑year‑old with a love for imaginative escapes, prefers family road trips to natural wonders like the Grand Canyon and cultural outings to Mexico City’s historic plazas, while dreaming
    of adventure holidays in Tokyo’s neon districts and the turquoise beaches of Bali, yet their travel plans are often shaped by school schedules and parents’ budget constraints.
  culinary: Luis Barba, a 12‑year‑old budding home chef, enjoys whipping up simple tacos al pastor with fresh pineapple and cilantro, experimenting with ramen broth flavored by miso paste, and savoring
    pizza Margherita topped with basil, though their cooking skills hover at a beginner level, leading them to rely on YouTube tutorials and occasional help from their older sister.
  core: Luis Barba, a 12‑year‑old imaginative dreamer, balances boundless artistic curiosity with occasional anxiety, a love for solitary sketching and a habit of procrastinating chores, making every day
    a vivid blend of creative bursts and emotional tides.
background:
  cultural: Luis was raised in a bilingual Mexican household in Tempe, Arizona. At home, Spanish is spoken, and family traditions such as Día de los Muertos altars, cooking tamales, and listening to traditional
    folk songs are part of his life. The vibrant colors and storytelling of Mexican muralism and Lotería cards inspire his artwork, while the multicultural environment of the Phoenix metro area exposes
    him to a blend of Southwestern and Latino cultures. He identifies with both his Mexican heritage and his American upbringing, which shapes his values of community, respect, and creative expression.
