  career_goals: He dreams of becoming an animator or concept artist for video games, hoping to create worlds that inspire wonder and help others feel understood. He also hopes to study psychology or counseling
    to support kids dealing with anxiety. In the short term, he wants to build a portfolio of artwork and learn more advanced digital tools.
