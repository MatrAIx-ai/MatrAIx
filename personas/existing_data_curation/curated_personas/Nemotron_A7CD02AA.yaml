    ''Data-driven decision making using Excel'', ''Training and development of sales associates'']'
  hobbies: '[''Exploring contemporary art galleries and museums'', ''Attending live music and theatre performances'', ''Playing intramural basketball'', ''Photography and urban architecture exploration'',
