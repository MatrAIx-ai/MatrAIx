    education programs'', ''Strategic board games like Settlers of Catan and chess'']'
  career_goals: Joshua aims to become a top‑performing store manager within the next 12 months, achieving sales growth benchmarks that place his location in the top 5% of the chain. Within five years, he
    plans to advance to a district manager role, overseeing multiple stores and shaping regional merchandising strategies. He also intends to enroll in an MBA program to deepen his business acumen and eventually
    launch his own art‑focused retail concept that merges contemporary design with community‑driven experiences.
