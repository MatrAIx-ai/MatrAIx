  career_goals: Looking ahead, Gregory aims to transition into a senior executive role, such as Director of Operations, where he can shape organizational strategy across multiple departments. He is passionate
    about mentorship and hopes to develop a formal apprenticeship program for emerging managers within his company. In the longer term, he envisions stepping back from daily operations to serve on the board
    of a local cultural or environmental nonprofit, leveraging his managerial expertise to foster community initiatives. His goal is to balance continued professional contribution with increased personal
    time for family, travel, and volunteering, ensuring a legacy of collaborative leadership and community service.
