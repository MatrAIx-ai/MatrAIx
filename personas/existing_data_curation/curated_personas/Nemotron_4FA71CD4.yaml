personas:
  professional: Andre Bann is an aspiring interdisciplinary engineer who blends Python, C++, MATLAB, and SolidWorks to rapidly prototype drones and biomedical device concepts, thriving in small, agile teams
    where their curiosity‑driven improvisation and pragmatic problem‑solving counterbalance a chronic aversion to rigid deadlines.
  sports: Andre Bann fuels their fitness by hiking the Natchez Trace trails in spring and fall, joins a campus intramural soccer league that competes under the nickname the ‘Raptors’, and they cheer for
    the Memphis Grizzlies while catching games on weekends.
  arts: Andre Bann channels creative energy into acoustic‑guitar jam sessions covering John Mayer and Bon Iver, captures sunrise vistas with a Canon EOS 80D inspired by Ansel Adams, and they devour science‑fiction
    novels by Liu Cixin and the Radiolab podcast for artistic stimulus.
  travel: Andre Bann prefers spontaneous, low‑cost road trips that blend hiking, maker‑space visits, and local cuisine, having explored Asheville’s Blue Ridge Mountains and New Orleans’ French Quarter,
    while dreaming of a summer research tour of Iceland’s geothermal sites and a spring tech‑expo trip to Tokyo.
  culinary: Andre Bann’s kitchen experiments range from crafting homemade ramen broth with miso and kombu to baking sourdough loaves infused with rosemary, favoring fresh avocado, jalapeño, and locally
    sourced honey, yet they often resort to energy‑bar snacks during late‑night coding marathons.
  core: Andre Bann is a restless 18‑year‑old tinkerer whose blend of scientific curiosity, improvisational flair, and occasional procrastination fuels a life of drone builds, trail hikes, and midnight guitar
    riffs.
background:
  cultural: Andre grew up in Jackson, Mississippi, in a middle‑class family with deep ties to the region’s Southern traditions. He was raised with the values of community hospitality, respect for practical
    work, and an appreciation for local cuisine like fried catfish and barbecue. While his environment emphasized close‑knit family bonds and small‑group gatherings, Andre’s natural reserve led him to seek
    out quieter pursuits, balancing the communal spirit of his hometown with his preference for solitude and focused work. The blend of Southern cultural heritage and his academic immersion in STEM shapes
    his pragmatic yet curious outlook.
attributes:
