  hobbies: '[''Micro‑controller tinkering (Arduino, Raspberry Pi)'', ''DIY drone and robot building'', ''3D printing and CAD modeling'', ''Reading science‑fiction and popular science'', ''Hiking on Natchez
    Trace'', ''Acoustic guitar jam sessions'', ''Landscape photography'', ''Volunteering at a community makerspace'']'
  career_goals: Andre aspires to translate his curiosity‑driven technical expertise into real‑world impact by joining a small, innovation‑focused technology startup or a research lab where he can prototype
    solutions quickly and iterate without rigid bureaucracy. He is particularly interested in sustainable energy systems and biomedical devices, aiming to develop products that blend cutting‑edge engineering
    with practical usability. Over the next five years, he hopes to deepen his specialization through a master’s program or industry mentorship while eventually launching his own venture that leverages
    his improvisational strengths and resilience under pressure.
