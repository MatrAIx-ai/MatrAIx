personas:
  professional: Margaret Morris is a teen visual storyteller who blends hand‑drawn sketches with digital illustration using Procreate and Photoshop, while also coordinating community art workshops, leveraging
    their imagination, methodical planning, and deep compassion to mentor peers and bring art to at‑risk youth.
  sports: Margaret Morris enjoys weekend hikes along the rolling trails of Parker County, often photographing Texas sunsets, supports the Dallas Cowboys and Texas Rangers, participates in their high school’s
    cross‑country team, and they attend community yoga classes to stay limber.
  arts: Margaret Morris draws inspiration from Hayao Miyazaki’s fantastical worlds, Jim Lee’s graphic novels, Amanda Gorman’s poetic lyricism, and John Mayer’s soulful guitar, regularly attending local
    theater productions and volunteering at the community center’s art workshops where they share their love of sketching, pottery, and digital comics.
  travel: Margaret Morris favors road‑trip adventures that blend scenic photography with cultural immersion—having explored Austin’s music scene, the desert vistas of Big Bend, and a spring break visit
    to New Orleans—while dreaming of a future study‑abroad semester in Kyoto to dive into manga and traditional crafts, always planning trips around school breaks and a modest travel budget.
  culinary: Margaret Morris delights in cooking southwestern dishes like chicken enchiladas and black‑bean chili, experimenting with fresh cilantro, lime, and roasted corn, while also mastering simple desserts
    such as strawberry shortcake and they regularly enjoy a late‑night snack of chili‑lime popcorn while sketching under a lamp.
  core: Margaret Morris is a meticulously organized teen artist who channels boundless imagination into visual storytelling, balances budget‑savvy habits with occasional splurges, and infuses every project
    with a compassionate drive to uplift their community.
background:
  cultural: Margaret grew up in a middle‑class, white family in Fort Worth, Texas, within the suburban context of Parker County. Her upbringing reflects Southern hospitality and a strong sense of community,
    with regular participation in local events, church gatherings, and neighborhood festivals. While she embraces traditional Texan values such as pride in regional history and love of outdoor activities,
    she is also deeply engaged with the diverse arts scene of the Dallas‑Fort Worth metroplex, attending gallery openings, music shows, and cultural celebrations that broaden her perspective.
attributes:
  skills: '["Drawing", "Painting", "Digital illustration", "Event planning", "Volunteer coordination", "Peer mentoring", "Basic coding (Scratch, Python)", "Public speaking", "Written communication"]'
  hobbies: '["Sketching", "Digital comics", "Reading speculative fiction", "Creative writing", "Acoustic guitar", "Theater acting", "Volunteering", "Hiking", "Photography", "Pottery"]'
  career_goals: Margaret aims to complete her GED and pursue an associate’s degree in graphic design at a community college, eventually transferring to a four‑year university for a BFA. She dreams of becoming
    a professional illustrator and visual storyteller, creating artwork for books, games, and online media. Parallel to her artistic career, she hopes to develop community art programs that empower at‑risk
    youth, combining her creative talent with her desire to help others. In the long term, she envisions founding a nonprofit that provides art‑therapy workshops and mentorship for teenagers.
