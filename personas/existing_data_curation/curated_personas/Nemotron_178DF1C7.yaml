  career_goals: James hopes to combine his love of building things with his competitive drive. He dreams of becoming a mechanical or robotics engineer who designs innovative sports equipment or consumer
    gadgets, and he is eyeing a future at a tech‑focused high school or apprenticeship program. At the same time, he keeps the possibility of a professional athletic or esports career open, aiming to play
    college basketball or join a competitive gaming team. Ultimately, he wants a career that lets him create practical solutions while staying in a dynamic, team‑oriented environment.
