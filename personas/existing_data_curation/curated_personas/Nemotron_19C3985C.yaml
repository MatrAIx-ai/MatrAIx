  hobbies: '[''Toastmasters club'', ''Improv theater'', ''Pickup basketball'', ''Indoor soccer'', ''Trivia nights'', ''Woodworking'', ''Custom PC building'', ''Road trips and hiking'', ''Kayaking on Lake
