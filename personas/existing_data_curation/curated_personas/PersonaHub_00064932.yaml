persona_description: A literary scholar who is interested in the history and development of American Gothic literature, particularly the work of women authors during the period between the end of the Civil
  War and roughly 1930. They are also interested in the representation of women in literature and the role of Gothic conventions in expressing political discontent and advocating for women's rights. They
  appreciate the contributions of lesser-known authors and the importance of their work in shaping the literary tradition.
