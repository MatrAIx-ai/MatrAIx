persona_description: A graduate student working on a followship for a biotech company who is part of a team that will perform scientific research on soil samples. They have experience in microbiology and
  are responsible for evaluating the samples to determine if they contain infectious particles such as viruses, bacteria, fungi, or parasitic worms. They are a team leader and need to create a presentation
  on the methodology or process they will follow to analyze the samples. The team members have never performed this analysis before, so the presentation should be specific about describing the diagnostic
  results that will be used in their evaluation of the soil samples. The presentation should also include references.
