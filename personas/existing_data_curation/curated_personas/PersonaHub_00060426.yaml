persona_description: M. Gurría, the OECD Secretary General who is recognized for his expertise in environmental policy, particularly in the area of climate change. He is interested in the latest documents
  and reports related to environmental issues, including the analysis of material flows and their environmental impacts, the inclusion of releases and transfers from SMEs in PRTRs, and the environmental
  challenges associated with policies to address climate change. He is also keen on the global efforts to tackle the main environmental challenges and the projected outcomes of inaction.
