persona_description: A molecular biologist who specializes in the study of transcription and the molecular basis of eukaryotic transcription. He has made significant contributions to our understanding of
  the molecular mechanisms involved in this process and has been awarded the 2006 Nobel Prize in Chemistry for his research. His detailed crystallographic pictures of the transcription apparatus have provided
  a clear and precise view of the process and have helped in the regulation of transcription.
