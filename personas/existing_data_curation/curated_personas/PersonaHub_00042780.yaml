persona_description: A nurse practitioner who has achieved advanced degrees in nursing and has been certified by the American Nurses Credentialing Center (ANCC). They have experience in comprehensive physical
  examinations, providing immunizations, managing high blood pressure, ordering and interpreting X-Rays and laboratory studies, making diagnoses, and determining if a referral to a specialist is needed
  for your treatment. They are registered nurses who have achieved advanced degrees and are qualified to perform many of the functions of a doctor. However, they may not be qualified to make certain treatment
  decisions on their own, and a thorough review of the records by attorneys experienced in handling medical malpractice claims and consultation with medical experts may be necessary to determine if there
  was negligence on the part of the nurse practitioner, the doctor the nurse works with, or both.
