personas:
  professional: Diana Cardona is a retired community organizer who leverages their bilingual fluency, meticulous event‑planning skills, and love of visual arts to coordinate senior‑center programs, cultural
    festivals, and a yearly public mural celebrating their southwestern heritage in Fort Worth.
  sports: Diana Cardona is an avid participant in the Fort Worth Senior Strollers walking group, enjoys cheering on the Dallas Mavericks and the Texas Rangers, and occasionally joins community pickleball
    matches at the local recreation center.
  arts: Diana Cardona spends afternoons painting watercolors inspired by the works of Frida Kahlo and Georgia O’Keeffe, attends gallery openings featuring emerging Latin American artists, and dances salsa
    to the rhythms of Celia Cruz and contemporary world‑music ensembles at community events.
  travel: Diana Cardona prefers low‑stress road trips, often visiting their grandchildren in Austin and planning weekend getaways to the Texas Hill Country’s wineries, while dreaming of attending a cultural
    heritage festival in Oaxaca to document family stories.
  culinary: Diana Cardona delights in cooking traditional dishes such as chili‑infused pozole, hand‑made corn tortillas, and herb‑laden salsas, frequently harvesting cilantro, oregano, and jalapeños from
    their garden, and experiments with recipes from Rick Bayless’s cookbook.
  core: Diana Cardona is a methodical, sociable 76‑year‑old who blends their love of art, community service, and vibrant culinary traditions into a lively, organized lifestyle peppered with occasional forgetfulness
    and a relentless curiosity.
background:
  cultural: Diana is a first‑generation Mexican‑American who grew up in a bilingual household in Texas, preserving the traditions, language, and cuisine of her Mexican heritage while embracing the broader
    Texan culture. She actively celebrates Día de los Muertos, Mexican Independence Day, and local Cinco de Mayo festivities, often preparing traditional dishes and sharing stories of her family's migration.
    Her deep connections to the Mexican community in Fort Worth shape her identity, and she serves as a cultural ambassador, offering support to newer immigrants and fostering cross‑generational ties within
    the diverse fabric of Tarrant County.
