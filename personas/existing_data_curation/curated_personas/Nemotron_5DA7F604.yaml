  career_goals: Although retired from formal employment, Diana is driven to remain actively engaged in her community. She aims to expand the senior‑center arts program by leading weekly painting and craft
    workshops, mentor younger volunteers in event coordination, and curate a yearly mural that celebrates Mexican heritage in Fort Worth. Additionally, she plans to complete a digital storytelling course
    so she can archive and share her family's oral histories online. Traveling to visit her grandchildren and attending regional cultural festivals also feature prominently in her personal aspirations.
