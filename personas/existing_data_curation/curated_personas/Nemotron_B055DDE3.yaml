personas:
  professional: Annette Sinclair, a board‑certified physical therapist in their mid‑30s, blends meticulous manual therapy expertise with a curiosity‑driven habit of integrating mindfulness techniques into
    orthopedic and geriatric rehab plans, earning patient trust through compassionate communication and organized yet flexible treatment documentation.
  sports: Annette Sinclair, a regular participant in the Gallatin Hiking Club and weekend trail‑run group, follows the Montana Grizzlies football team and the Colorado Rockies baseball club, and they incorporate
    gentle strength‑training sessions at the local community gym to support their hiking endurance.
  arts: Annette Sinclair, who finds solace in nature photography inspired by Chris Burkard and curates a personal collection of Ansel Adams prints, also enjoys the ambient folk sounds of Bon Iver and reads
    contemporary science nonfiction from authors like Mary Roach and Michael Pollan during their book club evenings.
  travel: Annette Sinclair, a meticulous planner who prefers low‑key nature retreats, has explored Yellowstone and Glacier National Parks, dreams of trekking Patagonia’s Torres del Paine, and they select
    off‑season travel to avoid crowds while keeping travel budgets aligned with their student loan repayment timeline.
  culinary: Annette Sinclair, an intermediate home cook who loves seasonal farm‑to‑table meals, frequently prepares grilled trout with lemon‑dill sauce, roasted root vegetable medley with sage, and a wild
    mushroom risotto, while they occasionally indulge in a quick pizza slice when their schedule gets overwhelming.
  core: Annette Sinclair is a detail‑oriented therapist who merges science with mindfulness, worries about future stability, yet they find calm in solitary hikes, knitting, and the quiet rhythm of a well‑planned
    day.
background:
  cultural: Annette is a white American of mixed German, Irish, and Scandinavian ancestry. She was raised in a small rural town in eastern Washington before moving to Ravalli County, Montana, where she
    now lives. Her family background emphasized self‑reliance, community involvement, and a deep appreciation for the outdoors, shaping her practical yet curious outlook. Seasonal community gatherings,
    such as harvest festivals, reinforced her cooperative spirit and respect for tradition. While she attended a local Lutheran church in her youth, she now identifies more with secular humanitarian values,
    prioritizing kindness, harmony, and the well‑being of others.
attributes:
  skills: '["Manual therapy", "Therapeutic exercise prescription", "Gait and balance assessment", "Neurological rehabilitation", "Orthopedic rehabilitation", "Patient education and counseling", "Electronic
    health record management", "Evidence‑based practice research", "Interdisciplinary team collaboration", "Stress‑reduction techniques for patients"]'
  hobbies: '["Hiking", "Nature photography", "Birdwatching", "Gardening", "Yoga and mindfulness meditation", "Reading science non‑fiction", "Knitting", "Small book club participation", "Volunteer work at
    senior center"]'
  career_goals: Annette plans to complete a bachelor’s degree in health sciences and then pursue a Doctor of Physical Therapy (DPT) program within the next four years. She aims to specialize in orthopedic
    or geriatric rehabilitation, with a particular interest in integrating mental‑health strategies to address anxiety‑related chronic pain. Long‑term, she envisions opening a community‑focused clinic that
    offers holistic physical therapy combined with mindfulness workshops. She also hopes to become a certified clinical instructor, mentor future therapists, and publish research on the interplay between
    stress, mood, and musculoskeletal recovery.
