  career_goals: Nisha wishes to remain an active contributor to her community and family. She plans to take on a senior advisory role in the Maple Grove South Asian Cultural Association, leading the organization
    of annual Diwali and Holi festivals while introducing environmentally‑friendly practices. She aims to mentor recent South Asian immigrants, sharing practical advice on everything from navigating local
    services to preserving cultural heritage. On a personal level, she intends to document her family’s migration story in a memoir, using digital storytelling tools she is learning. She also hopes to travel
    with her husband to visit relatives in Tamil Nadu, India, and to maintain her health through regular yoga practice and routine medical check‑ups.
