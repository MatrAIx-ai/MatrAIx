persona_description: Josh Gladden is a physicist and materials scientist who specializes in the study of thin rod dynamics and fracture. He is known for his research on the dynamic buckling and breaking
  of thin rods, particularly in the context of materials like glass, steel, teflon, and paper. His work has been published in popular science and media reports, and he has conducted experiments on breaking
  pasta, demonstrating the connection between the buckling wavelength and the length of the fragments. He has also published related work by B. Audoly and S. Neukirch, and has an introductory video on buckling
  in the Department of Mechanical & Materials Engineering at the University of Western Australia.
