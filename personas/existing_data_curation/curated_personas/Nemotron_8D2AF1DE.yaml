  career_goals: Although retired, John aims to preserve Gloucester's maritime heritage by authoring a series of well‑researched articles for the local historical society and publishing a memoir that weaves
    his family's seafaring story with broader New England history. He seeks to mentor younger volunteers, passing on his expertise in project management, craftsmanship, and research methods. He also aspires
    to remain physically active through regular sailing outings, maintain his health, and be recognized as a dedicated steward of his community's cultural legacy.
