  career_goals: In the next two to three years, Jessica aims to obtain her CPA license and transition into a senior auditor role where she can lead complex engagements and mentor junior staff. She is driven
    to spearhead the integration of advanced data analytics and automation tools within her firm’s audit practice, positioning the department at the forefront of technological innovation. Over the longer
    term, Jessica envisions advancing to a partner or director of finance position at a mid‑sized regional corporation, leveraging her combined accounting acumen and STEM expertise to shape strategic financial
    planning and risk management. She also aspires to champion flexible work policies that balance high performance with personal well‑being, and to serve as a thought leader in the accounting community
    through speaking engagements and published articles on audit technology.
