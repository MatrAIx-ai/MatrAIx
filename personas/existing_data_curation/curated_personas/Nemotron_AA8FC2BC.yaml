personas:
  professional: Salvador Ulloa is a project engineer who applies SolidWorks, ANSYS, MATLAB, and Python to deliver robust mechanical designs, drives cross‑functional Agile teams using Six Sigma rigor, and
    they translate technical concepts fluently for both English‑ and Spanish‑speaking stakeholders while honoring a collaborative, family‑oriented work ethic.
  sports: Salvador Ulloa plays forward for an amateur soccer squad called the Raleigh Rangers, hikes regularly at Umstead State Park, follows the Carolina Hurricanes and NC State Wolfpack, and they stick
    to a structured cardio‑and‑strength routine but sometimes skip recovery after late‑night salsa sessions.
  arts: Salvador Ulloa frequents salsa nights featuring music by Celia Cruz and Marc Anthony, enjoys the vibrant visuals of mural art during Día de los Muertos festivities, attends community theater productions
    showcasing contemporary Latin narratives, and they maintain a modest vinyl collection that spans classic boleros to modern pop.
  travel: Salvador Ulloa blends meticulous spreadsheet planning with spur‑of‑the‑moment road trips, has visited a historic colonial city in Latin America during its Day of the Dead celebrations, trekked
    the Patagonian Andes, dreams of a culinary tour across Spain’s Basque region, and they balance travel budget constraints with a desire to experience new cultures.
  culinary: Salvador Ulloa loves cooking pozole and chiles en nogada, often swapping traditional chilies for locally sourced Carolina sweet peppers and adding pimento cheese for a regional twist, experiments
    with mole using smoked paprika, and they sometimes over‑salt the broth when cooking late into the night.
  core: Salvador Ulloa blends meticulous engineering with an infectious social energy, turning every project into a collaborative celebration while they juggle numerous hobbies, a penchant for late‑night
    coffee, and a habit of stretching deadlines to fit a packed calendar.
background:
  cultural: Salvador was raised in a Mexican household that values family cohesion, respect (respeto), and community celebration. He is fluent in both Spanish and English, often switching languages at home
    and during social gatherings. He participates in Mexican holidays such as Día de los Muertos and Mexican Independence Day, organizing gatherings that blend Mexican culinary traditions with local North
    Carolina flavors. The cultural emphasis on hospitality and cooperation influences his collaborative work style, while the Mexican respect for education fuels his continuous learning mindset. His marriage
    reflects a blend of traditions; he and his spouse observe both Mexican customs and American customs, creating a bicultural family environment that shapes his worldview.
attributes:
  skills: '["SolidWorks CAD", "ANSYS FEA", "MATLAB", "Python programming", "C++", "PLC programming", "Project management (Agile/Scrum)", "Data analysis", "Technical documentation", "Quality assurance (Six
