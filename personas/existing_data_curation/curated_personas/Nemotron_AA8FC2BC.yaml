  hobbies: '["Soccer (amateur league)", "Hiking (Umstead State Park)", "Traditional Mexican cooking", "DIY electronics and Arduino projects", "Robotics club", "STEM mentorship volunteering", "Salsa and
    cumbia dancing", "Attending cultural festivals"]'
  career_goals: Salvador aims to progress from a project engineer to a senior engineering manager within the next five years, focusing on leading multidisciplinary teams that develop sustainable, high‑performance
    products. He plans to obtain his Professional Engineer (PE) license and enroll in a master’s program in Systems Engineering to deepen his expertise in integrated design. His long‑term ambition is to
    spearhead R&D initiatives that combine emerging technologies—such as IoT and additive manufacturing—with practical, cost‑effective solutions for industrial clients. Additionally, he aspires to mentor
    young engineers, particularly those from underrepresented backgrounds, and to contribute to community STEM outreach programs.
