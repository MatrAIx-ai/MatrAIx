  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Solo hiking and nature walks'', ''Meditation and mindfulness practice'', ''Reading contemporary philosophy and
    psychology'', ''Listening to experimental and indie music'', ''Cooking simple dishes with fresh produce'', ''Gardening in a small backyard'', ''Learning basic Spanish'', ''Writing reflective journal
    entries'']'
  career_goals: Kevin aims to advance from an assistant to a full‑service HR Generalist within the next two years, followed by earning the SHRM‑CP certification. He aspires to become an HR Business Partner
    who integrates mental‑health initiatives and arts‑focused wellness programs into the workplace, believing that exposure to creativity can reduce employee stress. Long‑term, he envisions leading a people‑operations
    team at a progressive tech or design firm that values flexibility, remote work, and employee autonomy, allowing him to maintain the solitary environment he thrives in while championing compassionate,
    employee‑centered policies.
