personas:
  professional: Daniela Duran, a veteran full‑stack developer and business analyst, channels her lifelong curiosity and painter’s eye for composition into richly visualized data dashboards and elegant UI/UX
    prototypes, while her spontaneous, flexible work style makes her a beloved mentor who occasionally wrestles with tight project deadlines.
  sports: Daniela Duran, an avid weekend hiker tackling the Red Rock Canyon trails and a regular participant in a local yoga circle, also roots for the Vegas Golden Knights while occasionally joining a
    senior tennis league, embracing a low‑impact yet consistent fitness routine that balances adventure with mindfulness.
  arts: Daniela Duran, a devoted abstract watercolorist inspired by Jackson Pollock’s splatter techniques and a budding photographer echoing Ansel Adams’ dramatic contrasts, spends afternoons at the Henderson
    Museum of Art and curates playlists that swing from Celia Cruz’s salsa rhythms to Bon Iver’s indie folk, weaving visual and auditory inspiration into daily life.
  travel: Daniela Duran prefers thoughtfully planned journeys that blend cultural immersion with creative recharge, having recently explored the art festivals of Santa Fe and the historic gardens of Kyoto,
    while dreaming of a sunrise hike along the Amalfi Coast and weekend photography trips to Lake Tahoe.
  culinary: Daniela Duran, an enthusiastic home chef, delights in reimagining classic tropical dishes—such as spiced plantain fritters transformed into a quinoa bowl with a lime‑infused adobo glaze—while
    also mastering fresh sushi rolls and pairing them with a silky avocado‑coconut mousse, reflecting a medium‑level cooking skill and a passion for culinary experimentation.
  core: Daniela Duran blends decades of software expertise with a painter’s curiosity, constantly diving into spontaneous art‑code experiments while habitually misplacing sticky‑note reminders and relying
    on coffee‑stained sketches to keep deadlines in view.
background:
  cultural: Daniela was raised in a bilingual Puerto Rican household, speaking Spanish at home while learning English in school. The vibrant rhythms of salsa, the flavors of mofongo and lechón, and the
    communal celebrations of festivals like San Sebastián and Noche de San Juan remain central to her identity. After relocating to Henderson, Nevada, she actively participates in local Puerto Rican cultural
    associations, sharing traditions through cooking classes, dance workshops, and storytelling events. Her cultural heritage informs her inclusive approach to teamwork, her appreciation for artistic expression,
    and her desire to preserve and modernize Puerto Rican narratives through technology.
