  career_goals: At this stage, Daniela aims to transition into a senior advisory and mentorship role where she can shape the next generation of developers while continuing to explore the intersection of
    technology and art. She plans to launch a culturally-focused educational app that showcases Puerto Rican heritage through interactive storytelling and data-driven visualizations. Keeping her love for
    flexibility, she seeks part-time consulting opportunities that allow her to experiment with emerging AI/ML tools and contribute to inclusive, community-driven tech initiatives. Additionally, she hopes
    to present her work at conferences that celebrate creative coding and diverse perspectives in software development.
