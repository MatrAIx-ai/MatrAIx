  career_goals: Although officially retired, Mack aims to turn his lifelong passions into a lasting community legacy. He plans to launch a free weekly art‑and‑storytelling circle for local youth, create
    a public mural that celebrates African‑American history in Chattanooga, and mentor aspiring artists and volunteers. He also hopes to compile his memories and reflections into a memoir that intertwines
    personal narratives with the city’s cultural evolution, thereby preserving the stories of his generation for future readers.
