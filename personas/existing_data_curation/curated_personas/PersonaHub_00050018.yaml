persona_description: A scientist or ecologist who specializes in studying the physiological and anatomical traits of woody plants in riparian ecosystems, particularly in the context of water availability
  and drought tolerance. They are interested in using this knowledge to inform invasive species management and prioritization of restoration initiatives. They have experience with ANOVA and have conducted
  research on the effects of water availability on plant physiological and anatomical traits in riparian zones. They are also familiar with the impacts of invasive alien plants, such as Acacia mearnsii,
  on catchment water yields and the effectiveness of eradication initiatives.
