personas:
  professional: Ericson Barriga, a 22‑year‑old self‑taught digital creator, channels a methodical project‑planning mindset and bilingual research ability into speculative‑themed illustrations and UI prototypes
    for community‑focused design studios, aiming to blend cultural motifs with modern digital media.
  sports: Ericson Barriga enjoys solo hikes on nearby trails, regularly participates in a local weekend hiking club, and supports the River City FC soccer team, cheering passionately during matches at the
    downtown stadium.
  arts: Ericson Barriga immerses in digital painting inspired by Beeple’s surreal visuals, ambient soundscapes from Brian Eno, and street photography techniques of Henri Cartier‑Bresson, weaving these influences
    into their speculative fiction illustrations and poetry.
  travel: Ericson Barriga prefers thoughtfully planned trips that balance adventure and cultural immersion, such as weekend backpacking in Yosemite, a culinary tour of Oaxaca’s markets, and a dream visit
    to Kyoto’s historic temples during cherry blossom season.
  culinary: Ericson Barriga loves cooking traditional dishes like pupusas stuffed with cheese and loroco, tamales wrapped in banana leaves, and experiments with homemade salsa verde, often pairing meals
    with a curated playlist of ambient electronica.
  core: Ericson Barriga blends a vivid imagination with methodical organization, thrives in solitary creative pursuits, and balances occasional coffee‑addicted late‑night work sessions with a deep commitment
    to community harmony.
background:
  cultural: Ericson grew up in a Salvadoran immigrant family in Manassas, Virginia, where Spanish was spoken at home and Catholic traditions marked family celebrations. His parents maintain close ties with
    the Salvadoran community, participating in cultural events, soccer gatherings, and festivals that feature traditional music and food. This bicultural upbringing instilled in him a deep respect for family,
    community harmony, and the preservation of cultural identity. Living in the diverse suburbs of Northern Virginia, Ericson blends his Salvadoran roots with American influences, often integrating folklore
    motifs and vibrant colors from his heritage into his art while using his bilingual skills to bridge cultural gaps in community projects.
