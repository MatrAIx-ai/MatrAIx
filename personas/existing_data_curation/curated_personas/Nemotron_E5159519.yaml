  hobbies: '[''digital illustration'', ''abstract painting'', ''creative writing'', ''reading speculative fiction and philosophy'', ''photography'', ''cooking Salvadoran cuisine'', ''hiking'', ''board games'',
    ''meditation'', ''listening to ambient music'']'
  career_goals: Ericson aims to translate his artistic curiosity and organized work style into a professional role such as a junior graphic designer or UI/UX design apprentice. He plans to obtain his GED,
    pursue an associate degree in graphic design or communications, and build a polished online portfolio that showcases his culturally inspired visual work. Long‑term, he hopes to secure a position with
    a local cultural organization or a design studio where he can blend Salvadoran heritage motifs with contemporary digital media, and eventually mentor other emerging artists from the diaspora community.
