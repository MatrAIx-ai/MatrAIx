  career_goals: Although still a toddler, Frank expresses clear preferences that hint at future ambitions. He frequently points to fire trucks, construction vehicles, and toy tool kits, indicating a budding
    desire to become a helper who builds or rescues. He loves watching his parents fix things around the house and often asks, 'Can I help?' This suggests an early aspiration to be a handyman or a community
    protector. In his child‑centred imagination, he also dreams of flying like a superhero, reflecting his curiosity about how things work and his wish to explore the world safely. His emotional intensity
    makes him seek stable, supportive settings where he feels confident to try new activities, so his ambitions are rooted in familiar, nurturing environments.
