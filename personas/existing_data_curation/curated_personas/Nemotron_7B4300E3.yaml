personas:
  professional: James Moore is a museum archivist and curator who leverages their graduate business training to meticulously manage budgets, write winning grants, and lead collaborative exhibition projects,
    all while applying their structured, methodical approach and sociable energy to mentor staff and engage community stakeholders.
  sports: James Moore swings between the community basketball league, weekend hikes in Hocking Hills State Park, and cheering for the Cleveland Cavaliers during the NBA season while also following the Cincinnati
    Bengals and the Cleveland Browns for football, and they prefer balanced workouts that blend team competition with solo endurance.
  arts: James Moore curates a lifelong love of jazz, blues, and R&B—collecting vinyl from Miles Davis, B.B. King, and Aretha Franklin—while also photographing neighborhood festivals and historic sites with
    a Leica, and they frequently attend performances at the Rock and Roll Hall of Fame and the local symphony to stay inspired.
  travel: James Moore plans trips with the precision of an exhibition timeline, favoring cultural pilgrimages to museums in Chicago, New York’s Museum of Modern Art, and the National Museum of African American
    History & Culture, while balancing budget constraints by using discount passes and packing for multi‑day hikes in the Great Smoky Mountains whenever a long weekend opens up, and they always include
    a notebook for field observations.
  culinary: James Moore experiments in the kitchen with Southern‑inspired soul food, from collard greens seasoned with smoked paprika to fried chicken brined in buttermilk, often fusing it with Midwestern
    comforts like sweet corn succotash and lake‑front trout, and they relish sharing these dishes at potlucks while constantly tweaking recipes with a dash of hot sauce and fresh herbs.
  core: James Moore is a methodical community powerhouse who blends archival precision with soulful cooking, yet they still forget to water their houseplants and occasionally hoard too many vinyl records.
background:
  cultural: James was born and raised in the Cleveland metropolitan area and now lives in Aurora, Ohio. He is part of a multi‑generational African‑American family whose ancestors arrived in the Midwest
    during the Great Migration, bringing Southern traditions, storytelling, and a strong emphasis on education. Growing up in a close‑knit church community, he absorbed values of service, perseverance,
    and cultural pride. These roots shape his dedication to preserving African‑American heritage in Ohio, participating in local Juneteenth celebrations, and fostering inclusive representation in museum
    collections. James frequently collaborates with community organizations and cultural festivals, using his professional expertise to amplify the narratives of his community while honoring the culinary,
    musical, and artistic traditions that define his cultural identity.
attributes:
  skills: '["archival preservation", "collection cataloging", "digital asset management", "exhibit design and installation", "grant writing", "budgeting and financial planning", "project management", "community
    outreach", "public programming", "metadata standards (MARC, Dublin Core)", "museum best practices compliance", "team leadership", "public speaking", "photographic documentation", "software proficiency
    (ArchivesSpace, Omeka, ContentDM)"]'
  hobbies: '["basketball (community league)", "hiking", "cooking (soul food and fusion)", "listening to jazz and blues", "visiting museums and historical sites", "photography", "genealogy research", "volunteering
    for youth mentorship", "church choir participation", "DIY home improvement", "traveling"]'
  career_goals: James aims to transition into senior museum leadership, with the long‑term goal of becoming a museum director or chief curator for a regional cultural institution. He wants to spearhead
    a comprehensive digitization initiative that makes local African‑American histories accessible to broader audiences, and to develop inclusive exhibitions that reflect the diverse narratives of Ohio’s
    communities. Securing sustainable funding through grant acquisition, corporate partnerships, and community fundraising is a priority, as is mentoring emerging archivists and curators from underrepresented
    backgrounds. Ultimately, he envisions establishing a community heritage center that serves as both an educational resource and a gathering place for cultural celebration.
