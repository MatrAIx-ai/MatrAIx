  career_goals: Although still preschool age, Robert often talks about becoming an astronaut who explores space, an artist who paints colorful pictures, or a firefighter who helps people. He is eager to
    learn, dreams of building amazing structures with LEGO, and wants to continue discovering new ideas and sharing them with friends.
