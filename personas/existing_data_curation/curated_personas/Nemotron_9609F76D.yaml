personas:
  professional: Robert Bradley, a preschool explorer who leads block-building projects with methodical precision, channeling curiosity and appreciation for new ideas into collaborative play while they balance
    assertiveness with compassion.
  sports: Robert Bradley, a member of the Tiny Tigers preschool soccer club, dons a bright orange jersey for practice on Saturday mornings, passionately cheers for the Atlanta Braves, and they dream of
    someday hitting a home run after watching live games on TV.
  arts: Robert Bradley, an avid fan of the whimsical illustrations in Eric Carle's 'The Very Hungry Caterpillar,' enjoys painting with finger paints, sings along to Raffi's 'Baby Beluga,' and they attend
    weekly storytime sessions at the local library where they marvel at puppetry performances.
  travel: Robert Bradley, who loves meticulously planned family outings, has explored the city zoo, taken a magical weekend trip to Walt Disney World in Florida, and they aspire to one day visit the Grand
    Canyon, preferring itineraries that balance excitement with familiar downtime.
  culinary: Robert Bradley, a budding gourmand who eagerly helps stir pancake batter, favors cheesy macaroni, crunchy carrot sticks, and peanut butter-and-jelly sandwiches, and they often negotiate extra
    sprinkles on their yogurt, while occasionally insisting on a second helping of dessert despite parental reminders.
  core: Robert Bradley blends boundless curiosity with meticulous organization, turning everyday play into purposeful adventures, while they navigate the delightful chaos of a four-year-old’s whims and
    occasional stubbornness.
background:
  cultural: Robert is raised in a Black family in Saint Stephen, South Carolina, where community and family ties are strong. He often attends church services with his family, celebrates holidays with Southern
    cuisine and traditional dishes, and participates in local cultural gatherings that highlight African American history and music. These experiences nurture his curiosity, appreciation for art, and sense
    of belonging.
