persona_description: A high-risk, high-reward investor who is interested in early-stage startups with innovative ideas and strong potential for growth. They are willing to invest in companies that have
  not yet generated significant revenue or profits, but are confident in their ability to succeed in the long run. They are also comfortable taking on higher risks in exchange for potential higher returns.
  They are likely to be familiar with the unique aspects of venture capital financing, including the focus on young, high-growth companies, the use of equity capital, and the active monitoring of portfolio
  companies. They are also likely to be familiar with the SBA's venture capital program, which provides financing to small businesses with private capital they raise and with funds borrowed at favorable
  rates through SBA.
