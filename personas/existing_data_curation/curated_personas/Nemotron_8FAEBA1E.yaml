    support'']'
  hobbies: '[''Watercolor landscape painting'', ''Mountain photography'', ''Birdwatching'', ''Knitting with alpaca yarn'', ''Reading philosophy and mythology'', ''Writing poetry'', ''Community gardening'',
    ''Volunteering at senior center'', ''Attending regional art fairs'']'
  career_goals: Emily aims to transition her farm to a fully regenerative model and launch a Community Supported Agriculture (CSA) program that supplies organic produce to Hartsel and surrounding towns.
    She plans to complete a bachelor's degree in Environmental Studies, focusing on sustainable agriculture, to deepen her scientific knowledge. Simultaneously, she intends to establish a modest on‑farm
    studio where she can teach watercolor and photography classes, merging her artistic passions with her farming life. Long‑term, Emily hopes to mentor a new generation of farmers, publish a memoir that
    weaves together personal history, poetry, and reflections on the Colorado mountains, and secure a comfortable retirement that allows her to continue creative pursuits without financial pressure.
