  career_goals: William aims to transition from his current associate‑level role into a senior data scientist position within the next five years. He plans to complete a bachelor’s degree in Applied Mathematics
    followed by a master’s in Data Science, and to earn certifications such as Certified Analytics Professional and SAS Advanced Analytics. His long‑term ambition is to lead a small analytics department
    at a regional healthcare or financial services firm, where he can implement data‑driven decision‑making processes, develop high‑impact predictive models, and mentor junior analysts. He also aspires
    to contribute to industry conferences and publish whitepapers on practical applications of mathematical modeling, thereby establishing himself as a recognized subject‑matter expert while maintaining
    a balanced, structured work life.
