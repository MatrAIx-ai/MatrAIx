personas:
  professional: William Mcdermott, a disciplined data analyst with a strong foundation in applied mathematics, leverages Python, R, MATLAB, and SQL to build predictive models for healthcare and finance,
    they lead small analytical teams with meticulous documentation and cooperative assertiveness while pursuing CAP certification and a master’s in Data Science.
  sports: William Mcdermott, a methodical fitness enthusiast who hikes the Blue Ridge foothills each weekend, follows the Carolina Panthers and Greenville Drive with loyal devotion, they play casual tennis
    at the local Presbyterian Country Club, and they prefer structured cardio routines over spontaneous gym visits.
  arts: William Mcdermott, a reserved yet appreciative arts lover, captures nature scenes inspired by Ansel Adams, attends the Greenville Symphony Orchestra’s Saturday Beethoven concerts, they enjoy Ken
    Burns’ biographical documentaries, and they integrate these artistic experiences into their disciplined downtime.
  travel: William Mcdermott, a meticulous travel planner, favors organized road trips to historic Southern towns like Charleston and Asheville, they have photographed the Great Smoky Mountains, they dream
    of a carefully budgeted photography expedition to New Zealand’s South Island once their career milestones are achieved, and they always map routes in advance to avoid surprises.
  culinary: William Mcdermott, a competent home cook, perfects slow‑smoked pork shoulder barbecue with a sweet‑tomato glaze, they pair it with creamy cheese grits and collard greens, they occasionally experiment
    with shrimp‑and‑grits using fresh river shrimp caught on hikes, and they appreciate the communal aspect of sharing meals at church potlucks.
  core: William Mcdermott, a structured yet quietly curious 39‑year‑old, balances precise data modeling with a habit of solving sunrise Sudoku puzzles before breakfast, they often stay up late to finish
    woodworking projects, and they occasionally neglect sleep in pursuit of perfection.
background:
  cultural: William grew up in Mauldin, South Carolina, within a predominantly white, middle‑class Southern community. His upbringing was shaped by Southern hospitality, a strong work ethic, and an appreciation
    for local traditions such as community gatherings, church events, and regional cuisine like barbecue and grits. Although his family emphasized practical education and self‑reliance, they also valued
    politeness, modesty, and respect for elders. Living in Greenville County has exposed him to a blend of rural and growing suburban cultures, reinforcing his preference for structured environments and
    close‑knit social circles. These cultural influences combine with his analytical career path to produce a pragmatic, disciplined, and community‑oriented individual.
