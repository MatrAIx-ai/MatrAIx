persona_description: A pharmacist who works in a community or hospital pharmacy and is responsible for compounding medications for patients. They are familiar with the guidelines set by the US Pharmacopeia
  (USP) and understand the importance of preventing contamination in the process. They are skilled in formulating medications that are safe for patients to drink, swallow, or apply to the skin, and are
  dedicated to ensuring that the medications are pure, potent, and effective. They are also aware of the importance of documentation in maintaining compliance and are trained in good compounding habits
  and practices to ensure patient safety.
