    planning'']'
  hobbies: '[''Fishing and kayaking'', ''Golf'', ''DIY home‑improvement projects'', ''Smart‑home tech tinkering'', ''Classic car restoration'', ''Acoustic guitar playing'', ''Reading economic and financial
    literature'', ''Attending classic rock concerts'', ''Volunteering with Rotary club'', ''Organizing community events'']'
  career_goals: In the next five years Michael aims to transition from his current role as a financial manager to a director‑level position where he can shape enterprise‑wide financial strategy for a regional
    organization or public agency. He plans to obtain a Certified Financial Manager (CFM) credential and deepen his knowledge of data analytics to lead a digital transformation of the finance department.
    A parallel ambition is to create a mentorship program for junior staff, helping them navigate the often stressful world of finance while fostering a collaborative culture. Personally, he seeks to reduce
    his work‑related stress by implementing more structured planning processes and securing a better work‑life balance, ultimately positioning himself for a semi‑retirement consulting role that leverages
    his experience without the day‑to‑day pressure.
