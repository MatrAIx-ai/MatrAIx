personas:
  professional: Michael Brown, a seasoned financial manager with two decades of hands‑on experience in budgeting, cash‑flow forecasting, and risk assessment for mid‑size firms and municipal agencies, blends
    their curiosity for fintech and data‑visualization tools with a pragmatic, sometimes loosely organized approach, allowing them to lead cross‑departmental projects while still keeping an eye on detailed
    Excel models and SAP reports.
  sports: Michael Brown, an avid golfer who plays Sunday mornings at The Country Club of Ohio, spends crisp fall afternoons fishing the Olentangy River, cheers on the Cleveland Guardians and Ohio State
    Buckeyes during baseball and football seasons, follows the Columbus Crew in the spring, and balances low‑impact recreation with a relaxed fitness routine that leans on kayaking for cardio, which they
    consider a perfect blend of calm and activity.
  arts: Michael Brown, who unwinds after long financial meetings by strumming acoustic renditions of Led Zeppelin and Pink Floyd, frequently attends live performances at the Newport Music Hall featuring
    artists like Bruce Springsteen, indulges in classic cinema reruns of The Godfather, and supports the local Columbus Museum of Art's rotating exhibitions, which they find fuels their imagination.
  travel: Michael Brown, a spontaneous road‑trip enthusiast who prefers loose itineraries over rigid schedules, frequently escapes to Hocking Hills State Park for weekend hikes, dreams of sailing the canals
    of Amsterdam, and has a bucket list entry for a fishing lodge in New Zealand’s South Island, a dream they pursue whenever work stress peaks.
  culinary: Michael Brown, a competent home cook who loves grilling fresh trout with lemon butter and rosemary, occasionally tackles smoked brisket on the smoker, enjoys a hearty Midwest pot roast with
    carrots and potatoes, often pairs meals with a cold craft beer, and admits they sometimes skip veggies in favor of indulgent carbs after a long day.
  core: Michael Brown is a curiosity‑driven finance veteran who balances meticulous number‑crunching with a laid‑back, sometimes disorganized lifestyle, fueled by classic rock, DIY projects, and a habit
    of late‑night coffee that both sparks ideas and fuels stress, which they rarely admit.
background:
  cultural: Michael was born and raised in Canal Winchester, Ohio, within a modest middle‑class family that reflects a blend of Midwestern American values and a hint of French‑Canadian heritage from his
    paternal line (the name Labrie). He grew up attending local public schools, celebrating traditional holidays such as Thanksgiving and Christmas with extended family, and participating in community activities
    like the county fair and church gatherings. This environment has instilled in him a strong sense of community responsibility, a practical work ethic, and an appreciation for both familiar customs and
    the occasional new idea that broadens his perspective.
attributes:
  skills: '[''Financial budgeting and forecasting'', ''Cash‑flow management'', ''Variance and financial analysis'', ''SAP ERP / QuickBooks integration'', ''Regulatory compliance and risk assessment'', ''Cost‑reduction
