personas:
  professional: David Bolden, a 55-year-old aspiring community handyman, leverages their extensive carpentry, automotive restoration, and budgeting expertise to establish a reliable, routine-driven service
    for seniors in Springfield, and they balance meticulous project scheduling with a calm, competitive spirit.
  sports: David Bolden follows Missouri State University baseball with seasonal enthusiasm, attends Springfield Cardinals games when possible, participates in a community center chess club that doubles
    as a strategic thinking exercise, and they maintain fitness through weekly garden labor and occasional Friday night bowling league matches with local seniors.
  arts: David Bolden immerses themselves in blues legends like B.B. King and gospel icons such as Mahalia Jackson, reads historical biographies by David McCullough and Doris Kearns Goodwin, enjoys quarterly
    visits to the Springfield Art Museum, and they find classic realism fuels their appreciation for craftsmanship.
  travel: David Bolden prefers well-planned road trips to historic destinations like Gettysburg, Savannah, and the Motown Museum in Detroit, balances travel with a modest budget by staying in family-run
    B&Bs, and they prioritize visits that offer guided tours of vintage car collections, aligning with their love of tangible history and routine itineraries.
  culinary: David Bolden delights in preparing a traditional Southern-style barbecue featuring slow-smoked brisket, pork ribs glazed with a mustard-based sauce, and sides of collard greens and cornbread,
    frequently incorporating fresh tomatoes and peppers from their garden, and they treat weekend cook-outs as a ritualized showcase for family and friends.
  core: David Bolden navigates life with methodical calm, a competitive edge for restoring classic cars, a love of seasonal gardening cycles, and a steadfast commitment to routine-driven handyman work that
    balances solitary focus with modest community interaction, and they remain skeptical of shortcuts.
background:
  cultural: David is a second‑generation African‑American who grew up in the historically Black neighborhoods of Springfield, Missouri. His family’s roots trace back to the Great Migration, and the values
    of self‑reliance, community solidarity, and church involvement were instilled from an early age. He was raised on a mix of Midwestern practicality and Southern cultural traditions—enjoying soul food,
    gospel music, and community picnics at the local church. While he blends smoothly into the broader Springfield culture, his identity is shaped by the legacy of civil‑rights activism in Missouri, the
    importance of mentorship within the Black community, and the strong emphasis on family cohesion. These influences inform his practical outlook, his dedication to helping others, and his pride in preserving
    cultural customs such as barbecuing, storytelling, and celebrating African‑American holidays with close family and friends.
attributes:
  skills: '[''Residential carpentry'', ''Woodworking and furniture repair'', ''Automotive maintenance and diagnostics'', ''Small‑engine repair'', ''Budgeting and financial planning'', ''Project scheduling
