  hobbies: '[''Classic car restoration'', ''Vegetable gardening'', ''Watching Missouri State baseball'', ''Listening to blues and gospel music'', ''Reading historical biographies'', ''Playing chess'', ''Barbecue
    cooking for family'']'
  career_goals: Even though David is currently not in the formal workforce, he aims to channel his practical abilities into a low‑key, community‑focused venture. He plans to establish a part‑time handyman
    service that caters to seniors and fellow residents of Springfield, emphasizing reliability, routine service appointments, and transparent pricing. He also hopes to mentor a few local teens interested
    in trades, offering hands‑on workshops that blend technical skill with disciplined work habits. In the longer term, David would like to see his small business become a trusted neighborhood brand, providing
    steady supplemental income while allowing him to maintain the predictable schedule he values. If health or circumstances permit, he is open to taking on a volunteer role at his church's facilities maintenance
    team, reinforcing his desire to give back without compromising his need for personal autonomy.
