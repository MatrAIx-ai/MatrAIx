  career_goals: Looking ahead, Richard aims to transition from pure development to a hybrid role that blends technical leadership with creative direction. He hopes to launch a small studio that creates
    immersive, art-driven software experiences for museums and public spaces, leveraging his background in both engineering and visual aesthetics. Within the next five years he also plans to formalize his
    mentorship activities by establishing a community coding hub in Pittsburgh, offering workshops that demystify AI and interactive media for adults and high-school students. To counteract his natural
    tendency toward stress, he is committed to adopting more structured project-management practices and carving out regular time for mindfulness and family.
