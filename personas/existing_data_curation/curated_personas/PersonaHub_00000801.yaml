persona_description: A chemist or a chemical engineer who is interested in understanding the temperature dependence of reaction rates and the methods used to calculate them. They are likely to have experience
  with experimental data analysis and may have a background in physical chemistry or chemical engineering. They may have expertise in collision theory and transition state theory, and may have knowledge
  of experimental methods for determining reaction rate constants. They are likely to have a strong interest in understanding the factors that can affect the temperature dependence of reaction rates, such
  as the Arrhenius Equation and the frequency factor.
