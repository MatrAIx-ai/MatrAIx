persona_description: A person who is interested in the transition from single-valued (deterministic) forecasts to the incorporation of uncertainty information into predictions, and who is willing to engage
  with the National Weather Service and the broader prediction community to make this transition happen. This person is knowledgeable about the importance of effective communication of uncertainty in forecasting,
  and is interested in the use of testbeds for developing and testing new approaches and methodologies in estimating, communicating, and using uncertainty information. This person is also interested in
  the role of statistics in producing uncertainty information and the potential for NWS to provide the underlying datasets that can drive improved uncertainty estimation.
