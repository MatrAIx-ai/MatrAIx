  hobbies: '[''Gardening (vegetables, native plants, ornamental flowers)'', ''Baking and jam making'', ''Reading (historical fiction, local history)'', ''Hiking Riverside County trails'', ''Community theater
    volunteering'', ''Book club participation'', ''DIY crafts and home decor'']'
  career_goals: Nicole aims to earn her GED within the next two years to formalize her education and expand her options. She plans to deepen her computer skills by completing a community‑college certificate
    in digital literacy. Leveraging her culinary interests, she aspires to start a small home‑based business selling baked goods and preserves. Additionally, she seeks a leadership role on the homeowners
    association board, where she can apply her organizational abilities and competitive drive to improve neighborhood services and sustainability initiatives.
