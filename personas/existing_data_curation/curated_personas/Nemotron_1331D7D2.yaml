personas:
  professional: A master carpenter in the making, Joana Cassidy blends meticulous framing expertise with sustainable green‑building practices, mentoring apprentices while balancing client demands and their
    drive to launch an eco‑focused workshop in Bend.
  sports: An avid outdoor enthusiast, Joana Cassidy spends weekends scaling the crags at Smith Rock, hikes the Cascades with the High Desert Hiking Club, pumps up after‑work cardio by cheering on the Portland
    Trail Blazers and the Seattle Seahawks, and occasionally joins a local recreational softball league.
  arts: A lover of folk melodies and visual storytelling, Joana Cassidy regularly attends concerts featuring Molly Tuttle and Sufjan Stevens, fills sketchbooks with Eames‑inspired furniture silhouettes,
    captures the Pacific Northwest’s misty peaks in Ansel Adams‑style black‑and‑white photography, and they share the images at community art nights.
  travel: An adventure‑seeker with a meticulous planning habit, Joana Cassidy has trekked the rainforest of the Hoh River, explored Reykjavik’s eco‑housing scene, and dreams of hiking Patagonia’s Torres
    del Paine, but balances these ambitions with a modest travel budget and occasional caregiving responsibilities, often arranging trips around long‑weekend windows and using a hybrid of Google Maps and
    hand‑drawn itineraries.
  culinary: A seasonal kitchen experimenter, Joana Cassidy loves crafting wild mushroom risotto with locally foraged hazelnuts, grilling fresh river trout topped with dandelion‑green pesto, and perfecting
    a sourdough starter on weekends, though they sometimes over‑salt dishes when multitasking between job sites and garden volunteering.
  core: Joana Cassidy is a compassionate, eco‑driven carpenter who balances meticulous craftsmanship with a perpetual worry about project deadlines, a love for mountain hikes, and a guilty habit of forgetting
    to water houseplants during busy weeks.
background:
  cultural: Joana was raised in a middle‑class family of Irish‑German descent that has lived in the Pacific Northwest for several generations. Her upbringing emphasized hard work, community involvement,
    and a deep respect for the natural environment surrounding Bend. While she identifies with the region's outdoor‑oriented culture and values of self‑reliance, she also embraces the diverse, progressive
    atmosphere of her town, which informs her cooperative spirit and desire to support inclusive community initiatives.
attributes:
  skills: '["Framing","Custom cabinetry","Finish carpentry","Blueprint reading","Tool maintenance","Sustainable building practices","SketchUp design","Project coordination","Client communication","Mentoring
