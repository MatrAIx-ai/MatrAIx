  hobbies: '["Hiking in the Cascade Range","Rock climbing","Nature photography","Yoga and meditation","Reading sustainable design books","Volunteering at community garden","Making handcrafted wooden objects","Local
    folk music concerts","Sketching furniture designs","Cooking with seasonal ingredients"]'
  career_goals: Joana aims to become a recognized master carpenter and eventually open her own eco‑focused workshop in Bend, where she can design and produce custom, sustainably sourced furniture. She plans
    to earn LEED‑related certifications and deepen her knowledge of green construction. While nurturing her business ambitions, she is passionate about creating a supportive environment for women and underrepresented
    groups in the trades, offering apprenticeship programs and community classes. Balancing her drive for growth with financial stability, she seeks steady projects that allow her to expand her expertise
    without overwhelming stress.
