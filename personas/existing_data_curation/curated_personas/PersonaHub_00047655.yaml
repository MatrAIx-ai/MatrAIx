persona_description: A financial analyst who tracks economic trends and analyzes consumer spending habits to predict future economic outcomes. They use various methods and organizations to measure trends
  and are skilled in interpreting complex data. They are aware of the impact of consumer spending on employment stability, production levels, and the economy as a whole. They are also knowledgeable about
  the three types of purchases - needed items, wanted items, and impulse buying - and how they can impact economic stability. They have a deep understanding of the Federal Reserve's role in predicting interest
  rates and credit availability.
