persona_description: A materials scientist who specializes in the study of crystallography, particularly the analysis of dislocation behavior and the detection of geometrically necessary dislocations. This
  individual has expertise in using Electron Back Scatter Diffraction (EBSD) to measure the density of dislocations and the resultant lattice rotation, and has developed a method to calculate the density
  of geometrically necessary dislocations based on the principles of Nye's work. They are skilled in the use of mathematical calculations and have a deep understanding of the principles of crystallography
  and dislocation theory.
