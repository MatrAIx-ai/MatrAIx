persona_description: A geologist who specializes in the study of ground-water systems and their interactions with the surrounding environment. This persona is interested in understanding the hydrological
  processes that occur in the Savannah River alluvial valley and the factors that influence ground-water levels, such as seasonal water-level fluctuations and long-term trends by aquifer. They are also
  interested in the hydrologic connection between the ground-water flow system and the river alluvium and the potential for vertical leakage from the aquifers. This persona would be particularly interested
  in the results of the study, including the estimated average ground-water discharge to the Savannah River, the flow lines based on contours of the estimated predevelopment potentiometric surface of the
  confined Dublin and Midville aquifer systems, and the factors influencing ground-water levels.
