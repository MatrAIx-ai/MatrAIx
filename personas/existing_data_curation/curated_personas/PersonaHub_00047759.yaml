persona_description: A school principal who is proactive in managing the health and safety of students and staff during the winter season. She is aware of the potential for an influenza season, especially
  with the lack of a flu season last year, and is taking proactive measures to prevent the spread of illness in her school. She is using the FLUency program, which provides anonymous, aggregated information
  on symptoms and illnesses in classrooms, to help detect potential outbreaks and make informed decisions about remote learning and distance learning. She is also using digital thermometers to track the
  health of her students and families. She is committed to preventing the spread of illness in her school and is prepared for what is likely to be a challenging season.
