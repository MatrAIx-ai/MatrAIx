persona_description: A bushfire expert who has conducted extensive research and surveys on bushfire behavior, including the impact on infrastructure and people. They have a deep understanding of building
  performance under fire exposure conditions and have supported the development of building design and planning codes. They have a keen interest in understanding how bushfires spread and the factors that
  contribute to house loss, and have a particular focus on the unique terrain and elements in the landscape that contribute to this phenomenon. They are well-versed in the use of technology, such as the
  Bushfire House Surveyor app, to collect and analyze data on bushfire impacts.
