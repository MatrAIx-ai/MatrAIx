  hobbies: '["Ultimate Frisbee", "Hiking", "STEM mentorship", "Board games", "DIY electronics", "Bio-hacking", "Science-fiction reading", "Cooking"]'
  career_goals: Jonethan aims to become a lead R&D engineer at a cutting‑edge biotech firm, steering the development of next‑generation implantable devices and regenerative therapies. In the next five years,
    he plans to secure multiple patents, publish in high‑impact scientific journals, and lead a multidisciplinary team that brings a wearable health‑monitoring platform to market. Long‑term, he envisions
    launching his own biotech startup focused on personalized regenerative solutions, earning recognition as a thought leader through conference keynotes, advisory board positions, and competitive grant
    awards.
