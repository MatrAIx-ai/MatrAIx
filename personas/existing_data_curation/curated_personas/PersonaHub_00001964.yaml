persona_description: A knowledgeable and dedicated employee of the National Ocean Service and the Coast and Geodetic Survey, who has been involved in the responsibility of collecting and using high-resolution
  aerial photography to define the nation's 95,000-mile shoreline since the late 1920s. This individual likely has a strong background in geodesy and surveying, and is responsible for ensuring that the
  nation's coastlines are accurately mapped and defined for use in navigation, safety, and other coastal-related activities. This persona is likely to have a deep understanding of the importance of accurate
  and up-to-date mapping of the nation's coastlines, and is committed to ensuring that the Coast and Geodetic Survey continues to provide the most accurate and reliable data available.
