personas:
  professional: Donald Liu, a veteran Atlanta mail carrier with thirty‑plus years of route‑planning mastery, channels their love for structure, meticulous attention to detail, and gentle, low‑key customer
    service into a dependable delivery record, and they quietly mentor rookie carriers through practical, hands‑on guidance.
  sports: Donald Liu enjoys solitary fitness through daily walks along the Atlanta BeltLine, occasionally joins a local senior‑friendly walking club, follows the Atlanta Braves baseball season and the Atlanta
    Falcons football games on television, but they steer clear of organized team sports, preferring the quiet rhythm of personal cardio over competitive play.
  arts: Donald Liu finds peace in the pages of Agatha Christie mysteries and Ken Follett’s historical epics, while classical melodies by Beethoven and Bach accompany their garden mornings, and the impressionist
    brushstrokes of Claude Monet grace the posters above their desk, shaping their aesthetic sensibility.
  travel: Donald Liu prefers meticulously planned road trips that balance quiet reflection with modest adventure, having mapped out weekend escapes to Savannah’s historic squares, Asheville’s mountain bird
    sanctuaries, and a long‑awaited pilgrimage to the English countryside’s Cotswolds, yet they keep travel modestly budgeted to preserve their retirement savings.
  culinary: Donald Liu, an adept yet unpretentious home cook, regularly prepares fresh basil pesto pasta using tomatoes from their garden, enjoys a simple tomato‑basil bruschetta with mozzarella, and occasionally
    treats themselves to a well‑cooked salmon fillet seasoned with dill and lemon, reflecting their love for herbs and seasonal flavors.
  core: Donald Liu blends disciplined routine with quiet curiosity, channeling a love for structure into reliable mail delivery, solitary puzzle‑solving, and gentle community service while occasionally
    indulging in model‑train tinkering and herb gardening.
background:
  cultural: Donald grew up in a middle-class, white working-class family in the suburbs of Atlanta during the 1960s and 1970s. His upbringing was shaped by Southern values of hard work, modesty, and community
    responsibility, reinforced by regular church attendance at a local Methodist congregation. Though never married, he maintains close ties with his siblings and extended family, often visiting for family
    gatherings. The cultural fabric of Atlanta, with its blend of Southern hospitality and urban diversity, informs his courteous, cooperative demeanor and his appreciation for quiet, orderly environments.
attributes:
  skills: '[''Route planning'', ''Time management'', ''Package sorting'', ''Physical stamina'', ''Geographical knowledge of Atlanta'', ''Use of handheld scanning devices'', ''Safety compliance'', ''Customer
