  career_goals: Kenneth aims to obtain his Professional Engineer (PE) license within the next two years and transition into a senior project manager role where he can spearhead large‑scale, environmentally
    responsible infrastructure projects in New York City. He hopes to lead a multidisciplinary team that incorporates innovative materials and smart‑city technologies while maintaining strict safety and
    budget standards. Long‑term, he envisions founding a consultancy that mentors young engineers from underrepresented backgrounds and partners with community organizations to develop public spaces that
    reflect the cultural diversity of Queens.
