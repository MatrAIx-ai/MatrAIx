personas:
  professional: Marcela Morales leverages her front‑end development skills in React and instructional‑design expertise to craft bilingual, art‑infused learning modules, but her tendency toward flexible
    planning and competitive drive often leaves her juggling deadlines in a rapid‑fire Agile environment.
  sports: Marcela Morales joins the Tucson Hiking Club for monthly Sonoran Desert treks, dances salsa three nights a week at a local studio, follows the Arizona Diamondbacks and Arizona Cardinals, and occasionally
    plays recreational volleyball at a community center despite her preference for spontaneous activity over regimented training.
  arts: Marcela Morales frequents the Tucson Museum of Art’s opening nights, paints acrylic canvases blending contemporary design with traditional folk motifs, creates digital illustrations inspired by
    artists like Frida Kahlo and local muralist Rising Sun, and participates in improv theater where her outgoing energy shines.
  travel: Marcela Morales prefers spur‑of‑the‑moment road trips to desert escapes like Joshua Tree and cultural festivals in Santa Fe, balances these adventures with a limited budget, and dreams of a future
    immersion in a historic Oaxacan town to research indigenous storytelling for her ed‑tech startup.
  culinary: Marcela Morales cooks Oaxacan mole and chiles rellenos for weekly friend gatherings, experiments with coffee blends from Cartel Coffee and Stumptown, and despite her occasional forgetfulness
    about grocery lists, she meticulously plates each dish to reflect the vibrant colors of her artwork.
  core: Marcela Morales is a curious, sociable, and fiercely competitive designer whose creative spark is tempered by disorganized habits and a lingering undercurrent of anxiety.
background:
  cultural: Marcela was raised in a bilingual Mexican-American household in Tucson, where Spanish was spoken daily and Mexican traditions were woven into family life. Her parents emigrated from Jalisco
    and passed down stories of folklore, music, and the visual language of Mexican folk art, which she carries into her design aesthetic. She celebrates Día de los Muertos, quinceañeras, and other cultural
    holidays with her extended family and the wider community, often contributing artwork or organizing events. The multicultural tapestry of southern Arizona—blending Indigenous, Mexican, and Anglo influences—has
    shaped her worldview and honed her sensitivity to cross-cultural communication. She actively participates in local Mexican-American community organizations, mentors youth from similar backgrounds, and
    draws continual inspiration from Mexican artists such as Frida Kahlo and Diego Rivera, striving to embed that cultural richness into the educational experiences she creates.
attributes:
  skills: '[''HTML'', ''CSS'', ''JavaScript'', ''React'', ''Instructional Design'', ''Curriculum Development'', ''LMS Administration (Canvas, Moodle)'', ''Adobe Illustrator'', ''Adobe Photoshop'', ''Canva'',
    ''Bilingual Communication (Spanish/English)'', ''Workshop Facilitation'', ''Agile Team Collaboration'', ''Technical Troubleshooting'', ''Critical User Feedback Analysis'']'
  hobbies: '[''Painting (acrylic and digital illustration)'', ''Visiting art galleries and mural tours'', ''Salsa dancing'', ''Community-theater improv'', ''Robotics mentorship for youth'', ''Hiking in
    the Sonoran Desert'', ''Cooking traditional Mexican dishes'', ''Participating in Mexican cultural festivals'', ''Playing narrative-driven indie video games'', ''Spanish-English language exchange meetups'',
    ''Exploring local coffee shops'']'
  career_goals: Marcela aims to become a senior learning experience designer and eventually lead a cross-functional team that creates culturally inclusive ed-tech products. She plans to earn a master's
    degree in Human-Computer Interaction within the next three years to deepen her research skills, while building a portfolio of bilingual, art-infused learning modules that highlight Mexican heritage.
    In the longer term she aspires to launch her own startup focused on interactive, story-driven educational tools for K-12 students in Spanish-dominant communities. Alongside professional growth, she
    is committed to developing personal strategies for managing anxiety, such as mindfulness training, so she can sustain high performance and serve as a mentor for other underrepresented tech professionals.
