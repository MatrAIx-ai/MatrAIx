  hobbies: '[''Vegetable Gardening'', ''Knitting'', ''Volunteering at Animal Shelter'', ''Reading Mystery Novels'', ''Community Theater'', ''Yoga for Stress Relief'', ''Baking Bread'']'
  career_goals: Judy aims to earn her Advanced ASE certifications in drivetrain and engine performance within the next two years, positioning herself for a lead technician role at the local dealership.
    She also aspires to develop a mentorship program for women entering the automotive trade and, eventually, to open a small, community-focused repair shop that emphasizes fair pricing, a welcoming atmosphere,
    and opportunities for apprenticeships.
