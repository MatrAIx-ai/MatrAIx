personas:
  professional: Meenu Mangru, an experienced educational guidance specialist, leverages psychometric tools like the Strong Interest Inventory and MBTI, data‑driven analytics, and culturally attuned counseling
    to craft personalized career pathways, and they maintain meticulous records and reliable partnerships across Ohio’s schools and community colleges.
  sports: Meenu Mangru, a dedicated yoga practitioner who supplements their practice with weekend walks in Hocking Hills State Park, quietly supports the Cleveland Browns (NFL) and follows Ohio State Buckeyes
    basketball, and they are a member of the Dayton Yoga Collective.
  arts: Meenu Mangru, an avid listener of sitar maestro Ravi Shankar and tabla virtuoso Zakir Hussain, devotes evenings to literary fiction by authors like Jhumpa Lahiri and Haruki Murakami, channels reflections
    into journaling and occasional poetry readings at local cafés, and they find solace in the nuanced rhythms of Indian classical music.
  travel: Meenu Mangru, a meticulous planner who favors low‑key retreats, has explored Kyoto’s zen gardens, trekked the Scottish Highlands, and spent serene weekends at Hocking Hills State Park, designs
    itineraries around quiet museums and nature walks, and they budget carefully to balance career advancement with personal solitude.
  culinary: Meenu Mangru, a skilled home chef, blends traditional Indian flavors with health‑focused twists—crafting turmeric‑infused lentil dal, low‑oil palak paneer using tofu, and fragrant quinoa biryani—while
    they tend a herb garden of cilantro, mint, and fenugreek to ensure fresh ingredients for their vegetarian meals.
  core: Meenu Mangru, a routine‑loving introvert, balances meticulous career counseling with solitary creative pursuits, yet they often delay dentist visits and hoard plant cuttings like secret treasures.
background:
  cultural: Meenu was raised in a South Asian (Indian) immigrant family, with parents originally from Gujarat, who emphasized education, family cohesion, and respect for cultural traditions. Growing up
    in Dayton, Ohio, she balanced Indian customs such as celebrating Diwali and Navratri with integration into American society. Bilingual in English and Gujarati, she effectively communicates with first-generation
    immigrant students and their families. Her bicultural perspective informs her counseling practice, allowing her to honor familial expectations while encouraging independent career choices for her clients.
attributes:
  skills: '[''Academic counseling'', ''Career development planning'', ''Psychometric assessment interpretation'', ''Individualized education plan design'', ''Counseling software proficiency (Naviance, Career
    Cruising)'', ''Report writing and documentation'', ''Data analysis for student outcomes'', ''Cultural competency with South Asian communities'', ''Program development and outreach'']'
  hobbies: '[''Reading literary and non-fiction books'', ''Journaling and creative writing'', ''Yoga and guided meditation'', ''Indoor gardening and herb cultivation'', ''Cooking vegetarian Indian meals'',
    ''Listening to Indian classical music (sitar, tabla)'']'
  career_goals: Meenu aspires to become a senior director of student services at a community college or regional university, overseeing comprehensive career development programs. She plans to earn a master's
    degree in counseling or educational psychology and obtain licensure as a Licensed Professional Counselor in Ohio. In the medium term, she wishes to create a mentorship network for South Asian and first-generation
    college students in the Dayton area, designing workshops that integrate cultural expectations with modern career pathways. Long-term, she envisions influencing state policy for equitable educational
    guidance and establishing a community resource hub that supports culturally responsive career counseling.
