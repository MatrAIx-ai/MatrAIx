personas:
  professional: Ryan Strickland is a senior sales strategist with three decades of B2B and B2C experience, leveraging meticulous market analysis, consultative selling, and a designer’s eye for visual storytelling
    to craft compelling pitches, while they channel their curiosity and organized nature into innovative, experience‑focused sales initiatives.
  sports: Ryan Strickland is an avid weekend hiker in the Blue Ridge foothills and a member of the Greenville Running Club, they follow the Carolina Panthers and Greenville Drive closely, play recreational
    golf at Palmetto Dunes Country Club, and unwind with occasional fishing trips on Lake Hartwell.
  arts: Ryan Strickland cultivates a deep connection to the visual and musical arts, frequenting the Greenville County Museum of Art for shows featuring painter John Boles, experimenting with photography
    inspired by Ansel Adams, and joining acoustic jam sessions where they strum covers of Bob Dylan and Brandi Carlile, while also supporting local theater productions of works by playwright Lauren Kenny.
  travel: Ryan Strickland plans trips with meticulous itineraries, balancing work commitments; they favor cultural getaways like a week‑long art tour of Florence and Paris, have road‑tripped through Asheville
    and Savannah, and dream of a sunrise photo hike in Patagonia, while budgeting for family‑friendly stays.
  culinary: Ryan Strickland delights in modern Southern cooking, they perfect dishes such as shrimp‑and‑grits with smoked paprika, miso‑glazed collard greens, bourbon‑infused peach cobbler, and sous‑vide
    pork chops seasoned with heirloom tomatoes and fresh thyme, blending traditional comfort with contemporary flavor twists.
  core: Ryan Strickland combines an insatiable curiosity for art and business with a methodical, schedule‑obsessed mind, yet they habitually procrastinate on filing taxes until the last minute, balancing
    high‑stakes sales leadership ambitions with weekend photography expeditions and spontaneous guitar jam sessions.
background:
  cultural: Ryan was raised in a suburban community near Greenville, South Carolina, where Southern hospitality and a strong sense of community shaped his early values. He grew up with exposure to both
    traditional Southern customs—such as family gatherings, church involvement, and regional cuisine—and the rapidly expanding cultural scene of the Upstate, known for its growing arts district and tech‑driven
    economy. This blend of traditional Southern roots and contemporary influences fostered his appreciation for both stability and innovation. His white ethnic background situates him within the broader
    cultural context of the American South, where respect for personal relationships and a collaborative spirit are emphasized, while his professional experience has further broadened his worldview, encouraging
    openness to diverse ideas and unconventional thinking.
