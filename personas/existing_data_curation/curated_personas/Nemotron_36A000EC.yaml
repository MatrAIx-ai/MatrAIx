personas:
  professional: Jordan Martone, an aspiring game‑mod developer and junior Arduino tinkerer, channels their strategic‑game mindset into creating Minecraft mods that experiment with redstone logic, often
    cobbling together spare parts from yard‑work repairs while applying a skeptical, evidence‑first approach to debugging code, even when deadlines slip due to their relaxed attitude toward school assignments.
  sports: Jordan Martone, a point guard on the Palmer Middle School basketball team, idolizes the Dallas Mavericks and treats each practice like a strategy session, using their tactical gaming instincts
    to design pick‑and‑roll plays on the community park court, even if they occasionally skip a drill to join an online tournament.
  arts: Jordan Martone, a devoted fan of sci‑fi epics like 'Dune' and of Jeremy Soule’s ambient game scores, spends weekends crafting custom Minecraft mods that double as pixel art installations while sketching
    mech concepts in a battered notebook, merging digital creation with analog doodles.
  travel: Jordan Martone, who loves spontaneous bike rides along Clear Fork Creek and dreams of a budget road trip through Austin’s music district after graduating, prefers low‑cost, family‑organized travel,
    often using Discord chats to swap itinerary ideas and mapping routes on their phone for flexible adventures.
  culinary: Jordan Martone, a self‑taught snack chef, regularly blends classic Texas brisket tacos with loaded nachos and experiments with an Arduino‑controlled timer to perfect pizza slices, yet often
    forgets to clean the kitchen after a long gaming marathon, leading to a cluttered countertop.
  core: Jordan Martone is a skeptical, strategy‑obsessed teen who tinkers with code and circuits, dominates the basketball court with a gamer’s mindset, and balances a love for Texas‑style snacks with a
    habit of impulsive spending and occasional disorganization.
background:
  cultural: Jordan grew up in Palmer, a small town in Ellis County, Texas, within a white, middle‑class family that balances traditional rural values with a growing appreciation for technology. Community
    life often revolves around school events, local sports, and church gatherings, where he occasionally attends a Methodist service with his family. While respecting these local customs, Jordan's skeptical
    and critical personality drives him to question norms and seek evidence‑based explanations, especially in school and online forums. His upbringing blends the practical, hands‑on ethos of a rural environment—helping
    with yard work and minor repairs—with the digital culture of gaming and coding that shapes his peer interactions and future aspirations.
