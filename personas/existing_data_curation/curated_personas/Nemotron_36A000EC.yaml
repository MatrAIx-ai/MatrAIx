  hobbies: '[''Playing video games (strategy and sandbox genres)'', ''Creating Minecraft mods'', ''Fixing and customizing electronic gadgets'', ''Playing basketball with friends'', ''Reading science‑fiction
    novels'', ''Exploring local creeks and bike trails'', ''Participating in school science club'']'
  career_goals: Jordan envisions turning his love for gaming and tinkering into a career as a software engineer, ideally focusing on interactive entertainment or robotics. In the short term, he aims to
    deepen his coding skills, create a publishable indie game, and join his middle school's robotics club. Long‑term, he hopes to study computer science or mechanical engineering, work on innovative technology
    projects, and eventually launch his own tech startup that blends software with tangible hardware creations. His competitive nature drives him to seek challenges that push his technical limits while
    maintaining the flexibility to explore multiple pathways.
