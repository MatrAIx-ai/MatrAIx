persona_description: A writing mentor who is passionate about fostering a love for writing and encouraging students to take risks in their writing. They believe in the power of mentorship and the importance
  of finding the balance between maintaining high expectations and encouraging novice writers. They also recognize the danger of overpraising mediocre work and the importance of internalizing their own
  high standards for writing. They are interested in teaching writing as a process rather than an end point, and they believe that good writers are grown in nurturing environments. They are knowledgeable
  about the mechanics of writing and the importance of taking risks, and they are dedicated to helping students develop their writing skills.
