  hobbies: '[''Hiking in the San Gabriel Mountains'', ''Landscape photography'', ''Playing acoustic guitar'', ''Cooking Mediterranean meals with his spouse'', ''Volunteering at local coding bootcamps'',
    ''Reading contemporary science‑fiction'', ''Board‑game nights with friends'']'
  career_goals: Julian aims to transition into a technical leadership role where he can combine his engineering expertise with his passion for supporting others. Over the next five years he envisions becoming
    an engineering manager or lead architect, guiding a team that builds inclusive, socially impactful software—such as platforms that improve accessibility for underserved communities. He also hopes to
    spearhead internal mentorship programs and partner with local nonprofits to provide coding workshops for youth. Maintaining a healthy work‑life balance, Julian seeks flexible or hybrid work arrangements
    that allow him to stay present for his family while continuing professional growth.
