  skills: '[''Python'', ''JavaScript'', ''TypeScript'', ''React'', ''Node.js'', ''Express'', ''AWS (Lambda, DynamoDB, S3)'', ''Docker'', ''Kubernetes'', ''CI/CD (GitHub Actions)'', ''RESTful APIs'', ''GraphQL'',
