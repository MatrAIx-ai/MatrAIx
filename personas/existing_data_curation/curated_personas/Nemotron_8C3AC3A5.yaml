  career_goals: Amber aims to advance into senior HR leadership, ultimately becoming an HR Director or Chief People Officer for a mid‑size organization. She wants to spearhead data‑driven talent strategies
    that enhance employee experience and promote inclusive culture. To support this, she plans to earn the SHRM‑SCP certification, pursue an MBA with a focus on organizational behavior, and lead cross‑functional
    projects that integrate technology, such as AI‑based talent analytics, into everyday HR practices.
