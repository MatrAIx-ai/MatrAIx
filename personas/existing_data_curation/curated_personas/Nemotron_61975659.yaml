  career_goals: Jan aims to advance into a senior executive assistant role supporting a C‑level leader within a regional corporation, leveraging her curiosity to master strategic initiatives. She plans
    to complete a bachelor's degree in business administration and obtain the Certified Administrative Professional (CAP) credential to solidify her expertise. Over the next five years, she wants to develop
    stronger organizational systems, transition into office‑management or operations leadership, and eventually launch a boutique consulting service that helps small businesses in Ionia streamline their
    administrative processes.
