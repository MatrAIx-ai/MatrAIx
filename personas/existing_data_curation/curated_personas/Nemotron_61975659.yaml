personas:
  professional: Jan Cummings is a highly adaptable executive administrative professional who leverages advanced Excel pivot tables, meticulous travel coordination, and vendor negotiation skills to keep
    C‑level leaders on track, while their spontaneous, curiosity‑driven mindset often pushes them to create unconventional solutions despite occasionally wrestling with tight deadlines.
  sports: Jan Cummings hikes the Ionia County nature trails with the Ionia Hiking Society in the spring, follows the Detroit Lions each fall and backs the Detroit Tigers during the summer, and they supplement
    outdoor pursuits with a weekly yoga class at the community center, balancing a low‑key fitness routine with a quiet competitive streak that emerges during occasional pickup basketball games.
  arts: Jan Cummings curates a personal blog that reviews historical documentaries—favoring works by Ken Burns and Ava DuVernay—while photographing local flora for a modest Instagram feed, enjoys listening
    to folk‑rock legends like Johnny Cash and The Decemberists, and frequently attends regional art fairs and community‑theater productions, letting these cultural touchstones shape a reflective leisure
    life.
  travel: Jan Cummings prefers meticulously planned road trips that blend Midwestern charm with global curiosity, having explored the Upper Peninsula’s shoreline, the historic streets of Savannah, and a
    week‑long cultural immersion in Copenhagen, while they balance a love of leisurely lakeside cabins with a yearning to trek the Scottish Highlands.
  culinary: Jan Cummings, an enthusiastic home cook, cultivates heirloom tomatoes and sweet corn in their backyard and transforms classic Midwestern meatloaf into a Korean‑inspired bulgogi meatloaf with
    gochujang glaze, while also whipping up a creamy dill potato soup for winter evenings, showcasing a skill set that blends comfort cooking with adventurous global spices like sumac and miso, and they
    often experiment with fresh rosemary, smoked paprika, and aged balsamic vinegar.
  core: Jan Cummings is a pragmatic curiosity‑driven executive who balances meticulous budgeting with a habit of over‑thinking, finds solace in solitary gardening and documentary reviews, and occasionally
    lets competitive bridge games pull them out of their comfort zone.
background:
  cultural: Jan grew up in a small Midwestern town in Michigan within a family of German‑Scandinavian ancestry that settled the Great Lakes region in the early 20th century. The local culture emphasized
    hard work, modesty, community involvement, and a pragmatic outlook. Raised in a predominantly white, Protestant community, she absorbed values of self‑reliance, respect for tradition, and an appreciation
    for the rhythms of rural life. Living in Ionia, she participates in county fairs, church gatherings, and local volunteer events, maintaining close ties with extended family who uphold Midwestern customs.
    This blend of traditional Midwestern sensibilities with exposure to modern digital media shapes her worldview, balancing curiosity about the broader world with a down‑to‑earth, practical approach.
