personas:
  professional: A budding junior storyteller and aspiring coder, Tessa Medina delights in crafting short fantasy tales in a weathered journal while building simple Scratch games, balancing her curiosity
    for new ideas with a practical, hands‑on approach that makes her a natural problem‑solver, though she often shirks strict deadlines in favor of flexible, spontaneous creation.
  sports: A nature‑focused activity enthusiast, Tessa Medina participates in the local Girl Scouts' hiking club, volunteers on weekend nature‑trail clean‑ups, roots for the Indianapolis Colts football team
    and the Indiana Pacers basketball team on game nights, and occasionally joins the elementary school’s intramural soccer league, preferring low‑pressure, outdoor play over organized competition.
  arts: A passionate reader and sketch artist, Tessa Medina devours fantasy novels by J.K. Rowling and Rick Riordan, draws detailed woodland scenes inspired by the works of Beatrix Potter, enjoys listening
    to the soundtracks of Disney’s Moana and Hans Zimmer’s Inception, and occasionally practices piano pieces by Ludwig van Beethoven, letting music and illustration shape her imaginative world.
  travel: A curious explorer of nearby wonders, Tessa Medina spends family holidays at the Indiana Dunes State Park, has a budding wish list that includes a weekend visit to the historic town of Bloomington
    for its art festivals, dreams of a future trip to Disney World in Florida, and prefers road‑trip itineraries with plenty of unscheduled stops for bird‑watching and rock‑collecting.
  culinary: An eager kitchen assistant, Tessa Medina helps her family whip up a classic Thanksgiving turkey with herb‑stuffed stuffing, loves the taste of freshly baked apple crisp topped with caramel,
    enjoys making simple friendship‑bracelet‑themed sugar cookies, and often experiments with mixing crunchy granola into yogurt for a healthy snack, though she sometimes forgets to finish her vegetables
    after dinner.
  core: Tessa Medina is a quiet, curiosity‑driven eleven‑year‑old who weaves fantasy stories, builds Scratch games, and explores woods with a sketchpad, all while juggling a cautious allowance, seasonal
    allergies, and a touch of organized‑chaos.
background:
  cultural: Tessa grew up in Waterloo, a small town in DeKalb County, Indiana, within a predominantly white, Midwestern community. Her family traces its ancestry to German and Irish settlers who arrived
    in the region in the 19th century, and they maintain traditions such as celebrating Thanksgiving with home‑cooked meals and participating in local county fairs. She attends the public elementary school
    that serves the area, where community values emphasize politeness, self‑reliance, and modesty. While her household leans toward a Protestant background, religious observance is informal, focusing on
    family gatherings and seasonal holidays like Christmas and Easter. The local culture values close‑knit relationships, modest extracurricular involvement, and a practical approach to daily life, all
    of which shape Tessa’s worldview.
attributes:
