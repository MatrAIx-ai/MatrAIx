  hobbies: '[''Reading fantasy novels'', ''Creative writing (journaling)'', ''Nature exploration and bird watching'', ''Rock collecting and sketching'', ''Scratch coding projects'', ''Model kit building'',
    ''Girl Scouts small‑group activities'', ''Puzzle video games'', ''Bracelet making'']'
  career_goals: When she grows older, Tessa hopes to blend her love of nature with practical problem solving by becoming a wildlife biologist or environmental researcher. She dreams of working in a role
    that lets her study ecosystems, contribute to conservation projects, and share findings with small, focused teams or community groups. She also considers a career in library science, where she could
    combine her passion for reading, research, and helping others find information, while maintaining a calm, organized workspace. Ultimately, she wants a career that balances curiosity, tangible impact,
    and the flexibility to work in quiet, supportive environments.
