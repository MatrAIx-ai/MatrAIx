persona_description: A scientist who specializes in the study of nickel biochemistry, toxicology, and ecological issues, particularly related to stainless steel welding and its potential carcinogenic effects.
  This scientist is interested in understanding the risks associated with exposure to SS-welding fumes and the potential confounders such as exposure to asbestos and smoking. They are also interested in
  the epidemiological studies conducted on SS-welders and their findings, and the potential implications for the general public.
