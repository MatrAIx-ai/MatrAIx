personas:
  professional: Randy Lantigua leverages a strong analytical mindset and bilingual fluency to supervise a small office team, using Excel, Python, and SQL to automate workflows while dreaming of a mid‑level
    operations manager role where PMP‑certified projects and data‑driven decision‑making will transform small businesses in southwestern Louisiana.
  sports: Randy Lantigua joins the Bayou United pickup soccer crew every Saturday, cheers on Liga MX powerhouse Club América, spends quiet mornings fishing for catfish on the Atchafalaya Basin, and occasionally
    hikes the marshes of the Barataria Preserve to balance competitive drive with outdoor calm.
  arts: Randy Lantigua’s playlist blends the corridos of Los Tigres del Norte with classic rock legends like Led Zeppelin, they attend local cultural festivals featuring mariachi bands, and they unwind
    after a long day by streaming indie documentaries on technology and design.
  travel: Randy Lantigua prefers spontaneous road trips, mapping routes on a phone app for weekend getaways to New Orleans’ French Quarter or Austin’s live‑music scene, while dreaming of a future backpacking
    adventure through Mexico’s Yucatán Peninsula to taste regional cuisine and explore wetlands.
  culinary: Randy Lantigua cooks family recipes like tacos al pastor, homemade pozole, and fresh salsa verde with a side of grilled corn, juggling intermediate kitchen skills and a love for experimenting
    with Arduino‑controlled sous‑vide devices to achieve perfectly cooked meat.
  core: Randy Lantigua is a curious yet pragmatic 20‑year‑old who balances a love for DIY tech projects and competitive gaming with a restless mind that worries about every detail, often leaving organization
    to the last minute.
background:
  cultural: Randy grew up in a bilingual Mexican‑American household in Jennings, where his parents emphasized hard work, family loyalty, and respect for tradition. He celebrates Mexican holidays such as
    Día de los Muertos and Cinco de Mayo, and also participates in local Cajun festivals, reflecting the cultural blend of southwestern Louisiana. Fluent in Spanish and English, he often switches languages
    at home and in the community. His Catholic upbringing influences his values and weekend attendance at mass. The close‑knit extended family network provides both emotional support and occasional pressure
    to succeed, shaping his competitive drive while also grounding him in a strong sense of cultural identity.
