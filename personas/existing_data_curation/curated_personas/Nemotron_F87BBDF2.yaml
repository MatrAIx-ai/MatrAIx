  career_goals: Randy aims to leverage his technical background and supervisory experience to move into a mid‑level operations manager role within the next three years, focusing on process automation and
    data‑driven decision‑making. He aspires to obtain certifications in project management (PMP) and business analytics, eventually leading a regional office or launching his own consultancy that helps
    small businesses in southwestern Louisiana adopt cost‑effective digital tools. His competitive nature drives him to outperform peers and secure a leadership position that offers both professional growth
    and financial stability.
