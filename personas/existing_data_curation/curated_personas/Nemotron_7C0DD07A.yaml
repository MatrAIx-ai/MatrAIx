  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening heirloom vegetables'', ''Participating in local folk dance groups'', ''Reading historical biographies'', ''Volunteering at the senior center'',
    ''Playing dominoes with friends'', ''Attending church gatherings'', ''Exploring genealogy'', ''Traveling to Mexico to visit family'']'
  career_goals: Although retired, Francis aims to preserve and pass on his cultural heritage to younger family members and neighbors. He aspires to mentor youths in cooking, gardening, and local history,
    and to continue volunteering at the senior center, helping organize cultural celebrations. He also wishes to document his family’s genealogy and stories in a memoir, ensuring his legacy endures. Maintaining
    his health and independence to stay active in community life remains a core personal ambition.
