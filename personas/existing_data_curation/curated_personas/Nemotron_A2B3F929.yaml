personas:
  professional: Pansy Maddox, a 25‑year‑old retail cashier in New Orleans, blends meticulous cash handling and POS accuracy with bilingual fluency in English and Louisiana Creole, using her strong conflict‑resolution
    skills and curiosity‑driven problem solving to deliver courteous service while balancing practical efficiency and a desire for leadership as she works toward a shift‑supervisor role.
  sports: Pansy Maddox enjoys weekly yoga sessions, runs with a local group training for the Crescent City Classic, cheerfully supports the New Orleans Pelicans and Saints, and joins community softball
    games when time permits, blending organized sport with spontaneous second‑line dancing for cardio.
  arts: Pansy Maddox regularly frequents live jazz at Snug Harbor, bounces to Big Freedia’s high‑energy tracks at second‑line events, attends local theatre productions featuring homegrown playwrights, and
    devours contemporary fiction by Zadie Smith and Colson Whitehead, letting the rhythms of Trombone Shorty and the prose of Jesmyn Ward shape her creative outlook.
  travel: Pansy Maddox prefers spontaneous weekend road trips along the Gulf Coast, having explored historic Savannah and the vibrant French Quarter, while dreaming of a culinary pilgrimage to Oaxaca, Mexico,
    and a relaxed escape to the Bahamas, balancing a modest travel budget with a craving for cultural immersion.
  culinary: Pansy Maddox is a confident home chef who masters Creole staples such as shrimp gumbo with fresh okra, chicken‑and‑sausage jambalaya, and crawfish étouffée, often adding a twist of smoked paprika
    or mango purée, and she delights in sourcing locally roasted coffee beans and artisanal hot sauce to complement her meals.
  core: Pansy Maddox blends a meticulous work ethic with a love for spontaneous music‑filled celebrations, but can be guilty of late‑night snack binges, occasional forgetfulness watering her garden plants,
    and impulse purchases of kitchen gadgets when a new recipe sparks curiosity.
background:
  cultural: Pansy grew up in Kenner, a suburb of New Orleans, within a vibrant African‑American and Creole community. Her family’s traditions blend Southern Black cultural heritage with the unique customs
    of Louisiana’s Creole population, including strong ties to church, music, and food. She celebrates Mardi Gras and other local festivals, values the communal spirit of second‑line parades, and embraces
    the resilience and solidarity that characterize the Black experience in the Gulf Coast. These cultural influences shape her outlook, her love for rhythm and flavor, and her commitment to supporting
    her neighborhood.
attributes:
  skills: '["Cash handling", "Customer service", "Point-of-sale (POS) systems", "Inventory management", "Basic bookkeeping", "Effective communication", "Conflict resolution", "Time management", "Bilingual
    (English & Louisiana Creole)", "Team collaboration"]'
  hobbies: '["Cooking Creole cuisine", "Listening to jazz & R&B", "Attending local music festivals", "Reading contemporary fiction", "Yoga", "Volunteering at community garden", "Dancing at second line parades",
    "Exploring local history museums"]'
  career_goals: Pansy aims to advance from cashier to shift supervisor and eventually store manager, leveraging her on‑the‑job experience to lead a team. She plans to complete her associate degree in business
    administration and explore certification in retail management. Long‑term, she dreams of opening a boutique that showcases locally made apparel and crafts, and using her position to mentor young people
    in her community about employment opportunities and financial literacy.
