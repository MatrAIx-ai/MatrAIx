personas:
  professional: Monique Foreman is a budding junior librarian in her imaginative play, meticulously arranging stuffed animal books, curating storytime sessions for her dolls, and channeling her curiosity
    and methodical nature into early literacy exploration.
  sports: Monique Foreman thrives in toddler gymnastics classes, loves the rhythmic bounce of the mini trampoline, cheers for the local MLB team, the Chicago Cubs, during family outings, and energetically
    joins neighborhood sandbox soccer games, showcasing a sociable and active fitness routine.
  arts: Monique Foreman delights in splashing Crayola crayons on large sheets, singing along to Disney's 'Let It Go', dancing to the upbeat tunes of 'Baby Shark' and admiring the animated artistry of Pixar's
    'Toy Story', weaving her appreciation for vibrant art and music into daily play.
  travel: Monique Foreman embarks on family road trips to the nearby beach, has explored the wonders of the local zoo, dreams of a future visit to Disneyland, and meticulously plans her stroller adventures
    with a favorite stuffed map, blending curiosity with structured exploration.
  culinary: Monique Foreman prefers smooth mashed sweet potatoes, crunchy apple slices, and the occasional bite of chicken nuggets, proudly attempts to use a child‑size fork, and occasionally refuses peas,
    revealing a selective palate balanced by a willingness to try new textures.
  core: Monique Foreman, a two‑year‑old whirlwind of curiosity, organization, and social energy, turns everyday moments into mini‑adventures, from arranging toy libraries to managing a penny stash, while
    never missing a chance to sing, jump, and explore.
background:
  cultural: Monique is raised in a white, middle‑class family in Russellville, Arkansas, a small‑town setting where Southern hospitality and community values are prominent. Her family participates in local
    church gatherings, seasonal festivals, and county fairs, exposing her to folk music, country tunes, and traditional crafts. Family traditions such as shared meals, Sunday brunches, and holiday celebrations
    emphasize togetherness and a love for the arts, fostering her appreciation for music, drawing, and group activities. The rhythm of life in Pope County, with its emphasis on community support and outdoor
    recreation, shapes Monique's early experiences and worldview.
