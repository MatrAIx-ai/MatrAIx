  hobbies: '[''Building Lego models'', ''Jigsaw puzzles'', ''Connect Four'', ''Simple chess'', ''Reading adventure books about trains and construction'', ''Collecting rocks and leaves'', ''Youth soccer'',
    ''Watching educational cartoons about space and engineering'']'
  career_goals: Leonard frequently talks about wanting to become a builder when he grows up, specifically a civil engineer or architect who designs bridges, roads, and public structures. He is drawn to
    careers that involve clear plans, step‑by‑step execution, and visible results, reflecting his love for organization and methodical work. He also imagines helping his community, hoping his future projects
    will keep people safe and connected. While he occasionally mentions becoming a firefighter because of the teamwork and routine, his primary ambition centers on designing and constructing lasting infrastructure.
