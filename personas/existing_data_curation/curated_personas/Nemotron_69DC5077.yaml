personas:
  professional: An organized maintenance technician, Kyana Ochoa (28) leverages their HVAC, electrical, and plumbing expertise, methodically logs work orders in a CMMS, and leads shift coordination with
    clear communication, earning them the reputation as the go‑to problem‑solver for both routine inspections and emergency repairs while balancing a cooperative team spirit with assertive decision‑making.
  sports: An avid beach walker and occasional volleyball player, Kyana Ochoa (28) frequently hits the San Pedro shoreline for sunrise jogs, joins a local co‑ed soccer league that supports the Los Angeles FC
    community, and balances their routine with quarterly yoga retreats, always keeping a water bottle and a sun‑hat in their gym bag.
  arts: Drawing inspiration from both traditional folk rhythms and indie vibes, Kyana Ochoa (28) curates playlists featuring regional acoustic ensembles and Tame Impala, devours mystery novels by Agatha
    Christie and Gillian Flynn during downtime, and attends monthly cultural screenings at the Silent Movie Theatre, where they appreciate the blend of storytelling and visual art.
  travel: Planning trips with a blend of structure and spontaneity, Kyana Ochoa (28) has already explored Oaxaca’s Day‑of‑the‑Dead celebrations, enjoys weekend getaways to Santa Barbara’s coastal trails,
    and dreams of a future road trip along the Pacific Coast Highway to capture sunrise views, all while budgeting travel expenses to maintain financial stability for upcoming certification fees.
  culinary: Passionate about heritage‑inspired California fusion, Kyana Ochoa (28) regularly prepares shrimp tacos with avocado crema, grilled elote topped with cotija cheese and chipotle‑lime mayo, and
    mezcal‑infused guacamole, experimenting with fresh cilantro, lime zest, and locally sourced heirloom tomatoes while showcasing their modest cooking skills to friends during neighborhood gatherings.
  core: Meticulously organized yet constantly battling anxiety, Kyana Ochoa (28) logs even personal tasks like grocery trips in a digital planner, balances a love for hands‑on repair with occasional caffeine‑fueled
    procrastination, and finds calm in rhythmic cooking and yoga.
background:
  cultural: Kyana is a first‑generation Mexican‑American who grew up in a close‑knit Mexican community within Los Angeles County. Bilingual in Spanish and English, she carries forward family traditions
    such as celebrating Día de los Muertos, preparing tamales, and participating in neighborhood fiestas. Her upbringing emphasized hard work, respect for elders, and a collective sense of responsibility,
    values that shape her cooperative yet assertive approach at work. She often blends Mexican culinary techniques with Californian ingredients, and she stays connected to her heritage through music, cultural
    festivals, and volunteering at local Latino community centers. While fully integrated into the diverse fabric of Wilmington, she still feels a strong tie to her Mexican roots, which informs her identity,
    her interpersonal style, and her appreciation for community‑oriented activities.
attributes:
  skills: '[''HVAC system maintenance and repair'', ''Electrical wiring and troubleshooting'', ''Basic plumbing repairs'', ''Preventive maintenance scheduling'', ''CMMS work‑order management'', ''OSHA safety
