  hobbies: '[''DIY home‑improvement projects'', ''Balcony gardening'', ''Cooking Mexican‑California fusion cuisine'', ''Yoga and guided meditation'', ''Journaling'', ''Reading mystery and thriller novels'',
    ''Puzzle solving (jigsaw and logic puzzles)'', ''Listening to traditional Mexican and indie music'', ''Beach walks along the San Pedro coastline'', ''Volunteering at community workshops teaching basic
    home repair'']'
  career_goals: Kyana is focused on building a stable, upward‑moving career that rewards her love of structure and reliability. In the next two years she plans to complete her associate’s coursework in
    facilities management and obtain the Certified Maintenance & Reliability Technician (CMRT) credential. Her medium‑term goal is to step into a senior maintenance supervisor role, where she can design
    preventive‑maintenance programs, mentor junior technicians, and oversee safety audits for a large industrial campus. Long‑term, she envisions either managing a multi‑site facilities operation or launching
    her own small‑scale repair service that emphasizes meticulous record‑keeping and transparent pricing. Throughout, she seeks positions that offer steady benefits and clear advancement pathways to alleviate
    her worry about job security.
