personas:
  professional: Miranda Drake, a 29-year-old electronics assembly specialist turned aspiring product developer, leverages their ace soldering skills, Python and C++ microcontroller prototyping, and eye
    for abstract design to prototype immersive interactive devices while rallying multidisciplinary teams at the local maker space.
  sports: Miranda Drake, a Boston-area enthusiast, enjoys weekend hikes with the Middlesex Fells Trail Club, follows the Boston Red Sox and Celtics loyally, and occasionally joins a casual ultimate frisbee
    league while preferring low-impact cardio over rigid gym routines.
  arts: Miranda Drake channels their imagination into acrylic abstract canvases inspired by the kinetic sculptures of Alexander Calder, designs digital illustrations echoing the neon aesthetics of James
    Turrell, and curates playlists featuring Brian Eno and Aphex Twin while regularly attending shows by Boston’s indie band New Ponderosa, all of which fuel their improvisational theater sketches at the
    Boston Improv Hub.
  travel: Miranda Drake favors spontaneous weekend getaways to nearby cultural hotspots like Portland, Maine, and long-planned trips abroad to Tokyo’s Akihabara district and the Swiss Alps, balancing a
    modest travel budget with a love for hands-on workshops and street art tours while often booking last-minute flights that play into their desire for novelty.
  culinary: Miranda Drake, an adventurous home-cook with moderate skill, relishes whipping up ramen bowls with miso-based broth, charred Brussels sprouts tossed in smoked paprika, and experimental cocktail
    mixers featuring lavender and gin, while also indulging in Boston’s farm-to-table scene at spots like Oleana for their signature lamb kebabs.
  core: Miranda Drake is a curiosity-driven maker who fuses circuitry with paint, constantly jumps between projects, worries about deadlines, and can’t resist a late-night board game session even if it
    means leaving a prototype unfinished.
background:
  cultural: Miranda grew up in a middle‑class, white family in the Boston suburbs, with deep roots in New England's pragmatic yet community‑oriented culture. Her parents, both college‑educated, emphasized
    curiosity and lifelong learning, encouraging her to explore both science and the arts from a young age. The multicultural vibrancy of the Greater Boston area—its museums, music venues, and thriving
    maker community—shaped her appreciation for diverse creative expressions. While she identifies with the typical New England values of independence and practicality, she also cherishes her family's fondness
    for traditional folk music and seasonal community gatherings, which have reinforced her sociable and collaborative nature.
attributes:
  skills: '[''Soldering (SMT and TH)'', ''PCB Assembly'', ''Circuit Troubleshooting'', ''Microcontroller Programming (Arduino, Python, C++)'', ''CAD Modeling (SolidWorks, Fusion 360)'', ''3D Printing'',
    ''Graphic Design (Adobe Photoshop, Illustrator)'', ''Creative Prototyping'', ''Team Collaboration'', ''Problem Solving'']'
  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Synthesizer music composition'', ''Improvisational theater'', ''Board game meetups'', ''Urban hiking (Middlesex Fells)'', ''3D printing hobby
    projects'', ''Maker space volunteering'', ''Attending indie concerts and gallery openings'']'
  career_goals: Miranda aims to transition from assembly work to a product development role where she can integrate her technical expertise with her artistic sensibility. She envisions spearheading a small
    team that designs interactive consumer electronics—such as wearable art devices or immersive installation hardware—while also pursuing part‑time coursework in industrial design to broaden her skill
    set. Long‑term, she hopes to launch her own boutique studio that creates bespoke tech‑enhanced art for galleries, events, and community spaces, and to mentor other women entering STEM fields. Balancing
    creative freedom with a stable career path, she seeks roles that allow flexible, project‑based work and opportunities for continual learning.
