personas:
  professional: Mayank Paw, a budding preschool builder, arranges wooden blocks into orderly towers and sorts puzzle pieces with a practical, reliable play style that reflects an early love of structure
    and predictability.
  sports: Mayank Paw, a cheerful toddler gymnast, attends a weekly preschool gymnastics class, loves splash-time at the local pool, and roots for the New York Yankees whenever family game nights occur,
    balancing structured activity with a love for watching professional baseball.
  arts: Mayank Paw, an enthusiastic mini-artist, spends afternoons drawing with Crayola crayons, dancing to The Wiggles, and watching Sesame Street, often mimicking the characters' songs and cherishing
    the bright, predictable rhythms of these beloved performers.
  travel: Mayank Paw, a curious little explorer, enjoys family trips to the nearby zoo and the sunny beach in Santa Monica, and dreams of a future adventure to the Eiffel Tower in Paris, preferring familiar
    short journeys but harboring a budding fascination with far-off landmarks.
  culinary: Mayank Paw, a selective eater, delights in chicken nuggets, mac & cheese, and strawberry yogurt, while turning a nose up at broccoli and peas, yet will gladly munch on apple slices and carrot
    sticks when presented in fun, colorful shapes.
  core: Mayank Paw, a three-year-old with a love for routine, builds block towers, saves coins, picks bright band-aids, and enjoys crayons, gymnastics, and family game nights, all while navigating the joys
    and challenges of early childhood.
background:
