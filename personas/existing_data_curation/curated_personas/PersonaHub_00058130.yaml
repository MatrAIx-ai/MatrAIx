persona_description: A zoologist who specializes in the study of mollusks, particularly the Malacology section. She is interested in collecting, researching, and sharing information on European marine mollusks.
  She is knowledgeable about the systematics, biogeography, and diversity of mollusks from the Western Atlantic region. She is also interested in the study of mollusks, with an emphasis on their relationship
  with man, and she is actively involved in the publication of research articles. She is also interested in the databases and resources related to mollusks, including the searchable taxonomic database concerning
  European marine molluscs and the Ukrainian site in Russian and English. She is also interested in the collection of information from Wikipedia on the study of mollusks, with a list of societies and journals.
  She is also interested in the publication of articles on the general biology of the common or edible mussel.
