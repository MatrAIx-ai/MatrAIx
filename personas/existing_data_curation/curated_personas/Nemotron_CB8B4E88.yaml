  career_goals: Although retired from formal employment, Kyle aims to keep his intellect engaged by volunteering at the local historical society, mentoring younger neighbors in woodworking, and curating
    a small‑scale exhibition of regional folk art. He aspires to travel to a few major art museums in the Northeast, complete a mixed‑media series inspired by his surroundings, and maintain his health through
    daily walks and stress‑reduction practices such as journaling and gentle yoga.
