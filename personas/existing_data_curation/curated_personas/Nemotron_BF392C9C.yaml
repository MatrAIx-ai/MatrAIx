  hobbies: '[''gardening'', ''traditional cooking'', ''chess'', ''reading historical biographies'', ''listening to norteña music'', ''attending church events'', ''watching classic Mexican films'', ''genealogy
    research'', ''basic mechanical tinkering'', ''learning smartphone apps'']'
  career_goals: Juan's primary goal is to preserve his life story and pass it on to his grandchildren and community members. He aims to write a memoir that captures family recipes, garden tips, and memories
    of the Rio Grande Valley, ensuring that the cultural heritage he cherishes endures. He also seeks to mentor his grandchildren in cooking traditional dishes and tending a vegetable garden, reinforcing
    practical skills and family bonds. Juan wants to remain an active participant in the local senior center, offering workshops on basic home repair and financial budgeting for peers. Additionally, he
    is determined to learn to use a smartphone and video‑calling apps so he can stay connected with distant relatives. Finally, he hopes to contribute to a community garden project in Weslaco, hoping his
    expertise helps the neighborhood produce fresh food and foster cooperation.
