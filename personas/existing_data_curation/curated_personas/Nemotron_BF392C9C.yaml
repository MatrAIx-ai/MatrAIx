personas:
  professional: Juan Gomez is a seasoned community elder who leverages decades of hands‑on carpentry, gardening, and bilingual storytelling expertise to lead workshops on home repair and financial budgeting
    at the local senior center, where their critical eye and competitive spirit keep sessions lively and practical.
  sports: Juan Gomez participates in the River Bend Seniors walking club, follows the Houston Astros in baseball season and the Houston Texans in football, and volunteers as a helper for the local Rio Grande
    Valley FC Toros youth soccer program, staying active and socially engaged through seasonal sports.
  arts: Juan Gomez fills evenings listening to norteña legend Ramón Ayala and banda icon Banda El Recodo, while revisiting golden‑age cinema classics like Los Olvidados and María Candelaria, and they often
    recite poems by José Emilio Pacheco at family gatherings, weaving music and film into their storytelling tapestry.
  travel: Juan Gomez prefers relaxed road trips to historic towns such as San Antonio and Laredo, dreams of a pilgrimage to the missions along the river, and occasionally plans short visits to relatives
    across the Rio Grande, balancing a limited budget with a desire for cultural immersion.
  culinary: Juan Gomez excels at preparing authentic tamales, pozole, and enchiladas with heirloom tomatoes, roasted chiles de árbol, and fresh corn masa, and they relish sharing these meals at family gatherings
    while habitually over‑salting to taste when excitement runs high.
  core: Juan Gomez is a fiercely curious octogenarian who blends a competitive chess mind, a green thumb, and a love for storytelling while habitually hoarding seed packets and forgetting smartphone passwords.
background:
  cultural: Juan was born in a small town near the U.S.–Mexico border and spent most of his life in Weslaco, Texas. He is of Mexican descent, raised in a bilingual, Catholic household that celebrated traditional
    Mexican holidays such as Día de los Muertos, Christmas posadas, and quinceañeras. His lived experience reflects the cross‑border culture of the Rio Grande Valley—a blend of Mexican customs, Texan influences,
    and migrant‑labor heritage. He grew up speaking primarily Spanish at home while learning English at school, giving him a deep understanding of both cultures. Values of family cohesion, respect for elders,
    hard work, and community solidarity shape his worldview. Though he now lives in the United States, his identity remains strongly tied to his Mexican roots, evident in his cuisine, language, music preferences,
    and participation in local Hispanic community events.
