  hobbies: '[''Gardening'', ''Knitting/Quilting'', ''Bridge'', ''Senior‑center dancing'', ''Local theater'', ''Cooking'', ''Walking/Hiking'', ''Birdwatching'', ''Genealogy'']'
  career_goals: Though retired, Emily aims to stay an active elder leader in her community. She plans to head the senior center’s garden club, launch a mentorship program that pairs seasoned volunteers
    with younger participants, and curate a local‑history exhibit at the town library. She also aspires to compile and publish a booklet of her family’s genealogy, and to continue supporting her church’s
    outreach and charitable initiatives. Maintaining her health, fostering social connections, and contributing her organizational talents remain her core ambitions.
