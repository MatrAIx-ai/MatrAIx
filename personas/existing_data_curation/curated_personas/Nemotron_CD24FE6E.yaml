  career_goals: Although retired, John’s primary ambition is to stay active, healthy, and mentally engaged while reducing the worry that often accompanies aging. He aims to mentor younger family members
    and community volunteers, share his life stories in a memoir for future generations, and continue learning practical technologies (such as video calls and digital photo organization) to stay connected
    with his grandchildren. He also seeks to maintain financial stability for his spouse, contribute his leadership to the local senior center, and preserve the Bohemia neighborhood’s historical legacy
    through volunteer work.
