personas:
  professional: A retired handyman with decades of hands‑on experience, Teofilo Fernandez leverages his carpentry, plumbing, and electrical troubleshooting skills to run free home‑maintenance workshops
    for senior neighbors, mentor at‑risk youth in basic trades, and compile a memoir that weaves together his family’s migration tale and regional traditions.
  sports: A devoted follower of local teams, Teofilo Fernandez enjoys watching the Dallas Cowboys on Sundays and the Dallas Stars during the hockey season, participates in a weekly senior‑center pickleball
    league, and belongs to the neighborhood walking club that meets for early‑morning strolls through the community gardens each Saturday.
  arts: An enthusiastic photographer, Teofilo Fernandez captures neighborhood festivals, religious processions, and wildflower blooms, edits his images using Lightroom, and balances his visual storytelling
    with a love for traditional border‑region folk music—frequently listening to corridos by Los Tigres del Norte while planning his next photo series.
  travel: A thoughtful traveler who prefers low‑key road trips, Teofilo Fernandez has explored historic mission towns across Texas, trekked the Hill Country’s bluebonnet trails, and dreams of visiting Oaxaca’s
    bustling markets to photograph vibrant street life, all while balancing a modest travel budget and a limited time window due to volunteer commitments.
  culinary: A keen home cook, Teofilo Fernandez delights in preparing heirloom tomato salads drizzled with olive oil and fresh basil, slow‑roasting pork shoulder with ancho chilies and cumin, and baking
    cornbread with jalapeño and sweet corn kernels, while occasionally experimenting with homemade pickled cucumbers and preserving garden harvests in jars.
  core: Teofilo Fernandez is a solitary, curiosity‑driven craftsman who blends practical tinkering with a love for preserving local culture, though they have a habit of postponing dentist appointments and
    hoarding vintage radio parts.
background:
  cultural: Teófilo was born in a small town near Monterrey and moved to Texas with his family when he was ten. Growing up in the vibrant Mexican‑American community of Dallas, he retains strong ties to
    Mexican traditions—celebrating Día de los Muertos, preparing mole and tamales, and participating in local church festivals. He speaks fluent Spanish and English, reflecting the bicultural environment
    of the Dallas‑Fort Worth metroplex. His cultural identity is shaped by values like respeto, familia (though he is single, he is close to his siblings and extended relatives), and comunidad, which drive
    his willingness to help neighbors and preserve cultural heritage.
