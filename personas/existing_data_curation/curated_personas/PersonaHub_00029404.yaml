persona_description: A researcher and economist who studies the economic and social factors that influence the working hours of people in different countries. They are interested in the cultural, historical,
  and socio-economic factors that shape the work-life balance of workers and how these factors impact productivity, income, and overall well-being. They are also interested in comparing and contrasting
  the work patterns and working hours of people in different countries and how these differences contribute to economic disparities and social inequalities.
