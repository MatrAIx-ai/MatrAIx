  career_goals: Maria aims to become the lead technician at her shop, guiding the service team and formalizing a mentorship program for young mechanics. She plans to earn her ASE Master Technician certification
    to validate her expertise despite her limited formal schooling. Looking ahead, she hopes to open a modest specialty garage focused on classic and vintage vehicles, especially those popular in the Argentine
    market, allowing her to blend her mechanical passion with her cultural roots. As she approaches retirement, she also envisions transitioning to part‑time consulting, offering diagnostic expertise to
    local shops while spending more time on community volunteer work.
