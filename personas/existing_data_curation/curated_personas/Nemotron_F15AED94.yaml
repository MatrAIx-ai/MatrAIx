  career_goals: Kirk aims to earn PMP certification within the next year and leverage it to step into a senior project‑manager role overseeing multi‑disciplinary infrastructure and technology initiatives
    for Washington County. He intends to complete a Bachelor’s degree in Business Administration to broaden his strategic perspective. Long‑term, he envisions becoming a director of operations or launching
    his own consultancy focused on Agile transformation for public‑sector projects. His competitive drive pushes him to consistently outperform peers, earn performance awards, and be recognized as a go‑to
    leader for high‑stakes, complex projects.
