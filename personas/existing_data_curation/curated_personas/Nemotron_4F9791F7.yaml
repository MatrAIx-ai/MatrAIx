    meetups'']'
  career_goals: In the short term, David aims to obtain professional certifications such as the Certified Analytics Professional (CAP) and Project Management Professional (PMP) to solidify his credentials
    and deepen his expertise in data analytics and project management. He plans to enroll in a GED program and pursue an associate degree in Business Administration while taking on more responsibility at
    his current analyst role, such as leading cross‑functional initiatives and mentoring junior staff. Over the next five to ten years, he aspires to become a senior management analyst or strategy consultant,
    eventually moving into a director of strategic planning position within a regional government or a mid‑size consulting firm. He envisions leveraging his curiosity and artistic sensibility to champion
    innovative, evidence‑based policies that improve community services in Rice County. Long‑term, David dreams of launching his own boutique consultancy that blends data‑driven decision making with creative
    problem‑solving, positioning himself as a thought leader in the Midwest.
