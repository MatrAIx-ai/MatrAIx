  career_goals: Phillip dreams of building and creating things that help people. He often talks about becoming an engineer or architect who designs bridges, houses, and playgrounds. He is also fascinated
    by astronauts and can picture himself exploring space, which reflects his love for big, practical challenges. Occasionally he imagines joining the firefighting team in his town, seeing it as a way to
    be brave and useful. Phillip also enjoys competitive sports and sometimes says he wants to be a professional soccer player, channeling his love for clear rules, teamwork, and winning.
