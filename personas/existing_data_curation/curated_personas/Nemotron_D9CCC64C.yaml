  hobbies: '[''Building with Legos'', ''Jigsaw and 3‑D puzzles'', ''Reading adventure books'', ''Bike riding'', ''Playing organized soccer'', ''Drawing and coloring'', ''Collecting Pokémon cards'', ''Playing
