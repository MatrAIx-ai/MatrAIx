personas:
  professional: Phillip Mccarty is a budding LEGO architect who meticulously follows step-by-step instructions while inventing original designs, and they showcase a love of structure, practical problem-solving,
    and a competitive drive to out-build peers.
  sports: Phillip Mccarty is a lively forward on the Twin Falls Youth Soccer league, enjoys sprinting around the backyard for bug hunts, and they cheer for the Idaho Vandals football team and the Portland
    Trail Blazers, balancing competitive play with a love of outdoor activity.
  arts: Phillip Mccarty sketches quirky comic strips inspired by Charles Schulz, collects Pokémon cards featuring artwork by Ken Sugimori, reads the Magic Tree House series by Mary Pope Osborne, and sings
    along to The Wiggles' Fruit Salad while watching episodes of Paw Patrol, and they blend visual, literary, and musical influences into their creative world.
  travel: Phillip Mccarty loves family weekend getaways to the Snake River for fishing, explores nearby farms and the scenic Craters of the Moon National Monument, dreams of a bigger adventure visiting
    Yellowstone National Park's geysers and Disneyland's Magic Kingdom, and they prefer short, well-planned trips that fit into school schedules.
  culinary: Phillip Mccarty prefers classic kid-friendly meals like cheese pizza with pepperoni, chicken nuggets with ketchup, and mac-and-cheese, enjoys snacking on fresh apple slices and backyard-picked
    blackberries, and they occasionally help bake banana pancakes using flour, eggs, and maple syrup, showing a budding willingness to assist in the kitchen.
  core: Phillip Mccarty is a detail-obsessed, competitive six-year-old who builds elaborate LEGO worlds, saves every spare coin, and refuses bedtime without a final puzzle piece, and they blend self-reliance
    with a love of structure.
background:
  cultural: Phillip was born and raised in Twin Falls, Idaho, a small city in the Intermountain West. His family is of European descent, with roots tracing back to Irish and Scandinavian ancestors, and
    they identify as American. Growing up in a close‑knit community, he has been exposed to the values of self‑reliance, neighborly support, and appreciation for the outdoors. Family traditions include
    attending the local Methodist church, participating in county fair activities, and taking weekend trips to nearby farms and the Snake River for fishing and hiking. The region’s emphasis on school sports,
    community events, and a connection to the natural landscape shapes his outlook and daily life.
