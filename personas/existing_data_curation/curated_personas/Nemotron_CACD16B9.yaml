personas:
  professional: Kyleigh Core is a 27‑year‑old procurement specialist who applies SAP MM and advanced Excel analytics to vendor selection, price negotiation, and inventory forecasting, and they blend a practical,
    structured workflow with a collaborative, kind communication style to drive timely deliveries while positioning themselves for a senior category manager role within five years.
  sports: Kyleigh Core spends weekends trekking the Kettle Moraine State Forest trails, supports the Milwaukee Brewers and Green Bay Packers, and participates in the local Trail Runners Club’s low‑impact
    cardio sessions, balancing solitary fitness with occasional community sports enthusiasm.
  arts: Kyleigh Core immerses themselves in historical fiction by authors such as Hilary Mantel and Ken Follett, frequents the Milwaukee Art Museum’s rotating exhibitions, enjoys the folk sounds of Sufjan
    Stevens while knitting blankets for the community shelter, and they often quote favorite passages during craft circle meetings.
  travel: Kyleigh Core favors purposeful short‑haul trips, like a weekend escape to Door County’s cherry orchards or a budget‑conscious pilgrimage to England’s historic castles for research inspiration,
    mixing spontaneous day trips with carefully planned itineraries to balance adventure with financial prudence.
  culinary: Kyleigh Core delights in baking seasonal pies—apple‑cinnamon in fall, rhubarb‑strawberry in spring—and incorporates fresh garden herbs such as thyme and rosemary into dishes, while they occasionally
    binge‑cook sourdough loaves and share generous slices at community gatherings.
  core: Kyleigh Core merges a detail‑oriented procurement mindset with a love for solitary gardening, quiet baking, and cooperative crafting, navigating life with structured ambition tempered by a relaxed,
    sometimes disorganized, flexibility.
background:
  cultural: Kyleigh grew up in Cedar Grove, a small town in Ozaukee County, Wisconsin, within a predominantly white Midwestern community. Her family background is rooted in the region's Lutheran heritage,
    emphasizing modesty, hard work, and community service. The local culture values practicality, self‑reliance, and close‑knit relationships, which have shaped Kyleigh's cooperative demeanor and preference
    for small‑group interactions. She identifies with broader Midwestern values of humility, respect for tradition, and a balanced approach to career and personal life.
attributes:
  skills: '[''Vendor negotiation'', ''Product assortment planning'', ''Inventory forecasting'', ''Procurement software (SAP MM, Microsoft Dynamics)'', ''Advanced Excel (pivot tables, VLOOKUP)'', ''Market
    trend analysis'', ''Budget management'', ''Order processing and logistics coordination'', ''Interpersonal communication'', ''Conflict resolution'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Yoga'', ''Baking'', ''Knitting and crafting'', ''Volunteer work at community shelter'']'
  career_goals: Kyleigh aims to progress from her current buyer position to a senior category manager within the next five years, taking on broader strategic sourcing responsibilities and overseeing a larger
    product portfolio. She plans to earn the Certified Professional in Supply Management (CPSM) credential to deepen her knowledge of supply chain strategy. Additionally, she aspires to lead cross‑functional
    merchandising projects that balance profitability with customer satisfaction, while maintaining a healthy work‑life balance that aligns with her preference for flexibility within structured environments.
    She also hopes to mentor newer buyers and foster collaborative vendor relationships that prioritize mutual benefit.
