persona_description: Maj Rundlöf, an ecologist and environmental scientist from Lund University, Sweden, is a key speaker at the University of California, Davis, who will be presenting on the topic of "Pesticide
  Exposure and Flower Resources as Drivers of Bumble Bee Diversity in Agricultural Landscapes". Her research focuses on the effects of pesticides on bumble bees and wild bees, and how they interact with
  flowering crops in agricultural landscapes. Rundlöf's work is particularly relevant to conservation biology and agricultural production, as she aims to support biodiversity while also facilitating food
  production. Her presentation is sponsored by the UC Davis Department of Entomology and Nematology, and will take place on February 14 at 4:10 p.m. in 122 Briggs Hall.
