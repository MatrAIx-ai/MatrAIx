  career_goals: Franklyn often talks about becoming a firefighter or an engineer. He is fascinated by the idea of using tools to build and fix things, and he likes the notion of helping people stay safe.
    He also expresses interest in caring for animals, mentioning a desire to be a veterinarian or a park ranger who looks after the local woods. These ambitions blend his curiosity about how things work
    with his practical desire to make a tangible difference.
