persona_description: A fisheries researcher interested in studying the decline in trammel net catches of fjord fishes in the South Shetland Islands, particularly in the inshore sites of Potter Cove and
  Harmony Cove, and the potential effects of offshore commercial fishing on the inshore sub-populations of Notothenia rossii and Gobionotothen gibberifrons. This persona is knowledgeable about the history
  of offshore commercial fishing and has a deep understanding of the diet of the Antarctic shag Phalacrocorax bransfieldensis in the South Shetland/Antarctic Peninsula area.
