personas:
  professional: Anjanette Ford is a budding digital storyteller who merges cartoon sketching with Scratch coding, designing interactive animated shorts for her school art club, leveraging her methodical
    planning and curiosity to prototype storyboards and debug simple scripts.
  sports: Anjanette Ford enjoys weekend swim sessions at the Miami Beach community pool and plays on the South Florida Kids Soccer Club, cheering for the Miami Heat and the Miami Dolphins while collecting
    team stickers for her locker.
  arts: Anjanette Ford devotes afternoons to drawing comic panels inspired by the whimsical style of Art Spiegelman and the bold colors of Maya Hayuk, while listening to Kendrick Lamar, Miles Davis, and
    Celia Cruz as background soundtracks that fuel her creative flow.
  travel: Anjanette Ford prefers curated day trips with her mother, assembling a scrapbook itinerary of Florida Keys sailing, Everglades airboat tours, and a weekend visit to the interactive Children’s
    Museum in Miami, while dreaming of a future family vacation to Tokyo’s anime districts.
  culinary: Anjanette Ford likes to experiment with simple recipes like mango salsa for fish tacos, constructs homemade pizza using pre‑made crusts and fresh basil, and often swaps lemonade for a fruit‑infused
    water bottle after museum outings, though she can’t resist a weekly slice of chocolate cake.
  core: Anjanette Ford blends a disciplined love for LEGO engineering with a spontaneous flair for comic art, balancing a cautious allowance habit with occasional impulsive candy buys, and channels curiosity
    into both science club experiments and nightly doodles.
background:
  cultural: Anjanette is an African-American girl raised in Miami's vibrant, multicultural community; her family blends Southern African-American traditions with Caribbean influences, as her mother immigrated
    from Haiti and introduces French-Creole language and cuisine like griot and plantains, while local Black church celebrations, Juneteenth, and Miami Carnival shape her identity, and the city's Spanish-speaking
    neighbors foster her conversational Spanish skills.
