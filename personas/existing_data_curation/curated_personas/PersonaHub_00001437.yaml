persona_description: Alice Stone Blackwell was a prominent American feminist and reformer who played a crucial role in the women's suffrage movement. She was born in 1857 in Orange, New Jersey, to Lucy
  Stone and Henry Browne Blackwell, who were both reformers. Alice grew up surrounded by progressive values and joined the editorial staff of her mother's Woman's Journal, which was an organ of her American
  Woman Suffrage Association. She became the primary force behind the suffrage movement and served as the corresponding secretary of the National American Woman Suffrage Association until 1918. Alice founded
  Boston's League of Women Voters and stumped for the cause of Sacco and Vanzetti. She also published and translated the work of oppressed minority groups, possibly due to a brief romance with an Armenian.
  Alice published a biography of her mother, Lucy Stone, in 1930, which she had worked on for 40 years. After suffering severe financial reversals during the Great Depression, Alice spent her last years
  in a Cambridge apartment, blind but still aware. She died at age 92.
