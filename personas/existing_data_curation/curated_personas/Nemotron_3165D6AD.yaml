  career_goals: Amber dreams of becoming an artist who can bring stories to life through pictures, perhaps as an illustrator for children's books. She also imagines herself sharing her love of art by teaching
    art classes in her community when she grows up. Occasionally she expresses excitement about exploring space or becoming a scientist, showing her broad curiosity.
