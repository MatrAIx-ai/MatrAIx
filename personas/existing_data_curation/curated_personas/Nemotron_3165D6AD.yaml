personas:
  professional: An aspiring young illustrator, Amber Watson channels their boundless curiosity and spontaneous imagination into vibrant nature‑inspired drawings, often experimenting with mixed media, though
    they sometimes leave sketches unfinished because they dislike rigid structures.
  sports: An energetic soccer enthusiast, Amber Watson dashes across the Tampa community field as a forward for the Little River Kids Soccer League, cheering on the Tampa Bay Rowdies and preferring spontaneous
    street games over structured drills, which they sometimes resist.
  arts: A vibrant young creator, Amber Watson fills weekends sketching scenes inspired by the whimsical art of Mary Blair and the bold colors of Van Gogh, dancing to upbeat Ariana Grande tracks and karaokeing
    Disney classics, and they let their spontaneous spirit guide every brushstroke.
  travel: A curious explorer, Amber Watson plans weekend adventures along the Tampa Riverwalk and day‑trips to nearby beaches, dreaming of a future visit to Orlando’s Magic Kingdom, and they favor spontaneous
    outings with friends over rigid itineraries.
  culinary: A budding food enthusiast, Amber Watson delights in assembling rainbow fruit salads with strawberries, blueberries, and kiwi, insists on extra cheese on pepperoni pizza, but they often forget
    to finish their vegetables at lunch, turning mealtime into a playful negotiation.
  core: Amber Watson’s restless curiosity and love for spontaneous art bursts make them a bright, occasionally disorganized nine‑year‑old who turns every day into a colorful adventure, and they never shy
    away from a fresh canvas.
background:
  cultural: Amber is an African American girl raised in Tampa, Florida, where her family embraces a blend of Southern and Black cultural traditions. Her parents celebrate holidays such as Juneteenth, Kwanzaa,
    and Black History Month, and they often attend community events featuring soul food, gospel music, and local art fairs. Growing up in a close-knit extended family, she benefits from the support of grandparents
    and cousins who encourage her curiosity and creativity. The vibrant multicultural atmosphere of Tampa, including its music scene and historic neighborhoods, shapes her appreciation for diverse artistic
    expressions.
