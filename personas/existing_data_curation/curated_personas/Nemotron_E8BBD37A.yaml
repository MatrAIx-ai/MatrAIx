personas:
  professional: Mary Badeaux is a budding junior ecologist who turns post‑Thanksgiving autumn leaf piles into mini‑science projects, using their keen observation and hands‑on curiosity while their relaxed,
    flexible nature lets them improvise experiments without rigid plans.
  sports: Mary Badeaux dashes around the community park playing toddler soccer with the Austin Little Rockets club, enjoys Thursday gymnastics classes at the local Recreation Center, joins the family fun
    run at the Austin Kids Festival each year, and proudly cheers for the Texas Longhorns football team and Austin FC on game nights.
  arts: Mary Badeaux loves finger‑painting to the upbeat tunes of Raffi and the heartfelt ballads of Chris Stapleton while watching the Austin Children’s Theatre’s rendition of Peter Pan and giggling at
    Sesame Street’s Elmo during storytime, and often hums country folk melodies heard at family barbecues.
  travel: Mary Badeaux prefers spontaneous weekend outings to Zilker Park’s playgrounds and McKinney Falls State Park’s hiking trails, dreams of a family adventure to Disneyland in California, enjoys collecting
    souvenirs from local gems like the Austin Kids Festival and the historic San Antonio River Walk, and looks forward to watching Fourth of July fireworks over Lady Bird Lake.
  culinary: Mary Badeaux favors crunchy chicken nuggets, cheesy quesadillas made with shredded cheddar and mild salsa, and sweet strawberry‑topped pancakes, often attempting to stir batter with a tiny wooden
    spoon, proudly declares a love for barbecue pulled pork sliders at family cookouts, and eagerly looks forward to buttery mashed potatoes and pumpkin pie after Thanksgiving dinner.
  core: Mary Badeaux is a calm, endlessly curious four‑year‑old whose boundless energy mixes with a relaxed, competitive streak, occasional sticker‑spending habit, a habit of leaving crayons scattered across
    the living room, and a gentle wariness that keeps them both sociable and discerning.
background:
  cultural: Mary is raised in a suburban white family in Austin’s Williamson County. Her upbringing blends classic American traditions—Thanksgiving dinner, Halloween costumes, and fireworks on the Fourth
    of July—with local Texan influences such as weekend trips to nearby parks, listening to country and folk music, family barbecues, and participation in community events like the Austin Kids Festival.
    The family’s lifestyle is relaxed, community‑oriented, and encourages flexibility and outdoor play.
