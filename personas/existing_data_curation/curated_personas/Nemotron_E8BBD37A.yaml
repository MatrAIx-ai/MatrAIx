  career_goals: Mary often talks about becoming a teacher or a scientist when she grows up. She imagines leading a classroom where she can share stories and help other children explore how things work,
    and she also dreams of designing simple machines that help animals. Her ambitions are driven by a love of learning, a desire to be recognized for her ideas, and a competitive spirit that inspires her
    to excel in school projects.
