persona_description: A marine biologist who is a professor at the Universities of Glasgow and Newcastle, former director of the University Marine Biological Station in Scotland, and made significant contributions
  to the study of deep-sea bivalves through a series of taxonomic monographs. He is known for his work in the field of deep-sea biology, which has provided the foundation for many important ecological,
  evolutionary, and biogeographic studies of the deep-sea benthos. He is also recognized for his role in the preservation of deep-sea bivalve material collected by British and WHOI deep-sea expeditions,
  and his continuous contribution to the field of deep-sea biology.
