  career_goals: Hung aspires to evolve from a senior analyst to a lead solutions architect who shapes innovative products at the intersection of technology and art. He envisions leading cross‑functional
    teams that develop AI‑enhanced creative tools—such as generative‑art platforms or interactive storytelling applications—while championing user‑centric design. Over the next five years, he aims to obtain
    a professional certification in cloud architecture, mentor junior analysts, and launch a side venture that leverages his technical expertise and artistic curiosity. Ultimately, he seeks a role that
    offers both strategic impact and a flexible, low‑stress environment that supports his emotional well‑being and family life.
