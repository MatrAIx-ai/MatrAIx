personas:
  professional: Hung Yang is a senior systems analyst in San Diego who leverages SQL, Python, and multi‑cloud expertise alongside a design‑thinking mindset to transform vague business problems into elegant
    technical prototypes, though their spontaneous nature sometimes clashes with tight project deadlines.
  sports: Hung Yang is a member of the San Diego Coastal Hikers club, enjoys solitary weekend trail runs along the Pacific, occasionally plays beach volleyball at La Jolla, and fervently follows the San
    Diego Padres and San Diego Wave FC.
  arts: Hung Yang dives into generative art with Processing, scores ambient tracks inspired by Brian Eno and Aphex Twin, immerses in narrative indie games like Disco Elysium and Oxenfree, and attends intimate
    workshops featuring local calligraphy and experimental music performances.
  travel: Hung Yang prefers meticulously planned solo art‑focused trips, having explored Tokyo's art districts, a culinary retreat in Taipei, and a sunrise hike in Iceland, while also savoring spontaneous
    weekend getaways to La Jolla and Joshua Tree.
  culinary: Hung Yang enjoys experimenting with Korean kimchi jjigae, Taiwanese beef noodle soup, and homemade jasmine tea, boasting an intermediate cooking skill set that blends fermentation techniques
    with a love for aromatic herbs and frequently samples coffee at Bird Rock Coffee Roasters.
  core: Hung Yang, a 30‑year‑old technophile, fuses analytical precision with dreamy artistic pursuits, navigating life with meditation‑driven calm yet often battling anxiety‑fueled procrastination and
    a penchant for impulsive coffee shop splurges.
background:
  cultural: Hung is a first‑generation East Asian American, born to immigrant parents from Taiwan who settled in Southern California. He grew up bilingual, celebrating Lunar New Year and family reunions
    while also absorbing the diverse, laid‑back culture of San Diego. His upbringing emphasized respect for elders, the value of education, and community responsibility—principles that shape his collaborative
    yet assertive professional style. At the same time, his American environment fostered a strong sense of individualism and openness to novel ideas, fueling his imaginative passions and willingness to
    explore unconventional career paths.
