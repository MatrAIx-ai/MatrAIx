persona_description: A veterinarian with expertise in ruminant livestock, particularly in the management and treatment of diseases such as Dicrocoelium dendriticum, which is a common intestinal nematode
  in domestic ruminants. This individual would have extensive knowledge of the life cycle of D. dendriticum, its economic impact, and the appropriate anthelmintic treatments available for control. They
  would also be familiar with the diagnostic methods, such as fecal flotation with a solution of high specific gravity, for detecting the presence of the parasite in cattle, sheep, and goats. Additionally,
  they would have experience in managing severe pathologic changes in the liver and bile ducts caused by the infection, and in the clinical signs associated with heavy infections.
