  hobbies: '[''Sketching people in parks'', ''Digital illustration on tablet'', ''Photography of street murals and nature'', ''Playing acoustic guitar'', ''Listening to diverse music (regional Mexican,
    indie folk, etc.)'', ''Dancing cumbia and salsa at festivals'', ''Cooking Mexican family recipes'', ''Volunteering at community garden'', ''Participating in school art club'', ''Mentoring at library
    after-school art program'', ''Hiking in Sacramento Valley'', ''Watching independent films'']'
  career_goals: Vilma dreams of turning her love for visual storytelling and community connection into a career. She hopes to enroll in a local community college’s visual-arts or graphic-design program,
    build a portfolio of murals, illustrations, and digital artwork, and eventually work as a freelance graphic designer or muralist for non-profit organizations that serve youth. She is equally drawn to
    the idea of a cultural-arts coordinator, planning workshops that blend Mexican heritage with contemporary art for students in Yolo County. In the longer term, she would like to open a small studio/café
    where she can showcase her art, host community events, and serve her family’s homemade Mexican cuisine, creating a space that celebrates creativity and cultural pride.
