personas:
  professional: A budding visual storyteller, Vilma Mejia channels her curiosity and community spirit into freelance graphic design projects and mural collaborations, blending hand‑drawn sketches with digital
    tools while they juggle schoolwork with a relaxed, occasionally chaotic schedule.
  sports: Vilma Mejia enjoys weekend hikes in the Sacramento Valley and participates in casual soccer matches with the Dixon Soccer Club, cheering on the local Sacramento Republic FC while they also maintain
    a loosely regular yoga routine at the community center.
  arts: Vilma Mejia spends afternoons sketching park‑goers at Dixon’s Central Park, curating murals inspired by blooming marigolds and street‑art legends like Banksy and Frida Kahlo, and they often rehearse
    acoustic guitar covers of indie folk artist Phoebe Bridgers and regional folk singer Vicente Fernández.
  travel: Vilma Mejia prefers spontaneous road trips that mix beach sunsets in Santa Cruz with cultural immersion days in Oaxaca, planning trips around school holidays and a modest savings stash, balancing
    the thrill of new murals with the comfort of familiar family gatherings, while they always pack a sketchbook for on‑the‑go inspiration.
  culinary: Vilma Mejia delights in hand‑rolling fresh tortillas and simmering slow‑cooked pozole, mastering the balance of smoky chilies and bright tomatillo salsa, while they also experiment with avocado
    toast and matcha lattes they picked up from local cafés.
  core: Vilma Mejia is a free‑spirited teen artist who blends garden‑fresh flavors, acoustic melodies, and bold murals into a vibrant community‑first lifestyle, even if they keep their desk forever cluttered.
background:
  cultural: Vilma grew up in a Mexican-American household in Dixon, California, where Spanish remains the language of the home and her grandparents often share stories of life in rural Mexico. Family gatherings
    revolve around traditional foods like tamales, pozole, and fresh salsa, and holidays such as Dia de los Muertos and Cinco de Mayo are celebrated with music, dance, and colorful altars. The agricultural
    setting of Yolo County has reinforced a respect for the land, and she often helps in her family's garden, echoing the farming roots of many Mexican immigrants in the area. At the same time, her community
    exposure to California’s multicultural environment has broadened her taste in music, art, and cuisine, allowing her to blend Mexican heritage with contemporary American youth culture.
