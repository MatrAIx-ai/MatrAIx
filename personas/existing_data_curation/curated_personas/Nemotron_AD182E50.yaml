  hobbies: '[''Basketball (pick‑up league)'', ''Volunteering at food pantry'', ''County fair participation'', ''Podcast listening (finance & personal development)'', ''Playing guitar'', ''Road trips with
    friends'', ''Hiking in state parks'', ''Social networking events'']'
  career_goals: Colin aims to earn the Chartered Financial Analyst (CFA) designation within the next three years and advance from his current analyst position to a portfolio manager role at a regional investment
    firm. He is passionate about socially responsible investing and intends to develop strategies that align client financial goals with ethical considerations. In parallel, he plans to launch a community‑focused
    financial education program in Newburgh, helping young adults improve budgeting, investing, and overall financial literacy.
