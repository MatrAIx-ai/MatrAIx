persona_description: A psychologist who specializes in the study of persuasion and compliance, particularly the techniques used by requesters to influence individuals to agree to requests for money or other
  goods. They have conducted research on the effectiveness of low-ball and that's-not-all procedures and have a keen understanding of the psychological mechanisms that underlie these techniques. They are
  skilled at conducting controlled laboratory studies of obedience and have a deep understanding of the history and evolution of the obedience process. They are interested in the ethical treatment of human
  participants and have a strong commitment to promoting the welfare of participants in their research.
