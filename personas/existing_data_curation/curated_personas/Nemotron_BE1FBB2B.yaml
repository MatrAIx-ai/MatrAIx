  career_goals: Although Andrés is no longer in the formal workforce, he aspires to become a recognized keeper of Las Piedras’s cultural memory. He plans to compile a collection of oral histories and short
    stories that capture the town’s folklore, publish a modest booklet, and lead regular storytelling circles at the local senior center. He also hopes to secure a small grant to create a community art
    space where elders can teach traditional crafts and music to younger residents, thereby strengthening intergenerational bonds while keeping his own creative curiosity alive.
