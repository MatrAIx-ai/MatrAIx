personas:
  professional: A retired community organizer and cultural archivist, Andres Cruz blends their imagination with a disciplined approach to preserve oral histories of their hometown, leading storytelling
    circles at the senior center while spearheading a grant proposal for a community art space.
  sports: An avid walker and occasional softball player, Andres Cruz joins the town’s senior walking club for sunrise strolls with their dog, cheers for the local baseball team Cangrejeros de Santurce,
    and dances salsa weekly, turning the lively steps into cardio exercise.
  arts: A watercolor abstract painter and choir member, Andres Cruz draws inspiration from vibrant island landscapes, paints with gouache and alum, sings Latin jazz standards at the senior center, strings
    their cuatro in a bomba ensemble, and quotes Neruda and Borges during informal gatherings.
  travel: A travel lover who prefers slow, immersion-focused journeys, Andres Cruz has spent weekends wandering the historic plaza of Old San Juan, taken a three-day road trip to the lush waterfalls of
    El Yunque, and hopes to walk the pastel-colored lanes of Cartagena next year, always budgeting carefully to keep outings affordable.
  culinary: A master home cook with a flair for traditional dishes, Andres Cruz expertly prepares arroz con gandules, pasteles and a simmered sofrito using homegrown cilantro, recao, and sweet plantains,
    enjoys adding a pinch of smoked paprika to reinvent classic flavors, yet sometimes over-salts the rice when distracted by conversation.
  core: Andres Cruz merges a lifelong love of storytelling, music, and gardening into a vibrant community-centered life, balancing meticulous planning with spontaneous artistic bursts, even if they occasionally
    lose track of time while painting.
background:
  cultural: Andrés was born and raised in Las Piedras, a town in the San Lorenzo municipality of Puerto Rico. His upbringing was steeped in the island’s blend of Taíno heritage, Spanish colonial traditions,
    and African rhythms, which color the island’s music, dance, and cuisine. He grew up in a Spanish‑speaking household that also absorbed English through media and tourism, giving him a bicultural perspective.
    Catholic holidays, the vibrant sound of bomba and plena drums, and communal gatherings such as the Fiestas Patronales have shaped his values of family, community, and celebration. His Puerto Rican identity
    is expressed through his love of traditional cooking, storytelling, and participation in local cultural practices, while his imaginative nature often leads him to reinterpret these traditions in new,
    artistic ways.
