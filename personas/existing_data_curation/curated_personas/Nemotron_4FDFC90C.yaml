  hobbies: '[''coloring and finger painting'', ''building with wooden blocks'', ''listening to storytime'', ''dancing to music'', ''exploring the backyard and nature'', ''quiet solitary play with stuffed
    animals'', ''observing artwork at the children’s museum'']'
  career_goals: Although only three, Deanna frequently talks about future dreams that reflect her curiosity and love for creativity—she imagines becoming an artist who paints bright pictures, a teacher
    who shares stories, or an explorer who discovers new places. Her flexible, open‑minded mindset suggests she will pursue paths that let her experiment with ideas and enjoy varied experiences.
