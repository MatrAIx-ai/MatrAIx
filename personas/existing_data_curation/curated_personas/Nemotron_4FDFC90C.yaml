personas:
  professional: Deanna Barfield is a budding explorer who spends their days turning the living room into a makeshift laboratory, mixing play‑dough colors and cardboard tubes to satisfy their curiosity about
    how things work, while their easygoing nature lets them drift from one imaginative project to another without rigid schedules.
  sports: Deanna Barfield is an energetic preschooler who loves swinging on the playground, kicking a soft rubber ball with the local community preschool team during free play, and they make a point to
    cheer on the hometown baseball team, the St. Louis Cardinals, whenever they see a game on family TV.
  arts: Deanna Barfield is an enthusiastic little artist who delights in finger‑painting with bright acrylics, dances to the lively rhythms of Baby Shark and tracks by Pharrell Williams, and they often
    mimic the expressive poses of Emma Watson from the movie ‘Beauty and the Beast’ during costume play.
  travel: Deanna Barfield is a curious little traveler who enjoys short family trips to the nearby zoo in San Diego and the aquarium in Monterey Bay, preferring the excitement of seeing sea turtles over
    long car rides, and they dream of one day visiting Disneyland Paris after hearing stories about it from picture books.
  culinary: Deanna BarField is a picky eater who adores macaroni and cheese with a sprinkle of cheddar, loves sweet banana slices, and they giggle when they manage to dip broccoli florets into a tiny bowl
    of ranch, though they often resist new foods unless presented in a colorful, bite‑size form.
  core: Deanna Barfield is a delightfully curious three‑year‑old who blends artistic play, spontaneous exploration, and a gentle, well‑balanced temperament into a charming whirlwind of toddlerhood.
background:
  cultural: Deanna is raised in a white, middle‑class family in Ballwin, a suburban community in St. Louis County, Missouri. The Midwestern environment emphasizes friendliness, community involvement, and
    modesty, which shape her cooperative nature. She attends a local preschool that values inclusive play and celebrates regional events such as the St. Louis Fair, community picnics, and seasonal holidays.
    Family gatherings, occasional church activities, and frequent visits to the St. Louis Children’s Museum and the public library provide exposure to arts, storytelling, and cultural traditions that nurture
    her curiosity and appreciation for varied experiences.
attributes:
  skills: '[''basic language articulation'', ''fine‑motor coordination for drawing and block play'', ''early artistic appreciation'', ''imaginative and unconventional play'', ''basic problem‑solving'',
