personas:
  professional: Andy Katwaru is a preschooler who loves building with blocks, constantly asks 'why' questions, and applies simple logic to everyday play, blending curiosity with a practical knack for solving
    puzzles while staying relaxed about rigid schedules.
  sports: Andy Katwaru participates in the Little Rockets neighborhood soccer club, cheers for the Seattle Mariners in baseball and the Seattle Seahawks in football, and occasionally enjoys a relaxed game
    of tag at the local park, showing a mix of cooperative play and occasional assertiveness.
  arts: Andy Katwaru is enchanted by Disney’s Frozen soundtrack, giggles while humming Taylor Swift’s ‘Shake It Off’, and loves watching Sesame Street with Elmo and Big Bird, weaving imagination into everyday
    routines.
  travel: Andy Katwaru has visited the nearby county museum, the family’s local zoo, and taken a road trip to Disneyland in Anaheim, and dreams of seeing the Eiffel Tower in Paris and snorkeling the Great
    Barrier Reef in Australia, preferring relaxed family tours over hectic itineraries.
  culinary: Andy Katwaru delights in buttery macaroni and cheese, peanut butter and jelly sandwiches with strawberry jam, and crunchy carrot sticks with hummus, but often refuses broccoli, reflecting a
    picky yet adventurous palate.
  core: Andy Katwaru blends childlike curiosity with a laid‑back streak, hoards stickers, negotiates bedtime with fierce determination, and turns everyday chores into playful experiments—a charming mix
    of order and chaos.
background:
  cultural: Andy comes from an American Indian heritage rooted in the southeastern tribal traditions of Louisiana, with family connections to the Caddo and Choctaw peoples. His household celebrates cultural
    practices such as seasonal storytelling, traditional crafts like beadwork (which he observes), and participating in community gatherings like local powwow dances when they occur. These influences provide
    him with a sense of identity and an early appreciation for the rhythms of his cultural heritage.
