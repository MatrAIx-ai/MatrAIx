  hobbies: '["Tennis","Yoga","Wine Tasting","Cooking with Friends","Road Trips","Gardening","Charity Runs","Reading Thriller Novels","Art Fairs","Community PTA Volunteering"]'
  career_goals: Brenda aims to progress into a senior category-management role, overseeing multiple product lines for a national retailer. She is pursuing certifications such as the Certified Professional
    in Supply Management (CPSM) and plans to add an executive MBA to deepen her strategic leadership capabilities. Long-term, she envisions establishing her own consultancy that helps mid-sized retailers
    implement data-driven procurement strategies, while mentoring emerging women professionals in the buying field.
