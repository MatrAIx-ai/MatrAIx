personas:
  professional: Brenda Fenn, a 44‑year‑old wholesale and retail buyer, leverages advanced Excel, SQL, and business‑intelligence tools to forecast demand, negotiate vendor contracts, and streamline inventory,
    while balancing a natural preference for structured analytics with a spontaneous streak that sometimes derails deadline discipline, making them a data‑driven yet occasionally erratic strategist aiming
    for senior category‑management.
  sports: Brenda Fenn competes weekly in the Riverview Tennis League, attends a community yoga class on Saturdays, runs in charity 5K events each spring, roots for the Portland Trail Blazers in basketball
    and the Portland Timbers in soccer, and treats each season as a chance to push their competitive edge while also using the social setting to unwind.
  arts: Brenda Fenn frequents the Portland Art Museum’s spring fair, collects limited‑edition prints by Shepard Fairey, devours thriller novels by Gillian Flynn, streams indie folk concerts featuring Phoebe
    Bridgers, and cites the tension of a good plot twist as inspiration for negotiating sharp supplier contracts.
  travel: Brenda Fenn prefers spontaneous weekend road trips—like a sunset drive down the Columbia River Gorge, a wine‑tasting weekend in Napa Valley, and a family hike in Sedona—while balancing a modest
    travel budget, using points from their Chase Sapphire Preferred card, and keeping family obligations in mind, yet often strings together itineraries at the last minute due to their love of surprise.
  culinary: Brenda Fenn delights in orchestrating elaborate dinner parties featuring dishes such as coq au vin, homemade gnocchi with sage butter, and a layered tiramisu, skillfully pairing each course
    with a curated selection of Pinot Noir, Pinot Grigio, or aged Cabernet Sauvignon, while occasionally overindulging in rich desserts and forgetting to prep the next day’s lunch.
  core: Brenda Fenn is a data‑driven, competitive buyer who balances meticulous spreadsheets with spontaneous road trips, thrives on group activities, battles stress‑filled worries, and occasionally lets
    perfectionism sabotage their own schedule.
background:
  cultural: Brenda is a White American raised in the suburban Detroit area, now living in the affluent community of Grosse Pointe, Michigan. Her Midwestern upbringing blends a work-ethic oriented, community-centric
    mindset with appreciation for regional traditions such as lake-side recreation and local culinary favorites. She values the cultural mix of her affluent suburb—participating in charity events, supporting
    local arts, and maintaining close family ties—while her STEM education and professional trajectory reflect a broader national emphasis on data-driven commerce.
attributes:
