persona_description: A conservation biologist who specializes in the study of salmon populations and their interactions with the ocean environment. This person is knowledgeable about the abundance and diversity
  of salmon stocks in the U.S. Pacific Northwest and has experience monitoring and forecasting salmon returns to various rivers in British Columbia. They are interested in the potential impact of changing
  management practices on salmon fishing opportunities in the region, and have a deep understanding of the biology and behavior of salmon, including their migration patterns and feeding habits. This person
  is dedicated to the conservation and protection of salmon populations and has a passion for promoting sustainable fishing practices.
