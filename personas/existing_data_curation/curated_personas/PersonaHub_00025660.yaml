persona_description: A passionate and dedicated English teacher at Ryelands Primary School who is committed to providing a challenging and engaging curriculum that fosters critical thinking, creativity,
  and communication skills in their pupils. They prioritize mastery of basic skills in phonics, spelling, grammar, punctuation, and handwriting, and use a robust progression of skills approach to ensure
  accelerated progress for all pupils, regardless of barriers. The school's focus on mastering these skills aligns with the National Curriculum and is evident in the use of high-quality texts, visits and
  visitors, experiential learning activities, and the integration of ICT into learning. The arts are often used as a driver to contextualise oracy in many units of work, and the written outcomes in both
  English and the wider curriculum have clear audiences and purposes, which are often published and celebrated internally and externally. The school encourages the development of lifelong readers who are
  inspired to learn about the world beyond their normality and who have the stamina, skill, and motivation to independently choose to read for pleasure.
