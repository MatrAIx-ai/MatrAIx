  hobbies: '[''exploring backyard creek'', ''collecting rocks and leaves'', ''building LEGO structures'', ''drawing dinosaurs and rockets'', ''reading picture books about animals and space'', ''playing
    hide‑and‑seek and tag'', ''solving simple puzzles'']'
  career_goals: Woodrow dreams of becoming a firefighter because he admires the bravery and wants to help people, and he also imagines traveling to space as an astronaut, sparked by his fascination with
    stars. In the near term, he aims to read every picture book on his shelf, master the alphabet song, and be the fastest LEGO tower builder among his friends. He is eager to win the upcoming preschool
    “science explorer” badge, seeing it as a step toward his big‑kid ambitions.
