personas:
  professional: Antonya Brown, a 12‑year‑old budding author‑illustrator, blends her vivid imagination with disciplined schoolwork to craft fantasy short stories, sketch intricate character designs, and
    program interactive tales in Scratch, all while maintaining a harmonious balance between detailed planning and spontaneous creativity.
  sports: Antonya Brown spends weekends hiking the Catskill trails with the local Trailblazers Youth Hiking Club, plays on her middle‑school soccer team for cardio, and fiercely cheers for the New York
    Knicks and New York Rangers, channeling her love for the outdoors into a balanced, active lifestyle.
  arts: Antonya Brown channels the whimsical worlds of J.K. Rowling and the haunting melodies of Yiruma into her daily sketches, piano practice, and drama club improv, finding inspiration from artists like
    Taylor Swift and anime creator Hayao Miyazaki to shape her storytelling voice.
  travel: Antonya Brown has trekked to the gorge at Niagara Falls, explored the historic museums of Washington, D.C., and dreams of visiting the Harry Potter Studio Tour in London and the bustling Akihabara
    district in Tokyo, planning trips with meticulous journal notes while balancing school commitments.
  culinary: Antonya Brown delights in the comforting taste of margherita pizza, the savory broth of miso ramen, and often bakes chocolate‑chip cookies with her mother, proudly mastering the simple art of
    whisking batter and arranging fresh strawberries on shortcake slices.
  core: Antonya Brown is an endlessly curious storyteller who balances meticulous planning with spontaneous creativity, occasionally losing track of chores while lost in the pages of a new fantasy novel.
background:
  cultural: Antonya grew up in Loch Sheldrake, a small hamlet in Sullivan County, nestled in the Catskill Mountains of upstate New York. Her family is part of the region's predominantly white, middle‑class
    community, where seasonal traditions such as county fairs, autumn harvest festivals, and local farmers’ markets are common. The area’s natural beauty, with forests, lakes, and hiking paths, fosters
    a deep appreciation for the outdoors. At school, she has access to art programs that draw on both contemporary American art and the legacy of the Catskill "Borscht Belt" entertainment venues, exposing
    her to a variety of performance and visual arts. Family gatherings often involve storytelling and music, reinforcing a cultural emphasis on community, cooperation, and the celebration of creativity.
attributes:
  skills: '["Creative writing", "Sketching and drawing", "Digital illustration (basic)", "Storyboarding", "Critical thinking", "Project planning", "Basic coding (Scratch)", "Research skills", "Time management",
