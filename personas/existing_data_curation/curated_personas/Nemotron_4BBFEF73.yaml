  hobbies: '["Reading fantasy and science-fiction books", "Drawing and painting", "Writing short stories and poems", "Sketching nature scenes", "Hiking and exploring local trails", "Journaling about discoveries",
    "Playing piano", "Building LEGO models", "Participating in school drama club", "Coding simple games with Scratch"]'
  career_goals: Antonya aspires to turn her love for stories and images into a career as a children's author and illustrator, eventually creating books that blend whimsical narratives with hand‑drawn art.
    She also dreams of studying graphic design or animation in college, learning advanced visual tools, and later using her skills to teach creative workshops at community centers. Beyond personal artistic
    success, she hopes to nurture other young imaginations by leading school art clubs or youth storytelling programs.
