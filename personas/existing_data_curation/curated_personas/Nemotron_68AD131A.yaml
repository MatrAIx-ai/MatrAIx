  hobbies: '[''sketching urban landscapes'', ''visiting art galleries'', ''listening to jazz and reggae'', ''reading speculative fiction'', ''hiking'', ''volunteering at food bank'', ''cooking Caribbean
    dishes'', ''writing poetry and short stories'', ''maintaining personal blog'']'
  career_goals: Xavier aims to pursue a bachelor's degree in Fine Arts or Community Arts Management, with the long‑term goal of becoming a community arts coordinator for a nonprofit organization that offers
    inclusive art programs to underserved youth. He also envisions working as an art therapist, integrating creative expression into mental‑health support services. In the near term, he plans to expand
    his volunteer work at local community centers, eventually leading a regional initiative that fuses artistic projects with social‑service outreach to foster resilience and harmony within his community.
