personas:
  professional: Tracy Ducote, an aspiring robotics hobbyist and self-taught programmer, merges a sci‑fi imagination with hands‑on LEGO and Arduino tinkering, channeling chess‑level strategic thinking into
    circuit design, though their flexible, sometimes‑disorganized approach often leaves prototypes half‑built on a cluttered workbench and they sometimes abandon projects to jump into a new fan‑fiction
    storyline.
  sports: Tracy Ducote, an enthusiastic member of the Oakdale Cycling Club who spends weekends navigating the town’s winding trail network on a mountain bike, also follows the Portland Timbers and occasionally
    joins school soccer scrimmages, they prefer solo endurance challenges over team drills and approach fitness with a competitive edge that sometimes pushes them beyond safe limits, and they remain skeptical
    of overly structured team strategies that curb personal freedom.
  arts: Tracy Ducote, who spends evenings drafting fan‑fiction set in the universes of Isaac Asimov and the Star Wars saga while curating a phone‑sized portfolio of street‑level snapshots inspired by Christopher
    Nolan’s cinematic compositions, also enjoys listening to Grimes and rehearsing monologues for the school theatre, they weave sci‑fi narratives into their creative identity.
  travel: Tracy Ducote favors low‑key road trips, having biked the Redwood National Forest and joined a family weekend getaway to San Diego’s sci‑fi convention, while dreaming of an eventual visit to Tokyo’s
    Akihabara district, they plan trips more on impulse than strict itineraries due to a flexible, allowance‑driven budget.
  culinary: Tracy Ducote, who can barely boil water but proudly crafts a pepperoni pizza from store‑bought dough and experiments with instant ramen topped with a soft‑boiled egg and sriracha, favors bold
    flavors such as chicken teriyaki, caramel brownies, and trail‑mix snacks while cycling, they often forego breakfast in favor of late‑night gaming sessions that leave crumbs on their desk.
  core: Tracy Ducote, a 13‑year‑old sci‑fi enthusiast who oscillates between meticulous LEGO constructions and half‑finished Arduino experiments, rides their bike with competitive zeal, hoards allowances
    for impulsive game buys, and they navigate health routines with a pragmatic but occasionally forgetful swagger.
background:
  cultural: Tracy is a White teenager raised in Oakdale, a small borough on the western edge of Allegheny County near Pittsburgh. The community blends suburban life with blue‑collar roots, where high school
    sports, community fairs, and local diners are central to daily life. Growing up in Western Pennsylvania has instilled a strong work ethic, a love for outdoor activities along the Allegheny River, and
    an appreciation for regional foods like pierogies and pretzels. Proximity to Pittsburgh’s museums, tech incubators, and university research centers also gives her exposure to broader cultural and scientific
    opportunities, feeding her curiosity and practical outlook.
