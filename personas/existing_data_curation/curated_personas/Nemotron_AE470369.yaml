    characters"]'
  career_goals: Tracy aims to channel her love of technology and hands‑on creation into a future where she designs interactive tools that make learning fun. In the short term, she hopes to lead her middle‑school
    robotics team to a regional victory and attend a summer coding boot camp. Long‑term, she dreams of becoming a software engineer or tech entrepreneur focused on educational games or sustainable tech
    solutions, while keeping the flexibility to explore other fields that spark her curiosity.
