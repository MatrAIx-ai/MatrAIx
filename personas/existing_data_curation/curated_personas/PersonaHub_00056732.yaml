persona_description: A psychiatrist who specializes in the diagnosis and treatment of autism spectrum disorders, particularly Asperger syndrome. She has conducted a study on the variability of diagnostic
  categories across different centers and has a unique perspective on the importance of standardizing diagnostic instruments and using parent interviews and observations to form "best-estimate clinical
  diagnoses." She is aware of the controversy surrounding separate diagnoses for autism spectrum disorders and has conducted research to support a general diagnosis of autism spectrum disorder. She is also
  knowledgeable about the importance of using standardized diagnostic instruments and considering the strengths and weaknesses of individuals when making diagnoses.
