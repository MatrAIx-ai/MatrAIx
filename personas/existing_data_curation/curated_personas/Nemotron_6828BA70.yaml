  career_goals: Danica aims to move from a frontline HR role to a strategic HR Business Partner position within the next three years, where she can influence workforce planning and champion flexible work
    policies that reflect her blend of curiosity and practicality. She plans to obtain the SHRM‑SCP certification and eventually pursue a master’s in organizational development. Long‑term, she hopes to
    launch a boutique consulting practice that helps small‑to‑mid‑size New England businesses build resilient, employee‑centric cultures, and to author a guide on integrating data‑driven HR practices with
    a humane, people‑first approach.
