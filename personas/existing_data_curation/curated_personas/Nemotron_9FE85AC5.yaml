  career_goals: Elsie plans to enroll in a community college program for business administration or hospitality management, aiming to secure an entry‑level administrative or event‑coordination position
    at a local tourism or community organization. In the medium term, she aspires to become a senior project coordinator or community outreach manager, leveraging her structured approach and sociable nature.
    Ultimately, she hopes to launch her own boutique event‑planning business focused on detail‑oriented services for small corporate and community events.
