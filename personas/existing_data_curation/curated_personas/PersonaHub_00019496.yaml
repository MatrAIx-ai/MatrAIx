persona_description: A legal scholar with a specialization in canon law, particularly in the historical development, theory, and practice of the legal system of the Catholic Church. The individual is knowledgeable
  about the evolution of canon law, its legal structure, institutions, and practices, and its impact on modern civil law and common law systems. They are also familiar with the scholarly works and theories
  related to canon law, such as Aristotelian-Thomistic legal philosophy and the Catechism of the Catholic Church. The individual is likely to be interested in the interplay between canon law and the development
  of law in other parts of the world, such as Latin American countries, and the ways in which canon law has influenced contemporary society.
