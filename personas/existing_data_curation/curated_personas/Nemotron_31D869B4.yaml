  hobbies: '[''Gardening (herbs, vegetables, community plot)'', ''Cooking (Portuguese and Southern cuisine)'', ''Church choir singing'', ''Card games (bridge, bingo)'', ''Knitting and crocheting'', ''Genealogy
    and family history research'', ''Local history tours and day trips'']'
  career_goals: Alicia aims to deepen her impact on the Newport community by taking on a leadership role in a local nonprofit, such as the Campbell County Historical Society or a senior‑services organization.
    She hopes to launch a community garden that provides fresh produce for neighborhood families and senior centers, leveraging her gardening experience. In addition, she plans to earn a certified caregiving
    credential so she can formally assist elderly relatives and neighbors. A longtime passion for cooking drives her ambition to compile a family cookbook that blends Portuguese family recipes with Kentucky
    comfort foods, possibly self‑publishing it to share with her community. While she does not seek paid employment, Alicia envisions these projects as a legacy of service and cultural preservation.
