personas:
  professional: A seasoned community organizer, Alicia Ferreira coordinates church events and senior‑center activities with meticulous budgeting, and they thrive on the predictability of structured planning
    while channeling their talkative nature into engaging public speaking.
  sports: An enthusiastic local sports fan, Alicia Ferreira follows the Cincinnati Reds baseball season and the Kentucky Wildcats basketball team, and they play weekly softball matches with the church’s
    senior league at the nearby community park.
  arts: A devoted choir member, Alicia Ferreira sings traditional gospel hymns and occasionally interprets Portuguese folk songs at church festivals, and they enjoy listening to Willie Nelson, Mariza, and
    the Appalachian Strings while knitting blankets for charity.
  travel: A curious day‑trip explorer, Alicia Ferreira has journeyed to historic Fort Harrod and taken a weekend cruise to the Azores to attend the Feast of St. John, and they plan future visits to Lisbon’s
    waterfront markets and the Appalachian Trail’s scenic overlooks.
  culinary: A culinary bridge‑builder, Alicia Ferreira skillfully prepares caldo verde with kale and chorizo alongside Kentucky fried catfish with collard greens, and they love seasoning dishes with fresh
    rosemary, thyme, and lemon zest while hosting potluck evenings featuring apple cobbler and pastel de nata.
  core: Alicia Ferreira blends structured community leadership with a lively, talkative spirit, balancing meticulous event planning, garden stewardship, and a love for heritage‑infused cooking while they
    occasionally indulge in impulsive seafood splurges.
background:
  cultural: Born and raised in the Newport area of Kentucky, Alicia identifies as a white American with Portuguese heritage. Her grandparents emigrated from the Azores in the mid‑20th century, bringing
    with them a love of seafood dishes and folk traditions that have been woven into family celebrations. Growing up in a predominantly Southern, Christian cultural environment, she regularly participates
    in church activities, regional festivals, and community gatherings that reflect the Appalachian and Ohio River Valley customs. Alicia’s cultural identity is therefore a blend of Portuguese family traditions—such
    as celebrating the Feast of St. John and preserving Portuguese recipes—and the broader cultural landscape of rural Kentucky, including an appreciation for country music, local history, and close‑knit
    community values.
attributes:
  skills: '[''Event planning and coordination'', ''Budgeting and financial record‑keeping'', ''Public speaking and facilitation'', ''Volunteer recruitment and management'', ''Conflict mediation'', ''Home
