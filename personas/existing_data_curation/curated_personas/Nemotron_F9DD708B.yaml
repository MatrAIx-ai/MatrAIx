  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Chess'', ''Logic puzzles'', ''Speculative fiction reading'', ''Philosophy'', ''Art gallery visits'', ''Theater performances'', ''Contemporary
    music concerts'', ''Hiking'', ''Yoga'']'
  career_goals: Andrew aims to ascend to a senior executive role, such as Chief Compliance Officer, overseeing enterprise‑wide governance and leveraging emerging technologies to reshape compliance practices.
    He aspires to develop a proprietary compliance risk‑analytics platform that incorporates AI‑driven predictive modeling, while also contributing thought leadership through industry conferences and scholarly
    articles. In the longer term, he envisions establishing his own consultancy that helps organizations embed innovative, ethically sound strategies in a rapidly evolving regulatory landscape. Additionally,
    Andrew hopes to mentor the next generation of compliance professionals, fostering critical thinking and creative problem‑solving.
