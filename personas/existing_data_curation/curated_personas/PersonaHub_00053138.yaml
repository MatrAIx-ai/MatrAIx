persona_description: A researcher interested in studying the variability of isotopic composition in rainfall collected using low-cost, low-tech rain samplers. This researcher is looking to assess the quality
  of these samplers for stable isotope analysis and to understand the potential for mixing and contamination of the collected water samples. They are specifically interested in the Zurich sequential sampler,
  which is a self-built version of the Kennedy sampler, and are conducting laboratory experiments to determine its performance in collecting rainwater.
