  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening heirloom vegetables and herbs'', ''Watercolor painting'', ''Attending local art exhibitions'', ''Reading historical and biographical books'',
    ''Singing in parish choir'', ''Participating in folklórico dance events'', ''Volunteering at senior center (genealogy workshops, storytelling)'']'
  career_goals: Although retired, Natalia aims to leave a lasting cultural legacy. She plans to compile a family cookbook that intertwines recipes with recorded memories of her parents' migration story.
    She hopes to launch a small intergenerational workshop at the senior center where seniors teach traditional cooking, crafts, and storytelling to teens. A personal ambition is to travel back to her hometown
    in Jalisco to reconnect with distant relatives and document the journey in a blog for her grandchildren. Additionally, Natalia wishes to become a docent for the local museum's Mexican-American art collection,
    sharing her love of art with visitors.
