personas:
  professional: Thomas Stimpson, a senior animal caretaker with three decades of high-desert wildlife experience, leverages his Associate of Science in Animal Science, meticulous record-keeping, and disciplined
    enclosure designs to meet USDA and AZA standards while training volunteers and pursuing CPAP certification for a future senior managerial role.
  sports: Thomas Stimpson watches the Arizona Diamondbacks and the Phoenix Suns, plays pickleball twice a week at the senior community center, and incorporates early-morning birdwatching hikes as low-intensity
    cardio, preferring small group or solo activity over high-intensity team sports.
  arts: Thomas Stimpson finds solace in the crisp black-and-white photography of Ansel Adams, the serene piano works of Samuel Barber, and the occasional performance of the Phoenix Symphony, appreciating
    the structured elegance of these arts as a reflection of their own disciplined mindset.
  travel: Thomas Stimpson prefers carefully planned nature retreats, having explored the Sonoran Desert, White Sands National Park, and a guided tour of the Atacama Desert, always reserving quiet lodging
    with a study desk where they can jot observations in their field notebook.
  culinary: Thomas Stimpson enjoys simple, nutrient-dense desert cuisine such as grilled pinto beans with roasted chard, sautéed nopales (cactus pads), and wild-caught trout seasoned with dried sage and
    lemon, cooking mainly on a cast-iron skillet and favoring meals that require minimal prep but maximize flavor.
  core: Thomas Stimpson, a disciplined 64-year-old animal caretaker, blends solitary precision with quiet cooperation, turning desert wildlife stewardship into a structured routine while occasionally indulging
    in marathon jigsaw puzzles and a stubborn reluctance to schedule eye exams.
background:
  cultural: Thomas identifies with an Anglo‑American heritage rooted in the Midwestern United States, shaped by values of self‑reliance, practical problem‑solving, and respect for the natural environment.
    Since relocating to Apple Valley, California, he has embraced the high‑desert lifestyle, integrating community stewardship and environmental conservation into his daily routine. His cultural outlook
    blends traditional American work ethic with a deep appreciation for the surrounding arid landscape, fostering a balanced perspective that prioritizes both personal discipline and collaborative harmony.
attributes:
  skills: '["Animal husbandry (large mammals)", "Animal husbandry (birds & reptiles)", "Veterinary assistance (wound care & medication)", "Regulatory compliance (USDA, AZA)", "Record‑keeping & database
    management", "Enclosure construction & maintenance", "Staff training & mentorship", "Emergency response planning", "Community outreach & education"]'
  hobbies: '["Birdwatching & wildlife photography", "Woodworking for animal enrichment", "Xeriscape gardening with native plants", "Jigsaw puzzles and crosswords", "Reading natural‑history and classic literature",
    "Volunteer education sessions at local nature preserve"]'
  career_goals: Looking ahead, Thomas aims to formalize his leadership role by attaining the Certified Professional Animal Caregiver (CPAC) designation and transitioning to a senior caretaker or facility
    manager position at the sanctuary. He plans to develop a pilot desert‑wildlife rehabilitation program focused on native species such as the desert tortoise and burrowing owl, securing a grant to expand
    quarantine and enrichment spaces. Additionally, he hopes to author a practical field guide on caring for high‑desert fauna, sharing his structured methodology with emerging caretakers while preserving
    his commitment to harmonious, high‑standard animal welfare.
