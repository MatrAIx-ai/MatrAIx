  hobbies: '["Cooking Mexican cuisine","Reading fiction and poetry (English and Spanish)","Landscape and culinary photography","Yoga and meditation","Herb gardening","Hiking in Colorado foothills","Attending
    local cultural festivals","Board games with small group of friends","Language exchange and exploring Spanish dialects"]'
  career_goals: Rosa aims to move from cashier to a supervisory role, such as shift manager or department supervisor, within the next two years. She plans to complete her associate's degree in business
    administration and earn a retail management certification, balancing her curiosity for new knowledge with practical career advancement. Long‑term, she envisions opening a small neighborhood grocery
    store or a Mexican‑style café that blends her cultural heritage with a flexible schedule, allowing her to maintain her personal interests. Additionally, she hopes to serve as a bilingual liaison for
    local businesses, helping them improve outreach to the Hispanic community.
