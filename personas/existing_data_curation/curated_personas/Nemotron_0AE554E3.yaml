personas:
  professional: Rosa Castellanos turns their bilingual fluency and knack for friendly yet efficient customer service into a retail powerhouse, deftly mastering NCR and Square POS systems, juggling cash
    handling and inventory while dreaming of a shift‑manager role that lets them blend practical oversight with their curiosity‑driven pursuit of a business administration associate degree.
  sports: Rosa Castellanos fuels their fitness routine with solitary hikes in the foothills near Greeley, yoga at home, and occasional pick‑up basketball games at the community center, proudly cheering
    the Denver Broncos, Colorado Rockies, and Colorado Avalanche while belonging to the Greeley Trailblazers Hiking Club.
  arts: Rosa Castellanos weaves their love of contemporary literature—alternating between English works by Haruki Murakami and Spanish‑language poetry by Valeria Luiselli—with a passion for landscape photography
    inspired by Ansel Adams, while their playlists feature folk singer Lila Downs and indie band Tame Impala during quiet evenings.
  travel: Rosa Castellanos plans trips with an improvisational flair, having explored Oaxaca’s regional markets and hiked Yellowstone’s geysers, while dreaming of a solo road trip along California’s Pacific
    Coast and a cultural immersion in Kyoto, balancing limited savings with a desire for authentic, small‑group experiences.
  culinary: Rosa Castellanos cooks at an intermediate level, delighting in Oaxacan mole negro, Puebla‑style chiles en nogada, and tlayudas topped with fresh cilantro, epazote, and roasted corn from their
    balcony herb garden, often hosting potluck nights where friends swap recipes and stories.
  core: Rosa Castellanos is a bilingual retail enthusiast who balances a relaxed, slightly disorganized lifestyle with a relentless curiosity, channeling it into cooking experimental regional dishes, solo
    hikes, and dreaming of running a community‑focused café.
background:
  cultural: Rosa is a second‑generation Mexican‑American whose parents immigrated from Veracruz. She grew up speaking Spanish at home and English at school, making her fully bilingual. She celebrates Mexican
    traditions such as Día de los Muertos, quinceañeras, and holiday gatherings with family, and she maintains strong ties to the local Hispanic community in Greeley. Her cultural values of family, hospitality
    (calidez), and community service shape her interactions, and she often incorporates Mexican flavors and customs into her cooking, home décor, and social life. Living in Colorado, she blends her Mexican
    heritage with the regional culture, participating in events like the Greeley Mexican Heritage Festival while preserving her personal, reflective lifestyle.
attributes:
  skills: '["Customer service","Bilingual Spanish-English communication","POS system operation (NCR, Square)","Cash handling and basic accounting","Inventory tracking","Conflict resolution","Problem solving
