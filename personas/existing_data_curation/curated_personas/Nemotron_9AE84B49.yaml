personas:
  professional: Alexander Sedanegron, a 13‑year‑old self‑taught programmer, channels his love of real‑time strategy games and hardware tinkering into designing mods and mini‑games, using languages like
    Python and UnityScript, while balancing his curiosity with a practical, trial‑and‑error mindset that often leads to late‑night debugging sessions despite a loosely organized schedule.
  sports: Alexander Sedanegron, a member of the neighborhood under‑14 soccer club Thunder Strikers, looks forward to weekend pick‑up games on the local field, cheers for the professional team LA Galaxy,
    and applies his tactical mindset from gaming to anticipate opponent moves, though he often skips team drills in favor of solo skill drills.
  arts: Alexander Sedanegron, an avid reader of the classic science‑fiction novel Dune and fan of graphic novels by Jim Lee, spends time sketching original comic characters while listening to Los Tigres
    del Norte and Billie Eilish, weaving visual storytelling into his creative outlet.
  travel: Alexander Sedanegron, who has taken family road trips to the Grand Canyon and a weekend camping excursion in Shenandoah National Park, dreams of visiting Tokyo to attend the Summer Game Festival,
    and prefers a blend of low‑budget adventure planning with spontaneous detours, though his limited budget often curtails long‑haul flights.
  culinary: Alexander Sedanegron, who enjoys helping his family prepare chilaquiles, tacos al pastor, and guacamole while practicing Spanish, boasts a decent skill level with a custom‑built kitchen and
    experiments with adding hot sauce to his morning eggs, yet frequently burns popcorn while gaming.
  core: Alexander Sedanegron is a tech‑savvy, competitively minded 13‑year‑old who juggles gaming, PC tinkering, and sketching, embraces flexibility over strict plans, and balances impulsive spending with
    a surprisingly disciplined eye‑care routine.
background:
  cultural: Alexander comes from a Mexican-American family that maintains strong ties to their heritage while living in suburban Burke, Virginia. At home, Spanish is spoken alongside English, and his family
    celebrates traditional holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day with food, music, and storytelling. He grew up helping his parents prepare tacos, tamales, and other
    dishes, fostering an appreciation for Mexican cuisine. While attending school in Fairfax County, he navigates a multicultural environment, blending the values of family cohesion and respect from his
    Mexican roots with the independent, curiosity-driven mindset encouraged in his American community.
attributes:
