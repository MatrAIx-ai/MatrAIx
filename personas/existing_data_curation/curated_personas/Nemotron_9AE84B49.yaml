    soccer with friends'', ''Listening to Mexican and pop music'']'
  career_goals: Alexander dreams of turning his love for technology and games into a career as a software engineer or video game developer. He envisions studying computer science at a top university, eventually
    designing interactive experiences that blend storytelling with cultural elements. He is also intrigued by the idea of creating bilingual educational apps that help other young Mexican-American students
    learn coding in both languages. In the near term, he aims to win local coding competitions and build a portfolio of indie games.
