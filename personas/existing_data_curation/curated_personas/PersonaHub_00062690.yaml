persona_description: A young entrepreneur who has dedicated her life to finding sustainable solutions for plastic pollution. She is the co-founder of BioCellection, a company that has developed a method
  for breaking down multiple types of shredded plastic waste in a way that is cheaper and more sustainable than current alternatives. Wang has spent the past decade exploring possible solutions to plastic
  pollution and has spent the past decade exploring possible solutions to plastic pollution. Her work has been covered by CNN and the New York Times. She is a recipient of the 2018 Pritzker Emerging Environmental
  Genius Award, which is the field's first major honor for innovators under the age of 40. She plans to use the award money to refine the company's methods so that the end products of the chemical process
  are at an even higher purity level. This technology can become the pillar of what would enable people around the world to mine landfills for plastics as a new carbon source.
