personas:
  professional: Gerold Evans is a pragmatic community‑center maintenance coordinator and aspiring home‑based caterer who leverages budgeting, carpentry, and conflict‑resolution skills to organize neighborhood
    projects while infusing structure into their creative cooking workshops.
  sports: Gerold Evans plays in the San Lorenzo community basketball league every Saturday, cheers for the Golden State Warriors and San Jose Earthquakes, and they join a local hiking club that meets for
    coastal trail runs at Point Reyes during the summer, blending competitive team spirit with seasonal outdoor fitness.
  arts: Gerold Evans contributes percussion to the church choir, dances to classic R&B tunes by Marvin Gaye and contemporary hip‑hop tracks by Kendrick Lamar at local gatherings, and they regularly attend
    Bay Area cultural festivals featuring performances by jazz saxophonist Kamasi Washington and spoken‑word series by poet Maya Angelou.
  travel: Gerold Evans enjoys weekend road trips to coastal destinations like Half Moon Bay, Point Reyes, and Monterey, has visited New Orleans for its music scene, and they dream of exploring Barcelona’s
    architecture, always planning trips around a modest budget and traveling with a small circle of friends.
  culinary: Gerold Evans specializes in healthier soul‑food twists such as quinoa jambalaya, roasted tomatoes with basil, and collard greens sautéed with smoked paprika, skillfully blends garden‑fresh herbs
    into family‑style meals, and they love experimenting with spices like cumin and thyme while occasionally over‑salting dishes in their enthusiasm.
  core: Gerold Evans is a structured yet sociable community builder who balances hands‑on carpentry, rhythmic percussion, and spirited basketball with a love for cooking wholesome gatherings, all while
    occasionally forgetting to water their garden during busy weeks.
background:
  cultural: Gerold is an African‑American born and raised in the San Lorenzo region of Oakland’s East Bay. His family traces its roots to the Great Migration, with grandparents who relocated from the Southern
    United States to California in the 1950s seeking industrial work. Growing up, he was immersed in Black cultural traditions—gospel music, soul‑food cooking, community churches, and the close‑knit neighborhood
    networks that emphasize mutual support. He identifies strongly with West Coast Black culture, blending elements of hip‑hop, jazz, and community activism. This heritage informs his commitment to harmony,
    collective well‑being, and mentorship within his local Black community.
attributes:
