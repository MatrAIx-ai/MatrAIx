persona_description: A public health researcher who specializes in the study of malaria, particularly its prevention and control efforts in Malawi. Her research focuses on understanding why previous malaria
  prevention and eradication methods have been unsuccessful and how progress can be made. She has received two grants from the National Institutes of Health's National Institute of Allergy and Infectious
  Diseases to study malaria in Malawi and has been fighting the "Voldemort of parasites" since 1986.
