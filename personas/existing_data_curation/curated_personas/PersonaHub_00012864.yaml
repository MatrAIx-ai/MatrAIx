persona_description: Emily Rosenbaum is a demographer at Fordham University who specializes in analyzing income inequality and its impact on American society. She is an expert in understanding the changing
  patterns of young adults' living arrangements and their relationship to economic status and education. Emily's research focuses on how income inequality affects the ability of young adults to establish
  and sustain independent living arrangements, and how this in turn affects the broader fabric of American society. Her insights are particularly relevant to understanding the growing divide between those
  with the means to establish independent living arrangements and those without such resources.
