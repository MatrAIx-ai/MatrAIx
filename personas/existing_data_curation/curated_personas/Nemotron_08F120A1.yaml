personas:
  professional: Angela Phillips works as an insurance sales associate, leveraging data-driven risk assessment, spreadsheet modeling, and Python automation to craft tailored client solutions while their
    natural curiosity and pragmatic mindset keep them disciplined yet occasionally disorganized in project planning.
  sports: Angela Phillips enjoys solitary hikes on the trails around Belews Lake and occasionally attends a Greensboro Grasshoppers baseball game for a brief social outing, but they prefer to follow the
    NC State Wolfpack basketball season alone, and they practice yoga at home while listening to instrumental playlists.
  arts: Angela Phillips spends evenings practicing piano classics ranging from Chopin Nocturnes to jazz standards by Ella Fitzgerald, reads contemporary science-fiction novels and socially conscious literature,
    and they watch the latest thriller releases starring Florence Pugh, using these artistic pursuits as a quiet sanctuary that balances their analytical work life.
  travel: Angela Phillips has taken weekend road trips to Asheville’s Blue Ridge Parkway, explored the historic streets of Charleston, and completed a solo cultural immersion in Barcelona where they practiced
    Spanish, while they keep a dream list that includes hiking the Inca Trail in Peru and visiting the jazz heritage sites of New Orleans.
  culinary: Angela Phillips loves cooking Southern comfort dishes such as shrimp and grits, collard greens with smoked turkey, and cornbread, while also experimenting with Spanish paella featuring saffron
    rice and chorizo, and they frequently pair meals with homemade sweet tea or a glass of sangria.
  core: Angela Phillips is a solitary strategist who blends analytical rigor with a love of quiet creativity, but they often procrastinate on routine chores and can be skeptically competitive in both work
    and games.
background:
  cultural: Angela is a Black woman raised in Greensboro, North Carolina, where she was immersed in a close‑knit African‑American community that values family, church, and education. Growing up she attended
    local cultural events, participated in school STEM clubs, and was inspired by the legacy of the Greensboro sit‑ins and civil‑rights activism. Her family emphasized resilience and the importance of giving
    back, which shapes her desire to mentor other Black women in finance. Though she now works in a predominantly corporate environment, she maintains ties to community organizations like local Black STEM
    networking groups and volunteers occasionally at a neighborhood tutoring program, balancing her solitary nature with a sense of cultural responsibility.
attributes:
  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Risk Assessment'', ''Insurance Product Knowledge'', ''Customer Relationship Management (CRM)'', ''Sales Negotiation'', ''Public Speaking'', ''Python
    Programming'', ''SQL Querying'', ''Microsoft Excel & PowerPivot'', ''Problem Solving'', ''Independent Research'']'
  hobbies: '[''Reading (Sci‑fi & African American literature)'', ''Coding (Python projects)'', ''Piano practice'', ''Hiking'', ''Meditation'', ''Chess'', ''Puzzle solving (Sudoku)'', ''True‑crime podcasts'',
    ''Journaling'', ''Cooking Southern dishes'', ''Learning Spanish'']'
  career_goals: Angela aims to become a top‑performing senior insurance consultant within the next five years, managing a portfolio of corporate and high‑net‑worth clients. She plans to earn professional
    designations such as the Chartered Property Casualty Underwriter (CPCU) and Chartered Life Underwriter (CLU) to deepen her expertise. Long‑term, she envisions transitioning into a risk‑management analyst
    role that leverages her STEM background, and eventually launching her own boutique brokerage focused on serving underserved Black communities. Mentoring younger Black women entering finance and insurance
    is also a core ambition.
