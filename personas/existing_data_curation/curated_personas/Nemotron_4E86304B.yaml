    music'']'
  career_goals: Sebastian aspires to transition from building maintenance to a creative career that blends his practical experience with his artistic passion. He plans to complete his associate degree by
    enrolling in community college courses in graphic design and visual arts, aiming to earn a BFA within the next five years. His long‑term ambition is to work as a visual designer or mural artist for
    community spaces in Orange County, where he can incorporate Mexican cultural motifs and contemporary abstract concepts. He also hopes to launch a freelance illustration side‑business, providing artwork
    for local businesses and cultural events, while maintaining a stable income through part‑time facility work until his artistic ventures become self‑sustaining.
