personas:
  professional: Sebastian Carrasquillo is an experienced facility maintenance professional who leverages OSHA‑trained cleaning expertise and handyman skills to keep large buildings spotless, while using
    their artistic eye and bilingual communication to propose design‑friendly solutions that blend practicality with visual storytelling.
  sports: Sebastian Carrasquillo follows the LA Lakers and Los Angeles Galaxy, plays pick‑up basketball at a community center three times a week, and incorporates daily yoga into their fitness regimen,
    treating the practice as both sport and stress relief.
  arts: Sebastian Carrasquillo immerses themselves in Santa Ana’s street‑art corridors, draws inspiration from abstract masters like Mark Rothko and contemporary digital illustrator James White, creates
    mixed‑media collages in Procreate, and curates community Día de los Muertos altars, blending traditional motifs with avant‑garde aesthetics.
  travel: Sebastian Carrasquillo enjoys weekend trips to the nearby art hub of Los Angeles, has explored Oaxaca’s Day of the Dead celebrations, dreams of a studio‑visiting pilgrimage to Mexico City’s mural
    district, and plans a future solo journey to Kyoto to study traditional ukiyo‑e techniques, all while balancing a modest travel budget.
  culinary: Sebastian Carrasquillo favors cooking vibrant tacos al pastor with pineapple and cilantro, experiments with avocado‑lime quinoa bowls, and occasionally indulges in artisanal ramen from a downtown
    food truck, while their kitchen skills remain intermediate, often relying on quick, colorful dishes that fuel their creative sessions.
  core: Sebastian Carrasquillo is a detail‑obsessed janitor‑artist whose midnight sketchbook sessions, anxiety‑fueled habit of double‑checking every mop bucket, and love for neon‑lit street murals turn
    ordinary spaces into personal galleries.
background:
  cultural: Sebastian is a first‑generation Mexican‑American raised in the vibrant Latino community of Santa Ana. Fluent in both Spanish and English, he grew up celebrating traditional Mexican holidays
    such as Día de los Muertos, Cinco de Mayo, and Semana Santa, often helping his family prepare classic dishes like tamales, pozole, and mole. His grandparents instilled an appreciation for Mexican muralism
    and folk art, shaping his visual sensibility and love for large‑scale public art. He remains connected to his heritage through regular visits to local cultural centers, participation in community festivals,
    and mentorship of younger kids in his neighborhood by teaching basic drawing techniques. This bicultural upbringing informs his artistic style, which frequently merges Mexican symbolism with contemporary
    abstract forms.
