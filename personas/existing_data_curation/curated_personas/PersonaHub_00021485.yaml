persona_description: A disaster management expert who focuses on the analysis and assessment of damage from severe weather events, with a particular interest in using rapid damage assessments to improve
  recovery efforts and mitigate future damage. They are skilled in data analysis, particularly in the use of Doppler radar and other sensors to identify the spatial extent and relative frequency of damage.
  They have conducted research on the vulnerability of various building types and components, and have experience leading rapid damage assessments in disaster recovery situations. They have published their
  findings in the Australian Journal of Emergency Management and have received funding from the National Science Foundation Rapid Response Research award to develop a method for anticipating wind, storm
  surge, and joint wind-storm surge damage.
