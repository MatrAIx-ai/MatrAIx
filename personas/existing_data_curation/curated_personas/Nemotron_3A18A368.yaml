personas:
  professional: Carl Cline is a 20‑year‑old aspiring visual artist who blends photography, sketching, and basic video editing into pop‑up community events, leveraging their natural charisma to rally participants
    while embracing a relaxed, sometimes disorganized workflow that fuels spontaneous creativity.
  sports: Carl Cline joins weekend pickup basketball games at the Albion gym and a casual street‑soccer squad called The Sidewalk Strikers, roots for the Chicago Bulls, and brings a competitive edge to
    every match, using the physical activity as a release valve for their intense emotions.
  arts: Carl Cline spends evenings at open‑mic nights performing acoustic covers of Bon Iver and Phoebe Bridgers, sketches candid scenes at the Albion public library, curates pop‑up photo exhibits inspired
    by Vivian Maier, and draws comedic timing from the Flight of the Conchords to enrich their improv troupe performances.
  travel: Carl Cline prefers spontaneous road trips to nearby towns like Cedar Creek and Maple Ridge, seeking unconventional coffee shops and indie music venues, while day‑dreaming about an art‑focused
    pilgrimage to Portland, Oregon's vibrant murals and galleries.
  culinary: Carl Cline loves discovering quirky café menus, gravitating toward avocado toast with house‑made poached eggs, lavender‑infused cold brew, and experimental dishes like kimchi pizza or lavender‑honey
    ice cream, often attempting to recreate them in their cramped dorm kitchen.
  core: Carl Cline is a restless 20‑year‑old creative who channels anxiety into spontaneous art, coffee‑fuelled community events, and competitive gaming, all while juggling a love‑hate relationship with
    structure.
background:
  cultural: Carl grew up in Albion, Michigan, a close‑knit Midwestern town with a strong sense of community and modest artistic resources. His family background is primarily of white, Anglo‑American descent
    with traces of French‑Canadian ancestry, reflected in his surnames Broussard and Cline. This heritage has exposed him to a mix of traditional Midwestern values—hard work, modesty, and neighborly support—alongside
    an appreciation for the eclectic cultural influences that arrive through internet media and regional festivals. He attended Albion High School, where he participated in the limited art program and joined
    the school’s theater club, experiences that sparked his love for creative expression. The cultural landscape of his hometown, combined with his exposure to broader digital cultures, shapes his open‑minded
    yet skeptical worldview.
