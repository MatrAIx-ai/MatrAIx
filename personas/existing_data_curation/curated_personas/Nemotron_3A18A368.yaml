  career_goals: Carl hopes to turn his artistic curiosity into a sustainable career. He aims to enroll in a community college program or apprenticeship in graphic design or multimedia arts, building a professional
    portfolio that blends his photography, sketching, and video editing. Long‑term, he envisions working as a freelance visual artist or a junior creative director for a regional marketing agency, while
    also curating pop‑up art events in Albion to keep his love of group activities alive. He is also open to part‑time work in a local café or gallery that supports emerging artists, giving him financial
    stability while he pursues his creative ambitions. A personal goal is to develop healthier coping strategies for anxiety, using art therapy techniques to channel his intense emotions.
