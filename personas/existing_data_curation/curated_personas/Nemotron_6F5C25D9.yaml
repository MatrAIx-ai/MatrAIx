personas:
  professional: Alexis Feaster, an 18‑year‑old bookkeeping and auditing clerk, uses advanced Excel pivot tables and QuickBooks to keep ledgers flawless while habitually breaking every audit task into bite‑size
    steps to soothe their chronic worry.
  sports: Alexis Feaster enjoys brisk weekend walks along the Merrimack River, occasional hikes with the New Hampshire Trails Club, and is a steadfast fan of the Boston Red Sox, often watching games at
    Fenway while syncing a running playlist to stay active.
  arts: Alexis Feaster finds calm in Debussy’s piano preludes while perfecting a Boston cream pie, regularly attends Boston Symphony Orchestra concerts, and curates a playlist that swaps between Bob Dylan
    folk classics and Emma Stone’s indie film soundtracks for creative inspiration.
  travel: Alexis Feaster prefers organized weekend escapes to historic New England towns like Portsmouth, Maine, using student travel discounts and a detailed itinerary, yet they dream of a solo trek through
    the Swiss Alps to test the limits of their comfort zone.
  culinary: Alexis Feaster’s kitchen doubles as a New England dessert lab, mastering blueberry scones, whoopie pies, and the precise caramel glaze of a Boston cream pie with fresh Maine blueberries, vanilla
    bean, and a pinch of nutmeg, though they sometimes over‑whip batter when stress spikes.
  core: Alexis Feaster blends a stopwatch‑precise love of numbers with a tender‑hearted volunteer spirit, constantly juggling spreadsheets, anxiety, and a quest for perfectly baked pies.
background:
  cultural: Alexis comes from a white, New England American background. She was raised in Manchester, New Hampshire, in a middle‑class family with deep ties to the region’s modest and industrious culture.
    Her family’s heritage includes Irish and German ancestry, which is reflected in occasional cultural traditions such as celebrating St. Patrick’s Day and maintaining a strong work ethic. The community
    environment emphasized education, self‑reliance, and civic responsibility, values that are evident in Alexis’s practical outlook, cooperative attitude, and focus on contributing to local small‑business
    health. Growing up in a town with close‑knit neighborhoods, she was encouraged to participate in community service and local events, reinforcing a sense of belonging and respect for diverse perspectives,
    even within a predominantly white demographic.
attributes:
