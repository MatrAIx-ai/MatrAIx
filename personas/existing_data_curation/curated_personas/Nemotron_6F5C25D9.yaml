  hobbies: '[''Baking and cooking'', ''Crossword puzzles and sudoku'', ''Journaling'', ''Mindfulness meditation'', ''Book club (non‑fiction, finance and self‑development)'', ''Walking/hiking along Merrimack
    River and local parks'', ''Volunteering at community center (budgeting assistance)'']'
  career_goals: Alexis aims to complete a bachelor’s degree in accounting within the next two years and then pursue the CPA certification. Her short‑term goal is to secure a position at a mid‑size public
    accounting firm where she can deepen her audit and tax experience while continuing to refine her analytical skills. In the medium term, she aspires to become a senior accountant or audit manager, leading
    small teams and overseeing client engagements. She values career stability and clear advancement pathways, and she hopes to maintain a balanced workload that allows time for her personal well‑being
    and community involvement. Ultimately, she envisions one day perhaps opening a small bookkeeping consultancy that serves local small businesses in Manchester, allowing her to blend her professional
    expertise with a community‑focused mission.
