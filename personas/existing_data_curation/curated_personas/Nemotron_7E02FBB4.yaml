personas:
  professional: Cornelia Sholtes, a 38‑year‑old Class A CDL driver with 15 years of Mid‑Atlantic freight experience, blends meticulous route‑planning, hands‑on truck maintenance, and sharp negotiation skills
    with a reserved yet assertive demeanor, turning each delivery into a punctual, safety‑focused operation that subtly reflects their artistic eye.
  sports: Cornelia Sholtes stays fit by walking the Patapsco River trails, joining a low‑key weekend pick‑up soccer group in Baltimore, cheering the Ravens in football season and the Capitals during winter,
    and occasionally attending a community yoga class to stretch out after long hauls.
  arts: Cornelia Sholtes channels their curiosity for art by sketching in galleries featuring Kehinde Wiley and local Baltimore street murals, attending intimate shows by The National and indie folk duo
    The Hundred, and regularly tuning into podcasts like 99% Invisible to explore design and unconventional travel narratives.
  travel: Cornelia Sholtes prefers flexible, self‑driven explorations, charting spontaneous road trips along the Chesapeake Bay and through Shenandoah National Park, having already photographed the lighthouses
    of Cape Cod and dreaming of a weekend getaway to Asheville’s arts district.
  culinary: Cornelia Sholtes enjoys experimenting in a modest kitchen, mastering eclectic dishes like Thai green curry with fresh lemongrass, Ethiopian injera spiced with berbere, and Mexican mole enriched
    with ancho chilies, while often sourcing heirloom tomatoes, za’atar, and smoked paprika from local farmers’ markets.
  core: Cornelia Sholtes is a competitively driven, art‑obsessed CDL driver who balances meticulous freight logistics with a relaxed, sometimes disorganized lifestyle, indulging in vintage thrift finds,
    spontaneous road‑trip photography, and a healthy dose of skepticism toward routine.
background:
  cultural: Cornelia grew up in a middle‑class white family in the suburbs of Howard County, Maryland, with German‑American and Anglo‑American ancestry. Her upbringing blended the traditional Mid‑Atlantic
    work ethic with exposure to the vibrant cultural scene of nearby Baltimore, where she developed an early interest in street art and live music. Though she left high school before obtaining a diploma,
    she entered the workforce as a delivery driver, learning on the job and valuing independence and self‑reliance. Her cultural identity is shaped by a pragmatic American outlook, a respect for community
    ties in her hometown, and an appreciation for the diverse artistic expressions that thrive in the region. The blend of suburban stability and urban artistic energy informs her personal values and professional
    aspirations.
