    appreciation'']'
  hobbies: '[''Visiting art galleries and pop‑up exhibitions'', ''Landscape and street photography'', ''Sketching and visual journaling'', ''Road trips with curated playlists'', ''Listening to indie design
    and travel podcasts'', ''Cooking experimental dishes'', ''Attending small live‑music shows'', ''Thrifting vintage clothing and décor'', ''Exploring local nature trails'', ''Reading contemporary fiction'']'
  career_goals: Cornelia aims to transition from a line driver to a logistics manager for a boutique freight company that services art galleries, museums, and independent creators in the Mid‑Atlantic region.
    She hopes to leverage her competitive drive to earn a reputation as the most reliable and innovative driver, eventually earning a safety award and a promotion to fleet supervisor. In the longer term,
    Cornelia envisions launching her own small‑scale, driver‑owned delivery service that pairs freight expertise with curated art handling, offering flexible, on‑demand transport for local artists and collectors.
    To support this ambition, she plans to pursue a professional certification in supply‑chain management and to attend workshops on art logistics and sustainable transportation practices.
