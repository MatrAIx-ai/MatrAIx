  hobbies: '[''Gardening (citrus, palms)'', ''Traditional Puerto Rican cooking'', ''Salsa dancing and Latin music festivals'', ''Knitting'', ''Reading mystery novels'', ''Walking in Ocala National Forest'',
    ''Volunteering at senior center'', ''Community gardening competitions'']'
  career_goals: Although retired, Fabiola aims to become a community mentor for seniors, offering workshops on budgeting, nutrition, and home safety. She hopes to secure a part‑time role as a cultural liaison
    at the Ocala Public Library to organize Puerto Rican heritage events and teach conversational Spanish. Additionally, she plans to write and self‑publish a cookbook that blends classic Puerto Rican recipes
    with Florida-grown ingredients, preserving her culinary legacy.
