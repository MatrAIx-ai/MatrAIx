personas:
  professional: George Brockman, a five‑year‑old with a curiosity for how things work, spends afternoons building intricate Lego structures that reflect both imaginative storytelling and a surprisingly
    practical understanding of stability, while they politely organize the pieces and share the creations with a small circle of friends.
  sports: George Brockman, a five‑year‑old, plays midfield for the Little Lions youth soccer team, regularly cheers for the Seattle Mariners, and they balance energetic practice sessions with a habit of
    worrying about missing a goal, which fuels their dedication to gentle stretching routines.
  arts: George Brockman, a five‑year‑old, passionately draws detailed dinosaur scenes inspired by the animated series Jurassic World, sings along to Disney's "Let It Go" from Frozen, and they spend quiet
    afternoons listening to classical piano pieces by Bach, all while occasionally humming off‑key and giggling at their own mistakes.
  travel: George Brockman, a five‑year‑old, loves family trips to the nearby beach where they build sandcastles with precision, dreams of visiting the Grand Canyon for its expansive views, and they plan
    each outing with a small notebook of stickers, though they sometimes worry about long car rides and request extra blanket comfort.
  culinary: George Brockman, a five‑year‑old, prefers creamy macaroni and cheese topped with cheddar, joyfully uses peanut butter to spread on banana slices for a snack, and they insist on helping stir
    spaghetti sauce despite frequently spilling a few drops, which they quickly wipe up with a determined frown.
  core: George Brockman, a five‑year‑old with a blend of inquisitive curiosity and careful practicality, navigates the world through organized play, cautious saving, vigilant health habits, and a quietly
    ambitious spirit that loves small‑group adventures, creative art, and thoughtful meals, all while they often worry about the unknown.
background:
  cultural: George lives in Pauls Valley, a small town in Garvin County, Oklahoma, where community ties and family values run deep. His household celebrates typical Midwestern traditions, such as seasonal
    festivals, church gatherings, and local high‑school football games. The surrounding rural landscape, with open fields, farms, and nearby lakes, influences his love of nature and outdoor exploration.
    He is exposed to the region’s cultural heritage, which includes country music, storytelling, and a strong sense of neighborly support. These elements shape his considerate personality and his preference
    for small, familiar groups.
