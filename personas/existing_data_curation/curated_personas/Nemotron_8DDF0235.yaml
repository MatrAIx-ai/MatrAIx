  career_goals: Although still in kindergarten, George talks about what he wants to be when he grows up. He expresses a strong desire to work with animals, saying he would love to become a veterinarian
    so he can help injured pets and farm animals. He also dreams of building things like a real-life engineer, inspired by the way LEGO pieces fit together. His practical side leads him to imagine careers
    that combine caring for others with creating solutions, such as a teacher or a community helper who fixes problems for his neighborhood.
