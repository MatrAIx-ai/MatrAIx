  hobbies: '[''Gardening'', ''Listening to Soul/Jazz/Gospel Music'', ''Reading Historical Non‑Fiction'', ''Reading Club'', ''Woodworking'', ''Volunteering at Senior Center'', ''Fishing'', ''Nature Walks'']'
  career_goals: Approaching retirement, Karan aims to transition into a senior advisory role within his organization, focusing on refining customer service protocols and mentoring the next generation of
    representatives. He plans to earn a certification in customer experience management and lead a small team that designs training modules. Karan also seeks a part‑time consulting position that allows
    him to share his expertise while preserving a schedule that supports his health and family time. Ultimately, he wants to leave a legacy of improved service quality and ensure his retirement years are
    financially secure and personally fulfilling.
