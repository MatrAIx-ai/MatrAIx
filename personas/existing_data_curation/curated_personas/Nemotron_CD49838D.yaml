  career_goals: Ryan aims to move into a supervisory role within the next two years, becoming a shift lead or security manager at the casino. He plans to earn a Certified Protection Professional (CPP) credential
    and complete a GED to formalize his education. Long‑term, he envisions starting his own security consulting firm serving small‑town venues, leveraging his expertise in surveillance technology and regulatory
    compliance. He also hopes to mentor younger security personnel, sharing his practical approach while staying open to emerging security innovations.
