personas:
  professional: Jonathan Hurt, a budding environmental outreach coordinator in the making, merges practical DIY tech skills—like diagnosing computer hardware and basic Python scripting—with a gentle, empathetic
    approach to community health, choosing flexible, field‑based projects over rigid office schedules.
  sports: Jonathan Hurt enjoys early‑morning hikes with the local Missouri Trails Club, follows the Kansas City Chiefs and St. Louis Cardinals passionately, and maintains a low‑key fitness regime of weekend
    trail running and occasional pick‑up basketball at the community center, though they often skip scheduled workouts when a new book captures their attention.
  arts: Jonathan Hurt, an amateur acoustic guitarist, frequently strums fingerstyle arrangements of Nick Drake and Bon Iver, attends quiet indie film screenings featuring directors like Wes Anderson, and
    sketches landscapes inspired by Ansel Adams, allowing artistic expression to soothe their introspective mind.
  travel: Jonathan Hurt favors solo, low‑key trips that blend nature and reflection, having camped in the Ozark National Forest, trekked the Appalachian Trail, and dreaming of a quiet retreat in New Zealand’s
    Fiordland, they meticulously plan routes but often abandon plans when a new science documentary sparks curiosity.
  culinary: Jonathan Hurt, an enthusiastic home gardener, cooks simple farm‑to‑table meals such as roasted heirloom carrots with thyme, wild mushroom risotto, and a hearty bean stew seasoned with smoked
    paprika, preferring to grow most ingredients themselves yet occasionally orders take‑out pizza when stress overwhelms their cooking routine.
  core: Jonathan Hurt blends quiet curiosity with heartfelt compassion, channeling a love for nature, tech tinkering, and solo creativity into a flexible, community‑focused life while wrestling with perpetual
    worry and a habit of occasional disorganization.
background:
  cultural: Jonathan was raised in Truxton, a small farming community in Warren County, Missouri, within a predominantly white Midwestern environment. The local culture emphasizes modesty, self‑reliance,
    and strong neighborhood ties, often centered around church gatherings and community events. Growing up surrounded by agricultural land nurtured his respect for nature and practical problem‑solving,
    while the close‑knit community fostered his cooperative spirit and desire to support others.
attributes:
  skills: '["Computer troubleshooting and hardware repair", "Basic Python programming", "DIY home maintenance (carpentry, minor electrical work)", "Empathetic active listening and peer counseling", "First‑aid/CPR
    certification", "Knowledge of local environmental issues", "Technical and community report writing"]'
  hobbies: '["Reading (non‑fiction, science, philosophy)", "Nature walks and birdwatching", "Gardening (native plants)", "Playing acoustic guitar", "Journaling and reflective writing", "Model kit building
    and landscape sketching", "Single‑player narrative video games"]'
  career_goals: Jonathan aims to combine his technical aptitude with his desire to help others by pursuing a degree in environmental science or social work. He envisions a career as a community health worker,
    environmental outreach coordinator, or certified EMT, roles that let him work flexibly while serving rural residents. In the long term, he hopes to establish a nonprofit focused on mental‑health support
    and environmental stewardship for small‑town Missouri, securing stable income through remote technical work or grant‑funded projects.
