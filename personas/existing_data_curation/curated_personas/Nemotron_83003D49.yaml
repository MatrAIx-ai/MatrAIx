personas:
  professional: Mary Schaefer drives a high‑performing door‑to‑door news distribution team, applying her organized route‑planning, persuasive public speaking, and sharp copy‑writing skills to exceed sales
    targets, while mentoring emerging women reps and pursuing certification to become a regional sales manager.
  sports: Mary Schaefer stays active by joining a local line‑dancing club that meets every Thursday, cheering on the Alabama Crimson Tide football team each fall, participating in a weekend walking group
    that tours historic Montgomery landmarks, and occasionally attending Birmingham Barons baseball games, preferring low‑impact, community‑oriented fitness activities that also satisfy her social nature.
  arts: Mary Schaefer fuels her creative appetite by reading works of William Faulkner and Flannery O'Connor at her Southern literature book club, attending community theater productions such as August
    Wilson's 'Fences' performed by the Montgomery Players, and reveling in live blues nights featuring the timeless sounds of B.B. King, Etta James, and contemporary guitarist Derek Trucks.
  travel: Mary Schaefer meticulously plans her Deep‑South road trips using a leather‑bound travel journal, charting routes that weave through Savannah’s historic squares, Natchez’s antebellum mansions,
    Charleston’s cobblestone streets, and the vibrant French Quarter of New Orleans, balancing a modest budget with a desire for authentic storytelling experiences.
  culinary: Mary Schaefer cultivates a thriving herb garden of thyme, oregano, and rosemary which she spices up classic Southern fare like shrimp and grits, smoked pulled pork, and buttery collard greens,
    and she delights in orchestrating weekly potluck dinners where neighbors bring family recipes, though she occasionally forgets to wash the dishes after a lively evening.
  core: Mary Schaefer blends methodical planning with a love for Southern culture—budget‑tracking, herb‑growing, line‑dancing, and leading door‑to‑door sales—while juggling a calendar so full it often requires
    a post‑it reminder to breathe.
background:
  cultural: Mary’s cultural roots are firmly planted in the American South, raised in a small‑town environment in Alabama where Southern hospitality, Methodist traditions, and strong community ties are
    central. She values family connections, church involvement, and regional customs such as outdoor gatherings and seasonal festivals. Her humanities education deepened her appreciation for Southern literature,
    music, and history, while her lifelong residence in Montgomery has made her aware of the city’s civil‑rights legacy and its diverse cultural tapestry. She embraces her white Southern identity with an
    emphasis on respect, mutual support, and local pride.
