  career_goals: Mary aims to advance to a regional sales manager role within the news distribution network, overseeing multiple door‑to‑door teams and implementing efficiency improvements. She also dreams
    of launching her own community‑focused boutique that showcases locally sourced products and hosts educational workshops. Mentoring younger sales professionals, especially women, is a priority, and she
    intends to obtain formal certification in sales management to solidify her leadership credentials.
