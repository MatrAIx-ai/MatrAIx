  hobbies: '[''abstract painting'', ''reading historical fiction'', ''photography of everyday scenes'', ''gardening'', ''cooking traditional Honduran dishes'', ''solving Sudoku and crossword puzzles'',
    ''attending local art exhibitions'', ''listening to classic Latin music'', ''teaching basic Spanish to community members'', ''volunteering at senior centers'']'
  career_goals: Jesus aims to transition into a supervisory or trainer role within his warehouse before fully retiring, where he can formalize a mentorship program for younger and older employees alike.
    He hopes to lead a pilot project implementing a more intuitive inventory tracking system that leverages his interest in novel technologies. Beyond work, he aspires to curate a small community exhibition
    showcasing his abstract paintings and the stories of fellow Honduran immigrants, preserving cultural memory for future generations. He also wishes to author a memoir that blends personal anecdotes with
    reflections on the evolving labor landscape, hoping it might inspire others in his age group to stay intellectually engaged.
