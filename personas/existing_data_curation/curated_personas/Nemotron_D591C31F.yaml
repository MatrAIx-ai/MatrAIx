  hobbies: '[''Visiting Art Galleries'', ''Drawing and Sketching'', ''Playing Guitar (Mexican Folk Music)'', ''Attending Cultural Festivals'', ''Cooking Mexican Cuisine'', ''Community Volunteering'', ''Trivia
