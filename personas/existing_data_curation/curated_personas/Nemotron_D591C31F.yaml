personas:
  professional: Roberto Oteroramos leverages 30 years of high‑traffic retail supervision to mentor emerging store leaders, blending an artistic visual‑merchandising sense, bilingual communication, and a
    relaxed, improvisational work style while launching a boutique of handcrafted art and pursuing retail‑analytics certification.
  sports: Roberto Oteroramos stays active by strolling his garden, joining a senior‑friendly walking club, attending weekly yoga sessions at the Chino Community Center, and cheering on the Los Angeles Dodgers
    and LA Lakers, with occasional pick‑up soccer games at the neighborhood park.
  arts: Roberto Oteroramos regularly visits the Riverside Art Museum, where he studies works by Frida Kahlo and Diego Rivera, takes evening drawing lessons at the Chino Community Center, and spends evenings
    strumming traditional Mexican folk tunes on his guitar, often performing at community Día de los Muertos and Cinco de Mayo celebrations.
  travel: Roberto Oteroramos enjoys leisurely road trips that blend cultural immersion and natural scenery, recalling recent visits to Oaxaca's historic markets and a camping adventure in Joshua Tree, while
    planning future journeys to the art‑rich city of Santa Fe and the historic streets of San Miguel de Allende, favoring flexible itineraries and community‑oriented travel groups.
  culinary: Roberto Oteroramos crafts authentic Mexican meals such as mole poblano, chiles en nogada, and slow‑cooked carnitas, drawing fresh cilantro, epazote, and tomatillo salsa from his backyard garden,
    and while his intermediate cooking skills delight family gatherings, he sometimes over‑season dishes with extra salt.
  core: Roberto Oteroramos blends a lifelong retail acumen with a vibrant love for Mexican art, music, and cuisine, navigating life with relaxed flexibility, sociable energy, and a curious drive that keeps
    him sketching, guitar‑strumming, and mentoring well into his 60s.
background:
  cultural: Roberto was raised in a Mexican‑American household in the Inland Empire, where Spanish was spoken at home and family traditions such as Día de los Muertos and fiestas patrias were central to
    his upbringing. The blend of Mexican heritage and Southern California's multicultural environment shaped his values of community, hospitality, and respect for diversity. He maintains strong ties to
    his extended family and often participates in church gatherings and local Mexican community organizations. This cultural foundation informs his appreciation for vibrant colors, storytelling through
    art, and the importance of personal connection in both his professional and social life.
attributes:
