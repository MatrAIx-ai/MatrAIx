  career_goals: Looking ahead, Roberto aims to transition from full‑time supervision to a mentorship and consulting role, sharing his wealth of retail knowledge with emerging store managers in the region.
    He hopes to launch a small boutique that showcases Mexican‑handcrafted art and artisanal products, blending his passion for culture and visual design with his business expertise. Additionally, he plans
    to obtain a certification in retail analytics to better advise businesses on data‑driven decision‑making, and he aspires to volunteer as a trainer for a local nonprofit that prepares at‑risk youth for
    careers in retail and hospitality.
