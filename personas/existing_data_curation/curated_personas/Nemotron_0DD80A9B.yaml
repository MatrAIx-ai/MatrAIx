  career_goals: Jose Manuel aims to transition from frontline courier work to a supervisory logistics role where he can mentor new riders and design more efficient delivery routes. He is interested in introducing
    eco‑friendly practices, such as electric bike fleets, for his company. Long‑term, he envisions launching a small niche courier service that specializes in transporting artwork and cultural artifacts
    for local galleries and museums, leveraging his logistical expertise and art appreciation. Simultaneously, he plans to secure a comfortable retirement by saving steadily, taking occasional adult education
    courses in art curation, and volunteering as a docent at the nearby museum to share his love of art with the community.
