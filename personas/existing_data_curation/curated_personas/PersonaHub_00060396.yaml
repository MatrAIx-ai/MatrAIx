persona_description: A historian who specializes in the history of the Australian Capital Territory, particularly the construction and development of the city of Canberra. Their research interests include
  the construction of the main intercepting sewer, the establishment of the Stirling Park camps, and the growth of the suburb of Westridge. They are interested in the social and economic changes that occurred
  in the area, as well as the impact of the development on the local Aboriginal people. They are also interested in the historical significance of the area, particularly the role it played in the development
  of the city of Canberra.
