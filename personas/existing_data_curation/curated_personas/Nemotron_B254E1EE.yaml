  hobbies: '[''Gardening (balcony and community)'', ''Bird‑watching in Prospect Park'', ''Reading historical fiction'', ''Knitting and crocheting'', ''Cooking traditional dishes'', ''Walking with her dog'',
    ''Senior‑center social events'', ''Jazz listening at local venues'', ''Gentle yoga for seniors'']'
  career_goals: Although retired, Mercedes aims to deepen her involvement in community service. She hopes to co‑lead a weekly tea‑circle for seniors at the local senior center, mentor younger volunteers
    in caregiving skills, and help establish a small community garden in her neighborhood. She also aspires to compile a memoir of her Brooklyn childhood, improve her emotional resilience through mindfulness
    classes, and maintain her physical health by staying active in low‑impact exercise groups.
