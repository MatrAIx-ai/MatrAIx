personas:
  professional: Manfredo Bazan is a budding automotive enthusiast who spends countless evenings assembling and painting plastic model kits and reading technical manuals, channeling their love of routine,
    practical problem‑solving, and solitary focus into a nascent ambition to become a certified mechanic.
  sports: Manfredo Bazan is a low‑key sports fan who follows the Los Angeles Dodgers and Lakers from home, enjoys occasional casual basketball games at the neighborhood park, but primarily expresses their
    fitness through weekend hikes on Kern County trails as a member of a local youth hiking group.
  arts: Manfredo Bazan is a quiet creative who practices acoustic guitar by playing finger‑style arrangements of John Mayer and Ed Sheeran songs, meticulously paints Revell model kits, and sketches car
    designs in a well‑used sketchbook whenever inspiration strikes.
  travel: Manfredo Bazan is an introverted explorer who prefers quiet road trips to natural destinations like Yosemite and Sequoia National Parks, plans itineraries using free online maps, enjoys camping
    under the stars with a small group of close friends, and dreams of backpacking the Pacific Crest Trail after graduation.
  culinary: Manfredo Bazan is a kitchen‑assistant who helps grandparents prepare traditional family meals such as slow‑cooked pork stew with garlic and cumin, herb‑infused rice pilaf, and fresh salsa, relishes
    the tactile process of chopping and seasoning, and occasionally experiments with adding new spice blends to the recipes.
  core: Manfredo Bazan is a solitary 13‑year‑old who blends a love for routine‑driven hobbies—gaming, model building, and guitar—with a gentle disposition, occasional disorganization, and a steady, low‑key
    approach to life’s challenges.
background:
  cultural: Manfredo is a second‑generation Puerto Rican growing up in Bakersfield, California. At home, Spanish is spoken, and family gatherings revolve around the island’s culinary traditions, such as
    arroz con pollo, mofongo, and pasteles. He celebrates cultural holidays like Día de San Juan and listens to salsa and plena music during family road trips. The close‑knit Puerto Rican community in the
    greater Bakersfield area provides him with a sense of identity, while he also navigates broader Californian culture through school and local activities. He values the pragmatic work ethic and close
    family bonds common in his heritage, which influence his desire for stable routines and helping others.
