    kit building and painting", "Solo nature walks/hiking"]'
  career_goals: Manfredo hopes to finish high school and then enroll in a community‑college program that blends his love for practical, hands‑on work with his technical curiosity. He is interested in pursuing
    an associate degree in culinary arts so he can master Puerto Rican and broader American cooking techniques, eventually opening a modest family‑run kitchen that serves traditional dishes on a regular
    schedule. At the same time, he is keeping an eye on entry‑level IT support roles, because routine troubleshooting and solitary problem‑solving appeal to his personality. He envisions a stable, predictable
    career that lets him support his family and maintain a calm, harmonious work environment.
