persona_description: A biologist who is interested in the study of evolution and natural selection, particularly in the context of the theory of natural selection proposed by Charles Darwin. This persona
  is likely to have a deep understanding of the key concepts and theories related to evolution, such as the theory of natural selection, the modern synthesis of major theory, and the synthesis of evolutionary
  theory from the limbs of the field of biology. They may have expertise in areas such as paleontology, ecology, morphology, botany, systematics, cytology, genetics, and the use of mathematical analyses
  to understand the relationships between genetic combinations and inbreeding in small isolated populations. They may also have a strong interest in the history of evolution and the debates surrounding
  the theory of evolution, such as the work of August Weismann and Alfred Russel Wallace.
