  career_goals: 'Carol often talks about what she wants to be when she grows up. She dreams of becoming an elementary school teacher because she enjoys explaining things to her friends and seeing them learn.
    She is also fascinated by animals and has expressed a wish to be a veterinarian, combining her love for caring for pets with her curiosity about how living things work. Her ambition reflects a blend
    of curiosity and practicality: she wants a career that lets her help others while using her interest in science.'
