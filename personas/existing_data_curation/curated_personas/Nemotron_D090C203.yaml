personas:
  professional: A budding community storyteller and future environmental scientist, Carol Spear channels her curiosity and practical organization, love for group activities, and assertive compassion into
    leading her school’s recycling club and choreographing neighborhood clean‑up games.
  sports: Carol Spear laces up for after‑school soccer with the Little Rock Rangers U‑8 team, idolizes the Arkansas Razorbacks baseball power hitters, and eagerly joins the community park’s pick‑up basketball
    games when the season switches to fall.
  arts: Carol Spear twirls in her weekly jazz dance class to the swing of Louis Armstrong, belts out high notes in the school choir while copying Eric Carle’s bold brushstrokes into her sketchbooks, and
    curls up with Mo Willems picture books that inspire her fantasy drawings of forest creatures.
  travel: Carol Spear loves short family road trips to Hot Springs National Park’s misty trails and annual visits to the nearby state fair, keeps a scrapbook of glossy postcards from the Grand Canyon and
    Disney World, and dreams of one day riding the teacups with her cousins on a big‑city vacation.
  culinary: Carol Spear delights in mixing batter for blueberry pancakes on Saturday mornings, sprinkling chopped pecans into her grandmother’s famed pecan pie, and adding an extra drizzle of honey to her
    mac and cheese, all while proudly serving sweet tea at family gatherings.
  core: Carol Spear is a sociable, curiosity‑driven 7‑year‑old who balances boundless energy with practical organization, leads playground games, obsessively collects backyard treasures, and occasionally
    forgets to rinse her crayons before bedtime.
background:
  cultural: Carol lives in Little Rock, Arkansas, a community that blends Southern hospitality with a strong sense of local pride. Her family participates in typical Arkansas traditions such as weekend
    trips to nearby parks, attending community fairs, and celebrating holidays with gatherings that feature foods like fried chicken, sweet tea, and pecan pie. She attends a public elementary school where
    she learns about local history, including the Little Rock Nine, fostering an appreciation for community narratives. The neighborhood emphasizes neighborly interaction, outdoor play, and involvement
    in school and community events, shaping Carol’s sociable and cooperative nature.
