  career_goals: Although still young, Lydia often talks about becoming an explorer who discovers new things in the woods and a helper who fixes things for others. She imagines a future where she can share
    stories with younger children, maybe as a teacher, and also dreams of working with animals, hinting at a future wildlife biologist or veterinarian role. Her goals blend her natural curiosity with a
    practical desire to be useful and to excel at the activities she loves.
