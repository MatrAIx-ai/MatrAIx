personas:
  professional: Carlos Mena, an 18‑year‑old aspiring multimedia artist, fuses digital illustration, graphic design, and beginner Python scripting into concept sketches and interactive art pieces, letting
    their vivid imagination and preference for solitude shape a disciplined yet flexible creative workflow.
  sports: Carlos Mena, a dedicated hiker who climbs the Sierra de Cayey peaks every weekend with the local Trailblazers Club, follows the Cangrejeros de Santurce baseball team during the summer league,
    and occasionally joins a neighborhood basketball pick‑up game at the community center, viewing fitness as a meditative extension of their love for nature.
  arts: Carlos Mena, who collects vintage comic books and finds inspiration in the works of Moebius, Hayao Miyazaki, and the atmospheric electronic tracks of ODESZA and Aphex Twin, spends evenings sketching
    surreal scenes while listening to lo‑fi beats, and regularly visits the town’s cultural center for indie art exhibitions.
  travel: Carlos Mena, who prefers self‑guided road trips over group tours, has explored Old San Juan’s cobblestone alleys, trekked the El Yunque rainforest, and dreams of traveling to Kyoto to study traditional
    Japanese illustration, while eyeing a backpacking adventure through the Scottish Highlands on a student‑exchange budget.
  culinary: Carlos Mena, who cooks simple yet flavorful meals such as arroz con gandules seasoned with cilantro, adds a splash of lime to mango smoothies, and enjoys charcoal‑grilled vegetable kebabs, while
    indulging in artisanal coffee from a local roastery and occasionally treating themselves to a slice of pastel de leche.
  core: Carlos Mena, a solitary 18‑year‑old visual storyteller, channels boundless imagination into sketchbooks and code, hoards vintage comics, and can’t resist a late‑night coffee binge before sprinting
    to the next trail.
background:
  cultural: Carlos grew up in Juana Díaz, a municipality in the Ponce region known for its agricultural roots and vibrant community traditions. As a Puerto Rican, he was immersed in a culture that values
    music, storytelling, and resilience. Family gatherings often featured bomba and plena rhythms, while local festivals celebrated the island’s history and folklore. These cultural experiences have deeply
    influenced his artistic sensibilities, prompting him to incorporate Caribbean motifs, tropical color palettes, and narratives drawn from Puerto Rican mythology into his work. At the same time, his preference
    for solitude led him to explore these traditions through personal reflection rather than overt social participation.
