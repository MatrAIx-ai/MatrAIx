  career_goals: Carlos aims to attend a university program in visual arts or multimedia design, focusing on concept art and illustration for video games or animation. He dreams of creating a body of work
    that blends contemporary aesthetics with Puerto Rican folklore, eventually publishing his own graphic novel series. In the long term, he envisions becoming a freelance illustrator and art director,
    collaborating with studios worldwide while also mentoring younger artists in his hometown.
