personas:
  professional: Sabrina Kearney, a retired community arts facilitator, they channel their lifelong curiosity and disciplined organization into leading weekly watercolor workshops at the local senior center,
    curating a traveling exhibit of seniors' artwork, and meticulously budgeting supplies while fiercely critiquing each piece they mentor.
  sports: Sabrina Kearney, a nature‑oriented senior, they participate in the Lowcountry Senior Walking Club’s weekly sunrise walks, avidly follow the Atlanta Braves and the New York Knicks, and engage in
    gentle birdwatching hikes at nearby marshes, preferring low‑impact exercise that complements their gardening and painting routine.
  arts: Sabrina Kearney, a devoted watercolorist and crafts enthusiast, they draw inspiration from Winslow Homer's coastal scenes and Georgia O’Keeffe’s floral abstractions, knit patterns reminiscent of
    Martha Stewart’s designs, and delight in the storytelling songs of The Chicks, often referencing these influences while leading art workshops and curating a mini gallery of local seniors’ works.
  travel: Sabrina Kearney, an intentional traveler, they meticulously plan trips to major art museums such as the Metropolitan Museum of Art in New York, the Getty Center in Los Angeles, and the Smithsonian
    American Art Museum in Washington, D.C., favoring guided senior tours that balance structured itineraries with ample rest periods, while dreaming of a weekend pilgrimage to the historic Charleston district
    to trace familial roots.
  culinary: Sabrina Kearney, an experimental Southern cook, they blend fresh thyme, rosemary, and basil harvested from their herb garden into classic dishes like shrimp and grits, low‑country gumbo, and
    peach‑infused pecan pie, and despite their occasional habit of over‑salting the gumbo, they relish perfecting each recipe while sharing meals at senior center potlucks.
  core: Sabrina Kearney, a fiercely curious 79‑year‑old watercolorist, genealogist, and herb gardener, they blend solitary creativity with community mentorship, balancing meticulous budgeting and health
    vigilance with occasional splurges on art supplies and a competitive streak that drives their pursuit of new artistic horizons.
background:
  cultural: Sabrina grew up in a mid‑20th‑century white, Southern family in South Carolina, shaped by Baptist church traditions, Southern hospitality, and a deep respect for local customs and history. The
    rhythms of rural life, community gatherings at the church, and a strong emphasis on self‑reliance informed her values, while her curiosity led her to explore art and ideas beyond her hometown. This
    blend of Southern heritage and a lifelong love of learning colors her worldview and daily practices.
attributes:
  skills: '["watercolor painting", "genealogy research", "organic herb gardening", "event planning for small gatherings", "budget management", "knitting and crocheting", "basic computer and internet navigation",
