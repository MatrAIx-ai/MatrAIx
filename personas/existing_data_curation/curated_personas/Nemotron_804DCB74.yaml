  hobbies: '["watercolor painting", "herb gardening", "reading art history", "birdwatching", "knitting", "genealogy research", "cooking Southern cuisine", "volunteering at the local senior center", "attending
    small art exhibitions", "writing memoirs"]'
  career_goals: Although retired, Sabrina aims to continue expanding her artistic repertoire, publish a memoir of her life in the Lowcountry, and create a digital archive of her family genealogy. She aspires
    to mentor younger artists in her community, curate a small traveling exhibit of local seniors' artworks, and travel to at least three major art museums in the U.S. over the next five years.
