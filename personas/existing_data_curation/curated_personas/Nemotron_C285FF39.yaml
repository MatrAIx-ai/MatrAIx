  career_goals: Although retired from full‑time work, Justin aims to stay active and purposeful. He wishes to expand his woodworking hobby into a small side venture selling handcrafted pieces at the local
    farmers’ market, while also teaching woodworking basics to seniors through a community workshop. He aspires to become a regular volunteer mentor at the senior center, helping new members navigate the
    programs, and he hopes to complete a personal memoir that chronicles his life in the timber towns of Snohomish County. Additionally, he is focused on managing his anxiety through regular participation
    in a local mindfulness group and maintaining a routine that balances social engagement with quiet time in nature.
