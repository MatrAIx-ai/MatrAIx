personas:
  professional: Justin Keyes is a retired construction foreman turned senior community craftsman, whose decades‑long expertise in carpentry, framing, and basic trades now fuels a modest side hustle selling
    hand‑crafted wooden stools and bowls at the Snohomish County farmers’ market; they also lead a beginner woodworking workshop for fellow retirees, leveraging their practical, structured approach while
    navigating a tendency to drift into flexible, unplanned sessions.
  sports: Justin Keyes is a dedicated member of the Snohomish County Senior Bowling League, where they compete every Thursday night and revel in the camaraderie; they also enjoy weekly bridge and chess
    meet‑ups, fish the Snohomish River with a group of friends, hike the Cascade foothills in the summer, and cheer for the Seattle Seahawks and Seattle Mariners while occasionally attending a local senior
    softball game for fun.
  arts: Justin Keyes finds creative fulfillment in community theater, both as an audience member and as a set‑builder, helping construct backdrops for productions like ‘Our Town’ and ‘The Music Man’; they
    enjoy listening to folk legends such as Bob Dylan and contemporary acts like Mumford & Sons, and they often quote lines from classic films starring Tom Hanks during informal gatherings.
  travel: Justin Keyes prefers low‑key, nature‑focused trips, often planning weekend getaways to nearby Leavenworth for its Bavarian charm or the coastal town of Port Townsend for its historic waterfront;
    they dream of a longer cruise along the Inside Passage to Victoria, but usually limit travel to short drives due to a cautious planning style and a modest travel budget.
  culinary: Justin Keyes loves farm‑to‑table cooking, often tossing fresh garden tomatoes, heirloom carrots, and basil into a rustic bruschetta, grilling locally sourced salmon with a glaze of honey and
    rosemary, and finishing meals with a slice of homemade sourdough; they are comfortable with basic cooking techniques but occasionally over‑season dishes while experimenting with new spice blends.
  core: Justin Keyes blends a hands‑on, pragmatic work ethic with a love for community‑driven hobbies, balancing structured woodworking projects and social games while navigating anxiety through mindfulness
    and occasional impulsive spending sprees.
background:
  cultural: Justin grew up in a blue‑collar, middle‑class family in the timber‑rich towns of Snohomish County. His grandparents were immigrants from England and Germany who settled in the Pacific Northwest
    during the early 20th century to work in the lumber industry. Raised in a Protestant (Methodist) household, he was taught the values of hard work, self‑reliance, and community service. The region’s
    strong connection to nature, outdoor recreation, and local volunteerism shaped his worldview. Though he identifies as white American, he embraces the multicultural fabric of the Pacific Northwest, often
    participating in neighborhood festivals that celebrate the area’s diverse heritage.
