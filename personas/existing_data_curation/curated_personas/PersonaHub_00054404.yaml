persona_description: A physics graduate student who is interested in studying the effects of fluid flow on flexible objects, particularly flags, and how it relates to the phenomenon of schooling fish and
  flocking birds. He is conducting research at the intersection of physics and biology, and is using simple tabletop experiments to investigate the behavior of flexible objects in fluid flow. He is using
  optical interferometry to measure the fluid flow around the flags and is using mirrors to magnify and trace the movements of the flags. He is seeking to understand the mechanisms behind the behavior of
  schooling fish and flocking birds and is using his research to shed light on this area of study.
