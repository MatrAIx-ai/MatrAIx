persona_description: A historian who specializes in the study of Japanese militarism in the 1930s, particularly the factors that led to the rise of militarism and the weaknesses of the party government.
  His research interests include the political, social, and economic factors that contributed to the rise of militarism, as well as the effectiveness of the party government in dealing with social problems.
  He is particularly interested in the role of the Japanese military and its influence on Japanese society.
