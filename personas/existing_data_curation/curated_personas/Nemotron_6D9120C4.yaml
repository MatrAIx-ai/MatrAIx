personas:
  professional: Latasha Sessoms, a three‑year‑old who imagines herself as a meticulous little architect, spends each day arranging building blocks into precise, symmetrical structures, follows a hand‑drawn
    schedule for play and snack times, and insists on quiet, solitary focus while critiquing any crooked tower with a frown.
  sports: Latasha Sessoms, a three‑year‑old who splashes in the Panama City Beach community pool, joins the tiny ‘Kids Soccer Explorers’ club that practices on Saturday mornings, and eagerly cheers for
    the Tampa Bay Rays during family TV nights while occasionally waving a miniature Buccaneers flag during football season.
  arts: Latasha Sessoms, a three‑year‑old who hums the lively gospel hymn ‘Rise Up’ sung by her church choir and the children’s classic ‘Baby Beluga’ by Raffi while drawing bright seashell pictures with
    crayons, and loves to imitate the dance steps of Bluey from the popular cartoon series.
  travel: Latasha Sessoms, a three‑year‑old who prefers short, well‑planned road trips to familiar sand‑filled shores like Destin and Panama City Beach, enjoys a brief stay at the family‑friendly resort
    in Clearwater, and dreams of a future visit to Walt Disney World in Orlando, all while insisting on a strict bedtime routine even on vacation.
  culinary: Latasha Sessoms, a three‑year‑old who delights in flaky fish sticks, buttery shrimp nuggets seasoned with a pinch of lemon, creamy mac and cheese, and sweet potato fries, but stubbornly refuses
    green beans unless they’re cut into dinosaur shapes, and loves to dip everything in a small bowl of ranch dressing.
  core: Latasha Sessoms, a three‑year‑old with a love for orderly play, a guarded piggy bank, and a quiet corner where she watches the waves, quietly worries about tiny mishaps while secretly mastering
    the art of perfect block towers.
background:
  cultural: Latasha is a Black child raised in Panama City, Florida, within a close‑knit African‑American family. Her household celebrates cultural traditions such as church gatherings, gospel music, and
    holidays like Juneteenth and Kwanzaa. The coastal Gulf Coast setting introduces her to seafood cuisine and outdoor activities, while her family’s emphasis on storytelling and community reflects the
    broader Black heritage of Bay County.
attributes:
  skills: '["Letter recognition (A-J)", "Counting to 10", "Sorting objects by color, shape, and size", "Stacking block towers", "Drawing basic geometric shapes", "Following and sequencing daily routines"]'
  hobbies: '["Building block towers (Mega Bloks)", "Simple picture puzzles", "Sorting games (color/shape)", "Quiet drawing of geometric shapes", "Listening to classical lullabies", "Watching nature documentaries"]'
  career_goals: Although still very young, Latasha often talks about wanting to work in a calm, organized setting when she grows up. She imagines herself as a librarian or an architect—someone who arranges
    books or designs buildings so that every item has its proper place. Her long‑term ambition is to create orderly environments that allow for quiet focus, reflecting her love of structure and solitude.
