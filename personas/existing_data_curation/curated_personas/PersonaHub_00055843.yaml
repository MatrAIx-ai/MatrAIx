persona_description: A historian and theologian who specializes in the study of early Christian communities and their practices, particularly the role of the church in the formation of doctrine and governance.
  They are familiar with the Congregational form of church government and its principles, and have a deep understanding of the independence of the apostolic churches as presented in the New Testament. They
  have a keen interest in the relationship between the church and the individual believer, and how the actions of the church impact the lives of its members. They are also knowledgeable about the differences
  between various forms of church government, including the Baptist, Pedobaptist, and Congregationalist traditions, and how these differ in terms of the finality of church action and the independence of
  the apostolic churches.
