personas:
  professional: Donita Sheehan is an aspiring coder and junior science enthusiast who channels her curiosity and methodical nature into developing Scratch games, leading small experiments in her school
    science club, and practicing piano daily, balancing creative imagination with disciplined practice.
  sports: Donita Sheehan enjoys weekend hikes in Ohiopyle State Park, participates in her middle school's junior cross-country team, and rallies with friends to watch the Pittsburgh Steelers and Pittsburgh
    Penguins, preferring low-impact endurance activities that suit her reflective temperament.
  arts: Donita Sheehan immerses herself in the piano works of Ludwig van Beethoven, delves into the sci-fi mysteries of Isaac Asimov and Agatha Christie, and relaxes to the folk melodies of Alison Krauss,
    weaving classic and contemporary influences into her artistic identity.
  travel: Donita Sheehan favors modest road trips to nearby state parks like Ohiopyle and family outings to the historic Amish country of Lancaster, while dreaming of a future backpacking adventure to the
    Grand Canyon, carefully budgeting each itinerary and capturing nature photos with her phone.
  culinary: Donita Sheehan loves baking chocolate chip cookies and perfecting apple crumble with fresh orchard apples, often measuring ingredients precisely—such as 1 1/4 cups of flour and a pinch of cinnamon—and
    enjoys helping prepare homemade chicken pot pie for family gatherings.
  core: Donita Sheehan is a diligent, curiosity-driven 13-year-old who blends disciplined piano practice, methodical coding, and cautious budgeting, yet sometimes lets worry dominate her thoughts and forgets
    to take her vitamins.
background:
  cultural: Donita was raised in Venetia, a small, close‑knit community in Washington County, Pennsylvania. Her family’s roots trace back to German and Irish immigrants who settled the region in the 19th century,
    and they maintain a modest, community‑oriented lifestyle. Weekly attendance at the local Methodist church and participation in events such as the county fair, apple‑picking season, and community picnics
    are part of her upbringing. Traditional regional foods like chicken pot pie, apple crumble, and homemade biscuits are common at family gatherings. The cultural atmosphere emphasizes self‑reliance, respect
    for the natural landscape, and a quiet, diligent work ethic, all of which shape Donita’s values and daily routines.
