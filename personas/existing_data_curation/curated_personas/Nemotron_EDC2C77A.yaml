  career_goals: Donita dreams of turning her love for animals and science into a career as a veterinarian serving the rural community that raised her. She plans to enroll in a high‑school program with strong
    STEM courses, join the science‑fair team, and attend summer pre‑college programs in biology. Volunteering at the local animal shelter is a near‑term goal that will give her hands‑on experience. Long‑term,
    she aspires to earn a degree in veterinary medicine, specialize in small‑animal care, and eventually open a practice that combines compassionate treatment with meticulous record‑keeping.
