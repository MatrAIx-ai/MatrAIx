persona_description: A historian who specializes in the study of American history and the American Revolution, particularly focusing on the mood and atmosphere of the founders and the ratifiers of the Constitution.
  They are well-versed in the Whig tradition and the political memory of the founders, and they are interested in understanding the collective political memory and the potential responses that this memory
  brought about. They are also interested in the concept of ideology and its impact on the founders and the ratifiers of the Constitution.
