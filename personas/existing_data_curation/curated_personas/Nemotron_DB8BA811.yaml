  hobbies: '[''Watercolor painting'',''Visiting art galleries and murals'',''Reading (science fiction, technology non-fiction, Mexican folklore)'',''Cooking Mexican and fusion cuisine'',''Hiking and birdwatching
    in the Rio Grande Valley'',''Yoga and meditation'',''Volunteer tutoring (English/Spanish)'',''Listening to diverse music (regional Mexican, indie, world)'',''DIY home decor projects'']'
  career_goals: Johanka aims to advance into senior operations leadership, targeting roles such as Operations Manager or Director of Process Excellence within the next five years. She plans to earn PMP
    and Six Sigma Black Belt certifications, pursue an MBA focused on strategic management, and lead digital transformation projects that embed AI-driven analytics and sustainable practices into the company's
    core processes. Ultimately, she aspires to shape an innovative, data-centric culture that balances operational efficiency with employee well‑being.
