  hobbies: '[''Youth soccer'', ''Piano lessons'', ''Reading mystery and adventure books'', ''Puerto Rican dance (salsa, bomba)'', ''Volunteering at the library summer reading program'']'
  career_goals: Patricia aspires to a career that blends structure, creativity, and service. She is fascinated by engineering and hopes to become a civil engineer who designs safe, community‑focused spaces
    like parks and playgrounds. She also loves teaching and envisions someday becoming a bilingual elementary school teacher to help Spanish‑speaking students succeed. In the short term, she aims to excel
    in math and science, join the school robotics club, and maintain high grades to qualify for STEM scholarships.
