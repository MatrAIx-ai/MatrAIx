personas:
  professional: Patricia Martinez is an organized 11‑year‑old student who channels her love of structure into academic projects, leads a library reading buddy program, and consistently balances soccer practice
    with piano lesson schedules.
  sports: Patricia Martinez plays forward for the Montgomery Village Youth Soccer Association, idolizes DC United’s striker, follows the Washington Capitals for off‑season inspiration, and approaches training
    with disciplined drills and a strict weekly schedule.
  arts: Patricia Martinez is a budding pianist mastering Beethoven’s Für Elise and Chopin’s Prelude in E minor, participates in weekly salsa and bomba dance classes, and devours mystery novels like “The
    Westing Game” and Spanish‑language “El misterio del bosque,” weaving music, dance, and literature into her creative identity.
  travel: Patricia Martinez loves family trips that blend structured itineraries with cultural immersion, having visited the historic streets of Old San Juan, toured Washington, D.C.’s monuments, and dreaming
    of a future visit to the Caribbean island’s beaches, all while keeping a travel journal she updates after each adventure.
  culinary: Patricia Martinez delights in helping her family prepare arroz con gandules, pasteles, and caramel flan, prefers the sweet taste of mango smoothies, and, despite a generally adventurous palate,
    occasionally refuses Brussels sprouts, reflecting a balanced but selective food enthusiasm.
  core: Patricia Martinez is a methodical 11‑year‑old who thrives on structured routines in soccer and piano, embraces vibrant cultural traditions, and occasionally procrastinates on homework in favor of
    late‑night comic books.
background:
  cultural: Patricia’s family maintains vibrant Puerto Rican traditions while living in Montgomery Village, Maryland. Spanish is spoken at home alongside English, and meals often include arroz con gandules,
    pasteles, and flan. She celebrates Día de los Reyes (Three Kings Day) and participates in local Latino festivals that showcase bomba and plena music. The hybrid environment has exposed her to both island
    customs and American holidays like Thanksgiving and Fourth of July, giving her a bicultural perspective that she shares with friends at school.
attributes:
  skills: '[''Organized note‑taking'', ''Use of daily planners'', ''Math problem solving'', ''Bilingual reading comprehension (English/Spanish)'', ''Basic coding with Scratch'', ''Presentation creation
