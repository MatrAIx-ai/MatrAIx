persona_description: A biologist or epidemiologist who studies the dynamics of infectious diseases in wildlife populations, particularly in the context of seasonal patterns and the impact of human activities
  on wildlife health. They are interested in exploring the relationship between the timing of epidemics and the size of the infected population, as well as the potential relevance of these patterns to human
  populations. They are likely to be interested in the work of M. Begon, S. Telfer, M.J. Smith, S. Burthe, S. Paterson, and X. Lambin, who have contributed to the field of wildlife diseases and the study
  of infectious diseases in wildlife populations.
