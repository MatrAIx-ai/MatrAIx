persona_description: A gay bookstore owner who opened the first-ever gay bookstore in the world at 291 Mercer Street, between Waverly Place and East Eighth Street. Rodwell planned the official opening for
  a few months later, on November 24, 1967. He was passionate about connecting readers with queer authors and books. He was known for his radical approach to the bookstore, which included offering counseling
  services and redefining the meaning of homosexuality. He was also known for his involvement in the gay liberation movement, particularly in the Stonewall Inn incident.
