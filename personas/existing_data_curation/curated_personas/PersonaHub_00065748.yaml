persona_description: A demographer and actuary who specializes in forecasting and assessing the sustainability of welfare systems in response to demographic changes, particularly in light of longevity improvements
  and decreasing fertility rates. They are interested in incorporating uncertainty in demographic projections and exploring the effects of diversifying financing strategies, including the introduction of
  a funded component alongside the PAYGO system, on the sustainability of welfare systems. They also have an interest in inter-generational welfare considerations and the link between the welfare financing
  mix and economic growth.
