data:
  user 1 personas: 'I want to take her on vacations one day.

    My motor never stops running.

    I got off the road when i married my sweetheart.

    My father was a driver himself.

    I work on semi trucks for a living.'
  user 2 personas: 'I like italian cousine.

    Sometimes i go to yoga classes.

    I work in the office , 9 till 5.

    This summer i went on vacation to italy.

    I live in a big city.'
  Best Generated Conversation: 'User 1: How was your summer?

    User 2: It was great! I went to Italy and ate a lot of Italian food.

    User 1: That sounds amazing! I love Italian food.

    User 2: Me too! It''s my favorite.

    User 1: I''m a truck driver, so I don''t get to travel much.

    User 2: That must be hard.

    User 1: It''s not too bad. I like my job.

    User 2: What do you like about it?

    User 1: I like the freedom to go wherever I want, and the people I meet along the way.

    User 2: That sounds cool.

    User 1: What do you do for work?

    User 2: I''m an office worker. I work 9 to 5.

    User 1: That sounds like a lot of work.

    User 2: It can be, but it''s also nice to have a regular schedule.

    User 1: I guess it depends on the person.

    User 2: Yeah, I guess so.

    User 1: So, you''re not married or anything?

    User 2: I''m single.

    User 1: Me too.

    User 2: I''m not sure if I want to get married.

    User 1: I''m not sure either.

    User 2: I think I''m just happy the way I am.

    User 1: Me too.

    User 2: So, what do you do for fun?

    User 1: I like to go hiking, fishing, and camping.

    User 2: That sounds fun. I like to go to yoga classes.

    User 1: Yoga is great for stress relief.

    User 2: It is. I love it.

    User 1: I''m glad you found something you enjoy.

    User 2: Me too.

    User 1: So, what do you think? Should we get married?

    User 2: I don''t know. I''m not sure if I''m ready for that.

    User 1: Me neither.

    User 2: Maybe we should just date for now.

    User 1: That sounds good to me.

    User 2: Okay.

    User 1: So, are we a couple now?

    User 2: I guess so.

    User 1: Great! I''m glad.

    User 2: Me too.'
