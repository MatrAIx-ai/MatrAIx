  hobbies: '[''Gardening'', ''Knitting'', ''Crocheting'', ''Reading historical fiction'', ''Local history research'', ''Walking'', ''Birdwatching'', ''Canning and preserving'', ''Church participation'',
    ''Volunteer work'']'
  career_goals: Although retired, Angela aims to remain self‑sufficient and socially connected. She plans to complete a detailed family‑history manuscript that will be shared with her grandchildren, preserving
    her lineage for future generations. She aspires to expand the community garden she helped start, turning it into a teaching space for younger volunteers interested in sustainable gardening. Angela also
    hopes to compile a small cookbook of her favorite traditional recipes, blending her culinary skills with her love of local heritage, and to stay active in her church’s outreach programs, ensuring she
    can continue contributing her organizational talents.
