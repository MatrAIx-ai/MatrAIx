personas:
  professional: Adrianna Blanton, an 86-year-old retired civil and structural engineer, applies decades of bridge and municipal water-system design expertise to volunteer historic preservation projects
    and mentors junior volunteers with a precise, schedule-driven approach.
  sports: Adrianna Blanton cheers for the Baltimore Orioles and the Ravens, participates in the Bowie senior walking club’s weekly strolls along the Inner Harbor, and keeps a gentle stretching routine to
    mitigate arthritis pain.
  arts: Adrianna Blanton finds solace in the Baltimore Symphony Orchestra’s performances of Mahler and in the detailed paintings of Winslow Homer, while their model-train hobby reflects a lifelong admiration
    for the artistry of early 20th-century railway engineering.
  travel: Adrianna Blanton prefers meticulously planned train trips to historic East-Coast cities such as Philadelphia, Washington D.C., and Gettysburg, balancing a love for on-site museum tours with the
    need for easy accessibility and a modest travel budget.
  culinary: Adrianna Blanton cultivates heirloom tomatoes and sweet corn in a raised garden bed, then prepares a signature roasted beet and goat-cheese salad and classic Maryland crab cakes, while occasionally
    indulging in nostalgia-filled comfort dishes like chicken-and-dumplings.
  core: Adrianna Blanton, an 86-year-old engineer-turned-historian, blends meticulous structure with a quiet curiosity, managing anxiety through routine while passionately preserving Baltimore’s past.
background:
  cultural: Adrianna was born and raised in Baltimore’s working‑class neighborhoods during the post‑World War II era, a period that shaped his values of hard work, community loyalty, and modest practicality.
    As a white American from the Mid‑Atlantic, he grew up with the city’s distinct cultural mix, enjoying local traditions such as crab feasts, Old Bay seasoning, and a deep appreciation for the Chesapeake
    Bay’s maritime heritage. He attended a Catholic parochial school, which instilled a sense of service that later manifested in his volunteer work. Throughout his life he has remained connected to Baltimore’s
    evolving social fabric, navigating the city’s demographic changes while preserving his own heritage through participation in neighborhood associations and local historical preservation groups.
