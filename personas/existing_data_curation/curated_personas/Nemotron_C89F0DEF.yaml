  career_goals: Adrianna’s primary ambition is to remain an active contributor to his community by applying his engineering knowledge to local historic preservation efforts and to mentor younger volunteers.
    He hopes to complete a memoir that captures the evolution of Baltimore’s infrastructure and his personal journey, thereby leaving a tangible legacy for future generations. Additionally, he aims to maintain
    his physical and mental well‑being through regular exercise, social engagement at the senior center, and by managing his anxiety through structured routines.
