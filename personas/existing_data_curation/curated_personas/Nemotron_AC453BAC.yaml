  career_goals: Although Nancy is only two, her caregivers nurture her natural curiosity and encourage a love of learning that will shape future ambitions. She is gently guided toward exploring artistic
    activities and storytelling, laying a foundation for potential interests in creative fields such as visual arts, music, or education. As she grows, her family hopes she will pursue opportunities that
    align with her curiosity—perhaps becoming a teacher, an artist, or a scientist—while maintaining the balance of structure and flexibility she already enjoys.
