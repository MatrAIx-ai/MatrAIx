persona_description: A public health official or a health care provider who is responsible for monitoring and preventing the spread of group A Streptococcus infections in schools and long term care facilities.
  They are knowledgeable about the symptoms, causes, and treatments of GAS infections and are familiar with the best practices for reducing the spread of the bacteria. They also have experience with the
  laboratory tests used to diagnose GAS infections and the appropriate antibiotic treatments. They are committed to providing accurate and timely information to the public and are dedicated to preventing
  the spread of infectious diseases.
