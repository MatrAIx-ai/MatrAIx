  hobbies: '[''Gardening'', ''Cooking Mexican dishes'', ''Playing acoustic guitar'', ''Cumbia and salsa dancing'', ''Senior aerobics'', ''Genealogy research'', ''Volunteer work at food bank'', ''Reading
    historical biographies'', ''Traveling to Mexico'', ''Community festival participation'']'
  career_goals: Although officially retired, Fabian aims to deepen his impact on the Belvidere community by leading senior wellness workshops, documenting and teaching traditional Mexican recipes to younger
    generations, and serving as a cultural liaison between the town’s Mexican-American families and local institutions. He also hopes to compile a family oral history project that preserves his heritage
    for future descendants and to volunteer as a bilingual mentor for high‑school students preparing for college.
