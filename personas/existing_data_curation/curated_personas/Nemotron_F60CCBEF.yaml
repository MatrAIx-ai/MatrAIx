  hobbies: '[''Watercolor painting'', ''Knitting and crochet'', ''Gardening (heirloom tomatoes, native wildflowers)'', ''Genealogy and local history research'', ''Attending museum exhibitions and theater'',
    ''Reading and book club participation'', ''Digital photography'', ''Volunteering at senior center'']'
  career_goals: Although retired, Ashley aims to deepen her impact on her community by establishing a small intergenerational art program at the Elizabethtown senior center, where seniors and teens collaborate
    on public murals. She wishes to master digital photography to document local heritage sites, eventually publishing a photo‑essay book. Ashley also plans to complete a memoir that weaves her family’s
    genealogy with the history of Hardin County, hoping to donate it to the public library. Her long‑term ambition is to leave a lasting cultural legacy that reflects her love for art, curiosity about the
    past, and commitment to nurturing others.
