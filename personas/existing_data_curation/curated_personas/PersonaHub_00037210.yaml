persona_description: A scientist who specializes in the study of ecological communities, particularly in predicting the loss of animal and plant diversity under future climate change. He/she has developed
  a mathematical model that takes into account the varying rates of migration and the different intensities of competition seen in ecological communities. The model predicts that animals and plants with
  small geographic ranges, specific habitat needs, and difficulty dispersing are more likely to go extinct under climate change. The scientist is interested in making climate change predictions of biodiversity
  more sophisticated and is currently collaborating with coauthors to do so.
