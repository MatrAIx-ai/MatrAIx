  hobbies: '[''Playing soccer'', ''Cooking Salvadoran dishes (pupusas, tamales)'', ''Attending community festivals'', ''Participating in trivia nights'', ''Listening to Latin music (salsa, reggaetón, boleros)'',
    ''Car restoration'', ''Reading business and leadership books'']'
  career_goals: Mario aims to move into a senior leadership role within the next three years, targeting a Sales Manager or Regional Director position where he can guide a team of agents, shape the agency’s
    multicultural advertising strategy, and secure larger, national accounts. He is especially motivated to develop a niche offering that serves Latino-focused brands, using his cultural insights to create
    campaigns that resonate with Hispanic consumers in Southern California. Long-term, he dreams of launching his own consulting boutique that advises advertisers on cross-cultural media buying and mentorship
    for aspiring sales professionals.
