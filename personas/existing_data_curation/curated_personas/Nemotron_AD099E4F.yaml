personas:
  professional: Mario Rodriguez is a senior advertising sales strategist with over two decades of experience in prospecting high‑value clients, negotiating media contracts, and crafting bilingual, data‑driven
    pitch decks; they blend a practical, results‑oriented mindset with a charismatic, conversational flair that makes them the go‑to spokesperson at industry events.
  sports: Mario Rodriguez is an avid weekend soccer player who joins the Inglewood United Club for Saturday matches and cheers passionately for the LA Galaxy and Real Madrid; they also follow the MLB season,
    favoring the Los Angeles Dodgers, and incorporate evening jogs into their routine to stay in shape.
  arts: Mario Rodriguez is a devoted fan of Latin rhythms and classic ballads, regularly streaming salsa legends like Celia Cruz, reggaetón hits from Bad Bunny, and bolero crooner Luis Miguel, and they
    often attend live performances at local venues such as the Walt Disney Concert Hall for orchestral interpretations of traditional songs.
  travel: Mario Rodriguez is a road‑trip enthusiast who frequently explores California’s coastal highways—favoring stops in Santa Barbara and Big Sur—and has taken longer vacations to Mexico City to sample
    street food, to the historic streets of Granada, Nicaragua, and dreams of attending the spring festival in Seville, Spain.
  culinary: Mario Rodriguez is a dedicated home chef who expertly prepares pupusas stuffed with cheese, refried beans, and loroco, alongside hand‑made tamales with pork and a hint of annatto, and they pride
    themselves on sourcing fresh cilantro, chilies, and masa from the local market to keep the flavors authentic.
  core: Mario Rodriguez is a results‑driven, gregarious professional who balances a love for structured planning with a spontaneous flair, often negotiating high‑stakes deals while juggling weekend soccer
    matches, car restoration projects, and a penchant for late‑night pupusa feasts.
background:
  cultural: Mario’s parents emigrated from El Salvador in the early 1980s, and he grew up in a bilingual household in Los Angeles County. He celebrates Salvadoran holidays such as Día de los Farolitos and
    holds close ties to the local Latino community, often volunteering at church events and cultural festivals. His fluency in Spanish and deep familiarity with Salvadoran customs inform both his personal
    life—through family gatherings, traditional cuisine, and music—and his professional perspective, allowing him to craft advertising messages that authentically resonate with Hispanic audiences.
attributes:
  skills: '[''Advertising sales strategy'', ''Client relationship management'', ''Negotiation and contract closing'', ''Media planning fundamentals'', ''Digital advertising platforms (Google Ads, Meta Ads)'',
