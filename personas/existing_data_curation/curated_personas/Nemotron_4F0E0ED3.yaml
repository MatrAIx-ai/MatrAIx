personas:
  professional: Starr Ponder, a three‑year‑old budding architect, channels their curiosity for patterns and love of color into constructing elaborate block cities, meticulously organizing each piece yet
    improvising on the fly, reliably cleaning up after play, favoring quiet solo sessions, and often challenging peers to see who can build the highest tower.
  sports: Starr Ponder, a three‑year‑old who thrills to the rhythm of toddler soccer drills at the local community center, follows the Seattle Mariners’ games on Saturday mornings, enjoys climbing the jungle
    gym alone, and frequently challenges fellow tots to see who can scurry across the foam floor the fastest.
  arts: Starr Ponder, a three‑year‑old with an insatiable love for finger‑painting rainbows and a fascination with Eric Carle’s collage books, spends quiet afternoons drawing detailed animals, humming the
    tunes of Disney’s “Frozen,” and curates a tiny gallery of their artwork on the refrigerator door.
  travel: Starr Ponder, a three‑year‑old who prefers the gentle hum of car rides to bustling airports, eagerly recalls a weekend trip to the city zoo’s butterfly exhibit and a sunny day at the nearby lake
    where they collected smooth stones, while dreaming of a future visit to the giant aquariums of Japan.
  culinary: Starr Ponder, a three‑year‑old who delights in twirling golden macaroni and cheese with a tiny plastic fork, reaches for freshly sliced strawberries, insists on buttering their own peanut‑butter
    sandwich, yet stubbornly refuses broccoli, often bargaining for extra cheese.
  core: Starr Ponder, a three‑year‑old curious explorer who thrives in solitary creativity, competitively builds block towers, saves every coin, battles eczema, and finds joy in crayons, mac‑and‑cheese,
    and quiet car rides.
background:
  cultural: 'Starr is an African‑American child growing up in New Orleans, a city renowned for its rich musical heritage, vibrant festivals, and strong community ties. Her family participates in local traditions
    such as Mardi Gras celebrations, attending church services where gospel music and choir singing are common, and visiting community gatherings that feature jazz and zydeco performances. The neighborhood’s
    cultural rhythm influences her daily life: the sounds of brass bands, the sight of colorful parade floats, and the flavors of Creole cuisine are woven into her experiences. Although she prefers solitary
    activities, the storytelling and musical traditions of her community provide a backdrop for her imaginative play, and she often incorporates the bright colors of Mardi Gras costumes and the soothing
    tones of church hymns into her drawings and music‑making.'
attributes:
  skills: '["color and shape identification","block stacking and tower building","crayon drawing with fine‑motor coordination","vocabulary of 300+ words and basic sentence formation","self‑care routines
    (tooth brushing, dressing)","rhythmic clapping and simple dancing to music","simple puzzle solving","sorting objects by size or color"]'
  hobbies: '["coloring and drawing","block building","simple wooden puzzles","listening to and clapping along with jazz music","watching pictures and videos of Mardi Gras and New Orleans culture","collecting
    shells and exploring textures in a sandbox","singing lullabies","reading picture books about animals and city life"]'
  career_goals: Although still very young, Starr often talks about being a painter or a dancer when she grows up. She loves the bright colors she sees in picture books and enjoys moving to the lively beats
    of New Orleans jazz, so she imagines herself creating big, bold paintings or performing on a stage. Her competitive streak appears when she wants to be the best at building the tallest block tower or
    drawing the most detailed picture, and she dreams of receiving applause for her work. In the future she hopes to share her art with others, perhaps by displaying her drawings at a community center or
    performing a small dance for her family.
