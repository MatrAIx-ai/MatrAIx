    "Exploring new construction technologies"]'
  career_goals: Kenneth aims to earn NCCCO certification for heavy equipment operators within the next two years, positioning himself for a foreman or crew‑lead role on larger projects. He is interested
    in learning about sustainable construction practices and hopes to integrate eco‑friendly methods into his daily work. In the longer term, he envisions starting a small equipment‑rental business that
    serves local contractors, allowing him to mentor new operators and create a stable, community‑focused enterprise. Achieving these goals would provide the professional growth he values while offering
    the financial steadiness that supports his emotional well‑being.
