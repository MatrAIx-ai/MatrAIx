personas:
  professional: Kayla Johnson, a 25‑year‑old server with an associate degree in business, blends a skeptical eye for customer cues with a hands‑on curiosity for service innovations, swiftly handling POS
    systems, upselling, and multitasking while they plot a path to shift supervision and a future farm‑to‑table café.
  sports: Kayla Johnson fuels their love of the outdoors by hiking with the Axtell Hiking Club in the Sandhills, paddling on Lake McConaughy on a whim, cheering for the Nebraska Cornhuskers football team
    on Saturdays, and they occasionally join the local Omaha Storm soccer league for recreation.
  arts: Kayla Johnson immerses themselves in creative escapes by reading Tana French mystery novels, listening to folk duo The Milk Carton Kids during kitchen experiments, attending live‑music nights featuring
    indie rocker Phoebe Bridgers at the town's brewery, and they often quote the wit of playwright Neil Labute while swapping strategies over Catan with friends.
  travel: Kayla Johnson favors spontaneous road trips to nearby attractions like the Badlands and Black Hills, while dreaming of a backpack adventure through Cinque Terre and a ski getaway in Whistler,
    often planning on a napkin at the farmer’s market rather than a rigid itinerary due to their flexible nature and limited student‑loan budget.
  culinary: Kayla Johnson experiments in the kitchen with Midwestern comfort staples, reinventing chicken‑and‑dumplings by adding smoked paprika and fresh rosemary from their herb garden, perfecting cornbread
    with jalapeños and honey, and crafting herb‑infused lemonade with lemongrass and basil, showcasing an intermediate cooking skill that blends tradition with unexpected spice, and they love sharing the
    dishes at community potlucks.
  core: Kayla Johnson is a curious yet pragmatic 25‑year‑old server whose love of spontaneous kitchen experiments, skeptical customer reading, and wandering hikes fuels a dream of a community‑focused farm‑to‑table
    café, even if they occasionally forget bill payments and procrastinate on organizing their schedule.
background:
  cultural: Kayla grew up in a tight‑knit, predominantly white community in rural Nebraska, with family roots in German and Scandinavian heritage. Her upbringing emphasized hard work, modesty, and community
    service, often centered around the local church and county fairs. These Midwestern values have shaped her practical outlook and hospitality instincts. While her environment is largely homogenous, she
    actively seeks diverse culinary influences through online cooking forums and her curiosity about new ideas. Her cultural background fosters a strong sense of neighborliness, a love for seasonal, farm‑fresh
    foods, and a respect for tradition balanced with an openness to innovate.
attributes:
  skills: '[''Customer service'', ''Active listening'', ''POS operation and cash handling'', ''Food safety and sanitation'', ''Multitasking in fast‑paced environment'', ''Adaptability and improvisation'',
    ''Basic beverage preparation'', ''Upselling and sales techniques'', ''Conflict resolution'', ''Reading customer cues'', ''Basic inventory tracking'', ''Business fundamentals from associate degree'']'
  hobbies: '[''Experimenting with recipes'', ''Visiting farmer’s markets'', ''Hiking in the Sandhills'', ''Reading mystery novels'', ''Playing strategy board games'', ''Gardening herbs'', ''Volunteering
    at the food bank'', ''Attending local fairs and live‑music events'']'
  career_goals: Kayla aims to move from server to shift supervisor within the next two years, leveraging her associate degree to enroll in a bachelor’s program in hospitality management. She plans to obtain
    a certified food‑safety manager credential and develop leadership experience by leading weekend catering events. Long‑term, she dreams of opening a farm‑to‑table café or small catering business in Axtell
    that highlights locally sourced produce and offers a welcoming community space. She also hopes to mentor new staff, using her practical experience to bridge curiosity‑driven ideas with reliable service
    standards.
