  career_goals: Jamie aims to become a senior systems architect who leads interdisciplinary teams at the intersection of technology and creative media. She aspires to design innovative platforms that integrate
    interactive art, AI, and immersive user experiences. Over the next five years, she plans to earn a certification in enterprise architecture (TOGAF) and to publish thought pieces on the synergy between
    humanities and technology. Ultimately, she hopes to mentor junior analysts and shape corporate culture toward more imaginative, user‑centric solutions.
