  career_goals: Betty aims to transition from senior systems analyst to a strategic role such as Lead Business Architect or Product Manager, focusing on creating technology solutions that enhance community
    well‑being, especially in education and healthcare. She plans to earn certifications like CBAP and PMP, lead interdisciplinary teams, mentor junior analysts, and eventually launch a nonprofit tech consultancy
    that bridges creative arts and digital innovation for underserved communities. Long‑term, she envisions shaping organizational culture around empathy, collaboration, and human‑centered design.
