personas:
  professional: Betty Arceneaux combines senior systems analysis expertise with a flair for storytelling, using UML, BPMN, SQL, Tableau and Power BI to translate complex business processes into user‑centric
    designs while guiding agile teams and mentoring junior analysts toward a future role as lead business architect; they are known for weaving narrative empathy into technical documentation.
  sports: Betty Arceneaux hikes Shenandoah’s ridges with the Blue Ridge Trek Club, supports the Washington Nationals and Capitals, jogs with the Richmond Runners on Saturdays, and joins a co‑ed softball
    league at the Alexandria rec center during summer; they view athletics as a social outlet and a way to recharge creative energy.
  arts: Betty Arceneaux paints acrylics inspired by Ai Weiwei, creates digital illustrations reminiscent of James Jean, writes speculative stories for Clarkesworld, and fuels their sociable energy by frequenting
    Virginia Repertory Theatre productions, live‑music shows featuring The Revivalists, and improv workshops at Richmond Improv; they often draw narrative threads from these experiences into their visual
    art.
  travel: Betty Arceneaux plans weekend getaways along the Blue Ridge Parkway, enjoys road‑tripping to Asheville and Napa Valley, is eager to explore Kyoto’s historic temples and Bali’s rice terraces, and
    balances adventure with budget constraints by using credit‑card points earned from frequent theater purchases; they favor itineraries that blend cultural immersion with opportunities to sketch and write.
  culinary: Betty Arceneaux experiments with modern Southern dishes like miso‑marinated shrimp & grits, smoked brisket tacos, and peach‑glazed pork belly, seasoning with thyme and rosemary, pairing meals
    with Virginia wines, and showcases their cooking skill by hosting monthly dinner parties for friends and volunteer groups; they sometimes over‑season in enthusiasm but relish the communal feedback.
  core: Betty Arceneaux blends analytical rigor and artistic imagination, channeling empathy into tech solutions while nurturing a love for hiking, theater, and experimental Southern cuisine; they habitually
    juggle multiple projects, occasionally sacrificing sleep for a deadline.
background:
  cultural: Betty grew up in the blend of rural Bedford County and the college‑town atmosphere of Lynchburg, Virginia. Her family’s Southern roots instilled values of hospitality, community service, and
    a respect for tradition, while her humanities education broadened her perspective to global arts and literature. She participates in local festivals such as the Lynchburg Marionette Festival, supports
    small‑business artisans, and enjoys the region’s historic sites and culinary heritage. This mix of Southern cultural pride, a collaborative community ethos, and a curiosity for diverse ideas shapes
    her worldview and informs both her professional and personal life.
