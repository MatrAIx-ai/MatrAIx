    (bridge, canasta)'',''Community potluck event planning'']'
  hobbies: '[''Gardening'',''Cooking traditional dishes'',''Crocheting and knitting'',''Listening to gospel and classic jazz'',''Reading historical biographies'',''Playing bridge and other card games'',''Walking
    in local parks'',''Attending weekly church services'',''Participating in community potlucks'',''Family genealogy research'',''Digitizing and preserving family photographs'']'
  career_goals: Even at 96, Ronda is determined to maintain her independence, health, and relevance within her family and community. She aims to keep her body strong enough for daily walks and garden work,
    and to continue using video-calling to connect with her great-grandchildren. Ronda plans to compile her life story, recipes, and family anecdotes into a memoir that will serve as a cultural legacy for
    future generations. She hopes to be recognized as a trusted source of Worcester's African-American history, occasionally speaking at senior-center gatherings. Financial security is a priority, so she
    intends to ensure her savings are sufficient for any assisted-living needs while preserving her autonomy. Finally, she wishes to keep winning at bridge, using her competitive drive to stay mentally
    sharp.
