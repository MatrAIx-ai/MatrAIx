personas:
  professional: Derek Woods, a veteran automotive body repair specialist, leverages their meticulous, disciplined approach and talkative mentorship style to run a high‑precision shop that prides itself
    on exact paint‑matching, advanced MIG and TIG welding, and rigorous quality‑control, while continuously evaluating emerging technologies through a skeptical yet curious lens.
  sports: Derek Woods, an avid supporter of the Philadelphia Eagles and a member of the Marsh Creek Senior Anglers Club, spends his weekends fishing early mornings, cheering at high‑school football games
    with his family, and maintaining a modest weight‑lifting routine to counteract joint stiffness from his osteoarthritis.
  arts: Derek Woods, who treats each restored 1965 Chevrolet Impala as a moving canvas, spends evenings listening to The Rolling Stones and Led Zeppelin while hand‑crafting custom wooden storage units inspired
    by mid‑century modern design, and volunteers for Civil War reenactments that blend his passion for history with theatrical performance.
  travel: Derek Woods, an organized road‑trip enthusiast, has toured historic Civil War sites such as Gettysburg and Antietam, driven the iconic Route 66 to the National Corvette Museum in Bowling Green,
    and now dreams of a transatlantic cruise that includes the shipyards of Portsmouth, England, balancing his love of history with family‑friendly budgeting.
  culinary: Derek Woods, a competent home cook with a penchant for Southern comfort foods, enjoys slow‑smoked brisket glazed with bourbon, pan‑searing catfish from Marsh Creek in a lemon‑caper butter, and
    baking cornbread spiked with jalapeño, while occasionally treating himself to a ribeye steak at the local upscale grill.
  core: Derek Woods, a meticulous, talkative veteran auto body technician, channels his competitive curiosity into classic‑car restoration, community history tours, and relentless pursuit of eco‑friendly
    shop upgrades, all while juggling chronic stress, a habit of over‑caffeinating late‑night projects, and a tendency to hoard vintage car manuals.
background:
  cultural: Derek grew up in a multi‑generational, white, working‑class family in the mid‑Atlantic region, with German and Irish ancestry that emphasized self‑reliance, hard work, and community involvement.
    Raised in the modest suburbs of Gettysburg, Pennsylvania, he was immersed in a culture that values practical skills, patriotism, and respect for local history—particularly the legacy of the Civil War.
    His upbringing instilled a disciplined work ethic and a competitive spirit, while his long‑standing marriage and involvement in local church and civic groups reflect a deep commitment to family and
    neighborhood ties.
attributes:
  skills: '[''Structural frame straightening'', ''Advanced MIG/TIG welding'', ''Precision metal shaping'', ''Paint matching and blending'', ''Low‑VOC waterborne paint application'', ''Collision estimating
