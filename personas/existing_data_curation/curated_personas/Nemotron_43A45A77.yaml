  hobbies: '[''Watercolor painting'', ''Listening to bomba and plena music'', ''Cooking traditional Puerto Rican cuisine'', ''Herb gardening'', ''Volunteering at community art workshops'', ''Reading historical
    novels'', ''Attending health and wellness webinars'', ''Exploring new art techniques'']'
  career_goals: Looking ahead, Maryuri aims to transition from full‑time bedside nursing to a mentorship and educator role, guiding new nurses in culturally competent and holistic care. She aspires to develop
    a community‑based senior wellness program in Lares that incorporates art and music therapy, and to serve as an advocate for improved elder‑care policies at the municipal level. Additionally, she plans
    to complete a certification in integrative health and to contribute articles on innovative nursing practices to regional healthcare journals.
