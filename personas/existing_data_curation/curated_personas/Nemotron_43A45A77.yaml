personas:
  professional: Maryuri Medina, a seasoned geriatric nurse with over four decades of clinical experience, they combine meticulous assessment and wound‑care expertise with a curious, methodical mindset that
    embraces art‑therapy and telehealth innovations, while reliably mentoring new nurses and championing culturally sensitive, holistic care.
  sports: Maryuri Medina, a gentle fitness enthusiast, they join the Los Montañeses Senior Hiking Club for weekly mountain walks, practice tai chi at the local community center, cheer on the Cangrejeros
    de Santurcie baseball team and attend games of the Capitanes de Arecibo basketball squad, and occasionally play in a senior‑friendly softball league with the Lares Eagles.
  arts: Maryuri Medina, an avid creative, they spend afternoons painting watercolors of Lares’ mountain vistas inspired by Claude Monet’s brushwork and Georgia O’Keeffe’s color palette, while listening
    to the rhythmic chants of bomba legend Miguel ‘El Bambú’ and the lively melodies of plena star Roberto ‘Banda’ Torres, and they regularly attend local folk music festivals that celebrate these traditions.
  travel: Maryuri Medina, an organized traveler, they plan detailed itineraries for weekend retreats to the nearby Cerro de la Santa and annual cultural festivals in Old San Juan, while dreaming of immersive
    trips to Barcelona’s historic alleys and the ancient ruins of Machu Picchu, balancing a love of nature with family commitments and a modest travel budget.
  culinary: Maryuri Medina, a skilled home cook, they frequently prepare arroz con gandules flavored with sofrito, cilantro, and annatto, master the crispy texture of mofongo mashed with garlic‑infused
    olive oil, cultivate fresh oregano and rosemary in their garden to enhance dishes, and treat themselves to a slice of tres leches cake on special occasions.
  core: Maryuri Medina, a curious yet methodical senior, they blend nursing wisdom with watercolor brushstrokes, tend a fragrant herb garden, and indulge in nightly herbal‑tea rituals that often keep them
    up a little later to finish a painting.
background:
  cultural: Maryuri's cultural identity is rooted in her Puerto Rican heritage, particularly the rich traditions of Lares, a town known for its historic role in the 1868 Grito de Lares uprising. She was
    raised in a close‑knit familia that values respeto, comunidad, and religious festivities, especially the Semana Santa processions and the vibrant patron saint festivals (fiestas patronales). Her daily
    life reflects the island's blend of Spanish, African, and Taíno influences, evident in her love for local music, cuisine, and community gatherings. She often incorporates Puerto Rican cultural practices,
    such as storytelling and traditional remedies, into her patient care to foster trust and cultural competence.
