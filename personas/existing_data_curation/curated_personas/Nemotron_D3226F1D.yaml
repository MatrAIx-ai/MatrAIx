personas:
  professional: A budding comic‑artist who loves building LEGO worlds, Joe Hirschler channels their curiosity into designing digital storyboards on Scratch, blending organized sketching with spontaneous
    pixel experiments, and an early knack for storytelling hints at a future career in visual media.
  sports: An enthusiastic youth soccer player, Joe Hirschler practices after school with the Ocean Breeze Soccer Club, idolizes the San Diego Padres and follows the LA Chargers, spends afternoons swimming
    laps at the community pool to stay fit, and enjoys weekend beach volleyball games with friends.
  arts: A creative comic enthusiast, Joe Hirschler draws inspiration from Stan Lee’s dynamic panels, the whimsical worlds of Studio Ghibli, and the vibrant street art of Banksy, often sketching characters
    on scrap paper before refining them in digital art apps while listening to Billie Eilish and K‑pop hits.
  travel: An adventurous explorer, Joe Hirschler has trekked local nature trails in the Redwood groves, chased sunrise at Santa Monica Beach, dreams of visiting the Grand Canyon, and hopes to one day tour
    the interactive exhibits at the Louvre in Paris after a school field trip to Washington, D.C.
  culinary: A budding gourmand, Joe Hirschler loves homemade pepperoni pizza, classic mac and cheese, chocolate‑strawberry smoothies, frequently helps their parents whisk batter for pancakes, but often
    forgets to clean up the art‑smeared tabletop afterwards.
  core: Joe Hirschler is a curious nine‑year‑old who balances meticulous LEGO engineering with spontaneous comic sketches, saves allowance for future builds, and navigates the world with a blend of organized
    curiosity and playful imagination.
background:
  cultural: Joe grows up in a middle‑class suburban neighborhood in St. Johns County, Florida, where the coastal vibe blends Southern hospitality with a laid‑back beach lifestyle. His family embraces typical
    American customs—holiday celebrations, school events, and community festivals like the annual St. Johns County Fair. He attends a public elementary school that emphasizes inclusive curricula, exposing
    him to a mix of regional Florida history (e.g., St. Augustine’s heritage) and broader U.S. culture. Outdoor activities such as beach trips, kayaking, and wildlife tours are part of his upbringing, reinforcing
    a respect for nature. As a White American, his cultural experiences are shaped by the prevailing middle‑class suburban values of education, teamwork, and civic participation.
