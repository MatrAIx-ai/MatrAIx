  career_goals: Joe dreams of becoming a wildlife photographer who captures the beauty of Florida’s coastal ecosystems while also studying marine life as a biologist. He is fascinated by how art and science
    intersect, so he imagines designing interactive video games that teach kids about nature and conservation. Long‑term, he hopes to work in a museum, creating exhibits that inspire other curious children.
