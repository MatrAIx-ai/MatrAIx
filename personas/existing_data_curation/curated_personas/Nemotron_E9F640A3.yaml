  hobbies: '[''Visiting Contemporary Art Galleries'', ''Watercolor Painting'', ''Reading Contemporary Fiction and Science Non‑Fiction'', ''Experimenting with Global Cooking'', ''Hiking in New Jersey Pine
    Barrens'', ''Yoga'', ''Strategic Board Games (e.g., Settlers of Catan)'', ''Live Music Performances'', ''Volunteer STEM Tutoring'']'
  career_goals: Short‑term, Amira aims to earn the Certified Compensation Professional (CCP) designation and lead a high‑impact market‑pricing project for her organization. In the medium term, she seeks
    a promotion to Senior Compensation Analyst, where she will mentor junior analysts and shape the company’s total‑rewards strategy. Her long‑term ambition is to become a Director of Total Rewards, driving
    innovative, equitable compensation frameworks and integrating data‑driven insights with a culture of inclusion. Throughout her career she plans to pursue an MBA with a specialization in Human Resource
    Management to broaden her strategic leadership capabilities.
