  career_goals: John seeks to transition into a senior advisory role where he can channel his meticulous engineering expertise into guiding younger teams. He is driven to author a technical memoir that
    captures lessons learned from his long career, and to support the development of low‑emission propulsion technologies as a volunteer consultant. Establishing a scholarship for underprivileged STEM students
    in Minnesota and completing a personal experimental liquid‑fuel rocket project are key milestones that provide him with a sense of accomplishment and help alleviate his underlying anxiety about his
    professional legacy.
