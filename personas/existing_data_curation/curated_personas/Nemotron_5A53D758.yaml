personas:
  professional: John Everage, a 76‑year‑old aerospace propulsion veteran, blends his meticulous engineering precision with a practical, curiosity‑driven mindset to mentor junior teams, author a technical
    memoir, and volunteer on low‑emission rocket projects, all while maintaining the disciplined, modest work ethic forged in a tight‑knit Midwestern community.
  sports: John Everage, a dedicated Minnesota sports fan, loyally watches the Vikings, the Twins, and the Golden Gophers, participates in a senior bowling league, and maintains daily river walks and weekend
    fishing trips to local lakes as his low‑impact fitness routine.
  arts: John Everage, whose evenings echo with Beethoven’s Ninth and Mahler’s Resurrection Symphony, frequently attends Minnesota Orchestra performances, delights in the poetry of Carl Sandburg, and collects
    vintage aircraft art prints, while his occasional indulgence in classic Hollywood films like "The Right Stuff" fuels his aerospace nostalgia.
  travel: John Everage, an avid planner, crafts meticulously detailed itineraries for his modest road trips along the Great Lakes, cherished pilgrimages to his ancestral hometown’s historic church, and
    a recent cruise exploring the Norwegian fjords, always balancing budget constraints with a longing for quiet, nature‑rich destinations.
  culinary: John Everage, a capable home cook, finds comfort in preparing walleye pan‑fried with lemon butter, meatballs with lingonberry jam, and hearty cheese‑curd hotdish, while his passion for woodworking
    shows in the handcrafted cutting board he uses, yet he occasionally over‑salts sauces when his mind wanders to engineering calculations.
  core: John Everage, a disciplined aerospace veteran with a quiet curiosity and lingering anxiety about his legacy, balances precise engineering mentorship with modest, tradition‑steeped hobbies and a
    carefully managed life.
background:
  cultural: John grew up in a mid‑century working‑class family in Saint Paul, rooted in the region’s Scandinavian (Swedish) and German heritage. The Midwest’s emphasis on practicality, self‑reliance, and
    community service shaped his disciplined work ethic. He was raised in the Lutheran tradition, which instilled a sense of modesty and responsibility. The local culture of “Minnesota nice” and the region’s
    strong aerospace and defense presence provided both the pragmatic framework and the curiosity that guided his career. His divorce and later‑life experiences have reinforced his preference for small,
    meaningful social circles, while his background fosters a deep respect for tradition balanced with an openness to new ideas.
