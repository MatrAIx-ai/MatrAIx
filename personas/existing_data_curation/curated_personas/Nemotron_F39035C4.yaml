personas:
  professional: Denise Cheek is a civil engineer renowned for integrating sustainable design into rural Texas infrastructure; they leverage AutoCAD, Civil 3D, and GIS to devise water‑resource solutions
    that honor local landscapes while meeting modern standards, and their meticulous, methodical approach ensures detailed risk assessments, precise cost estimates, and smooth coordination of multidisciplinary
    teams, all while mentoring junior engineers—especially women—as they work toward a senior project manager role and a Professional Engineer license.
  sports: Denise Cheek is an outdoor‑oriented athlete who spends weekends kayaking the Guadalupe River and hiking Enchanted Rock and Barton Creek trails; they belong to a local kayaking club, participate
    in charity 5K runs supporting the community garden, and cheer for the Texas Rangers, Dallas Cowboys, and Austin FC soccer team at occasional games.
  arts: Denise Cheek cultivates a quiet yet vibrant connection to the arts through historical fiction, technical memoirs, and a small book club that meets at a rustic coffee house; they attend the Kerrville
    Folk Festival where they admire Robert Earl Keen’s storytelling, regularly listen to Willie Nelson’s classic country, display prints of Frederic Remington western art at home, and support local artisans
    at Hill Country craft fairs, finding inspiration for both personal projects and professional designs.
  travel: Denise Cheek approaches travel with meticulous planning tempered by a love for spontaneous discovery; they have road‑tripped through Big Bend National Park and the Guadalupe Mountains, cataloguing
    bird species along the way, enjoy weekend escapes to Austin’s live‑music scene and San Antonio’s River Walk, recently visited Santa Fe, New Mexico, sparking an interest in southwestern art, and dream
    of driving the Pacific Coast Highway to explore the Oregon coastline, all while keeping a field notebook of routes and highlights.
  culinary: Denise Cheek blends farm‑to‑table cooking with classic Texas flavors, often using herbs from their backyard garden—basil, thyme, and cilantro—to season brisket, chiles rellenos, and avocado
    salsa; they whip up breakfast tacos with fresh salsa and locally sourced eggs, experiment with herb‑infused olive oil on salads, and while confident in the kitchen, sometimes order takeout from a beloved
    Tex‑Mex joint after a long day on a construction site.
  core: Denise Cheek is a methodical civil engineer who balances a love for Texan outdoors, careful budgeting, and community‑focused stewardship, all while wrestling with occasional stress‑induced worries.
background:
  cultural: Denise draws from a blend of Midwestern roots and Texas Hill Country culture. Raised in a white, middle‑class family that values self‑reliance, modesty, and community service, she internalized
    a strong work ethic and respect for tradition. Living in Wimberley has deepened her appreciation for the region’s rural lifestyle, love of outdoor recreation, and support for local artisans. She participates
    in regional festivals that celebrate Texan music and cuisine while maintaining a pragmatic outlook shaped by her STEM education. This cultural mix informs her balanced perspective—embracing innovative
    engineering practices while honoring the historic character and environmental sensibilities of her community.
