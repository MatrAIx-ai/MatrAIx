  career_goals: Denise aims to progress to senior project manager within her firm, leading large‑scale rural infrastructure projects that incorporate green design principles. She plans to obtain her Professional
    Engineer (PE) license if she has not already done so, and to mentor junior engineers, especially women entering the field. Over the next five years, she hopes to spearhead a community‑focused sustainability
    initiative for Blanco County, integrating water conservation and resilient road design. Long‑term, she envisions establishing a boutique consulting practice that serves small towns across the Texas
    Hill Country, offering tailored solutions that balance modern engineering advancements with the region’s traditional values and environmental stewardship. She also prioritizes achieving a healthier
    work‑life balance to reduce stress and maintain her well‑being.
