personas:
  professional: Nick Smith is an aspiring CNC machinist whose practical expertise in reading mechanical schematics, MIG/TIG welding, and CNC maintenance merges with a curiosity‑driven love for tinkering,
    allowing them to troubleshoot production floor issues on the fly while often battling a relaxed attitude toward strict scheduling.
  sports: Nick Smith pedals the rugged trails of the San Bernardino mountains with the San Bernardino Trail Riders club, follows the Los Angeles Dodgers and Lakers with fervor, and squeezes in weekend hikes
    while occasionally joining pick‑up soccer games at the local park.
  arts: Nick Smith strums an acoustic guitar at casual jam sessions, drawing inspiration from John Mayer and The Lumineers, and they regularly attend indie film screenings featuring Saoirse Ronan and live
    performances at the Riverside Civic Theatre.
  travel: Nick Smith prefers spontaneous road‑trip adventures, having camped under the stars in Yosemite and driven the Pacific Coast Highway to Monterey, while dreaming of backpacking through Japan’s rural
    villages and hiking New Zealand’s Milford Track.
  culinary: Nick Smith is an enthusiastic home‑cook who can whip up a smoky chili con carne seasoned with cumin and smoked paprika, a perfectly seared ribeye finished with rosemary, and an occasional sushi
    roll featuring avocado and crab, but they often resort to quick ramen packets when late‑night projects call.
  core: Nick Smith is a curiosity‑driven tinkerer whose practical hands‑on skills are matched by a laid‑back approach to deadlines, a penchant for spontaneous tool‑shopping sprees, and a habit of humming
    guitar riffs while assembling CNC parts.
background:
  cultural: Nick grew up in Rialto, part of Southern California’s Inland Empire, in a middle‑class, Anglo‑American household. His family’s work ethic reflects a blend of traditional American values—hard
    work, self‑reliance, and community service—shaped by the diverse, multicultural environment of the region. He attended a public high school with a mix of cultural backgrounds, exposing him to Hispanic,
    Asian, and other influences common in San Bernardino County. These experiences have given him a practical, inclusive outlook, an appreciation for both individual initiative and collaborative effort,
    and a familiarity with the local community’s festivals, county fairs, and support networks.
attributes:
  skills: '[''mechanical assembly'', ''reading schematics'', ''hand and power tool operation'', ''basic MIG/TIG welding'', ''quality inspection'', ''troubleshooting mechanical issues'', ''routine CNC machine
