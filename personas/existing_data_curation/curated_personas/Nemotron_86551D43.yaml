  hobbies: '[''model kit building'', ''Arduino/Raspberry Pi tinkering'', ''woodworking'', ''mountain biking'', ''hiking'', ''playing acoustic guitar'', ''video gaming (sandbox/simulation)'', ''automotive
    restoration'', ''volunteering at community events'']'
  career_goals: Nick aims to deepen his technical expertise and transition from an assembler to a CNC machinist, eventually moving into a production supervisor role. Over the next few years he plans to
    earn an associate degree in manufacturing technology at a community college, obtain welding and CNC certifications, and develop stronger organizational skills to qualify for a team‑lead position. Long‑term,
    he dreams of opening a small custom fabrication shop that blends his love for hands‑on building with innovative design.
