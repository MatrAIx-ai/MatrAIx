  career_goals: Eddie aims to secure a stable, structured position that leverages his people‑skills and organizational strengths, such as an administrative assistant, customer support specialist, or community
    outreach coordinator. Over the next three years, he plans to complete a bachelor's degree in business administration while gaining experience in a supportive environment that offers clear expectations
    and routine. Long‑term, he aspires to move into a managerial role overseeing team operations or community programs, where he can cultivate harmonious workplaces and support the well‑being of his colleagues.
