personas:
  professional: Eddie Achord, an aspiring administrative assistant, channels their strong interpersonal communication, meticulous scheduling, and conflict-mediating abilities into a routine-driven office
    environment where they cherish the predictability of clear expectations and the joy of fostering harmonious team interactions.
  sports: Eddie Achord, a dedicated intramural basketball player for the Provo Peaks, also hikes the Wasatch foothills on weekends, supports the local NBA team with an unwavering weekly watch ritual, and
    values the structured camaraderie of team sports as a cornerstone of their fitness routine.
  arts: Eddie Achord, a karaoke enthusiast who belts out classics by Queen and The Eagles, volunteers at the Provo Community Theatre, and tunes into classic-rock podcasts featuring stories about Led Zeppelin
    and Fleetwood Mac, uses these artistic outlets to satisfy their sociable nature and need for a familiar, supportive audience.
  travel: Eddie Achord, a methodical planner, organizes road-trip itineraries in spreadsheets, prefers the predictability of familiar national-park hikes like Zion and Bryce Canyon, budgets carefully for
    occasional ski weekends in Lake Tahoe, and dreams of a structured cultural tour of Barcelona once their savings allow.
  culinary: Eddie Achord, a self-taught home cook, favors simple comfort foods such as cheddar-stuffed baked potatoes, classic grilled cheese, and chicken noodle soup, crafts cafe-style espresso drinks
    using their barista experience, and occasionally splurges on specialty coffee beans while keeping meal prep reliably routine.
  core: Eddie Achord is a routine-loving, people-centric 24-year-old who balances sociable enthusiasm with an undercurrent of anxiety, thriving in structured environments that let them support others while
    quietly wrestling with self-doubt.
background:
  cultural: Eddie grew up in Provo, Utah, within a predominantly white, culturally Mormon community. While he does not consider himself a devout practitioner, he is familiar with LDS traditions such as
    regular church gatherings, community service, and family‑centered celebrations. The local emphasis on modesty, practicality, and strong communal ties has shaped his values of reliability, harmony, and
    routine. Provo’s outdoor lifestyle, with easy access to the nearby mountains, influences his recreational interests, while the region’s emphasis on education and work ethic informs his career aspirations.
