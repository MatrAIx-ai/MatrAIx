  hobbies: '[''Reading science‑fiction'', ''Sketching and illustration'', ''Basic coding (game creation)'', ''Cooking traditional South Asian dishes'', ''Journaling for self‑reflection'', ''Hiking and nature
    photography'', ''Small book‑club discussions'']'
  career_goals: Leena dreams of a career that merges her love for problem solving with a desire to help her community. She hopes to study biomedical engineering or computer science in college, aiming to
    design low‑cost health‑monitoring devices or educational software that can benefit under‑served immigrant families. In the short term, she plans to join her school's robotics club, earn a science fair
    award, and take online courses to deepen her coding skills, while also volunteering at the local community center to mentor younger children.
