personas:
  professional: Leena Vang, an aspiring young game developer, merges a love of science-fiction storytelling with practical coding skills in Python and Scratch, turning sketch-drawn character concepts into
    playable puzzles while balancing meticulous planning with a flexible, curiosity-driven approach, and they use their reserved yet assertive nature to collaborate thoughtfully on school coding clubs.
  sports: Leena Vang, a member of the Denver Youth Hiking Club, spends weekends navigating the Rocky Mountain foothills, cheerfully follows the Denver Broncos in football season, roots for the Colorado
    Avalanche on the ice, and occasionally joins a co-ed intramural soccer team with Club Pegasus, preferring solo trail runs and mindful breathing over large-scale team sports.
  arts: Leena Vang, a sketch enthusiast, draws inspiration from the cinematic worlds of Studio Ghibli, the lyrical prose of Becky Chambers, the music of Ariana Grande and Nusrat Fateh Ali Khan, and regularly
    attends cultural-center workshops to practice traditional dance steps, channeling their reserved creativity into detailed character illustrations.
  travel: Leena Vang, an avid day-tripper, enjoys weekend hikes to Red Rocks and family outings to New York City, dreams of backpacking through the Himalayan trails of Nepal and exploring the historic streets
    of Istanbul, meticulously plans trips using both digital itineraries and handwritten journals, while balancing a modest family travel budget and school commitments.
  culinary: Leena Vang, a budding home chef, helps craft aromatic biryani with basmati rice, saffron, cardamom, and tender chicken, perfects sweet gulab jamun pastries, experiments with homemade sushi rolls
    using nori, rice vinegar, and avocado, and balances a love for bold spices with a curious palate that occasionally tests unfamiliar ingredients like kimchi.
  core: Leena Vang is a curious, organized teen who channels sci-fi imagination into coding and sketching, navigates worries through journaling and hiking, and finds comfort in family-cooked biryani and
    quiet creative pursuits.
background:
  cultural: Leena comes from a South Asian Muslim family originally from Pakistan, now settled in Denver’s diverse community. Her parents maintain cultural traditions such as celebrating Eid, observing
    Ramadan, and preparing festive meals, while also encouraging her academic pursuits. She grew up hearing Urdu at home and celebrating both South Asian holidays and American events like Fourth of July,
    giving her a bicultural perspective. The family participates in a local South Asian cultural center where Leena learns traditional dance steps and helps organize youth workshops. This blend of strong
    family values, emphasis on education, and community involvement shapes her identity and daily life.
