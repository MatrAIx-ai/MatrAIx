persona_description: 'Susannah C. Drake, a principal of dlandstudio, an award-winning multidisciplinary design firm that has worked on projects such as the "A New Urban Ground" and the Gowanus Canal Sponge
  Park. She is the recipient of numerous grants for her research on campus landscapes and large-scale urban infrastructure projects. She is the former President and Trustee of The New York ASLA, a Trustee
  of the Van Alen Institute, and a visiting studio professor at Syracuse, the Cooper Union, and Harvard University GSD. She is the author of "Elastic Landscape: Seeding Ecology in Public Space & Urban Infrastructure,"
  included in the collection of essays entitled Infrastruktururbanismus, published by DOM publishers Berlin in 2011.'
