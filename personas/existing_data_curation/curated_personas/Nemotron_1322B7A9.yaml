personas:
  professional: Roger Price, a 25‑year‑old photographer, channels their methodical workflow, precise studio lighting design, and sharp eye for composition to deliver high‑end residential and hospitality
    imagery, while their competitive streak and organized approach drive them to secure recurring contracts and mentor emerging talent.
  sports: Roger Price, a 25‑year‑old outdoor enthusiast, devotes weekends to hiking Sonoran Desert trails with the Scottsdale Desert Trail Club, supplements the activity with regular yoga sessions, and
    supports the Phoenix Suns and Arizona Cardinals, while they keep a structured training schedule that blends cardio, strength work, and flexibility.
  arts: Roger Price, a 25‑year‑old photography aficionado, spends their weekends immersed in the works of Ansel Adams, Edward Weston, and Richard Misrach, they frequent Scottsdale’s contemporary art galleries,
    and they draw melodic inspiration from acoustic artists like Nick Drake and Iron & Wine, shaping both their visual and auditory creative sensibilities.
  travel: Roger Price, a 25‑year‑old traveler who prefers meticulously planned trips, they have explored the desert canyons of Sedona and Antelope Canyon, dream of photographing Iceland’s volcanic fields
    and the remote deserts of Namibia, and enjoy short weekend getaways to Santa Fe for art festivals, balancing adventure with a structured itinerary.
  culinary: Roger Price, a 25‑year‑old culinary explorer, skillfully prepares Southwestern staples such as carne asada with charcoal‑grilled nopales, chiles rellenos drizzled with a prickly‑pear reduction,
    and smoky chipotle‑marinated black beans, often sourcing fresh chiltepín and heritage corn to infuse authentic regional flavor into their home‑cooked meals.
  core: Roger Price merges a disciplined, competition‑driven mindset with a solitary love of desert photography, while they habitually over‑organize their digital archives and occasionally let meals simmer
    unattended due to relentless perfectionism.
background:
  cultural: Roger grew up in a middle‑class, Anglo‑American family in the Pacific Northwest, where he was exposed to classic American cultural values emphasizing education, self‑reliance, and community
    involvement. His bachelor's degree in humanities deepened his appreciation for Western art traditions and cultural narratives. Since moving to Scottsdale, Arizona, he has been influenced by the desert’s
    stark visual palette and the region’s diverse artistic community, including Native American and Hispanic cultural expressions. While his ethnic background is primarily European‑American, Roger embraces
    the multicultural environment of the Southwest, which informs both his personal life and photographic style.
attributes:
  skills: '["Studio lighting", "Portrait photography", "Commercial photography", "Adobe Photoshop", "Adobe Lightroom", "Color grading", "Digital asset management", "Workflow optimization", "Client liaison",
