    strategy gaming"]'
  career_goals: Roger aims to establish a boutique photography studio in Scottsdale that caters to high‑end residential real‑estate, hospitality, and fine‑art clients. He plans to develop a signature series
    of desert‑landscape fine‑art prints that blend his humanities background with contemporary aesthetics, eventually publishing a coffee‑table book. Over the next five years he wants to secure recurring
    contracts with local luxury hotels and ranches, expand his online gallery, and gain recognition in national photography competitions. Additionally, he aspires to mentor emerging photographers through
    workshops and possibly teach a photography course at a community college, leveraging his organized approach and competitive drive.
