personas:
  professional: Mark Ousley is a customer support specialist with a STEM bachelor's degree who leverages data‑driven CRM analytics, Six Sigma methodology, and a creative problem‑solving mindset to deliver
    empathetic, precise resolutions while mentoring junior agents.
  sports: Mark Ousley enjoys weekend hikes through the Sandhills, participates in a local trail‑running club, joins casual pickup basketball games at the community center, and roots for the Carolina Panthers
    during football season, blending outdoor adventure with team sport enthusiasm.
  arts: Mark Ousley spends afternoons sketching at the Whiteville Art Center, curates a personal photography series of the Sandhills inspired by Ansel Adams, and draws creative fuel from musicians like
    Sufjan Stevens and visual artists such as Yayoi Kusama.
  travel: Mark Ousley prefers meticulously planned, low‑key getaways that combine hiking and cultural immersion, having trekked the Blue Ridge Parkway and explored New Orleans' music scene while dreaming
    of photographing Iceland’s glaciers and wandering Florence’s Renaissance galleries.
  culinary: Mark Ousley, an enthusiastic home cook, regularly reimagines Southern classics by adding global twists—such as miso‑glazed shrimp and grits, kimchi‑infused collard greens, and black‑bean mole‑spiced
    fried chicken—while mastering ingredients like smoked paprika, harissa, and fresh basil.
  core: Mark Ousley is a curiosity‑driven data analyst who balances meticulous financial planning with spontaneous board‑game nights, tends to over‑perfect his sketches, and quietly excels at turning complex
    problems into elegant, visual solutions.
background:
  cultural: Mark was raised in Whiteville, a small town in Columbus County, North Carolina, where community ties and Southern hospitality are central. His family’s roots are in the region’s timber and agricultural
    industries, instilling a strong work ethic and respect for self‑reliance. He grew up attending a Baptist church, participating in weekly services and community events such as the Whiteville Harvest
    Festival, which reinforced values of generosity and communal responsibility. Though grounded in these traditions, Mark’s natural curiosity has pushed him to explore broader cultural experiences—from
    traveling to nearby cities for museum visits to engaging with contemporary art and technology—resulting in a blended identity that honors his Southern heritage while embracing a broader, more eclectic
    worldview.
attributes:
