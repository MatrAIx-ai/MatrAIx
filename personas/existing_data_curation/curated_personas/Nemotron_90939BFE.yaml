  hobbies: '[''Visiting local art galleries and museums'', ''Landscape photography'', ''Hiking in the Sandhills and nearby nature trails'', ''Reading science-fiction and technology nonfiction'', ''Listening
    to podcasts on tech, art, and creativity'', ''Board-game nights with a small group of friends'', ''Cooking experimental dishes that fuse Southern and global cuisines'']'
  career_goals: He aims to move from a representative role into a senior customer experience analyst position within the next two years, leveraging data to enhance service quality. By earning a Six Sigma
    Green Belt and advanced CRM certification, he plans to lead a team of support agents, mentor newcomers, and shape the company’s service strategy. Long‑term, Mark envisions transitioning into a user‑experience
    or product support role that merges his technical acumen with his passion for design and the arts, while also establishing financial stability to purchase a home in his hometown.
