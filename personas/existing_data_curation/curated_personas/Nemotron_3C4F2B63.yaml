  hobbies: '[''Salsa dancing'', ''Bomba dancing'', ''Community dance instruction'', ''Hiking'', ''Trail clean‑up'', ''Cooking Puerto Rican cuisine'', ''Yoga'', ''Mindfulness meditation'', ''Leadership book
    club'', ''STEM outreach volunteering'', ''Engineers Without Borders involvement'']'
  career_goals: Ana’s short‑term ambition is to secure a Director of Engineering position overseeing statewide transportation and water‑resource initiatives in Nevada, where she can apply her technical
    and business acumen to shape resilient, sustainable infrastructure. In the medium term, she aspires to become a senior consultant guiding public‑private partnerships on green building practices and
    community‑centric project delivery. Long‑term, she plans to launch her own engineering consultancy focused on sustainable design and equity‑based stakeholder engagement, while mentoring emerging Hispanic
    engineers and championing diversity within the industry. Enhancing her own emotional well‑being is integral to her career vision; she intends to embed mindfulness and emotional‑intelligence training
    into her leadership approach to foster healthier, high‑performing teams.
