personas:
  professional: Ana Valentinquinones, a 51‑year‑old licensed civil engineer and PMP‑certified project manager with a graduate business degree, combines rigorous structural analysis, geotechnical expertise,
    and BIM modeling with disciplined cost estimating and stakeholder negotiation, channeling their love of order and collaborative spirit into leading cross‑functional teams that deliver sustainable, community‑focused
    infrastructure projects across Nevada.
  sports: Ana Valentinquinones fuels her energetic routine with early‑morning hikes in the Sierra foothills, seasonal trail‑clean‑up projects, weekly yoga practice, and lively salsa‑dance workouts, while
    they cheer on the Vegas Golden Knights in hockey and the Las Vegas Raiders in football as their favorite Nevada sports teams.
  arts: Ana Valentinquinones immerses herself in the arts by leading senior salsa‑and‑bomba dance classes, attending live performances by renowned Latin musicians such as Marc Anthony and Carlos Vives,
    and discussing leadership themes with fellow readers in a local book club that often revisits works by Brené Brown and Simon Sinek, showcasing their zest for cultural expression and continuous learning.
  travel: Ana Valentinquinones prefers purposeful travel that blends adventure with cultural immersion, meticulously planning weekend getaways to Lake Tahoe’s alpine trails, annual trips to the historic
    streets of Old San Juan for architectural study, and occasional volunteer missions with Engineers Without Borders in Central America, all while balancing a modest travel budget reflective of their commitment
    to sustainable living.
  culinary: Ana Valentinquinones cooks with the zeal of a seasoned chef, mastering traditional dishes like arroz con gandules, pasteles, and caramel‑kissed flan, selecting fresh cilantro, plantains, and
    local Nevada produce, and often showcases their culinary creations at family gatherings, while occasionally indulging in late‑night coffee to fuel their recipe experiments.
  core: Ana Valentinquinones blends a disciplined, detail‑oriented mind with a vibrant, sociable heart, channeling their lingering anxiety into mindful habits, but never hesitating to break out a spontaneous
    salsa step or a weekend hike when deadlines tighten.
background:
  cultural: Ana was raised in a bilingual Puerto Rican household, speaking Spanish at home and English at school, which fostered a deep respect for both cultures. Family gatherings, music, and traditional
    celebrations—especially the vibrant rhythms of bomba and plena—are central to her identity. She maintains strong ties to the Puerto Rican diaspora in Nevada, regularly attending the annual Puerto Rican
    Day Parade in Reno and participating in cultural organizations that preserve island heritage. These roots instill values of resilience, hospitality, and community service, which she brings to her professional
    life by championing inclusive stakeholder engagement, culturally sensitive project design, and mentorship programs that empower Hispanic youth.
