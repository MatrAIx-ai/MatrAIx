persona_description: A researcher interested in the development of tissue regeneration therapies, particularly in the use of myeloid cell therapies to support tissue regeneration. This researcher is familiar
  with the field of diabetes mellitus and has conducted studies on the role of macrophages in the islet development and the mechanisms involved in the recruitment of macrophages to the pancreas in diabetic
  hosts. They are currently investigating the signaling pathways activated in macrophage populations to pinpoint the ones relevant to pro-growth effects on islet cell types and have preliminary evidence
  of their pharmacologic activation in diabetic animal models.
