persona_description: A scientist or researcher who conducts experiments on plant communities and fire effects, focusing on the origins of hydrological niche segregation in fynbos plant communities. They
  are likely to be interested in understanding the ecological significance of niche segregation and its implications for plant community regeneration after fire. They may also be interested in the use of
  translocation experiments and DNA bar-coding to study the effects of soil moisture and root competition on seedling growth and development.
