personas:
  professional: An ambitious civil engineer named Athena Carlo leverages SAP2000, AutoCAD, and Revit to design sustainable parkway bridges that blend structural rigor with watercolor-inspired aesthetics,
    while championing mental‑health‑friendly workplace practices and mentoring junior staff, they also pursue PE licensure within three years.
  sports: An outdoor‑oriented athlete named Athena Carlo embraces cross‑country skiing in Minnesota’s snowy winters, trails with the Boundary Waters Explorers hiking club, and weekend kayaking on Lake Minnetonka,
    while cheering for the Minnesota Twins, Vikings, and Timberwolves and occasionally joining pick‑up soccer games at the local park.
  arts: A creatively inclined urban sketcher named Athena Carlo spends weekends painting watercolors of downtown skylines, curating photos of Lake Superior’s shifting light reminiscent of Ansel Adams, admiring
    the installations of Olafur Eliasson at local galleries, devouring N.K. Jemisin’s speculative fiction, and performing at open‑mic poetry nights, they also maintain a sketchbook filled with spontaneous
    doodles during coffee breaks.
  travel: A detail‑oriented traveler named Athena Carlo prefers meticulously planned road trips to Minnesota’s North Shore, weekend camping in the Boundary Waters, and a recent self‑guided tour of Door
    County, while day‑dreaming about a summer adventure in Iceland to chase the midnight sun and a future trek through Patagonia’s Andes; they typically book budget‑friendly lodgings and use travel points
    to stretch a modest vacation fund.
  culinary: A gastronomically curious home cook named Athena Carlo delights in simmering hearty beet and beef stew with locally sourced wild rice, grilling fresh walleye at community‑garden gatherings,
    crafting buttery cinnamon rolls with cardamom, and experimenting with seasonal herbs harvested from their plot; they occasionally indulge in a cheesy fondue night with friends, though they sometimes
    neglect meal prep on weeks packed with field work.
  core: At 24, Athena Carlo fuses civil‑engineering precision with watercolor‑inspired creativity, channels a love for Minnesota’s lakes and forests into sustainable designs, and navigates intense anxiety
    through yoga, journaling, and occasional impulsive splurges on art supplies, they embody a blend of analytical rigor and artistic soul.
background:
  cultural: Athena grew up in a middle‑class white family in the Minneapolis‑St. Paul metropolitan area, where Midwestern values of community, modesty, and self‑reliance are emphasized. Her family’s German‑Scandinavian
    heritage is evident in seasonal celebrations, a love for hearty meals, and a strong connection to the outdoors—particularly lakes, snow sports, and summer camping. The region’s public‑school system
    and practical‑oriented education fostered her curiosity about engineering and the built environment. Exposure to both urban cultural institutions and rural natural spaces has shaped her balanced worldview
    and her desire to create infrastructure that respects both community cohesion and environmental stewardship.
attributes:
