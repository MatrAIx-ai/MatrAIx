  hobbies: '[''Visiting art galleries'', ''Sketching and watercolor painting'', ''Landscape photography'', ''Yoga and guided meditation'', ''Reflective journaling'', ''Hiking in Minnesota’s parks'', ''Volunteering
    with community garden'', ''Reading speculative fiction'', ''Attending open‑mic poetry nights'']'
  career_goals: Athena aims to become a licensed Professional Engineer within the next three years, concentrating on sustainable and community‑focused infrastructure. She aspires to lead multidisciplinary
    projects that blend engineering rigor with artistic design, such as park‑way bridges, green streets, and resilient storm‑water systems. In addition, she wants to mentor junior colleagues, champion mental‑health‑friendly
    workplace practices, and eventually move into a senior engineering manager role that balances technical leadership with community outreach and advocacy.
