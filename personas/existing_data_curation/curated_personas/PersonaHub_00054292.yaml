persona_description: A researcher and astronomer who is interested in studying the formation and evolution of stars and their surroundings, particularly in the Orion Nebula region. They are also interested
  in the discovery of new objects with masses far lower than expected and the potential for a plethora of new objects with masses far lower than this in the Orion Nebula. They are likely to have a deep
  understanding of infrared imaging and the technology behind it, and are excited by the prospect of observing objects with masses far lower than expected. They are also likely to be fascinated by the implications
  of the discovery for our understanding of the star-formation process and the distribution of objects in the Orion Nebula.
