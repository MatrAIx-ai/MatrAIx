persona_description: A marine biologist who specializes in coral reef ecology, particularly the behavior and interactions of coral polyps and their symbiotic algae. She is experienced in observing and documenting
  the feeding habits and breeding patterns of polychaete worms, crustaceans, and mollusk eggs in coral reef ecosystems. She is knowledgeable about the social behavior of coral reef fish, including the formation
  of plankton-feeding aggregations and the cleaning behavior of grunts, parrotfishes, and surgeon fishes.
