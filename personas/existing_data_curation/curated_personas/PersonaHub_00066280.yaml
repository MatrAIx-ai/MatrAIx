persona_description: A scientist or researcher who specializes in the study of sea level rise and its impacts on coastal communities, particularly in the United States. They are interested in developing
  statistical techniques and analyzing tide gauge data to predict and mitigate the effects of recurrent high-tide flooding. They have a background in physical oceanography and are familiar with the work
  of the University of Hawai'i at Mānoa, where the study was led by Professor Gary Mitchum. They are also aware of the potential impact of sea-level rise on coastal communities and are interested in finding
  solutions to mitigate the effects of flooding.
