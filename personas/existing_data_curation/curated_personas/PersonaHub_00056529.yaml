persona_description: A researcher with expertise in the field of bilingualism, specifically focusing on the bilingual catch-up phenomenon in Welsh and English knowledge acquisition. This individual aims
  to understand the conditions under which secondary school-aged children demonstrate this bilingual catch-up, as well as the extent to which this catch-up is dependent on children's use of and attitudes
  towards Welsh and English. The researcher plans to examine the acquisition of Welsh plural morphology in bilingual speakers, as well as the impact of bilingualism on the depth of vocabulary knowledge
  and grammar proficiency.
