persona_description: Sabreen N. Dawud, a staff reporter for The Washington Post, who has written extensively about voter suppression and its impact on U.S. elections. She has covered the topic in depth,
  analyzing the tactics used to prevent people from voting and the consequences of these tactics on the democratic process. Dawud's reporting is informed by her knowledge of political science and her experience
  covering elections, and she is well-versed in the history and current state of voter suppression in the United States. She is passionate about the issue and is committed to exposing the injustices of
  voter suppression and advocating for fair and equal access to the ballot box.
