persona_description: A historian who specializes in the study of ancient Greek religion and mythology, particularly the cult of Dionysos. His research interests include the development of the Dionysian
  Mysteries, the role of Dionysos as a god of the common people and social outcasts, the spread of Dionysos across different cultures, and the complex nature of the Dionysos archetype. He is also interested
  in the psycho-dramas associated with Dionysos and the way in which he represents a supposed underlying 'chaotic' reality beneath all ordered dualities.
