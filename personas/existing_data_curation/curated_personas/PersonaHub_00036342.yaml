persona_description: A business owner or operator who is interested in deploying commercial solar power systems to generate electricity for self-consumption or to export excess energy to the grid. They
  are willing to invest in technology and infrastructure to ensure that their solar array is reliable and affordable. They are aware of the challenges and limitations of commercial solar power, such as
  the need for low-cost batteries and the potential for feed-in tariffs to be reduced. They are also aware of the financial implications of deploying excess solar generation and the need to compare the
  costs of consuming and exporting electricity.
