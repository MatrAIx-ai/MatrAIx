persona_description: A journalist who covers environmental and health issues, particularly focusing on the impacts of fuel-based lighting on communities in off-grid areas. They are well-versed in the effects
  of indoor kerosene lamps on respiratory health and the risks of ingestion. They are also aware of the financial burden of kerosene on households and the potential for price variations. They are familiar
  with the studies on the economic benefits of having access to clear light and the challenges faced by night fishermen. They are also aware of the risks associated with fire outbreaks in refugee camps
  and the importance of clear lighting in such settings.
