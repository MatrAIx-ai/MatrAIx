personas:
  professional: A seasoned quality inspector with over twenty years in food‑processing, Mira Nardo leverages precise weighing, statistical process control, and meticulous documentation to uphold FDA, USDA,
    and OSHA standards, while they mentor junior staff and pursue a supervisory role to shape continuous‑improvement initiatives.
  sports: Mira Nardo stays active with weekly sunrise walks through the local park as a member of the Dodgeville Senior Walking Club, cheers on the Milwaukee Brewers in summer baseball and the Green Bay
    Packers in fall football, and during winter they attend indoor yoga sessions to keep their knees supple for garden work.
  arts: Mira Nardo blends their love for quilting with an appreciation for classic mystery literature, often gathering friends to solve Agatha Christie whodunits while stitching patterns inspired by Georgia
    O'Keeffe's desert palette, and they fill evenings with Bob Dylan vinyl records and occasional visits to the local community theater featuring productions of Shakespearean comedies.
  travel: Mira Nardo plans trips with spreadsheets, favoring leisurely road‑trips to Door County for its cherry orchards, a summer stay on Mackinac Island to explore historic sites, and occasional overseas
    culinary tours to Tuscany, Italy, where they can source heirloom tomatoes for their garden, while budget constraints keep long‑haul travel to a few annual highlights.
  culinary: Mira Nardo delights in curating potluck menus centered around garden‑fresh fare, from heirloom tomato bruschetta and roasted beet and goat‑cheese salad to a signature ratatouille baked with
    zucchini, bell peppers, and fresh basil, and they enjoy experimenting with a sourdough starter while still relying on tried‑and‑true chicken pot pie recipes.
  core: Mira Nardo is a talkative, competition‑driven quality guru who balances meticulous structure with a love for community gatherings, occasionally indulging in impulsive quilting splurges and skipping
    dental appointments while never letting stress disturb their calm demeanor.
background:
  cultural: Mira grew up in a small, predominantly white farming community in Iowa County, Wisconsin. Her family’s roots trace back to German and Irish immigrants who settled the region in the early 1900s.
    Midwestern values of hard work, self‑reliance, modesty, and strong community ties—shaped by church involvement and local county fairs—remain central to her identity.
attributes:
  skills: '["Quality Inspection", "Precision Weighing", "Sampling Procedures", "Statistical Process Control", "Regulatory Compliance (FDA/USDA/OSHA)", "Safety Audits", "Documentation & Reporting", "Equipment
    Calibration", "Team Training & Mentorship", "Data Entry & Spreadsheet Management", "Time Management"]'
  hobbies: '["Potluck Hosting", "Quilting", "Gardening", "Reading Mystery Novels", "Jigsaw Puzzles", "Community Volunteering", "Board Games", "Bowling League", "Local History Museum Tours"]'
  career_goals: Mira aims to advance into a supervisory or lead inspector position where she can shape quality protocols and mentor junior staff. She is pursuing the Certified Quality Inspector (CQI) credential
    and hopes to spearhead a plant‑wide continuous‑improvement initiative. Additionally, she aspires to serve on the company’s safety committee and be recognized as a top performer in productivity and compliance
    metrics.
