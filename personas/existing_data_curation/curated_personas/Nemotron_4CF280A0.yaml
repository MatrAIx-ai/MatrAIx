  hobbies: '[''Hiking'', ''Watercolor painting'', ''Photography'', ''Knitting'', ''Reading poetry and philosophy'', ''Attending local art gallery openings'', ''Listening to art podcasts'', ''Participating
    in small book club'', ''DIY home‑decor projects'', ''Volunteering for community clean‑up'']'
  career_goals: Jody aims to formalize her education by completing a GED and enrolling in evening courses on records management and office administration at a community college. She hopes to transition
    into an office‑manager or community‑information‑coordinator role within Clackamas County government, where she can apply her administrative expertise to support public services. Parallel to this, she
    dreams of curating a small quarterly art showcase that highlights local Portland and Estacada artists, blending her love of art with her organizational strengths. Ultimately, she wants to fuse her administrative
    career with community‑focused creative projects that foster local engagement.
