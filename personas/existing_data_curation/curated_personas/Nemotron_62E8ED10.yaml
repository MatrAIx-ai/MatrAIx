personas:
  professional: Yasmine Duncan, a civil engineer specializing in sustainable flood‑resilient infrastructure, blends their structural analysis expertise with a competitive drive and a love of artistic aesthetics
    to push project teams toward innovative, performance‑based designs despite occasional lapses in meticulous planning.
  sports: Yasmine Duncan channels competitive energy into weekly kayaking sessions with the Buffalo Bayou Paddle Club, attends sunrise yoga at a local studio, and roots for the Houston Astros, Rockets,
    and Texans, while they occasionally join a co‑ed volleyball league for a brief burst of team sport.
  arts: Yasmine Duncan frequents the Menil Collection and Museum of Fine Arts Houston, captures architectural forms through a Leica M series camera, sketches in the style of Matisse, and draws inspiration
    from photographers like Andreas Gursky, while they unwind with a nightly habit of listening to jazz pianist Robert Glasper.
  travel: Yasmine Duncan prefers loosely planned weekend getaways that blend architecture and nature, having explored Austin’s music scene, New Orleans’ historic French Quarter, and a solo trip to Reykjavik
    to study geothermal sustainability, always leaving space for spontaneous detours.
  culinary: Yasmine Duncan, an adventurous home cook, blends Southern comfort with African spice by perfecting dishes like Jollof‑infused gumbo, collard greens with peri‑peri glaze, and shrimp‑and‑grits
    topped with harissa, showcasing moderate culinary skill and a penchant for sourcing fresh produce at farmer’s markets.
  core: Yasmine Duncan is a competitively driven, creatively curious civil engineer who balances demanding flood‑resilient design work with yoga, board games, and experimental fusion cooking, often wrestling
    with disorganization and a deep‑seated drive for sustainable beauty.
background:
  cultural: Yasmine is an African‑American woman raised in Houston’s vibrant Black community, where church, family gatherings, and neighborhood support shaped her values of resilience, solidarity, and pride
    in cultural heritage. She grew up listening to soul, jazz, and hip‑hop, and celebrating traditions such as Juneteenth and Kwanzaa, which reinforced her sense of identity. The rich tapestry of Southern
    Black culture—its storytelling, culinary customs, and community activism—continues to inform her worldview and fuels her commitment to increase representation of Black women in the engineering profession.
attributes:
  skills: '[''Structural Analysis'', ''AutoCAD'', ''Revit (BIM)'', ''Stormwater Management'', ''Sustainable Design'', ''Project Coordination'', ''GIS Mapping'', ''Construction Cost Estimating'', ''Hydraulic
