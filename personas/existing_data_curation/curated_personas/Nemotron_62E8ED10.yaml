  hobbies: '[''Architectural Photography'', ''Visiting Art Galleries'', ''Sketching'', ''Yoga and Meditation'', ''Reading Science Fiction and Engineering Journals'', ''Urban Exploration'', ''Cooking Experimental
    Recipes'', ''Community STEM Mentoring'', ''Kayaking on Buffalo Bayou'', ''Puzzle Solving'', ''Small-Group Board Gaming'']'
  career_goals: Yasmine aims to earn her Professional Engineer (PE) license within the next two years and transition into senior project leadership on large‑scale, flood‑resilient infrastructure projects
    in the Houston region. She aspires to spearhead innovative sustainable design initiatives that blend engineering rigor with artistic aesthetics, eventually founding her own consultancy focused on resilient
    urban development. A parallel ambition is to mentor and advocate for more Black women in engineering, creating pipeline programs and community outreach to reduce the gender and racial gaps in the field.
