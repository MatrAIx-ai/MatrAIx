  career_goals: As he approaches the later stage of his career, Ryan aims to cement a lasting legacy of sustainable growth and inclusive culture at his company. He is focused on guiding a seamless leadership
    transition, expanding the firm’s market presence in emerging regions, and embedding corporate social responsibility—particularly STEM education outreach for underrepresented youth. Additionally, he
    plans to serve on multiple boards, advise start‑ups, and establish a nonprofit foundation that leverages his STEM background to foster community empowerment while ensuring the company continues to thrive
    beyond his tenure.
