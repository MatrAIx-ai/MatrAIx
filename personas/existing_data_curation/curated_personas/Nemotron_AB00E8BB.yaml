  career_goals: Marie aims to progress to a regional sales manager position within the next five years, overseeing a team of sales representatives across the Midwest. She is eager to mentor younger colleagues,
    develop a sales training program tailored to small‑business owners, and achieve a 15% increase in her territory’s revenue. In the longer term, she envisions launching her own consultancy that combines
    her sales expertise with her passion for community development, helping local entrepreneurs thrive while allowing her to work with a more predictable schedule as she ages.
