personas:
  professional: Marie Staley, a veteran sales professional with a talent for weaving storytelling into customer pitches, leverages her CRM expertise, negotiation savvy, and community‑oriented mindset to
    build trust and close deals, while juggling a love for spontaneous problem‑solving and the occasional missed deadline.
  sports: Marie Staley enthusiastically hikes the Ozark Trail on weekends, cheers on the St. Louis Cardinals baseball team, participates in a community walking club that meets thrice weekly, and volunteers
    as a scorekeeper for her local high school’s football games.
  arts: Marie Staley brings Midwestern charm to the community theater stage, delights in quilting circles featuring vintage patterns, absorbs historical fiction from authors like Philippa Gregory, and finds
    inspiration in classic folk singers such as John Denver and folk‑rock band The Avett Brothers.
  travel: Marie Staley prefers spontaneous weekend road trips in her trusty SUV, often heading to the historic river towns of Hannibal and St. Charles, while also planning annual pilgrimages to St. Louis
    archives to trace her family’s genealogy, balancing a modest travel budget with a love for local attractions.
  culinary: Marie Staley excels at cooking hearty Midwestern comfort dishes like chicken pot pie, baked mac and cheese, and honey‑glazed pork chops, often seasoning with fresh herbs from her garden and
    serving generous portions of cornbread and apple crisp to friends and family.
  core: Marie Staley blends a practical sales acumen with a lively social streak, nurturing gardens, quilts, and community theater while balancing a love for structured planning with a penchant for spontaneous,
    occasionally disorganized, adventures.
background:
  cultural: Marie grew up in a small town in Missouri, steeped in Midwestern culture and values. Her family’s roots in the region date back several generations, with a heritage of farming and small‑town
    entrepreneurship. Raised in a Protestant (Methodist) household, she was taught the importance of hard work, self‑reliance, and community service. These influences shape her practical outlook, sociable
    nature, and commitment to local traditions such as county fairs, farmers’ markets, and church gatherings. While she has never married, she maintains close ties with extended family and friends, reflecting
    the tight‑knit social fabric typical of her cultural background.
