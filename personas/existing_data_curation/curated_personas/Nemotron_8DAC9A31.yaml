  hobbies: '[''Custom woodworking'', ''Fishing'', ''Habitat for Humanity volunteer work'', ''Gardening'', ''Reading sustainable building magazines'', ''Listening to classic rock and blues'', ''Community
    bowling league'', ''Craft-beer tasting'', ''Model house building'']'
  career_goals: Raul aims to obtain a general contractor’s license within the next three years to oversee larger renovation projects and streamline subcontracting. He plans to launch a boutique custom‑furniture
    line that merges traditional joinery with reclaimed, eco‑friendly materials, carving out a niche market in St. Clair County. Seeking to deepen his knowledge of green construction, he intends to earn
    LEED Green Associate certification, aligning his curiosity for new methods with his high standards for quality. Long‑term, Raul envisions establishing a small, family‑run construction firm that hires
    and mentors apprentices, providing reliable, stress‑reduced services to the local community while securing financial stability for his household.
