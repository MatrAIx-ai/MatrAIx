personas:
  professional: Raul Bragg, a 39‑year‑old master carpenter, merges disciplined project scheduling and precise blueprint interpretation with a curiosity for sustainable building methods, leading small crews
    assertively while hand‑crafting reclaimed‑wood furniture that reflects both tradition and eco‑innovation, and they balance practicality and new ideas in every job.
  sports: Raul Bragg competes in a local bowling league with the St. Clair Strikers, follows the Chicago Cubs and Bears avidly, spends quiet weekends casting a line on the Kaskaskia River, and they blend
    low‑key fitness with community sports enthusiasm.
  arts: Raul Bragg unwinds after work by listening to classic rock legends like Led Zeppelin, blues masters such as B.B. King, and perusing Architectural Digest and Fine Homebuilding magazines, and they
    let the rhythms and design ideas shape both his creative projects and personal aesthetic.
  travel: Raul Bragg enjoys weekend road trips to Chicago for live blues shows and craft‑beer festivals, annual pilgrimages to the Asheville Furniture Fair for reclaimed‑wood inspiration, dreams of a future
    study tour of eco‑friendly architecture in Copenhagen and Portland, and they relish each journey as both a professional research mission and a personal escape.
  culinary: Raul Bragg favors grilling smoked pork ribs with a side of roasted beet and kale salad, brewing robust coffee at his custom coffee table, savoring a cold local IPA, occasionally indulging in
    a homemade mushroom risotto made with garden‑fresh herbs, and they consider each meal a blend of craftsmanship and comfort.
  core: Raul Bragg is a disciplined, eco‑focused carpenter who balances meticulous project management with solitary fishing, occasional craft‑beer indulgence, and a persistent tendency to over‑worry, and
    they often channel that anxiety into perfect joinery.
background:
  cultural: Raul grew up in a modest, working‑class family in the Greater St. Clair County area of Illinois. Of German‑Polish ancestry, his upbringing reflects Midwestern values of hard work, modesty, and
    strong community ties. He was raised in a Protestant environment, attending a local Methodist church, and participated in regional traditions such as county fairs, high‑school football games, and neighborhood
    potlucks. These cultural roots reinforced his practical mindset, sense of responsibility, cooperative spirit, and appreciation for straightforward communication and problem‑solving.
attributes:
  skills: '[''Framing'', ''Finish carpentry'', ''Cabinet making'', ''Blueprint reading'', ''Project budgeting'', ''Material estimation'', ''Timeline scheduling'', ''Tool maintenance'', ''Safety compliance'',
