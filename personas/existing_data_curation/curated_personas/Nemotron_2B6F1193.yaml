personas:
  professional: Nella Galvez, an aspiring junior game developer and budding fantasy writer, blends curiosity about coding with a practical habit of documenting every project in a detailed journal, allowing
    them to turn imaginative story ideas into simple Unity scripts while reliably meeting school deadlines.
  sports: Nella Galvez enjoys low‑impact fitness through weekly hikes on the Pine Hill Nature Preserve and weekend bird‑watching walks, follows the local Riverside Raptors high‑school soccer team with quiet
    enthusiasm, and participates in the youth hiking club that meets after school, while rarely playing organized team sports themselves.
  arts: Nella Galvez immerses themselves in creative expression by sketching wildlife scenes inspired by the works of wildlife artist Thomas Mangelsen, listening to pianist Yiruma and game composer Yoko
    Shimomura while practicing piano, and reading fantasy authors like Brandon Sanderson and N.K. Jemisin, all of which shape their own short stories and digital paintings in Procreate.
  travel: Nella Galvez prefers thoughtfully planned solo trips, having explored the redwoods of Yosemite National Park and the historic streets of Edinburgh during family vacations, they dream of trekking
    Iceland’s waterfalls and visiting the cherry‑blossom gardens of Kyoto while budgeting carefully to keep travel costs within their savings goal.
  culinary: Nella Galvez loves cooking with fresh herbs from their garden, often whipping up basil pesto pasta, herb‑infused lemonades, and simple miso soup, they have a modest skill level but relish experimenting
    with new spice blends and occasionally over‑season a dish, leading to a habit of tasting and adjusting multiple times before serving.
  core: Nella Galvez, a quiet 14‑year‑old with a penchant for solitary creativity, channels their stress‑prone imagination into sketchbooks, code, and garden herbs while meticulously budgeting every spare
    cent.
background:
  cultural: Nella comes from a middle-class, white American family in the suburban community of Horsham, Pennsylvania. Her upbringing reflects the values common in this region - emphasis on education, community
    involvement, and participation in local traditions such as seasonal festivals and volunteer activities at the public library. The area’s historical ties to Quaker and colonial heritage provide a backdrop
    of modesty and civic responsibility that her family upholds. She attends a local public middle school where she benefits from a curriculum that encourages both academic rigor and extracurricular exploration.
    Family life includes regular visits to nearby parks and nature centers, fostering her appreciation for the environment. While her cultural environment is largely mainstream American, she also experiences
    the nuanced expectations of suburban life, such as strong focus on academic achievement and polite social norms.
attributes:
