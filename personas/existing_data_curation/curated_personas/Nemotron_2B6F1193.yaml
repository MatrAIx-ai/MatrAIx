  hobbies: '[''Reading fantasy and sci-fi novels'', ''Creative writing and journaling'', ''Sketching and digital illustration'', ''Basic coding projects'', ''Nature walks and bird-watching'', ''Gardening
    herbs and flowers'', ''Playing piano'']'
  career_goals: She hopes to pursue a career that marries her love of solitary, focused work with her curiosity about the natural world. Nella is drawn to environmental science, particularly marine biology
    or conservation research, where she can conduct field studies and data analysis. She also entertains the idea of becoming a software developer or data analyst, motivated by the practical impact of coding
    solutions. In the long term, she envisions a role that allows her to work independently while contributing to solutions for climate change or biodiversity loss. She aims to attend a rigorous high school,
    earn a STEM scholarship, and eventually enroll in a university program that emphasizes research and hands-on experience.
