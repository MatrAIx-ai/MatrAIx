personas:
  professional: Lee Frank is an aspiring multimedia creator who blends hand‑drawn sketches, digital illustration, and short‑form video production; they bring a spontaneous, collaborative style to community
    art workshops and skate‑park events.
  sports: Lee Frank frequents the Maricopa Skate Club to perfect ollies and kickflips, joins friends for weekend pickup basketball games cheering the Phoenix Suns, and escapes the desert heat with early‑morning
    hikes along the Sonoran Trail; they balance high‑energy street sports with regular cardio and a love for the outdoors.
  arts: Lee Frank immerses in a blend of visual and auditory influences, echoing the bold lines of Studio Ghibli, the narrative richness of Shaun Tan’s graphic novels, and the sonic vibes of Tame Impala
    and Arctic Monkeys; they channel this eclectic mix into hand‑drawn sketches, digital illustrations, and DIY music recordings.
  travel: Lee Frank embraces spontaneous road trips, having driven with friends to the red‑rock sunsets of Sedona and the starry expanses of Grand Canyon National Park, while dreaming of an indie‑culture
    pilgrimage to Tokyo’s Akihabara district and a desert photography expedition to Morocco’s Sahara; they balance a teen budget with a craving for off‑beat adventures.
  culinary: Lee Frank’s palate gravitates toward bold Southwestern flavors, regularly whipping up homemade fish tacos with fresh cilantro, lime, and chipotle mayo, while also experimenting with simple sushi
    rolls and mastering a reliable avocado‑toast breakfast topped with crushed red pepper flakes; they enjoy cooking as a creative outlet between art projects.
  core: Lee Frank blends boundless creative curiosity with a skate‑park hustle, turning spontaneous ideas into digital art and music while juggling teen‑budget impulsivity and a relentless drive to mentor
    fellow youth.
background:
  cultural: Lee grew up in Maricopa, a rapidly expanding suburb of the Phoenix metropolitan area in Pinal County, Arizona. His family is of European-American descent, reflecting the predominant white demographic
    of the region, and they value self-reliance, community involvement, and a practical work ethic. The desert environment, with its open spaces and striking sunsets, has shaped his aesthetic sensibilities,
    while the nearby urban art scene of Phoenix exposes him to street art, music festivals, and multicultural events. Although his primary cultural identity is rooted in mainstream American teenage culture,
    he regularly encounters Hispanic and Native-American influences through local festivals, food, and community gatherings, which broaden his appreciation for diverse artistic expressions.
