  career_goals: Lee wants to earn his GED within the next year and then enroll in a community-college program or a boot-camp focused on digital media, graphic design, and interactive art. He aims to build
    a strong portfolio of visual and multimedia work that will enable him to secure freelance gigs creating social-media content, promotional videos, and graphic assets for local businesses. In the long
    term, he envisions launching his own independent studio that blends digital illustration, short-form video, music production, and community-focused art events, while also mentoring other youth interested
    in creative technology.
