persona_description: A teacher at Seneca Central Public School who teaches Grade 2/3 students about the history of black people in Canada, including key figures, the Underground Railway, and the role of
  Canada in the Civil Rights Movement. The teacher uses a cross-curricular approach to integrate these lessons into the curriculum, and encourages students to self-reflect on their own words and actions
  to promote positive change. The teacher also presents to students at other schools, bringing the local history of the Underground Railway to life through speech, video, and song.
