  hobbies: '[''Gardening (balcony herbs and flowers)'', ''Traditional Puerto Rican cooking'', ''Listening to salsa, plena, and bolero music'', ''Coastal walks and birdwatching'', ''Knitting and crocheting'',
    ''Reading mystery novels'', ''Journaling for stress management'', ''DIY home décor projects'']'
  career_goals: Looking ahead, Dangely aims to transition from full‑time housekeeping to a low‑stress, mentorship‑focused role. She plans to earn a Certified Professional Cleaner credential that emphasizes
    green‑cleaning practices, satisfying her curiosity while remaining practical. With her associate’s degree, she intends to take a short business‑administration course to handle bookkeeping for a boutique
    cleaning service she hopes to launch for senior citizens in the Guaynabo area. This service would combine cleaning with companionship, allowing her to use her compassionate nature while setting clear
    boundaries to protect her wellbeing. Additionally, she wants to train younger workers, sharing her decades‑long expertise and encouraging them to adopt both proven techniques and innovative, eco‑friendly
    tools. By keeping her schedule flexible, she hopes to reduce stress, preserve her health, and have more time for her family and personal interests.
