personas:
  professional: A community art facilitator, Shametra Harrison leverages her keen visual‑analysis, storytelling, and volunteer coordination skills to lead senior art workshops, guide museum docent tours,
    and preserve oral histories, all while navigating a relaxed, flexible approach that sometimes leads to loosely organized schedules.
  sports: A leisurely fitness enthusiast, Shametra Harrison enjoys walking the Ohio River Trail, participates in a local senior walking club, follows the Louisville Cardinals men’s basketball and the Cincinnati
    Bengals, and occasionally joins the community’s intramural pickleball league during the spring, favoring low‑impact activities over high‑intensity sports.
  arts: A devoted art lover, Shametra Harrison spends weekends exploring the Jeffersonville Historic Museum and nearby galleries, drawing inspiration from masters such as Georgia O’Keeffe, Claude Monet,
    and the vibrant prints of Yayoi Kusama, while her choir rehearsals echo the gospel harmonies of Mahalia Jackson and the jazzy improvisations of John Coltrane, all of which shape her watercolor sketches
    and community storytelling.
  travel: A reflective traveler, Shametra Harrison prefers relaxed, self‑guided road trips that blend cultural immersion with comfortable pacing, having visited New Orleans for its jazz heritage, Savannah’s
    historic squares, and the Chicago Art Institute, while dreaming of a fall train journey to Montreal’s International Jazz Festival and a summer getaway to the Great Smoky Mountains, all funded within
    a modest budget that balances senior discounts and occasional splurges on unique postcards.
  culinary: A culinary storyteller, Shametra Harrison blends Southern soul food with Midwestern comfort in dishes like shrimp and grits with collard greens, cheddar‑stuffed tater tots, smoked turkey cornbread,
    and sweet potato casserole topped with pecans, skillfully using ingredients such as okra, cheddar, and pantry staples like molasses, while often improvising recipes during her garden harvest seasons.
  core: An empathetic cultural archivist, Shametra Harrison balances a love for community art and storytelling with a relaxed, occasionally scatter‑brained approach that fuels spontaneous creativity yet
    sometimes leaves schedules in gentle disarray.
background:
  cultural: Shametra is a lifelong resident of Jeffersonville, Indiana, raised in an African‑American family with deep roots in the local church and community. Growing up during the civil‑rights era, she
    witnessed both the challenges and the resilience of Black Midwestern neighborhoods. Family traditions blend Southern culinary flavors—such as collard greens and cornbread—with Midwestern staples like
    pork tenderloin and sweet corn. She actively participates in church gatherings, local Juneteenth celebrations, and community art projects that honor Black heritage. Her appreciation for African‑American
    visual art, music, and storytelling reflects her cultural lineage and continues to shape her worldview.
attributes:
  skills: '["Art appreciation", "Informal art curation", "Oral history collection", "Community event coordination", "Volunteer management", "Basic digital literacy", "Storytelling", "Cooking traditional
    Southern and Midwestern dishes", "Gardening", "Knitting and crochet", "Conflict mediation", "Active listening"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Reading art history and biographies", "Knitting", "Gardening", "Cooking family recipes", "Listening to jazz and blues", "Singing
    in church choir", "Collecting vintage postcards", "Walking along the Ohio River trail"]'
  career_goals: Shametra hopes to deepen her engagement with the arts by volunteering as a docent at the nearby museum and by leading a weekly community‑art workshop for seniors. She plans to enroll in
    a part‑time art‑history course at a local community college to formalize her knowledge. A long‑term ambition is to compile a photo‑and‑story anthology documenting the experiences of African‑American
    families in Jeffersonville, which she would like to publish as a community legacy. She also envisions mentoring younger adults who share her curiosity for unconventional ideas and cultural expression.
