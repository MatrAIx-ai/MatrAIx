personas:
  professional: Natalie Stewart, a 17‑year‑old aspiring graphic designer, leverages their curiosity and competitive streak to master digital illustration in Procreate, experiment with Python‑based generative
    art, and meticulously manage a portfolio timeline, all while aiming for an internship at a Fort Collins design studio.
  sports: Natalie Stewart, an avid hiker and occasional climber, tackles the foothills around Fort Collins on weekends, volunteers with the Mountain Trails Hiking Club, follows the Colorado Rockies, Denver
    Broncos, and Colorado Avalanche, and attends local soccer matches with a small group of friends.
  arts: Natalie Stewart, a passionate sketcher of Colorado landscapes, frequently visits gallery openings at the Art House and Bolder Media, draws inspiration from indie folk artists like Sufjan Stevens,
    Phoebe Bridgers, and acoustic singer Iron & Wine, and admires visual creators such as Lisa Congdon and the animation studio Studio Ghibli.
  travel: Natalie Stewart, a meticulous planner, prefers weekend road trips to nearby natural wonders like Rocky Mountain National Park and Moab, budgets carefully for a future solo journey to Kyoto to
    explore Japanese design culture, and uses their bullet‑journal to balance travel aspirations with school responsibilities.
  culinary: Natalie Stewart, an experimental home cook, enjoys crafting quinoa bowls with roasted beets, feta, and dill, prepares smoky chipotle avocado toast, perfects grilled Colorado trout with lemon
    zest, and often pairs meals with craft‑brew IPA or homemade kombucha.
  core: Natalie Stewart, a self‑critical teen with a love for sketching mountain vistas, channels anxiety into disciplined creative practice while occasionally succumbing to impulsive art‑supply splurges.
background:
  cultural: Natalie grew up in a middle‑class white American family in Fort Collins, Colorado. Her upbringing blends suburban values with the outdoors‑oriented lifestyle of the Front Range, where hiking,
    biking, and appreciation for the Rocky Mountains are common. The city’s vibrant arts scene, craft‑brew culture, and progressive community initiatives have shaped her exposure to contemporary music,
    visual arts, and environmental awareness, while her school and local youth programs reinforced a focus on personal responsibility and self‑directed learning.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Basic photo editing (Adobe Photoshop)'', ''Strategic gaming (chess, Settlers of Catan)'', ''Research and information synthesis'', ''Project planning'',
    ''Basic Python programming'', ''Observational drawing'', ''Critical thinking'', ''Time management'']'
  hobbies: '[''Sketching'', ''Hiking'', ''Listening to indie folk music'', ''Reading speculative fiction'', ''Playing chess'', ''Digital art experimentation'', ''Visiting art galleries'', ''Journaling'']'
  career_goals: Natalie plans to obtain her GED within the next year and then enroll in a community‑college program in graphic design and digital media. She aims to build a professional portfolio of illustration,
    photography, and UI concepts, secure an internship at a local design studio, and eventually work as a freelance concept artist or creative director for video‑game or interactive media projects. Alongside
    her creative ambitions, she hopes to volunteer with youth mental‑health outreach programs to share coping strategies she has learned through journaling and self‑reflection.
