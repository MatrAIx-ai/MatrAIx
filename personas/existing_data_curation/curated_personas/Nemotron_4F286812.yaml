  career_goals: Eric dreams of a future where he can help others while working within clear routines. He is drawn to becoming a firefighter because of the structured training and the chance to protect his
    community. He also imagines exploring the ocean as a marine biologist, appreciating the predictable scientific methods and his love for the beach. Additionally, he likes the idea of being a teacher
    or a youth soccer coach, where he can guide peers, maintain a supportive environment, and use his sociable, cooperative strengths.
