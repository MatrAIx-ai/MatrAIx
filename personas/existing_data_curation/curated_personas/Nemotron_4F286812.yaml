personas:
  professional: Eric Trujillo is an enthusiastic elementary school collaborator who channels his love for group projects and structured LEGO builds into leading class activities, often juggling the role
    of informal team captain while occasionally forgetting to bring his homework.
  sports: Eric Trujillo charges onto the field for the Laguna Beach Youth Soccer Club, cheering for the LA Galaxy, and swaps his cleats for a basketball during winter, yet his relaxed attitude toward schedules
    sometimes leads to missed practices.
  arts: Eric Trujillo immerses himself in the colorful worlds of The LEGO Movie, Pixar's Finding Nemo, and the adventurous beats of Imagine Dragons, while devouring adventure series such as Harry Potter,
    letting these influences fuel his elaborate LEGO constructions.
  travel: Eric Trujillo spends weekends exploring Laguna Beach tide pools and dreaming of future trips to Disneyland, the Grand Canyon, and the neon‑lit streets of Tokyo’s teamLab Borderless museum, preferring
    hands‑on adventures over long flights.
  culinary: Eric Trujillo loves scooping cheesy mac and cheese, devouring pepperoni pizza with extra mozzarella, and munching fish tacos garnished with cilantro and lime, while proudly concocting banana‑mango
    smoothies for after‑school snacks.
  core: Eric Trujillo combines boundless energy with a love for structure, constantly juggling group fun and personal projects, yet often leaves a trail of LEGO bricks and half‑finished homework behind.
background:
  cultural: Eric grows up in a middle‑class, suburban environment in Laguna Niguel, Orange County, California. His family background is primarily of European descent, reflecting a typical white American
    cultural heritage. The coastal Southern California setting influences his love for the outdoors, beach activities, and a community‑oriented lifestyle. He participates in local traditions such as neighborhood
    block parties, school field trips to the beach, and seasonal celebrations, which blend the region's relaxed, collaborative ethos with values of kindness, cooperation, and respect for structure that
    are emphasized at home and school.
