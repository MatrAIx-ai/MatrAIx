persona_description: A historian with a particular interest in the history of witchcraft in the 17th century, especially in the Salem Witchcraft Trials. They are knowledgeable about the statistical decline
  in violence over the centuries and the brutal reality of the 1692/93 trials. They have a strong background in the Puritan mindset in Massachusetts and the influence of religious zeal in causing the outbreak
  of witchcraft accusations. They are interested in the differences between colonial colonial New England and European witchcraft beliefs and the impact of legal systems and superstition on the escalation
  of the trials.
