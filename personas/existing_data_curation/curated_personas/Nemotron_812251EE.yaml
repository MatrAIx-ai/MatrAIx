personas:
  professional: Kathryn Herndon is a budding kindergarten helper who loves arranging play‑time activities, using her curiosity and practicality to sort blocks by color while keeping the group harmonious,
    and her compassionate nature makes her the go‑to friend for anyone feeling left out.
  sports: Kathryn Herndon is a lively member of the San Angelo Little League tee‑ball team, cheering for the Dallas Cowboys on Sundays, and she enthusiastically joins preschool recess games of tag and tumble‑tussle,
    yet she often pauses at the top of the slide to make sure it’s safe, reflecting her balance of energetic drive and careful caution.
  arts: Kathryn Herndon loves splashing colors on paper with crayons, dancing to the twang of country singers like Willie Nelson and the pop energy of Taylor Swift, and she delights in church choir rehearsals
    where her compassionate heart shines, though she sometimes spills paint on her favorite dress and giggles about it.
  travel: Kathryn Herndon enjoys family road trips to the Texas State Fair in Dallas and beach days at Corpus Christi, dreaming of a future visit to the Grand Canyon, and she prefers the excitement of spotting
    new plants on the car ride over the fatigue of long flights, though she sometimes gets anxious about being away from her favorite stuffed rabbit.
  culinary: Kathryn Herndon favors crunchy chicken fried steak bites, cheesy nachos with jalapeños, and sweet pecan pie at holiday gatherings, she proudly mixes batter for pancakes, but she has a quirky
    habit of sprinkling extra cinnamon on everything, even on her apple slices, and often forgets to wipe her sticky hands.
  core: Kathryn Herndon is an endlessly curious, worry‑prone four‑year‑old who balances a love for group play and caring for friends with a habit of over‑organizing her stuffed‑animal collection.
background:
  cultural: Kathryn is raised in a white, Anglo‑American family in San Angelo, Texas. Her family values hospitality, close community ties, and regular participation in local church activities. They celebrate
    holidays such as Thanksgiving, Christmas, and the Fourth of July with family barbecues, picnics, and attendance at county fairs and rodeos. Her preschool incorporates regional stories and simple Texas
    history, giving her a gentle sense of her cultural heritage while nurturing her sociable and compassionate nature.
