  hobbies: '[ ''Art Gallery Visits'', ''Mexican Cooking and Fusion Cuisine'', ''Gardening'', ''DIY Crafting (Painting, Knitting, Upcycling)'', ''Reading (Art, Philosophy, Non‑fiction)'', ''Photography'',
    ''Journaling'', ''Small Book Club Participation'', ''Yoga/Meditation'', ''Spanish Literature Reading'' ]'
  career_goals: Erandi aims to translate her organizational strengths and cultural fluency into a part‑time role that supports the local arts community, such as an administrative coordinator for a nonprofit
    gallery or cultural festival. She plans to complete her associate degree in Business Administration or earn a certificate in Event Management to formalize her expertise. Long‑term, she envisions launching
    a modest home‑based business crafting and selling decorative items that blend Mexican folk motifs with contemporary design. Volunteering at community cultural events is a current priority, with the
    ambition to eventually assume a leadership position that shapes programming and outreach. Throughout, she seeks a balanced life that honors her family responsibilities while providing meaningful, creative
    contributions to her community.
