personas:
  professional: Ni Yum is a retired administrative assistant who has channeled her meticulous budgeting, event‑planning acumen, and Mandarin fluency into leading senior wellness workshops, where their disciplined,
    structured approach ensures every program runs on schedule and meets their exacting standards.
  sports: Ni Yum enjoys gentle fitness activities such as strolling through the Seattle Arboretum, participating in the Seattle Senior Tai Chi Association’s weekly sessions, and they cheer on the Seattle
    Mariners during spring training and the Seattle Seahawks in the fall, while avoiding high‑impact aerobics that aggravate their knee arthritis.
  arts: Ni Yum devotes time to traditional brush calligraphy, finds inspiration in the brushwork of classical masters, attends local cultural festivals featuring traditional music, and they also appreciate
    the impressionist paintings of Monet and the symphonies of Beethoven, allowing artistic expression to balance their structured routine.
  travel: Ni Yum favors thoughtfully planned trips, taking day excursions to the nearby Olympic National Park, having enjoyed a guided pilgrimage to Kyoto’s historic temples, and they dream of a leisurely
    culinary tour of Tuscany’s vineyards, all while arranging accommodations that accommodate their mobility and budget constraints.
  culinary: Ni Yum is a skilled home cook who prepares elaborate holiday meals such as braised pork belly with star‑anise, steamed dumplings filled with pork and chives, and moon‑cake variations featuring
    lotus‑seed paste, often seasoning with ginger, soy sauce, and Sichuan pepper, and they delight in pairing dishes with high‑quality jasmine tea.
  core: Ni Yum is a disciplined, community‑focused elder whose love for gardening, calligraphy, and gentle movement is tempered by a tendency toward anxiety and a habit of over‑organizing every aspect of
    their life.
background:
  cultural: Ni Yum is a second‑generation Chinese‑American who grew up in the vibrant East Asian community of Santa Clara County. Bilingual in English and Mandarin, she embraces both the customs of her
    heritage—such as Lunar New Year celebrations, ancestor worship, and traditional culinary practices—and the values of her Californian upbringing. Her cultural identity informs her love for cooking, calligraphy,
    and community service, and she often shares these traditions with neighbors and local senior groups.
attributes:
  skills: '[''Organizational planning'', ''Budget management'', ''Community event coordination'', ''Mandarin translation'', ''Traditional Chinese cooking'', ''Raised‑bed gardening'', ''Basic computer tutoring'',
