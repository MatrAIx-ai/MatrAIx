  hobbies: '[''Vegetable gardening'', ''Chinese calligraphy'', ''Traditional cooking'', ''Park walking'', ''Cultural festival attendance'', ''Weekly Tai Chi'', ''Historical fiction reading'', ''Jigsaw puzzles'',
    ''Reflective journaling'']'
  career_goals: Although officially retired, Ni Yum aims to continue contributing to her community by establishing a senior wellness workshop that combines gentle Tai Chi, mindfulness, and structured journaling
    to help peers manage anxiety. She also aspires to compile a family cookbook that preserves traditional recipes and cultural stories, and to mentor younger volunteers in event planning and financial
    stewardship. Her long‑term ambition is to serve on the advisory board of the local senior center, ensuring programs remain organized, inclusive, and culturally resonant.
