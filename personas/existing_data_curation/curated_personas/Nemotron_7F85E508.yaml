    Communication (English, Urdu/Hindi)'']'
  hobbies: '[''Cooking (South Asian and Fusion Cuisine)'', ''Yoga and Mindfulness'', ''Beach Walks'', ''Gardening'', ''Reading (Fiction & Educational Non‑Fiction)'', ''Volunteering at Cultural Festivals'',
    ''Dance (Bollywood & Zumba)'', ''Travel and Exploring New Places'']'
  career_goals: Apeksha aspires to advance to a Director of Early Childhood Services role within Hillsborough County, where she can shape district‑wide policies that embed inclusive, culturally responsive
    curricula. She plans to pursue a Master's degree in Education Leadership to deepen her strategic expertise, expand her network of community partners, and secure funding for innovative pilot programs.
    Long‑term, she envisions establishing a family‑run multicultural preschool that serves as a model for integrating South Asian cultural values with American educational standards, while also speaking
    at national conferences on early‑learning best practices.
