    coordination'', ''Travel arrangement'', ''Inventory tracking'']'
  hobbies: '[''Reading (historical fiction, personal development)'', ''Journaling'', ''Gardening'', ''Baking'', ''Walking/hiking in local parks and coastal trails'', ''Volunteer work at the community library'',
    ''Board game nights with close friends'', ''Coffee outings at local cafés'']'
  career_goals: Alexandra aims to advance from her current role as an administrative assistant to a supervisory position such as Office Manager or Executive Administrator within the next three to five years.
    She plans to earn the Certified Administrative Professional (CAP) credential and complete a part‑time associate degree in Business Administration. Her long‑term ambition is to transition into project
    coordination or operations management, where she can apply her organizational strengths and methodical approach to larger‑scale initiatives. She also seeks to develop leadership skills by taking on
    mentorship responsibilities for new staff and participating in professional development workshops.
