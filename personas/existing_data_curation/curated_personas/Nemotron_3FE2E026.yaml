  career_goals: As a project management specialist with a passion for the arts, Shannon aims to advance to senior project manager within the next three years, leading larger, cross‑disciplinary initiatives
    that bridge cultural programming and business objectives. She plans to earn her Project Management Professional (PMP) certification and pursue a master’s degree in Arts Administration or Public Management
    to deepen her expertise in cultural project leadership. Ultimately, she aspires to become a program director for a museum, arts nonprofit, or creative agency, shaping inclusive, community‑focused projects
    that celebrate diverse artistic expressions while delivering measurable impact. She also hopes to mentor junior colleagues and champion sustainable, ethically responsible project practices.
