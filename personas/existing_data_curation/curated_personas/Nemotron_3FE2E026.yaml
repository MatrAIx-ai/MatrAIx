personas:
  professional: Shannon Angeles is a project management specialist who blends agile rigor with a curatorial eye, leveraging their curiosity and knack for balancing structure with creative flexibility, and
    they excel at orchestrating cross‑functional cultural initiatives while championing inclusive collaboration.
  sports: Shannon Angeles fuels their fitness routine with weekend rides along the Savannah River Greenway as a member of the Savannah Cycling Club, weekly yoga sessions, and enthusiastic support for the
    Savannah Bananas baseball team, while they also follow the Atlanta Braves during spring training.
  arts: Shannon Angeles immerses themselves in the arts by sketching in a weathered notebook, curating pop‑up exhibitions featuring works inspired by Kehinde Wiley and Yayoi Kusama, devouring contemporary
    novels by Sally Rooney and poetry by Ocean Vuong, capturing spontaneous street moments with a Leica M6, and they unwind to the soulful sounds of St. Paul and The Broken Bones.
  travel: Shannon Angeles prefers spontaneous city breaks that combine live‑music immersion and culinary exploration, having visited Nashville’s honky‑tonk scene, Austin’s South Congress art district, and
    Charleston’s historic waterfront, while they dream of future trips to Portland’s indie galleries and the misty cliffs of Ireland.
  culinary: Shannon Angeles delights in seasonal Southern cooking, expertly whipping up shrimp and grits with smoked paprika, baking peach cobbler infused with bourbon, tossing collard greens with smoked
    turkey, and they experiment with heirloom tomatoes, fresh herbs from their balcony garden, and bourbon‑infused caramel sauces.
  core: Shannon Angeles balances a meticulous project schedule with spontaneous sketching sessions, finds solace in late‑night coffee and yoga, occasionally forgets to water their balcony herbs, and they
    embody a curious, art‑driven pragmatist who thrives on creative flexibility.
background:
  cultural: Shannon was raised in a middle‑class family in the Augusta metropolitan area, where Southern hospitality and a strong sense of community shaped her values. Her white ethnic background reflects
    a blend of Anglo‑American heritage, with family roots tracing back to Irish and German ancestors. Growing up, she was exposed to the region’s rich cultural traditions—annual festivals, gospel music,
    and Southern cuisine—while her parents encouraged an appreciation for the arts and liberal education. Her undergraduate studies in humanities at a liberal‑arts college broadened her worldview, exposing
    her to global literature, philosophy, and visual arts. This combination of Southern cultural grounding and academic immersion has fostered an inclusive outlook, a respect for diverse narratives, and
    a commitment to using her project management skills to support community‑oriented creative initiatives.
