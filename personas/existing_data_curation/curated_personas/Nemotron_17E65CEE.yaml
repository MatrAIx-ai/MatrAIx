  career_goals: Looking ahead, Maria hopes to become a bilingual community advocate who preserves and promotes Puerto Rican heritage in Paterson. She aspires to master both Spanish and English, develop
    artistic talents—particularly singing and dancing to traditional music—and eventually pursue a career that merges cultural advocacy with creative expression, such as a cultural program coordinator or
    performing artist. Practical stability is also important to her, so she aims to achieve a solid education that will enable her to support her family and give back to her community.
