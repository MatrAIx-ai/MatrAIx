personas:
  professional: A newborn with a budding curiosity for cause-and-effect, Maria Mendez already shows a practical streak by carefully exploring sensory toys, and they seem to balance spontaneous exploration
    with a measured approach that hints at future problem‑solving talent.
  sports: A newborn who loves stroller‑walks in Paterson's Garret Mountain Park, Maria Mendez is already part of a baby swim class at the local community center, and they cheer on the New York Yankees and
    follow the New Jersey Nets' games with family outings.
  arts: A newborn soothed by the rhythmic beats of bomba and plena during family gatherings, Maria Mendez is introduced to the melodies of Celia Cruz and the poetry of Julia de Burgos, and they often hum
    along, revealing an early appreciation for cultural arts.
  travel: A newborn who has already visited relatives in San Juan during a family vacation and taken a weekend trip to the Jersey Shore, Maria Mendez enjoys the mix of bustling ports and quiet beachside
    stays, and they often gaze curiously at new surroundings while parents plan future trips to the Caribbean.
  culinary: An infant whose senses are drawn to the aroma of sofrito simmering in the kitchen, Maria Mendez delights in tasting mashed sweet potatoes flavored with a hint of garlic and cilantro, and they
    show a budding palate for mofongo and arroz con gandules as family meals unfold.
  core: Maria Mendez is a newborn whose bright curiosity is tempered by a natural caution, soaking up familial traditions while navigating early worries and spontaneous bursts of exploration.
background:
  cultural: Maria is raised in a close‑knit Puerto Rican family in Paterson, New Jersey. Spanish is spoken at home, and cultural traditions such as celebrating San Juan Baptista, preparing mofongo and arroz
    con gandules, and dancing to bomba and plena are integral to daily life. The community emphasizes familial loyalty, bilingualism, and pride in the island's heritage, shaping her emerging identity and
    influencing her interests, values, and aspirations.
