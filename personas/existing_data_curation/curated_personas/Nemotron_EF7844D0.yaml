personas:
  professional: Mayli Perez, a budding student event coordinator, leverages their meticulous organization and disciplined reading habit to lead school fundraiser planning committees, while their sociable
    nature ensures inclusive teamwork and high standards.
  sports: Mayli Perez, a forward for the Riverside Rangers youth soccer club, drills after school with teammates, routinely watches the Los Angeles Galaxy matches for tactics, and maintains fitness by joining
    the school’s spring track team and practicing folklorico dance as a cross‑training routine.
  arts: Mayli Perez, an enthusiastic pianist and folklorico dancer, relaxes by playing Yiruma’s 'River Flows in You' on the piano, performs traditional dances at community festivals, devours mystery novels
    by R.L. Stine, and crafts friendship bracelets while humming tunes from Disney’s 'Moana' soundtrack.
  travel: Mayli Perez prefers meticulously planned weekend trips, having organized family road trips to the Grand Canyon and a summer visit to San Diego’s zoo, they dream of exploring Kyoto’s cherry blossoms
    and hope to save enough allowance for a future study‑abroad exchange in Barcelona.
  culinary: Mayli Perez, an eager kitchen assistant, loves helping prepare tamales with masa, pork, and roasted red chili sauce, rolls enchiladas filled with shredded chicken and cheese, delights in making
    fresh guacamole with avocado, lime, and cilantro, and counts a banana‑cinnamon smoothie after piano practice among their favorite snacks.
  core: Mayli Perez is a disciplined, routine‑loving 11‑year‑old who balances school leadership, soccer, dance, and piano, yet often frets over small details and forgets to eat lunch when caught up in a
    project.
background:
  cultural: Mayli is a Mexican‑American growing up in San Antonio's vibrant Bexar County community. She is bilingual, speaking Spanish at home and English at school, and embraces Mexican traditions such
    as Día de los Muertos, Cinco de Mayo celebrations, and attending a local Catholic church. Her family places strong emphasis on communal values, respect for elders, and preserving heritage through music,
    dance, and cuisine. This cultural immersion shapes her sense of identity, love for community involvement, and dedication to honoring her roots while thriving in a diverse Texan environment.
attributes:
  skills: '["Organizational planning","Bilingual communication (Spanish/English)","Leadership in group projects","Mathematics proficiency","Reading comprehension","Beginner piano","Folklorico dance"]'
