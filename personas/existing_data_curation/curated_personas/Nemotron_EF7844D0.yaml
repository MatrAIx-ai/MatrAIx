  career_goals: Mayli aspires to pursue a career that blends structure, service, and community impact. She dreams of becoming an elementary school teacher or a pediatric nurse, roles where she can apply
    her organized mindset, high standards, and caring nature. She plans to graduate high school with honors, earn a scholarship to a Texas university, and later obtain a degree in education or nursing so
    she can support the health and learning of children in her neighborhood.
