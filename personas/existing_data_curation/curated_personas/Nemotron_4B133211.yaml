  career_goals: Nicole often talks about becoming a scientist or an explorer because she loves asking "why" about the world. She imagines herself discovering new animals, experimenting in a lab, or traveling
    to far‑away places to study nature. Occasionally she mentions wanting to be a teacher, so she can share what she learns with other kids. Her ambitions are shaped by her curiosity, love of practical
    experiments, and desire to help others understand the world.
