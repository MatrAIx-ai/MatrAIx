personas:
  professional: Nicole Allman, a six‑year‑old budding LEGO architect, blends their curious love of building intricate brick structures with a practical eye for stability, often crafting elaborate towers
    while happily ignoring tidy‑up rules.
  sports: Nicole Allman, a six‑year‑old who loves ice skating at the local rink in winter and cheering for the Minnesota Wild, occasionally participates in a youth hockey club, prefers solo nature walks
    to team sports, and keeps a small collection of Minnesota Twins baseball cards.
  arts: Nicole Allman, a six‑year‑old who delights in coloring nature scenes to the soundtrack of Raffi’s Baby Beluga and watching Mister Rogers, often mimics Monet’s gentle brush strokes in her coloring
    books, and sings loudly with The Wiggles during playtime.
  travel: Nicole Allman, a six‑year‑old explorer who enjoys family road trips to the Mall of America’s indoor lake and seasonal visits to Voyageurs National Park, dreams of seeing the Aurora Borealis in
    Alaska, and prefers short nature walks over long flights.
  culinary: Nicole Allman, a six‑year‑old with a budding palate for buttery apple cinnamon pancakes, homemade Swedish meatballs, and berry‑laden strawberry shortcake, likes to stir batter and sprinkle cinnamon,
    but often sneaks extra marshmallows into hot cocoa.
  core: Nicole Allman, a six‑year‑old curious explorer who builds LEGO kingdoms, worries over tiny spills, hoards coins in a piggy bank, and can be stubborn about bedtime, yet finds peace in quiet sketching
    of forest animals.
background:
  cultural: Nicole comes from a White, middle‑class family in Minneapolis, Minnesota. Her upbringing reflects typical Midwestern values such as politeness, community involvement, and an appreciation for
    the outdoors. She celebrates holidays like Thanksgiving and Christmas with family traditions, enjoys seasonal activities such as ice skating in winter and lake swimming in summer, and participates in
    community events like the Minnesota State Fair. Her family’s cultural influences include a blend of American and Northern European heritage, which is evident in the foods they cook, the music they listen
    to, and the emphasis on modesty and hard work.
