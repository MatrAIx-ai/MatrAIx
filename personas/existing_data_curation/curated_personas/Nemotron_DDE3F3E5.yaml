personas:
  professional: Antonio Lorenzo is a 65‑year‑old community handyman and volunteer coordinator who blends practical carpentry skills, bilingual fluency, and a flexible yet organized approach to mentor neighbors,
    lead senior‑youth activities, and run low‑cost home‑repair workshops, all while carefully managing the worry of overcommitting his time.
  sports: Antonio Lorenzo stays active through weekly nature walks across the Georgia countryside, participates in a local senior walking club, and dedicates Sunday afternoons to watching New York Yankees
    baseball, often gathering with friends at the community center to discuss the games.
  arts: Antonio Lorenzo contributes lively conga and tambora rhythms to an informal Latin music circle, drawing inspiration from salsa legends such as Celia Cruz and Rubén Blades, while also enjoying gospel
    hymns at church socials and humming classic boleros between sets.
  travel: Antonio Lorenzo favors modest road trips to scenic farms in Georgia and occasional visits to coastal Florida and Puerto Rico, where he savors local street foods, and he dreams of a relaxed Caribbean
    cruise to reconnect with the island flavors of his youth.
  culinary: Antonio Lorenzo boasts a seasoned home‑cook’s flair for island‑inspired dishes, expertly preparing sancocho with yucca, plantains, and cilantro, as well as fluffy mangú topped with sautéed onions,
    often sharing these hearty meals with friends over casual potlucks.
  core: Antonio Lorenzo blends a hands‑on, community‑centric spirit with lingering worries about health costs, habitually misplacing his favorite wrench while humming salsa tunes in the garden.
background:
  cultural: Antonio is of Dominican heritage, having grown up in a bilingual household where Spanish and English were spoken interchangeably. He retains strong ties to Caribbean traditions, celebrating
    holidays such as Día de la Independencia and Día de la Restauración, and maintaining Catholic practices common in the Dominican Republic. After relocating to rural Georgia, he blends his cultural roots
    with Southern hospitality, bringing Dominican music, dance, and cuisine to local gatherings. His identity is shaped by the immigrant experience, a deep respect for family and community, and a commitment
    to preserving his cultural legacy while adapting to his new environment.
attributes:
  skills: '[''Carpentry'', ''Home Repair'', ''Spanish-English Bilingual Communication'', ''Dominican Cooking'', ''Community Event Coordination'', ''Basic Computer Literacy'', ''Percussion Music'', ''Gardening'']'
  hobbies: '[''Playing percussion'', ''Cooking Dominican cuisine'', ''Gardening'', ''Volunteering'', ''Church activities'', ''Watching baseball'', ''Storytelling'', ''Hiking'', ''Community dancing'']'
  career_goals: Antonio aims to transform his lifetime of practical knowledge into community mentorship. He plans to launch a weekly "Dominican Kitchen" class at the local community center where he teaches
    traditional cooking techniques, while also offering basic home‑repair workshops for younger neighbors. He wishes to start a neighborhood garden that provides fresh produce and a gathering space, and
    to organize cultural celebrations that showcase Dominican music, dance, and holidays. By taking occasional handyman gigs, he hopes to secure a modest supplemental income to cover health expenses, while
    being recognized as a trusted elder who balances his own well‑being with the uplift of others.
