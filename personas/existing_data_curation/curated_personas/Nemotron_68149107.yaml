  career_goals: Ana aims to advance from a housekeeper to a supervisory role within the next three years, seeking certification as a Certified Professional Cleaner and training in sustainable cleaning practices.
    She hopes to eventually launch her own small cleaning business that emphasizes environmentally responsible methods, providing reliable employment for other young women in Vega Baja. Continuing education
    in hospitality management at a community college is part of her long‑term plan.
