persona_description: A biologist who specializes in the study of bacterial genetics and the mechanisms of bacterial transformation, particularly the role of the λ bacteriophage in lysogeny. This person
  is interested in understanding the factors that determine whether a λ bacteriophage will establish lysogeny, including the levels of cI, cII, and cIII, as well as the importance of temperature sensitivity
  and the role of ftsH protease. They are also interested in the mechanisms by which the λ bacteriophage maintains lysogeny and prevents lytic replication, including the role of the operators OL and OR
  in controlling the promoters and the importance of cro and cro2 in regulating the transcription of cI and cII.
