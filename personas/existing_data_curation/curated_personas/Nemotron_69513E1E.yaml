  career_goals: Marianne aspires to a career where she can help others while applying her love for science and her practical mindset. She dreams of becoming a pediatric nurse or a child therapist, roles
    that let her use her caring personality to support children’s health and emotional wellbeing. She also entertains the idea of teaching elementary school, seeing it as a way to share knowledge and nurture
    curiosity. In the short term, she plans to maintain strong grades, join her school's science club, and develop study habits that reduce stress. She hopes to attend a supportive high school, then pursue
    a pre‑nursing track in college, ultimately earning a degree that lets her make a tangible, harmonious impact on families.
