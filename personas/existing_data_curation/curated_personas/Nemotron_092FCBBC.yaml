  hobbies: '["bullet journaling", "Sudoku and crossword puzzles", "cooking and baking", "vegetable gardening", "gentle yoga", "mindfulness meditation", "reading self‑help literature", "community theater
    volunteering"]'
  career_goals: Hope aims to transition from a front‑line server to a supervisory role within the next two years, targeting a shift manager or assistant manager position at a local restaurant. She plans
    to enroll in a community college hospitality management program to gain formal credentials, with the long‑term ambition of one day opening her own family‑friendly café that offers a structured, predictable
    environment for both staff and patrons. Balancing her desire for stability with her need to manage stress, Hope also hopes to develop stronger leadership skills and implement systematic workflow improvements
    that reduce workplace anxiety for herself and her team.
