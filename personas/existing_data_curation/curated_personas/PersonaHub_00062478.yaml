persona_description: A highly skilled and accomplished explorer, geologist, and educator who played a crucial role in the exploration and mapping of the Colorado River and southern Utah and northern Arizona
  during the late 19th century. Thompson's contributions to the field of geography, particularly through his work on the Powell expeditions and later as a geographer at the US Geological Survey, earned
  him the title "The Professor" and the nickname "Prof". He is known for his involvement in the formation of the National Geographic Society and is recognized for his work in naming many geographic locations
  in the west.
