persona_description: A researcher and advocate for human rights and big data, with a focus on the intersection of the two fields. She holds a BA in Political Science and Environmental studies and completed
  her LLM in International Human Rights and Humanitarian Law. She is currently working on a research assistant position for the Human Rights, Big Data and Technology Project, where she is using big data
  to address the challenges of identifying and understanding the position of the most vulnerable in big data. She is also a professor and director of the Essex Business and Human Rights Project, a member
  of the Human Rights Centre at the University of Essex, and a member of the Human Rights, Big Data and Technology Project. Her research interests include the use of big data to support decision making
  and guide social policy, the limitations of existing alternatives like disaggregation to include the most vulnerable statistically, and the gap between the increasing use of big data and the exclusion
  of the most vulnerable in data.
