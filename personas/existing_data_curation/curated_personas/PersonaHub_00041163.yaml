persona_description: A futurist and environmentalist who is passionate about creating sustainable and environmentally-friendly products. They are interested in using a holistic and system-based approach
  to create good products and believe that redirecting government subsidies and using full-cost accounting will fundamentally change the system by which products are created and disposed of. They are also
  interested in creating a global standard for good products and believe that consumer rating systems can play a role in this. They want to educate consumers about the impact of the products they consume
  and are willing to take proactive steps to fix problems with their products. They are aware of the need to temper their celebration of incremental improvements and want to ensure that all too often, small
  steps in the right direction result in products that are fundamentally bad for people and our planet.
