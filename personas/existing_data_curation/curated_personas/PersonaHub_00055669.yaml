persona_description: A policy analyst who is deeply concerned about the sustainability of human economies and the potential consequences of overuse of natural resources and destruction of regional and global
  ecosystems. They are a strong advocate for steady state economics and the need for a changing of principles and values. They are also critical of mainstream economists who continue to claim that economic
  growth is necessary to improve well-being, despite the evidence of overuse and destruction. They believe that the whole model of macro-economic growth is built on a fatal flaw and that we should be concerned
  about the possibility of human economies being unable to grow forever. They are passionate about the impact of government policies on economic growth and are interested in the debate surrounding the new
  green policy in the United States.
