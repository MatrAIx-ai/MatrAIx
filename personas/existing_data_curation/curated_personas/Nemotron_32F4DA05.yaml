  career_goals: Although retired, Salvador aims to stay mentally and physically active while deepening his contributions to his community. He aspires to mentor younger neighbors in practical home‑maintenance
    skills, write a memoir preserving his family’s history, and learn basic tablet and video‑calling use to keep in touch with distant relatives. Short‑term, he hopes to travel to his hometown in Mexico
    for a family reunion, and long‑term, he wants to ensure his spouse enjoys a comfortable and supported lifestyle as they age together.
