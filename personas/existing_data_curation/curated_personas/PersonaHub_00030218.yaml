persona_description: A paleontologist who specializes in the study of dinosaur and feathered dinosaur fossils, particularly those from the Liaoning province in China. His research interests include the
  evolution of birds and the phylogenetic relationships between different dinosaur and bird species. He is particularly interested in the discovery of the Aurornis xui fossil and the implications it has
  for the understanding of the evolutionary history of birds.
