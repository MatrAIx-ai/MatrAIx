personas:
  professional: Christina Butler leverages a STEM background and frontline housekeeping supervision to optimize facility operations, integrating IoT-driven scheduling, green cleaning protocols, and data
    analytics while training teams with meticulous workflows and a competitive drive to out‑perform benchmarks.
  sports: Christina Butler is a devoted member of the City Trail Runners club, conquering weekly 5‑mile runs through wooded paths, rooting for the local professional basketball team the Skyhawks, and competing
    in seasonal tabletop strategy tournaments that keep their competitive edge sharp.
  arts: Christina Butler frequents downtown galleries showcasing contemporary street art like Banksy prints, sketches urban skylines in a leather‑bound sketchbook, curates mini‑exhibits at work featuring
    emerging artists, and regularly streams indie films by directors such as Kelly Reichardt while listening to the experimental pop of Björk.
  travel: Christina Butler plans eco‑conscious weekend getaways with meticulously mapped itineraries, favoring sustainable destinations like Portland’s food carts, the Scandinavian design hubs of Copenhagen,
    and the cherry‑blossom trails of Kyoto, while budget constraints from MBA tuition sometimes limit longer overseas excursions.
  culinary: Christina Butler perfects sourdough bread with an apricot starter, experiments with whole‑grain rye focaccia topped with rosemary and heirloom tomatoes, and pairs the creations with crisp Chardonnay,
    though they often forget to pre‑heat the oven in a rush.
  core: Christina Butler blends analytical rigor with artistic curiosity, obsessively optimizing facilities while secretly hoarding artisanal flour and battling a perpetual undercurrent of worry.
background:
  cultural: Christina was raised in a middle‑class, predominantly white suburb of Ohio, with family roots tracing back to German and Irish immigrants. Her upbringing reflects typical Midwestern values—hard
    work, punctuality, community involvement, and a strong emphasis on education. She celebrates traditional American holidays such as Thanksgiving and Independence Day and participates in local events
    like county fairs and neighborhood potlucks. While she identifies as culturally American, she feels a connection to the regional folk art and music of the Ohio River Valley, which informs her appreciation
    for local craftsmanship and community heritage.
attributes:
  skills: '["Team supervision","Scheduling and staff rostering","Quality control and inspection","OSHA and safety compliance","Inventory management","Facilities management software (e.g., FMX, eMaint)","Data
