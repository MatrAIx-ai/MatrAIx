  career_goals: Christina aims to become a Certified Facility Manager (CFM) within the next three years and eventually step into a facilities‑management director role at a mid‑size healthcare or hospitality
    organization. She is passionate about leading sustainability initiatives, integrating smart‑building technologies, and using data analytics to drive operational efficiency. To broaden her strategic
    perspective, she plans to pursue an MBA focused on operations management. Long‑term, she envisions establishing a mentorship program for young women entering the cleaning and facilities industry and,
    perhaps, launching a consultancy that helps small businesses adopt eco‑friendly cleaning practices while maintaining high performance standards.
