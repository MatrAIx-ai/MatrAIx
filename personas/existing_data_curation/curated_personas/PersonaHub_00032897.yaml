persona_description: A cosmologist who specializes in the study of galaxy formation and evolution, particularly the earliest stages of galaxy formation and the properties of red galaxies. Her research interests
  include, but are not limited to, the nature of young galaxies, the properties of red galaxies, the effects of dust and ionized gas on galaxy color, and the relationship between the properties of galaxies
  and the properties of the universe. Her work has led to the discovery of the most distant known galaxy, which is thought to be older than the universe itself.
