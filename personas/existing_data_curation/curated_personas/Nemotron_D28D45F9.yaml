  career_goals: Charles dreams of becoming an engineer or inventor, fascinated by how everyday objects work and how they can be improved. He imagines designing simple machines that solve practical problems,
    like a custom bike accessory or a backyard water filtration device. He also feels a strong pull toward wildlife biology, hoping to study animals in his local environment and share his findings with
    peers. His ambition is to combine his curiosity with practical solutions, leading projects that blend creativity with real-world impact.
