personas:
  professional: Charles Olazo, a self‑titled junior engineer, channels his curiosity and practicality into designing complex LEGO structures, applying meticulous organization while staying flexible enough
    to improvise when a piece won’t fit, and thrills in the quiet competition of improving his builds.
  sports: Charles Olazo, a budding soccer enthusiast, practices with the Oakwood Juniors club on Saturday mornings, cheers for New York City FC when watching televised matches, and enjoys occasional backyard
    baseball games with friends, balancing his competitive streak with a love for teamwork.
  arts: Charles Olazo, an avid admirer of whimsical animation, regularly watches classic Disney films like The Lion King and delights in the colourful illustrations of Dr. Seuss, while he also mimics the
    rhythmic beats of the child‑friendly group The Wiggles during playtime.
  travel: Charles Olazo, a curious little explorer, loves weekend trips to the nearby state park where he collects rocks and leaves, dreams of visiting Kennedy Space Center to see rockets up close, and
    hopes one day to travel to the Great Barrier Reef to compare marine life with the sea creatures in his picture books.
  culinary: Charles Olazo prefers kid‑friendly fare such as pepperoni pizza, mac and cheese, and apple slices with peanut butter, can independently make a peanut butter‑jelly sandwich, and enjoys the occasional
    treat of strawberry‑flavoured yogurt with granola.
  core: Charles Olazo is a six‑year‑old competitive puzzle‑solver who blends meticulous curiosity with a quiet, practical streak, often hoarding spare change for LEGO while obsessively cataloguing nature
    finds, and occasionally stubbornly refuses bedtime.
background:
  cultural: Charles is raised in a suburban part of Pine Bluff, Arkansas, where Southern hospitality and close-knit community values are prominent. His family participates in local church activities, celebrates
    traditional American holidays, and enjoys regional cuisine such as barbecued dishes and seasonal pies. Community events like county fairs, little league games, and neighborhood picnics provide social
    exposure, while the surrounding natural landscape — wetlands, forests, and rivers — fuels his interest in wildlife and outdoor exploration. These cultural influences blend a sense of modesty, respect
    for tradition, and an appreciation for the outdoors in his daily life.
