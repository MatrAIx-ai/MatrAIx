  hobbies: '[''reading fantasy novels'', ''journaling'', ''drawing beach and marine scenes'', ''collecting and identifying seashells'', ''birdwatching'', ''building LEGO creations'', ''participating in
    a small after‑school science club'', ''swimming at the beach'']'
  career_goals: As she looks ahead, Margarita dreams of a career that blends her curiosity about the natural world with practical problem‑solving. She hopes to study marine biology or environmental science,
    possibly working on projects that protect Florida’s coastal ecosystems. She also imagines herself designing simple robots or tools that could help clean beaches or aid in wildlife rescue. While she
    is still exploring, her overarching ambition is to contribute meaningfully to the environment while maintaining a balanced life that allows time for her creative writing and art.
