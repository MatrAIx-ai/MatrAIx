  career_goals: Cinnamon aims to move from laborer to a supervisory position within the next two years, eventually pursuing a degree in construction management or architecture. She envisions leading a crew
    that implements sustainable, affordable housing projects in Lee County, integrating her creative flair with functional building practices. Long-term, she hopes to design custom, eco-friendly furniture
    and small-scale structures that reflect her artistic vision while serving her community.
