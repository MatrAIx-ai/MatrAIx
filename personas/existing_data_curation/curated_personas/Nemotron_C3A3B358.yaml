personas:
  professional: Cinnamon Singh is a diligent construction laborer who expertly mixes concrete, assembles formwork, and oversees tool inventories, channeling their meticulous organization and imaginative
    problem‑solving into daily safety inspections and crew coordination as they work toward a supervisory role.
  sports: Cinnamon Singh enjoys early‑morning trail runs on the Lee County nature paths, subscribes to the Tampa Bay Buccaneers (NFL) and the Tampa Bay Rays (MLB) for weekend cheering, and belongs to the
    local Lee County Trail Running Club where they balance solitary cardio with occasional group cycling rides each summer.
  arts: Cinnamon Singh cultivates an abstract visual language through charcoal sketches and Procreate illustrations inspired by M.C. Escher, Yayoi Kusama, and street artist Banksy, while finding creative
    recharge in speculative fiction like Neal Stephenson’s *Anathem* and lo‑fi ambient playlists such as the 'lofi hip hop radio – beats to relax/study to' stream.
  travel: Cinnamon Singh balances meticulous trip planning with spontaneous weekend getaways, having trekked the Everglades National Park and explored Asheville’s vibrant arts district, while dreaming of
    a solo pilgrimage to Kyoto’s bamboo groves and a future road‑trip across the Pacific Northwest’s coastal highways.
  culinary: Cinnamon Singh, a modest home cook, favors plant‑based meals such as a Mediterranean quinoa bowl with roasted chickpeas, avocado, and feta, experiments with charcoal‑grilled portobello mushrooms
    seasoned with smoked paprika, and occasionally treats themselves to spicy ramen featuring miso and bok choy.
  core: Cinnamon Singh blends a methodical construction mindset with a vivid artistic imagination, yet frequently battles worry‑driven analysis paralysis and a habit of forgetting to recharge their phone
    before a long workday.
background:
  cultural: Cinnamon’s cultural identity blends African-American Southern traditions with Indian heritage from her father’s side. Raised in Lehigh Acres, Florida, she grew up in a working-class household
    that celebrated gospel music, church gatherings, and community solidarity alongside Punjabi customs such as spice-rich home cooking and occasional Hindi greetings. This multicultural environment, coupled
    with the diverse, rural-suburban atmosphere of Southwest Florida, informs her worldview, values of resilience, and appreciation for both collective community ties and personal artistic expression.
