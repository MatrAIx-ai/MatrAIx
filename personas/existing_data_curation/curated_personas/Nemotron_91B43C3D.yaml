personas:
  professional: Edward Boone, a 21‑year‑old customer service representative at a regional call center, transforms their curiosity for product details, competitive drive to surpass performance metrics, and
    methodical multitasking into courteous, solution‑focused interactions while they periodically create internal visuals with Canva to communicate team updates.
  sports: Edward Boone, 21, stays active by hiking the Flint River Trail with the Dawson Hiking Club, follows the Atlanta Braves and Atlanta Falcons, and joins occasional pickup basketball games at the
    community center while they prefer solo cardio over team sports.
  arts: Edward Boone, a 21‑year‑old acrylic painter and self‑taught guitarist, draws inspiration from Vincent van Gogh’s bold colors, Miles Davis’s improvisational jazz, and Joni Mitchell’s folk storytelling,
    curates playlists featuring Bon Iver and B.B. King while sketching downtown Dawson, and they mentor kids at a local art workshop each weekend.
  travel: Edward Boone, 21, prefers low‑cost, solo road trips that blend scenic hiking with cultural immersion, having explored Savannah’s historic squares, Nashville’s music scene, and a spur of the Appalachian
    Trail, while they dream of a future visit to Santa Fe for its art colonies and the Pacific Northwest for rainforest hikes.
  culinary: Edward Boone, 21, hones their Southern cooking skills by perfecting peach cobbler with fresh Georgia peaches, mastering fried green tomatoes with buttermilk batter, and experimenting with smoked
    collard greens, often sharing the dishes at community potlucks despite occasionally over‑salting their sauces, which they attribute to their zeal for flavor.
  core: Edward Boone, a curious yet competitively driven 21‑year‑old, balances solitary artistic pursuits with a meticulous work ethic, while they occasionally hoard vinyl records and neglect sleep to finish
    a painting.
background:
  cultural: Edward grew up in Dawson, a small town in Dougherty County, Georgia, steeped in Southern traditions and a close‑knit community ethos. His family has lived in the region for generations, with
    roots in small‑scale agriculture and the legacy of the historic cotton industry. The local culture emphasized hospitality, church involvement—particularly at his family’s Southern Baptist congregation—and
    participation in community events like the annual Peach Festival and county fairs. Access to the Dawson public library and the nearby University of West Georgia’s outreach programs nurtured his curiosity
    about art and ideas, while the town’s modest art scene, exemplified by a weekly farmer’s market showcase, sparked his appreciation for visual creativity. Though he identifies as white and shares many
    of the region’s conventional values, Edward’s exposure to diverse media and online communities has broadened his perspective, leading him to blend his Southern heritage with a more global, open‑minded
    outlook.
