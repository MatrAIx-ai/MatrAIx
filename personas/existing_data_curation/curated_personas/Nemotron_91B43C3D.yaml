  career_goals: Edward aims to leverage his strong service background into a leadership role within the next three years. In the short term, he plans to complete a Certified Customer Service Professional
    (CCSP) credential and enroll in an associate’s degree program in Business Administration at a community college in nearby Albany. He aspires to become a team lead or shift supervisor, using his competitive
    drive to improve team performance and customer satisfaction scores. Over the longer term, Edward envisions transitioning into a customer experience management position that blends his analytical skills
    with his passion for art and design. He hopes to eventually launch a boutique e‑commerce platform that sells locally‑made artworks and design prints, allowing him to merge his professional expertise
    with his creative interests.
