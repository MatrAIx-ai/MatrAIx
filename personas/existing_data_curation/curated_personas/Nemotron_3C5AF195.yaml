  hobbies: '[''Woodworking'', ''Restoring vintage motorcycles'', ''Fishing on Old Hickory Lake'', ''Hiking in local trails'', ''Building scale model tractors'', ''DIY home improvement projects'', ''Reading
    technical journals'', ''Mentoring at the local technical school'', ''Listening to classic country and blues music'', ''Gardening'']'
  career_goals: Approaching retirement, Lance aims to secure a senior technician or advisory role where he can leverage his extensive experience to influence maintenance best practices and mentor the next
    generation of mechanics. He plans to obtain advanced certifications in emerging electric‑heavy‑equipment systems to remain relevant in a shifting industry. Additionally, he hopes to transition to part‑time
    consulting for local construction firms, allowing a more balanced schedule that reduces stress while providing steady supplemental income for his retirement plans. He also envisions one day opening
    a modest specialty shop focused on vintage diesel equipment restoration, blending his passion for craftsmanship with a modest entrepreneurial venture.
