personas:
  professional: Lance Leynes, a seasoned heavy‑vehicle technician, blends deep diesel‑engine expertise with a curiosity for emerging electric‑drive diagnostics, and they reliably mentor junior mechanics
    while shaping maintenance best‑practice guidelines for their employer.
  sports: Lance Leynes pursues outdoor fitness through early‑morning fishing on Old Hickory Lake and weekend hikes along the Natchez Trace, while cheering on the Nashville Predators and following the Tennessee
    Titans as his favorite local teams, and they often join a casual fishing club on Sundays.
  arts: Lance Leynes unwinds by listening to classic country icons like Johnny Cash and blues legends such as B.B. King while sanding a woodworking project, and they occasionally attend the annual Tennessee
    State Fair’s music showcase to enjoy live folk performances.
  travel: Lance Leynes prefers low‑key road trips that blend mechanical curiosity with natural scenery, having explored the historic diesel museum in Frankfurt, Germany, and planning a future fishing pilgrimage
    to the Florida Keys within the next two years, and they favor itineraries that allow ample time for hands‑on DIY projects along the way.
  culinary: Lance Leynes favors hearty Southern fare, regularly cooking smoked catfish seasoned with cayenne pepper, buttery biscuits with garden‑grown heirloom tomatoes, and they often experiment with
    a wood‑fired smoker for weekend BBQ ribs.
  core: Lance Leynes is a diligent, worry‑prone tinkerer who channels decades of diesel‑shop wisdom into woodworking, mentorship, and a fledgling dream of restoring vintage diesel equipment.
background:
  cultural: Lance was born and raised in the Hermitage area of Davidson County, Tennessee, a region that blends suburban life with the deep‑rooted traditions of Middle Tennessee. Growing up in a working‑class,
    mixed‑rural community, he inherited a strong sense of self‑reliance, practical problem‑solving, and a respect for hard work. His family’s cultural heritage includes Southern Baptist values, community
    gatherings at the local church, and an appreciation for regional customs such as country music, BBQ cuisine, and outdoor recreation. The steady industrial growth of Nashville’s surrounding areas exposed
    him to both blue‑collar trades and the evolving technology sectors, shaping his balanced outlook that honors tradition while welcoming innovation. This background informs his pragmatic yet curious demeanor,
    his commitment to family and community, and his measured approach to life's challenges.
attributes:
  skills: '[''Diesel engine repair'', ''Hydraulic system maintenance'', ''Heavy equipment diagnostics'', ''Welding and fabrication'', ''Preventive maintenance scheduling'', ''Parts inventory management'',
