  hobbies: '[''Reading (fiction and practical how‑to books)'', ''Gardening'', ''Hiking on local trails'', ''Cooking and baking'', ''Knitting'', ''Listening to podcasts'', ''DIY home‑decor projects'', ''Volunteering
    at the local animal shelter'']'
  career_goals: Ruth aims to grow within the retail sector by first securing a supervisory role where she can mentor newer employees and oversee daily floor operations. Over the next few years she plans
    to enroll in community‑college courses in business management to broaden her strategic understanding. Her long‑term ambition is to become a store manager or eventually open a small boutique that blends
    practical living products with curated selections, giving her the flexibility to balance work with her personal interests and community involvement.
