  career_goals: Although retired, Michael aims to stay mentally active by documenting the history of Yakima’s agricultural industry, sharing his knowledge with local vocational schools, learning to use
    modern communication tools to stay connected with grandchildren, and maintaining his physical health through gardening and light woodworking. He also hopes to volunteer as a safety advisor for the senior
    center's occasional community workshops.
