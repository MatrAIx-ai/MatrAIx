persona_description: A scientist or engineer who is interested in the early evolution of nitrogenous and hydrocarbon species in coal combustion configurations, particularly in the context of opposed flow
  combustion. They are likely to have expertise in combustion engineering, chemical engineering, or related fields, and have conducted research on the effects of particle size, heating rate, and pyrolysis
  environment on the formation of nitrogenous and hydrocarbon species. They are also likely to have experience with experimental methods for measuring and analyzing these species in the gas phase. They
  may have a background in physical chemistry, thermodynamics, or other related fields, and have a strong interest in understanding the processes that lead to the formation of these species.
