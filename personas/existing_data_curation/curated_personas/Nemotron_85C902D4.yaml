personas:
  professional: An aspiring community outreach coordinator, Alan Poteet leverages their outgoing nature, improv experience, and knack for quick digital tool adoption to orchestrate engaging events for local
    nonprofits, even as they wrestle with staying organized and meeting deadlines.
  sports: A recreational basketball enthusiast, Alan Poteet dominates the local parks pickup games, follows the Washington Wizards and attends Manassas High School Tigers matches, hikes the Bull Run Mountains
    on weekends, and tracks workouts on Strava, balancing competitive spirit with a laid-back fitness routine.
  arts: A budding improv performer and TikTok creator, Alan Poteet shines in their high school's improv troupe, draws inspiration from classic rock legends like The Rolling Stones and Led Zeppelin, and
    captures vintage-style photos of Civil War sites, intertwining humor, music, and visual storytelling in their creative life.
  travel: A spontaneous explorer, Alan Poteet has toured historic sites in Washington DC, visited the Gettysburg battlefield, taken weekend road trips to the Blue Ridge Mountains, and dreams of experiencing
    New Orleans' jazz scene and a European backpacking adventure, preferring flexible itineraries over rigid travel plans.
  culinary: A modest home-cook with a flair for casual comfort foods, Alan Poteet enjoys whipping up loaded nachos, garlic-buttered chicken wings, and mac & cheese using hot sauce and smoked paprika, often
    testing new recipes for their future pop-up food venture while frequenting local food trucks for inspiration.
  core: A high-energy improv-savvy basketball player, Alan Poteet balances a love for structure with spontaneous creativity, often juggling TikTok videos, classic-rock playlists, and late-night gaming marathons
    while occasionally missing deadlines.
background:
  cultural: Alan grew up in a predominantly white, middle‑class suburban family in Manassas, Virginia. His upbringing reflects the broader Mid‑Atlantic American culture, with influences from local Civil
    War history, community festivals, and a diverse neighboring population in Prince William County. He identifies with mainstream American values—individualism, community involvement, and a strong work
    ethic—while also appreciating the multicultural environment of the D.C. metropolitan area.
attributes:
  skills: '[''Public Speaking'', ''Customer Service'', ''Event Coordination'', ''Social Media Management'', ''Team Collaboration'', ''Basic Computer Literacy (Microsoft Office, Google Suite)'', ''Adaptability'']'
  hobbies: '[''Pickup Basketball'', ''Improv Comedy'', ''Volunteer Historical Reenactments'', ''Photography of Local Landmarks'', ''Social Media Content Creation (TikTok)'', ''Multiplayer Video Gaming'',
    ''Hiking'']'
  career_goals: Alan aims to enroll in a community college program in communications or hospitality management within the next year, with the goal of securing a part‑time role in event planning or hotel
    front‑desk operations. He hopes to combine his love for social interaction with structured training, eventually moving into a full‑time position as a community outreach coordinator for a local nonprofit
    or as an event manager for regional festivals. In the longer term, Alan dreams of launching his own pop‑up food and entertainment venture that blends his spontaneous creativity with reliable business
    practices.
