persona_description: A researcher in the field of archaeology who specializes in the study of prehistoric human cultures, particularly those related to the Neanderthals. The person is interested in the
  discovery of new archaeological sites, the analysis of artifacts and tools, and the interpretation of ancient human behavior and culture. They have a keen interest in the use of fire by prehistoric humans
  and the role of women in the group. They are also interested in the use of stone tools and fossil bones and the significance of their discovery for understanding the history of early humans.
