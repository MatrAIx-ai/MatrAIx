persona_description: A teacher who specializes in teaching children decision-making skills through engaging and fun activities. She has a passion for storytelling and books, and uses these to promote critical
  thinking and decision-making in children. She is knowledgeable in teaching children how to think critically about books they read, and how to make decisions based on their own values, knowledge, and judgement.
  She is able to motivate children through high-interest games and activities that educate them while keeping them engaged. She is aware of the pivotal decisions children will eventually need to make as
  teenagers and adults, and is able to empower children with knowledge and data to make informed decisions.
