  hobbies: '[''jogging'', ''fishing'', ''listening to hip hop and R&B'', ''DIY repairs and furniture assembly'', ''reading self-help books'', ''chess'', ''volunteering at church food pantry'']'
  career_goals: David aims to solidify his career in logistics by completing a GED and obtaining a certified forklift operator qualification within the next year. He plans to pursue a supervisory role as
    a shift lead, where he can apply his organizational strengths to improve workflow efficiency. In the longer term, he hopes to earn a logistics certification (such as a Certified Supply Chain Professional)
    and transition into a logistics coordinator position, eventually managing a small team and overseeing inventory control for a regional distribution center. Stability, clear advancement pathways, and
    the ability to mentor newer workers are central to his ambitions.
