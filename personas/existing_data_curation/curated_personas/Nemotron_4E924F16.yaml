    center activities'']'
  career_goals: As he approaches retirement, Jemar aims to shift from day‑to‑day management to an advisory and mentorship role, helping the next generation of IT leaders in Jefferson Parish. He plans to
    establish a formal knowledge‑transfer program for his department, ensuring continuity of critical services. Additionally, he aspires to lead community‑focused digital‑inclusion initiatives, such as
    free computer‑literacy workshops at the local senior center and a collaborative project to digitize and preserve the cultural history of Gretna’s African‑American community. Jemar also hopes to earn
    a CISSP certification to underscore his commitment to cybersecurity best practices, even as he transitions to part‑time consulting.
