personas:
  professional: Jemar Lewis, a veteran information systems leader with four decades of expertise in resilient network architecture and cybersecurity, applies their methodical planning, organized project
    stewardship, and sociable mentorship style to guide municipal IT teams and champion process improvements while preparing to transition into a part‑time advisory role.
  sports: Jemar Lewis, a devoted New Orleans Saints fan and occasional member of a senior tennis league, supplements their cultural outings with weekly walks along the Mississippi River levee and a reluctant
    but consistent participation in the city's annual Bayou fishing derby, preferring low‑impact activities that align with their energetic yet methodical lifestyle.
  arts: Jemar Lewis, an avid photographer and choir member, immerses themselves in the local jazz scene at Preservation Hall, studies the works of modern photographer Dominique Issermann, and collects both
    classic Louis Armstrong vinyl and contemporary abstract paintings, letting their curiosity and appreciation for art shape every weekend outing.
  travel: Jemar Lewis, who prefers purposeful travel over spontaneous trips, regularly explores Gulf Coast destinations such as the historic French Quarter, the bayous of Lafayette, and weekend river cruises
    to Baton Rouge, while dreaming of a future genealogical pilgrimage to Savannah and a carefully budgeted jazz festival visit to New York City.
  culinary: Jemar Lewis, a proficient home chef, delights in crafting authentic gumbo with Andouille sausage, file powder, and okra while habitually tasting the roux a dozen times before it reaches the
    perfect mahogany hue, and occasionally over‑spices dishes in a playful attempt to recreate family recipes handed down through generations.
  core: Jemar Lewis blends methodical IT mastery, a deep love for New Orleans jazz, a disciplined yet occasional splurge habit, and a health routine teetering between diligent monitoring and missed appointments,
    all while navigating retirement with a curiosity‑driven, sociable, and slightly impulsive spirit.
background:
  cultural: Jemar is a second‑generation African‑American from the Gulf Coast, born and raised in the New Orleans metropolitan area during the civil‑rights era. His family traces roots to Creole‑influenced
    communities that blended African, French, and Caribbean traditions. Growing up, he was immersed in the rhythms of gospel music at his Baptist church and the soulful sounds of jazz that permeated the
    city’s neighborhoods. The vibrant celebrations of Mardi Gras, the communal spirit of second‑line parades, and the storytelling traditions of his grandparents shaped his appreciation for cultural heritage.
    Jemar’s identity is anchored in a strong sense of community service, resilience, and pride in the rich artistic legacy of Black Louisianans, which he continually shares with younger generations through
    mentorship and cultural initiatives.
attributes:
