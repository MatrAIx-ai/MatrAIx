  career_goals: Although only two years old, Hailey’s caregivers nurture her emerging interests by encouraging a love of creativity and learning. She often expresses a fascination with drawing and music,
    and her parents anticipate that, as she grows, she may pursue paths that allow her to explore art, storytelling, or teaching—areas where her imagination, kindness, and cooperative nature can thrive.
