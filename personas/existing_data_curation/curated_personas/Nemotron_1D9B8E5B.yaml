  career_goals: Although still very young, Miguel dreams of becoming a creative professional who blends art and invention. He talks about wanting to be a painter who creates bright, imaginative pictures
    like his favorite cartoons, or a "builder" who designs fun playgrounds with LEGO. He enjoys friendly drawing contests and imagines winning one day, and he hopes his curiosity will lead him to explore
    how things are made, perhaps as a future engineer or scientist who shares his creations with classmates and family.
