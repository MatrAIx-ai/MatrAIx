personas:
  professional: Miguel Pizarro, an aspiring junior scientist who spends his afternoons dismantling toy robots and constructing Lego experiments, channels his curiosity and balanced organization into early
    problem‑solving skills, and they proudly label each creation with a hand‑drawn ‘research’ sticker.
  sports: Miguel Pizarro, a member of the neighborhood ‘Mini Hurricanes’ soccer club, avidly watches Manchester United matches on TV and idolizes goalkeeper David de Gea, yet they enjoy spontaneous backyard
    baseball games with the ‘River Rats’ Little League team more than formal practices.
  arts: Miguel Pizarro, an enthusiastic fan of animated films like ‘Toy Story’ and ‘Moana’, spends weekends drawing the characters with crayons while singing along to ‘Let It Go’ by Idina Menzel, and they
    proudly showcase their crayon murals on the refrigerator.
  travel: Miguel Pizarro, who has visited the Orlando theme parks and a beach vacation in Myrtle Beach, loves planning imaginary trips to the Grand Canyon using picture books, yet they occasionally request
    a real outing to the natural history museum in Washington, D.C., balancing adventure cravings with parental budgeting constraints.
  culinary: Miguel Pizarro, a picky yet adventurous eater, adores mac and cheese with a sprinkle of cheddar, chicken nuggets with ketchup, and insists on adding sliced strawberries to pancakes, while they
    sometimes sneak a bite of hidden gummy bears from the cereal box.
  core: Miguel Pizarro, a five‑year‑old with boundless curiosity, a competitive streak, and a habit of worrying over tiny details, navigates the world with a blend of organized play and spontaneous imagination,
    often forgetting bedtime in pursuit of the next discovery.
background:
  cultural: Miguel is a first‑generation Mexican‑American raised in a bilingual household in Fullerton, California. Spanish is spoken at home alongside English, and he celebrates traditional Mexican holidays
    such as Día de los Muertos and Las Posadas with family gatherings, piñatas, and homemade tamales. His family emphasizes close‑knit relationships, respect for elders, and sharing meals. Exposure to Mexican
    visual arts through his parents' affection for Frida Kahlo and Diego Rivera fuels his appreciation for bright colors and storytelling. At the same time, he participates in local community events and
    enjoys the multicultural vibe of Orange County, blending his heritage with broader Californian culture through school activities and neighborhood friendships.
