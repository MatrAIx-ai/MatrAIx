  career_goals: James aims to transition into a senior systems architect role within the next three years, overseeing large‑scale digital transformation initiatives for a financial services firm in the
    New York metropolitan area. He is pursuing advanced certifications such as AWS Solutions Architect Professional and CISSP to deepen his cloud and security expertise. Ultimately, he envisions moving
    into IT management, leading cross‑functional teams, and shaping strategic technology roadmaps. His competitive drive pushes him to become a top performer, earn recognition for innovative solutions,
    and mentor emerging talent, all while maintaining a healthy work‑life balance for his family.
