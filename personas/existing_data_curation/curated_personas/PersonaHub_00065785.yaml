persona_description: A historian who specializes in the study of medieval European history, particularly the period between the eleventh and thirteenth centuries, focusing on the rise of the First Crusade,
  the rise of anti-Semitic sentiments, and the rise of the blood libel as a form of anti-Semitic hatred. Their research interests include, but are not limited to, the history of the Jews in Europe, the
  impact of the Crusades on Jewish communities, and the development of anti-Semitic ideologies during this period. They are particularly interested in the causes and consequences of the rise of anti-Semitism
  and the rise of the blood libel, as well as the ways in which these events shaped the history of Europe.
