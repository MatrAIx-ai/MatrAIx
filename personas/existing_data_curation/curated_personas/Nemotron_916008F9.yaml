personas:
  professional: Sulma Bonilla, a seasoned religious educator and minister, leverages three decades of bilingual curriculum design, community outreach, and budget oversight to lead a growing parish education
    ministry, blending her organized, practical mindset with her sociable, energetic drive to create inclusive worship experiences for children, teens, and adults.
  sports: Sulma Bonilla embraces outdoor fitness by hiking the Sierra Nevada trails each weekend, joining a local senior cycling club for scenic morning rides, and cheering on the Sacramento Republic FC
    during the MLS season, balancing her love of nature with light cardiovascular activity.
  arts: Sulma Bonilla cultivates her artistic side through leading salsa and traditional marinera dance circles, performing in community theatre productions of classics like García Lorca’s Blood Wedding,
    and filling her gatherings with the vibrant sounds of Celía Cruz, Marc Anthony, and Peruvian folk legend Eva Ayllón, which together infuse her cultural evenings with rhythmic energy.
  travel: Sulma Bonilla prefers thoughtfully planned cultural trips, having explored the colonial streets of Cusco, the vibrant plazas of Oaxaca, and the historic neighborhoods of Seville, while now dreaming
    of a pilgrimage to the Andean highlands and a leisurely road‑trip along California’s Pacific Coast, balancing her love of discovery with a modest retirement budget.
  culinary: Sulma Bonilla, an adept home chef, delights in preparing bright ceviche with lime, cilantro, and a dash of ají Amarillo, comforting lomo saltado featuring tender beef, onions, and soy‑vinegar
    sauce, and creamy ají de gallina seasoned with a pinch of nutmeg, all enhanced by fresh herbs from her backyard garden, while also savoring a chilled pisco sour at community gatherings.
  core: Sulma Bonilla blends relentless organization with a zest for communal celebration, leading church programs by day and salsa circles by night, even if she sometimes forgets to water her herb garden
    while juggling endless volunteer commitments.
background:
  cultural: Sulma was born and raised in Lima, Peru, in a Catholic family where community celebrations, festive music, and shared meals were central to daily life. She grew up speaking Spanish at home while
    learning English after moving to the United States in her early thirties. Her heritage includes Andean values such as respect for elders, collective responsibility, and gratitude, which she incorporates
    into her ministry and community work. In Sacramento, she maintains strong ties with the local Peruvian diaspora, celebrating holidays like Inti Raymi and Señor de los Milagros, sharing traditional recipes,
    and teaching younger generations about Peruvian cultural practices. Her bicultural perspective enriches her approach to religious education, allowing her to bridge Peruvian traditions with the multicultural
    fabric of her Californian community.
