  career_goals: Sulma aims to expand the bilingual religious‑education program she leads, making it a model for other parishes in the diocese. She hopes to become the Director of Diocesan Education, where
    she can mentor emerging teachers and develop a mentorship pipeline for senior volunteers. Sulma is also interested in completing a master’s degree in counseling to deepen her pastoral care skills. In
    the longer term, she envisions authoring a guide on culturally inclusive religious pedagogy that weaves Peruvian traditions with contemporary ministry practices, and she plans to organize annual multicultural
    festivals that celebrate the diverse heritage of Sacramento’s community.
