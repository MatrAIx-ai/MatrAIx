personas:
  professional: Odell Joh is a budding preschool architect who loves building elaborate block cities, showcasing early organizational skills while staying flexible enough to adapt when a tower collapses,
    and their natural curiosity fuels a habit of asking "why?" about every new construction.
  sports: Odell Joh is a lively participant in the local toddler soccer program, proudly wearing a tiny Houston Astros jersey, cheering for the team during games, and regularly practicing kicking a soft
    ball in the backyard after family BBQs.
  arts: Odell Joh delights in finger painting bright masterpieces inspired by storybook illustrations, humming the tunes of Disney classics like "Let It Go," and occasionally mimicking their favorite animated
    characters during playtime, revealing a budding love for visual and musical expression.
  travel: Odell Joh enjoys family road trips to the Texas State Fair, where they marvel at carnival rides and sample funnel cake, and dreams of a future visit to Disneyland, often packing a small backpack
    with crayons and a favorite plush rabbit.
  culinary: Odell Joh favors classic Southern comfort foods such as mac and cheese and chicken tenders, loves the smoky scent of backyard barbecue ribs, and enjoys helping a parent stir the pot of chili,
    though they sometimes sneak extra bites of corn on the cob when no one’s looking.
  core: Odell Joh is a curious three‑year‑old who balances a love for building block kingdoms with an ever‑growing sweet tooth, a penchant for spilling piggy‑bank coins, and an enthusiastic, if occasionally
    noisy, enthusiasm for every new adventure.
