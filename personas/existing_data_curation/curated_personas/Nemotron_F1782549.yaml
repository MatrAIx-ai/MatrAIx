  hobbies: '[''Reading historical non-fiction'', ''Woodworking'', ''Hiking Appalachian trails'', ''Fishing in the Kanawha River'', ''Model railroading'', ''Landscape photography'', ''Playing acoustic guitar'']'
  career_goals: Looking ahead, Nicholas aims to move into a supervisory or consulting role that allows him to shape venue operations without extensive front-line interaction. He plans to obtain a certified
    Facility Management credential and leverage his hands-on experience to become a part-time operations manager for a regional performing-arts center, or to launch a small consultancy that advises local
    event venues on safety compliance, equipment maintenance, and staff training. He values stability, low-stress environments, and the ability to work independently while still contributing his expertise
    to the community’s cultural events.
