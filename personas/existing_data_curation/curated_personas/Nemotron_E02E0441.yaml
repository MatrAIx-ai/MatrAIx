  hobbies: '[''Visiting art galleries'', ''Improv comedy'', ''Pickup basketball'', ''Photography'', ''Hiking'', ''Playing chess'', ''Listening to podcasts on psychology'', ''Journaling'']'
  career_goals: Thomas aims to move into a supervisory role within his call‑center team over the next two years, targeting a Team Lead position where he can mentor new agents and shape performance standards.
    He plans to earn a Certified Customer Service Professional credential and later pursue a bachelor's degree in Business Administration to broaden his strategic perspective. Long‑term, he envisions transitioning
    to a Quality Assurance Manager or Training & Development specialist, leveraging his competitive spirit to drive higher satisfaction scores. Eventually, his curiosity about art and innovative ideas could
    guide him toward a product‑development or brand‑marketing role that blends his service expertise with creative insight.
