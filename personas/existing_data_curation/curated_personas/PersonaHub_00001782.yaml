persona_description: A team of scientists in Switzerland who are working on developing new methods to deliver drugs to diseased tissue using a miniature robot inspired by nature's microorganisms. They are
  focused on developing physics that describe the changes in shape and movement of the robot as it navigates through fluid and tissue environments, and are working on improving the robot's ability to swim
  through fluids. Their research is being conducted at leading science and technology research institutes such as the Ecole Polytechnique Federale de Lausanne (EPFL) and ETH Zurich.
