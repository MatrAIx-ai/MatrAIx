    technology'', ''Playing strategy video games (e.g., Civilization)'']'
  career_goals: Brian aims to transition from a hands‑on labor role to a supervisory position within the warehouse sector, such as Shift Lead or Logistics Coordinator, where he can apply his organizational
    strengths and curiosity about new technologies. He plans to obtain additional certifications in hazardous materials handling and safety training so he can become a Certified Warehouse Safety Trainer.
    A long‑term ambition is to combine his expertise in material handling with his passion for art by securing a role in a museum or gallery that requires careful storage and movement of artworks, or eventually
    launching a small boutique logistics service that specializes in the safe transport of art and antiques. He also intends to complete an associate’s degree in Business or Logistics to reinforce his career
    progression.
