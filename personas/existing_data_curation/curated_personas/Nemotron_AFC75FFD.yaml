    research'']'
  career_goals: Although retired, Javier aims to stay mentally and physically active. He wants to improve his health by walking regularly in Hermann Park and practicing gentle stretching. He hopes to digitize
    and preserve his family's migration photographs and oral histories, eventually publishing a small memoir for his grandchildren. Javier also aspires to teach a weekly cooking workshop at the community
    center, sharing his culinary heritage while learning new digital tools to better organize and share his lessons online. Managing stress and anxiety is a personal priority, so he plans to attend a local
    mindfulness group and keep a gratitude journal.
