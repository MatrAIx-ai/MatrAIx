  career_goals: Amaury dreams of becoming an engineer who creates useful, sustainable solutions for his community. He is interested in civil and environmental engineering, hoping to design smart infrastructure—such
    as eco‑friendly bridges or water‑conserving systems—both in his Connecticut hometown and in rural areas of Mexico. He also enjoys robotics and plans to study computer science or software engineering
    to develop educational technology that makes learning fun and accessible. To achieve these goals, he aims to maintain strong grades, pursue advanced STEM courses in high school, and participate in mentorship
    programs and internships.
