personas:
  professional: Amaury Bernardo is a budding robotics enthusiast who leverages a methodical, organized mindset to lead his middle‑school robotics club’s programming efforts, while his curiosity about how
    things work fuels innovative solutions like a self‑balancing LEGO rover.
  sports: Amaury Bernardo thrills to the rhythm of Saturday afternoon matches with the Cheshire Youth Soccer Club, idolizes the local professional team the Hartford Athletic for their teamwork, and maintains
    a disciplined fitness routine that mixes quick footwork drills with weekend bike rides, blending competitive drive with an easygoing love of outdoor play.
  arts: Amaury Bernardo strums an acoustic guitar, mastering both traditional folk ballads like 'Cielito Lindo' and contemporary pop hits from Billie Eilish and Ed Sheeran, while evenings often find them
    sketching cartoon characters inspired by graphic novels, revealing a creative spirit that bridges cultural heritage and modern influences.
  travel: Amaury Bernardo’s travel itinerary includes family road trips to the historic colonial town of Guanajuato — where they soak in vibrant festivals reminiscent of home celebrations — as well as annual
    summer visits to New York City’s interactive science museums, showcasing a curiosity‑driven blend of cultural immersion and educational adventure within family‑planned budgets.
  culinary: Amaury Bernardo loves cooking, regularly assisting in the preparation of tamales and mole during family gatherings, delights in seasoning dishes with fresh cilantro, oregano, and chili from
    their backyard herb garden, and occasionally experiments with fusion recipes that pair traditional flavors with American comfort foods like mac & cheese, reflecting both culinary reverence and playful
    experimentation.
  core: Amaury Bernardo is a methodical 12‑year‑old who fuses a love of robotics, soccer, and guitar with vibrant family traditions and a knack for balancing disciplined planning with youthful spontaneity.
background:
  cultural: Amaury’s cultural background blends Mexican heritage with life in suburban Connecticut. His family maintains strong ties to Mexican traditions—celebrating Día de los Muertos, cooking dishes
    such as tamales and mole, and speaking Spanish at home—while also embracing American customs and the local community. Growing up in Cheshire, he attends a diverse public middle school where he learns
    English and participates in cultural clubs that showcase his heritage. His bilingual upbringing nurtures his communication skills and gives him a sense of belonging to both cultures. He values the practical
    work ethic common in many Mexican families, which aligns with his organized, methodical personality, and he enjoys sharing his culture through food, music, and stories with friends and classmates.
