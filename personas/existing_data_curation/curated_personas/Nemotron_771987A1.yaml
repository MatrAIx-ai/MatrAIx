  hobbies: '["Visiting art museums and exhibitions", "Attending cultural festivals", "Backyard gardening", "Cooking Mexican cuisine", "Trail walking and birdwatching", "Digital photography", "Reading historical
    fiction and biographies", "Listening to Ranchera and folk music", "Senior storytelling circle participation", "Exploring watercolor painting"]'
  career_goals: As a retired senior, Andre’s ambitions center on staying engaged, giving back, and continuing personal growth. He aims to deepen his watercolor practice and explore other visual‑art techniques.
    He plans to record and archive his family’s migration stories, collaborating with the local senior center to create an oral‑history project for Mexican‑American residents. He hopes to mentor younger
    community members in storytelling, cooking, and basic home‑maintenance skills. Andre also aspires to serve as a cultural liaison, helping bridge language gaps in local services, and to make a modest
    trip back to his hometown in Mexico to reconnect with extended family and participate in a traditional Día de los Muertos celebration.
