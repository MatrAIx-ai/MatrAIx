personas:
  professional: Mabel Giddens is a budding junior naturalist and storyteller, channeling their curiosity for the outdoors and love of performance into leading school nature presentations and choreographed
    skits about local ecosystems, where they relish taking the spotlight.
  sports: Mabel Giddens plays forward for the Portland Youth Soccer Club, idolizes the Portland Timbers' attacking style, and eagerly tunes in to Timbers matches on weekends while they balance outdoor hikes
    like those to Multnomah Falls with school recess soccer games.
  arts: Mabel Giddens dazzles audiences in school plays, especially when performing scenes from "Peter Pan" and dancing to songs by The Wiggles, delights in painting river vistas inspired by Claude Monet,
    and spends rainy afternoons recreating simple animations of woodland creatures using Scratch Jr., all while they proudly display a LEGO model of a medieval castle.
  travel: Mabel Giddens plans family trips with a detailed scrapbook of maps, eagerly recounting hikes through the Columbia River Gorge and day trips to Crater Lake, dreaming of future adventures to the
    Grand Canyon, the ancient forests of Olympic National Park, and the bustling streets of Tokyo, while they prefer hands‑on exploration over lounging on a beach.
  culinary: Mabel Giddens enjoys measuring flour, brown sugar, and chocolate chips for batch‑size cookies, has a growing knack for whisking together banana‑bread batter, loves the aroma of cinnamon‑spiced
    apple crumble, and often experiments with adding a pinch of sea salt to homemade pizza dough, proudly serving their creations at family dinner.
  core: Mabel Giddens is a seven‑year‑old whirlwind of curiosity and stage‑ready confidence, balancing methodical planning and competitive spark with a healthy dose of worry that fuels their meticulous
    hobby collections and fearless outdoor quests.
background:
  cultural: Mabel grows up in Washougal, Washington, a small community that balances suburban life with easy access to the Columbia River Gorge. Her family celebrates typical American holidays such as Thanksgiving,
    Fourth of July, and Christmas, and they often incorporate regional traditions like weekend farmers‑market visits and outdoor picnics. Her ancestry traces back to English and German roots, reflected
    in family recipes and storytelling. The Pacific Northwest emphasis on environmental stewardship and appreciation for nature is a strong influence on her interests and values.
attributes:
  skills: '[''Reading aloud'', ''Basic arithmetic'', ''LEGO construction'', ''Organizational planning'', ''Public speaking'', ''Digital literacy (Scratch Jr.)'']'
  hobbies: '[''Hiking and nature collecting'', ''School theatre and dance'', ''LEGO building'', ''Painting'', ''Soccer'', ''Reading storybooks'', ''Puzzle solving'', ''Scratch Jr. coding'', ''Baking with
    family'']'
  career_goals: Mabel dreams of becoming an elementary school teacher or a wildlife scientist. She is fascinated by how things work and wants to solve problems in nature, aspiring one day to research river
    ecosystems in the Pacific Northwest. She also imagines herself on stage, perhaps as a storyteller or a news anchor, where she can share information with a large audience. Her ambition combines curiosity,
    practicality, and a desire to be a reliable guide for others.
