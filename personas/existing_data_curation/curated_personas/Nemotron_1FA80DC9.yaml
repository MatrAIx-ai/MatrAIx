personas:
  professional: Alejandro Todd, a seasoned meeting, convention, and event planner with a knack for weaving meticulous logistics, bilingual communication, and vibrant cultural programming, leverages Cvent,
    Social Tables, and Asana to deliver inclusive conferences that honor community traditions while meeting corporate objectives.
  sports: Alejandro Todd captains a local amateur soccer team in the Vado League, trains at the community park on Saturdays, follows New Mexico United’s matches, and complements his soccer routine with
    weekend hikes in the Organ Mountains and occasional climbs with a regional climbing club.
  arts: Alejandro Todd is an avid photographer who captures Día de los Muertos altars and desert sunsets, admires the works of Frida Kahlo and Diego Rivera, and spends evenings editing his images on Lightroom
    while listening to Lila Downs and Los Tigres del Norte.
  travel: Alejandro Todd favors meticulously planned road trips that blend adventure and cultural immersion, having driven to Oaxaca for a culinary workshop, explored White Sands and Carlsbad Caverns, and
    dreaming of a future visit to Barcelona’s modernist architecture, all while balancing family responsibilities and a modest travel budget.
  culinary: Alejandro Todd excels at preparing mole poblano, slow‑cooked pork tamales, and hearty pozole using ancho chilies, masa, and hominy, while experimenting with home‑brewed sours and amarillos that
    feature local hops and cacao, often sharing his creations at neighborhood potlucks.
  core: Alejandro Todd blends methodical event‑planning expertise with a love for community traditions, balancing meticulous budgets, health‑monitoring anxieties, and a habit of splurging on home‑brewing
    gadgets when stress spikes.
background:
  cultural: Alejandro grew up in Vado, a small border community in Doña Ana County, within a Mexican‑American household that prized family cohesion, bilingual communication, and participation in cultural
    celebrations such as Día de los Muertos and quinceañeras. His parents immigrated from Michoacán, and he was raised speaking both Spanish and English, navigating the intersection of Mexican heritage
    and the regional influences of the U.S. Southwest. This bicultural upbringing informs his professional ethos, encouraging inclusive event designs that honor Mexican traditions while resonating with
    a diverse audience. His cultural identity is rooted in community service, regional festivals, and the shared values of respect, hospitality, and perseverance.
attributes:
  skills: '["Event logistics coordination", "Budget planning and financial oversight", "Vendor sourcing and negotiation", "Risk assessment and contingency planning", "Client relationship management", "Bilingual
    communication (English/Spanish)", "Use of event management platforms (Cvent, Social Tables, Asana)", "Team leadership and staff supervision", "Cultural programming and inclusive event design", "Marketing
    and promotion", "Data analysis and post-event evaluation"]'
  hobbies: '["Hiking in the Southwest deserts", "Playing amateur soccer", "Cooking traditional Mexican cuisine", "Photography (event and landscape)", "Yoga and meditation", "Volunteering at community fundraisers",
    "Listening to norteño and mariachi music", "Homebrewing craft beer"]'
  career_goals: Alejandro aims to advance into a senior director role at a major regional convention center in the Southwest, overseeing large‑scale international conferences that highlight cross‑border
    trade, technology, and cultural exchange. Concurrently, he plans to launch his own boutique event‑planning firm that specializes in immersive, culturally authentic experiences for Mexican‑American and
    broader Latino audiences. He intends to earn the Certified Meeting Professional (CMP) credential, deepen his expertise in hybrid and virtual event production, and integrate sustainable practices into
    his operations. Mentoring emerging planners and building a stable financial foundation to support his personal life after divorce are also central to his long‑term ambitions.
