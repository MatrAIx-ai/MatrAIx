  career_goals: Maria aims to rise to a senior director or chief operations officer role within the next six years, leading the integration of advanced analytics and smart manufacturing across her organization.
    She also plans to launch a mentorship program for Puerto Rican women pursuing STEM careers, and ultimately start her own boutique consultancy that helps local producers adopt data‑driven, sustainable
    operations. Her ambition is balanced by a pragmatic focus on delivering tangible efficiency improvements and building a reputation as an innovative, results‑oriented leader.
