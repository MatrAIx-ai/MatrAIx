  hobbies: '[''Volleyball (recreational league)'', ''Zumba/Dance classes'', ''Hiking on San Bernardino trails'', ''Community theater (stage crew)'', ''Organizing potluck gatherings'', ''Volunteer work at
    a local food bank'', ''DIY home organization projects'', ''Reading personal development books'', ''Gardening in community garden'', ''Cooking and sharing recipes with friends'']'
  career_goals: Juliana aims to translate her structured, reliable work style into a full-time administrative or project coordination role within the next two years. She plans to enroll in a community college
    program for business administration and obtain a certified administrative assistant credential. Her long‑term ambition is to advance into a supervisory position or launch a small boutique event‑planning
    business that serves local community organizations, allowing her to blend her organizational strengths with her love for group activities.
