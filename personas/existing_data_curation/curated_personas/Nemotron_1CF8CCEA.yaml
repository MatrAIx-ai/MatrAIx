personas:
  professional: Gilberto Zuniga, a retired foreman of agricultural and oil‑field equipment repair, channels their decades‑long mechanical expertise, meticulous planning, and strict safety discipline into
    mentoring apprentices and supervising community workshop projects, and they are driven by a quiet competitive streak for flawless execution.
  sports: Gilberto Zuniga, an avid early‑morning walker and seasonal fisherman on the Guadalupe River, supports the Houston Astros and often participates in community‑organized senior softball leagues,
    and they balance low‑impact exercise with a love for the outdoors.
  arts: Gilberto Zuniga, a devoted fan of classic western television, regularly watches reruns of John Wayne and Clint Eastwood dramas, enjoys the storytelling of Cormac McCarthy, and they often listen
    to accordion‑driven folk music from regional groups like Los Lobos de Jalisco.
  travel: Gilberto Zuniga, who has explored the historic missions of San Antonio and taken weekend trips to the Texas Hill Country, now dreams of a pilgrimage to Jalisco, Mexico to reconnect with extended
    family and taste the birthplace of their cherished heirloom chilies, and they plan the journey around their retirement budget.
  culinary: Gilberto Zuniga, a seasoned home cook, cultivates heirloom tomatoes, chilies, and herbs in their garden and skillfully transforms them into family‑favorite pozole, tamales, and carne asada,
    favoring fresh corn masa, smoky chipotle, and aromatic cilantro in every dish, and they take pride in sharing these meals at community gatherings.
  core: Gilberto Zuniga blends disciplined craftsmanship, routine‑driven health habits, and a quiet competitive spirit, all while anchoring family life with garden‑fresh meals and a steadfast commitment
    to mentoring the next generation, and they never miss an evening of classic western TV.
background:
  cultural: Gilberto was born in Victoria, Texas, to Mexican immigrant parents who preserved a bilingual, Catholic household that celebrated Mexican holidays such as Día de los Muertos and Mexican Independence
    Day alongside Texan traditions. He grew up speaking Spanish at home and English at school, giving him a deep appreciation for both cultures. His culinary upbringing is rooted in family recipes passed
    down through generations, and he continues to honor these traditions through his cooking. Living in the Gulf Coast region of Texas, Gilberto blends Mexican customs with local Tex-Mex influences, reflecting
    a hybrid identity that values family loyalty, hard work, respect for elders, and community service.
attributes:
