personas:
  professional: Jaden Lewis, a retired mechanical and electrical engineer with a knack for hands‑on problem solving, now channels his curiosity and practical mindset into mentoring high‑school robotics
    teams, repairing senior‑center equipment, and designing the layout for a makerspace where they will teach basic electronics and woodworking.
  sports: Jaden Lewis stays fit by hiking the Bighorn Mountains in summer, joining the senior “Bighorn Trailwalkers” club for weekly walks, playing casual pick‑up basketball with the Wyoming Wildcats at
    the senior centre, and cheering on the Denver Broncos and Wyoming Cowboys football teams, while dabbling in snowshoeing during winter months.
  arts: Jaden Lewis expresses creativity through landscape photography inspired by Ansel Adams, volunteers on stage for the Old West Playhouse community‑theater troupe performing classics like Arthur Miller’s
    “Death of a Salesman,” and finds solace in listening to Neil Young and folk singer Bob Dylan while they unwind after a day of woodworking.
  travel: Jaden Lewis favours road‑trip adventures that blend spontaneous detours with modest planning, having already visited Yellowstone, Grand Teton, and Zion National Parks with their wife, dreaming
    of a future pilgrimage to Iceland’s volcanic landscapes and New Zealand’s fjords, yet they balance travel aspirations with a fixed retirement budget.
  culinary: Jaden Lewis enjoys home‑cooked meals harvested from their garden—such as heirloom tomato bruschetta, grilled trout with rosemary‑infused butter, and spiced pumpkin soup—while expertly canning
    seasonal beets and peaches for board‑game nights, though they sometimes over‑salt their famous beef stew in pursuit of a richer flavor.
  core: Jaden Lewis is a sociable retiree who blends engineering precision with a love for community, juggling a habit of occasional forgetfulness to spreadsheets with a relentless curiosity that fuels
    their makerspace dreams and weekend board‑game marathons.
background:
  cultural: Jaden is a product of the small‑town, Western‑frontier culture of Sheridan, Wyoming. Raised on a family ranch with German‑Irish ancestry, he internalized values of self‑reliance, neighborliness,
    and respect for the land. His upbringing emphasized practical skills, community service, and a strong work ethic, while his bachelor's degree in a STEM field introduced a curiosity for innovation and
    problem‑solving. He participates in local rodeo celebrations, church gatherings, and seasonal festivals, and he respects the region’s Native American heritage through collaborative community events.
    This blend of pioneer spirit, rural solidarity, and lifelong learning shapes his outlook and daily life.
