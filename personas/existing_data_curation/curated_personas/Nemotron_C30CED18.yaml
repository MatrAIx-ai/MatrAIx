  career_goals: Although officially retired, Jaden wants to stay active by establishing a small makerspace at the local senior center where he can teach basic electronics and woodworking, continue mentoring
    high‑school robotics teams, write a memoir documenting his life on the high plains, travel to national parks with his wife, and champion programs that promote senior health, lifelong learning, and intergenerational
    community building.
