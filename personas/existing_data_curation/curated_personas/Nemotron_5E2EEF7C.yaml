    "Policy advocacy"]'
  hobbies: '["Watercolor painting", "Reading contemporary literary fiction", "Visiting art galleries and museums", "Gardening", "Experimenting with new cooking recipes", "Walking her dog in local parks",
    "Participating in a small book club", "Volunteering at the community theater", "Yoga and mindfulness meditation", "Local history research"]'
  career_goals: Phyllis envisions expanding the reach of arts‑infused early education across the Camden County district. Over the next five years she aims to secure grant funding for a county‑wide STEAM
    initiative, mentor emerging administrators, and develop a replicable model for inclusive curriculum that can be adopted by neighboring districts. She plans to complete a doctorate in educational leadership
    to deepen her policy expertise and to position herself as a regional consultant after retirement. Ultimately, she hopes to leave a lasting legacy of collaborative, student‑centered programs that celebrate
    creativity and cultural diversity.
