personas:
  professional: Elizabeth Thompkins is a seasoned retail leader who leverages their business degree, Excel analytics, and assertive coaching style to drive sales growth while balancing structured scheduling
    with a flexible, people‑centric approach.
  sports: Elizabeth Thompkins is an avid hiker with the Santa Susana Trailblazers club, a regular participant in community pickleball leagues, and a devoted fan of the Los Angeles Dodgers and the LA Galaxy,
    blending seasonal outdoor adventures with social team sports, and they often rally friends for weekend trail outings.
  arts: Elizabeth Thompkins immerses themselves in the arts through a lively book club that tackles contemporary fiction, enjoys salsa dancing to the rhythms of Celia Cruz and Carlos Vives, and frequently
    attends local theater productions featuring works by playwrights such as August Wilson, and they often discuss the performances over coffee with fellow members.
  travel: Elizabeth Thompkins prefers weekend escapes to California’s national parks like Yosemite and Sequoia with their husband, while also planning occasional longer trips to international destinations
    such as Vancouver’s Stanley Park and the historic streets of Lisbon, and they balance budget‑friendly itineraries with their love for nature.
  culinary: Elizabeth Thompkins delights in cooking family‑style meals, often preparing roasted vegetable lasagna, fresh garden salsa, and grilled salmon with lemon‑dill sauce, showcasing a competent home‑cook
    skill set that blends seasonal produce from their garden with classic comfort flavors, and they love sharing these dishes at community potlucks.
  core: Elizabeth Thompkins combines a structured retail mindset with a spontaneous love for hiking, salsa, and garden‑fresh cooking, all while occasionally misplacing their keys during busy days, and they
    laugh it off with a steady grin.
background:
  cultural: Elizabeth was raised in a middle‑class suburban setting in the Midwest before moving to Southern California in her thirties. Her cultural background reflects traditional American values, with
    a strong emphasis on community involvement, family gatherings, and holiday celebrations such as Thanksgiving and Fourth of July. Her white ethnic heritage combines a blend of Midwestern work ethic and
    West Coast openness, influencing her collaborative yet assertive approach to both personal and professional life.
