  hobbies: '[''Gardening'', ''Reading historical biographies'', ''Crossword and Sudoku puzzles'', ''Knitting'', ''Volunteering at church health‑education group'', ''Walking in forest preserve'', ''Birdwatching'']'
  career_goals: As she approaches the latter stage of her career, Maria aims to solidify her legacy by leading a department-wide initiative that reduces patient wait times by 15% and improves safety scores
    across the facility. She seeks to obtain a Certified Medical Manager (CMM) credential to formalize her expertise, and she hopes to transition into a consulting role where she can guide smaller clinics
    in adopting best‑practice operational frameworks. Additionally, she aspires to mentor at least three junior managers annually, ensuring a smooth succession plan for her team, and she is interested in
    authoring a practical handbook on healthcare management for mid‑size facilities.
