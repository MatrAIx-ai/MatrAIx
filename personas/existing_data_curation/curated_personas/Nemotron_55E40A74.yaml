  career_goals: Ilene intends to finish a Bachelor’s degree in Communications with a concentration in Public Relations, leveraging her love of structured planning and community engagement. In the short
    term, she aims to secure a role as a community outreach coordinator for a regional nonprofit or healthcare organization, where she can combine her sociable personality with her knack for organizing
    predictable, well‑run programs. Long‑term, she aspires to launch a multipurpose community center in Odessa that offers educational workshops, social events, and volunteer opportunities, fostering a
    supportive and harmonious environment for residents.
