persona_description: A Health Researcher with a background in community health and urban planning. They are interested in studying the impact of built environments on community health and are familiar with
  the use of the IMI (Indoor Movement Index) to measure physical activity levels. They have experience working with health surveys and have a strong understanding of the CCHS data. They are also familiar
  with the use of GPS technology and have experience working with CyberTracker software. They are looking for a comprehensive dataset that includes information on the built environment, health survey data,
  and physical activity levels to analyze the relationship between the two.
