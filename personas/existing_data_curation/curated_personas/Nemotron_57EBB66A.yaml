  hobbies: '[''quilting'', ''watercolor painting'', ''reading historical fiction and poetry'', ''genealogy research'', ''nature walks and birdwatching'', ''attending local folk and bluegrass music festivals'',
    ''cooking Southern dishes'', ''heirloom vegetable gardening'', ''craft circle participation'', ''mindfulness meditation'']'
  career_goals: Betty aims to expand her creative and community impact in her retirement. She plans to learn digital art tools such as watercolor illustration software to complement her traditional painting.
    She aspires to compile and self‑publish a memoir that weaves together her family history, culinary traditions, and personal reflections on resilience. By launching an online shop for her quilts, she
    hopes to share her craftsmanship with a broader audience while generating modest income. Betty also wants to mentor younger women in Tellico Plains through a monthly craft circle, fostering skill sharing
    and confidence. She intends to enroll in a local art‑history class to deepen her understanding of American folk art, and she hopes to travel to at least three major art museums in the next five years.
    Finally, she seeks to cultivate a community garden that provides fresh produce for seniors and to continue practicing mindfulness techniques to manage her anxiety and emotional reactivity.
