persona_description: A museum educator who is passionate about using game structures to enhance learning experiences in both real and virtual settings. They are skilled in designing public programs for
  adults at the Peabody Essex Museum and are interested in exploring the use of games in museum learning, especially through role-playing, action games, tabletop games, period games, and parlor games/social
  games. They are also interested in the application of game principles to historical and cultural topics, such as bringing historical moments to life through material culture and leisure time activities.
