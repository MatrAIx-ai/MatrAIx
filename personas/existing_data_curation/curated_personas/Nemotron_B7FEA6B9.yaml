  hobbies: '[''Hiking in local trails'', ''Gardening and vegetable growing'', ''Cooking and food preservation'', ''Reading non-fiction and DIY manuals'', ''Knitting and crocheting'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Volunteering at animal shelter'', ''Participating in small community clean‑up events'']'
  career_goals: 'Tracy aims to move from a machine operator role to a shift lead or production supervisor position within the next three to five years. She plans to obtain OSHA 30‑hour certification, pursue
    an associate degree in manufacturing technology, and acquire specialized training in CNC and equipment maintenance. Her long‑term ambition is to lead continuous‑improvement projects, mentor a larger
    team, and eventually transition into a quality‑assurance or safety‑officer role where she can shape a supportive, high‑performing work environment.

