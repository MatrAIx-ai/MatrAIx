personas:
  professional: Tracy Blissett, a 28‑year‑old packaging and filling machinery operator, leverages her meticulous attention to detail, lean‑manufacturing expertise, and natural curiosity to troubleshoot
    equipment, mentor newcomers, and continuously refine safety protocols, all while quietly aspiring to lead a production team.
  sports: Tracy Blissett, an avid weekend hiker on Westbrook’s coastal trails and member of the Westbrook Trailblazers hiking club, roots for the New England Patriots, joins a co‑ed adult softball league
    at the community center, and completes the annual October half‑marathon in Portland.
  arts: Tracy Blissett curates her downtime with a playlist of indie folk icons like Sufjan Stevens and Brandi Carlile, devours nonfiction by Malcolm Gladwell and Elizabeth Kolbert, attends the seasonal
    exhibit at the Portland Museum of Art featuring works by contemporary painter Amy Sherald, and knits while listening to audiobooks by Yuval Noah Harari.
  travel: Tracy Blissett prefers low‑key, self‑planned road trips that blend hiking and conservation, has trekked Acadia National Park’s basalt cliffs, volunteered at a wildlife sanctuary in Costa Rica,
    and dreams of exploring the lavender fields of Provence during a quiet summer retreat.
  culinary: Tracy Blissett, a home‑grown garden enthusiast, expertly whips up seasonal ratatouille with heirloom tomatoes, preserves wild‑berry jams, experiments with a rosemary‑infused sourdough starter,
    and always stocks her pantry with fresh kale, local honey, and artisanal cheese.
  core: Tracy Blissett, 28, blends pragmatic curiosity with quiet compassion, turning meticulous machine‑shop expertise into sustainable living, disciplined budgeting, and a low‑key love of nature‑filled
    pursuits.
background:
  cultural: Tracy comes from a multi‑generational New England white family with Anglo‑American and Irish roots. Growing up in Westbrook, Maine, she was shaped by the region’s emphasis on self‑reliance,
    modesty, and close‑knit community ties. Local customs such as seasonal harvest gatherings, coastal seafood traditions, and town festivals fostered her appreciation for hard work, simplicity, and community
    service. These cultural influences underpin her practical mindset, compassion, and collaborative spirit.
attributes:
  skills: '[''Packaging machine operation'', ''Filling machine operation'', ''Preventive maintenance'', ''Quality control and inspection'', ''Safety compliance'', ''Troubleshooting mechanical and electrical
