  hobbies: '[''Reading'', ''Walking'', ''Gardening'', ''Yoga'', ''Cooking'', ''Crafting'', ''Podcast listening'', ''Volunteer work'']'
  career_goals: Opal aims to advance to the role of Director of Early Childhood Services for the Broward County School District, where she can shape district-wide policies that prioritize holistic child
    development and staff well-being. She plans to complete a bachelor's degree in Educational Leadership and obtain certification in school administration. Her long-term ambition is to develop a network
    of community-based learning centers that blend play-based curricula with evidence-based assessment, secure sustainable funding through grants, and embed mental-health resources for children and employees.
