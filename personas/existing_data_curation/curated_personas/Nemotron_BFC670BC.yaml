personas:
  professional: Leonardo Rivera, a veteran civil litigator and immigration attorney, leverages four decades of courtroom advocacy, sharp cross‑examination, and strategic settlement negotiation while channeling
    their curiosity‑driven practicality and competitive, sometimes disorganized, workflow into mentorship‑ready advisory work.
  sports: Leonardo Rivera, a devoted fan of the Houston Astros and Rockets, participates in the senior walking group at Hermann Park, plays occasional doubles tennis at the local community center, and treats
    chess tournaments as mental sport, balancing low‑impact exercise with competitive mental challenges.
  arts: Leonardo Rivera, an avid street photographer, captures Houston’s eclectic architecture while drawing inspiration from Sebastião Salgado, enjoys listening to classical guitar virtuoso Andrés Segovia
    and salsa legends like La Sonora Dinamita, and regularly attends exhibitions at the Museum of Fine Arts.
  travel: Leonardo Rivera favors flexible, culturally immersive trips, having explored the historic streets of Antigua, Guatemala, and the colonial charm of Granada, Nicaragua, while dreaming of a leisurely
    Parisian sojourn to practice French, always blending solitary reflection with occasional group tours.
  culinary: Leonardo Rivera, an experienced home‑cook, expertly prepares traditional pupusas stuffed with cheese, loroco, and pork, cultivates fresh herbs and fiery peppers for salsa, and occasionally experiments
    with coq au vin, showcasing a blend of heritage flavors and occasional French curiosity.
  core: Leonardo Rivera is a seasoned attorney whose competitive edge, curiosity, and meticulous empathy are tempered by a laid‑back, sometimes disorganized lifestyle, intense anxiety, and a penchant for
    chess, herb gardening, and reflective writing.
background:
  cultural: Leonardo Rivera was born to Salvadoran parents who immigrated to the United States during the civil war era. Raised in a bilingual household, he grew up celebrating traditional festivities such
    as Las Posadas and the Feast of San Salvador, while also integrating into the broader Hispanic community of Houston. His Catholic upbringing influences his values of solidarity and service, which he
    expresses through volunteer work with local immigrant assistance programs. In his professional life, Leonardo leverages his Salvadoran heritage to provide culturally sensitive legal counsel, understanding
    the nuances of family dynamics, remittance concerns, and community networks. He maintains strong ties with the Salvadoran diaspora in Texas, regularly attending community gatherings at the Salvadoran
    Cultural Center, and mentors younger Salvadoran‑American law students, fostering a sense of continuity and shared identity.
