  career_goals: At 65, Leonardo aims to transition from full‑time courtroom work to a mentorship and advisory role. He plans to join a nonprofit legal aid organization that serves Salvadoran immigrants
    in Houston, offering pro‑bono counsel and policy advocacy. He also aspires to publish a series of articles that blend legal analysis with humanistic perspectives on migration, and to write a memoir
    reflecting on his legal career and cultural heritage. Additionally, Leonardo hopes to establish a boutique consultancy focused on dispute resolution for small businesses, capitalizing on his competitive
    edge and deep network of legal professionals.
