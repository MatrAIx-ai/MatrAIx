persona_description: A teacher who is dedicated to promoting cooperative learning in the classroom and has experience in designing and implementing effective cooperative learning activities. She is knowledgeable
  about the five basic elements of cooperative learning and how they can help positive efforts and group achievement. She is passionate about empowering students to manage teamwork and task work successfully
  and believes that cooperative learning can promote advanced level of thinking skills. She is open to new learning processes and is willing to actively involve students in discovering knowledge through
  dialogue. She is interested in the advantages and disadvantages of cooperative learning and is willing to adopt this style of classroom learning in her teaching.
