  hobbies: '["Fishing", "Hunting", "Barbecue Cooking", "Community Gardening", "Acoustic Guitar Playing", "Folk Music Jam Sessions", "Genealogy Research", "Appalachian History Study", "Woodworking", "Volunteer
    Firefighting", "Community Dance"]'
  career_goals: Although retired from full‑time work, John aims to deepen his impact on the Hurricane community. He wants to expand the local community garden, mentor younger volunteers in emergency response
    and event organization, compile and digitize a collection of oral histories documenting Putnam County’s Appalachian heritage, and author a memoir that captures his life lessons on resilience and adaptability.
    He also hopes to learn more about digital media to share these stories widely.
