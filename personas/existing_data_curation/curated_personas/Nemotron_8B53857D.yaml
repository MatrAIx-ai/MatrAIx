personas:
  professional: Amanda Bradley, a budding teen creator, merges curiosity for technology with practical skills by designing simple tablet games and digital illustrations, while also coordinating school drama
    productions and soccer practice schedules, evidencing a reliable yet flexible work ethic, and they consistently meet deadlines.
  sports: Amanda Bradley, a dedicated midfielder for the Ozark Hills Youth Soccer Club, trains under Coach Ramirez on Saturday mornings, cheers for Manchester City’s tactical brilliance and the St. Louis
    Cardinals’ home‑run spirit, and they balance fitness with weekend hikes on the Ozark Trail, favoring cardio endurance over weightlifting.
  arts: Amanda Bradley shines as a lead actor in her school's production of "The Little Prince", draws inspiration from Studio Ghibli’s "Spirited Away" and digital artist Beeple, creates fan art for sci‑fi
    author Neal Stephenson, and they collaborate on short indie games with classmates, infusing storytelling into every sketch.
  travel: Amanda Bradley enjoys weekend road trips to Branson and Hot Springs for hiking, dreams of attending the Cherry Blossom Festival in Tokyo and exploring the Grand Canyon, plans trips around school
    holidays, and they balance a limited budget by camping and relying on family carpool.
  culinary: Amanda Bradley loves baking chewy chocolate chip cookies with a hint of sea salt, experimenting with oat‑banana muffins topped with cinnamon, and they often add rainbow sprinkles to cupcakes
    for family gatherings, yet they sometimes forget to set a timer, resulting in slightly burnt edges.
  core: Amanda Bradley blends a soccer player's stamina, a drama club's expressiveness, and a budding tech creator's curiosity, budgeting spare change for art tools while navigating teenage allergies and
    late‑night coding marathons, and they always find time to volunteer at the animal shelter.
background:
  cultural: Raised in Joplin, Missouri, Amanda experiences a close-knit Midwestern lifestyle where family, school events, community fairs, and local volunteer activities are central. Her upbringing blends
    typical small-town values of self-reliance, neighborly support, and appreciation for outdoor recreation with exposure to diverse school clubs, shaping her pragmatic outlook and outgoing personality.
