  career_goals: Amanda dreams of becoming a veterinarian or wildlife rehabilitation specialist, combining her curiosity about biology with a practical desire to help animals and her community. She aims
    to pursue environmental science in college, take on leadership roles in school clubs, and later work on conservation projects that involve community education and outreach.
