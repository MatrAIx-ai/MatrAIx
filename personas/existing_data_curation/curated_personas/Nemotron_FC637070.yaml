  career_goals: Although officially retired, Francisco aims to channel his business acumen and artistic curiosity into legacy projects. He plans to write and self‑publish a memoir that blends his Mexican
    heritage with his Californian mountain life, and to create an online portfolio showcasing his photography and watercolor paintings. He hopes to mentor his grandchildren in basic financial literacy and
    entrepreneurship, while also volunteering to give free workshops on budgeting at the local community center. Competing in regional chess tournaments and entering a senior‑category photography contest
    provide him with a healthy outlet for his competitive streak. Finally, he intends to travel to Oaxaca and the Yucatán to study traditional Mexican folk art and document it through his own sketches and
    photos, preserving those influences for future generations.
