  hobbies: '[''Sketching and drawing'', ''Digital illustration on tablet'', ''Photography of desert landscapes'', ''Hiking and nature walks'', ''Playing acoustic guitar'', ''Songwriting'', ''School drama
    club performances'', ''Creating TikTok art videos'', ''Volunteering at community garden events'', ''Attending local art festivals'']'
  career_goals: Melanie aspires to turn her love for visual storytelling into a career. She hopes to attend an arts-focused high school or a college program in graphic design, animation, or film production,
    where she can build a strong portfolio. In the long term, she dreams of becoming a multimedia artist or creative director who can blend illustration, video, and social media campaigns to highlight social
    and environmental issues, especially those affecting desert ecosystems. She also wants to develop a supportive network of fellow creators and learn ways to manage stress while pursuing ambitious projects.
