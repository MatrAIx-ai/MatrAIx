personas:
  professional: Velkis Almandoz is a seasoned facilities caretaker who leverages bilingual communication, green cleaning expertise, and a competitively curious mindset to streamline building maintenance
    while balancing practical organization with innovative problem‑solving.
  sports: Velkis Almandoz stays fit by playing forward for the El Paso United amateur soccer league in spring, casting a line on the Rio Grande during summer fishing weekends, and cheerfully follows the
    Dallas Cowboys (NFL) and Houston Astros (MLB) while attending local high‑school track meets for community support.
  arts: Velkis Almandoz enjoys winding down after a shift by listening to the soulful guitar work of Carlos Santana, the lyrical storytelling of Lila Drexler, and catching live folk performances at community
    festivals, allowing music to punctuate their otherwise practical routine.
  travel: Velkis Almandoz prefers road‑trip itineraries that blend scenic rest stops along the Rio Grande with cultural stops in Austin and Santa Fe, often budgeting for family reunions, while dreaming
    of a cross‑border adventure to Patagonia and a weekend getaway to the historic town of San Miguel de Allende.
  culinary: Velkis Almandoz, a confident home cook, delights in mastering family recipes like tamales stuffed with pork and masa, chiles rellenos layered with roasted poblano peppers and cheese, and hearty
    pozole simmered with hominy, cilantro, and lime, often adding fresh cilantro and radish garnish to elevate each bite.
  core: Velkis Almandoz is a competitively curious facilities pro who balances a relentless work ethic with a habit of over‑stocking cleaning supplies and occasional late‑night soccer debates.
background:
  cultural: Velkis was raised in a Mexican‑American household in Eagle Pass, Texas, where Spanish and English are spoken interchangeably. His family emphasizes strong family ties, respect for elders, and
    the celebration of cultural holidays such as Día de los Muertos, Cinco de Mayo, and local fiestas. The bicultural environment has instilled in him a blend of Mexican traditions—like sharing homemade
    meals and music—and American work ethic values, such as punctuality and personal responsibility. He participates in church and community events, maintains close relationships with extended family, and
    sees his cultural identity as a source of pride that informs his daily interactions, cooking, and community involvement.
attributes:
  skills: '[''Commercial cleaning'', ''Facility maintenance'', ''Basic plumbing repairs'', ''Floor care (strip and wax)'', ''Equipment troubleshooting'', ''Safety compliance (OSHA)'', ''Bilingual communication
