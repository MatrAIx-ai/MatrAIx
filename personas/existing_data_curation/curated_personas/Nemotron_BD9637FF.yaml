  hobbies: '[''Soccer (local league)'', ''Fishing on the Rio Grande'', ''Cooking traditional Mexican dishes'', ''DIY home improvement projects'', ''Listening to podcasts on cleaning technology and entrepreneurship'',
    ''Attending community festivals'', ''Family gatherings'']'
  career_goals: Velkis aims to advance from a frontline janitor to a supervisory or facilities manager role within the next five years. He plans to obtain certifications in OSHA safety, green cleaning,
    and basic HVAC maintenance through community college courses. His ambition includes leading a team of custodial staff, implementing sustainable cleaning protocols to reduce chemical waste, and establishing
    a reputation as a reliable and efficient building caretaker. Eventually, he hopes to start his own small cleaning service that serves local businesses and residential properties, leveraging his bilingual
    skills and deep community connections to grow a trusted client base.
