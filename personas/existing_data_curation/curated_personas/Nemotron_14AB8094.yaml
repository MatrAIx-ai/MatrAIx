  career_goals: Travis aims to move from his current production‑worker role to a shift‑lead position within the next two years, and eventually become a plant supervisor or operations manager. He plans to
    earn a certification in industrial maintenance and become a certified CNC operator to broaden his technical qualifications. Long‑term, he envisions starting a small workshop that offers custom metal‑fabrication
    and woodworking services, giving him the flexibility to implement his own ideas while building a stable financial future.
