  hobbies: '[''Gardening'', ''Quilting'', ''Walking club'', ''Historical fiction reading'', ''Bingo'', ''Food pantry volunteering'', ''Church activities'', ''Cooking'']'
  career_goals: Although approaching retirement, Lana aims to transition into a part‑time advisory role where she can share her extensive knowledge with newer employees, help improve safety protocols, and
    contribute ideas for modernizing the assembly process. She is also interested in obtaining a certification in CNC machine basics to stay current with evolving technology. Beyond work, Lana hopes to
    volunteer as a skills trainer at the local community college’s vocational program and to support her husband's hobby woodworking projects.
