personas:
  professional: Omar Small is a methodical carpenter who combines expertise in residential framing, blueprint interpretation, and sustainable woodworking with a competitive edge, rigorously planning each
    project, inventorying materials, and mentoring apprentices only after personally verifying their skill levels.
  sports: Omar Small spends evenings shooting hoops at a Bronx park, follows the New York Knicks and New York Yankees, competes in a weekend pick‑up basketball league at the local community center, and
    complements the street‑ball sessions with weekly jogs through Van Cortlandt Park.
  arts: Omar Small curates playlists featuring Miles Davis, Kendrick Lamar, and Robert Glasper, captures the Bronx’s vivid street life with a Fujifilm X‑100 inspired by Joel Meyerowitz, and attends live
    jazz sets at the Blue Note to fuel both his photographic eye and his love of improvisational music.
  travel: Omar Small enjoys short road trips to the Hudson Valley’s fall foliage, has explored New Orleans’ jazz districts, and dreams of traveling to Jamaica to immerse in Caribbean culinary traditions
    while scouting sustainable wood sources for future furniture designs.
  culinary: Omar Small, a self‑taught cook, blends Southern comfort with Caribbean heat in dishes like jerk‑spiced shrimp and grits, collard greens simmered with coconut milk, and sweet‑potato pie drizzled
    with rum‑infused caramel, often seasoning with Scotch bonnet peppers, smoked paprika, and fresh herbs.
  core: Omar Small merges a carpenter’s precision with a photographer’s curiosity, balancing a relentless drive for sustainable craftsmanship with a habit of staying up late tinkering on LED projects, all
    while occasionally over‑ordering components that crowd the workshop bench.
background:
  cultural: Omar grew up in the Bronx, a culturally rich borough where diverse traditions intersect. He is African American, and his family's roots trace back to the Southern United States, with relatives
    who migrated to New York during the Great Migration. The neighborhood's blend of Black, Caribbean, and Latino influences shaped his worldview, fostering a deep appreciation for community solidarity,
    music, and food. Omar's cultural identity is reflected in his work ethic—valuing reliability, craftsmanship, and mentorship—and in his personal life, where family gatherings, neighborhood block parties,
    and the rhythms of the city serve as constant sources of inspiration.
