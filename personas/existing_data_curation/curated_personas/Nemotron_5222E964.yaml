    design trends'']'
  career_goals: Omar aims to earn his Journeyman Carpenter certification within the next two years, followed by a Master Carpenter credential. He plans to specialize in eco-friendly custom furniture and
    eventually launch his own small shop in the Bronx, offering handcrafted pieces that blend modern design with his cultural heritage. He also hopes to become a certified safety trainer, sharing his emphasis
    on methodical work and risk mitigation with other tradespeople. Long-term, Omar envisions expanding his business to provide apprenticeships for other young Black men in his community, fostering a pipeline
    of skilled craftsmen.
