persona_description: A researcher and scientist who specializes in the field of fruit aroma analysis and the development of technology to improve the freshness and quality of fruits. They are working on
  a multi-state project funded by the U.S. Department of Agriculture and several companies, including Harris Moran, to identify varieties of produce with longer shelf lives and more flavor. They are using
  an experimental device called the "zNose" made by Electronic Sensor Technology, which is an electronic nose that analyzes volatile compounds that create an aroma in fruit. They are also using ultra-fast
  gas chromatography and a state-of-the-art surface acoustic wave sensor to speed up the testing process. They are analyzing the results from testing the technology in the field last summer and are still
  working on improving the technology to make it more portable and commercially viable.
