  hobbies: '[''Gardening'', ''Hiking'', ''Book Club'', ''Cooking'', ''Quilting'', ''Volunteering at Food Bank'', ''Community Theater'', ''Reading Historical Fiction'', ''Woodworking'', ''Listening to Classic
    Rock'']'
  career_goals: Jeannette aims to advance to a regional director role overseeing community services across Armstrong County and neighboring districts, where she can shape a sustainable funding model and
    expand outreach to underserved populations. She plans to earn a professional certification in nonprofit leadership and mentor emerging social service professionals. Long‑term, she envisions launching
    a collaborative coalition of local agencies to address systemic challenges such as poverty, mental health, and workforce development, positioning Saltsburg as a model of resilient, community‑driven
    growth.
