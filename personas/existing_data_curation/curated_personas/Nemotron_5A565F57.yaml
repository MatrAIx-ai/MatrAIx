personas:
  professional: Jeannette Mchenry, a senior community services manager in Saltsburg, leverages her structured mindset, grant‑writing expertise, and collaborative temperament to design data‑driven programs
    that meet the immediate needs of underserved families while systematically building sustainable funding pipelines.
  sports: Jeannette Mchenry hikes the Allegheny trails year‑round with the local hiking club, plays Thursday night pickleball at the Saltsburg recreation center, and passionately supports the Pittsburgh
    Steelers and Penguins, using sport as a structured outlet for stress relief.
  arts: Jeannette Mchenry immerses herself in classic rock legends like Bruce Springsteen and The Eagles while volunteering at community theater productions of 'Our Town,' reads historical fiction by Philippa
    Gregory, and expresses her creativity through quilting patterns inspired by folk motifs and occasional woodworking projects.
  travel: Jeannette Mchenry prefers meticulously planned road trips that blend nature and history, such as weekend stays in the Adirondacks, guided tours of Colonial Williamsburg, and seasonal visits to
    the Great Smoky Mountains, while keeping travel budgets tight to fund her community initiatives.
  culinary: Jeannette Mchenry enjoys cooking family‑style chicken pot pie, simmering vegetable stews with fresh garden herbs, and mastering homemade sourdough, yet she occasionally treats herself to take‑out
    sushi after long grant‑writing nights, showcasing an intermediate culinary skill set anchored in comfort food.
  core: Jeannette Mchenry is a pragmatic, hands‑on community leader who balances structured planning with creative hobbies, tends a garden for calm, and occasionally over‑budgets on quilting supplies, all
    while nurturing a deep commitment to local resilience.
background:
  cultural: Jeannette grew up in a white, middle‑class family in western Pennsylvania, where values of hard work, modesty, and close‑knit community life are deeply rooted. Influenced by Appalachian traditions,
    she appreciates local crafts, seasonal festivals, and the strong church presence that shaped her sense of service. Her business education provided a pragmatic, structured outlook, which she blends with
    a genuine concern for harmony and the well‑being of her neighbors. This cultural mix informs both her professional approach to organized community work and her personal enjoyment of down‑to‑earth hobbies.
attributes:
  skills: '[''Program Design and Implementation'', ''Grant Writing'', ''Budgeting and Financial Oversight'', ''Volunteer Recruitment and Coordination'', ''Strategic Planning'', ''Data Analysis and Reporting'',
