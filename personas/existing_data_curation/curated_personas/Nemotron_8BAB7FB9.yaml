  hobbies: '[''Cooking Salvadoran Dishes'',''Cumbia and Salsa Dancing'',''Herb Gardening'',''Volunteer Work at Community Center'',''Reading Historical Fiction'',''Attending Cultural Festivals'',''Traveling
    to El Salvador'']'
  career_goals: Although retired from formal employment, Yesenia aims to channel her expertise into mentoring emerging Latino entrepreneurs, serving on the board of local non-profits focused on elder services,
    and leading cultural festivals that highlight Salvadoran heritage. She hopes to develop a regional workshop series on financial literacy for senior citizens and to act as a cultural liaison between
    Los Angeles municipal programs and the Salvadoran community. Ultimately, she wishes to leave a lasting impact by strengthening community ties and fostering economic empowerment for her peers.
