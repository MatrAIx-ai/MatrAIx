personas:
  professional: A seasoned community organizer and former business administrator, Yesenia Rodriguez leverages their methodical planning, bilingual fluency, and reliable nature to coordinate senior outreach
    programs, mentor emerging entrepreneurs, and keep every initiative on schedule and within budget.
  sports: A lively participant in group fitness, Yesenia Rodriguez joins a weekly cumbia dance troupe, walks with a senior walking club through Griffith Park each Saturday, and passionately follows the
    Los Angeles Dodgers and the LA Galaxy, cheering them on during baseball and soccer seasons.
  arts: A devoted patron of the arts, Yesenia Rodriguez attends Los Angeles Latino Theatre Ensemble productions, dances to the lively rhythms of La Sonora Dinamita, enjoys poetry readings by Lila Downs,
    and decorates their home with reproductions of Frida Kahlo’s paintings, fostering a deep connection to cultural expression.
  travel: A meticulous planner, Yesenia Rodriguez prefers organized group tours that blend cultural immersion with relaxation, traveling each winter to reunite with family in San Salvador, dreaming of a
    culinary road trip through Oaxaca, and scheduling annual visits to the historic missions of San Juan Capistrano.
  culinary: A skilled home chef, Yesenia Rodriguez expertly prepares pupusas stuffed with loroco and cheese, slow‑cooked pork tamales, and salsa verde made from garden‑fresh cilantro and tomatillos, often
    sharing these dishes in community cooking classes while occasionally treating themselves to churros from a downtown market.
  core: Yesenia Rodriguez blends meticulous planning with a gregarious spirit, channeling their love for community dance, heritage cooking, and strategic mentorship into a life where overdue bills never
    linger, but a stray almond left on the kitchen counter serves as a daily reminder of their imperfect perfectionism.
background:
  cultural: Born to Salvadoran parents and raised in Los Angeles, Yesenia blends the rich traditions of her homeland with the dynamic multicultural fabric of Southern California. She grew up bilingual,
    celebrating holidays such as Día de los Niños and the Feast of Saint Isidore, and maintains close ties with a network of Salvadoran families in the city. Her cultural identity is expressed through food,
    music, and community service, reflecting the values of hospitality, family solidarity, and collective responsibility inherited from her immigrant upbringing. These influences shape her worldview, informing
    both her personal and civic engagements.
