persona_description: A historian who specializes in the study of Slavic folklore and mythology, particularly the vampire legends. His research interests include the origins of the vampire concept, the spread
  of the vampire tradition across Slavic lands, and the cultural and historical context in which the vampire myth emerged. He is also interested in the impact of the bubonic plague on the development of
  the vampire concept and the role of oral traditions in the transmission of these myths.
