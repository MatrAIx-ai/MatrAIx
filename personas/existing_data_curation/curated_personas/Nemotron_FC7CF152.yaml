  career_goals: Joshua aims to advance from his current supervisory role to a full restaurant manager position, eventually overseeing multiple locations within a regional chain. He plans to earn a ServSafe
    Food Protection Manager certification and complete a short‑term hospitality management program to complement his practical experience. Long‑term, he dreams of opening a family‑owned diner that emphasizes
    farm‑to‑table Midwestern cuisine, providing a stable livelihood for his wife and children while maintaining a work‑life balance that respects his need for structured routine and personal downtime.
