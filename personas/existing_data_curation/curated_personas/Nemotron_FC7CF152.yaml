personas:
  professional: Joshua Rice, a veteran food‑service supervisor with over twenty years of hands‑on kitchen management, channels his meticulous organization, strict food‑safety rigor, and cooperative leadership
    into streamlining staff schedules, inventory control, and menu consistency, positioning himself for the next step as a regional restaurant manager.
  sports: Joshua Rice enjoys early‑morning fishing trips with the Missouri River Anglers Association, cheers on the local high‑school football team—the Yankton Tigers—on Friday nights, follows the Kansas
    City Chiefs and the St. Louis Cardinals, and keeps fit by mowing the garden and doing weekend hikes along the Loess Hills.
  arts: Joshua Rice finds artistic outlet in woodworking fine‑grain furniture, attends performances at the Yankton Little Theatre, collects biographies of Midwestern pioneers, and regularly listens to folk
    storytellers like John Prine and the folk‑rock duo The Avett Brothers while sipping coffee at the historic downtown café.
  travel: Joshua Rice prefers meticulously planned road trips that balance family time with quiet stops, having visited the historic Pullman District in Chicago, the sand dunes of Nebraska, and dreaming
    of angling in New Zealand’s South Island while keeping the next adventure anchored to a modest budget.
  culinary: Joshua Rice’s cooking blends farm‑to‑table Midwestern comfort—simmering corn chowder with heirloom tomatoes, grilling catfish with lemon‑butter, and serving apple‑cinnamon pie made from orchard
    harvests—while they proudly credit fresh garden produce for the rich flavors, despite a tendency to over‑char the brisket on rare occasions.
  core: Joshua Rice is a structure‑loving food‑service leader who balances disciplined routine with solitary crafts, diligent budgeting, and a quiet love for Midwestern history, even if they sometimes over‑spend
    on woodworking gadgets.
background:
  cultural: Joshua is a White Midwesterner with deep roots in the Dakotas, tracing much of his family lineage to German and Scandinavian ancestors who settled the region in the late 1800s. Growing up in
    Yankton, he was shaped by the values of self‑reliance, modesty, and community cooperation that define rural South Dakota life. His upbringing emphasized practical skills, a strong work ethic, and active
    participation in church and local events, fostering a cultural identity that blends traditional Midwestern hospitality with a respect for the natural and agricultural surroundings of his hometown.
attributes:
