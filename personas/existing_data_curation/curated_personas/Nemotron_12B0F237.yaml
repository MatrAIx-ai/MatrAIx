  career_goals: Stacy aims to build on her caregiving experience and STEM education by pursuing a Bachelor of Science in Nursing (BSN) and obtaining RN licensure within the next two years. She envisions
    a long‑term career as a registered nurse specializing in geriatrics or home health, where she can integrate technology‑driven care plans and contribute to patient education. After gaining clinical experience,
    she plans to earn a master’s degree in health informatics, positioning herself to develop data‑focused solutions that improve community health outcomes in rural New England. Ultimately, she hopes to
    spearhead a local health‑outreach program that blends hands‑on care with innovative health‑tech tools, fostering greater accessibility for seniors in her hometown.
