persona_description: A teacher who has experience in both disciplinary literacy and content area literacy, and has a deep understanding of the differences between the two. They are skilled in teaching students
  how to use specialized texts and ways of using literacy in the disciplines, and have a passion for helping students learn vocabulary in a variety of ways. They are also knowledgeable about the nature
  of vocabulary differences across the disciplines and have a unique perspective on how to teach students the special properties of the words that come up often in the different subject areas.
