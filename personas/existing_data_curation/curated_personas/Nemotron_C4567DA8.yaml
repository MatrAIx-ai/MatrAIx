personas:
  professional: Ellen Hamilton, a meticulous statistical assistant turned aspiring data analyst, leverages advanced Excel formulas, VBA macros, SPSS and introductory R to clean and visualize large datasets
    in Tableau and Power BI, and they ensure every report meets governance standards while translating complex findings into actionable insights for non‑technical stakeholders.
  sports: Ellen Hamilton, an avid hiker who spends weekends on the trails of the Ouachita National Forest with the Durant Hiking Collective, follows the Oklahoma City Thunder for basketball, cheers on the
    Oklahoma State Cowboys during football season, and they play on a church‑sponsored co‑ed softball team each spring to stay active.
  arts: Ellen Hamilton, who knits scarves while listening to The Avett Brothers and Sufjan Stevens, devours contemporary fiction like Celeste Ng’s "Little Fires Everywhere," historical biographies of Eleanor
    Roosevelt, and Mary Roach’s popular science, and they regularly attend community theater productions at the Durant Playhouse, finding artistic inspiration in both yarn and narrative.
  travel: Ellen Hamilton, who prefers meticulously planned, budget‑friendly road trips, has explored nearby Hot Springs National Park and the Great Smoky Mountains, dreams of a summer visit to Yellowstone,
    and they keep a travel journal documenting each stop while balancing weekend getaways with their marriage and work schedule.
  culinary: Ellen Hamilton, who delights in turning garden harvests into dishes like roasted beet and kale salad, corn succotash, and homemade chicken pot pie, frequently knits a fresh batch of sourdough
    starter into her weekly cooking routine and they treat themselves to a slice of pecan pie at the local diner on special occasions.
  core: Ellen Hamilton, a data‑driven perfectionist who balances spreadsheets with garden soil, can’t resist a new skein of yarn at the cost of late‑night Netflix binges, and they find peace in journaling
    before bed, constantly seeking harmony between analytical rigor and simple, tactile joys.
background:
  cultural: Ellen was raised in Durant, Bryan County, a small town in southeastern Oklahoma where community ties, Southern hospitality, and Midwestern practicality intersect. Her white family background
    reflects a regional heritage that values hard work, family loyalty, and church involvement. Local traditions such as county fairs, high school sports, and church potlucks have reinforced her cooperative
    nature and prioritization of harmony. Growing up in this close-knit environment shaped her reliable, organized, and considerate personality. Her early marriage aligns with the cultural norm of forming
    families at a young age in the area, and she continues to blend modern ideas - like learning new analytics tools - with the grounded, practical values of her hometown.
attributes:
  skills: '[''Data entry and validation'', ''Statistical analysis (descriptive and inferential)'', ''Proficiency in Microsoft Excel and VBA'', ''Experience with SPSS and basic R'', ''Data visualization
    using Tableau and Power BI'', ''Report writing and documentation'', ''Project planning and time management'', ''Collaborative teamwork'', ''Quality control and data cleaning'']'
  hobbies: '[''Hiking and birdwatching in local nature areas'', ''Gardening and vegetable cultivation'', ''Reading contemporary fiction, historical biographies, and popular science'', ''Knitting and crocheting'',
    ''Volunteer work through her local church'', ''Low-key social gatherings with friends'', ''Journaling and solving puzzles (crosswords, sudoku)'']'
  career_goals: Ellen aims to formalize her analytical knowledge by completing a part-time associate degree in data analytics and pursuing professional certifications such as the SAS Certified Statistical
    Analyst. In the short term she seeks to advance from statistical assistant to data analyst, taking on more complex predictive modeling projects. Long-term, she envisions becoming a senior analyst or
    data scientist focusing on community health and public-policy data for Oklahoma, where she can influence evidence-based decisions. She also aspires to develop leadership skills to eventually supervise
    a small analytics team while maintaining a balanced personal life and supporting her marriage.
