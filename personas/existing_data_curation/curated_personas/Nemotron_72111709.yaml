personas:
  professional: Thomas Abshire, a 32‑year‑old casino surveillance officer, leverages acute pattern‑recognition and real‑time CCTV expertise to spot cheating while navigating a high‑stress floor with a cooperative,
    detail‑oriented approach despite a dislike for rigid schedules, and they aim to earn CPO and CSP certifications to move into supervisory roles.
  sports: Thomas Abshire, a devoted fan of the Baltimore Orioles and the Washington Capitals, spends weekends fishing and hiking the Eastern Shore trails, roots for the teams from their modest living room
    setup, and occasionally joins a local intramural basketball league to keep active without the pressure of organized competition.
  arts: Thomas Abshire, an avid reader of Agatha Christie and Michael Connelly, spends evenings solving crosswords while listening to Hans Zimmer scores and The National, and captures Chesapeake Bay sunsets
    in the style of Ansel Adams, blending mystery, music, and photography into a solitary creative ritual.
  travel: Thomas Abshire prefers low‑key getaways, has road‑tripped to the Outer Banks and booked a cabin in the Adirondacks, dreams of sailing to the Azores, and plans trips independently rather than relying
    on packaged tours, balancing budget constraints with a desire for quiet coastal exploration.
  culinary: Thomas Abshire, a self‑taught cook, loves preparing Maryland crab cakes seasoned with Old Bay, grilling locally caught striped bass, and experimenting with smoked paprika in homemade chili,
    though they often skip breakfast in favor of late‑night coffee and occasional snack‑driven take‑out.
  core: Thomas Abshire is a detail‑sharp surveillance professional who channels curiosity into fishing, puzzles, and home‑security tinkering while battling chronic worry and a penchant for spontaneous gadget
    splurges.
background:
  cultural: Thomas grew up in a working‑class, white, Mid‑Atlantic family on Maryland's Eastern Shore. His ancestry includes English and German roots common to the region. The close‑knit community of Talbot
    County, with its maritime heritage, seasonal festivals, and modest rural values, shaped his respect for cooperation and harmony. He was raised with a modest, self‑reliant ethos, emphasizing hard work,
    neighborly assistance, and an understated sense of humor. While not formally religious, he often participates in local community events and values the traditional, small‑town culture that emphasizes
    personal responsibility and mutual support.
attributes:
  skills: '[''CCTV monitoring'', ''Incident reporting'', ''Conflict de‑escalation'', ''Basic self‑defence'', ''Customer service'', ''Pattern recognition for cheating detection'', ''Surveillance equipment
    maintenance'', ''First aid'', ''Basic networking troubleshooting'', ''Attention to detail'']'
  hobbies: '[''Fishing on the Chesapeake Bay'', ''Reading mystery and true‑crime novels'', ''Playing strategy video games'', ''Puzzle solving (crosswords, sudoku)'', ''Hiking local trails'', ''Landscape
    photography'', ''Home‑security system tinkering'', ''Watching Baltimore Ravens football games'']'
  career_goals: Thomas aims to obtain his GED and pursue professional certifications such as the Certified Protection Officer (CPO) and Certified Surveillance Professional (CSP) to qualify for supervisory
    roles. Over the next five years he hopes to advance from a floor‑level surveillance officer to a senior surveillance coordinator or security supervisor at a major casino, where he can design training
    programs and mentor new guards. In the longer term, he envisions transitioning into private investigations or opening a small security‑consulting firm serving local businesses on the Eastern Shore,
    leveraging his practical experience and continual learning mindset.
