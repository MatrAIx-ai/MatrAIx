personas:
  professional: Josh Stenson is a detail‑driven insurance claims adjuster specializing in high‑value art and antiques, where they blend forensic risk assessment with an artist’s eye for nuance, negotiating
    settlements with methodical precision while channeling curiosity to devise unconventional solutions.
  sports: Josh Stenson is an avid cross‑country skier, lake‑front cyclist, and snowshoer who trains with the Minneapolis Nordic Ski Club in winter, cheers for the Minnesota Wild and the Vikings on game
    nights, and organizes weekend rides with the Midtown Cycling Collective, balancing high‑intensity cardio with occasional yoga to soothe anxiety.
  arts: Josh Stenson immerses themselves in the Minneapolis art scene, attending Walker Art Center exhibitions of contemporary painters like Julie Mehretu and Marina Abramović, sketching still‑lifes of
    local sculptures, volunteering as a set designer for the Community Theatre where they help bring productions of Arthur Miller to life, and they keep a curated playlist that swings from The Velvet Underground
    to contemporary classical composer Max Richter.
  travel: Josh Stenson plans their trips with the precision of a claims audit, allocating budget for art‑focused getaways such as a weekend in Florence to study Renaissance frescoes, a spring hike through
    Banff National Park, and a summer bike tour along Denmark’s coastal paths, while balancing a modest living cost in Minneapolis that sometimes forces them to postpone longer vacations.
  culinary: Josh Stenson’s palate favors robust Nordic flavors, often cooking salmon gravlax with dill and juniper berries, mastering a decent elk stew, while they indulge in occasional upscale dining at
    The Bachelor Farmer for seasonal vegetable dishes and pair meals with a well‑kept collection of craft beers and a bottle of pinot noir from the Lake Superior region.
  core: Josh Stenson, a 28‑year‑old claims analyst with a keen eye for art, channels a methodical mind into risk assessments, battles intense anxiety through mindfulness, and they nurture a quirky habit
    of cataloguing every receipt like a miniature exhibit.
background:
  cultural: Josh grew up in a middle‑class, ethnically white family in the suburbs of Hennepin County, absorbing Midwestern values of reliability, modesty, and community involvement. The strong Scandinavian
    heritage of the Minneapolis region influenced his appreciation for design simplicity and public art. Exposure to the city’s diverse cultural festivals and an active local arts scene broadened his perspective,
    fostering an openness to unconventional ideas while retaining a grounded, methodical work ethic. His upbringing emphasized education and self‑reliance, which he blends with a growing interest in mental‑health
    awareness and empathy cultivated through his personal experiences.
