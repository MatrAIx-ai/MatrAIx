  hobbies: '[''Visiting art galleries and museums'', ''Sketching and oil painting'', ''Cross‑country skiing'', ''Bicycle riding along the Chain of Lakes'', ''Reading philosophy and psychology'', ''Mindfulness
    meditation'', ''Volunteering in community theater (set design)'']'
  career_goals: Josh aims to become a senior claims manager specializing in high‑value and specialty lines, such as fine art and cultural property insurance, within the next five years. He plans to earn
    professional certifications like CPCU and AIC, and to complete a master’s in risk management. Long‑term, he envisions launching his own consultancy that advises insurers and collectors on risk mitigation
    and claim strategies for artistic assets, leveraging his unique blend of business acumen and art appreciation. He also hopes to mentor junior adjusters and contribute to industry best‑practice guidelines.
