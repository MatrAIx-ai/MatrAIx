  hobbies: '[''Fishing'', ''Vegetable gardening'', ''Homebrewing'', ''Woodworking'', ''Acoustic guitar playing'', ''Attending local fairs'', ''River clean‑up volunteering'', ''Strength training'', ''Following
    the Philadelphia Phillies'']'
  career_goals: Scott aims to transition from a senior crew leader to owner‑operator of a boutique landscaping firm that specializes in sustainable, low‑maintenance designs for both homeowners and small
    businesses in the Reading area. Over the next five years he plans to earn the Certified Landscape Professional (CLP) credential, expand his client base to include municipal contracts for park maintenance,
    and mentor apprentices through a local trade apprenticeship program. He also hopes to become a recognized advocate for greener urban spaces, speaking at community events and contributing to the Berks
    County Green Infrastructure Initiative.
