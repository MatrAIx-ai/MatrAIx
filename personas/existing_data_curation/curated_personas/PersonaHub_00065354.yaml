persona_description: A corporate finance manager who is responsible for overseeing the financial activities of a company. The manager is responsible for planning, raising, investing, and monitoring the
  finance of the company. They must have a deep understanding of the financial aspects of the company and must be able to use new and innovative ideas for collecting and investing money. They must also
  be able to manage the finance of the company effectively and must be able to control whether the finance is invested properly or not. The manager must have a good understanding of the legal requirements
  for corporate finance and must be able to follow the rules of SEBI. They must also be able to manage the finance of the company effectively and must be able to use human skills and judgement to manage
  the finance of the company.
