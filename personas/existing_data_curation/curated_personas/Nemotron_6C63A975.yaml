  career_goals: Wilton aims to transition from informal volunteering to a more structured role as a community arts coordinator for a local nonprofit, where he can design and lead small‑scale art workshops
    for seniors and youth. He also aspires to document oral histories of older residents in DeKalb County, preserving their stories in a digital archive. Over the next five years he hopes to secure a grant
    to establish a community garden and art space that fosters intergenerational collaboration, reflecting his belief in harmony and shared creativity. While not seeking traditional employment, he wishes
    to be recognized as a cultural steward and mentor within his neighborhood.
