personas:
  professional: Jiyeon Chang leverages years of correctional facility safety expertise and crisis de‑escalation training to mentor new officers while spearheading a trauma‑informed pilot program, balancing
    a pragmatic respect for protocol with a spontaneous drive to improve inmate mental‑health support.
  sports: Jiyeon Chang fuels fitness through early‑morning hikes along the Merritt Island Trail, weekly yoga at the Space Coast Wellness Studio, and supports the Orlando Magic (NBA) and Tampa Bay Rays (MLB)
    while participating in the local "Coastal Trail Runners" club.
  arts: Jiyeon Chang explores creativity by sketching Monet‑inspired watercolors of Floridian wetlands, devouring Agatha Christie detective novels, and attending improv workshops where they channel the
    wit of Tina Fey and the acoustic charm of Joni Mitchell’s guitar melodies.
  travel: Jiyeon Chang prefers weekend escapes to the Everglades for kayaking and seasonal trips to Asheville’s fall foliage retreats, while dreaming of a spring adventure in Reykjavik’s geothermal pools,
    balancing limited vacation days with a desire for both nature immersion and cultural discovery.
  culinary: Jiyeon Chang delights in crafting kimchi—a spicy fermented cabbage—alongside hearty bibimbap bowls, seasoning dishes with gochujang and fresh herbs harvested from their garden, and values farm‑to‑table
    dining at local spots like The Green Cassette, yet often neglects proper food storage during late‑night culinary experiments.
  core: Jiyeon Chang juggles a high‑stress corrections career with spontaneous hikes, watercolor sketches, and anxious yet determined pursuits of mental‑health reforms, occasionally succumbing to impulse
    spending and procrastination.
background:
  cultural: Jiyeon was born in South Korea and moved to the United States with her family at the age of eight, growing up in a bilingual household that emphasized respect for elders and communal values.
    She celebrates traditional holidays such as Lunar New Year and Chuseok, preparing dishes like tteokguk and kimchi with her mother. At the same time, she has embraced Floridian customs, adopting a love
    for beach outings and Southern hospitality. The blend of Korean cultural heritage and the diverse, multicultural environment of Cocoa, FL, shapes her worldview, giving her a strong sense of responsibility
    to honor her roots while adapting to the local community.
attributes:
  skills: '[''Crisis Intervention'', ''De‑escalation'', ''Physical Restraint'', ''Self‑Defense'', ''Inmate Search and Contraband Detection'', ''Surveillance and Monitoring'', ''Incident Reporting'', ''First
    Aid/CPR'', ''Correctional Law Knowledge'', ''Cultural Competency'']'
  hobbies: '[''Hiking'', ''Gardening'', ''Yoga'', ''Watercolor Painting'', ''Korean Cooking'', ''Detective/Mystery Reading'', ''Animal Shelter Volunteering'', ''Improv Workshops'']'
  career_goals: Jiyeon aims to advance to a supervisory role where she can lead a shift and mentor newer officers, then pursue a captain’s position and eventually become a corrections administrator. She
    intends to enroll in an associate’s degree program in criminal justice to strengthen her theoretical foundation. Passionate about mental‑health support for inmates, she hopes to develop a pilot program
    that integrates trauma‑informed care and crisis counseling within her facility. In the longer term, she envisions establishing a private consulting firm that trains law‑enforcement and correctional
    staff in de‑escalation and cultural awareness.
