personas:
  professional: Iliana Rivera, a retired community cultural coordinator, leverages their bilingual fluency and improvisational event‑planning style to organize art exhibits, cooking workshops, and storytelling
    sessions at a senior center, often juggling multiple tasks with a flexible, if slightly chaotic, approach.
  sports: Iliana Rivera stays active through weekly salsa dancing classes, occasional group walks in Griffith Park, and cheerfully follows the Los Angeles Lakers, preferring low‑impact cardio that fits
    their flexible schedule over more strenuous competition.
  arts: Iliana Rivera immerses themselves in Los Angeles’ vibrant art scene, from strolling the Arts District to admire murals by Shepard Fairey and Chaz Bojórquez, to attending LACMA openings featuring
    works by David Hodge, while also finding inspiration in the melodies of Los Lobos and the theatrical brilliance of August Wilson’s plays, fueling their recent foray into watercolor painting.
  travel: Iliana Rivera prefers relaxed, culturally immersive travel, often planning spontaneous day trips to nearby historic neighborhoods in Los Angeles before embarking on their long‑awaited pilgrimage
    to their ancestral hometown in Mexico, where they intend to document local customs using their tablet while balancing a modest travel budget and occasional family commitments.
  culinary: Iliana Rivera combines decades of heritage‑inspired cooking with contemporary twists, expertly preparing dishes such as corn‑based stews with mole‑like sauces, chiles rellenos stuffed with cheese
    and quinoa, and their signature saffron‑infused arroz con pollo, while sourcing fresh herbs from their balcony garden and delighting family potlucks with both classic and modern flavor pairings.
  core: Iliana Rivera is a curious, socially vibrant septuagenarian who channels their love of street art, storytelling, and spicy cuisine into community projects, yet often juggles multiple passions with
    a delightfully disorganized, competitive edge that keeps them forever on the move.
background:
  cultural: Iliana was born in East Los Angeles to Mexican immigrant parents who arrived in the 1950s. Raised in a bilingual household, she grew up celebrating Catholic traditions, Día de los Muertos, and
    family gatherings centered around homemade tamales and pozole. The vibrant Mexican community in her neighborhood exposed her to corridos, mariachi music, and folk art such as papel picado and piñatas.
    Over the years, she has woven these customs with the multicultural tapestry of Los Angeles, embracing influences from neighboring Latino, African‑American, and Asian communities while preserving her
    own heritage. Her identity is rooted in the pride of her Mexican ancestry and the collaborative spirit of her Los Angeles surroundings.
