  hobbies: '["Visiting art museums and galleries","Exploring Los Angeles murals and street art","Preparing traditional Mexican dishes","Participating in salsa dancing nights","Tending a balcony garden","Reading
    contemporary fiction and artist biographies","Attending book clubs","Practicing watercolor painting","Taking virtual tours of cultural sites","Volunteering at the local senior center"]'
  career_goals: Although retired, Iliana aims to leave a lasting cultural imprint in her neighborhood. She plans to compile a memoir of her family's migration stories and publish it as a community‑focused
    blog. She hopes to curate a yearly exhibition of local Mexican folk art and photography at the senior center, positioning herself as the lead organizer. Iliana also aspires to launch a series of cooking
    workshops that teach traditional dishes to younger residents, while simultaneously learning watercolor painting to create her own artwork. A long‑standing dream is to travel to her ancestral hometown
    in Mexico to document its customs, and she envisions becoming a cultural liaison who connects Los Angeles seniors with resources that celebrate their heritage.
