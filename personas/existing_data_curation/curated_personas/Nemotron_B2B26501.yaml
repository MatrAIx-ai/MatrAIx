personas:
  professional: Antonio Sims, a 23‑year‑old residential carpenter, blends meticulous project planning with a curiosity for design, executing mortise‑and‑tenon joinery and SketchUp visualizations while they
    quietly mentor apprentices and maintain an organized, safety‑first job site.
  sports: Antonio Sims, a 23‑year‑old who values quiet recreation, follows the Atlanta Falcons and Atlanta United, plays pick‑up basketball at the local community center, participates in the Griffin Running
    Club’s weekend trail runs, and enjoys occasional hikes in the Chattahoochee National Forest, favoring low‑impact activity that balances strength and mindfulness.
  arts: Antonio Sims, an avid supporter of local creatives, spends evenings listening to Miles Davis and B.B. King while they explore the city art gallery’s rotating exhibits of emerging painters, collect
    limited‑edition prints by contemporary sculptor Tara Raspberry, and draw inspiration for their own wooden sculptures from the improvisational rhythms of jazz and blues.
  travel: Antonio Sims, a 23‑year‑old with a taste for scenic road trips, plans weekend getaways to Asheville’s Blue Ridge Parkway and Savannah’s historic squares, dreams of a summer bike tour through the
    Dutch countryside, and meticulously maps routes on SketchUp to maximize photography spots while they keep travel budgets modest due to upcoming studio startup costs.
  culinary: Antonio Sims, a budding home brewer, favors crafting citrus‑hoppy IPAs and pairing them with their own roasted vegetable medleys—like caramelized carrots and rosemary‑infused potatoes—while
    they experiment with wood‑smoked brisket, believe that fresh herbs such as thyme and sage elevate a simple ribeye, and occasionally over‑season dishes in the pursuit of bold flavor.
  core: Antonio Sims, a meticulous 23‑year‑old carpenter, balances quiet creative pursuits—like carving and craft‑beer brewing—with disciplined budgeting and a habit of over‑planning every project, sometimes
    to the point of analysis paralysis.
background:
  cultural: Antonio grew up in a close‑knit African-American community in Griffin, GA. His family’s roots trace back to the Jim Crow South, and values such as respect for elders, church fellowship, and
    storytelling were central to his upbringing. He frequently attended a historically Black Baptist church where community service and gospel music shaped his sense of harmony and cooperation. Southern
    cuisine—especially soul food cooked by his grandmother—instilled a deep appreciation for food as cultural expression. The region’s rich history of Black artisans and the legacy of Southern craftsmanship
    inspire his work, and he participates in local cultural events like Juneteenth celebrations, Black History Month art exhibits, and neighborhood mentorship programs.
