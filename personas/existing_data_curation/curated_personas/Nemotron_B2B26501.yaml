  career_goals: Antonio aims to become a certified journeyman carpenter within the next two years, then open his own boutique woodworking studio in Griffin that blends modern design with traditional African-American
    craftsmanship. He plans to master cabinetry and CNC milling, and eventually offer apprenticeship opportunities to other young people in his community. Long-term, he hopes to become a lead project manager
    for a reputable residential construction firm, secure financial independence to buy a home, and contribute to local historic preservation projects.
