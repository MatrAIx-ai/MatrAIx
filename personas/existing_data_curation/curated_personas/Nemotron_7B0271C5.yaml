  hobbies: '[''Hiking'', ''Group Fitness Classes'', ''Climbing Club'', ''Community Theater'', ''Volunteer Work'', ''Cooking'', ''Reading Business Books'', ''Bluegrass Music Listening'', ''Knitting'', ''Event
    Planning'']'
  career_goals: Patrice aims to become a store manager within the next two years, leveraging her structured work style to drive sales growth and staff development. In the longer term she aspires to a district
    manager role, overseeing multiple locations and implementing region‑wide merchandising strategies. She plans to pursue a part‑time MBA to transition into corporate retail operations or business development.
    Ultimately, she hopes to open her own boutique or e‑commerce store that highlights sustainable, locally sourced Appalachian products, combining her entrepreneurial drive with her community‑oriented
    values.
