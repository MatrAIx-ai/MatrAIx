  hobbies: '[''Senior Line Dancing'', ''Choir Singing'', ''Book Club'', ''Community Gardening'', ''Knitting Circle'', ''Bridge/Bingo Games'', ''Volunteering at Local Events'', ''Walking in Local Parks'',
