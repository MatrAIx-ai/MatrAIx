  career_goals: Although retired, Martha aims to stay actively engaged in her community. She hopes to take on a leadership volunteer role at the local senior center, mentoring younger volunteers and organizing
    a senior garden program that promotes routine, physical activity, and social interaction. She also wishes to share her culinary heritage by teaching a weekly cooking class for seniors, preserving family
    recipes, and possibly obtaining a caregiver certification to support her spouse and nearby relatives. Her overarching ambition is to maintain independence, remain physically and mentally active, and
    contribute practical, reliable service to her neighborhood.
