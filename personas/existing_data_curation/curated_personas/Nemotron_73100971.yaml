  career_goals: John aims to advance to a senior systems analyst position within the next three years, taking on leadership of cross‑functional technology initiatives that improve organizational efficiency.
    He plans to earn certifications such as PMP and TOGAF to broaden his strategic impact and eventually transition into an IT solutions architect role. He is also committed to mentoring junior analysts
    and integrating his humanities background to champion user‑centered design and ethical technology practices.
