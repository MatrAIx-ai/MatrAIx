  career_goals: Lauretta aims to leverage her meticulous operational expertise to move into a senior compliance or operations manager role within the casino. Over the next three years, she plans to obtain
    the Certified Gaming Compliance Professional (CGCP) credential and lead a team that streamlines audit processes and enhances responsible‑gambling initiatives. Ultimately, she envisions establishing
    her own consulting practice that helps regional gaming venues improve procedural efficiency and meet regulatory standards, allowing her to work primarily behind the scenes and maintain a low‑stress,
    solitary work environment.
