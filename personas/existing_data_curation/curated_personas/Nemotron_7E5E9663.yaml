    education'', ''Mentoring and team leadership'', ''Emerging audit technologies (RPA, ESG reporting)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Independent film and documentary screenings'', ''Hiking in Griffith Park and the Santa Monica Mountains'', ''Yoga and mindfulness practice'', ''Volunteer
    tax preparation for low-income residents'', ''Cooking experimental vegan dishes'', ''Reading historical fiction and philosophy'', ''Urban street photography'', ''Participating in community garden projects'',
    ''Learning basic Spanish for better client communication'']'
  career_goals: Catherine aims to earn her CPA designation within the next year and advance to a senior audit manager role at her firm, where she can lead multidisciplinary audit teams and shape the firm’s
    ESG assurance practice. She is eager to integrate data-analytics tools into the audit workflow to increase efficiency and insight. In the longer term, she aspires to become a partner, championing ethical
    accounting standards and building a mentorship program that supports underrepresented students entering the accounting profession. Catherine also hopes to expand her pro-bono work, establishing a community-focused
    financial-literacy initiative that helps Los Angeles residents navigate personal finance and tax obligations.
