  career_goals: Although retired from formal employment, Samantha aims to deepen her expertise in local history and produce a comprehensive family memoir that intertwines personal narratives with broader
    Nebraska heritage. She aspires to curate a small traveling exhibit of her artwork and historical findings for community centers across Douglas County. She also seeks to mentor younger volunteers in
    the historical society, sharing her organizational skills and encouraging creative expression. Finally, she hopes to complete a series of short stories exploring abstract concepts, fulfilling her intellectual
    curiosity.
