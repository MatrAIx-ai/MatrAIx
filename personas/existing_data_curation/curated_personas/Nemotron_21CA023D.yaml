  hobbies: '[''Speculative fiction reading'', ''Philosophy reading'', ''Jigsaw puzzles'', ''Prairie gardening'', ''Small avant‑garde book club'', ''Watercolor painting'', ''Calligraphy'', ''Volunteer archival
