personas:
  professional: A retired community organizer and archival enthusiast, Samantha Adams leverages her meticulous project‑management skills and love of speculative fiction to lead the Omaha Museum of History’s
    volunteer cataloguing team while dreaming of curating a traveling exhibit that blends Nebraska heritage with her watercolor illustrations.
  sports: A nature‑oriented fitness enthusiast, Samantha Adams participates in the senior walking group at Fontenelle Forest, bird‑watches at nearby wetlands, cheerfully follows the Nebraska Cornhuskers
    football and the Omaha Storm Chasers baseball teams, and favors low‑impact yoga and light gardening over high‑impact exercise.
  arts: An avant‑garde art aficionado, Samantha Adams immerses herself in watercolor painting inspired by Georgia O'Keeffe and Mark Rothko, practices calligraphy echoing the fluidity of Wang Xizhi, reads
    speculative fiction by Octavia E. Butler and Ursula K. Le Guin, and frequents the Joslyn Art Museum to admire works by Hilma af Klint while contributing thoughtful essays to her small avant‑garde book
    club.
  travel: A meticulous planner, Samantha Adams prefers relaxed, culturally rich trips such as a spring road‑trip to Badlands National Park and a guided tour of historic St. Louis, Missouri, while also dreaming
    of a quiet retreat in the Scottish Highlands, always arranging travel months in advance to accommodate her limited mobility and modest budget.
  culinary: A seasoned home cook, Samantha Adams delights in preparing herb‑infused Nebraska corn chowder, wildflower honey‑glazed carrots, and lavender‑scented scones using fresh basil, sage, and edible
    coneflower petals from her prairie garden, while occasionally treating herself to a dinner at the local farm‑to‑table bistro featuring beet‑cured salmon.
  core: A quietly imaginative archivist, Samantha Adams blends methodical organization with a love for abstract art and speculative ideas, navigating life’s worries through watercolor, puzzles, and careful
    budgeting.
background:
  cultural: Samantha grew up in a mid‑20th‑century Omaha household rooted in the traditions of the American Midwest. Her family’s heritage traces back to several generations of European‑American settlers
    who valued self‑reliance, community involvement, and a strong work ethic. Raised in a Protestant environment, she was immersed in local church gatherings and community festivals that celebrated seasonal
    harvests and regional history. The cultural fabric of Omaha’s diverse neighborhoods, combined with the expansive Great Plains landscape, has fostered her appreciation for both the simplicity of rural
    life and the subtle complexities of urban art scenes.
