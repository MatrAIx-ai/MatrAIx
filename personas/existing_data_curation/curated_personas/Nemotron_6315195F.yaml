  career_goals: Although retired, she aims to stay mentally and physically active by continuing her learning journey—especially improving digital skills and exploring photography. She aspires to mentor
    younger volunteers at the senior center, help preserve local history by documenting oral stories from longtime residents, and maintain her health to enjoy cherished time with grandchildren. Her overarching
    ambition is to leave a legacy of community harmony and intergenerational connection.
