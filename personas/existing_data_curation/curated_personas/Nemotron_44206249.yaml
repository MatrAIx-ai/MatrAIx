  career_goals: Van aims to achieve ASE Master Technician certification within the next two years, deepening his expertise in electric‑vehicle technology. He plans to lead a small team of technicians, fostering
    a collaborative shop culture that balances efficiency with continuous learning. Ultimately, he hopes to open his own independent garage in the Catskills that offers affordable, high‑quality service
    while also hosting community workshops on vehicle maintenance and basic auto repair, thereby sharing his knowledge and building local resilience. He also envisions completing a part‑time certification
    in automotive cybersecurity to stay ahead of industry trends.
