personas:
  professional: Carmen Dejesus, a senior financial advisor, merges a two‑decade track record in quantitative portfolio design with a vivid abstract‑art sensibility to craft personalized wealth strategies
    that balance rigorous risk modeling in Excel, Python, and R with creative asset allocation, while their organized nature and underlying anxiety compel meticulous double‑checking of every client plan
    as they pursue CFP certification and launch a boutique practice fusing art and finance.
  sports: Carmen Dejesus, an active member of the Des Moines Hiking Club and a regular at CorePower Yoga, spends weekends trekking riverside trails, bird‑watching, and snowshoeing in winter, while cheering
    for the Iowa Cubs and the Iowa Hawkeyes football team as part of a low‑key, nature‑focused fitness routine.
  arts: Carmen Dejesus channels an appreciation for abstract expressionism—drawing inspiration from the bold color palettes of Andean textiles and the works of Mark Rothko and Hilma af Klint—into watercolor
    paintings and digital collages reminiscent of John Baldessari, while they regularly attend performances by the Alvin Ailey American Dance Theater and listen to the experimental sounds of Björk.
  travel: Carmen Dejesus meticulously plans intimate, art‑focused trips, having joined small‑group tours to Santa Fe’s gallery circuit, explored the historic streets of Cusco and Machu Picchu’s ruins, and
    trekked the remote cliffs of Michigan’s Upper Peninsula, all while balancing a modest travel budget that safeguards retirement contributions.
  culinary: Carmen Dejesus skillfully reimagines traditional Peruvian ceviche and lomo saltado by incorporating Iowa pork tenderloin, sweet corn, and locally sourced cilantro and aji amarillo, creating
    fresh, vibrant plates that reflect both their culinary curiosity and artistic eye for color.
  core: Carmen Dejesus blends meticulous, data‑driven financial expertise with a vivid abstract‑art imagination, navigating life through solitary creativity, disciplined budgeting, and a gentle battle with
    anxiety.
background:
  cultural: Born in Cusco, Peru, Carmen grew up in a family of artisans who wove traditional alpaca textiles, instilling an early appreciation for color, pattern, and cultural storytelling. She moved to
    the United States in her early twenties to pursue a STEM degree, eventually settling in West Des Moines, Iowa. While she embraces Midwestern values of reliability and community, she maintains strong
    ties to her Peruvian heritage—celebrating festivals like Inti Raymi, cooking classic dishes for friends, and speaking Spanish at home. She is active in the local Peruvian cultural association, where
    she helps organize cultural nights and language exchange meet‑ups. This bicultural experience enriches her advisory style, allowing her to blend Peruvian concepts of collective well‑being with individual
    financial empowerment.
attributes:
  skills: '[''Financial planning'', ''Investment analysis'', ''Retirement and estate planning'', ''Tax-efficient strategies'', ''Risk assessment and modeling'', ''Data analytics (Excel, Python, R)'', ''Financial
