  hobbies: '[''Abstract painting'', ''Watercolor art'', ''Reading speculative fiction'', ''Attending small art gallery events'', ''Cooking Peruvian cuisine'', ''Gardening'', ''Hiking and bird-watching'',
    ''Yoga and meditation'', ''Financial literacy volunteering'', ''Solving puzzles (chess, Sudoku)'']'
  career_goals: 'Carmen aims to attain the Certified Financial Planner (CFP) designation within the next year and transition to a senior partner role at her firm, where she can shape the advisory practice’s
    strategic direction. She envisions launching a boutique boutique advisory boutique that integrates artistic and creative concepts into wealth management, catering to clients who value both financial
    security and personal fulfillment. Mentorship is a key ambition; she plans to develop a mentorship program for women and underrepresented minorities entering the financial services industry. Additionally,
    Carmen hopes to author a book titled “Financial Creativity: Merging Art and Investment for a Meaningful Retirement," and eventually allocate part of her practice’s profits to a scholarship fund for
    Peruvian students pursuing STEM education.'
