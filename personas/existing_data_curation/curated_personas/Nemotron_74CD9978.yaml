personas:
  professional: Amelia Ponce, a 39‑year‑old deputy with eight years of front‑line law‑enforcement experience, merges her teacher‑like curriculum design skills with data‑driven investigation techniques,
    delivering community‑focused safety workshops while applying a healthy dose of skepticism to untested procedures, and maintaining a relaxed, flexible schedule that lets her seize emerging policing challenges.
  sports: Amelia Ponce, active in the Murfreesboro Trailblazers hiking club, spends weekends tackling backroad treks, roots for the Tennessee Titans on Sundays, and supports the Nashville Predators during
    the winter season, while occasionally entering local trail‑run challenges that satisfy her competitive streak, balancing her love of outdoor endurance with local team loyalty.
  arts: Amelia Ponce, inspired by the black‑and‑white landscapes of Ansel Adams, captures rural Tennessee vistas with her DSLR, unwinds with true‑crime books by Ann Rule, and enjoys the soulful storytelling
    of Brandi Carlile, weaving visual and literary arts into her everyday routine.
  travel: Amelia Ponce favors low‑key, nature‑centric road trips, often plotting spontaneous drives to the Great Smoky Mountains or Asheville’s Blue Ridge Parkway, while keeping her itinerary flexible enough
    to slip in a weekend community‑safety workshop at a nearby college.
  culinary: Amelia Ponce, a self‑taught Southern‑style cook, masters smoked brisket with a peach‑basil BBQ glaze, perfects collard greens cooked with smoked turkey, experiments with exotic spices like sumac
    after weekend hikes, and strives to outcook neighbors at weekend potlucks, balancing comfort food with culinary curiosity.
  core: Amelia Ponce blends relentless curiosity about human behavior with a relaxed, competitive edge, juggling a demanding law‑enforcement career, spontaneous outdoor adventures, and a habit of overindulging
    in camera gear and backyard barbecues.
background:
  cultural: Amelia was raised in a close‑knit, middle‑class family in Rutherford County, Tennessee, where Southern hospitality, church participation, and community solidarity are core values. Her white
    Southern heritage includes a strong sense of duty to family and neighbors, a love for local traditions such as county fairs and church potlucks, and an appreciation for the region’s music and folklore.
    Although her surname hints at Spanish ancestry, her cultural identity is rooted primarily in the rural Appalachian‑influenced culture of Central Tennessee, emphasizing self‑reliance, respect for law
    and order, and an openness to modern ideas when they benefit the community.
