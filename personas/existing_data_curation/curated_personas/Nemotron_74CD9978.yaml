  career_goals: Amelia aims to move into a supervisory role within the Rutherford County Sheriff's Office, targeting a sergeant or lieutenant position where she can shape policy and training. She is passionate
    about establishing a dedicated Community Education Unit that integrates her teaching expertise with policing, creating school‑based safety curricula and preventive workshops. Long‑term, she envisions
    becoming a police academy instructor or director of community relations, and she is considering a master's degree in criminal justice or educational leadership to reinforce her credentials. Her competitive
    drive pushes her to seek certifications in advanced investigations and crisis negotiation, positioning her as a thought leader in evidence‑based policing within her region.
