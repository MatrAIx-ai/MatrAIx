personas:
  professional: Gregory Verrett, a preschool enthusiast who loves building block towers, channels their need for structure into a budding architect mindset, delighting in the predictable snap of each piece
    while happily sharing crayons with classmates.
  sports: Gregory Verrett, an energetic four‑year‑old, dribbles a mini basketball at the community center, cheers loudly for the Philadelphia Eagles on Sundays, and proudly wears the cap of the Hanover
    Little League tee‑ball team during weekend practice, showing they love teamwork and friendly competition.
  arts: Gregory Verrett, a budding little artist, spends afternoons coloring dinosaurs while humming Raffi’s Baby Beluga, enjoys bedtime viewings of Pixar’s Toy Story, and joins family sing‑alongs to The
    Wiggles, letting those melodies shape their playful imagination.
  travel: Gregory Verrett, a curious four‑year‑old, beams at the annual Hanover Cheese Festival, loves weekend excursions to Hershey’s chocolate park, and dreams of one day exploring Disney World in Orlando
    for a magical adventure, hoping they can share the excitement with family.
  culinary: Gregory Verrett, a picky yet enthusiastic eater, eagerly slurps mac and cheese topped with sharp cheddar, spreads thick peanut butter on jelly‑laden bread, delights in salty cheese curds from
    the local festival, and proudly stirs pancake batter with a wooden spoon under Mom’s watchful eye, showing they love to help in the kitchen.
  core: Gregory Verrett, a structured yet whimsical four‑year‑old, insists on lining up toy cars in perfect rows but often forgets to put on shoes before dashing outside, embodying a blend of order‑loving
    curiosity and spontaneous play that they display every day.
background:
  cultural: Gregory is raised in a white, middle‑class family in Hanover, Pennsylvania, a small town with a strong sense of community and rural heritage. His family participates in local traditions such
    as the Hanover Cheese Festival and visits nearby farms, giving him exposure to agricultural life and seasonal celebrations. He attends a local preschool that emphasizes routine, group activities, and
    cooperative play, and his upbringing includes typical American customs like birthday parties, holiday decorations, and community library programs.
