  career_goals: Although retired from formal employment, Elba aims to stay actively engaged in her community. She hopes to lead cooking workshops that teach younger generations traditional recipes, become
    a senior volunteer coordinator for her church and local senior center, and improve her English proficiency through adult‑education classes. Maintaining her health and independence is a priority, and
    she dreams of traveling to her hometown in Mexico to reconnect with family and cultural roots.
