personas:
  professional: Myrna Cordovaalvarez, a 16‑year‑old bilingual youth leader, blends curiosity‑driven creativity with a laid‑back planning style to coordinate surf‑side community events, mentor younger kids,
    and spearhead cultural celebrations at the local center, while they draw energy from being the center of conversation.
  sports: Myrna Cordovaalvarez rides the Pacific waves with the Pacific Surf Club, plays beach volleyball in the summer, and they cheer for the San Francisco Giants and Golden State Warriors, balancing
    casual surf sessions with a competitive spirit in local tournaments.
  arts: Myrna Cordovaalvarez channels their love of rhythm by dancing to cumbia tracks by Celso Piña, salsa tunes from Eddie Palmieri, and contemporary pop from Bad Bunny, while they craft colorful papel
    picado inspired by Frida Kahlo’s motifs and perform spoken‑word pieces at open‑mic nights.
  travel: Myrna Cordovaalvarez prefers spontaneous weekend getaways, often driving down the Pacific Coast Highway to explore Santa Cruz and Monterey, dreaming of a surf‑boarding pilgrimage to Puerto Escondido
    in Oaxaca, and they occasionally join school trips to historic sites like the Alhambra for cultural immersion.
  culinary: Myrna Cordovaalvarez treats the kitchen as a creative studio, mastering tamales, pozole, and fresh salsa with chilies, corn masa, and hominy, while they experiment with modern twists like avocado‑lime
    crema and share bite‑size tasting menus at family gatherings and teen parties.
  core: Myrna Cordovaalvarez is a sunny‑spirit teen who blends surf, salsa, and sizzling kitchen experiments into a social‑media‑savvy lifestyle, even though they keep a perpetually loose planner.
background:
  cultural: Myrna is a second‑generation Mexican American raised in a bilingual household in Pacifica, California. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos,
    Cinco de Mayo, and other holidays with home‑cooked meals, altar building, and colorful decorations. She grew up hearing stories from her grandparents about life in Veracruz, which infused her with a
    love for Mexican music, folklore, and cuisine. Living on the coast, she blends these cultural roots with Pacifica’s laid‑back surf lifestyle, often sharing both Spanish and English narratives with friends.
    The local Latino community center serves as a cultural anchor, providing her with opportunities to participate in dance workshops, art projects, and mentorship programs that connect her heritage to
    the broader Bay Area mosaic.
