  career_goals: In the next year, Myrna aims to complete her GED and enroll in a community culinary program that focuses on Mexican and coastal cuisines. She plans to grow her social‑media following by
    documenting her cooking experiments, surf sessions, and cultural celebrations, eventually becoming a recognizable local influencer. Medium‑term, she hopes to secure an apprenticeship at a beachfront
    café or a small event‑planning firm to gain hands‑on hospitality experience. Her long‑term ambition is to open a community café near the shoreline that doubles as a cultural hub, offering cooking workshops,
    language exchange nights, and youth mentorship programs that celebrate her Mexican heritage while fostering a welcoming space for Pacifica’s diverse residents.
