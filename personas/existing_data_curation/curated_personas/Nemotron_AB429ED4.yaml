personas:
  professional: Angela Maska is a budding agricultural inspector whose hands‑on GIS expertise, quick plant‑diagnosis skills, and gift for charismatic community outreach make them a natural liaison between
    regulators and Louisiana’s small‑scale growers.
  sports: Angela Maska pumps up a weekly canoe paddle in the bayou, joins an amateur softball league at the Ascension Parish community center, and cheers loudly for the New Orleans Saints on Sundays while
    keeping a casual jog to stay fit, and they balance the thrill of hunting season with the laid‑back rhythm of local sports culture.
  arts: Angela Maska strums acoustic guitar to the lilting blues of Clifton Chenier at weekend festivals, dances to the fiddles of BeauSoleil’s Zydeco beats, and spins vinyl classics by Dolly Parton and
    Luke Bryan, letting the rhythms shape their social gatherings with a Southern‑Cajun soundtrack, and they always keep a spare guitar case in the back of their truck.
  travel: Angela Maska prefers impromptu road trips along the Gulf Coast, from sunrise at Grand Isle to late‑night shrimp boils in Mobile, and they also dream of a sustainable‑farm tour in the Italian countryside
    and a cultural pilgrimage to the Bayou Teche festivals of Lafayette.
  culinary: Angela Maska whips up smoky jambalaya with Andouille sausage, okra, and freshly shucked Gulf oysters, layers cayenne, thyme, and bay leaf for depth, and they savor a side of beignets with chicory
    coffee after a long day in the field.
  core: Angela Maska blends a farmer’s practical eye with a party‑starter’s flair, juggling spontaneous road trips, field inspections, and late‑night jam sessions while they habitually misplace their keys
    in the back of a pickup.
background:
  cultural: Angela was raised in Geismar, a tight‑knit community in Ascension Parish, where Southern hospitality and a strong tie to the land are central to daily life. As a white Louisiana native, she
    grew up in a family of small‑scale farmers and was immersed in the region’s French‑Cajun heritage—celebrating Mardi Gras, savoring gumbo, and listening to zydeco and country music. The local Catholic
    church and community events fostered her sociable nature, while the agricultural environment nurtured her practical, hands‑on mindset. Her upbringing blends classic Southern values with the unique multicultural
    flavor of central Louisiana.
attributes:
  skills: '["Agricultural field inspection", "Plant health assessment", "Pesticide compliance monitoring", "Basic soil and tissue sampling", "Handheld GIS and GPS mapping", "Data entry and report drafting",
    "Public speaking and community outreach", "Conflict mediation with growers", "Adaptability in dynamic field conditions", "Effective interpersonal communication"]'
  hobbies: '["Cooking Cajun cuisine", "Zydeco dancing", "Playing acoustic guitar", "Kayaking in Bayous", "Nature photography", "Volunteering at farmer''s markets", "Attending music festivals", "Road trips
    along the Gulf Coast", "Hunting and fishing", "Reading about sustainable agriculture"]'
  career_goals: She aims to earn an associate’s degree in agricultural science within the next two years, progress to a senior agricultural inspector role, and eventually shape state‑wide sustainable farming
    policies. Angela also dreams of establishing a farmer‑education program in Ascension Parish that blends modern agronomic techniques with traditional local practices, positioning herself as a trusted
    liaison between the community and regulatory agencies. Her love of public speaking drives her ambition to become a recognized speaker at regional agricultural conferences and community events.
