  career_goals: Although retired, Sonja continues to pursue ambitious personal projects. She aims to complete and self‑publish a memoir that weaves her family’s history with reflections on art and aging.
    She seeks to establish a weekly senior art circle in Lexington, offering workshops in watercolor, quilting, and storytelling. Sonja also plans to become a volunteer docent at the local historical museum,
    sharing curated tours that highlight regional heritage. She hopes to expand her digital photography skills and hold a small exhibition at the community center. Finally, she wishes to learn basic video‑editing
    to create a short documentary on the town’s cultural traditions.
