personas:
  professional: Sonja Walters, a retired community theater enthusiast and seasoned volunteer, leverages their storytelling flair, event coordination experience, and artistic eye to mentor seniors in art
    workshops and curate local museum tours, while their relaxed approach to obligations sometimes leads to last‑minute scheduling.
  sports: Sonja Walters, a devoted fan of the Kentucky Wildcats basketball team and the Lexington Legends minor‑league baseball club, joins a weekly senior walking club at the local park and occasionally
    participates in low‑impact water aerobics at the community center, embracing gentle exercise that fits their age and love for social interaction.
  arts: Sonja Walters, an avid watercolorist who admires Monet's soft palettes, a quilt‑maker inspired by the bold geometry of Gee's Bend, and a classical music lover who frequently listens to Debussy and
    Brahms, channels their imagination into community theater narration and regular visits to the local art museum to stay inspired.
  travel: Sonja Walters, who prefers relaxed, culturally rich trips, often plans weekend getaways to historic Williamsburg, Virginia, and annual pilgrimages to Washington, D.C.'s Smithsonian museums, while
    their flexible itinerary reflects a love for novelty and occasional spontaneous visits to nearby state parks for sketching sessions.
  culinary: Sonja Walters, a tea‑hosting connoisseur who delights in brewing Earl Grey with a splash of fresh lemon and serving garden‑harvested ratatouille, vegetable quiche, and homemade apple crumble,
    enjoys modest cooking experiments but sometimes forgets to defrost meat in time.
  core: Sonja Walters is a whimsically creative, socially vibrant 76‑year‑old who blends art, storytelling, and garden stewardship into a lively, if occasionally disorganized, routine that balances curiosity
    with gentle self‑worry.
background:
  cultural: Sonja was born and raised in the Midwest, growing up in a small Indiana farming community with German‑Irish ancestry. Her upbringing was shaped by the close‑knit values of rural life, regular
    church gatherings, county fairs, and a strong sense of community responsibility. She attended a local community college in the early 1960s, where she was exposed to liberal arts and the burgeoning art
    movements of the era. These Midwestern cultural influences—practical self‑reliance, an appreciation for folk art and storytelling, and a deep respect for local history—still inform her worldview and
    her active involvement in preserving and celebrating the heritage of Lexington and Clark County.
