  career_goals: Wendy aims to advance within her company to a supervisory role, such as a team lead or shift manager, where she can apply her organizational talents to improve workflow and mentor staff.
    She plans to complete the company's Certified Customer Service Professional program and gain deeper technical expertise in the product line, positioning herself for a future role as a quality‑assurance
    analyst or community liaison. Long‑term, she hopes to leverage her experience to start a small home‑based craft business selling handmade quilts and preserves, providing both an additional income stream
    and a creative outlet.
