personas:
  professional: Wendy Gulledge is a seasoned customer service specialist with a knack for translating complex product issues into clear, step‑by‑step guidance, and they use their organized, talkative nature
    to mentor new hires while keeping the call center’s workflow humming smoothly.
  sports: Wendy Gulledge laces up their trail shoes for weekly hikes with the Idleyld Park Hiking Club, signs up for the community senior bowling league, cheers on the Portland Timbers during soccer season
    and the Trail Blazers in basketball, and they treat each 5 K run as a friendly challenge rather than a high‑stakes competition, preferring steady endurance over sprint intensity.
  arts: Wendy Gulledge sings alto in their Baptist church choir, where they relish harmonizing to the hymns of Fanny Crosby, enjoy leaf‑throughs of historical novels by Ken Follett and Philippa Gregory,
    knit to the soothing folk tunes of Joan Baez and Gillian Welch while they follow quilting patterns inspired by the works of Faith Ringgold, and they occasionally attend local theater productions of
    classics like 'Our Town.'
  travel: Wendy Gulledge plans each getaway with a spreadsheet of must‑see sites, favoring road trips to Crater Lake and the Columbia River Gorge, weekend retreats to the Oregon coast town of Cannon Beach,
    and they dream of a pilgrimage to the Irish countryside to trace family roots, while balancing travel costs against the modest budget set aside for their future craft business.
  culinary: Wendy Gulledge cooks with the confidence of a seasoned home chef, whipping up hearty cedar‑smoked salmon chowders, slow‑braised lamb stew with rosemary, and award‑winning Oregon apple crumb
    pies that showcase crisp Granny Smith apples, locally sourced honey, and a sprinkle of cinnamon, and they relish swapping recipes at neighborhood potlucks while occasionally indulging in a late‑night
    slice of chocolate chessboard cake.
  core: Wendy Gulledge blends meticulous organization with an effervescent, talkative spirit, turning every community event, quilting project, and customer call into an opportunity to serve, even if that
    sometimes means they say yes to one too many potluck invitations.
background:
  cultural: Wendy grew up in a small farming community in western Oregon, raised in a family of German‑Irish heritage that valued hard work, self‑reliance, and close community ties. Her upbringing was shaped
    by the Pacific Northwest's love of the outdoors, seasonal festivals, and a modest, down‑to‑earth lifestyle. A lifelong member of a Baptist congregation, she embraces the region's traditions of volunteerism,
    mutual aid, and straightforward communication. While she identifies as white American, her cultural identity is rooted in the values of rural Oregon — respect for nature, a friendly neighborly spirit,
    and a pragmatic approach to life's challenges.
