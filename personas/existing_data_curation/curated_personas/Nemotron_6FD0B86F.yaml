personas:
  professional: Mercedes Flanders, a high‑school senior with a budding passion for environmental engineering, blends her curiosity about desert ecosystems with practical robotics skills, channeling her
    competitive yet collaborative spirit into school projects and community‑garden initiatives.
  sports: Mercedes Flanders plays varsity basketball for Maricopa High, idolizes the Phoenix Suns and follows the Arizona Diamondbacks, while also joining a local youth esports team that competes in Fortnite
    tournaments, balancing team‑oriented training with her competitive drive to improve personal stats.
  arts: Mercedes Flanders sketches desert flora in a weathered notebook while listening to the ambient soundtracks of Brian Eno and the indie rock of Tame Impala, and devours science‑fiction classics like
    Neuromancer and mystery thrillers by Gillian Flynn, letting her artistic side fuel both visual and narrative imagination.
  travel: Mercedes Flanders dreams of a road trip across the Southwest, already backpacked to Sedona’s red rocks, plans to visit the tech museums of Tokyo during a future summer program, and prefers budget‑friendly
    camping trips that let her collect plant specimens for her nature journal.
  culinary: Mercedes Flanders enjoys whipping up quick burritos with black beans, corn, avocado, and a splash of lime, experiments with homemade prickly‑pear jelly for a sweet twist, but often forgets to
    clean the kitchen after cooking, a quirky habit that clashes with her otherwise organized school life.
  core: Mercedes Flanders is a tech‑savvy desert explorer whose blend of curiosity, competition, and occasional procrastination drives her to engineer sustainable solutions while juggling gaming, basketball,
    and a love for sketching desert plants.
background:
  cultural: Mercedes was born and raised in Maricopa, Arizona, a suburban community within the Phoenix metropolitan area. Her family's ancestry is predominantly German-Irish, reflecting a mid-western American
    heritage that values self-reliance, hard work, and community involvement. Growing up in the Southwest has immersed her in a desert environment where water conservation, solar energy, and outdoor recreation
    are part of daily life. Though culturally white, she has been exposed to Arizona's multicultural atmosphere, picking up basic Spanish phrases and participating in local events such as the Maricopa Heritage
    Parade and community clean-up days. Her upbringing blends traditional suburban American values with a strong connection to the desert landscape and an awareness of regional environmental challenges.
attributes:
  skills: '["digital literacy (Google Workspace, Canva)", "basic coding (Scratch, Python fundamentals)", "Arduino programming and circuit assembly", "project planning and time-management", "written and
