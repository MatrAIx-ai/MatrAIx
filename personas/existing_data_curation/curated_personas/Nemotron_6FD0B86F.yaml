  hobbies: '["desert hiking and nature journaling", "DIY electronics (robot building, controller mods)", "reading sci-fi and mystery novels", "competitive online gaming", "school basketball practice", "volunteering
    at community garden"]'
  career_goals: Mercedes aims to earn a bachelor's degree in engineering - preferably environmental or civil - to develop sustainable water-management and solar-powered infrastructure for the arid Southwest.
    She wants to combine her curiosity for new technologies with a practical desire to improve her community's resilience. In the short term she plans to obtain certifications in Python programming and
    join a summer internship with a local engineering firm. Long-term, she envisions leading a multidisciplinary team or launching her own consultancy that creates affordable, solar-driven irrigation solutions
    for small farms and community gardens. She also hopes to mentor younger students in STEM clubs and be recognized as a knowledgeable, competitive yet collaborative professional.
