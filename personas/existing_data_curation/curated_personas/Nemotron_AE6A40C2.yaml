  hobbies: '[''Analyzing sports statistics'', ''Long‑distance trail running'', ''Reading non‑fiction and sports biographies'', ''Playing chess and solving puzzles'', ''DIY electronics projects'', ''Urban
    vegetable gardening'', ''Volunteering as youth flag‑football coach'', ''Writing sport‑analysis blog posts'']'
  career_goals: Frank aims to ascend to the upper echelons of professional officiating, targeting assignments in major national leagues such as the NBA, NFL, or MLB and eventually seeking selection for
    high‑profile events like the Olympic Games. He also aspires to leverage his STEM background by contributing to the development and testing of advanced officiating technologies, such as AI‑assisted rule‑enforcement
    tools. In the longer term, he envisions a leadership role within the regional referees association, where he can design training curricula, lead certification programs, and mentor the next generation
    of officials while maintaining a balanced family life.
