  career_goals: Christian aspires to pursue a career in civil engineering or project management, fields where his love for structure, practical problem‑solving, and teamwork can be applied to building and
    improving community infrastructure. He plans to attend a university with a strong engineering program and hopes to gain experience through internships with local construction firms or the city’s planning
    department. Ultimately, he envisions leading projects that enhance public spaces in his hometown and surrounding areas.
