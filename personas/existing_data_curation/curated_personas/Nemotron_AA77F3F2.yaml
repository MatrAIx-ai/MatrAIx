personas:
  professional: Kendal Buff, a retired art historian and independent scholar, leverages deep expertise in modern American and Pacific Island visual arts to produce sharply critical essays, curate intimate
    exhibitions, and meticulously maintain a hybrid analog‑digital archive, while their natural skepticism and love of solitary research drive a relentless pursuit of under‑recognized Hawaiian artists.
  sports: Kendal Buff, an early‑morning walker who frequents Keaau’s rural trails for low‑impact cardio, occasionally practices tai chi at the local community center, and follows the University of Hawaii
    Rainbow Warriors football team and the Los Angeles Lakers, preferring solitary activity over team sports while quietly tracking personal fitness through a simple step counter.
  arts: Kendal Buff, a solitary painter of tropical landscapes, draws inspiration from Claude Monet’s water lilies, listens to Frédéric Chopin nocturnes while sketching, collects vintage Hawaiian postcards
    and studio pottery, and reveres the traditional Hawaiian chant of Mele Hula, weaving these influences into their art journal and curatorial projects.
  travel: Kendal Buff, a reflective traveler who prefers meticulously documented yet spontaneously paced trips, has journeyed to the volcanic craters of Haleakalā, the historic streets of Kyoto, and the
    art museums of Paris, while dreaming of a future archival expedition to Tahiti’s museums to capture neglected Pacific‑influenced artworks.
  culinary: Kendal Buff, a modest home cook who grew up savoring poi, lomi salmon, and kalua pork, now cultivates taro and sweet ti in a small garden and frequently prepares fragrant poke bowls seasoned
    with limu seaweed, adobo‑style ulua fish, and a dash of freshly grated ginger.
  core: Kendal Buff, a curiously critical octogenarian who finds solace in solitary painting, meticulous archiving, and quiet early‑morning walks, while battling disorganization, occasional worry, and a
    competitive edge that fuels their quest to spotlight overlooked Pacific‑influenced artists.
background:
  cultural: Kendal was raised in a Midwestern white American family and pursued a humanities education before relocating to the Big Island of Hawaii in her fifties. Over the past three decades she has woven
    aspects of Hawaiian cultural life—its reverence for natural beauty, respect for oral histories, and local artistic traditions—into her personal worldview, while retaining the analytical, individualistic
    perspective shaped by her early upbringing. Her cultural identity thus blends a mainstream American heritage with a long‑standing, respectful affinity for Hawaiian environment and community values.
attributes:
  skills: '[''Art historical research'', ''Critical writing and essay composition'', ''Curatorial planning and exhibit design'', ''Digital photography and image cataloguing'', ''Archival organization'',
    ''Cross-cultural visual analysis'', ''Independent scholarly investigation'', ''Basic website management'']'
  hobbies: '[''Solo painting'', ''Art journaling'', ''Nature walks'', ''Collecting vintage Hawaiian postcards'', ''Digital archiving of local art'', ''Reading art theory'', ''Listening to classical piano'',
    ''Gardening native Hawaiian plants'']'
  career_goals: Although retired, Kendal aims to publish a monograph highlighting underrepresented Hawaiian artists of the late 20th century, curate a community exhibition that honors local indigenous artistic
    voices, and develop an online archive of Pacific‑influenced American artworks. She also hopes to mentor younger art enthusiasts through occasional workshops at the Keaau library and to gain personal
    recognition as a thoughtful art critic within niche scholarly circles.
