  career_goals: Yeison aims to move from staff waiter to shift supervisor within his current restaurant chain, using his knack for routine to standardize service procedures and reduce the stress he feels
    on busy nights. He hopes to earn a GED and take a short culinary management course, which would position him for a future role as a restaurant manager or owner of a modest family‑run eatery that serves
    traditional Puerto Rican fare. Financial stability, a more predictable schedule, and recognition as a top performer (e.g., Employee of the Month) are central to his ambition.
