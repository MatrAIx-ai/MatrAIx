personas:
  professional: A seasoned front‑of‑house specialist, Yeison Mesa blends a decade of precise table service, bilingual coordination and cash‑handling expertise with a naturally skeptical eye, using routine
    to mitigate the stress of rushes while competitively upselling to meet performance goals, all while maneuvering between a love of predictable flow and occasional spontaneous improvisation.
  sports: A devoted baseball fan, Yeison Mesa never misses a Cangrejeros de Santurce game, supports the local Condado Fitness Club for weekly sunrise jogs along the coastline, and channels their competitive
    edge into a senior‑center domino league that doubles as a mental‑sharpness workout.
  arts: A salsa‑aficionado, Yeison Mesa thrives on the rhythms of Marc Anthony, Celia Cruz and Daddy Yankee, often joining impromptu community‑festival dances, while also appreciating traditional plena
    groups like Plena Libre, allowing music to shape both their social interactions and personal downtime.
  travel: A weekend explorer, Yeison Mesa enjoys short road trips to island gems like the historic streets of Old San Juan, the cliffside vistas of Cabo Rojo, and the bioluminescent bay of Vieques, while
    eyeing a future cultural pilgrimage to Cartagena, Colombia, and carefully balances adventure with a modest travel budget.
  culinary: A disciplined home chef, Yeison Mesa follows recipes for classic island dishes—such as mofongo stuffed with chicharrón, arroz con gandules seasoned with sofrito, and crispy tostones—executing
    each step with precise timing, favoring ingredients like plantains, pork shoulder and ají dulce, and relishes occasional visits to local eateries for fresh seafood paella.
  core: Yeison Mesa is a routine‑driven, skeptical yet spontaneously adaptable restaurateur who balances disciplined cooking, careful budgeting, and a competitive love for baseball with an undercurrent
    of worry‑driven stress.
background:
  cultural: Yeison is a 39‑year‑old Puerto Rican man raised in Guaynabo, a suburb of San Juan. He grew up in a working‑class family where weekly meals, church gatherings, and neighborhood celebrations reinforced
    a strong sense of community and tradition. The island’s vibrant culinary and musical heritage shaped his love for cooking and dancing, while the economic challenges of the past two decades fostered
    a pragmatic, skeptical outlook. He identifies with the island’s bilingual reality, speaking fluent Spanish and functional English, and he carries pride in the resilience and warmth that characterize
    Puerto Rican culture.
attributes:
  skills: '[''Customer Service'', ''Order Memorization'', ''Cash Handling'', ''Point‑of‑Sale Operation'', ''Food Safety Compliance'', ''Conflict De‑escalation'', ''Upselling & Suggestive Selling'', ''Bilingual
    (Spanish/English) Communication'', ''Team Coordination'']'
  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Walking along the coastline'', ''Playing dominoes'', ''Fishing at local ponds'', ''Listening to salsa and plena music'', ''Watching baseball games'',
