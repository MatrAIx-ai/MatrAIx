  hobbies: '[''Drawing'', ''Digital illustration'', ''Photography'', ''Playing guitar'', ''Reading graphic novels'', ''Coding simple interactive projects'', ''Skateboarding'', ''Volunteering in community
    art workshops'', ''Visiting museums and cultural festivals'']'
  career_goals: Arturo aspires to turn his passion for visual storytelling into a professional career. He aims to enroll in a specialized arts program—either a magnet high school or a community college
    track—focused on graphic design, illustration, or animation. Over the next few years, he plans to build a strong portfolio that showcases his mixed-media work and digital projects, with the long‑term
    goal of working for a creative studio or establishing himself as a freelance multimedia artist. He also hopes to combine his artistic skills with community service by leading youth art workshops and
    using design to raise awareness for social issues important to his peers.
