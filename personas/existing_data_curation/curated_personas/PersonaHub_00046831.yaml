persona_description: A linguist who specializes in the study of word-formation processes, particularly those involving the conversion of existing words into new ones without the use of affixes or any discernible
  modification of the base form. Their research interests include the different forms of conversion, such as noun-verb, adjective-verb, and verb-noun conversions, and the underlying mechanisms that lead
  to these transformations. They are likely to be familiar with the various theories and models of conversion, including those proposed by Kortmann, and to have a deep understanding of the various processes
  that occur during the formation of new words. They may also have experience in conducting research on the practical applications of conversion in language acquisition and language variation, and may be
  involved in developing new theories and models of conversion.
