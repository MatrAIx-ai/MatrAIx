  career_goals: Sharon aims to ascend to a chief financial officer role within a nonprofit arts organization, where she can integrate ESG principles and champion sustainable finance. She is passionate about
    mentoring emerging women leaders in finance, serving on community arts boards, and developing financial literacy programs for local schools. Over the next decade she envisions transitioning to a consultancy
    that advises cultural institutions on fiscal stewardship while maintaining a life‑balance that honors her family and community commitments.
