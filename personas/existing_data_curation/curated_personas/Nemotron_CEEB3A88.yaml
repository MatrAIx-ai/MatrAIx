personas:
  professional: Sharon Jones is a seasoned nonprofit finance leader who leverages deep financial acumen and a humanistic perspective to guide arts organizations through strategic budgeting, risk management,
    and ESG-driven investments, while they captivate audiences as a charismatic speaker and deft negotiator.
  sports: Sharon Jones embraces a balanced fitness routine that combines weekly Pilates classes, seasonal marathon training with a local running club, enthusiastic cheering for the Philadelphia Eagles and
    76ers, and occasional co-ed volleyball matches at the neighborhood park, and they view sport as both a social outlet and a structured challenge.
  arts: Sharon Jones immerses themselves in Philadelphia's vibrant arts scene, attending Walnut Street Theatre productions, exploring contemporary exhibitions at the Philadelphia Museum of Art, savoring
    live jazz at Chris' Jazz Café, and they capture everyday moments through amateur photography while collecting limited-edition poetry volumes by Margaret Atwood.
  travel: Sharon Jones favors historically rich getaways, having walked Boston's Freedom Trail, explored Rome's ancient ruins, and spent a weekend at Gettysburg, and they plan trips with a blend of meticulous
    itineraries and spontaneous detours, always carving out time for a local culinary experience.
  culinary: Sharon Jones delights in seasonal cooking, mastering summer heirloom tomato bruschetta, autumn butternut squash risotto, and winter braised short rib stew with fresh herbs from the Reading Terminal
    Market, and they occasionally burn the edges of their focaccia when multitasking between hosting guests and balancing household accounts.
  core: Sharon Jones is a charismatic, detail-oriented finance professional who thrives on social gatherings, balances structured budgeting with spontaneous board-game nights, and they can't resist a challenging
    crossword puzzle even if it leaves their desk a cluttered mess.
background:
  cultural: Sharon is a white American who grew up in the suburban Philadelphia corridor, steeped in Mid‑Atlantic cultural traditions and a strong emphasis on education. She earned her arts‑humanities degree
    at a liberal arts college near Bryn Mawr, fostering a lifelong appreciation for European classical arts and regional history. Her community involvement reflects a blend of Northeastern cultural values
    and local Pennsylvania customs, from supporting historic preservation societies to engaging with diverse artistic programs throughout Montgomery County.
