personas:
  professional: Kenia Gomez is a methodical community organizer who leverages her budgeting expertise, bilingual communication, and structured approach to coordinate local cultural events and now prepares
    to transition into early childhood education as a classroom aide while planning a home‑based catering venture.
  sports: Kenia Gomez enjoys gentle weekend walks on the hillside trail network, supports the local minor‑league baseball team the Riverside Bears, and participates in the community hiking club Trailblazers
    to stay active without overexertion.
  arts: Kenia Gomez fills her leisure time with regional music from artists like Vicente Fernández, Mariachi Vargas de Tecalitlán, and Luis Miguel, watches popular telenovelas such as "Amor Real", and expresses
    creativity through crocheting colorful blankets and shawls.
  travel: Kenia Gomez dreams of weekend trips to Oaxaca's culinary markets and annual folk festivals, balances travel planning with family responsibilities, and prefers budget‑friendly road trips that allow
    her to source fresh herbs for her cooking.
  culinary: Kenia Gomez masterfully prepares tamales with masa and pork, simmered mole poblano with ancho chilies and chocolate, and sweet pan dulce topped with piloncillo, using ingredients like dried
    chiles, epazote, and masa harina to keep her traditional recipes authentic.
  core: Kenia Gomez blends disciplined organization with a love of communal cooking, yet battles chronic worry that often nudges her into over‑planning and occasional splurges on culinary indulgences.
background:
  cultural: Kenia is a second‑generation Mexican‑American who grew up in a close‑knit family that emphasized traditional customs, Catholic faith, and the Spanish language. She celebrates Mexican holidays
    such as Día de los Muertos, Las Posadas during Navidad, and communal gatherings featuring home‑cooked meals, folk music, and dance. Living in Fontana, California, she maintains strong ties to the local
    Mexican community, frequently attending events at the community center and supporting cultural preservation. Her identity blends Mexican heritage with the multicultural environment of Southern California,
    shaping values around family, hospitality, hard work, and community service.
attributes:
  skills: '[''household management'', ''budgeting'', ''meal planning'', ''bilingual communication (Spanish/English)'', ''community event coordination'', ''basic computer literacy'', ''caregiving'', ''conflict
