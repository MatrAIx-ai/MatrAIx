  hobbies: '[''cooking traditional Mexican dishes'', ''vegetable gardening'', ''crocheting'', ''listening to regional Mexican music'', ''participating in church and cultural celebrations'', ''walking local
    trails'', ''reading self‑help books'', ''watching telenovelas'']'
  career_goals: Kenia aims to obtain her GED within the next two years, followed by a certification in early childhood education to volunteer as a classroom aide. She also aspires to launch a home‑based
    catering venture specializing in authentic Mexican dishes, using her organizational strengths to manage orders and finances. Additionally, she hopes to become a coordinator for cultural events at the
    local community center, fostering connections among Mexican‑American families while maintaining a structured, stress‑managed lifestyle.
