  hobbies: '[''Visiting art galleries'', ''Street photography'', ''Urban gardening'', ''Playing acoustic guitar'', ''Hiking in nearby nature preserves'', ''Reading contemporary non-fiction'', ''Attending
    public lectures on social innovation'', ''Volunteering at community art workshops'', ''Exploring diverse neighborhoods in Chicago'']'
  career_goals: Justin aims to ascend to senior leadership within the nonprofit sector, targeting a director‑level role that oversees citywide community development programs. He plans to secure a larger
    share of municipal and private funding to expand arts‑focused social services. In the longer term, he envisions launching his own social enterprise that combines entrepreneurship, community health,
    and creative expression, positioning himself as a competitive thought leader in social innovation and policy advocacy.
