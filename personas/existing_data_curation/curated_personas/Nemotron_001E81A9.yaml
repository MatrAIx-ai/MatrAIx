personas:
  professional: Justin Edmonds, a social‑community service manager with a business degree, translates strategic grant writing and data‑driven program design into citywide arts‑focused social initiatives,
    and they leverage their competitive edge and meticulous organization while staying open to unconventional, creative solutions.
  sports: Justin Edmonds fuels their love of the outdoors by tackling Chicago’s forest preserve trails on weekends, they run the annual Chicago 5K for charity, follow the Cubs and Bulls religiously, and
    belong to a local rowing club that meets on Lake Michigan during the summer.
  arts: Justin Edmonds immerses themselves in Chicago’s cultural pulse by attending gallery openings featuring artists like Kehinde Wiley and Kara Walker, snapping street photography of murals by the enigmatic
    collective Seen & Heard, and they strum acoustic covers of Mavis Staples and Wilco at open‑mic nights.
  travel: Justin Edmonds balances meticulous itinerary planning with spontaneous detours, having explored the culinary scene of New York City, the music festivals of Austin, and the historic neighborhoods
    of Montreal, they also dream of strolling Barcelona’s Gothic Quarter and hiking the Scottish Highlands to connect with ancestral roots.
  culinary: Justin Edmonds cultivates basil, thyme, and microgreens on their balcony, weaving fresh herbs into pesto pasta and herb‑infused grilled chicken, they also indulge in Chicago deep‑dish pizza,
    a weekend bowl of Vietnamese pho, and the occasional cinnamon roll binge after late‑night grant deadlines.
  core: Justin Edmonds blends Midwestern pragmatism with urban creativity, juggling data‑driven nonprofit leadership, competitive financial planning, and they maintain a habit of late‑night guitar sessions
    that occasionally upset their sleep schedule.
background:
  cultural: Raised in the Chicago suburbs within a white, Midwestern family—primarily of Irish‑German heritage—Justin was exposed early to values of self‑reliance, community involvement, and modest ambition.
    Relocating to the city for college and his career, he absorbed Chicago's multicultural dynamism, fostering an openness to diverse perspectives and unconventional ideas. This blend of Midwestern practicality
    and urban cultural exposure shapes his balanced, yet competitive, professional mindset.
attributes:
  skills: '[''Community program design'', ''Grant writing'', ''Strategic planning'', ''Budget management'', ''Stakeholder engagement'', ''Data analysis'', ''Volunteer coordination'', ''Event planning'',
