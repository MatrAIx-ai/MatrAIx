personas:
  professional: Yamilia Lantigua leverages their disciplined, bilingual approach and relentless competitiveness to dominate Ponce’s real‑estate market, excelling in negotiations, market analysis, and client
    relationship management while using their sociable flair to market properties on social media.
  sports: Yamilia Lantigua stays fit by salsa‑and‑plena dancing at Club de Salsa Ponce, weekly morning walks along the coastal promenade, and cheering on the Leones de Ponce baseball team during spring,
    treating their social dancing as their primary cardio workout.
  arts: Yamilia Lantigua finds artistic fulfillment in capturing Ponce’s colonial facades through their DSLR, while evenings are filled with salsa rhythms from Celia Cruz and local plena group Boricua Sonora,
    and they regularly attend performances by the Ponce Symphony Orchestra.
  travel: Yamilia Lantigua prefers short, spontaneous weekend getaways to Vieques and Culebra’s pristine beaches, planning trips on a loose itinerary that balances beach relaxation with exploring historic
    forts, while dreaming of a future cultural tour of Cartagena’s old town.
  culinary: Yamilia Lantigua showcases their culinary prowess by expertly preparing mofongo with garlicky sofrito, arroz con gandules seasoned with achiote, and slow‑roasted pernil, while they delight in
    pairing these dishes with fresh cilantro, bitter orange juice, and a glass of local Medalla beer.
  core: Yamilia Lantigua is a structured, fiercely competitive realtor who channels their sociable energy into salsa nights, orchid gardening, and a relentless quest to become Ponce’s top broker, even if
    it means late‑night market analyses and occasional coffee‑induced jitteriness.
background:
  cultural: Born and raised in Ponce, Yamilia embodies the rich cultural tapestry of Puerto Rico, blending Spanish colonial heritage with Afro‑Caribbean rhythms and a strong sense of community. She grew
    up speaking Spanish at home while learning English in school, giving her a bilingual edge. Family ties, Catholic traditions, and the vibrant music of bomba and plena have shaped her worldview. The historic
    streets, colorful architecture, and annual festivities of Ponce—especially the Carnaval Ponceño—infuse her daily life with pride and a deep appreciation for local customs. She maintains close connections
    with extended family and neighbors, often sharing traditional dishes and stories that reflect the island’s resilient spirit.
