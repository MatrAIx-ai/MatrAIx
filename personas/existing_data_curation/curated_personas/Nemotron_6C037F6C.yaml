  career_goals: Kevin aims to advance into a supervisory role, such as Shift Supervisor or Inventory Manager, within the next two to three years. He plans to obtain a professional certification in supply
    chain management (e.g., APICS CPIM) to formalize his expertise. Using his analytical mindset, he wishes to lead data‑driven process improvement projects that incorporate modest automation or digital
    tools, thereby increasing operational efficiency. Mentoring younger colleagues and fostering a cooperative work environment are also key aspirations. Ultimately, Kevin seeks a stable, rewarding position
    that supports a balanced work‑life schedule and facilitates early retirement while maintaining his commitment to reliability and teamwork.
