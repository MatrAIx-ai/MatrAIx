personas:
  professional: Chandler Ragoo is a front‑line customer service specialist who leverages razor‑sharp verbal communication, conflict‑de‑escalation tactics, and expert CRM navigation to resolve inquiries
    swiftly, applying their methodical, organized mindset and competitive drive to mentor teammates and shape service standards.
  sports: Chandler Ragoo channels their competitive streak into weekly hikes with the Catskills Trail Riders club, follows the New York Knicks and the Buffalo Bills during the basketball and football seasons,
    and participates in a seasonal community‑run 5 K organized by the Schoharie County Recreation League.
  arts: Chandler Ragoo pursues charcoal sketching of rural vistas, finds inspiration in the works of Andrew Wyeth and Edward Hopper, and curates their personal soundtrack with Miles Davis, Etta James, and
    Kendrick Lamar, allowing jazz, blues, and hip‑hop to fuel their creative sessions.
  travel: Chandler Ragoo prefers meticulously planned getaways that blend adventure and culture, such as weekend treks in the Catskills, culinary tours of Jamaica’s spice markets, and a long‑awaited pilgrimage
    to Kyoto’s techno‑futurist museums, all balanced against their modest budget and family commitments.
  culinary: Chandler Ragoo, an avid home cook, expertly blends soul‑food comfort like crispy fried chicken, collard greens, and cornbread with Caribbean staples such as jerk chicken, plantains, and curried
    goat, often seasoning dishes with fresh herbs—rosemary, thyme, and cilantro—grown in their own garden.
  core: Chandler Ragoo is a curious, methodical introvert whose love of solitary hikes, strategic chess, and competitive mentorship fuels a balanced life of disciplined work, creative sketching, and flavorful
    cooking.
background:
  cultural: Chandler identifies as Black American with roots that trace back to the Southern United States and a generation of Caribbean immigrants in his family. This heritage infuses his life with a love
    for rhythm and storytelling, reflected in his appreciation for jazz, hip‑hop, and oral histories shared at family gatherings. Growing up in a close‑knit Black community, he learned the importance of
    mutual support and resilience, values he carries into his married life in Cobleskill. While the rural upstate New York setting offers a quieter pace, Chandler balances his cultural traditions—such as
    cooking family recipes and celebrating Juneteenth—with the local farmer’s market culture, creating a blended identity that honors his ancestry while engaging with his broader community.
attributes:
  skills: '[''Customer Service'', ''Verbal Communication'', ''Active Listening'', ''Conflict Resolution'', ''CRM Software (Zendesk, Salesforce)'', ''Data Entry'', ''Process Documentation'', ''Time Management'',
    ''Quality Assurance Evaluation'', ''Team Training'']'
  hobbies: '[''Hiking'', ''Sketching and Drawing'', ''Reading Science Fiction and Philosophy'', ''Chess'', ''Gardening'', ''Cooking Soul Food and Caribbean Cuisine'', ''Listening to Jazz, Blues, and Hip‑Hop'']'
  career_goals: Chandler aims to move from a representative role into a supervisory or team‑lead position within the next two to three years, where he can shape service standards and mentor a small group
    of agents. He plans to earn a Certified Customer Service Manager credential and eventually complete an associate degree in Business Administration to broaden his strategic perspective. Long‑term, he
    envisions establishing a community‑focused training program that equips residents of Schoharie County with customer‑service and communication skills, combining his competitive ambition with a desire
    to give back to his hometown.
