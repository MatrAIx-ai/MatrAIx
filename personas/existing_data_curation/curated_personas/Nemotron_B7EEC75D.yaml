  career_goals: Although she is no longer employed full‑time, Wanda remains driven to leave a legacy. She aims to create a community archive of African‑American stories from Houston, mentor a handful of
    early‑career teachers, and establish a modest scholarship fund for students pursuing education degrees. She also hopes to complete a memoir that intertwines her personal history with the broader civil‑rights
    era, and to continue attending lectures at the Houston Museum of Fine Arts to deepen her artistic knowledge.
