personas:
  professional: Wanda Grier, an 89‑year‑old retired educator, transforms her decades of curriculum development and adult literacy expertise into volunteer mentorship, spearheading a community archive of
    local stories while juggling a delightfully chaotic schedule that reflects her relaxed approach to obligations.
  sports: Wanda Grier enjoys gentle morning walks through the Houston Arboretum, participates in a senior walking club that meets twice weekly, and follows the Houston Astros and Rockets on television,
    preferring low‑impact activity over competitive sports while still cheering from her living room armchair.
  arts: Wanda Grier spends afternoons sketching watercolor scenes of Houston’s parks, listens to John Coltrane and Mahalia Jackson, reads poetry collections by Langston Hughes and Maya Angelou, curates
    a personal archive of historic neighborhood photographs, and volunteers at the Museum of Fine Arts to lead informal art‑appreciation workshops for seniors.
  travel: Wanda Grier favors relaxed, short‑duration trips such as weekend drives to Galveston’s beachfront, quiet tours of the NASA Space Center, and occasional visits to New Orleans for its music scene,
    always planning low‑stress itineraries that accommodate her need for rest and her occasional anxiety about unfamiliar places.
  culinary: Wanda Grier nurtures a small indoor herb garden of basil, rosemary, and mint, delights in preparing a slow‑cooked stew with okra, smoked sausage, and rice, and bakes buttery cornbread, blending
    family heritage recipes with modern twists while occasionally over‑seasoning in her experimental fervor.
  core: Wanda Grier, an 89‑year‑old retired teacher, balances a lifelong passion for art, literature, and community legacy with a gentle disorganization and a heart that swings between deep anxiety and
    quiet determination.
background:
  cultural: Born and raised in Houston during the era of desegregation, Wanda grew up in a tight‑knit African‑American community anchored by the local Baptist church. Her family honored Southern soul‑food
    traditions, gospel music, and storytelling as ways to preserve heritage. She witnessed the civil‑rights movement firsthand, which shaped her commitment to educational equity. Over the decades she has
    contributed to several cultural organizations, such as the Houston Museum of African American Culture, and remains deeply connected to the city’s vibrant Black artistic scene. These experiences imbue
    her worldview with resilience, a reverence for collective memory, and a sustained curiosity about how art and history intersect.
