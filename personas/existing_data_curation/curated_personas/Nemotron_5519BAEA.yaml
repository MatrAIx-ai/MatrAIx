  career_goals: Approaching retirement, John aims to leverage his expertise to become a part‑time strategic advisor, focusing on corporate social responsibility and sustainability initiatives that benefit
    both business and community. He seeks to mentor the next generation of analysts, offering guidance on analytical rigor and compassionate leadership. John also aspires to serve on nonprofit board committees,
    where he can apply his analytical acumen to improve operational effectiveness. Over the next five years, he plans to author a concise guide on ethical data analytics, integrate emerging AI‑assisted
    tools into his consulting practice, and gradually transition to a role that balances professional impact with personal fulfillment and family time.
