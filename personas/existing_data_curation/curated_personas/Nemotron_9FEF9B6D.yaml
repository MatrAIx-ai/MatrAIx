personas:
  professional: Susana Rosado, a budding cartoonist and nascent naturalist, they channel their curiosity into sketching vibrant cartoons and detailed field sketches, treating their informal art practice
    like a mini-studio.
  sports: Susana Rosado, they cheer for the Kansas City Royals and follow the Ralls Junior Soccer Club where they play as a midfielder, enjoying after-school kick-around sessions and occasional community
    swimming lessons, but they prefer dancing Folklorico to structured team sports.
  arts: Susana Rosado, they spend evenings drawing cartoons inspired by Hayao Miyazaki and reading illustrated myth books by Neil Gaiman, practicing simple piano pieces like Twinkle Twinkle Little Star,
    and dancing Folklorico steps taught by their mother, often humming Tchaikovsky's Waltz of the Flowers as they sketch.
  travel: Susana Rosado, they love weekend road trips to the nearby Flint Hills, dreaming of exploring the Grand Canyon and the Smithsonian National Air and Space Museum, but their travel plans revolve
    around school holidays, family budgets, and short, curiosity-fueling excursions to local museums and nature trails.
  culinary: Susana Rosado, they relish helping their grandmother bake tamales, favoring corn masa and spicy salsa, enjoy snack-time sunflower seeds, mango slices, and the occasional chocolate chip cookie,
    and can whip up a simple cheese quesadilla after watching a cooking tutorial, though they sometimes burn the cheese if distracted.
  core: Susana Rosado, they blend a vivid imagination with a cautious heart, sketching worlds while worrying about missing a detail, and they balance a love of art, nature, and family traditions with a
    habit of daydreaming and forgetting chores.
background:
  cultural: Susana comes from a Mexican‑American family rooted in the rural community of Ralls, Texas. Her household is bilingual, speaking Spanish at home and English at school, and she celebrates traditions
    such as Día de los Muertos, Mexican Independence Day, and local Texas festivals. Family meals feature dishes like tacos, enchiladas, and homemade tamales, and music ranging from mariachi to regional
    Tejano fills the house. The blend of Mexican heritage and small‑town Texan values shapes her identity, fostering respect for community, family, and cultural storytelling.
attributes:
  skills: '["drawing", "coloring", "storytelling", "bilingual Spanish‑English communication", "basic piano", "LEGO building", "simple science experiments", "puzzle solving", "empathy with animals and peers"]'
  hobbies: '["drawing", "coloring", "reading illustrated books", "rock and insect collecting", "playing piano", "folklorico dancing", "baking tamales with family", "watching educational videos"]'
  career_goals: She dreams of becoming a mural artist who can paint colorful stories of her Mexican heritage on community walls, or a wildlife biologist who studies the insects and birds of the Texas countryside.
    Susana also imagines herself as a teacher who leads small‑group art workshops, allowing her to share her curiosity while keeping a relaxed, flexible schedule. Occasionally, she daydreams about being
    an astronaut exploring space, reflecting her love for unconventional ideas and new experiences.
