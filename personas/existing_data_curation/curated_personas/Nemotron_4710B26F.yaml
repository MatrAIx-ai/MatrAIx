personas:
  professional: Alicia Carvajal, a 44‑year‑old community event orchestrator, leverages her practical curiosity and critical skepticism to design and execute small‑scale cultural festivals, balancing meticulous
    budget spreadsheets with the flexibility to improvise when volunteer dynamics shift.
  sports: Alicia Carvajal follows the Portland Timbers with fervor, joins the Portland Hiking Collective for Saturday morning treks in the Columbia River Gorge, and balances their love of group activity
    with occasional yoga sessions at the community center, using these pursuits as pragmatic outlets for stress relief and a competitive edge in personal fitness.
  arts: Alicia Carvajal immerses herself in community theater productions of Neil Simon’s "The Odd Couple" and teaches flamenco steps inspired by María Pagés, while their evenings echo the guitar riffs
    of Paco de Lucía, a blend that sharpens their social confidence and fuels a competitive drive to perfect group artistry.
  travel: Alicia Carvajal often plans budget‑friendly weekend escapes to historic Spanish towns like Seville and Granada, paired with spontaneous road trips through Oregon’s Redwood forests, preferring
    group itineraries that balance structured cultural immersion with the flexibility for off‑the‑beaten‑path culinary discoveries.
  culinary: Alicia Carvajal, an adept home cook, frequently prepares saffron‑infused paella with bomba rice, chorizo, and fresh peas for weekend potlucks, while also mastering a simple gazpacho with ripe
    tomatoes and sherry vinegar, delighting friends with a modest yet authentic Spanish flavor palette.
  core: Alicia Carvajal navigates life with practical curiosity, turning anxiety into meticulous event planning, while their competitive streak fuels a relentless pursuit of financial independence through
    a budding Spanish catering venture.
background:
  cultural: Alicia was raised in a Spanish‑influenced household where family gatherings, festive celebrations, and traditional cuisine played central roles. While she grew up in the United States, her family
    preserved elements of Spanish culture, such as speaking Spanish at home, observing holidays like Semana Santa and Día de los Reyes, and valuing communal meals. Living in Lombard, Illinois, she blends
    this heritage with Midwestern sensibilities, often participating in local festivals and community events that celebrate cultural diversity. Her background fosters a strong appreciation for hospitality,
    perseverance, and the importance of community support, which she channels into her volunteer work and social activities.
attributes:
  skills: '[''Event planning and coordination'', ''Volunteer management'', ''Budgeting and financial oversight'', ''Basic computer literacy (Word, Excel, email marketing)'', ''Social‑media content creation'',
    ''Conflict mediation'', ''Strategic problem‑solving'', ''Negotiation and contract review'', ''Spanish culinary techniques'', ''Home maintenance and budgeting'']'
  hobbies: '[''Spanish dance workshops'', ''Community theater acting'', ''Cooking traditional Spanish cuisine'', ''Hiking in forest preserves'', ''Reading self‑help and psychology literature'', ''Volunteering
    at senior center (arts & crafts facilitation)'', ''Participating in local walking club'', ''Genealogy research'', ''Language learning (Spanish and basic French)'', ''Hosting potluck gatherings'']'
  career_goals: Alicia aims to transition from a purely volunteer role to a part‑time position that leverages her event‑planning and community‑engagement expertise, such as a coordinator for a local cultural
    center or a freelance consultant for small nonprofit gatherings. She is considering enrolling in a short certification program in nonprofit management or culinary arts to formalize her skills. Her long‑term
    ambition is to launch a home‑based catering service that offers authentic Spanish dishes for corporate events and private celebrations, providing her with financial independence and a creative outlet.
    She also hopes to develop a support network for other women navigating divorce and career changes, using her experience to mentor and empower them.
