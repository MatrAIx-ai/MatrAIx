  career_goals: Matthew dreams of combining his love for art and curiosity about the world into a career that lets him inspire others. He imagines becoming an illustrator of children’s books or a museum
    curator who brings natural history exhibits to life. He is also fascinated by interactive technology and hopes to create educational games that blend storytelling, art, and science. Ultimately, he wants
    a role where he can keep learning, share his creations, and contribute positively to his community.
