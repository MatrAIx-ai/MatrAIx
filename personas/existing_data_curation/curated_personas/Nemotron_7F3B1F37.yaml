personas:
  professional: Matthew Davis, a ten‑year‑old budding technologist, blends his love for storytelling with hands‑on creation, designing Scratch animations and intricate LEGO builds that reflect his curiosity
    and balanced approach to learning.
  sports: Matthew Davis, a ten‑year‑old cycling enthusiast, rides the Ohio River trail with the Mason County Youth Cycling Club, follows the Cincinnati Reds and Bengals avidly, and spends Saturdays at the
    community pool practicing freestyle swimming to stay fit.
  arts: Matthew Davis, a ten‑year‑old watercolor hobbyist, draws inspiration from Monet’s lily ponds and da Vinci’s sketches, practices piano pieces by Mozart and Einaudi, sings hymns alongside his church
    youth choir, and eagerly absorbs local stories at the Mason County History Museum, often humming the tunes of contemporary pop star Taylor Swift during sketch sessions.
  travel: Matthew Davis, a ten‑year‑old adventure seeker, loves weekend road trips to Hocking Hills State Park and day‑long bike rides along the Ohio River, dreams of visiting the historic streets of Washington,
    D.C., and hopes to see the towering castles of Scotland someday, always planning trips with a backpack of sketchbooks and a reusable water bottle.
  culinary: Matthew Davis, a ten‑year‑old budding chef, favors cheesy pepperoni pizza, builds his own mac & cheese with cheddar and a sprinkle of paprika, whips up strawberry‑banana smoothies with fresh
    berries, and proudly prepares peanut‑butter‑jelly sandwiches after watching cooking videos on YouTube, though he often forgets to clean the kitchen afterward.
  core: Matthew Davis, a curious ten‑year‑old explorer, balances LEGO engineering with watercolor dreams, obsessively collects river stones while habitually leaving a trail of crayons on the living room
    floor.
background:
  cultural: Matthew was raised in Maysville, a small town in Mason County, Kentucky, where Southern Appalachian culture shapes everyday life. His family’s White American heritage is intertwined with local
    traditions such as church gatherings, county fairs, bluegrass music, and storytelling. The community emphasizes hospitality, close family bonds, and a strong work ethic rooted in the region’s agricultural
    and small‑town history. These influences foster Matthew’s cooperative nature, his appreciation for harmony, and his curiosity about both local heritage and the broader world beyond his hometown.
