personas:
  professional: Jorge Ajon, a seasoned quality assurance specialist in the island’s coffee and fruit sector, blends meticulous inspection skills, bilingual mentorship, and a calm, resilient demeanor to
    champion incremental tech upgrades while quietly preparing to step into a supervisory role guiding junior technicians.
  sports: Jorge Ajon, a devoted fan of the Capitanes de Arecibo basketball team and the Cangrejeros de Santurce baseball club, spends early mornings on gentle walks through the hills and participates in
    the senior cycling club of Caguas, favoring low‑impact cardio over strenuous workouts while sharing occasional anecdotes at community festivals.
  arts: Jorge Ajon, whose evenings often unfold with a cup of freshly brewed coffee while reading works by Taino scholars and listening to the rhythmic beats of bomba and plena performed by the group Plena
    Libre, finds creative solace in crafting traditional wooden toys during senior center workshops.
  travel: Jorge Ajon prefers well‑planned, low‑stress journeys, favoring cultural immersion trips such as a guided tour of the historic Old San Juan streets, a weekend retreat to the coffee farms of the
    Guatemalan highlands, and occasional cruises to the Virgin Islands, all while balancing travel costs against a modest retirement budget.
  culinary: Jorge Ajon, an adept home cook with a penchant for traditional island fare, regularly prepares mofongo relleno de camarones, arroz con gandules, and revives old family recipes using fresh coconut
    milk, achiote, and locally sourced, single‑origin coffee beans that he even roasts from seedlings in his garden.
  core: Jorge Ajon, a calm, curious senior with a knack for meticulous quality checks, a budget‑savvy wallet, and garden‑filled mornings, balances disciplined routine with occasional indulgences in artisan
    coffee and nostalgic music, all while mentoring the next generation.
background:
  cultural: Jorge was born and raised in Utuado, a mountainous municipality known for its coffee plantations and strong communal ties. He identifies with the mixed cultural heritage of Puerto Rico—Spanish
    colonial roots, African influences, and indigenous Taino traditions. His upbringing emphasized family cohesion, Catholic values, and a deep respect for the land, reflected in his love for coffee cultivation
    and local music such as plena and bomba. Fluent in Spanish and comfortable with English, he navigates both local customs and broader professional standards, embodying the island’s blend of resilience,
    hospitality, and humility.
attributes:
  skills: '[''quality inspection'', ''statistical process control'', ''instrument calibration'', ''data logging and analysis'', ''bilingual communication (Spanish/English)'', ''team mentorship'', ''process
    optimization'', ''safety compliance'', ''documentation and reporting'']'
  hobbies: '[''reading Puerto Rican history'', ''gardening (native plants and coffee seedlings)'', ''hiking in the central mountain trails'', ''attending local festivals and church events'', ''volunteering
    at the senior center'', ''family meals and storytelling'']'
  career_goals: Jorge aims to transition from hands‑on inspection to a supervisory role where he can formalize a mentorship program for emerging technicians in his municipality. He is interested in integrating
    modest technological upgrades—such as portable digital measurement tools—while respecting proven, reliable methods. Over the next few years, he hopes to lead continuous‑improvement projects that enhance
    product consistency for local cooperatives, and eventually serve as a consultant for regional quality assurance standards, sharing his balanced approach to innovation and tradition.
