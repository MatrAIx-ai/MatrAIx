  career_goals: William dreams of a future where he can combine his curiosity about the natural world with his desire to help others. He is fascinated by doctors and scientists, imagining himself as a pediatric
    doctor who comforts sick children or as a wildlife biologist who protects animals. He also expresses interest in engineering, hoping to design tools that make everyday life easier for his community.
    In the short term, he aims to join his school's science club, attend a summer coding camp, and volunteer at the local community garden to gain experience and confirm his passions.
