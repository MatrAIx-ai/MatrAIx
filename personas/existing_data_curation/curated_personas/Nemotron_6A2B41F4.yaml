  career_goals: In the short term Tiffany aims to complete her GED within the next year and enroll in a community‑college program focused on culinary arts or veterinary assistance. She plans to secure a
    part‑time apprenticeship or entry‑level position that offers a predictable schedule, giving her the stability she values while still allowing flexibility for personal projects. Over the longer term
    she dreams of either opening a small boutique café that showcases locally sourced ingredients from Sonoma County or becoming a certified veterinary assistant at a local animal clinic, both paths combining
    hands‑on work with a structured career trajectory.
