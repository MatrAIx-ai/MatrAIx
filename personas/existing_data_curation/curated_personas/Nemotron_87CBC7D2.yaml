  career_goals: William aims to become a senior underwriter within the next five years, focusing on niche markets such as art, entertainment, and technology insurance. He plans to pursue an advanced certification
    in risk management or an MBA to deepen his strategic expertise. Ultimately, he wants to lead a small underwriting team that pioneers flexible, innovative coverage models that accommodate emerging creative
    industries, while maintaining a work‑life balance that preserves his freedom and space for personal artistic pursuits.
