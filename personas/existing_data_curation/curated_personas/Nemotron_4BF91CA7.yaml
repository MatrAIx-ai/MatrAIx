  hobbies: '[''Watercolor painting'', ''Hiking'', ''Pollinator gardening'', ''Reading historical fiction'', ''Genealogy research'', ''Quilting'', ''Cooking Southern cuisine'', ''Visiting art galleries'',
    ''Attending bluegrass concerts'', ''Volunteer docent at heritage museum'']'
  career_goals: Although retired, Olga aims to create a legacy that blends art and nature. She plans to produce a community‑driven garden‑art installation that highlights native Appalachian flora, write
    and self‑publish a memoir intertwined with local history and family genealogy, and launch a quarterly workshop series that mentors emerging artists and storytellers in Henderson County. She also hopes
    to collaborate with the town’s historical society to develop an oral‑history archive accessible to schools.
