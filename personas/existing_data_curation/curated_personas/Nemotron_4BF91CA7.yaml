personas:
  professional: Olga Kaplan, a retired community art curator and garden docent, blends their expertise in storytelling, horticulture, and public speaking to design informal exhibitions and intergenerational
    workshops, letting their spontaneous curiosity guide projects even when they wrestle with deadlines.
  sports: Olga Kaplan, an avid hiker and weekend walker, joins the Henderson County Trail Club, follows the Carolina Panthers and Charlotte Hornets on TV, participates in low‑impact yoga classes at the
    local senior center, and they enjoy community fitness events to stay limber.
  arts: Olga Kaplan, a watercolor enthusiast, finds inspiration in the works of Andrew Wyeth and the sound of bluegrass legends like Bill Monroe, regularly attends performances by the Lonesome River Band,
    visits galleries showcasing folk art, and weaves these influences into their own landscape paintings.
  travel: Olga Kaplan favors relaxed road trips along the Blue Ridge Parkway, has explored Asheville’s art scene, dreams of strolling the historic streets of Savannah, and occasionally plans a summer visit
    to the French countryside to trace family roots, all while balancing travel with a modest pension.
  culinary: Olga Kaplan, a seasoned home cook, delights in seasoning shrimp and grits with smoked paprika, tossing heirloom tomatoes with basil and local honey, and they occasionally experiment by adding
    lavender‑infused butter to a classic peach cobbler, though they sometimes over‑spice in the pursuit of novelty.
  core: Olga Kaplan is a curious, spontaneous 70‑year‑old who blends regional hospitality with a modern artistic flair, juggling a love of paint and pollinators while occasionally misplacing deadlines and
    splurging on craft supplies.
background:
  cultural: Olga grew up as a white Southern woman in mid‑20th‑century North Carolina, absorbing the region’s traditions of hospitality, reverence for the Appalachian landscape, and a strong sense of community.
    Her family’s European roots and the cultural melting pot of Hendersonville have exposed her to folk music, Southern literature, and a respect for nature that shapes her values. While grounded in these
    Southern customs, her curiosity and openness to new ideas have led her to embrace progressive perspectives, making her a bridge between old‑world heritage and contemporary artistic expression.
