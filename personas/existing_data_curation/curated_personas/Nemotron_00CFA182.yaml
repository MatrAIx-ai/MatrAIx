  career_goals: At this stage, Steven aims to channel his curiosity and love of art into community‑focused roles. He hopes to become a volunteer docent at the local art museum, where he can share his informal
    expertise and guide visitors through exhibitions. He also plans to launch a modest, free workshop series in his neighborhood that blends photography basics, simple woodworking, and garden design, fostering
    creative expression among adults and seniors. Long‑term, Steven dreams of curating a small pop‑up gallery featuring works from local hobbyist artists, providing a platform for unconventional voices
    while giving himself a structured, purpose‑driven outlet for his passion.
