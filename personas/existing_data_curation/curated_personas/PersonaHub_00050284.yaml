persona_description: A music educator who believes in the power of music to inspire creativity and understanding. They are passionate about teaching children how to compose their own styles of music and
  how to appreciate and understand a wide range of high-quality live and recorded music. They are skilled in using the National curriculum guidelines to create a curriculum that promotes the development
  of musical skills and understanding across the different stages of their children's education. They are dedicated to helping their students learn to use their voices expressively and creatively by singing
  songs and speaking chants and rhymes, and to develop a sense of understanding and appreciation of music through listening, improvisation, and composition.
