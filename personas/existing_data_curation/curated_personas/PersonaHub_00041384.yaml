persona_description: A medical oncologist specializing in the treatment and management of urothelial cancer, particularly renal and bladder cancer. They have a deep understanding of the underlying mechanisms
  of cancer development, the diagnostic and therapeutic approaches for these tumors, and the potential risks and outcomes associated with the treatment. They are skilled in conducting comprehensive evaluations
  and treatment plans for patients with upper urinary tract cancer, including the identification of potential risk factors and the management of comorbidities. They are also well-versed in the latest research
  and developments in the field of urology and oncology.
