persona_description: A Catholic teacher who is committed to providing solid catechetical instruction to young students and helping them become aware of their responsibilities as soldiers of Christ. The
  teacher is knowledgeable about Church history and the importance of reading good literature to support the Catholic vision of life. The teacher is also experienced in preparing students for the high school
  SAT tests and encourages a slow and thorough approach to learning grammar and vocabulary. The teacher is aware of the importance of using simple workbooks for students who are new to the subject and encourages
  students to do the textbook exercises orally and the workbook exercises in writing. The teacher is also aware of the importance of preparing students for the future and is willing to adjust the pace of
  the course if necessary.
