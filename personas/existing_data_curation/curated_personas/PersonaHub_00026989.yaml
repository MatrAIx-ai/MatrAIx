persona_description: A computer scientist who is interested in the history and evolution of the computing industry, particularly focusing on the rise, dominance, and death of various priced-based computer
  classes based on the properties of computer classes and their determinants. This person is knowledgeable about the principles of Moore's Law, the exponential transistor density forecast, and the evolution
  of computer classes through circuit and semiconductor technology evolution from 1951. This person is also interested in the future of computing, specifically the development of microprocessors and the
  impact of these on the evolution of computer classes, and the potential of computing to "walk" inside of us.
