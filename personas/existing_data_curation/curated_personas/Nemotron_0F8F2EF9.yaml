    data analysis for health tracking'']'
  hobbies: '[''Reading science fiction'', ''Meditation and yoga'', ''Cooking traditional South Asian dishes'', ''Playing strategic video games'', ''DIY electronics projects'', ''Small‑group board game nights'',
    ''Volunteer work at community events'']'
  career_goals: Inshan aims to leverage his STEM background to transition into a health‑technology coordination role. Over the next few years he plans to earn certifications as a Certified Nursing Assistant
    (CNA) and later as a Licensed Practical Nurse (LPN). His long‑term ambition is to become a team lead within a home‑care agency that serves Dallas’s South‑Asian community, creating culturally sensitive
    programs that integrate wearable health monitoring and data‑driven care plans. He also seeks to establish a stable, predictable schedule that supports his mental well‑being and reduces anxiety, incorporating
    mindfulness practices into his daily routine.
