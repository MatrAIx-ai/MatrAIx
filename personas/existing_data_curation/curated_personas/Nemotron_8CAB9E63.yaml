personas:
  professional: Tung Yang is a seasoned wood‑finishing specialist with 25+ years of mastery in custom stains, water‑based eco‑coatings, and meticulous workshop organization, channeling their curiosity for
    new surface treatments and calm, independent problem‑solving into delivering high‑end, sustainably finished furniture for discerning clients.
  sports: Tung Yang follows the Cleveland Browns, Guardians, and Cavaliers with quiet enthusiasm, participates in the Cleveland Running Club’s weekly 5K jogs, and complements the routine with gentle tai
    chi sessions that keep their joints supple without the pressure of competitive sports.
  arts: Tung Yang finds artistic inspiration in the precision of Wang Xizhi’s calligraphy, the melodic depth of Yo‑Yo Ma’s cello recordings, and the narrative elegance of Haruki Murakami’s novels, often
    translating that reverence for detail into their own handcrafted wooden instruments.
  travel: Tung Yang prefers meticulously planned, low‑key trips that balance quiet nature immersion with cultural enrichment, having already explored the Redwood forests of Northern California, the historic
    gardens of Kyoto, and a recent eco‑coating symposium in Geneva, while dreaming of a future retreat in the Scottish Highlands.
  culinary: Tung Yang, an adept home chef, regularly prepares fragrant miso‑glazed salmon, hand‑rolled dumplings with garden‑grown ginger and bok choy, and a delicate persimmon‑saffron tea, savoring the
    balance of traditional flavors while meticulously plating each dish as an extension of their woodworking precision.
  core: Tung Yang blends solitary craftsmanship with an almost ritualistic obsession for flawless finishes, quietly whistling Bach while sanding, and habitually cataloguing every wood grain in a weather‑ed
    notebook.
background:
  cultural: Tung was born in Cleveland to parents who immigrated from an East Asian country—most likely China or Taiwan—bringing with them a strong work ethic, respect for craftsmanship, and a deep appreciation
    for family and community rituals. He grew up bilingual, celebrating Lunar New Year, the Moon Festival, and other cultural holidays with his extended family. These traditions instilled in him a reverence
    for meticulous hand‑work and an emphasis on harmony, both of which shape his approach to furniture finishing. While fully integrated into Midwestern life, he maintains connections to his heritage through
    language, cuisine, and participation in local Asian cultural events.
attributes:
  skills: '[''Wood finishing (spray, hand‑rub, oil, water‑based)'', ''Surface preparation (sanding, grain filling, cleaning)'', ''Custom stain and color mixing'', ''Wood species identification'', ''Chemical
    safety and ventilation compliance'', ''Equipment maintenance (spray guns, sanders, polishers)'', ''Quality inspection and finishing consistency'', ''Furniture repair and restoration'', ''Blueprint and
    design interpretation'', ''Inventory and material management'', ''Mentoring apprentices'', ''Problem solving under production pressure'', ''Time management and workflow optimization'', ''Customer communication
    and service'']'
  hobbies: '[''Small woodworking projects (birdhouses, puzzle boxes)'', ''Reading (craftsmanship histories, technical manuals, classic literature)'', ''Gardening (herbs, vegetables)'', ''Tai chi practice'',
    ''Calligraphy'', ''Cooking traditional East Asian cuisine'', ''Listening to instrumental/classical music'', ''Model building (scale models)'', ''Nature walks and birdwatching'']'
  career_goals: Tung aims to achieve the status of master finisher by obtaining advanced certifications in eco‑friendly coatings and advanced surface engineering. He plans to open a small boutique workshop
    in Cleveland that specializes in high‑end, custom‑finished furniture for discerning clients, emphasizing sustainable materials and finishes. He also hopes to mentor a new generation of finishers, documenting
    his techniques in a series of instructional videos and a modest handbook. Long‑term, he envisions collaborating with local designers to develop a signature line of unique, hand‑finished pieces that
    blend his East Asian heritage with contemporary American design.
