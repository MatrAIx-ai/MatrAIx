  hobbies: '["Abstract painting", "Digital art", "Sketching", "Hip‑hop dancing", "Contemporary dance", "Playing piano", "Speculative‑fiction book club", "Virtual‑reality art exploration", "Hiking", "3D‑printed
    jewelry design", "Girls Who Code mentorship", "Southern cooking"]'
  career_goals: Candice aims to transition from senior drafter to BIM Manager and eventually to Lead Design Engineer, focusing on sustainable and community‑centered projects. She plans to earn LEED AP certification
    and develop expertise in resilient design for affordable housing. Long‑term, she envisions founding a boutique consultancy that combines cutting‑edge technology with culturally responsive architecture,
    while establishing a mentorship pipeline for Black women entering STEM and design fields.
