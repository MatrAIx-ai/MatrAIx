personas:
  professional: Candice Harris, a senior architectural drafter proficient in AutoCAD, Revit, Rhino, and Grasshopper, blends imaginative abstract art concepts into precise BIM coordination, mentoring junior
    staff while strategically steering projects toward sustainable, community‑focused designs as they prepare for LEED AP certification and a future BIM manager role.
  sports: Candice Harris balances a love for outdoor hiking in nearby state parks with membership in the Rocky Ridge Riders mountain‑bike club and regular sessions at Elevate Climbing, while cheering for
    the Atlanta Falcons in fall football and the Atlanta Braves in spring baseball, illustrating a versatile seasonal sports enthusiasm.
  arts: Candice Harris channels their imagination into abstract painting inspired by the geometric boldness of Julie Mehretu and the street‑level wit of Banksy, practices contemporary hip‑hop dance to the
    beats of Kendrick Lamar, plays piano renditions of J.S. Bach for church gatherings, and regularly cites the speculative‑fiction works of N.K. Jemisin and the immersive VR installations of Refik Anadol
    as artistic touchstones.
  travel: Candice Harris prefers meticulously planned cultural excursions that blend art and nature, having explored the vibrant murals of Berlin, the historic jazz districts of New Orleans, and the serene
    hiking trails of Patagonia, while budgeting for occasional weekend road trips to the nearby Blue Ridge Mountains, yet they sometimes delay longer overseas journeys due to consultancy start‑up funding
    priorities.
  culinary: Candice Harris, an avid home chef, revels in preparing Southern soul‑food classics like smoked collard greens, sweet‑potato mac and cheese, and shrimp and grits seasoned with smoked paprika
    and cayenne, while also experimenting with 3D‑printed chocolate jewelry that fuses culinary art with tech, though they occasionally over‑salt dishes in pursuit of bold flavor.
  core: Candice Harris embodies a technically rigorous yet artistically free spirit, juggling BIM coordination precision with spontaneous midnight sketch sessions, a habit of collecting eclectic vinyl records,
    and an occasional tendency to procrastinate on paperwork while their imagination roams ahead.
background:
  cultural: Candice is a Black woman raised in Arlington, Tennessee, where her family’s strong ties to the church, community gatherings, and Southern hospitality shaped her values. Growing up, she was steeped
    in gospel music, storytelling, and celebrations such as Juneteenth and Kwanzaa, which fostered a deep appreciation for African‑American heritage and artistic expression. Her parents emphasized education
    and service, encouraging her to pursue a STEM degree while staying connected to cultural traditions. Today, she integrates African motifs and Southern craftsmanship into her design work, actively participates
    in local cultural organizations, mentors youth from underrepresented backgrounds, and champions greater representation of Black professionals in the built environment.
attributes:
  skills: '["AutoCAD", "Revit", "SolidWorks", "Rhino", "Grasshopper", "BIM coordination", "Construction documentation", "Technical illustration", "Python scripting for CAD automation", "Project coordination",
