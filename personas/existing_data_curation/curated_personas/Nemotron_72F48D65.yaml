    and troubleshooting minor site issues'']'
  hobbies: '[''Community gardening'', ''Reading DIY/home‑improvement books'', ''Knitting and crocheting'', ''Listening to jazz, soul, and R&B music'', ''Cooking traditional soul‑food dishes'', ''Walking
    club (small group)'', ''Neighborhood clean‑up volunteering'', ''Church choir participation'']'
  career_goals: Patrice aims to progress from a helper role to a certified journeyperson carpenter within the next three years, leveraging her practical experience and upcoming community‑college courses.
    She aspires to become a crew foreperson, overseeing small teams while maintaining her organized, methodical approach. Long‑term, she hopes to launch a modest residential maintenance and renovation business
    that serves her East Orange community, providing reliable services and mentorship opportunities for younger workers. Continuing education in construction management and sustainable building practices
    is also part of her plan.
