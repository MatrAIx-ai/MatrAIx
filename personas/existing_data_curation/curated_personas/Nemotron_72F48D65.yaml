personas:
  professional: Patrice Day is a seasoned construction support specialist who relies on OSHA‑10 certification, precise inventory management, and a methodical reading of blueprints to keep East Orange sites
    organized, while they channel a quiet curiosity into learning sustainable framing techniques as a stepping stone toward journeyperson carpentry and future crew foreperson responsibilities.
  sports: Patrice Day stays active through a twice‑weekly walking club that explores the Essex County greenways, joins community‑center pick‑up basketball games, and they root for the New York Knicks, the
    New York Giants, and the New Jersey Devils, balancing low‑key cardio with occasional competitive spirit on the court.
  arts: Patrice Day finds solace in the sounds of Miles Davis, Aretha Franklin, and H.E.R. while knitting, they contribute their voice to the church choir, and occasionally attend local art walks featuring
    emerging muralists, letting soulful R&B and jazz fuel both creative projects and weekend hobbies.
  travel: Patrice Day prefers weekend road trips that blend relaxation with cultural immersion, having explored Charleston’s historic districts, New Orleans’ music scene, and the Poconos’ hiking trails,
    while they dream of a spring visit to Savannah’s squares and a future family vacation to the Caribbean’s quiet beaches.
  culinary: Patrice Day excels at home‑cooking classic soul‑food dishes like collard greens seasoned with smoked turkey, buttery cornbread, and sweet‑potato pie, often pairing them with aromatic rosemary‑infused
    roasted carrots, while they experiment with new spice blends during quiet evenings after a day on the construction site.
  core: Patrice Day is a methodical, community‑focused builder who balances quiet curiosity with practical ambition, tackles budgets like blueprints, and they occasionally forget to schedule dentist appointments.
background:
  cultural: Patrice was raised in East Orange, NJ, a historically Black neighborhood shaped by the Great Migration and a vibrant urban culture. Her family honors African‑American traditions, including gospel
    music, soulful cooking, and strong church ties. She draws pride from the legacy of working‑class Black families who built homes and small businesses in Essex County. The community’s emphasis on mutual
    support, resilience, and collective uplift informs her values, while occasional stories of Southern roots from her grandparents add a layer of cultural richness that she celebrates through holiday meals
    and community events.
attributes:
  skills: '[''Material handling and inventory management'', ''Site organization and cleanup'', ''Basic framing and drywall assistance'', ''Operating hand and power tools safely'', ''Reading simple construction
