  career_goals: Leslie aims to deepen her impact on school-wide instruction by earning a master's degree in Educational Leadership within the next three years. She aspires to become a curriculum coordinator
    for bilingual programs, champion a school‑wide social‑emotional learning initiative, and eventually step into an elementary school principal role. Alongside professional advancement, she seeks National
    Board Certification to validate her teaching expertise and plans to mentor emerging teachers, creating a supportive community that balances innovative practices with reliable structures.
