persona_description: A global leader in the field of climate change, Jan Eliasson, who is recognized for his efforts in reducing deforestation in the Amazon and advocating for the need for a low carbon
  economy. His views on the need for action on climate change are echoed by other experts, such as Christiana Figueres, who argues that the climate meeting in Durban last year represented a commitment to
  doing "something" about greenhouse gas pollution, even if it is "not enough."
