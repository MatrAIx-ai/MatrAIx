personas:
  professional: Grabiel Elmoussa is a senior software engineer with over twenty years of experience designing scalable Python, Java, and C# back‑ends and cloud‑native microservices, and they apply a highly
    structured, test‑driven development process and a competitive, results‑oriented mindset to lead performance‑critical projects and mentor multicultural teams.
  sports: Grabiel Elmoussa participates in the San Bernardino Hikers Club, tackling well‑planned foothill trails each weekend, they follow the Los Angeles Rams and Lakers with a data‑driven enthusiasm,
    and they join casual pick‑up basketball games where their competitive edge drives both performance and occasional friction.
  arts: Grabiel Elmoussa channels creative energy into acoustic guitar sessions, frequently covering John Mayer and folk standards, they attend local live‑music shows and host strategy board‑game evenings
    featuring Terraforming Mars, Scythe, and Azul, where their meticulous planning mirrors their professional approach.
  travel: Grabiel Elmoussa prefers meticulously organized trips that balance adventure and comfort, they have recently trekked Yosemite's granite cliffs, explored the colonial charm of Cartagena, and are
    planning a future itinerary to Kyoto's temples, all while budgeting to keep family and career responsibilities intact.
  culinary: Grabiel Elmoussa delights in preparing cherished family recipes such as carnitas, hand‑rolled corn tortillas, mole poblano, and fresh salsa verde, they use IoT kitchen gadgets to monitor temperature
    and moisture, and they fine‑tune spice levels with chile de árbol and lime for authentic flavor.
  core: Grabiel Elmoussa is a structured tech veteran who blends disciplined code craft, methodical hiking, and competitive board‑gaming, while they navigate a pragmatic yet occasionally inconsistent approach
    to health and finance.
background:
  cultural: Gabriel is a first‑generation Mexican‑American who grew up in a bilingual household in Southern California. His family maintains strong traditions such as celebrating Día de los Muertos, preparing
    mole on special occasions, and weekly family gatherings centered around shared meals. He blends Mexican cultural values—family loyalty, respect for elders, and a collectivist outlook—with the entrepreneurial
    spirit of the U.S. tech sector. Active in the Eastvale Mexican community, Gabriel frequently contributes to cultural festivals, supports Spanish‑language tutoring programs, and mentors young professionals
    who navigate both cultures.
