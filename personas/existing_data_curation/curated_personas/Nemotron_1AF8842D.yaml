  career_goals: Gabriel aims to transition into a senior technical leadership role, such as Lead Engineer or Software Architecture Manager, where he can shape product strategy while mentoring junior developers.
    He plans to earn the AWS Solutions Architect Professional certification and deepen his expertise in cloud‑native microservices. Over the next five years, he envisions spearheading a cross‑functional
    team that delivers high‑impact, data‑driven solutions for underserved Hispanic communities, eventually positioning himself for a Chief Technology Officer role in a socially‑responsible tech firm.
