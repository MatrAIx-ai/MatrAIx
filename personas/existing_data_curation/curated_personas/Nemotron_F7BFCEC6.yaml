personas:
  professional: Mario Rodriguezmartinez, a 64‑year‑old retired handyman, leverages decades of automotive maintenance, carpentry, and gardening expertise to offer punctual, low‑cost home‑repair services
    to neighbors, thriving on the comfort of routine and the satisfaction of being the go‑to reliable fixer in his small New England community.
  sports: Mario Rodriguezmartinez enjoys daily walks in the local park while cheering on the Boston Red Sox and the New England Patriots on weekends, and participates in a senior walking club that meets
    thrice weekly, preferring low‑impact exercise over organized team sports.
  arts: Mario Rodriguezmartinez appreciates classic Latin rhythms, regularly listening to merengue legend Juan Luis Guerra and bachata icon Aventura on his portable radio, while also enjoying the films
    of Pedro Almodóvar and the poetry of Maya Angelou, which together shape their quiet evenings.
  travel: Mario Rodriguezmartinez prefers low‑key, meticulously planned trips, having visited the historic streets of Old San Juan and the serene beaches of Martha’s Vineyard, while dreaming of a leisurely
    cruise to the Caribbean islands of Puerto Rico and the Dominican Republic, budgeting each outing to fit a fixed retirement income.
  culinary: Mario Rodriguezmartinez is a seasoned home cook renowned for perfecting mangú with ripe plantains, sancocho simmered with yucca and beef, and pastelón layered with sweet plantains and cheese,
    often seasoning with ajíes, cilantro, and a pinch of cumin, and delights in sharing these meals at modest family gatherings.
  core: Mario Rodriguezmartinez embodies the steadfast guardian of routine, whose love for gardening, tinkering, and traditional flavors is offset by a habit of over‑checking the newspaper for any sign
    of trouble.
background:
  cultural: Mario was born to Dominican parents who immigrated to the United States, and he grew up in a tight-knit Dominican community in Worcester. His upbringing blended traditional Caribbean customs
    with the practical realities of New England life. He is a practicing Catholic, marking religious holidays and Dominican celebrations such as Independence Day with family gatherings centered on food,
    music, and dance. Bilingual in Spanish and English, Mario often serves as a cultural bridge, translating for older relatives and helping younger family members stay connected to their roots. His heritage
    informs his love for cooking, his devotion to family, and his respect for routine, all of which shape his daily life and interactions.
