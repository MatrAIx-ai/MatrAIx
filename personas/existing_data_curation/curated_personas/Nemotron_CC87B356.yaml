personas:
  professional: Julie Cochran is a diligent high‑school junior who leverages her strong organizational skills, note‑taking ability, and basic Microsoft Office proficiency to excel in science and health‑related
    projects, while using her Red Cross first‑aid certification and budding interest in nursing to lead her school's health club and mentor peers.
  sports: Julie Cochran enjoys swimming laps at the Gulf’s public beaches as part of the Gulf Coast Sea Swimmers club, follows the Miami Dolphins during football season, occasionally joins a weekend beach‑volleyball
    pick‑up at the local community center, and maintains a personal fitness routine focused on low‑impact cardio and yoga to balance her structured schedule.
  arts: Julie Cochran immerses herself in contemporary YA mysteries by authors such as Sarah J. Maas and John Green, curates an Instagram feed of beach photography inspired by Ansel Adams’ composition and
    Annie Leibovitz’s portrait style, and relaxes to indie‑folk playlists featuring artists like Lorde and Phoebe Bridgers while sketching story ideas in her journal.
  travel: Julie Cochran plans trips with a blend of careful budgeting and spontaneous day‑trips, having explored the Florida Keys and the Everglades National Park during school breaks, while dreaming of
    a future summer backpacking adventure through the coastal towns of Croatia’s Dalmatian coast.
  culinary: Julie Cochran enjoys baking classic chocolate‑chip cookies and whipping up simple herb‑infused meals like lemon‑rosemary grilled chicken, drawing fresh basil, thyme, and mint from her backyard
    garden, while experimenting with quick TikTok‑style snack hacks that often end in a slightly over‑cooked batch she laughs about.
  core: Julie Cochran is a structured, quietly ambitious teen who balances school, nursing aspirations, coastal photography, and methodical budgeting, all while nurturing a penchant for baking and a love
    of mystery novels.
background:
  cultural: 'Julie was raised in Lynn Haven, a modest coastal town in Bay County, Florida. Her family reflects typical Southern‑Florida values: close‑knit community ties, regular church attendance, and
    a strong appreciation for the Gulf’s beach and fishing culture. Family gatherings often revolve around Sunday barbecues, holiday meals, and local seafood dishes. Growing up near the Gulf has instilled
    an awareness of marine environments and seasonal hurricane preparedness. While identifying as white American, she is influenced by the region’s blend of Southern hospitality, coastal lifestyle, and
    community‑oriented traditions.'
