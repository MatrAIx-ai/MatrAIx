  career_goals: Julie aims to graduate high school with a strong GPA and enroll in a community‑college nursing program, eventually becoming a registered nurse at a Bay County hospital. She values a career
    that offers clear structure, reliable income, and the ability to help others, aligning with her practical and compassionate nature. While pursuing nursing, she hopes to volunteer with local marine‑conservation
    groups to stay connected to her coastal roots and may consider a future specialization in emergency or pediatric nursing.
