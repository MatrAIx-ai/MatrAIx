  hobbies: '[''building block towers'', ''reading picture books'', ''outdoor exploration'', ''drawing with crayons'', ''singing nursery rhymes'', ''watching cartoons'', ''simple wooden puzzles'']'
  career_goals: Even at two years old, Kenneth often talks about becoming a "helper" when he grows up. He is fascinated by fire trucks and construction sites, expressing a wish to be a firefighter or a
    builder who makes things for people. He also enjoys helping his parents with small chores, showing an early ambition to be useful and to contribute to his family and community.
