  hobbies: '["Coffee Shop Exploration", "Cascadian Hiking", "Southeast Asian Cooking", "Tech Meet‑ups", "Indie Film Watching", "Hackathon Attendance", "Guided Meditation", "Journaling", "Community Mentorship",
    "Board Game Nights"]'
  career_goals: Blong aims to transform his mid‑size tech firm into an international player focused on sustainable solutions, positioning the company as a benchmark for inclusive leadership in the Pacific
    Northwest. He wants to launch an accelerator program that supports Southeast Asian entrepreneurs in the U.S., leveraging his heritage network. Over the next five years, he aspires to a seat on the board
    of a major industry association, publish thought pieces on flexible organizational design, and achieve a healthier work‑life balance that reduces his anxiety through structured mindfulness practices
    and delegating routine tasks.
