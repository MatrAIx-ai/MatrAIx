personas:
  professional: Mary Raedel, an experienced volunteer coordinator and practical DIY home caretaker, blends their gardening expertise, sewing skills, and modest tech savviness to lead small community projects,
    applying their curiosity for new horticultural methods while staying grounded in proven, hands‑on solutions.
  sports: Mary Raedel enjoys daily morning walks around their neighborhood and attends Iowa Hawkeyes football games each fall, occasionally joining the local senior softball league in spring and cheering
    on the Quad Cities River Bandits during the summer baseball season, preferring low‑key, community‑oriented fitness activities over rigorous workouts.
  arts: Mary Raedel spends afternoons immersed in historical fiction by Philippa Gregory and Ken Follett, while knitting scarves to the soft strains of Johnny Cash and admiring Grant Wood’s American Gothic
    in the local museum, and they delight in quilting circles that play folk tunes by The Carter Family, cementing their love for timeless Midwestern artistry.
  travel: Mary Raedel favors relaxed road trips that blend heritage and comfort, such as annual visits to the Iowa State Fair, weekend getaways to Door County’s lakeside cottages, and occasional pilgrimages
    to the historic town of Nauvoo, Illinois, planning loosely around their garden schedule and the school calendar of their grandchildren.
  culinary: Mary Raedel, a seasoned Midwestern cook, expertly prepares chicken pot pie, apple crisp, and corn casserole using fresh garden vegetables like heirloom tomatoes and sweet corn, and they delight
    in improvising with pantry staples to create hearty meals such as pork chop with onion gravy and rhubarb crumble.
  core: Mary Raedel balances an innate curiosity for new gardening techniques with a practical, often disorganized daily routine, habitually misplacing their reading glasses while still leading community
    projects and baking pies for neighbors.
background:
  cultural: Mary is a lifelong resident of Davenport, Iowa, raised in a white, Protestant Midwestern farming community. Her upbringing emphasized self‑reliance, practicality, and strong family and community
    ties. She values local traditions such as the Iowa State Fair, church potlucks, and neighborhood volunteerism. Her cultural perspective blends respect for established methods with a quiet curiosity
    about new ideas, reflecting the balance of tradition and openness common in her region.
attributes:
  skills: '[''Home cooking (Midwestern cuisine)'', ''Gardening (native plants, sustainable practices)'', ''Hand sewing and quilting'', ''Knitting'', ''Basic computer literacy (email, video calls, online
