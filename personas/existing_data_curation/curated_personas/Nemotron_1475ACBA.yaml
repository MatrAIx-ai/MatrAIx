  hobbies: '[''Gardening (raised‑bed, native plants)'', ''Reading (historical fiction, memoirs)'', ''Knitting'', ''Quilting'', ''Birdwatching'', ''Crossword puzzles'', ''Baking pies'', ''Small church socials'',
    ''Genealogy research'']'
  career_goals: In retirement, Mary seeks to deepen her horticultural knowledge through extension courses and expand her garden into a community plot that welcomes neighbors. She aims to compile her family’s
    recipes and stories into a modest memoir that preserves her heritage. Mary also wishes to mentor younger volunteers at the senior center, stay physically active with daily walks, maintain her independence
    by keeping her home comfortably organized for small gatherings, and continue nurturing close relationships with her grandchildren and extended family.
