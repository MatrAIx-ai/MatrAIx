personas:
  professional: Harriet Hansen is a senior architectural drafter who blends deep knowledge of AutoCAD, Revit, and Civil 3D with a love of colonial architecture, applying both meticulous code compliance
    and a practical, curiosity‑driven improvisation that helps them mentor junior drafters while they battle a habit of leaving files unsorted until the last minute.
  sports: Harriet Hansen is a low‑key fitness fan who hikes the Powhatan Trail, participates in the Shenandoah Trail Club’s monthly walks, cheers on the Washington Commanders and the Richmond Flying Squirrels,
    and plays casual pickleball at the community center when time permits.
  arts: Harriet Hansen finds creative release in pottery at the Rivanna Clay Studio, collects folk‑Americana records from The Avett Brothers, Gillian Welch, and Johnny Cash, enjoys the occasional Virginia
    Museum of Fine Arts exhibit, and unwinds with low‑key board game nights featuring Catan and Carcassonne.
  travel: Harriet Hansen prefers self‑planned, low‑stress trips, having explored Colonial Williamsburg and the Blue Ridge Parkway on weekend getaways, dreaming of a summer pilgrimage to the Cotswolds and
    Germany’s Black Forest, while balancing travel costs with a modest travel fund and limited vacation days.
  culinary: Harriet Hansen cooks with a modest but confident skill set, frequently preparing shrimp and grits, heirloom tomato salad with basil‑pesto vinaigrette, and sourdough rye for small gatherings,
    favoring locally sourced rosemary, thyme, and seasonal vegetables, and occasionally experimenting with Korean bibimbap after watching a cooking vlog.
  core: Harriet Hansen is a detail‑obsessed, quiet architect who channels a love of historic preservation into a steady career, yet grapples with chronic worry, occasional disorganization, and a penchant
    for solo hobbies that soothe their restless mind.
background:
  cultural: Harriet grew up in a middle‑class, white American family in the suburban environs of Henrico, Virginia. Her ancestry traces back to English and German settlers who have lived in the Mid‑Atlantic
    region for generations. The local culture of Henrico blends a respect for historic preservation—evident in nearby colonial sites—with a laid‑back Southern hospitality that values community, family,
    and modest celebrations. She was raised with a strong work ethic, an appreciation for practical skills, and an emphasis on modest, reliable living. While her community is largely rooted in Protestant
    traditions, Harriet's personal identity is shaped more by the regional love of historic architecture, outdoor recreation, and a quiet, introspective lifestyle that aligns with her reserved personality.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Civil 3D'', ''SketchUp'', ''Bluebeam Revu'', ''Building Code Interpretation'', ''Construction Documentation'', ''Site Layout and Utility Design'', ''BIM Coordination'',
    ''Manual Sketching'']'
  hobbies: '[''Reading architectural history'', ''Gardening'', ''Hiking'', ''Sketching buildings'', ''DIY home improvement'', ''Pottery'', ''Cooking'', ''Small-group board games'', ''Visiting historic sites'',
    ''Listening to folk music'']'
  career_goals: Harriet aims to progress from senior drafter to lead drafting coordinator, overseeing a small team of drafters while maintaining a flexible schedule that accommodates her preference for
    autonomy. She plans to obtain a LEED Accredited Professional certification to deepen her expertise in sustainable design and to position herself as a resource for green building projects. Recognizing
    her desire for practical growth without formal college coursework, she intends to pursue targeted associate‑level courses in Building Information Modeling and project management. Long‑term, she envisions
    mentoring junior drafters, streamlining workflow processes to reduce stress, and possibly transitioning into a part‑time freelance role that offers greater control over deadlines and work‑life balance.
