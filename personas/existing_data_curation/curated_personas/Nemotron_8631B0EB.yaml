personas:
  professional: A veteran secondary mathematics and physics teacher, Amilcar Manso leverages meticulous lesson planning, data‑driven assessment, and bilingual communication to weave art, music and family
    traditions into STEM curricula, while channeling their disciplined, curious nature into a drive for district‑wide leadership.
  sports: A disciplined morning runner, Amilcar Manso joins the Fort Lauderdale Beach Walkers club, follows the Miami Dolphins and Miami Heat, and incorporates weekly beach jogs and occasional community
    soccer games into a fitness routine that balances endurance with social interaction.
  arts: Amilcar Manso cultivates a vibrant creative life, painting acrylic urban landscapes inspired by the bold colors of folk art, collecting recordings of iconic Latin musicians like Violeta Parra and
    Celia Cruz, and frequenting local galleries and the Museum of Discovery and Science where they sketch observations, all while dancing salsa nights with their spouse.
  travel: Amilcar Manso plans travel around school breaks, favoring culturally immersive trips such as a historical tour of Antigua, a coffee‑farm stay in Costa Rica, and a weekend getaway to the Florida
    Keys, while dreaming of a future trek to Machu Picchu, balancing adventure with family budget constraints.
  culinary: Amilcar Manso enjoys cooking at home, mastering the art of handmade pupusas filled with cheese and loroco, preparing flavorful fish tacos with fresh lime and cilantro, and savoring a robust
    café con leche, reflecting a moderate cooking skill level paired with a deep appreciation for traditional family recipes.
  core: A curious, organized educator who blends science with art and family traditions, Amilcar Manso is known for turning every lesson into a cultural experiment, yet they habitually over‑schedule their
    week and never turn down a fresh tube of paint.
background:
  cultural: Born in San Salvador and having immigrated to the United States as a teenager, Amilcar maintains a deep connection to his Salvadoran roots while fully engaging with his Floridian community.
    He grew up speaking Spanish at home and continues to use both Spanish and English, serving as a cultural bridge for his bilingual students and their families. Family and community are central to his
    identity; he participates in traditional celebrations such as Día de los Niños and the annual Salvadoran Festival in Fort Lauderdale, where he shares homemade pupusas and stories of his homeland. His
    upbringing during the latter years of El Salvador’s civil conflict instilled a respect for resilience and collective effort, values that now shape his teaching philosophy and community service. By integrating
    Salvadoran cultural references into science lessons—such as using Central American volcanic activity as case studies—he honors his heritage while enriching his students' learning experience.
