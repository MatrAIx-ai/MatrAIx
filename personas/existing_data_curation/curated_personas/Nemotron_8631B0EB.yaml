  career_goals: Amilcar aims to advance into a district‑wide leadership role such as STEM department chair or curriculum specialist, where he can apply his high‑standards, organized approach across multiple
    grade levels. He plans to enroll in a master's program in Educational Leadership to deepen his administrative skills. Concurrently, he is developing a grant‑driven STEAM initiative that weaves visual
    arts and music into science classes, hoping to create a model for other Broward County schools. He also seeks to mentor a cohort of new teachers, especially those from immigrant backgrounds, and to
    author a bilingual curriculum guide that incorporates Salvadoran cultural perspectives into science education. Long‑term, he envisions serving as a consultant for community organizations to expand STEM
    outreach among underrepresented youth.
