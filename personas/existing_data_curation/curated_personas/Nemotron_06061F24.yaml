  career_goals: In the short term, Priscilla aims to maintain top grades, secure leadership positions in her high school’s student government, and earn a scholarship for a STEM‑focused summer program. She
    envisions attending a university that offers a strong public‑health or nursing program, where she can combine her interest in science with her desire to help underserved communities. Long‑term, she
    hopes to become a pediatric nurse or public‑health advocate dedicated to improving health outcomes in the Mississippi Delta, and eventually launch a youth mentorship nonprofit that provides academic
    support and wellness resources to middle‑school students in Jackson.
