personas:
  professional: Priscilla Hyman, an aspiring performer, channels their love for choir and drama into a disciplined routine, balancing creative expression with meticulous rehearsal schedules, and uses their
    natural charisma to lead school productions while maintaining high academic standards.
  sports: Priscilla Hyman competes on their high school's varsity basketball team, practices with the local youth club Greenfield Hoops, follows the Atlanta Hawks for inspiration, and balances strength
    training with a love for weekend pickup games at the community park, channeling their competitive spirit into teamwork.
  arts: Priscilla Hyman expresses themselves through poetry, short films on TikTok, and stage performances, draws inspiration from performers like Lin-Manuel Miranda, Ariana Grande, and filmmaker Greta
    Gerwig, and curates a personal playlist that blends contemporary pop with classic Broadway numbers.
  travel: Priscilla Hyman dreams of weekend trips to the Great Smoky Mountains for hiking, plans a cultural visit to New Orleans to explore historic music venues, and uses a family-friendly budgeting app
    to balance school responsibilities, travel costs, and savings, while their curiosity pushes them to map out each itinerary in detail.
  culinary: Priscilla Hyman loves cooking Southern comfort dishes such as fried chicken, collard greens, and buttermilk biscuits with their family, enjoys experimenting with spices like smoked paprika and
    cayenne, and frequently shares recipe videos on YouTube, often adding a pinch of humor to their cooking tutorials.
  core: Priscilla Hyman is a charismatic, hyper-organized teen who thrives on creative spotlight, meticulous planning, and community service, yet occasionally procrastinates on homework to binge-watch TikTok
    trends, revealing a playful tension between discipline and spontaneity.
background:
  cultural: Priscilla was raised in a close‑knit African American family in Jackson, Mississippi, where church, extended family gatherings, and community events are central to daily life. She grew up listening
    to gospel, blues, and contemporary hip‑hop, and she takes pride in the civil‑rights history of her city, often visiting the Mississippi Civil Rights Museum with her parents. Family traditions of Southern
    hospitality, storytelling, and home‑cooked meals have shaped her values of resilience, service, and pride in her heritage. Her involvement in local youth programs and church groups reinforces a strong
    sense of community responsibility and cultural identity.
