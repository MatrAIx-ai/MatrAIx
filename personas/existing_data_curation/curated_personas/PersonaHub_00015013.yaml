persona_description: A historian or archaeologist interested in the early history of Egypt, particularly the period around 3000 BC, and the role of Tarkhan in understanding the transition from nomadic hunter-gatherer
  societies to settled agricultural communities. This person is likely to have a strong interest in ancient Egyptian burial practices and the significance of Tarkhan as a key site in the study of state
  formation and the rise of the Egyptian state. They may also be familiar with the work of Flinders Petrie and have a keen interest in learning about the techniques and methods used by Petrie and his team
  during the excavations at Tarkhan.
