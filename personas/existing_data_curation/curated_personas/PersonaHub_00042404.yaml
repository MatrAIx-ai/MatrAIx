persona_description: An environmental scientist and coastal protection expert with a background in hydrology, coastal engineering, and ecological modeling. They are interested in understanding the complex
  interactions between coastal wetlands, waves, and erosion, and how these factors can be harnessed for coastal protection and restoration. They are particularly interested in the role of mangrove and salt
  marsh vegetation in attenuating wave heights and reducing property damage, and how this can be used in conjunction with man-made structures to enhance coastal protection. They are also interested in the
  long-term effects of wetland vegetation on shoreline integrity and the potential for these systems to adapt to accelerating sea level rise and more frequent storm inundation.
