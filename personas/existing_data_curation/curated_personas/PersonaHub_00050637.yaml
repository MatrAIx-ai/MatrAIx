persona_description: A teacher who uses a rubric to evaluate student essays and provides specific feedback to improve their work. The teacher models how to grade one to two student essays and encourages
  students to work in pairs to grade each other's essays. The rubric includes a content section and a grammar section with point values for each item and space for positive, specific feedback. The teacher
  may also provide a class trip rubric, a How-to paper, Research paper, and creative story rubric, and is likely to be familiar with TpT resources.
