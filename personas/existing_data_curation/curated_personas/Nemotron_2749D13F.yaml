personas:
  professional: Timothy Hull is a high‑school junior who is already carving out a niche as an aspiring indie game storyteller, blending watercolor sketching, narrative journaling, and beginner‑level Python
    scripting to prototype visual story prompts for their own science‑fiction game concepts, and they often stay up late perfecting pixel art.
  sports: Timothy Hull is a solitary outdoor enthusiast who joins the Montrose High cross‑country team for occasional trail runs, spends weekends snowboarding at the nearby ski resort, follows the Colorado
    Avalanche for professional inspiration, and they prefer solo hikes over team practices.
  arts: Timothy Hull is a budding visual storyteller who fills sketchbooks with San Juan Mountain watercolors, draws inspiration from ambient musicians like Tycho and experimental electronic producer Aphex
    Twin, watches indie sci‑fi films such as ‘Annihilation’ and works by director Alex Garland to fuel their narrative craft, and they often replay favorite soundtracks while sketching.
  travel: Timothy Hull is an adventurous yet budget‑conscious teen who hikes the Maroon Bells each summer, dreams of backpacking Iceland’s volcanoes, plans a future road trip along historic Route 66 to
    experience America’s varied landscapes, and they keep a weathered map of the Rockies on their bedroom wall as a reminder of places yet to explore.
  culinary: Timothy Hull is a modest home cook who prefers simple meals like grilled trout with rosemary, makes hearty oatmeal topped with dried apricots and goat cheese crumbles, indulges in occasional
    fast‑food pizza after late‑night gaming sessions, and they occasionally experiment with dehydrating wild berries found on hikes.
  core: Timothy Hull is a solitary dreamer who channels mountain solitude into watercolor art and code, but they procrastinate on schoolwork and battle perpetual worry.
background:
  cultural: Timothy grew up in Montrose, Colorado, a small city nestled between the Colorado River and the San Juan Mountains. His upbringing reflects a mix of typical Western U.S. middle‑class values and
    the region’s outdoor, nature‑focused culture. He has been exposed to local community events, high school sports culture, and the rugged lifestyle of nearby ranches and ski resorts, while also consuming
    mainstream American media—especially science‑fiction literature, indie video games, and digital art communities online. This blend of rural Colorado sensibilities and global internet culture shapes
    his worldview, fostering a strong appreciation for natural landscapes, self‑reliance, and the evolving digital creative scene.
attributes:
  skills: '[''Sketching'', ''Digital illustration (Procreate, Photoshop)'', ''Watercolor painting'', ''Creative writing (short fiction, poetry)'', ''Basic Python coding (creative scripts)'', ''Improvisational
