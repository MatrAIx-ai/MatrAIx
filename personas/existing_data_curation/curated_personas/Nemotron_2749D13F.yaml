  hobbies: '[''Sketching'', ''Watercolor painting'', ''Creative writing (short stories, poetry)'', ''Listening to ambient/electronic music'', ''Playing narrative indie video games'', ''Hiking solo in the
    San Juan Mountains'', ''Watching independent sci‑fi films'', ''Journaling'', ''Experimenting with digital art tools (Procreate, Photoshop)'', ''Simple Python coding projects (visual algorithms)'']'
  career_goals: Timothy aspires to become a freelance concept artist and speculative fiction writer, creating visual and narrative worlds for indie video games or independent film projects. He dreams of
    building a robust online portfolio that showcases his eclectic art style, eventually earning commissions that allow him to work from anywhere. Although he worries about academic pathways, he hopes to
    attend a specialized art or design school after completing a GED, leveraging scholarships for talented young artists. In the long term, he envisions publishing a collection of his own illustrated stories,
    blending his love for visual art and storytelling while maintaining a flexible, solitary work environment that minimizes stress.
