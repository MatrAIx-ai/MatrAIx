personas:
  professional: Benjamin Lindsey, a veteran correctional security officer nearing his 30‑year mark, blends rigorous protocol mastery, crisis‑negotiation acumen, and a curiosity for restorative‑justice to
    mentor staff and champion an art‑focused inmate rehabilitation pilot, yet their competitive drive keeps them restless for the upcoming shift‑supervisor promotion.
  sports: Benjamin Lindsey enjoys early‑morning fishing on the Alabama River with the Selma Anglers Club, hikes the Little River State Park trails, and they follow the Alabama Crimson Tide football and
    Birmingham Barons baseball, occasionally joining a local pick‑up basketball game at the community center.
  arts: Benjamin Lindsey channels their love of the Southern landscape into oil and watercolor paintings of rolling hills, captures historic civil‑rights sites through black‑and‑white photography, and they
    find solace in playing blues standards by B.B. King, Muddy Waters, and John Lee Hooker at local jam sessions, while volunteering to lead youth art workshops.
  travel: Benjamin Lindsey plans road‑trip itineraries that combine civil‑rights history tours of Selma and Montgomery with weekend getaways to New Orleans for jazz and blues, and they dream of photographing
    the misty Mississippi Delta, all while balancing a modest travel budget and family responsibilities.
  culinary: Benjamin Lindsey excels at cooking Southern comfort fare such as fried catfish, collard greens seasoned with smoked paprika, and peach cobbler, enjoys experimenting with grits flavored by cheddar
    and jalapeño, and they often host potluck dinners after art workshops, although they admit to occasionally over‑seasoning dishes.
  core: Benjamin Lindsey is a disciplined, art‑obsessed corrections veteran who wrestles with chronic worry, competitive ambition, and a healthy dose of skepticism, yet they find balance through painting,
    music, and community service.
background:
  cultural: Benjamin was born and raised in rural Perry County, Alabama, and has been shaped by the deep‑rooted Southern traditions of hospitality, strong family ties, and regular church attendance (Methodist).
    Growing up in the shadow of Selma's civil‑rights history, he developed a nuanced awareness of the region's complex social fabric. Family gatherings centered on storytelling, gospel and blues music,
    and Southern cooking fostered his love for art and community. While identifying as white, he respects the multicultural heritage of Selma and frequently participates in local heritage festivals, historical
    tours, and community service projects, which reinforce his sense of duty and his belief that art can bridge cultural divides.
attributes:
  skills: '[''Inmate Supervision & Classification'', ''Crisis Negotiation & De‑escalation'', ''Firearms & Defensive Tactics'', ''Surveillance & CCTV Monitoring'', ''Incident Reporting & Documentation'',
    ''Policy Enforcement & Compliance'', ''Staff Training & Mentorship'', ''Emergency Response Planning'', ''Restorative Justice Practices'', ''Mental Health First Aid'']'
  hobbies: '[''Painting (oil & watercolor)'', ''Photography of historic sites'', ''Blues guitar playing'', ''Reading Southern history & philosophy'', ''Cooking Southern cuisine'', ''Genealogy research'',
    ''Fishing on the Alabama River'', ''Visiting civil‑rights museums & landmarks'', ''Community volunteering (youth art workshops)'', ''Hiking and birdwatching in nearby state parks'']'
  career_goals: Benjamin aims to be promoted to shift supervisor within the next two years, followed by a role as a training officer where he can design and lead a correctional education program that incorporates
    art‑based rehabilitation. He plans to spearhead a pilot restorative‑justice project and forge a partnership with local nonprofits to provide community‑based re‑entry support for inmates. In the long
    term, he envisions moving into private‑sector corrections consulting or a state‑level policy advisory position, using his innovative approach to improve inmate outcomes. Completing his associate degree
    in criminal justice is also a key personal milestone.
