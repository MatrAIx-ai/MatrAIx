persona_description: A futurist and climate change expert who is interested in the potential for a national revenue neutral carbon tax to be implemented. They are knowledgeable about the history of carbon
  regulation in the United States, including previous attempts at legislation and the current status of the EPA's proposed rules for new power plants. They are also familiar with the current state of U.S.
  GHG emissions and the factors that have contributed to the reduction in emissions in recent years. They are likely to be interested in the potential for a national carbon tax to be implemented and the
  implications of such a tax on the economy and the environment.
