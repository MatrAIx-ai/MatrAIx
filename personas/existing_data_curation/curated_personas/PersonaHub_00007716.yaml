persona_description: Alfred Moore Scales was a prominent figure in North Carolina politics, serving as a Governor, solicitor, and member of the U.S. House of Representatives. He was known for his efforts
  to foster reconciliation among former Confederates and Republicans, and his focus on repairs and improvements of existing programs, including schools, roads, and the Department of Agriculture. Scales
  was a lawyer, judge, and politician who served in various capacities throughout his career.
