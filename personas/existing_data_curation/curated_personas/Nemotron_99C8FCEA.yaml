personas:
  professional: Hau Guo is a budding UX/UI designer who leverages his expertise in Adobe Creative Suite, front‑end prototyping, and water‑color sketching to translate abstract concepts into intuitive digital
    experiences, while his methodical planning and collaborative, harmony‑focused mindset make him a reliable team player.
  sports: Hau Guo is a casual beach‑volleyball enthusiast who joins a Saturday morning league at Manhattan Beach, follows the LA Lakers and LA Dodgers for community spirit, and hikes the Santa Monica Mountains
    several times a month to keep a steady cardio baseline without the pressure of competitive training.
  arts: Hau Guo immerses himself in contemporary art by frequenting LACMA and The Broad, admires the immersive installations of James Turrell and the playful motifs of Yayoi Kusama, and channels those inspirations
    into his own watercolor abstractions and acoustic guitar compositions that blend folk storytelling with experimental soundscapes.
  travel: Hau Guo plans trips with the precision of a project timeline, often opting for weekend road trips along the Pacific Coast Highway to explore coastal towns like Santa Barbara, while dreaming of
    a semester‑long immersion in Kyoto’s street art scene and a future workshop in Reykjavik to study northern‑light photography.
  culinary: Hau Guo enjoys cooking traditional mooncakes for the Mid‑Autumn celebration and mastering mapo tofu, yet he frequently experiments with fusion dishes like sesame‑glazed salmon tacos and avocado‑scented
    ramen, showcasing a moderate skill level that balances reverence for family recipes with adventurous flavor pairings.
  core: Hau Guo blends meticulous planning with vivid imagination, turning cultural rituals, watercolor dreams, and code prototypes into inclusive design experiences, all while juggling a spreadsheet‑driven
    finances, a love for spontaneous volleyball games, and a habit of late‑night photography walks that sometimes keep them up past bedtime.
background:
  cultural: Hau Guo is a second‑generation Chinese‑American raised in Norwalk, California. His parents immigrated from Guangdong Province in the early 1990s, bringing Mandarin Chinese as the household language
    and traditions such as Lunar New Year celebrations, moon‑cake making, and calligraphy practice. Growing up in a diverse Los Angeles County community, he was exposed to both East Asian visual aesthetics—ink
    painting, symbolic motifs—and contemporary American pop culture. This bicultural environment fostered a respect for community harmony, an emphasis on diligent study, and an appreciation for blending
    heritage with modern innovation. Hau’s cultural upbringing informs his artistic sensibilities, collaborative style, and his desire to create inclusive, cross‑cultural experiences.
attributes:
  skills: '[''Digital illustration'', ''Graphic design'', ''Visual storytelling'', ''Research and synthesis'', ''Creative writing'', ''Front‑end web development'', ''Photography'', ''Project planning and
