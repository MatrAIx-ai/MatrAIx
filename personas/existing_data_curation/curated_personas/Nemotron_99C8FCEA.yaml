  hobbies: '[''Sketching and watercolor painting'', ''Reading speculative fiction and philosophy'', ''Visiting art galleries and museums'', ''Playing acoustic guitar'', ''Street and night photography'',
    ''Cooking Chinese and fusion cuisine'', ''Practicing calligraphy'', ''Hiking in nature'', ''Attending maker meet‑ups and hackathons'']'
  career_goals: Hau aims to secure an entry‑level role in UX/UI design or concept art within a technology or media company in the Los Angeles area. Over the next two years he plans to complete a bachelor’s
    degree in Visual Communication or Human‑Computer Interaction while building a professional portfolio that showcases his blend of artistic vision and user‑centered design. He aspires to launch a freelance
    practice that creates culturally inclusive digital experiences and eventually lead a multidisciplinary creative team that produces interactive installations and community‑focused art projects. Hau also
    hopes to mentor other emerging Asian‑American creators and contribute to public art initiatives that celebrate cross‑cultural dialogue.
