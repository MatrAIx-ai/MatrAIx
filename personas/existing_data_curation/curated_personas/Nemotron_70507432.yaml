  career_goals: He dreams of becoming a pediatrician or a community health worker, combining his love for science with a desire to help others stay healthy. He also imagines working as a teacher or youth
    coach, where he can nurture teamwork and compassion in younger students. Over the next few years, he aims to join his school's science club, volunteer at the local children's hospital, and earn a badge
    in first aid, all steps toward a career that blends practical problem-solving with service.
