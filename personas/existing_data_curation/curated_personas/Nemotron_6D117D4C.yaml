  career_goals: Jose Omar aims to turn his love of order, structure, and practical problem solving into a career in aerospace or mechanical engineering. He dreams of designing aircraft or spacecraft that
    can operate efficiently in the desert environment surrounding Tucson. He also considers a future as a pilot in the Air Force, attracted by the regimented lifestyle and competitive training. In the short
    term, he plans to develop advanced coding projects, earn certifications in robotics, and compete in state-level science fairs, building a solid portfolio for college admission.
