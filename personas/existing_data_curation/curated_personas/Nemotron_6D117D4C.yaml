personas:
  professional: Jose Gonzalez is a methodical junior programmer who channels their strategic love for online chess and timed puzzle tournaments into Python scripts that organize school notes, and they apply
    their organized, solitary work style to every problem.
  sports: Jose Gonzalez rides their bike alone through the Tucson desert, follows the Arizona Diamondbacks baseball team, and they engage with the Tucson Chess Club's weekend tournaments, preferring solo
    endurance activities over team sports.
  arts: Jose Gonzalez finds creative inspiration in the cinematic scores of Hans Zimmer and the futuristic concept art of Syd Mead, often listening to their music while meticulously assembling LEGO models,
    merging visual and auditory cues into a solitary artistic practice they cherish.
  travel: Jose Gonzalez prefers meticulously planned short trips with family, having explored the Grand Canyon, Sedona's red rocks, and the historic town of Tubac, while they dream of a future visit to
    the Kennedy Space Center to see rockets up close, balancing their love of quiet desert rides with a curiosity for space-related travel.
  culinary: Jose Gonzalez enjoys whipping up their favorite cheesy macaroni with a dash of smoked paprika, perfecting a homemade pepperoni pizza using flour, yeast, and fresh mozzarella, and blending mango-lime
    smoothies, showing a budding yet methodical cook who follows recipes to the letter, and they occasionally burn toast when distracted.
  core: Jose Gonzalez is a solitary, methodical twelve-year-old who turns strategic puzzles into code, LEGO, and quiet desert rides, quietly competing with themselves while they keep a tidy ledger of allowances.
background:
  cultural: Jose Omar is a first-generation Mexican-American growing up in Tucson, Arizona. At home, Spanish is spoken alongside English, and he celebrates Mexican traditions such as Día de los Muertos,
    Las Posadas, and family gatherings featuring tamales, tacos, and atole. His family attends a local Catholic church, and he participates in community events that blend Mexican heritage with Southwest
    U.S. culture. The desert landscape, proximity to the U.S.–Mexico border, and the vibrant bicultural community deeply influence his worldview, fostering a respect for both his Mexican roots and his American
    environment.
