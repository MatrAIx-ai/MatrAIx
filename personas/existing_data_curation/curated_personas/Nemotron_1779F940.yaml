  hobbies: '[''Pickup basketball'', ''Improv comedy'', ''Playing guitar'', ''Streaming multiplayer video games'', ''Cooking Southern‑fusion recipes'', ''Hiking'', ''Volunteering at food banks'', ''Attending
    indie/alternative concerts'', ''Traveling to music festivals'', ''Social media content creation'']'
  career_goals: Joshua aims to complete his associate’s degree in communications or business and secure an internship in event management or digital marketing. He envisions a career that blends his curiosity
    for new media trends with a practical, stable income—ideally as a community outreach coordinator for a non‑profit or a marketing coordinator at a growing tech startup. Long‑term, he hopes to launch
    his own boutique event‑planning firm that focuses on local festivals and community gatherings, leveraging his network and love for group activities.
