personas:
  professional: Robert Frost, a 36‑year‑old sales representative with a flair for consultative selling and CRM analytics, harnesses his natural curiosity and practical mindset to build trust with clients
    while they sometimes wrestle with disorganized schedules and missed deadlines, all in pursuit of a regional sales manager role and a future consulting venture for Southern small businesses.
  sports: Robert Frost, an avid fan of the Alabama Crimson Tide football team and the Atlanta Braves, competes in a modest community basketball league at the Montgomery Recreation Center and they maintain
    a flexible fitness routine that blends winter pickup games with occasional weekend jogs along the Alabama River.
  arts: Robert Frost, who finds comfort in the soulful strains of B.B. King and the improvisational brilliance of Miles Davis, frequents live blues and jazz sessions at the historic Montgomery Theater and
    they curate a personal vinyl collection while dabbling on a harmonica during solo evenings.
  travel: Robert Frost delights in impromptu weekend road trips, often charting routes on his phone to explore historic civil‑rights sites like the Selma National Historic Landmark, the National Mall’s
    Martin Luther King Jr. Memorial, and the vibrant streets of New Orleans’ French Quarter, balancing a modest travel budget with a thirst for Southern heritage.
  culinary: Robert Frost, a self‑taught Southern‑style cook, loves perfecting dishes such as shrimp and grits, collard greens spiced with smoked paprika, and sweet‑potato pie, and they oscillate between
    meticulous seasoning and accidental kitchen mishaps when a new chess puzzle steals their attention.
  core: Robert Frost is a curious, pragmatic sales professional who juggles spontaneous road trips, blues jam sessions, and a habit of disorganized spreadsheets while they dream of leading a sales team
    and mentoring under‑represented entrepreneurs.
background:
  cultural: Robert grew up in Montgomery’s historic African‑American community, surrounded by the legacy of the civil‑rights movement. Family gatherings and the local church have instilled a strong sense
    of community, respect for elders, and the value of perseverance. He carries the rhythms of Southern blues and gospel music, which influence his taste in entertainment and his relaxed, yet resilient
    demeanor. His upbringing in a predominantly Black neighborhood has shaped his awareness of racial and socioeconomic dynamics in the South, informing his desire to uplift local businesses and mentor
    the next generation. While he embraces contemporary culture, he also honors traditions such as Juneteenth celebrations and Southern hospitality, creating a cultural identity that blends historical pride
    with modern ambition.
attributes:
  skills: '["Customer Relationship Management (CRM) software (e.g., Salesforce)", "Consultative selling", "Negotiation and persuasion", "Effective communication and active listening", "Problem solving for
