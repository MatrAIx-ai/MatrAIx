  hobbies: '["Reading business and self‑improvement books", "Listening to blues and jazz music", "Playing chess", "Experimenting with Southern cooking", "Weekend road trips to historic sites", "Participating
    in a community basketball league", "Mentoring youth in entrepreneurship", "Exploring new podcasts on sales and technology", "Visiting local museums and civil‑rights landmarks", "Gardening a small backyard
    plot"]'
  career_goals: Robert aims to advance from a sales representative to a regional sales manager within the next five years, leveraging his client network to lead a small team and drive revenue growth for
    his company. He plans to earn a Bachelor’s degree in Business Administration or pursue a professional sales certification (CPSP) to deepen his strategic expertise. Long‑term, he envisions launching
    his own consulting firm focused on helping small Southern businesses adopt service‑based revenue models, while also mentoring aspiring sales professionals from underrepresented backgrounds.
