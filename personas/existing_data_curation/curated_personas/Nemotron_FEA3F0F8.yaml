personas:
  professional: Brodrick Brown is a community‑focused arts facilitator who blends shipyard hands‑on skills, graphic design expertise, and a spontaneous, improvisational work style to launch after‑school
    creative workshops, despite a tendency to miss formal deadlines.
  sports: Brodrick Brown is a devoted fan of the New Orleans Saints, follows the Mississippi State Bulldogs football season, participates in a local beach‑volleyball pickup group at Gulf Islands National
    Seashore, and maintains fitness through daily solitary beach walks and occasional weekend fishing trips.
  arts: Brodrick Brown immerses himself in the photographic works of Ansel Adams, Diane Arbus, and Gregory Halpern, while listening to jazz legends Bill Evans, blues icon B.B. King, and soul great Aretha
    Franklin, and he regularly attends intimate performances at the historic Little River Rack Hall.
  travel: Brodrick Brown favors spontaneous road trips along the Gulf Coast, having explored historic ports such as Galveston, Mobile, and Biloxi, and dreams of sailing to the sea‑lined town of Saint‑Malo
    while budgeting his travel modestly through seasonal work‑exchange programs.
  culinary: Brodrick Brown enjoys cooking Gulf shrimp étouffée with Cajun spices, blackened catfish over corn grits, and grilling oysters with lemon‑garlic butter, displaying confident home‑chef skills
    especially when experimenting with fresh okra and local spices.
  core: Brodrick Brown is a solitary beach‑walking photographer‑woodworker whose spontaneous creativity is balanced by a chronic habit of forgetting deadlines and an affection for humming jazz while sanding
    furniture.
background:
  cultural: Brodrick’s cultural background is rooted in the African‑American experience of the Deep South. Raised in a close‑knit family in Pascagoula, he was immersed in gospel music, church community,
    and Southern cuisine. The legacy of the civil rights movement and the storytelling traditions of coastal black families shape his worldview. He values oral histories passed down through elders, the
    resilience of his community amid economic challenges, and the fusion of Southern and African‑American culinary practices. His appreciation for art draws from the blues heritage of the Mississippi Gulf
    Coast, while his community involvement reflects a tradition of mutual aid and solidarity in black neighborhoods.
attributes:
  skills: '["Boat maintenance and repair", "Welding", "Graphic design", "Digital photography", "Community event coordination", "Mentoring and youth outreach", "Basic Python programming"]'
  hobbies: '["Beach walking and sketching", "Analogue and digital photography", "Reading art theory and African‑American history", "Listening to jazz and blues", "Woodworking", "Singing in a community choir",
    "Attending small live music shows"]'
  career_goals: Although currently out of the formal workforce, Brodrick aims to channel his experience into community‑focused initiatives. He wishes to create an after‑school art workshop for local youth,
    teaching drawing, photography, and digital media. He also aspires to produce a photo‑essay documenting the Gulf Coast’s maritime heritage and to publish a memoir highlighting his community’s stories.
    Additionally, he hopes to volunteer as a liaison for the local historical society to preserve African‑American narratives of the region.
