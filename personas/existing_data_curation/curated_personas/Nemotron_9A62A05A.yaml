  career_goals: Although retired from formal employment, Sherly aims to deepen her impact through volunteer leadership. She hopes to chair the senior center’s activity committee, expand the center’s outreach
    to isolated seniors, and serve on the board of a local nonprofit focused on African American cultural preservation. Sherly also plans to document her life story and intergenerational family history
    using digital storytelling tools, hoping the memoir will inspire younger relatives. Learning new technologies, such as podcast editing, is a personal ambition, as is advocating for enhanced senior services
    and accessible community spaces in St. Charles.
