personas:
  professional: Sherly Matthews, a dedicated senior‑center volunteer leader, blends her former administrative expertise with a flair for meticulous budgeting, event coordination, and patient tech tutoring,
    creating structured yet welcoming community programs while confidently mediating volunteer disputes.
  sports: Sherly Matthews, an avid supporter of the St. Louis Cardinals and the St. Louis Blues, enjoys low‑impact senior fitness classes, daily walks on the Fox River Trail, and a weekly bridge night with
    the senior center’s card club, though she steers clear of high‑intensity sports.
  arts: Sherly Matthews, a gospel‑group singer in her church choir, immerses herself in the works of Mahalia Jackson, Aretha Franklin, and B.B. King, while also knitting, quilting, and discussing historical
    fiction with her book club, allowing music and storytelling to shape her creative outlet.
  travel: Sherly Matthews, who loves road‑tripping in a comfortable sedan, frequently visits the St. Louis Botanical Garden, plans annual trips to the soulful streets of New Orleans for its jazz festivals,
    and dreams of a pilgrimage to the historic neighborhoods of Harlem to connect with the legacy of the Harlem Renaissance, all while keeping travel expenses within a modest senior budget.
  culinary: Sherly Matthews, an accomplished home baker, whips up soul‑food pastries such as sweet‑potato pie, peach cobbler, and cinnamon‑spiced pecan rolls using buttermilk, shredded coconut, and a dash
    of nutmeg, and regularly shares these dishes at community events while perfecting her secret glaze recipe.
  core: Sherly Matthews, a methodical, community‑driven octogenarian, structures her days around choir rehearsals, garden rows, and meticulous spreadsheets, yet secretly hides the last slice of pecan pie
    for a midnight snack.
background:
  cultural: Sherly’s identity is rooted in the African American experience of the Midwest. Her parents migrated from the rural South during the Great Migration, bringing with them gospel traditions, storytelling,
    and Southern culinary heritage. Growing up in a close‑knit black family, church was a central pillar, shaping her values of community service and resilience. In St. Charles, Missouri, she blends Midwestern
    community spirit with her cultural legacy, regularly participating in Black History Month events, local heritage festivals, and church outreach programs that celebrate African American contributions
    to the region.
