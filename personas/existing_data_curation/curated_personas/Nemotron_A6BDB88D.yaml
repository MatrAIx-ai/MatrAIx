  career_goals: Omer aims to advance from a first‑line supervisor to a certified construction project manager within the next five years, pursuing an associate’s degree in construction management and obtaining
    a PMP certification. He aspires to lead larger multi‑disciplinary projects, eventually overseeing commercial developments in the Columbus metro area. Long‑term, he envisions establishing his own construction
    firm focused on sustainable building practices, combining his practical expertise with a community‑oriented approach. He also hopes to become a recognized safety trainer, leveraging his calm demeanor
    and strong communication skills to mentor new workers across the region.
