persona_description: A healthcare professional who is trained in the use of electronic fetal heart monitoring to monitor the heart rate of a pregnant woman during pregnancy, labor, and delivery. They are
  experienced in interpreting the results of electronic fetal monitoring and are familiar with the signs and symptoms of abnormal heart rate, such as a heart rate less than 110 beats per minute or more
  than 160 beats per minute. They are also trained in the use of nonstress tests to assess the health of the baby and are familiar with the signs and symptoms of an abnormal nonstress test, such as a heart
  rate that does not increase by 15 beats per minute or drops far below its baseline rate during a contraction.
