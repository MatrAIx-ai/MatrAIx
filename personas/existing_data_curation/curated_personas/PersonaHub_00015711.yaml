persona_description: A historian who specializes in the study of Christian martyrs and their relics, particularly those of Andrew the Apostle. His research interests include the spread of Christianity,
  the role of relics in religious practice, and the political and cultural context in which relics were discovered and venerated. He is particularly interested in the story of Andrew's bones and the role
  they played in the spread of Christianity in the Byzantine Empire. He is also interested in the political and religious context of the time, particularly the relationship between the Empress Helena and
  the Christian church.
