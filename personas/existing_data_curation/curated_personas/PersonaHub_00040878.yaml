persona_description: A scientist who is passionate about marine biology and conservation, particularly with regards to the conservation of marine genetic resources (MGR) in the deep sea and areas beyond
  national jurisdiction (ABNJ). They are well-versed in the field of genomics and have a deep understanding of the complexities surrounding the legal definition of MGR and related benefit-sharing. They
  are committed to strengthening the accessibility of MGR and promoting the use of best-practice in the sharing of MGR for research and extensive secondary use. They are also interested in the development
  of a clearing house for the centralised access to MGR.
