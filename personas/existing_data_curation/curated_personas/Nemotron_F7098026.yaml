personas:
  professional: Ismary Rios is a versatile carpenter who merges modern CAD and CNC technology with traditional hand‑joinery to craft bespoke furniture, thriving on flexible, on‑the‑fly project adjustments
    despite a habit of keeping their workshop slightly disorganized.
  sports: Ismary Rios hikes with the North Georgia Hiking Club, roots for the Atlanta Braves and Atlanta United FC, and stays fit by dancing Cuban salsa three evenings a week, preferring low‑impact cardio
    over rigid gym routines, and they relish the freedom of moving at their own pace.
  arts: Ismary Rios blends a love for woodworking with a passion for modern design, drawing inspiration from Charles Eames and Zaha Hadid while enjoying the vibrant sounds of Celia Cruz and the visual whimsy
    of Yayoi Kusama during quiet evenings in the workshop, and they often let the music guide the grain of the wood.
  travel: Ismary Rios favors spontaneous weekend getaways to the Blue Ridge Parkway and Appalachian Trail, and occasionally books design‑focused trips to Barcelona and New York, balancing a modest budget
    with a love for cultural immersion and a flexible itinerary, and they cherish the spontaneity of each departure.
  culinary: Ismary Rios delights in cooking authentic ropa vieja with slow‑cooked pork, black beans, and plantains, seasoning it with fresh cilantro and oregano harvested from their balcony garden, while
    also experimenting with smoked reclaimed‑wood planks to grill fish, and they often garnish each plate with a sprinkle of garden‑fresh herbs.
  core: Ismary Rios is a fiercely curious carpenter who blends sustainable design with a penchant for leaving tool chests half‑open and a habit of over‑promising project timelines while maintaining a relaxed,
    flexible work ethic, and they never seem to mind the occasional chaos.
background:
  cultural: Ismary is a first‑generation Cuban‑American whose family migrated to the United States in the 1990s. Growing up in a bilingual household, she absorbed Cuban culinary traditions, music, and a
    strong emphasis on family solidarity. In Athens, she blends these cultural influences with Southern hospitality, often incorporating vibrant colors or Caribbean motifs into her furniture designs. Her
    heritage fuels a resourceful, hands‑on mindset and a love for community gatherings, while her American upbringing encourages practicality and adaptability in both her professional and personal life.
attributes:
  skills: '[''Custom furniture design'', ''Framing and structural carpentry'', ''CNC machining'', ''Blueprint interpretation'', ''Finish work (staining, painting)'', ''Wood joinery (mortise & tenon, dovetail)'',
    ''Project estimation'', ''Client communication'', ''Problem solving'', ''Tool maintenance'']'
  hobbies: '[''Salsa dancing'', ''Urban gardening'', ''Reading architectural history'', ''Cuban cooking'', ''Hiking in North Georgia'', ''DIY home renovation'', ''Community volunteering'']'
  career_goals: She aims to open a modest boutique workshop in Athens where she can produce one‑of‑a‑kind pieces and host occasional hands‑on classes, especially for women and other underrepresented groups
    in the trades. Ismary plans to deepen her knowledge of sustainable, reclaimed wood sources and to earn a certification in green building practices. While she prefers flexibility over rigid business
    structures, she wants to develop a reliable client network and eventually mentor apprentices, balancing her competitive drive with a community‑focused mindset.
