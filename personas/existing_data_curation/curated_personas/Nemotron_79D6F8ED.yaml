personas:
  professional: A meticulous medical billing specialist named Victoria Duncan leverages her expertise in Epic and Medisoft, keen attention to detail, and empathetic communication to streamline insurance
    workflows while quietly dreaming of one day overseeing finances for a nonprofit arts organization.
  sports: Victoria Duncan enjoys solo hikes on the Blue Ridge Parkway and is an active member of the Asheville Hiking Club, while intermittently cheering on the Charlotte Hornets and attending community
    yoga classes to maintain flexibility and calm.
  arts: A passionate sketcher and photographer, Victoria Duncan draws inspiration from Ansel Adams, Claude Monet, and local Asheville painter Molly Malone, attends intimate acoustic shows featuring Phoebe
    Bridgers, and volunteers to organize community art workshops, melding her love for visual and musical arts.
  travel: Victoria Duncan favors weekend road trips to scenic spots like the Blue Ridge Parkway, has explored the historic streets of Savannah and the vibrant art scene of New York City, and dreams of studying
    Renaissance art in Florence, Italy, balancing careful budgeting with a yearning for cultural immersion.
  culinary: An enthusiastic home cook, Victoria Duncan experiments with seasonal Southern dishes such as shrimp and grits, collard greens with smoked turkey, and heirloom tomato basil bruschetta, often
    sourcing fresh produce at the local farmer’s market and seasoning with smoked paprika and fresh herbs.
  core: Victoria Duncan is a detail‑oriented medical billing enthusiast who channels her creative restlessness into sketching, hiking, and mindful self‑care, yet wrestles with waves of anxiety that drive
    both meticulous planning and occasional impulsive art‑spending.
background:
  cultural: Victoria was raised in Summerfield, a small town in Rockingham County, North Carolina. Her family has deep roots in the region, with generations of agricultural and small-business heritage.
    She grew up in a close-knit community that values hospitality, church fellowship, and traditional Southern customs, while her exposure to college courses and online culture broadened her appreciation
    for diverse art and ideas. This blend of rural Southern upbringing and curiosity about broader cultural experiences informs her values of community harmony, modesty, and a love for both local folk traditions
    and contemporary creative expression.
attributes:
  skills: '[''Medical billing and posting'', ''Medical coding (ICD-10 basics)'', ''Epic and Medisoft software'', ''Data entry and validation'', ''Excel and spreadsheet analysis'', ''Insurance claim processing'',
    ''Regulatory compliance (HIPAA)'', ''Customer service and patient communication'', ''Conflict resolution'', ''Team collaboration'', ''Graphic design (Canva, basic Photoshop)'', ''Art appreciation and
    curation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Nature photography'', ''Cooking seasonal Southern dishes'', ''Journaling and mindfulness meditation'', ''Reading
    contemporary fiction and poetry'', ''Attending small acoustic music performances'', ''Hiking in state parks'', ''Volunteering at community arts workshops'']'
  career_goals: Victoria aspires to advance within the healthcare finance field, aiming to become a billing supervisor or health information manager. She plans to earn a certified professional coder credential
    and complete an associate degree in health information management. Simultaneously, she hopes to merge her passion for art by working with a nonprofit arts organization, handling finances and supporting
    community art programs. In the long term, she envisions creating a small community space that blends health education and artistic expression, leveraging her organizational strengths and empathetic
    nature.
