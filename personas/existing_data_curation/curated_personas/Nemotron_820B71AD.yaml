  hobbies: '["Fishing", "Birdwatching", "Reading Historical Non‑Fiction", "Model Building (Vintage Cars)", "Gardening (Native Plants)", "Amateur Astronomy", "Participating in Small Community Gatherings",
    "Book Club"]'
  career_goals: Looking ahead, Andrew aims to transition into a supervisory role within his current parking operation, where he can mentor younger staff and share his practical knowledge. He plans to complete
    a short certification in facilities or property management to formalize his expertise. In the longer term, he hopes to shift to part‑time or consulting work that leverages his experience in traffic
    flow and customer service, possibly assisting local small businesses with parking solutions. Financially, he is focused on building a modest retirement nest‑egg, allowing him to maintain his independence
    while enjoying occasional leisure travel. He also wishes to stay actively involved in his community by volunteering at the senior center and assisting with local events, blending his sense of responsibility
    with his desire to give back.
