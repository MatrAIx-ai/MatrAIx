persona_description: A Renaissance-era diplomat who used cryptography to protect his correspondence and strengthened his city-state's military through the use of substitution ciphers. He was hired by the
  Republic of Venice to establish the first professional cryptographers and protect their diplomatic correspondence. His expertise in cryptography and cryptanalysis was highly valued in the early modern
  world, and he played a significant role in the development of modern cryptography.
