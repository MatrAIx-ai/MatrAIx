personas:
  professional: Mildred Gibson is a veteran logistics strategist whose three decades of supply‑chain expertise, disciplined Lean‑Six‑Sigma methodology, and curiosity for low‑carbon analytics enable her
    to design efficient, sustainable distribution networks while quietly mentoring emerging women leaders.
  sports: Mildred Gibson enjoys low‑impact fitness through weekend hikes in Acadia, occasional trail runs with the Portland Hiking Club, and avidly follows the New England Patriots and Portland Sea Dogs,
    while also volunteering to lead gentle yoga sessions at the local senior center.
  arts: Mildred Gibson finds creative respite in bird photography and reading biographies by David McCullough, while attending folk concerts featuring Bob Dylan tributes and occasional productions at Portland
    Stage Company, allowing the narratives of history and nature to color her leisure.
  travel: Mildred Gibson prefers carefully planned road trips to natural destinations, having explored Acadia National Park, the Canadian Maritimes, and a recent pilgrimage to the Scottish Highlands, always
    opting for modest lodging and using senior discounts to stretch her travel budget.
  culinary: Mildred Gibson’s culinary routine centers on seasonal New England fare, regularly preparing roasted root vegetables, pan‑seared Atlantic salmon with dill, and a hearty clam chowder, while cultivating
    thyme and rosemary in her garden to flavor dishes and the occasional apple crumble for dessert.
  core: Mildred Gibson is a methodical logistics expert who balances solitary nature pursuits with a steadfast drive for sustainable supply chains, mentorship, and a penchant for meticulous budgeting, all
    while occasionally overlooking her own need for rest.
background:
  cultural: Mildred grew up in a multi‑generational New England family that values self‑reliance, modesty, and community service. Her white American heritage includes a strong work ethic rooted in the region’s
    Puritan legacy, combined with a deep respect for the maritime and seasonal rhythms of Maine. She identifies with the local culture’s emphasis on practicality, environmental stewardship, and civic involvement,
    which informs both her professional approach to efficient logistics and her personal commitment to helping neighbors and preserving the natural landscape.
attributes:
  skills: '[''Supply chain network design'',''Demand forecasting'',''Inventory optimization'',''Data analysis and visualization'',''Lean/Six Sigma continuous improvement'',''Project management'',''Risk
