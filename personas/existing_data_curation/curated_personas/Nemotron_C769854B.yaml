    ''Hiking in the Hudson Valley'', ''Exploring New York City neighborhoods and street art'']'
  career_goals: Enjoli aims to helm a feature film that highlights underrepresented Black narratives while leveraging innovative storytelling technologies. She plans to launch her own boutique production
    company within the next three years, focusing on socially conscious content that bridges art and science. Her ambition includes securing a series‑order with a major streaming platform as a showrunner
    and earning recognition such as an Emmy or Independent Spirit Award for directing. She is also committed to mentoring emerging Black creators and establishing a mentorship program within the New York
    film community. Long‑term, she envisions pioneering sustainable production models that set new industry standards for environmental responsibility.
