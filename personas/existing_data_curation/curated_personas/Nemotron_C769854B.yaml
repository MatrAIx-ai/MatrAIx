personas:
  professional: Enjoli Olistin is a 30‑year‑old production manager turned indie filmmaker who blends her STEM‑savvy data analytics with a flair for visual storytelling, leveraging AR/VR tools to craft socially
    conscious narratives while navigating tight budgets with meticulous project‑management precision, balancing curiosity for emerging tech with methodical scheduling and a sociable networking habit, even
    as she worries about deadline pressures.
  sports: Enjoli Olistin is a dedicated weekend hiker in the Hudson Valley, a member of an amateur co‑ed soccer league that competes under the ‘Green City FC’ banner, and a fervent fan of the New York Knicks
    and Yankees, cheering them from the rooftop bar during playoffs while she squeezes in sunrise runs along the East River in spring.
  arts: Enjoli Olistin immerses herself in the city’s avant‑garde arts scene, attending gallery openings featuring works by Kehinde Wiley and Ai Weiwei, catching experimental theater productions at The
    Public Theater, vibing to live jazz sets by Kamasi Washington and Afrobeat rhythms of Antibalas, and curating eclectic playlists that juxtapose Billie Holiday with Aphex Twin, all of which fuel her
    own visual storytelling.
  travel: Enjoli Olistin prefers spontaneous, budget‑conscious road trips that blend nature and culture, having recently driven the Blue Ridge Parkway to Asheville, booked a boutique eco‑lodgment in Cartagena,
    and plotted a future adventure to the Japanese Alps, while she relies on a meticulously organized spreadsheet to balance travel dates with production deadlines.
  culinary: Enjoli Olistin, an enthusiastic home chef, loves preparing Afro‑Caribbean dishes like jerk chicken with Scotch bonnet peppers, fragrant plantain mofongo, and coconut‑infused callaloo soup for
    friends, often experimenting with tamarind glaze and fresh cilantro, yet she admits to over‑seasoning her sauces and occasionally ordering take‑out sushi when post‑production overtime runs late.
  core: Enjoli Olistin is a meticulously organized, tech‑curious film producer who balances a relentless creative drive with chronic worry, turning her love for arts, adventure, and sustainable living into
    a vibrant, if slightly over‑scheduled, lifestyle.
background:
  cultural: Enjoli grew up in a multicultural Black neighborhood in Brooklyn, where the rhythms of hip‑hop, gospel, and Caribbean music shaped her identity. Her family traces its roots to West Africa and
    the Caribbean, and stories of migration and resilience were a staple at family gatherings. She was immersed in community initiatives that celebrated Black art, from local poetry slams to the annual
    Caribbean Carnival. This blend of African, Caribbean, and African‑American traditions informs her aesthetic sensibility and fuels her commitment to amplifying diverse voices in media. Her experience
    living in New York City also exposed her to a mosaic of cultures, reinforcing a worldview that values inclusivity and cross‑cultural dialogue.
