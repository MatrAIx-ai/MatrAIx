  career_goals: Hamidreza aims to become a curriculum coordinator within his school district, championing the expansion of arts‑rich programs across all grade levels. He plans to pursue a master's degree
    in education leadership to bolster his administrative capabilities. He also aspires to lead professional development workshops that help fellow teachers incorporate creative and unconventional teaching
    methods. Long‑term, he hopes to collaborate with local museums and cultural institutions to develop community‑based learning projects that bring real‑world artistic experiences into the classroom.
