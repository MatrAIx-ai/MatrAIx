  career_goals: Louise aims to transition from standard manufacturing tasks to creating a boutique line of handcrafted metal furniture and sculptural pieces that blend functional design with abstract artistic
    expression. She seeks certification in CNC programming through a community college program to expand her technical toolkit. Over the next three years she hopes to open a small studio workspace in El
    Cajon, secure a consistent client base through local galleries and online platforms, and win a regional craft award that would validate her artistic ambitions. While she values independence, she also
    aspires to mentor younger apprentices who share her meticulous work ethic, though she prefers one‑on‑one tutoring sessions rather than group workshops.
