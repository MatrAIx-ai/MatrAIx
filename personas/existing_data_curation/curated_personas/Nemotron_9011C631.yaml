personas:
  professional: Iris Acevedo is a detail‑driven bookkeeping clerk in Houston who leverages advanced Excel, QuickBooks and Sage 50 to keep accounts payable, receivable and reconciliations flawless, while
    their sociable, assertive nature makes them a natural translator of complex financial data for clients and an eager tester of new fintech tools.
  sports: Iris Acevedo keeps fit by attending weekly Zumba classes, joining a local salsa‑dance fitness group, cheering on the Houston Astros, Houston Rockets and Houston Dynamo, and participating in a
    community softball league each spring.
  arts: Iris Acevedo immerses themselves in the arts by taking regional dance lessons, practicing salsa to the rhythms of Celia Cruz and Marc Antony, attending live performances at the Houston Theater District,
    and curating playlists that feature contemporary Latin pop icons like Bad Bunny and Shakira.
  travel: Iris Acevedo favors well‑planned weekend getaways—they recently explored Austin’s music scene, savored the street food of New Orleans, and have a bucket‑list trip to Oaxaca to study local markets,
    balancing their love of adventure with a modest travel budget.
  culinary: Iris Acevedo enjoys crafting complex dishes such as mole poblano, tamales, and chiles en nogada, skillfully handling ingredients like dried pasilla chiles and richly spiced chocolate, while
    they also delight in tasting gourmet tacos al pastor at local taquerías and occasionally over‑spice their sauces in pursuit of perfect flavor.
  core: Iris Acevedo blends meticulous organization with a vibrant social life, channeling anxiety into mindfulness, Zumba, and community finance workshops while obsessively perfecting traditional dishes
    and constantly testing the latest bookkeeping software.
background:
  cultural: Iris is a first‑generation Mexican‑American who grew up speaking both Spanish and English at home. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Cinco
    de Mayo, and holiday gatherings with extended relatives. Raised in Houston's vibrant Hispanic community, she blends Mexican culinary arts, music (cumbia, ranchera), and Catholic customs with the multicultural
    fabric of Texas. This bicultural identity informs her social life, community involvement, and workplace interactions, where she often serves as a cultural bridge, translating financial concepts for
    Spanish‑speaking clients and fostering inclusive teamwork.
attributes:
  skills: '[''QuickBooks'', ''Sage 50'', ''Microsoft Excel (pivot tables, macros)'', ''Accounts Payable/Receivable'', ''Bank Reconciliation'', ''Monthly Financial Reporting'', ''Regulatory Compliance (SOX
    basics, GAAP)'', ''Data Entry and Validation'', ''Document Management'', ''Team Communication and Collaboration'']'
  hobbies: '[''Salsa and Mexican Dance Classes'', ''Traditional Mexican Cooking'', ''Community Volunteer Work (financial literacy workshops)'', ''Weekly Zumba Fitness Classes'', ''Mindfulness Journaling'',
    ''Reading Self‑Help and Anxiety Management Books'', ''Exploring New Accounting Software and Fintech Webinars'', ''Attending Cultural Festivals and Community Potlucks'']'
  career_goals: Iris aims to augment her high‑school education with an associate degree in accounting within the next two years, followed by the Certified Bookkeeper credential. Her short‑term goal is to
    move into a senior bookkeeping role where she can mentor junior staff and lead larger account portfolios. Long‑term, she aspires to earn her CPA and transition into a financial analyst or accounting
    manager position within a Houston‑based corporation, or to launch her own boutique bookkeeping service for small Mexican‑American businesses. Throughout her career progression, she seeks a supportive
    work environment that accommodates her anxiety management needs, allowing her to balance professional ambition with personal well‑being.
