    (Tableau, PowerBI)'', ''Technical Leadership'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Hiking'', ''Volunteer coding workshops for women'', ''Yoga'', ''Cooking'', ''Birdwatching'', ''Small book club'', ''Volunteer at local food
    bank'']'
  career_goals: Sharron aims to transition into a senior technical leadership role where she can shape product strategy while maintaining a hands‑on engineering perspective. She aspires to become a Technical
    Product Owner or Chief Technology Officer for a mid‑size company, focusing on digital transformation initiatives that align with business growth. Mentoring emerging developers, especially women entering
    tech, is a core ambition, and she hopes to establish a small consultancy that offers tailored software solutions and training to local Kansas businesses. Throughout her career progression, she seeks
    a balanced workload that mitigates stress and allows her to nurture her personal well‑being and family life.
