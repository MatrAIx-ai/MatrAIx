personas:
  professional: Sharron Gould, a seasoned full‑stack software developer with expertise in Python, Java, C#, cloud infrastructure, and Agile leadership, leverages a balanced mix of curiosity and practicality
    to design scalable web applications, mentor women in tech through a coding circle, and carefully assess risks while charting a path toward senior technical leadership.
  sports: Sharron Gould, an enthusiastic yoga practitioner and gentle‑trail hiker, regularly walks the Prairie Spirit Trail, supports the Kansas City Chiefs (NFL) and Kansas City Royals (MLB) from home,
    participates in a local birdwatching club that meets at sunrise, and joins a community walking group that organises low‑impact cardio sessions each spring.
  arts: Sharron Gould, an avid reader of historical fiction and biographies, devours works by Hilary Mantel, Ken Follett, and Walter Isaacson, enjoys listening to Yo‑Yo Ma’s cello suites and Beethoven symphonies
    while cooking, attends performances at the Kansas City Repertory Theatre, and occasionally paints watercolors of garden scenes to unwind.
  travel: Sharron Gould, a methodical traveler who prefers low‑stress, nature‑focused trips, has explored the red rocks of Sedona, the hiking paths of Zion National Park, the historic towns of the Scottish
    Highlands, and dreams of visiting Kyoto’s temples, always planning itineraries months in advance, using airline miles, and balancing family commitments with limited vacation days.
  culinary: Sharron Gould, a health‑conscious home cook, frequently prepares quinoa‑and‑roasted‑vegetable bowls, heirloom tomato basil soup, miso‑glazed salmon with ginger, and a Sunday roast featuring
    rosemary‑infused chicken, delighting in fresh herbs like thyme, cilantro, and basil from their garden, while mastering meal‑prep techniques to feed a busy family.
  core: Sharron Gould, a 50‑year‑old full‑stack developer and garden‑enthusiast, merges meticulous code craftsmanship with health‑first cooking, mentors women in tech, and quietly battles a perpetual undercurrent
    of worry.
background:
  cultural: Sharron was raised in a Midwestern, white American family with deep ties to community and modesty. Her parents emphasized hard work, practical problem‑solving, and a collective responsibility
    to neighbors, values that continue to shape her professional ethic. The regional culture of Kansas—marked by a blend of agricultural roots and growing suburban technology sectors—has fostered her appreciation
    for both tradition and innovation. While she identifies with mainstream American customs, she also values the quiet humility and cooperative spirit typical of her community, integrating these traits
    into her collaborative work style and personal interactions.
