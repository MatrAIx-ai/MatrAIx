  career_goals: Bernard aims to turn his passion for technology and creativity into a future career in software development or video‑game design, where he can build interactive experiences for others. He
    is also intrigued by engineering and envisions a path that blends technical work with community outreach, such as teaching coding to younger kids in Atlanta. In the short term, he plans to graduate
    high school, join a robotics club, and secure a summer mentorship or internship that gives him real‑world exposure to tech fields.
