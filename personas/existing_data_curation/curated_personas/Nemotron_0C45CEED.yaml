personas:
  professional: Bernard Milton, a budding teen game‑designer and beat‑maker, channels curiosity and practicality by creating simple Unity‑style games and crafting loops on a beginner music‑production app,
    often improvising project timelines because of a relaxed, flexible attitude toward obligations.
  sports: Bernard Milton dominates the local park basketball court on Saturdays, idolizing the NBA’s Toronto Raptors and cheering for the MLB’s Chicago Cubs, while also joining a youth swim club during
    summer, balancing structured practice with spontaneous street games that match their flexible approach.
  arts: Bernard Milton merges beat‑making experiments on GarageBand with a love for graphic novels like ‘Saga’ and ‘Ms. Marvel’, drawing inspiration from lo‑fi producer ChilledCow and Studio Ghibli’s ‘My
    Neighbor Totoro’, allowing their relaxed curiosity to shape a playful artistic identity.
  travel: Bernard Milton’s travel palette mixes weekend family hikes through South River Park, a road‑trip to Washington, D.C.’s Smithsonian museums, and a future wish to explore Tokyo’s Akihabara district
    for anime and music‑tech culture, favoring spontaneous planning over rigid itineraries.
  culinary: Bernard Milton’s culinary routine centers on pepperoni pizza slices and midnight bowls of instant ramen, occasionally experimenting with homemade guacamole and crunchy chicken nuggets, proudly
    mastering scrambled eggs in their non‑stick skillet despite a tendency to forget to clean up promptly.
  core: Bernard Milton is a curiosity‑driven teen who juggles beat‑making, game design, and basketball with a laid‑back, sometimes disorganized streak, often trading punctual schedules for impromptu creative
    bursts and occasional snack‑driven procrastination.
background:
  cultural: Bernard is a young African‑American growing up in DeKalb County, a vibrant hub of Southern black culture. His family celebrates traditions rooted in church, soul‑food gatherings, and community
    events that emphasize togetherness and resilience. He absorbs the rhythm of Atlanta’s hip‑hop scene, listens to local artists, and attends neighborhood festivals that honor the city’s civil‑rights legacy.
    The multicultural environment of DeKalb exposes him to a mix of Southern cuisine, gospel music, and contemporary black youth culture, shaping his values of hard work, respect, and a desire to give back
    to his community.
