  career_goals: As he approaches the later stage of his academic career, Dr. Ngo aims to leave a lasting imprint on both his department and the broader engineering community. He plans to develop an interdisciplinary
    renewable‑energy program that integrates hands‑on design, community outreach, and entrepreneurship, secure a multi‑year NSF grant to fund student‑led projects, author a textbook that bridges theory
    and practical implementation, and mentor a new generation of faculty and underrepresented engineers. He also aspires to balance his professional aspirations with personal well‑being, perhaps taking
    a sabbatical to collaborate with research institutes in Vietnam and to document sustainable engineering practices that benefit both his heritage communities and the Nevada region.
