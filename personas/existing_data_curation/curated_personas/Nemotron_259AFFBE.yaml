personas:
  professional: Sang Ngo, a seasoned electrical engineering professor and renewable‑energy specialist, combines a curious, hands‑on approach with practical curriculum design, guiding students through Python‑driven
    simulations in ANSYS and real‑world solar‑panel projects while they leverage a flexible, occasionally disorganized schedule to broker industry partnerships and secure multi‑year NSF grants.
  sports: Sang Ngo hikes the Red Rock trails every other weekend, tracks the Las Vegas Raiders in the NFL and the Arizona Diamondbacks in MLB, and they unwind by playing casual chess matches at the local
    club, treating the mental sport as a strategic complement to their physical fitness regimen.
  arts: Sang Ngo captures the desert’s golden light with a DSLR, drawing inspiration from Ansel Adams and contemporary photographer Steve McCurry, while they unwind with evenings of listening to Neil Young,
    the Rolling Stones, and jazz pianist Bill Evans, weaving these artistic influences into their teaching narratives.
  travel: Sang Ngo prefers road trips that blend adventure and relaxation, such as scenic drives through Utah’s national parks and a leisurely stay in Santa Fe’s art district, and they dream of a future
    sabbatical in Southeast Asia to document sustainable engineering practices while sampling local cuisines.
  culinary: Sang Ngo experiments with Vietnamese‑Southwestern fusion, crafting dishes like pho‑infused brisket tacos with cilantro‑lime slaw and lemongrass‑marinated grilled corn, while they relish growing
    herbs like basil and coriander in their garden to ensure fresh ingredients for their inventive home‑cooking sessions.
  core: Sang Ngo is a curiosity‑driven, pragmatic professor who balances desert gardening, photography, and eclectic cooking with a relaxed, sometimes disorganized approach to scheduling, and they consistently
    demonstrate emotional resilience.
background:
  cultural: Born to Vietnamese immigrant parents, Dr. Sang Tien Ngo grew up navigating a bicultural world that prized education, family cohesion, and respect for tradition. He speaks Vietnamese fluently
    and participates in community events such as Tet, Mid‑Autumn Festival, and local cultural fairs, while also embracing the multicultural fabric of Las Vegas. His heritage instilled a strong work ethic
    and a communal sense of responsibility, which he channels into his teaching philosophy and outreach work. He maintains close ties with extended family in Vietnam, often traveling back to visit and exchanging
    ideas on sustainable engineering practices, and he actively supports the Vietnamese diaspora through mentorship and cultural preservation initiatives.
