  career_goals: Patricia aims to move into a supervisory role within a warehouse, such as a shift lead or operations coordinator, and plans to earn certified forklift and OSHA safety trainer qualifications.
    She intends to complete an associate certification in logistics or supply chain management to deepen her technical expertise. In the medium term, she wants to spearhead process‑improvement projects
    that boost efficiency and team performance, leveraging her competitive drive. Ultimately, Patricia envisions launching her own small moving and transport service that doubles as a liaison for local
    art festivals, giving her the flexibility to blend her logistical skills with her love of creative events and community engagement.
