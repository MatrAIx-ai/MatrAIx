  career_goals: Arianne aims to deepen her signature body of work that captures the quiet, contemplative landscapes of Connecticut, ultimately publishing a limited‑edition photobook. She aspires to secure
    a solo exhibition at a regional museum or university gallery, and to develop a sustainable studio space that balances her need for solitude with her family responsibilities. Over the next five years,
    she plans to expand into teaching online photography workshops, produce a line of limited‑edition fine‑art prints, and collaborate with environmental organizations to document local conservation efforts.
