personas:
  professional: Kayli Johnsrude is a meticulous high‑school junior who channels her methodical planning, strong time‑management, and calm conflict‑resolution abilities into leading group projects and coordinating
    the school’s volunteer library program, laying a disciplined foundation for a future nursing career.
  sports: Kayli Johnsrude keeps a low‑impact fitness routine by joining the school’s cross‑country team and a weekend community walking club, closely follows the Detroit Tigers in baseball, cheers the Michigan
    Wolverines women’s soccer during the fall season, and enjoys occasional indoor swimming laps at the local YMCA as a calming end‑of‑day activity.
  arts: Kayli Johnsrude immerses herself in contemporary realistic fiction by Celeste Ng, devours the suspenseful plots of Gillian Flynn, and enhances her knitting sessions with the gentle indie folk of
    Sufjan Stevens, while also attending monthly community‑theater performances of classics like 'Our Town' that deepen her appreciation for storytelling.
  travel: Kayli Johnsrude prefers meticulously planned weekend getaways—having explored Detroit’s museum district, a family trip to Mackinac Island, and a school‑organized field visit to Toronto—while dreaming
    of budget‑friendly adventures to Washington, D.C., the Grand Canyon, and the historic streets of Edinburgh, always drafting checklists and travel budgets ahead of time.
  culinary: Kayli Johnsrude delights in baking classic chocolate‑chip cookies, buttery lemon bars, and cinnamon‑spiced oatmeal raisin muffins, relying on exact measurements with a digital scale and cherished
    ingredients like vanilla extract, almond flour, and dark chocolate chips, while occasionally treating herself to a slice of pepperoni pizza from the hometown pizzeria as a relaxed dinner.
  core: Kayli Johnsrude is a methodical teen who balances a love for orderly schedules and quiet hobbies with occasional cookie‑craving splurges and a habit of writing daily journal entries that double
    as personal roadmaps.
background:
  cultural: Kayli comes from a White, European-American family rooted in the Upper Midwest. Her ancestry includes English and German heritage, and she was raised in Durand, Michigan, a close-knit community
    where neighbors frequently help one another. Family traditions emphasize modesty, hard work, and community involvement; holidays such as Thanksgiving, Christmas, and local county fairs are celebrated
    with extended family gatherings. She grew up attending a modest Protestant church, which reinforced values of cooperation, humility, and service to others. These cultural influences shape her practical
    outlook, respect for routine, and desire to contribute positively to her community.
