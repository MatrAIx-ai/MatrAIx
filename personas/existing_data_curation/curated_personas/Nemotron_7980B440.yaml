  hobbies: '[''Reading contemporary realistic fiction and mysteries'', ''Journaling'', ''Baking'', ''Knitting'', ''Solving Sudoku and jigsaw puzzles'', ''Small book club'', ''Volunteer work at local library'']'
  career_goals: Kayli aspires to attend a community college in Michigan to study nursing, with the long-term goal of becoming a registered nurse in a stable, structured healthcare setting. She is drawn
    to the predictability and teamwork of a hospital environment and hopes to specialize in pediatric care, where she can combine her caring nature with her desire for a reliable, supportive career. Additionally,
    she considers a future role in health education or community health outreach, allowing her to use her organizational talents to coordinate wellness programs for her hometown.
