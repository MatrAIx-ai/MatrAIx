  hobbies: '["Salsa and reggaeton dancing", "Pick-up basketball", "Debate club participation", "Comic drawing", "Digital art and illustration", "TikTok content creation", "Listening to bomba and pop music",
    "Reading graphic novels", "Volunteering at cultural center"]'
  career_goals: She hopes to pursue a career that merges her love for her cultural heritage and her desire to help others. She dreams of becoming a bilingual school counselor or community health advocate,
    where she can support fellow Puerto Rican youth. She also imagines exploring a future in media, creating content that celebrates Latinx stories, perhaps as a journalist or social media creator. In the
    short term, she aims to maintain strong academic performance in middle school, join the high school robotics team, and earn a scholarship for her cultural involvement.
