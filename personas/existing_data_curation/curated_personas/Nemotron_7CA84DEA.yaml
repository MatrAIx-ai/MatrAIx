personas:
  professional: Edgardo Salinas is a hands‑on fixer‑up who plans to convert his talent for automotive maintenance, basic home repairs, and bilingual communication into a community‑focused HVAC certification
    and eventually a small home‑repair service, blending curiosity with a practical, family‑centric work ethic.
  sports: Edgardo Salinas cheers for the LA Galaxy and the Phoenix Suns while playing weekend matches with the Yuma United amateur soccer club, fitting in short desert bike rides and occasional backyard
    weight‑training sessions to stay active.
  arts: Edgardo Salinas immerses himself in the rhythmic sounds of Carlos Santana and the heartfelt ballads of Luis Miguel, attends the annual Yuma Día de los Muertos mural festival, and occasionally paints
    traditional motifs on homemade pottery, letting music and visual art color his weekends.
  travel: Edgardo Salinas prefers low‑key road trips that blend family visits and cultural discovery, having driven to Oaxaca to taste authentic mole and to the Grand Canyon for a weekend hike, and he dreams
    of a future pilgrimage to Barcelona’s Gothic Quarter to explore its architectural marvels.
  culinary: Edgardo Salinas’s kitchen is a laboratory where he perfects tamales al vapor, chimney‑roasted salsa verde with home‑grown tomatillos, and smoky carne asada tacos, always seasoning with freshly
    chopped cilantro and a pinch of dried oregano, while his modest cooking skill lets him effortlessly blend tradition with improvisation.
  core: Edgardo Salinas blends practical handyman savvy with a deep love for family‑centered traditions, juggling late‑night DIY projects, garden‑grown salsa, modest savings plans, and never missing a Sunday
    soccer match or a communal Día de los Muertos altar.
background:
  cultural: Edgardo is a second‑generation Mexican‑American raised in Yuma, Arizona. He grew up in a bilingual household, speaking Spanish at home and English at school, and his family maintains many traditions
    from their Mexican heritage, such as celebrating Día de los Muertos, cooking tamales, and gathering for large family meals on holidays. Yuma's blend of desert Southwestern culture and a vibrant Latino
    community has shaped his identity, giving him a strong sense of family, respect for community harmony, and an appreciation for both his cultural roots and the broader American environment. He identifies
    with the Catholic faith, often attending services with his family, and he values the importance of mutual support within his neighborhood.
