  career_goals: Edgardo aims to earn his GED within the next year and then pursue a certification in HVAC or automotive technology, fields that combine his hands‑on interests with stable job prospects in
    the Yuma region. He hopes to start his own small home‑repair service, allowing him to work flexible hours while providing reliable income for his family. Additionally, he wants to become more involved
    in community outreach, using his bilingual skills to help neighbors navigate local resources.
