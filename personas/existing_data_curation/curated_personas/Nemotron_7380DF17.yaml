personas:
  professional: Cheryl Brown is a seasoned IT project manager and systems administrator in Middle Tennessee, and they channel their meticulous organization, curiosity for emerging software, and compassionate
    leadership style into leading cross‑functional digital transformation initiatives for nonprofit and small‑business coalitions.
  sports: Cheryl Brown energizes their weekends with group hikes at Percy Warner Park, plays a seasonal pickleball league at the local senior center, and is an enthusiastic supporter of the Nashville Predators,
    Tennessee Titans, and Nashville Sounds, while maintaining a casual membership in the Volunteer Trail Guardians hiking club.
  arts: Cheryl Brown immerses themselves in the local arts scene by acting in community theater productions, discussing classic literature at their book club with titles by Toni Morrison and James Baldwin,
    and reveling in the music of Dolly Parton, Alabama, and contemporary folk singer Rhiannon Giddens.
  travel: Cheryl Brown plans relaxed yet purposeful trips with their husband, having explored historic sites like The Hermitage, Natchez Trace Parkway, and Charleston’s historic district, while dreaming
    of a weekend pilgrimage to colonial Williamsburg and a culinary tour of the Piedmont region in Italy.
  culinary: Cheryl Brown delights in Southern comfort cooking, mastering pecan pie, chicken and dumplings, and shrimp & grits, often seasoning with fresh thyme, smoked paprika, and a dash of buttermilk,
    while hosting church potlucks where their legendary chocolate chess pie is a perpetual favorite.
  core: Cheryl Brown blends relentless organization, community‑centered compassion, and a curiosity for tech trends, yet they tend to over‑worry, turning even simple decisions into marathon planning sessions.
background:
  cultural: Cheryl grew up in a close‑knit, middle‑class family in rural Tennessee, where Southern hospitality, Christian faith, and community service shaped her worldview. Her upbringing emphasized hard
    work, respect for tradition, and a love for local customs such as country music, home‑cooked meals, and seasonal festivals. These cultural roots nurture her compassionate, cooperative outlook and her
    dedication to supporting local businesses and communal initiatives while balancing curiosity with practical, grounded action.
attributes:
  skills: '[''Project Management'', ''Business Analysis'', ''IT Systems Administration'', ''Network Security'', ''Data Analysis (Excel, SQL)'', ''Process Improvement'', ''Team Leadership'', ''Budget Management'',
    ''Technical Training'', ''Community Outreach'', ''Event Coordination'']'
  hobbies: '[''Gardening'', ''Book Club'', ''Volunteering at local food bank'', ''Cooking and baking Southern cuisine'', ''Traveling with husband'', ''Technology meet-ups'', ''Community theater'', ''Hiking
    in state parks'', ''Knitting'', ''Attending church events'']'
  career_goals: Cheryl aims to step into a senior IT leadership role within the next three years, ideally as a Director of Information Services for a regional nonprofit or a coalition of small businesses
    in Middle Tennessee. She wants to spearhead digital transformation projects that help local enterprises adopt e‑commerce and cloud solutions, mentor emerging IT professionals, and eventually launch
    her own consulting practice that fuses her business background with her technical expertise. Creating a low‑stress, supportive work environment for herself and her team, while maintaining high achievement
    standards, is a core ambition.
