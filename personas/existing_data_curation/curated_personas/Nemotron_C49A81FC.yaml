personas:
  professional: Joseph Tyler is a meticulous upholstery craftsman in Amarillo who blends high‑level textile conservation expertise with disciplined project management, using their curiosity about art to
    design bespoke furniture while maintaining the quiet, focused work environment they need to meet exacting standards.
  sports: Joseph Tyler enjoys solitary hikes through Palo Duro Canyon in the spring, occasionally joins the Amarillo Cross‑Country Running Club for long‑distance training, and follows the Dallas Cowboys
    and Texas Rangers for a communal sports fix, yet rarely participates in team sports due to their preference for quiet, focused exercise.
  arts: Joseph Tyler channels their curiosity for modern art by studying the works of Georgia O'Keeffe and Edward Hopper while painting watercolours of fabric textures, often drawing inspiration from documentary
    films like Jiro Dreams of Sushi and the textile installations of Sheila Hicks, which inform their meticulous upholstery designs.
  travel: Joseph Tyler prefers carefully mapped road‑trip itineraries that balance quiet countryside retreats with artistic stops, having already explored the Grand Canyon and Santa Fe’s art scene, while
    dreaming of a solo pilgrimage to Kyoto’s traditional textile workshops and the artisans’ quarters of Oaxaca, all while budgeting for their upcoming boutique launch.
  culinary: Joseph Tyler enjoys preparing modest yet flavorful meals such as grilled chicken with pomegranate‑molasses glaze, roasted beet and goat‑cheese salads, and hand‑rolled corn tortillas seasoned
    with chipotle and cilantro, often sourcing fresh cilantro, cumin, and local honey to balance their busy, solitary schedule.
  core: Joseph Tyler is a solitary, detail‑obsessive upholstery artisan whose curiosity fuels artistic innovation while chronic worry and occasional over‑indulgence in art supplies keep them constantly
    balancing precision with anxiety.
background:
  cultural: Joseph was raised in Amarillo, Texas, in a working‑class, Anglo‑American family that valued self‑reliance, practical craftsmanship, and community support. The regional culture—shaped by the
    open plains, ranching heritage, and a modest West Texas artistic scene—instilled in him an appreciation for tangible, hands‑on work and resourcefulness. Local traditions such as community fairs, church
    gatherings, and the city’s modest art museums exposed him early to both folk art and contemporary exhibitions, fostering his curiosity for unconventional design. While he embraces the hospitality and
    humility common to the area, he also seeks solitude, which reflects the expansive, quieter landscape of the High Plains that surrounded his upbringing.
attributes:
  skills: '["Upholstery (frame repair, padding, fabric selection)", "Textile conservation and restoration", "Pattern drafting and custom cutting", "Woodworking (frame construction, refinishing)", "Project
    planning and inventory management", "Client consultation and design translation", "Community workshop instruction"]'
  hobbies: '["Watercolour painting (fabric studies)", "Sketching upholstery designs", "Scale model train building", "Reading about modern art and design", "Hiking in Palo Duro Canyon", "Volunteer furniture
    refurbishment", "Journaling and mindfulness practice"]'
  career_goals: Joseph aims to become a master upholstered furniture craftsman and earn a recognized certification in textile conservation within the next three years. His long‑term ambition is to open
    a boutique workshop in Amarillo that blends sustainable practices with artistic design, offering bespoke pieces for interior designers and local artists. He also plans to develop a mentorship program
    that provides free upholstery training to at‑risk youth and to collaborate on public art installations that showcase custom‑upholstered furnishings in community spaces. Ultimately, he hopes to be recognized
    as a trusted resource for preserving and revitalizing historic furniture in West Texas.
