personas:
  professional: Sreedhar, an aspiring teenage game developer and digital illustrator, merges his sketching talents with beginner‑level coding to prototype whimsical adventure games on his laptop, often
    staying up late after school to experiment with Unity while juggling school assignments.
  sports: Sreedhar, a member of the Fairfax Youth Soccer Club, enjoys cheering for the Washington Wizards and Washington Capitals, and participates in weekend basketball pickup games at the community center,
    though he often prioritizes drawing sessions over practice, leading to missed drills.
  arts: Sreedhar, a budding graphic artist, regularly enters online art challenges inspired by Hayao Miyazaki, Studio Ghibli, and indie comic creator Jim Lee, while also strumming acoustic covers of The
    Beatles and Ed Sheeran on his guitar during family gatherings.
  travel: Sreedhar, an enthusiastic traveler, has visited the Smithsonian National Air and Space Museum in Washington, D.C., the bustling streets of New Delhi during a family Diwali trip, and dreams of
    exploring Kyoto's temples, blending his love for history with his curiosity for diverse cultures.
  culinary: Sreedhar, a curious young cook, loves preparing dosa with coconut chutney and experimenting with spices like turmeric and mustard seeds, while also enjoying pizza with extra mozzarella and trying
    his hand at making mango lassi for dessert.
  core: Sreedhar, a creatively restless 13‑year‑old who juggles sketchbooks, code, and guitar strings, thrives on spontaneous projects, occasionally forgets deadlines, and balances cultural traditions with
    a modern teen’s curiosity.
background:
  cultural: Sreedhar comes from a South Asian (Tamil‑speaking Indian) family that immigrated to the United States. His household blends traditional customs—such as celebrating Diwali, fasting during certain
    festivals, cooking family recipes, and speaking Tamil at home—with American school life in Fairfax County. This dual cultural exposure fuels his appreciation for diverse artistic expressions and gives
    him a perspective that values both community heritage and individual creativity.
