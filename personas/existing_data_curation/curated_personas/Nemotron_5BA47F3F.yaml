  career_goals: Sreedhar dreams of merging his love for art and technology, aiming to become a multimedia creator who designs video games, animated stories, or interactive digital experiences. He is fascinated
    by the idea of producing immersive worlds that blend visual art, narrative, and code. In the longer term, he hopes to study graphic design or computer science at a specialized high school or college,
    eventually working in a creative tech studio where unconventional ideas are valued.
