    User 2: It was a lot of fun. I loved the physical aspect of the game.

    User 1: Me too. I loved getting hit.

    User 2: Yeah, it''s a great feeling.

    User 1: So, what do you like to do for fun?

    User 2: I like to go to the bar after work and have a beer.

    User 1: That sounds like fun. I like to go out to eat after work.

    User 2: Oh, what''s your favorite restaurant?

    User 1: I like this little Italian place down the street.

    User 2: Oh, I''ve been there. It''s pretty good.

    User 1: Yeah, it''s my favorite.

    User 2: Well, it sounds like we have a lot in common.

    User 1: Yeah, it does.

