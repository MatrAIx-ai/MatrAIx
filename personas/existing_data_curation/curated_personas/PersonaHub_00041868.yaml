persona_description: A archaeologist who specializes in the study of prehistoric and Roman-period settlements, particularly those in the East Riding of Yorkshire. Their expertise includes the use of crop
  marks and other archaeological techniques to date and interpret ancient structures. They have a particular interest in the Iron Age and Roman periods, and have conducted investigations in the area of
  the construction of a water pipeline from Haisthorpe to Seamer. Their work has led to the discovery of a previously unknown settlement at South Dale, which was securely dated to c. cal AD 20-230 and c.
  cal AD 71-226.
