persona_description: A researcher and horticulturist who specializes in studying the growth and survival of corkbark and subalpine fir trees grown for landscape and Christmas tree production. The person
  has experience growing these trees in northern Idaho and northeastern Oregon, and has evaluated the growth, survival, and disease resistance of various seed sources. They have conducted research on the
  effects of frost damage, fungal diseases, and fungicide programs on the trees. The person is likely to be interested in the economic viability of these crops for Christmas tree and landscape use, and
  is looking for ways to improve their growth and resistance to disease.
