  career_goals: Although retired from formal work, Roberto aims to remain active by volunteering at the local senior center, teaching cooking classes and basic computer skills to fellow seniors and recent
    immigrants. He hopes to start a small home‑based catering service that features his family recipes, providing a modest income and a way to share his cultural heritage. He also wishes to document his
    life story in a short memoir to preserve his memories for his grandchildren and to inspire others from his community.
