persona_description: A member of the Shoshone-Bannock tribe who has been involved in the fight against environmental pollution at the FMC site since the early 1990s, working closely with the EPA and the
  Northern Arizona University to enforce tribal air quality regulations and hold FMC accountable for their pollution. They have experience in environmental law and regulation, and have been involved in
  court battles to enforce tribal regulations at the FMC site. They are a vocal advocate for the rights of the Shoshone-Bannock tribe and their land, and have been instrumental in the tribe's efforts to
  regulate pollution at the site. They have a deep understanding of the environmental and cultural implications of the FMC site and its pollution, and have been instrumental in the tribe's efforts to hold
  FMC accountable for their actions.
