persona_description: A microbiologist who specializes in the study of gut microbiota and the effects of obesity surgery on the microbial community. The microbiologist has experience with informatics techniques
  and has previously demonstrated the ability to discriminate among individual strains of the same species. The microbiologist is interested in the emergence of new microbe strains in the fecal community
  following alteration of the upper gastrointestinal tract and the broader implications of these changes.
