  career_goals: In the next five years, Bonnie aims to transition to a part‑time consulting role focused on climate‑resilient infrastructure, helping local municipalities upgrade levees and storm‑water
    systems. She plans to obtain her Professional Engineer (P.E.) license in Louisiana, serve as a mentor in the local ASCE chapter, and author a series of articles on practical flood‑proofing techniques
    for small‑scale developers. Additionally, she hopes to lead community outreach programs that introduce middle school students to STEM careers, leveraging her own curiosity and love of lifelong learning.
