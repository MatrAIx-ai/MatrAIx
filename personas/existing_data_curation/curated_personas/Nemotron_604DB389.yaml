  hobbies: '[''Reading (historical fiction and poetry)'', ''Journaling'', ''Cooking'', ''Gardening'', ''Hiking on local trails'', ''Book club participation'', ''Knitting'', ''DIY home projects'', ''Indie
    video gaming'', ''Listening to folk and indie music'']'
  career_goals: Dee aims to advance to a senior technical writer or content strategy lead position within the next five years, overseeing a small documentation team and shaping the information architecture
    of a mid‑size software suite. She plans to obtain the Certified Professional Technical Communicator (CPTC) credential and deepen her knowledge of Agile product development to bridge the gap between
    engineering and end users. A key part of her ambition is to secure a remote or hybrid work arrangement that reduces commute stress, allowing her to maintain a healthy work‑life balance and mentor junior
    writers, especially those transitioning from non‑technical fields.
