personas:
  professional: Dee Bush is a technical writer who blends a humanities perspective with hands‑on web skills, delivering clear, user‑focused documentation while imposing structured processes despite a habit
    of occasional disorganization, and they often rely on flexible deadlines to accommodate their preference for adaptable workflows.
  sports: Dee Bush enjoys low‑impact fitness, trekking the Lake Erie shoreline trails on weekends, cheering for the Cleveland Browns and Guardians from a modest home‑office setup, and they avoid high‑intensity
    gym workouts in favor of steady, solitary walking.
  arts: Dee Bush deepens their appreciation for historical fiction by Hilary Mantel, contemporary poetry from Ocean Vuong, and the folk‑indie melodies of Sufjan Stevens, Bon Iver, and the Decemberists,
    and they often knit scarves while listening to vinyl and debating literary themes in a small, intimate book club.
  travel: Dee Bush prefers quiet road trips to historic towns such as Williamsburg, VA and the Amish countryside of Lancaster, PA, planning itineraries on a whiteboard at home, favoring cozy B&Bs over busy
    hotels, and they sometimes limit longer voyages due to budget constraints.
  culinary: Dee Bush experiments with seasonal cooking, regularly preparing dishes like roasted root‑vegetable medley with sage, homemade apple butter, and a garden‑fresh tomato‑basil pasta, and they also
    master the fermentation of kimchi using locally sourced napa cabbage.
  core: Dee Bush balances a meticulous, structure‑driven career in technical communication with a quiet love for solitary hobbies, a habit of worrying about the future, and a quirky tendency to let household
    plants wilt until they’re salvaged.
background:
  cultural: Born and raised in North Ridgeville, Ohio, Dee reflects the Midwestern cultural mix of modesty, community orientation, and a strong work ethic. Her family’s ancestry is primarily German and
    Irish, and she grew up in a predominantly white, middle‑class suburb where church and local events played a central role. The region’s industrial heritage and Great Lakes proximity have shaped her appreciation
    for practical problem‑solving, while the local arts scene—small museums, community theater, and seasonal festivals—nurtured her love for storytelling and creative expression.
attributes:
  skills: '[''Technical Writing'', ''User Experience (UX) Writing'', ''Content Strategy'', ''HTML/CSS'', ''JavaScript basics'', ''Data Visualization'', ''Project Coordination'', ''Agile Methodologies'',
