  career_goals: Cordelia aims to advance within the customer service field by first becoming a senior representative and then moving into a team‑lead role within the next two years. She plans to enroll
    in a part‑time associate degree program in Business Administration to gain formal management knowledge, and to earn a Certified Customer Service Professional (CCSP) credential. Long‑term, she aspires
    to become a Customer Experience Manager, overseeing training, quality assurance, and process improvement initiatives for a regional call center. She also sees herself mentoring new hires and contributing
    to community outreach programs that improve consumer education.
