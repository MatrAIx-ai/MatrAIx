personas:
  professional: Giang Huynh, a kindergarten classroom helper, organizes block‑building stations, using their curiosity‑practical balance to devise imaginative structures while their relaxed view of rules
    lets them smoothly mediate group play, demonstrating calm leadership.
  sports: Giang Huynh bursts with energy on the playground, loves the summer soccer league with the River Rapids Kids' Soccer Club, and eagerly cheers for the professional team Blue City FC during weekend
    TV games, blending a love of team spirit with personal activity.
  arts: Giang Huynh delights in drawing whimsical characters inspired by Dr. Seuss, sings impromptu renditions of Disney classics like 'Let It Go' from Frozen and 'Under the Sea' from The Little Mermaid,
    and watches 'Sesame Street' to mimic the playful humor of Elmo and Big Bird.
  travel: Giang Huynh enjoys family road trips to nearby Clearwater Beach, treasures the sand‑castle competitions there, and dreams of seeing the magical kingdom of Disneyland in California after watching
    it on TV, preferring relaxed itineraries over packed schedules.
  culinary: Giang Huynh loves peanut butter and jelly sandwiches, relishes spaghetti topped with marinara sauce and a sprinkle of parmesan, enjoys sliced mango and apple slices, and proudly helps stir batter
    for banana pancakes, even if the kitchen often ends up messier than intended.
  core: Giang Huynh is a curious, easy‑going five‑year‑old who oscillates between building elaborate block towers and splurging on stickers, all while staying remarkably calm, sociable, and slightly chaotic
    in their playful world.
background:
  cultural: Giang is a first‑generation Vietnamese‑American living in Raymore, Missouri. At home he speaks Vietnamese with his parents and celebrates Vietnamese traditions such as Tet, enjoying foods like
    pho, bánh mì, and fresh spring rolls. He also embraces typical Midwestern experiences, attending local school activities, celebrating American holidays, and participating in community sports. His upbringing
    blends respect for family and elders with a strong sense of community harmony, shaping his kind, cooperative, and resilient personality.
