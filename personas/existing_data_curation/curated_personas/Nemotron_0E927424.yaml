    ''Community liaison and networking'', ''Organizational planning and case management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading historical fiction and poetry'', ''Solving puzzles and brain teasers'', ''Gardening native Texas plants'',
    ''Cooking Southern and Creole cuisine'', ''Attending small literary readings'', ''Volunteering at community arts programs'', ''Collecting vintage postcards'', ''Walking tours of historic Dallas neighborhoods'']'
  career_goals: Fannie aims to transition from active field work to a mentorship role, training the next generation of detectives—especially women of color—through workshops that integrate investigative
    methods with cultural competency. She is pursuing the resolution of a series of unsolved art thefts linked to local heritage sites, hoping to publish a comprehensive case study. In the next five years,
    she plans to author a memoir that weaves her investigative experiences with reflections on Black art and history, and to establish a community outreach program that uses storytelling and art to raise
    awareness about crime prevention in Dallas neighborhoods.
