personas:
  professional: Fannie Collier, a seasoned private investigator in Dallas, blends meticulous case management and forensic photography with a deep appreciation for art history, and they now channel their
    curiosity and methodical nature into mentoring upcoming detectives—particularly women—through workshops that fuse investigative rigor with cultural competency.
  sports: Fannie Collier enjoys low‑impact fitness, joining a senior walking club that tours historic Dallas neighborhoods, cheering the Dallas Cowboys on Sundays, and occasionally playing mixed doubles
    tennis at a local community center, while they prefer the league of comfort over high‑intensity training.
  arts: Fannie Collier spends weekends sketching urban Dallas scenes in watercolor, absorbing works by Georgia O'Keeffe at the Dallas Museum of Art, and curating literary salons where they discuss poetry
    by Langston Hughes and historical fiction, all of which feed their creative soul.
  travel: Fannie Collier favors thoughtfully planned cultural trips, having explored the art galleries of Paris and the Creole kitchens of New Orleans, while they dream of a leisurely pilgrimage to Savannah’s
    historic squares and the Hill Country vineyards, always booking boutique tours that allow ample time for sketching and reflection.
  culinary: Fannie Collier cooks Southern‑Creole dishes with confidence, perfecting gumbo brimming with okra, smoked sausage, and filé powder, and they relish pairing their meals with locally sourced collard
    greens and fresh Gulf shrimp, though they sometimes over‑season, leaving a lingering heat that reminds them of a hot Texas summer.
  core: Fannie Collier is a methodical art‑savvy investigator who transforms solitary curiosity into community mentorship, all while juggling a penchant for puzzle‑solving, over‑seasoned gumbo, and a habit
    of keeping every receipt in a leather‑bound notebook.
background:
  cultural: Fannie is a Black woman whose family has deep roots in the Southern United States, with grandparents who migrated from Mississippi during the Great Migration and settled in Dallas. Growing up
    in a close-knit African-American community, she was immersed in church traditions, gospel music, and a strong emphasis on education and civic engagement. Her graduate studies in arts and humanities
    reinforced a lifelong appreciation for Black visual art, literature, and cultural history. These influences inform her investigative perspective, allowing her to connect cultural nuance with factual
    inquiry, and drive her commitment to uplifting underrepresented voices in her professional and community work.
attributes:
  skills: '[''Surveillance and covert observation'', ''Interviewing and interrogation techniques'', ''Evidence collection and preservation'', ''Forensic photography'', ''Digital research and OSINT'', ''Data
