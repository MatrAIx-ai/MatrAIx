  career_goals: Michael aspires to a career that blends his practical orientation, competitive drive, and love of systematic problem‑solving. He aims to pursue a technical pathway, ideally in mechanical
    or software engineering, with a focus on robotics or automotive technology. He plans to attend a vocational high school that offers advanced courses in engineering, obtain industry certifications (such
    as Autodesk or Cisco), and later earn a bachelor’s degree in engineering. In the long term he envisions working in a structured, project‑based environment where his reliability and analytical skills
    can contribute to designing functional, reliable systems, and possibly founding his own small‑scale tech repair or design business.
