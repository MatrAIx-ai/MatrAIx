  hobbies: '["Soccer practice and matches", "Organizing neighborhood games", "Building LEGO sets", "Scratch programming projects", "Reading adventure/mystery books", "Playing strategy board games (chess,
    Settlers of Catan)", "Cooking Spanish dishes with family", "Participating in school science fairs"]'
  career_goals: Esteban dreams of turning his love for soccer into a professional career while also pursuing a strong academic path. He hopes to earn a soccer scholarship that will allow him to study engineering
    at a top university, eventually working on aerospace projects that combine his fascination with space and his talent for problem‑solving. In the short term, he aims to become captain of his school’s
    soccer team, win the regional science fair with a robotics project, and maintain top grades that keep his options open for both athletics and STEM fields.
