personas:
  professional: Esteban is a disciplined junior programmer who builds meticulous Scratch games, leads their friends in structured play sessions, and applies the same organized precision to their LEGO constructions
    and school assignments, while they also mentor younger peers during after‑school coding clubs.
  sports: Esteban plays midfield for the Hollywood Hurricanes youth soccer team, practices three times a week, organizes neighborhood scrimmages with strict rules and scorekeeping, and passionately follows
    the Baltimore Orioles and FC Barcelona, cheering for both in equal measure, while they keep a notebook of match statistics.
  arts: Esteban devours adventure novels by Lemony Snicket, admires the vibrant paintings of Joaquín Sorolla, watches Pixar’s "Up" and Studio Ghibli’s "Spirited Away," and creates LEGO sculptures inspired
    by Antoni Gaudí’s whimsical architecture, all of which they discuss enthusiastically with friends.
  travel: Esteban loves weekend trips to Ocean City’s boardwalk, dreams of exploring Barcelona’s Sagrada Família and Seville’s bustling markets, and always packs a colorful checklist of landmarks, snack
    stops, and soccer fields for each adventure, while they meticulously compare travel itineraries with their family.
  culinary: Esteban helps their family prepare tortilla de patatas and paella on Saturdays, relishes Chesapeake Bay crab cakes seasoned with Old Bay, and enjoys experimenting with fresh basil and saffron,
    while they consider a mango‑topped quesadilla their favorite snack.
  core: Esteban blends a relentless love of structure with boundless energy, turning every soccer game, LEGO build, and family dinner into a meticulously organized adventure that reflects their disciplined
    yet sociable spirit, while they constantly seek new ways to improve their skills.
background:
  cultural: Esteban’s family maintains strong ties to their Spanish heritage while fully embracing life in the United States. At home, Spanish is spoken alongside English, giving him fluency in both languages.
    Family gatherings often feature traditional foods such as paella, gazpacho, and tortilla de patatas, and holidays like Semana Santa are celebrated with music, storytelling, and regional customs. Living
    in Hollywood, Maryland, he also enjoys local traditions like crab feasts and community fairs, blending coastal Maryland culture with his Iberian roots. This dual cultural environment nurtures his bilingual
    abilities, love for Mediterranean cuisine, and appreciation for both Spanish and American community values.
