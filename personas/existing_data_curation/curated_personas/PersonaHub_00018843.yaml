persona_description: A plant researcher who specializes in using PCR to detect and sequence genes in plants. They are passionate about their work and have a deep understanding of the techniques involved,
  including the challenges of working with plant species that contain phenolic compounds that deter herbivores. They are creative thinkers and have developed a solution to this problem, using an additive
  to successfully amplify DNA from once problematic plants. They are also interested in the potential applications of PCR in plant research and are looking for ways to improve the reliability of PCR in
  plant sciences.
