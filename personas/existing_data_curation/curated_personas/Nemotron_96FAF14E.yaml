personas:
  professional: An aspiring software developer, Sompong Ung leverages self‑taught Python, Scratch, and Arduino skills to design solitary, curiosity‑driven educational tools, while their relaxed attitude
    toward deadlines and penchant for tinkering shape a flexible, prototype‑centric workflow.
  sports: Though preferring solitary walks in the nearby park, Sompong Ung follows the English Premier League’s Liverpool FC and the NBA’s Golden State Warriors on TV, and belongs to a weekend community
    cycling group that meets at the local velodrome, while they avoid team sports due to a dislike of crowded gyms.
  arts: Creatively inclined, Sompong Ung spends evenings crafting digital illustrations inspired by the surreal palettes of Bee Bee Bee and listening to ambient soundscapes by Brian Eno and Max Richter,
    while occasional late‑night viewings of Hayao Miyazaki’s animated films shape their storytelling aesthetic.
  travel: Travel‑wise, Sompong Ung favors meticulously planned solo trips, having explored the historic temples of Kyoto and trekked the misty highlands of Scotland, while dreaming of a future pilgrimage
    to the ancient ruins of Machu Picchu, preferring low‑key backpacking over crowded tours and budgeting travel through careful cost‑splitting apps.
  culinary: In the kitchen, Sompong Ung excels at recreating fragrant lemongrass‑infused noodle dishes like stir‑fried rice noodles with tamarind, peanuts, and bean sprouts, as well as a spicy broth of
    galangal, kaffir‑lime leaves, shrimp, fish sauce, and fresh herbs, treating each family dinner as a hands‑on experiment that often stretches late into the night despite occasional over‑seasoning miscalculations.
  core: Sompong Ung is a quiet 16‑year‑old tech‑savvy dreamer who compulsively journals, hoards Arduino parts, neglects a tidy workspace, and occasionally loses track of time while immersed in sci‑fi worlds.
background:
  cultural: Sompong is a second-generation Southeast Asian American of Thai descent. At home, Thai language, customs, and celebrations such as Songkran are observed, and meals often feature fragrant herbs
    and spices from his heritage. Growing up in Dyer, Indiana, he blends Midwestern values of modesty and independence with Thai cultural emphasis on family respect, harmony, and hospitality. This bicultural
    upbringing informs his kindness, cooperative spirit, and the way he balances curiosity with practical, grounded approaches.
