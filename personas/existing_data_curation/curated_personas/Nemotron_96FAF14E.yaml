  career_goals: Sompong aims to finish high school and earn a certification in computer programming, eventually working as a software developer or creator of educational tools that support independent learners.
    He also hopes to preserve his cultural heritage by developing a food‑tech platform that shares Thai recipes, or by studying culinary arts alongside technology. He values flexibility, remote work, and
    opportunities that let him balance practical projects with his curiosity.
