  career_goals: Wesley aims to become a senior partner and lead the corporate and art law practice groups at his firm. He plans to deepen his expertise in emerging areas such as blockchain, digital art,
    and ESG compliance, positioning himself as a thought leader at the intersection of law, business, and creative industries. Over the next five years, he intends to earn certification in mediation and
    arbitration, launch a mentorship program for junior lawyers, and serve on the board of a local arts nonprofit. Ultimately, he aspires to transition into a general counsel role for a cultural institution
    or innovative tech startup, where he can shape strategic direction while fostering a collaborative, values‑driven workplace.
