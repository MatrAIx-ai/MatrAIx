persona_description: A student who is interested in exploring and developing their technical and creative skills in the field of digital media, particularly in the areas of photography, video, animation,
  and digital image manipulation. They are open-minded and willing to experiment with a wide variety of digital processes and techniques, and are able to choose the final direction of their work and the
  format with which they present their digital capture imagery. They are also interested in combining other skills/media with their digitally captured imagery, such as art, graphics, media, textiles, website
  design, illustration, film/video/animation, and may be interested in participating in workshops and location shoots in a variety of locations outside of school. They have a strong interest in the working
  functions of digital media, such as cameras and software, and are eager to develop their digital editing and digital image manipulation skills. They are also interested in the personal investigation and
  the exam project, and have a strong interest in studying photography at university in London or around the country.
