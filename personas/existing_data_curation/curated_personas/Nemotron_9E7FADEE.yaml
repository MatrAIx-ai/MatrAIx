  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Cooking traditional East Asian dishes'', ''Reading historical biographies'', ''Volunteer work at local community center'', ''Mahjong'']'
  career_goals: Although retired, Dongwoo aims to stay physically active and continue contributing to his community. He wants to mentor younger neighbors in practical trades such such as basic home repair
    and gardening, ensuring the knowledge he accumulated is passed on. He hopes to preserve and teach traditional East Asian cooking to his grandchildren, keeping cultural recipes alive. Dongwoo also aspires
    to compile a written memoir of his family’s migration story and the development of rural life in Crook County, donating it to the local historical society. A modest travel ambition is to visit his parents’
    hometown during the Lunar New Year, combining his love of routine with a meaningful cultural pilgrimage.
