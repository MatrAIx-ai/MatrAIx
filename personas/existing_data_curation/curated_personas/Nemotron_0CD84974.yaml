  career_goals: Even though she is only three, Jennifer voices big‑picture dreams that blend her love of caring for others with her curiosity about the world. She often says she wants to be a teacher who
    reads stories to younger children, a veterinarian who helps animals feel better, and an explorer who discovers bugs in the backyard. She aims to learn to ride a tricycle without training wheels, read
    picture books all by herself, and someday be a comforting presence for friends when they feel sad or scared.
