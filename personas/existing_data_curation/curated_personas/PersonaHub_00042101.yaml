persona_description: A technology and sustainability advocate who is interested in the potential of advanced vehicle, infrastructure, and aftermarket technologies to reduce the amount of oil our country
  consumes and ease pain at the pump. They are familiar with the report released by AAA and the Information Technology Industry Council (ITI) along with the Intelligent Transportation Society of America
  (ITS America), the Information Technology and Innovation Foundation (ITIF), the Center for Clean Energy Innovation (CCEI), and the Digital Energy and Sustainability Solutions Campaign (DESCC). They are
  also aware of the potential of gas-electric hybrid, plug-in hybrid, battery electric, hydrogen fuel cell, and compressed natural gas vehicles to offer tremendous fuel efficiency gains when compared to
  average conventional gasoline vehicles.
