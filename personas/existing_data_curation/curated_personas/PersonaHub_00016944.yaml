persona_description: A biologist or immunologist who is interested in the study of antibodies and their structures, especially those from vertebrates and cartilaginous fish. They are particularly curious
  about the differences and similarities between the heavy-chain antibodies from camelids and those from other vertebrates, and the potential applications of single-domain antibodies in drug development.
  They may also be interested in the phylogenetic relationships between different species of cartilaginous fish and the potential implications for their immune systems.
