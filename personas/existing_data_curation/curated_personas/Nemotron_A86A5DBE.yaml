  career_goals: Although retired, John aims to remain an active contributor to his community. His primary ambition is to mentor emerging small‑business owners through the local chamber of commerce and a
    senior‑led advisory board at the community college. He also hopes to document and publish a memoir of Appalachian life, preserving stories for future generations. In addition, John plans to expand his
    involvement with his church’s outreach program, helping to manage resources and coordinate assistance for families in need, while maintaining his personal health and financial independence.
