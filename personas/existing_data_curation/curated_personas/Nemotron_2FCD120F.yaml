  hobbies: '[''Cooking traditional Mexican dishes'', ''Hosting family gatherings'', ''Attending church and community festivals'', ''Dancing to folk music'', ''Gardening'', ''Knitting and crocheting'', ''Listening
    to telenovelas and radio dramas'', ''Walking in local parks'', ''Participating in senior center activities'', ''Reading Spanish-language poetry'', ''Writing personal memoirs'']'
  career_goals: Matilde’s main ambition is to keep sharing her cultural legacy while staying practical about her health and daily routine. She aims to compile a handwritten family cookbook of traditional
    recipes, digitize it with her grandchildren’s help, and donate copies to the local senior center and community library. She hopes to mentor younger members of the Mexican‑American community in cooking
    and storytelling through weekly workshops at the senior center. Maintaining her social connections, staying physically active, and attending local cultural festivals are also important goals. Matilde
    wishes to continue learning new ways to document her life stories, possibly recording oral histories for a local museum project.
