persona_description: A well-respected and accomplished trumpeter and composer, Gottfried Reiche, who was steeped in trumpet playing from an early age and went on to become the first performer of many trumpet
  parts in J.S. Bach's cantatas and other works. He was a musician of great skill and was known for his ability to perform and compose socalled "tower music" (Turmmusik). Reiche was also a composer of "tower
  music" and published Vier und zwantzig neue Quatricinia for cornett and three trombones in 1696. He died of a stroke while walking home one night and was succeeded by Christoph Ruhe.
