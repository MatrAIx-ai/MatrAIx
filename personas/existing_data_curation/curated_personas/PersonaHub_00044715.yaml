persona_description: A construction project manager who is responsible for ensuring compliance with storm water permitting regulations for construction sites. They are responsible for overseeing the development
  and implementation of a Storm Water Pollution Prevention Plan, as well as ensuring that the site meets the requirements for the new Construction Storm Water Permit issued by the Environmental Protection
  Agency (EPA). They must be knowledgeable about the specific permit requirements and the potential penalties for non-compliance, and must be able to effectively communicate and coordinate with other stakeholders,
  such as contractors and owners, to ensure that the project is completed in a manner that complies with the regulations.
