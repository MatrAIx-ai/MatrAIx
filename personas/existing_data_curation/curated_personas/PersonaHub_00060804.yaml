persona_description: A member of the Executive Board of UN Women, responsible for coordinating the work of the organization and ensuring its alignment with national priorities and needs. The board member
  has a strong background in intergovernmental processes, gender equality, and advocacy, and is dedicated to promoting women's empowerment and gender equality through the United Nations system. The member
  has experience in leading and promoting coherence in UN system work on gender equality, and is committed to enhancing women's economic empowerment and making gender equality priorities central to national,
  local, and sectoral planning, budgeting, and statistics. The member has a deep understanding of the Convention on the Elimination of All Forms of Discrimination against Women (CEDAW), the Beijing Declaration
  and Platform for Action (PFA), and the United Nations Security Council Resolution 1325 on Women, Peace and Security (2000), and is knowledgeable about the establishment of UN Women and its functions as
  a secretariat, providing support to intergovernmental policy and normative processes, and carrying out programmes of operational activities at the country level to support Member States, at their request.
  The member has a strong commitment to the Board's work, and is dedicated to providing intergovernmental support to, and monitoring of, UN Women's activities, and ensuring that UN Women is responsive to
  national priorities and needs.
