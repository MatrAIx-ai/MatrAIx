    community events'']'
  career_goals: Haydn aims to attend a high school with strong arts and communications programs, then pursue a bachelor's degree in media studies or arts management. He envisions a career where he can blend
    his love for visual storytelling, event coordination, and community engagement—such as becoming a creative director for a marketing agency, a curator for a regional museum, or a public relations specialist
    for non‑profit arts organizations. In the longer term, he hopes to establish a youth arts center in Orion that offers workshops in digital media, performance, and leadership, enabling other teenagers
    to explore their creative potential.
