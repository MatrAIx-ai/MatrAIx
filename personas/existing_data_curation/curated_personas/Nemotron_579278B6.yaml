personas:
  professional: Haydn Solomon, a budding multimedia storyteller, blends sketching, digital illustration, acoustic guitar, and Scratch game coding into engaging YouTube tutorials, while they leverage their
    organized, sociable, and calm demeanor to lead stage design projects in the school drama club.
  sports: Haydn Solomon enjoys after‑school pickup basketball, follows the Los Angeles Lakers and the New York Yankees, and maintains fitness by swimming with a local youth swim club on weekends, though
    they often skip the scheduled jogs to spend extra time on stage rehearsals.
  arts: Haydn Solomon draws artistic inspiration from Vincent van Gogh, Frida Kahlo, and digital illustrator Loish, strums acoustic renditions of John Mayer and Ed Sheeran on guitar, and regularly attends
    school productions of Lin‑Manuel Miranda’s works while exploring local gallery openings featuring emerging contemporary artists.
  travel: Haydn Solomon loves curated day trips to nearby museums, has explored the Natural History Museum in London during a school exchange, dreams of wandering the Louvre in Paris and Kyoto’s Arashiyama
    bamboo forest, and prefers meticulously planned itineraries that balance art‑focused activities with budget‑friendly hostel stays.
  culinary: Haydn Solomon prefers quick, creative meals such as avocado toast with smoked salmon, homemade sushi rolls, and occasional taco nights, enjoys experimenting with fresh basil, lime, and chili,
    but often forgets to finish homework before snacking on cereal during late‑night art sessions.
  core: Haydn Solomon is an organized, talkative teen who channels boundless curiosity into sketching, coding, and community events, while occasionally procrastinating on chores in favor of artistic pursuits.
background:
  cultural: Haydn was raised in Orion, a small town in Rock Island County, Illinois, within a family of German‑Irish descent. His upbringing reflects typical Midwestern values of modesty, community involvement,
    and a strong work ethic. He grew up attending the local Lutheran church, where seasonal festivals and communal gatherings reinforced a sense of belonging. The cultural life of the Quad Cities—museums,
    theater productions, and regional music festivals—has provided him with exposure to a broader arts scene, while his family’s appreciation for both traditional crafts and contemporary media nurtured
    his curiosity and openness to new ideas.
