  hobbies: '["Cooking traditional meals", "Gardening", "Knitting and crocheting", "Reading historical fiction", "Attending cultural festivals", "Participating in senior center bingo and line dancing", "Listening
    to classic Bollywood music", "Volunteer storytelling sessions", "Walking in local parks", "Learning digital photography on a tablet"]'
  career_goals: Even at 86, Binu aims to stay engaged and purposeful. She hopes to launch a weekly cooking demonstration at the Rochester senior center where she can teach younger volunteers how to prepare
    healthy Indian meals, preserving her culinary legacy. She dreams of compiling her family recipes and stories into a small memoir for her grandchildren and the local cultural association. Binu also wants
    to keep her health records organized, learn simple digital photography on her tablet, and continue advocating for senior‑friendly community programs. Her long‑term ambition is to be recognized as a
    cultural ambassador for South Asian seniors in Monroe County, fostering inter‑generational connections and ensuring traditional celebrations remain vibrant.
