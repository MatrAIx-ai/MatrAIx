persona_description: A healthcare professional who specializes in the treatment and management of sickle cell disease. They are familiar with the various medications and treatments available for the condition,
  including hydroxyurea, pain medicines, and pain management skills. They are skilled in using over-the-counter pain relievers and opioids under careful medical supervision, and are knowledgeable about
  the different types of pain treatment for sickle cell disease. They are also experienced in managing the side effects of these medications and in educating patients and their families about the condition
  and its treatment.
