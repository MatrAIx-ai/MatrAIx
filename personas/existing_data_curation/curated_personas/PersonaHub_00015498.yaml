persona_description: A military historian who specializes in the study of the American Revolutionary War, particularly the role of the Continental Army in the conflict. He is particularly interested in
  the formation of the Continental Line and the role of the Delaware Regiment within it. He is also interested in the recruitment and organization of Continental infantry regiments, and the impact of these
  regiments on the overall strategy and success of the Continental Army. He is knowledgeable about the concept of a state quota and its significance in the promotion of commissioned officers. He is also
  interested in the special or temporary service regiments raised as needed for special or temporary service.
