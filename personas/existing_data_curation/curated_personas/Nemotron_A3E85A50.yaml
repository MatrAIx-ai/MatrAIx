personas:
  professional: Michael Gotch, a seasoned CDL‑qualified commercial driver with six years on the Southeast long‑haul routes, leverages their meticulous vehicle‑inspection skills, fleet‑management software
    expertise, and natural communication talent to deliver on‑time freight while fostering a collaborative, safety‑first crew environment.
  sports: Michael Gotch, who follows the Charleston Battery soccer team and the Atlanta Hawks for basketball, they enjoy playing pick‑up games at the Ridgeville community court every Thursday night, hiking
    the Francis Marion National Forest trails each weekend, and participating in a local 5K charity run supporting youth mentorship programs.
  arts: Michael Gotch, an avid visitor of Charleston’s art galleries and mural tours, they capture street‑art photography during road trips, curate a personal playlist featuring Miles Davis, Kendrick Lamar,
    and Burna Boy to accompany their creative explorations, and occasionally volunteer to organize community art‑show fundraisers at their church.
  travel: Michael Gotch prefers spontaneous road‑trip adventures along the Gulf Coast, they plan routes with GPS to include stops at Asheville’s craft breweries, Savannah’s historic squares, and the Blue
    Ridge Parkway’s scenic overlooks, while budgeting mileage reimbursements to fund occasional flights to New Orleans for its vibrant music festivals.
  culinary: Michael Gotch enjoys experimenting in their modest kitchen, skillfully preparing shrimp and grits with a hint of smoked paprika and peppercorn‑spiced chicken thighs, occasionally adding exotic
    spice blends inspired by their globe‑spanning playlists, and treats themselves to weekend brunches at local farmer’s markets for fresh collard greens and sweet potatoes.
  core: Michael Gotch is a curiosity‑driven, organized trucker who blends logistics expertise with a love for art, music, and community service, often juggling late‑night photo edits with early‑morning
    route checks, while they occasionally neglect personal health in pursuit of ambitious career goals.
background:
  cultural: Michael is an African‑American raised in Ridgeville, South Carolina, with deep roots in the region’s Gullah heritage and a strong connection to his Ghanaian lineage—reflected in his middle name,
    Yaw. He grew up attending a historically Black church, participating in community gatherings that blend Lowcountry traditions with West African rhythms and cuisine. This cultural mix informs his worldview,
    values of cooperation, and pride in contributing to his community while honoring his ancestral heritage.
attributes:
  skills: '[''Commercial Driving (CDL)'', ''Vehicle Inspection & Maintenance'', ''Route Optimization using GPS & Logistics Software'', ''Customer Service & Sales'', ''Inventory & Load Management'', ''Regulatory
    Compliance (DOT, OSHA)'', ''Effective Communication'', ''Team Coordination & Mentorship'', ''Problem Solving under Pressure'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Street photography during road trips'', ''Listening to jazz, hip‑hop, and African music'', ''Playing pick‑up basketball'', ''Volunteering at
    church youth programs'', ''Cooking Southern and Ghanaian dishes'', ''Hiking local nature trails'', ''Reading entrepreneurship books'', ''Attending community festivals'']'
  career_goals: Michael aims to advance from driver to fleet manager within the next two years, pursuing a certification in fleet operations and completing an associate’s degree in Logistics and Supply
    Chain Management. He wants to oversee a regional team of drivers, implement safety and sustainability initiatives, and eventually launch his own minority‑owned trucking company that emphasizes eco‑friendly
    freight solutions. Alongside professional growth, he hopes to become a mentor for young people in Ridgeville, encouraging them to explore careers in transportation and logistics.
