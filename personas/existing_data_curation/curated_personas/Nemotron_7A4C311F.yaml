  career_goals: Approaching retirement, Felipe aims to leave a lasting legacy by institutionalizing a mentorship program that pairs seasoned detectives with new recruits, fostering both skill transfer and
    emotional support. He wants to champion a data‑driven community policing model that integrates predictive analytics while respecting long‑standing neighborhood relationships, especially within the Mexican‑American
    community. Felipe is also interested in serving as a consultant for other jurisdictions, advising on culturally sensitive policing policies and stress‑management practices for officers. Ultimately,
    he hopes to ascend to an advisory role at the department’s precinct level before fully transitioning to part‑time consulting and volunteer work.
