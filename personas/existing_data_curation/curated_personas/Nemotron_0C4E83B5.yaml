personas:
  professional: Olivia Jacques is a veteran housekeeping specialist with three decades of meticulous cleaning expertise, now leveraging her methodical scheduling, inventory control, and calm assertiveness
    to mentor junior staff and pursue a supervisory certification that will pave the way for her own home‑based cleaning business in Ostrander.
  sports: Olivia Jacques stays active through water‑aerobics and a neighborhood walking club, passionately supports the local Ostrander High School Tigers basketball team and the Cleveland Browns, and enjoys
    the mental challenge of bridge tournaments at the senior center, though she sometimes skips a workout when a church event runs late.
  arts: Olivia Jacques finds creative fulfillment in singing alto in her United Methodist choir, quilting intricate patchwork quilts inspired by traditional folk motifs, and devouring Agatha Christie mysteries,
    while her evenings often include listening to Johnny Cash and the occasional classic TV musical starring Julie Andrews.
  travel: Olivia Jacques prefers low‑stress road trips that blend family visits and garden tours, frequently driving to her daughter’s house in Michigan and planning a spring pilgrimage to the tulip fields
    of Lisse, Netherlands, while budgeting carefully to keep airfare and lodging within her modest retirement savings.
  culinary: Olivia Jacques delights in baking classic Midwestern pies—apple, cherry, and rhubarb crumble—using fresh basil, rosemary, and tomatoes from her porch garden to whip up hearty chicken pot pies
    and sourdough bread, though her tendency to over‑bake croissants sometimes leaves a smoky aroma lingering in the kitchen.
  core: Olivia Jacques blends a love for orderly routines, community service, and creative expression, balancing a disciplined approach to work and money with occasional quirks like hoarding cleaning supplies
    and over‑baking pastries.
background:
  cultural: Olivia grew up in a small Midwestern town in Ohio, raised in a working‑class family with German and Irish ancestry. The region’s emphasis on hard work, reliability, and neighborly support shaped
    her values and pragmatic outlook. She attended a local community college, taking courses that broadened her skills but ultimately chose a hands‑on career in housekeeping. Her cultural identity is rooted
    in Midwest traditions such as celebrating seasonal holidays with family meals, participating in church‑based activities, and contributing to local volunteer efforts. These influences reinforce her preference
    for structure, community involvement, and the practical application of skills.
