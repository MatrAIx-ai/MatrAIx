  hobbies: '[''Gardening'', ''Baking pies and breads'', ''Church choir and community service'', ''Water aerobics and group walking'', ''Playing bridge'', ''Quilting'', ''Line dancing at local fairs'', ''Reading
    mystery novels'']'
  career_goals: Olivia aims to transition into a supervisory role within her current cleaning service, leveraging her experience to mentor younger workers and oversee a small team. She plans to earn a professional
    cleaning certification to enhance her credibility and eventually launch a modest, home‑based cleaning business that offers personalized services to the Ostrander community. Financial independence and
    a stable retirement are central goals, as is maintaining flexibility to spend time with grandchildren and volunteer at local senior centers. Olivia also hopes to contribute to community outreach programs
    that provide free housekeeping assistance to low‑income seniors.
