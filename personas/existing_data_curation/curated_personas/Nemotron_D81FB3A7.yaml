personas:
  professional: Susana Guy, a veteran television camera operator and video editor with over three decades of experience, leverages meticulous shot planning, collaborative crew leadership, and a practical,
    structured approach to deliver flawless broadcasts while mentoring emerging talent and championing community‑focused storytelling projects.
  sports: Susana Guy stays active by walking the trails of Hocking Hills State Park and participating in the Canton YMCA walking club, and they cheer the Cleveland Browns on Sundays and the Cleveland Cavaliers
    during the NBA season, while reserving weekends for friendly bridge tournaments that double as mental fitness drills.
  arts: Susana Guy’s artistic side shines through their amateur photography, inspired by Ansel Adams’ landscapes and the vivid color palettes of Ohio folk artists, and they regularly contribute prints to
    the Stark County Historical Society exhibitions, while also enjoying the classic film scores of Ennio Morricone during editing sessions.
  travel: Susana Guy prefers meticulously planned trips that combine gentle adventure and cultural immersion, and they schedule an annual fall road‑trip to Hocking Hills, a recent weekend getaway to Asheville,
    North Carolina to explore Appalachian craft villages, and nurture a longing to visit the historic gardens of Kyoto, Japan, all budgeted within their retirement savings plan.
  culinary: Susana Guy, an enthusiastic home cook, relishes mastering regional Ohio dishes like chicken and dumplings, buckeye candy, and crisp apple‑infused pork loin, and they regularly incorporate fresh
    herbs, locally sourced apples, and sweet potatoes into their recipes, showcasing their creations at community potlucks after attending monthly cooking classes.
  core: Susana Guy blends structured professionalism with community‑centric warmth, and they balance a ledger‑like budgeting habit, diligent health monitoring, a passion for photography and gardening, and
    an occasional penchant for procrastinating on tech upgrades.
background:
  cultural: Susana grew up in a small town in northeastern Ohio during the 1960s and 1970s, shaped by the region’s Midwestern values of hard work, practicality, and community solidarity. Her family’s German‑American
    heritage fostered a respect for tradition and a strong sense of responsibility. The industrial decline of the Rust Belt era cultivated in her a pragmatic outlook and an appreciation for collaborative
    support networks. She attended Stark County Community College, where she began studying broadcast production before entering the workforce full‑time. Her cultural identity is reflected in her emphasis
    on reliability, her participation in local church and civic events, and her commitment to preserving and sharing the stories of her community.
attributes:
  skills: '[''Multi-camera operation'', ''Live broadcast production'', ''Video editing (Avid Media Composer, Adobe Premiere Pro)'', ''Color correction and grading'', ''Lighting design and rigging'', ''Audio
    capture and synchronization'', ''Media asset organization and archiving'', ''Shot planning and script breakdown'', ''Compliance with FCC broadcast standards'', ''Crew coordination and leadership'',
    ''Equipment maintenance and troubleshooting'', ''Digital workflow optimization'']'
  hobbies: '[''Community garden club participation'', ''Volunteer work at local senior center'', ''Weekly book club member'', ''Bridge (card game) tournaments'', ''Amateur photography and local history
    exhibits'', ''Cooking classes focusing on Ohio regional dishes'', ''Line‑dancing classes'', ''Hiking in nearby state parks'', ''Participating in community theater workshops'']'
  career_goals: Susana aims to leverage her extensive technical background into a senior production management role where she can mentor emerging talent and lead community‑focused storytelling projects.
    She aspires to develop a locally produced documentary series that highlights the histories and everyday lives of Stark County residents, while also staying current with emerging formats such as virtual
    reality and short‑form digital content. Additionally, she hopes to teach part‑time courses at the local community college, sharing her practical knowledge of camera operation and editing with the next
    generation of media professionals.
