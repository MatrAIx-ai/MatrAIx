persona_description: A scientist who specializes in solar energy research, particularly the development of transparent solar panels. He led a research team at Michigan State University and is confident
  that the transparent solar panels can be efficiently deployed in a wide range of settings. The team's technique for gathering sunlight is different from traditional solar cells, using artificial selection
  to pinpoint which organisms are churning out the most fuel. The team is developing a new method to increase the amount of biofuel produced by algae to reduce the overall cost of algae biofuel.
