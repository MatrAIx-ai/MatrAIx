  hobbies: '[''Drawing and sketching'', ''Coloring and painting'', ''Building with LEGO'', ''Playing soccer'', ''Listening to music (Mexican folk and pop)'', ''Watching animated movies'', ''Reading graphic
    novels and storybooks'', ''Exploring educational apps on tablet'', ''Participating in family cultural celebrations'', ''Creating papel picado crafts'']'
  career_goals: Samuel dreams of a future where his love for art and discovery guide his career. He imagines becoming an illustrator or cartoonist who creates stories that help children understand and cope
    with their feelings. At the same time, his fascination with space and science leads him to consider a path in astronomy or engineering. He also feels a strong desire to support other kids who experience
    anxiety, picturing himself as a mentor or later a child psychologist. For now, his immediate ambition is to excel in school, master both languages, and develop his artistic skills so that any of these
    possibilities can become real.
