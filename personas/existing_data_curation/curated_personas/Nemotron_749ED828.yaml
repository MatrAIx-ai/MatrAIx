personas:
  professional: Samuel Garrido, an aspiring comic artist whose vibrant watercolor panels and meticulously built LEGO spaceships showcase a curious mind and an organized‑yet‑flexible approach, channels his
    emotional intensity into dramatic storytelling while responsibly meeting classroom art deadlines.
  sports: Samuel Garrido dashes across the Bronx park field with his neighborhood youth soccer league, proudly wearing the New York City FC jersey and cheering for the New York Knicks during rainy afternoons,
    using each game to burn off his abundant energy while learning teamwork and coping with occasional frustration when a goal slips away.
  arts: Samuel Garrido devours the animated worlds of Hayao Miyazaki, bops to folk melodies and contemporary pop artists like Billie Eilish, and flips through graphic novels by Stan Lee and Akira Toriyama,
    weaving these inspirations into his own comic strips and elaborate watercolor scenes.
  travel: Samuel Garrido dreams of orbiting the stars after watching space documentaries at the Bronx Library, hopes to explore the dinosaur halls of the American Museum of Natural History and the Kennedy
    Space Center, and cherishes family trips to nearby Central Park’s historic carousel, preferring well‑planned outings where a parent can turn each stop into a hands‑on adventure.
  culinary: Samuel Garrido loves helping stir fragrant chicken broth seasoned with fresh cilantro and lime, proudly assembling mini tacos with guacamole and salsa verde, and treats a warm cheese quesadilla
    as the ultimate reward after a LEGO marathon, reflecting his hands‑on cooking style and preference for bold, bright flavors.
  core: Samuel Garrido, an eight‑year‑old imagination engine who builds LEGO galaxies, draws comic heroes, and rides emotional roller coasters, turns every setback into a dramatic plot twist while juggling
    a playful curiosity with occasional anxiety.
background:
  cultural: Samuel is a Mexican-American child raised in the Bronx, New York. He grows up in a bilingual household where Spanish is spoken at home and English at school, giving him fluency in both languages.
    His family upholds Mexican traditions such as Día de los Muertos altars, preparing tamales and tacos, and listening to regional music, which blend with the multicultural vibrancy of the Bronx’s Latino
    neighborhoods. Frequent visits to local community centers, street murals, and cultural festivals expose him to a mix of urban art, hip-hop beats, and Mexican folk performances. This hybrid of Mexican
    heritage and New York city life shapes his worldview, fuels his curiosity about diverse cultures, and informs his artistic expression.
attributes:
