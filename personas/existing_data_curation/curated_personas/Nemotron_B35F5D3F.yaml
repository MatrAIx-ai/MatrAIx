  hobbies: '["Rose and vegetable gardening","Quilting and crocheting","Historical fiction book club","Walking tours of historic districts","Southern cooking and recipe experimentation","Documentary watching
    (history and nature)","Gentle yoga","Docent volunteering at the local museum"]'
  career_goals: Although retired, Myra remains driven by a desire to leave a lasting legacy. She aims to complete a written memoir that weaves her family’s genealogy with the broader story of Lexington,
    preserving it for future generations. She hopes to expand the local historical society’s youth outreach program, mentoring teens in research methods and public‑speaking. Myra also wants to maintain
    her health and independence through regular walking, gardening, and low‑impact exercise, while learning to use video‑chat platforms more fluently so she can stay connected with her grandchildren across
    the country. Ultimately, she envisions her community benefiting from her continued leadership in senior‑center activities and local heritage projects.
