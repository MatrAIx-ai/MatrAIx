  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Hiking'', ''Reading art history'', ''Reading philosophy'', ''Puzzle solving (jigsaw, Sudoku)'', ''Jazz and classical music listening'',
    ''Woodworking'', ''Solo running'', ''Podcasts on retail innovation and contemporary art'']'
  career_goals: He aims to step into a store manager position within the next two years, leveraging his systematic approach to improve overall sales and staff productivity. His longer-term ambition is to
    become a district manager overseeing multiple locations across the region, where he can implement best-practice operational frameworks. Parallel to his retail trajectory, Michael plans to launch a niche
    online marketplace that curates emerging visual artists, allowing him to merge his supervisory experience with his passion for art. He seeks roles that afford autonomy, limited constant social interaction,
    and the ability to work on strategic initiatives that capitalize on efficiency and innovation.
