personas:
  professional: Ruby Walburg is a seasoned automotive service technician who blends deep mechanical expertise—ranging from classic engine rebuilds to hybrid diagnostics—with a charismatic, talkative leadership
    style that turns the shop floor into a collaborative classroom, all while meticulously tracking inventory and safety compliance to drive both efficiency and mentorship.
  sports: Ruby Walburg is an avid hiker of the Blue Ridge Mountains and a devoted fan of the Atlanta Falcons, Atlanta United, and the Georgia Bulldogs, regularly joining the local women's recreational soccer
    league and participating in weekend trail runs with the county’s outdoor club while balancing fitness with a love for classic‑car shows.
  arts: Ruby Walburg thrives on community theater productions and karaoke nights, where they often belt out classics by Dolly Parton and Chris Stapleton, and they also enjoy listening to the Atlanta Symphony’s
    performances and the local bluegrass jam sessions that echo the region’s musical heritage.
  travel: Ruby Walburg prefers road‑trip adventures that combine scenic drives along the Appalachian Trail to Asheville and visits to auto museums in Detroit, while dreaming of an electric‑car road tour
    across Norway’s fjords and a cultural immersion in New Orleans’ jazz districts.
  culinary: Ruby Walburg cooks Southern comfort food with a modern twist—like bourbon‑glazed fried chicken, smoked collard greens tossed with kale, and peach cobbler spiked with fresh basil—showcasing a
    solid intermediate cooking skill set and a penchant for experimenting with bold ingredients like chipotle honey and smoked paprika.
  core: Ruby Walburg is a sociable, curious automotive guru who balances meticulous shopmanship with a love of classic cars, karaoke, and community service, all while navigating the occasional health and
    money quirks of a busy 31‑year‑old.
background:
  cultural: Ruby grew up in a tight‑knit, white family in rural Georgia, steeped in Southern hospitality, church involvement, and a strong work ethic. Her upbringing emphasized community service, respect
    for tradition, and the value of hands‑on problem solving. While rooted in these regional values, she also embraces contemporary perspectives, seeking out new ideas through trade schools and online forums.
    This blend of Southern cultural heritage and modern professional curiosity shapes her worldview, fostering both a sense of belonging to her local community and a drive to innovate within her field.
attributes:
  skills: '["Diagnostic troubleshooting", "Engine rebuilds", "Transmission repair", "Electrical system diagnostics", "Hybrid and electric vehicle maintenance", "Brake system servicing", "Shop safety compliance",
