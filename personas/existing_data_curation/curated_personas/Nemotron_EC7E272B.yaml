  hobbies: '["Restoring classic cars", "Local car club participation", "Karaoke and community theater", "Hiking in the Blue Ridge Mountains", "Southern cooking with contemporary flair", "Volunteering in
    youth vehicle safety workshops"]'
  career_goals: Ruby aims to achieve Master Technician status through the ASE certification program within the next two years, focusing on advanced hybrid systems. She envisions progressing to a service
    manager role at a reputable dealership, where she can implement process improvements and foster a collaborative shop culture. Ultimately, she aspires to open her own garage that combines cutting‑edge
    automotive technology with a community‑focused atmosphere, offering workshops for car enthusiasts and mentorship programs for aspiring technicians, especially women entering the trades.
