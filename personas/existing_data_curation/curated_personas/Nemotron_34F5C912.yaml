personas:
  professional: An aspiring HVAC technician, Tarnell Snow combines their solid automotive maintenance foundation, Excel budgeting precision, and methodical, reliability-driven work style to thrive in facility
    maintenance positions that value clear structure and predictable routines.
  sports: Tarnell Snow enjoys weekend fishing on Lake Cumberland, follows the Kentucky Wildcats basketball team and the Louisville Cardinals football program with keen interest, and participates in a local
    adult softball league as a utility infielder, appreciating the predictable schedule and teamwork of the sport.
  arts: Tarnell Snow finds artistic fulfillment in both crafting hand-finished wooden shelves and listening to jazz greats like Miles Davis, soul legends such as Aretha Franklin, and contemporary pianist
    Nnenna Freelon, allowing the improvisational spirit of the music to inspire their meticulous woodworking process.
  travel: Tarnell Snow prefers low-key road trips with a detailed itinerary, having explored Asheville, North Carolina, and the Great Smoky Mountains, and now dreams of a solo drive through the Texas Hill
    Country, balancing the desire for quiet discovery with a modest travel budget that fits their disciplined financial plan.
  culinary: Tarnell Snow delights in cooking Southern comfort dishes such as shrimp and grits topped with fresh garden tomatoes, collard greens seasoned with smoked paprika, and biscuits brushed with herb-infused
    butter, showcasing a modest yet confident kitchen skill set that blends home-grown herbs like basil and thyme with classic regional flavors.
  core: Tarnell Snow, a 24-year-old who thrives on quiet precision, trades late-night TV for nightly chess puzzles, but occasionally over-schedules their day, leaving little room for spontaneous fun.
background:
  cultural: Tarnell grew up in the small, predominantly white town of Paris, Kentucky, as part of a close‑knit African‑American family that placed high value on faith, perseverance, and community. His mother,
    a former nurse, and his father, a retired factory worker, emphasized the importance of education and self‑reliance. The family regularly attended the historic African‑American Baptist church on Main
    Street, where gospel music and communal service shaped his sense of identity. Celebrations of Juneteenth and family reunions at the county’s park reinforced a connection to Black heritage while also
    teaching him the nuances of navigating a predominantly rural environment. These experiences fostered a quiet confidence and a deep respect for the traditions of Southern hospitality, home‑cooked meals,
    and storytelling. Though he prefers solitude, Tarnell remains aware of the collective struggles faced by Black communities in Appalachia and aims to contribute positively by becoming a reliable provider
    and, eventually, a mentor for younger residents seeking practical skills and stable employment.
attributes:
  skills: '[''budget management'', ''financial spreadsheet analysis'', ''basic automotive repair'', ''carpentry and woodworking'', ''home improvement project coordination'', ''time management'', ''assertive
    communication'', ''logistics scheduling'', ''reliable task execution'']'
  hobbies: '[''woodworking'', ''DIY home repair projects'', ''fishing'', ''vegetable gardening'', ''reading technical manuals'', ''model airplane building'', ''listening to jazz and soul music'', ''online
    chess'', ''cooking Southern cuisine'']'
  career_goals: Tarnell’s primary career ambition is to secure a stable, full‑time position that offers clear structure and a predictable routine, allowing him to support his wife and future family. He
    plans to complete an associate degree in Business Administration while pursuing a Certified HVAC Technician program, seeing the trade as a blend of his mechanical aptitude and his desire for methodical
    work. In the short term, he aims to obtain an entry‑level maintenance or facilities role at a local manufacturer or school district, where his reliability and organized work style can be valued. Over
    the next five years he hopes to become a lead technician or facilities supervisor, eventually leveraging his experience to start a small, community‑focused home‑repair service that can provide dependable
    employment to other residents of Scott County. Parallel to these goals, he intends to develop professional certifications in project management and supply‑chain basics, positioning himself for future
    advancement into logistics coordination within a regional distribution center.
