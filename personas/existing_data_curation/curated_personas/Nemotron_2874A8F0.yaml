  career_goals: Although retired, Tina’s primary ambition is to remain independent and healthy in her Wilkes‑Barre home while continuing to contribute to her community. She aims to pass down her cooking,
    sewing, and gardening skills to her grandchildren and local youth through informal workshops. She hopes to complete a memoir that records her family’s history and the changes she has witnessed in Luzerne
    County, preserving these stories for future generations. Additionally, Tina aspires to stay active in the senior center’s book club and to volunteer occasionally at the local library, supporting literacy
    and community cohesion.
