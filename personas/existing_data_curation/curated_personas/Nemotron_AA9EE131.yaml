personas:
  professional: Jorge Montanez, an 11‑year‑old aspiring junior engineer, combines a love of LEGO building with Scratch coding to prototype simple games, and their curiosity‑practical balance drives them
    to document each project in a tidy notebook while staying flexible enough to improvise when a brick won’t fit.
  sports: Jorge Montanez plays forward for the Riverside Rangers youth soccer club, cheers for the United States Men’s National Team during World Cup matches, and spends weekend hikes exploring the winding
    trails of Cedar Creek Park, balancing team camaraderie with solo outdoor exercise.
  arts: Jorge Montanez sketches vibrant comic strips inspired by Kazu Kibuishi’s Amulet and the expressive panels of Skottie Young, devours science‑fiction novels by Neil Gaiman and Becky Chambers, and
    regularly re‑watches the animated series Adventure Time for its whimsical art style.
  travel: Jorge Montanez enjoys weekend hikes in Cedar Creek Park, has a budding travel bucket list that includes a family trek to the Grand Canyon, a camping adventure in Yosemite’s meadows, and a future
    cultural visit to the historic city of San Miguel de Allende, planning trips with detailed maps drawn in their notebook.
  culinary: Jorge Montanez loves the hands‑on rhythm of kitchen work, often chopping cilantro and grilling carne asada for family tacos, assembling cheesy Oaxaca quesadillas, and experimenting with a splash
    of lime juice to brighten the flavor, though they sometimes forget to wash their hands before tasting.
  core: Jorge Montanez is an imaginative 11‑year‑old who balances meticulous LEGO engineering with spontaneous comic doodles, worries over missed deadlines, and delights in helping others—especially when
    the kitchen aromas of sizzling tacos fill the house.
background:
  cultural: Jorge is a second‑generation Mexican‑American raised in San Jose, California. At home, Spanish and English intertwine, and family meals often feature classic Mexican cuisine, preserving traditions
    such as Día de los Muertos celebrations and weekly visits to a local Catholic church. His parents emphasize respect for elders, close family bonds, and community involvement, values that shape his compassionate
    outlook. Living in a diverse Silicon Valley environment, Jorge also absorbs Californian tech culture, blending his heritage with a modern, multicultural perspective.
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Fundamental reading and math proficiency'', ''Scratch visual programming'', ''Science experiment design'', ''LEGO and model building'', ''Collaborative
