  hobbies: '[''LEGO building'', ''Scratch programming'', ''Soccer'', ''Comic drawing'', ''Reading science‑fiction'', ''Hiking and nature exploration'', ''Cooking Mexican recipes with family'', ''Community
    garden volunteering'', ''Playing acoustic guitar'']'
  career_goals: Jorge dreams of a future where he can blend his love of science with his desire to help others, aiming to become a pediatric doctor or a biomedical engineer who designs child‑friendly medical
    devices. In the near term, he wants to lead his school's science club, earn a first‑aid certification, and mentor younger students in both academic and social matters. He also hopes to pursue advanced
    STEM courses in high school and eventually attend a university with strong health‑science programs, all while maintaining a balanced, supportive lifestyle that mitigates his tendency toward worry.
