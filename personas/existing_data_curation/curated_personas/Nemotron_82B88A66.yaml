personas:
  professional: Nina Wright, a seasoned architect who leverages mastery of BIM, sustainable design, historic preservation, and community‑centered workshops, channels their organized, methodical nature and
    talkative charisma into clear project documentation and inclusive stakeholder meetings.
  sports: Nina Wright enjoys low‑impact winter snowshoeing, early‑morning kayaking on Lake Minnetonka, and cheering on the Minnesota Vikings and Twins, while participating in a community walking club that
    meets at the Rice County trailhead each Saturday.
  arts: Nina Wright immerses themselves in the arts by painting watercolors of prairie horizons, studying the works of Ansel Adams and Georgia O’Keeffe, attending gallery openings featuring contemporary
    Midwest artists like Jeff Dwyer, and acting in community theater productions of classics such as Arthur Miller’s "The Crucible".
  travel: Nina Wright prefers thoughtfully planned cultural trips that blend architecture tours—like a pilgrimage to Frank Lloyd Wright’s Taliesin and Barcelona’s Sagrada Família—with leisurely stays at
    historic inns in Vermont, often using a moderate‑priced cruise to explore the Baltic coast’s medieval towns as a bucket‑list destination.
  culinary: Nina Wright’s culinary love centers on Scandinavian‑inspired baking, mastering cardamom‑spiced Swedish cinnamon buns and rye crispbread topped with locally foraged wild berries, while their
    garden yields heirloom tomatoes and herbs that flavor their seasonal farm‑to‑table dinners.
  core: Nina Wright is a community‑driven architect who balances meticulous planning with spontaneous storytelling evenings, harbors a sweet tooth for cardamom buns, and occasionally forgets to water their
    prized prairie daisies until the last minute.
background:
  cultural: Nina was born and raised in a small town near Rochester, Minnesota, into a family with deep Midwestern roots that trace back to German and Swedish immigrants. Her upbringing in a Lutheran community
    emphasized modesty, hard work, and service to neighbors, fostering a strong sense of community and a love of the outdoors, from snowshoeing in winter to fishing in summer. As one of the few women in
    her cohort to pursue a STEM degree in the 1970s, she benefited from the early feminist movement and the growing acceptance of women in architecture. Her cultural outlook blends traditional Midwestern
    values with an appreciation for Scandinavian minimalism, respect for Native American perspectives on land stewardship, and a curiosity about global design traditions cultivated through travel. These
    influences shape her inclusive, collaborative approach to architecture and community engagement.
