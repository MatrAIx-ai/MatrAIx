    ''Hosting storytelling evenings'', ''Leading community design workshops'']'
  career_goals: Nina aims to transition into a senior consultancy role that focuses on sustainable, community‑centered projects across rural Minnesota, eventually establishing a small collaborative studio
    that blends architecture with local art and craftsmanship. She wants to secure a seat on the Rice County planning commission to influence zoning and historic preservation policies. She plans to develop
    a “green retrofitting” program for historic barns and public buildings, and to organize an annual design showcase that highlights regional artisans. Over the next five years, she hopes to author a book
    on mid‑century modern architecture in the Upper Midwest and become a sought‑after speaker at national conferences on inclusive design and participatory planning. Mentoring the next generation of architects
    and promoting gender equity in the field remain central to her long‑term ambition.
