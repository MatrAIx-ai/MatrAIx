persona_description: A queer educator who advocates for education for sustainable development and uses queer pedagogy to empower learners to face the existential threats of the Anthropocene. They reject
  heteronormative and patriarchal systems and reject anthropocentrism, promoting diversity and inclusion in the classroom. They prioritize queer desires and celebrate the diversity of wants and needs among
  students, particularly when it comes to how they might use the education that pedagogues imbue them with. They believe that education is not neutral and can ignore or even detract from sustainable development,
  and they use their stories to build rapport with students, inform them about the range of options open to them, and follow this up with a referral pathway of opportunities to engage in events, training
  programmes, clubs, societies and more taking place both inside and outside institutions. They believe that the UN's SDGs, "the so-called hallmark of sustainable development, are notably silent on any
  reference to queerness," and take issue with SDG5's first target, which is to end "all forms of discrimination against women and girls everywhere," because "only cisgendered women and girls everywhere…will
  benefit, and gender is reduced to biology only." SDG10 "Reduced Inequalities" is similarly unacknowledged, and they argue that it is important for students to have awareness of their desires to think
  about how to turn these into actions that advance sustainable development. They believe that testing, grading, and assessment is "straight, literally and figuratively."
