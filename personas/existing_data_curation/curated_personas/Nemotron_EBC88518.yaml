  career_goals: Rodolfo’s current ambitions focus on staying active, independent, and socially connected. He hopes to launch a modest side venture selling homemade salsa and mole sauces at the local farmer’s
    market, using his culinary skills to preserve family recipes. He also plans to volunteer at the Escondido community center to teach basic cooking and garden‑care classes to seniors and youth. A personal
    goal is to improve his digital literacy so he can create an online photo‑journal of the San Diego County Mexican‑American community, and he dreams of making a short trip back to his hometown in Mexico
    to reconnect with extended family and cultural roots.
