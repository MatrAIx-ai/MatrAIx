personas:
  professional: Erika Figueroaguzman, a meticulous bank teller with three decades of experience in high‑volume cash handling, audits, and customer service, is leveraging their disciplined, detail‑oriented
    approach to pursue a Lead Teller or Assistant Branch Manager role while mentoring new staff and designing community financial‑literacy workshops.
  sports: Erika Figueroaguzman supports the Charlotte Hornets and the Carolina Panthers, attends local high‑school basketball games with their grandchildren, and maintains personal fitness through a weekday
    morning walk in the neighborhood while listening to gospel hymns on a portable speaker.
  arts: Erika Figueroaguzman stitches intricate quilts inspired by the rhythmic patterns of gospel music, sings in their church choir covering classics by Mahalia Jackson and contemporary pieces by Kirk
    Franklin, and devours works by Toni Morrison and James Baldwin while sipping coffee at the town library.
  travel: Erika Figueroaguzman favors carefully planned weekend getaways to the Blue Ridge Parkway, the historic streets of Savannah, and the jazz‑laden French Quarter of New Orleans, balancing a love of
    cultural immersion with the comfort of staying in boutique B&Bs that they book well in advance.
  culinary: Erika Figueroaguzman delights in cooking Southern comfort dishes such as collard greens seasoned with garden‑grown rosemary, pan‑fried catfish with a lemon‑pepper crust, and sweet tea, and they
    often experiment with heirloom tomato sauces while quilting, letting the scent of simmering herbs guide their creative rhythm.
  core: Erika Figueroaguzman is a detail‑driven bank veteran who blends disciplined financial stewardship with a quiet love for quilting, gardening, and gospel, though they sometimes binge‑read late into
    the night, sacrificing sleep for the next chapter.
background:
  cultural: Erika identifies as Afro‑Latina, drawing from a Black American heritage blended with Hispanic roots reflected in her family name, Figueroa‑Guzman. Raised in the Piedmont region of North Carolina,
    she grew up surrounded by the rich traditions of church and family gatherings. Her cultural practices include celebrating Juneteenth and Kwanzaa alongside Hispanic holidays such as Día de los Muertos,
    honoring the stories of ancestors from both lineages. She remains an active member of the First Baptist Church of Statesville, where she participates in worship, choir, and outreach programs. Community
    festivals, soul food potlucks, and local cultural events provide Erika with a sense of belonging and an opportunity to share her blended heritage with neighbors.
attributes:
  skills: '[''Cash handling'', ''Transaction processing'', ''Banking software operation (Jack Henry/FIS)'', ''Regulatory compliance'', ''Fraud detection'', ''Account reconciliation'', ''Customer service'',
    ''Record keeping'', ''Training and onboarding of staff'', ''Problem solving'', ''Time management'']'
  hobbies: '[''Quilting'', ''Gardening'', ''Reading African American literature'', ''Gospel choir participation'', ''Cooking traditional Southern dishes'', ''Volunteering at the food pantry'', ''Mentoring
    high school students in budgeting'', ''Nature walks'']'
  career_goals: Erika aims to leverage her extensive experience into a supervisory position within her branch, such as Lead Teller or Assistant Branch Manager, within the next three years. She plans to
    complete the Certified Bank Teller (CBT) program and enroll in a part‑time bookkeeping course at Iredell Community College to broaden her financial expertise. A core ambition is to mentor newer employees,
    particularly women and minorities, fostering a supportive and high‑performing team. Additionally, she hopes to spearhead a community‑focused financial literacy workshop series at the local senior center,
    using her practical knowledge to help residents manage budgets, understand credit, and avoid predatory lending.
