personas:
  professional: Younghee Wang is a meticulous high‑school robotics team captain who blends her love of science‑fiction with solid Python skills to design prototype eco‑friendly farming tools, using bilingual
    communication to bridge teammates and mentors while keeping projects on tight schedules.
  sports: Younghee Wang spends weekends hiking the foothill trails of the Columbia River Gorge, jogs with the Portland Trail Runners club during spring, and roots for the Portland Timbers while maintaining
    a balanced fitness routine that includes occasional yoga sessions.
  arts: Younghee Wang expresses creativity through manga‑style illustrations inspired by Hiroshi Taniguchi, practices piano pieces by Ludwig van Beethoven and Yiruma, and draws inspiration from sci‑fi authors
    like Octavia Butler and composers such as Yoko Shimomura.
  travel: Younghee Wang prefers budget‑friendly adventures, often day‑tripping to the Columbia River Gorge or camping in the Oregon Coast Range, while dreaming of a future spring visit to Japan’s cherry‑blossom
    festivals and a road trip across the U.S. National Parks to fuel her environmental curiosity.
  culinary: Younghee Wang enjoys preparing traditional Chinese dishes such as jiaozi, mapo tofu, and scallion pancakes using fresh produce from the community garden, while also experimenting with quick
    Western meals like pesto pasta, rating each dish on a homemade flavor scorecard.
  core: Younghee Wang balances a curiosity‑driven love of science and art with disciplined organization, turning late‑night coding marathons into occasional sleep debt, but always ensuring her community
    garden projects and sustainable‑tech dreams stay on track.
background:
  cultural: Younghee is a second‑generation Chinese American. Her parents emigrated from Guangdong province to Oregon before she was born, and she was raised in Albany, a small city in the Willamette Valley.
    At home, the family celebrates Chinese festivals such as Lunar New Year and Mid‑Autumn Festival, maintains Mandarin language use, and values Confucian principles of harmony, respect for elders, and
    dedication to education. In the wider community, she embraces the Pacific Northwest's culture of outdoor recreation, environmental stewardship, and multiculturalism, often bridging her heritage and
    American upbringing through volunteer work, cultural exchange, and community involvement.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Research and information synthesis'', ''Basic Python programming'', ''Bilingual communication (English and Mandarin)'', ''Culinary preparation
