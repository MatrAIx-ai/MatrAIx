  hobbies: '[''Reading science fiction and popular science'', ''Hiking local trails'', ''Volunteering at community garden'', ''Cooking traditional Chinese dishes'', ''Playing piano'', ''Coding simple programs
    (Python)'', ''Drawing manga‑style illustrations'', ''Participating in school robotics club'', ''Debate club'']'
  career_goals: Younghee aspires to attend a university with a strong STEM program—ideally Oregon State University—where she can study environmental engineering or environmental science. She aims to blend
    her curiosity about scientific concepts with practical solutions that protect the agricultural lands of the Willamette Valley. Her long‑term ambition is to become a sustainability consultant or environmental
    project manager who designs eco‑friendly farming technologies, leads community‑based conservation initiatives, and mentors younger students, all while working collaboratively and influencing policy.
