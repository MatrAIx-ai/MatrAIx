persona_description: A healthcare provider who specializes in the treatment and management of peripheral vascular disease (PVD), particularly in the legs and kidneys. They are knowledgeable in the underlying
  causes, symptoms, and treatments for PVD, and are equipped with the skills and knowledge to assess and monitor the progression of the disease. They are also aware of the importance of a healthy lifestyle,
  including healthy eating, regular exercise, maintaining a healthy weight, and quitting smoking. They are skilled in performing a thorough peripheral vascular assessment and providing important advice
  to minimize the associated risk factors and provide appropriate care for the feet and legs.
