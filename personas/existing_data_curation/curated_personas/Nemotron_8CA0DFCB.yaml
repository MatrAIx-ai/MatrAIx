personas:
  professional: Berlinda Walfall is an ambitious high-school senior with a talent for digital illustration, graphic design, and project coordination, who channels their curiosity, meticulous organization,
    and competitive drive into a polished portfolio aimed at winning a scholarship in visual arts.
  sports: Berlinda Walfall follows the Dallas Mavericks basketball team and the Texas Longhorns football squad, plays pickup basketball at the local recreation center, participates in a weekend running
    club that meets at the nearby lake, and approaches fitness with the same strategic planning and competitive edge they bring to design projects.
  arts: Berlinda Walfall explores the city’s vibrant mural scene, frequents the community art museum and the Deep Ellum galleries, draws creative energy from artists such as Kehinde Wiley, Solange, and
    Miles Davis, and spends evenings crafting digital collages that blend street photography with graphic illustration.
  travel: Berlinda Walfall prefers meticulously planned trips that fuse cultural immersion and artistic inspiration, has already visited New Orleans for its music heritage and Austin for its live-performance
    scene, and dreams of wandering Mexico City’s historic neighborhoods to study its legendary street art while budgeting carefully around scholarship deadlines.
  culinary: Berlinda Walfall is a capable home cook who loves slow-smoked brisket, buttery cornbread, and collard greens seasoned with smoked paprika, often experiments with new spice blends in the kitchen,
    yet admits to late-night pizza binges while polishing design drafts.
  core: Berlinda Walfall is a disciplined 18-year-old visual storyteller whose curiosity fuels bold artistic projects, competitive spirit keeps them striving for excellence, and occasional binge-watching
    marathons reveal a playful side.
background:
  cultural: Berlinda was raised in a close‑knit Black family in Dallas, where Southern hospitality blends with the vibrant urban culture of the city. Her upbringing included regular attendance at church,
    participation in community celebrations such as Juneteenth, and exposure to the rich traditions of African American music, dance, and visual arts. Growing up near Deep Ellum, she was inspired by the
    neighborhood’s street murals and music venues, which nurtured her appreciation for contemporary Black artistry. She values the resilience and solidarity of the Dallas Black community and draws on that
    heritage to inform her creative perspective and aspirations.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Photo editing (Lightroom)'', ''Project planning & organization'', ''Time management'', ''Research & critical analysis'',
    ''Debate & public speaking'', ''Basic HTML/CSS coding'', ''Event coordination'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and painting'', ''Urban photography'', ''Digital collage'', ''Reading speculative fiction and poetry'', ''Listening to jazz, soul, and hip‑hop'',
    ''Playing chess'', ''Attending cultural festivals'', ''Volunteering at youth art programs'']'
  career_goals: Berlinda aims to earn a scholarship to a top university where she can major in Graphic Design or Visual Arts, with the long-term goal of becoming an art director at a leading creative agency.
    She is driven to create socially relevant visual campaigns that reflect Black cultural experiences and challenge conventional narratives. In the future, she envisions launching her own design studio
    that partners with community organizations to produce culturally resonant artwork and educational materials. She also sees herself contributing to museums or galleries as a curator, highlighting under-represented
    artists.
