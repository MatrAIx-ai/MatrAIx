  career_goals: Kahlila aims to advance to a development director role within the next three years, overseeing a regional nonprofit’s fundraising strategy and increasing annual revenue by at least 30%.
    She plans to earn the Certified Fund Raising Executive (CFRE) credential and to launch a capital campaign for a local health‑care clinic that serves underserved families in Winnfield. Long‑term, she
    hopes to mentor emerging fundraisers—particularly women of color—and to establish a sustainable legacy‑giving program that secures the organization’s future while preserving its community‑focused mission.
