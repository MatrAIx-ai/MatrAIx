  career_goals: Dennis aims to blend his love of art and technology by pursuing a career as an indie video game designer and concept artist. He plans to attend a specialized high‑school program focused
    on visual arts and computer science, then study interactive media or computer science at a university. In the long term he hopes to launch his own indie studio, create narrative‑driven games that explore
    abstract themes, and compete in national game‑jam competitions. He also dreams of earning scholarships for his art portfolio and technical projects, and eventually mentoring younger students in his
    hometown.
