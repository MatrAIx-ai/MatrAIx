  career_goals: Fara aspires to pursue a career that merges her curiosity for science with her desire to help others and build community. She is interested in becoming a science teacher or a community health
    educator, roles that would allow her to inspire younger students and promote healthy lifestyles. She also dreams of studying environmental science to address local sustainability challenges in the Roseville
    area. Long‑term, she hopes to lead outreach programs that integrate scientific learning with community service, fostering both knowledge and social cohesion.
