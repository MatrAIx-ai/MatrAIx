personas:
  professional: Fara Rydel is an emerging student council leader who uses their organized, talkative nature and practical curiosity to coordinate school events, mediate peer discussions, and streamline
    project timelines, demonstrating early leadership and community‑building skills as they guide their peers.
  sports: Fara Rydel thrives on the soccer field with the Sierra Striders Youth Soccer Club, follows the San Jose Earthquakes avidly, and they complement team play with weekend hikes in the Sierra foothills,
    maintaining a balanced fitness routine that mixes endurance runs and tactical drills.
  arts: Fara Rydel channels their theatrical passion by performing in the school’s stage productions of Lin‑Manuel Miranda’s Hamilton and improvisational skits, while they draw inspiration from digital
    illustrators like Loish and listen to the soaring scores of Hans Zimmer during art sessions.
  travel: Fara Rydel prefers a mix of structured day trips and spontaneous weekend getaways, often planning hikes to Yosemite National Park with a family map, while they dream of a future pilgrimage to
    the castles of Scotland that inspired their favorite fantasy novels.
  culinary: Fara Rydel enjoys a moderate skill set in the kitchen, frequently whipping up pepperoni pizza with a crisp crust, mastering the art of cinnamon‑sugar churros, and experimenting with avocado‑lime
    salsa for taco nights, all while they savor the occasional indulgent matcha latte from a local café.
  core: Fara Rydel is a sociable, meticulously organized teen who toggles between leading student council meetings, staging school plays, and juggling a habit of over‑committing to clubs, while they secretly
    hoard extra‑sugar cereal for late‑night study sessions.
background:
  cultural: Fara comes from a White, middle‑class family in Roseville, California. Her upbringing reflects the suburban lifestyle of the Sacramento Valley, emphasizing community involvement, academic achievement,
    and outdoor recreation. Family traditions include celebrating typical American holidays such as Thanksgiving, Fourth of July, and Halloween, often with neighborhood gatherings. The diverse cultural
    environment of Placer County, with its mix of residents, has exposed her to a variety of perspectives, fostering her inclusive and cooperative attitude. Growing up in California, she has been influenced
    by the state's focus on environmental stewardship and innovation, aligning with her interests in science and community service.
