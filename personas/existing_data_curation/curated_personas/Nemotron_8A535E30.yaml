  hobbies: '[''Reading (young‑adult fiction and self‑help)'', ''Journaling'', ''Gardening (vegetable garden)'', ''Cooking and baking'', ''Volunteering with church youth group'', ''Nature walks and hiking'',
    ''Sketching/drawing'', ''Listening to mental‑health podcasts'', ''Watching documentaries on biology'']'
  career_goals: Pamela’s long‑term ambition is to work in a helping profession where she can directly support people in her community. She plans to complete her GED within the next year, then enroll in
    a community‑college program to become a certified nursing assistant or a community health worker. In the short term, she hopes to secure a part‑time position at the local health clinic or a youth center,
    gaining hands‑on experience in caregiving and outreach. She also dreams of starting a peer‑support group for teens at her high school to address anxiety and stress, drawing on her own experiences. Ultimately,
    Pamela wants a stable career that lets her combine her practical skills with her compassion, while also providing a reliable income to support her family.
