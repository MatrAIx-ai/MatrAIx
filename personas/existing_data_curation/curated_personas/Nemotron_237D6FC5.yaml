  career_goals: He dreams of becoming an astronaut who can draw planets, an artist who creates murals, or a scientist who discovers new animals. He is especially drawn to careers that let him explore, create,
    and solve puzzles while being recognized for his unique ideas. He wants a job that combines structure and freedom, allowing him to compete by showcasing his work and receive clear feedback on his achievements.
