personas:
  professional: Michael Bennett, a budding junior naturalist who channels their curiosity about redwoods into miniature field journals and organized leaf‑collection games with preschool friends, demonstrates
    early investigative skills and a competitive drive to out‑discover peers.
  sports: Michael Bennett, a lively participant in the local Redwoods Rangers preschool soccer league who cheers for the San Francisco Giants and spends weekend afternoons climbing rope courses at Redwood
    Park, approaches fitness with a blend of competitive spirit and imaginative outdoor play.
  arts: Michael Bennett, an enthusiastic little artist who loves drawing towering redwoods with Crayola markers, sings along to Disney’s Frozen soundtrack, and regularly explores the interactive Kids’ Corner
    at the San Jose Museum of Art, finds inspiration in vibrant colors and story‑telling.
  travel: Michael Bennett, who treasures family road trips to Henry Cowell Redwoods State Park and beach days in Santa Cruz, dreams of visiting the giant sequoias of Yosemite and the magical lights of Disneyland,
    preferring itineraries that balance nature scavenger hunts with short, structured stops.
  culinary: Michael Bennett, a picky yet adventurous eater who prefers grilled cheese with sharp cheddar, fresh strawberries, and occasional help stirring organic vegetable soup, delights in adding a drizzle
    of honey to oatmeal but still resists broccoli on the plate.
  core: Michael Bennett, a curious 4‑year‑old who obsessively catalogs redwood leaves in sticker‑filled notebooks, hoards coins for future toys, frets over missed soccer goals, and swings between meticulous
    organization and spontaneous forest adventures, embodies a competitive, slightly anxious little explorer.
background:
  cultural: Michael is raised in a middle‑class white American family in La Honda, a small community in the Santa Cruz Mountains of California. His parents emphasize outdoor recreation, environmental stewardship,
    and exposure to the arts, reflecting the region’s blend of progressive West‑Coast values and traditional suburban upbringing. He enjoys weekend trips to local state parks, visits museums in nearby San
    Jose, and celebrates typical American holidays while also learning about Native Californian legends tied to the redwood forest.
