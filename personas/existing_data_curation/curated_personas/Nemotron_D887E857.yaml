  career_goals: Javier aims to transition from managing operational projects to leading strategic innovation initiatives. In the next five years, he envisions becoming a Director of Product Innovation or
    launching his own tech startup focused on sustainable energy analytics. He wants to be recognized as a thought leader who bridges cutting‑edge research with market‑ready products, and he is committed
