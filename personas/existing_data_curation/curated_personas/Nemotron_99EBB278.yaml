personas:
  professional: Gloria Zayas is an aspiring young illustrator who merges watercolor techniques with sketches of regional folklore, channels their curiosity into creating storyboards for school projects,
    and balances meticulous detail with spontaneous bursts of color, all while staying reliably organized in class.
  sports: Gloria Zayas enjoys playing soccer on the school team, spends weekends hiking the Austin nature trails with a sketchbook in tow, follows the local professional football club Austin FC, and approaches
    fitness with a light‑hearted, exploratory attitude that favors fun over competition.
  arts: Gloria Zayas immerses themselves in creative expression through watercolor studies of Claude Monet's gardens, sketching characters inspired by J.K. Rowling's wizarding world, playing the recorder
    at family music nights, and dancing to lively folk rhythms at community festivals, all of which shape their artistic identity.
  travel: Gloria Zayas loves family road trips to nearby state parks like Pedernales Falls, weekend visits to the Houston Museum of Natural Science, and day trips to the Austin Aquarium, while dreaming
    of exploring the ancient temples of Kyoto and the vibrant streets of Barcelona when they can someday travel abroad.
  culinary: Gloria Zayas enjoys assisting in the kitchen making family recipes such as stuffed bell peppers with rice and cheese, baked macaroni with tomato sauce, and cinnamon‑spiced apple pies, often
    practicing whisking and chopping techniques to improve their culinary skills.
  core: Gloria Zayas is a curious, artistic 11‑year‑old who weaves folklore into vibrant watercolors, balances meticulous planning with spontaneous creativity, worries about small setbacks, yet thrives
    on community rhythms and family traditions.
background:
  cultural: Gloria comes from a Mexican‑American family that maintains strong ties to its heritage while embracing the multicultural vibe of Austin, Texas. Spanish is spoken at home, and her grandparents
    share stories of Día de los Muertos, traditional music, and folklore, which deeply influence her artistic themes. She celebrates Mexican holidays with vibrant decorations, homemade tamales, and community
    events in Williamson County. At school, she enjoys sharing her culture through bilingual projects and learning about other traditions, fostering a sense of belonging and cultural pride.
