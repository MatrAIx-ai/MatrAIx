  hobbies: '[''Drawing'', ''Watercolor Painting'', ''Reading Fantasy Books'', ''Nature Exploration with Sketching'', ''Recorder Playing'', ''Salsa/Cumbia Dancing'', ''LEGO Building'', ''Scratch Coding'',
    ''Museum Visits'', ''Cultural Festival Participation'', ''Cooking Traditional Mexican Meals'']'
  career_goals: Gloria dreams of becoming an illustrator who weaves Mexican folklore and modern storytelling into vibrant books and digital media. She hopes to pursue graphic design or animation in the
    future, using her art to celebrate cultural heritage and promote empathy. Long‑term, she envisions a role where she can teach younger children about art and bilingual expression, perhaps as an after‑school
    program coordinator or community arts educator, combining her love for creativity, education, and cultural preservation.
