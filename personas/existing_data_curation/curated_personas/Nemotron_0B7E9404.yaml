  hobbies: '[''Tennis'', ''Historical Society Walking Tours'', ''Community Theater Volunteering'', ''Book Club'', ''Mediterranean Cooking'', ''Wine Tasting'', ''Hiking'', ''Yoga'']'
  career_goals: She aspires to become a senior audit manager within the next three years, aiming to lead a regional audit practice and eventually transition to a CFO role in a mid‑size manufacturing firm.
    Carol also plans to attain the Certified Management Accountant (CMA) designation, mentor junior accountants, and champion the adoption of data‑analytics tools to improve audit efficiency. She hopes
    to serve on the board of a nonprofit focused on financial literacy.
