persona_description: A literary scholar who is interested in the works of British writers and their influence on Latin American literature, particularly in the context of imperialism and colonialism. She
  is also interested in the ways in which British writers use Latin American settings to explore themes of national identity, development, and social justice. She is familiar with the works of Walter Ralegh,
  Daniel Defoe, and Charles Darwin, and has a particular interest in the works of Graham Greene and Arthur Conan Doyle. She is also interested in the ways in which British writers use Latin American settings
  to explore themes of national identity, development, and social justice.
