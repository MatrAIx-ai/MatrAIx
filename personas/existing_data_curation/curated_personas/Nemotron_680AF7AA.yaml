  career_goals: Robert aspires to combine his love of technology and helping others by becoming a software engineer who creates educational apps, especially tools that support stress management for teens.
    He aims to attend a STEM‑focused high school, earn a scholarship for computer science, and eventually study at a university with a strong engineering program. Alongside his tech ambitions, he wants
    to develop his leadership skills to start a youth mentorship program in his community, fostering curiosity and practical problem‑solving among younger students. He is motivated by the desire to prove
    his ideas work and to earn recognition for his projects, while also learning to manage his worries and build resilience.
