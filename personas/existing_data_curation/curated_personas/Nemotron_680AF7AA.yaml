personas:
  professional: Robert Levitt is a budding robotics enthusiast and YouTube content creator who leverages his competitive edge and sociable charisma to lead school robot-building projects and produce strategic
    gaming tutorials for his growing online audience.
  sports: Robert Levitt captains his middle school varsity soccer team, trains with the local youth club 'Middletown Strikers', emulates the playstyle of FC Barcelona’s midfielders, and follows the Los Angeles Lakers
    and New York Yankees for inspiration during off‑season.
  arts: Robert Levitt channels his creative flair into short story writing inspired by Neil Gaiman and his video edits that borrow the fast‑paced humor of Markiplier, while his soundtrack choices often
    feature Imagine Dragons and the synth‑pop vibes of Da ft Punk.
  travel: Robert Levitt dreams of visiting Tokyo’s Akihabara district to soak up gaming culture, has already toured the Smithsonian museums in Washington, D.C., and plans a family road trip to Yellowstone
    National Park to photograph wildlife for his YouTube channel.
  culinary: Robert Levitt prefers crafting his own pepperoni pizza with extra mozzarella, loves the bold flavors of spicy chicken tacos topped with cilantro and lime, and experiments with instant ramen
    stir‑fry using miso paste, soy sauce, and a dash of sriracha.
  core: Robert Levitt blends a competitive, tech‑savvy mind with a talkative, socially driven personality, turning his love for robotics, gaming, and storytelling into a vibrant, sometimes anxiety‑tinged,
    teenage hustle.
background:
  cultural: Robert grew up in Oxford, Indiana, a small town in Benton County that embodies Midwestern values of hard work, community involvement, and modesty. His family participates in local traditions
    such as church gatherings, county fairs, and high school sports events, fostering a close‑knit social environment. The rural setting, with many families tied to farming and small‑business life, emphasizes
    practicality and self‑reliance, which aligns with Robert's balance of curiosity and practicality. Exposure to the region's strong school spirit and competitive sports culture reinforces his competitive
    drive, while the supportive community nurtures his sociable and talkative nature. At the same time, the expectation to succeed academically and socially contributes to his heightened sensitivity to
    stress and occasional skepticism toward others' intentions.
