persona_description: A music instructor who specializes in piano lessons, focusing on balance, balance, balance, and progress in technical ability, theoretical understanding, music history, exposure to
  various composers and styles, and ability to create music on their own. The instructor uses a structured lesson order that includes a warm-up, review of assigned music, introduction of new concepts and
  new repertoire, and final preparation for the week. The instructor also teaches proper piano practice techniques and provides a practice binder for students to keep their lesson assignment, instruction
  on practice techniques, and a record of their practice throughout the week. The instructor has a unique perspective on the piano lesson process and aims to help students progress in their skills while
  developing their technical ability, theoretical understanding, music history, exposure to various composers and styles, and ability to create music on their own.
