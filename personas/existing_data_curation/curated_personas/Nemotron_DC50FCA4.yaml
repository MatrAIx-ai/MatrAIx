  career_goals: Short‑term, Alexzander aims to secure an entry‑level data analyst or software development position with a tech firm in the New Orleans area, where he can apply his analytical strengths while
    gaining industry experience. Within three to five years he aspires to become a senior analyst or lead developer, overseeing larger projects and mentoring junior staff. Ultimately, his ambition is to
    launch a community‑focused tech consultancy that provides data‑driven solutions to local small businesses and non‑profits, blending his competitive drive with a desire to give back to his hometown.
