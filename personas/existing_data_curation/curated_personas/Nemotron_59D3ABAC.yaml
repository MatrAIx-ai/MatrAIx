  career_goals: Marlene aims to advance to a shift‑supervisor role where she can mentor new cashiers and help shape store policies that improve the customer experience. She is interested in completing a
    short certificate program in business management at a local community college to strengthen her leadership skills. Long‑term, she hopes to lead a community‑focused initiative that connects the store
    with local farmers, perhaps organizing a weekly produce showcase. She also envisions starting a modest side venture selling home‑grown herbs and seedlings at the farmers market, providing an additional
    source of income for a comfortable retirement.
