personas:
  professional: Juan Leonard is a teenage visual artist and budding beatmaker who blends charcoal cityscapes with lo‑fi hip‑hop production, channeling their curiosity and spontaneous nature into experimental
    projects while often scrambling to meet school deadlines.
  sports: Juan Leonard joins pickup basketball games at the Anacostia Community Center, cheers for the Washington Wizards and DC United, follows the NBA season religiously, and prefers streetball over organized
    league play, using their competitive edge to hustle for the ball.
  arts: Juan Leonard frequents the Hirshhorn’s contemporary installations, draws inspiration from artists like Banksy and Kehinde Wiley, spins beats while listening to Kendrick Lamar and J Cole, devours
    graphic novels such as Saga and Monstress, and lets indie films like Moonlight and Eternal Sunshine of the Spotless Mind shape their aesthetic.
  travel: Juan Leonard prefers spontaneous weekend trips, having explored the historic streets of Old Town Alexandria and the music scene in New Orleans, dreaming of a backpacking adventure through Tokyo’s
    vinyl shops and Berlin’s murals, while budget constraints keep most trips within the Mid‑Atlantic corridor.
  culinary: Juan Leonard enjoys making late‑night ramen bowls with miso, soy sauce and soft‑boiled eggs, experiments with grilled cheese using smoked paprika and jalapeños, and considers a street‑style
    taco al pastor with fresh cilantro and pineapple their ultimate comfort food, often prepared while a lo‑fi beat plays in the background.
  core: Juan Leonard is a creatively restless teen who channels curiosity into art and music, battles intense anxiety, and lives for spontaneous street‑level experiences, even when their disorganization
    and competitive edge sometimes derail plans.
background:
  cultural: Juan comes from an African‑American background rooted in the vibrant cultural tapestry of Washington, DC. Growing up in the city’s historic neighborhoods, he is steeped in the legacy of Black
    civil rights activism, jazz, soul, and the modern hip‑hop scene that thrives in the area. His family celebrates traditions such as soul food gatherings, community block parties, and the annual DC Black
    Pride festival, which reinforce a strong sense of identity and community pride. Influenced by local Black artists like Kehinde Wiley and the city’s mural movement, Juan draws inspiration from the visual
    storytelling that reflects both African diaspora heritage and contemporary urban life. He also values the city’s political consciousness, often engaging with youth-led social justice initiatives that
    shape his worldview.
attributes:
  skills: '[''Digital illustration'', ''Graffiti and street art'', ''Beatmaking and lyric writing'', ''Basic coding (Scratch, HTML/CSS)'', ''Video editing (iMovie/Clipchamp)'', ''Improvisational rap and
