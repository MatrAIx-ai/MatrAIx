  hobbies: '[''Sketching and graffiti art'', ''Beatmaking and rap lyric composition'', ''Playing street basketball'', ''Exploring flea markets and vintage clothing'', ''Visiting art museums and galleries
    (Hirshhorn, National Gallery)'', ''Reading graphic novels and speculative fiction'', ''Journaling'', ''Watching indie/experimental films'']'
  career_goals: Juan aspires to channel his artistic passion into a career as a multidisciplinary creator, dreaming of becoming a muralist and graphic designer whose work reflects his community’s stories.
    He hopes to secure a place in an arts-focused high school or youth mentorship program in Washington, DC, and eventually study graphic design or visual arts at a college level. Long-term, he envisions
    launching his own brand of streetwear and visual media, using his skills to amplify social messages and inspire other young people. He also has an ambition to win local freestyle rap competitions and
    perhaps produce a YouTube channel showcasing his art, music, and commentary on social issues.
