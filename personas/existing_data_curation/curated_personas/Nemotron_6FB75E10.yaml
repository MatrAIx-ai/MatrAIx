  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Reading literary fiction'', ''Cooking Puerto Rican dishes'', ''Yoga'', ''Coastal hiking'', ''Volunteering in art workshops'']'
  career_goals: Noemi aims to become the leading broker in Ocean County for clients seeking homes with aesthetic and cultural resonance. She plans to launch a boutique real‑estate firm that offers art‑consultancy
    staging and lifestyle curation, mentor emerging agents—particularly from underrepresented backgrounds—and develop community outreach programs that tie real‑estate development to local cultural initiatives.
