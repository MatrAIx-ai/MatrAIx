personas:
  professional: Johnetta Smith, a veteran early-childhood specialist with three decades of hands-on experience, blends their methodical routine-building, meticulous licensing record-keeping, and culturally
    responsive curriculum design to mentor staff, enforce rigorous safety standards, and shape policies at their center as they prepare for the Child Development Associate credential and a supervisory role.
  sports: Johnetta Smith stays active by walking the Kanawha River Trail five times a week, participating in the Saint Albans senior walking club, attending a gentle yoga class at the local community center,
    and cheering on the West Virginia Mountaineers football team and the Charleston Dirty Birds baseball club each season, although they occasionally experience joint pain that sometimes curtails their
    routine.
  arts: Johnetta Smith weaves intricate family stories into their quilts, raises their voice in the Saint Albans church choir humming gospel classics by Mahalia Jackson and the Clark Sisters, and they immerse
    themselves in historical fiction by Barbara Kingsolver and Alexander McCall Smith, often quoting passages while stitching or journaling.
  travel: Johnetta Smith favors low-key, road-trip adventures—such as weekend getaways to the Shenandoah Valley, strolling the Blue Ridge Parkway, and a nostalgic visit to Savannah's historic district—while
    they dream of a leisurely river cruise along the Mississippi and plan future visits to the English countryside with their sister, all budgeted through careful savings.
  culinary: Johnetta Smith delights in cooking soulful Southern meals, frequently preparing slow-cooked collard greens with smoked turkey, buttery cornbread, and herb-infused fried catfish seasoned with
    garden-fresh basil, thyme, and rosemary, while they skillfully can jars of pickled okra for winter gatherings.
  core: Johnetta Smith, a structured and caring lifelong educator with a penchant for precise schedules and quiet anxiety, finds balance in quilting, garden walks, and gospel choirs, while they occasionally
    over-think finances and medication timing.
background:
  cultural: Johnetta is a third‑generation African‑American who grew up in the coal‑hills of Kanawha County. Her grandparents moved from the rural South during the Great Migration, bringing with them rich
    traditions of storytelling, gospel music, and home‑cooked soul food. In Saint Albans, she has been an active member of the historically Black church, where communal support and civil‑rights activism
    have shaped her sense of responsibility and collective well‑being. She maintains close ties with extended family, celebrating heritage through annual family reunions that feature traditional dishes,
    call-and-response prayer, and the sharing of family histories. This cultural foundation influences her caregiving philosophy, encouraging her to embed respect for African‑American heritage and Appalachian
    resilience into the daily lives of the children she nurtures.
