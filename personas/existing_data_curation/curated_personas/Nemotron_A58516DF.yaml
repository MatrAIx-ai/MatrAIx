  hobbies: '[''Quilting'',''Community Choir Singing'',''Gardening'',''Reading Historical Fiction'',''Cooking Traditional Southern Soul Food'',''Genealogy Research'',''Journaling'',''Bridge Club'',''Walking
    on the Kanawha River Trail'',''Knit Crafting'']'
  career_goals: Approaching retirement, Johnetta aims to formalize her expertise by earning the Child Development Associate credential and completing a certification in Early Childhood Program Management.
    She hopes to transition into a supervisory role at her current childcare center, where she can shape policies that strengthen safety standards and embed African‑American cultural content into the curriculum.
    Long‑term, she envisions opening a modest, family‑run daycare in Saint Albans that offers a structured yet nurturing environment for children of working families, particularly serving the local Black
    community. She also wants to leave a legacy of mentorship by establishing a scholarship fund for young caregivers pursuing higher education.
