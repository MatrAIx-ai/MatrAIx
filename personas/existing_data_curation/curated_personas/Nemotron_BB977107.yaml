personas:
  professional: Hector Ruiz is a hands-on problem solver who melds curiosity with practicality, thriving in community‑college trade programs and using their bilingual fluency to bridge client needs while
    they balance a relaxed, flexible approach to scheduling in pursuit of an electrician certification and future freelance handyman service.
  sports: Hector Ruiz is an avid outdoors enthusiast who spends weekends hiking the Wasatch Range, mountain‑biking the Moab trails, and fishing in Utah’s rivers, they cheer for the Utah Jazz and Real Salt
    Lake, and belong to the local Mountain Biking Club, but they rarely hit the gym, preferring natural terrain workouts over structured cardio.
  arts: Hector Ruiz immerses themselves in a blend of classic Mexican folk sounds like Los Tigres del Norte and modern rock from Foo Fighters, they often attend local live‑music nights at the Red Butte
    Café, enjoy watching classic films by Guillermo del Toro, and keep a sketchbook for quick doodles inspired by Frida Kahlo’s vibrant color palettes.
  travel: Hector Ruiz favors spontaneous road trips that combine scenic hikes with cultural stops, they have already explored Zion and Grand Canyon National Parks, visited Mexico City for a culinary pilgrimage,
    and dream of trekking Patagonia’s Torres del Paine and experiencing Japan’s cherry-blossom season, though budget constraints keep most escapades within the western United States.
  culinary: Hector Ruiz is a confident home cook who masters traditional dishes like pork tamales, pozole verde, and fresh pico de gallo, they relish the tactile process of grinding chilies and shaping
    masa, while also experimenting with sous-vide chicken tacos, and they often host weekend family feasts that double as informal skill‑sharing sessions.
  core: Hector Ruiz is a pragmatic tinkerer who blends outdoor adventure with hands‑on tech projects, they juggle a laid‑back schedule, a love for DIY, and occasional bouts of disorganization that keep
    life interesting.
background:
  cultural: Hector was raised in a Mexican-American household where Spanish was spoken daily and family gatherings revolved around shared meals and cultural celebrations. His parents emigrated from central
    Mexico in the early 1990s, seeking work in agriculture before settling in Utah, where they instilled a strong sense of familismo, respect for elders, and pride in Mexican heritage. He celebrates holidays
    such as Día de los Muertos and Mexican Independence Day with traditional foods and music, while also participating in local community events in Mona. Balancing his bicultural identity, Hector blends
    Mexican culinary traditions with the ingredients available in the Intermountain West and often serves as a cultural bridge between his neighbors and the broader Hispanic community in the region.
attributes:
  skills: '[''automotive maintenance'', ''basic plumbing repairs'', ''electrical troubleshooting'', ''carpentry'', ''landscaping'', ''computer and smartphone troubleshooting'', ''bilingual Spanish-English
    communication'']'
  hobbies: '[''hiking'', ''mountain biking'', ''camping'', ''fishing'', ''DIY woodworking'', ''electronics tinkering'', ''cooking Mexican dishes'', ''strategy video gaming'', ''reading technology articles'']'
  career_goals: Hector plans to formalize his hands-on talents by enrolling in a community-college trade program to earn a certification as an electrician or HVAC technician. He sees this qualification
    as a pathway to a stable, well-compensated job while preserving the flexibility he values. In the longer term, he hopes to launch his own freelance handyman service that can accommodate his eclectic
    interests, and he also aspires to offer occasional tech-support gigs from home. Alongside these professional goals, he intends to continue mentoring younger community members in practical skills and
    to pursue a short course in small-business management.
