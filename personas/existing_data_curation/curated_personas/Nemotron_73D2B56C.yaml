personas:
  professional: Lugenia Mcglotten, a budding young engineer who loves constructing intricate LEGO creations, they pour meticulous organization and a competitive drive into each build, treating every brick
    arrangement as a miniature engineering challenge.
  sports: Lugenia Mcglotten, an energetic soccer enthusiast who plays for the local Bright Horizons Youth Soccer League, they idolize the Seattle Sounders FC and tirelessly practice drills after school,
    channeling a competitive spirit on the field while also occasionally feeling stressed about performance.
  arts: Lugenia Mcglotten, a vivid illustrator and picture‑book aficionado who draws colorful scenes inspired by Dr. Seuss and Van Gogh, they dance to the soulful melodies of Aretha Franklin and the uplifting
    gospel of Kirk Franklin while completing Girl Scouts art badges, weaving music and visual art into daily play.
  travel: Lugenia Mcglotten, an adventurous six‑year‑old who revels in family road trips to the Grand Canyon and Disney World, they cherish meticulously planned itineraries yet daydream about strolling
    the streets of Paris and seeing the Eiffel Tower, balancing excitement with a need for familiar routine.
  culinary: Lugenia Mcglotten, a budding kitchen helper who proudly spreads peanut butter on banana toast and stirs homemade mac and cheese, they favor cheesy pizza and love sprinkling cinnamon on oatmeal,
    though they often sneak extra chocolate chips when no adult is watching.
  core: Lugenia Mcglotten, a fiercely organized, curiosity‑driven six‑year‑old who balances a competitive edge with a love for collaborative play, often worries about perfection yet finds joy in slime experiments,
    gospel music, and badge‑earning adventures.
background:
  cultural: Lugenia is a Black child raised in College Station, Texas, where her family celebrates African‑American traditions such as Juneteenth, soul food gatherings, and church concerts. She participates
    in local community events at her neighborhood church and attends cultural programs at the nearby Texas A&M campus that expose her to Black history and STEM outreach. Her upbringing blends Southern hospitality
    with a strong sense of cultural pride, influencing her love of music, storytelling, and community involvement.
