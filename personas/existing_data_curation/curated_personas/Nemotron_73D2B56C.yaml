  hobbies: '[''Reading picture books'', ''Building LEGO'', ''Playing soccer'', ''Dancing'', ''Girl Scouts badges'', ''Simple science experiments'', ''Listening to music'', ''Drawing'']'
  career_goals: Lugenia dreams of becoming a scientist or teacher who can explore how things work and help others learn. She aims to win school science fairs, earn the role of class monitor, and eventually
    work as a veterinarian because of her love for animals. Her competitive spirit drives her to set high standards for herself and strive to be first in any challenge she takes on.
