  career_goals: Jose aims to achieve a Journeyman Pipefitter certification within the next year and eventually obtain a Master Pipefitter license. He envisions one day launching his own small contracting
    firm focused on energy‑efficient plumbing solutions for residential customers, especially within the Hispanic community where he can offer bilingual service. He also hopes to become a mentor for apprentices,
    sharing his practical knowledge and fostering a supportive work environment. Balancing his desire for stability with his compassion, he wants to specialize in projects that improve housing safety and
    accessibility for low‑income families.
