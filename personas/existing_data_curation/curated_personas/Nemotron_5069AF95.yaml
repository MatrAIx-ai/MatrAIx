personas:
  professional: Austin Geis, an 83‑year‑old retired high‑school social studies teacher and community arts organizer, leverages decades of lesson‑planning expertise, woodworking skill, and meticulous documentation
    habits to curate local exhibitions and mentorship workshops, while their natural curiosity and occasional worry drive them to constantly seek fresh perspectives and maintain rigorous organization.
  sports: Austin Geis, an avid early‑morning fisherman who practices catch‑and‑release on Flathead Lake, also hikes the Mission Mountains year‑round, follows the Montana Grizzlies football team and the
    Missoula PaddleHeads baseball club, and they keep fit by doing gentle yoga and walking the lake trail, balancing solitary contemplation with community‑spirit enthusiasm for local sports.
  arts: Austin Geis, a lifelong admirer of modernist and indigenous art, regularly attends Norton Gallery openings where they discuss works by Georgia O’Keeffe, Ansel Adams, and local Salish artists, while
    at home they paint watercolors of sunrise over the lake and play a piano repertoire ranging from Beethoven sonatas to Miles Davis, channeling their curiosity into both visual and musical expression.
  travel: Austin Geis, who prefers thoughtful, low‑key travel itineraries, has explored Glacier National Park, the historic towns of Butte and Missoula, and a pilgrimage to Banff National Park, and they
    aspire to visit the tranquil gardens of Kyoto to study Japanese landscape design, always planning trips around off‑season rates and their modest budget.
  culinary: Austin Geis delights in preparing fresh heirloom tomato salads dressed with basil, oregano, and locally sourced goat cheese, cooking pan‑seared trout from Flathead Lake with lemon‑thyme butter,
    and occasionally baking apple‑cinnamon crumble, while they modestly consider themselves an enthusiastic but imperfect home cook who sometimes forgets to season properly.
  core: Austin Geis, an 83‑year‑old curiously inventive retiree, blends artistic devotion, meticulous stewardship, and a touch of worry‑driven diligence into a life of community mentorship and serene lake‑side
    creativity.
background:
  cultural: Austin is a third‑generation white American of German and Irish ancestry, born in 1942 in a small Midwestern town. He grew up during the post‑World War II era, absorbing the values of hard work,
    self‑reliance, and community involvement that characterized the American heartland. In his early thirties he relocated to Polson, Montana, drawn by the region’s natural beauty and its burgeoning arts
    scene. Over the decades he has built deep relationships with the local Salish and Kootenai communities, regularly participating in cross‑cultural festivals and collaborative art projects, which have
    broadened his appreciation for indigenous perspectives. While he maintains fluency in basic German phrases from family traditions, his cultural identity today is a tapestry woven from Midwestern roots,
    Montana frontier ethos, and a genuine respect for the multicultural heritage of the Flathead Valley.
attributes:
  skills: '[''Teaching (social studies & art appreciation)'', ''Lesson planning'', ''Budget management'', ''Mentorship'', ''Small‑engine repair'', ''Carpentry & woodworking'', ''Sustainable gardening'',
