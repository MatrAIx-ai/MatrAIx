  hobbies: '[''Watercolor painting'', ''Sketching'', ''Gardening (heirloom tomatoes & native pollinator plants)'', ''Fishing on Flathead Lake'', ''Hiking (Mission Mountains)'', ''Digital nature photography'',
    ''Attending gallery openings and art lectures'', ''Playing piano (classical and jazz)'', ''Leading senior art discussion groups'', ''Mentoring young artists'', ''Recording oral histories'']'
  career_goals: Although officially retired, Austin’s ambition is to leave a lasting cultural imprint on Lake County. He aims to complete a series of photo‑essay books that capture the seasonal changes
    of Flathead Lake and the surrounding mountains, paired with recorded oral histories from long‑time residents, including members of the Salish and Kootenai tribes. He also wishes to mentor younger artists
    through a quarterly workshop at the Polson Community Center, helping them develop both technical skills and confidence in presenting unconventional ideas. In parallel, he plans to finish his memoir,
    focusing on the lessons he has learned about resilience, curiosity, and the importance of community cohesion, thereby providing a reflective guide for future generations. These projects serve both his
    desire for purposeful contribution and his personal strategy for managing stress through structured, meaningful activity.
