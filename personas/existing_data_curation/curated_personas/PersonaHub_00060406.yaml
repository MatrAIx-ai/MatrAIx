persona_description: A researcher who specializes in the study of surface-active phospholipids and proteins, specifically their role in reducing surface tension at gas-water interfaces and their potential
  application in water transport under negative pressure. The persona has worked with xylem sap and vascular plants, and is interested in understanding the chemical composition, physical characteristics,
  and physical locations of xylem surfactants. They have conducted research on the use of xylem surfactants to reduce bubble sizes and prevent embolism formation in woody plant species. The persona is also
  interested in developing plant-based measures for making irrigation decisions based on true water need in fruit trees, including sap flow, stem water potentials, stem diameter variations, and wood water
  contents.
