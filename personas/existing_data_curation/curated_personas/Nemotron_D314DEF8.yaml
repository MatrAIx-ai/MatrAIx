personas:
  professional: Deanna Lowenthal is a seasoned painter and paperhanger with three decades of hands‑on experience, renowned for meticulous surface preparation, eco‑friendly decorative finishes, and mentorship
    of apprentices, and they balance a pragmatic project schedule with a curiosity to experiment with new color‑theory techniques.
  sports: Deanna Lowenthal follows the Oklahoma City Thunder and the Oklahoma Sooners football team with avid enthusiasm, joins a local walking club for scenic trail hikes each weekend, and occasionally
    plays in a senior softball league, balancing competitive spirit with community camaraderie.
  arts: Deanna Lowenthal expresses herself through landscape painting at the Edmond Art Club, drawing inspiration from prairie vistas and the works of Thomas Moran, while they also enjoy country music legends
    like Garth Brooks and Dolly Parton at the State Fair and regularly visit the Tulsa Art Deco Museum.
  travel: Deanna Lowenthal prefers road‑trip adventures that blend family visits and cultural stops, having driven to Nashville for live country music, explored the Texas Hill Country’s wineries, and taken
    yearly family outings to the Grand Canyon, always planning trips around budget‑friendly lodging and the school calendar.
  culinary: Deanna Lowenthal delights in cooking classic Oklahoma barbecue, mastering smoked pork ribs, chicken‑fried steak with gravy, and baked beans spiced with hickory smoke, and they enjoy experimenting
    with homemade rubs while never passing up a slice of pecan pie at community potlucks.
  core: Deanna Lowenthal is a community‑centric, eco‑conscious painter who blends Midwestern practicality with a love for country music, backyard gardening, and a knack for turning every project into a
    teaching moment, even if they occasionally juggle too many commitments.
background:
  cultural: 'Deanna grew up in central Oklahoma in a family of German‑Irish descent, embodying the Midwestern values of hard work, self‑reliance, and community responsibility. Her upbringing in the suburbs
    of Oklahoma City instilled a deep appreciation for local traditions such as the State Fair, country music, and regional cuisine like chicken‑fried steak and barbecue. She is active in her local church,
    which reinforces a culture of service and neighborly support. These cultural influences, combined with a broader American white heritage, shape her worldview: she values practicality, celebrates national
    holidays with family gatherings, and maintains strong ties to the close‑knit community of Edmond and Oklahoma County.'
attributes:
  skills: '[''surface preparation'', ''drywall sanding and taping'', ''paper hanging'', ''decorative painting techniques'', ''color theory application'', ''low‑VOC material knowledge'', ''OSHA safety compliance'',
    ''project scheduling and budgeting'', ''customer communication'', ''team leadership and mentorship'', ''problem solving'']'
  hobbies: '[''community art club painting'', ''volunteering at adult education workshops'', ''gardening native plants'', ''walking groups on local trails'', ''attending Oklahoma State Fair'', ''cooking
    regional BBQ'', ''genealogy research'', ''church charity outreach'', ''organizing neighborhood block parties'']'
  career_goals: Deanna aims to transition from full‑time work to a boutique finishing business that specializes in custom decorative painting and eco‑friendly interior finishes. She plans to complete her
    incomplete college coursework in interior design to broaden her service offerings and to obtain a small‑business license within the next two years. A key ambition is to establish a formal apprenticeship
    program for younger tradespeople in the Edmond area, passing on her practical knowledge while fostering community ties. Additionally, she hopes to partner with local charities to provide free home‑rehab
    services for senior neighbors, blending her professional skills with her compassionate nature.
