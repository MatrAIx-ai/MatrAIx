personas:
  professional: Carmen Duran, a veteran carpenter and custom cabinetry specialist, leverages their practical curiosity and relaxed, flexible approach to transform reclaimed wood into eco‑friendly furniture
    while mentoring apprentices and navigating the occasional chaos of a self‑run workshop.
  sports: Carmen Duran hits the trails of the San Gabriel Mountains on weekends, is a member of the local San Gabriel Hiking Club, and they root for the Los Angeles Dodgers, Lakers and Rams while occasionally
    joining a community adult recreational soccer league.
  arts: Carmen Duran’s evenings are filled with the strains of regional folk music and corridos from artists like Los Tigres del Norte and Lila Downs, and they regularly attend cultural festivals and local
    gallery openings that celebrate traditional crafts.
  travel: Carmen Duran prefers spontaneous road trips that blend work and leisure, having already explored the timber markets of Portland, the culinary scene of Oaxaca, and dreaming of a future workshop
    retreat in the forests of British Columbia, they balance travel aspirations with the financial realities of saving for a property.
  culinary: Carmen Duran enjoys crafting traditional family dishes such as tamales, chilaquiles and mole verde, often incorporating fresh tomatoes, chilies, and garden‑grown zucchini from their vegetable
    plot, and they experiment boldly in the kitchen, though they sometimes over‑salt the sauce.
  core: Carmen Duran blends a hands‑on curiosity for wood and food with a laid‑back, occasionally disorganized rhythm, turning reclaimed timber into eco‑friendly art while dreaming of a community‑centric
    workshop, they embrace both practicality and improvisation.
background:
  cultural: Carmen is a second‑generation Mexican‑American who grew up in the multicultural neighborhoods of Los Angeles County. She speaks both Spanish and English fluently and maintains close ties to
    her family's traditions, celebrating Día de los Muertos, Navidad, and other Mexican holidays with family and community gatherings. Her heritage informs her appreciation for handcrafted woodwork, vibrant
    colors, and the communal spirit of helping neighbors, values that she brings into her carpentry practice and community involvement.
attributes:
  skills: '[''Residential framing'', ''Custom cabinetry'', ''Furniture repair and restoration'', ''Reclaimed wood projects'', ''Blueprint interpretation'', ''Construction safety compliance'', ''Tool maintenance'',
    ''On‑site problem solving'', ''Client communication'', ''Apprentice mentorship'']'
  hobbies: '[''Vintage furniture restoration'', ''Traditional Mexican cooking'', ''Vegetable gardening'', ''Hiking'', ''Listening to regional Mexican folk music'', ''Attending cultural festivals'', ''DIY
    woodworking workshops'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Carmen aims to transition from contract work to owning a modest workshop that creates custom, eco‑friendly furniture for the Los Angeles market. Over the next two years she plans to acquire
    a CNC router, earn a formal carpentry certification through a community college, and develop a mentorship program for women and Latino youth interested in the trades. Financially she seeks a stable
    income that allows her to purchase a small property to house both her workshop and a safe home for herself, while also taking on community projects such as Habitat for Humanity builds.
