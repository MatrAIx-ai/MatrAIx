personas:
  professional: An aspiring junior programmer named Omayra Latorre channels their curiosity and practicality into building simple, organized games on Scratch, while their compassionate nature makes them
    eager to share their projects with classmates.
  sports: A spirited soccer enthusiast named Omayra Latorre darts across the local park’s under‑10 Wildcats league field every Saturday, cheers for the city’s pro basketball team the Guardians, and balances
    organized drills with spontaneous kick‑about games, showing their practical streak by tracking their running distance with a child‑friendly fitness band.
  arts: An imaginative illustrator named Omayra Latorre drafts bold jungle scenes in their sketchbook, creates vibrant papel picado garlands for family celebrations, and follows the lively folk melodies
    of violinist Sarah Chang, sharing their art in school shows to bring the class together.
  travel: A curious explorer named Omayra Latorre spends weekends hunting for bugs in the nearby Redwood Creek park, recalls a family road trip to the sunny beach town of Santa Cruz, and dreams of camping
    under the stars at Yosemite National Park, planning each adventure with hand‑drawn maps and a trusty magnifying glass.
  culinary: A kitchen helper named Omayra Latorre loves assembling tacos with corn tortillas, seasoned beans, fresh cilantro, and salsa verde, proudly rolls homemade guacamole using ripe avocados and a
    squeeze of lime, and spices up snack time by crafting colorful fruit kebabs, though they occasionally over‑salt the salsa when excited.
  core: Omayra Latorre blends boundless curiosity with calm practicality, turning every adventure—from Scratch coding to taco seasoning—into a shared, compassionate experience, even if they sometimes forget
    to tidy their craft supplies.
background:
  cultural: Omayra is raised in a Mexican‑heritage family in Fort Worth, Texas. She speaks Spanish at home and English at school, and her household celebrates traditions such as Día de los Muertos, Cinco
    de Mayo, and family gatherings centered around Mexican cuisine. Her family participates in local cultural events at the Tarrant County Mexican community center, reinforcing values of strong family ties,
    respect for elders, community cooperation, and pride in her cultural roots.
