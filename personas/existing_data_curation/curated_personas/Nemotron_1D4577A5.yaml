  career_goals: She imagines growing up as someone who helps her community, dreaming of roles such as a science teacher, environmental advocate, or community health volunteer. Omayra wants to inspire children,
    protect local parks, and blend her cultural heritage with her work, ultimately fostering harmony and learning in the neighborhoods she loves.
