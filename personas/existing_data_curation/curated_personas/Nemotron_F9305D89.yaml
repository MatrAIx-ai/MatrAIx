  career_goals: Dominick seeks to channel his eclectic skill set into a flexible, self‑directed career that lets him stay curious and avoid rigid structures. He aims to launch a boutique woodworking studio
    that also functions as a community maker space, offering workshops and custom pieces. Concurrently, he plans to develop a freelance content platform—blog, podcast, or YouTube channel—focused on art
    appreciation, DIY home improvement, and the intersection of creativity and technology. Long‑term, he hopes to become a recognized voice in the New England maker and art community, while also improving
    his organizational habits to manage stress and meet personal financial goals.
