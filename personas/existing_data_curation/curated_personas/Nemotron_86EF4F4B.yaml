personas:
  professional: Selina Madonia, a meticulous home‑based creative entrepreneur, blends event coordination, sustainable gardening, and digital design to run an online boutique of handmade knitwear, quilts,
    and limited‑edition photographic prints while maintaining a calm, organized, and adaptable approach that defines their daily life.
  sports: Selina Madonia is an avid hiker who spends weekends traversing the Oquirrh Mountains with the Tooele Trail Club, follows the Utah Jazz for basketball, cheers on Real Salt Lake during the MLS season,
    and occasionally joins a community pick‑up volleyball game at the local park to keep their body active.
  arts: Selina Madonia curates mini‑exhibitions at home featuring Ansel Adams prints and Georgia O’Keeffe reproductions, spends evenings listening to piano works by Debussy and the folk harmonies of Sufjan
    Stevens, and channels their love for Japanese aesthetics into watercolor landscapes and hand‑knit scarves.
  travel: Selina Madonia prefers low‑key road trips that blend scenic photography with family time, having explored Utah’s Arches and Canyonlands National Parks and dreaming of a cultural pilgrimage to
    Kyoto to study Japanese garden design, all while planning itineraries months in advance to fit their schedule and budget.
  culinary: Selina Madonia enjoys cooking simple, seasonal meals such as sage‑infused roasted chicken with lavender‑honey glazed carrots, often harvesting herbs and wild berries from their garden, and relishes
    occasional farm‑to‑table dinners at local cooperatives while occasionally treating themselves to a slice of artisanal sourdough.
  core: Selina Madonia balances a calm, organized life with a quiet curiosity, turning solitary hikes into creative inspiration, yet occasionally hoards craft supplies and forgets to reply to non‑urgent
    emails.
background:
  cultural: Selina is a third‑generation American of primarily Northern European ancestry, with German and Scandinavian roots. Raised in Tooele, Utah, she grew up in a tight‑knit, rural community that values
    modesty, self‑reliance, and strong family bonds—a legacy of the region’s pioneer and frontier heritage. While Tooele is largely influenced by the LDS Church, her household maintains an ecumenical outlook,
    engaging in community festivals, cultural events, and interfaith gatherings. Her upbringing combined the outdoors‑oriented lifestyle of the Utah mountains—hiking, gardening, and an appreciation for
    the land—with a personal love for the arts fostered by school programs and frequent trips to Salt Lake City museums. This blend of traditional Western values and an open curiosity toward diverse artistic
    expressions shapes her identity, informing both her creative pursuits and her communal contributions.
attributes:
  skills: '[''Home organization'', ''Personal finance budgeting'', ''Event coordination for small community gatherings'', ''Gardening and sustainable horticulture'', ''Handicraft production (knitting, quilting,
    jewelry making)'', ''Photography (landscape and still life)'', ''Basic graphic design (Canva, Photoshop)'', ''Art history research and curation'', ''Writing and blogging'', ''Digital photo editing'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Reading art history and contemporary art literature'', ''Nature photography'', ''Cultivating a native plant garden'', ''Knitting and crocheting'',
    ''Watercolor painting'', ''Hiking in the Oquirrh Mountains'', ''Participating in small book clubs'', ''Volunteering at community center events'', ''Listening to classical and indie folk music'']'
  career_goals: Selina aims to transform her suite of creative and organizational talents into a modest home‑based venture. She plans to launch an online boutique that sells her handmade knitwear, quilts,
    and limited‑edition prints of her photographs, complemented by a blog that educates readers about local art, nature, and sustainable gardening practices. To deepen her impact, she intends to earn a
    certificate in arts administration through a community college, positioning herself to volunteer as a program coordinator for the Tooele County Arts Council. In this role, she hopes to lead workshops
    in photography, knitting, and art appreciation for seniors and youth, and to develop a mentorship program that encourages women in her community to explore creative skills. Throughout, she seeks to
    balance her entrepreneurial ambitions with family responsibilities, preserving the flexibility and calm that define her daily life.
