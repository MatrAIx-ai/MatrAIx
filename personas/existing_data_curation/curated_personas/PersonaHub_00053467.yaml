persona_description: A church historian or art historian who is particularly interested in the iconography and craftsmanship of sixteenth-century church monuments, particularly those in the Netherlands.
  They are familiar with the types of ledger stones used in Dutch churches and the techniques used to add later details. They have a keen eye for detail and can identify certain workshops based on the repetition
  of designs and lettering patterns. They are also knowledgeable about the historical context of the painting and the changes in the church during the Reformation, such as the disappearance of the funerary
  hatchments and the reconstruction of the south transept.
