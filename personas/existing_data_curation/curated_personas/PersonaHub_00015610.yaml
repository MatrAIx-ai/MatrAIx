persona_description: A person who is interested in the negotiation process and the pricing methods used in various industries, including agriculture and livestock. They are likely to be familiar with the
  USDA price reporting system and the use of reference prices in various industries. They may also be interested in the drawbacks of using reference prices and the potential for manipulation in the pricing
  process. They appreciate the convenience of reference prices in simplifying matters for buyers and sellers and may be interested in the alternative marketing arrangements (AMA) that have become the predominant
  method of livestock pricing.
