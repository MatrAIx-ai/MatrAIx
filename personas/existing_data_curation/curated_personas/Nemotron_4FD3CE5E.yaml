personas:
  professional: Stephanie Oconnor, a 12‑year‑old budding community event coordinator, combines a love for routine and competitive edge to meticulously plan school drama club performances, keeping schedules
    tight, delegating tasks with clear expectations, and motivating teammates to outshine each other, which they find energizing.
  sports: Stephanie Oconnor, a competitive midfielder for the Northside Youth Soccer Club and point guard for the Junior Mavericks Basketball League, channels their love for routine training into daily
    drills, follows professional teams like the Seattle Sounders FC and the Los Angeles Lakers for inspiration, insists on precise game plans before each match, and challenges teammates to improve performance,
    which they view as essential to personal growth.
  arts: Stephanie Oconnor, an enthusiastic member of the school drama club, idolizes Lin‑Manuel Miranda for his lyrical storytelling, admires actress Emma Watson's poise, reads adventure novels by Rick
    Riordan, and spends free time sketching comic panels inspired by Disney's classic animation, allowing the arts to balance their competitive sports drive, which they cherish as a creative outlet.
  travel: Stephanie Oconnor prefers well‑planned family trips, having explored the Smithsonian museums in Washington, D.C., and dreaming of future adventures to the historic streets of Kyoto, Japan, and
    the rugged peaks of Banff National Park, Canada, while they balance school commitments and a modest travel budget.
  culinary: Stephanie Oconnor, a budding baker, frequently perfects chocolate chip cookies and red‑velvet cupcakes topped with buttercream and rainbow sprinkles, experiments with a pinch of sea salt for
    flavor depth, and enjoys sharing these treats with teammates after soccer practice, though they sometimes over‑mix batter when excited.
  core: Stephanie Oconnor is a routine‑loving, fiercely competitive 12‑year‑old who balances organized soccer drills with spontaneous cookie‑baking marathons, occasionally neglecting homework for extra
    LEGO builds, and they thrive on being the reliable backbone of every group.
background:
  cultural: Stephanie comes from a white, likely Irish‑American family living in Plymouth, Wisconsin. Her upbringing reflects typical Midwestern small‑town values—emphasis on community, practicality, and
    religious traditions such as attending a local church. Family gatherings often feature Irish food and the celebration of St. Patrick’s Day, and she participates in local events like county fairs and
    town clean‑up days, which reinforce her sense of belonging and responsibility.
attributes:
  skills: '[''Organizing group activities'', ''Team sports (soccer, basketball)'', ''Basic computer proficiency (Word, Excel)'', ''Public speaking'', ''Strategic thinking (chess)'', ''Cooking and baking'',
    ''Problem‑solving'']'
  hobbies: '[''Soccer'', ''Basketball'', ''Baking'', ''LEGO building'', ''Chess'', ''Reading adventure novels'', ''Volunteering at community center'', ''Drama club'']'
  career_goals: Stephanie aims to graduate high school as top of her class and pursue a career that blends practicality with community service. She is interested in becoming a teacher or a community health
    worker to help others in her town, and she also dreams of opening a small bakery one day where she can apply her baking skills and manage a business. Short‑term, she wants to earn a scholarship for
    a science competition and be captain of her school’s soccer team.
