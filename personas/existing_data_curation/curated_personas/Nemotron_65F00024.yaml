personas:
  professional: Angel Dulanto, a veteran accountant with expertise in ledger management, tax preparation, and audit procedures, they leverage their vivid imagination and spontaneous problem‑solving style
    to turn dense financial data into compelling Power BI dashboards, even if the free‑wheeling approach sometimes tests strict deadlines.
  sports: Angel Dulanto enjoys low‑impact fitness, they join a local senior walking club that meets at the city park to spot hummingbirds, they follow the Los Angeles Dodgers and the Golden State Warriors
    on television, and they occasionally play casual pickleball on weekends with friends, balancing social interaction with solitary exercise.
  arts: Angel Dulanto spends weekends painting acrylic canvases inspired by Mexican folklore and modern abstraction, they find inspiration in the works of Frida Kahlo and Yayoi Kusama, and they regularly
    attend exhibitions at the nearby contemporary art museum, while they listen to Lila Downs and Joaquín Sabina as a soundtrack for creative flow.
  travel: Angel Dulanto prefers thoughtful travel itineraries that blend cultural immersion with culinary discovery, they have explored Oaxaca’s historic markets, the coastal towns of Big Sur, and they
    dream of a study trip to the artsy hill town of Valparaíso, Chile, all while they budget trips through a meticulous spreadsheet.
  culinary: Angel Dulanto’s kitchen experiments fuse traditional mole with California avocado and quinoa, they craft dishes like chipotle‑marinated salmon tacos with fresh cilantro and lime, while they
    host intimate dinner parties where guests savor hand‑crafted horchata infused with rosemary.
  core: Angel Dulanto, a 68‑year‑old accountant‑artist, they blend analytical rigor with boundless imagination, turning spreadsheets into stories, spices into fusion dishes, and community service into a
    lifelong passion, though a love for spontaneity sometimes leaves deadlines unfinished.
background:
  cultural: Angel was born to Mexican parents who immigrated to Southern California in the 1950s, growing up in a bilingual household that celebrated both traditional Mexican customs and the multicultural
    vibrancy of the Inland Empire. Her upbringing emphasized family cohesion, respect for elders, and communal celebrations such as Día de los Muertos and Semana Santa, which she continues to observe. The
    fusion of Mexican heritage with the Californian landscape shaped her values of resilience, hospitality, and a deep sense of social responsibility. Fluent in Spanish and English, Angel often serves as
    a cultural bridge in her professional and volunteer roles, assisting recent immigrants with financial literacy and preserving Mexican culinary traditions in her cooking. Her Catholic background, combined
    with a reverence for indigenous artistic motifs, informs her aesthetic sensibilities and community involvement.
attributes:
  skills: '[''General ledger management'', ''Tax preparation and filing'', ''Financial statement analysis'', ''Internal and external audit execution'', ''Regulatory compliance (GAAP, IRS)'', ''Data visualization
