    (QuickBooks, SAP, Excel)'']'
  hobbies: '[''Acrylic painting'', ''Fusion cooking'', ''Poetry reading and journaling'', ''Herb gardening'', ''Visiting art exhibitions'', ''Bird-watching'', ''Volunteer tax preparation (VITA)'', ''Cultural
    festival participation'', ''Knitting'', ''Creative writing'']'
  career_goals: Although approaching traditional retirement, Angel aims to transition into a part‑time consulting role that merges her accounting expertise with her passion for the arts and community empowerment.
    She envisions offering pro‑bono financial guidance to local Mexican‑American cultural organizations, helping them secure grant funding and maintain sustainable budgets. Additionally, she hopes to develop
    a workshop series on 'financial storytelling' for small nonprofits, teaching them how to present their numbers in compelling, narrative‑driven formats. On a personal level, Angel plans to earn a certification
    in forensic accounting to stay intellectually engaged and to launch a short‑term mentorship program for young Latina accountants entering the field.
