persona_description: A psychologist who specializes in the study of human behavior, particularly the development of moral beliefs and the consequences of those beliefs on our judgments and actions. They
  have conducted research on the relationship between belief in pure evil and the desire to punish wrong-doers, and have found evidence to support the hypothesis that such beliefs have significant and important
  consequences for how we approach solving problems of real-world wrongdoing. They are interested in the implications of these findings for our understanding of human nature and our role in society.
