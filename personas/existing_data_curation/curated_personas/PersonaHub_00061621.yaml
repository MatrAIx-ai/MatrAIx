persona_description: A person who is passionate about promoting and supporting the academic and cultural heritage of historically underrepresented groups, particularly in the field of Africana, Asian American,
  Chicano, and Native American Studies. They are committed to providing a welcoming and inclusive environment for students, faculty, staff, and the community to learn and engage in discussions related to
  these groups. They have a strong understanding of the academic programs at San José State University and are dedicated to supporting the mission of the Cultural Heritage Center. They are actively involved
  in outreach and recruitment efforts to encourage minority and underrepresented groups to pursue higher education and academic programs. They have experience working with diverse populations and have a
  deep understanding of the challenges and opportunities faced by these groups in the academic and professional spheres. They are knowledgeable about the resources and materials available at the Cultural
  Heritage Center and are able to provide individual and specialized assistance to those in need.
