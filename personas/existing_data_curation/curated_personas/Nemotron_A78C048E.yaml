personas:
  professional: Anthony Tenorio, a 32‑year‑old full‑stack software developer proficient in Python, JavaScript, and C#, blends a performance‑first mindset with a collaborative leadership style as he refactors
    legacy code, automates CI/CD pipelines, and mentors junior engineers, all while balancing his competitive drive with practical project timelines.
  sports: Anthony Tenorio enjoys cycling the Amarillo trails and hiking Palo Duro Canyon in the spring, follows the Dallas Cowboys and the Amarillo Sod Poodles for football and baseball, and keeps a disciplined
    workout routine that they sometimes skip after late‑night hackathon victories.
  arts: Energetic about indie gaming, Anthony Tenorio spends weekends dissecting titles from Supergiant Games and Studio MDHR, while their playlists rotate between classic rock legends like The Rolling
    Stones and modern electronica from ODESZA, reflecting a blend of nostalgia and curiosity that informs both their coding style and social gatherings.
  travel: Anthony Tenorio plans trips with a mix of meticulous budgeting and spontaneous detours, having explored the desert vistas of New Mexico’s White Sands, the bustling streets of Oaxaca during Día
    de los Muertos, and dreaming of a future road‑trip along Japan’s Shinkansen to Kyoto, all while balancing family obligations and work deadlines.
  culinary: Anthony Tenorio, an intermediate home chef, perfects mole poblano and tacos al pastor using dried chiles, achiote, and fresh cilantro, often hosting friends for late‑night feasts where they
    experiment with smoky chipotle‑infused sauces, though their tendency to over‑season sometimes leads to hilariously fiery leftovers.
  core: Anthony Tenorio blends a performance‑obsessed engineering mindset with a love for spicy culinary experiments, spontaneous road trips, and a habit of leaving dishes in the sink after marathon coding
    sessions.
background:
  cultural: Anthony is a second‑generation Mexican‑American raised in the Amarillo area. At home, Spanish was spoken alongside English, and family gatherings often featured traditional celebrations such
    as Día de los Muertos and quinceañeras. He grew up attending both local Texan events—like rodeos and high‑school football games—and cultural festivals that highlighted Mexican music, dance, and food.
    This bicultural upbringing gave him a strong sense of community, an appreciation for Mexican culinary traditions, and fluency in both languages, which he occasionally uses when mentoring bilingual students
    or collaborating with Spanish‑speaking colleagues.
