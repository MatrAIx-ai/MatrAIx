  career_goals: Anthony aims to move into a senior or lead engineering role within the next three years, where he can mentor junior developers and shape architectural decisions. He plans to deepen his expertise
    in cloud‑native design and obtain the AWS Solutions Architect Professional certification. Long‑term, he hopes to launch a boutique consultancy that helps small Texas businesses modernize their software
    stacks, leveraging his blend of practical engineering and curiosity about emerging tech like AI‑assisted automation.
