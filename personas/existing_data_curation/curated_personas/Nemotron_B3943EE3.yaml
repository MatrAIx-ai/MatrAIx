personas:
  professional: Chang Cotey, an architectural and engineering manager with a keen eye for design, merges BIM expertise, sustainable building practices, and AI‑driven workflow optimization with a compassionate,
    methodical leadership style that fosters cross‑disciplinary collaboration and encourages innovative solutions inspired by frequent gallery visits and urban photography.
  sports: Chang Cotey enjoys weekend tai chi sessions at Liberty State Park, occasional 10‑kilometer runs with the Hoboken Runners Club, follows the New York Giants and Knicks with loyal enthusiasm, and
    participates in a seasonal indoor climbing league at Brooklyn Boulders, using these activities to balance the demands of a high‑stress managerial role.
  arts: Chang Cotey regularly attends exhibitions at MoMA and the Whitney, draws inspiration from the abstract installations of Yayoi Kusama and the photographic archives of Berenice Abbott, creates mixed‑media
    pieces that blend traditional brushwork with contemporary collage, and unwinds by listening to Philip Glass’s minimalist scores and the jazz improvisations of the Marsalis family.
  travel: Chang Cotey prefers thoughtfully planned trips that combine architectural tours with sustainable experiences, having explored the green building precincts of Copenhagen and the historic districts
    of Boston, while frequently escaping to the Hudson Valley for weekend hikes, and they dream of a future immersion in Singapore’s futuristic skyline to study its integration of nature and design.
  culinary: Chang Cotey enjoys cooking at an intermediate level, favoring seasonal farm‑to‑table meals such as roasted beet salad with goat cheese, miso‑glazed salmon paired with quinoa, and occasional
    hand‑rolled sushi using fresh tuna and avocado, while also savoring a well‑crafted espresso at local cafés and indulging in classic New York pizza on weekend outings.
  core: Chang Cotey blends methodical project leadership with a restless curiosity for art and sustainable design, quietly meditating between meetings, occasionally hoarding obscure camera lenses, and habitually
    sketching building silhouettes on any scrap of paper they find.
background:
  cultural: Chang is a first-generation Korean American whose family immigrated from South Korea in the early 1990s. Growing up in an East Asian household in Bergen County, he was raised with Confucian
    values emphasizing respect for elders, education, and community cohesion. He celebrates Korean holidays such as Seollal (Lunar New Year) and Chuseok, and he maintains ties to the local Korean community
    through the Bergenfield Korean Cultural Center. While fluent in English, he speaks conversational Korean at home and enjoys traditional Korean cuisine, especially kimchi and bulgogi, as well as incorporating
    these flavors into his own fusion cooking experiments. His bicultural identity informs his collaborative work style, blending a collectivist mindset with the individualistic creativity valued in American
    design culture.
