  career_goals: Looking ahead, Chang aims to transition to a senior executive role, such as Vice President of Operations or Director of Architecture and Engineering, where he can shape the strategic direction
    of large-scale, sustainable building projects. He is passionate about integrating emerging technologies—like AI-driven design and advanced BIM workflows—into mainstream practice. He also aspires to
    mentor the next generation of engineers and designers, establishing a formal apprenticeship program within his firm. In the long term, he hopes to launch a consultancy focused on sustainable community
    development in the Greater New York area, partnering with local municipalities to create greener, more resilient neighborhoods.
