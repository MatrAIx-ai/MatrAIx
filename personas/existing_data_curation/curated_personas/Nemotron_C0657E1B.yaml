personas:
  professional: Luis Perera, a dedicated youth soccer captain and budding community organizer, thrives on the predictability of practice schedules and applies their practical mindset to coordinate team
    logistics, while their outgoing nature keeps morale high and their acute emotional sensitivity pushes them to check in on teammates whenever tension arises.
  sports: Luis Perera plays both soccer for the local Rangers youth club and basketball for the high school Titans, follows the professional teams Manchester United and Chicago Bulls, and embraces the structured
    routine of practices three times a week, using their energetic drive to stay fit and their sociable spirit to bond with teammates.
  arts: Luis Perera participates in a community folk dance troupe that showcases traditional regional dances at festivals, enjoys sketching cartoon strips inspired by corridos and banda music artists like
    Los Tigres del Norte and Banda El Recodo, and finds creative release through dancing, drawing, and listening to rhythmic storytelling songs.
  travel: Luis Perera prefers short road trips to nearby national parks such as the Grand Canyon and Lake Tahoe, cherishes annual family visits to the coastal town of Puerto Vallarta, and dreams of backpacking
    across the historic streets of Rome to experience new cultures while balancing their school schedule.
  culinary: Luis Perera helps their mother prepare weekly tacos, tamales, and fresh salsa using corn tortillas, ground pork, chilies, cilantro, and lime, proudly experimenting with homemade guacamole, and
    relishes the familiar aromas that anchor their family's Friday night dinner ritual.
  core: Luis Perera blends a love for routine, group sports, and creative expression with an emotionally intense inner world, channeling anxiety into journal sketches and rhythmic dance while staying grounded
    by family cooking rituals.
background:
  cultural: Luis grows up in a bilingual Mexican household in Hesperia, California, where Spanish is spoken at home and English at school. His family maintains strong ties to Mexican traditions, celebrating
    holidays like Día de los Muertos and Cinco de Mayo with homemade foods, music, and community gatherings. Catholic values and respect for elders shape his sense of responsibility and kindness. The local
    Inland Empire Mexican community provides a network of cultural events, religious services, and neighborhood support, reinforcing Luis's identity while he navigates the broader American teen experience.
attributes:
  skills: '[''Team collaboration'', ''Bilingual communication (Spanish/English)'', ''Basic digital literacy (Google Workspace, social media moderation)'', ''Routine‑oriented cooking of Mexican dishes'',
    ''Organization of school materials and group projects'', ''First‑aid basics'', ''Empathetic listening and peer support'']'
  hobbies: '[''Soccer'', ''Basketball'', ''Co‑op video gaming'', ''Cooking traditional Mexican meals'', ''Folkloric Mexican dance'', ''Listening to regional Mexican music'', ''Journaling'', ''Sketching'']'
  career_goals: Luis aims for a stable, hands‑on career that combines practicality with service to his community. He is interested in vocational pathways such as becoming a certified computer technician,
    a culinary professional specializing in authentic Mexican cuisine, or a community health worker who can assist peers facing emotional challenges. He hopes to enroll in a post‑secondary program that
    offers structured training while allowing him to stay close to his family. Long term, Luis envisions mentoring younger teens, using his empathy and reliability to foster a supportive environment.
