  hobbies: '["Reading historical and contemporary literature", "Painting watercolor scenes", "Gardening (heirloom vegetables)", "Listening to jazz and blues", "Genealogy research", "Participating in a small
    book club", "Knitting and quilting", "Walking in local parks", "Volunteering at the library and church cultural events"]'
  career_goals: Approaching retirement, Kierra aims to solidify her store’s market position and achieve a regional supervisory role that showcases her track record of exceeding sales targets. She plans
    to transition into a part‑time consulting capacity, helping small, minority‑owned retailers adopt practical innovations while preserving community roots. Mentoring younger employees and passing on her
    expertise are top priorities, as is reducing personal stress by delegating responsibilities and establishing sustainable work habits before fully stepping back.
