persona_description: A theater professional who has extensive experience working in theater, both as an actor and as a playwright. They are skilled in the art of storytelling, and have a deep understanding
  of dramatic structure, dialogue, and suspense. They have developed a keen ear for dialogue and are adept at writing with suspense, creating a sense of "what happens next?" in the mind of the audience.
  They have a strong network of connections within the theater community, and are able to workshop their scripts with actors and directors to refine their material. They are a collaborative artist, and
  are able to work effectively with both actors and directors to bring their plays to life on stage.
