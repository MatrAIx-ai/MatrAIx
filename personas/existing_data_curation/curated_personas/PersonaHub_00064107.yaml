  destinations, including Goreé Island, Niokolo Koba National Park, and the Saly Portudal and Saloum Delta Island. Additionally, they would be interested in the political activities and participation in
  Senegal, as well as the unique features of the country's political system, such as the transfer of power from one civilian government to another and between two political parties.
