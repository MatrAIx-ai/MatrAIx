personas:
  professional: Jorge Moralesrodriguez, a 2‑year‑old who loves staging pretend firefighter rescues, applies his need for structure by arranging his tiny helmet and hose before every play session, and keeps
    the spotlight on them by narrating each imagined emergency in a loud, enthusiastic voice.
  sports: Jorge Moralesrodriguez enjoys the weekend toddler gymnastics class at the local community center, eagerly chases the bright orange ball used in the preschool soccer session, and proudly cheers
    for the nearby Little League team the River City Rascals, often shouting the team name while swinging a plastic bat.
  arts: Jorge Moralesrodriguez delights in the rhythmic claps of Baby Shark, the whimsical melodies of Sesame Street, and the cinematic magic of Disney’s Frozen, frequently dancing with arms outstretched
    and insisting on taking the lead in any impromptu performance.
  travel: Jorge Moralesrodriguez loves family outings to the nearby zoo where the giraffe exhibit provides a predictable viewing spot, day trips to the beach for tactile sand play, and dreams of a future
    visit to Disneyland, preferring short, structured itineraries that keep their schedule calm and familiar.
  culinary: Jorge Moralesrodriguez prefers soft, familiar foods like mashed bananas, cheesy macaroni, and smooth avocado puree, often requesting extra bites of their favorite dinosaur‑shaped chicken nuggets
    while occasionally sneaking a taste of the hidden strawberry jam.
  core: Jorge Moralesrodriguez, a 2‑year‑old with a strong craving for routine, bursts into lively chatter to command attention, yet squints with worry at any change, making them both the life of the playroom
    and its most anxious little overseer.
background:
  cultural: Jorge is raised in a Mexican‑American household in Phoenix, Arizona. Spanish is spoken at home alongside English, and he participates in family traditions such as Día de los Muertos, Christmas
    with Mexican customs, and community festivals that celebrate Latino heritage. His family enjoys traditional foods like tacos, tamales, and atole, and they maintain close ties with an extended family
    network. The vibrant Latino community of Phoenix provides him with exposure to Mexican music, dance, and cultural events, shaping a bicultural identity that blends Mexican roots with Southwestern U.S.
    influences.
attributes:
