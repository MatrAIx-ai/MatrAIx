  career_goals: Jorge often talks about becoming a firefighter because he loves the bright trucks and wants to help people, a role that offers clear, structured responsibilities. He also dreams of scoring
    goals as a soccer player, reflecting his competitive spirit. Occasionally, he mentions wanting to be a teacher or a chef, inspired by his family's caring nature and love of preparing meals. These early
    ambitions combine a desire for visible, practical jobs that provide immediate impact and a sense of stability, aligning with his preference for predictable, tangible outcomes.
