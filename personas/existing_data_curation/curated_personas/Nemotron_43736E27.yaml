personas:
  professional: Mary Woolard, an aspiring community youth coordinator, blends her organized, responsible nature with her sociable energy to lead school volunteering projects and coordinate drama club events,
    ensuring every detail is planned while still creating space for friends to have fun.
  sports: Mary Woolard plays midfielder for the Oakwood Middle School soccer team, attends weekly practices, follows the U.S. Women’s National Soccer Team and the Los Angeles Lakers, and they approach fitness
    with structured drills and a lucky red headband, though they sometimes skip a workout after late‑night gaming sessions.
  arts: Mary Woolard writes fan fiction set in the worlds of J.K. Rowling’s Harry Potter and Neil Gaiman’s Sandman, draws comic panels inspired by Studio Ghibli’s Spirited Away, and shines in drama club
    performances of Shakespeare’s A Midsummer Night’s Dream, channeling their structured mindset into detailed storyboards while occasionally staying up late to binge‑watch Pixar films.
  travel: Mary Woolard dreams of a family road trip to the Grand Canyon where they can sketch canyon vistas, but currently prefers short weekend trips to nearby state parks for hiking and camping, planning
    itineraries with meticulous checklists and worrying about forgetting their water bottle, while also hoping to one day explore Tokyo’s Akihabara district to experience anime culture.
  culinary: Mary Woolard loves helping prepare spaghetti bolognese with ground beef, tomatoes, garlic, and fresh basil, enjoys making homemade pepperoni pizza topped with mozzarella, oregano, and sliced
    pepperoni, yet they sometimes sneak an extra chocolate chip cookie when no one is watching.
  core: Mary Woolard is a structured yet energetic 12‑year‑old who balances a love for soccer, drama, and comic art with a habit of worrying, meticulous planning, and occasional secret cookie indulgences.
background:
  cultural: Mary is a white American raised in Girard, a small working‑class town in Trumbull County, Ohio. Her family’s heritage includes German and Irish roots, reflecting the broader Midwestern immigrant
    history of the area. Growing up, she has been immersed in Midwestern values of community, modesty, and a strong work ethic. She regularly participates in local church activities, celebrates holidays
    such as Thanksgiving, Fourth of July, and Christmas with family gatherings, and feels a deep sense of belonging in the close‑knit neighborhood where neighbors often support one another.
