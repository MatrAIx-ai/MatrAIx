  career_goals: Mary dreams of a career that blends her desire for structure, practicality, and helping others. She is interested in becoming a nurse because it offers a stable, organized environment and
    direct care for people. She also admires teachers and envisions herself in the classroom, guiding younger students. Occasionally, she imagines working at a local veterinary clinic to combine her love
    of animals with a hands‑on, reliable profession. In the long term, Mary hopes to pursue a college degree that prepares her for a compassionate, community‑focused career.
