  career_goals: Even at five, Michael dreams of becoming someone who creates and shares beautiful stories—perhaps an artist, a writer, or a teacher who helps others learn. He is fascinated by the idea of
    exploring new worlds, whether through drawing, building, or caring for friends, and envisions a future where he can use his compassion to make people smile.
