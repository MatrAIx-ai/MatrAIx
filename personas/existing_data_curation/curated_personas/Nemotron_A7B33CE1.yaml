personas:
  professional: Michael Frye, a budding young scientist, spends weekend afternoons constructing elaborate LEGO experiments, recording observations in a colorful notebook, and dreaming up future inventions,
    as they channel their vivid imagination and meticulous planning into early scientific inquiry.
  sports: Michael Frye, a spirited member of the community’s Little League baseball team and an avid supporter of the Oklahoma City Thunder, practices batting at the local park every Saturday, cheers loudly
    during NBA games, and they balance team play with solo soccer drills at the neighborhood recreation center.
  arts: Michael Frye, a prolific doodler, fills sketchbooks with whimsical farm animals and space rockets, hums along to folk legends like John Denver and Willie Nelson, and they proudly showcase finger‑painted
    masterpieces from the county fair’s art booth, embodying a love for abstract concepts and regional music.
  travel: Michael Frye, an enthusiastic explorer, relishes family road trips to the Oklahoma City Zoo, weekend camping at Lake Murray, and a magical week at Disney World, as they favor carefully planned
    itineraries that mix adventure playgrounds with quiet nature walks, satisfying curiosity while honoring their love for familiar community traditions.
  culinary: Michael Frye, a budding junior chef, delights in stirring mac and cheese with a pinch of paprika, enjoys dipping crispy chicken nuggets in honey‑mustard, proudly bakes chocolate chip cookies
    using brown sugar and vanilla, and they occasionally slip extra marshmallows into their cereal, showcasing both skillful enthusiasm and a mischievous sweet tooth.
  core: Michael Frye is a methodical, imaginative five‑year‑old who builds LEGO labs, saves coins, shares toys compassionately, yet they can be stubborn about broccoli and insist on arranging their stuffed
    animals by color.
background:
  cultural: Michael is raised in a white, Midwestern American family in Oklahoma City. His household embraces traditional community values, regularly attends local church gatherings, and celebrates holidays
    like Thanksgiving and Halloween with family traditions. He enjoys family outings to the county fair, Sunday brunches, and listening to country and folk music that reflect the cultural rhythms of Oklahoma.
    His upbringing blends a love for open spaces, schoolyard camaraderie, and the supportive, neighborly spirit common to the region.
