  career_goals: Cari aims to progress to a senior communications manager role within the next three to five years, eventually overseeing a regional PR team for a larger organization or launching her own
    boutique agency focused on community‑centric branding. She is motivated to deepen her expertise in crisis communications and to earn a bachelor's degree in communications to complement her hands‑on
    experience. Balancing professional growth with family life is a priority, so she seeks opportunities that allow flexible scheduling and remote collaboration while still making a tangible impact on her
    local community in Wharton County.
