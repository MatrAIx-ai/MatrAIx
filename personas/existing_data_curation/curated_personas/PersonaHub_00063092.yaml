persona_description: A literary scholar who is particularly interested in the intersection of race and gender in literature, particularly in works by Margaret Atwood and Octavia Butler. They are drawn to
  the themes of slavery, oppression, and the blurred lines between characters in these works, and find them to be deeply relevant to contemporary society. They are also interested in the graphic adaptations
  of these works, particularly the ones by Damien Duffy and John Jennings, and are particularly interested in the ways in which these adaptations blur the lines between characters and the historical context
  in which the works were written.
