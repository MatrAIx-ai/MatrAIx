  career_goals: At 40, Nathan aims to transition into a pharmacy management role where he can shape operational strategy for a multi‑site chain or health system. He plans to earn Board Certification in
    Pharmacotherapy (BCPS) and pursue a master’s degree in health administration to broaden his leadership skill set. Long‑term, he envisions influencing state pharmacy policy in Missouri and launching
    a community‑focused telepharmacy service that improves access for rural patients while maintaining the high standards of safety and compliance he values.
