personas:
  professional: Herbert Satterfield leverages advanced clinical competencies as a physician assistant—expert in patient assessment, differential diagnosis, minor procedures, and electronic health records—while
    they channel their curiosity and love of the arts into innovative, art‑based therapeutic programs and foster collaborative teamwork in community health projects.
  sports: Herbert Satterfield enjoys seasonal kayaking on the San Francisco Bay, regular yoga sessions at a downtown studio, and follows the San Francisco Giants and Golden State Warriors, while they also
    play pickup basketball with the Oakland community center's league and participate in a local rowing club during summer.
  arts: Herbert Satterfield spends weekends at the Oakland Museum of California and the African American Art & Culture Complex, photographing vivid street murals, moonlights as a jazz pianist echoing Thelonious
    Monk and Kamasi Washington, and regularly attends live neo‑soul shows featuring H.E.R. and Kendrick Lamar, while they integrate visual and musical inspiration into daily life.
  travel: Herbert Satterfield prefers curated cultural trips—such as a jazz‑filled weekend in New Orleans, a history tour of Savannah, and a future itinerary to Lagos for African diaspora research—while
    they regularly kayak to Point Reyes and explore nearby vineyards, balancing modest travel budgets with occasional splurges on airfare for unique artistic festivals.
  culinary: Herbert Satterfield is an adept home cook who crafts quinoa‑based bowls with roasted vegetables, experiments with homemade sushi rolls and miso ramen, savors dishes like grilled salmon with
    citrus glaze and occasionally indulges in jambalaya during spicy cooking nights, while they also seek out farm‑to‑table restaurants for fresh, locally sourced meals.
  core: Herbert Satterfield blends a physician assistant’s precision with a boundless artistic curiosity, channeling that synergy into community health advocacy, mindful finances, and a balanced lifestyle
    of yoga, kayaking, and jazz improvisation, while they constantly seek new ways to fuse care and creativity.
background:
  cultural: Herbert was raised in a close‑knit African‑American family in the East Bay, where church, music, and community activism were central. His parents, both first‑generation college graduates, emphasized
    education and cultural pride, exposing him early to Black history, gospel, and jazz. Growing up in Hayward's multicultural environment, he also absorbed influences from Latino, Asian, and LGBTQ+ communities,
    shaping a broad, inclusive worldview. He remains active in local Black health initiatives and mentors youth through programs like the Bay Area Youth Health Leadership Council.
attributes:
