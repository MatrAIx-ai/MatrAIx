    (art therapy)'', ''Stress management and resilience teaching'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street mural photography'', ''Jazz piano playing'', ''Live music shows (neo‑soul, hip‑hop)'', ''Yoga and mindfulness practice'', ''Kayaking in the
    Bay'', ''Reading medical humanities'', ''Book clubs on health equity'', ''Cooking fusion meals (soul food with Bay Area cuisine)'', ''Volunteering at community health fairs'']'
  career_goals: He aims to earn a Master's degree in Physician Assistant Studies with a focus on community health, develop a health equity research program in partnership with local public health agencies,
    and become a clinical educator for upcoming physician assistants. Long term, Herbert hopes to lead a multidisciplinary clinic that integrates conventional medicine with evidence‑based arts therapies,
    and to advocate for policy changes that improve access to care for Black and low‑income residents of the Bay Area.
