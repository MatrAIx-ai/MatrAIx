  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Cooking traditional Midwestern dishes'', ''Listening to classic rock and old‑ies'', ''Reading newspaper'', ''Church attendance'', ''Playing cards
    at senior center'', ''Volunteer work at community events'']'
  career_goals: Although retired from full‑time employment, John aims to stay active and financially secure by offering handyman services to neighbors on a flexible, as‑needed basis. He hopes to turn his
    woodworking hobby into a modest side venture selling custom birdhouses and small furniture pieces at the local farmers’ market. Additionally, he aspires to become a mentor for younger community members,
    teaching basic home‑maintenance skills and passing on his practical knowledge. Managing stress and maintaining a predictable routine are also priorities, so he seeks a balanced schedule that leaves
    room for leisure and family time.
