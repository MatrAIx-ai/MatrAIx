  hobbies: '["Gardening","Hiking","Reading mystery novels","Cooking","Sewing and crafting","Volunteering at food pantry"]'
  career_goals: Ina aims to move from employee to independent contractor by launching her own small cleaning business that emphasizes eco‑friendly practices and personalized service. She plans to earn certifications
    in green cleaning and small‑business management, build a trusted team, and expand her client base throughout Spokane County. Financial stability, flexible scheduling to accommodate personal responsibilities,
    and the ability to set her own rates—assertively negotiating when needed—are central to her ambitions.
