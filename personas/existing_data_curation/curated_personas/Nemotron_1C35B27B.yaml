personas:
  professional: Ina Raymond is a seasoned residential and commercial cleaning specialist who combines a meticulous eye for detail with an inquisitive drive toward green‑cleaning innovations, expertly managing
    inventory, floor‑care equipment, and fabric care while confidently negotiating rates and tailoring services to each client’s preferences as she builds her eco‑friendly independent business.
  sports: Ina Raymond embraces functional fitness through weekend hikes in the Selkirk Mountains with the Spokane Hiking Society, occasional trail‑running, and a weekly yoga class, while cheering for the
    Seattle Seahawks, the Spokane Chiefs, and following the Seattle Mariners, balancing enthusiasm for professional sports with a personal commitment to outdoor activity.
  arts: Ina Raymond indulges her creative side by devouring mystery novels from Agatha Christie and Tana French, crafting practical items in a community sewing circle, attending productions at the Spokane
    Civic Theatre, and listening to folk‑rock artists like Gillian Welch and Bob Dylan, allowing artistic appreciation to complement her hands‑on hobbies.
  travel: Ina Raymond favors nature‑centric road trips, having explored Glacier National Park and the Canadian Rockies, and now dreams of trekking New Zealand’s South Island while balancing family commitments
    and a modest travel budget by carefully planning itineraries around seasonal hiking windows.
  culinary: Ina Raymond enjoys simple, wholesome cooking, often preparing roasted root‑vegetable medleys with rosemary, zucchini lemon pasta, and chickpea‑kale stew using fresh produce from her garden,
    and while her cooking skill is confidently competent, she occasionally experiments with whole‑grain sourdough bread, favoring farm‑to‑table dining experiences at local markets.
  core: Ina Raymond blends a pragmatic love for organization with a curious drive for sustainable living, balancing solo garden reflection with modest community involvement, yet occasionally procrastinates
    on paperwork and overcommits to volunteer shifts.
background:
  cultural: Ina is a white American who grew up in the Pacific Northwest, absorbing the region’s emphasis on self‑reliance, community involvement, and appreciation for the outdoors. Her family values hard
    work, practicality, and modest independence, which align with the Midwestern sensibility common in rural Washington. While she respects traditional customs, she also embraces contemporary ideas about
    sustainability, lifelong learning, and balancing work with personal well‑being.
attributes:
  skills: '["Residential cleaning","Commercial cleaning","Floor care (vacuuming, mopping, polishing)","Laundry and fabric care","Organization and decluttering","Basic home maintenance","Inventory management","Customer
