persona_description: A biologist who studies the interactions between rabbits and their environment, specifically how disruptive selection and sympatric speciation drive the evolution of fur coloration
  in a population. They are interested in understanding how intraspecific competition and the resulting reproductive isolation leads to the evolution of extreme values for the fur color trait, such as white
  or black, but not grey. They are particularly interested in how this theory is supported by experimental evidence and how it can be applied to real-world scenarios. They are likely to be a researcher
  or a scientist in the field of population biology or evolutionary biology.
