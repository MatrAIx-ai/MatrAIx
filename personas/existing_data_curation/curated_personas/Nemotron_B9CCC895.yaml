  hobbies: '[''Balcony gardening'', ''Cooking Dominican cuisine'', ''Reading historical biographies and memoirs'', ''Salsa/Bachata dancing in small community settings'', ''Listening to Caribbean music'',
    ''Walking in Central Park'', ''Visiting museums'', ''Participating in small book clubs'', ''Journaling'']'
  career_goals: Although retired from formal employment, Erla aims to deepen her involvement in the local Dominican community by leading cooking workshops that blend traditional recipes with modern health
    considerations. She aspires to mentor a small group of young adults from immigrant backgrounds, helping them navigate language and cultural transitions. Erla also plans to document family stories and
    recipes in a memoir, preserving her heritage for future generations. On a personal level, she wishes to maintain her health through regular walks in the city’s parks and to learn basic French to broaden
    her cultural horizons.
