  career_goals: Jessie aims to leverage her frontline experience into a leadership role within the Houston Police Department, targeting a promotion to detective or lieutenant in the Community Relations
    Unit. She aspires to develop and expand a culturally sensitive policing program that strengthens trust between law enforcement and the city’s Mexican‑American community. Completing her bachelor’s degree
    in criminal justice, followed by a master’s in public administration, is a priority, as is earning specialized certifications in crisis intervention and bias reduction training. In the longer term,
    Jessie envisions mentoring junior officers—particularly women and minorities—and possibly transitioning to a consultant role in criminal justice reform or a community advocacy organization after retiring
    from active duty.
