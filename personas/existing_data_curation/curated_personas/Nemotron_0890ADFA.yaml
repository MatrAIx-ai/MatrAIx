  career_goals: As she approaches retirement, Kristen plans to transition into a formal mentorship role, becoming a certified trainer or safety officer for her plant and the local union. She aims to develop
    a workshop series that blends artistic concepts with industrial design, encouraging younger workers to think creatively about problem‑solving. Outside the plant, she hopes to volunteer as a docent at
    the Detroit Institute of Arts, using her production background to explain the craftsmanship behind artworks. Ultimately, she wants to leave a legacy of both operational excellence and community enrichment,
    fostering a bridge between Detroit’s manufacturing heritage and its vibrant cultural scene.
