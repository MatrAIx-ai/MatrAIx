persona_description: A scientist at Stockholm University, specialized in the study of water's unusual properties, particularly in its fluctuation between two liquid states and its ability to shift from
  one state into another. The scientist has made significant contributions to the field through their research using ultra-short x-ray pulses at x-ray lasers in Japan and South Korea, which has allowed
  them to determine that water reaches a maximum of its strange behavior at -44°C. The scientist's work has been groundbreaking, and they have helped settle on the model that water has a critical point
  in the supercooled regime.
