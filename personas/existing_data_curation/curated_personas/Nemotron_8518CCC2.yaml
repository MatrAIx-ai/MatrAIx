  career_goals: She aims to become a senior hardware engineer or technical lead at a forward‑thinking consumer‑electronics or interactive‑art startup, where she can blend engineering with creative expression.
    Over the next five years she plans to earn a Professional Engineer license, publish a paper on low‑power wearable sensor design, and secure at least one patent for an innovative circuit. Ultimately
    she envisions launching her own boutique venture that creates custom kinetic art pieces integrated with IoT technology, allowing her to realize interdisciplinary ideas while maintaining a healthy work‑life
    balance and using stress‑management practices such as mindfulness and regular exercise.
