  career_goals: Mark aspires to pursue a career that combines his love for hands‑on work and structured problem solving. He hopes to become an automotive technician or mechanical engineer, with a long‑term
    goal of working in a local garage or automotive manufacturing plant. He also dreams of contributing to his community by possibly joining the volunteer fire department after high school, using his reliability
    and disciplined approach to serve others.
