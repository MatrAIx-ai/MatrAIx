  hobbies: '["Abstract painting", "Reading philosophy and art theory", "Gardening (vegetable and herb garden)", "Hiking in Colorado foothills", "Macro photography", "Puzzle solving (crosswords, Sudoku,
    jigsaw)", "Creative writing (journal and memoir)", "Attending small book clubs and art talks"]'
  career_goals: Although retired from formal employment, Tina is committed to leaving a lasting intellectual and artistic legacy. She aims to complete a memoir that intertwines personal history with reflections
    on art and philosophy, and plans to self publish a limited edition collection of her abstract paintings accompanied by essays. Tina also aspires to mentor younger artists through one on one coaching
    at the local community center, and to curate a small rotating exhibition at the Fort Collins Art Annex showcasing emerging creators. In addition, she seeks to expand her digital literacy by mastering
    online archival tools, enabling her to contribute volunteer research to local historical societies.
