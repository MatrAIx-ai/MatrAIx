personas:
  professional: Bradley Duggan, a 34‑year‑old engineering technologist, leverages deep mechanical design expertise and hands‑on problem solving to drive lean‑manufacturing improvements while simultaneously
    experimenting with IoT sensor integration, all with a critical yet practical mindset that they bring to every project.
  sports: Bradley Duggan fuels a competitive streak by volunteering as a coach for a local high‑school robotics team, cheering fervently for the Milwaukee Brewers and Green Bay Packers, and maintaining
    membership in the Northwoods Anglers Club where they fish for walleye each summer.
  arts: Bradley Duggan channels creative energy into building custom electronics for retro‑synth projects, attending classic rock shows featuring Led Zeppelin tribute bands, and losing themselves in sci‑fi
    epics by Isaac Asimov while strategizing over board games such as Terraforming Mars, pursuits they juggle with a critical eye and a love for analog tinkering.
  travel: Bradley Duggan prefers flexible road trips that blend rugged camping in the Boundary Waters with targeted visits to engineering expos in Munich, enjoys spontaneous detours to the Great Lakes shoreline,
    and dreams of a tech‑focused adventure in Japan's Kitakyushu industrial district, itineraries they map out using a blend of digital tools and hand‑drawn sketches.
  culinary: Bradley Duggan enjoys grilling smoked brisket with a rub of smoked paprika and brown sugar, crafts homemade fish tacos using walleye caught on weekend trips, and experiments with sous‑vide for
    precision cooking, though they often leave the kitchen a mess that friends tease them about.
  core: Bradley Duggan is a hands‑on engineering technologist who balances a competitive, skeptical nature with a love for solitude, tinkering, and occasional BBQ chaos, all while chasing sustainable innovation,
    a balance they manage by carving out dedicated project time.
background:
  cultural: Bradley grew up in Menomonie, Wisconsin, a small Midwestern town with deep German and Scandinavian roots. His family’s heritage includes generations of farm and manufacturing workers, fostering
    a practical, self‑reliant outlook. Community traditions such as local fairs, high‑school sports, and seasonal celebrations (like Oktoberfest and county harvest festivals) shaped his values of hard work,
    modesty, and communal support. While he embraces the region’s love of the outdoors and craftsmanship, his education at a state university broadened his perspective, allowing him to blend traditional
    Midwestern pragmatism with a curiosity for innovative technologies.
