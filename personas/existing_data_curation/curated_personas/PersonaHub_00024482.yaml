persona_description: A botanist who specializes in the study of photosynthesis and plant development, particularly in the context of chloroplasts and pigments. Their research interests include the effects
  of light and shade on chloroplast development and pigmentation, and the impact of these factors on the growth and productivity of plants. They are likely to be familiar with the work of Kaladharan, P
  and Vivekanandan, M (1990) Impairment of chloroplast development and sink strength by blockade of light in chloroembryos of Cyamopsis Tetragonoloba (L.) Taub, which provides a detailed examination of
  the effects of light on chloroplast development and pigmentation in developing embryos.
