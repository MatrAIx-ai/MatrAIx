persona_description: A UNC NRI faculty member who leads research on the gut microbiome, a dynamic community of microorganisms in the lower intestine. Dr. Meyer's team explores the composition and function
  of the gut microbiome, which is modifiable and shaped by diet. Her research into the gut microbiome has opened up new possibilities for discovery and health-promoting interventions, particularly in the
  areas of obesity, diabetes, cancer, heart disease, immune disorders, and mood. Her work is innovative and groundbreaking, and she seeks federal grants to secure the millions of dollars needed to fully
  test the value of her science.
