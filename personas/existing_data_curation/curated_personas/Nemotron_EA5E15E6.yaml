  hobbies: '[''Sketching and drawing'', ''Street photography'', ''Visiting art galleries and museums'', ''Playing strategic board games (Chess, Go)'', ''Listening to indie and jazz music'', ''Cooking traditional
    Mexican dishes'', ''Hiking in the Rio Grande Valley'', ''Reading speculative fiction'', ''Experimenting with digital illustration'']'
  career_goals: Jose aims to turn his artistic passions into a sustainable career. He plans to enroll in a community‑college certificate program in graphic design while building a professional portfolio
    that showcases his integration of Mexican cultural elements with modern digital media. His short‑term goal is to secure freelance design contracts for local businesses and cultural institutions, using
    his bilingual skills to create culturally resonant branding. In the longer term, he envisions launching his own boutique design studio that offers visual storytelling services, curates community art
    projects, and mentors other young artists from the Rio Grande Valley.
