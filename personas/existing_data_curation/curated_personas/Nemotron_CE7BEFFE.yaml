personas:
  professional: David Ingram is a seasoned maintenance technician whose adept carpentry, electrical, HVAC, and CMMS expertise, coupled with a methodical yet flexible mindset, fuels their drive to transition
    into a supervisory role and eventually manage a midsize manufacturing plant, where they plan to embed energy‑efficiency upgrades while mentoring apprentices.
  sports: David Ingram fuels their competitive spirit by cheering for the Pittsburgh Steelers on Sundays, supporting the Pittsburgh Penguins during hockey season, and participating in a regional hunting
    club’s seasonal outings, while maintaining personal fitness through weekend hikes on Allegheny trails and occasional weight‑lifting sessions at the community gym.
  arts: David Ingram finds rhythm in building by strumming an acoustic guitar to classic rock legends like Led Zeppelin and The Rolling Stones, enjoys live folk performances at local taverns, and draws
    inspiration from the craftsmanship showcased in vintage car shows, while occasionally browsing exhibitions at the Carnegie Museum of Art for fresh design ideas.
  travel: David Ingram prefers road‑trip adventures that blend practical planning with spontaneous detours, often traveling to the Appalachian foothills of West Virginia for hunting, touring the historic
    motorways of Detroit to study classic car culture, and dreaming of a spring hike through the Canadian Rockies, all balanced against family commitments and a modest travel budget.
  culinary: David Ingram enjoys hearty, meat‑centric meals, routinely grilling trout caught on weekend trips with lemon‑butter glaze, slow‑cooking a smoked pork shoulder using a dry rub of paprika, brown
    sugar, and garlic, and perfecting a Pittsburgh‑style sandwich piled with chili and fries, reflecting a solid home‑cook skill set that favors robust flavors and rustic techniques.
  core: David Ingram is a pragmatic craftsman who balances a love for solitary workshop projects with community fire‑house camaraderie, often juggling a toolbox in one hand and a vintage car manual in the
    other, all while never missing a Steelers game and occasionally forgetting to water the garden.
background:
  cultural: David grew up in a modest, working‑class family in Washington County, Pennsylvania, where the cultural fabric is shaped by Appalachian and Mid‑Atlantic traditions. His ancestry is primarily
    German and Irish, and his upbringing emphasized hard work, self‑reliance, and a strong sense of community. Attending a local public high school, he participated in county fairs, church youth groups,
    and neighborhood sports leagues, internalizing values of modesty, practicality, and mutual support. He maintains close ties to his extended family, celebrates regional holidays with traditional foods
    such as pierogies and pepperoni rolls, and supports local institutions like the volunteer fire department and community center. These cultural influences inform his pragmatic outlook, loyalty to family,
    and appreciation for both established customs and new ideas.
