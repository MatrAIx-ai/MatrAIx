  career_goals: David aims to move from a frontline maintenance role to a supervisory position within the next three years, eventually becoming a facility manager for a midsize manufacturing plant in the
    Pittsburgh region. He plans to earn an associate degree in Facility Management from a community college and obtain certifications such as HVAC, Journeyman Electrician, OSHA 30‑hour, and CMMS specialist.
    Long‑term, he envisions launching his own small maintenance contracting business focused on energy‑efficiency upgrades, where he can mentor apprentices and integrate green technologies like solar‑panel
    servicing and building‑automation systems. All of these goals are driven by his desire for stable family income, professional growth, and a legacy of reliable, skilled craftsmanship.
