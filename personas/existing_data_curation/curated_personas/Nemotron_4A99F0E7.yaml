  career_goals: Looking ahead, Eric aims to transition into a principal engineering or engineering‑manager role where he can shape technical strategy and mentor the next generation of developers. He is
    driven to lead high‑impact projects that integrate cutting‑edge cloud and AI technologies while maintaining reliability for mission‑critical applications. Eric also aspires to become a thought leader
    in the New York tech community by publishing articles, speaking at conferences, and contributing to open‑source projects that solve real‑world problems. His competitive streak fuels a desire for measurable
    successes, such as reducing system latency by 30% and achieving industry‑recognised certifications in AWS and Kubernetes.
