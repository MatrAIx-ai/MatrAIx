persona_description: A teacher or educator who is responsible for teaching and presenting the Illinois State Standards in the classroom. They are knowledgeable about the specific standards listed in the
  text and are able to effectively communicate the concepts and information to their students. They likely have a strong background in biology, ecology, or related fields and are skilled in teaching about
  the relationships and interactions between living things and their environments. They are also knowledgeable about the natural cycles of the Earth's land, water, and atmospheric systems, as well as the
  factors that influence the interactions and interdependence of organisms. They are skilled in analyzing and explaining large-scale dynamic forces, events, and processes that affect the Earth's land, water,
  and atmospheric systems, and are able to apply classroom-developed criteria to determine the effects of policies on local science and technology issues.
