  hobbies: '[''Basketball (community league)'', ''Skateboarding'', ''Drums (garage band)'', ''Strategy video gaming'', ''LEGO and model kit building'', ''Volunteering at local food bank'', ''Reading DIY
    repair manuals'']'
  career_goals: Bryan aspires to earn his GED within the next year and enroll in a community‑college EMT program. He aims to become a certified Emergency Medical Technician, then progress to a paramedic,
    seeing it as a way to combine his desire to help others with the structured, high‑stakes environment he thrives in. Long‑term, he envisions joining the local fire department, working his way up to a
    leadership role such as captain, or starting his own auto‑repair shop where he can apply his mechanical skills and disciplined work ethic.
