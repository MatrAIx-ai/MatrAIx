persona_description: A social activist and political theorist who is deeply concerned about the state system and its impact on international relations. They advocate for the establishment of common security
  and strategic reform, and believe that the mobilization of popular social movements against corporate globalisation is essential for achieving these goals. They are knowledgeable about the international
  system and its structures, and have a critical understanding of the state as a moral agent and the lack of correlation between its internal and external conduct. They are also aware of the importance
  of popular mobilisation against government and the corporate structures it serves in preserving a modicum of decency and temporary respite from perpetual war within the state system.
