personas:
  professional: Stella Gomez is a Boise‑based locksmith who merges a meticulous, methodical approach with a love for puzzles to expertly service vintage mechanical locks, install smart access solutions,
    maintain precise compliance records, and they channel their curiosity into pursuing advanced NLA certifications while drafting plans for a community‑focused shop.
  sports: Stella Gomez hikes the Boise foothills with the Boise Trail Runners, rolls out a mat at Altius Climbing’s yoga studio for mindful movement, and they root for the Boise State Broncos football team
    and Idaho Steelheads hockey as their seasonal sports anchors.
  arts: Stella Gomez expresses creativity through seasonal folklorico dance gatherings, intricate crocheting projects, devouring mystery novels by Agatha Christie and Tana French, and attending Boise’s
    River Nile Festival while they enjoy acoustic sets by local singer‑songwriter Colter Wallace.
  travel: Stella Gomez plans meticulously for short escapes, favoring weekend drives to Yellowstone and Zion National Parks and an annual cultural pilgrimage to Oaxaca’s artisan markets, while they dream
    of an immersive lockcraft workshop in Kyoto despite a modest travel budget.
  culinary: Stella Gomez delights in preparing heritage dishes such as slow‑braised pork shoulder with chilies, hand‑made corn masa tamales, fresh pico de gallo, and homemade horchata, skillfully grinding
    spices and blending sauces from scratch to honor family recipes, and they take pride in perfecting each flavor profile.
  core: Stella Gomez is a curiosity‑driven locksmith who meditates to calm perpetual worry, organizes every tool in color‑coded rows, and they secretly hoard lock‑picking practice locks for midnight problem‑solving
    sessions.
background:
  cultural: Stella is a first‑generation Mexican‑American who grew up in a bilingual household, speaking both Spanish and English. Her family instilled values of hard work, respect for elders, and community
    solidarity. She celebrates Mexican traditions such as Día de los Muertos and enjoys sharing cultural foods and music with friends. While living in Boise, she maintains strong ties to the local Mexican
    community, participating in cultural events and volunteering at faith‑based organizations, which reinforces her caring and cooperative nature.
attributes:
  skills: '[''Mechanical lock servicing'', ''Safe combination decoding'', ''Electronic access control troubleshooting'', ''Key cutting'', ''Security system assessment'', ''Locksmith code compliance'', ''Smart
    lock installation'', ''Detailed service documentation'']'
  hobbies: '[''Lock picking puzzles'', ''DIY electronics projects'', ''Hiking in Boise foothills'', ''Cooking traditional Mexican cuisine'', ''Dancing folklorico'', ''Reading mystery novels'', ''Yoga and
    mindfulness meditation'', ''Volunteering at community safety workshops'']'
  career_goals: Stella aims to earn advanced certifications from the National Locksmith Association and specialize in high‑security lock systems. She plans to open a community‑focused locksmith shop in
    Boise that offers both traditional services and smart‑lock solutions, providing affordable security upgrades for local families and small businesses. Long‑term, she hopes to mentor apprentices, lead
    workshops on home safety, and eventually expand her business to include a safe‑sales and repair division, while staying grounded in dependable, customer‑centered service.
