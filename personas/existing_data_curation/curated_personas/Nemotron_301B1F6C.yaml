  career_goals: Although she is only a toddler, Jacqueline frequently expresses a desire to 'make pictures' and 'tell stories' during play. These early indications point toward a future aspiration to become
    a visual artist, writer, or educator, where she can channel her strong imagination, love for novelty, and methodical approach into creative or teaching pursuits.
