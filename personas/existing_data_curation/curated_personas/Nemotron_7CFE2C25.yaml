personas:
  professional: A tiny master planner, Eric Lara loves arranging LEGO bricks into intricate cityscapes, methodically sorting each piece by color and size, and challenging peers in sandbox competitions to
    see whose tower stands tallest, while they eagerly document each design in a crayon‑filled notebook.
  sports: An energetic athlete in training, Eric Lara dashes through Little League T‑ball games, cheers loudly for the hometown baseball team, the City Cubs, and they proudly show off their new gymnastics
    flips at weekly toddler classes, always striving to beat the top tumble routine.
  arts: A budding artist, Eric Lara spends afternoons drawing vibrant dinosaurs, singing along to The Wiggles, and they proudly display a hand‑painted mural inspired by the bold colors of local street artist
    Joanie in the kindergarten art corner, delighting teachers and friends alike.
  travel: An adventurous explorer, Eric Lara loves weekend trips to the massive seaside aquarium, a family vacation to Disneyland, and they daydream about hiking the towering redwoods on a future summer
    camp adventure, often sketching maps of imagined routes on notebook paper.
  culinary: A passionate food fan, Eric Lara devours cheesy macaroni, crunchy chicken nuggets with honey mustard, and juicy apple slices, and they eagerly help stir batter for banana pancakes, though they
    stubbornly refuse green peas at dinner, causing occasional snack‑time negotiations.
  core: A methodical, curious four‑year‑old, Eric Lara balances organized play, competitive sports, and delicious snacks with a stubborn streak and a habit of saving pennies in a pink piggy bank, while
    they constantly seek new ways to improve their block towers.
background:
  cultural: Eric is raised in a predominantly White, middle‑class family in Princeton, New Jersey. His upbringing blends suburban American customs with the intellectually stimulating environment of a town
    known for its university and museums. Family traditions include celebrating holidays such as Thanksgiving, Christmas, and Fourth of July with community gatherings. The local community center and preschool
    emphasize structured activities, encouraging both curiosity and practical routines, which align with Eric's personality of balancing exploration with organization.
