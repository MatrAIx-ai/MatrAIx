  career_goals: Yuki plans to enroll in a university program in computer science or information systems, aiming to become a product manager who creates user‑focused educational technology. In the short
    term she seeks internships in data analysis or UX design to gain industry experience, while continuing to develop her coding and design skills. Her long‑term ambition is to launch a bilingual educational
    app that combines her analytical expertise with her cultural insight, helping K‑12 students bridge language gaps.
