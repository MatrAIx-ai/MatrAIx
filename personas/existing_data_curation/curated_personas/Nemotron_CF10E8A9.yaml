personas:
  professional: Yuki Wong, a 19‑year‑old digital‑media enthusiast with a flair for data visualization and strategic gaming, channels analytical rigor and creative imagination into product design, seeking
    internships that blend UX research with data analysis as a stepping stone toward launching a bilingual educational technology platform.
  sports: Yuki Wong stays active by playing pickup basketball at the community center, cheering for the Los Angeles Lakers and LA Galaxy, competing in a local Ultimate Frisbee club called LA Flyers, and
    balancing digital competition with regular yoga sessions to maintain flexibility and focus.
  arts: Yuki Wong explores Los Angeles’ vibrant street‑art scene, snapping photos of murals by Shepard Fairey and Banksy, attends indie film screenings featuring directors like Greta Gerwig, curates playlists
    that weave Tame Impala’s psychedelic pop with Nujabes’ lo‑fi beats, and designs graphics inspired by David Hockney’s bold color palettes.
  travel: Yuki Wong favors budget‑friendly road trips, having driven the Pacific Coast Highway to Santa Barbara and camped in Yosemite, while planning a future spring break expedition to Kyoto to study
    its historic temples and burgeoning tech startups.
  culinary: Yuki Wong, an enthusiastic home chef, experiments with Asian‑Californian fusion dishes such as miso‑glazed salmon tacos with avocado‑lime crema, kimchi‑infused quinoa bowls, and homemade matcha
    tiramisu, confidently navigating both a sharp chef’s knife and a beginner’s wok.
  core: Yuki Wong blends analytical rigor with creative spontaneity, often juggling a spreadsheet of coding ideas while simultaneously sketching street‑art inspiration, yet can’t resist late‑night gaming
    marathons that push their sleep schedule to the brink.
background:
  cultural: Yuki is a second‑generation East Asian American, raised in a bilingual household in Los Angeles where her parents maintain Chinese (Mandarin) traditions while embracing the multicultural environment
    of Southern California. She celebrates Lunar New Year and Mid‑Autumn Festival with family, values education and community responsibility from her cultural heritage, and blends these with the eclectic,
    creative lifestyle of the city.
