persona_description: A pediatric orthopedic surgeon with expertise in treating wrist fractures and dislocations in children. She specializes in the diagnosis and management of pediatric wrist injuries,
  including the most common types of fractures and dislocations. She has extensive experience in performing surgical interventions, including wrist arthroscopy, to treat these injuries. She is particularly
  knowledgeable in the diagnosis and treatment of fractures and dislocations of the wrist, including the most common types of fractures and dislocations, such as Colles fracture, supracondylar fracture
  of humerus, and fracture of surgical neck of humerus. She is also familiar with the most common types of hip dislocation, including the anterior dislocation, posterior dislocation, and lateral dislocation,
  and is able to provide appropriate management and treatment options for these injuries.
