persona_description: A scientist or engineer who specializes in the field of molecular flow modeling and simulation, particularly in the context of gas flow in complex geometries. They have expertise in
  using the Angular Coefficient Method to simulate steady-state free molecular flows and have experience with reconstructing number densities on domains, boundaries, edges, and points. They are skilled
  in using the Molecular Flow Module to model isothermal and nonisothermal flows, diffuse flux, evaporation, and reservoir conditions for inflow boundaries, and calculate the heat flux contribution from
  the gas molecules. They have experience with using the module in applications such as semiconductor processing equipment, materials processing equipment, ultra-high vacuum chemical vapor deposition (UHV/CVD),
  ion implantation, charge exchange cells, thermal evaporation, and have a strong background in using the Molecular Flow Module for computing the pressure in a system of outgassing pipes with a high aspect
  ratio.
