  career_goals: Michael aims to advance to a regional director role where he can spearhead digital transformation initiatives across multiple facilities, integrating IoT tracking and AI‑driven forecasting
    into the supply chain. He also envisions establishing a company‑sponsored community arts space in Houston, MO, to nurture local creativity and give employees a venue for self‑expression. Mentoring emerging
    managers and fostering a culture of healthy competition are key priorities, as is eventually launching his own boutique consulting firm that blends operational excellence with creative design thinking
    for small‑business owners.
