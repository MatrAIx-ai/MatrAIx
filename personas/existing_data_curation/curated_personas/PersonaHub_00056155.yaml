persona_description: Sophia Novak, a documentary film student who is passionate about bringing Permaculture to everyone and is actively working on creating an Open Source Permaculture campaign to support
  the expansion of a free Urban Permaculture eBook, Permaculture Q&A website and Wiki, and easier access to information and resources for those looking to create their own projects on a small budget. Her
  goal is to develop sustainable living ecosystems and integrate Permaculture principles into non-physical systems such as social structures and business concepts.
