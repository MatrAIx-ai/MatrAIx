personas:
  professional: An aspiring robotics engineer, Sarah Elmore blends curiosity with practicality by designing Arduino‑based gadgets for her high‑school robotics club, coding in Scratch and Python while thriving
    on the competitive buzz of local hackathons and the collaborative spirit fostered by community pot‑luck gatherings, and they eagerly share their prototypes with friends during after‑school sessions.
  sports: An energetic teen athlete, Sarah Elmore plays forward for the Danville Youth Soccer Club, sprints on the high‑school track team in spring, cheers passionately for the Alabama Crimson Tide on football
    Saturdays, and they tackle weekend hikes in the Appalachian foothills whenever the weather permits.
  arts: A budding musician and digital creator, Sarah Elmore strums acoustic guitar in a teen band covering John Mayer and Taylor Swift, harmonizes in her church choir, crafts upbeat TikTok dance tutorials
    set to Billie Eilish tracks, and they draw inspiration from Southern folk storytelling traditions.
  travel: An adventurous yet budget‑mindful teen, Sarah Elmore dreams of weekend road trips to the Great Smoky Mountains National Park and occasional family visits to Nashville, while they often opt for
    spontaneous drives to local county fairs in Birmingham and the state capital’s museums during school breaks.
  culinary: A self‑described foodie with a knack for quick kitchen experiments, Sarah Elmore alternates between savoring family‑style pulled‑pork barbecues and whipping up TikTok‑inspired avocado toast
    topped with lime‑zest feta, while they perfect their go‑to comfort dish of cheesy mac and cheese dusted with crunchy breadcrumbs.
  core: Sarah Elmore is a curious, sociable teen who juggles rural community roots with digital creativity, often pulling all‑nighters for robotics projects, forgetting to lock her phone, and thriving on
    the competitive thrill of friendly challenges.
background:
  cultural: Sarah grew up in Danville, a small town in Morgan County, Alabama, where Southern hospitality and close‑knit community ties are a daily reality. Her family attends a Methodist church, and church
    gatherings, pot‑luck meals, and seasonal festivals have shaped her sense of belonging and responsibility. While she appreciates traditional Southern customs—such as family barbecues, local high‑school
    football games, and storytelling about the region’s history—she also embraces the digital world, balancing rural roots with a keen interest in modern technology. Her cultural upbringing emphasizes respect
    for elders, a love of outdoor activities in the Appalachian foothills, and an encouragement to pursue education, especially in fields that can bring new opportunities to her hometown.
