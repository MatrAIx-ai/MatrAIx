  career_goals: She aims to secure a place in a STEM‑focused high‑school program or a regional robotics competition team, with the long‑term goal of studying mechanical or aerospace engineering at a university
    that offers strong research opportunities. Sarah hopes to earn a scholarship that will let her combine her love of engineering with her competitive spirit, eventually designing sustainable energy solutions
    or autonomous drones. In the near future, she wants to launch a teen‑run STEM club at her school, mentor younger students, and win a regional robotics challenge. She also keeps an eye on continuing
    her involvement in track and soccer, envisioning a possible future as a college athlete or sports coach.
