personas:
  professional: Janet Mclendon, a retired community organizer now steering the senior center’s activity committee, leverages her decades‑long experience in event planning, volunteer budget management, and
    clear, inclusive communication to launch a mentorship program linking seniors with high‑school students, embodying her curiosity for new ideas while maintaining her practical, reliable approach.
  sports: Janet Mclendon stays fit through gentle yoga, Saturday hikes along the Blue Ridge Parkway, and a senior‑center walking club, while cheering on the Virginia Tech Hokies football team and catching
    the occasional Roanoke Rail Yard Dawgs hockey game at the local bar, preferring low‑impact cardio over high‑intensity workouts.
  arts: Janet Mclendon, an avid patron of the Roanoke Community Theatre, regularly watches productions of Neil Simon plays, enjoys listening to Bob Dylan’s folk ballads while cooking, and schedules weekend
    matinees of classic Meryl Streep films, allowing these artistic experiences to inspire chapters of her upcoming memoir.
  travel: Janet Mclendon favors relaxed road trips that blend scenic hiking with cultural stops, having explored the Blue Ridge Parkway, spent a weekend in Asheville’s art districts, and a beach escape
    in Charleston, while dreaming of a fall foliage trek through Ireland’s countryside once her health permits.
  culinary: Janet Mclendon, a confident home cook, delights friends with buttermilk fried chicken, collard greens slow‑cooked with smoked ham hocks, and sweet potato casserole, while occasionally experimenting
    with Mediterranean quinoa salads topped with feta and olives, though she often forgets to set a timer and burns the garlic.
  core: Janet Mclendon blends a curiosity‑driven love of learning with a practical, organized mindset, staying socially active through gardening, bridge, and theater, managing a modest yet diversified retirement
    portfolio, and balancing health routines with occasional forgetfulness, all while nurturing a budding memoir that captures her lifelong community service and personal reflections.
background:
  cultural: Janet was raised in a middle‑class, white Southern family in the Roanoke Valley, where traditions of hospitality, church involvement, and community service are strong. Her family’s roots trace
    back several generations to early European settlers in Virginia, and she grew up hearing stories of Appalachian folklore and regional history. While she values the Southern emphasis on family and neighborly
    support, her college experience and lifelong curiosity have broadened her perspective, making her comfortable navigating both traditional and contemporary cultural settings.
