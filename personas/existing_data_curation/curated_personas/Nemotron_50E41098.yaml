  hobbies: '[''Book club'', ''Community gardening'', ''Bridge (card game)'', ''Local theater'', ''Cooking and sharing meals'', ''Hiking in the Blue Ridge Mountains'', ''Gentle yoga'', ''Mentoring youth'']'
  career_goals: Although retired from formal employment, Janet aims to deepen her impact on the Roanoke community. She aspires to lead the local senior center's activity committee, develop a mentorship
    program linking seniors with high school students, and author a memoir that captures her family's Appalachian heritage. She also plans to enroll in a series of online courses on local history and advanced
    horticulture to satisfy her curiosity while applying new knowledge practically.
