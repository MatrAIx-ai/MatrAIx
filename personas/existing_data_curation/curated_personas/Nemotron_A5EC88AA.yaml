  career_goals: Cathy’s primary ambition is to keep giving back to her community while ensuring that seniors in Roseville have a supportive, socially connected environment. She aims to mentor younger volunteers
    at the local senior center, expand intergenerational programs that pair seniors with schoolchildren for storytelling and cooking workshops, and lead a digital‑literacy initiative that helps seniors
    use tablets and video‑chat tools confidently. Additionally, she hopes to compile an oral‑history collection of African‑American elders in Placer County, preserving cultural heritage for future generations.
    She balances her desire for continued service with a focus on staying healthy and managing her natural tendency toward worry by maintaining a structured routine and regular wellness checks.
