  career_goals: Although retired from formal employment, Marguerite remains driven to contribute her expertise to her community. She aims to expand the local library's STEM workshops, mentor high‑school
    girls interested in science, and serve on the advisory board of the county's environmental conservation group. She also hopes to author a memoir that chronicles her journey as a woman in STEM during
    the latter half of the 20th century, preserving both personal and regional scientific heritage for future generations.
