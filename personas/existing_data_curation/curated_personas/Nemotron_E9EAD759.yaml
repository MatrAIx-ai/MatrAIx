personas:
  professional: Calvin Wildblood, a 10‑year‑old budding programmer, uses Scratch to design simple games, applying their love of structure and teamwork to turn LEGO‑inspired logic puzzles into interactive
    stories while confidently taking the lead in group coding sessions.
  sports: Calvin Wildblood thrives on the soccer field with the local Dallas Youth Soccer League and shoots hoops at the community center's Dallas Mustangs Jr. Basketball Club, cheering for the Dallas Cowboys
    and Houston Rockets on weekends, while they balance a competitive drive with cooperative play and a habit of staying late after practice to perfect their footwork.
  arts: Calvin Wildblood devotes free time to building intricate LEGO sculptures and animating Scratch projects inspired by Marvel comics and the artwork of Jim Lee, frequently quoting Spider‑Man lines
    and attending weekly library storytime featuring graphic novels by Brian Michael Bendis, while they sometimes get lost in the details, neglecting other chores.
  travel: Calvin Wildblood’s travel style blends excitement and routine, favoring road trips to the Space Center Houston and weekend visits to the State Fair of Texas where they relish the rides, while
    dreaming of a future family vacation to Disneyland in California and a summer camp excursion in the Rocky Mountains.
  culinary: Calvin Wildblood enjoys bold flavors, often requesting pepperoni pizza, cheesy nachos with jalapeños, and homemade mac and cheese, while they experiment with simple kitchen projects like assembling
    fruit kebabs of strawberries and bananas, yet they routinely forget to chew slowly, leading to occasional tummy aches.
  core: Calvin Wildblood is a structured, energetic ten‑year‑old who blends a love of LEGO architecture with Scratch coding, balances teamwork with a headstrong streak, and habitually misplaces their tablet
    charger.
background:
  cultural: Calvin comes from a middle‑class white Anglo‑American family in suburban Houston, Texas. His household reflects typical Southern U.S. values such as a strong emphasis on education, community
    involvement, and family gatherings. He grows up celebrating holidays like Thanksgiving and the Fourth of July with traditional meals and fireworks, while also enjoying the multicultural food scene of
    Houston, including occasional Tex‑Mex dishes. The local environment, including visits to the Space Center Houston and participation in community sports leagues, shapes his interests and aspirations.
attributes:
  skills: '[''Organizing school work'', ''LEGO engineering'', ''Basic Scratch programming'', ''Team sports collaboration'', ''Public speaking in class'', ''Household chores and responsibility'']'
  hobbies: '[''Soccer'', ''Basketball'', ''LEGO building'', ''Scratch programming'', ''Reading graphic novels'', ''Boy Scouts'', ''Attending community fairs and fireworks'']'
  career_goals: Calvin’s biggest ambition is to work in a career that blends teamwork, concrete results, and a clear structure. Inspired by visits to Space Center Houston, he dreams of becoming an astronaut
    or aerospace engineer, where he can apply his love of building, problem solving, and collaboration to real‑world missions. He also admires firefighters and paramedics for their hands‑on help to the
    community, and sometimes imagines joining those professions to combine his practical mindset with a sense of service. He aims to keep expanding his technical skills—especially coding and engineering—so
    he can eventually lead a crew that tackles challenging, organized projects.
