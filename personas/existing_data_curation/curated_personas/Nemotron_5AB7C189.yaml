personas:
  professional: Frankie Williams, a seasoned electrician with a methodical approach to safety and code compliance, leverages precise wiring expertise and emerging renewable‑energy skills to lead small crews,
    mentor aspiring tradeswomen, and pursue Master Electrician certification as the foundation for a sustainable contracting firm, and they are known for their unwavering commitment to mentorship.
  sports: Frankie Williams enjoys regular walks along the Clinton River Trail, follows the Detroit Lions and Pistons with a modest fan’s enthusiasm, participates in a community yoga class that doubles as
    a low‑impact fitness group, and occasionally joins a local pick‑up basketball game at the community center, and they value the quiet rhythm of walking as a mental reset.
  arts: Frankie Williams finds solace in classic jazz and blues, often listening to Miles Davis and B.B. King while gardening, sings alto in a small church choir, and attends the annual Detroit Jazz Festival
    to stay connected to the city’s cultural pulse, and they cherish the way music mirrors the ebb and flow of daily life.
  travel: Frankie Williams prefers meticulously planned trips that blend relaxation and cultural immersion, such as a weekend getaway to Mackinac Island for historic tours, a spring road trip to the Great
    Smoky Mountains for hiking, and a yearly visit to New Orleans to experience live brass music and historic neighborhoods, and they meticulously budget each itinerary to balance adventure with financial
    prudence.
  culinary: Frankie Williams enjoys cooking farm‑to‑table meals, frequently preparing roasted sweet potatoes with rosemary, collard greens sautéed with smoked turkey, and a hearty vegetable stew flavored
    with thyme and cumin, often using produce from their own garden, and they love sharing leftovers with neighbors during community potlucks.
  core: Frankie Williams balances a disciplined, safety‑first trade career with a reflective, garden‑centered lifestyle, channeling structured ambition into sustainable entrepreneurship while quietly battling
    stress‑induced worries, and they often turn to meditation when deadlines loom.
background:
  cultural: Frankie identifies as a Black woman who grew up in the Detroit metropolitan area, where community, resilience, and faith have shaped her worldview. Her upbringing emphasized the importance of
    hard work, mutual support, and preserving cultural heritage through church involvement, family gatherings, and participation in African‑American cultural events. Navigating a largely male‑dominated
    trade as a Black electrician has strengthened her sense of determination and advocacy for greater representation. She draws pride from her roots, often sharing stories of her grandparents' migration
    and the civil rights legacy that inspire her commitment to mentorship and community uplift.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Blueprint reading and interpretation'', ''NEC code compliance'', ''Troubleshooting and diagnostics'', ''Project planning and scheduling'',
    ''Team leadership and crew coordination'', ''Safety training and compliance'', ''Low‑voltage and smart‑home systems'', ''Renewable energy installations (solar, EV charging)'']'
  hobbies: '[''Gardening'', ''DIY home‑improvement projects'', ''Reading technical manuals and mystery novels'', ''Walking the Clinton River Trail'', ''Yoga and meditation'', ''Church choir participation'',
    ''Volunteering with youth STEM programs'', ''Listening to jazz and blues music'', ''Attending local cultural festivals'']'
  career_goals: Frankie aims to achieve Master Electrician certification within the next two years and leverage that credential to launch her own small contracting firm focused on sustainable residential
    projects. She also aspires to become a certified solar installer and expand her service offerings to include renewable‑energy retrofits for older homes in Macomb County. Mentoring is a priority; she
    plans to partner with local community colleges and trade schools to mentor young women of color entering the trades, creating a supportive network that balances her cooperative nature with her assertive
    drive. Ultimately, she seeks a stable, predictable business model that reduces overtime stress while allowing her to give back to her community.
