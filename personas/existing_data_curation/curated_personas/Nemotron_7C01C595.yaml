personas:
  professional: David Collier, a 15‑year‑old aspiring game designer, blends their love of strategy video games with a pragmatic, detail‑oriented mindset while they often battle a spontaneous urge to skip
    systematic planning, producing quick prototypes that reflect both structure and improvisation.
  sports: David Collier rides a mountain bike on the Larriston Forest trails two to three times a week, and they follow Carlisle United in the football league, occasionally joining the local cycling club,
    balancing solo rides with group rides that satisfy both their competitive streak and need for camaraderie.
  arts: David Collier immerses themselves in classic rock by listening to Led Zeppelin and The Rolling Stones while they practice guitar chords, sketches serene landscapes of the Cumbrian countryside in
    a battered sketchbook, and devours science‑fiction novels by Isaac Asimov, allowing these creative outlets to temper their frequent worries.
  travel: David Collier dreams of weekend trips to the Lake District’s Windermere for kayaking, has already taken school excursions to York and Edinburgh, and aspires to visit Tokyo for its gaming arcades,
    preferring meticulously planned itineraries while they sometimes improvise spontaneous stops at quirky roadside cafés.
  culinary: David Collier prefers easy‑to‑make comfort foods like pepperoni pizza and homemade scrambled eggs, enjoys tinkering with a basic carbonara recipe using pancetta and Parmesan, and habitually
    snacks on salty crisps while gaming, though they often forget to eat balanced meals throughout the week.
  core: David Collier is a fifteen‑year‑old strategic gamer who toggles between meticulous planning and impulsive bursts, juggles a love of bikes and guitars with a lingering worry‑prone mind, and they
    constantly balance solo pursuits with a tight‑knit friend group.
background:
  cultural: David grew up in Carlisle, Pennsylvania, a small town with deep historical roots and a mix of rural and suburban influences. His family heritage includes German and Irish ancestry, common among
    many residents in the Cumberland County region. The local culture values community events, high school sports, and a strong work ethic, shaping his practical outlook and appreciation for hands‑on work.
    While he embraces the traditions of his hometown, he also engages with broader American teen culture through online media, gaming communities, and popular music, creating a blend of regional pride and
    contemporary youth interests.
