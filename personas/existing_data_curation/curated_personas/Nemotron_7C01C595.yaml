  career_goals: David aims to pursue a career that blends practical, hands‑on work with the opportunity for independence. He is fascinated by automotive technology and envisions becoming an automotive technician
    or a skilled tradesperson such as an electrician or HVAC specialist. At the same time, his interest in video games and technology sparks a curiosity about learning coding basics and possibly exploring
    game design in the future. He hopes to secure a stable, well‑paid position that allows him to work with his hands while also providing a clear path for skill development, and he is motivated to develop
    coping strategies to manage stress and negative emotions in a demanding work environment.
