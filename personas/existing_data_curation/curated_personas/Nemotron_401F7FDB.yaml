  career_goals: Although she is no longer part of the formal workforce, Preya aims to deepen her impact in the community through purposeful, low‑stress engagements. She aspires to complete a certificate
    in museum studies so she can co‑curate a quarterly exhibit that highlights the intersection of science and art. She also plans to expand her volunteer mentorship program for middle‑school girls of South
    Asian heritage, emphasizing confidence‑building in tech subjects. Recognising her own experiences with anxiety, she wishes to collaborate with local mental‑health nonprofits to develop workshops that
    teach mindfulness and data‑driven stress‑management techniques to seniors. Through these pursuits she seeks to balance her personal growth with compassionate service, while maintaining the organized
    yet flexible routine that keeps her emotionally grounded.
