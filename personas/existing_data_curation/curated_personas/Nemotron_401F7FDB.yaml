personas:
  professional: Preya Oza is a retired data analyst and systems engineer who now mentors emerging tech talent and volunteers as an art gallery docent, applying their Python and R expertise, statistical
    modeling acumen, and project‑management experience to design data‑driven community workshops while championing inclusive, science‑and‑art collaborations, and they bring a calm, detail‑oriented approach
    to every project.
  sports: Preya Oza enjoys low‑impact fitness such as gentle yoga, brisk walks with the Flower Mound Senior Walking Club, and weekly pickleball matches at the local community center; they passionately follow
    the Dallas Cowboys in the fall, occasionally attend a Dallas Mavericks game during basketball season, and support the Texas Rangers by listening to their broadcasts while gardening.
  arts: Preya Oza frequents the Dallas Museum of Art and the Nasher Sculpture Center, where they engage deeply with contemporary installations by artists such as Olafur Eliasson and Anish Kapoor, and they
    collect prints of Maya Lin’s works; their artistic palate also includes listening to sitar virtuoso Ravi Shankar and attending local performances of Bharatanatyam, which inspire their own curatorial
    visions.
  travel: Preya Oza plans their travel with a blend of meticulous itineraries and relaxed exploration, favoring weekend road trips to Texas Hill Country vineyards and historic towns like Fredericksburg,
    annual pilgrimages to visit family in Jaipur during Diwali, and summer tours of national parks such as Yellowstone and the Grand Canyon; they prefer staying in boutique B&Bs that offer quiet garden
    spaces for meditation, yet occasionally indulge in spontaneous beach stops in Cancun when a good flight deal appears.
  culinary: Preya Oza is an avid home chef who skillfully prepares traditional dishes such as dal makhani, chicken biryani, and Goan fish curry using house‑grown cilantro and mint, while experimenting with
    custom spice blends like panch phoron and smoky garam masala; they delight in brewing masala chai for tea‑time storytelling evenings, frequently label their spice jars in both English and the family
    language, and occasionally burn the edges of a naan when their mind wanders during an engaging conversation.
  core: Preya Oza balances analytical precision with artistic curiosity, managing disciplined finances, mindful health routines, and a love for cultural expression, while they channel their high emotional
    reactivity into meticulousness and occasional over‑thinking.
background:
  cultural: Preya was born to immigrant parents who arrived from Gujarat, India, in the early 1960s and settled in the Dallas‑Fort Worth metroplex. She grew up in a bilingual household where Marathi and
    Gujarati were spoken alongside English, and traditional festivals such as Diwali, Navratri, and Holi were celebrated with community gatherings, music, and elaborate meals. The family’s emphasis on education
    and collective responsibility shaped her early interest in science, while the vibrant colors and storytelling of Indian art fostered a lifelong appreciation for visual culture. After marrying a fellow
    engineer and moving to Flower Mound, she blended her South Asian heritage with Texan customs, participating in local cultural fairs, sharing homemade sweets at neighborhood potlucks, and teaching her
    grandchildren simple Gujarati phrases. Her cultural identity remains a source of strength, informing her values of hospitality, perseverance, and a nuanced perspective that bridges Eastern traditions
    with Western experiences.
