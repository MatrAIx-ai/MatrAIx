    coordination'']'
  hobbies: '[''Leading a weekly walking group'', ''Singing in a church choir'', ''Volunteering at school events'', ''Knitting blankets for charity'', ''Cooking New England meals'', ''Visiting the summer
    farmers’ market'', ''Participating in Zumba fitness classes'', ''Playing board games with friends'']'
  career_goals: Ragina is aiming to advance within the district’s transportation department. Over the next five years she plans to obtain a commercial driver’s license with a passenger endorsement, become
    a certified first‑aid instructor, and take on the role of senior driver trainer. Her long‑term ambition is to become the District Transportation Coordinator, where she can shape safety policies, integrate
    new routing technologies, and mentor new drivers while preserving the reliable, routine‑focused service she values.
