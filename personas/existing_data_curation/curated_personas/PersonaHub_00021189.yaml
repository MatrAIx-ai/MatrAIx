persona_description: A sociologist or anthropologist who is conducting research on the history and future of population movements in Alaska and rural Chukotka, focusing on the role of the state in these
  processes and the impacts of relocation on community identity and place. This person is interested in interdisciplinary perspectives on migration theory, studies of Northern relocation, and forced migration,
  and is conducting preliminary fieldwork in Alaska and rural Chukotka, including Shishmaref, Koyukuk, and Anchorage. This person is also participating in a course associated with the MOVE project entitled
  “The Anthropology of Migration,” where they are discussing interdisciplinary perspectives on migration theory, studies of Northern relocation, and forced migration.
