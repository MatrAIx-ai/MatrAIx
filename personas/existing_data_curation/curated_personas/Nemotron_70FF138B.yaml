  career_goals: Jacqulyn aims to transition into a technical lead role where she can mentor junior engineers while shaping the architectural direction of complex projects. She plans to obtain certifications
    in AWS Solutions Architecture and Kubernetes Administration to deepen her cloud expertise. Over the next five years, she envisions leading a cross‑functional team that delivers high‑impact, user‑focused
    products, and eventually moving into engineering management to combine her organizational strengths with people‑development skills. Parallel to her corporate ambitions, she aspires to launch a side
    project—an app that assists local farmers in managing crop cycles—leveraging her curiosity for new ideas and her practical problem‑solving mindset.
