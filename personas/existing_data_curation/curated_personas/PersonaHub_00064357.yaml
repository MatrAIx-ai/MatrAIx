persona_description: A Chinese economist who specializes in the study of climate change and its impacts on the Chinese economy, particularly in the power sector. His research interests include the effects
  of droughts on the Chinese economy, the role of climate change in exacerbating droughts, and the potential risks and hazards associated with droughts and fires. He is interested in the effects of droughts
  and fires on the functioning of the forest ecology and the reduction of ecosystem services. He is also interested in the potential future impacts of droughts and fires on the Chinese economy and infrastructure.
