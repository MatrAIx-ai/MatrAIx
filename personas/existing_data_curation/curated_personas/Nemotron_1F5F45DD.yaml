  career_goals: Alfredo aims to re‑enter the workforce by launching a part‑time handyman service that serves the Deland community, while also taking a leadership role in a local cultural center to organize
    Puerto Rican festivals and youth mentorship programs. He plans to obtain a certification in small‑business management and a first‑aid/CPR credential to enhance his service offering and community involvement.
