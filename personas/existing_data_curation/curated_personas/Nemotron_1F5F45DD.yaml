personas:
  professional: Alfredo Escobar is launching a part‑time handyman service in Deland, leveraging their hands‑on carpentry, plumbing, and landscaping expertise while using bilingual communication and community‑building
    skills to attract clients through friendly, organized, yet flexible project management.
  sports: Alfredo Escobar enjoys playing in the DeLand United amateur soccer league each spring, follows the Orlando Magic, Tampa Bay Rays, and Jacksonville Jaguars for professional sports thrills, and
    maintains fitness through weekly fishing trips at Lake Woodruff that double as low‑impact cardio, which they consider essential for staying active.
  arts: Alfredo Escobar regularly attends live bomba and plena performances featuring groups like Bomba Beats and venerates salsa legends such as Rubén Blades and Celia Cruz, while also supporting local
    mural projects by artists such as Margarita, which they believe enrich the neighborhood’s cultural tapestry.
  travel: Alfredo Escobar favors group‑oriented trips that blend cultural immersion and relaxation, having explored Puerto Rico’s historic Old San Juan, the Florida Keys, and a memorable weekend in Barcelona’s
    Gothic Quarter, while eyeing future visits to Cuba’s music festivals and a family‑friendly cruise to the Bahamas, which they hope to share with friends.
  culinary: Alfredo Escobar boasts seasoned culinary skills for classic Puerto Rican dishes such as mofongo with garlic‑shrimp sofrito, arroz con gandules, and slow‑roasted pernil, often pairing them with
    freshly caught lake trout seasoned with cilantro and lime, and delights in hosting neighborhood potlucks where they showcase their love for hearty, spice‑rich home cooking.
  core: Alfredo Escobar blends practical handyman expertise with a vibrant community‑spirit, juggling a budding service, cultural event leadership, and salsa‑infused social gatherings, all while occasionally
    forgetting to water their garden.
background:
  cultural: Alfredo’s Puerto Rican roots are central to his identity. Raised in a bilingual household, he grew up with the island’s rich traditions of music, dance, and cuisine, and he carries those customs
    into his daily life in Deland. He maintains close ties to his extended family and participates actively in the local Catholic parish, where he helps organize cultural celebrations like Three Kings Day
    and the annual Puerto Rican Heritage Festival. His heritage influences his values of hospitality, familial loyalty, and community service, and he often serves as a cultural bridge, introducing Florida
    neighbors to Puerto Rican customs while adapting them to his local environment.
