  hobbies: '[''Cuban cooking'', ''Salsa dancing'', ''Gardening'', ''Walking in local parks'', ''Volunteering at community center'', ''Reading historical fiction'', ''Attending church services'', ''Participating
    in cultural festivals'']'
  career_goals: Dinorah aims to transition into a senior advisory role within the next two years, where she can mentor younger HR staff and lead initiatives that enhance employee well‑being and inclusive
    culture. She is eager to integrate emerging HR technologies—such as cloud‑based HRIS platforms—while preserving reliable, proven processes. Long‑term, she envisions a part‑time consultancy focused on
    supporting small businesses in the Hispanic community, helping them navigate employment regulations and build supportive workplace environments.
