personas:
  professional: Dinorah Vega, a 61-year-old HR veteran, blends three decades of hands-on personnel management with a curiosity for new HR technology, using bilingual fluency and a detail-oriented mindset
    to streamline onboarding, mediate conflicts, and champion inclusive policies while they gently guide their team toward cloud-based HRIS platforms.
  sports: Dinorah Vega enjoys low-impact fitness, regularly joining the local senior walking club that meets on Saturday mornings at Walnut Creek Park, cheering on the Dallas Cowboys in the NFL season and
    the Houston Astros during baseball, and they treat community salsa dance nights as a cardio workout.
  arts: Dinorah Vega finds solace in the arts through listening to the classic Afro-Latin rhythms of Celia Cruz and contemporary jazz of Poncho Sanchez, attending local theater productions of classic Spanish-language
    plays, and they immerse themselves in historical fiction by Isabel Allende, which fuels their appreciation for storytelling and community.
  travel: Dinorah Vega prefers meticulously planned cultural trips, favoring destinations like Dubrovnik for its historic walls, the Caribbean island of Puerto Rico to celebrate Noche de San Juan, and family
    visits to Miami’s Little Havana, balancing a modest travel budget with a desire for authentic community experiences, and they often arrange group tours through their church’s senior travel group.
  culinary: Dinorah Vega, an adept home cook, delights in preparing arroz con pollo with saffron and achiote, yuca con mojo drizzled with fresh lime and garlic, and experimental dishes featuring plantain,
    while they maintain a well-stocked pantry of cumin, oregano, and sofrito, yet they occasionally over-spice their sauces, prompting friendly critiques from neighbors.
  core: Dinorah Vega blends pragmatic HR expertise with a warm, community-centric spirit, balancing meticulous organization with spontaneous salsa dancing, an occasional over-spiced cooking habit, and they
    display a steadfast commitment to mentoring the next generation.
background:
  cultural: Dinorah is a first‑generation Cuban‑American who grew up in a Spanish‑speaking household in Texas. Her upbringing emphasized family, respect (respeto), and community solidarity, values that
    continue to shape her interpersonal style at work and in her neighborhood. She maintains fluency in both Spanish and English, celebrates Cuban traditions such as Noche de San Juan, and actively participates
    in local Hispanic cultural events. This bicultural perspective fuels her commitment to fostering inclusive workplaces and supporting immigrant families in the Pflugerville area.
attributes:
