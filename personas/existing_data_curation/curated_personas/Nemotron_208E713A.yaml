  career_goals: Gregorio aims to secure a junior data scientist or software engineering role at a company that values collaborative culture and social impact, ideally working on projects that improve health
    outcomes for underserved communities. He plans to leverage his technical skills and bilingual ability to develop data‑driven tools that address health disparities among Mexican‑American populations
    in Nevada. In the next five years, he hopes to earn certifications in machine learning, contribute to open‑source health tech projects, and eventually pursue a master's degree in public health informatics.
    His long‑term ambition is to lead a multidisciplinary team that creates accessible tech solutions while maintaining a supportive environment for mental well‑being.
