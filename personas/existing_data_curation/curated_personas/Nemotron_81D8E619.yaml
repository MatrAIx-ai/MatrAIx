  hobbies: '["Hiking", "Intramural Soccer", "Photography", "Baking", "Reading Fiction and Self-Help", "Volunteer Work at Food Pantry", "Community Theatre Acting", "Yoga and Mindfulness", "Board Games with
    Friends"]'
  career_goals: Maura aims to complete a bachelor's degree in Business Administration with a focus on nonprofit management or community development. She plans to secure an internship at a local social-service
    agency to gain hands-on experience in program coordination. Long-term, she envisions a career as a community development coordinator or event manager for a nonprofit organization that promotes sustainability
    and youth engagement. She is also interested in pursuing certification in project management to blend her organizational strengths with innovative program design, ultimately aiming to lead initiatives
    that foster social cohesion in her hometown.
