personas:
  professional: Richard Coppock, an aspiring junior naturalist, channels his deep curiosity for dinosaurs, space, and local wildlife into meticulous nature journaling, methodically cataloguing rocks, leaves,
    and insects while balancing imaginative storytelling through Scratch with the disciplined construction of elaborate Lego structures.
  sports: Richard Coppock enjoys playing organized soccer on his under‑9 local team, the Riverside Rovers, supports the nearby minor‑league baseball club the Springfield Sluggers, and prefers weekend hikes
    with his family over large‑scale sporting events, reflecting his love for small‑group physical activity and nature immersion.
  arts: Richard Coppock blends artistic skill with storytelling by creating detailed animal sketches inspired by John James Audubon, animating Scratch projects set to the catchy melodies of children’s musician
    Raffi, and regularly watching Pixar’s Finding Nemo for visual inspiration.
  travel: Richard Coppock’s travel aspirations include a family trek through Yellowstone National Park to track wildlife prints, a summer weekend in Cape Cod collecting shells, and a commemorative visit
    to the Boston Museum of Science’s interactive space exhibit, all planned with a child‑friendly itinerary that balances adventure and safe, structured exploration.
  culinary: Richard Coppock loves hearty comfort foods such as homemade mac and cheese with extra cheddar, enjoys building his own mini‑pizza topped with pepperoni and mushrooms, and proudly helps stir
    his family's vegetable soup using garden‑fresh carrots and peas, often insisting on a dash of parmesan for flavor.
  core: Richard Coppock fuses curious exploration with organized planning, turning his love for rocks, Lego, and wildlife into structured hobbies while maintaining a gentle, reliable, and community‑focused
    demeanor.
background:
  cultural: Richard was raised in Providence Forge, a small, historically rich community in New Kent County, Virginia. His family is part of a close‑knit, predominantly white rural neighborhood where church
    gatherings, school events, and county fairs are central to social life. He attends the local public elementary school, which emphasizes respect for tradition, community service, and practical learning.
    Family traditions include helping with the garden, attending Sunday school, and sharing stories about the area's colonial and Civil War history. These experiences have instilled in him a sense of responsibility,
    modesty, and appreciation for the natural landscape of the Virginia countryside.
