persona_description: A local government official or urban planner who is responsible for promoting social and spatial inclusion of migrants in cities, ensuring their rights and promoting their economic
  benefits for host cities. They are interested in understanding the political roles of local governments in the promotion of migrants’ human rights and the benefits of migration for cities. They are looking
  for ways to empower municipal decision-makers to foster migrants’ inclusion within host communities and to ensure equal access to employment and decent work for migrants. They are familiar with the political
  and social implications of migration and the importance of promoting diversity and inclusion in cities. They have a keen interest in the economic and social benefits of migration for host cities and are
  eager to learn about the latest research and practices in this field.
