  career_goals: Gildardo aims to move from line‑cook to head chef within the next two years, targeting a position where he can design a menu that showcases farm‑to‑table Mexican flavors using the abundant
    produce of Monterey County. He plans to obtain a ServSafe certification and enroll in evening culinary courses to formalize his knowledge of pastry and modern cooking techniques. Long‑term, he hopes
    to open a small family‑style taqueria that doubles as a community kitchen, offering cooking workshops for local youth and providing meals for underserved families.
