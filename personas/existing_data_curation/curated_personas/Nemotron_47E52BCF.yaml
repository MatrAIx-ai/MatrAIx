personas:
  professional: Ann Watts, a two-year-old aspiring architect who meticulously lines up building blocks by shape and hue before gleefully toppling them for imaginative redesigns, reflects a tug-of-war between
    a craving for structure and a spontaneous, playful spirit, showing how they balance order and chaos.
  sports: Ann Watts, a two-year-old who bursts with boundless energy at the local park, regularly attends the Tiny Tots Soccer Club's spring sessions and cheerfully shouts encouragement for the Los Angeles
    Dodgers, fiercely competing to be first on the slide while reveling in group play, showing how they blend competitive spirit with social joy.
  arts: Ann Watts, a two-year-old who delights in finger-painting bright swirls with Crayola crayons while dancing to the catchy tunes of 'Baby Shark' and 'The Wiggles', frequently mimics the playful gestures
    of Ryan's World, reflecting a sociable, expressive streak that they share with peers.
  travel: Ann Watts, a two-year-old who enjoys the comforting routine of family trips to the nearby Florida beach and the bright wonders of the Monterey Bay Aquarium while dreaming of a magical adventure
    at Disneyland and a curious peek at Paris, balances predictable outings with a budding wanderlust, showing how they blend structure with spontaneous curiosity.
  culinary: Ann Watts, a two-year-old who adores creamy mac and cheese sprinkled with cheddar, crunches on carrot sticks dipped in hummus, and insists on adding a splash of ketchup to almost every bite,
    often tries to stir the pot themselves, showing how they blend curiosity with selective taste.
  core: Ann Watts, a two-year-old who oscillates between arranging toys in meticulous rows and scattering them for spontaneous fun, competes fiercely in playground races yet remains emotionally steady and
    delightfully sociable, illustrating how they blend order with exuberance.
background:
  cultural: Ann is raised in a middle‑class white family in Powell, Ohio, a suburban community with strong Midwestern values. Her household emphasizes regular daily routines, community involvement, and
    participation in local traditions such as Thanksgiving, Christmas, and county fairs. Family gatherings often include potluck meals and church activities, providing Ann with a blend of predictable structure
    and opportunities for social interaction in a supportive, culturally familiar environment.
