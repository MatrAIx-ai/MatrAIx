persona_description: A researcher in the field of immunology, particularly in the study of the innate immune system and the regulation of the complement cascade. This individual has developed a new drug,
  AMY-101, which targets the central component of the complement system, C3, and has received orphan status in Europe for the treatment of paroxysmal nocturnal hemoglobinuria (PNH). This individual has
  published numerous research papers on the topic of the complement system and its role in immune and inflammatory diseases.
