  hobbies: '[''Hiking'', ''Fly Fishing'', ''Gardening'', ''Woodworking'', ''Acoustic Guitar'', ''Improv Comedy'', ''Community Theater'', ''Reading Business Books'', ''Spontaneous Travel'', ''Volunteering'']'
  career_goals: Andrew aims to transition from a teaching assistant to a full‑time lecturer or professor, creating interdisciplinary business courses that incorporate real‑world case studies and local entrepreneurship.
    He aspires to lead a regional small‑business incubator in the Lewiston area, securing grants to support rural innovators. Long‑term, he envisions a hybrid role where he can mentor adult learners and
    consult for Idaho’s family‑owned enterprises, balancing academic fulfillment with practical impact on his community.
