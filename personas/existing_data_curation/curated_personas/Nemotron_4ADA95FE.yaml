personas:
  professional: Andrew Dougherty, a 56‑year‑old business analyst‑turned‑educator, blends rigorous data‑driven strategic planning with an improvisational teaching style that thrives on spontaneous classroom
    pivots, leveraging their analytical acumen and sociable energy to spark lively debates and real‑world case studies for undergraduate learners.
  sports: Andrew Dougherty, an avid outdoorsman, spends weekends trail‑running along the Clearwater River and joining the Lewiston Hiking Club’s seasonal summit expeditions, while cheering on the Boise
    State Broncos football team and the Portland Trail Blazers, balancing low‑impact cardio with occasional volunteer coaching at a local youth baseball clinic.
  arts: Andrew Dougherty finds creative release in acoustic jam sessions covering Bob Dylan and John Prine with fellow folk musicians, contributes improv sketches to the Lewiston Community Theater, and
    regularly attends performances by the Idaho Symphony Orchestra, allowing music and theater to temper their analytically driven mind.
  travel: Andrew Dougherty embraces spontaneous road trips, preferring impromptu detours to iconic national parks like Yellowstone and the Great Basin over meticulously planned itineraries, yet they keep
    a modest travel fund for weekend getaways to nearby wine regions such as Washington’s Walla Walla Valley.
  culinary: Andrew Dougherty enjoys rustic home‑cooked meals, proudly grilling trout seasoned with rosemary and lemon, crafting garden‑fresh potato salad with dill and chives, and experimenting with wood‑smoked
    pork ribs, though occasional over‑indulgence in artisanal cheeses and craft beers can tip their diet toward indulgence.
  core: Andrew Dougherty is a restless yet community‑rooted planner who trades data spreadsheets for fishing rods and improv punchlines, frequently juggling curiosity and anxiety while navigating a life
    fueled by spontaneous creativity and disciplined ambition.
background:
  cultural: Andrew is a white American who grew up in the Midwest before moving to Lewiston, Idaho. He values the mainstream American work ethic and community spirit typical of small‑town life, while also
    respecting the rich heritage of the Nez Perce Nation that surrounds his hometown. He regularly attends local cultural events, such as powwows and heritage festivals, to deepen his understanding of regional
    history, and he incorporates this awareness into his teaching to provide students with a broader cultural context.
attributes:
  skills: '[''Business Analysis'', ''Strategic Planning'', ''Curriculum Development'', ''Classroom Facilitation'', ''Student Mentoring'', ''Public Speaking'', ''Conflict Resolution'', ''Data Visualization
