  career_goals: Terry aims to move into a supervisory role within the next two years, leading a team of customer‑service representatives while championing continuous improvement in service quality. He plans
    to complete his bachelor’s degree in Business Administration and obtain certifications such as the Certified Customer Service Professional (CCSP). In the long term, he envisions transitioning into operations
    management or launching a family‑run e‑commerce venture that leverages his customer insight and process‑optimization expertise.
