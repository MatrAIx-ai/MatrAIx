persona_description: A U.S. educator who is concerned about the increasing use of standardized testing as a measure of student performance, and who believes that this approach is flawed and potentially
  harmful to education. They are a critic of the No Child Left Behind Act (NCLB) and the value-added model, and are skeptical of the Department of Education's use of the metric in evaluating teacher education
  programs. They are also concerned about the potential for standardized testing to be used as a tool for punishment and to incentivize states to lower their educational standards.
