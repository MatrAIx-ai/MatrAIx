  career_goals: Despite being retired, Logan remains driven to leave a lasting legacy. He aims to complete his GED, driven by his lifelong curiosity, and plans to enroll in a local community college art
    class to refine his painting techniques. He aspires to compile a comprehensive family genealogy and write a memoir highlighting Talladega’s history, which he hopes to donate to the Talladega Heritage
    Center as a community resource. Additionally, Logan wishes to establish a weekend woodworking workshop for local youth, sharing his disciplined approach and high standards. Maintaining his health and
    independence is also a priority, so he set a goal to walk 5 miles daily and attend regular wellness check‑ups.
