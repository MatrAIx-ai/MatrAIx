persona_description: A researcher and mental health advocate who is interested in exploring the positive impacts of video games on young people's well-being. They are committed to using video games as a
  tool for empowering young people to manage their mental health and well-being, and are interested in developing practical guidelines for parents and professionals to use in a therapeutic setting. They
  are also interested in identifying what constitutes a healthy or moderate amount of play for people at different stages of their lives and how best to leverage the well-being benefits of video games in
  a therapeutic setting.
