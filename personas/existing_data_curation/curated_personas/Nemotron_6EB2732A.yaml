  hobbies: '["Cooking Indian & Tex‑Mex fusion cuisine", "Salsa dancing", "Bollywood dance classes", "Community volunteering (bus safety ambassador)", "Gardening", "Yoga", "Co‑ed softball", "DIY vehicle
    maintenance", "Reading about transportation technology"]'
  career_goals: Niral aims to progress within the Coppell Independent School District’s transportation department, targeting a supervisory position such as senior driver trainer or route coordinator. She
    plans to obtain additional certifications in advanced driver training and transportation safety management, and she is considering an associate degree in logistics or public administration to broaden
    her expertise. Long‑term, she hopes to design and lead a district‑wide safety outreach program that educates students and parents about road safety, leveraging her curiosity for new ideas and her practical
    experience.
