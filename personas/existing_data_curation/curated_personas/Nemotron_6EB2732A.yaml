personas:
  professional: Niral Patel, a seasoned school bus driver in Coppell Independent School District, combines meticulous route planning, safety‑first vehicle inspections, bilingual communication, and a knack
    for conflict resolution to keep students punctual and secure while eyeing a future supervisory role.
  sports: Niral Patel enjoys co‑ed softball on the Coppell Community League, follows the Dallas Cowboys and Texas Rangers avidly, and complements team sports with weekly yoga sessions and occasional weekend
    hikes at Grapevine Lake.
  arts: Niral Patel expresses their energetic side through salsa and Bollywood dance classes, frequently rehearses choreography to songs by Shakira, Badshah, and Jennifer Lopez, and attends local theater
    productions featuring works by Lin‑Manuel Miranda.
  travel: Niral Patel prefers road‑trip adventures across Texas, having explored Marfa’s art scene and Hill Country wineries, while also planning a culinary pilgrimage to Oaxaca, Mexico, and an annual family
    visit to Gujarat, India, balancing travel costs with their budgeting priorities.
  culinary: Niral Patel blends Indian and Tex‑Mex flavors, regularly preparing tandoori chicken tacos, paneer quesadillas with chipotle crema, and biryani nachos, while experimenting with cumin, cilantro,
    and smoked paprika, showcasing a confident home‑cook level that occasionally leads to over‑spicing the dish.
  core: Niral Patel is a methodical, sociable bus safety champion who channels curiosity into culinary fusion, disciplined finances, and community‑driven leadership, all while juggling a penchant for spontaneous
    kitchen experiments and occasional over‑commitments.
background:
  cultural: Niral is a second‑generation South Asian American of Gujarati origin. Raised in a bilingual household where Gujarati and English were spoken, she celebrates Diwali, Navratri, and other cultural
    festivals, and she maintains strong ties to her community through local Indian cultural events. The South Asian emphasis on family responsibility, diligence, and respect for education influences her
    disciplined work ethic and dedication to student safety. While she honors her heritage through food, music, and traditions, she also embraces the multicultural environment of Coppell, Texas, integrating
    seamlessly into the broader community.
attributes:
  skills: '["School bus operation", "Route planning and scheduling", "Vehicle safety inspections", "Student behavior management", "First aid and CPR", "Mechanical troubleshooting", "Digital dispatch and
