personas:
  professional: Donald Clarks, a budding visual arts student and aspiring community museum coordinator, leverages their keen research eye, solid organizational skills, and comfort with digital design tools
    to curate inclusive exhibitions while carefully balancing structure and creative flexibility, and they consistently seek feedback from peers to refine their curatorial voice.
  sports: Donald Clarks, a dedicated fan of the Arkansas Razorbacks football and a regular participant in community‑center pickup basketball games, maintains fitness through early morning jogs along the
    Arkansas River Trail and occasional weekend cycling with a local cycling club, balancing competitive spirit with low‑key exercise, and they often use a fitness app to log mileage and set modest weekly
    goals.
  arts: Donald Clarks, an avid sketch‑artist who fills their bedroom walls with mixed‑media tributes to Miles Davis' improvisations, B.B. King's blues riffs, and Romare Bearden's collage narratives, regularly
    visits the local cultural center to engage with exhibitions and curates a modest Instagram feed spotlighting emerging regional artists, and they eagerly share their process videos on social media to
    inspire fellow young creators.
  travel: Donald Clarks, who prefers thoughtfully planned budget trips over spontaneous getaways, spends weekends exploring music‑rich cities like Nashville and New Orleans while dreaming of a future pilgrimage
    to Washington DC’s civil‑rights museums and a culturally immersive journey to Accra, Ghana, and they meticulously map each itinerary in a travel spreadsheet to keep costs low and experiences rich.
  culinary: Donald Clarks, an enthusiastic home cook with a solid grasp of Southern soul cuisine, frequently whips up collard greens simmered with smoked turkey, crispy fried chicken seasoned with cayenne,
    and sweet potato pie topped with toasted pecans, all while grooving to gospel playlists, though they sometimes forget to time the cornbread perfectly, and they love experimenting with new spice blends
    to keep each dish fresh.
  core: Donald Clarks blends a quiet curiosity for visual storytelling with a disciplined community‑first mindset, often juggling meticulous budgeting spreadsheets while accidentally leaving the kitchen
    timer on during late‑night art sessions, and they constantly remind themselves to balance creative bursts with practical deadlines.
background:
  cultural: Donald was raised in a tight‑knit African‑American neighborhood of Little Rock, where the legacy of the civil‑rights movement and local church traditions are integral to daily life. Family gatherings
    often revolve around storytelling, gospel music, and Southern soul food, fostering a deep appreciation for his heritage. Exposure to the Little Rock Nine history, the Arkansas Black Cultural Center,
    and community festivals has reinforced his sense of identity and responsibility to uplift Black voices through artistic expression. While he values the broader American culture, he remains rooted in
    the resilience, creativity, and communal solidarity that characterize the Black experience in the Arkansas South.
attributes:
  skills: '[''critical thinking'', ''basic graphic design'', ''photography'', ''digital content curation'', ''event coordination'', ''written communication'']'
  hobbies: '[''visiting art galleries'', ''sketching and drawing'', ''listening to jazz and blues'', ''reading science fiction'', ''playing chess'', ''cooking Southern cuisine'', ''volunteering at community
    art programs'']'
  career_goals: Donald aims to finish his GED and enroll in a community college program focused on visual arts or museum studies. He envisions working initially as an assistant curator or outreach coordinator
    for a local arts nonprofit, where he can blend his love for art with community service. Over the next five to ten years, he aspires to lead youth‑focused art education programs that celebrate African‑American
    culture in Little Rock, eventually progressing to a senior leadership role that influences regional cultural policy and funding.
