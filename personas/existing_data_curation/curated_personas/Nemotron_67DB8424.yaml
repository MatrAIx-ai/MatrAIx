  career_goals: Although retired, Kathy aims to stay active and purposeful. She plans to compile a family memoir that blends personal stories with her genealogical findings, and to publish it through a
    local historical society. She aspires to mentor younger volunteers at the senior center, sharing her DIY and gardening know‑how. Kathy hopes to win a ribbon in the Bismarck quilting contest and to exhibit
    her work at the state fair. She also wants to master digital photography of the North Dakota prairie and to travel to Theodore Roosevelt National Park and the Badlands before she turns eighty, preserving
    her health and independence.
