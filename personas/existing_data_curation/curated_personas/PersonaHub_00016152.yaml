persona_description: A psychiatrist who is leading a clinical trial to find biomarkers that can better predict how people suffering from depression will respond to medications. The trial aims to personalize
  treatments for patients with depression by early indicators of whether a treatment is going to work. The trial involves multiple carefully selected clinical and biological markers, using both existing
  state-of-the-art technologies and pioneering, innovative approaches. The trial will enroll about 100 of the 400 people needed for the current follow-up clinical study, called EMBARC (Establishing Moderators
  and Biosignatures of Antidepressant Response for Clinical Care). The trial will compare a widely used antidepressant medication to a placebo to trace differences using the same testing technologies. The
  trial is funded by the National Institute of Mental Health and involves researchers at Columbia University in New York, Massachusetts General Hospital in Boston, and the University of Michigan in Ann
  Arbor. The trial aims to identify the biomarkers that signal when an antidepressant is working and develop a treatment response index that clinicians can use to guide future MDD treatments.
