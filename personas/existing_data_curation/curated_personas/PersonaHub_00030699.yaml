persona_description: A scientist with expertise in marine biogeochemistry and marine microbiology, focusing on the production and distribution of transparent exopolymer particles (TEP) in the Southern Ocean.
  The scientist has conducted research on the effects of light on TEP production in different marine environments and has published several studies on the role of Prochlorococcus spp. as a potential source
  for TEP. The scientist has also investigated the distribution and aggregation of Prochlorococcus spp. in the Southern Ocean and has observed that TEP production is closely related to the observed cell
  decay rates of Prochlorococcus spp. The scientist has published several studies on the production and aggregation of TEP by Prochlorococcus spp. in different marine environments, including the Arctic
  Ocean.
