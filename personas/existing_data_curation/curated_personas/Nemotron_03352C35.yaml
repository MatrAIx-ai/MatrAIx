  hobbies: '[''Salsa/Zumba dancing'', ''Hiking in Staten Island Greenbelt'', ''Coffee shop meetups with friends'', ''Board game nights'', ''Volunteering at community food pantry'', ''Baking and cooking'',
    ''Reading mystery novels'', ''Attending live music concerts'']'
  career_goals: Sherrie plans to earn an associate degree in accounting and work toward CPA certification. In the short term she aims to advance to a senior bookkeeping or junior accountant position within
    a mid‑sized firm on Staten Island. Long‑term, she hopes to lead an accounting team or transition into a financial analyst role, focusing on helping local small businesses improve their financial health.
    She also aspires to mentor new clerks and promote financial‑literacy workshops in her community.
