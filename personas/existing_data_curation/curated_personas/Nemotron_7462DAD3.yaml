personas:
  professional: Hilary Garcia, a 26‑year‑old aspiring master carpenter, blends advanced joinery, CAD drafting, and sustainable material selection into each project while their calm, curiosity‑driven approach
    keeps a small crew focused and adaptable under tight deadlines.
  sports: Hilary Garcia is a member of the Lake Wales Trail Runners club, paddles with the Polk County Kayakers, and roots for the Orlando Magic during NBA season, favoring early‑morning hikes and weekend
    kayak outings over conventional gym routines.
  arts: Hilary Garcia channels the serene palette of Claude Monet and the structural lines of Frank Lloyd Wright into watercolor landscapes of the Kissimmee River while strumming acoustic renditions of
    Jack Johnson at local craft fairs, and they regularly visit the Polk Museum of Art for fresh inspiration.
  travel: Hilary Garcia prefers meticulously planned road trips that blend artistic inspiration with outdoor adventure, having already explored the historic streets of Savannah and the mountain art colonies
    of Asheville, while dreaming of a summer kayaking expedition on Canada’s Bow River.
  culinary: Hilary Garcia enjoys cooking simple yet flavorful meals, often grilling fresh grouper with a citrus‑marinade, whipping up key‑lime pie using locally sourced oranges, and experimenting with rosemary‑infused
    roasted potatoes on a reclaimed‑wood cutting board, though they sometimes over‑salt their sauces in the rush of a new project.
  core: Hilary Garcia is a quietly driven woodworker whose curiosity fuels sustainable craftsmanship, whose habit of losing track of time in sketchbooks is balanced by an almost obsessive need to keep every
    tool meticulously organized.
background:
  cultural: Hilary grew up in Bartow, a close‑knit town in central Florida that blends Southern hospitality with the state's broader multicultural tapestry. Her family roots trace back to European (primarily
    Irish and German) ancestry, but her upbringing was shaped by the diverse community fabric of Polk County—regional festivals, local folk art traditions, and a strong emphasis on self‑reliance and craftsmanship.
    This environment fostered her appreciation for both the practical, hands‑on work of carpentry and the broader artistic currents that flow through contemporary American culture. Hilary's cultural identity
    balances a respect for traditional Southern values of community and resilience with an open‑minded curiosity about new ideas and artistic expression.
attributes:
  skills: '[''frame construction'', ''finish carpentry'', ''custom furniture design'', ''advanced joinery (mortise‑and‑tenon, dovetail)'', ''architectural blueprint reading'', ''basic CAD drafting'', ''sustainable
    material selection'', ''project site organization'', ''small‑team collaboration'', ''creative problem solving'']'
  hobbies: '[''sketching'', ''watercolor painting'', ''hand carving'', ''small decorative woodworking projects'', ''kayaking'', ''hiking'', ''reading design and art books'', ''visiting local art galleries'',
    ''maker‑space workshop participation'', ''acoustic guitar'']'
  career_goals: Hilary aims to become a certified master carpenter within the next five years, completing her associate degree in construction management to augment her practical expertise. She envisions
    opening a boutique workshop in Polk County that produces artful, sustainably sourced furniture and collaborates on historic home restorations in the area. Long‑term, she hopes to lead community‑driven
    revitalization projects, mentor aspiring craftsmen, and integrate emerging technologies like CNC routing to push the boundaries of traditional woodworking while preserving its tactile artistry.
