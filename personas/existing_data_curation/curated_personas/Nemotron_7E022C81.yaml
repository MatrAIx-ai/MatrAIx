personas:
  professional: Tawayna Mcdonald, a licensed practical nurse in a bustling Atlanta clinic, blends solid clinical competencies in patient assessment, IV therapy, and wound care with data-analysis savvy to
    create visual patient-education tools, while their curious, art-driven mindset and flexible, sometimes scattered approach allow them to prototype innovative digital health interventions despite occasional
    disorganization.
  sports: Tawayna Mcdonald, an avid follower of the Atlanta Falcons, Hawks, and United, joins a local yoga studio called The Yoga Loft for weekly classes, runs with the Atlanta Track Club's weekend 5k events,
    and competes in friendly pick-up basketball games at a community center, balancing their love of competitive spirit with a relaxed attitude that sometimes leads them to skip a training session when
    work gets overwhelming.
  arts: Tawayna Mcdonald immerses themselves in Atlanta's vibrant arts scene, curating a personal gallery of abstract paintings inspired by Kara Walker's storytelling and Kehinde Wiley's portraiture, snapping
    photographs of sprawling street murals by local artist Mike Rubendall, attending poetry slams at The Goat Farm featuring spoken-word artists like Jamila Thomas, and drawing creative fuel from the soulful
    sounds of Erykah Badu and Janelle Monae.
  travel: Tawayna Mcdonald prefers spur-of-the-moment weekend getaways over rigid itineraries, often heading to nearby Savannah for its historic squares and coastal cuisine, recently exploring New Orleans'
    jazz districts, and dreaming of a culinary pilgrimage to Osaka to study umami-rich street food, while balancing a modest travel budget and occasional family obligations that sometimes delay their passport
    renewal.
  culinary: Tawayna Mcdonald, an intermediate home chef, delights in fusing Southern soul food with global flavors, crafting dishes like shrimp and grits glazed with miso and a dash of hot sauce, collard
    greens sauted with kimchi and harissa, and sweet-potato pie spiced with ginger and cardamom, while regularly harvesting basil, cilantro, and thyme from their urban herb garden to freshen every plate.
  core: Tawayna Mcdonald balances a restless curiosity for art and data with a habit of misplacing grocery lists, a chronic worry about future health disparities, and a penchant for spontaneous midnight
    painting sessions that often spill paint onto their laptop.
background:
  cultural: Tawayna is an African‑American raised in the culturally rich neighborhoods of Atlanta, where the legacy of civil‑rights activism, gospel music, and Southern Black culinary traditions shaped
    her upbringing. Her family emphasized the importance of education, community service, and resilience; her grandmother, a retired nurse, inspired her early interest in healthcare. Immersed in Black art,
    literature, and church life, she carries a deep appreciation for Afrocentric narratives and communal care, which informs her cultural competency and commitment to reducing health disparities in the
    Black community.
attributes:
  skills: '[''patient assessment'', ''medication administration'', ''IV insertion and therapy'', ''wound care'', ''clinical documentation'', ''patient education'', ''health informatics'', ''data analysis'',
    ''community health outreach'', ''cultural competency'', ''art therapy facilitation'', ''stress management techniques'']'
  hobbies: '[''painting'', ''photography'', ''visiting art galleries'', ''street art tours'', ''poetry slams'', ''fusion cooking (soul food with global flavors)'', ''reading speculative fiction'', ''yoga'',
    ''mindfulness meditation'', ''urban gardening'', ''attending tech meetups'', ''volunteering at community health fairs'']'
  career_goals: Tawayna aims to earn her BSN within the next two years and subsequently pursue an MSN in nursing informatics or a family nurse practitioner track. She envisions leveraging her data‑analysis
    background to design digital health tools that integrate artistic expression into patient self‑management, especially for chronic disease patients in underserved Atlanta neighborhoods. Long‑term, she
    aspires to a leadership position—such as charge nurse, clinical educator, or director of a community health initiative—where she can mentor other nurses, advocate for health equity, and shape policies
    that blend technology, creative therapies, and culturally‑responsive care. Flexibility remains a priority, so she is also exploring travel‑nurse assignments and telehealth roles to balance professional
    growth with personal well‑being.
