personas:
  professional: Ling Kim, a 14‑year‑old budding digital illustrator, fuses manga‑style drawing with sci‑fi storytelling in social media posts, channeling their competitive streak into weekly online art
    challenges while they balance school responsibilities with a meticulously organized sketch schedule.
  sports: Ling Kim stays active on the Lincoln High School Lady Lightning volleyball team and at the downtown skate park with the local skate crew, while they cheer for the Golden State Warriors in the
    NBA and the LA Galaxy in MLS, reflecting their love for fast‑paced, team‑oriented competition.
  arts: Ling Kim channels the dynamic panels of Eiichiro Oda and the atmospheric storytelling of CLAMP into their own manga‑style digital art, while they practice BTS and Blackpink choreography and draw
    inspiration from sci‑fi novels and museum exhibitions.
  travel: Ling Kim dreams of a weekend backpack trip to Tokyo to explore Akihabara’s manga shops and a spring visit to Seoul for a K‑pop concert, while they budget short day‑trips to nearby art museums
    like the Regional Art Center, balancing careful saving with a craving for cultural immersion.
  culinary: Ling Kim regularly cooks kimchi‑fried rice, bulgogi, and spicy tteokbokki at home, mastering the balance of gochujang’s heat and sesame oil’s nuttiness, while they share the kitchen with family
    and experiment with new fusion twists after watching cooking videos.
  core: Ling Kim, a 14‑year‑old creative whirlwind, fuels a relentless competitive streak with manga drawing, K‑pop choreography, and video‑game battles, yet they juggle occasional impulse spending, acne
    worries, and a skeptical eye toward others’ motives.
background:
  cultural: Ling is a second‑generation East Asian (Korean) American. Her parents immigrated from South Korea and maintain Korean language and customs at home, celebrating holidays such as Chuseok and Lunar
    New Year and preparing traditional dishes. Growing up in Ontario, California, she lives in a multicultural community with significant Asian and Latino populations. She attends a public school where
    English is the primary language while remaining fluent in Korean. Her cultural identity blends Korean familial values—emphasis on education, respect, and community—with American ideals of individuality
    and self‑expression, shaping her artistic interests, competitive drive, and social engagements.
