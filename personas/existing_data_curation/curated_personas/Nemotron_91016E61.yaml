  career_goals: Ling aims to pursue a career in visual media, aspiring to become a graphic designer or UI/UX designer within the gaming or animation industry. She plans to attend a university with strong
    art and technology programs, develop her own digital content platform that blends art and storytelling, and eventually lead projects that integrate creative expression with cutting‑edge technology.
