personas:
  professional: Kyoung Liu, a 27‑year‑old front‑desk specialist, leverages bilingual fluency in English and Mandarin and a deep love of contemporary art to turn routine visitor check‑ins into mini‑curated
    experiences, while their competitive drive pushes them to streamline scheduling, chase top customer‑satisfaction metrics, and pursue a CAPM certification, even though they often wrestle with deadline‑driven
    organization and a tendency to postpone paperwork for a spontaneous sketch session.
  sports: Kyoung Liu, a fan of the Seattle Seahawks and Seattle Sounders FC, spends weekends playing recreational volleyball at the local community center, adds a weekly Pilates class to complement their
    yoga routine, follows the Golden State Warriors for occasional NBA excitement, yet often skips scheduled runs when a spontaneous road trip to a regional food festival beckons.
  arts: Kyoung Liu immerses themselves in the art world by sketching in galleries, curating an Instagram blog that highlights works by Yayoi Kusama, Banksy, and local muralist Maya Lin, attending indie
    film screenings by directors like Greta Gerwig and Bong Joon‑ho, and quoting philosophy podcasts while sipping matcha at hidden‑gem cafés, making their artistic identity a blend of visual curiosity
    and intellectual exploration.
  travel: Kyoung Liu prefers spontaneous, food‑centric road trips across the Pacific Northwest, has already explored Portland’s food‑truck scene, trekked through Kyoto’s historic temples, and dreams of
    a month‑long culinary pilgrimage through Oaxaca, but balances wanderlust with budgeting constraints by using budget airlines, staying in boutique hostels, and meticulously planning travel costs in a
    spreadsheet that they update only when a new adventure is booked.
  culinary: Kyoung Liu’s palate favors adventurous Asian street food, from spicy Sichuan hot pot and Malaysian char kway teow to late‑night ramen bowls at a downtown spot called Ramen Tatsu, they can reliably
    whip up shrimp fried rice at home using jasmine rice and soy sauce, and they keep a small collection of matcha powder for weekend latte experiments, though they admit to a lingering sweet tooth that
    leads to occasional indulgent dessert orders.
  core: Kyoung Liu is a curiosity‑driven, competitively spirited art enthusiast who balances spontaneous cultural adventures with a disciplined push toward museum administration, all while wrestling with
    a love‑hate relationship with organization.
background:
  cultural: Kyoung is a second‑generation Chinese‑American whose family immigrated from Taiwan before she was born. Raised in Stockton’s multicultural community, she grew up bilingual, speaking Mandarin
    at home and English at school. Traditional values such as respect for elders, emphasis on education, and celebration of Lunar New Year remain central to her identity, while her Californian upbringing
    fosters openness to diverse ideas and artistic expression. She participates in local Asian cultural festivals, enjoys cooking family recipes like dumplings and bubble tea, and balances her heritage
    with a progressive, curiosity‑driven outlook common among young East Asian professionals in the Bay Area.
