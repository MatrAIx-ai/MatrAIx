  career_goals: Kyoung aims to move from a receptionist role to an office manager or arts‑administration position within a museum or contemporary gallery. She plans to complete a bachelor's degree in Arts
    Management or Business Administration while building a portfolio of event‑planning experiences. Long‑term, she envisions leading front‑of‑house operations for a cultural venue, introducing innovative
    visitor‑engagement programs, and possibly launching a pop‑up art café that blends her love for art and community building. Her competitive nature motivates her to achieve top customer‑satisfaction metrics
    and obtain project‑management certifications such as CAPM.
