  career_goals: Jose aspires to move into a supervisory role within the retail sector, aiming to become a shift manager within the next two years and eventually a store manager. He is pursuing a community
    college certification in retail management and business administration to complement his hands‑on experience. His competitive drive pushes him to exceed sales targets and improve store performance metrics.
    Long‑term, he hopes to open his own neighborhood grocery or convenience store where he can apply his practical knowledge, curated customer experience, and leadership skills.
