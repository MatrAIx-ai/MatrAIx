  hobbies: '[''Recreational Soccer'', ''Cooking Mexican Cuisine'', ''Attending Community Festivals'', ''Latin Music and Karaoke'', ''Hiking in Sierra Foothills'', ''Podcast Listening (Business & Tech)'',
