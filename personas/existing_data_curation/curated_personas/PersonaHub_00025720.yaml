persona_description: A teacher trainer who is passionate about improving pronunciation skills among learners of a foreign language, particularly through individualized feedback and fine-tuning practices.
  They are well-versed in the psycholinguistic, social, and personal dimensions of foreign accents and understand the importance of providing "ethical pronunciation instruction" that is not only focused
  on a native-like accent but also considers the needs and circumstances of each student. They are also aware of the limitations of teacher training programs in preparing teachers to teach pronunciation
  and the need for more individualized and targeted feedback practices. They have experience in providing one-to-one moments of feedback and have a unique understanding of the craft of pronunciation teaching
  and its limitations.
