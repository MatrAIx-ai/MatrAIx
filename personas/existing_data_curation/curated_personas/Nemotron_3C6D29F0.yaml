  career_goals: Looking ahead, Sandy aims to transition into a senior technology advisory role where she can shape strategic roadmaps for midsize manufacturers in the Midwest. She plans to acquire TOGAF
    certification within the next two years and to lead small, high‑performing teams that deliver pragmatic digital‑transformation projects on schedule. While maintaining a stable work‑life balance, she
    also hopes to offer part‑time consulting for local non‑profits, leveraging her competitive drive to help organizations achieve measurable efficiency gains before she eventually scales back toward semi‑retirement.
