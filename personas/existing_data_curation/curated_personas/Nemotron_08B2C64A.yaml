personas:
  professional: Stephanie Kilar, a seasoned casino floor surveillance analyst in Johnson County, blends her humanities insight with sharp observational abilities and disciplined reporting to keep security
    teams organized, while they mentor junior staff and champion AI-enhanced monitoring tools for future deployments.
  sports: Stephanie Kilar, an energetic participant in the Iowa City Women's Softball League and a regular hiker of the Loess Hills, proudly roots for the Iowa Hawkeyes football team and the Chicago Cubs,
    attends weekly CrossFit classes, and they balance competitive play with a relaxed approach to fitness that includes weekend bike rides with friends.
  arts: Stephanie Kilar, a dedicated volunteer actor with the Iowa City Community Theatre who devours historical fiction by Philippa Gregory, regularly attends concerts by John Prine and the local indie
    band The Kakats, collects prints from regional artisans, and they draw creative inspiration for their security reports from the narratives they help bring to life on stage.
  travel: Stephanie Kilar, a pragmatic traveler who prefers meticulously planned road trips and weekend getaways, has explored the historic streets of Savannah, trekked the rolling loess hills of Iowa,
    daydreams about a summer in Tuscany's vineyards, and they always schedule a cultural museum visit and a local food market stop to balance adventure with learning.
  culinary: Stephanie Kilar, an adept home cook who champions farm-to-table meals, often prepares corn casserole with sharp cheddar, apple-cider glazed pork chops, and heirloom tomato salads harvested from
    her garden, experiments with rosemary and fennel in soups, and they occasionally indulge in craft beer tastings at a local brewery while keeping a meticulously organized pantry for quick weeknight dinners.
  core: Stephanie Kilar, a methodical yet sociable Midwestern security professional, balances a love for community theater, DIY woodworking, and AI-enhanced safety solutions while never missing the annual
    Iowa State Fair, and they meet every challenge with a calm, organized mindset.
background:
  cultural: Stephanie grew up in a Midwestern farming community and later moved to Iowa City for college, where she embraced the blend of small-town values and a vibrant university culture. As a white American
    with a liberal arts background, she identifies with the region's emphasis on hard work, community involvement, and modesty. Her family traditions include annual trips to the Iowa State Fair and a strong
    appreciation for local music and theater. Living in Johnson County, she participates in neighborhood gatherings, supports local artisans, and values the inclusive, collaborative spirit of the Iowa City
    arts and civic scene.
attributes:
  skills: '[''Video surveillance monitoring'', ''Behavioral pattern analysis'', ''Incident reporting'', ''Conflict de-escalation'', ''First aid/CPR'', ''Physical security patrol'', ''Crowd management'',
    ''Regulatory compliance for gambling'', ''Team training and coordination'', ''Basic cybersecurity awareness'', ''Critical thinking and analytical writing'']'
  hobbies: '[''Softball league'', ''Community theater acting'', ''Board-game nights'', ''DIY woodworking'', ''Gardening'', ''Reading historical fiction'', ''Visiting museums and historic sites'', ''Hiking
    local trails'', ''Attending live music events'', ''Following security-tech podcasts'']'
  career_goals: She aims to move from front-line surveillance to a supervisory role overseeing security operations across multiple casino sites in the Midwest. Stephanie plans to earn the Certified Protection
    Professional (CPP) credential and pursue additional coursework in criminal justice and security technology integration. Over the next five years she hopes to lead a team that adopts AI-enhanced monitoring
    tools, develop comprehensive emergency response protocols, and serve as a liaison between the security department and local law-enforcement agencies. Long-term, she envisions transitioning into security
    consulting to help small businesses and community venues improve their safety practices.
