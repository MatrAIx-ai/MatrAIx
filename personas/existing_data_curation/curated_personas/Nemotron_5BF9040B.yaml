  career_goals: Luisa aims to advance from her current supervisory role to a store manager position within the next two years, and ultimately become a district manager overseeing multiple locations. She
    plans to complete her bachelor's degree in Business Administration, earn a retail management certification, and acquire Lean Six Sigma Green Belt training to further enhance operational efficiency.
    Long‑term, she envisions opening her own boutique that showcases Mexican artisanal products, providing employment opportunities for members of her community while preserving cultural traditions. She
    is also passionate about mentoring young women in retail, advocating for inclusive hiring practices, and being recognized for measurable improvements in sales growth and staff retention.
