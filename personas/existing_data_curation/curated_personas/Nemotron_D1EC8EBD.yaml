  career_goals: Addie aims to leverage her curiosity and practical mindset to become a charge nurse within the next two years, then transition to a nurse manager role overseeing a medical‑surgical unit.
    She plans to pursue a Master of Science in Nursing with a focus on nursing administration and health policy, and obtain certification as a Certified Diabetes Educator to address high rates of chronic
    disease in her community. Long‑term, she envisions leading a community health outreach program in Greenwell Springs that integrates evidence‑based education, preventive screenings, and culturally responsive
    care. She also aspires to mentor upcoming nurses and contribute to research on health disparities affecting African‑American populations in Louisiana.
