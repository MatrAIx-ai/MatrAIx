personas:
  professional: Addie Henderson, a critical‑care nurse on a busy medical‑surgical unit, they combine meticulous electronic health record documentation, precise IV therapy, wound care, catheter management,
    and EKG interpretation with a curious yet practical mindset to deliver evidence‑based interventions, mentor junior staff, and lead quality‑improvement projects that balance innovative ideas with proven
    protocols.
  sports: Addie Henderson, a loyal supporter of the New Orleans Saints and LSU Tigers, they sustain fitness through early riverfront jogs, weekly yoga sessions, participation in the Baton Rouge Running
    Club’s 5K races, and summer co‑ed recreational softball league play.
  arts: Addie Henderson, a soulful member of her church choir, they frequent live jazz at Preservation Hall, reverence the blues of B.B. King and the vocal stylings of Irma Thomas, and devour historical
    fiction by Hilary Mantel to blend narrative art with their love of storytelling.
  travel: Addie Henderson, an organized weekend traveler, they prefer short road trips to Louisiana treasures like Natchitoches and the Bayou Teche, while dreaming of a leisurely coastal retreat in Savannah,
    Georgia, balancing modest travel budgets with their desire for cultural immersion and occasional family visits.
  culinary: Addie Henderson, an enthusiastic home cook, they craft Creole classics such as shrimp étouffée, chicken‑and‑sausage jambalaya, and collard‑green soup seasoned with smoked Andouille and fresh
    okra harvested from their garden, while perfecting sweet‑potato pie with a dash of cinnamon.
  core: Addie Henderson blends a curious, methodical nursing mind with a love for Creole cooking, garden‑grown veggies, and gospel choir harmony, yet they often forget to set an alarm for morning jogs,
    leading to rushed yoga sessions.
background:
  cultural: Addie identifies as African‑American and grew up in the culturally vibrant environment of East Baton Rouge Parish, where Creole, Southern, and Black traditions intersect. Her family’s deep roots
    in the church and community have instilled a strong sense of service, resilience, and pride in her heritage. She draws inspiration from the legacy of pioneering Black nurses and the rich musical, culinary,
    and storytelling traditions of Louisiana. This background informs her compassionate care, cultural competency, and commitment to addressing health disparities within her community, while also shaping
    her love for gospel music, Mardi Gras festivities, and the close‑knit support network of family and friends.
