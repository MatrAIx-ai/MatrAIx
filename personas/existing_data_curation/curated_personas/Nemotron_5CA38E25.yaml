personas:
  professional: Sonia Bibi, an experienced full-stack software developer, leverages over a decade of JavaScript, React, Node.js, and cloud expertise to deliver meticulously documented, performance-optimized
    web solutions for community nonprofits, and they methodically mentor junior engineers while charting a path toward senior leadership.
  sports: Sonia Bibi follows the San Antonio Spurs and San Antonio FC with quiet enthusiasm, rides with the Hill Country Cyclists on weekends, and maintains a personal hiking regimen along Brackenridge
    Trail, viewing fitness as a steady, low-key complement to their structured work life.
  arts: Sonia Bibi finds artistic solace in the soulful acoustic melodies of José González, the vivid murals of local street artist Carlos Almaraz, and the contemplative black-and-white work of Diane Arbus,
    and they channel that inspiration into their own urban photography of family gatherings and cityscapes.
  travel: Sonia Bibi's travel style blends careful planning with spontaneous curiosity, having explored the historic missions of San Antonio, trekked the vineyards of Texas Hill Country, and ventured to
    Oaxaca for its colorful markets, while they dream of wandering Barcelona's Gothic Quarter and the serene beaches of Tulum when finances allow.
  culinary: Sonia Bibi's culinary persona blends moderate cooking skill with deep reverence for tradition, regularly crafting mole poblano with dried chilies and chocolate, hand-shaping tamales wrapped
    in corn husks, and whipping fresh salsa from heirloom tomatoes and serrano peppers, all while they experiment with herb-infused oils from their balcony garden.
  core: Sonia Bibi is a methodical, community-focused full-stack developer who balances curious exploration of new technologies with disciplined organization, a love for heritage-rich cooking, quiet fitness
    pursuits, and a steadfast resolve to uplift underserved neighborhoods.
background:
  cultural: Sonia's Mexican roots are a central part of her identity. Raised in a bilingual household in San Antonio, she grew up celebrating traditions such as Dia de los Muertos, quinceaneras, and the
    vibrant Fiesta San Antonio. Her family ties and community involvement have instilled a strong sense of collectivism, respect for elders, and a love for sharing food and stories. Being widowed at a young
    age has deepened her resilience and reinforced her commitment to supporting other families facing hardship. She often volunteers with local nonprofits that provide tech education to Hispanic youth,
    leveraging her professional skills to give back to the community that shaped her. Her bicultural perspective allows her to navigate both Mexican and mainstream American cultural norms with ease, enriching
    her professional collaborations and personal relationships.
