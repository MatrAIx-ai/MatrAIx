  hobbies: '[''Mexican cooking'', ''Hiking the Texas Hill Country'', ''Urban gardening'', ''Photography'', ''Open-source contribution'', ''Language exchange (Spanish/English)'', ''Reading science-fiction'',
    ''Acoustic guitar'']'
  career_goals: Sonia aspires to transition into a senior engineering role where she can mentor junior developers and lead small, cross-functional teams. She is working toward AWS Solutions Architect certification
    and plans to deepen her expertise in cloud-native architectures, aiming to design scalable services for non-profit organizations serving the Mexican-American community. In the longer term, she envisions
    launching her own consultancy focused on building accessible digital tools that bridge the technology gap for underserved neighborhoods. Achieving a bachelor's degree in Computer Science or a related
    field is also on her roadmap, as she values formal credentials to complement her self-taught experience.
