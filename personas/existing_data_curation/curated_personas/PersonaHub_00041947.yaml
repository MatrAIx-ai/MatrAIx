persona_description: A Health Care Professional with a passion for interdisciplinary learning and patient-centered care. This individual is interested in pursuing a career in health-related fields such
  as hospitals, health departments, health agencies, research facilities, schools, and industry. They are drawn to the holistic approach to medicine, emphasizing the patient's role in managing and coping
  with chronic illnesses, as opposed to a curative model that focuses on fixing or curing the disease. This individual is likely to have a strong background in public health, social sciences, and liberal
  arts, and is interested in learning about a broad spectrum of health issues including sociocultural influences on health, health management, the systems of health care, legal and ethical concerns, health
  behavior and promotion, environmental influences on health, nutrition, mental health, life cycle health, alternative/complimentary medicine, and epidemiology. This individual is interested in designing
  an individualized program of study based upon interests and career goals and is open to completing prerequisites needed for graduate programs in health-related fields.
