personas:
  professional: Bernard Young, an entertainment attendant at a regional theater, leverages their calm, methodical customer‑service style and strict safety‑protocol adherence to de‑escalate tense crowds,
    while their underlying skepticism and love for clear procedures drive them to meticulously troubleshoot AV equipment and track cash and inventory, positioning them for a near‑term shift‑manager role.
  sports: Bernard Young enjoys low‑key fishing trips at Lake Marion for quiet reflection, plays competitive pick‑up basketball with a close circle at the local community center, and roots for the Charleston
    Battery soccer team, balancing solitary sport with occasional high‑energy team play.
  arts: Bernard Young immerses themselves in classic soul, R&B, and gospel, regularly listening to Marvin Gaye, Aretha Franklin, and Kirk Franklin while volunteering in the church choir, and escapes into
    mystery thrillers by Gillian Flynn and Lee Child during downtime.
  travel: Bernard Young prefers carefully planned road trips that blend relaxation and modest adventure, having explored Charleston’s historic district and the Great Smoky Mountains, while dreaming of a
    solo coastal drive along the Outer Banks to unwind from work stress.
  culinary: Bernard Young, an avid home cook, masters Southern comfort dishes like shrimp and grits, fried chicken, and collard greens, experimenting with fresh herbs and hot sauces, yet often burns the
    toast when distracted by a retro gaming session.
  core: Bernard Young is a structurally minded yet easygoing soloist who balances meticulous work habits with a competitive edge in hobbies, all while battling chronic worry and a penchant for retro nostalgia.
background:
  cultural: Bernard is an African‑American raised in Rowesville, South Carolina, a town with a strong Black community rooted in Southern traditions. He grew up attending a local Baptist church, where gospel
    music and collective celebrations like Juneteenth shaped his cultural identity. Family stories of agricultural labor and service‑industry work have instilled a respect for hard work and community solidarity.
    He values Southern hospitality, the cuisine of fried chicken, collard greens, and sweet tea, and the rhythmic blues and gospel sounds that fill neighborhood gatherings. While he embraces the broader
    Black Southern heritage, he is also aware of the region’s historical ties to the Gullah culture and its influence on local language and culinary customs.
attributes:
  skills: '["customer service", "crowd management", "basic audio‑visual equipment operation", "ticketing system operation", "conflict de‑escalation", "cash handling", "facility safety inspection", "inventory
    tracking", "emergency response", "time‑boxing tasks"]'
  hobbies: '["retro video gaming", "reading mystery and thriller novels", "fishing at Lake Marion", "DIY woodworking projects", "listening to soul, R&B, and gospel music", "basketball pick‑up games with
    a small group", "cooking Southern cuisine", "volunteering in the church choir"]'
  career_goals: Bernard wants to move from frontline attendant work to a supervisory role within the next two years, aiming to become a shift manager at a regional theater or event venue. He plans to earn
    certifications such as the Certified Entertainment Technician (CET) and OSHA safety training to strengthen his resume. Long‑term, he dreams of overseeing venue operations as an operations manager or
    launching a small side business that provides event‑setup and equipment‑rental services for local churches and community festivals. Stability, a clear career ladder, and the chance to prove himself
    as a top performer drive his ambitions.
