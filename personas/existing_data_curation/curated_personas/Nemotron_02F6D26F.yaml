personas:
  professional: Yaneth Capellan, a 38‑year‑old bilingual teaching assistant, blends structured classroom routines with agile lesson tweaks, leveraging Google Classroom and SMART Boards to support English
    language learners while informally counseling peers through mindfulness techniques.
  sports: Yaneth Capellan hikes the Sonoran Desert trails on weekends, follows the Phoenix Suns and Arizona Diamondbacks, and volunteers as a community park clean‑up crew, preferring low‑impact activities
    over competitive sports.
  arts: Yaneth Capellan enjoys listening to Los Tigres del Norte and Julieta Venegas, reads contemporary fiction by Celeste Ng and self‑help books by Brené Brown, and leads after‑school art workshops where
    they guide children in creating murals inspired by local flora.
  travel: Yaneth Capellan prefers spontaneous road trips to desert destinations like Sedona and the Grand Canyon, plans weekend getaways after work, and dreams of exploring the historic plazas of Granada,
    Spain, while balancing family obligations.
  culinary: Yaneth Capellan cooks tamales, mole, and pozole with fresh chilies, corn masa, and oregano, experimenting with heirloom varieties of chiles and occasionally adding unexpected ingredients like
    cinnamon, while their kitchen skill hovers between confident home chef and enthusiastic beginner.
  core: Yaneth Capellan is a structured yet flexible educator who channels anxiety into yoga, splurges on culinary experiments, and balances community mentorship with occasional budget missteps.
background:
  cultural: Yaneth is of Mexican heritage and grew up in a bilingual household, speaking both Spanish and English fluently. Her family traditions include celebrating Día de los Muertos, Las Posadas, and
    Mexican Independence Day, while also observing mainstream American holidays. She maintains strong ties to the local Mexican‑American community in Maricopa County, participating in cultural festivals
    and community gatherings. Her upbringing instilled a deep appreciation for Mexican culinary arts, family cohesion, and respect for cultural diversity, which she brings into her educational practice
    by fostering an inclusive classroom environment that honors both Mexican and American identities.
attributes:
  skills: '[''Classroom support'', ''Bilingual communication (English/Spanish)'', ''Lesson planning assistance'', ''Differentiated instruction'', ''Student behavior management'', ''Educational technology
    (Google Classroom, SMART Boards)'', ''Culturally responsive teaching'', ''Emotional support and peer counseling'', ''Flexible time management'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Gardening succulents and herbs'', ''Hiking desert trails'', ''Yoga and mindfulness meditation'', ''Listening to regional Mexican music'', ''Reading contemporary
    fiction and self‑help books'', ''Volunteering at community center art programs'']'
  career_goals: Yaneth aims to become a fully certified teacher, focusing on bilingual education or special education. She plans to pursue a master's degree in education leadership or bilingual curriculum
    design within the next three years. Her long‑term ambition is to develop and implement curricula that embed Mexican cultural content, fostering inclusivity for multilingual learners. She also hopes
    to take on a mentorship role, leading professional‑development workshops on culturally responsive pedagogy and advocating for increased mental‑health resources for students within her school district.
