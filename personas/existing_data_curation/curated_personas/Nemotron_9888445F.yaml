personas:
  professional: Neil, a three‑year‑old budding builder, arranges wooden blocks and Lego Duplo pieces with geometric precision, turning playtime into a miniature engineering lab where their love for structure,
    practicality, and reliable focus hints at future problem‑solving expertise.
  sports: Neil plays in the Tiny Tackle toddler soccer club on Saturday mornings, attends a beginner’s gymnastics class at the community center, and cheers for the New York Yankees during televised games,
    displaying a structured approach to fitness and a competitive edge even in simple playground races.
  arts: Neil enjoys dancing to The Wiggles, humming Raffi’s 'Baby Beluga', drawing vibrant pictures of dinosaurs with Crayola crayons, and watching the animated series 'Bluey', where their appreciation
    for bright storytelling and rhythmic songs shapes their creative play.
  travel: Neil has visited the nearby city zoo, splashed at a family beach weekend in Myrtle Beach, and dreams of a future trip to Walt Disney World in Orlando, preferring trips that blend familiar routines
    with a splash of adventure, yet always insists on packing their favorite stuffed bunny.
  culinary: Neil loves creamy macaroni and cheese with sharp cheddar, peanut butter and jelly sandwiches on whole‑grain bread, strawberry slices, and rice cakes topped with avocado, while consistently refusing
    broccoli, and can barely spread butter without making a mess, reflecting a still‑developing but enthusiastic approach to food.
  core: Neil’s early world is a tidy sandbox of block towers, labeled piggy‑bank slots, and routine bedtime rituals, colored by a quietly competitive spirit and a hint of skeptical curiosity that makes
    every playdate a structured, yet playful, negotiation.
background:
  cultural: Neil is raised by a white family in Portland, Washington County, Oregon. His upbringing reflects the Pacific Northwest’s emphasis on outdoor play, environmental awareness, and community events
    such as local farmers' markets. Family traditions include celebrating Thanksgiving and Christmas, and his parents often incorporate nature‑based activities—like exploring nearby woods and collecting
    pine cones—into his daily routine.
