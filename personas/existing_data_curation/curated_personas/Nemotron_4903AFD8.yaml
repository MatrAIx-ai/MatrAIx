  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Visiting art galleries'', ''Reading science fiction and philosophy'', ''DIY electronics projects (Arduino)'', ''Salsa and folk dance'', ''Community
    potluck organizing'', ''Volunteer tutoring in bilingual art program'', ''Yoga'', ''Hiking in Griffith Park'']'
  career_goals: She aims to advance into a store management role within the next two years, leveraging her STEM background to lead a data-driven retail team. Long-term, Juana envisions transitioning to
    a regional district manager position where she can implement technology-enabled sales strategies, mentor diverse staff, and champion inclusive customer experiences. She also dreams of launching a boutique
    that fuses Mexican folk art with modern tech gadgets, providing a platform for local artisans.
