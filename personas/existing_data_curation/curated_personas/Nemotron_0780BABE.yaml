  career_goals: Erick aims to transition into a senior reviewer or supervisory role within the credit department, where he can mentor younger staff, introduce modest process enhancements, and help shape
    department best practices. While seeking professional growth, he prioritizes a balanced schedule that reduces stress and supports his upcoming retirement plans, hoping to retire comfortably within the
    next five to eight years while maintaining a part‑time advisory presence.
