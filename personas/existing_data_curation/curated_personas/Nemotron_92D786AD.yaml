personas:
  professional: Azeneth Leon, a 15‑year‑old high‑school student, channels their sociable energy and pragmatic curiosity into a growing TikTok channel where they combine dance routines, quick cooking demos,
    and DIY crafts, sharpening video editing, storytelling, and community‑engagement skills while balancing school responsibilities.
  sports: Azeneth Leon plays forward on a local youth soccer league, follows the San Jose Earthquakes and the Golden State Warriors for inspiration, and regularly hikes the trails of Henry W. Coe State
    Park to boost endurance, though they sometimes skip rest days in pursuit of extra practice.
  arts: Azeneth Leon, an active drama‑club participant, brings their outgoing flair to stage performances, while TikTok dance videos pay homage to Bad Bunny, Selena, and Taylor Swift, and they frequently
    binge‑watch Broadway‑style musical adaptations to spark new choreography ideas.
  travel: Azeneth Leon dreams of weekend road trips to Yosemite and coastal escapes in Big Sur, saves up for a future family vacation to Mexico City’s vibrant markets, and plans to explore Kyoto’s cherry‑blossom
    festivals, preferring a blend of adventurous hikes and cultural immersion.
  culinary: Azeneth Leon, an enthusiastic home cook, perfects chicken enchiladas with homemade salsa verde, crafts creamy avocado‑lime guacamole, experiments with chipotle‑infused marinades, and often over‑salts
    dishes while capturing the process for TikTok followers.
  core: Azeneth Leon fuses teenage curiosity with practical hustle, turning soccer, dance, and TikTok creativity into community‑focused projects, even if occasional over‑commitment leads to missed homework.
background:
  cultural: Azeneth is a second‑generation Mexican‑American. She grew up in a bilingual household where Spanish is spoken daily, and family traditions such as celebrating Día de los Muertos, preparing tamales,
    and attending a local Catholic parish are central to her identity. Her parents, who work in the agricultural sector, have instilled a strong work ethic and a deep appreciation for Mexican cuisine, music,
    and folklore. Living in Hollister, a town with a vibrant farmworker community, she navigates both Mexican cultural values of family‑centered solidarity and the broader Californian youth culture, allowing
    her to blend traditions with contemporary American influences.
attributes:
  skills: '["Bilingual Spanish‑English communication","Basic graphic design (Canva, Photoshop)","Video editing (iMovie)","Team collaboration in sports (soccer) and performing arts (dance)","First‑aid certification
