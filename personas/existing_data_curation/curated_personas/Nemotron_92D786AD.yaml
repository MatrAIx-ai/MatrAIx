  hobbies: '["Soccer (youth league)","Dance (pop and Mexican styles)","Drama club acting","TikTok content creation (dance, cooking, crafts)","Community garden volunteering","Reading young‑adult fiction","Hiking
    in local parks"]'
  career_goals: Azeneth aims to finish her high‑school education by obtaining a GED and then enroll in a community college program focused on nursing or community health. She wants to combine her bilingual
    ability and caring nature to become a health educator who works with farmworker families in the Central Valley. In the longer term she envisions opening a small community‑center space where she can
    offer health workshops, language classes, and after‑school programs. She also hopes to continue developing her digital‑media skills to create culturally relevant health‑information videos for Spanish‑speaking
    audiences.
