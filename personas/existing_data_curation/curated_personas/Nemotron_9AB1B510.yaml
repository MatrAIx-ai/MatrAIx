personas:
  professional: Wanda Trammell, a seasoned bookkeeping and auditing clerk with over three decades of experience, combines meticulous ledger management with a calm, resilient demeanor; they leverage both
    QuickBooks and traditional paper records while mentoring junior staff despite occasional disorganization.
  sports: Wanda Trammell follows the Kentucky Wildcats basketball team and the Eastern Kentucky University Colonels; they participate in the Floyd County Hiking Club’s weekend treks through the Red River
    Gorge and enjoy occasional strolls at local community baseball games, preferring low‑impact activity over competitive sports.
  arts: Wanda Trammell immerses themselves in Appalachian bluegrass, listening to legends like Bill Monroe and Ralph Stanley, attends community folk art fairs featuring craftspersons such as Grayson Hoffman,
    and studies historical fiction by James Still to deepen their appreciation of regional storytelling.
  travel: Wanda Trammell favors quiet road trips to the Great Smoky Mountains and the Blue Ridge Parkway; they dream of tracing family roots in the Scottish Highlands and prefer low‑stress, budget‑conscious
    travel that allows ample time for birdwatching and journaling.
  culinary: Wanda Trammell enjoys cooking traditional Appalachian dishes like ham‑and‑beans, corn‑bread, and apple stack cake, often incorporating garden‑fresh vegetables, wild‑flower honey, and tube peas,
    and they rate themselves as a competent home cook who loves tweaking heritage recipes.
  core: Wanda Trammell is a calm, curiosity‑driven bookkeeper who cherishes solitary garden work, bluegrass tunes, and precise numbers; they navigate retirement with modest frugality and occasional disorganization.
background:
  cultural: Wanda grew up in the Appalachian region of eastern Kentucky, within a predominantly white, close‑knit community that valued self‑reliance, modesty, and a strong work ethic. Raised in a Baptist
    household, she participated in church gatherings and community events, though she now prefers quieter, more solitary settings. The cultural emphasis on practicality and frugality shaped her straightforward
    approach to both personal finances and professional duties. Her upbringing in Floyd County, surrounded by rolling hills, coal mining heritage, and a tradition of familial storytelling, informs her love
    of local history, genealogy, and the preservation of regional crafts and cuisine.
