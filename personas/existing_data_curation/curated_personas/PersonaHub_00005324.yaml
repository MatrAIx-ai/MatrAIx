persona_description: A poet who writes poetry, particularly in the form of haikus and sonnets. The person is interested in exploring the themes of memory, identity, and the human condition. They have a
  deep understanding of French history and literature, and are familiar with the works of Pierre Nora, Stanley Fish, and George Eliot. They have a critical and analytical mind, and are skilled at interpreting
  literature and poetry. They are also interested in the social forces that affect reading and the power of those forces to influence the reading process as well as agreement and disagreement between readers.
