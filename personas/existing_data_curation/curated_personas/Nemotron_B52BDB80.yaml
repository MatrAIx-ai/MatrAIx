personas:
  professional: Elexus Mcghie, a 21‑year‑old art‑history graduate with a knack for weaving scholarly research into digital exhibition narratives, channels their curiosity and love of solitude into curatorial
    proposals that champion under‑represented artists while thriving on flexible deadlines despite a hinted tendency toward disorganization.
  sports: Elexus Mcghie, a solitary fitness enthusiast in Lexington, jogs the Arboretum trails with the Lexington Running Club in the spring, catches Kentucky Wildcats basketball games on TV, avoids team
    sports in favor of solo yoga sessions at the local studio ‘Root & Rise’, and treats weekend hikes as a mental reset.
  arts: Elexus Mcghie immerses themselves in the local arts scene, wandering through the Lexington Museum of Art and the Ashland Center, sketching in quiet corners while listening to Miles Davis and Philip
    Glass, curating Instagram feeds inspired by photographers Henri Cartier‑Bresson and Vivian Maier, and penning essays that quote poet Eavan Boland and novelist Zadie Smith.
  travel: Elexus Mcghie prefers low‑key, self‑guided trips that blend study and leisure, having recently explored the historic streets of Savannah, Georgia, and the contemporary galleries of Berlin's Kreuzberg,
    while budgeting future adventures to the Japanese tea‑house towns of Uji and the Scottish Highlands for solitary reflection.
  culinary: Elexus Mcghie enjoys crafting minimalist meals, often whipping up avocado‑toast topped with feta, brewing pour‑over Ethiopian coffee, and experimenting with seasonal ramen bowls featuring miso,
    shiitake, and soft‑boiled eggs, yet tends to skip breakfast when a late‑night sketch session runs overtime.
  core: Elexus Mcghie is a curious, solitary curatorial dreamer who trades social obligations for sketchbooks, thrives on flexible deadlines, and can’t resist a late‑night cup of coffee paired with a jazz
    record.
background:
  cultural: Elexus grew up in a close‑knit African‑American community in Lexington, where story‑telling, church music, and community murals shaped her early sense of identity. Her parents, both educators,
    emphasized the importance of cultural heritage and encouraged her to explore the rich history of Black art in the American South. She frequently attends local events hosted by the Lexington Center for
    the Arts' Black Artists Forum and draws inspiration from the narratives of the Great Migration and Kentucky's civil‑rights legacy. This cultural grounding fuels her commitment to amplify marginalized
    voices within the contemporary art world.
attributes:
  skills: '[''art historical research'', ''critical visual analysis'', ''academic writing'', ''digital illustration'', ''photo editing (Adobe Photoshop, Lightroom)'', ''social media content creation'',
    ''curatorial planning'', ''exhibition cataloging'', ''basic HTML/CSS for personal website'']'
  hobbies: '[''gallery visits'', ''sketching'', ''reading contemporary African American literature'', ''listening to jazz and classical music'', ''street photography'', ''solo nature walks'', ''podcast
    listening (art theory, social critique)'', ''digital collage'', ''writing for an online arts blog'']'
  career_goals: Seeking to turn her passion for underrepresented art into a professional path, Elexus aims to secure a curatorial fellowship at a regional museum or gallery where she can champion emerging
    Black artists. In parallel, she plans to launch a freelance consultancy that offers research, writing, and digital exhibition design for independent creators. Long‑term, she envisions pursuing a master's
    in museum studies while maintaining the flexibility to work remotely, building a reputation as a thought‑leader who blends scholarly rigor with innovative digital storytelling.
