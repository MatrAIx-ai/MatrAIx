  career_goals: Beatrice dreams of becoming an animated filmmaker or a children’s book author, using art and storytelling to spark curiosity in other kids. She also imagines herself as an astronaut who
    can share the wonders of space through vivid illustrations. Her long‑term ambition is to blend creativity with a desire to inspire and support her community.
