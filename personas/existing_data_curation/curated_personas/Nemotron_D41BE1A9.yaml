personas:
  professional: Beatrice Seastrunk, an 8-year-old budding coder-artist, blends vivid storytelling with Scratch programming and intricate LEGO creations, channeling her boundless imagination and organized
    flexibility into school projects and community art showcases.
  sports: Beatrice Seastrunk dashes around the Waldorf Youth Soccer League field in the fall, splashes laps with the Waldorf Ducks Swim Team in the summer, and cheers for the Washington Capitals and Washington
    Commanders during game night gatherings, while her energetic approach to fitness keeps her leading outdoor tag games with friends after school.
  arts: Beatrice Seastrunk dazzles peers in school plays like 'The Lion King,' sketches vibrant fantasy worlds inspired by Disney movies, and sways to gospel hymns at the local church choir and upbeat tracks
    by Beyonce and Al Green, letting her love of music, drawing, and performance shape her creative identity.
  travel: Beatrice Seastrunk loves weekend road trips to the Chesapeake Bay tidal wetlands, day-long explorations of the National Mall's Smithsonian museums, and dreams of a future adventure to Disney World's
    Magic Kingdom and the sandy shores of the Bahamas, preferring family-guided itineraries that mix nature hikes with a dash of cartoon magic.
  culinary: Beatrice Seastrunk delights in whisking up simple chocolate chip cookies and banana bread with her parents, savoring soul-food staples like collard greens, cornbread, and mac and cheese at family
    gatherings, while her favorite snack after a LEGO marathon is a crunchy apple slice dipped in peanut butter.
  core: Beatrice Seastrunk is an endlessly curious 8-year-old whose imagination fuels daily art and code projects, yet she cannot resist a sugar-packed cookie binge before bedtime and occasionally forgets
    to finish her homework when a new LEGO set arrives.
background:
  cultural: Beatrice is part of an African‑American family that has lived in the Chesapeake Bay region for several generations. Her parents and grandparents share stories of their heritage, from gospel
    music at the local church to family gatherings featuring soul food and traditional Southern dishes. Growing up in Waldorf, Maryland, she participates in community events such as the Charles County Juneteenth
    celebration and the annual summer fair, where she learns about local history and the contributions of Black residents to the area. Her cultural upbringing emphasizes storytelling, music, and a strong
    sense of community, shaping her creative outlook and collaborative spirit.
