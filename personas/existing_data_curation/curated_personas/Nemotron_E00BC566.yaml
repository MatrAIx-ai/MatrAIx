  hobbies: '[''Playing soccer'', ''Cooking Mexican cuisine'', ''Hiking in the Piedmont region'', ''Listening to regional Mexican music'', ''Reading historical nonfiction'', ''Playing strategy board games
    (chess, Settlers of Catan)'', ''Gym workouts and weightlifting'', ''Volunteering as a Spanish tutor'']'
  career_goals: Henry aims to advance to a regional director of operations within the next five years, overseeing multiple facilities and driving enterprise‑wide efficiency initiatives. He plans to earn
    a Lean Six Sigma Black Belt and pursue an MBA to deepen his strategic and financial expertise. Long‑term, he envisions establishing a consultancy that helps small businesses—particularly Hispanic‑owned
    firms—implement operational best practices, while also championing diversity and mentorship programs within his organization and community.
