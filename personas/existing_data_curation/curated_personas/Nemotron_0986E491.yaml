personas:
  professional: Yolanda Mathis, a retired administrative aide turned community culinary mentor, applies their methodical record-keeping and event-coordination skills to organize church cooking workshops,
    garden tours, and a handwritten family cookbook project, all while maintaining a precise budget and schedule.
  sports: Yolanda Mathis enjoys low-impact exercise, walking each sunrise with binoculars for birdwatching and joining the local senior bowling league at the community center, while they cheer on the hometown
    baseball team, the River Valley Rangers, during summer weekends.
  arts: Yolanda Mathis finds artistic solace in listening to classic bolero crooners like Lucho Gatica and folk tunes of the Buena Vista Social Club, reading historical biographies about the Mexican Revolution
    and Southern Reconstruction, and crafting hand-knit shawls that echo the patterns of traditional folk art, which they occasionally showcase at church gatherings.
  travel: Yolanda Mathis plans their trips methodically, favoring short, well-organized road trips to historic sites such as the colonial town of Santa Fe and the nearby orchard valley where they source
    heirloom seeds, while keeping a modest travel budget that allows occasional visits to family in the coastal city of Galveston.
  culinary: Yolanda Mathis excels at traditional home cooking, perfecting recipes for tamales wrapped in corn husks, enchiladas smothered in homemade salsa roja made from garden tomatoes and jalapenos,
    and arroz con pollo seasoned with saffron and fresh cilantro, while their weekend canning sessions preserve homemade salsa verde and pickled peppers for winter.
  core: Yolanda Mathis is a meticulously organized retiree whose garden, kitchen, and knitting needles serve as tools for preserving family heritage, even as they occasionally forget to water their herbs
    during a busy day.
background:
  cultural: Yolanda is of Mexican descent; her parents migrated to Mississippi in the early 1960s to work in agricultural labor. Growing up in Fayette, she was raised bilingual, speaking Spanish at home
    while attending English-speaking schools. She maintains strong ties to Mexican cultural traditions, celebrating Día de los Muertos, Las Posadas, and other Mexican holidays with family, and preserving
    culinary customs through recipes passed down through generations. Her Catholic faith reflects both her Mexican heritage and the Southern religious environment. Over the decades, she has blended her
    cultural identity with the local Southern community, participating in church activities, local festivals, and community service, while serving as a cultural bridge for younger Hispanic families in Jefferson
    County.
attributes:
  skills: '["Household budgeting", "Record-keeping", "Meal planning", "Food preservation (canning)", "Vegetable gardening", "Traditional Hispanic cooking", "Community event coordination", "Caregiving and
