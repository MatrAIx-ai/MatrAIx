  hobbies: '[''Visiting art museums and galleries'', ''Coastal photography'', ''Sailing and fishing'', ''Experimenting with fusion cooking'', ''Live music and theater'', ''Reading about design thinking
    and innovation'', ''Blogging on project management and creativity'', ''Volunteer beach clean‑ups and community festivals'']'
  career_goals: Julian aims to transition into a senior program director role where he can oversee multiple large‑scale initiatives across the Gulf Coast, with a particular focus on community development
    and cultural revitalization projects. He plans to obtain the PMP certification and pursue an executive certificate in strategic leadership to deepen his expertise. Over the next five years, he hopes
    to lead a flagship waterfront arts district in Pensacola, mentor emerging project managers, and eventually launch his own consultancy that helps creative industries adopt flexible, outcome‑focused project
    frameworks.
