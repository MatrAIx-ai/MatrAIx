persona_description: A structural engineer who specializes in designing and analyzing skyscraper structures. They are responsible for ensuring the structural integrity of the building, taking into account
  factors like wind resistance, seismic activity, and the aesthetic goals of the owner and architect. They must also test the proposed buildings in wind tunnels to determine the effect of strong winds on
  them and the surrounding buildings, and make adjustments as needed. They must work closely with mechanical engineers to plan appropriate mechanical systems such as elevators and air circulation systems.
