  hobbies: '[''Bridge (card game)'', ''Gardening'', ''Volunteer tech support'', ''Church attendance'', ''Walking in local parks'', ''Fishing'', ''Cooking'', ''Listening to classic rock'', ''Historical society
    meetings'', ''Weekly community gatherings'']'
  career_goals: Although retired, Charles aims to remain actively engaged by sharing his professional knowledge with his grandchildren and local youth through mentorship programs and weekend workshops.
    He hopes to document and preserve the industrial history of Pittsburgh in a memoir and contribute oral histories to the regional historical society. Maintaining strong social connections, he aspires
    to continue volunteering at the senior center, supporting community events, and staying physically healthy enough to enjoy weekly walks and occasional fishing trips.
