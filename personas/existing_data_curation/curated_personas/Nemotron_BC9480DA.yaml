  career_goals: Nikolas aims to advance to a production supervisor role within the next two to three years, leveraging a Six Sigma Green Belt certification and additional coursework in industrial management.
    He is motivated to lead continuous‑improvement projects that boost line efficiency by at least 15% and to mentor newer workers, fostering a high‑performing team culture. Long‑term, he envisions becoming
    a plant manager or establishing a small, family‑owned manufacturing venture focused on sustainable packaging, providing financial stability for his children and a legacy of steady, reliable work.
