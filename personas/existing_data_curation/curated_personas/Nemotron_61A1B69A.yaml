  career_goals: Although Angel is not seeking paid employment, she aims to expand her role as a community volunteer and cultural steward. She plans to lead a storytelling circle at the local senior center,
    collecting and preserving oral histories of Detroit’s older Black residents. She also hopes to compile a community cookbook that showcases family soul‑food recipes together with the stories behind them.
    By mentoring younger neighbors who are interested in cooking, sewing, or community organizing, Angel wants to pass on her practical knowledge and reinforce intergenerational bonds. Ultimately, she aspires
    to be recognized as a bridge between the city’s rich past and its future, ensuring that the values of compassion, harmony, and shared heritage continue to thrive.
