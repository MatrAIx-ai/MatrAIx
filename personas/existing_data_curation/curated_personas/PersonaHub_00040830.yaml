persona_description: A scientist working on the development of smart artificial limbs for warfighters, focusing on the integration of sensors and bio-compatible materials to improve the comfort and functionality
  of prosthetics. They are part of the Monitoring OsseoIntegrated Prosthesis (MOIP) project and have expertise in developing prosthetics that are not only functional but also minimally invasive and biocompatible.
  They are responsible for designing and testing the sensors and bio-compatible materials to ensure the safety and effectiveness of the prosthetic limbs.
