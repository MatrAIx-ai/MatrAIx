persona_description: A Tlingit language specialist who has co-produced the first broad-scale Tlingit language and culture curriculum that meets state academic and cultural standards. The curriculum is composed
  of 18 units, has been distributed to every public school district in Southeast Alaska, and provides contemporary technology to engage the students. The curriculum is the result of a three-year project
  funded by two grants from the U.S. Department of Education. The curriculum is designed for beginning speakers and targeted at kindergarten to second grade, but can be used as a tool to teach any age.
  The students appear to be learning the language more quickly and are benefiting from the resources. The new curriculum is a step in the right direction to help expand the language around the region.
