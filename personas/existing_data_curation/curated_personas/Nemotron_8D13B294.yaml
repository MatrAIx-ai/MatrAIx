  career_goals: Approaching retirement, Anderson aims to transition from full‑time estimating to a senior advisory role where he can shape cost‑control strategies for large‑scale projects without the day‑to‑day
    administrative load. He plans to obtain the Certified Professional Estimator (CPE) credential, launch a part‑time consultancy focused on sustainable building practices, and develop a mentorship program
    within his firm to pass on his practical knowledge to the next generation of estimators.
