personas:
  professional: Anderson Simms, a veteran construction cost estimator with over forty years of hands‑on experience, leverages a meticulous Excel‑driven workflow and seasoned negotiating skills to translate
    blueprints into precise budgets while mentoring junior staff, all while balancing a preference for structured processes with a surprisingly relaxed attitude toward daily deadlines.
  sports: Anderson Simms enjoys leisurely rounds of golf at the Lake Nona Golf & Country Club, follows the Orlando Magic season avidly, fishes on Lake Eola during spring weekends, and participates in a
    community senior softball league, balancing low‑impact activity with a love for local team spirit.
  arts: Anderson Simms, an avid fan of live music at Orlando’s House of Blues, frequently attends performances by classic rock legends like The Rolling Stones and blues guitarist B.B. King tribute shows,
    while also savoring historical fiction novels by Ken Follett and appreciating the craftsmanship of mid‑century modern furniture exhibitions.
  travel: Anderson Simms prefers relaxed road trips to historic towns such as Savannah and Charleston, enjoys occasional cruises to the Caribbean, dreams of attending the classic car show at the Amelia
    Island Concours d'Elegance, and plans a heritage rail tour through the Pacific Northwest once finances allow.
  culinary: Anderson Simms favors hearty, home‑cooked meals such as grilled ribeye steak with chimichurri, fresh catch‑of‑the‑day trout from Lake Eola, and classic Southern shrimp and grits, cooking at
    an intermediate skill level while sourcing fresh herbs from their own garden.
  core: Anderson Simms blends a structured, cost‑focused mind with a laid‑back love for woodworking, classic cars, and Disney fireworks, often juggling spreadsheets and sawdust while occasionally forgetting
    to water their prized garden.
background:
  cultural: Anderson grew up in a middle‑class white American family in the Sun Belt, embodying the values of hard work, community involvement, and modest hospitality typical of the region. He was raised
    with a blend of Southern and mainstream American cultural norms, participating in local church activities and neighborhood events. This background fostered a cooperative yet assertive demeanor, a respect
    for tradition, and an appreciation for both structured routines and the flexibility to enjoy spontaneous leisure moments.
