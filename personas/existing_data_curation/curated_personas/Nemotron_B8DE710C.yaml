personas:
  professional: Tiffany Barteet, a retired senior‑center mentor and museum docent, leverages a lifetime of genteel hospitality and sharp organizational instincts to orchestrate community events, coordinate
    intergenerational storytelling workshops, and guide younger volunteers through both tried‑and‑true traditions and modern digital tools.
  sports: Tiffany Barteet follows the Dallas Cowboys with fervor, enjoys watching the Texas Rangers’ spring training, participates in the local senior “Golden Walkers” walking club that meets at the community
    park for gentle strolls, and plays weekly shuffleboard at the senior center, all while cheering on the Texas Longhorns during bowl season.
  arts: Tiffany Barteet delights in the timeless swing of Duke Ellington and Count Basie, attends the nearby community theatre’s productions of classic Southern plays, browses quilting exhibitions featuring
    Mary Meigs, and regularly listens to the Texas Symphony Orchestra’s live radio broadcasts, letting the music inspire her own intricate quilt patterns.
  travel: Tiffany Barteet prefers road‑trip pilgrimages to historic sites like the Old State Capitol in Austin, the Civil War battlefields of Shiloh, and the jazz‑laden streets of New Orleans, while also
    planning a relaxed family reunion cruise to the Bahamas next summer, balancing her love for discovery with the practicalities of senior travel discounts and a modest travel budget.
  culinary: Tiffany Barteet excels at cooking classic Southern comfort dishes such as chicken fried steak with peppered gravy, collard greens simmered with smoked ham hocks, pecan pie with a flaky crust,
    and she cherishes the aroma of fresh baked biscuits made with buttermilk and cornmeal, often adding a pinch of cayenne to her gumbo for an extra kick.
  core: Tiffany Barteet is a sprightly octogenarian who turns community gatherings into living history lessons, savors big‑band jazz while quilting, and balances her calm resilience with occasional forgetfulness
    and a sweet tooth for pecan pie.
background:
  cultural: Tiffany grew up in East Texas in a white, Southern‑American family with deep roots in the region’s Protestant traditions. Her upbringing emphasized hospitality, community service, and respect
    for family ties. She carries the values of Southern hospitality, a practical work ethic, and a love for local customs such as church potlucks, community fairs, and preserving regional history. Her cultural
    identity blends traditional Texan modesty with an open, sociable spirit that thrives on connecting with neighbors and sharing stories across generations.
