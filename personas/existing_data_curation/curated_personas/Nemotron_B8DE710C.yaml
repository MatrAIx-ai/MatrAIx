  hobbies: '[''Reading historical novels'', ''Quilting'', ''Gardening'', ''Church participation'', ''Senior‑center dance evenings'', ''Genealogy research'', ''Cooking Southern recipes'', ''Listening to
    classic jazz and big‑band music'', ''Volunteering at local historical museum'']'
  career_goals: Although retired, Tiffany aims to remain an active pillar of her community by mentoring younger volunteers at the senior center, preserving and digitizing her family’s history for future
    generations, and learning new digital tools to share her recipes and stories online. She aspires to maintain her health and resilience, support her grandchildren with school projects, and continue to
    be a warm, welcoming presence at church and local events.
