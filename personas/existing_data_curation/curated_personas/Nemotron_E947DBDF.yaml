  hobbies: '[''backyard gardening'', ''hiking'', ''birdwatching'', ''nature photography'', ''woodworking'', ''reading astronomy and science history'', ''chess'', ''STEM volunteering'', ''community gardening'']'
  career_goals: Approaching retirement, William aims to transition into a mentorship and consultancy role. He wants to guide emerging analysts through real‑world projects, especially those that support
    sustainable agriculture and local government planning. He also hopes to volunteer his expertise with community science initiatives, like citizen‑science water quality monitoring, and to author occasional
    articles that bridge academic research with practical applications. Flexibility remains key—William prefers part‑time, project‑based engagements that allow him to balance his curiosity for new scientific
    topics with a relaxed schedule.
