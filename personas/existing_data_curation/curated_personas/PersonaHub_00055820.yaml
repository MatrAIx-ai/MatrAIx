persona_description: A student of Art History and French, Maggie Bryan is currently researching the influence of Japanese woodblock prints on French art during the late 19th century. Her interest in this
  topic is fueled by her unique background in both French and Art History, as well as her study abroad experience at the Université de Bordeaux 3, where she presented on the pigments used in Japanese woodblock
  prints. Bryan's research is supported by a Surdna Foundation Research Fellowship, and she hopes to turn her summer research into an honors project in the coming year. Her project aims to explore how impressionist
  and post-impressionist French painters were influenced by the woodblock prints of Utagawa Hiroshige, Katsushika Hokusai, and other Japanese artists.
