persona_description: A food safety expert with over 40 years of experience in postharvest for various fruits and vegetables, including apples, raspberries, and melons. He has been involved in postharvest
  for close to 40 years and has seen a shift from using more chemicals in agriculture to using fewer. He has been involved in numerous audits to ensure food safety in all aspects of production. He is knowledgeable
  about the USDA-AMS marketing standards and the Harmonized GAP audit, and he has experience with falsification of records, no written food safety plan, no one to oversee the written plan, presence of an
  immediate food safety risk, presence or evidence of excessive pests (rodents, insects), and unsafe employee practices. He is also familiar with the Harmonized standards and the mock recall and plan to
  move toward GFSI certification. He has experience with microbiological testing, specifically water testing, and he has knowledge of the definition of contact water.
