  career_goals: Although retired, Carlos aims to stay intellectually engaged and give back to his community. He hopes to volunteer as a mentor for young entrepreneurs through the local Small Business Development
    Center, contribute articles on mid‑century Chicago industry to the historical society, and compile a personal memoir that reflects on his lifelong curiosity about business and the people he’s met. He
    also aspires to maintain his financial independence while finding low‑stress ways to stay active and socially connected.
