    User 2: Oh, cool! I love to read too. What kind of books do you like to read?

    User 1: I like to read fantasy novels and poetry. I also like to read biographies.

    User 2: I love fantasy novels too! I''m actually reading one right now.

    User 1: Oh, cool! What is it about?

    User 2: It''s about a group of heroes who are trying to save the world from an evil wizard.

    User 1: That sounds like a good book! I''m reading one about a girl who is trying to find her lost brother.

    User 2: Oh, that sounds interesting! I''m not a big fan of mystery novels, but I might have to check that one out.

    User 1: You should! It''s really good.

    User 2: Okay, I will.

    User 1: So, what else do you like to do for fun?

    User 2: I like to cook.

    User 1: Oh, that''s awesome! I love to cook too. What do you like to cook?

    User 2: I like to cook all kinds of food, but my favorite is probably Italian food.

    User 1: Oh, that''s my favorite too! I love making pasta.

    User 2: Me too! I make a mean lasagna.

    User 1: I''m sure you do! I''m not very good at making lasagna.

    User 2: Well, you can always come over and try mine.

    User 1: I would love to!

    User 2: Great! I''ll make it next weekend.

    User 1: Sounds good!

    User 2: So, what else do you like to do for fun?

    User 1: I like to go to the movies.

    User 2: Oh, that''s cool! I love going to the movies too. What''s your favorite movie?

    User 1: My favorite movie is probably The Lord of the Rings: The Return of the King.

    User 2: Oh, that''s a good movie! I love the Lord of the Rings series.

    User 1: Me too! I''ve seen them all multiple times.

    User 2: Me too! I''m a big fan of fantasy movies.

    User 1: Me too! I think they''re so much fun.

    User 2: Yeah, they are.

    User 1: So, what are you doing next weekend?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That would be fun! We could go to the movies or something.

    User 1: That sounds good! We could see a movie that we both want to see.

    User 2: Okay, that sounds like a plan.'
