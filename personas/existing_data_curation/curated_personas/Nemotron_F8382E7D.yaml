  career_goals: Carrie aims to advance to a regional manager role overseeing multiple stores across Nevada, leveraging her track record of boosting sales and operational efficiency. She also aspires to
    launch her own boutique that showcases local artists and crafts, merging her passion for art with entrepreneurship. To support these ambitions, she plans to complete a bachelor’s degree in Business
    Administration and obtain a certification in retail merchandising. Long‑term, she envisions mentoring emerging leaders and serving on the board of the Lyon County Chamber of Commerce.
