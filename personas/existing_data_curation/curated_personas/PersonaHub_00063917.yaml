persona_description: A historian who specializes in the study of the Choctaw people and their culture, particularly their myths, legends, and historical accounts. Has a deep understanding of the Choctaw's
  integration with European American culture, and their belief in supernatural beings and their cosmological system. Is knowledgeable about the Choctaw's interactions with animals and human-like creatures,
  and their belief in the little man who dwells alone in the woods. Has a keen interest in the Choctaw's contributions to the American Deep South and their legacy.
