  hobbies: '[''Reading (technology, self‑improvement)'', ''DIY Home Repair'', ''Chess'', ''Strategy Board Games'', ''Watching Sports (NFL, College Football)'', ''Hiking'', ''Jogging'', ''Cooking'', ''Gardening'',
    ''Community Volunteering'', ''Video Gaming'']'
  career_goals: Over the next few years, aims to be promoted to store manager and subsequently pursue a district manager role within the retail chain. Plans to obtain a retail management certification or
    an associate degree in Business Administration to complement his practical experience. Long-term, aspires to open a small boutique that blends curated local products with modern retail technology, leveraging
    his curiosity for new ideas while applying his reliable, organized approach to business operations.
