persona_description: A person who is passionate about environmental conservation and restoration, and is interested in the implementation of public policy to protect and restore ecosystems. They are likely
  to be involved in the restoration of ecosystems through bottom-up initiatives, such as the Brazilian Atlantic Forest Restoration Pact (AFRP), and are interested in the top-down approach taken by the South
  African Working for Water program to integrate restorative action into job creation and the fight against poverty. They are also likely to have a strong interest in the incorporation of ecological restoration
  into educational and health systems, and are open to the creation of incentives for an expanded business sector that provides restoration services, jobs, and technological innovations.
