  career_goals: Robert aspires to turn his sociable strengths into a stable, people‑focused career. He aims to secure a role as a community outreach coordinator or event manager for a nonprofit or municipal
    agency in Trenton, where he can organize neighborhood programs, festivals, and youth activities. In the longer term, he dreams of opening a small café or co‑working space that doubles as a community
    hub, allowing him to blend his love of social interaction with entrepreneurship. He also plans to complete a bachelor’s degree in public administration to strengthen his qualifications and pursue professional
    certification in event management.
