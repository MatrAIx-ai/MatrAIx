  hobbies: '[''Gardening'', ''Cooking Puerto Rican dishes'', ''Hiking in local nature preserves'', ''DIY home improvement projects'', ''Model car restoration'', ''Reading mystery and non-fiction books'',
    ''Participating in a book club'', ''Volunteering to teach English conversation'', ''Salsa dancing'']'
  career_goals: Marisabel aims to leverage her technical expertise and on-the-road experience to move into a supervisory or managerial role within logistics or transportation. Over the next five years she
    plans to obtain a Certified Transportation Professional (CTP) credential and pursue additional training in fleet telematics, positioning herself for a logistics coordinator or fleet manager position
    at a regional distribution company. She also aspires to mentor new drivers, especially women and members of the Puerto Rican community, and eventually launch her own small, tech-enabled delivery service
    focused on serving local businesses in Orlando. Financially, she seeks a stable income that supports retirement savings while maintaining a work-life balance that allows time for her family and community
    activities.
