personas:
  professional: Marisabel Vazquez, a seasoned logistics professional and commercial driver, combines their STEM foundation, route‑optimization expertise, and bilingual persuasion to keep fleets running
    on schedule while meticulously documenting every detail, reflecting their organized and methodical nature.
  sports: Marisabel Vazquez fuels their fitness with early‑morning hikes at Wekiwa Springs, follows the Orlando Magic and Orlando City SC closely, and joins a local amateur walking club that meets each
    Saturday, balancing solitary trail time with community camaraderie.
  arts: Marisabel Vazquez indulges their creative side through salsa dancing to the rhythms of Marc Anthony and Celia Cruz, debates mystery novels by Agatha Christie in a book club, and unwinds by listening
    to classic rock staples like The Beatles.
  travel: Marisabel Vazquez prefers structured road trips that blend adventure and family time, having mapped out weekend getaways to the Florida Keys and a week‑long cultural immersion in Seville, Spain,
    while budgeting carefully to keep their retirement savings on track.
  culinary: Marisabel Vazquez, an enthusiastic home cook, masters island staples like mofongo, lechón, and arroz con gandules using fresh garden vegetables and plantain leaves, while sprinkling in their
    healthful twists such as quinoa salads, and enjoys the occasional weekend bake of flan with caramel.
  core: Marisabel Vazquez is a methodical, community‑minded logistics expert who balances precision in their career with a love for garden‑fresh meals, salsa rhythms, and weekend hikes, all while juggling
    the occasional indulgence in model‑car restoration.
background:
  cultural: Marisabel is a first-generation American of Puerto Rican descent. She grew up hearing stories of life on the island and celebrating cultural traditions such as the three-feriado celebrations,
    San Juan’s patron saint festival, and the vibrant music of bomba, plena, and salsa. Living in Orlando, she is part of a sizable Puerto Rican community that maintains strong ties to the island through
    family gatherings, culinary customs, and bilingual communication. Her heritage influences her values—emphasizing family, mutual respect, and community solidarity—and informs her approach to work, where
    she prioritizes cooperation and strives to create an inclusive atmosphere for colleagues and customers alike. She also integrates the island’s resilient spirit in the face of challenges, which fuels
    her determination and adaptability.
attributes:
  skills: '[''Commercial driving (CDL)'', ''Route optimization using GIS and telematics'', ''Vehicle maintenance and basic repairs'', ''Safety compliance (DOT regulations)'', ''Logistics planning and inventory
