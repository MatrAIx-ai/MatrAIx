persona_description: A wildlife ecologist and professor at the University of Florida, Katie Sieving, who studies the interactions between various species in their natural habitats, focusing on the red-cockaded
  woodpecker and its cavity system. She has published a study that found that rat snakes, once thought to be a threat to the birds, actually benefit the birds by eating cavity thieves such as red-bellied
  woodpeckers, allowing the red-cockaded woodpeckers to return to their nests and increase their numbers.
