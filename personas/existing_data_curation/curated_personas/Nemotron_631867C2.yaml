  career_goals: Although retired from formal employment, Lena aims to stay active and purposeful. Her primary ambition is to volunteer regularly at the local senior center and the town library, teaching
    cooking classes and sharing gardening tips with younger residents. She hopes to document her family’s heritage and recipes in a small memoir that can be passed down to grandchildren. Lena also aspires
    to mentor a small group of neighbors in budgeting and home‑maintenance skills, ensuring they have the practical support she values. Maintaining her independence and health through gentle daily routines
    remains a core personal goal.
