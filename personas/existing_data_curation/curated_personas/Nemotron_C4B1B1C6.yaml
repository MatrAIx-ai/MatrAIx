  career_goals: Isaac aims to advance to a senior supervisory role within the municipal parks department, eventually obtaining certifications in horticulture and sustainable landscaping. He also envisions
    launching his own community‑focused landscaping business that emphasizes native plant installations and green job training for local youths.
