persona_description: A Clemson Plant Pathologist who specializes in studying fungal diseases in stored carrots and has experience with managing and controlling white mold, a common disease affecting stored
  carrots. They have a deep understanding of the biology and ecology of white mold, including its development and spread, and have developed effective management strategies for controlling the disease.
  They are also aware of the challenges and limitations of conventional fungicides and are aware of the importance of using biofungicides like Contans to manage white mold.
