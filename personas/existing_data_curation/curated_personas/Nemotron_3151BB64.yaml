  hobbies: '[''Gardening'', ''Yoga'', ''Meditation'', ''Reading (Science Fiction & Popular Science)'', ''STEM Volunteering'', ''Hiking'', ''Live Music Attendance'']'
  career_goals: Renie aims to transition into a senior director role within the next five years, overseeing larger strategic initiatives that bridge technology and business growth. She is pursuing an MBA
    part‑time to complement her STEM background and deepen her financial acumen. Long‑term, she envisions leading digital transformation programs that foster inclusive, innovative cultures, and eventually
    mentoring emerging women leaders in tech. A personal ambition is to author thought‑leadership articles on sustainable engineering practices, reflecting her blend of curiosity and practicality.
