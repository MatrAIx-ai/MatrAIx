personas:
  professional: Renie Hullen is a seasoned engineering manager turned data‑driven project leader who excels at translating complex technical concepts into actionable plans, leveraging their methodical organization,
    curiosity, and collaborative kindness to steer cross‑functional teams toward timely, high‑quality deliverables.
  sports: Renie Hullen is an avid hiker who spends Saturday mornings on the Cedar Ridge Trail with the Dallas‑Fort Worth Hiking Society, catches Dallas Cowboys games on Sundays, and plays occasional friendly
    soccer with a co‑ed league at the local community center, treating fitness as a stress‑relief ritual rather than a competition.
  arts: Renie Hullen curates an eclectic artistic palate, devouring science‑fiction novels by Liu Cixin and Ann Leckie, soaking in live shows by Leon Bridges and local indie band The Midnight Rangers, and
    collecting vintage concert posters, all of which fuel their creative spark beyond the data dashboards.
  travel: Renie Hullen prefers meticulously planned escapes, savoring weekend drives through Texas Hill Country vineyards and dreaming of multi‑month treks across New Zealand’s South Island, while balancing
    travel ambitions with an MBA schedule that limits extended overseas stays.
  culinary: Renie Hullen enjoys a moderate‑level kitchen, frequently whipping up basil‑infused pesto, heirloom tomato bruschetta, and spicy cilantro salsa using herbs harvested from their backyard garden,
    while also treating themselves to occasional Texas‑style BBQ ribs on a weekend grill.
  core: Renie Hullen is a curiosity‑driven, methodically organized engineer‑turned‑leader who balances a love for data with a garden‑grown calm, a penchant for yoga‑mediated stress relief, and a quiet ambition
    to champion inclusive tech transformation.
background:
  cultural: Renie grew up in a middle‑class, predominantly white community in Dallas, Texas, where Southern hospitality and family gatherings were central to daily life. Her upbringing emphasized independence,
    a strong work ethic, and community involvement, reflected in her participation in church socials and neighborhood barbecues. While she identifies with mainstream American cultural norms, she also appreciates
    the regional Texan traditions of outdoor recreation, local cuisine, and a collaborative spirit that she brings into her professional environment.
attributes:
  skills: '[''Project Management'', ''Data Analysis'', ''Cross-functional Team Leadership'', ''Process Optimization'', ''Risk Assessment'', ''Strategic Planning'', ''Budget Management'', ''Technical Writing'',
