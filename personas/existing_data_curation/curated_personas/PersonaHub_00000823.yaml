persona_description: A member of the U.S. Army Corps of Engineers (CoE) who is responsible for overseeing the construction and operation of the Lower Snake River dams. The persona is involved in the assessment
  and mitigation of the impacts of these dams on fish and wildlife populations, and is responsible for designing and constructing fish hatcheries to compensate for the losses of salmon and steelhead adult
  returns. They work closely with federal agencies such as the U.S. Fish and Wildlife Service (FWS), National Marine Fisheries Service (NMFS), and state fisheries agencies, and are responsible for providing
  funding for fish production and health programs as well as an extensive monitoring and evaluation (M&E) program. The persona is also involved in the development of the Lower Snake River Compensation Plan
  (LSRCP) and the authorized Lower Snake River Compensation Plan (LSRCP), which are part of the Water Resources Development Act of 1976 (90 Stat. 2917).
