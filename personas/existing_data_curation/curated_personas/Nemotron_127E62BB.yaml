  hobbies: '["Reading Mexican and world literature", "Watercolor painting", "Cooking traditional Mexican dishes", "Gardening (herbs, succulents, native plants)", "Walking in local nature trails", "Genealogy
    research", "Playing acoustic guitar"]'
  career_goals: Although retired, Nelson aims to publish a memoir that weaves his family's migration story with reflections on Mexican cultural identity. He plans to curate a community exhibition of Mexican
    folk art in a San Antonio cultural center, providing a quiet space for intergenerational dialogue. Nelson also aspires to mentor youth interested in cultural heritage projects, offering workshops on
    genealogy and archival techniques. To keep his skills current, he intends to master advanced digital preservation software, ensuring his family’s photographs and documents are safely archived for future
    generations. Finally, he hopes to establish a modest scholarship fund for local high‑school students pursuing studies in the arts or humanities.
