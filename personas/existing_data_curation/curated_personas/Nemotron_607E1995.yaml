personas:
  professional: William Stinson is a budding robotics enthusiast who channels their love for LEGO building and basic programming into leading his school's robotics club projects, balancing a practical,
    hands‑on approach with a relaxed attitude toward deadlines.
  sports: William Stinson plays forward for the Eastside Eagles youth soccer team and point guard for the Riverside Rookies basketball league, joins pick‑up games after school, and they cheer for the Los
    Angeles Lakers and Manchester United while also hiking local trails with their family for cross‑training.
  arts: 'William Stinson immerses themselves in rock music, blasting Foo Fighters, Red Hot Chili Peppers and Muse while they design intricate Minecraft worlds and assemble detailed LEGO creations, and they
    regularly watch superhero films like Spider‑Man: Into the Spider‑Verse for creative inspiration.'
  travel: William Stinson has camped in Yosemite National Park, visited Disney World in Florida, and taken a road trip to the Grand Canyon, and they dream of traveling to Japan to explore Akihabara's gaming
    culture and indulge in anime conventions.
  culinary: William Stinson favors pepperoni pizza, chicken nuggets, and mac & cheese, enjoys making PB&J sandwiches for school lunches, helps their mom grill burgers for family hikes, and they occasionally
    experiment with sushi rolls after watching online tutorials.
  core: William Stinson is a tech‑savvy, sports‑loving teen who blends structured tinkering with a carefree streak, spending their allowance on video‑game skins while juggling pick‑up games, LEGO builds,
    and an ever‑growing wishlist of gadgets.
background:
  cultural: William grew up in Cranberry Township, a middle‑class suburban community in Butler County, western Pennsylvania. His family is white American with roots in the broader Appalachian and Rust Belt
    region, reflecting a mix of European ancestry common to the area. The local culture emphasizes education, community sports, and seasonal events such as county fairs and holiday celebrations. He shares
    typical American customs—celebrating Thanksgiving, Christmas, and the Fourth of July—while also being a fan of regional teams like the Pittsburgh Steelers. This background gives him a stable, community‑oriented
    outlook and an appreciation for both structured traditions and casual, outdoor activities.
