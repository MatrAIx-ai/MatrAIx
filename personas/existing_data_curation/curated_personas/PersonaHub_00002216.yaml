persona_description: A researcher and inventor who is passionate about developing new technologies for monitoring and measuring breathing in children. Dr Lyndon Smith is the principal investigator of a
  multidisciplinary research project that aims to revolutionize how breathing is monitored by developing a system that can record similar measurements without the need for attaching various instruments
  to the child. The system will use a method called dynamic photometric stereo to create structured illumination of the body surface and recover the 3D shape of the human torso. The co-investigator, Professor
  Melvyn Smith, commented on the system's advantages, including its eye-safe design and higher resolution measurements needed to model the respiration process.
