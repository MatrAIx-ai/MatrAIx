persona_description: A fiber optic tester who is interested in the certification and maintenance of fiber infrastructure performance. This persona is likely to be involved in network administration, troubleshooting,
  and quality assurance for fiber optic networks. They are familiar with the use of optical time domain reflectometers (OTDR) for fiber optic cable testing and troubleshooting, and are looking for tools
  and solutions that can help them maintain the performance of their fiber infrastructure. This persona may also have experience in repairing problems in fiber plant and is interested in using OTDR to detect
  any details on the cabling installation, termination quality, and offer advanced diagnostics to isolate a point of failure that may hinder network performance.
