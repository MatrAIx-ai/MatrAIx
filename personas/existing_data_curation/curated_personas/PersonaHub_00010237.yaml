persona_description: Edison Esadore Mouton was a pilot and aviation enthusiast who completed the first transcontinental air mail flight by the U.S. Postal Service in 1920. He served in the U.S. Army during
  World War I and later became a supervising inspector for the Department of Commerce. Mouton was married to Claire Yerington and had two children before his apparent suicide at San Francisco Airport in
  1940. He is buried at the San Francisco National Cemetery.
