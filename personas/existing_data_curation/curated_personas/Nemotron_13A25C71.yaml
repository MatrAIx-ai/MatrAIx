  hobbies: '[''Painting'', ''Quilting'', ''Museum Visits'', ''Jazz Concerts'', ''Creative Cooking'', ''Gardening'', ''Reading African American Literature'', ''Genealogy Research'', ''Bridge'', ''Volunteer
    Work'', ''Travel to Historical Sites'', ''Book Club'']'
  career_goals: Although retired, Patricia aims to become a recognized community arts facilitator in Rockdale County, establishing an intergenerational workshop series that merges visual arts, music, and
    storytelling. She plans to compile a memoir and a digital archive of local Black history, collaborating with the county library and the church. Patricia also hopes to complete a series of adult‑education
    courses in art history and digital photography, and to mentor emerging artists from the neighborhood, securing a legacy as a cultural steward.
