data:
  user 1 personas: 'I have found the cure for the common cold.

    I am plotting on taking over the world.

    I love to sing in the shower.

    My brother and i have bright red hair.

    My nickname is bubblegum.'
  user 2 personas: 'My uncle use to work on fish boats in florida.

    I have never been to the west coast of the united states.

    I was once on the local news , and not for anything illegal.

    My father use to drive a taxi cab in the 1970s.

    I have been to canada two times my entire life.'
  Best Generated Conversation: 'User 1: I''m bubblegum. It''s great to meet you!

    User 2: Hi bubblegum! It''s nice to meet you too.

    User 1: So, what do you like to do for fun?

    User 2: I love to go fishing, and I''ve been to Canada twice.

    User 1: Oh, that''s cool! I''ve never been to Canada before.

    User 2: You should definitely go! It''s beautiful.

    User 1: I will one day!

    User 2: My dad used to drive a taxi cab in the 70''s, and my uncle used to work on fish boats in Florida.

    User 1: That''s so cool! I love hearing about people''s family history.

    User 2: Me too! It''s interesting to learn about where you came from.

    User 1: I agree! So, what else do you like to do for fun?

    User 2: I love to go to the beach, and I''ve been on the local news once.

    User 1: Oh, really? What for?

    User 2: I was interviewed about my business.

    User 1: Oh, that''s cool! What kind of business do you have?

    User 2: I own a small coffee shop.

    User 1: Oh, that''s awesome! I love coffee!

    User 2: Me too! I''m glad you''re a fan.

    User 1: I am! I love trying new coffees.

    User 2: Me too! I love trying new coffee beans from all over the world.

    User 1: That''s so cool! I''ve never been a coffee bean connoisseur, but I''m learning!

    User 2: You''re on your way'
