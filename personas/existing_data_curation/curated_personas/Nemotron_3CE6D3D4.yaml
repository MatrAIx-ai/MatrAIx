personas:
  professional: Anselmo Uz designs scalable, secure cloud solutions for regional businesses, leads cross‑functional Agile teams with a collaborative, personable touch, mentors junior engineers, and is preparing
    for a CISSP certification as he moves toward a senior advisory role.
  sports: Anselmo Uz hits the trails of the Franklin Mountains most weekends, maintains a regular routine at the local climbing gym, follows El Paso Locomotive FC during the soccer season, roots for the
    El Paso Chihuahuas during summer baseball, and fits in a weekly pickup basketball game to keep his heart health in check.
  arts: Anselmo Uz strums classical guitar in a neighborhood mariachi ensemble, drawing inspiration from Carlos Santana and classical composer Joaquín Rodrigo, while evenings often find him immersed in
    biographies of figures like Frida Kahlo and attending the regional performing arts center for modern dance showcases.
  travel: Anselmo Uz prefers meticulously planned road trips that blend cultural immersion with family reunions, having recently explored the historic streets of Santa Fe, ventured to Oaxaca for its mole
    and mezcal, earmarked a future visit to Banff’s turquoise lakes, and schedules yearly trips to Provence in France for its lavender fields.
  culinary: Anselmo Uz enjoys cooking at an intermediate‑to‑advanced level, mastering dishes such as mole poblano with ancho chilies, slow‑braised carnitas seasoned with dried oregano, and chiles en nogada
    featuring fresh poblano peppers, all assembled from seasonal heirloom vegetables and locally sourced corn from the farmer’s market.
  core: Anselmo Uz balances a disciplined, community‑oriented professional life with a nightly habit of tweaking smart‑home scripts, a relentless curiosity for new tech, and an occasional overindulgence
    in artisanal cheese and strong espresso.
background:
  cultural: Anselmo was raised in a Mexican‑American household that celebrated both Mexican traditions and the multicultural life of the U.S. Southwest. He is fluent in Spanish and English, maintains strong
    ties with extended family on both sides of the border, and actively participates in cultural events such as Día de los Muertos and Cinco de Mayo festivals in El Paso. These cultural roots inform his
    work ethic, emphasizing perseverance, collaboration, and a warm, personable approach to client relationships. His bicultural perspective also drives his commitment to fostering inclusive tech education
    for Hispanic youth in the community.
attributes:
  skills: '[''Python'', ''Java'', ''SQL'', ''Cloud Architecture (AWS, Azure)'', ''Network Security'', ''Penetration Testing'', ''Agile Project Management'', ''Data Analysis with R'', ''System Integration'',
    ''Technical Troubleshooting'', ''Mentoring and Team Leadership'']'
  hobbies: '[''Hiking in the Franklin Mountains'', ''Home automation tinkering'', ''Playing classical guitar in a mariachi ensemble'', ''Cooking traditional Mexican cuisine'', ''Reading historical biographies'',
    ''Volunteering at community coding workshops'']'
  career_goals: Anselmo aims to transition from day‑to‑day hands‑on development to a senior advisory role, helping small and medium‑sized businesses in the El Paso region adopt secure, cloud‑based digital
    transformation strategies. He plans to earn a CISSP certification within the next year to deepen his cybersecurity credentials and to spearhead a community mentorship program that bridges the digital
    divide for underserved students. Ultimately, he hopes to establish a boutique consultancy that blends cutting‑edge technology with the practical needs of local enterprises, while also mentoring the
    next generation of Mexican‑American IT leaders.
