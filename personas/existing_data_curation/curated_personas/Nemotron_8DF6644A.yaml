  career_goals: Mark dreams of becoming a wildlife veterinarian or an aerospace engineer—something that lets him explore animals and space while solving real problems. He also imagines helping his community
    as a firefighter one day. He frequently says he wants to fix things and help animals stay healthy, showing his blend of curiosity and practicality.
