  hobbies: '[''bullet journaling'', ''strategy board games (Settlers of Catan)'', ''competitive online gaming'', ''cross-country running'', ''woodworking projects'', ''volunteering at animal shelter'',
    ''reading mystery novels'', ''introductory coding projects'']'
  career_goals: Looking ahead, Heather aims to finish high school with a strong focus on math, science, and engineering coursework. She plans to enroll in a technical college where she can study mechanical
    or civil engineering, eventually earning a bachelor's degree. Her long‑term ambition is to become a project manager for a manufacturing or infrastructure firm in Ohio, where she can apply her love for
    structured processes, competitive problem‑solving, and leadership. In the short term, she hopes to lead her robotics team to a regional competition win and to obtain a Six Sigma Yellow Belt certification
    to bolster her credentials.
