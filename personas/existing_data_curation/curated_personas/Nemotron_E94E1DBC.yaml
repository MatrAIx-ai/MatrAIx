personas:
  professional: Heather Tublitz is a high‑school junior who has turned their love of strategy into a budding role as the cross‑country team’s logistics coordinator and the animal shelter’s volunteer intake
    manager; their meticulous bullet‑journal habit translates into flawless event planning, while their competitive edge shines when organizing school board‑game tournaments, earning them a reputation as
    a reliable, detail‑oriented leader who balances strict schedules with occasional flexible improvisation.
  sports: Heather Tublitz runs with the varsity cross‑country team at Hillcrest High School in the Midwest, training five days a week on the town’s looping trail system, and they are an avid fan of the
    Chicago Bears (NFL) and the Chicago Cubs (MLB), cheering loudly at weekend games while using tactics learned from board games to pace themselves during races.
  arts: Heather Tublitz finds artistic inspiration in the moody narratives of Gillian Flynn, the suspenseful scores of Hans Zimmer, and the strategic commentary of The Dice Tower podcast; they often sketch
    scenes from mystery novels in the margins of their journal, binge‑watch true‑crime series starring Kate Beckinsale, and collect limited‑edition prints of Shepard Fairey, which they display above their
    woodworking bench.
  travel: Heather Tublitz dreams of weekend hikes in Rocky Mountain National Park and a summer road trip along the Pacific Coast Highway, while also yearning to explore the historic streets of Edinburgh
    during the annual Fringe Festival; they meticulously plan itineraries in their bullet journal, balancing school obligations with a modest travel fund, yet sometimes postpone trips due to upcoming competition
    seasons.
  culinary: Heather Tublitz favors high‑protein meals that fuel long runs, such as grilled chicken quinoa bowls with roasted sweet potatoes and avocado, and they love crafting homemade granola bars with
    almonds, honey, and dried cranberries for post‑run snacks; their cooking skill is intermediate—they can confidently assemble a sushi roll but still struggle with perfectly timing a soufflé, and they
    occasionally indulge in a recreational pizza topped with extra cheese after a tough board‑game night.
  core: Heather Tublitz is a detail‑driven teen strategist who blends competitive board‑game tactics with disciplined cross‑country training, channels an unwavering practical streak into meticulous budgeting,
    and quietly battles seasonal allergies while occasionally succumbing to impulse game purchases.
background:
  cultural: Heather was raised in Belpre, a small river town in Washington County, Ohio, within a predominantly White, Midwestern community. The local culture blends a legacy of river‑based trade, manufacturing,
    and agriculture with strong values of self‑reliance, practicality, and community involvement. Her family participates in church gatherings and town events such as the annual Riverfest, fostering a sense
    of collective responsibility. The regional emphasis on teamwork, competition, and structured achievement—seen in school sports, robotics, and community service—has shaped Heather's outlook, reinforcing
    her practical mindset and competitive drive.
attributes:
  skills: '[''time management'', ''digital organization (Google Calendar, Trello)'', ''basic computer troubleshooting'', ''introductory coding (Scratch, Python)'', ''mechanical assembly (robotics club)'',
