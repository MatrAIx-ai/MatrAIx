  hobbies: '["Salsa dancing (community groups)", "Intramural basketball", "Fishing in Tampa Bay", "Volunteer safety workshops at community centers", "DIY home improvement projects", "Attending local cultural
    festivals", "Reading about emerging industrial technologies", "Spontaneous road trips with family", "Cooking traditional Puerto Rican dishes", "Gardening"]'
  career_goals: Rafael aims to transition into a senior leadership role—such as Director of Operations or Safety Manager—where he can integrate advanced safety technologies and sustainability initiatives
    across multiple facilities. He is working toward earning the Certified Safety Professional (CSP) credential and plans to enroll in a part‑time master's program in Safety Management to deepen his expertise.
    Driven by his competitive nature, he seeks recognition as a benchmark safety engineer in the Gulf Coast region, hoping to win industry awards and influence state‑level safety standards. Additionally,
    Rafael wants to build a consultancy that helps small manufacturers improve safety and efficiency while creating a more balanced work schedule for himself to better manage stress and negative emotions.
