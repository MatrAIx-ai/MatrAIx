personas:
  professional: Rafael Dardon, a 52‑year‑old industrial engineer specializing in health and safety, leverages Six Sigma, lean manufacturing, and IoT‑based monitoring to streamline plant operations, while
    his competitive streak drives him to benchmark against industry leaders and his relaxed attitude means he often improvises solutions on the fly, thriving as a charismatic trainer and team leader.
  sports: Rafael Dardon, an avid intramural basketball player and weekend fisherman on Tampa Bay, follows the Tampa Bay Buccaneers and Lightning, joins a local community basketball league and a recreational
    fishing club, and incorporates nightly stretching routines to offset the strain of his active lifestyle.
  arts: Rafael Dardon enjoys the rhythms of salsa dancing at community nights, frequently listens to Carlos Vives and Celia Cruz for inspiration, attends local theater productions featuring works by August
    Wilson, and collects vintage vinyl records of Latin jazz, which he spins while cooking for family gatherings.
  travel: Rafael Dardon prefers spontaneous road trips along Florida’s Gulf Coast, often detouring to the historic streets of St. Augustine and the Everglades for wildlife spotting, while he dreams of a
    cultural pilgrimage to Cartagena, Colombia, budgeting carefully to fit travel into his busy schedule.
  culinary: Rafael Dardon, a confident home cook, masters traditional island dishes like arroz con gandules, lechón, and mofongo, seasoning them with sofrito, adobo, and plantain leaves, and he enjoys hosting
    weekend feasts where he experiments with a blend of smoky grill techniques and modern sous‑vide methods.
  core: Rafael Dardon, a 52‑year‑old safety‑focused engineer with a competitive edge, balances curiosity‑driven tech adoption and laid‑back improvisation, often over‑caffeinating to meet deadlines while
    worrying about stress, and finds solace in salsa, basketball, and hearty island cooking.
background:
  cultural: Rafael was born to Puerto Rican parents and grew up bilingual, speaking both Spanish and English fluently. His family maintains strong ties to the island, celebrating traditions such as San
    Juan festivals, Navidad, and parrandas. Living in Saint Petersburg, FL, he blends Caribbean cultural values—family cohesion, hospitality, and a love for music and dance—with the practical, results‑oriented
    mindset of his engineering education. This dual cultural perspective informs his collaborative yet competitive work style, his appreciation for communal activities, and his commitment to giving back
    to the local Hispanic community through mentorship and safety outreach.
attributes:
