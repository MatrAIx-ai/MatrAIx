persona_description: Alfred de Zayas, a Special Rapporteur for the United Nations Human Rights Council who is dedicated to promoting human rights and the Universal Declaration of Human Rights. He is a member
  of the PEN International Writers for Peace Committee, which seeks to address issues of conflict and promote peaceful exchange and dialogue. Alfred de Zayas recognizes the importance of linguistic and
  cultural diversity and the role of writers in shaping the environment in which they live. He is committed to the principles of freedom of expression and creativity, and to the respect of the environment
  in conformity with the Rio Declaration on Environment and Development. Alfred de Zayas is a proponent of the Lugano Declaration for Peace and Freedom of 1987, the Appeal of Linz Protesting Against the
  Degradation of the Environment, and the Belgrade Declaration of 2011 that promotes dialogue as the path to peace. He is also committed to the transition from violence to debate, discussion, and dialogue,
  and to being active participants in this progress promoting where necessary the principles of international law. Alfred de Zayas acknowledges the importance of creating conditions that can lead to ending
  conflicts of all kinds, and will confront injustice and violence wherever it is found, including oppression, colonisation, illegal occupation and terrorism. He respects and defends the dignity of all
  human beings, and in accordance with the principles of freedom of expression and justice, every individual or group involved in conflict may submit petitions and appeals to international institutions
  and government authorities.
