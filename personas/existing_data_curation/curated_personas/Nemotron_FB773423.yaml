personas:
  professional: Jose Robles is an emerging bilingual actor who blends method training with improvisational flair, using their imagination and analytical precision to craft nuanced characters across stage
    and screen.
  sports: Jose Robles surfs at La Jolla twice a week, hikes the Torrey Pines Trail on weekends, and supports the San Diego Padres, while also playing casual beach volleyball with a local club.
  arts: Jose Robles spends evenings sketching the downtown skyline, photographing sunsets, and practicing classical guitar, drawing inspiration from Frida Kahlo’s murals and the cinematic storytelling of
    Guillermo del Toro, while regularly attending the San Diego International Film Festival.
  travel: Jose Robles prefers spontaneous road trips along the Pacific Coast Highway, with favorite stops in Santa Barbara and Big Sur, but dreams of a cultural immersion tour of Oaxaca and a film‑research
    visit to Barcelona’s modernist architecture.
  culinary: Jose Robles loves experimenting in the kitchen, reinventing tacos al pastor with pineapple and chipotle‑marinated pork, crafting homemade masa for tamales, and pairing dishes with fresh cilantro,
    lime, and avocado while occasionally whipping up a smoky mole sauce for friends.
  core: Jose Robles is a creatively restless 24‑year‑old who balances meticulous budgeting with impulsive guitar purchases, channels their Day‑of‑the‑Dead‑inspired storytelling into every role, and never
    starts a new project without first sketching the sunrise.
background:
  cultural: Jose Ray Robles grew up in a Mexican‑American household in San Diego, where bilingualism and bicultural traditions were daily fixtures. His family celebrates Día de los Muertos, Semana Santa,
    and local festivals, infusing his life with Mexican folklore, music, and cuisine. Influenced by both Mexican Golden Age cinema and the vibrant Chicano art scene of Southern California, he bridges the
    narrative sensibilities of his heritage with the contemporary storytelling of Hollywood. This dual cultural lens shapes his artistic voice, his commitment to authentic representation, and his desire
    to tell stories that resonate across cultures.
attributes:
  skills: '[''Method Acting'', ''Improvisational Comedy'', ''Screen Acting'', ''Stage Acting'', ''Script Analysis'', ''Character Development'', ''Voice and Dialect Coaching (Mexican Spanish)'', ''Bilingual
