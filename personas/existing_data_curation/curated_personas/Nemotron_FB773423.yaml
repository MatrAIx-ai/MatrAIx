  hobbies: '[''Sketching'', ''Photography'', ''Reading magical realism and philosophy'', ''Classical guitar'', ''Cooking Mexican cuisine'', ''Surfing'', ''Hiking'', ''Attending indie film festivals'', ''Teaching
    drama workshops'']'
  career_goals: Jose aims to secure leading roles in mainstream film and high‑profile television series while championing nuanced Latinx characters. He aspires to join the Screen Actors Guild, work with
    acclaimed directors, and eventually launch his own production company that creates bilingual, socially conscious narratives. In the next five years, he plans to take advanced workshops in directing
    and screenwriting, expand his network within Hollywood and the Chicano film community, and use his platform to mentor emerging Mexican‑American actors.
