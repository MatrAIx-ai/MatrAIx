personas:
  professional: Fernando Felicianogarcia, a diligent mechanical engineering student at the University of Texas Rio Grande Valley, channels their love of precise problem‑solving and hands‑on tinkering with
    drones, CAD design, and Python automation into campus projects that aim to create sustainable water‑management solutions while simultaneously laying the groundwork for a bilingual tech‑repair side business.
  sports: Fernando Felicianogarcia jogs three times a week through Edinburg’s Riverside Park, follows the Houston Astros and Texas Rangers on TV, plays casual pickup soccer with the UTRGV Cross Country
    Club during spring, and keeps a running log to improve endurance while they occasionally forget to stretch, leading to occasional shin splints.
  arts: Fernando Felicianogarcia immerses themselves in science‑fiction worlds by rereading Isaac Asimov and Andy Weir, curates custom photo edits of drone flights inspired by the cinematic scores of Hans
    Zimmer, and spends weekend evenings debating strategy with friends over Settlers of Catan and Azul, all while they keep a well‑worn copy of a Banksy monograph on their nightstand for occasional artistic
    inspiration.
  travel: Fernando Felicianogarcia prefers meticulously planned road trips that blend nature and culture, having already driven to Austin for a music festival, explored the historic streets of San Antonio,
    and dreamed of backpacking through Kyoto's bamboo forests and Patagonia's glaciers, always booking budget accommodations through spreadsheet‑styled itineraries while saving travel funds in a dedicated
    piggy‑bank account, and they constantly compare flight costs to stay within a modest travel budget.
  culinary: Fernando Felicianogarcia enjoys cooking family‑recipe tamales and enchiladas using masa harina, dried chiles, and fresh cilantro, hones their seasoning skills by experimenting with smoky chipotle
    and tangy tomatillo sauces, and they occasionally burn the edges of the corn husks when multitasking between drone testing and late‑night study sessions.
  core: Fernando Felicianogarcia is a detail‑obsessed, solo‑driven tinkerer who balances relentless planning with a secret love for late‑night strategic video games, and they often sacrifice sleep for the
    perfect drone flight or a well‑balanced budget spreadsheet.
background:
  cultural: Fernando is a second‑generation Mexican‑American raised in McAllen, Texas, a vibrant border community. He grew up in a bilingual household where Spanish and English were spoken interchangeably,
    giving him deep ties to both cultures. Family traditions such as Día de los Muertos, Las Posadas, and weekly gatherings centered around Mexican cuisine have shaped his identity. He regularly attends
    local festivals that celebrate the heritage of the Rio Grande Valley and participates in community service events organized by the local parish. This bicultural upbringing instills in him a strong sense
    of family responsibility, respect for community, and an appreciation for the blend of Mexican customs and American life that characterizes daily life in the border region.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Basic Python programming'', ''Automotive maintenance (oil changes, brake servicing, basic diagnostics)'', ''3D
    printing and CAD design (Tinkercad)'', ''Digital photo editing (Adobe Photoshop)'', ''Organizational and time‑management skills'', ''Mathematics tutoring'', ''Event coordination for small community
    groups'']'
  hobbies: '[''Tinkering with electronics and drones'', ''Building model kits (RC cars, scale airplanes)'', ''Playing strategy video games (Civilization VI, turn‑based tactics)'', ''Reading science‑fiction
    and popular‑science books'', ''Jogging and park exercise'', ''Cooking traditional Mexican dishes (tamales, enchiladas)'', ''Board‑game nights with close friends'', ''Volunteering as a math mentor at
    the local library'']'
  career_goals: Fernando aims to earn a bachelor’s degree in mechanical engineering at the University of Texas Rio Grande Valley, focusing on sustainable water and flood‑control infrastructure for the Rio Grande
    Valley. He plans to secure internships with local engineering firms to gain real‑world experience, and ultimately obtain his Professional Engineer (PE) license. His long‑term ambition is to become a
    project manager leading community‑focused engineering projects that improve water management and resilience to flooding. In parallel, he hopes to launch a small, affordable technology‑repair business
    that leverages his hands‑on skills and bilingual ability to serve both English‑ and Spanish‑speaking customers. Throughout his career path, he is committed to maintaining a disciplined routine that
    supports his mental‑health goals and to mentoring younger students from his community.
