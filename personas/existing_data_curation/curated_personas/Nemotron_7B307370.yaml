personas:
  professional: Jewel Gerrity is a seasoned management analyst who leverages Lean Six Sigma Green Belt expertise and fluency in Excel, SQL, Python, Power BI, and Tableau to translate municipal data into
    actionable policy recommendations, and they guide cross‑functional teams through Agile and Waterfall projects with a collaborative, consensus‑building style.
  sports: Jewel Gerrity is an avid hiker of the Sierra foothills, a regular rider with the American River Cyclists club, and a dedicated fan of the Sacramento Kings NBA team and the Sacramento River Cats
    minor‑league baseball club, and they blend weekend trail runs with seasonal strength‑training sessions at a community gym.
  arts: Jewel Gerrity enjoys listening to the folk harmonies of Fleet Foxes, attending live performances at the B Street Theatre, immersing in Malcolm Gladwell’s non‑fiction narratives, and following the
    visual storytelling of documentary filmmaker Ken Burns, and they let these artistic threads inspire their experimental cooking on weekends.
  travel: Jewel Gerrity prefers purpose‑driven weekend road trips to Napa Valley wine country and annual hiking excursions in the Canadian Rockies, they plan each itinerary with spreadsheets to align with
    limited vacation days, and they dream of an eco‑tour across New Zealand’s South Island to explore sustainable agriculture practices.
  culinary: Jewel Gerrity delights in farm‑to‑table cooking, expertly preparing roasted beet and goat cheese salads with heirloom tomatoes, kale, and citrus vinaigrette, while experimenting with quinoa,
    rosemary, and seasonal herbs, and they often forget to preheat the oven and over‑salt dishes when multitasking.
  core: Jewel Gerrity couples analytical precision with a farmer’s curiosity, and they endlessly track spreadsheets while occasionally forgetting to water the community garden during rainy weeks.
background:
  cultural: Jewel grew up in a middle‑class white family in Northern California, with roots that trace back to the Midwest. Her upbringing emphasized self‑reliance, practical work ethic, and community participation—values
    reinforced by the agricultural landscape surrounding Sacramento. Family traditions include celebrating mainstream American holidays and participating in local festivals that blend the region’s farm‑to‑table
    culture with civic pride. While she identifies with mainstream American cultural norms, she also exhibits an openness to new ideas, reflecting the progressive, innovative spirit of the Bay Area corridor.
    This blend of traditional stability and curiosity informs both her professional approach and personal life.
attributes:
  skills: '[''Data analysis (Excel, SQL, basic Python)'', ''Process improvement (Lean Six Sigma Green Belt)'', ''Project management (Agile, Waterfall)'', ''Stakeholder communication'', ''Report writing
