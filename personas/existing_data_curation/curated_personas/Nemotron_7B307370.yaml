  hobbies: '[''Hiking in the Sierra foothills'', ''Cycling along the American River Trail'', ''Community gardening'', ''Cooking with seasonal ingredients'', ''Reading non‑fiction (psychology, business)'',
    ''Yoga and mindfulness meditation'', ''Listening to technology and innovation podcasts'', ''Volunteering at the local food bank'']'
  career_goals: Jewel aims to advance from her current analyst role to a senior strategic position—such as senior management consultant or director of analytics—where she can shape data‑driven policy at
    a regional or state level. To support this trajectory, she plans to complete a bachelor's degree in Business Administration (or Public Administration) part‑time, earn PMP and Certified Management Analyst
    credentials, and lead larger cross‑functional initiatives that improve public services and community sustainability. She also hopes to mentor junior analysts, champion inclusive decision‑making processes,
    and maintain a work‑life balance that allows continued community involvement.
