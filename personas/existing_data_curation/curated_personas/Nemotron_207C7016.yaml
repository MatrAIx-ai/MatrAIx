personas:
  professional: Amanda Lesage is a budding young strategist who channels her love of mystery novels and chess into solving complex puzzles at school, demonstrating meticulous planning, logical reasoning,
    and a quiet confidence that balances assertiveness with cooperation.
  sports: Amanda Lesage plays on the local youth soccer team, the River Rangers, participates in the junior gymnastics club called Hawthorne Hoops Jr., and spends weekends hiking with her friends to the
    foothills, where she captures nature photos, embodying a steady, disciplined approach to fitness.
  arts: Amanda Lesage is an avid piano student who practices pieces by Mozart, Yiruma, and Ludovico Einaudi, delights in the illustrated adventures of the Nancy Drew series, and draws inspiration from the
    paintings of Monet and the films of Studio Ghibli, especially Spirited Away.
  travel: Amanda Lesage prefers low-key, family-oriented trips; she has explored the nearby state park's trails, dreams of visiting the Grand Canyon's rim, and hopes to one day wander the lavender fields
    of Provence, always planning itineraries in her notebook before departure.
  culinary: Amanda Lesage enjoys baking classic chocolate chip cookies, experimenting with decorative icing swirls, and often adds a pinch of sea salt or crushed pretzels; she also loves assembling simple
    veggie wraps with hummus, avocado, and cherry tomatoes for after-school snacks.
  core: Amanda Lesage blends meticulous organization with a love for quiet puzzles, balancing structured routines and spontaneous creativity while navigating the world with a shy yet determined spirit.
background:
  cultural: Amanda comes from a white, mid‑western American family living in Farmington, Utah. Her upbringing reflects the region’s emphasis on community involvement, outdoor activities, and family‑centered
    values. She participates in local community events, such as school fairs and neighborhood clean‑up days, and attends a local place of worship where she learns about service and responsibility. The cultural
    environment encourages respect for nature, a strong work ethic, and collaborative teamwork, all of which shape her interests and goals.
