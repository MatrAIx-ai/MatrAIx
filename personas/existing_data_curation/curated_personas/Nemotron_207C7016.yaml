  career_goals: Amanda aspires to work with animals and plans to become a veterinarian, drawn by her love for her family dog and the care she provides at the local animal shelter. She also dreams of one
    day teaching elementary school students, hoping to share her organizational skills and love of learning in a structured classroom environment. Her long‑term ambition is to combine both interests by
    developing educational programs about animal care for kids.
