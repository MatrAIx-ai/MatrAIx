personas:
  professional: Wayne Vallelungo is an aspiring junior robotics engineer who combines a love for hands‑on LEGO building with a practical curiosity in Minecraft’s redstone circuits, regularly leading the
    school’s robotics club projects while balancing a meticulous approach to building functional prototypes with the flexibility to improvise when experiments go awry.
  sports: Wayne Vallelungo is a spirited member of the Eau Claire Youth Soccer Club, often cheering for the Milwaukee Bucks and the Wisconsin Badgers while also participating in weekend snowshoeing outings
    and family fishing trips on Lake Wissota, balancing competitive play with a love for outdoor recreation.
  arts: Wayne Vallelungo immerses themselves in comic books, especially titles like Spider‑Man and Adventure Time, devours adventure novels such as the Percy Jackson series, and often creates Minecraft
    skins inspired by their favorite artists, drawing creative inspiration from both digital and printed storytelling.
  travel: Wayne Vallelungo enjoys family road trips to the Apostle Islands National Lakeshore and occasional camping adventures in the Chequamegon‑Nicolet forest, while dreaming of a future visit to Disney
    World and a backpacking trek through the Rocky Mountains, preferring a mix of well‑planned itineraries with spontaneous detours.
  culinary: Wayne Vallelungo’s culinary tastes feature a fondness for cheese curds, fish tacos after lake outings, and homemade grilled cheese sandwiches, and while their cooking skills are limited to assembling
    simple snacks, they love experimenting with themed LEGO‑shaped cookie cutters and occasionally attempting a beginner’s pancake recipe.
  core: Wayne Vallelungo is an energetic, curiosity‑driven 11‑year‑old who balances meticulous LEGO and robotics projects with occasional worry‑driven splurges, all while navigating mild asthma, a love
    for soccer, and a passion for comics and outdoor adventures.
background:
  cultural: Wayne was raised in a middle‑class white family in Eau Claire, Wisconsin, where Midwestern values of community, modesty, and appreciation for the outdoors are prominent. His family has deep
    ties to the region, with German and Irish ancestry reflected in family traditions such as attending the Eau Claire County Fair, enjoying local foods like cheese curds, and participating in seasonal
    activities like fishing, snowshoeing, and camping. He attends a local Lutheran church, which emphasizes service and stewardship, further shaping his cooperative yet assertive personality.
attributes:
