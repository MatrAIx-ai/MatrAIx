  hobbies: '[''Soccer'', ''Hiking and nature walks'', ''LEGO building'', ''Minecraft'', ''Robotics club'', ''Science experiments'', ''Reading adventure novels and comics'', ''Community volunteer events'',
    ''Fishing in local lakes'', ''Creative writing (journal)'']'
  career_goals: Wayne dreams of turning his love for nature and technology into a future career as an environmental scientist or park ranger, focusing on protecting Wisconsin's lakes and forests. He also
    imagines becoming a software developer who designs tools for conservation work. He aims to attend a science‑focused high school, pursue a degree in environmental engineering, and eventually lead community
    projects that combine his technical skills with his desire to help the local ecosystem.
