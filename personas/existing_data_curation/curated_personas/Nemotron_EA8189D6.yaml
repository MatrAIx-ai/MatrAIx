  hobbies: '[''basketball'', ''softball league'', ''hiking'', ''fishing'', ''camping'', ''woodworking'', ''home improvement projects'', ''video gaming'', ''movie watching'', ''live music concerts'', ''community
    fairs'']'
  career_goals: Joshua aims to move from a front‑line material mover to a supervisory position within the next three to five years. He plans to obtain a Certified Forklift Operator credential and complete
    an associate’s degree in Supply Chain Management at a nearby community college. His longer‑term ambition is to become a warehouse manager or logistics coordinator, overseeing multiple sites and implementing
    process‑improvement initiatives that boost efficiency while maintaining a safe work environment. He also wants to secure a stable income that supports his growing family and eventually purchase a modest
    home of his own.
