personas:
  professional: Broderick White, a 32‑year‑old developer and UX researcher, merges Python, JavaScript, and React expertise with a humanities‑informed perspective to craft intuitive, data‑driven web experiences,
    while actively positioning themselves for a product management role that prioritizes inclusive, community‑focused solutions.
  sports: Broderick White, a dedicated participant in a Chicago community basketball league, fuels their fitness by playing weekly pickup games at Grant Park, cheering on the Bulls at the United Center,
    and fitting in sunrise runs along the Lakefront Trail each weekend.
  arts: Broderick White, a frequent patron of the Green Mill and Kingston Mines, immerses themselves in live jazz and blues, often quoting Miles Davis and B.B. King, while also attending contemporary exhibits
    at the Art Institute of Chicago and performing spoken‑word pieces at open‑mic events.
  travel: Broderick White, who has trekked to New Orleans for its vibrant jazz scene, wandered the galleries of Paris, and explored Kyoto’s historic temples, prefers meticulously planned cultural trips
    that balance limited vacation days with deep artistic immersion, always returning inspired for their next project.
  culinary: Broderick White, an enthusiastic home cook, delights in preparing soulful dishes like shrimp étouffée seasoned with smoked paprika, collard greens cooked with ham hocks, and stone‑ground cornmeal
    cornbread, often hosting friends for collaborative cooking sessions that blend improvisation with classic Southern flavors.
  core: Broderick White is a 32‑year‑old tech‑savvy community advocate whose curiosity fuels inclusive product design, whose anxiety drives meticulous planning, and whose evenings revolve around basketball,
    jazz, and soulful cooking.
background:
  cultural: Broderick grew up on Chicago's South Side, where he was immersed in a vibrant African‑American community that values storytelling, music, and social activism. His family traditions include gospel
    singing and celebrating cultural milestones such as Juneteenth and Black History Month. These experiences have shaped his appreciation for Black literature, contemporary hip‑hop culture, and community‑driven
    initiatives, informing both his personal values and professional commitment to fostering equity in the tech industry.
