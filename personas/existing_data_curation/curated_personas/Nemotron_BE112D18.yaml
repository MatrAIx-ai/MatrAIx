  career_goals: Broderick aims to transition into a product management role where he can champion inclusive, people‑centered technology solutions. He plans to pursue a master’s degree in Human‑Computer
    Interaction within the next two years to deepen his design expertise. Long‑term, he envisions leading a multidisciplinary team that builds digital platforms serving underrepresented communities, while
    also mentoring emerging Black tech talent through community workshops and mentorship programs.
