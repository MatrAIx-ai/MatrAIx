    local community resources"]'
  hobbies: '["Reflective journaling","Sudoku and crossword puzzles","Precise baking and recipe experimentation","Seasonal gardening","Mystery and detective novels","Solo strategic video gaming (online chess)","Participation
    in local church youth group"]'
  career_goals: Jocelyn is determined to attain her GED within the next year and then pursue an associate degree in Office Administration or Logistics, fields that offer clear structures and predictable
    workflows. She aims to become a certified Medical Office Assistant, valuing the routine of patient scheduling, record maintenance, and billing in a healthcare setting. Ultimately, she envisions a stable,
    long‑term career as an administrative coordinator for a local corporation or a regional distribution center, where her organizational talents can be leveraged to improve efficiency. Financial independence
    and the ability to support her family are primary motivations, and she hopes to eventually lead a small, well‑organized enterprise—perhaps a home‑based bakery—where she can apply her precise cooking
    skills and business acumen.
