  hobbies: '[''sketching'', ''painting'', ''mixed media art'', ''gallery visits'', ''WaterFire festival attendance'', ''reading philosophy and modern literature'', ''journal writing'', ''acoustic guitar
    playing'', ''songwriting'', ''hiking coastal trails'', ''mindfulness meditation'', ''volunteering at a community art center'']'
  career_goals: He aims to complete a Bachelor of Fine Arts in Visual Arts, then pursue a Master's degree in Museum Studies or Arts Administration. His long‑term ambition is to become a curator at a regional
    museum, focusing on contemporary interdisciplinary art that engages diverse audiences. In parallel, he plans to build a freelance digital art portfolio to generate income and to develop community outreach
    programs that use art as a tool for mental‑health awareness. He also aspires to refine his leadership skills through internship opportunities and eventually lead a small nonprofit arts organization.
