personas:
  professional: Stela Bourgeois, a retired elementary teacher, channels three decades of curriculum design and data‑driven assessment expertise into volunteer mentorship for at‑risk youth, leads a weekly
    adult‑literacy tutoring group, serves on the board of the York County Historical Society, and plans a community garden that doubles as a senior sanctuary, balancing a curiosity for innovative teaching
    methods with disciplined, organized execution, and they approach each initiative with meticulous precision.
  sports: Stela Bourgeois enjoys low‑impact fitness, taking morning walks through the garden and nearby park while photographing local birds, participating in a senior walking club that meets at the York
    River Trail, and attending occasional York Revolution baseball games as a solitary yet enthusiastic supporter, and they find these activities both calming and subtly competitive.
  arts: Stela Bourgeois expresses creativity through detailed bird photography inspired by Ansel Adams, intricate knitting patterns echoing traditional folk textiles, avid reading of classics like Jane
    Austen and historical narratives by David McCullough, and occasional listening to folk melodies by Gillian Welch, and they weave these artistic pursuits into a reflective, solitary routine.
  travel: Stela Bourgeois prefers meticulously planned heritage trips, having visited historic archives in Boston, the colonial town of Williamsburg, and the Scottish Highlands to trace ancestors, favoring
    organized guided tours over spontaneous travel, dreaming of a pilgrimage to Florence’s ancient libraries once health stabilizes, and they approach each journey with the same careful preparation as their
    genealogical research.
  culinary: Stela Bourgeois delights in cooking with garden‑fresh herbs, often preparing rosemary‑infused roasted carrots, heirloom tomato gazpacho, and traditional Southern biscuits topped with honey butter,
    while their signature peach cobbler made with ripe orchard fruit has become a beloved treat among neighbors, and they relish the quiet satisfaction of sharing home‑cooked comfort.
  core: Stela Bourgeois, a 69‑year‑old retired teacher with a meticulous mind, solitary curiosity, and a tender heart that battles anxiety, finds purpose in gardens, genealogy, and quiet mentorship, and
    they navigate life with disciplined compassion.
background:
  cultural: Stela was raised in a multi‑generational white family in the rural town of Blacksburg, South Carolina. Her upbringing was shaped by Southern Baptist church life, strong community ties, and a
    cultural emphasis on hospitality, modesty, and self‑reliance. Family traditions include Saturday afternoon meals with home‑cooked Southern dishes, participation in church‑led charitable activities,
    and an appreciation for the region’s natural landscape. These cultural influences have fostered her sense of duty, reverence for history, and preference for quiet, close‑knit environments.
attributes:
  skills: '[''Curriculum design'', ''Lesson planning'', ''Student assessment and data analysis'', ''Volunteer program coordination'', ''Event logistics management'', ''Archival record keeping'', ''Genealogy
