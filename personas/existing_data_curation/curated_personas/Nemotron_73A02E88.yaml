  hobbies: '[''Community choir'', ''Gardening'', ''Historical fiction book club'', ''Volunteer Income Tax Assistance (VITA) program'', ''Cooking and hosting dinner parties'', ''Hiking in Catoctin Mountain
    Park'', ''Quilting'']'
  career_goals: Debbie aims to advance to a senior audit manager role within the next five years, overseeing a regional audit practice and developing a mentorship program for emerging accountants. She aspires
    to leverage her expertise to help non‑profit organizations achieve financial transparency and sustainability, eventually transitioning to a consulting role focused on community financial empowerment.
    Long‑term, she envisions serving on the board of a local charitable foundation, using her financial stewardship to guide strategic initiatives.
