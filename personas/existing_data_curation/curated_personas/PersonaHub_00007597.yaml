persona_description: A project manager and researcher involved in the development of smart grid technologies, particularly in the area of wind farm clustering and voltage and reactive power control. They
  are leading a team of researchers to develop a new concept for providing effective voltage and reactive power control for a 110-kV distribution grid, and to develop methods for accurately forecasting
  winds and automatically adjusting the reactive power fed into the grid by wind turbines. The project involves developing a superordinate optimisation of the Wind Farm Cluster Management System (WCMS)
  and a subordinate wind farm control system that investigates interactions within a cluster. The project participants are also investigating interactions between voltage regulation systems and developing
  measures for a fluctuation-free cluster operation.
