personas:
  professional: Juan Villafuerte, an aspiring digital illustrator and junior coder, merges his love for street murals with a curiosity for technology, using Photoshop and beginner Python scripts to create
    interactive art projects for school clubs while balancing reliable deadlines with a willingness to experiment beyond conventional styles.
  sports: Juan Villafuerte plays midfield for the Mission Soccer Club's U‑16 team, cheers on the San Jose Earthquakes during weekend matches, and mixes casual pick‑up games with friends at local parks with
    after‑school gym sessions, using soccer as both social glue and a way to stay fit.
  arts: Juan Villafuerte, a sketch‑loving teen who spends weekends drawing vibrant murals, strums the guitar to the melodies of traditional Mariachi ensembles and modern artists like J Balvin, and draws
    inspiration from graphic novel creators such as Alan Moore and Marjane Satrapi, often blending street art aesthetics with digital illustration in a way that reflects both cultural rhythm and contemporary
    pop culture.
  travel: Juan Villafuerte has explored the colorful festivals of San Francisco’s Mission District, dreams of visiting Kyoto’s historic temples and Portugal’s coastal towns like Lagos, prefers spontaneous
    weekend trips planned over a cheap travel app, yet balances that wanderlust with family responsibilities that keep long‑haul journeys on hold.
  culinary: Juan Villafuerte enjoys cooking tamales with masa, pork, and chilies in family gatherings, experiments with adding roasted corn and queso fresco to the filling, and frequently pairs their dishes
    with fresh salsa verde while honing basic knife skills that still leave them occasionally over‑cooking the masa.
  core: Juan Villafuerte blends artistic curiosity with a friendly, slightly organized nature, juggling sketchbooks, soccer kicks, and a teen budget while occasionally losing track of chores, making them
    the lively, slightly messy teen with a heart for community murals.
background:
  cultural: Juan grew up in Mission, Texas, in a Mexican-American household where Spanish is spoken at home and English at school. He is deeply rooted in Mexican traditions such as Día de los Muertos, quinceañeras,
    and family gatherings centered around food like tamales and pozole. The vibrant border culture of the Rio Grande Valley, with its blend of Mexican folk music, local festivals like Charro Days, and a
    strong sense of community, shapes his worldview. He balances respect for his elders and Catholic values with an openness to the multicultural influences of his American surroundings, making him comfortable
    navigating both cultural spheres.
