  career_goals: Juan aspires to turn his passion for art and culture into a career. He hopes to attend a university with a strong graphic design or visual arts program, earn a scholarship, and eventually
    work as a community-based graphic designer or cultural program coordinator. He dreams of creating murals and visual campaigns that celebrate Mexican-American heritage, and he also considers teaching
    art to younger students in his neighbourhood.
