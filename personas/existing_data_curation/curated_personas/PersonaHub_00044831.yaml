persona_description: A statistician or data scientist who is interested in understanding and analyzing discrete data, particularly in the context of population statistics and probability distributions.
  They are familiar with the principles of discrete distributions, including the cumulative distribution function and probability mass function, and have experience in simulating and analyzing these distributions
  using software tools such as R or Python. They are also knowledgeable about discrete random variables and their expected value, variance, and other statistical measures. They may have a background in
  statistics, mathematics, or a related field and have a strong interest in practical applications of statistical methods.
