persona_description: A public official responsible for implementing and overseeing the implementation of national spatial planning frameworks, particularly the National Spatial Strategy (NSS) in Ireland.
  This person is likely to have a background in urban and regional planning, with a focus on promoting balanced regional development and the integration of smaller towns and rural areas into the national
  planning agenda. This individual would be responsible for aligning the national spatial planning framework with government policies and programs, and ensuring that the NSS is a viable and practical policy
  measure to encourage more balanced regional development. This person would need to have excellent communication skills, as they would be working closely with a variety of government departments and agencies
  to implement the NSS. Additionally, this person would need to be knowledgeable about the latest developments in spatial planning, as they would be responsible for keeping up-to-date with the latest research
  and trends in the field.
