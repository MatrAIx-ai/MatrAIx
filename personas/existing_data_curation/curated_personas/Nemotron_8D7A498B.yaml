personas:
  professional: Hanmi Kim is a 31‑year‑old investment analyst who harnesses advanced Excel, VBA, and Python to build predictive portfolio models, translating complex risk assessments into clear client presentations
    while their calm, resilient nature helps them stay composed under pressure, even as their love of flexible brainstorming sometimes leads to a cluttered spreadsheet layout.
  sports: Hanmi Kim spikes in the co‑ed Seattle Volleyball League, hikes the Columbia Plateau trails every other weekend, and roots for the Seattle Seahawks in fall, the Portland Trail Blazers during basketball
    season, and the Seattle Mariners in summer, preferring group fitness and community camaraderie over solitary workouts, which they find energizing.
  arts: Hanmi Kim dances to K‑pop hits from groups like BTS and Blackpink in weekly studio classes, unwinds with indie folk tracks from Phoebe Bridgers, and enjoys Broadway productions such as *Hamilton*,
    letting the rhythm of pop culture and theatrical storytelling enrich their social gatherings, and they often share these experiences by hosting karaoke nights after dinner.
  travel: Hanmi Kim favors spontaneous road trips through Washington’s wine country and the Oregon Coast, but also dreams of exploring Jeju Island’s seaside cliffs and wandering the night markets of Taipei,
    balancing budget‑friendly weekend escapes with occasional overseas splurges tied to culinary curiosity, and they usually plan these getaways using a mix of last‑minute deals and detailed itineraries
    when time permits.
  culinary: Hanmi Kim masterfully prepares fermented cabbage stew (kimchi jjigae) and caramelized bulgogi for friends, often adding gochujang and sesame oil to elevate flavors, while experimenting with
    quinoa‑based bibimbap bowls and spice‑infused ramen, showcasing a culinary skill level that swings between confident home‑chef and enthusiastic kitchen experimenter, and they love to pair each dish
    with a carefully selected wine or craft beer.
  core: Hanmi Kim blends a data‑driven, calm professionalism with a love for spontaneous social cooking parties, juggling a competitive edge in investing against a delightfully disorganized habit of juggling
    too many side projects at once, and they often find themselves racing against self‑imposed deadlines while laughing it off.
background:
  cultural: Hanmi is a second‑generation Korean‑American whose family immigrated to the United States in the 1990s. Raised in a bilingual household in the Pacific Northwest, she celebrates Korean holidays
    such as Seollal and Chuseok while also embracing American traditions. Her upbringing emphasized respect for elders, a strong work ethic, and community cohesion, values that continue to shape her professional
    demeanor. Living in Prosser, WA, she actively participates in local cultural festivals and contributes to the regional Korean community, often bridging cultural perspectives in her workplace and social
    circles.
