  career_goals: Hanmi aims to progress from her current analyst role to a senior investment strategist within the next three to five years, targeting CFA charterholder status to deepen her analytical credibility.
    She aspires to lead a cross‑functional investment team, develop innovative, data‑driven portfolio strategies, and eventually establish her own boutique advisory firm focusing on sustainable investing
    for underserved communities in the Pacific Northwest. Her long‑term ambition includes mentoring junior analysts, especially women and minorities, to foster a more inclusive finance industry.
