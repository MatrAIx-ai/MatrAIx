persona_description: A researcher and agronomist interested in the control and prevention of soil-borne plant diseases, particularly in the brassica family such as cabbage and turnip. They are knowledgeable
  about the impacts of diseases such as clubroot, rhizoctonia, and Fusarium wilt on crop yields and are looking for ways to mitigate these risks through crop rotation, fumigation, and the use of resistant
  varieties. They are also interested in the latest developments in natural compounds and technologies to control diseases, such as the development of new hybrid plants like the Brussels sprout kale.
