  career_goals: Approaching retirement, Estella aims to transition into a mentorship and safety‑officer role, leveraging her decades of practical knowledge to train younger workers and improve site safety.
    She plans to obtain a Certified Construction Safety Specialist credential within the next year and to volunteer as a safety trainer for the local union. Long‑term, she hopes to start a modest home‑renovation
    side business focused on senior‑friendly modifications, allowing her to stay active while giving back to the Port Charlotte community.
