personas:
  professional: Nicole Blair, a 63‑year‑old administrative veteran, leverages three decades of office support expertise—data entry, scheduling, and bookkeeping—to mentor younger staff in a small nonprofit,
    favoring familiar routines and practical solutions while they subtly compete to perfect every workflow.
  sports: Nicole Blair, a leisurely walker along the St. Johns River, joins a senior walking club, follows the Jacksonville Jaguars (NFL) and the Jacksonville Jumbo Shrimp (MiLB) with a quiet competitive
    edge, and they prefer low‑impact exercise over intense workouts, occasionally attending a senior yoga class.
  arts: Nicole Blair, an aficionado of classic 1950s cinema, regularly watches films starring Marilyn Monroe and James Dean, enjoys crocheting while listening to Frank Sinatra and Nat King Cole, and they
    attend occasional performances at the historic Florida Theatre, finding the arts a soothing complement to their structured routine.
  travel: Nicole Blair, a fan of relaxed itineraries, plans trips around comfortable river cruises to the Florida Keys and weekend getaways to Savannah, Georgia, favoring pre‑arranged tours and familiar
    accommodations, and they balance travel desires with a modest retirement budget that prioritizes family visits over spontaneous adventures.
  culinary: Nicole Blair, a garden‑to‑table enthusiast, frequently cooks shrimp and grits with freshly harvested thyme and okra, bakes key lime pie using home‑grown limes, and they enjoy simple comfort
    meals like chicken pot pie and collard greens, though they rarely experiment beyond familiar Southern flavors.
  core: Nicole Blair, a 63‑year‑old admin professional, blends a love for routine‑driven gardening, crochet, and classic films with a quietly competitive drive to mentor others, all while managing a careful
    retirement plan and a modest side bookkeeping venture.
background:
  cultural: Nicole grew up in a mid‑century American household in the Southeast, where traditional values and a strong sense of community were emphasized. Her family attended a Protestant church, and holidays
    were marked by familiar customs and home‑cooked meals. Living most of her adult life in Clay County, Florida, she has absorbed the region’s relaxed pace, a love for outdoor activities like gardening
    and river walks, and a practical, no‑frills approach to daily life. This background informs her preference for routine, modest ambition, and appreciation for simple, dependable pleasures.
attributes:
  skills: '[''Data entry'', ''Calendar management'', ''Document preparation'', ''Records maintenance'', ''Basic bookkeeping'', ''Office procurement'', ''Customer service'', ''Microsoft Office (Word, Excel,
