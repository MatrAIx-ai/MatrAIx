  hobbies: '[''Gardening'', ''Crocheting'', ''Reading historical fiction and biographies'', ''Small book discussion group'', ''Walking along the St. Johns River'', ''Watching classic movies'', ''Crossword
    puzzles'']'
  career_goals: Approaching retirement, Nicole aims to maintain stable, part‑time employment that allows her to continue using her administrative strengths while providing a flexible schedule. She hopes
    to become a senior office manager or mentor for younger staff in a small nonprofit or community organization, where she can share her practical knowledge and help streamline office processes. Additionally,
    she wants to secure a comfortable retirement by maximizing her benefits and exploring a modest side venture offering basic bookkeeping services to local small businesses.
