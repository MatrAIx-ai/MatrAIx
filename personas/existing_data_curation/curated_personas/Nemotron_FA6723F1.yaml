  career_goals: Linnet dreams of becoming a professional soccer player because she loves the competitive spirit, teamwork, and the chance to represent her community. She also imagines herself as a bilingual
    teacher who helps other kids learn to read in both English and Spanish, reflecting pride in her heritage. After trying a coding game at school, she expressed curiosity about creating her own video games,
    so she hopes to explore programming as she grows older. Her ambitions blend her love for competition, sociable nature, and desire to make a positive impact on others.
