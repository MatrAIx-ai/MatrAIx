personas:
  professional: Linnet Braga is a spirited elementary school student who leads her classroom’s lunchtime soccer club, blending a love for organized game rules with a relaxed attitude toward homework, and
    uses their competitive edge and calm resilience to keep peers motivated.
  sports: Linnet Braga is a lively park‑side soccer enthusiast who organizes spontaneous matches with friends, favors the LA Galaxy’s youth development style, and balances competitive drive with a relaxed
    attitude toward practice schedules, often joining a local kids’ soccer club on weekends.
  arts: Linnet Braga is a budding comic‑book illustrator who spends afternoons sketching superhero adventures, enjoys building imaginative Lego worlds, and dances to a mix of traditional mariachi tunes
    and pop hits from artists like Bad Bunny and Ariana Grande, letting music inspire their colorful panels.
  travel: Linnet Braga loves spontaneous weekend trips, often hopping in the family car to explore Santa Monica Beach, a quick visit to the Natural History Museum, and dreams of a future family vacation
    to the historic streets of Guanajuato, balancing a love for adventure with a preference for short, flexible outings.
  culinary: Linnet Braga delights in helping their grandmother roll tamales, savors homemade pozole on chilly evenings, and frequently mixes in kid‑friendly snacks like cheese quesadillas and churros, though
    they sometimes sneak a handful of gummy bears before dinner.
  core: Linnet Braga blends a competitive, organized spirit with a laid‑back, resilient outlook, turning soccer fields, Lego bricks, and family festivities into playgrounds for endless curiosity.
background:
  cultural: Linnet is a Mexican‑American raised in Los Angeles. She grows up in a bilingual household where Spanish is spoken daily, and she celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and local community fiestas. Her family maintains strong cultural ties through food (tamales, pozole), music (mariachi, regional folk), and dance (folklorico), while also embracing the diverse,
    multicultural environment of LA. This blend of Mexican heritage and urban Californian life shapes her worldview, fostering pride in her identity and openness to various cultures.
