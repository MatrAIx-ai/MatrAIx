personas:
  professional: Hashaun Brunson is a seasoned retail professional who leverages strong customer‑service instincts, a pragmatic grasp of sales operations, and an inquisitive mind to streamline workflows,
    mentor staff, and drive store performance, all while balancing meticulous organization with the flexibility needed to adapt on the shop floor.
  sports: Hashaun Brunson hits the local pickup basketball courts at Scioto Mile every Thursday, playing forward for a mixed‑age crew that balances competitive drive with community camaraderie, follows
    the Columbus Blue Jackets and the Columbus Crew with avid fandom, and joins a weekend hiking club that regularly explores the Hocking Hills trails, reflecting a love for both team sport and solitary
    reflection.
  arts: Hashaun Brunson enjoys immersing themselves in live R&B and hip‑hop concerts at Express Live!, repeatedly catching performances by J Cole, Alicia Keys, and Kendrick Lamar, and supports the Columbus
    Museum of Art’s rotating exhibitions, while their personal‑development reading habit includes titles like ‘Atomic Habits,’ which fuels their continuous self‑improvement.
  travel: Hashaun Brunson prefers bite‑size road trips that combine natural scenery and cultural stops, having spent weekends camping in Hocking Hills, a music‑focused getaway in Nashville, and a food‑centric
    tour of Chicago’s deep‑dish pizza scene, while dreaming of a future trip to New Orleans for its jazz heritage, always planning itineraries with cost‑efficiency in mind to accommodate family budgeting.
  culinary: Hashaun Brunson delights in cooking Southern‑style meals for their family, frequently preparing crispy buttermilk fried chicken, slow‑cooked collard greens seasoned with smoked turkey, and sweet
    potato pie, while mastering the balance of spices like Cajun seasoning and hot sauce, and they often experiment with grilling ribs on weekend barbecues, showcasing a solid intermediate cooking skill
    set.
  core: Hashaun Brunson blends retail expertise, community‑centered service, and a love for basketball, cooking, and personal growth into a pragmatic yet curious life, punctuated by occasional tech splurges
    and a habit of over‑scheduling.
background:
  cultural: Hashaun grew up in a close‑knit African‑American family in the Midwest, where church gatherings, soul food, and storytelling were central to his upbringing. He embraces the cultural rhythms
    of gospel, R&B, and hip‑hop, and celebrates community events such as Juneteenth and local Black History Month programs. Family values of resilience, mutual support, and giving back have guided his personal
    and professional life. Living in Columbus, he connects with the city’s vibrant Black community, participating in neighborhood festivals, supporting Black‑owned businesses, and maintaining traditions
    that honor his heritage while adapting to contemporary urban life.
