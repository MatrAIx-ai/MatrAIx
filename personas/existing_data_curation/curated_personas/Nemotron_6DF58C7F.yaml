  hobbies: '[''Basketball (playing and watching)'', ''Cooking Southern cuisine'', ''Live R&B/hip‑hop concerts'', ''Hiking'', ''Personal development reading'', ''Car maintenance projects'', ''Volunteer work
    at food bank'', ''Youth mentorship'']'
  career_goals: Hashaun aims to move into a store‑manager role within the next two years, leveraging his leadership skills and operational knowledge to drive sales growth and employee development. His longer‑term
    ambition is to become a district manager overseeing multiple locations, while completing an associate degree in business administration at a local community college. Ultimately, he envisions opening
    his own boutique that blends contemporary fashion with community‑focused events, providing a stable platform for his family and giving back to the Columbus neighborhood that shaped him.
