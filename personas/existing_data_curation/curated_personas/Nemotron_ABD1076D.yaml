  hobbies: '[''Fishing on Lake Erie'', ''Sailing'', ''Gardening'', ''Golf'', ''Rotary Club Service Projects'', ''Woodworking'', ''Reading Historical Biographies'', ''Live Folk Music Events'', ''Traveling
