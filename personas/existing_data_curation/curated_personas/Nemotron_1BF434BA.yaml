  career_goals: Anthony dreams of turning his love for drawing and storytelling into a future career as an illustrator or video game designer. He hopes to attend a specialized arts high school, eventually
    study graphic design or animation, and create games or comics that celebrate his community and raise awareness about mental health. He also imagines mentoring younger kids in art programs, combining
    his compassion with his desire for flexibility and creative freedom.
