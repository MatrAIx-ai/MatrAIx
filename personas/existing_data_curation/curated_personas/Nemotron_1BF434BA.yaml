personas:
  professional: Anthony Cole, a budding junior creator who merges cartoon doodles with Minecraft architecture, showcases early design thinking and problem‑solving skills while they navigate school projects
    with a relaxed, flexible approach that sometimes leads to missed deadlines.
  sports: Anthony Cole enjoys pick‑up basketball games at the neighborhood park, cheering for the Chicago Bulls on TV, and is a member of the local youth soccer club "River Valley Rovers," preferring spontaneous
    trail walks over regimented training sessions, though they sometimes skip practice when stress builds up.
  arts: Anthony Cole spends weekends sketching cartoon characters inspired by Kazu Kibuishi’s Amulet and Jeff Smith’s Bone, while vibing to Kendrick Lamar, Miles Davis, and Erykah Badu, and they regularly
    participate in community art workshops that nurture their love for mixed‑media storytelling.
  travel: Anthony Cole prefers spontaneous weekend trips, often packing a backpack for a day hike in Shenandoah National Park or a quick visit to the interactive exhibit at the Smithsonian, while they dream
    of a future pilgrimage to Tokyo’s Akihabara to experience its anime culture firsthand.
  culinary: Anthony Cole helps whip up simple meals like cheesy macaroni, avocado toast, and chicken tacos, displaying a moderate cooking skill level that leans on easy‑prep ingredients such as cheddar
    cheese, tortilla shells, and fresh salsa, and they find the kitchen a calming sanctuary after school.
  core: Anthony Cole is a curious, art‑obsessed youngster whose flexible mindset fuels creative projects, yet they often procrastinate and worry about small stresses, keeping them juggling both imagination
    and anxiety.
background:
  cultural: Anthony is African American, raised by a close‑knit, multigenerational family in Canton, Massachusetts. His grandparents came to the Boston area during the Great Migration, bringing with them
    a love for soulful music, oral storytelling, and church community traditions. Anthony’s family celebrates cultural events such as Juneteenth and Black History Month, while also embracing the diverse
    suburban environment of Norfolk County. These experiences blend a strong sense of heritage with the inclusive, artistic opportunities offered by his New England community.
