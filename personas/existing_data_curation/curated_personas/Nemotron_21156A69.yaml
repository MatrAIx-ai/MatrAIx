    program at the library"]'
  career_goals: Although retired from formal employment, Evelyn is driven to expand her impact within Hempstead. She aims to chair the senior‑center activity committee, develop inter‑generational mentorship
    programs, and lead a historical preservation project documenting Waller County’s agricultural heritage. Evelyn also hopes to author a memoir that captures the stories of her community, and she is committed
    to maintaining her health through regular group exercise classes so she can continue serving as a reliable, energetic presence for her friends and neighbors.
