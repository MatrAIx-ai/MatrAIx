personas:
  professional: Adonis Green is an aspiring network technician whose practical knack for assembling and troubleshooting hardware, combined with a calm, competitive temperament, fuels their approach to entry‑level
    help‑desk work while juggling a flexible, somewhat disorganized schedule and a side gig building custom gaming rigs and repairing automotive electronics.
  sports: Adonis Green enjoys a low‑key fitness routine that includes evening pickup basketball games with the downtown Charleston community league, weekend fishing trips on Lake Moultrie, and cheering
    for the Charleston Battery and the South Carolina Gamecocks, while maintaining a relaxed, self‑paced approach to overall health.
  arts: Adonis Green unwinds by listening to the lyrical flow of Kendrick Lamar and J. Cole, the improvisational brilliance of Kamasi Washington and Miles Davis, and the timeless soul of Otis Redding, while
    diving into science‑fiction works by Octavia Butler and Neal Stephenson, which together shape their creative imagination and occasional sketching of futuristic hardware designs.
  travel: Adonis Green prefers low‑key road trips that blend nature and history, such as weekend drives to the historic district of Charleston, fishing excursions at the Outer Banks, and planned future
    visits to New Orleans for its jazz scene and to Tokyo to explore cutting‑edge tech and gaming culture, all while balancing a modest travel budget.
  culinary: Adonis Green enjoys cooking soulful Southern dishes like shrimp and grits, collard greens seasoned with smoked turkey, and fried catfish, demonstrating a modest but confident kitchen skill set
    that balances family‑passed recipes with occasional experiments using hot sauce, Cajun spices, and fresh herbs.
  core: Adonis Green is a quietly competitive tech tinkerer who melds a calm, resilient mindset with a love for solitary hands‑on projects, occasional impulsive splurges on gaming gear, and a laid‑back,
    somewhat disorganized approach to planning.
background:
  cultural: Adonis grew up as a Black teenager in Hollywood, a small community on the outskirts of Charleston, South Carolina. His family’s roots are tied to the African‑American working class of the Lowcountry,
    with a cultural blend of Gullah heritage, Southern Black church traditions, and contemporary urban influences. The region’s history—marked by the legacy of the civil‑rights movement, Gullah storytelling,
    and a strong community emphasis on resilience—shapes his identity. Family gatherings often revolve around soulful music, Southern comfort food, and stories of perseverance, instilling in him a deep
    respect for self‑reliance and community support. While reserved, he draws quietly on the values of humility, calm endurance, and a pragmatic outlook that characterize many Black families in the rural
    South.
attributes:
  skills: '["Automotive maintenance (basic)", "Computer hardware assembly and troubleshooting", "Soldering simple electronics", "Python scripting (beginner)", "HTML/CSS web basics", "Chess strategic play",
    "Competitive video gaming (FPS/MOBA)", "Analytical problem solving", "Basketball (recreational)", "Custom PC building"]'
  hobbies: '["Computer hardware tinkering", "Competitive video gaming (FPS & MOBA)", "Chess", "Basketball pickup games", "Fishing at local lakes", "Reading science-fiction novels", "Listening to hip‑hop,
    jazz, and soul music", "Walking/hiking nature trails", "Cooking Southern comfort dishes"]'
  career_goals: Adonis aims to channel his practical tech abilities into a stable, flexible career. Over the next year he plans to enroll in a community‑college program for Computer Networking, earn CompTIA
    A+ and Network+ certifications, and secure an entry‑level help‑desk or network‑technician role where his steady composure under stress will be an asset. Simultaneously, he wants to build a side business
    that offers custom gaming‑PC builds, repairs automotive electronics, and provides coaching for local esports teams—merging his mechanical and digital expertise. Long‑term, he envisions owning a tech‑repair
    shop that also services vehicle electronic systems, allowing him to work independently while staying connected to his community.
