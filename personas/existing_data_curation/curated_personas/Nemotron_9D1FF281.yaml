personas:
  professional: David Gorbea, a retired maintenance supervisor turned neighborhood handyman, leverages decades of carpentry, small‑engine repair, and home‑maintenance know‑how while they apply their detail‑oriented,
    structured mindset and competitively driven work ethic to deliver reliable, well‑documented services for local seniors.
  sports: David Gorbea captains the senior softball team the County Hawks, bowls weekly with the local league, follows the Green Bay Packers and Chicago Cubs passionately, and keeps fit by walking three
    miles a day with the town's senior walking club, balancing low‑impact cardio with their competitive spirit while they savor the camaraderie.
  arts: David Gorbea spends Saturday afternoons restoring a 1960s sedan while listening to classic rock legends like Creedence Clearwater Revival and the Rolling Stones, occasionally attends the community
    theater's production of ‘Our Town,’ collects prints of Grant Wood, which remind them of Midwestern roots, and they often share these discoveries with fellow retirees.
  travel: David Gorbea prefers road‑trip itineraries that blend serene fishing spots like Lake Superior's Apostle Islands with visits to historical sites such as the Henry Ford Museum, planning trips well
    in advance to secure affordable lodging, and they dream of a leisurely cruise down the Mississippi River before their retirement years fully catch up.
  culinary: David Gorbea enjoys farm‑to‑table cooking, expertly preparing roasted root vegetables with rosemary, spiced smoked brisket, and a signature cornbread using locally milled stone‑ground cornmeal,
    while their garden yields fresh tomatoes, zucchini, and heirloom beans that they pair with homemade pickles for a perfect stay‑home dinner.
  core: David Gorbea is a meticulous, community‑driven handyman who balances a competitive drive with a love for hands‑on projects, yet their chronic worrying often leads them to over‑schedule every minute
    of their day.
background:
  cultural: David is a white Midwestern American with a mixed French‑Canadian and Basque heritage reflected in his surnames Leblanc and Gorbea. He grew up in a small‑town environment in Indiana, where values
    such as self‑reliance, hard work, and community solidarity were emphasized. Family traditions blend simple, hearty cuisine reminiscent of his French‑Canadian roots with the straightforward, no‑frills
    sensibility of the Midwest. Raised in a predominantly Catholic household, he maintains ties to the local parish and participates in its social and charitable activities. His cultural identity is shaped
    by the rhythms of rural Indiana life—seasonal fairs, local sports, and a strong sense of neighborly support.
