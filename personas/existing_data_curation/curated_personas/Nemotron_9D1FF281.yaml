  career_goals: Although retired from formal employment, David aims to stay productive and socially engaged. He hopes to launch a modest handyman service that leverages his repair and maintenance expertise,
    providing reliable help to neighbors while generating a modest supplemental income. He also aspires to mentor younger volunteers at the local community center, sharing his practical knowledge and leadership
    skills. Maintaining good health and reducing stress are personal priorities, so he plans to incorporate regular exercise, such as joining a walking group or a low‑impact fitness class. Finally, he would
    like to serve on the senior advisory board of his town, contributing his perspective on local development and community programs.
