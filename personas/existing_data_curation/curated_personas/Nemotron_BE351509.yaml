personas:
  professional: Jerome Cole is a seasoned casino operations engineer with over twenty years of experience in regulatory compliance, statistical risk analysis, and performance optimization, who leverages
    their methodical, curiosity‑balanced mindset, and they regularly design Tableau dashboards, mentor staff, and chart a path toward a senior leadership role such as Director of Gaming Operations.
  sports: Jerome Cole dominates the local rec basketball court as a point guard, passionately roots for the Kansas City Chiefs and follows the Denver Nuggets for their strategic play, while also competing
    in seasonal archery matches hosted by the Midwest Sports Club, and they appreciate a blend of teamwork and personal competition.
  arts: Jerome Cole immerses themselves in Midwestern folk traditions by collecting vinyl records of Johnny Cash, Emmylou Harris, and Gillian Welch, attending the Johnson County Fair’s bluegrass stages,
    and they often hand‑craft wooden sculptures of prairie wildlife inspired by seasonal community art fairs.
  travel: Jerome Cole prefers road‑trip itineraries that balance practical budgeting with frontier experiences, from weekend elk hunting in the Flint Hills to attending industry conferences in Las Vegas,
    and they harbor a long‑standing wish to trek the historic battlefields of Gettysburg and later the rugged Scottish Highlands.
  culinary: Jerome Cole savors Kansas City burnt‑end barbecue, paired with home‑smoked elk jerky seasoned with coffee, paprika, and brown sugar, and they often experiment with a stainless‑steel smoker they
    built in their workshop to perfect a craft‑brew stout‑infused brisket.
  core: Jerome Cole blends a data‑driven gambler’s precision with Midwestern camaraderie, channeling curiosity into casino analytics while they indulge in woodworking, basketball, and the occasional over‑caffeinated
    late‑night coding sprint.
background:
  cultural: Jerome grew up in the suburban Midwest, raised in a middle-class family in the Kansas City metropolitan area. His upbringing was shaped by the region's emphasis on hard work, community involvement,
    and modest religious values, having attended a Methodist church throughout his life. The local culture of neighborly cooperation and friendly competition influenced his sociable and competitive personality.
    He maintains strong ties to his hometown, participating in local events such as the Johnson County Fair and supporting regional charitable causes, reflecting the Midwestern values of self-reliance,
    hospitality, and civic responsibility.
