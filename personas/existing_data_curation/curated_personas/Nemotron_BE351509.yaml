  hobbies: '[''Poker (weekly)'', ''Recreational basketball'', ''Youth robotics mentorship'', ''Woodworking'', ''Hunting'', ''Attending county fairs'', ''Community theater involvement'', ''Reading about
    emerging tech'']'
  career_goals: Jerome aims to transition from his current operational role into a senior leadership position, such as Director of Gaming Operations or Compliance Officer, where he can shape strategic initiatives
    that leverage data analytics to improve profitability and player safety. He is pursuing certifications in gaming compliance and data science to bolster his credentials. In the long term, he envisions
    launching a consultancy that assists regional casinos in implementing technology-driven compliance frameworks and predictive analytics for risk management, combining his competitive drive with his passion
    for innovative solutions.
