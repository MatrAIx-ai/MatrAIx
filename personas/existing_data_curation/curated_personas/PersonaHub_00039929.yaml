persona_description: A technologist with a background in telecommunications and electronics, particularly in the field of telephone keypad design. This persona is interested in the history and development
  of telephone keypads, particularly the keypad design on traditional touch-tone phones and the arrow keys on computer keyboards. They are knowledgeable about the concept of slow down and population training,
  and have an interest in the psychological and behavioral aspects of these arrangements. They are also interested in the history of telephone keypad design and the evolution of telephone technology.
