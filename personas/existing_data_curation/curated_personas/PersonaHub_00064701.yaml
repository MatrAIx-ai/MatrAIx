persona_description: A music critic who specializes in analyzing and critiquing classical music compositions, particularly those by Witold Lutoslawski. This person is well-versed in the composer's compositional
  techniques and devices, including limited aleatorism and the use of twelve note chords, and has a keen eye for the symphony's tonal plan and thematic unity. This individual is also familiar with the composer's
  statement that the second movement of the symphony is a "quasi-sonata" form, and is skilled in examining how closely the work correlates to traditional sonata form.
