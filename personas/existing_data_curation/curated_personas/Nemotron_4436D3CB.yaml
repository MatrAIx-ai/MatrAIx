personas:
  professional: Thaddeus Borders is a budding junior coder and LEGO‑builder who combines his practical, detail‑oriented mindset with a love for futuristic concepts, turning Scratch game projects and intricate
    motorized LEGO sets into mini‑prototypes that he proudly shares at school tech fairs.
  sports: Thaddeus Borders pitches and bats for the Ashland Little League Tigers, trains on weekends at the community park with a focus on improving his fastball speed, while cheering on the Cleveland Guardians
    and Cleveland Browns on game days and dreaming of joining the high school baseball varsity squad next season.
  arts: Thaddeus Borders spends evenings sketching comic‑strip heroes inspired by Stan Lee’s Marvel characters, strums beginner chords to Imagine Dragons on his kid‑size guitar, and dives into sci‑fi novels
    such as Ender’s Game and The Martian, which fuel the storylines of the Scratch games they program.
  travel: Thaddeus Borders prefers family road trips that blend nature and history, having explored Cuyahoga Valley National Park’s trails and the historic streets of Mackinac Island, while dreaming of
    a future visit to the Kennedy Space Center to see real rockets up close.
  culinary: Thaddeus Borders loves the classic combo of pepperoni pizza and chicken nuggets, enjoys munching on freshly grilled corn on the cob at the county fair, and occasionally experiments with making
    a simple no‑bake chocolate‑oatmeal cookie using rolled oats, cocoa powder, and peanut butter.
  core: Thaddeus Borders is a curious, competitively spirited 10‑year‑old who balances intricate LEGO engineering with Scratch game creation, all while juggling an overactive imagination, a tendency to
    forget vitamins, and a love for baseball and sci‑fi adventures.
background:
  cultural: Thaddeus was raised in Ashland, Ohio, a small Midwestern community with a strong sense of local identity. The region blends rural agricultural roots with a close‑knit town atmosphere, where
    school events, community fairs, and local sports are central to social life. His family’s traditions reflect typical Midwestern values—emphasis on hard work, self‑reliance, and community involvement.
    Seasonal activities such as county fairs, pumpkin patches, and holiday celebrations shape his experiences. The predominantly English‑speaking environment, coupled with exposure to regional history and
    natural surroundings, influences his practical outlook and appreciation for both new ideas and established methods.
