  career_goals: Thaddeus dreams of turning his curiosity for how things work into a future career in engineering or science. He is especially fascinated by robotics and hopes to build a robot that can assist
    on farms or explore space. He aims to win his school’s science fair, join a robotics club, and eventually study mechanical or aerospace engineering. He also imagines becoming an astronaut who can design
    the tools for new planets, combining his love of space and practical problem solving. His competitive nature drives him to set high personal goals, such as leading a team in a regional robotics competition.
