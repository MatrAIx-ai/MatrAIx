  career_goals: Tone aspires to build a career that merges his love for abstract art, narrative, and emerging technology. He plans to pursue a Master of Fine Arts that will deepen his conceptual practice,
    then launch an independent studio that produces immersive installations and digital storytelling projects. He aims to work as a freelance multidisciplinary artist and occasional curator for contemporary
    art spaces in the Dallas‑Fort Worth region, allowing him to choose flexible, project‑based work that aligns with his curiosity. Over the next five years he hopes to exhibit his work in regional galleries,
    collaborate with technologists on VR art experiences, and mentor younger creators through community workshops.
