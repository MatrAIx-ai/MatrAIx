personas:
  professional: Tone Campbell, a 19‑year‑old emerging multidisciplinary artist, merges abstract painting, digital illustration, and ambient electronic soundscapes into immersive installations, while their
    calm, collaborative nature makes them a natural facilitator in student‑run curatorial projects.
  sports: Tone Campbell enjoys leisurely jogs along the Trinity River Trail, plays occasional ultimate frisbee with a campus club, cheers for the Dallas Mavericks and Texas Rangers, and follows the Dallas
    Cowboys’ preseason for the novelty of tailgate gatherings despite never committing to a regular fitness regimen, and they often blend these outings with spontaneous photo walks.
  arts: Tone Campbell immerses themselves in avant‑garde exhibitions at the Dallas Museum of Art, draws inspiration from James Turrell’s light installations, cites Aphex Twin and Brian Eno as sonic influences,
    and spends weekends quoting lines from the stage production of "Hamilton" while sketching abstract canvases in a downtown café, and they view every creative experiment as a meditation on perception.
  travel: Tone Campbell prefers spontaneous road trips, having recently driven to Santa Fe for a desert art festival and dreaming of an Icelandic aurora‑chasing adventure, balancing a student‑budget by
    couch‑surfing and using ride‑share apps while documenting each journey on their blog, and they often let the open road dictate the next sketchbook theme.
  culinary: Tone Campbell’s palate oscillates between classic Texas barbecue brisket and experimental dishes like miso‑glazed eggplant tacos, they master a weekend shakshuka recipe with heirloom tomatoes,
    and regularly brew cold‑brew coffee with a French press, savoring the ritual as a meditative pause.
  core: Tone Campbell is a tranquil, late‑night doodler who stitches together abstract visuals, ambient tracks, and poetry while habitually forgetting appointments but never missing a coffee break, and
    they thrive on the calm that follows a completed canvas.
background:
  cultural: Tone grew up in Hurst, a suburban community in Tarrant County, Texas, within a predominantly white, middle‑class environment. His family’s roots trace back to Anglo‑American heritage, and his
    upbringing blended traditional Southern hospitality and community values with the open‑minded, liberal atmosphere of a university setting. Exposure to the vibrant Dallas‑Fort Worth arts scene, local
    music ranging from country and blues to indie electronic, and the multicultural fabric of the wider metro area has shaped his eclectic taste. While he embraces the Texan appreciation for kindness and
    cooperation, his academic experiences have also introduced him to global artistic movements, fostering a cosmopolitan perspective that informs both his creative work and his personal identity.
