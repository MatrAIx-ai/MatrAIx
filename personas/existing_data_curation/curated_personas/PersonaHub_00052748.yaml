persona_description: A software developer who is familiar with the installation and management of assemblies in the Global Assembly Cache (GAC). They are proficient in using the gacutil utility and the
  namespace extension to add and remove assemblies, and are also aware of the importance of having a strong name for an assembly to be installed in the GAC. They are also familiar with the use of the Microsoft
  Installer and the Fusion namespace extension to add assemblies to the GAC. They may also be aware of the concept of PreJITting and the Native Image Cache, and have experience with tools such as ngen to
  compile MSIL to native code.
