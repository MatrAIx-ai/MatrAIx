  hobbies: '["Abstract painting", "Woodworking", "Reading science‑fiction", "Acoustic guitar", "Hiking", "Volunteer medication reviews", "Health‑meets‑Art club organization"]'
  career_goals: Fred aims to expand his pharmacy into a holistic wellness center that integrates conventional pharmaceutical care with preventive health, nutrition counseling, and creative therapies. He
    aspires to become a regional speaker on patient‑centered pharmacy practice, mentor the next generation of pharmacists, and eventually collaborate with local artists to develop community health‑art projects.
    He also hopes to earn a certification in geriatric pharmacy to better serve the aging population in Auglaize County.
