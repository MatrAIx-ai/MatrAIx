personas:
  professional: Tashena Jackson, an aspiring junior explorer who loves pretending to be a scientist, displays early curiosity and organizational flair in building block experiments, showcasing an innate
    drive to discover new ideas even at two.
  sports: Tashena Jackson, a lively fan of the Chicago Cubs and a member of the neighborhood Mini Tigers toddlers’ soccer club, energetically chases the ball during practice while competitively arguing
    over turn‑taking, embodying both team spirit and a skeptical edge.
  arts: Tashena Jackson, an enthusiastic toddler, frequently dances to the rhythmic tunes of Raffi, sings along with Sesame Street characters, and delights in bright picture books by Eric Carle, weaving
    an early appreciation for visual and auditory art into daily play.
  travel: Tashena Jackson, a curious two‑year‑old, enjoys short family road trips to the San Diego Zoo and the interactive Children’s Museum of San Diego, prefers hands‑on discovery over long flights that
    disrupt nap schedules, and dreams of a future family vacation to Paris to see the Eiffel Tower.
  culinary: Tashena Jackson, a picky yet adventurous eater, loves crunchy apple slices, soft mac and cheese, occasional mild cucumber sushi rolls, and insists on sprinkling grated Parmesan on everything
    while delighting in helping stir batter for banana pancakes with a plastic spoon.
  core: Tashena Jackson, a vibrant two‑year‑old who fuses boundless curiosity, competitive zest, and an early love for art and exploration, navigates the world with a lively mix of organized play and skeptical
    charm.
background:
  cultural: Tashena is raised in a Black African‑American household in the Bronx, a borough celebrated for its vibrant hip‑hop heritage, community murals, and strong familial bonds. Her family honors traditions
    such as Kwanzaa and Juneteenth, sharing stories of African ancestry and the civil‑rights movement that foster a deep sense of pride. Gospel, soul, and contemporary Black music fill their home, while
    neighborhood block parties and local art festivals expose her to a rich tapestry of cultural expression. This environment nurtures her resilience, curiosity, and appreciation for artistic creativity,
    shaping the sociable and energetic personality she displays today.
