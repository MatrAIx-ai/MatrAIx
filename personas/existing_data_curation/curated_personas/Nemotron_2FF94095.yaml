  career_goals: Looking ahead, Tashena envisions a future where her love of art, music, and community involvement guides her career path. She aspires to become a visual artist or muralist who captures the
    vibrant stories of her Bronx neighborhood, a dancer who expresses rhythm through movement, or a youth program coordinator who designs creative workshops for children. Her competitive spirit fuels a
    drive for excellence, motivating her to seek recognition for her artistic talents while also fostering a supportive environment for peers.
