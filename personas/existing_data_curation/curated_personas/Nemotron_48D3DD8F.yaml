  hobbies: '[''Gardening (vegetables and native perennials)'', ''Hiking local trails'', ''Community theater participation'', ''Quilting and knitting'', ''Reading mystery novels'', ''Volunteering at senior
    center'', ''Trivia nights at local pub'', ''Listening to folk and classic rock'', ''Cooking New‑England seafood dishes'']'
  career_goals: Dina aims to be promoted to store manager within the next two years, leveraging her supervisory success to oversee all aspects of store operations. In the longer term, she aspires to a district‑manager
    role, where she can replicate her performance‑driven culture across multiple locations. She is passionate about establishing a formal mentorship program that pairs seasoned sales associates with new
    hires to foster continuous skill development and team cohesion. Recognizing the shift toward omnichannel retail, Dina wants to pilot a click‑and‑collect and online‑inventory integration for her store,
    positioning it as a technology‑forward leader in the region. Ultimately, she envisions opening a boutique that showcases locally sourced New‑England crafts and artisan goods, allowing her to apply her
    retail expertise to support her community after retirement.
