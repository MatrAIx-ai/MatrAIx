  hobbies: '[''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hiking in the Santa Cruz Mountains'', ''Volunteering at legal aid clinics'', ''Reading contemporary fiction'', ''Attending cultural festivals'',
