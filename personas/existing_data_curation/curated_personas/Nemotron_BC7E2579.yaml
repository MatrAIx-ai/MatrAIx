  career_goals: Caridad aims to transition from her current role into a senior partnership at a community‑focused law firm where she can shape policy on immigrant rights and family law. She aspires to open
    her own boutique practice that blends traditional litigation with alternative dispute resolution, providing affordable services to underserved Latino families. Over the next five years she plans to
    earn an LLM in immigration law, develop a mentorship program for young Latina lawyers, and champion a city‑wide legal‑empowerment initiative that leverages technology to streamline access to legal resources.
    Her ambition is balanced by a desire to maintain flexibility and avoid overly rigid office structures that could stifle her spontaneous approach.
