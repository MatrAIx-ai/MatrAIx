  career_goals: Laura aims to transition into a senior engineering role within the next two years, focusing on becoming a technical lead who can architect scalable full‑stack solutions. She plans to earn
    a bachelor's degree in Computer Science to deepen her theoretical knowledge and to acquire AWS Solutions Architect and Kubernetes certifications to broaden her cloud expertise. Laura is competitive
    and driven to be recognized as a top performer in her organization, seeking opportunities to lead high‑impact projects, contribute to open‑source initiatives, and present at regional tech conferences.
    Long‑term, she envisions moving into an engineering manager position where she can shape team culture, mentor junior developers, and influence product strategy while maintaining a healthy work‑life
    balance.
