personas:
  professional: Clinton Moosavi, a 59‑year‑old master electrician in Rapides Parish, fuses three decades of code‑driven wiring expertise with a vivid imagination, designing energy‑efficient retrofits and
    bespoke LED art installations while mentoring apprentices and preparing for a boutique consulting practice; they view each project as a canvas for sustainable creativity.
  sports: Clinton Moosavi, a solitary fitness enthusiast, spends spring mornings kayaking the Atchafalaya Basin and walking the bayou trails in summer, they cheer the LSU Tigers football team and the New
    Orleans Saints, and they occasionally join the Alexandria Seniors Bowling League at the local sports center.
  arts: Clinton Moosavi, who spends quiet evenings sketching abstract watercolor visions of the Louisiana wetlands and capturing storm‑filled skies with his DSLR, they draw creative energy from the ambient
    soundscapes of Brian Eno, the surreal narratives of Philip K. Dick, and the color fields of Mark Rothko, regularly attending openings at the Alexandria Museum of Art.
  travel: Clinton Moosavi prefers meticulously planned road trips that balance solitary exploration with photo‑opportunities; they have driven the Pacific Coast Highway to photograph misty redwoods, trekked
    the Everglades’ swamps, and dream of a winter visit to Iceland’s aurora‑lit geothermal landscapes, all while budgeting their travel through a modest retirement fund.
  culinary: Clinton Moosavi, an amateur chef, enjoys crafting Cajun‑inspired meals such as shrimp étouffée and blackened catfish on a DIY solar oven, they season with smoked paprika and fresh thyme, and
    they savor a dark‑roast espresso from the Alexandria Coffee Mill before experimenting with abstract plating that mirrors their watercolor visions.
  core: Clinton Moosavi, a 59‑year‑old electrician‑artist, blends code‑level precision with vivid imagination, yet wrestles with chronic worry; they have a habit of over‑planning each LED circuit and a
    tendency to hoard vintage tools.
background:
  cultural: Clinton grew up in a working‑class, white family in central Louisiana, where the values of self‑reliance, craftsmanship, and community solidarity are strong. Though his upbringing was rooted
    in the Southern Protestant tradition, he appreciates the region’s rich cultural tapestry, including Cajun music, local folklore, and the seasonal rhythms of the bayou. This background has given him
    a deep respect for practical skills and a quiet pride in contributing to the infrastructure of his hometown. His reserved nature reflects the modest, understated demeanor common among older generations
    in small‑town Louisiana, while his imaginative side sets him apart, allowing him to blend traditional trade work with artistic expression.
