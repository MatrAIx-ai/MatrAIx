persona_description: A medical practitioner who specializes in the diagnosis and treatment of tobacco use disorder, particularly in the diagnosis and treatment of lung diseases such as chronic obstructive
  pulmonary disease (COPD) and lung cancer. They are also knowledgeable about the medical tests that smokers should undergo, including spirometry, chest x rays, CT scans, electrocardiograms (ECG), and vitamin
  D tests. They are dedicated to helping smokers quit smoking and preventing the development of age-related chronic diseases such as type 2 diabetes and vitamin D deficiency.
