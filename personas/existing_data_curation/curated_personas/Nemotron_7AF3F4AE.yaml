    ''Participating in book clubs'']'
  career_goals: Frances aims to advance into a store management role within the next two years, emphasizing the integration of artistic concepts into retail environments. She plans to earn a professional
    certification in visual merchandising and eventually transition to a regional visual merchandising position where she can influence store design across multiple locations. Long‑term, she dreams of opening
    her own boutique‑gallery that showcases emerging artists alongside curated lifestyle products, while also mentoring younger retail staff and spearheading community art initiatives through her workplace.
