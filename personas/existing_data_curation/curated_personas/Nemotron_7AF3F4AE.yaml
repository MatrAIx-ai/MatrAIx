personas:
  professional: Frances Canet, a seasoned retail visual merchandiser in New York City, leverages their curiosity, meticulous inventory control, POS expertise, team training, and conflict‑resolution skills,
    and they design art‑inspired store displays that boost sales while fostering a collaborative, harmonious staff environment.
  sports: Frances Canet, an avid yoga practitioner who also joins the Brooklyn Flow Yoga studio for weekly sessions, cheerfully follows the New York Knicks, Mets, and Rangers, and they occasionally play
    in the Manhattan Kickers adult soccer league during the spring.
  arts: Frances Canet, a watercolor enthusiast and frequent visitor to NYC galleries, draws inspiration from artists such as Yayoi Kusama and Kehinde Wiley, immerses themselves in contemporary poetry from
    Ocean Vuong, enjoys live performances by Alicia Keys and indie theater productions featuring Lin‑Manuel Miranda, and they let these experiences inform their own creative pursuits.
  travel: Frances Canet, who blends meticulous itineraries with a love for spontaneous discovery, has explored the historic streets of Boston, the art‑laden neighborhoods of Montreal, and the scenic trails
    of the Adirondacks, and they dream of a future cultural immersion trip to Barcelona’s Gothic Quarter and Kyoto’s traditional tea houses.
  culinary: Frances Canet, a confident home chef, loves crafting Thai green curry with fresh lemongrass, Mexican mole with ancho chilies, and Italian risotto enriched with Arborio rice and Parmigiano‑Reggiano,
    often pairing dishes with locally sourced heirloom tomatoes and house‑made sourdough for their weekly dinner parties, and they enjoy experimenting with ingredients like cardamom and harissa to keep
    the menu exciting.
  core: Frances Canet navigates life as a charismatic curator of both retail spaces and social circles, balancing meticulous organization with spontaneous art‑inspired flair, even if they occasionally over‑schedule
    themselves and can’t resist humming a new playlist while restocking shelves.
background:
  cultural: Frances is a White American who grew up in Valley Stream, a suburban community bordering the culturally diverse borough of Queens, New York. Her family heritage includes Northern European roots,
    primarily Irish and German, but she has been shaped by the mosaic of cultures surrounding her—exposed to a variety of languages, cuisines, and artistic traditions. This environment fostered her openness
    to new ideas and unconventional thinking, while her involvement in local festivals and community art projects reflects her cooperative and considerate nature.
