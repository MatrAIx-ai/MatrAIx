persona_description: A pediatrician and researcher who is interested in the health and wellbeing of teenagers, particularly in relation to their body composition and health indicators. They are likely to
  be familiar with the concept of body mass index (BMI) and its limitations in assessing body fat levels in adolescents. They may also have expertise in the use of other measures to assess body fat, such
  as waist circumference. They may be involved in research on the use of these measures to screen overweight and obese adolescents and may have published findings on the importance of waist circumference
  in predicting health outcomes. They may have a background in medical genetics or have expertise in the study of genetic factors that contribute to body composition and health.
