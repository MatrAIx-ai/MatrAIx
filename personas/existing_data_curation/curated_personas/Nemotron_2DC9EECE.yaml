  career_goals: Although not currently in the formal workforce, Katlyne aims to channel her sociable nature and practical curiosity into leading a community garden project that offers workshops on sustainable
    living. She plans to obtain a caregiver certification to support senior neighbors and family members, and to mentor younger volunteers at the local library’s after‑school program. Long‑term, she hopes
    to document her experiences in a blog or memoir that celebrates Midwestern heritage and the value of flexible, community‑oriented living.
