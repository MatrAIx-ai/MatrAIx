personas:
  professional: Joanna Sutton, an experienced elevator technician with fifteen years of hands‑on expertise in installing, maintaining, and troubleshooting elevators and escalators across the San Joaquin
    Valley, blends meticulous schematic reading with a practical, cooperative mindset, positioning herself as the reliable go‑to for building managers while pursuing a Master Technician certification that
    satisfies her craving for structure without sacrificing flexibility.
  sports: Joanna Sutton enjoys low‑key fitness activities such as weekend hikes along the Mokelumne River Trail and occasional pick‑up basketball games with the Lodi Community Recreation League, roots for
    the Sacramento Kings and the San Francisco 49ers, and belongs to the Lodi Hiking Club, preferring steady cardio over high‑intensity workouts while appreciating the seasonal rhythms of the valley.
  arts: Joanna Sutton nurtures her creative side through monthly knitting circles, nature photography inspired by Ansel Adams, and a fondness for folk musician John Denver, often displaying her hand‑knit
    scarves and framed vineyard shots at the local potluck, which blends her love of practical handiwork with artistic appreciation.
  travel: Joanna Sutton favors spontaneous road trips that combine vineyard tours in Napa, scenic hikes in Yosemite, and weekend stays at Lake Tahoe cabins, planning just enough to secure lodging but leaving
    daily itineraries open, and she dreams of exploring the Tuscan countryside and the Hawaiian islands for their agricultural heritage and relaxed pace.
  culinary: Joanna Sutton delights in cooking Mediterranean‑inspired meals using home‑grown tomatoes, basil, and peppers—often preparing caprese salads, fresh salsa, and grilled bruschetta—while pairing
    them with locally produced Lodi wines, and she enjoys the occasional indulgence of a spicy chicken jambalaya she learned from a community cooking class.
  core: Joanna Sutton epitomizes a hands‑on problem‑solver who balances structured career ambition with a love for solitary garden work, spontaneous hikes, and occasional financial laxity, all wrapped in
    a quietly cooperative, slightly disorganized, yet resilient personality.
background:
  cultural: Joanna grew up in a modest, middle‑class family in the Central Valley, where the culture emphasizes hard work, self‑reliance, and close‑knit community ties. She identifies with mainstream American
    values, cherishing independence and practical problem‑solving. Local traditions such as the Lodi wine festivals, community potlucks, and a strong agricultural heritage have shaped her appreciation for
    seasonal cycles and collaborative neighborhoods. While she is broadly assimilated into American culture, she also respects the diverse backgrounds of her neighbors, fostering an inclusive and considerate
    outlook.
attributes:
  skills: '[''Elevator and escalator installation'', ''Mechanical troubleshooting'', ''Electrical diagnostics'', ''Blueprint and schematic reading'', ''Safety compliance (OSHA and local codes)'', ''Customer
    communication'', ''Preventive maintenance scheduling'', ''Service documentation and reporting'', ''Basic welding and metal fabrication'', ''Team coordination on construction sites'']'
  hobbies: '[''Backyard gardening'', ''Hiking on local trails'', ''Landscape photography'', ''Reading technical DIY manuals and mystery novels'', ''Knitting in a small circle'', ''Volunteering at the Lodi
    Community Food Bank'']'
  career_goals: Joanna aims to obtain a Master Technician certification through the National Association of Elevator Contractors within the next two years, which will open pathways to supervisory roles
    on larger projects. She also hopes to develop stronger organizational habits to manage more complex service contracts and eventually launch a small, locally‑based elevator retrofit business that focuses
    on energy‑efficient upgrades. Balancing her desire for structure with her need for flexibility, she wants to build a career that provides stable income while allowing her to set her own schedule and
    maintain a healthy work‑life balance after her divorce.
