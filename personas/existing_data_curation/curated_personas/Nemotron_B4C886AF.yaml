  career_goals: Rosana hopes to graduate high school with a focus on health sciences. She plans to pursue a certified nursing assistant program, aiming to become a pediatric nursing aide who can provide
    reliable care for children. She values a stable, community-oriented career that offers a predictable schedule and practical responsibilities. She also considers a vocational path in culinary arts, hoping
    to combine her love for cooking with a reliable job in a kitchen. She intends to earn scholarships and give back to her neighborhood by mentoring younger kids through after-school programs.
