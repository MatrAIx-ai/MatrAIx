personas:
  professional: Rosana Exantus, a diligent middle-school student, channels her love of routine and teamwork into a budding role as a youth volunteer coordinator at the local community center, where they
    organize after-school arts and crafts sessions while maintaining meticulous attendance records.
  sports: Rosana Exantus plays midfield for the Riverdale Middle School soccer team, training twice a week and cheering for the professional women's club Chicago Red Stars, while also following the local
    high school Tigers football games as a weekend ritual.
  arts: Rosana Exantus spends evenings sketching vivid portraits of characters from their favorite YA series, while listening to R&B and hip-hop icons such as Beyonce, Kendrick Lamar, and J. Cole, and they
    volunteer to lead craft workshops for younger children at the community center.
  travel: Rosana Exantus prefers well-planned family trips that blend educational stops like the Smithsonian National Museum of Natural History in Washington, D.C. and the Grand Canyon with relaxed evenings
    at a beach resort in Florida, and they dream of exploring the historic streets of Paris during a future school exchange.
  culinary: Rosana Exantus enjoys preparing family comfort dishes such as homemade macaroni and cheese, baked chicken thighs, and collard greens seasoned with garlic and fresh basil, showcasing a moderate
    cooking skill level that balances a love for tradition with experimental tweaks like adding a pinch of smoked paprika.
  core: Rosana Exantus is a routine-oriented teen who balances organized school responsibilities, community volunteering, soccer, and cooking, yet occasionally procrastinates on chores and indulges in late-night
    marathon reading sessions.
background:
  cultural: Rosana’s cultural background is rooted in her African-American family’s history in the Pacific Northwest. Her grandparents moved to Portland during the 1970s, and the family maintains traditions
    such as celebrating Juneteenth, attending local Black History Month events, and participating in the church youth group that emphasizes service and community. Growing up in Multnomah County, she experiences
    both the close‑knit support of Portland’s Black community and the city’s broader multicultural environment, which nurtures her sense of pride, responsibility, and resilience.
