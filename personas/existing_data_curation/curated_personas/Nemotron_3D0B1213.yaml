personas:
  professional: Raven Johnston, a seasoned CDL driver with a decade of route‑planning expertise, leverages meticulous logistical acumen and an artist’s eye for detail to ensure on‑time deliveries while
    nurturing mentorship among fellow drivers, balancing strict compliance with adaptable problem‑solving.
  sports: Raven Johnston stays active through seasonal deer hunts and weekend lake fishing, trains at a local CrossFit box to maintain core strength for long‑haul driving, and passionately supports the
    New Orleans Saints, New Orleans Pelicans, and LSU Tigers while belonging to the Louisiana Outdoorsmen Association.
  arts: Raven Johnston frequents Baton Rouge’s River Center Art Gallery and New Orleans’ French Market, drawing inspiration from the murals of George Rodrigue and the zydeco rhythms of Clifton Chenier,
    while dedicating evenings to sketching river scenes and watercoloring Cajun flora, and they keep a curated playlist of B.B. King, The Avett Brothers, and contemporary folk singer Phoebe Bridgers for
    creative focus.
  travel: Raven Johnston plans road trips on a loose schedule, relishing sunrise detours over the Mississippi Delta and spontaneous stops in towns like Clarksdale, Natchez, and Lafayette, while dreaming
    of a future artistic roadshow through Austin, Asheville, and the Oregon coast, all balanced against the modest budget of a single‑truck lifestyle.
  culinary: Raven Johnston enjoys a robust palate for Southern fare—sipping jambalaya with Andouille sausage, savoring crawfish étouffée, and grilling catfish with a lemon‑cajun rub—while boasting an intermediate
    skill in stovetop gumbo, often sourcing fresh local herbs like tarragon and parsley at farmer’s markets.
  core: Raven Johnston fuses a truck‑driver’s precision with an artist’s curiosity, habitually snapping sunrise photos while humming B.B. King, and despite a stubborn streak in scheduling, they cherish
    mentoring new drivers and dreaming of a mobile gallery on wheels.
background:
  cultural: Raven is a white Southern American who grew up in Wilson, a small town in East Feliciana Parish, Louisiana. His family background is rooted in the working‑class traditions of the region, with
    an emphasis on self‑reliance, church community, and local high‑school sports culture. While he identifies primarily with mainstream Southern values, he has been exposed to the area’s diverse cultural
    tapestry, including Cajun music, Creole cuisine, and the storytelling heritage of the Mississippi River corridor. This blend of modest rural upbringing and exposure to varied artistic expressions informs
    his open‑minded curiosity and appreciation for both tradition and unconventional ideas.
attributes:
  skills: '["Commercial truck operation (CDL)", "Route optimization and GPS navigation", "Vehicle inspection and basic maintenance", "Customer relationship management", "Sales negotiation and upselling",
    "Inventory and delivery documentation", "Time management and deadline adherence", "Problem‑solving under pressure", "Adoption of new logistics technology", "Artistic eye for visual presentation"]'
  hobbies: '["Roadside photography", "Sketching and watercolor painting", "Visiting art galleries and folk‑art fairs", "Seasonal hunting trips", "Freshwater fishing", "Listening to blues and zydeco music",
    "Reading speculative fiction and tech magazines", "Volunteering at community charity events", "Exploring new routes and small towns"]'
  career_goals: Raven’s primary career ambition is to transition from driver‑sales roles into a logistics management position within a regional transportation firm, where he can oversee fleet scheduling,
    driver mentorship, and process improvement. To support this goal, he plans to complete his GED and pursue an associate degree in logistics or supply‑chain management. Over the next five years, he hopes
    to obtain a certified logistics professional credential and, eventually, launch his own modest trucking operation that doubles as a mobile gallery for local artists, blending his love of art with his
    expertise in transportation. He also aims to mentor younger drivers from his community, helping them earn certifications and develop professional habits.
