personas:
  professional: An ambitious aspiring architect with a solid foundation in drafting and proficiency in AutoCAD, SketchUp, and basic Revit, Rana Mirza channels their curiosity and cooperative nature into
    collaborative design projects that blend sustainable strategies with community-focused artistic installations.
  sports: Rana Mirza fuels their love for the outdoors by hiking the Blue Ridge foothills with the local Blue Ridge Trek Tribe club each weekend, while cheering on the Philadelphia Eagles in the fall and
    catching occasional Philadelphia 76ers games during the basketball season.
  arts: Rana Mirza channels artistic curiosity through charcoal drawings and urban photography, drawing inspiration from Ansel Adams’ black-and-white landscapes, Edward Hopper’s moody interiors, and Philadelphia’s
    vibrant Mural Arts Program, and regularly attends exhibitions at the Philadelphia Museum of Art.
  travel: Rana Mirza prefers structured itineraries mixed with spontaneous detours, having backpacked through Barcelona’s modernist districts and explored the historic town of Bath, England, while dreaming
    of a future study tour to Kyoto’s temples and Copenhagen’s sustainable housing projects.
  culinary: Rana Mirza enjoys crafting plant-forward meals such as quinoa-black-bean bowls and mushroom risotto, perfecting a pour-over coffee ritual each morning, yet occasionally succumbs to late-night
    pepperoni pizza when deadlines loom, reflecting a moderate cooking confidence balanced by indulgent shortcuts.
  core: Rana Mirza is a curiosity-driven architecture student who balances disciplined sketching schedules with spontaneous art walks, has a habit of losing track of time over new renderings, and believes
    that sustainable design can revitalize community spirit.
background:
  cultural: Rana grew up in a white, middle-class family in Mohnton, Pennsylvania, surrounded by the region’s mix of suburban life and the historic Pennsylvania Dutch heritage. She was raised with an appreciation
    for craftsmanship, reflected in local barn restorations and community festivals. While her family values modesty and community service, she has been exposed to diverse artistic influences through school
    programs and regional museums, shaping her open-minded approach to design and cultural expression.
attributes:
  skills: '[''AutoCAD'', ''SketchUp'', ''Revit (basic)'', ''Hand sketching'', ''Spatial analysis'', ''Sustainable design principles'', ''Project coordination'', ''Team collaboration'', ''Research and concept
    development'', ''Visual presentation'']'
  hobbies: '[''Painting'', ''Charcoal drawing'', ''Photography'', ''Visiting art galleries'', ''Hiking'', ''Reading architecture journals'', ''Yoga'', ''Volunteering at community art workshops'']'
  career_goals: Rana plans to enroll in a Bachelor of Architecture program within the next year, aiming to earn her professional license by her late twenties. She aspires to specialize in environmentally
    responsible design that integrates art and community spaces, with a long-term ambition to open her own practice focused on revitalizing historic towns in Pennsylvania. She also hopes to travel internationally
    to study diverse architectural traditions and eventually contribute to public-realm projects that foster cultural dialogue.
