  career_goals: Natasha aims to move into a supervisory or lead‑operator position within the next three to five years, leveraging her hands‑on expertise and interpersonal strengths to foster a more collaborative
    production floor. She plans to obtain a certification in Lean Six Sigma to deepen her ability to drive efficiency and reduce waste. Long‑term, she envisions transitioning into a quality‑assurance or
    health‑and‑safety coordinator role, where she can shape policies that protect workers while promoting a culture of continuous learning. Additionally, she hopes to mentor younger employees, especially
    those from underrepresented backgrounds, and eventually launch a community‑focused workshop that offers vocational training for local residents.
