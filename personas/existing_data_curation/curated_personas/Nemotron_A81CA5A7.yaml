  career_goals: Shirley aspires to become an artist who illustrates books about animals and the natural world. In the near term, she hopes to win her school's art contest, learn watercolor techniques, and
    create a simple comic strip for her friends. She also dreams of working with animals someday, envisioning a future as a wildlife illustrator or a veterinarian who can combine her love for art and caring
    for creatures. Her long‑term ambition is to study environmental science and use her artistic talents to raise awareness about conservation.
