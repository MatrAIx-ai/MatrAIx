personas:
  professional: Shirley Lewis is a budding artist and storyteller who channels their curiosity into vivid sketches, LEGO creations, and short tales, while they responsibly fulfill after‑school art club
    duties and balance a growing portfolio of colorful projects.
  sports: Shirley Lewis enjoys weekend hikes in the neighborhood park, they play on the Cedar Grove Cubs youth soccer team, cheer for the Chicago Bulls and Chicago Cubs, and they balance active exploration
    with cozy indoor playtimes.
  arts: Shirley Lewis is a passionate young creator who idolizes Beatrix Potter’s illustration style, draws inspiration from Studio Ghibli’s “My Neighbor Totoro,” listens to Taylor Swift’s acoustic tracks
    while painting, and they collaborate on mural projects in their after‑school art club.
  travel: Shirley Lewis loves family road trips to the Grand Canyon, weekend camping at nearby state parks, day‑long visits to Disney World, and they dream of strolling through Paris’s Montmartre to sketch
    the Eiffel Tower’s silhouette.
  culinary: Shirley Lewis adores mac and cheese with sharp cheddar, strawberry shortcake topped with fresh berries, helps their parent whisk together simple pancakes, and they often experiment with making
    friendship bracelets shaped like tiny fruit slices as garnish for homemade fruit salads.
  core: Shirley Lewis is a quietly inquisitive 8‑year‑old who transforms everyday moments into vivid art, they hoard stray LEGO pieces, and they occasionally forget bedtime in pursuit of an extra story.
background:
  cultural: Shirley grows up in Sun Prairie, a suburban community in Dane County, Wisconsin, within a predominantly white, middle‑class environment. Her family reflects the region’s Midwestern heritage,
    with German and Scandinavian ancestry common among many local families. The community emphasizes modesty, friendliness, and participation in school and neighborhood events. She celebrates holidays such
    as Thanksgiving, Christmas, and regional festivals like the Sun Prairie Harvest Festival, often involving family traditions of baking, craft-making, and outdoor activities. Local influences include
    a love for nature walks in the nearby lake and forest areas, appreciation for folk arts like quilting and barn paintings, and an exposure to public school programs that encourage both academic achievement
    and artistic expression. This cultural setting fosters her sense of cooperation, community harmony, and curiosity about the world.
