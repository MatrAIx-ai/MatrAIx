persona_description: A forensic investigator who specializes in computer forensics, crime scene investigations, and fraud investigations. They have a deep understanding of intelligence-gathering techniques,
  accounting, business, and communication skills and can provide information and evidence that can be used by attorneys involved in criminal and civil investigations. They have experience working with a
  wide range of clients, including individuals, companies, and employers, and are able to turn up information from computers, cell phones, and hard drives, such as deleted and hidden data, emails (even
  deleted emails), websites visited, and files downloaded or transferred. They are able to uncover deleted emails and data, computer investigations, and crime scene investigations, and are able to provide
  information and evidence that can be used by attorneys involved in criminal and civil investigations. They are able to gather fingerprints, blood, bodily fluids, and other evidence found at the crime
  scene in order to solve a crime or even determine whether a crime has taken place. They are able to provide information and evidence that can be used by attorneys involved in criminal and civil investigations.
