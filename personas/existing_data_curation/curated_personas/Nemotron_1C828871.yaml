personas:
  professional: Ghazal Craver, a twelve‑month‑old who already shows a curious knack for arranging blocks by color and shape, delights in the organization of their play area while flexibly improvising new
    structures, and they often experiment with unconventional designs, hinting at a future problem‑solver with an open mind to unconventional ideas.
  sports: Ghazal Craver enjoys energetic toddler gymnastics classes at the local community center and loves watching the city’s minor league baseball team, the River Rapids, with their family, and they
    often cheer loudly while attempting to mimic the team's celebratory chants during playtime.
  arts: Ghazal Craver is drawn to bright picture books by authors like Eric Carle, sways to gentle lullabies performed by singer Jewel, and they frequently create abstract finger paintings using non‑toxic
    paints, reflecting an early appreciation for visual and auditory art.
  travel: Ghazal Craver, a curious infant, enjoys short road trips to the nearby botanical garden and weekend visits to Grandma’s house in the countryside, and they giggle at the motion of the car, while
    parents plan future family vacations to child‑friendly destinations like Disney World and the seaside town of Carmel, balancing the desire for adventure with the need for routine.
  culinary: Ghazal Craver loves the smooth taste of mashed sweet potatoes and the mild spice of cinnamon‑sprinkled apple puree, often experimenting with new textures by smearing avocado on a soft rice cake,
    though they can be fussy about green vegetables and sometimes throw a fit when offered broccoli.
  core: Ghazal Craver is a bright, slightly anxious one‑year‑old who balances a love for colorful exploration with a knack for organizing toys, a lingering worry about losing cherished items, and a vivid
    imagination that they turn into tiny adventures.
background:
  cultural: Ghazal comes from a white, Midwestern American family in Lafayette, Indiana. Her cultural upbringing includes typical Midwestern values of community, modesty, and a strong emphasis on family
    gatherings. She often participates in local events such as county fairs, community art workshops, and church‑related activities. Her family encourages exposure to the arts through visits to local museums,
    library story hours, and seasonal celebrations that reflect both broader American traditions and regional Indiana customs.
