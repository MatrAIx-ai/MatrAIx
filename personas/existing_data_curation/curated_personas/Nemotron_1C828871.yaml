  career_goals: Though only a toddler, Ghazal’s caregivers notice a strong inclination toward creative expression and helping others. They envision a future where she may pursue interests in the arts—such
    as dance or visual art—or in nurturing roles like teaching or community outreach. Her growing curiosity and love for shared experiences suggest she will aim to explore, learn, and eventually contribute
    to her community in a caring, imaginative way.
