persona_description: A neuroscientist who specializes in the study of the brain's nerve connections and their role in controlling the sense of smell. She has a background in physiology and neurobiology
  and is currently leading a study to identify the regions of the brain that produce new neurons from stem cells and how they are targeted for degeneration in diseases like Parkinson's Disease. Her work
  involves tracing the path of dopamine neurons from the subventricular zone to their origin in the midbrain using fluorescent dye and visualizing the results under a confocal microscope. She is also interested
  in the role of dopamine in regulating the subventricular zone and the connections between the subventricular zone and the midbrain. Her research has led to the discovery of a new region of the brain that
  is involved in controlling the sense of smell and the potential connection between Parkinson's Disease and this region.
