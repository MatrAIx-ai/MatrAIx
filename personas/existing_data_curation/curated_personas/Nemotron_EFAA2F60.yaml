  hobbies: '["Urban gardening and herb cultivation", "Cooking and experimenting with health‑focused Mexican recipes", "Reading Mexican history, biographies, and self‑improvement literature", "Participating
    in a book club", "Folk dance classes (e.g., folklórico, salsa)", "Volunteering for cultural festivals and community events", "Walking along the lakefront and visiting museums"]'
  career_goals: Although Gloria is not formally employed, she aspires to deepen her impact as a community leader. She aims to volunteer as a senior liaison for a local nonprofit, assisting Mexican-American
    elders with health-care navigation and access to resources. She plans to develop a series of intergenerational cooking workshops that preserve Mexican culinary traditions while teaching nutrition-focused
    adaptations. Gloria also hopes to enroll in a community college certificate program in gerontology or social services to formalize her knowledge, allowing her to mentor younger volunteers and perhaps
    advise city officials on culturally appropriate senior services. Ultimately, she seeks to leave a lasting legacy of cultural preservation and enhanced well-being for older adults in Chicago’s Mexican
    community.
