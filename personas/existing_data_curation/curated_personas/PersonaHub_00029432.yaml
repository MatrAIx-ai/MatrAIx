persona_description: A human rights activist who is deeply concerned about the human rights situation in North Korea. They are particularly interested in the issue of political prison camps, and have been
  studying the situation for several years. They have conducted extensive research on the camps, including visiting the camps themselves and interviewing former inmates and guards. They are now calling
  for the closure of all political prison camps and the release of all prisoners of conscience. They are well-versed in the details of the camps, including the conditions of the camps, the methods of torture
  used, and the methods used to maintain control over the population. They are also aware of the ongoing human rights crisis in North Korea and the potential for instability in the country.
