  career_goals: Although retired from formal employment, Mary is driven to leave a lasting imprint on Providence’s cultural landscape. She aims to launch a senior‑led art mentorship program that pairs retired
    artists with youth, and to serve on the board of the Providence Museum of Art to influence exhibition programming. Mary also harbors the ambition to complete and publish a memoir that intertwines her
    personal journey with the city’s evolving history, and to become a regular guest lecturer for the local community college’s adult education courses in American literature and public history. Additionally,
    she seeks to earn a certification in archival preservation to support local historical societies, and to lead a quarterly public‑history walking tour that highlights overlooked neighborhoods, cementing
    her role as a community storyteller.
