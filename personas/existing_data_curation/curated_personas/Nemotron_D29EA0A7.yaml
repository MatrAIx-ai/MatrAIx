personas:
  professional: Mary Goss, a retired arts and humanities scholar turned community cultural strategist, leverages her research acumen, digital archiving skills, and competitive edge to design inclusive museum
    programs, lead senior mentorship workshops, and host engaging public‑history tours, and they thrive on turning archival material into compelling narratives for Providence's civic life.
  sports: Mary Goss, an avid participant in low‑impact fitness, jogs along the East Side historic promenade each morning, practices yoga three times per week, joins water‑aerobics classes at the Providence
    Community Center, cheers on the Providence Bruins during hockey season and the New England Patriots on Sundays, and they compete in a local bridge league that doubles as a strategic mental sport.
  arts: Mary Goss, a lifelong patron of the arts, attends Trinity Repertory Company productions ranging from contemporary dramas by August Wilson to classic Shakespeare, explores current exhibits at the
    RISD Museum featuring artists like John Singer Sargent, curates pop‑up history exhibitions in local libraries, and they host a book‑club discussion of historical fiction by Philippa Gregory, balancing
    scholarly analysis with spirited debate.
  travel: Mary Goss, an adventurous senior traveler, frequently takes weekend day trips to Newport to tour the Gilded Age mansions, enjoys annual pilgrimages to the historic Freedom Trail in Boston, dreams
    of exploring the archives of the British Library in London, and they plan trips using senior discount programs and a detailed itinerary that leaves room for spontaneous photo‑opportunities in coastal
    New England towns.
  culinary: Mary Goss, an enthusiastic home cook with moderate skill, loves preparing New England clam chowder with fresh clams, sweet corn succotash, and homemade rosemary focaccia, experiments with seasonal
    pumpkin soup infused with sage, and they relish dining out at the historic Providence waterfront restaurant Hemenway’s for its fresh seafood platter featuring lobster and scallops.
  core: Mary Goss, a fiercely curious and competitive community archivist, blends rigorous research with theatrical flair, leads trivia nights with a sharp eye for detail, and they never start a day without
    a cup of strong black coffee and a crossword puzzle.
background:
  cultural: Mary was born and raised in Providence, Rhode Island, into a white New England family with deep Irish‑Catholic roots. Growing up during the post‑war boom, she experienced the city’s transition
    from a manufacturing hub to a center for arts and education, which nurtured her love for history, literature, and community engagement. Her upbringing in a close‑knit neighborhood exposed her to the
    multicultural tapestry of Providence’s Italian, Portuguese, and Caribbean communities, instilling an appreciation for diverse cultural expressions while maintaining a strong sense of New England self‑reliance.
    Her graduate studies in arts and humanities at a regional university further cemented her scholarly approach to cultural preservation. Today, Mary’s identity is shaped by this blend of traditional New
    England values—pragmatism, civic duty, and a reverence for local heritage—combined with a lifelong curiosity about the broader world.
