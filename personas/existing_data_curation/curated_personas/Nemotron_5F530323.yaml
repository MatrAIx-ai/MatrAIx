  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Home renovation'', ''Reading historical nonfiction'', ''Gardening'', ''Community fairs'', ''Journal writing'']'
  career_goals: Jay aims to transition from first‑line supervision to a full‑service construction manager within the next five years, pursuing certifications such as the Certified Construction Manager (CCM)
    and OSHA 30‑hour training. He plans to lead larger commercial projects, ultimately establishing his own contracting firm to provide a stable future for his family. Improving his stress‑management techniques
    and work‑life balance is also a priority.
