persona_description: A database administrator or a data analyst who frequently works with SQL and ClickHouse, especially in the context of data analysis and data warehousing. They are familiar with the
  standard SQL JOIN types and the various join types available in ClickHouse, including LEFT SEMI JOIN, RIGHT SEMI JOIN, LEFT ANTI JOIN, RIGHT ANTI JOIN, LEFT ANY JOIN, RIGHT ANY JOIN, and INNER ANY JOIN.
  They are adept at using ASOF JOIN to join records that have no exact match, and are familiar with the special column requirements for ASOF JOIN. They are also aware of the special column requirements
  for LEFT SEMI JOIN, RIGHT SEMI JOIN, LEFT ANTI JOIN, RIGHT ANTI JOIN, LEFT ANY JOIN, and INNER ANY JOIN.
