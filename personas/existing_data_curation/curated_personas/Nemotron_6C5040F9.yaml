  career_goals: Looking ahead, Ingrid aspires to become a scientist or engineer who can develop practical solutions for environmental challenges in her community. She hopes to pursue a STEM pathway in high
    school, earn a scholarship, and eventually study environmental engineering or biomedical research, with the goal of creating affordable technologies that benefit under‑served families, especially within
    the Mexican‑American community. Her competitive nature fuels a desire to excel academically and win science fair awards, while her pragmatic side keeps her focused on real‑world impact.
