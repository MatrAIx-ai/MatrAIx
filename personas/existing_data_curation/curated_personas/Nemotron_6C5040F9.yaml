personas:
  professional: Ingrid Villarreal, an aspiring eleven‑year‑old scientist‑artist, blends a practical knack for turning backyard experiments into clear, comic‑style diagrams with a boundless curiosity, though
    they often misplace lab notes in their chaotic workspace.
  sports: Ingrid Villarreal, a forward for the Willowbrook Youth Soccer Club, spends summer evenings cheering on Los Angeles FC and idolizing Lionel Messi’s playmaking, yet they sometimes let their competitive
    drive overshadow teamwork, resulting in occasional on‑field friction.
  arts: Ingrid Villarreal draws inspiration from the bold panels of Stan Lee and the whimsical worlds of Hayao Miyazaki, while the rhythmic beats of J Balvin and the sentimental ballads of Luis Miguel soundtrack
    their sketch sessions, and they often experiment with mixing comic techniques to forge a vibrant yet eclectic artistic voice.
  travel: Ingrid Villarreal favors spontaneous family road trips—like the recent hike through the Grand Canyon and a taco‑filled weekend in Oaxaca—yet they dream of a future adventure to Tokyo’s Akihabara
    district to explore manga shops and LEGO exhibitions, balancing limited vacation time with a love for cultural immersion.
  culinary: Ingrid Villarreal loves whipping together homemade al pastor tacos and experimenting with cinnamon‑sugar churros, proudly perfecting salsa verde while they still fumble pastry dough, often ending
    up with slightly over‑cooked cookies but a delighted palate.
  core: Ingrid Villarreal, an eleven‑year‑old LEGO architect and comic‑creator, balances fierce curiosity and a competitive spark with a delightfully messy workspace and a habit of postponing homework until
    the last minute, and they often find inspiration in the chaos around them.
background:
  cultural: Ingrid's Mexican heritage is a central part of her identity. She grows up in a bilingual household in San Bernardino, where Spanish is spoken daily alongside English at school. Family traditions
    such as celebrating Día de los Muertos, preparing tamales, and attending Catholic festivals shape her worldview. Her community includes many Latino families, and she often participates in cultural events
    at the local community center, which fosters a strong sense of belonging and motivates her desire to give back to her community through future STEM work.
