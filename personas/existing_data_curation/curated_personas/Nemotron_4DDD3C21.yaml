personas:
  professional: Lavetra Franklin, a 32‑year‑old librarian and instructional designer, uses their meticulous cataloging, digital curation, and conflict‑resolution skills to craft inclusive, technology‑enhanced
    programs that weave local cultural histories into community learning, embodying their calm, methodical and curiosity‑driven approach.
  sports: Lavetra Franklin embraces fitness through weekly yoga sessions, weekend hikes in Red Rock Canyon, and casual trail runs with the Red Rock Trail Runners club, while cheering for the Vegas Golden
    Knights, Las Vegas Raiders, and Vegas Aces when they catch a game.
  arts: Lavetra Franklin fuels their creative practice by writing short stories, photographing urban vistas inspired by Sebastião Salgado, shaping clay on the wheel with techniques borrowed from Grayson
    Perry, and finding lyrical resonance in the spoken‑word performances of Amanda Gorman and the jazz improvisations of Brad Mehldau.
  travel: Lavetra Franklin blends literary pilgrimage with nature exploration, having trekked Zion National Park, visited the historic New York Public Library, and planning a summer itinerary that includes
    the Edinburgh Festival and the gardens of Versailles, all organized with detailed spreadsheets to allow quiet reading in café corners.
  culinary: Lavetra Franklin tends a rooftop herb garden of basil, thyme, and cilantro, then assembles methodical Mediterranean dishes like herb‑infused roasted vegetable quinoa bowls and simple caprese
    salads, while occasionally indulging in fresh sushi rolls and unwinding with chamomile‑mint tea.
  core: Lavetra Franklin merges calm, methodical precision with quiet curiosity, building inclusive library programs, nurturing a herb garden, and balancing disciplined budgeting with artistic splurges.
background:
  cultural: Lavetra identifies as African‑American and was raised in a close‑knit Black community in Las Vegas, where church, family gatherings, and cultural celebrations like Juneteenth and Black History
    Month played central roles. Her upbringing emphasized storytelling, oral history, and collective resilience, values she carries into her professional life. She draws inspiration from the Black literary
    canon and the vibrant cultural scene of Nevada’s African‑American neighborhoods, integrating these influences into her library programming and personal pursuits. Lavetra’s educational journey through
    a historically Black college for her arts and humanities degree reinforced her commitment to cultural preservation and advocacy.
attributes:
  skills: '[''Cataloging and classification'', ''Reference and research assistance'', ''Instructional design'', ''Curriculum development'', ''Digital archiving and metadata management'', ''Technology integration
    in library services'', ''Community outreach and program coordination'', ''Culturally responsive collection development'', ''Small‑group facilitation'', ''Conflict resolution and empathetic communication'']'
  hobbies: '[''Reading African‑American literature'', ''Creative writing (short stories and poetry)'', ''Researching local Black history'', ''Yoga and meditation'', ''Gardening (herb and succulent care)'',
    ''Small‑group book club participation'', ''Volunteering for after‑school literacy programs'', ''Hiking in Red Rock Canyon'', ''Urban photography'', ''Pottery and ceramic arts'']'
  career_goals: Lavetra aims to advance to a leadership role such as Library Director or Head of Educational Services within the Clark County Library System, where she can shape policy around inclusive
    collections and community engagement. She aspires to establish a permanent African‑American cultural archive in Las Vegas that documents local histories and oral traditions. Lavetra also plans to pursue
    a Master of Library Science to deepen her expertise in digital preservation and to mentor emerging librarians, especially women of color, fostering a more diverse profession. Her long‑term ambition
    is to become a recognized advocate for culturally responsive library programming at the state and national levels.
