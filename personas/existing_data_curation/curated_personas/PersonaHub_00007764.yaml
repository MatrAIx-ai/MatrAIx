persona_description: A researcher or scientist who is interested in the intersection of infectious disease ecology and environmental science, particularly in understanding how large-scale environmental
  changes can alter the risks of infectious diseases emerging in humans and animals. This person is likely to be knowledgeable about the interdisciplinary projects funded through the EID program and has
  a background in ecology, epidemiology, or a related field. They are interested in developing disease transmission theory, improving understanding of unintended health effects of development projects,
  increasing capacity to forecast outbreaks, and improving understanding of how diseases emerge and re-emerge.
