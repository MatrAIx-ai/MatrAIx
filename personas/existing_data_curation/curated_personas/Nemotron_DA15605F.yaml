  career_goals: Tinsley dreams of becoming a scientist or astronaut, fascinated by how things work and eager to explore space. She aims to excel in school, win science fair competitions, and earn a reputation
    as the top student in her class. She also hopes to lead a future robotics or environmental club, combining her curiosity with practical problem‑solving.
