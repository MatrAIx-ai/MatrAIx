    translation and interpretation"]'
  hobbies: '["Traditional Colombian cooking", "Listening to Colombian music (cumbia, vallenato, salsa)", "Social dancing", "Church participation and volunteer service", "Balcony gardening", "Knitting and
    sewing", "Playing dominos", "Watching telenovelas", "Attending Houston cultural festivals", "Smartphone photography for community documentation"]'
  career_goals: Although retired from formal employment, Aymee is driven to remain an influential figure in her community. She aims to preserve and promote Colombian cultural heritage in Houston by establishing
    a regular community kitchen where seniors can share meals and stories. She aspires to mentor younger Latina women in cooking, event organization, and bilingual communication, positioning herself as
    a senior advisor on multicultural outreach for local nonprofits. Aymee also plans to enhance her digital skills to launch a small online presence featuring Colombian recipes and cultural anecdotes,
    hoping this will generate modest supplemental income and broaden her reach. Maintaining good health and financial stability remains a practical goal, as does the personal dream of visiting her hometown
    in Colombia for a family reunion.
