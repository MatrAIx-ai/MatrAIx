personas:
  professional: Aymee Verdura, a seasoned community organizer, blends her bilingual fluency with meticulous budgeting and event‑planning expertise to orchestrate vibrant cultural festivals and senior cooking
    workshops, where her disciplined, talkative disposition and competitive curiosity ensure every detail is both innovative and practical.
  sports: Aymee Verdura stays active by attending weekly low‑impact aerobics classes at the senior center, joining a local walking club that meets for early‑morning strolls around Hermann Park, and cheering
    on the Houston Astros and Houston Dynamo on game nights, where her competitive spirit fuels lively game‑day debates.
  arts: Aymee Verdura immerses herself in the rhythms of cumbia and vallenato, dancing to the sounds of Carlos Vives and Juanes at community gatherings, while also enjoying telenovelas like La Usurpadora
    and attending occasional performances by the Houston Ballet, reflecting her love for vibrant musical and theatrical traditions.
  travel: Aymee Verdura prefers budget‑friendly, well‑planned trips, often joining family road trips to the Gulf Coast islands or taking short flights to the Caribbean coastal city of Barranquilla for reunions,
    while also savoring cultural festivals in New Orleans and the lively streets of Mexico City as part of her semi‑retired wanderlust.
  culinary: Aymee Verdura, an adept home chef, delights in crafting sancocho, arepas, and empanadas with locally sourced plantains, yucca, and fresh cilantro, often adding a Tex‑Mex twist like chipotle
    peppers to keep meals flavorful yet cost‑effective, and she enjoys sharing these creations at community potlucks and her emerging online recipe blog.
  core: Aymee Verdura is a fiercely organized, talkative community matriarch who balances a competitive love of dominoes and meticulous event budgeting with a curious appetite for new culinary twists, all
    while occasionally slipping into skeptical musings about modern gadgets.
background:
  cultural: Aymee was born in Colombia and carries the vibrant traditions of its Caribbean coast, including a love for rhythmic music, festive communal meals, and strong family bonds. After immigrating
    to Houston, she integrated into the city’s thriving Latino community while preserving her Colombian identity. She maintains Spanish as her primary language at home and celebrates Colombian holidays
    such as Carnaval de Barranquilla and Día de la Familia with relatives and neighbors. Her Catholic faith, shaped by Colombian religious customs, anchors her involvement in the local parish. In Houston,
    she embraces the multicultural environment, exchanging culinary ideas with neighbors from across Latin America and participating in citywide events that highlight Hispanic heritage. This blend of Colombian
    roots and Texan influences informs her worldview, her social interactions, and her commitment to cultural continuity within the diaspora.
attributes:
  skills: '["Bilingual Spanish/English communication", "Community event planning and coordination", "Traditional Colombian cooking and recipe development", "Household budgeting and financial management",
