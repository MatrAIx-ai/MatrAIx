persona_description: A chemist who specializes in electrochemistry, particularly the study of the behavior of electrolytes and the movement of charges through a galvanic cell. They are knowledgeable about
  the principles of electrochemistry and the mathematical models used to describe the flow of charges through a power supply. They are skilled in interpreting experimental data and using theoretical models
  to explain the observed phenomena. They are also familiar with the concepts of charge, particularly the concept of an electron and how it relates to the flow of charges through a galvanic cell.
