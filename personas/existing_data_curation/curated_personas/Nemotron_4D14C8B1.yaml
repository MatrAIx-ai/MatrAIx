personas:
  professional: Jacqueline Lubelski, a seasoned HR professional with over three decades of experience, channels their curiosity and sociable energy into crafting inclusive workplace cultures, designing
    innovative talent acquisition strategies, and facilitating engaging town-hall workshops, all while their relaxed, somewhat disorganized planning style keeps them adaptable to shifting employee needs.
  sports: Jacqueline Lubelski, an avid walker who strolls the Columbia River each morning, cheers passionately for the Portland Timbers during the soccer season, participates in a senior pickleball league
    on Saturdays, and enjoys occasional community rowing outings when the weather permits.
  arts: Jacqueline Lubelski, a devoted patron of the Pacific Northwest arts scene, frequents the Portland Art Museum to view exhibitions by Yayoi Kusama and local beadwork artists, attends community theater
    productions of Edward Albee's plays, and curates playlists that swing from Fleet Foxes to Nina Simone for their potluck gatherings.
  travel: Jacqueline Lubelski, an easy-going traveler who prefers spontaneous weekend getaways over rigid itineraries, has explored the lantern festivals of Chiang Mai, the jazz cafés of New Orleans, and
    dreams of wandering the historic neighborhoods of Lisbon while savoring local pastel de nata.
  culinary: Jacqueline Lubelski, a self-taught home cook who blends comfort with global flavors, often prepares miso-glazed salmon with roasted asparagus and quinoa, whips up fresh basil pesto for whole-grain
    pasta, and never passes up the seasonal farm-to-table cheese boards at the local farmers' market.
  core: Jacqueline Lubelski, a charismatic HR veteran with a zest for art, a love of casual river walks, and a habit of delaying bill payments until the last minute, merges inclusive leadership with spontaneous
    creativity.
background:
  cultural: Jacqueline grew up in a middle‑class American family in the Pacific Northwest, shaped by the cultural shifts of the 1960s‑70s. Her upbringing emphasized education, community involvement, and
    a respect for diverse perspectives. As a white American, she shares the regional traditions of valuing independence, outdoor recreation, and civic participation, while her lifelong curiosity has led
    her to embrace multicultural arts and ideas. This blend of regional heritage and openness informs her collaborative, inclusive, and socially engaged outlook.
