    the Columbia River", "Photography of urban and natural scenes", "Mentoring younger professionals through a local networking group"]'
  career_goals: Looking ahead, Jacqueline aims to transition into a senior strategic HR advisory role where she can shape inclusive workplace cultures and champion employee well‑being. She plans to complete
    a graduate‑level certificate in Diversity and Inclusion to deepen her expertise. As she approaches retirement, she hopes to mentor emerging HR professionals, establish a community‑focused consulting
    practice for non‑profits, and occasionally speak at regional conferences on collaborative leadership and creative HR solutions.
