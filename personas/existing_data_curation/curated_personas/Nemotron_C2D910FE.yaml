  career_goals: Kimoanh aims to move into a supervisory role within the facilities department of her current employer, where she can set higher cleanliness standards and mentor a larger team. She is preparing
    to obtain a Certified Professional Cleaner credential and plans to launch a small, eco-focused cleaning service that serves local businesses and residential clients in Charlotte. Long-term, she hopes
    to complete a bachelor’s degree in facilities management to transition into a facilities‑operations manager position, securing a stable income that supports her family’s savings goals.
