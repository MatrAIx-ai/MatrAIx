  career_goals: Moo often talks about becoming a firefighter who helps people, a storyteller who shares Lumbee legends, a park ranger who protects the woods near Rowland, or an artist who paints bright
    pictures of nature. He also dreams of being a soccer player because he loves running with friends. These ambitions reflect his love for helping others, his fascination with the outdoors, and his enjoyment
    of being the center of attention during play.
