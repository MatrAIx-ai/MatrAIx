personas:
  professional: Moo Khan, a budding preschool architect, builds elaborate block towers and orchestrates playtime projects, channeling their natural curiosity and practical problem‑solving while delighting
    peers with confident explanations.
  sports: Moo Khan, an enthusiastic member of the local Little League soccer team, loves dribbling a tiny orange ball in the park, cheers loudly for the home side, and also enjoys tumbling classes at the
    community center, balancing structured practice with spontaneous dash‑around‑the‑yard games.
  arts: Moo Khan, a tiny fan of animated musicals, sings loudly to the soundtrack of "Frozen" while drawing vibrant pictures of Elsa and Olaf, and eagerly attends weekly storytime sessions where they imitate
    favorite characters, feeding their vivid imagination.
  travel: Moo Khan, a curious explorer who has visited the city zoo and a nearby beach, prefers trips with hands‑on activities like feeding giraffes or building sandcastles, and dreams of a future visit
    to Disneyland where they can meet beloved cartoon heroes.
  culinary: Moo Khan, a picky yet adventurous eater, devours macaroni‑and‑cheese with hidden peas, loves crunchy apple slices dipped in peanut butter, and insists on helping stir the batter for banana pancakes,
    though they occasionally hide candy in their pocket for later.
  core: Moo Khan, a talkative four‑year‑old who balances boundless curiosity with a surprising knack for tiny leadership, can turn a simple block‑building session into a lively, organized adventure while
    still sneaking a cookie when no one watches.
background:
  cultural: Moo is a member of the Lumbee community in Robeson County, North Carolina. His family blends traditional American Indian customs with everyday Southern life. He participates in tribal gatherings,
    learns about tribe history through oral storytelling, and watches drumming and dancing at local home‑coming events. The family also celebrates broader American holidays, but maintains a strong connection
    to Lumbee values of respect for elders, close‑knit community bonds, and a love of the natural landscape surrounding Rowland. His mixed surname reflects a multicultural household that includes Hispanic
    and South Asian influences, adding to a rich cultural tapestry that shapes his worldview.
