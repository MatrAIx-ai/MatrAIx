personas:
  professional: A budding LEGO architect, Tammy Deason channels their love of routine by faithfully rebuilding the same classic sets each weekend, yet they often abandon the instruction booklet to spontaneously
    craft elaborate new structures, showing a practical mind that balances the familiar with a burst of creative defiance while navigating the occasional chaos of misplaced bricks.
  sports: A soccer enthusiast, Tammy Deason kicks off with the River Valley Rockets youth league, cheerfully follows the U.S. women’s national soccer team and the Chicago Fire FC, embraces the energetic
    group dynamic of tag and drills, yet often struggles to keep track of practice schedules, preferring the familiar rhythm of weekly games over complex training plans.
  arts: A cartoon creator, Tammy Deason sketches whimsical comics of talking LEGO bricks, watches Disney classics like "Moana" and "Frozen" for inspiration, jams to Kidz Bop renditions of pop hits while
    animating simple videos on their tablet, and sometimes gets frustrated when a drawing doesn’t turn out as expected, balancing routine art‑class assignments with spontaneous digital storytelling.
  travel: An adventure‑seeking traveler, Tammy Deason loves revisiting the local state park’s splash pad but daydreams about a trip to Disneyland in Anaheim and a future visit to the Eiffel Tower, often
    requesting detailed itineraries to ease anxiety while secretly hoping for spontaneous detours that add a splash of surprise to their familiar travel routines.
  culinary: A junior baker, Tammy Deason delights in mixing vanilla frosting with rainbow sprinkles for cupcakes, enjoys assembling a classic pepperoni pizza and a buttery grilled cheese, meticulously follows
    the family recipe for chocolate chip cookies yet occasionally adds extra chocolate chips on a whim, turning every kitchen session into a blend of predictable steps and tasty improvisation.
  core: Tammy Deason is an energetic 9‑year‑old who thrives on the comfort of routine while constantly sprinkling spontaneous LEGO builds, cupcakes, and soccer kicks into their day, even as worry and occasional
    disorganization keep them on their toes.
background:
  cultural: 'Tammy comes from a white, middle‑class family in Huntingdon Valley, a suburban community near Philadelphia. Her upbringing reflects typical American suburban culture: celebrating holidays like
    Thanksgiving and Fourth of July, attending a local public elementary school, and participating in community sports leagues and church youth groups. The family enjoys regional traditions such as watching
    Philadelphia sports teams, eating cheesesteak on outings, and taking weekend trips to the nearby countryside. While largely homogenous, Tammy is exposed to the diverse cultural milieu of the greater
    Philadelphia area through school programs and community events.'
