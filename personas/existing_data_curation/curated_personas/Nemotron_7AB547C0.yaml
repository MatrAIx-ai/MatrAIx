  career_goals: Tammy aspires to a career where she can help others and work with her hands. She imagines becoming a teacher because she loves explaining things to friends, a veterinarian because she loves
    caring for animals, or a chef who can create meals for her family. She also dreams of joining a community fire department someday, drawn by the practical and brave nature of the job.
