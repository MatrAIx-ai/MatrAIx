personas:
  professional: Martin Harrell is an aspiring young engineer who channels his love for LEGO mechanics and robotics club projects into designing simple, functional robots, displaying a practical, structured
    mindset and a cooperative spirit on team assignments.
  sports: Martin Harrell is a dedicated member of the Plainfield Rapids soccer team, follows the Chicago Fire FC in the MLS, enjoys watching the Chicago Cubs during the summer, and practices drills three
    times a week, balancing structured training with occasional spontaneous kickabout with neighborhood friends.
  arts: Martin Harrell is a creative hobbyist who spends evenings drawing sci‑fi scenes inspired by authors like Jules Verne, takes keyboard piano lessons twice a week focusing on Beethoven’s Moonlight
    Sonata, and collects LEGO Architecture sets, with occasional listening sessions of the soundtrack from the movie 'Star Wars'.
  travel: Martin Harrell is an organized explorer who loves day trips to the nearby Illinois Waterway State Park for nature walks, has visited Chicago’s Museum of Science and Industry, dreams of touring
    the LEGO House in Billund, Denmark, and prefers itineraries with clear schedules and back‑up plans.
  culinary: Martin Harrell is a budding chef who enjoys assembling homemade pizza with pepperoni and mozzarella, making peanut butter‑banana sandwiches, and perfecting chocolate chip cookies with his mother,
    while also indulging in classic Midwestern fare like Chicago‑style hot dogs at the county fair.
  core: Martin Harrell is a structured, anxiety‑prone nine‑year‑old who blends his love for building, music, and soccer with meticulous planning, occasional impulsive spending, and a habit of rehearsing
    calming breaths before bedtime.
background:
  cultural: Martin is a white, Midwestern American growing up in Plainfield, Illinois, a suburban community in Kendall County. His family reflects typical Midwestern values of hard work, community involvement,
    and modesty. He attends a public elementary school where school events, local sports leagues, and church gatherings shape his social life. The region’s cultural emphasis on punctuality, order, and friendly
    neighborliness influences his preference for structure. Exposure to local traditions such as county fairs, community volunteer projects, and family picnics contributes to his sense of belonging and
    his cooperative outlook.
