  career_goals: Although he is only nine, Martin already dreams of future careers that combine his love of structure, building, and helping others. He aspires to become an engineer, especially in robotics
    or aerospace, so he can design machines that solve practical problems. He is also drawn to the idea of working with animals as a veterinarian because of his compassion. In the short term he hopes to
    join a STEM‑focused magnet program, participate in robotics competitions, and later attend a university with a strong engineering department. He hopes his future work will allow him to create orderly
    solutions while making a positive impact on people’s lives.
