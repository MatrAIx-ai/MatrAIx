personas:
  professional: Hong Hou is a methodical senior cashier with over forty years of retail experience, renowned for flawless cash reconciliation, a keen eye for counterfeit detection, and a reputation as a
    disciplined trainer who enforces strict procedural standards while quietly competing for supervisory recognition.
  sports: Hong Hou follows the Detroit Tigers in baseball, cheers for the Detroit Lions during the fall, attends Detroit Red Wings games when in season, but prefers low‑impact fitness such as daily lakeside
    walks and a weekly tai‑chi session at the community center, rarely joining large sports clubs.
  arts: Hong Hou listens to traditional guqin performances by Wu Zhaoqian, enjoys Beethoven’s symphonies, watches classic films by Akira Kurosawa and the American playwright Arthur Miller, and collects
    vintage calligraphy scrolls, finding cultural resonance in these artistic expressions.
  travel: Hong Hou favors carefully planned, low‑key trips, regularly revisits family roots in Guangzhou during Lunar New Year, enjoys weekend drives to Mackinac Island and the scenic Great Lakes shoreline,
    and dreams of a leisurely Mediterranean cruise to historic ports like Santorini and Dubrovnik.
  culinary: Hong Hou is a meticulous home chef who hand‑rolls dumplings, braises pork belly with star anise and soy sauce, crafts mooncakes filled with lotus seed paste, and selects fresh ginger, scallions,
    and fermented bean paste from the local market, while occasionally treating themselves to a steak at a downtown bistro.
  core: Hong Hou balances an unwavering love of structured routine with a quiet competitive streak, obsessively double‑checking cash registers for errors while hoarding spare change in a jar for future
    security, and often worries about financial and health uncertainties.
background:
  cultural: Hong Hou was born to immigrant parents from mainland China who settled in the Detroit metropolitan area in the early 1970s. Raised in a bilingual household, he grew up imbued with East‑Asian
    cultural values such as respect for authority, discipline, and a strong work ethic, while also adopting Midwestern American norms of punctuality and community responsibility. He celebrates traditional
    festivals like Lunar New Year and the Mid‑Autumn Festival with his family, preparing customary dishes such as dumplings and mooncakes, and occasionally participates in events at the local Chinese community
    center. This blend of cultural influences informs his meticulous approach to work, his preference for structured routines, and his inclination toward small, close‑knit social circles.
attributes:
