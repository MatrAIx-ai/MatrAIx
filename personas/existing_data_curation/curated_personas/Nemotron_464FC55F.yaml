  career_goals: Scott plans to transfer to a four‑year university to earn a bachelor’s degree in social work or public administration, while completing certifications in event planning and first aid. In
    the short term, he seeks internships or volunteer leadership roles in community‑service organizations that allow him to apply his people‑skills and organizational talents. His long‑term ambition is
    to become a program director for a nonprofit focused on youth mental‑health outreach in the St. Johns County area, designing and managing initiatives that promote well‑being and social cohesion. He
    values a career that blends meaningful service with clear, step‑by‑step progression, providing both stability and the chance to make a tangible positive impact.
