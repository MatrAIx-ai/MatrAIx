personas:
  professional: Scott Cannestro leverages his business communications associate degree and volunteer experience to coordinate community events and after‑school programs, blending his methodical planning,
    compassionate mediation, and natural talkativeness into a budding career in nonprofit program management.
  sports: Scott Cannestro enjoys Saturday beach runs with the St. Augustine Sea Turtle Running Group, paddle‑boards with the Jacksonville Paddleboard Club, and enthusiastically cheers for the Jacksonville
    Jaguars, while also playing casual beach volleyball and following the Miami Heat in the NBA.
  arts: Scott Cannestro captures the colonial charm of Saint Augustine through photography inspired by Annie Leibovitz, devotes weekends to improv at the college’s theater troupe channeling the quick wit
    of Keegan‑Michael Key, and streams music from Vampire Weekend and Lin‑Manuel Miranda’s soundtracks to fuel creativity.
  travel: Scott Cannestro plans trips with a blend of historic curiosity and social adventure, having explored Savannah’s squares and Key West’s sunsets, dreaming of strolling Barcelona’s Gothic Quarter
    and joining a service‑learning program in Belize while budgeting carefully around semester commitments.
  culinary: Scott Cannestro experiments in the kitchen with dishes like shakshuka, Pad Thai featuring rice noodles and tamarind, and Jamaican jerk chicken crowned with scotch bonnet peppers, often sourcing
    fresh local shrimp from the St. Augustine fish market and swapping recipes with friends on community‑center potlucks.
  core: Scott Cannestro is a sociable, methodical 19‑year‑old who balances a restless curiosity for history and culture with a chronic worry that drives meticulous planning in all facets of life.
background:
  cultural: Scott grew up in a middle‑class white family in Saint Augustine, Florida, a city steeped in Spanish colonial history and a vibrant tourism economy. His upbringing blended Southern hospitality
    with the multicultural influences of the numerous visitors and residents from Latin America, the Caribbean, and the broader United States. Family gatherings often featured traditional Southern foods
    and community‑oriented values, while local festivals such as the Nights of Lights and historic reenactments exposed him to the city’s diverse cultural heritage. This environment fostered his sociable,
    compassionate nature and his appreciation for community service and preserving local traditions.
