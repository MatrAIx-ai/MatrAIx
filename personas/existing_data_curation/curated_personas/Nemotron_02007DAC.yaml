  career_goals: Chloe aims to transition into a senior systems architect role within the next three years, where she can shape enterprise‑wide technology strategies and integrate emerging solutions such
    as cloud‑native services and AI‑driven analytics. She plans to obtain certifications in TOGAF and ITIL to bolster her strategic credentials, and to lead a small, high‑performing team that values thoughtful
    problem‑solving and collaborative decision‑making. Mentoring is a key ambition; she hopes to guide junior analysts, fostering a workplace culture that balances rigor with flexibility. Long‑term, she
    envisions consulting on digital transformation projects for mid‑size firms in the Midwest, leveraging her blend of analytical depth and calm leadership.
