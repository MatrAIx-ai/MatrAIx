personas:
  professional: John Jackson, a budding builder in kindergarten, channels a love of structure and predictability into arranging Lego bricks by color and size, leading cooperative play while confidently
    asserting ideas when needed.
  sports: John Jackson laces up tiny cleats for the Little Explorers Youth Soccer club, dribbles with enthusiasm, and cheers for the hometown baseball team, the River City Hawks, preferring structured practice
    sessions over spontaneous free‑play.
  arts: John Jackson loves drawing cartoon animals with bright crayons, recreating scenes from the animated series 'Bluey' and singing along to children's musician Raffi, often staging impromptu performances
    for family members.
  travel: John Jackson recalls family trips to the zoo and a sunny beach day, eagerly anticipates a future visit to Disneyland, and prefers well‑planned itineraries with familiar routines, though they sometimes
    daydream about spontaneous playground discoveries.
  culinary: John Jackson enjoys slurping spaghetti with marinara sauce, devouring crunchy carrot sticks, mastering the perfect peanut‑butter‑and‑jelly sandwich with strawberry jam, yet stubbornly refuses
    broccoli unless it’s shaped like a dinosaur, and often adds extra cheese to any dish for comfort.
  core: John Jackson thrives on routine, devouring Lego bricks and piggy‑bank coins with equal devotion, yet their anxiety over small changes and occasional broccoli rebellion hint at a charmingly meticulous
    yet worry‑prone five‑year‑old.
background:
  cultural: John grows up in a middle-class white family in Richmond, Virginia. His upbringing reflects Southern cultural influences such as celebration of local holidays (e.g., Fourth of July parades),
    occasional church attendance, and an emphasis on politeness and community. He often visits nearby historical sites and museums, hearing stories about the Civil War and regional heritage. His family
    values routine, modest religious involvement, and participation in neighborhood activities, providing a stable and structured environment that aligns with his personality.
attributes:
  skills: '[''Letter recognition'', ''Counting to 20'', ''Fine-motor coordination (cutting, assembling LEGO)'', ''Turn-taking and sharing'', ''Following daily routines'', ''Imaginative play'']'
