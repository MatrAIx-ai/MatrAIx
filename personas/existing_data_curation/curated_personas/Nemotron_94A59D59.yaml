  career_goals: Although only five, John expresses a fascination with orderly and helping professions. He often says he wants to be a firefighter because he likes the uniforms, the clear rules, and helping
    people. He also shows excitement about rockets and astronauts, dreaming of exploring space. These early interests reflect his preference for structure, practicality, and a desire to contribute to his
    community.
