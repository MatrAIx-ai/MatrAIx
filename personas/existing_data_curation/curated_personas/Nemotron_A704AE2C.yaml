personas:
  professional: Tina Long, a senior market research analyst with over three decades of experience, they blend quantitative mastery in SPSS, R, and advanced Excel with qualitative expertise in focus groups
    and survey design, using Tableau and PowerBI to craft consumer‑centric insights, while championing ethical AI‑driven analytics and mentoring junior analysts on their path toward a Director of Market
    Insights role.
  sports: Tina Long stays active year‑round, they hike the winding trails of Livingston County with the Northern Light Hiking Club, practice yoga at Heart of the Valley studio, cheer on the Detroit Lions
    and Detroit Red Wings, and compete in a local pickleball league at the senior center.
  arts: Tina Long expresses creativity through quilting patterns inspired by the geometric motifs of M. C. Escher, they curate photography collections echoing Ansel Adams’ crisp landscapes, and find solace
    in the folk ballads of John Denver and the novels of Mary Renault, which frequently surface in the book club they lead.
  travel: Tina Long prefers meticulously planned road trips, they have explored the historic streets of Savannah, Georgia, the vineyards of Napa Valley, and the cottage‑style villages of England’s Cotswolds,
    and they dream of trekking New Zealand’s Tongariro Alpine Crossing for a blend of adventure and cultural immersion.
  culinary: Tina Long delights in cooking hearty, seasonal meals such as slow‑braised beef stew with carrots, potatoes, and thyme, rosemary‑infused focaccia, and heirloom tomato bruschetta, they source
    fresh produce from their own garden and host monthly potluck gatherings to share recipes with friends.
  core: Tina Long, a calm and compassionate 56‑year‑old market research veteran, they weave curiosity, meticulous organization, and community‑focused generosity into every facet of life—from data insights
    and garden harvests to quilting, cooking, and thoughtful travel.
background:
  cultural: Tina grew up in a middle‑class, predominantly white suburb of Michigan, with family ancestry tracing back to English, Irish, and German immigrants. The Midwestern values of modesty, reliability,
    and community cooperation have deeply shaped her worldview. Her humanities education fostered a love for literature, history, and cultural studies, which she brings to her empathetic approach in market
    research. She participates in local traditions such as county fairs, seasonal festivals, and community service, while maintaining an openness to diversity through her professional work.
attributes:
  skills: '[''Quantitative data analysis'', ''Qualitative research methods'', ''Survey design and implementation'', ''Statistical software (SPSS, R, Excel)'', ''Data visualization (Tableau, PowerBI)'',
    ''Market segmentation'', ''Consumer behavior analysis'', ''Strategic marketing planning'', ''Report writing and presentation'', ''Project management'', ''Stakeholder engagement'', ''Customer empathy
    and advocacy'', ''Social media analytics'', ''Brand positioning'', ''Cross‑functional collaboration'', ''Process improvement'', ''SOP development'']'
  hobbies: '[''Community volunteering'', ''Gardening'', ''Reading historical fiction'', ''Hiking'', ''Cooking and sharing meals'', ''Quilting and needlecraft'', ''Photography'', ''Participating in book
    clubs'', ''Genealogy research'', ''Yoga and mindfulness practices'']'
  career_goals: Tina aims to transition into a senior leadership role such as Director of Market Insights or Regional Market Research Manager, where she can shape strategic direction and mentor emerging
    analysts. She aspires to integrate emerging AI‑driven analytics into research practices, champion ethical and inclusive consumer research, and ultimately establish a boutique consulting practice focused
    on community‑centered market insights. Continuous learning through advanced certifications in digital marketing and data science is a secondary goal, ensuring her curiosity remains paired with practical,
    results‑driven outcomes.
