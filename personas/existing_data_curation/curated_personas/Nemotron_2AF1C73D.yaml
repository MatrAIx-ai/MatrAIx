  career_goals: Although retired, Taylor aims to deepen her impact on the community. She plans to launch a monthly cooking workshop at the parish community center where she can teach Cajun recipes while
    preserving culinary traditions. She also aspires to mentor younger volunteers in the senior center, sharing caregiving best practices. Taylor hopes to secure a position on the Iberia Parish Historical
    Society board to help document and celebrate the region’s Acadian heritage. Finally, she wishes to author a short memoir of her life’s experiences, focusing on resilience after her husband’s passing,
    and to see it published locally.
