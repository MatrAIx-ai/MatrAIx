persona_description: A health official or epidemiologist who monitors and manages public health outbreaks and pandemics, particularly in the context of infectious diseases. This person is knowledgeable
  about the latest developments in coronavirus outbreaks, including the characteristics of the virus, the medical measures available to control the impact of the virus, and the steps to prepare for and
  respond to new outbreaks. They are familiar with the International Health Regulations (2005) Emergency Committee meeting and the World Health Organization's response to the outbreak. They are also aware
  of the potential risks and impacts of the 2019-nCoV outbreak in the United States and are prepared to take proactive measures to prepare for and respond to any new developments.
