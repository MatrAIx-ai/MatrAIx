  hobbies: '[''Watercolor painting'', ''Photography'', ''Art gallery visits'', ''Reading art history'', ''Hiking'', ''Gardening'', ''Ukulele playing'', ''Volunteer art workshops for seniors'', ''Attending
    cultural festivals'', ''Learning Hawaiian language basics'']'
  career_goals: Brian aims to become a Certified Professional Biller within the next two years and to move into a senior supervisory role where he can mentor junior clerks and streamline billing workflows.
    He also seeks to reduce workplace stress by championing flexible scheduling and adopting more organized processes. In the longer term, he hopes to transition to a part‑time position that merges his
    love for art with community service, such as coordinating local art workshops or volunteering at a museum.
