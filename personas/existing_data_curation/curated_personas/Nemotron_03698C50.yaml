personas:
  professional: A seasoned production helper with three decades of hands‑on manufacturing experience, Catherine Henning leverages their OSHA‑certified safety expertise, forklift operation skill, and meticulous
    inventory‑management abilities to keep assembly lines humming, while their methodical planning and friendly mentorship style positions them as a natural candidate for a lead or shift‑supervisor role.
  sports: A devoted community walker and casual sports fan, Catherine Henning laces up for regular evening strolls with the Waukesha Trail Walkers, roots for the Green Bay Packers during football season
    and cheers the Milwaukee Brewers in summer, and occasionally joins a local senior softball league despite preferring low‑intensity activity.
  arts: An avid knitter and historical‑fiction enthusiast, Catherine Henning spends afternoons crocheting scarves while listening to Joan Baez, finds inspiration in the paintings of Grandma Moses, attends
    performances by the Milwaukee Repertory Theater, and regularly reads works by Philippa Gregory and Ken Follett, letting these creative outlets shape their sense of nostalgia and community.
  travel: A detail‑oriented road‑trip planner, Catherine Henning has explored Door County’s cherry orchards, spent a weekend in Chicago’s museum district, and dreams of touring historic castles in Scotland,
    always mapping routes in advance, budgeting each leg, and preferring stays at family‑run B&Bs that allow time for garden‑inspired photo journaling.
  culinary: A garden‑to‑table cook who blends fresh produce with hearty Midwestern fare, Catherine Henning regularly prepares zucchini‑tomato ratatouille, apple‑cinnamon crisp, and buttery rye bread, seasoning
    dishes with rosemary and sage harvested from their backyard, while they enjoy occasional cheese‑curd tasting evenings paired with local craft beer.
  core: A methodical mentor who balances a disciplined work ethic, community service, and creative hobbies, Catherine Henning navigates life with a spreadsheet‑driven budget, health‑monitoring routines,
    and a garden‑filled sanctuary that fuels both their culinary experiments and knitting projects.
background:
  cultural: Catherine grew up in the Midwest, shaped by the practical, community‑oriented values common in Waukesha, Wisconsin. Her family’s heritage includes German and Scandinavian roots, reflected in
    a tradition of hard work, punctuality, and modesty. She identifies with the region’s emphasis on reliability, cooperation, and civic participation, often celebrating local holidays and participating
    in neighborhood gatherings. Her cultural upbringing reinforces a respect for routine, an appreciation for the outdoors, and a commitment to supporting her community.
