  hobbies: '[''Museum Visits'', ''Jazz/Blues/Gospel Listening'', ''Reading Biographies and History'', ''Quilting'', ''Knitting'', ''Gardening'', ''Cooking Soul‑Food Recipes'', ''Community Storytelling'',
    ''Genealogy Research'', ''Church Activities'']'
  career_goals: Beverly’s main ambition is to leave a lasting legacy of cultural memory and community empowerment. She plans to compile a memoir and a series of recorded oral histories that capture the
    stories of her family and the Tuscaloosa Black community, hoping they will be archived at the local university for future generations. She also wishes to establish a modest scholarship fund to support
    young Black artists in the area, reflecting her lifelong appreciation for creative expression. By mentoring at the senior center’s art program, she seeks to pass on her quilting and storytelling skills
    to younger participants. Maintaining her health and mental sharpness remains a priority; she attends weekly art workshops and continues her garden to promote a sense of purpose. Finally, she aims to
    deepen her involvement in her church’s outreach initiatives, providing food and companionship to families in need, thereby embodying her balanced compassion and self‑interest.
