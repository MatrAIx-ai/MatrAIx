  hobbies: '[''Gardening'', ''Quilting'', ''Community theater volunteering'', ''Square dancing'', ''Historic preservation society participation'', ''DIY woodworking'', ''Family camping trips'', ''Cooking
    and potluck gatherings'']'
  career_goals: As she approaches the later stage of her career, Dakota aims to transition into a supervisory and training role, leveraging her extensive field knowledge to lead a crew of installers and
    guide new hires through hands‑on apprenticeships. She plans to obtain a certified telecom safety inspector credential and to become a union liaison, advocating for worker safety and fair labor practices.
    Long‑term, she hopes to start a small consulting firm that offers safety audits and training workshops for regional telecom contractors, allowing her to stay engaged in the industry while gradually
    reducing her on‑site workload.
