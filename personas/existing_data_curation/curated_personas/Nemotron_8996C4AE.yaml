personas:
  professional: Dakota Stantz is a seasoned telecommunications line installer with three decades of hands‑on expertise in copper and fiber‑optic systems, who leverages a structured, safety‑first mindset
    to lead crews, mentor apprentices, and coordinate complex repair projects while eyeing a transition to supervisory and union liaison roles.
  sports: Dakota Stantz is an avid square‑dancer and regular participant in a local senior walking club, cheering on the St. Louis Cardinals and St. Louis Blues while maintaining a pragmatic approach to
    fitness that balances gentle cardio with occasional garden‑yard chores.
  arts: Dakota Stantz blends practical craftsmanship with artistic flair as a volunteer set builder for the Festus community theater, a dedicated quilter inspired by classic patchwork motifs, and a regular
    attendee of regional folk music concerts featuring artists like Gillian Welch.
  travel: Dakota Stantz prefers meticulously planned, family‑friendly road trips to scenic camping spots such as the Ozark National Scenic Riverways and Lake of the Ozarks, pairing evenings around the campfire
    with storytelling about the region’s early settler heritage.
  culinary: Dakota Stantz delights in farm‑to‑table cooking, regularly turning home‑grown tomatoes, basil, and beans into a signature marinara sauce, and showcasing hand‑stitched quilt‑inspired aprons while
    contributing hearty casserole dishes and fresh herb focaccias at community potlucks.
  core: Dakota Stantz is a structured, community‑driven hands‑on professional who balances pragmatic safety leadership with creative quilting, gardening, and a love for square‑dancing, all while navigating
    retirement planning and modest health hiccups.
background:
  cultural: Dakota was raised in a Midwestern, small‑town environment typical of Festus, Missouri, with a family lineage that traces back to German and Irish immigrants who settled the region in the late
    19th century. Her upbringing emphasized hard work, self‑reliance, and community involvement, values reinforced through attendance at a local Protestant church and participation in town events like the
    annual Jefferson County Fair. The cultural fabric of her community blends traditional Midwestern hospitality with a pragmatic, no‑nonsense approach to daily life, shaping Dakota's practical outlook,
    her organized work ethic, and her warm, sociable demeanor.
attributes:
