personas:
  professional: Margo Cumming is a seasoned community organizer and interdisciplinary arts facilitator who leverages their methodical planning, persuasive public speaking, competitive drive, and skeptical
    eye for detail to launch senior arts‑history programs, while thriving as the charismatic center of workshops and grant‑writing efforts.
  sports: Margo Cumming follows the LSU Tigers football team and the New Orleans Pelicans, participates in a weekly senior walking club that meets at the parish park, and attends low‑impact water aerobics
    classes at the community center to maintain flexibility and cardiovascular health.
  arts: Margo Cumming’s artistic life revolves around creating bold abstract acrylics inspired by Mark Rothko and Willem de Kooning, curating intimate exhibitions that feature both local folk artist George
    Rodrigue and emerging contemporaries, while immersing themselves in the sounds of Wynton Marsalis jazz and Clifton Chenier zydeco at nightly performances.
  travel: Margo Cumming prefers carefully planned weekend getaways to the historic French Quarter of New Orleans and the art‑laden towns of Marfa, Texas, while dreaming of an extended cultural immersion
    in Provence, France, to trace the culinary roots that inspire their Cajun dishes.
  culinary: Margo Cumming is an adept Cajun home chef who perfects a dark roux for gumbo, layers Andouille sausage, shrimp, okra, and bold Cajun spices, and often improvises with smoked paprika and fresh
    thyme to give their jambalaya a signature kick.
  core: Margo Cumming, a spry septuagenarian, balances relentless curiosity with unflinching skepticism, channels talkative charm into community activism, and habitually starts new abstract paintings before
    finishing the previous ones, while forgetting to water indoor succulents.
background:
  cultural: Margo grew up in a small, close-knit white family in central Louisiana, a region where Southern hospitality and community gatherings are deeply valued. Raised in the modest town of Deville in
    Rapides Parish, she attended local churches where she participated in choir and volunteer ministries, fostering a sense of service. Although her family’s ancestry traces back to Midwestern roots, the
    cultural milieu of central Louisiana—its blend of Cajun, Creole, and Southern traditions—has shaped her appreciation for regional music, cuisine, and folklore. She is familiar with the rhythms of Mardi
    Gras celebrations and the informal storytelling sessions that often occur at community festivals. This background, combined with her academic experiences at a nearby community college, has instilled
    in her a respect for both formal education and the informal wisdom passed down through generations.
