    and oral surgeons'', ''Digital dentistry (CAD/CAM, intraoral scanning, 3D printing)'', ''Practice management and operations'', ''Infection control'', ''Mentorship and teaching of dental residents'']'
  hobbies: '[''Abstract watercolor painting'', ''Jazz saxophone performance'', ''Fusion cooking (Southern and African flavors)'', ''Hiking in the Sandhills'', ''Charity 5K runs'', ''Cultural travel (e.g.,
    Ghana, Italy)'', ''Dental health education volunteering'', ''Community theater set design'']'
  career_goals: Guided by his curiosity and love for art, Alexander aims to transform his practice into a boutique aesthetic dentistry studio that merges artistic design with cutting‑edge technology. He
    envisions launching a mobile dental unit that delivers preventive services and oral health workshops to underserved neighborhoods across Lexington County, fostering community health equity. Alexander
    seeks leadership positions within the South Carolina Dental Association and the National Dental Association to advocate for increased diversity and inclusion in the dental profession. He aspires to
    publish research on minimally invasive restorative materials, mentor upcoming Black dentists and dental students from HBCUs, and eventually establish a multidisciplinary health hub that integrates dentistry,
    nutrition counseling, and wellness programs.
