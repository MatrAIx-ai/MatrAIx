personas:
  professional: Alexander Harrison is a dentist who melds cutting‑edge digital dentistry with a designer’s eye, using CAD/CAM, digital smile design, and custom veneers to turn every restorative procedure
    into an artistic experience, while steering their practice toward a boutique aesthetic studio and a mobile unit for community outreach.
  sports: Alexander Harrison spends weekends hiking with the Sandhills Trail Club, runs charity 5K events supporting oral‑health causes, and passionately follows the Carolina Panthers, the Charlotte Hornets,
    and the Greenville Drive, often joining local pickup basketball games at the community center to keep their reflexes sharp.
  arts: Alexander Harrison channels the bold color fields of Kandinsky and the gestural abstractions of Rothko into their watercolor canvases, improvises saxophone solos inspired by John Coltrane and Miles
    Davis in a community jazz ensemble, and designs sets for the Columbia Community Theater, regularly visiting the Columbia Museum of Art and the Greer Gallery for fresh inspiration.
  travel: Alexander Harrison curates travel experiences that combine cultural immersion with culinary discovery, having explored Ghana’s vibrant markets and Italy’s historic trattorias, they now plan a
    spice‑laden road trip through Morocco’s souks and a sushi‑focused retreat in Kyoto, preferring flexible itineraries that allow spontaneous art workshops.
  culinary: Alexander Harrison enjoys crafting Southern–African fusion dishes such as berbere‑spiced shrimp and grits, collard greens with jollof‑style rice, and sweet‑potato pie topped with caramelized
    plantains, boasting an intermediate cooking skill level and hosting monthly dinner parties where friends sample their experimental plates paired with local craft brews.
  core: Alexander Harrison is a calm, art‑infused dentist who paints, plays sax, hikes, invests wisely, and transforms every dinner gathering into a vibrant cultural experiment.
background:
  cultural: Alexander is an African American who grew up in the heart of South Carolina, where the traditions of the Black church, Southern hospitality, and a tight‑knit community shaped his values. Family
    gatherings infused him with African cultural elements—storytelling, rhythmic music, and soulful cuisine—while local Southern customs emphasized hospitality, communal support, and resilience. Navigating
    a predominantly white professional landscape as a Black dentist reinforced his commitment to mentorship, advocacy, and representation. He regularly participates in the Lexington County African American
    Heritage Festival, supports Black‑owned businesses, and is an active member of the National Dental Association’s regional chapter, where he mentors dental students from Historically Black Colleges and
    Universities. His cultural identity informs both his patient care philosophy and his artistic pursuits.
attributes:
