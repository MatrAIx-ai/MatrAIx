  hobbies: '[''Sketching urban scenes'', ''Community mural painting'', ''Beach volleyball and basketball'', ''Zumba and group dance classes'', ''Karaoke with friends'', ''Visiting contemporary art galleries'',
    ''Reading science‑fiction'', ''DIY home‑renovation projects'', ''Volunteering for neighborhood clean‑up events'']'
  career_goals: Kyong aims to transition from laborer to a foreman role within the next two years, pursuing an OSHA Construction Safety Certification and a construction management certificate at a local
    community college. She aspires to lead larger, more complex projects that blend functional building with artistic elements, eventually establishing her own boutique renovation firm that emphasizes sustainable
    materials and custom aesthetic touches. Her competitive drive pushes her to achieve top performance metrics on her site, and she hopes to mentor other women entering the trades, promoting greater diversity
    in construction.
