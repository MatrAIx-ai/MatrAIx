personas:
  professional: At 31, Kyong Yin is a construction laborer‑turned‑aspiring foreman who translates hands‑on expertise in concrete forming, blueprint reading, and bilingual crew coordination into on‑time
    project delivery, while her vivid imagination adds artistic flair to site aesthetics and her methodical, competitive nature fuels a relentless pursuit of OSHA certification and a future boutique renovation
    firm.
  sports: Kyong Yin is a regular on the Santa Ana Beach Volleyball Club during the summer months and joins the local park’s adult basketball league in the winter, cheering for the LA Lakers and LA Dodgers
    while maintaining a high‑energy fitness routine that blends Zumba classes, competitive volleyball matches, and weekend jogs along the Orange County coastline.
  arts: Kyong Yin spends evenings sketching urban skylines for community murals, drawing inspiration from street‑artist Banksy, the provocative installations of Ai Weiwei, and the kinetic choreography of
    dancer Akram Khan, while also attending contemporary exhibitions at the Bowers Museum and belting out karaoke hits from artists like Lady Gaga and Bad Bunny.
  travel: Kyong Yin enjoys weekend road trips to Joshua Tree for desert photography, occasional hikes in the Sierra Nevada, and dreams of a cultural design tour through Barcelona’s modernist architecture,
    while cherishing memories of a spring visit to Taiwan where they explored bustling night markets and historic temples.
  culinary: Kyong Yin’s palate mixes comfort and curiosity, favoring home‑cooked stir‑fried noodles with spicy peppercorns, crafting homemade guacamole for taco nights, and perfecting a smoky charcoal‑grilled
    salmon seasoned with rosemary, while their cooking skill sits at an intermediate level that often becomes a creative stress‑relief ritual.
  core: Kyong Yin is a methodical yet imaginative construction professional who balances a competitive drive with community‑centric artistry, frequently juggling blueprint reviews, mural sketches, and a
    relentless habit of double‑checking every detail—even if it means staying up late ordering extra paint.
background:
  cultural: Kyong comes from an East Asian (Chinese) immigrant family that values hard work, respect for elders, and collective responsibility. Growing up in Orange County, she blends traditional cultural
    practices—such as celebrating Lunar New Year and participating in Chinese community festivals—with the multicultural vibrancy of Southern California. Her bilingual upbringing (English and Mandarin)
    and exposure to the local Hispanic community have fostered a pragmatic, inclusive outlook. These cultural influences shape her appreciation for craftsmanship, her disciplined work ethic, and her desire
    to contribute to both her ethnic community and the broader Santa Ana neighborhood.
attributes:
  skills: '[''Concrete forming'', ''Framing and carpentry'', ''Forklift and backhoe operation'', ''Blueprint reading and interpretation'', ''OSHA safety compliance'', ''Site inventory management'', ''Crew
