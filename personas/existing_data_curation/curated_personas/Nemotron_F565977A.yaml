personas:
  professional: Kathia Jackson is a dynamic Houston event planner who uses Cvent and Eventbrite to translate client visions into inclusive conventions, leverages their cultural fluency to craft programs
    that celebrate community heritage, mentors aspiring hospitality professionals, and while thriving on spontaneous improvisation under pressure, occasionally wrestles with organization and deadline management.
  sports: Kathia Jackson stays fit through nightly salsa and hip‑hop sessions, joins a local pick‑up basketball league at the community center, cheers for the Houston Astros and Houston Rockets, and logs
    weekend charity 5K runs while occasionally slipping into yoga classes to offset dance‑induced stiffness.
  arts: Kathia Jackson immerses herself in Houston’s vibrant arts scene by dancing at salsa flash mobs, attending live jazz sets featuring Kamasi Washington, participating in gospel choir rehearsals, sharpening
    quick‑thinking skills in improv comedy workshops inspired by Hannah Gadsby, and curating a festival blog that spotlights performances ranging from Broadway revivals to street drummers.
  travel: Kathia Jackson fuels her creative spark by spontaneously jet‑setting to festivals such as New Orleans' Mardi Gras, the San Juan gastronomic fair in Puerto Rico, and the Austin SXSW conference,
    as well as taking weekend road trips to Galveston’s beachside markets, documenting each adventure on her blog while balancing tight work schedules and a modest travel budget.
  culinary: Kathia Jackson channels her culinary curiosity into vibrant fusion dishes like jerk‑spiced chicken mac & cheese, collard greens simmered in coconut milk, and sweet‑potato gnocchi drizzled with
    mango‑chili glaze, showcasing her intermediate cooking expertise and a penchant for sourcing fresh seafood, ripe plantains, and bold spices such as allspice and habanero at local farmer’s markets.
  core: Kathia Jackson is a talkative, spontaneous event maestro who fuses Southern comfort with Caribbean zest in the kitchen, dances through life’s challenges, and balances impromptu splurges with disciplined
    savings, all while juggling a perpetual buffet of Post‑its reminding them of missed deadlines.
background:
  cultural: Kathia was raised in a close‑knit African‑American family in Houston, where church gatherings, family reunions, and community celebrations shaped her worldview. The city's rich tapestry of Black
    cultural traditions—Juneteenth commemorations, soul food cuisine, gospel music, and entrepreneurship—instilled in her a deep appreciation for storytelling and community cohesion. Her upbringing exposed
    her to both the historic legacy and contemporary vibrancy of Black life in the South, influencing her commitment to creating events that honor cultural heritage while fostering inclusive, collaborative
    experiences.
attributes:
  skills: '[''Event Concept Development'', ''Vendor Negotiation'', ''Budget Management'', ''Client Relationship Management'', ''Program Scheduling'', ''Crisis/Issue Management'', ''Cultural Competency'',
    ''Public Speaking'', ''Event Technology Platforms (Cvent, Eventbrite)'', ''Team Leadership'', ''Creative Design'', ''Data Analytics for Events'']'
  hobbies: '[''Salsa and Hip‑Hop Dancing'', ''Fusion Cooking (Southern & Caribbean)'', ''Live Music and Jazz Attending'', ''Youth Mentorship in Hospitality'', ''Travel Blogging about Cultural Festivals'',
    ''Improv Comedy Workshops'', ''Curating Playlists for Event Atmospheres'', ''Fitness Classes (Zumba, Barre)'']'
  career_goals: Kathia aims to progress from her current role as an event planner to a senior director of meetings and events within the next five years, overseeing national conferences and high‑profile
    corporate gatherings. She plans to obtain the Certified Meeting Professional (CMP) credential and pursue advanced training in sustainable event practices. Long‑term, she envisions launching her own
    boutique event planning firm that specializes in culturally resonant experiences for Black‑owned businesses and community organizations, mentoring emerging planners, and championing inclusive programming
    that celebrates diverse narratives.
