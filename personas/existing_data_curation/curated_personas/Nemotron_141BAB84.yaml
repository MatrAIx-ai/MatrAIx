personas:
  professional: An aspiring marine scientist, Michele Ghay channels her curiosity and methodical planning into building elaborate LEGO ship models while volunteering at the local library’s junior reading
    program, often taking the lead in group projects with confident, talkative enthusiasm.
  sports: Michele Ghay drills hard on the local youth soccer field with the Annapolis Dolphins and competes in Thursday swim lessons at the community pool, cheering on the Baltimore Ravens on game nights
    and proudly wearing the team’s jersey during practice.
  arts: Michele Ghay lights up the school choir when singing “Part of Your World,” practices piano with occasional frustrated outbursts over tricky chords, and sketches whimsical sea turtles and octopuses
    inspired by marine artist Wyland, displaying the drawings on the fridge for family admiration.
  travel: Michele Ghay dreams of exploring historic Williamsburg, loves weekend trips to Ocean City’s tide pools, and has a growing scrapbook of postcards from a recent family visit to Washington, D.C.,
    eagerly planning each outing with homemade maps and checklists.
  culinary: Michele Ghay delights in devouring Maryland crab cakes and clam chowder at family beach picnics, can whip up a perfect peanut butter and jelly sandwich for PTA bake sales, but often forgets
    to finish their broccoli because they’re distracted by video games.
  core: Organized, chatty, and endlessly curious, Michele Ghay blends a love for marine life with a penchant for lead‑taking in school activities, yet sometimes splurges on candy and forgets a chore in
    the whirlwind of excitement.
background:
  cultural: Michele comes from a White, middle‑class family rooted in the Mid‑Atlantic region. Growing up in Annapolis, Maryland, she is immersed in the city’s rich colonial history and the maritime culture
    of the Chesapeake Bay. Family traditions include celebrating American holidays with community potlucks, summer trips to the beach, and attending local festivals that honor the area’s nautical heritage.
    Her parents value education and community involvement, encouraging participation in school events, the PTA, and volunteer activities at the local library. This environment blends a typical suburban
    American upbringing with a strong appreciation for local history, nature, and civic engagement.
attributes:
  skills: '["Reading comprehension", "Storytelling", "Mathematical problem-solving", "Project organization", "Public speaking", "Digital literacy (educational software)", "Basic swimming", "Beginner piano",
