  hobbies: '["Reading adventure and science books", "Visiting historic sites and museums", "Exploring tide pools and nature walks", "Drawing marine life", "Building LEGO models", "Singing in school choir",
    "Swimming lessons", "Playing piano", "Playing soccer on a local team"]'
  career_goals: Michele dreams of exploring the natural world and helping others. She often talks about becoming a marine biologist to study dolphins in the Chesapeake Bay, or a teacher who can inspire
    kids with science experiments. She also hopes to lead a community youth club where she can organize events and teach peers. Her practical side encourages her to set short‑term goals, like winning the
    school science fair and improving her public‑speaking skills, as stepping stones toward a long‑term ambition of a career that combines curiosity, organization, and people‑centered work.
