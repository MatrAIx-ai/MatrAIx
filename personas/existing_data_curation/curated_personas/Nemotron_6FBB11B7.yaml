  hobbies: '[''Hiking local trails'', ''Birdwatching'', ''Reading non-fiction (business & history)'', ''Playing acoustic guitar'', ''Cooking experimental dishes'', ''Jogging'', ''Meditation and journaling'',
    ''DIY home improvement projects'', ''Chess'', ''Volunteering at community food pantry'']'
  career_goals: Harold aims to move into a senior operations leadership role within the next three to five years, targeting positions such as Operations Manager or Director of Business Operations. He plans
    to earn a Lean Six Sigma Black Belt and a PMP certification to formalize his expertise, and he is considering an MBA to broaden his strategic perspective. His long-term ambition is to spearhead digital
    transformation initiatives that automate routine workflows, embed data-driven decision making, and improve sustainability metrics for the organization. At the same time, he wants to create a work environment
    that supports employee well-being, recognizing his own sensitivity to stress and his desire for a balanced, supportive culture.
