  hobbies: '[''Sailing'', ''Landscape photography'', ''Woodworking'', ''Watercolor sketching'', ''Model ship building'', ''Reading science-fiction'', ''Hiking'', ''STEM mentorship volunteering'', ''Visiting
    art galleries and museums'', ''Attending community theater performances'']'
  career_goals: Looking ahead, Nathan aims to leverage his extensive technical background into a senior consultancy role where he can guide the design of resilient coastal infrastructure for Florida’s shoreline
    communities. He plans to obtain his Professional Engineer (PE) license within the next two years, author a technical guide on merging artistic design principles with engineering functionality, and establish
    a mentorship program that connects local high-school students with hands-on engineering projects. Additionally, he hopes to launch a boutique firm that offers sustainable, aesthetically-driven solutions
    for marine equipment and public installations, positioning himself as a thought leader at the intersection of engineering, art, and environmental stewardship.
