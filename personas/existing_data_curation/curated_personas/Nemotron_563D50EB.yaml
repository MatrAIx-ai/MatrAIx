  hobbies: '["Vegetable gardening", "Traditional cooking", "Quilting", "Community mystery book club", "Volunteer work at senior center", "Hill walking", "Gentle yoga", "Genealogy research", "Listening to
    1970s classic rock", "Family visits"]'
  career_goals: Although currently not part of the formal workforce, Kristin aims to channel her business knowledge into mentoring younger adults and retirees through local non‑profit programs. She hopes
    to offer pro‑bono consulting for seniors needing help with budgeting and estate planning. Additionally, she aspires to serve on the board of a community garden or senior center, deepen her involvement
    in civic activities, and continue her personal development by attending workshops on financial literacy and wellness. Maintaining a balanced, low‑stress lifestyle while contributing meaningfully to
    her community remains her primary ambition.
