  career_goals: Jeanette aims to advance to a senior executive role—such as Director of Operations or Vice President of Business Development—where she can shape company‑wide strategy and drive sustainable
    growth. She wants to champion initiatives that integrate technology with human‑centered design, improving efficiency while preserving employee wellbeing. Long‑term, she envisions launching a boutique
    consultancy that helps small‑to‑mid‑size businesses in Queens adopt scalable best practices and foster community partnerships. Throughout, she seeks to balance career advancement with personal resilience,
    prioritizing stress‑reduction strategies and work‑life integration.
