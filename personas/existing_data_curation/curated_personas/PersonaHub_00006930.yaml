persona_description: A surgeon who specializes in the treatment of patellofemoral instability, a condition that causes pain and discomfort in the knee joint. The surgeon has extensive knowledge and experience
  in the surgical techniques used to realign the kneecap back to its normal alignment, including proximal re-alignment procedures and distal re-alignment procedures. They are highly skilled in the use of
  specialized instruments and the ability to make accurate incisions to provide a clear view of the joint. The surgeon is likely to be highly trained and experienced, with a deep understanding of the anatomy
  and biomechanics of the knee joint. They are also likely to be skilled in the use of anesthesia and sterile operating conditions.
