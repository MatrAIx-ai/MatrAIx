personas:
  professional: Brandon Gladden, a 38‑year‑old project management specialist who blends Agile precision with a humanities‑driven aesthetic sense, leads cross‑functional arts initiatives using MS Project
    and JIRA while championing collaborative flexibility and decisive stakeholder communication, and they consistently translate artistic vision into measurable outcomes.
  sports: Brandon Gladden cycles with the Suncoast Cyclists along the Gulf Coast, roots for the Tampa Bay Buccaneers and Lightning, joins a local intramural basketball league each summer, balances high‑intensity
    cardio with relaxed weekend paddle‑boarding, and they treat each race as a chance to test project‑management discipline on personal fitness goals.
  arts: Brandon Gladden spends evenings immersing in Tampa’s vibrant art scene, sketching installations by Yayoi Kusama at the Tampa Museum of Art, curating a vinyl collection that includes The Velvet Underground
    and David Bowie's ‘Berlin Trilogy’, mentoring youth through the Artful Futures program, attending performances by the Florida Orchestra, and they often capture moments on film to inspire future project
    concepts.
  travel: Brandon Gladden plans trips with a blend of spreadsheet precision and spontaneous curiosity, favoring Gulf‑coast road trips to Key West, cultural immersions in Barcelona’s Gothic Quarter, weekend
    getaways to Asheville’s craft breweries, all while balancing travel costs against their budding consultancy ambitions, and they keep a travel journal to document lessons for community projects.
  culinary: Brandon Gladden experiments in a modest kitchen, mastering dishes like sous‑vide salmon with miso glaze, charcoal‑charred octopus tacos, and coconut‑lime risotto, while keeping a well‑stocked
    pantry of fermented kimchi, smoked paprika, and fresh basil for weekly dinner parties, and they often pair meals with thoughtfully selected vinyl tracks to set the mood.
  core: Brandon Gladden blends meticulous project leadership with a restless artistic curiosity, juggling disciplined finances, a volunteer mentor’s heart, and a penchant for late‑night vinyl hunting that
    sometimes eclipses bedtime, and they never miss a deadline despite occasional coffee‑fuelled all‑nighters.
background:
  cultural: Brandon was raised in a middle‑class suburban environment in the American South, with family roots tracing back to Irish and English ancestors. His upbringing combined traditional American holidays
    and community values with the laid‑back, multicultural vibe of Florida. Exposure to Tampa's diverse arts scene during his college years deepened his appreciation for cultural expression, and his liberal
    arts education reinforced a worldview that values curiosity, critical thinking, and inclusivity. Though he identifies as white American, he actively seeks cross‑cultural experiences and integrates Southern
    hospitality with a global artistic perspective in both his personal and professional life.
attributes:
  skills: '[''Project lifecycle management'', ''Agile & Waterfall methodologies'', ''Budgeting and financial oversight'', ''Risk identification and mitigation'', ''Stakeholder engagement'', ''Team facilitation
    and conflict resolution'', ''MS Project, Asana, JIRA, Trello'', ''Microsoft Office Suite'', ''Data visualization (Power BI, Tableau)'', ''Creative problem solving'', ''Cultural and arts sector knowledge'']'
  hobbies: '[''Visiting museums and galleries'', ''Sketching and photography'', ''Exploring culinary scenes and cooking'', ''Coastal cycling and kayaking'', ''Volunteering for youth arts mentorship'', ''Collecting
    vinyl records'', ''Reading contemporary fiction and philosophy'']'
  career_goals: Brandon aims to transition from a specialist role to a senior leadership position, such as Program Manager or Director of Project Management, preferably within organizations that support
    cultural initiatives, museums, or creative enterprises. He plans to obtain PMP certification within the next year and to build a reputation as a go‑to leader for interdisciplinary, community‑focused
    projects. In the longer term, he envisions launching his own consultancy that helps arts nonprofits streamline operations, secure funding, and execute impactful programs while maintaining a healthy
    work‑life balance.
