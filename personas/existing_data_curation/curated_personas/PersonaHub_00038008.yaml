persona_description: A historian who specializes in the study of diplomatic relations between Japan and Czechoslovakia, particularly focusing on the exchange of ideas and practices between the two countries
  through architecture. The individual is knowledgeable about the rediscovery of the work of Antonin Raymond and Bedřich Feuerstein, and is interested in the role of the Hiroshima Prefectural Industrial
  Exhibition Hall in the engagement of Czechs and Slovaks with Japan in the late 19th and early 20th centuries. The individual is also interested in the cultural and self-perception aspects of Czech and
  Czechoslovak culture, particularly in relation to the role of the Hiroshima Peace Memorial in the commemoration of the atomic bombing of Hiroshima.
