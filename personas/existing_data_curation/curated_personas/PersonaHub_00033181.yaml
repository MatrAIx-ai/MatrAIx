persona_description: A scientist who specializes in astrobiology and the study of planetary biospheres. This individual is interested in understanding how the Earth's biosphere will adapt to changing environmental
  conditions and how it will continue to function as a source of energy and food for life. They are particularly interested in the potential for microbes to survive and thrive in a dying planet and the
  potential for life to persist in underground reservoirs and clouds. They are also interested in the potential for traditional biosignatures to persist in a dying planet and the challenges of detecting
  them from space.
