personas:
  professional: Frederic Brown, a 23‑year‑old aspiring GIS analyst, blends Python‑driven data analysis with Adobe Photoshop‑enhanced visual storytelling, applying their methodical, organized approach to
    translate environmental datasets into compelling maps, and they let their competitive edge drive them to master intricate geospatial models.
  sports: Frederic Brown, a dedicated long‑distance runner, logs weekend trail runs with the Belgrade Mountain Runners club, follows Red Star Belgrade for occasional motivation, and they incorporate weekly
    strength sessions to prevent runner’s knee, while their competitive streak pushes them to chase personal bests in half‑marathons.
  arts: Frederic Brown, an avid digital collage creator, draws inspiration from Ansel Adams’ monochrome landscapes, David Hockney’s surreal textures, and Brian Eno’s ambient soundscapes, curating reflective
    blog essays that blend philosophy with modern art, and they spend evenings editing night‑sky photographs in Photoshop.
  travel: Frederic Brown, a solitary explorer, meticulously plans off‑season trips to dark‑sky reserves such as the Atacama Desert and Norway’s Lofoten Islands for astrophotography, prefers budget hostels
    over group tours, and they often map routes using offline GIS tools to align hikes with sunrise and celestial events.
  culinary: Frederic Brown, a competent home cook, favors simple, nutrient‑dense meals like quinoa‑seed salads with roasted beetroot and rosemary‑marinated trout, enjoys experimenting with seasonal herbs,
    and they occasionally treat themselves to a meticulously prepared espresso using freshly ground beans.
  core: Frederic Brown, a methodical lone‑wolf with a restless curiosity, channels competitive precision into data‑driven art while wrestling with chronic worry and a compulsive need to perfect every photo,
    map, and watch mechanism.
background:
  cultural: Frederic comes from a white, middle‑class Midwestern family with deep roots in farming communities across Montana. Growing up in Gallatin County, he was immersed in a culture that values self‑reliance,
    respect for the natural environment, and a quiet, contemplative lifestyle. His family encouraged an appreciation for classic American art, literature, and practical skills, while his schooling exposed
    him to a broad range of cultural ideas, fostering his open‑minded curiosity. This blend of rural pragmatism and exposure to diverse artistic influences shapes his worldview, emphasizing methodical thinking,
    solitary creative expression, and a competitive drive to excel in his chosen fields.
