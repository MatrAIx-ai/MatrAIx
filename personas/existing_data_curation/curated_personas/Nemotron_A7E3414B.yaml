  hobbies: '[''Hiking'', ''Bird watching'', ''Night sky photography'', ''Digital collage'', ''Blogging (reflective essays)'', ''Long‑distance running'', ''Vintage watch maintenance'', ''Reading philosophy
    and art literature'']'
  career_goals: Frederic aims to secure a remote position as a GIS analyst or environmental data scientist, where he can combine his analytical expertise with his visual storytelling skills. He plans to
    enroll in a master's program in environmental science or data science within the next two years, focusing on climate‑impact modeling for rural communities. His long‑term ambition is to establish a freelance
    consultancy that offers data‑driven insights and custom visualizations (maps, infographics, photo essays) for NGOs and government agencies, allowing him to work autonomously while maintaining a competitive
    edge in his field. He is methodical in his career planning, setting measurable milestones and continuously expanding his technical portfolio.
