  hobbies: '[''Listening to music'', ''Fishing'', ''Hunting'', ''Community volunteering'', ''Organizing events'', ''Pickup basketball'', ''Attending football games'', ''Car maintenance'', ''Streaming video
    games'']'
  career_goals: Brent plans to obtain his Commercial Driver’s License (CDL) within the next year and secure a full-time position with a reputable logistics firm, focusing on consistent, long-haul routes
    that allow him to apply his routine-oriented work style. He aims to progress to a supervisory or fleet-management role where he can mentor new drivers and improve operational efficiency. In the longer
    term, he hopes to own a small fleet of trucks serving local agricultural producers in southern Georgia, combining his driving expertise with his interest in sales and community service.
