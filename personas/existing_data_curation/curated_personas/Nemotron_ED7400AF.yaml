  hobbies: '["Basketball", "Playing bongos", "Cooking Dominican dishes", "Dancing to merengue and bachata", "Weightlifting", "Community volunteering at cultural festivals", "Video gaming"]'
  career_goals: Kelvin aims to advance from his current material‑mover role to a supervisory position within the next two years. He plans to obtain a Certified Forklift Operator credential and an Advanced
    Safety Specialist certification to strengthen his qualifications. Long‑term, he envisions becoming a warehouse manager, overseeing larger distribution centers, and eventually launching his own logistics
    and moving business that emphasizes reliable service and employee development. Achieving a stable, upward‑mobile career is especially important to him as a way to manage his anxiety and provide financial
    security.
