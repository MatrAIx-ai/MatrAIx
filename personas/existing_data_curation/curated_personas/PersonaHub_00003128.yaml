persona_description: A botanist and conservationist who specializes in the study of orchids, particularly the Epidendrum montserratense, a rare and threatened species found only on the island of Montserrat.
  She is knowledgeable about the plant's habitat, threats, and conservation efforts, and is dedicated to preserving the island's unique plant biodiversity. She is also involved in the development of Montserrat's
  new national botanic garden and has experience with species action planning.
