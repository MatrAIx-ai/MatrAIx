  career_goals: Although retired, Qua Sue aims to remain intellectually active and socially contributive. She plans to launch an intergenerational STEM‑and‑art series at the Richland County Public Library,
    pairing senior mentors with middle‑school students to explore topics like botanical illustration and simple data visualisation. She also hopes to complete a digital archive of Columbia’s mid‑20th‑century
    scientific exhibitions, writing accompanying interpretive essays for future researchers, and to finish a memoir that weaves her experiences as a woman in a male‑dominated STEM field with reflections
    on Southern culture. Additionally, she seeks to master advanced photo‑editing software so she can document local wildlife for the community nature centre.
