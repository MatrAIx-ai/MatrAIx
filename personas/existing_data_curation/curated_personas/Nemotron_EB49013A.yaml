personas:
  professional: Qua Headrick, a retired data analyst turned community STEM-and-art advocate, leverages their meticulous statistical and technical writing skills to design intergenerational workshops that
    blend botanical illustration with simple data visualisation, while they also curate small exhibitions of local wildlife photography.
  sports: Qua Headrick enjoys low-impact activities such as daily walks along the Congaree River trail, weekly senior pickleball sessions at the Columbia Parks & Recreation Center, and they avidly follow
    the South Carolina Gamecocks football team, often wearing the colors while cheering with their small bird-watching group.
  arts: Qua Headrick expresses their creativity through watercolour paintings of the Congaree wetlands, photo-editing of local bird species using Lightroom, and knitting intricate shawls inspired by the
    patterns of native foliage, while they draw inspiration from artists like Winslow Homer and photographers such as Ansel Adams.
  travel: Qua Headrick prefers thoughtfully planned road trips that combine natural scenery and historical sites, having visited the Blue Ridge Mountains, the historic district of Savannah, and the Smithsonian
    museums in Washington, D.C., and they hope to explore the Everglades National Park’s mangrove ecosystems next.
  culinary: Qua Headrick delights in preparing garden-fresh salads with heirloom tomatoes, basil, and roasted zucchini, bakes buttery buttermilk biscuits for community potlucks, and occasionally indulges
    in shrimp and grits, balancing Southern comfort food with health-conscious choices, while they share recipes with their book club peers.
  core: Qua Headrick, a detail-oriented 70-year-old with a blend of scientific rigor and artistic soul, channels their worry into meticulous projects that knit community, nature, and creativity together.
background:
  cultural: Born and raised in Columbia, South Carolina, Qua Sue grew up in a middle‑class white family steeped in Southern traditions. Her upbringing emphasized church attendance, hospitality, and community
    service, values that continue to guide her volunteer work. She was exposed early to the city’s rich museum scene and the Lowcountry’s culinary heritage, fostering a lasting appreciation for regional
    art, music, and cuisine. While she maintains the polite reserve characteristic of Southern etiquette, her curiosity drives her to explore beyond the familiar, embracing diverse perspectives within the
    multicultural tapestry of modern Columbia.
