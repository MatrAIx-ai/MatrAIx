  hobbies: '[''Abstract painting'', ''Reading philosophy and science-fiction'', ''Playing the bandoneón'', ''Gardening'', ''Cooking traditional Uruguayan dishes'', ''Book club participation'', ''Volunteering
    teaching Spanish'', ''Attending local art fairs'']'
  career_goals: Diego aims to transition into a supervisory role within the next two years, targeting a shift‑lead position where he can spearhead continuous‑improvement projects and mentor a crew of operators.
    He plans to obtain a Six Sigma Green Belt certification to formalize his expertise in process optimization. In the longer term, he envisions taking on the role of safety coordinator to ensure a zero‑incident
    workplace, and eventually, as he approaches retirement, to launch a small import‑distribution business that brings authentic Uruguayan food products to the Mid‑West market. He also aspires to be recognized
    as a reliable trainer and a bridge between the plant’s diverse workforce.
