  career_goals: Although retired, Mary Lynn is driven to keep learning and giving back. She aims to curate a series of traveling exhibitions that showcase underrepresented Texas artists, publish a memoir
    that weaves her family’s stories with Dallas’s cultural history, and develop a digital archive of oral histories from senior residents. She also hopes to mentor younger volunteers at the Dallas Museum
    of Art, secure a modest endowment for local art‑education scholarships, and win a regional bridge championship as a testament to her competitive spirit.
