  career_goals: At 55, Colin aims to transition from day‑to‑day operational oversight to a mentorship and consulting role where he can help other small businesses in the Pacific Northwest adopt sustainable,
    efficient practices. He envisions establishing a boutique consultancy that blends his operational expertise with his love for art and craftsmanship, advising local wineries, craft breweries, and artisan
    workshops. Colin also hopes to create a legacy of empowerment by training a successor within his current organization, allowing him more time to pursue personal passions while remaining a trusted advisor
    to his industry peers.
