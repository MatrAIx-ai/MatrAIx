persona_description: A Pakistani rural development NGO leader and CEO, Shandana Khan, who has coordinated and inspired many independent development agencies in Pakistan since 1982. Her work has been coordinated
  or inspired by two other Pakistani rural development pioneers, Dr. Akhtar Hameed Khan and Shoaib Sultan Khan, who developed agricultural development schemes and rural credit unions, respectively. Her
  work has been recognized by the United Nations Development Program (UNDP) and she has been nominated for the Nobel Peace Prize. Khan's work is important now more than ever as Pakistan's development NGOs
  face decreasing support from Western donors.
