  hobbies: '["Soccer", "Hiking", "Car Restoration", "Cooking Mexican Cuisine", "Listening to Regional Mexican Music", "Video Gaming (Racing Simulators)", "Watching Action Movies", "Attending Mexican Cultural
    Festivals"]'
  career_goals: Emmanuel aims to obtain his full CDL with hazardous‑materials endorsement within the next year and secure a stable position with a reputable logistics company in Colorado. He plans to save
    enough to purchase his own truck and transition to an independent contractor role, eventually building a small fleet that can serve cross‑border routes between the U.S. Southwest and Mexico. To support
    this ambition, he intends to enroll in community‑college courses in transportation management and business, develop stronger organizational habits to reduce stress, and eventually move into a supervisory
    or dispatch role where he can mentor new drivers.
