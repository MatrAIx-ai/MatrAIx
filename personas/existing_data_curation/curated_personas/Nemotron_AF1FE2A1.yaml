personas:
  professional: Teddy Cogar, a seasoned small‑town retailer with decades of hands‑on experience, leverages meticulous inventory control, personalized customer service, and calm conflict resolution to lead
    store operations, while preparing to earn a retail management certification and mentor younger staff.
  sports: Teddy Cogar enjoys low‑impact fitness through gardening and weekend fishing excursions, follows the Chicago Cubs and the Green Bay Packers on television, participates in the local senior bowling
    league, and joins the community fly‑fishing club each spring.
  arts: Teddy Cogar captures rural scenery with a vintage film camera, admires the work of Ansel Adams, listens to classic folk‑rock legends like Bob Dylan while building model‑train layouts, and attends
    the town’s annual summer theatre production of ‘Our Town’.
  travel: Teddy Cogar prefers meticulously planned road trips to historic sites such as Williamsburg, Virginia and natural wonders like Yellowstone National Park, favoring mid‑week stays at modest motels
    to stretch a fixed travel budget, while dreaming of a future cruise along the Norwegian fjords.
  culinary: Teddy Cogar delights in cooking garden‑fresh vegetables into hearty stews, regularly prepares roasted chicken with rosemary and sweet potatoes, enjoys the tang of homemade apple cider vinegar,
    but admits a habit of over‑salting dishes when distracted by woodworking projects.
  core: Teddy Cogar blends quiet curiosity with methodical pragmatism, turning solitary hobbies into community‑building ventures while secretly hoarding antique hand tools and occasionally forgetting to
    water their houseplants.
background:
  cultural: Teddy was raised in the rural heart of Hocking County, Ohio, a region shaped by Appalachian and Midwestern farming traditions. His ancestry traces back to English and German settlers who arrived
    in the 19th century. Community life revolved around the local Lutheran church and the county fair, instilling values of hard work, modesty, and self‑reliance. Growing up around a family‑run hardware
    store gave him a practical, hands‑on approach to problem‑solving and a deep sense of responsibility to his neighbors and the broader community.
