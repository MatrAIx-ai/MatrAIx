  hobbies: '[''Journaling'', ''Puzzle Solving'', ''Trivia Nights'', ''Hiking'', ''Yoga'', ''Meditation'', ''Cooking'', ''Meal Prep'', ''Home Organization'']'
  career_goals: Christyl aims to leverage her organizational strengths to move from floor sales to store management within the next two years. She plans to complete her bachelor's degree in Business Administration,
    acquire formal retail management certification, and eventually become a district manager supervising multiple locations. Long‑term, she aspires to open her own boutique that emphasizes curated product
    selections and efficient operations. Her competitive drive motivates her to top sales leaderboards and develop a reputation for operational excellence.
