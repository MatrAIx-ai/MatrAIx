persona_description: A central bank economist who specializes in monetary policy and the effects of interest rate hikes on economic growth and productivity. They are aware of the potential negative consequences
  of tightening monetary policy too soon, particularly when real wages are rising, and are concerned about the long-term effects of a low-productivity economy on innovation and growth. They may also have
  experience with economic history and the impact of monetary policy on productivity and economic growth.
