personas:
  professional: Mary Griffin, a veteran messenger turned logistics specialist, leverages her GPS route-planning expertise, hands-on vehicle maintenance skills, and natural assertiveness to train couriers
    while injecting spontaneous, talkative flair into every delivery, positioning her emerging electric-van fleet as a community-focused, environmentally mindful service for Park City's small businesses.
  sports: Mary Griffin, an avid hiker and occasional pickleball player at the local senior center, follows the Utah Jazz and Real Salt Lake, joins the Park City Trail Runners for weekend treks, and embraces
    cross-country skiing each winter to stay fit despite her spontaneous scheduling.
  arts: Mary Griffin, a spirited participant in community theater both onstage and backstage, delights in improvisational comedy, draws inspiration from Lin-Manuel Miranda's musical storytelling and Ansel
    Adams' wildlife photography, and regularly volunteers to read classic tales for seniors, blending performance with visual art.
  travel: Mary Griffin prefers spur-of-the-moment day trips to nearby trailheads like the Wasatch Range, dreams of photographing Patagonia's glaciers, and plans a weekend getaway to New Zealand's South
    Island once her electric-van fleet stabilizes financially, balancing wanderlust with budget constraints.
  culinary: Mary Griffin experiments with farm-to-table dishes such as roasted beet quinoa salad, wild mushroom risotto, and honey-glazed cornbread, sourcing ingredients from the Park City farmers market,
    while her knitting sessions often double as potluck prep clinics where she shares recipes and stories.
  core: Mary Griffin is a talkative, spontaneous logistics guru who blends a love of wildlife photography, theater, and knitting with a pragmatic drive to launch an eco-friendly delivery service, even if
    she occasionally forgets to file paperwork on time.
background:
  cultural: Born to a family of Midwest farmers who moved to Montana during the 1970s, Mary grew up in a tightly knit rural community that prized self‑reliance, hard work, and neighborly assistance. While
    she embraces mainstream American culture—celebrating holidays like Thanksgiving and the Fourth of July—she also participates in local traditions such as county fairs, potluck gatherings, and church
    socials. Her upbringing instilled a respect for the outdoors and a practical, down‑to‑earth outlook, which continues to shape how she approaches both work and leisure.
attributes:
  skills: '[''Customer service and communication'', ''Rural navigation and route optimization'', ''Hands‑on vehicle maintenance'', ''Parcel handling and loss‑prevention'', ''Basic logistics software (e.g.,
    Route4Me, Google Maps)'', ''Community liaison and event coordination'', ''Problem solving under time pressure'']'
  hobbies: '[''Hiking and trail exploration'', ''Wildlife and nature photography'', ''Community theater acting and backstage work'', ''Knitting and craftwork'', ''Volunteer storytelling at senior center'',
    ''Spontaneous road trips'', ''Cooking and experimenting with local farm produce'']'
  career_goals: Mary aims to transform her decades‑long experience as a messenger into a locally owned logistics service that supports small businesses and farms in Park City and surrounding areas. Within
    the next two years she plans to obtain a commercial driver’s license and acquire a small fleet of electric vans, positioning her venture as an environmentally friendly alternative. She also hopes to
    become a mentor for new couriers, offering informal training sessions focused on customer relations and route efficiency. Long‑term, Mary envisions expanding the service to include same‑day deliveries
    for the region’s growing artisan market and possibly partnering with the community theater to provide logistical support for events.
