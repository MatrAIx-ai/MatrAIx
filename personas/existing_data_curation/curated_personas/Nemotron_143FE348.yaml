  hobbies: '[''Zydeco dancing'', ''Cajun cooking and recipe experimentation'', ''Gardening'', ''DIY crafts'', ''Reading romance novels'', ''Hosting community potlucks'', ''Volunteering at local festivals'',
    ''Attending music concerts'']'
  career_goals: Marie aims to advance from her current childcare worker role to a lead teacher or director position at a community preschool, where she can shape program curricula and mentor new staff.
    She plans to earn a Child Development Associate credential and eventually pursue an associate degree in early childhood education. Long‑term, she dreams of opening a family‑run daycare that integrates
    Louisiana’s cultural heritage—such as zydeco music and local cooking—into daily learning, while maintaining the flexible, people‑centered atmosphere she thrives in.
