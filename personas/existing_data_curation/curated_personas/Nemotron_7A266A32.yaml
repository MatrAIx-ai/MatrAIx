  hobbies: '[''Reading contemporary fiction'',''Gardening'',''Knitting'',''Birdwatching'',''Journaling'',''Baking'',''Nature walks'',''Puzzle solving (crosswords, jigsaws)'']'
  career_goals: Jennifer aims to earn her GED within the next year and enroll in an online horticulture certificate program to deepen her gardening expertise. She hopes to turn her love of preserves and
    handcrafted textiles into a modest home‑based business selling jams, pickles, and knitwear at local farmers’ markets. Additionally, she wants to volunteer regularly at the town community center, leading
    senior‑friendship circles and offering informal peer support, while also improving her organizational habits through time‑management workshops.
