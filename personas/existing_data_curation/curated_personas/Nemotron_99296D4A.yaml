personas:
  professional: Donna Lee, a line‑cook in Albuquerque’s bustling kitchen scene, blends hands‑on expertise in New Mexican staples with Southern comfort flavors, and they channel a competitive edge and relaxed,
    improvisational style into innovative plating that earns a reputation for quick problem‑solving despite a tendency toward organized chaos.
  sports: Donna Lee fuels their fitness routine with weekend hikes up the Sandia Mountains, occasional yoga sessions at a local studio, and they avidly follow the Albuquerque Isotopes and New Mexico United,
    cheering them on while jogging in the early mornings.
  arts: Donna Lee channels her love for visual art into sketching plating concepts while exploring Albuquerque’s vibrant street murals, and they immerse themselves in the sounds of jazz legends like Miles
    Davis and Ella Fitzgerald on a prized vintage vinyl collection.
  travel: Donna Lee prefers spontaneous road trips that blend culinary curiosity with scenic hikes, having already explored Santa Fe, Austin, and New Orleans, while they dream of a culinary pilgrimage to
    Oaxaca’s spice markets and a weekend trek through Colorado’s Rocky Mountains.
  culinary: Donna Lee’s culinary palate fuses collard greens, fried chicken, and cornbread with New Mexican green chile enchiladas, roasted corn, and a dash of smoked paprika discovered on a cooking podcast,
    and they reflect an experimental yet grounded approach to home cooking.
  core: Donna Lee is a curious, competitive culinary artist whose love for experimental flavors and visual plating is balanced by a flexible, sometimes chaotic approach to both work and life, and they often
    juggle multiple projects at once.
background:
  cultural: Donna grew up in a close‑knit African‑American family that carried forward Southern soul‑food traditions, such as collard greens, fried chicken, and cornbread, while living in the multicultural
    environment of Albuquerque. The city's blend of Native American, Hispanic, and Southwestern influences shaped her palate, introducing her to chiles, beans, and corn‑based dishes from an early age. As
    a Black woman in a predominantly Hispanic region, she has navigated both cultural celebration and occasional marginalization, fostering a resilient identity. She participates in local cultural festivals
    that honor Black heritage and Southwestern arts, and she draws on this rich tapestry to infuse her cooking with stories of community, perseverance, and creativity.
attributes:
  skills: '[''Food preparation and cooking'', ''New Mexican cuisine expertise'', ''Soul‑food flavor integration'', ''Creative plating and visual presentation'', ''Food safety and sanitation compliance'',
    ''Ingredient sourcing and stock management'', ''Flexible time‑management under pressure'', ''Improvisational recipe development'', ''Basic kitchen equipment maintenance'', ''Team coordination with competitive
    edge'']'
  hobbies: '[''Visiting local art galleries and murals'', ''Sketching food plating concepts'', ''Experimenting with new recipes at home'', ''Listening to cooking and food‑culture podcasts'', ''Hiking in
    the Sandia Mountains'', ''Collecting vintage vinyl records (jazz, blues)'', ''Attending small‑group cooking workshops'', ''Reading about culinary history and cultural food traditions'']'
  career_goals: Donna aims to move from a line‑cook role to a lead‑chef position where she can design a menu that blends her African‑American culinary roots with New Mexican flavors. She plans to earn a
    ServSafe certification and eventually attend a community culinary program to formalize her knowledge. Her long‑term ambition is to open a modest food‑truck or pop‑up kitchen that showcases her signature
    fusion dishes, while also mentoring other under‑represented individuals interested in cooking. She hopes her innovative plating and flavor pairings will earn recognition in local foodie circles, allowing
    her to influence the regional food scene.
