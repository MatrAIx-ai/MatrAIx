  hobbies: '[''Visiting art galleries and museums'', ''Sketching urban scenes'', ''Street photography'', ''Reading speculative fiction'', ''Live jazz and hip‑hop concerts'', ''Tabletop strategy games'',
    ''Hiking the Lake Michigan shoreline'', ''Yoga and mindfulness practice'']'
  career_goals: Le aims to transition from frontline surveillance to a supervisory role within the casino security department, eventually becoming a Security Operations Manager. She plans to earn the Certified
    Protection Professional (CPP) credential and to specialize in emerging technologies such as AI‑driven video analysis. Le is also interested in developing training modules that blend artistic visual
    techniques with security best practices, improving both situational awareness and cultural sensitivity among her colleagues. Long‑term, she envisions leading a regional security strategy that emphasizes
    community outreach and integrates creative problem‑solving.
