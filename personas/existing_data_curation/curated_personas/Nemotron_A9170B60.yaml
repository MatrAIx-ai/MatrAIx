  hobbies: '[''Gardening'', ''Car maintenance'', ''DIY home projects'', ''Watching football'', ''Fishing'', ''Volunteering at senior center'', ''Cooking family meals'']'
  career_goals: Rene aims to solidify his position as a certified nursing assistant (CNA) within the next year by completing the required training and exam. He plans to pursue a Licensed Practical Nurse
    (LPN) credential through evening courses at a community college, balancing his studies with his current job and family responsibilities. Long‑term, he aspires to become a patient care coordinator or
    a shift supervisor at a reputable Orange County hospital, where he can leverage his organizational strengths to improve workflow efficiency and mentor newer staff. He also hopes to secure a steady income
    that supports his family’s homeownership goals and future college plans for his children.
