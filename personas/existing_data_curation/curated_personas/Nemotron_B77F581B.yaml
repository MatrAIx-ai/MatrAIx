  hobbies: '[''drawing and coloring'', ''visiting museums and galleries'', ''listening to music'', ''simple science experiments (mixing colors, water play)'', ''reading picture books and listening to stories'',
    ''building with blocks and LEGO'', ''sandbox play and tactile exploration'']'
  career_goals: Rasean often talks about wanting to become an artist who paints bright pictures that make people smile, or a community helper who visits children’s hospitals to bring joy. He imagines exploring
    museums and learning about different cultures, hoping one day to share his love of art, music, and stories with others. His calm and caring nature fuels a desire to create a peaceful, happy world for
    his friends and family.
