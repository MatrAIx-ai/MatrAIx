  career_goals: Benjamin aims to advance to the rank of Sergeant within the next two years, positioning himself for a future move into the Criminal Investigation Division as a detective. He is eager to
    lead a specialized unit—such as the SWAT team or a data‑driven crime‑reduction task force—where he can apply his analytical curiosity and practical skill set. To support these ambitions, he plans to
    earn an associate degree in Criminal Justice and complete advanced training in forensic technology and leadership. Ultimately, Benjamin wants to be recognized for building stronger community ties and
    lowering violent‑crime rates in Harrison and the surrounding counties.
