personas:
  professional: Benjamin Manion, a 35‑year‑old police officer in Harrison, blends methodical investigative rigor with a competitive edge, excelling at forensic documentation, tactical driving, and community‑policing
    initiatives while leveraging their outgoing nature to mentor junior officers and lead public‑speaking events.
  sports: Benjamin Manion channels their competitive spirit into weekend mountain‑bike rides on Ozark backroads, regular weight‑lifting sessions at the town gym, a seasonal recreational basketball league
    that follows the NBA’s Milwaukee Bucks, and IDPA shooting matches, while cheering the Kansas City Chiefs and St. Louis Cardinals as hometown professional teams.
  arts: Benjamin Manion unwinds with true‑crime novels by Michelle McNamara, forensic podcasts like "Criminal," and complements their woodworking hobby by listening to classic rock icons such as The Eagles
    and country legends like Johnny Cash, while occasional evenings include watching film‑noir classics by Alfred Hitchcock.
  travel: Benjamin Manion prefers purpose‑driven getaways that combine hiking and fishing, having trekked the Rocky Mountain National Park trails and cast lines in Alaska’s Kenai River, while budgeting
    for future road‑trip adventures along the Pacific Coast Highway, balancing family commitments with a love for remote wilderness.
  culinary: Benjamin Manion favors hearty, protein‑rich meals, often grilling venison or trout seasoned with rosemary, smoked paprika, and lemon zest, while mastering a solid skill at cooking classic Southern‑style
    chicken‑fried steak and pairing dishes with locally brewed IPA.
  core: Benjamin Manion is a methodical, competitively driven police officer who balances disciplined budgeting, chronic back‑aches from weightlifting, a love of true‑crime media, and an unrelenting pursuit
    of outdoor adventure, even if that sometimes means impulsively splurging on the latest bike gear.
background:
  cultural: Benjamin grew up in a small‑town, white, Southern‑Arkansas environment where community bonds, self‑reliance, and respect for tradition were emphasized. His family attended a local Baptist church,
    and he was immersed in the rhythms of high‑school football Saturdays, church picnics, and outdoor pursuits that define the region. This upbringing fostered a pragmatic worldview, a strong sense of duty,
    and a deep appreciation for the natural beauty of the Ozarks. While he values the conservative, law‑and‑order ethos of his roots, his curiosity drives him to explore new ideas and methods, balancing
    tradition with innovation in both his personal life and policing career.
