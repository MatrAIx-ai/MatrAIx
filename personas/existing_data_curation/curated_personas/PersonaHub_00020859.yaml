persona_description: A marine biologist and environmental scientist who specializes in the study of the Chesapeake Bay ecosystem, particularly its impact on juvenile oyster growth and the effects of increasing
  atmospheric carbon dioxide on the bay. She has conducted research on the complex response of oyster shell formation to temperature, salinity, and acidity, and has shown that thinner shells render juvenile
  oysters increasingly vulnerable to crab predation. She has also noted the need to develop better monitoring and measurement protocols of the carbonate system in highly variable estuarine waters, especially
  in light of the sensitivity of oyster shell growth to changes in pH, salinity, and temperature.
