  career_goals: Rudolf hopes to refine his artistic and technical abilities enough to attend a college program in visual communication, graphic design, or game development. He dreams of working as a concept
    artist or digital animator for a video‑game studio, where he can blend his love for new ideas with his competitive drive to produce standout work. As a backup, he envisions launching his own YouTube
    channel showcasing tutorials, short films, and music performances, giving him flexibility and the ability to build an audience on his own terms. He also wants to overcome his current academic gaps,
    earn his high‑school diploma, and perhaps study computer science to broaden his career options.
