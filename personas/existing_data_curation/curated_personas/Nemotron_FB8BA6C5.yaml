  hobbies: '[''Group fitness classes'', ''Rock climbing'', ''Community theater'', ''Hosting dinner parties'', ''Cooking seasonal Midwestern dishes'', ''Listening to true‑crime podcasts'', ''Reading investigative
    memoirs'', ''Guided journaling'', ''Yoga'', ''Volunteering at a domestic‑violence shelter'']'
  career_goals: Eve aims to become a recognized specialist in financial fraud and cybercrime investigations within the next five years, securing a senior investigator position at a reputable private security
    firm. She plans to earn the Certified Professional Investigator (CPI) credential and eventually launch her own boutique detective agency focused on corporate security consulting and high‑stakes litigation
    support. Eve also aspires to develop a training program for emerging investigators that emphasizes structured methodologies, stress‑resilience techniques, and ethical investigative practices. Long‑term,
    she envisions contributing to policy development on privacy and digital surveillance standards at the state level.
