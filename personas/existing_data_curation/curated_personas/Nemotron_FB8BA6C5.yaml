personas:
  professional: Eve Bernal is a meticulous private investigator who leverages a structured, methodical approach to surveillance, forensic photography, and digital forensics, while their competitive drive
    and healthy skepticism push them to out‑pace colleagues and produce bullet‑proof reports that blend Midwestern pragmatism with relentless attention to detail.
  sports: Eve Bernal fuels their fitness regimen with spin and HIIT classes, conquers new routes at the local indoor rock‑climbing gym, supports the Cincinnati Reds, Bengals, and FC Cincinnati, and squeezes
    in a weekend co‑ed softball league to satisfy their sociable, high‑energy nature.
  arts: Eve Bernal thrives onstage with a community theater troupe, delivering improv and mystery‑themed performances that echo the narrative twists of Neil Gaiman, while their playlists regularly feature
    the folk energy of The Avett Brothers and the theatrical flair of Lin‑Manuel Miranda.
  travel: Eve Bernal balances investigative commitments with purposeful travel, planning weekend road trips to Chicago, craft‑beer tours in Milwaukee, and an annual pilgrimage to Munich for Oktoberfest,
    while budgeting carefully to fund occasional cybercrime conferences in Washington, D.C., that align with their career goals.
  culinary: Eve Bernal delights in cooking seasonal Midwestern fare such as pork tenderloin with apple compote, hand‑rolled pierogi, and heirloom corn succotash, pairing each dish with a selection of local
    craft beers from Cincinnati’s Rhinegeist and MadTree breweries, and revels in hosting dinner parties that showcase these flavors.
  core: Eve Bernal is a highly organized, competitive private investigator in her late thirties who couples Midwestern pragmatism with a love for high‑intensity fitness, improv theater, and craft beer,
    all while wrestling with a chronic worry habit that fuels both diligence and occasional stress‑induced insomnia.
background:
  cultural: Eve grew up in Cincinnati, a city with deep German and Irish roots, and she identifies with the Midwestern values of hard work, community involvement, and respect for law and order. Her family
    traditions include celebrating Oktoberfest with local breweries and participating in neighborhood volunteer events. Raised in a Protestant household, she attended a local Methodist church, which instilled
    a sense of civic duty and charitable service. This cultural environment shaped her pragmatic outlook, competitive spirit, and sociable nature, while also fostering an awareness of the complexities of
    human behavior that fuels her investigative passion.
