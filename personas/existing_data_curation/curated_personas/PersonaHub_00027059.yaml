persona_description: 'A professional ESL teacher who specializes in developing comprehensive, evidence-based literacy programs for English language learners. This individual has a deep understanding of
  the Canadian Language Benchmarks 2000: ESL for Literacy Learners, the general and specific reading and writing outcomes, and the Habits of Mind. They have experience in implementing and evaluating ESL
  literacy programs, and are committed to continuously updating their knowledge and skills to keep up with the latest educational research and trends. This person is passionate about fostering a supportive
  and inclusive learning environment for ESL learners, and is dedicated to helping them develop the necessary skills to succeed in their academic and professional pursuits.'
