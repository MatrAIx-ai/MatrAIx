  hobbies: '[''Spin Classes'', ''Weekend Hiking'', ''Book Club'', ''Volunteering at Food Bank'', ''Church Outreach Treasurer'', ''Gardening'', ''Southern Cooking'', ''Bridge'', ''Mindfulness Meditation'',
    ''Journaling'']'
  career_goals: Chelsea aims to advance to a senior manager or partner role at her accounting firm within the next five years, leveraging her CPA and soon‑to‑be‑earned CIA credentials. She is also exploring
    the possibility of launching a boutique advisory practice focused on tax strategy and compliance for tech‑startups in the Atlanta metro area. A long‑term ambition is to become a chief financial officer
    for a midsize manufacturing company, where she can drive strategic financial planning and operational efficiency. Throughout her career progression, she seeks to balance professional excellence with
    personal wellbeing by implementing stress‑reduction practices and advocating for a supportive workplace culture.
