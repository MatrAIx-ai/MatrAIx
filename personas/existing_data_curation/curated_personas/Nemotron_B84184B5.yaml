    Live Music Events'']'
  career_goals: Eun aims to advance into a leadership position such as Director of Student Success or Head of Career Services within a university or large school district. She is passionate about creating
    interdisciplinary programs that blend arts and STEM to broaden students' horizons. Over the next five years she plans to earn board certification as a career counselor, publish research on the effectiveness
    of flexible, art‑infused career guidance, and launch a community outreach consultancy that offers mentorship and career workshops to underrepresented youth in the Atlanta metro area. Ultimately, she
    envisions establishing a regional network of schools and industry partners that co‑creates innovative pathways for students.
