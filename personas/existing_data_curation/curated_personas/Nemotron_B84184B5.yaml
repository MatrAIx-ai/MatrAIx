personas:
  professional: Eun Du, a seasoned educational guidance counselor with a STEM background, leverages data-driven psychometric tools and culturally responsive advising to design interdisciplinary career programs,
    while their relaxed, flexible approach and sociable energy keep campus workshops lively and inventive.
  sports: Eun Du, an avid yogi and Blue Ridge Hiking Society member, follows the Atlanta Falcons in football, supports the Atlanta Braves during baseball season, and joins weekend group trail runs, blending
    low‑impact exercise with enthusiastic local team fandom.
  arts: Eun Du channels their curiosity into abstract painting inspired by visits to the High Museum of Art, draws creative energy from artists like Jackson Pollock and Yayoi Kusama, and finds rhythm in
    playlists featuring Kendrick Lamar and Phoebe Bridgers while documenting gallery tours through photography.
  travel: Eun Du prefers spontaneous cultural immersion trips, balancing weekend getaways to historic Savannah with longer adventures to Asian heritage sites such as Kyoto and the Great Wall, planning itineraries
    on the fly using travel apps while budgeting for student‑friendly accommodations.
  culinary: Eun Du loves experimenting with fusion cuisine, skillfully marrying spicy Asian marinades with Southern BBQ rubs to create dishes like kimchi‑infused pulled pork tacos, and often sources fresh
    corn, gochujang, and smoked paprika at the local farmer’s market.
  core: Eun Du is a flexible, art‑obsessed STEM counselor who balances data‑driven career guidance with spontaneous creativity, a quirky habit of over‑booking workshops, and a love for hiking, fusion cooking,
    and cheering on Atlanta sports teams.
background:
  cultural: Eun comes from an East Asian (Korean) family that emphasized education, respect for elders, and community cohesion. Growing up bilingual, she celebrates Lunar New Year, Chuseok, and participates
    in traditional practices such as kimchi making and tea ceremonies. After moving to the United States, she blended these traditions with Southern culture in Alpharetta, embracing local festivals and
    community events. This multicultural upbringing informs her open‑minded outlook, her appreciation for varied artistic expressions, and her commitment to fostering inclusive, cross‑cultural educational
    experiences.
