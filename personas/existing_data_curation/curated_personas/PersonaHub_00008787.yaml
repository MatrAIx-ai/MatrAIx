persona_description: Mubarak Awad is a Palestinian nonviolence expert who has dedicated his life to promoting nonviolent action and reducing the use of violence worldwide. He has taught at the American
  University in Washington, D.C. since the early 1990s and is an Adjunct Professor in the School of International Service. Awad founded Nonviolence International, a non-governmental organization in Special
  Consultative Status with the United Nations Economic and Social Council, and has taught at the American University in Washington, D.C. since the early 1990s. He is also an Adjunct Professor in the School
  of International Service where he teaches classes in the theories and methods of nonviolence. Awad has worked on various issues related to nonviolence, including the deportation of Palestinians by Israel,
  and has contributed to the field of nonviolence with his work in the Occupied Territories.
