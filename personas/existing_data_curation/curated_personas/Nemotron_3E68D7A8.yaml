personas:
  professional: Alexis Daluz, a 44‑year‑old senior full‑stack developer with a business background, applies a critical, data‑driven approach and a competitive edge to architect scalable cloud solutions,
    champion agile best practices, and rigorously mentor junior programmers; they are also positioning themselves for a lead architect or engineering manager role that blends strategic product vision with
    hands‑on code craftsmanship.
  sports: Alexis Daluz, an avid hiker in DeSoto County who trails the local nature paths every weekend, follows the Tampa Bay Rays baseball team and the Jacksonville Jaguars football team, and they are
    an active member of the DeSoto Trails Club where they combine cardio workouts with occasional yoga sessions to maintain fitness.
  arts: Alexis Daluz, a passionate photographer of Southern landscapes who devotes evenings to capturing sunrise over pine‑lined wetlands, reads science‑fiction classics by Isaac Asimov and contemporary
    works by N.K. Jemisin, and they regularly binge retro video games while curating a personal collection that includes titles from the 1990s, finding creative inspiration in both analog and digital art.
  travel: Alexis Daluz, a seasoned road‑tripper who meticulously plans trips with spreadsheet itineraries, has hiked the Blue Ridge Parkway, explored Reykjavik’s geothermal pools, and they aspire to trek
    Patagonia’s Torres del Paine in the next two years, balancing adventure travel with occasional family‑friendly weekend getaways to nearby Gulf Coast beaches.
  culinary: Alexis Daluz, a confident home cook who perfects Southern comfort dishes like shrimp and grits, fried green tomatoes, and honey‑glazed biscuits, experiments with cast‑iron skillet techniques,
    and they often pair meals with locally sourced collard greens while occasionally treating themselves to late‑night fast‑food tacos after a long debugging session.
  core: Alexis Daluz, a data‑driven tech veteran who balances intense competitive coding marathons with tranquil hikes, often sacrifices sleep for retro gaming, and never misses a chance to mentor an eager
    junior developer.
background:
  cultural: Alexis grew up in the Memphis metropolitan area, absorbing the region's blend of Southern hospitality, strong community ties, and rich musical heritage. Her upbringing emphasized self‑reliance,
    education, and a practical work ethic, which align with her competitive and skeptical outlook. While she identifies as white, her family name reflects a multicultural lineage that fosters an appreciation
    for diverse perspectives. Living in Olive Branch, she benefits from a growing suburban tech scene while staying connected to Southern traditions such as local festivals, barbecue culture, and a love
    for blues and country music.
