  career_goals: Alexis aims to transition from a senior programmer role to a technical leadership position, such as lead architect or engineering manager, where she can shape product strategy and mentor
    junior developers. She is also interested in developing a fintech solution that leverages her business acumen and programming expertise, eventually launching her own consultancy to help midsize firms
    adopt data‑driven technology. Speaking at regional tech conferences and publishing articles on best practices in secure, scalable software are additional long‑term ambitions.
