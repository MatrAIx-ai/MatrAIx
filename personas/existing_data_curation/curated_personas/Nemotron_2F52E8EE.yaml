  hobbies: '["Drawing and coloring", "Building with blocks", "Exploring nature in the backyard", "Collecting rocks and shells", "Listening to picture‑book audiobooks", "Playing simple board games"]'
  career_goals: Even at four, Doni delights in imagining future roles that blend creativity, discovery, and achievement. She often talks about becoming an astronaut or a space explorer to investigate new
    ideas, a museum curator who collects and displays art, or a scientist‑artist who creates illustrations that explain scientific concepts. Her competitive streak fuels a desire to be the best at science
    fairs or art contests, and she dreams of teaching others by sharing stories and drawings that spark curiosity.
