personas:
  professional: Doni Tarantino, a budding preschool architect, meticulously plans block towers with a color‑coded blueprint, channels a competitive edge into building the tallest structure during playtime,
    and they relish the quiet satisfaction of completing each step before moving on.
  sports: Doni Tarantino, a spirited member of the Clarksville Little Sprouts Soccer Club, enjoys short burst games of tag and soccer practice in the spring, cheers on the Indianapolis Colts on weekends,
    and they favor small‑group activities that match their reserved yet competitive nature.
  arts: Doni Tarantino, an eager participant in the community‑center art class, loves painting watercolor butterflies after listening to Disney’s Frozen soundtrack, collects stickers of Walt Disney characters,
    and they often spend solitary afternoons sketching the county fair carousel.
  travel: Doni Tarantino, an enthusiastic explorer who has trekked the Hoosier National Forest’s leaf‑laden trails, enjoyed a family weekend at Chicago’s Museum of Science and Industry, and dreams of watching
    a sunrise over the Grand Canyon while clutching a well‑worn road‑trip map.
  culinary: Doni Tarantino, a budding kitchen helper who can whisk blueberry‑swirled pancake batter, insists on sprinkling cinnamon on mac and cheese, favours crunchy apple slices with peanut butter, and
    they proudly serve a homemade banana split after Sunday school.
  core: Doni Tarantino blends preschool curiosity with meticulous block‑building, disciplined saving, allergy‑aware health habits, selective sports, imaginative art, adventurous family trips, and a surprisingly
    sophisticated palate, all guided by a quiet, competitive spirit.
background:
  cultural: Doni is raised in Clarksville, Indiana, a small Midwestern community where family and neighborhood ties are strong. Her household reflects a typical white, middle‑class American upbringing,
    with regular attendance at a local preschool, participation in community events such as the county fair and library storytimes, and involvement in Sunday school at the nearby church. The town’s modest
    library, community center art classes, and nearby nature trails nurture her appreciation for art, curiosity about the world, and love of quiet, solitary play balanced with small‑group interactions.
