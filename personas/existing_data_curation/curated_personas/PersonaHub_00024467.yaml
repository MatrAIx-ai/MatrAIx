persona_description: A public health scientist with a background in addiction research and a focus on the psychological and social aspects of smoking. They are interested in exploring the potential for
  modified tobacco products to reduce tobacco-related harm and are familiar with the history of tobacco harm reduction, including the development of lower tar and nicotine content cigarettes. They are also
  aware of the challenges in evaluating the population impact of the reduced tar strategy due to a limited understanding of nicotine addiction and are looking for ways to overcome these challenges.
