personas:
  professional: Chris Duke, a 37-year-old board-certified internal medicine physician, leverages data-driven expertise in Epic and Cerner, procedural fluency, and collaborative leadership to spearhead multidisciplinary
    case conferences, while their preference for structure and sociable energy fuels a meticulous yet team-focused approach to clinical decision-making.
  sports: Chris Duke is a regular on the Chattanooga FC recreational soccer team, rides with the Lookout Mountain Bike Club on summer trails, paddles the Tennessee River with the local kayaking crew, and
    roots for the Tennessee Titans, Nashville Predators, and Atlanta Braves while maintaining a disciplined weekly workout schedule that balances competitive play with endurance training.
  arts: Chris Duke blends a love for Southern culinary arts with a deep appreciation for the region's music scene, frequently attending live shows by Jason Isbell, Rhiannon Giddens, and the Chattanooga
    Symphony, and they channel that creativity into experimental home-brewing inspired by craft-brew legends like Hutton & Smith.
  travel: Chris Duke prefers meticulously planned weekend getaways that combine hiking in the Great Smoky Mountains, kayaking on Lake Lanier, and savoring farm-to-table meals in Asheville, while they dream
    of a month-long immersion in the Scottish Highlands to study rural health models, balancing adventure with a tight professional calendar.
  culinary: Chris Duke, an enthusiastic home chef, perfects Southern classics like shrimp-and-grits, smoked brisket, and collard-green quinoa bowls, often incorporating locally sourced pimento cheese and
    bourbon, and they regularly experiment with hop-forward IPAs from Hutton & Smith while honing a solid intermediate skill set through weekly cooking classes.
  core: Chris Duke navigates life with a structured, data-driven mindset, yet habitually overbooks weekends with hikes, soccer, and volunteer talks, relying on coffee and a trusty smartwatch to keep the
    pace, and occasionally lets perfectionism delay delegating tasks at work.
background:
  cultural: Raised in a middle‑class white family in the Southeast, Chris grew up with strong ties to Southern traditions, valuing hospitality, community service, and a pragmatic work ethic. His upbringing
    emphasized education and self‑reliance, shaping his structured approach to both medicine and personal life. While he respects local customs, his graduate STEM training and professional experience have
    given him a broader, evidence‑based worldview, allowing him to blend traditional Southern values with modern, data‑driven healthcare practices.
attributes:
  skills: '[''Internal Medicine'', ''Evidence‑Based Diagnostics'', ''Chronic Disease Management'', ''Preventive Care'', ''Electronic Medical Record (Epic, Cerner)'', ''Health Informatics'', ''Multidisciplinary
    Team Leadership'', ''Medical Education'', ''Community Health Outreach'', ''Bedside Ultrasound'', ''Joint Aspiration'', ''Crisis Management'', ''Effective Communication'']'
  hobbies: '[''Hiking'', ''Mountain Biking'', ''Kayaking'', ''Recreational Soccer'', ''Southern Cooking'', ''Craft Brewing'', ''Volunteer Health Education'', ''Rotary Club Membership'']'
  career_goals: Aiming to transition from direct patient care to a leadership role as Medical Director of a regional health system, where he can shape clinical protocols and improve care quality across
    multiple sites. He also plans to launch a community‑focused preventive health program targeting cardiovascular risk reduction in the Chattanooga area. Long‑term ambitions include publishing research
    on integrating telemedicine into rural primary care, mentoring the next generation of physicians, and eventually establishing a boutique primary‑care practice that balances high‑quality care with work‑life
    flexibility after his divorce.
