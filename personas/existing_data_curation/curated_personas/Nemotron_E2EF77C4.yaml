personas:
  professional: Trinere Snell is an organized research technician in a university biomedical lab, expertly handling PCR, cell culture, and microscopy while blending curiosity about disease genetics with
    pragmatic, methodical workflow management.
  sports: Trinere Snell hits the basketball courts at the local community center for weekly pickup games, roots for the Cincinnati Bearcats men's basketball team, and occasionally joins the Cincinnati Running
    Club’s weekend trail runs at Eden Park to stay fit.
  arts: Trinere Snell devotes evenings to macro photography of microscope slides and dew‑kissed leaves, draws literary inspiration from Ursula K. Le Guin and Margaret Atwood, and unwinds to the eclectic
    sounds of David Bowie while occasionally curating a photo series inspired by Edward Weston.
  travel: Trinere Snell prefers meticulously planned weekend getaways, having explored Chicago’s art scene and New Orleans’ jazz districts, while dreaming of a solo backpack trek to Kyoto’s temples and
    a summer adventure in Reykjavik’s volcanic landscapes once finances allow.
  culinary: Trinere Snell enjoys experimenting in the kitchen with Caribbean‑inspired jerk chicken, coconut‑curry shrimp, sweet‑potato collard greens, and classic baked mac and cheese with smoked gouda,
    skillfully balancing bold scotch bonnet heat and aromatic cilantro in their intermediate‑level cooking repertoire.
  core: Trinere Snell is a methodical young scientist who juggles lab precision, community mentorship, basketball hustle, and culinary creativity, often doodling sci‑fi quotes in lab notebooks, while navigating
    occasional health hiccups and a tight student budget with disciplined optimism.
background:
  cultural: Trinere is an African‑American raised in Cincinnati’s multicultural Northside neighborhood. Her mother, a registered nurse, and her father, an automotive mechanic, emphasized the importance
    of education, community service, and perseverance. Growing up, she attended a historically Black church where she participated in choir, youth leadership, and community outreach, fostering a strong
    sense of collective responsibility. Family gatherings regularly featured traditional African diasporic foods and celebrations, reinforcing her cultural heritage. Inspired by trailblazing Black scientists
    such as Dr. Jane Cooke Wright and Dr. Kizzmekia Corbett, she feels a deep connection to her lineage and is motivated to contribute to scientific advancements that benefit marginalized communities. While
    navigating a predominantly white scientific environment, she stays connected to her roots through local Afro‑centric cultural groups and community events, ensuring her cultural identity informs both
    her personal and professional life.
attributes:
  skills: '["PCR and quantitative PCR (qPCR)", "DNA extraction and purification", "Gel electrophoresis", "Cell culture (mammalian and bacterial) under aseptic conditions", "Fluorescence and confocal microscopy",
    "Statistical analysis in R", "Python scripting for reproducible data processing", "Scientific writing and abstract preparation", "Laboratory safety and compliance (OSHA, IRB)", "Inventory management
    and protocol documentation"]'
  hobbies: '["Playing basketball at the community center", "Reading science‑fiction and contemporary literature", "Cooking and experimenting with African‑American and Caribbean recipes", "Volunteering as
    a STEM mentor for middle‑school students", "Hiking in Cincinnati’s parks (Eden Park, Mt. Airy Forest)", "Macro photography of microscope slides and nature", "Reflective journaling and sketching scientific
    concepts"]'
  career_goals: Trinere aims to complete a Bachelor of Science in Biology within the next two years, followed by a Master’s in Biomedical Sciences and a Ph.D. focused on the genetic mechanisms of diseases
    that disproportionately affect Black communities, such as sickle cell disease. She envisions leading an independent research laboratory that translates fundamental discoveries into gene‑editing therapies.
    Pragmatically, she plans to secure internships at biotech firms and apply for post‑baccalaureate fellowships to gain industry experience. Long‑term, she aspires to a tenure‑track faculty position where
    she can mentor underrepresented students, develop community‑focused STEM outreach programs, and contribute to diversifying the scientific workforce.
