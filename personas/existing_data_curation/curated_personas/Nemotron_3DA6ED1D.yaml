personas:
  professional: Conswella Conley, an aspiring public health coordinator, leverages their strong organizational skills, Excel and SPSS data analysis, and collaborative communication to design evidence‑based
    community projects while meticulously managing deadlines and stakeholder expectations.
  sports: Conswella Conley follows the Cincinnati Bengals and Cincinnati Reds, participates in a local weekend running club, and balances their structured schedule with occasional yoga‑focused workouts,
    preferring low‑impact activities that complement their anxiety‑relief routine.
  arts: Conswella Conley regularly attends live jazz and R&B performances in Cincinnati’s Over‑the‑River district, drawing inspiration from artists like Nina Simone, John Coltrane, and Erykah Badu, while
    also immersing themselves in contemporary fiction by authors such as Chimamanda Adichie and Tayari Jones.
  travel: Conswella Conley favors meticulously planned weekend getaways to Midwestern cultural hubs like Nashville and New Orleans, dreams of exploring the historic streets of Savannah, and balances their
    travel budget by prioritizing educational experiences over luxury accommodations.
  culinary: Conswella Conley delights in cooking soul‑food inspired dishes—smoky collard greens, spiced black‑eyed peas, and honey‑glazed sweet potato casserole—experimenting with heirloom spices while
    documenting recipes on Canva‑styled digital notebooks.
  core: Conswella Conley is a detail‑oriented, community‑driven 18‑year‑old who channels their anxiety into structured volunteering, soulful cooking, and jazz‑filled evenings, all while juggling occasional
    impulse spends and a perfectionist habit.
background:
  cultural: Conswella is African American, raised in Cincinnati's West End where family and church have been central to her upbringing. Her family traditions feature weekly gospel services, potluck gatherings
    centered around collard greens, mac & cheese, and sweet potato pie. She grew up listening to the rich legacy of Midwest blues and jazz, which shaped her appreciation for live music. Community activism
    runs in her family; discussions about racial equity, voting rights, and local mentorship programs were common at the dinner table. These cultural experiences inform her worldview, reinforcing a commitment
    to cooperation, harmony, and service to her community.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Academic research'', ''Basic statistical analysis'', ''Written communication'', ''Digital literacy (Google Workspace, Canva, SPSS)'', ''Active
