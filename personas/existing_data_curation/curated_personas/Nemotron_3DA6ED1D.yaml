  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Yoga and meditation'', ''Cooking soul‑food recipes'', ''Volunteering at community center (tutoring)'', ''Neighborhood clean‑up events'',
    ''Attending live jazz and R&B concerts'']'
  career_goals: Conswella aims to complete a bachelor's degree in Public Health, followed by a master's in Community Health Promotion. She aspires to become a community health coordinator in Cincinnati,
    designing and implementing programs that address health disparities in underserved Black neighborhoods. Long‑term, she envisions a leadership role where she can influence policy, mentor younger students,
    and integrate evidence‑based practices with culturally responsive outreach. Her ambition balances her curiosity about innovative health solutions with a practical desire for stable, impact‑driven employment.
