  career_goals: She hopes to translate her longtime volunteer experience into a part‑time role as a community‑center coordinator or senior companion, where she can use her people‑skills and caregiving knowledge.
    Doris also dreams of launching a modest home‑based business selling her hand‑crafted knitted blankets and scarves, blending her curiosity for new patterns with her practical need for steady income.
    Additionally, she aims to improve her digital proficiency through a local adult‑education class, believing it will open more opportunities for organized volunteer leadership and personal growth.
