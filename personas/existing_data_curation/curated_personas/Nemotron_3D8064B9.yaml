  career_goals: Nicholas aims to advance from his current retail salesperson role to a store manager within the next year, leveraging his organizational strengths and people‑focused mindset. Over the next
    five years, he aspires to become a district manager, overseeing multiple locations and mentoring emerging leaders. Long‑term, he envisions opening a boutique that showcases locally sourced, sustainable
    products, allowing him to blend his business acumen with his commitment to community and environmental stewardship. He also seeks to play a more active role in local business associations, advocating
    for ethical retail practices.
