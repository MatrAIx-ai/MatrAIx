persona_description: A retired professional boxer who became a boxing legend, known for his natural talent, determination, and coaching from Joe Choynski. He was the first person ever to knock down James
  J. Jeffries in a professional boxing bout and fought against some of the greatest boxers of his time, including world heavyweight champion "Gentleman" Jim Corbett. Johnson's boxing style was very effective,
  but it was criticized in the press as being cowardly and devious. He fought for value for money and made the fight last a respectable time, even though many of these fights were "pre-arranged."
