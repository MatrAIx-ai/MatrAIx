personas:
  professional: Malia Bradshaw, a 26‑year‑old full‑stack software developer, leverages deep expertise in JavaScript, Python, and Java alongside Agile leadership to mentor junior engineers and steer cloud‑native
    applications toward user‑centric outcomes, channeling their sociable energy and practical curiosity into clear technical communication and strategic architectural decisions.
  sports: Malia Bradshaw stays active by hiking the Pine Barrens on weekends, jogging the Jersey Shore boardwalk, cheering on the New York Giants during football season, and running with the Jersey Shore
    Runners club for weekly group workouts.
  arts: Malia Bradshaw channels their love for spontaneity into regular improv sessions with The Improv Lab, while decompressing to playlists featuring Beyoncé, Kendrick Lamar, and Burna Boy, and occasionally
    streams John Mulaney’s stand‑up specials for comedic inspiration.
  travel: Malia Bradshaw balances meticulous trip planning with spontaneous weekend getaways, having explored the music‑filled streets of New Orleans and the turquoise beaches of Barbados, while eyeing
    an adventurous solo trek through Iceland’s glaciers for their next bucket‑list experience.
  culinary: Malia Bradshaw loves hosting dinner parties where they whip up soul‑food classics like collard greens with smoked turkey and Caribbean jerk chicken marinated in Scotch bonnet peppers, often
    pairing the meals with homemade sweet‑potato pie and crisp plantain chips.
  core: Malia Bradshaw is a tech‑savvy social dynamo who fuses code with cuisine, thrives on stage‑center improv, but often forgets to floss after late‑night debugging marathons.
background:
  cultural: Malia is an African‑American woman whose family traces roots to the Southern United States, with grandparents who immigrated from Jamaica. Growing up in New Jersey, she was immersed in a multicultural
    environment that celebrated both Black and Caribbean traditions. She regularly participates in community events such as Juneteenth celebrations, Kwanzaa gatherings, and local church activities. Her
    cultural identity shapes her values of family, community, and resilience, and she actively engages with the Black Women’s Network and local tech meetups that focus on increasing representation of Black
    professionals in STEM.
