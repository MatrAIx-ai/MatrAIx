  hobbies: '[''Cooking (soul food & Caribbean cuisine)'', ''Hosting dinner parties'', ''Improv comedy'', ''Hiking & jogging (Pine Barrens, Jersey Shore)'', ''STEM volunteer mentoring'', ''Reading speculative
