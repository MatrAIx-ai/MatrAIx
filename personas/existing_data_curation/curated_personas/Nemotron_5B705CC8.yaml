  career_goals: Malia aims to become a Staff Engineer within the next five years, leading high‑impact product teams and shaping architectural direction. She aspires to mentor and sponsor more Black women
    entering tech, eventually establishing a community‑focused mentorship program within her company. She is also interested in deepening her expertise in machine learning to integrate intelligent features
    into user‑centric applications. Long‑term, Malia envisions launching a SaaS platform that provides affordable coding education resources for underserved high school students, leveraging her technical
    skills and passion for community empowerment.
