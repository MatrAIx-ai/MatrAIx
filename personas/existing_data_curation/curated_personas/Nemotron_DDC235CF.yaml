    at senior center'', ''Genealogical research'', ''Walking in local parks'']'
  career_goals: Although retired, Gema aims to continue contributing to her community by mentoring younger volunteers at the senior center, preserving and teaching Puerto Rican culinary traditions to her
    grandchildren, completing a short memoir that captures her family's migration story, and staying active and independent through regular health‑focused routines and lifelong learning of digital tools.
