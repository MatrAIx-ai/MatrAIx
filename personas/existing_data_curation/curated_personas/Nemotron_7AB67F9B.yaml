personas:
  professional: Joy Vandegriff, a freelance art historian and archival consultant, leverages their disciplined research workflow, expertise in digital cataloguing, and sharp analytical eye to produce scholarly
    monographs for regional museums, design workshops on archival best practices, and market an online platform for digitized local archives, all while maintaining the high standards that fuel their competitive
    drive for professional recognition.
  sports: Joy Vandegriff, a devoted fan of the New York Knicks and the Buffalo Bills, participates in a local walking club that explores historic neighborhoods while discussing art, attends weekly yoga
    classes at the downtown studio, and keeps a modest running schedule that aligns with their preference for solitary, low-impact exercise.
  arts: Joy Vandegriff immerses themselves in the black-and-white photography of Ansel Adams and Zanele Muholi, spends evenings analyzing the chiaroscuro of Caravaggio and the color fields of Rothko, listens
    to Beethoven’s late string quartets and the avant-garde compositions of Philip Glass, and regularly streams performances by Marina Abramović and Laurie Anderson for inspiration.
  travel: Joy Vandegriff, who has meticulously explored the Louvre in Paris and the Uffizi Gallery in Florence, now plans a research-focused itinerary to Kyoto’s National Museum of Modern Art and a genealogical
    pilgrimage to the Scottish Highlands, favoring detailed travel plans and quiet study spaces over spontaneous tourism.
  culinary: Joy Vandegriff tends a modest herb garden of rosemary, thyme, and sage, frequently concocts rosemary-infused roasted chicken and thyme-scented quinoa soup, delights in a slice of upstate New
    York apple pie with a dash of cinnamon, and occasionally treats themselves to a sushi roll from the local waterfront bistro.
  core: Joy Vandegriff blends relentless scholarly discipline with solitary creativity, cataloguing art histories by day, nurturing a herb garden by evening, and indulging in crossword marathons that stretch
    into the night.
background:
  cultural: Joy is a white American raised in the Schenectady area of upstate New York. Her family traces its roots to Dutch and German settlers who arrived during the colonial era, fostering a deep appreciation
    for the region’s historic architecture and the Erie Canal heritage. Growing up in a middle-class Protestant household, she was encouraged to value self-reliance, education, and community involvement,
    leading her to participate in local historical societies and support the preservation of regional art and culture.
attributes:
  skills: '[''Archival research'', ''Digital cataloguing'', ''Art historical analysis'', ''Project management'', ''Technical writing'', ''Critical editing'', ''Photography'', ''Data organization'', ''Strategic
