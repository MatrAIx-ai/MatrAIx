  hobbies: '[''Museum visits'', ''Art history reading'', ''Photography'', ''Genealogy research'', ''Crossword puzzles'', ''Chess'', ''Herb gardening'', ''Handmade journal making'', ''Digital archiving hobby'',
    ''Attending virtual art seminars'']'
  career_goals: Joy aims to re-enter the professional sphere as a freelance art historian and consultant for regional museums, author a well-researched monograph on upstate New York art, launch an online
    platform for digitized local archives, and obtain a professional archivist certification. She also plans to design and lead workshops on archival best practices and contemporary art appreciation, positioning
    herself as a recognized authority in the field.
