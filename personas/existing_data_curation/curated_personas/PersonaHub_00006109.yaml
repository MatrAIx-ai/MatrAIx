persona_description: Kathy Metzer, a deaf teacher who believes every child can learn, especially those with disabilities such as deafness. She works hard to make learning opportunities accessible for deaf
  students, and is knowledgeable about deaf culture and the impact of deafness on language development. She encourages teachers to have high expectations for deaf students and to learn about their individual
  backgrounds and experiences.
