  career_goals: Keith aims to advance to a senior lead systems engineer role within the next five years, overseeing the design and integration of next‑generation launch vehicles. In the longer term, he
    aspires to become an engineering manager or director, guiding multidisciplinary teams on reusable and sustainable propulsion technologies. He also seeks to mentor emerging engineers and influence industry
    standards through innovative, practical solutions for commercial spaceflight.
