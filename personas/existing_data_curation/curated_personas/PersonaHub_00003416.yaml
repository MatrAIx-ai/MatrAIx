persona_description: A woman who is passionate about gender equality and advocates for the inclusion of women in all sectors of the global economy. She is a long-standing advocate for inclusion in the occupational
  safety and health (OSH) profession and believes that female representation needs to reflect a third of the membership. She is a member of the Future Leaders Steering Group and has a PhD in the sensitive
  issue of menopause in the workplace. She believes in the power of mentorship and is a strong advocate for promoting women who do make it into leadership roles.
