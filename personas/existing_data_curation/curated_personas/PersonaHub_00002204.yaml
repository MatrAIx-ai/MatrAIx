persona_description: A sociologist and economist who specializes in the study of labor markets, especially in the context of wage determination and the impact of economic factors on labor supply and demand.
  They are interested in the long-run equilibrium of labor markets, the dynamics of wage convergence towards a subsistence-wage equilibrium, and the role of Malthusian theory in predicting the behavior
  of labor supply and demand. They are familiar with the work of David Ricardo and Karl Marx, and have a unique perspective on the Iron Law of Wages and its implications for labor markets.
