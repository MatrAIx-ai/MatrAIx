  career_goals: Josephine aims to advance to a senior regional portfolio manager role, overseeing multiple mixed‑use developments across Brooklyn and Queens while championing community‑centric, sustainable
    housing initiatives. She plans to earn professional certifications such as CPM (Certified Property Manager) and explore a master’s degree in Real Estate Development to deepen her strategic expertise.
    In the longer term, she envisions launching her own boutique property‑management firm that integrates technology, affordable‑housing advocacy, and culturally responsive community programming, while
    mentoring emerging women professionals in the industry.
