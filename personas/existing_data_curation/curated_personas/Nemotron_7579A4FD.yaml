  career_goals: Approaching retirement, Ethan aims to solidify the financial health of his community association, mentor junior property managers, and earn the Certified Property Manager (CPM) credential
    from IREM. He plans to transition into a part‑time advisory role, offering his expertise to neighboring HOAs while remaining active in local civic boards. A key ambition is to leave a lasting legacy
    of well‑maintained common areas and a strong sense of neighborly cooperation for future residents.
