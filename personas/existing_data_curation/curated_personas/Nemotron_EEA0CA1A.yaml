personas:
  professional: Dominique Francois, a 44-year-old marketing veteran, blends two decades of hands-on brand development, data-driven SEO/SEM expertise, and agile project leadership with a curious yet practical
    mindset, channeling their reserved nature into meticulous campaign planning while mentoring small teams to deliver creative narratives that achieve measurable ROI.
  sports: Dominique Francois, a dedicated early-morning hiker on Oak Mountain’s winding trails and occasional participant in the Birmingham Trailblazers walking club, follows the Alabama Crimson Tide with
    seasonal fervor and roots for the Birmingham Barons baseball team, while their disciplined yet occasionally anxiety-driven nature ensures a consistent three-times-weekly cardio routine that never quite
    becomes a full-scale gym habit.
  arts: Dominique Francois, a quiet connoisseur of visual and auditory arts, spends weekends at the Birmingham Museum of Art chronicling exhibits through thoughtful black-and-white photography inspired
    by Ansel Adams, while finding solace in the timeless jazz of Miles Davis and the soaring gospel of Mahalia Jackson, allowing these artistic influences to inform both personal creativity and professional
    storytelling.
  travel: Dominique Francois, who favors meticulously planned yet low-key getaways, frequently retreats to Southern cultural gems such as Charleston and New Orleans, dreams of wandering the historic souks
    of Marrakech to capture its vibrant colors, and consistently chooses boutique inns that provide quiet spaces for solitary reflection and photography.
  culinary: Dominique Francois, an intermediate home chef, reimagines classic Southern staples—like collard greens, shrimp-and-grits, and sweet-potato casserole—by swapping traditional fats for garden-fresh
    herbs, quinoa, and olive oil, while still occasionally indulging in buttery biscuits smothered in keto-friendly sausage gravy, showcasing a balanced approach to health-focused cooking.
  core: Dominique Francois, a 44-year-old marketing strategist who balances data-driven precision with a love for solitary garden walks, jazz vinyls, and occasional anxiety-driven over-analysis, crafts
    purposeful brand narratives while nurturing a quietly community-oriented life.
background:
  cultural: Dominique is a Black woman who grew up in Birmingham’s historically Black neighborhoods, where the legacy of the civil rights movement is woven into daily life. Family and church have been central
    pillars, providing a strong sense of community, resilience, and pride in her heritage. She carries forward Southern traditions—soulful gospel music, family‑style cooking of collard greens, fried chicken,
    and cornbread—while also embracing contemporary cultural expressions through local festivals and art events. Her upbringing instilled a deep respect for community activism and mentorship, influencing
    her professional drive to uplift underrepresented voices. The blend of Southern hospitality, African American cultural wealth, and a pragmatic outlook shapes Dominique’s identity both personally and
    professionally.
