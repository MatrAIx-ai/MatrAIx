  career_goals: Dominique aims to step into a senior leadership role—such as Director or Vice President of Marketing—where she can shape brand narratives that resonate with underrepresented audiences and
    drive social impact. She is passionate about championing diversity and inclusion within corporate marketing teams and wants to establish a mentorship program for Black women entering the field. To strengthen
    her strategic toolkit, she plans to pursue a professional certification in data analytics and consider part‑time coursework toward an associate or bachelor’s degree in business. In the longer term,
    Dominique envisions launching her own boutique consultancy focused on community‑centric brands, while also leading corporate social‑responsibility initiatives that give back to the Birmingham community.
