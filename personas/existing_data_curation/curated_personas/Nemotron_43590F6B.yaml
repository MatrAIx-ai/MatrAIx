  hobbies: '[''restoring a classic 1967 Chevrolet'', ''building model diesel engines'', ''snowshoeing on Matanuska Glacier trails'', ''fly fishing in the Wild River'', ''photographing Alaskan winter landscapes'',
    ''reading automotive repair manuals'', ''single‑player racing simulations'']'
  career_goals: Efrain aims to achieve ASE Master Technician certification within the next two years, with a focus on hybrid and electric vehicle systems to stay ahead of emerging technology in the region.
    He aspires to become a lead technician at his shop, overseeing workflow, mentoring newer mechanics, and implementing systematic quality‑control processes. Long‑term, he envisions opening his own boutique
    garage that specializes in dependable, winter‑ready service for remote Alaskan communities, where his competitive drive can translate into a reputation for precision and reliability.
