personas:
  professional: David Mccoy is a veteran teacher turned mentor who leverages decades of lesson‑planning precision and a love for hands‑on STEM projects to guide new educators, and they gently nudge school
    policy toward experiential, community‑linked learning.
  sports: David Mccoy stays fit by coaching youth baseball for the town's Little League, hiking the Tiadaghton State Forest trails, cheering on the nearby State College Spikes minor‑league baseball team,
    and they occasionally join a local walking club that meets at the community center.
  arts: David Mccoy finds joy strumming acoustic guitar at folk gatherings, singing hymns with his church choir, immersing themselves in the storytelling of historical fiction authors like James Fenimore
    Cooper and Caroline Fraser, while their playlists often feature Bob Dylan and Pete Seeger, and they consider music a daily ritual.
  travel: David Mccoy prefers road‑trip adventures that blend nature and history, having trekked the Appalachian Trail segment near his home, visited Colonial Williamsburg to satisfy frontier‑novel cravings,
    and they are planning a weekend getaway to the historic streets of Savannah, Georgia.
  culinary: David Mccoy delights in turning his backyard harvest of tomatoes, hot peppers, and heirloom pumpkins into smoky grilled salsas, rustic ratatouille, and a signature pumpkin‑spice bisque, though
    they admit to over‑seasoning with garlic and occasionally order pizza when garden yields are low.
  core: David Mccoy is a structured yet spontaneously generous retiree who balances a love of community, gardening, and folk music with disciplined finances and health habits, even if they sometimes overlook
    a dental appointment.
background:
  cultural: David grew up in a small Pennsylvania town with a mixed European heritage, tracing roots to Irish and Welsh ancestors. His upbringing emphasized hard work, community service, and the value of
    education, reflecting the working-class traditions of western Pennsylvania. He identifies with Mid-Atlantic American culture, celebrating local customs such as county fairs, high school football Saturdays,
    and Pennsylvania Dutch culinary traditions, while also honoring his family's Irish storytelling legacy through music and oral history.
attributes:
  skills: '["Lesson Planning", "Classroom Management", "Curriculum Development", "Hands-on STEM Integration", "Technology Integration", "Differentiated Instruction", "Assessment Design", "Parent Communication",
