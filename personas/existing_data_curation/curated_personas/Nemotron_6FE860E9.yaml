  hobbies: '["Volunteer fire department fund-raiser", "Youth baseball coaching", "Hiking in Tiadaghton State Forest", "Bird-watching", "Gardening", "Playing acoustic guitar", "Singing in church choir",
    "Reading historical fiction", "Attending local history society meetings"]'
  career_goals: As he approaches retirement, David aims to transition from full-time classroom teaching to a mentorship and advisory role. He plans to serve on the local school board to influence policy
    that supports experiential learning and community partnerships. He also intends to design a series of after-school STEM workshops for middle-school students, leveraging his network of local businesses.
    Additionally, David hopes to publish a guidebook on flexible lesson planning that balances structure with spontaneity, and to provide consulting services to neighboring districts seeking to enhance
    their curricula.
