  career_goals: Tatiana loves art and imagination, so she frequently says she wants to be a painter or a storyteller when she grows up. She also dreams of helping other children learn, mentioning ideas
    like becoming a teacher, a librarian, or a scientist who discovers new ways to create beautiful things. Her ambition is rooted in her curiosity and desire to share the joy of creativity with others.
