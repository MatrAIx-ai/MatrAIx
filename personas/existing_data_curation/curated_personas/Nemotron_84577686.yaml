personas:
  professional: Tatiana Odom is an aspiring junior scientist who delights in kitchen chemistry experiments, meticulously records her observations in glitter‑lined notebooks, and they confidently share their
    findings during preschool show‑and‑tell, reflecting her curious nature, organized mindset, and balanced confidence.
  sports: Tatiana Odom is a lively member of the Tiny Tigers soccer club, practices mini‑t‑ball every Saturday, cheers enthusiastically for the Golden State Warriors during game nights, and they balance
    their boundless energy with short, supervised bike rides around the neighborhood, always insisting on their bright pink helmet.
  arts: Tatiana Odom immerses herself in finger‑painting sessions inspired by Henri Matisse’s bold colors, sings along to Disney’s Frozen soundtrack, watches the playful puppetry of Sesame Street, and they
    proudly display crayon drawings of Mickey Mouse and the Cat in the Hat on the fridge.
  travel: Tatiana Odom’s traveling adventures include a family road trip to the Grand Canyon where they collected smooth rocks, a magical week at Disney World riding Dumbo the Flying Elephant, and they
    dream of a future vacation to Paris to see the Eiffel Tower and taste fresh croissants.
  culinary: Tatiana Odom prefers bite‑size meals like cheese‑topped mini‑pizzas with a sprinkle of fresh basil, loves dipping carrot sticks in hummus, eagerly helps her mom whisk banana pancakes topped
    with maple syrup, and they often request extra sprinkles on their ice cream after dinner.
  core: Tatiana Odom is a curious, art‑loving four‑year‑old who balances meticulous organization with boundless imagination, often worrying about the small things while they delight in colorful experiments
    and playful adventures.
background:
  cultural: Tatiana is African American and grows up in Marietta, GA, where her family blends Southern traditions with Black cultural heritage. She attends Sunday church services with her family, celebrates
    Juneteenth and Kwanzaa, and participates in community events at the Marietta Center for the Arts. Her parents read her books by Black authors, share stories about family history, and teach her songs
    from gospel and contemporary Black music, fostering a sense of pride and belonging in her cultural identity.
