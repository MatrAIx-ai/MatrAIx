  career_goals: Even at six, Natasha dreams of grown‑up roles that let her explore and help others. She often says she wants to be a scientist who discovers new things, a teacher who shares stories, or
    a community organizer who creates fun, safe spaces for kids. Her ambitions blend imaginative curiosity with a practical desire to see real, positive outcomes for people around her.
