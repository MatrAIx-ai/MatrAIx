personas:
  professional: Natasha Chung is an aspiring young architect who channels their curiosity about how things fit together with a practical, organized approach, building intricate LEGO structures while balancing
    spontaneous creativity with a reliable sticker chart for reading milestones, and they eagerly draft new designs after each family walk.
  sports: Natasha Chung loves kicking a soccer ball for the Lewes Lions youth league in the spring and splashing in the community pool’s kids’ swim class in the summer, cheering on the Philadelphia Eagles
    on game day and idolizing star quarterback Jalen Hurts.
  arts: Natasha Chung fills sketchbooks with bright pictures of rockets, rainforests, and dragons, drawing inspiration from Dr. Seuss, Disney’s animated classics, and the catchy tunes of The Wiggles, and
    they often dance in the living room while humming Sesame Street songs.
  travel: Natasha Chung dreams of exploring the tide pools at Delaware Seashore State Park after family walks, plans a future trip to the towering cliffs of Acadia National Park to collect seashells, and
    eagerly adds a visit to Disney World’s Magic Kingdom to their ever‑growing wish list, balancing their love for nature hikes with a craving for whimsical adventures.
  culinary: Natasha Chung prefers the cheesy comfort of homemade macaroni and cheese, enjoys assembling colorful fruit kebabs with grapes, watermelon cubes, and blueberries, and delights in spreading peanut
    butter on jelly‑laden bread, often sprinkling toasted sesame seeds on their snack for extra crunch.
  core: Natasha Chung is a curious, organized 6‑year‑old who balances big‑picture imagination with practical play, often dancing mid‑reading while hoarding glitter stickers in a secret drawer, and they
    delight in turning any surface into a canvas.
background:
  cultural: Natasha grows up in a Black family with multicultural roots in Lewes, Delaware. Her parents honor African‑American traditions such as church gatherings, community festivals, and family storytelling,
    while also incorporating elements from her mother's East‑Asian heritage, like occasional Korean folktales and shared holiday dishes. The coastal environment and historic town life nurture her curiosity
    about the world, and the blend of cultural practices provides a strong sense of identity and community.
