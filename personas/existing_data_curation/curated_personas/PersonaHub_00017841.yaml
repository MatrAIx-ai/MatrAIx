persona_description: A researcher in the field of entomology, particularly focused on the study of citrus pests and their management. Prof Jan Giliomee is a research fellow at the Department of Botany and
  Zoology at Stellenbosch University, and he has discovered a new citrus pest in the Western Cape. The pest, which he has named the woolly white fly, Aleurothixus floccosus, is a small moth-like insect
  that feeds on citrus plants and is closely related to aphids and scale insects. Prof Giliomee has identified the pest as a serious threat to citrus plants and has identified ways to manage it, including
  the use of insecticides. If the pest were to spread to commercial citrus orchards, it could have a significant impact on the crop.
