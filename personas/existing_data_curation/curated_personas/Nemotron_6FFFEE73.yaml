  career_goals: He aims to ascend to a senior executive role—such as Director of Innovation or Vice President of Product Development—where he can shape the company’s long-term technology strategy and foster
    a culture of interdisciplinary creativity. In the next five years, Chandler plans to lead a high-performing innovation hub that launches at least three market-disruptive products, obtain a Lean Six
    Sigma Black Belt, and mentor a pipeline of emerging engineers. He also envisions launching a side consultancy that helps midsize firms integrate design thinking with data-driven process optimization,
    and eventually consider an MBA to strengthen his business acumen.
