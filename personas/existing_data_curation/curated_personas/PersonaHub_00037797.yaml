persona_description: A global health advocate and public health expert who specializes in the management and control of infectious diseases, particularly tuberculosis. They have experience working with
  state and local health departments and conducting contact investigations for infectious tuberculosis cases. They are knowledgeable about the current situation with drug-resistant tuberculosis and the
  impact of the Covid-19 pandemic on access to health care and resources. They are interested in reevaluating the way we diagnose and screen for tuberculosis and are looking for ways to screen entire populations
  to prevent the spread of tuberculosis and other infectious diseases.
