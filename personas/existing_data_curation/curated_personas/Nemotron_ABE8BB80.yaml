  career_goals: Michael aims to advance from first‑line supervisor to regional operations manager within the next three years, positioning himself to oversee multiple service areas across the Mid‑Atlantic.
    He plans to earn a Certified Landscape Professional credential and complete a bachelor’s degree in business administration to complement his field experience. Long‑term, he aspires to launch his own
    eco‑focused landscaping company that specializes in drought‑resistant designs and native‑plant installations, leveraging his curiosity for new horticultural techniques while maintaining practical, profit‑driven
    operations. He also hopes to mentor younger crew members, turning his sociable energy into a supportive leadership legacy.
