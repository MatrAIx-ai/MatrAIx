personas:
  professional: Michael Bourgeois, a 37‑year‑old grounds‑keeping supervisor, blends his curiosity for sustainable horticulture with practical cost‑control, using GIS scheduling and assertive, talkative
    leadership to keep crews motivated, projects on time, and safety standards meticulously met, even as his tendency to worry drives him to double‑check every detail.
  sports: Michael Bourgeois, 37, sustains his fitness through weekend hikes in Patapsco Valley State Park, plays in the Baltimore County Recreational Softball League, and passionately follows the Baltimore
    Ravens and Washington Capitals, though he often skips the cool‑down stretches after games, citing time constraints.
  arts: Michael Bourgeois, 37, showcases his artistic side by playing acoustic renditions of Neil Young and Joni Mitchell at Baltimore’s open‑mic nights, curates a vintage vinyl collection featuring Miles Davis,
    The Beatles, and Townes Van Zandt, and never misses the annual Maryland Folk Festival, where he draws creative inspiration for his landscaping designs.
  travel: Michael Bourgeois, 37, prefers spontaneous road‑trip itineraries that combine craft‑brewery tours in Asheville, North Carolina, and Portland, Oregon, with scenic hikes in Shenandoah National Park,
    always budgeting extra for a portable grill to test new barbecue recipes en route.
  culinary: Michael Bourgeois, 37, experiments with Kansas City‑style smoked ribs, charcoal‑grilled heirloom vegetables from his garden, and occasional Maryland crab cakes, cooking at an intermediate skill
    level while improvising rubs with brown sugar, smoked paprika, coffee grounds, and a dash of mustard, often sharing the results at weekend gatherings.
  core: Michael Bourgeois, 37, merges a talkative, curiosity‑driven leadership style with an obsessive attention to detail that fuels both meticulous landscaping projects and late‑night worries about perfecting
    his next barbecue, all while turning community clean‑ups into impromptu acoustic sessions.
background:
  cultural: Michael grew up in the suburban neighborhoods of Baltimore County, where a blend of Mid‑Atlantic traditions shaped his outlook. His family name, Bourgeois, points to French‑Canadian roots, and
    occasional celebrations of Catholic holidays reflect that heritage, though his upbringing was largely secular and community‑oriented. He identifies with the practical, modest values common to the region—appreciating
    local customs such as Maryland crab feasts, summer county fairs, and the strong sense of neighborhood involvement. This cultural backdrop fosters his sociable nature, his appreciation for both new ideas
    and time‑tested methods, and his desire to contribute to communal spaces through his landscaping work.
