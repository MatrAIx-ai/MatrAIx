personas:
  professional: Danny Greenwood, an experienced construction manager, blends three decades of on‑site leadership with a curiosity for emerging tools like drone surveys, applying their thorough safety focus
    to drive crews toward lower costs while mentoring the next generation of foremen in Luzerne County.
  sports: Danny Greenwood roots for the Philadelphia Flyers and the Pittsburgh Steelers, joins a local gun club for seasonal hunting trips, and spends weekends fishing in the Allegheny woods, while also
    participating in a community softball league that meets at the town park.
  arts: Danny Greenwood enjoys the gritty storytelling of Bruce Springsteen, the blue‑grass tunes of the Irish folk group The Chieftains, and the realism of Andrew Wyeth’s Pennsylvania landscapes, and they
    regularly attend classic‑car shows and regional craft fairs for inspiration in their woodworking.
  travel: Danny Greenwood favors short road trips to the Pocono Mountains and the Adirondack region, plans a once‑in‑a‑lifetime drive to the historic castles of Ireland when finances allow, and always maps
    routes on a paper atlas before a journey, preferring the freedom to explore at a relaxed pace.
  culinary: Danny Greenwood’s palate leans toward hearty Pennsylvania Dutch fare like chicken corn soup and shoofly pie, relishes grilling trout caught on weekend outings, and they often experiment with
    garden‑fresh tomatoes and beans in rustic stews, though they admit to over‑seasoning with smoked paprika.
  core: Danny Greenwood embodies a pragmatic curiosity, coupling a hands‑on love of woodworking, classic cars, and safety‑first construction with a reserved, competitive streak and a habit of occasional
    disorganization that keeps life both grounded and unpredictably creative.
background:
  cultural: Danny was born and raised in the anthracite‑mining region of northeastern Pennsylvania, a community steeped in working‑class values, self‑reliance, and a strong sense of family. His ancestry
    includes Irish and German roots common to Luzerne County, influencing his appreciation for hard work, modesty, and loyalty. He attended the local high school, learned the trade on the job, and built
    his career through apprenticeships and on‑the‑job training rather than formal higher education. The regional culture of resilience, practical problem‑solving, and a quiet competitiveness shapes his
    outlook, while his marriage and long‑standing community ties reinforce a grounded, stable lifestyle.
