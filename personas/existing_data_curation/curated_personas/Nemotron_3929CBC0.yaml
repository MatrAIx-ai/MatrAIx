  hobbies: '[''Hiking'', ''Cycling'', ''Kayaking'', ''Pickup basketball'', ''Pickup soccer'', ''Youth mentorship'', ''Live music attendance'', ''Acoustic guitar playing'', ''Photography'', ''Cooking'',
    ''Reading true‑crime literature'']'
  career_goals: Michael aspires to advance within the Seattle Police Department by moving into specialized units such as the Detective Bureau or the Special Response Team, eventually aiming for a leadership
    role like precinct commander or deputy chief. He is committed to developing community‑focused initiatives that reduce crime through proactive engagement and education. Michael also wants to mentor junior
    officers, integrate data‑driven policing methods, and champion mental‑health resources for both citizens and fellow officers, aligning his practical skills with a broader vision of public safety and
    community trust.
