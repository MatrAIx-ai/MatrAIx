personas:
  professional: Eva Jones is an aspiring junior game developer who uses Scratch to turn their curiosity about storytelling into simple adventure games, applying a methodical, organized workflow and meticulous
    debugging while quietly sharing their creations with a small art club circle.
  sports: Eva Jones enjoys weekend hikes through the Black Hills with the Rapid City Youth Hiking Club, jogs on the school's cross‑country team during the fall, and tracks progress in a notebook while cheering
    for the Denver Broncos in football and the Minnesota Vikings in the NFL whenever they watch games with family.
  arts: Eva Jones immerses themselves in the arts by sketching Black Hills vistas inspired by Albert Bierstadt and John Constable, delving into fantasy novels like Harry Potter and The Hobbit, admiring
    the animation of Hayao Miyazaki, and finding calm listening to Sufjan Stevens and the soothing piano works of Yiruma while their journal fills with doodles and reflections.
  travel: Eva Jones prefers low‑key, nature‑focused trips, having explored Yellowstone and Badlands National Parks with their family using carefully mapped itineraries, and dreams of solo‑guided adventure
    tours in Kyoto, Japan, and a cultural stroll through Paris, France, where they hope to sketch iconic cityscapes.
  culinary: Eva Jones enjoys simple, home‑cooked comfort foods, confidently whipping up apple‑cinnamon pancakes with maple syrup, assembling hearty grilled cheese sandwiches with sharp cheddar, and crafting
    custom trail mixes with almonds, dried cranberries, and dark chocolate chips, while also experimenting with fresh berries and spinach in quick salad bowls they share at art club gatherings.
  core: Eva Jones is a quietly curious 11‑year‑old whose love of solitary art and methodical planning is balanced by a streak of anxiety that fuels their meticulous journaling and creative problem‑solving.
background:
  cultural: Eva grows up in a white, middle‑class family in Rapid City, South Dakota, where Midwestern values of hard work, self‑reliance, and community involvement are emphasized. Her family often participates
    in local traditions such as visiting the Black Hills, attending community festivals, and exploring the region’s Native American heritage through museum visits and school projects. This environment nurtures
    her appreciation for the outdoors, respect for diverse cultural expressions, and an understanding of the region’s history, shaping her artistic and scientific interests.
attributes:
  skills: '[''Sketching and drawing'', ''Reading comprehension'', ''Scratch programming'', ''Organizational planning'', ''Basic research skills'', ''Journaling for self‑reflection'']'
  hobbies: '[''Drawing landscapes'', ''Nature hikes and rock collecting'', ''Reading fantasy books'', ''Scratch coding'', ''Journaling'', ''Participating in a small art club'']'
  career_goals: Eva aspires to blend her love of art and the natural world by pursuing a future as a wildlife illustrator or a museum curator specializing in natural history. She dreams of studying biology
    or environmental science in college, honing her artistic techniques, and one day creating educational illustrations that inspire other children to appreciate nature. She also hopes to develop leadership
    skills to organize small community art‑nature projects and to use her methodical planning abilities to bring ideas to life.
