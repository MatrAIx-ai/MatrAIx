personas:
  professional: Cary Burleson, a seasoned construction supervisor with a knack for blending hands‑on site leadership, drone‑based surveys, and BIM coordination, leverages their pragmatic curiosity and calm
    under pressure to keep projects on schedule while championing safety and sustainable building practices.
  sports: Cary Burleson follows the Colorado Rockies and Denver Broncos avidly, rides with the Jefferson County Mountain Bike Club on weekday evenings, and hits the slopes at Eldora and Vail for weekly
    ski sessions, balancing their love of high‑adrenaline trail rides with a relaxed approach to weekly gym workouts.
  arts: Cary Burleson enjoys live folk shows by The Lumineers and the Colorado Symphony, appreciates the paintings of Colorado artist Charles Sharpe, and unwinds by listening to classic rock icons like
    Neil Young while grilling, letting music color their evenings on the patio.
  travel: Cary Burleson favors spontaneous road trips that blend rugged outdoor adventures with modest comfort, having recently explored the alpine trails of Banff and the fjords of Patagonia, while still
    dreaming of a summer bike tour through the Italian Dolomites with their drone packed for aerial footage.
  culinary: Cary Burleson’s palate leans toward smoky Colorado lamb chops, cedar‑plank trout, and their own home‑brewed amber ale flavored with Cascade hops, and while their grilling technique is top‑notch,
    their penchant for over‑seasoning sometimes leaves the palate overwhelmed.
  core: Cary Burleson is a pragmatic, curiosity‑driven constructor who balances rugged outdoor passions with a laid‑back, slightly disorganized approach to finances and health, often forgetting appointments
    but never missing a chance to fire up the grill or launch their drone.
background:
  cultural: Cary grew up in a middle‑class, white, suburban family in the Denver metropolitan area, reflecting a blend of Midwestern work ethic and Western frontier spirit. His upbringing emphasized self‑reliance,
    practicality, and respect for the land, values that are echoed in Colorado’s outdoor culture and construction community. While his family’s roots trace back to German and Irish immigrants, he identifies
    strongly with Colorado’s inclusive, rugged ethos, celebrating local traditions such as community barbecues, mountaineering, and a pragmatic approach to problem‑solving. He maintains a secular worldview
    but respects the region’s diverse religious and cultural backgrounds.
attributes:
  skills: '[''Project Scheduling'', ''Cost Control'', ''Construction Safety Management'', ''Crew Leadership'', ''Contract Negotiation'', ''BIM Integration'', ''Drone Survey Operations'', ''Risk Assessment'',
    ''Budgeting & Financial Analysis'', ''Procurement & Supply Chain Management'', ''Conflict Resolution'', ''Regulatory Compliance'', ''Equipment Maintenance Oversight'']'
  hobbies: '[''Hiking'', ''Backcountry Snowshoeing'', ''Skiing'', ''Mountain Biking'', ''Fly‑Fishing'', ''Drone Piloting'', ''3D Printing'', ''Home Brewing'', ''Open‑Fire Grilling'', ''Volunteer Teaching
    at Trade Schools'']'
  career_goals: Cary aims to transition from day‑to‑day supervision to a senior operations role within the next five years, eventually becoming a director of construction services or launching his own consulting
    firm focused on sustainable building practices in the Rocky Mountain region. He wants to mentor the next generation of tradespeople, champion the adoption of green construction technologies, and build
    a legacy of safety‑first culture. Ultimately, he envisions a semi‑retirement where he consults part‑time while expanding a charitable apprenticeship program for under‑served youth.
