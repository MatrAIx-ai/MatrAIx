persona_description: A technology and education expert who has extensive experience in developing and implementing computer adaptive testing systems. They have worked with the Smarter Balanced Assessment
  Consortium (SBAC) and the Partnership for Assessment of Readiness for College and Careers (PARCC) to develop assessments for the Common Core State Standards. They are knowledgeable about the differences
  between computer adaptive testing and fixed testing, and have seen firsthand the challenges and benefits of using technology in the testing process. They are also familiar with the interface and tools
  used in the SBAC tests and have experience with integrating technology into the classroom.
