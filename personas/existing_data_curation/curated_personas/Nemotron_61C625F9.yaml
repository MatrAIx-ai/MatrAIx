personas:
  professional: Grace Hutton, a 21‑year‑old assembly‑line technician with razor‑sharp manual dexterity, leverages their ability to read blueprints and troubleshoot machinery to consistently exceed productivity
    targets, while they channel their competitive streak into a fast‑tracked pursuit of a supervisory role through night‑time industrial‑technology courses.
  sports: Grace Hutton participates in the local weekend ultimate‑frisbee league and hikes the nearby Appalachian trails during spring, follows the regional college basketball team the State Wildcats with
    fervor, and uses yoga as their primary fitness regimen; they rarely indulge in competitive sports beyond casual group activities.
  arts: Grace Hutton immerses themselves in abstract watercolor landscapes inspired by the fluidity of Yayoi Kusama, creates digital illustrations echoing the surreal tones of Alex Ross, and regularly attends
    bluegrass nights featuring The Avett Brothers and indie folk showcases by Phoebe Bridgers, while they also craft bespoke metal sculptures that blend functionality with artistic abstraction.
  travel: Grace Hutton favors low‑budget, weekend getaways to craft‑focused destinations like Asheville’s maker spaces, long‑haul trips to the design hubs of Copenhagen and Berlin for inspiration, and dreams
    of a cultural pilgrimage to Kyoto’s traditional metal‑working districts; they balance their love of exploration with a tight student‑loan budget.
  culinary: Grace Hutton enjoys cooking simple, flavor‑rich meals such as miso‑glazed salmon with jasmine rice, hand‑rolled veggie sushi featuring nori, arugula, and fresh basil, and experimenting with
    homemade spice blends for occasional metal‑infused iron skillet dishes, while they occasionally indulge in craft coffee from local roasters.
  core: Grace Hutton is a 21‑year‑old synthesis of meticulous technician and restless artist, driven by a competitive edge, they manage intense anxiety through creative outlets, and constantly juggle precision
    work with spontaneous bursts of imagination.
background:
  cultural: Grace grew up in Bristol, Tennessee, a city straddling the Tennessee‑Virginia border within the Appalachian region. Her family traces its roots to early English and Scottish settlers who arrived
    in the area in the late 1800s. Raised with Southern values of modesty, hard work, and strong family ties, she participated in community church activities and local festivals. The cultural fabric of
    Sullivan County, known for its rich musical heritage—including the famed Bristol Rhythm & Blues scene—has imbued her with an appreciation for bluegrass, country, and folk music. While she respects traditional
    customs, Grace also embraces contemporary artistic expression, reflecting a blend of heritage and modern curiosity in her outlook.
