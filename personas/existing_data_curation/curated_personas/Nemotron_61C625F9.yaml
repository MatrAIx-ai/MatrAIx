  career_goals: Grace aims to transition from the assembly line to a supervisory or quality‑assurance role within the next few years, leveraging her reliability and attention to detail. She plans to enroll
    in night courses at a community college to earn an associate degree in industrial technology or mechanical design, which will open pathways toward product development. Long‑term, she dreams of merging
    her artistic curiosity with her fabrication skills to launch a small custom‑metalwork studio, creating one‑of‑a‑kind pieces that blend functionality with abstract art. Throughout her career progression,
    she seeks a stable environment that supports her marriage and offers resources for managing her anxiety, such as employee wellness programs.
