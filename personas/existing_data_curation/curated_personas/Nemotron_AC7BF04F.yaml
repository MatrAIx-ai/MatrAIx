personas:
  professional: Mizella Stanton is a budding natural historian who combines meticulous animal sketches, LEGO ecosystem models, and ScratchJr storytelling to explore science, thriving in solitary, structured
    projects while occasionally veering into spontaneous, hands‑on experiments that defy her usual predictability.
  sports: Mizella Stanton enjoys regular walks and bike rides along the Schuylkill River Trail, follows the Philadelphia Eagles for inspiration, volunteers with the Philly Kids Outdoor Club for nature hikes,
    and participates in a school‑organized after‑school soccer program, favoring steady, low‑impact fitness over competitive sports.
  arts: Mizella Stanton spends quiet afternoons sketching wildlife to the sound of Beethoven's Symphony No. 6, adores John James Audubon's bird illustrations, and draws creative inspiration from the colors
    of Monet's water lilies, while occasionally watching BBC's Planet Earth series for artistic ideas.
  travel: Mizella Stanton plans weekend outings with her mother to nearby spots like Wissahickon Valley Park and the historic streets of Philadelphia, dreams of visiting the National Aquarium in Baltimore
    and the cliffs of Acadia National Park, and balances a love for structured itineraries with spontaneous detours to collect shells along the shore.
  culinary: Mizella Stanton prefers simple, familiar meals such as mac and cheese, apple crumble, and peanut‑butter‑jelly sandwiches, enjoys helping whip up homemade pizza with fresh basil and mozzarella,
    and delights in assembling fruit kebabs with berries, grapes, and melon, though she can be fussy about trying new vegetables.
  core: Mizella Stanton is a quietly curious 10‑year‑old who channels a love for nature into detailed sketches, LEGO ecosystems, and disciplined saving, yet habitually forgets to water her houseplants despite
    her meticulous hobby organization.
background:
  cultural: Mizella was raised in a middle‑class, white family in Philadelphia, Pennsylvania. Her household celebrates common American holidays such as Thanksgiving, Christmas, and the Fourth of July, and
    occasionally participates in local traditions like the annual Mummers Parade. She attends a public elementary school with a culturally diverse student body, which gives her exposure to various backgrounds,
    though her family's own heritage includes Irish‑American roots. Growing up near historic sites and museums, she has developed an interest in the city’s history and values education, community libraries,
    and public parks.
attributes:
  skills: '[''Reading comprehension'', ''Fact memorization'', ''LEGO building'', ''Basic coding with ScratchJr'', ''Realistic wildlife drawing'', ''Pet care'', ''Following short routines'']'
  hobbies: '[''Reading natural‑history books'', ''Wildlife sketching'', ''Exploring Philadelphia parks'', ''LEGO building'', ''Puzzle solving'', ''ScratchJr coding'', ''Collecting rocks and leaves'', ''Listening
    to classical music'', ''Watching documentaries'']'
  career_goals: Mizella dreams of working with animals and the natural world. She hopes to become a wildlife biologist or a veterinarian who studies urban ecosystems, and she also imagines designing simple
    computer programs that help track animal populations. She wants to attend a science‑focused high school and later a university where she can combine field research with technology to protect local wildlife.
