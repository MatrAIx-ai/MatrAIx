personas:
  professional: Jabari Sharp is a seasoned physical scientist who leads experimental spectroscopy and quantum nanomaterials projects, leveraging meticulous lab instrumentation design and clear scientific
    communication while mentoring junior researchers with a calm, disciplined presence.
  sports: Jabari Sharp enjoys early‑morning jogs along the Charleston waterfront, plays recreational pickleball at a local community center, follows the Clemson Tigers football team and supports the Charleston
    Battery soccer club, and incorporates weekly yoga into their fitness routine.
  arts: Jabari Sharp expresses creativity through jazz piano improvisations inspired by Miles Davis and John Coltrane at downtown Charleston venues, captures the Lowcountry scenery in black‑and‑white Ansel
    Adams‑style photography, and draws insight from modern art theorists like Clement Greenberg and painters such as Mark Rothko and Yayoi Kusama, enriching their scientific perspective.
  travel: Jabari Sharp plans trips that blend work and wonder, attending a quantum materials conference in Zurich before stargazing in the Atacama Desert, they have also explored the culinary streets of
    New Orleans and the Zen gardens of Kyoto, preferring a mix of structured itineraries and spontaneous night‑sky observations, balanced against family commitments.
  culinary: Jabari Sharp loves fusing Southern comfort with global flavors, crafting dishes like miso‑glazed shrimp and grits, peach cobbler spiced with cardamom, and collard greens tossed with kimchi,
    and they skillfully balance bourbon‑infused sauces with fresh herbs in their home kitchen.
  core: Jabari Sharp is a methodical physicist with a jazz‑filled soul, who harmonizes disciplined research, artistic pursuits, and a calm resilience, all while occasionally forgetting to file tax receipts.
background:
  cultural: Jabari grew up in a close‑knit African‑American family in the Carolinas, where church gatherings, storytelling, and soulful music were daily rhythms. His upbringing emphasized the value of education,
    community service, and perseverance, traits that have guided his academic and professional journey. He draws inspiration from Southern hospitality and the rich cultural heritage of African‑American
    art, which informs his appreciation for jazz and visual arts. Active in local chapters of the National Society of Black Physicists and the Southern African‑American Cultural Association, Jabari integrates
    his cultural roots with his scientific identity, fostering mentorship and representation within his community.
attributes:
  skills: '[''Spectroscopy'', ''Nanomaterials Synthesis'', ''Computational Modeling'', ''Quantum Mechanics'', ''Advanced Data Analysis'', ''Scientific Writing'', ''Grant Writing'', ''Lab Management'', ''Project
