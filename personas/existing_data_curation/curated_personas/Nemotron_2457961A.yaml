  hobbies: '[''Jazz Piano'', ''Landscape Photography'', ''Hiking'', ''Philosophy Reading'', ''Art Exhibition Attendance'', ''Amateur Astronomy'', ''Experimental Cooking'', ''Yoga'', ''STEM Mentorship'',
    ''Community Science Museum Volunteering'']'
  career_goals: Jabari aims to become a senior research leader within the next five years, overseeing a multidisciplinary team that investigates next‑generation energy materials. He aspires to secure a
    tenure‑track professorship that allows him to blend cutting‑edge research with undergraduate teaching, while establishing a community outreach program that encourages underrepresented youth, especially
    African‑American students, to pursue STEM careers. Long‑term, he dreams of influencing science policy at the state level to increase funding for interdisciplinary research and broaden access to science
    education.
