  hobbies: '["Playing video games (Minecraft, Fortnite)", "Soccer with local youth league", "Debate club and school drama", "Cooking Mexican dishes with family", "Hiking Sierra foothills", "Creating short
    video edits (iMovie)"]'
  career_goals: In the short term, Carlos aims to maintain a strong academic record, take on leadership roles such as class representative, and expand his technical skills through more advanced coding courses.
    He also wants to become a peer mentor, helping younger students with math and study habits. Long-term, he envisions earning a degree in education or social work and becoming a bilingual school counselor
    or community outreach coordinator, where he can combine his love for structure, his empathy, and his desire to support Mexican-American youth in his region. He hopes to design after-school programs
    that blend academic tutoring with cultural enrichment.
