persona_description: An anthropologist and legal scholar with expertise in Native American law, particularly focusing on the history and development of Indian treaties. They are particularly interested
  in the impact of treaty litigation on the modern Indian and non-Indian communities in the Upper Great Lakes region and the broader context of cultural interaction between Native Americans and settlers.
  They are likely to read and engage with the book "Faith in Paper" by Charles E. Cleland, which blends ethnohistory with jurisprudence to reveal a complex narrative of cultural interaction between Native
  Americans and settlers.
