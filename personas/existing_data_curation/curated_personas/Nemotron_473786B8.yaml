  career_goals: Patricia aims to leverage her STEM background to give back to her community by mentoring underrepresented youth in science and mathematics, and by volunteering as a part‑time consultant
    for local non‑profits seeking data‑driven solutions. She hopes to help establish a community makerspace that combines practical skill‑building with collaborative learning, and she is committed to lifelong
    learning through online courses and workshops. Over the next few years, she envisions publishing a series of accessible guides on applying scientific thinking to everyday problems.
