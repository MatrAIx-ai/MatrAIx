background:
  cultural: Danilo is a first‑generation Dominican‑American raised in the vibrant neighborhoods of Brooklyn, Kings County. He grew up in a bilingual household where Spanish was spoken at home and English
    at school, fostering a deep connection to both Dominican and American cultures. Family gatherings were filled with merengue, bachata, and the aromas of traditional dishes, reinforcing his pride in his
    heritage. The Dominican diaspora in New York provided a supportive community that celebrated cultural holidays like Día de la Independencia and shared stories of the island. Simultaneously, Brooklyn's
    multicultural tapestry exposed Danilo to hip‑hop, street art, and diverse culinary scenes, shaping his identity as a bridge between his roots and his urban environment. He maintains close ties with
    extended family in the Dominican Republic, often communicating via video calls, and participates in local cultural festivals that celebrate Afro‑Caribbean traditions.
