  career_goals: Danilo aims to earn his high school equivalency (GED) within the next year and then enroll in a culinary apprenticeship that focuses on Dominican fusion cooking. He dreams of launching a
    food‑truck in Brooklyn that serves classic Dominican dishes with contemporary twists, providing a cultural bridge for his community. Parallel to this, he wants to mentor younger kids in his neighborhood
