  career_goals: Although currently not in the formal workforce, Joshua is eager to re‑engage in purposeful, part‑time roles that leverage his practical skills and compassionate nature. His primary ambition
    is to become a regular volunteer coordinator at the local senior center, offering home‑maintenance assistance and companionship to isolated elders. He also hopes to obtain a certified CPR/First‑Aid
    credential to enhance his ability to respond in emergencies. In the longer term, Joshua envisions mentoring at‑risk youth through hands‑on workshops that teach basic repair, budgeting, and problem‑solving,
    aiming to foster self‑reliance and community pride.
