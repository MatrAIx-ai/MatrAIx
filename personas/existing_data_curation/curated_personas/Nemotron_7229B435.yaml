personas:
  professional: A community‑focused handyman and aspiring volunteer coordinator, Joshua Morel blends their seasoned carpentry, garden‑maintenance, and first‑aid expertise to support senior neighbors while
    navigating a preference for predictable routines alongside a relaxed approach to scheduling.
  sports: A seasonal fan of the local high‑school Wildcats baseball team and an occasional participant in the county’s senior softball league, Joshua Morel also enjoys fly‑fishing on the nearby creek, and
    they prefer low‑key outdoor recreation over televised professional sports.
  arts: An avid reader of Laura Ingalls Wilder’s historical fiction and a dedicated member of the church choir, Joshua Morel finds inspiration in the folk melodies of Johnny Cash and the lyrical storytelling
    of Gillian Welch, while they occasionally craft birdhouses that double as miniature art installations.
  travel: Joshua Morel favors low‑key road trips to nearby historic sites such as Galena, Illinois, and the Great Smoky Mountains, balancing a love for nature with a modest travel budget, and they dream
    of a leisurely visit to the Willamette Valley vineyards in Oregon.
  culinary: A confident garden-to-table cook, Joshua Morel delights in preparing roasted beet salad with goat cheese, pan‑seared trout harvested on their fly‑fishing outings, and heirloom tomato soup seasoned
    with rosemary, and they often share these dishes at community potlucks.
  core: Joshua Morel is a meticulously organized gardener who over‑worries about weather forecasts, hoards vintage bird‑call recordings, and they find solace in crafting simple wooden birdhouses for neighbors.
background:
  cultural: Joshua grew up in a traditional white, Midwestern, small‑town setting in Ohio, where community interdependence, modesty, and self‑reliance are highly valued. His upbringing was rooted in a Protestant
    (Methodist) family that emphasized service to others and a steady work ethic. The cultural milieu of Washington Court House and Fayette County—characterized by close‑knit neighborhoods, local festivals,
    and a strong sense of place—has shaped his pragmatic outlook, love for nature, and commitment to helping neighbors. While his divorce introduced personal challenges, it also reinforced his appreciation
    for stability, routine, and the supportive network provided by his hometown.
