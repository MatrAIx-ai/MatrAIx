persona_description: A craftsman or designer who specializes in selecting and working with veneers, particularly those from hardwood species such as oak, maple, and ash. They are familiar with the various
  types of veneer, their characteristics, and how to select and use them effectively in woodworking projects. They understand the importance of accurate identification and waste management, and are skilled
  in using veneers to achieve consistent and desirable results in their work. They are also aware of the various types of veneer cutting techniques and their applications, and are able to select veneers
  that meet specific project requirements and aesthetic preferences.
