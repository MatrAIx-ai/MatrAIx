  career_goals: Yanelis aims to pursue an associate or bachelor's degree in Business Administration or Office Management within the next two to three years, aspiring to become an Office Manager or Administrative
    Coordinator in a cultural institution or non‑profit focused on arts and community development. She plans to obtain the Certified Administrative Professional (CAP) credential and later a Project Management
    Professional (PMP) certification to lead larger projects. By blending her administrative expertise with her passion for Puerto Rican art, she hopes to eventually oversee program administration for a
    local museum or cultural center, curating events that celebrate the island’s heritage. Yanelis also intends to develop mentorship skills to support younger employees and contribute to a supportive workplace
    culture. Long‑term, she envisions a role that allows her to champion inclusive community initiatives while maintaining a balanced, organized environment. Additionally, she seeks to incorporate well‑being
    practices into her professional routine, advocating for mental‑health awareness in the workplace.
