personas:
  professional: Sebrina Elsberry is a retired community historian and volunteer art curator who leverages her storytelling talent, spontaneous event-planning flair, and deep love of Chesapeake Bay maritime
    heritage to stage traveling exhibitions and launch an intergenerational art mentorship program across Talbot County.
  sports: Sebrina Elsberry is an avid walker who joins the Talbot County Senior Strollers club for daily bayfront walks, participates in the seasonal senior softball league with the Chesapeake Bay Lady
    Legends, practices gentle yoga at the community center each spring, and passionately follows the Baltimore Ravens and Baltimore Orioles.
  arts: Sebrina Elsberry is a watercolor painter and amateur photographer who regularly attends Saint Michaels gallery openings, draws inspiration from Edward Hopper, Winslow Homer, and local ceramicist
    Maya Torres, performs in community theater productions of Tennessee Williams, and curates pop-up shows that spotlight regional artisans.
  travel: Sebrina Elsberry is a relaxed traveler who prefers spontaneous weekend road trips to historic towns like Annapolis and St Michaels, enjoys occasional Chesapeake Bay sailing excursions, dreams
    of exploring the seaside villages of Cinque Terre, and plans trips by chatting with friends rather than drafting detailed itineraries.
  culinary: Sebrina Elsberry is a confident home chef who specializes in Chesapeake Bay seafood, expertly prepares crab cakes seasoned with Old Bay and baked oysters topped with a parsley-garlic breadcrumb
    mixture, and frequently seasons her dishes with fresh herbs—basil, dill, and rosemary—from her garden.
  core: Sebrina Elsberry is a curious, socially vibrant septuagenarian who blends spontaneous art advocacy, community storytelling, and a love of seafood into a life as richly textured as her watercolor
    landscapes.
background:
  cultural: Sebrina was raised in a middle‑class white family in the Baltimore suburbs and relocated to the Eastern Shore as a young adult. Her upbringing blended Mid‑Atlantic values with Chesapeake Bay
    traditions, including participation in church (Methodist/Episcopal) gatherings, local seafood festivals, and community fairs. She attended some college courses in liberal arts, focusing on art history
    and literature, which fostered her lifelong curiosity about art and new ideas. Living in Saint Michaels, a town known for historic preservation and a close‑knit volunteer culture, she internalized a
    strong sense of community, a love for maritime heritage, and an appreciation for spontaneous, creative endeavors.
