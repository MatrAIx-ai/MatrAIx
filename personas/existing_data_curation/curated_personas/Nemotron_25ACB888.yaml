    ''Gardening'', ''Reading contemporary fiction and poetry'', ''Volunteering at senior center'']'
  career_goals: Although retired, Sebrina aims to launch an intergenerational art mentorship program that pairs local youth with senior artists, and to create a traveling exhibition that showcases the maritime
    heritage of the Eastern Shore. She plans to document and publish a collection of oral histories from long-time residents of Talbot County, and to write a memoir that weaves together her love of art,
    food, and community. Additionally, she hopes to develop a community garden with an integrated public art installation, fostering both ecological stewardship and creative expression.
