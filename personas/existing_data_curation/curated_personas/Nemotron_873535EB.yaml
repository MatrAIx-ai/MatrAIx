personas:
  professional: Stephanie Panagoulis, a 31‑year‑old retail specialist in Oroville, blends a meticulous eye for visual merchandising with a deep appreciation for art, leveraging their methodical planning,
    empathic communication, and mindfulness practices to curate engaging store displays while navigating anxiety‑driven stress in fast‑paced customer environments, and they bring calm focus to each bustling
    shift.
  sports: Stephanie Panagoulis hikes the Sierra foothills every other weekend, belongs to the Sierra Trailblazers club, practices Vinyasa yoga at a downtown studio, and roots for the Sacramento Kings while
    occasionally joining a local recreational softball league, and they relish the blend of solitary trail time and team camaraderie.
  arts: Stephanie Panagoulis spends free time sketching at SFMOMA, paints watercolors inspired by Frida Kahlo’s vibrant self‑portraits, creates digital illustrations reminiscent of Beeple, and supports
    local theater productions like The Little Foxes at the Sacramento Memorial Auditorium, while finding solace in the melodic strains of bouzouki music at community festivals, and they often blend visual
    and auditory inspirations in their personal projects.
  travel: Stephanie Panagoulis prefers meticulously planned trips that blend adventure and culture, having trekked the Camino de Santiago, explored the Aegean island of Paros’s white‑washed villages, savored
    wine tasting in Napa Valley, and dreaming of a future art museum tour in Tokyo, all while they budget travel through a spreadsheet and limit time away from family.
  culinary: Stephanie Panagoulis enjoys cooking Mediterranean dishes such as grilled chicken souvlaki, spanakopita, and honey‑drizzled baklava, pairing them with homemade tzatziki and fresh oregano, while
    also experimenting with single‑origin Ethiopian Yirgacheffe coffee, displaying an intermediate skill level that impresses friends during weekend dinner parties, and they often host casual tasting evenings
    for close friends.
  core: Stephanie Panagoulis is a creatively driven, meticulously organized retail professional; they channel anxiety into over‑preparation, impulsive art‑supply splurges, and a relentless pursuit of balance
    between community ties and solitary reflection.
background:
  cultural: Stephanie comes from a Greek‑American family, with traditions such as weekend souvlaki meals, Greek music, and occasional participation in the Greek Orthodox community. Growing up in the rural‑suburban
    environment of Yuba County, she also absorbed the values of self‑reliance and close‑knit community life common to Northern California's white working‑class culture. This blend of Mediterranean heritage
    and West Coast progressive attitudes shapes her appreciation for diverse artistic expressions, her emphasis on family bonds, and her willingness to embrace unconventional ideas while maintaining a strong
    work ethic.
attributes:
  skills: '[''Customer service'', ''Sales techniques'', ''Visual merchandising'', ''Inventory management'', ''Point-of-sale operation'', ''Schedule coordination'', ''Conflict resolution'', ''Effective communication'',
