  hobbies: '[''Visiting art galleries'', ''Painting and sketching'', ''Photography'', ''Reading contemporary art and design books'', ''Yoga and mindfulness practice'', ''Hiking in the Sierra foothills'',
    ''Cooking Mediterranean cuisine'', ''Attending local theater productions'', ''Exploring new coffee shops'', ''Volunteer work at community art events'']'
  career_goals: In the short term, Stephanie aims to earn a promotion to assistant manager within the next 12‑18 months, focusing on developing leadership and staff‑training skills. She plans to complete
    an associate degree in Business Management to solidify her operational knowledge. Long‑term, she envisions transitioning into a visual‑merchandising role for a regional chain or launching her own boutique
    that showcases handcrafted art and locally sourced goods, merging her artistic curiosity with retail expertise. Throughout her career progression, she seeks a work environment that values creativity,
    offers clear structure, and provides resources for mental‑health support, allowing her to manage anxiety while pursuing professional growth.
