persona_description: A Renaissance painter who is known for his exceptional works, particularly his paintings of the Virgin and Child Enthroned With Four Angels, and his contributions to the field of mathematics
  and geometry. He is highly regarded for his deep interest in the theoretical study of perspective and his contemplative approach to his paintings. His works have been exhibited in the United States and
  inspired modern painters like Giorgio de Chirico, Massimo Campigli, Felice Casorati, and Balthus. His patron, Federico da Montefeltro of Urbino, encouraged him to pursue the interest in perspective which
  was shared by the Duke.
