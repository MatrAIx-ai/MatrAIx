  hobbies: '[''Basketball (local league)'', ''Hunting and fishing'', ''Hiking'', ''Volunteer work at food bank'', ''Classic car restoration'', ''Live music concerts'', ''Multiplayer video gaming'', ''Weightlifting'',
    ''Community fairs'']'
  career_goals: Hunter aims to move from his current laborer role into a supervisory position within the next three years, targeting a shift-lead or warehouse supervisor title. He plans to earn a forklift
    trainer certification and complete a Certified Logistics Technician program to deepen his logistics knowledge. Over the longer term, he envisions pursuing a bachelor’s degree in supply chain management,
    eventually stepping into an operations manager role or launching a small local moving and freight business that prioritizes structured processes and employee well‑being. He also wants to develop stress‑management
    skills to create a more predictable and supportive work environment for himself and his team.
