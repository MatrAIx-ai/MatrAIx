personas:
  professional: Edith Smith is a 23‑year‑old rail‑track laying and maintenance equipment operator who blends a pragmatic curiosity with a competitive drive, expertly interpreting schematics, troubleshooting
    ballast tampers and rail‑mounting machines on the spot while often embracing a flexible, last‑minute approach to shift planning and crew coordination, and they thrive on friendly rivalry with their
    crew.
  sports: Edith Smith enjoys hiking state parks in spring, fishing the Alabama River in summer, rides with the Birmingham Cycle Crew during fall, stays fit with occasional gym sessions, and they passionately
    cheer on the Birmingham Barons minor‑league baseball team and the New Orleans Saints football squad, balancing endurance outdoors with a love for local sports culture.
  arts: Edith Smith unwinds to classic rock and blues, rotating through Led Zeppelin, Stevie Ray Vaughan, and the Allman Brothers, attends local folk festivals featuring The Avett Brothers, and occasionally
    rewatchs classic films starring Robert De Niro, letting music and movies fuel their DIY projects and they often hum the riffs while the grill sizzles.
  travel: Edith Smith prefers short, budget‑friendly road trips, having camped in the Great Smoky Mountains, explored Nashville’s music scene, and dreaming of a trans‑European rail adventure from Paris
    to Berlin, planning trips spontaneously yet they use a GPS and travel app to map routes that echo their love for trains and the outdoors.
  culinary: Edith Smith boasts a solid BBQ reputation, regularly smoking brisket seasoned with paprika, brown sugar and mesquite wood, grilling catfish with lemon‑pepper rub, perfecting jalapeño‑cornbread
    with buttermilk, and they occasionally craft a classic cheeseburger with caramelized onions for friends and family gatherings.
  core: Edith Smith is a hands‑on tinkerer and competitive rail operator who balances a laid‑back, spontaneous lifestyle with a relentless drive to fix machines, explore the outdoors, and fire up the grill,
    and they occasionally forget appointments while over‑indulging in hobby gear.
background:
  cultural: Edith grew up in Midland City, a small, close‑knit community in Dale County, Alabama. Her family comes from a working‑class background—her father worked as a mechanic and her mother was a school
    cafeteria worker—instilling a strong work ethic and self‑reliance. Southern traditions such as church gatherings, high school football games, and weekend BBQs are integral parts of her life. The regional
    importance of rail transport sparked her early fascination with locomotives, shaping her career choice. While she identifies as White, Edith appreciates the diverse cultural fabric of the South and
    respects the local customs. Her upbringing reflects a blend of pragmatic values, community support, and a love for hands‑on, practical pursuits.
attributes:
  skills: '[''Heavy equipment operation (track laying machinery)'', ''Rail track alignment and maintenance'', ''Basic mechanical troubleshooting'', ''Interpretation of technical schematics and blueprints'',
    ''Safety compliance and OSHA/FRA regulations'', ''Use of handheld GPS and CMMS software'', ''First aid and emergency response certification'', ''Team coordination and crew leadership basics'', ''Welding
    and small‑scale fabrication'', ''Basic electrical troubleshooting for signaling equipment'']'
  hobbies: '[''Hiking'', ''Fishing'', ''Bicycle restoration'', ''Small engine repair'', ''Listening to classic rock and blues'', ''Strategy video gaming (e.g., Civilization)'', ''Barbecue cooking'', ''Attending
    community fairs and farmers markets'', ''Reading engineering and rail industry magazines'', ''Volunteering at the regional railroad museum'']'
  career_goals: Edith aspires to earn advanced certifications such as Certified Track Operator and eventually become a senior track maintenance supervisor overseeing a crew and larger project segments.
    She plans to enroll in a vocational rail engineering program at a community college to deepen her technical knowledge and to qualify for a track inspector role with the state Department of Transportation.
    In the longer term, she aims to transition into rail safety analysis, contributing to policy development and training programs that improve worker safety on the rail network.
