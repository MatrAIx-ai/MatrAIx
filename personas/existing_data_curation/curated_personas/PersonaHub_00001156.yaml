persona_description: 'A software engineering educator and researcher with expertise in open source software, particularly in the field of humanitarian software. She has been involved in the development
  of course materials to support student open source participation within the classroom and has been PI on the NSF-funded project "SoftHum: StudentParticipation in the Community of Open Source Software
  for Humanity." She is interested in finding open source projects that are willing to create opportunities for students to participate in their work and has been involved with the Humanitarian Free and
  Open Source Software (HFOSS) project. She has experience in software development, project management, and community building, and is a strong supporter of Open Source. She is also interested in student
  contribution to open source software, especially for OSS with humanitarian goals, and has participated in multiple publications related to involving students in HFOSS projects.'
