personas:
  professional: Ethan Garcia, a seasoned retail operations manager, leverages their meticulous inventory control, staff scheduling expertise, and conflict‑resolution skills to keep a mid‑size store running
    like a well‑oiled machine, while their penchant for structure and low tolerance for stress drives them to implement daily check‑ins and strict performance metrics.
  sports: Ethan Garcia, who prefers low‑impact activity, spends his mornings tending a modest vegetable garden and takes leisurely weekend fishing trips with the Big River Anglers Club, while cheering on
    the St. Louis Cardinals in baseball and the Kansas City Chiefs in football from his porch, and occasionally joins a senior‑friendly walking group that meets at the local park.
  arts: Ethan Garcia, a quiet connoisseur of classic cinema, regularly hosts midnight screenings of John Ford westerns and Orson Welles masterpieces for his close‑knit circle, while his playlists feature
    Frank Sinatra, Louis Armstrong, and The Carter Family, and his admiration for the Arts & Crafts movement informs his own furniture‑making designs.
  travel: Ethan Garcia, who values quiet, reflective travel, enjoys annual weekend getaways to the Ozark National Scenic Riverways for fishing and genealogy research, dreams of a leisurely road trip along
    the Pacific Coast Highway to visit coastal lighthouses, and prefers meticulously planned itineraries that balance scenic drives with time for solitary contemplation.
  culinary: Ethan Garcia, an adept home cook, favors preparing pan‑seared trout caught on the Big River with a lemon‑dill butter, hearty Missouri‑style pork stew with carrots and potatoes from his garden,
    and occasionally indulges in a well‑crafted blackberry cobbler topped with fresh mint, reflecting his love for simple, seasonal flavors.
  core: Ethan Garcia, a meticulous yet worry‑prone retiree, blends his love for quiet fishing, precise woodworking, and careful budgeting into a disciplined lifestyle, though he secretly hoards vintage
    fishing lures and occasionally over‑schedules his day despite his craving for predictability.
background:
  cultural: Ethan grew up in a traditional, white Midwestern family in the St. François County area, where community ties and a strong work ethic were emphasized. His upbringing was shaped by the rhythm
    of small‑town life—high‑school football games, county fairs, and seasonal church gatherings. The local Catholic (or Protestant) traditions instilled values of modesty, responsibility, and service to
    neighbors. Regional influences, such as Ozark folk music, river‑fishing culture, and a love for home‑grown food, have left an enduring mark on his identity. This cultural backdrop reinforces his preference
    for structure, practicality, and close‑knit social circles.
attributes:
  skills: '["Team leadership", "Staff scheduling", "Inventory management", "Customer service training", "POS system operation", "Loss prevention", "Budget monitoring", "Conflict resolution", "Merchandising
