personas:
  professional: Kayla Gaston, an aspiring junior artist‑inventor, merges her love for vibrant watercolors and imaginative LEGO constructions with a budding curiosity for space, using her organized yet flexible
    nature to create playful, story‑driven illustrations that she proudly shares at the community art center’s after‑school workshops.
  sports: Kayla Gaston kicks a soccer ball with the Bronx Youth Soccer League, cheers for the New York Yankees during family game nights, and sways to hip‑hop dance routines at the community center, embodying
    a lively mix of teamwork and rhythm.
  arts: Kayla Gaston, a watercolor enthusiast, fills sketchbooks with swirling animal constellations inspired by the gospel choirs she hears at church, grooving to upbeat tracks by Beyoncé and Kidz Bop
    versions of classic hip‑hop, and proudly displays her LEGO dioramas at the neighborhood cultural center’s monthly art showcase.
  travel: Kayla Gaston loves exploring the Bronx Zoo’s animal kingdom and the New York Botanical Garden’s seasonal blooms, has taken a school‑organized field trip to the American Museum of Natural History,
    and dreams of traveling to the Kennedy Space Center to see rockets up close.
  culinary: Kayla Gaston delights in soul‑food comfort dishes like crispy fried chicken, buttery corn‑bread, and collard greens at family gatherings, while also savoring childhood staples such as peanut‑butter‑jelly
    sandwiches, banana pancakes, and mango smoothies she often blends with her grandma.
  core: Kayla Gaston, a curious seven‑year‑old with a rainbow of crayons, an unstoppable love for LEGO worlds, a habit of hugging her piggy bank before bedtime, and an occasional tendency to forget sunscreen
    after playground adventures, embraces every day as a canvas for art, science, and community rhythm.
background:
  cultural: Kayla lives in the Bronx, a vibrant borough of New York City with a rich African American heritage. Her family celebrates cultural traditions such as soul food gatherings, listening to gospel
    music at church, and participating in community block parties that feature hip‑hop dance, spoken‑word poetry, and local artists. She benefits from after‑school programs that highlight Black history
    and contemporary arts, and she often hears stories from her grandparents about the neighborhood’s past. These experiences give her a strong sense of belonging, cultural pride, and an appreciation for
    the diverse voices that shape her community.
