  career_goals: Kayla often talks about growing up to be an artist who paints bright murals on the walls of her Bronx neighborhood, a teacher who inspires curiosity in young minds, or a community librarian
    who creates story‑time programs that celebrate diverse cultures. She also imagines becoming a scientist who explores space or a wildlife caretaker who helps animals. Her ambitions reflect her love of
    art, learning, and helping others, and she hopes her future work will make her community a more joyful and supportive place.
