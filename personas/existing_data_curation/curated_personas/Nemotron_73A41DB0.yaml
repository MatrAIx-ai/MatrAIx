    landscapes'']'
  career_goals: Mavis aims to leverage her administrative expertise into a senior office manager or executive assistant role within a culturally vibrant organization, such as an art museum, gallery, or
    creative agency. She plans to complete a bachelor's degree in Business Administration or Arts Management within the next three years, while earning the Certified Administrative Professional (CAP) credential
    to formalize her skill set. Her long‑term ambition is to oversee operations for a cultural institution, coordinating exhibitions, community outreach, and grant administration, thus blending her love
    of art with her organizational talent. She also seeks to mentor junior staff, fostering a high‑performing, detail‑oriented team, and aspires to be recognized for implementing efficiency initiatives
    that improve productivity by measurable margins.
