personas:
  professional: Mavis Guilbe leverages her meticulous office administration expertise, bilingual fluency, and keen eye for detail to streamline operations at art institutions, where her calm, competitive
    drive ensures projects meet deadlines and they continuously explore innovative exhibition support.
  sports: Mavis Guilbe participates in weekly sunrise runs with the Palmdale Runners Club, attends LA Lakers games for seasonal excitement, and maintains a calm yet competitive yoga practice at a local
    studio, balancing cardio with flexibility to sustain her organized lifestyle.
  arts: Mavis Guilbe fuels her artistic sensibility by sketching at LACMA, studying works of Frida Kahlo and contemporary muralist Carmen Lomas Garza, curating thematic playlists featuring José González,
    and they channel this inspiration into designing vibrant event flyers using Adobe InDesign for community Día de los Muertos celebrations.
  travel: Mavis Guilbe enjoys planned cultural trips, having explored Oaxaca’s markets, spent a weekend in Santa Barbara’s coastline, and they dream of a solo itinerary through Kyoto’s temples, balancing
    thorough research with a modest budget that favors immersive experiences over luxury.
  culinary: Mavis Guilbe favors contemporary Mexican‑fusion cuisine, relishing dishes like duck tacos with mole‑marinated sauce, chiles en nogada infused with quinoa, and they often experiment at home with
    ingredients such as epazote, Oaxaca cheese, and roasted corn salsa while attending occasional cooking workshops.
  core: Mavis Guilbe blends a quiet curiosity with relentless organization, turning every sketch, spreadsheet, and schedule into a precise canvas while they occasionally skip social outings to chase a perfect
    workflow.
background:
  cultural: Mavis is a first‑generation Mexican‑American raised in Palmdale, California. Her parents immigrated from Jalisco, bringing with them strong family traditions, Catholic values, and a deep appreciation
    for Mexican folk art and music. Bilingual from childhood, Mavis grew up celebrating Día de los Muertos, quinceañeras, and other communal festivities, which instilled a sense of cultural pride and responsibility.
    The diverse environment of Los Angeles County exposed her to a mosaic of Latino, Asian, and African‑American cultures, nurturing her openness to varied experiences while maintaining a connection to
    her Mexican heritage. This blend of traditions influences her taste in food, art, and community involvement, and informs her aspiration to work in arts administration that highlights Hispanic cultural
    contributions.
