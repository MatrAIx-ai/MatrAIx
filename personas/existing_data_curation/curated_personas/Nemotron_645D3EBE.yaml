  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Volunteering at community events'', ''Playing volleyball'', ''Reading personal-development books'', ''Attending church youth group'',
    ''Listening to Latin music'', ''Organizing social gatherings'']'
  career_goals: Maria aims to enroll in a local community college to earn an associate degree in Business Administration or Health Services Administration within the next two years. She plans to leverage
    her organizational strengths and bilingual skills to secure a stable entry-level administrative position at a community health clinic or a nonprofit organization serving the Puerto Rican community in
    Philadelphia. Over the next five years, she aspires to advance to a program coordinator role, where she can design and manage community outreach initiatives, while also supporting her family financially
    and maintaining a balanced, routine-oriented lifestyle.
