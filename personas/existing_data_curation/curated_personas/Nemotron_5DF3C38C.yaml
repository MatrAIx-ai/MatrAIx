personas:
  professional: Angel Kim, a veteran chef and culinary mentor with over 40 years of expertise in Veracruz-inspired Mexican cuisine and Pacific Northwest adaptations, applies rigorous food safety, precise
    inventory control, and structured menu planning while occasionally embracing spontaneous improvisations for community workshops, and they balance a practical, reserved demeanor with assertive guidance
    of junior staff.
  sports: Angel Kim, an avid member of the Willamette River Walking Club who enjoys leisurely morning walks, occasional senior yoga sessions, and cheering on the Portland Timbers in MLS and the Trail Blazers
    in NBA, uses their weekly walks as both cardiovascular exercise and a calming ritual, and they navigate mild knee osteoarthritis by adjusting pace in the colder months.
  arts: Angel Kim, a devoted fan of mariachi classics by Vicente Fernández, ranchera ballads by Lila Downs, and contemporary Latin pop icons Bad Bunny and J Balvin, regularly reads mystery novels by Agatha
    Christie and Tana French in a Wilsonville library book club, and they blend these artistic passions into their cooking workshops, often playing the music as a backdrop while sharing stories.
  travel: Angel Kim, who meticulously plans weekend culinary getaways to Oaxaca for its mole traditions while also delighting in spontaneous day trips to Willamette Valley vineyards, cherishes a wish to
    explore Barcelona’s tapas bars, balances travel budgets with modest savings, and they journey with their husband, favoring relaxed itineraries that allow time for garden foraging and river walks.
  culinary: Angel Kim, a master of authentic Veracruz-style tacos al pastor, mole negro, and Pacific Northwest-inspired cedar-planked salmon with kale-cilantro salsa, crafts each dish with meticulous knife
    skills and seasonal garden produce, and they view cooking as both a disciplined culinary art and a joyful, improvisational dance, frequently experimenting with unique ingredient pairings while maintaining
    rigorous food safety standards.
  core: Angel Kim blends disciplined culinary expertise with a love for garden-fresh herbs, community service, and spontaneous mariachi rhythms, and they navigate the tug-of-war between structured planning
    and occasional impulsive generosity.
background:
  cultural: Angel is a first‑generation Mexican American whose parents emigrated from Veracruz, Mexico. Raised in a bilingual household, she grew up speaking both Spanish and English, and her family traditions—such
    as festive meals, religious celebrations, and reverence for communal cooking—remain central to her identity. While living in Wilsonville, Oregon, she blends her Mexican heritage with the local culture,
    participating in community events, supporting the regional food scene, and preserving her cultural roots through cooking, language, and holiday observances.
attributes:
  skills: '["Mexican cuisine","Pacific Northwest fusion","Menu planning","Food safety and sanitation","Inventory control","Budgeting","Batch cooking","Culinary instruction","Recipe development"]'
  hobbies: '["Herb gardening","Listening to Mexican music","Reading mystery novels","Knitting","Walking along the Willamette River","Volunteering at a food pantry","Participating in a book club","Celebrating
    Día de los Muertos"]'
  career_goals: In the coming years Angel hopes to transition from the fast‑paced restaurant environment to a more flexible role that allows her to share her culinary knowledge. She plans to develop a series
    of community cooking classes at the Wilsonville senior center, publish a family cookbook featuring traditional Mexican recipes with an Oregon twist, and collaborate with her husband to run a weekend
    pop‑up taco stand at local farmers' markets. Additionally, she aspires to mentor a young apprentice cook and to refine her organizational skills to ensure smoother kitchen operations as she gradually
    reduces her workload.
