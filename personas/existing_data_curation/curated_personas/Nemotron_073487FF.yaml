personas:
  professional: Michael Sager is a budding digital illustrator and junior game map architect who blends a love of speculative fiction with hands‑on experience in Minecraft world‑building, Roblox map design,
    and the school robotics team's occasional coding challenges; they channel their naturally talkative, center‑stage energy into sharing tutorial videos at class assemblies and on online forums, while
    a competitive streak pushes them to refine every pixel until it meets a personally high standard of visual excellence.
  sports: Michael Sager spends Saturday afternoons shooting hoops at the Eastside Hoops Club in the community park, passionately cheering for the Los Angeles Lakers while exchanging play‑by‑play commentary
    with friends, and they also compete in the school’s chess club, treating each match as a strategic battlefield where their skeptical eye hunts for any hidden advantage; this blend of physical and mental
    sport reflects their competitive yet sociable nature.
  arts: Michael Sager immerses themselves in creative expression, sketching daily comic‑style characters inspired by the dynamic lines of Jim Lee, translating synth‑wave tracks by Carpenter into mood boards
    for animation, and binge‑watching Studio Ghibli films for visual storytelling cues; they also teach themselves guitar chords from YouTube tutorials, composing short ambient pieces that serve as soundtracks
    for their short animations.
  travel: Michael Sager’s travel log includes family outings to the county fair, a weekend trip to the regional art museum in Milwaukee, and a long‑awaited wish to attend San Diego Comic‑Con and explore
    Osaka’s anime districts for fresh artistic inspiration; they prefer a mix of structured itineraries and spontaneous detours, often packing a sketchbook and portable drawing tablet for on‑the‑go creativity.
  culinary: Michael Sager loves pepperoni pizza and spicy tuna sushi rolls, but their cooking skill is limited to mastering a perfect grilled cheese and following YouTube tutorials to bake chocolate chip
    cookies; they keep a stash of extra‑cheese packets, fresh basil, and hot sauce, using these ingredients to experiment with quick snacks between art sessions.
  core: Michael Sager is a curious, talkative teen who fuses digital art, gaming, and guitar practice into a competitive yet collaborative creative hub, occasionally overindulging in snacks and impulse
    purchases while dreaming of larger worlds.
background:
  cultural: Michael grew up in Hopkins, South Carolina, a close‑knit, predominantly white community with deep Southern roots. His family values hospitality, weekly church attendance, and community events
    like high‑school football games and the annual county fair. Traditional Southern cuisine—shrimp and grits, barbecue, and sweet tea—features at family gatherings, while stories of his ancestors' English
    and German heritage are shared around the dinner table. The region’s emphasis on community support and modesty influences Michael’s collaborative spirit, yet his exposure to national and global media
    through the internet broadens his perspective, allowing him to blend local cultural motifs with contemporary artistic trends.
