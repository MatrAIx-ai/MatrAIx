  career_goals: Michael aspires to merge his love of art and technology by becoming a video game designer or multimedia artist. He hopes to attend a high‑school program focused on digital arts and eventually
    earn a degree in interactive media or computer game development. His long‑term ambition is to lead a creative team that produces immersive experiences, allowing him to tell stories that blend visual
    art, sound, and interactive gameplay. He also envisions creating an online portfolio that showcases his evolving skill set, attracting mentorships and collaborative projects.
