personas:
  professional: Kara Garza, a 21‑year‑old aspiring marriage and family therapist, integrates systems‑theory acumen with a vivid mixed‑media art practice, delivering compassionate, imagination‑driven sessions
    while maintaining meticulous case documentation and flexible client‑centered boundaries.
  sports: Kara Garza, an avid hiker of the Appalachian foothills and dedicated yoga enthusiast, follows the Philadelphia Eagles in football and the Philadelphia Phillies in baseball, occasionally joins
    a local trail‑running group for weekend runs, but primarily finds fitness in solitary walks and meditation sessions.
  arts: Kara Garza, a mixed‑media painter and speculative‑fiction aficionado, draws inspiration from the surreal canvases of Hieronymus Bosch, the lyrical prose of Octavia Butler, and the ambient textures
    of Brian Eno, regularly visiting the Bethlehem Art Museum’s contemporary exhibits and attending midnight book‑club discussions to fuel their creative imagination.
  travel: Kara Garza, who favors low‑key solo adventures, has trekked the misty Blue Ridge Parkway, explored Asheville’s vibrant art districts, and dreams of capturing Iceland’s northern lights, typically
    planning trips that blend secluded hiking trails with quiet cafés while staying within a modest budget.
  culinary: Kara Garza, a modest home chef, delights in crafting quinoa bowls layered with roasted beetroot, feta, and toasted walnuts, enjoys the occasional indulgence of hand‑rolled avocado‑smoked‑salmon
    sushi, and experiments with daring desserts like charcoal‑infused black ice‑cream.
  core: Kara Garza, a 21‑year‑old introspective creator, melds art with therapy, balances disciplined budgeting with spontaneous splurges on supplies, and oscillates between meticulous self‑care routines
    and occasional procrastination on health appointments.
background:
  cultural: Kara was raised in Macungie, a small town in Berks County, Pennsylvania, within a middle‑class, predominantly Anglo‑American community. Her family’s cultural roots are a blend of German‑Pennsylvania
    Dutch heritage and broader American traditions, which cultivated an appreciation for community gatherings, modesty, and self‑reliance. Growing up in this setting has shaped her respectful and cooperative
    nature while also exposing her to the region’s rich folk art and crafts, influencing her artistic interests and compassionate approach to helping others.
attributes:
  skills: '[''Active listening'', ''Empathetic rapport building'', ''Family systems assessment'', ''Conflict mediation'', ''Basic cognitive-behavioral interventions'', ''Crisis de-escalation'', ''Therapeutic
    documentation'', ''Boundary setting'', ''Case management'', ''Art-therapy facilitation'', ''Cultural competency'']'
  hobbies: '[''Painting'', ''Sketching'', ''Mixed-media art'', ''Reading speculative fiction'', ''Philosophy'', ''Journaling'', ''Nature walks'', ''Photography'', ''Yoga'', ''Mindfulness meditation'', ''Volunteering
    at community art program'']'
  career_goals: Kara aims to complete her Master’s degree in Marriage and Family Therapy within the next two years and obtain full licensure as an LMFT. She envisions opening a private practice in the Lehigh
    Valley that blends traditional couple counseling with creative arts‑based interventions, offering workshops that encourage couples to explore abstract concepts of connection through visual art and storytelling.
    In the longer term, she hopes to contribute research on the efficacy of art‑infused therapy for families dealing with anxiety and to mentor future therapists in integrating imagination into clinical
    work.
