  career_goals: Dalia aspires to a career that blends her love for people, her practical mindset, and her desire to create supportive environments. She is interested in becoming an elementary school teacher
    or a youth counselor, roles that let her help children build confidence and emotional resilience. Over the long term, she hopes to lead community youth programs that combine structured learning with
    creative, flexible activities, allowing her to use her strengths in teamwork and empathy while addressing the emotional well‑being of others.
