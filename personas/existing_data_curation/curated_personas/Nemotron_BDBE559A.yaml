personas:
  professional: Jeramy Culotta is a seasoned retired business strategist; they leverage decades of financial planning, stakeholder negotiation, and community program coordination to mentor emerging entrepreneurs
    while cautiously ensuring every venture is sustainably funded and meticulously documented.
  sports: Jeramy Culotta enjoys walking the Rock River Trail with a senior walking group, follows the Green Bay Packers and Milwaukee Bucks with avid loyalty, and occasionally joins the local senior center's
    intramural pickleball league, treating each match as a friendly yet competitive challenge.
  arts: Jeramy Culotta attends performances at the Beloit Civic Theatre—especially classic productions such as 'Our Town'—relishes evening sessions of Duke Ellington and Count Basie recordings, and participates
    in trivia nights where their fondness for golden‑age cinema provides an edge.
  travel: Jeramy Culotta favors short, well‑planned trips to historic Midwestern towns like Madison and Chicago for theater outings, while dreaming of a leisurely Amalfi Coast cruise to explore culinary
    roots; they remain cautious about travel costs and prefer travel insurance.
  culinary: Jeramy Culotta excels at preparing traditional Italian dishes such as handmade lasagna, risotto alla Milanese, and tiramisu, carefully sourcing San Marzano tomatoes and Pecorino Romano, yet
    they sometimes over‑salt the sauce when distracted by lively bridge games.
  core: Jeramy Culotta blends a curiosity‑driven love of history with a meticulous, competitive mindset, turning senior‑center activities, garden stewardship, and low‑risk investing into a legacy‑building
    lifestyle punctuated by occasional worry‑induced overthinking.
background:
  cultural: Jeramy is an Italian‑American whose grandparents immigrated from Southern Italy and settled in the Midwest. Raised in a Catholic household, he blends Italian traditions—such as celebrating Ferragosto
    and preserving family recipes—with the pragmatic, community‑oriented values of rural Wisconsin. He speaks modest Italian, participates in the local Italian cultural association, and cherishes gatherings
    that emphasize hearty meals, storytelling, and intergenerational connection. At the same time, his Midwestern upbringing instilled a strong sense of self‑reliance, civic duty, and a practical approach
    to problem‑solving, shaping both his personal and professional outlook.
attributes:
  skills: '[''Strategic financial planning'', ''Budgeting and cash‑flow management'', ''Organizational development'', ''Stakeholder negotiation'', ''Mentorship'', ''Community program coordination'', ''Crisis
