  hobbies: '[''Bridge and chess club'', ''Rock River Trail walking group'', ''Volunteer income‑tax assistance'', ''Community gardening'', ''Cooking Italian cuisine'', ''Local theater attendance'', ''Genealogy
    research'', ''Blogging about business and family history'', ''Listening to classic jazz and big‑band music'', ''Senior center trivia competitions'']'
  career_goals: Even in retirement, Jeramy is driven to leave a tangible legacy. He aims to mentor emerging entrepreneurs in the Beloit area through a quarterly workshop series, serve on the board of the
    local senior center to expand financial‑literacy programs, author a concise guide on business fundamentals for retirees, and help establish a scholarship at the University of Wisconsin–Rock County for
    business students. His competitive spirit motivates him to organize a regional senior‑business case‑competition, while his cautious nature pushes him to ensure all initiatives are sustainably funded
    and well‑documented.
