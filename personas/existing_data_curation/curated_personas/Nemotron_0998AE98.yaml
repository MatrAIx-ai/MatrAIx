personas:
  professional: Mayda Mendez, a three‑year‑old aspiring architect, spends their days arranging colorful building blocks into precisely measured structures, applying their natural curiosity and methodical
    planning even as they occasionally throw a tantrum when their design is disrupted.
  sports: Mayda Mendez loves the local Little Jays T‑ball program and cheers loudly for the San Jose Earthquakes on family game nights, yet prefers gentle swings at the community park’s sandbox over high‑energy
    soccer drills, balancing organized play with moments of shy observation.
  arts: Mayda Mendez hums along to Disney’s “Let It Go” and watches puppet shows starring Señor Varela, while they proudly display finger‑painted portraits of their abuela, blending a love for bright, familiar
    melodies with a budding appreciation for storytelling and visual art.
  travel: Mayda Mendez excitedly packs a small backpack for weekend trips to the nearby Monterey Bay Aquarium and the annual local Harvest Festival, favoring short car rides with familiar songs over long
    flights, yet dreams of tasting snow at Lake Tahoe’s winter fair.
  culinary: Mayda Mendez enjoys munching on soft tamales and creamy pozole at family gatherings, helps stir guacamole for taco night, and occasionally requests mac and cheese with extra cheddar, reflecting
    a palate that savors traditional home flavors alongside classic kid‑friendly dishes.
  core: Mayda Mendez is a meticulous, curious three‑year‑old who builds perfect block towers, saves coins with care, but can erupt into intense tears when routines break, embodying a blend of organized
    wonder and emotional volatility.
background:
  cultural: Mayda grows up in a Mexican‑American household in Livingston, California. At home, Spanish and English are spoken interchangeably, and she celebrates traditions such as Día de los Muertos, Christmas
    with Mexican customs, and local community festivals tied to the agricultural heritage of Merced County. Her family enjoys foods like tamales and pozole, participates in Catholic celebrations, and maintains
    close ties with extended relatives, all of which shape her daily experiences and values.
