  career_goals: Even at three, Mayda imagines future roles that blend her caring nature with her love of order, such as becoming a teacher who creates organized learning spaces, a veterinarian who helps
    animals, or a community volunteer who designs safe, well‑maintained playgrounds for children. She aspires to help others while maintaining clear routines and practical methods.
