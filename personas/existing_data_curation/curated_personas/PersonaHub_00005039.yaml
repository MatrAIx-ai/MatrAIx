persona_description: A professional in the field of radar and electromagnetic compatibility, particularly focused on the analysis and optimization of radar cross section (RCS) in ships. This persona likely
  has expertise in using software tools such as EMC Studio and EMCoS Antenna VLab for RCS calculations and has a deep understanding of the theory behind RCS, including the PO solution (ray-tracing algorithm)
  and its application in ship design. They are familiar with the typical values of RCS for ships and can compare simulation results with analytical solutions and typical values to draw conclusions about
  RCS problems in ships.
