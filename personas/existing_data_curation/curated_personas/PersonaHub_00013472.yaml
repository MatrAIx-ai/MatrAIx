persona_description: A scientist with expertise in glycan profiling and analytical methods, particularly focusing on the top-down and bottom-up approaches. Hanneman is experienced in using HPLC and MS to
  analyze glycan profiles, and is aware of the limitations and benefits of each technique. He is knowledgeable about the unique challenges of analyzing glycans, such as their branched structure, multiple
  structural and stereo isomers, and their complex biosynthesis process. Hanneman is also aware of the new techniques and technologies that have emerged in the field of glycan analysis, and the value of
  established techniques such as fluorescence-tagging for routine glycan profiling.
