    Westlaw and LexisNexis","Strategic legal writing","Community outreach and pro bono coordination"]'
  hobbies: '["Hiking the North Shore and photographing landscapes","Kayaking on Lake Superior","Reading contemporary fiction and philosophy","Attending small‑group book clubs","Visiting local art galleries
    and theater productions","Practicing chess","Cooking traditional Scandinavian dishes","Woodworking projects","Volunteering with community legal‑aid clinics"]'
  career_goals: Scott aims to achieve partnership at his Duluth law firm within the next five years by building a reputation as a leading specialist in environmental and arts‑related law. He plans to expand
    his pro bono work to provide legal assistance for low‑income artists and community organizations, and he aspires to serve on the Duluth Arts and Culture Board to influence policy that supports creative
    initiatives. Long‑term, he envisions a transition to a judicial role, such as a municipal judge, where he can apply his methodical judgment and balanced perspective to serve the public.
