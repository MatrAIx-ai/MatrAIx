personas:
  professional: Lela Couch, a budding junior coder, merges her love of fantasy storytelling with practical problem‑solving by designing interactive Scratch games that often feature wildlife themes and by
    leading her school’s tiny robotics club, where they balance meticulous project planning with the freedom to experiment.
  sports: Lela Couch prefers low‑key outdoor activities like weekend bike rides at Riverfront Park and junior swimming lessons, cheers on the Clemson Tigers football team during football season, supports
    the Carolina Panthers, and occasionally joins the school’s after‑school soccer club, where they trade a quiet bench spot for a chance to score a goal.
  arts: Lela Couch expresses creativity through watercolor sketches inspired by Claude Monet’s soft palettes, reads J.K. Rowling’s Harry Potter series, admires Taylor Swift’s lyrical storytelling, and enjoys
    Studio Ghibli animated films, which they weave into short stories that blend fantasy with observations from daily nature walks.
  travel: Lela Couch loves family road trips that blend planned visits to historic Charleston’s cobblestone streets and the South Carolina State Fair with spontaneous stops at wildlife sanctuaries along
    the Congaree River basin, and they dream of exploring Yellowstone’s geysers and the towering redwoods of California someday.
  culinary: Lela Couch enjoys baking chocolate chip cookies with a pinch of sea salt, helping perfect pecan pie with crunchy toasted pecans, savoring collard greens seasoned with smoked ham hocks, and experimenting
    with blueberry pancakes flavored with cinnamon and a drizzle of honey butter, which they proudly serve to the family after a busy weekend of volunteer work.
  core: Lela Couch balances a quiet curiosity for coding and watercolor with a practical, community‑focused mindset, often juggling LEGO builds, birdwatching, and meticulous allowance budgeting while occasionally
    forgetting to hydrate during soccer practice.
background:
  cultural: Lela grew up in a middle‑class, white family in Columbia, South Carolina, where Southern hospitality and community involvement are important values. Her family celebrates holidays such as Thanksgiving
    and Christmas with regional twists—like pecan pies and collard greens—while also participating in local events like the South Carolina State Fair and community service projects organized through her
    school and the Girl Scouts. Attending schools in Richland County, she has been exposed to the city’s diverse cultural fabric, including local history lessons about the Civil Rights Movement and the
    heritage of the Congaree River. Her parents emphasize education, politeness, and respect for elders, and they encourage Lela to engage with her community through volunteer work and environmental stewardship.
    This blend of Southern tradition, civic responsibility, and exposure to the broader cultural landscape shapes her worldview and personal identity.
