  hobbies: '[''Reading fantasy and nature books'', ''Sketching and watercolor painting'', ''Building LEGO and mechatronics kits'', ''Coding simple games in Scratch'', ''Exploring local parks and birdwatching'',
    ''Playing piano'', ''Baking cupcakes with family'', ''Writing short stories'', ''Participating in school science club'', ''Volunteering at the animal shelter'']'
  career_goals: In the short term, Lela aims to maintain high grades, deepen her participation in the school science club, and attend a summer coding camp to sharpen her programming skills. She hopes to
    earn a junior badge in the Girl Scouts that focuses on environmental stewardship. Long‑term, Lela dreams of studying environmental science or marine biology at college, inspired by the nearby Congaree
    National Park and the coastal ecosystems of South Carolina. She also envisions a career that allows her to teach or mentor younger students, blending her love for learning with her natural inclination
    to nurture harmony and cooperation among peers.
