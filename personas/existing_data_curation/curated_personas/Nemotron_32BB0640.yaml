personas:
  professional: Nancy Garcia, a 49-year-old home-based catering visionary, blends their practical DIY event coordination and bilingual communication with a spontaneous culinary style that often sidesteps
    strict timelines, causing occasional deadline stress yet delivering memorable, intimate dinner experiences.
  sports: Nancy Garcia, a 49-year-old Miami resident, stays fit with early morning jogs along South Beach, follows the Miami Heat and Miami Dolphins avidly, and participates in a local Salsa Fitness Club
    that blends dance and cardio, while occasionally joining community pickleball games in the park.
  arts: Nancy Garcia, a 49-year-old cultural aficionado, draws inspiration from the rhythms of Buena Vista Social Club, the poetry of Maya Angelou, the films of Pedro Almodovar, and the contemporary art
    installations at the Perez Art Museum Miami, integrating these artistic influences into their culinary storytelling.
  travel: Nancy Garcia, a 49-year-old exploratory spirit, prefers low-key cultural immersions, having visited Havana, Cartagena, and Key West, while dreaming of a culinary pilgrimage to Barcelona’s La Boqueria
    market and an eco-retreat in Costa Rica, balancing modest travel budgets with a desire for authentic experiences.
  culinary: Nancy Garcia, a 49-year-old culinary enthusiast, expertly prepares traditional dishes such as ropa vieja, arroz con pollo, and mojo-marinated pork, seasoning them with garden-fresh cilantro,
    oregano, and a splash of orange zest, while constantly experimenting with fusion twists like smoked paprika-infused black beans.
  core: Nancy Garcia is a curious, spontaneous culinary storyteller whose intense emotional reactivity fuels both creative brilliance and occasional impulsive spending, and they channel that energy into
    daring kitchen experiments.
background:
  cultural: Nancy’s Cuban heritage is a cornerstone of her identity. Raised in a household that celebrated Cuban holidays, music, and cuisine, she maintains strong ties to the island’s traditions while
    navigating life as a Cuban‑American in Miami. Bilingual and culturally fluent, she seamlessly bridges the Cuban diaspora and the broader multicultural fabric of Miami‑Dade County. Her experiences of
    immigration, family separation through divorce, and community involvement have shaped a resilient yet emotionally sensitive outlook, influencing both her personal preferences and professional aspirations.
