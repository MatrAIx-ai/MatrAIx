  career_goals: Nancy aspires to turn her culinary passion into a modest home‑based catering venture that offers private, intimate dinner experiences reflecting her Cuban roots. She aims to develop a niche
    cooking blog and YouTube channel where she can share spontaneous recipes, cooking tips, and garden-to-table ideas, leveraging her social‑media savvy. In the longer term, she hopes to obtain a professional
    culinary certification to solidify her credibility and perhaps teach community cooking classes, all while maintaining the flexibility she values and managing her emotional wellbeing through a balanced
    work schedule.
