  hobbies: '["Hiking","Landscape Photography","Reading (Sci‑Fi & Tech)","Acoustic Guitar","STEM Mentorship","Gardening","Cooking Southwestern Cuisine","Chess"]'
  career_goals: Ryan aims to advance into senior program leadership, overseeing enterprise‑wide initiatives that integrate sustainable practices for his community in Edgewood. He plans to obtain PMP certification
    and eventually pursue a master's degree in engineering management to deepen his strategic capabilities. Mentorship is a growing priority; Ryan wants to guide junior project managers and support local
    STEM outreach programs. Long‑term, he envisions launching a consulting firm that helps small businesses and municipal projects navigate complex regulatory and technical challenges while preserving the
    region’s unique cultural and environmental assets.
