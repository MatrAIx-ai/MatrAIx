personas:
  professional: Ryan Maldonado is a seasoned project management specialist who blends Agile and Waterfall tactics with a Midwestern work ethic and Southwestern spontaneity, delivering data‑driven, risk‑aware
    programs while they occasionally wrestle with over‑planning and last‑minute deadline pressures.
  sports: Ryan Maldonado enjoys weekend hikes across the high desert, plays in a local over‑40 soccer league affiliated with Edgewood United, avidly follows New Mexico United in the USL Championship and
    the Dallas Mavericks for basketball, and they complement these activities with weekly yoga sessions to keep flexibility and balance.
  arts: Ryan Maldonado relaxes by strumming acoustic renditions of John Denver and Townes Van Zandt, curates a personal collection of Ansel Adams landscape prints and reads science‑fiction classics by Isaac
    Asimov and Neal Stephenson, while they also attend occasional community theater productions of classic westerns, blending their love for storytelling with visual artistry.
  travel: Ryan Maldonado prefers road‑trip itineraries that blend scenic sunrise photography stops at the Mesa Verde cliffs with visits to family gatherings in Santa Fe, has already explored the Grand Canyon,
    Sedona, and Kyoto, and they dream of trekking Patagonia’s Torres del Paine while budgeting each adventure to fit their modest family finances.
  culinary: Ryan Maldonado delights in cooking green chile enchiladas, carne adovada, and heirloom tomato salsa using Hatch chilies, roasted cumin, and fresh cilantro, often preparing a spicy chili‑infused
    broth for community potlucks, while they modestly rate themselves as an intermediate home chef who occasionally burns the edges of the tortilla.
  core: Ryan Maldonado is a pragmatic project leader with a love for sunrise hikes, acoustic guitar, and community gardening, who balances disciplined budgeting with spur‑of‑the‑moment purchases, and they
    sometimes wrestle with over‑planning and occasional deadline slips.
background:
  cultural: Ryan is a white American who was raised in rural Torrance County, New Mexico. His upbringing combined a Midwestern work ethic with the Southwest’s appreciation for outdoor life and community
    solidarity. He grew up attending local festivals, participating in church gatherings, and helping with family‑run agricultural projects, which fostered both a respect for tradition and an openness to
    diverse cultural influences in the region. These experiences shape his balanced approach to structure and spontaneity, as well as his commitment to contributing positively to his tight‑knit community.
attributes:
  skills: '["Project Planning","Risk Assessment","Budget Management","Stakeholder Communication","Agile & Waterfall Methodologies","Data Analysis","Process Optimization","Change Management","Technical Writing","Conflict
