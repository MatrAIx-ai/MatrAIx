  career_goals: Although retired from formal work, Erva aims to deepen her impact on the community by mentoring young crafters in workshops, documenting and preserving oral histories of Mathews County,
    and curating a small traveling exhibition of local art and craft. She hopes to co‑author a memoir of her experiences growing up on the Bay, and to serve as a volunteer docent at the county’s historic
    sites. Travel to nearby art festivals and regional museums also features in her personal ambition, as she seeks fresh inspiration to share with her friends and family.
