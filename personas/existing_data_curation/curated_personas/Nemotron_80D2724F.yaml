personas:
  professional: Tiffany Morban, a seasoned life‑science technician with over 25 years of hands‑on experience, leverages a methodical, organized mindset and a competitive drive to excel at specimen preparation,
    HPLC and GC‑MS calibration, PCR workflows, and comprehensive SOP creation, while they actively pursue senior laboratory manager responsibilities and dual CCLS and PMP certifications to lead multidisciplinary
    teams with precision.
  sports: Tiffany Morban, an avid hiker who alternates solitary treks with group outings in the Santa Cruz Mountains, they log their routes on Strava, belong to the Santa Cruz Mountain Hikers club, and
    root for the nearby San Jose Sharks, while maintaining a disciplined weekly yoga routine to complement their cardio fitness.
  arts: Tiffany Morban, a passionate supporter of the local arts scene, they regularly attend cultural festivals showcasing traditional music and dance, collect vinyl records by artists such as Carlos Santana
    and Los Lobos, and enjoy reading the magical realism of Gabriel García Márquez, drawing inspiration for their culinary creations and puzzle‑solving hobbies.
  travel: Tiffany Morban, a planner who books trips months in advance, they favor destinations that blend nature and cuisine—such as wine‑tasting tours in Napa Valley, hiking in the Redwood National Forest,
    and culinary explorations in Oaxaca and Mexico City—yet prefer short, well‑structured itineraries to avoid the stress of spontaneous travel.
  culinary: Tiffany Morban, a dedicated home chef, they lovingly prepare mole, tamales, and pozole for family gatherings, source chilies, masa, and cacao from their garden, experiment with fresh herbs and
    seasonal produce, and sometimes over‑spice dishes in their quest for authentic depth, while also mastering the art of making fresh salsa and handcrafted corn tortillas.
  core: Tiffany Morban is a methodical, competitive puzzle‑lover who balances a meticulous science career, disciplined finances, and health‑focused routines with a love for gardening, hiking, and cooking
    traditional dishes, all while they wrestle with occasional worry and a penchant for over‑planning.
background:
  cultural: Tiffany was raised in a bilingual Mexican‑American household where Spanish was spoken at home and English at school. Her parents emphasized a strong work ethic, family loyalty, and pride in
    their Mexican roots, celebrating Día de los Muertos, Cinco de Mayo, Las Posadas, and other traditions with communal meals, music, and storytelling. She maintains close ties with extended family both
    in California and Mexico, often preparing classic dishes for holidays. Living in Los Gatos, she balances this heritage with the tech‑oriented local culture, participating in Hispanic networking groups,
    providing bilingual support at her workplace, and volunteering for bilingual STEM outreach to bridge her professional expertise and cultural identity.
attributes:
  skills: '[''specimen preparation'', ''analytical instrumentation (HPLC, GC‑MS, flow cytometry)'', ''molecular biology techniques (PCR, qPCR, NGS library prep)'', ''statistical analysis (R, Python, JMP)'',
    ''data visualization'', ''quality assurance and regulatory compliance (GLP, ISO 15189)'', ''standard operating procedure development'', ''root‑cause analysis'', ''technical writing'', ''bilingual communication
    (English/Spanish)'']'
  hobbies: '[''vegetable gardening'', ''crossword puzzles'', ''Sudoku puzzles'', ''jigsaw puzzles'', ''yoga and mindfulness meditation'', ''cooking Mexican cuisine'', ''hiking in Santa Cruz Mountains'',
    ''volunteering at local science fairs'', ''mentoring middle‑school students'', ''attending Hispanic cultural festivals'']'
  career_goals: Tiffany aims to advance to a senior laboratory manager role within the next five years, overseeing a multidisciplinary team and driving continuous process improvements. She plans to earn
    a Certified Clinical Laboratory Scientist (CCLS) credential and a Project Management Professional (PMP) certification to strengthen her leadership capacity. Additionally, she envisions establishing
    a bilingual science‑education outreach program for local schools, leveraging her technical expertise and Mexican heritage to inspire the next generation of STEM students.
