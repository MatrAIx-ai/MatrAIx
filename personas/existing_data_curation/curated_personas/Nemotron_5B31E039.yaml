personas:
  professional: A retired maintenance supervisor turned multidisciplinary artist, Daniel Madison leverages their methodical troubleshooting skills and imaginative flair to orchestrate community workshops,
    curate traveling exhibitions, and manage the logistical complexities of self‑publishing a memoir.
  sports: A lifelong fan of the Cleveland Browns and the Cincinnati Reds, Daniel Madison participates in a local senior walking club that meets thrice weekly, plays occasional pickleball at the community
    center, and tends to their vegetable garden as a low‑impact form of exercise.
  arts: An avid patron of the regional arts scene, Daniel Madison frequents the Dayton Art Institute, enjoys live performances by the local jazz trio The Blue Note Collective, draws inspiration from abstract
    expressionists like Joan Mitchell and photographers such as Ansel Adams, and experiments with mixed‑media collages that blend found objects from Ohio farms.
  travel: A planner who prefers curated road trips, Daniel Madison has visited Marfa, Texas for its desert installations, explored Asheville, North Carolina’s craft breweries and art galleries, and dreams
    of a spring pilgrimage to New Orleans for its jazz heritage, always budgeting carefully to fund their artistic projects.
  culinary: A farm‑to‑table enthusiast, Daniel Madison regularly cooks roasted beet and goat‑cheese salad, slow‑cooked corn chowder, and grilled zucchini with fresh basil harvested from their garden, while
    occasionally treating themselves to a slice of Detroit‑style pizza from a weekend road‑trip stop.
  core: Daniel Madison is a methodical dreamer who schedules daily sketch sessions, hoards vintage train parts, and can recite phenomenology passages while pruning tomatoes, yet tends to procrastinate on
    filing taxes until the last moment.
background:
  cultural: Daniel's roots trace back to the Great Migration, when his grandparents moved from the Deep South to Ohio seeking industrial work and greater freedom. Growing up in Mansfield's close‑knit African‑American
    community, he was shaped by the traditions of the Black church, Sunday gospel choirs, and family storytelling that celebrated resilience and creativity. He actively participates in the local Black History
    Month events and the annual Juneteenth celebration, honoring the contributions of African‑American residents in Morrow County. His cultural identity blends Midwestern small‑town values with a strong
    sense of Black heritage, informing both his artistic voice and his dedication to mentoring the next generation.
attributes:
  skills: '[''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC maintenance'', ''Computer troubleshooting (Windows/Linux)'', ''Project planning and scheduling'', ''Woodworking'', ''Abstract painting'',
