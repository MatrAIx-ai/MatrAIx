  hobbies: '[''Abstract acrylic painting'', ''Mixed‑media collage'', ''Digital photography'', ''Reading philosophy'', ''Poetry writing'', ''Vegetable gardening'', ''Model train assembly'', ''Puzzle solving
    (crosswords, Sudoku)'', ''Listening to jazz'', ''Visiting local art galleries'']'
  career_goals: Though retired from full‑time employment, Daniel is driven to leave a lasting cultural imprint. He aspires to curate a traveling exhibition of his abstract paintings and photographs that
    reflects Midwestern Black experiences. He also aims to compile and self‑publish a collection of poems and memoir excerpts documenting his family's Great Migration story. Additionally, he plans to launch
    a small community workshop where he mentors local youth in woodworking and visual arts, fostering creative confidence in a supportive, small‑group setting.
