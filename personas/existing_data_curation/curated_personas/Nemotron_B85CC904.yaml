  hobbies: '[''Bridge club'', ''Trivia night'', ''Church choir'', ''Gardening'', ''Hiking local trails'', ''Cooking and potluck gatherings'', ''Reading mystery novels'', ''Quilting'', ''Volunteering at
    senior center'']'
  career_goals: Maria aims to transition from a home‑health aide to a supervisory role within her agency, obtain Certified Nursing Assistant (CNA) certification, and eventually pursue a bachelor's degree
    in nursing or health administration. She also hopes to launch a community support group for widowed seniors in Northampton County, offering peer counseling and resource navigation. In the long term,
    she envisions a part‑time consulting position where she can train home‑health agencies on best‑practice standards while preserving flexible hours for family and personal interests.
