persona_description: A self-taught paleontologist and archaeologist who has dedicated his life to the discovery and study of dinosaur fossils and Native American artifacts. Known for his extensive collection
  of fossils and artifacts, he has made significant contributions to the field of paleontology and archaeology. His passion for hunting dinosaur bones led him to important discoveries, including the partial
  skulls of the youngest-known Tyrannosaurus rex and the youngest-known triceratops. He has spent decades prospecting for bones in the badlands where bedrock is exposed and has accumulated one of the finest
  collections of Native American artifacts in Southern California. His prime fossilfinds are on display at the Natural History Museum of Los Angeles County, the University of California Museum of Paleontology
  in Berkeley, and the Museum of the Rockies in Bozeman, Mont. He has died at the age of 88.
