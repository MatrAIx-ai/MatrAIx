personas:
  professional: Lisa Balthazar, an aspiring junior architect, channels their love of building LEGO and magnetic tiles into meticulous, story‑driven designs, often sketching detailed blueprints of imaginary
    cities while narrating each structure’s purpose to their dolls.
  sports: Lisa Balthazar, a budding member of the Under‑5 soccer league, practices dribbling after school, loves watching the Riverdale Rams football games on weekends, and uses spontaneous pond turtle
    chases during park visits as a fun, informal cardio burst.
  arts: Lisa Balthazar, a vivid storyteller, fills sketchbooks with celestial animals and folklore‑inspired scenes while listening to gospel powerhouse Aretha Franklin and smooth R&B rhythms like those
    of Sade, often staging improvised puppet shows featuring their dolls as narrators.
  travel: Lisa Balthazar enjoys weekend family outings to the city’s children’s museum and the nearby lake, dreams of a future trip to the Kennedy Space Center to see rockets up close, and prefers carefully
    planned itineraries that balance beloved park pond explorations with brief, soothing breaks at familiar coffee‑shop play areas.
  culinary: Lisa Balthazar, an eager little chef, delights in assembling peanut‑butter‑jelly sandwiches cut into star shapes, stirring cheesy macaroni with a tiny wooden spoon, and crafting fruit kebabs
    with blueberries, strawberries, and banana slices, often insisting on arranging each bite by color like their crayons.
  core: Lisa Balthazar is a meticulous, imagination‑driven six‑year‑old who fills their world with colorful stories and structured play, yet quietly battles a habit of over‑worrying about tiny mishaps.
background:
  cultural: Lisa is an African American girl raised in Battle Creek, Michigan. Her family stays connected to the local Black community through church gatherings, holiday potlucks featuring soul food, and
    storytelling evenings where grandparents share African‑American folklore and family history. She participates in a community library program that highlights books by Black authors and enjoys the rhythmic
    sounds of gospel and R&B music that fill her home, which nurture her curiosity and love for art.
