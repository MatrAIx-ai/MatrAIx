  hobbies: '[''drawing'', ''storytelling'', ''LEGO building'', ''reading picture books'', ''listening to music'', ''nature exploration'', ''organizing crayons'']'
  career_goals: Lisa dreams of becoming an artist‑inventor who designs colorful picture books and toys that spark curiosity and promote harmony. She also envisions growing up to be a teacher or community
    storyteller who nurtures kindness, helps children express their feelings, and brings creative solutions to everyday challenges.
