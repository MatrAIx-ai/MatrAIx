personas:
  professional: Eula Stroman is a budding tech enthusiast who blends their love for coding with the discipline honed on the basketball court and marching band, and they consistently lead small programming
    projects in the school’s robotics club, documenting progress in a meticulous journal.
  sports: Eula Stroman plays point guard for the Eastside Middle School Wildcats basketball team, trains at the community gym three times a week, and they cheer on the Chicago Bulls and Wisconsin Badgers
    during the NBA and college basketball seasons, while also participating in a local hip‑hop dance crew that doubles as cardio.
  arts: Eula Stroman is a versatile performer who plays the trumpet in the school marching band, practices hip‑hop choreography after school, and they draw creative inspiration from sci‑fi authors like
    Ursula K. Le Guin and musicians such as Kendrick Lamar, often quoting lines from favorite biographies of influential leaders in their journal entries.
  travel: Eula Stroman dreams of exploring the National Parks, having already camped in the Great Smoky Mountains with a church youth group, and they plan low‑budget road trips to visit the Smithsonian
    Air and Space Museum in Washington, D.C., balancing school commitments with a desire for adventure and cultural immersion.
  culinary: Eula Stroman loves quick, protein‑rich meals, often whipping up chicken and quinoa bowls topped with avocado and fresh basil from the community garden, and they enjoy treating themselves to
    pepperoni pizza and bubble tea on weekends, while their cooking skill is at a confident intermediate level.
  core: Eula Stroman is an energetic, organized teen who channels curiosity into coding and community service, yet often battles worry, balancing ambition with a habit of late‑night journaling.
background:
  cultural: Eula is African American and was raised in High Point, North Carolina, where her family maintains close ties to the local Black community and a historically Baptist church. Her upbringing blends
    Southern hospitality with a strong sense of cultural pride, shaped by family traditions of soul food, gospel music, and storytelling that celebrate resilience and community solidarity. The region’s
    legacy of textile and furniture manufacturing, as well as local community centers, have fostered her appreciation for hard work and service. Eula’s cultural environment emphasizes education, mutual
    support, and active participation in community life.
