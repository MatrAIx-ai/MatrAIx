  career_goals: Eula aims to graduate high school with honors and pursue a career in nursing or public health, driven by her desire to help others and improve healthcare access in her community. She envisions
    combining her organizational strengths with her compassionate nature by working as a community health worker or health educator. Long‑term, she hopes to lead community outreach programs that address
    health disparities and promote wellness among youth in High Point.
