personas:
  professional: Tyrica Thomas, an aspiring junior game developer who crafts simple Scratch games and leads the school’s tech club, blends their love for structured teamwork with creative problem‑solving,
    ensuring every pixel follows the rules they set.
  sports: Tyrica Thomas, a forward on the Riverdale Rangers youth soccer team and a dedicated hip‑hop dancer at the local community studio, cheers for the LA Galaxy and never misses a Saturday practice,
    balancing structured training with spontaneous pick‑up games at the park.
  arts: Tyrica Thomas, an enthusiastic choir member, hip‑hop dancer, and sketch artist who idolizes Beyoncé’s performance energy and the whimsical style of Studio Ghibli, spends weekends building intricate
    LEGO models inspired by Frank Lloyd Wright’s architecture, and constantly hums the latest TikTok song while drawing.
  travel: Tyrica Thomas, a curious 11‑year‑old who prefers organized family trips, has explored the Grand Canyon and the Smithsonian National Air and Space Museum on school field trips, dreams of visiting
    Tokyo’s pop‑culture districts and Disneyland Paris, and always packs a sketchbook for on‑the‑go doodles.
  culinary: Tyrica Thomas, a self‑proclaimed pizza aficionado who loves pepperoni, prefers crunchy carrots over mushy peas, enjoys helping their parents bake chocolate chip brownies, and regularly trades
    snack‑bar wrappers for extra LEGO pieces.
  core: Tyrica Thomas, a structured yet spontaneous 11‑year‑old who channels boundless energy into group sports, coding, and community service while maintaining a calm, almost unflappable demeanor and a
    secret stash of LEGO bricks for midnight builds.
background:
  cultural: Tyrica is African American, raised in a close‑knit Black family in New Haven, Connecticut. Her grandparents migrated from the Southern United States, bringing traditions like soul‑food cooking,
    gospel music, and stories of the Civil Rights Movement. She regularly celebrates Juneteenth, participates in the New Haven African American Cultural Center’s events, and attends local church services
    where she engages in choir and youth activities. The vibrant mix of community resources, Yale’s cultural offerings, and neighborhood gatherings shape her appreciation for music, storytelling, and collective
    resilience.
