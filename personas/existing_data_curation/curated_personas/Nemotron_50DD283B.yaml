  career_goals: Tyrica dreams of becoming an elementary school teacher who can create a calm, structured, and supportive classroom where every child feels valued. She also hopes to work in community youth
    programs or a library, organizing after‑school activities that blend learning with fun. Her long‑term ambition includes helping other kids develop confidence and resilience, much like she does in her
    own life.
