persona_description: A teacher or educational researcher who is familiar with the cognitive processes involved in problem-solving, particularly in the context of mathematics. They are skilled at analyzing
  and designing instructional programs that cater to the unique needs of individual learners and groups. They are also adept at identifying and addressing the challenges associated with capacity limitations,
  such as the demands placed on capacity by new skills and the varying capacities of different individuals and groups. They are knowledgeable about the research literature on cognitive processes in problem-solving
  and use it to inform their teaching practices.
