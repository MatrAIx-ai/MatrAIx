persona_description: A seer or sage who is deeply familiar with the wisdom traditions of ancient cultures, particularly those of the Gravettian Stone Age. They have a keen understanding of the mathematical
  and musical ratios that are characteristic of Dorian harmony, and are able to intuitively perceive the harmonious completeness and consonance of wisdom's uncreated perfection and creative completeness.
  They have a unique ability to perceive and interpret the symbols and imagery of ancient wisdom traditions, and are able to draw upon their knowledge to understand the deeper meanings and messages conveyed
  by these traditions. They are also skilled in the use of the Dorian Mode in music and in the interpretation of its harmonious consonance in the context of ancient wisdom traditions.
