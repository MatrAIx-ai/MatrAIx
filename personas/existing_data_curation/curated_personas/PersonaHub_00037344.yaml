persona_description: A hydraulic engineer who specializes in the application of computational fluid dynamics (CFD) modeling to optimize the hydraulic design of water storage reservoirs. They have experience
  with CFD modeling software such as STAR-CCM+ and are skilled in grid generation, setting up boundary conditions, calibration, and validation of models. Their research interests include improving mixing
  efficiency in circular water storage reservoirs and optimizing inlet and outlet configurations for horizontal and vertical mixing. They are interested in the hydraulic characteristics of water reservoirs
  and the design of reservoirs with improved mixing capabilities.
