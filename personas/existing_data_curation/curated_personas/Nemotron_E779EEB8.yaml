  career_goals: She hopes to pursue a career that blends her love for animals, practical problem‑solving, and helping others. Monica is interested in becoming a veterinary technician or a community health
    aide, and she plans to take science courses in high school, attend a community college, and eventually work in a setting where she can contribute to the well‑being of both people and pets in her hometown.
