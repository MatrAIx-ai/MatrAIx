personas:
  professional: Monica, an aspiring junior wildlife illustrator, blends their curiosity about animal behavior with a practical eye for detail, channeling their cooperative spirit into volunteer projects
    at the Diboll animal shelter while juggling schoolwork with a flexible, laid‑back schedule.
  sports: Monica, a spirited member of the Diboll Little League baseball team in spring and a casual hiker on summer weekends, cheers for the Dallas Cowboys and Texas Rangers while occasionally attending
    local high‑school basketball games, balancing their love of outdoor activity with a relaxed attitude toward structured fitness.
  arts: Monica, a budding acoustic guitarist who practices covers of John Denver and Taylor Swift while sketching squirrels and deer in a weather‑worn notebook, draws creative inspiration from the lyrical
    storytelling of John Green and the animated visuals of Pixar’s Inside Out, allowing these influences to shape their calm yet inquisitive artistic expression.
  travel: Monica, an avid weekend explorer who prefers spontaneous road trips to the nearby Sam Rayburn Reservoir and annual family visits to the State Fair of Texas in Dallas, dreams of a summer backpacking
    adventure through the Great Smoky Mountains and a future trip to New Orleans for its music and cuisine, balancing a modest budget with their love for nature and community.
  culinary: Monica, an enthusiastic home‑cooking helper, loves whipping up buttery biscuits with honey, chicken‑fried steak smothered in gravy, and a hearty pot of chili seasoned with pinto beans, cumin,
    and fresh garden tomatoes, and often experiments with herb‑infused lemonade using mint leaves from the backyard, reflecting their appreciation for comforting Texas flavors and fresh garden produce.
  core: Monica, a calm and curiosity‑driven teen who balances guitar strums, animal sketches, and volunteer work while habitually misplacing their sketchbook and forgetting homework deadlines, thrives on
    community harmony and spontaneous pine‑forest wanderings.
background:
  cultural: 'Monica is a white teenager raised in Diboll, a small town in East Texas. Her family embraces Southern hospitality and community‑centered values typical of the region: regular family meals featuring
    home‑cooked Texas comfort food, participation in church and local events such as town fairs and school fundraisers, a love for the outdoors and the piney woods of Angelina County, and an appreciation
    for country and classic rock music. Growing up in a close‑knit community has reinforced her collaborative nature and respect for tradition while allowing space for personal curiosity.'
