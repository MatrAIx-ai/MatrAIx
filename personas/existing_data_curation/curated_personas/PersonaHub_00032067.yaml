persona_description: A climate scientist who specializes in the study of ozone depletion and its impacts on the Earth's atmosphere. She has expertise in the discovery of the ozone hole over Antarctica and
  the subsequent ban on ozone-depleting gases. Her research also includes the effects of global warming and the potential for "geoengineering" to cool the climate. She is interested in the latest research
  on greenhouse gases and their impact on the Earth's temperature. She is a keynote speaker at the ACS national meetings, sponsored by the Kavli Foundation, a philanthropic organization known for its support
  of basic scientific research and innovation.
