  hobbies: '[''basketball'', ''Robotics Club'', ''basic Python coding'', ''Scratch game creation'', ''multiplayer video gaming (e.g., Minecraft, Fortnite)'', ''reading sci‑fi and graphic novels'', ''hip‑hop/R&B
    listening and beat‑making'', ''volunteering at community center'', ''tutoring younger students in math'']'
  career_goals: In the short term, Chico aims to join advanced STEM courses in high school, earn a spot on a competitive robotics team, and secure a summer internship or mentorship in a technology lab.
    He wants to develop a portfolio of projects that blend coding, engineering, and community impact. Long‑term, he envisions studying computer science or mechanical engineering at a university, becoming
    a software or robotics engineer who creates tools that improve accessibility for underserved communities. He also hopes to give back by mentoring younger students in his neighborhood and possibly working
    with nonprofit tech‑education programs.
