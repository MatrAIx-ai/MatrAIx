personas:
  professional: Shinetta Young, a veteran municipal management analyst, leverages four decades of data-driven expertise in Excel, Access, and Power BI to construct clear dashboards and streamline workflows,
    while her methodical, structured mindset and compassionate assertiveness enable her to mentor junior staff and mediate stakeholder meetings with calm authority.
  sports: Shinetta Young participates in the Newark Senior Walking Club, favors gentle activities such as daily balcony strolls and weekly yoga, and remains a devoted fan of the New Jersey Devils, the New
    York Giants, and the New York Yankees, often watching games with a carefully timed schedule that fits her routine.
  arts: Shinetta Young finds solace in the smooth sounds of classic soul and jazz legends like Aretha Franklin, Sam Cooke, Miles Davis, and Nina Simone while knitting, regularly attends intimate performances
    at Newark's Jazz House, and visits the Newark Museum's art exhibitions to deepen her appreciation for cultural heritage.
  travel: Shinetta Young prefers meticulously planned journeys with small-group tours, has already explored the historic streets of Washington, D.C., and the vibrant jazz scene of New Orleans, and dreams
    of a relaxed autumn visit to Savannah, Georgia, followed by a cultural pilgrimage to London’s civil-rights museums.
  culinary: Shinetta Young skillfully prepares Southern comfort staples such as fried catfish with hush-puppies, collard greens simmered with smoked turkey, and sweet-potato pie spiced with nutmeg and cinnamon,
    often incorporating fresh tomatoes, basil, and peppers harvested from her balcony garden into these dishes.
  core: Shinetta Young is a methodical, garden-tending analyst who balances precise data work with soulful jazz and meticulous budgeting, yet wrestles with lingering anxiety that sometimes drives hyper-organization
    and occasional over-cautiousness.
background:
  cultural: Shinetta was born and raised in Newark's South Ward, a neighborhood shaped by the Great Migration and vibrant African-American traditions. Her parents, both first-generation migrants from the
    rural South, instilled a strong work ethic, a reverence for church, and a deep sense of community responsibility. Growing up during the civil-rights era, she participated in local voter-registration
    drives and attended gospel choirs that celebrated resilience and hope. Newark's rich tapestry of soul food, jazz clubs, and Black cultural festivals influenced her palate and musical tastes. Although
    she completed only a high-school diploma, her family's emphasis on practical knowledge and lifelong learning motivated her to pursue professional development through community-college courses and on-the-job
    training. Her identity as a Black widow in Newark informs her advocacy for senior welfare, intergenerational mentorship, and the preservation of the city's African-American heritage.
attributes:
  skills: '[''Data analysis'', ''Quantitative reporting'', ''Process improvement'', ''Cost-benefit analysis'', ''Risk assessment'', ''Report writing'', ''Stakeholder facilitation'', ''Project management'',
    ''Mentoring junior staff'']'
  hobbies: '[''Knitting'', ''Listening to soul and jazz music'', ''Crossword puzzles'', ''Sudoku'', ''Urban gardening'', ''Reading historical nonfiction'', ''Small-group book clubs'', ''Museum visits'',
    ''Church outreach cooking'']'
  career_goals: Approaching the final phase of a distinguished career, Shinetta aims to institutionalize her knowledge by creating a mentorship pipeline for emerging Black professionals in local government.
    She plans to author a concise guide on practical management analysis for public-sector beginners, emphasizing structured problem-solving and ethical decision-making. Internally, she hopes to champion
    a mental-health awareness program that provides structured support for employees experiencing anxiety or distress, leveraging her own experience to shape compassionate policies. Outside of work, she
    aspires to volunteer as an analytical consultant for community-based non-profits that focus on senior services in Newark, ensuring that limited resources are allocated efficiently to maximize impact.
