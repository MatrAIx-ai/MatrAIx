  hobbies: '[''gardening'', ''vegetable gardening'', ''quilting'', ''weekly walks along Fox River trail'', ''bridge (card game)'', ''potluck gatherings'', ''volunteering at senior center'', ''church outreach'',
    ''attending high school football games'', ''listening to classic country music'']'
  career_goals: Entering the final years of her career, Linda aims to earn a Master Plumber certification, formalize a mentorship program for apprentices, and eventually transition to a part‑time supervisory
    role that allows her to pass on her knowledge while maintaining a steady routine. She also hopes to launch a modest family‑run plumbing service that emphasizes dependable, community‑focused service,
    and to volunteer her expertise on historic preservation projects and safety workshops for younger tradespeople in the Elgin area.
