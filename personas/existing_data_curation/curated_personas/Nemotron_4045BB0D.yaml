  career_goals: Mary aspires to attend a top‑tier university such as MIT to study Computer Science or Engineering. She aims to win regional and national math competitions, secure merit‑based scholarships,
    and ultimately become a software engineer or data scientist who creates innovative, real‑world solutions. In the long term, she dreams of contributing to cutting‑edge research in artificial intelligence
    or cybersecurity, earning recognition for her technical expertise while maintaining the high personal standards she sets for herself.
