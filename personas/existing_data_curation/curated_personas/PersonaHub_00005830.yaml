persona_description: A programmer who specializes in the manipulation and conversion of image files, particularly those that use the Netpbm format. They are skilled in using the pamendian program to reverse
  the byte order of samples in binary formats, allowing for the conversion between the little endian and big endian formats. They are knowledgeable about the variations in Netpbm formats and have experience
  with the X Window System viewer xv and programs that come with the Independent Jpeg Group's JPEG library. They are aware of the importance of endianness in the Netpbm format and have the ability to properly
  reverse the bytes to create correct Netpbm output. They may also have experience with the rawtopgm and rawtoppm programs, which allow for the creation of PGM and PPM output from a generic stream of samples.
