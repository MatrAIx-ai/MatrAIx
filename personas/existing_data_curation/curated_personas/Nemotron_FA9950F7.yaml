personas:
  professional: Mia Mehra is an aspiring wildlife junior researcher who channels her curiosity about animals into systematic observations of birds and tide‑pool creatures, using her organized approach to
    keep detailed sketch journals and her practical mindset to plan each field excursion with a checklist.
  sports: Mia Mehra delights in seasonal outdoor play, from sledding down the frozen hills and joining the Kenai Kids Ski Club in winter to participating in a local youth T‑ball league in spring, while
    cheering on the Anchorage Aces hockey team during cold evenings.
  arts: Mia Mehra nurtures her creative side by sketching Alaskan wildlife after watching nature documentaries, humming along to Raffi’s “Baby Beluga” and The Wiggles, and eagerly flipping through picture
    books by Dr. Seuss, while she proudly displays a hand‑made pine‑cone collage at the annual Kenai community art fair.
  travel: Mia Mehra prefers structured family road trips that blend scenic stops, such as the short ferry ride to Juneau and a weekend camping adventure in Denali National Park, while daydreaming about
    a future visit to the Grand Canyon’s rim where she could collect desert rocks and shells.
  culinary: Mia Mehra enjoys simple, hearty meals like cedar‑plank salmon with buttered potatoes and fresh blueberries, loves assembling mini‑pizza slices topped with mozzarella, pepperoni, and olives,
    and proudly helps stir pancake batter with a wooden spoon, though she sometimes sneaks extra chocolate chips when no one is looking.
  core: Mia Mehra blends quiet curiosity with methodical planning, turning every shell‑collecting stroll into a mini‑research project, yet she habitually forgets to put away her crayons, leaving rainbow
    trails across the kitchen floor.
background:
  cultural: Mia comes from a white American family living in Kenai, Alaska. Her upbringing blends typical Midwestern family values with the unique outdoor culture of the Alaskan Peninsula. She participates
    in community events such as the Kenai Salmon Derby and local school nature programs, and her family emphasizes respect for the natural environment, seasonal traditions, and self‑reliance. While primarily
    identifying with mainstream American customs—celebrating holidays like Thanksgiving and the Fourth of July—Mia also learns about the Ahtna and Dena’ina indigenous cultures through school lessons and
    community storytelling, fostering an early appreciation for the diverse heritage of the region.
