  hobbies: '[''Reading picture books and early chapter stories'', ''Drawing animals and landscapes'', ''Building with LEGO and wooden blocks'', ''Collecting shells and pinecones'', ''Observing birds and
    wildlife at local parks'', ''Playing simple board games with a small group of friends'', ''Using educational tablet apps for science'', ''Helping with small household chores'']'
  career_goals: Although still young, Mia envisions a future in which she can combine her love of nature, curiosity, and practical problem‑solving. She dreams of becoming a wildlife biologist or marine
    researcher who studies Alaskan ecosystems, and also imagines helping others as a teacher or community mentor. She aspires to create projects that protect the environment, such as a school recycling
    initiative, and hopes to continue learning and exploring the natural world throughout her life.
