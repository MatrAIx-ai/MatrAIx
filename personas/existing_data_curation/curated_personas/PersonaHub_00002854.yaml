persona_description: A development professional with expertise in climate change and disaster risk reduction, particularly in the context of Uganda. This individual has experience working with local partners
  and networks to strengthen community resilience to climate-related hazards. They are skilled in implementing Integrated Risk Management (IRM) approaches and have a proven track record of supporting the
  development and implementation of policies, plans, and programmes. They have experience working on projects that aim to increase community resilience by improving capacity and coordination mechanisms
  amongst community structures, state and non-state actors, and harnessing efforts to diversify livelihood options. Additionally, they have experience working on projects that aim to increase community
  resilience by enhancing leadership capacities of women and youth. They have experience working on projects that aim to increase community resilience by increasing the communities resilience and reducing
  disaster risks through ecosystem-based solutions.
