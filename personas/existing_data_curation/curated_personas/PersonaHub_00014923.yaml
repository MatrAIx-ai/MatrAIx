persona_description: A historian who specializes in the study of African American history and specifically the development of Afro-Creole culture in the eighteenth century. She is known for her work on
  the history of Africans transported from the African continent to the Gulf Coast and her argument that Africans transported from the African continent to the Gulf Coast founded an Afro-creole culture,
  one deeply rooted in Senegambian lifeways, lifeways that significantly influenced the Gulf Coast culture that would develop over time. Her work was influenced by the stigma and critical conundrum surrounding
  the connections between Africans and the Gulf Coast culture, and she addressed the question of race, racialization, and commodification in her code.
