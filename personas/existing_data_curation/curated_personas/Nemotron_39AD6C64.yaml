personas:
  professional: Layah Falcon, a meticulous youth‑services librarian‑in‑training, blends expertise in MARC21 cataloging, digital repository design, and information‑literacy instruction with a quiet, curiosity‑driven
    approach that balances structured planning and flexible problem‑solving for underserved patrons.
  sports: Layah Falcon, who claims early‑morning hikes at Ruffner Mountain and participates in the Birmingham Trailblazers hiking club, follows the Alabama Crimson Tide football team and the Birmingham
    Barons baseball club, and practices gentle yoga a few evenings a week as her primary fitness routine.
  arts: Layah Falcon, an avid watercolor painter who draws inspiration from the soft palettes of Claude Monet, devotes evenings to reading works by contemporary authors such as Yaa Gyasi and listening to
    Joni Mitchell and folk‑blues playlists while regularly attending performances at the Alabama Shakespeare Festival.
  travel: Layah Falcon, who plans low‑key, research‑focused trips and prefers quiet boutique hotels over crowded resorts, has explored historic Southern towns like Savannah and Charleston, trekked the Appalachian
    trails near Asheville, and dreams of a genealogy‑focused pilgrimage to Edinburgh, Scotland.
  culinary: Layah Falcon, a confident home cook who perfects Southern comfort dishes such as buttermilk biscuits, shrimp and grits, and roasted collard greens with smoked paprika, experiments with fresh
    herbs like thyme and rosemary, and often incorporates vibrant beet‑goat‑cheese salads into her weekly menu.
  core: Layah Falcon channels a quiet, curiosity‑driven intellect into solitary pursuits, balancing meticulous organization with a tendency to overthink, while their love of nature, books, and gentle creativity
    fuels a steady, if sometimes anxious, pursuit of personal and professional growth.
background:
  cultural: Layah was raised in Birmingham's historic African American neighborhoods, where the legacy of the Civil Rights Movement is woven into daily life. Family gatherings often featured gospel music,
    storytelling, and Southern cooking, fostering a deep appreciation for communal resilience and oral history. Frequent visits to the Birmingham Civil Rights Institute and local Black museums nurtured
    her interest in preserving cultural narratives. While she values community, her introverted nature leads her to seek quiet spaces, such as the public library, where she feels a sense of belonging. Her
    cultural identity informs her commitment to curating inclusive collections, supporting Black youth, and honoring the rich tapestry of Southern Black traditions.
attributes:
  skills: '[''Cataloging and metadata creation (MARC21, RDA)'', ''Reference services and research support'', ''Information literacy instruction and workshop facilitation'', ''Collection development with
    focus on African American literature'', ''Integrated library system (ILS) management (e.g., Alma, SirsiDynix)'', ''Digital archiving and digitization processes'', ''Basic HTML/CSS and website content
    management'', ''Data organization and Excel analysis'', ''Quiet-space design and noise-control strategies'', ''Empathetic communication and conflict de-escalation'', ''Time management and stress mitigation
    techniques'']'
  hobbies: '[''Reading contemporary African American literature'', ''Reflective journaling'', ''Nature walking and birdwatching at Ruffner Mountain'', ''Landscape and historic architecture photography'',
    ''Watercolor painting'', ''Mindfulness meditation'', ''Cooking Southern comfort dishes'', ''Genealogy research and local history exploration'']'
  career_goals: She aims to complete a Master of Library and Information Science within the next two years, positioning herself for a youth-services librarian role in a Birmingham community center. Layah
    envisions leading a digital repository that documents the city's Black history and creating inclusive outreach programs that encourage underserved students to engage with library resources. She aspires
    to become a recognized advocate for mental-health-aware library spaces, integrating mindfulness practices into library programming. Long-term, she hopes to advance into a supervisory position where
    she can mentor new staff, shape collection policies, and champion equitable access to information across the region.
