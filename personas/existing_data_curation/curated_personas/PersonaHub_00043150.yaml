persona_description: A professional highway engineer who specializes in pavement performance, particularly in the areas of asphalt binder formulation, manufacture, and durability. They are experienced in
  assessing and addressing issues related to premature failures of newly constructed pavements, including low- and intermediate-temperature cracking, raveling, aggregate loss, and total surface course loss.
  They have a keen interest in researching and proposing changes to current performance-graded asphalt binder specifications, tests, and practices to improve pavement performance and reduce premature failures.
