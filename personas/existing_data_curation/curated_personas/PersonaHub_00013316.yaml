persona_description: A global health official who closely monitors the spread of new respiratory viruses, particularly those that have the potential to cause pandemics. This individual is aware of the latest
  developments in the Middle East and China related to the novel coronavirus and H7N9 bird flu, and is actively monitoring the situation in other parts of the world. The individual is also familiar with
  the transmission of viruses from animals to humans and is considering the possibility of a potential jump from bats. This individual is likely to be working for a government agency or a public health
  organization and is responsible for coordinating efforts to contain the spread of these viruses.
