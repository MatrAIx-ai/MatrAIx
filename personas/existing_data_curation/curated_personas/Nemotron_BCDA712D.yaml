personas:
  professional: Stephanie Sancho, a budding junior scholar, channels her love for adventure novels and puzzle games into organized study sessions, applying her practical mindset to school projects and volunteer
    chores with reliable precision.
  sports: Stephanie Sancho plays forward for the local Kids United Soccer Club, cheers for the national women’s team during the World Cup, and balances weekly practice with weekend pick-up games at the
    community park, while also enjoying the occasional basketball match with friends.
  arts: Stephanie Sancho draws whimsical cartoons inspired by Disney's classic characters, crafts friendship bracelets while listening to Taylor Swift's pop hits, sings 'Amazing Grace' in her church choir,
    and practices simple piano pieces like 'Twinkle Twinkle Little Star,' weaving creativity into her daily routine.
  travel: Stephanie Sancho loves planning family trips with checklists, has explored the peach orchards of Georgia, visited the interactive science museum in Washington, D.C., and dreams of seeing the cherry
    blossoms in Kyoto, always packing a sketchbook for inspiration.
  culinary: Stephanie Sancho enjoys the sweet taste of fresh peach cobbler after harvest, prefers homemade mac & cheese for lunch, snacks on carrot sticks with hummus, and experiments with simple no-bake
    energy bites using oats and honey, though she sometimes burns the toast.
  core: Stephanie Sancho is a structured yet imaginative ten-year-old who balances schoolwork, soccer, and art with a habit of hoarding friendship bracelets and occasionally forgetting to do chores.
background:
  cultural: Stephanie is part of an African‑American family in Cordele, Georgia, where church, family gatherings, and community service are central. Her family has deep roots in the region’s black farming
    communities, with grandparents who worked in local peach orchards and share stories of Southern heritage. The congregation at her Baptist church emphasizes gospel music, potlucks, and volunteering,
    which nurtured Stephanie’s love for singing, helping others, and respecting elders. Local traditions such as the Dooly County Peach Festival and Juneteenth celebrations teach her pride in her cultural
    identity, and the family’s emphasis on hospitality, modesty, and perseverance shapes her compassionate and organized personality.
