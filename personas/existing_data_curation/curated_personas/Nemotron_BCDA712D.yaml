  career_goals: Stephanie dreams of becoming a teacher or a pediatric nurse so she can help children learn and stay healthy. She also hopes to start an after‑school tutoring club in her neighborhood when
    she is older, providing a safe space for peers to get help with homework and learn teamwork. Her long‑term ambition is to give back to her community and make sure every child feels supported and valued.
