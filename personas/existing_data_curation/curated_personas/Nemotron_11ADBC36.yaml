  career_goals: Gladys dreams of a future where she can continue to help people in a practical, hands-on way. She is fascinated by the idea of becoming a teacher or a nurse, inspired by their roles in guiding
    and caring for others. She also imagines herself as a community organizer who creates safe, orderly spaces for children to learn and play. Her immediate goal is to earn top grades, become class "helper"
    or "monitor," and eventually volunteer at local health fairs or school tutoring programs.
