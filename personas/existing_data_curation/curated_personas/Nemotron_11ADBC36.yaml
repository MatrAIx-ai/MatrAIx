personas:
  professional: Gladys Rives, a meticulous third‑grader, channels their love of order into running the school's after‑school reading club schedule, meticulously cataloguing each mystery title and ensuring
    meetings start precisely on time, and they proudly display a color‑coded timetable on the bulletin board.
  sports: Gladys Rives plays on the local youth soccer team, the Riverdale Cubs, practicing drills every Tuesday and Thursday, eagerly follows the women's national soccer league, and they spend summer weekends
    at the community swimming pool perfecting their freestyle strokes while adhering to a strict warm‑up routine.
  arts: Gladys Rives spends afternoons drawing intricate illustrations of fantasy castles inspired by Hayao Miyazaki and Beatrix Potter, practices beginner piano pieces by Ludwig van Beethoven and Yiruma,
    and they organize their art supplies in color‑coded trays, proudly displaying a sticker collection of famous painters like Vincent van Gogh.
  travel: Gladys Rives prefers family trips with a detailed itinerary, having explored the nearby botanical garden on a guided tour, visited the National Museum of Natural History in Washington, D.C., and
    they dream of attending a summer camp at the seaside town of Newport while insisting on packing their herb‑pot collection for each journey.
  culinary: Gladys Rives enjoys making herb‑infused butter using basil and thyme from their potted garden, whipping up simple spaghetti aglio e olio with fresh parsley, and they bake chocolate chip pancakes
    on weekend mornings, though they often forget to set a timer and end up slightly overcooking the pancakes.
  core: Gladys Rives is an eight‑year‑old with a disciplined love for routine, who blends meticulous organization with quiet creativity, and they thrive in structured play, careful saving, and thoughtful
    caregiving.
background:
  cultural: Gladys is an African-American child raised in Redwood City, California. Her family celebrates cultural traditions such as Juneteenth, Kwanzaa, and local community events that emphasize togetherness
    and historical awareness. She attends a culturally diverse public elementary school where she learns about African-American history alongside a broad curriculum. Her upbringing blends the values of
    Black heritage—respect for elders, community solidarity, and storytelling—with the progressive, inclusive environment of the Bay Area, fostering a strong sense of identity and belonging.
