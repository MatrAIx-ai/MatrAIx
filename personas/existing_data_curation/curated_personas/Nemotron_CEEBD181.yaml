  career_goals: Wendy aims to leverage her practical experience and love for culture to advance into a supervisory position within the next few years, focusing on guest experience design and staff mentorship.
    She plans to pursue a hospitality management certification while maintaining flexibility to explore creative projects. Ultimately, she hopes to open a small community‑focused café or pop‑up space that
    showcases local artists, serves sustainably sourced dishes, and provides a welcoming venue for dialogue and learning. She also envisions using her writing skills to contribute to food and culture blogs.
