personas:
  professional: Wendy Miller, a 25-year-old front-of-house specialist in Charlotte's bustling restaurant scene, mixes curiosity with practicality to craft guest experiences—leveraging sharp communication,
    POS fluency, and an instinct for storytelling while wrestling with occasional disorganization and deadline avoidance as they pursue a supervisory role and hospitality management certification.
  sports: Wendy Miller stays fit through sunrise yoga at Charlotte Flow studio, rallies behind the Charlotte Hornets in basketball season and the Carolina Panthers in football, and joins weekend beach-volleyball
    pick-ups on the Carolina coast, blending casual fitness with a love for local team spirit.
  arts: Wendy Miller dives into Charlotte's vibrant arts scene by attending gallery openings featuring artists like Kehinde Wiley, catching live sets from Leon Bridges, and channeling contemporary fiction
    by Sally Rooney into sketchy urban notebooks, weaving cultural observation into their creative expression.
  travel: Wendy Miller favors spur-of-the-moment weekend trips to historic towns such as Asheville and Savannah, dreams of a Mediterranean vacation in Barcelona, and balances minimal planning with a tight
    travel budget by couch-surfing and snapping up discount train tickets.
  culinary: Wendy Miller, an adventurous home cook, twists Southern classics—like collard greens flavored with kimchi—into global dishes, perfects miso-glazed shrimp and grits using heirloom tomatoes and
    smoked paprika, and revels in baking a fragrant peach cobbler infused with fresh basil.
  core: Wendy Miller is a curiosity-driven hospitality pro who swaps structured schedules for spontaneous art crawls, habitually forgets to file taxes on time, and can be found sketching coffee-stained
    pages while planning their next impromptu weekend getaway.
background:
  cultural: Wendy grew up in the Piedmont region of South Carolina, a suburb of Charlotte, where a blend of traditional Southern hospitality and an increasingly diverse, urban culture shaped her outlook.
    Family gatherings often centered around shared meals, storytelling, and community involvement, instilling an appreciation for both heritage recipes and the value of inclusive gatherings. Exposure to
    Charlotte’s vibrant arts and culinary scenes broadened her interests, leading her to study humanities and develop a curiosity for different cultural narratives. Her background encompasses the moderate
    pace of small‑town life, a respect for local history, and an open‑minded embrace of new ideas—a balance that mirrors her personality.
