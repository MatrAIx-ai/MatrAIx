  career_goals: Kelly aims to become a leader in integrative health services within a major health system, directing programs that blend conventional medicine with creative therapeutic modalities. She aspires
    to develop a digital health platform that leverages AI to provide personalized, art‑informed mental health interventions. Over the next five years, she plans to publish research on art's impact on patient
    outcomes, secure grant funding for interdisciplinary projects, and become a sought‑after speaker at national conferences. Ultimately, she envisions a balanced career that allows flexibility for family
    life while advancing innovative patient‑centred care.
