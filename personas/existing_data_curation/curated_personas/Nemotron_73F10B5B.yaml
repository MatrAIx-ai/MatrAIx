  career_goals: Daniel aims to achieve master pipefitter certification within the next three years and eventually lead a specialized crew on large‑scale industrial projects. He envisions launching his own
    sustainable plumbing and steamfitting company that integrates smart sensors and energy‑efficient technologies into retrofits for legacy facilities. Concurrently, he plans to pursue a master’s degree
    in Mechanical Engineering to deepen his research into advanced pipe materials and low‑emission steam systems, positioning himself as a consultant for green‑building initiatives across the Midwest.
