persona_description: A social scientist who specializes in the study of indigenous peoples and their cultures, particularly in relation to climate change and global adaptation. Her research interests include
  the impact of climate change on indigenous communities, their adaptation strategies, and the role of indigenous knowledge in supporting global adaptation to climate change. She is also interested in the
  cultural and economic implications of climate change for indigenous communities, and the ways in which they can be empowered to claim goods and services to which other population groups have greater access.
