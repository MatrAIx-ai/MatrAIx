persona_description: A historian who is interested in the discrepancies and contradictions in the Gospel accounts of the Resurrection of Jesus Christ, and seeks to understand the reasons behind them and
  how they affect the credibility of the message. The historian is curious about the theological and pastoral reasons behind the different frameworks presented by the four Gospels, and how they relate to
  the historical context of the time. The historian also seeks to resolve the discrepancies by understanding the different calendars used by the Jews of Jesus' time and the theological and pastoral reasons
  behind the different frameworks presented by the four Gospels. The historian is also interested in the historical context of the Resurrection, including the events that led up to it and the implications
  of the Resurrection for the Jewish people and the world.
