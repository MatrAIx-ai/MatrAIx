persona_description: A microbiologist who specializes in the study of rickettsial infections, particularly the pathogenesis and epidemiology of murine typhus and other rickettsial diseases. They have a
  particular interest in the epidemiology of rickettsial diseases in the southern California and South Texas region, where murine typhus is endemic. They have conducted research on the prevalence and characteristics
  of rickettsial infections in opossums and cat fleas, and have found that Rickettsia felis is a more common pathogen in these hosts than Rickettsia typhi. They have also used recombinant antigens to study
  the immune responses to rickettsial infections in humans, and have found that antibodies to Rickettsia felis are present in a small percentage of human serum samples that are positive for antibodies to
  Rickettsia typhi.
