personas:
  professional: Raider Mcclure, a retired handyman turned community mentor, leverages decades of woodworking, small‑engine repair, and automotive know‑how to lead DIY home‑repair workshops at the senior
    center while orchestrating a “Fix‑It Club” that mixes friendly competition with hands‑on learning.
  sports: Raider Mcclure competes in the local senior pickleball league at the Pocatello Pickleball Club, cheers for the Boise State Broncos football team, follows the Idaho Vandals basketball season, and
    enjoys watching the Idaho Falls Chukars minor‑league baseball games on weekends.
  arts: Raider Mcclure participates in community theater productions with the Pioneer Theatre, captures his projects in digital photographs inspired by Ansel Adams, and relaxes listening to classic folk
    legends like John Denver and Bob Dylan while sipping tea.
  travel: Raider Mcclure favors road trips to regional classic‑car shows such as the Portland Rose Festival and the Goodwood Festival of Speed in the UK, dreams of attending the Stuttgart Classic Car Expo,
    and enjoys occasional hikes in Idaho’s foothills and camping at Yellowstone National Park.
  culinary: Raider Mcclure prefers hearty Idaho fare, often cooking grilled trout with sage butter, baked potatoes topped with sour cream and cheddar, and homemade apple pie, while experimenting with rustic
    wood‑smoked venison using sagebrush‑infused rubs.
  core: Raider Mcclure, a 76‑year‑old retired handyman with a competitive edge, blends curiosity and practicality into woodworking, car tinkering, and community mentorship, all while occasionally misplacing
    their reading glasses and forgetting a bill payment.
background:
  cultural: Raider Wright McClure grew up in a modest, working‑class family in the interior West of the United States, attending a local high school in the early 1950s. The cultural climate of mid‑century
    Idaho emphasized self‑reliance, practical problem‑solving, and tight‑knit community ties. He internalized the region’s frontier pragmatism and the value placed on hands‑on work, while also participating
    in the growing suburban life of Meridian. His upbringing was shaped by a Protestant church community that reinforced a sense of duty to neighbors and a respect for tradition. These influences, combined
    with his lifelong exposure to the agricultural and small‑town ethos of Idaho, give him a cultural identity rooted in independence, modesty, and a strong community spirit.
