persona_description: A Soliga elder who has a deep understanding of the cultural and ecological mosaic of the BRTWS sanctuary. They are knowledgeable about the traditional ways of hunting, burning, and
  forest product collection practices, as well as the threats to the local biodiversity. They have a unique perspective on the preservation of the area, as they see their actions as an age-old tradition
  that supports local biodiversity values. They are committed to the conservation of the forest ecosystem and the maintenance of their traditional knowledge on the maintenance of their surroundings and
  sacred natural sites. They are interested in using oral histories and spatial visualization of Soliga cultural geography to inform BRTWS managers and provide context for better governance.
