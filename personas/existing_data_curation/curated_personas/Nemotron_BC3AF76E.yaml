personas:
  professional: Luanne Brown, an 11‑year‑old aspiring engineer, channels their methodical curiosity into building LEGO Technic models, coding Scratch games, and mastering chess puzzles, balancing a competitive
    drive with an organized, solitary work style.
  sports: Luanne Brown, an 11‑year‑old who channels their competitive nature into swimming laps with the East Bay Sharks youth swim club during summer and jogging solo through the local park in winter,
    avoids team ball sports, and quietly cheers for the San Francisco Giants as their favorite baseball franchise.
  arts: Luanne Brown, an 11‑year‑old nature sketcher, spends afternoons listening to the piano compositions of Ludovico Einaudi while drawing detailed watercolors of Delta waterways, draws inspiration from
    the animated works of Studio Ghibli, and sees art as a quiet extension of their scientific curiosity.
  travel: Luanne Brown, an 11‑year‑old who meticulously plans weekend trips to science‑focused sites like the Monterey Bay Aquarium and the Exploratorium, dreams of exploring the Natural History Museum
    in London, balances a cautious budget with a thirst for discovery, and prefers itineraries that allow solitary observation over crowded tours.
  culinary: Luanne Brown, an 11‑year‑old who prefers reliable meals such as grilled cheese paired with tomato soup for lunch, enjoys assembling snack plates of carrot sticks, hummus, and sushi rolls, and
    occasionally bakes lemon‑blueberry muffins using a kid‑friendly recipe, viewing cooking as another methodical puzzle.
  core: Luanne Brown, an 11‑year‑old solitary genius who blends scientific curiosity with a meticulous, slightly anxious mindset, turning puzzles and code into quiet adventures while constantly worrying
    about perfecting the next project.
background:
  cultural: Luanne is a white, middle‑class American raised in Pittsburg, California, a suburban community in Contra Costa County near the San Francisco Bay Area. Her family places a strong emphasis on
    education, self‑reliance, and community involvement, reflecting mainstream US cultural values. Growing up in a region known for its tech industry, she is exposed to a culture that celebrates innovation
    and STEM learning, while also experiencing the Bay Area’s cultural diversity through school programs and community events. She participates in traditional American holidays such as Thanksgiving, Halloween,
    and the Fourth of July, and she is familiar with local customs such that attending library story hours and regional nature walks along the Delta. This blend of suburban American upbringing with proximity
    to a vibrant, tech‑focused environment shapes her outlook and opportunities.
