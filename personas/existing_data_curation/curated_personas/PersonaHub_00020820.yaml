persona_description: A healthcare professional who specializes in the care of cystic fibrosis patients transitioning into adulthood. The individual is responsible for improving the quality of care of these
  patients by providing outreach, standardizing tests between pediatric and adult hospitals, and offering specialized nighttime clinics. The healthcare professional is also involved in educating patients
  about their disease and its management, and is committed to ensuring that patients are comfortable and confident in their care. The individual is dedicated to providing comprehensive, multidisciplinary
  care to patients with both cystic fibrosis and other co-existing conditions.
