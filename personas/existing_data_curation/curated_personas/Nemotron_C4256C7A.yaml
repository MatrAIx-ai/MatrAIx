personas:
  professional: An organized freelance illustrator and graphic designer, Mariadolores Hughs channels her love for abstract composition into client work, leverages Adobe Photoshop, Illustrator, and InDesign
    to create polished digital art, and meticulously plans studio workshops while maintaining a competitive eye on gallery representation and online sales.
  sports: A low‑key fitness enthusiast, Mariadolores Hughs supports the Iowa Hawkeyes football team, runs with the Des Moines Road Runners club on weekend mornings, and participates in a monthly yoga class
    at a local studio, balancing solitary exercise with occasional friendly competition in the community's amateur basketball league.
  arts: A passionate abstract art aficionado, Mariadolores Hughs draws inspiration from Kandinsky, explores the conceptual works of James Turrell, reads speculative fiction by N.K. Jemisin and philosophy
    by Simone de Beauvoir, and attends gallery openings featuring regional artists like Sarah Merrick, while also curating a personal poetry journal that blends visual and literary experiments.
  travel: A curated‑traveler, Mariadolores Hughs has explored the vibrant murals of Santa Fe, the historic cafés of Barcelona, and the food markets of Oaxaca for farm‑to‑table inspiration, prefers meticulously
    planned itineraries that blend art workshops with local culinary tours, and dreams of a solo retreat at the Japanese ryokan in Kyoto to study tea ceremony aesthetics.
  culinary: A farm‑to‑table experimenter, Mariadolores Hughs delights in crafting herb‑infused quinoa salads with rosemary, thyme, and lavender from her garden, perfects a rustic roasted carrot and beetroot
    medley with a miso glaze, and often improvises garnish with fresh basil and chives, though she sometimes forgets to set timers, leading to occasional burnt edges.
  core: A methodical yet imaginative lifelong creator, Mariadolores Hughs balances competitive ambition with solitary sketching, meticulous budgeting, and a habit of stashing receipt‑filled jars in the
    studio for later review.
background:
  cultural: Mariadolores was raised in a modest Midwestern setting, with family roots tracing back to German and Irish immigrants who settled in Iowa generations ago. The cultural values of the region—self‑reliance,
    modesty, and community involvement—shaped her organized and reliable character. She celebrates traditional American holidays such as Thanksgiving and Independence Day with extended family, participates
    in local county fairs, and supports community‑sponsored agriculture programs. Living in Urbandale, a suburb of Des Moines, she enjoys the quiet neighborhoods, small‑group gatherings, and a strong sense
    of local identity that coexists with her love for avant‑garde art and abstract concepts.
attributes:
  skills: '["Digital Illustration", "Graphic Design", "Creative Writing", "Research and Content Development", "Project Planning and Event Coordination", "Photography", "DIY Home Decor", "Basic Web Development
