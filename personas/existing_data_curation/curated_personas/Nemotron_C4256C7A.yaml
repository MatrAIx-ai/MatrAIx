  hobbies: '["Abstract Painting", "Sketching", "Reading Speculative Fiction", "Philosophy", "Poetry Writing", "Experimental Cooking", "Herb Gardening", "Attending Small Art Exhibitions", "Puzzle Solving
    (Crosswords, Logic Games)"]'
  career_goals: She aims to transform her artistic passions into a sustainable freelance career by establishing a small studio in Urbandale where she can create and sell original illustrations, publish
    a collection of short stories or illustrated essays, and lead intimate art workshops for adults. Driven by a competitive streak, she seeks representation by a regional gallery, builds a strong online
    presence to generate supplemental income, and aspires to have her work featured in state‑wide art exhibitions while contributing to the local arts community.
