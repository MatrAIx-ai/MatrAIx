  career_goals: Phillip aims to transition into a senior executive role, such as Director of Operations or Vice President of Project Delivery, where he can shape company strategy and drive sustainable building
    practices across the region. He plans to obtain the PMP and LEED AP certifications to deepen his expertise in project management and green design. Phillip also aspires to mentor the next generation
    of engineers and architects, potentially establishing a scholarship program for local students. On a broader scale, he wishes to serve on the Madison County Planning Commission to influence public policy,
    championing resilient infrastructure and community‑focused development as he approaches retirement.
