personas:
  professional: Phillip Johnson, a veteran architectural and engineering project manager with over three decades of experience, channels their practical, structured mindset into strategic project planning,
    rigorous cost control, and meticulous regulatory compliance while leveraging their outgoing personality to mentor interdisciplinary teams and drive sustainable building practices toward a senior executive
    role.
  sports: Phillip Johnson spends Saturday mornings on the fairways at Misty Creek Golf Club, competing in the club’s monthly scramble with business associates, casts a line on Lake Guntersville for summer
    family fishing trips, hikes the local Black Creek Trail in the fall, and cheers on the Alabama Crimson Tide and Atlanta Braves, maintaining a relaxed yet disciplined fitness routine that keeps them
    agile for site inspections.
  arts: Phillip Johnson, a devoted fan of Southern storytelling, fills evenings with country‑rock concerts featuring Chris Stapleton and Blake Shelton and blues nights honoring B.B. King and Stevie Ray
    Vaughan, while their bookshelf brims with leadership tomes from Jim Collins and Malcolm Gladwell, weaving music’s narrative energy into their strategic thinking.
  travel: Phillip Johnson plans vacations with a spreadsheet‑style itinerary, allocating weekend getaways to Nashville’s music scene and annual family fishing camps on Lake Guntersville, while dreaming
    of their leisurely road trip along the Blue Ridge Parkway and a cultural deep‑dive into New Orleans’ jazz districts during retirement.
  culinary: Phillip Johnson, an avid home chef, perfects Southern classics such as smoked chicken, shrimp and grits, and caramelized pecan pie, relying on a well‑worn cast‑iron skillet, a secret Cajun spice
    blend, and weekly trips to the local farmers’ market for fresh okra, sweet potatoes, and stone‑ground cornmeal, ingredients Phillip Johnson swears by in their Sunday feasts.
  core: Phillip Johnson blends disciplined project management with a love for golf, live blues, and Southern cooking, balancing meticulous spreadsheets with spontaneous fishing trips, yet occasionally skips
    dental appointments because they squeeze in an extra round of golf.
background:
  cultural: Phillip was raised in a middle‑class family in Madison County, Alabama, where community gatherings, church attendance, and high school football were staples of daily life. His upbringing emphasized
    hard work, modesty, and Southern hospitality, shaping a strong sense of loyalty to family and neighbors. He maintains close ties to his extended family and regularly participates in regional traditions
    such as county fairs, local barbecues, and volunteer service projects. The blend of his Southern roots, a business education, and a career at the intersection of architecture and engineering informs
    his practical, organized, yet sociable outlook.
