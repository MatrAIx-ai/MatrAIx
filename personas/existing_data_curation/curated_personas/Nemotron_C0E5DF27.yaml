personas:
  professional: Jensen Carter is a 26‑year‑old telecom field technician who excels at fiber splicing, conduit bending, and CAD‑based network design, and consistently injects imaginative, out‑of‑the‑box
    visual concepts into infrastructure projects despite a tendency to drift between tasks.
  sports: Jensen Carter spends weekends hiking the Appalachian trails, sprinting up ridge paths for cardio, and cheering on the Hagerstown Suns minor‑league baseball team while occasionally joining pick‑up
    basketball games at the local gym.
  arts: Jensen Carter paints abstract canvases inspired by color theory, creates digital illustrations that echo James Turrell’s light play, captures misty mountain vistas with a Nikon D5600, and curates
    playlists that blend Appalachian folk fiddle with electronic producer Flying Lotus.
  travel: Jensen Carter prefers spontaneous road trips, often camping in the Blue Ridge after exploring Shenandoah’s overlooks, while dreaming of an Icelandic adventure to photograph volcanic auroras, and
    occasionally schedules art‑focused getaways to New York’s Chelsea galleries.
  culinary: Jensen Carter’s kitchen experiments revolve around artisan cornbread, smoked trout with wild rosemary, and a daily ritual of brewing single‑origin pour‑over coffee, yet they frequently order
    take‑out pizza after late‑night design sessions.
  core: Jensen Carter blends rugged Appalachian self‑reliance with a restless imagination, tackling fiber networks by day, abstract art by night, and navigating life with a relaxed, occasionally disorganized,
    yet fiercely curious spirit.
background:
  cultural: Jensen grew up in a modest, working‑class family in western Maryland, a region where Appalachian traditions intersect with a growing digital culture. His upbringing emphasized self‑reliance,
    hands‑on problem solving, and a close‑knit community that values personal responsibility. While his heritage is culturally white and rooted in the Mid‑Atlantic, he was exposed to local folk music, outdoor
    recreation, and a practical work ethic. His education at a community college introduced him to broader artistic and technological currents, fostering his curiosity for abstract ideas and modern design.
    This blend of rural resilience and emerging creative influences shapes his worldview and aspirations.
attributes:
  skills: '[''Fiber optic splicing'', ''Cable termination and testing'', ''Electrical troubleshooting'', ''Interpretation of engineering schematics'', ''Site surveying and route planning'', ''CAD layout
    design'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Python scripting for automation'', ''Power over Ethernet (PoE) configuration'', ''Customer communication and documentation'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Landscape photography'', ''Microcontroller/IoT prototyping'', ''Reading speculative fiction and philosophy'', ''Improv comedy workshops'',
    ''Hiking and nature exploration'', ''Synthesizer music creation'']'
  career_goals: Jensen aims to transition from field installation to a supervisory role within the next three years, obtaining BICSI Installation and Design certifications and an associate degree in network
    engineering. He hopes to lead a team that deploys high‑speed broadband to underserved Appalachian communities, combining his technical expertise with his desire for novel, community‑focused projects.
    Long‑term, he envisions launching a boutique consultancy that merges telecom infrastructure planning with interactive public art installations, using his background in design and curiosity for abstract
    concepts.
