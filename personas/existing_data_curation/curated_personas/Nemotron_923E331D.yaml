  career_goals: David is focused on re‑entering the workforce in a role that offers clear structure and the chance to apply his hands‑on expertise. He is pursuing part‑time positions in property management
    or building maintenance where he can oversee repairs, manage budgets, and supervise staff. Parallel to that, he plans to launch a modest home‑based catering service specializing in Uruguayan empanadas
    and asado sauces, leveraging his cooking skills and cultural heritage. Over the next five years, his ambition is to become a trusted community liaison who connects Spanish‑speaking seniors with city
    resources while maintaining a stable income from his maintenance work.
