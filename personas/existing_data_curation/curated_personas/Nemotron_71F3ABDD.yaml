personas:
  professional: Juan Pena is a vehicle and equipment cleaning specialist who combines eco-friendly detailing expertise with an artist's eye for surface aesthetics, and they are methodical about cleaning
    schedules, quality inspections, and progressive certification goals, positioning themselves for a future supervisory role.
  sports: Juan Pena is an avid participant in the local 5K circuit, a regular at the Chicago Bulls games, and a member of the Lakefront Running Club, balancing solo runs with the strategic mental stimulation
    of weekly community-center chess matches.
  arts: Juan Pena immerses themselves in Chicago's art world, capturing street-mural vibrancy through photography, sketching inspirations from the Art Institute's modern collection, and drawing creative
    influence from artists like Kerry James Marshall and Yayoi Kusama, which informs their design sensibility in vehicle presentations.
  travel: Juan Pena prefers curated weekend getaways to automotive museums in Detroit, art-rich neighborhoods in New York's Brooklyn, and cultural festivals in highland towns, planning trips with a blend
    of detailed itineraries and spontaneous photo excursions, all while balancing family commitments.
  culinary: Juan Pena enjoys crafting spice-laden dishes such as slow-braised pork shoulder with ancho chilies, corn-based tamales, and roasted corn-salad with cilantro and lime, demonstrating an intermediate-to-advanced
    cooking skill that they showcase during family gatherings and holiday feasts.
  core: Juan Pena is a disciplined detailer with a competitive streak, an art-obsessed explorer, a methodical planner of finances and travels, and a culinary experimenter who balances meticulous work habits
    with a love for community-center chess and 5K runs.
background:
  cultural: Juan was raised in a Mexican‑American household in Cicero, Illinois. His parents immigrated from Jalisco, and he grew up bilingual, speaking both Spanish and English at home. Family gatherings
    revolve around Mexican traditions, Catholic holidays, and cooking dishes like tamales and pozole. The close‑knit community in Cicero, with its strong Mexican cultural presence, has shaped his values
    of hard work, family loyalty, and respect for cultural heritage. He maintains ties to his roots through participation in local Mexican festivals, listening to regional music, and preserving the language.
