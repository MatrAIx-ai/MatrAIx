  career_goals: Juan aims to step into a supervisory role within the next three years, leading a team of cleaners and establishing standardized quality protocols. He plans to earn industry certifications
    such as ISSA and OSHA, and complete his GED, with the long‑term ambition of launching his own high‑end detailing business that blends his love for art and automotive aesthetics. He also hopes to specialize
    in preserving classic Mexican‑built cars, merging his cultural heritage with his professional expertise.
