  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Yoga/Meditation'', ''Baking Italian Desserts'', ''Birdwatching'', ''Running (Local 5K Races)'', ''Home
