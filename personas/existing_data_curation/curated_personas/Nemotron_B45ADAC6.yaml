  career_goals: Tessie aims to move into an instructional leadership role within the next five years, pursuing a master's in educational leadership to become a district curriculum coordinator or instructional
    coach. She is driven to earn state-level teaching awards by raising student achievement scores and to champion evidence‑based instructional practices across her schools. Long‑term, she envisions a transition
    into school administration where she can shape policy, mentor teachers, and implement community‑focused programs that reflect her practical yet innovative mindset.
