persona_description: An architect or structural engineer who specializes in fire safety design and compartmentation, focusing on the use of high-performance fire glass in building construction to prevent
  fire spread and protect occupants during evacuation. This individual is highly knowledgeable about the European and UK fire safety regulations, the classification of fire glass according to performance
  standards, and the importance of radiant heat in fire spread and fire safety. They are also aware of the potential risks posed by conventional compartmentation wall materials and the benefits of using
  high-performance fire glass for constructing fire-rated walls.
