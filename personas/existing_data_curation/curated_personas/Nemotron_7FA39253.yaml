personas:
  professional: Lisseth Gaona, a budding kindergarten teacher in the making, balances boundless curiosity about how things work with a surprisingly practical approach to building block towers, yet often
    leaves her toys scattered in a carefree, flexible fashion and gently mediates play disputes, though sudden tears can erupt if a friend forgets to share.
  sports: Lisseth Gaona, a spirited member of the Little Stars Soccer Club, dashes across the field with unbridled enthusiasm and cheers loudly for the Red Sox during family game nights, yet her habit of
    leaving shoes at the car and sudden tears when she misses a goal illustrate her flexible, emotionally reactive approach to sport.
  arts: Lisseth Gaona, an avid fan of Disney’s animated classics such as Frozen and Moana, spends afternoons drawing elaborate princess castles, humming Idina Menzel’s songs, and eagerly attending the local
    children's theater’s rendition of The Lion King, though she occasionally loses focus when the story drags, revealing her blend of curiosity and need for variety.
  travel: Lisseth Gaona, a curious five‑year‑old who has explored the sandy shores of Florida’s Gulf Coast with her family and dreams of seeing the Eiffel Tower in Paris, prefers trips that are loosely
    scheduled with plenty of playtime, yet the thought of flying can trigger intense anxiety, prompting her parents to pack her favorite stuffed bunny as a comfort object.
  culinary: Lisseth Gaona, a tiny kitchen helper who adores creamy macaroni and cheese sprinkled with pepper jack cheese and loves to dip cucumber sticks in hummus, gleefully mixes batter for banana pancakes
    while spilling flour everywhere, and occasionally refuses broccoli, illustrating her selective palate and playful, messy cooking style.
  core: Lisseth Gaona, a lovable five‑year‑old whose bright curiosity and gentle kindness are tempered by spontaneous emotional outbursts and a charmingly chaotic habit of leaving toys wherever she plays,
    navigates the world with a mix of imaginative wonder and flexible spontaneity.
background:
  cultural: Lisseth lives in Oakland with her Mexican‑heritage family, where Spanish is spoken at home alongside English. She grows up celebrating Día de los Muertos with homemade altars, enjoys family
    gatherings featuring tamales and enchiladas, and learns traditional Mexican dances from her grandparents. The vibrant Mexican‑American community in her neighborhood introduces her to cultural festivals,
    music, and art, shaping her identity and giving her a sense of pride in her roots while she also experiences the diverse cultural landscape of the Bay Area.
