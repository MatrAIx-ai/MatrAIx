  career_goals: Lisseth often talks about growing up to help other kids. She dreams of becoming a teacher who can teach both English and Spanish, a pediatric doctor who makes children feel better, or a
    dancer who shares Mexican folk dances with her community. Her ambition mixes her curiosity about how things work with a practical desire to care for others.
