    Art Workshops'', ''Yoga'']'
  career_goals: Wendy aims to advance to an Office Manager or Executive Assistant role within the university, overseeing a team and shaping office processes. She plans to earn a Microsoft Office Specialist
    certification and complete an associate’s degree in Business Administration, with the longer‑term goal of pursuing a bachelor’s degree part‑time. Her curiosity about the arts drives her ambition to
    specialize in arts administration, perhaps coordinating exhibitions or cultural programs for the university’s art department. Wendy also hopes to develop a mentorship program for junior administrative
    staff, sharing her organized approach and cooperative spirit. Ultimately, she seeks a balanced career that combines her administrative expertise with opportunities to support creative initiatives and
    community outreach.
