personas:
  professional: Shown Tanner, a seasoned administrative professional at Purdue University, combines two decades of calendar management, travel coordination, and meticulous record‑keeping with a deep curiosity
    for the arts, channeling their methodical reliability into flawlessly organized departmental events while also championing creative exhibitions and mentorship programs.
  sports: Shown Tanner is a dedicated weekend hiker who explores Indiana’s state parks, cheers on the Indiana Hoosiers basketball team, follows the Indianapolis Colts during football season, and participates
    in a local walking club that meets twice a week, preferring low‑impact exercise that fits their balanced social‑alone rhythm.
  arts: Shown Tanner immerses themselves in the local arts scene by attending Purdue’s annual spring art showcase, volunteering at community theater productions of classic playwrights like Arthur Miller,
    collecting prints by Georgia O'Keeffe, and capturing seasonal Midwestern landscapes in photographs reminiscent of Ansel Adams, while also leading a book club that discusses contemporary fiction authors
    such as Margaret Atwood.
  travel: Shown Tanner enjoys modest road trips that combine cultural curiosity and family‑friendly stops, having explored Chicago’s art museums, taken a weekend getaway to Nashville’s music venues, and
    dreamed of a future pilgrimage to Munich’s modern art galleries, always planning itineraries with a detailed spreadsheet and budgeting for affordable Airbnbs.
  culinary: Shown Tanner loves experimenting in the kitchen, skillfully preparing Thai green curry with fresh basil from their garden, mastering Indian samosa dough, and perfecting classic Midwestern chicken
    pot pie, while also relishing the simple pleasure of a farmers‑market‑sourced salad topped with heirloom tomatoes and feta, and they occasionally splurge on a specialty cheese platter during community
    potluck evenings.
  core: Shown Tanner is a meticulous, art‑loving administrator whose habit of double‑checking every email, combined with a penchant for spontaneous garden‑to‑table cooking and a gentle reluctance to miss
    a community event, defines a life balanced between order and creative curiosity.
background:
  cultural: Wendy grew up in a modest, middle‑class family in a small town outside Lafayette, Indiana. Her heritage includes German and Irish ancestry common to many Midwestern white families. The regional
    culture emphasized hard work, community involvement, and modesty, values that continue to shape her reliable and cooperative nature. She celebrates local traditions such as the county fair and participates
    in neighborhood potlucks. While maintaining a respect for individual privacy, she also values the strong sense of togetherness that characterizes Midwestern towns. Her upbringing reinforced the importance
    of education and civic service, which is reflected in her ongoing pursuit of further training and her volunteer work with the public library’s arts programs.
