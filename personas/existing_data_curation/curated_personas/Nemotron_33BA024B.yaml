  hobbies: '[''Reading speculative fiction and philosophy'', ''Abstract watercolor painting'', ''Digital illustration'', ''Desert landscape photography'', ''Hiking and bird-watching in the Sonoran desert'',
    ''Cooking Southwestern and Mexican dishes'', ''Yoga and meditation'', ''Volunteering for teen creative‑writing workshops'']'
  career_goals: Arlene aims to translate her passions into a part‑time professional role that balances creative fulfillment with her need for structured work. She plans to complete a certificate in digital
    media design to expand her illustration portfolio and to volunteer as a docent at the Tucson Museum of Art, eventually moving into a paid community‑arts coordinator position. Long‑term, she envisions
    launching a modest studio space where she can offer workshops in creative writing and abstract painting for adults, while also mentoring emerging women artists in the Southwest. Financial independence
    after her divorce motivates her to build a portfolio of freelance illustration and writing projects that can be managed alongside her personal interests.
