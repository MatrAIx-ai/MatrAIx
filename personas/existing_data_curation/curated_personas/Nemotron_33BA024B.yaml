personas:
  professional: An organized creative writer and digital illustrator with a strong background in project coordination, Arlene Cernak leverages their meticulous planning and imaginative curiosity to design
    community art workshops and freelance illustration projects that blend desert-inspired aesthetics with accessible storytelling.
  sports: An avid hiker and bird‑watcher who frequents Saguaro National Park, Arlene Cernak also follows the Arizona Diamondbacks and participates in the Tucson Outdoor Enthusiasts Club, blending solo sunrise
    treks with occasional weekend volleyball matches at a local community center.
  arts: A passionate abstract watercolorist and digital illustrator inspired by the works of Mark Rothko and contemporary desert artist Robert Rauschenberg, Arlene Cernak devotes evenings to creating evocative
    pieces and curates monthly gallery openings that highlight emerging Southwest women artists.
  travel: A deliberate traveler who prefers curated road trips that combine desert scenery with cultural immersion, Arlene Cernak has explored Sedona’s red rocks, the historic adobe streets of Santa Fe,
    and the vibrant markets of Oaxaca, while planning future visits to the dunes of Mongolia for sunrise photography.
  culinary: An experimental home chef who blends Southwestern and Mexican flavors, Arlene Cernak frequently prepares dishes like roasted poblano enchiladas, cactus‑infused quinoa salad, and salsa verde
    using fresh cilantro, tomatillos, and locally grown rosemary from their own garden.
  core: Arlene Cernak is a methodical creative who balances desert‑inspired art, meticulous planning, and a love of spontaneous coffee‑fueled brainstorming sessions that sometimes derail their budgeting.
background:
  cultural: Arlene grew up in a middle‑class suburban environment in the Midwest, rooted in a family of German‑Polish and Irish ancestry. Relocating to Tucson in her early thirties introduced her to the
    vibrant multicultural tapestry of the Southwest. She has embraced elements of local culture, such as celebrating community festivals like All Souls Procession, exploring Native American art, and developing
    a functional level of Spanish for everyday conversation. Her worldview blends mainstream American values with an appreciation for the desert’s natural rhythms and the region’s blend of Native, Mexican,
    and Anglo influences.
attributes:
  skills: '[''Creative writing'', ''Digital illustration'', ''Art historical research'', ''Project coordination'', ''Event planning'', ''Document editing and proofreading'', ''Basic Spanish conversation'',
