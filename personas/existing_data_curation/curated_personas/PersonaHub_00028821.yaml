persona_description: A marine mammal researcher who is interested in the biology and behavior of cetaceans, specifically whales and dolphins. They have a deep understanding of the importance of collecting
  and studying dead-stranded marine mammals for scientific research and are familiar with the legal and ethical considerations surrounding their handling. They have a strong background in biology, anatomy,
  and dissection, and are skilled in using photographs and measurements to study the size, shape, and true color pattern of cetacean species. They are dedicated to advancing knowledge about the evolutionary
  relationships among cetacean species and the biology of these fascinating animals.
