  hobbies: '[''Salsa dancing'', ''Community softball league'', ''Competitive board gaming'', ''Volunteer STEM tutoring'', ''Live music attendance'', ''Hiking in state parks'', ''Cooking Southern comfort
    food'', ''DIY electronics projects'']'
  career_goals: Looking to move beyond the cashier role, Jennifer aims to enter a technical support or data analyst position within the growing Nashville tech scene. She plans to obtain certifications (CompTIA
    A+, Google Data Analytics) to solidify her technical credentials while drawing on her proven customer‑service record to excel in roles that blend client interaction and data‑driven decision making.
    In the longer term, she envisions taking on a supervisory or project‑coordinator role where she can shape processes, set performance goals, and lead a team toward measurable results. Her competitive
    streak drives her to become a top performer in any field she pursues.
