personas:
  professional: Linda Franklin, a seasoned customer‑service veteran with three decades of front‑line experience, blends a solid STEM foundation in Python, Excel, SQL and CRM platforms (Zendesk, Salesforce)
    with a natural skill for active listening and calm de‑escalation, and now channels their reserved yet organized nature into mentoring new hires and designing empathy‑driven onboarding programs as they
    eye a senior trainer role.
  sports: Linda Franklin enjoys following the New York Yankees in baseball and the New York Knicks in basketball, attends the occasional preseason game at the stadium, participates in a senior walking club
    and a weekly pickleball session at the local recreation center, and they keep a light routine of senior‑friendly stretching to stay active throughout the seasons.
  arts: Linda Franklin immerses themselves in the visual arts by painting watercolors and mixed‑media pieces, curates a personal collection featuring works by Kehinde Wiley, Jacob Lawrence, and Amy Sherald,
    frequents the Montclair Art Museum and local gallery openings, and fills evenings with the sounds of Miles Davis, John Coltrane, Nina Simone and classical cello by Yo‑Yo Ma, which together shape their
    creative identity.
  travel: Linda Franklin prefers thoughtfully planned trips that blend cultural immersion and relaxation, has toured New Orleans for its Jazz & Heritage Festival, explored Savannah’s historic squares, enjoyed
    a vineyard weekend in the Hudson Valley, and dreams of a design‑focused getaway to Copenhagen while they use senior travel discounts and reward points to keep costs manageable.
  culinary: Linda Franklin’s kitchen showcases soul‑food‑inspired dishes such as smoked turkey collard greens, shrimp and grits seasoned with smoked paprika, and black‑eyed peas, all complemented by fresh
    basil, thyme and rosemary from their balcony garden, while they experiment with herb‑infused quinoa salads, ginger‑lime tea and occasional banana‑bread experiments.
  core: Linda Franklin is a quietly assertive mentor who marries tech expertise, a love for jazz and watercolor, and a community‑first ethos into a lifetime of purposeful service, all while secretly hoarding
    vintage jazz LPs and kicking back with a cup of ginger tea, and they often surprise colleagues with unexpected bursts of creative insight.
background:
  cultural: Linda is an African‑American woman whose family roots trace back to the Mississippi Delta, though she was born and raised in the urban neighborhoods of Newark and later settled in Clifton, New
    Jersey. Growing up during the civil‑rights movement, she was shaped by the church’s gospel traditions, community storytelling, and a strong emphasis on education. Her mother, a registered nurse, and
    her father, a factory foreman, instilled a work ethic that propelled her to pursue a STEM degree when few women of her background did so. Linda remains connected to her heritage through regular attendance
    at local African‑American cultural festivals, a love for jazz and gospel music, and a commitment to mentoring young Black professionals in tech and customer service fields.
attributes:
