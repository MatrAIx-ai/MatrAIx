personas:
  professional: Seul Zhang, a 38‑year‑old housekeeping veteran with over a decade of deep‑cleaning expertise, leverages meticulous scheduling, eco‑friendly product knowledge, and bilingual communication
    to train staff and ensure flawless client satisfaction, while methodically preparing for a supervisory certification.
  sports: Seul Zhang, 38, maintains fitness through daily park walks, a weekly beginner’s yoga class at Blue Lotus Studio, and cheerfully follows the Durham Bulls baseball team and the North Carolina FC
    soccer club, yet admits to skipping the occasional gym session when work demands surge.
  arts: Seul Zhang, 38, blends a love for calligraphy with evenings spent reading Li Bai poems, modern fiction by Chimamanda Ngozi Adichie, and watching sustainability documentaries by David Attenborough,
    while finding solace in the piano works of Lang Lang and the ambient soundscapes of Yiruma, shaping a reflective artistic identity.
  travel: Seul Zhang, 38, plans trips meticulously, favoring low‑key itineraries that combine cultural immersion—such as a weekend in Kyoto’s temples and a culinary tour of Singapore’s hawker centers—with
    nature escapes like hiking the Blue Ridge Parkway, while budgeting for a future adventure to the vineyards of Bordeaux.
  culinary: Seul Zhang, 38, enjoys preparing hand‑rolled dumplings filled with pork and scallions and simmering communal hot pot seasoned with ginger, garlic, and fresh basil from her garden, while also
    experimenting with cilantro‑infused sauces and plum‑glazed chicken, balancing modest culinary skill with a deep appreciation for authentic flavors.
  core: Seul Zhang, a 38‑year‑old meticulous housekeeping specialist, blends disciplined organization with a solitary love for calligraphy, herb gardening, and mindful quietude, while occasionally overindulging
    in specialty tea and neglecting dental floss.
background:
  cultural: Seul is a first-generation Chinese-American whose parents immigrated from mainland China in the early 1990s. She grew up in a household where Mandarin was spoken daily, and traditional festivals
    such as Chinese New Year and the Mid-Autumn Festival were celebrated with family gatherings, homemade mooncakes, and lion-dance performances. Influenced by Confucian values, she places high importance
    on harmony, hard work, respect for elders, and modesty. While she embraces these cultural foundations, she has also integrated aspects of Southern U.S. life in Durham, participating in local community
    events and adapting her cooking to include regional ingredients. This blend of Eastern heritage and Southern American experience shapes her worldview, interpersonal style, and everyday practices.
attributes:
