    and meal preparation'', ''Household budgeting'']'
  hobbies: '[''Chinese calligraphy'', ''Herb gardening'', ''Reading (Chinese poetry, literary fiction, sustainability documentaries)'', ''Cooking traditional Chinese dishes'', ''Walking and meditation in
    parks'', ''Jigsaw puzzles'', ''Volunteering at community food bank'']'
  career_goals: Seul aims to obtain a professional housekeeping certification and progress to a supervisory role within a reputable cleaning company, where she can mentor new cleaners and implement quality-control
    standards. In the longer term, she plans to launch her own boutique cleaning service focused on eco-friendly practices for small-to-medium households in the Durham area. She also hopes to attend a short
    course in property management to broaden her career options and eventually achieve financial stability that will enable her to purchase a home.
