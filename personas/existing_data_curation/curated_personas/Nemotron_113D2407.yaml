  career_goals: Approaching retirement, Sandra aims to transition into a mentorship and consulting role, helping younger managers—especially those from underrepresented backgrounds—navigate retail leadership.
    She plans to develop a community‑based training program that blends practical retail skills with creative merchandising techniques. Long‑term, she hopes to open a boutique that showcases African American
    art and handcrafted goods, using the space as a cultural hub and a platform for emerging local artists. Additionally, she aspires to share her industry insights through speaking engagements at regional
    business conferences and a memoir chronicling her three‑generation experience in Oklahoma’s retail sector.
