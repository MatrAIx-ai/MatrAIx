personas:
  professional: Maria Bejarano, a seasoned food-service manager with over twenty years overseeing restaurant and cafeteria operations along the Gulf Coast, blends disciplined food-safety oversight, cost-centric
    inventory control, and eclectic menu design that fuses their heritage flavors with Creole traditions, while leading diverse front-line teams through empathetic conflict resolution and artistic plating
    concepts.
  sports: Maria Bejarano channels their zest for movement into weekly Zumba and salsa classes, cheers for the New Orleans Saints on Sundays, and joins a local adult soccer league that plays at the Lafayette
    community field during the spring.
  arts: Maria Bejarano roams Lafayette’s art galleries, revels in live Cajun jam sessions featuring musicians like Clifton Chenier, and finds inspiration in the vibrant murals of local street artist Zeph,
    using those visual cues to influence their restaurant’s plating aesthetics.
  travel: Maria Bejarano prefers short, immersive trips, often weekend-hopping to New Orleans for its music festivals, coastal retreats in Galveston for fishing, while dreaming of a culinary pilgrimage
    to Oaxaca to study traditional mole techniques, budgeting each adventure through a dedicated travel savings account.
  culinary: Maria Bejarano delights in crafting fusion dishes such as crawfish-infused tacos al pastor, jalapeno‑cheddar beignets, and herb‑laden shrimp etouffee, their kitchen skills ranging from novice
    home cooking to advanced techniques learned in a recent culinary arts certification program.
  core: Maria Bejarano blends a vibrant love for art, music, and community with a relaxed, sometimes disorganized approach to planning, turning their kitchen into a canvas while juggling weekly dance classes,
    garden chores, and a growing ambition to run multiple eateries.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household where family meals and traditional celebrations were central to daily life. Her parents instilled a deep respect
    for Mexican culinary traditions, Catholic festivities, and the value of community solidarity. Living in Rayne, Louisiana, she has embraced the Acadian and Creole cultures that surround her, blending
    those flavors and customs with her heritage. This dual cultural identity informs her cooking style, social interactions, and her commitment to fostering inclusive, warm environments both at work and
    in her community.
attributes:
  skills: '[''team leadership'', ''bilingual communication (English/Spanish)'', ''menu development with Mexican‑Creole fusion'', ''food safety compliance (ServSafe certified)'', ''budget and cost control'',
    ''inventory management'', ''customer service training'', ''conflict resolution'', ''artistic food presentation'', ''event planning and execution'', ''POS system proficiency'', ''staff mentorship'']'
  hobbies: '[''visiting art galleries'', ''attending live music and dance events'', ''experimenting with fusion recipes'', ''gardening herbs and chilies'', ''volunteering at senior community cooking programs'',
    ''taking Zumba and salsa classes'', ''participating in local festivals (Mardi Gras, Día de los Muertos)'', ''reading culinary magazines'', ''organizing neighborhood potlucks'']'
  career_goals: Maria aims to transition from managing a single establishment to overseeing multiple locations as a regional food‑service director for a hospitality group that values cultural cuisine and
    community engagement. She also dreams of opening her own family‑style Mexican‑Louisiana fusion restaurant where she can showcase her love for art, host community cooking workshops, and create a welcoming
    space for locals. To support these goals, she plans to complete a certification in culinary arts, attend leadership seminars, and develop a sustainable sourcing program for her future venture.
