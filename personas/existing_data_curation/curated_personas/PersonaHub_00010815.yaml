persona_description: A public service professional with extensive experience in forecasting and managing beach safety and education on the Great Lakes. This person has been involved in the development and
  implementation of rip current programs, including the creation of databases and the development of educational materials. They have experience in forecasting and managing beach hazards and have a strong
  understanding of the causes of rip currents and other currents that can pose a threat to swimmers. This person is highly knowledgeable about the various types of currents and their effects on beach safety
  and education, and is skilled in creating and delivering educational materials to the public. They have a deep understanding of the importance of beach safety and education and are committed to ensuring
  that the public is aware of the various hazards that can pose a threat to swimmers.
