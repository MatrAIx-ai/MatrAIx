  hobbies: '["Fishing", "Bowling league", "Church outreach", "Volunteer at food bank", "Woodworking", "Gardening", "Grilling seafood", "College football watching", "Participating in local festivals", "Family
    gatherings"]'
  career_goals: Although approaching retirement, Garrett aims to transition into a mentorship and safety leadership role within his plant, seeking certification as a Certified Maintenance & Reliability
    Technician (CMRT) to formalize his expertise. He hopes to lead a safety committee, develop a training curriculum for younger operators, and perhaps consult part‑time for local manufacturers on machine
    optimization. Beyond work, he aspires to volunteer as a youth mentor at the community center and dedicate more time to his family and local church activities.
