personas:
  professional: Garrett Patton, a veteran maintenance technician at a regional food‑processing plant, combines three decades of expertise in high‑speed packaging and filling equipment with a safety‑first,
    collaborative mindset, using his curiosity and practicality to mentor new operators, lead small process‑improvement projects, and pursue CMRT certification as a stepping stone toward a formal safety
    leadership role.
  sports: Garrett Patton, an enthusiastic fan of the Clemson Tigers and Carolina Panthers, spends his Saturdays bowling in the local senior league, walks the Waccamaw River trail thrice a week for low‑impact
    cardio, fishes regularly as a recreational sport, and joins a community walking club that meets at the municipal park, balancing social competition with seasonal outdoor activity.
  arts: Garrett Patton finds creative fulfillment in woodworking and listening to classic Southern rock and country legends like Lynyrd Skynyrd, Johnny Cash, and contemporary gospel choir performances at
    his church, while attending the annual Carolina Shrimp Festival’s live music stage and occasional community theatre productions, letting music and craft shape his relaxed leisure time.
  travel: Garrett Patton enjoys meticulously planned road trips with his wife, having explored historic Charleston, a weekend cruise to the Bahamas, and a scenic drive through the Blue Ridge Mountains,
    while dreaming of an Alaskan salmon‑fishing expedition and preferring senior discounts and mid‑week travel to keep costs low.
  culinary: Garrett Patton, a competent home grill master, loves preparing Old Bay‑seasoned shrimp, blackened grouper, and lemon‑butter crab while pairing them with garden‑fresh tomatoes, sweet corn, and
    collard greens, experimenting with low‑and‑slow smoking techniques though sometimes over‑cooking the seafood when distracted by conversation.
  core: Garrett Patton, a safety‑first maintenance veteran with a heart for community, balances meticulous equipment checks with weekend fishing, senior bowling, and a habit of over‑grilling shrimp at family
    gatherings.
background:
  cultural: Garrett was raised in rural South Carolina, steeped in Southern hospitality, Baptist traditions, and a strong sense of community. His family’s roots trace back several generations of farmers
    and blue‑collar workers who valued hard work, self‑reliance, and neighborly support. The local culture of coastal Horry County—characterized by seafood cuisine, annual festivals like the Shrimp Festival,
    and a love for outdoor recreation—has shaped his worldview. He embraces the values of modesty, respect for elders, and a collaborative spirit that reflects the region’s blend of traditional Southern
    customs and a growing, diverse, tourism‑driven economy.
attributes:
