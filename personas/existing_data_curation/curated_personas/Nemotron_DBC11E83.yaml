  career_goals: She aims to advance to a senior statistician or data analytics manager position within a government agency or large research institution in Colorado, where she can lead a small team, design
    robust data pipelines, and standardize reporting processes. Vicki seeks to become a recognized subject‑matter expert in environmental or public‑policy statistics, publish methodological articles, obtain
    professional certification, and mentor junior analysts while maintaining a stable, well‑structured work schedule that aligns with her preference for routine.
