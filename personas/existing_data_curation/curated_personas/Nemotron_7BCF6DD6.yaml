personas:
  professional: Juvenal Nieves, an eight-year-old junior builder, channels curiosity and practicality into Minecraft redstone experiments and LEGO bridge projects, often assertively guiding peers in group
    builds while balancing careful organization with spontaneous creativity.
  sports: Juvenal Nieves energizes the local youth soccer league, cheering for the Las Vegas Lights FC while often taking charge of midfield passes, and spends weekends organizing impromptu kick-around
    games at Red Rock Canyon, blending competitive spirit with a love for the desert outdoors.
  arts: Juvenal Nieves sketches comic-strip heroes like Spider-Man and illustrates adventure scenes, while humming along to Banda el Recodo's folk tunes and Ariana Grande's pop hits, using drawing as a
    calming outlet for their frequent worries.
  travel: Juvenal Nieves loves weekend family road trips that combine hikes through Red Rock Canyon with stops at the bright lights of Las Vegas, dreams of conquering the Grand Canyon's rim, and eagerly
    anticipates a future summer getaway to a beach resort in Puerto Vallarta, balancing adventurous curiosity with the comfort of familiar routines.
  culinary: Juvenal Nieves enthusiastically helps prepare taco al pastor, shapes masa for tamales de elote, and adds cilantro to pozole, while occasionally sneaking extra chocolate chips into homemade cookies
    and losing patience when the kitchen gets messy.
  core: Juvenal Nieves, an energetic eight-year-old who leads soccer scrimmages, builds LEGO bridges, and worries about forgetting chores, blends boundless curiosity with a touch of anxiety and a habit
    of humming folk tunes while juggling school and play.
background:
  cultural: Juvenal comes from a Mexican-heritage family that maintains strong ties to their roots while living in Las Vegas; at home Spanish is spoken alongside English and family gatherings feature traditional
    foods like tacos, tamales and pozole, as well as celebrations of Día de los Muertos and Mexican Independence Day; his parents encourage bilingual literacy, so he reads both English picture books and
    simple Spanish stories; the vibrant Mexican community in Clark County provides opportunities to attend cultural festivals, folk-dance classes, and soccer leagues reflecting his heritage; while he enjoys
    the multicultural environment of Las Vegas, he values the close-knit family support typical of many Mexican households, shaping his identity and desire to honor his culture in future pursuits.
