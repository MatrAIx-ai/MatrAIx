personas:
  professional: Alcides Rivera is a self‑taught full‑stack developer who couples two decades of clean code craftsmanship with a rigorously documented Agile‑Waterfall hybrid process, consistently delivering
    reliable systems while mentoring junior engineers toward architectural excellence.
  sports: Alcides Rivera channels his competitive edge into hiking the Columbia River Gorge trails, rigorously tracking elevation gains, cheering on Liga MX’s Club América during weekend matches, and supporting
    the Portland Timbers’ MLS games with friends, while occasionally joining a local pickup basketball league for cardio.
  arts: Alcides Rivera sharpens strategic thinking through weekly chess sessions at the community center, balances that with a love for listening to Radiohead and Nina Simone, and occasionally attends live
    acoustic folk performances by local artists like The Strumbellas, finding artistic inspiration that fuels his creative coding side projects.
  travel: Alcides Rivera prefers structured itineraries that blend outdoor adventure with cultural immersion, having trekked the Columbia River Gorge in the Pacific Northwest, explored the historic streets
    of Seville, Spain, and planning a future road trip along the Pacific Coast Highway to capture sunrise vistas before the next hiking season.
  culinary: Alcides Rivera enjoys mastering traditional dishes such as mole, tamales, and pozole, meticulously measuring chilies, roasted corn, and dark chocolate before adding a modern twist like smoked
    paprika or quinoa, and often experiments with sous‑vide techniques to perfect textures while documenting each recipe iteration in his bullet journal.
  core: Alcides Rivera blends methodical engineering precision with a relentless quest for structured calm, navigating anxiety through disciplined routines, meticulous hobbies, and a competitive love of
    strategic games.
background:
  cultural: Alcides was raised in a Mexican‑American household in the Pacific Northwest. Both of his parents emigrated from Mexico, and Spanish was spoken at home alongside English, making him bilingual.
    Family gatherings centered around shared meals, music, and celebrations of holidays such as Día de los Muertos and Cinco de Mayo, reinforcing a strong sense of cultural identity. He maintains close
    ties with extended family in Mexico through regular video calls and visits. His Catholic upbringing informs his values of community service and respect for tradition. While fully integrated into American
    society, Alcides incorporates Mexican flavors and customs into his daily life, from cooking traditional recipes to participating in local cultural festivals that celebrate his heritage.
