  career_goals: Augustine aspires to turn his practical expertise and disciplined approach into a part‑time consultancy offering remote DIY troubleshooting and written guides for homeowners in his region.
    He plans to obtain a CAPM (Certified Associate in Project Management) credential to formalize his methodical workflow, eventually publishing a self‑help guide on sustainable home upkeep, and he hopes
    to volunteer as a library assistant to apply his cataloguing skills while fostering a calm, structured environment that supports his mental well‑being.
