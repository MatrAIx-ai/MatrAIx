  hobbies: '[''Woodworking'', ''Fly fishing'', ''Cycling'', ''Reading historical non-fiction'', ''Coaching youth soccer'', ''Cooking'', ''Gardening'', ''Attending Philadelphia Eagles games'', ''Volunteering
    at local food bank'']'
  career_goals: Over the next five years, Grant aims to advance to a Director of Operations role, overseeing multiple sites across the Mid‑Atlantic region. He plans to lead a digital transformation initiative
    that integrates advanced analytics and automation into his company's workflow. Obtaining a Six Sigma Black Belt and a PMP certification are key milestones he wants to achieve to deepen his expertise.
    Ultimately, he aspires to a senior executive position, such as Chief Operating Officer, where he can shape strategic growth while mentoring the next generation of managers.
