  hobbies: '[''Gardening'', ''Cooking'', ''Crocheting and quilting'', ''Reading historical fiction'', ''Church socials'', ''Walking along the river'', ''Genealogy research'']'
  career_goals: Although retired, Kelly aims to deepen her involvement in local volunteer work, especially at the senior center and her church's outreach programs, to remain a compassionate presence in
    her community. She wants to learn to use a tablet to stay connected with her grandchildren, document family recipes and stories in a memoir, and keep her garden thriving as a source of health and joy.
    Additionally, she hopes to mentor younger neighbors in practical skills and promote intergenerational harmony while maintaining a flexible, low‑stress lifestyle.
