persona_description: A historian and anthropologist who is deeply interested in the history and culture of the American Southwest, particularly the Navajo people. This person is passionate about the region's
  unique history and has a strong desire to learn more about the pre- and post-contact experiences of Native Americans. They are also interested in the policies of the U.S. government and the ways in which
  Native peoples have adapted to external pressures. This person is likely to be interested in the Columbia Guides to American Indian History and Culture, as they provide a comprehensive overview of the
  region's history and culture, as well as information on specific Native communities.
