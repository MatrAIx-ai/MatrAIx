  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Photography'', ''Reading historical fiction and non-fiction'', ''Gardening'', ''Hiking local trails'', ''Cooking and experimenting with
    regional recipes'', ''Attending local theater productions'', ''Volunteering at community arts events'', ''Participating in a book club'', ''Taking online courses on finance and emerging technologies'',
    ''Practicing yoga for stress management'']'
  career_goals: Looking ahead, Heather aims to elevate her career by earning the Certified Financial Planner (CFP) designation within the next two years, positioning herself for a senior advisory role within
    her firm or as an independent consultant. She is passionate about using her financial expertise to support small businesses and arts organizations in Scioto County, and hopes to launch a community financial
    literacy program that empowers seniors and underserved residents. Heather also aspires to take on a managerial position that allows her to mentor a larger team, while continuing to integrate her love
    for art by offering pro‑bono financial guidance to local cultural institutions. Ultimately, she seeks a balanced professional life that reduces stress and aligns with her values of community service
    and lifelong learning.
