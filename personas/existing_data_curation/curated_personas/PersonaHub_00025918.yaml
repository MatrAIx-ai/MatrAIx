persona_description: A historian of the eighteenth century who is particularly interested in the social services and healthcare systems of Paris during that time period. This individual is knowledgeable
  about the religious organizations that dominated the social services, the complex hospital general in Paris, and the struggles between medical professionals and the clergy to provide care for the poor.
  This person is also interested in the report that came out in 1787, which highlighted the deplorable conditions at the hotel-dieus and the need for reform or transfer of patients to other hospitals.
