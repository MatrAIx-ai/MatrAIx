personas:
  professional: Dante Soria is an aspiring robotics engineer who channels their love for structured play and teamwork from after-school soccer into designing LEGO-based automatons for their school's robotics
    club, often leading group projects while delighting classmates as the MC of their weekly demos.
  sports: Dante Soria is a passionate soccer player who trains with the LA Galaxy Academy U-11 team, cheers for Los Angeles FC during televised matches, enjoys playing pickup games at the neighborhood park
    in the evenings, and follows the Los Angeles Lakers and Dodgers for off-season fun.
  arts: Dante Soria is a budding comic-strip creator who draws a bilingual superhero inspired by their grandparents, mixes cumbia beats from Los Angeles Azules with reggaeton tracks by J Balvin while dancing
    in the living room, and produces stop-motion LEGO videos that they upload to a private YouTube channel, often featuring background music by Bad Bunny.
  travel: Dante Soria loves weekend trips to Disneyland and beach days in Santa Monica, dreams of visiting the ancient ruins of Machu Picchu after school, and enjoys family road trips to the Grand Canyon,
    while their imagination is fueled by stories of colorful festivals they've seen at the local community center's cultural fair.
  culinary: Dante Soria is an enthusiastic junior cook who proudly helps their grandmother prepare pupusas de queso, tamales de pollo, and yuca frita, and also experiments with making homemade pizza dough
    and assembling nachos with jalapenos, though their kitchen creations often end in a mess of flour and sauce on the countertop.
  core: Dante Soria is a sociable, structure-loving ten-year-old who blends their love for soccer, LEGO robotics, and family traditions into a lively mix of organized play, occasional impulsive snack purchases,
    and a habit of forgetting bedtime after a night of video-game building.
background:
  cultural: Dante’s family emigrated from San Salvador before he was born, creating a bilingual home where Spanish is spoken alongside English. Family gatherings revolve around traditional foods such as
    pupusas, tamales, and yuca frita, and he often helps his grandmother prepare these meals. He celebrates Salvadoran holidays like Día de la Madre and the feast of San Juan, while also participating in
    American traditions such as Thanksgiving and Halloween, blending customs in a multicultural way. The local Salvadoran community in Los Angeles offers a sense of belonging through church events, cultural
    festivals, and a nearby community center where he attends Spanish storytime and soccer clinics. These experiences have instilled in Dante a strong appreciation for family cohesion, respect for elders,
    and a work ethic rooted in his heritage, while his Los Angeles neighborhood exposes him to diverse music, cuisine, and languages, shaping a bicultural identity.
