  hobbies: '[''Playing soccer'', ''Building LEGO sets'', ''Cooking Salvadoran dishes (pupusas)'', ''Video gaming (Minecraft, Roblox)'', ''Drawing comic strips'', ''Robotics club activities'', ''Reading
