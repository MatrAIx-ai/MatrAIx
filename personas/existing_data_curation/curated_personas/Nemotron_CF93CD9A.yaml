  career_goals: Dante dreams of turning his love for soccer and technology into a future career. In the short term, he wants to lead his school’s coding club, win the regional middle‑school soccer championship,
    and earn a robotics badge. Long‑term, he aspires to study computer science and sports management in college, creating interactive video games that teach Spanish language and Salvadoran cultural history
    while also supporting youth athletic programs. He hopes to travel to El Salvador to deepen his connection to his heritage and eventually open a community center that offers soccer clinics and tech workshops
    for immigrant families.
