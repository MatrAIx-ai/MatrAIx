  career_goals: Fariah dreams of turning her love for food and storytelling into a career that lets her celebrate her heritage while reaching a broad audience. She envisions studying culinary arts or hospitality
    management at a community college, followed by creating a food‑blog or a small‑scale food‑truck that serves modern twists on classic Cuban recipes. Simultaneously, she is intrigued by digital media
    and hopes to acquire a degree in graphic design or communications, allowing her to produce videos, photography, and social‑media content that document community events and cultural traditions. In the
    longer term, she wants to be a cultural ambassador who builds bridges between her local neighborhood and the wider world, keeping her options flexible and open to emerging opportunities.
