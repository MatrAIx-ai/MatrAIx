personas:
  professional: Fariah Gonzalez, a 15‑year‑old tech‑savvy hobbyist, channels her curiosity and practical mindset into building Arduino gadgets and experimenting with digitally‑inspired culinary projects,
    often juggling multiple ideas in a delightfully chaotic workflow.
  sports: Fariah Gonzalez, a 15‑year‑old basketball enthusiast who swishes hoops at the Santa Ana park with friends, cheers for the Los Angeles Lakers and LA Clippers during the NBA season, and caps off
    her week with weekend hikes up the Santa Ana foothills, favoring a mix of cardio and streetball to stay fit.
  arts: Fariah Gonzalez, a budding comic‑strip creator who sketches vibrant characters inspired by the storytelling style of Alex Ross and the humor of Marvel’s Spider‑Man, dances to the beats of Bad Bunny,
    Shakira, and Billie Eilish, and produces TikTok videos that blend culinary flair with pop‑culture references, reflecting her love for both visual and musical arts.
  travel: Fariah Gonzalez, an adventurous teen who has camped at the Pacific Coast Highway’s state parks and visited the San Diego Zoo, dreams of tasting the vibrant street‑food scene of a historic Caribbean
    port city, exploring the neon‑lit anime districts of Tokyo, and hiking the volcanic trails of Iceland, all while balancing a tight student budget and a love for spontaneous road trips.
  culinary: Fariah Gonzalez, a kitchen experimenter who fuses traditional island staples like shredded pork stew and ripe plantains with viral trends such as avocado toast, creating dishes like a \"Island‑Inspired
    Pork Taco\" topped with mango‑chili salsa and a side of sweet‑potato \"crispy‑chip\" bites, she delights in using ingredients like cumin, lime zest, gochujang, and toasted coconut to keep her palate
    adventurous.
  core: Fariah Gonzalez, a 15‑year‑old restless creator who blends tech, food, and art in a whirlwind of half‑finished projects, impulsive spending, and a penchant for late‑night TikTok bursts, all while
    juggling acne creams and basketball hoops.
background:
  cultural: Fariah’s cultural background is rooted in her Cuban family’s traditions, which she experiences daily through language, food, music, and community gatherings. Growing up in Santa Ana’s vibrant
    Latino neighborhood, she speaks Spanish at home and English at school, allowing her to move fluidly between both cultures. Family meals often feature classic dishes like ropa vieja, yuca con mojo, and
    flan, and weekend celebrations incorporate music ranging from tradicional son to contemporary reggaeton. Her parents instilled the importance of family ties, mutual support, and respect for elders,
    which is reflected in her cooperative nature. Community festivals such as Carnaval Latino and local church events provide her with opportunities to perform dances, help with organizing booths, and share
    her homemade treats. While she embraces these cultural touchstones, she also blends them with the broader Southern California lifestyle, creating a hybrid identity that values both her Cuban roots and
    the multicultural environment of Orange County.
