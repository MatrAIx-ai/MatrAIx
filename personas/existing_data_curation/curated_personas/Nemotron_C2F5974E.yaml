  career_goals: Mary aims to transition from a frontline assembler to a shift supervisor within the next two years, leveraging her methodical planning and reliable execution to lead a small team. She plans
    to earn a Certified Production Technician (CPT) credential and deepen her knowledge of advanced CNC programming to drive efficiency gains. Long-term, she envisions opening a boutique custom-fabrication
    shop that serves local artisans and small businesses, blending her practical skills with innovative design ideas.
