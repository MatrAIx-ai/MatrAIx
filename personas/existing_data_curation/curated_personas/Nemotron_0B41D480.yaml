  career_goals: Guided by his love of structure and community, Gustavo envisions a future where he can blend technical expertise with public service. He dreams of studying civil engineering to design hurricane‑resilient
    homes and sustainable infrastructure for Puerto Rico, while also pursuing a role as a youth mentor or school administrator where he can organize programs that empower other kids. In the longer term,
    he hopes to become a community liaison who plans local festivals and civic projects, using his sociable nature to bring people together and his calm, methodical approach to ensure everything runs smoothly.
