personas:
  professional: Gustavo Perezgarcia is an aspiring junior software developer who blends their methodical LEGO building and Scratch programming skills with the tactical mindset of a midfield soccer player,
    leading group projects in their school’s technology club while relishing the spotlight during presentations.
  sports: Gustavo Perezgarcia plays midfield for the Rio Grande Junior Soccer Club, trains year‑round with a focus on tactical coordination, and cheerfully follows the Puerto Rico national soccer team and
    FC Barcelona, often emulating their formations during after‑school drills.
  arts: Gustavo Perezgarcia is a vibrant member of their school’s drama club who loves staging productions, practices salsa with family to the rhythms of Celia Cruz and Los Pleneros de la 21, and unwinds
    by reading The Adventures of Tintin and Marvel’s Spider‑Man comics, often mimicking iconic lines onstage.
  travel: Gustavo Perezgarcia prefers hands‑on weekend getaways, having explored the sun‑kissed beaches of Rio Grande and the historic streets of Old San Juan, they now dream of a road trip to the Amazon
    rainforest and a future family vacation to the skyscrapers of New York City, balancing adventurous hikes with sun‑bathing pauses.
  culinary: Gustavo Perezgarcia enjoys helping their grandparents cook arroz con gandules, tostones, and a sprinkle of sofrito, showing a budding knack for seasoning with cilantro and garlic, yet they sometimes
    over‑season the rice and rely on instant noodles when pressed for time.
  core: Gustavo Perezgarcia is an energetic yet methodical teen who blends a love for soccer tactics, LEGO construction, and salsa rhythms into a sociable, organized life, meticulously planning projects,
    savings, and adventures while occasionally over‑indulging in comic‑filled daydreams.
background:
  cultural: Gustavo grows up in a close‑knit Puerto Rican family in Rio Grande, where Spanish and English flow together in everyday conversation. His household celebrates the island’s rich heritage, from
    the vibrant rhythms of bomba and plena to annual festivals like Noche de San Juan, and shares meals of arroz con gandules, pasteles, and asopao prepared with multiple generations. The community’s strong
    Catholic roots, love of the sea, and emphasis on collective responsibility shape his worldview, giving him a deep appreciation for Puerto Rico’s blend of Caribbean, African, and Spanish influences.
