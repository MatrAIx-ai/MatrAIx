personas:
  professional: Danielle Niehaus, a seasoned community arts organizer and amateur historian, leverages their meticulous planning, creative research, and diplomatic communication to curate local exhibitions
    and develop a digital archive for the Bellefonte Historical Society.
  sports: Danielle Niehaus, an avid member of the Bellefonte Hiking Club, spends autumn weekends trekking Bald Eagle State Park while cheering on the Penn State Nittany Lions and the Philadelphia Eagles,
    and balances gentle yoga sessions at Sunrise Yoga Studio with occasional birdwatching outings alongside the local Audubon Society.
  arts: Danielle Niehaus, a devoted patron of the Bellefonte Art Guild, spends evenings sketching watercolor studies of the surrounding countryside, volunteers as a set designer for community theater productions
    of Shakespeare and contemporary plays, and draws inspiration from Monet, Georgia O’Keeffe, and local folk artist John Doe, while regularly attending gallery openings featuring works by emerging Pennsylvania
    artists like Sarah Whitaker.
  travel: Danielle Niehaus, a methodical planner who maps out trips in her notebook, prefers leisurely cultural journeys such as a weekend in Gettysburg, a fall foliage road trip through the Blue Ridge
    Mountains, and a spring pilgrimage to the gardens of Kyoto, but due to fixed income and caregiving responsibilities, they limit travel to short, well‑budgeted getaways, often joining guided tours with
    the local senior travel club.
  culinary: Danielle Niehaus, an enthusiastic home gardener and modest cook, loves preparing roasted beet and goat cheese salads with fresh herbs from their garden, experiments with pottery glazing to create
    unique serving bowls, and delights in occasional dining at the farm‑to‑table restaurant The Covered Bridge, where they savor dishes like pan‑seared trout with lemon‑dill sauce and heirloom tomato bruschetta.
  core: Danielle Niehaus, a curious yet worry‑prone 58‑year‑old, combines meticulous community‑building with a love for watercolor, gentle yoga, and a habit of over‑checking the budget before bedtime.
background:
  cultural: Danielle’s cultural roots trace back to German and Scots‑Irish settlers who arrived in central Pennsylvania in the early 19th century. Growing up in Bellefonte, she absorbed the town’s strong
    sense of community, the pride of preserving historic architecture, and the modest, self‑reliant values characteristic of the Appalachian‑valley region. Family traditions include celebrating Pennsylvania
    Dutch holidays, baking seasonal pies, and participating in the annual Bellefonte Apple Harvest Festival. These influences fostered her appreciation for local history, folk art, and the importance of
    intergenerational storytelling. While identifying as a white American, Danielle actively seeks to honor the diverse cultural tapestry of Centre County by collaborating with Indigenous and immigrant
    community groups in cultural events.
