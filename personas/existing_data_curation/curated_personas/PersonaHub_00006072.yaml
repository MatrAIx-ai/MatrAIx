persona_description: A researcher and advocate for bilingual education, particularly in the context of English as a Second Language (ESL) programs, who is critical of the current federal mandate for bilingual
  education and advocates for lifting all mandates for bilingual or native-language instruction. They believe that alternative instructional programs such as ESL, sheltered English, and structured immersion
  are more effective in promoting English literacy and improving student achievement. They are concerned about the potential for higher dropout rates if schools are allowed to abandon bilingual education
  and opt for a total immersion program. They have conducted research on the effectiveness of these alternative programs and have presented findings at conferences and seminars. They are also a member of
  the Institute for Research in English Acquisition and Development (READ) and have contributed to their research on bilingual education.
