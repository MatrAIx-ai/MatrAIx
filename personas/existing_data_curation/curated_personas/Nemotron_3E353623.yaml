  career_goals: Janice often imagines grown‑up roles that blend her curiosity with a practical desire to help others. She talks about becoming a veterinarian because she loves caring for animals, a teacher
    to guide younger children in reading and counting, and sometimes an astronaut, reflecting her wonder about the world beyond. Her ambitions are shaped by a balance of compassionate goals—like keeping
    peers safe and happy—and a personal drive to understand how things work, all while navigating her tendency to worry about new challenges.
