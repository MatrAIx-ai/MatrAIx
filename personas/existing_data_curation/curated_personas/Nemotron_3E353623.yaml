personas:
  professional: Janice Davis, a budding builder of block towers, delights in arranging colorful LEGO bricks and simple puzzles, showcasing early spatial reasoning while balancing a love for novel constructions
    with a penchant for familiar, sturdy designs.
  sports: Janice Davis darts around the playground as a member of the Sunshine Preschool Soccer Club, proudly waves a miniature Chicago Cubs cap during games, and watches the local minor‑league baseball
    team, the River City Rapids, on weekends, balancing her energetic bursts with occasional quiet tummy‑time stretches.
  arts: Janice Davis immerses herself in the whimsical world of Sesame Street, can recite the lyrics to 'Sing' by the Muppets, enjoys finger‑painting to the tunes of Disney’s 'Let It Go', and loves the
    bright illustrations of Eric Carle’s books, shaping her imagination through playful music and vibrant art.
  travel: Janice Davis loves weekend outings to the nearby Discovery Children’s Museum, has a cherished memory of Disney World’s Magic Kingdom, dreams of exploring the Great Barrier Reef’s aquarium in Australia,
    and prefers staying close to home where her mom can pack her favorite stuffed bunny for the car ride.
  culinary: Janice Davis relishes buttery mac and cheese, crunchy carrot sticks with hummus, and dinosaur‑shaped chicken nuggets, proudly helps stir the batter for banana pancakes and insists on adding
    a dash of cinnamon to her strawberry yogurt.
  core: Janice Davis is a curious, organized four‑year‑old who balances new adventures with familiar comforts, worries about small changes, and shows a charming mix of cooperation and assertiveness.
background:
  cultural: 'Janice is raised in Lake Bluff, Illinois, a suburban community in Lake County known for its lakeside recreation and close‑knit neighborhood atmosphere. Her family embraces typical Midwestern
    values: politeness, community involvement, and a practical outlook on daily life. Seasonal traditions such as Fourth of July fireworks on the lake, Thanksgiving gatherings, and local church picnics
    are part of her upbringing. The cultural environment emphasizes outdoor activities like swimming, fishing, and hiking, which influence her love for nature walks. Additionally, her household observes
    broader American customs and celebrates holidays with family‑centric rituals, providing a balanced cultural foundation that blends regional Midwestern sensibilities with a broader, inclusive American
    heritage.'
