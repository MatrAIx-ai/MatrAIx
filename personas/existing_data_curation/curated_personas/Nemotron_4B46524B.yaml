personas:
  professional: Soon Yeh, a seasoned transportation and logistics professional with three decades behind the wheel of commercial vehicles, leverages a methodical mindset and competitive drive to excel in
    route optimization, safety compliance, and client negotiations, while now channeling curiosity and organized planning into mentorship, consulting for emerging drivers, and expanding a part‑time East
    Asian art dealership.
  sports: Soon Yeh stays active through daily Tai Chi sessions in Flushing Meadows‑Corona Park, jogs with the Queens Road Runners club each spring, avidly follows the New York Knicks and New York Yankees,
    and joins a weekly community bowling league, balancing structured exercise with relaxed leisure sport.
  arts: Soon Yeh, an avid photographer and part‑time art dealer, frequents the Asia Society Museum, MoMA PS1, and the Queens Museum to study works by Ai Weiwei, Do Ho Suh, Henri Cartier‑Bresson, and Vivian Maier,
    and applies his keen eye to curate and market East Asian decorative pieces online.
  travel: Soon Yeh blends meticulous itinerary planning with spontaneous street photography on trips that have taken him to Kyoto’s tea houses, Singapore’s bustling ports, Shanghai’s historic galleries,
    and Acadia National Park’s rugged trails, while dreaming of future journeys to Istanbul’s bazaars and Berlin’s contemporary art scene.
  culinary: Soon Yeh, a self‑taught home chef, delights in mastering dishes like Peking duck, pho, kimchi fried rice, and Singapore’s chili crab, often using staples such as soy sauce, ginger, and gochujang,
    and showcases his culinary experiments at community cooking classes where he swaps recipes for diverse Asian flavors.
  core: Soon Yeh blends three decades of logistics expertise with an art‑savvy curiosity, channeling a disciplined, competitive spirit into mentoring the next generation while savoring Tai Chi, street photography,
    and Asian culinary adventures.
background:
  cultural: Soon is of East Asian descent, raised in a bilingual household where Mandarin and English were spoken. Growing up in Elmhurst, a Queens neighborhood known for its multicultural Asian community,
    he was immersed in both traditional customs—such as celebrating Lunar New Year and observing ancestor veneration—and mainstream American life. His family emphasizes hard work, respect for elders, and
    community service. While he completed high school locally, he maintains strong ties to his heritage through participation in local Asian festivals, language classes, and cultural organizations. This
    blend of cultures informs his values of reliability, curiosity, and appreciation for artistic expression.
attributes:
  skills: '[''Commercial Driving (CDL)'', ''Route Planning and Optimization'', ''Vehicle Maintenance'', ''Customer Relationship Management'', ''Sales Negotiation'', ''Inventory Tracking'', ''Bilingual Communication
    (English, Mandarin)'', ''Regulatory Compliance (DOT)'', ''Art Curation and Sales'', ''Time Management'']'
  hobbies: '[''Photography'', ''Gallery and Museum Visits'', ''Tai Chi'', ''Reading (history, technology)'', ''Community Cooking Classes'', ''Mentoring Youth on Transportation Careers'']'
  career_goals: Soon aims to transition from full‑time truck driving to a mentorship and consulting role, training new drivers on safety, efficiency, and technology adoption. He plans to obtain a Fleet
    Manager certification and eventually oversee a small fleet of delivery vehicles for a local Asian grocery distributor. Simultaneously, he wants to expand his part‑time art dealership, sourcing authentic
    East Asian artworks and decorative items for online sales, leveraging his cultural knowledge and sales acumen. His primary ambition is to secure a stable income stream that affords more family time,
    personal pursuits, and community involvement while maintaining a reputation for reliability and expertise.
