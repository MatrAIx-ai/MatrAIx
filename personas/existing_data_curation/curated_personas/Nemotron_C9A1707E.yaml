personas:
  professional: Emanuel Perez is a tiny architect in the making, building block towers with meticulous care and preferring the orderly rows over scattered piles, and they channel their love for structure
    into every early play session.
  sports: Emanuel Perez is a budding soccer enthusiast cheering for New Mexico United, dribbling a soft foam ball in the backyard and attending a tiny-tots soccer class while they also love watching the
    Los Angeles Dodgers on family TV.
  arts: Emanuel Perez delights in the rhythmic lullabies of Mariachi Vargas de Tecalitlán and the cheerful tunes of Raffi's Baby Beluga, and they often finger-paint bright reds and greens inspired by Día
    de los Muertos altars.
  travel: Emanuel Perez loves family road trips to the sandstone wonders of Carlsbad Caverns and weekend picnics on the sunny slopes of the Sandia Mountains, and they dream of exploring the vibrant murals
    of Mexico City one day.
  culinary: Emanuel Perez favors mild chile-infused cheese quesadillas and sweet corn tamales, proudly helping mash avocado for guacamole, though they sometimes throw a small tantrum when a spoonful of
    spicy salsa verde is offered.
  core: Emanuel Perez is an energetic, structure-loving toddler who thrives on routine, social play, and competitive games, yet wrestles with frequent worries and occasional meltdowns.
background:
  cultural: Emanuel’s family roots are Spanish, and he grows up in a bilingual household in Tijeras, New Mexico, where Spanish and English are spoken interchangeably. He is exposed to Hispanic cultural
    traditions such as Día de los Muertos altars, family gatherings featuring tamales, and Catholic celebrations. Local New Mexican influences, such as chile‑flavored foods and the desert landscape, shape
    his play and experiences. He hears Spanish lullabies and children’s songs, and his parents incorporate cultural values of family cohesion and respect for routine into daily life, reinforcing his preference
    for structure.
attributes:
  skills: '[''Walking confidently'', ''Running and racing peer toddlers'', ''Stacking wooden blocks'', ''Sorting shape puzzles'', ''Basic two‑word phrases in English and Spanish'', ''Following simple three‑step
    instructions'', ''Participating in group play'', ''Adhering to daily routines (e.g., hand‑washing, tooth‑brushing)'', ''Imitating adult activities (e.g., pretend cooking)'']'
  hobbies: '[''Building block towers'', ''Sorting colorful shapes'', ''Simple jigsaw puzzles'', ''Dancing to Latin music'', ''Playing with maracas'', ''Group games (e.g., Simon Says, turn‑taking)'', ''Outdoor
    exploring in the desert'', ''Listening to bilingual storybooks'']'
  career_goals: Emanuel is eager to become more independent in everyday tasks, such as dressing himself and feeding himself without assistance. He dreams of mastering reading simple picture books and, in
    the future, loves the idea of a job that follows clear, predictable routines—such as becoming a firefighter who adds order to emergencies or a builder who creates stable structures. He also hopes to
    be a helpful big brother for future siblings and to continue making friends by being reliable and organized. His competitive spirit fuels a wish to be the fastest at building the tallest block tower,
    and he is motivated to turn his love of routine into a future career with structure.
