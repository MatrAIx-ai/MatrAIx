  career_goals: Carmen aspires to advance from a press operator to a shift supervisor and eventually a plant manager, focusing on integrating sustainable textile practices and lean manufacturing principles.
    She plans to enroll in advanced technical courses and pursue a bachelor's degree in textile engineering or business management to broaden her strategic outlook. Long‑term, she dreams of launching a
    boutique that blends modern garment finishing techniques with traditional Mexican designs, allowing her to showcase both her technical expertise and cultural heritage.
