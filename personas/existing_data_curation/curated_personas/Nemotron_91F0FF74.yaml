  hobbies: '["Community Potlucks", "Storytelling Circles", "Traditional Dance", "Hiking", "Native Plant Gardening", "Weaving and Beadwork", "Yoga", "Reading Historical Novels", "Volunteer Health‑Fair Support"]'
  career_goals: Aariel aims to become a licensed clinical social worker within the next five years, concentrating on mental‑health counseling for American Indian communities in Michigan's Upper Peninsula.
    She plans to develop a community‑based wellness program that integrates evidence‑based practices with traditional tribal healing, secure grant funding, and eventually lead a regional outreach team.
    In the long term, she aspires to influence health policy to improve access to culturally competent care for indigenous populations.
