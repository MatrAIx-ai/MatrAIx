personas:
  professional: Aariel Catangay is a case manager at a tribal health clinic who skillfully blends evidence‑based mental‑health assessment with traditional talking circles and smudging rituals, relying on
    a meticulous, routine‑driven workflow and their natural sociability to coordinate resources, resolve crises, and foster community harmony.
  sports: Aariel Catangay enjoys hiking the rugged trails of the Porcupine Mountains, supports the Detroit Red Wings in winter, plays in a co‑ed intramural softball league on weekends, and attends bi‑weekly
    yoga classes to balance the high energy of community dance gatherings.
  arts: Aariel Catangay weaves intricate beadwork and participates in storytelling circles, drawing inspiration from musicians like Buffy Sainte‑Marie and Joanne Shenandoah, as well as folk artists such
    as the Avett Brothers, and regularly attends the Superior Art Museum’s Indigenous exhibitions and seasonal powwow performances.
  travel: Aariel Catangay prefers thoughtfully planned trips that blend nature and culture, having trekked the remote north‑shore of Lake Superior, explored Montreal’s Indigenous art galleries, and dreaming
    of a canoe expedition through the Pacific Northwest’s coastal rainforests.
  culinary: Aariel Catangay enjoys cooking hearty wild‑rice and bean stew with smoked trout, cedar‑plank salmon flavored with fresh sage and maple glaze, and often seasons dishes with sweetgrass, while
    also treating themselves to a slice of cherry pie from the family‑run bakery after community potlucks.
  core: Aariel Catangay balances methodical routines and a community‑centered career with a vibrant social life and deep cultural roots, though they often wrestle with anxiety and a tendency to overcommit
    to events.
background:
  cultural: Aariel identifies as a member of the Anishinaabe (Ojibwe) community, raised in the Upper Peninsula where tribal traditions intersect with rural Midwestern life. She grew up hearing Ojibwe language,
    participating in seasonal powwows, learning traditional crafts, and absorbing elders' teachings about land stewardship. Her cultural identity shapes her professional practice, motivating her to blend
    indigenous healing methods—such as talking circles and smudging—with modern healthcare. She values communal responsibility, respect for nature, and the preservation of oral history.
attributes:
  skills: '["Case Management", "Crisis Intervention", "Mental Health Assessment", "Health Education", "Culturally Sensitive Care", "Group Facilitation", "Conflict Resolution", "Advocacy", "Documentation",
