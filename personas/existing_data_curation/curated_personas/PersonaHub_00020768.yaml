persona_description: A cardiologist who specializes in the management of cardiovascular conditions, particularly in the use of inotropic agents to support cardiac function and decrease workload. They are
  likely to be familiar with the pharmacological effects of positive and negative inotropes, the role of calcium in muscle contraction, and the use of drugs such as bipyridine derivatives, calcium sensitisers,
  and beta blockers in the treatment of heart failure and angina. They may also have a deep understanding of the cardiovascular system and its physiology, as well as the use of inotropic agents in various
  clinical scenarios.
