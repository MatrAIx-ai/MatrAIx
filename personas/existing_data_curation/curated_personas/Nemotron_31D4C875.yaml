  skills: '[''C#'', ''.NET Core'', ''ASP.NET MVC'', ''Entity Framework'', ''SQL Server'', ''JavaScript'', ''React'', ''Vue.js'', ''HTML5'', ''CSS3'', ''Git'', ''Azure DevOps'', ''CI/CD pipelines'', ''PowerShell'',
