    science‑fiction'', ''Tech blog following'', ''Volunteer coding tutoring'', ''Celebrating Día de los Muertos'']'
  career_goals: Daniel aims to evolve from a senior developer to a solutions architect role within the next three years, focusing on cloud migration projects that leverage Azure and AWS services. He plans
    to earn Azure Solutions Architect and AWS Certified Solutions Architect credentials to formalize his expertise. Beyond certification, his ambition is to lead a small, high‑performing development team
    that delivers mission‑critical software for local agribusinesses and oil‑field operations, integrating IoT and data analytics to improve efficiency. He also envisions launching a boutique consultancy
    that provides affordable, customized software solutions for rural Texas enterprises, allowing him to balance professional growth with a steadier workload that reduces stress. A long‑term goal is to
    mentor the next generation of developers—both within his company and the broader community—ensuring a smooth knowledge transfer before he gradually transitions toward semi‑retirement.
