    electronics and Arduino projects'']'
  career_goals: Anthony aims to leverage his hands‑on warehouse experience into a supervisory role within the next three years. He plans to complete an Associate’s degree in Supply Chain Management and
    obtain an advanced forklift certification. His longer‑term ambition is to become a Logistics Manager or Supply Chain Analyst, ideally for a company that ships specialty goods such as artwork, antiques,
    or boutique products—areas that align with his artistic interests. He envisions leading a small team that implements lean‑warehouse practices, using data‑driven insights to cut costs and improve delivery
    reliability. In parallel, he hopes to develop a side e‑commerce venture selling locally crafted art pieces, handling all logistics himself to blend his creative passion with his professional expertise.
