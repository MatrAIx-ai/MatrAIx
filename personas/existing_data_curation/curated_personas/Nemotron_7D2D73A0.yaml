  career_goals: Although retired, Eugene aspires to complete a memoir that weaves together his personal history with the cultural narrative of Humboldt County, and to publish a series of illustrated essays
    on the region's natural landmarks. He aims to establish a small community archive of oral histories, leveraging his research and organizational strengths. Additionally, he hopes to lead occasional workshops
    on watercolor techniques and historical documentation for local seniors and aspiring artists, fostering intergenerational exchange while preserving his solitary but cooperative ethos.
