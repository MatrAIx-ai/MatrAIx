  career_goals: Long‑term, Lorraine aims to move from a receptionist role into office management within a community‑oriented organization in St. Louis. Over the next three years she plans to complete a
    bachelor's degree in Business Administration, earn certifications such as Microsoft Office Specialist and Google Workspace Administrator, and take leadership training workshops. She envisions supervising
    a small front‑desk team, streamlining client intake processes with technology, and spearheading outreach initiatives that connect residents with local services. In the longer horizon, she hopes to become
    an administrative director, shaping policy on customer experience and community engagement.
