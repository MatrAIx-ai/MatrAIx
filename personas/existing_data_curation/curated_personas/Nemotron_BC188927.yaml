personas:
  professional: Lorraine Long is a front‑desk specialist at a bustling St. Louis community organization whose natural curiosity for new office technologies balances with a practical, calm approach to multitasking,
    allowing them to efficiently juggle multi‑line calls, calendar scheduling, and visitor greetings while flexibly adapting to sudden surges in foot traffic.
  sports: Lorraine Long enjoys leisurely weekend walks through Forest Park, cheers on the St. Louis Cardinals and Blues for local sports pride, and participates in a casual community volleyball league,
    blending a low‑key fitness routine with a laid‑back approach to competition.
  arts: Lorraine Long is a dedicated patron of the St. Louis jazz scene, regularly visiting venues like Blues Alley, curating playlists with artists such as H.E.R., Leon Bridges, and Kendrick Lamar, and
    they lead a book club focused on contemporary fiction by authors including Colson Whitehead and Yaa Gyasi, which fuels lively cultural conversations.
  travel: Lorraine Long prefers spontaneous weekend road trips to nearby river towns like Hermann, MO, or music‑rich trips to New Orleans, planning itineraries on the fly with a flexible budget that balances
    cultural immersion, affordable boutique B&Bs, and occasional culinary explorations.
  culinary: Lorraine Long delights in preparing soul‑comfort dishes such as smoked collard greens, buttery cornbread, and baked mac & cheese, experimenting with flavor twists like Cajun‑spiced chicken wing
    glaze, and they love hosting relaxed potluck dinners where friends exchange homemade desserts and stories.
  core: Lorraine Long is a community‑oriented, tech‑curious receptionist who balances relaxed planning with a steadfast commitment to wellness, soulful cooking, and vibrant local culture.
background:
  cultural: Born and raised in St. Louis’s historic Midtown African‑American neighborhood, Lorraine is part of a family that traces its roots to the Great Migration from the Mississippi Delta. Her upbringing
    was shaped by strong community ties, weekly church attendance, and family gatherings centered around traditional soul food and music. She embraces African‑American cultural traditions, celebrating holidays
    such as Juneteenth and Kwanzaa, and she actively participates in local events that honor Black history, like the St. Louis Black History Month festivals. Lorraine also volunteers with youth mentorship
    programs and neighborhood clean‑up initiatives, reflecting a commitment to the civic legacy of African Americans in the city.
