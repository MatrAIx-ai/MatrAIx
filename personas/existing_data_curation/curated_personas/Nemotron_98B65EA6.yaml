personas:
  professional: Andrew Wilson, a seasoned landscaper and groundskeeper with advanced expertise in design, irrigation, hardscape construction, and equipment repair, leverages his methodical organization,
    talkative team coordination, and community‑focused kindness to deliver on‑budget projects while pursuing a supervisory foreman role, Certified Landscape Technician credential, and an eventual eco‑friendly
    landscaping business that mentors local youth.
  sports: Andrew Wilson is a devoted supporter of the LSU Tigers football team, regularly attends home games at Tiger Stadium, cheers for the New Orleans Saints during NFL season, participates in a local
    hunting club’s fall turkey hunt, and occasionally joins a weekend softball league with fellow crew members.
  arts: Andrew Wilson finds rhythm in gospel music, often playing keyboard at church services and drawing inspiration from artists like Kirk Franklin, CeCe Winans, and local blues guitarist Buddy Guy, while
    also enjoying the soulful sounds of the New Orleans jazz scene at festivals and keeping a modest collection of vintage vinyl records.
  travel: Andrew Wilson prefers meticulously planned weekend getaways to fishing hotspots such as Grand Isle and the Atchafalaya Basin, dreams of a spring expedition to Patagonia’s rivers for trout, and
    balances his love for adventure with family responsibilities by scheduling trips during school holidays and using a travel rewards credit card to offset costs.
  culinary: Andrew Wilson delights in cooking hearty Louisiana classics—gumbo with Andouille sausage and okra, jambalaya packed with shrimp and chicken, and a fiery blackened catfish—using fresh catches
    from the basin, locally sourced spices, and a well‑worn cast‑iron skillet, while hosting lively family gatherings around a long table filled with boudin, étouffée, and sweet iced tea.
  core: Andrew Wilson is a methodical, sociable landscaper who blends his love of fishing, gospel keyboards, and community service into a life of carefully scheduled projects, hearty meals, and steady ambition,
    even if they occasionally overcommit to social events and splurge on new hunting gear.
background:
  cultural: Andrew is an African-American raised in rural southeastern Louisiana, where Southern Black culture intertwines with Creole and Cajun traditions. He grew up immersed in church-centered community
    life, gospel music, family barbecues, and regional cuisine such as jambalaya and gumbo. His heritage emphasizes strong family bonds, mutual support, and participation in local events like Mardi Gras
    parades and Juneteenth celebrations, shaping his values of cooperation, hospitality, and community service.
attributes:
  skills: '[''Landscape design'', ''Plant identification and care'', ''Irrigation system installation and maintenance'', ''Hardscape construction'', ''Equipment operation and maintenance'', ''Safety compliance'',
    ''Project budgeting and scheduling'', ''Client communication'', ''Team leadership'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Cajun/Creole cooking'', ''Playing gospel music'', ''Church outreach'', ''LSU football fandom'', ''DIY home improvement'', ''Woodworking'', ''Vintage truck restoration'']'
  career_goals: He aims to advance to a supervisory foreman position within the next three years, obtain the Certified Landscape Technician designation, and eventually launch his own eco-friendly landscaping
    company that serves the Livingston Parish community, emphasizing sustainable practices and providing apprenticeship opportunities for local youth.
