personas:
  professional: Rex Dunand, a 16‑year‑old aspiring automotive technician, leverages their hands‑on experience with oil changes, tire rotations, and model‑kit construction to excel in precision work, while
    their love of chess and online shooters fuels a methodical, competitive mindset that makes them the go‑to organizer for school projects and future apprenticeship crews.
  sports: Rex Dunand stays active by biking through Rock Hill neighborhoods, shooting hoops in pickup games at the local park, and cheering for the Carolina Panthers and Charlotte Hornets, while they also
    join a community youth basketball league under the Rock Hill Eagles banner.
  arts: Rex Dunand immerses themselves in classic rock legends like Led Zeppelin and AC/DC and country icons such as Willie Nelson and Dolly Parton, often blasting these tracks while assembling model kits
    or during late‑night gaming marathons, and they occasionally catch indie film festivals at the nearby community theater.
  travel: Rex Dunand prefers short, road‑trip adventures, having explored the Blue Ridge Mountains and the coastal town of Charleston, while they daydream about a future visit to the Detroit Auto Show and
    a weekend getaway to Nashville’s music scene, always planning trips around a modest budget and school calendar.
  culinary: Rex Dunand enjoys simple, hearty meals like homemade pepperoni pizza, buttery grilled cheese with tomato soup, and backyard BBQ ribs, favoring ingredients such as mozzarella, fresh basil, smoked
    paprika, and a splash of whiskey‑infused sauce, though their cooking skill remains basic and they often rely on pre‑made sauces.
  core: Rex Dunand is a competitively driven teen who balances structured hands‑on work, strategic gaming, and a cautious streak toward money and health, and they constantly wrestle with stress and an ever‑present
    need for order.
background:
  cultural: Rex was raised in Rock Hill, South Carolina, in a working‑class white family that values self‑reliance, community ties, and modest traditions. The Southern environment shaped his appreciation
    for practicality and straightforward communication, while local school and church activities taught him the importance of responsibility and neighborly support. He grew up with regional foods like barbecue
    and collard greens, enjoys the outdoors, and has been influenced by both the classic Southern country music scene and contemporary mainstream media, giving him a diverse yet grounded cultural outlook.
attributes:
  skills: '[''basic automotive maintenance'', ''woodworking and tool use'', ''chess strategy'', ''first‑person shooter gaming'', ''time management for projects'', ''team coordination in school activities'']'
  hobbies: '[''online first‑person shooter gaming'', ''chess'', ''model kit building'', ''bike riding'', ''listening to classic rock and country music'', ''pickup basketball'']'
  career_goals: Rex wants to channel his practicality into a stable, skilled trade. His primary ambition is to earn an apprenticeship as an automotive technician or a journeyman carpenter, where he can
    build on his hands‑on abilities while working within a structured environment. He hopes this path will provide a reliable income, reduce his financial worries, and give him a clear progression ladder
    toward becoming a certified master mechanic or shop foreman. Alongside this, Rex is interested in continuing his education through a community‑college vocational program, aiming to earn certifications
    that will broaden his job prospects and give him a sense of long‑term security.
