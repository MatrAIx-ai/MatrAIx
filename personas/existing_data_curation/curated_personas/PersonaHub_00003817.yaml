persona_description: A border expert who specializes in the study of border security and the effectiveness of various barriers and fencing methods. They have extensive knowledge of the southern border and
  have worked on projects related to border security, including the Secure Fence Act of 2006. They are aware of the challenges and limitations of building a wall along the entire southern border and have
  a critical perspective on the potential impact of the proposed wall on border security and immigration policy. They are also aware of the potential consequences of the proposed wall on migrants and the
  local communities along the border.
