personas:
  professional: Dominique Brown is a veteran small‑scale farmer in Virginia who blends decades of hands‑on expertise in crop rotation, integrated pest management, and DIY irrigation with a curious yet practical
    mindset, embracing new sustainable practices while allowing day‑to‑day obligations to drift, and, driven by a competitive streak, they strive to demonstrate the viability of organic farms rooted in
    community tradition.
  sports: Dominique Brown enjoys early‑morning walks through their garden and weekly birdwatching hikes, occasionally joins a community senior softball league, and passionately supports the Richmond Flying
    Squirrels and the Virginia Cavaliers, treating fitness as a flexible complement to farm work rather than a rigid regimen, and when they play, they relish the camaraderie of the local field.
  arts: Dominique Brown channels creative energy through quilting inspired by the improvisational patterns of Gee's Bend and sings gospel harmonies in the church choir, often performing songs by Mahalia
    Jackson and Aretha Franklin, while they find solace in the historical fiction of Jesmyn Ward and the soulful blues of B.B. King.
  travel: Dominique Brown prefers low‑key, road‑trip style travel, often hitting roadside farmers' markets in North Carolina’s Outer Banks or spending a weekend exploring the historic streets of Williamsburg,
    while saving for a dream cultural immersion trip to the culinary markets of Oaxaca, Mexico, balancing a love of discovery with a pragmatic budget that sometimes leaves itineraries to the last minute,
    and when they set out, they relish spontaneous detours.
  culinary: Dominique Brown is an accomplished home cook who transforms garden harvests into soulful Southern fare—slow‑cooked collard greens with smoked turkey, sweet‑potato casserole topped with toasted
    pecans, and fresh‑baked cornbread slathered in honey butter—while also perfecting small‑batch peach preserves and dill pickles, showcasing an affinity for heirloom varieties and a willingness to experiment
    with spices like smoked paprika and cayenne, and when they serve a meal, they always share a story behind the dish.
  core: Dominique Brown is a savvy 58‑year‑old farmer whose fierce drive to prove the value of organic agriculture coexists with a habit of misplacing tools in the barn and a skeptical eye toward every
    new market trend, and they often rely on intuition over formal planning.
background:
  cultural: Dominique’s cultural identity is rooted in the African‑American farming traditions of Virginia. Her family has a legacy of working the land that dates back generations, blending the resilience
    of a post‑civil‑rights era with the richness of Southern Black cultural practices. She grew up attending church services that emphasized community, music, and food, and she continues to celebrate holidays
    such as Juneteenth and family reunions with soulful cooking and storytelling. Her experiences navigating both the opportunities and challenges of being a Black woman in a predominantly white agricultural
    sector have shaped a pragmatic yet hopeful outlook, fostering a strong sense of pride in her heritage and a commitment to passing that legacy on to the next generation.
attributes:
  skills: '["Crop Rotation Planning", "Integrated Pest Management", "Organic Soil Amendment", "Farm Machinery Maintenance", "DIY Greenhouse Construction", "Livestock Care", "Inventory Tracking", "Basic
