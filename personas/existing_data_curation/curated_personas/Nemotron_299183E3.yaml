personas:
  professional: Delia Medeiros is an aspiring junior technologist who blends art and code, spending afternoons designing interactive graphic‑novel style stories in Scratch for classmates while leading small
    art‑workshop sessions at the Rosette community center, reflecting their curious, organized yet flexible mindset and strong drive to help peers learn.
  sports: Delia Medeiros enjoys after‑school swimming at the Brookside Aquatics Club, follows the local high‑school basketball team the Riverdale Raptors and cheers from the bleachers on Wednesday nights,
    while preferring low‑key recreational activities like weekend park yoga sessions with a small group of friends.
  arts: Delia Medeiros spends weekends sketching en plein air, channeling the bold colors of Frida Kahlo and the streetwise edge of Banksy, collects graphic novels such as "Watchmen" by Alan Moore and "Maus"
    by Art Spiegelman, and performs traditional Spanish folk songs like "La Paloma" at family gatherings, weaving together visual and musical influences into a personal artistic voice.
  travel: Delia Medeiros’ travel style blends family‑oriented weekend road trips to nearby historic sites like Colonial Williamsburg with long‑summer aspirations to explore the Louvre in Paris and the vibrant
    murals of Oaxaca, always planning itineraries through online museum virtual tours before setting foot on the ground, reflecting their organized curiosity and love for small‑group experiences.
  culinary: Delia Medeiros enjoys cooking at home, mastering traditional Mexican dishes such as chicken tamales and salsa verde alongside family, often adding avocado to quesadillas for extra creaminess,
    and experiments with baking churros topped with cinnamon sugar, showing a keen palate for corn, cacao, and fresh herbs while occasionally over‑seasoning dishes when excitement takes over.
  core: Delia Medeiros is a creatively curious 13‑year‑old who stitches together art, code, and community service, habitually over‑packing sketchbooks and sometimes forgetting to restock antihistamines.
background:
  cultural: Delia is a second‑generation Mexican‑American raised in a bilingual household in Roselle, New Jersey. Her family upholds Mexican traditions such as Día de los Muertos celebrations, preparing
    homemade tamales, and listening to mariachi music, while also integrating into the multicultural fabric of New Jersey life. This bicultural upbringing nurtures her appreciation for diverse artistic
    expressions, fuels her desire to honor her heritage, and shapes her commitment to bridging cultural gaps through collaborative creativity.
