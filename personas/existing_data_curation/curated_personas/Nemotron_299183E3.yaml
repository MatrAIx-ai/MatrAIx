  hobbies: '[''Sketching and painting'', ''Visiting art museums'', ''Reading graphic novels'', ''Learning and performing Spanish folk songs'', ''Cooking traditional Mexican recipes'', ''Coding simple interactive
    stories'', ''Volunteering at community center art workshops'', ''Participating in a small‑group book club'']'
  career_goals: Delia aspires to blend her artistic talent with her desire to help others, envisioning a future as a community muralist or art therapist who uses visual storytelling to foster cultural pride
    and emotional healing. She aims to attend a high school with a robust arts program, later study fine arts and social work, and eventually lead collaborative art projects that celebrate Mexican heritage
    while strengthening neighborhood cohesion.
