  career_goals: William aims to transition from employee to entrepreneurship by launching a boutique landscaping firm that specializes in environmentally conscious, art‑inspired garden designs for residential
    clients in Isabella County and the surrounding region. He plans to earn a Master Gardener certification and complete a part‑time certificate program in Landscape Architecture to deepen his design expertise.
    William also envisions mentoring apprentices, sharing his knowledge of sustainable practices and artistic landscaping, and collaborating with local community groups on public beautification projects
    that celebrate the natural and cultural heritage of central Michigan.
