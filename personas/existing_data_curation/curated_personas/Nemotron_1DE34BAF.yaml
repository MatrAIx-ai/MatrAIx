  career_goals: Although only two years old, Jonathon already shows nascent ambitions. He frequently points to pictures and says he wants to "make pictures" or "tell stories," indicating an early desire
    to become an artist or storyteller. He is also fascinated by building and sometimes declares he wants to "make big buildings," reflecting an emerging interest in creation and design driven by his vivid
    imagination.
