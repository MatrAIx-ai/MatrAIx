personas:
  professional: Jonathon Neal is a budding little architect, using building blocks to explore spatial relationships and experimenting with color sorting, and they demonstrate an early blend of imaginative
    curiosity and a balanced approach to organization and flexibility.
  sports: Jonathon Neal loves the sandbox at Heritage Park in Victorville, attends a toddler soccer class on Saturday mornings, cheers for the Los Angeles Dodgers, and they often pretend to be a desert
    coyote during play, showcasing an enthusiastic yet balanced approach to fitness.
  arts: Jonathon Neal delights in community library storytime, draws colorful dinosaurs with crayons, hums along to The Wiggles and Disney soundtracks, and they occasionally stage imaginative performances
    with their stuffed rabbit, illustrating how the arts shape their identity and leisure.
  travel: Jonathon Neal has visited Joshua Tree National Park’s short nature trail, the Disneyland Resort, and the local desert aquifer museum, and they prefer short car rides with their favorite stuffed
    rabbit while dreaming of a future beach vacation, reflecting a curiosity‑driven travel style balanced by family constraints.
  culinary: Jonathon Neal favors mac and cheese with hidden peas, banana slices, and peanut butter toast, loves to stir their own oatmeal despite the mess, and they have a quirky habit of sprinkling cinnamon
    on everything, showcasing an emerging palate and playful cooking attempts.
  core: Jonathon Neal, a two‑year‑old explorer, blends vivid imagination with budding independence, turning everyday play into miniature design projects, collecting coins, battling eczema, and humming Disney
    tunes, and they constantly seek new ways to learn.
background:
  cultural: Jonathon is raised in a White, Anglo‑American family living in Victorville, California. His household blends typical suburban Southern California values—such as frequent visits to local parks,
    community library storytime sessions, and participation in mainstream American holidays—with occasional exposure to multicultural events held in the broader San Bernardino County region. The high‑desert
    environment encourages outdoor exploration, while his family’s emphasis on early literacy and creative play shapes his emerging love for art, music, and imaginative discovery.
