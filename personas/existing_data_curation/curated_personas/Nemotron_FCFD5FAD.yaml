personas:
  professional: Frank Johnson is a seasoned retail associate with over 15 years of hands‑on experience in customer service, inventory control, and POS system management, whose practical, solution‑focused
    mindset and relaxed attitude toward strict planning help them calmly resolve store challenges while actively pursuing an assistant‑manager promotion.
  sports: Frank Johnson is an avid outdoorsman who hunts and fishes with the local Allegheny Bowhunting Club in the fall, hits the gym for weight training during the week, and follows the Pittsburgh Steelers
    every Sunday, cheering loudly at games and keeping up with the team's latest stats.
  arts: Frank Johnson unwinds by listening to classic rock legends like Bruce Springsteen and The Eagles while hand‑crafting furniture, devours mystery novels by Agatha Christie and Lee Child, and enjoys
    the bluegrass stage at the Warren County Fair featuring fiddler Ricky Skaggs.
  travel: Frank Johnson prefers low‑cost, self‑guided road trips to natural destinations, having fished the Boundary Waters in Minnesota and hiked the Shenandoah Valley, while dreaming of a heritage tour
    of the Scottish Highlands and a crisp autumn drive through New England's White Mountains.
  culinary: Frank Johnson’s culinary scene revolves around hearty Pennsylvania Dutch fare—home‑brewed amber ale, bratwurst with sauerkraut, peppered venison stew, and apple crisp made with locally sourced
    apples and cinnamon—reflecting his self‑taught cooking skills that favor flavor over finesse.
  core: Frank Johnson is a practical yet slightly disorganized outdoorsman who loves DIY projects, home‑brewed beer, and mystery novels, dreaming of managing a community hardware store while wrestling with
    chronic worry and an occasional habit of late‑night detective TV binges.
background:
  cultural: Frank grew up in a modest, working‑class family in rural Pennsylvania, descended primarily from German and Irish ancestors. His upbringing reflects the region’s values of hard work, self‑reliance,
    and community involvement, with a cultural mix of traditional Protestant ethics and the lingering influence of Pennsylvania Dutch heritage that emphasizes practicality and modesty.
