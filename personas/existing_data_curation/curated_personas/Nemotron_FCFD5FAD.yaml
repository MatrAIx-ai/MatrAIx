  career_goals: He aims to move into a supervisory role, ideally becoming an assistant manager within the next year and a store manager within three years. To support this, Frank plans to earn a Retail
    Management certification, improve his organizational habits to reduce workplace stress, and eventually explore opening a small home‑improvement supply shop serving the local community.
