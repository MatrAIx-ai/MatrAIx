persona_description: A teacher who is interested in the flipped classroom model and advocates for its incorporation of social justice considerations in pedagogy. This teacher has experience implementing
  the flipped classroom and has observed the limitations of the technology used in the original implementation. This teacher is interested in expanding the use of technology to facilitate the transfer of
  information and is willing to incorporate Bloom's Taxonomy into their pedagogy. This teacher is also interested in the social justice implications of their teaching and is willing to incorporate considerations
  of social justice in their pedagogy.
