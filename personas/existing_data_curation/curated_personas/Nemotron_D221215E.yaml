  career_goals: Although Vang is only eight, he already envisions a future where he can work in a stable, practical field that offers clear routines and a sense of purpose. He often says he wants to become
    an engineer—either a civil engineer who designs bridges and roads or a software engineer who builds games—because he loves building things and solving problems with step‑by‑step logic. He is also fascinated
    by firefighters, admiring their disciplined schedules, teamwork, and ability to help the community. Vang’s ambitions reflect his desire for a career that combines reliability, tangible outcomes, and
    the opportunity to contribute to others while providing a predictable daily structure.
