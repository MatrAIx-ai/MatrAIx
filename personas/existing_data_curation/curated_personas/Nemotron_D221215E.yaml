personas:
  professional: An organized student researcher Vang Nguyen applies the methodical planning of LEGO building to school science projects, thriving on step‑by‑step instructions and double‑checking every detail;
    they turn their natural anxiety into a reliable strength during group assignments.
  sports: A dedicated swimmer Vang Nguyen attends small‑group lessons at the local pool with the Virginia Beach Junior Dolphins, enjoys the regimented practice schedule, and occasionally cheers for the
    nearby Virginia Beach Beach Grizzlies soccer team during weekend games; they find the predictable routine comforting.
  arts: A budding artist Vang Nguyen draws cartoons inspired by Disney’s Mickey Mouse and Studio Ghibli’s Totoro, collects Stan Lee comic books, and practices calligraphy by copying characters from traditional
    poetry sheets, while listening to the pop tunes of Taylor Swift as they build LEGO structures.
  travel: A curious explorer Vang Nguyen loves short family trips to nearby Washington, D.C. museums, dreams of visiting the cherry blossoms in Kyoto, and meticulously plans each journey with a color‑coded
    map and checklist, balancing the excitement of new sights with the comfort of familiar routines; they relish the adventure but rely on a predictable agenda.
  culinary: A junior chef Vang Nguyen enjoys assembling spring rolls with rice paper, shrimp, and fresh herbs, relishes the aromatic broth of pho, and practices making bánh mì‑style sandwiches, though they
    often over‑sauce their creations in pursuit of the perfect flavor balance.
  core: Vang Nguyen is a routine‑loving, detail‑obsessed eight‑year‑old who channels anxiety into meticulous LEGO builds, savors structured play, and balances quiet confidence with occasional meltdowns;
    they constantly seek order in a world that feels unpredictable.
background:
  cultural: Vang is a Vietnamese‑American growing up in Virginia Beach. His parents immigrated from Vietnam and maintain strong ties to their cultural heritage. At home, Vietnamese is spoken alongside English,
    and the family celebrates traditional holidays such as Tết (Lunar New Year) with special meals, red envelopes, and decorations. Vang enjoys dishes like pho and bánh mì and has learned to make simple
    spring rolls with his mother. He attends a Saturday Vietnamese language school where he practices reading and writing Vietnamese characters, deepening his connection to his roots. While he embraces
    American customs—playing sports, attending public school, and watching popular cartoons—he also respects Vietnamese values of family cohesion, respect for elders, and community support, which shape
    his daily routines and social expectations.
