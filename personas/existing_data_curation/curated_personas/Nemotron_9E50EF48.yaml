  hobbies: '["Watercolor painting", "Visiting galleries and museums", "Theater attendance", "Gardening", "Reading (historical fiction, biographies)", "Genealogy research", "Bridge club", "Hiking", "Bird
    watching", "Cooking and entertaining", "Traveling to cultural festivals", "Volunteering at community center"]'
  career_goals: Kimberly aims to establish a community art hub in New Carlisle that offers intergenerational workshops, rotating exhibitions, and local artist showcases. She seeks to serve on the board
    of the St. Joseph County Historical Society, mentor emerging community leaders, and complete a series of online art history courses. Over the next few years, she hopes to author a memoir that intertwines
    her personal story with the region’s history, travel to major art museums and cultural festivals across the country, and become a recognized speaker at regional senior forums on the value of arts in
    community well‑being.
