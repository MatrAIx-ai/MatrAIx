personas:
  professional: Kimberly Dockery, a veteran community arts coordinator in New Carlisle, blends meticulous event planning with spontaneous creativity, leveraging their strong communication, digital outreach,
    and mentoring abilities to curate intergenerational exhibitions while navigating the competitive dynamics of volunteer leadership with a skeptical eye toward hidden agendas.
  sports: Kimberly Dockery enjoys weekend hikes on the Indiana Dunes trails, participates in the New Carlisle Birdwatchers Club, attends Indiana Pacers games for a dose of basketball excitement, cheers
    on the Indianapolis Colts during the fall football season, and occasionally joins a community 5K charity run, approaching fitness with a competitive step‑count challenge on their smartwatch.
  arts: Kimberly Dockery spends afternoons painting watercolors of Midwestern landscapes inspired by the works of Grant Wood and Andrew Wyeth, attends performances at the Circle Theatre starring local actors
    like Susan Randall, curates gallery shows featuring regional artists such as Sherry Lentz, and they find solace listening to folk legends Bob Dylan and Joan Baez while crafting quilts.
  travel: Kimberly Dockery plans meticulously for cultural pilgrimages, having visited the Metropolitan Museum of Art in New York, the Art Institute of Chicago, and the National Gallery of Canada, while
    dreaming of attending the Venice Biennale and exploring the historic streets of Dublin, yet balances these ambitions with a budget‑conscious approach that favors off‑season train travel and staying
    with family in neighboring states, relying on their own research to find the best deals.
  culinary: Kimberly Dockery, an adept home chef, delights friends with elaborate dishes like rosemary‑infused roast chicken, creamy mushroom risotto, and blueberry crumb cake, while regularly incorporating
    fresh basil, thyme, and mint from their herb garden into meals, though they sometimes let the timer slip during the Thanksgiving turkey, resulting in a charred centerpiece.
  core: Kimberly Dockery is a charismatic, community‑focused art advocate who balances meticulous planning with spontaneous watercolor splashes, competes quietly for volunteer leadership, watches step counts
    obsessively, and habitually forgets to water indoor plants while recalling vivid Midwestern stories at every gathering, and they bring vibrant energy to every room they enter.
background:
  cultural: Kimberly was raised in a small Midwestern town in Indiana, immersed in a close‑knit, predominantly white community where family gatherings, church events, and local fairs played central roles.
    Her upbringing emphasized community service, modesty, and a strong work ethic. She carries the traditions of Midwestern hospitality, a love for regional history, and a deep appreciation for local arts
    and crafts. While her ancestry includes German and Irish roots, she primarily identifies with the broader cultural values of the American Midwest—independence, pragmatism, storytelling through community
    events, and a sincere commitment to helping others.
attributes:
  skills: '["Event planning", "Community outreach", "Public speaking", "Arts curation", "Digital literacy", "Social media management", "Mentoring", "Genealogy research", "Crafting (quilting, knitting)",
