personas:
  professional: Lorie Brown, a 23-year-old food-service manager at a busy Bayou-town eatery, blends rigorous scheduling, inventory control, and ServSafe compliance with an innate talent for smoothing staff
    conflicts, and is charting a path toward regional operations leadership while pursuing a Certified Hospitality Supervisor certification and an online hospitality management degree.
  sports: Lorie Brown enjoys early-morning fishing on the Atchafalaya Bayou, rides with the Bayou Cyclists club on weekend bike tours, plays occasional co-ed softball in the local park, and cheers for the
    New Orleans Saints and LSU Tigers while never missing a game at the Superdome.
  arts: Lorie Brown is a frequent attendee of Zydeco festivals, dancing to the electric accordion of Clifton Chenier and the timeless grooves of Rockin Sidney, while also devouring memoirs of Southern resilience
    like the book 'Unlocked' and curating a modest record collection that includes the soulful tones of Dr John.
  travel: Lorie Brown prefers spontaneous road trips along the Gulf Coast, like the breezy drive from Berwick to New Orleans for a weekend music crawl, yet also plans careful weekend getaways to Savannah's
    historic squares and dreams of a future sailing tour of the Canadian Maritimes when their café funds allow.
  culinary: Lorie Brown experiments with authentic Cajun dishes such as chicken and sausage gumbo, crawfish etouffee, and jambalaya, favoring Andouille sausage, file powder, and a splash of Creole mustard,
    and often brings their creations to neighborhood potlucks, though they sometimes over-season with hot sauce in the name of flavor.
  core: Lorie Brown is a compassionate, structured-yet-flexible 23-year-old food-service manager who balances a love for Southern hospitality, spontaneous culinary experiments, and community service, while
    occasionally misplacing receipts and forgetting to schedule routine dental visits.
background:
  cultural: Lorie was raised in Berwick, a small town in St. Mary Parish, Louisiana, within a close‑knit white Southern family that values hospitality, church participation, and community ties. Growing
    up, she was immersed in the local traditions of Mardi Gras, zydeco music, and Southern cuisine, often helping at family gatherings and church events. This upbringing fostered a strong sense of responsibility
    toward others and an appreciation for the region’s blend of French‑Creole influences, which she incorporates into both her professional and personal life.
attributes:
  skills: '[''Team leadership'', ''Staff scheduling'', ''Inventory management'', ''Cost control'', ''Food safety compliance'', ''POS system operation'', ''Menu planning (Southern/Cajun focus)'', ''Customer
    service'', ''Conflict resolution'', ''Employee mentorship'', ''Budgeting and financial reporting'']'
  hobbies: '[''Cajun/Creole cooking'', ''Community volunteering (food bank, clean‑up)'', ''Fishing'', ''Biking'', ''Zydeco music festivals'', ''Yoga'', ''Reading memoirs on Southern culture'']'
  career_goals: Lorie aims to advance from her current role as a food‑service manager to a regional operations manager within the next five years, leveraging additional certifications such as the Certified
    Hospitality Supervisor (CHS). She plans to complete a bachelor’s degree in Hospitality Management, either online or part‑time, to broaden her strategic expertise. Ultimately, she hopes to open a community‑focused
    café that provides affordable meals and a training program for local youth, integrating her desire to help others and promote harmony in her hometown.
