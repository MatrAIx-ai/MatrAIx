persona_description: A management researcher who specializes in exploring the social and ethical aspects of corporate responsibility, particularly in the pharmaceutical industry. She is interested in understanding
  the role of social responsibility in drug development, particularly in the context of orphan drugs, which are drugs that treat rare diseases. She is also interested in exploring the potential economic
  and non-economic benefits that companies can derive from integrating orphan drug development with their core business activities. Her research interests include corporate social responsibility, pharmaceutical
  industry, orphan drugs, and rare diseases.
