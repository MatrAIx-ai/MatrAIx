personas:
  professional: Keyla Cortez is a veteran warehouse safety specialist with certified forklift operation, inventory optimization, and bilingual training expertise, who leverages their curiosity and calm
    demeanor to design engaging safety workshops that blend practical rigor with artistic visual aids.
  sports: Keyla Cortez enjoys dancing to folk rhythms and salsa at local community centers, stays fit through weekly walks along Lake Michigan and occasional yoga, and follows the Chicago Bulls, White Sox,
    and Chicago Fire with enthusiastic, season‑long fandom.
  arts: Keyla Cortez channels their love for watercolor landscapes inspired by Andean vistas and Chicago architecture, regularly attending the Art Institute of Chicago to view works by Frida Kahlo, Diego
    Rivera, and contemporary Latin American painter Beatriz Milhazes, while curating community exhibits that showcase traditional textiles and modern interpretations.
  travel: Keyla Cortez prefers thoughtfully planned trips that blend cultural immersion with leisure, having explored highland towns of the Andes, coastal villages of South America, and domestic getaways
    to Santa Fe and the Great Lakes, while dreaming of a pilgrimage to an ancient Andean citadel near the Sacred Valley.
  culinary: Keyla Cortez delights in preparing classic coastal‑highland dishes such as ceviche, lomo saltado, and causa, expertly using ingredients like aji amarillo, quinoa, fresh cilantro from their garden,
    and sweet potatoes, and while their cooking skill is polished for family potlucks, they occasionally over‑season dishes in their eagerness to share bold flavors.
  core: Keyla Cortez blends a steady, compassion‑driven work ethic in warehouse safety with an artistic soul that paints Andean scenes, cooks vibrant dishes, and mentors youth, all while humming folk tunes
    during forklift runs and never missing a community festival.
background:
  cultural: Keyla was born in Lima, Peru, and moved to Chicago in her early thirties with her husband. She grew up in a family that celebrated Peruvian traditions such as Inti Raymi, the Señor de los Milagros
    procession, and the Marinera dance, and she learned to prepare home‑cooked dishes that blend coastal and high‑land flavors. Fluent in Spanish and comfortable in English, she bridges the two cultures
    by translating for coworkers and leading bilingual workshops. In Chicago, she participates actively in the city’s Peruvian diaspora, attending the annual Feria del Perú, supporting local artisans, and
    sharing her cultural heritage through art exhibitions, cooking classes, and community festivals. Her Catholic upbringing is interwoven with respect for Andean customs, giving her a hybrid identity that
    values both her Peruvian roots and her American life.
attributes:
  skills: '[''forklift operation'', ''inventory tracking'', ''load planning'', ''OSHA safety compliance'', ''team training'', ''bilingual Spanish-English communication'', ''conflict mediation'', ''community
