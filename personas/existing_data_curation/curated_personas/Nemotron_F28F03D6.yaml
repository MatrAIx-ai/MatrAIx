  hobbies: '[''watercolor painting'', ''visiting art museums'', ''Peruvian folk dancing'', ''cooking traditional Peruvian cuisine'', ''volunteering at a senior center'', ''community gardening'', ''reading
    historical nonfiction'', ''organizing Peruvian cultural festivals'', ''playing charango'', ''walking along Lake Michigan'']'
  career_goals: Keyla aims to earn an OSHA certified safety trainer credential and move into a supervisory role that lets her shape training programs and safety culture at her warehouse. She also plans
    to complete her associate degree in community arts or social services, enabling her to launch a weekend workshop where she teaches Peruvian textile techniques and organizes intercultural art shows for
    the local immigrant community. Long-term, she envisions mentoring younger workers and volunteers, building a modest cooperative that sells handcrafted Andean rugs and supports scholarships for Peruvian
    youth.
