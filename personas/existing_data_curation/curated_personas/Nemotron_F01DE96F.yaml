  hobbies: '[''Watercolor painting'', ''Daily journaling'', ''Solo hiking (Boquerón Dry Forest)'', ''Reading avant‑garde literature and Puerto Rican poetry'', ''Listening to classical piano and plena music'',
    ''Attending webinars on behavioral economics'', ''Crossword and Sudoku puzzles'', ''Garden cultivation (herbs and tropical plants)'']'
  career_goals: Eloise aims to transition from corporate analysis to founding a boutique investment advisory that focuses on sustainable and culturally resonant projects in Puerto Rico, especially renewable
    energy and eco‑tourism ventures. She plans to obtain the Chartered Financial Analyst (CFA) designation to reinforce her credibility, and to develop a mentorship platform for women in finance, offering
    remote coaching that respects her preference for solitude. Reducing her stress by implementing structured project‑management tools is also a personal ambition, allowing her to meet deadlines without
    sacrificing her creative analytical style.
