persona_description: A public health researcher and policy analyst with expertise in the analysis of food access and its impact on community health. She is particularly interested in the development and
  implementation of community-based initiatives to improve food access in underserved areas. She has worked with MAPC's Public Health and Data Services departments and is familiar with the organization's
  research methodologies and data analysis techniques. She is also familiar with the Massachusetts Local Food Action Plan and its goals of improving food access and promoting local food production. She
  is interested in exploring the potential for further application of the analysis and would like to learn more about the methodology used in the project.
