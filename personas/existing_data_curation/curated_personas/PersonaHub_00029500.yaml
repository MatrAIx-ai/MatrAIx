persona_description: A wildlife management scientist who specializes in the study of wild boars and bears, particularly in the management and conservation of these species. They have conducted research
  on the management and interactions between different actors in the management of wild boars and bears, and have published findings on the importance of bear-proofing areas to protect both bears and humans.
  They are also interested in the management of nuisance bears and have worked on educating the public about the importance of bear-proofing trash containers and other management strategies.
