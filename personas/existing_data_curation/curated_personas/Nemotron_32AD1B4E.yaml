  career_goals: Lina aims to progress to a senior engineering role where she can lead technical architecture and mentor junior developers, especially women and under‑represented minorities in tech. She
    envisions launching a side project that fuses Colombian cultural storytelling with interactive web experiences, leveraging her art appreciation and technical expertise. Long‑term, she hopes to become
    a tech lead who champions inclusive product design and cultivates a balanced, low‑stress work environment that mitigates her own sensitivity to stress while fostering high performance.
