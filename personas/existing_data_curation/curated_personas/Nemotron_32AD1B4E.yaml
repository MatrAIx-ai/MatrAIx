personas:
  professional: Lina Mino, a 40‑year‑old full‑stack software developer, fuses Python and JavaScript expertise with a sharp eye for visual data storytelling, leading API design and UI projects while channeling
    her competitive streak into hackathon victories and her skeptical mindset into rigorous code reviews that prioritize security and quality.
  sports: Lina Mino stays active by joining the local Cabarrus County hiking club for weekend trail expeditions in the Piedmont, cheering on the Charlotte Hornets during NBA season, and taking salsa‑inspired
    cardio classes at a community center, while maintaining a disciplined routine of yoga and occasional 5 k runs with the Charlotte Running Club.
  arts: Lina Mino channels her love of acrylic painting into vibrant canvases inspired by the surrealist brushwork of Frida Kahlo and the bold colors of Diego Rivera, regularly attends gallery openings
    featuring contemporary artists who explore folk traditions, and finds solace in listening to classic salsa legends like Celia Cruz and modern indie folk artists such as Bon Iver while reading sci‑fi
    epics by Philip K. Dick.
  travel: Lina Mino’s travel style blends meticulous planning with spontaneous adventure, favoring weekend escapes to Asheville’s Blue Ridge Mountains and longer cultural journeys to Cartagena’s historic
    walled city and Kyoto’s temples, while balancing her limited vacation days and a modest travel budget by using points from a travel rewards credit card.
  culinary: Lina Mino, an avid home cook, masters traditional dishes like arepas stuffed with cheese, ajiaco soup brimming with corn and chicken, and empanadas seasoned with cumin and plantain, often pairing
    them with fresh cilantro and lime, while her culinary experiments are tempered by a habit of over‑seasoning that she humorously calls her “flavor sprint” during weekend cooking marathons.
  core: Lina Mino, a 40‑year‑old tech‑savvy artist, balances a competitive coding mindset with a nurturing passion for visual art, yet wrestles with chronic worry that fuels both meticulous work and occasional
    burnout.
background:
  cultural: Lina grew up in a bilingual Colombian‑American household, where family gatherings featured music like cumbia and vallenato, homemade arepas, and stories of her grandparents' hometown. Celebrations
    of Colombian holidays such as Día de la Independencia and Carnaval de Barranquilla kept her connected to her roots. After moving to Charlotte, she became active in the local Colombian community, attending
    cultural festivals and sharing traditional cuisine with friends. This bicultural upbringing instilled a deep appreciation for art, storytelling, and community, influencing her creative coding style
    and her desire to bridge cultural narratives with technology.
