  hobbies: '[''Hip‑Hop dance'', ''Soccer'', ''Reading graphic novels'', ''Exploring bayous and nature walks'', ''Singing in church choir'', ''Digital drawing and animation'', ''Science club experiments'',
    ''Cooking family recipes'', ''Journaling'', ''Organizing school events'']'
  career_goals: Inspired by the resilience of her community after hurricanes, Jahlesa dreams of studying environmental science and eventually becoming an environmental engineer who designs flood‑resilient
    infrastructure for coastal Louisiana. She hopes to attend a STEM‑focused high school program and later a university where she can combine engineering with community outreach. Alongside this, she envisions
    mentoring younger students through school clubs and after‑school programs, sharing her love of science and helping them build confidence in tackling real‑world problems. Ultimately, she wants a career
    that blends technical expertise with the ability to give back to her neighborhood and protect the environment she cares about.
