  career_goals: Brittany aims to transition into a senior advisory role where she can mentor younger project managers and champion the integration of artistic thinking into corporate strategy. Over the
    next five years she plans to launch a consultancy focused on helping Alabama nonprofits embed creative project frameworks, and she hopes to become a frequent speaker at regional conferences on flexible
    project leadership. She also aspires to achieve a healthier work‑life balance by reducing workplace stress through mindfulness practices and by dedicating more time to community arts initiatives.
