personas:
  professional: Brittany Barbare is a veteran project manager who blends Agile, Waterfall, and design‑thinking methodologies to steer complex healthcare, manufacturing, and nonprofit initiatives, using
    their competitive drive and artistic curiosity to craft innovative solutions while tolerating a relaxed, occasionally chaotic schedule.
  sports: Brittany Barbare stays active through weekly yoga at the Birmingham Yoga Studio, walks historic neighborhoods with the Birmingham Senior Walking Club, and supports the Alabama Crimson Tide football
    team and the Birmingham Barons baseball club, while occasionally joining a community tennis league for casual matches.
  arts: Brittany Barbare immerses themselves in the visual arts by attending exhibitions of Georgia O’Keeffe and Monet at the Birmingham Museum of Art, practices watercolor inspired by John Singer Sargent,
    documents historic architecture with a camera in the style of Edward Steichen, and finds inspiration at local jazz nights featuring tributes to Miles Davis and contemporary saxophonist Derrick Johnson.
  travel: Brittany Barbare favors spontaneous weekend road trips to historic Southern cities such as Charleston, Savannah, and New Orleans to photograph antebellum architecture, while dreaming of a longer
    pilgrimage to Tuscan hill towns and the cathedrals of Chartres, planning trips with a loose itinerary that balances mindful relaxation with a desire for artistic discovery.
  culinary: Brittany Barbare enjoys cooking modest Southern dishes like shrimp and grits and beet salad with goat cheese, while their palate is drawn to Mediterranean flavors featuring pomegranate molasses,
    fresh basil, and saffron risotto, and they often pair meals with a glass of local Alabama Pinot Noir during relaxed dinner evenings.
  core: Brittany Barbare blends a lifelong curiosity for art with a competitive project‑management mindset, navigating work and life through flexible planning, occasional impulsive spending, and a vigilant
    yet sometimes anxious approach to health and wellness.
background:
  cultural: Brittany grew up in a middle‑class white family in Birmingham, Alabama, immersed in Southern traditions of hospitality, community involvement, and a love for regional cuisine. Her upbringing
    during the civil‑rights era gave her a nuanced appreciation for cultural diversity in the South. She celebrates local festivals such as the Birmingham Art Crawl and the Alabama Shakespeare Festival,
    and she maintains ties to her Methodist church, which influences her values of service and stewardship. Her Southern heritage combines with a lifelong curiosity for broader artistic and intellectual
    currents, shaping a balanced cultural identity.
