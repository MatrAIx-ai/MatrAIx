personas:
  professional: Wilmer Dacres, a Business Analytics student known for methodical planning and reliable delivery, channels a practical curiosity into Python‑based data analysis, polished presentations, and
    community‑oriented project coordination that consistently bridges technical insight with his cooperative team spirit.
  sports: Wilmer Dacres keeps fit by playing pick‑up basketball at the Sterling recreation center each weekend, cheering on the Washington Wizards in the NBA and following DC United during the soccer season,
    while treating his workouts as both a social outlet and a disciplined routine that balances competition with camaraderie.
  arts: Wilmer Dacres finds inspiration in the lyrical storytelling of Kendrick Lamar, the improvisational flair of Miles Davis, and the speculative worlds of Isaac Asimov, weaving these influences into
    his weekend photography of urban D.C. neighborhoods and his occasional attempts at digital album‑cover design on Canva.
  travel: Wilmer Dacres prefers carefully planned short‑term getaways—like his bus trip to New Orleans for jazz festivals and a weekend hike in Shenandoah Valley—yet dreams of a semester‑long tech immersion
    in Tokyo, balancing budget constraints with his yearning for cultural immersion.
  culinary: Wilmer Dacres, a competent home cook who enjoys experimenting with avocado toast topped with smoked salmon, spicy chicken shawarma bowls drizzled with tahini, and occasional attempts at homemade
    pho, values fresh ingredients like cilantro, lime, and chipotle, while often ordering pizza on study nights as a convenient cheat.
  core: Wilmer Dacres is a methodical data enthusiast who balances late‑night coding marathons with community gardening, yet habitually forgets to water his houseplants, leading to a rotating gallery of
    wilted succulents.
background:
  cultural: Wilmer is an African‑American raised in Sterling, Virginia, within a close‑knit family that traces its roots to the Southern United States. His upbringing combines the cultural traditions of
    the Black church, family barbecues, and community celebrations such as Juneteenth and Kwanzaa. Growing up in a predominantly white suburban county has made him especially aware of the importance of
    representation and community advocacy, prompting his involvement with local NAACP chapters and Black student networks at his college. He values education, mutual support, and civic responsibility, and
    he often draws on the resilience and collaborative spirit of his family and neighborhood to navigate the challenges and opportunities he encounters.
attributes:
  skills: '["Data analysis (Excel, Python)", "Project management (Trello, Asana)", "Public speaking", "Event coordination", "Community outreach", "Technical writing", "Basic graphic design (Canva)", "Customer
    service"]'
  hobbies: '["Basketball", "Reading (sci‑fi, non‑fiction)", "Coding personal projects (Python)", "Photography", "Volunteer work (community garden, youth mentorship)", "Music (hip‑hop, jazz)"]'
  career_goals: Wilmer aims to complete his bachelor's degree in Business Analytics while securing a data‑focused internship that will let him apply his analytical and project‑management skills in a real‑world
    setting. His short‑term goal is to become a junior data analyst at a technology firm or a government agency in the Washington, D.C. area, where he can contribute to data‑driven decision making. In the
    longer term, he aspires to transition into a program coordinator role that blends data insights with community development, ultimately using his expertise to design and evaluate initiatives that improve
    educational outcomes for youth in his neighborhood. Alongside his professional trajectory, he wants to mentor younger students, especially those from underrepresented backgrounds, and remain active
    in local civic organizations.
