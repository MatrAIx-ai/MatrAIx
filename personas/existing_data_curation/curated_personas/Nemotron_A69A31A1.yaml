  career_goals: Roberto is motivated to move beyond his current role and advance within the hospitality industry. His short‑term goal is to earn a Certified Food Protection Manager (CFPM) credential and
    transition to a line‑cook position, where he can apply his curiosity about new cooking techniques while leveraging his practical experience. In the medium term he aims to become a sous‑chef or kitchen
    supervisor, developing leadership skills that match his competitive drive. Ultimately, Roberto dreams of opening a small family‑run Dominican food truck or eatery in the Vineland area, offering authentic
    dishes like mangú, sancocho, and mofongo, and providing a stable, prosperous future for his wife and children.
