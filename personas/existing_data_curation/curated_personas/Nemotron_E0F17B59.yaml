personas:
  professional: Julia Chavarria, a 21‑year‑old journeyman drywall installer, blends meticulous blueprint reading and hand‑tool mastery with a competitive drive to lead crews, turning each job site into
    a well‑ordered, high‑quality production line.
  sports: Julia Chavarria fuels fitness by tackling the high desert trails around Tucumcari with the local Hiking Outdoors Club, cheering on New Mexico United in MLS matches, and joining occasional pickup
    basketball games at the community center, all while maintaining a disciplined weekly regimen of weight‑lifting and mobility work.
  arts: Julia Chavarria captures the stark desert scenery through analog photography inspired by Ansel Adams, unwinds to regional folk tunes by Lila Downs and Los Tigres del Norte, and devours mystery novels
    by Agatha Christie and Tana French during quiet evenings.
  travel: Julia Chavarria plans trips with an eye for rugged adventure, having explored the sandstone arches of Utah’s Arches National Park and the historic streets of Santa Fe, while dreaming of a future
    road‑trip across the Appalachian Trail’s highlands and a culinary tour of Oaxaca’s night markets.
  culinary: Julia Chavarria mixes a practical cooking style with cultural flair, expertly preparing chiles rellenos stuffed with roasted poblano, queso fresco, and homemade salsa verde, while also mastering
    the art of hand‑rolled tamales seasoned with dried ancho and fresh cilantro.
  core: Julia Chavarria is a disciplined trade apprentice with a hidden love for desert photography, a competitive edge in the workshop, and a habit of hoarding extra screws for ‘just‑in‑case’ projects.
background:
  cultural: Julia was raised in a bicultural Mexican‑American household in New Mexico, speaking both Spanish and English at home. Her family maintains Mexican traditions such as Día de los Muertos, quinceañeras,
    and Catholic celebrations, while also embracing the Southwestern heritage of the region. This blend of cultures fosters a strong sense of family, community, and work ethic, influencing her respect for
    craftsmanship and her pride in representing her heritage within a traditionally male‑dominated trade.
attributes:
  skills: '["Drywall Installation", "Ceiling Tile Installation", "Joint Taping and Finishing", "Blueprint Reading", "Tool Maintenance", "OSHA Safety Compliance", "Material Estimation", "Project Time Management",
    "Quality Inspection"]'
  hobbies: '["Woodworking", "DIY Furniture Upcycling", "Hiking", "Landscape Photography", "Traditional Mexican Cooking", "Reading Mystery Novels", "Listening to Mexican Folk Music"]'
  career_goals: Julia aims to advance from journeyman installer to foreman within the next three years, earning a Certified Drywall Finisher credential and completing an OSHA 30‑hour certification. She
    plans to develop leadership skills to supervise small crews, improve operational efficiency, and eventually launch her own contracting business focused on residential renovations in New Mexico. Her
    long‑term ambition is to become a respected figure in the construction community, demonstrating that women can excel in the trade.
