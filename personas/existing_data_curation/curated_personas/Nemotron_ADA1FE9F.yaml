personas:
  professional: Noemi Lewis, an experienced teaching assistant in biology and chemistry labs, they leverage deep STEM knowledge and a knack for improvising hands‑on resources to mentor students, while asserting
    for better lab safety funding and dreaming of a full‑time instructor role that blends curriculum design with community STEM outreach.
  sports: A devoted fan of the Baltimore Orioles and Washington Capitals, Noemi Lewis enjoys low‑impact fitness through early‑morning bird‑watching walks, occasional community tennis sessions at the Howard
    County Recreation Center, and membership in a local walking club that meets on weekends, and they find these activities both restorative and socially manageable.
  arts: Passionate about literature and visual arts, Noemi Lewis devotes evenings to reading historical fiction and biographies, attends exhibitions featuring Van Gogh and O'Keeffe at the Howard County
    Center for the Arts, and curates a personal playlist that includes James Taylor and Nina Simone while photographing their culinary creations for a modest Instagram gallery, and they often reflect on
    how art informs their teaching philosophy.
  travel: With a penchant for spontaneous, low‑key trips, Noemi Lewis has explored the historic streets of Annapolis, hiked the Blue Ridge Parkway in autumn, taken a weekend road‑trip to New Orleans for
    live jazz, and hopes to visit the Galápagos Islands to observe endemic bird species firsthand, and they favor itineraries that balance quiet nature immersion with occasional cultural experiences.
  culinary: Experimenting in the kitchen with family‑style Southern dishes like shrimp and grits and collard greens, Noemi Lewis often incorporates fresh herbs such as thyme, rosemary, and basil from their
    garden, adds modern twists like miso glaze, and meticulously plates meals before capturing them with a DSLR for social sharing, and they view each dish as a laboratory for flavor exploration.
  core: Noemi Lewis is a curious, solitary STEM mentor who blends practical lab expertise with a love for bird‑watching, gardening, and cooking, while navigating a relaxed, slightly disorganized lifestyle
    that fuels both creative pursuits and occasional financial oversights, and they constantly seek new ways to merge curiosity with real‑world impact.
background:
  cultural: Noemi’s cultural background as a Black woman from the Baltimore‑Laurel corridor deeply informs her worldview and professional approach. Raised in a close‑knit African‑American community, she
    was taught the value of education as a pathway to empowerment and the importance of collective support. Family gatherings often centered around storytelling, music, and soul food, instilling a strong
    sense of identity and resilience. She draws inspiration from Black scientists such as Dr. Mae Jemison and Dr. George Washington Carver, integrating their stories into her teaching to provide relatable
    role models. Participation in local churches and community events has reinforced her commitment to service, leading her to volunteer for after‑school STEM programs aimed at underrepresented youth. While
    she values solitude, her cultural heritage emphasizes community uplift, which motivates her to mentor Black students and advocate for inclusive curricula.
attributes:
  skills: '[''STEM subject knowledge (biology, chemistry)'', ''Curriculum development'', ''Lab safety management'', ''Student mentorship'', ''Learning Management System (Moodle) administration'', ''Data
    analysis (Excel, SPSS)'', ''Instructional technology integration (Zoom, video editing)'', ''Assessment design'', ''Flexible lesson planning'']'
  hobbies: '[''Reading historical fiction and scientific biographies'', ''Gardening herbs and native wildflowers'', ''Bird watching and journaling sightings'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking
    traditional African‑American recipes with modern twists'', ''Digital photography of nature'', ''Volunteering as a mentor for Girls Who Code'']'
  career_goals: Noemi aspires to transition from a teaching assistant role to a full‑time instructor or curriculum specialist within the next five years. She plans to earn a master’s degree in STEM education
    to deepen her pedagogical expertise and to qualify for leadership positions. Her long‑term ambition is to launch a community‑based STEM outreach program in Howard County that highlights the contributions
    of Black scientists and provides mentorship for middle‑school girls. She also hopes to develop a series of modular, self‑paced online labs that allow her to maintain flexibility while reaching a broader
    audience. Improving her organizational skills and obtaining certification in laboratory safety management are personal milestones she aims to achieve.
