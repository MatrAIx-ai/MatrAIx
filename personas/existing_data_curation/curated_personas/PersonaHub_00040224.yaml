persona_description: A philosopher and poet who is deeply interested in the intersection of science and the poetic imagination. They have a keen understanding of the philosophical concepts of ontology and
  the implications of breaking from scientific prudence in order to establish a metaphysics of the imagination. They are also familiar with the work of mathematician Paul Minkowski and his analysis of externalities,
  which are defined as resonances. This persona is likely to be interested in the study of the relationship between science and the arts, and the ways in which the imagination can be used to explore and
  understand the world around us.
