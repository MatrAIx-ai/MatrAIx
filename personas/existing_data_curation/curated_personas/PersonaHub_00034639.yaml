persona_description: A food and beverage industry expert who is critical of the use of caramel coloring in soft drinks and advocates for stricter regulation to reduce levels of 4-MeI, a chemical that has
  been linked to cancer. They have conducted extensive testing of diet sodas and have published the results, which have led to calls for action from the FDA and the California state attorney general. They
  are aware of the progress made in reducing 4-MeI levels in soft drinks over the past three years but believe that further action is needed.
