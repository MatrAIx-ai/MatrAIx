personas:
  professional: Carol Darby, an aspiring junior comic artist, blends vivid watercolor techniques with digital Scratch animations, and they channel their curiosity and spontaneous creativity into self‑guided
    story projects that often defy conventional plot structures.
  sports: Carol Darby enjoys weekly bike rides on the nearby Loess Hills trails, occasionally joins the school’s spring soccer practice, and they cheer for the Chicago Cubs while favoring free‑play exploration
    over structured workouts.
  arts: Carol Darby spends weekends sketching original characters inspired by Hayao Miyazaki’s animated worlds, studies watercolor techniques from the works of Mary Blair, and they draw motivation from
    comic creator Rebecca Sugar, turning their art club murals into vibrant storytelling canvases.
  travel: Carol Darby favors spontaneous weekend getaways to the Indiana Dunes and family trips to Washington, D.C.’s National Mall, and they balance a love for historic museums like Edgar County’s with
    a yearning to someday explore the castles of Scotland, all while navigating parental budget limits.
  culinary: Carol Darby delights in crafting rainbow fruit skewers with grapes, strawberries, and pineapple, attempts simple spaghetti carbonara with a dash of Parmesan, and they relish the comfort of pepperoni
    pizza, yet often forget to wash their hands before cooking.
  core: Carol Darby is a curious, solitary sketch‑artist who trades structure for spontaneity, hoards glossy rocks for journals, and they sneak extra chocolate chip cookies when no one’s watching.
background:
  cultural: Carol was raised in Paris, a quiet town in Edgar County, Illinois, in a family with deep Midwestern roots. Her household reflects typical small‑town values—community involvement, respect for
    nature, and a modest, hardworking ethos. She often participates in local events like the county fair and the church’s seasonal activities, which reinforce a sense of belonging. While her ethnic background
    is white, her family’s ancestry includes German and Irish lines, and they cherish family stories of farming and community service that shape her appreciation for both tradition and creative expression.
attributes:
  skills: '[''sketching'', ''digital illustration'', ''creative storytelling'', ''basic Scratch programming'', ''hands‑on science experiments'', ''puzzle solving'', ''empathetic listening'', ''small‑group
    facilitation'']'
  hobbies: '[''drawing'', ''watercolor painting'', ''reading fantasy novels'', ''bike riding'', ''nature journaling'', ''LEGO building'', ''Scratch coding'', ''visiting museums'', ''after‑school art club'']'
  career_goals: Carol dreams of becoming a professional illustrator or graphic novelist, hoping one day to create a comic series that celebrates her hometown’s prairie landscape. She also imagines working
    as a wildlife educator, using art to raise awareness about local ecosystems. In the near term, she wants to improve her organization skills so she can complete school projects on time and eventually
    apply to a high‑school art program that offers mentorship in animation.
