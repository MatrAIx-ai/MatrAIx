  career_goals: Although retired, Tony’s ambition is to remain an active contributor to Frisco’s cultural life. He aspires to curate a quarterly art exhibition at the local senior center, showcasing works
    by emerging senior artists and fostering intergenerational dialogue. He hopes to publish a memoir that intertwines his family’s Midwest roots with his Texas experiences, preserving oral histories for
    future generations. Tony also seeks a board position on the Frisco Discovery Center’s advisory committee, where he can influence programming that blends traditional crafts with contemporary art. Finally,
    he aims to mentor at least two younger volunteers each year, passing on his organizational and artistic insights.
