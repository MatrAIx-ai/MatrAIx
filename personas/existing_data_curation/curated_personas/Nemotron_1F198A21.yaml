  career_goals: Timothy dreams of a career that offers clear structure, tangible results, and a chance to apply his methodical mindset. He aims to become a civil engineer, designing bridges or roads that
    serve his community, because it blends his love of building with practical problem solving. In the short term, he plans to maintain a high GPA, join his middle school robotics club, and earn a science
    fair award to strengthen his college application. He also envisions attending a specialized STEM high school and eventually earning a scholarship for engineering studies.
