personas:
  professional: Timothy Nigro, a 12‑year‑old aspiring mechanical tinkerer, they channel their love for order and hands‑on problem solving into building intricate LEGO models, meticulously planning each
    step and documenting progress, which showcases their methodical, reliable nature.
  sports: Timothy Nigro, a 12‑year‑old member of the Riverview Little League baseball team, they follow a disciplined practice schedule, idolize Detroit Tigers outfielder Miguel Cabrera, keep a weekly conditioning
    routine, and occasionally attend Detroit Red Wings hockey games with family, demonstrating a structured yet enthusiastic approach to sports.
  arts: Timothy Nigro, a 12‑year‑old LEGO enthusiast, they spend weekends crafting elaborate builds while listening to the ambient soundtrack of C418 from Minecraft, watch stop‑motion videos by the YouTube
    channel BrickBuilder, and enjoy the energetic riffs of The White Stripes and the pop melodies of Taylor Swift, which together shape their creative identity.
  travel: Timothy Nigro, a 12‑year‑old with a love for organized adventures, they have explored the Henry Ford Museum in Dearborn, taken a school field trip to Niagara Falls, and dream of a meticulously
    planned vacation to Disneyland in California, while also hoping to visit the historic streets of Warsaw to trace family stories.
  culinary: Timothy Nigro, a 12‑year‑old whose palate favors pepperoni pizza, spaghetti with meatballs, and buttery pierogi filled with potatoes and cheese, they can confidently assemble a grilled cheese
    sandwich and often help their family make a Saturday night homemade pizza, delighting in the aromas of tomato sauce and melted mozzarella.
  core: Timothy Nigro, a methodical 12‑year‑old who balances LEGO precision with baseball teamwork, they often overthink decisions yet find comfort in clearly charted schedules, a secret stash of chocolate,
    and a habit of rehearsing daily tasks out loud.
background:
  cultural: Timothy grows up in Riverview, a suburban community in Wayne County, Michigan, surrounded by the cultural influences of the Detroit metropolitan area. His family is of mixed European descent—primarily
    Italian and Polish—reflecting the historical immigrant waves that shaped the region. Raised in a middle‑class household, he participates in local traditions such as summer county fairs, Fourth of July
    parades, and church holiday celebrations. The Midwestern values of hard work, reliability, and community involvement permeate his upbringing, and the legacy of the automotive industry in Michigan fosters
    an appreciation for practical, hands‑on problem solving.
