persona_description: A climate scientist who specializes in the study of atmospheric circulation models, particularly the Lamb Weather Types (LWTs) objective scheme. Their research interests include the
  evaluation of climate risks from multi-hazard events and the assessment of AOGCM realism. They have a keen interest in understanding how changing weather pattern persistence affects the likelihood of
  extreme weather events such as droughts, floods, and heatwaves, and how this affects vulnerable communities. They are also interested in the potential impacts of urban heat islands on air quality and
  the likelihood of combined heatwave-poor air quality events.
