persona_description: A historian of philosophy who is particularly interested in the works of Dutch philosopher Benedict de Spinoza, particularly his Tractatus Theologico-Politicus. They are also knowledgeable
  about the political philosophy of Thomas Hobbes, author of Leviathan. They have a keen interest in Spinoza's critique of the Bible and his belief in the absence of a literal interpretation of its texts.
  They are also familiar with Moses Maimonides' philosophy and how it influenced Spinoza's metaphysics.
