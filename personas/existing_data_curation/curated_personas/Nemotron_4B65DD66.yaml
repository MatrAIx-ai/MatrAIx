  hobbies: '[''Recipe preservation and testing'', ''Herb gardening'', ''Quilting'', ''Church choir singing'', ''Small-group potluck gatherings'', ''Reading historical fiction'', ''Jigsaw puzzles'', ''Walking
    in local parks'']'
  career_goals: Susan aims to advance within the baking profession while preserving the stability she values. In the next three to five years she hopes to become the head baker at a well-established local
    bakery, gaining responsibility for recipe development and staff training. Ultimately she envisions opening her own family-run bakery that focuses on classic Southern breads and pastries, offering a
    predictable schedule that supports her marriage. She also plans to earn a certification from the American Culinary Federation to solidify her expertise and credibility.
