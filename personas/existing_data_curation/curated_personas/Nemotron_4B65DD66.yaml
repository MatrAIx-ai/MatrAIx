personas:
  professional: Susan Kupperman, a 24-year-old baker specializing in traditional Southern breads and pastries, they combine meticulous dough handling, rigorous food safety habits, and precise inventory
    bookkeeping to pursue a head baker role and eventually launch a family‑run bakery with a predictable schedule.
  sports: Susan Kupperman, an avid walker, they stroll the local river trail three times a week, belong to a community yoga class that meets every Saturday, cheer for the nearby minor‑league baseball team
    the River City Riverhawks, and keep a modest collection of Nashville Predators memorabilia as a nod to their love of winter sports.
  arts: Susan Kupperman, a choir member and quilting enthusiast, they enjoy harmonizing in their church’s small choir, stitch intricate patchwork quilts inspired by 19th‑century patterns, lose themselves
    in historical fiction by Philippa Gregory, and unwind listening to the soulful sounds of The Avett Brothers and Alison Krauss.
  travel: Susan Kupperman, a structured traveler, they favor weekend getaways to historic Southern towns like Charleston and Savannah using pre‑planned itineraries, dream of a culinary tour of New Orleans
    to study Cajun pastries, and keep a scrapbook of ticket stubs and pressed flowers from each trip as a personal keepsake.
  culinary: Susan Kupperman, a dedicated baker, they perfect buttery buttermilk biscuits, fragrant rosemary focaccia, and sweet peach cobbler, regularly harvest fresh basil, thyme, and mint from their herb
    garden for infusions, and experiment with a pinch of sea salt on pecan pie crusts while adhering to strict scaling and fermentation timelines.
  core: Susan Kupperman, a 24‑year‑old methodical baker, they balance a deep love for tradition with a constant undercurrent of anxiety that fuels their precision, routine‑driven lifestyle, and occasional
    over‑checking of inventory.
background:
  cultural: Susan was raised in Antioch, Tennessee, a suburban community within Davidson County that reflects classic Middle‑Tennessee Southern culture. Her family’s roots are in the broader Appalachian
    and Mid‑Southern white tradition, emphasizing Protestant Christian values, close‑knit family bonds, and a love of home‑cooked, comfort food. Community events such as church services, local fairs, and
    family gatherings have shaped her appreciation for traditional Southern cuisine and the importance of consistency and hospitality.
attributes:
  skills: '[''Bread and pastry baking'', ''Dough fermentation and proofing'', ''Cake decorating'', ''Ingredient measurement and scaling'', ''Food safety and sanitation compliance'', ''Mise en place organization'',
