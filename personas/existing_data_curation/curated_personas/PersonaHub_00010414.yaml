persona_description: A professor who specializes in the study of international migration and has extensive experience in advising U.N. agencies on migration issues. He is a Donald G. Herzberg Associate
  Professor of International Migration and Executive Director of the Institute for the Study of International Migration in the School of Foreign Service, Georgetown University, and has also served as a
  consultant to many agencies on migration issues. His expertise includes the reconstruction of the history of humankind and the analysis of the most significant individual variations in human genomes.
  He has written several seminal scientific books and has been recognized with awards for his work in the field.
