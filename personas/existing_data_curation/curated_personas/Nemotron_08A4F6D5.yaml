personas:
  professional: Jonathan Ruiz, a 21‑year‑old visual communication associate, blends Photoshop and Illustrator expertise, basic front‑end coding, and bilingual storytelling to craft vibrant brand assets
    for cultural nonprofits, while they juggle coursework and community volunteering with a habit of over‑committing to design meet‑ups.
  sports: Jonathan Ruiz joins weekly pickup soccer games at the neighborhood field, rallies with friends to cheer for San Antonio FC and the Texas Rangers, and they stay active by attending a cumbia‑dance
    fitness class that doubles as cardio on rainy afternoons.
  arts: Jonathan Ruiz explores Houston’s street murals and contemporary galleries, draws inspiration from artists such as Banksy, Basquiat, and Yayoi Kusama, and they spend evenings editing photos of community
    festivals to showcase on Instagram while attending live cumbia concerts.
  travel: Jonathan Ruiz prefers spontaneous weekend road trips across the Texas Hill Country, with a wishlist that includes a sunrise at Big Bend National Park, a cultural immersion in Marfa’s art scene,
    and a spring break visit to New Orleans for its music, and they budget these adventures carefully around their student finances.
  culinary: Jonathan Ruiz delights in cooking homemade tacos al pastor and chiles rellenos using fresh cilantro and roasted corn masa, experiments with marinades they watch on YouTube, and they sometimes
    succumb to late‑night fast‑food nachos when exam stress spikes.
  core: Jonathan Ruiz is a vibrant, culturally curious design student whose blend of graphic talent, community spirit, and habit of juggling too many projects defines their lively yet occasionally scattered
    outlook on life.
background:
  cultural: Jonathan grew up in a Mexican-American household in Alice, Texas, where Spanish and English were spoken interchangeably. His family maintains strong ties to Mexican traditions, celebrating Día
    de los Muertos, Semana Santa, and other holidays with homemade foods and community gatherings. Living near the border has given him a blend of Texan and Mexican cultural influences, from norteño music
    to regional storytelling. He is Catholic, attends a local parish, and participates in neighborhood events that showcase the vibrant heritage of Jim Wells County.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Basic front-end web development (HTML, CSS, JavaScript)'', ''Social media content creation'', ''Photography and photo editing'', ''Bilingual
    communication (Spanish/English)'', ''Event planning and volunteer coordination'', ''Public speaking'', ''Teamwork and collaboration'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Photography (landscape and cultural events)'', ''Playing soccer'', ''Dancing (cumbia, norteño)'', ''Cooking Mexican cuisine'', ''Reading contemporary
    art literature'', ''Attending design and photography workshops'', ''Volunteering at local festivals (Charro Days)'', ''Exploring coffee shops and food trucks'']'
  career_goals: Jonathan plans to complete his associate degree in Visual Communication within the next year, then transfer to a four-year university to earn a BFA in Graphic Design. He aims to start his
    career as a junior designer at a creative agency that works with cultural institutions, eventually advancing to a senior art director role where he can lead projects that celebrate Mexican-American
    heritage. In the long term, he hopes to launch a community-focused art collective in South Texas that offers workshops, mural projects, and cultural events, blending his passion for art and community
    outreach.
