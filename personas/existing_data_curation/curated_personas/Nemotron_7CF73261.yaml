personas:
  professional: Kathryn Rowell, a retired research scientist and statistical analyst, leverages her expertise in R, experimental design, and science communication to curate interdisciplinary workshops that
    transform data into visual art, while her spontaneous curiosity and assertive mentorship style keep the sessions lively and inclusive.
  sports: Kathryn Rowell, an enthusiastic senior walker, joins the Golden Gate Park walking club, follows the Oakland Athletics and Golden State Warriors, and attends a weekly senior yoga class at the community
    center to maintain flexibility and cardiovascular health.
  arts: Kathryn Rowell, a devoted patron of Oakland’s vibrant arts scene, regularly visits gallery openings featuring muralist Alex Aregood, enjoys concerts by the Oakland Symphony, and attends experimental
    theater at Berkeley Repertory, drawing inspiration for her own data‑driven visual projects.
  travel: Kathryn Rowell favors slow, purposeful travel, often planning weekend escapes to nearby natural wonders like Yosemite and Monterey Bay before dreaming of a cultural immersion trip to Kyoto’s historic
    temples and the eco‑focused villages of Iceland.
  culinary: Kathryn Rowell, an avid home gardener, prepares seasonal dishes such as roasted heirloom tomatoes with basil pesto, kale‑and‑lentil stew, and miso‑glazed salmon, delighting in the tactile process
    of chopping, simmering, and plating while occasionally indulging in artisanal sourdough from a local bakery.
  core: Kathryn Rowell blends lifelong curiosity, spontaneous creativity, and steadfast resilience to turn science into art, community, and lasting impact in her golden years.
background:
  cultural: 'Kathryn grew up in a middle‑class white family in the Midwest during the post‑war era, witnessing the social upheavals of the 1960s and the rise of the women''s rights movement. Relocating
    to the Bay Area in the early 1970s, she absorbed the region’s progressive, multicultural atmosphere and its strong emphasis on environmental stewardship and technological innovation. This blend of Midwestern
    work ethic, activist sensibility, and Bay Area openness informs her values: she respects diverse perspectives, embraces lifelong learning, and seeks to bridge scientific rigor with artistic curiosity
    in her community engagements.'
