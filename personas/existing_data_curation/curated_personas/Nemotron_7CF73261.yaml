  hobbies: '[''Visiting art galleries and museums'', ''Nature photography'', ''Sketching and drawing'', ''Online learning (MOOCs)'', ''Community gardening'', ''Volunteer tutoring for youth STEM'', ''Book
    clubs (speculative fiction, science)'', ''Attending live music and theater'']'
  career_goals: Although retired from formal employment, Kathryn aims to continue contributing to the community by establishing a volunteer program that pairs senior citizens with local schools to foster
    intergenerational STEM learning. She hopes to create a series of art‑science workshops that blend data visualization with creative expression, and to publish a collection of essays reflecting on the
    evolution of women in STEM over the past fifty years. Additionally, she aspires to complete a small fellowship in environmental data storytelling, using her analytical background to highlight local
    sustainability challenges in Oakland.
