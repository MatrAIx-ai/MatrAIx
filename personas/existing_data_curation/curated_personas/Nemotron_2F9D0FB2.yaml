  career_goals: Even though she is retired from formal employment, Donna aims to remain a pillar of her church and local community, lead a senior support group that promotes mental‑health awareness, compile
    her life stories into a memoir that will be shared with her grandchildren, and champion intergenerational connections by teaching younger relatives about their heritage and resilience.
