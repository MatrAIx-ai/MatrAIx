persona_description: A New Zealand native who is passionate about the conservation and restoration of native shrublands, particularly in the lowland plains and hill country. This individual is knowledgeable
  about the ecological and regeneration processes of mānuka shrublands, and is well-versed in the management and restoration of these areas through the use of fire and other natural processes. This person
  is also knowledgeable about the impact of introduced shrubs like gorse and Scotch broom on native ecosystems, and is actively involved in efforts to control and restore these species.
