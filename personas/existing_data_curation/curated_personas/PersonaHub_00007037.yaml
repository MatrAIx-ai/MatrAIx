persona_description: A former Chief Assistant of the Astronomer Royal who was appointed to the position of Chief Assistant by Sir William Dyson and later appointed as the Chief Assistant of the Astronomer
  Royal at the Cape. He returned to Greenwich in 1933 as the Astronomer Royal and immediately began collecting evidence to persuade the Board of Visitors and the Admiralty of the need for a move to a new
  site. His efforts resulted in the relocation of the Observatory to a new site at Abinger, where he continued to work as the Chief Assistant of the Astronomer Royal until his retirement in 1967.
