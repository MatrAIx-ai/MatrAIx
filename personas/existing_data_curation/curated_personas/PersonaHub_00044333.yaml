persona_description: A theatre historian who specializes in the study of the early 16th century theatre scene in London, particularly focusing on the development of commercial theatre, the political climate
  during Elizabeth's reign, the understanding of ghosts and the afterlife, and the influence of the first generation of English playwrights on Shakespeare's work. The historian is well-versed in Shakespeare's
  plays and the historical context in which they were written, and has conducted extensive research on the topic. They have a deep understanding of Shakespeare's techniques and the ways in which he incorporated
  the lessons of the past into his work.
