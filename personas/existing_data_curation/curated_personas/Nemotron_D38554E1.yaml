    and mortgage options'', ''Risk assessment'', ''Public speaking and presentation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Playing soccer'', ''Cooking traditional Mexican dishes'', ''Listening to live Latin music'', ''Exploring new neighborhoods
    in Charlotte'', ''Reading psychology and self-help books'', ''Yoga and meditation'', ''Volunteering at local Hispanic community centers'', ''Attending real-estate networking events'']'
  career_goals: Fulgencio aspires to become one of Charlotte’s top-producing real-estate agents within the next three years, earning certifications such as the Certified Residential Specialist (CRS) and
    e-PRO to enhance his professional credibility. In five to seven years he plans to launch his own boutique brokerage that specializes in serving multicultural communities, with a particular focus on
    Latino and first-time homebuyers. He wants to integrate his love for art by offering premium staging services that highlight cultural aesthetics and promote sustainable, affordable housing solutions.
    Long-term, he envisions expanding into property development, creating mixed-use projects that incorporate community spaces and public art, while also mentoring new agents from under-represented backgrounds.
    Parallel to his professional ambitions, he aims to develop stronger stress-management practices, such as mindfulness training, to sustain his high-energy, client-centric approach.
