persona_description: A science educator who is interested in integrating nature of science (NOS) and nature of the sciences (NOTSs) learning objectives into the teaching of a core biological concept, such
  as homeostasis. This educator aims to design an instructional approach that engages students in understanding the theory-laden character of scientific knowledge, the hierarchical organization of primary
  ontological levels, a model focusing on aspects of biological causality, definitional and accompanying features of the notion of mechanism, and how to search for finding mechanisms including the interrelation
  of structure and function. This educator is also interested in instructing students in elaborating on their causal reasoning through a model and a metaphor (e.g., air-condition) when considering human
  thermoregulatory mechanisms.
