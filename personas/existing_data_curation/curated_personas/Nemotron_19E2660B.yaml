  hobbies: '[''Community basketball league'', ''Local soccer pickup games'', ''Hiking in the Sonoran Desert'', ''Photography of desert landscapes'', ''Strategy video games (e.g., city‑building, real‑time
    strategy)'', ''Board game nights and escape rooms'', ''Volunteering at fire‑department open houses'', ''Attending Phoenix Suns games'', ''BBQ cook‑outs with friends'', ''Spanish language meet‑ups'']'
  career_goals: Matthew aims to move into supervisory and leadership positions within the Avondale communications center. In the next three to five years, he plans to earn a National Emergency Number Association
    (NENA) certification and complete an Incident Command System (ICS) course, positioning himself for a Shift Supervisor role. Long‑term, he aspires to become a Public Safety Communications Manager, overseeing
    technology upgrades, response time analytics, and community outreach programs. He also hopes to mentor a new generation of dispatchers and contribute to statewide best‑practice guidelines for emergency
    communications.
