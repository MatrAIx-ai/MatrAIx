  hobbies: '[''Hiking and trail navigation'', ''Wildlife observation'', ''Landscape sketching'', ''Daily journaling'', ''Reading science‑fiction and mystery'', ''Puzzle solving (Sudoku, crosswords)'', ''Macro
    photography'', ''Volunteering at animal shelter'', ''Acoustic guitar (fingerpicking)'']'
  career_goals: Norma aspires to attend a university where she can study environmental engineering or wildlife biology, fields that combine her curiosity about nature with her practical and methodical mindset.
    She hopes to specialize in sustainable water management for rural communities like Cedaredge, eventually contributing to local infrastructure projects. In parallel, she wants to develop a freelance
    photography business that showcases Colorado's natural beauty, providing both creative fulfillment and a source of independent income. Her long‑term ambition includes obtaining certifications that would
    allow her to work as a field researcher or consultant, enabling her to work autonomously while making tangible improvements to her hometown's environment.
