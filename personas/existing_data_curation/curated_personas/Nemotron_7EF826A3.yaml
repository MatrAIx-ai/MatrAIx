personas:
  professional: Norma Collins, a high-school sophomore in Cedaredge who leads her school's budding wildlife club, blends meticulous planning with a curiosity for ecosystems, channeling her organized, competitive
    streak into detailed field journals, sketching, and a growing skill set in macro photography that she hopes to turn into a future environmental science career.
  sports: Norma Collins favors solitary hikes in the San Juan Mountains and participates in the Cedaredge Trail Runners cross-country club, while cheering on the Colorado Avalanche in the NHL and the Colorado
    Rockies in MLB, showing a blend of personal endurance pursuits and hometown sports loyalty.
  arts: Norma Collins spends weekends sketching the mountains in the style of Ansel Adams and practicing fingerpicking on acoustic guitar inspired by Tommy Emmanuel and Sufjan Stevens, while devouring sci-fi
    novels by Neil Gaiman and solving Sudoku puzzles for creative mental workout.
  travel: Norma Collins plans trips with the same precision she uses for her journals, favoring short road trips to nearby wilderness like Great Sand Dunes and Mesa Verde National Park, while dreaming of
    a summer backpacking adventure through Banff National Park and a cultural immersion in Kyoto, Japan, balancing her love of nature with a cautious budgeting mindset.
  culinary: Norma Collins enjoys cooking simple homestead meals such as grilled trout with rosemary, quinoa salads tossed with cherry tomatoes and feta, and hand-made trail mix of dried apricots, almonds,
    and dark chocolate, often using fresh herbs from the family garden but sometimes over-salting dishes when distracted by music.
  core: Norma Collins is a methodical mountain teen who pairs a restless curiosity and competitive spirit with frequent anxiety, filling her days with sketchbooks, solo hikes, and carefully logged budgets,
    while occasionally letting emotional spikes trigger impulsive spending or extra guitar practice.
background:
  cultural: Norma grew up in Cedaredge, a small town in Delta County, Colorado, where the community’s roots are steeped in ranching, farming, and a strong appreciation for the outdoors. Her family maintains
    a modest homestead that emphasizes self‑reliance, stewardship of the land, and close‑knit family ties. Local cultural events such as the county fair, high school sports, and community gatherings at
    the church have shaped her sense of belonging, while the surrounding Rocky Mountains foster a deep respect for nature and seasonal rhythms. At the same time, Norma engages with broader American popular
    culture via streaming media and online forums, which complement her rural upbringing with contemporary ideas and influences.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic Python coding'', ''Word processing and spreadsheet proficiency'', ''First‑aid certification'', ''Gardening and small‑animal care'',
