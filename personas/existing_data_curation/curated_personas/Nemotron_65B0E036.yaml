  hobbies: '[''Reading science‑fiction and nature non‑fiction'', ''Puzzle solving (Sudoku, crosswords)'', ''Sketching botanical illustrations'', ''Playing piano'', ''Volunteering at the local library reading
    program'', ''Nature walks in Central Park'', ''Keeping a nature journal'']'
  career_goals: Sofia aspires to pursue a career that blends her curiosity about how things work with her desire to help others and maintain harmony. She dreams of becoming a pediatric researcher or child
    psychologist, developing practical solutions to improve children's health and emotional well‑being. She also entertains the idea of studying environmental engineering, hoping to design sustainable,
    community‑focused spaces that promote ecological balance. Ultimately, she seeks a stable, purpose‑driven profession where her methodical planning and caring nature can make a tangible difference.
