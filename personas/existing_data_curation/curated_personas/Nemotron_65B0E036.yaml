personas:
  professional: Sofia Bunn, a budding junior naturalist who volunteers as a storytime assistant at their neighborhood library, channels their organized, methodical mind and practical curiosity into curating
    age‑appropriate sci‑fi book lists and guiding small groups of younger readers through quiet reading sessions.
  sports: Sofia Bunn enjoys low‑impact fitness like weekend nature walks in Central Park, where they keep an eye on local wildlife, they belong to the park’s junior bird‑watching club, and they cheer for
    New York City FC during occasional family soccer outings.
  arts: Sofia Bunn expresses creativity through detailed botanical sketches inspired by Maria Sibylla Merian, thoughtful piano practice of Ludwig van Beethoven’s Moonlight Sonata, and an avid collection
    of sci‑fi graphic novels by authors such as Becky Chambers, weaving these artistic passions into a quiet, reflective personal aesthetic, and they often share their sketches with friends at the library.
  travel: Sofia Bunn explores new places with a methodical travel journal, having visited the American Museum of Natural History in New York, a weekend trip to Washington, D.C.’s National Air and Space
    Museum, and dreaming of trekking the fern‑laden trails of the Great Smoky Mountains, and they prefer carefully planned itineraries over spontaneous adventures.
  culinary: Sofia Bunn favors simple, wholesome meals like vegetable quinoa stir‑fry with rosemary and lemon zest, enjoys an occasional slice of apple‑cinnamon crumble, delights in crafting their own herbal
    tea blends with chamomile and dried lavender, yet they often procrastinate on homework before snack time.
  core: Sofia Bunn is a quietly curious 12‑year‑old who fills notebooks with sketches, puzzles, and worries, and they constantly balance a love for order with a lingering habit of over‑thinking every detail.
background:
  cultural: Sofia was born and raised in Manhattan, New York City, within a family of Northern European ancestry—primarily English and German roots. Her parents maintain a blend of traditional customs,
    celebrating holidays such as Thanksgiving, Christmas, and occasional German Easter traditions. Growing up in the cultural mosaic of New York, she has been exposed to a variety of languages, cuisines,
    and community events, fostering an appreciation for diversity while upholding her family's values of diligence, modesty, and community service.
attributes:
  skills: '[''Time management'', ''Research and fact‑checking'', ''Basic coding (Scratch)'', ''Scientific inquiry'', ''Written communication'', ''Empathy and peer mediation'', ''Attention to detail in art'',
