personas:
  professional: Lourdes, a retired systems engineer with deep expertise in data modeling, Python, and technical writing, channels their curiosity and sociable, talk‑anywhere style into leading free coding
    workshops for teens, mediating nonprofit board discussions, and they deliver engaging talks that blend rigorous analysis with lively storytelling.
  sports: Lourdes stays active by joining the senior walkers club that meets Tuesdays at the local nature preserve, following the Carolina Panthers football season with enthusiastic game‑day trips, and
    playing occasional pick‑up pickleball with the Charlotte Senior Pickleball League, preferring casual, low‑impact activity over rigorous gym routines they rarely attend.
  arts: Lourdes enthusiastically supports the regional theater, often singing karaoke renditions of Queen’s 'Bohemian Rhapsody', while they also enjoy listening to Lin‑Manuel Miranda’s Hamilton soundtrack,
    admiring the paintings of Georgia O’Keeffe at the city museum, and revisiting historical novels by Hilary Mantel during book‑club sessions.
  travel: Lourdes prefers relaxed, small‑group itineraries, spending summer weekends exploring the Blue Ridge Parkway and Asheville’s art scene, making occasional pilgrimages to the historic port city of
    Limerick in the west for a heritage tour they’ve traced through old family records, and planning cultural retreats to New Orleans for its jazz festivals and historic French Quarter.
  culinary: Lourdes, an experienced baker, often perfects their apple‑cinnamon crumb pie and savory rosemary‑infused vegetable quiche, while they regularly experiment with heirloom tomato gazpacho and occasionally
    add a dash of smoked paprika to a soda‑bread recipe handed down through generations, savoring communal meals at neighborhood potlucks.
  core: Lourdes blends relentless curiosity with a laid‑back, sometimes scattered schedule, turning every garden plot, karaoke mic, and Arduino experiment into a lively social lesson that keeps their community
    buzzing with energy, and they never miss a chance to share a story.
background:
  cultural: Lourdes was raised in a mid‑Midwestern, Irish‑Catholic family that emphasized community, modesty, and education. Growing up in Indiana during the 1950s and 60s, she internalized the region’s
    values of neighborliness, self‑reliance, and a practical outlook, while her early exposure to church youth groups fostered a strong sense of service. Her pursuit of a STEM graduate degree in an era
    when few women entered such fields reflects the progressive shift she embraced. Today, she blends these Midwestern roots—church involvement, participation in county fairs, and a love for local traditions—with
    her lifelong curiosity and commitment to fostering harmony in her community.
attributes:
  skills: '[''Data modeling'', ''Statistical analysis (R, SPSS)'', ''Programming (Python, MATLAB)'', ''Technical writing'', ''Project management'', ''Public speaking'', ''Mentoring'', ''Community workshop
    facilitation'', ''Conflict mediation'', ''Event planning'']'
  hobbies: '[''Gardening'', ''Book club (historical fiction & genealogy)'', ''Baking'', ''Local theater attendance'', ''Karaoke'', ''DIY electronics (Arduino)'', ''Bird‑watching'', ''Community volunteer
    work'', ''Traveling to visit family'', ''Knitting'']'
  career_goals: Although retired from formal employment, Lourdes aims to stay actively engaged by mentoring high‑school and middle‑school students in STEM, organizing free coding and robotics workshops
    at the local library, and contributing her analytical expertise to nonprofit boards. She also hopes to author a memoir highlighting her experiences as a woman in engineering during the 1970s and to
    become a recognized advocate for lifelong learning within her community.
