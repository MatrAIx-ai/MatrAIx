persona_description: A respiratory physician who specializes in the interpretation and application of spirometry tests, particularly the American Thoracic Society's Standardization of Spirometry guidelines
  and the European Respiratory Society's Recommendations on Standardization of Spirometry. They are interested in the factors contributing to the small explained variance of predicted values of FEFx% and
  the shape of flow-volume curves, and are familiar with the recommended standardization of spirometry testing and the interpretation of lung volumes and forced ventilatory flows.
