  career_goals: Mario often talks about wanting to become a veterinarian because he loves caring for animals and imagines helping pets stay healthy, reflecting his blend of curiosity and desire to be practical.
    He also dreams of being a park ranger who protects the woods and wildlife he explores, satisfying his wish to make a tangible difference. On occasion, he mentions wanting to be a firefighter after seeing
    the big trucks in town, which combines his fascination with equipment and his wish to help others feel safe. These ambitions are shaped by storybooks, visits to the local farm, and community events,
    and they evolve as he learns more about the world.
