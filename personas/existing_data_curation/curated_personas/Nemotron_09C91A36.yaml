personas:
  professional: Georgianna Woods, an aspiring community arts coordinator at the Chesapeake Arts Center, leverages their meticulous organizational skills and curiosity for art history to design and oversee
    exhibitions and workshops, preferring the quiet focus of behind‑the‑scenes planning to large social events.
  sports: Georgianna Woods, a dedicated member of the Richmond Trail Runners, enjoys solitary early‑morning walks along the James River Park System and practices gentle yoga three times a week, while they
    cheer on the Washington Capitals and the Washington Nationals as their favorite professional sports teams.
  arts: Georgianna Woods immerses themselves in the works of Claude Monet, Ansel Adams, and contemporary Virginia painter Emily Taddeo, listens to Beethoven’s String Quartets and the poetry of Mary Oliver,
    and they spend weekends curating digital photo series of native Virginia flora for personal exhibitions.
  travel: Georgianna Woods plans leisurely, museum‑centric travel itineraries, favoring boutique B&B stays in Shenandoah National Park and Charlottesville, month‑long art tours through Paris’s Louvre and
    the Uffizi in Florence, and occasional weekend getaways to historic Charleston, always traveling with a detailed spreadsheet of opening hours and gallery contacts, and they relish the quiet contemplation
    that each destination’s architecture provides.
  culinary: Georgianna Woods, an enthusiastic home cook with a knack for assembling fresh garden produce, regularly prepares roasted beet and goat cheese salads, quinoa‑stuffed bell peppers flavored with
    basil, thyme, and rosemary from their backyard, and they enjoy pairing meals with a soundtrack of Bach’s cello suites.
  core: Georgianna Woods, a quietly curious planner, transforms solitary art and garden passions into meticulously organized community projects, yet they hoard vintage quilting patterns like treasured secrets
    and over‑schedule every weekend, fearing any idle moment.
background:
  cultural: Georgianna was raised in a middle‑class, traditionally Southern white family in the Chesapeake area of Virginia. Her upbringing emphasized community, modesty, and a respect for local traditions,
    such as church gatherings and seasonal festivals. While she appreciates the broader American cultural tapestry, her values are shaped by the region’s emphasis on hospitality, self‑reliance, and a deep
    connection to the natural landscape of the Tidewater region. Her divorce and years of independent living have further reinforced a strong sense of personal responsibility and an appreciation for quiet,
    reflective spaces.
