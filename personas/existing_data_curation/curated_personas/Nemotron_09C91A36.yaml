  career_goals: While not currently employed, Georgianna aims to translate her organizational talents and artistic interests into meaningful community involvement. She plans to volunteer as a coordinator
    for the Chesapeake Arts Center, helping to organize exhibitions and workshops. She also aspires to develop a modest side business selling her handmade quilts and prints online, and hopes to take a community
    college course in digital media to enhance her creative skill set. In the longer term, she envisions mentoring young adults in the area who share a love for the arts, fostering their creativity while
    providing guidance.
