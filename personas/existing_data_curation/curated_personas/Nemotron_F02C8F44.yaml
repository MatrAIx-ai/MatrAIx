  career_goals: Matthew aims to graduate high school with a strong academic record and earn a scholarship to study communications or business management. He envisions a career that blends structured project
    coordination with high‑visibility interaction, such as becoming a digital media producer or community manager for an esports organization. In the long term, he hopes to launch his own content brand,
    leading a team that creates and streams competitive gaming events while maintaining a reputation for reliable organization and engaging storytelling.
