personas:
  professional: Hong Chou, a 15‑year‑old competitive gamer and budding digital creator, channels their love of structure and quick decision‑making into meticulously edited YouTube tutorials on League of
    Legends strategies while organizing the school's robotics club and leading debate prep sessions.
  sports: Hong Chou, a fifteen‑year‑old basketball enthusiast, plays pickup games after school, cheers for the Los Angeles Lakers, and follows the NBA season religiously while maintaining a disciplined
    three‑day‑a‑week workout routine that blends streetball drills with quick cardio bursts.
  arts: Hong Chou, a 15‑year‑old photographer and calligrapher, captures urban street scenes with a DSLR, admires the visual storytelling of photographers like Annie Leibovitz, practices brush‑pen calligraphy
    for calm, and fuels creative breaks with playlists from BTS, BLACKPINK, Jay Chou and Jolin Tsai.
  travel: Hong Chou, a fifteen‑year‑old adventure‑curious teen, has visited Tokyo for a gaming expo, explored Seoul’s street food markets, dreams of attending the Summer Games in Paris, and plans a future
    road trip to the West Coast to experience the e‑sports scene in Los Angeles.
  culinary: Hong Chou, a 15‑year‑old with a budding kitchen confidence, loves slurping spicy ramen, crafting homemade chicken katsu, sipping bubble tea with tapioca pearls, and occasionally experiments
    with making sushi rolls after watching tutorial videos.
  core: Hong Chou is a 15‑year‑old strategic competitor who blends organized gaming mastery, social leadership, and a penchant for late‑night video edits with a disciplined eye on health, finances, and
    creative pursuits.
background:
  cultural: Matthew is a second‑generation Chinese‑American whose family immigrated from Taiwan. At home, Mandarin is spoken and traditional holidays such as Lunar New Year are celebrated with food, red
    envelopes, and cultural performances, instilling values of discipline, family respect, and community involvement. Growing up in Seffner, Florida, he navigates a multicultural environment that blends
    his East Asian heritage with Southern U.S. customs, giving him a unique perspective that influences his social interactions, culinary preferences, and the bilingual content he creates.
