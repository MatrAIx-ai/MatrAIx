  career_goals: Marlyn aims to turn his practical skill set into a modest, part‑time home‑repair service that can generate a consistent income for his family while preserving a predictable schedule. He
    plans to enroll in a community‑college trade program to earn an EPA‑certified HVAC technician credential within the next two years, adding a new line of service to his business. Parallel to his financial
    goals, he wishes to expand his mentorship role at his local church, teaching basic handiwork and life‑skills to at‑risk youth. Ultimately, he envisions owning a small, locally‑focused contracting firm
    that serves Miami’s residential neighborhoods with reliability and a strong sense of community responsibility.
