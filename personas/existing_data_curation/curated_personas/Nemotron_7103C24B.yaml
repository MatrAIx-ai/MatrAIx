personas:
  professional: Marlyn Magee, a 46‑year‑old handyman‑entrepreneur, leverages expertise in carpentry, plumbing, electrical troubleshooting and budgeting to run a structured, part‑time home‑repair service
    while planning to add EPA‑certified HVAC work, marrying practical skill with clear, assertive communication to mediate neighborhood fixes.
  sports: Marlyn Magee, a devoted Miami Heat fan, follows NBA seasons religiously, joins weekly pickup basketball games at the local YMCA, supports the Miami Dolphins, and balances sedentary comforts with
    early‑morning fishing at Biscayne Bay as his low‑impact fitness routine.
  arts: Marlyn Magee, an avid listener of classic R&B, soul, and jazz, regularly tunes into Marvin Gaye, Aretha Franklin, and John Coltrane, and enriches Sunday mornings with gospel hymns at their church
    while attending the annual Miami Beach Jazz Festival.
  travel: Marlyn Magee, a weekend‑trip planner, enjoys structured road trips to the Florida Keys and Everglades National Park for fishing and wildlife, dreams of a family cruise to the Bahamas, and prefers
    budget‑friendly stays at coastal cabins that fit their predictable schedule.
  culinary: Marlyn Magee, a garden‑to‑table enthusiast, loves cooking heirloom tomatoes, fresh basil, and sweet potatoes into dishes like shrimp & grits, tomato‑basil pasta, and sweet‑potato casserole,
    while regularly seasoning meals with garlic, citrus, and a dash of hot sauce.
  core: Marlyn Magee balances a regimented routine—early‑rise fishing, spreadsheets, and carpentry—while wrestling with chronic worry, occasional over‑budgeting, and a love for soulful music that softens
    their practical edge.
background:
  cultural: Marlyn was born and raised in Miami’s historically Black neighborhoods, with family roots that blend African‑American heritage and Haitian‑American culture. He grew up speaking English and some
    Haitian Creole at home, celebrating both Juneteenth and Haitian Kanaval (Carnival) with family gatherings that feature traditional foods such as griot, rice and peas, and plantains. The multicultural
    rhythm of Miami—its Caribbean music, Latin influences, and vibrant community life—shapes his appreciation for diverse musical styles and cuisines. His church plays a central role in his cultural identity,
    emphasizing gospel music, communal service, and collective resilience. These cultural influences foster Marlyn’s values of family solidarity, community responsibility, and perseverance in the face of
    stress.
