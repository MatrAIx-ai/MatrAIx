personas:
  professional: Jeanette Neal, a 35-year-old real estate broker in the Quad Cities, combines sharp market analysis and negotiation prowess with a curious eye for sustainable home upgrades, using their organized
    yet flexible schedule and empathetic listening to guide clients while assertively championing ethical deals.
  sports: Jeanette Neal fuels their competitive spirit by attending weekly high‑energy Zumba classes, hiking the Mississippi River trail in summer, cheering for the Chicago Cubs and the Milwaukee Bucks,
    and playing on a co‑ed Quad Cities softball league that meets after work.
  arts: Jeanette Neal immerses themselves in the Quad Cities arts scene, volunteering at the Quad Cities Arts Fest, curating a home gallery of prints by local painter Sam Haug, enjoying live performances
    by indie folk artist Phoebe Bridgers, and regularly visiting the Figge Art Museum to study contemporary American art.
  travel: Jeanette Neal prefers a blend of planned road trips and spontaneous weekend getaways, often traveling the Great Lakes circuit to Mackinac Island and exploring the culinary streets of New Orleans,
    while dreaming of an Icelandic northern‑lights tour that balances adventure with their love for sustainable travel.
  culinary: Jeanette Neal delights in cooking Midwestern comfort food like corn‑meal hush puppies, braised pork shoulder with apple‑cider glaze, and heirloom tomato salad, experimenting with locally sourced
    sweet corn, smoked hickory chips, and pairing each dish with a thoughtfully selected Pinot Noir or crisp Riesling.
  core: Jeanette Neal is a curiosity‑driven, community‑focused real estate broker who channels stress into Zumba, tends a native vegetable garden, and occasionally splurges on vintage home décor while worrying
    about the next deal.
background:
  cultural: Jeanette was raised in a suburban Midwestern family with German‑Irish roots, where values like hard work, modesty, and community involvement were emphasized. Growing up in Davenport, she embraced
    local traditions such as the Iowa State Fair, Fourth of July parades, and Thursday night farmers markets. Her upbringing in a predominantly Protestant environment instilled a sense of service and gratitude,
    which she carries into her professional life through neighborhood outreach and charitable activities. The region's pragmatic, friendly culture aligns with her balanced approach to curiosity and practicality,
    while the close‑knit community reinforces her sociable, outgoing nature.
