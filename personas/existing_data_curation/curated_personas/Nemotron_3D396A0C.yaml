    self‑help literature'', ''Cooking with spouse'', ''Wine tasting'']'
  career_goals: Jeanette aims to become a top‑producing broker in the Quad Cities, eventually opening her own boutique realty firm that emphasizes community engagement and ethical practices. She plans to
    expand her license to include commercial property sales and to earn the Certified Residential Specialist (CRS) designation. A long‑term ambition is to mentor new agents, creating a structured apprenticeship
    program within her future firm. She also seeks to build a personal brand through local workshops on sustainable home upgrades, positioning herself as a trusted advisor who blends curiosity about new
    technologies with practical, results‑driven solutions for clients.
