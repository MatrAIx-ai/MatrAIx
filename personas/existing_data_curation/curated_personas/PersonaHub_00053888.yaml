persona_description: A museum worker and historian who specializes in the collection, conservation, and study of electronic calculation technology, particularly focusing on the history and preservation
  of Polish and foreign computers from the 20th and 21st centuries. They have expertise in restoring exhibits to their original state and putting them into working order. They are also involved in the strategic
  scientific research and experimental development program called SYNAT, which aims to examine the origin, techniques, and paths of development of computer technology.
