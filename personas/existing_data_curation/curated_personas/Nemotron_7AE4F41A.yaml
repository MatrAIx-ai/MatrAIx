personas:
  professional: Rabih Wade, a 44‑year‑old high‑school teacher in Hialeah, blends curiosity‑driven instructional design with practical classroom management, leveraging differentiated instruction and tech
    tools like Google Classroom while championing collaborative, harmonious school culture through their sociable, kind nature.
  sports: Rabih Wade stays active through weekly pickup basketball at the local park, casual soccer matches with neighbors, follows the Miami Heat and Inter Miami CF, and volunteers as a coach for the Hialeah
    Community Youth Soccer Club, embodying their energetic, sociable outlook.
  arts: Rabih Wade immerses themselves in classic‑rock vinyl by Led Zeppelin and The Rolling Stones, strums acoustic renditions of John Mayer’s songs at home, and regularly attends Cuban cultural festivals
    featuring Buena Vista Social Club, which fuels their creative spirit and community‑oriented personality.
  travel: Rabih Wade prefers moderately planned trips that blend cultural immersion with family time, having explored New Orleans, Mexico City, and Toronto, while dreaming of a future adventure to Buenos
    Aires and Patagonia to taste authentic Latin flavors and explore vibrant music scenes.
  culinary: Rabih Wade, an eager home‑cook, enjoys experimenting with Latin‑American flavors—preparing Argentine empanadas stuffed with spiced beef, Peru’s ceviche marinated in lime, and Mexican mole using
    home‑grown tomatoes and cilantro—while their modest garden supplies fresh herbs that elevate each dish.
  core: Rabih Wade blends a teacher’s curiosity with a handyman’s practicality, swapping classic‑rock vinyl for garden‑fresh salsa on weekends, all while juggling a bustling family life and a penchant for
    late‑night basketball games.
background:
  cultural: Rabih is a white American who grew up in South Florida, where the vibrant Cuban and broader Hispanic community shapes daily life. He embraces the region’s multicultural spirit, celebrating local
    festivals, enjoying Spanish‑language music, and having a working knowledge of Spanish that aids his communication with students and families. His upbringing emphasizes family cohesion, hospitality,
    and respect for diverse traditions, values that he brings into his classroom to create an inclusive environment.
