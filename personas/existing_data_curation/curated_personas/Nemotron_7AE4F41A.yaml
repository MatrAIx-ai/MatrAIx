  career_goals: Rabih aims to earn his teaching certification and pursue a bachelor’s degree in education to qualify for leadership roles. Over the next five years, he hopes to become a department head
    or instructional coordinator, where he can champion project‑based learning and lead professional‑development workshops. He also aspires to mentor new teachers, develop community outreach programs that
    connect the school with local cultural organizations, and eventually transition into a school‑wide administrative position such as principal or educational consultant.
