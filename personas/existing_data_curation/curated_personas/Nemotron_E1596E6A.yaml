  career_goals: Kristie aims to graduate high school with honors and pursue a degree in Business Administration with a focus on Marketing or Public Relations. In the short term, she plans to obtain an internship
    or volunteer role that lets her apply her event‑planning and communication skills, such as assisting the school’s student council or a local nonprofit. Long‑term, she aspires to become a marketing coordinator
    or community outreach manager, eventually leading large‑scale campaigns that combine her love for structure with her sociable nature. She also dreams of founding a youth mentorship program that teaches
    organization and leadership skills to middle‑school students.
