personas:
  professional: Susan Cohen, a seasoned manufacturing operations veteran, leverages their methodical, safety‑first mindset and competitive drive to run lean production schedules, enforce strict quality
    and inventory controls, mentor a successor through hands‑on SOP workshops, and cultivate a plant‑wide safety award program that showcases their talkative, people‑centered leadership style.
  sports: Susan Cohen follows the Chicago Cubs fervently during baseball season, joins a local senior bridge league that satisfies their competitive edge, they attend weekly low‑impact Tai Chi classes at
    the community center to manage osteoarthritis, and occasionally participate in a vintage bowling league with friends to stay active and socialize.
  arts: Susan Cohen stars in productions of Arthur Miller’s “The Crucible” with the Riverfront Community Theater, they delight in Julie Andrews’s Broadway classics during rehearsals, lead a library book
    club that dives into Jane Austen and Toni Morrison, and unwind by crocheting while listening to Miles Davis’s “Kind of Blue,” reflecting their love of structured performance and timeless storytelling.
  travel: Susan Cohen prefers meticulously planned group tours to historic sites, such as a week‑long Colonial Williamsburg immersion, a serene weekend getaway to Mackinac Island staying at a Victorian
    hotel, and a leisurely river cruise through the Danube, they balance their competitive desire to check off bucket‑list items with the comfort of familiar routines and a modest travel budget.
  culinary: Susan Cohen cooks hearty Midwestern staples such as slow‑cooked beef pot roast with carrots, potatoes, and thyme, buttery corn casserole topped with cheddar, and warm apple crumble made with
    Granny Smith apples and cinnamon, wielding their precise knitting‑like technique to dice vegetables consistently, while they occasionally treat themselves to a weekend dinner at a local steakhouse for
    a change of pace.
  core: Susan Cohen, a 71‑year‑old former manufacturing supervisor, blends relentless organization with a love for community stagecraft, garden precision, and bridge battles, all while they wrestle with
    periodic anxiety that fuels their meticulous budgeting and health‑tracking habits.
background:
  cultural: Susan was raised in the Midwest, where values of hard work, reliability, and community service are deeply ingrained. Her family has German‑American farming roots, and she grew up in a Protestant
    environment that emphasized fellowship, modesty, and civic duty. Living in Bloomington, Indiana, she enjoys the blend of small‑town sensibilities with the vibrant academic atmosphere of Indiana University,
    participating in local festivals, church events, and neighborhood gatherings. These cultural influences shape her practical outlook, organized lifestyle, and strong commitment to supporting both her
    workplace and her community.
attributes:
