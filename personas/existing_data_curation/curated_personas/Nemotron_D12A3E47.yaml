  hobbies: '[''Book Club Leadership'', ''Community Theater Acting'', ''Vocational Mentoring'', ''Organized Gardening'', ''Knitting and Crochet'', ''Bridge (Card Game)'', ''Cooking Traditional Midwestern
    Recipes'', ''Local History Research'']'
  career_goals: Approaching retirement, Susan aims to leave a lasting legacy by implementing a plant‑wide safety and efficiency program that can be sustained after she steps down. She hopes to mentor a
    successor who can carry forward her standards of organization and reliability, and she is interested in transitioning to a part‑time consultancy role to advise other facilities on process improvement.
    Susan also aspires to be recognized with a company safety award for her team and to establish a scholarship for local vocational students pursuing careers in manufacturing, reflecting her competitive
    drive and commitment to community development.
