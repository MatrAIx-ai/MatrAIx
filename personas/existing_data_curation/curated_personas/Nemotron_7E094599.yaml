  hobbies: '[''Community art fairs'', ''Improv theater'', ''Hiking'', ''Southern farm‑to‑table cooking'', ''Gardening'', ''Trivia nights'', ''Strategy board games'', ''Arduino DIY projects'', ''Design tutoring
    for high‑school students'']'
  career_goals: Sharon aims to transition into a senior leadership role where she can shape the strategic direction of design initiatives, eventually launching her own boutique consultancy that specializes
    in sustainable product design for regional manufacturers. She also wants to mentor junior designers, integrate more quantitative research into the creative process, and develop a personal workflow system
    that reduces stress and improves project predictability.
