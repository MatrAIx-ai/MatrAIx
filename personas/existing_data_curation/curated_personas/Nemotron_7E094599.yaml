personas:
  professional: Sharon Tiller, a senior design leader at a regional manufacturing firm, blends her STEM background and visual communication expertise—mastery of Adobe Creative Suite, Figma, Sketch, and
    SolidWorks—to steer data‑driven, user‑centered product development, a process they approach with competitive skepticism, flexible brainstorming sessions, and occasional deadline slip‑ups that trigger
    late‑night stress as they chase a future boutique consultancy focused on sustainable design.
  sports: Sharon Tiller tackles the nearby state parks on weekends with the Trailblazers Hiking Club, joins a community badminton league during the colder months, and passionately roots for the Pittsburgh
    Steelers, all while maintaining a stress‑relieving cardio routine that balances competitive board‑game nights with occasional sprint intervals.
  arts: Sharon Tiller curates community art fairs spotlighting regional textile makers and street muralists like Shepard Fairey, performs improv sketches with her troupe "The Quick Quipsters" inspired by
    Tina Fey’s wit, and relaxes to the sounds of Miles Davis, Sufjan Stevens, and Beyoncé, a blend that continually fuels their design sensibility.
  travel: Sharon Tiller favors spontaneous weekend getaways that combine hiking the Blue Ridge Mountains, culinary tours of New Orleans’ Creole quarter, and design‑focused visits to Portland’s maker spaces,
    yet often postpones a long‑awaited Patagonia trek because budgeting anxieties and a craving for routine disrupt their travel planning.
  culinary: Sharon Tiller, an intermediate home chef, transforms garden‑fresh heirloom tomatoes, locally raised pork shoulder, and sweet potatoes into rustic Southern dishes like smoked brisket collard‑green
    gumbo and bourbon‑glazed peach cobbler, while also experimenting with pop‑up supper club pairings such as miso‑marinated fried chicken with honey‑hot sauce.
  core: Sharon Tiller is a fiercely curious design leader whose competitive skepticism drives sustainable product ideas, yet they grapple with chronic worry, a habit of letting deadlines slip, and an irrepressible
    love for improv jokes at board‑game tables.
background:
  cultural: Sharon grew up in a middle‑class family in the American South, absorbing the region’s emphasis on hospitality, close‑knit family ties, and appreciation for folk art and music. While she identifies
    with Southern cultural values—such as community involvement and a relaxed pace—her education and professional experiences have given her a broad, national perspective, allowing her to blend traditional
    Southern sensibilities with contemporary design trends.
attributes:
