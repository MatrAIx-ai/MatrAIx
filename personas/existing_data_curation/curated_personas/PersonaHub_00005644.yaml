persona_description: A medical practitioner who specializes in the use of acupuncture in treating trauma and other psychological conditions, and who has experience in establishing community trauma medicine.
  She/he has a deep understanding of the Chinese medicine model of the psyche and the functions of the Sinew Channels, the luo-Connecting Vessels, and the Eight Extraordinary Meridians, and can use this
  knowledge to provide effective treatment. The persona is likely to be familiar with the NADA protocol and the work of Acupuncturists Without Borders.
