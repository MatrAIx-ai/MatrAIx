personas:
  professional: Amie Jenkins is a senior full‑stack developer who blends Python, JavaScript, and C++ expertise with generative‑art frameworks like Processing and p5.js to prototype immersive AR/VR experiences,
    thrives in agile teams, mentors junior engineers, and channels a love of novelty and flexible planning into leading multidisciplinary projects that push the boundaries of interactive media.
  sports: Amie Jenkins balances a low‑key fitness routine of weekend hikes in the San Gabriel Mountains and weekly yoga sessions with occasional trail runs, enjoys cheering for the LA Dodgers and LA Galaxy,
    and maintains a membership at Touchstone Climbing where they squeeze in indoor climbing whenever inspiration strikes, favoring flexibility over strict workout schedules.
  arts: Amie Jenkins immerses themselves in creative expression through digital painting in Procreate, generative coding with p5.js, and reading speculative fiction by Octavia Butler and N.K. Jemisin, while
    regularly attending indie game showcases like IndieCade LA, finding inspiration from artists such as Casey Reas and James Turrell and the music of Flying Lotus, which together fuel their experimental
    cooking sessions and midnight micro‑essay drafts.
  travel: Amie Jenkins prefers unstructured, curiosity‑driven travel, taking spontaneous weekend trips to places like Joshua Tree for stargazing, Santa Barbara vineyards for quiet wine‑tasting, and Kyoto's
    bamboo groves for reflective wanderings, while dreaming of an extended stay in Iceland to photograph the aurora, and relies on flexible booking platforms rather than rigid itineraries.
  culinary: Amie Jenkins approaches food as another experimental canvas, cooking dishes such as miso‑carrot ramen, saffron‑infused risotto, and chocolate‑chili mole at home using sous‑vide and fermentation
    techniques, favors ingredients like shiitake mushrooms, yuzu, and sumac, enjoys occasional dining at LA hotspots like Bestia and Kogi BBQ, and balances their culinary curiosity with a penchant for ordering
    delivery when a coding sprint consumes their time.
  core: Amie Jenkins is a curiosity‑driven technologist who melds code and art, lives flexibly, and thrives on solitary creativity while occasionally letting disorganization slip into their routines.
background:
  cultural: Amie grew up in a middle‑class, white family in the suburban communities surrounding Los Angeles, with deep roots in the mid‑west that blended into the West Coast’s diverse cultural tapestry.
    Her upbringing emphasized self‑reliance, curiosity, and a casual approach to schedules—values reflected in her relaxed attitude toward obligations. Living in Covina, she has been exposed to the vibrant
    mix of cultures in L.A. County, which has broadened her artistic sensibilities while she remains comfortable in smaller, close‑knit circles. Her heritage includes European ancestry (German and Irish)
    and she cherishes family traditions that celebrate independence, hard work, and a love for outdoor recreation.
