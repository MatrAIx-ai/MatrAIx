  career_goals: Amie aspires to lead a multidisciplinary team that fuses technology and art, developing immersive AR/VR or generative‑media products that push the boundaries of user experience. She aims
    to transition from a senior programmer to a product‑lead or chief technology officer at a boutique studio where flexible work structures and creative freedom are core values. Concurrently, she hopes
    to mentor more women and underrepresented groups in tech, fostering a collaborative culture that balances compassion with ambition. Long‑term, Amie envisions launching her own indie studio that creates
    interactive narrative games or digital installations, allowing her to shape both the technical and artistic direction of her work.
