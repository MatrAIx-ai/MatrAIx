persona_description: A Scottish educationalist who is interested in the topic of educational inclusion and the perceived systemic educational disadvantage affecting two groups of children in the Czech Republic,
  Romani children and those with severe, profound, and complex learning difficulties. The persona is also interested in the dialogues and developments in Czechoslovakia (later the Czech Republic) leading
  to greater educational inclusion for these children. The persona is knowledgeable about educational theory and the changes in Czech political, social, and economic life in the last ten years, as well
  as the educational needs of the two groups of children as perceived by Czech politicians and other education policy makers and administrators. Additionally, the persona is aware of the wider international
  scene in which the country is now involved, and is interested in the underlying reasons for the particular routes that the process of inclusion has taken in the Czech lands.
