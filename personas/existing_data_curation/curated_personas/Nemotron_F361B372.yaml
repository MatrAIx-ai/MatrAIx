  hobbies: '[''Fishing'', ''Woodworking'', ''Model train building'', ''Gardening'', ''Strategy board games'', ''Online chess'', ''Watching Badgers football'', ''Classic rock listening'', ''Reading sales
    and finance non-fiction'', ''Hiking'']'
  career_goals: James aims to become a top‑performing sales professional within the next three years, targeting promotion to Sales Manager and eventually Regional Sales Director. He plans to complete a
    bachelor's degree in Business Administration and earn professional sales certifications such as the Certified Professional Sales Person (CPSP). Long‑term, he aspires to launch his own wholesale distribution
    company, leveraging his methodical sales processes and reliable reputation to build a stable, profitable enterprise. Financially, he seeks homeownership, a robust retirement plan, and a track record
    of consistently exceeding revenue targets.
