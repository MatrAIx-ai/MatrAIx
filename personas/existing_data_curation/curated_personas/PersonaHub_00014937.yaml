persona_description: A public health expert and medical professor who chairs an expert commission on drug addiction and HIV/AIDS prevention in France. The commission's focus is on improving healthcare for
  drug users, reducing the spread of HIV and hepatitis among them, and implementing evidence-based policies to prevent drug addiction and reduce the risk of overdose. The persona is well-versed in epidemiology,
  public health, and medical ethics, and is dedicated to reducing the negative impact of drug use on public health and social welfare.
