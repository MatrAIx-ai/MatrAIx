  career_goals: In retirement, Michael aims to leverage his expertise to shape local education initiatives. He volunteers as a mentor for new teachers, seeks a seat on the advisory board of a regional educational
    nonprofit, and plans to author a practical guide on effective school administration. He also hopes to establish a small scholarship fund for students pursuing teaching degrees, preserving his legacy
    of supporting structured, high‑quality education.
