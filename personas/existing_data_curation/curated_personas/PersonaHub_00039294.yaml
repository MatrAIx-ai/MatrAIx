persona_description: A physician or medical researcher who is interested in the diagnosis and treatment of high blood pressure. The individual likely has expertise in hypertension and is familiar with the
  various diagnostic methods used to identify high blood pressure. They may have conducted research on the validity of conventional blood pressure measurements and have a deep understanding of the effects
  of abnormally high readings on blood pressure. The individual may also be interested in the development of new technologies for measuring blood pressure and the impact of these technologies on the diagnosis
  and treatment of high blood pressure.
