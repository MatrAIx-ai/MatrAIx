personas:
  professional: Noah Harris, an aspiring diesel‑technology specialist, leverages hands‑on farm maintenance experience and a knack for small‑engine repair to troubleshoot machinery, while their curiosity
    about renewable energy drives them to prototype solar‑panel installations alongside classic welding projects.
  sports: Noah Harris enjoys summer hunting and fishing, cross‑country skiing in winter, and follows the North Dakota State Bison football and the Minnesota Vikings; they occasionally join a local hiking
    club that meets at Turtle Mountain State Forest, and they keep fit by maintaining trail gear and working out with free weights in the community garage.
  arts: Noah Harris, a fan of classic science‑fiction novels by Isaac Asimov and Andy Weir, listens to progressive rock bands such as Pink Floyd and folk singer Sufjan Stevens while building wooden model
    airplanes, and they attend occasional screenings of Blade Runner at the town’s community theater where Harrison Ford’s performance inspires their DIY engineering projects.
  travel: Noah Harris prefers low‑key, self‑planned road trips that combine outdoor adventure with budget‑friendly stops, having backpacked Badlands National Park and day‑tripped to Glacier National Park,
    while they dream of kayaking the coastal islands of British Columbia and saving for a spring bike‑packing tour across the Great Lakes region.
  culinary: Noah Harris enjoys hearty prairie fare, frequently cooking skillet‑seared trout with lemon‑dill butter, elk stew simmered with root vegetables, and homemade cornbread, and they take pride in
    mastering campsite cooking techniques that blend smoked paprika and fresh cedar planks for a rustic flavor profile.
  core: Noah Harris blends a love for solitary wilderness pursuits with a tinkering spirit, often swapping a weekend fishing trip for a late‑night Arduino prototype, and they habitually lose track of calendar
    appointments while meticulously cataloguing every model airplane they finish.
background:
  cultural: Noah is a white American raised in the rural setting of Belcourt, North Dakota, a community that blends Midwestern farm culture with the proximity of the Turtle Mountain Indian Reservation.
    His family heritage likely traces to German and Scandinavian settlers common to the region, instilling values of self‑reliance, modesty, and a strong work ethic. Growing up near a reservation, he has
    been exposed to Indigenous traditions and perspectives, fostering a respectful appreciation for the land, seasonal rhythms, and the collaborative spirit that characterizes local life. He participates
    in community events such as county fairs and volunteer activities, reflecting both the broader North Dakota agrarian culture and the inclusive community ethos of the area.
attributes:
  skills: '[''Mechanical Repair'', ''Carpentry'', ''Computer Troubleshooting'', ''Outdoor Survival'', ''First Aid'', ''Small-group Collaboration'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Model Building'', ''Electronics Tinkering'', ''Science Fiction Reading'', ''Podcast Listening'', ''Community Garden Volunteering'']'
  career_goals: Noah plans to earn his GED and then enroll in a regional technical college, such as the North Dakota State College of Science, to obtain certification in diesel technology or welding. He
    envisions opening a small independent service shop that provides maintenance for farm equipment, snowmobiles, and offers general handyman services to his community. Additionally, he is curious about
    renewable‑energy technologies and hopes to integrate solar‑panel installation skills into his future business, combining his interest in new ideas with practical, hands‑on work. He seeks a flexible
    career that allows him to stay close to his hometown while offering autonomy and the opportunity to keep learning.
