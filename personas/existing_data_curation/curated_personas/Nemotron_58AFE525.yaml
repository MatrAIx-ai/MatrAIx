  hobbies: '[''Gardening'', ''Watercolor painting'', ''Quilting'', ''Visiting art galleries'', ''Reading poetry'', ''Birdwatching'', ''Community book club'', ''Attending public lectures'', ''Creative cooking'',
    ''Road trips to museums'']'
  career_goals: Although retired from formal employment, Nell aims to deepen her artistic practice by mastering watercolor painting and eventually hold a solo exhibition at the community arts center. She
    plans to compile and self‑publish a memoir that weaves together her personal stories with the history of Mount Morris, preserving local heritage. Nell wishes to expand her volunteer role, possibly coordinating
    intergenerational art workshops that bring seniors and schoolchildren together. She also aspires to travel to major art museums in Chicago and Detroit, seeking fresh inspiration. On a personal level,
    she hopes to adopt mindfulness practices to better manage stress and maintain her curiosity‑driven lifestyle.
