personas:
  professional: Regina Taylor, an aspiring concept artist, blends sketching, watercolor, and digital illustration in Procreate and Photoshop to craft vivid visual narratives, leveraging their imaginative
    curiosity and collaborative spirit while navigating a relaxed, sometimes chaotic workflow.
  sports: Regina Taylor fuels their energetic spirit by hiking the Appalachian Trail sections near the Lehigh Valley, playing pick-up basketball while cheering for the Philadelphia 76ers, and training with
    the Lehigh Valley Youth Soccer Club during the spring, all while following the Eagles and the Phillies as their hometown sports staples.
  arts: Regina Taylor weaves inspiration from watercolorist Loish, digital illustrator Kim Jung Gi, and fantasy author Neil Gaiman into her own sketches while curating indie playlists featuring Phoebe Bridgers,
    Tame Impala, and Mitski, and fuels her improv passion by attending workshops led by The Second City alumni and following creative YouTubers like Proko and Draw with Jazza.
  travel: Regina Taylor prefers spontaneous weekend road trips to nearby hiking spots like Ricketts Glen, city escapes to explore the Philadelphia Museum of Art and the street murals of Philadelphia, while
    dreaming of attending the Ghibli Museum in Tokyo and the Florence Biennale to soak up global art scenes and indie conventions.
  culinary: Regina Taylor, a self-taught kitchen experimenter, often whips up avocado-toast with feta, fresh basil, and citrus-zest-infused smoothies, masters easy ramen bowls with miso and soft-boiled
    eggs, and delights in crafting DIY jewelry-inspired dessert platters featuring chocolate-dipped strawberries and matcha-flavored macarons.
  core: Regina Taylor blends boundless imagination with a carefree, slightly chaotic workflow, chasing colors and stories while juggling impulsive splurges, late-night sketch marathons, and a habit of saving
    the world one doodle at a time.
background:
  cultural: As a 17‑year‑old white teenager from Whitehall in Lehigh County, Pennsylvania, Regina grew up in a suburban environment steeped in the region’s blend of historic industrial heritage and contemporary
    Mid‑Atlantic culture. Her family’s European ancestry—primarily German and Irish roots—has been reflected in family gatherings that feature traditional holidays, backyard barbecues, and a modest, work‑ethic‑oriented
    upbringing. The Lehigh Valley’s vibrant arts scene, including local mural projects and community theater, has provided her with frequent exposure to creative expression, while mainstream American media
    and social platforms shape her everyday worldview. She balances a sense of small‑town community belonging with a desire for broader cultural experiences, often seeking inspiration from both local traditions
    and global pop‑culture trends.
