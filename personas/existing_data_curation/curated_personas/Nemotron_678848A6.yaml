  career_goals: Regina dreams of turning her vivid imagination into a professional career in the visual arts. She aims to earn a scholarship to a dedicated art program—such as the Pennsylvania Academy of
    the Fine Arts or a design college—where she can refine her illustration and concept‑art skills. Ultimately, she envisions working as a freelance concept artist for video games or fantasy book publishers,
    while also building a personal brand as a content creator who shares tutorials and behind‑the‑scenes sketches on social media. She hopes to travel to art festivals and conventions, collaborate with
    other creators, and eventually launch her own independent studio that blends illustration, storytelling, and community workshops.
