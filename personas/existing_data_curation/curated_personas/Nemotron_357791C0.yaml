personas:
  professional: Dario Mendoza is a budding junior robotics enthusiast who applies methodical, structured thinking to building LEGO masterpieces, programming Scratch animations, and dissecting soccer strategies,
    combining his love for systematic problem‑solving with an outgoing, competitive edge.
  sports: Dario Mendoza is a forward on the Ocala Knights youth soccer club, idolizing Lionel Messi and following the Florida International University Panthers, who thrives on analyzing formations during
    games, participates in summer swim meets to stay fit, and occasionally joins a local basketball pick‑up league with friends.
  arts: Dario Mendoza devours graphic novels such as 'Amulet' by Kazu Kibuishi and 'Mighty Morphin' comics, draws inspiration from animators like Hayao Miyazaki and the whimsical sketches of Jeff Smith,
    creates Scratch animations featuring superhero robots, and proudly watches the live‑action performances of Disney's 'The Lion King' stage show.
  travel: Dario Mendoza loves planning family trips with a detailed checklist, enjoying road trips to historic sites like St. Augustine's forts and weekend visits to the Orlando theme parks, while dreaming
    of a future pilgrimage to the ancient ruins of Teotihuacan, balancing curiosity with a budget that relies on saved allowance and occasional grandparents' contributions.
  culinary: Dario Mendoza often helps prepare guacamole and homemade tacos with salsa verde for family celebrations, enjoys building 'LEGO' shaped pizza bites, and has a particular fondness for sweet churros
    dusted with cinnamon sugar, while occasionally sneaking extra cheese slices on their grilled cheese sandwiches despite a self‑imposed rule to limit dairy intake.
  core: Dario Mendoza is a methodical, competitive 11‑year‑old who merges a love for structured LEGO builds, soccer tactics, and graphic novels with a lively social spirit, yet sometimes lets impulsive
    snack cravings or missed stretches disrupt their otherwise disciplined routine.
background:
  cultural: Dario grows up in a bilingual Mexican‑American household in Ocala, Florida. Spanish is spoken at home, and he celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo with family
    gatherings, traditional foods, and music. His family emphasizes respect for elders and community involvement, which is reflected in his participation in local cultural festivals. At school, Dario navigates
    a multicultural environment, blending Mexican customs with typical Floridian experiences, giving him a diverse perspective on identity and community.
attributes:
  skills: '["Organizational and time‑management skills","Basic computer literacy and Scratch programming","Strategic team sports participation","Mechanical aptitude with LEGO and robotics kits"]'
  hobbies: '["Community soccer league","LEGO construction","Beginner robotics kits","Scratch animation projects","Reading graphic novels","Traditional Mexican dancing and cooking"]'
  career_goals: Dario envisions a future where he can combine his love for building things and his competitive spirit. He aspires to become a robotics engineer or software developer who creates interactive
    games and devices, and he also dreams of playing soccer at a high level, possibly representing a Mexican or U.S. team. His current goal is to excel in STEM classes and join his middle school’s robotics
    club, laying the groundwork for a career in technology while keeping open the possibility of pursuing professional athletics.
