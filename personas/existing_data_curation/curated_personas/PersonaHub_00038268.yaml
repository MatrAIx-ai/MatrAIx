persona_description: A professional writer and researcher who specializes in using social media sources, such as Facebook, in academic research papers. They have experience with the MLA style of citation
  and are familiar with the unique challenges and opportunities presented by citing social media sources. They have a background in journalism and have written for various publications, including "MetroPulse,"
  "Maryville-Alcoa Daily Times," and "Some" monthly. They have taught writing at North Carolina State University and the University of Tennessee, and hold a Master of Arts from the Shakespeare Institute,
  Stratford-on-Avon, England.
