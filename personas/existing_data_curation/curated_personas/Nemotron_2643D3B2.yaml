personas:
  professional: A budding visual artist and aspiring art therapist, Angel Dennis leverages their sketching, digital illustration, and public‑speaking skills while they channel their curiosity and emotional
    sensitivity into projects that blend creativity with empathy.
  sports: A casual sports enthusiast, Angel Dennis enjoys weekend basketball at the Youngstown YMCA, follows the Cleveland Browns and Cleveland Cavaliers avidly, and they participate in a local community‑center
    yoga class to stay flexible and manage stress.
  arts: A dedicated art lover, Angel Dennis spends Saturdays sketching in the Youngstown Museum of Art, drawing inspiration from indie folk musicians such as Bon Iver and Sufjan Stevens, as well as visual
    artists like Frida Kahlo and contemporary illustrators on Instagram, while they regularly attend poetry slams featuring spoken‑word artists like Rupi Kaur.
  travel: A travel‑curious teen, Angel Dennis prefers short, budget‑friendly road trips with friends, relishes day excursions to Columbus and Pittsburgh, and they daydream about an eventual art‑focused
    pilgrimage to New York City’s MoMA and a future study‑abroad semester in Paris.
  culinary: A budding home‑cook with eclectic tastes, Angel Dennis enjoys crafting avocado toast topped with feta and cherry tomatoes, experimenting with homemade ramen broth infused with miso and kombu,
    and they treat themselves to a cheesy pizza with fresh basil after late‑night sketching marathons.
  core: A creatively driven teen, Angel Dennis channels intense emotions into art, thrives on social collaboration, but they often battle anxiety that fuels both late‑night sketch marathons and occasional
    procrastination.
background:
  cultural: Angel comes from a white, Midwestern family in North Lima, Ohio, a small‑town community shaped by the industrial legacy of Mahoning County. The region values close‑knit family ties, school spirit,
    church gatherings, and local fairs. Exposure to community youth programs, the Youngstown art scene, and regional high‑school theater has nurtured her appreciation for the arts while maintaining a pragmatic,
    working‑class sensibility. Her upbringing blends modesty, friendliness, and a supportive community ethic with a growing openness to unconventional ideas and creative self‑expression.
attributes:
  skills: '["drawing", "digital illustration", "creative writing", "public speaking", "team coordination", "social media content creation", "basic photography", "photo editing (Canva, Lightroom)", "organizing
    school events", "empathetic listening", "conflict resolution"]'
  hobbies: '["sketching", "digital illustration", "visiting art galleries", "writing poetry", "participating in drama club", "attending school dances", "group movie nights", "listening to indie/folk music",
    "playing acoustic guitar", "volunteering at library art programs"]'
  career_goals: Angel aspires to attend a college program in visual arts or graphic design, with the long‑term ambition of becoming a professional artist or art therapist who can help others process emotions
    through creative expression. She also dreams of building an online portfolio and a modest YouTube or Instagram channel where she shares tutorials, art showcases, and mental‑health advocacy content.
    In the future she hopes to collaborate with community organizations in Mahoning County to run art‑based workshops for youth, merging her creative passions with her desire to support her peers' emotional
    well‑being.
