personas:
  professional: Michael Breton, a 35-year-old aspiring HVAC technician, merges his hands-on handyman experience with a relentless curiosity for emerging smart-home systems, delivering reliable, organized
    home-service solutions while they methodically plan a part-time business that balances steady income with the flexibility to pursue personal projects.
  sports: Michael Breton, a weekend angler at Chickamauga Lake with the Chickamauga Anglers Association and a member of the Chattanooga Hiking Club, keeps active by trekking the Appalachian foothills, while
    they cheer on the Atlanta Braves, the Tennessee Titans, and the local Chattanooga Football Club, favoring steady, low-key fitness over competitive sports.
  arts: Michael Breton, a reserved acoustic-guitar enthusiast, finds solace in playing John Mayer’s “Gravity” and finger-picking Bob Dylan’s “Girl from the North Country,” while they admire Ansel Adams’
    black-and-white wilderness photography and attend monthly craft fairs to display their handcrafted wooden art pieces, occasionally indulging in indie films like “Moonrise Kingdom.”
  travel: Michael Breton, a methodical trip planner who logs routes in a leather-bound notebook, enjoys weekend getaways to the Great Smoky Mountains and Asheville’s Blue Ridge Parkway, dreams of a summer
    road-trip to Banff National Park in Canada, and balances family commitments with a modest travel budget by prioritizing low-cost cabins over luxury resorts.
  culinary: Michael Breton, an intermediate home cook, frequently prepares hearty chicken pot pie, herb-seasoned grilled trout from his own catch, and a roasted vegetable medley of zucchini, tomatoes, and
    rosemary from his garden, while they perfect a flaky pie crust and occasionally indulge in rich mac & cheese for the kids.
  core: Michael Breton balances a tightly controlled budget, a toolbox always within reach, a puzzler’s curiosity, and an undercurrent of worry that fuels nightly mindfulness attempts, all while humming
    an off-key guitar lullaby.
background:
  cultural: Michael is a white Southern American who grew up in the suburbs of Chattanooga, Tennessee. His family has deep roots in the Appalachian foothills, where values of self‑reliance, modesty, and
    community service are emphasized. He was raised in a tight‑knit, middle‑class household that attended a local Baptist church, fostering a respect for tradition and family loyalty. While he embraces
    these cultural norms, his curiosity drives him to explore new ideas and technologies, blending a pragmatic Southern work ethic with an openness to learning.
attributes:
  skills: '["Automotive maintenance", "Home repair and improvement", "Woodworking", "Computer troubleshooting", "Budgeting and personal finance", "Basic cooking", "Emergency preparedness"]'
  hobbies: '["Reading non-fiction", "Puzzles and logic games", "Scale model building", "Woodworking projects", "Fishing", "Hiking", "Gardening", "Acoustic guitar", "Cooking comfort foods"]'
  career_goals: Michael wants to translate his practical skill set into a sustainable source of income. Over the next two years he plans to earn an HVAC certification or an electrical journeyman license,
    which will allow him to start a part‑time home‑services business. He also aims to improve his stress‑management techniques, perhaps through mindfulness training, so he can maintain a balanced work‑life
    routine. Long‑term, he aspires to become financially stable enough to support his family, possibly expanding his business into a small service firm that employs other local workers. He hopes to continue
    learning new technologies, such as smart‑home installation, while keeping his work grounded in reliable, hands‑on methods.
