  career_goals: Even in retirement, Susan remains driven to make a lasting impact on her community. She aims to launch an intergenerational arts program that pairs senior volunteers with elementary school
    students to explore painting, storytelling, and music. She is working on a memoir that weaves together her experiences as a teacher, a mother, and a widow, hoping to publish it locally. Susan also plans
    to serve as a docent at the nearby Carnegie Museum of Art, leading tours that highlight lesser‑known works. Additionally, she wishes to expand her own learning by mastering digital photography and using
    those skills to document local historic sites, ultimately curating a small exhibition at the community center. Travel to cultural hubs such as Washington, D.C., and New York City for major art exhibitions
    remains an ongoing ambition.
