personas:
  professional: Susan Espeut is a retired secondary English teacher and seasoned curriculum developer who now channels her curiosity and spontaneous energy into designing intergenerational arts workshops,
    mentoring new educators, and volunteering as a community docent, even as she sometimes wrestles with keeping to strict deadlines.
  sports: Susan Espeut enjoys low‑impact activities such as senior‑center yoga, weekend walks along the Allegheny River Trail, and cheering on the Pittsburgh Steelers and Penguins, while occasionally joining
    a local seniors’ pickleball group for friendly competition.
  arts: Susan Espeut paints watercolors inspired by visits to the Carnegie Museum of Art and the works of Monet, Warhol, and O'Keeffe, curates an intergenerational storytelling project, and regularly attends
    gallery talks featuring local artists like Ellen Gallagher.
  travel: Susan Espeut favors culturally rich trips, having explored historic towns such as Gettysburg and Williamsburg and attended major art exhibitions in Washington, D.C., and New York City, often planning
    these adventures spontaneously using senior travel discounts while keeping long‑haul flights to a minimum due to budget constraints.
  culinary: Susan Espeut cultivates rosemary, thyme, basil, and lavender on her balcony to flavor dishes like herb‑roasted chicken, lavender honey tea, Mediterranean tabbouleh, and experiments with Indian
    chickpea curry and Thai tom yum soup, though she sometimes over‑season meals when inspiration strikes.
  core: Susan Espeut blends a lifelong passion for teaching with a zest for art, gardening, and community, embracing spontaneous creativity while managing occasional disorganization and a love for historic
    travel.
background:
  cultural: Susan grew up in the post‑World War II suburbs of Pittsburgh, a largely white, middle‑class community with German‑Polish ancestry. Her upbringing emphasized education, community service, and
    modest Midwestern values. She attended a local public school and earned her graduate degree in education from the University of Pittsburgh, a path that reinforced a strong belief in lifelong learning.
    Throughout her adult life, she has been active in her Methodist congregation and later in an ecumenical seniors’ fellowship, celebrating traditional American holidays while also embracing broader cultural
    experiences through art, travel, and literature. The industrial heritage of Allegheny County, combined with the region’s vibrant arts scene, has shaped her appreciation for both historical preservation
    and contemporary creativity. While rooted in American cultural norms, she remains open to unconventional ideas and global artistic influences, reflecting the progressive currents she experienced during
    the social changes of the 1960s and 1970s.
