personas:
  professional: Mia Tilghman, a retired community volunteer, channels their lifelong organizing talent into coordinating senior-center activities, preserving oral histories, and teaching cooking workshops,
    balancing meticulous planning with the flexibility needed to adapt to the varied needs of neighbors.
  sports: Mia Tilghman enjoys low-impact fitness, walking the Lake County shoreline three times a week, participating in community water-aerobics classes, and cheering on the Cleveland Guardians during
    baseball season, while also engaging in weekly bridge tournaments that double as mental exercise.
  arts: Mia Tilghman finds joy in listening to classic jazz legends like Louis Armstrong and Ella Fitzgerald, attending occasional gospel choir performances, and exploring historical exhibits at the local
    history museum, while collecting memoirs of notable public figures to enrich their own storytelling.
  travel: Mia Tilghman prefers short, organized trips such as day excursions to the Rock and Roll Hall of Fame, weekend getaways to Niagara Falls, and guided senior tours of Washington, D.C. monuments,
    planning each journey around comfort, accessibility, and the opportunity to visit local historical sites.
  culinary: Mia Tilghman excels at homestyle cooking, regularly preparing dishes like slow-cooked pork shoulder with rosemary, buttery buttermilk biscuits, honey-glazed carrots, and sweet potato casserole,
    while also experimenting with new recipes such as quinoa salad with citrus vinaigrette, often sourcing fresh herbs from their garden.
  core: Mia Tilghman blends quiet curiosity with disciplined organization, preserving community stories, tending a garden, and mastering recipes, all while navigating the occasional forgetfulness that comes
    with a long, full life.
background:
  cultural: Mia was born in 1933 to parents who migrated from the rural South to Cleveland during the Great Migration, settling in a vibrant Black neighborhood that centered around the church, local barbershops,
    and community halls. Growing up in the era of segregation, she witnessed the civil-rights movement firsthand and participated in local voter-registration drives and church-based activism. Her family
    traditions emphasize soulful cooking, storytelling, and strong church ties, which she continues to honor through her involvement in Euclid's African-American women's club and senior-center programs.
    The cultural values of resilience, communal support, and respect for elders shape her daily life and guide her efforts to preserve and share her community's history.
attributes:
  skills: '[''Traditional African-American cooking'', ''Vegetable and herb gardening'', ''Quilting and fabric arts'', ''Oral history interviewing and documentation'', ''Senior-center activity coordination'',
    ''Basic computer and email usage'', ''Household budgeting and financial organization'', ''Light home-maintenance'']'
  hobbies: '[''Reading historical biographies'', ''Gardening (vegetables and herbs)'', ''Cooking (traditional and experimental recipes)'', ''Quilting with a small group'', ''Walking by Lake County shoreline'',
    ''Listening to jazz and gospel music'', ''Church choir and bible study'', ''Genealogy research'', ''Bridge and card games'', ''Visiting museums on African-American history'']'
  career_goals: Although retired, Mia's ambitions focus on leaving a lasting legacy for her family and community. She aims to compile her memoirs and a collection of family recipes into a small printed
    book, establish a community archive of Black oral histories from Euclid, and lead a series of cooking workshops at the local senior center. She also hopes to mentor a few high-school students interested
    in genealogy and to master digital photography so she can document local historic sites. Her overarching goal is to keep learning, stay engaged, and ensure that the stories of her generation are not
    forgotten.
