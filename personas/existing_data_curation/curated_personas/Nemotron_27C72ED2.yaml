personas:
  professional: Moises Briceno, a 57-year-old mechanical and systems engineer with three decades of experience, combines sustainable product design with artistic visual storytelling, leveraging SolidWorks,
    ANSYS, Python, and IoT prototyping to lead cross‑disciplinary teams, while their relaxed, flexible approach sometimes leads to loosely organized project timelines, but their curiosity and sociability
    make them an engaging mentor and a persuasive speaker at industry conferences.
  sports: Moises Briceno guards the midfield for the Raleigh Rangers community soccer league every Saturday, cheers on Charlotte FC during the MLS season, and hikes the trails of Umstead State Park in the
    cooler months, blending an energetic love for team camaraderie with a relaxed, spontaneous approach to fitness that sometimes skips formal workouts.
  arts: Moises Briceno captures vibrant street art and Appalachian vistas through a Canon EOS, exhibits watercolors inspired by Monet and Ansel Adams at the Oakwood Community Gallery, and spins salsa and
    bachata with their spouse to the rhythms of Celía Cruz, embodying a creative crossroads where technical precision meets colorful expression.
  travel: Moises Briceno prefers spontaneous, reward‑point‑driven trips that blend artistic immersion and natural wonder, such as weekend hikes along the Blue Ridge Parkway, a cultural dive into Oaxaca's
    markets, and a leisurely photography pilgrimage to Patagonia, often planning on the fly while balancing a modest budget and family commitments.
  culinary: Moises Briceno whips up fragrant baleadas with refried beans, crumbled cheese, and avocado, hand‑rolled pupusas stuffed with loroco and pork, and slow‑cooked tamales wrapped in banana leaves,
    showcasing a confident home‑chef level that blends traditional corn‑based flavors with a curiosity for fresh herbs and seasonal produce.
  core: Moises Briceno is a 57‑year‑old engineering veteran who fuses sustainable design with street‑level art, dances salsa on weekends, and balances disciplined mentorship with a delightfully disorganized
    love for spontaneous camera upgrades.
background:
  cultural: Moises was born and raised in a small town near San Pedro Sula, Honduras, where family life revolved around music, storytelling, and communal meals. He immigrated to the United States in his
    early twenties and settled in the Research Triangle area, maintaining fluency in Spanish and deep ties to the Honduran diaspora. He actively participates in local cultural events such as the Feria Hondureña
    in Raleigh, celebrates traditional holidays like Feria de San Juan, and supports a Honduran cultural association that promotes arts, language, and community service. His heritage informs his collaborative
    style, his passion for cooking and dance, and his commitment to using engineering to improve the lives of fellow immigrants and underserved populations.
attributes:
  skills: '[''Mechanical design and product development'', ''CAD modeling (SolidWorks, AutoCAD)'', ''Finite element analysis (ANSYS)'', ''Systems integration and IoT prototyping'', ''Data analysis and scripting
