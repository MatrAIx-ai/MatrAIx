    ''Cross‑cultural communication and collaborative creativity'']'
  hobbies: '[''Photography (urban, nature, cultural events)'', ''Watercolor painting'', ''Salsa/Bachata dancing'', ''Cooking traditional Honduran cuisine'', ''Community soccer'', ''STEM mentorship for youth'',
    ''Hiking (Umstead State Park, Eno River)'', ''Reading science‑fiction and biographies'', ''Arduino and DIY electronics projects'', ''Attending art exhibitions and theater performances'']'
  career_goals: Moises aims to transition into a senior advisory role where he can shape sustainable engineering strategies for a mid‑size tech firm or consulting practice. He wishes to mentor the next
    generation of engineers, especially those from underrepresented backgrounds, through formal mentorship programs and community outreach. A long‑term ambition is to launch a boutique consultancy that
    designs low‑cost, resilient housing and infrastructure solutions for immigrant and low‑income communities, leveraging his Honduran heritage and engineering expertise. Moises also aspires to become an
    advocate for integrating artistic design thinking into engineering curricula, delivering keynote talks at conferences, and publishing a guide on creative engineering practices.
