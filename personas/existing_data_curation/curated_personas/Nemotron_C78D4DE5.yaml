personas:
  professional: Ebenezer Azhar, a 52‑year‑old probation and correctional treatment specialist, blends a humanities degree with over two decades of field experience to deliver structured, risk‑focused assessments
    while their flexible approach to paperwork sometimes leads to late filings, and their natural sociability makes them a charismatic group counselor and public speaker, even as they remain cautiously
    skeptical of client motives and channel competitive ambition into pursuing a director‑level position and mentoring junior staff.
  sports: Ebenezer Azhar is a dedicated follower of the Macon County Panthers high‑school football team, never missing a Friday night game and often leading the cheering section with a booming voice, while
    also participating in a local senior fishing league on Lake Blackshear and occasionally joining community pickup basketball games despite a preference for structured routines and a competitive drive
    to see his favorite teams win.
  arts: Ebenezer Azhar, who directs the church choir and stars in community theater productions, channels a love of gospel and blues legends such as Mahalia Jackson and B.B. King into weekly rehearsals,
    while devouring historical nonfiction on social movements and using their charismatic stage presence to captivate audiences both on and off the stage.
  travel: Ebenezer Azhar enjoys road‑tripping along the historic Deep South, having recently visited Savannah’s riverfront and the Civil Rights Trail in Montgomery, yet prefers the flexibility of spontaneous
    stops over strict itineraries, and dreams of a guided pilgrimage to Washington, D.C.’s national museums when finances allow.
  culinary: Ebenezer Azhar, an avid backyard grill master, frequently prepares smoked pork ribs marinated in a sweet‑spicy rub, slow‑cooked collard greens seasoned with smoked turkey, and fresh garden tomatoes
    turned into a summer gazpacho, while occasionally splurging on premium bourbon to pair with his barbecue, reflecting both a seasoned palate and a penchant for indulgent comforts.
  core: Ebenezer Azhar is a charismatic 52‑year‑old probation officer who balances a love for structured community service with a relaxed, sometimes disorganized lifestyle, channeling competitive energy
    into both his career and weekly poker tables while wrestling with lingering worry and a penchant for spontaneous barbecue experiments.
background:
  cultural: 'Ebenezer was raised in a close‑knit African‑American family in Ellaville, a town steeped in the legacy of Georgia’s cotton‑farm past and the civil‑rights struggles of the 1960s. His grandparents
    were active members of the local Baptist congregation, and the church has been the cultural cornerstone of his upbringing, instilling values of community service, storytelling, and resilience. He attended
    a historically black high school where oral history and Southern folklore were part of the curriculum, later earning his humanities degree at Savannah State University, an HBCU that deepened his appreciation
    for African‑American literature, philosophy, and social theory. This background informs his professional ethos: he approaches probation work with a culturally attuned lens, drawing on the traditions
    of gospel music, soul food, and communal support that define Southern black culture. He also honors family rituals such as Sunday picnics, church festivals, and the annual celebration of Juneteenth,
    which reinforce his identity and motivate his commitment to uplift the next generation in his community.'
attributes:
  skills: '[''Interpersonal communication'', ''Risk assessment and case evaluation'', ''Crisis intervention and de-escalation'', ''Individual and group counseling'', ''Community outreach and public speaking'',
