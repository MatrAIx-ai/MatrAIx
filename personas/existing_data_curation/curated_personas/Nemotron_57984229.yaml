personas:
  professional: Jenny Locklear, a retired biotechnology researcher, uses their deep expertise in experimental design, statistical modeling, and technical writing to meticulously organize community STEM
    workshops, mentor senior learners, and weave scientific rigor into their watercolor abstractions.
  sports: Jenny Locklear stays active by joining a local senior walking club that meets twice weekly, tending to their garden as a form of low‑impact exercise, and cheering for the Kansas City Royals during
    baseball season, while they avoid high‑intensity workouts due to osteoarthritis, preferring gentle stretching and occasional senior yoga.
  arts: Jenny Locklear expresses creativity through watercolor abstracts inspired by fractal patterns, admires the works of Monet and Georgia O'Keeffe, experiments with digital illustration on a tablet
    after studying tutorials by artist Lisa Congdon, and regularly attends productions such as "The Glass Menagerie" at the Olathe Civic Theatre.
  travel: Jenny Locklear prefers low‑key, well‑planned trips that balance curiosity with comfort, such as weekend road trips to the Flint Hills, a memorable visit to Yellowstone National Park last summer,
    and a dream to explore Florence’s art galleries, all arranged around medication schedules and mobility considerations.
  culinary: Jenny Locklear enjoys farm‑to‑table cooking, skillfully preparing dishes like heirloom tomato ratatouille seasoned with fresh basil, thyme, and a splash of aged balsamic, while they also relish
    a simple slice of rye bread with avocado and a cup of Earl Grey tea, often sharing home‑grown produce with neighbors.
  core: Jenny Locklear blends scientific rigor with artistic whimsy, obsessively cataloguing garden yields in spreadsheets while occasionally losing track of time in watercolor sessions, a habit that keeps
    them both meticulously organized and delightfully distracted.
background:
  cultural: Jenny was born in 1942 in a small town on the Kansas plains to a family of German‑American heritage. Raised in a Methodist household, she was steeped in Midwestern values of hard work, community
    service, and self‑reliance. Her formative years were shaped by the post‑World War II optimism, the civil‑rights movement, and the women’s liberation era, which inspired her pursuit of a STEM graduate
    degree at a time when few women entered the field. Living most of her adult life in Olathe, Johnson County, she has been an active participant in local church activities, the city’s historical society,
    and neighborhood volunteer groups. Her cultural perspective blends traditional Midwestern hospitality with a lifelong commitment to education, artistic expression, and inclusive community building.
