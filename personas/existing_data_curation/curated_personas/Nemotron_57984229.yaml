  hobbies: '["Watercolor painting", "Gardening", "Reading (fiction, classic literature, popular science)", "Bird‑watching", "Crossword puzzles", "Local theater attendance", "Genealogy research", "Digital
    photography", "Book club participation", "Teaching basic computer skills", "Digital illustration"]'
  career_goals: Although retired, Jenny aims to leave a lasting intellectual legacy. She plans to author a memoir that interweaves her scientific career with reflections on art and imagination, and hopes
    to publish a series of essays in a local history journal. She is eager to volunteer as a STEM mentor for middle‑school girls in Olathe, develop a community art‑science exhibition at the Johnson County
    Museum, and serve on the advisory board of a regional senior center to improve program quality. Additionally, Jenny aspires to master a digital illustration tablet, and to secure a small grant to fund
    a weekly interdisciplinary lecture series for seniors.
