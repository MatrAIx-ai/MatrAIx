personas:
  professional: Edna Castello, a precociously organized toddler, approaches playtime with methodical curiosity, cataloguing colored blocks by shape and hue, and they reliably finish each step of a puzzle
    before moving on, balancing new ideas with the comfort of familiar routines.
  sports: Edna Castello, enrolled in the Sunshine Tots Gymnastics Club, loves the soft foam pit and neatly lines up their tiny water shoes beside the bright red soccer ball they occasionally pretend to
    dribble during preschool playtime.
  arts: Edda Castello, who delights in belting out the whimsical tunes of 'The Wheels on the Bus' and Disney's 'Let It Go', spends afternoons doodling beloved characters like Mickey Mouse and Sesame Street
    friends with oversized crayons, and they proudly perform for any small audience that gathers.
  travel: Edna Castello, who enjoys family road trips to the nearby sandy beach where they methodically collect seashells of the same size, also treasures quiet afternoons at their grandma’s cottage, listening
    to storytime on the porch and looking forward to a future visit to the Grand Canyon.
  culinary: Edna Castello, who prefers creamy macaroni and cheese, sweet banana slices, and sticky peanut butter sandwiches, proudly declares they can spread the butter solo, though they often leave a crumb
    trail across the kitchen floor.
  core: Edna Castello is a meticulously curious two‑year‑old who balances a love for orderly play with occasional snack‑driven impulsivity, and they turn everyday routines into tiny adventures.
background:
  cultural: Edna is part of a Black family rooted in the African-American community of Oaklyn, New Jersey. Her household celebrates cultural traditions such as Juneteenth, soul-food cooking, and gospel
    music. Family stories often include references to Southern heritage and Caribbean relatives, providing Edna with a rich tapestry of language, rhythm, and communal values that nurture her cooperative
    and considerate personality.
attributes:
  skills: '[''basic verbal communication'', ''fine motor coordination (stacking blocks, placing beads)'', ''color and shape identification'', ''simple problem solving (puzzle fitting)'', ''routine adherence
    and self-regulation'']'
  hobbies: '[''building block towers'', ''sorting crayons by color'', ''listening to family-selected R&B/gospel music'', ''reading picture books with caregiver'', ''exploring the backyard with a parent'']'
  career_goals: Although formal career plans are beyond a typical two‑year‑old, Edna already shows a clear affection for caregiving. She often pretends to feed and soothe her stuffed animals and dolls,
    and she enjoys watching her caregiver read books. In these play moments she has hinted, in toddler speak, about wanting to help others, which caregivers interpret as early inclinations toward roles
    like teacher or nurse.
