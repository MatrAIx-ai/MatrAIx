personas:
  professional: Yeimmy Tran, a 16‑year‑old aspiring public‑health strategist, leverages her bilingual communication, meticulous organization, and sociable energy to lead school projects, coordinate community
    events, and volunteer tutoring, laying the groundwork for a future role as a culturally responsive community outreach coordinator.
  sports: Yeimmy Tran, a 16‑year‑old member of Riverside United co‑ed soccer club, trains five days a week, emulating the fast‑paced style of Los Angeles FC while also following a mix of HIIT routines and
    weekend beach volleyball to stay fit, and she never misses the weekly team huddle that fuels her sociable spirit.
  arts: Yeimmy Tran merges her love for digital illustration—often inspired by Loish’s pastel palettes—with a passion for K‑pop choreography from BTS and contemporary dance pieces by the Alvin Ailey American
    Dance Theater, while winding down listening to indie singer Clairo and binge‑watching Netflix series starring Zendaya, and she habitually sketches doodles in the margins of her math notes.
  travel: Yeimmy Tran enjoys weekend road trips to Joshua Tree and coastal hikes in Big Sur, while dreaming of a spring exchange in Kyoto, Japan, and fantasizing about a summer adventure to the beaches
    of Bali, balancing meticulous itinerary planning with spontaneous photo‑journalism for her school blog and occasionally overpacking her backpack with extra snacks.
  culinary: Yeimmy Tran, an avid home‑chef at 16, blends her family’s traditional Southeast Asian flavors—perfecting phở bò, bánh mì, and lemongrass‑infused chicken—with teenage cravings for avocado toast
    and ramen, often mixing fresh cilantro, Thai basil, and sriracha to create Instagram‑worthy meals, though she sometimes burns the garlic when multitasking between soccer practice and homework.
  core: Yeimmy Tran, a 16‑year‑old organized whirlwind, balances soccer drills, digital sketches, and endless sibling karaoke sessions, but keeps a secret stash of gummy bears behind her laptop for late‑night
    study marathons.
background:
  cultural: Yeimmy comes from a Vietnamese‑American family that settled in Murrieta, California. Her household blends traditional Southeast Asian customs—such as celebrating Tet, cooking pho and spring
    rolls, and speaking Vietnamese at home—with the multicultural influences of suburban Southern California. The family places a high value on education, respect for elders, and community cohesion, while
    also encouraging independence and curiosity. Growing up, Yeimmy has participated in both local community festivals and school cultural clubs, giving her a nuanced perspective on navigating multiple
    cultural identities.
attributes:
  skills: '["Event coordination", "Bilingual communication (English & Vietnamese)", "Digital literacy (Google Workspace, Microsoft Office, Canva, basic video editing)", "Peer tutoring in math and science",
    "Cooking traditional Southeast Asian dishes", "Leadership in school clubs"]'
  hobbies: '["Soccer (community league)", "Cultural dance (traditional Vietnamese and K‑pop)", "Family cooking and recipe experimentation", "Digital art with Procreate", "Volunteer tutoring at Riverside
    Youth Center", "Reading contemporary YA novels", "Listening to and learning K‑pop choreography"]'
  career_goals: Yeimmy aspires to attend a four‑year university where she can study public health or urban planning, fields that combine her curiosity for new ideas with her practical, methodical mindset.
    She dreams of becoming a community outreach coordinator who designs culturally responsive health programs for Asian American youth in Southern California. In the longer term, she hopes to earn a master’s
    degree, lead nonprofit initiatives, and mentor younger students, using her organizational talents and bilingual background to foster inclusive environments.
