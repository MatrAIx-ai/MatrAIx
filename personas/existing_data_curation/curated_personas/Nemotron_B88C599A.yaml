personas:
  professional: Linda Rubio, an aspiring wildlife illustrator, channels her curiosity and love for unconventional ideas into richly detailed sketches of Pacific Northwest forests and animals, while her
    balanced approach to organization keeps her art supplies neatly sorted and her collaboration‑friendly nature makes her a popular contributor to school art displays and community art fairs.
  sports: Linda Rubio, a regular on the Portland Timbers youth soccer team and a budding swimmer at the local community pool, balances active play with weekend hikes through the Columbia River Gorge, all
    while proudly wearing a Portland Trail Blazers cap during basketball game nights.
  arts: Linda Rubio, who immerses herself in drawing lush Pacific Northwest landscapes inspired by Claude Monet and animates wildlife scenes reminiscent of Walt Disney’s nature sketches, also creates bead
    necklaces echoing tribal motifs seen at community powwows, enjoys practicing the recorder with Vivaldi’s Concerto in G, and frequently revisits adventure tales by Rick Riordan and mythic retellings
    by Marion Zimmer Bradley.
  travel: Linda Rubio, who loves spontaneous day trips to the Oregon Coast’s Seaside beaches and weekend hikes in the Cascade Mountains, dreams of exploring the towering redwoods of California and the historic
    castles of Scotland, yet usually travels on family‑planned itineraries that balance adventure with bedtime routines.
  culinary: Linda Rubio, a budding kitchen assistant who delights in making rainbow fruit kebabs with strawberries, grapes, and blueberries, whips up creamy macaroni and cheese topped with diced pepper,
    and savors bite‑size salmon sushi rolls, while always insisting on a side of sweet‑potato fries for extra crunch.
  core: Linda Rubio, a curious nine‑year‑old artist who balances sketching at the woods’ edge with lively LEGO builds, habitually misplaces their favorite recorder reed yet never forgets to share a hand‑crafted
    bead necklace with a friend.
background:
  cultural: Linda comes from an Abenaki American Indian family that has lived in the New England region for generations. Her grandparents teach her traditional stories, drum rhythms, and the basics of the
    Abenaki language. Family gatherings often involve sharing wild rice, maple syrup, and cedar tea, and celebrating seasonal ceremonies that honor the land and water. Growing up in Portland, Maine, she
    blends these cultural practices with the wider community, participating in school multicultural programs and local environmental projects.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Drawing and painting'', ''Basic computer skills'', ''Empathy and active listening'', ''Nature observation'', ''Basic Abenaki language knowledge'']'
  hobbies: '[''Drawing'', ''Beadwork'', ''Reading'', ''Nature walks'', ''Playing recorder'', ''Attending cultural events'', ''LEGO building'', ''Puzzles'']'
  career_goals: Linda dreams of becoming a wildlife storyteller or museum educator, where she can blend her love for animals, art, and her tribe’s traditions. She hopes to study environmental science and
    indigenous history, create illustrated books that share tribal stories, and later work with her community to protect the forests and rivers of Maine while preserving cultural heritage.
