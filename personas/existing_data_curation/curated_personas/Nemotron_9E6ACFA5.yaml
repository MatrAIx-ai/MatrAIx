personas:
  professional: A budding graphic design student and social media enthusiast, Miriam Gonzalez blends bilingual communication skills with a natural flair for Canva‑crafted visuals, channeling her relaxed,
    somewhat disorganized nature into flexible freelance projects for peers while assertively advocating for culturally‑rich nonprofit storytelling.
  sports: An avid weekend hiker and casual yoga practitioner, Miriam Gonzalez trails the nearby Angeles National Forest, follows the Los Angeles Galaxy soccer team, and occasionally joins a community ultimate
    Frisbee league that fits her flexible schedule while avoiding high‑intensity competition.
  arts: A dedicated watercolor sketcher and YA novel aficionado, Miriam Gonzalez spends evenings absorbed in titles like "The Hate U Give" and "Iron Widow," curates indie game playlists featuring "Celeste"
    and "Hades," and listens to regional Mexican singers such as Lila Downs and Carlos Rivera, weaving these influences into her evolving artistic style.
  travel: A spontaneous weekend traveler who prefers low‑cost bus rides and shared Airbnb stays, Miriam Gonzalez has explored the artistic enclave of Oaxaca City, hiked the red sandstone cliffs of Sedona,
    and plans a future backpacking trek across the Andean trail, always balancing cultural immersion with a student budget that nudges her toward free museums and public parks.
  culinary: A passionate home cook with a flair for Mexican comfort foods, Miriam Gonzalez frequently prepares chicken mole poblano using ancho chilies, cacao, and sesame seeds, experiments with sweet‑potato
    vegetarian tamales, and spices up classic recipes with unexpected ingredients like kimchi, all while occasionally burning garlic when multitasking between schoolwork and music.
  core: Miriam Gonzalez is a restless creator who marries artistic curiosity with heart‑centered practicality, juggling studies, cultural cooking, and stress‑busting yoga while secretly hoarding a stash
    of art‑supply receipts and worrying about the next deadline.
background:
  cultural: Miriam was born and raised in Keller, Texas, to Mexican‑American parents who emigrated from Jalisco. Spanish is spoken at home, and she grew up celebrating Día de los Muertos, quinceañeras,
    and other traditional holidays with family‑cooked meals. Her community involvement includes volunteering at the local Hispanic cultural center in Fort Worth, where she helps organize events that showcase
    Mexican art, music, and cuisine. Miriam’s Catholic upbringing and strong emphasis on family values shape her identity, while her suburban Texan environment blends American and Mexican influences in
    her daily life.
