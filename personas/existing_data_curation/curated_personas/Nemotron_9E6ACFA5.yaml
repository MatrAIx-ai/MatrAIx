  hobbies: '[''Reading contemporary YA novels'', ''Sketching and watercolor painting'', ''Cooking family recipes (tamales, mole)'', ''Listening to regional Mexican music'', ''Playing indie video games'',
    ''Journaling for self-reflection'', ''Yoga and mindfulness practice'', ''Hiking local nature trails'', ''Attending small cultural gatherings'']'
  career_goals: Miriam aims to enroll in an associate’s degree program in graphic design or communications, with the long‑term ambition of becoming a social media manager for a nonprofit organization that
    celebrates Hispanic culture. She also envisions eventually launching a small catering business that offers modern twists on classic Mexican cuisine. Throughout her career path, she seeks roles that
    provide flexible scheduling and opportunities to develop stress‑management techniques to support her wellbeing.
