personas:
  professional: Andres Thompkins, a versatile full‑stack web developer, blends practical Python and TypeScript coding with a curiosity for new tools like GraphQL and AWS serverless services, while their
    laid‑back yet cooperative nature makes them a natural mentor in agile teams that prioritize flexible planning over rigid schedules.
  sports: Andres Thompkins, a hiking enthusiast in Tucson, regularly joins the Tucson Trails Hiking Club for desert treks, supports the Arizona Cardinals and the Arizona Wildcats, and squeezes in casual
    weekend soccer matches with friends at the local community field, preferring sunrise runs over intense gym routines.
  arts: Andres Thompkins finds creative release strumming acoustic guitar to the gentle folk melodies of José González and Bon Iver, enjoys indie video games like Life Is Strange for their narrative depth,
    and frequently attends local art walks featuring works by Southwestern painters such as James R. Decker.
  travel: Andres Thompkins favors off‑the‑beaten‑path road trips across the Sonoran Desert, has explored Sedona’s red rocks and the historic town of Tubac, dreams of a cultural immersion tour in Oaxaca,
    Mexico, and plans trips around flexible remote‑work windows to balance adventure with occasional quiet retreats.
  culinary: Andres Thompkins loves cooking southwestern fare at home, mastering hand‑pressed corn tortillas, grilled elote with cotija cheese, and spicy chipotle‑marinated chicken, while they enjoy sourcing
    fresh chiles and cilantro at the local farmer’s market and occasionally treating themselves to a bowl of fiery pozole at a family‑run taquería.
  core: Andres Thompkins blends a relaxed, detail‑oriented tech mindset with a love for desert hikes, homemade tacos, and nightly meditation, all while battling a penchant for occasional over‑thinking and
    a habit of leaving projects half‑organized.
background:
  cultural: Andres grew up as a white American in Tucson, Arizona, after his family moved from the Midwest in the early 1990s. The desert environment, the proximity to Mexican culture, and the presence
    of the Tohono O'odham Nation have given him an appreciation for southwestern traditions, bilingual signage, and regional cuisine. He attended community college before transferring to the University
    of Arizona, where he completed several computer-science courses before leaving with some college credits. His upbringing in a culturally diverse yet laid-back city fostered a liberal, community-oriented
    outlook. He values harmony and often participates in local festivals that celebrate both Mexican and Native American heritage, while his personal experience of an early divorce has deepened his introspection
    and empathy toward others facing life transitions.
