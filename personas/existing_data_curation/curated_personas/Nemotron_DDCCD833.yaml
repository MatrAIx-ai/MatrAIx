  career_goals: Andres aims to become a senior full-stack engineer and eventually a technical lead who can shape architecture decisions while maintaining a collaborative, supportive team culture. He plans
    to finish his bachelor’s degree in computer science and consider a master’s focused on human-centered design, reflecting his desire to blend technical expertise with empathy-driven product thinking.
    Because he is sensitive to stress, he seeks a remote or hybrid role that offers flexible hours and a results-oriented workflow rather than strict clock-in expectations. He also wants to launch a side
    project—a web-based platform that uses simple AI tools to help users track mood and practice micro-meditation exercises—leveraging his own experiences with anxiety. Mentoring junior developers and contributing
    to open-source projects that serve community needs are long-term ambitions that align with his cooperative nature.
