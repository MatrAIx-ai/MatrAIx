  career_goals: Michael aims to turn his artistic passion into a professional career. He plans to attend a specialized art school or a university program in visual arts, with the long-term goal of becoming
    a concept artist for video games or an animator for film. He also envisions working in graphic design or digital media production, and eventually launching his own online platform to teach art and showcase
    his work. His competitive nature drives him to enter art contests and festivals, seeking recognition and opportunities to improve his craft.
