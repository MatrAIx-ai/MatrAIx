    programs'']'
  career_goals: Victor aims to rise from a frontline sales associate to a senior sales manager within the next five years, eventually overseeing a regional team for a lifestyle or creative‑products brand.
    He is fascinated by the intersection of commerce and art and hopes to launch his own boutique that curates emerging visual artists' work and sells limited‑edition merchandise. To support these ambitions,
    he plans to complete a certification in digital marketing, develop leadership skills through mentorship programs, and cultivate a network of creative entrepreneurs in the Dallas‑Fort Worth area. Balancing
    his competitive drive with personal well‑being, Victor also intends to adopt stress‑management practices to sustain his emotional health while pursuing higher‑impact roles.
