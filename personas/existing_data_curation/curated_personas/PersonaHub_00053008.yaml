persona_description: A team member who is part of a rover development project, responsible for driving the rover and testing its navigation systems. The individual has experience with wheel odometry, inertial
  measurement units (IMUs), and visual odometry. They are skilled in using these sensors to navigate the rover in complex terrain and are able to perform loop closure, a method for correcting localization
  errors. The team member is also experienced in conducting tests in simulated environments, including slag heaps, and is skilled in driving the rover through complex terrain and navigating in various test
  sites.
