personas:
  professional: Nilda Reyes, a 62‑year‑old seasoned administrative professional in Bayamón, blends their decades of office management expertise with bilingual Spanish‑English communication, leveraging advanced
    Microsoft Office and Google Workspace skills to orchestrate community cultural events, mentor junior staff, and implement workflow automation while maintaining a skeptical eye on intent and a competitive
    drive to improve processes.
  sports: Nilda Reyes stays active by dancing merengue and salsa at community centers, joining a local senior fitness walking group in the San Juan area, cheering for the Cangrejeros de Santurce baseball
    team, and competing in weekly chess and Scrabble tournaments at the neighborhood library.
  arts: Nilda Reyes immerses themselves in the arts through reading Latin American novels like "One Hundred Years of Solitude" and "The House of the Spirits", attending book club meetings, listening to
    the classic sounds of Juan Luis Guerra and Celia Cruz, and performing lively merengue and salsa dances that keep traditional rhythms alive.
  travel: Nilda Reyes prefers organized group travel, often planning trips to the Caribbean island where their family roots lie to reconnect with relatives and explore new culinary ideas, while also enjoying
    weekend getaways to Old San Juan, El Yunque rainforest, and occasional pilgrimages to historic towns in Spain when budget permits.
  culinary: Nilda Reyes is a proficient home cook who delights in preparing sancocho, mangú, and fried plantains using ingredients such as yucca, cilantro, and ají dulce, while experimenting with fresh
    seafood and spices during family gatherings and sharing recipes with friends at community potlucks.
  core: Nilda Reyes is a sociable, detail‑oriented senior administrator whose competitive curiosity drives them to blend tradition with technology, all while juggling family, faith, and a love for dancing,
    cooking, and mentoring.
background:
  cultural: Nilda’s identity is rooted in her Dominican heritage, shaped by the vibrant diaspora community in Bayamón and the broader San Juan metropolitan area. Raised in a bilingual household, she speaks
    fluent Spanish and English, and her daily life reflects Dominican customs—from the rhythm of bachata and merengue that fills family celebrations to the preparation of dishes like sancocho and mangú.
    Catholic traditions and strong family ties guide her values, while the island’s multicultural environment has taught her to navigate cultural nuance with sensitivity. She actively participates in Dominican
    Independence Day parades, supports local cultural organizations, and serves as a bridge between Dominican newcomers and the Puerto Rican community, preserving her island’s stories while embracing her
    adopted home.
