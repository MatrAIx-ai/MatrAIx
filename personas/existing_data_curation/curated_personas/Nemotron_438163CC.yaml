  career_goals: As she approaches the later stage of her career, Nilda aims to transition into a senior office‑manager role where she can shape policies that support work‑life balance for staff. She is
    pursuing a project‑management certification to formalize her expertise in coordinating large community events. Mentoring remains a priority; she plans to develop a mentorship program for younger administrative
    professionals within her organization and the local Dominican cultural association. Nilda also hopes to volunteer as a cultural liaison, organizing Dominican heritage festivals and offering translation
    services for community members. Ultimately, she seeks to secure a stable retirement while leaving a lasting impact on both her workplace and the Dominican‑Puerto Rican community.
