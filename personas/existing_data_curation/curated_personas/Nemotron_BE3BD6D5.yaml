  career_goals: Trevor aims to secure a steady, routine‑oriented position that lets him work mostly alone and with minimal social demands, such as a building caretaker, maintenance assistant, or part‑time
    stockroom associate at a local hardware store. He also hopes to improve his basic literacy and numeracy skills to broaden his employment options. Over time, he dreams of starting a modest side‑business
    offering home‑repair services to neighbors, allowing him to blend his practical expertise with a flexible schedule that reduces stress.
