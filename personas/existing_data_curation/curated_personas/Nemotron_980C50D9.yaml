  hobbies: '[''Fishing'', ''Gardening'', ''DIY Woodworking'', ''Reading Historical Non‑Fiction'', ''Genealogy Research'', ''Playing Guitar'', ''Attending Community Events'', ''Volunteering at Library'']'
  career_goals: Looking ahead, Andrew aims to transition into a part‑time role as a customer‑experience consultant, helping small businesses in the Manchester area improve their service processes. He hopes
    to earn a bachelor’s degree in business management to formalize his knowledge and strengthen his qualifications for a supervisory or training specialist position before retiring. He also wants to develop
    a short‑term workshop series on effective communication for local community groups, leveraging his cooperative yet assertive style. Ultimately, he seeks a balanced work‑life rhythm that allows flexibility
    for his hobbies and family visits while leaving a lasting mentorship legacy.
