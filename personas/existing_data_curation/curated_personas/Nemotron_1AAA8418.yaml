  career_goals: Jordan aims to earn his Project Management Professional (PMP) certification within the next year and advance to a senior project manager role overseeing multi-department initiatives. His
    long-term ambition is to become Director of a Project Management Office (PMO) where he can shape organizational strategy, mentor emerging talent, and embed socially responsible practices into project
    portfolios. He also hopes to launch a boutique consulting firm focused on helping nonprofits and small businesses optimize their operations, leveraging his compassion and desire to create community
    impact.
