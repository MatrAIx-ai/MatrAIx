personas:
  professional: Jordan Mcswain is a 26‑year‑old project manager who blends Agile and waterfall expertise, meticulous risk assessment, and stakeholder communication with a community‑first mindset, leveraging
    their disciplined organization and calm resilience to steer multi‑department initiatives toward socially responsible outcomes.
  sports: Jordan Mcswain stays active by playing in a local beach volleyball league, running with the Tampa Bay Runners club, hiking state parks, and cheering on the Tampa Bay Buccaneers, while they prioritize
    structured training sessions and group workouts over solitary gym time.
  arts: Jordan Mcswain enjoys live music from the indie band The Bay Breeze, playlists featuring Jack Johnson and Lizzo, attending performances at the Straz Center for the Performing Arts, and collecting
    limited‑edition prints by Shepard Fairey, which they display during board‑game nights.
  travel: Jordan Mcswain blends meticulous itinerary planning with spontaneous weekend getaways, having explored Miami, New Orleans, and Asheville, and dreaming of a road trip along Iceland’s Ring Road
    to capture sunrise over volcanic landscapes while balancing travel costs with a modest savings stash.
  culinary: Jordan Mcswain experiments with intermediate‑level cooking, favoring shrimp tacos with fresh cilantro, lime, and habanero, mastering Thai green curry, and often adding smoked paprika to key
    lime pie for a smoky twist at community potlucks.
  core: Jordan Mcswain is an outgoing, highly organized project manager whose calm resilience and community‑centric drive turn ambitious goals into collaborative, socially conscious achievements.
background:
  cultural: Jordan was raised in a middle-class family in the Tampa Bay metro area, where Southern hospitality and a strong sense of community are deeply valued. Growing up in Wesley Chapel’s suburban environment,
    he was exposed to a blend of Floridian outdoor culture—beach outings, water sports, and weekend barbecues—alongside the region’s diverse population, which fostered an appreciation for inclusivity. His
    upbringing emphasized self-reliance, teamwork, and civic engagement, with occasional involvement in a local church youth group that reinforced volunteerism. These cultural influences shape his outgoing
    demeanor, collaborative spirit, and commitment to contributing positively to his community.
