  career_goals: David aims to become a senior full‑stack engineer within the next three years, eventually progressing to a technical lead or solution architect role where he can shape product strategy.
    He is interested in building platforms that bridge technology and the arts—such as digital archives for cultural heritage or interactive storytelling tools. He values flexibility, so he is targeting
    remote or hybrid positions that allow him to manage his own schedule. In the longer term, he hopes to launch a side venture that offers custom software solutions for small arts organizations, combining
    his competitive drive with his desire to make a meaningful cultural impact.
