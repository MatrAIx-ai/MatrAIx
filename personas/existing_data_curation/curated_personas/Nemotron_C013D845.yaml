  career_goals: Mary aims to transition from daily bus operation to a district-level transportation coordinator role, where she can design safer routes, implement a mobile art‑learning program, and develop
    driver‑training curricula. She plans to complete a bachelor's degree in transportation planning or education, leveraging her associate’s credential. Long‑term, she envisions leading a community arts
    initiative that brings creative workshops to schools and senior centers, while also serving on the school board or a local arts council to influence policy and resource allocation.
