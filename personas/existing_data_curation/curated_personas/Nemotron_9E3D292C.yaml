personas:
  professional: Destiney Bacchus, a retired STEM graduate turned community art‑science facilitator, leverages her analytical mind and abstract imagination to design interdisciplinary workshops for seniors,
    lead hands‑on science sessions for children at the Plano Science Center, and occasionally consult on data visualizations for local nonprofits, all while using basic Python scripts to illustrate scientific
    concepts in her art classes.
  sports: Destiney Bacchus follows the Dallas Cowboys and the Dallas Mavericks, participates in a senior walking club that meets at Arbor Hills Nature Preserve each Saturday, practices gentle yoga twice
    a week, and prefers low‑impact exercise to keep her joints healthy while tending her garden.
  arts: Destiney Bacchus immerses herself in abstract painting inspired by Jackson Pollock’s drip technique and Yayoi Kusama’s polka‑dot motifs, writes poetry echoing Ocean Vuong’s lyrical intimacy, regularly
    attends readings at the Plano Arts and Culture Center, and explores digital illustration with Procreate, often citing Frida Kahlo’s emotional honesty as a guiding influence.
  travel: Destiney Bacchus favors curated art‑focused trips, having explored the murals of San Miguel de Allende, the gardens of Kyoto’s Arashiyama, and the vibrant galleries of Santa Fe, while preferring
    weekend getaways to Hill Country wildflower festivals, always planning trips around her yoga retreats and volunteer commitments.
  culinary: Destiney Bacchus enjoys cooking Tex‑Mex fusion dishes such as chipotle‑honey glazed chicken enchiladas, black‑bean quinoa tacos topped with cotija cheese and fresh cilantro, and homemade corn‑steak
    queso, often sourcing heirloom chiles and local rosemary from her garden to experiment with bold flavor pairings.
  core: Destiney Bacchus, a 67‑year‑old anxiety‑prone artist‑scientist, blends wildflower gardening, AI‑generated abstract art, and community workshops while impulsively hoarding vintage postcards and juggling
    a chaotic calendar.
background:
  cultural: Destiney is a white American who grew up in a suburban Texas community during the socially transformative 1960s‑70s, experiencing the women's liberation movement that encouraged her pursuit
    of a STEM education. Raised with Southern hospitality and modest Methodist roots, she now embraces a more eclectic spiritual outlook. She enjoys classic Texas traditions—BBQ, country music, and community
    festivals—while also appreciating the multicultural fabric of Plano, integrating global art, music, and cuisine into her daily life. Her identity balances independent Texan values with a deep respect
    for harmony and collective well‑being.
attributes:
  skills: '[''Analytical problem solving'', ''Scientific research methodology'', ''Technical writing'', ''Basic Python programming'', ''Data visualization'', ''Abstract painting'', ''Mixed-media art'',
