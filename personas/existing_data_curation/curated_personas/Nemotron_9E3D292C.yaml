  hobbies: '[''Abstract painting'', ''Digital art creation'', ''Poetry writing'', ''Reading contemporary literature'', ''Visiting art museums and science exhibits'', ''Gardening (native Texas wildflowers)'',
    ''Yoga and meditation'', ''Cooking Tex-Mex fusion dishes'', ''Volunteering at science center'', ''Collecting vintage postcards and stamps'']'
  career_goals: Although retired, Destiney remains driven by lifelong learning. She plans to enroll in online courses that intersect art and technology, such as AI‑generated art and neuroscience of creativity.
    Her ambition is to launch a community art‑science workshop series for seniors in Plano, where participants can experiment with painting, digital media, and simple scientific demonstrations. She hopes
    to mentor young women pursuing STEM careers through local nonprofits, and to publish a collection of poetry and illustrations that capture her emotional experiences. Additionally, she aims to deepen
    her mindfulness practice and share coping strategies in support groups, while contributing oral histories to the Plano historical archives.
