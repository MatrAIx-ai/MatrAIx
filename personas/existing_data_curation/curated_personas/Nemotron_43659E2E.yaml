personas:
  professional: Maria Deleon, a budding toddler architect of play, demonstrates extraordinary organization by aligning building blocks in perfect rows, showcases relentless curiosity by experimenting with
    cause-and-effect toys, prefers solitary construction sessions that let them meet their own high standards, and exhibits early kindness by sharing tools with stuffed companions when needed.
  sports: Maria Deleon, an energetic toddler who loves climbing low jungle gyms at the indoor playground and dancing to nursery rhythm workouts, proudly wears a miniature Chicago Cubs cap while participating
    in the community's Tiny Tigers soccer clinic, and prefers structured, quiet play sessions that let them practice coordination without the noise of larger crowds.
  arts: Maria Deleon, an inquisitive little art lover, delights in the bright illustrations of Eric Carle's The Very Hungry Caterpillar, hums Yo-Yo Ma's cello melodies, watches Sesame Street's Muppet performances,
    and spends quiet solo moments finger-painting with non-toxic watercolors, showcasing a deep appreciation for varied creative expressions.
  travel: Maria Deleon, a curious explorer who travels on parent-planned trips that balance adventure with frequent naps, has visited the local Children's Museum, splashed at a sunny Florida beach, marveled
    at the Grand Canyon's vistas during a family road trip, and dreams of a future visit to Tokyo Disneyland, always preferring quiet stroller rides over crowded attractions.
  culinary: Maria Deleon, a picky yet adventurous eater, prefers soft foods like mashed sweet potatoes, banana puree, and tiny bites of grilled cheese, enjoys the sweet flavor of fresh strawberries, often
    helps stir plain yogurt with a spoon, and delights in trying new fruit flavors while maintaining a habit of refusing overly spicy dishes.
  core: Maria Deleon blends toddler curiosity with a surprisingly meticulous need for order, thrives in quiet solo play, shows early kindness by sharing with stuffed friends, and occasionally gets overwhelmed
    by loud, chaotic environments.
background:
  cultural: Maria is raised in a bilingual Venezuelan‑American household in Miami‑Broward County, where Spanish is spoken at home and English is used in the broader community. Her family celebrates Venezuelan
    traditions such as Carnaval, Día de la Madre, and enjoys dishes like arepas, cachapas, and hallacas during holidays. Local Venezuelan cultural centers provide her with exposure to joropo music and dance,
    fostering an early appreciation for her heritage. Growing up in the multicultural mosaic of Miami, Maria also experiences the broader Latino diaspora, which enriches her understanding of diverse customs
    while maintaining a strong connection to her Venezuelan roots.
