  career_goals: Yashica aims to transition into a leadership role within her organization, such as a Customer Service Team Lead or Training Manager, where she can scale her mentoring experience and shape
    service standards. She is also exploring opportunities to collaborate with local arts nonprofits in Hartford County, leveraging her appreciation for art to develop community‑focused outreach programs
    that bridge customer service expertise with cultural engagement. In the longer term, Yashica envisions establishing a part‑time consultancy that offers training workshops on empathy‑driven communication
    and cultural sensitivity for businesses and community groups.
