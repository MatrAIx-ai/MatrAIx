    in high‑pressure environments'', ''Assisting with minimally invasive surgeries'', ''Continuous learning of new surgical technologies'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Home‑brewing craft beer'', ''Reading historical nonfiction'', ''Birdwatching'', ''Hiking'', ''Playing acoustic guitar'', ''Following medical journals'', ''Participating
    in small‑group board games'']'
  career_goals: Jeff aims to advance to a senior surgical technologist or lead technologist role where he can mentor newer staff and help shape operating‑room protocols. He plans to obtain his Certified
    Surgical Technologist (CST) credential and eventually pursue a bachelor's degree in health sciences or health administration, with the goal of moving into surgical services management. Balancing his
    ambition with family life, Jeff also seeks a position that offers flexible scheduling or part‑time opportunities, allowing him to maintain a strong presence at home while continuing professional growth.
    Long‑term, he envisions contributing to a regional training program that blends practical skill development with emerging surgical technologies.
