personas:
  professional: Jeff Brown, a 28‑year‑old surgical technologist known for meticulous sterile‑field management and quick adaptation to new instrumentation, blends his curiosity‑driven learning style with
    a relaxed, flexible work ethic to excel in high‑stress OR environments while pursuing a senior lead position and CST certification.
  sports: Jeff Brown, a devoted fan of the Seattle Seahawks and Seattle Mariners, spends weekends casting for trout on the nearby Cascade rivers with the Evergreen Anglers Club, stays fit through early‑morning
    hikes and occasional pick‑up basketball games at the community center, and follows the Seattle Sounders FC during the soccer season.
  arts: Jeff Brown, who plays acoustic guitar for intimate family gatherings, draws creative inspiration from folk legends like Bob Dylan and modern indie folkers such as The Avett Brothers, regularly reads
    historical nonfiction by Doris Kearns Goodwin, and appreciates the serene realism of Andrew Wyeth’s still‑life paintings.
  travel: Jeff Brown prefers spontaneous, nature‑focused escapes, having road‑tripped to the Olympic Peninsula and Glacier National Park, dreaming of a future expedition to Iceland’s hot springs and New
    Zealand’s South Island, and always opts for flexible itineraries over rigid tours.
  culinary: Jeff Brown, an enthusiastic home‑brewer and modest home‑chef, loves crafting amber ales paired with pan‑seared trout drizzled in dill butter, often seasoning his weekend stews with rosemary,
    sage, and locally sourced honey while refining his culinary skills through trial‑and‑error recipes.
  core: Jeff Brown is a detail‑oriented yet easy‑going surgical technologist who balances high‑pressure OR duties with tranquil hobbies like fishing, woodworking, and brewing, occasionally letting his relaxed
    nature spark spontaneous purchases and last‑minute plans.
background:
  cultural: 'Jeff grew up in New Boston, a close‑knit town in Bowie County, Texas, where community ties, modest hospitality, and a strong work ethic are core values. His family background reflects typical
    Southern‑Midwestern influences: a respect for tradition, participation in local events such as high‑school football games and county fairs, and an appreciation for regional foods like barbecue and Tex‑Mex.
    While not overtly religious, he was raised in a Protestant environment that emphasized kindness, cooperation, and service to others. This cultural foundation, combined with his openness to new ideas,
    shapes his balanced perspective on both personal and professional life.'
attributes:
  skills: '[''Surgical instrument sterilization'', ''Operating room setup and breakdown'', ''Patient positioning and draping'', ''Instrument handling for open and laparoscopic procedures'', ''Aseptic technique
