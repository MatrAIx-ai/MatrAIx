  career_goals: Although she is not currently employed in a traditional job, Nadine aims to formalize her knowledge by completing an associate degree in Business Administration at the local community college.
    She intends to author a guidebook on senior organization and efficient living, and launch a boutique consulting service that helps small businesses and faith‑based groups in Sumter improve their operational
    processes. Additionally, she hopes to lead a community green‑space improvement project, leveraging her gardening expertise and project‑management skills to create a sustainable public garden for the
    town.
