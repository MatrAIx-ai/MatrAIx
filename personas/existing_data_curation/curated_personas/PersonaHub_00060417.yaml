persona_description: 'A feminist, political activist, and author who has made significant contributions to the women''s movement and has written extensively on women''s issues. She has faced criticism from
  some feminists, including the Redstockings, for her association with the CIA-backed Independent Research Service. She has also taken the lead in launching the pioneering, feminist Ms magazine and has
  written extensively on women''s issues. She has written several books, including "Outrageous Acts and Everyday Rebellions" and "Moving Beyond Words: Age, Rage, Sex, Power, Money, Muscles: Breaking Boundaries
  of Gender". She has also faced personal challenges, including a diagnosis of breast cancer, and has continued to speak out and organize various women''s functions.'
