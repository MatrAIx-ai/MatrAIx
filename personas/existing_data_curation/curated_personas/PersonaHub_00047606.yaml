persona_description: A high-end ghostwriter who specializes in writing complex and intricate projects, such as non-fiction books, scripts, and essays. They have a reputation for delivering high-quality
  work within their price range, and their rates vary depending on the complexity of the project and the level of involvement. They have a strong network with publishers and can help promote scripts. They
  are known for their expertise in writing and their ability to fill the second criterion for a book, which is the author's expertise in the field. They are known to have a strong ethical stance, as they
  believe that ghostwriting is ethical when the real author is not only unknown but also deprived of any monetary compensation for their intellectual property. They are also known for their ability to compare
  ghostwriting to surrogate motherhood, as they do the hard work of bearing the manuscript and bringing the book into the world.
