personas:
  professional: Teresa Hunt, a budding arts management professional who leverages meticulous project planning, public speaking flair, and basic graphic design to coordinate volunteer teams for community
    festivals while dreaming of curating inclusive museum exhibitions, and they consistently seek feedback to refine their event concepts.
  sports: Teresa Hunt, an enthusiastic Minnesota sports fan who roots for the Vikings and Timberwolves, joins a local co-ed softball league each summer, hikes the Boundary Waters in the fall, attends community
    yoga classes to stay fit, and they occasionally indulge in a weekend ski trip at Lutsen.
  arts: Teresa Hunt, a lively participant in the Twin Cities' cultural scene who devours contemporary novels by Ocean Vuong, writes flash fiction inspired by Sufjan Sutherland's albums, captures candid
    street moments a la Vivian Maier, performs improv at The Brave New Workshop, admires the works of Kehinde Wiley, and they regularly attend productions of Hamilton.
  travel: Teresa Hunt, an adventurous yet budget-conscious traveler who has weekend-tripped to Chicago's Art Institute, spent a spring break exploring Quebec City's winter carnival, dreams of attending
    the Reykjavik Arts Festival, plans a summer backpack tour across the UK and Ireland, and they balance careful itinerary planning with spontaneous detours for local galleries.
  culinary: Teresa Hunt, a self-taught home chef who loves experimenting with seasonal Midwestern produce, frequently makes quinoa-black bean bowls with roasted beets, crafts their own sourdough starter,
    enjoys cooking shrimp tacos with chipotle-lime crema, and they treat themselves to artisanal cheese boards featuring goat cheese and figs on relaxed evenings.
  core: Teresa Hunt, a sociable art aficionado whose relentless curiosity is matched only by a habit of over-booking their calendar and a penchant for late-night coffee-fueled brainstorming sessions, and
    they often forget to eat breakfast.
background:
  cultural: Teresa grew up in a middle‑class white family in the suburbs of Saint Paul, with deep roots in the Upper Midwest's Scandinavian‑German heritage. Her parents emphasized community involvement,
    education, and appreciation for the region's rich arts scene, regularly taking her to the Walker Art Center, the Minnesota History Center, and local theater productions. She celebrates mainstream American
    holidays while also participating in regional traditions such as the St. Paul Winter Carnival and the Minnesota State Fair. The values of modesty, collaboration, and civic responsibility that characterize
    Midwestern culture have shaped her outlook.
attributes:
  skills: '[''Public speaking'', ''Event planning and coordination'', ''Social media content creation'', ''Graphic design (Canva, basic Photoshop)'', ''Research and analytical writing'', ''Interpersonal
    communication'', ''Conflict resolution'', ''Time management and organization'', ''Volunteer coordination'', ''Basic Spanish proficiency'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary fiction and philosophy'', ''Creative writing (short stories, poetry)'', ''Photography (street and portrait)'', ''Participating
    in improv comedy workshops'', ''Volunteering at community cultural events'', ''Social dancing (swing, salsa)'', ''Cooking experimental dishes'', ''Hiking in Minnesota state parks'', ''Attending live
    music and theater performances'']'
  career_goals: Teresa aims to complete her bachelor's degree in Arts Management or Communications within the next two years, followed by a role as a program coordinator or curator assistant at a regional
    museum or cultural nonprofit in the Twin Cities. She hopes to design inclusive exhibitions, lead community outreach programs, and eventually advance to a leadership position where she can shape public
    engagement with the arts. In the longer term, she envisions founding a collaborative arts space that blends performance, visual art, and community dialogue.
