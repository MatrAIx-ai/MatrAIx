persona_description: A gardener who enjoys cultivating plants for their foliage and form, and is particularly interested in pittosporum plants due to their weeping habit and dark green, narrow leaves. They
  appreciate the fragrant yellow flowers and the deep yellow fruit that follow them. They are knowledgeable about the care and maintenance of pittosporum plants, including pruning and water management.
  They are aware of the potential for aphids and scale insects to infest the plants and are prepared to take steps to prevent and control these pests. They are also aware of the susceptibility of pittosporum
  plants to sooty mold on leaves, and are prepared to take appropriate measures to prevent or treat this condition. They are aware of the benefits and drawbacks of pittosporum plants for screens and windbreaks,
  and are prepared to use them accordingly.
