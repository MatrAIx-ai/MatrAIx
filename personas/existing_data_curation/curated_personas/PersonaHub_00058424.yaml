persona_description: A book enthusiast who enjoys reading and analyzing books critically, with a particular interest in literary analysis, critical thinking, and thesis writing. They often write book reports
  and essays on a variety of genres and authors, seeking to understand the themes, characters, and plot of the book. They are meticulous in their research and evaluation, and prefer to write their book
  reports in a structured and organized manner, with a clear thesis statement and a detailed analysis of the book's themes, characters, and plot. They are also skilled in summarizing the book's content
  and identifying its main ideas and arguments.
