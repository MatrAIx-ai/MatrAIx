  career_goals: Dawn dreams of a future where she can combine her love for animals, science, and helping others. In the short term, she wants to join her school's science club and volunteer for community
    clean‑up events. Long‑term, she imagines becoming a veterinarian or a wildlife biologist who studies the desert ecosystems around Rio Rancho. She also thinks about becoming a teacher, inspired by her
    desire to share knowledge and create a supportive environment for her friends. Her ambitions reflect both her curiosity about the natural world and her practical wish to make a positive impact on her
    community.
