    ''Property Management Software (AppFolio)'', ''Strategic Planning'', ''Risk Management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Photography of historic architecture'', ''Reading non-fiction on urban development and sustainability'', ''Gardening
    and maintaining community green spaces'', ''Hiking local trails in Bucks County'', ''Attending live music and theater performances'', ''Cooking and exploring new recipes'', ''Participating in HOA board
    meetings and community outreach'', ''Volunteering for historical preservation societies'', ''Yoga and mindfulness meditation'', ''Traveling to historic towns and European cities'', ''DIY home improvement
    projects'', ''Organizing community art events and workshops'']'
  career_goals: Leslie aims to advance to a regional director role overseeing multiple community associations while obtaining the Certified Property Manager (CPM) designation. She aspires to launch a consultancy
    that blends property management with arts and sustainability initiatives, and eventually mentor emerging women leaders in real estate. Long-term, she hopes to spearhead a community development project
    that integrates public art installations and green building standards in Bucks County.
