  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Salsa and bachata dancing classes'', ''Cooking traditional Mexican cuisine'', ''Hiking in local nature parks'', ''Photography'', ''Volunteering
    at community cultural events'', ''Mindfulness meditation'']'
  career_goals: She aims to move into a supervisory or lead role within the logistics department, such as Shift Lead or Inventory Control Specialist, seeking additional certifications like Certified Logistics
    Associate. She also dreams of integrating her love for art by organizing community art showcases at local malls or becoming a volunteer coordinator for cultural events. Long‑term, she hopes to open
    a small boutique that sells Mexican handicrafts and crafts, combining her business experience with cultural heritage, while also ensuring a stable work schedule that allows her to manage her anxiety
    and spend more time with family.
