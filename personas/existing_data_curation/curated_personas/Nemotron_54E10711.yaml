  hobbies: '["Reading classic literature", "Watercolor painting", "Gardening", "Book club participation", "Bridge playing", "Attending theater and concerts", "Museum docent volunteering", "Genealogy research",
    "Park walking", "Cooking family recipes"]'
  career_goals: Although retired, Mary aims to deepen her legacy by leading an intergenerational oral‑history project that records the memories of Chicago’s senior residents. She hopes to publish a memoir
    and a community‑history booklet, mentor new volunteers at the local museum, and expand the senior arts program at her community center. Her ambition is to ensure that the city’s cultural heritage is
    preserved and shared with younger generations while advocating for inclusive senior services.
