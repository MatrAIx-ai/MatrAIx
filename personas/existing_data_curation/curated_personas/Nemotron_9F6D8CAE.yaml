  career_goals: Eddie aims to complete his high school education (or earn a GED) and pursue a technical degree in computer science or engineering. He envisions a career as a software developer, ideally
    focusing on video game design, while also keeping open the possibility of becoming a certified automotive technician. In the short term, he plans to join a competitive esports team, grow his streaming
    audience, and earn certifications in hardware repair to build a freelance side business.
