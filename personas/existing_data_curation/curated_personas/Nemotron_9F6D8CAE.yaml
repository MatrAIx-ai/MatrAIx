personas:
  professional: Eddie Sherry, a 15‑year‑old high‑school student and self‑taught PC builder, channels a methodical, competition‑driven mindset into designing custom gaming rigs while balancing schoolwork
    and extracurricular responsibilities.
  sports: Eddie Sherry mixes weekend hikes on Mount Falcon and snowboarding trips to Eldora with regular pickup basketball games for the community‑center Falcons, cheering on the Denver Nuggets while occasionally
    volunteering as a bench‑warmer for the local high‑school JV team.
  arts: Eddie Sherry fuels their creative side by devouring mystery novels from Agatha Christie and Gillian Flynn, curating gaming‑themed playlists featuring Daft Punk and the soaring scores of Hans Zimmer,
    and attending the Denver Comic Con to bond over graphic‑novel art, all while sketching PC case designs during downtime.
  travel: Eddie Sherry prefers spontaneous weekend road trips to Colorado hotspots like Rocky Mountain National Park and Vail for backcountry snowboarding, but dreams of a future summer adventure to Japan’s
    Osaka for the controlled chaos of the Osaka Gaming Expo, balancing a tight student schedule with a modest travel fund.
  culinary: Eddie Sherry’s culinary repertoire centers on quick, protein‑rich meals such as pepperoni pizza, Chipotle‑style burrito bowls, and homemade trail‑mix featuring almonds, dried cranberries, and
    dark chocolate chips, and while their cooking skill tops out at a reliable skillet‑fry, they frequently over‑salt spaghetti while livestreaming game commentary.
  core: Eddie Sherry blends a love for structured school life with a fiercely competitive edge in gaming and outdoor pursuits, constantly seeking the next strategic advantage while juggling the occasional
    teenage misstep.
background:
  cultural: 'Eddie comes from a white, middle‑class family in Littleton, Colorado. His upbringing reflects typical suburban American values: an emphasis on education, community involvement, and participation
    in sports and outdoor recreation. The local culture''s focus on teamwork, competitive sports, and a love for the Colorado outdoors has shaped his interests in basketball, hiking, and snowboarding. Family
    gatherings often celebrate mainstream holidays and traditions, while his school environment encourages participation in clubs and esports, reinforcing his structured, competitive personality.'
attributes:
