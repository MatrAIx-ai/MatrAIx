personas:
  professional: Guillermo Vilches, a budding architect of block towers, channels his organized, methodical nature into constructing elaborate Lego cities while meticulously cataloguing each piece and competing
    with peers to see who can build the tallest structure, balancing his curiosity for new building techniques with a practical insistence on stability.
  sports: Guillermo Vilches is a lively member of the Little Tigers Soccer Club, dashing across the field with relentless energy, while cheering for the Los Angeles Dodgers during summer baseball broadcasts
    and turning backyard games into competitive practice sessions.
  arts: Guillermo Vilches delights in drawing vibrant dinosaurs inspired by the bold lines of Mo Willems, singing loudly along to the soundtracks of Frozen and Moana, and reciting verses from Dr. Seuss
    with theatrical flair, turning the living room into his personal stage.
  travel: Guillermo Vilches thrives on family road trips that blend structured itineraries with spontaneous pit stops, having proudly explored the panda exhibit at the San Diego Zoo and dreaming of a future
    adventure to Disneyland Paris where he plans to map out every ride before stepping foot on the grounds.
  culinary: Guillermo Vilches prefers a plate of crispy chicken nuggets dipped in honey mustard, loves creamy mac and cheese sprinkled with cheddar, eagerly helps stir peas and carrots in the kitchen, yet
    stubbornly refuses broccoli, earning a reputation as a selective eater.
  core: Guillermo Vilches is a tiny whirlwind of curiosity and order, forever cataloguing toys while demanding the fastest slide at the playground and unabashedly negotiating candy prices with a skeptical
    grin.
background:
  cultural: Guillermo is a Mexican‑American child raised in a bilingual household in Los Angeles. Spanish is spoken at home, and he celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo,
    and family gatherings featuring tacos, tamales, and homemade salsa. His family maintains close ties with the local Mexican community, attending cultural festivals at the Plaza de Cultura y Artes and
    participating in church celebrations. At the same time, he is exposed to the multicultural environment of LA, enjoying both Mexican and broader American customs, which gives him a blended cultural identity
    that values family, community, and the joy of sharing food and music.
attributes:
  skills: '[''bilingual counting (English & Spanish)'', ''color and shape recognition'', ''following three‑step instructions'', ''fine‑motor coordination (cutting, drawing)'', ''basic puzzle solving'',
