  hobbies: '[''Lego and wooden block construction'', ''drawing and coloring'', ''playing soccer'', ''dancing to mariachi and Latino pop music'', ''bilingual storytime at the library'', ''jigsaw puzzles'',
    ''helping in the kitchen (rolling tortillas, stirring salsa)'', ''group games (Duck, Duck, Goose)'', ''competitive board games (Candy Land)'']'
  career_goals: Guillermo imagines a future where he can combine his love for building, helping others, and his cultural roots. He often says he wants to become a firefighter who rescues people, an engineer
    who designs bridges, or a chef who cooks delicious Mexican dishes for his family. He is drawn to roles that let him use his curiosity to explore new ideas while applying practical, hands‑on skills.
    He also dreams of leading a soccer team, reflecting his competitive spirit.
