personas:
  professional: Maggie Safrit is a 20‑year‑old apprentice pipefitter in East Texas who combines solid technical skills in pipefitting, steamfitting, welding, and blueprint interpretation with a practical,
    structured work style, yet remains flexible enough to adapt to on‑site changes, and uses their reserved but assertive communication to coordinate small crews and aim for Journeyman certification.
  sports: Maggie Safrit enjoys solo hikes through the piney woods around Gilmer, weekend fishing trips on Lake Gilmer, plays on a co‑ed recreational softball team, and they follow the Dallas Cowboys, Dallas
    Mavericks, and Texas Rangers while cheering them on during the season.
  arts: Maggie Safrit unwinds by listening to classic rock icons like Led Zeppelin, country‑folk artist Sturgill Simpson, sketching pipe diagrams as doodles, and they occasionally attend community theater
    productions of classic plays such as 'Our Town,' which feed their appreciation for both hands‑on craftsmanship and storytelling.
  travel: Maggie Safrit prefers spur‑of‑the‑moment weekend getaways to nearby natural spots like Big Bend National Park and Hill Country vineyards, dreams of a road trip along the historic Route 66 to see
    the desert vistas of Arizona, and they balance their travel plans with a limited budget that keeps them focused on low‑cost camping and DIY itinerary planning.
  culinary: Maggie Safrit enjoys cooking simple, herb‑infused meals using rosemary, thyme, and wild garlic from their garden, frequently prepares smoked trout and Texas‑style chili, and they favor home‑cooked
    comfort food over restaurant dining, though they occasionally treat themselves to a steak at a local barbecue joint.
  core: Maggie Safrit blends a love for hands‑on pipework with quiet hikes, a frugal yet occasional splurge on vintage tools, and a habit of over‑packing their backpack with spare wrenches, all while navigating
    the tension between structured goals and a laid‑back approach to life.
background:
  cultural: Maggie grew up in Gilmer, a small town in Upshur County, Texas, within a family that values hard work, self‑reliance, and community. Her upbringing reflects traditional Southern values—respect
    for elders, a close‑knit neighborhood network, and regular participation in local church gatherings. She identifies with the Texas work ethic, appreciating the blend of rural lifestyle and the growing
    industrial opportunities in the region. While her ethnic background is white American, her cultural identity is shaped by the customs of East Texas, including an appreciation for country music, local
    festivals, and a pragmatic, down‑to‑earth outlook.
attributes:
  skills: '["Pipefitting", "Steamfitting", "Basic welding", "Blueprint reading", "Pressure testing", "Safety compliance (OSHA)", "Troubleshooting hydraulic systems", "Small‑team coordination", "Equipment
    maintenance"]'
  hobbies: '["Hiking in East Texas woods", "Fishing at Lake Gilmer", "Gardening (native herbs)", "Reading technical manuals", "DIY home‑improvement projects", "Restoring vintage tools", "Small‑group game
    nights", "Volunteering for trade‑school apprenticeships"]'
  career_goals: Maggie aims to achieve Journeyman Pipefitter certification within the next two years and eventually earn a Master Plumber license. She aspires to take on supervisory roles on larger industrial
    projects, gaining experience with high‑pressure steam systems in manufacturing plants. Long‑term, she hopes to start her own small‑scale contracting business focused on residential and light commercial
    plumbing, while possibly pursuing an associate degree in industrial technology to broaden her technical expertise.
