persona_description: A climate scientist who is interested in understanding the differences in observed and simulated tropical temperature trends using satellite and radiosonde data. They are particularly
  interested in reconciling the observed warming at the surface with the simulated warming aloft and in identifying the physical mechanisms controlling the amplification of temperature trends in the troposphere.
  They are also interested in the role of external forcings, natural modes of variability, and observational errors in explaining the observed and simulated temperature trends in the tropics.
