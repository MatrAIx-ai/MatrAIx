  career_goals: In the short term, Sidney aims to expand her oversight to a multi‑departmental financial portfolio, leading a larger team of analysts and driving a company‑wide budgeting cycle that incorporates
    real‑time data. Her long‑term ambition is to become a chief financial officer within a mid‑size technology firm, where she can spearhead finance‑driven transformation projects, embed a culture of collaboration
    and well‑being, and champion sustainable financial growth. To support this path, she plans to complete her CPA and CFA certifications, develop mentorship programs for emerging finance talent, and integrate
    stress‑management initiatives that promote resilience across her organization.
