personas:
  professional: Sarah Squire, a retired community organizer turned oral‑history archivist, leverages her public‑speaking flair, meticulous budgeting, and digital genealogy expertise to coordinate intergenerational
    interview projects while remaining the charismatic hub of her senior‑center book club.
  sports: Sarah Squire enjoys walking the Swamp Creek Trail each morning, follows the Boston Red Sox and New England Patriots on television, and participates in a local bridge league that doubles as a mental‑fitness
    sport, while occasionally cheering for the Campobello High School track team during weekend meets.
  arts: Sarah Squire immerses herself in the arts through weekly choir rehearsals of Southern gospel classics by the Oak Ridge Boys, leads a book club that dissects historical fiction by Hilary Mantel and
    Ken Follett, and curates a personal collection of classic Hollywood films starring Katharine Hepburn and Cary Grant, all while stitching quilts inspired by the works of the Quilters of America.
  travel: Sarah Squire prefers escorted heritage tours, having already explored Colonial Williamsburg, Savannah’s historic district, and the Freedom Trail in Boston, she now dreams of a leisurely road trip
    along the Blue Ridge Parkway to visit the Thomas Jefferson Monticello estate and the historic town of St. Augustine, Florida.
  culinary: Sarah Squire’s culinary repertoire showcases Southern staples such as shrimp and grits, collard greens simmered with smoked turkey, and sweet‑potato pie, often prepared with fresh heirloom tomatoes,
    butter beans, and locally harvested rosemary from her garden, reflecting a confident home‑cook who delights in seasonal farm‑to‑table experiments.
  core: Sarah Squire blends tireless community energy with a love for history, quilting, and Southern flavors, while habitually juggling garden chores, choir rehearsals, and a spreadsheet of book‑club finances—sometimes
    forgetting to take her prescribed blood‑pressure pills amid the bustle.
background:
  cultural: Sarah grew up in the Upstate region of South Carolina, steeped in Southern hospitality, church life, and a strong sense of community. Her family's roots trace back to generations of small‑town
    farmers and educators, fostering a respect for tradition, storytelling, and collective responsibility. The values of politeness, family gatherings centered around homemade meals, and a reverence for
    local history shape her worldview, while her humanities education and lifelong curiosity encourage her to blend these traditions with modern tools and ideas.
