    movies"]'
  career_goals: Though retired from formal employment, Sarah remains driven to contribute to her community. She aims to establish a comprehensive oral‑history archive for Campobello, training high‑school
    students to conduct interviews and preserve stories. She also plans to complete a memoir that weaves her family’s genealogy with regional history, and to expand the church’s outreach garden to provide
    fresh produce for local food‑insecure families. Continuing her lifelong learning, she hopes to earn a certification in professional genealogy to deepen her research skills.
