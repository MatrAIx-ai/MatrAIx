  hobbies: '[''Playing soccer'', ''Basketball'', ''Robotics club (LEGO Mindstorms)'', ''Video editing and YouTube content creation'', ''Gaming (Minecraft, Fortnite)'', ''Reading graphic novels'', ''Beatboxing
    and hip hop music'', ''Community volunteering (food drives, tutoring)'', ''Sketching and digital art'', ''Cooking family recipes'']'
  career_goals: Thomas dreams of a career that blends his love of technology with his deep desire to help others. He aims to study computer science and social work, eventually creating educational apps
    or digital platforms that support mental-health awareness and academic success for under-served youth. He envisions working as a technology-driven community outreach coordinator or a software engineer
    focused on tools that promote school-based counseling and peer support. In the short term, he plans to earn a scholarship, join a high-school robotics team, and volunteer as a tutor, laying the groundwork
    for a future where he can design solutions that improve access to resources and foster harmony in his community.
