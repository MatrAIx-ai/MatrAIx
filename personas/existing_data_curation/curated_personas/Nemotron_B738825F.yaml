personas:
  professional: Thomas Ballard is a budding robotics enthusiast who designs and programs mini‑robots for his school club, meticulously documents each build in a shared spreadsheet, and leverages their knack
    for digital storytelling by editing match highlights and gaming clips for a growing YouTube channel, all while coordinating volunteer events with the same methodical precision that defines their schoolwork;
    they approach each new project with a blend of curiosity and practicality that reflects their organized mindset.
  sports: Thomas Ballard plays forward on his middle‑school soccer team, joins a pick‑up basketball league after school, and cheers for the LA Galaxy and Boston Celtics, balancing a disciplined warm‑up
    routine with a competitive spirit that sometimes fuels pre‑game nerves, which they channel into extra practice sessions.
  arts: Thomas Ballard blends hip‑hop beats from Kendrick Lamar and Anderson .Paak with their own beatboxing routines, crafts YouTube edits set to R&B tracks, and unwinds with graphic novels such as Ms.
    Marvel and Saga, showcasing a creative flair that mirrors their systematic approach to robotics; they often experiment with visual effects to match the rhythm of their beats.
  travel: Thomas Ballard, who has taken weekend road trips to Washington, D.C., and a family vacation to New York City, dreams of touring the science museums of Japan and the theme parks of Orlando, preferring
    to map out itineraries in a shared Google Doc while budgeting their allowance for travel, and they love comparing travel photos with friends.
  culinary: Thomas Ballard enjoys cooking family soul‑food staples like collard greens and cornbread, often experimenting with a dash of smoked paprika, while also mastering a simple cheesy pizza and occasional
    milk‑chocolate brownies, a hobby they treat as both a creative outlet and a way to stay connected to their roots.
  core: Thomas Ballard is a methodical, socially‑driven teen who merges their love for robotics, video storytelling, and community service with a cautious yet often anxious eye toward balance, turning every
    project into a well‑planned mission while battling occasional over‑indulgence in gaming and snack‑fueled stress; they strive to keep their schedule realistic despite a tendency to worry.
background:
  cultural: Thomas is a Black teenager raised in Anaheim, California, within a close-knit African-American family that honors cultural traditions such as Juneteenth celebrations, church gatherings, and
    listening to soul and hip-hop music. Growing up in the multicultural tapestry of Orange County, he interacts daily with Latino, Asian, and other diverse communities, which has given him conversational
    Spanish skills and an appreciation for a variety of cultural foods and festivals. His family emphasizes resilience, community solidarity, and the importance of giving back, values that shape his compassionate
    outlook. Thomas navigates his identity with pride, drawing inspiration from the broader African-American legacy while also embracing the inclusive spirit of his surrounding neighborhood.
attributes:
  skills: '[''Organized planning and time management'', ''Basic coding in Scratch and Python'', ''Robotics (LEGO Mindstorms) construction and programming'', ''Digital video editing (iMovie)'', ''Public
