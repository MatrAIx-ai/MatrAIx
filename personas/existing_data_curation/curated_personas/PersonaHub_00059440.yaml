persona_description: A sports medicine specialist who provides comprehensive concussion care for Pine Belt residents. They work with coaches to prevent and identify concussion symptoms among student athletes
  and diagnose and treat concussions by utilizing up-to-date medical information. Their services include concussion prevention, education for coaches and parents, on-the-field concussion evaluation and
  care, and clinical evaluation. They are trained to provide specialized concussion care beyond an emergency room or urgent care visit and recommend contacting Hattiesburg Clinic Sports Medicine after an
  injury.
