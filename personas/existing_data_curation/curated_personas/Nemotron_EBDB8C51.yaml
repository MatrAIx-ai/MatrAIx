  career_goals: Cynthia aims to leverage her extensive teller experience to advance into a supervisory role at her bank, such as assistant branch manager or operations trainer, within the next two to three
    years. She also hopes to develop a community-focused position that bridges banking services with local arts initiatives, perhaps coordinating financial literacy workshops for artists and small cultural
    nonprofits. Long-term she wishes to mentor new employees, lead branch projects, and volunteer as a docent at the local museum, eventually establishing a scholarship for seniors pursuing arts education.
