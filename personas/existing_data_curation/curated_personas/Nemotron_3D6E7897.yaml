personas:
  professional: Marie Wagner, a 56‑year‑old dishwasher renowned for her meticulous operation of commercial dishwashing equipment and sharp eye for workflow inefficiencies, channels her curiosity and reliability
    into mentoring junior staff while actively pursuing a supervisory role in hospitality and enrolling in part‑time management courses.
  sports: Marie Wagner enjoys early‑morning beach walks with the "Pensacola Seniors on the Shore" walking club, practices gentle yoga twice a week, follows the Tampa Bay Buccaneers and the Florida State
    Seminoles for football, and occasionally joins community volleyball games at the local park during summer months.
  arts: Marie Wagner paints impressionistic seascapes inspired by Claude Monet and Winslow Homer, collects unique shells as natural sculpture, volunteers backstage at the Pensacola Community Theater where
    she admires unconventional performances by groups like Stomp, and indulges in the poetry of Mary Oliver while listening to Norah Jones on her kitchen radio.
  travel: Marie Wagner prefers relaxed coastal getaways, has explored the historic districts of New Orleans, Savannah, and Charleston on weekend road trips, dreams of sailing the Amalfi Coast and visiting
    the Bahamian islands for their pristine beaches, and always plans trips around her limited budget and desire for artistic inspiration.
  culinary: Marie Wagner is an intermediate home cook who loves experimenting with Gulf shrimp étouffée, grilled grouper glazed with citrus, key lime pie, and fresh herb salads featuring dill, thyme, and
    cilantro, often incorporating collected sea‑salted shells as garnish for an extra coastal touch.
  core: Marie Wagner blends a pragmatic work ethic with a relentless curiosity for art and nature, balancing meticulous kitchen efficiency with occasional splurges on seashell décor and a stubborn streak
    that makes her both a competitive problem‑solver and a meticulous planner.
background:
  cultural: Marie identifies as white American, raised in a suburban setting that blended Midwestern values with a later relocation to Florida's coastal culture. Her upbringing emphasized self‑reliance,
    modesty, and a respect for hard work, while her current residence in Santa Rosa Beach has exposed her to a relaxed, outdoor‑oriented lifestyle and a growing appreciation for regional art and multicultural
    tourism. These influences shape her pragmatic outlook, her love for beach‑side community activities, and her openness to diverse artistic expressions.
attributes:
  skills: '["commercial dishwasher operation", "food safety and sanitation compliance", "high‑pressure time management", "team coordination and communication", "inventory tracking of cleaning supplies",
    "basic kitchen equipment maintenance", "adaptability in fast‑paced environments", "attention to detail and quality control"]'
  hobbies: '["visiting art galleries and museums", "painting seascapes and sketching", "collecting seashells on the beach", "birdwatching along the Gulf Coast", "gardening native coastal plants", "experimenting
    with new cooking recipes", "reading contemporary fiction and poetry", "volunteering backstage for community theater"]'
  career_goals: Marie aims to leverage her reliability and organizational strengths to transition into a supervisory role within the hospitality industry, such as a kitchen steward or shift lead, where
    she can mentor newer staff and influence operational efficiency. She is also considering part‑time coursework in hospitality management to broaden her skill set and eventually explore opening a small
    café that blends her love for community interaction with an emphasis on local art displays. Financial stability and the ability to support her independent lifestyle as a separated individual are central
    to her long‑term ambitions.
