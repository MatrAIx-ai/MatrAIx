persona_description: A self-taught cartoonist and illustrator who broke racial barriers in the 1960s, creating the ethnically diverse "Wee Pals" comic strip, which still runs daily in the Oakland Tribune
  and Contra Costa Times. He was the first African-American to have a syndicated comic strip and was a pioneer with his "rainbow power" message many decades before it became a household name. He was a hero
  of Belva Davis, a pioneer herself in Bay Area journalism, who lived a few blocks from Turner when he had his home and studio in Berkeley and who was a guest at Turner's 90th birthday party in Sacramento.
  He was a regular guest at schools, where he shared his gifts with the next generation of young artists, and received numerous awards, including the prestigious Sparky Award from San Francisco's Cartoon
  Art Museum and named for Schulz; the Anti-Defamation League's Humanitarian award; the Boys and Girls Club Image Award; the B'Nai Brith Humanitarian Award; and the California Educators Award. He once made
  an appearance on "Mister Rogers." He was a self-taught son of a Pullman porter and protégé of Peanuts creator Charles Schulz.
