  hobbies: '["Beach volleyball", "Yoga and Pilates classes", "Hiking coastal trails", "Volunteering at local food banks", "Community gardening", "Cooking healthy plant‑based meals", "Attending live music
    events", "Participating in a book club", "Meditation and mindfulness practice", "DIY home‑decor projects"]'
  career_goals: Barbara aims to move from a first‑line supervisory role to a regional operations manager for a health‑focused restaurant chain, where she can implement sustainable sourcing and wellness‑centred
    menu development. She plans to earn a Certified Food Service Manager credential and a certification in nutrition counseling, positioning herself to eventually become a director of food service for a
    community hospital or school district. Barbara also hopes to mentor emerging food‑service professionals and launch a community kitchen that provides affordable, nutritious meals while offering job‑training
    programs for local residents.
