personas:
  professional: Barbara Rayvis, a 32‑year‑old restaurant operations supervisor in Santa Monica, blends her STEM background with a passion for food safety and team development, using data‑driven cost controls
    and compassionate leadership to streamline service while constantly worrying about missing a detail.
  sports: Barbara Rayvis, a beach‑volleyball enthusiast who competes with the Santa Monica Sands Club each summer, trains at CorePower Yoga, hikes the Boney Boulders trail every weekend, and cheers for
    the Los Angeles Lakers and Dodgers.
  arts: Barbara Rayvis, an avid concert‑goer, frequently sees indie acts like Mitski and Vampire Weekend at the Hollywood Bowl, participates in a modern‑fiction book club that reads works by Celeste Ng,
    and supports the Pacific Playhouse theater productions.
  travel: Barbara Rayvis prefers structured weekend getaways, often booking eco‑lodges in Costa Rica or yoga retreats in Bali, while dreaming of a road trip along California’s Highway 1 to explore hidden
    coastal gardens, all while balancing a modest travel budget.
  culinary: Barbara Rayvis, an experienced home chef, crafts plant‑based dishes such as quinoa‑black bean burgers, chickpea‑spinach curry, and avocado‑lime salads, mastering nutrition analysis tools to
    balance macronutrients and using kale, chia seeds, and nutritional yeast as staple ingredients.
  core: Barbara Rayvis is a data‑driven, community‑focused restaurant leader who channels her anxiety into flawless scheduling, can’t resist turquoise‑bordered spreadsheets, and secretly binge‑streams true‑crime
    podcasts after a long shift.
background:
  cultural: Barbara is a white American raised in Santa Monica, California, with family roots tracing back to Northern European (English and Irish) ancestors. Growing up in a multicultural, coastal city,
    she was exposed to diverse culinary traditions and a strong emphasis on health, sustainability, and community involvement. The West Coast lifestyle—characterized by outdoor recreation, a progressive
    mindset, and a vibrant food culture—shapes her values around environmental stewardship and social responsibility. Her upbringing emphasized education, pragmatic problem‑solving, and collaborative community
    service, which continue to influence both her professional ethos and personal interests.
attributes:
  skills: '["Food Safety Management", "HACCP Compliance", "Kitchen Operations", "Staff Scheduling", "Inventory Forecasting", "Cost Control and Budgeting", "Process Optimization", "Team Leadership", "Conflict
