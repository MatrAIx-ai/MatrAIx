personas:
  professional: Judith Garibaldi, a 25‑year‑old civil engineer specializing in municipal transportation infrastructure, they blend disciplined project management with hands‑on construction expertise, using
    AutoCAD, Revit, and GIS to design sustainable roadways and green bridges while leading multidisciplinary teams with a pragmatic yet collaborative style.
  sports: Judith Garibaldi, an avid outdoor enthusiast, they spend weekends hiking sections of the Appalachian Trail, cycle the rolling hills of Berks County, participate in Zumba group classes, and proudly
    cheer for the Philadelphia Eagles, Flyers, and Phillies while holding a membership at the local community rowing club.
  arts: Judith Garibaldi, a regular member of a community theater improv troupe, they find creative release in spontaneous comedy, enjoy photographing urban skylines, devour contemporary mystery novels
    by Tana French, and appreciate the music of Andrea Bocelli and the films of Wes Anderson.
  travel: Judith Garibaldi, who draws inspiration from historic sites, they have trekked the ruins of Pompeii, explored the historic Old City of Philadelphia, taken a road‑trip through New England’s colonial
    towns, and are drafting a bucket list that includes a spring visit to the lavender fields of Provence and a summer trek along the Great Wall of China.
  culinary: Judith Garibaldi, a confident home cook with a penchant for Mediterranean flavors, they master dishes like cacio e pepe, bruschetta with heirloom tomatoes, and grilled branzino, enjoy sourcing
    fresh basil and artisanal olive oil at the local farmer’s market, and regularly experiment with seasonal vegetable risottos in their cramped apartment kitchen.
  core: Judith Garibaldi, a 25‑year‑old civil engineer who balances structured design work with a love for outdoor adventure, community improv, and Mediterranean cooking, they navigate life with meticulous
    budgeting, proactive health habits, and a mischievous habit of binge‑reading mystery novels late into the night.
background:
  cultural: Judith comes from a white, Italian‑American family originally rooted in the Northeast, with the Garibaldi surname reflecting her heritage. Raised in a middle‑class suburb of Reading, PA, she
    grew up with traditional Italian culinary customs—home‑made pasta, Sunday family meals—and Catholic holidays, while also embracing the broader American cultural landscape of the region. She values hard
    work, community solidarity, and celebrates both Italian festivities like St. Joseph's Day and typical American holidays, fostering a multicultural awareness that influences her social interactions and
    civic engagement.
