  career_goals: She aims to become a licensed Professional Engineer in Pennsylvania within the next two years, then advance to lead large-scale sustainable infrastructure projects such as green bridges
    and climate‑resilient roadways. Long‑term, Judith aspires to a senior management role—project director or engineering manager—where she can mentor junior engineers and champion inclusive workplace practices.
    Eventually she envisions launching her own consultancy focused on environmentally responsible civil engineering solutions while maintaining a balanced personal life after her recent separation.
