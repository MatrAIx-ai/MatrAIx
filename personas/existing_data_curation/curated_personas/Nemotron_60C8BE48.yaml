  hobbies: '[''Community outreach volunteering'', ''Listening to classic rock and country music'', ''Fishing on the Nolichucky River'', ''Woodworking'', ''Coaching youth baseball'', ''Reading trade magazines'',
    ''Attending local bar socials'', ''Exploring regional history podcasts'']'
  career_goals: Thomas aims to move into a supervisory role within the next two years, seeking a position as a shift lead or production supervisor where he can mentor younger workers and drive safety and
    efficiency initiatives. He plans to obtain a GED and pursue certifications in Lean Manufacturing and OSHA Forklift Safety to bolster his qualifications. Long‑term, he hopes to lead a small team focused
    on continuous improvement projects or eventually start a community‑based training workshop that teaches hands‑on manufacturing skills to high‑school students and unemployed adults in the Piney Flats
    area.
