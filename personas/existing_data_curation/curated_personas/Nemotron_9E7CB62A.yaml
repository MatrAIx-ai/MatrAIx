  career_goals: Myriam aims to attain the rank of Battalion Chief within the next five years, focusing on the integration of emerging firefighting technologies and the expansion of community risk reduction
    initiatives. She plans to acquire advanced certifications such as Fire Officer II, Hazardous Materials Technician, and the Incident Command System (ICS) Master level. A key ambition is to develop a
    department‑wide art‑based fire safety outreach program that uses murals, interactive workshops, and digital media to engage youth and foster a culture of prevention. Long‑term, she envisions establishing
    a private consultancy that offers fire safety training, risk assessment, and research on fire behavior for municipalities across Puerto Rico, leveraging her inventive mindset and scholarly curiosity.
