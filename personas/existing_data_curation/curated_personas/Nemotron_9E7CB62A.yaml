personas:
  professional: Myriam Orduna is a seasoned frontline firefighter with a deep mastery of fire suppression, rescue, and EMT‑B medical care, who leverages their analytical mindset, bilingual communication
    skills, and emerging technologies like drones and thermal imaging to lead high‑stress incidents while quietly plotting a strategic path toward battalion chief within five years.
  sports: Myriam Orduna dabbles in high‑intensity circuit training at the fire department’s wellness program, hikes with the Sierra de Luquillo Birdwatching Club, and follows the Cangrejeros de Santurce
    baseball team with a quiet devotion, while also participating in a local salsa‑dance fitness group that doubles as a cardio workout.
  arts: Myriam Orduna channels abstract expressionism into mixed‑media canvases inspired by the turquoise coastline of Yabucoa, citing Jackson Pollock and Frida Kahlo as artistic be‑acons, while their salsa
    sessions echo the rhythmic flair of Celia Cruz and the improvisational flair of contemporary dancer Pina Bausch.
  travel: Myriam Orduna prefers purposeful travel that blends research and recreation, having explored the volcanic landscapes of Costa Rica, the historic streets of Old San Juan, and the quiet fjords of
    Norway, while they keep a bucket‑list destination of Santorini for its luminous sunsets and architectural geometry, all planned around limited vacation days and a modest travel fund.
  culinary: Myriam Orduna enjoys reinventing classic island dishes, experimenting with plantain‑based mofongo infused with smoked paprika and citrus‑marinated snapper, while they also savor a simple arroz
    con gandules seasoned with sofrito, cilantro, and a splash of coconut milk, and they possess a confident but occasionally overly experimental approach to plating.
  core: Myriam Orduna is a disciplined fire‑service leader who fuses analytical precision with a vivid artistic imagination, handling stress with calm while secretly hoarding art supplies and obsessively
    tracking every cent.
background:
  cultural: Myriam was born and raised in Yabucoa, a rural municipality on Puerto Rico’s southeastern coast. Growing up in a close‑knit community shaped by the island’s history of resilience and frequent
    natural challenges, she absorbed values of self‑reliance, family solidarity, and communal responsibility. Fluent in both Spanish and English, she bridges the island’s linguistic heritage with professional
    demands. The vibrant colors of Puerto Rican art, the rhythms of bomba and plena, and the natural chorus of coquí frogs have deeply influenced her artistic sensibility. Experiencing hurricanes and tropical
    storms from an early age fostered a pragmatic focus on emergency preparedness, which she now applies in her firefighting career and community outreach. Myriam’s identity blends jíbaro (country) roots,
    modern urban influences, and a personal drive to fuse tradition with innovative approaches to public safety and creative expression.
