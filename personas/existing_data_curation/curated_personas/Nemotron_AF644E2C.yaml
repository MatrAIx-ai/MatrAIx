    Operating Procedure Development'', ''ERP Systems'', ''GIS Mapping'', ''Mentorship and Coaching'', ''Diversity and Inclusion Practices'']'
  hobbies: '[''Salsa and Hip-Hop Dance Classes'', ''Community Gardening'', ''Healthy Soul-Food Cooking'', ''Group Fitness Sessions (Zumba, Yoga)'', ''Reading Business and Leadership Books'', ''Volunteering
    at Food Banks'', ''Live Music Events (Jazz, R&B, Neo-Soul)'', ''Attending Black Cultural Festivals (Juneteenth, Harlem Week)'', ''Meditation for Stress Management'', ''Hiking in State Parks'']'
  career_goals: Destini aims to advance to a regional operations manager role within an agribusiness that prioritizes sustainability and community impact. She plans to obtain an MBA with a focus on sustainable
    management and earn certifications in food safety and sustainable forestry. Her long-term ambition is to launch a city-based urban-agriculture initiative that provides fresh produce to underserved neighborhoods
    while creating apprenticeship pathways for Black youth interested in agriculture. She also seeks to become a recognized advocate for inclusive practices in the farming, fishing, and forestry sectors,
    speaking at industry conferences and mentoring emerging leaders.
