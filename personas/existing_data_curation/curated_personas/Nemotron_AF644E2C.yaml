personas:
  professional: Destini Mallard, a first‑line supervisor in agribusiness, blends razor‑sharp organization, data‑driven resource allocation, and inclusive team mentoring to streamline farming, fishing, and
    forestry crews while charting a path toward a regional operations manager role.
  sports: Destini Mallard fuels her fitness with group Zumba classes, hip‑hop and salsa dance workshops, and community gardening sessions, while cheering on the Chicago White Sox and the Chicago Bears and
    maintaining a membership at the local CrossFit box for strength training.
  arts: Destini Mallard immerses herself in live jazz, R&B, and neo‑soul concerts featuring artists like Kamasi Washington, H.E.R., and Leon Bridges, devours leadership books by Simon Sinek and Brené Brown,
    and celebrates cultural festivals such as Juneteenth and Harlem Week, finding creative inspiration for her urban‑agriculture vision.
  travel: Destini Mallard prefers purposeful travel that blends sustainability scouting with cultural immersion, having explored New Orleans’ jazz scene, visited a rooftop farm in Brooklyn, and now dreaming
    of a study tour of urban‑agriculture projects in Havana and a wellness retreat in Kyoto.
  culinary: Destini Mallard crafts healthy soul‑food meals—spicy collard greens, quinoa‑black‑bean bowls, baked sweet potatoes with smoked paprika—and enjoys experimenting with plant‑based twists on classic
    dishes, showcasing an intermediate cooking skill that often shines at friends’ potlucks.
  core: Destini Mallard is an ultra‑organized, socially vibrant agribusiness leader who channels her anxiety into rhythmic group workouts and community‑focused sustainability projects, occasionally over‑committing
    but always prioritizing inclusive impact.
background:
  cultural: Destini is a Black American raised in New York City with family roots in the Southern United States. Her upbringing blended the vibrant multicultural life of NYC with stories of her grandparents'
    agrarian heritage in the South, fostering a deep respect for community, resilience, and the historical contributions of Black farmers and fishers. She actively participates in local Black cultural organizations,
    celebrates heritage through music, food, and festivals, and draws on this legacy to inform her commitment to representation and empowerment in the agricultural sector. Her cultural identity shapes her
    values of cooperation, collective well‑being, and a drive to create opportunities for the next generation of Black professionals in farming, fishing, and forestry.
