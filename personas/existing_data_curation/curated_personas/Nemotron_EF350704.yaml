  career_goals: Through his play, Jasen imagines helping others as a firefighter or a teacher. He aspires to become more independent—learning to dress himself, speak clearly, and share cooperatively—so
    that he can one day protect and guide friends in his community. His current ambition is to master simple sentences and enjoy longer periods of imaginative, collaborative play.
