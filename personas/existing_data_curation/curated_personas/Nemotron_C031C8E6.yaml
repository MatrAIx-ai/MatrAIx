  career_goals: Although retired from formal employment, Lilja aims to deepen her impact on the Hartford City community. She hopes to lead a weekly senior‑center program that blends fitness, arts, and social
    interaction, using her organizational strengths to create a predictable yet flexible schedule. She also aspires to document and publish a community cookbook that captures local recipes and stories,
    fostering intergenerational connections. On a personal level, she wants to maintain her health, support her spouse, and continue learning new technologies to stay engaged with her grandchildren.
