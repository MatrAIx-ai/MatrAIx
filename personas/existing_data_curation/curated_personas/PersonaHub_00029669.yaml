persona_description: A ballet historian and choreographer who specializes in the analysis and interpretation of the choreography of Marius Petipa and Lev Ivanov, particularly in the original 1895 production
  of "Swan Lake". This persona is deeply knowledgeable about the nuances of Petipa's and Ivanov's choreography and is skilled in identifying and analyzing the stylistic and thematic elements present in
  their works. They are also familiar with the historical context in which the ballet was created and have a keen interest in the evolution of ballet choreography over time.
