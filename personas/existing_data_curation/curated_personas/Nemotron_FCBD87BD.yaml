  hobbies: '[''Soccer'', ''School choir'', ''Cajun dancing'', ''Cooking with family'', ''Reading mystery novels'', ''Rock and shell collecting'', ''Backyard science experiments'']'
  career_goals: Victoria aspires to become a wildlife veterinarian, combining her love for animals with her curiosity about biology. She dreams of working in a research lab or a wildlife rehabilitation
    center where she can apply both scientific knowledge and compassionate care. In the longer term, she hopes to lead community education programs that teach kids about local ecosystems and responsible
    pet care.
