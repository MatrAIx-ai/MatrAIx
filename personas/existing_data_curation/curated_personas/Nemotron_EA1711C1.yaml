personas:
  professional: Maria Milian, a veteran bilingual elementary educator with over 35 years of classroom experience, they blend curiosity-driven curriculum design with practical technology integration, mentor
    new teachers, and spearhead district-wide bilingual literacy initiatives.
  sports: Maria Milian, an avid morning walker along Old San Juan’s historic streets, they cheer for the Cangrejeros de Santurce baseball team in winter, follow San Juan FC soccer in summer, and attend
    a senior-friendly yoga class twice weekly at the local community center.
  arts: Maria Milian, a lover of poetic and musical heritage, they find solace in the verses of Julia de Burgos, the brushstrokes of José Campeche, and the salsa rhythms of Héctor Lavoe while knitting intricate
    shawls.
  travel: Maria Milian, a meticulous planner of short escapes, they favor day trips to Vieques for sunrise photography, weekend tours of Culebra’s hidden beaches, and dream of a culturally rich pilgrimage
    to Granada’s Alhambra.
  culinary: Maria Milian, a devoted home cook, they perfect arroz con gandules with homemade sofrito, layer pastelón with sweet plantains, sip café con leche, and nurture oregano, cilantro, and hibiscus
    on their balcony garden.
  core: Maria Milian, blending a lifelong dedication to education with quiet curiosity, they nurture gardens, knit, mentor, and occasionally surrender to nostalgic salsa evenings while maintaining a disciplined
    yet flexible routine.
background:
  cultural: Maria's identity is rooted in the vibrant Puerto Rican culture of San Juan and Trujillo Alto. Raised in a bilingual household, she embodies the island's blend of Spanish colonial heritage and
    Afro-Caribbean rhythms. Family gatherings, Catholic traditions, and community festivals such as La Noche de San Juan have shaped her values of collectivism, respect for elders, and celebration of music
    and food. Her teaching philosophy reflects the island's emphasis on oral storytelling, cultural pride, and resilience in the face of economic and environmental challenges.
attributes:
  skills: '["Classroom Management", "Bilingual Instruction (Spanish-English)", "Curriculum Development", "Differentiated Instruction", "Educational Technology Integration", "Parent Engagement", "Conflict
    Mediation", "Mentoring and Coaching", "Assessment and Data Analysis", "Culturally Responsive Teaching"]'
  hobbies: '["Balcony Gardening", "Traditional Puerto Rican Cooking", "Reading Historical Fiction and Poetry", "Knitting", "Salsa Dancing (small gatherings)", "Volunteer Reading Tutor", "Photography of
    Island Landscapes", "Walking Tours of Old San Juan", "Community Festival Participation"]'
  career_goals: As she approaches retirement, Maria aims to channel her experience into mentorship and curriculum consulting. She plans to develop a bilingual literacy framework for the district, lead a
    small after-school enrichment program in Trujillo Alto, and serve on the school’s advisory board. Additionally, she hopes to author a guidebook on classroom strategies that balance curiosity and practicality,
    allowing her to continue contributing to education while maintaining a flexible schedule.
