personas:
  professional: Jennie Powell, a seasoned retail cashier with a business degree, channels precise cash handling, modern POS proficiency, and conflict‑resolution skills into mentorship and community outreach
    planning, and they blend their methodical organization with a vividly imaginative approach to visual aesthetics.
  sports: Jennie Powell, an active member of a senior pickleball league and the local mountain hiking club, regularly follows the Denver Broncos and Colorado Avalanche, integrating yoga as their primary
    fitness routine to sustain mobility, and they enjoy team spirit during game nights.
  arts: Jennie Powell explores the Denver art scene with frequent gallery visits, sketches watercolors inspired by the Rockies after seeing works by Georgia O'Keeffe, reads speculative fiction by Neal Stephenson,
    and they attend performances by the Denver Center for the Performing Arts featuring musicians like Joni Mitchell.
  travel: Jennie Powell prefers well‑planned trips that combine cultural immersion and natural beauty, having toured Rocky Mountain National Park, the historic streets of Santa Fe, and a literary pilgrimage
    across Dublin and Galway, while dreaming of sunrise hikes in Iceland’s Þingvellir and a tofu‑focused culinary tour in Kyoto, and they hope to blend art workshops with future hiking expeditions.
  culinary: Jennie Powell delights in farm‑to‑table cooking, often preparing Colorado trout almondine, beet and goat cheese salads, and quinoa‑stuffed peppers, seasoning with rosemary, smoked paprika, and
    locally sourced honey, and they enjoy experimenting with blue corn masa for homemade tamales.
  core: Jennie Powell, the 64‑year‑old cashier‑turned‑mentor who sketches mountain watercolors and writes poetry, balances meticulous budgeting with spontaneous artistic bursts, yet they still forget to
    water their succulents when a dance night runs late.
background:
  cultural: Jennie was raised in a mid‑western, Anglo‑American family that emphasized hard work, education, and community involvement. After moving to Denver, she embraced the city’s blend of outdoor enthusiasm,
    diverse arts culture, and progressive values while retaining the traditional, cooperative spirit of her upbringing. Her cultural identity reflects a mix of classic American middle‑class values and the
    eclectic, nature‑oriented lifestyle of Colorado’s Front Range communities.
