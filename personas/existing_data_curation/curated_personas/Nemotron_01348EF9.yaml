  career_goals: Jennie aims to transition from full‑time cashier work to a mentorship and consulting role where she can share her business knowledge with small local enterprises and younger employees. She
    hopes to volunteer as a financial‑literacy instructor at a community center, while also curating and possibly contributing to local art exhibitions. Ultimately, she seeks a balanced retirement that
    blends her love for creativity, organized community service, and continued learning, allowing her to remain socially engaged and intellectually stimulated.
