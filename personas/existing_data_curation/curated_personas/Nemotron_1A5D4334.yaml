personas:
  professional: Michael Williams, a budding pretend‑doctor who loves setting up a toy clinic, demonstrates early curiosity blended with practicality, organizing band‑aids and stuffed animals with flexible
    care routines while gently asserting themselves when patients (peeps) need attention.
  sports: Michael Williams dabbles in peewee soccer with the Macon Youth Soccer Club, cheers for the Atlanta Braves and Atlanta Falcons, and enjoys weekend games with the local Macon Little League Tigers,
    balancing a love for running around the playground with periodic meltdowns when a game ends early.
  arts: Michael Williams delights in gospel harmonies at church, whistles along to Sesame Street tunes, claps to The Wiggles' songs, and mimics the rhythms of a local church choir led by Grandma, weaving
    these sounds into imaginative dance sessions that shape their early creative identity.
  travel: Michael Williams enjoys family road trips to Savannah’s historic squares and Tybee Island’s sandy shores, dreams of exploring Disney World’s Magic Kingdom, and prefers short, structured outings
    with a familiar adult, balancing excitement with a need for the comforting routine of bedtime stories.
  culinary: Michael Williams favors sweet potato mash, mac and cheese, and crispy fried chicken, loves dipping watermelon slices into honey, and eagerly helps stir batter for pancakes using a tiny wooden
    spoon, while their palate also delights in collard greens seasoned with smoked turkey.
  core: Michael Williams is a curious little explorer who hums gospel hymns while worrying about shadows, sometimes hoarding stickers in a secret stash and forgetting to put on their jacket on breezy days.
background:
  cultural: Michael is a Black child raised in Macon, Georgia, a region steeped in Southern African‑American traditions. His family participates actively in a local church, where gospel music, communal
    meals, and celebrations like Juneteenth and Kwanzaa foster a strong sense of cultural pride. He is exposed to Southern cuisine, family barbecues, and storytelling sessions that pass down oral histories.
    The close‑knit neighborhood environment emphasizes respect for elders, shared experiences, and community support, shaping Michael's early understanding of identity, belonging, and the value of helping
    others.
