  career_goals: While Michael is too young for a formal career, his imaginative play reveals early ambitions. He frequently pretends to be a firefighter, attracted to the bright trucks and the idea of helping
    others, and sometimes imagines being a teacher because he enjoys showing picture books to his stuffed animals. He also shows enthusiasm for music, humming gospel tunes and clapping along, hinting at
    a future interest in performance. These playful aspirations reflect his desire to be helpful, socially engaged, and creatively expressive.
