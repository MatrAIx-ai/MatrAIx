  career_goals: Juan often talks about the future with excitement. He dreams of becoming a firefighter because he admires the bravery, teamwork, and clear structure of the job, and loves the idea of helping
    his community. He also imagines himself as a soccer player, seeing the sport as a way to stay active, work with teammates, and represent his neighborhood. Occasionally, he mentions wanting to be a teacher
    who can teach both English and Spanish, reflecting his desire to help others learn and stay connected to his cultural roots. Overall, his ambitions focus on roles that combine responsibility, teamwork,
    and the chance to serve or inspire others.
