personas:
  professional: Juan Olivera is a budding junior architect who channels their love for LEGO building into meticulous, step‑by‑step designs, demonstrating the same practical, organized mindset they bring
    to group soccer drills while confidently taking the lead when a build needs direction.
  sports: Juan Olivera thrives on daily soccer matches with friends at the nearby park, proudly wearing their San Bernardino Scorpions jersey and cheering for the Los Angeles FC during televised games,
    while they also dash into capture‑the‑flag marathons that keep their energy high and their teamwork skills sharp.
  arts: Juan Olivera delights in the rhythmic steps of their community folkloric dance class, often humming classic corrido melodies by artists like Vicente Fernández while they thumb through comic books
    featuring superheroes such as Spider‑Man and read illustrated folk tales from their family’s traditions that spark their imagination.
  travel: Juan Olivera loves family road trips that blend a well‑planned visit to Disneyland Resort for thrill rides with spontaneous stops at a local farmers’ market in Ojai, and they dream of exploring
    the towering redwoods of Yosemite and the neon streets of Tokyo, always balancing school calendars and a modest travel allowance.
  culinary: Juan Olivera eagerly assists in mashing ripe avocados with lime, tomato, and cilantro to create guacamole, expertly rolls soft corn tortillas for tacos filled with seasoned ground beef, shredded
    lettuce, and cheese, and they also love indulging in pepperoni pizza topped with extra mozzarella and a side of fresh mango slices.
  core: Juan Olivera is a lively seven‑year‑old who obsessively lines up LEGO bricks by color before each build, leads their friends’ soccer scrimmages with natural assertiveness, proudly showcases family
    holiday altars, and they occasionally forget to floss after a long day of playing.
background:
  cultural: Juan comes from a Mexican‑American family that maintains strong ties to its heritage while living in Ontario, California. At home, Spanish is spoken alongside English, and family gatherings
    often feature traditional music, stories, and foods such as tamales, salsa, and fresh fruit. He celebrates cultural holidays like Día de los Muertos and Mexican Independence Day, helping to set up altars
    and engage in community parades. His family places a high value on respect for elders, communal support, and close-knit relationships, which is reflected in his cooperative yet assertive demeanor. The
    multicultural environment of San Bernardino County exposes Juan to a diverse mix of cultures, yet his Mexican roots remain a central part of his identity, shaping his values, language use, and daily
    rituals.
