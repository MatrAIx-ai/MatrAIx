  hobbies: '[''Visiting art galleries and museums'', ''Exploring street art and murals'', ''Weekend hikes and nature walks'', ''Yoga and meditation'', ''Digital illustration and graphic design'', ''DIY
    electronics (Arduino, Raspberry Pi)'', ''Cooking fusion cuisine'', ''Volunteer coding instruction for youth'', ''Reading science fiction and graphic novels'', ''Board games and social gatherings'']'
  career_goals: In the next five years Lourdes aims to transition from store-level supervision to a district-manager position, where she can implement data-driven strategies across multiple locations. She
    plans to champion a mentorship program that nurtures frontline talent and to integrate emerging technologies like AI-based demand forecasting into store operations. Ultimately, she envisions a leadership
    role that blends her technical background with people-focused retail management, possibly pursuing an MBA to broaden her strategic expertise.
