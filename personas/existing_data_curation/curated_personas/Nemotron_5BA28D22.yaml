personas:
  professional: Lourdes Chen, a 24‑year‑old retail supervisor in San Francisco, leverages graduate‑level data analysis, inventory forecasting, and POS troubleshooting while channeling their spontaneous
    curiosity and compassionate leadership into coaching staff and championing AI‑driven demand forecasting for future district‑manager ambitions.
  sports: Lourdes Chen enjoys hiking the Redwood trails with the San Francisco Hiking Club, practices yoga twice weekly at a local studio, plays casual beach volleyball in the summer with friends, and roots
    for the San Francisco Giants and Golden State Warriors while occasionally following the NBA season for inspiration.
  arts: Lourdes Chen frequents SFMOMA’s rotating exhibitions, screens indie films at the San Francisco International Film Festival, sketches street‑art murals inspired by Banksy and Shepard Fairey, and
    devotes weekend evenings to reading graphic novels like 'Saga' and listening to indie musicians such as Phoebe Bridgers and Mitski.
  travel: Lourdes Chen prefers spontaneous weekend road trips, having already explored Napa Valley’s wineries, the rugged coast of Big Sur, and dreaming of a future immersion in Kyoto’s temples and Barcelona’s
    street‑art scene, often using budget‑friendly Airbnb stays and planning via the Hopper app while balancing a modest travel budget.
  culinary: Lourdes Chen experiments with fusion cuisine, crafting dishes like miso‑glazed salmon tacos with avocado and cilantro, ramen bowls infused with locally sourced kale and tofu, and enjoys sourcing
    gochujang, miso, and fresh herbs at the Ferry Plaza Farmers Market, while keeping their cooking skill at an enthusiastic home‑chef level.
  core: Lourdes Chen blends analytical retail leadership with a vivid artistic curiosity, spontaneous adventure streak, and deep empathy for others, yet frequently wrestles with keeping their schedule organized.
background:
  cultural: Lourdes is a second-generation Chinese-American raised in the Bay Area. Fluent in English and Mandarin, she grew up celebrating Lunar New Year, the Mid-Autumn Festival, and family reunions centered
    on traditional dishes. Her parents emphasized education, respect for elders, and community responsibility, values that shape her compassionate and cooperative nature. Living in Daly City’s vibrant Asian
    community, she blends these cultural roots with the progressive, multicultural environment of San Francisco, cultivating an identity that respects heritage while embracing new ideas and artistic experiences.
attributes:
  skills: '[''Leadership'', ''Team Supervision'', ''Customer Service Excellence'', ''Data Analysis'', ''Inventory Management'', ''Conflict Resolution'', ''Staff Training & Development'', ''Problem Solving'',
