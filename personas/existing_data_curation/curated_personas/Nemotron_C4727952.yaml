personas:
  professional: Tarsha Stroman, a senior event strategist, orchestrates large‑scale hybrid conventions by merging meticulous budgeting, vendor negotiations, and inclusive design, and they thrive on balancing
    detailed logistics with spontaneous artistic elements.
  sports: Tarsha Stroman roots for the Atlanta Braves and follows Atlanta United FC, participates in a weekly yoga class and a bi‑weekly community tennis league, and they prioritize gentle cardio over high‑intensity
    workouts to complement their busy schedule.
  arts: Tarsha Stroman frequents downtown galleries showcasing artists who explore diaspora narratives, attends live jazz sessions featuring saxophonist Kamasi Washington and vocalist Esperanza Spalding,
    and they draw inspiration from biographies of renowned civil‑rights leaders and the works of celebrated poets for personal essay writing.
  travel: Tarsha Stroman explores historic sites of social‑justice movements, having visited Selma, Alabama, the Freedom Trail in Boston, and the National Civil Rights Museum in Memphis, while also seeking
    culinary inspiration in Jamaica’s Montego Bay and cultural immersion in New Orleans, and they blend detailed itineraries with spontaneous detours whenever an unexpected local festival arises.
  culinary: Tarsha Stroman experiments with soulful Southern dishes like shrimp and grits, Caribbean staples such as jerk chicken, and creative twists on collard greens using smoked paprika and scotch bonnet
    peppers, and they host intimate dinner gatherings where the menu reflects a blend of tradition and innovation, though they sometimes over‑season in their enthusiasm.
  core: Tarsha Stroman balances a high‑pressure event career with a relentless curiosity for arts, wellness, and cultural storytelling, often channeling stress into creative cooking, yoga, and meticulous
    planning, yet they wrestle with self‑critical perfectionism and occasional burnout.
background:
  cultural: Tarsha is a Black American whose family has deep roots in the African‑American communities of Virginia. Growing up in Fauquier County, she experienced the blend of Southern traditions and the
    rich legacy of the civil‑rights movement, which fostered a strong sense of cultural pride and resilience. Her upbringing emphasized community gatherings, church fellowship, and storytelling, shaping
    her appreciation for communal celebration and the power of shared narratives. This cultural foundation informs her professional ethos—she strives to embed authentic African‑American cultural elements
    into her events, champions representation, and serves as a bridge between heritage and contemporary expression.
attributes:
  skills: '["Event logistics management", "Budget development and financial oversight", "Vendor negotiation and relationship building", "Creative concept and thematic design", "Culturally inclusive programming",
    "Risk assessment and contingency planning", "Client liaison and stakeholder communication", "Technology integration (virtual/hybrid platforms)", "Team leadership and mentorship", "Data‑driven ROI analysis"]'
  hobbies: '["Visiting art exhibitions and museums (especially African American art)", "Reading biographies and literature on social justice", "Cooking and experimenting with Southern and Caribbean cuisines",
    "Yoga and mindfulness meditation", "Gardening (her backyard vegetable garden)", "Attending live jazz and soul concerts", "Creative writing and journaling", "Traveling to historic Black heritage sites",
    "Volunteering for local cultural festivals", "Exploring event technology and virtual reality platforms"]'
  career_goals: Tarsha aims to attain the Certified Meeting Professional (CMP) designation within the next year and leverage it to step into a senior director role overseeing regional event portfolios.
    Long‑term, she plans to launch her own boutique event agency that specializes in culturally immersive experiences for corporate and nonprofit clients, highlighting African‑American heritage and contemporary
    artistic expression. She aspires to become a thought leader in the industry by speaking at national conferences on inclusive event design and stress‑resilient planning, and to mentor emerging Black
    professionals in the event planning field.
