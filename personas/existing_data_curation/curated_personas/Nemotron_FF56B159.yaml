  career_goals: Dominic aims to rise to detective rank within the Organized Crime Unit, focusing on gang and vice investigations. He hopes to spearhead a community‑arts outreach program that uses murals,
    music events, and workshops to strengthen police‑community trust. Within the next five years he plans to earn a promotion to Sergeant, where he will mentor new officers and champion culturally aware
    policing. He is also pursuing specialized training in forensic psychology and crisis intervention to better support vulnerable populations. Ultimately, he wants to blend his competitive drive with innovative,
    art‑based public‑service initiatives.
