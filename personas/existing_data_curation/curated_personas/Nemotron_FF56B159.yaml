personas:
  professional: Dominic Reliford, a 29‑year‑old police officer in Las Vegas, blends solid law‑enforcement fundamentals with an improvisational flair, using crisis de‑escalation, investigative interviewing,
    and cultural competency to build rapport in the field, while their spontaneous nature often leads to missed report deadlines but fuels quick, actionable decision‑making.
  sports: Dominic Reliford energizes their fitness routine with pick‑up basketball at the local community center, regular MMA sparring at a downtown gym, and weekend hikes in Red Rock Canyon, while cheering
    on the Vegas Golden Knights and supporting the Las Vegas Aces, even joining a recreational baseball league during spring.
  arts: Dominic Reliford curates a personal collection of jazz vinyl on Miles Davis, hip‑hop legends like A Tribe Called Quest, and street‑art prints by Banksy, spends evenings at live improv shows inspired
    by The Second City, and frequently photographs neon‑lit murals reminiscent of Jean‑Michel Basquiat, letting those artistic touchstones shape their community‑outreach vision.
  travel: Dominic Reliford prefers spontaneous road trips over meticulously planned tours, having driven the Pacific Coast Highway to San Francisco, trekked the Grand Canyon rim, and day‑tripping to Sedona
    for desert photography, while they dream of a future art‑focused immersion in Berlin’s gallery scene.
  culinary: Dominic Reliford’s palate oscillates between spicy Thai curry with lemongrass and coconut milk and classic American BBQ ribs glazed with a bourbon‑infused sauce, yet their cooking skill stays
    at “enthusiastic amateur,” often ordering takeout after a long shift and occasionally splurging on a steak‑house tasting menu featuring wagyu ribeye.
  core: Dominic Reliford channels a detective’s investigative drive and an artist’s curiosity into a high‑energy lifestyle, balancing competitive ambition with a habit of last‑minute planning, occasional
    anxiety‑induced overthinking, and a relentless love for vinyl and street‑art, which they nurture through nightly record sessions.
background:
  cultural: Dominic grew up in West Las Vegas, a culturally diverse neighborhood with a strong African‑American presence. His family’s Sunday church gatherings, gospel music, and Southern‑style cooking
    instilled a deep sense of community and storytelling. He has been shaped by the city’s blend of Black, Hispanic, and Asian cultures, which fuels his appreciation for music, art, and rhythm. As a Black
    police officer, he navigates the complexities of racial dynamics, using his lived experience to bridge gaps between law enforcement and minority communities. He remains connected to his heritage through
    community festivals, mentorship of younger Black youths, and a commitment to cultural competency within his department.
