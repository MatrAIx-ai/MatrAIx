    ''Community storytelling and memoir writing'']'
  hobbies: '[''Gardening (especially tomatoes, heirloom beans, and native wildflowers)'', ''Reading historical novels and memoirs'', ''Quilting and crocheting'', ''Birdwatching at the local nature preserve'',
    ''Volunteer work at the senior center'', ''Church choir singing'', ''Genealogy research and family history documentation'', ''Crossword puzzles'', ''Attending community fairs and farmers markets'']'
  career_goals: Although retired, Parnia remains motivated to leave a lasting legacy for her family and community. She aims to compile her beloved family recipes and gardening tips into a small printed
    book that can be shared with her grandchildren. She also wishes to mentor younger volunteers at the senior center, passing on her event‑planning know‑how and first‑aid basics. Embracing her curiosity,
    she plans to learn to use a tablet and video‑calling platforms to stay connected with distant relatives, and she hopes to document the history of Lincoln, Illinois, through a series of oral‑history
    recordings that could be archived at the local library.
