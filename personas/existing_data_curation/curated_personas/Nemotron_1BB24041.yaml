personas:
  professional: Parnia Compton, a retired community volunteer and senior-center coordinator, leverages decades of home‑management, quilting, and event‑planning expertise while balancing curiosity for new
    gardening methods with a practical, flexible approach to organizing church fundraisers and mentoring younger volunteers, and they often bring a calm, adaptable energy to every project.
  sports: Parnia Compton stays active by joining the Lincoln Senior Strollers walking club for morning walks, playing gentle yoga at the senior center, cheering on the Chicago Cubs and Chicago Bears during
    the baseball and football seasons, and they occasionally participate in the Logan County Bowls league in the winter.
  arts: Parnia Compton expresses her artistic side through quilting and singing in the church choir, often listening to Mahalia Jackson’s gospel hymns, Dolly Parton’s country ballads, and Joan Baez’s folk
    melodies, while they admire Grant Wood’s regionalist paintings and attend occasional community theater productions of classic plays by Arthur Miller.
  travel: Parnia Compton prefers relaxed road trips by car, having explored the historic streets of Washington, D.C., the scenic landscapes of the Grand Canyon, and the lively markets of Chicago, while
    they dream of a pilgrimage to England’s countryside to visit the Shakespeare Birthplace Trust and a gentle cruise along the Mississippi River with family.
  culinary: Parnia Compton excels at cooking hearty Midwestern fare, regularly preparing chicken pot pie with flaky crust, cornbread infused with jalapeño, and tomato‑basil soup made from heirloom tomatoes
    and fresh basil, while they sprinkle wildflower honey over apple crisp and savor the comfort of beef stew seasoned with rosemary and thyme.
  core: Parnia Compton blends a lifelong love of community service with a curious green thumb, a habit of misplacing her glasses on the garden bench, and a relaxed, flexible approach that lets them savor
    each season’s bounty while they mentor the next generation.
background:
  cultural: Parnia grew up as a white Midwestern American in the small town of Lincoln, Illinois, during the post‑World War II era. Her upbringing was shaped by Protestant (United Methodist) values, a strong
    emphasis on family loyalty, self‑reliance, and community service. The region’s agricultural heritage and close‑knit social networks fostered her practical sensibilities and curiosity about the land,
    while the cultural norms of modesty, hospitality, and seasonal celebrations such as county fairs, Thanksgiving potlucks, and church gatherings have remained central to her identity. Her lifelong residence
    in Logan County has given her a deep appreciation for local history, small‑town resilience, and the quiet rhythms of rural life.
attributes:
