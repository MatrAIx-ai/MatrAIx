  career_goals: In the short term, Hossein aims to obtain advanced certifications in fleet safety and logistics, complete an associate’s degree in supply chain management, and take on additional sales responsibilities
    to improve his performance metrics. Over the next five years, he aspires to transition into a supervisory role such as fleet manager or logistics coordinator, where he can apply his field experience
    to improve operational efficiency and mentor new drivers. Ultimately, he hopes to launch his own small independent trucking operation that combines reliable transportation services with a niche sales
    component, allowing him to achieve financial stability and greater autonomy while remaining rooted in the Old Orchard Beach community.
