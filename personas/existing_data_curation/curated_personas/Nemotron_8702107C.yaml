  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Vintage car restoration'', ''Podcast listening'', ''Community events'', ''Hiking'', ''Reading about technology'']'
  career_goals: Daryl aims to transition from a frontline driver to a supervisory role within the next five years, targeting positions such as fleet coordinator or regional logistics manager. He plans to
    leverage his associate degree and hands‑on experience to complete a bachelor’s program in supply chain management, which will open doors to strategic planning and operations oversight. Ultimately, he
    dreams of owning a small fleet of eco‑friendly delivery trucks, allowing him to combine his passion for driving with entrepreneurial ambitions while achieving a healthier work‑life balance for his family.
