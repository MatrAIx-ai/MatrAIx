persona_description: A software engineer who specializes in the design and implementation of modular systems, particularly in the aerospace and defense industries. They have a keen eye for identifying and
  understanding the weak and strong links in the modules of a system, and are skilled at applying this knowledge to engineer useful outcomes. They are adept at designing under constraints, and are experienced
  in using structured systems-level thinking processes to ask the right questions in a logical way. They are familiar with the Three Essential Properties of the Engineering Mind-Set, including the ability
  to see structure where there's nothing apparent and adeptness at designing under constraints.
