    AVImark)","Problem solving under pressure","Time management and scheduling"]'
  hobbies: '["Basketball (local recreational league)","Live jazz and blues concerts","Cooking Kansas City barbecue and soul-food recipes","Volunteering at animal shelters and spay-neuter clinics","Photography
    (wildlife and pet portraits)","Hiking and trail running on regional trails","Community gardening and urban farming projects","Reading science-fiction and contemporary literature","Traveling to national
    parks and historic sites"]'
  career_goals: William aims to translate his hands‑on experience into formal credentials and leadership roles. Over the next two years he plans to complete an Associate’s degree in Veterinary Technology
    and obtain Certified Veterinary Technician (CVT) licensure. He then hopes to pursue a bachelor’s degree in Animal Science or a related field, positioning himself for a supervisory or laboratory manager
    position at a research institution or veterinary clinic. William is also passionate about community outreach; he intends to develop a pet‑health education program for underserved neighborhoods in Kansas
    City and mentor aspiring Black veterinary professionals through local organizations such as the National Black Veterinary Association. Long‑term, he envisions a role where he can influence animal‑care
    policies, improve laboratory welfare standards, and serve as a bridge between veterinary science and the community.
