persona_description: A historian who is interested in the First World War and its impact on Scotland. They are particularly fascinated by the role of Scotland in the war and the various buildings and monuments
  that were built to commemorate the conflict. They are also interested in the personal stories behind the monuments and the efforts made by communities to protect their country from enemy attack. They
  appreciate the tangible remains of the war that still exist in Scotland's historic environment and want to learn more about how every community played its part during World War One.
