  hobbies: '[''Reading adventure chapter books'', ''Building LEGO sets'', ''Gardening (weeding and watering)'', ''Caring for the family dog'', ''Baking cookies with mother'', ''Participating in 4-H garden
    projects'', ''Playing board games with friends'', ''Attending church youth group'']'
  career_goals: She aspires to a career that offers stability, clear structure, and the chance to help others in a practical way. She dreams of becoming a veterinarian so she can combine her love for animals
    with a methodical, science-based profession, and she also imagines working as a teacher where her organizational skills can support young learners. She harbors the ambition to continue her involvement
    with 4-H and eventually mentor younger members.
