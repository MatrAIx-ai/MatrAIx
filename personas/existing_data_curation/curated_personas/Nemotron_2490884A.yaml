personas:
  professional: Shelby Bryan is a budding junior horticulturist who spends weekends planning miniature vegetable gardens for her 4-H projects, applying meticulous organization and a practical mindset to
    track germination schedules, and they proudly present weekly progress reports to the club.
  sports: Shelby Bryan cheers for the local Chicago Cubs, plays on a community soccer league in the spring, and spends Saturday mornings watering the garden as a low-key fitness routine, balancing structured
    play with occasional spontaneous games of tag with friends.
  arts: Shelby Bryan delights in listening to Taylor Swift's upbeat pop hits while building LEGO sets, enjoys re-reading the Nancy Drew mystery series, and spends Friday evenings watching Disney's Moana
    and The Lion King, drawing inspiration from the vibrant animation for their own creations.
  travel: Shelby Bryan prefers well-planned family trips that blend learning and fun, recalling a recent weekend camping adventure at Shenandoah National Park and dreaming of a future visit to the historic
    castles of Scotland after completing a school project on medieval fortifications.
  culinary: Shelby Bryan loves baking chocolate chip cookies with Mom, mastering the perfect melt-in-the-mouth texture, and also enjoys assembling homemade pizza topped with pepperoni, mushrooms, and fresh
    basil, while they relish sipping strawberry-banana smoothies after a garden chore.
  core: Shelby Bryan is a routine-loving, garden-handling, LEGO-building 9-year-old who balances methodical planning with bursts of creative curiosity, yet occasionally forgets to water the tomato seedlings
    in favor of a new board game.
background:
  cultural: She comes from a typical small-town Texas background in Graham, Young County. Her family has deep roots in the region, reflecting a blend of traditional Southern and Midwestern values. Community
    life revolves around the local church, school events, county fairs, and high-school football on Friday nights. The family celebrates holidays with classic American customs and embraces the close-knit,
    neighborly atmosphere of rural Texas. Her upbringing emphasizes respect for elders, responsibility, and a practical, down-to-earth outlook.
attributes:
  skills: '[''Organizing personal and school spaces'', ''Following daily schedules'', ''Reading comprehension (grade-level)'', ''Basic arithmetic'', ''Assembling LEGO models'', ''Baking simple recipes'',
