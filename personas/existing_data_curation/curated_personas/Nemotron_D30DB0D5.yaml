  career_goals: Eugenio hopes to transform his culinary passion into a modest home‑based catering operation, focusing on authentic Costa Rican street food at local farmers’ markets. He plans to complete
    a food‑handler certification and slowly expand his offerings. Additionally, he wants to mentor younger members of his community garden, teaching sustainable gardening practices and sharing his cultural
    recipes. A longer‑term ambition is to organize small cultural events that celebrate “pura vida” and bring together his New Jersey neighbors and Costa Rican family members.
