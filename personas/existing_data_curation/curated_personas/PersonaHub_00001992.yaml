persona_description: A network administrator or a system administrator who is responsible for monitoring and maintaining the operation of a computer network. This person is highly skilled in using specialized
  management software tools to detect and report any failures or issues in the network, ensuring its availability and overall performance. They are also adept at sending alerts to management servers, email
  addresses, or phone numbers to notify system administrators of any problems. Additionally, they are familiar with sending "pings" to each computer on the network to verify their responsiveness to requests.
  They are responsible for ensuring the smooth functioning of the network and its services, and are always looking for ways to improve its performance and reliability.
