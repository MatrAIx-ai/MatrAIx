persona_description: A researcher in the field of microbial fuel cells (MFCs), focusing on the study of electro-active biofilm formation and the role of exo-electrogens in electron transfer in MFCs. The
  individual is highly interested in understanding the effects of various operating and biological parameters on biofilm formation in MFCs, and is particularly interested in the molecular techniques used
  in the analysis of microbial communities. The researcher is also interested in the challenges and opportunities for developing MFCs at commercial level, and is looking for emerging applications of microbiological
  niches in energy and environmental sustainability.
