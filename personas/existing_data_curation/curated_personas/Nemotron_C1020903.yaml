personas:
  professional: Faith Mojica is a seasoned speech-language pathologist with over twenty years of clinical experience, renowned for integrating data-driven assessments, AAC technology, and mindfulness-infused
    therapy while mentoring interns and championing flexible telehealth solutions.
  sports: Faith Mojica supports the Los Angeles Lakers and Los Angeles Dodgers, belongs to the Santa Monica Hiking Club, and maintains fitness through weekly yoga sessions, solo hikes in the Santa Monica
    Mountains, and occasional weekend runs with the club, preferring low-impact activities over organized team sports.
  arts: Faith Mojica enjoys contemporary science-fiction by N.K. Jemisin and the atmospheric music of Bon Iver, regularly attends performances by the Los Angeles Philharmonic featuring Gustavo Dudamel,
    and finds inspiration in the films of Meryl Streep, weaving these artistic experiences into her reflective downtime.
  travel: Faith Mojica favors flexible solo trips that blend nature and culture, having trekked the rugged cliffs of Yosemite, explored the red rocks of Sedona, and sampled street food in Bangkok, while
    dreaming of a future immersion in Iceland's geothermal springs and keeping travel plans informal to accommodate her spontaneous schedule.
  culinary: Faith Mojica's cooking style is a moderate-skill fusion of Mediterranean and Thai flavors, often featuring garden-grown basil, cilantro, and rosemary in dishes like shakshuka, pad thai, and
    homemade sushi rolls, which she prepares for modest gatherings with spouse and close friends.
  core: Faith Mojica is a curiosity-driven, flexible SLP who balances data-rich therapy with spontaneous garden experiments, an occasional forgetful bill-payer, and a quiet love for solo hikes and sci-fi
    worlds.
background:
  cultural: Faith is a white American who grew up in a Midwestern suburb before moving to California for college, where she earned her bachelor's degree in a STEM field. Living in Whittier, a culturally
    diverse part of Los Angeles County, she embraces the region's multicultural tapestry while maintaining her own family traditions, such as celebrating Thanksgiving and participating in her non‑denominational
    church's community events. Her daily interactions with Hispanic, Asian, and other communities have deepened her cultural competency, influencing both her clinical practice and her personal life. She
    values the blend of independence typical of her upbringing with the collaborative spirit she experiences in her diverse neighborhood.
attributes:
  skills: '[''Speech and language assessment'', ''Individualized treatment planning'', ''Voice therapy'', ''Dysphagia management'', ''Augmentative and alternative communication (AAC) implementation'', ''Evidence‑based
    practice and research literacy'', ''Telehealth service delivery'', ''Data collection and outcome measurement'', ''Interdisciplinary collaboration'', ''Mentoring and clinical supervision'', ''Patient
    education and counseling'', ''Cultural competency in diverse populations'']'
  hobbies: '[''Gardening'', ''Reading contemporary sci‑fi novels'', ''Hiking the Santa Monica Mountains'', ''Cooking experimental cuisines'', ''Practicing yoga and meditation'', ''Listening to neuroscience
    podcasts'', ''Volunteering at local literacy programs'', ''Small‑group book club'', ''DIY home décor projects'', ''Birdwatching in local parks'']'
  career_goals: Faith aims to move into a leadership position within her clinic, eventually becoming a senior clinician or director of a community outreach program that delivers speech‑language services
    to underserved families in Los Angeles County. She plans to earn the Certificate of Clinical Competence (CCC‑SLP) and pursue a specialization in neurogenic communication disorders. A key ambition is
    to develop a flexible telehealth hub that offers evening and weekend appointments for adult clients balancing work and therapy. Faith also hopes to present her research on integrating mindfulness techniques
    into dysphagia therapy at national conferences and to author a practical guide for fellow SLPs on adaptable treatment strategies.
