personas:
  professional: Charles Trevino, a 29‑year‑old writer who blends meticulous research with a fluid drafting rhythm, crafts SEO‑savvy narrative nonfiction and literary fiction, leveraging their copyediting
    precision, contract‑negotiation assertiveness, and deep knowledge of Gulf Coast ecology to produce compelling, market‑ready manuscripts.
  sports: Charles Trevino enjoys kayaking along the Calusa River, takes daily beach walks, follows the Tampa Bay Buccaneers and the Tampa Bay Lightning, and participates in a casual beach‑volleyball league
    at Fort Myers during summer evenings.
  arts: Charles Trevino, a fan of classic literature like Ernest Hemingway's "The Old Man and the Sea", attends intimate literary salons with a close circle, and fills their home office with soft strums
    of Nick Drake on acoustic guitar, shaping a quiet, reflective artistic identity.
  travel: Charles Trevino plans trips with a loose itinerary, favoring serene spots such as the Everglades, the historic streets of Savannah, and the coastal town of Key West, while dreaming of a quiet
    weekend in the Scottish Highlands.
  culinary: Charles Trevino, who tends a modest balcony herb garden of basil and thyme, delights in crafting herb‑infused grouper tacos and simple lemon‑garlic shrimp pasta, balancing modest culinary skill
    with a penchant for fresh, coastal flavors.
  core: Charles Trevino, a calm, structured‑yet‑flexible 29‑year‑old writer, weaves Gulf Coast ecology into literary works while juggling occasional disorganization and an affinity for solitary, nature‑infused
    hobbies.
background:
  cultural: Charles grew up in a middle‑class, predominantly Anglo‑American household with a strong appreciation for the humanities. Living in Fort Myers, he has absorbed the laid‑back, coastal culture
    of Southwest Florida, which blends Southern traditions, Caribbean influences, and the heritage of Indigenous peoples such as the Calusa. He values the region’s environmental consciousness, local history,
    and multicultural tapestry while maintaining a personal identity rooted in American literary tradition.
attributes:
  skills: '[''Creative writing'', ''Copyediting'', ''Research and fact-checking'', ''SEO copywriting'', ''Self-publishing (Amazon KDP)'', ''Basic graphic design'', ''Content strategy'', ''Interviewing'',
    ''Contract negotiation'', ''Florida coastal ecology knowledge'']'
  hobbies: '[''Beach walking and nature photography'', ''Journaling'', ''Reading classic literature'', ''Historical nonfiction'', ''Intimate literary salons'', ''Herb gardening'', ''Kayaking'', ''Acoustic
    guitar practice'']'
  career_goals: Charles aims to publish a literary novel set on the Gulf Coast within the next two years, securing a partnership with an independent press that values thoughtful storytelling. He also plans
    to release a series of narrative nonfiction essays about Florida’s environmental and cultural heritage, building a dedicated readership through a personal blog and email newsletter. Long‑term, he aspires
    to become a recognized voice in contemporary American literature, win a regional literary award, and lead intimate writing workshops that blend his practical expertise with his calm, resilient teaching
    style.
