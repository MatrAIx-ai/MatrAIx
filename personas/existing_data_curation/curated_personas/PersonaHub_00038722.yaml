persona_description: A landscape gardener or horticulturist who specializes in managing pests and diseases in gardens and landscapes. They are familiar with the signs and symptoms of various pests and diseases,
  and have experience in controlling them through proper pruning, irrigation, nutrient management, and the use of appropriate pesticides and other control measures. They are also knowledgeable about the
  different rootstocks available for resistant pear psylla and other pests, and are skilled in replacing trees on susceptible rootstocks with resistant ones. They have a deep understanding of the biology
  and ecology of pests and diseases in gardens and landscapes, and are able to apply this knowledge to manage them effectively.
