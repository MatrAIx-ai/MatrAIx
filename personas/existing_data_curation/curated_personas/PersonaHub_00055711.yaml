persona_description: A theoretical physicist with expertise in particle physics and cosmology, particularly in the field of dark matter. This person is interested in the relic density of neutralinos and
  the detection of dark matter using direct and indirect detection techniques. They have a deep understanding of statistical thermodynamics and the Boltzmann equation, as well as the Standard Model and
  supersymmetry. They are knowledgeable about particle models of dark matter and have a keen interest in the role of dark matter in the formation of structure in the Universe. This person is highly skilled
  in using particle accelerators to produce and detect dark matter particles, and is also familiar with the methods and progress of various detection schemes and experiments.
