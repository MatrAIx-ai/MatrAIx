persona_description: A prominent African American activist and UGRR operator who played a crucial role in the Underground Railroad and was involved in the rescue of freedom seekers in Boston, Massachusetts.
  His documentation and involvement in the Boston Vigilance Committee and the prevention of the returns of freedom seekers under the 1850 Fugitive Slave Act make him a significant figure in the history
  of the Underground Railroad. His property in DC, where a plaque was recently placed, is a site of interest for those interested in the history of the Underground Railroad and the life of an African American
  activist during the antebellum period.
