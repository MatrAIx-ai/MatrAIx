personas:
  professional: Vangie Keyser, a seasoned community volunteer and museum docent in their early 60s, leverages meticulous organizational skills, art historical knowledge, and a compassionate yet assertive
    demeanor to coordinate intimate gallery openings, manage a senior art exhibition, and mentor junior volunteers, all while channeling their curiosity into digital storytelling and demonstrating that
    they thrive in quiet, purpose‑driven environments.
  sports: Vangie Keyser, an avid walker who joins the Peoria Senior Center’s weekly Tai Chi class and follows the Peoria Chiefs baseball team, treats garden chores as low‑impact cardio while diligently
    scheduling fitness routines in a color‑coded planner, though they occasionally skip workouts when anxiety spikes.
  arts: Vangie Keyser, an enthusiastic watercolorist and quilt maker, finds inspiration in the works of Monet, O'Keeffe, and local Midwestern painters, regularly attends intimate gallery openings in Peoria,
    and volunteers as a docent at the Museum of Art, where they share a deep appreciation for art history with visitors.
  travel: Vangie Keyser, whose travel style blends careful planning with a yearning for cultural immersion, enjoys weekend trips to the Art Institute of Chicago, a nostalgic pilgrimage to Santa Fe’s Pueblo
    markets to trace ancestral art influences, and dreams of a guided genealogy tour through England’s Cotswolds, all while they budget modestly for accommodations and train travel.
  culinary: Vangie Keyser, a confident home cook who favors seasonal garden harvests, often prepares ratatouille with heirloom tomatoes, sautéed kale, and fresh basil, bakes occasional sourdough loaves,
    and delights in plating dishes that echo the color palettes of their watercolor landscapes, though they sometimes over‑spice in an attempt to experiment.
  core: Vangie Keyser, a highly organized yet emotionally sensitive senior, orchestrates community art events with precision, nurtures a flourishing garden, and channels their anxiety into creative pursuits,
    all while they occasionally indulge in impulsive art‑book purchases that clash with their disciplined budget.
background:
  cultural: Vangie grew up in the rural Midwest, raised in a white, German‑Polish farming family in Henry County, Illinois. The community emphasized modesty, self‑reliance, church involvement, and close‑knit
    family ties. Local traditions such as county fairs, harvest festivals, and craft circles have shaped her values, while her curiosity keeps her open to ideas beyond the region.
