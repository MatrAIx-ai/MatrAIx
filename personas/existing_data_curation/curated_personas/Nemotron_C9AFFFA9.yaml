  hobbies: '["Reading art history", "Sketching watercolors", "Gardening", "Quilting", "Genealogy research", "Attending gallery openings", "Listening to classical music", "Book club participation"]'
  career_goals: Vangie aims to channel her disciplined nature into creating a lasting legacy for her community. She plans to organize an annual small-scale art exhibition featuring local senior artists,
    compile a family and regional history scrapbook to publish as a community resource, and complete an online certificate in digital storytelling. She also aspires to maintain her mental well-being through
    regular therapy and mindfulness practice, and to mentor younger volunteers at the senior center.
