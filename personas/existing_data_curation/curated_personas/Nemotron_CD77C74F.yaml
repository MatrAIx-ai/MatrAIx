  career_goals: Charles aims to advance into a supervisory role within the printing plant, eventually becoming a shift manager or plant supervisor where he can implement lean manufacturing and workflow
    efficiency initiatives. He plans to earn certifications such as Certified Press Operator and OSHA safety credentials to bolster his expertise. In the longer term, he envisions opening a small boutique
    print shop that serves local businesses and community events, providing a stable income for his family while maintaining the high standards he values.
