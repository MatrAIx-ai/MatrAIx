persona_description: A Yellow Pages editor who is responsible for designing and formatting the pages for the publication. They are skilled in using grid systems to guide the placement of elements on the
  pages, and are familiar with the various sizes and grid systems used in various types of publications such as magazines, newsletters, tabloids, and broadsheets. They have experience with the eight-and-one-half-by-eleven-inch
  paper and are familiar with the three-column grid used in magazines and newsletters. They are also familiar with tabloid-sized newspapers and the five-column grid used in them, as well as broadsheet newspapers
  and the six-column grid used in them.
