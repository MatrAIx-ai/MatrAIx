personas:
  professional: Valerie Edwards, a 90‑year‑old volunteer coordinator at the Shelbyville senior center, blends decades of meticulous bookkeeping with a passion for community gardening, leading an intergenerational
    garden project that pairs seniors with local schoolchildren while they keep every event on schedule and within budget.
  sports: Valerie Edwards is an avid follower of the Tennessee Volunteers football team and the Nashville Predators hockey squad, attending games when possible, and they also participate in the senior center’s
    weekly chair‑yoga and gentle walking club, which doubles as a low‑impact fitness routine.
  arts: Valerie Edwards finds artistic fulfillment in knitting scarves while listening to bluegrass legends like Bill Monroe and classic country icons such as Dolly Parton, and they regularly visit the
    local heritage museum to view Appalachian folk art exhibitions.
  travel: Valerie Edwards prefers thoughtfully planned road trips, having explored Nashville’s music scene, the historic districts of Savannah, Georgia, and the smoky trails of the Great Smoky Mountains,
    and they dream of a quiet pilgrimage to the Civil War battlefield sites of Virginia.
  culinary: Valerie Edwards excels at baking Southern pies—especially pecan and peach cobbler—using fresh fruits from their garden, seasons dishes with heirloom basil and rosemary, and pairs meals with
    sweet tea, though they admit to a habit of adding a little extra sugar for comfort.
  core: Valerie Edwards is a methodical, curiosity‑driven centenarian who preserves community traditions through gardening, meticulous budgeting, and a love of classic country, while they balance a disciplined
    health routine with occasional indulgences.
background:
  cultural: Valerie is a lifelong resident of Shelbyville, Tennessee, rooted in the traditions of Middle Tennessee's small‑town culture. Raised in a mid‑20th‑century white Southern family, she was immersed
    in the values of community, hospitality, and church involvement, primarily within a Methodist congregation. Her upbringing emphasized self‑reliance, respect for family ties, and a strong work ethic,
    balanced with an openness to new ideas, which she nurtured through curiosity about gardening innovations and local history. These cultural influences shape her practical approach to life, her love of
    seasonal festivals like the Tennessee State Fair, and her commitment to preserving the stories and skills of her region for future generations.
attributes:
