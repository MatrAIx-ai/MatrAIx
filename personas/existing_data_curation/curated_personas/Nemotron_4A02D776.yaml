personas:
  professional: Emily Eaton is a 28‑year‑old financial planner in Brooklyn who blends meticulous cash‑flow modeling with empathetic client conversations, leveraging eMoney Advisor and advanced Excel to
    craft retirement and ESG‑focused strategies, and they maintain a flexible, client‑centered schedule despite occasional disorganization.
  sports: Emily Eaton cycles the Brooklyn waterfront on weekends, participates in the Brooklyn Bridge Running Club’s early‑morning 5K runs, supports the Brooklyn Nets and New York Yankees, and they occasionally
    join a local yoga studio class for cross‑training, balancing solo rides with community fitness events.
  arts: Emily Eaton captures Brooklyn’s brownstone façades with a Nikon D3500, spends evenings reading contemporary fiction by Sally Rooney and Kazuo Ishiguro, curates monthly board‑game meetups featuring
    titles like Terraforming Mars, and they find inspiration in the street art of Shepard Fairey.
  travel: Emily Eaton prefers low‑key, purpose‑driven trips, often planning weekend getaways to upstate New York’s Hudson Valley for hiking, while dreaming of a sustainable‑tourism tour of Costa Rica’s
    rainforests, and they maintain a travel journal that doubles as a budgeting ledger.
  culinary: Emily Eaton delights in crafting plant‑based meals such as chickpea‑spinach curry, cauliflower tacos with avocado‑lime crema, and lentil Bolognese, experimenting with turmeric, nutritional yeast,
    and smoked paprika while sourcing fresh herbs from their balcony garden, and they treat themselves to occasional sushi rolls from a nearby Japanese izakaya.
  core: Emily Eaton is a detail‑oriented yet delightfully spontaneous financial planner who balances structured budgeting with impromptu bike rides, a love for plant‑based cooking, and they have a habit
    of forgetting to water their balcony herbs on busy weeks.
background:
  cultural: Emily identifies as a White American with European ancestry, raised in a middle‑class family in the Northeastern United States. Her upbringing emphasized education, financial responsibility,
    and community involvement. While she celebrates traditional American holidays such as Thanksgiving and Fourth of July, living in Brooklyn has exposed her to a vibrant, multicultural environment that
    shaped her progressive values and appreciation for diversity. This blend of mainstream American culture and the eclectic urban fabric of Brooklyn informs her inclusive outlook and commitment to serving
    a varied client base.
