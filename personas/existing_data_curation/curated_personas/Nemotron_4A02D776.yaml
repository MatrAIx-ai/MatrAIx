  career_goals: Emily aims to obtain her Certified Financial Planner (CFP) designation within the next two years and to deepen her expertise in sustainable and ESG‑focused investing. She envisions building
    a boutique advisory practice in Brooklyn that serves young professionals seeking socially responsible investment strategies while maintaining a flexible, client‑centered schedule. Over the next five
    years, she hopes to become a senior advisor or team lead within her firm, recognized for high client retention and satisfaction. Emily also plans to expand her community impact by launching quarterly
    financial‑literacy seminars at local community centers and publishing a guidebook on personal finance for millennials.
