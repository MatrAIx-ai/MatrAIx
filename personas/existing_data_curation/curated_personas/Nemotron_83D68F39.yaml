personas:
  professional: Jazzie Massey, an emerging cultural liaison and arts coordinator, channeling a curiosity for visual storytelling and a steadiness under pressure, combines digital research skills, diplomatic
    assertiveness, and meticulous project management to design community exhibitions, youth art workshops, and an online showcase that honors local storytelling traditions while delivering reliable results.
  sports: Jazzie Massey, a devoted fan of the New Orleans Saints and Memphis Grizzlies, plays weekly pickup basketball at the local recreation center, jogs the historic Natchez Trace trail each spring,
    and attends Sunday football games while supplementing the routine with a weekly yoga class to maintain flexibility during the off‑season.
  arts: Jazzie Massey, a painter and sketch artist who regularly visits the Mississippi Arts and Entertainment Experience to study Romare Bearden and Jacob Lawrence, fills weekends with live blues at B.B.
    King's Blues Club and gospel at the local St. James Church, and hosts a podcast series that highlights emerging Southern soul‑music talent like Mavis Staples.
  travel: Jazzie Massey, a road‑trip lover who mixes tight planning with spontaneous detours, has explored the historic streets of New Orleans, savored the coastal charms of Charleston, and dreams of a
    heritage pilgrimage to Ghana’s Cape Coast, all while budgeting trips through a modest travel fund and balancing occasional family weekend duties.
  culinary: Jazzie Massey, a self‑taught soul‑food enthusiast, often perfects collard greens seasoned with smoked paprika, sweet‑potato pie spiced with nutmeg, and gumbo loaded with okra and catfish, yet
    has a habit of over‑seasoning with hot sauce, turning each dinner into a flavorful, if sometimes too fiery, family gathering.
  core: Jazzie Massey blends a curiosity for art history with an organized, yet flexible mindset, curates community events while secretly hoarding vintage vinyl records, and occasionally procrastinates
    on paperwork in favor of late‑night sketching marathons.
background:
  cultural: Jazzie’s cultural identity is rooted in the African American heritage of the Deep South. Growing up in Monticello, she was surrounded by a close‑knit Black church community, family storytelling
    traditions, and the rich musical legacy of blues and gospel. Her grandparents shared recollections of the civil‑rights era, instilling a strong sense of resilience and communal responsibility. These
    influences shape her love of oral history, communal cooking, and the preservation of Black Southern art, guiding both her personal interests and her aspirations to uplift her community.
attributes:
  skills: '[''Community event planning'', ''Basic graphic design (Canva, Photoshop)'', ''Digital storytelling and blog writing'', ''Research and fact‑checking'', ''Project coordination'', ''Art curation
    for local exhibitions'', ''Facilitation of workshop discussions'', ''Creative problem solving'', ''Basic bookkeeping for small initiatives'', ''Mentoring youth in arts programs'']'
  hobbies: '[''Painting and sketching'', ''Visiting regional art galleries and museums'', ''Reading African American literature and art history'', ''Gardening and growing heirloom vegetables'', ''Cooking
    experimental soul‑food dishes'', ''Listening to blues, jazz, and gospel music'', ''Podcasting about creative entrepreneurship'', ''Volunteering with church youth art workshops'', ''Participating in
    a local book club focused on unconventional ideas'']'
  career_goals: Jazzie aims to transition her informal community work into a formal role as a cultural liaison or arts coordinator for the Copiah County library or a local community center. She plans to
    complete a certificate in nonprofit management and to develop a modest online platform that showcases Black Southern art and her own curated pieces. Long‑term, she hopes to launch a pop‑up gallery that
    provides mentorship and micro‑grants for emerging Black artists in rural Mississippi, while also completing a bachelor's degree in African American Studies.
