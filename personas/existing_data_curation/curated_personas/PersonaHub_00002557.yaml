persona_description: A historian who specializes in the study of African history, particularly the impact of Soviet policies on the African diaspora. His research interests include, but are not limited
  to, the experiences of African-Soviets in the Soviet Union, the impact of Perestroika on African societies, and the legacy of racism against African-Soviets. He is a vocal advocate for the recognition
  and celebration of African history and culture in Russia.
