  hobbies: '[''Reading adventure novels, animal biographies, and Mexican folktales'', ''Drawing and watercolor painting of desert scenes'', ''Exploring the Sonoran desert and nature walks'', ''Cooking traditional
    Mexican dishes with family'', ''Playing ukulele and learning Spanish guitar chords'', ''Participating in school robotics club projects'', ''Volunteering at a local animal shelter'']'
  career_goals: Ivett dreams of becoming a professional who can help children and families in her community. She aspires to be a bilingual elementary school teacher or a pediatric nurse, roles where she
    can combine her compassion with practical skills. In the short term, she plans to maintain strong grades, volunteer at the local community center, and join a youth leadership program. Long‑term, she
    hopes to earn a degree in education or nursing and work in clinics or schools that serve Hispanic families, promoting health, learning, and cultural pride.
