personas:
  professional: Ivett Fernandez is a budding robotics enthusiast who blends practical problem‑solving with imaginative curiosity, dedicating after‑school hours to building circuit projects while quietly
    dreaming of designing assistive devices for rescued animals, and they balance an organized work routine with enough flexibility to experiment.
  sports: Ivett Fernandez enjoys weekend hikes through the Sonoran desert and follows the Arizona Wildcats basketball team, while playing on the Desert Foxes youth soccer club where they practice dribbling
    after school and occasionally cheer for the Phoenix Suns during the NBA season.
  arts: Ivett Fernandez spends afternoons sketching cactus silhouettes inspired by Georgia O'Keeffe, strums simple chords on a ukulele after learning songs by Jack Johnson, and they immerse themselves in
    adventure novels by Rick Riordan and animal biographies by David Attenborough, weaving these influences into a personal artistic voice.
  travel: Ivett Fernandez prefers family‑organized trips that blend relaxed exploration of familiar desert sites like Saguaro National Park with ambitious dreams of visiting the Grand Canyon and Machu Picchu,
    and they balance a careful allowance budget with a love for both adventure and cultural discovery.
  culinary: Ivett Fernandez assists their grandmother in rolling tamales, whisking mole, and chopping fresh salsa, while also experimenting at home with cactus (nopales) tacos and guacamole, proudly claiming
    a budding chef’s flair despite occasional over‑salting that they humorously chalk up to enthusiasm.
  core: Ivett Fernandez is a quietly curious and deeply compassionate twelve‑year‑old who balances meticulous organization with spontaneous desert explorations, a love for tinkering with robots, and a habit
    of collecting every oddly shaped rock they find.
background:
  cultural: Ivett comes from a Mexican‑American family rooted in the traditions of Jalisco. Spanish is spoken at home, and she celebrates cultural holidays such as Día de los Muertos and upcoming quinceañera
    preparations with the broader family. Food is a central part of her heritage; she helps make tamales, mole, and fresh salsa, learning the stories behind each dish. Music like mariachi and ranchera fills
    family gatherings, and she enjoys the rhythmic beats of traditional dances. Living in Tucson, she blends these Mexican customs with the Southwest desert lifestyle, participating in community festivals
    that highlight Hispanic art, dance, and cuisine. This bicultural environment informs her values of family closeness, respect for elders, community service, and a strong sense of cultural pride.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic computer literacy'', ''Organizational skills'', ''Creative writing'', ''Artistic drawing and watercolor'', ''Culinary assistance with Mexican
