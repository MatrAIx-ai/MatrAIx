  hobbies: '[''Model Railway Building'',''Woodworking'',''Puzzle Solving'',''Reading Science History'',''Raised‑Bed Gardening'',''Lake Fishing'',''Book Club'',''Classic Car Restoration'',''Volunteer Tutoring'']'
  career_goals: As he approaches retirement, Cruz aims to transition into a school‑wide STEM coordinator role, where he can shape interdisciplinary project‑based learning across grades. He aspires to mentor
    new teachers, develop a community makerspace linked to the high school, and author a practical guide on integrating hands‑on engineering projects into secondary curricula. Additionally, he hopes to
    secure a small grant to modernize the school's physics lab before stepping back from full‑time teaching, allowing him to devote more time to personal hobbies while maintaining a supportive presence
    in the school community.
