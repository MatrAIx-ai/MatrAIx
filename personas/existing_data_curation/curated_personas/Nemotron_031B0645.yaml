personas:
  professional: Cruz Lee, a veteran secondary‑school STEM educator with a specialty in physics and engineering, leverages meticulous curriculum design, data‑driven instruction, and hands‑on lab safety to
    mentor teachers and build community makerspaces, all while applying their woodworking and model‑building craftsmanship to create engaging classroom resources.
  sports: Cruz Lee, an avid supporter of the Detroit Tigers, Detroit Lions, and the Michigan State Spartans, spends weekends fishing on Lake Orion, participates in a local senior walking club that meets
    for brisk walks through the seasonal foliage, and they occasionally attend community high‑school track meets to cheer on student athletes.
  arts: Cruz Lee, a dedicated member of a small book‑club that dissects classics like Hemingway’s The Old Man and the Sea and enjoys evenings listening to Bob Dylan and Beethoven on a vintage record player,
    regularly volunteers at the local community theater as a set builder, allowing them to blend their craftsmanship with artistic appreciation.
  travel: Cruz Lee, who prefers meticulously planned road trips in their restored 1960s sedan, has explored Mackinac Island’s historic streets, taken a weekend drive to Canada’s Ontario lakes, and now dreams
    of a leisurely pilgrimage to Yellowstone National Park’s geysers, balancing travel costs with a modest vacation savings account.
  culinary: Cruz Lee, an enthusiastic home cook who cultivates heirloom tomatoes, carrots, and rosemary in a raised‑bed garden, enjoys preparing a signature roasted root‑vegetable medley with garlic and
    balsamic glaze, bakes apple crumble pies for Thanksgiving gatherings, and occasionally experiments with smoked trout caught from the lake, all while maintaining a solid 4‑star rating on a neighborhood
    recipe sharing site.
  core: Cruz Lee embodies a meticulous, community‑oriented engineer‑teacher who blends structural precision with creative hands‑on projects, yet wrestles with lingering worries that fuel a relentless quest
    for order and modest perfection.
background:
  cultural: Cruz grew up in a middle‑class family in the Midwestern United States, where values of punctuality, self‑reliance, and community cooperation are emphasized. His ethnic heritage traces back to
    Northern European ancestors, reflected in family traditions such as celebrating Thanksgiving with a focus on gratitude and modest holiday gatherings. He internalized a strong work ethic and a respect
    for structured education, which guided his decision to pursue a STEM degree and a career in teaching. Living in Lake Orion, Michigan, he participates in local civic activities, supports the neighborhood
    association, and values the close‑knit, small‑group social environment typical of suburban Midwestern communities.
attributes:
