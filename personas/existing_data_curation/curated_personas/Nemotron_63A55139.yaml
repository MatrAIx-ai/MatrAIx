  skills: '[''CNC machining'', ''MIG/TIG welding'', ''Blueprint reading'', ''Quality inspection'', ''Lean Six Sigma basics'', ''Team leadership'', ''Safety compliance'', ''Machine maintenance'', ''Troubleshooting'',
