  hobbies: '[''Recreational soccer'', ''Bowling league'', ''Youth baseball coaching'', ''Cooking Puerto Rican cuisine'', ''Attending cultural festivals'', ''Weekend barbecues'', ''Fishing'', ''Gym workouts'',
    ''Classic car restoration'']'
  career_goals: Cesar aims to advance to a lead fabricator or supervisory role within the next three to five years, obtain professional certifications such as AWS Certified Welder and Six Sigma Yellow Belt,
    and eventually launch his own small custom metal‑fabrication shop serving local contractors and hobbyists. He is also motivated to mentor junior assemblers, spearhead efficiency initiatives, and contribute
    to a culture of continuous improvement at his current plant.
