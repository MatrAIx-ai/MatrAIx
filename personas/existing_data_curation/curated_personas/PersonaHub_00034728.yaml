persona_description: A religious woman who founded the Congregation of the Religious of Jesus Mary, a congregation that aims to give young ladies a Christian education. The religious have various establishments
  in France, India, Spain, America, and Canada, including boarding schools, academies, and residences for ladies of the literary profession. The religious have a special interest in the study of group theory,
  particularly in subgroups and isomorphisms. They also have a day school for poor Italian children and a supervision of a day school for poor Italian children.
