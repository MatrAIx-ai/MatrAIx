  career_goals: Although currently not in the formal workforce, Karen hopes to transition into a part‑time role that leverages her compassion and organizational abilities, such as a community outreach coordinator
    for a local nonprofit or a home‑based crafting business selling handmade quilts and knitted goods. She also considers completing a bachelor’s degree in social work or early childhood education to expand
    her capacity to help families in her community. Her primary ambition is to maintain a stable, harmonious home while contributing meaningfully to the well‑being of her neighbors.
