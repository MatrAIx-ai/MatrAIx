  career_goals: As he approaches the final decade of his judicial career, Judge Kieu is focused on leaving a lasting impact on the San Diego legal system. He aims to champion a pilot program that uses AI‑assisted
    case screening to reduce backlog while safeguarding procedural fairness. He also seeks to expand his mentorship program, pairing senior judges with emerging attorneys from underrepresented backgrounds.
    A long‑standing ambition is to serve on the California Court of Appeal, where he can apply his commercial and administrative expertise to statewide jurisprudence. Parallel to these goals, he advocates
    for broader access to justice for immigrant communities, planning to launch a community‑law clinic that provides free legal education and pro‑bono services.
