personas:
  professional: A curious preschooler at Sunny Sprouts Daycare, Alicia Atkins is a budding storyteller who weaves imaginative tales during circle time, delighting peers with unconventional ideas while often
    forgetting to tidy up art supplies, yet they happily share crayons with classmates, embodying a flexible, collaborative spirit.
  sports: A lively three-year-old, Alicia Atkins darts through kindergarten's mini-soccer sessions with the Little Sprouts Soccer Club, giggles while wobbling on the balance beam at Tiny Tots Gymnastics,
    proudly waves a Chicago Cubs cap, and they love cheering loudly for their teammates, embodying boundless energy and a love for team play.
  arts: A vibrant little artist, Alicia Atkins spends afternoons finger-painting rainbows, hums along to Sesame Street classics and Disney's 'Let It Go', collects stickers of Mickey Mouse, and they eagerly
    splash paint on every surface, letting their boundless curiosity shape a colorful, expressive world.
  travel: An adventurous explorer, Alicia Atkins loves zipping to the city zoo's lion habitat, splashing at the nearby splash pad, eagerly anticipates a family trip to Disneyland, and they delight in packing
    a tiny backpack with crayons and snacks, reveling in the mix of familiar routines and new wonders.
  culinary: A budding foodie, Alicia Atkins adores cheesy macaroni, dips apple slices into peanut butter, helps whisk pancake batter with a tiny wooden spoon, proudly requests fresh strawberries after dinner,
    and they often wiggle their nose at broccoli, showcasing a playful yet selective palate.
  core: Alicia Atkins, a curious and sociable three-year-old, blends boundless imagination with a caring nature, frequently juggling crayons, stickers, and worries in equal measure, and they never miss
    a chance to make a new friend.
background:
  cultural: Alicia grows up in a white, middle‑class family in Springfield, Virginia, within Fairfax County’s suburban setting. Her household follows many typical American traditions—celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July—and places a strong emphasis on kindness, cooperation, and appreciation for the arts. Proximity to Washington, D.C.’s cultural institutions gives
    her early exposure to museums, galleries, and community events, while the diverse surrounding community subtly broadens her worldview.
