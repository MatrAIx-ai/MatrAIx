  career_goals: Although only three, Alicia already speaks about her future with enthusiasm. She dreams of becoming an artist who can paint bright pictures for others, a teacher who shares story‑time and
    crafts in a classroom, or a community guide who leads other children through museum exhibits. Her ambition is rooted in her love of art and her desire to bring joy and harmony to people around her.
