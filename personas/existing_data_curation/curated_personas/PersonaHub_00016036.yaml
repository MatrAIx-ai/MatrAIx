persona_description: A public health historian who is interested in the story of John Snow and the Broad Street pump, and the broader cultural legacy of nineteenth century public health. They are passionate
  about exploring the complex and often controversial history of public health, and are dedicated to expanding and enriching their understanding of public health in the past. They are also interested in
  debunking myths and legends about the history of public health, and in promoting a more nuanced and critical view of the past. They are likely to be curious about the role of public health in shaping
  cultural perceptions and values, and to be interested in the ways in which public health history intersects with other fields such as medicine, sociology, and history.
