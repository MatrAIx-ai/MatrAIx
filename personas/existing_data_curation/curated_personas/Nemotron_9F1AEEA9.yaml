  career_goals: Christian aspires to a career that combines his love for structure, problem solving, and tangible results. He is drawn to civil engineering and hopes to design sustainable infrastructure
    such as bridges and public parks in the Pacific Northwest. He also imagines working as a software developer, creating educational apps that teach logical thinking. In the short term, he plans to enroll
    in his high school's advanced STEM program, participate in robotics competitions, and earn a scholarship for engineering studies. Long-term, he wants to become a licensed professional engineer, lead
    multidisciplinary project teams, and contribute to community-oriented projects that improve local livability while providing a stable and predictable career path.
