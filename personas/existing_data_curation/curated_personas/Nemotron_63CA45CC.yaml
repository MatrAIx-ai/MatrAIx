  career_goals: Elbony aims to earn a senior fleet supervisor role within the next few years, secure a HazMat endorsement, and mentor younger drivers in her company. She also envisions starting a small
    family‑owned logistics service that supports local businesses in Vance County, providing reliable transport while building a legacy for her children and grandchildren. Additionally, she plans to achieve
    a comfortable retirement by leveraging her experience into consulting and part‑time driver training.
