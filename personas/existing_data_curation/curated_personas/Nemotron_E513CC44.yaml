personas:
  professional: Mikel Johnson is an industrial engineer who applies Lean Six Sigma and OSHA compliance expertise to redesign production workflows, using a methodical, routine‑driven mindset that ensures
    safety protocols are ironclad and project milestones are consistently achieved on schedule.
  sports: Mikel Johnson maintains a disciplined fitness regimen at the Miami Fitness Club, lifting five days a week, joins a Heat‑inspired community basketball league on weekends, spends sunrise Saturdays
    fishing for snook in Biscayne Bay, and avidly supports the Miami Heat and Miami Marlins as their favorite professional sports teams.
  arts: Mikel Johnson unwinds to the smooth vocals of Marvin Gaye and the lyrical flow of A Tribe Called Quest, attends Miami’s Caribbean cultural festivals to enjoy live calypso performances by the Steel
    Patrol Band, and collects vintage R&B vinyl records that often sit untouched on a shelf.
  travel: Mikel Johnson favors meticulously planned getaways, opting for weekend fishing trips to the Florida Keys, annual cultural visits to the Bahamas during Junkanoo, and occasional business‑focused
    tours of German industrial expos in Munich, always balancing adventure with a structured itinerary.
  culinary: Mikel Johnson enjoys cooking healthy twists on soul‑food classics, swapping deep‑fried chicken for oven‑baked almond‑crusted pieces, simmering collard greens with smoked turkey, and creating
    sweet‑potato mash seasoned with cinnamon and nutmeg, showcasing an intermediate culinary skill set that merges tradition with wellness.
  core: Mikel Johnson blends a disciplined engineering mindset with soulful food, weekend fishing, and a secret stash of vintage R&B vinyls they never find time to play, habitually planning every workout
    and budget while occasionally splurging on high‑tech fishing gear.
background:
  cultural: Mikel identifies as African American and was raised in a close‑knit, middle‑class family in South Florida. His cultural upbringing emphasizes community, resilience, and a strong work ethic,
    values instilled by his parents who pursued higher education and professional careers. He participates in local Black heritage events such as the Miami Broward Black Heritage Parade and enjoys music
    traditions ranging from gospel to classic R&B and hip‑hop. While he respects and celebrates the broader multicultural tapestry of Miami—including Caribbean and Latino influences—he maintains a connection
    to African American culinary traditions, often preparing dishes like collard greens and black-eyed peas with a health‑conscious twist. Mikel is proud of his role as a Black professional in engineering,
    actively engaging in networking groups that promote diversity in STEM and serving as a mentor to younger students from similar backgrounds.
attributes:
  skills: '["Process Optimization", "Safety Compliance Management", "Risk Assessment & Mitigation", "Ergonomic Design", "Lean Six Sigma Methodology", "Project Management", "Data Analysis (Python, Excel,
    Minitab)", "Technical Documentation & Training", "Regulatory Knowledge (OSHA, FEMA)", "CAD Modeling (AutoCAD, SolidWorks)"]'
  hobbies: '["Weightlifting & Cardio", "Basketball", "Fishing", "DIY Home Improvement Projects", "Car Maintenance", "Cooking (Healthy Soul Food)", "Reading Non-Fiction (Engineering, Leadership)", "Listening
    to Classic R&B & Hip-Hop", "Mentoring Youth in STEM", "Attending Afro-Caribbean Cultural Festivals"]'
  career_goals: Mikel aims to advance to a senior industrial engineering role within the next three years, followed by obtaining Certified Safety Professional (CSP) and Lean Six Sigma Black Belt credentials.
    His long‑term ambition is to become a Health, Safety, and Environment (HSE) manager or director for a large manufacturing or logistics operation in South Florida, where he can lead comprehensive safety
    programs that achieve measurable reductions in incident rates. He also aspires to mentor emerging Black engineers, contribute to workplace diversity initiatives, and eventually launch his own consulting
    firm focused on safety compliance and process improvement for small‑to‑mid‑size businesses. Throughout his career, he seeks clear, stepwise progression that aligns with his preference for structured
    pathways and practical outcomes.
