  hobbies: '["Gardening (roses, herbs, vegetables)", "Cooking Korean cuisine and sharing recipes", "Bridge and Scrabble at the senior center", "Birdwatching on local nature trails", "Listening to classic
    jazz music", "Reading history and science biographies", "Volunteering for Korean cultural festivals and church events", "Organizing community workshops and talks"]'
  career_goals: Even at 91, Michael’s ambitions focus on legacy and connection. He aims to document his family’s Korean‑American history in a memoir that can be shared with grandchildren, while establishing
    a modest scholarship fund for local students pursuing engineering. He continues to volunteer as a mentor for high‑school robotics teams, hoping to inspire curiosity balanced with practical problem‑solving.
    Maintaining his health and mental sharpness is also a personal goal, driving his participation in regular walks, brain‑stimulating games, and community discussions. Ultimately, he seeks to leave a lasting
    imprint of both his technical knowledge and his cultural heritage on the Oxford community.
