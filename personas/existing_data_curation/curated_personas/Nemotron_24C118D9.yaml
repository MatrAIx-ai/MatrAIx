personas:
  professional: Chong Kwon, a retired mechanical engineer renowned for expertise in thermodynamics, automotive systems, and precision machining, leverages innate curiosity and practical problem-solving
    to mentor young engineers and lead community robotics workshops while habitually turning every technical challenge into a lively, talk-driven brainstorming session.
  sports: Chong Kwon enjoys leisurely morning walks along local nature trails for birdwatching, participates in weekly Tai Chi classes at the senior center, avidly follows the Cleveland Guardians baseball
    team and the Ohio State Buckeyes football team, and occasionally joins fellow seniors at community bar screenings to cheer loudly, while keeping a modest membership at the community garden fitness club.
  arts: Chong Kwon immerses themselves in classic jazz, regularly spinning Miles Davis's 'Kind of Blue' and John Coltrane's 'A Love Supreme,' attends performances at the Oxford Community Theatre, and delights
    in reading biographies of scientists and the poetry of Langston Hughes, all of which fuel their storytelling flair during senior-center workshops.
  travel: Chong Kwon prefers well-planned, low-stress itineraries that combine cultural immersion and nature; having enjoyed trips to Washington, D.C.'s museums, the Great Lakes shoreline, and a family
    vacation to Yellowstone National Park, they now dream of a gentle pilgrimage to Kyoto's historic temples and cherry-blossom festivals, while meticulously budgeting each journey to avoid financial strain.
  culinary: Chong Kwon cooks with a seasoned hand, perfecting kimchi, bibimbap, and japchae by blending traditional gochujang and fermented soybean paste with Midwestern vegetables like fresh corn, sweet
    potatoes, and garden-grown herbs, often pairing meals with homemade soju-infused braised beef, and enjoys sharing these dishes at community potlucks where they swap recipes with fellow seniors.
  core: Chong Kwon is a chatty, garden-loving, retired engineer whose relentless curiosity drives daily experiments in the kitchen and workshop, while a quiet undercurrent of worry keeps them meticulously
    budgeting and double-checking every detail.
background:
  cultural: Michael was born to Korean immigrant parents and raised in a bilingual household that blended Confucian respect for elders with the pragmatic values of the American Midwest. He grew up celebrating
    Korean holidays such as Chuseok and Lunar New Year while also participating in local Michigan traditions like county fairs and community picnics. His upbringing emphasized the importance of education,
    hard work, and family cohesion, shaping his lifelong commitment to mentorship and community service. Although he is deeply rooted in Korean culinary and cultural practices, he has embraced the Midwestern
    lifestyle, integrating local customs, language, and social networks. He remains active in a Korean‑American church and cultural association in Oakland County, serving as a bridge between his heritage
    and his broader Oxford community.
attributes:
  skills: '["Mechanical engineering (thermodynamics, automotive design)", "Technical troubleshooting (mechanical and electrical)", "Mentoring and STEM outreach", "Public speaking and community presentation",
