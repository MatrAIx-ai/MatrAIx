persona_description: A holistic health coach who specializes in Applied Kinesiology, a system that provides feedback on the functional status of the body. They have a deep understanding of the "Triad of
  Health" and can help bring back the balance to the body by using muscle testing to evaluate the lymphatic, nervous, endocrine, meridian, vascular, cranial, stress, and nutritional systems of the body.
  They have experience in treating a wide range of ailments, including depression, muscular aches and pains, allergies, skin disorders, arthritis, back ache, digestive problems, osteoporosis, rheumatism,
  congestion, dyslexia, asthma, accident trauma, and irritable bowel syndrome. They are skilled in finding the best approach to their patients' bodies and have helped many people improve their quality of
  life through holistic techniques that promote healing to more than one area at a time.
