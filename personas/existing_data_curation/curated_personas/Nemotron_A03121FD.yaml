  career_goals: Maria Ana aims to transition into a charge nurse role within the next two years, where she can mentor newer staff while leading a small, supportive unit. She is considering pursuing a Bachelor
    of Science in Nursing to broaden her qualifications and open pathways to a specialty in hospice and palliative care, aligning with her compassionate, one‑on‑one patient interactions. Her long‑term ambition
    includes spearheading a quality‑improvement project to reduce patient falls and improve discharge education, thereby enhancing overall patient outcomes. Balancing her career growth with personal well‑being,
    she seeks to develop stronger time‑management skills and adopt stress‑reduction practices that will allow her to maintain her dedication to patient care without compromising her mental health.
