  career_goals: Mildred’s career aspirations are grounded in practicality and a desire to serve her community. She envisions pursuing a path in the health‑care field, aiming to become a registered nurse
    through a community‑college program that offers a clear, step‑by‑step curriculum. The stability, routine, and direct impact of nursing align with her organized mindset and competitive drive to excel
    academically. She also hopes to earn a soccer scholarship, which would provide financial support and reinforce her disciplined work ethic. In the longer term, Mildred dreams of using her culinary skills
    to open a modest family‑run Salvadoran eatery, offering familiar flavors to the Houston neighborhood while providing employment opportunities for relatives. Throughout her plans, she prioritizes staying
    close to her cultural roots and supporting the immigrant families she grew up with.
