personas:
  professional: Mildred Figueroa is a dedicated high‑school student‑athlete who excels at devising soccer strategies and managing school projects, leveraging their methodical planning, competitive drive,
    and cautious skepticism to stay ahead of both the game and the classroom.
  sports: Mildred Figueroa devotes after‑school hours to her varsity soccer team and the local youth club River Valley SC, while cheering for the national women’s soccer team and closely following the Premier
    League’s Manchester United women’s squad, illustrating a blend of community loyalty and global fandom.
  arts: Mildred Figueroa enjoys sprinting through the worlds of Leigh Bardugo’s Six of Crows and Becky Albertalli’s Simon vs. the Homo Sapiens, and their playlists rotate between folk ensemble Los Cantos
    del Monte and contemporary Latin pop stars Karol G and Bad Bunny, shaping a creative sanctuary that fuels both study breaks and post‑game relaxation.
  travel: Mildred Figueroa prefers weekend day trips to historic nearby towns like Old Capitol and scenic hikes in the local state park, while dreaming of trekking the ancient ruins of Machu Picchu in Peru
    and joining the vibrant Carnival in Rio de Janeiro, balancing cost‑conscious planning with a yearning for adventurous discovery.
  culinary: Mildred Figueroa refines family recipes for cheese‑filled pupusas, slow‑cooks pork‑spiced tamales wrapped in corn husks, and perfects a salsa verde using fresh tomatillos, cilantro, and serrano
    peppers, treating each cooking session with a disciplined prep schedule that mirrors their journaled goals.
  core: Mildred Figueroa is a routine‑loving, competitively driven teen who balances meticulous soccer tactics, journaled ambitions, and flavorful family cooking, all while wielding a skeptical edge and
    a fondness for strategic video games.
background:
  cultural: Mildred is a second‑generation Salvadoran growing up in Houston’s vibrant Hispanic community. At home, Spanish is spoken daily, and family gatherings are centered around shared meals, Catholic
    traditions, and celebrations such as Salvadoran Independence Day and the annual Fiesta de las Flores. Her parents migrated from El Salvador in the 1990s, bringing with them a strong sense of family
    responsibility, respect for elders, and a devotion to the local parish, where she participates in youth activities. The multicultural environment of Houston exposes her to a blend of Latin American
    cultures, diverse cuisines, and bilingual schooling, reinforcing her ability to navigate multiple cultural contexts. While she embraces American customs—like school sports and mainstream music—she also
    preserves her heritage through cooking, language, and community events, creating a hybrid identity that honors both her Salvadoran roots and her Texan upbringing.
