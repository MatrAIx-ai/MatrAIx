  career_goals: While no longer working for pay, Mandy is driven to deepen her impact on her community and family. She aims to expand the senior volunteer program at her church, mentoring younger volunteers
    and creating a structured support network for older adults. Mandy also hopes to launch a community garden that provides fresh produce to local food banks, leveraging her gardening expertise. Personally,
    she intends to write a memoir capturing her family's Hill Country heritage, preserving stories for future generations. Maintaining her health and managing anxiety are high priorities; she plans to attend
    weekly mindfulness classes and schedule regular check‑ups. Finally, Mandy wishes to learn more advanced digital tools to help her grandchildren with school projects and stay connected across distances.
