personas:
  professional: Mamie Darden, a nine‑year‑old budding marine artist and aspiring marine biologist, channels their curiosity and methodical nature into detailed drawings of tide‑pool ecosystems and meticulously
    documented LEGO models that explore oceanic engineering concepts.
  sports: Mamie Darden thrives on the soccer field with the Coastal Kids Soccer Club, idolizing the play style of FC Barcelona’s forward Pedri and training every Saturday while also cheering for the local
    professional team, the Seaside Sharks, during televised matches.
  arts: Mamie Darden immerses themselves in creative expression, painting vivid marine scenes inspired by artist Wyland, collecting shells like treasures, dancing to pop hits from Billie Eilish, and delighting
    in singing harmonies with the church youth choir.
  travel: Mamie Darden dreams of exploring tide‑pools worldwide, having already visited the Monterey Bay Aquarium and yearning to snorkel over the Great Barrier Reef, while planning future family road trips
    to coastal state parks with a carefully drawn itinerary.
  culinary: Mamie Darden delights in the taste of buttery lobster rolls, the tang of homemade clam chowder, and the crispness of sea‑salted popcorn, often helping their parents prepare fish tacos and experimenting
    with seaweed snacks as a quirky, ocean‑themed snack.
  core: Mamie Darden is a nine‑year‑old ocean‑obsessed, meticulously organized dreamer who balances boundless curiosity with occasional worry, turning every shell, brushstroke, and soccer drill into a step
    toward their under‑sea ambitions.
background:
  cultural: Mamie is raised in the close‑knit African‑American community of Myrtle Beach, where her family’s traditions blend Southern coastal life with rich black cultural heritage. Church plays a central
    role, and she grows up hearing gospel and R&B, attending community picnics, and helping her grandmother prepare classic dishes like collard greens, shrimp gumbo, and sweet tea. Stories about family
    elders, local folklore about the sea, and participation in festivals that celebrate both the beach and black culture shape her worldview, reinforcing values of resilience, community support, and pride
    in her identity.
