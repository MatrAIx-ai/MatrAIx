  career_goals: Mamie dreams of becoming a marine biologist who studies sea turtles and shares her discoveries through illustrated books, or a visual artist who creates murals that celebrate her hometown’s
    beach and cultural heritage. She also hopes to one day teach younger children, combining her love of art and science to inspire curiosity. She plans to keep developing her skills in school and through
    community programs to reach these goals.
