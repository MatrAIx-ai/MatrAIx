personas:
  professional: Peter Veintidos, an eight-year-old budding digital storyteller who blends his love of sketching mythical creatures with simple coding projects that animate his LEGO cities, showcasing early
    computational thinking and a flair for creative problem-solving.
  sports: Peter Veintidos, an enthusiastic member of the local youth soccer league who cheers for the Miami Marlins and the Orlando Magic, spends sunny afternoons building LEGO tracks that double as obstacle
    courses for his imagined mini-games, and often explores the riverbank for natural treasures between practice sessions.
  arts: Peter Veintidos, a prolific sketcher of dragons and merfolk who draws inspiration from the whimsical illustrations of Mary Blair and the lively rhythms of Celia Cruz's Cuban salsa, spends evenings
    listening to classic Cuban music with his family while turning his drawings into flip-book animations using simple coding tools.
  travel: Peter Veintidos, an eight-year-old explorer who delights in riverbank fossil hunts, has already visited the historic forts of St. Augustine, dreams of snorkeling the Great Barrier Reef after a
    school documentary, and hopes to next summer journey with his family to the Smithsonian National Air and Space Museum in Washington, D.C.
  culinary: Peter Veintidos, a budding food enthusiast who loves homemade cheese-filled empanadas, relishes spaghetti with tomato-basil sauce, experiments with mango-lime salsa for his own taco creations,
    and proudly helps his parents grind fresh cilantro and locate the perfect pinch of cumin for family meals.
  core: Peter Veintidos, an eight-year-old imaginative builder who fuses mythical sketches, LEGO city design, and kid-friendly coding while staying relaxed, kind, and occasionally misplacing school assignments.
background:
  cultural: Peter is a second‑generation Cuban‑American raised in Jacksonville’s lively Cuban community. At home he speaks both Spanish and English, celebrates traditions such as San Juan festivals, enjoys
    family dishes like arroz con pollo and flan, and moves to the beats of salsa and son that fill the house. These cultural experiences nurture his love for storytelling, music, and harmony, reinforcing
    his kind and cooperative nature.
