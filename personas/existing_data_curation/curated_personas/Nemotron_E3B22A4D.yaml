  hobbies: '[''truck maintenance'', ''fishing'', ''soccer'', ''cooking Guatemalan cuisine'', ''listening to music (reggaeton, regional Mexican)'', ''DIY woodworking'', ''community volunteer work'', ''attending
    church services'']'
  career_goals: Juan aims to advance from a laborer role to a supervisory position within the next three years, seeking a shift lead or foreman role that offers a clear schedule and defined responsibilities
    for his family's stability. He plans to earn a formal forklift certification, pursue a commercial driver’s license (CDL), and complete his GED to broaden career options. In the longer term, Juan dreams
    of starting his own small moving and logistics business, leveraging his practical expertise and community connections while maintaining the structured work environment he values.
