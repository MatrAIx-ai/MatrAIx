personas:
  professional: Juan Menadier is a freight stock and material mover who blends bilingual communication, forklift expertise, and strict OSHA safety practices to keep warehouse floors moving efficiently,
    while their natural love for systematic storage layouts tempers a laid‑back attitude toward rigid scheduling.
  sports: Juan Menadier spends Saturdays competing in a local soccer league that faces teams like the Riverside Rovers and cheers for the LA Galaxy during MLS season, while early mornings find them casting
    lines at Lake Martin for largemouth bass and holding membership with the Riverside Outdoor Sports Club for organized fishing trips.
  arts: Juan Menadier's evenings pulse to the beats of Bad Bunny and Nicky Jam mixed with the soulful strums of Lila Downs and classic ranchera from Jorge Negrete, and they frequently attend community dance
    nights at the parish hall where regional folk performances spark spontaneous sing‑alongs.
  travel: Juan Menadier favors road‑trip adventures that blend fishing hauls with scenic drives, having already explored the Ozark lakes of Arkansas and the pine‑covered highlands of Asheville, and they
    dream of a future expedition to the turquoise waters of Tulum, Mexico, to fish and sample street‑food tacos.
  culinary: Juan Menadier loves cooking hearty pepian and hand‑wrapped tamales seasoned with roasted tomatillos, guajillo chilies, and masa flour for family gatherings, while weekend grill sessions see
    them charcoal‑searing catfish and preparing elote topped with cotija cheese and lime.
  core: Juan Menadier balances a toolbox‑filled practicality with spontaneous love for music and fishing, often juggling bedtime procrastination and late‑night project plans, yet never misses a family dinner
    of pepian.
background:
  cultural: Juan was raised in a bilingual household where Spanish was spoken daily and Guatemalan customs were cherished. His parents emigrated from Guatemala, bringing cultural traditions such as celebrating
    Semana Santa, Día de los Muertos, and cooking family recipes like tamales and pepian. He practices Catholicism and is active in his local church, which provides a social anchor in Guymon, Oklahoma.
    While fully integrated into the local community, Juan preserves his heritage by speaking Spanish at home, sharing Guatemalan food with friends, and maintaining strong ties with extended family across
    both countries.
attributes:
  skills: '[''forklift operation'', ''pallet jack handling'', ''inventory tracking'', ''basic vehicle maintenance'', ''workplace safety compliance (OSHA)'', ''bilingual communication (Spanish/English)'',
