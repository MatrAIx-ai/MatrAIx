personas:
  professional: Jean Julmis, a senior laboratory technician specializing in analytical chemistry, spectroscopy, and GIS spatial modeling, combines rigorous instrument calibration, R and Python statistical
    expertise, and a fiercely competitive drive to boost lab efficiency while channeling their artistic curiosity into clear, visually striking scientific illustrations.
  sports: Jean Julmis enjoys weekend hikes through Wissahickon Valley, participates in a local trail‑running club, attends Philadelphia Eagles games for camaraderie, and practices yoga twice weekly to balance
    their competitive laboratory mindset with physical resilience.
  arts: Jean Julmis frequents the Philadelphia Museum of Art and neighborhood galleries, sketches watercolors of microscopic organisms, absorbs live jazz from the Chris Brubeck Quartet and spoken‑word events
    at Hyphen Magazine, and draws creative inspiration from artists like Maya Lin and musicians such as Miles Davis, integrating these experiences into their scientific storytelling.
  travel: Jean Julmis plans trips with meticulous itineraries, favoring weekend getaways to Lancaster County’s farmers markets and historic Washington, D.C., while dreaming of a summer immersion in Kyoto’s
    art and science museums, balancing a modest travel budget with a desire for cultural enrichment.
  culinary: Jean Julmis crafts health‑focused meals that blend traditional flavors and modern techniques, such as quinoa‑black bean tacos with harissa, miso‑glazed salmon, and sweet potato gnocchi tossed
    in sage‑butter, delighting in ingredients like kale, turmeric, and chickpeas while maintaining a competent yet experimental kitchen skillset.
  core: Jean Julmis, a 51‑year‑old analytical chemist and avid watercolorist, fuses scientific rigor with creative curiosity, wrestles with stress‑induced worry, and channels competitive energy into mentoring,
    garden‑to‑table cooking, and community science‑art exhibitions.
background:
  cultural: Jean Annette is an African‑American woman whose family roots trace back to the rural South, with grandparents who migrated to Pennsylvania during the Great Migration. Growing up in the vibrant
    Black community of Delaware County, she was immersed in church traditions, soulful music, and a strong emphasis on education and collective progress. She actively participates in Juneteenth celebrations,
    Black History Month events, and local initiatives that highlight African‑American contributions to science and the arts. Her cultural heritage informs her commitment to mentorship, community outreach,
    and the integration of Black artistic expressions into her scientific work.
attributes:
  skills: '[''Laboratory instrumentation calibration'', ''Environmental sample analysis'', ''Statistical data analysis (R, Python)'', ''GIS mapping and spatial analysis'', ''Regulatory compliance (EPA,
