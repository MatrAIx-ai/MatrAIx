    ''Data visualization and scientific illustration'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting of scientific subjects'', ''Listening to live jazz and spoken‑word events'', ''Cooking soulful, health‑focused cuisine'', ''Gardening
    and vegetable cultivation'', ''Hiking in local parks'', ''Yoga and meditation for stress relief'', ''Volunteering at STEM outreach programs'', ''Mentoring youth in experimental design'', ''Listening
    to science and philosophy podcasts'', ''Crossword puzzles and Sudoku'']'
  career_goals: In the near term, Jean Annette aims to earn certification in advanced mass spectrometry and lead an interdisciplinary pilot project that blends ecological monitoring with visual storytelling.
    Over the next five years, she seeks a senior technician or lab manager role where she can shape research protocols, secure grant funding, and develop a mentorship program for underrepresented students
    in STEM. Ultimately, she envisions transitioning into a science communication leadership position, curating community exhibitions that showcase scientific discoveries through art, while advocating for
    diversity and inclusion within research institutions. Her ambition is balanced by a personal commitment to cultivate workplace wellness programs that address stress and promote resilience.
