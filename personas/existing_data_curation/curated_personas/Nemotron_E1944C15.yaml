personas:
  professional: Khalil Armstrong is a budding junior game developer and digital comic artist, and they apply a disciplined approach to Scratch programming, meticulous LEGO robotics builds, and a razor‑sharp
    eye for panel composition, reflecting a competitive, organized mind that constantly seeks to outdo even their own high standards.
  sports: Khalil Armstrong is an enthusiastic pickup basketball player who idolizes the Atlanta Hawks, practices shooting drills with the local Boys & Girls Club basketball club, and also joins the seasonal
    youth soccer league in the spring, balancing a competitive drive with a habit of forgetting to stretch before games, which they occasionally regret.
  arts: Khalil Armstrong is a passionate comic‑style illustrator who draws inspiration from the vibrant murals of their neighborhood, the soulful gospel harmonies heard at Sunday services, and the dynamic
    beats of local hip‑hop battles, and they idolize artists such as Stan Lee, Miles Davis, and contemporary illustrator Tai Mason.
  travel: Khalil Armstrong is a curious explorer who loves weekend road trips to the Martin Luther King Jr. National Historical Park and the Georgia Aquarium, dreams of visiting the National Museum of African
    American History and Culture in Washington, D.C., and they favor meticulously planned itineraries that include comic‑shop stops, local street‑food tastings, and a future family trip to Tokyo for anime
    exhibits.
  culinary: Khalil Armstrong is a budding home chef who enjoys whipping up classic Southern comfort foods like fried chicken, collard greens, and sweet potato pie alongside their parents, experiments with
    adding fresh basil to homemade pizza, and they proudly insist on drawing detailed LEGO‑inspired plates before each meal.
  core: Khalil Armstrong is a disciplined 9‑year‑old, and they have a competitive streak, a love for digital art and LEGO engineering, a habit of documenting every expense in doodles, and a penchant for
    balancing high‑energy basketball games with quiet, meticulous coding sessions.
background:
  cultural: Khalil is an African‑American boy growing up in Atlanta’s vibrant Fulton County community. His family celebrates traditions rooted in Southern Black culture, including church gatherings, soulful
    gospel music, and an appreciation for the city’s rich civil‑rights history. He participates in after‑school programs at the Boys & Girls Club, where mentors encourage academic excellence and artistic
    expression. Neighborhood festivals featuring hip‑hop battles, jazz performances, and local cuisine reinforce his connection to the broader Black cultural narrative. This environment nurtures his curiosity,
    discipline, and competitive spirit, shaping his worldview and future aspirations.
attributes:
  skills: '[''Advanced reading comprehension'', ''Digital illustration and sketching'', ''Basic Scratch coding'', ''LEGO robotics design'', ''Project planning and organization'']'
  hobbies: '[''Sketching and digital illustration'', ''LEGO building and robotics kits'', ''Playing Scratch and elementary coding challenges'', ''Reading graphic novels and science books'', ''Visiting local
    museums and street art murals'', ''Participating in school science fairs'']'
  career_goals: Khalil aspires to combine his love of technology and art by becoming a future software engineer who creates immersive video‑game experiences, and he also dreams of contributing to aerospace
    engineering projects that push the boundaries of exploration. He is determined to win his school’s science fairs and hopes to eventually earn a scholarship to a top STEM program, where he can develop
    innovative prototypes that blend artistic design with engineering precision.
