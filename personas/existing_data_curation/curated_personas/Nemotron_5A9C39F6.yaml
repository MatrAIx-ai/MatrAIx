  hobbies: '[''Oil painting'', ''Sketching'', ''Visiting art galleries'', ''Indie film screenings'', ''Hiking in the Sierra foothills'', ''Mindfulness meditation'', ''Cooking traditional Mexican dishes'',
    ''Playing chess'', ''Participating in a small math club'', ''Reading philosophy and science literature'']'
  career_goals: Daniel aspires to advance from his current role as a junior analyst to a senior data scientist or quantitative researcher within a nonprofit or public‑health organization that serves Latino
    communities. He plans to complete a bachelor’s degree in Applied Mathematics or Statistics, followed by a master’s in Data Science, while building a portfolio of projects that address health disparities
    and agricultural sustainability in California’s Central Valley. Over the next five years, he hopes to lead interdisciplinary teams, mentor junior staff, and publish research that bridges rigorous analytics
    with culturally relevant solutions. He also seeks to develop resilience strategies to manage his anxiety, allowing him to pursue leadership roles with confidence.
