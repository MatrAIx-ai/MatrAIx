personas:
  professional: Daniel Rabi, a 28‑year‑old junior analyst proficient in Python, R, statistical inference, and reproducible visualizations, blends an organized workflow with a flexible, curiosity‑driven
    mindset to craft visually striking data narratives, quietly experiments with unconventional modeling approaches, and aspires to become a senior data scientist in a nonprofit public‑health organization
    focused on health equity.
  sports: Daniel Rabi, an avid hiker of the Modesto foothills and occasional weekend runner, follows the Sacramento Kings and San Francisco 49ers, belongs to a local hiking club that meets monthly, and
    uses outdoor exercise as a grounding practice while occasionally skipping workouts during high‑anxiety periods.
  arts: Daniel Rabi, an oil painter and sketcher inspired by Mexican folk art and California landscapes, regularly visits the Modesto Art Museum and indie film screenings, admires the works of Diego Rivera
    and Frida Kahlo, enjoys listening to Fleet Foxes and attending performances by the Modesto Center for the Arts, and occasionally participates in a small chess club that fuels his love for strategic
    creativity.
  travel: Daniel Rabi, a methodical planner who also enjoys spontaneous getaways, favors low‑key travel such as hiking trips to Yosemite, weekend culinary excursions to Oaxaca to study traditional dishes,
    and occasional road trips along the Pacific Coast, while budgeting constraints keep longer international trips like a planned visit to Japan on the back burner.
  culinary: Daniel Rabi, an intermediate home cook who finds solace in preparing traditional Mexican dishes like mole poblano, tamales, and chilaquiles, delights in using dried ancho chilies, fresh cilantro,
    and corn masa, often experiments with fusion twists for small gatherings of close friends, yet sometimes burns the sauce when anxiety spikes.
  core: Daniel Rabi, a 28‑year‑old analytical mind with an artist’s eye, channels curiosity and quiet resilience into data science, painting, and mindful cooking, while navigating intense anxiety through
    meditation and occasional impulsive splurges.
background:
  cultural: Daniel was born to Mexican immigrant parents who settled in Modesto after working in the region’s agricultural sector. He grew up bilingual, speaking Spanish at home and English at school, and
    celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered on homemade tamales and mole. The vibrant mural art of his hometown, as well as the music of
    mariachi and regional norteño bands, shaped his appreciation for visual and auditory expression. While he identifies strongly with his Mexican heritage, he also navigates the bicultural experience of
    being a first‑generation American, balancing respect for family expectations with a personal drive to explore unconventional ideas and creative pathways.
attributes:
  skills: '[''Statistical analysis'', ''Data visualization'', ''Python programming'', ''R programming'', ''Mathematical modeling'', ''Experimental design'', ''Technical writing'', ''Problem solving'', ''Critical
