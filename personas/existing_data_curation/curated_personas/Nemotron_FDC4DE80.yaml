  career_goals: Jordan intends to transition from full‑time site labor to running a boutique contracting firm focused on eco‑friendly remodels and heritage homes. He aims to obtain Green Building certification
    (LEED) and to mentor at least two apprentices each year, passing on his blend of traditional craftsmanship and modern sustainability. In the longer term, he hopes to author a practical guide on integrating
    renewable materials into classic carpentry projects, securing a stable income that supports his family’s retirement while preserving his hands‑on involvement in the trade.
