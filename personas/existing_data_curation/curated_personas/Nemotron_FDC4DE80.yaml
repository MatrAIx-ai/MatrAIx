personas:
  professional: Jordan Wilson is a veteran carpenter with over three decades of residential and light‑commercial experience, now channeling meticulous historic restoration expertise into launching a boutique
    eco‑friendly contracting firm, pursuing LEED certification, mentoring apprentices, and planning a future guide on renewable materials, all while they balance a pragmatic eye for budgets with a curiosity
    for sustainable building innovations.
  sports: Jordan Wilson enjoys sailing with the San Diego Sailing Club on the bay, hikes the Pacific Coast Trail with a local hiking group, follows the San Diego Padres and LA Lakers avidly, and they keep
    fit by joining weekend beach volleyball games at Mission Bay while maintaining a modest membership at a community gym for strength training.
  arts: Jordan Wilson frequents local music festivals featuring acts like The Avett Brothers and Sam Fender, collects vintage folk‑instrument records, reads architecture and design journals inspired by
    Frank Lloyd Wright and Zaha Hadid, and they often unwind by sketching restored historic interiors, letting the fusion of classic craftsmanship and contemporary art shape their creative outlook.
  travel: Jordan Wilson prefers thoughtfully planned weekend getaways, having recently explored the sustainable building showcase in Copenhagen, the desert night skies of Joshua Tree, and the coastal scenery
    of Big Sur, while they dream of a future sailing expedition to the Greek islands, all balanced against the financial realities of funding their boutique contracting start‑up.
  culinary: Jordan Wilson delights in cooking fresh vegetable ratatouille with heirloom tomatoes, herb‑crusted grilled salmon with mango salsa, and handmade wood‑fire pizza topped with locally sourced pepperoni,
    they relish the occasional fish taco from a beloved San Diego stand, and they regularly experiment with fermenting kimchi and brewing craft coffee in their modest kitchen.
  core: Jordan Wilson blends seasoned carpentry mastery with eco‑conscious ambition, balancing meticulous craftsmanship and green‑building curiosity while navigating chronic worry that fuels both careful
    planning and occasional over‑cautiousness.
background:
  cultural: Jordan grew up in a middle‑class, working‑class family in Southern California, where the values of hard work, self‑reliance, and community cooperation were emphasized. His family has a modest
    tradition of trades, and he inherited a pragmatic yet open‑minded outlook typical of the West Coast’s blend of individualism and environmental awareness. He identifies with mainstream American culture,
    celebrates local holidays, and participates in neighborhood events that reflect the diverse, laid‑back spirit of San Diego.
