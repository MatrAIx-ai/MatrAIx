persona_description: A scientist who studies the effects of ocean acidification and the impact of CO2 emissions on marine life. They are particularly interested in the research led by Jason Hall-Spencer
  from the University of Plymouth and have read the article in the journal Nature. They are aware of the rise in CO2 levels in the atmosphere and the potential impact on marine ecosystems and are actively
  working towards reducing carbon emissions. They are interested in the use of natural carbon dioxide vents on the sea floor as a natural laboratory for studying the impacts of acidified water on marine
  life.
