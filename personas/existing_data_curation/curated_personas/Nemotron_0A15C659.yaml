  career_goals: Despite being retired, Georgianna remains driven to expand her knowledge and share her accumulated wisdom. She aims to publish a memoir that chronicles her experiences as a woman in STEM
    from the 1960s through the 1980s, and to develop a volunteer program at the local science museum pairing senior volunteers with youth for hands‑on STEM workshops. She seeks to deepen her proficiency
    in AI‑driven data visualization, creating interdisciplinary exhibitions that merge scientific data with visual art. Additionally, she hopes to secure a modest grant to fund community art‑science residencies,
    and to continue mentoring emerging female engineers through speaking engagements and informal coaching. Her ongoing curiosity also pushes her to learn new digital painting techniques and explore emerging
    technologies.
