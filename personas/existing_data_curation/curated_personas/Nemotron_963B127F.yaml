personas:
  professional: Esteban Abadia is a retail operations supervisor who leverages a STEM‑based analytical toolkit to build data‑driven inventory controls, automate KPI reporting in Excel and SQL, and codify
    staff scheduling procedures, while their methodical, conflict‑resolution‑oriented leadership style positions them for a future district‑manager role.
  sports: Esteban Abadia is an early‑morning runner who logs 5–6 km routes through city parks while cheering on the Los Angeles Lakers and following the Seattle Sounders FC, and they belong to a local running
    club that meets twice weekly for interval training, reflecting a low‑key yet loyal approach to fitness and fandom.
  arts: Esteban Abadia devotes weekends to urban photography, often capturing minimalist street geometry inspired by Andreas Gursky and Brandon Stanton, while their playlist rotates between the ambient
    compositions of Brian Eno and the folk storytelling of Bob Dylan, and they unwind with non‑fiction titles like Atomic Habits and Thinking, Fast and Slow.
  travel: Esteban Abadia prefers meticulously planned short‑haul trips that blend photography opportunities with cultural immersion, such as a weekend photo walk through the historic alleys of Seville and
    a solo retreat to Kyoto’s Arashiyama bamboo forest, and they budget tightly to fit these escapes into a demanding work schedule.
  culinary: Esteban Abadia cooks intermediate‑level family recipes like chicken tinga, handmade sopes, and roasted corn elotes, combining fresh chilies, tomatillos, and masa, while experimenting with sous‑vide
    techniques to perfect protein texture and using their mindfulness practice to stay present at the stovetop.
  core: Esteban Abadia is a structured, stress‑aware retail analyst whose disciplined routines—early runs, precise budgeting, and methodical cooking—mask a lingering worry habit that fuels both productivity
    and occasional over‑planning.
background:
  cultural: Esteban grew up in a Mexican‑American household, speaking Spanish at home and English at school, which gives him fluency in both languages. He celebrates Día de los Muertos and other Mexican
    holidays with family gatherings and traditional foods. Living in San Francisco, he blends his cultural roots with the city's diverse community, participating in local Mexican cultural festivals and
    supporting bilingual community initiatives. His heritage informs his strong work ethic, respect for family values, and appreciation for communal support networks.
