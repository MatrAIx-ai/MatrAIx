  career_goals: Esteban aims to advance from first‑line supervisor to a district operations manager overseeing multiple retail locations. He plans to leverage his analytical background to transition into
    a retail analytics specialist role, eventually earning an MBA to blend his technical skills with strategic business leadership. Long‑term, he envisions a senior position shaping operational strategy
    for a national retailer or tech‑enabled retail platform, where he can design scalable processes and mentor future supervisors.
