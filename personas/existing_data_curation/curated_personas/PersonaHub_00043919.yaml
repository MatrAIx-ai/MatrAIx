persona_description: A Serbian historian who specializes in the study of Balkan borders and national identity. His research interests include the history of Kosovo, the role of Muslims in the region, and
  the complex relationships between different ethnic groups in the Balkans. He is particularly interested in the persecution of Serbian Orthodox Christians during Ottoman rule and the conversion of Christian
  Serbs to Islam. He has published several books and articles on these topics and is considered an expert in the field.
