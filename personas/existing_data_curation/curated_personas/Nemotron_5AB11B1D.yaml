personas:
  professional: Rex Brown is a disciplined military baker who blends meticulous operational planning with spontaneous recipe experimentation, using their expertise in artisan fermentation and pastry laminating
    to keep Holloman Air Force Base’s dining facility efficient yet creatively competitive.
  sports: Rex Brown is an avid weekend hiker in the Sacramento Mountains, a regular player in a local pickup basketball league that mirrors the Los Angeles Lakers’ fast‑break style, and a devoted fan of
    the New Mexico State Aggies football team, combining their love of outdoor endurance with team‑oriented competition.
  arts: Rex Brown is a passionate acoustic guitarist who frequently performs informal sets at base gatherings, draws inspiration from folk artists like Bob Dylan and modern indie acts such as Fleet Foxes,
    and captures desert landscapes with a DSLR, often studying the work of Ansel Adams for compositional ideas.
  travel: Rex Brown prefers spontaneous road trips that blend adventure and relaxation, having recently explored Santa Fe’s art districts, camped near the Grand Canyon, and planned a future culinary pilgrimage
    to Paris to study classic European patisserie, all while balancing limited leave time with budgeting constraints.
  culinary: Rex Brown is a skilled home‑brewer and baker who infuses New Mexican ingredients such as blue cornmeal and piñón into sourdough loaves, pairs chocolate stout cake with locally crafted IPAs,
    and regularly competes in cake‑decorating contests, showcasing a blend of classic European techniques with regional flavors.
  core: Rex Brown is a calm yet fiercely competitive baker who meticulously plans menu logistics while impulsively chasing new flavor trends, often juggling a relentless drive for perfection with a habit
    of over‑working and forgetting to schedule personal downtime.
background:
  cultural: Rex is a white American raised in a small Midwestern town where his family ran a diner, giving him early exposure to baking and hospitality. After marrying a service member, he relocated to
    Holloman Air Force Base in New Mexico, immersing himself in a multicultural military community. The base’s diverse population and the surrounding Southwest culture have introduced Mexican, Native American,
    and Hispanic culinary influences into his life, which he integrates into his baking. This blend of Midwestern work ethic, military structure, and Southwestern flavors shapes his identity and culinary
    perspective.
attributes:
  skills: '[''Artisan sourdough fermentation'', ''European pastry laminating'', ''Cake sculpting and sugar work'', ''High‑volume menu development'', ''Food safety and HACCP compliance'', ''Inventory & supply
