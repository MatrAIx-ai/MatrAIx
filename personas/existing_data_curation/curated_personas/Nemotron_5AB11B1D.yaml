  hobbies: '[''Hiking in the Sacramento Mountains'', ''Acoustic guitar jam sessions'', ''Desert landscape photography'', ''Home‑brewing craft beer'', ''Competitive cake‑decorating contests'', ''Volunteering
    with Family Readiness Group'', ''Board‑game nights with fellow spouses'', ''Pickup basketball games'']'
  career_goals: Rex’s primary ambition is to become the head baker for the Holloman Air Force Base’s food service, overseeing all bake‑house operations and mentoring a team of bakers. He plans to earn the
    Certified Master Baker credential and complete an online Bachelor’s in Culinary Management. In the long term, he hopes to open a boutique bakery near the base that showcases a blend of classic European
    techniques with New Mexican ingredients, and to compete nationally in baking competitions while offering workshops for military families.
