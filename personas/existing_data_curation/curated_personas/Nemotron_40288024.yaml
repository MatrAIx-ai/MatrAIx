  hobbies: '[''Pickup basketball'', ''Fishing'', ''Hunting trips'', ''Competitive video gaming'', ''Live streaming gaming sessions'', ''Cooking Cajun cuisine'', ''Attending Mardi Gras parades'', ''Local
    music festivals'', ''Reading tech blogs'', ''DIY home‑repair projects'']'
  career_goals: Justin aims to translate his hands‑on abilities into a stable career path by pursuing an apprenticeship in the skilled trades, such as becoming an electrician or a HVAC technician, while
    also exploring certification in basic automotive repair. He hopes to eventually launch a small mobile service business—combining car detailing and minor home‑repair fixes—allowing him the flexibility
    he values. In the longer term, he is interested in enrolling in community college courses that could lead to a degree in information technology, giving him a broader set of options without sacrificing
    his love for practical, on‑the‑ground work.
