personas:
  professional: Justin Johnson is a practical tinkerer who balances curiosity with hands‑on skill, pursuing a trade apprenticeship while streaming video‑game sessions, and they rely on flexibility over
    rigid schedules despite occasional disorganization.
  sports: Justin Johnson plays pickup basketball at City Park, follows the New Orleans Pelicans and New Orleans Saints, joins a local recreational basketball league, and balances fishing trips on the Atchafalaya
    Basin and occasional hunting outings, treating fitness as a flexible, competitive outlet rather than a regimented routine.
  arts: Justin Johnson enjoys the zydeco sounds of Clifton Chenier, the funk of Dr. John, streams gaming sessions accompanied by Daft Punk soundtracks, and occasionally watches Marvel movies like Guardians of the Galaxy,
    letting music and pop culture shape their creative downtime.
  travel: Justin Johnson prefers impromptu road trips along the Gulf Coast, has visited New Orleans Mardi Gras parades, road‑tripped to Austin for the South by Southwest festival, and dreams of attending
    the Tokyo Game Show for a blend of travel and gaming immersion.
  culinary: Justin Johnson loves cooking Cajun classics such as jambalaya, gumbo, and crawfish étouffée, expertly using andouille sausage, okra, and Creole seasoning, while also enjoying occasional quick
    bites of fried catfish and spicy po’boys when they’re short on time.
  core: Justin Johnson is a 21‑year‑old hands‑on enthusiast who merges a love of Cajun cooking, competitive gaming, and trade skills, yet often procrastinates, splurges impulsively, and trusts their gut
    over meticulous planning.
background:
  cultural: Justin grew up in a middle‑class, white Southern family in Baton Rouge, Louisiana. His upbringing was shaped by the region’s blend of traditional Southern values and the eclectic cultural mix
    of Creole and Cajun influences. Family gatherings often featured backyard barbecues, gospel music, and discussions about community events like the Baton Rouge Blues Festival. He attended a public high
    school where he was exposed to a diverse student body, fostering a pragmatic curiosity about different perspectives while still holding onto a strong sense of local identity. Religion played a modest
    role, with occasional attendance at a nearby Baptist church, reflecting the prevalent faith practices in the area. The local cuisine, music (especially zydeco and Southern rock), and annual Mardi Gras
    celebrations remain integral to his sense of self and inform many of his hobbies and aspirations.
attributes:
