personas:
  professional: Billy Laffitte, a commercial cleaner with a talent for troubleshooting minor facility issues, leverages their meticulous organization and imaginative curiosity as they pursue an associate’s
    degree in facilities management while spearheading green‑cleaning initiatives and moonlighting as an abstract watercolor artist selling pieces online.
  sports: Billy Laffitte, an avid hiker who tackles the Columbia River Gorge trails each weekend and plays pickup soccer with the university club in the spring, regularly streams Portland Timbers matches
    and follows the Trail Blazers in the NBA season, while they maintain fitness through a mix of yoga sessions and functional strength workouts at a community gym.
  arts: Billy Laffitte, whose evenings are spent sketching abstract landscapes inspired by Mark Rothko’s color fields and listening to ambient playlists by Tycho, immerses themselves in speculative fiction
    by Neil Gaiman, curates a personal journal of philosophical reflections, and they delight in board game evenings featuring titles like Terraforming Mars, all of which feed their artistic voice.
  travel: Billy Laffitte, a careful planner who balances a modest student budget with a love for off‑the‑beaten‑path nature escapes, has backpacked through Yellowstone and the Canadian Rockies and dreams
    of exploring the historic temples of Kyoto and the coastal streets of Lisbon, and they always opt for DIY itineraries and stay in budget hostels or campgrounds.
  culinary: Billy Laffitte, whose culinary adventures range from mastering a bright basil‑pesto linguine with pine nuts and Parmesan to perfecting avocado toast topped with radish slices and a drizzle of
    lemon‑infused olive oil, enjoys experimenting with seasonal ingredients like heirloom tomatoes and fresh mint, yet they often resort to microwave ramen during late‑night art sessions.
  core: Billy Laffitte is a twenty‑year‑old janitor‑turned‑aspiring facilities supervisor who balances meticulous cleaning routines with a vivid imagination, as they channel late‑night watercolor sessions
    and philosophical journaling into a drive for sustainable workplaces and modest artistic side‑hustles, while they occasionally neglect sleep to finish a board game.
background:
  cultural: Billy grew up in Crawfordsville, Indiana, within a white, working‑class family that values hard work, modesty, and community involvement. The Midwestern culture of his town emphasizes neighborly
    cooperation, local festivals, church gatherings, and a pragmatic approach to daily life. His upbringing included regular attendance at community events and access to a well‑stocked public library that
    sparked his love for reading and art. Marrying young, Billy integrates traditional Midwestern values—family loyalty, respect for routine, and modest aspirations—with an emerging personal culture that
    embraces creative expression, intellectual exploration, and service to others. This blend of regional heritage and an open‑minded curiosity shapes his identity and outlook.
attributes:
  skills: '[''Commercial cleaning'', ''Facility maintenance'', ''Basic plumbing'', ''Basic electrical troubleshooting'', ''Inventory management'', ''Time management'', ''Attention to detail'', ''Empathy‑driven
