  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Philosophy reading'', ''Indie music listening'', ''Hiking with spouse'', ''Volunteer community cleaning'', ''Board
    games with small group'', ''Journaling'', ''DIY home improvement'']'
  career_goals: Billy aspires to advance from a janitorial role to a facilities supervisor position, seeking an associate's degree in facilities management to deepen his technical knowledge and leadership
    capabilities. He is motivated to integrate sustainability practices into building upkeep, aiming to lead green‑cleaning initiatives at his workplace. Concurrently, Billy wishes to develop a side career
    as a visual artist, creating and selling abstract watercolors and sketches online and at local craft fairs. He also hopes to volunteer his maintenance skills for community centers and nonprofit organizations,
    marrying his practical expertise with his strong desire to help others and foster harmonious environments.
