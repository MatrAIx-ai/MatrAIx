  career_goals: Maria aims to advance to a senior operations manager role within the next three years, overseeing multi‑departmental initiatives that drive measurable cost savings and service improvements.
    Her longer‑term ambition is to become a director of operations and eventually a chief operating officer, leading large‑scale digital transformation projects that integrate AI‑enabled demand forecasting
    and automated workflow solutions. To support these goals, she plans to earn PMP and APICS CPIM certifications, expand her strategic leadership capabilities, and champion mentorship programs that support
    the advancement of women in business.
