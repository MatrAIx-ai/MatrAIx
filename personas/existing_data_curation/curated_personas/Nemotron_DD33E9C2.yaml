personas:
  professional: Maria Jenkins, an operations strategist at a mid-sized tech firm, leverages their expertise in workflow design, advanced Excel, SQL, and Power BI to streamline cross‑functional processes,
    consistently delivering cost‑saving initiatives while they mentor junior staff with a calm, disciplined demeanor.
  sports: Maria Jenkins, an avid early‑morning yoga practitioner and solo hiker, is a member of the Denver Rocky Mountain Hiking Club, roots for the Denver Broncos and Colorado Rockies, and reserves weekends
    for trail runs in the Front Range, balancing high‑intensity cardio with mindful stretching as they maintain their fitness goals.
  arts: Maria Jenkins, a landscape photographer who curates their shots on a structured digital portfolio, draws inspiration from Ansel Adams and Edward Burtynsky, enjoys listening to Fleet Wood Mac and
    Sufjan Stevens while editing, and regularly attends exhibitions at the Denver Art Museum, where they volunteer as a guide during community nights.
  travel: Maria Jenkins, a meticulous trip planner, spends their vacation days exploring nearby national parks like Rocky Mountain and Yellowstone, while dreaming of a future itinerary to Iceland’s blue
    lagoons, using a detailed spreadsheet to budget each outing and preferring active hikes over luxury resorts, though they occasionally splurge on a weekend ski resort pass.
  culinary: Maria Jenkins, a health‑focused meal‑prep enthusiast, loves crafting Mediterranean quinoa salads with feta, olives, and cherry tomatoes, mastering the art of roasted salmon with lemon‑dill sauce,
    and enjoys occasional bison burgers at a Denver farm‑to‑table spot, yet they admit to eating leftover kale chips straight from the fridge instead of their planned plates when deadlines loom.
  core: Maria Jenkins blends disciplined operational expertise with a love for sunrise yoga, solo hikes, and precise meal‑prepping, channeling an achievement‑driven mindset into every facet of life while
    they occasionally neglect leisure meals during crunch time.
background:
  cultural: Maria identifies as a White American with Irish and German ancestry. She grew up in a suburban environment near Denver, Colorado, where the culture emphasizes self‑reliance, community involvement,
    and an active appreciation for the outdoors. Her family celebrates traditional American holidays such as Thanksgiving and the Fourth of July, while also embracing Colorado's strong focus on environmental
    stewardship and sustainable living. This upbringing instilled values of hard work, practical achievement, and civic responsibility, shaping her organized, achievement‑driven outlook.
