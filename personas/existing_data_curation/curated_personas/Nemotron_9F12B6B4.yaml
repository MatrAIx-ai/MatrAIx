personas:
  professional: A landscape architect named Ashley Millard harnesses AutoCAD, SketchUp, Revit, and GIS to craft resilient, low‑impact public parks across Middle Tennessee, thriving in solitary design sessions
    where their meticulous, curiosity‑driven yet pragmatic mindset and quiet competitiveness propel projects toward LEED certification and regional award recognition, and they confidently steer multidisciplinary
    teams toward sustainability goals.
  sports: An outdoor enthusiast named Ashley Millard spends weekends hiking the Great Smoky Mountains, logging bird sightings in a personal journal, and occasionally training with the local trail‑running
    club for cardio endurance, while they cheer on the Nashville Predators and Tennessee Titans from their porch and maintain a gentle competitive edge in solo distance challenges.
  arts: A creative soul named Ashley Millard captures macro photographs of native wildflowers in a style reminiscent of Georgia O'Keeffe's brushwork, paints watercolor landscapes echoing Ansel Adams' tonal
    harmony, and unwinds to the folk melodies of Gillian Welch, while they maintain a habit of sketching design concepts in the margins of art books.
  travel: A purposeful wanderer named Ashley Millard prefers low‑key road trips to national parks such as Shenandoah and the Pacific Northwest's Hoh Rainforest, meticulously planning routes and campsites
    while budgeting carefully, and they dream of one day exploring Iceland's geothermal wonders alongside their spouse.
  culinary: A mindful foodie named Ashley Millard enjoys preparing Southern comfort dishes like fried green tomatoes paired with sautéed dandelion greens, experimenting with foraged purslane and wild blackberries
    in rustic sauces, yet they sometimes surrender to late‑night pizza delivery when project deadlines loom.
  core: A solitary, detail‑driven landscape architect named Ashley Millard channels Appalachian reverence for the land into award‑winning sustainable designs, battles chronic anxiety with yoga, and hoards
    spreadsheets like prized seedlings.
background:
  cultural: Ashley was raised in a rural community in central Tennessee, where the rolling hills and nearby Appalachian foothills fostered an early love of the outdoors. Her family, of European descent,
    emphasized self‑reliance, respect for the land, and a modest work ethic typical of the region’s small‑town culture. She earned an associate degree in Landscape Architecture from a local community college,
    where she was exposed to both traditional Southern horticultural practices and contemporary sustainable design principles. The cultural values of stewardship, quiet diligence, and community involvement
    shape her professional ethos, even as she prefers solitary, focused work. Her marriage to a local farmer deepens her connection to regional agricultural traditions and reinforces her commitment to land‑focused
    design.
attributes:
  skills: '["AutoCAD", "SketchUp", "Revit", "GIS Mapping", "Landscape Design", "Native Plant Selection", "Site Analysis", "Grading & Drainage Design", "Water Conservation Systems", "LEED Green Associate",
