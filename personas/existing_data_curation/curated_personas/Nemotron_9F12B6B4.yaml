  hobbies: '["Nature Photography", "Birdwatching", "Watercolor Landscape Painting", "Native Plant Gardening", "Hiking", "Reading (Design & Ecology)", "Journaling", "Puzzle Solving", "Yoga & Mindfulness"]'
  career_goals: Ashley aims to obtain full licensure as a Landscape Architect within the next two years and soon lead multidisciplinary design teams on public park and conservation projects across Middle
    Tennessee. She wants to build a signature portfolio centered on sustainable, low‑impact designs that celebrate the native hills and waterways of the region, eventually earning regional ASLA awards and
    publishing case studies in professional journals. Long‑term, she envisions founding a boutique practice that specializes in private estates, ecological restoration, and educational workshops, while
    mentoring emerging designers and continuing to refine her expertise in green infrastructure.
