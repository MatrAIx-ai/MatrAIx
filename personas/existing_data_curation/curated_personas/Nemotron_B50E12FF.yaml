  career_goals: Brittany aspires to lead a flagship investigative series on environmental challenges facing Connecticut’s coastline, aiming for national recognition such as a Pulitzer or George Polk Award.
    In the medium term, she seeks promotion to senior editor, where she can shape editorial strategy, mentor junior reporters, and champion data‑driven journalism. Long‑term, she hopes to publish a nonfiction
    book that chronicles the transformation of local news in the digital age, while also building a flexible freelance portfolio that lets her balance high‑impact reporting with her family life.
