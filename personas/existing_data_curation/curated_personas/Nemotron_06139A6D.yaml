personas:
  professional: Emily Baiden, a 36‑year‑old with a humanities background, leverages her strong writing, public‑speaking and event‑planning abilities to design and run structured community‑outreach programs
    for a mental‑health nonprofit, all while balancing a preference for clear processes with a relaxed attitude toward deadlines that sometimes leads to last‑minute scrambling, and channeling her deep compassion
    and occasional worry into empathetic support for clients.
  sports: Emily Baiden enjoys weekend hikes on the trails of Stone Mountain, plays in a co‑ed recreational softball league at the city park, and roots for the Atlanta Falcons and Atlanta United, while using
    salsa dancing at a local studio as a fun cardio workout.
  arts: Emily Baiden regularly attends community theater productions of August Wilson’s 'Fences', participates in a book club that discusses works by Zora Neale Hurston, and loses herself at regional music
    festivals listening to folk‑rock artist Jason Isbell and salsa legend Celia Cruz, all of which fuel her creative writing and storytelling.
  travel: Emily Baiden favors short, group‑oriented trips that blend cultural immersion and outdoor adventure—such as weekend road‑trips to Savannah’s historic squares, hiking in Asheville’s Blue Ridge
    Mountains, and music‑filled getaways to New Orleans—while meticulously budgeting each outing in a shared spreadsheet to keep costs in check.
  culinary: Emily Baiden delights in cooking Southern comfort foods like shrimp and grits, peach cobbler, and collard greens, often adding creative twists such as kimchi‑topped fried chicken, and sources
    heirloom tomatoes, fresh basil, and specialty spices from her urban garden and local farmers’ market to experiment with new flavors.
  core: Emily Baiden, a 36‑year‑old community‑focused empath, balances a love for structure with a habit of last‑minute scrambling, driven by deep compassion and a lingering undercurrent of anxiety.
background:
  cultural: Emily was raised in the Atlanta metropolitan area within a middle‑class White Southern family. Her upbringing combined traditional Southern values—such as hospitality, strong community ties,
    and a love for regional cuisine—with exposure to Atlanta's diverse urban culture. While her family participated in church and local service activities, she also grew up attending theater productions,
    art festivals, and exploring the city’s multicultural neighborhoods. The experience of divorce and her involvement in community support networks have fostered a progressive outlook, allowing her to
    navigate both Southern traditions and the inclusive, forward‑looking currents of contemporary Atlanta.
