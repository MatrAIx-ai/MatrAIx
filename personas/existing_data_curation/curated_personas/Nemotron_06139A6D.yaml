  career_goals: Emily aims to re‑enter the workforce by securing a part‑time role as a community outreach coordinator for a nonprofit that provides mental‑health and family support services in Atlanta.
    She plans to complete a peer‑counseling certification within the next two years, develop a freelance writing portfolio focused on wellness and personal growth, and eventually launch a series of local
    support groups for individuals navigating divorce or caregiving challenges. Her long‑term ambition is to blend her humanities background with her passion for helping others to create sustainable, community‑focused
    programs.
