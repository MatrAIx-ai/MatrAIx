  hobbies: '[''soccer'', ''Bollywood and Indian classical dance'', ''drawing and painting'', ''craft making'', ''reading adventure and animal books'', ''insect collecting'', ''watching science and wildlife
    documentaries'', ''baking traditional sweets with family'']'
  career_goals: Rose dreams of becoming a wildlife biologist or veterinarian so she can care for animals and study nature. She also imagines designing simple inventions or robots when she gets older, inspired
    by the LEGO creations she loves. Short‑term, she hopes to lead her school’s science club, win the upcoming science fair with a project on plant growth, and organize a neighborhood clean‑up with her
    friends. She wants to keep dancing in cultural performances while exploring a future that lets her combine her love for animals, science, and teamwork.
