personas:
  professional: A budding soccer enthusiast and dancer, Rose Patel merges a practical curiosity for new moves with a competitive drive, excelling in teamwork at school while also organizing art projects
    for classmates, where they eagerly lead group activities.
  sports: Rose Patel plays forward for the Little Stars Soccer Club, idolizes FC Barcelona’s Lionel Messi, and spends weekends sprinting at the local park while practicing Bollywood dance stretches to stay
    flexible, where they channel a competitive spirit into scoring goals and they love cheering for the New York Yankees during baseball season.
  arts: Rose Patel devotes free time to drawing whimsical animals, rehearsing Bollywood dances to songs by Shreya Ghoshal, copying the vibrant watercolor style of Disney’s "The Little Mermaid" illustrator,
    and they often hum the playful tune of "Let It Go" while crafting colorful collages inspired by Bob Ross.
  travel: Rose Patel prefers spontaneous weekend trips to the city zoo and the nearby beach, eagerly plans a future visit to the Space Center Houston after watching space documentaries, and they dream of
    traveling to the Great Barrier Reef when they're older, balancing family budget limits with a love for adventure.
  culinary: Rose Patel loves helping knead dough for samosas and decorating gulab jamun, enjoys munching on cheese pizza with extra mozzarella, and they delight in making colorful fruit kebabs with strawberries,
    bananas, and pineapple, proudly sharing their creations with friends.
  core: Rose Patel’s boundless energy fuels a competitive spirit on the soccer field and a meticulous habit of collecting insects in a jar, while their occasional snack-craving for sugary sweets sometimes
    distracts them from school chores.
background:
  cultural: Rose’s family is Indian‑American, originally from the Gujarati region of India. They moved to Dallas, Texas, where they maintain a bilingual household speaking both English and Gujarati. Cultural
    traditions such as Diwali, Holi, and Navratri are celebrated with lights, decorations, special foods like samosas, jalebi, and homemade puris, and family gatherings that often include music and dance.
    Rose attends a local Indian cultural center where she learns classical dance forms and participates in community festivals. Her parents place importance on education, respect for elders, and community
    involvement, encouraging her to excel academically while staying connected to her heritage. The multicultural environment of Dallas, combined with a supportive South Asian community, shapes her identity
    and daily experiences.
attributes:
  skills: '[''reading comprehension'', ''basic addition and subtraction'', ''hands‑on problem solving (LEGO, simple experiments)'', ''responsible pet care (hamster feeding)'', ''organization of school materials'',
