persona_description: A Purdue University engineer who specializes in the development of new technologies for sensing and imaging. The engineer has a background in biomedical engineering and mechanical engineering,
  and has published research on integrating light manipulation devices called 3D plasmonic nanoarrays onto peelable films that can stick to any surface. The engineer's research aligns with Purdue's Giant
  Leaps celebration, acknowledging the university's global advancements made in health, longevity, and quality of life as part of Purdue's 150th anniversary. The engineer's work has been recognized by the
  Air Force Research Laboratory and validated by the testing of the sticker-nanoarray's capabilities on the lenses of sensors.
