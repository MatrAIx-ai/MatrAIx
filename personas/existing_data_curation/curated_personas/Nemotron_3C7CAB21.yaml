  hobbies: '["Metal sculpting", "Visiting local art galleries", "Participating in recreational softball league", "Weekend fishing trips", "Bourbon festival attendance", "Vintage motorcycle restoration",
    "Experimenting with new welding techniques", "Attending bluegrass jam sessions", "Reading about emerging manufacturing technologies", "Contributing to online maker forums"]'
  career_goals: Harold aims to become a Certified Welding Inspector (CWI) within the next two years, positioning himself for supervisory roles at his plant. He also envisions launching a side business that
    creates custom metal art pieces for local galleries and bourbon distilleries, merging his technical expertise with his passion for art. Long‑term, he hopes to teach advanced welding techniques at a
    community college or vocational school, and perhaps eventually open his own workshop that doubles as a collaborative space for other artisans.
