personas:
  professional: Harold Robinson, a 40‑year‑old industrial welder at a Lexington manufacturing plant, excels in MIG, TIG, and stick welding across automotive and construction projects, leads shift schedules
    and junior‑welder training while covertly developing custom metal art for bourbon distilleries, and they are pursuing Certified Welding Inspector certification to transition into supervisory and teaching
    roles.
  sports: Harold Robinson, a regular participant in Lexington’s Sunday recreational softball league and an avid fly‑fisher on the Kentucky River, roots for the Kentucky Wildcats basketball team and the
    Cincinnati Reds baseball club, while they stay fit through early morning jogs and weekly pull‑up sessions at the local gym, though they sometimes skip workouts after a long weekend on the water.
  arts: Harold Robinson, a frequent visitor to Lexington’s art galleries and an enthusiastic participant in bluegrass jam sessions featuring musicians like Molly Tuttle and Billy Strings, channels the energy
    of these experiences into metal sculptures that echo bourbon barrel textures, and they proudly showcase their work at the Lexington Art League’s monthly exhibit.
  travel: Harold Robinson, who balances a demanding schedule with a love for road‑tripping, has ridden vintage motorcycles through the historic bourbon trail towns of Bardstown and Loretto, dreams of a
    fishing expedition to the clear waters of the Ozark National Forest in Arkansas, and plans a summer getaway to the Scottish Highlands to explore whisky distilleries and rugged landscapes.
  culinary: Harold Robinson, a self‑proclaimed bourbon aficionado, relishes bourbon‑glazed pork ribs accompanied by Kentucky burgoo, often cooks freshly caught catfish seasoned with Old Bay and a splash
    of bourbon, and they experiment with hickory‑smoked brisket in a backyard smoker during weekend gatherings.
  core: Harold Robinson, a 40‑year‑old weld‑artist and community‑minded skeptic, blends disciplined metalcraft with bourbon‑inspired creativity, competes vigorously in softball and fishing, hoards spare
    nuts and bolts, and habitually burns the midnight oil on welding projects fueled by strong coffee.
background:
  cultural: Harold grew up in the heart of Kentucky’s Bluegrass region, steeped in Southern hospitality and a strong work‑ethic tradition common among White Anglo‑American families in the area. His family
    background includes generations of tradespeople and a modest, Protestant upbringing that emphasized community involvement and self‑reliance. The local culture—characterized by bourbon heritage, horse
    racing, bluegrass music, and a love for outdoor recreation—has shaped his values and social habits. He maintains ties to regional customs such as sharing meals at family‑style diners, attending county
    fairs, and partaking in bourbon tasting events, while also embracing the broader national appreciation for craft and DIY culture.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick welding", "Arc welding", "Brazing", "Soldering", "Blueprint interpretation", "Metal fabrication", "Industrial safety compliance", "Equipment troubleshooting
