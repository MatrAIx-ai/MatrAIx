  career_goals: Carl aims to obtain CPT certification and pursue a Bachelor's degree in Clinical Laboratory Science within the next three years, positioning himself for a senior medical technologist role
    in a regional hospital. His long‑term ambition is to attend medical school and specialize in hematology, where he can combine his scientific expertise with a passion for patient education through visual
    media. He also envisions developing community health workshops in Tatum that blend art, science, and wellness, and hopes to travel abroad for short‑term research fellowships on blood disorders.
