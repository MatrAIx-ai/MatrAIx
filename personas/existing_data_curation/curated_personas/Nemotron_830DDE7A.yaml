  hobbies: '["Abstract Painting","Digital Illustration","Acoustic Guitar","Poetry Writing","Birdwatching","Hiking","Line Dancing","Volunteer Blood Drives","Improv Theater","Sci‑Fi/Fantasy Reading","Strategic
