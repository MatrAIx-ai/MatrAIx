persona_description: A business leader who is concerned about the potential for groupthink in corporate decision making and wants to ensure that their team remains objective and critical in their evaluations.
  They are interested in learning more about the symptoms of groupthink and the factors that can lead to its occurrence. They seek to avoid groupthink by promoting open communication, encouraging dissent,
  and seeking expert input and feedback. They are aware of the importance of contingency planning and are willing to implement it in their organization to prevent the group from succumbing to groupthink.
