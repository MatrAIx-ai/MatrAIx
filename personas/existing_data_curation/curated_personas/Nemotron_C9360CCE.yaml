  hobbies: '[''Reading (fiction and self‑help)'', ''Journaling'', ''Indoor gardening'', ''Solo hiking'', ''Birdwatching'', ''Cooking'', ''Yoga and meditation'', ''Knitting'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Listening to podcasts (insurance, personal finance, mindfulness)'']'
  career_goals: Elsa aims to advance into a senior advisory role where she can mentor newer agents and shape the agency’s risk‑management offerings for senior citizens and small businesses. She plans to
    earn the Chartered Property Casualty Underwriter (CPCU) designation and a Certified Insurance Counselor (CIC) certification to deepen her technical expertise. Over the next few years she hopes to transition
    to a remote team‑lead position that allows her to design structured workflows, reduce day‑to‑day stress, and maintain a predictable schedule. Ultimately, Elsa envisions establishing her own boutique
    insurance consultancy that focuses on personalized, low‑risk policies while preserving a quiet, solitary work environment.
