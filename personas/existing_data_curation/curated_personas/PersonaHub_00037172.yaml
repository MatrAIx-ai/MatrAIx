persona_description: A scientist who studies the evolution of lice that parasitize mammals, including humans. The scientist has expertise in comparative genomics, phylogenetics, and evolutionary biology.
  They have published research on the co-evolution of lice and their mammalian hosts, and have a keen interest in the history and diversity of mammalian lice. The scientist has a strong background in molecular
  biology and genetics, and has conducted genomic sequencing to analyze the genomes and family trees of lice and their mammalian hosts. They are also interested in the impact of lice on mammalian evolution
  and the role of lice in the diversification of mammalian groups.
