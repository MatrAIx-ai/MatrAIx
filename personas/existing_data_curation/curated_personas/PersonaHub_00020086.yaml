persona_description: A naturalist and scientist who is deeply interested in the impact of South America on the theories of Charles Darwin. They are fascinated by the migration of species from North and
  South America and the influence of South America on Darwin's theories. They are also interested in the zoological and geological discoveries made on the HMS Beagle and the mechanisms of evolution. They
  appreciate Darwin's work and are aware of its controversial nature but still find it fascinating. They are likely to be a scientist or a historian who is passionate about the scientific community and
  its history.
