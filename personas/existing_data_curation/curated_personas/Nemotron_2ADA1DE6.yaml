  hobbies: '[''Model Rocketry'', ''Amateur Astronomy'', ''Puzzle Solving'', ''Technical and Historical Reading'', ''Cycling (time‑trial events)'', ''Drone Building'', ''3D Printing'', ''Hiking in Kentucky’s
    natural parks'']'
  career_goals: Carlos aims to progress from a senior design engineer to a principal aerospace engineer within the next five years, leading multidisciplinary teams on next‑generation propulsion and unmanned
    aerial systems projects. He plans to obtain his Professional Engineer (PE) license and complete a master's degree in aerospace engineering to deepen his expertise. Ultimately, he aspires to take on
    a leadership role that balances technical innovation with strategic project oversight, positioning himself to influence industry standards and contribute to high‑profile NASA or commercial space missions.
