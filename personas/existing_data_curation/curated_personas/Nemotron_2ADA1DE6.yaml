personas:
  professional: An aerospace engineer, Carlos Gilbert leverages CFD and FEA expertise to optimize aircraft components, channeling his methodical, competitive nature into data‑driven design while maintaining
    meticulously documented workflows and Lean Six Sigma‑styled project efficiency.
  sports: Carlos Gilbert rides with the Bluegrass Cyclists on Lexington’s countryside trails, competes in local solo time‑trial races, tracks performance on Strava, supports the Kentucky Wildcats men’s
    basketball on TV, and follows Lexington SC soccer, all while using a competitive mindset to shave seconds off every lap.
  arts: Carlos Gilbert indulges in technical and historical nonfiction, finds inspiration in Andy Weir’s "The Martian," appreciates the intricate prints of M.C. Escher, listens to Hans Zimmer’s film scores
    while modeling parts, and attends occasional symphony performances to balance analytical work with artistic immersion.
  travel: Carlos Gilbert plans trips with spreadsheet precision, favors destinations offering clear night skies for amateur astronomy, has cycled the Swiss Alps, visited NASA’s Kennedy Space Center, explored
    Iceland’s auroras, and dreams of a solo trek to the Scottish Highlands to launch a custom model rocket under the Northern Lights.
  culinary: Carlos Gilbert enjoys precise cooking, often using a sous‑vide for salmon, crafting homemade pesto with pine nuts, preparing spaghetti carbonara with pancetta, and experimenting with Thai green
    curry using kaffir lime leaves, while consistently ordering Ethiopian single‑origin coffee to fuel early morning CAD sessions.
  core: Carlos Gilbert blends a methodical engineering mindset with a competitive solitary streak, channeling curiosity into model rockets, precision finance, and meticulous self‑care, while occasionally
    neglecting small social niceties like regular coffee breaks with colleagues.
background:
  cultural: Carlos grew up in a suburban community in Kentucky with a family heritage rooted in European (primarily German and Irish) ancestry. His upbringing combined Southern hospitality with a Midwestern
    work ethic, emphasizing self‑reliance, punctuality, and community involvement. Although culturally aligned with mainstream American values, he maintains a nuanced awareness of his ethnic lineage through
    family traditions such as holiday gatherings featuring classic European dishes and occasional participation in local heritage festivals. This blend of cultural influences reinforces his pragmatic outlook
    while nurturing an appreciation for disciplined craftsmanship.
attributes:
  skills: '[''Computational Fluid Dynamics'', ''Finite Element Analysis'', ''Aerodynamic Design'', ''SolidWorks CAD'', ''MATLAB Programming'', ''Python Scripting'', ''Systems Engineering'', ''Flight Test
