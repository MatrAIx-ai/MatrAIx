  career_goals: Even at three, Maritha imagines future roles that blend her desire for a clear, predictable routine with her competitive streak. She often says she wants to become a teacher because she
    likes guiding younger children through structured learning activities, and she envisions herself as a top‑ranked teacher who helps every child succeed. She also dreams of being a veterinarian, caring
    for the neighborhood pets she sees on walks, aspiring to be the best animal caregiver. Another favorite ambition is to be a baker, joining her mother in the kitchen to create sweet treats, aiming to
    win bake‑off contests at community events.
