personas:
  professional: Maritha Dove, a three‑year‑old with an uncanny love for routine, proudly declares herself the household “mini‑organizer,” lining up her toy blocks by size each morning and assisting with
    paper‑sorting at her parents’ home office, demonstrating early practicality while happily embracing the flexible chaos of a toddler’s schedule.
  sports: Maritha Dove loves the rhythm of a swing set, participates in the community’s toddler soccer club on Saturday mornings while proudly wearing a New York Knicks jersey during family basketball game
    nights, enjoys splash‑time at the local kids’ swim program in the summer, and cheerfully competes to see who can stack the most sand castles at the beach.
  arts: Maritha Dove sings along to Raffi’s “Baby Beluga,” draws vivid crayon portraits of Blue from "Blue's Clues," claps rhythmically to Sesame Street tunes, and eagerly watches live puppet shows at the
    nearby children's theater, letting music and color shape their playful imagination.
  travel: Maritha Dove delights in road trips to the sunny shores of Myrtle Beach where they build towering sandcastles, looks forward to the magical whirl of Disney World in Orlando with its character
    meet‑and‑greets, and prefers child‑friendly resorts that provide pillow‑fort kits, balancing excitement with the comfort of familiar bedtime routines.
  culinary: Maritha Dove favors cheesy macaroni, bites into crispy chicken nuggets with honey‑mustard dip, savors fresh strawberry slices, proudly helps stir banana pancake batter with their mom, and insists
    on a dash of cinnamon over apple slices, showcasing a palate that blends classic kid staples with a pinch of adventurous flavor.
  core: Maritha Dove is a routine‑loving, three‑year‑old who channels competitive streaks into block towers, hoards coins for later, and navigates the world with calm confidence and a hint of healthy skepticism.
background:
  cultural: Maritha is a Black child raised in Walterboro, South Carolina, where the Lowcountry culture blends Southern hospitality with strong African‑American community traditions. Her family attends
    a close‑knit Baptist church on Sundays, where gospel music and preaching shape her sense of rhythm and values. Family gatherings feature home‑cooked dishes like collard greens, fried fish, and sweet
    tea, and stories from grandparents reinforce respect for elders and communal support. Local events such as the Colleton County Spring Jubilee expose her to folk art, dances, and regional foods, fostering
    a deep connection to her heritage while nurturing a love for routine, practicality, and community involvement.
