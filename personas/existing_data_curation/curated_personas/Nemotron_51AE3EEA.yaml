personas:
  professional: John Santini, a 35‑year‑old bilingual community liaison in Miami, blends meticulous event coordination with a creative eye, using basic graphic design tools to craft inclusive program materials
    while drawing on their curiosity and steady composure to navigate the fast‑paced cultural sector.
  sports: John Santini, an avid supporter of Miami’s sports scene, regularly attends Miami Heat games, follows Inter Miami CF, and participates in weekend pick‑up basketball at a local court, while maintaining
    fitness through early‑morning runs with the Miami Beach Running Club.
  arts: John Santini immerses himself in Miami’s vibrant art district, photographing the Wynwood Walls and drawing inspiration from street photographer Alex Webb, while regularly attending live Cuban jazz
    sessions featuring artists like Celia Cruz’s tribute bands and indie rock shows headlined by The Strokes, fueling his visual storytelling.
  travel: John Santini’s travel style mixes cultural immersion with budget‑conscious planning, having explored Havana’s historic plazas, Barcelona’s modernist architecture, and New Orleans’ Mardi Gras,
    and they now dream of savoring the spice markets of Marrakech and the cherry blossoms of Kyoto on future trips.
  culinary: John Santini experiments in the kitchen by reimagining classic dishes such as ropa vieja with quinoa‑infused rice and pastelitos with a smoky chipotle glaze, favoring ingredients like plantains,
    sofrito, and fresh cilantro, and they often host informal tasting nights for friends to share these modern twists.
  core: John Santini, a curious and steady 35‑year‑old cultural enthusiast, balances community leadership with a love for street photography, salsa dancing, and experimental cooking, all while navigating
    money with disciplined saving and occasional indulgent nights.
background:
  cultural: 'John was born and raised in Miami''s Little Havana neighborhood to first‑generation Cuban immigrants. Growing up bi‑lingual, he celebrated traditional festivities such as Carnaval and Noche
    de San Juan, which nurtured his appreciation for music, dance, and communal gatherings. His parents emphasized the values of hard work, hospitality, and family cohesion, while also encouraging openness
    to broader American culture. This blend of Cuban heritage and the multicultural fabric of Miami has shaped his worldview: he feels comfortable navigating both Spanish‑speaking and English‑speaking circles,
    and he often serves as a cultural bridge in his community. The island’s rich culinary traditions sparked his love for cooking, and the area''s thriving art scene inspired his curiosity for visual expression.
    John’s cultural identity is a dynamic mixture of pride in his Cuban roots and a forward‑looking embrace of the diverse influences that define Miami.'
