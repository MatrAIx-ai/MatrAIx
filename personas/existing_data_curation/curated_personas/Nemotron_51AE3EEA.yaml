  hobbies: '[''Visiting art galleries and street murals'', ''Street photography'', ''Cooking Cuban cuisine with contemporary twists'', ''Salsa dancing'', ''Attending live music concerts'', ''Reading psychology,
    philosophy, and design books'', ''Beach walks'', ''Mindfulness meditation'', ''DIY home improvement projects'', ''Volunteering at community cultural events'']'
  career_goals: John aims to translate his informal community leadership and creative skill set into a stable, full‑time role within Miami's cultural sector. Over the next three years, he plans to secure
    a position as a program assistant or community liaison at a museum, cultural center, or nonprofit that celebrates Latinx heritage. He intends to deepen his knowledge of arts administration through a
    part‑time certificate program. Simultaneously, he dreams of launching a small venture—a weekend pop‑up café featuring Cuban pastries and live salsa sessions—that would merge his culinary passion with
    his event‑planning expertise. Ultimately, he hopes to become a cultural program manager who can design inclusive, innovative experiences that connect diverse Miami neighborhoods.
