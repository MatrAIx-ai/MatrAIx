personas:
  professional: Jose Rodriguez, a 15‑year‑old high‑school student who channels their curiosity and gentle nature into a budding visual artist role, combining traditional papel picado techniques with digital
    illustration tools while leading their after‑school art club in collaborative mural projects, balancing meticulous planning with spontaneous creative bursts.
  sports: Jose Rodriguez, who rarely joins organized team sports, prefers solitary desert hikes and occasional pickup basketball games with friends, follows the El Paso Chihuahuas baseball team, and trains
    at the Pyote Youth Outdoor Club whenever the summer heat eases, balancing a laid‑back approach to fitness with occasional bursts of cardio, and they find peace in the quiet of the desert.
  arts: Jose Rodriguez, an avid sketcher and digital artist who devotes evenings to playing acoustic guitar while listening to Los Tigres del Norte and Arcade Fire, draws inspiration from Frida Kahlo’s
    bold colors and Banksy’s street wit, and fuels their imagination with graphic novels like Sandman and Saga, shaping a unique visual voice.
  travel: Jose Rodriguez, who dreams of photographing the deserts of Arizona and the ancient streets of Mexico City, often explores nearby Guadalupe Mountains on weekend hikes with a camera, prefers low‑cost,
    solo travel that leaves room for sketching in cafés, and they have a bucket‑list destination of Machu Picchu.
  culinary: Jose Rodriguez, who enjoys making homemade tacos al pastor with pineapple and chipotle, experiments with mole sauce using dried chilies and chocolate, and can skillfully prepare fresh guacamole
    with lime and cilantro, yet they often forget to clean the kitchen after cooking, leading to a cluttered workspace.
  core: Jose Rodriguez, a reflective teenage artist who balances intense emotions with a quiet love for sketching, guitar, and desert photography, often overthinking yet finding solace in creative expression,
    and they turn to their journal when the world feels too loud.
background:
  cultural: Jose is a second‑generation Mexican‑American raised in the small West Texas town of Pyote. His family speaks both Spanish and English at home, preserving Mexican traditions such as Día de los
    Muertos, quinceañeras, and family cooking rituals. Growing up in the desert environment of Ward County shapes his appreciation for natural textures and earthy colors. His cultural identity blends Mexican
    folk art motifs with contemporary American influences, and he values community harmony, family solidarity, and service, often participating in local Catholic church events that emphasize togetherness.
