  career_goals: Jose aspires to become a multimedia artist who uses visual storytelling to celebrate Mexican‑American heritage and promote mental‑health awareness. He plans to study graphic design or illustration
    in college, aiming to create community murals, digital artwork, and immersive experiences that foster cultural pride and emotional healing. He also hopes to work as a youth arts facilitator, guiding
    other teenagers in expressing their feelings through creative projects.
