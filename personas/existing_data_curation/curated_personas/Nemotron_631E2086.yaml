  career_goals: Eddie often talks about helping people when he grows up. He imagines becoming a firefighter because he likes clear routines, teamwork, and protecting the community. He also dreams of being
    a teacher, where his love of order and friendly nature can guide younger children. Occasionally, he says he would like to coach a kids' soccer team so he can combine his enjoyment of sports with mentoring
    friends.
