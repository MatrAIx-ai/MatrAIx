  career_goals: Samih often talks about his future career in a way that reflects his love for structure and clear purpose. He dreams of becoming a marine biologist, fascinated by the ocean life he sees
    on Virginia Beach, and imagines following a stepwise path of school, laboratory work, and field research. He also expresses an interest in joining the U.S. Navy as an officer, attracted by the disciplined
    training, teamwork, and opportunities to work on ships that explore the sea. Additionally, he mentions wanting to be a firefighter, valuing the clear responsibilities, community service, and the chance
    to stay calm in high‑pressure situations.
