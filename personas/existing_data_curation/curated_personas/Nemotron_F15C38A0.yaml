  hobbies: '[''Watercolor Painting'', ''Visiting Art Exhibitions'', ''Reading Classical and Contemporary Literature'', ''Gardening'', ''Birdwatching'', ''Local History Preservation'', ''Volunteer Teaching'',
    ''Traveling to Cultural Festivals'', ''Photography'', ''Seasonal Cooking'']'
  career_goals: Although formally retired, Ashley aims to deepen her impact on Red Bluff’s cultural life. She aspires to lead a senior‑focused community arts council that sponsors exhibitions, intergenerational
    workshops, and oral‑history projects preserving the region’s heritage. She hopes to secure funding for a small local gallery that showcases emerging artists alongside historical pieces, thereby bridging
    past and present. A personal ambition is to author a memoir intertwining her life’s journey with reflections on American art movements, and to present a series of lecture‑travel talks at nearby colleges
    and libraries, sharing her accrued knowledge with wider audiences.
