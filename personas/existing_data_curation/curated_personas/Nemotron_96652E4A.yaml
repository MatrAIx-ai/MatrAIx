personas:
  professional: An aspiring junior explorer of knowledge, Riya Quinones approaches picture books and LEGO constructions with methodical curiosity, turning each page and brick into a small experiment that
    satisfies their organized and solitary nature, and they often spend hours arranging pieces in perfect order.
  sports: Riya Quinones is a quiet fan of the Chicago Cubs during spring and the Chicago Bulls in winter, enjoys occasional park jogs by hopping between benches, and belongs to the Lincoln Park Little League
    club where they practice basic soccer drills with the same organized diligence they apply to puzzles.
  arts: Riya Quinones engages with the arts by sketching detailed nature scenes while listening to sitar masterpieces of Ravi Shankar and vibrant scores of AR Rahman, and they spend evenings absorbed in
    picture books by Eric Carle and animated Bollywood songs featuring actors like Shah Rukh Khan, reflecting a quiet love of melody and visual storytelling.
  travel: Riya Quinones prefers low‑key family trips, having delighted in a weekend visit to the Chicago Botanic Garden’s butterfly exhibit and dreaming of a future adventure to the Grand Canyon, while
    they meticulously pack a small notebook for drawing on the go, illustrating their love for quiet discovery.
  culinary: Riya Quinones enjoys a simple palette of cheese pizza and mango lassi, occasionally savoring homemade paneer tikka bites, and loves helping stir a pot of arroz con leche, yet they often sneak
    a handful of gummy bears when no one’s watching, revealing a sweet‑tooth quirk.
  core: Riya Quinones blends a quiet curiosity with methodical order, turning solitary reading, LEGO building, and careful savings into a world where tiny adventures and small quirks—like a secret gummy
    bear stash—define their gentle, organized outlook, and they cherish the calm that fuels their imagination.
background:
  cultural: Riya is a first‑generation American of Indian South Asian heritage. Her parents emigrated from India and maintain cultural traditions at home. She hears Hindi spoken alongside English, celebrates
    festivals such as Diwali and Holi, and enjoys traditional foods like samosas, biryani, and mango lassi. The family places high value on education, respect for elders, and community cooperation. Growing
    up in Ashburn, Virginia, Riya attends a diverse preschool where she interacts with peers from many backgrounds, but her daily life is enriched by South Asian music, dance, and stories shared by her
    grandparents. These cultural influences shape her values of kindness, harmony, and curiosity.
attributes:
  skills: '["Reading simple sentences", "Recognizing letters and numbers", "Counting to 100", "Basic addition with objects", "Fine‑motor coordination (coloring, drawing, LEGO)", "Following multi‑step instructions",
    "Organizing school supplies", "Empathy and peer mediation", "English fluency", "Basic Hindi comprehension"]'
  hobbies: '["Reading picture books", "Drawing and sketching nature scenes", "Building LEGO sets", "Solving jigsaw puzzles", "Playing educational games on tablet", "Listening to Indian classical and Bollywood
    music", "Creating rangoli designs during Diwali", "Nature walks in local parks", "Caring for an indoor spider plant"]'
  career_goals: Riya dreams of growing up to explore the natural world as a scientist. She is especially fascinated by marine life and imagines becoming a marine biologist who studies sea creatures. She
    also enjoys the idea of designing simple computer games that teach other children, so she sometimes pictures herself as a future software engineer focused on educational technology. In either path she
    hopes to work in a quiet, organized setting where she can investigate ideas and create practical solutions.
