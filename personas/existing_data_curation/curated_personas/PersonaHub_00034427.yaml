persona_description: A biologist or researcher working in the field of genetics and molecular biology, particularly focused on the development of genetically modified mosquitoes for population suppression
  and disease control. This individual is likely to have expertise in molecular techniques, genetic engineering, and the use of transgenic mosquitoes in biological research. They may have experience in
  mass rearing, genetics, and the use of insecticides in mosquito control. They are likely to have knowledge of the Sterile Insect Technique (SIT) and its applications in mosquito control, as well as the
  development of RIDL (Release of Insects carrying a Dominant Lethal) strain of Ae. aegypti for field releases in Brazil. They may also have experience in the use of live imaging and microscopy techniques
  in biological research, as well as the use of larva chips for live imaging of neuronal events in 3rd instar larvae.
