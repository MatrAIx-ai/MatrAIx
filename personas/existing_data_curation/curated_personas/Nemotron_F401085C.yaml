personas:
  professional: Carla Dalton, a technically proficient engineer with mastery of AutoCAD, SolidWorks, MATLAB, and Python, blends their structured problem‑solving style with compassionate team leadership,
    using Agile and risk assessment to deliver sustainable infrastructure projects on schedule while mentoring junior staff and championing diversity initiatives.
  sports: Carla Dalton competes in a co‑ed volleyball league with the Phoenix Vipers, hikes the Sonoran Desert trails each weekend, supports the Phoenix Suns and Arizona Cardinals as a dedicated fan, and
    joins the local Phoenix Trail Runners club for organized runs during the cooler months, blending competitive spirit with community‑focused fitness and they thrive on the camaraderie of team sports.
  arts: Carla Dalton regularly performs with the improv troupe The Improv Network Phoenix, draws creative inspiration from photographers Ansel Adams and Steve McCurry, enjoys the witty sketches of Tina Fey,
    and attends live music nights featuring indie artists like Tame Impala and Haim, weaving spontaneous collaboration into their artistic identity and they thrive on the immediacy of audience feedback.
  travel: Carla Dalton favors meticulously planned road trips, has explored Sedona’s red rocks, the Grand Canyon, and Joshua Tree, dreams of backpacking Patagonia’s Torres del Paine, and they balance adventure
    with budgetary constraints by using Airbnb stays and off‑season flight deals, always returning home with a new camera lens for the next photo outing.
  culinary: Carla Dalton’s palate is adventurous, mastering dishes such as Mexican chiles en nogada, Mediterranean falafel bowls with tahini, and Japanese ramen with homemade broth, and they relish cooking
    class experiments with ingredients like cumin, fresh cilantro, and smoked chipotle, yet admit to occasionally over‑seasoning in a quest for bold flavor.
  core: Carla Dalton is a structured yet sociable engineer who balances meticulous project delivery with spontaneous creativity, and they turn every hike, improv show, and budget calculation into a collaborative
    adventure.
background:
  cultural: Carla is a White American who grew up in a middle‑class suburban family that valued education, hard work, and community service. Relocating to Scottsdale, Arizona, she has embraced the Southwest’s
    outdoor lifestyle while maintaining the cultural norms of her upbringing. Her background combines a Midwestern emphasis on reliability and practicality with the region’s appreciation for nature, diversity,
    and collaborative community initiatives.
