  hobbies: '[''Hiking and trail exploration'', ''Co‑ed volleyball'', ''STEM outreach volunteering'', ''Improvisational theater'', ''Cooking classes'', ''Yoga'', ''Photography'']'
  career_goals: Carla aims to advance to a senior project engineer role within the next five years, leading cross‑functional teams on sustainable infrastructure projects in the Southwest. She plans to earn
    her Project Management Professional (PMP) certification and develop expertise in green building standards. Long‑term, she envisions moving into an engineering management position where she can shape
    project strategy, champion diversity and inclusion initiatives, and mentor emerging engineers. Additionally, she hopes to contribute her skills to community‑focused pro bono engineering projects that
    improve local public spaces.
