persona_description: A conservation biologist who specializes in the study of beaver populations and their impact on river ecosystems. She is particularly interested in the restoration of beaver streams
  and the potential benefits of beaver modification for river restoration. Her research has focused on the effects of beaver on thickly wooded streams and her findings suggest that beavers can be valuable
  in restoring rivers by creating natural diversity and acting as unpaid maintenance crews.
