  career_goals: Andrew aims to transition into a senior technical leadership role where he can continue coding on challenging projects while mentoring the next generation of programmers. He hopes to lead
    a small team focused on modernizing legacy systems for local businesses, expand his involvement in open‑source projects related to data migration, and eventually become a consultant who helps midsize
    firms in the Upper Midwest adopt cloud solutions. He also wants to establish a community coding club in Willmar that promotes collaborative learning and hands‑on workshops.
