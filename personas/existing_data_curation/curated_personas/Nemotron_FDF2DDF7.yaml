  career_goals: She aims to step into a lead architect or product leadership role where she can guide cross‑functional teams to create technology that merges art, culture, and community impact. Ana is passionate
    about championing inclusive hiring practices, mentoring Latinx women in tech, and eventually launching a side venture—a digital platform that celebrates Mexican folk art through interactive storytelling
    and immersive web experiences. Additionally, she seeks to deepen her expertise in artificial intelligence and machine learning to embed intelligent, user‑centric features while maintaining a flexible
    work schedule that protects her mental wellbeing.
