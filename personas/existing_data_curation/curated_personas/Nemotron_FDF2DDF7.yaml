personas:
  professional: Ana Fernandez, a seasoned full‑stack developer with two decades of experience, blends her business acumen and keen visual aesthetic into user‑centric applications, leading agile teams with
    a collaborative, harmony‑seeking style while mentoring junior developers and championing inclusive hiring practices.
  sports: Ana Fernandez enjoys community yoga sessions, follows the Grand Rapids Griffins and Detroit Lions for her sports fandom, participates in a senior‑friendly recreational softball league, yet her
    preference for flexible, low‑impact activity often means swapping a scheduled hike for a leisurely gardening afternoon.
  arts: Ana Fernandez, an avid painter who frequently visits the Grand Rapids Art Museum, draws inspiration from folk‑art motifs and artists such as Frida Kahlo, Diego Rivera, and Georgia O'Keeffe, curates
    a home gallery of Talavera‑style tiles, and seamlessly integrates these visual influences into her UI designs.
  travel: Ana Fernandez plans trips with a blend of purposeful immersion and relaxed spontaneity, returning annually to her family's hometown across the border to celebrate Día de los Muertos, while also
    exploring the vibrant markets of Oaxaca, the historic streets of Guanajuato, and occasional weekend getaways to Chicago’s culinary scene when budget permits.
  culinary: Ana Fernandez, an enthusiastic home cook, regularly prepares mole poblano with homemade masa, chiles rellenos, and pozole for family gatherings, while experimenting with Midwestern farm‑to‑table
    dishes such as apple‑cider glazed pork, and maintains a modest garden of cilantro, oregano, and heirloom tomatoes that supply fresh ingredients for her cooking.
  core: Ana Fernandez, a 57‑year‑old full‑stack developer and community mentor, blends artistic flair, cultural traditions, and a flexible, harmony‑driven outlook into every facet of life, from code to
    cuisine, while they juggle mild health worries and occasional disorganization.
background:
  cultural: Ana was born in Mexico and moved to the United States as a child, growing up in a bilingual household that celebrated Día de los Muertos, quinceañeras, and traditional Mexican cuisine. Now living
    in Hudsonville, Michigan, she maintains strong ties to the local Mexican community, participating in cultural festivals and sharing family recipes. Her collectivist upbringing fosters a collaborative,
    harmony‑seeking personality, and her appreciation for Mexican folk art influences her design sensibility and personal projects. She often blends Mexican motifs into her work and volunteers to teach
    coding to students from underrepresented backgrounds, honoring both her heritage and her commitment to inclusive community building.
