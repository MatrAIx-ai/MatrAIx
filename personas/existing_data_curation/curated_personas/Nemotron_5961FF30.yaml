personas:
  professional: Roy Fletcher leverages his hands‑on expertise as a telecommunications line installer to blend meticulous fiber‑optic splicing with a pragmatic curiosity, excelling at diagnosing network
    faults while mentoring crews and eyeing a leap to lead‑technician with BICSI certification, even though they often leave tools scattered on job sites due to a relaxed attitude toward organization.
  sports: Roy Fletcher roots for the San Antonio Spurs and Texas Rangers, participates in a local Texas Hill Country hiking club for weekend trail runs, spends early mornings casting at Lake San Marcos
    while swapping fishing stories with fellow anglers, and maintains a modest home‑gym routine to counterbalance sedentary work hours.
  arts: Roy Fletcher strums acoustic guitar inspired by John Mayer and Andy McKee during backyard gatherings, devours science‑fiction novels by William Gibson, listens to the “Tech Talk” podcast for telecom
    trends, and appreciates cinematic scores by Hans Zimmer and the storytelling of author Margaret Atwood, all of which shape their creative downtime.
  travel: Roy Fletcher has road‑tripped to the rugged expanses of Big Bend National Park and the historic streets of Santa Fe, dreams of fishing in Iceland’s emerald lakes, and prefers low‑key RV camping
    adventures that fit their family’s flexible schedule and modest budget.
  culinary: Roy Fletcher’s palate favors smoky Texas brisket, cedar‑plank trout seasoned with lemon‑dill and chipotle, and hearty homemade chili with black beans, and they enjoy tinkering in the kitchen
    just as much as their garage, often grilling over a self‑built wood‑fire pit they crafted themselves.
  core: Roy Fletcher is a curious, hands‑on telecom veteran who balances a love for solitary outdoor pursuits with a relaxed, sometimes messy approach to life, always ready to mentor others while secretly
    hoarding tools and fish lures.
background:
  cultural: Roy identifies as a Texas‑born, white American whose family has deep roots in central Texas. He grew up in a working‑class environment where hard work, modesty, and community support were emphasized.
    The local culture of Southern hospitality, Saturday night high‑school football, and a love for Texas BBQ shapes his social gatherings. He attends a Baptist church in San Marcos and participates in community
    events, reflecting a blend of Midwestern pragmatism and the independent, self‑reliant spirit characteristic of the Texas Hill Country.
attributes:
  skills: '[''Fiber optic splicing'', ''Cable installation and termination'', ''Network troubleshooting'', ''Electrical safety compliance'', ''Pole climbing and aerial work'', ''Reading and interpreting
    technical schematics'', ''GIS mapping for route planning'', ''Technical documentation'', ''Customer service and communication'', ''Basic Python scripting for diagnostic tools'', ''Team collaboration'']'
  hobbies: '[''Fishing at Lake San Marcos'', ''Hiking Texas Hill Country trails'', ''Woodworking projects'', ''DIY electronics tinkering'', ''Reading science‑fiction novels'', ''Listening to technology
    podcasts'', ''Playing acoustic guitar'', ''Volunteering at community tech workshops'', ''Camping trips with family and friends'']'
  career_goals: Roy aspires to advance into a lead‑technician or crew‑supervisor position within the next few years, seeking BICSI Installer and Designer certifications to formalize his expertise. He aims
    to mentor junior installers, develop training modules for safety and best practices, and eventually launch a small, family‑run telecom contracting business that focuses on fiber infrastructure for the
    expanding 5G rollout in Central Texas. While pursuing these goals, Roy prioritizes maintaining a flexible schedule that supports his family life and personal well‑being.
