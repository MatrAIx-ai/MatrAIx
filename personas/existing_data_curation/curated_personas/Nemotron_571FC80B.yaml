personas:
  professional: Janelle Gross is a budding hospitality professional who leverages strong interpersonal and event‑planning skills to coordinate community gatherings, while they balance innovative ideas with
    proven service standards thanks to a curious yet practical mindset.
  sports: Janelle Gross energizes their routine with Zumba classes at the local community center, joins a weekly pick‑up basketball game at the Savannah Sports Complex, and rallies behind the Savannah Bananas
    and the Atlanta Hawks, blending competitive spirit with a love for group fitness.
  arts: Janelle Gross finds creative release in karaoke nights singing Beyoncé and Anderson .Paak, attends the Savannah Blues Festival to hear local guitarist Jimmy O'Neal, and writes spoken‑word pieces
    inspired by Maya Angelou, integrating soul‑full music and poetry into their social life.
  travel: Janelle Gross prefers spontaneous road trips that combine cultural immersion and affordable adventure, having explored Charleston’s historic district, the beach town of Tybee Island, and dreaming
    of a pilgrimage to New Orleans for its jazz heritage, all while budgeting trips through a travel savings envelope.
  culinary: Janelle Gross delights in cooking soulful dishes like collard greens braised with smoked turkey, crispy fried catfish seasoned with Cajun spice, and sweet tea brewed with a hint of mint, showcasing
    a confident home‑chef level that balances tradition with occasional experimental twists like kale‑infused mac & cheese.
  core: Janelle Gross is a socially vibrant, fiercely competitive 24‑year‑old who channels community pride into hospitality ambition, balances cautious budgeting with occasional splurges, and wrestles with
    anxiety through disciplined self‑care.
background:
  cultural: Janelue is a Black woman raised in Savannah’s historic African‑American neighborhoods, where Southern hospitality intertwines with a church‑centered community life. Family traditions feature
    gospel music, Sunday brunches, and neighborhood park gatherings, while the legacy of Savannah’s civil‑rights history instilled values of resilience, self‑advocacy, and collective uplift. She grew up
    savoring soul‑food staples like collard greens, fried catfish, and sweet tea, and was exposed to the city’s vibrant arts scene, from blues festivals to spoken‑word poetry nights. This cultural tapestry
    shapes her strong sense of identity, pride in her heritage, and a commitment to giving back to the community.
