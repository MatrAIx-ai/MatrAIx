  career_goals: Janelue aims to earn her GED within the next year and then enroll in a community‑college program focused on hospitality management or health‑service assistance. She seeks an entry‑level
    position—such as a hotel front desk associate or a nonprofit outreach assistant—where she can apply her people‑skills and event‑coordination experience. Over the next five years she aspires to advance
    into a supervisory role, potentially managing community events or opening a small café that serves as a cultural hub. Parallel to her professional trajectory, she plans to complete a mental‑health first‑aid
    certification to support peers and to cultivate a stable, independent financial future.
