personas:
  professional: Mishal Patel is a 49‑year‑old horticulture‑trained landscape designer who leverages an artistic eye and disciplined project management to deliver eco‑friendly public spaces in the DC metro,
    leading small crews, budgeting precisely, and speaking at sustainability forums while dreaming of launching a boutique studio.
  sports: Mishal Patel enjoys weekday morning runs with the Capital Region Runners, plays competitive doubles tennis at the Bethesda Club, and avidly follows DC United in MLS and the Washington Capitals
    in the NHL, balancing a disciplined fitness routine with occasional lounging after intense painting sessions.
  arts: Mishal Patel channels their imagination into abstract canvases inspired by Jackson Pollock’s drip technique, captures close‑up textures of bark and stone in the style of Sebastião Salgado, plays
    tabla rhythms reminiscent of Ravi Shankar, and regularly attends exhibitions featuring Yayoi Kusama and Anish Kapoor, which fuel their creative practice.
  travel: Mishal Patel prefers meticulously planned trips that blend cultural immersion with natural beauty, having explored the terraced rice fields of Bali, the historic forts of Jaipur, and the volcanic
    landscapes of Iceland, while they dream of designing a public garden in Kyoto’s Arashiyama district.
  culinary: Mishal Patel relishes cooking fusion dishes like tandoori‑spiced roasted cauliflower with locally sourced kale, quinoa biryani seasoned with fresh cilantro and mint, and lentil‑infused kebabs,
    showcasing an intermediate culinary skill set and a love for aromatic spices such as cumin, turmeric, and garam masala.
  core: Mishal Patel fuses disciplined horticultural expertise with avant‑garde art, thrilling crowds at Toastmasters while juggling a garden, a tabla, and a penchant for splurging on rare pigments.
background:
  cultural: Mishal is a first‑generation American of South Asian (Indian) descent. Raised in a bilingual household where Gujarati and English were spoken, he grew up celebrating Diwali, Holi, and family
    gatherings rich with music, dance, and vibrant meals. His cultural heritage fostered an appreciation for bold colors, intricate patterns, and symbolic plant use—such as marigolds and lotus—elements
    that often surface in his landscape designs. Living in Gaithersburg, Maryland, he embraces the area's multicultural diversity, actively participating in local cultural events, community service, and
    sharing his heritage through cooking workshops and garden projects that reflect both his South Asian roots and his American environment.
attributes:
  skills: '[''Landscape design'', ''Hardscape construction'', ''Irrigation system planning'', ''Plant selection and care'', ''Organic pest management'', ''Project budgeting and scheduling'', ''Team leadership'',
    ''Client communication'', ''Creative problem solving'', ''Sustainable landscaping practices'', ''Floral arrangement'']'
  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Reading philosophy and science fiction'', ''Visiting art galleries'', ''Playing tabla'', ''Cooking fusion cuisine'', ''Home gardening'',
    ''Volunteering in community garden projects'', ''Participating in cultural festivals'', ''Public speaking (Toastmasters)'']'
  career_goals: Mishal aims to move from hands‑on groundskeeping to senior landscape architecture and project management roles, eventually launching his own boutique design studio that specializes in culturally
    inspired, eco‑friendly public spaces in the Washington, DC metro area. He seeks to become a recognized speaker on sustainable landscaping, mentor emerging professionals—especially from underrepresented
    communities—and contribute to city‑wide green‑infrastructure initiatives that blend artistic expression with environmental stewardship.
