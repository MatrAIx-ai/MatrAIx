persona_description: A Malawian trade unionist and politician who was imprisoned for two years and later released under pressure from the US vice president, Al Gore, after a democratic election in 1994.
  Chihana was born in Mhuju, a village in what was then the British protectorate of Nyasaland, and became active in the 4000-strong Commercial General Union. He was made secretary-general of the union in
  1958 and later became the union's publicity secretary and magazine editor. He was dismissed from the MCP for challenging the leader's absolute powers and championing independent trade unionism and was
  later abducted in Nairobi and spent six years in Malawian prisons.
