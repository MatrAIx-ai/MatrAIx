personas:
  professional: Elixandra Pimentel is a meticulous junior naturalist who channels their curiosity and love for step‑by‑step instructions into detailed nature journals and small‑group science club experiments;
    they balance creative observation with careful documentation.
  sports: Elixandra Pimentel balances structured team play as a forward on the local Red Hawks youth soccer squad during the spring season with solo fitness habits like early‑morning bird‑watching hikes
    and occasional swimming lessons at the community pool, and they cherish the quiet of the hikes as a way to stay organized yet free.
  arts: Elixandra Pimentel delights in coaxing simple melodies on their keyboard, practicing folk tunes such as "La Llorona," sketching woodland scenes inspired by Beatrix Potter’s illustrations and Claude
    Monet’s watercolors, and they occasionally hum along to the guitar work of Andrés Segovia.
  travel: Elixandra Pimentel favors weekend trips to the nearby forest preserve and day outings to the historic downtown museum, while daydreaming about a future family adventure to Utah’s Zion National
    Park to explore its towering canyons and vivid red rock formations, and they often plan routes on a hand‑drawn map.
  culinary: Elixandra Pimentel eagerly helps prepare family tamales and salsa, savoring the smoky aroma of roasted chilies, the smooth texture of corn masa, and the bright zest of fresh cilantro, and they
    occasionally experiment with lemon‑sugar cookies after following a kid‑friendly recipe from a cooking website.
  core: Elixandra Pimentel is an 11‑year‑old who blends meticulous LEGO building and nature journaling with a tender worry for the world, finding calm in folk melodies and the quiet of the forest, and they
    often turn to sketching when anxiety spikes.
background:
  cultural: Elixandra is a first-generation Mexican-American raised in Channahon, Illinois. At home, Spanish is spoken and Mexican traditions—such as Día de los Muertos, Mexican Independence Day, and family
    gatherings centered around food—are celebrated. She balances these cultural practices with the Midwestern community life of her town, attending local school events and blending American and Mexican
    holidays. Her family's emphasis on close-knit relationships, respect for elders, and hospitality informs her kind and cooperative nature. Elixandra also draws inspiration from Mexican folklore and music,
    which she incorporates into her artistic and musical interests, while her everyday experiences in Illinois shape her practical outlook.
