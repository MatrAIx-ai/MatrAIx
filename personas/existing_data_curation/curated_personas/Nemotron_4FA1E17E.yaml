  hobbies: '[''reading adventure and animal books'', ''drawing/sketching nature scenes'', ''building LEGO models'', ''playing keyboard'', ''listening to and learning Mexican folk songs'', ''cooking family
    recipes (e.g., tamales, salsa)'', ''birdwatching and insect observation at local nature preserve'', ''keeping a personal journal'', ''participating in school science club'']'
  career_goals: Elixandra envisions a future where she can combine her love for animals, science, and caring nature. She aims to become a veterinarian, specializing in community pet health, and hopes to
    one day run a bilingual clinic that offers affordable services to families like hers. She also dreams of participating in wildlife conservation projects, using her scientific curiosity to protect local
    habitats. In the meantime, she plans to excel in high school science courses and join mentorship programs that support Hispanic youth in STEM.
