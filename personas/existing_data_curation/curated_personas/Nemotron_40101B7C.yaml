  career_goals: Lan aims to transition into a senior leadership role—such as Director of Engineering or Chief Technology Officer—where she can shape inclusive engineering cultures and steer innovative product
    strategies that fuse technology with artistic expression. She plans to launch a community‑driven learning platform that teaches coding and digital art to seniors and underserved populations in Michigan.
    Additionally, Lan is committed to contributing to open‑source projects that explore interactive visualizations, and she hopes to mentor the next generation of diverse technologists through speaking
    engagements and workshop series.
