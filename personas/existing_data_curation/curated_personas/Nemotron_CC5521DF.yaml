  hobbies: '[''Painting and sketching'', ''Digital illustration'', ''Photography'', ''Latin dance (salsa, bachata)'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Texas Hill Country'', ''Reading
    philosophy and science fiction'', ''Volunteer tutoring at community centers'', ''Attending live music and art events'', ''Participating in improv comedy workshops'']'
  career_goals: Osmundo aims to launch a socially‑driven creative hub that showcases emerging Mexican‑Texan artists while providing mentorship and micro‑grant programs for underserved youth. He plans to
    obtain a certification in user experience (UX) design to blend his business acumen with his passion for abstract visual storytelling. In the medium term, he envisions a leadership role in a nonprofit
    organization focused on cultural preservation and community empowerment, seeking to create sustainable revenue streams that fund artistic initiatives. A personal ambition is to achieve a balanced lifestyle
    that mitigates his tendency toward worry by integrating regular mindfulness practices and a supportive professional network.
