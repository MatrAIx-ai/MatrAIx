  hobbies: '[''Sketching'', ''Digital art (Procreate)'', ''Minecraft'', ''Roblox'', ''Reading fantasy and sci‑fi novels'', ''Creative writing'', ''Soccer'', ''Playing acoustic guitar'', ''Listening to Latin
    and Bolivian music'', ''Drama club participation'', ''Cooking Bolivian dishes'']'
  career_goals: Juan Ralph aspires to turn his imagination into a profession. He hopes to study visual arts and computer science in high school and later pursue a degree in multimedia design, game development,
    or animation. He is fascinated by the idea of creating interactive stories that blend Andean folklore with modern technology. In the long term, he envisions working as a digital artist or game designer
    while also mentoring younger kids in his community, using his creativity to inspire cultural pride and curiosity. He aims to develop a portfolio that showcases his art, coding projects, and collaborative
    initiatives.
