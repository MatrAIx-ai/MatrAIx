personas:
  professional: Juan Riveron is a budding digital illustrator and aspiring game designer who channels their vivid imagination and balanced organization into detailed Minecraft structures and custom Roblox
    adventures, often leading group projects in the school drama club while keeping deadlines.
  sports: Juan Riveron loves playing soccer at the local park, competes on the Miami United Youth Soccer Club, and follows Inter Miami CF with enthusiasm, and they train three times a week to stay fit while
    also dabbling in swimming during the hot summer months.
  arts: Juan Riveron is a sketch‑loving storyteller who spends afternoons drawing fantasy characters, draws inspiration from Latin pop star Bad Bunny, Andean folk group Los Kjarkas, and video‑game composer
    Jeremy Soule, and they showcase their creations in the school drama club’s set‑design meetings.
  travel: Juan Riveron enjoys planning family trips that blend cultural immersion and fun, having visited La Paz for Carnaval celebrations and Orlando’s theme parks, and they dream of traveling to Tokyo’s
    Akihabara district and Barcelona’s Gothic Quarter to fuel their fantasy storytelling.
  culinary: Juan Riveron often helps their family prepare traditional salteñas and quinoa soup, mastering the perfect ají‑spiced dough and careful filling balance, while also experimenting with homemade
    pizza topped with mozzarella, oregano, and fresh basil, reflecting a curious palate and budding cooking confidence.
  core: Juan Riveron is a creatively restless 13‑year‑old who juggles vivid digital worlds, soccer drills, and lingering worries, and they often stay up late sketching while sneaking extra chips before
    bedtime.
background:
  cultural: Juan Ralph is a first‑generation Bolivian‑American raised in the vibrant multicultural neighborhood of Miami. His family maintains strong ties to Bolivian traditions, celebrating Carnaval, cooking
    dishes such as salteñas and quinoa soup, and speaking Spanish at home. Growing up in Miami, he is also immersed in the city's Latino rhythm, exposed to Caribbean music, diverse cuisines, and bilingual
    education. This blend of Andean heritage and South‑Florida urban culture shapes his identity, fostering bilingual fluency, an appreciation for community festivals, and a keen interest in sharing his
    cultural roots through art and storytelling.
