  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Reading (fiction & non-fiction)'', ''Hiking'', ''Gardening'', ''Community volunteering'', ''Listening to indie/folk
    music'', ''Board games'', ''Attending local festivals'']'
  career_goals: Karlene aims to earn her GED and enroll in an associate‑degree program in transportation logistics or public administration. She plans to obtain a Commercial Driver's License with a passenger
    endorsement and become a certified driver trainer. Her short‑term goal is to advance to a transportation coordinator role within the Lowell school district, overseeing bus routes and safety protocols.
    Long‑term, she hopes to integrate her passion for the arts by establishing an after‑school art outreach program for the students she transports and by volunteering as a docent at a local museum, thereby
    merging community service with creative engagement.
