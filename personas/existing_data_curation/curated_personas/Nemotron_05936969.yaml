  career_goals: Cassandra aims to transition into a senior advisory role where she can shape financial strategy without the day‑to‑day pressures of a full‑time manager. She is driven to mentor the next
    generation of finance professionals, develop community‑focused financial literacy programs, and champion sustainable investment practices within her organization. Balancing her desire for flexibility,
    she envisions a part‑time consultancy that allows more time for personal wellness and family, while still leveraging her expertise to influence corporate decision‑making.
