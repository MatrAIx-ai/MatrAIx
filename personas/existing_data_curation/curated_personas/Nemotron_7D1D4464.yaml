  career_goals: Melissa intends to enroll in a Bachelor's program in Social Work or Human Services at a nearby university, aiming to blend her practical organizing abilities with her desire to support others.
    Her short-term goal is to secure an internship at a community outreach center in Evanston, where she can apply her coordination and counseling skills. Long-term, she hopes to become a case manager for
    at-risk youth, designing structured support programs that promote stability and personal growth. She also aspires to obtain a certification in trauma-informed care to deepen her expertise.
