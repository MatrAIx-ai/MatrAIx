personas:
  professional: Carmencita Silvarojas is a junior digital illustrator and budding interactive storyteller who blends sketching, tablet painting, and Scratch coding to create whimsical narratives, while
    her curiosity and balance of organization and flexibility let her meet school project deadlines and experiment with unorthodox visual ideas.
  sports: Carmencita Silvarojas enjoys casual soccer with the Vallejo Youth Soccer Club during spring, roots for the San Jose Earthquakes and the Golden State Warriors, and balances her competitive streak
    with a habit of stretching and yoga to stay limber after long art sessions.
  arts: Carmencita Silvarojas immerses herself in creating digital paintings inspired by the vibrant colors of Frida Kahlo and the fantastical worlds of Hayao Miyazaki, while she also curates a scrapbook
    of papel picado patterns, jams on the ukulele to songs by Luis Miguel, and gushes over the cinematography of Pixar's Coco.
  travel: Carmencita Silvarojas prefers spontaneous day trips, often exploring the historic streets of San Francisco's Chinatown or the beaches of Santa Cruz, and dreams of traveling to Oaxaca for its Day
    of the Dead festivities and to Kyoto to study traditional paper‑cut art.
  culinary: Carmencita Silvarojas loves helping her family make tacos al pastor and tamales, enjoys the bright tang of fresh salsa verde, reliably fries churros for friends, experiments with adding avocado
    to smoothies, and admits to over‑indulging in sugary treats after long study sessions.
  core: Carmencita Silvarojas is a curious teen artist who blends cultural traditions with digital tech, fiercely competes in school projects, saves diligently for art supplies, and balances a love for
    tacos with a habit of late‑night sketching.
background:
  cultural: Carmencita comes from a Mexican‑American family that celebrates traditions such as Día de los Muertos, quinceañeras, and weekly family meals featuring homemade tacos and tamales. Bilingual at
    home, she often switches between Spanish and English, which enriches her cultural perspective. She participates in a local Mexican cultural association in Vallejo, helping organize community events
    and learning traditional crafts like papel picado, which deeply influence her artistic style.
