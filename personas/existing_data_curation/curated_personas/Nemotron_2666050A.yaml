  career_goals: In the short term, Carmencita aims to build a diverse art portfolio to gain entry into a specialized arts‑focused high school and to earn a scholarship that supports her creative studies.
    Long‑term, she envisions a career as a graphic designer or illustrator who blends contemporary design with Mexican folk motifs, and she aspires to use her skills to create culturally resonant visual
    narratives for community projects and digital media.
