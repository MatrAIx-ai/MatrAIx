persona_description: A researcher in the field of complex systems, particularly in the study of social networks and their behavior. This individual is interested in using data analysis and machine learning
  techniques to monitor and predict the spread of information on social media platforms. They are skilled in using social network analysis tools and have experience with predictive modeling algorithms.
  They are also familiar with the properties of social networks such as the friendship paradox and the concept of sentinel users. They are interested in using this knowledge to understand the dynamics of
  social movements and the spread of information on the internet.
