  career_goals: Rebeca dreams of a future where she can combine her love for helping others with her structured, reliable nature. She aspires to become a teacher or a pediatric nurse, envisioning herself
    guiding younger children in school or caring for kids in a clinic. She also hopes to volunteer in community programs that support families, creating harmonious and well‑organized environments for those
    in need.
