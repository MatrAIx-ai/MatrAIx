personas:
  professional: A budding junior community organizer, Rebeca Munoz coordinates volunteers with a practical, detail‑oriented approach and a contagious, energetic smile, showing they thrive on clear structures
    and teamwork.
  sports: A zealous youth soccer player, Rebeca Munoz shines as a midfielder on the Fort Lauderdale Strikers Youth Academy, cheers for the Miami Dolphins and Inter Miami CF, and keeps fit by swimming at
    the community pool during summer, balancing disciplined training with spontaneous water games that they love.
  arts: An enthusiastic artistic spirit, Rebeca Munoz practices piano twice a week, favoring pieces by Ludovico Einaudi and Beethoven, while reveling in candombe dance sessions at family gatherings and
    idolizing musicians like Carlos Gardel and contemporary pop star Taylor Swift, which inspires them to draw vibrant, rhythmic scenes.
  travel: A curious explorer, Rebeca Munoz has trekked through Everglades National Park on a school field trip, enjoyed sunrise at Key West, visited the vibrant streets of Montevideo with her parents, dreams
    of seeing the tango halls of Buenos Aires, and plans a future family vacation to Barcelona’s seaside, showing they love mixing local adventures with international cultural immersion.
  culinary: A budding junior chef, Rebeca Munoz loves rolling out dough for beef empanadas, assembling chivito sandwiches with chimichurri sauce, and spreading dulce de leche on toast, mastering simple
    recipes with her mother while experimenting with fresh cilantro and sweet corn in her own kitchen creations, proving they relish both tradition and culinary experimentation.
  core: Rebeca Munoz, a ten‑year‑old who blends structured play, compassionate teamwork, and rhythmic traditions into a lively, organized, and caring everyday adventure, exemplifies they can turn any challenge
    into a puzzle to solve.
background:
  cultural: Rebeca comes from an Uruguayan family that preserves the rich traditions of Montevideo and the broader Río de la Plata region. At home, Spanish is spoken alongside English, and she grows up
    listening to tango, murga, and candombe rhythms that accompany family gatherings and Carnaval celebrations. Her parents regularly prepare Uruguayan staples—such as asado, chivito sandwiches, and dulce
    de leche desserts—introducing her to the flavors of her heritage. They celebrate national holidays like Uruguay's Independence Day with folk dances and storytelling. Living in Fort Lauderdale, Rebeca
    blends these customs with Florida's multicultural environment, participating in local community events while retaining a strong connection to her cultural roots.
