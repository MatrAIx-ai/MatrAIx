  hobbies: '[''Gardening'', ''Woodworking'', ''Historical nonfiction reading'', ''Chess'', ''Crossword and Sudoku puzzles'', ''Baking'', ''Cycling'', ''Walking in Oak Park'', ''Community volunteering'',
    ''Genealogy research'']'
  career_goals: Kevin aims to transition into a senior accounting clerk or team lead role within the next few years, where he can oversee a small group of clerks and champion best‑practice accounting procedures.
    He plans to obtain a Certified Bookkeeper (CB) credential to formalize his expertise and stay current with emerging cloud‑based accounting technologies. In parallel, Kevin aspires to mentor younger
    colleagues, sharing his practical knowledge and fostering a collaborative workplace culture. Looking ahead to retirement, he hopes to establish a modest part‑time consulting practice serving local non‑profits
    and small businesses, allowing him to apply his financial acumen while giving back to the Oak Park community.
