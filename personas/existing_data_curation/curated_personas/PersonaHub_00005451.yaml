persona_description: A historian who specializes in the history of Native American tribes, particularly the Haida people. The individual is knowledgeable about the cultural, social, and religious practices
  of the Haida people, including their belief systems and mythology. They have a deep understanding of the roles and significance of death gods like Ta'xet and Tia, as well as the contributions of figures
  like Dzalarhons, Gyhldeptis, Nankil'slas, Lagua, and the shaman. They are also familiar with the use of iron and the concept of subgroups in mathematics, which is evident in the reference to Lagua's voice
  as a shamanic communication technique.
