  hobbies: '[''Sketching and drawing'', ''Watercolor and acrylic painting'', ''Digital art (Procreate, Photoshop)'', ''Photography'', ''Visiting art galleries and museums'', ''Reading science‑fiction and
    fantasy novels'', ''Listening to design and philosophy podcasts'', ''Creative coding (Processing)'', ''Participating in youth art club and mural projects'', ''Meditation and music‑inspired sketching'']'
  career_goals: Beverly aspires to attend a specialized arts‑focused high school or a university program where she can major in Visual Arts, Graphic Design, or Interactive Media. In the long term she hopes
    to become a professional graphic designer or UI/UX designer, creating visually engaging digital experiences that blend aesthetics with functionality. She also has an emerging interest in museum curation
    and hopes to work in a cultural institution where she can design educational exhibits. Her strong organizational nature drives her to aim for leadership positions within creative teams, eventually managing
    projects or directing an art studio. She intends to build a portfolio that earns recognition in local art competitions and online platforms, using her disciplined work ethic to overcome challenges and
    maintain high standards.
