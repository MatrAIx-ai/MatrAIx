personas:
  professional: Beverly Chauvin, an aspiring visual artist and emerging UI/UX designer, combines meticulous organization with a curiosity for innovative design, leveraging proficiency in Adobe Photoshop,
    Procreate, and Python‑based creative coding to turn conceptual sketches into engaging digital experiences.
  sports: Beverly Chauvin enjoys casual soccer with the local youth club and follows the Dallas Cowboys for football and the Houston Rockets for basketball, dedicates early‑morning jogs to maintain stamina,
    and balances their creative schedule with a weekly yoga class to stretch and calm the mind.
  arts: Beverly Chauvin draws inspiration from contemporary artists like Yayoi Kusama, Banksy, and James Turrell, channels the atmospheric soundscapes of Bon Iver and Aphex Twin into music‑inspired sketches,
    and regularly visits the Dallas Museum of Art to study modern installations, integrating these influences into their watercolor, acrylic, and digital illustrations.
  travel: Beverly Chauvin plans travel with the same meticulous notebook used for school projects, favoring weekend getaways to Austin’s vibrant street‑art scene, road trips through the Texas Hill Country,
    and dreaming of an immersive study tour in Barcelona’s design districts, while balancing family budget constraints with a love for spontaneous photo‑journalism.
  culinary: Beverly Chauvin, a moderately skilled home cook, enjoys crafting avocado toast topped with feta and pomegranate seeds, mastering homemade ramen broth with miso and shiitake, and experimenting
    with Texas‑style tacos al pastor seasoned with pineapple and chipotle, often sketching plating ideas before cooking.
  core: Beverly Chauvin is a relentlessly organized teenage artist who turns every notebook margin into a vibrant experiment, yet still forgets to charge their phone nightly.
background:
  cultural: Beverly grew up in Roanoke, a small community in Denton County, Texas. Her family’s roots trace back to European ancestry, and she was raised in a suburban environment that blends the close‑knit
    values of small‑town Texas with easy access to the cultural amenities of the Dallas‑Fort Worth metro area. Local traditions such as county fairs, community volunteer drives, and church gatherings have
    instilled a sense of responsibility and community involvement. At the same time, the diverse artistic scene of nearby larger cities has exposed her to contemporary art, indie music, and modern design,
    shaping her open‑minded, eclectic tastes. She values independence, modesty, and the importance of hard work, while also embracing the progressive, multicultural influences that permeate the broader
    region.
attributes:
  skills: '[''Advanced time-management and planning'', ''Digital illustration (Procreate, Photoshop)'', ''Traditional drawing and painting'', ''Basic Python programming'', ''Creative coding with Processing'',
