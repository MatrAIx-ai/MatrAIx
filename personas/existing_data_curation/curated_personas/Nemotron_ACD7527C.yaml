personas:
  professional: Mariam Wiggins draws on over three decades of concrete finishing, formwork installation, and light‑equipment operation, and they lead crews with pragmatic problem‑solving, mentor younger
    laborers, and pursue an OSHA‑30 and green‑building certification as a stepping stone toward a foreperson‑safety trainer role.
  sports: Mariam Wiggins supports the Detroit Lions, Tigers, Pistons, and Red Wings, participates in the Dearborn Heights Senior Walking Club, and they keep fit through weekly line‑dancing sessions at the
    senior center, occasional trail hikes along the Huron River, and light garden‑lifting as functional exercise.
  arts: Mariam Wiggins volunteers backstage for the local community theater, occasionally steps onto stage in period dramas, devours historical fiction by Philippa Gregory and biographies of Maya Angelou,
    and they find inspiration in the music of Johnny Cash and the paintings of Georgia O'Keeffe.
  travel: Mariam Wiggins prefers road‑trip adventures that blend nature and heritage, having explored Mackinac Island, the Great Lakes shoreline, and the historic streets of Charleston, while dreaming of
    a spring visit to Kyoto’s cherry blossoms and a summer sailing tour of the Greek islands, and they usually plan trips around a fixed budget and family commitments.
  culinary: Mariam Wiggins enjoys experimenting with farm‑to‑table cooking, turning garden‑grown tomatoes, basil, and heirloom carrots into fresh pesto pasta, hearty vegetable lasagna, and occasional shrimp
    étouffée, while they embrace the comfort of homemade apple pie with a crunchy oat topping.
  core: Mariam Wiggins blends hands‑on construction expertise with a community‑centric spirit, balancing meticulous safety standards and a love for line dancing, gardening, and spontaneous genealogy deep
    dives, and they occasionally over‑book volunteer shifts.
background:
  cultural: Mariam was raised in a white, working‑class family in the Detroit suburbs during the 1960s and 70s. Her upbringing emphasized a strong work ethic, self‑reliance, and the importance of community
    ties. She grew up attending a Protestant church, where she learned the value of service, fellowship, and modest celebration of holidays such as Thanksgiving, Christmas, and the Fourth of July. The Midwestern
    culture of the Great Lakes region—practicality, friendliness, and loyalty to neighbors—shapes her worldview and daily interactions. Living her whole adult life in Dearborn Heights, she identifies strongly
    with the local cultural mosaic, blending traditional Midwestern values with the diverse influences of the greater Detroit area.
attributes:
  skills: '[''Concrete finishing'', ''Formwork installation'', ''Basic carpentry'', ''Forklift operation'', ''Skid‑steer operation'', ''Blueprint reading'', ''OSHA safety compliance'', ''Team coordination'',
    ''Problem solving'', ''Mentoring junior workers'']'
  hobbies: '[''Line dancing'', ''Gardening'', ''Volunteering at Dearborn Heights Food Pantry'', ''Community theater involvement'', ''Reading historical fiction'', ''Cooking and recipe experimentation'',
    ''Walking Huron River trails'', ''Genealogy research'']'
  career_goals: Mariam aims to formalize her expertise by completing an OSHA 30‑hour certification and a short certification in green building practices offered by a local community college. She hopes to
    move into a crew foreperson or safety trainer role, where she can lead a small team, conduct on‑site safety briefings, and mentor younger workers. Over the next five years she also plans to start a
    modest side business providing home‑repair and small‑scale renovation services for neighbors in Dearborn Heights, allowing her to stay active in the trade while enjoying more flexible hours.
