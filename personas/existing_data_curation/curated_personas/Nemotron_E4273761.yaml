  hobbies: '[''Pick‑up basketball'', ''Weightlifting'', ''Hip‑hop and R&B music'', ''Reading contemporary fiction'', ''Reading African American literature'', ''DIY home‑improvement projects'', ''Woodworking'',
    ''Fishing'', ''Cooking Southern cuisine'', ''Youth mentorship'', ''Attending cultural festivals'', ''Juneteenth celebrations'', ''Mindfulness meditation'', ''Journaling'']'
  career_goals: Kenneth aims to earn a construction‑management certification and eventually move from first‑line supervisor to site manager or project manager within the next five years. He plans to pursue
    a part‑time Master’s in Construction Management to deepen his technical expertise while maintaining his current responsibilities. Long‑term, he envisions launching a small residential renovation firm
    that emphasizes sustainable building practices and serves the Tallahassee community. He also wants to mentor younger workers, develop stronger stress‑management techniques, and achieve a healthier work‑life
    balance for his family.
