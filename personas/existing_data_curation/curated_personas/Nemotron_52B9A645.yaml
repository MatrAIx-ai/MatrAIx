personas:
  professional: Mary Stewart, a veteran special‑education teacher with a STEM graduate background, designs data‑driven inclusive STEM curricula and leads professional‑development workshops, leveraging her
    methodical planning and skeptical eye to continuously refine instructional practices.
  sports: Mary Stewart enjoys weekend hikes on the Huron‑Manistee Trail, follows the Detroit Lions and the Detroit Red Wings for their strategic play, and volunteers as a fitness coordinator for a local
    community center’s inclusive recreation program, balancing personal fitness with advocacy for adaptive sports.
  arts: Mary Stewart, an avid patron of the arts, regularly attends performances by the Detroit Symphony Orchestra, delights in the contemporary paintings of Kehinde Wiley, and finds inspiration in the
    precision of minimalist composer Philip Glass, which influences her approach to both teaching and woodworking.
  travel: Mary Stewart prefers meticulously planned trips, having explored the Great Lakes shoreline, the historic gardens of Kyoto for inspiration, and a weekend getaway to Door County’s wineries, while
    dreaming of a future research conference in Copenhagen that aligns with her inclusive education goals.
  culinary: Mary Stewart approaches cooking like a lab experiment, perfecting dishes such as sous‑vide salmon with dill, ratatouille layered with zucchini and eggplant, and a meticulously measured chocolate‑chip
    banana bread, always recording adjustments in a kitchen notebook and sourcing fresh herbs from her own garden.
  core: Mary Stewart blends a love for order and creativity, channeling her analytical mind into inclusive STEM teaching, precise woodworking, and exacting culinary experiments, while occasionally letting
    a competitive streak and a penchant for splurging on tool upgrades tip the balance.
background:
  cultural: Mary was raised in a small‑town Midwestern environment in Michigan, where practicality, self‑reliance, and community involvement are core values. Her family’s roots in regional agriculture instilled
    an appreciation for seasonal rhythms and a strong work ethic. As a white American from Lenawee County, she grew up attending local church events, county fairs, and school‑community gatherings that emphasized
    modesty, reliability, and civic duty. This cultural backdrop reinforces her organized, methodical approach to life and her commitment to public education, while also shaping her independent outlook
    following her divorce.
attributes:
  skills: '[''IEP development'', ''Data-driven instruction'', ''Assistive technology integration'', ''STEM curriculum adaptation'', ''Behavior intervention planning'', ''Collaborative co-teaching'', ''Progress
    monitoring'', ''Grant writing'', ''Curriculum mapping'', ''Professional development facilitation'']'
  hobbies: '[''Gardening'', ''Puzzle solving (Sudoku, crosswords)'', ''DIY woodworking'', ''Reading non-fiction (education policy, technology)'', ''Cooking from structured recipes'', ''Hiking local trails'',
    ''Volunteering at community center'']'
  career_goals: Mary aims to advance to a district‑wide Special Education Coordinator role where she can lead the development of an inclusive STEM program for students with disabilities. She plans to pursue
    an Ed.D. in Special Education to conduct research on technology‑enhanced learning, publish articles in peer‑reviewed journals, and become a recognized authority in evidence‑based inclusive practices.
    Over the next five years, she seeks to mentor new teachers, secure grant funding for adaptive equipment, and advocate for policy changes that increase resource allocation for special‑education services
    in Michigan.
