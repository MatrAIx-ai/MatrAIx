  hobbies: '["Reading historical non-fiction", "Gardening", "Woodworking small projects", "Hiking local trails", "Playing acoustic guitar", "Cooking experimental recipes", "Listening to educational podcasts",
    "Solving puzzles (crosswords, Sudoku)"]'
  career_goals: Aramis aims to transition from classroom teaching to a teacher‑leadership role within his school district. He plans to earn a master’s degree in education, focusing on instructional design
    or special education, to formalize his practical approach and gain structured strategies for managing his own stress and organization. His ambition is to become a grade‑level coordinator or curriculum
    specialist, where he can mentor new teachers, design flexible, student‑centered units, and influence professional‑development programs. A secondary goal is to achieve a more sustainable work‑life balance,
    reducing his tendency toward worry by establishing clearer planning routines.
