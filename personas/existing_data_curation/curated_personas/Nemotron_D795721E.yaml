  career_goals: Shabnam aims to complete a degree in Communications or Business while keeping her studies flexible enough to explore interdisciplinary interests. She envisions launching a multicultural
    lifestyle brand that merges South Asian craftsmanship with Texan aesthetics, leveraging her digital storytelling skills to reach a broad audience. In the short term, she seeks internships in content
    creation or community outreach that allow her to apply her curiosity about new ideas while maintaining a practical, results‑oriented approach. Ultimately, she hopes to build a sustainable business that
    supports local artisans and fosters cultural exchange.
