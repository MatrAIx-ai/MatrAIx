personas:
  professional: Shabnam Patel, a sophomore communications major with a talent for digital storytelling, blends their Python automation chops, video‑editing skills, and boutique customer‑service experience
    to produce eye‑catching campus campaigns, while their relaxed, improvisational work style lets them pivot creatively when deadlines shift.
  sports: Shabnam Patel enjoys casual winter basketball pick‑ups at the city park, follows the Dallas Cowboys in the NFL and Austin FC in MLS, and maintains fitness through thrice‑weekly yoga classes at
    a downtown studio, though they often skip scheduled runs when coursework piles up.
  arts: Shabnam Patel immerses themselves in speculative fiction by devouring N.K. Jemisin’s Broken Earth series and Neal Stephenson’s novels, captures candid street moments inspired by Henri Cartier‑Bresson,
    and loses nights at local music festivals listening to Tame Impala and Bad Bunny, weaving these influences into their visual storytelling.
  travel: Shabnam Patel prefers spur‑of‑the‑moment weekend escapades, road‑tripping to New Mexico for desert sunsets or hopping on a cheap flight to Mexico City to roam bustling markets, while dreaming
    of a future solo backpacking trek through Kyoto’s temples and Portugal’s coastal villages.
  culinary: Shabnam Patel, an intermediate home chef, loves experimenting with fusion dishes like tandoori‑spiced paneer tacos topped with chipotle crema and cilantro‑lime rice, constantly mixing garam
    masala, smoked paprika, and mango salsa, and they also hunt down authentic street tacos and chaat from local food trucks.
  core: Shabnam Patel is a curiosity‑driven creator whose kitchen experiments and digital storytelling are offset by a chronic habit of leaving assignments to the last minute and over‑stocking their pantry
    with obscure spices.
background:
  cultural: Shabnam's family hails from Gujarat, India, and settled in Texas a generation ago. Growing up in Tyler, she was raised with a mixture of traditional South Asian values—such as respect for elders,
    emphasis on education, and celebration of festivals like Diwali—and the open, community‑oriented spirit of the American South. Her household observes Hindu customs, including weekly puja and participation
    in cultural events organized by the local Indian-American association. This bicultural experience has given her a strong sense of identity, an appreciation for diversity, and a pragmatic outlook shaped
    by both her heritage and her Texan surroundings.
