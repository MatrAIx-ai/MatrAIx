  career_goals: Lisa aims to advance to a senior management or director role within her company, focusing on diversity, equity, and inclusion initiatives. She wants to further develop her organizational
    and strategic planning abilities by pursuing an associate degree in Business Administration or a professional certification in project management. Long‑term, she envisions founding a community art space
    that offers workshops and mentorship for underserved youth, merging her managerial expertise with her passion for the arts. She also hopes to become a mentor for other Black women professionals, fostering
    supportive networks and promoting workplace harmony.
