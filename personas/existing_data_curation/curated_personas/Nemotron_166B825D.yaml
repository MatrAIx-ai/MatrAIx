  hobbies: '["Reading (science fiction and non-fiction)", "Hiking on Chesapeake Bay trails", "Nature photography", "Vegetable gardening", "Cooking healthy Southern-inspired meals", "Yoga and meditation",
    "Mentoring girls in STEM", "Attending intimate jazz and blues performances", "Crafting (knitting, DIY home projects)"]'
  career_goals: Her primary career ambition is to transition into senior leadership, such as Director of Operations or Vice President of Strategy, where she can shape organizational vision and drive sustainable
    growth. She aims to deepen her expertise in sustainability initiatives, champion diversity and inclusion within technology fields, and obtain certification like PMP and possibly an MBA. Additionally,
    she aspires to mentor emerging Black professionals and eventually launch a consultancy focused on process optimization for socially responsible enterprises.
