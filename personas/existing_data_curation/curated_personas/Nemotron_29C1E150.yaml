  hobbies: '["soccer", "salsa dancing", "guitar playing", "cooking Puerto Rican dishes", "volunteering for community renovation projects", "building wooden crafts", "fishing", "attending local festivals"]'
  career_goals: Alejandro aims to transition from being an employee carpenter to owning a family‑run woodworking workshop that provides high‑quality custom pieces and renovation services throughout Juana
    Díaz and the greater Ponce area. He aspires to become a recognized craftsman who preserves traditional Puerto Rican architectural details, to train the next generation of carpenters through an apprenticeship
    program, and eventually expand his business into sustainable housing projects for low‑income families, thereby strengthening his community while achieving professional excellence.
