  career_goals: Nancy aims to translate her reliability and organizational strengths into a supervisory role within the retail setting, targeting a shift‑supervisor or lead‑cashier position within the next
    two years. To support this move, she plans to complete her GED and enroll in a community‑college retail‑management certificate program. Simultaneously, she wishes to expand her community impact by becoming
    a volunteer coordinator at the local senior center, designing weekly activity schedules and overseeing donation logistics. Long‑term, Nancy hopes to transition into a part‑time administrative support
    role that blends her storefront expertise with her passion for helping others, allowing a stable schedule while contributing to community well‑being.
