  hobbies: '[''Bachata and salsa dancing'',''Cooking Salvadoran cuisine (pupusas, tamales)'',''Soccer'',''DIY home improvement projects'',''Reading construction and sustainability blogs'',''Yoga'',''Painting'',''Journaling'',''Social
    media content creation'']'
  career_goals: Yolanda aims to advance from laborer to a certified construction supervisor within the next five years. She plans to earn an OSHA 30‑hour certification and enroll in a community college
    associate degree program in construction management. Ultimately, she hopes to launch her own small remodeling business that specializes in affordable housing upgrades for immigrant families in Riverside.
    She also wants to become a mentor for other young Latino women entering the trades, advocating for greater diversity on construction sites while securing financial stability for her married life.
