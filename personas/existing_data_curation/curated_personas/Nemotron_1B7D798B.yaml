  hobbies: '[''Abstract Oil Painting'', ''Industrial Photography'', ''Reading Speculative Fiction and Philosophy'', ''Short Story Writing'', ''Chess'', ''Herb Gardening'', ''Visiting Art Museums and Galleries'',
    ''Traveling to Historical European Cities'', ''Attending Local Community Theater'', ''Collecting Vintage Manufacturing Tools'']'
  career_goals: Looking ahead, Andrew aims to transition from frontline selling to a senior advisory role where he can mentor the next generation of sales professionals and influence company‑wide sales
    strategy. He aspires to design and pilot an innovation‑focused sales program that integrates emerging technologies such as AI‑driven lead scoring and virtual product demonstrations. Ultimately, he hopes
    to establish a boutique consultancy that helps midsize manufacturers break into new markets, allowing him to apply his competitive drive and imaginative approach on a broader scale while maintaining
    a flexible schedule for his personal pursuits.
