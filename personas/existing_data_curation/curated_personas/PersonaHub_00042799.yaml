persona_description: A passionate advocate for the Klamath River Basin, particularly the Scott and Shasta Rivers, who is committed to increasing water flows for fish in order to protect the survival of
  native salmon species and the tribal communities that depend on them. This person is knowledgeable about the unique role these rivers play in providing essential habitat for Klamath coho salmon and is
  dedicated to supporting funding criteria that will ensure adequate flows for these rivers. They are also interested in the broader implications of their work, such as the need for long-term solutions
  to address over-allocation of water and illegal water diversions.
