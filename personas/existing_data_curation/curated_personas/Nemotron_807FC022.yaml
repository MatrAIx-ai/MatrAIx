personas:
  professional: Fe Vega, a budding junior architect in the making, applies their methodical LEGO building skills and love for organized crafts to prototype miniature cityscapes, eagerly presenting each
    design at school fairs while maintaining a competitive edge against classmates.
  sports: Fe Vega, a lively member of the Canóvanas Soccer Academy, practices dribbling drills with disciplined focus and showcases a competitive spirit during weekend matches, proudly cheering for the
    Cangrejeros de Santurce baseball team while also following the island’s national soccer team for inspiration.
  arts: Fe Vega, an enthusiastic creator of papel picado and dedicated LEGO builder, channels the rhythms of salsa legend Marc Anthony and reggaetón star Daddy Yankee into spontaneous dance routines at
    family gatherings, while losing themselves in bilingual picture books by authors like Isabel Allende, reflecting a vibrant artistic identity.
  travel: Fe Vega, who loves meticulously planning weekend family outings, relishes sun‑filled days at Luquillo Beach and exploring the cobblestone streets of Old San Juan, while dreaming of a future adventure
    to Disney World in Orlando, balancing cultural immersion with a desire for structured fun.
  culinary: Fe Vega, a budding kitchen assistant, delights in helping Mom roll out dough for guava pastries (pastelitos de guayaba) and sprinkling sazón on arroz con gandules, while also savoring spaghetti
    with tomato‑basil sauce, showcasing a palate that blends traditional island flavors with kid‑friendly comforts.
  core: Fe Vega, a structured yet exuberant six‑year‑old, balances a love for organized LEGO builds and group games with a competitive streak and occasional snack‑time tooth‑brushing neglect.
background:
  cultural: Fe Sofia grows up in a bilingual Puerto Rican household in Canóvanas. Her family celebrates traditional fiestas patronales, enjoys music genres such as bomba, plena, and salsa, and observes
    Catholic holidays. She regularly eats classic dishes like arroz con gandules and empanadillas, learns folk stories, and attends a public school that teaches in both Spanish and English. The close‑knit
    community, emphasis on family gatherings, and vibrant island culture shape her outgoing personality and respect for routine.
