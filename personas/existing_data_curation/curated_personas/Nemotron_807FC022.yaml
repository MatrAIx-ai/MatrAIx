  career_goals: She envisions a future where she can combine structure, helping others, and teamwork. Her primary ambition is to become a kindergarten teacher, because she loves planning lessons and supporting
    classmates in a predictable routine. She also dreams of exploring the sea as a marine biologist, reflecting her curiosity about Puerto Rico’s coast, and occasionally imagines playing on a soccer team,
    channeling her competitive spirit.
