    community arts'', ''Public speaking'']'
  hobbies: '[''Visiting art museums and galleries'', ''Attending community theater productions'', ''Reading historical non‑fiction'', ''Rose gardening'', ''Playing bridge at the senior center'', ''Genealogy
    research'', ''Black‑and‑white photography'', ''Watercolor painting'', ''Walking along River Raisin'', ''Cooking Midwestern cuisine'', ''Yoga'', ''Volunteer story‑time at the library'']'
  career_goals: Even as a seasoned professional, Thelma aims to transition into a part‑time consultancy role that blends her legal expertise with her passion for the arts. She plans to earn an associate‑level
    paralegal certification from Monroe Community College to formalize her knowledge and to qualify for volunteer positions at the local Legal Aid Society, where she hopes to become a senior advisor for
    seniors’ rights cases. Her competitive drive pushes her to be recognized as the go‑to resource for nonprofit arts organizations needing guidance on contracts, intellectual‑property issues, and grant
    compliance. Additionally, she aspires to develop a quarterly workshop series titled “Law and Creativity” that educates local artists on legal protections while fostering community dialogue. Long‑term,
    she hopes to author a concise guide for Michigan seniors on navigating the court system, thereby leaving a lasting educational legacy.
