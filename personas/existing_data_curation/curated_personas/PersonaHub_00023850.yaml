persona_description: A researcher in the field of evolutionary game theory, particularly interested in the concept of the "idea bag" and its impact on the performance of players in an evolutionary game.
  They are familiar with the general tendency that players tend to specialize in a single strategy, even though alternatives exist, and the potential for switching strategies to be detrimental. They are
  also aware of the implications of the gap between the rich and poor appearing to increase linearly with time, though reversion is possible but the poor players in general are doomed to stay poor. They
  are intrigued by the idea of MG generalized to include the Darwinist selection and the potential for mutations in cloning, as well as the potential for the emergence of "learning" in time. They are interested
  in the implications of the "memory" of the agents being irrelevant and the need for an explicit time feedback in order to obtain all the distinctive features of the model.
