personas:
  professional: A diligent respiratory therapist, Matthew Gombar leverages their systematic approach and detail‑oriented mindset to swiftly assess patients’ breathing, execute precise ventilator and oxygen
    therapies, and document meticulously, while also mentoring peers during health‑fair volunteer shifts.
  sports: An avid team player, Matthew Gombar forwards for a co‑ed recreational soccer league in St. Louis, follows the St. Louis City SC, St. Louis Blues, and St. Louis Cardinals, hikes Trail of Tears
    State Park for cardio, and participates in weekly pick‑up basketball games at their local YMCA.
  arts: A creatively inclined socializer, Matthew Gombar belts out karaoke classics from Queen and Beyoncé, they strum rhythm guitar in a garage band covering Foo Fighters and John Mayer, and they regularly
    attend live shows at The Pageant to catch emerging indie acts like Local Natives.
  travel: A weekend explorer, Matthew Gombar plans trips with a spreadsheet, has trekked the Ozarks and hiked Trail of Tears State Park, spent a music‑themed getaway in Nashville, and dreams of a road‑trip
    to Iceland’s geothermal spas when they finally allow a longer escape funded by disciplined savings.
  culinary: A grill‑focused entertainer, Matthew Gombar masters low‑and‑slow BBQ, they regularly smoke St. Louis‑style pork ribs with a brown‑sugar, paprika, and garlic‑powder rub, pair them with homemade
    coleslaw, charred corn on the cob, and baked beans, and they love swapping recipes with friends during board‑game nights.
  core: Matthew Gombar is a structure‑loving respiratory therapist who balances meticulous protocol adherence with spontaneous karaoke performances and backyard BBQs, often juggling a meticulously planned
    schedule while occasionally forgetting to water their houseplants.
background:
  cultural: Matthew grew up in Pacific, a suburban neighborhood in St. Louis County, Missouri. His family is of mixed German and Polish ancestry, a heritage common in the Midwestern region. He was raised
    in a modest, middle‑class household that valued hard work, community service, and modesty. He attended the local public high school, participated in the school’s marching band, and has been an active
    member of his Methodist church, where he continues to volunteer. The cultural fabric of the area—state‑fair foods, St. Louis Cardinals fandom, and a strong emphasis on neighborly support—has shaped
    his practical outlook, collaborative spirit, and love for group activities.
attributes:
  skills: '[''Patient assessment and triage'', ''Oxygen therapy administration'', ''Mechanical ventilation setup and monitoring'', ''Arterial blood gas (ABG) interpretation'', ''Airway management and bronchoscopy
    assistance'', ''Chest physiotherapy techniques'', ''Neonatal and pediatric respiratory support'', ''Emergency response and CPR'', ''Patient education on respiratory health'', ''Electronic medical record
    documentation'', ''Compliance with infection control protocols'', ''Team collaboration and interdisciplinary communication'']'
  hobbies: '[''Recreational soccer'', ''Community health fair volunteering'', ''Barbecue cooking'', ''Karaoke singing'', ''Hiking'', ''Playing guitar'', ''Board game nights'', ''Live music events'']'
  career_goals: Matthew aims to obtain the Registered Respiratory Therapist (RRT) credential within the next two years, then pursue a bachelor's degree in respiratory care or health sciences. He hopes to
    transition into a critical‑care unit at a regional hospital, eventually moving into a supervisory or clinical educator role where he can mentor new therapists and design community outreach programs
    that promote lung health, especially among underserved populations in the St. Louis area. Long‑term, he envisions leading a mobile respiratory‑care service that brings pulmonary rehabilitation to homebound
    patients.
