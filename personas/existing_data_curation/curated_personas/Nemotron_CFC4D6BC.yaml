  career_goals: Devin dreams of a future where he can combine his love for helping people with his curiosity. He imagines becoming a firefighter or a veterinarian, roles that let him protect and care for
    others. He also talks about wanting to be a scientist who discovers new things to make the world safer and healthier. In the short term, he aims to be a helpful class monitor and to lead his soccer
    team as captain, learning leadership skills early.
