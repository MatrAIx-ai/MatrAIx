  hobbies: '[''Bridge (competitive play)'', ''Community gardening'', ''Church fellowship'', ''Local history club'', ''Fishing trips'', ''College football watching'', ''Woodworking'', ''Senior‑center bingo'',
    ''Cooking for potlucks'', ''Storytelling evenings'']'
  career_goals: Although retired, John's ambitions focus on staying physically active, preserving his family's legacy, and continuing to serve his community. He aims to keep his health sufficient to tend
    his garden and attend weekly bridge sessions, and he hopes to complete a handwritten memoir of his life in the Appalachian foothills to donate to the Henderson County historical society. John also aspires
    to mentor a new generation of bridge players at the senior center, passing on his strategic insights, and to ensure that the senior‑center’s annual holiday dinner remains a reliable tradition for the
    town’s older residents.
