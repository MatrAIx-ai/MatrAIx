personas:
  professional: John Todd, a 93‑year‑old retired carpenter and community volunteer, leverages his lifelong hands‑on skills in woodworking, organic gardening, and event coordination to keep the senior center’s
    bingo nights, bridge sessions, and holiday meals running on a tight schedule, and they channel their love of routine and competitive edge into mentoring younger bridge players while cautiously questioning
    new policies.
  sports: John Todd, an avid fan of the Henderson County Wildcats football team, the UNC Tar Heels, and NASCAR driver Kyle Busch, never misses a Saturday game or a race broadcast, and they keep fit by strolling
    through their garden, casting a line on the local pond, and joining the senior‑center’s gentle exercise class each Wednesday.
  arts: John Todd, who spends afternoons woodworking in the local craft circle, enjoys the melodic twang of Alison Krauss, the gospel hymns of his church choir, and classic Westerns starring John Wayne,
    and they eagerly attend the community theater’s annual production of 'Our Town', which fuels their love of storytelling.
  travel: John Todd, who prefers short, leisurely road trips with his longtime fishing buddies, has driven the Blue Ridge Parkway, explored the historic streets of Charleston, SC, and visited the Great
    Smoky Mountains, and they dream of a gentle river cruise on the Mississippi but limit travel to destinations that fit their health schedule and modest budget.
  culinary: John Todd, famed for his buttery buttermilk biscuits, slow‑cooked collard greens with smoked ham hocks, and sweet peach cobbler, enjoys cooking for church potlucks and community gatherings,
    often adding a dash of hot sauce to his fried catfish, though they occasionally over‑salt their dishes in their enthusiasm for flavor.
  core: John Todd, a 93‑year‑old pillar of his Appalachian community, blends steadfast routine with a competitive spirit, worries over every detail, but finds solace in bridge, gardening, and the clatter
    of their woodworking tools.
background:
  cultural: John was born and raised in the rural parts of Henderson County, North Carolina, in a family of long‑time Appalachian settlers. He grew up in a close‑knit, predominantly white community where
    Methodist faith, self‑reliance, and respect for tradition were core values. The region’s agricultural roots shaped his practical outlook, and local customs such as church picnics, high school football,
    and seasonal harvest festivals are integral to his identity. While he has witnessed many cultural shifts over his nine decades, John retains a strong sense of Southern hospitality, a deep respect for
    elders, and a commitment to preserving the stories and values of his heritage.
