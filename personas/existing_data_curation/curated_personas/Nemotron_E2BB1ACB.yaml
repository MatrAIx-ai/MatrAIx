personas:
  professional: Lina Cabrera is a proficient mechanical assembler and fabricator who combines hands‑on curiosity with compassionate coaching, adeptly reading technical drawings, running basic CNC programs,
    and ensuring OSHA safety, yet they sometimes wrestle with meeting tight deadlines because of their spontaneous, flexible nature.
  sports: Lina Cabrera is a weekend trail‑hiker in the San Bernardino Hills, a casual runner who signs up for local 5K events, and an avid fan of the LA Galaxy and Los Angeles Lakers, using community salsa
    classes as their primary cardio workout to stay fit and socially engaged.
  arts: Lina Cabrera channels their creative energy into handmade silver jewelry and knitting while drawing artistic inspiration from Diego Rivera’s vibrant murals, Lila Downs’ soulful vocals, and Guillermo
    del Toro’s imaginative storytelling, frequently attending local gallery openings and indie film screenings.
  travel: Lina Cabrera favors flexible, budget‑friendly travel that balances adventure and cultural immersion, having hiked the cliffs of Big Sur, explored the historic Mission San Juan Capistrano, and
    dreaming of a spring pilgrimage to Oaxaca’s colorful markets, they usually rely on last‑minute hostels and rideshare apps to navigate new cities.
  culinary: Lina Cabrera delights in reimagining classic dishes such as chiles en nogada tacos with quinoa‑stuffed poblanos, smoky chipotle‑marinated grilled vegetables, and a creamy mole sauce infused
    with epazote and queso fresco, showcasing their skillful balance of tradition and culinary experimentation.
  core: Lina Cabrera blends hands‑on engineering with community devotion, impulsive craft purchases, nightly sci‑fi binge‑reading, and a lingering worry habit that fuels both meticulous safety checks and
    occasional insomnia.
background:
  cultural: Lina is a first‑generation Mexican‑American who grew up in a bilingual household in Corona. Her family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Semana Santa,
    and festive gatherings with traditional music, food, and dance. She remains connected to her heritage through regular visits to the local Mexican cultural center, participation in community festivals,
    and cooking recipes passed down from her grandparents. This cultural grounding shapes her values of family, community harmony, and a deep appreciation for craftsmanship.
attributes:
