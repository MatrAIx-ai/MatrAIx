  hobbies: '[''Cooking Mexican cuisine'',''Salsa dancing'',''Hiking local trails'',''Jewelry making'',''Knitting'',''Reading sci‑fi novels'',''Listening to engineering podcasts'',''Volunteering at a food
    pantry'',''Yoga for stress relief'',''Bilingual language practice (Spanish/English)'']'
  career_goals: Lina aims to advance from an assembler to a lead fabricator or production supervisor within the next five years. She plans to earn OSHA and CNC certifications and complete an associate degree
    in manufacturing technology, which will equip her for lean‑process improvement roles. Long‑term, she hopes to combine her technical skills and compassion by mentoring under‑represented youth in trades
    and eventually opening a small, community‑focused workshop that produces sustainable, locally‑made products.
