  career_goals: Lynn aims to advance to a senior HR leadership role, such as HR Director, where she can embed data analytics and innovative, art-inspired approaches into strategic workforce planning. She
    is passionate about building inclusive, resilient cultures that proactively address employee stress and well‑being. Over the next five years, she plans to spearhead organization-wide initiatives that
    integrate mental‑health resources, develop mentorship pipelines for mid‑career professionals, and pilot AI‑driven talent analytics to improve retention. Ultimately, she aspires to become a trusted advisor
    who balances compassionate employee advocacy with measurable business outcomes.
