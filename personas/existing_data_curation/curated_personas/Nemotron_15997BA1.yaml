  career_goals: Jacqueline dreams of turning her love for imagination into a career as a concept artist or visual storyteller for games, film, or indie publishing. She hopes to pursue a fine arts or visual
    communication program at a community college or university, where she can refine her technical skills while maintaining the flexibility she values. Long‑term, she envisions creating a personal brand
    that blends contemporary art with Micronesian cultural motifs, possibly curating community art workshops that celebrate her heritage and promote emotional wellbeing for other young creators.
