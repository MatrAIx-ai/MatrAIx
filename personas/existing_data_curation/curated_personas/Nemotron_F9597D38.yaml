personas:
  professional: Kevin Pitts is a budding residential contractor‑in‑training, leveraging their solid carpentry, basic automotive maintenance, and meticulous budgeting skills to launch a modest home‑services
    business, while they apply a methodical, organized mindset and a curiosity for practical solutions to ensure every project is executed with low‑stress precision.
  sports: Kevin Pitts follows the Dallas Mavericks avidly, hosts watch parties with friends, plays pick‑up basketball at the North Dallas Community Center league on weekends, and they complement the season
    with occasional weight‑training at the local YMCA to stay fit.
  arts: Kevin Pitts channels their creative side through woodworking inspired by master craftsman Sam Maloof, while listening to blues legend B.B. King and attending occasional local gallery openings featuring
    contemporary artist Maya Lin, allowing art to shape both their leisure and design aesthetic.
  travel: Kevin Pitts enjoys planning family‑friendly weekend trips to Hill Country vineyards and the historic streets of New Orleans, while they dream of an immersive woodworking retreat in Chiang Mai,
    balancing a modest travel budget with a desire for cultural discovery.
  culinary: Kevin Pitts is a proficient grill master who regularly smokes hickory‑infused brisket and crafts a sweet‑savory paprika‑brown‑sugar rub for pork ribs, pairing them with buttery cornbread and
    tangy coleslaw, while they also experiment with homemade BBQ sauce using apple cider vinegar and molasses.
  core: Kevin Pitts blends methodical handyman expertise, meticulous budgeting, and a passion for Southern barbecue with a persistent undercurrent of worry, using meditation and journaling to keep stress
    in check while they occasionally over‑indulge in perfecting a wood project.
background:
  cultural: Kevin’s cultural background blends the rich traditions of African‑American Southern life with the close‑knit community values of small‑town Texas. Growing up in a predominantly Black church
    in the Dallas‑Fort Worth metro area, he was immersed in gospel music, soul food, and the emphasis on family and communal support. The local heritage of Texas hospitality and outdoor gatherings influences
    his love for barbecue and weekend sports events. While he respects the broader African‑American history of resilience and social activism, Kevin’s everyday identity is shaped by the everyday rhythms
    of Forney—friendly neighbors, church potlucks, and a strong sense of belonging to the local African‑American community.
attributes:
  skills: '["Carpentry and home repair", "Automotive maintenance", "Budgeting and personal finance", "Event organization", "Youth mentorship", "Power‑tool operation"]'
  hobbies: '["DIY home improvement", "Woodworking", "Reading", "Basketball (NBA fandom)", "Barbecue grilling", "Meditation and journaling"]'
  career_goals: Kevin aims to translate his practical abilities into a sustainable source of income while preserving a low‑stress lifestyle for his family. Over the next two years, he plans to obtain a
    certification in residential HVAC or plumbing through a community‑college trade program, allowing him to launch a modest home‑services business. He also wants to improve his financial stability by completing
    a budgeting course and building an emergency fund. Long‑term, Kevin envisions becoming a reliable contractor who can take on small renovation projects for neighbors, giving him the flexibility to balance
    work with family time and personal interests.
