personas:
  professional: Michael Guenthner is an aspiring junior engineer who channels his passion for assembling LEGO and wooden kits into a meticulous, step‑by‑step problem‑solving approach, and they thrive in
    the school’s robotics club where their competitive spirit and love for structure drive their leadership on design challenges.
  sports: Michael Guenthner is a dedicated member of the Glenwood elementary soccer squad, rushing down the field in the red jersey while cheering for the Iowa Hawkeyes football team on Saturdays, and they
    spend weekend bike rides on the county’s scenic trails, often ending with a quiet moment fishing at Lake Mills.
  arts: Michael Guenthner fuels their imagination through LEGO builds inspired by the YouTuber JANG, devotes evenings to crafting intricate Minecraft landscapes, reads adventure tales by Jules Verne, and
    they enjoy the folk sounds of The Lumineers at the town’s summer concert series.
  travel: Michael Guenthner shares a love for road trips, reminiscing about family outings to the Iowa State Fair in Des Moines and weekend camping in the Loess Hills, and they dream of a future adventure
    to Yellowstone National Park and a transatlantic journey to see the Viking ships at the Oslo Museum.
  culinary: Michael Guenthner enjoys the hands‑on experience of chopping fresh carrots from their family’s garden to toss into a hearty corn chowder, proudly topping homemade pizzas with cheddar cheese
    and a splash of pepperoni, while they save the best pieces of apple pie for the post‑harvest celebration.
  core: Michael Guenthner approaches life like a well‑written blueprint, obsessively sorting LEGO pieces by size, allocating allowance with military precision, yet secretly hoarding candy wrappers in their
    desk for midnight snacking marathons that they indulge in only after lights out.
background:
  cultural: Michael is a white American raised in Glenwood, a small town in Mills County, Iowa. His family’s heritage traces back to German and Scandinavian ancestors, common among the region’s settlers,
    and this background shapes his values of hard work, modesty, and community involvement. He attends the local public elementary school, participates in the town’s Lutheran church, and celebrates Midwestern
    traditions such as the Iowa State Fair, local harvest festivals, and community volunteer events. The rural Midwestern culture emphasizes self‑reliance, teamwork, and practical skills, which have influenced
    Michael’s organized, responsible, and competitive personality.
