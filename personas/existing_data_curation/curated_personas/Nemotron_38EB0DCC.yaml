  career_goals: Michael aspires to a career that blends his love for structure, problem‑solving, and community service. He dreams of becoming a civil engineer, envisioning himself designing safe bridges
    and roads for towns like Glenwood. At the same time, he is drawn to roles such as a firefighter or volunteer first responder, where clear procedures and protecting others align with his practical mindset.
    His competitive nature also fuels a secondary ambition to excel in soccer, aiming for a high‑school varsity scholarship that could support his future studies.
