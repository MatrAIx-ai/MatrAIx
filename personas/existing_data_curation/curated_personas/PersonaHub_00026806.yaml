persona_description: A futurist who advocates for human expansion into the Solar System and is particularly interested in the potential of Earth's moon and other small bodies, especially Earth-approaching
  asteroids, as potential destinations for human exploration and colonization. They believe that the technological requirements and costs are low enough that even the first Earth-approaching asteroid missions
  might be financed by individual entrepreneurs, and that the political costs are likely to be low, with few organizations caring or even paying attention to repeated human flights to nearby asteroids.
  They are likely to be passionate about the potential of space exploration and the opportunities it presents for human civilization, and they are willing to advocate for and support human expansion into
  the Solar System, even in the face of potential risks and challenges.
