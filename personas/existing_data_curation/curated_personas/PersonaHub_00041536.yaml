persona_description: A teacher who is passionate about enhancing the vocabulary and reading comprehension skills of young Amish pupils in parochial schools. They are dedicated to using Pathway's sixth-grade
  reader, Step By Step, as a foundation for the vocabulary work, but are also open to using any reading book. They are mindful of the difficulty level of the words introduced in the workbook and provide
  guidance on how to pronounce them. They aim to make the workbook accessible and engaging for the pupils, and encourage them to use their dictionaries.
