personas:
  professional: Corey Getkin, a 30‑year‑old payroll specialist in North Carolina, leverages advanced Excel, ADP Workforce Now, and QuickBooks Payroll expertise together with a meticulous, organized mindset
    to streamline batch processes and ensure compliance with FLSA and state wage laws, all while they mentor colleagues and champion automation initiatives.
  sports: Corey Getkin follows the Carolina Panthers in the fall, cheers for the Charlotte Hornets during basketball season, plays in a weekend CrossFit Charlotte class, and they maintain a disciplined
    fitness regimen of weightlifting and interval cardio to offset the occasional lower‑back strain from hiking the Blue Ridge foothills.
  arts: Corey Getkin immerses themselves in visual arts by frequenting the Bechtler Museum and galleries in Charlotte, studies the works of Ansel Adams and contemporary street artist Banksy, experiments
    with watercolor inspired by Georgia O’Keeffe, and they often unwind to the folk‑rock sounds of The Avett Brothers and soulful jazz of Norah Jones.
  travel: Corey Getkin plans trips with the same Excel precision, favoring weekend escapes to Asheville’s Blue Ridge trails, cultural tours of Charleston’s historic districts, and annual overseas pilgrimages
    to Kyoto’s temples and Iceland’s geothermal landscapes, and they balance family time with a modest travel budget.
  culinary: Corey Getkin, an adept home cook, perfects Southern classics like shrimp and grits with fresh Gulf shrimp, collard greens sautéed with smoked turkey, and buttermilk biscuits, while they experiment
    with heirloom tomatoes, jalapeño honey glaze, and slow‑roasted pork shoulder for family gatherings.
  core: Corey Getkin blends a Southern work ethic with a curious artist’s eye, obsessively tracks budgets while they snap street photos, occasionally binge‑watch true‑crime documentaries at midnight, and
    they never skip their weekly board‑game night.
background:
  cultural: Corey grew up in Gaston County, North Carolina, a community that blends traditional Southern values with growing diversity. His family placed emphasis on hard work, education, and community
    involvement, often participating in local church events and volunteer activities. While rooted in the cultural heritage of the American South—characterized by hospitality, regional cuisine, and an appreciation
    for outdoor recreation—Corey's curiosity and college experiences broadened his perspective, fostering an enthusiasm for a wide range of artistic and cultural expressions beyond his hometown.
attributes:
  skills: '["Payroll processing", "Timekeeping", "ADP Workforce Now", "QuickBooks Payroll", "Advanced Excel (pivot tables, macros)", "Data reconciliation", "Regulatory compliance (FLSA, NC wage laws)",
