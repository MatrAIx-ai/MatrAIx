  hobbies: '["Photography", "Visiting art galleries and museums", "Watercolor painting", "Reading art history and design books", "Home automation tinkering", "Arduino projects", "Hiking", "Cooking Southern
    cuisine", "Board game nights", "Weightlifting", "Interval cardio workouts", "Listening to jazz and classical music", "Attending community theater"]'
  career_goals: Corey aims to become a certified payroll professional by obtaining the CPP designation within the next two years, while completing a part-time bachelor's degree in Business Administration.
    He aspires to move into a supervisory payroll or HR role, eventually leading a payroll department and contributing to strategic HR initiatives. His long-term ambition is to integrate technology-driven
    automation into payroll operations, improving efficiency and accuracy for his organization. He also hopes to mentor junior staff and, beyond his career, support his family's financial security and engage
    in community financial-literacy programs.
