persona_description: A global human rights activist and scholar who specializes in the study of LGBT rights and persecution in Third World countries. They are deeply concerned about the double struggle
  faced by queer people in these regions and the hijacking of their experiences by liberal savior complexes. They are also aware of the imperialist project in the context of the War on Terror and the use
  of homosexuality as a tool of torture. They are actively involved in campaigns to save queer bodies and sexualities from oppression and persecution, and are critical of the liberal discourse of LGBT rights
  that is often used to justify imperialist narratives.
