personas:
  professional: Jamie Dzafic is a budding naturalist and LEGO architect who combines meticulous observation of rocks and insects with practical building skills, channeling curiosity into organized projects
    while reliably keeping track of their experiments and creations.
  sports: Jamie Dzafic is a team‑oriented midfielder on the Greenfield Wolves youth soccer squad, cheering for the USWNT during weekend games, balancing competitive drills with a love for spontaneous park
    scrimmages, and always ensuring fair play and harmony on the field.
  arts: Jamie Dzafic immerses themselves in creative expression by painting bright landscapes inspired by Mary Blair, composing simple Scratch games that echo the storytelling of Studio Ghibli, and building
    intricate LEGO models that showcase a fascination with geometry and color, all while humming the catchy tunes of kid‑friendly Taylor Swift songs.
  travel: Jamie Dzafic explores local woodlands and streams near home, has camped in the Great Smoky Mountains National Park, dreams of visiting the historic castles of Scotland, and prefers family road
    trips with a flexible itinerary that mixes nature hikes with occasional stops at kid‑friendly museums.
  culinary: Jamie Dzafic enjoys baking chocolate chip cookies and carrot cake muffins with their family, experiments with measuring flour and sugar like a junior chemist, prefers fresh carrot sticks for
    their rabbit, and often volunteers to set the table for dinner, though they occasionally forget to wash their hands before cooking.
  core: Jamie Dzafic blends relentless curiosity with organized practicality, turning every rock, LEGO brick, and soccer drill into a learning adventure while balancing teamwork with quiet moments in nature.
background:
  cultural: Jamie lives in Lexington, Kentucky, an area known for its blend of Southern hospitality and a vibrant horse and bourbon culture. Her family celebrates traditional American holidays such as Thanksgiving
    and Fourth of July with community events, and they often attend local festivals featuring bluegrass music and craft fairs. Her household reflects a middle‑class, multicultural American upbringing, with
    influences from European ancestry (German and Irish) and exposure to the rich agricultural heritage of Woodford County, including visits to nearby farms and horse farms.
