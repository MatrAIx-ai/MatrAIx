personas:
  professional: Floyd Parker, a budding junior storyteller who fuses hand‑drawn cartoons, watercolor scenes, and simple Scratch Jr. games to craft whimsical narratives, often leading classmates in collaborative
    projects while occasionally leaving a trail of crayons and LEGO pieces.
  sports: Floyd Parker, a lively participant in after‑school tag tournaments and a member of the local youth soccer club cheerfully rooting for the Wildcats, who loves organizing scavenger hunts and dancing
    to funk and hip‑hop beats during warm‑up circles.
  arts: Floyd Parker, an enthusiastic watercolorist inspired by artists like Mo Willems and Dr. Seuss, regularly attends neighborhood art workshops and proudly showcases self‑made cartoon strips at school
    talent shows.
  travel: Floyd Parker, a spontaneous explorer who prefers impromptu day trips to the city’s interactive science museum or nearby botanical garden over strict itineraries, and dreams of seeing the giant
    LEGO exhibit in Barcelona while saving allowance for a sunny beach splash park adventure.
  culinary: Floyd Parker, an imaginative snack creator who delights in assembling colorful fruit kebabs with strawberries, grapes, and pineapple, packs a cheese‑and‑cracker lunch for school, and savors
    cheesy pepperoni pizza slices during family movie nights.
  core: Floyd Parker, a curious, art‑driven dynamo who paints, codes, and darts between games with boundless energy, even if their backpack forever resembles a creative tornado.
background:
  cultural: Floyd is raised in a Black family in Waterbury, Connecticut, where African‑American heritage is celebrated through church gatherings, family storytelling, and local cultural events like Juneteenth
    parades and museum visits showcasing Black artists. His parents encourage an appreciation of African diaspora music—jazz, gospel, hip‑hop—and involve him in community programs that highlight the rich
    history of Black residents in New Haven County. This supportive environment nurtures his curiosity, love of art, and openness to diverse ideas.
attributes:
  skills: '["drawing", "storytelling", "basic reading", "basic arithmetic", "building with LEGO", "introductory Scratch Jr. programming", "group facilitation"]'
  hobbies: '["drawing and painting", "reading picture books", "building LEGO sets", "creating Scratch Jr. projects", "playing tag and scavenger hunts", "listening to funk and hip‑hop music", "participating
    in community art workshops"]'
  career_goals: Floyd dreams of becoming an artist who paints bright murals and creates his own comic books, sharing his colorful imagination with the world. He also loves space and imagines one day traveling
    as an astronaut to explore the stars. Beyond personal ambitions, he hopes to lead community art projects that bring his friends together for creative workshops and neighborhood beautification events,
    blending his love of art with a desire to make a positive impact.
