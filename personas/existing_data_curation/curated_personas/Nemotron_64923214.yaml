personas:
  professional: Shana Sanchez, a veteran nonprofit manager with 35 years of experience, applies her meticulous project‑management and budget‑control skills to design a detailed mentorship pipeline that
    captures institutional knowledge while easing staff stress as she eases into a part‑time advisory role.
  sports: Shana Sanchez, an avid birdwatcher who joins the senior walking club at the nearby nature preserve, follows the Atlanta Braves with a seasonal schedule, and occasionally participates in low‑impact
    tennis matches at the community center.
  arts: Shana Sanchez, a devoted aficionado of classical music, fills her evenings with recordings of Beethoven’s Ninth Symphony and Tchaikovsky’s Violin Concerto, attends the regional symphony orchestra
    when time allows, and supports the Southern Heritage Players’ historic stage productions.
  travel: Shana Sanchez, a methodical planner, has trekked the historic streets of Charleston and the Civil War sites of Gettysburg, prefers quiet bed‑and‑breakfast stays in small towns, and dreams of a
    leisurely river cruise along the Danube to explore her ancestral roots.
  culinary: Shana Sanchez, a capable home cook, perfects Southern staples such as shrimp and grits, collard greens seasoned with smoked ham hocks, and pecan pie, often harvesting thyme and basil from her
    low‑maintenance perennial garden to flavor her dishes.
  core: Shana Sanchez, a structured, solitary 73‑year‑old with a penchant for meticulous planning, blends her nonprofit expertise with a love of genealogy, puzzles, and Southern cooking, all while managing
    a gentle worry about health and finances.
background:
  cultural: Shana grew up in Winston-Salem, North Carolina, within a middle-class Southern family that valued self-reliance, modesty, and community service. Raised in a Methodist household, she participated
    in church activities and local historical societies, fostering a deep appreciation for regional heritage. Although her surname reflects a Spanish-origin marriage, her personal cultural identity is rooted
    in the Anglo-American traditions of the Piedmont region, with an emphasis on education, respect for tradition, and civic engagement. She embraces the arts scene of Winston-Salem while maintaining a
    quiet, private lifestyle that reflects her preference for solitude.
