personas:
  professional: An experienced systems engineer and retired consultant, Dallas Setty leverages their expertise in SolidWorks, MATLAB, and Python to design streamlined processes for community projects, mentor
    younger engineers in STEM programs, and produce meticulously documented guides for hobbyist project management.
  sports: An avid hiker and weekend golfer, Dallas Setty regularly conquers Colorado foothill trails, plays Thursday nights at the Littleton Golf Club, follows the Denver Broncos, Colorado Rockies, and
    Colorado Avalanche, and while they occasionally join a local senior tennis league for social interaction.
  arts: A dedicated amateur photographer, Dallas Setty captures alpine landscapes inspired by Ansel Adams and showcases them at the Colorado Mountain Club gallery, while they also enjoy the Colorado Symphony’s
    performances of Beethoven and listen to Yo-Yo Ma’s cello recordings during evenings at home.
  travel: A methodical planner of outdoor adventures, Dallas Setty has trekked the Swiss Alps, explored Patagonia’s Torres del Paine, and dreams of hiking the Dolomites, and they balance long-haul trips
    with shorter weekend getaways to nearby Rocky Mountain National Park for family reunions.
  culinary: An enthusiastic home-brewer and garden-to-table cook, Dallas Setty crafts seasonal craft beers featuring Cascade hops and roasted malt, prepares grilled trout with rosemary and lemon, and whips
    up a hearty roasted root-vegetable medley using produce from their meticulously rotated vegetable garden.
  core: Dallas Setty is a structured, nature-loving engineer who channels disciplined project management into community STEM mentorship, meticulous gardening, craft brewing, and a balanced blend of solitary
    pursuits and social outings, and they approach each task with measured precision.
background:
  cultural: Dallas grew up in a middle-class white family in the American Midwest before moving to Colorado for graduate school. His upbringing emphasized self-reliance, punctuality, and community service—values
    reinforced by the Protestant work ethic and the frontier spirit of Colorado. He carries a pragmatic, no-nonsense approach inherited from his parents, while also appreciating the region’s outdoor culture
    and the tradition of volunteerism that defines Littleton’s suburban community.
attributes:
