  hobbies: '[''Mountain Hiking'', ''Woodworking'', ''Home Brewing'', ''Gardening'', ''Reading Non-fiction (Science & History)'', ''Chess'', ''Photography'', ''Volunteer STEM Outreach'', ''Golf'']'
  career_goals: Although retired from full-time employment, Dallas is driven to remain purposeful. He aims to channel his expertise into structured volunteer programs that bring STEM learning to local schools,
    serve on the Littleton planning commission to improve sustainable infrastructure, and launch a boutique consulting practice focused on energy-efficient home retrofits. He also plans to author a guide
    on disciplined project management for hobbyists, and to maintain his health and family connections through regular outdoor activities.
