persona_description: A high net worth individual or institutional investor who is interested in socially and environmentally responsible investments. They are looking for investments that generate positive
  social and environmental outcomes as well as attractive financial returns. They are willing to allocate a certain percentage of their assets to investments in social and/or environmental areas as separate
  from their overall asset allocation. They are open to investing in different asset classes and investment teams, and they are willing to take on some level of risk. They are looking for solutions to overcome
  some of the challenges associated with these investments, such as lack of historical performance data and lack of knowledge about these investment areas. They are also interested in communicating with
  their pensioners and other stakeholders on these investments and finding ways to mitigate investment risk.
