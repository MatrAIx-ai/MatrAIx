  career_goals: Although John is no longer part of the formal workforce, he aims to turn his practical abilities into a small side venture, crafting custom furniture and decorative pieces for local collectors.
    He plans to obtain a community‑college certificate in carpentry to formalize his skills and hopes to volunteer as a docent for the New Bern Historical Society, sharing his knowledge of the town’s heritage.
    On a personal level, he seeks to complete his GED, deepen his understanding of American art through evening classes, and eventually self‑publish a collection of memoir essays reflecting on his life
    in coastal North Carolina.
