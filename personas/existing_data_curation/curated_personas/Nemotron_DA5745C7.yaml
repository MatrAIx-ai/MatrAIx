personas:
  professional: John Morton, a 59‑year‑old former handyman turned aspiring boutique furniture maker, blends their methodical project planning with spontaneous artistic experimentation to craft one‑of‑a‑kind
    wooden pieces for New Bern collectors while they pursue a community‑college carpentry certificate and volunteer as a historical society docent.
  sports: John Morton, an avid supporter of the Carolina Hurricanes and the UNC Tar Heels, maintains fitness through early‑morning riverside walks for wildlife photography, a weekly senior jogging club
    at the local park, occasional recreational softball games with the New Bern senior league, and a habit of stretching while tending his garden.
  arts: John Morton, whose watercolor landscapes of the Tar River are inspired by Winslow Homer and Andrew Wyeth, takes daily snapshots influenced by Annie Leibovitz, regularly attends the New Bern Artisans
    Guild exhibitions featuring local painter Michael O'Connell, and spends evenings dissecting art‑history tomes to fuse historical narratives into their own creative practice.
  travel: John Morton, who prefers low‑key, budget‑conscious trips, has explored historic Charleston, Savannah, and New York’s museum district, enjoys spontaneous weekend drives to the Outer Banks for sunrise
    photography, and dreams of immersing himself in Paris’s Louvre and Spain’s coastal pueblos once retirement funds allow.
  culinary: John Morton, a modest home cook, delights in preparing heirloom tomato bruschetta with fresh basil, simmering rustic shrimp étouffée seasoned with smoked paprika, and a signature caprese salad
    drizzled with locally sourced balsamic reduction, all while perfecting the art of home‑grown herb blends.
  core: John Morton, a 59‑year‑old retiree with a hands‑on streak, balances an analytical mind and artistic curiosity, turning solitary pursuits into community‑focused creations while wielding a relentless
    competitive edge at every bargaining table.
background:
  cultural: John grew up in a working‑class family in the coastal region of eastern North Carolina. The area’s blend of Southern hospitality, maritime tradition, and historic preservation shaped his values
    of self‑reliance, modesty, and respect for community heritage. Although he never completed high school, his parents encouraged curiosity, taking him to local festivals, fairs, and the regional museum,
    sparking his lifelong appreciation for art and history. He attended a small Methodist church in his youth, which taught him a sense of duty and order, while the town’s diverse cultural events—especially
    those celebrating African‑American Gullah influences and Civil War history—expanded his perspective. Today, John’s identity reflects a mix of traditional Southern roots and an open, inquisitive mindset
    toward new ideas and unconventional experiences.
