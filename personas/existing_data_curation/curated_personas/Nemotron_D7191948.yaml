personas:
  professional: Ignacio Ruiz is a seasoned general maintenance and repair professional who blends their practical curiosity with a calm, reliable approach, excelling in plumbing, electrical troubleshooting,
    HVAC upkeep, and carpentry while consistently adhering to safety standards and bilingual communication.
  sports: Ignacio Ruiz enjoys weekend fishing along the nearby coast, maintains a steady morning jog routine, and follows the San Germán baseball team and the regional soccer club, occasionally joining
    low‑pressure pick‑up games with friends at the community field.
  arts: Ignacio Ruiz immerses themselves in the rhythms of bomba and plena, favoring groups like Los Pleneros de la 21, while reading folklore collections by writer Ana Irma Seijo and crafting wooden furniture
    inspired by the designs of renowned woodworker Joaquín G. Martinez, occasionally attending intimate performances at the local cultural center.
  travel: Ignacio Ruiz prefers low‑key road trips and weekend getaways to nearby coastal towns, carefully planning routes that include quiet fishing coves, with a favorite destination being the historic
    town of Ponce, while dreaming of a sustainable eco‑tour of Costa Rica’s rainforests and gardens.
  culinary: Ignacio Ruiz enjoys preparing mofongo with ripe plantains, sofrito, and chicharrón, simmering arroz con gandules with pork tocino, and pairing meals with freshly caught snapper seasoned with
    adobo and cilantro, often cooking while listening to bomba beats.
  core: Ignacio Ruiz is a calm, hands‑on problem‑solver who weaves their love for practical repairs, quiet reflection, and community stewardship into a lifestyle marked by steady routines, occasional tool‑obsession,
    and a quiet devotion to sustainable, low‑key living.
background:
  cultural: Ignacio was born and raised in San Germán, a town known for its colonial architecture and vibrant patron saint festivals. Growing up in a close‑knit Puerto Rican family, he absorbed the island's
    traditions, including the importance of communal support, humility, and resilience in the face of natural challenges. Spanish is his first language, and he cherishes local customs such as sharing meals
    of arroz con gandules and lechón during holidays. The town's emphasis on craftsmanship and self‑reliance shaped his practical skill set, while the warm, harmonious community values reinforced his cooperative
    and considerate nature. He participates in local cultural events like the San Germán Fest, where he enjoys traditional dance and music, and he maintains a respect for the island's natural environment,
    which informs his interest in sustainable maintenance practices.
