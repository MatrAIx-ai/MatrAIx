  career_goals: Ignacio aims to formalize his expertise by earning certifications in HVAC and electrical work, which will qualify him for supervisory roles in larger facilities such as schools or hospitals
    in the San German area. He aspires to start a small, community‑focused maintenance service that integrates sustainable practices, offering energy‑saving retrofits and green cleaning solutions. Long‑term,
    he hopes to mentor younger workers, sharing his balanced approach to innovation and reliability, while eventually transitioning into a facilities‑management position that leverages his practical problem‑solving
    and calm leadership style.
