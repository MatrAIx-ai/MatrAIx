personas:
  professional: Ladys Castillo, a seasoned electrician with over three decades of residential and light‑commercial wiring expertise, leverages a hands‑on curiosity for solar‑energy tech and a spontaneous,
    improvisational work style to deliver green retrofits while they mentor apprentices through cooperative, safety‑first practices.
  sports: Ladys Castillo, an avid hiker of the Wasatch foothills, participates in the local Horizon Trail Club, enjoys weekend snowshoeing in the Uintas, and cheers for the Utah Jazz and Real Salt Lake,
    favoring low‑impact cardio that fits a flexible schedule they value.
  arts: Ladys Castillo, a quiet connoisseur of traditional folk music, frequently listens to artists such as Lila Downs and José Alfredo Jiménez while attending community theater productions and local art
    fairs, and they collect vintage electrical tool advertisements that double as nostalgic wall art.
  travel: Ladys Castillo, who prefers solitary road trips that blend nature and culture, has explored the national parks of Utah—Zion, Bryce Canyon, and the Grand Canyon—and, driven by a love for heritage
    cuisine, dreams of a culinary pilgrimage to Oaxaca, yet they plan trips meticulously around work‑project timelines and budget constraints.
  culinary: Ladys Castillo, an adept home cook, skillfully prepares tamales and mole using family‑passed recipes, pairs them with fresh herbs from their native Utah garden, experiments with seasonal trout
    dishes, and enjoys the occasional indulgence of extra‑spicy chiles, though they sometimes over‑sauce their mole in pursuit of depth.
  core: Ladys Castillo blends a spontaneous, hands‑on mastery of electrical work with a quiet love for gardening, traditional cooking, and mentorship, and they navigate life with practical curiosity, disciplined
    kindness, and a penchant for occasional tool‑shopping splurges.
background:
  cultural: Ladys grew up in a close‑knit Mexican immigrant family that settled in Utah when she was a child. Bilingual in Spanish and English, she maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Semana Santa, and family reunions with homemade foods and music. Her Catholic upbringing instilled a sense of humility, respect for community, and a strong work ethic—values that
    translate into her cooperative attitude on the job. While she has embraced many aspects of Utah life, such as the outdoors and local community customs, she continues to honor her heritage through language,
    cuisine, and participation in cultural events organized by the Hispanic community in Salt Lake County.
attributes:
  skills: '[''Residential wiring'', ''Electrical troubleshooting'', ''Circuit analysis'', ''Solar panel installation'', ''HVAC electrical systems'', ''Safety inspections'', ''Smart home device configuration'',
    ''Blueprint reading'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Hiking in the Wasatch Mountains'', ''DIY home improvement projects'', ''Tinkering with small electronics'', ''Reading technical magazines'',
    ''Volunteering at community events'']'
  career_goals: 'Ladys aims to obtain her Master Electrician license and a specialized renewable‑energy certification within the next two years. She envisions launching a small, boutique contracting business
    that focuses on green retrofits for older Utah homes, allowing her to blend her practical skills with her curiosity about sustainable technology. Mentoring is a core ambition: she hopes to train more
    women and Hispanic youth as apprentices, creating a supportive network that reflects her cooperative nature. Additionally, she seeks steadier project schedules that reduce deadline pressure, giving
    her the flexibility she values while maintaining a reliable income.'
