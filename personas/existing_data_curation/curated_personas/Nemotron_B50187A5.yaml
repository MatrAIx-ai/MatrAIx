  hobbies: '["Knitting and quilting", "Gardening", "Genealogy research", "Hiking Appalachian trails", "Playing banjo (bluegrass music)", "Crossword puzzles", "Community bingo participation", "Volunteer
    work at the local library", "Cooking traditional Appalachian recipes", "Attending church socials"]'
  career_goals: Alexandria aims to advance from her current clerk role to an office manager position within the next two to three years. To support this goal, she plans to earn her GED and enroll in a community
    college associate program in Administrative Studies, with a focus on office management and leadership. She also intends to obtain a Certified Administrative Professional (CAP) credential to formalize
    her expertise. Long‑term, she aspires to mentor newer staff, implement process‑improvement initiatives that reduce errors and increase efficiency, and secure a stable, well‑compensated role that eases
    her financial worries as she approaches retirement.
