  career_goals: Clara aims to evolve into a senior software engineer who leads multidisciplinary teams creating immersive digital experiences—particularly tools that merge art, culture, and technology,
    such as interactive installations or AR storytelling platforms. She plans to pursue a part‑time computer science degree to deepen her theoretical foundations while continuing to contribute to open‑source
    projects focused on generative design. A long‑term ambition is to found a startup that empowers underrepresented creators—especially Latinx artists—to build and share interactive media. Simultaneously,
    she hopes to mentor emerging developers through community coding workshops and to champion inclusive hiring practices within tech firms.
