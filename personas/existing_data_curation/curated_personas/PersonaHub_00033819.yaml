persona_description: A broadcaster or service provider who is responsible for monitoring and maintaining the quality of live video streams over IP networks. This individual is highly skilled in analyzing
  the timing and loss of each video stream throughout the network and is able to target issues in the IP network and address failures. They have a deep understanding of the MPEG transport stream encapsulated
  into IP packets and the video transport layer, and are able to gain valuable insight into service impairments by analyzing the MPEG layer. They are also familiar with the standards for measuring transport
  stream parameters, including the ATSC and SCTE-142 monitoring models, and are able to set up intelligent filters to reduce the overall number of alarms.
