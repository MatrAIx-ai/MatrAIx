persona_description: A dermatologist who specializes in the diagnosis and treatment of contact allergies, particularly those caused by natural botanical products like poison ivy. They are knowledgeable
  about the different types of contact allergies and the various substances that can cause them, including metals, chemicals, and even eye makeup. They are skilled in conducting patch tests and educating
  patients about the potential for contact allergies to occur even if the patient has no known food or inhalation allergies.
