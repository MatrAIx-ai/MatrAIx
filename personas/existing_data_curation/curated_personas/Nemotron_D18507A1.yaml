    ''community outreach and partnership building'', ''creative problem solving through arts integration'']'
  hobbies: '[''watercolor painting'', ''visiting art galleries and museums'', ''gardening (vegetable and flower)'', ''historical fiction book club'', ''birdwatching on the prairie'', ''patient advocacy
    volunteering'', ''yoga and mindfulness meditation'', ''cooking healthy seasonal meals'', ''community theater attendance'', ''knitting and crocheting'']'
  career_goals: Beverly aims to lead a regional health‑service transformation that integrates telehealth and mental‑wellness programs for seniors, positioning her organization as a model for holistic care
    in rural Minnesota. She intends to mentor the next generation of health‑service managers, champion diversity in thought by introducing unconventional ideas from the arts, and eventually transition into
    a senior advisory role that allows her to shape statewide health‑policy while maintaining a balanced, low‑stress lifestyle as she approaches retirement.
