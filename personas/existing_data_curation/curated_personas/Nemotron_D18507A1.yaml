personas:
  professional: Beverly Burkett, a seasoned health‑services manager with over 30 years of experience, blends meticulous budget oversight, regulatory compliance, and quality‑improvement leadership with a
    curiosity for health informatics and a flair for integrating artistic aesthetics into clinical environments, all while mentoring staff and championing patient‑centered telehealth solutions for seniors.
  sports: Beverly Burkett follows the Minnesota Vikings and Twin Cities Twins avidly, attends select home games at U.S. Bank Stadium and Target Field, joins a local senior walking club for sunrise walks
    along the Mississippi River in the summer, and occasionally volunteers as a timer for community 5K runs, preferring low‑impact activities that blend social interaction with mild exercise.
  arts: Beverly Burkett, an avid watercolorist, draws inspiration from Monet and Georgia O’Keeffe while painting blooming daisies from her garden, regularly visits the Minneapolis Institute of Art and the
    Walker Art Center, participates in monthly gallery openings featuring emerging Midwest artists, and occasionally attends the annual Art‑A‑Whirl festival to scout unconventional ideas for her health‑service
    projects.
  travel: Beverly Burkett favors thoughtfully planned trips that combine cultural enrichment with relaxation, such as a summer weekend in Mackinac Island to explore historic forts, a fall foliage drive
    through the North Shore of Lake Superior, and a nostalgic pilgrimage to Italy’s Tuscan countryside to study Renaissance frescoes, while staying mindful of travel costs to preserve retirement savings.
  culinary: Beverly Burkett enjoys cooking healthy, seasonal fare like roasted root vegetables with rosemary, beet and goat‑cheese salad, and salmon baked with fresh dill harvested from her garden, frequently
    experiments with herb‑infused olive oils, but admits a guilty pleasure for occasional chocolate lava cake after community potlucks.
  core: Beverly Burkett balances art‑driven curiosity, disciplined health‑service leadership, and a gentle, yet sometimes overly cautious, approach to finances and self‑care, all while tending her garden
    and worrying about the next deadline.
background:
  cultural: Beverly grew up in a predominantly white, Midwestern community in central Minnesota, with German‑Scandinavian roots that emphasize modesty, hard work, and community service. Raised in a Lutheran
    household, she internalized values of stewardship and caring for others, which later guided her career in health‑service management. The close‑knit, rural culture of Waseca County shaped her cooperative
    spirit and appreciation for seasonal traditions such as county fairs, harvest festivals, and the celebration of Thanksgiving and Independence Day with family and neighbors.
attributes:
  skills: '[''healthcare operations management'', ''budget development and oversight'', ''regulatory compliance (HIPAA, state health regulations)'', ''quality improvement and performance metrics'', ''data
