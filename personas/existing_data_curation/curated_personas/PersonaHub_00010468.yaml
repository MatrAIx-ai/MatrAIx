persona_description: A team of researchers and environmentalists who are responsible for monitoring and assessing the quality of groundwater in Iowa, working with the Iowa Department of Natural Resources
  (IDNR), the Iowa Geological Survey (Iowa GS), the US Geological Survey (USGS), the State Hygienic Laboratory (SHL), municipal water operators, state parks, county conservation boards, and well drillers
  to ensure the sustainability of groundwater resources. Their efforts include characterizing the quality of groundwater by aquifer and region, evaluating long-term trends in groundwater quality, assessing
  new or emerging issues of groundwater quality concern, and conducting groundwater quality studies.
