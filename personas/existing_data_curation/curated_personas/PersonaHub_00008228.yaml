persona_description: A molecular biologist who specializes in the study of gene expression and splicing in the adult human brain. This person is interested in exploring the molecular basis of sex differences
  in brain structure, neurochemistry, behavior, and susceptibility to disease. They are curious about the widespread sex differences in gene expression and splicing in the adult human brain and are looking
  for ways to uncover functional consequences of these differences. They are also interested in alternative splicing, a process that greatly increases the diversity of proteins that can be encoded by the
  genome, and how it is involved in disease. This person is dedicated to understanding how the sexes differ in terms of how their genes are expressed in the brain and is looking for ways to release their
  data to others for further analysis.
