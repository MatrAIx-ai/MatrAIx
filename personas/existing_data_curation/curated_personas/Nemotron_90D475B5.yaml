  career_goals: Louisa dreams of becoming a marine biologist who studies sea turtles and the coastal ecosystem, because she loves the beach and tide pools near her home. She also aspires to win her school’s
    science fair, hoping her experiments can help protect marine life. While she enjoys imaginative careers like astronaut or veterinarian, her competitive spirit pushes her to excel academically and aim
    for the top of her class, balancing her big ideas with realistic steps such as joining the school’s environmental club and volunteering at local beach clean‑ups.
