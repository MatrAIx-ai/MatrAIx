personas:
  professional: Louisa Fontenot is an aspiring junior marine biologist and LEGO engineer, blending meticulous observation of tide‑pool ecosystems with practical design skills, and channeling their competitive
    curiosity into detailed nature journals and structured LEGO builds.
  sports: Louisa Fontenot dives into after‑school swim lessons at the community pool and plays forward for the Coastal Kids Soccer Club, cheering passionately for the San Diego Wave FC during the spring
    season while maintaining a competitive edge that drives them to practice dribbling drills daily and occasionally compare lap times with their older brother, often blending organized training with spontaneous
    water‑play games.
  arts: Louisa Fontenot loves sketching sea creatures after watching Studio Ghibli’s “Ponyo” and listening to ocean‑themed playlists featuring Jack Johnson, while their admiration for Eric Carle’s collage
    style inspires them to create bright, shell‑shaped art pieces, and they eagerly attend the local children’s theater’s production of “The Little Mermaid” each summer.
  travel: Louisa Fontenot prefers hands‑on coastal adventures, often planning weekend trips to tide‑pool‑rich spots like the Gulf Islands National Seashore with their family, dreaming of a future scuba‑snorkel
    excursion to Australia’s Great Barrier Reef, and balances their love of exploration with a budget‑conscious allowance that limits overseas travel to school field trips.
  culinary: Louisa Fontenot enjoys munching on shrimp tacos with fresh lime and cilantro, loves homemade fish‑shaped crackers made from whole‑wheat flour and seaweed flakes, and despite their beginner cooking
    skill, they proudly whisk together simple fruit salads and assist in baking chocolate chip cookies, often insisting on adding a pinch of sea salt for extra flavor.
  core: Louisa Fontenot is a fiercely curious nine‑year‑old who balances meticulous tide‑pool research with LEGO engineering, hoards seashells like treasure, competes over every coin count, and can be stubbornly
    skeptical about sharing, yet retreats to sketchbooks for quiet storytelling when the world feels too loud.
background:
  cultural: Louisa comes from a White American family with French‑Creole ancestry, reflected in her surname Fontenot. Growing up in Virginia Beach, she experiences a blend of coastal Southern culture and
    suburban community life. Family traditions include weekend beach outings, community festivals, and involvement in her local school’s environmental initiatives. Her upbringing emphasizes independence,
    practical problem‑solving, and a respect for nature, while also valuing education and friendly competition, all of which shape her balanced, curious, and pragmatic outlook.
