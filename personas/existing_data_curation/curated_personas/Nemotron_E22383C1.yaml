personas:
  professional: Courtney Kim, a 38‑year‑old painter and paperhanger in Orlando, blends hands‑on craftsmanship with meticulous project oversight, using their curiosity for specialty finishes and a competitive
    edge to deliver high‑end residential interiors while planning to launch a boutique eco‑friendly finishing firm.
  sports: Courtney Kim enjoys weekend hikes in Ocala National Forest and kayaking on Winter Park’s lakes, competes in local paintball leagues, supports the Orlando Magic and Orlando City SC, and is a member
    of the Ocala Trail Club, using fitness as both recreation and mental reset.
  arts: Courtney Kim is a regular at Central Florida art fairs and design expos, draws inspiration from Kelly Wearstler, Jonathan Adler, and the bold patterns of William Morris, and channels that aesthetic
    into their own wallcovering projects while quoting Banksy’s street‑art wit during trivia nights.
  travel: Courtney Kim prefers road‑trip adventures that balance family time and research scouting, often weekend‑hopping to Asheville’s craft markets, taking an annual trip to Seoul for Korean culinary
    immersion, and dreaming of a future retreat in the Pacific Northwest’s rain‑soaked forests.
  culinary: Courtney Kim mixes moderate cooking skills with a love for Korean BBQ, bibimbap, and Florida’s stone‑crab, often experimenting with low‑VOC natural pigments as edible color inspiration, and
    can’t resist a perfectly grilled snapper with lemon‑butter sauce.
  core: Courtney Kim is a pragmatic creator who balances a competitive drive with DIY curiosity, turning every paint job into a stepping stone toward an eco‑forward boutique while juggling budgeting, health
    tweaks, and a love for both local trails and Korean flavors.
background:
  cultural: Courtney grew up in a middle‑class white family in central Florida, where the subtropical climate and a strong DIY culture fostered her practical outlook. Her parents encouraged self‑reliance
    and hands‑on work, leading her to pursue trade skills early on. Although she completed only some college coursework in interior design, she built her career through apprenticeships and on‑the‑job learning.
    Living in Orlando’s diverse environment, she blends Southern hospitality with the city’s multicultural openness. Her marriage introduces Korean cultural elements into family life—occasional celebration
    of Korean holidays and an appreciation for Korean cuisine—adding a subtle multicultural dimension to her otherwise predominantly American cultural background.
