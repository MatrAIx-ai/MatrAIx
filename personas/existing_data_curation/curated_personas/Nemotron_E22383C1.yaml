  hobbies: '[''DIY home projects'', ''Attending art fairs'', ''Reading design magazines'', ''Hiking'', ''Kayaking'', ''Yoga'', ''Trivia nights'', ''Paintball'', ''Teaching DIY workshops'']'
  career_goals: Courtney aims to transition from a skilled contractor to the owner of a boutique finishing firm that specializes in high‑end residential interiors and custom decorative wallcoverings. Over
    the next three years she plans to obtain OSHA certification, secure a formal trade license, and hire two apprentices to expand her capacity while maintaining quality standards that satisfy her competitive
    drive. She wishes to develop a line of eco‑friendly paint mixes and low‑VOC solutions, positioning her business as both innovative and responsible—a balance of curiosity and practicality. Long‑term,
    she envisions a steady client base that provides financial security for her family and allows her to mentor other tradespeople, leveraging her critical eye to foster continual improvement.
