personas:
  professional: Richard Thomson, a 25-year-old food service manager, leverages their pragmatic eye for cost efficiency and curiosity for culinary trends to lead dynamic front-of-house and back-of-house
    teams, streamline schedules, negotiate with vendors, and experiment with locally sourced menu items while maintaining strict food safety standards.
  sports: Richard Thomson stays active by playing in a local recreational basketball league, bowling with friends on weekends, hiking and fishing in state parks, and cheering on the Nebraska Cornhuskers
    football team and the Kansas City Royals, approaching fitness with a flexible, social mindset rather than a rigid training regimen.
  arts: Richard Thomson finds inspiration in culinary arts and broader culture, regularly binge-watching Anthony Bourdain’s travel specials, listening to Sufjan Stevens’ folk albums while cooking, attending
    live music nights featuring local jazz ensembles, and admiring the work of chef Massimo Bottura for its inventive blend of tradition and modernity.
  travel: Richard Thomson prefers spontaneous road trips that combine scenic hikes with stops at regional food joints, having explored the farm-to-table scene in Asheville, the deep-dish pizza culture in
    Chicago, and dreaming of a culinary pilgrimage to Oaxaca, while balancing travel spontaneity with a modest travel budget.
  culinary: Richard Thomson, a self-proclaimed food enthusiast, experiments with inventive dishes like grilled elk steak with rosemary-infused chimichurri, hand-rolled pasta tossed in locally sourced cornmeal,
    and craft ramen bowls featuring Nebraska-grown beans, while sourcing ingredients from farmers’ markets and honing their skills through nightly home-cooking sessions.
  core: Richard Thomson is a restless 25-year-old who blends a love of food, spontaneous road trips, and collaborative leadership, yet wrestles with a habit of over‑booking their schedule and occasional
    budget laxity.
background:
  cultural: Richard was raised in the Omaha suburbs of Nebraska, growing up in a typical Midwestern environment that values community, hospitality, and practicality. His family’s heritage is primarily Anglo‑American,
    with deep ties to the region’s farming and agricultural traditions. He embraces local customs such as the Omaha County Fair and the Nebraska State Fair, and he takes pride in supporting local producers
    and farmers. The straightforward, friendly demeanor of Nebraskans influences his interpersonal style, and his exposure to the state’s agricultural landscape fuels his interest in farm‑to‑table dining
    and sustainable sourcing.
