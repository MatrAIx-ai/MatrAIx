  hobbies: '[''Recreational basketball'', ''Bowling'', ''Exploring new restaurants'', ''Cooking experimental dishes'', ''Attending food festivals'', ''Hiking in state parks'', ''Fishing'', ''Road trips
    to try regional cuisines'', ''Volunteering at a community kitchen'']'
  career_goals: Richard aims to move beyond his current role as a food service manager to become a general manager of a high‑traffic restaurant or a regional operations manager for a multi‑unit dining concept
    within the next five years. He is interested in pursuing a bachelor’s degree in Hospitality Management to deepen his strategic and financial expertise. Long‑term, he envisions launching his own farm‑to‑table
    eatery that highlights Nebraska’s agricultural bounty while incorporating innovative cooking techniques he discovers through his ongoing curiosity about food trends.
