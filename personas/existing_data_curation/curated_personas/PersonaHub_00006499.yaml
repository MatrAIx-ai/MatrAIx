persona_description: 'The Research Network on Urban Waters Workshop Participant


  This persona is likely to read the above text as they are part of the Research Network on Urban Waters and have attended the workshop to discuss the situation of small waterbodies in Berlin. They are
  interested in the sustainable development of small urban waterbodies and have a keen interest in the role of urban ponds, small lakes, and ditches in the recovery and health care of the urban population.
  They are knowledgeable about the importance of preserving biodiversity and the positive effect of urban ponds on the urban climate and sustainable rainwater management. They are also aware of the challenges
  and options for action and research questions related to promoting the sustainable development of small urban waterbodies in Berlin.'
