  career_goals: Leslie aims to transition into a senior HR leadership role, such as HR Director or Vice President of Human Resources, where she can shape strategic workforce initiatives for a mid-sized
    organization before retiring. She is passionate about mentoring the next generation of HR professionals, especially women, and plans to establish a mentorship program within her company. Additionally,
    she hopes to leverage her experience to launch a part‑time consulting practice focused on helping nonprofit organizations in Staten Island develop robust employee engagement and compliance frameworks.
    On a personal level, she aspires to achieve a balanced retirement that allows more time for community volunteering and travel.
