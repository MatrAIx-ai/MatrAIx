  career_goals: Driven by his love of space, art, and technology, Soon imagines a future where he can explore the cosmos as an astronaut while also creating immersive visual experiences as a video-game
    designer or digital illustrator. He aspires to win his elementary school's science fair with a robotics project, earn a spot on a local FIRST LEGO League team, and one day develop his own interactive
    storybooks that blend his drawings with simple code. In the longer term, he hopes to combine his artistic talents with technical expertise, perhaps leading a creative tech studio that builds educational
    games for children.
