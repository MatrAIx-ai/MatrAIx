personas:
  professional: Soon Mui is a budding multimodal creator who blends sketching, watercolor painting, LEGO engineering, and ScratchJr coding; they approach each project with a curious yet competitively spirited
    mindset, staying reliably organized while welcoming unconventional ideas.
  sports: Soon Mui eagerly attends weekend soccer practice with the neighborhood Tigers Youth Soccer Club, idolizing Manchester United’s attacking style while they balance a competitive drive on the field
    with a habit of stretching and leaf‑collecting hikes that keep them active year‑round.
  arts: Soon Mui spends free afternoons drawing cartoon heroes inspired by Hayao Miyazaki’s animated films and Mo Willems’ picture books, painting delicate watercolors reminiscent of Claude Monet’s early
    sketches, and assembling LEGO recreations of favorite movie scenes, a blend that fuels their imagination and defines their creative identity.
  travel: Soon Mui prefers spontaneous day‑trips to nearby forest trails and the city aquarium, yet dreams of an organized family vacation to the Space Center in Houston and a whimsical visit to Japan’s
    Ghibli Museum, always packing a sketchbook and a stash of collected leaves to document every adventure.
  culinary: Soon Mui enjoys helping prepare holiday meals, especially rolling colorful vegetable dumplings and stir‑frying pineapple fried rice with peas, carrots, and a splash of soy sauce, and they cherish
    tasting new dishes like homemade pizza topped with fresh basil while experimenting with their own simple recipes in the kitchen.
  core: Soon Mui is a curiosity‑driven seven‑year‑old who balances meticulous LEGO engineering and watercolor art with a competitive spirit; they hoard leaves in a journal and often lose track of time while
    sketching.
background:
  cultural: Soon is raised in a bicultural East Asian household where his parents blend traditions from Japan and China, reflected in his name. The family celebrates Lunar New Year with dumplings, sushi
    rolls, and a small dragon dance performed at the local Asian cultural center. He learns basic Japanese kanji characters and Mandarin Chinese pinyin through weekend language classes and enjoys practicing
    calligraphy on rice paper. Regular visits to a local Japanese garden and Chinese cultural festivals expose him to folk music, tea ceremony, and storytelling. Living in Rockville, Maryland, he also experiences
    a diverse suburban environment, attending a public elementary school with peers from many backgrounds, which encourages him to integrate American customs such as Halloween and Thanksgiving while maintaining
    a strong respect for his heritage, academic excellence, and community involvement.
