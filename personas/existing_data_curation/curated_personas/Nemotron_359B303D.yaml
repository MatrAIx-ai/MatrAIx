  hobbies: '[''Cooking and recipe experimentation'', ''Vegetable gardening'', ''Quilting and knitting'', ''Church choir participation'', ''Volunteering for community outreach'', ''Reading self‑help and
    memoirs'', ''Walking along the Arkansas River'']'
  career_goals: Terrika hopes to formalize her education by earning a GED, which she sees as a stepping stone to broader opportunities. She dreams of turning her love of cooking into a modest home‑based
    catering or jam‑making business that serves both her church and the wider Humphrey community, providing healthy, culturally resonant meals. At the same time, she wishes to become a certified community
    health volunteer, leveraging her personal experience with chronic stress and health concerns to help neighbors navigate local resources. Ultimately, she aspires to be recognized as an elder and mentor
    within her church, guiding younger members and fostering harmony.
