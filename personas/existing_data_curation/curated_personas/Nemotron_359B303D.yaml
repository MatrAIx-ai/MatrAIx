personas:
  professional: Terrika Billings is a community‑mind​ed home cook turning their love of Southern soul food into a modest catering and jam‑making venture while they study for a GED and serve as a trusted
    church mediator, balancing curiosity for new recipes with a pragmatic, if sometimes haphazard, approach to business planning.
  sports: Terrika Billings enjoys leisurely walks along the Arkansas River as part of the Riverwalk Runners club, cheers on the Arkansas Razorbacks football team and the Arkansas Travelers minor‑league
    baseball squad on weekends, and occasionally joins a local women's softball league, though they often prioritize community events over intense workouts.
  arts: Terrika Billings sings gospel in their church choir, immerses themselves in quilting patterns from Martha Stewart’s guides, knits blankets for shelter donations, and finds inspiration in the folk
    storytelling of authors like Zora Neale Hurston, all of which enrich their creative spirit despite occasional bouts of perfectionism that slow project completion.
  travel: Terrika Billings prefers short, purposeful trips—day outings to Hot Springs for its historic bathhouses, weekend pilgrimages to New Orleans for culinary inspiration, and an annual visit to Charleston’s
    historic district—yet they budget carefully, often aligning travel plans with church fundraising events to offset costs.
  culinary: Terrika Billings perfects healthy twists on classic Southern dishes such as collard‑green quinoa salad, sweet‑potato oat‑crust pie, and spicy heirloom tomato jam, drawing ingredients from their
    backyard garden of tomatoes, collard greens, and herbs, and they dream of bottling their jams for a home‑based catering business while occasionally burning sauces in their haste.
  core: Terrika Billings is a compassionate, garden‑to‑table cook and church elder who juggles community service, a budding home‑catering dream, chronic stress, and a habit of occasional disorganization,
    and they do so with a warm smile and an ever‑growing quilt of kindness.
background:
  cultural: Terrika’s cultural identity is rooted in African‑American Southern traditions. Raised in Arkansas County, she grew up surrounded by the rhythms of gospel music, the communal bonds of the Black
    church, and the flavors of soul food passed down through generations. Family storytelling, respect for elders, and a strong sense of mutual aid shaped her worldview. While she embraces the broader Southern
    rural lifestyle—farm work, neighborly reciprocity, and county fairs—she also honors the distinctive cultural resilience of Black Arkansans, reflected in her cooking, church involvement, and dedication
    to community cohesion.
attributes:
  skills: '[''Home cooking (Southern soul food and healthy adaptations)'', ''Vegetable gardening'', ''Community mediation and conflict resolution'', ''Compassionate listening and informal counseling'',
