  career_goals: She plans to complete her bachelor’s degree in Public Health or Health Sciences at UMass Dartmouth, focusing on epidemiology and health equity. In the short term, she aims to secure a research
    assistant position within a university lab or community health organization, applying her data analysis and bilingual communication skills to study health outcomes among Asian American populations.
    Long‑term, she aspires to earn a Master of Public Health and become a program manager who designs culturally responsive health‑education initiatives, blending her curiosity for evidence‑based solutions
    with the practical aim of improving community well‑being. Throughout her career she seeks roles that involve small collaborative teams, support work‑life balance, and promote mental‑health awareness.
