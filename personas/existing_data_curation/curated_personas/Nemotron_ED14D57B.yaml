    multiplayer gaming'']'
  career_goals: Erohilda aspires to a career that blends structure, service to others, and interpersonal interaction. She aims to earn a college degree and become a registered nurse or a healthcare administrator,
    where she can use her organizational strengths and compassion to improve patient care. She also considers becoming a teacher or a youth program coordinator, appreciating the predictable schedules and
    the chance to mentor peers. Ultimately, she wants a role that offers clear advancement pathways and allows her to set high standards for herself and her team.
