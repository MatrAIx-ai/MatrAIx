personas:
  professional: Erohilda Ellis, a 15‑year‑old high school student and budding student‑council secretary, leverages her meticulous organization, energetic sociability, and high personal standards to orchestrate
    school events, streamline varsity cheerleading logistics, and keep theater production schedules on track.
  sports: Erohilda Ellis dives into varsity soccer in the fall, pumps up crowds as a cheerleader during the winter football season, hones her skills at the community‑run Northside Soccer Club, and fervently
    follows Chicago’s professional teams, chanting for the Chicago Fire FC and the Chicago Bulls whenever she can catch a game.
  arts: Erohilda Ellis channels her creative energy into school productions of 'Grease' and 'Hamilton,' strums ukulele covers of Jason Mraz’s 'I’m Yours' while humming the latest Taylor Swift chorus, fills
    scrapbooks with Polaroid snapshots of her friends, and cites Lin‑Manuel Miranda and Emma Watson as her artistic inspirations.
  travel: Erohilda Ellis prefers well‑planned, group‑focused trips that blend adventure and shareable moments, having explored Washington, D.C.’s Smithsonian museums, the roller coasters of Orlando’s theme
    parks, and a weekend camping escape in Hocking Hills, while daydreaming about a spring break in Paris and a cherry‑blossom pilgrimage to Kyoto.
  culinary: Erohilda Ellis savors a teenage palate that swings from pepperoni pizza and creamy mac and cheese after soccer practice to beginner‑level avocado‑cucumber sushi rolls she rolls herself, and
    she perfects her fluffy blueberry pancake stack on Saturday mornings, noting each flavor tweak and ingredient swap in her bullet journal.
  core: Erohilda Ellis is a hyper‑organized teen who juggles cheerleading, student‑council duties, and ukulele practice with a relentless habit of over‑scheduling, a tendency to binge‑watch sitcoms late
    into the night, and a secret stash of gummy bears for stress relief.
background:
  cultural: Erohilda grew up in Fort Mill, South Carolina, a suburban community with strong Southern traditions. Her family participates in local church activities, celebrates holidays such as Thanksgiving,
    Christmas, and Fourth of July with community gatherings, and enjoys regional foods like barbecue and pimento cheese. The town’s emphasis on high school sports, especially football and cheerleading,
    influences her social life. While she identifies as white American, she embraces the region’s emphasis on hospitality, respect for elders, and the sense of close‑knit community found in York County.
