personas:
  professional: Sandra Valecillos, an aspiring museum curator with a budding expertise in art history and marketing, leverages their meticulous project‑management skills, Adobe design know‑how, and bilingual
    fluency to organize student exhibitions, secure internships at regional galleries, and prototype inclusive digital curation projects that blend scholarly research with eye‑catching visual storytelling.
  sports: Sandra Valecillos, a dedicated intramural soccer midfielder, applies strategic thinking from debate to the field, favoring the Boston Celtics for their teamwork ethos and joining the Amherst Running
    Club for off‑season conditioning, while also cheering at New England Revolution games whenever a break from coursework permits.
  arts: Sandra Valecillos dives deep into Amherst’s and Boston’s art ecosystems, regularly attending Monet retrospectives at the MFA, live installations by Kehinde Wiley, and experimental performance nights
    at the Umbrella Center; they practice watercolor landscapes of New England’s foliage, edit urban photographs in Photoshop, and mentor younger students at community art workshops, finding inspiration
    in the intersection of classic techniques and contemporary narratives.
  travel: 'Sandra Valecillos favors short, purposeful trips that balance exploration with networking: they weekend‑trip to Cape Cod’s National Seashore for sunrise photography, explore Portland’s quirky
    art districts and food trucks, and plan a spring semester study abroad stint in Florence to deepen curatorial knowledge, all while keeping travel costs low through student discounts and couch‑surfing
    with fellow art majors.'
  culinary: Sandra Valecillos enjoys seasonal farm‑to‑table meals, often crafting roasted beet and goat‑cheese salads, grilled corn tacos with fresh cilantro, and experimenting with a homemade rosemary
    focaccia; their cooking skill is intermediate—enough to whip up a satisfying brunch of avocado toast topped with poached eggs, yet they still crave the occasional artisanal ramen bowl from Boston’s
    Chinatown after a long debate prep.
  core: Sandra Valecillos—18, a curious, methodical, and competitively driven art history major—juggles debate, intramural soccer, watercolor painting, and a relentless habit of overthinking every curatorial
    idea.
background:
  cultural: Sandra was raised in Amherst, Massachusetts, within a middle‑class family that blends European (Irish/Italian) ancestry with Mexican heritage, reflected in her surname Valecillos. Although she
    identifies as white, her household maintains occasional Spanish language use and celebrates cultural traditions such as Día de los Muertos alongside typical New England holidays. Growing up in a town
    known for its liberal arts colleges, she was immersed in a community that values education, artistic exploration, and civic engagement. This environment fostered her curiosity, openness to unconventional
    ideas, and appreciation for diverse cultural experiences, shaping her worldview and personal identity.
attributes:
  skills: '[''Academic research and analytical writing'', ''Event planning and coordination'', ''Public speaking and group facilitation'', ''Debate and strategic thinking'', ''Graphic design (basic Photoshop/Illustrator)'',
