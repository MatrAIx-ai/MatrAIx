  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Urban and nature photography'', ''Intramural soccer'', ''Campus debate club'', ''Exploring new cuisines'', ''Live music and
    theater attendance'', ''Journaling and yoga for stress relief'', ''Puzzle solving and strategy board games'', ''Volunteering at community art workshops'']'
  career_goals: Sandra aims to complete a Bachelor of Arts in Art History with a minor in Marketing, securing internships at regional museums or contemporary galleries to build curatorial experience. She
    aspires to become a museum curator or cultural program manager at a major institution in the Boston area, focusing on inclusive and interdisciplinary exhibitions. In the longer term, she plans to launch
    a community art initiative in Amherst that connects local artists with youth, fostering creative expression and mentorship. Sandra is also interested in pursuing a graduate degree in Museum Studies
    to deepen her expertise in digital curation and public engagement, and she hopes to leverage her organizational strengths to lead innovative projects that bridge art, education, and community development.
