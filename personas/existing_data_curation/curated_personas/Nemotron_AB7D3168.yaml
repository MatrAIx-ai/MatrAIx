personas:
  professional: An aspiring digital storyteller, Susan Bang blends sketching, digital painting, and video editing to craft whimsical narratives for their growing YouTube channel, while their natural sociability
    makes them the go‑to collaborator for school art projects, even as their relaxed approach to deadlines occasionally leaves assignments unfinished.
  sports: Susan Bang spends weekends dribbling a soccer ball with their middle‑school teammates on the local fields, champions the downtown skate park’s open‑air sessions, and follows the National Women’s
    Soccer League’s Portland Thorns with an enthusiasm that spills over into their improvised dance routines at school assemblies.
  arts: Susan Bang curates a personal soundtrack of indie darlings like Mitski, Tame Impala, and Ocean Air, spends evenings strumming acoustic renditions of Sufjan Stephens, draws inspiration from the animated
    whimsy of Studio Ghibli’s “Spirited Away,” and regularly attends community theater productions of “A Midsummer Night’s Dream” and local art fairs featuring emerging watercolorists, all while they eagerly
    share their latest sketches with friends.
  travel: Susan Bang prefers spur‑of‑the‑moment weekend getaways, charting their next adventure on a hand‑drawn map that currently marks a family road trip to the Grand Canyon, a school field trip to the
    Museum of Modern Art in New York, and a future dream of wandering the lantern‑lit streets of Kyoto during cherry‑blossom season.
  culinary: Susan Bang loves the comfort of cheesy pizza slices after a long art session, experiments with making colorful avocado toast topped with chili flakes, and occasionally attempts to recreate the
    ramen broth they discovered in a cooking vlog, all while snacking on gummy bears and sipping homemade matcha lattes when they need a creative boost.
  core: Susan Bang, a 15‑year‑old imagination‑fuelled creator, balances spontaneous artistic bursts with occasional deadline neglect, thriving on collaborative chaos and a habit of doodling in the margins
    of every notebook, while they regularly forget to turn in homework until the last minute.
background:
  cultural: Susan was raised in Holt, a suburban community in Eaton County, Michigan, within a family that values Midwestern practicality combined with a strong appreciation for community and the arts.
    Her upbringing includes participation in local events such as the county fair, the high school theater program, and neighborhood volunteer projects. While her cultural roots are shaped by the predominantly
    white, middle-class milieu of the region, she is also influenced by the diverse media she consumes online, which broadens her perspective. This blend of small-town community spirit, family emphasis
    on kindness and responsibility, and exposure to broader artistic trends informs her worldview and creative expression.
