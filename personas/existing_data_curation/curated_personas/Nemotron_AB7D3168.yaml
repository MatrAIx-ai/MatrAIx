  hobbies: '["Sketching", "Digital Painting", "Creative Writing", "Playing Guitar", "Improvisational Theatre", "Minecraft", "Video Blogging", "Attending Art Fairs", "Photography"]'
  career_goals: Susan envisions a future where she can turn her love for imagination and art into a profession. She aspires to attend an arts-focused high school and later pursue a degree in visual communication,
    illustration, or animation. Her long-term ambition is to become a concept artist or graphic designer who creates compelling visuals for games, films, or social causes. She also hopes to lead community
    workshops that encourage other teens to explore creative media, merging her artistic passion with her desire to bring people together.
