persona_description: A scientist or researcher who specializes in the study of amphibian diseases, particularly the chytrid fungus Batrachochytrium dendrobatidis (Bd) and its impact on frog populations.
  This individual has extensive knowledge and experience in the field, including the discovery of the fungus's origin in East Asia and its ability to infect other species of frogs. They are also knowledgeable
  about the methods used to stop the spread of Bd and the importance of protecting entire species of frogs from future pandemics.
