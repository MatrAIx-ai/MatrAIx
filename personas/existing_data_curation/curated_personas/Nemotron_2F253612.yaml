  career_goals: In the short term, Cesar aims to deepen his mastery of cloud‑native development by earning an AWS Solutions Architect certification and contributing to open‑source projects centered on web
    accessibility. Over the next three to five years, he envisions advancing to a full‑stack engineer role at a tech company where he can lead small feature teams, mentor newer developers, and shape product
    roadmaps. Ultimately, he aspires to launch a SaaS platform that supports underrepresented youth in learning coding skills, combining his technical expertise with his commitment to community empowerment.
