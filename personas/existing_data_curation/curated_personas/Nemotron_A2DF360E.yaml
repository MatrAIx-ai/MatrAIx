  career_goals: Ana aims to advance to a senior leadership role, such as Police Captain or Director of Community Outreach, where she can shape department policy and expand community‑engagement programs.
    She wants to develop a comprehensive wellness initiative for officers, integrate restorative‑justice practices, and mentor the next generation of officers, especially women. Additionally, she hopes
    to collaborate with local academic institutions to create continuing‑education curricula that blend law‑enforcement techniques with humanities perspectives. Long‑term, she envisions serving as a consultant
    on police reform at the state level.
