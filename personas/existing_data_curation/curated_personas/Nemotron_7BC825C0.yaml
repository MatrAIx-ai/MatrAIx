  hobbies: '[''Hiking in the Cascades'', ''Biking along the waterfront'', ''Classic car restoration'', ''Woodworking'', ''Vegetable gardening'', ''Attending maker meetups'', ''Reading automotive journals'',
    ''Acoustic guitar listening'', ''Urban and nature photography'']'
  career_goals: Tatianna aims to attain ASE Master Technician certification and become a lead technician specializing in electric and hybrid vehicle systems. She aspires to take on supervisory responsibilities,
    develop a mentorship program for aspiring mechanics, and eventually open her own boutique repair shop that emphasizes sustainable practices, transparent pricing, and community outreach through free
    car‑maintenance workshops. Balancing her professional growth with personal stability, she also seeks a work schedule that allows more flexibility for family and personal interests.
