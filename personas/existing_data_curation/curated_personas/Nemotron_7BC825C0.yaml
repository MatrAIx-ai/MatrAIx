personas:
  professional: Tatianna Webb, a 40‑year‑old seasoned automotive service technician, blends 15 years of hands‑on expertise in conventional, hybrid and electric vehicles with a methodical curiosity that
    drives her to integrate the latest diagnostic software while mentoring junior mechanics at her Seattle‑based shop.
  sports: Tatianna Webb, an avid outdoors enthusiast, spends weekends hiking the Cascades, rides her road bike with the Seattle Cycling Club along the waterfront, and follows the Seattle Seahawks, Seattle
    Mariners, and Seattle Sounders FC, often attending games as a way to blend community spirit with her love for movement.
  arts: Tatianna Webb enjoys capturing Seattle’s misty skyline with a DSLR, draws inspiration from Ansel Adams and local photographer James Balog, listens to acoustic guitar playlists featuring John Mayer,
    Ben Howard, and the folk duo The Milk Carton Kids while she restores classic cars, and regularly attends exhibitions at the Seattle Art Museum and the Northwest Folklife Festival.
  travel: At 40, Tatianna Webb prefers carefully planned road trips in her restored vintage Camaro or newly acquired electric SUV, favoring destinations that combine nature and sustainability, such as the
    Oregon Coast, Vancouver’s mountain trails, Iceland’s geothermal sites, and the cherry‑blossom festivals of Kyoto, while balancing travel costs with a modest family budget and using a points‑based credit
    card to offset airfare.
  culinary: Tatianna Webb’s palate favors Pacific Northwest flavors, from cedar‑planked salmon with dill and lemon to roasted root vegetables seasoned with rosemary and thyme, she enjoys cooking quinoa‑stuffed
    bell peppers and homemade sourdough, and she often harvests fresh basil, cilantro, and heirloom tomatoes from her vegetable garden to pair with her favorite dish—grilled fish tacos with pickled cabbage
    and avocado crema.
  core: An ever‑practical yet curious 40‑year‑old mechanic, Tatianna Webb balances a love for classic car restoration with a deep commitment to sustainable living, occasionally neglects sleep after late‑night
    DIY projects, and quietly curates a small but meticulous garden of herbs and vegetables.
background:
  cultural: Tatianna was raised in a middle‑class white family in the Pacific Northwest, where a strong work ethic, modesty, and appreciation for the natural environment were core values. Growing up near
    Seattle exposed her to the region’s progressive attitudes toward sustainability and technology, influencing her interest in hybrid and electric vehicles. Family traditions of self‑reliance, community
    cooperation, and hands‑on craftsmanship have shaped her practical yet curious mindset. She maintains close ties with local community groups and values the inclusive, environmentally conscious culture
    of the Seattle area.
attributes:
  skills: '[''Engine diagnostics'', ''Hybrid and electric vehicle maintenance'', ''Transmission repair'', ''Electrical system troubleshooting'', ''Computer‑aided diagnostic tools'', ''Emissions testing
