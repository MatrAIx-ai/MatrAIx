  hobbies: '[''Hiking'', ''Landscape Photography'', ''Woodworking'', ''Model Building'', ''Reading Art History'', ''Visiting Galleries'', ''Gardening'', ''Chess'', ''DIY Sustainable Home Projects'', ''Writing
    Technical Blog Posts'']'
  career_goals: Christopher aims to move into a senior executive role—such as Director of Construction or Vice President of Operations—within a regional development firm, where he can shape large‑scale
    projects with a blend of efficiency and artistic vision. His long‑term ambition is to launch his own consultancy that specializes in integrating innovative, environmentally responsible construction
    methods and unconventional design concepts into the built environment of the Intermountain West. He also plans to publish thought‑leadership articles, mentor emerging engineers, and contribute to the
    evolution of Montana’s building codes and sustainability standards while preserving enough personal time for the quiet pursuits he values.
