personas:
  professional: Christopher Whiten, a senior construction engineer and project leader, merges rigorous cost estimating, BIM-driven workflow optimization, and AI analytics with an artistic vision for sustainable
    design, constantly questioning standard practices and championing innovative, environmentally responsible solutions on Montana’s rugged terrain.
  sports: Christopher Whiten spends summer weekends hiking the Bridger Range and winter months snowshoeing near Red Lodge, holds a membership with the Bozeman Alpine Club, follows the Montana Grizzlies
    football team and the Colorado Avalanche, and they approach fitness with the same strategic mindset they apply to chess, tracking progress in a modest training log.
  arts: Christopher Whiten frequents contemporary art galleries in Bozeman, drawing inspiration from artists such as Olafur Eliasson and Ansel Adams, sketches architectural concepts while listening to Philip
    Glass’s minimalist compositions, and they maintain a curated collection of limited‑edition prints from emerging sculptors.
  travel: Christopher Whiten prefers meticulously planned solo expeditions to remote natural wonders, having trekked Yellowstone’s Grand Canyon of the Yellowstone, photographed the ice cliffs of Banff National
    Park, and set a future goal of a study tour of Japan’s eco‑friendly timber architecture in Kyoto, all while balancing limited vacation days with work commitments.
  culinary: Christopher Whiten enjoys farm‑to‑table cooking, regularly harvesting heirloom tomatoes and kale from their garden to make rosemary‑infused roasted chicken and a hearty vegetable stew featuring
    locally sourced potatoes, wild mushrooms, and smoked trout, while their coffee ritual includes a single‑origin pour‑over brewed with Ethiopian Yirgacheffe beans.
  core: Christopher Whiten is a solitary, analytically rigorous construction visionary who blends cutting‑edge technology with artistic design, pursues quiet outdoor hobbies, and channels a competitive
    streak into both professional projects and personal pursuits.
background:
  cultural: Christopher grew up in a small Midwestern town before moving to Bozeman for graduate studies, blending Midwestern pragmatism with the independent, nature‑oriented culture of Western Montana.
    His family heritage traces to Northern European roots, and he was raised with values of self‑reliance, respect for the outdoors, and a strong work ethic. Bozeman’s low‑key yet vibrant community introduced
    him to a growing arts scene and progressive sustainability initiatives, which he integrates into his professional outlook while maintaining his personal preference for solitude and quiet environments.
attributes:
  skills: '[''Project Management'', ''Cost Estimation'', ''Scheduling (Primavera/MS Project)'', ''BIM Modeling'', ''Structural Analysis'', ''Risk Assessment'', ''Lean Construction'', ''Sustainable Building
