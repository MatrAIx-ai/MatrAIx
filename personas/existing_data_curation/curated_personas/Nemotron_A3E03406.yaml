personas:
  professional: David Torres, a 33‑year‑old organized planner, leverages their methodical event‑coordination and strong interpersonal skills to excel as a facilities‑management candidate, seamlessly orchestrating
    maintenance schedules while delighting coworkers with a natural flair for public speaking and envisioning a side handyman service that would guarantee reliable neighborhood upkeep.
  sports: David Torres, a 33‑year‑old community‑oriented athlete, plays pickup basketball at the local recreation center, follows the Seattle Seahawks and the Spokane Chiefs, joins weekend fishing trips
    on the Columbia River with their spouse, and volunteers as a referee for the Spokane County Fair's softball tournament, balancing competitive spirit with camaraderie.
  arts: David Torres, a 33‑year‑old live‑music aficionado, frequents the Knitting Factory for indie rock shows featuring John Mayer and local folk band The Gravel Roads, enjoys summer concerts by the Spokane
    Symphony, and supports community theater productions, allowing music and drama to punctuate their otherwise routine‑filled weeks.
  travel: David Torres, a 33‑year‑old planner, prefers well‑researched road trips to nearby getaways like Coeur d’Alene and the Columbia River Gorge, books modest cabin stays for fishing weekends, dreams
    of a spring pilgrimage to the Oregon coast, and always balances their travel excitement with family responsibilities and a tight budget.
  culinary: David Torres, a 33‑year‑old backyard grill enthusiast, masters smoky pork ribs glazed with apple cider vinegar and brown sugar, pairs them with homemade coleslaw and grilled seasonal vegetables
    from their modest garden, enjoys occasional craft‑beer pairings, while their woodworking hobby sometimes distracts them from perfectly timing the barbecue.
  core: David Torres, a 33‑year‑old organized social hub, blends routine‑driven precision with their love for community gatherings, barbecues, and hands‑on projects, yet occasionally overcommits to events
    and forgets to unwind.
background:
  cultural: David is a White American of German and Irish heritage, raised in a middle‑class family in Spokane, Washington. His upbringing emphasized practicality, hard work, and community involvement,
    reflecting the Pacific Northwest values of self‑reliance and appreciation for the outdoors. He participates in local cultural traditions, such as the Spokane County Fair and regional holidays, and is
    an active member of his community church.
