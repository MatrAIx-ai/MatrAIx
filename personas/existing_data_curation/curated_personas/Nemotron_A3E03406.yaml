  career_goals: David aims to secure stable, full‑time employment that leverages his organizational and people‑skills, such as a facilities manager or community program coordinator for a local non‑profit.
    He also plans to pursue a short vocational certification in facilities management and, if successful, may launch a small handyman service to provide reliable, routine maintenance for his neighborhood,
    ensuring a consistent income and a routine work schedule that supports his family.
