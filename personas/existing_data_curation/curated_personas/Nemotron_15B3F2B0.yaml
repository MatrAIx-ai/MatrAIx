  career_goals: Johnathan aims to advance to a regional sales manager role within the next three years, eventually targeting a director‑level position where he can shape company‑wide sales initiatives.
    He wants to modernize his team’s workflow by integrating new technologies while preserving proven sales methods. Completing his bachelor's degree is a personal milestone, and he envisions mentoring
    the next generation of sales leaders, possibly launching a consultancy after retirement to help mid‑size firms enhance their sales operations.
