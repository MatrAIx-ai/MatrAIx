persona_description: A chemist who specializes in the study of catalysis and the development of new techniques to analyze and understand the inner workings of catalysts during catalytic reactions. The chemist
  is likely to have expertise in the use of synchrotron techniques such as x-ray absorption spectroscopy (XAFS) and infrared microspectroscopy, and is looking for ways to improve these techniques to gain
  a deeper understanding of the chemical transformation that occurs on catalyst surfaces during catalytic reactions. The chemist is also likely to have experience in the development of new analytical techniques
  and the use of advanced instrumentation such as synchrotron light sources.
