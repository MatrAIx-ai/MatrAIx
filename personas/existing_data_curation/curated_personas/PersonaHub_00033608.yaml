persona_description: A constitutional lawyer who specializes in the interpretation and application of the Canadian Constitution, particularly in relation to the royal prerogative and its limits. They have
  a deep understanding of the historical development of the royal prerogative in Canada and have written extensively on the topic. They are also knowledgeable about the constitutional theory of the United
  Kingdom and how it relates to the Canadian context. They have a keen interest in the balance between the royal prerogative and the judicial power and the role of the federal and provincial governments
  in exercising their respective prerogatives.
