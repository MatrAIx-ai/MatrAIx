    Liga MX soccer'']'
  career_goals: Jose aims to advance from his current role as a food service manager to a regional management position within a larger restaurant chain, while also pursuing a GED and an associate degree
    in hospitality management to solidify his credentials. Long‑term, he dreams of opening his own family‑owned Mexican restaurant in Tulare that doubles as a community art space, showcasing local folk
    art and hosting cultural events. He wants to be known for innovative menu design that blends traditional Mexican flavors with contemporary techniques, mentor younger staff, and create a work environment
    that reduces stress and promotes work‑life balance.
