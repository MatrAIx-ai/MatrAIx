  career_goals: Although still very young, Alejandro frequently talks about wanting to be a "big helper" when he grows up—helping his parents in the kitchen, caring for pets, and one day becoming a firefighter
    who protects his community. He admires the uniformed heroes he sees at local parades and expresses a desire to assist others, reflecting his cooperative and caring nature.
