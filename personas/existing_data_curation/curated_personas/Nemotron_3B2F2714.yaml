personas:
  professional: A budding builder and block architect, Alejandro Salazar delights in arranging colorful Lego bricks into orderly structures, and they turn playtime into a disciplined routine that satisfies
    their love for predictability while still allowing room for imaginative tweaks.
  sports: A small-group enthusiast on the playfield, Alejandro Salazar joins the Little Kickers soccer club on Saturday mornings, cheering quietly for the team while favoring the predictable rhythm of passing
    drills over chaotic scrimmages, and they occasionally watch the San Diego Padres on TV, appreciating the organized flow of the game.
  arts: A quiet connoisseur of picture books, Alejandro Salazar spends afternoons coloring within the lines of an Eric Carle storybook, humming along to Raffi's gentle songs, and they find comfort in the
    structured cadence of nursery rhymes performed by The Wiggles.
  travel: A routine-loving explorer, Alejandro Salazar enjoys family trips to the nearby San Diego Aquarium, where the scheduled feeding shows satisfy their craving for order, and they dream of a future
    visit to the Eiffel Tower, which they imagine as a towering, well-organized landmark.
  culinary: A selective palate keeper, Alejandro Salazar prefers soft foods like macaroni and cheese with a sprinkle of cheddar, loves banana slices dipped in peanut butter, and they insist on having their
    meals served on a divided plate to keep each item distinct and predictable.
  core: Alejandro Salazar, a calm and orderly three-year-old, thrives on structured play, quietly saves coins, handles health routines with ease, enjoys organized soccer drills, colors within lines to soothing
    tunes, travels on predictable family outings, and eats soft, neatly divided meals, all while displaying a gentle, cooperative spirit.
background:
  cultural: Alejandro was born into a Mexican‑American family in Anaheim. At home, Spanish is spoken alongside English, and he participates in cultural traditions such as Día de los Muertos altars, celebrating
    Mexican holidays with family, and enjoying foods like tacos, tamales, and fresh fruit. The family lives in a diverse Orange County community, allowing him to experience both his Mexican heritage and
    broader American cultural influences. He often attends community events at the local Hispanic cultural center, where he hears folk music and sees traditional dances, reinforcing his bicultural identity.
