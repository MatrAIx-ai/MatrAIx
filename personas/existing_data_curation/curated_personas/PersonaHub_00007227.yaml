persona_description: A dedicated public health professional who is passionate about the fight against tuberculosis (TB) and is committed to achieving TB elimination within their lifetime. They are aware
  of the challenges faced by endemic countries in the global fight against TB and are actively advocating for leadership in endemic countries and international support to overcome these challenges. They
  are also aware of the importance of medical breakthroughs from new TB drugs and the promise of a new TB vaccine and a "point-of-care" diagnostic within the next decade. They are aware of the $1.4 billion
  funding gap per year for research and development and are calling for targeted international donor funding and continued investments by countries themselves to safeguard recent gains and ensure continued
  progress.
