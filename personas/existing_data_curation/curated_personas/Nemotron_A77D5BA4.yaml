  hobbies: '[''Fishing at local lakes'', ''Woodworking and furniture making'', ''Curing and smoking meats'', ''Gardening (vegetables and herbs)'', ''Reading historical non-fiction and mystery novels'',
    ''Crossword puzzles and Sudoku'', "Volunteering at the local church", "Attending community seniors’ luncheons", ''Model train building'']'
  career_goals: In the next few years William aims to transition toward a phased retirement while ensuring the family-owned butcher shop continues operating smoothly. He plans to mentor a trusted apprentice
    or a family member to take over daily responsibilities, preserving the shop's reputation for quality. He also hopes to offer occasional consultancy to nearby processors on safety compliance and efficient
    workflow. Maintaining financial stability for his wife and reducing personal stress are top priorities, so he intends to adopt a steadier routine that balances work, health, and community involvement.
