    Work at Senior Center'',''Genealogy Research'',''Listening to Classic Rock'']'
  career_goals: Marianne aims to transition into a lead or supervisory role within her home‑health agency, where she can guide a team of aides while maintaining the routine and reliability she values. She
    plans to obtain a Certified Nursing Assistant (CNA) credential to broaden her clinical skill set. Additionally, she hopes to start a community support group for families caring for seniors in Monmouth
    County, offering workshops on home safety and caregiving best practices. In the longer term, she envisions serving as a part‑time trainer for new personal‑care aides, sharing her practical experience
    and nurturing a collaborative work environment.
