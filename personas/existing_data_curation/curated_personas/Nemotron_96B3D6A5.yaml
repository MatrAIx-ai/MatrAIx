personas:
  professional: A seasoned personal‑care aide, Marianne Layton leverages their disciplined routine, meticulous home‑safety assessments, and warm, talkative demeanor to provide compassionate support for
    seniors while mentoring new aides, and they are eyeing a supervisory Certified Nursing Assistant role.
  sports: A devoted community walker and senior‑league tennis player, Marianne Layton follows the New York Yankees and New York Giants, joins the Monmouth County Senior Fitness Club for sunrise shoreline
    walks, and they practice gentle yoga twice a week to keep their joints supple.
  arts: A vibrant choir participant and historical‑fiction enthusiast, Marianne Layton loves singing the harmonies of The Chieftains and Dolly Parton, devotes evenings to discussing Ken Follett’s ‘Pillars
    of the Earth’ and Philippa Gregory’s novels at their book club, and they often host tea‑and‑scone gatherings for fellow artists.
  travel: A meticulous planner, Marianne Layton favors tranquil coastal getaways to Cape May and the Jersey Shore, designs each trip in a detailed spreadsheet, earmarks an annual pilgrimage to heritage
    sites linked to their family roots uncovered through ancestry research, and they balance travel with their caregiving responsibilities.
  culinary: A culinary comfort‑seeker, Marianne Layton crafts family‑favorite chicken pot pie with buttery crust, hearty beef stew seasoned with garden‑fresh rosemary and thyme, and seasonal shepherd's
    pie using home‑grown potatoes and carrots, while they swap recipes with neighbours over potluck dinners and indulge in a weekly Saturday bake of apple crumble dusted with cinnamon.
  core: Marianne Layton, a 62‑year‑old garden‑loving caregiver, blends routine‑driven diligence with a chatty, community‑centric spirit, often juggling home‑care duties, choir rehearsals, and a never‑ending
    supply of yarn while they occasionally neglect their own stretching routine.
background:
  cultural: Marianne grew up in a middle‑class, white, suburban family in New Jersey with Irish and German roots. Raised in a Protestant household that emphasized hard work, community service, and family
    togetherness, she internalized practical values and a respect for tradition. Her adult life in Brick, Monmouth County reflects a strong connection to local customs, such as celebrating holidays with
    extended family, participating in church events, and supporting neighborhood initiatives. These cultural influences shape her commitment to reliability, harmonious relationships, and a pragmatic approach
    to daily life.
