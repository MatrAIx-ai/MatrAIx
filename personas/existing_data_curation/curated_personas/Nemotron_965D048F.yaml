    book club'', ''Volunteering at community art‑therapy workshops'']'
  career_goals: Diana aims to deepen her clinical expertise by earning a master’s degree in counseling and obtaining licensure as a mental‑health therapist. She aspires to a supervisory role, such as unit
    manager or clinical educator, where she can mentor junior technicians and lead the integration of creative‑arts approaches into treatment protocols. Long‑term, she hopes to establish a community‑based
    outreach program in rural Illinois that combines mental‑health services with art workshops, positioning herself as a regional innovator in holistic care.
