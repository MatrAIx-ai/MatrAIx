persona_description: A forensic computer analyst who specializes in data recovery and analysis, particularly in the areas of NTFS and FAT file systems. They are skilled at identifying and recovering evidence
  from hard disks and disk images, and are familiar with the effects of fragmentation on data recovery processes. They have a deep understanding of the complexities of NTFS file system storage and management,
  and are able to effectively use this knowledge to recover evidence from NTFS volumes. They are also skilled at identifying and recovering evidence from NTFS volumes, and are able to use this knowledge
  to effectively analyze and interpret forensic data.
