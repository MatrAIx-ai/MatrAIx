personas:
  professional: Jason Wood, a 28‑year‑old Class A CDL driver known for their meticulous route planning and safety‑first mindset, leverages their methodical nature and love of logistics to consistently deliver
    on‑time while eyeing a transition to a fleet safety coordinator role.
  sports: Jason Wood, 28, is a devoted fan of the Atlanta Falcons, Georgia Bulldogs, and Atlanta Braves, participates in a local weekend softball league, and incorporates low‑key fitness by fishing on Lake
    Lanier and hiking the trails of Stone Mountain State Park.
  arts: Jason Wood, 28, cultivates their creative side through woodworking projects and vintage motorcycle restoration while unwinding to the sounds of Chris Stapleton, Lynyrd Skynyrd, and listening to
    the “Wheels & Deals” podcast, and occasionally visits the local community theater to catch performances of classic Southern dramas.
  travel: Jason Wood, 28, prefers road‑trip style travel that balances work and leisure, planning weekend escapes to Asheville’s mountain art galleries, Savannah’s historic squares for a taste of Southern
    charm, and the Great Smoky Mountains for hiking, all while keeping costs low through clever fuel‑saving routes.
  culinary: Jason Wood, 28, enjoys cooking Southern barbecue staples like smoked pork ribs and peach cobbler at home, often using fresh garden herbs from their small backyard plot, and pairs their meals
    with a cold craft beer after a day of fishing or working on a motorcycle.
  core: Jason Wood, 28, blends a quiet, detail‑oriented work ethic with a love for solitary hobbies, a lingering worry habit that fuels meticulous budgeting, and a deep appreciation for Southern traditions
    and incremental innovation.
background:
  cultural: Jason was raised in Jackson, Georgia, within a close‑knit Southern community that values hard work, modesty, and hospitality. Family gatherings, high school football games, and county fairs
    are familiar fixtures in his upbringing, and he grew up with a strong sense of local pride and self‑reliance. The region’s culinary traditions—such as barbecue, peach cobbler, and fried greens—are part
    of his weekend meals. While his background is predominantly white Southern, he respects the diverse cultural fabric of Henry County and participates in community service through his church’s small‑group
    outreach programs. This environment has reinforced his pragmatic outlook, his preference for steady routines, and his appreciation for both tradition and incremental innovation.
attributes:
  skills: '[''Class A CDL driving'', ''Route planning and optimization'', ''Vehicle safety inspections'', ''Basic automotive repair and troubleshooting'', ''Fleet maintenance documentation'', ''DOT compliance
