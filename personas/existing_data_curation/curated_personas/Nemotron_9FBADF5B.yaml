    procedures'']'
  hobbies: '[''Bass fishing'', ''Woodworking and furniture making'', ''Restoring vintage motorcycles'', ''Reading automotive and technology magazines'', ''Listening to podcasts on logistics and mental health'',
    ''Playing strategy video games'', ''Hiking in local state parks'', ''Gardening'']'
  career_goals: Jason aims to transition from hands‑on driving to a supervisory role within the transportation sector, such as a fleet safety coordinator or logistics manager, where his methodical planning
    and attention to detail can improve overall operational efficiency. He plans to earn additional certifications in fleet management and advanced vehicle technology, including training on electric and
    hybrid trucks, to stay ahead of industry trends. Ultimately, he hopes to launch his own small‑scale trucking operation, balancing entrepreneurial ambition with a schedule that allows better work‑life
    balance and reduces stress. Alongside career advancement, he is committed to developing strategies for stress management and mental well‑being, recognizing that his tendency toward worry can be mitigated
    through structured routines and supportive workplace policies.
