  hobbies: '[''Cooking and baking'', ''DIY crafts'', ''Gardening'', ''Genealogy research'', ''Hiking'', ''Photography'', ''Reading (fiction and non‑fiction)'', ''Volunteer work at community center'', ''Hosting
    dinner parties'', ''Book club participation'']'
  career_goals: Grisel aims to turn her organizational and interpersonal strengths into a fulfilling role outside the traditional workforce. In the near term, she plans to earn an online certification in
    event planning and launch a home‑based catering service that supplies meals for local schools, churches, and community gatherings. She also intends to take on a part‑time volunteer coordinator position
    at the county community center to gain experience in program management. Over the next five to ten years, her ambition is to expand the catering venture into a full‑service event design business while
    mentoring other stay‑at‑home parents who wish to re‑enter the workforce.
