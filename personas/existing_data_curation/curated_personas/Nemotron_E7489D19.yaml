  hobbies: '[''succulent gardening'', ''birdwatching'', ''model train building'', ''reading mystery novels'', ''fishing at Lake Mead'', ''golf'', ''church small‑group study'']'
  career_goals: Although officially retired, Donald aims to stay active and purposeful by volunteering as a mentor for younger members of his community, assisting with the senior center’s maintenance projects,
    and completing a personal legacy project of documenting his family’s history. He also hopes to improve his physical health through regular walks, maintain his home’s energy efficiency, and ensure his
    estate is well organized for his wife’s peace of mind.
