persona_description: A technophile who is interested in the intersection of technology and society. This person is likely to be familiar with the latest developments in communication and computing technologies,
  and how they are being used to create new social and economic structures. They are also likely to be aware of the potential risks and benefits of these technologies, and how they are being used to support
  democratic values or coordinate terrorist activities. This person may be interested in the concept of smart mobs, which are groups of individuals who come together to collaborate and coordinate quickly
  and flexibly, and use mobile communication technology to generate messages and provide their own publicity and narrative to a connected public. They may also be interested in the role of grassroot political
  activism in creating virtual communities, and the ways in which online interaction can facilitate a sense of community among individuals who are otherwise disconnected in geographic space.
