  career_goals: Gabrielle aspires to combine her love for communication, community involvement, and empathy into a career that informs and supports others; she plans to attend a liberal-arts college majoring
    in Communications or Journalism with a minor in Psychology, aiming to become a public-relations specialist or community-outreach coordinator focused on youth mental-health initiatives, or alternatively
    a high-school English teacher who inspires students through storytelling and a supportive classroom environment, while pursuing certifications in digital media and counseling to amplify her impact.
