  career_goals: Yanisley aspires to move into instructional leadership within the district. She plans to earn a Master's in Educational Leadership and become a department chair or instructional coach, where
    she can influence curriculum design and support teachers in data-informed practices. She also hopes to expand the district's bilingual program for Spanish-speaking students and eventually serve as a
    vice-principal, using her organized, methodical style to improve school operations and student outcomes.
