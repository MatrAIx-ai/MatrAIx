  hobbies: '[''Gardening'', ''Yoga'', ''Crossword Puzzles'', ''Sudoku'', ''Cooking Puerto Rican Cuisine'', ''Reading Historical Nonfiction'', ''Book Club (small group)'', ''Volunteering at Hispanic Community
