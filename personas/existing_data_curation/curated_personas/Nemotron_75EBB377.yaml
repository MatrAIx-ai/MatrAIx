  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Hiking in the Sierra foothills'', ''Photography of native flora'', ''Listening to classic rock and country music'', ''Community center potluck gatherings'',
    ''Volunteering at public garden'', ''Reading sustainable agriculture guides'', ''Watching nature documentaries'']'
  career_goals: Ian aims to transition from being a senior crew member to owning a modest, family-run landscaping business that emphasizes eco-friendly practices. He plans to obtain a Certified Landscape
    Technician (CLT) credential and an Irrigation Association certification within the next two years. Additionally, he hopes to complete a GED program and take community-college courses in horticulture
    to deepen his technical knowledge. Long-term, Ian envisions mentoring younger workers and offering workshops on water-wise gardening for his community, while maintaining a stable income that supports
    his family and enables a comfortable retirement.
