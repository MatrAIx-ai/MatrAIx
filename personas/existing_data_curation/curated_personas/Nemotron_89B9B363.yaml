personas:
  professional: Sonia Lluch is a seasoned educational guidance counselor who blends data‑driven case management with a touch of spontaneous flexibility, and they thrive on helping students navigate STEM
    pathways while maintaining a structured routine.
  sports: Sonia Lluch enjoys weekend hikes in the Cascades and supports the Seattle Seahawks and Seattle Kraken, and they participate in a local yoga class while occasionally joining a community running
    group for charity races.
  arts: Sonia Lluch reads historical novels by Isabel Allende and contemporary non‑fiction about Andean culture, listens to folk singer Joan Baez, knits scarves as a meditative hobby, and they attend quarterly
    performances at the local theater to unwind.
  travel: Sonia Lluch has explored the Pacific Northwest’s coastal towns like Cannon Beach, trekked the San Juan Islands, and they long to visit Patagonia’s glaciers and Kyoto’s temples, preferring spontaneous
    weekend getaways that blend nature with cultural immersion while staying within a modest travel budget.
  culinary: Sonia Lluch prepares traditional dishes such as ceviche, ají de gallina, and causa using fresh cilantro, lime juice, ají amarillo, and locally sourced potatoes from their garden, and they enjoy
    experimenting with quinoa salads, showcasing an intermediate cooking skill level that blends heritage flavors with Pacific‑Northwest ingredients.
  core: Sonia Lluch is a routine‑loving yet occasionally impulsive counselor who finds solace in gardening, cooking, and mindfulness while constantly battling worry and a love for quiet, solitary pursuits.
background:
  cultural: Sonia grew up in a Peruvian‑American household where Spanish was spoken daily and family meals centered around hearty Andean recipes. Her parents instilled the value of education as a pathway
    to upward mobility, and she carries a deep respect for communal celebrations like Inti Raymi and the Feast of Saint Juan, which she continues to observe in the Seattle area’s vibrant Peruvian community.
    While fully integrated into American life in Sammamish, she maintains strong ties to her heritage through language, cuisine, and participation in cultural societies, and she often incorporates Peruvian
    cultural references into her counseling practice to build rapport with bilingual families.
attributes:
  skills: '[''Data‑driven educational assessment'', ''Career pathway planning'', ''Bilingual counseling (Spanish/English)'', ''Crisis intervention'', ''Small‑group facilitation'', ''Active listening and
    empathy'', ''Use of counseling software (e.g., Naviance, Career Cruising)'', ''Collaboration with educators and families'', ''Program development and evaluation'', ''Solution‑focused brief therapy'']'
  hobbies: '[''Gardening (Pacific Northwest & culinary herbs)'', ''Cooking Peruvian cuisine'', ''Yoga and mindfulness meditation'', ''Reading historical and cultural non‑fiction'', ''Weekend hiking in the
    Cascades'', ''Small‑group cultural gatherings'', ''Knitting'', ''Listening to traditional Andean music'', ''Journaling for stress management'']'
  career_goals: Sonia aims to advance to a senior counselor or program director role within the King County School District, where she can design a culturally responsive career‑development curriculum for
    underserved STEM students. She plans to earn a Licensed Professional Counselor (LPC) credential and a specialization in multicultural counseling. Long‑term, she hopes to launch a community mentorship
    network that connects Peruvian‑American youth with local STEM professionals, while also establishing systematic stress‑management workshops for counselors to address her own sensitivity to pressure.
    Her ambition is to blend her love for routine‑based processes with enough flexibility to innovate supportive, evidence‑based guidance services.
