    building'', ''Chess'', ''Volunteer fire department equipment maintenance'']'
  career_goals: At 80, John’s primary ambition is to leave a lasting legacy for his family and community. He aims to compile and publish a memoir and detailed family genealogy, mentor younger community
    members in woodworking and practical trades, and continue volunteering with the local veteran’s association and the church’s outreach programs. He also hopes to maintain his health and independence
    by staying active in structured hobbies and community service, ensuring he remains a reliable resource for his grandchildren and neighbors.
