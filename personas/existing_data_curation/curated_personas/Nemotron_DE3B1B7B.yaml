personas:
  professional: William Berly, a budding preschool architect whose endless Lego constructions showcase their curious mind and love for unconventional design, while their resistance to rigid schedules and
    preference for solitary play reveal a naturally competitive yet emotionally stable approach to early creative problem solving.
  sports: William Berly, a lively member of the Kids' Kickers soccer club, spends afternoons chasing balls in the park, cheerfully roots for the River City Raptors baseball team during televised games,
    and prefers quick solo bike rides over large group drills, embodying their spontaneous, competitive spirit and their comfort with small-group activity.
  arts: William Berly delights in the whimsical illustrations of Dr. Seuss, sings along loudly to the upbeat tunes of The Wiggles, and spends their evenings coloring vivid dinosaurs in the style of Eric
    Carle, a testament to their curious appreciation for art, their preference for solitary creative time, and their competitive desire to perfect every picture.
  travel: William Berly dreams of a grand quest to Disneyland, yet their recent explorations have been limited to a short ferry ride to the local aquarium and a weekend stay at their grandparents' cottage
    by the lake, where they roam tide pools and collect shells, reflecting their spontaneous love for unplanned discovery and their comfort with intimate, small-group trips.
  culinary: William Berly craves cheesy macaroni, chicken nuggets dipped in honey-mustard, and meticulously helps stir pancake batter, while occasionally daring to sample crunchy cricket-flavored snacks
    at a science fair, showcasing their preference for familiar comfort foods, their budding cooking skills, and their impulsive palate adventures.
  core: William Berly is a curious, solitary four-year-old whose competitive streak, love of art, and aversion to rigid structure combine to create a resilient, skeptical yet explorative worldview.
background:
  cultural: William is raised in a predominantly Anglo‑American family in Austin, Texas. His household celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July with traditions that include
    barbecue, Tex‑Mex side dishes, and community fireworks. Growing up in a city renowned for live music, street murals, and eclectic festivals, he is regularly exposed to creative performances and public
    art installations. While his primary cultural identity is white American, the multicultural vibrancy of Austin introduces him to Hispanic music, food, and bilingual signage, subtly expanding his curiosity
    about diverse cultures.
