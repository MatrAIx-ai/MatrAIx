persona_description: A curator and art historian who specializes in the exploration and interpretation of outsider art and the socio-historical context in which it was produced. They have a keen eye for
  identifying and showcasing the unique and often overlooked works of artists who operate outside the mainstream art world. They are passionate about the idea of art as a means of self-expression and the
  potential for it to challenge and subvert established norms. They have a deep understanding of the historical and cultural context in which outsider art was produced and how it has been interpreted and
  reinterpreted over time. They are skilled at organizing and curating exhibitions that showcase the diverse and often overlooked works of these artists.
