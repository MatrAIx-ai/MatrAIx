personas:
  professional: Benjamin Gonzalez, a 35‑year‑old detective with the Durham Police Department, blends their mastery of homicide and narcotics investigations—including forensic photography, digital forensics,
    and GIS mapping—with a curiosity for unconventional case angles, though their relaxed attitude often leaves paperwork in disarray.
  sports: Benjamin Gonzalez follows the Durham Bulls baseball team and the UNC Tar Heels basketball program, jogs with the Eno River Trail running club in spring, and participates in casual weekend pick‑up
    soccer with the local Fusion community, preferring low‑key fitness routines over regimented gym schedules.
  arts: Benjamin Gonzalez immerses themselves in Durham’s gallery scene, sketches street murals by artists like Anthony James, attends indie rock shows at Motorco, and enjoys Latin marimba ensembles from
    Los Kjarkas as well as modern percussion by Arturo Sandoval, which together fuel their creative approach to investigations.
  travel: Benjamin Gonzalez favors weekend escapes to Asheville’s Blue Ridge Mountains for hiking, spontaneous road trips to Savannah’s historic squares, and long‑planned cultural tours of Mexico City and
    Antigua, yet they balance their wanderlust with family obligations that limit extended overseas stays.
  culinary: Benjamin Gonzalez loves cooking peppery pepian and hand‑rolled tamales, perfects chiles rellenos with roasted pumpkin seeds, brews strong Guatemalan coffee, and, while their moderate cooking
    skill encourages experimentation with spices like annatto and cinnamon, they often forget to clean the kitchen after late‑night culinary sessions.
  core: Benjamin Gonzalez is a detective whose investigative flair is fueled by art, coffee, and curiosity, but their relaxed paperwork habits, anxiety spikes, and competitive edge make every case a blend
    of brilliance and chaos.
background:
  cultural: Benjamin grew up in a bilingual household where his parents, who immigrated from Guatemala, maintained many Mayan and Catholic traditions. Spanish is spoken at home, and family gatherings feature
    foods such as pepian, chiles rellenos, and freshly brewed Guatemalan coffee. He celebrates cultural holidays like Día de los Muertos and Semana Santa, often sharing these customs with his wife and their
    circle of friends in Durham. While he embraces the vibrant multicultural fabric of the Triangle, he remains proud of his Guatemalan heritage, using his background to build trust in Latino communities
    he serves as a detective. His cultural identity subtly informs his worldview, fostering both a respect for tradition and an openness to new ideas.
