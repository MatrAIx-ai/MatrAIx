  career_goals: Benjamin’s primary ambition is to advance to a senior detective or squad leader position within the Durham Police Department, eventually heading a specialized cold‑case or art‑theft investigation
    unit that aligns with his love of art. To support this, he plans to earn an associate degree in forensic science and later a bachelor’s in criminal justice, strengthening his technical expertise. He
    also aims to develop a community outreach program that uses art workshops and mentorship to engage at‑risk youth, hoping to prevent future involvement in crime. Long‑term, he envisions a role that blends
    investigative leadership with community partnership and innovative, creative case‑solving strategies.
