  hobbies: '[''Reading historical non‑fiction'', ''Woodworking'', ''Gardening (vegetables and flowers)'', ''Bird‑watching'', ''Puzzle solving (crosswords, Sudoku, jigsaw puzzles)'', ''Model train building'',
    ''Genealogy research'', ''Nature walks'', ''Landscape photography'']'
  career_goals: At 72, Michael is focused on achieving a stable, low‑stress work arrangement that allows him to enjoy his remaining working years while preparing for eventual retirement. He hopes to shift
    into a mentorship or trainer role where he can share his accumulated knowledge with newer agents, and to streamline and document existing service procedures to leave a lasting legacy for his department.
    He also seeks part‑time or flexible hours that reduce commuting, enabling more time for his personal interests and for volunteering in his local community. Financial security and the ability to remain
    independent are key motivations.
