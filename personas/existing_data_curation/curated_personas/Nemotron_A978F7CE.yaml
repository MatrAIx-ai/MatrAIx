  career_goals: Charles aims to step into a senior cost management role within the next three years, overseeing a team of estimators and championing the adoption of standardized, data‑driven estimating
    processes across his organization. He plans to earn the Certified Cost Professional (CCP) designation to formalize his expertise, and to mentor emerging cost engineers to ensure a smooth knowledge transfer
    before retirement. Additionally, he seeks to contribute pro‑bono cost‑analysis services for local infrastructure and community projects in Brookfield, reinforcing his commitment to the region’s development.
