  hobbies: '["Gardening (flower beds & vegetable plots)", "Reading historical fiction and literary biographies", "Small book‑club participation", "Gentle yoga and mindfulness practice", "Daily journaling",
    "Cross‑stitching and quilting", "Weekend nature walks in Bedford", "Cooking classic American meals and intimate dinner gatherings", "Playing bridge with a regular group", "Traveling to historic European
    destinations with spouse"]'
  career_goals: Approaching the culmination of her career, Elizabeth aims to ensure a seamless succession for her department by mentoring a junior manager and documenting best‑practice procedures. She wishes
    to embed a comprehensive employee well‑being program that addresses anxiety and stress, reflecting her personal experience with emotional reactivity. Elizabeth also aspires to attain recognition as
    an Outstanding Administrative Leader from a regional professional association and to transition into part‑time consulting for nonprofit organizations, leveraging her expertise to help them establish
    robust administrative frameworks. Volunteering as a board member for a local mental‑health advocacy group is another long‑term ambition, allowing her to give back to the community she values.
