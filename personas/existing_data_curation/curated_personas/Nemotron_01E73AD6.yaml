personas:
  professional: Patricia Garity, a veteran residential housekeeper with three decades of expertise in detailed cleaning, inventory tracking and safe chemical handling, leverages her methodical mindset to
    streamline client schedules and now pursues a supervisory position and her own cleaning business after obtaining IICRC certification and completing a GED.
  sports: Patricia Garity enjoys low‑impact fitness, joining a senior walking club that meets thrice weekly at the local park, participates in a community softball league during summer, and supports the
    Atlanta Falcons (NFL) and Atlanta Hawks (NBA), while using bird‑watching excursions as gentle cardio and opting for yoga classes at the church recreation center in the winter.
  arts: Patricia Garity’s artistic side shines in the church choir where she sings classics by Dolly Parton and Johnny Cash, listens to timeless country legends like Willie Nelson and Patsy Cline during
    chores, reads romance novels by Nora Roberts before bed, and attends community theater productions featuring works by Tennessee Williams, all of which nourish her love for storytelling and heartfelt
    melodies.
  travel: Patricia Garity favors road‑trip adventures that blend family visits with cultural stops, having driven to Savannah, Georgia for its historic squares, explored Charleston, South Carolina’s waterfront,
    and attended a country music festival in Nashville, Tennessee; she dreams of a serene getaway to County Kerry, Ireland to trace ancestral roots and a relaxing beach retreat in the Bahamas, planning
    each journey around modest budgeting and church potluck schedules.
  culinary: Patricia Garity delights in Southern baking, perfecting biscuits with buttermilk, peach cobbler crowned with flaky crust, and pecan pie rich with molasses, while cooking classic dishes like
    chicken and dumplings, collard greens seasoned with smoked ham, and shrimp‑and‑grits; she favors ingredients such as sweet potatoes, okra, fresh herbs from her garden, and locally sourced honey, often
    sharing her creations at church potlucks.
  core: Patricia Garity, a meticulous housekeeper who finds calm in Southern baking, bird‑watching, and choir singing, balances a structured, reliable nature with intense anxiety and a quirky habit of hoarding
    spare cleaning supplies.
background:
  cultural: Patricia grew up in a white working‑class family in the Deep South, where hospitality, close‑knit church communities, and a strong sense of family duty are central values. The culture of Munford,
    Alabama, emphasizes Southern culinary traditions, gospel and country music, and a respect for reliability and hard work. These influences shape her organized approach to work, her deep involvement in
    church and local community events, and her appreciation for modest, home‑grown comforts.
attributes:
  skills: '["Residential cleaning", "Deep carpet and upholstery cleaning", "Stain removal", "Laundry and ironing", "Floor polishing and waxing", "Household inventory management", "Time management and scheduling",
    "Basic cooking and meal preparation", "Pet care", "Sewing and minor clothing repairs", "Cleaning equipment maintenance", "Sanitization and infection control"]'
  hobbies: '["Gardening", "Baking traditional Southern recipes", "Crocheting and quilting", "Listening to classic country music", "Reading romance novels", "Church choir participation", "Bird watching at
    local parks", "Community potluck gatherings"]'
  career_goals: Patricia aspires to move into a supervisory role within housekeeping, eventually launching her own small residential cleaning business. She plans to obtain a professional cleaning certification
    (e.g., IICRC) and to complete a GED program to strengthen her qualifications. Her goals include achieving a stable part‑time schedule that reduces stress, mentoring younger workers, and building financial
    security for her family and future grandchildren.
