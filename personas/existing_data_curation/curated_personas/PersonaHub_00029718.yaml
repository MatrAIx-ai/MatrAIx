persona_description: A technologist and advocate for technology and its potential to improve global systems and reach new groups of people with goods and services. They are aware of the digital divide and
  the importance of meeting the basic needs of poor people and children. They are concerned about the unequal distribution of technology and its impact on the world, particularly in developing countries.
  They are interested in the potential of digital technology to improve services and reach the poorest populations, but they also recognize the need for basic needs programs that uphold the dignity of those
  less fortunate.
