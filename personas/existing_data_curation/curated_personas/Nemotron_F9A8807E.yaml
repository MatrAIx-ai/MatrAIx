  hobbies: '[''Basketball pick‑up games'', ''Community volunteer events'', ''Tribal powwow participation (drumming, dancing)'', ''Desert hiking'', ''Photography of Southwestern scenery'', ''Beadwork and
    woodworking'', ''Mindfulness breathing exercises'', ''Yoga sessions'', ''Journaling'']'
  career_goals: Lance aims to move into a supervisory or lead‑maintenance role within the next few years, leveraging his on‑the‑ground experience to oversee larger facilities and mentor newer staff. He
    plans to obtain certifications in OSHA safety, green building operations, and facilities management to broaden his qualifications. Long‑term, he envisions starting a small, community‑focused cleaning
    business that emphasizes sustainable practices and provides reliable employment for fellow residents, especially those from his tribal community. Achieving a stable, respected position also helps him
    manage stress and provides a sense of financial security for his children.
