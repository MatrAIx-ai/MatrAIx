personas:
  professional: Janice Hoffler is a hands‑on telecommunications technician who excels at field repairs of RF equipment and fiber‑optic splicing, leveraging a blend of practical quick‑fix ingenuity and a
    curiosity for emerging 5G small‑cell tech, even as they sometimes struggle with organization and certification timelines.
  sports: Janice Hoffler fuels their competitive edge on weekends as a catcher for the local Rocky Mountain co‑ed softball league, while cheering on the Denver Broncos, Colorado Rockies, and Colorado Avalanche,
    and they squeeze in early‑morning trail runs through the foothills to stay fit.
  arts: Janice Hoffler’s artistic side shines during karaoke nights where they belt out Queen’s 'Bohemian Rhapsody' and Beyoncé’s 'Crazy in Love,' while their free evenings include listening to The Avett
    Brothers, attending indie gigs at the local brewpub, and catching a performance of 'The Glass Menagerie' at the community theater.
  travel: Janice Hoffler prefers spontaneous weekend road trips, having hiked the Blue Ridge Trail in Asheville and explored Portland’s maker community, while dreaming of a summer excursion to Japan’s Akihabara
    district for electronic parts and a future trek through New Zealand’s South Island, and they often plan these getaways on a whim, balancing a modest travel budget with work commitments.
  culinary: Janice Hoffler enjoys cooking at potluck gatherings, often whipping up a smoky BBQ chicken platter, a vibrant quinoa‑salmon bowl with dill, and a spicy miso ramen that showcases their love for
    bold flavors and fresh cilantro, while they proudly claim a knack for perfecting homemade trail mix and occasionally over‑season dishes in a burst of experimental zeal.
  core: Janice Hoffler blends a restless curiosity for wireless tech with a love for spontaneous social gatherings, yet they habitually over‑commit to projects and indulge in occasional late‑night caffeine
    binges, keeping stress levels perpetually high.
background:
  cultural: Janice grew up in the Denver‑Arvada suburbs, a predominantly white, middle‑class community in Colorado. Her family’s roots trace back to German and Scandinavian immigrants who settled in the
    Midwest before moving west for the mining and construction opportunities of the early 20th century. The region’s blend of rugged individualism and community cooperation shaped her practical, hands‑on
    work ethic and her love for outdoor recreation. While she left formal schooling early, her upbringing emphasized learning by doing, a value reflected in her career as a telecommunications technician
    and her active participation in local maker and volunteer groups.
attributes:
  skills: '[''Radio and telecom equipment installation'', ''RF signal testing and calibration'', ''Troubleshooting antenna and transmitter problems'', ''Fiber‑optic splicing and testing'', ''Interpretation
    of schematics and wiring diagrams'', ''Compliance with FCC regulations'', ''Use of hand and power tools'', ''Inventory management'', ''Client communication and technical support'', ''Team collaboration'']'
  hobbies: '[''Hiking and trail running in the foothills'', ''Co‑ed softball league participation'', ''Karaoke nights with friends'', ''DIY electronics projects (e.g., building FM transmitters)'', ''Volunteering
    at a local maker space'', ''Hosting potluck dinners'', ''Yoga and stress‑relief journaling'']'
  career_goals: Janice aims to earn industry certifications such as the CTT+ and a commercial radio operator license, and to move into a lead‑technician or crew‑supervisor role within the next three years.
    She hopes to specialize in 5G small‑cell installations and low‑power IoT networks, positioning herself as a go‑to expert for local businesses upgrading their wireless infrastructure. Long‑term, she
    plans to start her own modest contracting boutique that offers personalized telecom installations and maintenance for small enterprises and community organizations, allowing her to set flexible hours
    that reduce stress. She is also working toward completing a GED to broaden her qualifications and improve her organizational skills.
