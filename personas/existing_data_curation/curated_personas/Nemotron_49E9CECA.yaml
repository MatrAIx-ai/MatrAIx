personas:
  professional: Shon Mabery, a 26-year-old elementary/middle school teacher, leverages a robust STEM background and a methodical planning style to design inquiry‑based science and math lessons that integrate
    Arduino projects, coding platforms, and robotics kits, while using calm conflict‑resolution techniques to foster collaborative learning and equitable access.
  sports: Shon Mabery competes in the Harrisburg Hoops Club's weekly pickup basketball games, roots for the Philadelphia 76ers, and attends yoga sessions with the Mindful Movement Collective, blending competitive
    play with low‑impact fitness.
  arts: Shon Mabery immerses in speculative fiction, devouring works by Octavia Butler, Isaac Asimov, and Liu Cixin, while also attending local theatre productions such as the Capitol City Playhouse's rendition
    of 'The Curious Incident of the Dog in the Night‑Time', and enjoys listening to electronic jazz artists like Kamasi Washington and Flying Lotus.
  travel: Shon Mabery prefers short, purpose‑driven trips that blend tech conferences with cultural exploration, having visited Washington, D.C. for the EDUCAUSE conference, taken a weekend road‑trip to
    Shenandoah National Park for hiking and meditation, and planning a future visit to Tokyo's Akihabara district to experience cutting‑edge robotics exhibitions.
  culinary: Shon Mabery loves experimenting in the kitchen, perfecting dishes like slow‑braised collard greens, smoked turkey with cranberry glaze, and sweet cornmeal cornbread, while also trying their
    hand at homemade sushi rolls and hearty bean chili, balancing traditional family flavors with modern culinary twists.
  core: Shon Mabery is a methodical, curiosity‑driven educator who blends calm compassion with a tech‑savvy hobbyist spirit, turning every lesson, budget, and weekend into an opportunity for purposeful
    learning and quietly balanced growth.
background:
  cultural: Shon is a Black American raised in the Harrisburg region, deeply connected to the local African-American community. He values the rich musical, culinary, and storytelling traditions of his heritage,
    and incorporates culturally responsive examples into his teaching to reflect students' experiences. His family's roots in the Mid-Atlantic have shaped his appreciation for community solidarity and social
    justice, motivating his involvement in outreach programs that empower underrepresented youth in STEM.
attributes:
  skills: '["STEM curriculum development","Inquiry-based lesson planning","Educational technology integration (coding, robotics)","Data-driven assessment","Differentiated instruction","Classroom management
    and calm conflict resolution","Collaborative project facilitation","Community outreach and partnership building","Effective communication","Empathy and student support"]'
  hobbies: '["Arduino and DIY electronics projects","Game development and coding experiments","Reading science-fiction literature","Playing basketball","Mentoring through community tutoring","Yoga and meditation","Cooking
    African-American cuisine with his wife","Participating in church youth activities"]'
  career_goals: Shon aims to become a district STEM coordinator within the next five years, leading curriculum innovation and teacher professional development. He plans to pursue a Master's degree in Educational
    Leadership to transition into school administration and shape district-wide policies that promote equitable STEM access. Long-term, he aspires to create a community STEM hub in Harrisburg that offers
    after-school programs, mentorship for underrepresented youth, and partnerships with local universities and tech firms.
