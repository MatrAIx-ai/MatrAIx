  hobbies: '[''Mahjong'', ''Tai chi'', ''Community dancing'', ''Choir singing'', ''Herb gardening'', ''Calligraphy'', ''Reading historical fiction'', ''Volunteering at cultural festivals'', ''Walking in
    Prospect Park'']'
  career_goals: Miyon’s primary ambition is to remain physically active and emotionally engaged while supporting her husband’s health. She aims to pass on her culinary and cultural knowledge by teaching
    cooking workshops at the local senior center, mentor younger community members in language and traditions, and compile a family memoir that records her parents’ immigration story. She also hopes to
    travel to her ancestral hometown in China for a brief visit and to stay proficient with digital communication tools so she can stay close to her grandchildren.
