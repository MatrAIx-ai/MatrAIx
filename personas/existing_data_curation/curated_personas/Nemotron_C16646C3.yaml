personas:
  professional: Miyon Liu is a senior community organizer and culinary mentor who leverages their precise planning, multilingual translation abilities, and decades of event coordination experience to run
    beloved neighborhood festivals, senior‑center cooking workshops, and volunteer schedules, all while maintaining a steady hand on family budgeting and caregiving for their husband.
  sports: Miyon Liu stays fit by attending morning Tai chi classes at the Prospect Park Tai Chi Club, joining the Senior Swing Dance Club in winter, walking three miles with neighbors each afternoon, and
    cheering for the New York Knicks and New York Yankees, while occasionally participating in the park’s senior softball league.
  arts: Miyon Liu expresses creativity through a senior choir that often performs arrangements of Andrea Bocelli and Ella Fitzgerald, practices calligraphy inspired by traditional brushwork, reads historical
    novels by Ken Follett and Hilary Mantel, and enjoys viewing paintings by Vincent van Gogh at the local museum.
  travel: Miyon Liu prefers low‑key, well‑planned trips that blend cultural immersion with comfort, has visited the historic streets of Savannah and the vineyards of the Finger Lakes, and hopes to one day
    travel to the mountain village of their ancestors in the eastern province of their birthplace, all while arranging travel details with their grandchildren via video calls.
  culinary: Miyon Liu is an adept home chef renowned for hand‑rolled dumplings stuffed with pork and chives, braised pork belly simmered with ginger, garlic, soy sauce, and star anise, and medicinal herb
    soups featuring shiitake mushrooms and goji berries, regularly sourcing ingredients from the farmers’ market and experimenting with seasonal produce like bok choy and daikon.
  core: Miyon Liu is a pragmatic yet sociable octogenarian who turns every communal gathering into a well‑organized celebration, loves their daily Tai chi ritual, but can’t resist a midnight bowl of instant
    noodles when the pantry runs low.
background:
  cultural: Miyon Liu is a first‑generation Chinese‑American whose parents emigrated from Guangdong province to Brooklyn in the early 1950s. Raised in a close‑knit Chinatown enclave, she grew up speaking
    Mandarin at home while attending public schools in Brooklyn, absorbing both traditional Confucian values—such as respect for elders, family solidarity, and harmony—and the diverse rhythms of New York
    City life. She maintains cultural practices like celebrating Lunar New Year, observing ancestor rites, and preparing classic dishes, while also embracing American holidays and civic engagement. Her
    bilingual fluency and deep respect for both cultures allow her to bridge generations, acting as a cultural ambassador within her neighborhood.
