  hobbies: '[''Recreational basketball'', ''Community volunteer event planning'', ''Landscape and product photography'', ''Regional history and genealogy research'', ''Cooking regional recipes'', ''Hiking
    on local trails'', ''Attending live music performances'', ''Participating in trivia nights'']'
  career_goals: Francis aims to transition from marketing manager to director of marketing within the next three years, eventually positioning himself as a chief marketing officer for a regional consumer‑goods
    company. He is pursuing advanced certifications in digital analytics and data‑driven marketing to complement his practical experience. A long‑term ambition is to establish a boutique consultancy that
    helps small businesses in Lancaster County modernize their branding and digital presence while preserving local heritage. He also seeks to mentor junior marketers from non‑traditional backgrounds, fostering
    a culture of practical learning and continuous improvement.
