  hobbies: '[''Reading mystery and science‑fiction novels'', ''Nature journaling and wildlife observation'', ''Playing piano (intermediate)'', ''Chess (competitive)'', ''Coding simple games (Scratch, Python)'',
    ''4‑H projects (animal care and gardening)'', ''Volunteering at the community library'']'
  career_goals: Connie aims to graduate high school with honors and earn a scholarship for a STEM‑focused university program. In the short term, she plans to join her school's science club, secure a summer
    internship at a local veterinary clinic, and lead 4‑H projects on sustainable gardening and livestock care. Long‑term, she aspires to become a veterinary technician or biomedical engineer specializing
    in animal health, contributing to innovative health solutions for pets and farm animals while mentoring younger students in her community.
