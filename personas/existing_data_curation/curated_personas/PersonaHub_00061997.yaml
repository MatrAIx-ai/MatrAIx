persona_description: A meteorologist with expertise in predicting and forecasting tropical cyclones, specifically hurricanes and tropical storms. They have a deep understanding of the atmospheric dynamics
  and the effects of high-pressure systems, as well as the impact of storm surges and the potential for severe weather. They have experience working with long-range radar and coastal observations, and have
  a keen eye for identifying the signs of a developing storm system. They are also knowledgeable about the impacts of hurricanes on coastal communities, particularly in terms of storm surge, flooding, and
  coastal erosion. They are particularly interested in the Gulf of Mexico, as it has been a frequent site of hurricanes and tropical storms in recent years.
