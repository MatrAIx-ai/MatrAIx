personas:
  professional: Curtis Resnick, a veteran personal care aide with three decades of hands‑on experience, blends meticulous health monitoring and medication management with an inventive therapeutic‑arts approach,
    and they now leverage their psychology coursework to design group art workshops while eyeing a supervisory role.
  sports: Curtis Resnick, an avid weekend hiker who joins the Maumee River Trail Hiking Club, follows the Cleveland Browns in the fall, attends a local bowling league at the Dunkirk Community Center for
    year‑round activity, and they keep fit by tending his vegetable garden and playing casual pick‑up basketball with the church youth group during summer.
  arts: Curtis Resnick, a devoted watercolorist who emulates Claude Monet’s light and Ansel Adams’s composition in his river‑side sketches, volunteers as set designer for the Dunkirk Playhouse, collects
    prints by Mary Cassatt, enjoys the folk storytelling of John Denver, and they draw inspiration from the live performances of local folk singer Sarah Hart at regional arts festivals.
  travel: Curtis Resnick, who prefers leisurely road trips planned on a spreadsheet, has explored the historic canals of Amsterdam, the coastal cliffs of Maine, and the art museums of Chicago, while dreaming
    of a pilgrimage to the ancient monasteries of Ireland’s County Kerry once his retirement savings firm up, balancing his love of nature with a modest budget, and they schedule trips around community
    commitments.
  culinary: Curtis Resnick, a competent home cook who delights in preparing garden‑fresh vegetable stir‑fry, herb‑roasted chicken, creamy corn chowder, and an old‑fashioned apple crisp topped with local
    honey‑drizzled whipped cream, often brings his signature beet and goat‑cheese terrine to community potlucks, and they rigorously season with freshly chopped thyme and sage while occasionally over‑salting
    their soups in a quest for perfect flavor.
  core: Curtis Resnick blends meticulous care with boundless imagination, juggling a love for therapeutic arts and a stubborn skepticism toward fleeting trends, yet they habitually forget to water potted
    herbs on rainy days.
background:
  cultural: Curtis was raised in a multi‑generational white family rooted in the small‑town culture of northwest Ohio. His German‑American and Irish‑American heritage emphasized a pragmatic Midwestern work
    ethic, loyalty to community institutions such as churches, schools, and local volunteer groups, and appreciation for seasonal celebrations and potluck gatherings. Growing up near the Maumee River fostered
    a love for outdoor recreation and an affinity for the region’s agricultural heritage. While the community valued modesty and reliability, his household also encouraged artistic expression—his mother
    sang in the church choir and his father built model aircraft—nurturing his imaginative side. Today, Curtis remains an active participant in the Dunkirk community center, regional arts festivals, and
    the local historical society, reflecting a blend of traditional Midwestern values and a curiosity for broader cultural experiences.
