  career_goals: Curtis aims to formalize his expertise by completing his associate degree in health administration and earning certified nursing aide credentials. He aspires to move into a supervisory or
    care‑coordinator role within his agency, where he can design and implement creative therapeutic programs for residents. In the longer term, he envisions establishing a boutique home‑care service that
    blends high‑quality personal assistance with arts‑based wellness activities. He also seeks to mentor the next generation of aides, sharing both his technical skills and his passion for innovative care.
