personas:
  professional: Joanna Mewes, a seasoned early childhood educator with three decades of classroom leadership, blends her mastery of lesson planning, developmental observation, and inclusive pedagogy with
    a curious, art‑driven approach that constantly experiments with nature‑based learning in the Black Hills, balancing meticulous organization with spontaneous creativity.
  sports: Joanna Mewes enjoys low‑impact outdoor activities, trekking the Black Hills’ Sally Rider Trail with the local Missouri River Trails Club, cheering on the Rapid City Rush hockey team, joining a
    community senior softball league each spring, and they incorporate gentle yoga sessions twice weekly to stay limber.
  arts: Joanna Mewes finds artistic inspiration in the watercolors of Georgia O'Keeffe and the impressionist brushwork of Claude Monet, attends the annual Black Hills Art Fair to support regional artisans,
    volunteers at the library to read stories by Ann Patchett, and they often translate scenes from Hilary Mantel's historical novels into their own watercolor series.
  travel: Joanna Mewes prefers purposeful travel that blends art and nature, having painted en plein air in Provence, France, hiked the Grand Canyon’s South Rim, taken a road trip through the Colorado Rockies
    to attend the Denver Art Museum’s Impressionist exhibition, while they dream of a future retreat in Kyoto to study traditional Japanese textile weaving.
  culinary: Joanna Mewes loves farm‑to‑table cooking, frequently preparing roasted beet and kale salad with a walnut‑basil vinaigrette, simmering bison stew with root vegetables for community potlucks,
    baking sourdough bread using heirloom wheat, and they sometimes over‑spice dishes in excitement.
  core: Joanna Mewes balances a passion for art, nature, and community with a meticulous yet flexible mindset, sprinkling occasional forgetfulness for bills into an otherwise well‑organized life.
background:
  cultural: Joanna grew up in a multigenerational Midwestern family with German‑Scandinavian roots, deeply connected to the rural communities of South Dakota. The values of self‑reliance, hospitality, and
    stewardship of the land shape her worldview. Living in Hot Springs near the Black Hills, she embraces the region’s natural beauty and respects the Lakota heritage of the area, often incorporating respectful
    cultural lessons into her classroom. Her community involvement reflects a blend of small‑town American traditions, church gatherings, and participation in local festivals that celebrate both pioneer
    and Indigenous histories.
attributes:
  skills: '["Lesson planning with arts integration", "Classroom management", "Early childhood development assessment", "Parent communication", "First aid/CPR certification", "Educational technology proficiency",
    "Outdoor and nature‑based learning", "Conflict resolution", "Curriculum development", "Community outreach"]'
  hobbies: '["Watercolor painting", "Weaving", "Gardening", "Hiking", "Birdwatching", "Nature journaling", "Yoga", "Reading historical fiction", "Art history reading", "Volunteering at library", "Story‑time
    facilitation", "Children’s book club coordination"]'
  career_goals: Joanna aims to transition into a lead teacher or curriculum coordinator role at her preschool, where she can design district‑wide early‑learning programs that emphasize art and environmental
    stewardship. She plans to pursue a state‑approved early‑childhood teaching credential and a specialized certification in inclusive education. Long‑term, she hopes to launch a small community learning
    center that offers after‑school art workshops and nature exploration for children and families, and to mentor new teachers through a local professional‑development network.
