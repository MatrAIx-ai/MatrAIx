personas:
  professional: Judy Pumphrey, a 25‑year‑old nursing assistant with a business degree, blends hands‑on patient care—vital‑signs monitoring, medication assistance, and chart documentation—with unit scheduling,
    inventory control, and financial record‑keeping, leveraging her practical, structure‑loving mindset to improve workflow while still adapting on the fly when unexpected issues arise.
  sports: Judy Pumphrey, a solo‑walk enthusiast, joins the local park’s early‑morning walking club, loyally roots for the Atlanta Braves during baseball season, and occasionally attends community yoga sessions
    at the downtown wellness studio, preferring low‑impact activities that fit her flexible schedule.
  arts: Judy Pumphrey devotes evenings to the world of mystery and historical fiction, favoring authors like Agatha Christie and Hilary Mantel, while also listening to folk‑rock icons such as Emmylou Harris
    and The Lumineers, and unwinding with classic film reruns starring Meryl Streep.
  travel: Judy Pumphrey enjoys weekend getaways to nearby historic towns like Savannah and Charleston for their charming streets and garden tours, dreams of a solo trip to the countryside of Ireland to
    trace medieval castles, and prefers carefully planned itineraries that balance quiet exploration with modest budgeting.
  culinary: Judy Pumphrey’s culinary pursuits revolve around Southern comfort dishes—she perfects shrimp and grits, collard greens, and pecan‑topped sweet potatoes—using fresh herbs from her balcony garden
    like thyme and basil, and rates herself as an intermediate home cook who loves experimenting with spice blends.
  core: Judy Pumphrey is a pragmatically competitive 25‑year‑old who thrives on structured work, sporadic splurges on yarn, and solitary hobbies, all while juggling a future in nursing leadership with a
    love for low‑key Southern cooking.
background:
  cultural: Judy is a white Southern woman raised in Birmingham, Alabama, within a middle‑class, traditionally Protestant (likely Baptist) family. Her upbringing emphasized hospitality, community values,
    and a strong work ethic. She carries the region's appreciation for family gatherings, church involvement, and Southern culinary traditions, while also valuing the practical, self‑reliant mindset common
    in the area.
attributes:
