  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Cooking Southern recipes'', ''Knitting'', ''Solo yoga and meditation'', ''Walking in local parks'', ''Puzzles and brain teasers'']'
  career_goals: Judy aims to leverage her business degree and nursing assistant experience to transition into a registered nurse role and eventually into health‑care administration. She is pursuing a RN
    certification while eyeing a future as a patient‑care coordinator or unit manager, where she can drive efficiency improvements and lead a small team. Long‑term, she envisions starting her own home‑care
    agency that blends clinical quality with sound business practices.
