persona_description: A scientist who specializes in the field of microbiology, particularly in the study of bacterial behavior and decision-making in stressful situations. Prof. Ben Jacob's research focuses
  on using the decision-making of bacteria as a model to make his case and provides insights into how to manage stock portfolios. He believes that bacteria would be suspicious of committing to swine flu
  shots and would not opt for a colony-wide vaccination. His research may also provide investors with insight into how to manage stock portfolios.
