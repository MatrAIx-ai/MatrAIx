  career_goals: Benjamin often talks about wanting to become a firefighter because he admires how firefighters help people, wear a uniform, and follow clear schedules. He also imagines being a teacher so
    he can help other kids learn, and he is fascinated by astronauts because of the structured training and the idea of exploring new worlds. His career dreams are rooted in roles that involve helping the
    community, have predictable routines, and offer a sense of belonging.
