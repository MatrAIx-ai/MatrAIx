personas:
  professional: Benjamin Smith, a five‑year‑old aspiring astronaut who meticulously arranges LEGO bricks into launch pads at home, channels their love for structure into detailed play while they remain
    delightfully flexible when their imagination leads them to spontaneous space adventures.
  sports: Benjamin Smith dribbles a miniature soccer ball during recess, proudly wears their little league jersey of the hometown Tigers, and they look forward to their weekly swim lessons at the community
    pool where they pretend to be a dolphin competing against the local Aquatics Club, all while cheering for the New York Yankees on TV.
  arts: Benjamin Smith sings loudly along to Raffi’s “Baby Beluga” while they draw vibrant pictures of dinosaurs inspired by beloved picture books, and evenings often include watching classic Disney movies
    starring Mickey Mouse, which they cherish as a key source of imagination.
  travel: Benjamin Smith has explored the nearby strawberry farm during a family day trip and they dream of riding the carousel at Disneyland in California, preferring short, well‑planned outings that balance
    their need for routine with the excitement of new sights.
  culinary: Benjamin Smith prefers mac and cheese with a sprinkle of cheddar and crunchy carrot sticks, and they can assemble a peanut‑butter‑jelly sandwich with surprising precision, yet stubbornly refuse
    broccoli, claiming its green color scares them.
  core: Benjamin Smith is a meticulous yet whimsical five‑year‑old who thrives on routine, bursts into tears over small setbacks, and they find comfort in LEGO rockets, superhero stickers, and soothing
    bedtime songs.
background:
  cultural: Benjamin grows up in Woodbridge, Prince William County, a diverse suburb of Washington, D.C., within a middle‑class African‑American family. His parents work in caring professions—his mother
    as a registered nurse and his father as an elementary school teacher—instilling the values of service and education. Family gatherings feature soulful cuisine like baked collard greens and sweet potato
    pie, and the home is filled with a mix of classic Motown, contemporary R&B, and gospel music that his grandparents enjoy. He attends a local public elementary school and participates in a community
    church that celebrates African‑American traditions such as Juneteenth, black history month, and gospel choirs. Stories of his grandparents' experiences during the civil‑rights era are shared at family
    events, giving him a sense of pride in his heritage. This cultural milieu encourages his cooperative nature, his interest in community‑oriented careers, and his love for music, rhythm, and storytelling.
