persona_description: A military personnel who is interested in developing and using wearable health monitoring instruments for the purpose of monitoring and analyzing physiological data of the human body
  and their physical condition during training or combat activities. They are interested in the use of such devices for the purpose of preventing personal injuries due to overload and optimizing the squad
  in the fight. They are also interested in effective training and the optimization of the training strategy. They are interested in the quantification of the training quality. They are looking for a system
  that is body-worn, non-obtrusive, non-invasive, easy to use, and capable of monitoring and analyzing physiological data of the human body in real-time using secure wireless technology. They are looking
  for a system that can provide personal security of the soldier, optimalization of the squad in the fight, and effective training.
