  hobbies: '["painting (watercolor & acrylic)", "visiting art galleries and street art tours", "reading mystery and historical fiction", "herb gardening", "volunteering at community food programs (teaching
    baking basics)", "hiking and nature walks", "experimental home cooking and recipe development", "attending local music and cultural festivals"]'
  career_goals: Lezlee aims to transition from a staff baker to the owner of a community‑focused bakery that doubles as a local art space, where patrons can enjoy pastries inspired by rotating gallery exhibits.
    She plans to obtain a Certified Pastry Chef credential to formalize her skills and to enroll in short‑term culinary workshops that explore global baking traditions. Long‑term, she hopes to launch a
    mentorship program for aspiring bakers from underserved neighborhoods, publish a cookbook that fuses classic European techniques with modern, experimental flavors, and eventually expand her concept
    to a second location that supports neighborhood food initiatives.
