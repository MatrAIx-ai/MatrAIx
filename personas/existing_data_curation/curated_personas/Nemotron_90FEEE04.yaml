  career_goals: Marta aims to advance from a housekeeper to a supervisory role within a large hotel or property‑management company, seeking certification as a Certified Professional Housekeeper. She plans
    to complete her GED to strengthen her credentials and eventually enroll in a vocational program focused on hospitality management. Driven by a competitive spirit, she wants to be recognized as the most
    reliable and efficient employee, earning promotions and higher wages. In the long term, she aspires to launch her own cleaning business that serves the Spanish‑speaking community in Los Angeles, leveraging
    her cultural insight and commitment to high‑quality service.
