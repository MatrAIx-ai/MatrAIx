  career_goals: Damarkus aspires to attend a high school with a robust arts program and later study graphic design or multimedia production at college. He dreams of becoming a creative director or community
    arts curator who can launch a youth‑led media collective that highlights stories of Brooklyn neighborhoods. By merging his love for visual arts, storytelling, and technology, he hopes to produce large‑scale
    public art events and mentor younger teens, advocating for expanded arts education and community engagement.
