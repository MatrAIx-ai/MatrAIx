  career_goals: Mark aims to climb into a supervisory role within the next two years, leveraging his consistent top-performer record. He plans to complete a short certification in call-center quality assurance
    to qualify for a team lead or shift supervisor position. In the longer term, he envisions transitioning to a training specialist role, where he can design onboarding modules and share his on-the-job
    expertise. Financially, he seeks a salary increase that will enable a more comfortable retirement and allow his family to offset rising living costs. He also entertains the idea of launching a small
    side business—such as a handyman service—where his practical skills and competitive spirit can be applied in a more flexible setting.
