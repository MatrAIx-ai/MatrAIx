personas:
  professional: William Hurry, a seasoned automotive service technician with three decades of mastery in engine diagnostics, classic‑car restoration, and custom paint artistry, channels their methodical
    curiosity and outgoing energy into meticulous service records, assertive customer communication, and mentorship of apprentices.
  sports: William Hurry, a devoted fan of the Detroit Tigers and Lions, jogs the Belle Isle trail three times a week with the Belle Isle Runners club, plays pick‑up basketball at the community center during
    summer, and attends Red Wings games for occasional night outs with friends, often sharing their energetic presence with fellow fans.
  arts: William Hurry, an avid street photographer, captures Detroit’s mural scene inspired by artists like Tyree Guyton and exhibits their black‑and‑white shots at the Detroit Institute of Arts, while
    curating playlists that feature Stevie Wonder, B.B. King, and Miles Davis to fuel their love for Motown, jazz, and blues.
  travel: William Hurry enjoys weekend road trips in their restored Impala to historic auto museums in Akron and Cleveland, dreams of a pilgrimage to the Mercedes‑Benz Museum in Stuttgart, and occasionally
    retreats to the shores of Lake Huron for quiet fishing and reflection.
  culinary: William Hurry, a competent home cook, loves preparing soulful dishes like smoked brisket with a coffee‑rub, collard greens simmered with ham hocks, and Detroit‑style pizza topped with pepperoni
    and caramelized onions, often sharing meals at neighborhood cooking circles where their secret ingredient is a dash of hot sauce.
  core: William Hurry blends the precision of a master mechanic with a restless artistic soul, juggling classic‑car restorations, neighborhood cookouts, and a relentless worry about the future that fuels
    both their ambition and occasional late‑night coffee habit.
background:
  cultural: William grew up in a tight‑knit African‑American community on Detroit’s east side, where the roar of assembly lines and the lullabies of Motown were everyday sounds. His parents worked at a
    nearby auto plant and a local church, instilling in him a strong work ethic, a respect for collective solidarity, and a love for soulful music. The city’s rich automotive heritage and vibrant street‑art
    culture sparked his fascination with machines and visual expression alike. He frequented the Henry Ford Museum and the Detroit Institute of Arts as a teenager, experiences that nurtured his curiosity
    for design and history. As a Black mechanic, William has been mindful of the under‑representation of minorities in the trade, which fuels his commitment to mentor youth and support community outreach.
    He draws pride from the legacy of African‑American innovators in Detroit’s auto industry and celebrates his heritage through participation in cultural festivals such as the African American Music Festival
    and local church gatherings.
attributes:
  skills: '[''Engine diagnostics and repair'', ''Transmission service and rebuild'', ''Hybrid and electric vehicle maintenance'', ''Automotive electrical systems troubleshooting'', ''Brake and suspension
    system repair'', ''Precision engine rebuilding and balancing'', ''Custom performance modifications'', ''Classic car restoration and custom painting'', ''Use of OBD‑II and advanced diagnostic software'',
    ''Customer communication and documentation'']'
  hobbies: '[''Restoring a 1969 Chevrolet Impala with custom paint'', ''Attending Detroit car meets and auto shows'', ''Street photography of Detroit’s architecture and murals'', ''Visiting art galleries
    and museum exhibitions'', ''Listening to and collecting Motown, jazz, and blues records'', ''Jogging on Belle Isle’s lakeside trails'', ''Cooking soul‑food meals for friends and community gatherings'',
    ''Mentoring youth in automotive apprenticeship programs'', ''Participating in local drumming circles'', ''DIY custom vehicle painting and detailing'']'
  career_goals: William seeks to formalize his wealth of experience with an ASE Master Technician certification, focusing on emerging electric‑vehicle technology. Over the next five years he aims to secure
    a service‑manager position at his current shop, where he can mentor apprentices—especially young Black men interested in the trades—to increase representation and build a supportive pipeline. Long‑term,
    William envisions opening a boutique garage that specializes in classic‑car restoration paired with bespoke artistic paintwork, providing a space where his mechanical skill and love for art converge.
    He also plans to partner with local community colleges to develop a weekend workshop series on automotive basics for underserved youth, hoping to give back while establishing a steady supplemental income
    that reduces his financial stress.
