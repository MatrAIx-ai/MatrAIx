  hobbies: '[''Gardening'', ''Hiking'', ''Reading medical journals'', ''Reading fiction'', ''Book club'', ''Volunteer at community health fair'', ''Mindfulness meditation'', ''Journaling'']'
  career_goals: Diana aims to obtain her Licensed Practical Nurse (LPN) certification within the next two years and ultimately transition to a Registered Nurse (RN) degree. She is motivated to specialize
    in community health nursing to serve the diverse population of Tulare County, leveraging her familiarity with local agricultural families. Her competitive drive pushes her to seek leadership responsibilities,
    such as becoming a charge aide or unit mentor, while she also plans to acquire certifications in wound care and medication administration to broaden her expertise. Managing workplace stress is a personal
    priority, so she intends to incorporate stress-reduction techniques into her routine and advocate for better staff wellness resources.
