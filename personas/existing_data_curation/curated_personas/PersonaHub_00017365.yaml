persona_description: A geologist who specializes in the study of igneous rocks and their textures, particularly porphyritic textures. His research interests include the formation and characteristics of
  porphyritic rocks, the process of porphyry formation, the application of porphyritic textures in mineral deposits, and the cultural and historical uses of porphyritic stones. He is also interested in
  the enrichment of metals in porphyritic rocks and the processes that lead to the formation of porphyry deposits.
