  hobbies: '[''Woodworking'', ''Fishing'', ''Golf'', ''Gardening'', ''Reading historical biographies'', ''Crossword puzzles'', ''Chess'', ''Rotary Club volunteering'', ''Local history society participation'',
    ''Cooking'']'
  career_goals: As he approaches the final stages of his career, Scott aims to ensure the long‑term sustainability of his practice by mentoring a younger physician to take over leadership. He intends to
    expand telehealth services to reach isolated patients across Hancock County and to spearhead a regional rural health initiative focused on elder care and mental health support. He also aspires to serve
    on the county health board, advocate for policies that improve access to primary care, and publish a series of case studies on chronic disease management in a rural setting. While planning a gradual
    transition to part‑time work, he remains committed to leaving a legacy of high‑quality, evidence‑based care for his community.
