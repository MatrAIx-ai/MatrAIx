personas:
  professional: Shantrell Severe’s budding professional persona is that of a miniature organizer, rigorously arranging blocks by shape and color, maintaining a tiny schedule on a notebook for playtime and
    snack breaks, and they strive for flawless tidy‑up routines that rival adult office standards.
  sports: Shantrell Severe thrives on the neighborhood Little League’s T‑ball field and preschool soccer circle, proudly sporting a miniature New York Yankees cap while cheering for the team on TV, and
    they competitively race peers to score the most runs during recess, demonstrating disciplined play and a love for routine.
  arts: Shantrell Severe’s artistic side shines while drawing beloved characters such as Mickey Mouse and Elsa from Disney’s Frozen, singing loudly along to Idina Menzel’s Let It Go, and they eagerly re‑enact
    classic cartoons starring Bugs Bunny, turning everyday moments into vivid performances.
  travel: Shantrell Severe enjoys family road trips to the coastal sand dunes for building castles, dreams of strolling through Disney World’s Magic Kingdom in Orlando, and they prefer hotels with bright
    colors and scheduled nap times, balancing a thirst for adventure with a deep love of familiar routines.
  culinary: Shantrell Severe, a developing foodie, favors buttery macaroni and cheese, peanut‑butter‑jelly sandwiches, and crisp apple slices, meticulously arranging each bite in neat rows on the plate,
    yet they steadfastly refuse broccoli and carrots, often negotiating extra pudding as a reward for clean eating.
  core: Shantrell Severe, a meticulous 3‑year‑old, insists on aligning crayons by shade before any drawing, counts each spoonful of cereal, and they paradoxically leave toys scattered, turning tidy‑up time
    into a daily treasure hunt.
background:
  cultural: Shantrell is part of an African‑American family rooted in Louisville, Kentucky. Her household celebrates Southern Black traditions, including weekly church attendance where gospel music and
    community fellowship are central. Family gatherings often feature soul food, storytelling, and rhythmic clapping games that reinforce cultural pride. The neighborhood emphasizes mutual support, respect
    for elders, and perseverance, shaping Shantrell's disciplined and achievement‑focused outlook.
