  hobbies: '[''Building blocks'', ''Coloring'', ''Listening to gospel‑influenced children’s music'', ''Dancing'', ''Reading picture books with repetitive text'', ''Playing Simon Says'', ''Exploring playground
    equipment'']'
  career_goals: Even at three, Shantrell talks about wanting to become a teacher or a dancer when she grows up. She imagines leading a classroom, helping other children learn, and performing on a stage
    where she can showcase the routines she loves. She also expresses a simple but clear ambition to be big and take care of her family, reflecting a strong desire for achievement and responsibility.
