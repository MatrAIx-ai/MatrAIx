personas:
  professional: Collin Lassiter, a budding LEGO architect in training, combines methodical planning and a love for leading group games to design intricate builds that impress peers at his after‑school club.
  sports: Collin Lassiter plays forward for the Cedarbrook Kids Soccer Club, devotes after‑school hours to dribbling drills at the local park, and cheers on the city’s professional baseball team, the River
    City Raptors, while also enjoying winter soccer camps.
  arts: Collin Lassiter spends weekends sketching dragons and unicorns inspired by Studio Ghibli’s Totoro and Princess Mononoke, while humming the catchy tune of Disney’s Let It Go and watching the animated
    adventures of Adventure Time starring Jeremy Shada, weaving these influences into their own imaginative drawings.
  travel: Collin Lassiter loves family road trips to the nearby Redwood State Park for camping, has visited Disney World in Florida, and dreams of exploring the giant sandstone arches of Utah’s Arches National
    Park on a future summer vacation.
  culinary: Collin Lassiter prefers bite‑size foods like chicken nuggets, mac and cheese, and pepperoni pizza, proudly makes peanut‑butter‑banana sandwiches at the kitchen counter, and delights in a vanilla
    ice cream sundae topped with hot fudge, sprinkles, and a cherry.
  core: Collin Lassiter’s boundless curiosity and love for leading games often turns playgrounds into mini‑project sites, though they sometimes forget to finish LEGO builds before bedtime, leaving unfinished
    towers scattered across their room.
background:
  cultural: Collin is a White American growing up in a small Midwestern town in Lima, Ohio. His family reflects typical Midwestern values—emphasis on community, school involvement, and family gatherings,
    often centered around local church events and seasonal festivals. The local culture promotes friendliness, cooperation, and a practical outlook, which aligns with his sociable and organized personality.
attributes:
  skills: '[''Reading fluency'', ''Basic arithmetic'', ''LEGO construction'', ''Oral communication'', ''Team collaboration'', ''Elementary coding (Scratch Jr.)'']'
