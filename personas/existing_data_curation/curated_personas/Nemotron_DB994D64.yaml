  career_goals: Collin dreams of exploring big ideas and helping others. He often talks about becoming an astronaut who discovers new planets, a scientist who invents helpful devices, or a teacher who shares
    knowledge with younger kids. His practical side fuels a desire to learn the steps needed to achieve these dreams, such as studying hard, building things, and staying organized.
