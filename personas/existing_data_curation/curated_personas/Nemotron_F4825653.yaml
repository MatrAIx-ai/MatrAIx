  hobbies: '[''Golf'', ''Desert hiking'', ''Woodworking'', ''Classic car restoration'', ''Reading historical biographies'', ''Chess'', ''Cactus gardening'', ''Community volunteering at the museum'']'
  career_goals: As he approaches retirement, Marcus aims to leave a lasting imprint on the organization by formalizing succession plans and codifying the best‑practice processes he has refined over the
    years. He aspires to transition into an advisory capacity where he can coach emerging managers, oversee strategic projects that improve operational efficiency, and contribute to community‑focused initiatives—such
    as consulting for local small‑businesses or serving on a nonprofit board. His primary ambition is to ensure the business continues to run smoothly after his departure while preserving the culture of
    reliability he values.
