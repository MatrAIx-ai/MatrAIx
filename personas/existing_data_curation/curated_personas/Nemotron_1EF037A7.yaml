personas:
  professional: Shanon Fuglaar, a detail‑oriented editorial specialist, leverages AP and Chicago style mastery, InDesign and WordPress fluency, and a collaborative, community‑focused mindset to shepherd
    manuscripts from draft to publication while juggling the occasional missed deadline due to their love of spontaneous social events.
  sports: Shanon Fuglaar enjoys weekend hikes through the Indiana Dunes, participates in a local recreational soccer league, and roots for the Chicago Cubs and Bears, balancing active outings with a laid‑back
    approach to scheduled workouts.
  arts: Shanon Fuglaar is a community‑theater performer who hosts a weekly book club, reveres playwrights like August Wilson, and finds inspiration in the music of The National and the paintings of regional
    gallery shows, often quoting lines from classics during editorial meetings.
  travel: Shanon Fuglaar prefers spontaneous road trips in a compact hatchback to nearby music festivals in Nashville, Austin, and Detroit, mixes in brief itineraries with last‑minute detours to craft breweries,
    and dreams of a future literary pilgrimage to Dublin’s book fairs.
  culinary: Shanon Fuglaar experiments with farm‑to‑table recipes such as roasted beet salad with goat cheese, homemade sourdough, and grilled corn on the cob, often pairing dishes with locally brewed IPAs
    and sprinkling fresh basil and cilantro from their garden.
  core: Shanon Fuglaar is a sociable editor who blends structure with spontaneous community‑centric fun, occasionally misplacing deadlines while passionately championing inclusive storytelling and weekend
    hikes.
background:
  cultural: Shanon is a white Midwesterner of Dutch heritage, reflected in her surname Fuglaar. Raised in a small town near Valparaiso, Indiana, she grew up steeped in Midwestern values of practicality,
    community involvement, and modesty. Family traditions include neighborhood potlucks, church gatherings, and seasonal celebrations with regional dishes. Her upbringing near Lake County’s lakes and farmland
    fostered an appreciation for outdoor recreation and a connection to local history. While her humanities education broadened her cultural perspective, she remains rooted in the friendly, collaborative
    spirit that defines her community.
attributes:
  skills: '[''Copyediting'', ''Proofreading'', ''Content Management Systems (WordPress, Drupal)'', ''AP Style Guide'', ''Chicago Manual of Style'', ''Digital Publishing (InDesign, Adobe Acrobat)'', ''Project
    Coordination'', ''Team Collaboration'', ''Interpersonal Communication'', ''Basic Graphic Design'']'
  hobbies: '[''Book Club'', ''Community Theater'', ''Hiking in Indiana Dunes'', ''Gardening'', ''Cooking'', ''Craft Brewery Tasting'', ''Volunteering at Public Library'', ''Road Trips with Friends'']'
  career_goals: Shanon aims to progress to a senior editorial role within the next three to five years, eventually taking on editorial management responsibilities for a regional publishing house or launching
    her own literary magazine that highlights Midwestern voices. She is passionate about mentoring junior writers and editors, building inclusive content initiatives, and integrating multimedia storytelling
    into traditional publishing. Balancing professional growth with her marriage and community involvement remains a core ambition.
