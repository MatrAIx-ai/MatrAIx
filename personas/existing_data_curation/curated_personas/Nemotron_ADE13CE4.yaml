personas:
  professional: Zhong Chang, a veteran registered nurse with two decades of clinical practice, excels in comprehensive patient assessments, IV therapy, wound management, and health informatics, and channels
    a structured, data‑driven approach into mentoring new nurses and developing culturally attuned patient education programs.
  sports: Zhong Chang enjoys hiking the Blue Hills and Mohawk Trail with the local trail club, competes in badminton at the Worcester Badminton Association, and follows the Boston Red Sox, New England Patriots,
    and Boston Celtics, balancing structured workouts with spontaneous weekend runs.
  arts: Zhong Chang attends Boston Symphony Orchestra concerts, listens to folk‑rock groups like the Avett Brothers, reads nonfiction by Atul Gawande, and hosts board‑game nights featuring strategy titles
    such as Catan and Terraforming Mars, finding creative renewal in music, literature, and playful competition.
  travel: Zhong Chang prefers meticulously planned trips that blend cultural immersion with nature, having explored Kyoto’s historic streets, Tuscany’s vineyards, and Acadia National Park’s rugged trails,
    while dreaming of a Pacific Coast Highway road trip and a winter ski adventure in Quebec.
  culinary: Zhong Chang is an adept home cook who delights in preparing aromatic braised pork belly with star anise, ginger, and soy glaze, steaming delicate dumplings filled with ground pork and chives,
    and crafting a vibrant herb salad with cilantro, mint, and lime, often sourcing fresh produce from the local farmer’s market.
  core: Zhong Chang is a structured, community‑focused nurse who merges meticulous clinical expertise with a love for hiking, board games, and flavorful cooking, balances disciplined finances with occasional
    indulgences, and navigates mild hypertension through proactive health habits.
background:
  cultural: Zhong was born to immigrant parents from Fujian province, China, and raised in a bilingual household in the Greater Boston area. His upbringing combined traditional Chinese values—such as respect
    for elders, emphasis on education, and a collective sense of responsibility—with American ideals of individualism and community involvement. He celebrates Chinese New Year, the Mid‑Autumn Festival,
    and participates in local Asian cultural events, which reinforce his connection to his roots. These cultural influences shape his compassionate approach to nursing, his commitment to harmony in team
    settings, and his drive to bridge cultural gaps in healthcare for the growing Asian American population in New England.
