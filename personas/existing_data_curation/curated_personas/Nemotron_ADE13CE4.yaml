    health policy books'', ''Attending cultural festivals'', ''Cycling around Milford'']'
  career_goals: Zhong aims to transition into a nurse manager or clinical educator role within the next five years, pursuing a Master of Science in Nursing with a focus on administration while expanding
    his expertise in health policy and community health. He is passionate about reducing health disparities among Asian American seniors and plans to develop culturally tailored outreach programs in the
    Worcester County area. He also aspires to mentor the next generation of nurses, author educational materials, and eventually lead hospital‑wide quality improvement and patient safety initiatives. His
    long‑term vision blends clinical leadership, advocacy, and cultural competency to improve patient outcomes.
