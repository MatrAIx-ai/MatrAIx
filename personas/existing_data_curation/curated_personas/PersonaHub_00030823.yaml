persona_description: A veterinarian who specializes in the diagnosis and treatment of sheep and cattle diseases, particularly those affecting the skin and liver. She or he has extensive knowledge and experience
  in identifying the symptoms, causes, and treatments for facial eczema, as well as other skin diseases and liver disorders. The individual is likely to be well-versed in the chemical composition and effects
  of sporidesmin, the toxic substance associated with facial eczema. The veterinarian also likely has a keen eye for the signs of photosensitization, the delayed reaction to sporidesmin that can occur after
  a single dose.
