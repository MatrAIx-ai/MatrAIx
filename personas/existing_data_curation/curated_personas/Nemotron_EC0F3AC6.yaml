personas:
  professional: Hai Yi, a 69‑year‑old veteran production floor supervisor, combines meticulous statistical process control expertise with bilingual leadership to keep automated assembly lines running smoothly
    while mentoring younger workers and dreaming of a community workshop that blends craft and art.
  sports: Hai Yi regularly paddles with the Oahu Surf Society at Makaha Beach, hikes the Koʻolau Trail as part of the Honolulu Trail Runners, and passionately roots for the University of Hawaii Rainbow
    Warriors men’s basketball and the Seattle Seahawks, balancing group activity with personal fitness.
  arts: Hai Yi spends evenings at local galleries admiring the vivid murals of Ricky Grant, practices Chinese calligraphy inspired by masters like Wang Xihui, paints expressive seascapes reminiscent of
    Maya Akiyama, and sings karaoke to the tunes of Jack Johnson and Bruno Mars, weaving art into daily life.
  travel: Hai Yi’s travel journal lists surf trips to Bali, calligraphy workshops in Tokyo, family hikes on Maui, and a bucket‑list desire to trek Mongolia’s grasslands, planning each adventure on a modest
    budget while allowing for spontaneous detours.
  culinary: Hai Yi, an enthusiastic home cook, fashions fusion dishes such as pineapple‑glazed pork belly with fermented black beans, ahi poke tacos seasoned with five‑spice, and spam musubi topped with
    mango salsa, favoring ingredients like shiitake mushrooms, taro, coconut milk, and fresh hibiscus for marinades.
  core: Hai Yi is a curious 69‑year‑old mentor who balances precise production expertise, surf‑scented mornings, and a mischievous habit of over‑cooking exotic fusion meals while constantly worrying about
    the next wave or spreadsheet.
background:
  cultural: Hai Yi is a third‑generation Chinese‑American born and raised in Honolulu. His grandparents emigrated from Guangdong province in the 1950s, bringing Cantonese language, traditional festivals
    such as Lunar New Year, and a strong emphasis on family and education. Growing up in a bilingual household, Hai Yi learned to navigate both Chinese cultural values—respect for elders, community harmony,
    and culinary heritage—and Hawaiian customs, including the spirit of ‘ohana (family) and the island’s reverence for nature. This blended heritage informs his appreciation for art, his sociable nature,
    and his dedication to cultural preservation within the diverse fabric of Hawaiian society.
