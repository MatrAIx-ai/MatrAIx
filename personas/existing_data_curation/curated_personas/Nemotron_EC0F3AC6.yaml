  hobbies: '["Surfing", "Hiking", "Community dancing", "Painting seascapes", "Calligraphy", "Cooking fusion dishes", "Gardening tropical plants", "Karaoke", "Volunteering at cultural festivals", "Reading
    history and technology"]'
  career_goals: As he approaches retirement, Hai Yi hopes to transition into a mentorship and advisory role where he can pass on his extensive production knowledge to younger colleagues, possibly as a safety
    trainer or part‑time consultant for local manufacturers. He dreams of establishing a community workshop that merges traditional Chinese craft techniques with contemporary Hawaiian art, giving seniors
    and youths a creative outlet. Additionally, he aims to maintain financial stability for his family, stay physically active, and reduce stress by balancing work‑related responsibilities with his love
    for the outdoors and family time.
