persona_description: A molecular biologist who specializes in Sanger sequencing and bacterial DNA extraction, particularly in the use of PCR and sequencing techniques to generate amplicons and sequence
  data for bacterial identity determination. They are skilled in the preparation of genomic DNA using the QIAGEN DNeasy kit and the use of PCR primers and reaction mixtures to amplify and purify DNA. They
  are also familiar with the use of sequencing facilities for submitting PCR products for sequencing and interpreting results using specialized software for de novo assembly and signature indexing.
