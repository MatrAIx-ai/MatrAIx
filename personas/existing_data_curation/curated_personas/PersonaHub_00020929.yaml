persona_description: A global health and social policy researcher who specializes in the analysis and prevention of youth violence, particularly in developing countries. She has a deep understanding of
  the complex factors contributing to youth violence and the various prevention programs and policies that have been shown to be effective. Her research interests include the social determinants of violence,
  the impact of violence on individuals and communities, and the development of evidence-based prevention strategies. She is passionate about reducing the global burden of violence and improving the lives
  of young people.
