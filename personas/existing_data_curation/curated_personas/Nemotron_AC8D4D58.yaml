  career_goals: Although Michael is currently not in the formal workforce, he aims to channel his skills into purposeful community contributions. He plans to launch a modest home‑based furniture restoration
    service that allows him to work quietly while sharing his craftsmanship. He also hopes to become a volunteer docent at the York County Heritage Center, where his art‑history knowledge can enrich visitors’
    experiences. Completing a certification in horticulture is another goal, enabling him to lead a small community garden project for senior neighbors. Additionally, Michael aspires to write and self‑publish
    a memoir that weaves together his personal narratives with the cultural heritage of York, Pennsylvania.
