  hobbies: '["Gardening (native Florida plants)", "Birdwatching", "Reading historical fiction", "Knitting and crocheting", "Cooking and trying new recipes", "Digital photography", "Small group Bible study"]'
  career_goals: Although retired, Gloria remains eager to contribute and grow. She wishes to expand her volunteer involvement at the Homosassa senior center, leading workshops on budgeting and digital literacy
    for fellow seniors. She aims to complete a community college digital photography class to document her garden and local wildlife, eventually creating a modest photo album for her grandchildren. Gloria
    also hopes to write a memoir capturing her family's Italian heritage and life in Florida, preserving stories for future generations. Maintaining her health through regular walks, gentle yoga, and balanced
    nutrition is a personal ambition that underpins all her goals.
