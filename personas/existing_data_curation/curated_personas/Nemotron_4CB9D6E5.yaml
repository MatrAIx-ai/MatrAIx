personas:
  professional: Gloria Girardi, a retired homemaker turned community volunteer, channels her meticulous budgeting, hands‑on gardening, and patient teaching into leading budgeting workshops and basic computer
    classes for peers at the Homosassa senior center, all while embodying the quiet reliability she brings to her garden.
  sports: Gloria Girardi stays active with daily morning walks, gentle yoga sessions at the senior center, and low‑impact water aerobics in winter, roots for the Tampa Bay Buccaneers and Tampa Bay Rays,
    and participates in the Homosassa Springs Trail Walking Club, favoring steady, low‑stress fitness routines.
  arts: Gloria Girardi, an avid reader of early‑20th‑century Midwestern novels by Willa Cather, a fan of Ansel Adams’s black‑and‑white landscapes, enjoys the timeless crooning of Frank Sinatra and the folk
    tones of Joan Baez while knitting, and captures sunrise over her garden with a digital camera inspired by Annie Leibovitz.
  travel: Gloria Girardi prefers carefully planned, low‑stress trips, has explored historic Savannah, the waterfront charm of Charleston, and the monuments of Washington, D.C., and dreams of photographing
    the red rocks of Sedona, Arizona, and the aurora borealis in Iceland, all while budgeting travel within her modest retirement earnings.
  culinary: Gloria Girardi delights in blending fresh Gulf shrimp, stone crab, local citrus, and fragrant herbs to create dishes like lemon‑herb grilled grouper, orange‑glazed chicken, and a silky key lime
    tart, and they confidently experiment with new seasoning combos that showcase Florida’s bounty.
  core: Gloria Girardi, a garden‑loving, birdwatching, budget‑sharp senior who balances curiosity with a worry‑prone heart, spends mornings among blossoms and evenings capturing family moments on camera.
background:
  cultural: Gloria is a second‑generation Italian‑American who grew up in a small Midwestern town where Catholic traditions and close‑knit family values were central to daily life. Her grandparents immigrated
    from Italy, bringing recipes, stories, and a strong work ethic that shaped her upbringing. After marrying her husband, she relocated to Homosassa, Florida, where she adopted the relaxed, community‑oriented
    lifestyle of the Gulf Coast while preserving her Italian culinary customs and Sunday Mass attendance. This blend of Italian family heritage, Midwestern sensibilities, and Floridian hospitality informs
    her worldview, emphasizing modesty, generosity, and respect for tradition.
attributes:
  skills: '["Home cooking", "Budget and financial management", "Gardening and plant care", "Basic home maintenance", "First aid and caregiving", "Community volunteer coordination", "Senior computer literacy",
