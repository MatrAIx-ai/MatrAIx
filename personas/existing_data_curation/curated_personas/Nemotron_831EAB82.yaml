  hobbies: '["Reading mystery novels", "Gardening", "Quilting", "Woodworking", "Volunteering at food bank", "Church choir participation", "Hiking in state parks", "Cooking Southern cuisine", "Baking desserts"]'
  career_goals: She hopes to transition from a front‑line assembler to a lead technician or shift supervisor within the next three to five years, pursuing certifications in CNC programming and advanced
    welding to broaden her technical expertise. Aleksandra also aspires to mentor new hires, contribute to process‑improvement teams, and eventually obtain a supervisory role that allows her to influence
    workflow efficiency while maintaining a balanced work‑life schedule.
