  hobbies: '[''Volunteering at food bank'', ''Community theater participation'', ''Recipe experimentation and hosting dinner parties'', ''Gardening (vegetables and herbs)'', ''Hiking local Adirondack trails'',
    ''Attending regional music festivals'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Knitting and quilting'', ''Board game nights with friends'']'
  career_goals: Carrigan aims to transition from a full‑time waitress to a supervisory role, such as maître d' or shift manager, where she can leverage her training experience and organizational skills.
    She plans to complete a certificate in hospitality management through a local community college to strengthen her credentials. Long‑term, she dreams of opening a small, community‑focused café in Shushan
    that highlights locally sourced produce and offers a welcoming space for neighborhood events. Balancing her ambition with her sensitivity to stress, she seeks a work environment that supports mental‑wellness
    initiatives and provides a predictable schedule.
