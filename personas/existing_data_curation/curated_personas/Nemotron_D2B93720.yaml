personas:
  professional: Joseph Coffin, a 40‑year‑old carpenter with an associate degree in construction technology, blends meticulous blueprint reading and disciplined safety practices with a free‑spirited love
    for decorative finishes, turning each custom‑built piece into functional art while they mentor apprentices and champion sustainable building methods.
  sports: Joseph Coffin, 40, channels his love for the outdoors into weekend hikes across the Appalachian foothills with the local Trailblazers Hiking Club and seasonal fishing trips on Lake Lure, stays
    fit through casual pickup basketball at the community center, cheers on the Atlanta Braves in baseball and the Carolina Panthers in football, and joins a Sunday softball league with fellow Habitat for
    Humanity volunteers, while they keep a weathered baseball glove from high school as a lucky charm.
  arts: Joseph Coffin, 40, paints tranquil watercolors of Shenandoah vistas inspired by Winslow Homer, captures sunrise landscapes with a Nikon D850 echoing Ansel Adams’ stark contrasts, and strums a battered
    acoustic guitar at community jam sessions covering Bob Dylan and Gillian Welch, while they collect Sam Maloof–style furniture pieces as artistic benchmarks.
  travel: Joseph Coffin, 40, prefers slow‑paced road trips that let them scout timber sources, having already explored Asheville’s craft scene and the Blue Ridge Parkway, while they dream of a summer workshop
    in Tuscany’s olive groves to study Italian cabinetmaking and a spring pilgrimage to Kyoto to apprentice with master joiners, balancing travel budgeting with a flexible work schedule.
  culinary: Joseph Coffin, 40, cooks with the same hands‑on precision he applies to woodworking, mastering a low‑and‑slow smoked pork rib recipe seasoned with paprika, brown sugar, and garden‑fresh thyme,
    complementing it with buttery corn on the cob, collard greens simmered in smoked turkey broth, and a peach cobbler drizzled with bourbon‑infused caramel.
  core: Joseph Coffin, a 40‑year‑old carpenter‑turned‑aspiring contractor, blends artistic curiosity with community spirit, often losing track of time polishing a new chair while the laundry pile grows,
    and they habitually fuel late‑night design sketches with black coffee.
background:
  cultural: Joseph grew up in Oneonta, Alabama, steeped in Southern traditions and a tight‑knit community ethos. His upbringing was shaped by family gatherings, church involvement, and the regional appreciation
    for craftsmanship and hospitality. He values the slower pace of small‑town life, the storytelling of Southern folklore, and the flavors of local cuisine, while also embracing contemporary ideas through
    art and design. This blend of heritage and open‑minded curiosity informs his work ethic, his collaborative spirit, and his desire to contribute meaningfully to his community.
attributes:
  skills: '[''Framing'', ''Finish Carpentry'', ''Cabinet Making'', ''Custom Woodcarving'', ''Blueprint Reading'', ''Project Management'', ''Client Communication'', ''Safety Compliance'', ''Tool Maintenance'',
