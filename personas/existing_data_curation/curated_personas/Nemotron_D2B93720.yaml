  hobbies: '[''Custom furniture making'', ''Wood carving'', ''Watercolor painting'', ''Landscape photography'', ''Habitat for Humanity volunteering'', ''Community music jam sessions'', ''Hiking'', ''Fishing'',
    ''Southern grilling'', ''Gardening'']'
  career_goals: Joseph aims to transition from a carpenter to a small‑scale contractor, eventually opening his own custom woodworking studio that blends functional craftsmanship with artistic design. He
    plans to earn NCCER Level 3 certification, expand his expertise in sustainable building methods, and mentor apprentices through local trade schools or community workshops. Over the next five years,
    he hopes to build a reputation for high‑quality, handcrafted furniture and contribute to community revitalization projects, balancing his love for art with practical construction.
