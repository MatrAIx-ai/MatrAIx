  career_goals: 'At this stage, Rita’s goals center on reaching key developmental milestones: walking confidently, speaking in short sentences, and engaging more independently in play. Her caregivers hope
    she will continue to nurture her curiosity, creativity, and sociability, eventually pursuing a future where she can express herself through art, community activities, or caring professions that align
    with her compassionate and assertive nature.'
