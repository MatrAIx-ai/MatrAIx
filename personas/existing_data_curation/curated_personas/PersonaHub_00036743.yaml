persona_description: A researcher interested in the impact of bus emissions on in-bus TRAP exposures, specifically focusing on the effects of bus fleet emission standards and the potential for air quality
  improvements through the replacement of older buses with hybrid diesel/electric models. This researcher has conducted extensive monitoring and analysis of bus emissions, including monitoring over 10 months
  of a year and covering a large proportion of the bus transit network. The researcher is particularly interested in estimating the impact of air quality interventions at bus stations and comparing the
  impact of bus fleet turnover on bus station exposures. The researcher is also interested in the potential for air quality improvements for bus riders with the replacement of 1983-2003 buses with hybrid
  diesel/electric buses, and the reduction of bus station levels to that of bus stops.
