personas:
  professional: Chanh Mai, a 43‑year‑old aspiring HVAC contractor and budding food‑stall entrepreneur, leverages their methodical carpentry background, budgeting precision, and bilingual communication skills
    to plan projects, coordinate volunteer events, and design a community‑focused culinary venture.
  sports: Chanh Mai follows the Mississippi State Bulldogs football team, enjoys casual weekend fishing on Lake O'Bannon, participates in a local adult softball league, and hikes the Natchez Trace Trail
    for both fitness and quiet reflection.
  arts: Chanh Mai’s artistic palate includes listening to folk Americana legends like Johnny Cash and contemporary roots band The Avett Brothers, savoring traditional Asian string ensembles, and attending
    community theater productions featuring classic works by Shakespeare and modern plays by Aaron Sorkin, which together shape their creative downtime.
  travel: Chanh Mai prefers modest road trips to historic towns such as Natchez, Mississippi, and Asheville, North Carolina, while dreaming of a culinary pilgrimage to the bustling markets of Bangkok and
    the riverfront eateries of Chiang Mai, balancing limited vacation time with a family‑first budgeting approach.
  culinary: Chanh Mai’s kitchen experiments blend heritage recipes like fragrant lemongrass broth with rice noodles, marinated pork belly glazed with honey and fish sauce, and garden‑fresh herb salads featuring
    cilantro, basil, and okra, showcasing a skill level that ranges from home‑cooked family meals to polished dishes for the county farmers’ market stall.
  core: Chanh Mai is a methodical, community‑oriented craftsman who balances practical trades training with a passion for heritage cooking, all while navigating a disciplined budget, modest health concerns,
    and a love for quiet fishing trips.
background:
  cultural: Chanh is a first‑generation Vietnamese American; his parents emigrated to the United States in the early 1980s and settled in the rural South, eventually making a modest home in Leake County,
    Mississippi. He grew up speaking both Vietnamese at home and English in school, giving him a bicultural perspective. Family gatherings emphasized respect for elders, modesty, and the celebration of
    Tet and other Vietnamese holidays, while the surrounding Southern community introduced him to local customs such as church participation and Southern hospitality. This blend of cultures informs his
    culinary tastes, his community involvement, and his value of harmony and cooperation. Though he has never married, he maintains close ties with his extended family and the local Vietnamese diaspora,
    often serving as a bridge between his heritage and his adopted community.
