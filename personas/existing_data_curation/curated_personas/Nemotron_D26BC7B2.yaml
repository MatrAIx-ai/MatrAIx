  hobbies: '[''Vietnamese cooking'', ''Backyard gardening'', ''Fishing'', ''Reading historical non-fiction'', ''Woodworking'', ''Volunteer work at the county food bank'', ''Organizing cultural festivals'',
    ''Hiking'', ''Playing chess'', ''Listening to traditional Vietnamese music and folk Americana'']'
  career_goals: Chanh aims to turn his hands‑on abilities into a stable trade career while also pursuing his passion for food. Over the next two years he plans to enroll in a community‑college HVAC certification
    program to become a licensed contractor, leveraging his methodical work style and reliability. Simultaneously, he intends to complete his associate degree in business administration, which will equip
    him to launch a modest Vietnamese‑styled food stall at the Leake County farmers’ market. His long‑term ambition is to operate a small, community‑focused catering service that can provide seasonal meals
    sourced from his garden, allowing him to blend his culinary heritage with his practical skill set and give back to the local area.
