personas:
  professional: Teri Bailey, a meticulous kitchen supervisor with ServSafe certification, uses their expertise in inventory control, workflow optimization, and Southern‑Tex‑Mex cuisine to consistently deliver
    on‑budget, on‑schedule service while competitively eyeing the head‑chef role at a prominent Greater Houston restaurant.
  sports: Teri Bailey prefers low‑impact fitness, joining a Thursday night pickle‑ball league at a community center, jogging along Buffalo Bayou on Saturday mornings, and cheering for the Houston Astros
    and Rockets while meticulously tracking game stats on a spreadsheet as part of their competitive streak.
  arts: Teri Bailey cultivates a quiet artistic side through food photography, carefully styling dishes before snapping them with a Canon EOS R5, while drawing inspiration from chefs like Thomas Keller
    and Edward Lee, listening to Willie Nelson and the blues of Stevie Ray Vaughan between shifts, and attending quarterly exhibitions at the Houston Museum of Fine Arts.
  travel: Teri Bailey enjoys meticulously planned culinary trips, having already explored the spice markets of Oaxaca, the gumbo bowls of New Orleans, and the wine country of Texas Hill Country, and they
    now aim to itinerary‑map a future culinary pilgrimage to Chiang Mai for Northern Thai flavors while balancing travel costs with their catering startup budget.
  culinary: Teri Bailey, a confident Southern‑Tex‑Mex cook, regularly experiments with herb‑infused brisket tacos, cilantro‑lime shrimp grits, and smoked chicken enchiladas topped with fresh oregano and
    queso fresco, often pairing them with homemade pickled jalapeños, while their herb garden yields basil, cilantro, and sage that they use to elevate both family dinner plates and small‑scale catered
    events.
  core: Teri Bailey blends a chef’s precision with a board‑game strategist’s competitive edge, obsessively perfecting herb‑laden dishes while they occasionally hoard unused puzzle pieces and neglect minor
    dental appointments.
background:
  cultural: Teri was raised in a middle‑class Anglo‑American family in the suburbs of Houston, Texas. Her upbringing combined traditional Southern hospitality with the multicultural influences of the region,
    especially the vibrant Tex‑Mex culinary scene. She values practical hard work, self‑reliance, and a structured lifestyle, traits reinforced by her community’s emphasis on family meals and community
    events. While she identifies with mainstream American cultural norms, she also embraces the regional pride and culinary traditions that have shaped her professional path.
attributes:
  skills: '[''Culinary arts (Southern and Tex‑Mex cuisine)'', ''Menu planning and recipe development'', ''Food safety and sanitation compliance (ServSafe certified)'', ''Kitchen inventory management and
    cost control'', ''Team leadership and staff training'', ''Time management and workflow optimization'', ''Catering for small events and intimate gatherings'', ''Basic nutrition and dietary accommodations'',
    ''Equipment maintenance and safety checks'', ''Point‑of‑sale system operation and data entry'']'
  hobbies: '[''Herb gardening'', ''Home cooking and recipe experimentation'', ''Jigsaw puzzles'', ''Reading culinary biographies and history books'', ''Food photography'', ''Strategic board games with small
    groups'', ''Volunteer work at a local food pantry'']'
  career_goals: Teri aims to advance to a head chef position at a respected restaurant in the Greater Houston area within the next three years, where she can design a signature menu that showcases her Southern‑Tex‑Mex
    heritage. Concurrently, she plans to launch a boutique catering service that focuses on meticulously prepared, small‑scale events for families and close‑knit groups. To support these goals, she intends
    to complete a Certified Culinarian program and compete in regional cooking contests to build her professional reputation.
