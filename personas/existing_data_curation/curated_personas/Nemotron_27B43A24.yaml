  career_goals: Although approaching traditional retirement age, Maurice aims to transition into a mentorship and supervisory role within the postal service, leveraging his extensive experience to improve
    workflow efficiency and support younger colleagues. He hopes to secure a part‑time position that allows him to continue contributing while dedicating more time to community volunteer work, particularly
    at the local senior center and his church. Financial stability and leaving a legacy of reliability and service are central to his ambitions.
