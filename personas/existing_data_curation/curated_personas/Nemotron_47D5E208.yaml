  hobbies: '[''experimenting with traditional Mexican recipes'', ''hiking in the San Bernardino mountains'', ''social dancing (cumbia, salsa)'', ''volunteering at community kitchens'', ''food photography
    for Instagram'', ''attending live music festivals'', ''reading culinary trend articles'']'
  career_goals: Ana aims to advance from managing a single location to overseeing multiple sites as a regional manager for a major restaurant chain within the next five years. She plans to complete her
    bachelor's degree in Hospitality Management, supplementing her practical experience with academic insight. Long‑term, Ana dreams of opening her own modern Mexican eatery that showcases sustainable sourcing
    and innovative twists on classic dishes, while providing mentorship opportunities for young hospitality professionals. She also seeks certifications in culinary arts and sustainable food practices to
    deepen her expertise and leadership credibility.
