personas:
  professional: Ana Santiago, a 23‑year‑old food‑service manager in Southern California, blends meticulous inventory control and ServSafe expertise with a curiosity‑driven appetite for modernizing traditional
    dishes, leading their team with calm resilience and inclusive communication.
  sports: Ana Santiago enjoys weekend hikes with the San Bernardino Trails Club, follows the Los Angeles Lakers and the San Antonio FC for soccer inspiration, and participates in community volleyball games,
    using these activities to balance their energetic work pace with restorative outdoor exercise.
  arts: Ana Santiago channels their sociable spirit into cumbia and salsa nights, curates a vibrant Instagram feed of food photography inspired by artists like Frida Kahlo and chefs such as Massimo Bottura,
    and devotes evenings to listening to classic Latin‑influenced musicians like Carlos Santana while exploring contemporary culinary podcasts.
  travel: Ana Santiago prefers short road trips to the California wine country and occasional flights to a renowned southwestern culinary market, planning itineraries on a tight budget while savoring the
    blend of adventure and relaxation that fuels their menu ideas.
  culinary: Ana Santiago's culinary repertoire includes homemade pozole, hand‑shaped tamales, and huitlacoche quesadillas seasoned with smoked ancho chilies, and they balance their intermediate cooking
    skill set with a penchant for plating aesthetics and experimenting with sustainable, locally sourced heirloom corn.
  core: Ana Santiago, a 23‑year‑old resilient manager, merges disciplined organization with spontaneous flavor experiments, delights in salsa dancing and mountain hikes, budgets prudently yet splurges on
    kitchen toys, and captures every vibrant dish on camera.
background:
  cultural: Ana’s Mexican heritage is a central thread in her identity. Raised in a bilingual household, she grew up celebrating Día de los Muertos, Cinco de Mayo, and other cultural festivities that emphasize
    family, community, and food. These traditions instilled in her a deep appreciation for communal meals and the role of food in cultural expression. Her parents’ immigrant journey fostered a resilient
    work ethic and a respect for both Mexican and American customs. This bicultural perspective influences her culinary palate, her commitment to inclusive workplace practices, and her dedication to preserving
    Mexican flavors while adapting them for a diverse California audience.
