  career_goals: Kevin aims to transition from informal volunteer activities to a part‑time role that leverages his sociable nature and caring demeanor. He hopes to work as a community outreach coordinator
    or volunteer manager within a nonprofit that serves mental health or youth services, allowing him to create supportive group environments. He is also exploring short courses in conflict resolution and
    basic counseling to enhance his ability to help others while establishing a stable routine to manage his own emotional wellbeing. Ultimately, Kevin aspires to build a modest side business offering event
    planning and facilitation services for local gatherings, giving him flexibility and a sense of purpose.
