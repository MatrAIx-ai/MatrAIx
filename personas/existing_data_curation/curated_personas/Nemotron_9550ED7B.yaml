personas:
  professional: Leon Neal, a 14‑year‑old aspiring tech‑savvy designer, merges his love for LEGO construction and Minecraft redstone to prototype interactive models, and they apply both curiosity and practicality
    while often missing deadlines due to their relaxed approach to obligations.
  sports: Leon Neal, a 14‑year‑old who enjoys pickup basketball at the neighborhood park with a tight‑knit group of friends, follows the Chicago Bulls avidly, and they also spend quiet weekends fishing
    the creek with his dad, joining a local youth fishing club during the summer.
  arts: Leon Neal, an emerging comic‑strip illustrator and church‑youth drummer, channels the storytelling flair of Stan Lee and the rhythmic energy of Kendrick Lamar and Kirk Franklin into his sketches
    and drum patterns, and they often blend gospel harmonies with hip‑hop beats during rehearsals.
  travel: Leon Neal, a curious 14‑year‑old explorer, prefers low‑key weekend getaways like creek fishing excursions with his dad and dreams of visiting the Kennedy Space Center to see rockets up close,
    while they also hope to trek the red rocks of Sedona on a family vacation.
  culinary: Leon Neal, a teenage food enthusiast with a modest kitchen skill set, loves whipping up cheesy mac and cheese, grilled fish tacos with lime, and occasional sriracha‑spiked buffalo wings, and
    they often experiment with fresh cilantro and cheddar while occasionally burning toast due to rushed mornings.
  core: Leon Neal, a 14‑year‑old LEGO and redstone tinkerer whose rhythm‑driven heart beats to hip‑hop and gospel, navigates life with boundless curiosity, disorganized habits, and intense bouts of anxiety
    that color his solitary creativity and small‑group pursuits, and they often channel those feelings into vivid comic sketches.
background:
  cultural: Leon grew up in Louise, Mississippi, a small town in the heart of the Mississippi Delta. His family is part of the region’s African‑American community, whose roots are intertwined with the legacy
    of Delta blues, gospel church traditions, and a strong emphasis on oral storytelling. The local church is a central gathering place, providing spiritual guidance, music opportunities, and community
    service projects that shape Leon’s values. Southern soul food, family reunions, and the rhythms of blues and hip‑hop are woven into his daily life, reinforcing a sense of resilience and collective support.
    While navigating the challenges of being a Black teenager in a rural setting, Leon draws strength from this cultural heritage, the solidarity of his close‑knit neighborhood, and the enduring belief
    that perseverance and community can overcome adversity.
attributes:
  skills: '["Electronic troubleshooting", "Basic algebra", "Comic illustration", "Drum playing", "Team basketball basics", "Peer group facilitation"]'
  hobbies: '["LEGO building", "Minecraft", "Hip‑hop listening", "Gospel music", "Comic drawing", "Drum practice", "Fishing", "Basketball", "Reading science articles"]'
  career_goals: Leon wants to finish high school and then enroll in a vocational program that blends his hands‑on interests with practical skills—either as an automotive technician or an IT support specialist.
    He dreams of working in a field where he can troubleshoot problems, whether they’re mechanical or digital, and sees himself eventually helping a nonprofit that provides tech assistance to underserved
    communities in the Delta. Because he has personally dealt with anxiety and intense emotions, Leon also hopes to become a mentor at a local youth center, offering a listening ear and sharing coping strategies
    with other teens who feel overwhelmed. In the long term, he envisions a career that lets him balance technical work with community service, giving him both stability and a chance to give back.
