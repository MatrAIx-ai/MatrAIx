personas:
  professional: A budding young explorer who merges curiosity about natural history with hands-on creativity, Sabrina Dupre transforms museum visits into detailed LEGO models and watercolor sketches, enthusiastically
    shares their discoveries with classmates, and, despite their relaxed attitude toward tidy workspaces, consistently seeks practical ways to bring imagined worlds to life.
  sports: A spirited participant in the Chicago Fire FC Youth Academy, Sabrina Dupre dazzles on the field during weekend practices, cheers on the Chicago Cubs during family outings, follows the Chicago
    Blackhawks for inspiration, and incorporates bird-watching walks in Lincoln Park as a warm-up routine before games.
  arts: A budding visual storyteller, Sabrina Dupre fills sketchbooks with watercolor dragons inspired by J.K. Rowling's fantasy worlds, hums along to Ariana Grande and Taylor Swift pop hits while assembling
    intricate LEGO landscapes, and can recite the chorus of 'Shake It Off' during board-game evenings with friends.
  travel: An inquisitive explorer, Sabrina Dupre has trekked through Chicago's Lincoln Park and the Museum of Science and Industry, dreams of a family road trip to the Grand Canyon, and longs to wander
    the historic halls of the Louvre in Paris to compare ancient fossils with modern art.
  culinary: A cookie-baking enthusiast, Sabrina Dupre loves mixing butter, brown sugar, flour, chocolate chips, and a pinch of sea salt to produce chewy chocolate-chip cookies, enjoys sprinkling cinnamon
    on apple slices for after-soccer snacks, and sometimes experiments with creating mini-pizza bites topped with mozzarella, pepperoni, and pineapple.
  core: Sabrina Dupre is a vivid nine-year-old whose imagination fuels nonstop LEGO constructions, watercolor worlds, and friendly board-game battles, even as they occasionally misplace school supplies
    and forget to tidy their art corner.
background:
  cultural: Sabrina’s cultural background is that of a White, Midwestern American family with European ancestry living in Chicago. Her upbringing blends the city’s vibrant multicultural environment with
    family traditions rooted in holidays like Thanksgiving and Christmas. She frequently participates in community events, visits local museums, and enjoys the city’s parks and lakefront, which shape her
    sense of belonging and appreciation for diverse perspectives.
