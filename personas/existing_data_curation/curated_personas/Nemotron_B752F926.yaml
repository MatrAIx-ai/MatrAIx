  hobbies: '["Reading adventure and fantasy books", "Drawing and painting", "Building LEGO constructions", "Playing soccer", "Exploring parks and observing wildlife", "Visiting museums", "Listening to pop
    music", "Baking with family", "Playing board games (Catan Junior)"]'
  career_goals: Looking ahead, Sabrina dreams of turning her love for learning and caring for others into a career. She hopes to become a teacher or an educational guide at a museum where she can share
    her enthusiasm for science and nature with younger children. She also imagines herself as a wildlife educator, combining her curiosity about animals with a desire to protect them. In the longer term,
    she sees herself creating illustrated storybooks that teach kindness and cooperation, linking her artistic talent with her ambition to foster harmony.
