personas:
  professional: Yihong Choi, a 26‑year‑old early‑childhood education administrator in Los Angeles, blends arts‑integrated curriculum design, grant‑writing expertise, and bilingual Korean‑English communication
    with a laid‑back, flexible planning style, and they embrace creative problem‑solving despite occasional disorganization.
  sports: Yihong Choi, a 26‑year‑old outdoor enthusiast in Southern California, spends weekends hiking the Santa Ana Mountains with the Laguna Beach Hiking Club, plays pickup beach volleyball with friends
    at Newport Beach in summer, follows the Los Angeles Galaxy for soccer excitement, and they sign up for the annual LA Marathon to keep a steady cardio routine.
  arts: Yihong Choi, a 26‑year‑old creator and avid museum‑goer, sketches observations from small galleries while drawing inspiration from the impressionistic hues of Claude Monet, the bold forms of Georgia
    O’Keeffe, the literary rhythm of Haruki Murakami and Ocean Vuong, and the haunting melodies of Sufjan Stevens, and they channel this eclectic mix into watercolor projects that experiment with traditional
    Korean ink techniques.
  travel: Yihong Choi, a 26‑year‑old traveler with a love for spontaneous itineraries, often plans weekend getaways to Santa Barbara’s wine country or hikes along the coastal cliffs of the Santa Ana foothills,
    has backpacked through the historic streets of Lisbon and the bamboo groves of Kyoto, and they balance wanderlust with a modest travel budget by using points from a travel rewards credit card.
  culinary: Yihong Choi, a 26‑year‑old home‑cook who mixes Korean flavors like gochujang and kimchi with California produce such as heirloom tomatoes and avocado, frequently prepares kimchi‑infused burritos,
    gochujang‑glazed grilled salmon tacos, and miso‑based ramen bowls for friends, and they enjoy experimenting at an intermediate skill level while sourcing fresh fish from the local Santa Ana market.
  core: Yihong Choi, a 26‑year‑old arts‑driven early‑education leader, balances a laid‑back, slightly chaotic schedule with a relentless curiosity, a habit of sketching in a pocket journal, and an occasional
    impulse to splurge on watercolor supplies, and they often find inspiration in everyday moments.
background:
  cultural: Yihong is a second-generation Korean-American whose parents immigrated to Southern California in the early 1990s. Growing up in Orange County, she navigated a bicultural environment—celebrating
    Korean holidays such as Chuseok and Seollal while embracing the multicultural tapestry of her community. Fluent in Korean and English, she often serves as a cultural bridge for immigrant families seeking
    childcare services. Her upbringing emphasized respect for education and collective well‑being, values that inform her collaborative leadership style. At the same time, her exposure to West Coast art
    scenes and liberal academic training in the humanities fostered an independent, curiosity‑driven worldview, allowing her to blend tradition with contemporary creative expression in both her personal
    life and professional practice.
