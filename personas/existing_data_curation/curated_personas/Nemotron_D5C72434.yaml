    Workspace, SIS platforms)'']'
  hobbies: '[''Visiting local art galleries and museum exhibitions'', ''Watercolor and traditional brush painting'', ''Landscape photography (coastal and mountain trails)'', ''Reading contemporary fiction,
    poetry, and philosophy'', ''Participating in small-group book clubs'', ''Experimenting with Korean-Californian fusion cooking'', ''Hiking the Santa Ana Mountains and coastal paths'', ''Language-exchange
    meetups (Japanese, Spanish)'', ''DIY upcycled crafts for classroom use'']'
  career_goals: Yihong aims to become a director of an innovative preschool that treats art and cultural exploration as core pillars of early learning. She plans to earn a California Child Development Associate
    credential and a Master's in Educational Leadership within the next three years, positioning herself for district‑wide program leadership. Long‑term, she envisions launching a boutique childcare center
    in Orange County that offers flexible, project‑based learning while fostering a supportive environment for families from diverse linguistic backgrounds. She also hopes to influence local early‑education
    policy by contributing to community advisory boards and developing grant‑supported arts outreach initiatives for under‑served neighborhoods.
