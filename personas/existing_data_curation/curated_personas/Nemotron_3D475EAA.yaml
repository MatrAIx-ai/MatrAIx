  hobbies: '["Chess","Sudoku and crosswords","Bullet journaling","Non-fiction reading","Solo running","Basic web development","Volunteer library shelving","Stamp collecting","Photography","Piano practice"]'
  career_goals: E Morgan plans to pursue a Bachelor’s degree in Business Administration with a focus on Operations Management at a nearby university such as UC Davis or California State University, Sacramento.
    In the short term, she aims to secure an internship in project coordination within a technology or finance firm, where she can apply her organizational and analytical strengths. Long‑term, she aspires
    to become a certified Project Management Professional (PMP) and lead cross‑functional teams that deliver measurable outcomes. She is also interested in data analysis roles that leverage her Excel and
    Python skills. Throughout her career, she seeks positions that provide clear structure, defined metrics, and opportunities for continuous improvement, aligning with her disciplined and achievement‑driven
    mindset.
