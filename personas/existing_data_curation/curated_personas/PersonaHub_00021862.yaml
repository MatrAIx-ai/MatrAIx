persona_description: A scientist or researcher interested in the study of Earth's climate and the impact of natural processes on the planet's surface. They are particularly interested in the formation of
  sand and the organisms that build shells from the calcium carbonate they collect. They may be familiar with the work of scientists who have studied foraminifera and their shells, and may be looking for
  more information on the topic. They may also be interested in the Shores and Shallows exhibit at the Smithsonian's Sant Ocean Hall, and may have a particular interest in the formation of sand and the
  animals that call it home.
