  hobbies: '[''Reading (historical non‑fiction, literature, educational theory)'', ''Gardening'', ''Cooking traditional South Indian cuisine'', ''Birdwatching'', ''Nature walks'', ''Small book club'', ''Volunteer
    tutoring (adult literacy, basic computer skills)'', ''Calligraphy'', ''Chess'']'
  career_goals: Although retired from formal employment, Subramanian aims to continue contributing to education by mentoring novice teachers, advising local schools on culturally responsive curricula, and
    volunteering as a tutor for adult literacy programs. He hopes to author a guide on blending traditional teaching methods with modern technology for community colleges. He also aspires to develop a small,
    intergenerational learning circle in Whitehouse Station where seniors and youths exchange knowledge on history, language, and practical skills. His long‑term ambition is to leave a legacy of practical,
    inclusive education that benefits both his local community and broader South Asian diaspora.
