  hobbies: '[''Cuban salsa dancing'', ''Community volunteer work'', ''Cooking traditional Cuban meals'', ''Gardening'', ''Walking in local parks'', ''Organizing bingo nights'', ''DIY home improvement projects'',
    ''Attending local cultural festivals'', ''Reading romance novels'']'
  career_goals: Monica aims to transition from bedside nursing assistance to a leadership role as a senior care supervisor or bilingual health‑education specialist within her health system. She plans to
    earn a certified nursing assistant (CNA) instructor credential, allowing her to develop and teach culturally tailored training modules for staff serving the Cuban‑American elderly population. Long‑term,
    she hopes to launch a community health workshop series at her local senior center, focusing on preventive wellness, medication management, and culturally relevant nutrition, while also mentoring younger
    caregivers to foster a supportive, flexible work environment.
