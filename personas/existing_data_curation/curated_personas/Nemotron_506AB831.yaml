  career_goals: Approaching retirement, Giselle aims to channel her curiosity and practical expertise into a mentorship role. She hopes to obtain a small‑business OSHA certification and a basic refrigeration
    license, ensuring she stays current with modern codes while maintaining a reliable, low‑stress work environment. Her goal is to become a part‑time supervisor in her building’s maintenance team, where
    she can organize preventive maintenance schedules that reduce emergency repairs—an approach that eases her worry about safety. Additionally, she wishes to volunteer her skills at the local senior center,
    helping to create safe, comfortable spaces for other older adults in her community.
