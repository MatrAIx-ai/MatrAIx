personas:
  professional: Giselle Suarez, a veteran building maintenance technician in Paterson, combines decades of hands‑on expertise in plumbing, electrical troubleshooting, carpentry, and HVAC upkeep with a curiosity‑driven,
    detail‑oriented approach that makes their meticulous maintenance logs and preventive schedules a hallmark of a low‑stress, safety‑first work style.
  sports: Giselle Suarez stays active through daily walks along Paterson’s historic streets, participates in the neighborhood senior walking club that meets each Saturday, occasionally joins gentle yoga
    sessions at the community center, and roots for the New York Yankees in baseball and the New Jersey Devils in hockey, savoring the seasonal rhythms of spring‑time jogs and winter‑time indoor stretching,
    all while they relish the quiet rhythm of their own footfalls.
  arts: Giselle Suarez weaves afghans to the lively beats of merengue and bachata legends like Juan Luis Guerra and traditional church hymns, devotes evenings to the community book club where they dissect
    historical novels by Isabel Allende and Ken Follett, and cherishes the occasional performance of classic jazz standards by Ella Fitzgerald, all of which enrich their reflective, solitary creative world.
  travel: Giselle Suarez favors low‑key, well‑planned getaways that blend history and tranquility, having explored Washington, D.C.’s monuments and the seaside boardwalk of Atlantic City, while dreaming
    of strolling the cobblestone streets of Savannah, Georgia and the gardens of Kyoto, Japan, they always book modest accommodations and rely on detailed itineraries to ease their travel‑related anxiety.
  culinary: Giselle Suarez cultivates a modest balcony garden of cilantro, oregano, and bell peppers, which they incorporate into fragrant herb‑spiced chicken stew, rice with sofrito, and a comforting bean
    soup, displaying a confident home‑cook skill set that balances nostalgic family recipes with a curiosity for experimenting with fresh, seasonal flavors.
  core: Giselle Suarez blends a meticulous, curiosity‑driven mindset with a gentle worry that fuels their diligent maintenance logs, garden experiments, and nightly knitting rituals, even as they occasionally
    over‑budget on herb seedlings and replay past repair mishaps in their mind.
background:
  cultural: 'Giselle is a first‑generation Dominican American whose family emigrated to the United States during the 1960s. She grew up speaking Spanish at home and learned English through school and community
    interactions. Her cultural identity is rooted in Dominican traditions: the warmth of extended family, the rhythms of Caribbean music, and the flavors of home‑cooked dishes like mangú, sancocho, and
    arroz con habichuelas. She remains actively involved in the vibrant Dominican diaspora in Paterson, regularly attending cultural festivals, supporting local Latinx businesses, and maintaining ties with
    relatives in the Dominican Republic. Her Catholic faith, shaped by Dominican religious practices, informs her daily routine and community service.'
attributes:
  skills: '["Plumbing repair", "Electrical troubleshooting", "Carpentry", "HVAC maintenance", "Preventive maintenance scheduling", "Building safety inspections", "Vendor coordination", "Mentoring apprentices"]'
  hobbies: '["Balcony gardening", "Knitting", "Traditional Dominican cooking", "Listening to merengue and bachata", "Walking historic neighborhoods", "Church choir participation", "Reading historical novels",
