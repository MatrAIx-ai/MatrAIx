    at local art events'']'
  career_goals: Mildred dreams of turning her love for art and ideas into a career. In the next few years she aims to complete high school with strong art coursework, build a portfolio of illustrations
    and design projects, and eventually study graphic design or illustration at a college with a strong visual‑arts program. She hopes to work as a freelance illustrator or join a creative agency where
    she can collaborate on varied projects, and she also imagines one day teaching art to younger students in her community.
