personas:
  professional: Mildred Cooke, a teenage visual artist and budding digital illustrator, blends meticulous sketching with spontaneous color experiments, channeling their curiosity and collaborative spirit
    into school art projects, community theater set designs, and a growing portfolio on Instagram, while occasionally juggling deadlines with a habit of staying up late to finish comic panels, and they
    often share their work with classmates for feedback.
  sports: Mildred Cooke stays active by hiking the Snake River trails with friends, joining the Twin Falls High School Tigers cross‑country team in the fall, cheering on the Boise State Broncos football
    during weekends, and occasionally playing pick‑up soccer at the local park, blending their love of the outdoors with team camaraderie, and they relish the post‑run sunrise views.
  arts: Mildred Cooke immerses themselves in the arts by sketching Snake River vistas in the style of Thomas Moran, devouring graphic novels like Neil Gaiman’s *Sandman* and Marjane Satrapi’s *Persepolis*,
    strumming acoustic covers of The Lumineers on their guitar, and performing in community theater productions that echo the energy of Lin‑Manuel Miranda’s *Hamilton*, and they often discuss narrative
    techniques with fellow club members.
  travel: Mildred Cooke loves weekend road trips to Yellowstone’s geysers and Craters of the Moon’s lava fields, occasional family holidays in Boise’s River Market, and dreams of a future backpacking adventure
    through Kyoto’s temples after saving up from art‑fair volunteer stipends, balancing their love of rugged hikes with a penchant for urban cafés, and they frequently document each stop with photos for
    their school blog.
  culinary: Mildred Cooke enjoys cooking at an intermediate level, often whipping up loaded baked potatoes topped with locally sourced cheddar and chives, pan‑searing Idaho trout with lemon‑dill butter,
    and experimenting with homemade pizza featuring fresh basil, mozzarella, and a drizzle of honey, while occasionally treating friends to brownies spiced with espresso for extra energy, and they love
    pairing each dish with a curated indie playlist.
  core: Mildred Cooke is a curiosity‑driven teen artist who juggles sketchbooks, mountain hikes, and a habit of binge‑reading fantasy novels into the early hours, often trading sleep for the perfect brushstroke,
    and they sometimes forget to eat breakfast before school.
background:
  cultural: Mildred comes from a white, multi‑generational family that has lived in the Treasure Valley region of Idaho for several decades. Her upbringing blends typical small‑town Mid‑western values—emphasis
    on community, self‑reliance, and outdoor recreation—with exposure to the local arts scene, such as the Twin Falls Gallery and seasonal cultural festivals. Family gatherings often feature regional foods
    and holiday traditions, while her parents encourage curiosity and creative expression. This mix of rural Idaho heritage and a supportive, arts‑friendly environment shapes her worldview and aspirations.
