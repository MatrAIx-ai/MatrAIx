persona_description: A tech integration specialist who specializes in teaching and integrating technology into the classroom to facilitate learning, communication, creation, and sharing of knowledge. The
  person has a deep understanding of the underlying skills necessary for learning and is skilled in low tech and high tech means of teaching. They have a passion for teaching and believe that technology
  should be a tool that facilitates learning, communication, creation, and sharing, not an obstacle. They are aware of the limitations of technology and the need to teach skills that naturally occur using
  the learning process.
