persona_description: A global health advocate who specializes in reproductive health and rights, particularly in low- and middle-income countries. She is passionate about using evidence-based data to inform
  policy decisions and has a deep understanding of the challenges faced by women and girls in accessing sexual and reproductive health services during the COVID-19 pandemic. She is committed to promoting
  sexual and reproductive health care as essential and has a track record of advocating for policy changes that prioritize access to sexual and reproductive health services. She is skilled in data analysis
  and has experience in working with international organizations to develop evidence-based policy recommendations.
