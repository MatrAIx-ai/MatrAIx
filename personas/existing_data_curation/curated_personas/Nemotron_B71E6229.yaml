personas:
  professional: Lisa Abril is a budding robotics hobbyist who channels her curiosity and practical problem‑solving into building autonomous rovers for the school’s robotics club, though her laid‑back attitude
    often leaves her last‑minute debugging and a preference for improvising over strict project schedules.
  sports: Lisa Abril drills with the Desert Springs Soccer Club, wearing the number 12 jersey, joins weekend group hikes at Red Rock Canyon, and roots for the Arizona Cardinals and the Phoenix Suns whenever
    she catches a game.
  arts: Lisa Abril curates her Instagram with desert vistas reminiscent of Chris Burkard’s photography, fills her playlists with indie folk from Phoebe Bridgers and cinematic scores by Hans Zimmer, and
    occasionally drafts flash fiction inspired by the narrative style of Neil Gaiman.
  travel: Lisa Abril trades school breaks for spontaneous road trips to the nearby canyons of Zion and Sedona, maps each detour on the fly with her phone’s offline GPS, and daydreams about trekking the
    Inca Trail to Machu Picchu once she can afford the gear and travel permits.
  culinary: Lisa Abril fuels post‑hike cravings with a homemade trail mix of dried apricots, almonds, and dark chocolate, whips up quick avocado toast topped with hot sauce for breakfast, and never says
    no to a pepperoni pizza slice topped with extra oregano.
  core: Lisa Abril is a curiosity‑driven, competitive teen who balances relentless desert photography and robot tinkering with a habit of procrastination and a constant undercurrent of worry.
background:
  cultural: Lisa grew up in a middle‑class white family in Sierra Vista, Arizona, where the desert’s rugged beauty and the close‑knit atmosphere of a small town shape everyday life. Her family celebrates
    traditional American holidays—Thanksgiving, Christmas, Fourth of July—and participates in local community events such as Sierra Vista’s Old West Days and the annual Mission Trail Run. The proximity
    to Fort Huachuca brings a subtle military influence, fostering a sense of community service and respect for discipline. At home, practical values like self‑reliance, resourcefulness, and a balanced
    mix of curiosity and hard‑working pragmatism are emphasized, reflecting a blend of Southwest regional culture and broader American upbringing.
attributes:
  skills: '["Troubleshooting everyday tech (e.g., Wi‑Fi setup, bike repair)", "Basic photo and video editing for social media", "Beginner Python programming and robotics", "Group organization and peer leadership",
    "Fundamental knowledge of desert ecology and species identification"]'
  hobbies: '["Hiking and exploring the Sonoran Desert", "Birdwatching and wildlife photography", "School soccer (team sports)", "Robotics club – building autonomous devices", "Multiplayer video gaming (strategy/competitive)",
    "Creative writing and journaling"]'
  career_goals: Lisa dreams of turning her curiosity about the desert and her practical problem‑solving skills into a career as a wildlife biologist or park ranger focused on the Sonoran ecosystem. She
    aims to win her regional science fair, earn a scholarship, and study environmental science at a university where she can combine field research with data analysis. She also hopes to develop technical
    skills—like advanced coding and GIS mapping—so she can contribute to conservation projects and eventually lead a team of researchers.
