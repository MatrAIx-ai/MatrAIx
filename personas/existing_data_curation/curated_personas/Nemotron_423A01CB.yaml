  career_goals: He dreams of a future where he can combine his love of learning, his curiosity about nature, and his desire to serve his community. Andres imagines becoming a bilingual elementary teacher
    who can help classmates in both English and Spanish, while also leading outdoor exploration activities that connect children with the desert environment. He also feels a strong pull toward caring for
    animals and hopes to work on his family's ranch or become a veterinarian, preserving his family's agricultural roots.
