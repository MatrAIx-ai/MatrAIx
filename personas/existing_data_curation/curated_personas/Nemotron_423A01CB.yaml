personas:
  professional: A budding junior LEGO architect, Andres Rondon combines a love of dinosaurs and space with an organized, methodical approach, planning each build step by step and reliably finishing intricate
    sets before bedtime, and they take pride in the precision of every creation.
  sports: A spirited little soccer enthusiast, Andres Rondon plays forward for the Guadalupe County Youth Soccer league, idolizes New Mexico United’s forwards, practices drills before school, and they also
    join weekend bike rides on desert trails to stay active.
  arts: A creative doodler, Andres Rondon spends afternoons sketching cartoon characters inspired by the whimsical art of Dr. Seuss and the vibrant colors of Frida Kahlo’s murals, while listening to traditional
    ranchera songs and the lively guitar of Carlos Santana, shaping a playful yet culturally rich imagination.
  travel: A curious road‑trip explorer, Andres Rondon loves family outings to nearby Carlsbad Caverns and the historic Plaza in Santa Fe, enjoys short desert hikes with a packed lunch, and they dream of
    visiting the ancient ruins of Chichen Itza with grandparents next summer.
  culinary: A budding kitchen helper, Andres Rondon eagerly kneads corn masa for tamales, sprinkles fresh cilantro on salsa, assists in stirring tomato‑based spaghetti sauce, and they relish the sweet taste
    of mango slices after meals.
  core: Andres Rondon blends a meticulous love for LEGO building with an adventurous desert spirit, often forgetting to put away crayons before bedtime yet always planning the next day's exploration.
background:
  cultural: Andres grows up in a Mexican‑American household in Santa Rosa, New Mexico, where Spanish and English are spoken interchangeably at home. His family maintains strong ties to Mexican traditions,
    celebrating Día de los Muertos, Cinco de Mayo, and Catholic holidays with homemade foods, music, and community gatherings. The rural setting of Guadalupe County means that his everyday life includes
    visits to the family’s small ranch, learning about agriculture, and experiencing the unique desert landscape of the Southwest. These cultural influences foster a deep sense of family solidarity, respect
    for elders, and pride in his heritage, while also blending the broader American culture of his community.
