    benchmarking'']'
  hobbies: '[''electronics tinkering'', ''custom drone building'', ''retro gaming console restoration'', ''smart home prototyping'', ''hiking in Columbia River Gorge'', ''bike riding in Portland'', ''cooking
    Indian cuisine'', ''fusion cooking experiments'', ''indie music listening'', ''attending film screenings'', ''participating in Diwali celebrations'', ''participating in Holi celebrations'']'
  career_goals: Balram aims to transition from a hands‑on technician to a senior technical specialist who can lead complex automation and renewable‑energy projects. He plans to earn the Certified Electronics
    Technician (CET) credential and pursue an associate degree in electrical engineering technology to deepen his theoretical foundation. Over the next five years, he envisions establishing his own boutique
    consulting practice focused on IoT integration and solar‑PV system design for residential and small‑business clients in the Pacific Northwest. He also hopes to mentor junior technicians through the
    local maker community, while retaining the flexibility to choose projects that align with his personal interests and competitive drive.
