  hobbies: '[''Gardening'',''Cooking Puerto Rican cuisine'',''Walking/hiking'',''Knitting'',''Reading historical fiction'',''Senior center crafts'',''Spanish conversation group'',''Salsa dancing'',''Birdwatching'']'
  career_goals: Although retired from formal employment, Herminia aims to stay active in the Madison community by volunteering as a tutor for middle‑school students, especially those who speak Spanish at
    home. She hopes to launch a small after‑school program that celebrates Puerto Rican culture through food and storytelling, and to mentor retired teachers who wish to contribute their expertise. Additionally,
    she plans to write a memoir of her teaching years and the lessons learned from resilience after losing her husband, hoping it will inspire both younger educators and seniors alike.
