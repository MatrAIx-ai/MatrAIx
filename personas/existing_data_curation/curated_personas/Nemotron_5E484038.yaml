  hobbies: '[''Hiking'', ''Cycling'', ''Pickup basketball'', ''Charity runs'', ''Cooking farm-to-table meals'', ''Reading science-fiction'', ''Playing acoustic guitar'', ''Volunteer work at free clinics'',
