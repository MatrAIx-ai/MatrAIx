  career_goals: Wilbert aims to become a department chair within the next five years, leading a regional primary care network that integrates telemedicine and data-driven quality improvement. He seeks to
    spearhead research on hypertension management in underserved populations, mentor residents, and expand community health initiatives. He also aspires to achieve work-life harmony by delegating administrative
    tasks and incorporating stress-management practices.
