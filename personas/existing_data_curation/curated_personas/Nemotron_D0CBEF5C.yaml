personas:
  professional: Maria Pelaez is a budding soccer enthusiast who channels her competitive drive into captaining the community league team, using her love for structure to memorize plays while embracing the
    flexibility of improvising on the field, and they delight in sketching game strategies during downtime.
  sports: Maria Pelaez loves playing soccer at recess and for the Sunrise Soccer Club, cheers for the LA Galaxy and the national women’s team, and they organize informal kick‑around games after school to
    stay active, viewing each match as a chance to prove their competitive edge.
  arts: Maria Pelaez enjoys drawing vibrant town scenes and whimsical storybook characters while listening to folk music and practicing traditional dances, often citing the illustrations of Beatrix Potter
    and the melodies of The Riverfolk trio as their artistic inspirations.
  travel: Maria Pelaez dreams of visiting the sun‑kissed beaches of Florida and the towering cliffs of the Grand Canyon, prefers trip planning with her mother’s help using colorful maps, and they balance
    excitement for adventure with nervous anticipation about being away from their beloved rabbit.
  culinary: Maria Pelaez helps prepare baleadas, relishing the creamy blend of refried beans, cheese, and avocado, proudly cooks mini‑quesadillas with shredded cheese and salsa, yet they sometimes forget
    to wash the dishes promptly after cooking.
  core: Maria Pelaez is a competitive 9‑year‑old who juggles soccer, LEGO builds, and sketching while they worry about small setbacks and hoard coins in a pink piggy bank.
background:
  cultural: 'Maria’s cultural background is rooted in her Honduran immigrant family who settled in Middlefield, Ohio. At home, Spanish is spoken alongside English, and her parents keep many traditions alive:
    cooking classic Honduran dishes such as baleadas and tamales, celebrating Honduran holidays like Día de la Independencia with music, dance, and family gatherings, and sharing stories of their hometown
    in Honduras. The family places high value on education, punctuality, and respect for elders, aligning with Maria’s preference for structure and predictability. Living in a small Midwestern community,
    Maria also participates in local school events and community service, blending the Honduran emphasis on hospitality and family cohesion with the values of her American surroundings. This bicultural
    upbringing gives her a strong sense of identity, pride in her heritage, and an appreciation for both Hispanic and Midwestern customs.'
