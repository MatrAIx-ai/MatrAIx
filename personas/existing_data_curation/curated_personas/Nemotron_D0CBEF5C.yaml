  hobbies: '["Soccer (community league and recess games)", "Honduran folk music listening", "Traditional dance practice", "Drawing and sketching", "Reading adventure novels and fairy tales", "LEGO building",
    "Jigsaw puzzles", "Board games (Uno, Checkers)", "Helping with cooking (baleadas, salads)", "Pet rabbit care", "Bilingual storytime at the library"]'
  career_goals: Maria’s budding ambitions blend her love of animals, learning, and her Honduran heritage. She often says she wants to become a veterinarian so she can care for pets like her rabbit and help
    other animals in need. She also imagines herself as a bilingual teacher who could guide younger children in both English and Spanish, fostering cultural pride. In the short term, Maria aims to win the
    school spelling bee, earn a spot on the soccer team’s starting lineup, and improve her drawing skills enough to illustrate a storybook about her family’s traditions. She hopes that developing these
    abilities will give her a clear, structured path toward a future career where she can both compete and help others.
