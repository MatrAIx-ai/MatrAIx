personas:
  professional: An aspiring digital illustrator named Dianand Luu, who at fifteen channels curiosity and meticulous organization into manga‑style character designs while they juggle school art club projects
    and occasional stress‑induced late‑night sketching sessions.
  sports: A casual athlete named Dianand Luu participates in the high school track team’s spring cross‑country meets, follows the Los Angeles Lakers and LA Galaxy, and they balance weekly skateboarding
    sessions at a local park with short evening jogs to clear their mind after drawing marathons.
  arts: An avid creative named Dianand Luu immerses themselves in street‑art murals across Los Angeles, they draw inspiration from Studio Ghibli’s animators and digital painter Artgerm, and queue lo‑fi
    beats from Tomppabeats while journaling, often quoting lines from indie film director Greta Gerwig.
  travel: A wanderlust‑curious teen named Dianand Luu dreams of visiting Kyoto’s historic art districts and the bustling night markets of Hanoi, while they regularly explore local treasures like Griffith
    Observatory and the Arts District, planning trips with hand‑drawn itineraries and budget spreadsheets.
  culinary: A budding home cook named Dianand Luu passionately prepares family pho broth, bánh xèo pancakes, and experimental ramen‑fusion bowls, skillfully handles fresh herbs like cilantro and basil,
    yet they sometimes forget to clean the kitchen thoroughly after cooking marathons.
  core: Dianand Luu is a fifteen‑year‑old art‑obsessed dreamer who balances meticulous manga sketching, occasional anxiety, thrift‑savvy budgeting, and a love for Vietnamese family dishes while they daydream
    about Tokyo’s manga cafés.
background:
  cultural: Dianand is the daughter of Vietnamese immigrants who settled in North Hollywood, a neighborhood known for its vibrant Asian community. She grew up bilingual, speaking Vietnamese at home while
    navigating English‑dominant schools. Family traditions such as celebrating Tet, preparing pho, and honoring ancestors are central to her identity. At the same time, she embraces the multicultural fabric
    of Los Angeles, blending Southeast Asian aesthetics with contemporary American pop culture in her artwork. This dual cultural perspective fuels her curiosity about cross‑cultural storytelling and informs
    her desire to represent her heritage in the broader arts scene.
