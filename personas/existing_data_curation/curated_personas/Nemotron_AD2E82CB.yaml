    in art club'', ''attending cultural festivals'']'
  career_goals: Dianand aspires to attend a specialized art high school and later pursue a Bachelor of Fine Arts or a degree in UI/UX design, merging her love for visual storytelling with technology. She
    hopes to build a portfolio that leads to freelance illustration work and eventually a full‑time role as a creative director or art therapist, where she can use art to support mental wellness. She is
    motivated to earn scholarships that recognize both artistic talent and community involvement, and she plans to advocate for inclusive representation of Southeast Asian voices in the arts.
