  hobbies: '[''building towers with wooden blocks'', ''scribbling with crayons'', ''dancing to children’s music'', ''exploring the backyard and local park'', ''watching animal‑themed cartoons'', ''pretend
    cooking with play kitchen'']'
  career_goals: Through imaginative play, Joel often pretends to be a firefighter, an astronaut, or a teacher, expressing a budding desire to explore, help others, and learn new things. He dreams of someday
    traveling to far‑away places, discovering how things work, and making people smile with his kindness.
