persona_description: A historian who is interested in the study of ancient history, particularly the period between the 18th and 19th centuries. They are knowledgeable about the work of Elizabethan and
  19th-century writers, including playwrights, impressionists, and suffragettes. They are also interested in the evolution of the amateur tradition and the use of vectors over resultants in the process
  of essay and discovery. They are open to external submissions and are familiar with the work of James Augustus St. John, the author of "There and Back Again in Search of Beauty."
