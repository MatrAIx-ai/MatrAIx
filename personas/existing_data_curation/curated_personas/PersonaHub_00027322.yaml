persona_description: A planetary scientist who studies the habitability of worlds around other stars and the impact of obliquity on the temperature and habitability of planets. The scientist has expertise
  in exoplanet research, particularly in the study of tilted planets and their habitability. They are aware of the challenges in measuring the obliquity of planets and are actively seeking new telescopes
  to improve their research capabilities. The scientist is well-versed in the concept of habitable zones and how they can be affected by the tilt of a planet's axis.
