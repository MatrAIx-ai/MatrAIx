  career_goals: Although retired, Richard remains driven by a desire to learn, share, and inspire. He hopes to mentor emerging engineers and hobbyists through informal workshops at the local community center,
    and to collaborate with the Plano Arts & History Museum on interdisciplinary exhibits that bridge science and art. He also aspires to document his family’s stories and his own experiences in a memoir
    that highlights lifelong curiosity, and he plans to travel to a few historic cultural sites each year, continuing his spontaneous quest for new ideas.
