  hobbies: '[''Watercolor painting'', ''Quilting'', ''Gardening'', ''Art gallery visits'', ''Listening to bluegrass and gospel music'', ''Reading historical fiction'', ''Day trips to Atlanta museums'',
    ''Volunteer art‑therapy sessions at senior center'']'
  career_goals: As she approaches retirement, Tina aims to transition her expertise into a formal mentorship role, developing a structured training program for new dispatchers at the county's 911 center.
    She also plans to earn a certification in Emergency Management to contribute to Barrow County's disaster preparedness planning committee. Drawing on her love of the arts, she hopes to launch a community‑based
    art‑and‑wellness initiative that offers workshops for seniors and first‑responders to reduce stress and foster resilience. Ultimately, Tina envisions a continued presence in public service through volunteer
    coordination for local crisis hotlines while maintaining a balanced, flexible schedule that allows her to explore new ideas.
