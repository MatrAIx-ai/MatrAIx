personas:
  professional: Carrie Throckmorton is a full‑stack developer who seamlessly weaves JavaScript, TypeScript, React, Node.js, and Python into test‑driven, CI/CD‑enabled projects, balancing a relentless curiosity
    for serverless AWS and GraphQL with a pragmatic insistence on proven design patterns, while their competitive streak fuels hackathon victories and their heightened emotional reactivity makes them double‑check
    every pull request for hidden bugs.
  sports: Carrie Throckmorton spends weekends hiking the Flint Hills, trains with the Kansas City Trail Runners club to stay fit, and passionately roots for the Kansas City Chiefs in football season and
    the Royals during summer baseball, using these activities to balance solo outdoor time with community camaraderie.
  arts: Carrie Throckmorton unwinds by devouring sci‑fi classics like Liu Cixin’s *The Three‑Body Problem* and streaming Radiohead’s *OK Computer*, curates board‑game nights featuring thematic titles such
    as *Terraforming Mars* while quoting lines from *Blade Runner*, and occasionally attends Kansas City Symphony performances of Mahler’s symphonies to feed their artistic appetite.
  travel: Carrie Throckmorton loves spontaneous road trips to the Colorado Rockies for alpine hikes, dreams of exploring Kyoto’s blend of tradition and tech, and allocates a modest budget for quarterly
    trips to Seattle’s developer conferences, balancing adventure with financial prudence.
  culinary: Carrie Throckmorton, an enthusiastic home chef, harvests carrots, kale, and heirloom tomatoes from their garden to craft quinoa‑stuffed bell peppers with feta and roasted garlic, while indulging
    in weekend brunches of avocado toast topped with poached eggs and a drizzle of sriracha.
  core: Carrie Throckmorton is a fiercely competitive coder who trades board‑game nights for hackathon glory, battles persistent anxiety with yoga, and hoards garden‑fresh veggies as a quiet rebellion against
    the digital grind.
background:
  cultural: Carrie grew up in Prairie Village, a suburban community in Johnson County, Kansas, where Midwestern values of modesty, reliability, and neighborly support shaped her outlook. The region’s emphasis
    on community involvement and self-reliance fostered her practical approach to problem-solving and her appreciation for both tradition and innovation. While her white ethnic background affords her certain
    cultural privileges, she remains aware of the diversity within the broader Kansas population and seeks to engage with inclusive initiatives. Local traditions—such as seasonal festivals, high school
    sports, and weekend farmer’s markets—have contributed to her balanced social-alone time orientation and her grounded, pragmatic worldview.
