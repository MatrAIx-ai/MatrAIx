  career_goals: She aims to become a senior full-stack engineer within the next three years, eventually moving into a technical lead or engineering manager role where she can mentor junior developers and
    guide product architecture. Carrie aspires to blend her innovative curiosity with practical reliability by spearheading projects that adopt modern cloud-native technologies while maintaining high code
    quality and operational stability. Long-term, she envisions contributing to open-source communities, speaking at tech conferences, and shaping inclusive, psychologically safe team cultures that address
    the intense anxiety she experiences in high-pressure environments.
