  career_goals: Jeanbaptiste aims to obtain a Master Electrician license within the next two years and earn advanced certifications in renewable energy and smart‑home technologies. He plans to launch his
    own boutique electrical contracting firm focused on sustainable residential projects, providing affordable energy‑efficiency upgrades for low‑income households in his community. Long‑term, he envisions
    becoming a recognized expert in home automation, mentoring apprentices, and balancing his professional ambitions with ample time for his creative and social pursuits.
