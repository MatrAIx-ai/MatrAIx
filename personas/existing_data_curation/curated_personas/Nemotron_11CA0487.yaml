personas:
  professional: Jeanbaptiste Thomas, a 27-year-old licensed journeyman electrician with a passion for smart-home tech and renewable energy, leverages their strong problem-solving skills, collaborative mindset,
    and a knack for translating complex wiring plans into plain language, and they often juggle a relaxed approach to deadlines that sometimes leads to late-night project tweaks.
  sports: Jeanbaptiste Thomas dials up the adrenaline in pick-up basketball games at the local community center, roots for the Georgia Bulldogs on Saturdays, and keeps a season ticket for the Atlanta Hawks,
    while they occasionally join a weekend hiking club that tackles the North Georgia foothills for cardio and scenery.
  arts: Jeanbaptiste Thomas immerses themselves in Atlanta's vibrant art scene, snapping DSLR shots of street murals inspired by blues legends like B.B. King, attending gospel choirs that echo the spirit
    of The Blind Boys of Alabama, and strumming acoustic renditions of Outkast's 'Ms. Jackson' at neighborhood jam sessions, and they often doodle design concepts for smart-home interfaces between sets.
  travel: Jeanbaptiste Thomas favors spontaneous road trips that blend hiking in the Blue Ridge Mountains with a stop in New Orleans for jazz brunches, often planning itineraries on the fly using a paper
    map and a Spotify playlist, while they budget carefully to ensure affordable trips that still let them visit the historic Savannah squares and the Florida Keys for a weekend surf.
  culinary: Jeanbaptiste Thomas's palate swings between smoky brisket and peach cobbler at family barbecues, crunchy collard greens drizzled with hot sauce, and experimental dishes like quinoa-infused shrimp
    and grits cooked in their smart-kitchen prototype, while they perfect a coffee brew using a French press and a dash of cinnamon.
  core: Jeanbaptiste Thomas is a sociable, curiosity-driven electrician who balances a relaxed, sometimes chaotic lifestyle with a deep commitment to community, creative expression, and sustainable home
    tech, all while they wrestle with anxiety and a habit of last‑minute planning.
background:
  cultural: Jeanbaptiste grew up in Powder Springs, Georgia, a community steeped in Southern traditions. His family values include Sunday church attendance, backyard barbecues featuring smoked brisket and
    peach cobbler, and avid support for college football, especially the Georgia Bulldogs. The region's emphasis on neighborly hospitality and storytelling shaped his cooperative nature. Exposure to the
    diverse cultural scene of the nearby Atlanta metro area expanded his appreciation for blues, gospel, and hip‑hop, enriching his artistic interests. While his ethnic background is white, his cultural
    identity reflects a blend of traditional Southern values, multicultural influences from the broader region, and a strong respect for community service and creative expression.
