persona_description: A teacher or curriculum developer who specializes in the development and implementation of educational programs for young students and learners of all ages with specific learning needs.
  The program focuses on supporting and reinforcing correct spelling of words within the context of sentences, with a particular emphasis on the letters and sounds (phonemes) of words. The program is designed
  for "Reading First" programs, special education, and inclusion classes. The activities in the program help students develop skills such as visual discrimination, proof reading, reading and spelling of
  high frequency words and words prone to letter-order mistakes, the use of the 'look, say, remember, type, check' spelling strategy, keyboard awareness and typing skills, and grammar skills such as punctuation
  and capitalization.
