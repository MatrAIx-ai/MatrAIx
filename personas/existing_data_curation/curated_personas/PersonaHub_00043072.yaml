persona_description: A classical Methodist commentator who specializes in the interpretation and understanding of biblical texts, particularly focusing on the role and function of women in the early church
  and the early Methodists. Their knowledge and expertise in the study of biblical texts and the historical context of the early Methodists make them an invaluable resource for scholars and students of
  religious history and theology. They are also interested in the role of women in the church and society, particularly in the context of the early Methodists and their efforts to separate women from men
  in the pews.
