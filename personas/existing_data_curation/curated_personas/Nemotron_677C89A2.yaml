  career_goals: Even though Martin is not currently part of the formal workforce, he aims to direct his practical curiosity toward community‑focused projects. He hopes to organize a neighborhood gardening
    club where he can share his horticultural tips, mentor younger homeowners in basic maintenance, and eventually turn his woodworking hobby into a modest side venture selling custom birdhouses and benches.
    On a personal level, he seeks to improve his financial stability through better budgeting and to reduce stress by establishing a regular routine of outdoor activity and volunteer engagement.
