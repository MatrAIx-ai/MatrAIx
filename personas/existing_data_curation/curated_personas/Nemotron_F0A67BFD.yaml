  career_goals: Kimberly dreams of becoming a teacher or a pediatric nurse, because she wants to help children learn and stay healthy while creating a supportive, harmonious environment. She also imagines
    leading community projects—like school charity drives or youth mentorship programs—where she can combine her love for organization, teamwork, and compassion to make a positive impact.
