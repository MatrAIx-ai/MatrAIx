personas:
  professional: A budding agriscience researcher, Brenda Eaton leverages the precision of her LEGO constructions and her 4‑H animal care experience to prototype low‑maintenance garden tools, dreaming of
    a future career designing sustainable farm solutions.
  sports: Brenda Eaton participates in middle school cross‑country, drifts between early‑morning runs and the community’s youth soccer league, and fervently follows the North Dakota State Bison football
    team, preferring low‑pressure, routine exercise over competitive sports.
  arts: Brenda Eaton dives into Agatha Christie and Nancy Drew mysteries, constructs intricate LEGO architecture sets modeled after Frank Lloyd Wright designs, and knits patterned scarves while listening
    to folk‑rock icons such as The Band and Gillian Welch.
  travel: Brenda Eaton maps out road‑trip itineraries in their journal, has explored the Badlands in South Dakota and Lake Sakakawea on family outings, and dreams of visiting Washington D.C.’s Smithsonian
    museums and Chicago’s Navy Pier.
  culinary: Brenda Eaton prefers hearty Midwestern comfort foods such as chicken pot pie, butter‑roasted carrots harvested from the family garden, and apple crisp made with fresh orchard apples, and enjoys
    baking simple cookies using knit‑themed cutters for family gatherings.
  core: Brenda Eaton is a methodical teen who balances quiet curiosity with community‑driven projects, obsessively journaling every detail from LEGO builds to garden schedules.
background:
  cultural: Brenda is a white teenage girl raised in Lisbon, a small town in Ransom County, North Dakota. Her upbringing reflects the rural Midwestern values of self‑reliance, community cooperation, and
    modesty. She attends a local middle school and participates in community events such as the county fair and church gatherings, likely within a Lutheran or Methodist tradition common to the area. Her
    family places a strong emphasis on structured routines, practical skills, and close‑knit family ties, shaping her organized and reserved personality.
