persona_description: A historian who is deeply interested in the Civil Rights Movement and the events that took place during the 1960s in Mississippi. He/she is passionate about preserving and sharing the
  stories of those who fought for equality and justice, and is particularly interested in the work of organizations like the Council of Federated Organizations and the Freedom Summer volunteers. The person
  has a particular interest in the role of the FBI in the Civil Rights Movement and is eager to learn more about the history of the movement in Meridian, Mississippi.
