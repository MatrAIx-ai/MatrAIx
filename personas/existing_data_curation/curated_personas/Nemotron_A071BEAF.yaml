  career_goals: Janna aims to deepen her engagement with the local arts community by volunteering as a docent at the Dunnellon Historical Museum and leading art appreciation workshops for seniors. She aspires
    to complete an online certificate in Art History, publish a series of blog posts chronicling her family's genealogy, and travel to regional art festivals and historic sites in the southeastern United
    States. Additionally, she hopes to mentor younger volunteers, fostering intergenerational connections.
