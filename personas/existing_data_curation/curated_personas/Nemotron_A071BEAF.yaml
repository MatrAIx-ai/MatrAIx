personas:
  professional: Janna Mcglathery, a meticulous community volunteer, leverages decades of household management and event coordination to serve as a docent at the Dunnellon Historical Museum and lead senior
    art appreciation workshops, and they blend their curiosity for art history with methodical planning skills.
  sports: Janna Mcglathery, an avid walker on Dunnellon's nature trails, is a member of the local senior hiking club, occasionally joins a gentle Zumba Gold class, and they cheer for the Florida Gators
    football team and Tampa Bay Rays baseball whenever they catch a broadcast.
  arts: Janna Mcglathery, a passionate watercolorist who frequents the River Arts district galleries, admires Monet's impressionism, volunteers at community theater productions of The Importance of Being
    Earnest, and they intertwine quilting with digital photography to capture the delicate wings of their backyard butterflies.
  travel: Janna Mcglathery, a meticulously planned traveler, enjoys annual pilgrimages to historic sites such as St. Augustine and Savannah's art festivals, maintains a detailed itinerary for each trip,
    but they occasionally add spontaneous detours to explore a local farmers' market in Charleston.
  culinary: Janna Mcglathery, an adventurous home chef, experiments with dishes like Moroccan tagine, Japanese ramen, and Southern shrimp gumbo, balances garden-fresh herbs with spices like saffron and
    sumac, yet they sometimes forget to refrigerate delicate pastries, leading to occasional culinary mishaps.
  core: Janna Mcglathery blends organized precision with a curious love for art, history, and flavors, turning their retirement into a vibrant tapestry of volunteerism, lifelong learning, and gentle community
    engagement, even if they occasionally misplace their garden gloves.
background:
  cultural: Janna’s cultural background reflects a blend of traditional Southern American values and a deep appreciation for the natural and artistic heritage of Florida. Raised in a modest, middle‑class
    family in central Florida, she grew up attending church gatherings, community festivals, and local civic events. Her white, Anglo‑American ancestry links her to a heritage of early Florida settlers,
    and she maintains family traditions such as holiday potlucks, storytelling, and preserving regional recipes. Living in Dunnellon, she is influenced by the town’s historic charm, the surrounding Ocala
    National Forest, and the vibrant arts scene that thrives in small‑town Florida.
