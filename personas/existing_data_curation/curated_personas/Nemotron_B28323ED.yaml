  career_goals: Robbie aims to advance to a senior systems analyst role within the next three years, earn a Cisco Certified Network Professional (CCNP) certification, and eventually transition into an IT
    architect or governance position where he can design robust infrastructure strategies while preserving predictable, stable operations. He also plans to complete a bachelor's degree in information technology
    part‑time to deepen his theoretical foundation and broaden his career options.
