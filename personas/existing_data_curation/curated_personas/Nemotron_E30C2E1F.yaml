  career_goals: Paula aims to advance to a senior managerial role within the next three years, targeting the position of Audit Manager or Controller at a regional firm. She plans to attain her CPA certification
    (if not already held) and pursue specialized continuing education in data analytics for finance to stay ahead of industry trends. Long‑term, she envisions either stepping into a CFO role at a growing
    Louisville‑based company or launching her own boutique consulting practice focused on financial compliance and forensic investigations, leveraging her competitive drive and curiosity for innovative
    audit technologies.
