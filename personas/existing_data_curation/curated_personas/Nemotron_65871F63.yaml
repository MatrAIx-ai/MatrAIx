  hobbies: '[''Bollywood/Bhangra Dance'', ''South Asian Cooking'', ''Community Walking Club'', ''Gardening'', ''Sustainable Packaging Workshops'', ''DIY Craft Projects'']'
  career_goals: Ishani aims to advance from a packer to a supervisory role within the next two to three years, targeting a shift‑lead or floor‑manager position where she can drive operational efficiency
    and mentor employees. She plans to earn certifications in Certified Production and Inventory Management (CPIM) and a Lean Six Sigma Yellow Belt to bolster her credentials. Long‑term, she is interested
    in transitioning to a logistics coordinator role that blends her practical packaging expertise with strategic planning, while also exploring opportunities to support community‑based initiatives that
    promote workforce development for local residents.
