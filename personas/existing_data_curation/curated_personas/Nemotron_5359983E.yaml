  hobbies: '[''Cooking Mexican cuisine'',''Hiking local trails'',''Gardening'',''Journaling and bullet planning'',''Yoga and meditation'',''Salsa dancing'',''Reading personal development books'',''Volunteering
    at community food pantry'']'
  career_goals: Julisa aims to advance from her current sales associate role to a store manager position within the next two to three years, using her strong organizational skills to streamline operations
    and boost team productivity. She plans to pursue an associate degree in Business Management and obtain a retail management certification to bolster her qualifications. Long‑term, she envisions becoming
    a district manager or opening her own boutique that showcases Mexican artisan products, merging her cultural heritage with her retail expertise. Throughout her career progression, she seeks to implement
    structured training programs, improve employee retention, and create a supportive yet high‑performing work environment.
