personas:
  professional: Jennifer Vick is a project‑focused business administration senior who leverages Excel‑driven budgeting, Trello‑styled timeline management, and methodical event coordination to streamline
    operations at a regional health clinic, applying their reliable, organized nature to drive incremental efficiency gains while assertively advocating for process improvements.
  sports: Jennifer Vick enjoys weekend hikes in the Great Smoky Mountains, logging routes on AllTrails, follows the Tennessee Titans for football, cheers on the Nashville Predators during the NHL season,
    and participates in a community women’s running club that meets for a 5K run each spring.
  arts: Jennifer Vick spends evenings knitting patterned shawls to the soundtrack of Alison Krauss and Union Station, enjoys reading Southern historical narratives, and attends local theater productions
    of classic plays such as “A Streetcar Named Desire” performed by the Knoxville Actors’ Guild, while also admiring the folk art of Grandma Moses.
  travel: Jennifer Vick favors meticulously planned road trips, having explored Asheville’s vibrant art scene, the historic streets of Charleston, and the scenic Blue Ridge Parkway, and dreams of a future
    solo travel itinerary to Savannah’s historic squares and the coastal fishing villages of the Gulf Coast, balancing a limited student budget with a love for cultural immersion.
  culinary: Jennifer Vick follows methodical Southern comfort recipes, perfecting dishes like chicken and dumplings with fresh thyme, collard greens simmered with smoked turkey, and pecan pie featuring
    locally sourced pecans and flaky crust, while skillfully crocheting a kitchen napkin holder during the cooling phase.
  core: Jennifer Vick blends a love for orderly planning with a quiet curiosity, channeling their methodical mindset into gardening, project coordination, and Southern cooking, while wrestling with occasional
    impulsive splurges on craft supplies and a tendency to delay dental visits.
background:
  cultural: Jennifer grew up in a middle‑class, white family in Knoxville, Tennessee, steeped in Southern hospitality and Appalachian values. Her upbringing emphasized community service, church participation,
    and family gatherings centered around shared meals and local traditions. She identifies with the modest, practical ethos of the region, valuing reliability, modest ambition, and close‑knit community
    ties while also being open to broader cultural experiences through her college education.
attributes:
  skills: '[''Microsoft Excel'', ''Microsoft Word'', ''PowerPoint'', ''Project planning (Trello/Asana)'', ''Basic bookkeeping'', ''Data entry'', ''Event coordination'', ''Written communication'', ''Time
