  hobbies: '[''Gardening'', ''Hiking in the Great Smoky Mountains'', ''Reading non-fiction'', ''Cooking Southern recipes'', ''Knitting and crocheting'', ''Journaling'']'
  career_goals: Jennifer aims to complete her Bachelor’s degree in Business Administration within the next two years and obtain a Certified Associate in Project Management (CAPM) credential. Her short‑term
    goal is to secure a project coordinator position at a regional healthcare organization where she can apply her organizational strengths to improve operational efficiency. Long‑term, she aspires to become
    a certified Project Management Professional (PMP) and eventually lead cross‑functional teams in process‑improvement initiatives, balancing career stability with opportunities for community impact.
