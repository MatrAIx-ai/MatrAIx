  career_goals: Charlie aims to move into a senior engineering leadership role where he can shape architecture decisions while preserving a flexible work environment. He aspires to become a lead DevOps
    engineer or engineering manager who champions inclusive team cultures and mentors underrepresented talent. Over the next five years, he hopes to obtain advanced certifications in cloud infrastructure,
    contribute to open‑source projects, and eventually launch a community‑focused tech consultancy that provides affordable digital solutions to small businesses in Mobile and surrounding areas.
