personas:
  professional: Ruth Wood, a 40-year-old senior civil engineer with expertise in structural analysis, geotechnical assessment, and water-resources design, they leverage their methodical planning and sociable
    communication style to lead community-focused infrastructure projects while championing sustainable, culturally responsive solutions.
  sports: Ruth Wood, an avid outdoors enthusiast, spends summer weekends kayaking the Bitterroot River with the local kayak club, cycles the Ravalli County trail network, they cheer on the Missoula Osprey
    baseball team while participating in the Hamilton Hiking Club’s fall summit pursuits.
  arts: Ruth Wood, a regular volunteer with the town’s community theater, often stages productions of classic dramas, and finds inspiration in the photography of Ansel Adams, the music of Gillian Welch,
    and the poetry of Mary Oliver, which they weave into their book club discussions and personal creative writing.
  travel: Ruth Wood, an enthusiastic traveler, they blend adventure and relaxation in road trips that include scenic drives to Glacier National Park's Many Glacier Valley, weekend getaways to the historic
    town of Bozeman for jazz nights, and a planned pilgrimage to Kyoto's historic temples to study integrated water-management gardens.
  culinary: Ruth Wood delights in farm-to-table cooking, expertly preparing pan-seared trout with fresh dill, beet and goat-cheese salads, and hearty bison stew seasoned with huckleberries, while they skillfully
    can summer tomatoes and experiment with a sourdough starter in their modest kitchen.
  core: Ruth Wood merges meticulous engineering with community-centered creativity, balancing methodical project leadership with a love for the outdoors, arts, and sustainable living, even as they indulge
    in occasional impulse purchases and back pain after long hikes.
background:
  cultural: Ruth was raised in a small Midwestern farming community with German and Irish ancestry, and moved to western Montana after college. The values of hard work, self‑reliance, and community stewardship
    she learned growing up are reinforced by the frontier spirit of Hamilton and the broader ‘Big Sky’ culture. Her graduate studies in humanities broadened her appreciation for diverse cultural narratives,
    including the Salish heritage of the Bitterroot Valley. She maintains a strong connection to regional traditions—attending local festivals, supporting the town’s church choir, and honoring the environmental
    ethic that shapes rural Montana life.
attributes:
  skills: '[''Structural analysis'', ''Geotechnical assessment'', ''Water‑resources design'', ''AutoCAD Civil 3D'', ''Revit'', ''GIS mapping'', ''Project management'', ''Budgeting and cost control'', ''Regulatory
    compliance'', ''Technical writing'', ''Public speaking'', ''Stakeholder engagement'', ''Sustainable infrastructure planning'']'
  hobbies: '[''Hiking the Bitterroot Mountains'', ''Cycling on rural trails'', ''Kayaking on the Bitterroot River'', ''Volunteering with Habitat for Humanity'', ''Participating in local theater productions'',
    ''Leading a historical fiction book club'', ''Community gardening'', ''Landscape photography'', ''Cooking farm‑to‑table meals'', ''Attending regional craft fairs'']'
  career_goals: She aims to become a senior project manager or principal engineer within her firm, leading large‑scale, community‑oriented infrastructure projects that incorporate sustainable and culturally
    responsive design. Ruth is passionate about mentoring the next generation of engineers—especially women and under‑represented groups—and hopes to influence regional policy on water resource management
    in Ravalli County. Over the next decade she envisions earning a Professional Engineer (PE) license, completing a leadership certification, and possibly pursuing a doctorate in engineering management
    that merges her technical expertise with her humanities background.
