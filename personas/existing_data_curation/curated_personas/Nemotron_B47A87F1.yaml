personas:
  professional: Jennie Aldrich is a detail‑driven interior designer who blends sustainable design principles with a love for vintage finds, leveraging AutoCAD, SketchUp, and Revit to create eco‑friendly
    residential spaces while confidently managing client expectations and contractor timelines.
  sports: Jennie Aldrich embraces a balanced fitness routine, joining a local spin studio and a yoga collective three times a week, cheering on the Cincinnati Bengals on game days, and spending weekends
    hiking the Cincinnati parks and the Red River Gorge, while occasionally playing pick‑up volleyball at a community center.
  arts: Jennie Aldrich immerses themselves in the arts by frequenting Cincinnati gallery openings, drawing inspiration from designers like Kelly Wearstler and photographers such as Annie Leibovitz, curating
    playlists that feature Bon Iver while drafting renderings, and attending live productions at the Cincinnati Playhouse to keep their creative pulse vibrant.
  travel: Jennie Aldrich plans their travel with a designer’s eye, often booking short‑term trips to design hubs like Miami for Design Miami, Copenhagen to study Scandinavian sustainability, and the Red
    River Gorge for weekend hikes, preferring a mix of curated itinerary and spontaneous photo walks while budgeting carefully to fund their growing studio aspirations.
  culinary: Jennie Aldrich is an enthusiastic brunch‑goer and a competent home cook who loves crafting avocado‑toast with radish and feta, whipping up seasonal salads featuring heirloom tomatoes, kale,
    and roasted beets, and experimenting with rustic dishes like rosemary‑infused roasted chicken paired with locally sourced honey‑glazed carrots.
  core: Jennie Aldrich blends an organized, eco‑conscious design mindset with a restless curiosity, often juggling multiple vintage‑hunt expeditions while habitually over‑booking brunches and occasionally
    neglecting their own sleep schedule.
background:
  cultural: Jennie was raised in a middle‑class, white family in Cincinnati, Ohio, with roots tracing back to German and Irish ancestry common to the region. Growing up in the Midwest, she internalized
    values of community, practicality, and modest hospitality. The local culture’s emphasis on craftsmanship, functional design, and friendly social interaction influenced her aesthetic sensibility and
    her collaborative work style. While she appreciates the broader American cultural landscape, she remains deeply connected to the Midwestern ethos of reliability, hard work, and a welcoming spirit that
    permeates both her personal life and professional practice.
