  career_goals: Jennie aims to become a senior interior designer within the next five years and eventually launch her own boutique studio that specializes in eco‑friendly residential and small‑scale commercial
    projects. She plans to earn a LEED Accredited Professional credential to deepen her expertise in sustainable design. Beyond client work, she hopes to contribute to the Cincinnati design community by
    teaching workshops at local colleges, publishing articles in regional design magazines, and mentoring emerging designers. Building a reputation for innovative yet practical solutions is central to her
    long‑term ambition.
