  hobbies: '[''Community dance classes'', ''Church volunteer outreach'', ''Potluck cooking and hosting'', ''Gardening'', ''Reading African American contemporary fiction'', ''Bowling with friends'', ''Board
    game nights'', ''Hiking local trails'']'
  career_goals: Carolyn aims to advance from her current secretary role to a senior administrative or office manager position within the next three to five years. She plans to obtain the Certified Administrative
    Professional (CAP) credential and enroll in a bachelor's degree program in Business Administration to deepen her strategic planning abilities. Long-term, she hopes to combine her administrative expertise
    with her community-focused outlook by leading office operations for a nonprofit organization serving the African American community in Union County, where she can mentor younger staff and contribute
    to community development projects.
