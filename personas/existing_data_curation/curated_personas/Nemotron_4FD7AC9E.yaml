  hobbies: '[''Pickup basketball'', ''Coastal hiking'', ''Karaoke nights'', ''Vietnamese cooking'', ''Home‑automation tinkering'', ''Youth STEM mentoring'', ''Tet festival volunteering'', ''Listening to
    action movies'', ''Reading automotive repair magazines'']'
  career_goals: Cosmin aims to solidify his technical reputation by earning a FOA Certified Fiber Optic Technician credential and completing his GED within the next year. He envisions moving into a crew‑lead
    or supervisory role where he can coach new installers, improve safety practices, and streamline workflow. Over the longer term, he hopes to launch a small, family‑run telecommunications repair business
    that offers flexible hours, allowing him to balance work with community involvement. He also wants to stay current with 5G and fiber‑to‑the‑home technologies, positioning himself as a go‑to expert for
    emerging broadband projects in San Diego.
