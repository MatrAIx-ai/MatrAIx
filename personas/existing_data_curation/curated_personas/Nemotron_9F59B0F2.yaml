  career_goals: Steven aims to graduate high school with a strong academic record and pursue a degree in environmental engineering or renewable energy technology. He envisions a career that blends his practical
    problem‑solving abilities with his talent for community outreach, such as becoming a sustainability coordinator for a local utility or nonprofit. Over the next decade, he hopes to lead projects that
    improve water conservation and solar energy adoption in the Verde Valley, while also mentoring younger students through school clubs and community programs to foster curiosity and teamwork.
