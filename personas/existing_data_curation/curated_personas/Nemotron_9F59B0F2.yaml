personas:
  professional: Steven Peart is a middle-school robotics enthusiast who thrives on building and programming competition bots, balancing curiosity with practicality, and they often take the lead on group
    projects by organizing tasks while staying flexible enough to adapt to new ideas.
  sports: Steven Peart is a varsity‑level middle‑school soccer midfielder who trains with the Cottonwood United youth club, cheers for the Arizona Cardinals and Arizona Diamondbacks, and they blend disciplined
    conditioning with spontaneous desert trail runs to stay fit.
  arts: Steven Peart is an avid acoustic guitarist who lives for classic rock legends like Led Zeppelin, The Rolling Stones, and Fleetwood Mac, captures short video clips of jam sessions and desert sunsets
    for Instagram, and they often edit footage to the rhythm of John Mayer’s mellow tracks.
  travel: Steven Peart loves weekend hikes through the red‑rock canyons around Sedona and the Grand Canyon, dreams of backpacking through Iceland’s glaciers, and they plan trips on a mix of spontaneity
    and carefully mapped Google Maps itineraries, balancing school constraints with a thirst for adventure.
  culinary: Steven Peart enjoys cooking simple southwestern dishes like grilled corn with lime‑cotija, spicy chicken tacos, and homemade salsa, but they often forget to bring enough water on hikes, leading
    to impromptu snack raids on granola bars and protein shakes.
  core: Steven Peart is a calm, sociable teen who fuses desert‑hiking photography, robotics tinkering, and classic‑rock guitar jams into a uniquely energetic yet organized lifestyle, despite occasionally
    forgetting to stretch before soccer.
background:
  cultural: Steven was raised in a white, middle‑class family in Cottonwood, AZ, a small town nestled in the high desert of Yavapai County. His upbringing blends typical American traditions—family barbecues,
    community church gatherings, and holiday celebrations—with the distinctive flavors of the Southwest, such as appreciation for the desert environment, local festivals, and the region’s multicultural
    influences. Growing up near the Verde River and the red‑rock formations, he developed a close connection to nature and a respect for the area’s history, including the heritage of nearby Native American
    and Hispanic communities. These experiences shape his sociable, cooperative nature and his interest in sustainable community development.
