persona_description: A decision-maker in the apparel industry who is responsible for selecting the right FR/AR clothing supplier for their business, considering key factors such as chain of custody, fabric
  performance, technical support, manufacturing process control, garment styles, comfort, and safety standards. This persona is likely to be involved in the procurement process of FR/AR clothing for their
  organization, and is looking for a supplier that can provide a variety of fabrics, garment styles, outerwear, and layering options to streamline the procurement process. They are also interested in working
  with a supplier that offers long-term technical support, provides a track record of proven performance in the conditions required, and adheres to the correct standards of construction for the applicable
  hazard.
