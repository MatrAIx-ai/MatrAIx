personas:
  professional: Ana Monge, a seasoned secondary English Language Arts teacher with eight years at Lake Central High School, they blend an imaginative outlook with strong curriculum design and technology
    integration skills—using Google Classroom, Nearpod, and Flipgrid—to deliver interdisciplinary, project‑based units that fuse literature, visual art, and digital media for both heritage‑language and
    gifted learners.
  sports: Ana Monge, an avid outdoor enthusiast, they spend weekends hiking the sand dunes of the Indiana Dunes with the local Dunes Explorers Club, cheer for the Indianapolis Colts and the Indiana Pacers,
    and sustain flexibility and stress relief through weekly yoga sessions at a community studio.
  arts: Ana Monge, they channel their creative energy through vibrant acrylic paintings inspired by folk‑art motifs, they actively contribute to a weekly community art collective in Munster, draw literary
    inspiration from magical realism novels by Gabriel García Márquez, they recite original poetry at local open‑mic nights, and their artistic palette is informed by the bold colors of celebrated muralists
    such as Frida Kahlo and Diego Rivera.
  travel: Ana Monge, they prefer thoughtfully planned journeys that blend cultural immersion with relaxation, they have explored the historic streets of Old San Juan, the architectural wonders of Barcelona,
    and the sun‑kissed shores of Naxos, and they dream of a Pacific Coast road trip to experience lighthouse vistas and coastal cuisine.
  culinary: Ana Monge, they love experimenting in the kitchen, creating vibrant corn‑tortilla tacos filled with smoked pork shoulder, pickled radish, and a Midwest‑inspired apple‑cabbage slaw, they season
    dishes with chipotle powder, fresh cilantro, and local sweet corn, and they relish occasional evenings dining at farm‑to‑table restaurants that highlight seasonal produce.
  core: Ana Monge, a 44‑year‑old bilingual educator with a vivid imagination, they balance classroom innovation with a habit of leaving half‑finished canvases on the kitchen counter, a penchant for late‑night
    poetry slams, and a disciplined yet indulgent approach to spending on art and travel.
background:
  cultural: Ana Nicole Monge was born to Mexican immigrant parents who settled in the Chicago suburbs. Growing up in a bilingual household, she celebrated traditions such as Dia de los Muertos, Las Posadas,
    and family gatherings centered around tamales and mole, which instilled a deep sense of cultural pride. Her Mexican heritage informs her teaching philosophy; she weaves bilingual resources, Mexican
    literature, and cultural narratives into lessons to affirm the identities of heritage-language students. The bicultural experience also shaped her community involvement, leading her to mentor Latino
    youth and advocate for inclusive curricula. While fully integrated into the Midwestern lifestyle of Munster, Indiana—participating in local festivals and volunteering at the public library—she maintains
    strong ties to her roots through regular visits to Mexico to reconnect with extended family and cultural practices.
attributes:
  skills: '[''Curriculum development'', ''Project-based learning design'', ''Differentiated instruction'', ''Educational technology integration'', ''Bilingual communication (English/Spanish)'', ''Culturally
    responsive pedagogy'', ''Classroom management'', ''Formative and summative assessment'', ''Professional development facilitation'', ''Creative writing instruction'']'
  hobbies: '[''Acrylic painting'', ''Creative writing (short stories, poetry)'', ''Reading magical realism and contemporary Mexican literature'', ''Cooking Mexican-Midwest fusion cuisine'', ''Hiking at
    Indiana Dunes'', ''Mindfulness meditation'', ''Community art collective participation'', ''Spanish tutoring at local community center'']'
  career_goals: Looking ahead, Ana aims to transition into a leadership role where she can scale her passion for arts-infused, culturally responsive education across the district. She is pursuing an Educational
    Leadership certification with the goal of becoming a department chair or instructional coach specializing in literacy and creative arts integration. Over the next five years, she plans to author a curriculum
    guide that blends Mexican literary traditions with contemporary American texts, and to mentor novice teachers through a peer-coaching program. Ultimately, she envisions earning a doctorate in education
    to research the impact of imagination-driven pedagogy on student resilience, and to advocate for policies that support bilingual and arts-rich programs in public schools.
