persona_description: A pediatric otolaryngologist and the lead author of a study published in the journal Science Translational Medicine, who specializes in the treatment of tracheobronchomalacia, a rare
  congenital condition affecting about 1 in 2,200 births, and has successfully developed a 3D-printed device to provide an early treatment option for the condition. The device allows for the stent airways
  in a way that prevents external compression over a period of time before bioresorption, allowing the particular problem of radial expansion of the airway over the critical period of growth to be resolved.
  The device has been successful in providing early treatment to three babies, and the study published in the journal Science Translational Medicine shows promising results. The device has been well-received
  by the medical community, with Dr. Glenn Green, the senior author, describing it as a "promising option" for children facing the life-threatening condition.
