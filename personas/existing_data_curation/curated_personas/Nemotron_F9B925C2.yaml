personas:
  professional: Bianca Rosario is a budding community‑oriented hospitality enthusiast who leverages bilingual skills to coordinate school club events and volunteer drives, and they dream of managing a restaurant
    and eventually a taco stand that also serves as a youth training hub.
  sports: Bianca Rosario, a dynamic midfield player for the El Paso High School soccer team, trains rigorously to improve speed and tactics while cheering for the El Paso Locomotive FC and following the
    Texas Rangers, and they spend weekends shooting hoops at the community center with friends.
  arts: Bianca Rosario captures vibrant street murals and festival scenes for Instagram, draws inspiration from muralist Diego Rivera’s bold colors, grooves to salsa hits by Carlos Vives, enjoys Zumba playlists
    curated by DJ Tiësto, and they blend visual storytelling with rhythmic movement to express their outgoing personality.
  travel: Bianca Rosario dreams of a road trip along the Pacific Coast, has already explored Santa Fe’s art markets, hopes to visit Barcelona for its street art, and they balance travel costs with a part‑time
    job and summer volunteering commitments.
  culinary: Bianca Rosario loves experimenting with tacos, salsas, and tamales, perfecting a pineapple‑chipotle salsa for a fresh twist, can whip up a quick quesadilla using fresh corn tortillas, but they
    often skip cleaning up the kitchen in favor of snapping photos for Instagram.
  core: Bianca Rosario is a socially driven teen with a competitive streak, juggling soccer, salsa, and a budding culinary dream while navigating the chaos of teenage priorities and occasional procrastination,
    and they remain skeptical of others’ motives yet resilient enough to bounce back.
background:
  cultural: Bianca is a first‑generation Mexican‑American raised in El Paso, Texas, a border city where Spanish and English flow together in everyday life. At home, her family celebrates Mexican traditions
    such as Día de los Muertos, Cinco de Mayo, and weekly family gatherings centered around food, music, and Catholic rituals. The proximity to Mexico infuses her identity with a deep respect for family
    (familia) and community solidarity, while the American environment adds a flair for independence and modern pop culture. This bicultural upbringing shapes her bilingual fluency, love for Mexican cuisine,
    and participation in both local U.S. school events and community celebrations that honor her heritage.
