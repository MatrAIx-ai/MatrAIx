  hobbies: '[''Soccer (midfielder)'', ''Salsa & Zumba dancing'', ''Cooking traditional Mexican dishes'', ''Photography of street murals and festivals'', ''Online multiplayer gaming (e.g., FIFA)'', ''Attending
    local festivals and parades'', ''Volunteer work at community garden'']'
  career_goals: Bianca aims to earn her GED within the next year and then enroll in a community‑college program focused on hospitality management or culinary arts. She aspires to work part‑time in a local
    restaurant to refine her cooking and front‑of‑house skills, eventually securing a management role where she can lead a diverse team. Long‑term, she dreams of opening her own taco stand that serves a
    fusion of traditional Mexican flavors and modern twists, while also offering a training platform for other young people in her neighborhood. Her bilingual ability drives her ambition to become a community
    outreach specialist, helping bridge cultural gaps between Spanish‑speaking families and English‑language services in El Paso.
