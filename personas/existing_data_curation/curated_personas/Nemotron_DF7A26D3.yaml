personas:
  professional: Nicole Landry, a senior civil engineer and interdisciplinary design visionary, merges structural analysis with abstract art to craft kinetic bridges and sculpture‑integrated parks, leading
    a competitive yet often spontaneous workflow that thrives on rapid problem‑solving, though her aversion to rigid structure occasionally threatens deadline adherence.
  sports: Nicole Landry hikes the flood‑plain trails of Congaree National Park each weekend, cycles with the Columbia Cycle Collective, roots for the Carolina Panthers, and occasionally coaches a youth
    soccer team at the community garden, favoring low‑impact endurance activities over high‑intensity gym sessions.
  arts: Nicole Landry transforms bridge geometry into abstract mixed‑media canvases, frequents the Columbia Museum of Art to study Rothko and O'Keeffe, captures urban reflections in black‑and‑white photography,
    and draws creative fuel from live jazz nights featuring Miles Davis and contemporary saxophonist Kamasi Washington, all while sharing speculative fiction drafts in a local writers’ circle.
  travel: Nicole Landry’s travel style blends spontaneous road trips to iconic bridges like the Golden Gate and the Brooklyn, with meticulous day‑planning for sustainable architecture tours in Copenhagen
    and Iceland’s volcanic landscapes, all while juggling a modest travel budget that prioritizes off‑season visits and landscape photography opportunities.
  culinary: Nicole Landry cooks a rotating menu of farm‑to‑table dishes—such as heirloom tomato focaccia, smoked beet ravioli, and grilled peach arugula salads—while tending a native‑plant garden that yields
    lovage, sassafras, and edible wild lettuce, and they indulge in craft oat‑milk lattes and occasional sourdough‑based brunches with locally sourced honey.
  core: Nicole Landry, a 51‑year‑old engineer‑artist, fuses structural innovation with abstract expression, leads with bold vision, yet habitually battles a procrastination‑driven scramble to meet deadlines.
background:
  cultural: Nicole grew up in a middle‑class family in the Midlands of South Carolina, steeped in the region’s traditions of hospitality, modesty, and a reverence for the natural landscape. Her upbringing
    emphasized community involvement, church activities, and an appreciation for the historic architecture of Columbia’s neighborhoods. After earning a graduate degree in a STEM field, she returned to her
    hometown, bringing a broader, national perspective while retaining Southern sensibilities—such as a preference for face‑to‑face conversation and a strong sense of local pride. As a white woman in the
    South, she is aware of the region’s complex history, which informs her commitment to inclusive, culturally sensitive public works that honor both heritage and progress.
