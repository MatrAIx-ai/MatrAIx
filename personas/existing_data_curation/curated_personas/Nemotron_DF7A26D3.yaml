  career_goals: Nicole aims to position herself at the forefront of sustainable and artistically infused civil engineering. She intends to lead a multidisciplinary team that designs resilient infrastructure
    that also serves as public art, championing projects that blend functionality with aesthetic value—such as kinetic bridges or sculpture‑integrated parks. Over the next decade, she envisions securing
    a senior leadership role within her firm or a municipal agency, where she can influence policy toward greener, more visually engaging public works. Nicole also aspires to mentor emerging engineers,
    especially women, and to publish thought‑leadership pieces on the convergence of engineering, design, and community storytelling.
