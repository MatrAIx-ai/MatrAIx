persona_description: Dr. Katrina Navickas is a historian with a focus on the history of public space in England, particularly during the 18th and 19th centuries. Her research interests include the development
  of public green spaces in London after the Second World War, the debates surrounding housing estates, children's playgrounds, and bombed sites, and the exceptionalism of these discussions in London. She
  is also the founder of a research network on Rural Modernism and has published widely on subjects related to 18th and 19th century British History and historical geography, including local and regional
  identities and landscapes. Her books and articles include Protest and the Politics of Space and Place, 1789-1848 (Manchester University Press, 2015) and Conflicts of power, landscape and amenity in debates
  over the British Super Grid in the 1950s' (Rural History, 2019). She has most recently authored the Croydon section of the Alternative Guide to London Boroughs for Open House London, edited by Owen Hatherley.
