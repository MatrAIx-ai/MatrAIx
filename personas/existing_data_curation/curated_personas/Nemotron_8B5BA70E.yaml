  career_goals: Tiffani aims to transition from a store‑level supervisory role to a district‑manager position within the next five years, overseeing multiple locations across the Triangle. She plans to
    complete a bachelor's degree in Business Administration, focusing on retail management, through an online program while continuing to work. Her ambition is to become known for turning underperforming
    stores into top‑ranked locations by blending rigorous data analysis with innovative merchandising concepts. Long‑term, she envisions opening her own boutique that celebrates Black culture and contemporary
    fashion, or taking a corporate role dedicated to training and mentorship programs that amplify the voices of Black employees in the retail sector.
