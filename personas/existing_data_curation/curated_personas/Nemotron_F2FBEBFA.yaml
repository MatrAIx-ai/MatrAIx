personas:
  professional: Linda Fleites is a veteran carpenter‑artist who blends three decades of hands‑on construction expertise with a playful, curious eye for folk‑inspired design, turning their workshop into
    a lively hub where they casually juggle blueprints, mentor apprentices, and chase spontaneous ideas for custom furniture while tolerating a bit of organized chaos.
  sports: Linda Fleites spends weekends hiking the nearby foothills and joining a casual community softball league, cheering on the Alabama Crimson Tide football team and the Birmingham Stallions while
    keeping fit through weekly yoga sessions at the church hall and occasional runs with the Decatur Running Club.
  arts: Linda Fleites paints watercolor landscapes inspired by the works of Winslow Homer, molds pottery while listening to bluegrass legends like Bill Monroe, and finds creative spark at folk festivals
    alongside the Decatur Heritage Society’s folk‑dance troupe, all while regularly quoting the poetic lines of Maya Angelou.
  travel: Linda Fleites favors relaxed road trips that combine scenic drives through the Appalachian foothills with stops at craft‑centric towns such as Asheville, NC, and Nashville, TN, where they explore
    folk art galleries and historic music venues, and they dream of a summer retreat in the Blue Ridge Mountains to paint and garden.
  culinary: Linda Fleites loves cooking Southern comfort staples like shrimp and grits, buttery biscuits, and collard greens seasoned with garden‑grown thyme and rosemary, tackling recipes from the late‑1960s
    cookbook of Edna Lewis while occasionally improvising with smoked paprika and a dash of hot sauce at church potlucks.
  core: Linda Fleites is a curious, barefoot‑clad carpenter‑artist who blends folk tradition with spontaneous creativity, juggling a bustling workshop, community classes, and a garden of native plants—while
    occasionally misplacing tools and forgetting appointments, yet always greeting life with a bluegrass tune.
background:
  cultural: Linda was raised in a close‑knit, predominantly Protestant community in central Alabama, where Southern hospitality, church gatherings, and family traditions were central to daily life. Her
    family has a multi‑generational history of woodworking and homebuilding, embedding a respect for craftsmanship and self‑reliance. Local customs such as potluck meals, bluegrass music, and participation
    in county fairs have shaped her worldview. While deeply rooted in Southern culture, her curiosity drives her to blend these traditions with contemporary artistic ideas, creating a unique personal and
    professional identity.
