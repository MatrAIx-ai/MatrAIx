  career_goals: She aims to transform her home workshop into a small boutique studio that produces sustainably sourced, art-inspired furniture reflecting Southern folk traditions. Over the next five years,
    Linda plans to launch a limited-edition line, open a community class series at the local community college, and establish a mentorship program for younger carpenters in Decatur. She also hopes to showcase
    her work in regional craft fairs and eventually author a guidebook on integrating artistic design into practical woodworking.
