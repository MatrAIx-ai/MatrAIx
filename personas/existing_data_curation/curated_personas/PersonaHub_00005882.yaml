persona_description: A person interested in the history and culture of the First Nations people of the Pacific Northwest Coast, particularly in their art, traditions, and artifacts. They are fascinated
  by the totem poles, dugout canoes, and sculptural masks, as well as the woodworking technology and the intricate decorations of the boxes. They are also interested in the canoemakers and the history of
  the Northwest Coast, and they are looking for examples of other canoes and artifacts from this region.
