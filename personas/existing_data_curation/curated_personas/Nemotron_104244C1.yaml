personas:
  professional: Ashlynn Stumpe leverages her mechanical engineering expertise in 3D CAD, finite element analysis, and rapid prototyping to lead interdisciplinary product teams, using her talkative, charismatic
    style to translate artistic concepts into environmentally sustainable mechanisms while tolerating a flexible, sometimes disorganized planning approach.
  sports: Ashlynn Stumpe hikes the La Jolla coastal trail, joins the San Diego Running Club for weekend 5K runs, watches the San Diego Padres and San Diego Wave FC, and plays casual beach volleyball in
    the summer, although their flexible schedule sometimes leads to missed workouts after late‑night improv shows.
  arts: Ashlynn Stumpe immerses herself in visual arts by painting vibrant abstracts inspired by Shepard Fairey’s street‑art, photographing urban murals reminiscent of Banksy, and attending improv comedy
    nights, while occasionally curating pop‑up gallery events that blend kinetic sculptures and live music.
  travel: Ashlynn Stumpe dreams of a spontaneous road trip along California’s Highway 1, a cultural immersion in Kyoto’s temples, and an adventure trek through Patagonia, planning loosely with a travel
    app while budgeting for immersive experiences over luxury accommodations.
  culinary: Ashlynn Stumpe enjoys cooking a medium‑rare ribeye with rosemary‑garlic butter, mastering pad thai with tamarind and shrimp, and savoring fish tacos with pickled cabbage, often experimenting
    with unconventional combos like miso‑marinated carrots, reflecting her intermediate cooking skill and love for culinary exploration.
  core: Ashlynn Stumpe is a charismatic, art‑obsessed engineer who blends design and sustainability, thrives on social energy, wrestles with anxiety, and embraces spontaneous creativity at the expense of
    strict organization.
background:
  cultural: Ashlynn grew up in a middle‑class suburban neighborhood in Southern California, rooted in a family of German‑Irish ancestry. The multicultural tapestry of San Diego—its proximity to Mexican
    culture, vibrant Asian communities, and a thriving arts scene—shaped her worldview. She embraces a progressive, open‑minded Californian ethos that values individuality, creativity, and social responsibility.
    This cultural blend fuels her appreciation for both technical rigor and artistic expression, while also informing her commitment to inclusive, mental‑health‑aware workplaces.
