  career_goals: Ashlynn aims to become a lead mechanical engineer who spearheads interdisciplinary product teams that blend aesthetic artistry with sustainable engineering. She envisions launching a boutique
    design consultancy that creates kinetic art installations and consumer products with high visual impact and eco‑friendly performance. Over the next five years, she plans to obtain her Professional Engineer
    (PE) license, mentor junior engineers, and champion mental‑health initiatives within the tech community. Ultimately, she hopes to be recognized as a thought leader in design‑driven engineering and to
    influence industry standards toward more humane, flexible work cultures.
