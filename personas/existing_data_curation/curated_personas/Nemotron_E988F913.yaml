personas:
  professional: Stephanie Phillips, a 78‑year‑old volunteer coordinator and emerging mixed‑media artist, channels her meticulously honed organizational skills and vivid imagination into leading the senior
    center’s intergenerational arts program, planning exhibitions, and mentoring younger volunteers; they thrive on the balance of structure and creative freedom.
  sports: Stephanie Phillips, an enthusiastic member of the Madison Senior Strollers walking club, follows the Green Bay Packers with devotion, attends select home games, and practices gentle tai chi twice
    a week at the senior center to preserve flexibility and balance, blending community spirit with low‑impact fitness.
  arts: Stephanie Phillips, an avid watercolorist and community‑theater patron, draws inspiration from abstract masters Gerhard Richter and Mark Rothko, regularly attends performances at the Madison Omnibus
    Theater, curates a monthly poetry reading featuring Maya Angelou and contemporary Wisconsin poets, and experiments with mixed‑media collages, channeling their boundless curiosity into every artistic
    endeavor.
  travel: Stephanie Phillips, a meticulous weekend traveler with a love for cultural immersion, prefers well‑planned trips to historic locales such as Door County, Wisconsin; Savannah, Georgia; and the
    medieval city of Bruges, Belgium, where they combine museum visits with genealogical research to trace family roots while balancing a modest travel budget.
  culinary: Stephanie Phillips, a garden‑to‑table cook, delights in preparing beet and goat‑cheese salad, wild‑rice pilaf infused with fresh sage, and honey‑glazed carrots harvested from their own backyard,
    while experimenting with rosemary, lavender, and a dash of smoked paprika, yet they often over‑salt soups when trying new recipes.
  core: Stephanie Phillips, a 78‑year‑old creative polymath, blends artistic curiosity, community leadership, and meticulous budgeting into a vibrant life of puzzles, occasional paint splurges, and thriving
    garden, all guided by a gentle routine and a touch of assertive imagination.
background:
  cultural: Stephanie grew up in a Midwestern, white American family in Wisconsin, shaped by the region’s traditions of community involvement, modesty, and appreciation for the outdoors. Her cultural identity
    reflects Protestant ethical influences, a strong sense of self‑reliance, and a deep respect for local heritage. She values the blend of small‑town camaraderie and the broader cultural currents of American
    art and literature, which she incorporates into her creative pursuits.
