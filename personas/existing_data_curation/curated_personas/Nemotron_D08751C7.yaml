  career_goals: Evan aims to transition into a senior leadership role such as Chief Data Officer or Head of Analytics within the next five years, where he can shape data‑driven strategy for a mid‑size firm.
    He is also interested in mentoring the next generation of analysts, establishing a formal training program, and publishing case studies on applied mathematical solutions in the financial services sector.
    Ultimately, he hopes to create a legacy of rigorous, ethical data practice before moving toward semi‑retirement and consulting on a part‑time basis.
