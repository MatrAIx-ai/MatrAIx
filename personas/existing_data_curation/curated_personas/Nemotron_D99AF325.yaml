  hobbies: '[''Sketching nature scenes'', ''Playing acoustic guitar'', ''Listening to bluegrass and folk music'', ''Reading graphic novels and comics'', ''Photography of local landscapes'', ''Gardening
    and caring for a small vegetable plot'', ''Participating in school art club'', ''Designing set pieces for community theater'', ''Strategic video gaming'']'
  career_goals: Gavin aspires to attend a high school with a strong arts program and eventually earn a B.F.A. in illustration or graphic design. He dreams of becoming a professional concept artist for video
    games or an animated film studio, where he can blend his love of storytelling with visual creativity. Long‑term, he hopes to give back to his community by establishing a local art workshop or mural
    project that brings together youth, seniors, and local businesses, fostering creative expression and community pride.
