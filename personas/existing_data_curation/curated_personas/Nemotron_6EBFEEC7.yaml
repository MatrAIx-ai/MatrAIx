personas:
  professional: An aspiring pharmacy technician, Asela Calvo blends her bilingual fluency and deft use of QS/1 and Cerner with a relaxed, curiosity-driven work style that embraces flexibility over rigid
    schedules while ensuring precise dosage verification and inventory control.
  sports: An outdoor-oriented fitness enthusiast, Asela Calvo enjoys solitary walks in Lehigh Parkway, occasionally joins a casual adult soccer league called Allentown Unity FC, and fervently supports the
    Philadelphia Eagles in football and the Philadelphia 76ers in basketball during their respective seasons.
  arts: An avid acoustic guitarist and literature fan, Asela Calvo spends evenings strumming to the tunes of John Mayer and The Lumineers while immersing herself in contemporary fiction by Sally Rooney
    and Murakami, and she frequently attends indie film screenings at the Allentown Art Museum featuring directors such as Guillermo del Toro.
  travel: A low-key traveler, Asela Calvo prefers budget-friendly weekend getaways to nearby New York City or the Pocono Mountains and dreams of a future study-abroad semester in Barcelona to practice Spanish
    and explore Mediterranean cuisine, balancing her love for spontaneous adventures with the constraints of her part-time work schedule and upcoming academic commitments.
  culinary: A budding home cook, Asela Calvo relishes mastering family recipes like mofongo with chicharrón and arroz con gandules, often experiments with fresh herbs from her garden such as cilantro and
    oregano, and balances these flavors with quick meals like avocado toast topped with smoked salmon.
  core: Asela Calvo balances a curious, laid-back approach to life with a penchant for forgetting to file paperwork and a love for spontaneous acoustic jam sessions in the kitchen.
background:
  cultural: Asela was raised in a bilingual Puerto Rican household in Allentown, where Spanish was spoken at home and English at school. Family gatherings centered around traditional celebrations such as
    Noche Buena, Three Kings Day, and lively música plena, fostering a strong sense of cultural identity and community. This bicultural upbringing nurtured her respect for family, hospitality, and collective
    well‑being, influencing her cooperative nature and desire to support others, especially within the local Latino community. Despite living in the United States, she maintains connections to Puerto Rico
    through regular visits, participation in local Puerto Rican cultural events, and by preserving culinary and musical traditions in her daily life.
attributes:
  skills: '[''Prescription verification'', ''Medication dispensing'', ''Compounding basics'', ''Pharmacy software (QS/1, Cerner)'', ''Inventory management'', ''Bilingual communication (Spanish/English)'',
    ''Basic pharmacology knowledge'', ''Dosage calculation accuracy'', ''Patient counseling on OTC products'', ''Team collaboration'', ''Adaptability to shifting workloads'']'
  hobbies: '[''Reading contemporary fiction'', ''Exploring science non-fiction'', ''Cooking Puerto Rican dishes'', ''Playing acoustic guitar'', ''Walking in Lehigh Parkway'', ''Herb gardening'', ''Participating
    in a small book club'', ''Volunteering at community health fairs'', ''Learning basic Spanish folk dance (bomba)'']'
  career_goals: Asela aims to complete an associate’s degree in pharmacy technology within the next year, followed by enrollment in a bachelor’s program in pharmaceutical sciences, with the long‑term ambition
    of earning a PharmD and becoming a licensed pharmacist. She envisions working in a community pharmacy that serves a diverse clientele, especially Spanish‑speaking patients, where she can combine her
    practical skills with her curiosity for new therapeutic options. Additionally, she aspires to obtain certifications in immunizations and medication therapy management, positioning herself for future
    roles in pharmacy management or public‑health advocacy. While dedicated to her professional growth, she values flexibility and plans to balance continued education with opportunities for travel or short‑term
    clinical rotations.
