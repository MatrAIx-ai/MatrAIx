persona_description: A historian specializing in ancient Egyptian literature and its evolution over time. Dr. Loprieno's research interests include the development of the Egyptian literary tradition, the
  relationship between Egyptian literature and European literature, and the role of determinative changes in shaping the narrative structure of Egyptian texts. Dr. Loprieno's work has shed light on the
  emergence of proto-nationalism and the question of hierarchical authority in Middle Kingdom fiction, as well as the literary mode of Egyptianization and the revival of linguistics.
