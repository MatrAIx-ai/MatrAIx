  career_goals: Amy aims to secure a stable and predictable work schedule while continuing her personal development. She plans to obtain her GED within the next year and enroll in a community‑college program
    focused on hospitality management or social services. Her short‑term ambition is to become a shift supervisor at her current restaurant, where she can apply her organizational strengths and compassionate
    leadership. Long‑term, Amy dreams of opening a modest, quiet café that serves as a community hub for individuals seeking a calm space, and she hopes to integrate volunteer opportunities for local shelters
    into the business model. She also wishes to increase her involvement in community outreach, potentially transitioning into a part‑time role that supports vulnerable populations.
