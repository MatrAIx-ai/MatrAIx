personas:
  professional: Bertha Williams, a seasoned general-store manager in a close-knit Alabama town, leverages their practical, detail-oriented mindset and competitive streak to keep inventory meticulously organized
    and sales figures ahead of neighboring shops, while their early departure from formal schooling fuels a relentless focus on on-the-job learning and responsibility.
  sports: Bertha Williams, a devoted Auburn Tigers fan, plays weekly in a community bowling league at the county fairgrounds, maintains fitness through daily morning walks around their neighborhood and
    occasional yoga classes in the church hall, and they balance competitive play with a friendly, yet skeptical, approach to teammates.
  arts: Bertha Williams finds comfort in the harmonies of gospel choirs and the storytelling of Dolly Parton, attends quarterly performances at the local historic theater, contributes their voice to the
    church choir, and curates a modest collection of Southern folk art prints that they display during community gatherings.
  travel: Bertha Williams prefers short, well-planned road trips to historic southern towns such as Natchez, Mississippi, and Savannah, Georgia, balancing a modest travel budget with a love for regional
    cuisine, while they dream of a future pilgrimage to Jerusalem once finances allow.
  culinary: Bertha Williams delights in preparing classic comfort dishes (crispy fried chicken, buttery biscuits, collard greens slow-cooked with smoked ham hocks, and peach cobbler) while brewing sweet
    tea with a hint of lemon, though they sometimes over-salt the greens when stress spikes.
  core: Bertha Williams is a pragmatic, community-focused organizer whose competitive drive and chronic anxiety fuel meticulous planning, occasional over-checking, and a habit of over-indulging in sweet
    tea during stressful moments.
background:
  cultural: Bertha was raised in a predominantly white, Southern Baptist community in Huntsville, Alabama. Her upbringing was steeped in traditional Southern values—emphasis on family, church, hospitality,
    and self‑reliance. The local culture of sweet tea, comfort food, and community gatherings, such as church potlucks and county fairs, shaped her practical mindset and love for organized, communal events.
    Though she left formal schooling early, the strong work ethic and cultural expectation of contributing to family and neighborhood have remained guiding forces in her life.
attributes:
  skills: '["Household budgeting","Meal planning and cooking","Community event coordination","Basic home maintenance","Crocheting and quilting","Basic computer literacy"]'
  hobbies: '["Gardening","Reading mystery novels","Church choir participation","Crocheting","Bingo","Walking in nature"]'
  career_goals: Bertha hopes to translate her strong organizational talents into a part‑time role as a community outreach coordinator or caregiver, where her reliability and competitive drive for recognition
    can be valued. She also aspires to earn her GED to solidify her credentials and to volunteer as a mentor for at‑risk youth, offering guidance grounded in her practical life experience. Managing stress
    and improving her health are personal goals that she believes will support her broader ambition to become a trusted leader in local initiatives.
