personas:
  professional: Juan Borrero is a seasoned community mentor who leverages his carpentry, bilingual communication, and event‑coordination skills to keep the senior center lively, blending practical know‑how
    with curiosity for new ideas while casually juggling responsibilities and they often surprise younger volunteers with inventive DIY solutions.
  sports: Juan Borrero is an avid follower of the Oklahoma City Thunder and Dallas Cowboys, participates in weekly senior walking groups at the local park, loves casting a line at nearby lakes during spring,
    and they enjoy cheering with friends at community center screenings of Sunday football games.
  arts: Juan Borrero is a devoted listener of traditional Mexican folk music, especially Los Tigres del Norte and Juan Gabriel, regularly dances to mariachi tunes at neighborhood fiestas, and they cherish
    occasional viewings of classic Mexican cinema featuring Pedro Infante.
  travel: Juan Borrero is a relaxed traveler who enjoys weekend trips to San Antonio’s historic River Walk, occasional visits to their grandchildren in Austin, dreams of exploring the ancient ruins of Teotihuacan,
    and they plan trips with flexible itineraries, often booking last‑minute bus tickets.
  culinary: Juan Borrero is a skilled cook who masterfully prepares authentic chiles en nogada, tamales, and salsa verde using fresh epazote and roasted tomatillos, experiments with fusion recipes like
    corn‑flour crusted fish tacos, and they love sharing these dishes at community potlucks.
  core: Juan Borrero is a charismatic, curiosity‑driven senior who blends practical DIY talent with a love for music, food, and community, yet their laid‑back approach sometimes leads to missed appointments
    and a perpetually overflowing garden shed, and they often find themselves scrambling to locate misplaced gardening tools.
background:
  cultural: 'Juan was born to Mexican immigrant parents and raised in a bilingual household. Though he has spent most of his adult life in Oklahoma, he maintains strong ties to Mexican traditions: celebrating
    Día de los Muertos, making tamales and mole, speaking Spanish at home, and participating in the local Catholic parish. His identity blends Mexican family values—respect for elders, communal solidarity,
    and religious devotion—with the Midwestern small‑town spirit of neighborliness and flexibility.'
attributes:
  skills: '[''Carpentry and home repairs'', ''Traditional Mexican cooking'', ''Bilingual Spanish-English communication'', ''Community event coordination'', ''Storytelling and oral history'', ''Mentoring
    and informal teaching'', ''Basic computer and smartphone use'']'
  hobbies: '[''Social dancing (Mexican folk and line dancing)'', ''Card games (bridge, rummy) with seniors'', ''Gardening'', ''Fishing'', ''Cooking and recipe experimentation'', ''Listening to Mexican music'',
    ''Watching football'', ''Local community events'']'
  career_goals: At 77, Juan's main ambition is to stay healthy, remain socially active, and preserve his cultural legacy. He aims to mentor younger community members at the senior center, compile a small
    memoir of family recipes and stories, help organize Guthrie's annual Mexican-inspired cultural festival, and travel occasionally to visit his children and grandchildren.
