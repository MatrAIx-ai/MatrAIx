personas:
  professional: Marshall Lovick is a 16‑year‑old aspiring maintenance technician who blends his hands‑on mechanical know‑how—fixing bicycles, scooters, and custom PC builds—with a meticulous, skeptical
    mindset, regularly stepping into leadership roles in school club projects and basketball, all while targeting an apprenticeship at a local automotive service shop or the Dow Chemical plant to launch
    a skilled‑trade career.
  sports: Marshall Lovick spends weekday evenings shooting hoops at the Midland High Bulldogs gym, modeling his fast‑break style after the Dallas Mavericks, hits the local skate‑park on weekends with friends,
    and joins a community fishing club that casts at Lake Tawakoni every Saturday, balancing competitive basketball drills with laid‑back outdoor recreation.
  arts: Marshall Lovick shreds a Fender Stratocaster in a garage band that covers Foo Fighters and Arctic Monkeys, curates the sound board for church youth events, and cites the raw, DIY ethos of Jack White
    as his artistic north star, while occasionally streaming his own guitar jams to a modest YouTube audience.
  travel: Marshall Lovick prefers spontaneous weekend road trips with his skate‑park crew, ranging from a quick drive to Fredericksburg for pizza and live music to the wind‑blown dunes of Big Bend National
    Park for night‑time stargazing, but his limited allowance keeps most adventures within a day’s drive of Midland.
  culinary: Marshall Lovick favors bold, handheld flavors—spicy chicken wings, loaded nachos topped with jalapeños, and homemade pepperoni pizza assembled on his custom‑built kitchen rig—while his cooking
    skills are limited to quick skillet meals like shrimp tacos with fresh cilantro and lime, and he often rewards a successful gaming stream with a brisket sandwich from the local barbecue joint.
  core: Marshall Lovick is a high‑energy teen who channels a relentless curiosity for building and fixing into gaming, skate‑boarding, and early‑career tinkering, yet his competitive streak often fuels
    sleepless nights and a persistent undercurrent of worry that makes him skeptical of advice and prone to over‑checking his work.
background:
  cultural: Marshall was raised in a middle‑class, white, Midwestern family in Midland, Michigan. The local culture emphasizes a strong work ethic, modesty, and community involvement, with many families
    participating in church (predominantly Protestant) activities, county fairs, and high‑school sports events. Midland’s proximity to the Dow Chemical plant has fostered an appreciation for industrial
    jobs and technical trades. Community youth programs, such as the local recreation center and church youth groups, have reinforced a sense of belonging and collective responsibility, shaping Marshall’s
    outgoing yet cautious outlook on life.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Digital literacy'', ''Team coordination'', ''Public speaking'', ''Strategic thinking'', ''Self‑discipline'', ''Problem‑solving under pressure'']'
  hobbies: '[''Basketball'', ''Skateboarding'', ''Competitive online gaming (e.g., Fortnite, Valorant)'', ''Custom PC building'', ''Fishing at local lakes'', ''Playing guitar'', ''Volunteering at community
    events'']'
  career_goals: Marshall aims to secure a paid apprenticeship with a local manufacturing or automotive service company in Midland, such as a maintenance technician position at the nearby Dow Chemical plant
    or a regional auto repair shop. He hopes to earn certifications in CNC machining or automotive diagnostics, allowing him to transition into a skilled‑trade role that offers clear career progression
    and financial stability. Long‑term, he envisions becoming a senior maintenance engineer or shop foreman, using his blend of practical problem‑solving and leadership skills to improve workplace efficiency
    while providing a reliable income that eases his worries about the future.
