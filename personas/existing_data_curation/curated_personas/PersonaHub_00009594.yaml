persona_description: A scientist who specializes in the field of viral vectors, specifically researching adeno-associated virus (AAV) vectors and their applications in gene therapy, gene delivery, and transgene
  expression in rodents. They are knowledgeable about the packaging capacity of AAV, the development of efficient AAV-mediated gene transfer, and the use of AAV vectors in combination with RNA interference
  and Cre-transgenic mice to achieve region-specific gene expression. They are also interested in the combinatorial potential of AAV vectors and the potential for rAAV-based studies to increase in the coming
  years.
