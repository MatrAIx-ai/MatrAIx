  career_goals: Peter aspires to a future where he can combine his love of science, teamwork, and community service. He dreams of becoming a marine biologist or a marine conservation engineer, aiming to
    protect the Gulf of Mexico’s ecosystems. He also envisions contributing to his community by sharing knowledge as a science teacher or mentor, and hopes to attend a Texas university known for its marine
    science programs.
