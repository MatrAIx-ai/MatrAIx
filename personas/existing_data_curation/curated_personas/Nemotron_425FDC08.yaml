personas:
  professional: Aspiring junior game developer, Peter Vangelder uses Scratch to design simple adventure games inspired by the tide pools they explore, combining methodical planning with creative curiosity,
    and their organized, reliable nature shines through in carefully documented code and collaborative Boy Scout project work.
  sports: Peter Vangelder is a midfield enthusiast on the Corpus Christi Waves youth soccer club, spends Saturday mornings training on the sandy fields by the harbor, follows the Houston Dynamo in MLS and
    cheers for the Dallas Cowboys on Sundays, and they approach fitness with disciplined drills balanced by spontaneous beach volleyball games during the summer.
  arts: Peter Vangelder channels their love of marine life into vibrant sketches of seahorses and kelp forests, often inspired by the underwater photography of National Geographic’s David Doubilet and the
    animated wonder of Disney’s "Finding Nemo," while they attend the annual Festival of the Arts to watch live performances by Texas folk singer Robert Earl Keen and enjoy the community’s street murals
    that celebrate Gulf Coast heritage.
  travel: Peter Vangelder dreams of weekend road trips to South Padre Island’s wind‑blown dunes and family camping outings in Big Bend National Park, while they already cherish past excursions to Galveston’s
    historic Seawall and aspire to someday snorkel around the Great Barrier Reef, preferring to plan itineraries with colorful maps and a checklist of must‑see tide pools.
  culinary: Peter Vangelder delights in the tangy crunch of fresh shrimp tacos drizzled with cilantro‑lime crema, loves helping their parents grill fish with a splash of jalapeño‑infused butter, and after
    mastering simple stir‑fry techniques, they experiment with making homemade guacamole using ripe avocados, lime juice, and a pinch of sea salt, though they sometimes burn the edges of a tortilla when
    distracted by a new LEGO build.
  core: Peter Vangelder is a methodical, curiosity‑driven 11‑year‑old who balances tide‑pool explorations with disciplined LEGO builds, thrives in collaborative games, and habitually misplaces their favorite
    red soccer cleat, only to find it later tucked inside a half‑finished LEGO set.
background:
  cultural: Peter is a white American growing up in Corpus Christi, Texas, an area where Gulf Coast culture blends Southern hospitality with a strong maritime tradition. His family participates in local
    festivals, such as the annual Festival of the Arts and the Fiesta de la Flor, and enjoys regional foods like fresh shrimp and fish tacos. The community places a high value on friendliness, outdoor recreation,
    and support for neighbors, which reinforces his sociable and cooperative personality.
