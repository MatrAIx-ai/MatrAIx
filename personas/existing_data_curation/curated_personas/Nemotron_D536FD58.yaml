personas:
  professional: Kimberly Wang, a budding young explorer, treats each school day like a research lab, applying her love for Lego construction and puzzle solving to develop early spatial reasoning and organizational
    skills, while they quietly excel in group activities without seeking the spotlight.
  sports: Kimberly Wang, a member of the Brooklyn Youth Soccer League’s U8 team, spends Saturday afternoons practicing dribbling and passing on the neighborhood field, cheers for the New York Knicks on
    TV and admires their teamwork, while they also enjoy quiet walks in Prospect Park as a gentle form of exercise.
  arts: Kimberly Wang, a passionate doodler, fills sketchbooks with hand‑drawn animal adventures inspired by Dr. Seuss and the soft palettes of Claude Monet, and listens to Mozart’s Symphony No. 40 while
    coloring, which fuels their imagination and quiet creativity.
  travel: Kimberly Wang, who loves short family trips, treasures weekend visits to the American Museum of Natural History and ferry rides to Coney Island, while dreaming of a future adventure to Disney
    World’s Magic Kingdom and the cherry blossoms of Washington, D.C., balancing a love for familiar comfort with a budding curiosity about new places.
  culinary: Kimberly Wang, an eager kitchen helper, enjoys measuring flour for pancakes, sprinkling fresh basil from their indoor herb garden onto tomato‑basil pasta, and sharing apple slices with peanut
    butter as a favorite snack, though they sometimes forget to clean up their mess afterward.
  core: Kimberly Wang blends quiet curiosity with a caring heart, turning solitary puzzles into collaborative kindness while worrying over every small detail.
background:
  cultural: Kimberly comes from a white American family living in Brooklyn, New York. While her household celebrates traditional American holidays like Thanksgiving and Christmas, the multicultural neighborhood
    exposes her to a variety of languages, cuisines, and cultural festivals, fueling her curiosity about the world. She often attends community library storytimes and participates in neighborhood clean-up
    events, experiences that reinforce her compassionate and cooperative nature.
