personas:
  professional: Betty Palmer, a 15‑year‑old aspiring community organizer and budding writer, uses their methodical planning, love for YA literature, and talent for arranging library displays to develop
    leadership and communication skills, while staying anchored in the collaborative spirit of neighborhood block parties.
  sports: Betty Palmer enjoys casual basketball at their school gym during fall, follows the Brooklyn Nets and New York Yankees avidly, is a member of the local community center’s youth basketball club,
    and maintains a steady fitness routine by jogging along Prospect Park’s loop three times a week, preferring structured activity to large‑scale team competition.
  arts: Betty Palmer channels their creative energy through sketching Brooklyn’s skyline, journaling daily reflections, and immersing themselves in the soulful sounds of H.E.R., the socially conscious verses
    of Kendrick Lamar, and the contemporary narratives of author Angie Thomas, which collectively shape their artistic identity and leisure.
  travel: Betty Palmer prefers meticulously planned weekend getaways, such as exploring the Smithsonian museums in Washington, D.C., weekend visits to the historic district of Savannah for its cobblestone
    streets, and dreaming of a future road trip to New Orleans to experience its jazz heritage; they also keep a detailed travel journal to track expenses and memories, all while balancing the constraints
    of school schedules and family budget.
  culinary: Betty Palmer enjoys baking cupcakes with a penchant for red‑velvet frosting and oat‑milk buttercream, frequently incorporates seasonal ingredients like fresh berries and dark chocolate, and
    balances their sweet hobby with tasting classic comfort dishes such as collard greens and mac and cheese during family gatherings.
  core: Betty Palmer is a detail‑obsessed teen who balances strategic chess matches, cupcake experiments, and heartfelt journaling, all while maintaining a calm, reliable demeanor and a habit of double‑checking
    their schedule before any commitment.
background:
  cultural: Betty is an African‑American teenager raised in the diverse neighborhoods of Brooklyn, Kings County. Her family has deep roots in the local community; her mother works as a nursing assistant
    and her father is a mechanic, both of whom emphasize the importance of reliable work and mutual support. She grows up surrounded by the cultural rhythms of the borough—block parties, neighborhood barbershops,
    and church gatherings where gospel and soul music play a central role. Celebrations like Juneteenth and community festivals reinforce her connection to Black history and the civil‑rights legacy that
    shaped her neighborhood. At the community center, she engages with peers from various backgrounds, which broadens her appreciation of different traditions while maintaining a strong sense of Black identity.
    These cultural influences shape her values of cooperation, harmony, and service to her community.
