  hobbies: '[''Reading contemporary YA fiction'', ''Journaling'', ''Sketching Brooklyn cityscapes'', ''Baking cupcakes'', ''Playing chess'', ''Volunteering at the local library'', ''Listening to R&B, soul,
    and conscious hip‑hop music'']'
  career_goals: Betty aims to graduate from high school, obtaining a GED if necessary, and then pursue an associate's degree in health administration or social work at a community college in New York. She
    dreams of becoming a certified community health worker or a school counselor, roles that let her use her organizational strengths to support families and students in her Brooklyn neighborhood. In the
    short term, she hopes to secure a summer internship at a local health clinic or community nonprofit, where she can apply her event‑planning and outreach skills while gaining professional experience.
    Ultimately, she wants a stable, structured career that contributes to the well‑being of her community and offers clear pathways for advancement.
