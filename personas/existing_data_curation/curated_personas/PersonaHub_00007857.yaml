persona_description: A biochemist who specializes in the study of membrane proteins, particularly aquaporins and their role in water transport. They have experience with the development of new methodologies
  for MD simulations and the comparison of results with biochemical measurements. They are also familiar with the mechanisms of gating in aquaporins and the role of environmental factors in their function.
  They have a background in structural biology and are skilled in the use of molecular modeling software to analyze and interpret molecular structures.
