  career_goals: Pedro dreams of a future where he can create things that make people smile and think while also feeling secure about his abilities. He imagines becoming an illustrator or comic‑book artist
    who blends colorful Mexican folk motifs with modern stories, and he hopes that his careful planning will help him succeed in contests. He also loves the idea of designing simple machines or video‑game
    levels, so he hopes to study engineering or computer science when he’s older. Because he cares about helping others and often worries about the well‑being of his friends, he sometimes pictures himself
    as a doctor or community volunteer who can make his neighborhood healthier. In the short term, he aims to win the school science‑fair and to be chosen for the art club’s mural project, seeing those
    achievements as steps toward his larger creative and compassionate ambitions.
