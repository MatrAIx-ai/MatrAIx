personas:
  professional: Pedro Gerena is an aspiring junior engineer who merges his love for LEGO construction and simple science experiments with a habit of sketching cartoon characters to calm anxiety, showcasing
    his curiosity, organization, and assertive problem‑solving.
  sports: Pedro Gerena enjoys playing on the Sunnyfield Soccer Club’s U‑9 team, idolizes the River City Bears baseball squad, and follows the National Youth Basketball League, balancing competitive spirit
    with a preference for solo nature hikes during weekends.
  arts: Pedro Gerena spends afternoons sketching cartoon characters inspired by the works of Hayao Miyazaki and the vibrant comic style of Alex Ross, while listening to classic songs by The Beatles and
    performing simple melodies on a small keyboard taught by grandparents, weaving artistic appreciation into daily relaxation.
  travel: Pedro Gerena prefers spontaneous day trips to nearby fields and creeks for rock‑collecting, dreams of visiting the Grand Canyon on a school excursion, and hopes to one day experience a night under
    the stars at the Atacama Desert, balancing careful planning for school trips with a love for unstructured exploration.
  culinary: Pedro Gerena helps bake tacos and cinnamon rolls with their mother, delights in the aroma of melted cheese and fresh cilantro, enjoys snacking on apple slices and cheese sticks, and experiments
    with mixing chocolate chips into cookie dough, showcasing a budding culinary curiosity and modest kitchen confidence.
  core: Pedro Gerena is a curiosity‑driven nine‑year‑old who calms anxiety through sketching, compulsively organizes LEGO bridges, worries about missing details, and can be both fiercely focused on a project
    and delightfully distracted by a rock on the ground.
background:
  cultural: Pedro is a Mexican‑American boy raised in a bilingual household in Portland, Texas. At home he speaks Spanish with his parents and grandparents, celebrating traditions such as Día de los Muertos,
    quinceañera gatherings, and family meals centered on tacos, tamales, and pozole. He attends a local Catholic church and participates in community festivals that showcase mariachi music, folkloric dance,
    and regional crafts. While he embraces his Mexican heritage, he also identifies with the rural Texas lifestyle—helping on a small farm, enjoying country fairs, and playing football on the school field.
    This blend of Mexican cultural pride and Texan community life shapes his worldview and fuels his artistic and inquisitive spirit.
