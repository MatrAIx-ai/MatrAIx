  hobbies: '[''Gardening (coffee and fruit trees)'', ''Hiking in the mountains'', ''Chess'', ''Reading on quality management and process improvement'', ''Cooking traditional Puerto Rican dishes'', ''Attending
    local festivals and community events'', ''Woodworking'']'
  career_goals: Approaching retirement, Luis aims to transition from hands-on inspection to a mentorship and supervisory role, sharing his wealth of practical knowledge with younger technicians. He plans
    to earn an ISO 9001 Lead Auditor certification to formalize his expertise and to provide consulting services for local manufacturers on quality assurance. His ambition is to leave a lasting legacy of
    improved standards and a culture of disciplined, structured work practices while securing a comfortable retirement that allows him to support community projects in Barranquitas.
