personas:
  professional: Donny Lee, a veteran wholesale-manufacturing sales specialist with four decades of B2B relationship building, data-driven forecasting, and CRM mastery, is shifting to a part-time advisory
    role where they apply their pragmatic, structured approach and calm, mentoring style to guide emerging manufacturers and support local economic development.
  sports: Donny Lee, a loyal fan of the Cleveland Browns and Cincinnati Reds, regularly attends Harrison High School football games, competes in the Harrison Senior Bowling League, and joins a local walking
    club that meets each Saturday to explore the township’s scenic trails, balancing community spirit with gentle fitness.
  arts: Donny Lee, an avid amateur photographer inspired by Ansel Adams, captures Ohio’s seasonal landscapes while listening to John Denver and The Eagles, often crafts vintage birdhouses in the workshop
    to The Carpenters’ tunes, and enjoys monthly visits to the Cleveland Orchestra and community theater productions at the Ohio Theatre.
  travel: Donny Lee, a road-trip enthusiast, frequently drives his restored 1965 Mustang to classic-car shows in Mackinac Island, Michigan, and the Wisconsin Dells, enjoys annual trips to Nashville’s live-music
    scene, and dreams of cruising the historic Route 66 from Chicago to Santa Monica, preferring self-planned itineraries that blend spontaneous detours with familiar routes.
  culinary: Donny Lee, a garden-to-table cook, often prepares hearty sweet-corn chowder with fresh backyard corn, potatoes, and herbs, bakes classic apple-cinnamon pie, grills pork tenderloin with a mustard-honey
    glaze, and pairs meals with locally brewed craft beer, though they amusingly tend to over-season dishes with extra salt.
  core: Donny Lee, a sociable, pragmatic 74-year-old who balances structured routines with spontaneous community outings, mentors emerging sales talent, nurtures classic-car and gardening hobbies, and carefully
    safeguards their health and retirement.
background:
  cultural: Donny grew up in a Midwestern white family with deep roots in Ohio, tracing ancestry to German and Irish immigrants who settled in the region in the early 20th century. He embodies the Midwestern
    values of hard work, modesty, and community solidarity. Raised in a small‑town environment, he developed an appreciation for local traditions such as high‑school football games, county fairs, and church
    gatherings. Although divorced, he maintains strong ties to his extended family and neighborhood networks, often acting as a supportive, considerate presence. His cultural outlook blends traditional
    craftsmanship and practical pragmatism with an openness to new experiences, reflecting the balanced, adaptable personality described in his profile.
attributes:
  skills: '[''Territory and account management'', ''B2B negotiation'', ''Relationship building'', ''Industrial product knowledge'', ''Supply‑chain basics'', ''Sales forecasting and data analysis'', ''CRM
