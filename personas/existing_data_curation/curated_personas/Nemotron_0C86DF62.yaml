  hobbies: '[''Fishing'', ''Home garden cultivation'', ''Barbecue cooking'', ''Running a farmer’s market stall'', ''Volunteering at a food pantry'', ''Mentoring youth in agriculture'', ''Playing acoustic
    guitar at open‑mic nights'', ''Attending county fair events'', ''Camping trips'', ''DIY home repairs'', ''Watching high‑school sports games'']'
  career_goals: David aims to move from a miscellaneous farm laborer to a supervisory farm manager within the next five years, eventually acquiring a modest parcel of land to start his own diversified small‑scale
    farm. He plans to develop a community‑supported agriculture (CSA) program that supplies fresh produce to local families and school cafeterias, leveraging his strong community ties and communication
    skills. To support these ambitions, he intends to earn a certification in sustainable agriculture and complete OSHA safety training. In the longer term, David hopes to become a trusted liaison between
    local growers and community organizations, helping to improve labor conditions for farm workers and promote food security in Oakland County.
