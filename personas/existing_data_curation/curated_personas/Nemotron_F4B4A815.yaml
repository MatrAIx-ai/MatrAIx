  career_goals: Approaching retirement age, Joel aims to secure a supervisory position—such as shift sergeant or lieutenant—within the next two years, allowing him to shape departmental policies that prioritize
    safety, transparency, and community partnership. He is passionate about formalizing a mentorship program for new recruits, leveraging his methodical training style to improve retention and professionalism.
    In parallel, Joel plans to complete a certification in private security consulting so that, after his public service career, he can continue to advise small businesses and local organizations on risk
    mitigation and emergency preparedness, ensuring a stable post‑retirement income while staying connected to public safety.
