personas:
  professional: John Acker is a teen tech enthusiast who spends his afternoons mastering strategy games, building model airplanes, and customizing his family's computer hardware, using his competitive mindset
    and practical approach to hone problem‑solving skills that hint at a future career in game design or electrical engineering.
  sports: John Acker shoots hoops for the Lincoln Middle School Wildcats, frequents Riverside Skate Park where he practices freestyle flips with the local skate club, roots for the Los Angeles Lakers and
    follows the NBA season religiously, and swaps competitive gaming tactics for on‑court strategies during practice.
  arts: John Acker devours science‑fiction novels by Isaac Asimov and Neal Stephenson, vibes to the synth‑driven scores of video‑game composer Jeremy Soule, binge‑watches DIY channels like Linus Tech Tips
    and Mark Rober for inspiration, and crowns his weekend movie marathons with classic anime such as Attack on Titan, shaping his creative imagination.
  travel: John Acker dreams of a tech‑filled itinerary that includes a pilgrimage to Tokyo’s Akihabara district, a getaway to the Kennedy Space Center for a behind‑the‑scenes look at rockets, and a summer
    road trip to the Colorado Rockies where he can skateboard the mountain trails between gaming conventions.
  culinary: John Acker’s go‑to meals are pepperoni pizza and instant ramen with a splash of sriracha, he occasionally attempts to recreate chicken teriyaki after watching cooking tutorials, but his kitchen
    confidence stops at microwaving popcorn and assembling snack platters while he hovers over the screen for the next game release.
  core: John Acker is a competitive teen gamer with a practical tinkering streak, a penchant for spontaneous spending, and a habit of neglecting routine health checks while juggling basketball, skateboarding,
    and sci‑fi daydreams.
background:
  cultural: John grew up in a suburban neighborhood in Aberdeen, Maryland, within Harford County’s middle‑class community. The area’s blend of suburban life and proximity to the Aberdeen Proving Ground
    gives him exposure to both civilian and military cultures, fostering a respect for discipline and practical problem‑solving. His family emphasizes self‑reliance, education, and participation in local
    activities such as school clubs, community sports leagues, and regional fairs.
attributes:
  skills: '[''Basic Python scripting'', ''Computer hardware troubleshooting'', ''Strategic video gaming'', ''Team coordination in basketball'', ''Critical analysis'', ''DIY electronics and model building'',
