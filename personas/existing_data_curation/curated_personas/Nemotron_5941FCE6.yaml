  hobbies: '[''Strategy video gaming (e.g., MOBA, FPS)'', ''Building model kits'', ''DIY electronics'', ''Basketball'', ''Skateboarding'', ''Science‑fiction reading'', ''Watching coding tutorials on YouTube'']'
  career_goals: John aims to attend a STEM‑focused high school where he can deepen his knowledge in engineering and computer science. He hopes to earn a scholarship for his competitive gaming or sports
    achievements and eventually study mechanical engineering or software development, with a long‑term goal of working in robotics or game design. He also imagines possibly pursuing a career in e‑sports,
    either as a professional player or a developer of gaming tools.
