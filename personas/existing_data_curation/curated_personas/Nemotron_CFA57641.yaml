  career_goals: Approaching the later stage of his career, Shane aims to transition from day‑to‑day management toward a consulting role where he can mentor emerging food‑service leaders and help establishments
    adopt sustainable, data‑driven practices. He is passionate about reducing food waste, sourcing locally, and integrating nutrition science into menu design. Additionally, he plans to author a guidebook
    that blends his technical expertise with anecdotes from his decades in the industry, sharing best practices with a broader audience. While he remains open to occasional part‑time managerial assignments,
    his primary ambition is to leave a lasting, environmentally‑focused legacy in the food‑service sector.
