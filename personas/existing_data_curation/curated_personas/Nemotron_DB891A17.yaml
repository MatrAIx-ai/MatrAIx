  career_goals: In the short term, Sylvia aims to excel in her remaining middle‑school courses, especially science and math, and to join her school’s robotics club where she can apply her coding and problem‑solving
    abilities. She also plans to volunteer at the St. Louis Science Center’s youth programs, helping younger children with simple experiments. Long‑term, she envisions a career that merges her love of technology
    with a tangible impact on the environment, such as becoming a software engineer specializing in data analysis for urban ecology or a research scientist focused on sustainable city planning. She hopes
    to attend a university with a strong STEM program, secure a scholarship, and eventually work in a role that offers autonomy, quiet focus, and the chance to develop innovative tools for environmental
    monitoring.
