  hobbies: '[''Fishing'', ''ATV riding'', ''BBQ cooking'', ''Church volunteering'', ''Classic rock and country music'', ''Vintage motorcycle restoration'', ''College football'']'
  career_goals: Taha aims to earn his GED and obtain a certification in industrial safety, positioning himself for promotion to plant manager within the next few years. He also aspires to develop his leadership
    skills through mentorship programs and eventually launch a small, family‑run manufacturing venture that emphasizes community employment and sustainable practices.
