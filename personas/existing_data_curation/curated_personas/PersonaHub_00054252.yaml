persona_description: A scientist and researcher at North Carolina State University, specializing in the field of biomedical engineering and stem cell research. Dr. Loboa's research focuses on the use of
  adult stem cells to create bone tissue and the development of new techniques for applying mechanical stress to stem cells in a microfluidic device. She is the first to prove the presence of palladin,
  a protein associated with the actin cytoskeleton, in mesenchymal stem cells and has made significant contributions to the field of tissue engineering.
