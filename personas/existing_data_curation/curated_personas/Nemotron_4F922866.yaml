  hobbies: '[''drawing and sketching'', ''digital illustration'', ''traditional beadwork'', ''reading science fiction and mythology'', ''hiking and nature photography'', ''basic Python coding'', ''storytelling'',
    ''participating in community art gatherings'']'
  career_goals: Inspired by his love for art and cultural heritage, Popatlal aspires to become a multimedia storyteller who bridges Navajo traditions with modern technology. He envisions studying graphic
    design or anthropology at a university, eventually working as a digital curator for the Navajo Nation Museum or creating immersive virtual experiences that teach younger generations about Diné history
    and desert ecosystems. He also hopes to develop educational coding workshops for his community, empowering peers to express their cultural identity through interactive media.
