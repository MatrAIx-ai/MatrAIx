persona_description: A Chilean environmental activist who has been fighting for the rights of the people living in sacrifice zones in Chile. She has organized groups to challenge the status quo and has
  successfully challenged the government and companies responsible for "Chile's Chernobyl" through the Chilean Supreme Court. She is passionate about environmental protection and has a deep understanding
  of the consequences of pollution and its impact on the health and human capital of the poorest citizens in Chile. She is also a strong advocate for the protection of the environment and is committed to
  the implementation of 15 measures aimed at improving air quality and emergency procedures.
