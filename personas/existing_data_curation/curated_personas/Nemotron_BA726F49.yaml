personas:
  professional: Darcy Alava is a seasoned veterinary assistant and laboratory animal caretaker who excels at humane animal handling, specimen collection, and quick emergency problem‑solving, leveraging
    a competitive streak to become the most efficient shift worker while their relaxed attitude toward paperwork sometimes leads to informal recordkeeping, and they are pursuing Certified Veterinary Assistant
    certification and supervisory responsibilities to standardize clinic protocols.
  sports: Darcy Alava enjoys low‑key fitness by walking their dog along the beach and joining the Sunrise Beach Running Club for weekend 5K runs, while cheering on the Miami Marlins in baseball and Orlando
    City SC in MLS, preferring structured workouts that fit into their flexible schedule.
  arts: Darcy Alava unwinds to the smooth boleros of Roberto Carlos and the classic salsa of Celia Cruz, occasionally attending intimate performances by local Latin jazz trios, while practicing crochet
    and wildlife photography inspired by the vivid color palettes of Annie Leibovitz.
  travel: Darcy Alava favors relaxed travel, taking short weekend trips to coastal towns like Key West for beach walks with their dog and exploring Havana’s historic streets for culinary inspiration, while
    dreaming of a tranquil retreat in Asturias, Spain.
  culinary: Darcy Alava delights in preparing traditional Cuban dishes such as ropa vieja, arroz con pollo, and plantain‑topped flan, favoring ingredients like cumin, garlic, and fresh cilantro, and though
    they are a competent home cook, they often improvise when garden herbs are scarce.
  core: Darcy Alava is a meticulous animal‑care specialist whose love for structured routines collides with a penchant for spontaneous garden improvisation and occasional paperwork procrastination, making
    them both reliable and endearingly disorganized.
background:
  cultural: Darcy is a first‑generation Cuban‑Puerto Rican, raised in a bilingual household where Spanish and English intertwine. Her family migrated from Cuba to Puerto Rico in the 1970s, preserving strong
    ties to Cuban traditions—such as cooking hearty dishes like ropa vieja, celebrating San Juan de Dios, and listening to Cuban son music. Catholic values shape her outlook on community and family, and
    she participates in local festivals in Catano that blend Cuban and Puerto Rican customs. This cultural mosaic influences her culinary tastes, music preferences, and the warm, yet cautious, way she connects
    with others.
attributes:
  skills: '["Animal handling and restraint", "Specimen collection", "Basic laboratory microscopy", "Instrument sterilization", "Sanitation and infection control", "Animal health monitoring", "Inventory
    management", "Emergency response assistance", "Client communication", "Informal recordkeeping"]'
  hobbies: '["Reading veterinary and animal behavior books", "Balcony gardening", "Cooking traditional Cuban meals", "Listening to boleros and classic salsa", "Walking the beach with her dog", "Crocheting",
    "Wildlife photography", "Small family gatherings"]'
  career_goals: Darcy aims to formalize her expertise by earning a Certified Veterinary Assistant credential and eventually advancing to a veterinary technician role, despite her limited formal schooling.
    She seeks a stable, predictable work schedule that reduces stress, and hopes to take on supervisory responsibilities in her clinic to shape procedural standards. Long‑term, she envisions opening a small,
    community‑focused animal‑care consultancy in Catano, where she can apply her practical skills while offering flexible, reliable services to local pet owners.
