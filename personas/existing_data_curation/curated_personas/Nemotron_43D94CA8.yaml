personas:
  professional: Silvestre Rosario is a project manager who thrives on orchestrating end‑to‑end initiatives in fast‑paced nonprofit settings, leveraging bilingual fluency, data‑driven risk matrices, and
    a natural flair for public speaking, and they balance a love of routine with a tendency to drift into last‑minute improvisation.
  sports: Silvestre Rosario competes in pickup basketball at the Westbrook Community Court, follows the Boston Celtics with fervor, and they maintain fitness through quick HIIT drills after work, though
    a sometimes‑disorganized schedule means workouts are sporadic.
  arts: Silvestre Rosario leads merengue and bachata nights at local clubs, channels the energy of artists like Juan Luis Guerra and Romeo Santos during karaoke, and they regularly dissect Caribbean novels
    by Junot Díaz and Julia Alvarez, infusing their blog with cultural critique.
  travel: Silvestre Rosario plans spontaneous weekend getaways that blend budget‑friendly road trips to nearby Providence eateries with annual flights to Santo Domingo to reconnect with family, and they
    prefer flexible itineraries over rigid tours.
  culinary: Silvestre Rosario enjoys cooking mangú with sautéed onions, red onions, and butter, perfects sancocho with yucca, plantains, and oxtail, and they often experiment with fusion twists while occasionally
    over‑seasoning due to an impulsive taste for bold spices.
  core: Silvestre Rosario is a sociable, routine‑loving project strategist who balances a competitive drive and a flair for Caribbean rhythm with occasional stress‑induced disarray, and they thrive on being
    the center of attention in both work and social gatherings.
background:
  cultural: Silvestre grew up in a tight‑knit Dominican household in Providence, where Spanish was spoken at home and Catholic traditions marked family celebrations. His parents instilled a strong sense
    of community responsibility and pride in Caribbean heritage, exposing him to merengue, bachata, and the communal spirit of street festivals. As a second‑generation immigrant, he navigates a bicultural
    identity—balancing the collectivist values of his family with the individualistic expectations of American society. This dual perspective informs his professional style, allowing him to bridge cultural
    gaps in project teams and advocate for inclusive, heritage‑focused programming. He remains connected to the broader Dominican diaspora through local cultural organizations, community gatherings, and
    annual visits to the island, which reinforce his commitment to preserving and sharing his cultural legacy.
attributes:
  skills: '[''Project lifecycle management'', ''Budget creation and control'', ''Schedule development and tracking'', ''Risk assessment and mitigation'', ''Bilingual stakeholder communication (English/Spanish)'',
    ''Public speaking and meeting facilitation'', ''Data analysis and reporting'', ''Cultural event coordination'', ''Process optimization'', ''Team leadership and conflict resolution'']'
  hobbies: '[''Merengue and bachata dancing'', ''Karaoke hosting'', ''Playing basketball'', ''Cooking Dominican cuisine'', ''Reading Caribbean literature'', ''Blogging about cultural identity'', ''Attending
    live music events'', ''Video gaming'', ''Traveling to the Dominican Republic'']'
  career_goals: Silvestre aims to leverage his project‑management expertise to become a senior program director within a nonprofit or cultural institution that serves the Dominican diaspora and broader
    Latino community in New England. Over the next five years, he plans to earn the Project Management Professional (PMP) certification, complete a master's in nonprofit management, and lead large‑scale,
    high‑visibility initiatives such as a regional arts festival or a community development housing project. His competitive drive pushes him to outperform peers, win internal leadership grants, and eventually
    establish his own consultancy focused on culturally‑responsive project design. Ultimately, he wants to be recognized as a go‑to strategist who can blend practical project discipline with a deep appreciation
    for Caribbean heritage, securing both professional prestige and financial stability.
