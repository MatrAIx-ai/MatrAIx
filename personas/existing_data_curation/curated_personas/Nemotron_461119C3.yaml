  career_goals: Englebert aims to translate his curiosity and practical mindset into launching a community-focused small business, such as a neighborhood café that doubles as a cultural hub for local artists
    and entrepreneurs. He also envisions building a freelance consulting brand that leverages his sales and marketing skills to help other small businesses in Queens grow. Over the next five years, he hopes
    to acquire certifications in digital marketing and small‑business finance, solidify a steady client base, and achieve financial independence while contributing to the vitality of his local community.
