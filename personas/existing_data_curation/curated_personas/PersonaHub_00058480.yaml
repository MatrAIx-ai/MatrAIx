persona_description: Naomi Kurahara, the co-founder and CEO of Infostellar, a company that aims to reduce the cost of satellite communication by sharing access to multiple antennas. Kurahara is a 36-year-old
  electrical engineer who came up with the idea for Infostellar while pursuing a Ph.D. at the Kyushu Institute of Technology. Her company's technology is designed to overcome the limitation of low-earth
  orbit satellites by letting satellite owners share antennas around the world. Kurahara is known for her innovative approach to solving the challenge of limited communication access with satellites.
