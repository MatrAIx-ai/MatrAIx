personas:
  professional: Junus Evans, a 56‑year‑old handyman and budding contractor‑in‑training, leverages solid carpentry, equipment upkeep, and gardening know‑how with a curiosity‑driven yet organized approach,
    offering flexible part‑time repairs while mentoring younger neighbors and maintaining harmonious community collaborations.
  sports: Junus Evans stays active by tending his garden, fishing on local lakes, and playing in a community‑run senior softball league while cheering on the Clemson Tigers football team and the Atlanta
    Braves, balancing low‑impact exercise with seasonal outdoor pursuits.
  arts: Junus Evans nurtures his creative side through church choir singing and evenings spent listening to gospel legends like Mahalia Jackson and jazz icons such as Miles Davis, while occasionally attending
    local community‑theater productions of classics like A Raisin in the Sun.
  travel: Junus Evans prefers modest road trips that blend historical exploration and relaxation, having driven to Savannah’s historic district and Selma’s civil‑rights landmarks, while dreaming of a future
    pilgrimage to New Orleans for its jazz heritage and a serene weekend getaway at the Great Smoky Mountains.
  culinary: Junus Evans, a proficient home cook, delights in preparing Southern comfort foods like fried catfish with tartar sauce, slow‑cooked collard greens seasoned with smoked ham hocks, buttery cornbread,
    and a pitcher of sweet tea, often sourcing fresh trout from his lake outings and experimenting with heirloom tomatoes from his garden.
  core: Junus Evans balances a curious, hands‑on spirit with a dependable, practical outlook, mentoring neighborhood youth while secretly hoarding spare nails and vintage fishing lures, and finding solace
    in gospel music as they juggle modest finances and a penchant for late‑night fish fry.
background:
  cultural: Junus grew up in the African‑American community of Orangeburg during the latter decades of the civil‑rights movement. Raised around the church, gospel music and communal gatherings shaped his
    sense of harmony and cooperation. The region’s historic Gullah influences, the legacy of sharecropping, and the ongoing struggle for economic equality are reflected in his emphasis on self‑reliance,
    respect for elders, and commitment to uplifting neighbors. Southern hospitality, soul‑food cuisine, storytelling, and a strong belief in mutual support are central to his identity.
