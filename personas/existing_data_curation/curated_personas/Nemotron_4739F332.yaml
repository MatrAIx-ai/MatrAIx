    games at community center'']'
  career_goals: Junus aims to re‑enter the workforce on his own terms, focusing on part‑time handyman work or a small home‑repair business that allows flexibility for his family responsibilities and community
    engagement. He hopes to earn a GED within the next year to broaden his options, obtain a contractor’s license for minor remodels, and eventually become a trusted resource for the Orangeburg neighborhood,
    perhaps leading a community garden or a vocational mentorship program for at‑risk youth. He also aspires to achieve greater financial stability and to secure a comfortable retirement home for himself.
