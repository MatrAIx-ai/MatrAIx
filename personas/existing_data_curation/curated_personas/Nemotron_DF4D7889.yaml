personas:
  professional: Yeganeh Campos, a clinical psychologist in rural Coshocton County, combines rigorous diagnostic assessment with structured CBT and ACT interventions, leveraging their quantitative research
    background and meticulous documentation style to deliver evidence‑based care while assertively developing community mental‑health programs.
  sports: Yeganeh Campos enjoys low‑impact cardio through weekly hikes on the Holmes County Trail and yoga sessions, supports the Cleveland Guardians, Browns, and Cavaliers, and participates in the Coshocton
    Hiking Club’s seasonal trail‑maintenance outings while joining a local adult recreational tennis league each spring.
  arts: Yeganeh Campos weaves artistic appreciation into daily life by quilting intricate patterns inspired by Agnes Miller Parker, attending community theater productions of August Wilson’s plays, listening
    to classical piano by Ludovico Einaudi and folk ballads by Gillian Welch, and displaying impressionist landscapes by Thomas Moran in their home.
  travel: Yeganeh Campos plans meticulously organized road trips that blend scenic relaxation with light adventure, having explored the Blue Ridge Parkway, Kyoto’s historic temples, and the Scottish Highlands,
    while always budgeting a modest travel fund and prioritizing visits to rural wellness retreats that align with their professional interests.
  culinary: Yeganeh Campos delights in farm‑to‑table cooking, skillfully preparing herb‑infused grilled salmon with lemon‑thyme, rustic ratatouille bursting with zucchini, eggplant, and bell peppers, and
    a quinoa‑kale salad tossed with roasted carrots and a drizzle of olive oil, while occasionally treating themselves to a fine cheese board featuring aged gouda and manchego.
  core: Yeganeh Campos balances a love for structured routines with a quiet curiosity, often over‑planning weekend hikes yet habitually staying up late to binge‑read psychology memoirs, occasionally at
    the cost of sleep.
background:
  cultural: Yeganeh was raised in a predominantly white, Midwestern community in central Ohio, with German‑Irish ancestry. Her upbringing emphasized self‑reliance, modesty, and a strong work ethic rooted
    in the region’s Protestant‑heritage culture. Community ties and a sense of responsibility to neighbors shaped her values, leading her to pursue a career serving the local population. While she respects
    traditional customs such as family holiday celebrations and local gatherings, she also embraces progressive mental‑health perspectives, integrating evidence‑based practices into her work. Her cultural
    identity blends the practical, down‑to‑earth sensibility of rural Ohio with a commitment to continual learning and service.
attributes:
  skills: '[''Clinical assessment'', ''Psychological testing (MMPI‑2, WAIS‑IV)'', ''Cognitive‑behavioral therapy'', ''Acceptance‑and‑commitment therapy'', ''Quantitative research methods'', ''Statistical
    analysis (SPSS, R)'', ''Structured case documentation'', ''Crisis intervention'', ''Small‑group workshop facilitation'', ''Telehealth service delivery'', ''Program development for community mental‑health'',
    ''Interdisciplinary collaboration'']'
  hobbies: '[''Gardening (vegetable and herb beds)'', ''Reading nonfiction (psychology, behavioral economics, memoirs)'', ''Small book club participation'', ''Hiking on local trails'', ''Yoga and mindfulness
    meditation'', ''Quilting'', ''Volunteer teaching basic computer skills'']'
  career_goals: Yeganeh plans to broaden mental‑health access in Coshocton County by launching a hybrid private practice that blends in‑person and telehealth services. Over the next five years she aims
    to achieve board certification in clinical psychology, design a structured evidence‑based depression‑management program tailored to the local adult population, and become a regional mentor for early‑career
    clinicians. She also aspires to lead a community mental‑health task force that improves coordination among schools, primary‑care clinics, and social services, and to publish research on the effectiveness
    of structured therapeutic interventions in rural communities.
