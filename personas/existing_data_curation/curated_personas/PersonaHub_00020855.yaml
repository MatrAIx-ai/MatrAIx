persona_description: A scientist and researcher who specializes in bridging scientific and local knowledge to enhance the impact of science on promoting adaptation to environmental change. They have demonstrated
  success in successfully dealing with challenges for acceptance and implementation of tailor-made solutions through participatory, stakeholder-engagement based approaches to knowledge construction and
  exchange. Their research interests include the design and development of sustainable land management strategies for reducing the risks associated with climate change, land degradation/desertification,
  and biodiversity loss. They have successfully translated science into sustainable land use and management practices, and have contributed to the upscaling of evidence from the field through their work
  with the recently established Science-Policy Interface (SPI) of the UNCCD, responsible for "translating" their success for use in the global policy-making realm.
