  hobbies: '[''hiking'', ''nature photography'', ''photo editing'', ''reading speculative fiction'', ''reading sustainability non-fiction'', ''indie video gaming'', ''home gardening'', ''cooking healthy
    meals'', ''volunteering at community garden'']'
  career_goals: Jonathan plans to complete a bachelor's degree that blends his interests in sustainability and visual storytelling, such as Environmental Studies with a focus on digital media. He aspires
    to work remotely as a freelance content creator, producing photography and video narratives that highlight local environmental initiatives. He values flexible work arrangements that allow him to maintain
    personal projects, occasional volunteer work, and ongoing self‑education. In the longer term, he hopes to lead small collaborative campaigns that raise community awareness about conservation and sustainable
    living.
