personas:
  professional: Jonathan Orlando is a budding freelance content creator who blends his Environmental Studies and digital media background to produce photography and video narratives about local conservation
    projects, using Python scripts to streamline workflow, Lightroom and Premiere for storytelling, and his cooperative, curiosity‑driven mindset to coordinate volunteer crews and keep projects flexible
    despite his relaxed approach to planning.
  sports: Jonathan Orlando enjoys hiking the James River Trail with the local James River Trail Conservancy, follows the Richmond Flying Squirrels in baseball, roots for the Virginia Cavaliers in college
    sports, and plays pickup basketball on weekends at the community recreation center, preferring low‑key, nature‑focused activity over intense gym sessions.
  arts: Jonathan Orlando finds inspiration in the moody landscapes of Ansel Adams, the storytelling of Brandon Stanton’s Humans of New York, the folk melodies of The Avett Brothers, and the indie video
    game score of Celeste, often editing footage into personal documentaries that blend visual art with environmental advocacy.
  travel: Jonathan Orlando favors spontaneous, budget‑friendly road trips that blend hiking and photography, having explored Shenandoah National Park, Asheville’s Blue Ridge scenery, and Washington, D.C.’s
    museums, while dreaming of a sustainable eco‑tour of Iceland’s volcanic landscapes and geothermal farms.
  culinary: Jonathan Orlando’s culinary style is simple yet wholesome, regularly whipping up roasted beet and kale salads with quinoa and feta, cooking chicken piccata with fresh herbs from their garden,
    and occasionally indulging in shrimp and grits at family gatherings, all while experimenting with seasonal produce and minimal waste techniques.
  core: Jonathan Orlando is a nature‑obsessed, puzzle‑loving freelancer who constantly misplaces their phone, procrastinates on paperwork, but never misses a sunrise hike or a chance to capture a perfect
    landscape shot.
background:
  cultural: Jonathan was raised in a middle‑class white family in Henrico County, a suburban area just outside Richmond, Virginia. His upbringing combined the courteous, community‑oriented aspects of Southern
    hospitality with the diverse, progressive influences of nearby Richmond's urban culture. He participated in local traditions such as county fairs, historic preservation events, and regional arts festivals.
    The area's emphasis on education and civic engagement nurtured his involvement in community garden projects and fostered an appreciation for the natural landscapes along the James River. While his heritage
    is broadly American, he identifies with regional values of independence, modesty, and collaborative stewardship.
attributes:
  skills: '[''Python scripting'', ''JavaScript basics'', ''photo editing (Adobe Lightroom)'', ''video editing (Adobe Premiere)'', ''written communication'', ''small-group conflict mediation'', ''informal
