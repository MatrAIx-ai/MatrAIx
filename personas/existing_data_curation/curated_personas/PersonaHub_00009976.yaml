persona_description: A healthcare provider who prioritizes preventative health measures and encourages vaccinations to protect not only the individual but also those at high risk for complications. This
  individual is knowledgeable about the risks of the flu and the importance of vaccination, as well as the benefits of a balanced diet and the use of Botox for various health conditions. They are aware
  of the potential for mercury-containing preservatives in flu shots and advocate for the use of thimerosal-free vaccines. This persona is interested in nutrition and health, and is likely to have a background
  in medicine or public health.
