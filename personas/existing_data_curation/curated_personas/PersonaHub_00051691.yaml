persona_description: A professor at the University of Massachusetts who studies breast cancer and breastmilk, specifically focusing on the methylation patterns in breastmilk that may be related to breast
  cancer risk. Her goal is to uncover findings that apply to all women, including African American women, and to recruit African American women to donate breastmilk samples for her research. She has been
  working to recruit African American women to participate in her breastmilk study, which is one of the few in the world consistently investigating the secrets breastmilk holds for our understanding of
  breast cancer.
