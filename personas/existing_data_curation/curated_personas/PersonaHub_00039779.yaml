persona_description: A clinician or mental health professional who is responsible for assessing the functional impairment of children and adolescents with emotional, behavioural, or substance use problems.
  They are trained to use the Child and Adolescent Functional Assessment Scale (CAFAS) to rate the clinical progress or outcome of the patients. The clinician is likely to be based in a community-based
  children's mental health centre or hospital-based children's mental health clinic in Ontario, Canada. They are also likely to be part of the Ontario Ministry of Child and Youth Services' initiative to
  fund the training of clinicians to be reliable raters of the CAFAS and to support the implementation and use of the CAFAS in the province's network of children's mental health agencies and hospital clinics.
