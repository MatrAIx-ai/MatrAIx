  career_goals: Maritza aims to formalize her education by completing a GED, a personal milestone that reflects her lifelong curiosity. She plans to expand her volunteer leadership by establishing a senior
    advisory committee that advocates for improved services in Sebring. She also hopes to compile a family cookbook that preserves cherished recipes and cultural stories for future generations. Learning
    advanced digital tools to stay connected with her grandchildren is another goal, as is mentoring younger volunteers in event planning and community outreach.
