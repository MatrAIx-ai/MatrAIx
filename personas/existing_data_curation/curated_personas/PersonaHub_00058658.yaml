persona_description: A researcher who specializes in the study of avian influenza H5N1 virus and its potential risks and benefits, particularly in the field of gain-of-function experiments. This person
  is knowledgeable about the current debates surrounding the risks and benefits of such research, has experience in peer review and ethical reviews, and is interested in developing a framework for overseeing
  such work in US funded research. This person is also familiar with the process of lifting the moratorium on NIH-funded researchers until the framework is completed.
