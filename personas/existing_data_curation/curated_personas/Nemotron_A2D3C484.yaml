  career_goals: Approaching retirement, Alicia aims to transition to a part‑time security consultant role for local businesses, leveraging her institutional knowledge to improve safety protocols. She also
    wishes to mentor younger correctional staff through a formal pre‑retirement program and volunteer with a community re‑entry organization, helping former inmates reintegrate into society. On a personal
    level, she plans to focus on health management, attend stress‑relief workshops, and maintain a steady routine that balances her remaining work commitments with family responsibilities.
