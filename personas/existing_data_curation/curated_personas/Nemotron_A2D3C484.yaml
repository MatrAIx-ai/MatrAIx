personas:
  professional: A seasoned correctional officer like Alicia Burgess leverages three decades of inmate supervision, crisis de-escalation, and meticulous incident reporting to mentor new staff, while their
    preference for routine and practical problem-solving makes them the go-to consultant for safety audits in the Red Wing area.
  sports: Alicia Burgess enjoys seasonal fishing trips with the Minnesota Amateur Anglers Association, follows the Minnesota Vikings and Twins closely, and maintains a light fitness routine by strolling
    the Mississippi River trail a few times a week, though they occasionally skip their evening walks when a quilting deadline looms.
  arts: Alicia Burgess finds creative solace in quilting intricate patterns inspired by traditional folk motifs while listening to the soothing folk ballads of Bob Dylan and the mellow piano works of George
    Winston, and they occasionally attend Minnesota Orchestra performances with their church choir friends.
  travel: Alicia Burgess prefers low-key, historically rich travel, having taken a nostalgic road trip to the historic forts along the Mississippi, a pilgrimage to Norway's fjord region to connect with
    their ancestors, and a memorable weekend stay at the historic Bluff Country Inn in Duluth, while dreaming of a guided tour of Colonial Williamsburg.
  culinary: Alicia Burgess relishes home-grown meals, frequently cooking herb-roasted chicken with garden carrots, simmered beet and goat cheese salad, and a hearty apple-cinnamon crumble, and they boast
    a confident hand at baking sourdough loaves that they bring to church potlucks.
  core: Alicia Burgess blends disciplined correctional expertise with a modest, routine-driven lifestyle, punctuated by a love for quilting, fishing, and preserving local history, all while battling a worry-prone
    mind that sometimes forgets to take their prescribed sleep aid.
background:
  cultural: Alicia was raised in a small Midwestern town in Minnesota within a predominantly white, Lutheran‑influenced community. Her family’s heritage includes Scandinavian (Norwegian) roots, which shaped
    a work ethic centered on practicality, self‑reliance, and community service. The cultural emphasis on modesty, routine, and seasonal celebrations—such as church potlucks and county fairs—has informed
    her values and daily habits. Living her entire adult life in Red Wing, she maintains strong ties to local traditions, county history, and the close‑knit network of neighbors typical of Goodhue County.
