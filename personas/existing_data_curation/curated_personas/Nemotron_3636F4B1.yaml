  hobbies: '[''Visiting art galleries and museums'', ''Reading biographies and historical non‑fiction'', ''Gardening (vegetables and native flowers)'', ''Quilting and knitting'', ''Listening to jazz, gospel,
    and blues music'', ''Walking historic downtown Rock Hill'', ''Participating in a small book club'', ''Church choir involvement'', ''Genealogy research'']'
  career_goals: Although retired, Teresa aspires to become a recognized local storyteller, preserving and sharing the African‑American oral histories of Rock Hill through workshops and a community‑published
    memoir. She also hopes to expand her volunteer role at the senior center, develop a small intergenerational art program, and earn a certificate in adult education to formally mentor youth interested
    in heritage arts.
