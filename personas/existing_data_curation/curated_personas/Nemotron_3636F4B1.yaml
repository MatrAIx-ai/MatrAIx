personas:
  professional: Teresa Williams, a retired senior‑center volunteer turned local storyteller, channels their curious eye for history and talent for informal mentorship into community workshops that preserve
    Rock Hill’s oral heritage, while their relaxed approach to scheduling and occasional skepticism make the projects both fluid and occasionally chaotic.
  sports: Teresa Williams enjoys gentle morning walks with the Rock Hill Senior Walking Club, participates in weekly low‑impact senior yoga, and avidly follows the Carolina Panthers and South Carolina Gamecocks,
    often wearing a nostalgic Gamecocks sweater while cheering on the team.
  arts: Teresa Williams finds inspiration in the brushstrokes of Georgia O'Keeffe at the local gallery, the improvisational genius of John Coltrane and Ella Fitzgerald on their turntable, the soulful storytelling
    of B.B. King's blues, and the tactile rhythm of their own quilt designs that echo traditional patterns while incorporating modern motifs, shaping their identity as both a creator and a connoisseur of
    the arts.
  travel: Teresa Williams prefers relaxed cultural getaways, planning meticulous day‑trips to nearby historic Charleston’s riverfront museums and weekend pilgrimages along the Blue Ridge Parkway, while
    dreaming of a future jazz‑filled immersion in New Orleans’ French Quarter, all organized around a modest budget that balances senior travel discounts with occasional splurges on local culinary tours.
  culinary: Teresa Williams wields a seasoned skillet to craft classic Southern soul dishes such as buttery collard greens simmered with smoked ham hocks, crispy fried catfish served with tangy remoulade,
    and sweet peach cobbler spiced with fresh garden thyme, while their love for home‑grown okra and heirloom tomatoes lets them infuse each meal with a farm‑to‑table freshness they proudly share at neighborhood
    potlucks.
  core: Teresa Williams is a curious, quietly competitive storyteller who secretly hoards vintage jazz records, sometimes forgets to water succulents, and worries about every decision while still finding
    joy in knitting vibrant quilts.
background:
  cultural: Teresa’s cultural identity is rooted in the Black Southern tradition of the Carolinas. Raised by a family active in church and community life, she grew up with stories of the civil‑rights era
    in nearby Charlotte and the legacy of the Great Migration. Her upbringing blended African‑American religious practices, Southern cuisine, and a strong emphasis on oral storytelling, which continue to
    shape her values, social connections, and artistic sensibilities.
attributes:
  skills: '[''Culinary arts (Southern and soul food)'', ''Gardening and horticulture'', ''Quilting and textile crafts'', ''Art appreciation and critique'', ''Local history research'', ''Genealogy research'',
