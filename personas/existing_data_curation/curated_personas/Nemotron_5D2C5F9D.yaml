  hobbies: '[''sketching/drawing'', ''LEGO building'', ''reading adventure picture books'', ''ScratchJr animation'', ''exploring parks and nature'', ''collecting shells and rocks'', ''listening to jazz
    and hip‑hop music'', ''dance'', ''make‑believe play'', ''community storytelling events'']'
  career_goals: Lonnie dreams of becoming a creator—whether as an artist who paints fantastical scenes, a writer of comic‑book adventures, or an inventor of new games. He also imagines himself as an astronaut
    exploring space and as a designer of interactive stories that blend art and technology. He wants to keep learning new things, share his ideas with friends and family, and eventually turn his passions
    into a career that lets him bring imagination to life.
