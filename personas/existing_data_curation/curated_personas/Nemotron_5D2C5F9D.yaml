personas:
  professional: Lonnie Dawkins is a budding storyteller and junior digital creator who uses ScratchJr to animate hand‑drawn characters, blending their vivid imagination with a relaxed approach to school
    projects that often results in delightfully improvised stories.
  sports: Lonnie Dawkins loves dribbling a soccer ball at the community park and cheering for the Carolina Panthers on game nights, and they proudly wear a tiny blue and white jersey from the local youth
    soccer club, the Wilmington Little Kickers.
  arts: Lonnie Dawkins is a young sketch artist who fills community‑center art workshops with vibrant characters inspired by gospel hymns and the storytelling nights at the library, dreaming of a future
    where they might illustrate a picture book like those by Davide Cali and share their work alongside local muralist Aurora Gray.
  travel: Lonnie Dawkins enjoys weekend trips to Wrightsville Beach, where they collect shells and rock treasures, and they imagine exploring the historic streets of Savannah, Georgia, while their family
    prefers low‑cost car rides that let them pack snacks like sweet‑potato pie for the road.
  culinary: Lonnie Dawkins loves diving into family meals of collard greens stewed with smoked ham hocks, sweet‑potato pie topped with a dash of cinnamon, and crispy fried chicken, and they often help stir
    the pot and proudly claim the credit for adding an extra pinch of pepper.
  core: Lonnie Dawkins is a whirlwind of imagination who juggles LEGO towers, sketchbooks, and the occasional forgotten homework assignment, thriving on soulful music, spontaneous storytelling, and a sweet
    spot for shell collecting.
background:
  cultural: Lonnie grows up in a vibrant African‑American community in Wilmington, North Carolina. His family values Southern Black traditions—Sunday church services, gospel music, and family gatherings
    centered around soul food like collard greens, sweet‑potato pie, and fried chicken. He celebrates Kwanzaa and Juneteenth, hearing stories about Wilmington's historic black neighborhoods and the civil‑rights
    legacy passed down from his grandparents. Participation in the local community center's art workshops, visits to the Harriet Tubman Museum, and attendance at the Wilmington Black Film Festival expose
    him to Black creativity and history, fostering a strong sense of pride in his heritage while inspiring his love for storytelling and the arts.
