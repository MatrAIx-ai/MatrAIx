persona_description: A licensed and/or school-certified psychologist who specializes in working with children with social and emotional difficulties, particularly those who are experiencing difficulty in
  peer relationships. They are experienced in designing and facilitating weekly social skills groups for 8 week sessions, each with 4 to 6 children in the same age range with most groups being single gender.
  They are skilled in covering a range of topics such as learning to listen, recognizing body language, improving conversational skills, recognizing and expressing feelings appropriately, demonstrating
  self-control, utilizing relaxation techniques, thinking positively, handling teasing, and solving conflicts. They are well-versed in using a variety of strategies and techniques to help children develop
  their social and emotional skills.
