personas:
  professional: An experienced hospitality associate, Ann Fornell leverages their front‑line cash handling, POS expertise, and food‑safety compliance skills to keep the café running smoothly while spontaneously
    offering fresh menu ideas, even as they wrestle with staying organized enough to secure a shift‑leader promotion.
  sports: Ann Fornell hits the Wasatch foothills for weekend hikes, cheers for the Utah Jazz, supports Real Salt Lake, and plays pickup volleyball with the Salt Lake City Community League, while they also
    keep a modest running routine to stay fit.
  arts: Ann Fornell immerses themselves in mystery novels by Tana French, true‑crime podcasts like Serial, and indie folk music from Brandi Carlile, often knitting scarves while listening to the curated
    playlists of the local coffee house, and they occasionally attend Utah Symphony concerts for a touch of classical inspiration.
  travel: Ann Fornell loves short road‑trip getaways to nearby national parks such as Zion and Bryce, has visited Sedona’s red‑rock trails, and dreams of a solo cultural retreat in Kyoto, Japan, balancing
    these adventures with family commitments and a modest travel budget.
  culinary: Ann Fornell experiments with farm‑to‑table recipes using fresh tomatoes, rosemary, and heirloom carrots from their garden, often baking sourdough bread infused with lavender, while they knit
    brunch muffins for church potlucks, and they occasionally over‑season dishes in an enthusiastic (if sometimes chaotic) quest for flavor.
  core: Ann Fornell is a community‑minded hospitality professional who juggles spontaneous creativity, chronic worry, and a love for gardening, knitting, and mystery stories while dreaming of opening a
    cozy bakery.
background:
  cultural: Ann was raised in Spanish Fork, Utah, within a predominantly Latter‑day Saint community. The local culture emphasizes family ties, service, modesty, and a strong sense of community. Growing
    up, she participated in church youth activities, Pioneer Day celebrations, and community service projects, which fostered her cooperative nature and concern for harmony. The blend of Western frontier
    heritage and contemporary American lifestyle informs her values of self‑reliance, hospitality, and respect for tradition, while her curiosity leads her to explore new ideas through education and hobbies.
attributes:
  skills: '[''Customer service'', ''Cash handling and POS operation'', ''Food safety compliance'', ''Team collaboration'', ''Quick problem solving'', ''Multitasking in fast-paced environment'', ''Basic
    inventory management'', ''Staff training'', ''Adaptability'', ''Basic business administration'']'
  hobbies: '[''Hiking'', ''Gardening'', ''Cooking and baking'', ''Knitting'', ''Listening to podcasts'', ''Reading mystery novels'', ''Volunteering at local food bank'', ''Attending church and community
    potlucks'', ''Yoga and meditation'']'
  career_goals: Ann hopes to move into a supervisory role, such as shift leader or assistant manager, where she can mentor colleagues and implement small improvements in workflow. She also dreams of eventually
    opening a family‑run bakery or coffee shop that reflects her love for community and homemade treats, but she seeks a flexible schedule to balance family commitments. Continuing education through a certificate
    in culinary arts or small business management is part of her plan.
