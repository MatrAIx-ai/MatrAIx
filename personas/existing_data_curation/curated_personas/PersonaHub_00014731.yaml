persona_description: A person who is deeply concerned about the global road safety crisis and recognizes the urgent need for action to save lives and livelihoods. They are a member of the International
  Federation and are actively involved in the Global Road Safety Partnership. They are passionate about reducing road traffic deaths and injuries and are committed to working with their government and the
  private sector to implement the Decade of Action for Road Safety. They are dedicated to improving road safety in low- and middle-income countries and are committed to supporting the implementation of
  the UN resolution. They are also interested in the financial and economic impacts of road traffic injuries and are committed to finding solutions to reduce the global financial cost of road traffic injuries.
