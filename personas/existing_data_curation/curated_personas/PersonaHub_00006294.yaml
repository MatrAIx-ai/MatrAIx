persona_description: A political scientist who specializes in the study of American history, particularly the Civil War. He or she is interested in the role of enslaved people in the war and the broader
  context of the time period. The individual is likely to be familiar with the concept of a “general strike” by enslaved workers and the arguments presented by Errol A. Henderson. The persona is also interested
  in the history of the South and the dynamics of the Civil War, as well as the politics of the time period.
