personas:
  professional: Amado Rosario, a seasoned manufacturing supervisor, leverages lean‑manufacturing expertise, data‑driven decision‑making with Excel, SQL, and Python, and a methodical, competitive drive to
    continuously slash waste and boost equipment uptime while mentoring his crew.
  sports: Amado Rosario plays forward for the Capitol Hill Community Soccer League, follows Washington D.C. United with fervor, and keeps fit by tackling weekend hikes in the Blue Ridge Mountains, balancing
    his competitive edge with a routine of early‑morning interval runs inspired by the Washington Capitals’ training drills.
  arts: Amado Rosario sketches digital renderings of Smithsonian exhibits, finds inspiration in the abstract paintings of Yayoi Kusama, and plays dulcimer at Salvadoran cultural festivals alongside traditional
    folk group Los Compadres, while regularly attending live jazz sets by Wynton Marsalis at the Kennedy Center.
  travel: Amado Rosario prefers meticulously planned trips that blend cultural immersion and nature, having explored the historic streets of Cartagena, the vineyards of Napa Valley, and the hiking trails
    of Shenandoah National Park, while dreaming of a future solo trek through the Andean highlands of Peru.
  culinary: Amado Rosario is a proficient home cook who masters the art of pupusas stuffed with queso fresco and loroco, experiments with smoky chipotle in his tamales, and enjoys pairing his dishes with
    craft IPA brews, though he often burns the first batch of homemade salsa when distracted by work emails.
  core: Amado Rosario fuses a lean‑manufacturing mindset with a love for art, soccer, and community, constantly juggling data dashboards, dulcimer rehearsals, and weekend hikes, all while battling a coffee
    habit and occasional over‑planning.
background:
  cultural: Amado grew up in a bilingual household where Spanish and English intertwined, and his family maintains strong ties to El Salvador’s customs. Celebrations such as Día de la Independencia (Sept 15)
    and Semana Santa are observed with traditional foods, music, and church gatherings, reinforcing his Catholic roots and communal values. The vibrant rhythms of cumbia and reggaetón, as well as the aroma
    of corn‑based dishes, play a central role in family gatherings. Living in Sterling, VA, he balances these traditions with the multicultural environment of the Washington metro area, participating in
    Salvadoran diaspora events at the nearby Salvadoran Consulate and local cultural festivals. He often shares his heritage with coworkers, introducing them to pupusas and teaching basic Spanish phrases,
    while also embracing American customs like Thanksgiving and Fourth of July celebrations, creating a blended cultural identity for himself and his children.
attributes:
  skills: '[''Lean Manufacturing'', ''Six Sigma Green Belt'', ''Statistical Process Control'', ''Root Cause Analysis'', ''Equipment Troubleshooting'', ''Preventive Maintenance Scheduling'', ''Production
    Planning and Scheduling'', ''SOP Development and Documentation'', ''Data Analysis (Excel, SQL, Python)'', ''Safety Compliance and Training'', ''Team Leadership and Coaching'', ''Conflict Resolution'',
    ''Performance Metrics Tracking'', ''Continuous Improvement (Kaizen)'', ''Risk Assessment and Supplier Evaluation'']'
  hobbies: '[''Visiting museums and art galleries'', ''Digital sketching'', ''Playing soccer in a community league'', ''Performing with a traditional music ensemble'', ''Cooking Salvadoran dishes (pupusas,
    tamales)'', ''Hosting backyard barbecues'', ''Hiking in the Blue Ridge Mountains'', ''Landscape photography'', ''Attending tech meetups in Washington, D.C.'', ''Volunteering to teach computer basics
    to immigrants'']'
  career_goals: Amado aims to transition from first‑line supervision to a senior operations management role within the next five years. He plans to earn a Six Sigma Black Belt and complete a part‑time MBA
    focused on supply‑chain strategy, positioning himself for a plant manager or regional operations director position. He is eager to lead large‑scale digital transformation projects that integrate IoT
    sensors and real‑time analytics into the production line, enhancing predictive maintenance and overall equipment effectiveness. Additionally, Amado wants to champion sustainability initiatives, reducing
    energy consumption and waste in the facility. Long‑term, he envisions establishing a consultancy that helps midsize manufacturers implement lean and green practices while mentoring the next generation
    of Latino engineers and supervisors.
