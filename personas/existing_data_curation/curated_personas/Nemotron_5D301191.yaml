personas:
  professional: Leslie Riley is a 22‑year‑old correctional officer in Minnesota who blends solid training in inmate supervision, crisis de‑escalation, and meticulous report writing with a budding expertise
    in art‑based rehabilitation program design, aspiring to become a shift sergeant who leads restorative‑justice initiatives.
  sports: Leslie Riley spends weekends hiking the Mille Lacs Lake trail system with the local Mille Lacs Outdoor Women’s Hike Club, roots for the Minnesota Twins in baseball, the Minnesota Vikings in football,
    and often catches a Minnesota United FC soccer match at Allianz Field for a mid‑season treat.
  arts: Leslie Riley frequents the Weisman Art Museum, reproduces the tranquil tones of Andrew Wyeth and Ansel Adams in sketches of Minnesota’s countryside, curates playlists featuring Sufjan Stevens and
    the indie folk trio The Staves, and regularly attends stage productions at the Guthrie Theater to fuel their creative practice.
  travel: Leslie Riley plans trips with a spreadsheet‑driven budget, prefers immersive nature getaways like a two‑day hike in Glacier National Park and a weekend road trip to Duluth’s lakeshore, dreams
    of photographing Iceland’s waterfalls and exploring Tokyo’s art districts, and balances travel ambitions with student‑loan repayments.
  culinary: Leslie Riley enjoys cooking modestly, regularly prepares walleye fillets with rosemary‑infused butter, hearty Minnesota hotdish with tater tots, and seasonal berry cobbler, while experimenting
    with fresh beets and goat cheese salads, yet occasionally overcooks fish when distracted by an unfinished sketch.
  core: Leslie Riley merges a disciplined correctional career with a restless artistic soul, balancing methodical budgeting and meticulous documentation with spontaneous hikes, sketchbooks, and a deep drive
    to heal through creativity.
background:
  cultural: Leslie grew up in Princeton, a small town in Mille Lacs County, where her family’s roots trace back to Scandinavian and German immigrants who settled in Minnesota generations ago. Raised in
    a close‑knit, predominantly Protestant community, she internalized values of reliability, modesty, and collective responsibility. Local traditions such as county fairs, church gatherings, and outdoor
    recreation shaped her appreciation for community and the natural environment. While her upbringing was culturally homogeneous, her curiosity and openness have led her to seek diverse perspectives through
    art, education, and her work in corrections.
attributes:
  skills: '[''Inmate Supervision'', ''Conflict De‑escalation'', ''Crisis Intervention'', ''Report Writing'', ''First Aid/CPR'', ''Defensive Tactics'', ''Security Technology Operation (CCTV, radios)'', ''Recordkeeping
    and Scheduling'', ''Community Outreach Coordination'', ''Art‑Based Rehabilitation Program Design'']'
  hobbies: '[''Sketching and Photography'', ''Hiking and Outdoor Exploration'', ''Visiting Art Galleries'', ''Reading (Psychology, Social Justice, Modern Art)'', ''Listening to Reform‑Focused Podcasts'',
    ''Volunteering (Youth Art Workshops, Animal Shelter)'']'
  career_goals: Leslie aims to complete her bachelor's degree in Criminal Justice or Social Work within the next three years while gaining supervisory experience as a shift sergeant. She aspires to lead
    a unit that integrates art‑therapy and restorative‑justice initiatives for inmates, ultimately seeking a role as a correctional counselor or program director. Long‑term, she hopes to contribute to policy
    reforms that enhance inmate rehabilitation and community reintegration, leveraging her compassionate outlook and organizational strengths.
