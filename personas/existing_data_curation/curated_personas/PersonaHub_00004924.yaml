persona_description: A popular and controversial paleontologist who advocated for the drifting continents theory, but later became discredited due to his erroneous theories. He was born in Canada and became
  interested in biogeography, studying how and why various bits of biology end up in various geographic locales. Despite being influential in broadcasting his speculations, he was ultimately disqualified
  from the National Academy of Sciences due to his Canadian nationality.
