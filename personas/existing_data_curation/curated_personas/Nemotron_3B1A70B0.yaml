  career_goals: Gabriel aims to transition from his current analyst role to a senior security engineer or security architect position within the next three years, eventually leading a multidisciplinary
    security team. He plans to earn advanced certifications such as CISSP and OSCP, and to contribute to industry conferences on the intersection of security and creative design. A long‑term ambition is
    to become a Chief Information Security Officer who can embed a culture of empathy, diversity, and artistic thinking into an organization’s security strategy. He also hopes to mentor young professionals
    from underrepresented communities, especially Puerto Rican and Latinx youth interested in cybersecurity.
