persona_description: A professional auditor who specializes in conducting energy audits on commercial freezers and coolrooms to identify and mitigate harmful microorganisms. This person has a thorough understanding
  of the insulation and energy consumption profiles of these systems, and is skilled in identifying the root causes of energy waste. They are also adept at using time-based temperature monitors to create
  a three-dimensional energy profile that accounts for various operational factors. This person is highly trained in food safety practices and is committed to preventing the growth of harmful microorganisms
  in commercial freezers and coolrooms.
