  hobbies: '[''Pickup basketball'',''Hiking Colorado Plateau trails'',''Mountain biking on Mesa County paths'',''Woodworking projects'',''Reading health and productivity non‑fiction'',''Home‑brewing craft
    beer'',''Strategic board gaming (e.g., Settlers of Catan)'']'
  career_goals: Robert aims to leverage his practical experience to earn Certified Nursing Assistant (CNA) credentials within the next year, followed by pursuing a Licensed Practical Nurse (LPN) license.
    He plans to transition into a supervisory role, overseeing a team of personal care aides and implementing evidence‑based care protocols. Long‑term, he aspires to open a boutique home‑care agency that
    specializes in dementia and chronic disease management, integrating technology‑driven care coordination while maintaining the structured, high‑quality service standards he values.
