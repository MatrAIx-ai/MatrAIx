personas:
  professional: An organized home‑care aide with a knack for streamlining patient workflows, Robert Burt leverages they certification in CPR, meticulous EHR documentation, and competitive drive to train
    peers and prepare for CNA and LPN credentials.
  sports: A dedicated regional athlete, Robert Burt plays pickup basketball at the Grand Junction Community Center, cycles the Mesa County trails in summer, and supports the Denver Broncos and Colorado
    Avalanche while maintaining a personal training schedule that balances competitive intensity with weekend hikes.
  arts: A hands‑on creator, Robert Burt spends evenings woodworking while listening to classic rock icons like The Eagles and folk singer John Denver, occasionally attending local art shows featuring Colorado
    painters and enjoying independent film screenings by directors such as Christopher Nolan.
  travel: A methodical explorer, Robert Burt plans trips with detailed itineraries, favoring weekend road trips to Rocky Mountain National Park, a backpacking adventure in Patagonia, and a future goal of
    attending the Sundance Film Festival in Utah, balancing limited vacation days with a modest travel budget.
  culinary: A meticulous brewer and home chef, Robert Burt crafts craft beers using Cascade hops and malted barley, enjoys cooking hearty Colorado trout with lemon‑dill sauce, and frequently experiments
    with spicy Mexican dishes like carne asada tacos, favoring fresh ingredients and precise measurements.
  core: A structured yet adventurous caretaker, Robert Burt blends a competitive work ethic with a love for the outdoors, woodcraft, and methodical brewing while juggling a budget‑first mindset and occasional
    neglect of self‑care routines.
background:
  cultural: Robert was raised in a middle‑class, white American family with roots in the Midwest, later settling in Grand Junction, Colorado. His upbringing blended values of self‑reliance, hard work, and
    community service typical of the Western Colorado lifestyle—appreciation for the outdoors, respect for local ranching and agricultural heritage, and participation in regional events like the Mesa County
    Fair. While he identifies with broader American cultural norms, his day‑to‑day life is shaped by the practical, no‑frills ethos of the Colorado plateau, emphasizing personal responsibility and involvement
    in local volunteer health initiatives.
attributes:
  skills: '[''Personal hygiene assistance'',''Mobility support'',''Medication reminders and administration'',''Vital signs monitoring and documentation'',''Basic wound care'',''CPR and first aid certified'',''Electronic
