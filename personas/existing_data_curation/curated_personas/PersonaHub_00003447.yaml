persona_description: A researcher or conservationist interested in biodiversity conservation, particularly in the context of land restitution and its economic valuation by the Khomani San "bushmen" community
  in South Africa. This person is likely to be knowledgeable about the contingent valuation method, ecological economics, and the implications of land tenure arrangements on biodiversity conservation. They
  would be interested in understanding how the economic values of biodiversity conservation vary among different land tenure arrangements and the benefits and costs of each arrangement for the Khomani San
  community.
