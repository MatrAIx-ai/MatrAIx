  hobbies: '[''Karaoke singing'', ''Volunteer cultural event organization'', ''Debate club participation'', ''Online strategy gaming'', ''Yoga and mindfulness meditation'', ''Cooking Vietnamese cuisine'',
    ''Food blogging'']'
  career_goals: Bachtuyet aims to complete a Bachelor’s degree in Business Administration with a concentration in Marketing or Project Management within the next three years. She plans to secure a marketing
    internship at a Silicon Valley tech firm to gain hands‑on experience in data‑driven campaign management. Leveraging her sociable personality, she wants to develop a personal brand on LinkedIn and Instagram
    that showcases her expertise in event marketing and community engagement. Her long‑term ambition is to become a product marketing manager or brand strategist for a technology company, where she can
    combine her analytical rigor, structured planning skills, and competitive drive to launch successful, user‑focused products. She also intends to pursue certifications in Google Analytics and Project
    Management Professional (PMP) to reinforce her credentials.
