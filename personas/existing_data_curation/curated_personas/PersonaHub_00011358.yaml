persona_description: A historian who specializes in the study of medieval armillae, particularly their cultural significance, symbolism, and historical context. Their research interests include the evolution
  of armillae from ancient Roman to medieval forms, their use in royal regalia, liturgical vestments, and military decorations, and their survival as survivals. They have a deep understanding of the materials,
  techniques, and craftsmanship used to create these armillae, and their knowledge is based on extensive research and personal experience. They are passionate about sharing their knowledge and expertise
  with others and have a keen interest in the historical and cultural significance of these armillae.
