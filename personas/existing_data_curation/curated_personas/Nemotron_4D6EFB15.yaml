  career_goals: Steven aims to move from hands‑on driving to a supervisory role within the next three years, targeting a position as a fleet manager or logistics operations supervisor. He plans to obtain
    a commercial transportation management certification and to leverage his sales experience to develop a specialty in freight brokerage. Ultimately, he envisions launching his own small trucking company
    focusing on regional deliveries, with an emphasis on technology‑driven route efficiency and high‑quality customer service.
