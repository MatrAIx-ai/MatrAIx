  hobbies: '[''Fishing'', ''Boating'', ''Softball league'', ''Classic car restoration'', ''Habitat for Humanity volunteering'', ''Barbecue grilling'', ''Gardening'', ''Attending Florida Panthers games'',
    ''Attending Miami Dolphins games'']'
  career_goals: Myles aims to transition from crew member to crew foreman within the next two years, leveraging his on‑site experience to supervise larger projects. He plans to obtain OSHA 30‑hour certification
    and a state‑licensed contractor’s license, positioning himself to start a small, family‑run remodeling business focused on residential interiors and eco‑friendly building materials. He also hopes to
    mentor a new generation of tradespeople through apprenticeships and to expand his skill set into specialty finishes such as acoustic ceiling systems and moisture‑resistant drywall for Florida’s climate.
