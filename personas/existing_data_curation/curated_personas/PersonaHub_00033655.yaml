persona_description: A manufacturing executive who is responsible for overseeing the supply chain of raw materials for a large company. This individual is aware of the impact of labor strikes, currency
  fluctuations, and climate change on raw material pricing. They are skilled in negotiating with labor unions to ensure fair compensation and benefits, and they have experience in sourcing and managing
  raw materials to minimize costs while maintaining efficiency and productivity. They are also aware of the importance of strategic location for efficient transportation and are able to make informed decisions
  based on market trends and supply chain analysis.
