  career_goals: Teressa aims to position her company at the forefront of sustainable technology, expanding its global footprint while achieving carbon-neutral operations within five years. She aspires to
    launch a venture fund dedicated to supporting Black and under-represented founders in the STEM sector, and to serve on national advisory boards shaping STEM education policy. Her long-term ambition
    includes authoring a book that blends leadership lessons with personal narratives of resilience, and establishing a nonprofit mentorship program that connects senior executives with emerging Black women
    engineers.
