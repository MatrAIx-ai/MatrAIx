persona_description: A scientist or researcher who conducts experiments on muscle fiber preparations to measure their properties such as weight, respiration rate, and protein content. They are interested
  in understanding the functional integrity of the samples and the experimental variability that arises from the different assay types applied. They are familiar with the use of gravimetric assays for wet
  weight determination and respirometric assays for measuring respiration rates. They are interested in improving the signal-to-noise ratio of the measurements by increasing the number of subsamples used
  in the experiment. They are also interested in the theoretical aspects of the experiments, including the resolution and signal-to-noise ratio of the assays.
