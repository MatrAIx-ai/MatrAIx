    knowledge‑base creation'']'
  hobbies: '[''Watercolor painting'', ''Sketching New England landscapes'', ''Visiting art galleries and local museums'', ''Raspberry Pi tinkering'', ''Smart‑home automation projects'', ''Hiking in the
    White Mountains'', ''Gardening'', ''Reading classic literature and sci‑fi'', ''Participating in small tech meet‑ups'', ''Attending intimate art workshops'']'
  career_goals: Mikayla aims to stay technically agile by keeping up with emerging cloud and security trends, pursuing certifications such as AWS Solutions Architect and CompTIA Security+, and gradually
    shifting toward mentorship and consulting. She hopes to volunteer her IT expertise with local non‑profits and youth programs, help small businesses in Hudson modernize their infrastructure, and explore
    creative tech projects that blend her love for art and technology, such as interactive installations or digital storytelling. While valuing flexibility, she intends to reduce day‑to‑day operational
    duties over time and focus on strategic advisory work and community impact.
