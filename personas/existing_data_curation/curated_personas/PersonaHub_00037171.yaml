persona_description: A historian or someone interested in the history of the British Empire, particularly the African diaspora and its impact on Victorian culture. They are interested in the everyday lives
  of African Brits, the portrayal of blackness by the British, and how the British defined themselves by their whiteness. They are also interested in the interactions between Africans, African-Americans,
  British, and African-Brits during this time period. They appreciate essays that focus on aspects of the black experience that they had never considered before.
