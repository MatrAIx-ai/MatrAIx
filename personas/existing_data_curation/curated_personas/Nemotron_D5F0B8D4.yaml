personas:
  professional: Sarah Baxley, a 26‑year‑old clinical psychologist with a graduate business background, merges evidence‑based CBT and solution‑focused brief therapy with data‑driven organizational development,
    delivering structured yet adaptable employee wellness programs while leveraging their calm resilience and occasional spontaneous creativity to keep clients engaged.
  sports: Sarah Baxley, an avid runner who trains with the Birmingham Trail Runners club and mixes in weekly yoga, adds seasonal pick‑up basketball and keeps an eye on the Birmingham Barons, Alabama Crimson
    Tide, and Birmingham Legion FC, using their structured mindset to schedule workouts while allowing spontaneous trail explorations on weekends.
  arts: Sarah Baxley, who unwinds by photographing sunrise vistas and attending intimate blues and jazz shows featuring artists like B.B. King, Gregory Porter and Norah Jones, also devotes evenings to reading
    contemporary fiction by authors such as Rachel Kushner while they occasionally cite the cinematic works of director Greta Gerwig as inspiration for their own creative storytelling.
  travel: Sarah Baxley, who prefers a balanced travel approach that mixes meticulously planned weekend road trips to nearby gems like the Great Smoky Mountains and charming Southern cities such as Savannah
    with spontaneous longer‑haul adventures—currently dreaming of a summer trek through Iceland’s waterfalls and a spring hike in Patagonia—while they budget travel around a modest freelance income and
    occasional corporate wellness retreats.
  culinary: Sarah Baxley, a confident home chef who delights in mastering Southern comfort foods—perfecting low‑country shrimp and grits with stone‑ground corn, andouille sausage, and a squeeze of fresh
    lemon, whisking up collard greens seasoned with smoked turkey, and occasionally experimenting with spicy crab cakes—while they source ingredients at local farmers’ markets and pair meals with craft
    beers.
  core: Sarah Baxley blends a rigorously data‑driven psychologist’s mindset with a spontaneous love for trail hikes, maintaining an impeccably calm façade while habitually neglecting to clear their email
    inbox, a quirk that keeps them both grounded and slightly chaotic.
background:
  cultural: Sarah was raised in a middle‑class white family in the Birmingham suburbs, with a Southern Baptist upbringing that emphasized community, hospitality, and self‑reliance. Her formative years were
    steeped in regional traditions—church youth groups, local barbecues, and seasonal festivals like the Birmingham Pow Wow. Attending a state university for her business degree, she blended Southern pragmatism
    with a modern, upward‑mobile outlook. This cultural mix informs her calm, resilient demeanor and her balanced approach to structure and flexibility, both in her professional practice and personal life.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Solution-Focused Brief Therapy'', ''Psychometric Assessment'', ''Crisis Intervention'', ''Employee Assistance Program (EAP) Development'', ''Organizational
    Development'', ''Business Strategy Consulting'', ''Data Analysis (SPSS, R)'', ''Project Management'', ''Public Speaking and Training'']'
  hobbies: '[''Hiking and Trail Running'', ''Yoga and Mindfulness Practice'', ''Cooking Southern Recipes'', ''Reading (Psychology & Business)'', ''Photography'', ''Live Music (Blues & Jazz) Attendance'',
    ''Volunteer Crisis Helpline Support'']'
  career_goals: Sarah aims to achieve full licensure as a clinical psychologist and obtain board certification in health psychology within the next two years. She plans to become the director of a corporate
    wellness program in a major Birmingham‑based company, using her business acumen to integrate mental‑health services into organizational strategy. Long‑term, she aspires to launch her own consultancy
    that blends psychology and business performance, publish research on brief, outcome‑focused therapies for workplace stress, and mentor emerging psychologists in the Southern region.
