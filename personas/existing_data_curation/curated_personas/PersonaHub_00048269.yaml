persona_description: A musician and musicologist who specializes in Ethiopian chant vocal liturgical music, particularly in the codification and interpretation of the ancient Ethiopian language, Ge'ez,
  in musical notation. This individual has a deep understanding of the musical and semantic meanings of each character in the melekket, the 16th-century musical notation for Ethiopian chant, and is skilled
  in translating and interpreting Ethiopian chant music.
