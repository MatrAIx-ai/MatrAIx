  career_goals: Kimberly aspires to become a senior operations director within the next five years, leading large, data‑centric teams and driving efficiency initiatives across the organization. She plans
    to earn an MBA to broaden her strategic outlook and to build a robust network, while also developing expertise in emerging technologies like AI‑enabled workflow automation. A key personal ambition is
    to create a work environment that balances high performance with mental‑well‑being, allowing her to manage stress and maintain her meticulous work standards.
