persona_description: A scientist who specializes in planetary studies, particularly the study of the composition and structure of planets like Mercury, Venus, and Mars. This persona is interested in the
  detailed observations and analysis of the surface features and materials of these planets, and would be interested in the MESSENGER spacecraft's mission to study Mercury. They would be knowledgeable about
  the techniques and instruments used by the spacecraft, as well as the significance of the first high-resolution spectra of Mercury's surface acquired by the MESSENGER spacecraft.
