    communication"]'
  hobbies: '["Bowling league", "Recreational basketball", "Hiking in the San Gabriel Mountains", "Community walking club", "Volunteer at local senior center", "Grilling and family barbecues", "Attending
    Los Angeles Dodgers games", "Participating in regional cultural festivals"]'
  career_goals: Dylan aims to advance from direct care to a supervisory role within the home‑health sector. He plans to complete his associate degree in health services and obtain Certified Nursing Assistant
    (CNA) and Home Health Aide (HHA) credentials within the next two years. His competitive drive pushes him toward becoming a lead aide, overseeing a small team, and eventually managing a community‑based
    home‑care agency. He also envisions mentoring new aides, implementing structured training programs, and contributing to quality‑improvement initiatives that enhance client outcomes while maintaining
    the predictable, organized work environment he values.
