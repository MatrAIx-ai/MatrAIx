personas:
  professional: Dylan Roques leverages their 20+ years of hands‑on experience as a personal care aide to enforce rigorous documentation, precise scheduling, and structured care plans, while channeling a
    competitive edge into mentoring junior aides and pushing for quality‑improvement initiatives within a home‑health agency.
  sports: Dylan Roques dominates the Thursday night bowling league at the East Los Angeles Lanes, leads a Saturday morning pickup basketball group at the community center, hikes the San Gabriel Mountains
    with the local Trailblazers Club, and never misses a Dodgers home game or a Lakers victory, wearing the team colors as a badge of loyalty.
  arts: Dylan Roques fuels their sociable side by attending the annual LA County Fair, catching live performances by a Bruce Springsteen tribute band at the Hollywood Bowl, and frequenting the Museum of
    Contemporary Art's rotating exhibitions, while also collecting vintage concert posters that line their garage wall.
  travel: Dylan Roques plans weekend road trips with a spreadsheet itinerary, favoring drives to Yosemite for sunrise hikes and coastal cruises along Highway 1, and they dream of a future cultural immersion
    trip to Kyoto’s cherry‑blossom festivals once retirement frees up more time.
  culinary: Dylan Roques excels at summer grilling, perfecting charcoal‑seared ribeye steaks with garlic‑herb butter, cedar‑plank salmon brushed with soy‑ginger glaze, and spicy chipotle‑lime corn, yet
    occasionally overcooks burgers when a bowling league victory leaves them rushing to the backyard.
  core: Dylan Roques blends a competitive, structure‑driven work ethic with an outgoing love of community, making them the go‑to organizer for both care teams and weekend bowling nights.
background:
  cultural: Dylan is a white American who grew up in the Midwest before moving to Southern California in his early adulthood. Living in Duarte, a multicultural suburb of Los Angeles County, he has absorbed
    a blend of mainstream American traditions—celebrating Thanksgiving, Fourth of July, and Christmas—with an appreciation for the diverse cultural fabric of his community, including occasional participation
    in Hispanic festivals and local farmer's markets. His upbringing emphasized a strong work ethic, family loyalty, and community involvement, values he continues to uphold through his marriage, family
    life, and dedication to caring for others.
attributes:
  skills: '["Personal hygiene assistance", "Mobility and transfer support", "Medication reminder and tracking", "Vital signs monitoring", "Care plan documentation", "Scheduling and time management", "Team
