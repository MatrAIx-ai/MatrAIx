  hobbies: '["Historical non‑fiction reading", "Business strategy literature", "Landscape gardening", "Woodworking", "Chess puzzles", "Sudoku", "Birdwatching", "Adult literacy volunteering"]'
  career_goals: While she is approaching the latter stage of her career, Ida aims to transition into a regional operations director role within the next three years, overseeing multiple distribution centers
    across Oklahoma and neighboring states. She also plans to leverage her experience to launch a boutique consulting practice focused on helping small‑to‑mid‑size firms streamline their supply‑chain processes.
    Additionally, she intends to complete a bachelor’s degree in business administration to solidify her academic credentials and to mentor emerging female leaders in her industry.
