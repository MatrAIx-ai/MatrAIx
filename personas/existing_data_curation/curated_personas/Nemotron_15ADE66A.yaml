personas:
  professional: Ida Duque, a veteran operations executive with three decades of logistics leadership in Tulsa, leverages meticulous process optimization, data‑driven risk assessment, and a skeptical yet
    disciplined mindset to draft exhaustive SOPs, negotiate tough vendor contracts, mentor emerging female leaders, and, because they value measurable outcomes, chart a path toward a regional director role
    and a boutique consulting venture.
  sports: Ida Duque, who prefers low‑impact yet disciplined exercise, completes morning walks along the Arkansas River, participates in a weekly senior tennis league at the Tulsa Community Center, follows
    the Oklahoma City Thunder and the Tulsa Oilers with a critical eye for strategy, and, as they log mileage and heart‑rate data, fine‑tune performance during occasional cross‑country ski trips to Colorado.
  arts: Ida Duque, who finds intellectual solace in the cadence of history, reads Walter Isaacson, yet in leisure draws inspiration from the serene piano works of Ludovico Einaudi, the storytelling folk
    songs of Woody Guthrie, and, because they regularly attend the Tulsa Performing Arts Center's productions of classic plays such as Arthur Miller’s *Death of a Salesman*, they blend analytical rigor
    with artistic appreciation.
  travel: Ida Duque, who prefers meticulously planned retreats over spontaneous wanderings, spends a long weekend each spring exploring the botanical gardens of Kyoto to study traditional Japanese horticulture,
    has a cherished annual road trip to the Santa Fe Plaza for its historic architecture, and, because they budget travel costs within a modest discretionary fund, maintains a wish list that includes a
    longitudinal study of colonial‑era fortifications in Cartagena, Colombia.
  culinary: Ida Duque, an adept home cook who transforms garden harvests into hearty meals, frequently prepares sorghum‑glazed chicken, pan‑fried catfish seasoned with locally sourced pecan crust, and a
    seasonal vegetable medley featuring okra, fiddlehead ferns, and heirloom tomatoes, while, because they experiment with smoked paprika and a dash of homemade peach chutney, each dish carries a subtle
    garden‑infused signature.
  core: Ida Duque blends disciplined logistics expertise with a solitary passion for puzzles, gardening, and woodworking, channeling meticulous curiosity into efficient operations, strategic consulting
    ambitions, and quietly ambitious personal projects, while they rarely show anxiety and often double‑check every detail.
background:
  cultural: Ida was born and raised in the modest suburbs of Tulsa to a family with deep Midwest roots; her grandparents migrated from Kansas in the 1940s and worked in agriculture before the family settled
    in Oklahoma’s oil‑service economy. She grew up in a Protestant (Methodist) household that emphasized self‑reliance, community service, and respect for tradition. The cultural fabric of Tulsa—its mix
    of Midwestern pragmatism, the legacy of the city's historic districts, and the contemporary emphasis on economic diversification—has shaped her practical outlook while also nurturing her curiosity about
    the region’s history. Though she identifies as white, Ida remains conscious of the city’s complex social history and participates in local heritage preservation initiatives.
attributes:
