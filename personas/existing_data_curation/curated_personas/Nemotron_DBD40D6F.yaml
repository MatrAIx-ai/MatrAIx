personas:
  professional: Neil Floyd, a 34‑year‑old freelance photographer and web designer, channels their curiosity and relaxed approach into building urban and nature photo portfolios for Jacksonville businesses,
    leveraging Adobe Lightroom, Photoshop, and basic HTML/CSS skills while navigating occasional disorganization and a strong desire for creative flexibility.
  sports: Neil Floyd follows the Jacksonville Jumbo Shrimp baseball team, participates in a local trail‑running club that explores nearby state parks, and prefers low‑key hikes over team sports, aligning
    with their love of solitude, photography, and a flexible fitness routine.
  arts: Neil Floyd immerses themselves in the local art scene, sketching street‑art inspired by Banksy and Shepard Fairey, curating eclectic playlists featuring Bon Iver, Aphex Twin, and Tinariwen, and
    writing reflective blog posts that blend philosophy and creative process, all fueled by their curiosity and introverted sensibility.
  travel: Neil Floyd favors spontaneous solo road trips to photogenic spots like Asheville’s Blue Ridge trails, Savannah’s historic squares, and Oaxaca’s bustling markets, planning on the fly with a modest
    budget and a backpack of camera gear while dreaming of a future Icelandic summer to capture auroras and midnight sun.
  culinary: Neil Floyd loves crafting Southern‑Asian fusion dishes such as smoked pork collard greens with gochujang glaze and shrimp‑and‑grits curry, experimenting with ingredients like lemongrass, harissa,
    and pecans, though they often leave a mess in the kitchen, reflecting their creative yet relaxed culinary style.
  core: Neil Floyd is a curious, solitary creative who blends artistic ambition with a relaxed, occasionally disorganized lifestyle, constantly juggling freelance projects, hobby pursuits, and a subtle
    undercurrent of anxiety.
background:
  cultural: Neil grew up in a suburban neighborhood of Jacksonville within a middle‑class white Southern family that valued community, modesty, and a strong work ethic. While his upbringing included typical
    Southern touchstones—such as a love for local foods like shrimp and grits and occasional church involvement—his parents encouraged artistic exploration, exposing him to music and visual arts from an
    early age. The city’s evolving arts district and multicultural events have shaped his aesthetic sensibility, giving him a blend of traditional Southern hospitality and a modern, DIY creative ethos.
    He identifies with both the regional cultural heritage of the American South and a broader, eclectic artistic community.
