  hobbies: '[''Art gallery visits'', ''Museum tours'', ''Street‑art photography'', ''Creative writing'', ''Reading nonfiction (philosophy, science)'', ''Listening to eclectic music'', ''Solo hiking and
    nature photography'', ''Birdwatching'', ''Cooking (fusion recipes)'', ''Poetry readings and open‑mic events'', ''Board games (strategy and storytelling)'', ''DIY woodworking projects'']'
  career_goals: Neil aims to transform his artistic passions into a sustainable freelance career. In the short term, he wants to build a portfolio of urban and nature photography focused on Jacksonville,
    sell prints and stock images, and take on occasional freelance web design and content‑creation projects for local small businesses. Over the next several years, he plans to launch an online boutique
    featuring his photography, design work, and written pieces, while refining his productivity habits to manage his flexibility‑focused lifestyle. Ultimately, he dreams of establishing a small creative
    studio that blends photography, writing, and music production, allowing him to collaborate on projects he finds meaningful while maintaining autonomy and a relaxed work schedule.
