  career_goals: Omar aims to earn his GED within the next year and enroll in a vocational training program for HVAC or automotive technology. He plans to secure an apprenticeship that offers clear progression
    toward a journeyman certification, giving him a stable, well‑paid trade career. In the longer term, he hopes to launch a small, family‑run landscaping and home‑repair business that leverages his practical
    skills and bilingual ability to serve both the local community and other Spanish‑speaking residents. Improving his English proficiency, sending regular remittances to relatives in Guatemala, and eventually
    sponsoring a family member to join him in the United States are also key personal milestones.
