personas:
  professional: Mayda Tanon is a field‑ready telecommunications specialist who blends meticulous fiber‑optic splicing expertise with a personable, mentor‑focused style, using their love for structure to
    produce flawless line documentation while their sociable energy turns safety briefings into lively, engaging workshops.
  sports: Mayda Tanon combines weekend hikes with the Suffolk County Trailblazers and regular games for the Long Island Ladies Softball Association, while cheering on the New York Mets and the New York
    Knicks, treating these social fitness activities as both a stress release and a chance to stay connected with friends.
  arts: Mayda Tanon fuels their social spirit with salsa nights to the rhythms of Marc Anthony and Celia Cruz, belts out classic pop at karaoke alongside Beyoncé and Bad Bunny, and finds inspiration in
    Lin‑Manuel Miranda’s storytelling, weaving these artistic experiences into their everyday confidence.
  travel: Mayda Tanon alternates weekend getaways to Fire Island and the historic streets of Old San Juan with long‑haul trips they’ve dreamed of—like a dance‑centric festival in Barcelona and a hiking
    expedition through the rugged cliffs of Big Sur—favoring spontaneous bookings over rigid itineraries to keep the sense of adventure alive.
  culinary: Mayda Tanon masters the art of Caribbean comfort food, expertly frying green plantains for mofongo, simmering arroz con gandules with sofrito, garlic, and cilantro, yet they often improvise
    with fresh herbs and local seafood, turning every dinner into a lively, shared feast.
  core: Mayda Tanon balances a detail‑oriented engineering mindset with a spontaneous, dance‑floor charisma, navigating life’s anxieties through yoga and karaoke while constantly chasing the next fiber‑optic
    challenge and a perfect salsa step.
background:
  cultural: Mayda is a first‑generation American of Puerto Rican descent, fluent in both Spanish and English. Her upbringing emphasized family gatherings, música bomba y plena, and celebrations such as
    Noche de San Juan and Puerto Rico's Día de la Independencia. She remains actively involved with a local Puerto Rican cultural association in Suffolk County, where she participates in festivals, street
    fairs, and language‑preservation workshops. This bicultural identity informs her warm, extroverted demeanor and fuels her commitment to give back to the community through mentorship and cultural events.
attributes:
  skills: '[''Fiber optic splicing'', ''Copper cable termination'', ''OTDR testing and analysis'', ''Network troubleshooting'', ''Reading schematics and technical drawings'', ''OSHA safety compliance'',
    ''Field documentation and reporting'', ''Team training and mentorship'', ''Customer communication'', ''Project coordination'']'
  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking on Long Island beaches'', ''Softball'', ''Karaoke'', ''Yoga'', ''Tech podcasts'', ''STEM community volunteering'']'
  career_goals: Mayda aims to advance to a crew‑lead or field‑supervisor role within the next three years, securing BICSI and FOA certifications to deepen her technical authority. She is interested in transitioning
    toward network design and project management, eventually overseeing larger fiber‑deployment projects for regional carriers. Long‑term, she envisions establishing a consultancy that offers training and
    outreach for under‑represented communities, especially Puerto Rican youth interested in STEM. Balancing her desire for structure with her sociable nature, she also seeks a work environment that encourages
    mentorship and collaborative problem‑solving.
