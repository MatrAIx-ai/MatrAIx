persona_description: An in-house water expert at Salt River Project (SRP), who specializes in the operation and maintenance of Roosevelt Dam and its spillway gates. The individual has experience conducting
  spillway tests on the dam since its modification in 1996 and is knowledgeable about the historical context and the significance of the test conducted in 2019. The expert has a deep understanding of the
  water flow and storage capacity of the dam and its downstream impacts, making them an ideal resource for answering questions about the spillway gates and their use in flood control.
