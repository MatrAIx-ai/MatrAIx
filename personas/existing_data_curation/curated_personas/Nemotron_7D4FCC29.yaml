  career_goals: Laura aims to complete high school with solid grades and then pursue an associate degree or certification in nursing, aspiring to become a Certified Nursing Assistant or later a registered
    nurse. She values the clear, structured pathway and the opportunity to serve her community’s health needs. She also considers studying agricultural science to help on her family’s farm, or training
    as a pharmacy technician. Long‑term, she hopes to secure a stable, respected role that combines her caring nature with a predictable, organized work environment.
