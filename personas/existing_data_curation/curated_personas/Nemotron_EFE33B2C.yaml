personas:
  professional: An inquisitive one‑year‑old, Mary Croteau treats every household object—from rattles to kitchen spoons—as a chance to explore cause and effect, and they eagerly demonstrate a natural curiosity
    and a knack for stealing the spotlight during playtime.
  sports: A budding fan of the New York Yankees, Mary Croteau delightfully splashes in the toddler swim lessons at Tiny Tots Swim Club and giggles during backyard mini‑soccer sessions in spring, showing
    a natural love for movement while they eagerly cheer when the Yankees hit a home run on the TV.
  arts: An avid admirer of visual storytelling, Mary Croteau lounges on the floor flipping through Eric Carle’s *The Very Hungry Caterpillar*, swaying to the gentle lullabies of Brahms and the playful tunes
    of Sesame Street’s cast, and they often babble along to the animated dialogues of Disney’s *Moana*, reflecting a precocious appreciation for art and music.
  travel: A curious little globetrotter, Mary Croteau enjoys car‑seat adventures to the San Diego Zoo and the sandy shores of Santa Monica with her parents, and they eagerly anticipate a future family trip
    to Disneyland Paris, favoring spontaneous stops over rigid itineraries.
  culinary: A discerning tiny foodie, Mary Croteau happily slurps mashed sweet potatoes seasoned lightly with a pinch of cinnamon, delights in banana‑avocado puree, yet they stubbornly push away green peas,
    revealing an early competitive palate that favors sweet over bitter flavors.
  core: Mary Croteau, a one‑year‑old curiosity engine, constantly explores the world with talkative enthusiasm, a competitive spark, and a love for being the center of every play scene, while they occasionally
    doubt new foods and thrive on spontaneous interactions.
background:
  cultural: Mary is raised in Menasha, Wisconsin, within a white, Midwestern family that traces its roots to French‑Canadian ancestors. Her household blends typical American traditions—such as Thanksgiving
    dinner and Christmas celebrations—with occasional French‑Canadian customs, like bilingual lullabies and holiday pastries. Community life centers on church gatherings, local festivals, and a strong emphasis
    on friendliness and social connection, all of which shape her early experiences.
