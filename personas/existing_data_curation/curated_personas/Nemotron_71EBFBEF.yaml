personas:
  professional: Adelfa Alonso is a masterful decorative painter who blends meticulous surface preparation and faux glazing with an ever‑curious eye for folk‑inspired murals, using their talkative, client‑centered
    approach to secure projects, meticulously schedule work, and outpace competitors while juggling stress‑inducing deadlines, and they constantly experiment with new low‑VOC pigments to stay ahead.
  sports: Adelfa Alonso follows the Los Angeles Lakers in basketball and the LA Galaxy in soccer, participates in a community running club called Canyon Trails Runners for weekly 5K jogs, and spends summer
    months playing in a co‑ed recreational soccer league, balancing a competitive edge with a desire to stay fit.
  arts: Adelfa Alonso immerses themselves in museums, drawing inspiration from Frida Kahlo, Diego Rivera, and contemporary muralist Judy Baca, attends live cumbia shows featuring Los Ángeles Azules and
    salsa nights at local venues, and curates DIY craft workshops while weaving folk motifs into contemporary design, and they often share their latest sketches with local art students.
  travel: Adelfa Alonso prefers planning weekend getaways that blend cultural immersion with relaxation, having visited Oaxaca’s historic markets, the vibrant streets of Guanajuato, and the Gaudí‑laden
    neighborhoods of Barcelona, while dreaming of a road trip through New Mexico’s art colonies and a future pilgrimage to the murals of Valparaíso, Chile, and they love cataloguing each trip with a hand‑drawn
    sketchbook.
  culinary: Adelfa Alonso enjoys cooking traditional dishes such as mole poblano, tamales, and pozole, skillfully seasoning with fresh cilantro, epazote, and roasted chilies, often growing herbs like oregano
    and rosemary in their succulent garden to enhance meals, yet they sometimes rely on fast‑casual Mexican take‑out when deadlines loom.
  core: Adelfa Alonso channels a restless artistic curiosity into bold, folk‑inspired murals while juggling competitive business ambitions, stress‑driven coffee binges, and a penchant for spontaneous community
    gatherings, and they often find themselves drinking extra coffee to keep pace.
background:
  cultural: Adelfa was raised in a Mexican immigrant family in the Midwest, growing up bilingual and celebrating traditions like Día de los Muertos and Mexican Independence Day with vibrant food, music,
    and folk art. Her heritage fuels her love for bold colors, intricate patterns, and community storytelling, which she weaves into her painting work and personal art projects. Living in Romeoville, IL,
    she blends Mexican cultural pride with Midwestern values of hard work and community involvement, staying active in local Mexican‑American networks, church events, and neighborhood advocacy groups.
attributes:
  skills: '[''Surface preparation'', ''Interior painting'', ''Exterior painting'', ''Decorative finishes (faux, glaze, mural)'', ''Wallpaper installation'', ''Drywall repair'', ''Color theory and custom
    mixing'', ''Client estimation and budgeting'', ''Project scheduling'', ''Bilingual communication (English/Spanish)'', ''Safety compliance'', ''Small‑business management basics'', ''Artistic sketching'']'
  hobbies: '[''Visiting art museums and galleries'', ''Acrylic painting and mural creation'', ''Traditional Mexican cooking'', ''Cumbia and salsa dancing'', ''Gardening (herbs, succulents)'', ''DIY home
    improvement projects'', ''Attending craft fairs and markets'', ''Reading art history and interior design books'', ''Community volunteer work (murals, festivals)'', ''Socializing at church and local
    events'']'
  career_goals: Adelfa aims to earn a master painter certification and become a sought‑after specialist in decorative painting and culturally inspired murals. Within the next three to five years she plans
    to launch her own painting and finishes company that serves upscale residential and boutique commercial clients, emphasizing eco‑friendly, low‑VOC products. She wants to develop a niche portfolio that
    blends Mexican folk motifs with contemporary design, mentor apprentices—especially women and members of the Mexican‑American community—and secure financial stability to reduce stress for her family.
