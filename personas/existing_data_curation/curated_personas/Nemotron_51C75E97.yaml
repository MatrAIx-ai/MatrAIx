personas:
  professional: Imelda Tamor is a seasoned veterinary technologist with expertise in anesthesia monitoring, surgical assistance, laboratory diagnostics and radiographic imaging, who balances a love for
    routine clinical protocols with the ability to stay calm during emergencies, communicating assertively yet compassionately with clients and staff.
  sports: Imelda Tamor spends weekends riding at the Fort Bend County Equestrian Club and cheering on the Houston Astros, blending structured training sessions with the freedom of spontaneous trail rides
    that keep them fit and grounded.
  arts: Imelda Tamor unwinds by devouring mystery novels by Agatha Christie, listening to the Tex‑Mex‑infused melodies of Los Lobos, and attending productions at Texas Stage such as "The Glass Menagerie,"
    allowing the arts to color their methodical veterinary work with creative intrigue.
  travel: Imelda Tamor prefers to map out weekend getaways to nearby natural wonders like Big Bend National Park while also keeping a flexible pocket‑book for sudden spur‑of‑the‑moment trail rides in the
    Texas Hill Country, balancing the desire for routine exploration with the thrill of spontaneous adventure.
  culinary: Imelda Tamor delights in preparing classic chicken fajitas and carnitas tacos, spicing them with fresh cilantro, smoked chipotle peppers, and a splash of lime, while occasionally experimenting
    with a smoky molé sauce that reinterprets their beloved Tex‑Mex staples.
  core: Imelda Tamor is a methodical veterinary technologist who tames both animal emergencies and spontaneous trail rides, balancing disciplined routines with playful impulsivity, and infusing every facet
    of life—from the clinic to the kitchen—with a steady but adaptable spirit.
background:
  cultural: Imelda was raised in a middle‑class white family in the Dallas‑Fort Worth area and later settled in Katy, Texas. Her upbringing reflects traditional Southern values—family gatherings, church
    involvement, and a strong work ethic—favoring practicality and routine. While her education and professional life exposed her to diverse scientific perspectives, she retains a cultural identity rooted
    in Anglo‑American suburban traditions. Living in the multicultural environment of Fort Bend County, she appreciates Tex‑Mex culinary influences and participates in community events, but her core cultural
    background remains centered on white, Southern American customs.
attributes:
  skills: '[''Animal restraint and handling'', ''Anesthesia monitoring'', ''Surgical assistance'', ''Laboratory diagnostics (hematology, urinalysis, microbiology)'', ''Radiographic imaging and interpretation'',
