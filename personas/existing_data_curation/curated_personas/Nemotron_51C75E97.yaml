  hobbies: '[''Gardening'', ''Horseback riding'', ''Cooking Tex‑Mex cuisine'', ''Volunteering at animal shelters'', ''Reading mystery novels'', ''Hiking the Katy trail'', ''Yoga'', ''Quilting'']'
  career_goals: Imelda aims to become a lead veterinary technician and achieve specialist certification in anesthesia, leveraging her practical expertise to mentor junior staff. She envisions collaborating
    with her husband—who is a veterinarian—to open a small animal wellness clinic that emphasizes preventive care and community outreach. Long‑term, she hopes to develop educational programs for local pet
    owners and partner with regional shelters to improve animal health standards across Fort Bend County.
