persona_description: A political leader who has played a significant role in advocating for the eradication of polio and has actively engaged in the oversight, access to non-health resources, and accountability
  of polio activities. They have demonstrated exceptional leadership skills and have been instrumental in generating support from political leaders and donors. They have also been able to mobilize extraordinary
  support from the private sector, including private companies, to ensure that all children are reached with OPV. Their involvement in the implementation of activities has led to heightened accountability
  within and outside the health sector, and they have been able to ensure that poliovirus knew no borders by coordinating the OPV immunization of 56 million children in Asia, Europe, and the Eastern Mediterranean.
