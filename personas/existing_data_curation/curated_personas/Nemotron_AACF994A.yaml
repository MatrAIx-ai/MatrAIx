personas:
  professional: Donald Brown, a 24‑year‑old aspiring community arts coordinator, uses their self‑taught photography, mural painting, and social‑media storytelling to rally volunteers for neighborhood projects,
    channeling their talkative, emotionally intense nature into powerful public talks that inspire collective creativity.
  sports: Donald Brown spends weekend evenings shooting hoops at Lawrenceville’s community park, follows the Atlanta Hawks and Atlanta United with fervor, and participates in the Lawrenceville Community
    Basketball League to stay fit.
  arts: Donald Brown, a prolific muralist and spoken‑word poet, draws inspiration from the bold colors of Kehinde Wiley, the street energy of Jean‑Michel Basquiat, and the rhythms of Kendrick Lamar and
    Nina Simone, channeling these influences into vibrant community walls and midnight open‑mic performances.
  travel: Donald Brown dreams of swapping Lawrenceville’s coffee shops for late‑night jam sessions in New Orleans, exploring Kingston’s street food stalls, and wandering Barcelona’s graffiti‑laden alleys,
    yet budgets their trips around freelance gigs and low‑cost hostels.
  culinary: Donald Brown, an adventurous home chef, frequently whips up Southern‑comfort dishes like shrimp‑and‑grits infused with jerk seasoning, collard greens sautéed with plantain and smoked paprika,
    and sweet‑potato and coconut milk stew, experimenting boldly while sometimes over‑spicing the palate.
  core: Donald Brown channels restless curiosity and emotional intensity into vibrant murals, spontaneous spoken‑word, and community activism, even as anxiety and a habit of impulse‑buying keep them perpetually
    balancing creative fire with self‑care challenges.
background:
  cultural: Donald is a Black man raised in Lawrenceville, a suburb of Atlanta with a growingly diverse population. His family’s roots trace back to the Southern United States and the Great Migration, giving
    him a strong sense of community shaped by the local Black church, family gatherings, and neighborhood barbershops. The cultural ambience of Atlanta’s music scene—particularly hip‑hop, R&B, and neo‑soul—has
    been a daily soundtrack, while his family’s culinary traditions include Southern soul food, collard greens, sweet potato pies, and occasional Afro‑Caribbean dishes. He also identifies with the broader
    African diaspora through participation in Juneteenth celebrations, local Black history initiatives, and community art projects. These influences inform his worldview, artistic expression, and commitment
    to uplifting his community.
attributes:
  skills: '["Public speaking", "Community outreach", "Social media content creation", "Digital photography", "Graphic design (Canva, GIMP)", "Event planning", "Peer counseling", "Basic carpentry"]'
  hobbies: '["Mural painting", "Digital photography", "Spoken‑word poetry", "Jazz and hip‑hop listening", "Basketball", "Podcast listening (philosophy, psychology, social justice)", "Reading contemporary
    fiction", "Attending cultural festivals", "Cooking (Southern, African, Caribbean fusion)", "Exploring coffee shops"]'
  career_goals: Donald aims to earn his GED within the next year and then enroll in a community college program focused on community development or arts administration. His long‑term ambition is to become
    a community arts coordinator for Lawrenceville or the broader Gwinnett County area, establishing a youth art hub that offers workshops, mentorship, and mental‑health support. He hopes to see his own
    murals and visual work featured in regional galleries and eventually open an independent gallery‑café that showcases Black artists while providing a safe space for creative dialogue. Alongside his artistic
    career, Donald plans to become certified in mental‑health first aid to better support peers dealing with anxiety and distress.
