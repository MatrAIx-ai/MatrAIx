  career_goals: Jacob dreams of becoming an astronaut or a robotics engineer, career paths that let him explore new ideas while applying practical problem‑solving. He is excited by the prospect of building
    machines that can travel to space or help people on Earth, and he enjoys competing in his school's STEM club. He also imagines helping animals as a veterinarian, drawn from his love for the family’s
    pet dog. As he matures, Jacob hopes to lead a team in a robotics competition, earn recognition for his inventions, and use his knowledge to solve real‑world challenges.
