personas:
  professional: Jacob Hill, a budding junior engineer who loves constructing LEGO space stations and designing Minecraft realms, channels their curiosity and practicality into meticulous planning and rapid
    prototyping, while their competitive streak drives them to outbuild peers and their occasional skepticism keeps them double‑checking every piece.
  sports: Jacob Hill, a spirited forward for the Imperial County Thunder U‑8 soccer squad, thrives on the competitive rush of scoring goals, channeling their outgoing energy into intense practice drills
    while remaining wary of opponents’ tactics, and also enjoys cheering for the Los Angeles Dodgers during weekend family outings.
  arts: Jacob Hill, an avid LEGO architect and Minecraft builder, draws inspiration from the whimsical illustrations of Mo Willems and the adventurous score of the LEGO Movie soundtrack, while spending
    free afternoons reenacting scenes from Magic Tree House with friends, reflecting their curiosity‑driven imagination and occasional perfectionist tendency to redo a creation until it’s flawless.
  travel: Jacob Hill, an enthusiastic explorer who has trekked the desert outskirts of Imperial with family, collected rocks at nearby Joshua Tree National Park, and dreams of visiting the Grand Canyon
    and Disneyland, prefers day‑trip adventures planned with hand‑drawn maps, but worries about getting lost, prompting them to always carry a compass.
  culinary: Jacob Hill, a budding chef who delights in whipping up pepperoni pizza topped with extra mozzarella, munching on crunchy carrot sticks with hummus, and experimenting with homemade rock candy
    using sugar and food‑grade coloring, shows the same practical curiosity in the kitchen as in LEGO builds, though they sometimes over‑indulge in sugary snacks after a soccer win.
  core: Jacob Hill is a competitive, curiosity‑driven seven‑year‑old who builds elaborate LEGO worlds, scores soccer goals, worries about every penny, and can’t resist a good rock‑candy snack before bedtime.
background:
  cultural: Jacob is raised in a white, middle‑class family in Imperial, California, a desert agricultural community at the U.S.–Mexico border. While his household primarily observes mainstream American
    customs—celebrating Thanksgiving, the Fourth of July, and Christmas—he is regularly exposed to the region’s bilingual and bicultural environment. He often hears Spanish in the neighborhood, picks up
    basic greetings, and participates in local events such as the annual Mexican Heritage Festival and the Imperial County Fair, which showcase the area’s Hispanic influences. His family values practicality,
    hard work, and community involvement, reflected in his school's emphasis on teamwork and his participation in church youth groups.
