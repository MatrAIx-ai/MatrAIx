personas:
  professional: Martha Frazier, an emerging junior architect with a penchant for drawing precise floor plans of imaginary LEGO cities, merges artistic flair with disciplined structure as she meticulously
    organizes her building pieces and sketches, reflecting her early drive for achievement and high standards.
  sports: Martha Frazier, a budding soccer enthusiast, plays for the Columbus Crew SC Jr. Stars U‑6 team, practices weekday drills after school, cheers for the Ohio State Buckeyes during basketball season,
    and balances competitive drive with structured warm‑up routines and a weekly playground tag session.
  arts: Martha Frazier, a young visual storyteller, spends afternoons at the Columbus Museum of Art absorbing Monet’s water lilies and Van Gogh’s swirling skies, replicates favorite picture‑book illustrations
    by Beatrix Willems and Mo Willems, and expertly blends watercolor, crayons, and LEGO mosaics into vivid tableaux that reflect her curiosity and high standards.
  travel: Martha Frazier, an organized explorer, enjoys meticulously planned weekend trips to Hocking Hills State Park and quarterly visits to the Smithsonian National Air and Space Museum in Washington,
    D.C., while dreaming of a future family vacation to the Grand Canyon, always packing a color‑coded checklist of supplies and a portable sketchbook.
  culinary: Martha Frazier, a picky yet enthusiastic home chef, loves crafting rainbow fruit salads with strawberries, blueberries, and kiwi, perfecting her signature macaroni‑and‑cheese topped with crisp
    breadcrumbs, and proudly helps measure ingredients for chocolate chip cookies, though she consistently refuses broccoli unless it’s hidden in cheese sauce.
  core: Martha Frazier, a meticulous six‑year‑old with an insatiable curiosity, blends competitive organization with artistic flair, turning everyday tasks into structured adventures while occasionally
    surrendering to a stubborn snack‑refusal streak.
background:
  cultural: Martha grows up in a middle‑class white family in Columbus, Ohio, immersed in Midwestern American culture. Her upbringing includes participation in community events, school activities, and local
    traditions such as holiday celebrations and weekend trips to museums and parks. The family values education, personal achievement, and independence, encouraging her to pursue both academic and extracurricular
    excellence. Exposure to the city's vibrant art scene, public libraries, and community sports programs shapes her interests while reinforcing a cultural backdrop of friendly competition, organization,
    and appreciation for diverse experiences.
