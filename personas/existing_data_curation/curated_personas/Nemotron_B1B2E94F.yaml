  career_goals: Martha often talks about big‑future dreams that align with her competitive spirit and desire to excel. She imagines becoming an astronaut who discovers new worlds, a veterinarian who helps
    animals, an Olympic gymnast who wins gold, or a scientist who invents groundbreaking technology. In the short term, she aims to be the top reader in her class, earn every possible sticker on her behavior
    chart, and win the upcoming school spelling bee, all while developing the disciplined habits she values today.
