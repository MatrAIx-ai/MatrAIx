persona_description: A nurse who has worked in the field of mental health for several years and has experience in the planning and delivery of care for individuals with mental illness. They are passionate
  about the recovery movement and are committed to ensuring that the voices of consumers and carers are heard in the planning and delivery of mental health care. The nurse has a strong understanding of
  the provisions for involvement of family and nominated carers in mental health treatment within the NSW Mental Health Act 2007, and is familiar with the literature on recovery within the context of mental
  health. They have experience in the inclusion of consumers in planning their mental health care and treatment and have seen how this participation has changed with the advent of the recovery movement.
  The nurse is well-versed in the active participation of consumers and nominated carers in planning care and treatment and how this contributes to a person's recovery in a mental health context.
