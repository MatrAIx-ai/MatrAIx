persona_description: A materials scientist specializing in the field of fatigue testing, with a focus on the use of CTOD (Charpy Tensile-Opposite Die) testing. She is experienced in designing and conducting
  CTOD tests for structural and pipe materials in the oil and gas industries, and is familiar with the various test specimens and nomenclature used in this testing method. She is also familiar with the
  importance of pre-fatigue cracking in the CTOD calculation and the criteria for fatiguing the sample. Additionally, she is knowledgeable about the various methods for initiating and growing a fatigue
  crack for a CTOD test, and is skilled in interpreting the results of the test.
