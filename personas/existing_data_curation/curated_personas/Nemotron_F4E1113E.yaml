  career_goals: Torrey aims to advance to a supervisory or managerial position within his call‑center, leveraging his people skills to lead a team and improve service metrics. He plans to obtain a Certified
    Customer Service Professional credential and may pursue an associate degree in business administration to broaden his expertise. In the longer term, he envisions moving into a training or quality‑assurance
    role where he can shape onboarding programs and foster a supportive workplace culture. He also seeks a better work‑life balance to reduce stress and provide greater stability for his family.
