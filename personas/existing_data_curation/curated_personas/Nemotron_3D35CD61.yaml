  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Gardening'', ''Bluegrass music'', ''Community theater'', ''Genealogy research'', ''Bowling'', ''Card games'']'
  career_goals: As he approaches retirement, Jerry aims to shift from full‑time purchasing to a mentorship and consulting role. He plans to mentor younger colleagues at his company and serve as an adjunct
    instructor in procurement at the local community college. Jerry also hopes to launch a boutique consulting practice that helps small Appalachian businesses adopt sustainable sourcing practices and modern
    procurement technologies. Additionally, he aspires to lead a regional initiative that connects local artisans with larger supply chains, fostering economic development while preserving the cultural
    heritage of Eastern Kentucky.
