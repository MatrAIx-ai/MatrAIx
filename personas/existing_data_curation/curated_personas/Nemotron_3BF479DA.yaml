  career_goals: Jennifer dreams of a future where she can combine her love for learning and helping others. She often says she wants to become a teacher because she enjoys sharing knowledge and supporting
    classmates, and she also imagines being a veterinarian to care for animals like her beloved dog. In the short term, she aims to earn a gold star for reading, become a class helper, and make the school
    soccer team, showing her drive to achieve practical milestones while keeping her curiosity alive.
