persona_description: A conservation biologist who specializes in the management and restoration of grasslands in the Chihuahuan Desert region of Mexico. She has extensive experience working with ranchers
  and landowners to develop and implement conservation projects that improve forage production for cattle and simultaneously increase habitat for grassland birds. Her expertise lies in the design and implementation
  of habitat conservation agreements, the development of ranch management plans, and the establishment of a habitat conservation fund. She has successfully implemented grassland conservation projects in
  the Valles Centrales Grassland Priority Conservation Area and has identified 3 additional landowners who manage another nearly 30,000 ha. She is currently working closely with Pronatura Noreste on this
  project and has collaborated with Bird Conservancy of the Rockies and IMC Vida Silvestre on biodiversity monitoring.
