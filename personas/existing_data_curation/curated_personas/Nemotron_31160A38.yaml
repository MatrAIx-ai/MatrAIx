  career_goals: At 72, Jalen aims to leave a lasting legacy for his family and neighborhood. He plans to complete a memoir that captures the oral histories of his community, establish a sustainable community
    garden, and mentor local youth through workshops on home‑repair skills. He also wants to become proficient with modern technology so he can stay connected with his grandchildren, serve on the board
    of a local cultural center, and ensure careful estate planning that secures his family's financial future. Ultimately, he strives to be recognized as a trusted elder and resource within Philadelphia’s
    African‑American community.
