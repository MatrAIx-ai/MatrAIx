personas:
  professional: Latoya Mungo, a seasoned carpenter and small‑business owner in the Atlanta metro area, melds structural expertise with an artistic eye for reclaimed‑material furniture, reads blueprints,
    manages budgets, ensures safety compliance, mentors youth—especially women—through hands‑on woodworking, and is actively pursuing journeyman certification to launch a community workshop and gallery‑style
    showroom.
  sports: Latoya Mungo enjoys weekend hikes with the Stone Mountain Hiking Club, follows the Atlanta Hawks basketball team and the Atlanta Braves baseball season, participates in a community soft‑ball league
    for women, and maintains a daily morning walk on local trails to counterbalance long hours on the construction site.
  arts: Latoya Mungo frequents the BeltLine art installations, attends jazz performances by Wynton Marsalis and gospel concerts featuring Mahalia Jackson’s legacy, visits the High Museum of Art to study
    contemporary folk sculptures, and integrates the visual inspiration into her decorative wood carvings.
  travel: Latoya Mungo dreams of a culinary pilgrimage to New Orleans for its jazz heritage and Creole cuisine, has already explored Savannah’s historic squares and Asheville’s craft galleries, and plans
    a modest road trip to Austin’s music festivals, balancing travel aspirations with the financial goal of funding her workshop.
  culinary: Latoya Mungo loves cooking soul‑food classics such as collard greens simmered with smoked turkey, sweet potato casserole, and peach cobbler made with garden‑grown peaches, experiments by adding
    poblano peppers to traditional gumbo, and often hosts church potlucks where their signature cornbread with honey butter steals the spotlight.
  core: Latoya Mungo channels a lifelong curiosity and talkative spirit into building artful furniture while juggling financial worries, health concerns, and a deep commitment to nurturing community through
    mentorship and shared meals.
background:
  cultural: Latoya grew up in a close‑knit African‑American community in the Atlanta metropolitan area, where church, family, and storytelling forged a strong sense of identity. The traditions of Southern
    soul food, gospel music, and craft‑based heritage—such as quilting and woodworking—have shaped her values of resilience, hospitality, and collective uplift. She draws inspiration from the legacy of
    Black artisans and the civil‑rights era’s emphasis on self‑determination, which informs both her craftsmanship and her dedication to mentoring the next generation.
attributes:
  skills: '[''Custom furniture design'', ''Finish carpentry'', ''Framing and structural work'', ''Blueprint reading and interpretation'', ''Tool maintenance and safety'', ''Project budgeting'', ''Client
