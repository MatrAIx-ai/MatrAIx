  hobbies: '[''Visiting art galleries and museums'', ''Woodworking art projects'', ''Gardening'', ''Cooking Southern cuisine'', ''Attending church and community events'', ''Listening to jazz and gospel
    music'', ''Reading design and architecture books'', ''Mentoring youth in woodworking'', ''Hiking in regional parks'', ''Participating in African‑American cultural festivals'']'
  career_goals: Latoya aims to expand her small carpentry business into a community workshop where she can both produce her signature art‑inspired furniture and offer affordable training programs for local
    youth, especially women. She hopes to obtain formal journeyman certification, showcase her work in regional craft fairs, and eventually open a modest gallery‑style showroom that doubles as a gathering
    space for cultural events. Reducing financial stress and building a stable, legacy‑focused enterprise for her family are top priorities.
