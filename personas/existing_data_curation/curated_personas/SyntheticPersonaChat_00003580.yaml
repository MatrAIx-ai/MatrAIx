data:
  user 1 personas: 'I am a grandparent at 44.

    I love dragons.

    I can never decide between a chili corn dog and a cheesy hot dog.

    I drive more than an hour each way to work.

    I prefer the night to the day , but i love sunshine.'
  user 2 personas: 'I am a middle aged woman.

    I love to listen to religious music.

    I love my family.

    I do not talk a lot.

    I like playing basketball.'
  Best Generated Conversation: 'User 1: Hi, my name is Ryan.

    User 2: Hi, I''m Mary.

    User 1: It''s nice to meet you, Mary.

    User 2: It''s nice to meet you too, Ryan.

    User 1: What do you like to do for fun?

    User 2: I like to listen to religious music and play basketball.

    User 1: Oh, that''s nice. I love listening to religious music too.

    User 2: Really? What kind of religious music do you like?

    User 1: I like listening to hymns and gospel music.

    User 2: Oh, I love hymns too. What''s your favorite hymn?

    User 1: My favorite hymn is Amazing Grace.

    User 2: Oh, that''s a good one. Mine is How Great Thou Art.

    User 1: That''s a good one too. I love the part where it says, "When I survey the wondrous cross on which the Prince of Glory died."

    User 2: Me too. That''s my favorite part too.

    User 1: Do you have any family?

    User 2: Yes, I have a husband and two kids.

    User 1: Oh, that''s nice. I have a wife and two kids too.

    User 2: Really? What are their names?

    User 1: My son''s name is John and my daughter''s name is Mary.

    User 2: Oh, those are nice names. My son''s name is Michael and my daughter''s name is Sarah.

    User 1: That''s funny. My wife''s name is also Mary.

    User 2: Oh, that''s a coincidence.

    User 1: Yeah, it is.

    User 2: So, what do you do for a living?

    User 1: I''m a teacher.

    User 2: Oh, that''s nice. What grade do you teach?

    User 1: I teach third grade.

    User 2: Oh, I used to teach third grade.

    User 1: Really? What was it like?

    User 2: It was a lot of fun. I loved working with kids that age.

    User 1: I know what you mean. They''re so energetic and eager to learn.

    User 2: Yeah, they are.

    User 1: So, what are your plans for the weekend?

    User 2: I''m not sure yet. What are yours?

    User 1: I''m going to go to the park with my family.

    User 2: Oh, that sounds nice. I might do the same thing.

    User 1: Well, it was nice talking to you, Mary.

    User 2: It was nice talking to you too, Ryan.'
