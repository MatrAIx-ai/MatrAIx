  hobbies: '[''Hiking on the Katy Trail'', ''Home cooking and baking'', ''Yoga'', ''Reading travel memoirs and mystery novels'', ''Participating in a local book club'', ''Volunteering at community shelters'',
    ''Exploring historic sites in St. Charles'', ''Attending local festivals and farmers markets'']'
  career_goals: Linda aims to progress to a supervisory position within the hospitality sector, such as Front Desk Supervisor or Concierge Manager, and eventually become a Guest Services Director at a boutique
    hotel or resort. She also envisions launching a small boutique travel consultancy that curates personalized itineraries for regional tourists, leveraging her blend of curiosity and practicality. To
    support these ambitions, she plans to complete her associate degree in Hospitality Management and obtain certifications in hotel operations and customer experience.
