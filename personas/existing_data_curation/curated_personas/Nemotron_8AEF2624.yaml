personas:
  professional: Linda Marlier, a 27-year-old concierge with a knack for efficient baggage handling and personalized guest recommendations, they blend meticulous time-management and basic Spanish fluency
    with a practical curiosity, delivering seamless experiences while eyeing a future Front Desk Supervisor role.
  sports: Linda Marlier, a devoted member of the St. Charles Trailblazers hiking club who tackles the Katy Trail each weekend, they follow the St. Louis Cardinals baseball season and cheer for the Kansas
    City Chiefs, and incorporate yoga and light strength training to complement their endurance pursuits.
  arts: Linda Marlier, an avid member of a local book club, they draw inspiration from mystery novelist Tana French and folk singer Gillian Welch, regularly attend St. Louis Symphony Orchestra performances,
    and support community theater productions of classics like 'Our Town.'
  travel: Linda Marlier, who prefers meticulously planned weekend escapades, they explore Missouri's state parks such as Ha Ha Tonka and historic sites like the Mark Twain Cabin, while dreaming of cultural
    immersion trips to Florence, Italy, and Kyoto, Japan, balancing adventure with a modest travel budget.
  culinary: Linda Marlier, a confident home cook, they perfect Midwestern comfort foods like chicken-and-dumplings and Dutch apple pie, frequently enhance recipes with fresh heirloom tomatoes, locally sourced
    honey, and a dash of smoked paprika, and delight in farm-to-table dining at St. Louis farmers markets.
  core: Linda Marlier, a 27-year-old hospitality professional, they merge meticulous organization with spontaneous curiosity, habitually over-packing their hiking backpack and binge-reading mystery novels
    into the early morning hours.
background:
  cultural: Linda was raised in a modest, middle‑class white family in St. Charles, Missouri, where Midwestern values such as hospitality, community involvement, and practicality were emphasized. Her family’s
    heritage includes German and Irish roots, reflected in holiday traditions and a love for hearty, home‑cooked meals. Growing up near historic downtown St. Charles, she developed a strong sense of place
    and an appreciation for the town’s French colonial legacy, which fuels her pride in sharing regional culture with visitors. Her marriage and close ties to the local community reinforce a collaborative,
    harmony‑oriented outlook.
