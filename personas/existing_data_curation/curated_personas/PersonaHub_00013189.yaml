persona_description: Omowunmi Sadik, a chemist and expert in advanced sensor development, has been awarded a patent for a technology that could soon be improving physicians’ ability to track and treat tumors.
  Sadik is a Binghamton University chemist who specializes in developing tiny biosensors that can detect and image tumors by binding with gallium in blood and tissues. She estimates an in vivo sensor developed
  from her technology will be ready for clinical testing within the next three to four years. Sadik's technology provides a rapid, low-cost means for detecting gallium, along with even greater selectivity
  than existing instrumentation.
