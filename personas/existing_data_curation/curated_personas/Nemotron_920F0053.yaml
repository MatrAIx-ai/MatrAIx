    ''Coaching & Mentoring'', ''Organizational Development & Change Management'']'
  hobbies: '[''Abstract watercolor painting'', ''Reading speculative fiction and philosophy'', ''Classical Indian dance (Bharatanatyam)'', ''Fusion cooking (Indian–Midwestern cuisine)'', ''Native prairie
    gardening'', ''Community mentorship for youth career development'', ''Sudoku and puzzle solving'', ''Digital photography'', ''Attending art fairs and local theatre'']'
  career_goals: As she approaches retirement, Jyotsna aims to channel her imaginative flair into shaping forward‑thinking HR practices that prioritize employee well‑being and creativity. She seeks to lead
    a pilot program that integrates arts‑based learning into corporate training, mentor emerging HR professionals, and advocate for robust diversity and inclusion frameworks within her organization. Over
    the next five years she hopes to transition to a part‑time consulting role, publish a guide on creative talent development, and contribute to community‑based adult education initiatives in Maple Hill,
    thereby leaving a lasting legacy of inclusive and innovative workplace culture.
