personas:
  professional: Jyotsna Modi, a 64‑year‑old HR strategist with three decades of expertise in talent acquisition, performance management, and diversity and inclusion, leverages her vivid imagination and
    disciplined organization to design arts‑infused learning workshops that blend visual storytelling with compliance rigor, and they assertively mentor emerging HR professionals while maintaining a reliable,
    collaborative presence in executive meetings.
  sports: Jyotsna Modi, an enthusiastic supporter of the Kansas City Chiefs and Kansas City Royals, follows the NFL season religiously, attends Royals games in the spring, participates in a local senior
    walking club that meets thrice weekly on the prairie trails, volunteers as a scorekeeper for adult lawn‑bowling matches, and they incorporate low‑impact gardening as a form of fitness, preferring gentle
    cardio over high‑intensity workouts.
  arts: Jyotsna Modi, an avid painter of abstract watercolors inspired by prairie horizons and mandala geometry, regularly attends Kansas City Ballet performances, studies Ravi Shankar’s sitar recordings,
    practices Bharatanatyam at the cultural center, draws creative impetus from Georgia O’Keeffe’s floral abstractions and Frida Kahlo’s narrative self‑portraits, and they cultivate a personal library of
    speculative fiction and contemporary art journals that fuels their artistic vision.
  travel: Jyotsna Modi, a meticulous planner with a love for both structured itineraries and spontaneous detours, has explored the spice‑laden markets of Kerala, the cherry‑blossom temples of Kyoto, and
    the historic streets of Oaxaca, dreams of witnessing the Northern Lights in Iceland, enjoys weekend road trips to the Tallgrass Prairie National Preserve, and they balance travel expenses with a modest
    budget, often relying on senior discount programs and family support.
  culinary: Jyotsna Modi, a confident home chef who blends South Asian spices with Kansas farm produce, delights in crafting masala‑infused roasted beet salad, saffron‑coconut rice with heirloom corn, paneer
    tikka seasoned with local rosemary, and wildflower honey‑laced lassi, experiments with flavor pairings like mustard greens saag and cheddar, and they relish hosting dinner gatherings where experimental
    fusion dishes become conversation starters.
  core: Jyotsna Modi melds a distinguished HR career with a painter’s imagination, solves daily Sudoku puzzles while humming classical ragas, and occasionally misplaces their glasses during gardening, reflecting
    a quirky blend of meticulous professionalism and whimsical creativity.
background:
  cultural: Born to Bengali‑Gujarati parents who immigrated to the United States in the early 1960s, Jyotsna grew up navigating both South Asian traditions and Midwestern American life. She maintains fluency
    in Bengali and English, celebrates festivals such as Durga Puja, Diwali, and Holi with her family, and incorporates Indian culinary and musical heritage into her daily routines. Living in Maple Hill,
    Kansas, she actively participates in local community events, blending her cultural values of hospitality, education, and communal responsibility with the region’s emphasis on neighborly outreach and
    agricultural roots. This bicultural perspective informs her inclusive worldview and her commitment to fostering belonging in diverse workplace settings.
attributes:
  skills: '[''Talent Acquisition & Recruitment Strategy'', ''Employee Relations & Conflict Mediation'', ''Performance Management & Succession Planning'', ''Learning & Development Design (Experiential &
