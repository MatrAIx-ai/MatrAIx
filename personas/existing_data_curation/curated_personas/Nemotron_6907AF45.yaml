  career_goals: Maria imagines a future where she can blend her love of art and the ocean. She dreams of becoming a vibrant illustrator who creates picture books that tell stories about sea creatures, and
    she also envisions herself as a marine biologist exploring tide pools along the California coast. Occasionally she pretends to be a teacher, sharing crayons and ideas with younger children. Her overarching
    ambition is to use creativity to bring people together, perhaps by opening a community art studio that also celebrates marine life and Spanish cultural traditions.
