personas:
  professional: Tammy Kegg, a retired early‑childhood educator turned community volunteer, channels her practical farming roots and compassionate nature into coordinating the Stillwater senior center’s
    food pantry, mentoring new volunteers in caregiving, and spearheading a seasonal garden project that blends traditional Oklahoma planting methods with sustainable practices, even if their flexible,
    sometimes disorganized, approach means they rely on spontaneous improvisation.
  sports: Tammy Kegg enjoys bird‑watching walks in Creek National Grassland, participates in the Stillwater Senior Walking Club’s weekly strolls, cheers on the Oklahoma City Thunder on TV, and nostalgically
    attends Stillwater High School Bulldogs football games when they feel up to the outing.
  arts: Tammy Kegg listens to classic country icons like Dolly Parton and Johnny Cash, lifts their spirits with gospel legends such as Mahalia Jackson, finds inspiration in historical fiction by Philippa
    Gregg, and expresses their creativity through quilting designs that echo the Americana style of artists like Faith Ringgold.
  travel: Tammy Kegg favors short road trips to nearby historic towns like Guthrie and the prairie‑filled Kansas landscapes, dreams of a leisurely pilgrimage to Washington, D.C.’s museums, and occasionally
    indulges in a weekend getaway to the Grand Canyon, all while balancing a modest travel fund with their fixed‑income constraints.
  culinary: Tammy Kegg delights in homestyle cooking with dishes like chicken fried steak, cornbread, and canning peach preserves, incorporates fresh heirloom tomatoes and garden herbs into simple recipes
    they adapt from The Pioneer Woman, yet sometimes forgets to defrost meat in time, leading to quick improvisations.
  core: Tammy Kegg is a curious, compassionate octogenarian who blends practical gardening and knitting with a flexible, worry‑laden approach to life, often forgetting appointments but always ready to lend
    a hand, and they navigate each day with quiet determination.
background:
  cultural: Tammy was raised in a middle‑class, white, Protestant (Baptist) family in rural Oklahoma, where self‑reliance, hospitality, and community service were core values. The family’s farming roots
    instilled a respect for the land and seasonal rhythms, while church activities reinforced a strong sense of compassion and cooperation. Living most of her life in Stillwater, she has been shaped by
    the town’s blend of university influence and small‑town Midwestern culture, which emphasizes modesty, practicality, and a love of tradition tempered with a willingness to explore new ideas.
