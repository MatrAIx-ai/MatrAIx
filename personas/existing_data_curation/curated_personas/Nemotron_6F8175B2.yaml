  career_goals: Omar hopes to finish his GED and enroll in a community‑college art program where he can develop his visual‑arts talent. He dreams of becoming a muralist or cultural‑arts coordinator who
    brings Mexican heritage into public spaces in Texas. In the longer term, he also sees himself using his farm knowledge to work in sustainable agriculture technology, blending his practical background
    with his creative ambitions.
