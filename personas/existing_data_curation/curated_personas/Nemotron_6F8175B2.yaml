personas:
  professional: Omar Ortiz, a newborn with an early fascination for bright shapes and melodic tones, already shows the inquisitive mind and collaborative temperament that foreshadow a future as an interdisciplinary
    design researcher, where they will blend curiosity with organized flexibility.
  sports: Omar Ortiz, though still an infant, attends parent‑led baby swim classes at the community pool and enjoys early exposure to the hometown baseball team, the Detroit Tigers, as parents play soft
    game jingles that they giggle at while watching the mascot videos.
  arts: Omar Ortiz's early artistic world is filled with soothing lullabies by Natalie Merchant, hand‑crafted mobiles featuring origami cranes, and a clear preference for bold primary colors, which they
    eagerly point to during family art sessions.
  travel: Omar Ortiz's travel experiences center on weekend family trips to grandparents in Asheville, an annual camping adventure at Grand Canyon State Park, and an imagined future longing to see the cherry
    blossoms of Kyoto once they can settle into a car seat.
  culinary: Omar Ortiz prefers smooth pureed sweet potato, avocado mash, and occasional kiwi puree, while parents, capable of homemade applesauce with a pinch of cinnamon, sometimes indulge in a take‑out
    baby‑friendly macaroni cheese, a splurge they quietly enjoy.
  core: Omar Ortiz, an endlessly curious infant with a penchant for vivid colors, social giggles, and occasional worry‑induced fussiness, navigates the world with a blend of organized routines and spontaneous
    explorations, and they often delight in the simplest sensory delights.
background:
  cultural: Omar grew up in a Mexican‑American household in Seminole, Texas, where Spanish and English flow interchangeably at home. Family gatherings feature Día de los Muertos altars, tamale cooking,
    and mariachi music, grounding him in his heritage. The rural setting has taught him the value of hard work on the land, while the close‑knit community nurtures his sociable and collaborative nature.
    He balances the traditional Catholic values of his family with the modern influences of his Texas surroundings.
