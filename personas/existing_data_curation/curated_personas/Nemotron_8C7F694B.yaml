  hobbies: '[''Playing Acoustic Guitar'', ''Hiking'', ''Cycling'', ''Exploring Craft Breweries'', ''Reading Science‑Fiction'', ''Watching Indie Films'', ''Volunteering at Food Bank'']'
  career_goals: Christopher aims to transition from his current support role into a full‑service bartender and eventually into a bar manager position within the next three years. He plans to complete his
    associate degree in hospitality management while gaining certifications in responsible alcohol service and advanced mixology. Long‑term, he hopes to open a community‑focused brewpub in South Bend that
    showcases local craft beers and provides a welcoming space for students and residents alike.
