personas:
  professional: Christopher Pullen, a 23‑year‑old barback with a knack for swift order‑taking and meticulous inventory checks, blends Midwestern pragmatism with a curiosity for craft beverages, they streamline
    service, resolve conflicts calmly, experiment with mixology techniques, and position themselves for a fast‑track promotion to full‑service bartender and eventually bar manager.
  sports: Christopher Pullen, a 23‑year‑old who cycles with the South Bend Bike Collective, hikes the trails of Saint Joseph County’s parks, tunes into Notre Dame Fighting Irish football on Saturdays, and
    joins pickup basketball games at the campus rec center, they balance cardio and strength training while staying loyal to local sports culture.
  arts: Christopher Pullen, a 23‑year‑old acoustic guitarist who frequently performs at Notre Dame’s open‑mic nights, immerses themselves in indie film festivals showcasing works by Greta Gerwig and Bong
    Joon‑ho, and finds lyrical inspiration in artists like Tame Impala and The Strokes, they weave music and cinema into their social evenings and personal creativity.
  travel: Christopher Pullen, a 23‑year‑old who plans trips using a spreadsheet, prefers weekend road trips to Chicago’s craft‑brew neighborhoods and annual pilgrimages to the Indiana Dunes, while dreaming
    of a summer backpacking adventure through Oaxaca’s coffee farms and a future visit to Portland’s vibrant brewery scene, they balance adventure with budget constraints by prioritizing affordable train
    and bus travel.
  culinary: Christopher Pullen, a 23‑year‑old home cook who blends Midwestern comfort with family recipes, enjoys preparing homemade chicken tortilla soup seasoned with chipotle, grilling bratwurst with
    sauerkraut, and experimenting with cinnamon‑infused stout reductions for sauces, they relish both casual brewery fare and the occasional fiesta‑style supper that showcase their mixed culinary heritage.
  core: Christopher Pullen is a pragmatic yet curious 23‑year‑old bar enthusiast who balances craft‑beer sampling with disciplined budgeting, hikes to reset, strums guitar after work, and dreams of a community
    brewpub while occasionally forgetting to water their houseplants, and they constantly remind themselves to stay organized.
background:
  cultural: Christopher grew up in a Midwestern, predominantly Catholic community in northern Indiana. His family blends traditional American Midwest values—pragmatism, community involvement, and modesty—with
    a touch of Hispanic heritage from his mother's side (as reflected in his middle name Salcido). This mixed cultural background has given him an appreciation for both American and Hispanic culinary traditions,
    a strong work ethic, and an outward‑facing yet reflective demeanor.
