personas:
  professional: Maylin Oconor, a budding junior game designer, blends curiosity and practicality as she creates simple Scratch animations, sketches whimsical animal characters, and builds intricate LEGO
    habitats that echo her imagined Amazon rainforest explorations.
  sports: Maylin Oconor dribbles soccer balls with friends at Great Kills Park, looks up to New York City FC’s midfielder Valentin Castellanos, and joins the weekend community futsal league, preferring
    spontaneous pick‑up games over rigid training schedules.
  arts: Maylin Oconor channels a love for cartoons by sketching animal heroes inspired by Bill Watterson and Dr. Seuss, animates short stories on Scratch after dancing to salsa tunes from Celia Cruz, and
    adorns school notebooks with marine creature stickers, weaving vibrant visual storytelling into daily life.
  travel: Maylin Oconor dreams of turning local park adventures at Clove Lakes into odysseys that include visits to Central Park’s zoo, the thunderous waterfalls of Niagara, and someday the leafy canopies
    of the Amazon, planning trips with hand‑drawn maps and a penchant for spontaneous discovery.
  culinary: Maylin Oconor enjoys kneading dough for golden empanadas filled with cheese and spinach, sprinkling cinnamon on churros at family gatherings, and mastering a simple guacamole using ripe avocados,
    all while perfecting pancake flips that end up slightly floppy.
  core: Maylin Oconor is an endlessly curious nine‑year‑old whose imagination turns park benches into rainforest bases, whose occasional disorganization fuels creative LEGO constructions, and whose love
    of salsa rhythms and sticker collections keep their world bright and slightly chaotic.
background:
  cultural: Maylin comes from an Ecuadorian family that maintains strong ties to its Andean and coastal roots. At home, Spanish is spoken alongside English, and she celebrates traditional holidays such
    as Carnaval de Guaranda and Día de los Difuntos with family meals featuring dishes like ceviche, rice with lentils, and empanadas. She participates in a local Latino community center in Staten Island,
    where she learns folk dances and occasionally attends a Spanish‑language school. Her cultural heritage gives her a deep appreciation for biodiversity, music, and family togetherness, which blends with
    the multicultural environment of New York City.
attributes:
  skills: '[''Reading comprehension (grade 4 level)'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Bilingual Spanish–English communication'', ''Digital storytelling with Scratch'', ''Drawing
