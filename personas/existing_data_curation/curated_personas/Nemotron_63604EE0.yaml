  hobbies: '[''Exploring parks and nature walks'', ''Drawing and sketching animals'', ''LEGO building'', ''Scratch coding and digital storytelling'', ''Helping cook Ecuadorian recipes'', ''Dancing to Latin
    music'', ''Playing soccer'', ''Reading adventure and science books'', ''Collecting marine life stickers'']'
  career_goals: Although she is only nine, Maylin already imagines a future where she can combine her love of nature, science, and creativity. She is fascinated by marine life and dreams of becoming a marine
    biologist who studies the Pacific coast of Ecuador, or a wildlife conservationist who helps protect rainforests. She also enjoys building things and sometimes says she might be an engineer or an inventor,
    and she likes the idea of sharing knowledge as a teacher or storyteller. Her overarching ambition is to explore, discover, and help the world in a hands‑on way, while keeping room for flexibility and
    fun.
