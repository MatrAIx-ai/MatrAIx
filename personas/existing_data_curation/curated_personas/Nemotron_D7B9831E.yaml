  hobbies: '[''Gardening'', ''Cooking traditional dishes'', ''Salsa dancing'', ''Walking groups'', ''Church choir volunteering'', ''Knitting'', ''Reading historical novels'', ''Attending cultural festivals'']'
  career_goals: Although retired from formal employment, Ana aims to remain an active pillar of her community. She hopes to launch a weekly cooking workshop at the local senior center to share her culinary
    heritage, become a mentor for younger Puerto Rican families, and write a memoir that captures her life’s stories. Maintaining her health through regular walks and dance classes, she also aspires to
    travel back to Puerto Rico to reconnect with extended family and celebrate traditional festivals.
