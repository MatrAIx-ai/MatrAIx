  hobbies: '[''Historic Lighthouse Tours'', ''Maritime Museum Volunteering'', ''Book Club'', ''Community Theater (Set Design)'', ''Acting'', ''Yoga'', ''Native Plant Gardening'', ''Trivia Nights'', ''Bridge
    Tournaments'', ''Regional History Research'']'
  career_goals: Looking ahead, Dorene aims to advance into a supervisory or store‑manager role within the next two to three years, obtaining a Certified Retail Manager credential and leading a team that
    emphasizes both operational efficiency and community engagement. She wishes to integrate her humanities background by curating in‑store cultural displays and organizing local history workshops, positioning
    the store as a neighborhood hub. By mentoring new employees and championing data‑driven performance improvements, she seeks to demonstrate measurable results. Ultimately, she plans to transition to
    a part‑time position as a community arts coordinator or museum educator, allowing her to blend her retail expertise with her passion for the arts while securing a stable retirement income.
