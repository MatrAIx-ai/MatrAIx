  career_goals: Kathy aims to maintain her independence and health while staying socially active in Oneonta. She wants to continue serving as a hub for community gatherings, mentor younger volunteers, and
    expand her oral‑history project documenting longtime residents. Learning video‑calling technology to stay connected with family, advocating for improved senior services and accessible public spaces,
    and preserving her knowledge of local history and traditional crafts are also top priorities. Additionally, she seeks to keep her finances stable, manage stress through regular walks and gardening,
    and remain a valued voice in town meetings and church activities.
