personas:
  professional: Luz Hernandez is an aspiring visual artist and digital content creator who blends hand‑drawn characters with vibrant color palettes on Instagram and TikTok, letting her curious, open‑minded
    nature drive experimental techniques while her relaxed approach sometimes leads to missed deadlines.
  sports: Luz Hernandez loves weekend soccer matches at the neighborhood park, playing forward for the local youth league, cheering for City United FC in the top division, and keeps her energy up with quick
    sprints, though she often skips warm‑ups, leading to occasional sore calves.
  arts: Luz Hernandez draws inspiration from Frida Kahlo’s bold colors, Hayao Miyazaki’s storytelling, and the beats of Bad Bunny, Shakira, and BTS, while she curates street‑art photo essays, participates
    in school art clubs, and lets her sociable, competitive streak push her to enter regional illustration contests.
  travel: Luz Hernandez prefers spontaneous day trips to the nearby lake town of Laguna Verde and dreams of exploring the murals of Barcelona and the neon streets of Tokyo, planning most outings on a loose
    checklist rather than a detailed itinerary while balancing her love of adventure with a modest family budget.
  culinary: Luz Hernandez favors spicy tacos al pastor, sushi rolls with avocado, and classic pizza margherita, experimenting with lime zest and chilies in her modest kitchen, though she often forgets to
    clean up, leaving a lingering aroma of cilantro.
  core: Luz Hernandez channels a whirlwind of artistic curiosity and social energy into vibrant drawings, impulsive spending, and occasional acne‑focused self‑care, thriving on spontaneous creativity while
    juggling a habit of leaving projects half‑finished.
background:
  cultural: Luz comes from a Mexican‑American family in Munster, Indiana. She grew up speaking both Spanish and English at home, celebrating holidays like Día de los Muertos and Cinco de Mayo with traditional
    foods, music, and altar‑building. Her family places a strong emphasis on community, often participating in local Hispanic festivals, church events, and neighborhood gatherings. These cultural experiences
    nurture her appreciation for vibrant colors, storytelling, and collective celebrations, which she integrates into her artistic pursuits and social interactions.
