  career_goals: Luz dreams of turning her love for art into a career, hoping to become a graphic designer or visual storyteller who blends Mexican cultural motifs with contemporary design. She aspires to
    study visual arts in high school and eventually attend a college with a strong art program. Long‑term, she envisions working at a community arts center, launching mural projects that celebrate her heritage,
    or creating socially‑focused multimedia content. She also considers building her own online platform to showcase her artwork, collaborate with peers, and inspire other young creators.
