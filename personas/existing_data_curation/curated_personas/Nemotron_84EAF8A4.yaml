  hobbies: '[''Gardening'', ''Cooking and recipe experimentation'', ''Bingo and bridge games'', ''Reading historical fiction'', ''Listening to enka and jazz music'', ''Walking the Bay Trail'', ''Senior
    center book club'', ''Calligraphy practice'', ''Family storytelling sessions'']'
  career_goals: In the next few years, Yoshimi hopes to compile her cooking knowledge into a handwritten family cookbook that preserves recipes and the stories behind them. She wishes to share cultural
    narratives by leading informal talks at the senior center and local library. Learning to use a tablet for video calls with distant relatives is a personal goal, as is brushing up on digital photography
    to document family events. While a formal degree is not a priority, she is interested in earning a GED to formalize her education and possibly taking a community‑college class on ethnic studies to deepen
    her understanding of her heritage.
