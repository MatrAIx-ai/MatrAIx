    ''Mentorship and new nurse orientation'', ''Shift handover and staffing management'']'
  hobbies: '[''Fly fishing on the James River'', ''Vegetable gardening (heirloom tomatoes)'', ''Restoration woodworking (handcrafted furniture)'', ''Civil War historical research'', ''Volunteer work with
    Red Cross blood drives'', "Church men''s study group", ''Model railroad building'', ''Attending community theater productions'']'
  career_goals: Looking ahead, Richard aims to transition into a formal leadership role such as Nurse Manager or Clinical Educator within his hospital, leveraging his extensive bedside experience to shape
    unit policies and staff development programs. He plans to complete a Bachelor of Science in Nursing (BSN) to broaden his clinical knowledge and earn a specialty certification in Medical‑Surgical Nursing.
    Over the next five years, he envisions implementing evidence‑based protocols that improve patient outcomes while mentoring the next generation of nurses, and ultimately retiring with a legacy of a well‑structured,
    compassionate nursing team.
