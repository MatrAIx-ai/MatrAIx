  hobbies: '[''Gardening'', ''Quilting'', ''Church Choir Participation'', ''Walking with Greyhound'', ''Classic Country Music Listening'', ''Bridge (card game)'', ''Community Potluck Events'']'
  career_goals: Although she enjoys the stability of her current role, Florence is aiming to transition into a supervisory position within the next two years. She hopes to become an assistant store manager,
    where she can shape staff schedules, mentor younger employees, and implement more structured sales processes. Long‑term, she dreams of opening a modest boutique that reflects her taste for Southern
    home décor and personalized customer service, allowing her to combine her retail expertise with entrepreneurial ambitions while maintaining a predictable, locally rooted operation.
