persona_description: A media historian who specializes in the study of early sound media, particularly the world's oldest sound recordings. His research interests include the history and preservation of
  early sound media, the use of technology to bring history to life, and the ethical and emotional implications of using such techniques. He is a three-time Grammy nominee and co-founder of the First Sounds
  Initiative, and currently works as Media Preservation Specialist for the Media Digitization and Preservation Initiative.
