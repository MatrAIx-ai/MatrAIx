persona_description: A Product Data Management Specialist who is responsible for managing and organizing product-related data from various sources across computer platforms, divisions, departments, and
  geographic locations. The individual must ensure timely access to consistent up-to-date product information and improve information flow, cross-functional communications, and support services. They are
  also responsible for calculating the primary definition of annual dollar value of shipments per employee, which is a key metric for evaluating productivity and performance. Additionally, they must understand
  and implement quick-changeover techniques, QS 9000 certification, and reliability-centered maintenance methodologies. They also must be proficient in real-time feedback, root cause analysis, safety-improvement
  programs, supervisory control and data acquisition, and SCADA system integration.
