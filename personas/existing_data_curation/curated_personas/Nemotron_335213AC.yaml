personas:
  professional: Elizabeth Vega is an aspiring community program coordinator who leverages their bilingual fluency, meticulous event‑planning skills, and calm conflict‑resolution style to design seamless
    outreach initiatives for immigrant families in Utah.
  sports: Elizabeth Vega fuels their love of the outdoors by hiking with the Wasatch Trailblazers club in the spring and fall, cheering on the Utah Jazz during basketball season, and dancing salsa three
    times a week, which they treat as both cardio and cultural expression.
  arts: Elizabeth Vega finds artistic inspiration in salsa music legends like Celia Cruz and modern choreographers at local dance workshops, regularly attending performances at the Utah Symphony and exploring
    visual art through the works of Frida Kahlo and contemporary muralists, which they often capture in their travel scrapbook.
  travel: Elizabeth Vega prefers meticulously planned road trips that balance adventure with relaxation, having recently explored the red rock canyons of Sedona and the historic streets of Cartagena, while
    their modest budget steers future travel aspirations toward a cultural immersion week in Oaxaca.
  culinary: Elizabeth Vega enjoys cooking homemade arepas filled with black beans, shredded beef, and cheese, alongside pabellón featuring sweet plantains and seasoned rice, showcasing a proficient yet
    experimental kitchen style that they share at family gatherings and community potlucks.
  core: Elizabeth Vega blends methodical organization with an outgoing spirit, turning every community event, salsa night, or weekend hike into a well‑orchestrated celebration, even if they sometimes over‑schedule
    their calendar and rely on caffeine to stay energized.
background:
  cultural: Elizabeth is a first‑generation Venezuelan‑American. She grew up speaking Spanish at home and celebrating Venezuelan holidays such as Día de la Independencia and Carnaval, while also embracing
    the outdoor, family‑oriented culture of Utah. Her marriage and close‑knit extended family emphasize loyalty and mutual support, values that influence her cooperative nature. She balances the warmth
    and hospitality of her Latin heritage with the practical, community‑service spirit she has found in Provo.
attributes:
  skills: '[''Bilingual Communication (Spanish‑English)'', ''Event Planning and Coordination'', ''Digital Scheduling and Calendar Management'', ''Basic Bookkeeping'', ''Volunteer Management'', ''Social
    Media Content Creation'', ''Conflict Resolution'']'
  hobbies: '[''Cooking Venezuelan Cuisine'', ''Salsa Dancing'', ''Hiking in Utah'', ''Volunteering at Community Meals Programs'', ''Yoga'', ''Scrapbooking'', ''Reading Personal Development Books'']'
  career_goals: Elizabeth aims to complete her associate degree in Business Administration and obtain a project‑management certification within the next two years. She hopes to secure a full‑time position
    as a community program coordinator for a nonprofit serving immigrant families in Utah, with a long‑term ambition of leading a multicultural outreach center that offers language classes, job‑readiness
    workshops, and cultural events. She also envisions further education in social work to deepen her impact.
