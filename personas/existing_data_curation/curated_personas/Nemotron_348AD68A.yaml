  hobbies: '[''Reading'', ''Knitting'', ''Gardening'', ''Cooking Puerto Rican cuisine'', ''Walking in parks'', ''Birdwatching'', ''Crossword puzzles'', ''Listening to classical music and jazz'', ''Watercolor
    painting'']'
  career_goals: Although retired from formal employment, Lidubina’s ambition is to remain an active pillar of her community. She aims to mentor emerging teachers, expand intergenerational literacy programs,
    and preserve Puerto Rican traditions among local youth. She hopes to compile her life experiences into a memoir that celebrates resilience and cultural heritage. Lidubina also plans to organize an annual
    cultural gathering that blends Puerto Rican music, dance, and cuisine with the Minneapolis arts scene, and to develop a small community garden that offers a quiet, structured space for reflection, learning,
    and communal interaction. Maintaining her health, supporting her husband, and ensuring a stable, nurturing home environment are central to her personal goals.
