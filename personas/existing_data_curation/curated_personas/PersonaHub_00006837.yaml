persona_description: A team of computer scientists and engineers at De Montfort University, UK, who have developed a cluster of high-performance computers to create an artificial intelligence supercomputer.
  The team, led by Professor Ferrante Neri and Dr Lorenzo Picinali, have created a way to link their cluster of computers to utilise their unused resources, especially at weekends and night-times. The Memenet
  project, controlled by an external computer across the road in Gateway House, has been working in the background, creating algorithms without affecting work being done by students. The beauty of the Memenet
  project is that it costs little more than the extra electricity used, making it a cost-effective solution for creating an artificial intelligence supercomputer. The team's research interests include optimisation
  problems, algorithm design, and the development of intelligent machines.
