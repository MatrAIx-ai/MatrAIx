personas:
  professional: Kiara Smith is a CPA‑eligible accountant who blends rigorous financial auditing expertise with a flair for data‑visualization art, and they use Python, Tableau, and ERP systems to streamline
    audit procedures while championing ESG reporting for nonprofit arts organizations, reflecting their curiosity and assertive collaboration style.
  sports: Kiara Smith enjoys cross‑country skiing on Powder Ridge trails in winter, paddling the Chain of Lakes during summer, hiking with the Minnesota Outdoor Club at Lebanon Hills State Park, and they
    follow the Minnesota Wild and Minnesota Twins, cheering their teams on from the local sports bar on game nights.
  arts: Kiara Smith explores Minnesota’s vibrant art scene by frequenting the Minneapolis Institute of Art, sketching in local galleries, drawing inspiration from Monet, Frida Kahlo, and contemporary data‑visualization
    installations, while they unwind listening to Sufjan Stevens and attending performances at the Guthrie Theater, integrating artistic curiosity into both leisure and professional work.
  travel: Kiara Smith prefers thoughtfully planned weekend getaways to nearby cultural hubs like Chicago and Door County for food and art tours, balances adventure with budget-consciousness using travel
    apps, and dreams of a spring immersion in Florence to study Renaissance frescoes, while they schedule trips around CPA exam study blocks.
  culinary: Kiara Smith, an enthusiastic home cook, enjoys experimenting with seasonal Midwestern fare such as grilled walleye with fresh dill and lemon, crafting vegan lentil shepherd’s pie with smoky
    paprika, and perfecting sourdough starter while they often source heirloom tomatoes, locally foraged mushrooms, and exotic spices like sumac for flavor experiments.
  core: Kiara Smith merges analytical precision with artistic imagination, turning audit spreadsheets into vibrant visual stories while they balance a disciplined career trajectory with spontaneous outdoor
    adventures and occasional indulgences in watercolor pigments and gourmet cooking.
background:
  cultural: Kiara grew up in a suburban community in the Twin Cities metropolitan area, rooted in Midwestern values of hard work, modesty, and community involvement. Her family, of European ancestry, emphasized
    education and civic engagement, with parents who worked in education and small‑business management. Exposure to local cultural events, such as county fairs and regional art festivals, nurtured her appreciation
    for both tradition and creativity. Living in Dakota County has given her a close connection to Minnesota’s natural landscapes and a pragmatic, collaborative outlook, while her STEM education and professional
    experience have broadened her perspective to include global financial standards and contemporary art trends.
attributes:
  skills: '[''Financial Auditing'', ''Regulatory Compliance'', ''Tax Preparation'', ''Data Analysis (Excel, SQL, Python)'', ''ERP Systems (SAP, Oracle NetSuite, QuickBooks)'', ''Data Visualization (Tableau,
    Power BI)'', ''Risk Assessment and Internal Controls'', ''Quantitative Modeling'', ''Client Communication'', ''Negotiation and Conflict Resolution'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Data‑visualization art'', ''Hiking'', ''Kayaking'', ''Cross‑country skiing'', ''Reading contemporary fiction and non‑fiction'',
    ''Experimental cooking'', ''Volunteering as a financial mentor for youth arts program'', ''Attending tech meetups'', ''Yoga and mindfulness practice'']'
  career_goals: Kiara aims to earn her CPA designation within the next year and advance to a senior audit manager role at a Big Four accounting firm, where she can lead multi‑disciplinary teams on complex
    engagements. She is passionate about integrating sustainability and ESG metrics into traditional audit practices, and she aspires to become a recognized expert in ESG reporting for nonprofit arts organizations.
    In the longer term, she envisions founding her own boutique consultancy that blends data‑driven financial advisory with creative‑sector expertise, helping galleries, museums, and cultural nonprofits
    achieve financial resilience while promoting artistic innovation.
