  hobbies: '[''Soccer (recreational league)'', ''Community basketball'', ''Fishing'', ''Kayaking'', ''Hiking'', ''Home brewing'', ''Woodworking'', ''DIY electronics'', ''STEM mentoring'']'
  career_goals: James aims to advance to a senior engineering role where he can lead a research and development team focused on sustainable material solutions. He plans to earn a Six Sigma Black Belt and
    become a licensed Professional Engineer within the next five years. Ultimately, he aspires to transition into a managerial position overseeing multiple product lines, and later, to launch his own consultancy
    specializing in materials innovation for aerospace and automotive industries.
