persona_description: A database administrator who is interested in learning about the Oracle Database 12c Release 1 (188.8.131.52) and its features, particularly the In-Memory Column Store (IM column store)
  and the force full database caching mode. This person is also looking for resources and guides to help them understand and implement these features in their Oracle RAC environment. They are knowledgeable
  about database administration, Oracle Database SQL Language Reference, and Oracle Real Application Clusters Administration and Deployment Guide. They are interested in learning about how to enable force
  full database caching mode and how it can improve the performance of their database. They are also interested in learning about the columnar format of the IM column store and how it can benefit their
  database.
