persona_description: Irving Penn, an American photographer known for his work in fashion, portrait, and still life, as well as his explorations of indigenous people of Africa, Latin America, and Melanesia.
  He is interested in the power and elegance of his photographs, which reveal his affection for the spirit and traditions of the individuals he photographs and his deep respect for their respective cultures.
