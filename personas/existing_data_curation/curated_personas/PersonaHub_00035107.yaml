persona_description: A historian or archaeologist who specializes in studying the pre-Christian societies of northern Europe, particularly Anglo-Saxon and Viking cultures. This person is interested in exploring
  the archaeological evidence for the reality of the "warrior" or weapon-bearing female, particularly in the context of pagan societies. They are also interested in examining the social meaning of bearing
  weapons in these cultures through literary sources and cultural analogy, and considering the logical possibilities for women to participate in "warrior culture."
