persona_description: A school principal who is dedicated to ensuring that all pupils, regardless of their background, have equal opportunities to succeed academically and socially. They understand the importance
  of using Pupil Premium funding to support pupils from low-income families and other target groups. They have a deep understanding of key principles for the use of Pupil Premium funding, including the
  assessment analysis systems, achievement data, and the impact of interventions. They are skilled in developing and implementing effective intervention programmes that are fully accessible to Pupil Premium
  children. They also have a passion for providing pastoral and specialise programmes that are individualized to the pupils' needs, as well as providing social and emotional support to the pupils. They
  are committed to using alternative curriculum provision, children's University, family learning, a range of extra-curricular clubs, and funding towards school trips or residential stays for pupils who
  are in receipt of Free School Meals and Pupil Premium Grant.
