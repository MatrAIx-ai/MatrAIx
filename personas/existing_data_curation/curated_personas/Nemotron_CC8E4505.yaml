  hobbies: '[''reading speculative fiction'', ''creative writing'', ''acrylic painting'', ''digital illustration (Procreate)'', ''hiking local trails'', ''birdwatching'', ''yoga'', ''participating in a
    book club'', ''volunteering at the community library'', ''curating local folk art displays'']'
  career_goals: Jody aims to move beyond a traditional secretarial role into an office manager or executive assistant position where she can oversee a small team and shape office culture. She plans to earn
    a certification in project management or advanced office administration within the next two years, and she hopes to integrate her artistic sensibilities by curating workplace wellness initiatives, such
    as creative workshops or visual communication projects. Ultimately, she envisions a hybrid role that blends administrative leadership with content creation or communications, allowing her to leverage
    both her organizational strengths and imaginative interests.
