personas:
  professional: Jody Bozard is a detail‑driven administrative specialist who leverages their knack for creative problem‑solving and Canva‑styled communications to streamline workflows, while quietly championing
    innovative wellness workshops as a stepping stone toward an office‑manager role.
  sports: Jody Bozard enjoys the solitary rhythm of early‑morning hikes on the Benson trail network, follows the Arizona Diamondbacks and Phoenix Suns, and occasionally joins the local Benson Trail Runners
    club for weekend group runs while keeping a modest yoga practice for flexibility.
  arts: Jody Bozard immerses themselves in speculative fiction and contemporary poetry, channeling the surreal imagination of Neil Gaiman, the lyrical depth of Ocean Vuong, and the abstract color play of
    Wassily Kandinsky into acrylic paintings, Procreate sketches, and occasional indie‑film nights featuring Sofia Coppola.
  travel: Jody Bozard prefers deliberately planned, low‑key getaways, having recently trekked the red rocks of Sedona, explored the historic streets of Kyoto, and dreaming of a solo cabin retreat in Iceland
    to reap silent inspiration for their writing.
  culinary: Jody Bozard enjoys a moderate cooking skill level, favoring bright Mediterranean dishes like grilled halloumi with lemon‑oregano quinoa, quick veg‑stir‑fry with tamari, and indulgent weekend
    brunches of avocado toast topped with poached egg and smoked salmon.
  core: Jody Bozard is a quietly ambitious, art‑infused administrator who balances meticulous scheduling with spontaneous sketching, battles occasional coffee‑driven impulsivity, and finds calm in yoga‑guided
    moments between inboxes and brushstrokes.
background:
  cultural: Jody grew up in a modest, middle‑class family in the rural South of North Carolina, where community ties and hospitality were central. Her upbringing emphasized self‑reliance, respect for tradition,
    and an appreciation for Southern folk art and music. Frequent church gatherings and local festivals exposed her to a blend of religious and cultural practices that value modesty and communal support.
    While she identifies as white, she embraces the regional heritage of storytelling, craftsmanship, and a strong work ethic, which continue to shape her worldview and interpersonal style.
attributes:
  skills: '[''office administration'', ''calendar management'', ''email correspondence'', ''document preparation'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Google Workspace'', ''data entry'',
