  hobbies: '[''Recreational soccer league'', ''Hiking in the Cascade mountains'', ''Volunteering at Mexican cultural festivals'', "Cooking traditional Mexican cuisine", ''Dancing to regional music'', ''DIY
    mechanical repair workshops'']'
  career_goals: Jose aims to transition from a frontline material mover to a supervisory role within the next three years, targeting a shift lead or warehouse supervisor position. He plans to earn a Certified
    Logistics Associate credential and complete a series of safety leadership courses to qualify for a warehouse manager track. Long‑term, Jose envisions launching his own small-scale logistics or moving
    company that leverages his organized approach and community ties, while also providing stable, structured employment opportunities for other workers in the Seattle area.
