    trend adaptation", "performance metrics tracking", "emergency response and crisis handling"]'
  hobbies: '["backyard gardening", "canning and jam making", "reading classic mysteries and biographies", "watching cooking shows and listening to culinary podcasts", "senior‑center card games and bingo",
    "volunteering at a community kitchen", "knitting", "journaling"]'
  career_goals: Even at 95, Amanda aims to transition from day‑to‑day management to a mentorship and consulting role, preserving the operational legacy of the restaurant she has led for decades. She hopes
    to author a concise guide on practical kitchen management for younger restaurateurs, emphasizing balance between organization and flexibility. Amanda also aspires to implement a modest sustainability
    program—reducing waste and sourcing a portion of produce locally—to leave a lasting positive impact on the community. Maintaining her health and independence remains a priority, so she seeks to adjust
    her responsibilities to a part‑time advisory capacity while ensuring the establishment continues to thrive under her standards of excellence.
