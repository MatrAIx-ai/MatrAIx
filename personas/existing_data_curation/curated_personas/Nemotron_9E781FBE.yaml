personas:
  professional: Amanda Ewert, a 95‑year‑old veteran food‑service manager with seven decades of hands‑on operational expertise, blends a keen curiosity for new culinary trends with a disciplined, cost‑controlled
    approach to staffing, scheduling, and food‑safety compliance, while their competitive nature drives them to mentor younger restaurateurs and preserve the restaurant’s legacy.
  sports: Amanda Ewert, a dedicated member of the local senior center’s gentle‑exercise club, enjoys daily walks around the garden, participates in weekly chair yoga sessions, and passionately follows the
    Durham Bulls baseball team, yet their competitive streak often leads them to unofficially tally batting averages during games for personal amusement.
  arts: Amanda Ewert, an avid consumer of classic mystery novels by Agatha Christie, historical biographies by David McCullough, and culinary media such as The Great British Bake Off and the podcast The
    Sporkful, also delights in listening to Ella Fitzgerald’s recordings, which together nurture their curiosity while offering a comforting escape from daily stress.
  travel: Amanda Ewert, who prefers meticulously planned, short‑duration trips within a comfortable budget, has explored historic Savannah’s squares, taken a guided culinary tour of Asheville’s farm‑to‑table
    restaurants, and dreams of a relaxed pilgrimage to Provence’s lavender fields, all while balancing the desire for adventure with concerns about health and mobility.
  culinary: Amanda Ewert, drawing on a lifetime of restaurant management, cultivates heirloom tomatoes, basil, and rosemary in a modest backyard garden, expertly cans seasonal jams like strawberry‑rhubarb,
    and crafts menu‑inspired dishes such as sun‑dried tomato focaccia, while staying updated on industry trends through cooking shows and podcasts that satisfy both their curiosity and practical resourcefulness.
  core: Amanda Ewert, a 95‑year‑old culinary veteran, blends relentless curiosity with disciplined practicality, mentors the next generation, tends a thriving garden, and cautiously navigates finances and
    health with a competitive yet worry‑prone spirit.
background:
  cultural: Amanda is a white American whose upbringing in the post‑World War II era was shaped by the values of self‑reliance, hard work, and community service prevalent in mid‑century California. Raised
    in a modest household that emphasized home economics, she learned the fundamentals of cooking, budgeting, and food preservation early on. Living in Riverside County has exposed her to the region’s agricultural
    roots and the diverse culinary influences of Southern California, especially Mexican and Latino food traditions, which have subtly flavored her own cooking style. Her cultural identity blends classic
    American comfort food with an appreciation for the farm‑to‑table ethos that has become integral to the local food scene.
attributes:
  skills: '["staff recruitment and onboarding", "team training and mentorship", "conflict resolution and mediation", "shift scheduling and flexibility management", "food safety and sanitation compliance",
