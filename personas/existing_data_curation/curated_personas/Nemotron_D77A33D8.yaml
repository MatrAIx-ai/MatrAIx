  career_goals: Although she is officially retired, Carolette remains driven to leverage her expertise for the next generation and her community. Her primary ambition is to launch a scholarship fund for
    Black women pursuing STEM fields, paired with a mentorship program at the local community center. She also intends to author a memoir that intertwines her scientific career with the African‑American
    experience of the Great Migration, and to speak at regional conferences on age‑inclusive technology. Maintaining her mental acuity by learning emerging data‑science tools and traveling to sites of African
    heritage are additional long‑term goals.
