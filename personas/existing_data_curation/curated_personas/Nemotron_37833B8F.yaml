  hobbies: '[''Visiting regional art museums'', ''Playing bridge'', ''Weekly chess matches'', ''Photography of historic sites'', ''Gardening native wildflowers'', ''Reading historical fiction'', ''Genealogy
    research'', ''Volunteer tutoring for computer basics'', ''Attending jazz and classical concerts'', ''Organizing senior art‑appreciation workshops'']'
  career_goals: In retirement, Franklin aims to become a mentor and cultural steward for Caldwell. He plans to launch a community‑wide oral‑history project that records stories of senior residents, compile
    the material into a digital archive, and eventually publish a locally‑focused memoir that highlights Texas folk art and regional traditions. He also seeks to establish a monthly art‑appreciation workshop
    at the senior center, encouraging participants to explore unconventional mediums such as digital collage. Competitively, he hopes to lead his bridge team to a county championship and to qualify for
    the state senior chess tournament, using these platforms to inspire younger players.
