personas:
  professional: Xiomara Cirilo, a seasoned hospitality professional with over three decades of high‑volume waitstaff experience, channels their meticulous organization, bilingual fluency, and natural assertiveness
    into mentoring junior staff and envisioning a culturally infused café that celebrates community art and tradition.
  sports: Xiomara Cirilo, an active member of the Rio Rancho senior walking club and a devoted supporter of New Mexico United soccer, structures daily walks and weekly yoga sessions into their routine while
    they passionately cheer at matches, using community folk‑dance rehearsals as a low‑impact fitness outlet.
  arts: Xiomara Cirilo, a frequent visitor to the Albuquerque Museum of Art and the National Hispanic Cultural Center, draws inspiration from Frida Kahlo, Georgia O'Keeffe, and Lila Downs, capturing local
    festivals through digital photography and performing in a folk‑dance troupe that blends traditional rhythms with contemporary flair.
  travel: Xiomara Cirilo, a culturally curious traveler, meticulously plans weekend trips to Santa Fe, Taos Pueblo, and the Grand Canyon, while dreaming of an immersive pilgrimage to Oaxaca’s historic markets
    and cherishing spontaneous day‑trips sparked by local festivals.
  culinary: Xiomara Cirilo, a passionate home chef, perfects mole poblano, chiles en nogada, and New Mexican green‑chili stew, tends a herb garden of cilantro, oregano, and epazote, and they love experimenting
    with quinoa‑lime salads, though they occasionally over‑salt dishes in their zeal to balance bold flavors.
  core: Xiomara Cirilo blends disciplined hospitality leadership with a vibrant passion for food, art, and community, often juggling café ambitions with a habit of impulsively buying kitchen gadgets, all
    while radiating sociable energy and a meticulous eye for cultural detail.
background:
  cultural: Born to Mexican immigrant parents and raised in a bilingual household in New Mexico, Xiomara’s life is rooted in Mexican traditions such as Día de los Muertos celebrations, family recipes, and
    Catholic rituals. Living in Rio Rancho, she embraces the multicultural tapestry of the Southwest, blending Mexican heritage with Pueblo influences in food, art, and festivals. Her fluency in Spanish
    and English makes her a cultural bridge in her workplace and community, and her strong family ties and community involvement reflect the collectivist values of her background.
