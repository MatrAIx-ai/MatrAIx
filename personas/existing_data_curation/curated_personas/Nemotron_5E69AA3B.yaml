  hobbies: '["Visiting art galleries", "Attending community theater", "Folkloric dance", "Cooking traditional Mexican cuisine", "Digital photography", "Herb gardening", "Reading historical fiction", "Volunteering
    for storytelling", "Community arts workshops", "Spanish language book club"]'
  career_goals: At 64, Xiomara aims to move into a supervisory role, such as shift manager or assistant manager, where she can apply her high standards and mentorship instincts to develop younger staff.
    She also dreams of opening a small family‑run café that blends traditional Mexican flavors with New Mexican cuisine, offering cultural events and art showcases. Additionally, she plans to volunteer
    as a mentor in local hospitality apprenticeship programs, sharing her expertise while staying engaged with her community.
