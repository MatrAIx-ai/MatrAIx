  machinery applications, where they can use smart SSI sensors to ignore erroneous data for a specific moment and trigger a shutdown fault signal in the event of violent part failure. Their technical knowledge
  and expertise in the design and development of electronic filtering systems make them a valuable asset to the company's product development team.
