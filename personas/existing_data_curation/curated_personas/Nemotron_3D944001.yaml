personas:
  professional: Bounchanh Crisostomo, an aspiring junior architect with a knack for turning LEGO builds and Minecraft creations into real‑world design ideas, channels their love of routine and teamwork
    into school science projects and community play‑set initiatives, balancing a practical mindset with a sociable, outgoing energy.
  sports: Bounchanh Crisostomo, a devoted member of the local youth soccer league and the school’s basketball club, idolizes the senior varsity basketball team, the City Hawks, and follows the professional
    soccer club, Metro FC, while preferring familiar after‑school practice routines over spontaneous pick‑up games.
  arts: Bounchanh Crisostomo, a creative enthusiast who spends weekends building elaborate LEGO sets and crafting pixelated worlds in Minecraft, also devours adventure novels by Rick Riordan and J.K. Rowling,
    and trades baseball cards featuring legends like Babe Ruth and Mickey Mantle, finding inspiration in the vivid illustrations of comic artist Jim Lee and the whimsical scores of composer Danny Elfman.
  travel: Bounchanh Crisostomo, a fan of well‑planned getaways, has enjoyed a family vacation to the historic districts of Kyoto, longs to experience the neon‑lit streets of Tokyo, and eagerly anticipates
    a future road trip to the nearby seaside town of Oceanview, always packing a checklist to keep the travel routine smooth.
  culinary: Bounchanh Crisostomo, who loves helping prepare aromatic pho broth with star anise and delicate bánh chưng rice cakes during holidays, also enjoys crafting pepper‑topped pizza slices, slurping
    ramen, and savoring mango‑sticky rice, often experimenting with fresh herbs like cilantro and basil in the kitchen.
  core: Bounchanh Crisostomo blends a practical, routine‑loving mind with an outgoing, collaborative spirit, balancing LEGO engineering and soccer drills while juggling worry‑induced perfectionism and a
    knack for trading baseball cards.
background:
  cultural: Bounchanh is a second‑generation Southeast Asian American, with his family roots in Vietnam. Raised in Salt Lake City, he grows up in a bilingual household where Vietnamese language and customs
    are celebrated alongside mainstream American life. The family observes traditional holidays like Tet, preparing dishes such as pho, bánh mì, and sticky rice desserts, and they participate in community
    events that connect them with other Vietnamese families in the area. While he embraces the local culture of Utah—enjoying outdoor sports and school activities—he also retains a strong respect for family
    values, respect for elders, and the communal spirit emphasized in his cultural heritage.
