  career_goals: He dreams of a future where he can combine his love for helping others with a stable, practical career. He envisions becoming a teacher or school counselor who creates a supportive, routine‑filled
    environment for students. He is also intrigued by technology and hopes to study computer science later, perhaps designing educational games that bring kids together. His ambition centers on a role that
    offers security, allows him to nurture others, and lets him apply his organized and caring nature.
