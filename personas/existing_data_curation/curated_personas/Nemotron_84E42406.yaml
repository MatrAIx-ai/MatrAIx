  hobbies: '[''landscape sketching'', ''watercolor painting'', ''LEGO building'', ''reading sci‑fi/fantasy novels'', ''Minecraft (creative mode)'', ''biking on local trails'', ''nature photography'', ''listening
    to indie/instrumental music'', ''volunteering at animal shelter'']'
  career_goals: Brada dreams of merging his love for art and science by becoming an environmental illustrator or wildlife photographer, using visual storytelling to raise awareness about conservation in
    the Finger Lakes region. He also considers a future in environmental education, hoping to teach middle‑school students about nature and sustainable practices. In the long term, he aspires to lead community
    projects that combine artistic expression with ecological stewardship, such as creating mural‑based public art that celebrates local ecosystems.
