personas:
  professional: Brada Kolb is a budding visual artist who combines a love for sketching Cayuga Lake’s shoreline with meticulous watercolor experiments and intricate LEGO constructions, channeling their
    curiosity into a disciplined practice that balances organized study sessions with spontaneous creative bursts, while their compassionate nature drives them to share art tutorials with peers at school.
  sports: Brada Kolb enjoys regular bike rides along the Cayuga Lake trail and participates in the Cayuga Lake Youth Cycling Club, cheering on the Buffalo Bills during football season and the New York Knicks
    in basketball, while also taking part in community swim lessons at the local YMCA during summer holidays.
  arts: Brada Kolb immerses themselves in artistic expression by sketching lake vistas, exploring watercolor palettes, and building elaborate LEGO models, all while listening to indie instrumental artists
    such as Ólafur Arnalds, Bon Iver, and Explosions in the Sky; they find inspiration in fantasy novels like "The Hobbit" and "Ender's Game".
  travel: Brada Kolb’s travel style blends spontaneous bike excursions through the wooded shoreline of Cayuga Lake with family road trips to iconic spots such as Niagara Falls and the Adirondack Mountains,
    dreaming of future adventures to Yellowstone National Park and the coastal towns of Cornwall, England, while always keeping a scrapbook of travel stickers collected from each journey.
  culinary: Brada Kolb enjoys a mix of home‑cooked staples and experimental snacks, favoring pizza with fresh basil, spaghetti carbonara, and homemade berry smoothies blending blueberries, strawberries,
    and a splash of almond milk; they occasionally burn pancakes after late‑night Minecraft marathons, revealing a typical teen quirk.
  core: Brada Kolb is a curious, compassionate 12‑year‑old who merges artistic ambition with a love for nature, balancing meticulous planning with spontaneous creativity, while they juggle a modest allowance,
    mild allergies, and a penchant for indie instrumental music.
background:
  cultural: Brada comes from a multigenerational white family rooted in the rural communities of upstate New York. His grandparents were farmers in the Finger Lakes region, and the family maintains traditions
    of seasonal harvest celebrations, church gatherings, and community fairs. Growing up in Jordan, NY, he has been shaped by the town’s close‑knit atmosphere, a strong emphasis on self‑reliance, and a
    respect for the natural environment surrounding Cayuga Lake. The local school and community programs encourage involvement in arts, environmental stewardship, and volunteerism, all of which influence
    his values and interests.
