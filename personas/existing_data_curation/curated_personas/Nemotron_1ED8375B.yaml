  career_goals: Although not yet in the workforce, Ruth envisions a future career that merges her love for helping others with her practical mindset. She is drawn to roles that allow her to use her empathy
    and problem‑solving skills, such as becoming a community health aide, an early‑childhood educator, or a youth mentor in recreational programs. She hopes to cultivate a stable, supportive work environment
    that can mitigate her heightened emotional reactivity, and she aspires to gain additional training—perhaps through vocational courses or community college—to develop expertise in areas like basic counseling
    techniques or program coordination. Ultimately, Ruth wants a job that lets her make a tangible, positive impact while offering clear, manageable routines.
