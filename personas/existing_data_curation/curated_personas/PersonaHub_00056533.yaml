persona_description: A teacher who specializes in teaching life science concepts to students in Levels 1-3, focusing on engaging experiments, identifying living/non-living traits, and understanding basic
  body parts and life cycles of plants and animals. The teacher aims to teach students about the importance of understanding the difference between producers and consumers and their roles in environmental
  change, recycling, and renewable resources. The teacher also emphasizes the importance of identifying the names and characteristics of common animals and their basic characteristics.
