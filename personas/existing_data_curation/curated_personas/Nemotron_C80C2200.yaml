  career_goals: Betty aspires to move into senior technical leadership, aiming to become a Director of Engineering or VP of Product where she can shape the roadmap of innovative software solutions. She
    is especially interested in building platforms that empower creative professionals, merging her tech skillset with her love for art and design. In the medium term, she plans to lead a cross‑functional
    team that delivers data‑driven products and to earn recognition for driving both technical excellence and business impact. Ultimately, she envisions launching her own SaaS venture that combines AI‑powered
    design tools with robust analytics, positioning herself as a competitive entrepreneur in the tech‑creative space.
