personas:
  professional: Betty Gayo, a 33‑year‑old full‑stack developer who builds scalable React and Node.js applications on AWS and Azure, leverages her keen eye for design and business‑savvy analytics to craft
    intuitive user experiences while channeling her competitive drive and community‑oriented mindset into leading hackathon teams and mentoring junior engineers.
  sports: Betty Gayo stays active by sprinting on the Wichita Running Club’s weekly prairie‑trail runs, playing recreational volleyball at the community center during summer, and cheering on the Wichita
    Thunder hockey team and Kansas City Chiefs football squad, balancing her competitive spirit with a relaxed approach to fitness that includes evening yoga sessions.
  arts: Betty Gayo fuels her UI design instincts by regularly attending Wichita Art Museum exhibitions of contemporary painter Julie Mehretu, immersing herself in indie folk concerts featuring Iron & Wine,
    and performing improv at the community theater where she channels the storytelling flair of Lin‑Manuel Miranda into her pixel‑perfect prototypes.
  travel: Betty Gayo plans her getaways with a blend of spreadsheet budgeting and spontaneous road‑trip instincts, enjoying weekend escapes to Colorado’s Rocky Mountain National Park and annual visits to
    New York’s design conferences, while dreaming of a spring immersion in Kyoto’s tea‑house culture and a summer art‑focused pilgrimage to Barcelona’s street murals.
  culinary: Betty Gayo, an enthusiastic home chef, often whips up rosemary‑infused roasted chicken, spicy chicken tikka masala with garam masala and fresh cilantro, and Kansas City‑style smoked ribs, delighting
    in farmers‑market finds like heirloom tomatoes and locally sourced bison while occasionally treating herself to a Michelin‑star tasting menu in Chicago.
  core: Betty Gayo, a 33‑year‑old tech‑savvy creative, balances a relentless competitive edge with a love for community art, battles chronic worry through yoga and caffeine‑fuelled late‑night coding, and
    can’t resist curating Instagram‑ready photos of prairie sunsets while often over‑booking her calendar.
background:
  cultural: Betty grew up in the Midwest, with her formative years spent in a middle‑class suburb of Wichita. Her family’s roots trace back to European immigrant ancestors, giving her a blend of German
    and Irish heritage that shaped a modest, community‑oriented outlook. The Midwestern values of hard work, self‑reliance, and straightforward communication are evident in her professional demeanor, while
    the region’s vibrant local arts scene—annual festivals, community theaters, and the Wichita Art Museum—nurtured her appreciation for creativity. As a divorced professional in her early thirties, she
    balances independence with a strong sense of belonging to her local network, often contributing to volunteer initiatives and city events.
