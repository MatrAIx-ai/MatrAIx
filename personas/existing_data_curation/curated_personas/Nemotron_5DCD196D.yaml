  hobbies: '[''Folklórico dancing'', ''Hiking and nature walks'', ''Baking Mexican pastries'', ''Volunteer work at community events'', ''Recreational soccer'', ''Exploring music'', ''Learning basic coding'']'
  career_goals: Adela plans to enroll in a community college or university to major in communications, public health, or marketing, leveraging her bilingual abilities and passion for community outreach.
    She aspires to work as a community outreach coordinator or marketing assistant for local businesses or non‑profit organizations, where she can blend her practical skills with creative ideas. Long‑term,
    she hopes to develop programs that bridge cultural gaps and promote health education in her hometown and broader Mexican‑American communities.
