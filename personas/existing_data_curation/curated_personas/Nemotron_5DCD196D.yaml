personas:
  professional: Adela Vargas is an aspiring community outreach coordinator who leverages fluent bilingual communication, strong teamwork, and a practical curiosity to design inclusive health‑education campaigns
    for local non‑profits while juggling school projects and event planning with organized flexibility.
  sports: Adela Vargas enjoys hiking the Blue Ridge trails with the local Trailblazers Club, plays forward for the co‑ed River Valley Rovers soccer league, and roots for the Charlotte Hornets during basketball
    season, balancing structured workouts with spontaneous weekend runs.
  arts: Adela Vargas dives into creative expression by performing folklórico choreography, curating eclectic Spotify playlists that range from Lila Downs to Tame Impala, and drawing vibrant flyers for community
    events using Adobe Photoshop, finding inspiration in both traditional rhythms and modern indie sounds.
  travel: Adela Vargas prefers adventure‑filled road trips, having explored the historic streets of Savannah, trekked the Appalachian Trail, and visited the colorful markets of Oaxaca, while dreaming of
    a future backpacking tour through the Andes and a relaxing beach stay in Tulum.
  culinary: Adela Vargas delights in baking conchas and churros from scratch, mastering the perfect cinnamon sugar swirl while also experimenting with avocado toast topped with pico de gallo, and they often
    host late‑night snack sessions where friends sample homemade mole sauce with quinoa.
  core: Adela Vargas blends charismatic sociability with a pragmatic curiosity, juggling community projects, dance rehearsals, and a love for coding, all while occasionally over‑committing and sneaking
    midnight snacks before early classes.
background:
  cultural: Adela is a second‑generation Mexican‑American raised in a bilingual household that values family, community, and tradition. She celebrates Mexican holidays such as Día de los Muertos and Cinco
    de Mayo, and she enjoys cooking and sharing traditional dishes with friends and neighbors. Her Catholic upbringing influences her participation in community service and church activities. Living in
    Linden, Virginia, she blends her Mexican heritage with the local Appalachian culture, embracing both the festive, communal spirit of her roots and the rural, close‑knit community atmosphere of her hometown.
