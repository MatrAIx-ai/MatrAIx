    at the library reading program'']'
  career_goals: Michael dreams of a future where he can blend his love for nature, practical problem-solving, and helping others. He hopes to become a wildlife biologist or environmental engineer so he
    can protect local forests and lakes, and he also imagines joining a community outreach program that teaches younger kids about the outdoors. As he grows, he wants to develop his leadership skills to
    guide group projects and ensure everyone's voice is heard.
