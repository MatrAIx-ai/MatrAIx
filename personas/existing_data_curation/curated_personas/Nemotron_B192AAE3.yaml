personas:
  professional: Michael Joyce is a curious 11-year-old student who channels his practicality and love of teamwork into leading his school's LEGO Robotics club, where he balances new design ideas with tried-and-true
    building methods, even if his notebook often ends up a bit disorganized.
  sports: Michael Joyce is an enthusiastic member of the Hartland Youth Soccer Club, often cheering for the New England Revolution and the Boston Red Sox while sprinting through the woods on weekends, preferring
    spontaneous bike rides over structured workouts, and they love the camaraderie of team practices.
  arts: Michael Joyce devotes downtime to building elaborate LEGO models inspired by the imaginative worlds of Rick Riordan's Percy Jackson series, enjoys listening to Imagine Dragons and the soundtrack
    of Disney's Moana, and they occasionally perform a dramatic reading of The Ranger's Apprentice for the library's kids' program.
  travel: Michael Joyce loves spontaneous day trips to nearby state parks like Acadia for birdwatching, dreams of visiting the Harry Potter Studio Tour in London, and they prefer family road trips over
    pricey flights, always packing a backpack full of snacks and a field guide for insects.
  culinary: Michael Joyce enjoys cooking simple meals like macaroni-and-cheese and pepperoni pizza, experiments with topping cupcakes with LEGO-shaped sprinkles, and they often forget to tidy up the kitchen
    afterward.
  core: Michael Joyce blends boundless curiosity with a laid-back, sometimes scatter-brained approach, turning group games, LEGO builds, and nature hikes into a lively but occasionally worry-prone childhood
    adventure that they cherish.
background:
  cultural: 'Michael comes from a typical Midwestern white family in Hartland, Wisconsin, with roots in German and Scandinavian ancestry that are common in the region. His upbringing reflects the values
    of small-town community life: friendliness, a strong work ethic, and participation in local traditions such as county fairs, church gatherings, and school events. Family meals often feature classic
    Wisconsin fare, and his parents encourage both independence and giving back to the neighborhood, reinforcing the region''s culture of politeness, practicality and cooperative spirit.'
