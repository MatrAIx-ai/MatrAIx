    "Analytical problem solving"]'
  hobbies: '["Coastal walking and beachcombing", "Tai chi", "Vietnamese cooking", "Mystery literature", "Rooftop gardening", "Community volunteering (language and cultural workshops)", "Sketching and watercolor
    painting"]'
  career_goals: Thuy aims to open a boutique detective agency that focuses on underserved immigrant and elder‑care cases in Los Angeles County, providing culturally sensitive investigative services. She
    envisions creating a mentorship program for aspiring investigators from diverse backgrounds, developing community workshops on personal safety and basic investigative awareness, and eventually authoring
    a memoir that weaves together her most compelling cases with reflections on her Vietnamese heritage and the challenges of a flexible, unconventional career path.
