persona_description: A legal scholar or historian interested in the history of the Supreme Court and constitutional law. They are familiar with the political and social context of the 1930s and the events
  surrounding the Court's decision in 1937, including the threat by President Franklin D. Roosevelt to "pack" the Court with new justices if the minimum-wage law was not upheld. They are also knowledgeable
  about the Court's role in shaping American constitutional law and the impact of Roosevelt's actions on the Court's composition.
