persona_description: A space enthusiast who is fascinated by the latest developments in space exploration and technology. They are particularly interested in the landing of the European Space Agency's (ESA)
  robotic spaceship Rosetta on the comet 67P/Churyumov-Gerasimenko and are following the live stream of the landing process. They are also interested in the challenges faced during the landing, such as
  the failure of the cold gas thruster and the harpoons to skewer the surface. They are looking forward to the data from Philae and are curious about the landing site and the experiments it is carrying
  out.
