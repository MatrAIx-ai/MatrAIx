personas:
  professional: Natasha Barges, a 27‑year‑old electrician specializing in residential and light‑commercial wiring, blends meticulous blueprint reading and National Electrical Code compliance with a curious,
    adaptable approach that sees her experimenting with solar photovoltaic prototypes and mentoring apprentices while maintaining a calm, cooperative presence on site.
  sports: Natasha Barges embraces the outdoors by tackling the rugged trails of Flathead Valley year‑round, supplementing her hikes with weekly indoor rock‑climbing sessions at the local gym and cheering
    on the Montana Grizzlies football team during fall weekends, while approaching fitness with a steady, low‑pressure routine that balances cardio with gentle stretching.
  arts: Natasha Barges channels her love for serene landscapes into watercolor paintings inspired by Claude Monet and Georgia O’Keeffe, captures sunrise vistas reminiscent of Ansel Adams in her photography,
    and finds intellectual pleasure in the speculative worlds of Ursula K. Le Guin, while occasionally attending intimate gallery openings featuring emerging mixed‑media artists.
  travel: Natasha Barges prefers short, thoughtfully planned road trips that let her photograph sunrise over Glacier National Park and trek the alpine passes of the Canadian Rockies, while dreaming of a
    future solo adventure to Iceland’s volcanic landscapes and a spring visit to Kyoto’s cherry‑blossom temples to study traditional ink painting.
  culinary: Natasha Barges enjoys a modest but purposeful kitchen routine, often whipping together quinoa‑beet salads with goat cheese, hand‑cooking creamy pumpkin soup spiced with cumin, and occasionally
    grilling salmon glazed with maple‑soy for friends, while also indulging in fresh berry smoothies and a strong pour‑over coffee after a sunrise hike.
  core: Natasha Barges, a 27‑year‑old electrician‑turned‑artist, balances precise wiring work with spontaneous watercolor bursts, worries about the smallest details yet finds calm in sunrise hikes, and
    secretly hoards vintage camera lenses for late‑night shoots.
background:
  cultural: Natasha grew up in a working‑class family in Kalispell, Montana, with deep roots in the Flathead Valley. Her heritage is primarily Northern European (German‑Scandinavian), but she identifies
    strongly with the region's rugged independence, outdoor lifestyle, and close‑knit community values. The local culture’s emphasis on self‑reliance, respect for nature, and modest appreciation for the
    arts shaped her balanced outlook—practical, hands‑on work paired with a curiosity for creative expression. Her high‑school education highlighted vocational trades, reinforcing her path into the electrical
    field while nurturing an appreciation for sustainability and community stewardship.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''National Electrical Code compliance'', ''Blueprint reading'', ''Troubleshooting and diagnostics'', ''Electrical safety inspections'',
    ''Project planning and coordination'', ''Basic solar PV installation'', ''Soldering and small electronics'', ''Creative problem solving'']'
  hobbies: '[''Hiking in Flathead National Forest'', ''Nature photography'', ''Watercolor painting'', ''Reading sci‑fi and philosophy'', ''DIY electronics projects'', ''Volunteer tutoring at community center'',
    ''Attending small art gallery openings'', ''Craft fair exploration'']'
  career_goals: Natasha aims to earn her journeyman electrician license within the next two years and eventually achieve master electrician status. She plans to acquire certifications in renewable‑energy
    systems, particularly solar installations, to blend her technical expertise with her interest in sustainable solutions. Long‑term, she hopes to launch a small, community‑focused electrical contracting
    business that emphasizes eco‑friendly practices and provides mentorship to other women entering the trades. She also wants to continue her professional development through vocational courses and possibly
    become an instructor for apprentices later in her career.
