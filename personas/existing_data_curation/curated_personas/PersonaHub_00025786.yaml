persona_description: A researcher and engineer who specializes in the design and fabrication of integrated amplifier circuits that operate under extreme temperatures. His work focuses on the use of silicon
  carbide in high-temperature applications and his team's development of integrated circuits that can replace non-integrated sensors. His expertise includes the use of wide-band-gap semiconductors and his
  work has been presented at prestigious conferences. He believes that commercial production of these integrated circuits is about five to ten years away.
