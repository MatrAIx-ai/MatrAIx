personas:
  professional: Taurus Johnson, a seasoned telecommunications line installer and repairer, blends hands‑on fiber‑optic and copper expertise with a rigorous safety focus, leading on‑site crews, mentoring
    apprentices, and consistently delivering reliable network service across the Bessemer area; they are known for turning complex technical challenges into teachable moments.
  sports: Taurus Johnson, a devoted Alabama Crimson Tide football fan, also plays in a community adult soccer league, joins the local beach volleyball circuit during summer, and maintains a regular jogging
    routine to stay fit and protect their knees; they treat each activity as a chance to unwind after a demanding work week.
  arts: Taurus Johnson’s artistic side shines in the church’s gospel choir, where they draw inspiration from Mahalia Jackson and contemporary R&B legends like Beyoncé, while their playlist also features
    classic hip‑hop from A Tribe Called Quest and modern soul from Leon Bridges.
  travel: Taurus Johnson prefers short road trips that blend cultural discovery with relaxed pacing, having explored New Orleans for the Jazz Fest, journeyed to Nashville’s music scene, and planning a future
    getaway to Asheville’s mountain retreats, all while balancing travel costs with a modest vacation budget.
  culinary: Taurus Johnson delights in cooking classic Southern soul‑food such as fried catfish, collard greens seasoned with smoked turkey, and sweet potato pie, often using fresh tomatoes, okra, and peppers
    from their backyard garden to add a home‑grown touch to dishes like jambalaya.
  core: Taurus Johnson merges a pragmatic telecom career with a vibrant community life, balancing safety‑first professionalism, gospel singing, Southern cooking, and mentoring, while occasionally letting
    overtime work spill into late‑night coffee binges.
background:
  cultural: Nicole is a Black woman raised in Bessemer, Alabama, a city steeped in Southern African‑American heritage and the legacy of the civil‑rights movement nearby in Birmingham. Her upbringing centered
    around the church, family reunions, and neighborhood block parties, instilling values of community solidarity, resilience, and pride. Soul food cooking, gospel music, and storytelling are woven into
    her daily life. She actively participates in church outreach and community service, reflecting a cultural emphasis on giving back. These roots shape her work ethic, her collaborative spirit, and her
    desire to uplift others while balancing curiosity with the practical traditions passed down through generations.
attributes:
  skills: '[''Fiber optic splicing and termination'', ''Coaxial and copper cable installation'', ''Line testing and fault location using OTDR/TDR'', ''Reading and interpreting schematics and blueprints'',
    ''Safety compliance (OSHA, FCC)'', ''Use of hand and power tools for cable pulling and conduit work'', ''Basic electrical troubleshooting'', ''Customer communication and service coordination'', ''Team
    coordination and on‑site supervision'', ''Basic project planning and scheduling'', ''Network outage troubleshooting'', ''Mentoring apprentices and new hires'']'
  hobbies: '[''Gospel choir singing'', ''Cooking Southern soul food'', ''Gardening (vegetable garden)'', ''Volunteering at youth tech workshops'', ''Attending local community festivals'', ''Watching football
    (Alabama Crimson Tide)'', ''Dancing to R&B and hip‑hop'', ''Listening to podcasts about telecom and technology'', ''Socializing with friends at local coffee shops'']'
  career_goals: Nicole aims to earn advanced certifications such as Certified Fiber Optic Technician and an OSHA 30‑hour safety credential, positioning herself for a senior technician or crew‑lead role.
    She plans to transition into field supervision or project management, where she can shape work schedules and safety protocols. Mentoring is a priority; she wants to support more young Black women entering
    the trade. Completing a GED and pursuing technical coursework are also on her list, ultimately preparing her to launch her own small contracting business that offers reliable telecom services to the
    Bessemer community while providing job opportunities for local residents.
