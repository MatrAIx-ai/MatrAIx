personas:
  professional: A budding LEGO engineer, Afif Bibb channels curiosity and practicality into designing intricate brick structures, often leading Cub Scout projects with thoughtful organization while staying
    flexible enough to adapt when a piece doesn't fit.
  sports: Afif Bibb laces up for the Wabash Valley Soccer Club's under‑7 team on Saturday mornings, cheering for the nearby Indianapolis Colts while also admiring the Purdue Boilermakers, and they balance
    competitive play with a calm, cooperative attitude that often sees them encouraging teammates after a missed goal.
  arts: Afif Bibb sketches comic‑style heroes inspired by Stan Lee and Mo Willems, builds narrative worlds while constructing LEGO dioramas, and they delight in reading picture books by Chris Van Allsburg,
    letting their imagination wander into vibrant, self‑crafted storylines.
  travel: Afif Bibb explores the winding paths of the Wabash River trail with a trusty magnifying glass, has camped at the Indiana Dunes State Park, and they dream of visiting the Grand Canyon’s rim someday,
    all while negotiating travel plans with parents who balance family budget constraints and school schedules.
  culinary: Afif Bibb loves assembling homemade pizza with a thin crust, tomato sauce, mozzarella, and pepperoni, enjoys the bright crunch of carrot sticks with hummus, and they often attempt to bake simple
    chocolate chip cookies under Mom’s supervision, sometimes over‑mixing batter in their excitement.
  core: Afif Bibb is a compassionate, curiosity‑driven LEGO architect who balances playful imagination with a quiet worry about meeting expectations, and they often juggle creative projects, soccer drills,
    and a disciplined saving habit.
background:
  cultural: Afif was born and raised in Terre Haute, Indiana, a Midwestern city that values community, modesty, and a strong work ethic. His family participates in local traditions such as county fairs,
    church gatherings, and neighborhood block parties, fostering a sense of belonging and cooperation. The public elementary school he attends emphasizes both academic achievement and community service,
    reflecting regional ideals of practicality and togetherness. These cultural influences encourage Afif's love for the outdoors, his willingness to help neighbors, and his balanced approach to organization
    and flexibility, all of which are reinforced by the supportive, family‑centered environment of the Midwest.
