  career_goals: Afif dreams of growing up in a role that lets him help others and create a harmonious environment. He is drawn to careers such as a pediatric doctor, elementary teacher, or community youth
    mentor, where his compassion and desire to support peers can thrive. Afif also imagines working with animals as a veterinarian, reflecting his love for the family dog. He hopes to pursue a science‑oriented
    education that balances curiosity about how things work with practical, hands‑on experiences, and he wants his future work to provide a stable, caring space that reduces stress for both himself and
    those he serves.
