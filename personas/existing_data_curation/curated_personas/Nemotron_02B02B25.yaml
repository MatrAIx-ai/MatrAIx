  hobbies: '["Backyard gardening", "Knitting and crochet", "Reading historical biographies and home-improvement books", "Crossword and Sudoku puzzles", "Volunteer literacy tutoring at the public library",
    "Church outreach and food-drive organization", "Weekend hiking in nearby foothills"]'
  career_goals: Ashley is content with the stability of her cashier role but aims to broaden her responsibilities within the store. Her short‑term goal is to become a shift supervisor, overseeing daily
    operations, training new employees, and streamlining workflow for greater efficiency. She plans to pursue a bookkeeping or supply‑chain basics certification to qualify for an inventory‑control or loss‑prevention
    analyst position. Long‑term, she envisions contributing to the regional management team by applying her technical aptitude and organizational strengths, while preserving a predictable schedule that
    supports her family and community commitments.
