  career_goals: Tim aims to move from front‑line cleaning into a supervisory role within the next two years, targeting a position as Cleaning Operations Supervisor at a regional office or school district.
    He plans to earn the Certified Professional Cleaner (CPC) credential and complete an OSHA 30‑hour construction safety course to bolster his expertise. In the longer term, Tim dreams of launching his
    own eco‑friendly cleaning service that serves small businesses and residential clients across Montgomery County, emphasizing sustainable products and community‑based hiring. He also hopes to mentor
    younger workers, sharing his practical knowledge while encouraging curiosity about new cleaning technologies.
