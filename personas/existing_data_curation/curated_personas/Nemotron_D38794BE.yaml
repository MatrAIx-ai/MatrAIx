personas:
  professional: Tim Coker, a 34-year-old commercial cleaning specialist with ten years of floor-care mastery, blends meticulous inventory control, green-cleaning technology, and calm crisis management to
    lead crews efficiently while pursuing Certified Professional Cleaner certification and a supervisory role.
  sports: Tim Coker stays fit through early-morning fishing trips on Bracken County Lake, weekend jogs along the lake trail, and a spot on the Brookville Community Softball League, while cheering for the
    Louisville Cardinals basketball team and the Cincinnati Bengals, treating each game as both a social rally and a motivational boost for their active lifestyle.
  arts: Tim Coker, an avid classic-rock enthusiast, routinely tunes into radio plays of The Rolling Stones and Creedence Clearwater Revival, enjoys Ken Burns’ Civil War documentaries, and attends folk performances
    at the annual Brookville County Fair, and they use these artistic moments to decompress after a demanding week of cleaning contracts.
  travel: Tim Coker prefers meticulously planned weekend getaways that maximize fishing time, has trekked the Great Smoky Mountains, toured Gettysburg’s historic battlefields, and spent a weekend in Washington,
    D.C., while they dream of a guided salmon-fishing lodge in British Columbia and a cultural immersion trip to New Orleans, all balanced against a family-friendly budget.
  culinary: Tim Coker, a competent home cook, harvests heirloom tomatoes, basil, and oregano from their garden to simmer a rustic spaghetti sauce, grills ribeye steaks seasoned with garlic and rosemary,
    bakes buttery cornbread for the Brookville County Fair, yet admits to over-relying on store-bought marinades when pressed for time.
  core: Tim Coker, a pragmatic 34-year-old who couples eco-cleaning expertise with solitary fishing and hands-on woodworking, approaches life with balanced curiosity, steady calm, and a modest willingness
    to splurge on tools that fuel their hands-on passions.
background:
  cultural: Tim grew up in a small Midwestern town near Dayton, Ohio, in a working‑class family of German‑Irish ancestry. The community’s emphasis on reliability, modesty, and neighborly help shaped his
    outlook. He attended a public high school where football games and church gatherings were central social events, reinforcing a sense of collective responsibility. Although he pursued some college courses
    in business, he chose a hands‑on career that aligns with the region’s strong tradition of skilled trades. The cultural fabric of Montgomery County—marked by agricultural roots, manufacturing history,
    and a reputation for hospitality—continues to influence Tim’s values, prioritizing hard work, practical problem solving, and active participation in local community life.
attributes:
