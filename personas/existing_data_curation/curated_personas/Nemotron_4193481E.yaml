personas:
  professional: Salma Perez, a 42‑year‑old community‑oriented organizer, leverages fluency in Spanish, meticulous budgeting, and seasoned home‑cooking expertise to excel as a kitchen assistant at a local
    Latin‑flavored restaurant while also coordinating volunteer food drives, and they bring a reliable, detail‑driven approach to each task.
  sports: Salma Perez enjoys brisk morning walks with the Nashville Parks and Recreation walking group in Centennial Park, they cheer for the Nashville Predators and the Tennessee Titans on game days, and
    they play in a community softball league at the downtown recreation center, favoring low‑impact activity over intense competition.
  arts: Salma Perez curates a personal soundtrack of salsa and son featuring Buena Vista Social Club and Celia Cruz while reading poetry by Pablo Neruda, they regularly attend intimate performances at the
    Nashville Latin Cultural Center showcasing artists such as Carlos Vives, and they find these cultural touches essential to a balanced, reflective life.
  travel: Salma Perez dreams of weekend hikes in the Great Smoky Mountains, reminisces about past visits to Mexico City’s historic center, they plan to explore the colorful streets of Cartagena on a budget‑friendly
    itinerary, and they balance a love for cultural immersion with limited finances by staying in hostels and using public transit.
  culinary: Salma Perez boasts an advanced home‑cooking skill set, expertly preparing ropa vieja with slow‑cooked pork, arroz con pollo infused with saffron, and crisp tostones, they experiment with fresh
    cilantro, ají dulce, and plantain leaves, and they often overspice dishes to achieve bold flavor when sharing meals at neighborhood potlucks.
  core: Salma Perez blends structured budgeting, garden‑fresh cooking, and quiet community service into a steady rhythm of modest ambition, they occasionally indulge in late‑night TV and forget to water
    the herbs.
background:
  cultural: Salma is a first‑generation Cuban‑American; her parents emigrated from Cuba in the early 1990s seeking economic stability. She grew up in a close‑knit Cuban enclave within Nashville, where Spanish
    was spoken at home, and community celebrations centered around food, music, and family. The values of resilience, hospitality, and strong family bonds from her Cuban upbringing blend with Southern hospitality
    she encountered in Tennessee. Salma maintains cultural traditions through cooking, participating in local Latin festivals, and supporting newcomers from similar backgrounds. While she navigates life
    as an individual who prefers solitude and small groups, her cultural roots provide a sense of identity and community connection.
attributes:
  skills: '["Bilingual Spanish-English communication", "Meal planning and traditional Cuban cooking", "Household budgeting and financial organization", "Basic computer skills (email, internet research)",
    "Small‑group event coordination", "Gardening and plant care", "Sewing and clothing repair", "Time management and scheduling"]'
  hobbies: '["Cooking Cuban recipes", "Gardening in her backyard", "Listening to salsa and son music", "Reading Spanish‑language poetry", "Walking in local parks", "Knitting and crochet", "Volunteering
    at the community food pantry", "Attending small cultural gatherings"]'
  career_goals: Salma aims to secure a stable part‑time position that leverages her cooking and organizational abilities, such as a kitchen assistant in a local Latin restaurant or a volunteer coordinator
    at a community center. She plans to complete her GED within the next year and enroll in a short culinary certificate program to formalize her cooking expertise. Long‑term, she hopes to launch a modest
    home‑based catering service featuring authentic Cuban cuisine for small events, providing both financial independence and a way to share her cultural heritage with Nashville's diverse community.
