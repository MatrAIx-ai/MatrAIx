  hobbies: '[''Playing acoustic guitar and zydeco jam sessions'', ''Cooking Cajun cuisine'', ''Participating in community festivals (Mardi Gras, Evangeline Parish Festival)'', ''Coaching basketball and
    organizing pickup games'', ''Fishing on Bayou Teche'', ''Hiking in the Atchafalaya Basin'', ''Playing cooperative video games'', ''Role‑playing tabletop games (D&D)'', ''Reading science‑fiction and
    fantasy novels'']'
  career_goals: Daniel aims to earn a bachelor’s degree in education and then a master’s in curriculum and instruction within the next three years, positioning himself for leadership roles. He aspires to
    become the Social Studies department chair and eventually an assistant principal, while maintaining a hands‑on classroom presence. He also plans to launch an after‑school program that combines STEM
    activities with Cajun cultural heritage, fostering community engagement and student curiosity. Additionally, he hopes to author teaching resources that blend local history with modern technology and
    become a sought‑after speaker at regional education conferences.
