persona_description: A development consultant based in Kolkata, India who has worked with many national and international agencies on innovative methodologies for development in Asia and Africa. Kamal Kar
  is an advocate of community participation in development and has introduced PRA (participatory rural appraisal) and CLTS (Community-led total sanitation) in Bangladesh. He is known for his criticism of
  the lack of success of NGOs in Bangladesh and for his low-cost sanitation programs. Kar has also developed a certification ceremony for communities to become ODF-free, instilling a sense of pride in ODF
  status. He is interested in participatory processes and has worked with local communities to trigger and build on their own sanitation infrastructure.
