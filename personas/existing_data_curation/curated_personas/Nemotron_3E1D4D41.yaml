  hobbies: '[''reading historical fiction'', ''hiking'', ''nature photography'', ''acoustic guitar'', ''board games (chess, Settlers of Catan)'', ''volunteering at historical society'', ''cooking'', ''model
    building'']'
  career_goals: Kyle aspires to secure a full‑time position within a cultural or educational institution in the Upper Valley region, such as a local museum, historical society, or public library, where
    he can apply his research and organizational expertise. He aims to begin as an assistant curator or program coordinator, managing exhibitions, community outreach programs, and archival projects. Recognizing
    the value of formal credentials for long‑term advancement, he plans to enroll in a master’s program in Library and Information Science or Museum Studies within the next two years. Ultimately, Kyle seeks
    a leadership role that combines curatorial responsibilities with strategic program development, offering a stable, structured work environment that aligns with his preference for predictability. He
    also entertains the possibility of establishing a freelance writing and consulting practice focused on heritage preservation and local history, allowing him to balance steady employment with independent
    projects.
