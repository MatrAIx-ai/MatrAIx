persona_description: A scientist or statistician who works in the field of environmental science, specifically in the study of coastal ocean ecosystems. They are responsible for planning and conducting
  scientific surveys to estimate population metrics while minimizing cost and maximizing statistical power and precision. The tool, developed by the National Centers for Coastal Ocean Science, is a GIS
  Sampling Design Tool that helps in selecting a sample from a population and performing sample design analysis. The tool is designed to improve sampling efficiency by integrating maps at relevant spatial
  scales into survey designs, and it is available for download from http://ccma.nos.noaa.gov/products/biogeography/sampling/.
