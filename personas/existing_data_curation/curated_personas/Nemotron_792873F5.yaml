  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading historical fiction'', ''Gardening (roses, lavender, heirloom vegetables)'', ''Genealogy research'', ''Attending Appalachian folk‑music sessions'',
    ''Walking local trails'', ''Crossword puzzles'', ''Preparing Southern comfort food'']'
  career_goals: Although retired, Teresa remains driven to make a lasting impact in her community. She aims to expand the oral‑history project of the Franklin County Historical Society, mentor younger volunteers
    in event planning and digital archiving, and curate a traveling exhibition of local Appalachian art for schools. She also aspires to complete a memoir documenting her family’s lineage and the cultural
    changes she has witnessed, while continuing to refine her watercolor technique and explore new artistic subjects.
