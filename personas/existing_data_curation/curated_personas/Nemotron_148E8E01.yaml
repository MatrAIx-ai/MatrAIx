  hobbies: '[''Visiting contemporary art galleries'', ''Viewing street murals'', ''Attending live jazz and soul concerts'', ''Digital photography'', ''Reading (science-fiction, biographies, design thinking)'',
    ''Cycling on the Ohio & Erie Canal Towpath'', ''Community theater set design'', ''Mindfulness meditation'', ''Indoor herb gardening'']'
  career_goals: Curtis aims to progress from his current role as a sales representative to a regional sales manager position within the next three to five years, overseeing a team of representatives and
    shaping territory strategies. He intends to earn a professional sales certification such as the Certified Professional Salesperson credential and is considering part-time coursework in business administration
    to strengthen his managerial foundation. Beyond promotion, Curtis envisions developing a mentorship program that helps new hires navigate sales challenges while fostering a supportive, inclusive work
    culture. He also hopes to integrate his passion for art and community engagement into corporate initiatives, perhaps by leading client events that showcase local artists or by collaborating with Cleveland's
    cultural institutions to create service-focused outreach programs.
