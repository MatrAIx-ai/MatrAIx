personas:
  professional: Curtis Wesley is a seasoned sales representative in Cleveland who leverages their curiosity and methodical approach to build deep client relationships, using consultative selling, Salesforce,
    and a knack for creative solution design inspired by the local art scene to consistently exceed targets.
  sports: Curtis Wesley cycles year‑round on the Ohio & Erie Canal Towpath as a member of the Cleveland Cyclists club, follows the Cleveland Guardians in baseball and the Browns in football, and uses weekend
    rides as both cardio and mental recharge, though they sometimes skip strength training in favor of longer rides.
  arts: Curtis Wesley immerses themselves in Cleveland’s art world by curating digital photography projects inspired by Ansel Adams, volunteering on set design for the Playhouse Square theater group, and
    regularly attending live jazz performances by artists such as Kamasi Washington and local soul singer Angela Winbush.
  travel: Curtis Wesley prefers meticulously planned trips that blend culture and adventure, having explored New Orleans’ jazz scene, Berlin’s contemporary galleries, and the tranquil shores of Mackinac
    Island, while dreaming of a future solo bike tour through the Amalfi Coast and a culinary pilgrimage to Kyoto.
  culinary: Curtis Wesley enjoys experimenting in a modest kitchen, regularly preparing herb‑infused dishes such as lemon‑dill roasted salmon, fresh basil pesto pasta, and spicy chickpea falafel, often
    using home‑grown basil and cilantro from their indoor garden while occasionally splurging on a perfectly seared ribeye.
  core: Curtis Wesley is a methodical yet anxious art‑obsessed sales professional who habitually maps out every client interaction, meditates to curb nightly worries, and can’t resist snapping candid street
    photos—even when it disrupts a meeting.
background:
  cultural: Curtis grew up in a predominantly African-American neighborhood on Cleveland's East Side, immersed in the cultural legacy of the Great Migration and the city's rich musical traditions. His family
    roots trace back to the South, with grandparents who moved from Georgia in the 1960s, bringing a blend of Southern hospitality, church community, and home-cooked soul food. Although he completed high
    school locally, his outlook has been shaped by the city's diverse artistic and culinary scenes, and he regularly attends events such as the Cleveland International Film Festival and AfroFest. Curtis's
    cultural identity is reflected in his deep appreciation for African-American art, jazz, and community activism, while he also embraces the Midwestern values of hard work and neighborly cooperation.
