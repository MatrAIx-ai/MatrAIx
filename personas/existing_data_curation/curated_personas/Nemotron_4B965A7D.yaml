  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Jogging'', ''DIY woodworking'', ''Video gaming'', ''Reading technology blogs'', ''Attending Latin cultural festivals'', ''Listening to
    reggaeton music'']'
  career_goals: She aims to advance from a fabricator to a lead technician or floor supervisor within the next five years, seeking certifications such as Certified Welder (CW) and CNC Programmer (CNC‑P).
    Saira plans to enroll in an associate’s program in Manufacturing Technology to deepen her technical knowledge and eventually transition into a supervisory role where she can mentor new workers and drive
    efficiency initiatives. Long‑term, she envisions a career in production management, overseeing multiple assembly lines and contributing to strategic planning for a manufacturing firm.
