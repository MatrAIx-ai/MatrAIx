personas:
  professional: A budding carpenter and design enthusiast, Roderick Lott channels the hands‑on craftsmanship of his family’s trades into precise measurements, careful joinery, and experimental sustainable
    furniture concepts while balancing a laid‑back attitude toward deadlines that sometimes leads to a cluttered workspace.
  sports: A solitary runner and occasional streetball participant, Roderick Lott logs early morning jogs along the Lakefront Trail, roots for the Chicago White Sox and Chicago Bulls on game nights, and
    joins a relaxed pickup basketball group at the community center only when the weather is too cold for running.
  arts: A quiet connoisseur of instrumental jazz and urban photography, Roderick Lott fills their evenings with Miles Davis and lo‑fi beats while curating a growing collection of Vivian Maier street shots
    and sketching modern reinterpretations of Louis Sullivan’s facades for future furniture designs.
  travel: A reflective wanderer, Roderick Lott prefers solo trips with loose itineraries, having camped in Michigan’s Upper Peninsula, explored the sustainable design scene in Portland, Oregon, and dreaming
    of a future pilgrimage to Kyoto’s minimalist tea houses for inspiration.
  culinary: A modest home cook with a penchant for sustainable, comfort‑driven meals, Roderick Lott enjoys whipping up roasted sweet potatoes, collard greens sautéed in olive oil, and a perfectly toasted
    avocado‑egg sandwich, all while sipping oat‑milk latte while listening to lo‑fi beats.
  core: Roderick Lott is an introverted, sustainability‑obsessed carpenter who balances a love for quiet creative work with occasional impulsive spending and a habit of forgetting to tidy their workspace.
background:
  cultural: Roderick is an African‑American raised in a close‑knit neighborhood on Chicago’s South Side. His family includes several generations of tradespeople, which gave him early exposure to craftsmanship
    and the value of hard work. While he appreciates the cultural richness of Chicago’s Black heritage—including blues, jazz, and community storytelling—he is naturally introverted and finds solace in quiet,
    solitary activities. The city's celebrated architectural legacy fuels his curiosity about building design, and he often blends that pride with a modern, sustainable outlook in his carpentry practice.
attributes:
  skills: '["measuring and layout", "hand‑tool operation (saws, chisels)", "power‑tool proficiency (circular saw, drill, router)", "basic joinery (mortise‑and‑tenon, dovetail, butt joints)", "interpretation
    of construction drawings", "materials estimation and budgeting", "on‑site problem solving", "construction safety practices", "introductory sustainable building methods"]'
  hobbies: '["personal woodworking projects", "architectural sketching", "reading technical manuals and science‑fiction", "listening to instrumental jazz and lo‑fi music", "solo strategy video gaming",
    "urban photography", "walking/biking along the Chicago lakefront"]'
  career_goals: Roderick plans to complete his high school diploma while securing an apprenticeship with a local union carpenter guild. His short‑term goal is to earn a journeyman certification within the
    next three years. Long‑term, he hopes to specialize in custom, sustainably‑crafted furniture and eventually open a modest workshop that serves Chicago’s boutique market. He also dreams of mentoring
    other young people from his community, sharing both technical skills and the value of disciplined, flexible work habits.
