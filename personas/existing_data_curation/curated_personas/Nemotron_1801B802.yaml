  career_goals: Michelle hopes to become an illustrator or a game‑design artist, merging her love for visual art with technology. She dreams of creating her own animated stories and eventually working at
    a studio that blends storytelling with interactive media. She also entertains the idea of becoming a veterinarian, driven by her compassion for animals and curiosity about biology. In the near term,
    she aims to attend an art‑focused middle school program, develop a stronger portfolio, and explore coding camps to build the skills needed for a future in creative technology.
