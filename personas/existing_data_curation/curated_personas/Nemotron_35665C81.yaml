  career_goals: Tania dreams of becoming someone who helps and explores. She often says she wants to be a teacher so she can share what she learns, a veterinarian to care for animals, or an astronaut to
    discover how things work in space. Her competitive streak pushes her to aim for the top of her class in reading and math, while her practical side keeps her focused on everyday chores that will prepare
    her for a future career where she can be both helpful and successful. Though she worries about making mistakes, she uses that anxiety as motivation to practice and improve.
