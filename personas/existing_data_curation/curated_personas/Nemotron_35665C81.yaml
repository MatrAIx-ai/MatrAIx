personas:
  professional: Tania Rivera, a budding junior scientist who delights in taking apart toy cars to discover their inner workings while keeping her workbench neatly arranged, blends her curiosity with practicality
    and channels her competitive spirit into winning the class's 'Best Invention' showcase.
  sports: Tania Rivera, a spirited member of the Little Lions Soccer Club who also enjoys sprinting in the backyard and cheering for the New York Yankees during spring training, balances structured team
    practice with spontaneous jump‑rope challenges, constantly striving to be the first to score and displaying a competitive edge even in casual play.
  arts: Tania Rivera, an enthusiastic fan of the animated film 'Moana' and an aspiring painter who recreates her favorite scenes with crayons and glitter, frequently performs tiny dance routines to 'Baby
    Shark' and admires pop singer Taylor Swift for her catchy tunes, letting her organized yet imaginative nature guide her creative endeavors.
  travel: Tania Rivera, an adventurous five‑year‑old who loves road trips to her grandparents' farm and dreams of exploring the sandy beaches of Cancun, plans journeys with a checklist of favorite stuffed
    animals and snack packs, but her tendency to worry about new places makes her cling to the car seat until she feels safe.
  culinary: Tania Rivera, a budding kitchen helper who expertly spreads peanut butter on toast and chops strawberries with a plastic knife, relishes macaroni and cheese sprinkled with a dash of paprika
    and mango smoothies, yet she often sneaks extra chocolate chips into her treats, driven by a competitive desire to make the 'best' snack.
  core: Tania Rivera navigates life with a curious yet cautious outlook, balancing organized play and spontaneous discovery while often worrying about the smallest details that most peers overlook.
background:
  cultural: Tania grows up in a Mexican-American household in Odessa, Texas. At home, Spanish is spoken alongside English, and family meals often feature tacos, tamales, and arroz con frijoles. She celebrates
    Día de los Muertos and Mexican Independence Day with colorful altars and traditional foods, while also participating in local Texas festivities like the Ector County Fair. Her family places a strong
    emphasis on close‑knit relationships, respect for elders, and Catholic traditions, which shape her daily routines and values. The blend of Mexican heritage and West Texas culture gives her a unique
    perspective that influences her language, cuisine preferences, music taste, and community interactions.
