personas:
  professional: Michele Becknell is a budding robotics enthusiast and junior programmer who leads her school’s robotics club, blends methodical planning with creative problem‑solving in Scratch and Python
    projects, and volunteers at the local library’s summer reading program, showcasing a balance of curiosity and practicality.
  sports: Michele Becknell enjoys weekend hikes along the Kettle Moraine State Forest trails, competes in the school’s cross‑country team during fall, cheers for the Green Bay Packers and Milwaukee Bucks,
    and maintains a modest home workout routine of body‑weight exercises, illustrating a structured yet nature‑oriented fitness mindset.
  arts: Michele Becknell relaxes on the piano playing pieces by Ludwig van Beethoven and film scores by Hans Zimmer, reads sci‑fi novels by Andy Weir, attends community theater productions featuring works
    by Lin‑Manuel Miranda, and follows indie YouTube artists, weaving artistic appreciation tightly into daily life.
  travel: Michele Becknell plans day trips to places like Chicago’s Museum of Science and Industry and Madison’s State Capitol, dreams of hiking the Grand Canyon’s South Rim and exploring Tokyo’s Akihabara
    district for tech inspiration, balances weekend adventures with school responsibilities, and values budget‑friendly travel experiences.
  culinary: Michele Becknell enjoys preparing simple vegetable stir‑fry with broccoli, carrots, tofu, soy sauce and ginger, bakes homemade apple crisp with cinnamon from the family orchard, and occasionally
    treats herself to pepperoni pizza with extra cheese, reflecting a modest cooking skill set and a love for fresh, comforting flavors.
  core: Michele Becknell blends a meticulous planner’s mind with a curious explorer’s heart, juggling robotics code, garden seedlings, and piano practice, yet can’t resist the occasional night‑time snack
    of chips while binge‑watching sci‑fi series.
background:
  cultural: Michele grows up in a predominantly white, Midwestern community in Greenville, Wisconsin. Her family traces its roots to German and Polish immigrants who settled the region in the late 19th
    century, a heritage reflected in family traditions like celebrating Oktoberfest, enjoying polka music, and participating in the county fair. The local culture emphasizes modesty, hard work, community
    involvement, and a close connection to agricultural life. Michele often attends a nearby Lutheran church, where she learns the value of service and harmony, and she embraces the small-town ethos of
    supporting neighbors and preserving the natural landscape.
