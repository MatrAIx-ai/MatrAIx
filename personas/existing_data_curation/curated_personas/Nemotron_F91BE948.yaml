  career_goals: Michele aims to pursue a STEM-focused high school curriculum and eventually study environmental engineering or wildlife biology. She is driven to create sustainable solutions for rural communities
    like Greenville, such as designing water-conservation systems or protecting local habitats. She also hopes to combine her love of science with a desire to give back, envisioning a future where she can
    work on community-based projects that improve quality of life while inspiring other young people to explore practical, curiosity-driven careers.
