  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Photography (desert and cultural festivals)'', ''Cooking traditional Mexican cuisine'', ''Reading business and historical biographies'',
    ''Hiking in the Sonoran Desert'', ''Gardening with native plants'', ''Playing acoustic guitar'', ''Participating in a local book club'']'
  career_goals: Looking ahead, Carlos aims to assume a leadership role within his school district, such as Business Department Chair or Instructional Coordinator, where he can shape the business curriculum
    across multiple grade levels. He plans to pursue a Master's in Educational Leadership to refine his administrative skills. Carlos also envisions creating a community-based entrepreneurship incubator
    for high-school students, partnering with local businesses and Mexican-American cultural organizations to provide mentorship, seed funding, and experiential learning opportunities. Long-term, he hopes
    to influence district-wide policies that support bilingual education and culturally responsive teaching, ensuring that students from diverse backgrounds receive equitable access to business and financial
    literacy.
