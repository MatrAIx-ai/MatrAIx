personas:
  professional: Carlos Velez, a seasoned secondary business educator with two decades of experience, leverages bilingual fluency and a methodical curriculum design approach to embed case studies, data analytics,
    and visual‑arts projects into economics and entrepreneurship classes.
  sports: Carlos Velez, a dedicated desert hiker and occasional pickup basketball player, follows the Phoenix Suns and Arizona Diamondbacks avidly, belongs to the Sonoran Desert Hiking Association, and
    schedules weekend trail treks to stay fit while preferring low‑impact exercise over high‑intensity gym sessions.
  arts: Carlos Velez, an avid patron of the Phoenix Art Museum, frequently attends exhibitions featuring Southwestern artists like Diego Rivera’s early works and contemporary Mexican‑American painter Yolanda
    López, and channels that inspiration into classroom visual projects and personal photography of street festivals.
  travel: Carlos Velez, a methodical planner, prefers short, well‑researched road trips that combine desert hiking and cultural immersion, having explored the Grand Canyon, Sedona, and Santa Fe, while dreaming
    of a culinary pilgrimage to Oaxaca and a weekend escape to Barcelona’s tapas scene, all balanced against weekend family responsibilities.
  culinary: Carlos Velez, an accomplished home cook, specializes in authentic mole poblano simmered for hours with chilhuacle and pasilla peppers, hand‑rolled tamales stuffed with pork and masa, and vibrant
    salsas featuring roasted tomatillos and serrano chilies, often pairing these dishes with an aged Oaxacan mezcal during family gatherings.
  core: Carlos Velez blends disciplined classroom leadership with a quiet, curiosity‑driven pursuit of art and cuisine, habitually juggling lesson plans and mole recipes, yet often neglects their own sleep
    to perfect the next photography shot.
background:
  cultural: Carlos Velez was born to Mexican parents who immigrated to the United States in the 1970s. Raised in a bilingual household in the Phoenix metropolitan area, he grew up speaking both Spanish
    and English, celebrating Mexican traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day. His family maintains strong ties to their roots through weekly gatherings featuring
    Mexican home cooking, folk music, and storytelling. As a member of the vibrant Mexican-American community in Maricopa County, Carlos participates in cultural festivals and volunteers with organizations
    that support Latino youth education. His heritage deeply influences his teaching philosophy, prompting him to embed cultural references, bilingual support, and values of family, respect, and perseverance
    into his classroom practice.
