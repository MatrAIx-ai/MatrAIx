persona_description: A healthcare professional who specializes in geriatric medicine and psychiatry, with a particular focus on the diagnosis and management of depression in the elderly population. They
  are highly trained and experienced in recognizing and treating depression in the elderly, and are familiar with the unique challenges and factors that contribute to the underdiagnosis of depression in
  this population. They are also aware of the potential causes of depression among the elderly, including difficulty in recognizing symptoms, increased attention to somatic illnesses, and a general increase
  in depression among the elderly.
