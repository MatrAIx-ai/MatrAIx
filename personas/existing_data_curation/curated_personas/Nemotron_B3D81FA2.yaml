    novels'', ''Trivia nights'', ''Socializing at local bars'']'
  career_goals: Looking ahead, Kristina aims to move into a supervisory role within the next two years, leveraging her hands-on experience to lead a shift and mentor teammates. She plans to earn a Lean
    Six Sigma Yellow Belt and an OSHA 30-hour certification to bolster her credentials. In the medium term, she envisions stepping up to a plant-level continuous-improvement coordinator, where she can introduce
    new automation ideas and champion safety initiatives. On a personal level, she hopes to use the extra income and leadership experience to eventually open a small workshop that offers custom metal-fabrication
    services for the local community.
