  hobbies: '["Basketball", "Soccer", "LEGO building", "Strategy video games", "Reading adventure/mystery books", "Boy Scouts activities", "Community clean‑up events", "Mardi Gras celebrations", "Fourth
    of July fireworks"]'
  career_goals: Anthony dreams of a future where he can combine his love for structure, community service, and teamwork. He wants to become a firefighter or police officer because he admires the clear responsibilities
    and the chance to help others. He also expresses an interest in engineering or construction, envisioning a career that involves building and problem‑solving in a well‑organized environment.
