persona_description: A political economist who specializes in studying the economic policies and outcomes of developed and developing countries, particularly in the post-World War II era. This person is
  deeply concerned with the effects of neoliberal policies and the decline of the United States as a global hegemon. They are interested in the potential consequences of the current state of the world-system
  and the need for governments to adapt to these changes in order to maintain their populations' well-being. This person is likely to be critical of the right-wing ideology of neo-liberalism and the emphasis
  on reliance on markets rather than government intervention. They are also likely to be concerned with the potential negative effects of the growth rates of some countries and the potential strain on the
  world's ecology.
