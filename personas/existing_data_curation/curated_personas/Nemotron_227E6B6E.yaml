personas:
  professional: Annie Hamilton is a seasoned maintenance technician with a decade of hands‑on experience in commercial and residential settings, wielding meticulous record‑keeping, OSHA compliance expertise,
    and a passion for developing streamlined protocols that they intend to leverage as they pursue Certified Facility Manager certification and a senior facilities supervisor role.
  sports: Annie Hamilton is an avid runner on the Lakefront Trail, regularly logging 5‑10 km runs with the Chicago Lakeside Running Club, cheering on the Chicago Cubs at Wrigley Field, and following the
    Chicago Bears for football season, while occasionally joining a community yoga class for cross‑training.
  arts: Annie Hamilton’s artistic palate features a love for the Chicago jazz scene, regularly attending performances by the Art Ensemble, listening to Miles Davis on vinyl, and immersing themselves in
    contemporary nonfiction by authors like Isabel Wilkerson, while curating a minimalist home gallery with prints by Shepard Fairey.
  travel: Annie Hamilton prefers meticulously planned weekend getaways, having explored Mackinac Island’s historic streets, enjoyed a culinary tour of Toronto’s Distillery District, and dreaming of strolling
    through Lisbon’s Alfama neighborhood, all while budgeting travel costs within a dedicated savings envelope.
  culinary: Annie Hamilton’s culinary routine blends herb‑forward cooking—whipping up lemon‑herb grilled salmon, basil pesto pasta, and rosemary‑roasted potatoes sourced from their indoor garden—with occasional
    indulgence in classic Chicago deep‑dish pizza and craft coffee, reflecting a balanced love for health and comfort.
  core: Annie Hamilton is a methodical problem‑solver whose days are punctuated by complex puzzles, precise maintenance logs, and a relentless drive to turn every challenge into a streamlined solution—though
    they occasionally trade sleep for late‑night coffee and extra puzzle pieces.
background:
  cultural: Annie grew up on Chicago’s South Side, surrounded by a vibrant African‑American community that emphasized resilience, mutual support, and pride in cultural heritage. Family gatherings often
    featured soul‑food recipes passed down through generations, and church attendance reinforced a sense of communal responsibility. Her upbringing exposed her to the historic challenges faced by Black
    residents in the city, shaping her drive for self‑reliance and her desire to open pathways for others in the trades. While navigating the city’s diverse neighborhoods, Annie has drawn on the rich legacy
    of Black craftsmanship and activism in Chicago, integrating those values into her professional ethic and community involvement.
attributes:
  skills: '[''HVAC system maintenance'',''Electrical wiring and troubleshooting'',''Plumbing repair and installation'',''Preventive maintenance planning'',''Safety compliance (OSHA)'',''Blueprint and schematics
