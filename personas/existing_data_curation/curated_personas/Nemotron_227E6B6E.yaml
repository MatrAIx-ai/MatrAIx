  hobbies: '[''Jigsaw and logic puzzles'',''Yoga'',''Running (Lakefront Trail)'',''Indoor herb gardening'',''Reading (urban planning, Black history)'',''Book club (small group)'',''Volunteer home‑repair
    workshops'']'
  career_goals: Annie aims to transition from a hands‑on maintenance technician to a senior facilities supervisor within the next five years. She plans to obtain Certified Facility Manager (CFM) and OSHA
    30‑hour certifications, and she is exploring a bachelor’s degree in Facilities Management to complement her associate’s credential. Her long‑term ambition is to lead a maintenance team for a large urban
    property management firm in Chicago, developing streamlined maintenance protocols that reduce downtime and operational costs. Additionally, she hopes to mentor other Black women entering the trades,
    fostering a supportive network that encourages career advancement.
