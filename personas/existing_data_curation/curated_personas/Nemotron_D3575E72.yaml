personas:
  professional: Imelda Montenegro is a bilingual stocker and order filler who leverages meticulous inventory management, handheld scanning expertise, and natural empathy to train new teammates, streamline
    shelf replenishment, and champion safety protocols; they are also actively pursuing a shift‑leader position and a logistics certification to advance toward overseeing store supply‑chain operations.
  sports: Imelda Montenegro channels their energy into weekly Zumba sessions, a lively salsa dance troupe, weekend hikes across the Sonoran desert with the Phoenix Hiking Club, and avidly cheers for the
    Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals, blending cardio, rhythm, and community spirit into their fitness routine.
  arts: Imelda Montenegro finds artistic inspiration at Arizona Opera performances, the vibrant murals of street artist Shepard Fairey downtown, the soulful Latin pop of Alejandro Sanz, and self‑improvement
    best‑seller talks by Brené Brown, weaving these cultural and creative influences into their weekend gatherings and personal growth journey.
  travel: Imelda Montenegro plans weekend getaways with a mix of spontaneity and research, often trekking the Grand Canyon’s Rim Trail, exploring the art‑filled streets of Sedona, dreaming of sipping coffee
    in Barcelona’s Gothic Quarter, while balancing travel costs with their commitment to weekly community volunteering.
  culinary: Imelda Montenegro, a confident home cook, transforms garden‑fresh tomatoes, peppers, and cilantro into vibrant salsas, crafts traditional tamales and richly spiced mole with dark chocolate,
    and delights in serving these dishes at family gatherings and community festivals, constantly refining their culinary repertoire through self‑guided cookbooks and occasional workshops.
  core: Imelda Montenegro balances a love for high‑energy dance classes with a habit of late‑night snacking on salsa‑spiced chips, and they routinely double‑check inventory shelves at home, turning even
    their pantry into a well‑ordered mini‑warehouse.
background:
  cultural: Imelda is a second‑generation Mexican‑American who grew up in Glendale, Arizona, within a vibrant Mexican community. At home, Spanish was spoken alongside English, and family traditions such
    as Día de los Muertos, Cinco de Mayo celebrations, and weekly Sunday tamale meals remain central to her identity. Her Catholic upbringing influences her participation in community church events, while
    her daily life reflects a blend of Mexican heritage and Southwestern U.S. culture. This bicultural experience informs her values of family loyalty, hospitality, and hard work, and it enhances her ability
    to connect with a diverse customer base at work.
attributes:
  skills: '["Inventory management","Stock replenishment","Handheld scanner and WMS operation","Pallet jack handling","Bilingual communication (English/Spanish)","Time management","Organizational skills","Problem
