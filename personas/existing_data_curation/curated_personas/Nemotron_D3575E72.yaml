  hobbies: '["Zumba class","Salsa dancing","Hiking in Sonoran desert","Vegetable gardening","Volunteer work at food bank","Cooking Mexican cuisine","Hosting family gatherings","Reading self‑help books","Attending
    cultural festivals"]'
  career_goals: Imelda aims to move into a supervisory role within the next two years, targeting a shift‑leader or department‑manager position at her current retailer. She plans to earn a logistics certification
    such as APICS CPIM and complete the remaining college credits toward an Associate’s degree in Business Administration. Long‑term, she envisions overseeing a store’s supply‑chain operations or transitioning
    to a logistics coordinator role for a regional distribution center. Alongside her professional growth, she hopes to mentor new employees and eventually launch a small family‑run Mexican‑style catering
    service that can serve the Glendale community on weekends.
