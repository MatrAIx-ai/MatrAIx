personas:
  professional: Holmes Sotomayor leverages a bilingual, relationship‑focused sales expertise in wholesale and manufacturing to craft creative, data‑driven presentations, using their knack for public speaking
    and event coordination to build lasting client networks and push toward a regional sales manager role.
  sports: Holmes Sotomayor stays active by playing forward for the Arvin United community soccer league in the spring, cheering on the Los Angeles Rams and the LA Galaxy, and incorporating weekend bike
    rides through the Central Valley to balance competitive matches with low‑impact cardio.
  arts: Holmes Sotomayor immerses themselves in the local art scene, attending monthly exhibitions featuring muralist Jorge García, photographing the vibrant street art of East Los Angeles, and finding
    inspiration from musicians like Carlos Santana and indie band Alvvays to fuel their sales storytelling.
  travel: Holmes Sotomayor prefers curated road trips that blend cultural immersion and nature, planning weekend getaways to Santa Barbara’s vineyards, a spring hike in Zion National Park, and dreaming
    of a culinary tour of Oaxaca’s markets once the family calendar eases.
  culinary: Holmes Sotomayor experiments in the kitchen with mole poblano, chiles de árbol, and homemade corn tortillas, using fresh cilantro, lime, and roasted cumin to host vibrant dinner gatherings where
    friends sample their take on traditional flavors paired with craft cerveza.
  core: Holmes Sotomayor is a talk‑ative, art‑driven sales strategist who balances meticulous organization with spontaneous creativity, often juggling client calls while sketching mural photographs, yet
    habitually forgets to water houseplants.
background:
  cultural: Holmes was raised in a Mexican‑American household in Arvin, a town with deep agricultural roots and a strong Hispanic community. Spanish was spoken at home, and family traditions such as celebrating
    Día de los Muertos and Las Posadas remain central to his identity. He maintains close ties with extended family, participating in community festivals like Cinco de Mayo parades and local quinceañeras.
    The blend of Mexican cultural values—emphasis on family, respect, and communal support—with the entrepreneurial spirit of California's Central Valley shapes his outlook, driving both his professional
    ambition and his dedication to community involvement.
