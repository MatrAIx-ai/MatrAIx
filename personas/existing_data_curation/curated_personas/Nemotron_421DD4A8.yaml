  career_goals: Melvena hopes to pursue a career that lets her serve her community, especially children and families. She envisions studying health sciences or education in high school and later becoming
    a pediatric nurse or a school counselor. She also dreams of leading community outreach programs that combine health education with environmental stewardship, such as organizing beach clean-ups with
    health awareness workshops. In the short term, she aims to maintain strong grades, join the school's health club, and gain more leadership experience through volunteer work at the local community center.
