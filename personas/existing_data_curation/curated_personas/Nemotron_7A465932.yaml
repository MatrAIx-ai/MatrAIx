personas:
  professional: Tiana Mann, a seasoned journeyman electrician with three decades of residential and light‑commercial wiring expertise, blends meticulous load calculations and NEC compliance with an artistic
    eye for warm, soulful lighting designs, while they mentor apprentices and champion women in the trade.
  sports: Tiana Mann backs the Atlanta Falcons and Atlanta Hawks, plays in a senior softball league each spring, and walks the neighborhood trail with their church walking group to maintain low‑impact fitness.
  arts: Tiana Mann finds inspiration in watercolor sketches of industrial skylines, reveres the luminous installations of James Turrell, collects vintage pendant lights as functional art, and enjoys evenings
    listening to Nina Monk’s piano trio and watching performances by the Atlanta Symphony Orchestra, while they often reflect on how light shapes mood and memory.
  travel: Tiana Mann prefers carefully planned, low‑stress trips that blend cultural immersion with comfort, having explored Savannah’s historic squares, the gardens of Kyoto, and a weekend retreat in Asheville’s
    Blue Ridge Mountains, while they dream of a solar‑powered eco‑lodging stay in Costa Rica.
  culinary: Tiana Mann’s kitchen is a laboratory where heirloom tomato gazpacho, shrimp and grits seasoned with smoked paprika, and sweet‑potato pie share space with experimental smart‑oven recipes, reflecting
    their moderate cooking skill and love for Southern comfort dishes infused with global twists.
  core: Tiana Mann balances a meticulous, art‑infused electrical career with a quiet, community‑oriented life, occasionally worrying over deadlines but always finding solace in watercolor, vintage lights,
    and soulful Southern food, as they cherish moments of calm reflection.
background:
  cultural: Raised in a close‑knit African‑American community near Atlanta, Tiana’s upbringing was steeped in church, family storytelling, and Southern culinary traditions. Her parents emphasized education,
    hard work, and community service, shaping her dedication to kindness and cooperation. As a Black woman in a historically male‑dominated trade, she faced bias that fuels her commitment to mentor other
    women of color. She actively participates in Gwinnett County’s Juneteenth celebrations, supports the local African‑American Historical Society, and incorporates soulful, warm lighting designs that echo
    her cultural roots. Her marriage provides a foundation of mutual support, and she values intergenerational connections, often sharing her experiences with younger relatives and the wider community.
