  hobbies: '[''Restoring vintage lighting fixtures'', ''Visiting art museums and galleries'', ''Watercolor painting'', ''Gardening'', ''Reading historical fiction and biographies'', ''Crossword puzzles'',
    ''Small reading circle'', ''Volunteer senior assistance'', ''Cooking Southern cuisine'', ''Experimenting with smart-home gadgets'']'
  career_goals: Tiana aims to attain master electrician status and earn additional certifications in renewable energy, particularly solar‑PV installation, and advanced smart‑home technologies. She envisions
    transitioning to a part‑time consultancy focused on senior‑friendly home modifications throughout Gwinnett County, while leading a mentorship program that supports women and minorities entering the
    electrical trade. Over the next five years she hopes to launch a boutique electrical contracting firm that emphasizes safety, sustainability, and community harmony, and to balance her professional commitments
    with a schedule that minimizes stress and allows more time for volunteer art‑outreach initiatives.
