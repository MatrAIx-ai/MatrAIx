  hobbies: '[''Watercolor painting'', ''Abstract digital art'', ''Photography'', ''Reading speculative fiction and philosophy'', ''Playing the erhu'', ''Cooking Vietnamese cuisine'', ''Bonsai gardening'',
    ''Tai Chi'', ''Meditation'', ''Attending small poetry readings'']'
  career_goals: Although retired, Thien remains driven by intellectual curiosity and a desire to give back. He plans to launch a modest community initiative that uses art‑based projects to teach basic STEM
    concepts to middle‑school students in Oakland’s under‑served neighborhoods. He also hopes to compile a series of essays and visual pieces that explore the intersection of science, philosophy, and Vietnamese
    cultural motifs, and to curate an online portfolio showcasing his abstract digital artworks. Mentoring senior citizens interested in learning basic computer skills and serving as a volunteer technical
    advisor for local non‑profits are additional ambitions he pursues.
