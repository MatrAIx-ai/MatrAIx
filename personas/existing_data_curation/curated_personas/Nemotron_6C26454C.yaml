personas:
  professional: Thien Dang, a retired semiconductor engineer and lifelong mentor, blends decades of circuit design and data analysis expertise with a vivid imagination, leading community STEM‑art workshops
    that translate complex technical concepts into watercolor‑infused visual narratives while maintaining the disciplined organization of a seasoned project manager and the flexible creativity of an abstract
    artist.
  sports: Thien Dang enjoys low‑impact fitness, practicing Tai Chi in Lake Merritt park, walking with a senior walking club through Redwood Regional Park, and cheering on the Oakland Athletics while occasionally
    joining a community pickleball group, reflecting a balanced, community‑oriented approach to staying active.
  arts: Thien Dang spends mornings creating abstract watercolors inspired by natural patterns, evenings crafting digital collages echoing the luminous works of Yayoi Kusama and the minimalist aesthetics
    of Agnes Martin, captures long‑exposure cityscapes of the Bay, and plays meditative erhu pieces reminiscent of traditional folk melodies, regularly attending poetry readings featuring voices like Ocean
    Vuong and listening to ambient compositions by Ryuichi Sakamoto.
  travel: Thien Dang favors purposeful travel that intertwines cultural reflection and artistic discovery, having explored the misty cliffs of Ha Long Bay during Tet, trekked the granite monoliths of Yosemite
    for plein‑air painting, revisited ancestral hometowns in the Mekong Delta, while also enjoying weekend getaways to the Japanese garden at the Portland Japanese Garden and the historic streets of Sausalito
    for sketching sessions.
  culinary: Thien Dang cherishes cooking family recipes such as bánh chưng and thịt kho trứng for holiday gatherings, skillfully balancing aromatic lemongrass, fish sauce, and caramelized soy, while also
    experimenting with Western twists like miso‑glazed salmon, and delights in preparing fresh pho broth with star anise and star‑shaped tofu, all while claiming a constant search for the perfect bonsai‑inspired
    garnish.
  core: Thien Dang is a quietly curious late‑sixties mind who weaves technical rigor, artistic imagination, and timeless traditions into a harmonious, slightly eccentric life rhythm.
background:
  cultural: Thien is a first‑generation Vietnamese‑American who arrived in the United States as a teenager in the late 1970s, following the end of the Vietnam War. Growing up in Oakland’s diverse neighborhoods,
    he balanced the values of his familial heritage—respect for elders, communal harmony, and the celebration of traditions such as Tet and ancestor worship—with the progressive, multicultural environment
    of the Bay Area. His bilingual fluency in Vietnamese and English has allowed him to stay connected to the local Vietnamese community, participating in cultural festivals, community centers, and inter‑generational
    mentorship programs. At the same time, his long career in the Silicon Valley tech sector and his residence in Oakland have exposed him to a wide spectrum of artistic, scientific, and social influences,
    shaping a hybrid identity that honors his roots while embracing contemporary American culture.
