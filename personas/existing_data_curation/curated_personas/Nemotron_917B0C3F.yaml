  hobbies: '[''Reading historical non-fiction'', ''Gardening'', ''Walking meditation'', ''Woodworking'', ''Chess'', ''Volunteer guest lecturing'', ''Local history research'']'
  career_goals: Bradley aims to transition into a mentorship and consulting role over the next few years, sharing his practical teaching methods with newer educators across the Cook County district. He
    hopes to develop a series of workshops focused on stress‑aware classroom practices and to author a guidebook on blending traditional teaching techniques with select modern digital tools. Ultimately,
    he wishes to leave a lasting impact by improving student engagement and supporting teacher well‑being before fully retiring.
