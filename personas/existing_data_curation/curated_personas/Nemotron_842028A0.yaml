  career_goals: Jerry aims to secure stable, low‑stress employment that lets him apply his practical abilities while providing a predictable routine. He is targeting roles such as facilities maintenance
    technician, security guard, or delivery driver—positions that involve clear daily tasks and limited abstract decision‑making. Over the next few years, he hopes to obtain a certification in HVAC or electrical
    work to transition into a trade that offers higher earning potential and long‑term job security. A secondary ambition is to launch a modest side business offering handyman services to neighbors in East
    Orange, helping him build a reliable supplemental income and regain a sense of financial independence. He also plans to address his stress sensitivity by establishing a consistent daily schedule and
    seeking supportive resources such as counseling or stress‑management workshops.
