  hobbies: '[''gardening'', ''quilting'', ''reading historical and genealogical books'', ''cooking'', ''attending church events'', ''walking'', ''birdwatching'', ''volunteering at senior center'', ''listening
    to classic jazz and country music'', ''exploring Texas history'']'
  career_goals: Angela's primary goal is to remain a valuable and engaged member of her community. She aims to expand her volunteer leadership at the Manor Senior Center, spearheading inter‑generational
    programs and workshops. She also wishes to compile and digitize her family's genealogy records, creating a legacy archive for future generations. In addition, Angela plans to refine her quilting skills
    and sell handcrafted items at local craft fairs, and she aspires to become more proficient with digital tools to share stories through a simple blog. These ambitions reflect her desire for purposeful
    activity, connection with others, and preserving her personal and family heritage.
