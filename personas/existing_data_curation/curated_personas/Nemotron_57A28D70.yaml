personas:
  professional: Anisha Datoc, a retired household manager turned community coordinator, leverages their meticulous budgeting, event planning, and basic tech skills to organize cultural celebrations and
    senior‑center activities, channeling their preference for structure and competitive drive into flawless, deadline‑driven programs while maintaining a healthy skepticism toward external proposals.
  sports: Anisha Datoc follows the Dallas Cowboys and Dallas Stars avidly, joins the Carrollton Senior Walking Club for weekly guided walks, and attends yoga classes at the community center, treating fitness
    as a disciplined routine rather than a competitive sport, though their competitive edge surfaces in bridge tournaments where they apply strategic thinking.
  arts: Anisha Datoc finds creative solace in quilting circles that emulate the intricate patterns of Faith Ringgold, while evenings are filled with the sitar melodies of Ravi Shankar, soulful verses of
    poet Amrita Pritam, and occasional viewings of classic films starring Satyajit Ray, reflecting their meticulous eye for detail and a competitive desire to perfect each stitch.
  travel: Anisha Datoc prefers meticulously planned, low‑stress trips that blend relaxation with cultural immersion, scheduling weekend getaways to Texas Hill Country wineries, annual pilgrimages to the
    historic Golden Temple in Amritsar, and dreaming of exploring the spice markets of Marrakech within their modest retirement budget.
  culinary: Anisha Datoc is a culinary virtuoso who reimagines classic butter chicken with seasonal heirloom tomatoes, hand‑mills their own garam masala, incorporates fresh basil from their garden into
    paneer tikka, and delights in documenting each iteration alongside notes on turmeric, cumin, and locally sourced produce.
  core: Anisha Datoc blends a lifelong love of order with a fierce competitive edge, obsessively tracking garden yields, quilting scores, and budget spreadsheets, yet often succumbs to late‑night worry
    spirals that keep them up counting the minutes until tomorrow’s bridge game.
background:
  cultural: Anisha Singh Datoc was born into a Sikh Punjabi family in the Punjab region of India and emigrated to the United States as a young adult. After completing some college coursework, she settled
    in Texas, where she married a partner of Filipino descent, adopting the Datoc surname and embracing a blended cultural identity. Her upbringing emphasized strong family bonds, respect for elders, and
    the central role of food in cultural expression. In Carrollton, she actively preserves Sikh traditions—celebrating Gurpurabs, Diwali, and Baisakhi—while also honoring Filipino customs such as communal
    meals and holiday gatherings. This bicultural heritage informs her worldview, community involvement, and the values she passes on to younger generations.
attributes:
  skills: '[''Budgeting and Financial Planning'', ''Home cooking (authentic Punjabi Indian cuisine)'', ''Community event coordination'', ''Basic computer operations and digital communication'', ''Gardening
