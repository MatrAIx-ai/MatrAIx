  hobbies: '[''Backyard gardening (vegetables and herbs)'', ''Preparing and documenting traditional Indian dishes'', ''Reading historical fiction'', ''Playing bridge at the senior center'', ''Attending
    weekly yoga and walking groups'', ''Quilting and sewing in community craft circles'', ''Participating in cultural festivals (Diwali, Baisakhi, Filipino celebrations)'']'
  career_goals: Although retired from formal employment, Anisha remains driven by purposeful goals. She aims to formalize her role as a cultural liaison, bridging the South Asian community of Carrollton
    with broader local initiatives, by volunteering regularly at the city’s multicultural council. A personal ambition is to compile and self‑publish a family cookbook that preserves cherished recipes and
    stories for future generations. She also seeks to enhance her digital fluency, planning to complete an online course on blog creation so she can share her culinary and gardening knowledge. Maintaining
    her health and independence is a priority; she intends to adopt a structured senior‑fitness regimen and obtain a certificate in peer counseling to formally support fellow widowed seniors. Her competitive
    streak motivates her to enter local quilting contests, using them as milestones for skill development.
