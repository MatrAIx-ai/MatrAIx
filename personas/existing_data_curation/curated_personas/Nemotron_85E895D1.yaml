personas:
  professional: Marcia Bak, a 39-year-old board-certified registered nurse, leverages her systematic patient assessments, precise medication administration, wound care expertise, and calm adaptability to
    lead care teams, mentor junior staff, and drive quality-improvement initiatives, all while balancing a strong preference for routine with occasional spontaneous problem-solving as she prepares for a
    future role in nursing informatics.
  sports: Marcia Bak walks her rescue dog daily along the lakefront park, participates in the Lake Union Running Club, practices yoga twice a week, cheers on the Seattle Seahawks and Seattle Sounders FC,
    and joins a co-ed recreational softball league on weekends.
  arts: Marcia Bak captures everyday moments through photography, discusses contemporary fiction like Margaret Atwood's The Testaments in her book club, and relaxes to the soothing vocals of Norah Jones
    and the lyrical storytelling of Lin-Manuel Miranda's In the Heights.
  travel: Marcia Bak prefers well-planned weekend escapes to Pacific Northwest gems such as Oregon's Willamette Valley vineyards and Washington's Hoh Rainforest, enjoys spontaneous day trips to local farmers
    markets, and dreams of a summer cultural immersion in Kyoto's historic temples.
  culinary: Marcia Bak delights in creating healthy quinoa-kale salads, turmeric-marinated salmon, and sourdough bread, frequently using fresh avocados, chickpeas, and seasonal vegetables sourced from the
    nearby farmers market, and she loves experimenting with new herb blends like rosemary-thyme.
  core: Marcia Bak blends a routine-driven nursing career with spontaneous creative hobbies, grapples with a persistent worry habit, and occasionally procrastinates on budgeting, all while maintaining a
    compassionate, cooperative outlook.
background:
  cultural: Marcia grew up in a middle‑class, white family in the Chicago suburbs, where Midwestern values of practicality, modesty, and community service shaped her outlook. Her upbringing emphasized hard
    work, punctuality, and respect for tradition, aligning with her preference for routine and familiar structures. Raised in a Protestant environment, she celebrates holidays such as Thanksgiving, Christmas,
    and Easter with family and community gatherings. Her education in STEM reinforced a scientific, evidence‑based mindset, while her nursing career deepened her commitment to caring for others. Living
    in Wilmette, an affluent, family‑oriented community, she participates in local volunteer initiatives and maintains close ties with neighborhood networks, reflecting a cultural background that blends
    suburban American norms with a strong ethic of service.
