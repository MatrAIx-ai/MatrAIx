  career_goals: Marcia aims to transition into a leadership role that blends her commitment to routine‑based patient care with opportunities to mentor and improve care processes. Over the next five years
    she plans to earn a Master of Science in Nursing focusing on nursing informatics, allowing her to integrate her STEM expertise into clinical workflows and streamline documentation. She aspires to become
    a charge nurse or unit manager at her current health‑care facility, where she can champion evidence‑based protocols, lead quality‑improvement projects, and foster a supportive, harmonious work environment.
    Ultimately, she hopes to serve as a clinical educator or informatics specialist who empowers staff to deliver consistent, high‑quality care while maintaining a manageable work‑life balance.
