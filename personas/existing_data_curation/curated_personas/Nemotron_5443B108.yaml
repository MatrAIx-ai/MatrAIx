  career_goals: Although retired, Evelyn aims to stay active in her community. She hopes to lead a neighborhood community garden, share her gardening knowledge, and organize seasonal planting workshops.
    She also plans to document her family's genealogy and publish a small family cookbook featuring her favorite Southern recipes. Evelyn is interested in mentoring younger volunteers at the local food
    pantry and, if time permits, selling a limited line of hand-stitched quilts online. Maintaining good health and independence is a personal ambition she pursues through regular walks and balanced nutrition.
