personas:
  professional: Evelyn Scott, a retired homemaker turned community garden coordinator, uses their decades‑long hands‑on experience to design planting workshops, mentor pantry volunteers, and balance practical
    garden management with a curiosity for heirloom varieties, all while embracing a flexible, occasionally disorganized approach that values results over rigid schedules.
  sports: Evelyn Scott, an avid walker who joins the senior center’s morning walking club, watches the local minor‑league baseball team the River City Rattlers, follows the state’s college football squad
    the State University Tigers during fall, and participates in low‑impact yoga classes at the community center, preferring gentle activity over competitive sports.
  arts: Evelyn Scott, a passionate quilter who admires the bold patterns of Kaffe Fassett, enjoys listening to folk singer Emmylou Harris while stitching, frequently reads the works of local historian Margaret
    L. Taylor, and attends community theater productions starring regional actors like James Caldwell, weaving these artistic influences into their creative identity.
  travel: Evelyn Scott, a relaxed traveler who prefers road‑trip itineraries over rigid schedules, has explored historic Savannah and the Blue Ridge Parkway, dreams of a pilgrimage to the colonial sites
    of Williamsburg and the gardens of Kyoto, often books modest motels through senior discounts, and balances travel ambitions with the financial constraints of a fixed retirement income.
  culinary: Evelyn Scott, a Southern‑style home cook, delights in simmering tomato‑and‑pepper gazpacho using garden‑fresh heirloom tomatoes and chilies, perfects collard greens seasoned with smoked turkey,
    experiments with sweet‑potato biscuits infused with fresh thyme, and occasionally adds a dash of cinnamon to traditional peach cobbler for a flavor twist, all while preserving family recipes in a handwritten
    notebook.
  core: Evelyn Scott embraces curiosity‑driven practicality, juggling a love for gardening, quilting, and community service with a relaxed, sometimes disorganized outlook, a competitive edge that fuels
    friendly contests, and a steadfast commitment to independence in their golden years.
background:
  cultural: Evelyn is a white Southern woman who grew up in mid-20th-century Tennessee. Her upbringing emphasized family, church, hospitality, and self-reliance. She maintains many Southern traditions—country
    music, gospel, and comfort food—while also valuing the practical, community-oriented spirit of the region. Her cultural identity blends a respect for heritage with a curiosity about new ideas, reflecting
    a balance of tradition and adaptability.
