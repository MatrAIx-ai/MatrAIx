persona_description: A scientist who studies extremophiles, particularly those found in extreme environments such as the Antarctic, and their adaptations to survive under harsh conditions. She is particularly
  interested in the study of microorganisms that convert Fe(III) to Fe(II) to create food and energy, and how they have adapted to survive in the absence of light and oxygen. She is a dedicated researcher
  who has conducted extensive research on the Taylor Glacier, Blood Falls, and other extreme environments, and has published several papers on her findings. Her work has been funded by the National Science
  Foundation and has led to her being named a National Science Foundation-funded researcher at Dartmouth College.
