personas:
  professional: Nicole Labuff is a budding LEGO engineer who channels their love for clear goals and structure into constructing elaborate builds, while their relaxed attitude toward obligations sometimes
    leaves bricks scattered, yet they stay focused on completing each project.
  sports: Nicole Labuff stars on the Fort Sill Thunder U8 soccer team, where they enjoy the camaraderie and structured drills, they cheer for Manchester United and the Oklahoma City Thunder NBA team, and
    they spend Saturday mornings climbing trees or biking on neighborhood trails to stay fit.
  arts: Nicole Labuff delights in drawing whimsical animals inspired by Beatrix Potter and Eric Carle, they love reading the "Magic Tree House" series, and they often hum along to Taylor Swift’s upbeat
    songs while browsing the local museum’s exhibit on aviation history.
  travel: Nicole Labuff favors a blend of planned museum trips—like weekly visits to the Oklahoma City Museum of Art—and spontaneous nature hikes on nearby trails, they dream of exploring the Wright Brothers
    National Museum in Dayton and imagine a family road trip to Disney World.
  culinary: Nicole Labuff prefers classic kid-friendly meals such as creamy mac and cheese with a sprinkle of cheddar, chicken nuggets with ketchup, and crunchy carrot sticks, they proudly help stir the
    batter for homemade pancakes, and they’re a fan of sweet apple slices with a dab of peanut butter.
  core: Nicole Labuff balances a love for building structured LEGO worlds with a penchant for spontaneous tree climbing, pockets stray bricks as a quirky habit, and tackles life’s challenges with calm practicality
    and a touch of playful disorganization.
background:
  cultural: Nicole was raised in a middle‑class family in Lawton, Oklahoma, where the community blends small‑town Midwestern values with the unique presence of the nearby Fort Sill military base and the
    rich heritage of the Comanche Nation. Her family celebrates typical American holidays such as Thanksgiving and Christmas, often incorporating local traditions like a community fall festival with rodeo
    demonstrations and a summer fireworks display at the county fair. She attends a public elementary school where she experiences a diverse classroom that includes children of various backgrounds. The
    surrounding prairie landscape and nearby wildlife areas foster her appreciation for nature and animals. While her household follows a Protestant Christian tradition, she is also introduced to regional
    history, learning about the Native American cultures that shaped the area.
