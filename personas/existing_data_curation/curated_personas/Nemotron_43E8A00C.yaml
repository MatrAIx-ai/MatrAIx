  career_goals: Nicole dreams of a future where she can combine her love for animals, hands‑on problem solving, and helping others. She often talks about becoming a veterinarian so she can care for pets
    and wildlife she sees around Lawton’s parks, or an elementary school teacher because she enjoys sharing what she knows with younger children. Occasionally she imagines exploring space as an astronaut,
    inspired by the structured training she sees in stories, but her most concrete ambition is to continue learning and eventually work in a role that lets her make a positive difference in her community.
