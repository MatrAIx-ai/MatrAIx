personas:
  professional: Janice Perlmutter is a three‑year‑old budding block architect, whose methodical planning and vivid imagination drive them to design intricate tower structures during solitary play, showcasing
    early spatial reasoning and adherence to self‑set rules.
  sports: Janice Perlmutter participates in a preschool gymnastics class at Tiny Gym, delights in splash‑water play during weekly toddler swim lessons with the Little Dolphins Club, and has a budding affection
    for the local minor league baseball team, the City Cubs.
  arts: Janice Perlmutter spends hours humming the catchy tunes of The Wiggles, drawing bold primary‑colored squares in homage to Piet Mondrian with crayons, and delights in the animated adventures of Sesame
    Street, which together shape their early appreciation for rhythm, storytelling, and visual abstraction.
  travel: Janice Perlmutter loves short family road trips to the nearby Children’s Museum and the sandy shoreline of Sunny Beach, proudly clutches their tiny passport filled with pictures, and dreams of
    one day strolling through Disneyland’s Fantasyland with their parents.
  culinary: Janice Perlmutter adores creamy mac and cheese, crunchy apple slices, and the occasional peanut‑butter‑and‑jelly sandwich, proudly “cooks” play‑food in their miniature kitchen with plastic pots,
    yet they can be stubborn, refusing vegetables if the plate looks too colorful.
  core: Janice Perlmutter, a tiny tornado of imagination, thrives in solitary play, methodically builds block cities, hoards pennies, and stubbornly rejects messy meals—yet they giggle at the smallest abstract
    pattern and dream of grand adventures.
background:
  cultural: Janice is a white child raised in Grand Prairie, Texas, a suburban community within Dallas County. Her family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth
    of July, and they often attend local community events like park festivals and library story hours. The cultural setting blends mainstream U.S. customs with Texas’s friendly, community‑oriented atmosphere.
    At home, she is exposed to a mix of cultural influences through family traditions, regional foods, and occasional visits to nearby museums and nature centers, fostering both a sense of belonging to
    her local community and a curiosity about the wider world.
attributes:
