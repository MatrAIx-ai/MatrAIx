  hobbies: '[''coloring'', ''block building'', ''sticker arranging'', ''listening to classical music'', ''story‑time podcasts'', ''reading picture books'', ''collecting natural objects'']'
  career_goals: Even at three, Janice frequently talks about what she wants to become when she grows up. She dreams of drawing pictures that tell stories, hoping to be an illustrator or author of picture
    books. She also expresses fascination with space and scientists, imagining herself as a future explorer who discovers new worlds. Her ambition is to keep learning new things, creating art, and sharing
    her stories with others, while maintaining the quiet, focused environment she loves.
