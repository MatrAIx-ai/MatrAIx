personas:
  professional: Damien Mendez, a 34‑year‑old front‑of‑house professional in fast‑food service, combines meticulous cash handling and POS expertise with a calm, multitasking style that positions them to
    thrive as a shift leader and future restaurant manager while pursuing an associate degree in hospitality management.
  sports: Damien Mendez follows the Chicago Cubs and Indianapolis Colts, plays weekly pickup soccer with the local community center league, hikes with the regional outdoor club through the nearby state
    forest, and seasons their fitness routine with occasional fishing trips that double as stress‑relief outings.
  arts: Damien Mendez enjoys the storytelling of Wes Anderson films, the folk melodies of Brandi Carlile and The Lumineers, and the culinary podcasts of Chef John, weaving these artistic influences into
    their own creative cooking experiments and occasional open‑mic nights at the community center.
  travel: Damien Mendez prefers road‑trip itineraries that blend short hikes in Door County, a weekend fishing getaway to the Great Lakes, and culinary pilgrimages to New Orleans and Oaxaca, always booking
    budget‑friendly accommodations while saving a portion of travel costs for the eventual European café tour.
  culinary: Damien Mendez cooks at a confident home‑chef level, perfecting classic Midwestern dishes like chicken fried steak, pork tenderloin with apple compote, and homemade sourdough, while experimenting
    with sous‑vide carrots, smoked Gouda, and rosemary‑infused butter to create occasional menu twists for the future café.
  core: Damien Mendez is a pragmatic, curiosity‑driven community‑oriented foodie who balances disciplined financial planning with occasional splurges, manages mild health hurdles through routine checks,
    and channels their organized yet flexible mindset into a lifelong goal of serving comfort food with creative flair.
background:
  cultural: 'Damien grew up in Castalia, Iowa, immersed in the values of a close‑knit Midwestern community: practicality, modesty, and a strong work ethic. His white, rural background emphasizes cooperation,
    respect for tradition, and an appreciation for local agriculture, all of which shape his friendly demeanor, reliable nature, and desire to contribute positively to his town.'
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Food safety compliance'', ''POS system operation'', ''Multitasking under pressure'', ''Team coordination'', ''Basic inventory management'', ''Menu
