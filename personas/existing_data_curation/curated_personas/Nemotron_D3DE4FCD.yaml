  hobbies: '[''Home cooking'', ''Hiking'', ''Fishing'', ''Community volunteering'', ''Attending local festivals'', ''Listening to podcasts on food and self‑improvement'']'
  career_goals: Damien aims to move into supervisory roles, first as a shift leader and eventually as a restaurant manager, leveraging his organizational strengths and people‑focused approach. He plans
    to complete his associate degree in hospitality management, with the long‑term ambition of opening a small, community‑oriented café that blends classic Midwestern comfort food with occasional innovative
    menu twists.
