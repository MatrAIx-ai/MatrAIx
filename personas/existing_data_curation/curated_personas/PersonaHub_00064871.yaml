persona_description: A historian and scholar of the history of the Catholic Church, particularly focusing on the interfaith relations between the Catholic Church and other faiths, and the role of popes
  in transforming interfaith relations. They are knowledgeable about the history of the Second Vatican Council and its impact on Catholic-Jewish relations, as well as the contributions of John XXIII and
  John Paul II in this area. They are also interested in the deicide myth, the use of the word "perfidious" in Catholic prayers, and the role of popes in the struggle against anti-Semitism.
