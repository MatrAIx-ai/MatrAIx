  career_goals: Although still a toddler, Leslie’s caregivers nurture her curiosity and disciplined nature, encouraging her love of art and structured play. As she grows, they envision her pursuing a path
    that blends creativity with organization, such as becoming a visual artist, museum curator for children’s exhibits, or an art educator who designs engaging, orderly learning experiences.
