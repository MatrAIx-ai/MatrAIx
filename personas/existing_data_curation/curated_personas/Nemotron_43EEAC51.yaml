personas:
  professional: Leslie Barnes, an ultra‑organized 2‑year‑old architect in the making, channels a love for patterns into meticulously arranging block towers and color‑coded crayons, already demanding perfect
    symmetry before moving on to the next project, and they proudly showcase each creation to an audience of stuffed animals.
  sports: Leslie Barnes, a pint‑sized sports enthusiast, attends a local toddler soccer club called Little Sprouts, loves the weekly preschool gymnastics class, and proudly wears a cap of the Chicago Cubs
    while cheering on the team during weekend family outings.
  arts: Leslie Barnes, an emerging visual and musical explorer, delights in finger‑painting bold shapes reminiscent of Henri Matisse's cut‑outs and hums along to the lively tunes of The Wiggles and the
    soothing lullabies of Raffi, often staging impromptu performances for an audience of plush toys.
  travel: Leslie Barnes, an adventure‑curious toddler, enjoys short family road trips to the nearby seaside boardwalk, dreams of visiting the Magic Kingdom in Orlando, and they prefer well‑planned itineraries
    that include nap breaks and a designated snack station.
  culinary: Leslie Barnes, a budding foodie with a penchant for bright flavors, eagerly devours cheesy mac‑and‑cheese, loves picking out tiny peas from a plate of spaghetti, and they proudly stir batter
    in a toy kitchen while pretending to be a chef.
  core: Leslie Barnes, a meticulously organized yet endlessly curious toddler, builds perfect block towers, hoards dinosaur crackers for midnight snacking, and they piously enforce a daily routine that
    rivals a seasoned executive’s calendar.
background:
  cultural: Leslie is raised in a New England white family in Goffstown, New Hampshire. Her upbringing reflects the region’s emphasis on community cohesion, seasonal outdoor activities, and orderly household
    routines. Family traditions include celebrating local holidays, attending town fairs, and engaging in outdoor play throughout the four distinct seasons, fostering her appreciation for nature, structure,
    and modest social gatherings.
