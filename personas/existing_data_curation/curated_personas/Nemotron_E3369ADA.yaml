  career_goals: Michael aims to secure a scholarship to a specialized high‑school program that blends visual arts and technology, then pursue a bachelor's degree in graphic design or art therapy. He envisions
    a career where he can design therapeutic visual media—such as illustrated guides or calming digital experiences—to help other teens manage anxiety, while also working as a freelance illustrator for
    indie games and local Texas art projects.
