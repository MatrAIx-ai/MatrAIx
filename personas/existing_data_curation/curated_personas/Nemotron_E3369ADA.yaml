personas:
  professional: A teenage aspiring indie game developer, Michael Stansbury blends meticulous organization with a love of storytelling, coding simple video games in Unity while using their sketchbook and
    digital art tools to craft pixel art assets, and their disciplined work ethic ensures deadlines are met despite occasional bouts of intense anxiety.
  sports: Michael Stansbury prefers low‑key fitness, joining the county’s youth hiking club for weekend trail outings and practicing yoga at home, while cheering on the local high school soccer team and
    the County Hawks minor‑league baseball club from the bleachers, reflecting a modest but steady engagement with sports.
  arts: Michael Stansbury channels their curiosity into sketching manga‑style characters inspired by the works of Akira Toriyama and Jim Lee, creates digital landscapes reminiscent of Studio Ghibli’s aesthetic,
    and composes acoustic guitar renditions of The Beatles and Tame Impala, all while attending a weekly book club that explores graphic novels by Neil Gaiman, weaving a vibrant artistic identity.
  travel: Michael Stansbury’s travel style balances meticulous planning with a yearning for quiet discovery, having trekked the misty trails of Yosemite and explored the Smithsonian museums in Washington,
    D.C., while dreaming of a future solo adventure to Kyoto’s bamboo forests and the vibrant streets of Tokyo to soak in anime culture, all on a modest budget limited by parental approval.
  culinary: Michael Stansbury enjoys crafting simple meals, often whipping up garlic‑butter shrimp pasta and avocado toast with feta, while indulging in takeout sushi rolls and pepperoni pizza, and occasionally
    attempts to bake banana bread using overripe bananas, reflecting a moderate cooking skill that blends comfort food cravings with a curiosity for flavor.
  core: Michael Stansbury is a meticulous 14‑year‑old dreamer whose organized sketchbooks hide half‑finished art, whose night‑time guitar practice often triggers quiet anxiety, and who can’t resist a sudden
    binge of sci‑fi manga before bedtime.
background:
  cultural: Raised in Montgomery, Texas, Michael grew up in a tight‑knit community where Southern hospitality and a strong sense of neighborliness are valued. His family participates in local church gatherings
    and community events, fostering an environment of cooperation and consideration for others. Exposure to Texas folk art, regional music festivals, and the nearby historic museums sparked his appreciation
    for art and unconventional ideas. While the rural setting provides a peaceful backdrop for solitary pursuits, the emphasis on community service and harmony influences his desire to help others through
    creative and therapeutic means.
