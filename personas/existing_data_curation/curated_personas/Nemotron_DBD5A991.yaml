  hobbies: '[''Desert Hiking'', ''Gardening'', ''Woodworking'', ''Reading Business Biographies'', ''Cooking Mexican Cuisine'', ''Mindfulness Meditation'', ''Small‑Group Book Club'', ''Volunteer Food Bank
    Assistance'']'
  career_goals: Javier aims to advance to a senior director role overseeing multiple locations, where he can institutionalize reliable, structured systems that reduce uncertainty for his teams. He is passionate
    about mentoring emerging leaders, especially from underrepresented backgrounds, and hopes to create inclusive, harmonious workplaces. Long‑term, he envisions launching a boutique consulting practice
    that helps small Tucson businesses adopt efficient operational frameworks, providing community stability while allowing him a predictable workload that supports his mental‑health needs.
