  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Hiking in East Texas forests'', ''Birdwatching'', ''Yoga'', ''Reading mystery novels'', ''Quilting'', ''Volunteering at community center'', ''Book
    club participation'', ''Listening to ranchera and Tejano music'']'
  career_goals: Vanessa aims to advance into a senior leadership role where she can shape strategic decision‑making for regional industries in East Texas. Over the next five years she plans to earn a Master’s
    in Business Analytics or an MBA to complement her technical expertise, and to obtain a Certified Analytics Professional (CAP) credential. She aspires to lead a multidisciplinary analytics team, mentor
    emerging talent—particularly women and Latinx professionals—and develop data‑driven solutions that improve local public services such as emergency‑response routing and school‑bus scheduling. Ultimately,
    she hopes to balance career growth with a flexible schedule that supports her family and community involvement.
