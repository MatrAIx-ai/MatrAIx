persona_description: A government official from the Hong Kong Environment Bureau, responsible for promoting energy saving in the territory. Wong Kam-sing is committed to achieving a 40 percent reduction
  in energy intensity by 2025, and has set up a target based on Hong Kong's past achievements in energy saving. He plans to promote energy saving through various measures, including requiring all major
  government buildings and public housing to achieve a certain energy-saving standard and supporting community campaigns through government funding schemes. Chan Ka-lok, a civic party legislator, suggests
  a more aggressive target and advises on the transparency of energy consumption data.
