  career_goals: Joshua aims to advance to a senior executive role—such as Director of Operations or Vice President of Strategy—within the next five to seven years, where he can drive large‑scale digital
    transformation and embed a culture that balances disciplined processes with creative freedom. He aspires to lead cross‑functional initiatives that integrate innovative thinking into business strategy,
    mentor emerging talent, and earn recognition for delivering measurable performance improvements. Longer‑term, he envisions launching a boutique consultancy that helps organizations fuse strategic planning
    with artistic and design perspectives, allowing him to blend his love for business and the arts while maintaining a healthy work‑life balance.
