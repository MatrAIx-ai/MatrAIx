personas:
  professional: Joshua Holloway, a 37‑year‑old strategic operations manager with an MBA, combines data‑driven decision‑making and agile project leadership with a design‑thinking mindset, channeling their
    competitive drive and healthy skepticism into measurable performance gains while championing creative freedom across cross‑functional teams.
  sports: Joshua Holloway spends weekends hiking the Wasatch Range and carving powder at Park City, holds a season pass with the Wasatch Mountain Club, avidly follows the Utah Jazz and Real Salt Lake, and
    channels their competitive spirit into organized trail runs and board‑game tournaments.
  arts: Joshua Holloway frequents the Utah Museum of Fine Arts, attends community theatre productions like 'The Book of Mormon' at the Pioneer Theatre, draws inspiration from photographers Ansel Adams and
    contemporary visual artist Yayoi Kusama, and mentors youth in local art programs, blending their curiosity and competitive drive into artistic expression.
  travel: Joshua Holloway curates purposeful trips that balance cultural immersion and personal recreation, having explored Tokyo’s tech art scene, Barcelona’s architecture, and New Zealand’s trekking routes,
    while planning future visits to Marrakech for its souk artistry and the Norwegian fjords, always packing a DSLR to capture the journey.
  culinary: Joshua Holloway enjoys cooking a rotating menu of Thai green curry with kaffir lime leaves, Turkish mezze featuring sumac‑spiced eggplant, and Mexican mole with chipotle and chocolate, sourcing
    fresh ingredients at farmer’s markets, while occasionally treating themselves to gourmet sushi rolls after a long day.
  core: Joshua Holloway is a strategic leader who marries disciplined business acumen with a voracious artistic curiosity, channeling a competitive edge and measured skepticism into both professional successes
    and personal pursuits, though they sometimes overwork and forget to unwind.
background:
  cultural: Joshua grew up in a suburban, middle‑class family in Utah County, an area with a predominantly White population and a strong sense of community. His upbringing was shaped by local values that
    emphasize family, self‑reliance, and community service, influenced in part by the cultural environment of The Church of Jesus Christ of Latter‑day Saints, though he maintains a personal outlook that
    blends these traditions with broader, secular interests. Family trips to national parks and regular visits to regional museums sparked his curiosity about the natural world and the arts. This combination
    of regional cultural roots and an openness to diverse experiences has cultivated a balanced perspective that respects local customs while actively seeking new ideas and artistic expressions.
