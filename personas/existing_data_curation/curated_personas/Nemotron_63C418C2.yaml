  career_goals: As she approaches retirement, Frances aims to transition from full‑time bedside work to a part‑time Nurse Educator role at a local community college or hospital training program, where she
    can share her decades of experience with the next generation of nurses. She plans to develop a series of workshops focused on compassionate communication and mental‑health resilience for seniors, leveraging
    her own experience with anxiety and sadness. Frances also hopes to serve on Raleigh’s health advisory board to influence policies that improve elder care and mental‑health services. Publishing a practical
    guide on managing chronic illness while maintaining emotional well‑being is another long‑term ambition.
