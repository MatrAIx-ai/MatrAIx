persona_description: A historian and scholar who specializes in the study of ecclesiastical history and calendar reform, particularly the life and work of Dionysius Exiguus, the monk who invented the Anno
  Domini era and developed tables for future dates of Pascha. His research interests include the history of the Church and the development of Christian calendars, as well as the contributions of Dionysius
  to the field of mathematics and astronomy.
