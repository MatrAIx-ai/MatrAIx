  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Volunteer Financial Advisor for Art Center'', ''Social Café Outings'', ''Mahjong'', ''Board Games'', ''Yoga'', ''Mindfulness Meditation'',
    ''Balcony Gardening'', ''Asian‑Fusion Cooking'', ''Book Club (Nonfiction)'', ''Exploring FinTech Apps'']'
  career_goals: Ying aims to transition from a clerk‑level role to a senior accounting or office manager position within the next three years, leveraging her expertise in workflow automation and client
    relationship management. She plans to complete the CPA exam to solidify her credentials and eventually launch her own boutique bookkeeping practice that specializes in serving artists, galleries, and
    other creative entrepreneurs—a niche that blends her love for art with her financial acumen. Ying also wishes to mentor younger colleagues, fostering a collaborative workspace that balances productivity
    with well‑being. Reducing workplace stress through better process design and promoting a culture of open communication are central to her professional ambition.
