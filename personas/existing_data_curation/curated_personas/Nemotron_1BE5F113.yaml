  hobbies: '[''contemporary art galleries'', ''live music performances'', ''cycling'', ''hiking'', ''experimental cooking'', ''hosting dinner parties'', ''acoustic guitar'', ''community science outreach'',
    ''STEM mentoring'', ''reading (science fiction, philosophy, research)'', ''mindfulness meditation'']'
  career_goals: He aims to become a senior research scientist leading a multidisciplinary team focused on sustainable materials and green chemistry, securing patents and publishing high‑impact papers, and
    eventually transition into a leadership role such as R&D manager or director. He also wants to mentor early‑career scientists, develop partnerships with industry to commercialize environmentally friendly
    polymers, and possibly launch a spin‑off venture. Recognizing his sensitivity to stress, he aspires to create a balanced work environment that emphasizes mental well‑being and collaborative culture.
