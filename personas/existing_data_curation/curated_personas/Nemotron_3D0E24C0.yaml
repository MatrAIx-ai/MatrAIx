  hobbies: '[''Gallery and Street Art Exploration'', ''Photography'', ''Acoustic Guitar Playing'', ''Cooking Mexican and Fusion Cuisine'', ''Hiking'', ''Ultimate Frisbee'', ''Community Theater Volunteering'',
    ''Improv Comedy Classes'', ''Reading Contemporary Non-Fiction'', ''Traveling to Mexico'']'
  career_goals: As a seasoned educator, Pablo aspires to transition into an instructional leadership role within the Los Angeles Unified School District. He aims to become a department chair or curriculum
    specialist where he can champion the integration of the arts and bilingual education across schools. He plans to pursue a doctorate in Educational Leadership to deepen his expertise in policy development
    and equity initiatives. Additionally, Pablo hopes to author a guidebook on culturally responsive project‑based learning and to launch a community after‑school program that pairs local artists with middle‑school
    students.
