personas:
  professional: Pablo Payan, a 46‑year‑old secondary educator with deep expertise in interdisciplinary curriculum design, blends structured lesson planning with spontaneous improv, leverages bilingual instruction
    and educational technology to embed visual arts into social studies, and channels his persistent worry into meticulous program development as he pursues a leadership role.
  sports: Pablo Payan, an avid hiker of the San Gabriel Mountains and a regular player for the Echo Park Flyers ultimate‑frisbee league, follows the Los Angeles Dodgers and Los Angeles Rams closely, and
    schedules his fitness routine around community theater rehearsals and open‑mic nights.
  arts: Pablo Payan, a devoted participant in Los Angeles gallery openings and street‑art tours, captures murals with his Leica camera, performs acoustic folk songs inspired by regional rhythms at open‑mic
    venues, credits the influence of Shepard Fairey and Nick Drake, and channels improvisational energy from local theater workshops into his creative projects.
  travel: Pablo Payan, a weekend explorer with a modest travel budget, has trekked the red rocks of Sedona, road‑tripped the Pacific Coast Highway to Monterey, visited the vibrant murals of Austin, and
    hopes to experience Kyoto’s traditional tea‑house architecture while balancing family commitments.
  culinary: Pablo Payan, an enthusiastic home cook, loves crafting corn‑based dumplings stuffed with smoky chilies, grilling fish with citrus‑herb rubs, preparing fresh avocado‑lime salads, experimenting
    with farm‑fresh ingredients from local markets, and sharing the results at lively potluck gatherings.
  core: Pablo Payan blends restless curiosity, community‑centered artistry, and a drive for educational equity with a habit of over‑committing to events, a tendency to worry about outcomes, and a secret
    stash of vintage concert tickets.
background:
  cultural: Pablo’s Mexican heritage is a central thread of his identity. Raised in a bilingual household, he grew up celebrating Día de los Muertos, Semana Santa, and Mexican culinary traditions, which
    he continues to observe with his family in Pomona. He maintains close ties to the local Mexican community, regularly participating in cultural festivals, language exchange groups, and volunteer initiatives
    at a nearby community center that supports recent immigrants. His bicultural experience blends Mexican collectivist values—emphasis on family, community, and respect for elders—with the individualistic
    and innovative spirit of Southern California, shaping his worldview and informing his teaching philosophy.
