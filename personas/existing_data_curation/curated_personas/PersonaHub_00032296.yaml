persona_description: A fitness enthusiast who is determined to keep up their workout regimen despite the heat and humidity. They are experienced in outdoor exercise and have a good understanding of the
  body's response to hot and humid weather. They are aware of the importance of proper hydration, being well-rested, and wearing light clothing before exercising in hot and humid weather. They are also
  aware of the body's ability to fatigue quickly in hot weather and the importance of acclimatizing to the temperature before a workout and planning breaks ahead of time. They are also aware of the risks
  of overheating and the importance of listening to their body and taking breaks when needed.
