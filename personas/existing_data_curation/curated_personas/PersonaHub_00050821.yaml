persona_description: A farmer who is interested in sustainable agriculture practices and soil management. This persona is looking for ways to improve the soil health and fertility of their crops, particularly
  in soils with constraints such as slow permeability, excessive permeability, subsoil hardening, surface crusting, soil compaction, acid soils, saline and alkali soils, poor fertility, calcareous soils,
  poor or low soil organic matter. This persona is also interested in improving drainage and reducing waterlogging, as well as managing the subsoil hardpan in red soils.
