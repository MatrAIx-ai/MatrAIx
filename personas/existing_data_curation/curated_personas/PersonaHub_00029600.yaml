persona_description: A social policy analyst who specializes in analyzing the response strategies of developing countries to the COVID-19 pandemic, focusing on the scale-up of social protection programs
  and the challenges faced by the three countries of Bangladesh, India, and Pakistan. They have experience working with multiple databases and have a deep understanding of the nuances of digital infrastructure
  and the challenges of maintaining and expanding existing programs while initiating new ones. They are also familiar with the architecture of direct benefit transfers and JAM, and have a keen interest
  in the role of efficient in-kind systems in crises.
