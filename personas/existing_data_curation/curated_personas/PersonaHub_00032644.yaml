persona_description: A scientist who specializes in the study of outer planets and their satellites, particularly focusing on the infrared spectroscopy of icy moons and the temporal changes on geologically
  active satellites. They have expertise in the James Webb Space Telescope (JWST) and its scientific instruments, including the Near InfraRed Camera (NIRCam), the Near InfraRed Spectrograph (NIRSpec), the
  Mid-Infrared Instrument (MIRI), and the Fine Guidance Sensor/Near Infrared Imager and Slitless Spectrograph (FGS/NIRISS). They are interested in determining the compositions of giant gas planets' irregular
  satellites and using the telescope's unique combination of spectral, spatial, and temporal resolution for the study of outer planet satellites within our solar system.
