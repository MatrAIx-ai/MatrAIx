persona_description: A structural engineer who specializes in the design and analysis of buildings, bridges, and other structures. They are familiar with the principles of structural load design and have
  a deep understanding of the various loads that can be applied to a building or structure. They are likely to be interested in the latest research and advancements in structural load design, and have experience
  working with architects, engineers, and other professionals to ensure that buildings and structures are designed and built to withstand the forces of nature and human activity. They may also be interested
  in the impact of vibration and shock on building structures, and how to design buildings to withstand these stresses.
