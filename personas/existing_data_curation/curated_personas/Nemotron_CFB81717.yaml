  career_goals: Although nearing traditional retirement age, Manuel is motivated to deepen his expertise and secure a legacy of knowledge within his pharmacy. He aims to obtain the Certified Pharmacy Technician
    (CPhT) credential and an advanced sterile compounding certification within the next two years. He aspires to transition into a senior technician or quality assurance supervisor role, overseeing medication
    safety protocols and training new employees. Manuel also wishes to contribute to community health education by leading workshops at local senior centers on medication adherence and safe over‑the‑counter
    use. Ultimately, he hopes to balance continued professional involvement with a gradual reduction in workload, allowing more time for family and cultural pursuits.
