personas:
  professional: Mary Spencer, an aspiring junior historian who translates the adventure and history of her favorite chapter books into meticulously built LEGO replicas of ancient landmarks, demonstrates
    her practical and organized nature by logging each construction step in a colorful notebook and dreams of one day curating exhibits at a museum.
  sports: Mary Spencer, a diligent midfielder on the Lakefront United youth soccer team, cheers for the Chicago Cubs on weekends, practices dribbling drills she learned from a YouTube tutorial after school,
    and balances team camaraderie with her habit of methodically timing each practice session with a kitchen timer.
  arts: Mary Spencer, who fills sketchbooks with detailed drawings inspired by the whimsical style of Shaun Tan and the vibrant scenes of Disney's 'Moana', enjoys listening to Yiruma's piano pieces while
    coloring, and occasionally reenacts Magic Tree House adventures for her family, adding a theatrical flair to her creative play.
  travel: Mary Spencer, who loves weekend trips to the Indiana Dunes and the Lake Michigan shoreline where she maps boardwalk routes in a pocket notebook, dreams of a school field trip to the Great Lakes
    Maritime Museum and a future family vacation to Washington, D.C.'s Smithsonian museums, and always packs a small bag of seashells as souvenirs.
  culinary: Mary Spencer, who often bakes chocolate chip cookies with her mom, delights in sprinkling rainbow sprinkles on batter, enjoys munching carrot sticks dipped in hummus, and proudly measures flour
    by eye despite sometimes forgetting to set the timer, resulting in slightly over‑baked treats she still proudly serves.
  core: Mary Spencer, a meticulously organized eight‑year‑old who balances a love of adventure books and LEGO builds with a habit of over‑planning snack times, a tendency to lose track of time while coloring,
    and a secret stash of stickers hidden in school desk drawers.
background:
  cultural: Mary lives in Buchanan, a small town in Berrien County, Michigan, where Midwestern community values such as neighborliness, family involvement, and participation in local events are prominent.
    Her family reflects typical regional heritage, with roots in German and English ancestry, and they celebrate holidays like Thanksgiving, Fourth of July, and local traditions like apple picking and county
    fairs. Mary attends a public elementary school that emphasizes practical learning, civic responsibility, and teamwork. The community's emphasis on organized activities, school events, and church youth
    groups supports her structured personality while providing a supportive, inclusive environment.
attributes:
  skills: '[''Reading comprehension (chapter books)'', ''Basic addition, subtraction, and introductory multiplication'', ''Organizing school supplies and personal workspace'', ''Following daily routines
