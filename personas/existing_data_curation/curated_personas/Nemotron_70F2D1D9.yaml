  hobbies: '[''Reading chapter books'', ''Building LEGO sets'', ''Drawing and coloring'', ''Playing soccer'', ''Nature walks and lake shoreline explorations'', ''Baking with family'', ''Organizing sticker
    collection'', ''Solving puzzles (word searches, beginner Sudoku)'']'
  career_goals: Mary imagines a future where she helps others in a structured, supportive environment. She often says she wants to become a teacher because she enjoys organizing lessons and guiding classmates,
    and she also thinks about being a librarian to keep books in order and introduce stories to other kids. Occasionally, she mentions wanting to work with animals as a veterinarian, reflecting her love
    for pets and her practical desire to care for living things. Her ambitions are shaped by her appreciation for clear responsibilities and community service.
