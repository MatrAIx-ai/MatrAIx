  hobbies: '[''Gardening'',''Walking on Erie Canal Trail'',''Mystery novels'',''Quilting'',''Bingo nights'',''Volunteering at food pantry'',''Adult‑education classes (gardening, knitting)'']'
  career_goals: Tina aims to leverage her extensive store experience to move into a supervisory role, such as Shift Lead or Department Coordinator, where she can mentor younger staff while still staying
    on the floor. She is also considering completing her GED to broaden future options, possibly exploring part‑time consulting for small local businesses on customer service best practices. Ultimately,
    she wants to secure a stable retirement income and use her leadership experience to volunteer as a community center mentor for seniors learning basic computer skills.
