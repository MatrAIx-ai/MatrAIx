persona_description: A professional who specializes in the use and application of industrial radiography, particularly in the inspection and quality control of die castings and light-alloy castings produced
  for the automotive industry. This persona is skilled in interpreting X-ray images to detect and identify casting discontinuities, such as shrinkage cavities, cold fills, oxide films, dross, and entrapped
  air bubbles, which can affect the tensile behavior of casting alloys and the safety of construction. This persona has a deep understanding of the manufacturing process and the various materials used in
  die casting and light-alloy casting, and is able to use their expertise to ensure the quality of these components.
