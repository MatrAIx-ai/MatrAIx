personas:
  professional: Kian Keohane, a seasoned mental health counselor in Nassau County, blends evidence‑based CBT and solution‑focused brief therapy with his own art‑therapy sketches to deliver client‑centered
    care that reflects his curiosity, organized flexibility, and strong community‑rooted values.
  sports: Kian Keohane fuels his competitive spirit by joining the local East Long Island pick‑up basketball league, cheering for the New York Knicks and Yankees, and coaching a Sunday community soccer
    clinic for kids, balancing the endorphin rush of play with his self‑care routine.
  arts: Kian Keohane immerses himself in New York’s cultural pulse by attending exhibitions at the MoMA and the Whitney, sketching street scenes in a Moleskine while drawing inspiration from artists like
    Basquiat and Kehinde Wiley, and volunteers as a mentor for youth art workshops, letting his curiosity drive both personal creation and community empowerment.
  travel: Kian Keohane prefers meticulously planned weekend getaways to the Hudson Valley’s wineries and the historic streets of Boston, while dreaming of a month‑long art residency in Provincetown, balancing
    a love of structured itineraries with spontaneous local explorations whenever budget permits.
  culinary: Kian Keohane enjoys cooking Mediterranean‑inspired dishes—such as grilled branzino with lemon‑olive oil, chickpea and kale salads, and a hearty ratatouille—using fresh ingredients from the farmers'
    market, yet admits to a habit of over‑indulging in artisanal coffee and midnight bagels during busy therapy weeks.
  core: Kian Keohane is a 42‑year‑old therapist who fuses art and science, budgets wisely but splurges on creativity, battles anxiety with yoga, and lives for the buzz of basketball, galleries, and meticulously
    plotted weekend escapes.
background:
  cultural: Kian was raised in a middle‑class, Anglo‑American household on Long Island, with family roots tracing back to Irish and English ancestors who settled in the Northeastern United States in the
    early 20th century. Growing up near the cultural crossroads of New York City, he was exposed to a diverse mix of traditions, cuisines, and artistic expressions, shaping an inclusive worldview. Though
    his religious upbringing was in a Protestant denomination, he now identifies as culturally secular while respecting the varied faiths of his clients. His upbringing emphasized community involvement,
    education, and self‑reliance, values that continue to inform his counseling philosophy and his commitment to serving the multicultural population of Nassau County.
attributes:
  skills: '[''Active Listening'', ''Empathic Engagement'', ''Cognitive Behavioral Therapy (CBT)'', ''Solution-Focused Brief Therapy'', ''Crisis Intervention'', ''Risk Assessment'', ''Group Facilitation'',
