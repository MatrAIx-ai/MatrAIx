  hobbies: '[''Gallery and Museum Visits'', ''Sketching/Watercolor Painting'', ''Reading Psychology and Philosophy'', ''Pick-up Basketball'', ''Board Game Hosting'', ''Mindfulness Meditation'', ''Yoga'',
    ''Volunteering as Youth Art Mentor'']'
  career_goals: Kian aims to obtain his Licensed Clinical Social Worker (LCSW) credential within the next two years and transition into a senior clinical supervisor role at a community mental health center
    in Nassau County. He envisions creating an interdisciplinary art‑therapy program for adolescents at risk of anxiety and depression, leveraging his passion for creative expression. Over the long term,
    Kian aspires to establish a private practice that offers integrative counseling—including CBT, solution‑focused techniques, and art‑based interventions—while also mentoring emerging counselors. He is
    also interested in publishing a guide on managing stress for high‑functioning professionals and advocating for expanded mental‑health funding in local schools.
