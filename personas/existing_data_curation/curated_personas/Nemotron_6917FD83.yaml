personas:
  professional: An aspiring digital storyteller, Andrew Furse channels their curiosity and love of solitary reflection into sketching, experimenting with digital art tools like Procreate and coding short
    interactive narratives, balancing meticulous organization of project files with a willingness to experiment beyond conventional aesthetics.
  sports: Andrew Furse enjoys quiet, low-impact activities such as kayaking on Lake Calhoun and occasional skateboarding at the local skate park, follows the Minnesota Vikings, Minnesota Twins, and Minnesota
    Wild avidly, and belongs to a weekend cycling club that rides the Grand Rounds trail, preferring solo practice over team sports.
  arts: Andrew Furse immerses themselves in visual and auditory arts, drawing inspiration from James Turrell's light installations, Olafur Eliasson's environmental works, listening to Brian Eno's ambient
    albums and Tim Hecker's experimental soundscapes, while frequently visiting the Minneapolis Institute of Art to study works by Vincent van Gogh and Jean-Michel Basquiat.
  travel: Andrew Furse prefers reflective solo trips, often biking to the nearby Minnehaha Falls, planning low-budget weekend getaways to Chicago's museum district and the Boundary Waters for wilderness
    camping, and dreaming of a future pilgrimage to Kyoto's tranquil gardens and tea houses.
  culinary: Andrew Furse enjoys simple yet comforting meals like miso ramen with soft-boiled eggs, avocado toast drizzled with olive oil, and homemade oat-banana smoothies, experimenting with ingredients
    such as miso paste, seaweed, and roasted chickpeas while relying on their modest kitchen skills to snack between art sessions.
  core: Andrew Furse is a quietly intense teen who transforms solitary lake walks into experimental digital art, hoards spare change for a dream graphics tablet, battles occasional migraines, and prefers
    ambient drones over chatter.
background:
  cultural: Andrew was raised in a middle‑class white family of primarily Swedish and Norwegian ancestry in the suburbs of Minneapolis, Hennepin County. His family emphasizes self‑reliance, modesty, and
    community involvement through the public library system and local cultural institutions. Traditions such as celebrating Midsommar, Thanksgiving, and seasonal outdoor activities are common in his household.
    The Midwestern cultural values of independence, quiet perseverance, and a strong connection to nature shape his preference for solitude, his reflective demeanor, and his appreciation for varied experiences.
attributes:
  skills: '[''digital illustration (Krita, Procreate)'', ''traditional sketching (graphite, charcoal)'', ''basic Python programming (scripts, game prototyping)'', ''music composition (piano, DAW basics)'',
    ''critical reading and analytical writing'']'
  hobbies: '[''drawing and sketching'', ''digital art experiments'', ''reading sci‑fi and philosophy'', ''coding interactive narratives'', ''listening to experimental music'', ''visiting art museums and
    galleries'', ''wilderness walks in nearby parks'']'
  career_goals: He aims to build a career that unites his love for art and technology, aspiring to become an independent concept artist and indie game developer. After high school, he hopes to attend a
    specialized art and design program—potentially at the Minneapolis College of Art and Design—where he can refine his visual storytelling and programming skills. Long‑term, he envisions creating his own
    game titles or contributing to small studios that value creative autonomy, while also keeping open the possibility of working in museum curation or digital archiving, roles that would let him apply
    his organizational strengths and appreciation for diverse cultural artifacts.
