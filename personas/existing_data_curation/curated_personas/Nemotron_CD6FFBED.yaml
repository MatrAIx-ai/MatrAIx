personas:
  professional: Thomas Vernon is a budding LEGO engineer who channels their curiosity into building intricate models, and they balance imaginative design with methodical step‑by‑step construction.
  sports: Thomas Vernon plays forward for the Riverside Rovers Under‑7 soccer team, swims at the community pool on Tuesdays, and proudly roots for the hometown baseball team, the Springfield Sluggers, and
    they demonstrate a mix of teamwork and personal fitness.
  arts: Thomas Vernon spends afternoons drawing animals in a well‑organized sketchbook, watches nature documentaries narrated by David Attenborough, and enjoys the playful tunes of The Wiggles, and they
    weave creative expression with structured practice.
  travel: Thomas Vernon loves spontaneous beach trips to collect seashells on the Atlantic shore and has dreamed of exploring the coral reefs of the Great Barrier Reef, yet their family’s budget leads them
    to favor nearby state parks and weekend road trips, and they cherish each new discovery.
  culinary: Thomas Vernon prefers simple yet colorful meals like macaroni cheese with peas, peanut butter and banana sandwiches, and fresh fruit salads, and they can proudly melt chocolate chips for a quick
    fondue, showing a budding confidence in the kitchen.
  core: Thomas Vernon is a curious, organized six‑year‑old who balances creative LEGO builds with disciplined study of nature, all while managing a tiny allowance and a seasonal sneeze with remarkable poise,
    and they approach each day with boundless curiosity.
background:
  cultural: Thomas comes from a middle‑class Anglo‑American family living in coastal San Diego. His upbringing blends typical U.S. traditions—such as Thanksgiving, Fourth of July fireworks, and backyard
