persona_description: A GIS researcher and historian who is interested in the development of standard methodologies for mapping violent geographies, particularly in the context of the Soviet and post-Soviet
  penal system. They are skilled in using spatial analysis tools and have a deep understanding of archival and textual data. They are also interested in the patterns of events during the Nazi regime and
  the development of the SS concentration camps system. They are looking for ways to integrate these datasets with the spatial analytical tools of geovisualization to reveal the patterns of events as the
  Nazis imposed a sweeping geography of oppression across East Central Europe. They are passionate about developing systematic approaches to introduce the spatial histories of the Soviet and post-Soviet
  penal system with the help of HGIS.
