  career_goals: Guided by his curious yet practical nature, Burney aspires to become a problem‑solver in a STEM field. He dreams of designing robots or engineering solutions that make everyday life easier,
    visualizing a future as a robotics engineer or even an astronaut. He is eager to join school science clubs and compete in science fairs, aiming to win recognition for innovative projects. Burney also
    imagines taking on leadership roles, such as class president, where his organized and reliable traits can help him lead teams to success.
