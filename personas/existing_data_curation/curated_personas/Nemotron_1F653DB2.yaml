personas:
  professional: Burney King is an aspiring junior engineer who channels their methodical LEGO constructions and chess strategies into early prototyping, consistently applying their organized, competitive
    mindset to school science projects.
  sports: Burney King commits to after‑school baseball practice with the Manor Little League Tigers, enjoys cheering for the Chicago Cubs during the summer, and incorporates daily push‑ups and stretching
    into their routine to stay agile for both the diamond and weekend nature hikes.
  arts: Burney King expresses creativity through beginner piano lessons that feature simplified Mozart pieces like 'Twinkle' and by constructing imaginative LEGO dioramas inspired by the artwork of Dr.
    Seuss, while their playlist often includes the whimsical scores of Danny Elfman from 'The Nightmare Before Christmas'.
  travel: Burney King loves family road trips to the nearby Redwood State Park for woodland exploration and dreams of visiting the Dinosaur Hall at the Natural History Museum in London to see real fossils,
    preferring itineraries that blend structured museum tours with unplanned leaf‑collecting outings.
  culinary: Burney King favors classic kid fare such as cheesy macaroni, chicken nuggets, and peanut‑butter‑and‑jelly sandwiches, yet showcases budding culinary curiosity by assisting in making strawberry‑topped
    pancakes shaped like LEGO bricks during weekend brunches.
  core: Burney King is a meticulously organized eight‑year‑old whose competitive LEGO engineering, strategic chess mind, and disciplined after‑school baseball routine are balanced by a penchant for leaving
    a trail of plastic bricks and a notebook full of leaf sketches wherever they go.
background:
  cultural: Burney is a White boy raised in the rural community of Manor, Georgia. His family life reflects the Southern traditions of close‑knit family gatherings, church attendance, and a respect for
    local customs such as hearty home‑cooked meals and community festivals. Growing up in Ware County, he has easy access to forests, farmland, and the nearby Okefenokee Swamp, shaping his love for the
    outdoors. The cultural milieu balances a reverence for tradition with exposure to modern technology through school programs and internet resources, allowing Burney to blend classic Southern values of
    reliability and modesty with an eagerness to explore new ideas.
