personas:
  professional: Jeanette Rollins, a seasoned manager with a knack for community outreach, channels her strong people‑management, budgeting, and conflict‑resolution abilities into leading flexible, art‑focused
    programs, letting her curious, sociable yet critically competitive nature drive innovative cultural initiatives in Montevallo.
  sports: Jeanette Rollins hikes with the Montevallo Trailblazers walkers club on weekends, fits in yoga sessions at the local studio, plays casual tennis at the community park, and never misses the Alabama
    Crimson Tide football games on Saturdays, cheering loudly despite occasional joint aches.
  arts: Jeanette Rollins immerses herself in Montevallo’s arts scene, curating rotating exhibits at the BIX Art Gallery, acting in community theater productions with the Montevallo Playhouse, and drawing
    creative inspiration from Georgia O’Keeffe’s bold palettes and Annie Leibovitz’s intimate portraiture, which she echoes in her own watercolor and street‑photography projects.
  travel: Jeanette Rollins favors culturally immersive trips, having explored Barcelona’s Gaudí masterpieces, Kyoto’s temple gardens, and New Orleans’ jazz‑filled French Quarter, crafting itineraries that
    blend museum visits with spontaneous street‑food hunts, while budgeting her adventures through a travel‑rewards credit card and often traveling with her sister for shared experiences.
  culinary: Jeanette Rollins enjoys moderate‑skill cooking, frequently preparing saffron‑infused paella with mussels, Korean bibimbap spiced with gochujang, and Southern shrimp and grits seasoned with fresh
    cilantro and lemon, while also experimenting with seasonal produce from her garden and seeking out artisanal cheeses for tasting evenings.
  core: Jeanette Rollins blends a curious, sociable spirit with a laid‑back, sometimes disorganized work style, channeling their competitive drive into vibrant community arts leadership while juggling health
    checks, flexible finances, and a love for travel and eclectic cuisine.
background:
  cultural: Jeanette grew up in Montevallo, Alabama, within a predominantly white, Southern community that values hospitality, close‑knit social ties, and tradition. Her upbringing blended conservative
    family values with exposure to local festivals, church gatherings, and high‑school sports, fostering a strong sense of community involvement. While rooted in Southern customs—such as a love for home‑cooked
    meals, outdoor gatherings, and regional music—she has embraced broader cultural experiences through travel and her appreciation of the arts. This mix of Southern heritage and a curiosity for diverse
    ideas shapes her worldview, balancing respect for tradition with a willingness to explore unconventional perspectives.
