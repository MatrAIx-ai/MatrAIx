  hobbies: '["Art Gallery Visits","Painting","Photography","Community Theater","Travel","Reading (philosophy, psychology)","Cooking","Gardening","Hiking","Live Music Concerts","DIY Crafting"]'
  career_goals: Jeanette aims to transition into a senior leadership role that blends her managerial experience with her passion for the arts and community development. She aspires to become a director
    of a regional cultural center or a community‑arts program, where she can shape programming, secure funding, and mentor emerging talent. Additionally, she is interested in launching a consulting boutique
    that helps small businesses and non‑profits adopt flexible management practices and integrate creative initiatives. Her competitive drive pushes her to seek recognition for successful projects and to
    leave a lasting impact on Montevallo’s cultural landscape.
