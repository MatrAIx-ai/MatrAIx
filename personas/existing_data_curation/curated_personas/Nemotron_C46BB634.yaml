    and meal planning'', ''Knitting'', ''Attending local book clubs'']'
  career_goals: Alma plans to enroll in a community college program in business administration or medical office administration within the next year, aiming to earn an associate degree that will qualify
    her for a stable office‑support role. She aspires to become a certified office administrator and, over time, take on supervisory responsibilities where she can apply her organizational talents to improve
    workplace efficiency. In the long term, she envisions launching a small consulting service that helps local nonprofit organizations streamline their operations.
