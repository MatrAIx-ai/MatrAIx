personas:
  professional: Alma Stephens is an aspiring office administrator who leverages her Excel budgeting expertise, meticulous bullet‑journal scheduling, and calm conflict‑resolution style to streamline small
    nonprofit events, aiming to earn certification within a year and eventually launch a consulting service.
  sports: Alma Stephens enjoys early‑morning jogs with the River City Runners Club, participates in the community center’s co‑ed soccer league, follows the Metro Mariners baseball team each weekend, and
    incorporates twice‑weekly strength‑training sessions into her structured routine.
  arts: Alma Stephens unwinds by knitting intricate Fair Isle patterns from Ravelry designers, discusses contemporary non‑fiction with her book club, streams folk musician Sufjan Stevens while displaying
    Claude Monet water‑lily prints, and occasionally attends local theater productions of classic plays.
  travel: Alma Stephens meticulously plans weekend escapes, having explored Portland’s craft markets and Vancouver’s botanical gardens, and now dreams of a spring retreat in Asheville’s mountain cabins,
    favoring budget‑friendly boutique inns and detailed itineraries over spontaneous backpacking.
  culinary: Alma Stephens blends structure with culinary curiosity by meal‑prepping quinoa‑and‑roasted‑vegetable bowls seasoned with rosemary and lemon, perfects fluffy scrambled eggs, and treats herself
    to truffle‑infused mushroom risotto at the neighborhood bistro on special occasions.
  core: Alma Stephens is a hyper‑organized 23‑year‑old who channels her need for predictability into bullet‑journal perfection, thrives on efficient office workflows, yet secretly battles a caffeine‑driven
    jittery habit whenever deadlines loom.
background:
  cultural: Alma was raised in a middle‑class family in the Philadelphia suburbs, where her parents emphasized education, community involvement, and a strong work ethic. Her cultural upbringing blends traditional
    Mid‑Atlantic American values with the diverse influences of Philadelphia’s rich history, including participation in local events such as the Mummers Parade and regular visits to historic sites. She
    attended a public high school, is involved in a local Protestant church, and values the city’s emphasis on neighborly support and civic responsibility.
attributes:
  skills: '[''Organizational planning'', ''Event coordination'', ''Administrative tasks'', ''Microsoft Office proficiency'', ''Time management'', ''Budgeting'', ''Customer service'', ''Volunteer coordination'']'
