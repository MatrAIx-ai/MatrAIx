persona_description: An independent United Nations expert who is mandated by the UN Human Rights Council to examine human rights obligations for access to safe drinking water and sanitation. The expert
  is concerned about wide disparities that adversely affect people of colour and Native Americans in the US, and is calling for legal action to change the status of unrecognized and terminated tribes to
  enable all American Indians to gain the respect, privileges, religious freedom, and land and water rights to which they are entitled. The expert is urging access to water and sanitation for homeless people,
  stressing that local statutes prohibiting public urination and defecation, "while facially constitutional are often discriminatory in their effects."
