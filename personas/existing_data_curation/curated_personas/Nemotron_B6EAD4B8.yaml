  career_goals: Nelida aspires to deepen her impact on public service by securing a seat in the California State Assembly, where she can champion legislation that supports small businesses, expands bilingual
    education, and improves affordable housing in her district. She aims to create a legacy of pragmatic, people‑centered policies that incorporate fresh ideas without sacrificing feasibility. Additionally,
    she is committed to mentoring emerging Latina leaders, fostering a more inclusive political environment, and establishing a bipartisan coalition focused on sustainable community development.
