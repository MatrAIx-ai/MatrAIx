personas:
  professional: Edwin Campbell is a postal service mail carrier who leverages his route‑planning expertise, customer‑service polish, and curiosity for emerging logistics tech to pursue a supervisory role
    while secretly drafting a business plan for a data‑driven local courier service.
  sports: Edwin Campbell competes in the Waverly Hoops recreational basketball league, participates in pickup games at the community center, fishes on weekends at Lake Waverly, follows the Chicago Bulls
    and Green Bay Packers, and is a member of the Lakeview Outdoor Club for seasonal hiking and camping.
  arts: Edwin Campbell expresses his creativity through DIY electronics tinkering, builds rustic wooden furniture in his garage, attends folk‑rock shows at the Riverfront Café featuring artists like The
    Avett Brothers, and occasionally volunteers at the local community theater’s set‑design crew.
  travel: Edwin Campbell prefers short, well‑planned road trips to nearby national parks such as the Adirondacks and Niagara Falls, enjoys camping with friends over luxury hotels, and dreams of a future
    backpacking adventure through Iceland’s volcanic landscapes.
  culinary: Edwin Campbell cooks hearty chili with smoked paprika, grills lake‑caught trout seasoned with rosemary, mixes a simple ramen broth, and, despite their practical cooking skills, occasionally
    indulges in fast‑food burgers after late‑night deliveries.
  core: Edwin Campbell is a socially engaged, competitively minded mail carrier who blends practical problem‑solving with a curiosity for tech and hands‑on projects, while juggling community involvement
    and ambitious career goals.
background:
  cultural: Edwin comes from a white Midwestern family with deep roots in Minnesota’s German‑Scandinavian heritage. Growing up in Waverly, he was raised with the region’s emphasis on community responsibility,
    modesty, and a strong work ethic. Local traditions such as summer county fairs, ice‑fishing tournaments, and holiday gatherings have shaped his social outlook. The “Minnesota nice” culture—politeness
    combined with a practical, no‑nonsense approach—mirrors his balance of curiosity and practicality, while his upbringing in a close‑knit town reinforces his sociable yet occasionally skeptical view of
    new ideas and people.
