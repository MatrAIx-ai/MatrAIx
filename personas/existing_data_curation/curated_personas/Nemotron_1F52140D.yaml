  hobbies: '[''Recreational basketball'', ''Pickup sports games'', ''Volunteer work at the food bank'', ''Organizing community events'', ''DIY electronics projects'', ''Woodworking'', ''Hiking and camping'',
    ''Fishing'', ''Attending local concerts and trivia nights'']'
  career_goals: Edwin aims to advance within the United States Postal Service by moving into a supervisory or management role, such as Shift Supervisor or Operations Manager, where he can apply his curiosity
    for new routing technologies and his practical experience to improve efficiency. He plans to complete a bachelor’s degree in logistics or supply‑chain management within the next three years, leveraging
    his associate’s background and on‑the‑job insights. Long‑term, he envisions leading a team of carriers, mentoring new hires, and possibly launching a small local courier service that integrates data‑driven
    route optimization. His competitive drive pushes him to seek performance‑based recognitions, while his resilience motivates him to overcome any operational challenges he encounters.
