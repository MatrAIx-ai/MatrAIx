  career_goals: Sindy dreams of a future where she can merge her love for animals with her desire to help her community. She aims to become a veterinarian or veterinary technician, caring for pets and livestock
    in her neighborhood. Academically, she plans to excel in high school science courses, earn a scholarship to a community college, and study animal health or agricultural science. Long‑term, she also
    envisions supporting her family’s home‑based kitchen business, creating and selling homemade tamales and enchiladas to preserve and share her cultural culinary heritage.
