personas:
  professional: Marissa Pacheco, an aspiring robotics engineer, channels their curiosity and practicality into leading the school robotics club’s design of autonomous beach‑cleanup drones, balancing innovative
    ideas with reliable, test‑driven development while fostering a collaborative, harmonious team environment.
  sports: Marissa Pacheco competes with the Sunrise Beach Volleyball Club, plays midfielder for the Westside High School soccer team, avidly supports the 'LA Lakers' and the 'LA Galaxy', and incorporates
    weekly yoga stretches to maintain flexibility and prevent injuries.
  arts: Marissa Pacheco captures sunrise shots inspired by Ansel Adams, sings in the school choir performing works by Beyoncé and Andrea Bocelli, and curates a personal playlist that blends Sigur Rós’s
    ethereal soundscapes with Olivia Rodrigo’s contemporary pop for creative motivation.
  travel: Marissa Pacheco enjoys weekend getaways to nearby coastal towns like Santa Barbara for beach clean‑ups and sunrise shoots, dreams of stargazing in Chile’s Atacama Desert and hiking the fjords
    of Norway, and meticulously plans trips with friends using shared Google Docs to balance adventure with a modest budget.
  culinary: Marissa Pacheco loves preparing avocado toast topped with poached eggs and chili flakes, whipping up mango‑pineapple smoothies for post‑practice recovery, and experimenting with homemade fish
    tacos seasoned with lime and cilantro, though they often forget to tidy the kitchen afterward.
  core: Marissa Pacheco blends unflappable calm with boundless curiosity, thriving on group activities, meticulous planning, and sunrise photography, yet habitually misplaces their school notebook after
    weekend volleyball games.
background:
  cultural: Marissa grew up in Cocoa, a small coastal town on Florida’s Space Coast. Although her family identifies as white with European roots, the multicultural atmosphere of Brevard County – from the
    nearby Hispanic community to the space‑exploration heritage – influences her worldview. Family outings often involve beach trips, fishing, and watching NASA launches, fostering a deep appreciation for
    the ocean and science. Her community emphasizes neighborly support, church youth groups, and local festivals like the Space Coast Fair, shaping her values of cooperation, civic duty, and resilience.
