  career_goals: Marissa aims to turn her love of the ocean and science into a career in marine conservation. In the next few years she plans to join her high school’s environmental club, secure a summer
    internship at a local marine research center or the Kennedy Space Center’s education program, and earn a scholarship to study marine biology or environmental engineering. Long‑term, she envisions becoming
    a coastal sustainability program manager who leads coral‑reef restoration projects and designs community outreach programs that teach younger students about protecting Florida’s waterways.
