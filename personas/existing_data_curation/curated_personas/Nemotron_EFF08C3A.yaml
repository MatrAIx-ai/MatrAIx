  hobbies: '[''Gardening (roses)'', ''Birdwatching'', ''Beach walks at sunrise'', ''Reading classic literature'', ''Historical non‑fiction'', ''Chess'', ''Crossword puzzles'', ''Local history society meetings'',
    ''Classic movie nights'']'
  career_goals: In the coming years, Daniel plans to spearhead a community oral‑history archive documenting the cultural heritage of Sarasota County, oversee a comprehensive digitization of the library’s
    rare media collections, and author a practical handbook on sustainable library collection management. He also hopes to mentor junior staff, secure a lifetime achievement award from the Florida Library
    Association, and eventually transition to a senior advisory role that allows him to share his expertise without the day‑to‑day operational pressures.
