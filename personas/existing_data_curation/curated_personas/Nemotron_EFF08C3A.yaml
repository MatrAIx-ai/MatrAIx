personas:
  professional: Daniel Martinovic, a veteran librarian with three decades of cataloging and digital preservation expertise, leverages their methodical mindset, love of routine, and pragmatic instructional
    design to keep the Sarasota County Library’s collections impeccably organized while mentoring staff and pioneering a community oral‑history archive, and they approach every task with the steady precision
    they apply to their rose garden.
  sports: Daniel Martinovic, an early‑morning beach walker who logs their sunrise strolls on Longboat Key as a form of low‑impact cardio, enjoys cheering on the Tampa Bay Buccaneers on Sundays, follows
    the Tampa Bay Rays during the baseball season, and they belong to the Sarasota Walking Club, where they occasionally join group walks and senior softball games for social exercise.
  arts: Daniel Martinovic, a devoted fan of classic cinema who revisits Alfred Hitchcock’s thrillers and Orson Welles’s dramas on quiet evenings, reads the works of John Steinbeck and Leo Tolstoy between
    library duties, and they find solace in the crooning of Frank Sinatra and the piano sonatas of Johann Sebastian Bach, often attending occasional performances by the Sarasota Orchestra.
  travel: Daniel Martinovic, who plans trips on a modest budget with a detailed checklist, favors week‑long stays that blend leisurely beach mornings on Florida’s Gulf Coast with cultural excursions to
    historic Savannah, Georgia, and Charleston, South Carolina, has recently completed a pilgrimage to the medieval towns of the Dalmatian coast, and they balance the desire for adventure with the comfort
    of routine and limited financial flexibility.
  culinary: Daniel Martinovic, an avid gardener who harvests fresh rosemary, lavender, and heirloom tomatoes, enjoys preparing rosemary‑infused roasted chicken, hearty stuffed cabbage rolls with pork and
    rice, delicate pan‑seared grouper with lemon‑butter sauce, and a soothing rosehip tea brewed from their own garden roses, while they modestly rate themselves as a competent home cook who rarely dines
    out.
  core: Daniel Martinovic, a methodical retiree who merges their love of order, quiet resilience, and community service into a disciplined daily rhythm of gardening, reading, and preserving local history,
    all while they quietly indulge in classic films and a modest sweet tooth for homemade rosehip jam.
background:
  cultural: Daniel is a second‑generation American of Serbian descent. His parents immigrated to the United States in the mid‑20th century and preserved cultural touchstones such as celebrating Slava, cooking
    traditional dishes like sarma, and emphasizing discipline and practicality. Raised in the Midwest before relocating to Florida, he blends mainstream American values with a quiet appreciation for his
    Eastern‑European heritage, which informs his pragmatic outlook and strong commitment to community service.
attributes:
  skills: '[''Cataloging and Classification'', ''Metadata Management'', ''Digital Preservation'', ''Collection Development'', ''Reference Services'', ''Information Literacy Instruction'', ''Instructional
