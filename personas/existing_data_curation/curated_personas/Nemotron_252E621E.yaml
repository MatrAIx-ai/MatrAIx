  career_goals: Diego aims to obtain his Certified Public Accountant (CPA) license within the next year, followed by a Certified Internal Auditor (CIA) designation. He aspires to become a senior manager
    in a boutique audit firm that specializes in the arts and cultural sector, leveraging his passion for art and finance. In the long term, he envisions founding his own consultancy that advises galleries,
    museums, and artists on financial stewardship and investment strategies. He is also interested in integrating emerging technologies such as AI‑driven analytics and blockchain for transparent asset tracking,
    and seeks flexible work arrangements that support a balanced lifestyle and allow him to mentor junior professionals.
