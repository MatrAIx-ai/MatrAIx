personas:
  professional: Diego Fuentes, a meticulous accountant with deep expertise in GAAP, IFRS, audit planning, and data visualization, leverages their organized, methodical nature and curiosity for artistic
    expression to craft visually striking financial reports that blend precision with creative storytelling.
  sports: Diego Fuentes enjoys low‑impact fitness, attending weekly indoor climbing sessions at Brooklyn Boulders, playing pick‑up basketball with the New York Knicks alumni weekend league, following the
    New York Yankees during baseball season, and winding down with Saturday morning yoga classes at a community studio, while staying motivated by setting modest personal bests in a neighborhood running
    club.
  arts: Diego Fuentes immerses themselves in New York’s vibrant art scene, sketching watercolor pieces inspired by folk motifs, attending exhibitions featuring artists such as Kehinde Wiley and Yayoi Kusama,
    and frequenting live jazz sessions at the Blue Note where they regularly watch performances by Esperanza Spalding and Christian McBride, all of which fuel their creative outlook.
  travel: Diego Fuentes plans travel with a blend of cultural curiosity and budget discipline, favoring short‑term trips to heritage‑rich cities like Oaxaca, Mexico, and Granada, Spain, while also exploring
    domestic destinations such as Santa Fe’s art districts, balancing weekend getaways with the occasional long‑haul adventure to Kyoto, Japan, where they study traditional crafts.
  culinary: Diego Fuentes, an enthusiastic home cook, expertly prepares dishes like mole poblano, chiles en nogada, and tlayudas, sourcing fresh epazote, dried ancho chilies, and heirloom corn, while also
    relishing New York’s diverse food scene, from sushi rolls at Japantown to Ethiopian injera at local eateries, treating cooking as both a creative outlet and a way to stay grounded.
  core: Diego Fuentes is a detail‑obsessed accountant who channels their anxiety into meticulous budgeting, finds solace in watercolor folk designs, and can’t resist last‑minute art‑fair impulse buys, all
    while juggling a secret obsession with vintage typewriter sounds.
background:
  cultural: Diego was born to Mexican immigrant parents and grew up bilingual, speaking both Spanish and English. His upbringing emphasized Mexican traditions such as Día de los Muertos, family gatherings,
    and the rich culinary heritage of his homeland. Living in New York, he blends his Mexican cultural roots with the city’s multicultural fabric, participating in local Mexican community events and integrating
    Mexican artistic influences into his personal creative pursuits. His cultural background informs his collaborative style, emphasizing respect, community, and harmony, and motivates his interest in supporting
    artists and cultural institutions through financial expertise.
