personas:
  professional: Antonio Romero, a 6‑year‑old class organizer, applies their methodical planning and love for routine to coordinate group games, keep track of supplies, and ensure classroom projects finish
    on time, displaying early leadership and reliability.
  sports: Antonio Romero, a budding soccer enthusiast, plays midfield for the Little Lions Soccer Club, follows the LA Galaxy in the MLS, and practices drills after school with the same disciplined routine
    they apply to their LEGO builds.
  arts: Antonio Romero, a creative little artist, spends afternoons drawing family portraits and beloved cartoon characters like Mickey Mouse and SpongeBob, studies the vibrant colors of Dr. Seuss books,
    and builds intricate LEGO scenes inspired by the adventurous worlds of Pixar’s 'Toy Story' and Disney’s 'Frozen'.
  travel: Antonio Romero, a curious junior explorer, enjoys family trips to Disneyland and the Grand Canyon, dreams of visiting Tokyo’s interactive museums and the Eiffel Tower, and prefers well‑planned
    itineraries that include familiar routines like bedtime stories before new adventures.
  culinary: Antonio Romero, an eager kitchen assistant, loves mixing pancake batter with blueberries, helps roll out homemade quesadillas with cheddar cheese, and eagerly samples spaghetti with meatballs,
    yet often forgets to wash their hands before cooking, adding a playful mess to their culinary adventures.
  core: Antonio Romero blends a love for routine, sociable energy, and meticulous creativity, making them a reliable team player who balances playful curiosity with a habit of obsessively organizing their
    world.
background:
  cultural: Antonio grows up in a Mexican‑American household in Gypsum, Colorado. His family speaks both Spanish and English at home, celebrates holidays such as Día de los Muertos and Mexican Independence
    Day, and keeps traditions like making tamales together. The community’s mix of mountain outdoors and Mexican cultural practices gives him a sense of belonging to both his local town and his heritage,
    influencing his language, food preferences, and the music he enjoys.
