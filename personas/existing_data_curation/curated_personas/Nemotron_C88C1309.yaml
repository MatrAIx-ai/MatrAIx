  career_goals: Antonio dreams of becoming someone who helps others in practical ways. He often says he wants to be a firefighter because he likes the idea of protecting his community, or a teacher because
    he enjoys helping friends learn new things. He also imagines building things like an engineer or construction worker, inspired by his love of LEGO. His goals are shaped by his desire for clear, structured
    roles where he can follow routines and see tangible results.
