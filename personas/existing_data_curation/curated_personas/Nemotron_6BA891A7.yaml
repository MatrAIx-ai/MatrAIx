  hobbies: '[''Gardening'', ''Southern cooking and baking'', ''Quilting and knitting'', ''Reading historical fiction'', ''Genealogy research'', ''Walking/Hiking'', ''Church outreach volunteering'', ''Organizing
    potluck events'', ''Senior center volunteering'']'
  career_goals: Although she is currently not in the workforce, Donna Ann aspires to become a recognized leader in her community by heading the town’s garden club, launching a senior‑volunteer mentorship
    program, and eventually starting a modest home‑based business selling handcrafted quilts and preserves. She also hopes to complete the remaining coursework toward an associate degree in business administration,
    and to travel to visit her grandchildren across the country.
