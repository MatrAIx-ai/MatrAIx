personas:
  professional: A budding cartoonist and LEGO city planner named Teresita Mata channels her curiosity and spontaneous imagination into elaborate water‑color illustrations and intricate block constructions,
    where her competitive streak pushes her to outdo classmates in school art fairs while her relaxed attitude keeps the process joyful.
  sports: An energetic kid named Teresita Mata spends weekends at the local park climbing jungle gyms, playing forward for the Riverside Rockets youth soccer club, and cheering for the Chicago Cubs baseball
    team, approaching fitness with spontaneous games of tag and a competitive drive that fuels friendly challenges with teammates.
  arts: A creatively inclined seventh‑year‑old named Teresita Mata loves drawing cartoons, painting watercolors of fantasy landscapes, dancing to lively folk tunes like those of the traditional string band
    La Luna, and gathering inspiration from the works of illustrator Eric Carle and the animated adventures of Pixar’s Toy Story.
  travel: A curious explorer named Teresita Mata daydreams about visiting the towering red rocks of Sedona, the dinosaur exhibits at the Natural History Museum in Washington, D.C., and the tropical beaches
    of Florida, while she prefers spontaneous weekend trips to nearby nature reserves over long‑planned vacations.
  culinary: A budding chef named Teresita Mata delights in mixing ripe avocados, lime juice, and a pinch of salt to craft creamy guacamole, whisking up quick cheese quesadillas and decorating strawberry
    cupcakes, and she proudly assists in family meals, though she occasionally forgets to wash her hands before cooking.
  core: Teresita Mata is a curious, spontaneous seven‑year‑old who blends cartoon art, LEGO engineering, folk rhythms, and adventurous play into a lively, competitively spirited outlook on life.
background:
  cultural: Teresita is raised in a Mexican household that celebrates traditions such as Día de los Muertos, quinceañera planning, and seasonal festivals, while also being immersed in the multicultural
    environment of Kissimmee, Florida. At home she speaks Spanish and enjoys Mexican foods like tacos, salsa, and tamales, whereas at school she learns in English and participates in local community events.
    She blends the colorful heritage of her Mexican roots with the sunny, tourist‑driven culture of Central Florida.
