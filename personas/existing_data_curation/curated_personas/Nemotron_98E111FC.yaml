  career_goals: She dreams of becoming an artist who creates vivid illustrations, or perhaps an inventor of fun games that combine art and technology. She also imagines herself as a wildlife explorer who
    discovers new species. Her current ambition is to master drawing her favorite characters and to design her own simple games on the tablet.
