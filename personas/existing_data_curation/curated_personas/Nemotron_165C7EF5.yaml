  career_goals: Though no longer employed full‑time, Eric seeks to channel his expertise into volunteer roles that foster STEM learning among local youth, serve as a mentor for aspiring engineers, and support
    community initiatives that promote environmental stewardship. He aims to author a series of pragmatic guides on home‑based DIY projects, combining his curiosity for new ideas with proven techniques,
    and to cultivate intergenerational dialogue through workshops at the Arlington public library.
