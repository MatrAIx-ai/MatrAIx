personas:
  professional: Eric Malla, a retired mechanical and electrical engineer turned community mentor, leverages three decades of industrial equipment design experience to coach youth in STEM, author pragmatic
    DIY guides, and facilitate intergenerational workshops, all while translating complex technical ideas into clear, hands-on lessons that reflect his balance of curiosity and practicality.
  sports: Eric Malla, a devoted fan of Pacific Northwest teams like the Seattle Mariners, Seahawks, and Sounders FC, spends Saturday mornings cheering from the local sports bar while joining a senior hiking
    club for seasonal treks in the Cascades, and occasionally participates in a low-impact tai-chi class at the senior center, balancing spectator enthusiasm with personal fitness.
  arts: Eric Malla, an active participant in Arlington's community theater and an avid admirer of Ansel Adams photography, finds inspiration in classic composers such as Beethoven and contemporary folk
    storytellers like The Decemberists, often attending local art exhibitions and reading historical nonfiction to fuel the narrative depth they bring to stage productions.
  travel: Eric Malla, who favors meticulously planned road trips over spontaneous flights, has explored the San Juan Islands, the misty rainforests of Olympic National Park, and a memorable week in Portland's
    culinary scene, while dreaming of a future pilgrimage to the historic sites of Gettysburg and the rugged cliffs of Ireland's County Kerry.
  culinary: Eric Malla, an intermediate home cook who harvests heirloom tomatoes, kale, and fresh herbs from their garden, delights in preparing roasted salmon with dill, garden vegetable ratatouille, and
    sourdough bread topped with rosemary-infused butter, yet occasionally over-salts dishes and indulges in a third cup of dark roast coffee during evening woodworking sessions.
  core: Eric Malla blends a lifetime of engineering precision with a love for gardening, woodworking, and community theater, navigating retirement with practical curiosity, compassionate mentorship, and
    a few stubborn quirks like leaving tools scattered and over-salting meals.
background:
  cultural: Eric grew up in a middle‑class, white American family in the Pacific Northwest, where a respect for nature, self‑reliance, and community service were core values. His upbringing in the suburbs
    of Seattle and later in Arlington, WA, exposed him to a culture that balances progressive ideas with practical, hands‑on traditions. The region’s emphasis on environmental stewardship, volunteerism,
    and a love for the outdoors has shaped his worldview, reinforcing his compassionate, cooperative demeanor and his desire to give back to the community.
