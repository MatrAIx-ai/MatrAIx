  career_goals: Stephen aims to turn his early interest in technology and engineering into a long‑term career as a software or mechanical engineer. He hopes to earn a scholarship to a university known for
    its STEM programs, focusing on robotics or aerospace. He plans to build a portfolio of personal projects—coding apps, designing drone prototypes—to demonstrate his competence. In the short term, he
    wants to win his school's robotics competition and secure a high GPA to keep his options open. He feels that clear, measurable milestones will keep his anxiety in check and give him a sense of control.
