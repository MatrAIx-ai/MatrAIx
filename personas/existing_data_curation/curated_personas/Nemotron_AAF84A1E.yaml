  career_goals: Timothy aspires to turn his passion for art, community, and mental‑well‑being into a full‑time career. He plans to enroll in a community college program in Arts Administration or Non‑Profit
    Management, eventually transferring to a four‑year university to study Creative Arts Therapy. His short‑term goal is to secure an entry‑level position as a program assistant at a local non‑profit that
    runs art‑based workshops for youth, where he can apply his event‑planning and outreach experience while continuing to develop his professional skills. Long‑term, he hopes to lead a community art center
    that provides therapeutic creative spaces and mental‑health resources, and perhaps launch his own grassroots collective that pairs visual‑art exhibitions with peer‑support circles. He also wants to
    achieve personal stability by building coping strategies for anxiety, using his career as a means to help others navigate similar emotional challenges.
