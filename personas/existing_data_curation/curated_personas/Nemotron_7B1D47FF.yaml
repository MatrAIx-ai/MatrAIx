  hobbies: '[''Gardening (desert roses and vegetables)'', ''Cooking Mexican dishes with modern twists'', ''Volunteering to teach computer basics'', ''Hiking in the Imperial Sand Dunes'', ''Exploring the
    Salton Sea'', ''Yoga and meditation'', ''Reading leadership and tech literature'', ''Studying Mexican history and culture'']'
  career_goals: Idania aims to progress from her role as an Information Systems Manager to a senior executive position such as Director of IT or Chief Information Officer within the next five to seven years,
    preferably in an organization that serves the agricultural or healthcare sectors of the Imperial Valley. She wants to spearhead large‑scale digital transformation initiatives that improve service delivery
    while maintaining system reliability. A key ambition is to build a pipeline for diverse talent by establishing mentorship programs and community tech‑training workshops that empower under‑represented
    youth in her region. Additionally, she hopes to integrate emerging technologies like AI‑driven analytics and edge computing to enhance operational efficiency without compromising the pragmatic, cost‑effective
    solutions valued by her stakeholders.
