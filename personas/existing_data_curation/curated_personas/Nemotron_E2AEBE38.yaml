  career_goals: Marietta aims to transition from a senior HR generalist to an HR business partner role within a fast‑growing technology firm, where she can integrate her analytical background to drive people‑analytics
    strategies that improve retention and employee engagement. She is pursuing SHRM‑SCP certification and enrolls in advanced courses on predictive analytics for HR. Within five years, she envisions leading
    a regional HR team as a Director of People, overseeing talent strategy, culture transformation, and DEI programs. A long‑term ambition is to launch a boutique consultancy focused on data‑driven HR solutions
    for small‑to‑medium enterprises, especially those serving diverse, multicultural workforces. She also aspires to mentor emerging HR professionals, particularly women of Pacific Island descent, fostering
    their career development.
