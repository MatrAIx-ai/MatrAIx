  hobbies: '[''Polynesian dance (hula/siva)'', ''Volleyball (community league)'', ''Hiking (Red Rock Canyon)'', ''Cooking traditional Polynesian cuisine'', ''Yoga & mindfulness meditation'', ''Tech meetups
