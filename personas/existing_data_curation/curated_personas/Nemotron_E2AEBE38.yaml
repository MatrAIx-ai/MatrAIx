personas:
  professional: Marietta Ramirez is a senior HR generalist turned data‑savvy people strategist, leveraging fifteen years of hospitality and tech experience, advanced analytics in Python, Tableau, and Excel,
    and a clear yet empathetic communication style to design predictive retention models and inclusive DEI programs while thriving on the structure of policy work and the collaborative buzz of cross‑functional
    teams.
  sports: Marietta Ramirez energizes her week with community‑center volleyball matches, hikes the Red Rock Canyon trails on weekends, supports the Las Vegas Raiders and the Vegas Golden Knights, and belongs
    to the Red Rock Hiking Club, where she balances competitive play with social bonding and a pragmatic approach to fitness that includes a mix of cardio and strength training.
  arts: Marietta Ramirez expresses her creative side through a local island cultural dance troupe performing traditional hula and siva, attends monthly art gallery openings featuring works by Maya Lin and
    Kehinde Wiley, and finds inspiration in the music of Jack Johnson, Beyoncé, and the contemporary Polynesian‑influenced group Ka‘u, which she often plays while cooking.
  travel: Marietta Ramirez prefers purposeful travel that blends adventure with cultural immersion, planning trips months ahead to explore national parks like Zion and Grand Canyon, while dreaming of a
    rejuvenating island getaway to Maui and a culinary tour of Osaka, balancing her love of hiking with a desire for relaxation on sandy beaches within a modest budget.
  culinary: Marietta Ramirez enjoys experimenting in the kitchen, mastering poke bowls with ahi tuna, avocado, edamame, and fresh Nevada‑grown heirloom tomatoes, crafting hale‑vai inspired salads with taro,
    coconut milk, and lime zest, and appreciates the occasional indulgence of a perfectly seared ribeye, reflecting her intermediate cooking skill and a palate that fuses island flavors with local produce.
  core: Marietta Ramirez blends analytical precision with sociable energy, turning structured HR strategies into people‑centric solutions, while juggling a penchant for high‑tech finance, stress‑linked
    health habits, weekend hikes, vibrant dance performances, and an ever‑expanding list of culinary experiments.
background:
  cultural: Marietta’s parents emigrated from Samoa and Hawai‘i in the early 1990s, bringing with them a strong sense of ‘ohana (family) and communal responsibility that continues to shape her worldview.
    Raised in a multicultural neighbourhood of Las Vegas, she grew up bilingual, speaking English and basics of Samoan. Family gatherings emphasized storytelling, music, and shared meals, instilling a reverence
    for oral tradition and hospitality. She actively participates in the local Polynesian community center, celebrating festivals such as Samoan Independence Day and the Hawaiian Makahiki. These cultural
    anchors reinforce her collaborative nature and her commitment to inclusive environments, both in her personal life and professional HR practice. While navigating the pressures of a demanding career
    and a separated marital status, she draws resilience from the cultural principle of “maika‘i” (seeking balance), which encourages her to maintain wellbeing through community, movement, and mindfulness.
