personas:
  professional: Greg Mccord is a seasoned Certified Radiologic Technologist with fifteen years of experience mastering X‑ray, CT, and basic MRI, known for meticulous patient positioning, radiation safety,
    and a calm bedside manner that blends technical precision with genuine empathy, while actively pursuing CT and MRI specialty certifications and an associate degree to segue into a supervisory role and
    future health‑information management teaching.
  sports: Greg Mccord stays fit by hiking the rolling hills of Lawrence County on weekends, joining a local hiking club for monthly group treks, cheering on the Nashville Predators and Tennessee Titans
    while occasionally attending a Nashville Sounds game, and fitting in short strength‑training sessions at home to counter the physical demands of patient positioning in radiology.
  arts: Greg Mccord channels his artistic side through black‑and‑white film photography inspired by Ansel Adams and Edward Weston, designs sets for community theater productions that blend his technical
    eye with creative storytelling, attends bluegrass concerts featuring The Del McCoury Band, and frequents the Frist Art Museum to study contemporary installations that spark new compositional ideas for
    his own work.
  travel: Greg Mccord's travel style mixes meticulous planning with spontaneous photo‑opportunities, favoring road trips to the Great Smoky Mountains for landscape shoots, weekend getaways to Asheville's
    craft breweries, and an upcoming dream trip to Iceland to capture volcanic terrain, while balancing travel costs with his family budget and a keen eye for affordable lodging and local culinary experiences.
  culinary: Greg Mccord enjoys cooking with his wife, often preparing farm‑to‑table dishes like roasted beet and heirloom tomato salad, grilled corn with fresh basil pesto, and homemade sourdough bread,
    while experimenting with new recipes from The Food Lab and incorporating vegetables from his garden into hearty black‑bean tacos and a seasonal vegetable stew.
  core: Greg Mccord is a curious, organized radiology professional who balances a love of black‑and‑white photography, community theater, and gardening with a disciplined financial plan, occasional health‑neglect
    quirks, and a habit of hiking weekends that fuels his creative outlook on life.
background:
  cultural: Greg grew up in a close‑knit white Southern community in Lawrence County, Tennessee. His family traditions emphasize hospitality, church involvement, and community service, fostering a practical
    work ethic and respect for self‑reliance. He was immersed in Appalachian culture, enjoying bluegrass music, county fairs, and local festivals. While his upbringing rooted him in Southern values of kindness
    and cooperation, his career in medical imaging exposed him to broader scientific and technological perspectives. This blend of Southern heritage and openness to new ideas shapes his identity, balancing
    a love for tradition with a curiosity for art, innovation, and varied experiences.
attributes:
  skills: '[''X‑ray imaging'', ''CT scanning'', ''Basic MRI operation'', ''Patient positioning'', ''Radiation safety protocols'', ''Image acquisition and optimization'', ''PACS and imaging software proficiency'',
    ''Anatomy and pathology basics'', ''Equipment troubleshooting and maintenance'', ''Regulatory compliance and documentation'', ''Effective patient communication'']'
  hobbies: '[''Photography (film and digital)'', ''Visiting art galleries and museums'', ''Reading science‑fiction and popular science'', ''Hiking in the Tennessee hills'', ''Gardening'', ''Woodworking'',
    ''Community theater set design'', ''Cooking and experimenting with recipes'', ''Listening to bluegrass and classic rock music'', ''Volunteering at local health fairs'']'
  career_goals: Greg aims to advance into a senior or supervisory role within his radiology department. He plans to earn specialty certifications in CT and MRI, and to complete an associate degree in radiologic
    sciences to deepen his technical knowledge. In the next five years, he hopes to lead quality‑assurance initiatives, mentor junior technologists, and help integrate emerging imaging technologies into
    the workflow. Long‑term, Greg envisions teaching part‑time at a community college or transitioning into health‑information management, where his organizational strengths and curiosity for new ideas
    can improve imaging data efficiency and patient care.
