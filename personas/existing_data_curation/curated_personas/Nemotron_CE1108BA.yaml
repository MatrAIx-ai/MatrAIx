personas:
  professional: Tany Chase merges solid engineering fundamentals with a love for spontaneous creativity, leveraging Python, TensorFlow, and SolidWorks to build interactive art‑tech prototypes while thriving
    in flexible Kanban environments where they mentor diverse teams and champion user‑centric, socially responsible design.
  sports: Tany Chase spikes a disc in the Atlanta Flying Squirrels ultimate frisbee league, hikes Stone Mountain trails every weekend, and roots for the Atlanta Falcons, Hawks, and United, balancing high‑energy
    group play with occasional yoga sessions to soothe post‑game soreness.
  arts: Tany Chase immerses in Atlanta’s art pulse by photographing street‑mural kaleidoscopes, performing improv with the Laughing Bridge troupe, and vibing to Janelle Monáe, Alabama Shakes, and the experimental
    soundscapes of Flying Lotus, while drawing inspiration from speculative fiction authors N.K. Jemisin and Neil Gaiman to fuel their own creative problem‑solving.
  travel: Tany Chase favors spontaneous weekend getaways, having already trekked the Blue Ridge Parkway, explored New Orleans’ jazz scene, and taken a music‑focused road trip to Austin, while dreaming of
    a week‑long immersive art retreat in Kyoto’s Nishijin district and a rugged Icelandic hike to witness the Northern Lights.
  culinary: Tany Chase experiments with vegan Southern cuisine, perfecting jackfruit “pulled pork” tacos, collard greens sautéed with smoked paprika, and sweet‑potato pecan pie, while seeking out Atlanta
    hotspots like Herban Fix for plant‑based brunches and occasionally splurging on a gourmet truffle‑infused ramen.
  core: Tany Chase is a curiosity‑driven engineer‑artist who channels spontaneous energy into tech‑art hybrids, but often wrestles with anxiety‑fueled disorganization and impulsive spending.
background:
  cultural: Tany grew up in a middle‑class, white family in the suburbs of Atlanta, where Southern hospitality and close‑knit community values were emphasized. Family gatherings often featured traditional
    Southern dishes, storytelling, and a strong sense of regional pride. Living in a city known for its cultural diversity, she was exposed early to a mosaic of music, cuisine, and artistic expression that
    sparked her curiosity for varied experiences. The blend of traditional Southern roots with Atlanta's burgeoning tech ecosystem has shaped her outlook, fostering a respect for heritage while encouraging
    innovative, interdisciplinary pursuits. Her background also instilled a balance of self‑reliance and compassion, guiding her both personally and professionally.
