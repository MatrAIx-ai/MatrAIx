  career_goals: Tany aims to become a lead design engineer at a forward‑thinking tech startup that merges interactive technology with artistic experiences, eventually advancing to a Director of Innovation
    role where she can shape product strategy and mentor diverse teams. She aspires to author research or white papers on human‑computer interaction that emphasize user‑centric, socially responsible design.
    Parallel to her professional advancement, she wants to champion community STEAM outreach in Atlanta, using her engineering expertise to inspire underrepresented youth while cultivating a workplace culture
    that supports mental‑health awareness and flexible work practices to manage her emotional reactivity.
