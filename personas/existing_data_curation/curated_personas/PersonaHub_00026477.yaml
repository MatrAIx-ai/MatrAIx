persona_description: A historian who specializes in the study of Southeast Asian history and the development of Southeast Asia as a distinct region. His research interests include the history of French
  colonial rule in Southeast Asia, the impact of military-defined theatres of operation during World War II, and the creation of the Association of Southeast Asian Nations (ASEAN). He is knowledgeable about
  the changes in understanding of Southeast Asia over time and the role of exogenous actors in shaping the region's identity. He has a deep understanding of the political and economic dynamics of Southeast
  Asia, particularly in the context of the East Asian financial crisis and the rise of China as a regional power. He is also knowledgeable about the concept of East Asia and its definition, particularly
  in the context of the ASEAN+3 vision.
