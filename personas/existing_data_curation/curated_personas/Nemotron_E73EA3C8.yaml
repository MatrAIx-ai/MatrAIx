personas:
  professional: Allan Fontaine is a meticulous aspiring Certified Nursing Assistant who blends a strong command of Microsoft Office and Google Workspace, checklist-driven workflow, and volunteer first-aid
    experience to deliver reliable, protocol-focused patient support while quietly nurturing an exceptionally compassionate bedside manner.
  sports: Allan Fontaine spends weekends kayaking with the Intracoastal Kayakers Club and fishing on the Intracoastal Waterway, follows the Jacksonville Jaguars in the NFL and the Orlando Magic in the NBA
    for a touch of team spirit, and maintains basic fitness through a routine of yoga and occasional trail runs in local nature preserves.
  arts: Allan Fontaine finds solace in the quiet elegance of Claude Monet's impressionist landscapes, the ambient piano works of Max Richter, and Ken Burns' historical documentaries, while also attending
    occasional local theater performances starring veteran actor John Cullum, all of which feed their love of detail and narrative depth.
  travel: Allan Fontaine prefers meticulously planned low-key getaways, having already explored the historic ports of Charleston, South Carolina and Savannah, Georgia, and dreaming of a solo sailing trip
    to the Breton coast of Brittany, France, while balancing travel costs with a modest savings plan.
  culinary: Allan Fontaine enjoys cooking precise dishes such as Coq au Vin, New England clam chowder, and Pad Thai, measuring each ingredient like saffron threads, fresh thyme, and lime zest with a digital
    scale to ensure reproducible flavor, and considers their intermediate culinary skill level a satisfying blend of science and creativity.
  core: Allan Fontaine is a detail-obsessed, quietly compassionate 20-year-old whose love of order counters a persistent undercurrent of worry, leading them to craft meticulous routines while occasionally
    over-planning even simple tasks.
background:
  cultural: Allan grew up in Stuart, a coastal community in Martin County, Florida. His family’s roots trace back several generations in the southeastern United States, and his upbringing reflects the region’s
    emphasis on hospitality, community involvement, and a relaxed seaside lifestyle. Proximity to the Atlantic Ocean and the Intracoastal Waterway fostered a lifelong appreciation for marine activities
    such as fishing, kayaking, and beach conservation. He was raised with mainstream White American cultural norms, including respect for elders, modesty, and a strong work ethic, while also participating
    in local traditions like the Stuart Heritage Festival, community beach clean‑ups, and holiday celebrations that blend Southern warmth with the diverse influences of Florida’s tourist population.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Google Workspace (Docs, Sheets, Calendar)'', ''Certified First Aid & CPR'', ''Volunteer coordination at animal shelter'', ''Active listening
    and conflict resolution'', ''Checklist creation and task scheduling'', ''Basic car maintenance'', ''Personal budgeting and bookkeeping'', ''Journaling for stress monitoring'']'
  hobbies: '[''Model ship building'', ''Gardening'', ''Cooking (recipe-focused)'', ''Fishing and kayaking'', ''Nonfiction book club'', ''Chess'', ''Mindfulness journaling'', ''Yoga'', ''Animal shelter volunteering'']'
  career_goals: Allan aims to secure a career that blends predictable, protocol‑driven work with direct opportunities to help others. He plans to enroll in a community‑college Certified Nursing Assistant
    (CNA) program, with the goal of working in a healthcare setting where clear procedures guide patient care. He is also exploring training as an Emergency Medical Technician (EMT) or a public safety dispatcher,
    roles that provide structured environments and a tangible impact on community wellbeing. In the long term, Allan hopes to move into a supervisory or training position, where he can mentor new staff,
    refine operational reliability, and contribute to a supportive workplace culture.
