personas:
  professional: Ronnie Devito, a seasoned primary‑care nurse with three decades of clinical experience, blends systematic patient assessment with health‑informatics expertise; they lead interdisciplinary
    teams, optimize EMR workflows, and are preparing to transition into mentorship and teaching roles while championing value‑based care for older adults.
  sports: Ronnie Devito follows the Colorado Rockies and the Colorado Avalanche, hikes the foothills of Fort Collins three times a week with a meticulously planned route, and participates in a local senior
    cycling group that meets on Saturday mornings; they keep a training log and prefer low‑impact activities that protect their knees while still challenging their stamina.
  arts: Ronnie Devito, an avid bird‑watcher and nature photographer, regularly captures images of the Western Tanager and Sandhill Crane, enjoys listening to folk legends like John Denver and the storytelling
    of Bob Dylan, and attends seasonal performances at the Fort Collins Musical Theatre, where they appreciate classic productions of 'Our Town' and 'The Music Man'.
  travel: Ronnie Devito prefers carefully organized trips that balance adventure and comfort, having solo‑hiked in Rocky Mountain National Park, driven the historic Route 66 to explore small Midwestern
    towns during Thanksgiving, and planned a week‑long retreat to Banff National Park to photograph alpine flora; they use detailed itineraries and budget spreadsheets to ensure each journey aligns with
    their retirement schedule and modest travel fund.
  culinary: Ronnie Devito delights in seasonal, farm‑to‑table cooking, often preparing roasted heirloom carrots, quinoa‑black bean salad, and occasional elk chili with Colorado green chilies; they tend
    a small vegetable garden using a strict planting calendar, and their kitchen skills are solid but they sometimes over‑salt dishes in pursuit of robust flavor.
  core: Ronnie Devito, a methodical 62‑year‑old nurse‑educator, balances disciplined health‑care leadership with a solitary love for bird photography, model‑train building, and meticulously planned hikes,
    while occasionally splurging on hobby supplies and forgetting to floss.
background:
  cultural: Ronnie grew up in the American Midwest, where a strong work ethic, self‑reliance, and community responsibility were emphasized. After moving to Fort Collins, he embraced Colorado’s outdoor culture
    and progressive health values while retaining his Midwestern roots. He celebrates traditional holidays such as Thanksgiving and Independence Day, participates in local farmers’ markets, and values the
    region’s focus on environmental stewardship. His cultural perspective blends pragmatic, structured attitudes from his upbringing with an appreciation for the collaborative, health‑focused community
    spirit of Larimer County.
attributes:
  skills: '[''Primary care assessment'', ''Chronic disease management'', ''Prescriptive authority'', ''Electronic health record optimization'', ''Health data analysis'', ''Clinical protocol development'',
