personas:
  professional: Carlos Marques is a senior industrial engineer who leverages Six Sigma and AI-driven predictive safety tools to redesign workflows, while his penchant for abstract art and improvisational
    brainstorming lets him envision ergonomic solutions that others miss, even though he often relies on teammates for meticulous paperwork and scheduling.
  sports: Carlos Marques courts regular pickup basketball games with the Lakefront Hoops club, roots for the Chicago Bulls and follows the Chicago Cubs, and uses jogs along the lakefront as a mental reset,
    though their schedule sometimes causes missed practices during busy project phases.
  arts: Carlos Marques paints abstract canvases inspired by Jackson Pollock’s gestural strokes, creates digital illustrations echoing Bee Bee Bee’s vibrant glitch aesthetic, and shreds electric guitar in
    a Latin‑jazz jam group that riffs on Santana and Esperanza Spalding, while also sharpening improv skills at The Second City’s workshops.
  travel: Carlos Marques enjoys spontaneous weekend drives to the Wisconsin Dells for lake‑front photo walks, has explored the historic districts of New Orleans for jazz immersion, and dreams of strolling
    Barcelona’s Gothic Quarter to sketch Gaudí’s curves, balancing travel cravings with family obligations and a modest travel budget.
  culinary: Carlos Marques masters the art of pupusas stuffed with cheese and loroco and crisps yuca frita to golden perfection, often experimenting with a fusion of masa dough and kimchi, and regularly
    hosts vibrant potluck nights where friends sample his handcrafted salsa verde alongside classic Chicago deep‑dish pizza.
  core: Carlos Marques blends industrial precision with artistic chaos, turning safety data into colorful solutions while juggling guitars, paintbrushes, and a love for community‑centric cooking.
background:
  cultural: Carlos grew up in a Salvadoran household in Chicago’s Little Village, where Spanish was spoken at home and community festivals celebrated his heritage. His family maintains strong ties to Salvadoran
    traditions, such as Semana Santa processions and culinary customs, which influence his cooking and social gatherings. Bilingual and bicultural, he navigates both American workplace norms and the values
    of collective family support common in Salvadoran culture. This dual perspective drives his commitment to improving workplace safety for immigrant laborers and informs his collaborative, community‑oriented
    outlook. While his divorce challenged traditional expectations, it also reinforced his belief in personal resilience and the importance of forging inclusive, supportive networks.
