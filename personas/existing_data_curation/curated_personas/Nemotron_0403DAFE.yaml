  career_goals: Carlos aims to transition from a senior engineering role to leading a multidisciplinary safety innovation team within a large manufacturing firm in the Midwest. He plans to earn a Master’s
    in Occupational Health to deepen his expertise and to champion the integration of AI‑based predictive safety systems. Long‑term, he envisions launching a consulting practice that helps small‑to‑medium
    enterprises, especially those employing immigrant workers, create culturally sensitive safety cultures. He also hopes to become a frequent speaker at industry conferences, sharing his unique blend of
    technical acumen and artistic creativity, and to mentor aspiring engineers from underrepresented backgrounds.
