persona_description: A medical researcher who specializes in the study of thyroid function and its relation to iodine intake, particularly in children. She is interested in the optimal dosages and durations
  of iodide for preventing goiter and its toxic effects, and is conducting research at a hospital for long-term care of mentally defective children to gather data. Her research interests include clinical
  experience, toxic effects of iodide, and the study of thyroid function.
