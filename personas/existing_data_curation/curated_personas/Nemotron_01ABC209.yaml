personas:
  professional: Vance Watkins, a veteran plant supervisor with over three decades of hands‑on manufacturing experience, leverages their Six Sigma Green Belt expertise, CNC mastery, and lean‑focused mindset
    to enforce safety, drive quality improvements, and mentor emerging leaders while maintaining the steady, predictable rhythm of a well‑run shop floor.
  sports: Vance Watkins, an early‑morning bass fisherman who frequents Lake Lanier, follows the Atlanta Falcons and the Atlanta Braves religiously, participates in a senior softball league at the community
    center, and maintains fitness through weekly walks, as they prefer low‑impact yoga over high‑intensity workouts.
  arts: Vance Watkins, a fan of classic Southern storytelling, enjoys listening to Johnny Cash and Dolly Parton on the porch, attends the Savannah Music Festival for a taste of jazz, and finds artistic
    fulfillment carving heirloom furniture while they read Mark Twain’s prose.
  travel: Vance Watkins, a methodical planner, prefers well‑organized road trips to historic Southern towns such as Savannah, Charleston, and the Great Smoky Mountains, occasionally journeys to Bavaria
    to explore ancestral roots, but they balance travel ambitions with a modest retirement budget and family commitments.
  culinary: Vance Watkins, an adept home cook, favors slow‑smoked pork shoulder seasoned with hickory, fresh garden tomatoes, collard greens, and buttery cornbread, delights in a perfectly seared shrimp
    étouffée at the local seafood restaurant, and they occasionally treat themselves to a whiskey‑marinated steak for a special occasion.
  core: Vance Watkins, a meticulous retiree‑to‑coach, blends a lifetime of precision woodworking and classic‑car restoration with a chronic worry that keeps their schedule tightly packed, yet they still
    carve out dawn fishing trips and hum country ballads while polishing machinery.
background:
  cultural: Vance grew up in the South, raised in a middle-class, Anglo-American family in Georgia. The cultural norms of the region—self-reliance, respect for hard work, and a strong sense of community—have
    shaped his values. He identifies with Southern traditions such as church gatherings, local festivals, and a love for the outdoors. While his ethnic background is predominantly English-German ancestry,
    he embraces the broader Southern cultural tapestry, including the emphasis on hospitality, modesty, and a practical, no-nonsense approach to life.
