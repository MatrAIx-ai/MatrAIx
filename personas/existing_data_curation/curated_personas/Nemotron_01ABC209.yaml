  career_goals: Approaching retirement, Vance aims to cement his legacy by streamlining the plant's safety and quality programs to achieve measurable gains before stepping down. He plans to obtain a Six
    Sigma Black Belt to lead a major waste-reduction project, mentor the next generation of supervisors, and develop a succession plan for his department. Post-retirement, he hopes to transition into a
    consulting role for local manufacturers, offering expertise in operational efficiency and compliance, while also pursuing part-time teaching at a community college's industrial technology program.
