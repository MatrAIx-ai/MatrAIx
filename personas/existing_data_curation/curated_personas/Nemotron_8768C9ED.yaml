  hobbies: '[''Cooking Mexican cuisine'', ''Hosting dinner gatherings'', ''Salsa dancing'', ''Folkloric Mexican dance'', ''Volunteering at senior center'', ''Organizing community health fairs'', ''Reading
    mystery novels'', ''Taking online courses'', ''Gardening'', ''Traveling to Mexico to visit family'']'
  career_goals: Keyla aspires to step into a senior HR leadership role within the next five years, targeting a position such as HR Manager or Director of People Operations for a mid‑size organization in
    the Piedmont region. She aims to champion inclusive workplace policies, spearhead the integration of advanced HR analytics, and develop mentorship programs that support both younger employees and seasoned
    staff. Leveraging her sociable nature, she hopes to become a recognized speaker at regional HR conferences and to mentor emerging HR professionals, especially those from under‑represented backgrounds.
    Recognizing her sensitivity to stress, she also seeks to embed employee wellness initiatives—like flexible scheduling and mental‑health resources—into the company's culture, ensuring a balanced work
    environment for herself and her colleagues.
