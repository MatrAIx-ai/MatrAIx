  hobbies: '[''Gardening'', ''Quilting'', ''Book Club'', ''Library Volunteering'', ''Community Choir'', ''Local Theater'', ''Hiking'', ''County Fair Participation'', ''Senior Fitness Classes'', ''Adult
    Literacy Workshops'']'
  career_goals: Jeanie aims to transition from daily classroom support to a mentorship and program‑development role over the next two years. She plans to complete a graduate certificate in Adult and Community
    Education so she can design after‑school and lifelong‑learning workshops for both youth and seniors in Reedsville. Her ambition is to launch a community literacy initiative that partners the local library
    with the school district, providing reading circles and tutoring for underserved families. While she anticipates retiring from full‑time work by age 65, she wishes to remain an active volunteer trainer
    for new teaching assistants and serve on the school's curriculum advisory committee, ensuring that the district’s instructional practices retain the structure and practicality she values.
