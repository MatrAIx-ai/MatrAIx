personas:
  professional: An experienced teaching assistant in the Reedsville Area School District, Jeanie Maqousi leverages three decades of classroom support expertise, meticulous lesson‑plan development, and adept
    use of Google Classroom to create structured learning environments, while their sociable, assertive nature helps bridge teachers, families, and students in collaborative educational initiatives.
  sports: An avid senior fitness enthusiast, Jeanie Maqousi regularly attends water‑aerobics classes at the county pool, hikes the trails of Bald Eagle State Park with the Reedsville Senior Hiking Club,
    and cheers on the Pittsburgh Steelers during football season, embodying a seasonal blend of low‑impact exercise and community sports fandom.
  arts: A passionate community artist, Jeanie Maqousi contributes to a local quilting circle crafting seasonal blankets inspired by classic folk patterns, sings alto in the Reedsville Community Choir performing
    arrangements of Ella Fitzgerald classics, and occasionally stars in the Reedsville Players’ productions of historical dramas, reflecting a deep appreciation for collaborative and nostalgic arts.
  travel: Jeanie Maqousi favors organized group travel, joining senior tour outings to historic sites such as Lancaster County’s Amish heritage villages, the historic streets of Philadelphia, and occasional
    weekend trips to Niagara Falls, balancing a love for cultural immersion with the comfort of pre‑planned itineraries.
  culinary: A garden‑to‑table cook, Jeanie Maqousi enjoys turning home‑grown tomatoes, peppers, and basil into fresh marinara sauce, bakes rustic apple‑cinnamon crumble for church potlucks, and delights
    in preparing classic Pennsylvania Dutch chicken pot pie, showcasing a blend of modest culinary skill and a fondness for hearty, seasonal dishes.
  core: Jeanie Maqousi is a structured, community‑focused educator who balances meticulous planning with sociable generosity, occasionally indulging in spontaneous theater outings while keeping a watchful
    eye on health and finances.
background:
  cultural: Jeanie comes from a long‑standing, white, Anglo‑American lineage that settled in central Pennsylvania during the early 20th century. Her family’s heritage includes German and Irish roots, reflected
    in the region’s Pennsylvania‑Dutch traditions, folk music, and seasonal foods such as shoofly pie and pretzels. Raised in a close‑knit Methodist congregation, she values community service, church‑based
    gatherings, and the modest, hardworking ethic typical of Mifflin County residents. The rural small‑town environment has fostered a strong sense of local identity, with celebrations of American holidays,
    county fairs, and seasonal harvest festivals shaping her cultural outlook. These influences are evident in her commitment to community education, volunteerism, and the preservation of regional customs.
attributes:
  skills: '[''Classroom Management'', ''Lesson Planning'', ''Student Tutoring'', ''Special Education Support'', ''Parent Communication'', ''Group Facilitation'', ''Event Coordination'', ''Educational Technology
