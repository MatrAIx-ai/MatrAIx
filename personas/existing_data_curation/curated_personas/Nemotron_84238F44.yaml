  hobbies: '[''Model building (airplanes, rockets)'', ''Arduino tinkering'', ''Reading technology and history books'', ''Cooking Mexican dishes'', ''Playing chess'', ''Jogging'', ''Listening to Latin music'',
    ''Volunteer tutoring (math and English)'']'
  career_goals: Alejandro aims to enroll in a community college program in civil engineering or network technology, with the long‑term goal of becoming a civil engineer or network infrastructure specialist.
    He seeks a career that combines his practical problem‑solving skills with a stable, community‑oriented role, where he can contribute to infrastructure projects that benefit Dallas and its growing Latino
    neighborhoods. He also intends to obtain industry certifications such as the Cisco CCNA to advance his technical expertise.
