personas:
  professional: Alejandro Carew is an aspiring civil engineering student at a local community college who combines bilingual communication, meticulous project planning, and hands‑on Arduino tinkering to
    excel in design labs, while their reliable, methodical nature ensures they meet deadlines and thrive in small‑team collaborations.
  sports: Alejandro Carew jogs three times a week in Dallas parks, follows the Dallas Cowboys football team, supports the Mavericks on basketball nights, cheers for FC Dallas in the MLS, and occasionally
    joins meet‑ups with the Dallas Running Club, balancing endurance training with seasonal team fandom.
  arts: Alejandro Carew channels curiosity into building detailed airplane and rocket model kits, designs simple graphics on Canva, immerses themselves in Latin music ranging from Vicente Fernández to Bad Bunny,
    and appreciates classic visual art such as Frida Kahlo while attending community cultural fairs.
  travel: Alejandro Carew prefers meticulously planned road trips during college breaks, enjoying weekend escapes to the Texas Hill Country, day trips to New Mexico’s desert vistas, and dreaming of a future
    pilgrimage to Jalisco to explore the birthplace of their family’s traditions.
  culinary: Alejandro Carew enjoys preparing authentic tamales and pozole for family gatherings, skillfully handling masa and chilies while occasionally over‑spicing a batch when juggling model kits, reflecting
    an intermediate cooking talent that blends tradition with experimental flair.
  core: Alejandro Carew is a methodical, bilingual young engineer‑in‑training who balances a love for precise hobby projects with heartfelt family traditions, navigating life with quiet curiosity and a
    penchant for disciplined budgeting.
background:
  cultural: Alejandro was raised in a Mexican‑American household in Dallas, Texas. His parents immigrated from Jalisco, and Spanish is spoken at home alongside English, giving him a bilingual upbringing
    steeped in Mexican traditions. He celebrates Día de los Muertos, Las Posadas, and enjoys regional Mexican cuisine, especially tamales and pozole. Growing up in Collin County’s vibrant Latino community,
    he values family cohesion, respect for elders, and the importance of hard work. He balances his cultural heritage with the broader Texan environment, participating in local festivals and community service
    initiatives that support immigrant families.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Basic programming (Python)'', ''Computer troubleshooting'', ''Project planning and time management'', ''Mechanical troubleshooting'', ''Team collaboration in
