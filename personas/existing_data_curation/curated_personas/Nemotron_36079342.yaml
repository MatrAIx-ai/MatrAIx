  career_goals: Kirstin aims to transition from front‑line service to a leadership role that blends hospitality with the city’s vibrant arts community. She dreams of becoming a manager of a community‑focused
    café or pop‑up venue where diners experience curated art installations and seasonal, locally‑sourced menus. Over the next five years, she plans to complete a certificate in event planning while gaining
    experience in coordinating experiential dining events. Her long‑term ambition is to launch her own collaborative space that partners local artists, musicians, and food producers, creating inclusive
    gatherings that celebrate creativity and sustainability.
