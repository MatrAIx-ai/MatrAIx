personas:
  professional: Kirstin Kouch excels as a high-energy hospitality specialist in Portland's fast-paced event venues, using sharp guest-reading, flawless multitasking with cash registers and POS systems,
    and spontaneous problem-solving to craft welcoming atmospheres, while charting a path toward managing a community-focused cafe that merges local art installations with seasonal, sustainably-sourced
    menus.
  sports: Kirstin Kouch laces up for weekend hikes through the Columbia River Gorge, joins the Riverfront Runners club for sunrise runs, cheers on the Portland Timbers and Trail Blazers, and occasionally
    attends a local climbing gym, using these activities to stay fit and grounded amid a bustling service career.
  arts: Kirstin Kouch curates a personal cultural itinerary, spending evenings at First Thursday gallery walks, capturing street murals in the Alberta Arts District, singing along to The Decemberists and
    local indie band Honeybabe, enjoying improv nights at the Curious Comedy Club, and drawing inspiration from artists like Yayoi Kusama and Portland painter Christine Forman.
  travel: Kirstin Kouch favors spontaneous weekend road trips, having explored the Oregon Coast's tide-pools, taken a music-laden weekend in Seattle, trekked the Redwood forests of Northern California,
    and dreams of a summer immersion in Asheville's arts scene, all booked through a flexible budget-plus travel app that balances adventure with a modest savings plan.
  culinary: Kirstin Kouch experiments in the kitchen with fermented kimchi tacos on sourdough toast, wild-foraged mushroom risotto with hazelnut-infused broth, lavender-honey glazed salmon, and a spiced
    beet kvass, showcasing a confident amateur chef level while still loving food-truck classics like pork belly bao and seasonal farm-stand strawberries with balsamic drizzle.
  core: Kirstin Kouch is a curiosity-driven, socially vibrant hospitality pro who blends spontaneous art and food experiences with a habit of procrastinating on organization, grounding themselves through
    yoga and community gardening, and they envision a big-picture dream of an inclusive, artist-friendly café.
background:
  cultural: Kirstin comes from a white, American background with family roots in the Pacific Northwest and the broader Midwest. Raised in a culturally modest household, she was immersed in the progressive,
    environmentally‑conscious ethos of Portland, where community, creativity, and sustainable living are highly valued. This environment has shaped her appreciation for local arts, farm‑to‑table food culture,
    and collaborative community initiatives, all of which inform her personal values and professional aspirations.
