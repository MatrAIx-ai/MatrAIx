    production demands", "Time management in a fast-paced environment"]'
  hobbies: '["Barbecue and smoking meat", "Home gardening (herbs and vegetables)", "Hiking in Red Rock Canyon and surrounding desert trails", "Reading mystery and detective novels", "Bridge (card game)
    club", "Volunteering at local food pantry", "Collecting vintage kitchen knives", "Quilting and textile crafts", "Birdwatching in desert habitats", "Attending community theater performances"]'
  career_goals: Martha aims to secure a supervisory position within her current processing facility, leveraging her extensive hands‑on experience to improve workflow efficiency and staff training. She plans
    to obtain a certified food‑safety specialist credential (HACCP) within the next two years, positioning herself for consulting opportunities. In the longer term, she envisions opening a modest, community‑focused
    boutique butcher shop in Las Vegas, where she can apply her artisanal cutting skills and provide personalized service. Additionally, Martha is committed to mentoring younger workers—particularly women—to
    promote diversity in the traditionally male‑dominated trade.
