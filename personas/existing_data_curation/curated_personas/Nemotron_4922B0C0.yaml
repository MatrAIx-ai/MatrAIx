personas:
  professional: Martha Bach, a veteran meat‑processing specialist with deep expertise in carving, food‑safety compliance, and staff training, leverages their preference for structure and competitive drive
    to streamline workflows and mentor women in a traditionally male‑dominated trade as they eye a supervisory role and a future boutique butcher shop.
  sports: Martha Bach is an avid weekend hiker with the Red Rock Hiking Club, follows the Las Vegas Raiders in football and the Vegas Golden Knights in hockey, and they favour low‑impact cardio over team
    sports, keeping fit with desert trail treks.
  arts: Martha Bach finds solace in classic mystery novels by Agatha Christie and Raymond Chandler, attends monthly performances at the Smith Center, and they enjoy listening to country‑rock staples like
    John Denver while polishing their vintage knife collection.
  travel: Martha Bach prefers road‑trip adventures across the Southwest—such as a scenic drive to the Grand Canyon and a weekend camping in Sedona—while occasional dream trips to Tuscany’s trattorias and
    the culinary markets of Osaka reflect their love for food‑focused travel, though budget constraints keep most getaways short.
  culinary: Martha Bach is a self‑taught grill master who experiments with smoky rubs on brisket, smoked pork shoulder, and cedar‑plank salmon, grows basil and oregano in their backyard garden, and occasionally
    over‑salts their creations while meticulously maintaining their collection of antique butcher knives.
  core: Martha Bach is a pragmatic, competitive butcher‑turn‑mentor who loves smoky meats, desert hikes, and mystery novels, yet often juggles chores with a delightfully disorganized schedule.
background:
  cultural: Martha’s cultural background reflects a mainstream American working‑class heritage rooted in midwestern values of hard work, self‑reliance, and community. Raised in a modest, likely Protestant
    family, she carries a practical, no‑nonsense outlook shaped by her early years in a small town before relocating to the diverse, desert environment of Las Vegas. Her identity blends traditional American
    customs—such as holiday gatherings and weekend barbecues—with the vibrant, multicultural influences of Nevada’s tourism‑driven culture.
attributes:
  skills: '["Meat cutting and trimming", "Butchery of beef, pork, poultry, and fish", "Food safety compliance (HACCP, USDA regulations)", "Sanitation and cleaning procedures", "Equipment maintenance and
