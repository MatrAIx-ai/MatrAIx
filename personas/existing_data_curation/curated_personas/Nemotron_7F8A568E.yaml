  hobbies: '[''Vegetable gardening'', ''Book club (historical fiction)'', ''Tango dancing'', ''Puzzle solving (crosswords, Sudoku)'', ''Hiking in Wasatch foothills'', ''Cooking Uruguayan cuisine'', ''Volunteer
    senior‑center activities'', ''Community cultural events'']'
  career_goals: Although retired, Madelyn is driven to leave a lasting imprint on her community. She aims to expand the outreach of the local STEM club for girls, secure funding for a portable science lab
    that can travel to underserved neighborhoods, and publish a memoir that intertwines her Uruguayan heritage with her experiences as a woman in engineering. She also hopes to become a regular guest speaker
    at community centers, sharing both technical knowledge and stories of cultural resilience. Maintaining her health and independence, she plans to complete a certification in senior fitness instruction
    so she can lead gentle exercise classes that blend movement with social interaction.
