  hobbies: '["Gardening (vegetables & herbs)", "Reading (classic literature & educational research)", "Book club participation", "Hiking & birdwatching", "Photography", "Knitting and crocheting", "Cooking
    & baking farm-to-table meals", "Volunteering at historical society (walking tours)"]'
  career_goals: Looking toward the next five years, Michelle aims to transition into a mentorship role that leverages her experience to guide early‑career teachers, eventually serving as a curriculum coordinator
    or lead teacher. She hopes to develop a community‑based learning initiative that connects students with local history and environmental stewardship projects in Hunterdon County. Michelle is also interested
    in earning an advanced certification in educational technology to deepen her ability to blend digital tools with hands‑on learning. While planning a phased retirement, she wishes to maintain a flexible
    schedule that allows her to volunteer for after‑school reading programs and to contribute to professional‑development sessions on inclusive classroom practices.
