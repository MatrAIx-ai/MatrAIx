personas:
  professional: Michelle Smith, a veteran K‑8 language arts and social studies teacher, blends evidence‑based curricula with hands‑on gardening projects, using her calm, collaborative classroom style and
    tech‑savvy tools to foster inclusive learning while quietly steering new teachers toward mentorship.
  sports: Michelle Smith enjoys leisurely walks on Hudson Valley trails with the local senior hiking club, follows the New Jersey Devils and New York Giants for weekend sports excitement, and attends community
    yoga sessions to maintain flexibility and balance.
  arts: Michelle Smith spends evenings immersed in classic literature by Jane Austen, attends regional theater productions featuring Meryl Streep‑style performances, and listens to folk legends like Bob
    Dylan and Joan Baez while photographing Hudson Valley landscapes, weaving these artistic threads into her knitting designs.
  travel: Michelle Smith prefers low‑key road trips to historic sites such as Colonial Williamsburg, the Hudson Valley’s orchards, and annual visits to her family’s Korean hometown in Seoul, planning itineraries
    loosely around seasonal farmers’ markets and community festivals.
  culinary: Michelle Smith, an avid farm‑to‑table cook, skillfully bakes sourdough loaves and rosemary focaccia, crafts heirloom tomato salads, and experiments with kimchi alongside her signature peach‑ginger
    jam, using garden‑fresh basil, thyme, and local honey to enrich each dish.
  core: Michelle Smith blends a lifelong devotion to community teaching with a quiet love for gardening, classic literature, and unpretentious folk music, navigating retirement with a relaxed, slightly
    disorganized rhythm and a steadfast commitment to harmony.
background:
  cultural: Michelle grew up in a middle‑class, predominantly white New Jersey family with roots in English, Irish, and German ancestry. Her upbringing reflected the suburban‑rural culture of Hunterdon
    County, where community festivals, seasonal fairs, and a strong emphasis on public education were central. Through her thirty‑plus years of teaching, she has worked in increasingly diverse classrooms,
    which has broadened her appreciation for multicultural perspectives. Her marriage introduced Korean cultural influences—evident in her middle name “Kim”—and she embraces a blended household where American
    and Korean traditions occasionally intersect, especially during holidays and family meals. Overall, her cultural identity is rooted in mainstream American values of community service, education, and
    modest practicality, tempered by an open curiosity toward new ideas.
attributes:
  skills: '["Classroom instruction (K-8)", "Differentiated lesson planning", "Literacy intervention strategies", "Technology integration (Google Classroom, interactive whiteboards)", "Classroom management
