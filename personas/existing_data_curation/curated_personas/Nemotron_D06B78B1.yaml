personas:
  professional: Edward Pruitt, a retired mechanical engineer renowned for optimizing farm machinery, leverages their methodical troubleshooting and data‑driven Python scripts to mentor high‑school STEM
    students and advise the county’s community development board, while their relaxed scheduling lets them pivot to spontaneous woodworking projects for neighbors and the church choir.
  sports: Edward Pruitt, an avid fly‑fisher who spends crisp mornings casting at Lake Red Bluff, is also a loyal supporter of the New Orleans Saints and the Mississippi State Bulldogs, and they join the
    community center’s senior walking club each Thursday, blending relaxed recreation with a subtle competitive streak when tracking personal best catches.
  arts: Edward Pruitt, a stout baritone in the local church choir who delights in the gospel harmonies of Mahalia Jackson and the storytelling of Johnny Cash, also spends quiet evenings editing landscape
    photographs inspired by Ansel Adams while displaying a framed print of Walter Anderson’s "The Dogwood Tree" in their living room, and they weave artistic appreciation into daily routines.
  travel: Edward Pruitt, who plans leisurely road trips with his wife using a trusty paper atlas, has already explored the Henry Ford Museum in Dearborn and the historic Lowell mills in Massachusetts, dreams
    of standing beneath the Hoover Dam, and they favor stops at small-town fairs and local diners, balancing structured itineraries with spontaneous detours to capture sunrise over the Mississippi Delta.
  culinary: Edward Pruitt, a proficient home cook who harvests heirloom tomatoes, sweet corn, and fresh basil from their garden, prepares Southern classics such as fried catfish with a side of collard greens,
    buttery cornbread, and peach cobbler, and they relish inviting neighbors over for potluck meals where the aroma of simmering gumbo fills the porch.
  core: Edward Pruitt is a structured yet easy‑going retiree who blends mechanical ingenuity with a love for community fishing trips, keeps a meticulous ledger beside a stack of bridge scorecards, and they
    occasionally forget to take their medication after a late‑night woodworking session.
background:
  cultural: Edward grew up in a close‑knit, predominantly white, rural community in Kemper County, Mississippi, where church, family gatherings, and seasonal agricultural cycles shaped his worldview. His
    upbringing blended Southern hospitality, a strong sense of self‑reliance, and respect for tradition with the broader perspective from his STEM education at a state university. This background informs
    his practical outlook, community involvement, and appreciation for both heritage and technological advancement.
