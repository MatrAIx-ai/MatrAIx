  career_goals: Although retired, Edward aims to stay intellectually active by mentoring high‑school students in STEM through local outreach programs, volunteering as a technical advisor for the county’s
    community development board, and authoring a practical guide on maintaining small‑scale farming equipment. He also wishes to travel with his wife to historic engineering sites across the United States
    and to preserve his family’s oral history.
