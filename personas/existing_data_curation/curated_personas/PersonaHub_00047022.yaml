persona_description: A biologist who specializes in the study of coastal plain ecosystems, particularly the effects of population growth and development on natural resources. Her research interests include,
  but are not limited to, the connectivity between terrestrial, aquatic, and marine systems, the development of biological filters for water treatment, and the impact of dock construction on salt marshes.
  She collaborates with faculty from the College of Science and Mathematics, the Jiann-Ping Hsu College of Public Health, and the Allen E. Paulson College of Engineering and Information Technology.
