  career_goals: Although still a middle‑school student, Christopher envisions a future where he can work independently on technology that solves real problems. He aspires to become a software engineer or
    a game developer, aiming to create his own video games or develop tools for robotics. He plans to enroll in a specialized STEM high‑school program, participate in coding competitions, and eventually
    study computer science or electrical engineering at a university. His competitive nature drives him to aim for top placements in hackathons and e‑sports tournaments, while his preference for solitude
    leads him to focus on solo projects and remote collaborations.
