  career_goals: Huy often talks about becoming a firefighter because he likes the idea of clear procedures, teamwork, and helping people stay safe. He also dreams of being a teacher, enjoying the structured
    classroom environment and the chance to guide other children. Occasionally, he imagines being an astronaut, attracted by the step‑by‑step training and the excitement of exploring new frontiers. All
    these aspirations reflect his preference for organized roles that involve caring for others.
