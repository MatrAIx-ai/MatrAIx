personas:
  professional: A curious builder of block castles, Huy Trang delights in arranging Lego sets with meticulous order, showcasing an early love for structure and teamwork that hints at future engineering
    aspirations.
  sports: A lively member of the local kindergarten soccer team, Huy Trang dreams of scoring a goal for the home club, the Little Lions, and they relish the structured drills and group high‑fives after
    each practice.
  arts: An enthusiastic fan of animated musical films, Huy Trang sings along to songs by Disney’s Lin‑Manuel Miranda and loves drawing characters like Moana and Spider‑Man, they often stage impromptu performances
    for friends, merging imagination with social joy.
  travel: A bright explorer who loves family road trips to the state park, Huy Trang eagerly maps out stops on a colorful calendar, they imagine future voyages to Japan’s cherry blossoms and the Great Barrier
    Reef, balancing excitement with need for familiar routines.
  culinary: A picky but adventurous eater, Huy Trang adores noodle soup with chicken broth and carrots, they occasionally experiment with sprinkling cheese on steamed broccoli, showing a budding willingness
    to try new flavors while clinging to favored comfort dishes.
  core: Huy Trang is a structured yet sociable five‑year‑old who thrives on organized play, collaborative adventures, and a thoughtful pocket‑money habit, while occasionally indulging in spontaneous sticker
    splurges.
background:
  cultural: Huy comes from a Southeast Asian family that blends Filipino and Vietnamese roots. At home, his parents speak English alongside Tagalog and Vietnamese, fostering bilingual development. The family
    celebrates cultural holidays such as Lunar New Year and Mid‑Autumn Festival with traditional foods, lanterns, and family gatherings. Living in Orlando's diverse community, Huy participates in multicultural
    events at school and local community centers, giving him a strong sense of belonging to both his heritage and his American surroundings.
