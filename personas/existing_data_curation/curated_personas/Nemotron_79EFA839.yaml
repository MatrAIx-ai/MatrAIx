personas:
  professional: Lisette Sterling, a seasoned bookkeeping and accounting clerk with 25 years of experience in small‑business and municipal settings, they leverage their QuickBooks and Excel expertise, meticulous
    attention to detail, and outgoing nature to streamline financial operations while mentoring junior staff and championing community‑focused financial literacy initiatives.
  sports: Lisette Sterling enjoys hiking the nearby forest trails and participates in a local walking club, they cheer the Chicago Cubs on weekends, attend community line‑dance events where folk music fuels
    their steps, and hold a seasonal membership with the regional senior center’s recreational badminton league.
  arts: Lisette Sterling frequents the regional art museum, they partake in a book club that dissects works by contemporary authors such as Zadie Smith and Celeste Ng, attend folk concerts featuring artists
    like Gillian Welch and The Avett Brothers, and hand‑craft quilts inspired by American folk art motifs.
  travel: Lisette Sterling prefers short, well‑planned road trips to Midwestern art festivals in Iowa and Wisconsin, they have a bucket‑list destination of the Getty Museum in Los Angeles, and they balance
    travel with family obligations by often organizing group weekend getaways that combine hiking and local culinary tours.
  culinary: Lisette Sterling delights in preparing classic Midwestern comfort dishes like chicken‑fried steak, cornbread, and apple crisp while incorporating heirloom tomatoes and rainbow carrots from their
    garden, they boast a solid home‑cooking skill set rooted in family recipes and love hosting potluck dinners featuring farm‑fresh butter and locally sourced cheese.
  core: Lisette Sterling balances meticulous spreadsheets with thriving heirloom gardens, channels community energy into folk music line‑dances, and occasionally trades a night of sleep for a late‑night
    quilting session.
background:
  cultural: Lisette was born and raised in rural Missouri, part of a white working‑class family that values self‑reliance, community, and faith. Growing up in Clinton, a small town in Benton County, she
    was steeped in Midwestern traditions, including church involvement, seasonal festivals, and a strong emphasis on family and neighborly support. Her cultural identity reflects the practical, modest outlook
    typical of the region, while her curiosity and appreciation for art have encouraged her to seek new ideas beyond the local sphere. These influences shape her balanced approach to work, community service,
    and personal growth.
