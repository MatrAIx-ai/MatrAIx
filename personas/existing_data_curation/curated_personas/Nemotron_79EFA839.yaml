  hobbies: '[''Visiting art museums and galleries'', ''Participating in a community book club'', ''Gardening'', ''Cooking Midwestern comfort foods'', ''Volunteering at the local senior center'', ''Attending
    live music and folk concerts'', ''Line dancing'', ''Hiking local trails'', ''Traveling to regional art festivals'', ''DIY crafts (quilting, knitting)'']'
  career_goals: Lisette aims to transition into a supervisory role where she can mentor younger clerks and oversee the financial operations of a small business or local government office. She plans to complete
    her GED and enroll in a community college accounting program to qualify for a Certified Management Accountant (CMA) certification. In the longer term, she envisions launching a part‑time bookkeeping
    consulting service for local entrepreneurs, combining her technical expertise with her passion for supporting community growth. Throughout, she wishes to keep learning about emerging financial technologies
    and incorporate creative approaches into her reporting.
