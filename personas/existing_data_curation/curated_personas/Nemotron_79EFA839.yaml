  skills: '[''QuickBooks'', ''Microsoft Excel'', ''Data Entry'', ''Accounts Payable'', ''Accounts Receivable'', ''Payroll Processing'', ''Financial Reporting'', ''Basic Tax Preparation'', ''Customer Service'',
