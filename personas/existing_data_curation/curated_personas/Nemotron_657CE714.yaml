personas:
  professional: Zenobia Valera leverages her bilingual fluency, front‑line event attendant experience, and arts‑humanities graduate training to orchestrate immersive cultural programs, and they apply calm
    assertiveness to resolve crowd conflicts while balancing creative curiosity with pragmatic budgeting.
  sports: Zenobia Valera enjoys weekend hikes in Shenandoah National Park, practices yoga at a downtown studio, plays recreational soccer with the Richmond Strikers club, and they follow the Richmond Kickers
    and Washington Nationals for seasonal sports excitement.
  arts: Zenobia Valera spends evenings sketching Richmond’s riverfront, painting watercolors inspired by Claude Monet, strumming acoustic guitar while singing folk ballads from her family’s heritage, and
    they curate indie film selections at the Richmond International Film Festival, often citing directors like Greta Gerwig and musicians such as Leonard Cohen.
  travel: Zenobia Valera favors spontaneous, culturally immersive trips, having explored the historic streets of Oaxaca, the colonial charm of Cartagena, and the vibrant markets of Lisbon, while they plan
    future visits to Kyoto’s temples and Patagonia’s trekking routes, balancing limited vacation time with a modest travel budget.
  culinary: Zenobia Valera enjoys cooking at home, skillfully preparing dishes like carnitas tacos, chilaquiles with tomatillo salsa, and mole poblano, while also savoring fresh ceviche and sipping mezcal,
    yet they often skip meal prep on busy weeks, opting for quick street‑food style snacks.
  core: Zenobia Valera blends artistic curiosity with pragmatic event planning, juggling a love for watercolor and folk songs with a habit of disorganized bill paying, and they stay emotionally steady while
    fiercely loyal to community roots.
background:
  cultural: Zenobia was raised in a Mexican‑American household in Richmond, where Spanish was spoken alongside English. Her parents immigrated from Oaxaca, bringing rich traditions such as Día de los Muertos,
    traditional cuisine, and folk music, which remain central to her identity. She actively participates in the local Latino community, volunteering at cultural events and celebrating Mexican holidays with
    extended family. Her dual cultural perspective informs her appreciation of both Mexican artistic heritage and the broader American cultural landscape, shaping her worldview and professional aspirations.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Crowd management'', ''Customer service'', ''Basic sound and lighting operation'', ''First aid and CPR certified'', ''Conflict resolution'', ''Event logistics
    coordination'', ''Cultural sensitivity'', ''Adaptability under pressure'']'
  hobbies: '[''Reading contemporary Latin American literature'', ''Sketching and watercolor painting'', ''Playing acoustic guitar and singing folk songs'', ''Cooking Mexican dishes'', ''Attending indie
    film festivals'', ''Hiking in Shenandoah National Park'', ''Yoga practice'', ''Volunteering as a Spanish-language tutor'', ''Collecting vintage vinyl records'', ''Exploring local cultural festivals'']'
  career_goals: Zenobia aims to move from front‑line entertainment work toward a senior event‑planning or cultural‑programming role within the Richmond area. She plans to obtain a professional certification
    in event management and leverage her arts background to design events that highlight Mexican and broader Latino heritage. Her ambition includes leading a team that curates intimate festivals and community
    gatherings, and eventually establishing her own boutique production company that bridges artistic expression with community engagement. She balances her curiosity for innovative concepts with a pragmatic
    focus on budgeting and logistics, ensuring that ambitious ideas are grounded in operational feasibility.
