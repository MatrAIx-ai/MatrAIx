  hobbies: '[''Building with LEGO bricks'', ''Drawing and coloring'', ''Reading picture books'', ''Sticker collecting and album arrangement'', ''Nature walks and specimen gathering'', ''Simple science experiments'',
    ''Puzzle solving'']'
  career_goals: Although still very young, Jennifer expresses a fascination with jobs that involve order and calm focus. She often talks about becoming a librarian because she loves arranging books, or
    a scientist who conducts careful experiments in a quiet lab. Her interest in structured, solitary work reflects her preference for predictability and methodical tasks.
