personas:
  professional: Jennifer Foard, a meticulous role‑play teacher at her preschool’s “pretend school” corner, organizes block lessons and snack times with a calendar she draws herself, channeling their love
    for structure and quiet leadership into a miniature classroom where they calmly guide peers through counting games.
  sports: Jennifer Foard, an enthusiastic participant in Littleton’s weekend park soccer clinic and a regular snow‑shoveling assistant in winter, cheers for the Denver Broncos and Colorado Avalanche, preferring
    solo play with a ball or sled while quietly observing the game on TV, embodying their love of predictable routines and solitary activity, and they often practice dribbling alone after the clinic.
  arts: Jennifer Foard, a devoted fan of Disney classics and the folk melodies of Raffi, spends afternoons drawing detailed pictures of snow‑capped mountains and rehearsing favorite songs from “Frozen,”
    channeling their organized nature into tidy art stations and structured music routines, and they often line up crayons by color before drawing.
  travel: Jennifer Foard, a curious explorer who loves family trips to Rocky Mountain National Park and the Denver Zoo, dreams of visiting Disney World in Florida and the Eiffel Tower in Paris, yet prefers
    short, well‑planned journeys where they can pack a familiar blanket and a favorite storybook, and they often bring a stuffed bunny for comfort.
  culinary: Jennifer Foard, a budding chef who happily mixes macaroni and cheese with hidden peas for extra nutrition, masters the art of spreading peanut butter on toast with precision, and savors warm
    apple slices with cinnamon, all while demanding that meals be served in the same order each night, and they proudly present their creations to the family.
  core: Jennifer Foard, a methodical four‑year‑old who thrives on routine, quietly dominates sandbox kingdoms, meticulously counts snack crackers, and they occasionally lose their socks because they never
    like to change them.
background:
  cultural: Jennifer was raised in Littleton, Colorado, a suburban community that blends West‑Mountain outdoor culture with typical American family traditions. Her family celebrates seasonal holidays such
    as Thanksgiving and Christmas while also taking advantage of local activities like snow play and park outings. Though her ancestry is primarily of European (Irish and German) roots, she has been exposed
    to the multicultural atmosphere of the Denver metropolitan area, fostering an appreciation for diverse community events while maintaining a comfortable, structured home environment.
