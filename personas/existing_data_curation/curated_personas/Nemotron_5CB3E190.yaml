  career_goals: Elizabeth aims to become a senior technical lead or engineering manager within the next five years, focusing on streamlining support processes and mentoring junior staff. She plans to obtain
    advanced certifications such as AWS Certified Solutions Architect and Cisco CCNA to deepen her expertise in cloud and networking. She also aspires to be a recognized voice in the local tech community,
    regularly speaking at meetups and organizing workshops that emphasize practical, hands‑on learning. Ultimately, she wants to shape a reliable, routine‑driven environment that delivers consistent, high‑quality
    technical services while fostering collaboration and professional growth.
