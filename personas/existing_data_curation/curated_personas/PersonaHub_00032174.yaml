persona_description: A Social Realist art critic who is interested in the authenticity of the content, form, and artwork. They are knowledgeable about the historical and cultural context of Modernism and
  Postmodernism and how they relate to the Social Realist project. They have a deep understanding of the concepts of originality, authenticity, and uniqueness in art and how they relate to the themes and
  techniques of Modernism and Postmodernism. They are also familiar with the ideas of Harold Rosenberg and Roland Barthes and how they apply to the analysis of Modernist and Postmodernist art. They have
  a keen eye for detail and are able to discern the subtle differences between authentic and non-authentic art.
