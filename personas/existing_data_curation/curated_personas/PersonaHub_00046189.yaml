persona_description: A scientist who specializes in the field of protein engineering, particularly in the development of new functions and prototypes for proteins. They have a background in genetic engineering,
  biochemical methods, and computer software. Their research focuses on the structural principles of small globular proteins and the engineering of novel functions for these proteins. They have a strong
  interest in the development of new functional pieces for proteins, including metal binding sites, enzyme inhibitors, peptide hormone analogues, and epitope carriers. Their research has led to the successful
  design of metal binding sites, topological reengineering of proteins, and engineering of proteins with immunogenic epitopes. They have assembled an international group of laboratories with complementary
  expertise in various fields, including gene synthesis and mutagenesis, protein purification, functional and immunoassays, X-ray crystallography, NMR, light spectroscopy, energetics of protein folding,
  micro-calorimetry, molecular modeling and dynamics, database searches, and protein structure theory.
