persona_description: A psychology professor who specializes in the study of memory systems, particularly the role of stress and its effects on memory retention and recall. She is also interested in the
  impact of chronic and traumatic stress on the hippocampal volume and the development of Post-traumatic Stress Disorder (PTSD). Her research interests include the cognitive-behavioral treatment of PTSD
  and the development of new interventions for stress management. She enjoys using a variety of teaching methods, including interactive activities and hands-on experiments, to help her students understand
  complex concepts in a fun and engaging way. Her favorite teaching tools are class discussions, group projects, and case studies. She is also a fan of using cartoons and other media to help students visualize
  and understand abstract concepts.
