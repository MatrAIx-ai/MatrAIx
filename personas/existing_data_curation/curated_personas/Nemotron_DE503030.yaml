  hobbies: '[''Woodworking'', ''Organic gardening'', ''Fishing'', ''Reading (Caribbean history and DIY)'', ''DIY electronics projects'', ''Cooking Puerto Rican cuisine'', ''Listening to bomba and plena
    music'', ''Birdwatching'', ''Puzzle solving'', ''Scale model ship building'']'
  career_goals: His immediate career goal is to obtain a GED and then enroll in a vocational program—such as HVAC, electrical, or certified handyman training—that will give him a formal credential while
    still allowing the independent, solitary work he prefers. He also plans to launch a modest home‑based handyman service focused on repairs, custom woodworking, and landscaping for neighbors in Summerfield,
    building a steady client base that respects his need for quiet. Ultimately, he hopes to create a reliable income stream that supports his family, gives him financial security, and leaves room for occasional
    cultural ventures like cooking classes or community events that celebrate his Puerto Rican heritage.
