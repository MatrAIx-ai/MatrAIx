personas:
  professional: Sergio Rivera is a self‑taught handyman who blends solid carpentry, plumbing, and electrical repair expertise with a curiosity for Arduino projects, preferring solitary contracts that let
    them work methodically while they pursue a GED and plan to enroll in a vocational certification program.
  sports: Sergio Rivera maintains fitness through quiet weekend fishing trips on Lake Willow and seasonal birdwatching hikes, participates in the Summerfield Anglers Club, supports the local minor‑league
    baseball team the Lakeview Lumberjacks, and keeps a modest home gym for body‑weight exercises while listening to salsa rhythms.
  arts: Sergio Rivera expresses creativity by crafting custom wooden shelves and a detailed model of the USS Constitution, while their leisure time includes listening to salsa legends like Willie Colón
    and El Gran Combo, reading Caribbean history by Eduardo López, and sketching bird silhouettes in a worn journal, all of which reflect a solitary, hands‑on artistic drive.
  travel: Sergio Rivera prefers meticulously planned road trips that combine solitude with modest adventure, often escaping to the Adirondack lakes or Savannah's historic district for weekend retreats,
    while dreaming of exploring New Orleans during Mardi Gras and sailing to coastal towns of the Dominican Republic to study local boat‑building traditions.
  culinary: Sergio Rivera is an accomplished home cook who specializes in traditional island flavors such as mofongo stuffed with sautéed shrimp, arroz con pollo simmered with sofrito, and tembleque coconut
    pudding, frequently using fresh herbs from their organic garden and premium plantains from the farmer’s market, and loves hosting intimate dinner evenings where these dishes are paired with a locally
    brewed craft stout.
  core: Sergio Rivera is a solitary, hands‑on problem‑solver who balances a love for traditional cooking and DIY electronics with a pragmatic drive for financial stability, yet often forgets to schedule
    regular medical check‑ups.
background:
  cultural: Sergio’s cultural background is rooted in Puerto Rico. Born to parents who emigrated to the United States, he grew up speaking Spanish at home and celebrating traditional holidays such as Three‑Kings
    Day, San Juan festivities, and the Puerto Rican Christmas season. He maintains strong ties to the island’s music, cuisine, and family values, often preparing dishes like mofongo, arroz con pollo, and
    tembleque for family gatherings. In Summerfield, he participates in the local Puerto Rican diaspora community, attending cultural events at the nearby community center and supporting his church, which
    reflects the Catholic heritage common among Puerto Ricans. His bilingualism and cultural pride influence both his personal life and his approach to work, where he often helps Spanish‑speaking neighbors
    with home repairs and translation.
