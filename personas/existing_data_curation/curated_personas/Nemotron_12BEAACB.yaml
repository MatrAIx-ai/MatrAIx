  career_goals: Lisetta aims to enroll in a community college program in Business Administration or Marketing within the next year, leveraging scholarships for first‑generation students. She aspires to
    secure an entry‑level marketing coordinator role at a multicultural organization in Houston, where she can blend her cultural insights with her practical skill set. Long‑term, she hopes to become a
    project manager, overseeing community outreach campaigns that connect Costa Rican immigrants with local resources, while also building a stable, low‑stress career path that satisfies her competitive
    drive and need for security.
