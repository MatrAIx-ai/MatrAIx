personas:
  professional: Lisetta Cruzcastro is an emerging marketing coordinator hopeful who leverages strong interpersonal communication, Canva graphic skills, and meticulous budgeting experience to craft community-focused
    campaigns, while their competitive drive and cautious skepticism keep them constantly refining messaging for maximum impact, and they always double-check data for accuracy.
  sports: Lisetta Cruzcastro spends weekend mornings hiking the Texas Hill Country with the Hill Country Trailblazers club, roots for the Houston Astros and Rockets, and occasionally joins a casual co-ed
    soccer league affiliated with the Houston Dynamo community team, balancing a love of solo fitness with competitive team spirit that they cherish.
  arts: Lisetta Cruzcastro fills spare time digital sketching whimsical scenes on Canva while curating playlists that blend Billie Eilish's introspective pop with The Weeknd's atmospheric R&B, and they
    often unwind watching indie film festivals featuring directors like Greta Gerwig.
  travel: Lisetta Cruzcastro prefers budget-friendly road trips, having explored New Mexico's White Sands and Portland's food carts, while dreaming of a relaxed week in Asheville's mountain retreats, and
    they plan each itinerary with a mix of meticulous research and spur-of-the-moment detours.
  culinary: Lisetta Cruzcastro enjoys cooking budget-savvy meals, frequently whipping up spicy shrimp tacos with fresh cilantro and lime, garlic-infused quinoa bowls, and a comforting cinnamon-scented apple
    crumble, and they showcase a solid home-cook skill set that blends experimentation with practicality.
  core: Lisetta Cruzcastro is a competitively curious planner who thrives on meticulous budgeting and community outreach, yet habitually over-analyzes email drafts and worries about every decision, and
    they often stay up late to perfect a presentation.
background:
  cultural: Lisetta was raised in a Costa Rican household that values family, modesty, and a close connection to nature, echoing the 'pura vida' spirit. Her parents emigrated to Houston when she was a child,
    fostering a bilingual environment where Spanish traditions—such as celebrating Día de los Santos and cooking gallo pinto—blend with Texan customs. She participates in local Hispanic festivals, maintains
    strong ties to the Costa Rican diaspora, and draws on her cultural heritage to navigate both her community and the broader multicultural landscape of Houston.
