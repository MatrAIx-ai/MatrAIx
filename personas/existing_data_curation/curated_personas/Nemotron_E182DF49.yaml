  hobbies: '[''vegetable gardening'', ''cooking traditional Mexican dishes'', ''watching Liga MX soccer'', ''playing chess'', ''listening to mariachi and norteño music'', ''reading biographies and local
    history'', ''handyman projects'', ''volunteering at community center'', ''restoring vintage radios'']'
  career_goals: Although retired from regular employment, Yoan aims to maintain his independence and health while expanding his practical skill set. He hopes to learn more about smartphone technology to
    stay connected with family in Mexico and local friends. He plans to offer occasional handyman services on a flexible, ad‑hoc basis to supplement his modest pension, and to start a small weekend kitchen
    venture selling homemade tamales and pozole at the weekly farmers market. Yoan also aspires to mentor at‑risk youth at the community center, passing on his home‑repair knowledge and cultural cooking
    traditions, and to document his life story in a short memoir for his descendants.
