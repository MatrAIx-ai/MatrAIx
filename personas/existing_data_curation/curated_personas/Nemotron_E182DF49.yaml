personas:
  professional: Yoan Aguilar, a retired handyman turned community mentor, blends decades of hands‑on repair expertise with a pragmatic curiosity, offering flexible ad‑hoc home repairs and running a modest
    weekend kitchen stall, while they exhibit a competitive edge in mastering new fixes, remain skeptical of quick‑fix promises, and often adopt a relaxed approach to obligations that can lead to missed
    appointments and lingering disorganization.
  sports: Yoan Aguilar follows Liga MX matches on TV, passionately backing Club América while also rooting for the Los Angeles Galaxy in MLS, enjoys Dodgers baseball in summer and Lakers basketball in winter,
    and they treat daily garden walks as their primary fitness routine, preferring low‑key activity over structured workouts, yet their competitive streak drives them to analyze game tactics obsessively,
    sometimes worrying over a missed call.
  arts: Yoan Aguilar spends evenings absorbing the resonant trumpets of mariachi legend Vicente Fernández, the accordion‑driven norteño sound of Los Tigres del Norte, and the raw storytelling of corrido
    singer Chalino Sánchez, while their fascination with biographies of historic figures from their homeland and Los Angeles pioneers fuels their appreciation for both music and narrative, and they occasionally
    tinker with vintage radios, reflecting a hands‑on love for analog sound, even as they remain skeptical of modern digital reproductions.
  travel: Yoan Aguilar’s travel style revolves around purpose‑driven low‑cost journeys, such as annual visits to their hometown in Oaxaca to reconnect with family and savor regional cuisine, weekend road
    trips across Southern California to the Grand Canyon and Anza‑Borrego for scenic hikes, and occasional day trips to nearby border towns, all balanced against a modest pension that limits spontaneous
    travel, and they plan each trip with flexibility rather than rigid itineraries, often worrying about staying within budget.
  culinary: Yoan Aguilar’s kitchen is a laboratory for classic home‑cooked dishes, where they perfect tamales wrapped in corn husks, simmer a hearty pozole with hominy and pork, and craft salsa verde from
    fresh tomatillos, cilantro, jalapeños, and a dash of roasted cumin, all seasoned with herbs harvested from their backyard garden, while they competitively experiment with new flavor twists yet sometimes
    worry that the results stray too far from tradition.
  core: Yoan Aguilar, a 69‑year‑old retired handyman with a green thumb and a love for traditional cooking, navigates life with a competitive curiosity, a laid‑back and occasionally disorganized routine,
    a lingering worry about health and finances, and a skeptical streak that makes them overthink decisions, while they mentor youth and dream of passing their stories down.
background:
  cultural: Yoan’s family originated from the state of Jalisco, Mexico, and his parents immigrated to Southern California in the 1950s. Growing up in El Monte’s tightly knit Mexican‑American community,
    he absorbed a blend of Mexican traditions and the multicultural life of Los Angeles County. He is fluent in Spanish, celebrates Día de los Muertos, quinceañeras, and Catholic holidays, and participates
    in neighborhood festivals that feature tejano music, folk dances, and communal feasts. Yoan values the strong family ties and communal support typical of Mexican culture, while also navigating the realities
    of life as an older, single, Hispanic male in a diverse urban environment.
