  career_goals: Approaching retirement, Phoebe aims to create a lasting legacy by mentoring emerging managers and establishing a formal succession plan for her department. She is passionate about introducing
    employee‑wellness initiatives—such as stress‑management workshops and flexible scheduling—to reduce workplace anxiety, reflecting her own sensitivity to stress. Over the next few years she hopes to
    transition into a part‑time advisory role, allowing her to share her practical knowledge while freeing time for community volunteer work, particularly in local senior‑center programs.
