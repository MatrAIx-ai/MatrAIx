personas:
  professional: Rodrigo Miller is a 39‑year‑old master barber in Memphis who blends classic precision cutting with a visual‑artist’s flair, using their background in blues music and analog photography to
    create bespoke haircuts and color treatments that feel like the perfect riff, while they also mentor junior barbers and orchestrate day‑to‑day shop operations with a balance of organization and improvisational
    flexibility.
  sports: Rodrigo Miller is a devoted fan of the Memphis Grizzlies and the Memphis Redbirds, attends Saturday night home games whenever possible, and spends weekday evenings on the local community basketball
    court for pickup games; they run three miles before opening the shop each morning, join the Memphis Half Marathon training group in the spring, and during the cooler months enjoy fishing trips on the
    Mississippi River, though they admit to skipping leg day at the gym when work gets busy.
  arts: Rodrigo Miller channels a love for the blues into their nightly guitar jams with a laid‑back trio that often covers B.B. King and Muddy Waters at venues like the Hi‑Tide on Beale Street, and they
    capture the city’s vibrant street murals through a 35 mm film camera, displaying prints of works by local artist The Drip in their shop; they also follow contemporary painter Kehinde Wiley and admire
    the storytelling of photographer Dorothea Lange, weaving those visual inspirations into hand‑sketched hairstyle concepts that pepper their design notebooks.
  travel: Rodrigo Miller prefers road‑trip itineraries that blend music pilgrimage with culinary stops, having driven the blues trail from Clarksdale to Chicago, and they plan future visits to Austin’s
    South Congress to soak up the live‑music scene and New Orleans for its Mardi Gras street art; they usually book budget‑friendly Airbnb stays and rely on a well‑stocked portable grill to keep cooking
    Southern barbecue on the road, though family responsibilities sometimes limit longer vacations.
  culinary: Rodrigo Miller is a backyard pitmaster who loves perfecting Memphis‑style dry‑rub ribs, smoked brisket, and tangy coleslaw, frequently experimenting with rubs that blend paprika, brown sugar,
    and a hint of coffee, and they pair the meat with classic sides like baked beans and buttery cornbread; they are comfortable wielding a charcoal grill and a smoker, yet they often over‑season their
    sauces, leading to occasional ‘too sweet’ complaints from friends.
  core: Rodrigo Miller is a curious barber‑artist who balances meticulous grooming craft with blues‑filled nights, a disciplined money‑mindset, and a relentless pursuit of a community‑centric boutique that
    feels like an art gallery, all while juggling a stubborn back, a love for Memphis sports, and a habit of over‑salting barbecue sauces.
background:
  cultural: Rodrigo is a white American raised in the Memphis suburbs, steeped in the city’s rich musical heritage and Southern hospitality. His family emphasized hard work, self‑reliance, and respect for
    community, values that still guide his daily life. Growing up near Beale Street, he absorbed the rhythms of blues, soul, and early rock ’n’ roll, which inform both his personal taste and his creative
    approach to barbering. While his cultural roots are Anglo‑American, he embraces Memphis’s multicultural vibe, regularly engaging with friends and clients from diverse backgrounds and celebrating the
    city’s blend of traditions, cuisine, and artistic expression.
attributes:
  skills: '[''Precision hair cutting'', ''Beard sculpting'', ''Hair coloring'', ''Custom haircut design'', ''Client consultation'', ''Sanitation and hygiene compliance'', ''Inventory management'', ''Appointment
