  hobbies: '[''Playing guitar'', ''Photography of street art'', ''Visiting art galleries'', ''Cooking Southern barbecue'', ''Reading design and psychology books'', ''Woodworking'', ''Mentoring youth in
    local community programs'', ''Collecting vintage barber chairs'']'
  career_goals: Rodrigo dreams of opening a boutique barbershop that doubles as an intimate art gallery, giving local visual artists a platform while offering clients an elevated grooming experience. He
    plans to develop his own line of natural grooming products, drawing on his curiosity about formulation and sustainability. Over the next five years, he aims to obtain advanced certification in hair
    coloring and to host monthly workshops that blend hairstyling with creative expression. Ultimately, he envisions his shop as a community hub where beauty, art, and conversation intersect, providing
    financial security for his family and a legacy of mentorship.
