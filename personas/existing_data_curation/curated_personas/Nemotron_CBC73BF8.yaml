personas:
  professional: Myra Mortazavi, a veteran regulatory compliance specialist with over three decades in financial services and health-care, translates dense statutes into practical risk-assessment frameworks,
    mentors emerging professionals through structured workshops, and balances her love of routine with occasional assertive advocacy for policy refinements, which they execute with meticulous attention
    to detail.
  sports: Myra Mortazavi enjoys early-morning beach walks, weekday golf rounds at Harbour Town Golf Links with her close-knit group from the Palmetto Dunes Country Club, follows the Atlanta Braves in baseball,
    roots for the South Carolina Gamecocks during football season, and they maintain her fitness through low-impact, routine-based activities.
  arts: Myra Mortazavi indulges in historical fiction by Hilary Mantel, classic novels by Jane Austen, solves crossword puzzles while listening to the soft folk music of James Taylor, knits scarves inspired
    by Monet's garden palettes, and they attend occasional performances at the Beaufort Playhouse, reflecting a quiet but steady appreciation for timeless art.
  travel: Myra Mortazavi plans vacations with meticulous itineraries, favors low-stress culturally rich destinations such as Savannah's historic squares, a week-long Caribbean cruise to the Bahamas, and
    a spring visit to Kyoto's tea houses, but they often postpone longer trips until after tax season when her consulting schedule eases.
  culinary: Myra Mortazavi cultivates tomatoes, basil, and rosemary in her modest garden, prefers fresh dishes like heirloom tomato-basil pasta, herb-marinated grilled salmon, and caprese salad drizzled
    with extra-virgin olive oil and lemon, yet they sometimes resort to microwaving pre-packaged meals when rushing to library volunteer shifts.
  core: Myra Mortazavi is a methodical, routine-loving compliance veteran who balances sunrise beach walks, early-morning golf, disciplined financial habits, and a cautious yet occasionally indulgent approach
    to health and leisure, which they navigate with quiet confidence.
background:
  cultural: Myra was raised in a middle‑class white family in the American South, where Southern hospitality, respect for tradition, and a strong sense of community were core values. Her upbringing emphasized
    punctuality, practicality, and a diligent work ethic, which align with her preference for routine. Although she married into an Iranian family and adopted the Mortazavi surname, she identifies culturally
    with her Southern roots while appreciating the multicultural perspectives she encountered through her marriage and travel. Her divorce has reinforced her independent outlook, and she remains active
    in her local Methodist congregation and community service groups, reflecting the blend of personal faith and regional cultural norms.
attributes:
