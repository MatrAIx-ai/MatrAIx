  hobbies: '[''Visiting art museums'', ''Community theater attendance'', ''Watercolor painting'', ''Gardening'', ''Senior dance classes'', ''Knitting circles'', ''Book club participation'', ''Volunteer
    art‑craft sessions at senior center'', ''Cooking classes'']'
  career_goals: Karen aspires to move into a supervisory role where she can mentor younger housekeepers, share her knowledge of efficient cleaning methods, and help create a supportive team environment.
    She is interested in opening a small, community‑oriented cleaning service that emphasizes eco‑friendly products and offers discounted rates for senior citizens. A secondary ambition is to become a volunteer
    coordinator for the local arts center, using her love of art to organize workshops and tours for residents of Saginaw, especially those who may feel isolated. She also hopes to complete a short certification
    in senior‑care housekeeping to better serve the aging population in her community.
