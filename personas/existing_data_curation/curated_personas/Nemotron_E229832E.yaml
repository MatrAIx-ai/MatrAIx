  hobbies: '["Digital illustration", "Mixed-media collage", "Contemporary art gallery visits", "Experimental music concerts", "Reading speculative fiction and philosophy", "Listening to neuroscience podcasts",
    "Yoga and meditation", "Hiking desert trails", "Strategic board games", "Mentoring high-school STEM students"]'
  career_goals: Travis aims to become a leading figure in innovative mental health care by merging his STEM expertise with therapeutic practice. In the next five years, he plans to complete a post‑doctoral
    fellowship in cognitive neuroscience, secure a grant to develop a VR‑based exposure therapy platform, and publish a series of interdisciplinary papers on art‑infused interventions. He aspires to open
    a boutique private practice in the Phoenix metropolitan area that offers personalized, tech‑enhanced therapy for adults, while also teaching part‑time at Arizona State University to mentor the next
    generation of clinician‑researchers. Ultimately, he wants to shape policy on incorporating emerging technologies into standard mental health treatment and to be recognized as a thought leader who bridges
    rigorous science with creative practice.
