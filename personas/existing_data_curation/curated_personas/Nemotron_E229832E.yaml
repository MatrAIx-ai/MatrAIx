personas:
  professional: A clinical psychologist and cognitive neuroscience researcher, Travis Benbow blends rigorous statistical modeling in R and Python with immersive VR art therapy, channeling their fierce curiosity
    and competitive drive into leading interdisciplinary projects that push the boundaries of mental health treatment.
  sports: A dedicated runner and weekend yoga enthusiast, Travis Benbow anchors their fitness routine at the Desert Vista Trail and the local Hot Yoga Phoenix studio, while cheering for the Phoenix Suns
    and occasionally joining a co‑ed basketball league at the Tempe Recreation Center.
  arts: An avid collector of contemporary visual experiences, Travis Benbow draws inspiration from James Turrell installations and the sonic textures of Björk, regularly attending Phoenix’s art museum openings
    and crafting digital collages that fuse abstract motifs with neuro‑inspired color palettes.
  travel: A methodical planner with a penchant for immersive desert trekking, Travis Benbow has explored Sedona’s red rock canyons and the Grand Canyon’s rim, and aspires to explore Iceland’s glacial lagoons
    and Japan’s Kyoto temples, balancing limited postdoc funding with strategic use of travel rewards points.
  culinary: A self‑taught home chef, Travis Benbow gravitates toward bold southwestern flavors—frequently preparing chipotle‑marinated chicken tacos with avocado crema and crafting quinoa‑crusted salmon
    bowls—while also indulging in occasional dates at Phoenix’s top‑rated farm‑to‑table restaurant for a tasting menu featuring local figs and heirloom corn.
  core: Travis Benbow, a restless innovator at the intersection of psychology, tech, and art, channels a relentless curiosity into VR‑driven therapy while juggling a caffeine‑fuelled habit, occasional over‑commitment,
    and a competitive streak that fuels both their research and board‑game nights.
background:
  cultural: 'Travis was raised in a Black family with deep roots in the African‑American community of the Southwest. His parents, both college‑educated, emphasized academic achievement and cultural pride,
    exposing him to jazz, spoken word poetry, and civil‑rights history alongside a strong STEM orientation. Growing up in Tempe, he navigated a multicultural environment that blended Hispanic, Native American,
    and Asian influences, which sharpened his appreciation for diverse perspectives. His cultural identity informs his clinical work: he actively integrates culturally responsive practices, recognizes the
    impact of systemic inequities on mental health, and participates in local Black mental‑health advocacy groups. He celebrates his heritage through annual observances like Juneteenth and contributes to
    community workshops that blend psychology with creative expression.'
attributes:
  skills: '["Cognitive-behavioral therapy (CBT)", "Neuropsychological assessment", "Psychometric test development", "Statistical analysis (SPSS, R, Python)", "Experimental design", "Data visualization",
