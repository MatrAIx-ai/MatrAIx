personas:
  professional: Manuel Roque, a 38‑year‑old retail operations lead, merges data‑driven inventory control, bilingual staff coaching, and loss‑prevention expertise to exceed sales targets while they balance
    proven merchandising tactics with a curiosity for emerging retail technologies.
  sports: Manuel Roque plays weekly pickup soccer, passionately follows the MLS side New York Red Bulls, attends salsa dance nights for cardio, lifts at the local Gold’s Gym, and they spend leisurely Saturdays
    angling on Lake Sampson while cheering for the New York Mets.
  arts: Manuel Roque channels creativity through salsa dancing to the timeless beats of Celia Cruz and the modern flair of Marc Anthony, collects vintage vinyl of classic salsa bands, frequents live performances
    at the downtown Latin Jazz Club, they also enjoy occasional community theater productions featuring contemporary playwrights.
  travel: Manuel Roque favors short road trips to coastal escapes like Key West and mountainous retreats in the Great Smoky Mountains, plans itineraries with travel apps that highlight budget accommodations,
    they dream of a summer vacation exploring Barcelona’s architecture and soccer culture, and they occasionally combine fishing outings with family visits to nearby lake resorts.
  culinary: Manuel Roque loves preparing traditional dishes such as mofongo and arroz con gandules, experimenting with adobo‑marinated pork and plantain‑based sides, they host monthly dinner gatherings
    for friends, pairing meals with tropical fruit salsa and a splash of aged rum, and they constantly seek new kitchen gadgets to streamline cooking.
  core: Manuel Roque blends a competitive, data‑driven retail mindset with a passion for soccer, salsa, and home‑cooked comfort food, while they balance meticulous organization with spontaneous fishing
    trips and a pragmatic yet curious outlook on life.
background:
  cultural: Manuel was raised in a Puerto Rican household, where Spanish was spoken daily and family gatherings were filled with music, dance, and food. The values of familismo, respeto, and a strong work
    ethic were instilled early, shaping his reliable and responsible nature. After relocating to Wesley Chapel, FL, he integrated Southern hospitality with his Caribbean roots, maintaining active ties to
    the local Puerto Rican community through festivals like Noche de San Juan and Three Kings Day celebrations. His bilingual ability and cultural fluency enable him to connect with both customers and coworkers
    from diverse backgrounds, and he often incorporates his heritage into store merchandising and community outreach initiatives.
