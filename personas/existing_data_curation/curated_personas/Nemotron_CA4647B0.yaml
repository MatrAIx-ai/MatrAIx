  career_goals: Manuel aims to move from first‑line supervision to a store manager role within the next two years, leveraging his track record of surpassing sales targets and improving employee retention.
    He plans to earn a bachelor’s degree in Business Administration and acquire a Certified Retail Manager credential to position himself for regional or district manager responsibilities. Long‑term, he
    is interested in opening a boutique that blends contemporary retail concepts with Puerto Rican cultural elements, allowing him to apply his competitive edge and innovative ideas while honoring his heritage.
