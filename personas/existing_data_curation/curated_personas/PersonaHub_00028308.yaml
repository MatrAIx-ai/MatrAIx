persona_description: A scientist and explorer who is known for his contributions to the medical field, particularly in the use of the Jenner cowpox vaccine to prevent smallpox. He was the first physician
  west of the Mississippi river to use the vaccine, and his willingness to vaccinate anyone, regardless of ability to pay, is particularly noteworthy. Saugrain was also interested in mineralogy, physics,
  and chemistry, and experimented with early versions of phosphorus matches and manufactured thermometers and barometers. He was a key figure in the scientific expedition to explore the Ohio River and served
  as a mineralogist for Gilbert Antoine de St. Maxent at New Orleans.
