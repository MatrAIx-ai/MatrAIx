  hobbies: '[''Soccer (team and casual play)'', ''LEGO building and robotics kits'', ''Scratch coding and game creation'', ''Cooking Mexican dishes (tortillas, guacamole)'', ''Listening to music (reggaeton,
    pop, mariachi)'', ''Dancing at community festivals'', ''Reading comic books and creating comics'', ''Drawing and journaling'', ''Hiking and exploring local nature'', ''Volunteering at community center
    (organizing activities)'']'
  career_goals: Luis dreams of merging his love for technology with his community. He hopes to become a robotics engineer who can design tools for local farms, or perhaps a professional soccer player who
    represents his neighborhood. He also imagines joining his family’s tradition by becoming a chef who puts a modern twist on Mexican dishes. Ultimately, he wants a career where he can help others, stay
    connected to his cultural roots, and keep learning new things. Because he worries about the future, he seeks a path that offers both creativity and stability.
