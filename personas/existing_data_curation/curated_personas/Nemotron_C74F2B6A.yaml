personas:
  professional: Luis Bavis, a budding Scratch game developer who blends curiosity for coding with a practical knack for problem‑solving, they translate their love of LEGO building into logical design, even
    if their disorganized schedule sometimes leaves projects half‑finished.
  sports: Luis Bavis, an enthusiastic midfielder for Bakersfield United Youth Soccer, they cheer for the Los Angeles Galaxy, the Los Angeles Dodgers and the Golden State Warriors, spend weekends hiking
    the nearby hills to boost stamina, and often leave their cleats at the park due to a relaxed attitude toward organization.
  arts: Luis Bavis, a comic‑book enthusiast who spends rainy afternoons drawing farm‑themed superhero strips, they dance to reggaeton hits by Bad Bunny and J Balvin while also enjoying traditional mariachi
    tunes from Mariachi Vargas de Tecalitlán, and they collect illustrated editions of Spider‑Man and Batman.
  travel: Luis Bavis, a weekend‑trip explorer who loves hiking Yosemite and splashing at Lake Tahoe, they have visited San Diego’s Balboa Park and dream of touring Mexico City’s historic plazas during summer
    break, always packing a soccer ball and sketchbook, though their travel plans hinge on their parents’ farm work schedule.
  culinary: Luis Bavis, a budding kitchen assistant who proudly rolls fresh tortillas and whips up guacamole with lime, cilantro and jalapeños, they savor tamales, quesadillas with melted cheese and salsa
    verde, often experiment by adding chipotle to enchiladas, yet their habit of leaving a mess on the counter can frustrate their parents.
  core: Luis Bavis, a curious yet easily distracted 11‑year‑old who bounces between building LEGO worlds, scoring soccer goals, and sketching comic heroes, they juggle boundless energy with occasional worry
    and a knack for turning ordinary moments into lively, if slightly chaotic, adventures.
background:
  cultural: Luis comes from a Mexican‑American family that maintains strong ties to Mexican culture while embracing life in Bakersfield, California. Spanish is spoken at home, and family gatherings are
    filled with traditional foods like tamales, quesadillas, and salsas, as well as celebrations of Dia de los Muertos and Mexican Independence Day. His parents work in agricultural jobs, giving him a firsthand
    view of the farming community that dominates Kern County. The blend of Mexican heritage and the agricultural landscape of the Central Valley shapes his identity, fostering a respect for hard work, family
    solidarity, and community participation. He enjoys local Mexican festivals, mariachi music, and community events that bring together both his cultural roots and the broader Californian environment.
attributes:
