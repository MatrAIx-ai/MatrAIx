  career_goals: Martha aims to graduate high school (or obtain a GED) and then enroll in a community‑college health‑sciences program to become a Certified Nursing Assistant. She is drawn to nursing because
    its structured routines match her love of predictability, while the caring aspect resonates with her kind, cooperative nature. Over the long term, she hopes to advance to a Registered Nurse role, specializing
    in community health or hospice care where she can provide calm, compassionate support. In the meantime, she also envisions seasonal work in Myrtle Beach’s hospitality sector—such as guest services at
    a beachfront resort—to gain real‑world experience, earn income, and stay connected to the beach community she loves.
