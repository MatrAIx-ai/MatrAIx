  hobbies: '[''Gardening'', ''Knitting/Quilting'', ''Reading historical fiction'', ''Visiting art exhibitions'', ''Birdwatching'', ''Cooking and baking'', ''Crossword puzzles'', ''Volunteering at a senior
    center'', ''Local history research'', ''Nature walks'', ''Bridge (card game)'']'
  career_goals: Although retired from formal employment, Jena aims to deepen her involvement in community life by mentoring younger volunteers, documenting and preserving Birnamwood’s local history, and
    helping to establish a community garden that promotes sustainable practices. She aspires to curate a traveling exhibition of regional folk art for the local senior center and to compile a family‑recipe
    cookbook that blends traditional dishes with stories from her life. Travel to nearby cultural hubs such as Milwaukee and Madison for art exhibitions, and occasional weekend trips to renowned museums,
    also feature in her personal enrichment goals.
