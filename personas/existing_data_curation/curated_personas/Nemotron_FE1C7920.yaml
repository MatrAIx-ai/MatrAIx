personas:
  professional: Jena Fernandez, a retired community volunteer and event coordinator, channels her methodical organization, knack for budgeting, and warm collaborative spirit into orchestrating local arts
    festivals, senior‑center workshops, and the town’s emerging community garden program.
  sports: Jena Fernandez maintains fitness with early‑morning birdwatching walks, a weekly low‑impact yoga class at the senior center, and she avidly supports the Milwaukee Brewers (MLB) and Green Bay Packers
    (NFL) during the baseball and football seasons.
  arts: Jena Fernandez immerses herself in the arts by regularly attending exhibitions at the Milwaukee Art Museum, especially works by Charles Burchfield and Georgia O'Keeffe, hosts quilting circles that
    showcase traditional Midwestern folk patterns, and volunteers to curate a traveling exhibit of regional folk art for the senior center.
  travel: Jena Fernandez prefers short, well‑planned road trips, often spending weekends exploring Milwaukee’s museum district, Madison’s historic Capitol, the lake‑front charm of Door County, and she dreams
    of a summer pilgrimage to New York City’s Metropolitan Museum of Art.
  culinary: Jena Fernandez delights in preparing classic Midwestern comfort foods such as chicken pot pie, cheese curds with ranch dip, rhubarb crisp, and her signature sourdough bread flavored with fresh
    rosemary and heirloom tomatoes, often baking these dishes for potluck gatherings and family celebrations.
  core: Jena Fernandez is a curiosity‑driven, meticulously organized senior who blends her love of gardening, quilting, and community arts with a frugal, health‑conscious lifestyle, occasionally forgetting
    to take her blood pressure meds but never missing a bridge game.
background:
  cultural: Jena grew up in a white, Midwestern family with deep roots in Wisconsin, tracing her ancestry to German and Scandinavian immigrants who settled the region in the late 1800s. The cultural fabric
    of Birnamwood—characterized by strong community ties, church involvement (she is an active member of the local Lutheran congregation), seasonal festivals, and a reverence for the natural landscape—has
    shaped her values of reliability, modesty, and cooperation. She embraces traditional Midwestern customs such as community potlucks, county fairs, and the celebration of holidays like Thanksgiving and
    the Fourth of July with a focus on togetherness and local heritage. Her appreciation for art is informed by both the region’s folk traditions (quilt making, woodworking) and a respectful awareness of
    the Native American histories of the area.
