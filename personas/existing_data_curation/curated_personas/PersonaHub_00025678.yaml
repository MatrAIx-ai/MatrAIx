persona_description: An historian or a researcher interested in the history of women in modern Germany, particularly in the transition from National Socialism to democracy and the role of marital status
  in shaping women's lives. This person is likely to have a deep understanding of German national and regional archives and the archives of the U.S. occupying forces, and would appreciate the analytical
  insights offered by Elizabeth Heineman's study of unwed, divorced, widowed, and married women across three political regimes. This person would also be interested in comparing prewar and postwar, East
  and West, lived experience and public policy, as demonstrated in Heineman's study.
