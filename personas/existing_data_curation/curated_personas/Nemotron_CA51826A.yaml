  career_goals: Althea aspires to advance to a senior leadership role, such as Regional Sales Director or Vice President of Sales, where she can shape sales strategy across multiple product lines and mentor
    a larger team. She aims to integrate her creativity into product development, championing innovative, design‑forward solutions that meet market demands. Additionally, she wants to champion sustainable
    manufacturing practices within the sales organization and to be recognized as a thought leader at industry conferences. Balancing ambition with personal well‑being, she seeks a role that offers greater
    autonomy, flexible scheduling, and the ability to maintain a healthy work‑life balance.
