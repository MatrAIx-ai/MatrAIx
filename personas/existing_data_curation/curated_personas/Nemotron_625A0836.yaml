  career_goals: She dreams of becoming a visual storyteller—an animator or comic book artist—who can create worlds that invite others to explore. She also thinks about using technology to bring her ideas
    to life, like designing video games or interactive experiences. In the longer term she hopes to attend an arts‑focused high school and eventually study illustration or game design at university. Additionally,
    she wants to inspire other kids in her community to imagine and create.
