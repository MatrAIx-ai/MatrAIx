personas:
  professional: Lisa Lichi is a budding digital storyteller who blends their vivid imagination with technical curiosity, crafting elaborate Minecraft kingdoms and hand‑drawn comic strips that showcase whimsical
    fantasy narratives while thriving in the flexible, unstructured environment of after‑school art class and drama club.
  sports: Lisa Lichi is a member of the local youth soccer club that practices on Saturday mornings, cheers for the Los Angeles Lakers and the New Zealand All Blacks during family game nights, loves hiking
    on family trips to explore tide pools, and occasionally tries skateboarding at the community park, yet they rarely adhere to a strict training schedule, preferring spontaneous play.
  arts: Lisa Lichi is a creative whirlwind who spends afternoons sketching whimsical watercolors inspired by Hayao Miyazaki and Mary Blair, strums the ukulele to the tunes of Jack Johnson and Tegan and
    Sara, and stars in drama club productions where they admire the energy of Millie Bobby Brown and the comedic timing of Jim Carrey.
  travel: Lisa Lichi loves spontaneous family road trips to the coast where they collect seashells, has explored the Redwood National Forest and the tide pools of Monterey Bay, and dreams of wandering the
    lantern‑lit streets of Kyoto and the fairy‑tale villages of Hallstatt, though they rely on their parents to handle most itinerary details.
  culinary: Lisa Lichi is a budding kitchen experimenter who can whip up a strawberry‑banana smoothie, loves cheesy pizza with extra mozzarella, enjoys baking cupcakes topped with rainbow sprinkles, and
    delights in avocado‑cucumber sushi rolls, though they sometimes overcook toast and forget to clean up the countertops after cooking.
  core: Lisa Lichi is an imaginative, socially vibrant 11‑year‑old who blends whimsical art, spontaneous adventure, and a laid‑back approach to life, while occasionally misplacing their sketchbook and forgetting
    to water their plants.
background:
  cultural: Lisa grew up in Zavalla, a small town in Angelina County, Texas. Her family is of Anglo‑American heritage and follows many Southern traditions—church gatherings, community picnics, and the county
    fair. The rural environment, with nearby pine forests and the Sabine River, fosters a close relationship with nature. Local culture values friendliness, a laid‑back attitude, and support for neighborly
    cooperation, which aligns with Lisa’s sociable and considerate personality. The area’s modest exposure to art through school programs and community events has shaped her budding love for creativity.
