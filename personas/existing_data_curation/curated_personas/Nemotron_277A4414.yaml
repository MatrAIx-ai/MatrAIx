personas:
  professional: Lisa Febres, a seasoned retail sales specialist with a knack for building customer relationships and mastering product lines quickly, leverages their calm, empathetic demeanor and organized
    inventory skills to mentor junior staff while pursuing a supervisory role that will let them launch a boutique showcasing local art and produce.
  sports: Lisa Febres enjoys low-impact fitness by joining the Okeechobee senior walking club, fishing alongside their husband on Lake Okeechobee, bird-watching at Loxahatchee National Wildlife Refuge,
    and cheering on the Miami Dolphins and Florida Gators while occasionally playing pickup badminton at the community center.
  arts: Lisa Febres basks in creative expression through watercolor landscapes of wetland sunsets, regular attendance at gallery openings featuring Georgia O’Keeffe-inspired local painter Maya Lin, quilting
    sessions with the Friends of the Fabric Circle where they craft Log Cabin patterns, and weekend folk concerts by the band The River Pickers.
  travel: Lisa Febres favors relaxed road trips that blend nature and culture, frequently exploring the Everglades by kayak, revisiting historic Savannah for its squares, planning a dream pilgrimage to
    the vineyards of Napa Valley, and dreaming of a springtime visit to the cherry blossoms of Kyoto while balancing travel budgets with boutique startup costs.
  culinary: Lisa Febres enjoys farm-to-table cooking, often stirring up a vegetable stir-fry with zucchini, bell peppers, and fresh basil from their garden, baking a tangy key-lime pie for community potlucks,
    and savoring grilled tilapia topped with mango salsa while still occasionally over-salting soups in their quest for bold flavor.
  core: Lisa Febres is a curiosity-driven, art-loving mentor who balances gentle leadership with a habit of over-booking community events, always pausing for a quiet water-color moment to reset.
background:
  cultural: Lisa was raised in the close‑knit, rural communities of central Florida, where Southern hospitality and a strong sense of neighborliness formed the core of her values. The region’s agricultural
    heritage, interwoven with the diverse cultural tapestry of the broader Floridian coast—including Caribbean and Latin influences—shaped her open‑mindedness and appreciation for varied experiences. Her
    family’s Protestant upbringing emphasized service, humility, and community involvement, manifesting in traditions like church choirs, local festivals, and volunteer work. These cultural threads fostered
    Lisa’s collaborative spirit, respect for harmony, and enduring curiosity about art and new ideas.
attributes:
  skills: '[''Interpersonal communication'', ''Customer relationship management'', ''Product knowledge acquisition'', ''Adaptive sales techniques'', ''Negotiation and closing'', ''Conflict resolution'',
