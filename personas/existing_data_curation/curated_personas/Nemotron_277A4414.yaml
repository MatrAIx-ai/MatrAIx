  hobbies: '[''Watercolor painting'', ''Gardening'', ''Bird watching'', ''Fishing'', ''Reading historical fiction'', ''Quilting'', ''Volunteering to teach computer basics'', ''Attending live folk music
    events'', ''Exploring local art fairs'', ''Community theater participation'']'
  career_goals: Lisa aims to step into a supervisory role within her retail organization, where she can lead a team of sales associates and develop a mentorship program that emphasizes ethical, customer‑centric
    selling. Simultaneously, she dreams of opening a small boutique that showcases local artwork, handcrafted goods, and regional produce, blending her love of art with her sales expertise. In the longer
    term, Lisa hopes to become a trusted advisor for budding entrepreneurs in Okeechobee and St. Lucie County, offering workshops on effective sales strategies, community outreach, and balanced work‑life
    practices.
