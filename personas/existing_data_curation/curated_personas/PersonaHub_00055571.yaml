persona_description: A researcher working on the development of new technology for providing broadband internet access to remote areas and moving trains through the use of high altitude platforms, such
  as solar powered aircraft or airships. This researcher is part of the CAPANINA project, which is supported by the EU's Framework Programme and aims to develop equipment that can operate from aircraft
  or airships that are permanently located in the sky, at an altitude of 20 kilometers. The researcher is interested in innovative solutions for delivering broadband internet to rural, suburban, and other
  hard-to-reach areas and is looking for ways to make this technology affordable and accessible to people at home, in the office, and on the move.
