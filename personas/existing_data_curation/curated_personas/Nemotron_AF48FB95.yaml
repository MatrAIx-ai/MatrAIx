  career_goals: Andrew aspires to merge his love for art with his desire to help others. He hopes to study graphic design or visual communication in college, eventually working as a designer for nonprofit
    organizations or community programs that use visual storytelling to raise awareness about social issues. He is also interested in pursuing a career in youth mentorship or counseling, where he can use
    creative workshops to foster emotional well‑being among peers. In the short term, he aims to build a portfolio of art projects, obtain a summer internship at a local arts nonprofit, and earn a certification
    in youth counseling or peer support. His long‑term ambition is to become a community arts coordinator, designing inclusive programs that empower marginalized youth in rural Texas.
