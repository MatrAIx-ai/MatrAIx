  career_goals: Maria aims to transition from her current managerial role into a senior director position where she can shape enterprise-wide innovation strategies, especially at the intersection of technology
    and creativity. She aspires to champion diversity, equity, and inclusion initiatives that lift underrepresented talent, drawing on her Salvadoran heritage to mentor rising professionals. Over the next
    five years, she plans to lead a corporate social-responsibility program that partners with local arts organizations and community groups in Fairfax County, using data-driven impact assessments to demonstrate
    value. Long-term, she envisions establishing a consultancy focused on helping mid-size firms embed design-thinking and agile practices while fostering a culture of continuous learning.
