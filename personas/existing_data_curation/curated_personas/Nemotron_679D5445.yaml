personas:
  professional: Maria Caraballo is a senior program manager who uses their data‑driven expertise in Excel, SQL, Python, and Tableau to steer cross‑functional teams toward innovative solutions, and they
    channel their curiosity for art into flexible, occasionally chaotic design‑thinking workshops that keep projects fresh and stakeholder engagement high.
  sports: Maria Caraballo enjoys hiking the Bull Run Mountains on weekends, regularly attends yoga sessions at a local studio, and fervently follows the Washington Capitals hockey team and DC United soccer
    club, but they sometimes skip scheduled runs when work projects demand extra time.
  arts: Maria Caraballo cultivates their artistic side by visiting the Smithsonian's American Art Museum, exploring DC's vibrant street murals by artists like Victor, attending watercolor workshops inspired
    by Georgia O'Keeffe, and photographing urban light patterns, and they use art both as a hobby and as a bridge to their cultural roots.
  travel: Maria Caraballo balances family responsibilities with a love for travel, spontaneously road‑tripping to Shenandoah Valley for weekend hikes and planning longer getaways to Oaxaca and Barcelona
    to soak in historic plazas and local cuisines, and they often negotiate trip dates around their demanding work schedule.
  culinary: Maria Caraballo expertly prepares pupusas filled with cheese and seasoned pork, crisp yuca frita drizzled with garlic‑lime sauce, and hearty sopa de pata simmered with tripe, plantains, and
    corn masa, and they also experiment with seasonal salads featuring kale, heirloom tomatoes, and avocado for brunch gatherings.
  core: Maria Caraballo is a curious, art‑infused data strategist who blends fierce ambition with a relaxed, occasionally chaotic lifestyle, and they constantly weave cultural traditions into both professional
    and personal pursuits.
background:
  cultural: Maria was born to Salvadoran parents who immigrated to the United States in the 1970s. Raised in a bilingual household in the Washington, D.C. metro area, she grew up speaking both Spanish and
    English, celebrating Salvadoran holidays such as La Fiesta de San Salvador and Día de los Mártires. Family gatherings revolve around traditional foods, music, and storytelling that keep her connection
    to her heritage alive. In Fairfax County, she actively participates in the local Salvadoran community center, helping organize cultural festivals, language classes, and mentorship programs for recent
    immigrants. Her cultural background informs her values of family solidarity, communal responsibility, and a deep appreciation for the arts, which she weaves into both her professional and personal life.
