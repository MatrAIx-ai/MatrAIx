persona_description: A policy analyst and risk management expert who specializes in conducting cost-benefit analyses of flood control measures in cities, particularly New York. The expert has extensive
  experience in conducting simulations of storm surges and estimating the potential damage of simulated storms. They are also familiar with the psychological factors at play in decision-making, including
  concerns about the aesthetic impact of large flood barriers and political factors. The expert is interested in studying the effectiveness of different flood control strategies, particularly the hybrid
  approach that combines infrastructure improvements with smaller flood barriers. They are aware of the potential for climate change to increase the frequency and severity of floods, and are working to
  develop strategies that are both cost-effective and effective in protecting New York and other cities from the effects of climate change.
