persona_description: A historian who specializes in the study of World War II, particularly the economic and financial aspects of the war. This person is knowledgeable about the impact of the global depression
  on Germany, the National Socialists' economic program, and the relationship between Germany's economic freedom and the collapse of the international banking cartels. They are also familiar with the history
  of the Federal Reserve and the Central Bank of Europe, and the role of private international bankers in the global economy. This person is interested in understanding the causes and consequences of the
  war, and the impact of Germany's economic freedom on the global economy.
