  hobbies: '[''Knitting and quilting'', ''Book club'', ''Church choir'', ''Community theater backstage work'', ''Gardening'', ''Walking in local parks'', ''Yoga classes'', ''Cooking Southern cuisine'',
    ''Volunteering at senior centers'', ''Attending farmers’ markets'']'
  career_goals: Kathleen aims to formalize her expertise by obtaining a pharmacy technician certification and completing a GED in the next two years. She hopes to advance to a lead pharmacy aide or supervisory
    position, where she can mentor newer staff and help design patient‑education initiatives. Balancing her professional growth with personal well‑being, she seeks a part‑time schedule that allows more
    time for community volunteering and self‑care. Financial stability and a sense of accomplishment before retirement are central to her long‑term ambitions.
