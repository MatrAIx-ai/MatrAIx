  hobbies: '[''Beach Walking'', ''Community Gardening'', ''Book Club'', ''Dance Classes'', ''Volunteer Craft Workshops'', ''Genealogy Research'', ''Cooking Southern Cuisine'', ''Group Volunteer Activities'']'
  career_goals: Nancy aims to transition from a teaching assistant to a lead instructional coordinator, seeking certification in curriculum development within the next two years. She aspires to design and
    implement a mentorship program for at‑risk youth in Horry County, and hopes to eventually obtain an associate degree in education to qualify for a full‑time teaching role. Her long‑term ambition includes
    contributing to district‑wide professional development workshops, sharing her organized, achievement‑driven methods with fellow educators.
