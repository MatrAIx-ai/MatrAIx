personas:
  professional: An instructional support specialist, Nancy Wesler leverages meticulous organization, classroom management expertise, and a curiosity for emerging ed‑tech to streamline lesson‑plan coordination
    and mentor diverse learners, and they assertively champion new curriculum initiatives.
  sports: Nancy Wesler enjoys early morning shoreline walks, participates in a local senior tennis club, roots for the Carolina Panthers and Myrtle Beach Pelicans, and they attend community yoga sessions
    in summer, balancing low‑impact activity with spirited support for regional sports teams.
  arts: Nancy Wesler regularly leads craft workshops at the community center, joins a line‑dance class set to Dolly Parton and James Taylor, participates in a book club that discusses works by Harper Lee,
    and they attend seasonal performances by the local Little Theatre, weaving Southern artistic traditions into their vibrant social life.
  travel: Nancy Wesler plans relaxed road trips to Charleston, Savannah, and Asheville using a detailed itinerary, enjoys occasional cruises to the Bahamas, and they dream of exploring New Orleans’ jazz
    scene and hiking the Great Smoky Mountains, balancing careful preparation with a spontaneous love for seaside getaways.
  culinary: Nancy Wesler excels at preparing shrimp and grits, fried chicken, collard greens simmered with ham hocks, and peach cobbler topped with crunchy pecans, using fresh garden herbs and locally sourced
    seafood while they host weekly potlucks that showcase their knack for comforting Southern cuisine blended with occasional modern twists.
  core: Nancy Wesler blends disciplined organization with a sociable, community‑centric spirit, obsessively tracking garden swaps and genealogy charts while they occasionally binge‑watch daytime soap operas
    and neglect to water their ferns on busy weeks.
background:
  cultural: Nancy’s cultural background is rooted in the Southern United States, reflecting values of hospitality, community involvement, and a strong sense of place. Growing up in the coastal region of
    South Carolina, she was influenced by traditions such as church gatherings, seasonal festivals, and an appreciation for the natural environment. These experiences fostered a pragmatic outlook balanced
    with curiosity about her heritage, leading her to celebrate local customs while embracing diverse perspectives in her professional and personal life.
