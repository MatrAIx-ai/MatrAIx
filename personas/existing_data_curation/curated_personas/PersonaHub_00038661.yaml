persona_description: A Yemenite historian and scholar who lived during the late 17th and early 18th centuries, focusing on the history of the Jewish community in San'ā, Yemen. He wrote a chronicle titled
  "Dofi ha-Zeman" during this time, which reflects the moral deterioration of the community due to the destruction of communal systems after the return of Yemenite Jews from exile in Mawza. His work holds
  an important place in Yemenite history and is considered a significant contribution to the field of Jewish history.
