persona_description: A molecular geneticist who specializes in the study of genetic mechanisms, particularly epigenetic processes, gene imprinting, DNA methylation, reading frame-shifts, protein folding,
  introns, and spatial and temporal patterns of gene expression in various cells and tissues. This individual is actively working on integrating molecular insights into many other areas of biology, including
  embryology, physiology, ethology, ecology, and evolution. They are trained in biology proper and not biotechnology or medicine, and are using molecular techniques to get a "handle" on the complex processes
  of development, physiology, and behavior. They are confident that molecular geneticists will, in a few years, announce with great fanfare the dawn of a new paradigm in biology - organismal biology.
