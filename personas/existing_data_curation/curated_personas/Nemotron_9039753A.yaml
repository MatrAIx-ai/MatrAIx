personas:
  professional: Randall Washington is a disciplined high‑school senior who leverages their methodical organization, competitive chess mindset, and hands‑on model‑building precision to dominate AP physics
    and robotics projects, all while meticulously charting a path to a mechanical engineering scholarship at LSU and a potential technical specialist role in the U.S. Navy.
  sports: Randall Washington channels their competitive drive into early‑morning jogs with the New Orleans Running Club, avidly follows the New Orleans Saints during football season and the LSU Tigers in
    college football, and spends tranquil weekend afternoons fishing on Lake Pontchartrain, preferring solitary endurance over team sports.
  arts: Randall Washington curates a personal soundtrack of classic rock icons—Led Zeppelin, The Rolling Stones, and Pink Floyd—while precisely assembling aircraft and car model kits, and occasionally attends
    the New Orleans Jazz & Heritage Festival to soak in the city’s brass traditions, letting those melodies fuel their engineering imagination.
  travel: Randall Washington prefers meticulously planned road trips, having charted day‑long explorations of the French Quarter and a weekend getaway to Gulfport’s beaches, while dreaming of a solo backpacking
    trek through Yellowstone National Park and a future study‑abroad stint in Munich to broaden their engineering horizons.
  culinary: Randall Washington enjoys cooking authentic Cajun classics like Gulf‑spiced gumbo with okra, and jambalaya seasoned with andouille sausage and cayenne, yet they admit to frequent late‑night
    cravings for pepperoni pizza and a habit of over‑indulging in sugary energy drinks during coding marathons.
  core: Randall Washington is a precision‑obsessed, introverted teen who blends competitive chess strategy with hands‑on model building, methodically plans every aspect of life, but occasionally succumbs
    to late‑night snack binges, missed flossing, and a stubborn skepticism toward unsolicited advice.
background:
  cultural: Randall grew up in Mandeville, Louisiana, where Southern hospitality and the unique blend of Cajun and Creole influences shape daily life. His family follows traditional Southern values—emphasis
    on family cohesion, modesty, and community involvement—while also participating in regional customs such as Mardi Gras celebrations, local seafood dishes, and church gatherings. Though his household
    is primarily of Anglo‑American Protestant background, he appreciates the area's zydeco music and creole cuisine, which have subtly influenced his tastes and worldview. This cultural mix fosters his
    respect for discipline, hard work, and a sense of belonging to a close‑knit community.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic automotive maintenance'', ''Beginner Python programming'', ''Strategic chess play'', ''Detailed note-taking'']'
  hobbies: '[''Model kit building'', ''Chess'', ''Python game development'', ''Jogging'', ''Reading technical manuals'', ''Fishing'', ''Listening to classic rock'']'
  career_goals: Randall aims to graduate high school with a strong GPA and earn a scholarship to pursue a bachelor's degree in mechanical engineering at Louisiana State University. He envisions a career
    designing automotive systems or working in renewable energy technology, fields that combine his hands‑on technical skills with his love of structured problem solving. He is also considering joining
    the U.S. Navy as a technical specialist to experience a highly disciplined environment and gain further technical training.
