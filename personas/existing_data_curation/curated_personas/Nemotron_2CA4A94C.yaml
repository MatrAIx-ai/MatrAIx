  hobbies: '[''Hiking'', ''Fishing'', ''Watercolor Painting'', ''Acoustic Guitar'', ''Attending Art Galleries and Folk Festivals'', ''Trivia Nights'', ''Board Game Sessions'', ''Volunteering at Community
    Library'', ''Reading about Psychology and Emerging Tech'']'
  career_goals: Jesse aspires to move into a leadership role within customer experience, aiming to become a Team Lead or Customer Experience Manager within the next three years. He plans to obtain a professional
    certification in Customer Experience Management and enroll in part-time MBA coursework to deepen his strategic and analytical skills. Long-term, he hopes to influence product development by bridging
    the gap between customer insights and engineering, leveraging his STEM background to drive data-driven improvements.
