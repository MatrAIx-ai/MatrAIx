  hobbies: '[''visiting art galleries'', ''sketching and illustration'', ''nature photography'', ''hiking'', ''indoor gardening'', ''creative writing (short stories, poetry)'', ''listening to experimental
    music'', ''mindfulness meditation'', ''journaling'', ''reading philosophy and psychology'']'
  career_goals: Michael aims to turn his artistic passion and growing technical skill set into a sustainable freelance career, focusing on UI/UX design and visual storytelling for socially‑conscious brands.
    Over the next three years he plans to complete a professional certification in user experience design, build a robust online portfolio, and secure regular remote contracts that allow him to work from
    quiet, solitary spaces. Long‑term, he hopes to launch a small boutique studio that creates custom illustrations and digital products for nonprofits, while maintaining a healthy work–life balance that
    mitigates his anxiety and stress.
