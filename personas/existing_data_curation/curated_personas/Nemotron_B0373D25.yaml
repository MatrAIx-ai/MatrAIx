personas:
  professional: Michael Svetahor, a budding freelance UI/UX designer, blends Adobe Photoshop and Illustrator expertise with Python‑driven data organization to craft minimalist digital experiences for socially‑conscious
    brands, thriving in solitary remote work while leveraging their empathetic listening to translate client values into intuitive interfaces.
  sports: Michael Svetahor hikes the Barton Creek Greenbelt most weekends, practices solitary yoga in their apartment, joins occasional climbing sessions at the Austin Bouldering Project, and follows Austin FC
    and the Texas Longhorns, using physical activity as a low‑key antidote to stress.
  arts: Michael Svetahor spends evenings sketching at Austin’s independent galleries, draws inspiration from the surreal installations of Yayoi Kusama and the ambient soundscapes of Brian Eno, while quoting
    poetry by Ocean Vuong in personal journals and citing the narrative nuance of Haruki Murakami in their short stories.
  travel: Michael Svetahor prefers low‑key, self‑planned trips to quiet natural retreats—like a solo weekend in Sedona’s red rocks or a midnight hike on Iceland’s black‑sand beaches—while budgeting carefully;
    they have yet to book a long‑haul journey but dream of exploring Tokyo’s design museums during off‑peak seasons.
  culinary: Michael Svetahor, a competent home cook, frequently prepares vegan quinoa bowls with roasted sweet potatoes, black beans, chipotle aioli, and cilantro, while savoring a meticulously brewed pour‑over
    from Austin’s Houndstooth Coffee, and occasionally indulges in a spicy mushroom ramen topped with a soft‑boiled egg.
  core: Michael Svetahor channels a restless curiosity into solitary art and design, balancing meticulous budgeting with occasional impulsive splurges on prints, while wrestling with an undercurrent of
    anxiety that fuels both creative intensity and occasional procrastination.
background:
  cultural: Michael grew up in Austin, Texas, a city known for its eclectic mix of Southern hospitality, progressive politics, and a vibrant DIY arts scene. His family’s roots trace back to Eastern Europe,
    and cultural traditions from that heritage occasionally surface in family meals and holiday celebrations, giving him a subtle appreciation for multicultural perspectives. Immersed in Austin’s community
    of independent musicians, street art, and tech start‑ups, he internalized a value for openness to new ideas while retaining a quietly introspective, independent spirit that aligns with the broader Texan
    ideal of self‑reliance.
