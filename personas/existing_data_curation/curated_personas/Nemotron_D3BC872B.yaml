    management'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading (fiction, biographies, psychology)'', ''Gardening'', ''Yoga'', ''Volunteering as treasurer for arts co‑op'', ''Traveling
    to historic towns and art fairs'', ''Journaling'']'
  career_goals: Cynthia aims to obtain her Certified Public Accountant (CPA) license within the next three years, leveraging her hands‑on bookkeeping background to transition into a senior accountant role.
    She aspires to lead a small accounting team at a midsize nonprofit organization, where she can combine her financial expertise with her desire to support community arts programs. Over the longer term,
    she hopes to launch her own boutique bookkeeping consultancy that specializes in serving arts and cultural institutions, providing affordable financial stewardship while mentoring emerging women accountants.
    She also seeks opportunities to present at regional accounting seminars, sharing best practices for efficient bookkeeping and internal controls.
