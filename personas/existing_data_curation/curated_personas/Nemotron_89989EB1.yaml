  hobbies: '[''Attending gallery openings'', ''Bridge club'', ''Senior soccer'', ''Traveling to historic sites'', ''Digital photography'', ''Woodworking'', ''Reading speculative fiction'', ''Experimental
    cooking'', ''Community science talks'', ''Improv workshops'']'
  career_goals: Although officially retired, Joron aims to remain intellectually vibrant by mentoring emerging engineers, volunteering as a docent at the Baltimore Museum of Art, and contributing articles
    that explore the intersection of science and visual arts. He hopes to help launch a community makerspace for senior hobbyists, where he can share his woodworking and electronics know‑how, and eventually
    publish a memoir that reflects on the technological and cultural shifts he has witnessed.
