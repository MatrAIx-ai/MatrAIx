  career_goals: Patricia aims to advance to a regional sales manager role within the next three years, overseeing a larger portfolio and mentoring junior reps. She intends to complete her bachelor's degree
    in Business Administration to strengthen her strategic acumen. Long‑term, she envisions leading a division or launching her own boutique distribution firm that emphasizes sustainable sourcing. She also
    aspires to be recognized as a top performer who cultivates a supportive, high‑morale sales culture, balancing achievement with wellbeing.
