  hobbies: '[''Abstract painting'', ''Reading speculative fiction'', ''Stargazing'', ''Birdwatching'', ''Garden cultivation'', ''Classical piano'', ''Puzzle solving'', ''Knitting'']'
  career_goals: Although retired from full‑time employment, Christine aims to channel her lifelong curiosity into legacy projects. She plans to author a memoir and a series of articles that highlight the
    contributions of women in STEM, and to develop a free online curriculum that introduces high school students to hands‑on physics experiments. She also aspires to volunteer as a mentor at the local science
    museum, curating interactive exhibits that fuse art and science, and to collaborate with community organizations on grant proposals that support STEM outreach in Allegheny County.
