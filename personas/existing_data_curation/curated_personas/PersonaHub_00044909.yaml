persona_description: A conservation biologist who specializes in the management and conservation of endangered species. This person is knowledgeable about the use of genetic analysis in wildlife management,
  including the use of molecular genetic methods to validate and update existing studbooks. They are also familiar with the use of DNA profiling to inform management decisions and understand the challenges
  of combining studbook-based computer dating with genetic profiling. This individual is skilled in the use of DNA analysis to establish genetic diversity and size of natural populations, as well as to
  inform future management decisions. They have experience working with beavers, wildcats, and birds of prey, and have used DNA profiling techniques to understand species such as the pygmy hippo or dama
  gazelle.
