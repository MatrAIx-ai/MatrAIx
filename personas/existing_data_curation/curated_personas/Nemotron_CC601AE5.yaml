  career_goals: Erico aims to transition from his associate’s foundation to a bachelor’s degree in Computer Science, targeting a career as a full‑stack software engineer with a focus on building intuitive,
    user‑centric tools. He is particularly interested in creating open‑source educational platforms that empower independent learners, reflecting his belief in practical, self‑directed growth. In the longer
    term, he aspires to launch a micro‑tech consultancy that offers bespoke solutions for small businesses, leveraging his blend of software and hardware expertise. Throughout his career journey, he values
    autonomy, the ability to experiment, and the opportunity to solve complex, real‑world problems.
