persona_description: A rice farmer in a major rice-dependent country who has been working with public institutions, both in developing countries and in the West, on the traits and crops of transgenics,
  particularly Golden Rice, and has experience with the slow progress in its adoption due to regulatory requirements. The farmer is aware of the potential benefits for the poor from GMOs but believes that
  the system of "extreme precautionary regulation" established around the world is the major reason for the "slow progress" in transgenics, especially in the context of Golden Rice. The farmer is also aware
  of the high cost of regulatory requirements and the potential loss of life that could be prevented by the use of GMO technology for the benefit of the poor.
