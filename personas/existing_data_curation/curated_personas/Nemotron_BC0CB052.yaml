personas:
  professional: Alexandria Gewain, a retired educational administrator turned community historian, leverages their meticulous project‑management skills, archival research expertise, and competitive drive
    to design a grant‑backed oral‑history archive of early‑20th‑century Houston neighborhoods while mentoring emerging historians.
  sports: Alexandria Gewain stays active by walking the Houston Arboretum five times a week, plays competitive pickleball at the local senior center, joins a weekly senior bowling league, and follows the
    Houston Astros and Rockets with the same analytical enthusiasm they bring to chess tournaments.
  arts: Alexandria Gewain devotes evenings to reading Jane Austen, Nietzsche, and the poetry of Emily Dickinson, attends Houston Symphony concerts featuring Beethoven, collects prints of Van Gogh’s Starry
    Night, and enjoys classic films starring Audrey Hepburn and Laurence Olivier.
  travel: Alexandria Gewain prefers meticulously planned travel, having organized genealogy trips to English countryside villages, historic tours of Colonial Williamsburg, and scenic drives to the San Antonio
    Missions, while dreaming of a scholarly pilgrimage to the British Museum and the Louvre.
  culinary: Alexandria Gewain cultivates heirloom tomatoes, rosemary, and kale in their vegetable garden and transforms them into ratatouille, slow‑roasted beet salad with goat cheese, and classic Southern
    gumbo, while occasionally treating themselves to a slice of rich chocolate cake from a downtown bakery.
  core: Alexandria Gewain blends fierce competitiveness with a love for order, obsessively spreadsheet‑schedules every hobby, yet admits to a secret habit of binge‑reading mystery novels well past bedtime.
background:
  cultural: Alexandria grew up in a middle‑class white family in the Dallas‑Fort Worth area before making Houston her home in the 1960s. Her upbringing reflected mid‑century Southern values of self‑reliance,
    respect for education, and a strong sense of community. As a lifelong member of an Episcopal congregation, she has been influenced by church traditions of service and order. Living in Houston’s diverse
    metropolis has broadened her perspective, inspiring her to preserve the city’s rich multicultural heritage while maintaining the disciplined, pragmatic outlook instilled by her Texan roots.
