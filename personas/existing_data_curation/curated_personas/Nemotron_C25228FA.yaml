personas:
  professional: A seasoned aerospace engineer, Kevin Samad leverages expertise in propulsion design, CFD, and FEA, while his methodical planning and outgoing nature enable him to lead cross‑functional teams
    and translate complex technical concepts into relatable stories for both engineers and lay audiences.
  sports: Kevin Samad, a 43‑year‑old amateur point guard for the Pine Ridge Community Basketball League, hits the trails of Blue Ridge State Park every Saturday for 10‑mile hikes, while cheering on the
    Atlanta Hawks and the Carolina Panthers as his flagship professional sports teams, and he follows a disciplined stretching routine to counteract the stress‑related tension that sometimes builds up after
    work.
  arts: Kevin Samad immerses weekends in listening to Miles Davis, John Coltrane, Jill Scott, and Kendrick Lamar, and regularly attends live improv shows at the local theater, where he also tries his hand
    at improvisational comedy, balancing his analytical mind with creative spontaneity.
  travel: Kevin Samad prefers meticulously planned trips that blend outdoor adventure with astrophotography, having camped under the pristine night skies of Iceland’s Þingvellir National Park, trekked the
    Great Smoky Mountains, and booked a weekend workshop at the Kennedy Space Center to explore rocket heritage, while budget constraints keep his overseas voyages occasional and often tied to friends’
    gatherings.
  culinary: Kevin Samad, an avid home chef, skillfully blends Southern comfort foods like smoked collard greens and shrimp‑and‑grits with West African flavors such as jollof rice and peri‑peri chicken,
    often improvising with smoked paprika, okra, and sweet potato mash during potluck nights, though his habit of multitasking between cooking and checking his phone sometimes leaves the oven door ajar.
  core: Kevin Samad, a 43‑year‑old aerospace engineer with a boundless curiosity for rockets and night‑sky photography, balances his methodical work ethic with an infectious sociability, yet his penchant
    for over‑planning and occasional stress‑induced caffeine binges keep him perpetually juggling ambition and anxiety.
background:
  cultural: Kevin identifies as African‑American and grew up in the Piedmont region of North Carolina, where he absorbed a blend of Southern hospitality and the strong communal ties of the Black church.
    Family gatherings often featured soul food, gospel music, and storytelling that emphasized resilience and collective progress. He credits pioneers like Guion Bluford and Mae Jemison for inspiring his
    career path and remains active in local cultural festivals that celebrate African‑American heritage. This background informs his commitment to mentoring the next generation of Black engineers and his
    appreciation for community‑centered initiatives.
attributes:
  skills: '["Propulsion system design", "Computational fluid dynamics (CFD) analysis", "Finite element analysis (FEA)", "CAD modeling (SolidWorks, CATIA)", "Systems engineering", "Risk assessment and mitigation",
    "Project management", "Technical documentation and compliance", "Leadership and cross‑functional team coordination", "Additive manufacturing processes"]'
  hobbies: '["Playing basketball in local leagues", "Hiking in nearby state parks", "Amateur astronomy and night‑sky photography", "Building and launching model rockets", "3D printing hobby projects", "Cooking
    Southern and African‑inspired dishes", "Listening to jazz, R&B, and hip‑hop music", "Volunteering for STEM outreach programs for middle‑school students", "Participating in community theater improv workshops"]'
  career_goals: Kevin aims to advance to a principal engineering role where he can spearhead innovative low‑emission propulsion projects for satellite and small‑launch vehicles. He aspires to secure a patent
    for a hybrid propulsion system that reduces fuel consumption and environmental impact. In parallel, he wants to mentor and sponsor underrepresented engineers, particularly Black youth interested in
    STEM, by establishing a regional scholarship and mentorship program. He also envisions transitioning into a senior technical leadership position that balances strategic decision‑making with hands‑on
    engineering, all while maintaining a healthy work‑life balance to manage his tendency toward stress and worry.
