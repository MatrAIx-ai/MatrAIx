  career_goals: Martin dreams of growing up to help people and share his love of music. He often says he wants to be a firefighter because he likes the clear schedule, teamwork, and the idea of keeping
    his community safe. He also imagines himself playing drums in a band, especially to the rhythmic beats of merengue and bachata that he hears at home. In school, he looks forward to learning to read
    more fluently and eventually becoming a teacher who can guide other kids, combining his caring nature with a desire for structure and routine.
