personas:
  professional: Martin Garcia, an aspiring junior engineer, spends his playtime arranging building blocks in precise patterns before delightfully reconfiguring them into spontaneous creations.
  sports: Martin Garcia, a lively member of the Bright Stars preschool soccer club, regularly ropes in a mini‑sprint during recess while cheering on FC Barcelona and the New York Yankees on game day, reflecting
    his love for both organized sport and spontaneous activity.
  arts: Martin Garcia, a budding storyteller who sings along to Disney’s "Let It Go" and imitates characters from Sesame Street, spends afternoons drawing colorful pictures inspired by Dr. Seuss, channeling
    his structured creative bursts with free‑form doodles.
  travel: Martin Garcia, a curious explorer who prefers short, well‑planned trips to the nearby aquarium but also dreams of a spontaneous family vacation to Disney World, balances his need for predictable
    routines with occasional adventurous outings.
  culinary: Martin Garcia, a picky yet adventurous eater who relishes mac and cheese and strawberry yogurt, proudly adds banana slices to his cereal under his own "chef" hat, yet sometimes refuses broccoli,
    showcasing his practical taste palate with occasional flexibility.
  core: Martin Garcia, a four‑year‑old who masterfully blends a love for orderly play with spontaneous bursts of imagination, often swaps disciplined block towers for impromptu dinosaur roars.
background:
  cultural: 'Martin grows up in a bilingual Dominican household, where Spanish is spoken alongside English and family meals often feature dishes like rice and beans, plantains, and yucca. He celebrates
    Dominican holidays such as Independence Day and Carnaval with music, dancing, and traditional foods, which instill a strong sense of cultural pride. At the same time, living in Colchester, VT, gives
    Martin exposure to New England customs: he experiences four distinct seasons, enjoys outdoor activities like hiking, leaf‑picking, and occasional snowfall, and participates in community events such
    as the town’s fall fair and library storytimes. This blend of Caribbean warmth and Vermont practicality shapes his worldview, encouraging both communal celebration and an appreciation for nature’s rhythm.'
