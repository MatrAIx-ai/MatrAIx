  career_goals: Matthew aims to complete a bachelor’s degree in Agricultural Business or Business Management within the next three years, leveraging his practical experience to bridge theory and real‑world
    applications. He plans to secure an internship or entry‑level position in supply‑chain management for a regional agribusiness, gaining insight into logistics and market dynamics. Long‑term, he hopes
    to either take over and modernize his family’s farm, introducing sustainable practices and technology, or launch a small cooperative that supports local producers. Alongside his professional aspirations,
    he is motivated to serve his community by joining a local development board or agricultural extension program, where he can advocate for rural education and economic development.
