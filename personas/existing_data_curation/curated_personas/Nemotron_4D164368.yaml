    codes'', ''OSHA safety compliance'', ''Preventive maintenance'', ''Use of hand and power tools'', ''Bilingual communication (English/Spanish)'', ''Team leadership'', ''Apprentice training'', ''Customer
    service'', ''Project scheduling'', ''Problem solving'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Salvadoran cuisine'', ''Potluck gatherings'', ''Jogging on Rockaway Beach boardwalk'', ''Yoga'', ''Neighborhood cleanup volunteering'', ''Following
    soccer (especially Central American leagues)'', ''Reading contemporary fiction (English/Spanish)'']'
  career_goals: Marilyn aims to attain Master Plumber certification and a journeyman steamfitter license within the next two years. She aspires to move into a foreman or supervisory role on larger commercial
    projects, leveraging her organizational strengths and collaborative style. Long‑term, she hopes to launch her own plumbing and pipefitting business focused on serving the Hispanic community in Queens,
    providing mentorship opportunities for women and recent immigrants entering the trades. She also envisions participating in union leadership to advocate for safety standards and equitable workplace
    practices.
