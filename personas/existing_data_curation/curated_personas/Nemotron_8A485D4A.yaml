  career_goals: Angela aims to turn her artistic talents into a sustainable freelance career, focusing on concept art for indie video games and graphic novels. She envisions building a strong online presence
    through social media and a personalized website to showcase her portfolio and sell limited‑edition prints. In the longer term, she hopes to launch a small community studio in Belgrade where she can
    mentor other young creators, host pop‑up exhibitions, and collaborate on multidisciplinary projects that blend abstract art with local cultural motifs. While she prefers flexibility over a conventional
    9‑to‑5 job, she is open to occasional contract work with boutique design agencies to broaden her experience.
