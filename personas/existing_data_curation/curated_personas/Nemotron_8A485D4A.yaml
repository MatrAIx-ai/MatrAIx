personas:
  professional: Angela Willett is a self‑taught digital illustrator and abstract painter who leverages their rapid concept‑generation talents and competitive chess mindset to craft evocative concept art
    for indie games while navigating a fluid freelance schedule.
  sports: Angela Willett enjoys low‑intensity fitness, often hiking the Minnesota state trails and cycling on weekend rides with a small group of friends, while cheering for the Minnesota Timberwolves and
    Minnesota Twins, and occasionally practicing at a local climbing gym to build strength.
  arts: Angela Willett is deeply immersed in the arts, painting abstract canvases inspired by Kandinsky, curating playlists featuring Brian Eno and Tim Hecker for creative sessions, photographing silos
    at golden hour, and writing flash poetry that echoes the quiet rhythm of the Midwest.
  travel: Angela Willett prefers solo, loosely planned trips that blend artistic inspiration with nature, having trekked the Finnish Lapland aurora, explored Reykjavik’s design districts, and dreaming of
    a future residency in Belgrade’s bohemian quarter, while keeping travel budgets modest due to freelance income variability.
  culinary: Angela Willett cooks at a beginner level, favoring simple yet experimental dishes like matcha‑infused avocado toast, smoked paprika roasted chickpeas, and occasional ramen bowls, while sipping
    pour‑over coffee and collecting exotic spice blends to flavor their late‑night sketch sessions.
  core: Angela Willett is a dreamy, strategically minded creator who flits between abstract art, speculative writing and spontaneous travel, often juggling brilliance with a charming disorganization.
background:
  cultural: Angela grew up in Belgrade, a small town in Kandiyohi County, Minnesota, within a largely white community with deep Scandinavian and Germanic roots common to the region. Her family emphasized
    self‑reliance, appreciation of the outdoors, and modest communal values. While local traditions like county fairs, church gatherings, and folk crafts were part of her upbringing, Angela gravitated toward
    more contemporary, abstract forms of expression, often blending subtle folk motifs with modern aesthetics. The sprawling fields and tranquil countryside of the Midwest have fostered her love of solitude,
    introspection, and imagination, shaping a cultural identity that balances rural heritage with a forward‑looking artistic vision.
