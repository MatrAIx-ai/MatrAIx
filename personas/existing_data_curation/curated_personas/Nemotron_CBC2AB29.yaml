personas:
  professional: Allan Bouza, a budding digital cartoonist and Scratch game creator, channels their curiosity and love for unconventional ideas into whimsical sketches and simple coding projects, often turning
    school assignments into playful art despite a relaxed attitude toward deadlines that sometimes leaves homework unfinished.
  sports: Allan Bouza, a lively member of the Maple Grove United U-12 soccer team, darts across the field with boundless energy, cheers for Minnesota United FC during weekend matches, and enjoys biking
    the Chain of Lakes trail, though they often forget to stretch beforehand, resulting in occasional cramping.
  arts: Allan Bouza, an enthusiastic cartoon sketcher, dives into digital art apps like Procreate Pocket, draws inspiration from Bill Watterson’s Calvin and Hobbes and Studio Ghibli’s animated worlds, and
    spends Saturday mornings at community art workshops where they experiment with mixed media despite a chaotic studio corner overflowing with pens and paper.
  travel: Allan Bouza delights in weekend family hikes through the Boundary Waters and spontaneous road trips to the Mall of America, dreams of exploring the neon-lit streets of Tokyo and the historic forts
    at the Minnesota History Center, yet their travel plans often shift on a whim when school projects or a soccer tournament arise.
  culinary: Allan Bouza, a self-declared snack aficionado, favors cheesy pizza slices, peanut butter-banana sandwiches, and a bowl of ramen spiked with chili oil, while dabbling in novice cooking by attempting
    a soy-glazed tofu and broccoli stir-fry after watching a YouTube tutorial, though the kitchen frequently ends up a colorful mess of spilled sauce and scattered herbs.
  core: Allan Bouza is a curiosity-driven twelve-year-old who mixes cartoon sketching, Scratch game building, and soccer play into a lively, slightly disorganized routine, all while juggling a worry-prone
    mind, a love for spontaneous adventures, and a penchant for snack-centric creativity.
background:
  cultural: Allan was raised in a suburban neighborhood of Saint Paul, Minnesota, within a family of European (German‑Scandinavian) descent. The Midwestern environment emphasizes community involvement,
    outdoor recreation, and a strong public‑school system. He frequently participates in local traditions such as the St. Paul Winter Carnival and community art fairs, and his upbringing reflects typical
    American customs while also exposing him to the region’s multicultural heritage through museum visits and school programs.
