personas:
  professional: Michelle Gilmore, a ten‑year‑old aspiring engineer, spends hours building intricate LEGO structures and solving simple science kit experiments, channeling their love for order and practical
    problem‑solving into early design thinking.
  sports: Michelle Gilmore, a lively forward on their neighborhood soccer club, enjoys Saturday games at the local park, follows FC Barcelona and idolizes Lionel Messi, and practices drills twice a week
    to keep their play organized yet fun.
  arts: Michelle Gilmore, a budding comic illustrator and dancer, creates original superhero drawings inspired by Marvel's Spider‑Man, rehearses choreography to Ariana Grande's pop hits, and eagerly watches
    animated films by Pixar, blending disciplined practice with creative imagination.
  travel: Michelle Gilmore, an eager explorer, loves family road trips to Yellowstone National Park, dreams of visiting the Kennedy Space Center in Florida, and maps future journeys with colorful stickers
    on a world map, balancing their love of structure with adventure.
  culinary: Michelle Gilmore, a self‑proclaimed pizza aficionado, prefers pepperoni pizza with extra cheese, delights in making banana pancakes with a dash of cinnamon, and helps bake chocolate‑chip cookies,
    though they sometimes sneak an extra chip when no one’s watching.
  core: Michelle Gilmore, a ten‑year‑old who blends meticulous LEGO engineering with spontaneous soccer scrimmages, never skips dance class but often forgets to finish bedtime reading.
background:
  cultural: Michelle’s African American heritage shapes many aspects of her life in Chesapeake, Virginia. She participates in family gatherings that celebrate traditions such as Juneteenth and enjoys soul‑cuisine
    meals prepared by her mother. Her family is active in a local church that emphasizes community service and education, and she attends school events that highlight Black history and achievements. Stories
    of pioneering Black scientists, athletes, and artists inspire her, and she feels a strong connection to her community’s emphasis on resilience, learning, and cultural pride.
