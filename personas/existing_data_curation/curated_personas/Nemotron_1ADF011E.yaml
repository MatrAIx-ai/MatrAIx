  career_goals: Michelle dreams of becoming a teacher because she loves helping classmates understand new ideas, and she also hopes to work with animals as a veterinarian, reflecting her caring nature.
    She is fascinated by space and occasionally imagines being an astronaut. In the near term, she aims to improve her science grades, join the school’s science club, and continue developing her coding
    skills, seeing these steps as preparation for her future ambitions.
