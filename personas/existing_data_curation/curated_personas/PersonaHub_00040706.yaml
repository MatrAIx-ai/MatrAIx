persona_description: Principal Jesely Alvarez, the principal of John Stanford International School in Seattle, WA, who is dedicated to teaching and empowering students to take action in their communities
  and around the world. She is a leader in the field of global competence education, and her school's emphasis on integrating global perspectives into the curriculum and promoting cultural understanding
  and social responsibility is evident in the sample global competence unit plans provided by Seattle Public Schools. Principal Alvarez is known for her commitment to preparing students to engage with the
  world and for her collaborative approach to school reform, which is reflected in the International School Symposium held in 2012.
