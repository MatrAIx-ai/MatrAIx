persona_description: A business owner or manager of an educational or manufacturing organization who is interested in establishing a reliable, large-scale 3D printing capability. They are open to the idea
  of outsourcing their 3D printing needs and are willing to pay a premium for a comprehensive software and services package that can help them manage and maintain a fleet of 3D printers effectively. They
  are willing to invest in the initial setup and maintenance costs and are open to the possibility of reducing labor costs and increasing efficiency by leveraging the capabilities of the MakerBot Innovation
  Center software. They are interested in the potential for parallel printing and the possibility of unleashing their imaginations in ways not previously available.
