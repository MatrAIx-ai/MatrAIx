  career_goals: Nigel aims to progress to a senior engineering role and eventually become a technical lead or software architect, where he can design systems that prioritize stability, security, and maintainability.
    He wants to lead projects that have clear, predictable roadmaps, reduce technical debt, and deliver measurable value. A long‑term ambition is to champion inclusive engineering practices by mentoring
    under‑represented developers and contributing to open‑source tools that improve accessibility. He also plans to achieve a balanced workload that allows him to manage stress effectively while continuing
    to grow his expertise in cloud‑native architecture.
