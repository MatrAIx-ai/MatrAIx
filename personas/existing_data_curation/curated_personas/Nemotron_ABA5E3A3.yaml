personas:
  professional: Jerry Fowler combines meticulous custodial expertise with a budding artistic eye, excelling at deep‑cleaning routines for boutique hotels while envisioning each guest room as a canvas for
    harmonious, eco‑friendly design, and they plan to oversee a team soon.
  sports: Jerry Fowler prefers low‑impact outdoor activity, joining the local Greer Hiking Club for weekend trail walks through the foothills, cheering on the Colorado Rockies during baseball season, and
    they keep a modest weekly routine of yoga to balance their sedentary cleaning shifts.
  arts: Jerry Fowler spends evenings translating speculative fiction narratives into surreal watercolors, drawing inspiration from Salvador Dalí, Yayoi Kusama, and the atmospheric scores of Hans Zimmer,
    and they regularly attend downtown gallery openings featuring emerging digital illustrators.
  travel: Jerry Fowler favors eco‑conscious getaways, having documented sunrise hikes in the Rocky Mountain foothills, backpacked the Redwoods in California, and they keep a bucket list that includes the
    lantern‑lit streets of Kyoto and the vibrant markets of Marrakech for future sketching expeditions.
  culinary: Jerry Fowler experiments with plant‑based dishes, often preparing a turmeric‑infused lentil shepherd’s pie and a pineapple‑mint quinoa salad, mastering the use of avocado, chickpeas, and spirulina,
    and they love testing eco‑friendly cleaning‑compatible cooking methods like stovetop steaming without disposable liners.
  core: Jerry Fowler is an organized, imagination‑driven young custodian who balances precise cleaning schedules with nightly watercolor escapades, over‑collects sketchbooks, and occasionally over‑worries
    about perfection, all while they strive for harmony in every detail.
background:
  cultural: Jerry grew up in Greer, South Carolina, a small town steeped in Southern hospitality and community-oriented values. His family background reflects the region's emphasis on hard work, modesty,
    and respect for tradition, with influences from local church gatherings and high school sports culture. The Southern culinary heritage, appreciation for the natural landscape of the Piedmont and foothills,
    and a tight‑knit social fabric have shaped his interpersonal sensibilities and his preference for close, harmonious relationships. While his upbringing rooted him in these regional norms, his exposure
    to a diverse college environment and his personal artistic interests have broadened his outlook, allowing him to blend traditional values with a forward‑looking, imaginative perspective.
attributes:
  skills: '["Deep‑cleaning techniques", "Eco‑friendly cleaning practices", "Inventory management", "Time‑blocking and scheduling", "Attention to detail", "Basic graphic design and illustration", "Conceptual
    brainstorming", "Empathetic customer service", "Team collaboration in small groups"]'
  hobbies: '["Sketching and watercolor painting", "Reading speculative fiction and philosophy", "Nature photography", "Journaling for self‑reflection", "Exploring eco‑friendly cleaning innovations", "Attending
    local art galleries and community workshops", "Hiking in nearby foothills", "Cooking experimental dishes", "Playing board games with a small group of friends", "Volunteer work at the community senior
    center"]'
  career_goals: Jerry aims to leverage his hands‑on cleaning experience into a supervisory role within the hospitality industry, such as a housekeeping supervisor at a boutique hotel or a facilities manager
    for a college residence hall. He plans to complete his associate degree in Hospitality Management while pursuing certifications in sustainable cleaning and facility operations. Long‑term, he envisions
    launching his own eco‑conscious cleaning service that integrates aesthetic design elements, offering clients both spotless spaces and visually harmonious environments. Parallel to this, Jerry hopes
    to develop his artistic side into a freelance illustration portfolio, allowing him to blend his creative passions with his professional expertise.
