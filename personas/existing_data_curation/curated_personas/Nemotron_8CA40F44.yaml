personas:
  professional: Marina Carrazana, an aspiring teen technologist and theatre performer, blends their disciplined, goal‑oriented mindset with a love for hands‑on Arduino projects and stage presence, and they
    constantly seek ways to merge coding with creative storytelling.
  sports: Marina Carrazana, a competitive midfielder for the co‑ed River City Rovers soccer club, balances weekly practice with daily yoga stretches, follows the Los Angeles FC in the MLS for tactical inspiration,
    and they meticulously log their game stats in their bullet‑journal to spot improvement areas.
  arts: Marina Carrazana, an expressive spoken‑word poet and TikTok dancer, draws creative energy from artists like Rosalía, BTS, and Taylor Swift, captures community festivals with a vintage Nikon in candid
    photos, and they often rehearse verses in front of a mirror before performing at school theatre productions.
  travel: Marina Carrazana, eager for both adventure and family bonding, plans weekend trips to nearby Orlando theme parks and dreams of a summer stint in Barcelona’s street festivals, but they must navigate
    parental budget limits and school schedules, often using a meticulously drafted itinerary in their bullet‑journal.
  culinary: Marina Carrazana, a budding home chef with a knack for quick, Instagram‑worthy dishes, frequently whips up avocado toast, tacos al pastor with homemade salsa, and seasonal fruit smoothies, and
    they love experimenting with matcha‑green tea latte art for their TikTok followers.
  core: Marina Carrazana, a 14‑year‑old whirlwind of organized curiosity, channels their competitive drive into creative tech, performance, and meticulous planning, while they juggle anxiety with a habit
    of over‑checking bullet‑journal entries.
background:
  cultural: 'Marina was raised in a Mexican immigrant family in Riverside, California. She grew up speaking both Spanish and English at home, celebrating traditions such as Día de los Muertos, quinceañera
    celebrations, and Mexican holidays with vibrant food, music, and community gatherings. Her parents emphasized the value of hard work, education, and family cohesion, while also encouraging her to embrace
    opportunities offered by American schools. This bicultural upbringing nurtures a strong sense of identity: she feels connected to her Mexican heritage through language, cuisine, and extended family
    networks, yet also navigates the broader U.S. culture through school, friendships, and local community events. Her cultural background informs her desire to give back, particularly by using her future
    career to improve health outcomes for Latino populations.'
