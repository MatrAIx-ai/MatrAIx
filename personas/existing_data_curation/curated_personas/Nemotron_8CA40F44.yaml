  career_goals: Marina aims to attend a renowned university where she can blend her love for technology with a commitment to community service. In the short term, she plans to earn awards in STEM competitions,
    secure mentorships with local tech firms, and hold leadership positions in her school’s robotics and debate clubs. Long‑term, she aspires to study biomedical engineering or computer science and eventually
    develop affordable health‑technology solutions tailored for underserved Hispanic communities. She also envisions using her bilingual communication strengths to become a health‑education advocate who
    bridges cultural gaps and promotes preventive care among Latino families.
