personas:
  professional: Gene Repice is a high‑school senior who already serves as the logistical backbone of his school's first‑aid club, using their knack for organization, clear communication, and calm conflict
    mediation to coordinate emergency drills, while simultaneously volunteering at the Maple Valley food bank and eyeing a future as a certified EMT.
  sports: Gene Repice splits time between playing forward on the Maple Valley High boys' soccer team, shooting hoops at the local community center during winter, cheering for the Seattle Seahawks and Seattle
    Storm, and coaching a weekend youth basketball clinic, embodying a year‑round passion for team sports.
  arts: Gene Repice unwinds by strumming basic chords to the tunes of Ed Sheeran and The Strokes on a battered acoustic guitar, while also streaming indie folk playlists featuring Phoebe Bridgers and enjoying
    classic movies like 'Back to the Future,' indicating a blend of contemporary and nostalgic artistic tastes.
  travel: Gene Repice favors short road trips to the San Juan Islands and weekend hikes in the Cascade foothills, but dreams of backpacking through New Zealand’s South Island and exploring the bustling
    streets of Tokyo after earning their EMT certification.
  culinary: Gene Repice, who rates themselves as a budding home‑cook, often whips up simple fish tacos with locally sourced Dungeness crab, cabbage slaw, and lime crema, while also experimenting with avocado
    toast topped with smoked salmon and a dash of sriracha, reflecting a love for fresh Pacific Northwest flavors.
  core: Gene Repice is a socially‑charged teen who blends a disciplined, structure‑loving mindset with a restless compassion for community service, occasionally over‑committing to clubs while still finding
    time to jam on a guitar.
background:
  cultural: Gene was raised in a middle‑class white family in Maple Valley, Washington, a suburban community known for its outdoor lifestyle and strong sense of local involvement. His upbringing reflects
    mainstream American suburban values—emphasis on independence, responsibility, and community service—while also being influenced by the broader cultural diversity of the Seattle metropolitan area. He
    participates in local traditions such as neighborhood block parties, seasonal hikes, and volunteer drives, embodying the Pacific Northwest's blend of practicality and communal spirit.
