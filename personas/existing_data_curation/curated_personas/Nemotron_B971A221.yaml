  career_goals: Gene aims to earn his GED and pursue vocational training to become a certified emergency medical technician (EMT), with the long‑term ambition of becoming a paramedic. He is motivated by
    a desire to help others in critical moments and to contribute to community safety. In parallel, he hopes to engage in youth mentorship programs and eventually work in community outreach or public safety
    within the Seattle‑King County area.
