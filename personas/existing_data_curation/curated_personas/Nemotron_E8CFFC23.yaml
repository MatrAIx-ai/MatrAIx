  hobbies: '[''Morning beach walks'', ''Surfing'', ''Jogging'', ''Reading business biographies'', ''Historical novels'', ''Volunteer tutoring'', ''Gardening'', ''Grilling'', ''Crossword puzzles'', ''Vinyl
    record collecting'', ''Watching Lakers games'', ''Beach volleyball'']'
  career_goals: Jonathan aims to deepen the connection between academia and the local business community by establishing a small‑business incubator program that offers internship placements for his students.
    He seeks promotion to Senior Lecturer or Department Chair, where he can influence curriculum policy and champion student‑centered teaching methods. Over the next five years, he plans to author a textbook
    on practical entrepreneurship, mentor at least ten students toward launching viable start‑ups, and eventually retire with a legacy of tangible community impact and a well‑established mentorship network.
