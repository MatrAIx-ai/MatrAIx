personas:
  professional: Jonathan Dolly is a veteran business lecturer who blends three decades of instructional design, financial analysis, and strategic planning expertise with a methodical, routine-driven approach,
    while their deep compassion and cooperative spirit foster a collaborative classroom where students feel personally mentored.
  sports: Jonathan Dolly stays active by jogging the Strand, catching calm surf sessions at Manhattan Beach, competing in a casual beach-volleyball league with friends, and cheering on the Los Angeles Lakers
    while occasionally watching the Los Angeles Dodgers during the baseball season.
  arts: Jonathan Dolly nurtures their creative side by curating a modest collection of vintage vinyl records ranging from The Beatles to Miles Davis, attending occasional live jazz nights at local cafes,
    and immersing themselves in classic literature while sipping espresso at their favorite neighborhood coffee spot.
  travel: Jonathan Dolly prefers low-key, flexible trips that blend surf-focused getaways to places like Costa Rica and Hawaii with culturally rich excursions to historic cities such as Florence and Kyoto,
    planning most itineraries on a loose spreadsheet that leaves room for spontaneous family stops at roadside diners.
  culinary: Jonathan Dolly enjoys practical, family-style grilling - mastering dishes like lemon-herb grilled salmon, charcoal-seared corn on the cob, and homemade avocado salsa - while pairing meals with
    fresh garden vegetables they grow themselves and occasional indulgence in a perfectly brewed flat-white at the local cafe.
  core: Jonathan Dolly is a routine-loving, compassion-driven business educator who balances disciplined teaching with a laid-back love of surfing, vintage vinyl, and spontaneous backyard barbecues, even
    if occasional budgeting slip-ups and forgotten eye exams hint at their relaxed side.
background:
  cultural: Born and raised in Southern California to parents of Irish and German ancestry, Jonathan grew up in a middle‑class suburban setting that emphasized hard work, community involvement, and practicality.
    The laid‑back West Coast beach culture and the diverse, progressive atmosphere of Los Angeles shaped his relaxed yet cooperative outlook. He values traditional American ideals of self‑reliance and pragmatic
    problem‑solving, while also embracing the multicultural, inclusive spirit of his community, which informs his compassionate approach to teaching, mentorship, and volunteer service.
