persona_description: A national cooperative research center focused on autism across the lifespan, with a primary focus on clinical assessment and diagnosis. The center has developed a comprehensive guideline
  for the assessment and diagnosis of autism, which has been approved by the National Health and Medical Research Council. The guideline emphasizes the importance of a comprehensive needs assessment, including
  an assessment of functioning and medical evaluation, and recommends that the assessment take place at the earliest possible stage. The center has welcomed the new guideline and is committed to ensuring
  that it is adopted and implemented by clinicians and services across Australia.
