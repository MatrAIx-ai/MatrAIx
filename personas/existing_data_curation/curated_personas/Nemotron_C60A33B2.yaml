personas:
  professional: Rafael Merlos, a seasoned municipal project coordinator in San Juan, leverages decades of strategic planning, budget oversight, and bilingual communication to design and implement community
    cultural initiatives, while their meticulous organization and curiosity drive them to curate exhibitions and mentor volunteers with a disciplined, achievement‑focused approach.
  sports: Rafael Merlos, a devoted fan of the Cangrejeros de Santurce baseball team and the San Juan senior walking club, enjoys morning walks along the waterfront, joins weekly tennis matches at the Golden
    Age Sports Club, and follows the national basketball league with a disciplined routine of checking scores after work, balancing leisurely spectating with personal fitness.
  arts: Rafael Merlos immerses themselves in the island’s artistic pulse by attending live performances of the Plena y Bomba Ensemble, collecting vintage photographs by Luis M. Fernández, painting watercolor
    scenes of Old San Juan’s colorful streets, and regularly visiting the Museo de Arte de San Juan to study works by local painters, all while delighting in the salsa rhythms of Celia Cruz and the contemporary
    sounds of the band La Plena Raza.
  travel: Rafael Merlos plans travel with meticulous itineraries, favoring off‑season trips to Culebra’s secluded beaches, cultural tours of the Dominican Republic’s historic Zona Colonial, a nostalgic
    cruise to Old Havana, and upcoming exploratory visits to Curaçao’s folk‑art villages, blending curiosity‑driven discovery with budget‑conscious choices and occasional family‑oriented vacations.
  culinary: Rafael Merlos, an adept home cook, prepares traditional dishes such as arroz con gandules seasoned with sofrito, achiote‑infused pasteles, and mofongo with garlic shrimp, favoring ingredients
    like recao, plantains, and fresh cilantro, while their garden of tropical herbs supplies the aromatic base for many meals, though they sometimes over‑salt the arroz when multitasking between painting
    and cooking.
  core: Rafael Merlos blends disciplined organization with boundless curiosity, shaping a life of cultural preservation, meticulous budgeting, active health monitoring, and occasional forgetfulness about
    vitamins, all underscored by a love for music, art, and community.
background:
  cultural: Rafael was born and raised in the vibrant barrios of San Juan, immersing himself in the rich tapestry of Puerto Rican culture that blends Spanish colonial heritage, African rhythms, and indigenous
    Taíno influences. He grew up during the era of Operation Bootstrap, witnessing rapid industrialization and social change, which shaped his appreciation for community resilience. Family gatherings centered
    around Catholic traditions, music, and food have instilled in him a deep respect for communal harmony. His identity is reflected in his love for plena and bomba, his fluency in Spanish, and his dedication
    to preserving local histories and arts.
attributes:
