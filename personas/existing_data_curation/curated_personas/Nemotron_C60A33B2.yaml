  hobbies: '["Watercolor Painting","Visiting Art Galleries","Live Música (Plena, Salsa)","Urban and Landscape Photography","Herb Gardening","Traditional Puerto Rican Cooking","Reading Caribbean Literature","Chess"]'
  career_goals: Rafael aims to deepen his involvement in preserving Puerto Rican cultural heritage by mentoring younger volunteers, curating community exhibitions, and documenting oral histories of San
    Juan's older residents. He aspires to publish a memoir that intertwines his personal journey with the island's post‑war transformation, and to travel to neighboring Caribbean islands to study comparative
    folk art. He also seeks to complete a certificate in museum studies to formalize his expertise.
