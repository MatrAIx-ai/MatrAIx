  hobbies: '[''Soccer (midfielder)'', ''Skateboarding'', ''Competitive video gaming (League of Legends, Fortnite)'', ''DIY electronics projects (Arduino)'', ''Coding tutoring for younger kids'', ''Listening
    to Latin music and hip‑hop'', ''Cooking family recipes'', ''Watching science‑fiction movies'']'
  career_goals: He plans to complete his high-school equivalency (GED) within the next year, then enroll in a community-college program in computer science, ultimately transferring to a four-year university
    for a degree in software engineering. Gerardo’s long-term ambition is to develop bilingual mobile applications that help Spanish-speaking families navigate local services, and eventually launch his
    own tech startup focused on inclusive digital tools. Parallel to his academic path, he aims to reach the competitive level in esports, hoping to join a professional gaming team or become a coach for
    a youth esports league. His organized, goal-oriented mindset drives him to set clear milestones and track his progress meticulously.
