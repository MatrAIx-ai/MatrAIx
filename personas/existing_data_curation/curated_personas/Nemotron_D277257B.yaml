personas:
  professional: Gerardo Somano, an aspiring software engineer who blends Arduino prototyping, Python scripting, and bilingual communication, channels their organized, competitive nature into leading community
    coding workshops and coordinating peer gaming tournaments with meticulous planning, and they always keep a project timeline visible.
  sports: Gerardo Somano plays midfield for the Riverside Youth Soccer Club, follows the city’s pro team, the Riverside Rovers, trains at the downtown skatepark with the local Skateboard Crew, and they
    apply their organized, competitive mindset to daily skill drills and weekend match analysis.
  arts: Gerardo Somano curates playlists featuring Bad Bunny, J Balvin and Travis Scott while editing soccer highlight reels in DaVinci Resolve, and they channel their love for sci‑fi storytelling into
    lively discussions about films like Blade Runner 2049 and The Matrix with friends.
  travel: Gerardo Somano prefers weekend road trips to nearby national parks such as Redwood Trail, planning each itinerary with a spreadsheet, while dreaming of a solo tech‑tour of Tokyo’s Akihabara district
    and a summer surf adventure at Costa Rica’s Nicoya Peninsula, and they always pack a portable charger for the journey.
  culinary: Gerardo Somano, a self‑taught home cook, frequently prepares tacos al pastor with pineapple, cilantro and lime while listening to reggaeton, and they experiment with homemade salsas using roasted
    tomatillos and chipotle peppers to perfect their flavor balance.
  core: Gerardo Somano is a methodical, competitive teen who blends tech tinkering, bilingual leadership, and a love for soccer and skateboarding into a relentless pursuit of personal growth, even if it
    means occasional over‑gaming and missed stretching, and they never miss a chance to replay a winning match.
background:
  cultural: 'Gerardo grew up in a bilingual household in Mountain View, with parents who emigrated from Mexico. Spanish is spoken at home, and family gatherings often feature traditional foods such as tamales,
    pozole, and homemade salsa, as well as celebrations of Día de los Muertos and Mexican Independence Day. The close‑knit familismo tradition nurtured his sense of responsibility toward relatives and community,
    while the multicultural, tech‑driven environment of Silicon Valley exposed him early to coding workshops, robotics clubs, and a network of diverse peers. This blend of Latino cultural heritage and Bay‑Area
    innovation shapes his identity: he values community service, embraces both Spanish and American cultural norms, and seeks to bridge the two worlds through technology that serves under‑represented Spanish‑speaking
    users.'
attributes:
  skills: '[''Basic Python programming'', ''Arduino microcontroller prototyping'', ''Computer hardware troubleshooting'', ''Video editing (DaVinci Resolve)'', ''Public speaking'', ''Team leadership'', ''Bilingual
