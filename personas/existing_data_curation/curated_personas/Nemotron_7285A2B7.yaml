    Six Sigma basics)'']'
  hobbies: '[''Cooking Vietnamese cuisine'', ''Hiking in local parks'', ''Yoga and meditation'', ''Community theater improv'', ''STEM mentorship for middle‑school girls'']'
  career_goals: Ramilaben aims to be promoted to store manager within the next two years, then progress to district manager and eventually a regional operations director, where she can shape larger strategic
    initiatives. To support this trajectory she plans to earn a Project Management Professional (PMP) certification and a Green Belt in Lean Six Sigma, and she wishes to champion employee wellness programs
    that reduce stress and improve team resilience.
