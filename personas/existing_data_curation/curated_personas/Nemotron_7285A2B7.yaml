personas:
  professional: Ramilaben Pham, a data‑driven retail supervisor with a STEM bachelor's, blends analytical inventory management, visual merchandising, and staff coaching—leveraging their sociable, talkative
    demeanor—to keep the sales floor running smoothly while actively pursuing PMP and Lean Six Sigma certifications for a future as store and district manager.
  sports: Ramilaben Pham, an avid hiker, tackles the rugged trails of Patapsco Valley State Park on weekends, plays recreational volleyball with coworkers at a local community center, follows the Baltimore
    Orioles and Washington Wizards faithfully, and signs up for seasonal 5K runs to stay fit.
  arts: Ramilaben Pham, a spirited improv performer in community theater, delights in spontaneous comedy with a troupe that meets every Thursday, enjoys the witty banter of performers like Amy Poehler and
    the musical storytelling of Lin‑Manuel Miranda, and frequently attends local art exhibits to feed their creative curiosity.
  travel: Ramilaben Pham, an enthusiastic planner, favors weekend road trips to nearby national parks like Shenandoah and the Blue Ridge, balances adventure with budget constraints by using reward points
    for flights, dreams of exploring Kyoto’s historic streets, and prioritizes family visits during holidays despite a packed schedule.
  culinary: Ramilaben Pham, a home‑cooked enthusiast, perfects family‑heritage dishes such as fragrant rice noodle soup, herb‑marinated grilled pork, and crispy spring rolls using fresh lemongrass, cilantro,
    and galangal, experiments with a cast‑iron wok on weekday evenings, and treats themselves to mango sticky rice as a weekend indulgence.
  core: Ramilaben Pham, a 33‑year‑old blend of organized strategist and sociable chatterbox, thrives on structure yet worries over details, channels stress into yoga and community theater, and constantly
    balances ambition with a love for family‑centered cooking.
background:
  cultural: Ramilaben is a second‑generation Vietnamese‑American raised in the diverse suburbs of Howard County, Maryland. She grew up bilingual, speaking both Vietnamese and English, and celebrates cultural
    traditions such as Tết, moon festivals, and family reunions. Her upbringing emphasized the importance of education, respect for elders, and community support, while her American environment fostered
    independence and assertiveness. This blend of collectivist family values and individualistic ambition informs her collaborative leadership style and her dedication to both personal growth and community
    contribution.
attributes:
  skills: '[''Retail team leadership'', ''Staff training and coaching'', ''Customer service excellence'', ''Visual merchandising'', ''Inventory management and forecasting'', ''Data analysis (Excel, basic
