  career_goals: Ada’s primary ambition is to open a boutique salon in Deerfield that doubles as a cultural hub for the local Salvadoran community, offering a welcoming space for beauty, conversation, and
    cultural celebration. She plans to obtain a Master Colorist certification within the next two years, launch a line of hair‑care products formulated for curly hair, and host monthly workshops on hair
    health and styling for both professionals and clients. Long‑term, she hopes to expand to a second location, publish a bilingual guidebook on hair care rooted in Salvadoran beauty traditions, and achieve
    a balanced schedule that reduces stress while maintaining her role as a community leader.
