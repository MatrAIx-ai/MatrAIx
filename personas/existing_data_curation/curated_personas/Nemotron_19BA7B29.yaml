personas:
  professional: At 50, Ada Aguilar is a veteran hairstylist and salon owner who leverages over 25 years of precision cutting, advanced colour techniques, bilingual client consultations and a knack for community
    storytelling to run a culturally vibrant boutique, balancing a love of structure with a flexible, talkative leadership style that keeps the team energized while they sometimes let paperwork slip.
  sports: At 50, Ada Aguilar prefers rhythmic movement over conventional gyms, spending evenings dancing salsa and bachata at the local “Ritmo en la Calle” club, cheering on the Chicago Bulls and Chicago
    Cubs on game nights, and fitting in weekend walks with a friend group, all while they view these activities as essential social fitness rather than structured sport.
  arts: At 50, Ada Aguilar’s artistic side thrives on abstract painting inspired by salon colour palettes, regular visits to the Art Institute of Chicago, and evenings reading poetry by Pablo Neruda and
    Giannina Braschi, while they also enjoy listening to the soulful sounds of Celia Cruz and Rubén Blades, shaping both their personal aesthetic and client consultations.
  travel: At 50, Ada Aguilar’s travel style blends purposeful family visits with spontaneous cultural immersion, spending annual trips to a coastal town in Central America to reconnect with relatives, taking
    weekend getaways to Chicago’s Lake Michigan shoreline, and dreaming of exploring Patagonia’s glaciers, all while they balance limited vacation days with a modest travel budget that still allows for
    occasional splurges on authentic local cuisine.
  culinary: At 50, Ada Aguilar’s culinary passion shines when crafting pupusas stuffed with mozzarella and chicharrón, slow‑cooking sopa de pata with beef shank and plantain, and steaming corn tamales scented
    with epazote, a skill level they rate as advanced, and they relish pairing dishes with fresh cilantro, lime, and a splash of achiote‑infused oil.
  core: At 50, Ada Aguilar is a charismatic salon visionary who blends meticulous hair artistry with a love for community dance, worries about cash flow, and finds balance through yoga, herb gardening,
    and spontaneous bursts of creativity.
background:
  cultural: Ada was raised in a close‑knit Salvadoran immigrant family in the Chicago metropolitan area, speaking Spanish at home and English at school. Her upbringing was steeped in Catholic traditions,
    community celebrations such as Día de la Madre, La Semana Santa, and festive gatherings featuring música típica and folk dances. The values of hospitality, family loyalty, and mutual support shaped
    her worldview. She preserves these customs through food, music, and the vibrant aesthetic she brings to her salon, often incorporating bright colors and traditional patterns into client experiences.
    Ada’s bicultural identity fuels her commitment to serve both the Salvadoran diaspora and the broader Deerfield community, bridging cultural gaps with warmth and expertise.
attributes:
