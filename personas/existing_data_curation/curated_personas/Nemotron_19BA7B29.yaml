  hobbies: '["Cooking Salvadoran Cuisine", "Salsa & Bachata Dancing", "Reading Latin American Poetry", "Painting", "Yoga & Mindfulness Meditation", "Herb Gardening", "Volunteering at Cultural Festivals",
