  career_goals: At this stage in his career, Corey aims to transition his practice toward a boutique firm that focuses on arts, cultural heritage, and community development law, allowing him to combine
    his legal expertise with his passion for the arts. He envisions becoming a mentor and senior partner who guides younger attorneys, while also contributing to pro bono initiatives that support local
    artists and nonprofit organizations. Over the next five years, he hopes to establish a legacy of accessible legal services in Jefferson County and to occasionally teach as an adjunct professor at a
    regional law school, sharing his interdisciplinary perspective with the next generation of lawyers.
