personas:
  professional: Corey Taylor, a seasoned civil litigator with 25 years of experience and a niche in art law, leverages e‑discovery tools and a collaborative, flexible mindset to craft precise contracts
    and mediate disputes, even if their filing system resembles an artist’s studio more than a courtroom.
  sports: Corey Taylor, a devoted fan of the Louisville Bats baseball club and the Kentucky Wildcats basketball team, spends weekends fly‑fishing the Kentucky River and hiking the Daniel Boone National
    Forest, treating these solitary pursuits as both a fitness regimen and a meditative escape that they cherish.
  arts: Corey Taylor, an avid photographer inspired by Ansel Adams and a regular at the Speed Art Museum and Actors Theatre of Louisville, devotes evenings to capturing the rolling hills of Kentucky, while
    they draw creative solace from the works of playwright August Wilson and the jazz of Wynton Marsalis.
  travel: Corey Taylor, who plans trips on a whim over a well‑worn map of bourbon trail distilleries, has explored Nashville’s music scene, the historic streets of New Orleans, and dreams of strolling the
    Louvre in Paris, and they favor short, culturally rich getaways that fit within a modest travel budget.
  culinary: Corey Taylor, a competent home cook who loves experimenting with bourbon‑glazed pork chops, Kentucky Hot Brown, and shrimp and grits, often spices dishes with smoked paprika and a splash of
    Woodford Reserve, while they occasionally over‑season in pursuit of the perfect flavor.
  core: Corey Taylor merges a relaxed, slightly disorganized legal practice with a fervent love for art, bourbon‑infused cooking, and solitary river fishing, navigating life through curiosity, occasional
    overindulgence, and a collaborative spirit that they bring to every endeavor.
background:
  cultural: Corey was raised in Fairdale, a close‑knit suburb of Louisville in Jefferson County, Kentucky. Coming from a middle‑class white family with deep roots in the region, he grew up surrounded by
    the traditions of southern hospitality, a strong community church, and a love for the outdoors. The local culture emphasized modesty, practicality, and a respect for Kentucky’s rich heritage of music,
    bourbon, and agrarian lifestyle. At the same time, Louisville’s vibrant arts scene exposed him to progressive ideas and diverse cultural expressions, shaping an openness to unconventional thinking while
    still honoring his Southern upbringing.
