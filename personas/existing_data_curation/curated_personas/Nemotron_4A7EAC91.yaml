personas:
  professional: Naomi Walker is an aspiring visual communicator who leverages her proficiency in Adobe Photoshop, Illustrator, and basic web development to create socially conscious graphics for nonprofits,
    channeling her curiosity and practicality while navigating occasional disorganization with tight deadlines.
  sports: Naomi Walker is a casual fitness enthusiast who enjoys weekly runs around White Rock Lake, supports the Dallas Mavericks during NBA season, follows the Texas Rangers in baseball, and occasionally
    joins a local intramural ultimate frisbee league to balance her solitary sketching sessions with occasional team play.
  arts: Naomi Walker immerses herself in Afro‑futurist and sci‑fi art, drawing inspiration from visual artists like Bee Bee Bee Bee (Beeple) and musicians such as Janelle Monáe and Kamasi Washington, while
    curating playlists that blend hip‑hop, neo‑soul, and jazz during her digital illustration sessions.
  travel: Naomi Walker prefers low‑key, culturally rich trips, planning spontaneous weekend getaways to nearby Austin for its street‑art scene, dreaming of a future immersion in Nairobi’s tech‑creative
    hubs, and cherishing past visits to New York City’s Museum of Modern Art where she captured murals with her drone.
  culinary: Naomi Walker delights in cooking soulful dishes like collard greens seasoned with smoked paprika, honey‑glazed fried chicken, and sweet‑potato cornbread, often experimenting with heirloom herbs
    while occasionally ordering artisanal coffee to fuel her late‑night illustration marathons.
  core: Naomi Walker blends an eclectic love for Afro‑futurist art, laid‑back budgeting, and spontaneous creativity, yet habitually misplaces sketchbooks and skips sleep to meet self‑imposed deadlines.
background:
  cultural: Naomi identifies as African American and grew up in a close‑knit Black community in Dallas. Her family maintains Southern Black traditions, such as celebrating Juneteenth with barbecues, attending
    church events that blend gospel with contemporary worship, and preserving oral histories through storytelling. She has absorbed a blend of Texas hospitality and urban cultural influences, including
    the local hip‑hop scene, soul‑food cuisine, and community activism. Her grandparents migrated from the rural South during the Great Migration, instilling values of resilience, education, and solidarity.
    Naomi’s cultural identity shapes her artistic style—often incorporating Afro‑centric motifs and vibrant color palettes—and fuels her desire to use visual storytelling to uplift and represent Black experiences
    in Dallas.
