  hobbies: '[''digital illustration'', ''sketching'', ''reading speculative fiction'', ''listening to hip‑hop/neo‑soul/jazz'', ''curating playlists'', ''photography (street and drone)'', ''exploring Dallas
    street art'', ''strategic video gaming'', ''book club participation'', ''volunteering at youth mentorship program'', ''cooking family soul‑food recipes'', ''walking/hiking at White Rock Lake'']'
  career_goals: Naomi plans to enroll in a community college in Dallas to pursue a degree in visual communication or interactive media, aiming to become a graphic or UI/UX designer for nonprofit organizations
    that serve under‑represented communities. She wants to blend creativity with practical impact, developing branding and digital campaigns that raise awareness of social issues. Long‑term, she envisions
    launching a collaborative studio that offers affordable design services to local small businesses and community groups. To broaden her technical skill set, she intends to earn a web development certification
    and secure internships that provide real‑world experience while maintaining a flexible work schedule.
