persona_description: A historian or archaeologist who is interested in the history and archaeology of the medieval church and its role in the spiritual life of Cardiff. They are particularly interested
  in the history of the church as a priory and its connection to the growth of devotion to Thomas Becket and the subsequent growth of the church in the twelfth century. They are also interested in the role
  of the priory in the growth of the community and the expansion of the church beyond the immediate area.
