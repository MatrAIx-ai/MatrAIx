persona_description: A geographer who studies the interactions between humans and the environment, specifically focusing on the relationship between ecosystems and the biosphere. Her research interests
  include the changes in global nitrogen cycling during the Holocene epoch, the impact of nitrogen availability on plant growth and the climate system, and the link between nitrogen and carbon cycles in
  the past and present. She is particularly interested in the role of plants in maintaining nitrogen levels in ecosystems and the potential consequences of human manipulation of nitrogen and carbon cycles.
