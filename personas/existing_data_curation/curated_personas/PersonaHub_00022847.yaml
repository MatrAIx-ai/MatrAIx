persona_description: A researcher or policy maker who is interested in the intersection of urbanisation, rural transformations, and food systems, particularly in small towns and large villages. They are
  familiar with the concept of food systems and the role of small towns in food systems, and are looking for ways to address the challenges and opportunities presented by urbanisation and rural-urban transformations.
  They are also interested in the political economy of food systems and how policies at the local, national, regional, and global scales can shape rural-urban linkages and the food systems. They are open
  to learning from case studies and are willing to contribute to the debate by uniting a food systems approach with an explicit focus on small towns and large villages that play a key role in food systems.
