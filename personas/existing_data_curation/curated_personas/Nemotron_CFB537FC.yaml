  career_goals: Although retired, Baudilia is driven to expand her influence in the local senior community by chairing the Citrus County Volunteer Services board, launching a cultural heritage series that
    showcases Puerto Rican music and cuisine, mentoring aspiring entrepreneurs through a free workshop series, and compiling a family cookbook that preserves traditional recipes for future generations.
    She also hopes to travel back to Puerto Rico to document her family’s history and share it with younger relatives.
