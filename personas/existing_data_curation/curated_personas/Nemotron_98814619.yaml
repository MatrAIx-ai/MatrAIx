personas:
  professional: Jill Card, a licensed social worker in rural Maine, blends active listening, crisis intervention, and grant‑writing expertise with art‑based therapeutic techniques, channeling their imaginative
    curiosity and calm resilience into flexible program design while they tolerate a relaxed, occasionally disorganized workflow.
  sports: Jill Card enjoys hiking the cliffs of Acadia, birdwatching with the local Audubon Society, cheering the Boston Bruins and Boston Celtics, and belongs to the community hiking club Maine Trailblazers
    while they occasionally join a casual co‑ed soccer league on weekends.
  arts: Jill Card spends evenings painting coastal watercolors inspired by Monet, writing poetry echoing Emily Dickinson, volunteering as a set designer for the Moxie Theatre, and regularly attending gallery
    openings featuring Kehinde Wiley and performances by the Portland Symphony Orchestra, while they collect limited‑edition prints of Georgia O’Keeffe.
  travel: Jill Card favors purposeful travel that blends cultural immersion and natural wonder, planning loosely for trips that include revisiting the rugged coastline of Newfoundland, exploring Dublin’s
    historic streets, and dreaming of a spring pilgrimage to Kyoto’s cherry blossoms, all while they balance a modest budget that prioritizes off‑season airfare and local homestays.
  culinary: Jill Card delights in cooking with heirloom vegetables, often preparing a lobster roll with fresh New England lobster, lemon‑butter drizzle, and a side of quinoa salad sprinkled with foraged
    wild mushrooms, showcasing intermediate kitchen skills and a willingness to experiment with spice blends like smoked paprika and sumac, while they occasionally over‑season in pursuit of bold flavor.
  core: Jill Card is a calm, imagination‑driven social worker who weaves art, nature, and community into every facet of life, and they often leave a trail of paint‑splattered brushes across the living room
    as a quirky reminder of their creative chaos.
background:
  cultural: Jill comes from a multigenerational New England family with English and Irish roots. Raised in a small coastal town in Maine, she internalized the region’s mix of quiet self‑reliance, reverence
    for nature, and strong communal ties. Her upbringing emphasized modesty, a deep respect for local history, and an appreciation for the arts—values she further cultivated through her humanities education.
    While identifying with broader White American culture, Jill’s worldview is shaped by the progressive social ethos of her professional community and the artistic curiosity fostered by family traditions
    of storytelling, craft, and community involvement.
