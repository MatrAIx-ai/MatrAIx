  hobbies: '[''Watercolor Painting'', ''Creative Writing'', ''Reading Contemporary Fiction'', ''Philosophy Exploration'', ''Hiking'', ''Birdwatching'', ''Pottery'', ''Set Design for Local Theater'', ''Community
    Gardening'', ''Experimental Cooking'', ''Visiting Art Galleries'', ''Learning New Languages'']'
  career_goals: Jill aims to become a program director for a regional mental‑health organization, leading the creation of a creative‑arts hub that offers therapeutic workshops for underserved youth and
    adults in rural Maine. She plans to obtain her LCSW credential and a certification in art therapy, while advocating for state policies that increase funding for community‑based services. Ultimately,
    she envisions founding a nonprofit center that fuses social services with community art initiatives, fostering resilience, self‑expression, and holistic well‑being.
