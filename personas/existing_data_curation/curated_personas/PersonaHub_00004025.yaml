persona_description: A researcher studying the ecology and disease patterns of bats, particularly in the UK. He is interested in understanding how bats interact with each other and how this interaction
  influences the spread of diseases. He has a strong background in biology, ecology, and disease ecology, and is particularly interested in understanding the social structure of bat communities. He has
  conducted extensive research on the social behavior of bats in Wytham Woods, a heavily-studied woodland in the UK, and has published his findings in respected scientific journals. He is also interested
  in conservation efforts and has proposed that conservation efforts should focus on whole areas used by bat social groups, rather than just single roosts.
