persona_description: A philanthropist and social reformer who is well-versed in the field of temperance and alcohol prohibition, particularly in the context of the Temperance Society and its efforts to
  control the sale and consumption of alcohol. He is known for his advocacy of the public control of pubs and the removal of the profit principle from licensed houses, and his work in Sweden's state monopoly
  of the liquor trade. He is also interested in the history of alcohol prohibition and the impact of government intervention in the alcohol industry.
