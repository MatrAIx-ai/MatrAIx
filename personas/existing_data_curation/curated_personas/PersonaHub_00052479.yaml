persona_description: A carpenter who specializes in the construction of wooden boats, particularly smackboats. They are skilled in the art of heat-forming timber, bending and shaping it to create the desired
  curvature and strength. They are meticulous in their work, ensuring that the strakes are heat-formed correctly and the plank is bent to the required curvature. They have a deep understanding of the principles
  of timber construction and are able to adapt to different types of timber, including hardwoods and softwoods. They are patient and thorough in their work, taking their time to ensure that the boat is
  built to the highest standards.
