personas:
  professional: Vinh Kheng, a budding LEGO architect, combines sharp spatial reasoning with meticulous block placement, they eagerly experiment with new designs while insisting on practical, step‑by‑step
    construction, and channel their competitive spirit into perfecting each miniature masterpiece before bedtime.
  sports: Vinh Kheng, a junior soccer enthusiast enrolled in the Tiny Turtles Soccer Club and a devoted fan of both the Houston Astros and the Houston Dynamo, they split time between organized drills and
    spontaneous tag games, love splash‑time at the community pool during summer, and consistently aim to beat the 'Lil’ League' races, showcasing their competitive edge.
  arts: Vinh Kheng, an avid fan of Disney’s Frozen and children’s singer Raffi, they often reenact the songs while drawing bright crayon scenes, eagerly join traditional drumming workshops at the neighborhood
    cultural center, and blend modern pop melodies with heritage rhythms, reflecting their balanced love of contemporary and cultural arts.
  travel: Vinh Kheng, a curious little explorer who has already enjoyed a splashy day at Galveston beach and a family weekend at a local water park, they dream of a future adventure to Disney World and
    a seaside trip to Tokyo, preferring well‑planned car rides with frequent snack breaks and a stack of picture books to keep their active mind entertained.
  culinary: Vinh Kheng, a budding food enthusiast who delights in slurping warm beef pho, crunching on vegetable spring rolls alongside chicken nuggets, proudly helps stir the rice for sticky mango dessert,
    and insists on using a tiny fork for independent feeding, they showcase an adventurous yet self‑reliant palate.
  core: Vinh Kheng is a fiercely curious, competitively spirited 4‑year‑old who blends practical problem‑solving with a love for building, saving, and exploring culture through food, games, and stories,
    they balance lively social play with cherished quiet moments.
background:
  cultural: Vinh is raised in a Vietnamese‑American household in Houston, Texas, where both English and Vietnamese are spoken at home. He celebrates Tet (Lunar New Year) with family, enjoys foods like bánh
    chưng and pho, and participates in community events at the local Vietnamese cultural center. His parents emphasize respect for elders, the importance of education, and bilingual development, while also
    encouraging his involvement in the diverse cultural life of Houston, including festivals, parks, and multicultural activities.
attributes:
  skills: '[''Counting (1‑20)'', ''Letter recognition (A‑Z, a‑z)'', ''Fine motor skills (building with LEGO)'', ''Basic sketching and coloring'', ''Following multi‑step routines'', ''Simple Vietnamese phrase
