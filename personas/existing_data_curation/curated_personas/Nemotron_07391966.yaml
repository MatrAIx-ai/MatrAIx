  hobbies: '[''Playing with LEGO bricks'', ''Drawing and coloring'', ''Riding a balance bike'', ''Collecting rocks and leaves'', ''Watching kids’ nature shows'', ''Listening to Vietnamese lullabies'', ''Helping
    with family cooking'']'
  career_goals: Vinh often talks about becoming a builder or engineer who designs moving LEGO creations, an astronaut who explores space, a firefighter who helps people, or the best soccer player on his
    team. His competitive nature fuels a desire to be the top at building, solving puzzles, and leading his friends in any activity he loves, while his practical side imagines these roles as ways to create
    and protect.
