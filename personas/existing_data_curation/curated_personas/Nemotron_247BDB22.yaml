  career_goals: Looking ahead, Sandra aims to embed sustainable and ethical sourcing practices into her department while mentoring emerging buyers to foster a collaborative culture. She envisions a phased
    transition toward a consulting role that allows her to share her expertise on digital procurement and green supply‑chain strategies, all on a flexible schedule that respects her desire for work‑life
    balance. Additionally, she hopes to leave a legacy of stronger supplier relationships and community‑focused initiatives that benefit both her company and the local North Carolina market.
