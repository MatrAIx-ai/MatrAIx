personas:
  professional: A veteran procurement specialist, Sandra Dobbins draws on over thirty years of strategic sourcing, vendor negotiation, and inventory forecasting to turn data‑rich spreadsheets and SQL queries
    into cost‑saving opportunities. Their pragmatic curiosity pushes them to trial emerging product categories while staying grounded in proven cost controls, and their relaxed attitude toward rigid schedules
    lets them adapt quickly when suppliers shift. Though occasionally disorganized with paperwork, they excel in flexible, collaborative environments, mentoring junior buyers and championing sustainable,
    ethical sourcing initiatives that align with their vision of a greener supply chain.
  sports: An enthusiastic nature walker and community‑spirit supporter, Sandra Dobbins spends most of her active time trekking the nearby Piedmont trails, where they find both exercise and quiet reflection.
    They cheer on the Charlotte Hornets during the NBA season and attend occasional North Carolina Tar Heels basketball games with fellow church members, preferring small group outings over large stadium
    crowds. As a member of a senior walking club, they log regular 3‑mile strolls, which help mitigate arthritis discomfort and keep their blood pressure in check, though they rarely engage in high‑intensity
    sports.
  arts: A dedicated quilter and avid reader, Sandra Dobbins weaves Southern storytelling into both fabric and fiction. They immerse themselves in historical novels by Philippa Gregory and Ken Follett, savoring
    the blend of past intrigue and meticulous research that mirrors their genealogical pursuits. Their quilting guild meets monthly in the church basement, where they exchange patterns inspired by Appalachian
    folk art, while they love listening to the acoustic guitar work of Ryan Adams and classic country crooner Dolly Parton. Occasionally, they lose track of time on a jigsaw puzzle, revealing a quietly
    competitive side that enjoys the satisfaction of completing a complex picture.
  travel: A low‑key explorer with a love for heritage sites, Sandra Dobbins favors short, well‑planned road trips that combine history, nature, and culinary discovery. They have visited historic Charleston’s
    cobblestone streets and the Blue Ridge Parkway’s fall foliage, often arriving with a flexible itinerary that leaves room for spontaneous stops at farmer’s markets in Asheville. Their dream destination
    is a genealogical pilgrimage to the English countryside, where they hope to trace family roots while staying in a charming B&B. Budget‑conscious yet comfortable, they prefer driving over flying, allowing
    them to bring home fresh produce and local crafts for their quilting projects.
  culinary: A seasoned home chef of Southern comfort cuisine, Sandra Dobbins delights in turning garden harvests into classic dishes like collard greens simmered with smoked turkey, shrimp and grits adorned
    with fresh peas, and peach cobbler made with ripe fruit from the local farmer’s market. They favor using heirloom tomatoes for a summer gazpacho and often experiment with low‑sodium seasoning blends
    to align with their health goals. While they can spend hours perfecting a flaky biscuit dough, they occasionally over‑salt a stew, a quirk they laugh about while sharing the dish with family during
    weekend gatherings.
  core: At 62, Sandra Dobbins blends pragmatic curiosity, a love for quiet, hands‑on pursuits, and a community‑focused ethic into a life of sustainable sourcing, gentle stewardship of health, and modest,
    soulful pleasures.
background:
  cultural: Sandra is a white American from the Piedmont region of North Carolina, raised in a family that values Southern hospitality, modesty, and a strong work ethic. Her upbringing blended respect for
    agricultural traditions with an encouragement to pursue education, leading her to earn a STEM bachelor's degree. She maintains deep ties to local customs, such as church community service, participation
    in regional historical societies, and a love for Southern culinary staples like barbecue and sweet tea. While she honors these traditions, her curiosity pushes her to explore new ideas and practices,
    creating a balanced blend of classic Southern values and modern, forward‑looking perspectives.
