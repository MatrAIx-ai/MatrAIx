  career_goals: James aspires to a stable, hands‑on career that allows him to work within a structured routine. He aims to graduate high school, attend a vocational program, and become an automotive technician
    or electrician, professions he admires for their practical problem‑solving and clear job responsibilities. He hopes to secure a reliable position at a local garage or utility company, where his attentiveness
    and dependability will be valued. In the longer term, James would like to earn certifications that could lead to a supervisory role, providing both financial security for his family and a sense of personal
    accomplishment.
