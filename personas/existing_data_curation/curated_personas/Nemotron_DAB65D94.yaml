personas:
  professional: James Wallace is an avid model‑maker who dedicates weekend afternoons to assembling airplane, car, and ship kits, using his methodical love of routine and practical problem‑solving to guide
    a small after‑school maker group where they often take the lead in organizing step‑by‑step construction sessions.
  sports: James Wallace enjoys low‑key outdoor fitness, spending Saturdays fishing at the Willamette River with a local youth angling club and hiking trail loops organized by the community scouts, while
    cheering for the Oregon Ducks football team and following the Portland Timbers in the MLS, but they prefer solitary skill‑building over competitive team sports.
  arts: James Wallace immerses in creative pursuits by strumming acoustic guitar, often rehearsing simplified chords to play "Wonderwall" by Oasis and "Blackbird" by The Beatles, and devours adventure series
    such as "Percy Jackson" by Rick Riordan, which feeds their love of familiar narrative arcs and fuels occasional doodles of imagined sea voyages.
  travel: James Wallace plans trips with a meticulous checklist, favoring nature‑focused getaways like camping in Crater Lake National Park, a weekend in the Redwood forests, and a family visit to Vancouver’s
    Stanley Park, where they balance structured itineraries with the occasional spontaneous fish‑catching excursion.
  culinary: James Wallace favors simple yet hearty meals, routinely cooking grilled cheese sandwiches with cheddar, pan‑searing fresh trout caught from the river, and whipping up fish tacos with lime‑infused
    salsa, all of which they prepare following step‑by‑step recipes that satisfy their routine‑oriented cooking style.
  core: James Wallace is a routine‑driven, nature‑loving teen who channels their meticulousness into model building, cautious saving, careful health monitoring, solitary outdoor hobbies, modest artistic
    pursuits, structured travel, and straightforward cooking, all while quietly grappling with occasional anxiety.
background:
  cultural: James grew up in Albany, Oregon, a small city in Linn County characterized by a blend of suburban and rural influences. His family reflects the typical white, Pacific‑Northwest middle‑class
    background, emphasizing self‑reliance, practicality, and community involvement. Local traditions such as community picnics, high‑school sports events, and seasonal farming activities have shaped his
    values. The region’s strong connection to the outdoors fosters a respect for nature and environmental stewardship, while the community’s modest, conservative outlook reinforces his preference for routine
    and modest ambitions. James’s cultural identity is also informed by the broader American values of hard work, family responsibility, and modest, goal‑oriented aspirations.
