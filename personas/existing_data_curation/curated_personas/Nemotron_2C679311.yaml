personas:
  professional: Kelly Zitner is a 27‑year‑old licensed practical nurse who blends sharp clinical skills—patient assessment, wound care, and Epic EHR proficiency—with an artistic flair, creating illustrated
    patient education tools and flexible shift schedules while staying calm under emergencies.
  sports: Kelly Zitner channels energetic sociability into weekly salsa dance classes, participates in the Cape Cod Trailblazers hiking group for weekend treks, cheers for the Boston Red Sox and Boston
    Celtics, and plays in a community drum‑circle fitness club that doubles as a rhythmic exercise class.
  arts: Kelly Zitner expresses creativity through abstract watercolor paintings inspired by the New England coastline, curates photo series of Cape Cod sunsets, reads speculative‑fiction by Ted Chiang,
    attends live shows by Bon Iver and St. Vincent, and volunteers at local art fairs featuring works by regional artists influenced by Georgia O’Keeffe.
  travel: Kelly Zitner loves planning eclectic getaways, having explored historic Plymouth, the art‑laden streets of Portland, Maine, a weekend in Montreal’s vibrant festivals, a salsa‑filled trip to Cartagena,
    Colombia, and dreaming of a sunrise hike along Crete’s coastal cliffs while balancing a modest travel budget with a flexible work schedule.
  culinary: Kelly Zitner delights in farm‑to‑table cooking, whipping up New England clam chowder with locally sourced scallops, rosemary‑lemon roasted chicken, basil‑pesto pasta with heirloom tomatoes,
    and occasionally experimenting with seafood paella, while a penchant for fresh herbs and artisanal cheese drives their weekly farmer’s‑market hauls.
  core: Kelly Zitner is a creatively driven nurse who balances meticulous clinical care with vivid artistic expression, navigates anxiety with mindfulness, splurges on supplies, and thrives on community‑centered
    activities.
background:
  cultural: Kelly grew up in a middle‑class, white New England family in the Plymouth area. Her parents emphasized education, community involvement, and a strong work ethic typical of the region. Proximity
    to historic sites fostered her love for storytelling and the arts, while the coastal environment and seasonal tourism exposed her to a blend of cultures, encouraging an open‑minded and collaborative
    outlook. She identifies with broader American values of independence and self‑expression, yet cherishes New England traditions such as town meetings, seasonal fairs, and a deep connection to the sea.
    This upbringing blends modest suburban comfort with active community life, shaping her as a caring healthcare professional and socially engaged individual.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound care", "Basic phlebotomy", "Catheter care", "Electronic health records (Epic)", "Creative patient education material design", "Interpersonal
    communication and advocacy", "Shift scheduling and coordination", "Community health outreach", "Crisis intervention"]'
  hobbies: '["Abstract watercolor painting", "Coastal landscape photography", "Speculative fiction writing", "Salsa dancing", "Group hiking on Cape Cod trails", "Farm-to-table cooking", "Live music concerts",
    "Museum and art gallery visits", "Health tech seminars", "Mindfulness meditation", "Yoga", "Drum circles"]'
  career_goals: Kelly plans to enroll in an accelerated RN program within the next two years to become a registered nurse, with a particular focus on psychiatric‑mental health nursing. She aims to integrate
    her artistic interests by developing art‑therapy interventions for patients dealing with anxiety and depression. Long‑term, she envisions a leadership role as a nurse educator or program director for
    community wellness initiatives in the Cape Cod region, potentially establishing a boutique clinic that blends conventional care with holistic, creative therapies. She also seeks certifications in trauma‑informed
    care and nurse wellness coaching.
