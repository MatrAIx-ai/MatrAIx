  career_goals: Erika hopes to expand her impact on the local community by establishing an intergenerational arts workshop at her neighborhood senior center, where seniors can share traditional crafts and
    learn new digital art techniques. She also aims to volunteer as a facilitator for conflict resolution training for community volunteers, and she dreams of compiling a memoir of her life experiences
    that blends personal anecdotes with reflections on Chicago’s cultural history.
