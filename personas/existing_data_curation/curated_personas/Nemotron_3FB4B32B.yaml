  career_goals: Although he is currently not in the workforce, Richard aims to stay active by mentoring local youth in woodworking through a weekend workshop at the community center, compiling a memoir
    that captures lessons from his life and the history of Union Bridge, and volunteering as a handyman for the senior center. He also hopes to develop a modest side venture creating custom furniture for
    friends, while learning to better organize his projects to reduce stress and meet personal deadlines.
