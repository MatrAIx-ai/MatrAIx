  career_goals: Luis aims to move into senior executive leadership—ideally a Director of Operations or Vice President role—where he can drive innovation, champion a culture of flexibility, and embed creative,
    design-thinking approaches into the organization’s strategy. He aspires to lead digital-transformation initiatives that improve operational efficiency while promoting diversity, equity, and inclusion.
    Additionally, Luis hopes to mentor emerging talent from under-represented backgrounds and eventually launch his own consultancy focused on helping midsize firms adopt agile, culturally-aware business
    practices.
