  hobbies: '[''Watercolor painting'', ''Collage art'', ''Visiting art exhibitions'', ''Attending live music and dance performances'', ''Cooking traditional South Asian meals'', ''Participating in community
    potlucks'', ''Volleyball'', ''Hiking in Lake County'', ''Reading about world cultures'', ''Traveling'']'
  career_goals: Anuja aspires to advance from a staff cleaner to a supervisory role within a reputable housekeeping service, eventually earning certification as a professional cleaning specialist. She envisions
    opening her own boutique cleaning and home organization business that integrates her artistic eye, offering clients not just cleaning but also personalized home styling. To support this, she plans to
    complete a short certification program in commercial cleaning standards and pursue workshops in interior design. Over the longer term, she hopes to combine her love for culture and food by offering
    cooking classes for small gatherings, merging hospitality with community building.
