personas:
  professional: Jesse Foster, a seasoned community mentor and aspiring handyman consultant, leverages decades of carpentry, mechanical troubleshooting, and meticulous budgeting expertise to deliver reliable,
    routine‑driven workshops and repair services, channeling their disciplined, detail‑oriented nature into every project.
  sports: Jesse Foster stays active by joining the James River Anglers Club for weekend fishing, maintains fitness through daily walks in the community garden, and follows the Richmond Spiders men’s basketball
    and the Washington Commanders for a dash of competitive spirit, all while preferring low‑impact, routine‑friendly activities.
  arts: Jesse Foster immerses themselves in the soulful sounds of Aretha Franklin, Marvin Gaye, and John Coltrane on their meticulously curated vinyl collection, contributes their voice to the church gospel
    choir, and regularly attends local history talks featuring speakers like Dr. Henry Louis Gates Jr., blending artistic appreciation with cultural heritage.
  travel: Jesse Foster prefers carefully planned, leisurely road trips that blend historic exploration with natural scenery, having driven the Blue Ridge Parkway to Asheville and visited the civil‑rights
    landmarks of Atlanta, while dreaming of a future pilgrimage to New Orleans to soak in its jazz legacy, all within a modest budget that balances family responsibilities.
  culinary: Jesse Foster, an adept home cook, frequently prepares traditional Southern comfort foods such as crispy fried chicken, slow‑cooked collard greens seasoned with smoked turkey, and buttery cornbread,
    often incorporating home‑grown tomatoes, okra, and sweet potatoes into family potlucks, while occasionally treating themselves to a plate of jambalaya at a nearby diner.
  core: Jesse Foster, a disciplined yet quietly stubborn gardener‑mechanic, balances an unwavering love for routine with an occasional tendency to over‑budget every hobby, even if it means skipping a night
    out.
background:
  cultural: Jesse’s cultural identity is rooted in the African‑American community of Richmond and the surrounding Chesterfield County. He grew up immersed in the traditions of the Black churches that have
    long been pillars of social support and activism in the region. Family stories of the Great Migration, the civil‑rights movement, and local Black entrepreneurship shape his worldview. He cherishes Southern
    Black cuisine, gospel music, and the oral storytelling tradition passed down through generations. His upbringing in a close‑knit, multigenerational household instilled values of respect, perseverance,
    and communal responsibility, which continue to influence his daily life and interactions.
