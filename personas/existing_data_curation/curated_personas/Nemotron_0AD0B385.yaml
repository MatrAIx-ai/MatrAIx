  career_goals: Although currently not in the formal workforce, Jesse aims to channel his disciplined mindset and desire for achievement into mentorship and community service. He plans to volunteer as a
    workshop instructor at the local community center, teaching basic carpentry, home repair, and budgeting to youth and senior neighbors. He also hopes to document and share the history of Richmond's Black
    neighborhoods through oral‑history projects, and eventually launch a small handyman consulting service to supplement his family’s income while preserving his legacy.
