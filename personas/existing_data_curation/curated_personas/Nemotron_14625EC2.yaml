personas:
  professional: Yohan Rodriguez leverages three and a half decades of financial analysis expertise, constructing intricate Excel, VBA, and Python models for institutional and high‑net‑worth clients while
    methodically mentoring junior analysts and shaping investment strategies with a disciplined, risk‑averse mindset.
  sports: Yohan Rodriguez enjoys weekly golf outings at the Houston Golf Club, follows the Dallas Cowboys and Houston Astros avidly, and maintains a light fitness regimen of morning walks with their Labrador
    and occasional senior tennis league matches, balancing strategic play with relaxed social networking.
  arts: Yohan Rodriguez spends quiet evenings listening to classic jazz icons like John Coltrane and Miles Davis, attends the Houston Symphony’s performances of Gershwin and Beethoven, and collects limited‑edition
    prints of modernist painters, finding the structured improvisation of music a soothing counterpoint to their analytical work.
  travel: Yohan Rodriguez plans meticulously organized trips, favoring cultural immersion in historic cities such as San Antonio, Austin’s Hill Country, and international destinations like Barcelona and
    Kyoto, where they blend guided tours with leisurely afternoons at local cafés, always ensuring travel expenses align with their retirement budget.
  culinary: Yohan Rodriguez delights in preparing pupusas filled with cheese and seasoned pork and slow‑cooked tamales using masa harina, while also cultivating heirloom tomatoes for fresh salsa, showcasing
    a competent home‑cook’s skill set that balances tradition with a penchant for precise, measured recipes.
  core: Yohan Rodriguez, a methodical 62‑year‑old finance veteran, balances analytical rigor with a love for chess, golf, and family‑rooted cooking, while mentoring the next generation and meticulously
    managing both personal and client wealth.
background:
  cultural: Born to Salvadoran immigrants who settled in Dallas in the 1970s, Yohan grew up bilingual, navigating both American and Salvadoran cultures. Family gatherings centered around music, food, and
    the celebration of traditions like Semana Santa and Día de los Muertos, instilling a strong sense of community responsibility. His Catholic upbringing emphasized discipline and service, values that
    have guided his professional ethic. Over the years, he has remained actively involved in the local Salvadoran diaspora, supporting cultural festivals and mentoring young professionals from similar backgrounds.
