  career_goals: Approaching retirement, Yohan aims to transition into a senior advisory role where he can mentor the next generation of analysts and shape investment strategies for emerging markets. He
    plans to launch a boutique advisory firm focused on serving the growing Latino business community in Texas, leveraging his analytical rigor to help clients achieve sustainable growth. Simultaneously,
    he seeks to serve on the board of a nonprofit financial-literacy organization, ensuring his expertise contributes to long-term community impact.
