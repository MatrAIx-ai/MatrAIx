persona_description: A highly acclaimed and respected British painter, known for his natural talent, honesty, and ability to capture the essence of his subjects in his portraits. He was recognized early
  on for his ability to paint with accuracy and vitality, and his work was highly sought after in London. He was also a professor of painting at the Royal Academy and is buried in St Paul's Cathedral, next
  to Reynolds. He is particularly known for his work in History Painting, as well as his paintings of genre subjects such as the Peasant Family and the Beggar Boy. His work can be seen across the world,
  from the Louvre to the Hermitage, from Budapest to Philadelphia, and from the Royall Collection to the Tate and the National Portrait Gallery.
