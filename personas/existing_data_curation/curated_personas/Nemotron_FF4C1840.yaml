personas:
  professional: Caroline Masterton, a budding 'tiny teacher' in their preschool sandbox, blends an inquisitive fascination with how blocks fit together and a practical knack for sorting toys, while their
    relaxed, flexible approach yields spontaneous lesson plans that keep classmates engaged and harmonious.
  sports: Caroline Masterton dabbles in toddler gymnastics classes at the local community center, cheerfully joins the neighborhood mini‑soccer league, and enthusiastically wears a cap supporting the city’s
    professional basketball team, the Thunder, reflecting their love of movement and team spirit.
  arts: Caroline Masterton delights in finger‑painting rainbows, sings along to Raffi and The Wiggles, and eagerly watches the animated series 'Bluey,' with a particular fondness for the gentle storytelling
    of classic picture books by Eric Carle, shaping their creative identity.
  travel: Caroline Masterton has explored grandma’s countryside cottage, splashed in the city zoo’s splash pad, and on a family vacation delighted in the magic of Disney World’s Fantasyland, while dreaming
    of a future trip to the seaside town of Brighton, showcasing their curiosity for both familiar comforts and new adventures.
  culinary: Caroline Masterton loves buttery macaroni and cheese, peanut butter‑and‑jelly sandwiches, and banana slices, eagerly helps stir pancake batter with a plastic spoon, and sweetly requests extra
    sprinkles on yogurt, reflecting their simple yet enthusiastic palate and budding kitchen confidence.
  core: Caroline Masterton is a three‑year‑old who balances boundless curiosity with occasional waves of anxiety, thriving on spontaneous play while their gentle compassion often smooths over any distress.
background:
  cultural: Caroline comes from a White, middle‑class family living in Taylor, Texas, a close‑knit community in Williamson County. Her upbringing reflects typical Southern‑Texas cultural values such as
    hospitality, family cohesion, and community involvement. She attends a local church where Sunday school introduces her to stories of kindness and service, reinforcing her compassionate nature. Family
    traditions include celebrating holidays like Christmas and Thanksgiving with gatherings that feature shared meals, music, and storytelling. Community events such as the Taylor County Fair and local
    park picnics provide opportunities for social interaction and exposure to regional customs, like country‑style music and simple outdoor games. These environments nurture her cooperative spirit and her
    desire to help others, while also offering a safe space for her emotional expression and occasional distress.
