  career_goals: Even at three, Caroline talks excitedly about growing up to be someone who helps others. She often says she wants to be a teacher because she loves sharing stories and showing friends how
    to do things, and she also dreams of being a veterinarian or a pediatric nurse, inspired by her love for animals and her deep compassion for other children. Occasionally she imagines becoming a community
    helper like a firefighter or a police officer, reflecting her desire to keep people safe. Her overarching ambition is to be a kind, helpful adult who makes other people feel cared for and supported.
