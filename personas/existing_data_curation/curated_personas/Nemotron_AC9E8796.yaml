personas:
  professional: Marque Mcclain blends hands-on carpentry with compassionate mentoring, using their practical curiosity and deep sense of responsibility to launch a senior-focused home-repair consulting
    service.
  sports: Marque Mcclain follows the local minor league baseball team, the Springfield Sluggers, cheers for the regional NFL franchise, the River City Rams, and participates in a senior walking club that
    meets thrice a week on the nearby river trail, preferring low-impact exercise over high-intensity sports.
  arts: Marque Mcclain finds solace in gospel legends like Mahalia Jackson and blues icons such as B.B. King, often playing their vinyl records while reading biographies of civil-rights leaders like Maya
    Angelou, and they occasionally attend community theater productions starring local actors.
  travel: Marque Mcclain enjoys leisurely road trips to historic towns like Savannah and Natchez, favors off-season visits to avoid crowds, and dreams of exploring the blues heritage trail in the Mississippi
    Delta, all while balancing travel costs with family responsibilities.
  culinary: Marque Mcclain perfects collard greens simmered with smoked turkey, crispy fried chicken, and sweet potato pie, often harvesting fresh herbs like thyme and rosemary from their garden to season
    dishes, and they relish cooking for church potlucks despite occasionally over-salting recipes in their enthusiasm.
  core: Marque Mcclain is a reflective, hands-on mentor who balances diligent budgeting, garden-grown comfort food, and a quiet love of gospel blues while wrestling with persistent anxiety and a penchant
    for procrastinating on big-picture plans.
background:
  cultural: Marque grew up in a close‑knit African‑American community in Monroe, GA, where church life, family gatherings, and Southern traditions shaped his worldview. His parents emphasized the importance
    of hard work, respect for elders, and mutual support, values that persist in his daily interactions. He identifies with the cultural heritage of the Black South—gospel music, soul food, storytelling,
    and the legacy of the civil‑rights movement that his grandparents recalled. These influences inform his commitment to community service, his love of Southern cuisine, and his shared sense of resilience
    amid the systemic challenges faced by Black residents in rural Georgia.
attributes:
  skills: '["Basic carpentry", "Home repair", "Lawn and garden maintenance", "Computer troubleshooting", "Personal budgeting", "Caregiving", "Youth mentorship", "Conflict mediation", "Community event coordination",
