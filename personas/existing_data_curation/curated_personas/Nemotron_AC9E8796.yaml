  hobbies: '["Gardening", "Woodworking", "Reading history and self-help books", "Listening to gospel and blues music", "Cooking Southern meals", "Playing chess", "Birdwatching", "Nature walking", "Journaling",
    "Mentoring youth at church"]'
  career_goals: Marque hopes to complete an associate degree in business administration through online courses, enabling him to launch a small home‑repair consulting service for seniors in his community.
    Simultaneously, he wants to become a certified peer‑support volunteer to help others coping with anxiety and depression, drawing on his own experiences. He also plans to develop a community garden project
    that provides fresh produce and a therapeutic space for local residents. These goals blend his practical skills, desire for meaningful contribution, and need for personal growth.
