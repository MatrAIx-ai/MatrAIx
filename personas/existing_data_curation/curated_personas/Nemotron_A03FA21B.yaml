  career_goals: Although retired, Sumpter aims to preserve his family history by completing a memoir, mentor his grandchildren and local youth through storytelling workshops, maintain his health through
    regular activity, and contribute to the Wilmington historical society. He also hopes to stay active in his church’s outreach program and support local charitable initiatives.
