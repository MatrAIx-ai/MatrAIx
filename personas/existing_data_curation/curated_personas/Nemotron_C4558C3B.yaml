personas:
  professional: Su Lai, an aspiring teen software developer and digital artist, channels curiosity and methodical planning into building Python‑based games while balancing rigorous violin practice and competitive
    swimming commitments.
  sports: Su Lai, a dedicated member of the Laguna Hills High School swim team who also enjoys weekend hikes in Laguna Coast Wilderness Park, roots for the Los Angeles Dodgers and Los Angeles Lakers, and
    incorporates disciplined training routines with a love for outdoor adventure and spontaneous group challenges.
  arts: Su Lai, a budding manga illustrator and violinist, draws inspiration from Studio Ghibli, Hayao Miyazaki, and violinist Lindsey Stirling, sharing short TikTok videos that blend classical music with
    tech humor while constantly refining digital art skills in Procreate and sketching manga‑style characters during school breaks.
  travel: Su Lai, an adventurous planner, spends weekends exploring the coastal trails of Orange County and has saved up for a family trip to Yosemite, dreams of studying abroad in Kyoto to experience historic
    temples and street food, and balances modest budgeting with a love for cultural immersion and spontaneous road‑trip detours.
  culinary: Su Lai, a budding home chef, enjoys mastering family recipes like pork dumplings and spicy tofu stew with fresh Sichuan peppercorns, while also experimenting with avocado toast and matcha smoothies,
    often cooking alongside their mother in the kitchen and documenting the process on social media.
  core: Su Lai blends disciplined swimming, creative coding, and thoughtful art with a worry‑prone mind that fuels meticulous planning, occasional impulsive splurges, and a constant drive to help others
    through tutoring.
background:
  cultural: Su Lai is a second‑generation Chinese‑American; her parents immigrated from Guangzhou, China, to Southern California before she was born. At home, Mandarin is spoken alongside English, and cultural
    traditions such as Lunar New Year celebrations, mooncake making, and dragon‑dance rehearsals at the local Chinese cultural center are integral to family life. Growing up in the diverse suburb of Aliso
    Viejo, she has been exposed to a blend of Asian and American influences—valuing education, respect for elders, and community harmony while embracing the openness, individuality, and extracurricular
    opportunities of U.S. culture. She participates in weekend Mandarin school, Chinese calligraphy workshops, and community festivals, which nurture her bicultural identity.
