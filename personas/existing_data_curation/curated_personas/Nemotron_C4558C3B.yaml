  hobbies: '["Competitive swimming", "Violin practice", "Digital illustration and manga drawing", "TikTok video creation", "Coding simple games in Python", "Volunteering as a math and language tutor", "Hiking
    in Laguna Coast Wilderness Park", "Cooking traditional Chinese dishes", "Reading young-adult fantasy novels", "Mindfulness journaling"]'
  career_goals: Su Lai aspires to attend a top university where she can major in biomedical engineering or computer science, fields that combine her curiosity for new technologies with a practical desire
    to improve health outcomes. She aims to secure internships at biotech or tech companies during high school and college to gain real‑world experience designing affordable medical devices. Long‑term,
    she envisions leading interdisciplinary teams that develop innovative health‑tech solutions, while also using her bilingual skills to foster cross‑cultural collaborations in research. In parallel, she
    hopes to mentor younger students, especially those from underrepresented backgrounds, encouraging them to pursue STEM pathways.
