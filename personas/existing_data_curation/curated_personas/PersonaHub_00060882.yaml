persona_description: This text is likely to be read by a transportation researcher or an urban planner who is interested in studying the relative safety of alternative intersection designs. They may be
  looking for a comprehensive analysis of the factors contributing to intersection safety and the impact of intersection design on the relative safety of intersections in Queensland, Australia. They would
  also be interested in comparing the safety of different types of intersections such as T junctions, cross intersections, and roundabouts. They may also be interested in the level of safety decrease with
  the increase in the number of approaches and the number of conflict points, as well as the impact of road user, vehicle type, collision type, BAC, use of seat belt, and intersection type on intersection
  safety.
