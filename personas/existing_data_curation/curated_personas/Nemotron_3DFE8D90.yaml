personas:
  professional: James Hardy is a 17‑year‑old aspiring tradesperson who blends hands‑on bike‑repair tinkering, basic digital literacy, and a knack for listening to friends into a practical, curiosity‑driven
    path toward earning a GED, enrolling in Durham Technical’s automotive technology program, and eventually opening a community‑focused bike‑repair shop.
  sports: James Hardy spends Saturday mornings at the D‑Spot skate park, cruises the American Tobacco Trail on a refurbished bike, hikes the trails of William B. Umstead State Park, and energetically roots
    for the Durham Bulls, the North Carolina Tar Heels basketball team, and the Charlotte Hornets while being a member of the Durham Bike Collective.
  arts: James Hardy channels creative energy into sketching comic‑style panels, strumming acoustic renditions of John Mayer and Bon Iver songs, curating playlists that include The Strokes and video‑game
    soundtracks, and attending local Durham art shows featuring emerging artists like Maya Gonzalez.
  travel: James Hardy favors spontaneous bike‑powered road trips, having explored the mountain trails of Asheville, the seaside vibes of Wilmington’s Outer Banks, and the historic streets of Charleston,
    while dreaming of an immersive backpacking adventure across Japan to soak in its gaming culture and bike craftsmanship.
  culinary: James Hardy’s culinary palate leans toward garden‑fresh meals—like zucchini‑tomato pasta tossed with basil from their community plot, smoky BBQ chicken wings glazed with honey, and late‑night
    pepperoni‑jalapeño pizza topped with fresh mozzarella—while their cooking skill hovers at confident home‑cook level, often experimenting with herbs like rosemary and thyme.
  core: James Hardy is a restless teen who patches bikes, sketches melodies, and battles anxiety with a blend of DIY grit and spontaneous gaming marathons.
background:
  cultural: James grew up in a white, middle‑class family in the suburbs of Durham, North Carolina. His upbringing reflects Southern cultural traditions—family gatherings centered around barbecue and fried
    chicken, regular attendance at a local Methodist church, and a strong emphasis on courtesy and community. While he shares these regional values, living in a college town has exposed him to a diverse
    population and multicultural events, fostering an appreciation for different music, art, and perspectives. He follows local sports, especially Duke basketball, and often participates in community programs
    at the Durham County Library and youth centers.
