  career_goals: James aims to earn his GED within the next year and then enroll in a trade certification program at Durham Technical Community College, focusing on automotive technology or carpentry. He
    hopes to secure a stable apprenticeship where he can apply his hands‑on skills while earning enough to support his family. Long‑term, he wants to open a small bike‑repair and custom‑build shop that
    also offers mentorship to local teens, combining his practical abilities with his desire to help others.
