personas:
  professional: Manuel Gonzalez, a budding game creator, merges his love for Scratch programming with a practical, curiosity‑driven approach, designing simple strategy games for his friends while juggling
    a laid‑back attitude toward deadlines and a competitive edge that pushes him to constantly refine game mechanics.
  sports: Manuel Gonzalez charges onto the soccer field for the Frazier Park Youth League, joins impromptu basketball pick‑up games at the local park, and roots for the LA Galaxy and the Los Angeles Lakers,
    blending his high energy, competitive spirit with a laid‑back approach to practice schedules.
  arts: Manuel Gonzalez grooves to regional Mexican singers like Vicente Fernández while also humming the scores from his favorite video games, and spends spare afternoons drawing LEGO‑inspired comic strips,
    reflecting his sociable yet critical eye for rhythm and narrative.
  travel: Manuel Gonzalez enjoys weekend bike trips along the trails near Frazier Park and dreams of visiting Disneyland and the historic streets of Oaxaca, planning each mini‑adventure on a crayon‑filled
    map but often leaving the itinerary open for spontaneous detours.
  culinary: Manuel Gonzalez loves helping his family roll tacos with fresh corn tortillas, diced onions, cilantro, and a splash of lime, while also mastering the perfect cheese‑filled quesadilla and snacking
    on nachos topped with jalapeños, showcasing his enthusiasm for bold, handcrafted flavors and a developing knack for kitchen teamwork.
  core: Manuel Gonzalez is a ten‑year‑old kinetic strategist who balances a love for collaborative sports and digital games with a competitive edge, occasional worry, and a habit of leaving school assignments
    to the last minute.
background:
  cultural: Manuel grows up in a Mexican‑American household in Frazier Park, where Spanish is spoken daily at home and English at school. Family traditions such as celebrating Día de los Muertos, sharing
    tamales and tacos, and attending the local Catholic parish shape his cultural identity. His community blends a rural Californian lifestyle with vibrant Hispanic customs, giving him a strong sense of
    belonging to both cultures. He participates in local Mexican community events, such as the summer barrio festival, and often incorporates Spanish phrases into his conversations with friends.
attributes:
  skills: '["Bilingual Spanish-English", "Basic arithmetic and reading comprehension", "Problem solving with puzzles and logic games", "Introductory Scratch programming and simple game design", "Soccer
