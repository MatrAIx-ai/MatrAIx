  hobbies: '["Soccer (youth league)", "Basketball pick‑up games", "LEGO building and robotics kits", "Scratch programming and simple game creation", "Competitive multiplayer video gaming (e.g., Nintendo
    Switch)", "Analyzing game strategies and tactics", "Listening to regional Mexican music", "Helping family prepare Mexican dishes", "Biking on local trails with friends"]'
  career_goals: Although only ten, Manuel already dreams of turning his love for technology and competition into a career. He aspires to become a software engineer or game developer who creates interactive
    experiences that blend fun with real‑world problem‑solving. He also envisions himself earning a college scholarship in robotics or engineering, where he can continue competing in tech challenges and
    perhaps coach a youth soccer team. He hopes to balance his curiosity with practical impact, designing tools that help his community while setting realistic milestones to manage his tendency toward worry.
