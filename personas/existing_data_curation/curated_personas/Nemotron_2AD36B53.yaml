personas:
  professional: Fa Jagannathan, a veteran accountant with 25 years of expertise in GAAP, IFRS, and SAP FI/CO, blends meticulous analytical rigor with a curiosity for emerging data‑analytics tools, leading
    small audit teams assertively while maintaining a reserved, detail‑driven demeanor.
  sports: Fa Jagannathan enjoys low‑impact fitness, participating in a local yoga studio’s sunrise class, cheering for the New England Patriots in the fall and the Boston Red Sox in the spring, and walks
    briskly with a community walking club through Connecticut’s scenic trails.
  arts: Fa Jagannathan, an avid reader of historical fiction and diaspora narratives, finds solace in the works of Amitav Ghosh and Jhumpa Lahiri, while also appreciating the classical violin performances
    of Itzhak Perlman and the evocative paintings of Amrita Sher‑Gil, integrating these artistic influences into her reflective evenings.
  travel: Fa Jagannathan prefers meticulously planned trips that blend cultural immersion and relaxation, having explored the historic streets of Barcelona, the serene backwaters of Kerala, and weekend
    retreats to the Berkshires, always packing a notebook for reflective journaling.
  culinary: Fa Jagannathan, a proficient home chef, cultivates a herb garden of cilantro, mint, and fenugreek to flavor elaborate biryani, lentil dal, and spiced vegetable pulao, and experiments with fusion
    dishes like turmeric‑infused quinoa pilaf, while favoring fresh, seasonal produce and occasional dining out at upscale farm‑to‑table eateries.
  core: Fa Jagannathan balances a disciplined accounting career with a love for solitary gardening, yoga, and puzzle solving, juggling stress‑induced worry through mindfulness while nurturing a community‑focused
    culinary passion and a quiet ambition to mentor women in forensic finance.
background:
  cultural: Fa Maryam Jagannathan is a second‑generation South Asian American of Indian Tamil descent. Raised in a close‑knit immigrant family in New Britain, she grew up bilingual, speaking both English
    and Tamil at home. Her cultural identity blends traditional South Asian values—respect for family, community service, and reverence for education—with the individualistic ethos of American society.
    She maintains strong ties to the local South Asian community through temple activities, cultural festivals, and networking groups for professional women of South Asian heritage. These cultural influences
    shape her work ethic, sense of responsibility, and her desire to give back by supporting younger members of her community in navigating both professional and personal challenges.
