  career_goals: Her immediate goal is to obtain her Certified Public Accountant (CPA) license and complete a bachelor's degree in accounting to solidify her professional credentials. In the medium term,
    she aims to transition into a senior auditor role with a focus on forensic accounting, leveraging her analytical skills to investigate financial irregularities for local non‑profits and community organizations.
    Long‑term, Fa envisions establishing a boutique consulting practice that offers tax and audit services tailored to small South Asian businesses in Connecticut, while also mentoring younger women entering
    the field. Throughout these pursuits, she prioritizes a balanced workload to manage her sensitivity to stress and maintain her well‑being.
