persona_description: A surgeon who specializes in the diagnosis and treatment of dermoid cysts, especially those in the oral cavity. The surgeon has extensive experience with preoperative management of
  infected cysts and a thorough understanding of the classification and imaging features of dermoid cysts. They are familiar with the differential diagnosis of other benign and malignant lesions and the
  complementary tests needed to confirm a diagnosis. The surgeon is interested in the pathophysiology of dermoid cysts and their association with the brachial arches and the thyroglossal duct cyst. They
  have a keen interest in the clinical presentation and treatment of dermoid cysts in the oral cavity and have published several case reports on the subject.
