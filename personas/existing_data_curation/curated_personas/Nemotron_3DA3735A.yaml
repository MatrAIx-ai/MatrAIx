personas:
  professional: Tiffany Coad, a retired community facilitator and public speaker, channels their improvisational flair and competitive drive into organizing flexible intergenerational storytelling workshops,
    though they often wrestle with deadlines and paperwork.
  sports: Tiffany Coad, an enthusiastic member of the Fort Lauderdale Community Dance Club and a regular participant in senior beach‑side walking groups, also supports the Miami Heat and Miami Dolphins
    and joins a seasonal senior softball league each spring.
  arts: Tiffany Coad, who quilts inspired by the bold patterns of Faith Ringgold while swaying to Aretha Franklin and Marvin Gaye at local live music venues, frequently attends performances by the Broward
    Symphony and reads historical fiction by authors like Hilary Mantel to fuel their storytelling.
  travel: Tiffany Coad, who favors spontaneous weekend road trips to nearby cultural festivals such as the Key West Art Festival and enjoys leisurely strolls along the Fort Lauderdale beaches, dreams of
    a slow cruise to the Caribbean islands but balances travel with a modest pension.
  culinary: Tiffany Coad, whose kitchen is a hub for Southern comfort foods like fried catfish with collard greens and Caribbean‑inspired jerk chicken with plantain mash, delights in experimenting with
    spices such as smoked paprika and allspice, yet they sometimes forget to defrost ingredients, leading to improvised meals.
  core: Tiffany Coad, a spirited 68‑year‑old community storyteller who balances a competitive edge with a generous heart, often forgets appointments but never misses a dance night, and channels lifelong
    curiosity into vibrant, if sometimes chaotic, projects.
background:
  cultural: Tiffany grew up in the Jim Crow South before moving to Florida, where she became an active member of the Black community in Broward County. Her cultural identity is shaped by the rich traditions
    of African American church life, civil rights activism, and Southern culinary heritage. She celebrates Juneteenth, Kwanzaa, and maintains strong ties to the local Black arts scene, attending poetry
    slams and jazz festivals. Her family history includes storytelling passed down through generations, influencing her love for oral history and memoir writing. In Fort Lauderdale, she engages with multicultural
    neighborhoods, blending her Southern roots with the vibrant Caribbean influences that permeate South Florida’s Black culture.
