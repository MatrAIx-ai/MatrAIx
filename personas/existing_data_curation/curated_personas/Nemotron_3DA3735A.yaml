  hobbies: '[''Social dancing'', ''Quilting'', ''Gardening'', ''Cooking Southern and Caribbean cuisine'', ''Reading historical fiction'', ''Attending live music events'', ''Bridge'', ''Beach walks'', ''Short
    road trips to cultural festivals'']'
  career_goals: Although retired from formal employment, Tiffany aims to channel her curiosity and practical mindset into mentorship and community advocacy. She hopes to launch a flexible intergenerational
    storytelling workshop that blends oral histories with creative writing, allowing seniors and youth to share experiences without rigid schedules. She also aspires to write and publish a memoir that captures
    her experiences as a Black woman navigating the Civil Rights era and modern Florida. In addition, she seeks to deepen her involvement with local senior support networks, advocating for resources that
    address stress and mental health for older adults.
