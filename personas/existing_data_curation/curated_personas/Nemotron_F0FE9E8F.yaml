  hobbies: '[''Basketball (pickup games)'', ''Competitive online gaming (FPS and MOBAs)'', ''Fishing and camping trips'', ''DIY automotive projects'', ''DIY carpentry (building furniture)'', ''Live music
    and concerts'', ''Community volunteering (sports events, church youth activities)'']'
  career_goals: Ethan wants to turn his practical skill set into a stable career. After graduating high school, he plans to enroll in a community‑college automotive technology program to become a certified
    technician. In the medium term, he hopes to open his own small auto‑repair shop that can serve his hometown and provide apprenticeship opportunities for other local youth. He also sees himself joining
    the local volunteer fire department, which would satisfy his desire for a structured, service‑oriented role while allowing him to work in a team‑focused, high‑adrenaline environment.
