persona_description: A scientist and engineer who is responsible for managing the Mars Science Laboratory mission for NASA's Science Mission Directorate, Washington. The individual is responsible for overseeing
  the development and execution of the mission's objectives, including the deployment and operation of Curiosity, the rover on Mars. The persona is also involved in the planning and execution of the rover's
  scientific investigations, including the identification of potential targets to investigate near the rover and on the visible slope of the nearby three-mile-high mound informally named Mount Sharp. The
  individual is highly skilled in spacecraft engineering, rover design, and mission management, and has extensive experience in the development and execution of complex space missions.
