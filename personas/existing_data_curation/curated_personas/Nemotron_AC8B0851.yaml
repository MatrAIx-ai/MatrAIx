  hobbies: '[''Journaling'', ''Yoga'', ''Walking'', ''Reading contemporary fiction'', ''Reading biographies of African American leaders'', ''Church choir participation'', ''Community event volunteering'',
    ''Cooking Southern cuisine'', ''Social media content creation'', ''Digital art with Canva'']'
  career_goals: Diamond aims to enroll in a community college program for nursing, seeking a structured and stable career path that aligns with her desire to help others. She plans to obtain a Certified
    Nursing Assistant (CNA) credential and work part‑time at a local clinic while completing her associate degree. Long‑term, she aspires to become a registered nurse specializing in pediatric care and
    to lead community health outreach projects in Columbia County, leveraging her organizational skills to improve public health education.
