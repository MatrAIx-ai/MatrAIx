persona_description: A dedicated and experienced teacher who has been teaching literature and reading to children for many years. This teacher is particularly skilled in balancing the challenge of literature
  with the need for accessibility and enjoyment for all students. The teacher has a keen understanding of the importance of reading for learning and for the development of critical thinking and imagination.
  The teacher is also skilled in creating a balance between reading for pleasure and reading for knowledge, and in guiding students towards developing their reading fluency and comprehension skills. The
  teacher is aware of the importance of reading aloud and of the need to prepare students for reading independently, while still providing support and guidance as needed. The teacher is also skilled in
  using audio books and other multimedia resources to enhance the reading experience for students.
