  career_goals: Hong aims to advance to a senior sales leadership role within the next five years, ultimately becoming a Sales Director or VP of Sales for a high‑growth tech startup. He wants to lead a
    high‑performing team, shape go‑to‑market strategies, and drive revenue expansion across both US and Asian markets. To support this, he plans to earn a Certified Sales Leader credential, complete a bachelor’s
    degree in Business Administration, and develop expertise in AI‑driven sales analytics. He also aspires to mentor junior sales professionals, build a robust professional network in Silicon Valley, and
    eventually launch his own consultancy that helps US tech firms enter Asian markets.
