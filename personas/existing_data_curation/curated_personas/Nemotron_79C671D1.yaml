personas:
  professional: Lisa Hon, an aspiring LEGO architect who meticulously plans brick layouts after school, blends her love of predictable building steps with spontaneous storytelling, and happily leads her
    small group of friends in collaborative design sessions.
  sports: Lisa Hon, a dedicated member of Johnson City United Youth Soccer who practices after school, cheers for the Tennessee Volunteers football team and the Johnson City High School Cardinals, enjoys
    weekend hikes on nearby Appalachian trails, and joins the local dance studio's cardio‑dance sessions for cross‑training.
  arts: Lisa Hon, a pop‑music‑plus‑bluegrass aficionado who sings along to Taylor Swift and Luke Combs, draws lively cartoon strips of her soccer adventures inspired by Disney characters, and crafts friendship
    bracelets while listening to bluegrass jam sessions at the county fair.
  travel: Lisa Hon, an eager explorer who has hiked the family‑friendly trail to Roan Mountain’s waterfall, visited Great Smoky Mountains National Park on a school field trip, dreams of a future Disney
    World vacation, and loves weekend road trips to the state fair in Knoxville with her grandparents.
  culinary: Lisa Hon, a budding kitchen helper who loves the comforting taste of Southern fried chicken, buttery cornbread, and homemade mac and cheese, enjoys assembling peanut‑butter‑and‑jelly sandwiches
    for school lunches, and proudly bakes chocolate chip cookies with Grandma using real butter and vanilla extract.
  core: Lisa Hon, a structured‑yet‑spontaneous 8‑year‑old who builds LEGO kingdoms, manages allowance with a penny‑wise eye, battles sneezes from spring pollen, kicks soccer balls with the same gusto she
    reserves for dance moves, tunes into pop and bluegrass, and dreams of mountain hikes and Disney magic while never forgetting the family’s Sunday barbecue.
background:
  cultural: Lisa lives in Johnson City, Tennessee, a small community nestled in the foothills of the Appalachian Mountains. Her family reflects Southern hospitality, with frequent gatherings around meals,
    church involvement, and participation in local traditions such as the annual county fair and high‑school football games. The community values practicality, neighborliness, and a close connection to
    nature, which influences Lisa's love for outdoor activities and appreciation for regional music like country and bluegrass. Her upbringing blends contemporary American youth culture—technology, pop
    music, and school clubs—with the slower‑paced, community‑oriented lifestyle characteristic of East Tennessee.
