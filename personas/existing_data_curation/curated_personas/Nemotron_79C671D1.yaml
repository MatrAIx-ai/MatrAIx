  career_goals: Lisa dreams of a future where she can help others learn and stay healthy. She is fascinated by teachers who structure classrooms and guide students, so she imagines becoming an elementary
    school teacher. She also loves animals and pictures herself as a veterinarian, combining her caring nature with practical problem‑solving. Ultimately, she seeks a career that offers clear daily routines,
    teamwork, and frequent interaction with people in her community.
