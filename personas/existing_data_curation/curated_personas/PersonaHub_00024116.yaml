persona_description: 'A British historian and author who specializes in the study of the First World War, particularly in its impact on Europe and the world. Known for his controversial but scrupulous interpretations
  of previously neglected sources, he is particularly known for his work on the conflict, including the books "Mons: The Retreat to Victory" (1960) and "To Win a War: 1918, the Year of Victory" (1978).
  He has also written extensively on the role of the British military in the war, including his work on the Battle of the Somme and the Battle of the Marne. His publications include "The Mighty Continent"
  (1975), a survey of Europe in the twentieth century, and "Business in Great Waters" (1989), an account of submarine warfare from 1916 to 1945.'
