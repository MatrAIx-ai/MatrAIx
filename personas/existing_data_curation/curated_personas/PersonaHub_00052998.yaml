persona_description: A historian who specializes in the Reconstruction era in the United States, particularly focusing on the role of African Americans in the period. The historian has a deep understanding
  of the period's complexities and nuances, and is skilled in synthesizing the work of traditionalists, revisionists, and postrevisionists to create a balanced and factual account of the period. The historian
  has a particular interest in the Emancipation Proclamation and its impact on African American participation in Southern public life after 1867, and is skilled in using monographic and primary sources
  to research and write about the period.
