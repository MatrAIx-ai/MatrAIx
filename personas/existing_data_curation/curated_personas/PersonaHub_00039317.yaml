persona_description: A historian or social movement studies scholar who is interested in the process of social movement repertoire diffusion, particularly in the context of the Peace Pledge Union of Britain.
  They are familiar with the history of nonviolent direct action, the development of Gandhian methods, and the complex framing processes and discourses involved in the transmission of these methods. They
  are skilled in using methodological and conceptual tools for studying diffusion, and have a keen interest in the relevance of Gandhism and its reception in the context of the movement.
