personas:
  professional: Zenobia Batts is a meticulous housekeeping specialist turned aspiring house‑manager, leveraging a hospitality associate degree, deep‑cleaning expertise, and a flair for interior sketching
    to transform upscale residences into organized, aesthetically resonant spaces, and they consistently blend efficiency with artistic vision.
  sports: Zenobia Batts enjoys weekend hikes in the Appalachian foothills, supports the Atlanta Falcons and Atlanta Hawks, participates in a local yoga class that blends soulful playlists with gentle stretching,
    and they find these activities essential for maintaining balance between physical stamina and creative energy.
  arts: Zenobia Batts frequents the Decatur Art Walk, draws inspiration from jazz legends like Miles Davis, soul icons such as Aretha Franklin, and contemporary R&B artist H.E.R., curates mood‑board collages
    influenced by the vibrant palettes of Kehinde Wiley, and they often integrate these artistic influences into their interior design concepts.
  travel: Zenobia Batts favors road‑trip adventures through the Southern corridor, having explored Savannah’s historic squares and Asheville’s craft breweries, dreams of a cultural immersion trip to Kyoto’s
    temples and Marrakech’s souks once they secure their certification, and they meticulously plan itineraries to balance discovery with budget constraints.
  culinary: Zenobia Batts blends Southern comfort with global spice, crafting dishes like shrimp‑and‑grits with harissa, collard greens seasoned with ginger, and sweet‑potato pie infused with cardamom,
    while using a well‑worn cast‑iron skillet and a modest spice rack, and they relish experimenting in the kitchen as a form of creative expression.
  core: Zenobia Batts balances relentless organization with vibrant creativity, turning everyday chores into artistic opportunities while chasing design dreams, and they stay grounded by music, nature,
    and a disciplined financial plan.
background:
  cultural: Zenobia is a Black woman raised in the South, with deep roots in the African‑American community of Canton and the greater Atlanta metropolitan area. Her family traditions emphasize resilience,
    communal support, and a rich oral history of storytelling, all of which have shaped her imaginative outlook. She grew up attending a historically Black church, where gospel music, communal meals, and
    service initiatives fostered a sense of responsibility and compassion. These cultural influences inform her work ethic, her love for soulful music, and her appreciation for Southern culinary heritage,
    while she also embraces contemporary artistic expressions. Zenobia’s identity is a blend of heritage pride and modern creativity, guiding both her professional aspirations and her personal pursuits.
