  career_goals: Zenobia aspires to transition from a cleaning role to a specialized house‑manager position for upscale residences, integrating her organizational expertise with her artistic vision for interior
    aesthetics. In the next five years, she plans to earn a certification in professional house management and complete a bachelor’s degree in interior design or hospitality management. Her long‑term ambition
    is to launch her own boutique cleaning and décor consultancy, offering clients a seamless blend of meticulous housekeeping and personalized design services. She also hopes to mentor other young professionals
    from her community, providing guidance on balancing practical work with creative development.
