personas:
  professional: Adriana Martinezjimenez, an 11‑year‑old aspiring game developer, channels curiosity and practicality into designing interactive Scratch games that blend mystery storytelling with logical
    puzzles, while her competitive streak pushes her to refine coding skills through school hackathons and online tutorials.
  sports: Adriana Martinezjimenez plays forward for the Lake Lanier Juniors soccer club, idolizes Atlanta United’s Josef Martínez, trains three times a week after school, balances competitiveness with teamwork,
    and spends weekends hiking the Lake Lanier Nature Trail to improve stamina and enjoy outdoor exploration.
  arts: Adriana Martinezjimenez draws vibrant comic strips inspired by the mystery novels she devours, models characters after artists like Jim Lee and manga creator Akira Toriyama, and spends Saturday
    mornings sketching while listening to the soundtracks of video games such as The Legend of Zelda, which fuel her creative imagination.
  travel: Adriana Martinezjimenez prefers weekend road trips with her family, having explored the Chattahoochee River National Recreation Area and taken a memorable visit to the Georgia Aquarium, while
    she dreams of hiking the Appalachian Trail and visiting the Harry Potter Studio Tour in London for its magical storytelling scenery.
  culinary: Adriana Martinezjimenez loves homemade pepperoni pizza, can whip up a quick cheese quesadilla using cheddar, mozzarella, and salsa, and often experiments with smoothie blends of banana, spinach,
    and almond milk, though she has a habit of sneaking extra chocolate chips into her cookie dough when no one watches.
  core: Adriana Martinezjimenez is an inquisitive, competitive eleven‑year‑old who blends mystery‑driven coding projects, soccer drills, and comic‑drawing marathons into a restless quest for mastery, all
    while occasionally forgetting to wear her glasses on the field.
background:
  cultural: Adriana grew up in Cumming, Georgia, a suburban community in Cherokee County. She lives in a family that values education, community service, and a blend of Southern hospitality with multicultural
    influences from extended family traditions. Her upbringing includes attending a local public elementary school, participating in community events like the county fair, and spending weekends at nearby
    parks and lakes, fostering an appreciation for the natural environment and community cohesion.
