  career_goals: In the near term, Adriana aims to improve her grades, win the upcoming school science fair, and earn a spot in the middle school robotics club. Looking ahead, she aspires to become a wildlife
    biologist or a computer game designer, merging her love for nature and coding. She also imagines possibly becoming a teacher to share knowledge, motivated by her desire to help others understand the
    world.
