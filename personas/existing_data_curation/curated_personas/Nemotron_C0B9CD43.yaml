personas:
  professional: A budding LEGO engineer named Yi Lo channels curiosity into building intricate space stations, and they apply the same strategic mindset from chess to design functional models that balance
    creativity with practical problem‑solving.
  sports: An energetic young athlete named Yi Lo punches through taekwondo classes, practices kicks with the local youth martial arts club, cheers for the Charlotte Hornets on game nights, and they balance
    disciplined training with weekend bike rides to stay fit while maintaining a competitive edge.
  arts: A creative explorer named Yi Lo blends brush‑stroke calligraphy practice with the dinosaur illustrations of picture books, and they unwind by watching Hayao Miyazaki’s 'Spirited Away' and humming
    the catchy chorus of 'Let It Go' from Frozen, letting these artistic influences color their LEGO storytelling.
  travel: A curious traveler named Yi Lo prefers meticulously planned day trips—like the family outing to the North Carolina Museum of Natural Sciences and a sandcastle‑building weekend at Wrightsville
    Beach—yet they dream of an adventure to the Kennedy Space Center to see rockets up close, balancing structured itineraries with spontaneous imagination.
  culinary: A budding chef named Yi Lo loves helping roll dumplings and stir‑fry beef and broccoli during Lunar New Year, enjoys snacking on cheesy pizza after LEGO sessions, and they experiment with simple
    recipes like fried rice using peas, carrots, and soy sauce, showcasing a modest but growing kitchen confidence.
  core: Yi Lo is a meticulous seven‑year‑old who blends fierce curiosity with disciplined organization, channels competitive energy into LEGO and chess, worries about perfection, and they treasure quiet
    moments with calligraphy and dinosaur books.
background:
  cultural: Yi Lo is a first‑generation Chinese‑American living in Charlotte, North Carolina. His parents emigrated from Taiwan and maintain many traditions at home, speaking Mandarin at the dinner table
    and celebrating Lunar New Year with lanterns, dumplings, and family reunions. He attends a weekend Chinese language school, where he learns characters and calligraphy, reinforcing his cultural identity.
    The community’s emphasis on educational achievement and respect for elders resonates with Yi’s organized, practical demeanor, while his exposure to both American and East Asian values nurtures his adaptability
    and curiosity. Local multicultural events, such as the Charlotte Asian Festival, allow Yi to interact with peers from diverse backgrounds, expanding his social experiences while balancing his need for
    occasional solitude.
