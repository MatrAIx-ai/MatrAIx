  career_goals: Although only seven, Yi dreams of becoming an astronaut or a robotics engineer, envisioning a future where he builds machines that explore space. He also considers a more community‑focused
    role, such as a firefighter, reflecting his practical side and desire to help others. His competitive nature fuels a goal to win science fairs or robotics contests, while his cautious temperament leads
    him to set incremental milestones—mastering basic coding before tackling advanced projects—to manage his worries about failure. Yi’s long‑term ambition is to combine his curiosity about the universe
    with tangible, real‑world problem solving.
