persona_description: A prominent and influential American politician who played a crucial role in the ratification of the United States Constitution, particularly in the State Convention of 1789 that ratified
  the Constitution. He was a member of the State house of commons and served as the Speaker of the House in 1786. He was a member of the Continental Congress in 1787 and served until 1 November 1787, when
  he resigned. He served as the Chairman of the Committee of the Whole in the State Convention of 1789 that ratified the Constitution of the United States. He was a member of the State Senate in 1789, and
  was elected as an Anti-Administration candidate to the First and Second Congresses serving from 24 March 1790 until 3 March 1793. He was a member of the United States Senate from 1795 until his death
  on 27 November 1802. He was a tobacco grower and his descendants still live in Tennessee.
