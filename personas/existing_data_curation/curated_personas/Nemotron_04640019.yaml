personas:
  professional: Evette John, an aspiring freelance illustrator and visual storyteller, blends digital illustration expertise in Photoshop and Illustrator with a love of speculative fiction and solitary
    sketching, using their curiosity and relaxed approach to deadlines to craft whimsical art that resonates with niche online communities.
  sports: Evette John enjoys solitary trail runs along Frick Park’s wooded paths, participates in a local running club that meets every Saturday, roots for the Pittsburgh Steelers and the Pittsburgh Pirates,
    and occasionally joins an ultimate frisbee pickup game at the community garden, preferring low‑key cardio over high‑intensity gym workouts.
  arts: Evette John immerses themselves in creative expression, sketching speculative‑fiction‑inspired scenes in a battered notebook, curating playlists featuring Miles Davis, Erykah Badu, and Kendrick Lamar
    while editing digital illustrations, attending indie‑film screenings of directors like Jim Jarmusch at the Regent Theatre, and quoting authors such as NK Jemisin and Octavia Butler to fuel their prose.
  travel: Evette John plans trips like a loosely sketched map, favoring spontaneous weekend getaways to nearby art hubs such as Asheville’s River Arts District and the historic streets of Philadelphia,
    while dreaming of a future solo pilgrimage to Tokyo’s contemporary galleries and Oaxaca’s vibrant mural scene, balancing a modest travel budget with occasional splurges on boutique hostels.
  culinary: Evette John enjoys a quiet culinary routine, perfecting avocado‑toast with smoked paprika, whipping up miso‑glazed ramen bowls, and experimenting with seasonal vegetables like roasted beets,
    while often ordering vegan burritos from a beloved local spot after long sketching sessions, and occasionally succumbs to cheap instant noodles when deadlines loom.
  core: Evette John is a quietly curious 20‑year‑old creator who thrives in solitary sketching, merges art with speculative fiction, navigates life with a relaxed, slightly disorganized rhythm, and finds
    balance through meditation, jazz, and the occasional impulsive coffee‑shop splurge.
background:
  cultural: Evette grew up as a second‑generation African‑American in Pittsburgh’s historic Homewood neighborhood, where church gatherings, family storytelling, and community festivals shaped her identity.
    She carries a deep appreciation for the legacy of Black artists and activists from the city, drawing inspiration from the murals of the East Liberty Arts District and the musical heritage of Pittsburgh’s
    jazz scene. This cultural foundation influences her artistic voice, invites her to celebrate Black creativity, and informs her desire to give back through community‑focused art initiatives.
