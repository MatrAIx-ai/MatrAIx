  hobbies: '[''Sketching and drawing'', ''Reading speculative fiction'', ''Journaling'', ''Urban nature walks and photography'', ''Listening to jazz, neo‑soul, and hip‑hop'', ''Meditation'', ''Indie film
    appreciation'']'
  career_goals: Evette aspires to turn her artistic passion into a sustainable, flexible career. She plans to enroll in a community‑college visual arts program or a certificate in graphic design, then build
    a freelance illustration portfolio that can support remote work. Long‑term, she envisions curating community art workshops or working as a museum education coordinator, where she can share her love
    of art while maintaining the autonomy and quiet she values.
