personas:
  professional: Kathy Morland, an aspiring junior naturalist, channels her love of animals and adventure into building Lego habitats and sketching detailed wildlife journals, showing a blend of curiosity
    and a relaxed, flexible approach to learning that favors hands‑on discovery over rigid curricula.
  sports: Kathy Morland plays on the Little Kickers soccer team, enjoys weekend nature hikes with the local scouts, and cheers for the hometown baseball club the River Runners, balancing energetic play
    with a laid‑back attitude toward scheduled practice.
  arts: Kathy Morland fills a colorful nature journal with drawings of birds, elephant stickers, and piano renditions of The Backyardigans songs, while also humming Disney classics and watching The Lion
    King on repeat, merging visual creativity with a love of upbeat children’s music.
  travel: Kathy Morland has visited the city zoo and a nearby state park, dreams of seeing the coral reefs of Belize and the Eiffel Tower, and loves the vibrant chaos of Mardi Gras parades, preferring family‑friendly
    itineraries that mix discovery with familiar comforts.
  culinary: Kathy Morland favors mac and cheese with extra cheese, bites of chicken nuggets, and crunchy apple slices, proudly attempts to press pine needles into a makeshift herb garnish, and occasionally
    sneaks a cookie before dinner, showing a playful yet selective palate.
  core: Kathy Morland is a nature‑obsessed, Lego‑building 7‑year‑old whose curiosity, gentle kindness, and habit of misplacing crayons make every day an adventure tinged with charming disarray.
background:
  cultural: Kathy grew up in Baton Rouge, Louisiana, where Southern hospitality and family gatherings are central to daily life. Her family participates in church activities and celebrates local traditions
    such as Mardi Gras, enjoying parades, music, and seasonal foods like gumbo and beignets. She has been exposed to the French‑Creole influence in the city’s cuisine and festivals, while also experiencing
    the broader American school culture of sports days and community service projects. The warm climate and nearby bayous encourage outdoor play, and her school emphasizes both academic achievement and
    community values. This blend of Southern, Creole, and mainstream American influences shapes her appreciation for food, music, community celebrations, and a cooperative spirit.
