  hobbies: '[''Reading picture books and early chapter series'', ''Drawing animals and nature scenes'', ''Building and redesigning Lego structures'', ''Exploring parks and collecting natural items'', ''Playing
    board games with family'', ''Singing children’s songs'', ''Using educational tablet games'', ''Visiting the zoo and local festivals'']'
  career_goals: Kathy dreams of a future where she can combine her love for learning, caring for others, and hands‑on problem solving. She often says she wants to become a teacher because she enjoys sharing
    stories and helping classmates understand new ideas, while also imagining herself as a veterinarian who cares for animals she meets at the park. At times she mentions wanting to be a community helper,
    like a nurse or park ranger, where she can use her curiosity to explore the natural world and her kindness to support people. Her goals reflect a balance of practicality—wanting a stable, helpful role—and
    curiosity—being excited to discover new things.
