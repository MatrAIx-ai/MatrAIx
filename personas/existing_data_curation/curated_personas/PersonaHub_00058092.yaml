persona_description: Carla Hannaford, an internationally acclaimed expert in the field of movement and learning, who presents the latest scientific evidence linking movement to learning. Her book, Smart
  Moves, offers clear alternatives and remedies for creating more effective learning situations in homes and schools, including holistic views of learners, less emphasis on rote learning, more experiential,
  active instruction, less labeling of learning disabilities, more physical movement, more personal expression through arts, sports, and music, and less prescribing of drugs like Ritalin. Her book also
  includes instructions for performing Brain Gym movements to build neural pathways and reverse the effects of neural damage in a natural drug-free way.
