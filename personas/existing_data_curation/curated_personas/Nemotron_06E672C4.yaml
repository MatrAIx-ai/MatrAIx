personas:
  professional: James Roach, a budding young illustrator and budding programmer, combines a vivid curiosity for new ideas with disciplined organization to produce watercolor character sketches and simple
    Scratch animations that delight peers and teachers alike.
  sports: James Roach rushes onto the neighborhood park courts for after‑school basketball, idolizing the New York Knicks and joining the local youth club the Riverside Hoops, where they blend daily pick‑up
    games with organized practice sessions that keep them agile and teamwork‑focused.
  arts: James Roach pours their imagination into watercolor sketches of fantasy heroes while grooving to gospel torchbearer Kirk Franklin, R&B queen Alicia Keys, and hip‑hop poet Kendrick Lamar, and they
    fuel their creative spark by devouring graphic novels by Jeff Smith and watching Studio Ghibli films.
  travel: James Roach loves planning weekend road trips with their family, has already explored the historic streets of Washington, D.C., and dreams of visiting the vibrant splash‑colored markets of Marrakech
    and the interactive science centre at the Exploratorium in San Francisco.
  culinary: James Roach eagerly helps stir collard greens, coax buttery mac and cheese, and season fried chicken at family gatherings, developing a kid‑friendly but confident cooking skill set that favors
    bold spices like smoked paprika and a sweet spot for piping hot cornbread.
  core: James Roach is a curiosity‑driven nine‑year‑old who blends artistic flair, teamwork on the basketball court, and a disciplined allowance habit, all while sprinkling soul‑food aromas and catchy beats
    into everyday life.
background:
  cultural: James is an African‑American boy raised in Montgomery, Alabama, a city steeped in civil‑rights history and Southern traditions. His family participates in church life, celebrates holidays such
    as Juneteenth, Kwanzaa, and family reunions that feature soul‑food cooking and storytelling. He learns about African‑American heritage through school curricula, community events, and the music that
    fills his home, fostering a strong sense of pride, community, and respect for his cultural roots.
