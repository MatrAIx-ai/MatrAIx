  hobbies: '[''Drawing'', ''Watercolor painting'', ''LEGO building'', ''Basketball'', ''Reading adventure books'', ''Scratch coding'', ''Listening to music'', ''Cooking with family'']'
  career_goals: James dreams of becoming an artist or designer who can create murals that celebrate his community, or a teacher who inspires other kids to explore creativity and science. He also imagines
    developing simple games or animations that combine his love for art and technology, hoping one day to contribute to projects that bring joy and learning to others.
