  hobbies: '[''Reading nonfiction (personal development, DIY)'', ''Knitting and crocheting'', ''Indoor herb and succulent gardening'', ''Journaling'', ''Guided meditation and breathing exercises'', ''Cooking
    traditional Guatemalan meals'', ''Listening to folk music'', ''Puzzle solving (crosswords, jigsaw)'', ''DIY home improvement projects'']'
  career_goals: Paula aspires to move from a front‑line production role into a supervisory position within the next three years. She plans to obtain a certified forklift operator credential and enroll in
    a community‑college certification program in industrial safety and quality assurance. Her long‑term ambition is to become a shift lead or quality‑assurance specialist, where she can apply her curiosity
    for new production methods while maintaining the practical, reliable standards she values. Additionally, she hopes to secure a schedule that offers predictable hours, helping her manage anxiety and
    maintain a stable home environment for her family.
