personas:
  professional: Justin Lewis is a seasoned community engagement consultant who leverages his humanities background, professional storytelling, and methodical project management to craft compelling narratives
    for nonprofits, while his sociable, competitive, and slightly skeptical nature drives them to secure resources and lead high‑visibility events with confidence.
  sports: Justin Lewis hikes the Santa Cruz Mountains every weekend, mentors a senior walking club, follows the San Jose Sharks (NHL) and San Jose Earthquakes (MLS) closely, and participates in a local
    senior tennis league at the SJ Community Center, balancing low‑impact cardio with occasional competitive spirit that they enjoy.
  arts: Justin Lewis regularly attends and occasionally hosts productions at the San Jose Repertory Theatre, delights in the performances of Meryl Streep and the music of Leonard Cohen, curates a personal
    collection of Annie Leibovitz photographs, and incorporates his own street photography of the city’s murals into his event flyers, showing how the arts anchor their social and creative identity.
  travel: Justin Lewis prefers meticulously planned weekend getaways, such as wine‑tasting tours in Napa Valley, culinary explorations of Portland’s food carts, and hiking trips to Big Sur, while dreaming
    of a cultural immersion tour of Lisbon and a historic pilgrimage through Tuscany, balancing adventure with a fondness for familiar Californian scenery that they savor.
  culinary: Justin Lewis enjoys cooking farm‑to‑table dishes like roasted beet and goat‑cheese salad, pan‑seared salmon with rosemary‑infused potatoes, and hearty ratatouille using heirloom tomatoes and
    fresh basil, while also indulging in Pinot Noir pairings at local vineyards, reflecting a modest but confident kitchen skill set that they continually refine.
  core: Justin Lewis is a talkative, competitive community storyteller who blends meticulous planning with a love for theater, chess, hiking, and occasional wine‑splurges, all while nurturing a modest garden
    and a budding podcast project that they hope will spotlight San Jose’s hidden histories.
background:
  cultural: Justin grew up in a middle‑class, middle‑western family with German‑Irish ancestry, where education and community involvement were core values. His parents, both teachers, fostered an early
    appreciation for literature, history, and civic duty. After earning a BA in Humanities, he moved to the Bay Area during the early tech boom, where he absorbed the region’s forward‑looking, innovation‑driven
    atmosphere while maintaining his liberal‑arts perspective. Living in San Jose, he is immersed in a multicultural environment that has broadened his worldview, yet his ethnic background and upbringing
    have instilled a respect for tradition and a pragmatic approach to new ideas. This blend of Midwestern roots, humanities education, and Silicon Valley exposure informs his balanced curiosity and practicality,
    as well as his competitive yet community‑oriented outlook.
