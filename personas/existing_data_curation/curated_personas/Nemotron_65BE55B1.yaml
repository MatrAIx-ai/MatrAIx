  career_goals: Although currently out of the formal workforce, Justin aims to transition into a part‑time consultancy role for local nonprofits, helping them craft compelling narratives and run efficient
    community events. He envisions launching a podcast that highlights San Jose's hidden historical stories and arts scene, blending his curiosity with practical storytelling. He also aspires to serve on
    the city’s cultural advisory board, using his organized, reliable nature to influence policy on public art and heritage preservation. Mentoring remains central to his ambitions, as he seeks to coach
    younger professionals in effective communication and strategic outreach, thereby leaving a lasting impact on the community he cherishes.
