personas:
  professional: Phuong Acuna is a Chicago‑based canine and feline behavior specialist who designs individualized, positive‑reinforcement training programs, leads community group classes at local shelters,
    and leverages a humanities background to mediate owner‑pet conflicts, all while balancing a love for structured lesson plans with a naturally flexible, people‑oriented work style.
  sports: Phuong Acuna is an avid urban hiker who traverses Chicago’s Lakefront Trail three times a week, follows the Chicago Bulls and Chicago White Sox, and volunteers as a handler for a local dog agility
    club, blending structured cardio sessions with spontaneous dog‑park play to stay fit.
  arts: Phuong Acuna enriches their creative side by attending weekly improv workshops, dancing to Latin rhythms by Rosalía and Vietnamese pop hits like those of Sơn Tùng M‑TP, and diving into contemporary
    fiction such as Yaa Gyasi’s Homegoing, letting these artistic experiences inform an empathetic training philosophy.
  travel: Phuong Acuna plans weekend getaways to explore Chicago’s vibrant neighborhoods, delightfully revisits New Orleans for its music and food, and dreams of a culinary pilgrimage to Hanoi and Ho Chi Minh
    City, balancing short road trips with long‑haul flights that satisfy a curiosity for diverse cultures.
  culinary: Phuong Acuna is a self‑taught home chef who frequently prepares aromatic pho broth seasoned with star‑anise and ginger, crisps bánh mì on a cast‑iron pan with pâté and pickled veggies, and whips
    up coconut‑rich laksa brimming with lemongrass, shrimp, and fresh Thai basil, constantly experimenting with new herbs and spices.
  core: Phuong Acuna is a compassionate animal trainer who juggles meticulous lesson planning with a quirky habit of over‑booking social events, a chronic love for late‑night pho, and a steadfast belief
    that every wagging tail can bridge cultural gaps.
background:
  cultural: Phuong hails from a Vietnamese‑American family that settled in Chicago’s Jefferson Park area. She grew up bilingual, navigating both the collectivist values of her parents’ heritage—respect
    for elders, community interdependence, and compassion for all living beings—and the individualistic, fast‑paced environment of the city. These dual influences shape her compassionate training style
    and her commitment to inclusive, community‑oriented programs that honor cultural traditions while promoting animal welfare.
attributes:
  skills: '[''Animal behavior assessment'', ''Positive reinforcement training'', ''Individualized training program design'', ''Group class facilitation'', ''Client counseling and education'', ''Agility
