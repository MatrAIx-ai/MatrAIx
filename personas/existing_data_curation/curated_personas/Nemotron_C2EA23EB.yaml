    resolution and mediation'']'
  hobbies: '[''Dog park meetups with owners'', ''Volunteer work at animal shelters'', ''Cooking traditional Southeast Asian dishes'', ''Urban hiking on the Lakefront Trail'', ''Community dance classes (Vietnamese
    pop, Latin)'', ''Improv comedy workshops'', ''Attending cultural festivals'']'
  career_goals: Phuong aims to earn the Certified Professional Dog Trainer (CPDT‑K) credential within the next two years and eventually open a community‑focused training center in Chicago's Uptown neighborhood.
    She envisions expanding her services to include animal‑assisted therapy programs for hospitals and senior centers, especially targeting underserved Southeast Asian immigrant families. Long‑term, she
    hopes to collaborate with academic researchers to develop culturally sensitive training curricula and publish a guidebook that blends humane animal‑training methods with her humanities background. She
    also aspires to mentor aspiring trainers from diverse backgrounds.
