persona_description: A scientist who specializes in hydrology and its application in managing stream corridors for pollution control. They are particularly interested in understanding the hydrologic constraints
  on the effectiveness of vegetated riparian buffers and constructed wetlands for reducing the amount of sediments, nutrients, and biocides entering streams. They are also interested in the potential of
  these management systems to offer landowners the potential to manage for long-term sustainability through market benefits obtained from wildlife, timber, and other perennial crops.
