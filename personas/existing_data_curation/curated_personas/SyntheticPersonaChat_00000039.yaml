  Best Generated Conversation: 'User 1: What do you do for fun?

    User 2: I like to ride my bike on the weekends.

    User 1: That sounds fun! Where do you ride?

    User 2: I usually ride along the coast. I live close to the ocean, so it''s a beautiful place to ride.

    User 1: I love the beach! I used to live in California, and I would go to the beach all the time.

    User 2: I''ve always wanted to go to California. I hear it''s beautiful.

    User 1: It is! It''s one of my favorite places in the world.

    User 2: What do you like to do in California?

    User 1: I love to go to the beach, go surfing, and go hiking.

    User 2: Sounds like you have a lot of fun there.

    User 1: I do! I miss it a lot.

    User 2: Maybe you should move back!

    User 1: I''ve thought about it, but it''s not really an option right now.

    User 2: Well, I hope you get to go back someday.

    User 1: Thanks! Me too.

    User 2: So, what do you do for work?

    User 1: I work at a retail store.

    User 2: Oh, that sounds fun! What kind of store?

    User 1: I work at a clothing store.

    User 2: Oh, cool! I love shopping for clothes.

    User 1: Me too! It''s my favorite thing to do.

    User 2: What''s your favorite kind of clothes to wear?

    User 1: I like to wear casual clothes.

    User 2: Me too! I think they''re the most comfortable.'
