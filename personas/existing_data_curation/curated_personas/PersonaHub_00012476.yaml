persona_description: A behavioral scientist who specializes in the study of nonhuman primates and their behavior, particularly in the context of environmental enrichment and psychological well-being. This
  individual has expertise in conducting monthly behavioral assessments, analyzing data collected from nonhuman primates, and presenting findings at scientific conferences and publishing in scientific journals.
  They have a strong interest in the development and implementation of effective environmental enrichment plans and have revised the BEEP several times to address new methods of enrichment and to meet the
  psychological, physical, and social needs of the nonhuman primates housed at BIOQUAL, Inc.
