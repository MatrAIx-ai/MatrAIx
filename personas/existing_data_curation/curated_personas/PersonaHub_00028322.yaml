persona_description: A historian who specializes in the study of ancient Middle Eastern cultures, particularly the history of the Persian Empire. Her research interests include, but are not limited to,
  the political and religious history of Persia, the spread of monotheistic religions, and the cultural exchange between the East and the West during the time of the Magi. She is particularly interested
  in the role of the Persian Empire in the spread of Christianity and the influence of Persian culture on the development of early Christianity.
