personas:
  professional: Rayner Ellis is a bilingual administrative assistant whose razor‑sharp organization, adept use of Microsoft Office, Google Workspace, and natural curiosity for artistic environments enable
    them to streamline office workflows while effortlessly coordinating community‑focused events.
  sports: Rayner Ellis drops into the Wynwood Hoops Club for pick‑up basketball on Saturday evenings, follows the Miami Heat with fervor, roots for the Miami Marlins in the spring, and powers through a
    weekly HIIT class at a local gym to stay agile.
  arts: Rayner Ellis curates a visual diary of Wynwood’s ever‑changing murals while immersing in jazz sessions by Kamasi Washington, hip‑hop beats from Kendrick Lamar, and Afro‑Caribbean rhythms of Buju
    Banton, and they regularly volunteer to assist at Art Basel pop‑up installations, drawing inspiration from emerging artists like Kehinde Wiley and Tschabalala Self.
  travel: Rayner Ellis prefers quick, budget‑friendly escapes, having explored the historic streets of Cartagena, the turquoise reefs of the Florida Keys, and the vibrant music scene of Kingston, while
    dreaming of a cultural pilgrimage to Lisbon’s Alfama district to trace fado roots.
  culinary: Rayner Ellis, an intermediate home chef, delights in whipping up jerk chicken with scotch bonnet peppers, simmered collard greens with smoked paprika, and sweet fried plantains, often experimenting
    with Caribbean spice blends while occasional over‑seasoning leads to fiery surprise.
  core: Rayner Ellis blends meticulous administrative talent with an insatiable appetite for art, music, and community, juggling spreadsheets by day and street murals by night, all while keeping a laid‑back
    swagger that sometimes leads to late‑night coffee binges and occasional over‑spiced meals.
background:
  cultural: Rayner grew up as a Black American in the multicultural tapestry of Miami. His family background blends Southern African‑American traditions with Caribbean influences common in the city, shaping
    a rich cultural identity that values community, music, and artistic expression. He has been immersed in the city’s Afro‑Latino environment, speaking Spanish fluently alongside English, and participating
    in local festivals that celebrate Black and Caribbean heritage. This cultural grounding informs his respect for diversity, his appreciation of visual and musical arts, and his commitment to uplifting
    under‑represented voices.
attributes:
  skills: '["Microsoft Office Suite (Word, Excel, PowerPoint)", "Google Workspace (Docs, Sheets, Calendar)", "Calendar and schedule management", "Customer service and front-desk communication", "Data entry
    and record keeping", "Basic bookkeeping and expense tracking", "Bilingual Spanish-English communication", "Event planning and coordination", "Document preparation and formatting", "Time management and
    multitasking", "Problem solving", "Adaptability to new software"]'
  hobbies: '["Visiting street art murals and galleries", "Photography", "Listening to jazz, hip‑hop, and Afro‑Caribbean music", "Playing basketball", "Cooking soul food and Caribbean cuisine", "Volunteering
    at community center tutoring programs", "Reading contemporary fiction", "Attending cultural festivals (Miami Carnival, Art Basel)", "Sketching", "Exploring diverse neighborhoods (Coconut Grove, Little
    Havana)"]'
  career_goals: Rayner aims to advance from his current administrative assistant role to an office manager position within the next two to three years, leveraging his organizational strengths and people
    skills. He plans to complete a bachelor's degree in Business Administration or Arts Management, aspiring to merge his administrative expertise with his passion for the arts by coordinating cultural
    events or managing galleries. Long‑term, he envisions leading a multidisciplinary arts hub that supports emerging Black and Latino artists in Miami, while also mentoring young professionals entering
    the administrative field.
