persona_description: A scientist and environmentalist who specializes in studying the effects of human activities on seagrass distribution in coastal areas, particularly in Xincun Bay. They have a background
  in hydrodynamics, 1-D hydrodynamic models, and satellite remote sensing, and have conducted research to map seagrass distribution using Landsat TM and CBERS data. They have published research on the impact
  of human activities such as shrimp farming, aquaculture, fishing, and land use change on seagrass growth, and have identified factors such as typhoons and extreme tidal hydrodynamics as important factors
  affecting seagrass distribution. They have also analyzed the reasons for seagrass reduction in Xincun Bay, which included human activities and extreme natural disasters such as typhoons and extreme tidal
  hydrodynamics, and have proposed strategies for seagrass recovery.
