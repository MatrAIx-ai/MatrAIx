personas:
  professional: Song Kim is a seasoned correctional officer with over two decades of experience who excels at conflict de‑escalation, clear communication, and bilingual mediation, and they leverage their
    practical curiosity and flexible approach to lead teams while eyeing a supervisory role in restorative justice.
  sports: Song Kim enjoys hiking the Cuyahoga Valley trails and practices yoga twice a week for flexibility, they cheer on the Cleveland Browns and the Cleveland Cavaliers, and they participate in a local
    recreational softball league while occasionally neglecting scheduled cardio sessions due to a laid‑back approach to routine.
  arts: Song Kim finds creative release in listening to true‑crime podcasts by Sarah Koenig, reading contemporary mystery novels by Tana French, appreciating the films of director Bong Joon‑ho, and they
    attend community theater productions of classic Shakespeare plays when time permits.
  travel: Song Kim prefers spontaneous weekend getaways over rigid itineraries, they often drive to Niagara Falls or Shenandoah National Park for short hikes, dream of exploring Jeju Island’s coastal markets
    to source fresh seafood for cooking, and they balance travel with the practical need to care for their garden at home.
  culinary: Song Kim is an avid home cook who specializes in Korean dishes like kimchi, bibimbap, and spicy pork bulgogi, they skillfully blend fresh garden harvests such as zucchini, kale, and cherry tomatoes
    into meals, enjoy experimenting with gochujang, sesame oil, and fermented sauces, and they treat dinner parties for friends as both social bonding and a chance to refine culinary techniques.
  core: Song Kim blends a pragmatic, flexible mindset with a love for community‑focused correctional work, garden‑grown meals, and spontaneous hikes, but they often let disorganization sneak into budgeting
    and appointment‑keeping.
background:
  cultural: Song The Kim is a second‑generation Korean‑American who grew up in the Cleveland suburbs. Her family emphasized education, respect for elders, and community involvement, traditions that still
    shape her worldview. Fluent in both Korean and English, she regularly participates in local Korean cultural events such as Chuseok celebrations and Korean language school gatherings, preserving her
    heritage while also embracing the diverse multicultural fabric of Ohio. This bicultural perspective informs her interpersonal style—valuing harmony, patience, and direct yet respectful communication—both
    on and off the job.
attributes:
  skills: '[''Conflict de‑escalation'', ''Crisis response'', ''Inmate supervision'', ''Surveillance and observation'', ''Incident documentation'', ''Security protocol enforcement'', ''Bilingual communication
    (Korean/English)'', ''Team collaboration'', ''Problem‑solving'', ''Physical fitness and self‑defense'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Korean cooking'', ''Reading mystery novels'', ''Yoga'', ''Listening to podcasts on psychology and criminal justice'', ''Volunteering as an English tutor'']'
  career_goals: While she appreciates the stability of her current role, Song aspires to transition into a supervisory position within the correctional system, such as shift supervisor or unit manager,
    where she can mentor newer officers and influence policy implementation. She plans to complete her associate degree in criminal justice and later pursue a bachelor’s in social work to develop rehabilitation
    programs focused on mental‑health support for inmates. Ultimately, she hopes to contribute to restorative‑justice initiatives that integrate community resources and cultural competence, positioning
    herself as a bridge between correctional institutions and the broader public.
