persona_description: A botanist who specializes in the study of kudzu plants, particularly the Pueraria montana var. lobata species. Her research interests include the ecological, biogeographic, and environmental
  impacts of kudzu on riparian vegetation, moist forests, watercourses, roadsides, waste areas, and disturbed sites in warmer temperate, sub-tropical, and tropical regions. She is also interested in the
  horticultural and economic potential of kudzu for use as a weed control agent, and the potential for its use as a food source for wildlife.
