    in school art club'', ''Attending local art workshops'', ''Volunteer mural projects'', ''Nature hikes'', ''Listening to indie music'']'
  career_goals: Kyong aspires to blend her artistic talent with technology, aiming to become a concept artist or UI/UX designer for video games or interactive media. She dreams of attending a specialized
    high school for visual arts, followed by a university program in digital media or animation, where she can refine her style and learn advanced 3D modeling. In the longer term, she hopes to create her
    own indie games that incorporate storytelling and visual aesthetics, using art as a vehicle to raise awareness about mental‑health challenges among her peers. She also envisions contributing to community
    art projects that celebrate her East‑Asian heritage.
