personas:
  professional: Kyong George is an aspiring teen digital illustrator, blending hand‑drawn manga‑style sketches with Photoshop and Procreate to create fan‑art and original characters, and they channel their
    competitive streak into mastering speed‑drawing challenges while balancing school responsibilities.
  sports: Kyong George enjoys seasonal snowboarding in the winter and follows the Denver Broncos, Colorado Rockies, and Denver Nuggets, while occasionally joining a local youth soccer league for cardio,
    preferring solo hikes over team sports to recharge.
  arts: Kyong George is deeply immersed in the world of anime, idolizing Studio Ghibli’s Hayao Miyazaki and Makoto Shinkai, while regularly drawing fan‑art of My Hero Academia, listening to lo‑fi beats
    by Joakim Karud, and collecting graphic novels such as Heartstopper and Saga for artistic inspiration.
  travel: Kyong George loves weekend trips to Rocky Mountain National Park and Red Rocks Amphitheatre for sketching landscapes, dreams of attending the Tokyo Comic Con to meet creators, and plans a future
    backpacking trip through Europe’s art capitals after high school.
  culinary: Kyong George’s palate favors spicy ramen with tonkotsu broth, avocado toast topped with feta, and homemade sushi rolls, and they experiment in the kitchen by fusing Japanese flavors with Mexican
    tacos, though they often forget to eat properly during intense art marathons.
  core: Kyong George is a competitively driven teen artist whose creative fervor, intense emotions, and occasional impulsive spending shape a vivid, restless worldview.
background:
  cultural: Kyong is a second‑generation East‑Asian American, with her family roots in South Korea. Growing up in Englewood, Colorado, she navigates a bicultural identity that blends Korean traditions—such
    that she celebrates Chuseok, speaks Korean at home, and enjoys Korean cuisine—with the multicultural experiences of a suburban U.S. setting. This dual heritage influences her aesthetic sensibility,
    evident in her incorporation of Korean calligraphic strokes and pop‑culture motifs into her artwork. She participates in local Asian cultural festivals and language meet‑ups, and her household places
    a strong emphasis on educational achievement while also encouraging artistic exploration. The mix of community support and exposure to diverse American art scenes nurtures her openness to unconventional
    ideas and fuels her curiosity.
