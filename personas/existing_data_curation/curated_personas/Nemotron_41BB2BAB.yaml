  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Book Club Participation'', ''DIY Home Projects'', ''Community Volunteering'', ''Quilting'', ''High-school Football Game Attendance'', ''Competitive
    Board Games'', ''Yoga'', ''Cooking Texas BBQ'']'
  career_goals: Lynn aims to transition from teaching assistant to a fully credentialed classroom teacher within the next two years by completing her Texas teacher certification and pursuing a master's
    degree in Educational Leadership. She envisions taking on a lead instructional coach role, where she can design and implement data-driven curriculum improvements that raise student achievement scores.
    Her competitive streak drives her to earn district-wide recognition for innovative instructional practices and to lead professional-development workshops that showcase effective technology integration.
    Long-term, she aspires to become a curriculum coordinator or assistant principal, shaping school-wide policies while maintaining a hands-on connection to classroom learning. Throughout her career progression,
    she plans to continue refining her expertise in special-education support and evidence-based instructional design.
