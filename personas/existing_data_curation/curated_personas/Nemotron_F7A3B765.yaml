  hobbies: '[''vegetable gardening'', ''traditional Mexican cooking'', ''wine tasting'', ''playing acoustic guitar'', ''singing folk songs'', ''walking/hiking'', ''reading historical biographies'', ''volunteering
    as a mentor for high school students'']'
  career_goals: Pedro aims to transition from day‑to‑day sales management to a senior advisory role within the next three years, leveraging his decades of experience to mentor the next generation of sales
    leaders. He plans to develop a structured training program that emphasizes ethical selling, data‑driven decision making, and cross‑cultural communication. Additionally, he intends to champion sustainability
    initiatives in the product lines his company represents, aligning business goals with environmental stewardship. Ultimately, he seeks a phased retirement that preserves his family’s financial security
    while allowing him to continue consulting part‑time and volunteer in community business development.
