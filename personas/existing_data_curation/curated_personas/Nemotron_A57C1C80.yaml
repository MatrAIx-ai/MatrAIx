personas:
  professional: Tyrone Smith, a newborn with a naturally curious gaze, already demonstrates the methodical attention to detail that could one day flourish into a career as a data scientist, as they meticulously
    explore the world through touch and sound.
  sports: Tyrone Smith, despite being an infant, has been gently introduced to water play at a local swim class, is a budding fan of the Boston Red Sox, and has been enrolled in a toddler gymnastics club
    that encourages early motor skill development.
  arts: Tyrone Smith often gazes at a hand-crafted mobile featuring Van Gogh's 'Starry Night' motifs and responds enthusiastically to classical Mozart sonatas, reflecting an early appreciation for visual
    and auditory arts that shapes their calm, solitary playtime.
  travel: Tyrone Smith enjoys the rhythmic comfort of car rides to grandparents' farmhouse in the countryside and dreams of a future family trip to the Grand Canyon, while currently preferring quiet nap
    spots in stroller-friendly city parks.
  culinary: Tyrone Smith prefers the gentle sweetness of breast milk and, once introduced, shows a particular fondness for pureed mango and avocado, while their parents often prepare homemade oatmeal with
    a pinch of cinnamon for early palate development.
  core: Tyrone Smith is a newborn whose inquisitive, methodical nature and gentle disposition drive a quiet yet richly sensory exploration of the world, punctuated by a love of soft music and soothing routines.
background:
  cultural: Tyrone is a Black child born and raised in Atlanta’s Fulton County, a city known for its rich African‑American history, music, and activism. His family celebrates cultural traditions such as
    Juneteenth, soul food gatherings, and the annual Atlanta Black Pride. He is part of a community that values artistic expression, church involvement, and strong intergenerational support, all of which
    shape his emerging worldview.
