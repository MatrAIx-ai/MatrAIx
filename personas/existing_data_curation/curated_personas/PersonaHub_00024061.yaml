persona_description: A historian who is interested in the history of the United States, particularly the early 20th century. They are fascinated by the legal struggles of Eugene V. Debs, founder of the
  American Socialist Party and four-time presidential candidate, and the events that led to his arrest for violating the Espionage Act and the three-and-a-half-year amnesty campaign Debs’ supporters waged.
  They appreciate the complexity of social forces at work during the early 20th century and are drawn to the story of Debs’ arrest and the three-and-a-half-year amnesty campaign. They are also interested
  in the issues of free speech and how they were defined and challenged during the Great War and the early 20th century.
