  hobbies: '["Heirloom vegetable gardening","Canning and preserving seasonal harvests","Reading historical fiction and biography","Birdwatching in Cache County wetlands","Quilting and hand knitting","Jigsaw
    puzzles and crossword puzzles","Genealogy research and family storytelling"]'
  career_goals: Although retired, Joie's ambitions focus on preserving her independence and contributing quietly to her community. She aims to complete a written memoir that weaves together her family's
    pioneer history and her own life lessons, creating a resource for younger relatives. She also wishes to continue volunteering in a behind‑the‑scenes capacity—organizing donation drives and keeping accurate
    inventories—while ensuring her personal affairs are meticulously arranged for the future. In addition, she hopes to attend a local heritage workshop to deepen her knowledge of Cache County’s history
    and to pass that knowledge on through informal mentorship.
