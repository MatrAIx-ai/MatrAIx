persona_description: A dedicated and experienced ESL teacher who specializes in providing comprehensive and effective ESL services to English Learners in LISD. She is knowledgeable about the requirements
  set forth by Texas Administrative Code Chapter 89 regarding ESL program services, and has a deep understanding of the principles and practices of second language acquisition. She is skilled in implementing
  research-based Sheltered Instruction strategies that support second language acquisition and academic language development in all content areas. She is also knowledgeable about the special programs offered
  by LISD, including the Virtual Pathway ESL Supplemental and the summer language enrichment program, The Newcomer Immigrant Summer Academy (NISA). She is committed to ensuring that all English Learners
  receive the support and resources they need to succeed in their academic and personal endeavors.
