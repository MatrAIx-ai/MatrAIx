personas:
  professional: Eligio Pena is an aspiring digital illustrator and junior robotics enthusiast whose curiosity drives them to blend hand‑sketched comic characters with programmable LED‑enhanced robot prototypes,
    balancing meticulous sketching sessions with flexible coding experiments, and they reliably meet club deadlines while staying open to unconventional design ideas.
  sports: Eligio Pena plays midfield for a neighborhood soccer squad that competes against local clubs, passionately roots for Los Angeles FC during televised matches, and joins a youth hiking club to trek
    the Angeles National Forest trails on weekends, combining team spirit with a love for outdoor adventure.
  arts: Eligio Pena sketches superhero‑inspired panels reminiscent of Jim Lee’s dynamic lines, experiments with Procreate’s digital brushes while listening to Arctic Monkeys and the orchestral scores of
    Studio Ghibli, and draws inspiration from indie video‑game art styles like those of Hollow Knight, shaping a uniquely eclectic creative voice.
  travel: Eligio Pena dreams of attending the Tokyo Comic Con and exploring the majestic cliffs of Yosemite National Park, plans trips around school breaks with meticulously drafted itineraries that mix
    museum tours with hiking, yet realistic budget constraints often redirect their adventures to nearby state parks and weekend road trips to the Pacific Coast.
  culinary: Eligio Pena loves helping their family craft a holiday roast turkey with herb‑infused gravy and a buttery apple pie, while also mastering teen‑friendly dishes such as garlic pasta, pepperoni
    pizza seasoned with fresh basil, and avocado toast drizzled with olive oil, showcasing a palate that balances comfort classics with fresh, simple flavors.
  core: Eligio Pena is a curious, organized teen who seamlessly juggles comic‑book sketching, robot building, and soccer, staying emotionally steady while occasionally staying up late to perfect a digital
    illustration.
background:
  cultural: Eligio grows up in a Mexican‑American household in Palmdale, where Spanish is spoken at home alongside English. His family celebrates Día de los Muertos, La Posada, and Mexican Independence
    Day with vibrant altars, food, and music, which has inspired his artistic motifs and color palette. He frequently visits his grandparents, learning traditional recipes and stories that reinforce a sense
    of community and respect for elders. This cultural immersion nurtures his cooperative nature and his desire to create work that honors his heritage while engaging a broader, multicultural audience.
