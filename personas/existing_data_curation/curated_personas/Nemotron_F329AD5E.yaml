    family meals'']'
  career_goals: Eligio aims to attend a specialized arts high school in the Los Angeles area where he can deepen his skills in illustration and animation. In the long term, he envisions a career as a concept
    artist or UI/UX designer for video games and interactive media, combining his love for storytelling, visual art, and technology. He also hopes to earn a scholarship to a university with a strong digital
    arts program, such as CalArts or USC, and later give back to his community by mentoring younger students from Mexican‑American backgrounds in creative technology workshops.
