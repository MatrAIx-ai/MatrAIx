  career_goals: Approaching retirement, Ngoc Ngoc aims to transition into a mentorship or training role that leverages her decades of production experience while reducing physical strain. She hopes to become
    a safety and quality coach for newer employees, helping them develop reliable work habits and fostering a supportive, low‑stress environment. Additionally, she wishes to volunteer part‑time at a local
    community art center, where she can share her love of art and cultural crafts with seniors and youth, blending her compassionate nature with her artistic curiosity.
