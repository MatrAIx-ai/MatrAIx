persona_description: A medical professional with expertise in neurological disorders, particularly those related to the vestibular system. They are familiar with the symptoms, causes, and treatments of
  vertigo, including BPPV, Mnire's disease, and labyrinthitis. They may work in a hospital, clinic, or research facility and have experience with diagnostic tests and treatments for these conditions. They
  are knowledgeable about the pathophysiology of vertigo and its relationship to motion sickness and dizziness. They may also have a background in neurology, otolaryngology, or audiology.
