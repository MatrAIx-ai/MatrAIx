personas:
  professional: Jessica Townsend is an aspiring multimedia storyteller who combines sketching, LEGO building, and Scratch coding to prototype whimsical fantasy narratives, using their organized yet flexible
    approach and natural confidence to lead school theatre script workshops.
  sports: Jessica Townsend enjoys after‑school soccer with the local Sunrise FC, idolizes the Chicago Cubs and the Chicago Bulls on TV, and keeps fit by biking around the park on weekends, preferring group
    activities where they can chat with teammates.
  arts: Jessica Townsend immerses themselves in the arts by sketching characters inspired by Studio Ghibli’s Spirited Away, painting dreamy landscapes after reading Oliver Jeffers’ picture books, listening
    to piano works by Ludovico Einaudi while practicing, and regularly attending community‑center workshops featuring local muralist Maya Rivera.
  travel: Jessica Townsend loves weekend trips to the city’s science museum and annual visits to the state botanical gardens, dreams of exploring Kyoto’s lantern‑lit streets, and plans a future family vacation
    to Paris to see the Louvre’s famous art, always packing a sketchbook to capture new sights.
  culinary: Jessica Townsend prefers homemade pizza topped with mozzarella, pepperoni, and fresh basil, enjoys making strawberry‑banana fruit kebabs, and often reheats chocolate chip cookies for a quick
    snack, though they sometimes forget to preheat the oven in their rush.
  core: Jessica Townsend is a high‑energy, imagination‑driven 11‑year‑old who balances organized creativity with vibrant social flair, often juggling art projects, LEGO builds, and spontaneous storytelling
    sessions.
background:
  cultural: Jessica comes from a white, middle‑class New England family in Wellesley Hills, Massachusetts. Her upbringing reflects the region’s emphasis on education, community involvement, and encouragement
    of the arts. She participates in local library programs, attends community events like summer fairs and town clean‑ups, and celebrates typical American holidays while also learning about her European
    ancestral roots (e.g., Irish and English) through family stories and traditions. The suburban environment provides easy access to museums in Boston, nature trails, and a supportive school system that
    promotes STEAM initiatives.
attributes:
  skills: '["Drawing and illustration", "Creative writing", "Digital storytelling (Scratch)", "Public speaking", "Group project coordination", "Basic piano", "Idea generation and brainstorming"]'
