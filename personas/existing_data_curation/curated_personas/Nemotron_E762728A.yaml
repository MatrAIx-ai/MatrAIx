    games with friends", "Visiting the local library", "Attending community art workshops"]'
  career_goals: Jessica dreams of turning her imagination into a career, aspiring to become a children's book author and illustrator, envisioning publishing her own stories, or becoming an animator for
    animated series. She also hopes to start a community youth art club, host a podcast or YouTube channel that explores art and creativity, and eventually study art and media in college to become a creative
    director for interactive experiences.
