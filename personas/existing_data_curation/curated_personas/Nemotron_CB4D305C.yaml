personas:
  professional: Jonathan Wirth, a 14‑year‑old self‑described as a budding electronics tinkerer, spends weekends disassembling old gadgets and assembling basic computer components, and they approach each
    project with a methodical, competitive mindset that reflects their love for quick decision‑making in video games while reluctantly juggling school assignments.
  sports: Jonathan Wirth shoots hoops daily with the Ringgold Community Youth Basketball League, idolizes the Atlanta Hawks and the Georgia Bulldogs, and joins his dad for early‑morning fishing trips on
    Lake Imani, approaching fitness with a competitive edge that occasionally overshadows team cooperation, and they channel that drive into both individual drills and occasional team play.
  arts: Jonathan Wirth is drawn to classic rock legends like Lynyrd Skynyrd and country stars such as Alan Jackson, strums a second‑hand acoustic guitar taught by his brother, and sketches comic‑book heroes
    in the style of Stan Lee during school breaks, allowing them to channel their competitive drive into creative expression.
  travel: Jonathan Wirth enjoys weekend road trips to Lake Imani for fishing, day‑long hikes in the Great Smoky Mountains, and occasional family visits to Washington D.C., while they dream of exploring
    the music scene of Nashville and the amusement parks of Orlando, balancing a love for familiar landscapes with a curiosity for new experiences.
  culinary: Jonathan Wirth favors Southern comfort food, regularly helping his family grill catfish and pull apart smoked pork while perfecting a secret peach‑cobbler recipe, and they occasionally experiment
    with making their own trail mix for fishing outings, reflecting a modest cooking skill level grounded in tradition.
  core: Jonathan Wirth is a competitive, tech‑savvy teen whose love for structure collides with a relaxed attitude toward obligations, leading them to excel in games and tinkering while juggling worries,
    impulsive spending, and a penchant for late‑night basketball.
background:
  cultural: Jonathan grew up in Ringgold, a small town in north‑west Georgia, steeped in Southern Appalachian culture. His family’s roots are in the white, working‑class community that values self‑reliance,
    close‑knit family ties, and a strong work ethic. The local culture emphasizes church involvement (mainly Baptist), high‑school sports, outdoor activities like hunting and fishing, and a love for country
    and classic rock music. Community events such as county fairs and church potlucks play a big role in his social life, reinforcing a sense of belonging and mutual support. These cultural influences shape
    his practical outlook, competitive spirit, and desire for a stable, predictable future.
