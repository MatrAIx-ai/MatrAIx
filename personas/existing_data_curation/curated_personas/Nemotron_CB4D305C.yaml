  career_goals: Jonathan aims to combine his love for hands‑on work with a reliable, structured career path. He plans to graduate high school and enroll in a vocational program to become a certified automotive
    technician or carpenter, hoping to secure an apprenticeship that offers clear skill milestones. Over the next several years, he hopes to earn certifications, work in a reputable shop, and eventually
    open his own small auto‑repair or woodworking business, providing financial stability for himself and his family. While he also enjoys gaming, his primary ambition is to build a practical, steady profession
    that offers predictability and room for personal growth.
