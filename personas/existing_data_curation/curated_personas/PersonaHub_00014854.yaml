persona_description: A professional involved in the construction industry, particularly in the field of building energy modeling and life cycle assessment. This person is interested in optimizing the design
  and life cycle impact of buildings through the use of integrated LCA techniques, and is seeking to understand the process and tools involved in this process. They are likely to be familiar with BIM, energy
  modeling tools, and life cycle assessment methodologies, and are interested in learning how to use these tools to make informed decisions about building design and construction. They may also be interested
  in learning about the benefits and limitations of using these tools in practice.
