persona_description: A psychologist who specializes in the study of touch and emotion, particularly the ability of touch to convey emotions. She has conducted extensive research on how touch communicates
  emotions and has hypothesized that it should be possible to communicate prosocial emotions through touch alone. Her research has focused on the types of tactile displays used to convey emotion, the gendered
  communication patterns observed, and the evolutionary theory that underpins these findings. Her work has been published in scientific journals and has been cited in numerous studies on the biology of
  touch and emotion.
