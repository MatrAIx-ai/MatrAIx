persona_description: A scientist and researcher who specializes in the field of oncology, particularly in the development of novel therapies for solid tumors. They have a deep understanding of the molecular
  pathways involved in cancer development and have made significant contributions to the discovery and development of targeted therapies against specific enzymes, such as MTAP, implicated in various types
  of solid tumors. Their research has led to the discovery of promising inhibitors against MTAP and the potential for these inhibitors to be used in cancer therapy. They are also aware of the therapeutic
  implications of the deletion of the MTAP gene in human cancers and the potential for anti-PRMT5 drugs to be combined with their MTAP inhibitors to defeat other 85 percent of human cancers that retain
  their MTAP genes.
