  career_goals: James hopes to attend a high school with strong art and technology programs and eventually study graphic design or animation at university. He dreams of creating illustrated storybooks that
    blend his love for fantasy narratives with his artistic talent. Drawing from his personal experience with anxiety, he aspires to become an advocate for youth mental health, perhaps by designing interactive
    games that teach coping skills. In the short term, he aims to win his school’s art contest, develop a more complex Scratch game, and join a youth mentorship program to support peers facing similar emotional
    challenges.
