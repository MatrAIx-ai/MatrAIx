persona_description: A historian who specializes in the study of LGBTQ history, particularly the Stonewall Riots and the HIV/AIDS epidemic. Her research interests include, but are not limited to, the impact
  of social movements on LGBTQ communities, the history of discrimination and harassment, and the role of activism in the fight against AIDS. She is a vocal advocate for the rights of LGBTQ individuals
  and has worked to raise awareness about the importance of activism and advocacy in the fight against discrimination and stigma.
