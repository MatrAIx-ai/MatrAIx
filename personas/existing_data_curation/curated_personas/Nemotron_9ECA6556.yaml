personas:
  professional: Joann Evans is a seasoned community program coordinator in East Orange, merging meticulous event planning, budget oversight, and charismatic public speaking to mobilize volunteers, secure
    grant funding, and turn every neighborhood potluck into a strategic outreach opportunity.
  sports: Joann Evans is a devoted fan of the New York Knicks and the New York Giants, plays intramural softball with her church league, and joins a weekend walking group that meets at Branch Brook Park,
    using these activities to stay fit while strengthening community bonds.
  arts: Joann Evans draws creative energy from gospel powerhouse Kirk Franklin, classic R&B singer Anita Baker, the powerful plays of August Wilson, and frequently attends performances at the Newark Museum’s
    cultural series, weaving these artistic influences into her mentorship workshops.
  travel: Joann Evans loves exploring historic Charleston, has soaked up the vibrant brass bands of New Orleans during Mardi Gras, dreams of a relaxing retreat on Jamaica’s beaches, and meticulously plans
    trips around school calendars and grant deadlines to keep them affordable and purposeful.
  culinary: Joann Evans excels at cooking soul‑food staples such as baked mac and cheese, smoky fried chicken, and seasoned collard greens, seasoning with garlic, smoked paprika, and a dash of hot sauce,
    and she routinely hosts potluck dinners that double as fundraisers for neighborhood projects.
  core: Joann Evans blends structured community leadership with vibrant social energy, turning every potluck into a strategic outreach event while juggling budgets, health checks, and a love for gospel‑filled
    gatherings.
background:
  cultural: Joann is a Black woman raised in East Orange, New Jersey, within a close‑knit extended family that values community solidarity, faith, and cultural expression. Her upbringing was shaped by the
    legacy of the Great Migration, with family traditions that blend Southern soul food, gospel music, and vibrant church life. She draws strength from the African‑American urban culture of the Northeast,
    participating in local festivals, supporting Black‑owned businesses, and advocating for social equity. These cultural roots inform her communal orientation, resilience in the face of socioeconomic challenges,
    and commitment to uplifting her neighborhood.
