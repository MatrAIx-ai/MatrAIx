  career_goals: Joann aims to complete her bachelor’s degree in public administration or social work while re‑entering the workforce as a community program coordinator for a nonprofit serving East Orange
    residents. She envisions advancing to a director‑level role overseeing outreach, grant writing, and strategic partnerships. Long‑term, she hopes to launch her own consulting firm that helps faith‑based
    and community organizations design inclusive events and effective volunteer programs, providing both a stable income and a platform to mentor other Black women in leadership.
