personas:
  professional: Mariamma Manhas is a veteran decorative painter and project manager who leverages 35 years of surface‑preparation expertise, a keen eye for color theory, and a meticulous, schedule‑driven
    approach to deliver flawless interior finishes, while they combine a competitive spirit that pushes crews to exceed client expectations with a passion for teaching workshops that blend traditional motifs
    with modern design.
  sports: Mariamma Manhas stays active by leading a senior‑citizen dance class that blends Bollywood steps with western swing, joining the local Tracy Trail Hikers for weekend hill treks, cheering on the
    Sacramento Kings during basketball season, rooting for the San Francisco 49ers on football Sundays, and they occasionally play competitive bridge to keep their mind sharp.
  arts: Mariamma Manhas draws daily inspiration from the bold palettes of Frida Kahlo, the delicate light of Claude Monet, and the provocative street works of Banksy, frequently visits the de Young Museum
    to study Ansel Adams’ black‑and‑white landscapes, and they channel this eclectic mix into mixed‑media canvases that weave mandala motifs with contemporary abstraction.
  travel: Mariamma Manhas prefers meticulously planned journeys that balance cultural immersion with gentle adventure, having recently explored the historic streets of Seville during the Feria, trekked
    the vineyards of Napa Valley, and they dream of a pilgrimage to the ancient temples of Angkor Wat once their mural commissions settle into a steady rhythm.
  culinary: Mariamma Manhas delights in preparing elaborate festive meals, expertly layering flavors in coconut‑infused fish stew (meen curry) and spiced vegetable biryani scented with saffron and cardamom,
    while also embracing California’s bounty by tossing fresh figs, goat cheese, and heirloom tomatoes into vibrant salads, and they relish occasional gourmet dinners at the farm‑to‑table restaurant The
    Golden Harvest.
  core: Mariamma Manhas balances a disciplined work ethic with a whimsical love for collecting vintage paint swatches, often losing track of time in museum exhibits, and they occasionally forget to water
    their basil seedlings while obsessively perfecting color gradients for a new mural.
background:
  cultural: Mariamma was born in a coastal town in Kerala, India, into a Malayali Christian family that emphasized education, cultural celebrations, and respect for craftsmanship. She grew up surrounded
    by the vivid colors of temple festivals, intricate Kathakali makeup, and the rhythmic patterns of traditional folk songs, all of which nurtured her appreciation for bold visual storytelling. After moving
    to the United States in her early twenties, she settled in Tracy, California, where she blended her Indian heritage with the multicultural tapestry of the Central Valley. She continues to observe Indian
    holidays such as Onam and Vishu, prepares festive meals for her extended family, and incorporates South Asian motifs—like paisley and mandala patterns—into her decorative painting work, creating a unique
    cultural bridge between her roots and her adopted community.
