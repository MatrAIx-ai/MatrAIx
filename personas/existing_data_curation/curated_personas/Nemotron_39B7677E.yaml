  hobbies: '[''Visiting art museums and galleries'', ''Watercolor and acrylic sketching'', ''Traditional Indian embroidery'', ''Calligraphy'', ''Book club participation'', ''Community gardening'', ''Senior‑citizen
    dance classes'', ''Bridge (card game)'', ''Hiking in surrounding hills'']'
  career_goals: Mariamma aims to transition from pure trade work to a hybrid role that combines her craftsmanship with fine art. Over the next five years she hopes to secure commissions for community murals
    that celebrate South Asian heritage in Tracy, mentor a new generation of painters through a local apprenticeship program, and open a small studio where she can produce and sell her own mixed‑media paintings.
    She also envisions authoring a booklet on decorative painting techniques that blends traditional Indian motifs with Californian design trends, positioning herself as a niche expert in culturally infused
    interior finishes.
