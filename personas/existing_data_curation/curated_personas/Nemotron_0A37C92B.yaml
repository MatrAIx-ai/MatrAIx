personas:
  professional: Ha Kim, an energetic six-year-old budding creator, channels their organized curiosity into building intricate LEGO structures and designing simple interactive stories on ScratchJr, demonstrating
    early problem‑solving and teamwork skills that hint at a future in engineering or design.
  sports: Ha Kim, a lively member of the Bellevue Little Falcons soccer club, enjoys weekend matches at the local park, cheers for the Seattle Sounders FC as a family tradition, and balances active play
    with regular stretching sessions from their dance class to stay flexible.
  arts: Ha Kim, a creative spirit who spends afternoons drawing cartoons of their friends, practices calligraphy of simple characters for fun, sings along to folk melodies they learn in class, and is fascinated
    by the colorful performances of artists like Pixar’s animated shorts and the dance routines of street‑style crew The Jabbas.
  travel: Ha Kim, an enthusiastic explorer, loves weekend excursions to Bellevue’s Downtown Park and the nearby Seattle Aquarium, dreams of visiting the Snowy Mountains in the winter for a family ski trip,
    and prefers trips that mix playground time with short museum visits.
  culinary: Ha Kim, a picky yet adventurous eater, delights in cheesy pizza slices, chicken nuggets with honey‑mustard, and fruit smoothies blended with mango and banana, often helping to assemble a DIY
    taco kit with shredded cheese and mild salsa.
  core: Ha Kim, an organized, sociable six‑year‑old with boundless energy, blends curiosity with practicality to lead group games, build complex LEGO worlds, and keep a tidy allowance stash, all while staying
    remarkably calm and resilient.
background:
  cultural: Ha is raised in a Korean‑American family in Bellevue, Washington. Her household keeps Korean language alive through daily conversation and weekend language school, and celebrates cultural traditions
    such as Lunar New Year and Chuseok. While her parents emphasize respect for elders, harmony, and a strong commitment to education—values rooted in Korean culture—Ha also fully engages in the diverse,
    inclusive community of her suburban American environment, attending a local elementary school and participating in multicultural activities.
