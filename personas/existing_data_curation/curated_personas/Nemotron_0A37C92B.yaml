  career_goals: Inspired by her caring nature and calm resilience, Ha dreams of becoming a pediatrician who helps children stay healthy, while also envisioning a future as an engineer or inventor who creates
    useful tools—goals that blend her curiosity about how things work with her practical, organized mindset.
