  hobbies: '[''Sketching'', ''Digital illustration'', ''Reading speculative fiction'', ''Philosophy podcasts'', ''Puzzle solving (crosswords, Sudoku)'', ''Photography'', ''Hiking local desert trails'',
    ''Yoga'', ''Volunteering at community art workshops'', ''Collecting vintage art supplies'']'
  career_goals: Jessica aims to complete a bachelor's degree in education with a specialization in art integration, obtain teacher certification, and secure a full‑time teaching position at a progressive
    school where she can blend visual arts and abstract concepts into the curriculum. In the long term, she envisions pursuing a master's in instructional design or educational technology, developing innovative
    interdisciplinary programs, and leading professional development workshops for fellow educators. She also hopes to start a community after‑school art program that nurtures creativity and critical thinking
    among youth in Mesa.
