personas:
  professional: Cira Torres, a 27‑year‑old specialist in residential and commercial deep‑cleaning, combines her obsessive attention to detail, mastery of eco‑friendly sanitation protocols, and competitive
    drive to consistently surpass cleaning benchmarks while positioning herself for a supervisory leap at a top San Juan resort.
  sports: Cira Torres carves out early‑morning jogs along the Condado boardwalk, belongs to the local “Runners of San Juan” club, cheers for the Cangrejeros de Santurce baseball team, and occasionally joins
    a weekend yoga class at the “Zen Flow” studio to balance her competitive spirit with flexibility.
  arts: Cira Torres curates a personal soundtrack of classic salsa and bomba from legends like Eddie Palmieri and Ismael Rivera while crocheting, devours mystery novels by Agatha Christie and Gillian Flynn,
    and documents street life with her phone, drawing inspiration from photographer Vivian Maier.
  travel: Cira Torres prefers meticulously planned escapes, often spending long weekends exploring the pastel‑hued streets of Old San Juan, the hidden waterfalls of Vieques, and, when budget allows, jet‑setting
    to Cartagena’s colonial charm or Granada’s Andalusian alleys, always hunting eco‑friendly lodging.
  culinary: Cira Torres masters traditional dishes such as mofongo and arroz con gandules using fresh cilantro, oregano, and local blooms from her balcony garden, pairing each meal with a salsa rhythm,
    while occasionally experimenting with a vegan pastelón that still honors the island’s flavor profile.
  core: Cira Torres blends disciplined efficiency with quiet curiosity, juggling a spotless cleaning career, a penchant for solitary hobbies, and a competitive edge that fuels both her ambitions and occasional
    over‑extension.
background:
  cultural: Cira identifies strongly with her Puerto Rican heritage. She grew up in Caguas, immersed in the island’s Spanish‑language culture, Catholic traditions, and vibrant music scenes. Family gatherings
    centered around dishes like arroz con gandules, pernil, and pasteles are a cornerstone of her life, and she celebrates holidays such as Navidad, Three Kings Day, and the Fiestas de San Sebastián with
    gusto. The values of familismo, hard work, and community pride guide her daily routine, influencing her disciplined work ethic and her inclination toward eco‑friendly, locally‑sourced cleaning practices.
    Her bilingual ability (Spanish and conversational English) reflects the island’s linguistic blend, and she participates in community clean‑up events, reinforcing a sense of responsibility toward her
    neighborhood.
attributes:
  skills: '["Residential cleaning", "Commercial cleaning", "Deep‑cleaning techniques", "Floor care (mopping, polishing)", "Sanitation and hygiene protocols", "Inventory management", "Eco‑friendly product
    application", "Time management and scheduling", "Client communication", "Basic maintenance troubleshooting"]'
  hobbies: '["Reading mystery novels", "Crocheting and knitting", "Urban herb gardening", "Cooking traditional Puerto Rican dishes", "Listening to salsa and bomba music", "Photography of street scenes",
    "Attending local festivals with close friends"]'
  career_goals: Cira aims to become a supervisory team leader within the housekeeping department of a large hotel or resort in the Greater San Juan area, leveraging her discipline and high standards. In
    the long term, she aspires to launch her own professional cleaning service that offers eco‑conscious residential and small‑business packages, and to obtain a certification in hospitality management
    or environmental health. She also plans to complete an adult education program to earn a GED and pursue further training.
