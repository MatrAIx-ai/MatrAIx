persona_description: A chemist who specializes in the development of microfluidic devices, particularly those using paper as a material. His group aims to improve health care, water analysis, and drug development
  by creating portable and affordable microfluidic devices using paper as the primary material. He has published a paper in the prestigious journal Nature Communications and is interested in patenting his
  device. He envisions using any profits from the sale of the devices in developed nations to fund their production and distribution in developing nations.
