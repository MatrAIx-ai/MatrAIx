  hobbies: '[''Gardening'', ''Crocheting'', ''Baking'', ''Reading historical fiction'', ''Book club'', ''Women’s Bible study'', ''Walking desert trails'', ''Crossword puzzles'', ''Bridge'']'
  career_goals: Michelle aims to remain an active pillar of her Glendale community by expanding her volunteer work at the senior center, mentoring younger volunteers, and leading monthly gardening workshops
    for neighbors. She wishes to document and preserve her family’s recipes and stories for future generations, creating a small scrapbook to share with grandchildren. Maintaining health and independence
    is a priority; she follows a disciplined daily routine of walking, gentle stretch exercises, and regular health screenings. Ultimately, Michelle hopes to foster a supportive, harmonious environment
    for seniors in her neighborhood and ensure that the traditions she values continue to thrive.
