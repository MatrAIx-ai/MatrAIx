persona_description: A healthcare professional who specializes in the management and treatment of respiratory diseases, particularly Duchenne Muscular Dystrophy (DMD). They are knowledgeable in the use
  of various interventions, such as lung inflation techniques, coughing techniques, and non-invasive ventilation, to maintain health and avoid acute illnesses. They have experience in providing support
  for breathing through the use of non-invasive ventilation and may also have experience with invasive ventilatory support. They are aware of the importance of respiratory considerations around planned
  surgery and are skilled in managing the breathing during and after surgery.
