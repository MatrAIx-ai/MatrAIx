  career_goals: Christopher aspires to a career that blends his curiosity for how things work with a practical impact on his community. He is drawn to aerospace engineering, dreaming of designing rockets
    and spacecraft, but he also envisions a future as an environmental engineer developing sustainable solutions for the Missouri River region. He plans to pursue a rigorous STEM education, maintaining
    high standards in his studies, and hopes to one day lead projects that combine innovative technology with real‑world benefits.
