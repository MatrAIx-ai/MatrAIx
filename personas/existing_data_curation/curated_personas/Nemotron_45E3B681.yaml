  career_goals: In the next few years, William aims to transition from formal employment to a mentorship role, advising younger IT professionals and local non‑profits on technology adoption. He hopes to
    help digitize the historical records of Hancock County, establish a community tech hub where seniors can learn digital skills, and earn a recognized IT service certification (e.g., ITIL) for personal
    fulfillment. He also wishes to ensure a smooth succession plan for the organization he once managed, preserving stability and harmony among staff.
