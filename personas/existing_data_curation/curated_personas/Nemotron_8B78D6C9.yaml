  career_goals: Forrest aims to graduate high school with strong grades and then enroll in a technical college to study civil or mechanical engineering. His long‑term ambition is to design and maintain
    reliable public infrastructure—such as roads, bridges, and community facilities—in Janesville, ensuring projects stay on schedule and within budget. He also hopes to combine his hands‑on abilities with
    his organized approach by eventually offering a small business service for bike and computer repairs, providing practical support to his local community while maintaining a structured work environment.
