personas:
  professional: Forrest Taylor, an aspiring junior engineer, leverages a methodical mindset and organized planning in their LEGO Technic builds, Python coding projects, and robotics club collaborations,
    turning solitary creativity into disciplined problem-solving that mirrors their preference for structure and predictability.
  sports: Forrest Taylor stays active by cycling with the local bike club, hiking the nearby state park trails each weekend, and joining occasional pick-up basketball games with friends, all while cheering
    for the Denver Broncos as their favorite NFL team.
  arts: Forrest Taylor finds artistic inspiration in the precise geometry of M.C. Escher's prints, the cinematic scores of Hans Zimmer, and the ambient electronica of Tycho, often sketching mechanical concepts
    after watching David Attenborough documentaries, which subtly shapes their creative outlook.
  travel: Forrest Taylor prefers meticulously planned journeys, having explored the Appalachian Trail and visited the LEGO House in Billund on family trips, and now dreams of a solo adventure to Tokyo's
    Akihabara district to dive into cutting-edge robotics culture.
  culinary: Forrest Taylor enjoys cooking methodically, mastering dishes such as spaghetti carbonara with pancetta, pecorino, and egg yolks, and precise sushi rolls featuring tuna, avocado, and nori, yet
    sometimes over-sifts flour for pancakes, a perfectionist habit that can stall the kitchen process.
  core: Forrest Taylor is a detail-obsessed teen who transforms solitary hobbies like LEGO Technic and Python coding into disciplined problem-solving, yet secretly hoards limited-edition board games they
    occasionally splurge on despite a tightly balanced budget.
background:
  cultural: Forrest was raised in Janesville, Wisconsin, within a middle‑class, working‑class family that embodies typical Midwestern values of self‑reliance, community involvement, modesty, and practicality.
    The region’s historic ties to manufacturing and agriculture have influenced his appreciation for tangible, reliable work. While his family background includes ancestry common in southern Wisconsin—such
    as German and Scandinavian roots—Forrest primarily identifies with a broader American Midwestern cultural identity, participating in local community events, library programs, and school activities that
    emphasize cooperation and steady, disciplined effort.
