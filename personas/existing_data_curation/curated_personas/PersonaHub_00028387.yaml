persona_description: A feminist theorist and scholar who specializes in the study of gender and sexuality, particularly in the works of Julia Kristeva and Michel Foucault. She is known for her theories
  on the concept of incorporation, which suggests that sexual desire is a social construct that is often imposed upon individuals through gender roles and expectations. She is also interested in the idea
  of masquerade, which she views as a way to undermine and control gender and sexuality.
