personas:
  professional: Jorge Ramos is a 13‑year‑old aspiring coder who spends afternoons building LEGO robots and designing simple video‑game mods, applying their methodical, competitive mindset to troubleshoot
    bugs and out‑smart peers in online hackathons.
  sports: Jorge Ramos follows the Houston Dynamo with avid enthusiasm, plays midfield for the local Space City Soccer Club, enjoys the tactical depth of the sport, and, when not on the field, watches the
    Houston Astros' games for the strategic aspects of baseball, preferring solo training drills over large group scrimmages.
  arts: Jorge Ramos immerses themselves in science‑fiction literature, devouring titles like "Neuromancer" and "The Hitchhiker's Guide to the Galaxy," while the synth‑heavy beats of Bad Bunny and the nostalgic
    guitar of Los Tigres del Norte soundtrack their LEGO builds, reflecting an analytical yet creatively inspired identity.
  travel: Jorge Ramos prefers meticulously planned family road trips, having explored the San Antonio River Walk and a brief cultural immersion in Mexico City, while dreaming of a future solo adventure
    to Tokyo's Akihabara district to hunt for vintage gaming hardware, balancing curiosity with a methodical itinerary.
  culinary: Jorge Ramos enjoys mastering the art of homemade pupusas and tamales alongside a sizzling pan of carne asada fajitas, favoring ingredients like masa harina, fresh cilantro, and queso fresco,
    yet often gets distracted mid‑recipe by a new coding challenge, resulting in a half‑baked but delicious experimental dish.
  core: Jorge Ramos is a calm, methodical teen who fuses strategic gaming, budding coding skills, and family culinary traditions into a competitive drive that shapes every facet of their life.
background:
  cultural: Jorge identifies strongly with his Salvadoran heritage while growing up in Houston's diverse Latino community. He speaks Spanish at home, celebrates cultural events such as Día de la Madre and
    local Salvadoran festivals, and enjoys family gatherings featuring pupusas, tamales, and música popular. His family maintains Catholic traditions and a respect for elders, shaping his disciplined and
    resilient character. Simultaneously, he navigates American school life, blending both cultural perspectives in his worldview.
