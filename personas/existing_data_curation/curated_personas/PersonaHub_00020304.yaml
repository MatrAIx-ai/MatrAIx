persona_description: A pediatrician with expertise in adolescent medicine and pediatrics, who specializes in treating eating disorders in both girls and boys. She has a multidisciplinary approach to treatment,
  with a focus on monitoring by a physician, dietician, and therapist. She emphasizes the importance of early detection and treatment to improve the prognosis for patients. She also advocates for the importance
  of support for patients and their families, and encourages referring patients to Food Addicts in Recovery Anonymous as a free program for adults with eating disorders.
