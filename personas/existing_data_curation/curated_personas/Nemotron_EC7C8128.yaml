  career_goals: Though still very young, Tyler frequently expresses a fascination with building and fixing things he sees his parents do around the house. He dreams of one day being a builder or a handyman,
    imagining himself assembling blocks like a real construction project. In the near term, his ambition is to help with simple chores—carrying small items, handing out tools, and watching repair work—so
    he can learn by observation and gradually take on more responsibility.
