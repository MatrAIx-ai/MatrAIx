personas:
  professional: Jason Tomley, a 55‑year‑old handyman and aspiring home‑safety certified specialist, runs a part‑time service in his rural community where they apply methodical repair techniques, meticulous
    record‑keeping, and a reputation for reliability to become the go‑to person for routine household maintenance.
  sports: Jason Tomley, an avid outdoorsman, spends winter weeks ice‑fishing on local ponds, joins seasonal deer‑hunting outings, follows the Tennessee Titans football team, and volunteers as a caddy for
    the nearby community baseball league, preferring solitary pursuits over spectator crowds.
  arts: Jason Tomley, who collects classic country vinyl, frequently listens to Johnny Cash and Loretta Lynn while working at the bench, occasionally attends low‑profile church concerts featuring traditional
    gospel hymns, and finds creative satisfaction in building model‑train scenery inspired by old American railroads.
  travel: Jason Tomley, favoring planned road trips over spontaneous vacations, spends spring weekends exploring the Great Smoky Mountains, dreams of a guided hunting expedition in Montana, and limits longer
    journeys to preserve time for garden upkeep and community obligations.
  culinary: Jason Tomley, a modest home‑cook, delights in smoking catfish caught on his own pond, prepares cornbread with heirloom corn from his garden, and favors dishes like fried green tomatoes and apple
    cobbler, while rarely venturing beyond familiar Southern flavors.
  core: Jason Tomley, a 55‑year‑old solitary craftsman, merges methodical precision with traditional values, preferring routine, self‑reliance, and a quietly competitive edge in everything from toolbox
    organization to weekend hunting trips.
background:
  cultural: Jason grew up in Rutherford, a small community in Gibson County, Tennessee, where his family’s roots go back several generations of farmers and tradespeople. The local culture emphasizes self‑reliance,
    respect for tradition, and a close‑knit but understated community. He was raised with Southern values of hard work, modesty, and family loyalty, and maintains modest involvement with his local church,
    preferring quiet service over public roles.
