  hobbies: '[''gallery visits'',''theater attendance'',''lecture series'',''bridge club'',''trivia competitions'',''watercolor painting'',''pottery'',''sketching'',''gardening'',''senior travel groups'']'
  career_goals: Leslie aims to leave a lasting cultural legacy in Rockford by establishing an annual intergenerational arts festival that showcases emerging local talent and encourages community participation.
    She seeks to serve on the board of the Rockford Art Museum, contributing her organizational expertise to expand outreach programs. She also aspires to author a memoir that intertwines her personal journey
    with the city’s artistic evolution, and to mentor younger volunteers in museum and event management. Continuing her lifelong learning, she plans to complete her undergraduate degree in Art History through
    online coursework, fulfilling a long‑held academic ambition.
