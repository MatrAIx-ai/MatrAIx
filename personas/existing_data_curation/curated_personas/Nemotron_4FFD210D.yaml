personas:
  professional: Steven Johnson, a seasoned ASE‑certified automotive technician with over two decades of hands‑on expertise in engine performance, brakes, electrical systems, and hybrid powertrains, blends
    his practical curiosity and organized yet flexible workflow to mentor apprentices, streamline workshop operations, and pursue a master‑technician credential as he plans to open a high‑performance EV
    repair shop and teach at the community college.
  sports: Steven Johnson stays active in a weekday evening community basketball league affiliated with the local YMCA, roots for the Philadelphia 76ers and the Eagles during NFL and NBA seasons, spends
    spring and summer mornings casting at Lake Nockamixon, and complements his on‑court cardio with occasional home‑gym strength sessions, viewing fitness as a social outlet rather than a solitary grind.
  arts: Steven Johnson, a classic‑rock aficionado who riffs on Led Zeppelin, AC DC, and The Rolling Stones while tinkering in the garage, also enjoys the cinematic thrill of “Bullitt” and “The Fast and
    the Furious” series, occasionally visits the Philadelphia Museum of Art for modern exhibits, and captures his restored Mustang in black‑and‑white photography, letting music and visual art fuel his creative
    spark.
  travel: Steven Johnson prefers well‑planned road‑trip adventures that combine his love for classic cars with family time, such as weekend drives to the Henry Ford Museum in Dearborn, a recent pilgrimage
    to the Porsche Museum in Stuttgart, and annual summer escapes to the Blue Ridge Parkway, always budgeting travel around work and school commitments while hunting for new Mustang memorabilia.
  culinary: Steven Johnson, a confident grillmaster, regularly whips up Texas‑style smoked brisket, Kansas City burnt ends, and char‑grilled trout fresh from Lake Nockamixon using hickory chips, dry rubs
    of brown sugar and smoked paprika, and pairs the feast with craft IPAs, while also enjoying a well‑executed classic cheeseburger on a Sunday family barbecue.
  core: Steven Johnson channels a blend of meticulous curiosity and social energy into every rev of the Mustang, yet their habit of over‑committing to projects often leaves them juggling late‑night work,
    stress‑filled spreadsheets, and a constant stash of spare parts on the kitchen counter.
background:
  cultural: Steven grew up in a blue‑collar, middle‑class family in Northampton County, Pennsylvania, with deep roots in the region’s industrial and agricultural heritage. His ancestry includes German and
    Irish lineage, and he was raised within the cultural norms of the Lehigh Valley—hard work, self‑reliance, and close‑knit community involvement. Local traditions such as high‑school football, church
    gatherings, neighborhood car clubs, and a shared love for automobiles have shaped his work ethic, social life, and sense of responsibility toward family and community.
