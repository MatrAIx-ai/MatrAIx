  career_goals: Steven aims to become a master technician and eventually open his own independent auto repair shop that specializes in high‑performance and electric vehicles. Over the next three years he
    plans to attain the ASE Master Specialist credential, transition into a service manager role at his current shop, and lead community training classes for aspiring mechanics. He also envisions teaching
    automotive technology at a local community college later in his career, providing a stable income for his family while reducing workplace stress through more structured delegation and workflow improvements.
