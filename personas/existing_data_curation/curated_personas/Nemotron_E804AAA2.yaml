personas:
  professional: An eager youth soccer captain and informal event organizer, Carlos Velez leverages his talkative nature and love for familiar routines to lead weekend matches at the park, coordinate teammates,
    and create LEGO‑inspired trophies, while they adopt a relaxed approach to school responsibilities.
  sports: An enthusiastic soccer player, Carlos Velez plays for the Eastside United Youth Soccer Club, cheers loudly for the Los Angeles Galaxy, and they organize weekly matches at the neighborhood park,
    balancing their love of routine drills with occasional spontaneous freestyle tricks.
  arts: A budding comedian and pop‑culture enthusiast, Carlos Velez practices jokes from Jim Gaffigan and sketches scenes from The Simpsons, frequently performing short skits for classmates and they delight
    in Saturday Night Live reruns.
  travel: A curious travel dreamer, Carlos Velez has explored the nearby state park and taken a weekend family trip to San Diego, and they now hope to visit Disneyland and the ancient ruins of Machu Picchu
    once school exams are over, preferring organized itineraries over spontaneous backpacking.
  culinary: A hands‑on home chef, Carlos Velez loves helping his family prepare authentic tacos with freshly made corn tortillas, creamy guacamole seasoned with lime and cilantro, and occasional tamales
    wrapped in banana leaves, while they experiment with adding queso fresco for extra flavor.
  core: Carlos Velez, a socially‑charged 12‑year‑old who thrives on routine yet loves spontaneous jokes, leads his friends in soccer, LEGO builds, and kitchen adventures, and they often juggle worry‑induced
    over‑thinking with a laid‑back approach to responsibilities.
background:
  cultural: Carlos is a first‑generation Mexican‑American growing up in Canyon Country, a diverse community in Los Angeles County. At home, Spanish is spoken alongside English, and family gatherings often
    include music, dance, and Mexican dishes that connect him to his heritage. He celebrates holidays such as Día de los Muertos and Mexican Independence Day with his extended family, reinforcing a sense
    of cultural pride. While he embraces the broader American culture through school and friends, Carlos retains strong ties to Mexican traditions, especially through food, language, and community values
    that emphasize respect for elders and collective celebration.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Public speaking and storytelling'', ''Basic cooking (Mexican family recipes)'', ''LEGO and hands‑on construction'', ''Troubleshooting consumer
