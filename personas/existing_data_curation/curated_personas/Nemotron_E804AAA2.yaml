  hobbies: '[''Playing soccer'', ''Multiplayer video gaming'', ''LEGO building'', ''Helping with family cooking'', ''Watching comedy and performing skits'', ''Socializing with friends'']'
  career_goals: Carlos dreams of a future where he can combine his love for people and practical skills. He hopes to graduate high school and attend a technical college to become a certified electrician
    or a culinary specialist, ideally working in a family‑owned restaurant that serves Mexican cuisine. He also imagines one day leading community events, like organizing neighborhood festivals or youth
    soccer leagues, where his sociable nature can help bring people together. While he worries about academic challenges, he is motivated to stay focused and show his family that he can turn his passions
    into a stable career.
