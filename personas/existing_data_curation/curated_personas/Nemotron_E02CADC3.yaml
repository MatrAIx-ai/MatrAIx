personas:
  professional: A seasoned cultural nonprofit manager, Linda Lindsey leverages 25 years of grant‑writing, strategic planning, and staff mentorship to guide arts programs with a steady, pragmatic demeanor
    that balances structure with the flexibility needed for community‑driven projects.
  sports: An avid beach‑walker and occasional member of a local senior softball league, Linda Lindsey cheers for the New York Mets and follows the Brooklyn Nets, preferring low‑impact cardio and seasonal
    community fun runs over high‑intensity workouts.
  arts: A devoted volunteer at the community arts center, Linda Lindsey curates exhibitions that feature the works of contemporary painter Kehinde Wiley and organizes jazz nights headlined by Wynton Marsalis,
    while also attending Broadway revivals like 'The Music Man' and local theater productions.
  travel: With a penchant for heritage tourism, Linda Lindsey has explored historic towns such as Williamsburg, Virginia, and Savannah, Georgia, while dreaming of a genealogical pilgrimage to County Cork,
    Ireland, and typically plans trips well in advance but allows room for spontaneous detours to local vineyards.
  culinary: An enthusiastic home cook, Linda Lindsey delights in preparing seasonal dishes like roasted heirloom tomatoes with basil pesto, grilled snapper with lemon‑thyme butter, and pumpkin‑spiced risotto,
    employing fresh farm‑to‑table ingredients she harvests herself and occasionally treats herself to a lobster roll at a nearby seaside bistro.
  core: Linda Lindsey blends meticulous nonprofit leadership with a love for garden‑fresh meals, beach walks, and jazz, balancing structure and spontaneity while occasionally forgetting to file tax paperwork
    until the last minute.
background:
  cultural: Linda grew up in a middle‑class, White American family on Long Island, where community involvement and education were highly valued. Her parents encouraged a love of the arts, leading her to
    pursue a graduate degree in humanities that emphasized European literature and art history. Her cultural identity blends suburban Northeastern traditions with a lifelong appreciation for broader Western
    cultural heritage. She maintains strong ties to local civic organizations, values the region’s seasonal rhythms, and incorporates a pragmatic, yet open‑minded outlook shaped by both her upbringing and
    her professional experiences.
