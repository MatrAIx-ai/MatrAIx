  career_goals: Approaching retirement, Linda aims to transition from full‑time management to a part‑time advisory role where she can share her institutional knowledge with emerging leaders. She hopes to
    serve on the board of a local museum or historical society, mentor younger staff through structured coaching programs, and spearhead a legacy project that documents the cultural history of Rockville
    Centre. Her ambition is to leave a lasting imprint on the community’s arts infrastructure while enjoying a more flexible schedule that allows for personal pursuits.
