persona_description: A scientist and inventor who specializes in the field of biomanufacturing, particularly in the development of 3D printing technologies for the creation of biological structures. His
  research interests include the use of additive manufacturing techniques to engineer cells and other small, complex structures, and the integration of electrical fields into 3D printing processes to produce
  highly complex architectures. He collaborates with partners from MIT and France's National Institute of Health and Medical Research to develop the technology and also works on adding artificial intelligence
  to the process to improve its capabilities.
