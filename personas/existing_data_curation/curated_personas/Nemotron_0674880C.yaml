personas:
  professional: Kean Norman is a seasoned construction manager who leverages two decades of on‑site experience to translate complex architectural plans into precise schedules and multimillion‑dollar budgets,
    while they keep subcontractors aligned, meet safety standards, and nurture a collaborative work culture, positioning themselves for a future senior project director role.
  sports: Kean Norman is a devoted supporter of the Detroit Tigers and Detroit Lions, volunteers as a bench coach for a local youth baseball league, and balances their love for the outdoors with weekend
    fishing trips on Lake St. Clair as a member of the Lake St. Clair Fishing Club and occasional trail runs at Michigan state parks, preferring low‑impact fitness that fits their packed schedule.
  arts: Kean Norman is a classic‑jazz aficionado whose vinyl collection spins the likes of John Coltrane, Louis Armstrong, and Marvin Gaye while they unwind after a day on the job, and they often attend
    the Detroit Symphony’s evening concerts and local vintage‑car exhibitions, finding that music and automotive art together shape their creative downtime.
  travel: Kean Norman is a methodical yet flexible traveler who maps out weekend getaways to Michigan’s Upper Peninsula state parks and seasonal trips to historic jazz hubs such as New Orleans and Kansas
    City, but they prefer staying close to home to keep family obligations intact and to scout potential sites for future sustainable housing projects.
  culinary: Kean Norman is a soul‑food enthusiast who masterfully prepares dishes like fried chicken, collard greens, and smoked maple‑glazed catfish using a blend of smoked paprika, cayenne, and locally
    sourced herbs, often cooking for family gatherings while they occasionally over‑salt a pot due to their relaxed kitchen timing.
  core: Kean Norman blends a precise construction mindset with a breezy love for vintage cars, jazz, and community gardening, and they juggle disciplined budgets alongside occasional disorganized hobbies
    while maintaining a deep commitment to mentoring the next generation of builders.
background:
  cultural: Kean is an African‑American who grew up in the Detroit metropolitan area and now lives in Saint Clair Shores, Michigan. His family’s roots trace back to the Great Migration, and he carries forward
    a blend of Southern cultural traditions and Midwestern work ethic. He is active in his local historically Black church, where gospel music and community service play important roles. Kean values the
    strong sense of solidarity, resilience, and storytelling that characterize his community, and these influences shape his approach to both his professional life and personal relationships.
attributes:
  skills: '["Project Scheduling", "Budget Management", "Team Leadership", "Construction Safety Compliance", "Subcontractor Coordination", "Blueprint Reading", "Cost Estimation", "Quality Control", "Conflict
