  hobbies: '["Fishing", "Woodworking", "Classic Car Restoration", "Jazz Music", "Cooking", "Community Volunteering", "Reading History", "Boating"]'
  career_goals: Kean aims to advance from construction manager to senior project director within the next five years, overseeing larger multi‑family developments. He is also planning to launch his own general‑contracting
    firm focused on sustainable residential projects in the Detroit metro area, with a particular interest in mentorship programs that provide apprenticeship opportunities for young Black workers. Financial
    stability for his family and a legacy of community‑focused building are central to his long‑term ambitions.
