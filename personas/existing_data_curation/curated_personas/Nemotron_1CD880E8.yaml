  career_goals: Kayla aspires to move into a supervisory or lead housekeeper role within a reputable property management firm, where she can mentor junior staff and shape cleaning protocols. She also dreams
    of eventually launching her own boutique cleaning service aimed at serving bilingual families in Miami, emphasizing personalized care and environmentally friendly practices. Courting stability, she
    seeks a position that offers a predictable schedule and benefits, allowing her to focus on her mental well‑being and financial independence post‑divorce.
