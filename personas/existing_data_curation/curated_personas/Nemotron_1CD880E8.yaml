personas:
  professional: Kayla Saldana is a seasoned residential and small‑business cleaning specialist with over a decade of hands‑on experience in deep‑cleaning, stain removal, and floor care, known for her meticulous
    inventory management and safe chemical handling; bilingual fluency in Spanish and English lets them communicate clearly with a diverse clientele, while their strong empathy and conflict‑resolution skills
    foster harmonious client relationships, and they now aim to step into a supervisory role at a property management firm where they can mentor junior staff, set environmentally friendly cleaning protocols,
    and eventually launch a boutique cleaning service for bilingual families in Miami.
  sports: Kayla Saldana enjoys low‑impact fitness activities, regularly attending a local gentle yoga class and joining a weekend walking club that explores Miami’s beachfront trails, while they also follow
    the Miami Heat and Miami Marlins for a burst of team spirit; their primary athletic outlet is tango dancing at community nights, which they view as both social exercise and discipline, and they occasionally
    dabble in recreational paddle‑boarding during summer outings with friends.
  arts: Kayla Saldana immerses themselves in the world of Argentine tango music, often playing Astor Piazzolla’s "Libertango" and Carlos Gardel’s classics while crocheting intricate shawls, and they attend
    monthly performances by the Miami Tango Society; their artistic palate also includes admiring contemporary Latin American painters such as Jorge González at local galleries and reading poems by Alfonsina
    Storni, which together shape a quiet yet passionate creative identity.
  travel: Kayla Saldana favors purposeful, culturally rich trips that balance relaxation with discovery, having visited Buenos Aires twice for intensive tango workshops and Cartagena for a short coastal
    escape; they dream of trekking the Patagonian Andes but currently prioritize weekend getaways to the Florida Keys and Naples, planning trips around their predictable work schedule and modest budget,
    and they meticulously compile itineraries that blend culinary experiences with quiet moments for mindfulness.
  culinary: Kayla Saldana delights in preparing traditional Argentine dishes such as beef empanadas seasoned with cumin and paprika, choripán topped with chimichurri, and occasionally an asado‑style grill
    using chorizo and sweet potatoes, favoring ingredients like dulce de leche for dessert and fresh cilantro for garnish; they consider themselves an intermediate home cook, often improvising with pantry
    staples while occasionally over‑spicing, and they love hosting intimate dinner gatherings where the music of tango softly frames the meal.
  core: Kayla Saldana is a compassionate cleaning professional who balances meticulous work with solo hobbies like crochet and tango, navigates anxiety through yoga and mindfulness, dreams of leading a
    bilingual eco‑cleaning team, and adds spice to life with Argentine flavors, weekend walks, and a habit of budgeting for both stability and occasional indulgence.
background:
  cultural: Kayla’s family originates from Buenos Aires, Argentina, and she grew up in a bilingual household where Spanish was the primary language and Argentine customs were celebrated. She maintains strong
    ties to Argentine culture through food, music, and dance, especially tango and folk songs. Though she now lives in Miami’s multicultural environment, she participates in local Argentine community gatherings,
    celebrates national holidays like Día de la Independencia, and values the Argentine emphasis on family, hospitality, and resilience. Her cultural identity shapes her compassionate approach to service
    and her desire to help fellow Latino families.
