personas:
  professional: William Haskett, a seasoned mechanical engineer, blends rigorous CAD and finite element analysis expertise with a flair for abstract design, leveraging their disciplined project management,
    Lean Six Sigma methodology, and sociable facilitation skills to lead interdisciplinary product innovation teams while championing human‑centered sustainability.
  sports: William Haskett maintains fitness through weekend hikes in the Catskills, a membership at the Kingston YMCA where they practice rock climbing, participates in a local recreational basketball league,
    and avidly follows the New York Knicks during the NBA season.
  arts: William Haskett expresses their imagination through abstract paintings, paper sculptures, and custom electric guitar builds while regularly performing at Kingston’s jazz improv nights inspired by
    Miles Davis and Thelonious Monk, and hosts board‑game gatherings featuring Terraforming Mars and Gloomhaven.
  travel: William Haskett favors purposeful travel, often escaping to upstate New York art retreats, taking an annual design‑focused pilgrimage to Copenhagen and Milan, and dreaming of a creative residency
    in Kyoto’s traditional wood‑working studios.
  culinary: William Haskett, an experimental cook, enjoys crafting ramen with homemade miso broth, cedar‑plank grilled salmon, and spiced fermented kimchi tacos, frequently sourcing fresh herbs and craft
    beer from local farmers’ markets.
  core: William Haskett fuses disciplined engineering precision with a restless artistic drive, channeling anxiety into creative projects and mentorship while occasionally losing sleep over late‑night guitar‑building
    marathons.
background:
  cultural: William grew up in a middle‑class white family in the Hudson Valley region of New York, where the blend of rural community values and proximity to the cultural vibrancy of the NYC metropolitan
    area shaped his worldview. His upbringing emphasized education, civic engagement, and a respect for nature, reflecting the region’s historic Dutch‑American settlement and contemporary progressive ethos.
    Family traditions included celebrating classic American holidays and participation in local festivals such as the Kingston Arts Fair. This background fostered his appreciation for both technical rigor
    and artistic expression, and nurtured his commitment to community service and mental‑health awareness.
