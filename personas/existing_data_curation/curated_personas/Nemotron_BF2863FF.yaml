  career_goals: William aims to become a senior engineering manager leading an interdisciplinary product innovation team that fuses cutting‑edge mechanical engineering with artistic design. He plans to
    obtain his Professional Engineer (PE) license and complete an executive leadership program within the next three years. His long‑term ambition is to launch his own consultancy focused on sustainable,
    human‑centered mechanical solutions—such as eco‑friendly consumer devices and assistive technologies. He also aspires to champion mental‑health initiatives in the workplace, mentor emerging engineers,
    and secure patents for novel design concepts that push the boundaries of form and function.
