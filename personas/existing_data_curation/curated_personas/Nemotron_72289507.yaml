  career_goals: Javier dreams of a future where he can blend his love for art, technology, and helping others. He hopes to become a bilingual educational game developer or instructional designer who creates
    engaging, culturally relevant learning tools for children, especially those from bilingual communities. He is also intrigued by environmental science and imagines working as a community‑focused environmental
    advocate, designing projects that improve air quality and green spaces in Laredo. Ultimately, he aspires to a career that lets him use his creativity, organization, and compassion to make learning and
    community life more vibrant and inclusive.
