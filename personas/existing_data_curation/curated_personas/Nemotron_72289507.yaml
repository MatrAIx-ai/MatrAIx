personas:
  professional: Javier Aranza, an aspiring game designer and cartoonist, blends meticulous planning with vivid imagination to prototype Scratch games and storyboard comic strips, always documenting each
    step in a notebook before diving into digital art.
  sports: Javier Aranza, a midfielder for the local youth soccer club "Riverdale Rangers", trains twice weekly, follows the tactical style of FC Barcelona, enjoys watching match replays, and balances outdoor
    play with a disciplined set of warm‑up drills to stay fit despite occasional procrastination on homework after games.
  arts: Javier Aranza, a dedicated member of the school art club, creates cartoon illustrations inspired by Studio Ghibli and Marvel comics, builds intricate LEGO architecture models replicating famous
    skylines, and practices acoustic guitar with a repertoire that includes traditional Mexican folk songs and contemporary pop hits by Ed Sheeran.
  travel: Javier Aranza, who prefers planned itineraries over spontaneous trips, has explored Yellowstone National Park and the historic streets of San Antonio, dreams of visiting UNESCO sites like the
    Alhambra in Spain and the ancient ruins of Machu Picchu, and often draws travel journals filled with doodles of landscapes before each family vacation.
  culinary: Javier Aranza, an adventurous home cook at level "enthusiastic beginner", loves assembling tacos al pastor with pineapple and cilantro, crafting homemade pizza topped with mozzarella, basil,
    and pepperoni, and experimenting with avocado toast seasoned with lime and chili flakes, while occasionally burning the edges of a grilled cheese in the rush to finish a game.
  core: Javier Aranza, an organized dreamer, channels boundless curiosity into art, code, and community, all while juggling a pocket‑money empire and a seasonal sniffle.
background:
  cultural: Javier grows up in a bicultural Mexican‑American household in Laredo, Texas, a city that straddles the U.S.–Mexico border. His family maintains strong ties to Mexican traditions, celebrating
    Día de los Muertos, Cinco de Mayo, and local fiestas, while also participating in American holidays such as Thanksgiving and Independence Day. He speaks Spanish at home and English at school, giving
    him fluency in both languages and a deep appreciation for the blend of cultures. The close‑knit community of Webb County, with its emphasis on family, respect (respeto), and communal support (comunidad),
    shapes his compassionate nature. He is influenced by the rich culinary, musical, and artistic heritage of the region, from mariachi and norteño music to Tex‑Mex cuisine, and he often hears stories of
    his grandparents’ life on both sides of the border.
