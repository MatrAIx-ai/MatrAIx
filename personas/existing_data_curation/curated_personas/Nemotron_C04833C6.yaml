personas:
  professional: Betty Glenn, a veteran meat‑processing specialist with three decades of precise knife‑craft, HACCP certification, and spreadsheet‑savvy inventory management, channels their meticulous, organized
    nature and imaginative curiosity into mentoring staff and designing artisanal cut‑and‑cure processes that blend technical rigor with creative flair.
  sports: Betty Glenn, an avid hiker on Heckscher State Park trails and member of the Long Island senior walking club, enjoys cheering for the New York Islanders and the Long Island Ducks while maintaining
    a modest fitness routine that includes weekly sunrise walks and occasional friendly softball games at the community league.
  arts: Betty Glenn, a watercolor enthusiast who sketches still‑life scenes while listening to Miles Davis, Ella Fitzgerald, and B.B. King, draws inspiration from the brushwork of Winslow Homer and the
    poetry of Mary Oliver, and they regularly attend small local art workshops led by contemporary plein‑air painter Jane Wright.
  travel: Betty Glenn, a methodical planner who favors quiet, culturally rich getaways, has explored the historic streets of Savannah, Georgia, the coastal villages of Provence, France, and the New England
    lighthouses, and they often schedule trips during off‑peak seasons to stretch their travel budget while seeking new culinary inspirations.
  culinary: Betty Glenn, a culinary alchemist who blends traditional Southern fare like buttermilk fried chicken and collard greens with modern sous‑vide techniques, crafts signature spice mixes featuring
    smoked paprika, chipotle, and dried thyme, and they delight in plating their creations alongside artisanal charcuterie—such as juniper‑infused pork belly and rosemary‑cured turkey—paired with a crisp
    glass of Riesling.
  core: Betty Glenn, a meticulous yet whimsically creative soul, balances the precision of a master butcher with late‑night watercolor sessions, a penchant for collecting vintage knives, and a habit of
    worrying over every detail, often sacrificing sleep to perfect a new spice blend.
background:
  cultural: Betty is a second‑generation African‑American whose family traces its roots to the Southern migration of the 1940s. Raised in a close‑knit, church‑centered community in Suffolk County, she grew
    up with the rhythms of gospel music, Sunday potlucks, and a strong emphasis on storytelling. Her culinary palate is shaped by Southern soul‑food traditions—slow‑cooked collards, smoked ribs, and fish
    fry—blended with the fresh seafood of Long Island’s coastal markets. Active in local cultural events, she volunteers at the annual Black History Month celebration at the Huntington Museum and mentors
    young Black professionals entering the trades. Betty’s identity as a Black woman in a predominantly white meat‑processing industry has fostered resilience and a deep sense of pride, which she expresses
    through both her cooking and her art.
