  hobbies: '[''Watercolor painting'', ''Sketching still‑life and landscapes'', ''Reading literary fiction and philosophy'', ''Experimental cooking and recipe development'', ''Garden tending'', ''Hiking
    local nature trails'', ''Listening to jazz and blues'', ''Creative writing and poetry'', ''Participating in a small book club'', ''Collecting vintage kitchen knives'']'
  career_goals: With retirement on the horizon, Betty aims to transition from plant floor work to a role that blends her technical mastery with her creative passions. She is pursuing the Certified Master
    Butcher credential and plans to open a boutique charcuterie shop that showcases artisanal cuts, locally sourced herbs, and her own handcrafted recipes. Simultaneously, she hopes to author a cookbook
    that interweaves culinary technique with personal narratives and watercolor illustrations. Betty also seeks to give back to her community by leading food‑safety workshops for minority youth at the local
    community college and mentoring aspiring butchers through a women‑in‑trade program. These goals reflect her desire for novelty, personal legacy, and a less stressful work environment.
