  career_goals: Audrey dreams of turning her love for media and communication into a career as a digital content strategist or influencer, ideally running her own brand that mixes lifestyle tips, tech reviews,
    and outdoor adventure storytelling. She also sees herself working in public relations or marketing for a company that values creativity and authenticity. In the longer term she hopes to launch a youth‑focused
    online platform that encourages peers to explore science and the outdoors, blending her competitive drive with a desire to impact her community positively.
