personas:
  professional: Audrey Dunmire, a 14‑year‑old aspiring performer, channels her talkative energy into leading roles in the school drama club and spontaneous improv sketches, while her critical, competitive
    streak sharpens her strategic play in battle‑royale video games and informs her eye for storytelling through photography of Utah’s mountain vistas.
  sports: Audrey Dunmire embraces the outdoors by hiking with friends in the Utah mountains, cheering for the Utah Jazz during basketball season, and occasionally joining the school’s intramural soccer
    team, though she prefers spontaneous adventure over regimented training.
  arts: Audrey Dunmire fuels her creative side by performing in school plays, binge‑watching the MCU, quoting Billie Eilish lyrics on Instagram, and studying Ansel Adams’ black‑and‑white mountain photographs
    to inspire her own snapshots.
  travel: Audrey Dunmire dreams of backpacking through the national parks of the American West, has already camped at Zion and Arches, and hopes to attend a pop‑culture convention in Tokyo, balancing family‑budget
    constraints with a love for both rugged trails and urban anime districts.
  culinary: Audrey Dunmire enjoys whipping up quick nachos with jalapeños and homemade salsa after drama rehearsals, experiments with quinoa‑based energy bowls featuring fresh berries, and proudly claims
    a semi‑competent skill at baking chocolate chip cookies for friends.
  core: Audrey Dunmire is a chatty teen who juggles stage spotlight, gaming victories, and mountain hikes, thriving on spontaneity while occasionally stumbling over disorganization and late‑night screen
    time.
background:
  cultural: Audrey was raised in a predominantly white, middle‑class family in Ogden, Utah. The local culture blends the Intermountain West’s emphasis on outdoor recreation, self‑reliance, and community
    volunteerism with contemporary American pop culture and digital media. Her family values practicality and independence, encouraging curiosity and hands‑on learning, while also participating in regional
    events like the Ogden Music Festival and local hiking traditions. This background gives her a strong sense of the natural landscape, a comfortable familiarity with mainstream media, and an appreciation
    for both traditional community ties and the fast‑paced world of online interaction.
