  hobbies: '["Reading picture books", "Building block towers", "Coloring and drawing", "Puzzle solving", "Listening to soft music", "Exploring the playground alone", "Collecting rocks or shells", "Practicing
    simple Spanish songs", "Helping parents in the kitchen making tacos", "Organizing his toy shelf"]'
  career_goals: Gabriel often talks about growing up to work in a calm, well‑organized environment. He dreams of becoming a librarian because he loves quiet spaces, organizing books, and helping others
    find information. He also imagines being a train conductor, attracted by the predictable schedule and orderly operation of a railway. Influenced by his family's Mexican heritage, he sometimes expresses
    a desire to be a community cultural guide who teaches younger children about Mexican traditions and language, reflecting his cooperative spirit and wish to contribute in a stable, organized role.
