personas:
  professional: Gabriel Alvarado is a preschooler at his neighborhood school who thrives on a predictable daily routine, quietly excels at arranging books and art supplies during free‑play, and often volunteers
    to lead the class’s Día de los Muertos craft project, reflecting his organized, methodical nature and preference for solitude.
  sports: Gabriel Alvarado is a five‑year‑old who participates in a local community soccer clinic on Tuesdays and Thursdays, admires the San Diego Wave FC women's team, and prefers the structured skill
    drills and solo ball‑control stations over chaotic scrimmages, often practicing at the quiet corner of the park’s field after school.
  arts: Gabriel Alvarado is a five‑year‑old who loves creating papel picado for his family’s Día de los Muertos altar, listening to the folk sounds of Los Tigres del Norte while drawing bright calaveras,
    and eagerly requests bilingual picture books by authors such as Duncan Tonatiuh during library story hour.
  travel: Gabriel Alvarado is a five‑year‑old who prefers meticulously planned day trips, such as the family’s weekend excursion to Legoland California where he follows a printed itinerary, enjoys the quiet
    moments at the aquarium’s tide pools, and dreams of visiting the historic plazas of Oaxaca one day.
  culinary: Gabriel Alvarado is a five‑year‑old who delights in assembling his own chicken quesadilla with mild cheese, refried beans, and a dab of salsa verde, proudly helps his abuela roll simple taco
    shells, and often requests fresh mango slices and vanilla yogurt for dessert, reflecting his love for familiar flavors and hands‑on cooking.
  core: Gabriel Alvarado is a methodical five‑year‑old who finds comfort in routine, quietly organizes his world, and embraces his bilingual family traditions while shunning chaos and impulsive whims.
background:
  cultural: Gabriel is a Mexican-American child growing up in San Ysidro, a vibrant border community in San Diego County. At home, Spanish is spoken alongside English, and family gatherings revolve around
    traditional dishes like tacos, quesadillas, and pozole. He celebrates Día de los Muertos with his grandparents, learning the stories behind calaveras and papel picado. The close‑knit neighborhood, frequent
    visits to the local park, and participation in school’s cultural heritage days reinforce his connection to Mexican customs while fostering a sense of belonging to the broader Californian context. These
    cultural experiences shape his values of family loyalty, respect for routine, and pride in his bilingual heritage.
attributes:
  skills: '["Alphabet recitation", "Counting to 20", "Bilingual Spanish-English comprehension", "Fine motor skills (cutting, drawing)", "Building block structures", "Following daily routines", "Organizing
