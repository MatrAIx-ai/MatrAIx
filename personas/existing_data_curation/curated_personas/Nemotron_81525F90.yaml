personas:
  professional: Sharon Hitson, a five‑year‑old budding scientist‑in‑training, spends afternoons turning the living room into a makeshift laboratory with magnifying glasses, building block models, and endless
    questions, while their relaxed attitude toward tidy schedules means experiments often end in creative messes they proudly call ‘artful discoveries’ and they eagerly explain each finding to any curious
    listener.
  sports: Sharon Hitson, a fan of the local Little League baseball team and the New York Yankees, dabbles in preschool soccer at the community park, loves splash‑pad water games in summer, and prefers the
    free‑form, unstructured play that lets them swing a bat or chase a ball whenever the mood strikes, while also cherishing quiet solo backyard sprints, rather than following a strict practice schedule.
  arts: Sharon Hitson, an avid admirer of bright crayons and Disney animation, spends weekends drawing whimsical creatures inspired by Pixar’s Toy Story, humming along to Taylor Swift’s Shake It Off while
    dancing in the living room, and eagerly watches performances by the local children’s theater troupe Tiny Stars, which fuels their love for colorful storytelling and their habit of mixing colors in unconventional,
    eye‑catching combos.
  travel: Sharon Hitson, who has traveled to the Magic Kingdom in Orlando, a beach resort in Myrtle Beach, and a grandparents’ farm in the countryside, dreams of exploring the giant aquariums of Tokyo and
    the castles of Scotland, favoring trips that blend playful attractions with the chance to collect seashells, and their parents’ flexible budgeting lets the adventure unfold spontaneously rather than
    via a rigid itinerary.
  culinary: Sharon Hitson, a fan of buttery macaroni‑and‑cheese, peanut butter‑jelly sandwiches, and strawberry‑banana smoothies, enjoys helping in the kitchen by sprinkling shredded cheese onto pizza and
    drawing smiley faces with ketchup, but they often leave a trail of crumbs and insist on adding extra chocolate chips, reflecting their love for sweet, comforting flavors, playful messes, and a relaxed
    approach to mealtime rules.
  core: Sharon Hitson navigates five‑year‑old life with boundless curiosity, a love for colorful messes, and a flexible, occasionally disorganized streak that turns everyday moments into miniature adventures
    they cherish.
background:
  cultural: Sharon grows up in a white, Midwestern American family in Grand Haven, Michigan, a small town on the shores of Lake Michigan. Her household celebrates typical American holidays such as Thanksgiving,
    Fourth of July, and Christmas, while also sharing stories of her parents' European ancestry that include Norwegian and German traditions often reflected in local community festivals. She attends a community
    preschool that emphasizes kindness, cooperation, and appreciation for the region's natural beauty, and she enjoys outings to the beach, the lighthouse, and local art fairs where the town's cultural
    heritage is showcased.
attributes:
  skills: '["Basic drawing and coloring", "Alphabet recognition", "Counting to twenty", "Simple puzzle solving", "Storytelling through pretend play", "Ask-and-explore questioning", "Verbal expression of
    emotions", "Cooperative group play", "Assertive sharing of ideas"]'
  hobbies: '["Crayon and watercolor painting", "Collecting shells and stones at the beach", "Reading picture books about animals and space", "Building block towers", "Dancing to music", "Make-believe role-play
    (scientist, superhero, artist)", "Exploring nature in local parks"]'
  career_goals: Sharon dreams of becoming a creative explorer who can paint the world and discover new things. She talks about being an artist who paints pictures of the ocean, an astronaut who flies to
    space, and a marine biologist who studies sea turtles she sees at the local beach. Her ambitions reflect her love for art, curiosity about the natural world, and the desire to stay flexible and free
    to explore many possibilities without being tied to a single career path.
