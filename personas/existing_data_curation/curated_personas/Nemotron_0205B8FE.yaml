  career_goals: Hong aims to enroll in a computer science program at a state university, with the long‑term ambition of becoming a software engineer focused on AI‑driven applications. He is also intrigued
    by the possibility of launching a tech startup that offers affordable custom‑built PCs and tech support for local small businesses, merging his practical skills with an entrepreneurial drive. He seeks
    internships that provide hands‑on experience while ensuring financial stability to contribute to his family. Throughout, he balances his curiosity for emerging technologies with a desire for a stable,
    well‑compensated career path.
