personas:
  professional: Hong Liang, a budding software engineer and AI enthusiast, blends sharp Python and JavaScript coding skills with hands‑on PC‑building expertise, channels his competitive gaming strategy
    into algorithmic problem‑solving, and meticulously balances schoolwork, family expectations, and cautious internship selection to ensure both technical growth and financial stability.
  sports: Hong Liang plays pickup basketball at the North Brunswick court with friends, follows the New York Knicks and Philadelphia 76ers passionately, and trains in Taekwondo at the community dojo, balancing
    the camaraderie of team sport with the disciplined solitude of martial arts.
  arts: Hong Liang immerses himself in cyberpunk literature, devouring William Gibson’s Neuromancer and Liu Cixin’s The Three‑Body Problem, while applying his Adobe Photoshop and Canva design skills to
    create neon‑themed flyers inspired by synthwave musicians like Kavinsky.
  travel: Hong Liang’s travel dreams oscillate between revisiting family in Taiwan during Lunar New Year celebrations and a future tech‑focused trip to Tokyo’s Akihabara district, while they also fantasize
    about a summer internship road‑trip to Silicon Valley’s startup hub.
  culinary: Hong Liang enjoys the comforting heat of Taiwanese beef noodle soup, the crisp bite of homemade scallion pancakes, and late‑night bubble tea, and they can whip up a quick stir‑fry with garlic,
    ginger, and soy sauce after long gaming marathons, though their cooking skills remain modest.
  core: Hong Liang is a hyper‑focused 19‑year‑old tech tinkerer who balances competitive gaming, disciplined study, and entrepreneurial ambitions while wrestling with chronic stress and a tendency to overspend
    on gear.
background:
  cultural: Hong is a second‑generation East Asian American, born to immigrant parents who moved to New Jersey from Taiwan. He grew up in a bilingual household, speaking Mandarin at home while being educated
    in English. His family emphasizes academic achievement and respect for elders, and he participates in cultural traditions such as Lunar New Year and Mid‑Autumn Festival celebrations with his extended
    family. Living in North Brunswick, a diverse community with a sizable Asian‑American population, he navigates both his cultural heritage and mainstream American customs, shaping a bicultural identity
    that values hard work, community ties, and adaptability.
