  hobbies: '[''Abstract painting'', ''Mixed‑media collage'', ''Reading speculative fiction'', ''Hiking in the Santa Monica Mountains'', ''Yoga and mindfulness practice'', ''Volunteering at community art‑therapy
    workshops'', ''Participating in theater improv'', ''Experimenting with culinary fusion'']'
  career_goals: Kathleen is aiming to deepen her clinical leadership by pursuing a Master of Science in Nursing with a concentration in Nursing Informatics or Integrative Health. She envisions leading a
    hospital‑wide program that integrates art‑therapy modalities into post‑operative recovery and chronic‑illness management. In the longer term, she hopes to design a digital platform that empowers patients
    to track health metrics while expressing creativity through guided visual journaling. Additionally, she aspires to mentor the next generation of nurses, especially those interested in blending science,
    technology, and the arts to improve patient outcomes.
