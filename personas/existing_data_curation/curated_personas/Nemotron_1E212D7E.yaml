  hobbies: '[''Fantasy illustration'', ''Reading magical realism'', ''Minecraft world building'', ''Multiplayer video gaming'', ''After‑school theater'', ''Art workshops'', ''Nature walks'', ''Sticker collecting'',
    ''Meme creation'', ''DIY crafts'']'
  career_goals: Cheila dreams of becoming a concept artist for video games or a graphic novelist, where she can fuse her love for abstract visuals and narrative storytelling. She also envisions creating
    an online community that showcases emerging teen artists and hosts creative challenges, allowing her competitive spirit to shine. In the long term, she hopes to attend a specialized art and design college,
    build a standout portfolio, and possibly launch her own indie game studio that blends interactive storytelling with hand‑drawn art.
