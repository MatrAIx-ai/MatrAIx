  career_goals: Although still in kindergarten, Dorothy often talks about her future dreams. She imagines becoming an artist who can bring her imaginative ideas to life, or a scientist who explores how
    things work, inspired by her love for new ideas and unconventional thinking. She also expresses a desire to help people, mentioning that she might one day be a teacher or a librarian, roles where she
    could share her love of books and organize learning spaces for others. Her organized nature fuels a goal to always be prepared and reliable in whatever path she chooses.
