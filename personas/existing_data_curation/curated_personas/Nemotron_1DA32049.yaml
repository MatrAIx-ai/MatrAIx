personas:
  professional: Dorothy Ross is a budding young illustrator who meticulously plans each page of her storybook sketches before adding vibrant colors, using her quiet focus and love for unconventional ideas
    to create whimsical scenes that delight her small circle of friends.
  sports: Dorothy Ross is a member of the Sunrise Sprouts Mini Soccer Club, loves cheering for the hometown Riverview Rockets baseball team, and practices gymnastics at the community center, where structured
    routines satisfy her love for order and movement.
  arts: Dorothy Ross spends afternoons painting scenes inspired by Dr. Seuss’s playful rhymes, replicating Matisse’s cut‑out style with scissors, and humming the soft piano themes from Walt Disney’s “Fantasia”
    while she crafts collaborative storybooks with her friends.
  travel: Dorothy Ross plans family outings with the precision of a tiny travel agent, favoring day trips to the nearby botanical garden, dreaming of future visits to the Grand Canyon and the enchanted
    castles of Disneyland, and always insists on mapping a route on her crayon‑drawn map before departure.
  culinary: Dorothy Ross loves peanut butter‑banana sandwiches, hand‑cut carrot sticks dipped in ranch dressing, and attempts to bake chocolate chip cookies with help, savoring the sweet aroma of melted
    butter and vanilla that fills the kitchen.
  core: Dorothy Ross is a quietly intense six‑year‑old who blends childlike curiosity with a methodical love for order, turning everyday puzzles into creative adventures while keeping a tidy wall of crayons.
background:
  cultural: Dorothy grows up in a typical Midwestern white family in Papillion, Nebraska. Her household values community, modesty, and a strong sense of independence, reflecting the region's agricultural
    and small-town heritage. She attends a local public kindergarten where she participates in community events such as library story hours, seasonal festivals, and church gatherings. The culture emphasizes
    politeness, reliability, and respect for personal space, which aligns with Dorothy's reserved yet cooperative nature. Her family encourages curiosity and artistic expression while also teaching her
    the importance of order and responsibility, shaping her balanced personality.
