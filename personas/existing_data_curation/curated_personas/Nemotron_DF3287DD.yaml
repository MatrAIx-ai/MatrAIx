personas:
  professional: A community arts organizer, Jessica Steele draws on her knack for bringing people together and her love of Southern craftsmanship to lead a monthly seniors’ art‑and‑craft circle, coordinate
    neighborhood potluck gatherings, and spearhead a project digitizing cherished family recipes and oral histories, all while embracing a relaxed, improvisational approach that tolerates occasional disarray.
  sports: A low‑impact fitness enthusiast, Jessica Steele enjoys strolling along the Pee Dee River with the local River Walkers Club, attends a gentle water‑aerobics class at the community center each summer,
    passionately follows the Carolina Panthers during football season and the Atlanta Braves in baseball, and occasionally joins a community softball league for seniors during spring.
  arts: An avid cultural explorer, Jessica Steele frequents regional folk‑art galleries featuring works by Howard Finster and Faith Ringgold, delights in listening to the soulful blues of Rhiannon Giddens
    and the folk‑rock of The Avett Brothers, collects limited‑edition prints by contemporary textile artist Sheila Hicks, and regularly participates in book‑club discussions about the paintings of Andrew
    Wyeth and the films of Frances McDormand.
  travel: A deliberate yet spontaneous traveler, Jessica Steele enjoys short road trips to Charleston’s historic district and Asheville’s craft fairs, has a treasured memory of a week‑long folk‑festival
    tour in New Orleans, and dreams of exploring the cobblestone streets of Savannah and the art museums of Florence, Italy, while often planning her journeys through community‑recommended itineraries rather
    than rigid schedules.
  culinary: A seasoned home chef, Jessica Steele excels at classic Southern comfort dishes like shrimp and grits, collard greens flavored with smoked turkey, and sweet‑potato banana pudding, while experimenting
    with modern twists such as bourbon‑glazed pecan‑crusted chicken and miso‑infused jambalaya, using ingredients like fresh river catfish, heirloom tomatoes, pimento cheese, and locally sourced okra to
    create meals that honor tradition yet surprise the palate.
  core: An empathetic community catalyst, Jessica Steele blends Southern hospitality with a curious love for art and cuisine, balances a relaxed approach to obligations with a drive to preserve family heritage,
    and occasionally lets disorganization spark spontaneous creativity.
background:
  cultural: Jessica was raised in a small Lowcountry town in South Carolina, where Southern hospitality, church fellowship, and strong community ties shaped her upbringing. Family traditions include cooking
    heritage dishes, attending church potlucks, and preserving oral histories. While deeply rooted in these customs, she maintains an open‑minded curiosity for new artistic expressions and ideas, often
    blending traditional Southern influences with contemporary art and culinary experimentation.
attributes:
  skills: '[''Culinary arts (Southern cuisine)'', ''Gardening and horticulture'', ''Quilting and knitting'', ''Event planning and volunteer coordination'', ''Interpersonal communication and mediation'',
    ''Basic computer and internet use'', ''Storytelling and oral history preservation'']'
  hobbies: '[''Visiting art galleries and folk festivals'', ''Reading art, philosophy, and history books'', ''Gardening'', ''Cooking and recipe experimentation'', ''Quilting and knitting'', ''Birdwatching'',
    ''Walking in nature'', ''Participating in small book clubs'']'
  career_goals: Jessica hopes to deepen her engagement with the local community by establishing a monthly art‑and‑craft circle for seniors, digitizing and sharing family recipes and oral histories, and
    eventually publishing a modest cookbook that blends traditional Southern dishes with creative twists. She also plans to enroll in a community‑college course on art appreciation or local history to feed
    her curiosity and broaden her knowledge.
