  career_goals: Yen dreams of becoming a wildlife biologist or veterinarian because she is fascinated by animals and the natural world. She also hopes to deepen her skills in technology, aiming to join
    a middle‑school robotics club and eventually study engineering. In the short term, she wants to maintain top grades in science and math, win a regional science fair, and help mentor younger students
    in her community.
