personas:
  professional: A budding young engineer, Yen Le leverages their curiosity and methodical nature to construct LEGO structures, tinker with simple robotics kits, and conquer logic-heavy video puzzles, laying
    the groundwork for a future in mechanical design or coding.
  sports: A nature-loving athlete, Yen Le spends Saturdays hiking the nearby Greenleaf Trail with their family, participates in the Maple County Kids FC soccer team, and enjoys weekend cycling sessions
    with the Junior Trail Club.
  arts: An aspiring young artist, Yen Le practices calligraphy and sketching in quiet afternoons, immerses themselves in the mystery adventures of J.K. Rowling's Harry Potter series, and finds inspiration
    from the piano compositions of Ludovico Einaudi and the animation of Studio Ghibli's Spirited Away.
  travel: A curious explorer, Yen Le has trekked the Greenleaf Trail in their hometown, dreams of visiting Yellowstone National Park's geysers, and plans a future trip to Tokyo's robotics museums, balancing
    their love for adventure with the constraints of school holidays and parental budget.
  culinary: A budding kitchen helper, Yen Le enjoys rolling pork-and-chive dumplings and crisp spring rolls alongside their family, perfects the soy-ginger dipping sauce with sesame oil, and occasionally
    experiments with stir-fried noodles seasoned with garlic and cilantro.
  core: Yen Le is a methodical, curiosity-driven ten-year-old who balances puzzle-solving, creative calligraphy, and family cooking, while occasionally shirking bedtime to finish a video game level.
background:
  cultural: Yen’s family traces its roots to East Asia, maintaining cultural traditions such as celebrating Lunar New Year, preparing traditional meals, and speaking their heritage language at home. Growing
    up in El Cajon, she blends these practices with everyday American life—attending school events, joining local community programs, and sharing her cultural heritage through school multicultural activities.
    Her upbringing emphasizes respect for education, family cohesion, and community involvement, all of which shape her personal values and aspirations.
