  hobbies: '[''Painting'', ''Sketching'', ''Visiting art museums'', ''Reading historical fiction'', ''Art history'', ''Community theater'', ''Yoga'', ''Mindfulness meditation'', ''Hiking'', ''Photography'',
    ''Gardening'', ''Playing piano'']'
  career_goals: Looking ahead, Nicole aims to transition from full‑time classroom teaching to a role as a curriculum specialist or arts integration coordinator within her district, where she can shape district‑wide
    programs that embed creativity across subjects. She also hopes to develop a community‑based after‑school art workshop that partners with local galleries and museums, and she is considering pursuing
    a master’s degree in art education to deepen her scholarly foundation. In the longer term, she dreams of authoring a children’s book that blends storytelling with visual art, and she envisions mentoring
    retiring teachers to pass on her accumulated classroom wisdom.
