  hobbies: '[''Cooking Spanish cuisine'', ''Hiking'', ''Orchard gardening'', ''Weekend trips'', ''Classical guitar'', ''Vintage computer restoration'', ''Board games with friends'']'
  career_goals: Alberto aims to transition into a technical lead role where he can guide a small, tightly‑knit team in creating software solutions for local non‑profits and senior‑citizen services. He also
    hopes to establish a part‑time consultancy that offers affordable, user‑friendly digital tools for community organizations in the El Dorado region. Over the next five years, he plans to mentor youth
    in coding through volunteer workshops, leveraging his compassionate nature to give back while keeping his work schedule flexible enough to accommodate his love of routine and occasional spontaneous
    projects.
