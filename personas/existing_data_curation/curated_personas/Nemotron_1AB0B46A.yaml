personas:
  professional: Alberto Corbera, a seasoned full‑stack software engineer with over 25 years of experience, applies a methodical debugging style and compassionate mentorship, and they guide small teams building
    community-focused web applications.
  sports: Alberto Corbera, an avid hiker who joins the Sierra Foothills Trail Club and follows the Sacramento Kings and the Oakland Athletics, treats fitness as a routine outdoor activity blended with casual
    attendance at local baseball games, and they complement this with occasional cycling rides through the foothills.
  arts: Alberto Corbera, a relaxed classical guitar player who weaves flamenco flair into nightly sessions, admires Paco de Lucía and John Williams, participates in modest board‑game gatherings with close
    friends, and they find creative expression a soothing counterpoint to coding.
  travel: Alberto Corbera, who favors spontaneous weekend escapes to nearby vineyards in Napa and Sonoma as well as carefully planned trips to historic sites like Granada and tech hubs such as Tokyo, balances
    wanderlust with a modest budget and a love for both relaxation and cultural discovery, and they often blend solo travel with occasional group outings.
  culinary: Alberto Corbera, an advanced home chef who expertly prepares paella with locally sourced saffron, gazpacho with heirloom tomatoes, and a rotating menu of tapas featuring olives, chorizo, and
    fresh seafood, enjoys experimenting with seasonal California produce while preserving traditional flavors, and they treat each meal as a ritual that connects past and present.
  core: Alberto Corbera, a routine‑loving yet occasionally spontaneous 51‑year‑old full‑stack developer who blends a compassionate, mentorship‑focused work ethic with flamenco guitar evenings, orchard tending,
    and a penchant for vintage computer restoration, navigates life with quiet resilience and a love for modest pleasures, and they cherish both solitude and close‑knit community ties.
background:
  cultural: Alberto was raised in a Spanish immigrant family that maintained strong ties to its Andalusian and Catalan roots. Spanish was spoken at home, and he grew up celebrating holidays such as Semana
    Santa, Día de los Reyes Magos, and regional festivals with family meals, music, and dance. The cultural emphasis on hospitality, communal dining, and practical craftsmanship shaped his values of cooperation
    and helping others. While living in California, he blends these traditions with the local lifestyle, participating in community events, supporting Spanish cultural organizations, and savoring the Mediterranean
    influences in his everyday life.
