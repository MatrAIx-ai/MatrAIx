persona_description: A historian who specializes in the study of Jewish culture and history, particularly the role of the Jewish merrymakers and wedding entertainers in medieval and early modern times.
  He or she is interested in the evolution of Jewish wedding customs, the impact of religious and political factors on these customs, and the contributions of Jewish humorists and jesters to Jewish society.
  The historian is likely to be interested in the works of scholars like R. David Levy and Eliakim Zunser, as well as the contributions of Jewish literature to the history of Jewish culture and society.
