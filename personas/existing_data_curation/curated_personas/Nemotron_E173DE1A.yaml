    analysis with Excel and Power BI","Safety software (Intelex, SAP EHS)","Certified Safety Professional (CSP)","Certified Industrial Hygienist (CIH)","Conflict mediation and team facilitation"]'
  hobbies: '["Reading historical biographies and science nonfiction","Vegetable gardening","Hand‑knitting blankets for community shelters","Morning walks and birdwatching on the American Tobacco Trail","Nature
    photography","Small book‑club gatherings","Volunteering at community health‑fair ergonomic assessments","Gentle yoga and mindfulness meditation"]'
  career_goals: Ariza aims to advance to a senior safety leadership role, such as Director of Occupational Health and Safety for a regional manufacturing hub, where she can integrate physical safety with
    mental‑wellbeing programs. She plans to earn the Certified Occupational Health Nurse (COHN) credential to broaden her health‑service expertise. Over the next five years she hopes to launch a mentorship
    network for early‑career safety professionals in the Durham area, collaborate with local universities on ergonomics research for the tech sector, and influence state‑level safety policy through active
    participation in the North Carolina Safety Council.
