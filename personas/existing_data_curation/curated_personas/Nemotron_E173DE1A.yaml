personas:
  professional: Ariza Dollins, a seasoned occupational health and safety professional in the Research Triangle, leverages her CSP and CIH credentials to design ISO 45001 safety management systems, conduct
    quantitative risk assessments, and cultivate a collaborative safety culture through structured training and empathetic conflict mediation, balancing her Midwestern pragmatism with Southern hospitality
    to mentor teams and drive measurable reductions in workplace incidents.
  sports: Ariza Dollins enjoys early‑morning walks on the American Tobacco Trail, participates in a local bird‑watching walking club, cheers for the Durham Bulls baseball team, follows the North Carolina
    FC soccer squad, and practices gentle yoga twice a week at a community studio, balancing low‑impact fitness with a love for regional sports culture.
  arts: Ariza Dollins spends evenings reading historical biographies by Doris Kearns Goodwin, listens to folk legends like Emmylou Harris and classical symphonies by Beethoven while knitting, attends quarterly
    performances at the Durham Performing Arts Center featuring shows such as "The Music Man", and captures nature photography of migratory birds, weaving artistic appreciation into her structured life.
  travel: Ariza Dollins prefers meticulously planned road trips to historic destinations like Williamsburg, VA, and the Great Smoky Mountains, where she balances hiking with photography, occasionally treats
    herself to a culturally immersive week‑long tour of Tuscany’s vineyards, but always returns home to tend her garden and volunteer, reflecting a blend of adventurous curiosity and rooted community commitment.
  culinary: Ariza Dollins favors farm‑to‑table Southern cuisine, regularly prepares collard greens seasoned with smoked turkey, pan‑fried catfish with lemon‑caper sauce, and her garden’s heirloom tomatoes
    in fresh caprese salads, enjoys baking cornbread with honey, and experiments with pickling cucumbers and carrots, showcasing both refined palate and practical cooking skills.
  core: Ariza Dollins is a detail‑oriented safety leader who balances disciplined budgeting, proactive health management, and a love of quiet outdoor pursuits, while occasionally indulging in garden‑focused
    splurges and neglecting dental appointments.
background:
  cultural: Ariza grew up in a middle‑class Midwestern family that emphasized education, reliability, and community service. After completing a graduate STEM degree, she relocated to the Research Triangle
    in North Carolina, where she has embraced Southern hospitality and the region’s collaborative spirit. Her cultural identity blends Midwestern pragmatism with Southern community values, fostering an
    appreciation for local traditions such as farmers’ markets, regional cuisine, and collective well‑being. This background underpins her practical, structured approach to work and her compassionate commitment
    to improving the health and safety of those around her.
attributes:
