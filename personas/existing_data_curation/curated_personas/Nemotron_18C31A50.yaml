personas:
  professional: A senior facilities maintenance specialist, Kanitha Pham leverages her methodical documentation skills and hands‑on expertise in electrical wiring, plumbing, HVAC, and carpentry to drive
    preventive maintenance programs, mentor junior staff, and champion sustainable smart‑building upgrades, all while maintaining a competitive edge in troubleshooting complex facility challenges.
  sports: An enthusiastic hiker, Kanitha Pham explores the Minnesota trail system with the Twin Cities Hiking Club, follows the Minnesota Twins and Vikings with a competitive streak of fantasy league analysis,
    and participates in a casual community bowling league to keep active without overexertion.
  arts: An avid patron of the arts, Kanitha Pham regularly visits the Walker Art Center and the Minneapolis Institute of Art, joins community mural projects, transforms discarded materials into functional
    sculptures, and draws inspiration from Ai Weiwei, Yoko Ono, as well as the folk sounds of The Chieftains and world‑music group Tinariwen.
  travel: A detail‑oriented traveler, Kanitha Pham prefers well‑planned road trips across the Upper Midwest, has trekked through Yellowstone and Banff National Parks, dreams of attending Thailand’s lantern
    festival, and balances adventure with budget constraints by staying in family‑run inns and using airline reward points.
  culinary: A culinary enthusiast, Kanitha Pham skillfully prepares pho, bánh mi, and fresh spring rolls using lemongrass, fish sauce, and garden‑grown herbs, experiments with upcycled kitchen tools, and
    hosts intimate dinner gatherings where she pairs dishes with curated playlists of folk and world music.
  core: Kanitha Pham blends a systematic, safety‑first work ethic with a vibrant, DIY‑driven artistic life, staying financially disciplined, health‑aware, and competitively curious about every new challenge.
background:
  cultural: Kanitha is a first‑generation Vietnamese American who grew up in a bilingual household in the Twin Cities area. Her family maintains cultural traditions such as celebrating Tet, preparing pho
    and banh mi for community gatherings, and participating in local Vietnamese cultural organizations. Living in Saint Paul, Minnesota, she blends her Southeast Asian heritage with Midwestern values of
    hard work and community involvement. This dual cultural perspective informs her appreciation for both traditional crafts and contemporary art, and it fuels her commitment to mentorship and sharing practical
    skills within diverse community settings.
attributes:
