  career_goals: Kanitha aims to advance to a senior facilities supervisor role within the next five years, securing certifications such as the Certified Facility Manager (CFM) and OSHA safety credentials.
    She wants to lead a team that implements sustainable and energy‑efficient maintenance practices, leveraging her interest in new technologies. Long‑term, she envisions establishing a small, community‑focused
    maintenance consulting business that offers training workshops for aspiring tradespeople, especially women and newcomers to the field. She also plans to pursue continuing education courses in facilities
    management to stay current with industry standards while ensuring a stable retirement plan.
