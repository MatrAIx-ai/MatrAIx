  career_goals: Eloy aims to earn ASCP certification and, within the next five years, move into a senior technologist or supervisory role where he can shape lab policies and mentor new staff. He is particularly
    interested in expanding his expertise in molecular pathology and hopes to lead a pilot program that offers rapid, point‑of‑care genetic testing for his community clinic. His competitive drive pushes
    him to achieve the lowest turnaround times and highest accuracy rates in the department, and he envisions eventually using his practical knowledge to consult on workflow efficiency for regional laboratories.
