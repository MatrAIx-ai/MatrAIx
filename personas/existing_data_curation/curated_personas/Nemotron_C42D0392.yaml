  hobbies: '[''Hiking Appalachian trails'',''Landscape photography'',''Classic truck restoration'',''Gardening (heirloom vegetables)'',''Reading science‑fiction'',''Crossword and Sudoku puzzles'',''Participating
    in local historical society'',''Cooking traditional Southern dishes'',''Volunteering at the community library'']'
  career_goals: London aims to leverage her practical expertise into a supervisory role within regional freight operations. Over the next five years she plans to obtain a CDL Class A endorsement, complete
    a certification in fleet safety management, and enroll in a part‑time logistics management program. Her long‑term ambition is to own a small, family‑run trucking company that prioritizes driver well‑being
    and environmentally conscious routing, allowing her to mentor younger drivers while maintaining a stable, low‑stress work‑life balance after her divorce.
