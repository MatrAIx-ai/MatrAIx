personas:
  professional: George Fulton, a seasoned software engineering veteran with four decades of experience, leverages their deep mastery of full‑stack development, cloud‑native architecture, and DevOps automation
    to mentor teams, drive sustainable tech strategy for emerging startups, and blend practical reliability with a curiosity for emerging AI tools.
  sports: George Fulton is an avid weekend hiker on the coastal and forest trails of the Bay Area, a member of the local Sierra Club hiking group, follows the San Francisco 49ers and Golden State Warriors,
    and squeezes in low‑impact cycling on Sunday mornings to complement the fitness routine they value.
  arts: George Fulton captures street scenes in monochrome reminiscent of Henri Cartier‑Bresson, admires Ansel Adams’ landscapes, frequents jazz concerts featuring Miles Davis tributes and John Coltrane
    live recordings, and curates a modest collection of vintage film cameras that reflect their artistic curiosity.
  travel: George Fulton prefers well‑planned but flexible trips, having explored the vineyards of Tuscany, the historic ruins of Athens on a Mediterranean cruise, and the alpine trails of the Swiss Alps,
    while dreaming of a solo trek through Patagonia’s Torres del Paine and a road trip along Iceland’s Ring Road.
  culinary: George Fulton is an enthusiastic home chef who masters Mediterranean dishes like Greek moussaka, Spanish paella, and Italian risotto, regularly experiments with fresh basil, sun‑dried tomatoes,
    feta cheese, and high‑quality olive oil, and enjoys hosting modest dinner gatherings for fellow tech meetups.
  core: George Fulton is a pragmatic tech sage who balances curiosity with reliability, mentors emerging engineers, hikes coastal trails with a camera in hand, crafts custom furniture, and savors jazz and
    Mediterranean flavors on the side.
background:
  cultural: Born and raised in Des Moines, Iowa, in a family of Scottish‑English descent, George grew up with a Midwestern work ethic and a strong sense of community. After earning his B.S. in Computer
    Science at the University of Illinois, he moved to the San Francisco Bay Area in the late 1990s to join the tech boom. In San Francisco he adopted the region’s progressive, multicultural vibe while
    retaining his practical, self‑reliant roots. He celebrates traditional American holidays such as Thanksgiving and the Fourth of July, participates in local volunteer programs, and maintains ties to
    his Scottish heritage through occasional trips to Scotland and involvement in a Celtic music society.
