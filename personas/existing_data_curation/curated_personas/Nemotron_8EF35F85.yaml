personas:
  professional: An aspiring architect named Terry Nassy, 26, uses AutoCAD, Revit, SketchUp and ETABS to produce meticulous construction documents and 3‑D visualizations, blends sustainable design principles
    with LEED guidelines, and leverages their organized, reliable nature to coordinate multidisciplinary teams, keep projects on schedule, and meticulously manage budgets, all while aiming for licensure
    and leading public‑sector design projects.
  sports: An avid hiker and occasional runner, Terry Nassy trails the Oconee County pathways with the local Oconee Trail Runners club, follows the Atlanta Falcons, Braves and Hawks for weekend game viewings,
    and complements outdoor sessions with a structured strength‑training routine at the nearby gym, preferring early‑morning workouts to maintain consistency.
  arts: Terry Nassy spends evenings modelling historic structures while listening to Radiohead and Philip Glass, admires the photography of Ansel Adams and the architectural works of Zaha Hadid, frequently
    visits the High Museum of Art to view contemporary installations, and collects coffee‑table books on Frank Lloyd Wright, all of which inform their design aesthetic.
  travel: A methodical planner, Terry Nassy has explored Savannah’s historic squares, toured Barcelona’s Gaudí masterpieces, and aspires to visit Kyoto’s temples, always mapping itineraries in detail, balancing
    weekend getaways with budget constraints, and favoring trips that combine architectural research with natural scenery.
  culinary: Terry Nassy, an intermediate home cook, delights in preparing shrimp and grits with Andouille sausage, roasted Brussels sprouts tossed with balsamic glaze, and pimento cheese crostini, while
    also savoring farm‑to‑table dishes at The Mill House and experimenting with fresh thyme and rosemary in their own kitchen.
  core: Terry Nassy is a detail‑oriented architect who balances solitary model‑building with structured planning, methodically manages finances, occasionally forgets flossing, and channels a love of historic
    design into both work and weekend adventures.
background:
  cultural: Terry grew up in a tight‑knit African‑American family in the rural outskirts of Athens, GA. His grandparents were part of the post‑World War II migration that brought many Southern Black families
    to the region, and their stories of resilience and community solidarity shaped his worldview. Family gatherings, church services, and local cultural festivals introduced him to the rhythms of African‑American
    music, oral history, and communal stewardship of space. These experiences instilled in him a deep appreciation for environments that facilitate social connection and cultural expression. As an architect,
    Terry consciously incorporates elements that reflect his heritage—such as adaptable gathering areas, locally sourced materials, and design motifs inspired by African‑American architectural traditions—into
    his projects. He remains engaged with the Athens Black Historical Society and volunteers for community events that celebrate Black art, history, and design.
