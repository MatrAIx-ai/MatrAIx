    Detailing'', ''Team Coordination'', ''Strategic Problem Solving'', ''Effective Written Communication'']'
  hobbies: '[''Scale model building'', ''Chess'', ''Hiking'', ''Architectural photography'', ''Reading architectural history and theory'', ''STEM mentorship for high school students'', ''Cooking experimental
    recipes'']'
  career_goals: Over the next five to seven years, Terry intends to become a fully licensed architect by passing the NCARB Architect Registration Examination and obtaining state licensure in Georgia. He
    aspires to lead design teams on medium‑scale public and community projects, with a focus on affordable housing, educational facilities, and culturally responsive public spaces that serve diverse populations.
    Terry also seeks to deepen his expertise in sustainable design, aiming for LEED AP certification. In the longer term, he envisions establishing his own practice that integrates environmentally responsible
    architecture with inclusive design, while mentoring emerging Black architects and providing internships for local STEM students.
