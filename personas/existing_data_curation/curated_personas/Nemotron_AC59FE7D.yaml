personas:
  professional: Trinidad Gonzalezgarcia, a seasoned cleaning professional with over thirty years of commercial and residential experience, combines meticulous scheduling, bilingual communication, and a
    curiosity for eco‑friendly solutions to keep facilities spotless, while they pursue CPC certification and an OSHA 30‑hour safety course to secure a supervisory role at a regional hospital.
  sports: Trinidad Gonzalezgarcia enjoys low‑impact fitness through daily walks along the Atchafalaya Basin, occasional kayaking in spring, and they are a devoted fan of the New Orleans Saints and LSU Tigers,
    occasionally attending Saturday night football games while they keep a modest membership in the local senior walking club.
  arts: Trinidad Gonzalezgarcia finds artistic fulfillment in knitting intricate scarves while listening to classical guitarists like Andrés Segovia, they attend quarterly church choir performances, read
    historical fiction by Ken Follett, and savor the paintings of Frida Kahlo displayed in local museum exhibits.
  travel: Trinidad Gonzalezgarcia prefers meticulously planned, low‑key travel centered on birdwatching and natural scenery, they have explored the Everglades and the historic streets of New Orleans, while
    dreaming of a guided tour of the Galápagos Islands and a peaceful retreat in the Canadian Rockies, all while budgeting each trip to protect their modest retirement savings.
  culinary: Trinidad Gonzalezgarcia is an adept home cook who transforms traditional dishes such as baleadas, tamales, and sopa de caracol using garden‑fresh tomatoes, peppers, cilantro, and locally sourced
    shrimp, they frequently tailor recipes with Louisiana spices like andouille and cayenne to create comforting, flavor‑rich meals for family gatherings.
  core: Trinidad Gonzalezgarcia blends methodical precision with quiet curiosity, tending a vegetable garden, mastering cleaning protocols, and silently humming in the choir while they occasionally hoard
    spare cleaning supplies in the garage.
background:
  cultural: Trinidad was born in a small town near Tegucigalpa, Honduras, and moved to Louisiana in her early twenties after marrying her partner, a native of Ville Platte. She maintains fluency in Spanish
    and English, allowing her to bridge cultural gaps in the community. Her upbringing emphasized strong family ties, Catholic faith, and a deep respect for communal celebrations, which she blends with
    the Creole traditions of Evangeline Parish. She regularly prepares family recipes that fuse Honduran flavors with Cajun spices, and holidays are marked by a mix of traditional Honduran music such as
    punta and local Zydeco tunes. Trinidad values humility, hard work, and the preservation of her heritage, often sharing stories of her hometown with neighbors while participating in local cultural festivals
    when she feels comfortable.
attributes:
  skills: '["Commercial cleaning", "Floor care (stripping, waxing, buffing)", "Restroom sanitation", "Safe chemical handling and mixing", "Inventory control and supply budgeting", "Scheduling and staff
