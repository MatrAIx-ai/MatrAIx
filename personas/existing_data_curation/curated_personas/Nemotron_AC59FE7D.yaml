    improvement and eco‑friendly cleaning practices", "Basic plumbing and minor electrical repairs"]'
  hobbies: '["Gardening (vegetable and herb garden)", "Cooking traditional Honduran dishes", "Reading historical fiction and home‑maintenance manuals", "Knitting scarves and blankets", "Birdwatching at
    local wetlands", "Occasional participation in church choir"]'
  career_goals: Although approaching retirement age, Trinidad is motivated to leverage her expertise into a supervisory role within the facilities department of a regional hospital or school district. She
    aims to obtain the Certified Professional Cleaner (CPC) credential and complete an OSHA 30‑hour construction safety course to solidify her qualifications for a Facilities Supervisor position. In the
    longer term, she envisions transitioning to a part‑time consulting role, helping small businesses in Ville Platte adopt sustainable cleaning protocols and efficient inventory systems. Securing a modest
    pension and building a small contingency fund are also key financial goals, ensuring she can maintain independence while continuing to contribute her knowledge to the community.
