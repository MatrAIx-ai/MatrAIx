  career_goals: In the coming years, Bruce hopes to deepen his artistic abilities by attending a summer art camp and joining the school's graphic design elective. He dreams of one day working as a concept
    artist or video-game designer, blending his love for visual storytelling with interactive technology. He also imagines a role that lets him mentor younger kids, such as running an after-school art club
    or leading community youth projects. Short-term goals include improving his portfolio, learning basic Photoshop, and earning a leadership badge in the school's student council.
