personas:
  professional: Luis Gonzalez, an aspiring cartoonist and budding robotics tinkerer, channels their curiosity and love for storytelling into sketching comic strips while experimenting with LEGO‑powered
    contraptions, often juggling school projects with a relaxed approach that favors spontaneous creativity over rigid schedules.
  sports: Luis Gonzalez loves playing forward for the Junior Thunder Soccer Club at the local park, cheering for the Las Vegas Raiders on game days, and embraces energetic weekend matches, though they sometimes
    skip warm‑ups when excitement takes over.
  arts: Luis Gonzalez draws inspiration from cartoonist Bill Watterson, animator Hayao Miyazaki, and enjoys listening to regional Mexican music artists like Vicente Fernández while building LEGO scenes,
    weaving vivid graphic novel narratives that reflect their open‑minded curiosity and love for colorful expression.
  travel: Luis Gonzalez prefers spontaneous weekend getaways, dreaming of exploring the Grand Canyon's vistas, the bustling streets of Tokyo for anime and LEGO exhibitions, and revisiting the Las Vegas
    Natural History Museum, always packing a sketchpad for impromptu drawing sessions.
  culinary: Luis Gonzalez favors bold flavors, often munching on chicken quesadillas, pepperoni pizza, and homemade mac and cheese while attempting to replicate LEGO‑themed cupcakes, showing a playful yet
    messy approach to cooking that mirrors their creative spirit.
  core: Luis Gonzalez is a curious, art‑loving eleven‑year‑old who balances spontaneous LEGO robotics projects with soccer kicks, occasional snack splurges, and a habit of forgetting warm‑ups and inhalers.
background:
  cultural: Luis comes from a Mexican family that keeps traditions alive through celebrations like Día de los Muertos, cooking homemade tacos, and speaking Spanish at home. Living in Las Vegas, he blends
    his cultural roots with the city's multicultural vibe, which fuels his curiosity about art, music, and diverse experiences while staying grounded in the values of family, community, and festivity.
