  career_goals: Luis dreams of turning his love for art and technology into a career as a graphic illustrator or video game designer, where he can create characters that tell stories from his Mexican heritage.
    He also hopes to lead youth arts workshops in his community, combining his sociable nature with a desire to share cultural traditions and inspire other kids to explore creative tech.
