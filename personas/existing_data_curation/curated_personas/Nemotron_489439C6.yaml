  career_goals: Leigh Ann aims to transition into a senior leadership role, such as Chief Financial Officer or Audit Director, within the next five years. She aspires to lead a regional audit practice,
    champion digital transformation by integrating AI‑driven analytics into audit workflows, and develop a mentorship program for emerging accountants. She also plans to obtain a Certified Management Accountant
    (CMA) credential to broaden her strategic finance perspective, while maintaining a balanced workload that reduces stress and allows her to stay actively engaged with her community.
