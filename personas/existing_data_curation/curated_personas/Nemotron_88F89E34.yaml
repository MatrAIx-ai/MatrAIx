personas:
  professional: Benjamin Wescott is a 17‑year‑old self‑taught digital illustrator and budding indie game creator who channels his curiosity and competitive edge into fast‑paced sketch‑to‑screen experiments,
    despite often battling deadlines and a preference for spontaneous project structures.
  sports: Benjamin Wescott fuels their love of movement by cycling the rolling hills around Saint Elmo, playing casual soccer on weekends with friends, and cheering for the local Saint Elmo High School
    Wolves, yet they rarely hit the gym, preferring spontaneous outdoor play over structured workouts.
  arts: Benjamin Wescott immerses themselves in a mash‑up of experimental electronic tracks from artists like Aphex Twin, sci‑fi cinema such as Blade Runner 2049, graphic novels like Saga, and improvisational
    guitar sessions à la Jimi Hendrix, all of which feed their sketchbooks, digital collages, and TikTok art clips.
  travel: Benjamin Wescott dreams of swapping bike‑ridden countryside loops for budget‑friendly art pilgrimages—first to Berlin’s street‑art districts, then to Kyoto’s temples—while currently squeezing
    day‑trips to the nearby state park into a schedule that often slides under the weight of school‑work procrastination.
  culinary: Benjamin Wescott’s palate oscillates between classic teen comforts—pizza and ramen—and experimental snack hacks like sriracha‑drizzled popcorn or avocado toast topped with smoked salmon, which
    they whip up in a modest kitchen equipped with a trusty electric skillet and a collection of assorted hot sauces.
  core: Benjamin Wescott is a curious, spontaneous teen who blends digital art, DIY electronics, and indie gaming with a restless drive for freedom, even as they wrestle with deadlines, impulsive spending,
    and occasional late‑night eye strain.
background:
  cultural: Benjamin grew up in Saint Elmo, a small agricultural town in Fayette County, Illinois. His family's roots trace back to German and Irish immigrants who settled the region in the late 19th century,
    and many relatives still work in farming or local trades. The community emphasizes Midwestern values of self-reliance, modesty, and close-knit neighborly support, reflected in traditions like the county
    fair, high-school sports, church gatherings, and volunteer fire-department events. While these traditions shape his sense of belonging, Benjamin's avid consumption of online art, indie-game, and DIY-tech
    cultures has broadened his perspective beyond the local milieu. He blends the pragmatic, hard-working ethic of his hometown with a curiosity for unconventional ideas, resulting in a hybrid cultural
    identity that honors his Midwestern upbringing while reaching into global creative movements.
attributes:
  skills: '[''Sketching'', ''Digital illustration (GIMP/Krita)'', ''Basic photo editing'', ''Creative writing (short stories, fanfiction)'', ''DIY electronics (Arduino projects)'', ''Basic mechanical repair
    (bicycles, small engines)'', ''Strategic video gaming (competitive, improvisational)'', ''Social media content creation (TikTok, YouTube)'', ''Critical analysis'', ''Improvisational guitar playing'']'
  hobbies: '[''Sketching in a notebook'', ''Digital photo-manipulation'', ''Bicycle rides through rural areas'', ''Watching sci-fi movies and reading graphic novels'', ''Attending the county fair and local
    community events'', ''Casual soccer with friends'', ''Improvisational guitar playing'', ''Participating in Discord art and DIY electronics communities'']'
  career_goals: Benjamin aims to turn his eclectic skill set into an independent, flexible career that lets him avoid the rigid structures he dislikes. In the short term, he plans to earn a GED and enroll
    in community-college courses in graphic design and introductory programming to formalize his knowledge. He dreams of building a personal brand as a digital illustrator and indie game creator, releasing
    small-scale games or interactive art pieces that blend his love for visual storytelling with unconventional mechanics. He also wants to grow a freelance studio that offers custom artwork, logo design,
    and modest game-development services, allowing him to choose projects that align with his interests. Ultimately, he hopes to achieve financial independence while maintaining the freedom to explore new
    ideas, travel for artistic inspiration, and maybe mentor other self-taught creators.
