  hobbies: '[''Woodworking'', ''Model railroading'', ''Fishing'', ''Volunteering at community shelter'', ''Reading science‑fiction and renewable energy articles'', ''Gardening'', ''Acoustic guitar'', ''DIY
    home improvement projects'']'
  career_goals: Bryan aims to earn the Master Electrician designation and obtain certifications in renewable energy and green building (LEED). He envisions launching a small, family‑run contracting firm
    that focuses on sustainable electrical upgrades for local homeowners and small businesses. He also wants to expand his role as a mentor, eventually teaching evening courses at a community college or
    trade school. Balancing his desire for professional growth with his need for flexibility, he hopes to set a schedule that reduces stress, allows more time for his family, and supports his community
    volunteer work.
