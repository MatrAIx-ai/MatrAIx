persona_description: A scientist who specializes in gene therapy and the treatment of severe combined immunodeficiency (SCID), a rare immune disorder that affects about 40 to 100 babies each year. The scientist
  has been involved in gene therapy trials for children with SCID, including the two studies reported today in the journal Science Translational Medicine. The scientist is knowledgeable about the risks
  and benefits of gene therapy, as well as the latest developments in the field, and is eager to continue research on gene therapy for SCID.
