  career_goals: Brandie aspires to a future career in technology, ideally as a software developer or data analyst where she can apply her logical thinking to real‑world problems. She plans to attend a university
    with a strong STEM program, aiming to earn a degree in computer science or engineering. While she values achievement, she also wants a career that offers clear structure and predictable milestones,
    allowing her to maintain a balanced, low‑stress lifestyle.
