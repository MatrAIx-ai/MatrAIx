  hobbies: '[''Reading historical fiction'', ''Birdwatching'', ''Vegetable gardening'', ''Quilting'', ''Genealogy research'', ''Journaling'', ''Nature walks'', ''Listening to folk and bluegrass music'']'
  career_goals: Although not currently in the formal workforce, Mallery aims to turn several of her strengths into modest, community‑focused ventures. She hopes to launch a cottage‑industry operation selling
    homemade preserves and pickles to neighbors and at local farmers' markets, providing a supplemental income for her retirement. Additionally, she aspires to become the primary point of contact for a
    senior‑support network in Denton, offering grocery runs, meal deliveries, and occasional home‑maintenance assistance. To support these goals, she plans to enhance her digital skills through a short
    online course in e‑commerce and social‑media marketing, while maintaining her self‑reliant, low‑stress lifestyle.
