  career_goals: Trevon aims to become a head bartender at an upscale venue in the Atlanta area while earning industry certifications such as the Certified Specialist of Spirits. He plans to complete an
    associate degree in hospitality management to strengthen his leadership and business acumen. Long‑term, he envisions opening his own bar that doubles as an art gallery showcasing emerging African American
    artists, and possibly launching a line of signature bitters or small‑batch spirits. He also hopes to mentor younger bartenders and contribute to community programs that teach hospitality skills to local
    youth.
