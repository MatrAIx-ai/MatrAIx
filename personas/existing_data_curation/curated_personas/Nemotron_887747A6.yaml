personas:
  professional: Trevon White, an ambitious 21‑year‑old bartender in the Atlanta area, blends solid mixology expertise—from classic Old Fashioneds to craft coffee‑infused cocktails—with a keen eye for visual
    flair, using their curiosity and outgoing nature to read patrons and curate personalized drink experiences that reflect the city's vibrant art scene.
  sports: Trevon White, a keen pickup basketball player, spends Friday evenings shooting hoops at a local rec‑center league, roots for the Atlanta Hawks and follows Atlanta United FC, and mixes weekly trail
    hikes in the Piedmont area with quick Sunday morning runs, viewing fitness as both social bonding and stress release.
  arts: Trevon White immerses themselves in the creative pulse of the city, painting graffiti‑inspired murals influenced by street legends like Banksy and local muralist Maya Haynes, attending live shows
    featuring Kendrick Lamar, John Coltrane tributes, and poet‑open‑mic nights, and collecting prints by contemporary artist Kehinde Wiley, letting these influences shape both their cocktail presentation
    and personal aesthetic.
  travel: Trevon White favors weekend road trips that blend culinary discovery and cultural heritage, having explored New Orleans for its jazz clubs, Savannah’s historic squares, and Nashville’s songwriting
    scene, while dreaming of a solo backpack adventure through Berlin’s street‑art districts and Tokyo’s izakayas, always budgeting with a travel‑savings envelope and relying on rideshare apps for spontaneous
    detours.
  culinary: Trevon White relishes Southern comfort flavors like shrimp and grits, smoked collard greens, and Nashville hot‑chicken tacos, cooks at home with a solid grasp of seasoning layers—using smoked
    paprika, hot sauce, and buttermilk brines—yet admits to a weakness for late‑night food‑truck tacos topped with mango habanero salsa.
  core: Trevon White is a socially vibrant, art‑infused bartender who balances disciplined financial planning with spontaneous culinary cravings, navigates health with proactive allergy care, and channels
    curiosity and community spirit into every cocktail, canvas, and conversation.
background:
  cultural: Raised in a close‑knit African American community in the greater Atlanta region, Trevon grew up immersed in Southern Black traditions, from Sunday church services and gospel choirs to family
    barbecues featuring soul food staples. He draws inspiration from the vibrant local art scene, especially murals and galleries that celebrate Black heritage. The rich musical legacy of the area—from
    the blues of the Deep South to contemporary hip‑hop—shapes his taste and informs his creative approach behind the bar. His upbringing emphasized community solidarity, respect for elders, and a strong
    work ethic, which continue to guide his personal and professional interactions.
