personas:
  professional: Ernesto Rojas, a 65‑year‑old master heavy‑vehicle mechanic, blends four decades of diesel, hydraulic and electrical expertise with meticulous record‑keeping and a talent for mentoring apprentices,
    and they are driven to become a shop foreman and later launch a boutique mobile service that champions safety and emerging electric equipment.
  sports: Ernesto Rojas enjoys playing pickleball at the downtown senior recreation center, follows the Los Angeles Dodgers and the LA Galaxy with avid enthusiasm, and they ride with a local community cycling
    club every Saturday, balancing a low‑impact fitness routine with a lifelong love for team sports.
  arts: Ernesto Rojas frequents the Getty Center and the Skirball Museum, sketching industrial skylines before translating them into vivid watercolors inspired by the geometric precision of Futurist painters
    such as Umberto Boccioni, and they often spend evenings salsa dancing to the rhythms of Celia Cruz while capturing the glow of city machinery through night‑time photography.
  travel: Ernesto Rojas prefers weekend getaways that blend scenery and culture, such as a sunrise hike in Joshua Tree, a culinary road trip to Oaxaca for authentic tamales, and a relaxed cruise along the
    California coastline to Catalina Island, and they plan trips meticulously but occasionally postpone overseas dreams like a trek through the Andes due to family obligations.
  culinary: Ernesto Rojas delights in hand‑crafting pupusas and tamales seasoned with achiote, Queso fresco, and masa harina, often cooking with a vintage cast‑iron skillet while experimenting with fresh
    herbs like cilantro and epazote, and they have a tendency to over‑season dishes and forget to clean the kitchen promptly, adding a charming chaos to family gatherings.
  core: Ernesto Rojas is a meticulous, art‑loving mechanic who balances a lifelong curiosity and social vigor with a lingering anxiety that drives them to relentless self‑ improvement, and they sometimes
    overcommit.
background:
  cultural: Ernesto was born to Salvadoran immigrants who settled in Southern California in the 1970s. He grew up in a bilingual household, preserving traditions such as Día de los Muertos celebrations,
    weekend family meals featuring arroz con pollo, and weekly visits to the local Catholic church. His deep ties to the Salvadoran diaspora inform his community involvement, including participation in
    cultural associations that organize festivals and support newcomers. While fully integrated into the diverse fabric of Downey, he remains proud of his heritage, often sharing stories of El Salvador
    with friends and colleagues and maintaining strong connections with relatives back home.
