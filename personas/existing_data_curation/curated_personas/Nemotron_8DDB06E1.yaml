  career_goals: Ernesto aims to transition into a senior leadership role, such as shop foreman or operations manager, where he can shape maintenance policies and champion safety culture. He plans to earn
    ASE certification and pursue specialized training in emerging electric‑powered heavy equipment to stay ahead of industry trends. Ultimately, he dreams of launching a boutique mobile service business
    that offers on‑site repairs for small contractors, while also establishing a mentorship program for younger technicians in the Los Angeles County community.
