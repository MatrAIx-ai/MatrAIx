persona_description: A law professor who specializes in constitutional law and the Incorporation Doctrine. He is deeply concerned about the erosion of federalism and the abuse of power by the Supreme Court.
  His research interests include the history of the Incorporation Doctrine, the impact of the doctrine on the Bill of Rights, and the potential solutions to address the issue of federalism. He is passionate
  about teaching and advocating for the importance of thinking big and acting big in order to protect individual rights and uphold the principles of the Constitution.
