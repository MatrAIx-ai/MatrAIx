  career_goals: Even though retired, Douglas aims to channel his competitive nature into mastering a new craft each year and documenting his progress on a modest blog. He hopes to fund a modest travel itinerary
    visiting historic railway sites across the United States. He also aspires to mentor younger local hobbyists in woodworking and model building, sharing his expertise while preserving local heritage.
