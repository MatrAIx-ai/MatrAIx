  hobbies: '[''Fly fishing'', ''Hiking'', ''Acoustic guitar playing'', ''Bluegrass jam sessions'', ''Woodworking and vintage furniture restoration'', ''Reading historical biographies'', ''Reading medical
    research literature'', ''Cooking Southern comfort food'', ''Volunteer youth mentorship at church'', ''Coaching high-school baseball'', ''Participating in charity 5K runs'']'
  career_goals: Charles aims to become a senior clinical leader at his community health clinic, overseeing a multidisciplinary team that expands primary-care access in rural Macon County. He plans to earn
    a Bachelor’s in Health Sciences and later a Master’s degree to deepen his expertise in chronic-disease management and health-policy advocacy. He seeks certification in emergency medicine to broaden
    his scope of practice and intends to serve as a preceptor for aspiring physician assistants, sharing his practical knowledge. Long-term, Charles envisions launching a mobile health unit that provides
    preventive screenings and telemedicine services to underserved neighborhoods, integrating his curiosity for innovative care models with his commitment to community service.
