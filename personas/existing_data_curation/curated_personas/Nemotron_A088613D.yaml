    high‑school girls in coding'']'
  career_goals: Claudia aims to advance into a senior leadership role such as Director of Engineering or VP of Product where she can steer product strategy at the intersection of technology and creativity.
    She plans to deepen her expertise in cloud solutions by earning an AWS Solutions Architect Professional certification and to become a Certified Scrum Professional, positioning herself as an agile transformation
    champion. Over the next five years, she hopes to lead larger, cross‑functional teams, drive the development of innovative digital‑media platforms, and mentor a new generation of women in tech. Additionally,
    she is exploring the launch of a side SaaS venture that offers AI‑powered business analytics tools for independent artists, blending her technical acumen with her passion for the arts.
