personas:
  professional: Kevin Southerland, a three‑year‑old budding architect who constructs towering block castles with wild, unconventional designs, they channel their curiosity and love for new ideas into imaginative
    play, while their spontaneous nature leads them to ignore tidy cleanup and thrive on the freedom of unstructured creation.
  sports: Kevin Southerland, a three‑year‑old who idolizes the Dallas Cowboys and watches the Dallas Mavericks' games with bright eyes, they sprint around the field with the Dallas Little Sprouts Soccer
    Club, showing a competitive spark that sometimes outweighs cooperative play, yet their spontaneous streak often leads them to abandon scheduled drills in favor of impromptu games.
  arts: Kevin Southerland, a three‑year‑old with an early love for creative expression, they spend afternoons finger‑painting vibrant scenes inspired by Disney's 'Moana' and humming Raffi's 'Baby Beluga',
    embracing unconventional color choices and a curiosity for new artistic ideas, while occasionally demanding extra blank pages to satisfy their unstructured imagination.
  travel: Kevin Southerland, a three‑year‑old who delights in family outings to the Florida Gulf Coast beaches and the Grand Canyon's rocky vistas, they prefer unstructured play over rigid itineraries,
    often insisting on spontaneous detours, yet their skeptical side sometimes questions new environments, and they dream of a future adventure to Disneyland Paris within the limits of parental schedules.
  culinary: Kevin Southerland, a three‑year‑old with a budding palate, they relish buttery mac and cheese, crunchy chicken nuggets, and banana‑strawberry smoothies, can barely stir a pot but love sprinkling
    shredded cheddar on everything, and habitually request an extra side of peas as a tiny rebellion against routine meals.
  core: Kevin Southerland, a three‑year‑old curiosity‑driven whirlwind who builds block towers, hoards stickers, and insists on spontaneous play, they balance a competitive spark with occasional skepticism
    toward new foods, all while navigating the ups and downs of toddler resilience.
background:
  cultural: Kevin is raised in a Black family in Tampa, Florida, surrounded by the rich African-American heritage of the region. His family celebrates cultural traditions such as Juneteenth, enjoys soul
    food meals, and regularly attends community events featuring gospel music, jazz, and hip-hop. He often hears stories of African-American history and local civil-rights milestones, and the rhythmic beats
    of church choirs and neighborhood festivals shape his early appreciation for music and art.
