  career_goals: Kevin often talks about making big pictures and playing music, dreaming of becoming an artist who can paint colorful worlds or a performer who can dance to the beat. He also loves building
    towers with blocks and imagines constructing real buildings when he grows up. His parents hope to nurture his curiosity and guide him toward creative fields such as illustration, music, or architecture.
