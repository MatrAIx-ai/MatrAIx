  career_goals: Tad’s big‑picture thinking leads him to imagine careers that blend creativity, exploration, and helping others. He dreams of becoming an astronaut who can draw the planets he visits, an
    artist who designs illustrations for books, or a video‑game designer who builds worlds where friends can play together. He values flexibility, so he hopes to pursue a path that lets him keep exploring
    new ideas and working with people.
