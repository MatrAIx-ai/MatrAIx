personas:
  professional: Tad Woodham, an aspiring young digital storyteller, merges their love for drawing, LEGO building, and Scratch coding to create interactive comic‑style adventures that they showcase during
    school tech fairs, reflecting a curious mind that favors flexible, improvisational creation over rigid planning.
  sports: Tad Woodham, an energetic member of the Pine Ridge Youth Soccer Club, loves sprinting on the field while rooting for the Boise State Broncos and the Idaho Vandals during televised games, enjoys
    endless games of tag at recess, and they often explore the Snake River foothills pretending to be a hero from their favorite fantasy books.
  arts: Tad Woodham, a budding visual artist, delights in watercolor landscapes inspired by Claude Monet, draws whimsical characters reminiscent of Dr. Seuss, strums the ukulele playing melodies by Jake
    Shimabukuro, and they frequently visit the county’s summer art fair where they admire local crafts and trade sketches with new friends.
  travel: Tad Woodham, a curious traveler, has explored Crater Lake on a school field trip and spent summer weekends at the nearby Owyhee Reservoir fishing with family, and they dream of visiting Disneyland
    in California and the historic Seattle Space Needle, preferring spontaneous day trips over meticulously planned vacations.
  culinary: Tad Woodham, an enthusiastic young cook, loves making apple crisp with fresh orchard apples, mastering the perfect grilled cheese sandwich with cheddar and tomato soup, and they enjoy assembling
    colorful fruit kebabs with strawberries, blueberries, and pineapple, often sharing their creations at neighborhood picnics.
  core: Tad Woodham, the endlessly curious eight‑year‑old who sketches dragons while balancing a half‑full peanut‑butter sandwich on the soccer field, thrives on spontaneous creativity but often misplaces
    their crayons, forgets homework, and hums quietly to themselves while building LEGO towers.
background:
  cultural: Tad grew up in Fruitland, a small agricultural community in Payette County, Idaho. His family is white and typically middle‑class, with parents who work locally—one in farming and the other
    in a small retail shop. The town’s rhythm revolves around school activities, county fairs, and outdoor pursuits along the Snake River. At school he learns about broader American culture as well as the
    local Native American history taught in the curriculum. Community values of kindness, cooperation, and respect for nature are reinforced at family gatherings, church events, and neighborhood picnics,
    shaping Tad’s considerate and sociable outlook.
