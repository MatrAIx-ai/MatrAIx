  career_goals: Although no longer in the formal workforce, Ashley aims to stay actively engaged in her community and preserve her independence. She plans to continue leading event‑planning efforts at the
    church and senior center, mentor younger volunteers in organizational best practices, and expand the neighborhood garden she helped start. She also hopes to compile a memoir of her life and family history,
    ensuring that her stories are passed down to future generations. Maintaining her health, financial stability, and an organized home environment remain central to her long‑term ambitions.
