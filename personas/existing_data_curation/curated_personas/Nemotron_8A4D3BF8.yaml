  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Specialty coffee brewing'', ''Cupping sessions'', ''Group hiking'', ''Board game nights'', ''Volunteering at youth
    art workshops'', ''Attending tech and design talks'', ''Reading contemporary fiction'', ''Yoga'', ''Home cooking and baking'']'
  career_goals: In the short term, Nicole aims to advance to a shift supervisor role and eventually become a maître d’ or restaurant manager at a vibrant coffee shop that blends art and community. She plans
    to complete her associate degree in hospitality management while gaining certifications in specialty coffee and barista training. Long‑term, she dreams of opening her own café‑gallery in the Bay Area,
    featuring rotating exhibitions from local artists, live music, and workshops that foster creativity and social connection. She also envisions expanding her expertise into event planning for cultural
    festivals and possibly pursuing a bachelor's degree in arts administration or culinary entrepreneurship.
