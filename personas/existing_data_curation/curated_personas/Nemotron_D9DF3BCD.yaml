  hobbies: '[''Reading (fiction and non‑fiction)'', ''Journaling / Blogging'', ''Hiking and nature walks'', ''Photography'', ''Piano (beginner)'', ''Sketching and digital illustration'', ''Basic Python
    coding'', ''Volunteering at animal shelter'', ''Board games with close friends'']'
  career_goals: Shaianne aims to attend a university where she can major in education with a STEM emphasis, ultimately becoming a middle‑school science teacher. She is motivated to design structured, inquiry‑based
    lessons that encourage students to explore scientific concepts while providing clear, step‑by‑step guidance. In parallel, she hopes to develop expertise in educational technology, creating digital tools
    that help teachers track student progress and personalize learning. Long‑term, she envisions pursuing a master's in educational psychology to better support student well‑being, or possibly moving into
    community health outreach where she can apply her organizational talent and compassion to promote mental‑health awareness among teens.
