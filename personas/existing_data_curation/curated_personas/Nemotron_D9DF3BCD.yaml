personas:
  professional: Shaianne Bullard, a 15‑year‑old aspiring junior developer and budding fantasy author, blends her methodical Python coding projects with disciplined journal‑keeping, turning curiosity into
    structured creativity while volunteering at a local animal shelter.
  sports: Shaianne Bullard enjoys weekend hikes with the Saratoga Trails Club, follows the New York Rangers for hockey excitement, and participates in a casual after‑school soccer league with a small group
    of friends, favoring low‑key outdoor activity over competitive sports.
  arts: Shaianne Bullard finds creative balance between beginner piano pieces like Beethoven’s 'Für Elise,' sketching digital fan‑art of characters from Brandon Sanderson’s Mistborn, and board‑game evenings
    playing Catan while listening to the soundtracks of Studio Ghibli films such as My Neighbor Totoro.
  travel: Shaianne Bullard prefers meticulously planned nature getaways, having trekked the Adirondack High Peaks and explored the Finger Lakes region, while keeping a travel bucket list that includes Kyoto’s
    bamboo forest and the Scottish Highlands for their mythic landscapes.
  culinary: Shaianne Bullard enjoys cooking simple comfort foods like margherita pizza and stir‑fried ramen, often adding fresh basil and shiitake mushrooms, and delights in baking oatmeal blueberry cookies
    as a reward after completing a coding milestone.
  core: Shaianne Bullard is a methodical, quiet teen who channels curiosity into coding, journaling, and hiking, balances compassion with a habit of late‑night novel marathons, and occasionally forgets
    to reply to friends because of her immersive solo quests.
background:
  cultural: Shaianne grew up in Saratoga Springs, Utah County, within a predominantly white, family‑oriented community that values education, reliability, and service. The regional culture emphasizes close‑knit
    family ties, community gatherings often centered around local churches, and a love for outdoor recreation in Utah's mountainous landscapes. These influences fostered her appreciation for nature, her
    commitment to helping others, and her methodical, modest demeanor. At the same time, she is shaped by broader American youth culture—social media, contemporary music, online gaming, and diverse school
    interactions—giving her a balanced perspective that blends traditional community values with modern digital interests.
