  career_goals: Demetrick aims to graduate high school with solid attendance and a respectable GPA, then pursue a career in public safety or community service where he can apply his practical mindset and
    desire to help others. He is interested in becoming a firefighter or police officer—roles that provide clear, routine‑based responsibilities and direct opportunities to protect and assist his neighborhood.
    He also hopes to volunteer with local youth mentorship programs while studying criminal justice or social work at a community college, eventually working as a community liaison who promotes harmony
    and safety.
