personas:
  professional: Demetrick Johnson, a thirteen‑year‑old middle‑school student and budding basketball strategist, turns his love of routine drills and video‑game tactics into informal coaching sessions for
    peers during after‑school pickup games, balancing a practical, hands‑on approach with a relaxed attitude toward school assignments.
  sports: Demetrick Johnson thrives on weekly pickup basketball games at the local park, cheerfully supports the Chicago Bulls and the nearby high‑school Golden Eagles basketball team, and participates
    in the city’s Youth Basketball League, balancing casual play with a structured routine of drills that mirrors their love of familiar patterns.
  arts: Demetrick Johnson curates playlists featuring contemporary R&B artists like H.E.R. and Bruno Mars alongside classic hip‑hop legends such as Tup‑ac and A Tribe Called Quest, and they unwind by sketching
    cartoon characters inspired by Saturday morning shows like The Powerpuff Girls and classic comic strips, blending modern beats with nostalgic visuals.
  travel: Demetrick Johnson prefers short family road trips that fit within a relaxed yet familiar schedule, having visited the nearby coastal beach town of Ocean City and dreaming of a future excursion
    to Disney World, while they also hope to attend a live NBA game in New York City when the opportunity arises.
  culinary: Demetrick Johnson enjoys classic teen staples such as pepperoni pizza, chicken nuggets, and cheesy mac & cheese, occasionally tries their hand at making simple grilled cheese sandwiches and
    spicy buffalo wings with hot sauce, and they relish the sweet tang of mango smoothies as a refreshing treat.
  core: Demetrick Johnson is a routine‑loving, basketball‑obsessed teen who balances video‑gaming, sketching, and dog‑walking while navigating occasional disorganization and a laid‑back approach to obligations.
background:
  cultural: Demetrick is a Black teenager growing up in Bowie, Maryland, a suburb of Washington, D.C. His family traces its roots to the Southern United States and maintains strong ties to the African‑American
    church, attending Sunday services at a local Baptist congregation. He participates in community events such as the Prince George’s County African‑American Heritage Festival and enjoys family gatherings
    that feature soul food, storytelling, and music. The vibrant cultural scene of the D.C. metropolitan area, including local hip‑hop and R&B influences, shapes his tastes and worldview, while his parents
    emphasize the importance of education, respect, and community service.
