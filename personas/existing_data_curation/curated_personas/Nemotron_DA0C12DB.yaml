personas:
  professional: Eric Ricks is a disciplined insurance sales agent who leverages his meticulous data analysis and creative curiosity to design tailored coverage plans, consistently exceeding targets while
    quietly outmaneuvering competitors and nurturing a vision of a boutique brokerage for artistic professionals.
  sports: Eric Ricks is a solo runner who logs sunrise jogs in the city park, participates in a weekend climbing gym crew, follows the local NBA team the Chicago Bulls, and supports the regional soccer
    club Chicago Fire FC, balancing disciplined cardio with occasional hiking treks.
  arts: Eric Ricks spends off‑peak evenings sketching installations by Olafur Eliasson at the contemporary art museum, curates a personal photo archive of Dali’s surrealist works, and listens to the ambient
    soundscapes of Brian Eno while reading Susan Sontag’s essays on photography, shaping his aesthetic sensibility.
  travel: Eric Ricks prefers meticulously planned solo trips, having trekked Patagonia’s Torres Valley, explored the galleries of Paris’s Musée d’Orsay, and dreaming of a quiet retreat in Kyoto’s tea gardens,
    always balancing budget constraints with a craving for cultural immersion.
  culinary: Eric Ricks approaches cooking like a model‑building project, mastering sous‑vide salmon with miso glaze, brewing hop‑forward IPAs in his garage, and indulging in artisanal cheese boards featuring
    aged Gouda and truffle honey, while favoring precise recipes over improvisation.
  core: Eric Ricks is a solitary strategist who channels disciplined precision into insurance sales, art‑inspired hobbies, and a relentless quest for self‑improvement, even if it means occasional social
    burnout and a coffee‑addicted late‑night.
background:
  cultural: Eric grew up in a middle‑class, white family in Clarksville, Tennessee, surrounded by the modest, community‑oriented values typical of the Southern United States. His upbringing emphasized hard
    work, self‑reliance, and respect for tradition, while also exposing him to regional cultural touchstones such as country music, local folklore, and occasional community festivals. Although his family
    maintains a quiet, often church‑centered lifestyle, Eric's curiosity has led him to explore broader artistic and intellectual currents beyond his immediate environment. The proximity to Fort Campbell
    and the multicultural interactions it brings have also broadened his perspective, fostering a measured skepticism and competitive edge that influence both his personal and professional life.
