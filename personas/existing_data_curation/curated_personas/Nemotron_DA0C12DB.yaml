  hobbies: '[''Visiting art galleries and museums'', ''Sketching and photography'', ''Reading philosophy and art theory'', ''Following technology and entrepreneurship news'', ''Playing chess and solving
    puzzles'', ''Model building'', ''Solo nature hikes and early‑morning runs'', ''Home brewing'']'
  career_goals: Eric aims to become a senior account executive within the next three years, securing advanced life‑insurance and annuity licenses while pursuing a Certified Financial Planner (CFP) designation.
    His competitive drive pushes him toward a regional sales manager position, where he can lead a high‑performing team and shape innovative insurance products tailored for creative professionals and small
    businesses. Long‑term, he envisions launching his own boutique brokerage that capitalizes on his love for art and new ideas, offering niche coverage solutions while maintaining the autonomy and disciplined
    work environment he values.
