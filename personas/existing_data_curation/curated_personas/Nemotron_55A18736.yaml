personas:
  professional: A budding soccer team captain on the neighborhood park’s junior league, William Puckett blends his love of structured practice drills with a flexible, fun‑focused leadership style; they
    rally their friends with chatter and ensure everyone gets a turn.
  sports: A dedicated participant in the Riverdale Juniors Soccer Club, William Puckett spends his evenings mastering footwork and defending goals, all while idolizing the Chicago Cubs baseball team and
    cheering loudly for the Chicago Bears whenever they score a touchdown on TV; they love the energy of the game and often lead chants with teammates.
  arts: A budding creator who sketches dinosaurs and superheroes inspired by Stan Lee and draws whimsical scenes reminiscent of Dr. Seuss, William Puckett also delights in the sing‑along tunes of The Wiggles
    and Laurie Berkner, and loves taking center stage in school plays where they can channel their favorite Marvel heroes.
  travel: A curious explorer on family outings, William Puckett loves weekend trips to the nearby city zoo and beach, dreams of visiting Disney World in Orlando and the Natural History Museum in London,
    and always packs their favorite dinosaur stickers for the journey; they prefer short, lively adventures that end with a story to retell.
  culinary: A picky yet adventurous eater, William Puckett favors cheesy macaroni, pepperoni pizza, and peanut‑butter‑and‑jelly sandwiches, eagerly helps his mom stir pancake batter and sprinkle chocolate
    chips on cookies, but often sidesteps broccoli in favor of carrot sticks when they’re cut into dinosaur shapes; they especially cherish foods they can share with friends during playtime.
  core: William Puckett is a lively, structure‑loving six‑year‑old who thrives on group games, chatters nonstop, can lose their socks while building LEGO sets, and secretly hoards extra crayons for later
    use.
background:
  cultural: William lives in Windermere, an affluent suburb of Orlando, Florida. His family's cultural background is typical of suburban white American households, emphasizing community involvement, education,
    and outdoor recreation. He often celebrates common U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July, and enjoys outings to nearby attractions like Disney World and local beaches.
    The multicultural environment of his elementary school provides occasional exposure to diverse traditions, but his home life reflects a blend of traditional American values, a love for sports, and a
    focus on structured routines and family gatherings.
