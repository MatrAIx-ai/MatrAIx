  career_goals: William dreams of becoming an astronaut because he loves space and the idea of exploring new worlds. He also imagines himself as a teacher who can lead a class of kids and make learning
    fun, and he likes the idea of a firefighter who helps people. His ambition is to grow up helping others and being a leader in activities he enjoys, like sports and storytelling.
