  career_goals: Ralph aims to step into a technical leadership role—such as Lead Engineer or Engineering Manager—where he can shape architecture, champion robust development processes, and foster a supportive
    team culture. He plans to earn advanced cloud certifications (AWS Solutions Architect, Azure DevOps) and a Scrum Master credential, positioning himself to drive larger, high‑impact projects. Long‑term,
    he envisions launching a boutique consultancy focused on helping small businesses in the Chicago area adopt reliable, scalable software solutions while maintaining a balanced work‑life rhythm to manage
    stress.
