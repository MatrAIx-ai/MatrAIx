  travel: Manisha Patel's travel adventures are centered around family road trips to nearby grandparents' house and weekend visits to the city zoo, where they marvel at the giraffes and enjoy the gentle
    sway of the stroller on scenic routes, dreaming one day of a sunny beach vacation.
  culinary: Manisha Patel prefers smooth pureed carrots, ripe banana mash, and occasional teething biscuits seasoned with a hint of cinnamon, showing a budding palate that leans toward sweet and mildly
    spiced flavors while still being cautious about new textures.
  core: Manisha Patel is a curious, sociable infant who balances a love for novel exploration with the comfort of routine, yet often worries over minor discomforts, leading to frequent but brief meltdowns.
