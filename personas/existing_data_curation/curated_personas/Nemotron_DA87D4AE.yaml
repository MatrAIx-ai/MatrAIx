personas:
  professional: Terrie Hernandez, a veteran curriculum designer for elementary and middle schools, leverages her three decades of expertise, community‑centric values, and practical curiosity to craft project‑based
    lessons that weave local history, hands‑on activities, and technology into Texas state standards, all while informally mentoring newer teachers despite her relaxed, sometimes disorganized approach to
    paperwork.
  sports: Terrie Hernandez stays active by joining the local senior walking club for weekly Hill Country hikes, cheering on the Dallas Cowboys each Sunday, and volunteering as a scorekeeper for the Brownwood
    High School Tigers baseball team, balancing social camaraderie with a gentle fitness routine.
  arts: Terrie Hernandez, an avid church‑choir member and book‑club participant, finds artistic solace in quilting patterns inspired by folk artist Mary Jane Yoder while listening to classic country legends
    like Willie Nelson and Patsy Cline during garden evenings, and she frequently visits the Brownwood Heritage Museum to admire regional artworks and historic photographs.
  travel: Terrie Hernandez prefers relaxed, road‑trip vacations, often driving to Hill Country vineyards for weekend wine‑tasting, exploring the historic Alamo in San Antonio with her book‑club friends,
    and dreaming of a peaceful fishing weekend on the Guadalupe River, though her easygoing nature sometimes leads to last‑minute packing and forgotten travel documents.
  culinary: Terrie Hernandez, a skilled home cook, mixes garden‑fresh rosemary, native Texas roses, and jalapeños into classic dishes like chicken‑fried steak with sage gravy and peach cobbler, while she
    still splurges on a Saturday‑night brisket at the county fair and occasionally over‑salts her chili during potluck preparations.
  core: Terrie Hernandez is a warm‑hearted, community‑driven educator who balances curiosity and practicality with a laid‑back, occasionally disorganized lifestyle, finding solace in gardening, quilting,
    gentle yoga, and the constant worry that fuels her compassionate advocacy for others.
background:
  cultural: Terrie grew up in a small Texas town within a close‑knit, middle‑class white community that valued hospitality, church involvement, and family gatherings. Her upbringing blended traditional
    Southern values—respect for elders, a love of Southern cuisine, and community service—with the multicultural influences of West Texas, such as an appreciation for country music, rodeo culture, and the
    natural landscape. She identifies strongly with Texan pride, cherishes local traditions like Sunday potlucks and county fairs, and maintains a deep sense of belonging to her Brownwood community.
