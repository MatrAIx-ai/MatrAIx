  career_goals: Although retired, Julian aims to compile a memoir that weaves personal history with Salvadoran folklore, targeting publication as a limited‑edition homage to his roots. He also plans to
    curate a community‑based traveling exhibit titled “Echoes of El Salvador,” featuring photographs, oral histories, and folk artworks collected from Miami’s Salvadoran families. His ambition extends to
    mentoring a quarterly workshop for senior members of the local Salvadoran association, teaching them how to digitize family photos and share stories online. Additionally, Julian is exploring the use
    of digital illustration tools to create a series of abstract pieces inspired by the poetry of Roque Dalton, hoping to exhibit them at a small gallery in Little Haiti. These goals balance his love for
    novelty, his desire to contribute to cultural preservation, and his preference for intimate, collaborative environments.
