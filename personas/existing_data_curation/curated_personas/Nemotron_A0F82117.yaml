personas:
  professional: Lauren Sotelo blends 20 years of meticulous PCB assembly, lean‑manufacturing leadership, and IPC‑standard compliance to spearhead continuous‑improvement initiatives, mentor junior technicians,
    and pursue production‑supervisor responsibilities with an eye on Six Sigma certification.
  sports: Lauren Sotelo maintains a weekend routine of hiking Camelback Mountain and playing pick‑up basketball at the local community center, cheerfully follows the Phoenix Suns and Arizona Cardinals,
    and belongs to the Phoenix Desert Photographers Club’s informal tennis league.
  arts: Lauren Sotelo frequents contemporary galleries such as the Phoenix Art Museum’s Modern Wing, paints abstract canvases inspired by desert hues, captures sunrise‑lit dunes with her DSLR, and immerses
    herself in vibrant salsa nights featuring classics from the likes of Celia Cruz, while also indulging in sci‑fi novels by authors like Neal Stephenson.
  travel: Lauren Sotelo prefers curated road trips that blend desert photography with cultural immersion, having explored Sedona’s red rocks, the historic streets of Santa Fe, and a weekend in Oaxaca for
    its art markets, and now dreams of a spring visit to Kyoto’s zen gardens and Berlin’s avant‑garde galleries.
  culinary: Lauren Sotelo enjoys cooking family‑style meals that showcase aromatic plantains, slow‑cooked pork shoulder with citrusy mojo sauce, cilantro‑lime rice, and fresh mango salsa, often experimenting
    with succulents as garnish and pairing the fare with a crisp Sauvignon Blanc.
  core: Lauren Sotelo is a detail‑obsessed electronics specialist with a fierce competitive streak who balances precise soldering work with a vibrant love for desert photography, abstract art, and salsa
    rhythms, while obsessively aligning her succulent collection in perfect rows.
background:
  cultural: Lauren’s Cuban heritage shapes many aspects of her life. She grew up in a bilingual household where Spanish was spoken alongside English, fostering a deep appreciation for family ties, communal
    celebrations, and the rhythms of son and salsa music. Traditional Cuban cuisine—like ropa vieja, plantains, and café con leche—remains central to family meals and holiday gatherings. While living in
    Phoenix, she participates in local Latino festivals, supports community cultural events, and blends her Caribbean roots with the desert’s multicultural environment, preserving her cultural identity
    through music, food, and intergenerational storytelling.
attributes:
  skills: '[''PCB Soldering'', ''Electro‑Mechanical Assembly'', ''Technical Troubleshooting'', ''Blueprint & Schematic Interpretation'', ''Quality Control (IPC Standards)'', ''Process Optimization (Lean
