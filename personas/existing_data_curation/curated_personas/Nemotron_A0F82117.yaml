  hobbies: '[''Visiting art galleries and museums'', ''Abstract painting'', ''Photography'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Reading science-fiction'', ''Puzzle solving (crosswords, Sudoku)'',
    ''Succulent gardening'', ''DIY electronics projects'', ''Attending tech meet-ups'']'
  career_goals: Lauren aims to transition from senior assembler to production supervisor, overseeing a full manufacturing line and driving continuous-improvement projects. She plans to obtain IPC Soldering
    certification and Six Sigma Green Belt to deepen her expertise in quality assurance. Long-term, she envisions a managerial role in quality control or establishing a boutique business that offers custom
    electronics prototyping and assembly, leveraging her organizational strengths and passion for mentorship.
