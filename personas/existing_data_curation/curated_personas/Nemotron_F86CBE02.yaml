personas:
  professional: Kyle Oneill is a veteran commercial driver with a Class A CDL who leverages fifteen years of long‑haul and local delivery experience into razor‑sharp route planning, meticulous freight documentation,
    and a mentorship role that has earned a reputation for turning chaotic schedules into well‑orchestrated logistics, while their curiosity about art and technology fuels a clear path toward a future dispatcher
    role and a boutique transport service for galleries.
  sports: Kyle Oneill is a regular on the Kitsap Peninsula adult soccer league playing midfield for the local team Kitsap FC, a devoted member of the Scenic Cove Trail Club who hikes the peninsula’s forests
    every weekend, and a seasonal kayaker who joins early‑morning paddles on Puget Sound, while they cheer on the Seattle Sounders FC and follow the Seattle Kraken’s hockey season.
  arts: Kyle Oneill captures mist‑laden forests and historic ferries through a Leica camera while attending Seattle’s Monthly Art Walk, where they champion emerging artists like Megan Auerbach and Kelsey
    Cummings, and they volunteer as a docent at the Poulsbo Historical Society, often quoting Ansel Adams for composition and enjoying the ambient jazz of Kamasi Washington while editing photos.
  travel: Kyle Oneill plans trips with the same precision they use for freight routes, favoring weekend getaways to the San Juan Islands, a summer road trip along the Pacific Coast Highway to Big Sur, and
    an aspirational hike in Glacier National Park, all while juggling family schedules and a modest travel budget that prioritizes scenic photography opportunities over luxury lodging.
  culinary: Kyle Oneill’s palate is steeped in Pacific Northwest flavors, favoring cedar‑plank grilled salmon, Dungeness crab cakes with a dash of Old Bay, and a miso‑glazed halibut served with pickled
    ginger, and while they can skillfully knife‑chop herbs for a weekend stew, they often rely on quick protein bars and coffee during long hauls, admitting a weakness for excessive snack‑bar consumption.
  core: Kyle Oneill is a sharply organized, curiosity‑driven trucker whose love for photography, woodworking, and weekend soccer fuels an entrepreneurial spark, even as their penchant for splurging on high‑end
    lenses and occasional late‑night snack bars keeps their budget on a tight leash.
background:
  cultural: Kyle J. Oneill is a fourth‑generation Irish‑American raised in the maritime communities of Kitsap County. Growing up in Poulsbo, a town known for its Scandinavian heritage and close ties to
    the Puget Sound, he absorbed a blue‑collar work ethic and a deep respect for the natural environment. His family's Catholic roots imparted a sense of community and modesty, though Kyle now identifies
    primarily with the laid‑back, outdoors‑oriented culture of the Pacific Northwest. He values self‑reliance, neighborly support, and an appreciation for local arts and crafts, which he expresses through
    his weekend activities and community involvement.
