personas:
  professional: Whitney Roy is a seasoned residential and commercial building inspector with fifteen years of experience, adept at reading blueprints, using iAuditor and PlanGrid for real‑time reports,
    and whose curious, flexible mindset drives them to champion sustainable upgrades while compensating for occasional disorganization with meticulous digital checklists.
  sports: Whitney Roy enjoys weekend hikes in the Flathead National Forest, participates in a local yoga class, follows the Montana Grizzlies football team, and occasionally joins a community volleyball
    pick‑up league, preferring low‑impact activities that fit their flexible schedule.
  arts: Whitney Roy channels their love of nature into watercolor landscapes inspired by Andrew Wyeth and Georgia O’Keeffe, curates a booth at the Flathead Art Fair, volunteers at the Missoula Art Museum,
    and finds creative renewal while listening to folk singer Brandi Carlile and indie pianist Nils Frahm.
  travel: Whitney Roy prefers loosely planned road trips that blend scenic photography with cultural stops—having explored Glacier National Park, weekended in Vancouver, trekked the waterfalls of Iceland,
    and dreaming of hiking Patagonia’s Torres del Paine—while balancing family commitments and a modest travel budget.
  culinary: Whitney Roy experiments with global cuisines, often preparing miso‑glazed salmon, homemade ratatouille, and spiced chickpea tacos, sprinkling fresh rosemary and chilies from their garden, and
    enjoys swapping recipes at the local farmers’ market while occasionally ordering sushi for a quick indulgence.
  core: Whitney Roy is a curious, art‑infused building inspector whose flexible yet occasionally disorganized approach fuels a passion for sustainable design, mindful self‑care, and a steady stream of creativity
    punctuated by occasional bouts of worry.
background:
  cultural: Whitney is a White American whose family roots trace back to German and Scandinavian immigrants who settled in western Montana in the early 1900s. Growing up near Polson in a small farming community,
    she internalized regional values of self‑reliance, respect for the natural environment, and community cooperation. Lake County’s blend of ranching heritage, a modest art scene, and proximity to the
    Confederated Salish and Kootenai tribes has shaped her open‑minded curiosity and appreciation for diverse perspectives. Her upbringing included participation in county fairs, church gatherings, and
    volunteer projects emphasizing neighborly support. While she identifies with the broader white Montana culture, she actively seeks to learn about the Indigenous history of the area and supports local
    cultural events and preservation efforts.
