    ''Yoga and mindfulness practice'', ''Playing ukulele'']'
  career_goals: Whitney aims to become a senior building inspector and eventually obtain certification as a Montana Building Code Official, allowing her to influence local building policy and integrate
    stronger green‑building standards. She plans to earn the ICC Certified Building Official credential and enroll in an associate program in construction management to broaden her technical foundation.
    Long‑term, she envisions starting her own consulting firm that assists small contractors with safety compliance and energy‑efficiency upgrades. She also hopes to develop community workshops on home
    safety and sustainable construction, and to refine her organizational skills by mastering advanced digital workflow systems, reducing the stress she often feels on busy workdays.
