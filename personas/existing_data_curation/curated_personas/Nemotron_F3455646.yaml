personas:
  professional: Justin Grant, a curious two-year-old, channels their love of art and organization into meticulous pretend‑play as a mini museum curator, arranging crayons and figurines with thoughtful care
    while inviting friends to join the exhibition.
  sports: Justin Grant, an energetic two‑year‑old, participates in weekly Mommy‑and‑Me soccer classes at the local community center, cheers for the Los Angeles Lakers with a tiny foam jersey, and loves
    splashing in the kiddie pool at the Temecula Aquatic Center during summer.
  arts: Justin Grant, a budding art lover, attends library storytime sessions featuring interactive puppet shows and Spanish lullabies, delights in drawing crayon dinosaurs and rainbow suns, and frequently
    requests upbeat tunes from artists like The Wiggles and Baby Shark while dancing with friends.
  travel: Justin Grant, an adventurous two‑year‑old, enjoys family road trips to Lake Skinner for paddle‑boat rides, eagerly anticipates a future visit to Disneyland, and loves packing their favorite stuffed
    giraffe for weekend getaways to nearby parks, preferring short, colorful journeys over long flights.
  culinary: Justin Grant, a picky yet curious eater, loves soft avocado slices, cheesy macaroni, and banana‑pepper mini tacos, proudly helps stir batter for banana muffins, and often negotiates extra fruit
    snacks in exchange for finishing vegetables.
  core: Justin Grant blends a curious mind, a love for communal play, and gentle kindness, often balancing tidy block towers with spontaneous dance parties, while occasionally clinging to a favorite stuffed
    giraffe.
background:
  cultural: Justin grows up in a white American household in Temecula, California, within the diverse cultural tapestry of the Inland Empire. His family embraces typical suburban Midwestern values—emphasis
    on family, education, and community involvement—while also being influenced by the multicultural environment of Southern California, including exposure to community festivals, library storytime sessions,
    and occasional Spanish language songs at preschool. This blend nurtures his appreciation for art, openness to new ideas, and sociable nature.
