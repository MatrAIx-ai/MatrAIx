  career_goals: Even at his young age, Justin lights up when he hears stories about astronauts, firefighters, and veterinarians. He often points to fire trucks and says "firefighter" and imagines soaring
    among stars after watching cartoons about space. His emerging ambitions include exploring the world, helping animals, and one day becoming a brave helper like a firefighter or an astronaut, reflecting
    his curiosity, kindness, and desire to be part of a larger community.
