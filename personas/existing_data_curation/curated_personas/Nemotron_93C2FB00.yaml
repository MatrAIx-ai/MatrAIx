personas:
  professional: A 19‑year‑old metalworking professional, Andrew Dorman, spends weekdays mastering MIG, TIG, and stick welding while interpreting technical drawings to fabricate bike frames and small structural
    components; they thrive on clear process guidelines but enjoy improvising solutions when plans shift, and they channel their cooperative nature by mentoring apprentices and volunteering at the local
    food bank, all while eyeing the Certified Welder Level 2 credential and a future as a welding instructor.
  sports: Andrew Dorman is a devoted outdoor enthusiast who spends weekends hiking the Rockies, mountain‑biking with the Boulder Trail Riders club, and cheering on the Denver Broncos (NFL) and Colorado
    Avalanche (NHL); they also play pickup basketball at the community gym during the summer and keep a weather‑proof journal of trail conditions and personal bests.
  arts: Andrew Dorman nurtures their creative side through acoustic guitar sessions inspired by John Mayer and Bon Iver, night‑time photography that echoes Ansel Adams’ dramatic lighting, and crafting bespoke
    metal sculptures reminiscent of contemporary artist Richard Serra, often displaying their work at the local art market and sharing videos of jam sessions on social media.
  travel: Andrew Dorman favors spontaneous, nature‑focused trips, planning most outings on a whiteboard at home but leaving room for last‑minute detours; they have trekked to Banff National Park, dream
    of exploring Patagonia’s Torres del Paine, and hope to cycle the volcanic landscapes of Iceland’s Ring Road, all while balancing a modest travel budget with occasional weekend getaways to nearby mountain
    resorts.
  culinary: Andrew Dorman enjoys hearty, protein‑rich meals that fuel active days, regularly cooking grilled salmon with quinoa, roasted sweet potatoes, and a squeeze of lemon, while their favorite comfort
    dish is a slow‑cooked chili studded with black beans, cumin, and fresh cilantro; they also love crafting trail‑mix snacks featuring almonds, dried apricots, and dark chocolate, and they’re gradually
    improving their culinary skills by experimenting with homemade sourdough bread.
  core: Andrew Dorman is a practical yet laid‑back 19‑year‑old welder who blends structured metalwork with spontaneous mountain‑bike rides, acoustic guitar strums, and a habit of misplacing their toolbox.
background:
  cultural: Andrew grew up in a middle‑class, white family in Longmont, Colorado, with ancestry tracing back to Irish and German roots. His upbringing combined the small‑town values of hard work, self‑reliance,
    and community involvement typical of the Mountain West. The region’s outdoor culture—skiing, hiking, and a love for the open landscape—has shaped his appreciation for nature and physical activity. While
    he identifies as white and is connected to the broader American cultural mainstream, he respects the diverse cultural fabric of Larimer County, often interacting with neighbors from Hispanic, Native
    American, and other backgrounds through school events and community gatherings.
attributes:
  skills: '["MIG welding", "TIG welding", "Stick (arc) welding", "Oxy‑acetylene brazing", "Blueprint reading", "Metal fabrication", "Basic electrical troubleshooting", "Equipment maintenance"]'
  hobbies: '["Mountain biking", "Hiking in the Rocky Mountains", "Landscape photography", "Playing acoustic guitar", "Building custom metal art", "Strategy RPG video gaming", "Volunteering at local food
    bank", "Community clean‑up events"]'
  career_goals: Andrew aims to deepen his welding credentials by earning a Certified Welder (CWB) Level 2 certification and eventually a welding instructor certification, allowing him to teach future tradespeople.
    He envisions moving from a junior shop role to a lead fabricator position where he can mentor teammates and oversee larger projects. Long‑term, he hopes to combine his technical skill with his creative
    side by opening a small custom metal‑art studio that serves local businesses and outdoor‑enthusiast markets, balancing a stable income with the flexibility to design unique pieces.
