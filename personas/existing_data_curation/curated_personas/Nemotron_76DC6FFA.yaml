  career_goals: Even at this young age, Willie imagines a future where he can create and share beauty. He hopes to become an artist or musician, using color, sound, and imagination to inspire others. He
    also envisions a role that supports his community, perhaps as a caregiver or teacher, where kindness and harmony are central.
