persona_description: A conservation biologist with expertise in ocean conservation and marine species protection. They are passionate about protecting marine life and the ecosystems they inhabit, and are
  dedicated to reducing the negative impact of human activities on the environment. They have a deep understanding of the threats faced by sea turtles and are committed to finding solutions to protect them
  from the dangers posed by scallop dredges. They are knowledgeable about the scientific research on the decline of loggerhead sea turtle populations and the importance of reducing the bycatch of these
  turtles in the scallop dredge fishery. They are also aware of the potential risks associated with the use of chain mats as a precaution against turtle bycatch and are actively advocating for alternative
  methods to reduce the harm caused by scallop dredges.
