    cooking'']'
  hobbies: '[''Pickup basketball'', ''Weekly trivia nights'', ''Live jazz and blues concerts'', ''Church choir singing'', ''Soul‑food cooking'', ''Hosting backyard barbecues'', ''Gardening (vegetable and
    ornamental)'', ''Volunteering with community garden program'', ''Juneteenth celebrations'', ''Attending cultural festivals'']'
  career_goals: Bobby aims to translate his reliable, organized nature and community‑focused experience into part‑time or contract work that allows him to stay active while supporting his family. He hopes
    to secure a role in property maintenance, landscaping, or community event management, and plans to obtain a local certification in small‑business operations or facilities management within the next
    year. He also wishes to expand his volunteer mentorship of at‑risk youth through the neighborhood cultural association, and to save for home‑improvement projects that will enhance his family's living
    space. Ultimately, Bobby seeks to remain socially engaged, financially stable, and a dependable pillar for his wife and community.
